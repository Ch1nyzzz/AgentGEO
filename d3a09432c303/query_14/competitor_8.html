</span><h1 class="h1 two-col-title" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Vasectomy reversal</span></h1><span data-dcnode-id="1681" instrument_node="">
</span></div><span data-dcnode-id="1679" instrument_node="">

</span><p data-dcnode-id="1662"><span data-dcnode-id="1665" instrument_node="">Expert reviewer, Professor Raj Persad, Consultant Urological Surgeon</span><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">
Next review due March 2023
</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p class="impact" data-dcnode-id="1656"><span data-dcnode-id="1660" instrument_node="">A vasectomy reversal is a complex operation to reconnect the tubes that carry sperm from your testicles to your penis after a previous </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bupa.co.uk/health-information/mens-health/vasectomy"><span data-dcnode-id="1659" instrument_node="">vasectomy</span></a><span data-dcnode-id="1657" instrument_node="">. You might be thinking about having a reversal if you regret your decision to have a vasectomy. </span></p><span data-dcnode-id="1655" instrument_node="">
</span><p class="impact" data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">If successful, it means you’ll have sperm in your semen and be fertile again. However, there’s no guarantee that the operation will restore your fertility or that you’ll be able to get your partner pregnant. </span></p></div><span data-dcnode-id="1651" instrument_node="">
</span></div><span data-dcnode-id="1649" instrument_node="">
</span></div><span data-dcnode-id="1647" instrument_node="">

</span><span class="offset-anchor" data-dcnode-id="1539" data-section-id="c7e3e34c-b34c-4293-9c29-7c2ba4e9f511" data-section-title="Success rate" id="c7e3e34c-b34c-4293-9c29-7c2ba4e9f511-mob"></span><div class="page-section" data-dcnode-id="1509" data-hide-from-desktop="False" data-section-id="c7e3e34c-b34c-4293-9c29-7c2ba4e9f511" data-section-title="Success rate" id="c7e3e34c-b34c-4293-9c29-7c2ba4e9f511"><span data-dcnode-id="1538" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1511"><span data-dcnode-id="1537" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1513"><span data-dcnode-id="1536" instrument_node="">
</span><div class="pad" data-dcnode-id="1515"><span data-dcnode-id="1535" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1517"><h2 data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">How successful is vasectomy reversal? </span></h2><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">The success rate of a vasectomy reversal depends on how long it’s been since your original vasectomy procedure. The longer the gap between having a vasectomy and reversing it, the less likely it is to be successful. So, for instance, around 75 in 100 men who have their vasectomy reversed within three years go on to get their partner pregnant. For men who have their vasectomy reversed after 15 years, this figure falls to 30 in 100 men getting their partner pregnant. </span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">The chance of success may also depend on the type of vasectomy you had originally, and what surgery you have to reverse it. The surgeon’s experience in doing the procedure is also a factor, so be sure to consider this, along with their success rate.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1525" instrument_node="">A successful vasectomy reversal doesn't guarantee that your partner will get pregnant. Other factors, such as your partner’s age, play a part along with other causes of </span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bupa.co.uk/health-information/womens-health/female-infertility"><span data-dcnode-id="1524" instrument_node="">female infertility</span></a><span data-dcnode-id="1522" instrument_node=""> and </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bupa.co.uk/health-information/mens-health/male-infertility"><span data-dcnode-id="1521" instrument_node="">male infertility</span></a><span data-dcnode-id="1519" instrument_node="">. For more information, see Our FAQ: What happens if vasectomy reversal isn’t successful? </span></p></div><span data-dcnode-id="1516" instrument_node="">
</span></div><span data-dcnode-id="1514" instrument_node="">
</span></div><span data-dcnode-id="1512" instrument_node="">
</span></div><span data-dcnode-id="1510" instrument_node="">
</span></div><span data-dcnode-id="1508" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1507" data-section-id="5f383883-ba28-44d1-838e-1c72b4857d66" data-section-title="Costs" id="5f383883-ba28-44d1-838e-1c72b4857d66-mob"></span><div class="page-section" data-dcnode-id="1489" data-hide-from-desktop="False" data-section-id="5f383883-ba28-44d1-838e-1c72b4857d66" data-section-title="Costs" id="5f383883-ba28-44d1-838e-1c72b4857d66"><span data-dcnode-id="1506" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1491"><span data-dcnode-id="1505" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1493"><span data-dcnode-id="1504" instrument_node="">
</span><div class="pad" data-dcnode-id="1495"><span data-dcnode-id="1503" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1497"><h2 data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">How much does a vasectomy reversal cost? </span></h2><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Vasectomy reversal is not usually available on the NHS, and private health insurance companies don’t usually fund it either. You’ll need to pay to have the procedure done privately. Costs for vasectomy reversal vary widely between clinics, but are typically several thousand pounds. It can depend on the experience of the surgeon and how long they take to perform the procedure. You’ll need to contact a clinic directly to get a quote. Make sure you understand exactly what is covered in the fee, including assessments before the procedure, follow-up and aftercare.  </span></p></div><span data-dcnode-id="1496" instrument_node="">
</span></div><span data-dcnode-id="1494" instrument_node="">
</span></div><span data-dcnode-id="1492" instrument_node="">
</span></div><span data-dcnode-id="1490" instrument_node="">
</span></div><span data-dcnode-id="1488" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1487" data-section-id="737288a7-2eea-4770-af65-642d8fa4d812" data-section-title="Alternatives" id="737288a7-2eea-4770-af65-642d8fa4d812-mob"></span><div class="page-section" data-dcnode-id="1463" data-hide-from-desktop="False" data-section-id="737288a7-2eea-4770-af65-642d8fa4d812" data-section-title="Alternatives" id="737288a7-2eea-4770-af65-642d8fa4d812"><span data-dcnode-id="1486" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1465"><span data-dcnode-id="1485" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1467"><span data-dcnode-id="1484" instrument_node="">
</span><div class="pad" data-dcnode-id="1469"><span data-dcnode-id="1483" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1471"><h2 data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">What are the alternatives to vasectomy reversal?</span></h2><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1479" instrument_node="">An alternative to vasectomy reversal is to use an </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bupa.co.uk/health-information/mens-health/male-infertility"><span data-dcnode-id="1478" instrument_node="">infertility treatment</span></a><span data-dcnode-id="1476" instrument_node=""> called intra-cytoplasmic sperm injection (ICSI). This involves surgery to remove sperm directly from your testicle or your epididymis (where sperm are stored inside your scrotum). Your partner will also need a procedure to remove an egg. A single sperm is then injected into your partner’s egg and if the egg is fertilised, it’s transferred to your partner's womb. </span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">As with vasectomy reversal, you’ll usually need to pay for all or some of this treatment. Generally, when possible, vasectomy reversal is thought to be the better approach because it involves only one partner having treatment rather than both. However, this will depend on the length of time since your vasectomy, how old your partner is, the number of children you want, and the costs involved. In some circumstances, ICSI might be a better option. You can talk to your GP to find out more about fertility treatments or book an appointment directly with a fertility clinic.
</span></p></div><span data-dcnode-id="1470" instrument_node="">
</span></div><span data-dcnode-id="1468" instrument_node="">
</span></div><span data-dcnode-id="1466" instrument_node="">
</span></div><span data-dcnode-id="1464" instrument_node="">
</span></div><span data-dcnode-id="1462" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1461" data-section-id="c6a36e3a-38f4-42da-92ae-d37840363092" data-section-title="Preparation" id="c6a36e3a-38f4-42da-92ae-d37840363092-mob"></span><div class="page-section" data-dcnode-id="1431" data-hide-from-desktop="False" data-section-id="c6a36e3a-38f4-42da-92ae-d37840363092" data-section-title="Preparation" id="c6a36e3a-38f4-42da-92ae-d37840363092"><span data-dcnode-id="1460" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1433"><span data-dcnode-id="1459" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1435"><span data-dcnode-id="1458" instrument_node="">
</span><div class="pad" data-dcnode-id="1437"><span data-dcnode-id="1457" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1439"><h2 data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Preparing for a vasectomy reversal</span></h2><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">If you’re considering a vasectomy reversal, your surgeon will go through exactly what to expect including the potential risks and benefits of the procedure. They’ll want to know about your previous vasectomy and any other previous surgery or conditions you may have. They might want to do some tests and examine your genital area too. Do ask your doctor if you have any questions or need any more explanation about the procedure. You’ll be asked to sign a consent form before the procedure, so it’s important that you feel fully informed. </span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Your surgeon will explain how to prepare for your procedure. For example, if you smoke, it’s a good idea to quit before any operation. Smoking can increase your risk of infection and other complications after surgery, and slow your recovery.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Vasectomy reversal is usually done under general anaesthesia, which means you’ll be asleep during the procedure. A general anaesthetic can make you sick, so you’ll be asked to stop eating and drinking for several hours before your operation. Make sure you follow any instructions given to you by the clinic. </span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">You can often go home on the day of your procedure, but sometimes you may need to stay overnight – so be prepared for this. If you go home the same day, you’ll need someone to drive you and stay with you overnight. </span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">On the day of your operation, your surgeon will check that you’re still happy to go ahead with the procedure. You might also be given compression stockings to wear, and an injection of an anticlotting medicine called heparin. This helps to prevent blood clots developing in the veins in your legs during surgery.
</span></p></div><span data-dcnode-id="1438" instrument_node="">
</span></div><span data-dcnode-id="1436" instrument_node="">
</span></div><span data-dcnode-id="1434" instrument_node="">
</span></div><span data-dcnode-id="1432" instrument_node="">
</span></div><span data-dcnode-id="1430" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1429" data-section-id="8b874c2b-d6cf-46d3-920a-974c8ecc764c" data-section-title="The procedure" id="8b874c2b-d6cf-46d3-920a-974c8ecc764c-mob"></span><div class="page-section" data-dcnode-id="1388" data-hide-from-desktop="False" data-section-id="8b874c2b-d6cf-46d3-920a-974c8ecc764c" data-section-title="The procedure" id="8b874c2b-d6cf-46d3-920a-974c8ecc764c"><span data-dcnode-id="1428" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1390"><span data-dcnode-id="1427" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1392"><span data-dcnode-id="1426" instrument_node="">
</span><div class="pad" data-dcnode-id="1394"><span data-dcnode-id="1425" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1396"><h2 data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">What happens during a vasectomy reversal? </span></h2><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">The procedure will take between two and four hours, depending on the exact technique your surgeon uses. </span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Once the anaesthetic has taken effect, your surgeon will make a small cut (about 2cm long) in each side of your scrotum. These will usually be in the same place as your vasectomy scars. </span></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">They’ll locate the tubes that carry sperm from your testicles to your penis (the vas deferens) and cut these above and below where they were previously tied or sealed. They’ll then gently open up the tubes and check the fluid inside to see if there’s sperm in it. This shows whether there’s any blockage in the tubes where your sperm are stored (the epididymis).</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">The rest of the procedure will be done in one of the following two ways. </span></p><span data-dcnode-id="1410" instrument_node="">
</span><ul data-dcnode-id="1402"><span data-dcnode-id="1409" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">
    If there are sperm in the fluid, this shows there’s no blockage. Your surgeon will then join the cut ends of your vas deferens back together using dissolvable stitches. This is called a vasovasostomy.</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">If there aren’t any sperm in the fluid, it means there’s a blockage in your epididymis. Your surgeon will join your vas deferens directly to a section of the epididymis that bypasses the block. This is a more complex operation, called a vasoepididymostomy.</span></li><span data-dcnode-id="1403" instrument_node="">
</span></ul><span data-dcnode-id="1401" instrument_node="">
</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">In either case, your surgeon may perform the operation using microsurgery – when a microscope is used to magnify the tubes. At the end of the procedure, your surgeon will close your skin with dissolvable stitches.</span></p></div><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1393" instrument_node="">
</span></div><span data-dcnode-id="1391" instrument_node="">
</span></div><span data-dcnode-id="1389" instrument_node="">
</span></div><span data-dcnode-id="1387" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1386" data-section-id="d7c59cc7-92b6-4454-86d5-8f32c74c6c82" data-section-title="Aftercare" id="d7c59cc7-92b6-4454-86d5-8f32c74c6c82-mob"></span><div class="page-section" data-dcnode-id="1362" data-hide-from-desktop="False" data-section-id="d7c59cc7-92b6-4454-86d5-8f32c74c6c82" data-section-title="Aftercare" id="d7c59cc7-92b6-4454-86d5-8f32c74c6c82"><span data-dcnode-id="1385" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1364"><span data-dcnode-id="1384" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1366"><span data-dcnode-id="1383" instrument_node="">
</span><div class="pad" data-dcnode-id="1368"><span data-dcnode-id="1382" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1370"><h2 data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">What to expect afterwards</span></h2><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">You’ll need to rest until the effects of the anaesthetic have passed. You may need pain relief to help with any discomfort as the anaesthetic wears off. </span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">If you’re going home the same day, you’ll need someone to take you home and stay with you overnight while the anaesthetic wears off. Sometimes you may need to stay overnight. It can take a while to get over having a general anaesthetic. You might find that you're not so coordinated or that it's difficult to think clearly. This should pass within 24 hours. In the meantime, don't drive, drink alcohol, operate machinery or make any important decisions. </span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Before you go home, your nurse will give you some advice about caring for the wounds in your scrotum and what pain relief you can take. They’ll also give you information about follow-up appointments. </span></p></div><span data-dcnode-id="1369" instrument_node="">
</span></div><span data-dcnode-id="1367" instrument_node="">
</span></div><span data-dcnode-id="1365" instrument_node="">
</span></div><span data-dcnode-id="1363" instrument_node="">
</span></div><span data-dcnode-id="1361" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1360" data-section-id="e9a943ad-dc5f-4e0f-abfc-e1897d1b4536" data-section-title="Recovery" id="e9a943ad-dc5f-4e0f-abfc-e1897d1b4536-mob"></span><div class="page-section" data-dcnode-id="1324" data-hide-from-desktop="False" data-section-id="e9a943ad-dc5f-4e0f-abfc-e1897d1b4536" data-section-title="Recovery" id="e9a943ad-dc5f-4e0f-abfc-e1897d1b4536"><span data-dcnode-id="1359" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1326"><span data-dcnode-id="1358" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1328"><span data-dcnode-id="1357" instrument_node="">
</span><div class="pad" data-dcnode-id="1330"><span data-dcnode-id="1356" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1332"><h2 data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Recovering from a vasectomy reversal</span></h2><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">You’re likely to have some swelling, bruising and pain around your scrotum after a vasectomy reversal. You’ll probably need a few days off work. If you need something to help with the pain, take over-the-counter painkillers, such as paracetamol or ibuprofen. Always read the patient information that comes with your medicine and if you have any questions, ask your pharmacist for advice.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">It’s a good idea to wear close-fitting, supportive underwear such as tight pants, or a scrotal or athletic support for the first few days after your procedure. Your clinic may provide this. It will protect your scrotum and help to ease any discomfort and swelling.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">While you can do some gentle exercise a week after your procedure, don't lift anything heavy or do any strenuous exercise for the first few weeks. It’s best to wait about a month before you have sex again. There’s a risk you could harm the healing (and the success of the reversal) if you have sex before this time. There might be blood in your semen the first few times you ejaculate. </span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">It’s best to wait a couple of days until you have a shower, and a couple of weeks before having a bath. Dry your genital area gently and thoroughly afterwards.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">If you have stitches, they’ll usually disappear within two to three weeks.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><h3 data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Post-surgery sperm tests</span></h3><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">You’ll need to have your semen tested after the procedure to find out if it contains sperm. You’ll usually be asked to do this around three months after your vasectomy reversal. If you’ve had a vasoepididymostomy, it can take longer for sperm to appear in your semen. Your doctor might need to test your semen every three months for a year until they find sperm.
</span></p></div><span data-dcnode-id="1331" instrument_node="">
</span></div><span data-dcnode-id="1329" instrument_node="">
</span></div><span data-dcnode-id="1327" instrument_node="">
</span></div><span data-dcnode-id="1325" instrument_node="">
</span></div><span data-dcnode-id="1323" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1322" data-section-id="7fa3ec9a-e959-4f44-838c-6996ce0afb36" data-section-title="Complications" id="7fa3ec9a-e959-4f44-838c-6996ce0afb36-mob"></span><div class="page-section" data-dcnode-id="1278" data-hide-from-desktop="False" data-section-id="7fa3ec9a-e959-4f44-838c-6996ce0afb36" data-section-title="Complications" id="7fa3ec9a-e959-4f44-838c-6996ce0afb36"><span data-dcnode-id="1321" instrument_node=""> </span><div class="panel content-block full-width-mod" data-dcnode-id="1280"><span data-dcnode-id="1320" instrument_node="">
</span><div class="belt noPad-desktop reducePadding-top reducePadding-bottom" data-dcnode-id="1282"><span data-dcnode-id="1319" instrument_node="">
</span><div class="pad" data-dcnode-id="1284"><span data-dcnode-id="1318" instrument_node="">
</span><div class="content-block-body" data-dcnode-id="1286"><h2 data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Complications of vasectomy reversal</span></h2><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Complications are when problems occur during or after the operation. Possible complications of a vasectomy reversal include:</span></p><span data-dcnode-id="1312" instrument_node="">
</span><ul data-dcnode-id="1292"><span data-dcnode-id="1311" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">bleeding inside your scrotum – this is called a haematoma</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">an infection</span></li><span data-dcnode-id="1305" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">hard lumps in your testicles, called sperm granulomas</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">damage to blood vessels, which can cause your testicles to shrink (testicular atrophy)</span></li><span data-dcnode-id="1299" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">long-term pain in your testicles </span></li><span data-dcnode-id="1296" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">scar tissue forming in the join, which re-blocks the tubes (vas deferens) that carry sperm from the testicles to your penis</span></li><span data-dcnode-id="1293" instrument_node="">
</span></ul><span data-dcnode-id="1291" instrument_node="">
</span><br data-dcnode-id="1290"><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">It's possible that a vasectomy reversal won’t restore your fertility and you may need further fertility treatments to have a baby.  </span></p></div><span data-dcnode-id="1285" instrument_node="">
</span></div><span data-dcnode-id="1283" instrument_node="">
</span></div><span data-dcnode-id="1281" instrument_node="">
</span></div><span data-dcnode-id="1279" instrument_node="">
</span></div><span data-dcnode-id="1277" instrument_node="">
</span><span class="offset-anchor" data-dcnode-id="1276" data-section-id="3cb6c46e-49cc-4c9e-90c8-b26d80672123" data-section-title="FAQs" id="3cb6c46e-49cc-4c9e-90c8-b26d80672123-mob"></span><div class="page-section" data-dcnode-id="1113" data-hide-from-desktop="False" data-section-id="3cb6c46e-49cc-4c9e-90c8-b26d80672123" data-section-title="FAQs" id="3cb6c46e-49cc-4c9e-90c8-b26d80672123"><span data-dcnode-id="1275" instrument_node=""> </span><div class="accordion-section content js" data-dcnode-id="1115"><span data-dcnode-id="1274" instrument_node="">
</span><div class="panel faq-full-page mod-toggle tg-lrg treatment-faq accordion" data-dcnode-id="1117" data-toggle-target="+ div"><span data-dcnode-id="1273" instrument_node="">
</span><div class="belt reducePadding-top" data-dcnode-id="1119"><span data-dcnode-id="1272" instrument_node="">
</span><div class="grid" data-dcnode-id="1121"><span data-dcnode-id="1271" instrument_node="">
</span><div class="col w-100" data-dcnode-id="1123"><span data-dcnode-id="1270" instrument_node="">
</span><div class="pad" data-dcnode-id="1125"><span data-dcnode-id="1269" instrument_node="">
</span><section data-dcnode-id="1127"><span data-dcnode-id="1268" instrument_node="">
</span><div class="mob-pad" data-dcnode-id="1248"><span data-dcnode-id="1267" instrument_node="">
</span><h3 class="faq-header" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Frequently asked questions</span></h3><span data-dcnode-id="1264" instrument_node="">
</span><a class="sitewideAnchor" data-dcnode-id="1263" name=""></a><span data-dcnode-id="1262" instrument_node="">
</span><div class="faq-intro-text" data-dcnode-id="1250"><span data-dcnode-id="1261" instrument_node="">
</span><span data-dcnode-id="1260"></span><span data-dcnode-id="1259" instrument_node="">
</span><a class="btn-expand-all expand" data-dcnode-id="1252" data-more-content-id="#answers" data-show-less-text="Collapse all" data-show-more-text="Expand all" href="javascript:void(0)"><span data-dcnode-id="1258" instrument_node="">
</span><span class="view-more-less-text" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Expand all</span></span><span data-dcnode-id="1255" instrument_node="">
</span><i class="i-plus-d-cyan" data-dcnode-id="1254"></i><span data-dcnode-id="1253" instrument_node="">
</span></a><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span></div><span data-dcnode-id="1247" instrument_node="">
</span><ul class="faq-accordion" data-dcnode-id="1129"><span data-dcnode-id="1246" instrument_node="">
</span><li class="accordion-item bg-white" data-dcnode-id="1216"><span data-dcnode-id="1245" instrument_node="">
</span><a class="sitewideAnchor" data-dcnode-id="1244" name=""></a><span data-dcnode-id="1243" instrument_node="">
</span><h4 class="faq-header tg-link" data-dcnode-id="1230"><span data-dcnode-id="1242" instrument_node="">
</span><a class="title-closed" data-dcnode-id="1238" href="#"><span data-dcnode-id="1241" instrument_node="">Can vasectomy reversal cause erectile dysfunction? </span><i class="i-plus-d-grey" data-dcnode-id="1240"></i><i class="i-minus-d-cyan" data-dcnode-id="1239"></i></a><span data-dcnode-id="1237" instrument_node="">
</span><a class="title-open accordion-hide" data-dcnode-id="1232" href="#"><span data-dcnode-id="1236" instrument_node="">
Can vasectomy reversal cause erectile dysfunction? 
                                                            </span><i class="i-plus-d-grey" data-dcnode-id="1235"></i><i class="i-minus-d-cyan" data-dcnode-id="1234"></i><span data-dcnode-id="1233" instrument_node="">
</span></a><span data-dcnode-id="1231" instrument_node="">
</span></h4><span data-dcnode-id="1229" instrument_node="">
</span><div class="tg-hide bg-white answers" data-dcnode-id="1218"><span data-dcnode-id="1228" instrument_node="">
</span><h5 data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node=""> </span></h5><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">No. A vasectomy reversal won't affect your ability to get an erection or your sex drive. The procedure doesn’t affect the nerves or blood flow to your penis, so it won’t affect your ability to get an erection. Nor does it affect the production of testosterone, the male hormone that controls your sex drive. </span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Many men have trouble getting or keeping an erection from time to time. This can often be caused by psychological and emotional issues. For example, you might be feeling anxious about your fertility or the emotional pressure of trying for a baby. If you think this might be happening to you, talk to your GP. They may be able to help or recommend a counsellor you can talk to.
</span></p><span data-dcnode-id="1219" instrument_node="">
</span></div><span data-dcnode-id="1217" instrument_node="">
</span></li><span data-dcnode-id="1215" instrument_node="">
</span><li class="accordion-item bg-white" data-dcnode-id="1182"><span data-dcnode-id="1214" instrument_node="">
</span><a class="sitewideAnchor" data-dcnode-id="1213" name=""></a><span data-dcnode-id="1212" instrument_node="">
</span><h4 class="faq-header tg-link" data-dcnode-id="1199"><span data-dcnode-id="1211" instrument_node="">
</span><a class="title-closed" data-dcnode-id="1207" href="#"><span data-dcnode-id="1210" instrument_node="">What happens if vasectomy reversal isn't successful?</span><i class="i-plus-d-grey" data-dcnode-id="1209"></i><i class="i-minus-d-cyan" data-dcnode-id="1208"></i></a><span data-dcnode-id="1206" instrument_node="">
</span><a class="title-open accordion-hide" data-dcnode-id="1201" href="#"><span data-dcnode-id="1205" instrument_node="">
What happens if vasectomy reversal isn't successful?
                                                            </span><i class="i-plus-d-grey" data-dcnode-id="1204"></i><i class="i-minus-d-cyan" data-dcnode-id="1203"></i><span data-dcnode-id="1202" instrument_node="">
</span></a><span data-dcnode-id="1200" instrument_node="">
</span></h4><span data-dcnode-id="1198" instrument_node="">
</span><div class="tg-hide bg-white answers" data-dcnode-id="1184"><span data-dcnode-id="1197" instrument_node="">
</span><h5 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node=""> </span></h5><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">It can take several months for sperm to re-appear in your semen, particularly if you’ve had a vasoepididymostomy. So, if a test shows no sperm at three months, your surgeon will suggest a repeat test every few months.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">If sperm haven't reappeared by a year and a half after your vasectomy reversal, it's unlikely that the procedure has worked. Your surgeon will talk to you about what your options are next. Sometimes it’s possible to have more surgery to try to reverse the operation again. Other options include </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bupa.co.uk/health-information/mens-health/male-infertility"><span data-dcnode-id="1189" instrument_node="">infertility treatments</span></a><span data-dcnode-id="1187" instrument_node="">, including assisted reproductive techniques such as in vitro fertilisation (IVF) treatment.
</span></p><span data-dcnode-id="1185" instrument_node="">
</span></div><span data-dcnode-id="1183" instrument_node="">
</span></li><span data-dcnode-id="1181" instrument_node="">
</span><li class="accordion-item bg-white" data-dcnode-id="1131"><span data-dcnode-id="1180" instrument_node="">
</span><a class="sitewideAnchor" data-dcnode-id="1179" name=""></a><span data-dcnode-id="1178" instrument_node="">
</span><h4 class="faq-header tg-link" data-dcnode-id="1165"><span data-dcnode-id="1177" instrument_node="">
</span><a class="title-closed" data-dcnode-id="1173" href="#"><span data-dcnode-id="1176" instrument_node="">What can I do to produce healthy sperm?</span><i class="i-plus-d-grey" data-dcnode-id="1175"></i><i class="i-minus-d-cyan" data-dcnode-id="1174"></i></a><span data-dcnode-id="1172" instrument_node="">
</span><a class="title-open accordion-hide" data-dcnode-id="1167" href="#"><span data-dcnode-id="1171" instrument_node="">
What can I do to produce healthy sperm?
                                                            </span><i class="i-plus-d-grey" data-dcnode-id="1170"></i><i class="i-minus-d-cyan" data-dcnode-id="1169"></i><span data-dcnode-id="1168" instrument_node="">
</span></a><span data-dcnode-id="1166" instrument_node="">
</span></h4><span data-dcnode-id="1164" instrument_node="">
</span><div class="tg-hide bg-white answers" data-dcnode-id="1133"><span data-dcnode-id="1163" instrument_node="">
</span><h5 data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node=""> </span></h5><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">The quality of sperm doesn't just depend on the count, but also on how healthy they are and how well they can move. Things that can adversely affect quality or amount of sperm include: </span></p><span data-dcnode-id="1157" instrument_node="">
</span><ul data-dcnode-id="1140"><span data-dcnode-id="1156" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">smoking</span></li><span data-dcnode-id="1153" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">drinking too much alcohol </span></li><span data-dcnode-id="1150" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">certain medicines or health conditions</span></li><span data-dcnode-id="1147" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">being obese</span></li><span data-dcnode-id="1144" instrument_node="">
</span><li class="small-dot-rte" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">increased heat in your scrotum</span></li><span data-dcnode-id="1141" instrument_node="">
</span></ul><span data-dcnode-id="1139" instrument_node="">
</span><br data-dcnode-id="1138"><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Following a healthy lifestyle by eating a healthy balanced diet, keeping active, not smoking and not drinking alcohol to excess will help with both your health and fertility. </span></p><span data-dcnode-id="1134" instrument_node="">
</span></div><span data-dcnode-id="1132" instrument_node="">
</span></li><span data-dcnode-id="1130" instrument_node="">
</span></ul><span data-dcnode-id="1128" instrument_node="">
