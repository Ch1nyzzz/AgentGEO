</span><h2 data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">What is a vasectomy?</span></h2><p data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">
A vasectomy involves cutting both tubes that carry sperm from your testicles. This stops the sperm made in the testes from reaching the semen. Your body can still produce sperm, but the testicles reabsorb it naturally.

</span><h2 data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">Is a vasectomy right for me?</span></h2><p data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">
If you are a man and have reached a certain point in your life, you may be considering vasectomy surgery as a permanent method of male contraception. Our experienced urology consultants specialise in male sterilisation and can provide you with rapid access to a consultation and treatment.
</span></p><p data-dcnode-id="3148"><span data-dcnode-id="3152" instrument_node="">
Choosing to have a vasectomy is a serious decision, but there is an option to reverse the procedure through </span><a class="" data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w.soundcloud.com/treatments/vasectomy-reversal" target="_blank" title="Link: /treatments/vasectomy-reversal"><span data-dcnode-id="3151" instrument_node="">vasectomy reversal surgery</span></a><span data-dcnode-id="3149" instrument_node=""> if your personal circumstances change. However, the success of a vasectomy reversal isn't guaranteed, so your decision to have a vasectomy is very important.
</span></p><p data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">
You should only consider a vasectomy if you're certain you don't want any, or any further, children. If you have a partner, it's important to discuss your thoughts with them. If you do have any doubts, it’s best to wait until you've made a definite decision.</span></p><h3 class="cms-headings-h3" data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Will my sex life be affected?</span></h3><p data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">A vasectomy won't affect your sex drive, or your ability to enjoy sex, ejaculate or have an erection. Semen is still produced, there is simply no sperm in the semen. </span></p><p data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">However, you should use another form of contraception until we've confirmed that the operation is a success. </span></p><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">You should also remember that a vasectomy protects against causing pregnancy, but it does not protect against sexually transmitted infections.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><h2 data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">What happens during a vasectomy?</span></h2><p data-dcnode-id="3127"><span data-dcnode-id="3134" instrument_node="">The procedure usually takes about&nbsp;15–20 minutes.&nbsp;The surgery can be performed under </span><a data-dcnode-id="3132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w.soundcloud.com/treatments/local-anaesthetic" title="Local anaesthetic at Nuffield Health Hospitals"><span data-dcnode-id="3133" instrument_node="">local anaesthetic</span></a><span data-dcnode-id="3131" instrument_node="">&nbsp;or </span><a class="" data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w.soundcloud.com/treatments/general-anaesthetic" target="_blank" title="Link: /treatments/general-anaesthetic"><span data-dcnode-id="3130" instrument_node="">general anaesthetic</span></a><span data-dcnode-id="3128" instrument_node="">. If you have local anaesthetic, this will be injected alongside each tube at the top of your scrotum and in your skin where the cuts will be made.</span></p><h3 class="cms-headings-h3" data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">Before the procedure</span></h3><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">There are a few things you can do in the lead up to the procedure to make sure everything goes as smoothly as possible:
</span></p><span data-dcnode-id="3122" instrument_node="">
</span><ul data-dcnode-id="3098"><li data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">Let your doctor know about any medication you take and follow their instructions</span></li><li data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">If you smoke, stop smoking several weeks before the operation</span></li><span data-dcnode-id="3117" instrument_node="">
</span><li data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Try to maintain a healthy weight</span></li><span data-dcnode-id="3114" instrument_node="">
</span><li data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Exercise regularly</span></li><span data-dcnode-id="3111" instrument_node="">
</span><li data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Don't drink alcohol in the week leading up to the procedure</span></li><span data-dcnode-id="3108" instrument_node="">
</span><li data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">If you're diabetic, keep your blood sugar levels under control around the time of your procedure</span></li><span data-dcnode-id="3105" instrument_node="">
</span><li data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Have a bath or shower on the day of the operation and make sure your scrotum is clean</span></li><span data-dcnode-id="3102" instrument_node="">
</span><li data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Shave your scrotum beforehand, or the healthcare team will do it for you.</span></li><span data-dcnode-id="3099" instrument_node="">
</span></ul><p data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">
When you arrive in hospital, you’ll meet your surgeon, anaesthetist and nurse. You'll be able to ask any more questions you may have.</span></p><span data-dcnode-id="3095" instrument_node="">
</span><h3 data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">During the procedure</span></h3><span data-dcnode-id="3092" instrument_node="">
</span><ol data-dcnode-id="3083"><li data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Once you're under anaesthetic, your surgeon will make one small cut on each side of your scrotum – or they may make a single cut in the middle of your scrotum</span></li><span data-dcnode-id="3089" instrument_node="">
</span><li data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">They'll cut the tubes that carry sperm and close the ends with stitches, clips or an electric current&nbsp;</span></li><span data-dcnode-id="3086" instrument_node="">
</span><li data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">Finally, they'll close the cuts with dissolvable stiches.</span></li></ol><span data-dcnode-id="3082" instrument_node="">
</span><h3 data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">After the procedure</span></h3><p data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">
Afterwards you'll be taken to the recovery room. If you have general anaesthetic, you'll&nbsp;wake up here. You shouldn’t feel any pain, but you might be groggy and slightly uncomfortable as you come around.
</span></p><p data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">
When you’re ready, you’ll be taken to your room, where the healthcare
team will look after you.
</span></p><span data-dcnode-id="3075" instrument_node="">
</span><h2 data-dcnode-id="3072"><span data-dcnode-id="3074" instrument_node="">Recovery after a vasectomy</span><br data-dcnode-id="3073"></h2><p data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">
Your scrotum may be sore for 1–3 weeks, but you should be able to return to normal activities about about 2–3 days.
</span></p><span data-dcnode-id="3069" instrument_node="">
</span><h3 data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">Short-term recovery</span></h3><p data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">
Back in your room, you may feel some pain as the anaesthetic wears off, which you can take painkillers for.
</span></p><p data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">
To ease discomfort and reduce swelling and bruising, you can:
</span></p><span data-dcnode-id="3062" instrument_node="">
</span><ul data-dcnode-id="3055"><li data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">hold an ice pack against your scrotum</span></li><span data-dcnode-id="3059" instrument_node="">
</span><li data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">wear a scrotal support or firm underwear.</span></li><span data-dcnode-id="3056" instrument_node="">
</span></ul><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">
You should be able to go home the same day. If so, for the first 24 hours:
</span></p><ul data-dcnode-id="3044"><li data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">you’ll need someone to take you home and stay with you overnight</span></li><span data-dcnode-id="3050" instrument_node="">
</span><li data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">don’t drive, operate machinery, or do any potentially dangerous activities (like cooking) until you’ve fully recovered feeling, movement and co-ordination</span></li><span data-dcnode-id="3047" instrument_node="">
</span><li data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">you shouldn’t sign legal documents or drink alcohol.</span></li></ul><span data-dcnode-id="3043" instrument_node="">
</span><h3 data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Managing your recovery at home</span></h3><p data-dcnode-id="3036"><span data-dcnode-id="3040" instrument_node="">
You should get plenty of rest for the first 24 hours, but then it’s important to stay active to avoid any complications like </span><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nuffieldhealth.com/conditions/deep-vein-thrombosis-dvt" title="Link: https://www.nuffieldhealth.com/conditions/deep-vein-thrombosis-dvt"><span data-dcnode-id="3039" instrument_node="">blood clots</span></a><span data-dcnode-id="3037" instrument_node="">. You should also follow the instructions from our healthcare team on medication or special compression stockings.
</span></p><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">
Your testicles will probably ache for a few days, so take over-the-counter painkillers if you have any discomfort. Your scrotum may also be bruised and swollen, but this will go down after about a week.
</span></p><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">
Here are a few things you can do to make sure you recover well:
</span></p><span data-dcnode-id="3031" instrument_node="">
</span><ul data-dcnode-id="3021"><li data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">Don't ejaculate or do any strenuous exercise including running or cycling for 5–7 days</span></li><span data-dcnode-id="3028" instrument_node="">
</span><li data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">If you have sexual intercourse, use another form of birth control until your doctor confirms that sperm are no longer present in your semen</span></li><span data-dcnode-id="3025" instrument_node="">
</span><li data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Gradually increase your activity with low-impact exercises like walking.</span></li><span data-dcnode-id="3022" instrument_node="">
</span></ul><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">You should call your doctor if:</span></p><ul data-dcnode-id="3012"><li data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">the swelling doesn't go down</span></li><li data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">you have discharge from your wounds</span></li><li data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">you’re still in pain after 4 weeks.</span></li></ul><span data-dcnode-id="3011" instrument_node="">
</span><h3 data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Driving after a vasectomy</span></h3><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Don’t drive until you’re confident you can control your vehicle and always check your insurance policy and with your doctor first.
</span></p><span data-dcnode-id="3006" instrument_node="">
</span><h3 data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Time off work</span></h3><p data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">You should be able to return to work after about 2 days, or a week if your work involves strenuous exercise.
</span></p><span data-dcnode-id="3001" instrument_node="">
</span><h3 data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Follow-up appointments</span></h3><p data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">
It can take around 20 ejaculations to clear out any sperm that may be left, so your doctor will ask you to give one or two samples of your semen after your 20th ejaculation. The samples will be tested to make sure there are no sperm left, which can take up to 12 weeks. You should use alternative contraception until your doctor says you are sperm-free.
</span></p><span data-dcnode-id="2996" instrument_node="">
</span><h2 data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Complications</span></h2><p data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">
As with any operation, there is a small chance of complications, such as:
</span></p><span data-dcnode-id="2991" instrument_node="">
</span><ul data-dcnode-id="2981"><li data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">bleeding</span></li><span data-dcnode-id="2988" instrument_node="">
</span><li data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">infection</span></li><span data-dcnode-id="2985" instrument_node="">
</span><li data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">reaction to anaesthetic.</span></li><span data-dcnode-id="2982" instrument_node="">
</span></ul><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Specific complications of vasectomy can include:
</span></p><span data-dcnode-id="2978" instrument_node="">
</span><ul data-dcnode-id="2965"><li data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">becoming fertile again, if the tubes rejoin</span></li><span data-dcnode-id="2975" instrument_node="">
</span><li data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">sperm granuloma, where sperm leaks and causes painful swellings on the end of the tube that has been cut</span></li><span data-dcnode-id="2972" instrument_node="">
</span><li data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">long-term pain in your testicles</span></li><span data-dcnode-id="2969" instrument_node="">
</span><li data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">congestive epididymitis, where the tube that stores sperm gets blocked, causing pressure and pain.</span></li><span data-dcnode-id="2966" instrument_node="">
</span></ul><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">The healthcare team will do their best to minimise any risks. Make sure you discuss any concerns you have about these complications with your consultant.</span></p><span data-dcnode-id="2962" instrument_node="">
</span><h2 data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Alternative treatment options</span></h2><p data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">
You may also want to consider the following forms of contraception:</span></p><span data-dcnode-id="2957" instrument_node="">
</span><ul data-dcnode-id="2938"><li data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Condoms – this is the only other method of male contraception, but the risk of pregnancy is higher</span></li><span data-dcnode-id="2954" instrument_node="">
</span><li data-dcnode-id="2950"><a class="" data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w.soundcloud.com/treatments/female-sterilisation" target="_blank" title="Link: /treatments/female-sterilisation"><span data-dcnode-id="2953" instrument_node="">Female sterilisation</span></a><span data-dcnode-id="2951" instrument_node=""> – this a permanent method of female contraception, which involves blocking both falopian tubes</span></li><span data-dcnode-id="2949" instrument_node="">
</span><li data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Hormonal implants – a non-permanent female contraception where a small plastic rod is placed under the skin in the upper arm, which releases progestogen to prevent ovulation</span></li><span data-dcnode-id="2946" instrument_node="">
</span><li data-dcnode-id="2942"><a class="" data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w.soundcloud.com/treatments/hormonal-coil" target="_blank" title="Link: /treatments/hormonal-coil"><span data-dcnode-id="2945" instrument_node="">Hormonal coil</span></a><span data-dcnode-id="2943" instrument_node="">– a small, plastic T-shaped device that releases progesterone to prevent pregnancy as well as make your periods lighter and less painful</span></li><span data-dcnode-id="2941" instrument_node="">
</span><li data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">Oral contraceptive pill – a tablet that you take daily for either 21 days with a 7-day break, or every day, which releases oestrogen and progesterone, or just progesterone, to suppress ovulation.</span></li></ul><span data-dcnode-id="2937" instrument_node="">
</span></div><span data-dcnode-id="2935" instrument_node="">
</span></div><span data-dcnode-id="2933" instrument_node="">
