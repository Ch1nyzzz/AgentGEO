</span><meta content="Vasectomy remains an important option for contraception. Research findings have clarified many questions regarding patient selection, optimal technique, postsurgical follow-up, and risk of long-term complications. Men who receive vasectomies tend to be non-Hispanic whites, well educated, married or cohabitating, relatively affluent, and have private health insurance. The strongest predictor for wanting a vasectomy reversal is age younger than 30 years at the time of the procedure. Evidence supports the use of the no-scalpel technique to access the vasa, because it is associated with the fewest complications. The technique with the lowest failure rate is cauterization of the vasa with or without fascial interposition. The ligation techniques should be used cautiously, if at all, and only in combination with fascial interposition or cautery. A single postvasectomy semen sample at 12 weeks that shows rare, nonmotile sperm or azoospermia is acceptable to confirm sterility. No data show that vasectomy increases the risk of prostate or testicular cancer." data-dcnode-id="2724" name="description"><span data-dcnode-id="2723" instrument_node="">

</span><meta content="Vasectomy remains an important option for contraception. Research findings have clarified many questions regarding patient selection, optimal technique, postsurgical follow-up, and risk of long-term complications. Men who receive vasectomies tend to be non-Hispanic whites, well educated, married or cohabitating, relatively affluent, and have private health insurance. The strongest predictor for wanting a vasectomy reversal is age younger than 30 years at the time of the procedure. Evidence supports the use of the no-scalpel technique to access the vasa, because it is associated with the fewest complications. The technique with the lowest failure rate is cauterization of the vasa with or without fascial interposition. The ligation techniques should be used cautiously, if at all, and only in combination with fascial interposition or cautery. A single postvasectomy semen sample at 12 weeks that shows rare, nonmotile sperm or azoospermia is acceptable to confirm sterility. No data show that vasectomy increases the risk of prostate or testicular cancer." data-dcnode-id="2670" name="citation_abstract"><span data-dcnode-id="2669" instrument_node="">

                            </span><span class="bold" data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Patient information:</span></span><span data-dcnode-id="2186" instrument_node=""> See related handout on </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2006/1215/p2079.html"><span data-dcnode-id="2185" instrument_node="">vasectomy</span></a><span data-dcnode-id="2183" instrument_node="">, written by the authors of this article.</span></p><div data-dcnode-id="2181" style="display:none;"></div><div class="noPrint articleSections" data-dcnode-id="2159"><h3 data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Article Sections</span></h3><ul data-dcnode-id="2160"><li data-dcnode-id="2176"><a alt="Abstract" data-dcnode-id="2177" href="#abstract"><span data-dcnode-id="2178" instrument_node="">
                                                Abstract
                                            </span></a></li><li data-dcnode-id="2173"><a data-dcnode-id="2174" href="#sec-1"><span data-dcnode-id="2175" instrument_node="">Patient Selection</span></a></li><li data-dcnode-id="2170"><a data-dcnode-id="2171" href="#sec-2"><span data-dcnode-id="2172" instrument_node="">Technique</span></a></li><li data-dcnode-id="2167"><a data-dcnode-id="2168" href="#sec-3"><span data-dcnode-id="2169" instrument_node="">Follow-up Care</span></a></li><li data-dcnode-id="2164"><a data-dcnode-id="2165" href="#sec-4"><span data-dcnode-id="2166" instrument_node="">Long-term Complications</span></a></li><li data-dcnode-id="2161"><a data-dcnode-id="2162" href="#ref-list-1" id="mobRefLink"><span data-dcnode-id="2163" instrument_node="">References</span></a></li></ul></div></div><div class="afpContent" data-dcnode-id="1602"><div class="abstract" data-dcnode-id="2155" id="abstract"><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Vasectomy remains an important option for contraception. Research findings have clarified many questions regarding patient selection, optimal technique, postsurgical follow-up, and risk of long-term complications. Men who receive vasectomies tend to be non-Hispanic whites, well educated, married or cohabitating, relatively affluent, and have private health insurance. The strongest predictor for wanting a vasectomy reversal is age younger than 30 years at the time of the procedure. Evidence supports the use of the no-scalpel technique to access the vasa, because it is associated with the fewest complications. The technique with the lowest failure rate is cauterization of the vasa with or without fascial interposition. The ligation techniques should be used cautiously, if at all, and only in combination with fascial interposition or cautery. A single postvasectomy semen sample at 12 weeks that shows rare, nonmotile sperm or azoospermia is acceptable to confirm sterility. No data show that vasectomy increases the risk of prostate or testicular cancer. 
</span></p></div><p data-dcnode-id="2136"><span data-dcnode-id="2154" instrument_node="">Although vasectomy is the safest and most inexpensive option for permanent sterilization,</span><a class="superscript bibrRef" data-dcnode-id="2152" href="#afp20061215p2069-b1"><span data-dcnode-id="2153" instrument_node="">1</span></a><span data-dcnode-id="2151" instrument_node="">&nbsp; female sterilization is used about three times as often (27 versus 9.2 percent of couples who use contraception; </span><span class="italic" data-dcnode-id="2148"><a data-dcnode-id="2149" href="#afp20061215p2069-t1"><span data-dcnode-id="2150" instrument_node="">Table 1</span></a></span><span data-dcnode-id="2147" instrument_node="">).</span><a class="superscript bibrRef" data-dcnode-id="2145" href="#afp20061215p2069-b2"><span data-dcnode-id="2146" instrument_node="">2</span></a><span data-dcnode-id="2144" instrument_node=""> In addition, there was a 3 percent overall decrease in the use of sterilization (male and female) and an increase in the use of less-reliable forms of contraception from 1995 to 2002.</span><a class="superscript bibrRef" data-dcnode-id="2142" href="#afp20061215p2069-b2"><span data-dcnode-id="2143" instrument_node="">2</span></a><span class="superscript" data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="2138" href="#afp20061215p2069-b3"><span data-dcnode-id="2139" instrument_node="">3</span></a><span data-dcnode-id="2137" instrument_node=""> Family physicians should be aware of these trends and provide patients with up-to-date information about contraception options.</span></p><div class="table-format" data-dcnode-id="2035" id="afp20061215p2069-t1"><div class="calltoactionbox" data-dcnode-id="2036"><div class="jDialog highlights" data-dcnode-id="2037"><div class="container secondary" data-dcnode-id="2038"><div class="jDialogPrintHide" data-dcnode-id="2039"><p data-dcnode-id="2132" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="2133" name="afp20061215p2069-t1"><strong data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">View/Print Table</span></strong></a></p><div class="journalTable" data-dcnode-id="2040" style="max-height: 5929px;"><span class="table-label" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">TABLE 1</span></span><h4 class="table-title" data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Prevalence of Contraceptive Methods</span></h4><table class="no-mobile-table" data-dcnode-id="2060"><thead data-dcnode-id="2118"><tr data-dcnode-id="2119"><th align="left" class="th" colspan="1" data-dcnode-id="2124" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2125"><span class="italic" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Method</span></span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="2120" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="2121"><span class="italic" data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Prevalence (%)*</span></span></span></th></tr></thead><tbody data-dcnode-id="2061"><tr data-dcnode-id="2111"><td align="left" colspan="1" data-dcnode-id="2115" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Oral contraceptive</span></p></td><td align="left" colspan="1" data-dcnode-id="2112" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">30.6</span></p></td></tr><tr data-dcnode-id="2104"><td align="left" colspan="1" data-dcnode-id="2108" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Female sterilization</span></p></td><td align="left" colspan="1" data-dcnode-id="2105" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">27.0</span></p></td></tr><tr data-dcnode-id="2097"><td align="left" colspan="1" data-dcnode-id="2101" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Male condom</span></p></td><td align="left" colspan="1" data-dcnode-id="2098" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">18.0</span></p></td></tr><tr data-dcnode-id="2090"><td align="left" colspan="1" data-dcnode-id="2094" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Vasectomy</span></p></td><td align="left" colspan="1" data-dcnode-id="2091" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">9.2</span></p></td></tr><tr data-dcnode-id="2083"><td align="left" colspan="1" data-dcnode-id="2087" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Three-month injectable</span></p></td><td align="left" colspan="1" data-dcnode-id="2084" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">5.3</span></p></td></tr><tr data-dcnode-id="2076"><td align="left" colspan="1" data-dcnode-id="2080" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Withdrawal</span></p></td><td align="left" colspan="1" data-dcnode-id="2077" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">4.0</span></p></td></tr><tr data-dcnode-id="2069"><td align="left" colspan="1" data-dcnode-id="2073" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Other†</span></p></td><td align="left" colspan="1" data-dcnode-id="2070" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">4.0</span></p></td></tr><tr data-dcnode-id="2062"><td align="left" colspan="1" data-dcnode-id="2066" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Intrauterine device</span></p></td><td align="left" colspan="1" data-dcnode-id="2063" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">2.0</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="2059"><div class="table-foot" data-dcnode-id="2041"><div class="fn" data-dcnode-id="2053"><p class="fn" data-dcnode-id="2054"><span data-dcnode-id="2058" instrument_node="">*—</span><span class="italic" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Reported use by couples who used contraception in 2002</span></span><span data-dcnode-id="2055" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="2047"><p class="fn" data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">†—</span><span class="italic" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Periodic abstinence, diaphragm, and other methods</span></span><span data-dcnode-id="2049" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="2042"><p class="fn" data-dcnode-id="2043"><span class="italic" data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Adapted from Mosher WD, Martinez GM, Chandra A, Abma JC, Willson SJ. Use of contraception and use of family planning services in the United States: 1982–2002. Adv Data 2004;350:18</span></span><span data-dcnode-id="2044" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><div class="jSection" data-dcnode-id="1972" id="sec-1"><h2 data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Patient Selection</span></h2><div class="mjToggle noPrint" data-dcnode-id="2009"><div class="mjHeader noPrint" data-dcnode-id="2030"><span class="mobileSectionLink" data-dcnode-id="2031" style="margin:5px;"><span data-dcnode-id="2032" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="2010" style="display: none;"><ul data-dcnode-id="2011"><li data-dcnode-id="2027"><a alt="Abstract" data-dcnode-id="2028" href="#abstract"><span data-dcnode-id="2029" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="2024"><a data-dcnode-id="2025" href="#sec-1"><span data-dcnode-id="2026" instrument_node="">Patient Selection</span></a></li><li data-dcnode-id="2021"><a data-dcnode-id="2022" href="#sec-2"><span data-dcnode-id="2023" instrument_node="">Technique</span></a></li><li data-dcnode-id="2018"><a data-dcnode-id="2019" href="#sec-3"><span data-dcnode-id="2020" instrument_node="">Follow-up Care</span></a></li><li data-dcnode-id="2015"><a data-dcnode-id="2016" href="#sec-4"><span data-dcnode-id="2017" instrument_node="">Long-term Complications</span></a></li><li data-dcnode-id="2012"><a data-dcnode-id="2013" href="#ref-list-1"><span data-dcnode-id="2014" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1992"><span data-dcnode-id="2008" instrument_node="">Vasectomy reversal is relatively expensive and its success rate is highly variable.</span><a class="superscript bibrRef" data-dcnode-id="2006" href="#afp20061215p2069-b4"><span data-dcnode-id="2007" instrument_node="">4</span></a><span data-dcnode-id="2005" instrument_node=""> Given these considerations, physicians should counsel men about the permanence of vasectomy and the risk factors associated with reversal requests. Two studies showed that change in marital status was the most common reason for wanting a reversal.</span><a class="superscript bibrRef" data-dcnode-id="2003" href="#afp20061215p2069-b5"><span data-dcnode-id="2004" instrument_node="">5</span></a><span class="superscript" data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1999" href="#afp20061215p2069-b6"><span data-dcnode-id="2000" instrument_node="">6</span></a><span data-dcnode-id="1998" instrument_node=""> A case-control study showed that age younger than 30 years at the time of the vasectomy (odds ratio [OR] = 12.5) and having a spouse who worked outside of the home (OR = 2.1) were associated with later requests for reversal.</span><a class="superscript bibrRef" data-dcnode-id="1996" href="#afp20061215p2069-b7"><span data-dcnode-id="1997" instrument_node="">7</span></a><span data-dcnode-id="1995" instrument_node=""> The authors conceded that the latter association likely was multifactorial and culturally based. There was no association between requests for reversal and the patient’s religion, occupation, or number of marriages. Having no children at the time of the vasectomy was associated with a lower risk of a reversal request (OR = 0.1).</span><a class="superscript bibrRef" data-dcnode-id="1993" href="#afp20061215p2069-b7"><span data-dcnode-id="1994" instrument_node="">7</span></a></p><p data-dcnode-id="1985"><span data-dcnode-id="1991" instrument_node="">Knowing the characteristics associated with men who choose vasectomy may assist physicians with patient education. A cross-sectional survey of men (n = 719) who received vasectomies at a nationally representative sample of medical practices showed that being married or cohabitating at the time of the procedure and earning an annual household income of $25,000 or more were most highly associated with the decision to have a vasectomy (91.4 and 92.9 percent of sterilized men, respectively).</span><a class="superscript bibrRef" data-dcnode-id="1989" href="#afp20061215p2069-b8"><span data-dcnode-id="1990" instrument_node="">8</span></a><span data-dcnode-id="1988" instrument_node=""> Men who undergo vasectomy also tend to be non-Hispanic whites, be well educated, and have private health insurance.</span><a class="superscript bibrRef" data-dcnode-id="1986" href="#afp20061215p2069-b8"><span data-dcnode-id="1987" instrument_node="">8</span></a></p><p data-dcnode-id="1980"><span data-dcnode-id="1984" instrument_node="">Racial disparities were notable in black and Hispanic men. Although these groups represent 11.0 and 9.8 percent of the U.S. male population, respectively, the study showed that only 4.5 percent of vasectomies were for black men and 4.8 percent were for Hispanic men.</span><a class="superscript bibrRef" data-dcnode-id="1982" href="#afp20061215p2069-b8"><span data-dcnode-id="1983" instrument_node="">8</span></a><span data-dcnode-id="1981" instrument_node=""> Therefore, men who choose vasectomy are not a representative sample of the general U.S. male population. It is unknown if these findings represent cultural barriers to male sterilization or financial barriers from lower socioeconomic status.</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1979" instrument_node="">The study also explored the most important reasons given for choosing a vasectomy over other forms of contraception.</span><a class="superscript bibrRef" data-dcnode-id="1977" href="#afp20061215p2069-b8"><span data-dcnode-id="1978" instrument_node="">8</span></a><span data-dcnode-id="1976" instrument_node=""> The most common reason for choosing vasectomy was that this method represented the surest way to prevent having more children (49.9 percent), followed by having a wife or partner who disliked other forms of contraception (12.3 percent) and the patient himself disliking other forms of contraception (10.0 percent). When asked why they chose vasectomy over female sterilization, most men responded that vasectomy was simpler and safer.</span><a class="superscript bibrRef" data-dcnode-id="1974" href="#afp20061215p2069-b8"><span data-dcnode-id="1975" instrument_node="">8</span></a></p></div><div class="jSection" data-dcnode-id="1693" id="sec-2"><h2 data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Technique</span></h2><div class="mjToggle noPrint" data-dcnode-id="1946"><div class="mjHeader noPrint" data-dcnode-id="1967"><span class="mobileSectionLink" data-dcnode-id="1968" style="margin:5px;"><span data-dcnode-id="1969" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1947" style="display: none;"><ul data-dcnode-id="1948"><li data-dcnode-id="1964"><a alt="Abstract" data-dcnode-id="1965" href="#abstract"><span data-dcnode-id="1966" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1961"><a data-dcnode-id="1962" href="#sec-1"><span data-dcnode-id="1963" instrument_node="">Patient Selection</span></a></li><li data-dcnode-id="1958"><a data-dcnode-id="1959" href="#sec-2"><span data-dcnode-id="1960" instrument_node="">Technique</span></a></li><li data-dcnode-id="1955"><a data-dcnode-id="1956" href="#sec-3"><span data-dcnode-id="1957" instrument_node="">Follow-up Care</span></a></li><li data-dcnode-id="1952"><a data-dcnode-id="1953" href="#sec-4"><span data-dcnode-id="1954" instrument_node="">Long-term Complications</span></a></li><li data-dcnode-id="1949"><a data-dcnode-id="1950" href="#ref-list-1"><span data-dcnode-id="1951" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Technique options can be divided into three components of vasectomy: accessing the vasa, disrupting the vasa, and closing the surgical site (scrotum).</span></p><h3 data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">ACCESSING THE VASA</span></h3><p data-dcnode-id="1921"><span data-dcnode-id="1941" instrument_node="">Accessing the vasa can be achieved with a single or double incision to the scrotum using a scalpel, or with the no-scalpel technique using special instruments. No-scalpel vasectomy has been shown to reduce the risk of complications (i.e., bleeding and infection) compared with the incision technique </span><span class="italic" data-dcnode-id="1936"><span data-dcnode-id="1940" instrument_node="">(</span><a data-dcnode-id="1938" href="#afp20061215p2069-t2"><span data-dcnode-id="1939" instrument_node="">Table 2</span></a><span data-dcnode-id="1937" instrument_node="">)</span></span><span data-dcnode-id="1935" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="1933" href="#afp20061215p2069-b9"><span data-dcnode-id="1934" instrument_node="">9</span></a><span class="superscript" data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">–</span></span><a class="superscript bibrRef" data-dcnode-id="1929" href="#afp20061215p2069-b11"><span data-dcnode-id="1930" instrument_node="">11</span></a><span data-dcnode-id="1928" instrument_node=""> Two randomized controlled trials showed a 1.7- to 6.8-fold reduction in bleeding and hematomas and a 1.6- to 7.5-fold reduction in infections with the no-scalpel technique compared with the incision technique.</span><a class="superscript bibrRef" data-dcnode-id="1926" href="#afp20061215p2069-b9"><span data-dcnode-id="1927" instrument_node="">9</span></a><span class="superscript" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1922" href="#afp20061215p2069-b11"><span data-dcnode-id="1923" instrument_node="">11</span></a></p><div class="table-format" data-dcnode-id="1800" id="afp20061215p2069-t2"><div class="calltoactionbox" data-dcnode-id="1801"><div class="jDialog highlights" data-dcnode-id="1802"><div class="container secondary" data-dcnode-id="1803"><div class="jDialogPrintHide" data-dcnode-id="1804"><p data-dcnode-id="1917" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="1918" name="afp20061215p2069-t2"><strong data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">View/Print Table</span></strong></a></p><div class="journalTable" data-dcnode-id="1805" style="max-height: 5929px;"><span class="table-label" data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">TABLE 2</span></span><h4 class="table-title" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Complication Rates of No-Scalpel and Incision Vasectomy Techniques</span></h4><table class="no-mobile-table" data-dcnode-id="1823"><thead data-dcnode-id="1882"><tr data-dcnode-id="1900"><th align="left" class="th" colspan="1" data-dcnode-id="1909" rowspan="2" valign="bottom"><span class="italic" data-dcnode-id="1910"><span class="italic" data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Study</span></span></span></th><th align="left" class="th" colspan="2" data-dcnode-id="1905" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1906"><span class="italic" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Bleeding/hematoma (%)</span></span></span></th><th align="left" class="th" colspan="2" data-dcnode-id="1901" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1902"><span class="italic" data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Infection (%)</span></span></span></th></tr><tr data-dcnode-id="1883"><th align="left" class="th" colspan="1" data-dcnode-id="1896" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1897"><span class="italic" data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">No-scalpel</span></span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="1892" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1893"><span class="italic" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Incision</span></span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="1888" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1889"><span class="italic" data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">No-scalpel</span></span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="1884" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1885"><span class="italic" data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Incision</span></span></span></th></tr></thead><tbody data-dcnode-id="1824"><tr data-dcnode-id="1863"><td align="left" colspan="1" data-dcnode-id="1876" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">Christensen, et al, 2002</span><a class="superscript bibrRef" data-dcnode-id="1879" href="#afp20061215p2069-b9"><span data-dcnode-id="1880" instrument_node="">9</span></a><span data-dcnode-id="1878" instrument_node=""> (RCT)</span></p></td><td align="left" colspan="1" data-dcnode-id="1873" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">9.5</span></p></td><td align="left" colspan="1" data-dcnode-id="1870" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">15.9</span></p></td><td align="left" colspan="1" data-dcnode-id="1867" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">7.1</span></p></td><td align="left" colspan="1" data-dcnode-id="1864" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">11.4</span></p></td></tr><tr data-dcnode-id="1844"><td align="left" colspan="1" data-dcnode-id="1857" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1858"><span data-dcnode-id="1862" instrument_node="">Nirapathpongporn, et al, 1990</span><a class="superscript bibrRef" data-dcnode-id="1860" href="#afp20061215p2069-b10"><span data-dcnode-id="1861" instrument_node="">10</span></a><span data-dcnode-id="1859" instrument_node=""> (NRCT)</span></p></td><td align="left" colspan="1" data-dcnode-id="1854" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">0.3</span></p></td><td align="left" colspan="1" data-dcnode-id="1851" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">1.7</span></p></td><td align="left" colspan="1" data-dcnode-id="1848" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">0.15</span></p></td><td align="left" colspan="1" data-dcnode-id="1845" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">1.34</span></p></td></tr><tr data-dcnode-id="1825"><td align="left" colspan="1" data-dcnode-id="1838" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1839"><span data-dcnode-id="1843" instrument_node="">Sokal, et al, 1999</span><a class="superscript bibrRef" data-dcnode-id="1841" href="#afp20061215p2069-b11"><span data-dcnode-id="1842" instrument_node="">11</span></a><span data-dcnode-id="1840" instrument_node=""> (RCT)</span></p></td><td align="left" colspan="1" data-dcnode-id="1835" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">1.8</span></p></td><td align="left" colspan="1" data-dcnode-id="1832" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">12.2</span></p></td><td align="left" colspan="1" data-dcnode-id="1829" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">0.2</span></p></td><td align="left" colspan="1" data-dcnode-id="1826" rowspan="1" valign="top"><p class="Tabledata" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">1.5</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="1822"><div class="table-foot" data-dcnode-id="1806"><div class="fn" data-dcnode-id="1817"><p class="fn" data-dcnode-id="1818"><span class="italic" data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">RCT = randomized controlled trial; NRCT = nonrandomized controlled trial</span></span><span data-dcnode-id="1819" instrument_node="">.</span></p></div><div class="fn" data-dcnode-id="1807"><p class="fn" data-dcnode-id="1808"><span class="italic" data-dcnode-id="1810"><span data-dcnode-id="1816" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="1814" href="#afp20061215p2069-b9"><span data-dcnode-id="1815" instrument_node="">9</span></a><span data-dcnode-id="1813" instrument_node=""> through </span><a class="bibrRef" data-dcnode-id="1811" href="#afp20061215p2069-b11"><span data-dcnode-id="1812" instrument_node="">11</span></a></span><span data-dcnode-id="1809" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><h3 data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">DISRUPTING THE VASA</span></h3><p data-dcnode-id="1772"><span data-dcnode-id="1797" instrument_node="">Disruption of the vasa can be performed numerous ways </span><span class="italic" data-dcnode-id="1785"><span data-dcnode-id="1796" instrument_node="">(</span><span class="italic" data-dcnode-id="1793"><a data-dcnode-id="1794" href="#afp20061215p2069-f1"><span data-dcnode-id="1795" instrument_node="">Figure 1</span></a></span><a class="superscript bibrRef" data-dcnode-id="1791" href="#afp20061215p2069-b12"><span data-dcnode-id="1792" instrument_node="">12</span></a><span class="superscript" data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">–</span></span><a class="superscript bibrRef" data-dcnode-id="1787" href="#afp20061215p2069-b18"><span data-dcnode-id="1788" instrument_node="">18</span></a><span data-dcnode-id="1786" instrument_node="">)</span></span><span data-dcnode-id="1784" instrument_node="">. Simple suture ligation with excision likely is the most common method worldwide,</span><a class="superscript bibrRef" data-dcnode-id="1782" href="#afp20061215p2069-b12"><span data-dcnode-id="1783" instrument_node="">12</span></a><span data-dcnode-id="1781" instrument_node=""> although this method has been shown to be less effective than previously reported.</span><a class="superscript bibrRef" data-dcnode-id="1779" href="#afp20061215p2069-b19"><span data-dcnode-id="1780" instrument_node="">19</span></a><span data-dcnode-id="1778" instrument_node=""> In addition, there is increasing concern that ligating the vasa, regardless of technique, often causes tip necrosis and sloughing; this can lead to recanalization of a vasal segment.</span><a class="superscript bibrRef" data-dcnode-id="1776" href="#afp20061215p2069-b20"><span data-dcnode-id="1777" instrument_node="">20</span></a><span data-dcnode-id="1775" instrument_node=""> A large randomized trial that included patients in seven countries noted vasectomy failure (i.e., live sperm present 24 weeks after the procedure) in 12.7 percent of men who received suture ligation and excision alone from an experienced physician.</span><a class="superscript bibrRef" data-dcnode-id="1773" href="#afp20061215p2069-b14"><span data-dcnode-id="1774" instrument_node="">14</span></a></p><div class="fig" data-dcnode-id="1747" id="afp20061215p2069-f1"><div class="calltoactionbox" data-dcnode-id="1748"><div class="jDialog highlights" data-dcnode-id="1749"><div class="container secondary" data-dcnode-id="1750"><div class="jDialogPrintHide" data-dcnode-id="1751"><p data-dcnode-id="1768" style="text-align:right;margin-bottom:6px;margin-top:4px;"><a class="jOpener" data-dcnode-id="1769" name="afp20061215p2069-f1"><strong data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">View/Print Figure</span></strong></a></p><p data-dcnode-id="1766"><img data-dcnode-id="1767" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2006/1215/afp20061215p2069-f1.jpg&amp;raw" style="max-width:100%"></p><p class="fig-label" data-dcnode-id="1763"><b data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Figure 1.</span></b></p><p class="fig-caption" data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Vasal disruption methods for vasectomy.</span></p><p class="fig-caption" data-dcnode-id="1752"><span class="italic" data-dcnode-id="1754"><span data-dcnode-id="1760" instrument_node="">Information from references </span><a class="bibrRef" data-dcnode-id="1758" href="#afp20061215p2069-b12"><span data-dcnode-id="1759" instrument_node="">12</span></a><span data-dcnode-id="1757" instrument_node=""> through </span><a class="bibrRef" data-dcnode-id="1755" href="#afp20061215p2069-b18"><span data-dcnode-id="1756" instrument_node="">18</span></a></span><span data-dcnode-id="1753" instrument_node="">.</span></p></div></div></div></div></div><p data-dcnode-id="1734"><span data-dcnode-id="1746" instrument_node="">A retrospective Canadian study comparing cautery and fascial interposition with clip ligation and excision reported an 8.7 percent failure rate in patients who received clip ligation and excision.</span><a class="superscript bibrRef" data-dcnode-id="1744" href="#afp20061215p2069-b17"><span data-dcnode-id="1745" instrument_node="">17</span></a><span data-dcnode-id="1743" instrument_node=""> The seven-country study showed that adding fascial interposition to suture ligation and excision decreased the failure rate to 5.9 percent.</span><a class="superscript bibrRef" data-dcnode-id="1741" href="#afp20061215p2069-b14"><span data-dcnode-id="1742" instrument_node="">14</span></a><span data-dcnode-id="1740" instrument_node=""> These data confirm added protection from fascial interposition. The use of cautery, alone or with fascial interposition, appears to significantly decrease failure rates. The Canadian study showed that cautery with fascial interposition had a 0.3 percent failure rate.</span><a class="superscript bibrRef" data-dcnode-id="1738" href="#afp20061215p2069-b17"><span data-dcnode-id="1739" instrument_node="">17</span></a><span data-dcnode-id="1737" instrument_node=""> An observational study reported an early failure rate (i.e., live sperm 12 weeks after vasectomy) of 1 percent with cautery alone.</span><a class="superscript bibrRef" data-dcnode-id="1735" href="#afp20061215p2069-b13"><span data-dcnode-id="1736" instrument_node="">13</span></a></p><p data-dcnode-id="1713"><span data-dcnode-id="1733" instrument_node="">Intraluminal cautery without separation of the vasa currently is the preferred method practiced at Marie Stopes International health centers (multinational family planning clinics where 100,000 vasectomies have been performed worldwide).</span><a class="superscript bibrRef" data-dcnode-id="1731" href="#afp20061215p2069-b15"><span data-dcnode-id="1732" instrument_node="">15</span></a><span data-dcnode-id="1730" instrument_node=""> These clinics report a less than 1 percent failure rate with this technique.</span><a class="superscript bibrRef" data-dcnode-id="1728" href="#afp20061215p2069-b15"><span data-dcnode-id="1729" instrument_node="">15</span></a><span data-dcnode-id="1727" instrument_node=""> Two studies have compared thermal and electric cautery.</span><a class="superscript bibrRef" data-dcnode-id="1725" href="#afp20061215p2069-b18"><span data-dcnode-id="1726" instrument_node="">18</span></a><span class="superscript" data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1721" href="#afp20061215p2069-b21"><span data-dcnode-id="1722" instrument_node="">21</span></a><span data-dcnode-id="1720" instrument_node=""> One study showed a nonsignificant increase in failure rates with electric cautery,</span><a class="superscript bibrRef" data-dcnode-id="1718" href="#afp20061215p2069-b18"><span data-dcnode-id="1719" instrument_node="">18</span></a><span data-dcnode-id="1717" instrument_node=""> and the other study showed histologic evidence of more reliable occlusion with thermal cautery.</span><a class="superscript bibrRef" data-dcnode-id="1715" href="#afp20061215p2069-b21"><span data-dcnode-id="1716" instrument_node="">21</span></a><span data-dcnode-id="1714" instrument_node=""> Although these studies provide some evidence that thermal cautery is more effective than electric, no firm conclusions about optimal route or type of cautery can be made.</span></p><p data-dcnode-id="1698"><span data-dcnode-id="1712" instrument_node="">Leaving the testicular end open after the vas disruption phase of vasectomy has the theoretical advantage of decreasing post-vasectomy vasal pressure; however, it also causes a sperm granuloma at the open end.</span><a class="superscript bibrRef" data-dcnode-id="1710" href="#afp20061215p2069-b22"><span data-dcnode-id="1711" instrument_node="">22</span></a><span data-dcnode-id="1709" instrument_node=""> Early studies reported a significant decrease in chronic pain with this technique, implying that most chronic pain resulted from congestive epididymitis rather than a granuloma.</span><a class="superscript bibrRef" data-dcnode-id="1707" href="#afp20061215p2069-b22"><span data-dcnode-id="1708" instrument_node="">22</span></a><span class="superscript" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1703" href="#afp20061215p2069-b23"><span data-dcnode-id="1704" instrument_node="">23</span></a><span data-dcnode-id="1702" instrument_node=""> A large retrospective study of 3,761 men who received vasectomies showed no difference in postoperative scrotal pain between open- and closed-ended techniques.</span><a class="superscript bibrRef" data-dcnode-id="1700" href="#afp20061215p2069-b17"><span data-dcnode-id="1701" instrument_node="">17</span></a><span data-dcnode-id="1699" instrument_node=""> Ultimately, physicians should use study data along with their own experience and training to determine which vasal disruption technique is the best option for their patients.</span></p><h3 data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">SCROTAL CLOSURE</span></h3><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Scrotal closure can be accomplished with clips, clamps, sutures, or cyanoacrylate tissue adhesive. The incision also may be left open to heal by secondary intention. Data comparing these methods are limited; therefore, further data are needed before recommendations regarding closure technique can be made.</span></p></div><div class="jSection" data-dcnode-id="1644" id="sec-3"><h2 data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Follow-up Care</span></h2><div class="mjToggle noPrint" data-dcnode-id="1667"><div class="mjHeader noPrint" data-dcnode-id="1688"><span class="mobileSectionLink" data-dcnode-id="1689" style="margin:5px;"><span data-dcnode-id="1690" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1668" style="display: none;"><ul data-dcnode-id="1669"><li data-dcnode-id="1685"><a alt="Abstract" data-dcnode-id="1686" href="#abstract"><span data-dcnode-id="1687" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1682"><a data-dcnode-id="1683" href="#sec-1"><span data-dcnode-id="1684" instrument_node="">Patient Selection</span></a></li><li data-dcnode-id="1679"><a data-dcnode-id="1680" href="#sec-2"><span data-dcnode-id="1681" instrument_node="">Technique</span></a></li><li data-dcnode-id="1676"><a data-dcnode-id="1677" href="#sec-3"><span data-dcnode-id="1678" instrument_node="">Follow-up Care</span></a></li><li data-dcnode-id="1673"><a data-dcnode-id="1674" href="#sec-4"><span data-dcnode-id="1675" instrument_node="">Long-term Complications</span></a></li><li data-dcnode-id="1670"><a data-dcnode-id="1671" href="#ref-list-1"><span data-dcnode-id="1672" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1660"><span data-dcnode-id="1666" instrument_node="">Follow-up after a vasectomy should include one or more semen samples to ensure that recanalization has not occurred.</span><a class="superscript bibrRef" data-dcnode-id="1664" href="#afp20061215p2069-b24"><span data-dcnode-id="1665" instrument_node="">24</span></a><span data-dcnode-id="1663" instrument_node=""> Unfortunately, many men do not comply with this recommendation. A case series reported that less than one half (42 percent) of men who received a vasectomy provided a postvasectomy semen sample. Of those who provided an initial sample, only 25 percent provided a subsequent sample.</span><a class="superscript bibrRef" data-dcnode-id="1661" href="#afp20061215p2069-b25"><span data-dcnode-id="1662" instrument_node="">25</span></a></p><p data-dcnode-id="1645"><span data-dcnode-id="1659" instrument_node="">Two studies showed that the median time to loss of sperm motility was three weeks after vasectomy and the median time to azoospermia was 10 weeks.</span><a class="superscript bibrRef" data-dcnode-id="1657" href="#afp20061215p2069-b26"><span data-dcnode-id="1658" instrument_node="">26</span></a><span class="superscript" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1653" href="#afp20061215p2069-b27"><span data-dcnode-id="1654" instrument_node="">27</span></a><span data-dcnode-id="1652" instrument_node=""> A finding of rare, nonmotile sperm after 12 weeks reliably predicts long-term sterility</span><a class="superscript bibrRef" data-dcnode-id="1650" href="#afp20061215p2069-b28"><span data-dcnode-id="1651" instrument_node="">28</span></a><span data-dcnode-id="1649" instrument_node="">; therefore, subsequent monthly samples after 12 weeks is recommended only for those with motile sperm.</span><a class="superscript bibrRef" data-dcnode-id="1647" href="#afp20061215p2069-b29"><span data-dcnode-id="1648" instrument_node="">29</span></a><span data-dcnode-id="1646" instrument_node=""> Patients who want earlier confirmation of sterility should be counseled that a second sample is more likely to be needed if the first sample is given before 12 weeks.</span></p></div><div class="jSection" data-dcnode-id="1603" id="sec-4"><h2 data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Long-term Complications</span></h2><div class="mjToggle noPrint" data-dcnode-id="1618"><div class="mjHeader noPrint" data-dcnode-id="1639"><span class="mobileSectionLink" data-dcnode-id="1640" style="margin:5px;"><span data-dcnode-id="1641" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1619" style="display: none;"><ul data-dcnode-id="1620"><li data-dcnode-id="1636"><a alt="Abstract" data-dcnode-id="1637" href="#abstract"><span data-dcnode-id="1638" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1633"><a data-dcnode-id="1634" href="#sec-1"><span data-dcnode-id="1635" instrument_node="">Patient Selection</span></a></li><li data-dcnode-id="1630"><a data-dcnode-id="1631" href="#sec-2"><span data-dcnode-id="1632" instrument_node="">Technique</span></a></li><li data-dcnode-id="1627"><a data-dcnode-id="1628" href="#sec-3"><span data-dcnode-id="1629" instrument_node="">Follow-up Care</span></a></li><li data-dcnode-id="1624"><a data-dcnode-id="1625" href="#sec-4"><span data-dcnode-id="1626" instrument_node="">Long-term Complications</span></a></li><li data-dcnode-id="1621"><a data-dcnode-id="1622" href="#ref-list-1"><span data-dcnode-id="1623" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1604"><span data-dcnode-id="1617" instrument_node="">Some men may be concerned that vasectomy is linked to prostate cancer. However, a population-based, case-control study including men with newly diagnosed prostate cancer showed no association between prostate cancer and vasectomy (relative risk = 0.94),</span><a class="superscript bibrRef" data-dcnode-id="1615" href="#afp20061215p2069-b30"><span data-dcnode-id="1616" instrument_node="">30</span></a><span data-dcnode-id="1614" instrument_node=""> and a meta-analysis provided no evidence of an association.</span><a class="superscript bibrRef" data-dcnode-id="1612" href="#afp20061215p2069-b31"><span data-dcnode-id="1613" instrument_node="">31</span></a><span data-dcnode-id="1611" instrument_node=""> Studies also have shown that there is no measurable association between vasectomy and testicular cancer.</span><a class="superscript bibrRef" data-dcnode-id="1609" href="#afp20061215p2069-b32"><span data-dcnode-id="1610" instrument_node="">32</span></a><span class="superscript" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1605" href="#afp20061215p2069-b33"><span data-dcnode-id="1606" instrument_node="">33</span></a></p></div></div></div><div data-dcnode-id="1561" id="gradientContainer" style="display:none;" xmlns:xlink="http://www.w3.org/1999/xlink"><div class="afpblue" data-dcnode-id="1566"><div data-dcnode-id="1567" id="spopup" style="display: none; position: relative;"><center data-dcnode-id="1595"><p data-dcnode-id="1596"><b data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Read the full article.</span></b></p></center><div class="spopuplist" data-dcnode-id="1587"><ul data-dcnode-id="1588"><li data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Get immediate access, anytime, anywhere.</span></li><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Choose a single article, issue, or full-access subscription.</span></li><li data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Earn up to 6 CME credits per issue.</span></li></ul></div><center data-dcnode-id="1568"><table data-dcnode-id="1569"><tbody data-dcnode-id="1570"><tr data-dcnode-id="1571"><td data-dcnode-id="1581" style="text-align:center !important;margin:0 auto; padding:0; float:none;"><div class="spopupbottom1" data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Already a member/subscriber?</span></div><br data-dcnode-id="1584"><a class="button simple loginLink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/cgi-bin/lg.pl%3Fredirect%3Dhttps%3A//www.aafp.org/afp/2006/1215/p2069.html" style="margin-top:-15px;"><span data-dcnode-id="1583" instrument_node="">
