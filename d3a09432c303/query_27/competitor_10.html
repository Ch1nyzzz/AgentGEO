u" data-dcnode-id="1369"><div class="sc-gIDmLj kftbHX sticky-js procedure-details__menu" data-dcnode-id="1370" data-margin-top="128" data-sticky-class=""><ul class="ant-menu ant-menu-light sc-lkgTHX kqPHSM sc-jlRLRk kHUA-ds scrollspy-menu ant-menu-root ant-menu-vertical" data-dcnode-id="1371" role="menu"><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1392" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">What is a Vasectomy?</span></p></li><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1389" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">What Can You Expect During a Vasectomy?</span></p></li><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1386" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">What Can You Expect During Recovery?</span></p></li><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1383" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">How Does Vasectomy Compare to Other Forms of Birth Control?</span></p></li><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1380" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Does Vasectomy Have Side Effects?</span></p></li><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1377" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Can Vasectomy be Reversed?</span></p></li><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1375" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1376"></p></li><li class="ant-menu-item ant-menu-item-only-child" data-dcnode-id="1372" role="menuitem"><p class="sc-cTAqQK fMhoTY" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">MDsave Customer Reviews</span></p></li></ul></div></div><div class="sc-furwcr sc-fFeiMQ cgjzdI dtFjpf" data-dcnode-id="1368" display="inline-block"></div><div data-dcnode-id="983"><div data-dcnode-id="1338" id="what-is-a-vasectomy"><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">What is a Vasectomy?</span></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1365" display="block"></div><div class="procedure-details__section" data-dcnode-id="1340"><p data-dcnode-id="1361" dir="ltr"><span data-dcnode-id="1364" instrument_node="">A vasectomy is a minor surgical procedure that helps prevent pregnancy by blocking or cutting off ducts that carry sperm, tubes called the vas deferens. This form of male sterilization is over 99% effective at preventing pregnancy. The procedure is simple and quick enough that vasectomies can be performed in a doctor’s office, hospital, or a health care clinic. Patients can usually return home right after their procedure, which often lasts about 20 minutes.</span><sup data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">1</span></sup></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" dir="ltr"><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Scalpel Vasectomy</span></em></span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1351" dir="ltr"><span data-dcnode-id="1354" instrument_node="">A scalpel vasectomy is performed via one or two small incisions in the scrotum. The vas deferens is cut and a segment may be removed before the ends are sealed. These steps are then repeated on the other vas.</span><sup data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">2</span></sup></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" dir="ltr"><em data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">No-Scalpel Vasectomy</span></em></span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1341" dir="ltr"><span data-dcnode-id="1344" instrument_node="">A no-scalpel vasectomy procedure is performed through a tiny hole made in the skin, only large enough for the vas to be lifted through. The rest of the procedure typically continues as in a scalpel vasectomy.</span><sup data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">3</span></sup></p></div><div class="sc-furwcr sc-fFeiMQ latxaW fODyaL" data-dcnode-id="1339" display="block"></div></div><div data-dcnode-id="1317" id="what-can-you-expect-during-a-vasectomy"><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">What Can You Expect During a Vasectomy?</span></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1335" display="block"></div><div class="procedure-details__section" data-dcnode-id="1319"><ul data-dcnode-id="1320"><li data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Most patients can return home the same day, often immediately after the procedure is complete.</span></li><span data-dcnode-id="1332" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Before your procedure, your doctor will discuss the vasectomy with you and make sure you understand it is meant to be permanent.</span></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">A local anesthetic is administered to numb the area via a small needle.</span></li><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1322"><span data-dcnode-id="1325" instrument_node="">After the procedure, the incision may be closed with stitches or surgical glue.</span><sup data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">4,5</span></sup></li><span data-dcnode-id="1321" instrument_node="">
</span></ul></div><div class="sc-furwcr sc-fFeiMQ latxaW fODyaL" data-dcnode-id="1318" display="block"></div></div><div data-dcnode-id="1297" id="what-can-you-expect-during-recovery"><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">What Can You Expect During Recovery?</span></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1314" display="block"></div><div class="procedure-details__section" data-dcnode-id="1299"><ul data-dcnode-id="1300"><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">You can expect some bruising, swelling, and discomfort that should subside within a few days.</span></li><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Be prepared to limit activity while you recover, and follow all of your doctor’s instructions about when you can return to your normal routine.</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1302"><span data-dcnode-id="1307" instrument_node="">Be aware that vasectomy is not immediately effective at preventing pregnancy. Use a secondary form of birth control until your doctor can confirm the absence of sperm in your semen.</span><sup data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">6</span></sup><sup data-dcnode-id="1303"><br data-dcnode-id="1304"></sup></li><span data-dcnode-id="1301" instrument_node="">
</span></ul></div><div class="sc-furwcr sc-fFeiMQ latxaW fODyaL" data-dcnode-id="1298" display="block"></div></div><div data-dcnode-id="1282" id="how-does-vasectomy-compare-to-other-forms-of-birth-control"><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">How Does Vasectomy Compare to Other Forms of Birth Control?</span></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1294" display="block"></div><div class="procedure-details__section" data-dcnode-id="1284"><p data-dcnode-id="1290" dir="ltr"><span data-dcnode-id="1293" instrument_node="">Vasectomy is one of the most reliable methods of birth control, and is nearly 100% successful at preventing pregnancy. It is a low-risk outpatient procedure, and much much less expensive than surgical female sterilization, called tubal ligation. Vasectomy is also less expensive than long-term birth control medications for women, like birth control pills.</span><sup data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">7</span></sup></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1285" dir="ltr"><span data-dcnode-id="1288" instrument_node="">Most health insurance plans cover some form of birth control, but it varies by insurance company if they cover vasectomy.</span><sup data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">8</span></sup></p></div><div class="sc-furwcr sc-fFeiMQ latxaW fODyaL" data-dcnode-id="1283" display="block"></div></div><div data-dcnode-id="1252" id="does-vasectomy-have-side-effects"><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Does Vasectomy Have Side Effects?</span></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1279" display="block"></div><div class="procedure-details__section" data-dcnode-id="1254"><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Serious side effects are rare, but as with any surgical procedure, there are some minor but uncommon risks associated with vasectomy:</span></p><span data-dcnode-id="1276" instrument_node="">
</span><ul data-dcnode-id="1255"><li data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Bleeding or bruising near the surgical site</span></li><span data-dcnode-id="1273" instrument_node="">
</span><li data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Infection at the incision</span></li><span data-dcnode-id="1270" instrument_node="">
</span><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Mild pain, swelling, or discomfort in the area</span></li><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Testicular fluid build-up</span></li><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Inflammation</span></li><span data-dcnode-id="1261" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1260" instrument_node="">Rarely, pregnancy if the procedure fails</span><sup data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">9</span></sup></li><span data-dcnode-id="1256" instrument_node="">
</span></ul></div><div class="sc-furwcr sc-fFeiMQ latxaW fODyaL" data-dcnode-id="1253" display="block"></div></div><div data-dcnode-id="1233" id="can-vasectomy-be-reversed"><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Can Vasectomy be Reversed?</span></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1249" display="block"></div><div class="procedure-details__section" data-dcnode-id="1235"><ul data-dcnode-id="1236"><li data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Vasectomy does not affect sexual performance or sex drive.</span></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Risk to other reproductive organs is very low.</span></li><span data-dcnode-id="1243" instrument_node="">
</span><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">There is no proven link between vasectomy and testicular cancer or heart disease.</span></li><span data-dcnode-id="1240" instrument_node="">
</span><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">During the procedure, you may feel some discomfort or “tugging” sensations, but this should not be painful. During recovery, pain should be gone after a few days.</span></li><span data-dcnode-id="1237" instrument_node="">
</span></ul></div><div class="sc-furwcr sc-fFeiMQ latxaW fODyaL" data-dcnode-id="1234" display="block"></div></div><div data-dcnode-id="1211" id=""><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1232"></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1231" display="block"></div><div class="procedure-details__section" data-dcnode-id="1213"><p data-dcnode-id="1227"><span data-dcnode-id="1230" instrument_node="">Vasectomy should be considered permanent. Vasectomy reversals are more complicated and expensive, and there is a chance that the reversal procedure will not be able to restore fertility. </span><sup data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">11</span></sup></p><span data-dcnode-id="1226" instrument_node="">
</span><p class="mds-txt--xs" data-dcnode-id="1214"><sup data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">1, 4, 8</span></sup><span data-dcnode-id="1223" instrument_node="">Planned Parenthood. Vasectomy. https://www.plannedparenthood.org/learn/birth-control/vasectomy</span><br data-dcnode-id="1222"><sup data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">2,3&nbsp;</span></sup><span data-dcnode-id="1219" instrument_node="">American Urological Association. What Happens during a Vasectomy? https://www.urologyhealth.org/urologic-conditions/vasectomy/treatment </span><br data-dcnode-id="1218"><sup data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">3, 5, 6, 7, 9, 10&nbsp;</span></sup><span data-dcnode-id="1215" instrument_node="">Mayo Clinic. Vasectomy. https://www.mayoclinic.org/tests-procedures/vasectomy/about/pac-20384580</span></p></div><div class="sc-furwcr sc-fFeiMQ latxaW fODyaL" data-dcnode-id="1212" display="block"></div></div><div data-dcnode-id="984" id="mdsave-customer-reviews"><h2 align="left" class="ant-typography ant-typography-subheading2 sc-kDTinF fHzHRh" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">MDsave Customer Reviews</span></h2><div class="sc-pVTFL sc-jrQzAO bcUiEr ePDfwG" data-dcnode-id="1208" display="block"></div><div class="ant-row ant-row-start ant-row-top sc-hKwDye hWshXD" data-dcnode-id="1180"><span class="ant-typography sc-cTAqQK sc-XxNYO bDTbhG kddAeL" color="#f7c629" data-dcnode-id="1206" font-family="'Avenir-Heavy', 'Helvetica Neue', Helvetica, Arial, sans-serif"><span data-dcnode-id="1207" instrument_node="">4.8</span></span><div class="sc-dkYRCH lpeEeC" data-dcnode-id="1185"><div class="sc-fHeRUh favKil" data-dcnode-id="1202"><span class="sc-bdvvtL gMzIcq sc-evcjhq jcjRxo" data-dcnode-id="1203"><svg class="" data-dcnode-id="1204" height="16px" style="display: inline-block; vertical-align: middle;" viewBox="0 0 1024 1024" width="16px" xmlns="http://www.w3.org/
