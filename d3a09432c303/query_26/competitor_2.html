</span><section class="pad-section clear" data-dcnode-id="560" id="first-section" style="background: url(https://www.vasectomyclinics.com/wp-content/uploads/2016/12/first-bg.png) no-repeat;background-position:left top;background-size:contain;"><span data-dcnode-id="588" instrument_node="">
</span><div class="row" data-dcnode-id="562"><span data-dcnode-id="587" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="564"><span data-dcnode-id="586" instrument_node="">
</span><div class="col-lg-5 col-lg-offset-5 col-md-5 col-md-offset-6 col-sm-6 col-sm-offset-6 col-xs-12" data-dcnode-id="566"><span data-dcnode-id="585" instrument_node="">
</span><h2 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">What is a Vasectomy? Is it the right form of birth control for you?</span></h2><span data-dcnode-id="582" instrument_node="">
</span><h3 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">If you’re absolutely sure you don’t want any more children, vasectomy is right for you.</span></h3><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Vasectomy is a minor surgical procedure that makes a man permanently unable to father a child by keeping the sperm out of semen. Sperm are made in the testicles, and they pass through two small tubes called the vas deferens to other glands, which mixes with seminal fluids to form semen. Vasectomy blocks each vas deferens and keeps sperm out of the seminal fluid.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">The procedure involves dividing and sealing the vas deferens so that your semen will not contain sperm, and when you ejaculate during sexual intercourse, you’ll be unable to get a woman pregnant. For your convenience and comfort, this procedure is performed in a private office within a relaxing environment instead of the hospital or surgical center.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">About 50 million men worldwide have had a vasectomy, and approximately 500,000 men in the United States undergo the procedure each year. More American married couples rely on vasectomy for family planning than on any other method except female sterilization (tubal ligation) and birth control pills (oral contraceptives).</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Although legally you may not be required to have the consent of your wife or partner, vasectomy (or any contraceptive choice) should be best decided as a couple. This is one decision that you may not want to make on your own, and better yet, your partner can come to the consultation visit with you so that you can both ask questions.</span></p><span data-dcnode-id="567" instrument_node="">
</span></div><span data-dcnode-id="565" instrument_node="">
</span></div><span data-dcnode-id="563" instrument_node="">
</span></div><span data-dcnode-id="561" instrument_node="">
</span></section><span data-dcnode-id="559" instrument_node="">
</span><section class="clear" data-dcnode-id="525" id="second-section"><span data-dcnode-id="558" instrument_node="">
</span><div class="row" data-dcnode-id="527"><span data-dcnode-id="557" instrument_node="">
</span><div class="height1 col-lg-3 col-lg-offset-2 col-md-4 col-md-offset-1 col-sm-6 col-xs-12" data-dcnode-id="531"><span data-dcnode-id="556" instrument_node="">
</span><div class="pad-section" data-dcnode-id="533"><span data-dcnode-id="555" instrument_node="">
</span><h2 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Why have a Vasectomy?</span></h2><span data-dcnode-id="552" instrument_node="">
</span><ul data-dcnode-id="535"><span data-dcnode-id="551" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">You would like to enjoy sex without worrying about pregnancy every time</span></li><span data-dcnode-id="548" instrument_node="">

</span><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">You want to save your partner from the surgery involved in having her tubes tied.</span></li><span data-dcnode-id="536" instrument_node="">

</span><section class="pad-section clear" data-dcnode-id="378" id="testimonials"><span data-dcnode-id="479" instrument_node="">
</span><div class="row" data-dcnode-id="380"><span data-dcnode-id="478" instrument_node="">
</span><div class="col-md-8 col-md-offset-2 col-sm-10 col-sm-offset-1 col-xs-12" data-dcnode-id="382" id="testimonial-carousel"><span data-dcnode-id="477" instrument_node="">
</span><div class="quote-container" data-dcnode-id="475"><i class="fa fa-quote-left" data-dcnode-id="476"></i></div><span data-dcnode-id="474" instrument_node="">
</span><div class="owl-carousel" data-dcnode-id="392"><span data-dcnode-id="473" instrument_node="">
</span><div class="item" data-dcnode-id="463"><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">I was extremely nervous during the entire consultation, so I figured the same would hold true with the actual procedure. Not the case at all. Dr. Pete and his staff are amazing. They make you feel comfortable, they explain everything, and before you know it, your done. I can’t recommend Dr. Pete and the clinic enough! Well done!</span></p><span data-dcnode-id="469" instrument_node="">
</span><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">
</span><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Matthew N. – Downers Grove, IL</span></strong><span data-dcnode-id="464" instrument_node="">
</span></div><span data-dcnode-id="462" instrument_node="">
</span><div class="item" data-dcnode-id="452"><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">The procedure was everything I was told it was: fast and pain-free. I have friends that have gone through more traditional procedures, and some had real horror stories. When an office coworker told me about this procedure, and came back to work the same day he had it done, I was convinced. Guys in the office couldn’t believe that I too was back to work the next day. The only thing that kept me coming from in that same day was the snow.</span></p><span data-dcnode-id="458" instrument_node="">
</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
</span><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">John H. – Naperville, IL</span></strong><span data-dcnode-id="453" instrument_node="">
</span></div><span data-dcnode-id="451" instrument_node="">
</span><div class="item" data-dcnode-id="441"><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">THE BEST IN THE MIDWEST! NO PAIN AND GREAT RESULTS, THANK YOU DOC.</span></p><span data-dcnode-id="447" instrument_node="">
</span><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">
</span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Pete Z.-Chicago, IL</span></strong><span data-dcnode-id="442" instrument_node="">
</span></div><span data-dcnode-id="440" instrument_node="">
</span><div class="item" data-dcnode-id="430"><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Wow, I had my procedure done a week ago. I walked out and my wife thought something was wrong. She was surprised to hear that it was over in 20 minutes. No pain. I have to schedule my next dentist appointment this week, I am not looking forward to that. If I could I would rather have a second vasectomy than go to the dentist.</span></p><span data-dcnode-id="436" instrument_node="">
</span><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">
</span><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Shane S. – Frankfort, IL</span></strong><span data-dcnode-id="431" instrument_node="">
</span></div><span data-dcnode-id="429" instrument_node="">
</span><div class="item" data-dcnode-id="419"><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">I just had it done yesterday and wow! No problem! I got home, drank a few with the neighbors, cut my lawn, went to bed and woke up no pain, nothing. I finished working in the yard, and still no pain. I bought some Tylenol just in case, and the bottle still has the seal on it. Dr, Mostowfi is a great guy; he’ll talk to you and answer your questions – he’s just a regular kinda guy! I thought the worst, but I have gotten tattoos that have given me more grief! Thanks, doc! You’re great, and I am going to let all my pals know about you.</span></p><span data-dcnode-id="425" instrument_node="">
</span><br data-dcnode-id="424"><span data-dcnode-id="423" instrument_node="">
</span><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Bill – Oak Forest, IL</span></strong><span data-dcnode-id="420" instrument_node="">
</span></div><span data-dcnode-id="418" instrument_node="">
</span><div class="item" data-dcnode-id="405"><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Dr. Mostowfi, when I asked you if it would be alright for me to play hockey, a few hours after my procedure, I really did not expect you to say yes!! Well I did play, and without any discomfort or pain. I also would like to thank you and your staff for making me feel very comfortable and relaxed.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">I can and will recommend Vasectomy Clinics of Chicago to anyone who is thinking of having this procedure done. It was painless, fast, and professional!! Kudos to all.</span></p><span data-dcnode-id="411" instrument_node="">
</span><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">
</span><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">M.J. – Munster, IN</span></strong><span data-dcnode-id="406" instrument_node="">
</span></div><span data-dcnode-id="404" instrument_node="">
</span><div class="item" data-dcnode-id="394"><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Dr. Mostowfi, Thank you so much for a wonderful experience! I’m a professional athlete and could have went to practice right after the procedure that’s how amazing and painless this procedure is! Dr. Mostowfi is the Best!!</span></p><span data-dcnode-id="400" instrument_node="">
</span><br data-dcnode-id="399"><span data-dcnode-id="398" instrument_node="">
</span><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Steve – Chicago, IL</span></strong><span data-dcnode-id="395" instrument_node="">
</span></div><span data-dcnode-id="393" instrument_node="">
