</span><p data-dcnode-id="329"><span data-dcnode-id="336" instrument_node="">World-class vasectomy care available for Brisbane men. </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.queenslandvasectomy.com.au/about-us/"><span data-dcnode-id="335" instrument_node="">Dr Sheehan</span></a><span data-dcnode-id="333" instrument_node=""> at Queensland Vasectomy, Brisbane, is available Monday to Friday. </span><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Dr Sheehan is a born and raised Brisbane doctor who exclusively performs vasectomies.</span></strong><span data-dcnode-id="330" instrument_node=""> Many Brisbane doctors only offer vasectomies once a week or once a fortnight, Dr Sheehan offers them every day of the week as well as the first Saturday of each month.</span></p><span data-dcnode-id="328" instrument_node="">
</span><h2 data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Modern No Scalpel Open-ended Vasectomy Technique</span></h2><span data-dcnode-id="325" instrument_node="">

</span><li data-dcnode-id="321"><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.queenslandvasectomy.com.au/surgical-options/"><span data-dcnode-id="323" instrument_node="">No general anaesthetic</span></a></li><span data-dcnode-id="320" instrument_node="">
</span><li data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Faster and safer</span></li><span data-dcnode-id="317" instrument_node="">

</span><h2 data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">More affordable vasectomies for Brisbane men</span></h2><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="291" instrument_node="">Dr Sheehan and Queensland Vasectomy don’t believe that finances should be a barrier to one of the safest and most reliable forms of contraception for men.</span><br data-dcnode-id="290"><span data-dcnode-id="289" instrument_node="">
Medicare rebate processed on the spot when you pay making your total out of pocket expenses only $350. &nbsp;It may take a day or two for the rebate to appear in your bank account.</span><br data-dcnode-id="288"><span data-dcnode-id="287" instrument_node="">
Other clinics charge you up to $100 booking fee; we charge NO booking fee.</span><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node="">
Faster recovery and less down time so you’re back on your feet quicker. Less time off work. Have your vasectomy on a Friday then back to work as normal on Monday. Many Brisbane vasectomy clinics require you to have your compulsory pre op counselling on a separate day to your procedure, which means more time off work to attend two separate appointments.</span></p><span data-dcnode-id="283" instrument_node="">

</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Vasectomies available daily Monday to Friday, and the first Saturday of each month.</span></p><span data-dcnode-id="277" instrument_node="">
