</span><p data-dcnode-id="1018"><span data-dcnode-id="1024" instrument_node="">Though there may be an out of pocket expense with vasectomy, over the long term it is a </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/faqs/condoms-vs-vasectomy/" rel="noopener" target="_blank"><span data-dcnode-id="1023" instrument_node="">very cost-effective</span></a><span data-dcnode-id="1021" instrument_node=""> form of contraception with a much higher degree of efficacy than condoms or </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/faqs/vasectomy-vs-tubal-ligation/" rel="noopener" target="_blank"><span data-dcnode-id="1020" instrument_node="">other contraceptive methods.</span></a></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The cost of your vasectomy includes:</span></p><span data-dcnode-id="1014" instrument_node="">
</span><ul data-dcnode-id="1003"><span data-dcnode-id="1013" instrument_node="">
</span><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">access to counselling services</span></li><span data-dcnode-id="1010" instrument_node="">
</span><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">access to 24 hour nurse-led telephone aftercare</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">interpreters.</span></li><span data-dcnode-id="1004" instrument_node="">

</span><p data-dcnode-id="493"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Request for information</span></strong></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="491" instrument_node="">To request access to health records, please complete the </span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.mariestopes.org.au/application-for-release-of-information.pdf" target="new"><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Release of Information and Authorisation Form</span></strong></a><span data-dcnode-id="487" instrument_node=""> and email it to </span><a data-dcnode-id="485" href="mailto:ISTP@mariestopes.org.au"><span data-dcnode-id="486" instrument_node="">istp@mariestopes.org.au</span></a><span data-dcnode-id="484" instrument_node=""> </span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Please be aware that there is a processing fee. This fee is outlined in the form. The information will be sent to you via email, once payment has been received. There are some instances where the application fee will be waived, such as if you have a Healthcare card or a concession card. You will receive communications acknowledging your request and what the cost of processing will be.  </span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Once we have received your valid request, we will send your records within 28 days. If we require further information we will contact you to obtain more information. This could add to the waiting period.</span></p><span data-dcnode-id="476" instrument_node="">
