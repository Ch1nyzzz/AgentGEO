</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Gentle Procedures Dallas is committed to providing an affordable, quality vasectomy surgery. We offer&nbsp;the no-scalpel, no-needle, open-ended vasectomy procedure to all our patients.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Dr. McAuliff tries to keep his fees low so the procedure can be affordable to everyone. Dr. McAuliff offers you “concierge” type care. You will be given his personal cell phone number at the end of the surgery and you will be able to text or call him personally with any post-operative concerns or questions. The office tries to give personalized service by giving you as much time as it takes to answer your questions.   We will work with you to provide you with the tailored services you need. Instead of requiring two visits to the office as many physicians require—one visit for the surgery consultation and a second visit for the surgery—Dr. McAuliff tries to be respectful of your time by offering only one visit to the office, making it more convenient for you.</span></p><span data-dcnode-id="738" instrument_node="">

</span><h2 data-dcnode-id="623" data-fontsize="28" data-lineheight="27" style="margin-top: 38px; font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="624" instrument_node="">No-Needle Anesthesia is Always Included</span></h2><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Dr. McAuliff employs the no-needle anesthesia, no-scalpel procedure for all vasectomies.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Nobody likes a needle in the scrotum, so no-needle anesthesia is pretty much universally preferred.  You can see below how the air-jet anesthetic application reduces trauma relative to use of a needle.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><img alt="dallas clinic vasectomy insurance cost " class="aligncenter wp-image-2367 size-full" data-dcnode-id="615" height="434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drtim.wpengine.com/wp-content/uploads/2016/12/Illustration_Vasectomy.gif&amp;raw" width="720"></p><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="611" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="612" instrument_node="">Vasectomy Fees &amp; Paying For Your Vasectomy</span></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">When you schedule your procedure, there is a $100.00 non-refundable scheduling fee to book the appointment, which is applied to the cost of the surgery on the day of the procedure. The remaining $485 is due the day you have the vasectomy done.  </span><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Please understand that the $100 booking fee is non-refundable under any circumstances</span></strong><span data-dcnode-id="606" instrument_node="">.</span></p><span data-dcnode-id="604" instrument_node="">
</span><h2 data-dcnode-id="602" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="603" instrument_node="">Paying for Your Vasectomy</span></h2><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">The cash price for a vasectomy is $585. That includes your initial consultation with the doctor, the procedure, and any post-surgery support during the healing process.</span></p><span data-dcnode-id="598" instrument_node="">
</span><h3 data-dcnode-id="596" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="597" instrument_node="">More Efficient Process</span></h3><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">The staff at Gentle Procedures Dallas work together like a well-oiled machine. The clinic staff are conscious of getting you in right on time, no waiting. The process is orchestrated from start to finish to make it as easy as possible on you. If you wish, Dr. McAuliff can prescribe a mild sedative for you to take prior to the procedure to calm your nerves.  If you do take this medication, you will need to have a driver with you.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Upon leaving, you will receive a post-procedure packet that has all the answers to the questions you didn’t think to ask, such as expected bruising, healing time, when you can go back to performing given tasks, what to look out for, and when to call.</span></p><span data-dcnode-id="589" instrument_node="">
</span><h3 data-dcnode-id="587" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="588" instrument_node="">Cancellation Policy</span></h3><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="582"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">The $100 fee to book your appointment is non-refundable under any circumstances.</span></strong><span data-dcnode-id="583" instrument_node=""> We have this policy for a couple of reasons.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">We have this policy to help you to follow through on your decision for a vasectomy.  Many men have vivid imaginations of what the procedure will entail and might even back out of their appointment except that the non-refundable $100 scheduling fee keeps them accountable to their appointment.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><img alt="vasectomy cost - how much in Texas - DFW?" class="wp-image-2461 size-medium alignleft" data-dcnode-id="577" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drtim.wpengine.com/wp-content/uploads/2016/12/couple-1030744_1280-300x200.jpg&amp;raw" srcset="https://gentleproceduresdallas.com/wp-content/uploads/2016/12/couple-1030744_1280-300x200.jpg 300w, https://gentleproceduresdallas.com/wp-content/uploads/2016/12/couple-1030744_1280-768x512.jpg 768w, https://gentleproceduresdallas.com/wp-content/uploads/2016/12/couple-1030744_1280-1024x682.jpg 1024w, https://drtim.wpengine.com/wp-content/uploads/2016/12/couple-1030744_1280-300x200.jpg 1280w" style="padding-bottom: 10px;" width="300"></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">We also employ this policy out of consideration for other clients who might have wished to schedule in the time slot that had your name on it, but they couldn’t do so because it was held for you.  If you back out, they didn’t have the chance to choose that date and time.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="571" instrument_node="">When you book your appointment and pay the $100, think of it as purchasing a surgery time slot that no one else can have.  If you cancel, you give up your $100.</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
If you cancel and reschedule 7 calendar days or more before the date of your appointment, the $100 booking fee that you paid can be applied to reserving the new appointment and will roll into the cost of the procedure.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">If you decide to cancel 6 calendar days or less before the date of your appointment, even if you wish to reschedule, the $100 scheduling fee will not apply to the cost of the new scheduling fee for the new appointment because of the late date of your cancellation.  In this case, you will need to pay another $100 scheduling fee if you wish to book a new appointment time.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Any time that you cancel and don’t reschedule or that you decide to be a no-show, you forfeit the $100 fee you paid for the appointment time.  This policy is in place to encourage you to be certain that you are serious about scheduling an appointment for the procedure.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="560" instrument_node="">Please call us at&nbsp;</span><a class="number" data-dcnode-id="558" href="tel:469-931-0684"><span data-dcnode-id="559" instrument_node="">469-931-0684</span></a><span data-dcnode-id="557" instrument_node="">&nbsp;to confirm your appointment for a no-needle, no-scalpel vasectomy.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">We are available by phone during regular clinic hours, 9-5, Monday through Friday, and this is the best way to reach us for quick questions and appointments.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">We offer the&nbsp;option of either a single visit for consultation and procedure, or you can choose to have separate appointments for the initial consult and the vasectomy surgery.</span></p><span data-dcnode-id="549" instrument_node="">

</span></div><span data-dcnode-id="443" instrument_node="">
</span></div><div class="fusion-additional-widget-content" data-dcnode-id="441"></div></div><div class="fusion-clearfix" data-dcnode-id="439"></div></div></div><div class="fusion-clearfix" data-dcnode-id="436"></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-fullwidth-3 fusion-parallax-none nonhundred-percent-fullwidth" data-dcnode-id="378" style="border-color:#eae9e9;border-bottom-width: 0px;border-top-width: 0px;border-bottom-style: solid;border-top-style: solid;padding-bottom:20px;padding-top:0px;padding-left:;padding-right:;"><div class="fusion-row" data-dcnode-id="379"><h2 data-dcnode-id="430" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="431" instrument_node="">Can I Use My Insurance</span></h2><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">We no longer take insurance for any of our procedures because we have found that most insurance plans will not cover the cost.  In addition, we want to be respectful of your time and most insurance plans will not allow us to do that—they will require that you make an appointment on two different days—one day for a pre-surgery consultation and a second day for the surgery.  If we don’t accept insurance, we are able to offer you the opportunity for the consultation and surgery to be accomplished at the same visit.  By not taking insurance, we can offer you the convenience of taking off from work for only one day.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="425" instrument_node="">Even though we do not take insurance, if you wish, we can file a claim for your vasectomy as an out-of-network provider as long has you have a PPO policy with a commercial insurance carrier. Here’s how it works: We collect the $585 cash price from you ($100 to book the time slot and $485 balance on the day of the surgery). We file your claim for you. We will file the claim and then after that you will be able to deal directly with your insurance company.  If your plan reimburses the procedure, that </span><u data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">reimbursement will come directly to you</span></u><span data-dcnode-id="422" instrument_node="">.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Any insurance reimbursement for the procedure will come directly to you.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">We deliberately keep our price low and charge only $585.  Even though we are out-of-network, we only charge you $585.  That is the max you will pay.  If you want the best service and the most comfortable procedure possible, it’s a price worth paying.  If you’re thinking, “But I want to use my insurance”, you may find there is no advantage to using your insurance.  You may find that your out-of-pocket cost is the same as our cost.  Your insurance carrier might determine that your portion of the responsibility, with copay and deductible, would be the same as our $585 cash price.  If you want the convenience of a single visit to have the procedure done by the no-scalpel, no needle method, done by a physician who specializes in vasectomies, it’s a price worth paying.</span></p><span data-dcnode-id="414" instrument_node="">
</span><h3 data-dcnode-id="412" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="413" instrument_node="">Why Don’t We Accept Health Insurance?</span></h3><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Health insurance companies consistently provide inaccurate information regarding an individual’s coverage for a procedure and how much a patient may owe. After the procedure has been completed, it is not unusual for health insurance companies to inform us that the information they provided during pre-verification was inaccurate; for example, they will say a person is fully covered and give us a specific amount he has to pay. Several weeks after the procedure, the insurance company will then tell us they made a mistake, the procedure was not covered and the patient needs to pay more.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Our office is then put in the awkward position of having to contact the patient and ask for more money. Often these calls are not well received. We are usually placed in the middle and the health insurance companies try to distance themselves from the problem they caused because their staff provided inaccurate information. When we send the patient a statement, because the surgery is a “one-and-done” procedure and  we never see the patient again, the patients often simply ignore the statements we send.  Our office is then required to take the loss…even though we had nothing to do with the confusion.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">We consistently have good reviews from patients. When we do have dissatisfied patients, it is because their health insurance company has provided inaccurate information. These patients often unfairly blame our office for the mistakes or delays by their health insurance company.</span></p><span data-dcnode-id="402" instrument_node="">
</span><h3 data-dcnode-id="400" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="401" instrument_node="">If You Want To Use Your Health Insurance</span></h3><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">If you still think you want to use your health insurance then consider these 2 options:</span></p><span data-dcnode-id="396" instrument_node="">
</span><ul data-dcnode-id="388"><span data-dcnode-id="395" instrument_node="">
</span><li data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Option #1.  Go to another vasectomy provider. You will probably have two visits, one for the pre-surgery consultation and one for the procedure; you may wait 1 to 4 weeks before each visit. You may have an office co-pay for each visit. You may be required to attend a group counseling session before the surgery. You may find your plan does not have vasectomy coverage or you may have coverage but a high deductible.   Your health insurance  company may decide it will not pay and you will then have had 2 visits but you still end up paying the full amount plus you may be charged more for your vasectomy procedure because the average charge for a vasectomy  in the DFW area is $1,200 and even higher throughout most of Texas.</span></li><span data-dcnode-id="392" instrument_node="">
</span><li data-dcnode-id="390" style="padding-top: 20px;"><span data-dcnode-id="391" instrument_node="">Or there is Option #2.  Have your vasectomy done with Dr. McAuliff. You will have a great vasectomy done in a single visit with a skilled provider offering the most minimally invasive and the most comfortable vasectomy procedure possible, using only a half hour of your time. We can file your claim for you as an out-of-network provider and if your plan reimburses the procedure, any reimbursement will come directly to you.</span></li><span data-dcnode-id="389" instrument_node="">
</span></ul><span data-dcnode-id="387" instrument_node="">
</span><p class="bluecta" data-dcnode-id="381" style="text-align: center; background: #56a0b8; margin: 20px 0 10px 0;"><span data-dcnode-id="386" instrument_node="">Call Us to Book!</span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node="">
</span><a class="number" data-dcnode-id="382" href="tel:4699310684" style="color: #ffffff;"><span data-dcnode-id="383" instrument_node="">469-931-0684</span></a></p><span data-dcnode-id="380" instrument_node="">

</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Dr. McAuliff focuses on performing only a few out-patient surgical procedures.  This means you’re getting a physician who is well-experienced in doing vasectomies.   A doctor who practices doing a procedure over and over often experiences better outcomes than a doctor who does a vasectomy only occasionally while having much of his time devoted to a wide spectrum of other procedures.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><img alt="does insurance pay for vasectomy?" class="alignleft wp-image-2977 size-medium" data-dcnode-id="277" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drtim.wpengine.com/wp-content/uploads/2017/06/open-ended1-300x200.jpg&amp;raw" srcset="https://gentleproceduresdallas.com/wp-content/uploads/2017/06/open-ended1-300x200.jpg 300w, //drtim.wpengine.com/wp-content/uploads/2017/06/open-ended1-300x200.jpg 450w" width="300"></p><span data-dcnode-id="275" instrument_node="">
</span><h3 data-dcnode-id="273" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="274" instrument_node="">Greater concern for your well-being</span></h3><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Your comfort is our greatest concern at Gentle Procedures Dallas.  We know that our patients are nervous when they come in but we try to alleviate that.  You will be awake during the procedure but our goal is that you feel no pain.  The doctor starts with a numbing spray, followed by an anesthetic which some men describe as a “pinching” feeling but very minor, then you won’t feel anything during the rest of the procedure.  During the procedure, Dr. McAuliff enjoys conversing with his patients.  He likes to use this time to get to know his patients, what they do, and where they’re from.  As he works, Dr. McAuliff will provide a lot of general advice for best healing.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">It’s our goal to hold your hand during the entire process, so you will be at ease and well-informed.  This is the measure of care that you will receive from our entire staff.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="265" instrument_node="">Does that sound like the kind of service you want to receive for only $585?  For the top-level service you deserve, give us a call </span><a data-dcnode-id="263" href="tel:4699310684"><span data-dcnode-id="264" instrument_node="">469-931-0684</span></a><span data-dcnode-id="262" instrument_node="">.</span></p><span data-dcnode-id="260" instrument_node="">
