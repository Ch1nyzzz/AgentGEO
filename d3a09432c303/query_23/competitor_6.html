</span><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">You may regret your decision one day if it is taken prematurely. Younger men, especially those in their 20s with fewer than 2 children, are most likely to seek a reversal in the future, often citing that they thought it was the right decision at the time only to be disappointed when their reversal procedure was unsuccessful.</span></p><p data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Men change. Many men are totally convinced that they do not want kids. In our experience, some men develop a different attitude about having kids as they get older and their life situation changes.</span></p><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Women also change. Some women who do not want children change their minds as they grow older. Some who have had bad reactions to pregnancy feel they would never want to go through another pregnancy only to change their minds after a few years.</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Relationships can end. Despite how stable our relationships may seem, there is a chance that in a few years, you may be with a different partner who may have a strong desire to have kids.</span></p><span data-dcnode-id="2019" instrument_node=""> </span></div><span data-dcnode-id="2017" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vasectomie-montreal.ca/en"><span data-dcnode-id="2000" instrument_node="">Do I Think That I Might Want to Have More Children?​</span></a><span data-dcnode-id="1998" instrument_node="">
</span></h3><span data-dcnode-id="1996" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1801" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1990" data-tab="1" id="elementor-tab-content-1801" role="tabpanel"><span data-dcnode-id="1995" instrument_node="">If there is a possibility that you might want additional children in the future you should not have a vasectomy. Your vasectomy will definitively prevent you from conceiving a child and should be considered a permanent form of male birth control.</span><p data-dcnode-id="1994"></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991" style="color: #c4bfb6;"><span data-dcnode-id="1992" instrument_node="">Vasectomy reversal surgery is not a fully effective way to restore male fertility, and no one should use surgery to temporarily suppress fertility. A vasectomy reversal may be possible but the results are not certain. A vasectomy is recommended only for men who are certain they will not want to conceive a baby.</span></p></div><span data-dcnode-id="1989" instrument_node="">

The main ones are to do with any pre-existing issues affecting your scrotum (hernia in that area, scarring) and your general ability to tolerate a minor surgery (abnormal blood coagulation, other pre-existing conditions). It is also vital that you follow the doctor’s instructions on post-operative care.</span></div><span data-dcnode-id="1970" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vasectomie-montreal.ca/en"><span data-dcnode-id="1643" instrument_node="">Where do the Sperm Go After Vasectomy?</span></a><span data-dcnode-id="1641" instrument_node="">
</span></h3><span data-dcnode-id="1639" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1783" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1637" data-tab="3" id="elementor-tab-content-1783" role="tabpanel"><span data-dcnode-id="1638" instrument_node="">Your vasectomy procedure will prevent your sperm from getting into your semen, but they will continue to be produced by your testicles. The sperm will be reabsorbed into your body, the same as happens now if you don’t ejaculate regularly. They will be fine. In fact, some surveys find that sperm are actually happier knowing that they will not be suddenly called upon to shoot out and take on the potential responsibility of inseminating an ovum.</span></div><span data-dcnode-id="1636" instrument_node="">

</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">The Vasectomy Montreal clinic offers a single visit vasectomy for maximum convenience.</span></p><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">You can have a consultation and procedure with Dr Elroy Shuker in a single visit to our clinic. The total time will be 60 – 90 minutes including;</span></p><ul data-dcnode-id="1451"><li data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">a consultation and physical exam</span></li><li data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">anesthetic application by air injection</span></li><li data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">the no-scalpel vasectomy procedure</span></li><li data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">a brief recovery and observation period</span></li><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">review of post-vasectomy care instructions</span></li></ul><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">The single visit vasectomy makes it convenient to come to Montreal from Quebec City and beyond for the procedure. You will be able to drive afterwards – although we recommend getting home directly to rest and apply an ice pack.</span></p><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Occasionally the results of your physical exam may result in a change of date for the surgery based on the doctor’s findings. It is also possible to have an initial consultation as a separate appointment if desired.</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Book your vasectomy appointment now. Start by picking an available date on the calendar.</span></p><span data-dcnode-id="1444" instrument_node=""> </span></div><span data-dcnode-id="1442" instrument_node="">
