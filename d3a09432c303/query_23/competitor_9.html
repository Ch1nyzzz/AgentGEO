</span><span class="fl-heading-text" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Meet Dr Simon</span></span><span data-dcnode-id="1196" instrument_node="">
</span></h2><span data-dcnode-id="1194" instrument_node="">
</span></div><span data-dcnode-id="1192" instrument_node="">
</span></div><span data-dcnode-id="1190" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-610264f2ab0db" data-dcnode-id="1175" data-node="610264f2ab0db"><span data-dcnode-id="1189" instrument_node="">

</span><div class="fl-rich-text" data-dcnode-id="1179"><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Dr Simon is a has been offering the Li No-Scalpel Vasectomy technique since 2006. As a GP with a special interest in sexual health medicine he wanted to be able to offer patients a hassle-free contraception method. Scalpel-free vasectomy is a more precise and delicate option than incision vasectomy, and offers typically faster recovery times.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1181"><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directaccessvasectomy.com/dr-simon-wilson/"><span data-dcnode-id="1183" instrument_node="">Read more about Dr Simon</span></a></p><span data-dcnode-id="1180" instrument_node="">

</span><h2 class="heading-title" data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">
</span><span class="title-text pp-primary-title" data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">THE VASECTOMY PROCEDURE</span></span><span data-dcnode-id="1090" instrument_node="">
</span></h2><span data-dcnode-id="1088" instrument_node="">
</span></div><span data-dcnode-id="1086" instrument_node="">
</span><div class="pp-heading-separator line_only pp-center" data-dcnode-id="1082"><span data-dcnode-id="1085" instrument_node="">
</span><span class="pp-separator-line" data-dcnode-id="1084"></span><span data-dcnode-id="1083" instrument_node="">
</span></div><span data-dcnode-id="1081" instrument_node="">
</span><div class="pp-sub-heading" data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Vasectomy at Direct Access Vasectomy in Melbourne takes approximately 20-30 minutes. Here's the typical steps in the no-scalpel vasectomy procedure:</span></p><span data-dcnode-id="1077" instrument_node=""> </span></div><span data-dcnode-id="1075" instrument_node="">
</span></div><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
</span></div><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span></div><span data-dcnode-id="1065" instrument_node="">
</span></div><span data-dcnode-id="1063" instrument_node="">
</span><div class="fl-col-group fl-node-61023872d3a1c fl-col-group-custom-width" data-dcnode-id="941" data-node="61023872d3a1c"><span data-dcnode-id="1062" instrument_node="">
</span><div class="fl-col fl-node-61023872d3a1d fl-col-small" data-dcnode-id="1033" data-node="61023872d3a1d"><span data-dcnode-id="1061" instrument_node="">
</span><div class="fl-col-content fl-node-content" data-dcnode-id="1035"><span data-dcnode-id="1060" instrument_node="">
</span><div class="fl-module fl-module-heading fl-node-6102732a4b756" data-dcnode-id="1049" data-node="6102732a4b756"><span data-dcnode-id="1059" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1051"><span data-dcnode-id="1058" instrument_node="">
</span><h2 class="fl-heading" data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">1</span></span><span data-dcnode-id="1054" instrument_node="">
</span></h2><span data-dcnode-id="1052" instrument_node="">
</span></div><span data-dcnode-id="1050" instrument_node="">
</span></div><span data-dcnode-id="1048" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-61027108ee4c8" data-dcnode-id="1037" data-node="61027108ee4c8"><span data-dcnode-id="1047" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1039"><span data-dcnode-id="1046" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1041"><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">A local anaesthetic is injected into the area using a fine needle. A tiny hole is made in the scrotum.</span></p><span data-dcnode-id="1042" instrument_node="">
</span></div><span data-dcnode-id="1040" instrument_node="">
</span></div><span data-dcnode-id="1038" instrument_node="">
</span></div><span data-dcnode-id="1036" instrument_node="">
</span></div><span data-dcnode-id="1034" instrument_node="">
</span></div><span data-dcnode-id="1032" instrument_node="">
</span><div class="fl-col fl-node-61027121983b5 fl-col-small" data-dcnode-id="1003" data-node="61027121983b5"><span data-dcnode-id="1031" instrument_node="">
</span><div class="fl-col-content fl-node-content" data-dcnode-id="1005"><span data-dcnode-id="1030" instrument_node="">
</span><div class="fl-module fl-module-heading fl-node-61027332c56d0" data-dcnode-id="1019" data-node="61027332c56d0"><span data-dcnode-id="1029" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1021"><span data-dcnode-id="1028" instrument_node="">
</span><h2 class="fl-heading" data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">2</span></span><span data-dcnode-id="1024" instrument_node="">
</span></h2><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1020" instrument_node="">
</span></div><span data-dcnode-id="1018" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-610271219848a" data-dcnode-id="1007" data-node="610271219848a"><span data-dcnode-id="1017" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="1009"><span data-dcnode-id="1016" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">The vas deferens is divided and the testicular end of the tube is left open to help prevent congestion in the testis. A tiny layer of tissue is placed between the two ends of the vas to stop them re-joining.</span></p><span data-dcnode-id="1012" instrument_node="">
</span></div><span data-dcnode-id="1010" instrument_node="">
</span></div><span data-dcnode-id="1008" instrument_node="">
</span></div><span data-dcnode-id="1006" instrument_node="">
</span></div><span data-dcnode-id="1004" instrument_node="">
</span></div><span data-dcnode-id="1002" instrument_node="">
</span><div class="fl-col fl-node-61027166cfbed fl-col-small" data-dcnode-id="973" data-node="61027166cfbed"><span data-dcnode-id="1001" instrument_node="">
</span><div class="fl-col-content fl-node-content" data-dcnode-id="975"><span data-dcnode-id="1000" instrument_node="">
</span><div class="fl-module fl-module-heading fl-node-6102733c87e35" data-dcnode-id="989" data-node="6102733c87e35"><span data-dcnode-id="999" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="991"><span data-dcnode-id="998" instrument_node="">
</span><h2 class="fl-heading" data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">3</span></span><span data-dcnode-id="994" instrument_node="">
</span></h2><span data-dcnode-id="992" instrument_node="">
</span></div><span data-dcnode-id="990" instrument_node="">
</span></div><span data-dcnode-id="988" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-61027166cfc64" data-dcnode-id="977" data-node="61027166cfc64"><span data-dcnode-id="987" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="979"><span data-dcnode-id="986" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">The same procedure is performed on the other side but through the same hole. The skin edge is clipped together without stitches and a dressing is applied to keep the area clean and dry.</span></p><span data-dcnode-id="982" instrument_node="">
</span></div><span data-dcnode-id="980" instrument_node="">
</span></div><span data-dcnode-id="978" instrument_node="">
</span></div><span data-dcnode-id="976" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span></div><span data-dcnode-id="972" instrument_node="">
</span><div class="fl-col fl-node-610271965469c fl-col-small" data-dcnode-id="943" data-node="610271965469c"><span data-dcnode-id="971" instrument_node="">
</span><div class="fl-col-content fl-node-content" data-dcnode-id="945"><span data-dcnode-id="970" instrument_node="">
</span><div class="fl-module fl-module-heading fl-node-610272f0869b0" data-dcnode-id="959" data-node="610272f0869b0"><span data-dcnode-id="969" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="961"><span data-dcnode-id="968" instrument_node="">
</span><h2 class="fl-heading" data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">4</span></span><span data-dcnode-id="964" instrument_node="">
</span></h2><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span></div><span data-dcnode-id="958" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-6102719654721" data-dcnode-id="947" data-node="6102719654721"><span data-dcnode-id="957" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="949"><span data-dcnode-id="956" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">You will rest for 24 hours and can return to sex and physical activities within a few days. You will need to use back-up contraception until your follow-up test 3 months after your vasectomy procedure.</span></p><span data-dcnode-id="952" instrument_node="">
</span></div><span data-dcnode-id="950" instrument_node="">
</span></div><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span></div><span data-dcnode-id="944" instrument_node="">
</span></div><span data-dcnode-id="942" instrument_node="">
</span></div><span data-dcnode-id="940" instrument_node="">
</span><div class="fl-col-group fl-node-61027568a3d1c" data-dcnode-id="917" data-node="61027568a3d1c"><span data-dcnode-id="939" instrument_node="">

</span><span class="pp-faq-button-label" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">
What is my out of pocket cost for the vasectomy procedure? </span></span><span data-dcnode-id="769" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-open fa fa-plus pp-faq-icon-right" data-dcnode-id="768"></span><span data-dcnode-id="767" instrument_node="">

</span><div class="pp-faq-content fl-clearfix" data-dcnode-id="755" style="display: block;"><span data-dcnode-id="762" instrument_node="">
</span><div class="pp-faq-content-text" data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">If you are a current Medicare card holder, you will pay approximately $450 after your Medicare fee is rebated.</span></p><span data-dcnode-id="758" instrument_node="">

</span><span class="pp-faq-button-label" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">
Do I need a referral? </span></span><span data-dcnode-id="747" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-open fa fa-plus pp-faq-icon-right" data-dcnode-id="746"></span><span data-dcnode-id="745" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-close fa fa-minus pp-faq-icon-right" data-dcnode-id="744"></span><span data-dcnode-id="743" instrument_node="">
</span></div><span data-dcnode-id="741" instrument_node="">
</span><div class="pp-faq-content fl-clearfix" data-dcnode-id="733"><span data-dcnode-id="740" instrument_node="">
</span><div class="pp-faq-content-text" data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">You do not need a referral from a doctor although it is advised to discuss the procedure with your GP or Dr Simon prior to booking so you fully understand the procedure and risks.</span></p><span data-dcnode-id="736" instrument_node="">

</span><div class="pp-faq-button" data-dcnode-id="720" style="height: 53px;"><span data-dcnode-id="728" instrument_node="">
</span><span class="pp-faq-button-label" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">
How long does the vasectomy procedure take? </span></span><span data-dcnode-id="725" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-open fa fa-plus pp-faq-icon-right" data-dcnode-id="724"></span><span data-dcnode-id="723" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-close fa fa-minus pp-faq-icon-right" data-dcnode-id="722"></span><span data-dcnode-id="721" instrument_node="">
</span></div><span data-dcnode-id="719" instrument_node="">
</span><div class="pp-faq-content fl-clearfix" data-dcnode-id="711"><span data-dcnode-id="718" instrument_node="">
</span><div class="pp-faq-content-text" data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">It takes approximately 20-30 minutes for the procedure, although most patients are at our clinic for 45 minutes in total.&nbsp;</span></p><span data-dcnode-id="714" instrument_node="">
</span></div><span data-dcnode-id="712" instrument_node="">
</span></div><span data-dcnode-id="710" instrument_node="">
</span></div><span data-dcnode-id="708" instrument_node="">
</span><div class="pp-faq-item" data-dcnode-id="687" id="pp-faq-61027cd22e2ee-4"><span data-dcnode-id="707" instrument_node="">
</span><div class="pp-faq-button" data-dcnode-id="698" style="height: 53px;"><span data-dcnode-id="706" instrument_node="">
</span><span class="pp-faq-button-label" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">
How many days off work should I plan for post-vasectomy? </span></span><span data-dcnode-id="703" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-open fa fa-plus pp-faq-icon-right" data-dcnode-id="702"></span><span data-dcnode-id="701" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-close fa fa-minus pp-faq-icon-right" data-dcnode-id="700"></span><span data-dcnode-id="699" instrument_node="">
</span></div><span data-dcnode-id="697" instrument_node="">
</span><div class="pp-faq-content fl-clearfix" data-dcnode-id="689"><span data-dcnode-id="696" instrument_node="">
</span><div class="pp-faq-content-text" data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">If you have a physical job that requires lifting, stretching or physical exertion, you will need to take a week off work or do light duties for 1 week. If you have a desk job you can usually return 1-2 days after your procedure.</span></p><span data-dcnode-id="692" instrument_node="">
</span></div><span data-dcnode-id="690" instrument_node="">
</span></div><span data-dcnode-id="688" instrument_node="">
</span></div><span data-dcnode-id="686" instrument_node="">
</span><div class="pp-faq-item" data-dcnode-id="665" id="pp-faq-61027cd22e2ee-5"><span data-dcnode-id="685" instrument_node="">
</span><div class="pp-faq-button" data-dcnode-id="676" style="height: 53px;"><span data-dcnode-id="684" instrument_node="">
</span><span class="pp-faq-button-label" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">
What are the main considerations before committing to a vasectomy? </span></span><span data-dcnode-id="681" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-open fa fa-plus pp-faq-icon-right" data-dcnode-id="680"></span><span data-dcnode-id="679" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-close fa fa-minus pp-faq-icon-right" data-dcnode-id="678"></span><span data-dcnode-id="677" instrument_node="">
</span></div><span data-dcnode-id="675" instrument_node="">
</span><div class="pp-faq-content fl-clearfix" data-dcnode-id="667"><span data-dcnode-id="674" instrument_node="">
</span><div class="pp-faq-content-text" data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Before booking a vasectomy you need to be completely sure you don't want to have any more children in the future. The no scalpel method involves dividing the vas deferens (sperm carrying tubes) in the scrotum. While vasectomy reversals are possible, it's best to have the mindset that the vasectomy procedure is permanent. Vasectomy reversal is expensive and usually not covered by health insurance.</span></p><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span><div class="pp-faq-item" data-dcnode-id="643" id="pp-faq-61027cd22e2ee-6"><span data-dcnode-id="663" instrument_node="">
</span><div class="pp-faq-button" data-dcnode-id="654" style="height: 53px;"><span data-dcnode-id="662" instrument_node="">
</span><span class="pp-faq-button-label" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">
Do I need to get stitches out? </span></span><span data-dcnode-id="659" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-open fa fa-plus pp-faq-icon-right" data-dcnode-id="658"></span><span data-dcnode-id="657" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-close fa fa-minus pp-faq-icon-right" data-dcnode-id="656"></span><span data-dcnode-id="655" instrument_node="">
</span></div><span data-dcnode-id="653" instrument_node="">
</span><div class="pp-faq-content fl-clearfix" data-dcnode-id="645"><span data-dcnode-id="652" instrument_node="">
</span><div class="pp-faq-content-text" data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">The no scalpel open ended method does not require stitches. The incision site is very small and can heal without them. It is very important to keep your dressing in place and dry for the first 48 hours.</span></p><span data-dcnode-id="648" instrument_node="">
</span></div><span data-dcnode-id="646" instrument_node="">
</span></div><span data-dcnode-id="644" instrument_node="">
</span></div><span data-dcnode-id="642" instrument_node="">
</span><div class="pp-faq-item" data-dcnode-id="621" id="pp-faq-61027cd22e2ee-7"><span data-dcnode-id="641" instrument_node="">
</span><div class="pp-faq-button" data-dcnode-id="632" style="height: 53px;"><span data-dcnode-id="640" instrument_node="">
</span><span class="pp-faq-button-label" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">
How long before can have sex? </span></span><span data-dcnode-id="637" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-open fa fa-plus pp-faq-icon-right" data-dcnode-id="636"></span><span data-dcnode-id="635" instrument_node="">
</span><span class="pp-faq-button-icon pp-faq-close fa fa-minus pp-faq-icon-right" data-dcnode-id="634"></span><span data-dcnode-id="633" instrument_node="">
</span></div><span data-dcnode-id="631" instrument_node="">
</span><div class="pp-faq-content fl-clearfix" data-dcnode-id="623"><span data-dcnode-id="630" instrument_node="">
</span><div class="pp-faq-content-text" data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">We recommend no sex or ejaculation for 7 days after the procedure. Remember that it takes a number of ejaculations to empty the tubes completely of sperm so you must use another method of contraception (condom or female contraception) until your 3-month follow up test confirms you are sterile.</span></p><span data-dcnode-id="626" instrument_node="">
</span></div><span data-dcnode-id="624" instrument_node="">
</span></div><span data-dcnode-id="622" instrument_node="">
