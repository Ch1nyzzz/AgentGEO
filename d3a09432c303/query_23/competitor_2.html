</span><h2 class="has-text-align-center has-dark-blue-color has-text-color" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Private Vasectomy | Vasectomy Clinic | Book a Vasectomy Today | Available in Birmingham, Cardiff, Shrewsbury &amp; Wolverhampton</span></h2><span data-dcnode-id="1027" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1026" style="height:50px"></div><span data-dcnode-id="1025" instrument_node="">

</span><div class="wp-block-source-column col-lg-8 col-md-5" data-dcnode-id="986"><div class="column__content" data-dcnode-id="987"><span data-dcnode-id="1020" instrument_node="">
</span><p class="has-text-align-center is-style-serif-links has-medium-font-size" data-dcnode-id="1017"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">There are many reasons why you may be considering ‘the snip’, whatever your reason Summerfield Healthcare’s private vasectomy service is here to help.</span></strong></p><span data-dcnode-id="1016" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1013"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Some men may be tempted to laugh at the procedure, however, with more than 15,000 British men opting to have a vasectomy every year, it is a common operation. The procedure is straightforward and there is very little recovery time, making it an excellent choice for permanent contraception.</span></strong></p><span data-dcnode-id="1012" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1009" id="moreinfo"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Although vasectomy surgery can be done through the NHS, the waiting list can take years. Private surgery allows you to be seen, and book the procedure quickly, and although we offer pre-op advice there is no mandatory counselling and no GP referral is needed.</span></strong></p><span data-dcnode-id="1008" instrument_node="">

</span><h2 data-dcnode-id="956"><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.privatevasectomy.co.uk/procedure/"><span data-dcnode-id="958" instrument_node="">The Procedure</span></a></h2><span data-dcnode-id="955" instrument_node="">
</span><div data-dcnode-id="941"><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">A vasectomy is a common procedure for men who are already parents or for those who have chosen not to have children, as having a vasectomy means you will not be able to father any more children.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The procedure is done as outpatient surgery and takes around 15-20 minutes using local anaesthetic. You will be free to go home and carry on with your life the same day you come in.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">You will also need to continue to use protection for 8-12 weeks after the surgery because some sperm will remain in the vas deferens tubes after the operation but a vasectomy will not affect your sex drive, testosterone (male hormone) levels, or erections.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Weekly clinics are carried out by Mr Andrew Garnham and Mr Hans-Joerg Zief, both experienced surgeons with over 20 years in the NHS. Our clinics take place across the Midlands giving you the option of a vasectomy in Wolverhampton or a vasectomy in Shrewsbury.</span></p><span data-dcnode-id="942" instrument_node="">
