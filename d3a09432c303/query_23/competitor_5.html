</span><h3 class="elementor-heading-title elementor-size-default" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">No Needle, No Scalpel Technique</span></h3><span data-dcnode-id="1086" instrument_node=""> </span></div><span data-dcnode-id="1084" instrument_node="">

</span><section class="elementor-section elementor-inner-section elementor-element elementor-element-039361a elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="1032" data-element_type="section" data-id="039361a"><span data-dcnode-id="1081" instrument_node="">

</span><div class="elementor-column elementor-col-100 elementor-inner-column elementor-element elementor-element-37ce085" data-dcnode-id="1038" data-element_type="column" data-id="37ce085"><span data-dcnode-id="1078" instrument_node="">

</span><div class="elementor-element elementor-element-9ba1dfd elementor-widget elementor-widget-text-editor" data-dcnode-id="1044" data-element_type="widget" data-id="9ba1dfd" data-widget_type="text-editor.default"><span data-dcnode-id="1075" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1046"><span data-dcnode-id="1074" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1048"><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">At Willow Clinic we use the </span><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">No Needle, No Scalpel technique</span></strong><span data-dcnode-id="1069" instrument_node="">.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Studies have shown this method has a lower complication rate, quicker healing and return to sexual activity, and less intra-operative discomfort compared to the conventional method.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Local anesthetic is delivered using a spray applicator (MadaJet®) which delivers a fine stream of anesthetic that penetrates the skin and diffuses to each vas (tube).</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Most patients (99%) require no more anesthetic for completion of the procedure itself without pain. About 1% of patients will require the injection of a little more anesthetic with a fine needle which rarely causes any sensation.</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Instead of a scalpel, a special pointed instrument called a hemostat is used to create a tiny opening in the scrotum to deliver each vas (tube) to the skin. Since blood vessels in the skin are spread apart rather than cut, bleeding is less than if a scalpel is used, no stitches are required and the opening seals off by itself within a day.</span></p><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Once the vas tube is lifted through the skin opening, it is divided and the prostatic end is sealed off using heat (cauterization). You will not feel anything when this is done. This prevents the passage of sperm but does not change the amount of semen. The testicular end of the sheath is left open. The vas sheath is closed over the prostatic end of the vas to create a barrier between the two ends. This is called fascial interposition.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1057" instrument_node="">The American Urological Association </span><strong data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">recommends the no needle, no scalpel technique</span></strong><span data-dcnode-id="1054" instrument_node=""> in their Vasectomy Guideline. </span><strong data-dcnode-id="1051"><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/guidelines/vasectomy-guideline"><span data-dcnode-id="1053" instrument_node="">Visit link.</span></a></strong></p><span data-dcnode-id="1049" instrument_node=""> </span></div><span data-dcnode-id="1047" instrument_node="">
</span></div><span data-dcnode-id="1045" instrument_node="">
</span></div><span data-dcnode-id="1043" instrument_node="">

</span><p data-dcnode-id="1001"><span data-dcnode-id="1012" instrument_node="">• Gentle office procedure</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">• No change in erections, sex drive or climax sensation </span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">• No change in the testes, no (noticeable) change in the semen </span><br data-dcnode-id="1007"><span data-dcnode-id="1006" instrument_node="">• If you have MSP coverage, your vasectomy is free</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">• No need to use other methods of birth control </span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">• It relieves worries of an unplanned pregnancy</span></p><span data-dcnode-id="1000" instrument_node=""> </span></div><span data-dcnode-id="998" instrument_node="">

</span><p data-dcnode-id="958"><span data-dcnode-id="963" instrument_node="">• Considered permanent. A reversal procedure is an option but it is expensive and not always effective.</span><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">• Must use other forms of birth control until sperm-free (approximately 3 months). </span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">• Does not prevent transmission of sexually transmitted infections (STI’s).</span></p><p data-dcnode-id="952"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">There are&nbsp;no proven long-term health risks </span></strong><span data-dcnode-id="955" instrument_node="">(neither cancer nor cardiovascular disease) associated with vasectomy.</span><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">The risks of NOT having a vasectomy are all borne by the partners of people who choose to avoid vasectomy. And they are considerable!</span></p><span data-dcnode-id="951" instrument_node=""> </span></div><span data-dcnode-id="949" instrument_node="">

</span><p data-dcnode-id="890"><span data-dcnode-id="902" instrument_node="">• Fill out our booking form.</span><br data-dcnode-id="901"><span data-dcnode-id="900" instrument_node="">• Once we have received the booking form and the referral from your family doctor we will contact you to schedule 2 appointments. (May be a few weeks for you to hear back from us).</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">• The first appointment will be virtual and will be about 15 – 20 minutes. The physician will review your history and decide if you need an in clinic appointment prior to your procedure. (&lt;5% chance)</span><span data-dcnode-id="896" style="color: #3a3a3a; font-family: Montserrat, sans-serif;"><br data-dcnode-id="897"></span><span data-dcnode-id="895" instrument_node="">• The second appointment will be in the clinic for your procedure. </span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">• You will be at the clinic for about an hour.</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">• 3 months after the procedure you will do a semen analysis to confirm that the process is complete.</span></p><span data-dcnode-id="889" instrument_node=""> </span></div><span data-dcnode-id="887" instrument_node="">

</span><div aria-labelledby="elementor-tab-title-2141" class="elementor-tab-content elementor-clearfix" data-dcnode-id="725" data-tab="1" id="elementor-tab-content-2141" role="tabpanel"><p data-dcnode-id="828"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">1.</span></strong><span data-dcnode-id="834" instrument_node=""> Understand the alternatives to vasectomy so that you are confident in your choice : </span><br data-dcnode-id="833"><span data-dcnode-id="832" instrument_node="">Read </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//willowclinic.ca/index.php/birth-control/"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Birth Control</span></strong></a></p><p data-dcnode-id="818"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">2.</span></strong><span data-dcnode-id="825" instrument_node=""> Read the “</span><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Instructions Following Vasectomy</span></strong><span data-dcnode-id="822" instrument_node="">” </span><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">*</span></strong><span data-dcnode-id="819" instrument_node=""> (below) so that you know what to expect.</span></p><p data-dcnode-id="814"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">3.</span></strong><span data-dcnode-id="815" instrument_node=""> SHAVE the underside of the penis and the entire scrotum, on THE DAY BEFORE the procedure. A bit of alcohol is used to clean the skin before use of the MadaJet® and it can sting slightly right after a fresh shave if the skin is chafed.</span></p><p data-dcnode-id="810"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">4.</span></strong><span data-dcnode-id="811" instrument_node=""> NO POWDER OR DEODORANT&nbsp;in the genital area on the day of your procedure.</span></p><p data-dcnode-id="802"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">5.</span></strong><span data-dcnode-id="807" instrument_node=""> Wear your athletic supporter</span><strong data-dcnode-id="804"><b data-dcnode-id="805"><span data-dcnode-id="806" instrument_node=""> AGAINST YOUR SKIN </span></b></strong><span data-dcnode-id="803" instrument_node="">(under your underwear) to the appointment; This can be purchased at any sporting goods store or online. You will need to wear the supporter for a few days after your procedure.</span></p><p data-dcnode-id="795"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">6.</span></strong><span data-dcnode-id="799" instrument_node=""> Be prepared to sign the </span><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">operative&nbsp;consent&nbsp;sheet</span></strong><span data-dcnode-id="796" instrument_node=""> upon your arrival in the office.</span></p><p data-dcnode-id="791"><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">7.</span></strong><span data-dcnode-id="792" instrument_node=""> Arrange someone to drive you home.</span></p><p data-dcnode-id="787"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">8.</span></strong><span data-dcnode-id="788" instrument_node=""> Plan to do nothing but&nbsp;recline at home&nbsp;(sofa or bed) on the afternoon and evening of the vasectomy.</span></p><p data-dcnode-id="783"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">9.</span></strong><span data-dcnode-id="784" instrument_node=""> Do not take any aspirin-containing medication for five days&nbsp;before the procedure.</span></p><p data-dcnode-id="776"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">10.</span></strong><span data-dcnode-id="780" instrument_node=""> </span><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Eat&nbsp;before your procedure</span></strong><span data-dcnode-id="777" instrument_node="">, a normal breakfast or lunch. Nervous patients who do not eat beforehand are more likely to become lightheaded during or after their vasectomies.</span></p><p data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">11.</span></strong><span data-dcnode-id="773" instrument_node=""> Take acetaminophen (Tylenol) 1000 mg, 1 hour prior to the appointment.</span></p><h3 data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">CHECKLIST:</span></h3><p data-dcnode-id="762"><span data-dcnode-id="767" style="color: #3366ff;"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Prior to your appointment</span></strong></span><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">Buy an athletic supporter.</span><br data-dcnode-id="764"><span data-dcnode-id="763" instrument_node="">Buy some Tylenol 500 mg or generic for before and after your procedure.</span></p><p data-dcnode-id="756"><span data-dcnode-id="759" style="color: #3366ff;"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">5 days prior to your appointment</span></strong></span><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">Stop taking any aspirin until at least 2 days after your procedure</span></p><p data-dcnode-id="750"><span data-dcnode-id="753" style="color: #3366ff;"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">On the day before your appointment</span></strong></span><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">Shave the underside of the penis and the entire scrotum.</span></p><p data-dcnode-id="730"><span data-dcnode-id="747" style="color: #3366ff;"><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">On the day of your appointment</span></strong></span><span data-dcnode-id="746" instrument_node=""> </span><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">Eat a normal breakfast or lunch.</span><br data-dcnode-id="743"><span data-dcnode-id="742" instrument_node="">Shower and do not use any powder or deodorant in the genital area.</span><br data-dcnode-id="741"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">1 hour prior to the appointment</span></strong><span data-dcnode-id="738" instrument_node=""> take acetaminophen (Tylenol) 1000 mg.&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; </span><span data-dcnode-id="736" style="font-size: 16px;"><span data-dcnode-id="737" instrument_node="">Arrive at the clinic 15 min before your scheduled appt. time.&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; Wear your athletic supporter</span></span><strong data-dcnode-id="733" style="font-size: 16px;"><b data-dcnode-id="734"><span data-dcnode-id="735" instrument_node=""> AGAINST YOUR SKIN </span></b></strong><span data-dcnode-id="731" style="font-size: 16px;"><span data-dcnode-id="732" instrument_node="">(under your underwear) to the appointment.</span></span></p><p data-dcnode-id="726"><span data-dcnode-id="727" style="color: #339966;"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Have someone ready to drive you home.</span></strong></span></p></div><span data-dcnode-id="724" instrument_node="">
</span></div><span data-dcnode-id="722" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="714"><i class="elementor-toggle-icon-opened fas fa-caret-up" data-dcnode-id="715"></i></span><span data-dcnode-id="713" instrument_node="">
</span></span><span data-dcnode-id="711" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//willowclinic.ca/index.php/vasectomy"><span data-dcnode-id="710" instrument_node="">NORMAL EFFECTS</span></a><span data-dcnode-id="708" instrument_node="">
</span></div><span data-dcnode-id="706" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-2142" class="elementor-tab-content elementor-clearfix" data-dcnode-id="680" data-tab="2" id="elementor-tab-content-2142" role="tabpanel"><p data-dcnode-id="699"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Pain beyond 3 days</span></strong><span data-dcnode-id="703" instrument_node="">, especially if accompanied by some swelling of the vasectomy sites above the testes, may signify excessive inflammation and then </span><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">ibuprofen and naproxen are good choices</span></strong><span data-dcnode-id="700" instrument_node="">. Some patients will have more discomfort or tenderness 3-5 days after the vasectomy than they do for the first few days after their vasectomies. That’s because the body goes through a series of steps in responding to the new arrangement, and sometimes the later steps are more noticeable than the earlier steps. Usually no reason for concern.</span></p><p data-dcnode-id="691"><span data-dcnode-id="698" instrument_node="">It is normal to have some&nbsp;</span><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">discoloration of the skin</span></strong><span data-dcnode-id="695" instrument_node=""> (black and blue) around the puncture site a day or two after the vasectomy. Some patients will develop considerable discoloration of the scrotum about </span><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">4 days after the vasectomy</span></strong><span data-dcnode-id="692" instrument_node="">.&nbsp;Blood from the deep vasectomy site comes to the surface as a purplish-blue mark, gets darker and spreads out and then gradually disappears.</span></p><p data-dcnode-id="681"><span data-dcnode-id="690" instrument_node="">Some patients (about one in 20) will develop </span><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">swelling and discomfort</span></strong><span data-dcnode-id="687" instrument_node=""> on one side, sometimes on both sides, starting anytime from 3 days to 3 months following vasectomy. This usually represents an exaggerated form of the normal </span><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">inflammatory response</span></strong><span data-dcnode-id="684" instrument_node="">&nbsp;necessary for sperm resorption and recycling. It is effectively managed with a 5 – 7 day course of ibuprofen 600 mg 3 times per day.</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">A small amount of bleeding from the site is normal. — Pinching the area for up to 5 minutes should stop it.</span></p></div><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">

</span><div aria-controls="elementor-tab-content-2143" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="662" data-tab="3" id="elementor-tab-title-2143" role="tab"><span data-dcnode-id="675" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//willowclinic.ca/index.php/vasectomy"><span data-dcnode-id="665" instrument_node="">INSTRUCTIONS AFTER VASECTOMY</span></a><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-2143" class="elementor-tab-content elementor-clearfix" data-dcnode-id="531" data-tab="3" id="elementor-tab-content-2143" role="tabpanel"><p data-dcnode-id="653"><span data-dcnode-id="658" style="color: #339966;"><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Have someone drive you home.</span></strong></span><br data-dcnode-id="657"><span data-dcnode-id="654" style="color: #3366ff;"><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Do not drive for at least two hours after the procedure.</span></strong></span></p><p data-dcnode-id="634"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">1.</span></strong><span data-dcnode-id="650" instrument_node=""> Spend a </span><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">quiet evening at home</span></strong><span data-dcnode-id="647" instrument_node="">, reclining in bed or on the sofa. Minimize activity. </span><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Some</span></strong><span data-dcnode-id="644" instrument_node=""> patients have </span><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">no pain at all</span></strong><span data-dcnode-id="641" instrument_node=""> after vasectomy. Many have mild discomfort that does not require pain pills. You may have </span><strong data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">discomfort in the groins</span></strong><span data-dcnode-id="638" instrument_node=""> (lower down between your legs) </span><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">or in your abdomen</span></strong><span data-dcnode-id="635" instrument_node="">. This is normal and will go away within a few days.</span></p><p data-dcnode-id="627"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">2.</span></strong><span data-dcnode-id="631" instrument_node=""> You can expect only mild discomfort for a few days, for which you may take acetaminophen (</span><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Tylenol or generic</span></strong><span data-dcnode-id="628" instrument_node="">). You can take two 500 mg tablets every 6 hours as needed, do not exceed 4 g per day (8 x 500mg tablets).</span></p><p data-dcnode-id="623"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Avoid aspirin</span></strong><span data-dcnode-id="624" instrument_node=""> for 2 days after the vasectomy.</span></p><p data-dcnode-id="607"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Ibuprofen</span></strong><span data-dcnode-id="620" instrument_node="">&nbsp;(Motrin, Advil or generic) and&nbsp;</span><strong data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">naproxen</span></strong><span data-dcnode-id="617" instrument_node="">&nbsp;(Aleve) are both pain medications and </span><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">anti-inflammatory</span></strong><span data-dcnode-id="614" instrument_node=""> drugs.&nbsp;Inflammation is a normal part of the healing process. </span><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">For the first few days</span></strong><span data-dcnode-id="611" instrument_node="">&nbsp;after the procedure, it is best </span><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">NOT</span></strong><span data-dcnode-id="608" instrument_node=""> to take an anti-inflammatory.&nbsp;</span></p><p data-dcnode-id="600"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">3.</span></strong><span data-dcnode-id="604" instrument_node=""> No need for </span><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">ice packs</span></strong><span data-dcnode-id="601" instrument_node="">.</span></p><p data-dcnode-id="590"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">4.</span></strong><span data-dcnode-id="597" instrument_node=""> You may remove the athletic supporter and take a </span><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">shower</span></strong><span data-dcnode-id="594" instrument_node=""> starting the morning after the procedure. Replace the athletic supporter and wear it whenever you are up and around for the </span><strong data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">next 2 days</span></strong><span data-dcnode-id="591" instrument_node=""> and during sports for the next 7 days.</span></p><p data-dcnode-id="583"><strong data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">5.</span></strong><span data-dcnode-id="587" instrument_node=""> On the </span><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">day after</span></strong><span data-dcnode-id="584" instrument_node=""> the procedure, you may walk and drive as much as you like, but no sports, yard work, swimming, or heavy lifting. If your job is sedentary (office work or supervisor), you may return to work.</span></p><p data-dcnode-id="561"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">6.</span></strong><span data-dcnode-id="580" instrument_node=""> </span><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">When the pain is gone and tenderness is minimal</span></strong><span data-dcnode-id="577" instrument_node="">, you may return to the </span><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">gym</span></strong><span data-dcnode-id="574" instrument_node=""> or to </span><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">running</span></strong><span data-dcnode-id="571" instrument_node="">, but on the </span><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">first day back</span></strong><span data-dcnode-id="568" instrument_node="">, do </span><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">half of your usual workout</span></strong><span data-dcnode-id="565" instrument_node="">: half the weight, half the reps, half the speed, half the distance, etc. If pain does not return, you may do your regular workout the next day. You may also </span><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">swim</span></strong><span data-dcnode-id="562" instrument_node=""> in fresh or salt water two days after the vasectomy.</span></p><p data-dcnode-id="539"><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">7.</span></strong><span data-dcnode-id="558" instrument_node=""> </span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">When you no longer have any pain or tenderness</span></strong><span data-dcnode-id="555" instrument_node="">,&nbsp;you may&nbsp;</span><strong data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">ejaculate</span></strong><span data-dcnode-id="552" instrument_node="">. We recommend waiting at least&nbsp;</span><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">2 days for sex</span></strong><span data-dcnode-id="549" instrument_node="">, but the American Urological Association Vasectomy Guidelines recommends that patients </span><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">wait a week</span></strong><span data-dcnode-id="546" instrument_node="">. It is unclear whether sooner ejaculation prolongs discomfort.&nbsp;</span><strong data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Blood in the semen</span></strong><span data-dcnode-id="543" instrument_node=""> within the first month or two after the vasectomy occurs in some patients, but it is </span><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">no reason for concern</span></strong><span data-dcnode-id="540" instrument_node="">. YOU MUST USE SOME OTHER METHOD OF BIRTH CONTROL until your semen is tested negative for sperm.</span></p><p data-dcnode-id="532"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">8.</span></strong><span data-dcnode-id="536" instrument_node=""> </span><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">No follow-up visit</span></strong><span data-dcnode-id="533" instrument_node="">&nbsp;is required. You will be given a 24 hour emergency phone number and if you have undue discomfort or any concerns, you can call any time after your vasectomy.</span></p></div><span data-dcnode-id="530" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//willowclinic.ca/index.php/vasectomy"><span data-dcnode-id="516" instrument_node="">WHAT TO WATCH FOR</span></a><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-2144" class="elementor-tab-content elementor-clearfix" data-dcnode-id="444" data-tab="4" id="elementor-tab-content-2144" role="tabpanel"><p data-dcnode-id="489"><span data-dcnode-id="511" instrument_node="">If you develop a </span><strong data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">large bluish lump</span></strong><span data-dcnode-id="508" instrument_node=""> inside the scrotum the </span><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">size of a golf ball</span></strong><span data-dcnode-id="505" instrument_node="">, in the </span><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">first two days</span></strong><span data-dcnode-id="502" instrument_node="">, it may be a hematoma (blood accumulation). It is important to </span><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">treat this complication as soon as possible</span></strong><span data-dcnode-id="499" instrument_node="">, please call our office @ </span><b data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">604-709-5611, Monday – Friday</span></b><span data-dcnode-id="496" instrument_node=""> 9 – 5 or after hours our </span><b data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">emergency #</span></b><span data-dcnode-id="493" instrument_node=""> </span><b data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">604-244-5010</span></b><span data-dcnode-id="490" instrument_node="">.</span></p><p data-dcnode-id="475"><span data-dcnode-id="488" instrument_node="">If you have </span><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">excessive pain or swelling, bleeding, or redness or pus around the incision with a fever</span></strong><span data-dcnode-id="485" instrument_node="">, please call our office @ </span><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">604-709-5611, Monday – Friday 9 – 5</span></strong><span data-dcnode-id="482" instrument_node=""> or after hours our </span><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">emergency #</span></strong><span data-dcnode-id="479" instrument_node=""> </span><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">604-244-5010</span></strong><span data-dcnode-id="476" instrument_node="">.</span></p><p data-dcnode-id="471"><span data-dcnode-id="474" instrument_node="">If you have any questions or concerns about how you are healing please call the office during regular office hours for advice. 604-709-5611 or email us @ </span><a data-dcnode-id="472" href="mailto:willowvasectomy@gmail.com"><span data-dcnode-id="473" instrument_node="">willowvasectomy@gmail.com</span></a></p><p data-dcnode-id="464"><b data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Before you leave the clinic, we will give you a form to take to the lab. We will advise you on the earliest date you should go. </span></b><span data-dcnode-id="468" instrument_node="">You </span><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">MUST</span></strong><span data-dcnode-id="465" instrument_node=""> have an appointment at the lab to drop off your sample.&nbsp;You will need to call Lifelabs&nbsp;@ 604-412-4495 as soon as possible to book. They are booking 3 – 4 months away.</span></p><p data-dcnode-id="457"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Twelve weeks&nbsp;</span></strong><span data-dcnode-id="461" instrument_node="">after your vasectomy, you need to&nbsp;</span><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">have your semen tested</span></strong><span data-dcnode-id="458" instrument_node="">&nbsp;to be sure that it no longer contains sperm and that it is thereby safe to stop other forms of contraception:</span></p><p data-dcnode-id="452"><span data-dcnode-id="456" instrument_node="">Please wait at least&nbsp;</span><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">twelve (12) weeks&nbsp;and&nbsp;20 ejaculations</span></strong><span data-dcnode-id="453" instrument_node=""> after your vasectomy (number of ejaculations and number of weeks are both important).</span></p><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">A semen sample tested before 12 weeks is less likely to be free of sperm. The sample should be produced on the day of examination, but can be 3 or 4 hours old.</span></p><p data-dcnode-id="445"><span data-dcnode-id="449" instrument_node="">After twelve weeks&nbsp;</span><strong data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">and</span></strong><span data-dcnode-id="446" instrument_node=""> 20 ejaculations (both), 98% of patients will have no sperm in their semen. Two percent will have to repeat the test at least once. Should you wish assurance against late failure, repeat semen tests are available at future times through Lifelabs.</span></p></div><span data-dcnode-id="443" instrument_node="">

</span><div aria-labelledby="elementor-tab-title-2145" class="elementor-tab-content elementor-clearfix" data-dcnode-id="378" data-tab="5" id="elementor-tab-content-2145" role="tabpanel"><p data-dcnode-id="419"><span data-dcnode-id="420" style="color: #3366ff;"><span data-dcnode-id="424" instrument_node="">If you have a valid BC Services Card (PHN), there is </span><b data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">NO CHARGE</span></b><span data-dcnode-id="421" instrument_node=""> to you for the consultation or the procedure.</span></span></p><div data-dcnode-id="379"><div data-dcnode-id="416"><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">If you miss or cancel the procedure appointment with less than 2 full business days’ notice, the cancellation fee is $200.00.&nbsp;</span></p></div><div data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">If you show up for the appointment and you are inadequately prepared, or if the information on the booking form is incorrect or incomplete such that the vasectomy cannot be performed, you will be charged a procedure cancellation fee of $100.00</span></div><div data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">&nbsp;</span></div><div data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">You will be asked to keep a credit card # on file with us. There will be no charges made unless we need to charge either of the fees above.</span></div><div data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">&nbsp;</span></div><div data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">You will need to purchase an athletic supporter (Jock Strap) prior to your procedure appointment. This should cost you less than 20.00.</span></div><div data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">&nbsp;</span></div><div data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">You will need to pay the lab directly for your follow-up semen analysis approximate cost is 65.00 per sample. You may need to go for more than one analysis.</span></div><div data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">&nbsp;</span></div><div data-dcnode-id="394"><span data-dcnode-id="395" style="color: #3a3a3a; font-family: Montserrat, sans-serif;"><span data-dcnode-id="399" instrument_node="">If you </span><span data-dcnode-id="396" style="color: #3366ff;"><b data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">DO NOT HAVE A VALID BC SERVICES CARD:</span></b></span></span></div><div data-dcnode-id="390"><span data-dcnode-id="391" style="color: #3a3a3a; font-family: Montserrat, sans-serif;"><b data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">&nbsp;</span></b></span></div><div data-dcnode-id="387"><span data-dcnode-id="388" style="color: #3a3a3a; font-family: Montserrat, sans-serif;"><span data-dcnode-id="389" instrument_node="">The cost for the consultation will be 195.00.</span></span></div><div data-dcnode-id="384"><span data-dcnode-id="385" style="color: #3a3a3a; font-family: Montserrat, sans-serif;"><span data-dcnode-id="386" instrument_node="">The cost for the procedure will be 455.00.&nbsp;</span></span></div><div data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">&nbsp;</span></div><div data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">You will need to pay the lab directly for your follow-up semen analysis approximate cost is 65.00 per sample. You may need to go for more than one analysis.</span></div></div></div><span data-dcnode-id="377" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//willowclinic.ca/index.php/vasectomy"><span data-dcnode-id="363" instrument_node="">FAQs</span></a><span data-dcnode-id="361" instrument_node="">
</span></div><span data-dcnode-id="359" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-2146" class="elementor-tab-content elementor-clearfix" data-dcnode-id="253" data-tab="6" id="elementor-tab-content-2146" role="tabpanel"><h5 data-dcnode-id="356"><span data-dcnode-id="357" style="color: #339966;"><span data-dcnode-id="358" instrument_node="">Frequently Asked Questions:</span></span></h5><p data-dcnode-id="350"><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Does vasectomy change your sex drive?</span></strong><span data-dcnode-id="353" instrument_node=""> </span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">For most patients, not at all. If any change does occur, more patients note an INCREASED sex drive after vasectomy. Vasectomy does not affect the male hormones produced by the testicles. After vasectomy, sexual function does not change. Sensation, erection, and ejaculation are the same except the ejaculate no longer contains sperm.</span></p><p data-dcnode-id="344"><strong data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Will I be able to notice any change in my semen?</span></strong><span data-dcnode-id="347" instrument_node=""> </span><br data-dcnode-id="346"><span data-dcnode-id="345" instrument_node="">No. The amount of sperm in semen is so small that patients do not notice any change. More than 95% of the semen in made in the glands above the vas tubes, the prostate and seminal vesicles, with only a small portion of the total volume being made in the testes. After a vasectomy the only way to tell the difference in the semen is with a microscopic semen analysis. Vasectomy does not prevent ejaculation.</span></p><p data-dcnode-id="338"><strong data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">What happens to the sperm after a vasectomy?</span></strong><span data-dcnode-id="341" instrument_node=""> </span><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node="">Your body reabsorbs the sperm cells. Our bodies are very good at recycling old or unused cells. For example, we make red blood cells every day and our bodies do not become overloaded with excess blood. Our bodies simply reabsorb the older blood cells, recycling their proteins and parts.</span></p><p data-dcnode-id="332"><strong data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">What is the recovery like?</span></strong><span data-dcnode-id="335" instrument_node=""> </span><br data-dcnode-id="334"><span data-dcnode-id="333" instrument_node="">Most patients feel some soreness for a night or two after the procedure and then feel fine. Wear an athletic supporter (jock strap) over your underwear for the first few days after the vasectomy to decrease your discomfort and chances of bleeding. Avoid any vigorous activity, including sports and sex, for the first 3-7 days after your vasectomy.</span></p><p data-dcnode-id="326"><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Why do I have to wait 3 months to get my semen checked?</span></strong><span data-dcnode-id="329" instrument_node=""> </span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node="">You should not consider yourself “clear” until a semen check verifies that your semen no longer contains viable sperm. The semen check is an important part of vasectomy, but bringing the sample in too soon can give you a scare. Sperm can hide in the prostate and seminal vesicles for 2-3 months, so early on a sperm count could be positive even though the vas tubes were successfully sealed. Waiting allows the hidden sperm to be flushed out. There is a very rare chance that the tubes can grow back together after a vasectomy. After three months, the semen analysis should show if this occurred. The sample can be collected in the comfort of your own home. The semen check is a simple, last step in the process to ensure a successful vasectomy.</span></p><p data-dcnode-id="320"><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Will I be comfortable with a female physician?</span></strong><span data-dcnode-id="323" instrument_node=""> </span><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node="">As a family physician, our vasectomy doctor has extensive experience with patients of all genders. Our clinical expertise and communication styles allow us to put our patients at ease and to provide excellent care. Your safety and comfort are our goals. Our patients find our female doctor comfortable to talk with. We treat everyone with dignity and respect. We are extremely gentle with procedural care, and have the utmost respect for the privacy of our patients.</span></p><p data-dcnode-id="310"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">What does it cost for the vasectomy?</span></strong><br data-dcnode-id="317"><span data-dcnode-id="316" instrument_node="">If you have a valid BC Services Card there is no charge to you for the procedure. </span><br data-dcnode-id="315"><span data-dcnode-id="314" instrument_node="">If you </span><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">DO NOT</span></strong><span data-dcnode-id="311" instrument_node=""> have a valid BC Services Card the cost will be 650.00.</span></p><p data-dcnode-id="305"><strong data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Can I bring someone with me to the appointment?</span></strong><br data-dcnode-id="307"><span data-dcnode-id="306" instrument_node="">No, unfortunately at this time we are not allowing partners or family members into the clinic. You will need to have someone waiting outside for you to drive you home.</span></p><p data-dcnode-id="300"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">How long is the appointment?</span></strong><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">You will be in the clinic for approximately 45 – 60 minutes. The actual procedure takes about 20 minutes and then we will ask you to rest for a few minutes afterwards before leaving the clinic.</span></p><p data-dcnode-id="295"><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">What do I need to bring with me to the appointment?</span></strong><br data-dcnode-id="297"><span data-dcnode-id="296" instrument_node="">You will need to bring your valid BC medical card and your athletic supporter. Please have a ride organized as well.</span></p><p data-dcnode-id="289"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">How effective is no needle, no scalpel vasectomy?</span></strong><span data-dcnode-id="292" instrument_node=""> </span><br data-dcnode-id="291"><span data-dcnode-id="290" instrument_node="">Vasectomy is the most effective of all the methods of birth control. However, nothing is perfect and the reported failure rate for vasectomy is 0.4%. This means that 4 out of 1000 will remain fertile. Failure can occur due to reconnection of the cut ends during healing, formation of a new channel through a sperm granuloma, failure to identify and cut the vas, or duplication of the vas on one side. If repeated semen analysis remain positive for motile sperm after several months, we can repeat the vasectomy procedure.</span></p><p data-dcnode-id="284"><strong data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Can the vasectomy be reversed if I change my mind later?</span></strong><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node="">Vasectomy should be considered a permanent operation. If you change your mind and want a reversal, this can be done with microscopic surgery by a skilled and experienced surgeon. This will usually require general anesthesia in the hospital, and the cost is not covered by our provincial health insurance (MSP). Even after a reversal surgery, as many as 50% will not succeed in having children.</span></p><p data-dcnode-id="279"><strong data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Do you recommend sperm storage?</span></strong><br data-dcnode-id="281"><span data-dcnode-id="280" instrument_node="">Yes, especially for those under age 35 and those with fewer than two children.</span></p><p data-dcnode-id="274"><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Who do I contact if I would like to store my sperm before my vasectomy?</span></strong><br data-dcnode-id="276"><span data-dcnode-id="275" instrument_node="">Local fertility clinics provide this service.</span></p><p data-dcnode-id="269"><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Does vasectomy increase my chances of getting cancer?</span></strong><br data-dcnode-id="271"><span data-dcnode-id="270" instrument_node="">No long-term adverse side effects have been proven with vasectomy. Ongoing studies have not demonstrated that vasectomy plays any role in prostate cancer. Medical scientists continue to explore the minor changes in the body associated with vasectomy. While it is possible that there are undiscovered health risks, this small possible risk should be weighed against the benefits of vasectomy and the risks of other methods of contraception.</span></p><p data-dcnode-id="264"><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">How much bleeding should I expect?</span></strong><br data-dcnode-id="266"><span data-dcnode-id="265" instrument_node="">A painless bruise or black-and-blue color might appear around the scrotum and the base of the penis on the second or third day. It is harmless and will fade over several days. If you develop a large bluish lump inside the scrotum the size of a golf ball, in the first two days, it may be a hematoma (blood accumulation). It is important to treat this (very rare) complication early, so call the clinic day or night.</span></p><p data-dcnode-id="259"><strong data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">How soon after the vasectomy can I have sex?</span></strong><br data-dcnode-id="261"><span data-dcnode-id="260" instrument_node="">Wait at least 2 days. When you no longer have any pain or tenderness you may ejaculate. Go slow for the first week. After 7 days there are no restrictions, but YOU MUST USE A RELIABLE FORM OF CONTRACEPTION until you are cleared by a negative semen test.</span></p><p data-dcnode-id="254"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">I can feel a tiny pea sized lump – is this normal?</span></strong><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node="">On each side of your scrotum, the tube ends will develop a BB to pea-size nodule where the vasectomy was done. This scar is normal and permanent. Initially it will be tender if you pinch it, (so don’t). The tenderness should resolve within a few months.</span></p></div><span data-dcnode-id="252" instrument_node="">
