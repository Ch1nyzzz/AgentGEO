_inner" data-dcnode-id="1041"><a data-dcnode-id="1042" data-metrics-link="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/default.htm"><span data-dcnode-id="1043" instrument_node=""> Health Insurance and Medicare </span></a></span><i class="webmd-breadcrumb__separator webmd-icon-right-arrow" data-dcnode-id="1040"></i></li><li aria-current="page" class="webmd-breadcrumb__item" data-dcnode-id="1034"><span class="webmd-breadcrumb__inner" data-dcnode-id="1036"><a data-dcnode-id="1037" data-metrics-link="2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/medical-reference/default.htm"><span data-dcnode-id="1038" instrument_node=""> Reference </span></a></span><i class="webmd-breadcrumb__separator webmd-icon-right-arrow" data-dcnode-id="1035"></i></li></ul></div><div class="left-nav-toggle" data-chronicle="091e9c5e81414042" data-dcnode-id="1026" data-e2e="left-nav-toggle-middle" data-location="middle" data-metrics-link="xpnd" data-metrics-module="lln-ctrcnav" data-toggle-selector="main-container-1" data-v-06aad6e5=""><h3 data-dcnode-id="1027" data-v-06aad6e5=""><span data-dcnode-id="1029" instrument_node=""> Menu </span><i class="up-down-arrow-position webmd-icon-down-arrow" data-dcnode-id="1028" data-v-06aad6e5=""></i></h3></div></div><div class="pane webmd-row" data-dcnode-id="749" id="ContentPane30" tabindex="-1"><article class="article medref" data-artid="091e9c5e80e168a7" data-chronicle="091e9c5e81e48710" data-dcnode-id="750" data-e2e="dart-medref" data-module-type="dynamic-article" data-page="1"><header data-dcnode-id="1011"><h1 data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node=""> Is This Covered Under the Affordable Care Act? </span></h1></header><div class="med-wrap" data-dcnode-id="995"><div data-dcnode-id="997"><span class="reviewer-info" data-chronicle="091e9c5e81e48710" data-dcnode-id="998" data-e2e="asset-medical-review" data-metrics-module="embd-lnk"><span data-dcnode-id="1008"><i class="webmd-icon-checkmark med-review-check" data-dcnode-id="1009"></i></span><span data-dcnode-id="999"><span data-dcnode-id="1007" instrument_node=""> Medically Reviewed by </span><a class="person" data-dcnode-id="1005" data-metrics-link="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sarah-goodell"><span data-dcnode-id="1006" instrument_node=""> Sarah  Goodell </span></a><span class="no-link" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node=""> </span></span><span class="revDate" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node=""> on October 26, 2020 </span></span></span></span></div></div><div data-dcnode-id="990"></div><div class="article__body" data-dcnode-id="831" data-metrics-module="embd-lnk"><div class="article-page active-page" data-dcnode-id="919" data-page="1"><section data-dcnode-id="976"><p data-dcnode-id="979"><span data-dcnode-id="989" instrument_node="">The </span><a data-dcnode-id="987" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/zz-old-toc"><span data-dcnode-id="988" instrument_node="">Affordable Care Act</span></a><span data-dcnode-id="986" instrument_node=""> put in place 10 essential health benefits that health insurance policies must cover. These policies include those offered through a state </span><a data-crosslink-type="article" data-dcnode-id="984" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/health-marketplace"><span data-dcnode-id="985" instrument_node="">Marketplace</span></a><span data-dcnode-id="983" instrument_node="">, sold on the individual market, or offered through small employers (those with 50 or fewer employees). Plans that existed prior to March 2010 that have not substantially changed do not have to include the essential health benefits.&nbsp;Short-term health plans – those in effect for less than 12 months – also do not have to offer these benefits. Finally, large employers do not have to offer the essential health benefits, although the majority do so. The essential health benefits are broad service categories such as emergency room visits, </span><a data-crosslink-type="article" data-dcnode-id="981" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/index-drugs.aspx"><span data-dcnode-id="982" instrument_node="">prescription drugs</span></a><span data-dcnode-id="980" instrument_node="">, and lab tests.</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Within these categories, each state has the option to provide greater details on the services that are covered. So depending on where you live, there may be differences in the essential health benefits. Here’s a list to help you sort it out. Check with your insurance company if you have specific questions. That way you'll know ahead of time what you'll have to pay for on your own.</span></p></section><section data-dcnode-id="920"><pagebreak data-dcnode-id="921"><span data-dcnode-id="975" instrument_node=""> </span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Essential Health Benefits:</span></p><ol data-dcnode-id="952"><li data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Ambulatory Care -- also known as out-patient care, such as a visit to your primary care doctor</span></li><li data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Emergency Services</span></li><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Hospital Care</span></li><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Maternity and Newborn Care</span></li><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Mental Health and Substance Use Services</span></li><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Prescription Drugs</span></li><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Rehabilitative and Habilitative Services -- for example, treatment that can help you recover from a stroke or treatment that can help a child with autism spectrum disorder learn to speak</span></li><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Laboratory Services</span></li><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Preventive and Wellness Services</span></li><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Pediatric Services</span></li></ol><div class="module ad emb-center-well-ad ad-923" data-dcnode-id="951" id="ad-centerwell-pos-923-1"></div><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Benefit Details</span></p><p data-dcnode-id="934"><b data-dcnode-id="945"><a data-crosslink-type="article" data-dcnode-id="947" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/beauty/treatments/default.htm"><span data-dcnode-id="948" instrument_node="">Cosmetic surgery</span></a><span data-dcnode-id="946" instrument_node="">:</span></b><span data-dcnode-id="944" instrument_node=""> Most </span><a data-dcnode-id="942" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/protect-health-13/reform-options"><span data-dcnode-id="943" instrument_node="">insurance plans</span></a><span data-dcnode-id="941" instrument_node=""> did not cover </span><a data-crosslink-type="slideshow" data-dcnode-id="939" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/beauty/ss/slideshow-cosmetic-surgery"><span data-dcnode-id="940" instrument_node="">cosmetic surgery</span></a><span data-dcnode-id="938" instrument_node=""> before the Affordable Care Act, and that hasn’t changed. But some plans do cover </span><a data-crosslink-type="article" data-dcnode-id="936" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-beauty/guide/skin-beauty-plastic-surgery"><span data-dcnode-id="937" instrument_node="">plastic surgery</span></a><span data-dcnode-id="935" instrument_node=""> if it’s needed for a medical reason. For instance, if you have a baby born with a birth defect, your insurance might cover it.</span></p><div class="module ad ad-5000" data-block-codes="_nn11_nn4_age234_cust2_cust017_age121_diet_h_o04_sex1_" data-dcnode-id="933" data-is-mobile="false" data-pos="5000" data-sizes="[]" data-targets="{&quot;art&quot;:&quot;091e9c5e80e168a7&quot;,&quot;cc&quot;:&quot;16&quot;,&quot;env&quot;:&quot;0&quot;,&quot;hcent&quot;:&quot;1074&quot;,&quot;leaf&quot;:&quot;&quot;,&quot;mcent&quot;:&quot;&quot;,&quot;mic&quot;:&quot;&quot;,&quot;pt&quot;:&quot;4241&quot;,&quot;sec&quot;:&quot;&quot;,&quot;pug&quot;:&quot;&quot;,&quot;scent&quot;:&quot;&quot;,&quot;tmg&quot;:&quot;&quot;,&quot;tug&quot;:&quot;&quot;,&quot;uri&quot;:&quot;/health-insurance/affordable-care-act-is-this-covered&quot;,&quot;rd&quot;:&quot;1&quot;,&quot;tex&quot;:&quot;vuejs&quot;}" id="ad-pos-5000-1"></div><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:108}" data-dcnode-id="926"><b data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Weight-loss surgery:</span></b><span data-dcnode-id="930" instrument_node=""> This depends on the state. Nearly half of the states cover </span><a data-crosslink-type="article" data-dcnode-id="928" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/weight-loss-surgery/default.htm"><span data-dcnode-id="929" instrument_node="">weight loss surgery</span></a><span data-dcnode-id="927" instrument_node="">. Check with your state's Marketplace to find out.&nbsp;</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:72}" data-dcnode-id="922"><b data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Substance abuse counseling:</span></b><span data-dcnode-id="923" instrument_node=""> This is considered an essential health benefit that insurers must cover.</span></p></pagebreak></section></div><div class="article-page active-page" data-dcnode-id="832" data-page="2"><div class="module ad emb-top-ad ad-923" data-dcnode-id="918" id="ad-top-pos-923-2"></div><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:750.03125}" data-dcnode-id="890"><span data-dcnode-id="917" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:288}" data-dcnode-id="910"><b data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Dental:</span></b><span data-dcnode-id="914" instrument_node=""> Your health insurance does not have to offer dental care for adults. However, insurers must offer dental coverage for children. If you buy insurance through the </span><a data-crosslink-type="video" data-dcnode-id="912" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/video/what-is-the-insurance-marketplace"><span data-dcnode-id="913" instrument_node="">Marketplace</span></a><span data-dcnode-id="911" instrument_node="">, this may be part of your regular health plan. Or you may have to buy a stand-alone dental plan if you want coverage for your children. It's up to the states to decide whether to require parents to buy these plans&nbsp;for their children.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:180}" data-dcnode-id="900"><b data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Vision:</span></b><span data-dcnode-id="907" instrument_node=""> You'll find the same limits on </span><a data-crosslink-type="slideshow" data-dcnode-id="905" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/eye-health/ss/slideshow-healthier-eyes"><span data-dcnode-id="906" instrument_node="">vision</span></a><span data-dcnode-id="904" instrument_node=""> care as on dental care. Insurance companies don’t have to offer </span><a data-crosslink-type="tools" data-dcnode-id="902" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/eye-health/eye-assessment/default.htm"><span data-dcnode-id="903" instrument_node="">vision</span></a><span data-dcnode-id="901" instrument_node=""> coverage for adults, but they do for children. You might have to buy a stand-alone vision plan to cover your children in some states.&nbsp;</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:252}" data-dcnode-id="891"><b data-dcnode-id="896"><a data-crosslink-type="article" data-dcnode-id="898" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/women/picture-of-the-breasts"><span data-dcnode-id="899" instrument_node="">Breast</span></a><span data-dcnode-id="897" instrument_node="">feeding:</span></b><span data-dcnode-id="895" instrument_node=""> Any plan bought through a Marketplace, on the individual market, or through your small employer must offer </span><a data-crosslink-type="tools" data-dcnode-id="893" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/women/all-about-breasts-16/rm-quiz-breasts-normal"><span data-dcnode-id="894" instrument_node="">breast</span></a><span data-dcnode-id="892" instrument_node="">feeding support, counseling, and equipment. Your plan must cover the cost of a breast pump, but your insurance company can decide whether to buy you a new one or rent one for you, and specify the kind of pump you can get.</span></p></section><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:1142.09375}" data-dcnode-id="833"><span data-dcnode-id="889" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:108}" data-dcnode-id="885"><b data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Home health care:</span></b><span data-dcnode-id="886" instrument_node=""> All states include home health care in their definition of essential health benefits. Home care may be subject to limits on the number of visits.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:144}" data-dcnode-id="879"><b data-dcnode-id="881"><a data-crosslink-type="article" data-dcnode-id="883" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/pain-management/guide/chiropractic-pain-relief"><span data-dcnode-id="884" instrument_node="">Chiropractic</span></a><span data-dcnode-id="882" instrument_node=""> care:</span></b><span data-dcnode-id="880" instrument_node=""> Most states cover this type of care, but check with yours to make sure. In some states, your insurance must pay for a chiropractic doctor who provides medical services that are essential health benefits.</span></p><div class="module ad emb-center-well-ad ad-923" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:132}" data-dcnode-id="878" id="ad-centerwell-pos-923-2"></div><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:72}" data-dcnode-id="872"><b data-dcnode-id="874"><a data-crosslink-type="article" data-dcnode-id="876" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/pain-management/consider-acupuncture"><span data-dcnode-id="877" instrument_node="">Acupuncture</span></a><span data-dcnode-id="875" instrument_node="">:</span></b><span data-dcnode-id="873" instrument_node=""> Only a handful of states cover acupuncture. Check with your Marketplace.&nbsp;</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:108}" data-dcnode-id="860"><b data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Male contraception: </span></b><a data-crosslink-type="tools" data-dcnode-id="868" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex/birth-control/birth-control-rm-quiz-html"><span data-dcnode-id="869" instrument_node="">Birth control</span></a><span data-dcnode-id="867" instrument_node=""> for women is covered at no cost to you. Male </span><a data-crosslink-type="slideshow" data-dcnode-id="865" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex/birth-control/ss/slideshow-birth-control-options"><span data-dcnode-id="866" instrument_node="">contraception</span></a><span data-dcnode-id="864" instrument_node="">, such as a vasectomy, </span><a data-crosslink-type="article" data-dcnode-id="862" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex/birth-control/birth-control-condoms"><span data-dcnode-id="863" instrument_node="">condoms</span></a><span data-dcnode-id="861" instrument_node="">, or other methods, is not.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:144}" data-dcnode-id="854"><b data-dcnode-id="856"><a data-crosslink-type="article" data-dcnode-id="858" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/mental-health/guide-to-psychiatry-and-counseling"><span data-dcnode-id="859" instrument_node="">Psychotherapy</span></a><span data-dcnode-id="857" instrument_node="">:</span></b><span data-dcnode-id="855" instrument_node=""> Mental health benefits are considered an essential benefit and are covered. The law also requires that mental health benefits be equal to a plan’s coverage of medical or surgical care.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:180}" data-dcnode-id="841"><b data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Long-term care:</span></b><span data-dcnode-id="851" instrument_node=""> You will need to pay for long-term care if you become disabled or need to move to a nursing home. It's not an essential health benefit under the </span><a data-crosslink-type="tools" data-dcnode-id="849" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/rm-quiz-insurance-basics"><span data-dcnode-id="850" instrument_node="">Affordable Care Act</span></a><span data-dcnode-id="848" instrument_node=""> and is not covered by </span><a data-crosslink-type="article" data-dcnode-id="846" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/medicare-eligibility-and-enrollment"><span data-dcnode-id="847" instrument_node="">Medicare</span></a><span data-dcnode-id="845" instrument_node=""> or most private </span><a data-crosslink-type="article" data-dcnode-id="843" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/types-of-health-insurance-plans"><span data-dcnode-id="844" instrument_node="">health plans</span></a><span data-dcnode-id="842" instrument_node="">.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:144}" data-dcnode-id="834"><b data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Abortion:</span></b><span data-dcnode-id="838" instrument_node=""> Abortion is not one of the essential health benefits. States have the right to ban abortion coverage in </span><a data-dcnode-id="836" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/health-insurance/insurance-basics/types-of-health-insurance-plans"><span data-dcnode-id="837" instrument_node="">health plans</span></a><span data-dcnode-id="835" instrument_node=""> sold on the state Marketplace. Check with your individual plan to see whether it is covered.</span></p></section></div></div><footer data-dcnode-id="757" style=""><div class="pub-info-and-share-bar" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:42}" data-dcnode-id="764"><div class="article__publication-sources" data-_get-element-size="{&quot;w&quot;:135.15625,&quot;h&quot;:29}" data-dcnode-id="787"><span class="sources" data-_get-element-size="{&quot;w&quot;:0,&quot;h&quot;:0}" data-chronicle="091e9c5e81e48710" data-dcnode-id="788" data-e2e="dart-sources"><h4 class="sources__header" data-_get-element-size="{&quot;w&quot;:135.15625,&quot;h&quot;:18}" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node=""> Show Sources </span></h4><div class="sources__wrapper" data-dcnode-id="789"><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">SOURCES:</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Health Affairs/Robert Wood Johnson Foundation: "Essential Health Benefits."</span></p><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Robert Wood Johnson Foundation: "Essential Health Benefits: 50 State Variations on a Theme."</span></p><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Kaiser Family Foundation: "Obamacare Insurance Won’t Cover Weight-Loss Surgery In Many States" and "Health Law Boosts Status Of Alternative Medicine -- At Least On Paper."</span></p><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">American Society of Plastic Surgeons: "Cosmetic Procedures."</span></p><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">American Dental Association: "Potential Effects of the Affordable Care Act on Dentistry."</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">National Conference of State Legislatures: "State Health Insurance Mandates and the ACA Essential Benefits Provisions" and "Health Reform and A
