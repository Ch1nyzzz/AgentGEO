</span><h1 data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">TREATMENTS AND SURGERIES | No needle, no scalpel vasectomy</span></h1><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span><div class="main-desc-block main-cms-content-block clearfix" data-dcnode-id="1174"><span data-dcnode-id="1248" instrument_node="">
</span><div class="col-left" data-dcnode-id="1182"><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1246" instrument_node="">Dr. Marois is qualified to perform a no </span><strong data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">needle</span></strong><span data-dcnode-id="1243" instrument_node="">, no </span><strong data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">scalpel vasectomy</span></strong><span data-dcnode-id="1240" instrument_node="">, also known as a </span><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">keyhole vasectomy</span></strong><span data-dcnode-id="1237" instrument_node="">, at his </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lescliniquesmaroisurologue.ca/en/contact-us/"><span data-dcnode-id="1236" instrument_node="">urology clinics</span></a><span data-dcnode-id="1234" instrument_node=""> in Greater </span><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Montreal</span></strong><span data-dcnode-id="1231" instrument_node=""> and </span><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Quebec City</span></strong><span data-dcnode-id="1228" instrument_node="">.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1225" instrument_node="">Usually, the first step for patients seeking a </span><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1222" instrument_node=""> is to schedule an initial consultation. During this appointment, the patient fills out a short questionnaire, undergoes a physical examination and is given details about the procedure. Afterward, a second appointment is scheduled for the </span><strong data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1219" instrument_node="">. This take two separate appointments, and involved fees for consultation AND surgery.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1216" instrument_node="">Alternatively, patients can have both the initial exam and the </span><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1213" instrument_node="">&nbsp;during a single appointment. However, this is only possible if the exam is normal and the patient does not have a bold disorder or has stopped taking blood thinners.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1208"><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">For your convince and preferences, we offer both possibilities.</span></strong></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1206" instrument_node="">Note that Dr. Marois will have to perform the </span><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1203" instrument_node=""> with two incisions if the patient is overweight, has a small scrotum, has a short vas deferens or has already had a surgery in his genital area (such as a </span><strong data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">vasovasostomy</span></strong><span data-dcnode-id="1200" instrument_node="">).</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">We recommend that the patient be accompanied by another person. When patients have someone with them, they can be offered medication if they begin to feel anxious.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">Furthermore, we recommend that the patient avoid drinking coffee or taking any other stimulants on the morning of the </span><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">vasectomy and</span></strong><span data-dcnode-id="1191" instrument_node="">&nbsp;that the patient wears tight- fitting underwear for better support.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">Please note that the </span><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">vasectomy procedure</span></strong><span data-dcnode-id="1185" instrument_node=""> is performed in an unaffiliated private clinic and can’t be reimbursed through the Regie de l’assurance maladie du Québec (RAMQ). The confirmation of the patient’s sterility is sent by email after receipt of the results of the spermogram. If, in some rare cases, a second vasectomy should be necessary, we will proceed at 50% the regular price.</span></p><span data-dcnode-id="1183" instrument_node="">
</span></div><span data-dcnode-id="1181" instrument_node="">
</span><div class="col-right" data-dcnode-id="1176"><span data-dcnode-id="1180" instrument_node="">
</span><div class="img-block" data-dcnode-id="1178"><img data-dcnode-id="1179" data-srcset="https://www.lescliniquesmaroisurologue.ca/wp-content/uploads/2018/07/Pagevasectomie.jpg 528w, https://www.lescliniquesmaroisurologue.ca/wp-content/uploads/2018/07/Pagevasectomie-200x300.jpg 200w" sizes="(max-width: 528px) 100vw, 528px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lescliniquesmaroisurologue.ca/wp-content/uploads/2018/07/Pagevasectomie.jpg&amp;raw" srcset="https://www.lescliniquesmaroisurologue.ca/wp-content/uploads/2018/07/Pagevasectomie.jpg 528w, https://www.lescliniquesmaroisurologue.ca/wp-content/uploads/2018/07/Pagevasectomie-200x300.jpg 200w" title="vasectomy"></div><span data-dcnode-id="1177" instrument_node=""> </span></div><span data-dcnode-id="1175" instrument_node="">
</span></div><span data-dcnode-id="1173" instrument_node="">
</span><div class="note-wide-block" data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Please note that vasectomies are only performed in a disaffiliated private clinic and therefore not covered by the RAMQ. They are usually carried out in a single appointment. This includes consultation and infertility notification by email after reception of the spermogram’s results.

</span></p><span data-dcnode-id="1169" instrument_node="">
</span></div><span data-dcnode-id="1167" instrument_node="">
</span><div class="faq-module-block" data-dcnode-id="954"><span data-dcnode-id="1166" instrument_node="">
</span><div class="faq-main-block" data-dcnode-id="956"><span data-dcnode-id="1165" instrument_node="">
</span><div class="item-block" data-dcnode-id="1133"><span data-dcnode-id="1164" instrument_node="">
</span><div class="title-block" data-dcnode-id="1161"><h2 data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">What happens during a vasectomy?</span></h2></div><span data-dcnode-id="1160" instrument_node="">
</span><div class="desc-block" data-dcnode-id="1140"><span data-dcnode-id="1159" instrument_node="">The vasectomy begins by laying the patient on a table in an operating room designated for
minor surgeries. </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lescliniquesmaroisurologue.ca/en/about/"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Dr. Marois</span></strong></a><span data-dcnode-id="1155" instrument_node=""> then administers a local anesthetic in the skin of the scrotum with
a needle-free injector (MADAJET). It takes 5 to 10 minutes for the anesthetic to become maximally effective. After, the area around the genitals is disinfected.
</span><br data-dcnode-id="1154"><span data-dcnode-id="1153" instrument_node="">
</span><br data-dcnode-id="1152"><span data-dcnode-id="1151" instrument_node="">
A no</span><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node=""> needle</span></strong><span data-dcnode-id="1148" instrument_node="">, no </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">scalpel vasectomy</span></strong><span data-dcnode-id="1145" instrument_node=""> involves several steps. First, Dr. Marois will hold the vas deferens in place using a clamp. Next, he will remove the vas so that it can be cauterized and ligated at either end.
</span><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">
</span><br data-dcnode-id="1142"><span data-dcnode-id="1141" instrument_node="">
Dr. Marois never uses metal clips to clamp the vas deferens. To minimize the risk of recanalization, Dr. Marois will isolate the vas deferens on the abdominal side by interposing spermatic fascia. This unique method takes a few minutes of extra work for each duct. It involves covering the vas deferens with a resorbable thread and a layer of tissue that encircles each duct.



</span></div><span data-dcnode-id="1139" instrument_node="">
</span><div class="link-btn-block" data-dcnode-id="1135"><span data-dcnode-id="1138" instrument_node="">
</span><a class="link-btn hover-elem" data-dcnode-id="1137" href="#"></a><span data-dcnode-id="1136" instrument_node="">
</span></div><span data-dcnode-id="1134" instrument_node="">
</span></div><span data-dcnode-id="1132" instrument_node="">
</span><div class="item-block" data-dcnode-id="1111"><span data-dcnode-id="1131" instrument_node="">
</span><div class="title-block" data-dcnode-id="1128"><h2 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Is a vasectomy a permanent method of contraception?</span></h2></div><span data-dcnode-id="1127" instrument_node="">
</span><div class="desc-block" data-dcnode-id="1118"><span data-dcnode-id="1126" instrument_node="">Normally, a vasectomy is not reversible. If the patient changes his mind and wants to have children at some point after his </span><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1123" instrument_node="">, a </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lescliniquesmaroisurologue.ca/en/procedures/vasovasostomy-vasectomy-reversal/"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">vasovasostomy</span></strong></a><span data-dcnode-id="1119" instrument_node=""> can be attempted. However, there’s no guarantee the procedure will be a success.

</span></div><span data-dcnode-id="1117" instrument_node="">
</span><div class="link-btn-block" data-dcnode-id="1113"><span data-dcnode-id="1116" instrument_node="">
</span><a class="link-btn hover-elem" data-dcnode-id="1115" href="#"></a><span data-dcnode-id="1114" instrument_node="">
</span></div><span data-dcnode-id="1112" instrument_node="">
</span></div><span data-dcnode-id="1110" instrument_node="">
</span><div class="item-block" data-dcnode-id="1085"><span data-dcnode-id="1109" instrument_node="">
</span><div class="title-block" data-dcnode-id="1106"><h2 data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Are there potential complications to having a vasectomy?</span></h2></div><span data-dcnode-id="1105" instrument_node="">
</span><div class="desc-block" data-dcnode-id="1092"><span data-dcnode-id="1104" instrument_node="">Complications are uncommon, but bleeding, infection, swelling or pain in the scrotum may occur. If inflammation and discomfort persist, an anti-inflammatory medication may be prescribed.
</span><br data-dcnode-id="1103"><span data-dcnode-id="1102" instrument_node="">
</span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">
Very rarely, the vas deferens grows back prior to the spermogram. This is known as early recanalization and occurs when the two ends of the canals reattach and allow the passage of spermatozoa (making the patient fertile).
</span><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">
</span><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">
Delayed spontaneous canalization, occurring after the </span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1093" instrument_node=""> when the vas deferens has been cut, ligated and cauterized, is very rare.</span></div><span data-dcnode-id="1091" instrument_node="">
</span><div class="link-btn-block" data-dcnode-id="1087"><span data-dcnode-id="1090" instrument_node="">
</span><a class="link-btn hover-elem" data-dcnode-id="1089" href="#"></a><span data-dcnode-id="1088" instrument_node="">
</span></div><span data-dcnode-id="1086" instrument_node="">
</span></div><span data-dcnode-id="1084" instrument_node="">
</span><div class="item-block" data-dcnode-id="1067"><span data-dcnode-id="1083" instrument_node="">
</span><div class="title-block" data-dcnode-id="1080"><h2 data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Are there medical contraindications to a no needle, no scalpel vasectomy?</span></h2></div><span data-dcnode-id="1079" instrument_node="">
</span><div class="desc-block" data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node="">There are a small number of contraindications, all of which are uncommon. These include uncertainty about whether or not one wants to have children, blood clotting disorders, an inguinal hernia and an undescended testicle. Some patients choose to get a unilateral </span><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1075" instrument_node="">, a procedure in which only one vas deferens is cut.</span></div><span data-dcnode-id="1073" instrument_node="">
</span><div class="link-btn-block" data-dcnode-id="1069"><span data-dcnode-id="1072" instrument_node="">
</span><a class="link-btn hover-elem" data-dcnode-id="1071" href="#"></a><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span></div><span data-dcnode-id="1066" instrument_node="">
</span><div class="item-block" data-dcnode-id="1052"><span data-dcnode-id="1065" instrument_node="">
</span><div class="title-block" data-dcnode-id="1062"><h2 data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Does having a vasectomy influence your sex life?</span></h2></div><span data-dcnode-id="1061" instrument_node="">
</span><div class="desc-block" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">The patient’s sex life won’t be affected. There will be no changes in the sensations he feels during sex and no difference in his erection or his ability to ejaculate. Although the ejaculation fluid will no longer contain sperm, the patient won’t notice the difference, as sperm only makes up a small fraction of the fluid. (Most of the ejaculation fluid is produced in the seminal vesicles, two small sacs located at the base of the prostrate where the vas deferens open.)</span></div><span data-dcnode-id="1058" instrument_node="">
</span><div class="link-btn-block" data-dcnode-id="1054"><span data-dcnode-id="1057" instrument_node="">
</span><a class="link-btn hover-elem" data-dcnode-id="1056" href="#"></a><span data-dcnode-id="1055" instrument_node="">
</span></div><span data-dcnode-id="1053" instrument_node="">
</span></div><span data-dcnode-id="1051" instrument_node="">
</span><div class="item-block" data-dcnode-id="1029"><span data-dcnode-id="1050" instrument_node="">
</span><div class="title-block" data-dcnode-id="1047"><h2 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Is the administration of the anesthetic painful?</span></h2></div><span data-dcnode-id="1046" instrument_node="">
</span><div class="desc-block" data-dcnode-id="1036"><span data-dcnode-id="1045" instrument_node="">Vasectomies are usually performed under local anesthesia. This involves injecting a high-pressure liquid anesthetic under the skin. The patient will feel a pinching sensation, a bit like a blow from an elastic band. The anesthetic ensures that there will be no more feeling in the skin or the underlying tissue.
</span><br data-dcnode-id="1044"><span data-dcnode-id="1043" instrument_node="">
</span><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">
However, the anesthetic is confined to the area around the injection and sometimes an unpleasant sensation can be faintly felt at the upper part of the vas deferens, in the abdomen.
</span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">
</span><br data-dcnode-id="1038"><span data-dcnode-id="1037" instrument_node="">
There’s a small risk of hematoma, since the needle is inserted near veins. The surgery can begin 5 to 10 minutes after the anesthetic has been administered. Medication is offered to accompanied patients who are anxious about the procedure.</span></div><span data-dcnode-id="1035" instrument_node="">
</span><div class="link-btn-block" data-dcnode-id="1031"><span data-dcnode-id="1034" instrument_node="">
</span><a class="link-btn hover-elem" data-dcnode-id="1033" href="#"></a><span data-dcnode-id="1032" instrument_node="">
</span></div><span data-dcnode-id="1030" instrument_node="">
</span></div><span data-dcnode-id="1028" instrument_node="">
</span><div class="item-block" data-dcnode-id="988"><span data-dcnode-id="1027" instrument_node="">
</span><div class="title-block" data-dcnode-id="1024"><h2 data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">What technique is used for the vasectomy?</span></h2></div><span data-dcnode-id="1023" instrument_node="">
</span><div class="desc-block" data-dcnode-id="995"><span data-dcnode-id="1022" instrument_node="">After a physical exam, </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lescliniquesmaroisurologue.ca/en/about/"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Dr. Marois </span></strong></a><span data-dcnode-id="1018" instrument_node=""> determines whether or not he patient can be operated on using the no </span><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">needle</span></strong><span data-dcnode-id="1015" instrument_node="">, no </span><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">scalpel vasectomy</span></strong><span data-dcnode-id="1012" instrument_node=""> method. This technique involves making a single incision at the centre of the scrotum. In part, the decision will depend on the length and mobility of the vas deferens. 
</span><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">
</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
Men who are overweight, had scrotal surgery or been referred to the clinic following a failed
</span><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1005" instrument_node=""> may require a </span><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">vasectomy</span></strong><span data-dcnode-id="1002" instrument_node=""> technique that involves two incisions (one on either side). This technique may also be necessary if the vas deferens are too short for a standard central incision. In such cases, the </span><strong data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">cost</span></strong><span data-dcnode-id="999" instrument_node=""> of the </span><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">vasectomy</span></strong><span data-dcnode-id="996" instrument_node=""> is higher.



</span></div><span data-dcnode-id="994" instrument_node="">
</span><div class="link-btn-block" data-dcnode-id="990"><span data-dcnode-id="993" instrument_node="">
</span><a class="link-btn hover-elem" data-dcnode-id="992" href="#"></a><span data-dcnode-id="991" instrument_node="">
</span></div><span data-dcnode-id="989" instrument_node="">
</span></div><span data-dcnode-id="987" instrument_node="">
</span><div class="item-block" data-dcnode-id="958"><span data-dcnode-id="986" instrument_node="">
</span><div class="title-block" data-dcnode-id="983"><h2 data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Can a spouse be present during the vasectomy?</span></h2></div><span data-dcnode-id="982" instrument_node="">
</span><div class="desc-block" data-dcnode-id="965"><span data-dcnode-id="981" instrument_node="">Normally yes, but not during the active COVID-19 period. Thank you for your understanding!
</span><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">
</span><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">
The person who accompanies the patient to the procedure can be present in the operating room during the </span><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">vasectomy</span></strong><span data-dcnode-id="974" instrument_node=""> if it helps to calm the patient. Note that a protective screen is placed over the patient’s chest to prevent him from seeing the surgery.
</span><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">
</span><br data-dcnode-id="971"><span data-dcnode-id="970" instrument_node="">
</span><strong data-dcnode-id="967"><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lescliniquesmaroisurologue.ca/en/contact-us/"><span data-dcnode-id="969" instrument_node=""> Contact us </span></a></strong><span data-dcnode-id="966" instrument_node=""> to schedule a no needle, no scalpel vasectomy in Montreal, Laval, on the South Shore or in Quebec City.</span></div><span data-dcnode-id="964" instrument_node="">

</span><p data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Dr. Marois is a urologist who is not a member of the Régie d’Assurance Maladie du Québec (RAMQ). As such, the clinic can not claim the RAMQ for the payment of his services. If you consult Dr Marois, you must pay for the services rendered.</span></p><span data-dcnode-id="139" instrument_node="">
</span><p class="text-bold" data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Cancellation of appointment:</span></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">To ensure the smooth running of the clinic and a minimum of courtesy towards other patients and our staff, we ask you to notify us 48 hours in advance for the cancellation of a consultation, 5 working days in advance for a surgery at the office and 21 working days in advance for a major surgery. If these deadlines are not respected, a cancellation fee of 50% of the service will be charged.</span></p><span data-dcnode-id="133" instrument_node="">
</span><p class="text-bold" data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">Change of appointment:</span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">We understand that events occur, so we ask you to provide us with at least a 24-hour notice for any change in their appointment; we will be happy to accommodate you, the best we can. However, if you fail to inform us within this timeframe or do not show up, we will charge a  
$ 100 fee.</span></p><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">Thank you for your understanding.</span></p><span data-dcnode-id="124" instrument_node="">
