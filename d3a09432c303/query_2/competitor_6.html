Kelli is passionate about assisting women through life’s transitions such as puberty, the childbearing years, perimenopause, and menopause. She is recognized as a Certified Menopause Practitioner by the North American Menopause Society and has specialized education in the performance of pelvic ultrasounds, colposcopy, pelvic floor rehabilitation, and hormone management.

Kelli has extensive experience in evaluating and treating conditions such as abnormal bleeding, abnormal pap management, pelvic pain, urinary incontinence, menopausal symptoms, and sexual dysfunction.

She has a special interest in optimizing health through hormone optimization with bio-identical hormone replacement therapy and nutritional support. In addition, Kelli is specially trained in the use of the MonaLisa Touch® laser for treatment of vaginal atrophy; Votiva for urinary incontinence/vaginal rejuvenation; BTL Emsella® for incontinence, and Morpheus8™ for fractional remodeling/contouring. She is a certified O-Shot® provider and a Biote Platinum Provider since 2014.

Kelli is a member of the North American Menopause Society, Texas Nurse Practitioners, Austin area Nurse Practitioners, and Nurse Practitioners in Women’s Health. She enjoys spending time with her daughter, practicing yoga, gardening, cooking, and scuba diving</span><div class="patient-web-app__sc-192nc1l-1 haqNYm hidden" data-dcnode-id="4723" data-test="children-wrap"><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="4744"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Practice</span></h4><ul data-dcnode-id="4745"><li data-dcnode-id="4746"><span data-dcnode-id="4747" instrument_node="">Modern Women's Health</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="4738"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Education</span></h4><ul data-dcnode-id="4739"><li data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">Emory University, Master's in Nursing</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="4724"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">Common visit reasons</span></h4><ul data-dcnode-id="4725"><li data-dcnode-id="4734"><span data-dcnode-id="4735" instrument_node="">Annual Pap Smear / GYN Exam</span></li><li data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">Annual Physical</span></li><li data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">Dermatology Consultation</span></li><li data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">General Consultation</span></li><li data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">Illness</span></li></ul></div></div><span class="patient-web-app__sc-192nc1l-2 lVjhE" data-dcnode-id="4720" data-test="show-more-button"><span data-dcnode-id="4721" dat ><div class="patient-web-app__sc-192nc1l-0 idimBL patient-web-app__sc-i5k0wr-0 dKgvhA overflown" data-dcnode-id="4589" data-test="collapsible-block"><span data-dcnode-id="4633" instrument_node="">Candice is a double board-certified nurse practitioner with over 20 years of her 23 years of nursing experience spent caring for women. She is certified as both a Family Nurse Practitioner and a Women’s Health Nurse Practitioner. Candice feels privileged to be involved in women’s healthcare throughout the lifespan. She is also recognized as a Certified Menopause Practitioner by the North American Menopause Society. She received both of her advanced practice nursing degrees from the University of Cincinnati and is a member of the Sigma Theta Tau International Honor Society and the Golden Key International Honor Society. Candice is an active member of the American Association of Nurse Practitioners, Texas Nurse Practitioners, and Nurse Practitioners in Women’s Health. In her spare time, she enjoys spending time with her family, trying new restaurants and is an avid Peloton rider.</span><div class="patient-web-app__sc-192nc1l-1 haqNYm hidden" data-dcnode-id="4596" data-test="children-wrap"><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="4627"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">Practice</span></h4><ul data-dcnode-id="4628"><li data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Modern Women's Health</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="4621"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">Education</span></h4><ul data-dcnode-id="4622"><li data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">University of Cincinnati, Master's in Women's Health Nursing</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id Kelli is passionate about assisting women through life’s transitions such as puberty, the childbearing years, perimenopause, and menopause. She is recognized as a Certified Menopause Practitioner by the North American Menopause Society and has specialized education in the performance of pelvic ultrasounds, colposcopy, pelvic floor rehabilitation, and hormone management.

Kelli has extensive experience in evaluating and treating conditions such as abnormal bleeding, abnormal pap management, pelvic pain, urinary incontinence, menopausal symptoms, and sexual dysfunction.

She has a special interest in optimizing health through hormone optimization with bio-identical hormone replacement therapy and nutritional support. In addition, Kelli is specially trained in the use of the MonaLisa Touch® laser for treatment of vaginal atrophy; Votiva for urinary incontinence/vaginal rejuvenation; BTL Emsella® for incontinence, and Morpheus8™ for fractional remodeling/contouring. She is a certified O-Shot® provider and a Biote Platinum Provider since 2014.

It's sole owner, Dr. Schanen, APRN, lived in the greater San Antonio area for over 14 years and now resides in Boerne, Texas. He has been married to Irma, who is a nurse, for 26 years and has two children who are also very supportive and involved in his business. He has been working as a clinician in various ERs in the San Antonio, Corpus Christi, and Victoria areas, but has also worked in urgent care and family health settings. His passion, however, is in providing good health and wellness care in the form of weight loss and hormone replacement therapies.

Before becoming a clinician, John owned and operated 7 outpatient physical therapy clinics located throughout South Texas for over 10 years. As a non practicing owner, the challenge and reward of not providing direct patient care was missing, so in 2009 he sold the business and enrolled in school with the goal of becoming a clinician and opening his own health care practice.

gia and obtained a bachelor’s degree in biology.  Dr. Iyamu also obtained a master’s degree in biomedical science from Barry University in Miami, Florida.   She received her medical degree from Meharry Medical College in Nashville, Tennessee.   Her family medicine residency was completed at Methodist Charlton Medical Center in Dallas, Texas.  Dr. Iyamu has been practicing medicine since 2010 and her interests include women’s health, pediatric and adolescent medicine, and preventive medicine.  Outside of work, Dr. Iyamu enjoys reading and spending time with her husband and children.</span><div class="patient-web-app__sc-192nc1l-1 haqNYm hidden" data-dcnode-id="3446" data-test="children-wrap"><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="3475"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Practice</span></h4><ul data-dcnode-id="3476"><li data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">Questcare Medical Clinic</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="3469"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Board certifications</span></h4><ul data-dcnode-id="3470"><li data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">American Board of Family Medicine</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="3461"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">Education</span></h4><ul data-dcnode-id="3462"><li data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Medical School - Meharry Medical College, Doctor of Medicine</span></li><li data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Methodist Charlton Medical Center, Residency in Family Medicine</span></li></ul></div><div class="patient-web-app__sc-st7 e-block"><span data-dcnode-id="3104" instrument_node="">Amber Szydelko is a certified Family Nurse Practitioner. She is serving as a primary provider at Questcare Flower Mound clinic serving all ages. Amber has over 5 years experience as a nurse practitioner. She has strong interest and compassion for each patient and individualizing their care. Amber believes that each patient is unique and should be treated as such.

Population we treat - 13 years old and above
At Peace Way Psychiatry ( Ameri Heals PLLC) , we make our clients feel empowered to embark on a positive journey towards a hopeful life and well-being and help them through a wide range of mental disorders including depression, bipolar disorders, sleep disorder, ADD, PTSD, and personality disorder with our individualized patient-centered psychiatric evaluations, brief therapy, psychotherapeutic interventions, and medication management.

experience focused on caring for women. After completing her Master of Science in Nursing from Emory University, she joined an OB/GYN practice in central Louisiana. She practiced there for 10 years before joining Dr. Jukes’s team in 2014.

Kelli is passionate about assisting women through life’s transitions such as puberty, the childbearing years, perimenopause, and menopause. She is recognized as a Certified Menopause Practitioner by the North American Menopause Society and has specialized education in the performance of pelvic ultrasounds, colposcopy, pelvic floor rehabilitation, and hormone management.

Kelli has extensive experience in evaluating and treating conditions such as abnormal bleeding, abnormal pap management, pelvic pain, urinary incontinence, menopausal symptoms, and sexual dysfunction.

She has a special interest in optimizing health through hormone optimization with bio-identical hormone replacement therapy and nutritional support. In addition, Kelli is specially trained in the use of the MonaLisa Touch® laser for treatment of vaginal atrophy; Votiva for urinary incontinence/vaginal rejuvenation; BTL Emsella® for incontinence, and Morpheus8™ for fractional remodeling/contouring. She is a certified O-Shot® provider and a Biote Platinum Provider since 2014.

Kelli is a member of the North American Menopause Society, Texas Nurse Practitioners, Austin area Nurse Practitioners, and Nurse Practitioners in Women’s Health. She enjoys spending time with her daughter, practicing yoga, gardening, cooking, and scuba diving</span><div class="patient-web-app__sc-192nc1l-1 haqNYm hidden" data-dcnode-id="2248" data-test="children-wrap"><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="2269"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Practice</span></h4><ul data-dcnode-id="2270"><li data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Modern Women's Health</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="2263"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Education</span></h4><ul data-dcnode-id="2264"><li data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Emory University, Master's in Nursing</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="2249"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Common visit reasons</span></h4><ul data-dcnode-id="2250"><li data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Annual Pap Smear / GYN Exam</span></li><li data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Annual Physical</span></li><li data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Dermatology Consultation</span></li><li data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">General Consultation</span></li><li data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Illness</span></li></ul></div></div><span class="patient-web-app__sc-192nc1l-2 lVjhE" data-dcnode-id="2245" data-test="show-more-button"><span data-dcnode-id="2246" dat Board Certified by the American Board of Internal Medicine since 1998.

For those who are wondering, "Where is this guy from?"  I was born in New York City to a Mexican American mother from Texas and a father from Spain.  I grew up overseas as a "missionary kid," and graduated from high school in East Africa.  Later I did college and med school in Minneapolis/St. Paul. Life comes full circle and now I'm living down the road from where my mom was born; in Gonzales.  Favorite hobby right how:  I am obsessed with fitness and lifestyle health.  I have  turned fifty six and I'm shooting for 56 more.  Your health and well-being is as much a concern to me as is my own.  Join me on this journey.  Feel good and live long!</span><div class="patient-web-app__sc-192nc1l-1 haqNYm hidden" data-dcnode-id="1675" data-test="children-wrap"><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="1704"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Practice</span></h4><ul data-dcnode-id="1705"><li data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Bastrop Medical Clinic</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="1698"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Board certifications</span></h4><ul data-dcnode-id="1699"><li data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">American Board of Internal Medicine</span></li></ul></div><div class="patient-web-app__sc-st74kp-0 QLAXI" data-dcnode-id="1690"><h4 class="patient-web-app__sc-st74kp-1 hXErsT" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Education</span></h4><ul data-dcnode-id="1691"><li data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Medical School - University of Minnesota, Minneapolis, Doctor of Medicine</span></li><li data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">University Medical Center Brackenridge, Reside sked questions</span></section></div><div data-dcnode-id="920"><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-ofomod-1 fLOvDc bmorFQ" data-dcnode-id="921"><div class="patient-web-app__sc-ofomod-2 sAPBH" data-dcnode-id="923"><div data-dcnode-id="924" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="patient-web-app__sc-ofomod-3 iQmecR" data-dcnode-id="935"><div data-dcnode-id="936" itemprop="name"><h3 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">How can I make a same-day appointment with a Primary Care Doctor in Austin?</span></h3></div></div><div data-dcnode-id="925" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="926" itemprop="text"><p data-dcnode-id="927"><span data-dcnode-id="934" instrument_node="">On average, patients who use Zocdoc can search for a Primary Care Doctor in Austin, book an appointment, and </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zocdoc.com/primary-care-doctors/austin-221873pm%3Futm_source%3Dgoogle%26utm_medium%3Dsearch%26utm_campaign%3Dfaq%26utm_content%3Dlisting-1" rel="nofollow"><span data-dcnode-id="933" instrument_node="">see the Primary Care Doctor within 24 hours</span></a><span data-dcnode-id="931" instrument_node="">. Same-day appointments are often available, you can search for real-time availability of Doctors in Austin who accept your insurance and </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zocdoc.com/primary-care-doctors/austin-221873pm%3Futm_source%3Dgoogle%26utm_medium%3Dsearch%26utm_campaign%3Dfaq%26utm_content%3Dlisting-1" rel="nofollow"><span data-dcnode-id="930" instrument_node="">make an appointment online</span></a><span data-dcnode-id="928" instrument_node="">.</span></p></div></div></div></div><hr data-dcnode-id="922" width="100%"></section></div><div data-dcnode- idelines</span></a><span data-dcnode-id="842" instrument_node="">.</span></p></div></div></div></div><hr data-dcnode-id="836" width="100%"></section></div><div data-dcnode-id="821"><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-ofomod-1 fLOvDc bmorFQ" data-dcnode-id="822"><div class="patient-web-app__sc-ofomod-2 sAPBH" data-dcnode-id="824"><div data-dcnode-id="825" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="patient-web-app__sc-ofomod-3 iQmecR" data-dcnode-id="830"><div data-dcnode-id="831" itemprop="name"><h3 data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">How can I find a video visit with a Primary Care Doctor online in Austin?</span></h3></div></div><div data-dcnode-id="826" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="827" itemprop="text"><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Doctors in Austin on Zocdoc who see patients through online video visits will have a purple video icon on their profiles. You can also filter your search results to show only Doctors who offer video visits.</span></p></div></div></div></div><hr data-dcnode-id="823" width="100%"></section></div><div data-dcnode-id="808"><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-ofomod-1 fLOvDc bmorFQ" data-dcnode-id="809"><div class="patient-web-app__sc-ofomod-2 sAPBH" data-dcnode-id="811"><div data-dcnode-id="812" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="patient-web-app__sc-ofomod-3 iQmecR" data-dcnode-id="817"><div data-dcnode-id="818" itemprop="name"><h3 data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Are video visits with a Primary Care Doctor online covered by my insurance?</span></h3></div></div><div data-dcnode-id="813" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="814" itemprop="text"><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Most insurers provide coverage for video visits at the same cost as in-person visits. You can search on Zocdoc specifically for Doctors in Austin who accept your insurance for video visits by selecting your carrier and plan from the drop-down menu at the top of the page. We recommend you check with your insurance carrier directly to confirm your coverage and out of pocket costs for video visits.</span></p></div></div></div></div><hr data-dcnode-id="810" width="100%"></section></div><div data-dcnode-id="795"><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-ofomod-1 fLOvDc bmorFQ" data-dcnode-id="796"><div class="patient-web-app__sc-ofomod-2 sAPBH" data-dcnode-id="798"><div data-dcnode-id="799" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="patient-web-app__sc-ofomod-3 iQmecR" data-dcnode-id="804"><div data-dcnode-id="805" itemprop="name"><h3 data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">How can I find a Primary Care Doctor in Austin who sees patients in the morning or evening?</span></h3></div></div><div data-dcnode-id="800" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="801" itemprop="text"><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Zocdoc lets you search specifically for a Primary Care Doctor who has appointments available before 10:00 am, or after 5:00 pm. Just choose the special hours filter at the top of our search page.</span></p></div></div></div></div><hr data-dcnode-id="797" width="100%"></section></div><div data-dcnode-id="782"><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-ofomod-1 fLOvDc bmorFQ" data-dcnode-id="783"><div class="patient-web-app__sc-ofomod-2 sAPBH" data-dcnode-id="785"><div data-dcnode-id="786" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><div class="patient-web-app__sc-ofomod-3 iQmecR" data-dcnode-id="791"><div data-dcnode-id="792" itemprop="name"><h3 data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">How can I find a Primary Care Doctor in Austin who sees patients during the weekend?</span></h3></div></div><div data-dcnode-id="787" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><div data-dcnode-id="788" itemprop="text"><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Zocdoc let's you see real-time availability for Doctors in Austin. Many Doctors offer appointments on Saturdays and Sundays.</span></p></div></div></div></div><hr data-dcnode-id="784" width="100%"></section></div></div></div><div class="patient-web-app__sc-9k58dd-1 dYdLJr" data-dcnode-id="662" data-test="search-salp-block"><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-9k58dd-0 fLOvDc keDyUJ" data-dcnode-id="697"><h2 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">What Is Primary Care? </span></h2><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Primary care providers (PCPs) commonly serve as the first point of contact for patients. They can be physicians, such as a doctor of medicine (MD), or specialists like family medicine doctors and internists. Primary care providers often deliver care in outpatient settings, such as a private clinic or a local primary care center. In addition, many primary care providers work in medical clinics, private or group practices, long-term care facilities and inpatient hospital settings.</span></p><br data-dcnode-id="775"><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Primary care practitioners primarily see undifferentiated patients, i.e., patients who have started experiencing symptoms but await a diagnosis. This could be, for instance, a patient who has been feeling low, struggling to sleep, or having gastrointestinal issues. The doctor analyzes the symptoms in light of the patient’s medical history and suggests a treatment plan accordingly. </span></p><br data-dcnode-id="772"><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Unlike other healthcare practitioners, primary care providers share a sustained association with their patients. The resulting knowledge of the patient’s medical record and family history sets them apart. As a result, PCPs are uniquely positioned to undertake health risk assessments, screen patients, and provide tailored treatment plans. For instance, if you have a family history of diabetes and have begun presenting related symptoms (increased thirst, fatigue, frequent urination, etc.), your family doctor may assess your risk for prediabetes. </span></p><br data-dcnode-id="769"><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">In other words, the long association with their patients allows primary care doctors to deliver preventive medicine — arguably, a cornerstone of public health policy. Moreover, primary care physicians often make referrals to other specialists as necessary. This helps relieve the burden on specialist sectors in the healthcare economy. In addition, patients can more conveniently navigate the healthcare sector.</span></p><br data-dcnode-id="766"><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">In addition to acute care (such as treatment of headaches, UTIs, respiratory infections, etc.), primary care sites offer a host of other services:</span></p><ul data-dcnode-id="753"><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">advice on diet and exercise</span></li><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">mental health counseling</span></li><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">lab tests (bloodwork), X-rays, etc.</span></li><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">vaccinations and immunization</span></li><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">end-of-life planning</span></li></ul><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Primary care providers build a sustainable relationship with their patients, providing long-term care. This is why they are better able to assist patients with chronic conditions. For instance, patients with diabetes, obesity, high blood pressure, asthma, etc., could greatly benefit from regular visits to their PCP. Primary care physicians also coordinate care for their patients, liaising with other medical teams as necessary.</span></p><br data-dcnode-id="750"><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Primary care typically includes family medicine, internal medicine, pediatrics, gynecology, and general obstetrics. Nurse practitioners and assistant physicians also support primary care providers. As per the Institute of Medicine (IoM), primary care is: </span></p><ul data-dcnode-id="733"><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Accessible</span></li><li data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Coordinated</span></li><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Sustained</span></li><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Comprehensive</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Partnership-based</span></li><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Person-centered</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Integrated</span></li></ul><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Another feature of primary care is its community-centric approach. This close involvement with the community allows physicians to become aware of local health trends (such as a rise or fall in local cases of the flu). They can also, as a result, undertake community initiatives — such as drives to promote family planning, healthy eating, positive mental health, or quitting smoking. </span></p><br data-dcnode-id="730"><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Primary care is also preventive and holistic. Unlike specialist care providers, PCPs rely more on promoting healthier lifestyle choices and monitoring patients, instead of adopting a disease-specific approach.</span></p><br data-dcnode-id="727"><h2 data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">The Benefits of Primary Care</span></h2><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Research has shown that community health is better in areas where there are more primary care practitioners and interventions. Such areas report higher life expectancy and patient satisfaction and a lower level of comorbidities and disparities. Further, Americans with a PCP are reportedly 19% less likely to suffer premature death.</span></p><br data-dcnode-id="722"><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Seeking Primary Care is also lighter on the pocket. Americans who receive primary care reportedly incur 33 % lower healthcare costs. This makes primary care a much better option than the Emergency Room (ER), where costs can be four times more than outpatient care. Moreover, a preventive approach allows for the early detection of illness. Primary care, therefore, helps in early diagnosis and intervention, potentially saving on treatment costs.</span></p><br data-dcnode-id="719"><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Patients often get same-day or next-day appointments with their primary care providers. This lets the patient receive prompt medical attention — without the hassle of long wait times at hospitals or the ER. Depending on symptoms and their severity, your family doctor may even provide telehealth, i.e., they will guide you on managing your health over the phone. The familiarity and long-term association with primary care providers make the visits less stressful and more productive. For instance, a shy or reserved patient may openly discuss concerns surrounding sex, drug use, or mental health only with their primary care provider. </span></p><br data-dcnode-id="716"><h2 data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Best Primary Care Physicians in Austin</span></h2><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Are you running a fever but not sure if it’s the flu? Or, you twisted your ankle but can’t tell if it’s serious? Zocdoc has got you covered. It’s always better to be safe than sorry. With our user-friendly interface, you can find the top-rated primary care providers in your area.</span></p><br data-dcnode-id="711"><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Zocdoc displays the top-rated doctors in your neighborhood, filtered by location, availability, specialty, and other criteria. Add your insurance carrier’s name, and we will display the top-rated doctors near you that accept your insurance — after all, consulting an in-network provider can drastically reduce your medical expenses.</span></p><br data-dcnode-id="708"><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">All Zocdoc, we take great pride in optimizing the provider-patient fit. All our providers also come with a personalized profile, where you can read about the doctor’s training, licensure, experience, and cultural background. You can also take a look at thousands of verified customer reviews. Once you find a primary care physician that meets your needs, you can instantly book an in-person or virtual appointment.</span></p><br data-dcnode-id="705"><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">All bookings are safe, secure, and completely free.</span></p><br data-dcnode-id="702"><h2 data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Seeking Primary Care in Austin</span></h2><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">As of 2020, there were eight primary care providers in Austin. In Austin, on average, it can take between two hours and fourteen minutes to a shocking seven hours and twenty-six minutes for a patient to see a doctor in an Emergency Room or hospital [according to HospitalStats]. Getting in touch with your Primary Care Provider to avail of outpatient services would thus be a better option. Providers can accommodate regular patients on the same or the next day.</span></p></section><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-9k58dd-0 fLOvDc keDyUJ" data-dcnode-id="695"><hr data-dcnode-id="696"></section><section class="patient-web-app__sc-13a0bfj-0 patient-web-app__sc-9k58dd-0 fLOvDc keDyUJ" data-dcnode-id="666"><h2 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Sources:</span></h2><ul data-dcnode-id="668" style="list-style-type:none;"><li data-dcnode-id="690"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/primary-medical-care" target="_blank"><span data-dcnode-id="692" instrument_node="">ScienceDirect</span></a></li><li data-dcnode-id="687"><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128021156000045" target="_blank"><span data-dcnode-id="689" instrument_node="">Engaging Patients in Primary and Specialty Care (Krist, A.H., et al.) </span></a></li><li data-dcnode-id="684"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acponline.org/acp_policy/policies/primary_care_shortage_affecting_hc_2008.pdf" target="_blank"><span data-dcnode-id="686" instrument_node="">How Is a Shortage of Primary Care Physicians Affecting the Quality and Cost of Medical Care? (American College of Physicians)</span></a>
