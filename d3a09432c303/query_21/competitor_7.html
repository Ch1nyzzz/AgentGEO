on.com/sex-after-vasectomy/post-vasectomy-semen-analysis/"><span data-dcnode-id="1155" instrument_node="">Post-vasectomy semen analysis: Why is it important?</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-269" data-dcnode-id="1150"><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/sex-after-vasectomy/spermcheck-vasectomy/"><span data-dcnode-id="1152" instrument_node="">SpermCheck Vasectomy: Home test kit review</span></a></li></ul></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-has-children menu-item-52" data-dcnode-id="1120"><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/"><span data-dcnode-id="1147" instrument_node="">Risks</span><span aria-label="Expand" class="dropdown-menu-toggle" data-dcnode-id="1141" role="button" tabindex="0"><span class="gp-icon icon-arrow" data-dcnode-id="1142"><svg aria-hidden="true" data-dcnode-id="1143" height="1em" role="img" version="1.1" viewBox="0 0 330 512" width="1em" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="1146" instrument_node=""> </span><path d="M305.913 197.085c0 2.266-1.133 4.815-2.833 6.514L171.087 335.593c-1.7 1.7-4.249 2.832-6.515 2.832s-4.815-1.133-6.515-2.832L26.064 203.599c-1.7-1.7-2.832-4.248-2.832-6.514s1.132-4.816 2.832-6.515l14.162-14.163c1.7-1.699 3.966-2.832 6.515-2.832 2.266 0 4.815 1.133 6.515 2.832l111.316 111.317 111.316-111.317c1.7-1.699 4.249-2.832 6.515-2.832s4.815 1.133 6.515 2.832l14.162 14.163c1.7 1.7 2.833 4.249 2.833 6.515z" data-dcnode-id="1145" fill-rule="nonzero"></path><span data-dcnode-id="1144" instrument_node=""> </span></span></span></a><ul class="sub-menu" data-dcnode-id="1121"><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1207" data-dcnode-id="1137"><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/swelling-and-bruising/"><span data-dcnode-id="1139" instrument_node="">Swelling and bruising: How long will it last?</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1206" data-dcnode-id="1134"><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/bleeding-after-a-vasectomy/"><span data-dcnode-id="1136" instrument_node="">Bleeding after a vasectomy: What’s normal?</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1205" data-dcnode-id="1131"><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/scrotal-hematoma/"><span data-dcnode-id="1133" instrument_node="">Scrotal hematoma: Definition, causes and treatment options</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1211" data-dcnode-id="1128"><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/lump-after-a-vasectomy/"><span data-dcnode-id="1130" instrument_node="">Lump after a vasectomy: Sperm granuloma, hematoma, and other possibilities</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1215" data-dcnode-id="1125"><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/blood-in-semen/"><span data-dcnode-id="1127" instrument_node="">Blood in semen: Is it normal? When to be concerned?</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1219" data-dcnode-id="1122"><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&am 6"><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/failure/recanalization/"><span data-dcnode-id="1108" instrument_node="">Recanalization after a vasectomy: Definition, probability and more</span></a></li></ul></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-54" data-dcnode-id="1101"><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/reversal/"><span data-dcnode-id="1103" instrument_node="">Reversal</span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-5806" data-dcnode-id="1098"><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/pictures/"><span data-dcnode-id="1100" instrument_node="">Pictures</span></a></li><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-386" data-dcnode-id="1095"><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/stories/"><span data-dcnode-id="1097" instrument_node="">Stories</span></a></li><li class="menu-item menu-item-type-post_type_archive menu-item-object-forum menu-item-3927" data-dcnode-id="1092"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/forums/"><span data-dcnode-id="1094" instrument_node="">Forums</span></a></li></ul></div><div class="menu-bar-items" data-dcnode-id="1078"><span class="menu-bar-item search-item" data-dcnode-id="1079"><a aria-label="Open Search Bar" data-dcnode-id="1080" href="#"><span class="gp-icon icon-search" data-dcnode-id="1081"><svg aria-hidden="true" data-dcnode-id="1086" height="1em" role="img" version="1.1" viewBox="0 0 512 512" width="1em" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="1089" instrument_node=""> </span><path clip-rule="evenodd" d="M208 48c-88.366 0-160 71.634-160 160s71.634 160 160 160 160-71.634 160-160S296.366 48 208 48zM0 208C0 93.125 93.125 0 208 0s208 93.125 208 208c0 48.741-16.765 93.566-44.843 129.024l133.826 134.018c9.366 9.379 9.355 24.575-.025 33.941-9.379 9.366-24.575 9.355-33.941-.025L337.238 370.987C301.747 399.167 256.839 416 208 416 93.125 416 0 322.875 0 208z" data-dcnode-id="1088" fill-rule="evenodd"></path><span data-dcnode-id="1087" instrument_node=""> </span><svg aria-hidden="true" data-dcnode-id="1082" height="1em" role="img" version="1.1" viewBox="0 0 512 512" width="1em" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg><span data-dcnode-id="1085" instrument_node=""> </span><path d="M71.029 71.029c9.373-9.372 24.569-9.372 33.942 0L256 222.059l151.029-151.03c9.373-9.372 24.569-9.372 33.942 0 9.372 9.373 9.372 24.569 0 33.942L289.941 256l151.03 151.029c9.372 9.373 9.372 24.569 0 33.942-9.373 9.372-24.569 9.372-33.942 0L256 289.941l-151.029 151.03c-9.373 9.372-24.569 9.372-33.942 0-9.372-9.373-9.372-24.569 0-33.942L222.059 256 71.029 104.971c-9.372-9.373-9.372-24.569 0-33.942z" data-dcnode-id="1084"></path><span data-dcnode-id="1083" instrument_node=""> </span></span></a></span></div></div></nav><div class="site grid-container container hfeed" data-dcnode-id="272" id="page"><div class="site-content" data-dcnode-id="273" id="content"><div class="content-area" data-dcnode-id="445" id="primary"><main class="site-main" data-dcnode-id="446" id="main"><article class="post-30 page type-page status-publish has-post-thumbnail infinite-scroll-item" data-dcnode-id="510" id="post-30" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="511"><header class="entry-header" data-dcnode-id="1073"><h1 class="entry-title" data-dcnode-id="1074" itemprop="headline"><span data-dcnode-id="1075" instrument_node="">Vasectomy (male sterilization): Overview</span></h1></header><div class="entry-content" data-dcnode-id="531" itemprop="text"><div class="toc" data-dcnode-id="1049"><a data-dcnode-id="1071" href="#surgery"><span data-dcnode-id="1072" instrument_node="">Surgery</span></a><span data-dcnode-id="1070" instrument_node=""> ǀ </span><a data-dcnode-id="1068" href="#recovery"><span data-dcnode-id="1069" instrument_node="">Recovery</span></a><span data-dcnode-id="1067" instrument_node=""> ǀ </span><a data-dcnode-id="1065" href="#sex-after-vasectomy"><span data-dcnode-id="1066" instrument_node="">Sex after Vasectomy</span></a><span data-dcnode-id="1064" instrument_node=""> ǀ </span><a data-dcnode-id="1062" href="#effectiveness"><span data-dcnode-id="1063" instrument_node="">Effectiveness</span></a><span data-dcnode-id="1061" instrument_node=""> ǀ </span><a data-dcnode-id="1059" href="#risks"><span data-dcnode-id="1060" instrument_node="">Risks</span></a><span data-dcnode-id="1058" instrument_node=""> ǀ </span><a data-dcnode-id="1056" href="#reversal"><span data-dcnode-id="1057" instrument_node="">Reversal</span></a><span data-dcnode-id="1055" instrument_node=""> ǀ </span><a data-dcnode-id="1053" href="#decision"><span data-dcnode-id="1054" instrument_node="">Decision</span></a><span data-dcnode-id="1052" instrument_node=""> ǀ </span><a data-dcnode-id="1050" href="#summary"><span data-dcnode-id="1051" instrument_node="">Summary</span></a></div><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">Vasectomy is a form of permanent sterilization for men. The procedure involves cutting and sealing the tubes </span><em data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">(vas deferens)</span></em><span data-dcnode-id="1045" instrument_node=""> that deliver sperm into a man’s ejaculatory fluid so he is no longer able to fertilize his partner’s eggs.</span></p><p data-dcnode-id="1037"><span data-dcnode-id="1043" instrument_node="">Vasectomy is one of the most effective methods of birth control available, and about 500,000 men in the U.S. choose to undergo the procedure every year.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1041" data-mfn="1" data-mfn-post-scope="00000000632dbf3f0000000032a3372c_30"><span data-dcnode-id="1042" instrument_node="">1</span></sup><span data-dcnode-id="1040" instrument_node=""> It’s reported pregnancy occurs only in 1 to 2 out of every 1000 couples in which the man has had a vasectomy.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1038" data-mfn="2" data-mfn-post-scope="00000000632dbf3f0000000032a3372c_30"><span data-dcnode-id="1039" instrument_node="">2</span></sup></p><h2 class="anchor" data-dcnode-id="1035" id="surgery"><span data-dcnode-id="1036" instrument_node="">How is a vasectomy performed?</span></h2><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The surgery is usually done under local anesthesia. There are several vasectomy techniques currently in use, but the general procedure remains the same:</span></p><div class="wp-block-image diagram" data-dcnode-id="1030"><figure class="alignright size-large" data-dcnode-id="1031"><img alt="Male reproductive system diagram" class="wp-image-6952" data-dcnode-id="1032" height="237" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/male-reproductive-system-diagram-4.svg&amp;raw" width="332"></figure></div><ul class="surgerydesc" data-dcnode-id="1018"><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">A small incision or puncture is created in the scrotum.</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">The vas deferens </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">(sperm tubes)</span></em><span data-dcnode-id="1024" instrument_node=""> are exposed by pulling them through the opening.</span></li><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">A small segment of the vas deferens is removed with a scalpel.</span></li><li data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The ends of the tubes are generally sealed or tied off in some fashion.</span></li></ul><span data-dcnode-id="1017" instrument_node=""> </span><small class="display-posts-title" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Suggested reading</span></small><aside class="display-posts-listing" data-dcnode-id="1005" id="recommended-page-small"><div class="listing-item" data-dcnode-id="1006"><a class="image" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/what-to-know/vasectomy-operation-day/"><img alt="Surgeon getting ready for an operation by putting on surgical gloves" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="1014" height="75" loading="lazy" sizes="(max-width: 110px) 100vw, 110px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/doctor-surgical-gloves-110x75.jpg&amp;raw" srcset="https://www.vasectomy-information.com/wp-content/uploads/doctor-surgical-gloves-110x75.jpg 110w, https://www.vasectomy-information.com/wp-content/uploads/doctor-surgical-gloves-220x147.jpg 220w" width="110"></a><span data-dcnode-id="1012" instrument_node=""> </span><a class="title" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/what-to-know/vasectomy-operation-day/"><span data-dcnode-id="1011" instrument_node="">Vasectomy operation day: What to expect? How to prepare?</span></a><span data-dcnode-id="1009" instrument_node=""> </span><span class="date" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">May 29, 2021</span></span></div></aside><h3 data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">What’s the difference between conventional and no-scalpel vasectomy?</span></h3><h4 data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Conventional vasectomy</span></h4><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">During a conventional vasectomy, the scrotum is first numbed with a local anesthetic. The doctor then uses a scalpel to make two small incisions on each side of the scrotum to reach the vas deferens. Once both tubes are cut and closed, the incisions will be stitched together to complete the vasectomy.</span></p><h4 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">No-scalpel vasectomy</span></h4><p data-dcnode-id="989"><span data-dcnode-id="996" instrument_node="">During a no-scalpel vasectomy </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">(also referred to as NSV or keyhole vasectomy)</span></em><span data-dcnode-id="993" instrument_node="">, the vas deferens are held in place with a small clamp from outside the scrotum. Instead of making two incisions, the surgeon makes one tiny puncture with a special instrument </span><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">(hemostat)</span></em><span data-dcnode-id="990" instrument_node=""> and gently stretches the opening until the vas deferens can be reached. The sperm tubes are then closed using the same methods as conventional vasectomy.</span></p><p data-dcnode-id="985"><span data-dcnode-id="988" instrument_node="">The no-scalpel vasectomy takes less time to perform, and because the puncture site is so small, it doesn’t usually require stitches. The no-scalpel method is also associated with fewer postoperative complications. It’s reported there’s almost five times fewer infections, hematomas, and other complications.</span><sup class="modern-footnotes-footnote" data-dcnode-id="986" data-mfn="3" data-mfn-post-scope="00000000632dbf3f0000000032a3372c_30"><span data-dcnode-id="987" instrument_node="">3</span></sup></p><h2 class="anchor" data-dcnode-id="983" id="recovery"><span data-dcnode-id="984" instrument_node="">How long does it take to recover from a vasectomy?</span></h2><p data-dcnode-id="979"><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/recovery/"><span data-dcnode-id="982" instrument_node="">Vasectomy recovery</span></a><span data-dcnode-id="980" instrument_node=""> is usually very quick. Immediately after the operation, it’s not uncommon to experience some discomfort, swelling, and bruising of your scrotum. You should be able to return light, non-strenuous physical activity in two to three days. Most men can expect to make a full recovery within a couple of weeks.</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">You do not have to confine yourself to the bed for the recovery period but do take adequate rest after surgery. The care you take during the first week is a major factor in the success and safety of the procedure.</span></p><section class="recommended-recovery-products" data-dcnode-id="940"><h2 class="widget-title" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Recommended products for recovery</span></h2><span data-dcnode-id="974" instrument_node=""> </span><small data-dcnode-id="969"><span data-dcnode-id="973" instrument_node="">We only </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/advertising-policy/%23affiliate-program"><span data-dcnode-id="972" instrument_node="">recommend products</span></a><span data-dcnode-id="970" instrument_node=""> we think are useful for our readers. If you make a purchase, we may earn a small commission.</span></small><ul class="grid-container" data-dcnode-id="944"><li data-dcnode-id="963"><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Xu49jE" rel="sponsored noreferrer noopener" target="_blank"><img alt="Papi Men’s jock strap 3 pack" data-dcnode-id="968" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/jockstrap.jpg&amp;raw" width="150"><span data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Jockstraps</span></span><span data-dcnode-id="965" instrument_node="">Papi Men’s Cotton Jock Strap 3-Pack</span></a></li><li data-dcnode-id="957"><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3exMYGq" rel="sponsored noreferrer noopener" target="_blank"><img alt="Reusable Cold Pack with Gel Beads" data-dcnode-id="962" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/icepack-gel-beads.jpg&amp;raw" width="150"><span data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Ice packs</span></span><span data-dcnode-id="959" instrument_node="">TheraPearl Ice Pack with Gel Beads</span></a></li><li data-dcnode-id="951"><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2AXmNbS" rel="sponsored noreferrer noopener" target="_blank"><img alt="SpermCheck Vasectomy" data-dcnode-id="956" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/SpermCheck-Vasectomy-Box.png&amp;raw" width="150"><span data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Home Vasectomy Test</span></span><span data-dcnode-id="953" instrument_node="">SpermCheck Vasectomy Test Kit</span></a></li><li data-dcnode-id="945"><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/33dmbtF" rel="sponsored noreferrer noopener" target="_blank"><img alt="Donut Cushion for Pressure Relief" data-dcnode-id="950" height="150" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/donut-pillow.jpg&amp;raw" width="150"><span data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Donut-shaped pillow</span></span><span data-dcnode-id="947" instrument_node="">Ergonomic Innovations Orthopaedic Seat</span></a></li></ul><span data-dcnode-id="943" instrument_node=""> </span><a class="arrow-button-2" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/recovery/"><span data-dcnode-id="942" instrument_node="">Learn how to stay comfortable during post-vasectomy recovery</span></a></section><h2 class="anchor" data-dcnode-id="938" id="sex-after-vasectomy"><span data-dcnode-id="939" instrument_node="">Will a vasectomy affect my sex life?</span></h2><p data-dcnode-id="931"><span data-dcnode-id="937" instrument_node="">A vasectomy is a surgical procedure that blocks sperm from entering the semen. It doesn’t affect </span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/sex-after-vasectomy/"><span data-dcnode-id="936" instrument_node="">how sexual organs function</span></a><span data-dcnode-id="934" instrument_node=""> or lower a man’s libido. And since sperm only make up 2% to 5% of the ejaculate, the difference in volume won’t be noticeable to a man or his partner.</span><sup class="modern-footnotes-footnote" data-dcnode-id="932" data-mfn="4" data-mfn-post-scope="00000000632dbf3f0000000032a3372c_30"><span data-dcnode-id="933" instrument_node="">4</span></sup></p><p data-dcnode-id="927"><span data-dcnode-id="930" instrument_node="">Some men even report that without the constant worry of unwanted pregnancy and the hassle of other birth control measures, they are able to relax and enjoy sex more than ever.</span><sup class="modern-footnotes-footnote" data-dcnode-id="928" data-mfn="5" data-mfn-post-scope="00000000632dbf3f0000000032a3372c_30"><span data-dcnode-id="929" instrument_node="">5</span></sup></p><span data-dcnode-id="926" instrument_node=""> </span><small class="display-posts-title" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Suggested reading</span></small><aside class="display-posts-listing" data-dcnode-id="914" id="recommended-page-small"><div class="listing-item" data-dcnode-id="915"><a class="image" data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/sex-after-vasectomy/"><img alt="Couple having a intimate moment on the bed" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="923" height="75" loading="lazy" sizes="(max-width: 110px) 100vw, 110px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/couple-being-intimate-110x75.jpg&amp;raw" srcset="https://www.vasectomy-information.com/wp-content/uploads/couple-being-intimate-110x75.jpg 110w, https://www.vasectomy-information.com/wp-content/uploads/couple-being-intimate-220x147.jpg 220w" width="110"></a><span data-dcnode-id="921" instrument_node=""> </span><a class="title" data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/sex-after-vasectomy/"><span data-dcnode-id="920" instrument_node="">Sex after vasectomy: Differences in sex life, ejaculation, orgasms and more</span></a><span data-dcnode-id="918" instrument_node=""> </span><span class="date" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">April 15, 2021</span></span></div></aside><h3 data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">When can I resume sexual activity?</span></h3><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">In general, sexual intercourse can be resumed a week after the procedure, but remember live sperm can remain in the vas deferens above the operation site for weeks or even months after a vasectomy. You can’t be considered sterile until the doctor has analyzed a sample of your semen, and you have to use an alternative method of contraception until then.</span></p><section class="recommended-spermcheck" data-dcnode-id="881"><h2 class="widget-title" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Recommended product</span></h2><h3 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Home Vasectomy Test Kit</span></h3><span data-dcnode-id="905" instrument_node=""> </span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2B47cra" rel="sponsored noreferrer noopener"><img alt="SpermCheck Vasectomy product box" data-dcnode-id="904" height="255" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/SpermCheck-Vasectomy-Box.png&amp;raw" width="155"></a><p class="hide-on-mobile hide-on-tablet" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">SpermCheck Vasectomy is an FDA approved home sperm testing kit. It comes with two tests and is designed to allow men to check their post-vasectomy sperm count from the comfort of their own home.</span></p><ul class="hide-on-mobile hide-on-tablet" data-dcnode-id="894"><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Convenient</span></li><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Private</span></li><li data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Results in minutes</span></li></ul><span data-dcnode-id="893" instrument_node=""> </span><a class="button alt" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2B47cra" rel="sponsored noreferrer noopener" target="_blank"><span data-dcnode-id="892" instrument_node="">View on Amazon</span></a><span data-dcnode-id="890" instrument_node=""> </span><a class="button" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/sex-after-vasectomy/spermcheck-vasectomy/"><span data-dcnode-id="889" instrument_node="">Read our review</span></a><span data-dcnode-id="887" instrument_node=""> </span><small data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">We only </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/advertising-policy/%23affiliate-program"><span data-dcnode-id="885" instrument_node="">recommend products</span></a><span data-dcnode-id="883" instrument_node=""> we think are useful for our readers. If you make a purchase, we may earn a small commission.</span></small></section><h2 class="anchor" data-dcnode-id="878" id="effectiveness"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">How effective are vasectomies?</span></strong></h2><div class="wp-block-columns" data-dcnode-id="804"><div class="wp-block-column article-text-image" data-dcnode-id="858"><p data-dcnode-id="870"><span data-dcnode-id="877" instrument_node="">Vasectomy is one of the most effective forms of birth control available, and the most effective method for men. Vasectomies are nearly 100% effective at preventing pregnancy. The estimated failure rate is just 0.15%.</span><sup class="modern-footnotes-footnote" data-dcnode-id="875" data-mfn="2" data-mfn-post-scope="00000000632dbf3f0000000032a3372c_30"><span data-dcnode-id="876" instrument_node="">2</span></sup><span data-dcnode-id="874" instrument_node=""> So </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/failure/"><span data-dcnode-id="873" instrument_node="">vasectomy failure</span></a><span data-dcnode-id="871" instrument_node=""> is extremely rare, but in a small number of cases, it can happen.</span></p><h3 data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Reasons for vasectomy failure are:</span></h3><ul data-dcnode-id="859"><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Having sex too soon</span></li><li data-dcnode-id="862"><span data-dcnode-id="865" instrument_node="">Recanalization </span><em data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">(sperm tubes healing back together)</span></em></li><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Surgical error</span></li></ul></div><div class="wp-block-column" data-dcnode-id="805" style="flex-basis:45%"><figure class="wp-block-table" data-dcnode-id="806"><table data-dcnode-id="813"><thead data-dcnode-id="850"><tr data-dcnode-id="851"><th data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Method</span></th><th data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Perfect use</span></th><th data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Typical use</span></th></tr></thead><tbody data-dcnode-id="814"><tr data-dcnode-id="843"><td data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Vasectomy</span></td><td data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">0.10%</span></td><td data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">0.15%</span></td></tr><tr data-dcnode-id="836"><td data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Tubal ligation</span></td><td data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">0.5%</span></td><td data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">0.5%</span></td></tr><tr data-dcnode-id="829"><td data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">IUD</span></td><td data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">0.6%</span></td><td data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">0.8%</span></td></tr><tr data-dcnode-id="822"><td data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Pill</span></td><td data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">0.3%</span></td><td data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">9%</span></td></tr><tr data-dcnode-id="815"><td data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Condom</span></td><td data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">2%</span></td><td data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">18%</span></td></tr></tbody></table><figcaption data-dcnode-id="807"><em data-dcnode-id="809"><span data-dcnode-id="812" instrument_node="">Popular birth control methods. </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/failure/%23comparative-table"><span data-dcnode-id="811" instrument_node="">View the full table</span></a></em><span data-dcnode-id="808" instrument_node="">.</span></figcaption></figure></div></div><span data-dcnode-id="803" instrument_node=""> </span><small class="display-posts-title" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Suggested reading</span></small><aside class="display-posts-listing" data-dcnode-id="791" id="recommended-page-small"><div class="listing-item" data-dcnode-id="792"><a class="image" data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/failure/"><img alt="Doctor explaining things to concerned male patient." class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="800" height="75" loading="lazy" sizes="(max-width: 110px) 100vw, 110px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/man-learning-in-doctors-office-110x75.jpg&amp;raw" srcset="https://www.vasectomy-information.com/wp-content/uploads/man-learning-in-doctors-office-110x75.jpg 110w, https://www.vasectomy-information.com/wp-content/uploads/man-learning-in-doctors-office-220x147.jpg 220w" width="110"></a><span data-dcnode-id="798" instrument_node=""> </span><a class="title" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/failure/"><span data-dcnode-id="797" instrument_node="">Vasectomy failure: What are the odds? How does it happen?</span></a><span data-dcnode-id="795" instrument_node=""> </span><span class="date" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">May 19, 2021</span></span></div></aside><h2 class="anchor" data-dcnode-id="789" id="risks"><span data-dcnode-id="790" instrument_node="">What are the risks of a vasectomy?</span></h2><p data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">There are hundreds of thousands of vasectomies performed every year, and most doctors consider it to be one of the safest and most effective forms of permanent birth control available. However, like any surgical procedure, there are </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/"><span data-dcnode-id="787" instrument_node="">risks involved</span></a><span data-dcnode-id="785" instrument_node=""> with having a vasectomy. Complications are very uncommon, but it is important that men understand the potential risks.</span></p><h3 data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Possible short-term side effects include:</span></h3><ul data-dcnode-id="773"><li data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Bruising &amp; swelling</span></li><li data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Bleeding</span></li><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Hematoma</span></li><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Infection</span></li></ul><h3 data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Possible long-term complications include:</span></h3><ul data-dcnode-id="762"><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Sperm granuloma</span></li><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Congestive epididymitis</span></li><li data-dcnode-id="763"><span data-dcnode-id="766" instrument_node="">Post-vasectomy pain syndrome </span><em data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">(PVPS)</span></em></li></ul><span data-dcnode-id="761" instrument_node=""> </span><small class="display-posts-title" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Suggested reading</span></small><aside class="display-posts-listing" data-dcnode-id="749" id="recommended-page-small"><div class="listing-item" data-dcnode-id="750"><a class="image" data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/"><img alt="Doctor consulting a patient in doctor's office" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="758" height="75" loading="lazy" sizes="(max-width: 110px) 100vw, 110px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/doctor-explaining-patient-110x75.jpg&amp;raw" srcset="https://www.vasectomy-information.com/wp-content/uploads/doctor-explaining-patient-110x75.jpg 110w, https://www.vasectomy-information.com/wp-content/uploads/doctor-explaining-patient-220x147.jpg 220w" width="110"></a><span data-dcnode-id="756" instrument_node=""> </span><a class="title" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/risks/"><span data-dcnode-id="755" instrument_node="">Vasectomy risks: Possible short- and long-term complications</span></a><span data-dcnode-id="753" instrument_node=""> </span><span class="date" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">May 15, 2021</span></span></div></aside><h2 class="anchor" data-dcnode-id="747" id="reversal"><span data-dcnode-id="748" instrument_node="">Is it possible to reverse a vasectomy?</span></h2><p data-dcnode-id="739"><span data-dcnode-id="746" instrument_node="">From a surgical standpoint, most vasectomies </span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/reversal/"><span data-dcnode-id="745" instrument_node="">can be reversed</span></a><span data-dcnode-id="743" instrument_node="">. Its estimated 3% to 6% of men who have had a vasectomy will seek reversal later in life.</span><sup class="modern-footnotes-footnote" data-dcnode-id="741" data-mfn="6" data-mfn-post-scope="00000000632dbf3f0000000032a3372c_30"><span data-dcnode-id="742" instrument_node="">6</span></sup><span data-dcnode-id="740" instrument_node=""> However, the reversal procedure, called vasovasostomy, is more complicated than a vasectomy and does not guarantee a return to fertility.</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Vasectomy reversal has a variable rate of success that depends heavily on the man’s age, years since his vasectomy, and other factors. Men should not look at vasectomy as something they can easily “undo” later in life.</span></p><span data-dcnode-id="736" instrument_node=""> </span><small class="display-posts-title" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Suggested reading</span></small><aside class="display-posts-listing" data-dcnode-id="724" id="recommended-page-small"><div class="listing-item" data-dcnode-id="725"><a class="image" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/reversal/"><img alt="Couple holding hands in doctor's office" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="733" height="75" loading="lazy" sizes="(max-width: 110px) 100vw, 110px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/couple-holding-hands-consultation-110x75.jpg&amp;raw" srcset="https://www.vasectomy-information.com/wp-content/uploads/couple-holding-hands-consultation-110x75.jpg 110w, https://www.vasectomy-information.com/wp-content/uploads/couple-holding-hands-consultation-220x147.jpg 220w" width="110"></a><span data-dcnode-id="731" instrument_node=""> </span><a class="title" data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/reversal/"><span data-dcnode-id="730" instrument_node="">Vasectomy reversal: Overview, success rate, alternatives and more</span></a><span data-dcnode-id="728" instrument_node=""> </span><span class="date" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">May 22, 2021</span></span></div></aside><h2 class="anchor" data-dcnode-id="722" id="decision"><span data-dcnode-id="723" instrument_node="">Is a vasectomy right for you?</span></h2><p data-dcnode-id="718"><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/what-to-know/"><span data-dcnode-id="721" instrument_node="">The decision</span></a><span data-dcnode-id="719" instrument_node=""> to have a vasectomy is an important one. To make an informed decision, consider the risks and benefits of all birth control methods, and determine which option is most suitable for you. Many men opt for a vasectomy because it represents the most reliable method of preventing pregnancy, coupled with the lowest overall medical risk for the couple. However, it’s not the right choice for everyone. Vasectomy is not a temporary method of birth control, it should be considered permanent sterilization, and you need to be sure you are happy with it.</span></p><h3 data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Vasectomy is most likely to benefit:</span></h3><ul data-dcnode-id="707"><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Couples in long term, stable relationships</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Couples who both agree they have all the children they want.</span></li><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Couples that have been carefully counseled, discussed the risks and benefits fully and have not made a rushed decision under pressure.</span></li><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Where other methods of birth control are unsuitable, or the wife/partner has health problems that make pregnancy unsafe.</span></li></ul><h3 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Vasectomy is least likely to benefit:</span></h3><ul data-dcnode-id="694"><li data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Men in couples in which one partner is unsure about having children in the future.</span></li><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Men whose relationships are unstable or going through a stressful phase.</span></li><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Men who are considering the operation just to please their partners, or are being pressured by their partner.</span></li><li data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Men who are counting on having children later by storing sperm or by surgical reversal of the vasectomy.</span></li><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Men who are single, divorced or separated at the time of vasectomy.</span></li></ul><span data-dcnode-id="693" instrument_node=""> </span><small class="display-posts-title" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Suggested reading</span></small><aside class="display-posts-listing" data-dcnode-id="681" id="recommended-page-small"><div class="listing-item" data-dcnode-id="682"><a class="image" data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/what-to-know/"><img alt="Man wearing glasses doing research on his laptop" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="690" height="75" loading="lazy" sizes="(max-width: 110px) 100vw, 110px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/wp-content/uploads/man-doing-research-110x75.jpg&amp;raw" srcset="https://www.vasectomy-information.com/wp-content/uploads/man-doing-research-110x75.jpg 110w, https://www.vasectomy-information.com/wp-content/uploads/man-doing-research-220x147.jpg 220w" width="110"></a><span data-dcnode-id="688" instrument_node=""> </span><a class="title" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/what-to-know/"><span data-dcnode-id="687" instrument_node="">What to know: Things to consider before getting a vasectomy</span></a><span data-dcnode-id="685" instrument_node=""> </span><span class="date" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">August 12, 2020</span></span></div></aside><h2 class="anchor" data-dcnode-id="679" id="summary"><span data-dcnode-id="680" instrument_node="">Summary</span></h2><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Vasectomy is an outpatient procedure performed on a man that will permanently keep him from being able to get a woman pregnant. The surgery involves the surgical disconnection of the tubes that carry sperm from the testicles to the ejaculatory ducts. A vasectomy blocks the transport of sperm. The operation does not affect the man’s ability to achieve orgasm or ejaculate. There will still be a fluid ejaculate after the procedure, but it won’t contain sperm.</span></p><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Vasectomy is a safe and highly reliable procedure for preventing pregnancy. However, all medical procedures carry some risk, including vasectomy. Men should be aware of the risks and potential complications that could occur after the procedure and over time before deciding to undergo surgery.</span></p><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Vasectomy should not be considered contraception – it is sterilization, and should be regarded as permanent. Vasectomies can be reversed, but the reversal procedure does not guarantee the restoration of fertility. If you think you might change your mind later or are not absolutely sure you want to be sterilized, you should consider other methods of birth control.</span></p><span data-dcnode-id="672" instrument_node=""> </span><details class="ref" data-dcnode-id="552"><span data-dcnode-id="671" instrument_node=""> </span><summary data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">References and further reading</span></summary><span data-dcnode-id="668" instrument_node=""> </span><small data-dcnode-id="664"><span data-dcnode-id="667" instrument_node="">Vasectomy-Information.com has a strict sourcing policy. We rely on evidence-based medicine, peer-reviewed studies, reputable clinical journals, and medical associations. Learn more about how we ensure our content is accurate and up-to-date by reading our </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/about-us/%23editorial-policy"><span data-dcnode-id="666" ins ">About us</span></h2><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Vasectomy is a relatively simple medical procedure with an excellent safety record. But as with all medical procedures, it is important to enter into it with as much information as possible. This website is dedicated to making information about the vasectomy procedure accessible and understandable to help our readers considering a vasectomy to make an informed decision.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Vasectomy-Information.com is designed to support, not replace the relationship that exists between you and your doctor.</span></p><span data-dcnode-id="503" instrument_node=""> </span><a class="arrow-button" data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/about-us/"><span data-dcnode-id="502" instrument_node="">Learn more about the website and our contributors</span></a></div><div class="display-community" data-dcnode-id="448"><div class="test" data-dcnode-id="449"><h2 class="widget-title" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">From our community</span></h2><div class="community-item" data-dcnode-id="487"><span data-dcnode-id="497" instrument_node=""> </span><svg data-dcnode-id="493" height="32" viewBox="0 0 36 32" width="36" xmlns="http://www.w3.org/2000/svg"></svg><span data-dcnode-id="496" instrument_node=""> </span><path d="M36.571,9.143h-2v-2a2.006,2.006,0,0,0-2-2h-28a2.006,2.006,0,0,0-2,2v24a2.006,2.006,0,0,0,2,2h2v2a2.006,2.006,0,0,0,2,2h28a2.006,2.006,0,0,0,2-2v-24a2.006,2.006,0,0,0-2-2Zm-30,2v20h-2l0,0V7.146l0,0H32.568l0,0v2h-24A2.006,2.006,0,0,0,6.571,11.143Zm30,24,0,0H8.575l0,0V11.146l0,0H36.568l0,0Zm-4-19a3,3,0,1,1-3-3A3,3,0,0,1,32.571,16.143Zm2,17h-24v-4l7-12,8,10h2l7-6Z" data-dcnode-id="495" data-name="Icon metro-images" fill="#9fadb9" id="Icon_metro-images" transform="translate(-2.571 -5.143)"></path><span data-
