 style="box-sizing: border-box; border-radius: inherit;" target="_blank"><span data-dcnode-id="3008" instrument_node="">Answered </span><span data-dcnode-id="3007" instrument_node="">5</span><span data-dcnode-id="3006" instrument_node=""> years </span><span data-dcnode-id="3005" instrument_node="">ago</span></a><span class="q-box" data-dcnode-id="2991" style="box-sizing: border-box;"><span data-dcnode-id="3000"><span data-dcnode-id="3003" instrument_node=""> </span><span data-dcnode-id="3002" instrument_node="">·</span><span data-dcnode-id="3001" instrument_node=""> </span></span><span data-dcnode-id="2999" instrument_node="">Author has </span><span class="q-text qu-bold" data-dcnode-id="2997" style="box-sizing: border-box;"><span data-dcnode-id="2998" instrument_node="">6K</span></span><span data-dcnode-id="2996" instrument_node=""> answers</span><span data-dcnode-id="2995" instrument_node=""> and </span><span class="q-text qu-bold" data-dcnode-id="2993" style="box-sizing: border-box;"><span data-dcnode-id="2994" instrument_node="">15.8M</span></span><span data-dcnode-id="2992" instrument_node=""> answer views</span></span></div><div class="q-inline qu-verticalAlign--middle" data-dcnode-id="2989" style="box-sizing: border-box; display: inline;"></div></div></div><div class="q-inlineFlex qu-ml--small qu-alignItems--center" data-dcnode-id="2985" style="box-sizing: border-box; display: inline-flex;"><div class="q-flex" data-dcnode-id="2986" style="box-sizing: border-box; display: flex;"></div></div></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mb--tiny spacing_log_originally_answered_banner qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2978" style="box-sizing: border-box;"><span data-dcnode-id="2980" instrument_node="">Originally Answered: </span><span data-dcnode-id="2979" instrument_node="">Is a man awake during a vasectomy? ?</span></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2916" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit; cursor: initial;" tabindex="-1" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2917" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2919" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2920"><span class="q-box qu-userSelect--text" data-dcnode-id="2921" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2977" instrument_node="">uh, yeah.</span></span></p><span data-dcnode-id="2974" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2971" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2972" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2973" instrument_node="">It’s pretty much the same as getting a tooth pulled, minus the tooth part. A little local to numb the skin, a bigger local to numb the area. Man is reclining, but not usually fully supine. Surgeon between man’s legs, does a snip, a snippity-snip, and a bit of cauterization or a using the fascia to “seal the deal”, and might stitch, might butterfly, the incision closed; lather, rinse repeat for the other side. Done. Takes all of maybe 15 to 20 minutes.</span></span></p><span data-dcnode-id="2970" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2967" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2968" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2969" instrument_node="">The Chinese have gone one better:</span></span></p><span data-dcnode-id="2966" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2963" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2964" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2965" instrument_node="">No-Scalpel Vasectomy</span></span></p><span data-dcnode-id="2962" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2959" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2960" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2961" instrument_node="">A method of vasectomy called no-scalpel vasectomy (NSV) that does not require the use of a scalpel was developed in China in 1974. NSV is now used in a third of all vasectomies.</span></span></p><span data-dcnode-id="2958" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2955" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2956" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2957" instrument_node="">The technique takes about 10 minutes and is performed in a doctor's office or a family planning clinic. The no-scalpel vasectomy differs from a conventional vasectomy in the method of accessing the vasa deferentia:</span></span></p><ul class="q-box" data-dcnode-id="2942" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2952" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2953" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2954" instrument_node="">In NSV, the doctor feels for the vas deferens under the skin and holds them in place with a small ring clamp.</span></span></li><li class="q-relative" data-dcnode-id="2949" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2950" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2951" instrument_node="">Instead of making two incisions, the doctor uses a sharp hemostat, a special instrument that makes one tiny puncture and then is used to gently stretch the opening until the vas deferens can be pulled through it. (The surgeon must rotate his wrist to pull the vas out -- called a supination maneuver -- which may be difficult to perform.)</span></span></li><li class="q-relative" data-dcnode-id="2946" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2947" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2948" instrument_node="">The vas is then sealed off using the same methods (clips, sutures, cauterization using an electric needle, or some combination) as conventional vasectomy. As with standard vasectomy, the closures can be open- or closed-ended.</span></span></li><li class="q-relative" data-dcnode-id="2943" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2944" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2945" instrument_node="">There is very little bleeding with the no-scalpel vasectomy. No stitches are needed to close the tiny opening, which heals quickly and leaves no scar.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2939" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2940" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2941" instrument_node="">When performed correctly, NSV works just as well as conventional vasectomy, takes less time, and causes less bleeding, infection, and pain. Current research indicates that NSV is the safest type of vasectomy procedure. NSV is difficult to perform, however, and most surgeons must do about 15 - 20 procedures in order to be proficient. NSV is becoming a popular alternative to standard vasectomy, but it is important to select a doctor who is experienced with this procedure.</span></span></p><span data-dcnode-id="2938" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2935" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2936" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2937" instrument_node="">A simpler method of NSV, called percutaneous vasectomy, is now also being used. Recent research suggests that it works as well as standard NSV and is easier to perform. Percutaneous vasectomy uses the same instruments as no-scalpel vasectomy, but with a different surgical technique. The hemostat is used to first puncture the skin (instead of spearing the vas and lifting it out). The ringed clamp is then passed through the incision and used to enclose the section of the vas that is then pulled out for closure. This avoids the need for the difficult wrist maneuver in NSV.</span></span></p><span data-dcnode-id="2934" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2926" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="2927" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/health/guides/surgery/vasectomy/vasectomy-surgery.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.nytimes.com"><span data-dcnode-id="2933" instrument_node="">Vasectomy Vasectomy Surgery - Vasectomy Health Information - NY Times Health</span></a><span class="q-inlineBlock" data-dcnode-id="2928" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2929"><svg data-dcnode-id="2930" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2931" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="2925" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2922" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2923" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2924" instrument_node="">It’s not a big deal. Once it’s all done, anyway.</span></span></p></span></span></div><div data-dcnode-id="2918"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2901" style="box-sizing: border-box;"><span data-dcnode-id="2902"><span class="q-box qu-display--none" data-dcnode-id="2914" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="2911"><span data-dcnode-id="2913" instrument_node="">910</span><span data-dcnode-id="2912" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="2909" style="box-sizing: border-box;"><span data-dcnode-id="2910" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="2906"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2907" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data-dcnode-id="2908" instrument_node="">View upvotes</span></div></span><span class="q-box qu-display--none" data-dcnode-id="2904" style="box-sizing: border-box;"><span data-dcnode-id="2905" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="2903"></span></span></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2833" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2834" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ea an pregnant, it simply lowers the odds to extremely low levels.</span></span></p><span data-dcnode-id="2689" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2686" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2687" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2688" instrument_node="">And yet, it is effectively considered irreversible because it can be very challenging to successfully recanalize the vas deferens.</span></span></p><span data-dcnode-id="2685" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2678" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2683" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2684" instrument_node="">A vasectomy must always be considered </span></span><span data-dcnode-id="2681" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2682" instrument_node="">final</span></span><span data-dcnode-id="2679" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2680" instrument_node=""> and should not be thought of as a convenient and temporary measure simply because you haven't yet figured out who "the queen" will be.</span></span></p><span data-dcnode-id="2677" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2674" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2675" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2676" instrument_node="">Do you realize that if you had a vasectomy and you meet your said "queen" and she wa  0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2433" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2389" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2390" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2391"><span class="q-box qu-userSelect--text" data-dcnode-id="2392" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2417" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2418" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2419" instrument_node="">The moment I hear a man has had a vasectomy, my respect for him instantly increases by about 200 bonus points.</span></span></p><span data-dcnode-id="2416" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2413" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2414" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2415" instrument_node="">I know too many people who refuse to have vasectomies even though they are monogamously married and have had all the kids they want - No, their wives must continue to suffer through the side effects of birth control for the next decade or two because their sense of masculinity is rooted in their balls. It is ridiculous and selfish and the lack of concern for their partners disgusts me. (Oh and these same people will often complain at their wives’ lack of interest in sex, never considering that the oral contraceptives she has to be on to prevent getting pregnant often negatively affects libido, and that fear of pregnancy itself makes sex a lot less fun).</span></span></p><span data-dcnode-id="2412" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2405" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2410" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2411" instrument_node="">I have also known too many men who never want kids, but are still unwilling to have a vasectomy or be celibate. They are willing to just leave something as important as </span></span><span data-dcnode-id="2408" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2409" instrument_node="">making a person and becoming a parent</span></span><span data-dcnode-id="2406" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2407" instrument_node=""> entirely up to someone else. I think this is incredibly immature, selfish, careless, and naive.</span></span></p><span data-dcnode-id="2404" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2401" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2402" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2403" instrument_node="">Honestly, the lack of concern over becoming a parent befuddles me. If I was in their position, and the decision whether I become a parent or not was entirely in someone else’s hands, I would feel incredibly vulnerable. I often hear people complain about this, so it confuses my why more of them don’t apply the obvious solution and take responsibility for what happens to them.</span></span></p><span data-dcnode-id="2400" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2397" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2398" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2399" instrument_node="">That is why I see having had a vasectomy as an indication of maturity, responsibility and respect, as well as an indication of a healthy sense of agency and realism.</span></span></p><span data-dcnode-id="2396" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2393" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2394" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2395" instrument_node="">Call me weird, but those characteristics are kind-of hot…</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2321" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2322" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2323" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2337" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2359" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2360" style="box-sizing: border-box; displa ument_node="">Vas deferens - Wikipedia</span></a><span class="q-inlineBlock" data-dcnode-id="1955" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1956"><svg data-dcnode-id="1957" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1958" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="1952" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1949" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1950" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1951" instrument_node="">The vasectomy can be reversed, but this is expensive and there is no guarantee that it will work. The longer you have had the vasectomy, the less likely a reversal will work at all.</span></span></p><span data-dcnode-id="1948" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1945" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1946" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1947" instrument_node="">A vasectomy is far far safer and easier than the female getting the “tubal ligation” procedure. Men who act like it is painful or difficult are just being babies, just like when they get a cold. Try pushing a baby out of your vagina with no anesthesia and then having someone use a scalpel to cut you open to make an episiotomy, also without anesthesia. Nobody gets to complain about a vasectomy.</span></span></p><span data-dcnode-id="1944" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1941" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1942" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1943" instrument_node="">I suggest getting vasectomy as soon as you decide your family is finished growing.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1864" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1865" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1866" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1880" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1907" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1908" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1918" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1919" style="box-sizing: border-box; position: relative;"><button aria-label="27 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-bo "1736" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1749" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1750" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1751" instrument_node="">Because people assume if they like kids, you have to as well. “Everyone wants kids”, they think, and if you are younger than about 50, “you'll change your mind”.</span></span></p><span data-dcnode-id="1748" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1745" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1746" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1747" instrument_node="">Find another doctor, one that respects you are an adult making a responsible decision. If challenged by the “you will change your mind” bit, tell them you've decided there are too many kids in foster care to have children when you can adopt, and you have made a religious commitment to only have kids via adoption as a result. (I throw in the “religious” bit because most people, in the US at least, shy away from challenging even the most ridiculous religious commitment. For whatever reason, we are expected to treat them as sacrosanct (pun intended), so you may as well use it to your advantage where you can!)</span></span></p><span data-dcnode-id="1744" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1737" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1742" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1743" instrument_node="">Part of me thinks “tell them you hate kids and cannot be around them without getting violent” just to shove their face in it, but </span></span><span data-dcnode-id="1740" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1741" instrument_node="">DON'T DO THAT</span></span><span data-dcnode-id="1738" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1739" instrument_node="">. They are mandatory reporters, after all, and would freak out that you are actually dangerous.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1665" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1666" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1667" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1681" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1703" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1704" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1714" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1715" style="box-sizing: border-box; position: relative;"><button aria-label="1 upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--cente ration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1393" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1394" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1395" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1389" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1390"><svg data-dcnode-id="1391" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1392" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1328" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1329" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1330"><span class="q-box qu-userSelect--text" data-dcnode-id="1331" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1376" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1377" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1378" instrument_node="">JRMC doesn't require a referral from a primary care physician for no-scalpel vasectomies. For some, one of the most awkward parts of the procedure is communicating by phone, said Dr. Bates.</span></span></p><span data-dcnode-id="1375" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1370" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1373" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1374" instrument_node="">Do THIS Simple 60-Second Trick For Breakfast, Save Your Prostate - </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//maincauseofprostatecancer.quora.com/Do-THIS-Simple-60-Second-Trick-For-Breakfast-Save-Your-Prostate-Click-here-to-watch-video-https-t-co-SV0xQmwQ" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: bold; font-style: normal; background: none;" target="_top" title="maincauseofprostatecancer.quora.com"><span data-dcnode-id="1372" instrument_node="">Click Here to Read</span></a></p><span data-dcnode-id="1369" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1366" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1367" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1368" instrument_node="">For men considering permanent birth control, March is a great time, said Dr. Robert Bates, a Harvard-trained urologist at Jamestown Regional Medical Center. Men need about two days of couch time to recover after the procedure. The first round of the NCAA men’s Division I college basketball tournament is set for March 17-18. “It is good timing for a no-scalpel vasectomy,” Dr. Bates said.</span></span></p><span data-dcnode-id="1365" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1362" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1363" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1364" instrument_node="">While many men know what a vasectomy is, they don’t always know how the procedure works. Below are six common misperceptions about no-scalpel vasectomies.</span></span></p><span data-dcnode-id="1361" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1358" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1359" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1360" instrument_node="">Doctors don’t remove your “basketballs.” Despite one popular myth, testicles are not removed during a vasectomy. In fact, a no-scalpel vasectomy doesn’t utilize scalpels, blades or rubber bands. Instead, a sharp hemostat makes a tiny puncture to the scrotum. Through this small hole, doctors use a special instrument to pull up the vas deferens. Vas deferens are thick tubes in the body that carry sperm cells. The vas deferens is cut and cauterized and then separated. After, the vas deferens is simply returned to the scrotum. The puncture hole seals without a need for sutures.</span></span></p><span data-dcnode-id="1357" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1354" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1355" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1356" instrument_node="">Vasectomies are easy, breezy and masculine. Gone are the days of medieval torture devices like scalpels and sutures. No-scalpel vasectomies no longer cause bleeding, pain and long recoveries. A patient may have some soreness and swelling, which can easily be resolved by applying an ice pack.</span></span></p><span data-dcnode-id="1353" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1350" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1351" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1352" instrument_node="">100% success rate. . . Vasectomies have a 100% success rate if two negative specimens are obtained and the failure rate is less than 0.5% or less than one in two hundred. JRMC laboratory will check sperm counts at one and two months after the procedure.</span></span></p><span data-dcnode-id="1349" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1346" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1347" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1348" instrument_node="">Sexual desire will not change. Contrary to many fears, a vasectomy doesn’t have an impact on testosterone levels, nor does it impact sexual desire or seminal fluid output. Vasectomies also don’t increase your risk of prostate cancer.</span></span></p><span data-dcnode-id="1345" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1342" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1343" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1344" instrument_node="">It’s a quickie. No-scalpel vasectomies generally take less than 30 minutes. With Dr. Bates’ help, patients may not even miss the second half of the game.</span></span></p><span data-dcnode-id="1341" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1338" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1339" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1340" instrument_node="">No need for a referral. JRMC doesn’t require a referral from a primary care physician for no-scalpel vasectomies. For some, one of the most awkward parts of the procedure is communicating by phone, said Dr. Bates. However, the phone call is short and sweet, much like the vasectomies themselves.</span></span></p><span data-dcnode-id="1337" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1332" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1335" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1336" instrument_node="">Do THIS Simple 60-Second Trick For Breakfast, Save Your Prostate - </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//maincauseofprostatecancer.quora.com/Do-THIS-Simple-60-Second-Trick-For-Breakfast-Save-Your-Prostate-Click-here-to-watch-video-https-t-co-SV0xQmwQ" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: bold; font-style: normal; background: none;" target="_top" title="maincauseofprostatecancer.quora.com"><span data-dcnode-id="1334" instrument_node="">Click Here to Read</span></a></p></span></span></div></div></div></div></d ywhere; direction: ltr;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whattoexpectduringaprostateexamination.quora.com/What-to-Expect-During-a-Prostate-Examination-Do-THIS-Simple-60-Second-Trick-For-Breakfast-Save-Your-Prostate-Click-h" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="whattoexpectduringaprostateexamination.quora.com"><span data-dcnode-id="1146" instrument_node="">Sperm </span></a><span data-dcnode-id="1143" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1144" instrument_node="">are constantly being produced in men, even after a long time from a vasectomy, there should be viable sperm. However, the success of the reversal, in terms of achieving a pregnancy, is dependent upon the experience of the surgeon, the age and fertility status of the female partner, and the length of time since the vasectomy.</span></span></p><span data-dcnode-id="1141" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1138" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1139" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1140" instrument_node="">How likely is a positive outcome from a vasectomy reversal?</span></span></p><span data-dcnode-id="1137" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1134" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1135" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1136" instrument_node="">The outcome of the surgery is more dependent upon what is found at the time of the reversal as well as the experience of the surgeon performing the reversal surgery. During the reversal, the surgeon will check for sperm within the vas. If sperm is present, then the two ends of the vas deferens can be put back together, and the success rate should be fairly high. However, if there is no sperm at the end of the vas, there is likely a blockage closer to the testicle. Then, a more complicated surgery may be performed, but this procedure has a lower success rate.</span></span></p><span data-dcnode-id="1133" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1130" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1131" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1132" instrument_node="">How is the surgery performed?</span></span></p><span data-dcnode-id="1129" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1126" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1127" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1128" instrument_node="">Most vasectomy reversals are performed as an outpatient surgery and can be done under local, regional or general anesthesia.</span></span></p><span data-dcnode-id="1125" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1122" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1123" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1124" instrument_node="">It typically takes approximately 3 to 4 hours using an operating microscope to perform the surgery.</span></span></p><span data-dcnode-id="1121" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1118" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1119" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1120" instrument_node="">What is the recovery process?</span></span></p><span data-dcnode-id="1117" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1114" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1115" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1116" instrument_node="">Recovery is variable and can take anywhere from 5 to 14 days. We recommend avoiding heavy lifting and sexual intercourse during the first 4 weeks after this surgery.</span></span></p><span data-dcnode-id="1113" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1106" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1111" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1112" instrument_node="">Source:</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="1107" href="#yECRT" id="cite-yECRT" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="1110" instrument_node="">[</span><span data-dcnode-id="1109" instrument_node="">1</span><span data-dcnode-id="1108" instrument_node="">]</span></a></p><span data-dcnode-id="1105" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1100" herit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="871" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="872" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="927" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="873" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="900" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="901" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="902" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="903" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="904" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="924" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="925" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="926" instrument_node="">That’s not easy to answer. Frozen sperm is not a 100% insurance you’ll have your own biological kids in the future. A couple of things to think about:</span></span></p><ul class="q-box" data-dcnode-id="917" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="921" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="922" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="923" instrument_node="">Men that donate for a sperm bank have above average sperm count, I heard that only less then 10% of the people that present themselves as donor have good enough sperm to be frozen. You might need to check if you’re in the that 10% category of sperm quality to survive freezing.</span></span></li><li class="q-relative" data-dcnode-id="918" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="919" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="920" instrument_node="">The institute that stores your sperm has no legal obligation to impregnate your female partner. If you test your sperm, have it tested somewhere else to avoid conflict-of-in</span></span></li></ul><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="905" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="906" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="907" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="908" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="909" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="914" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="915" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="916" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="910" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="911"><svg data-dcnode-id="912" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="913" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="874" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="875" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="876"><span class="q-box qu-userSelect--text" data-dcnode-id="877" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="897" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="898" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="899" instrument_node="">That’s not easy to answer. Frozen sperm is not a 100% insurance you’ll have your own biological kids in the future. A couple of things to think about:</span></span></p><ul class="q-box" data-dcnode-id="878" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="894" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="895" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="896" instrument_node="">Men that donate for a sperm bank have above average sperm count, I heard that only less then 10% of the people that present themselves as donor have good enough sperm to be frozen. You might need to check if you’re in the that 10% category of sperm quality to survive freezing.</span></span></li><li class="q-relative" data-dcnode-id="891" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="892" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="893" instrument_node="">The institute that stores your sperm has no legal obligation to impregnate your female partner. If you test your sperm, have it tested somewhere else to avoid conflict-of-interest situations.</span></span></li><li class="q-relative" data-dcnode-id="888" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="889" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="890" instrument_node="">Depending on your female partner’s own fertility you might need up to a year to try to impregnate her with low-technical procedures like ICI or IUI. That’s a lot of visits to the sperm bank to build up that storage.</span></span></li><li class="q-relative" data-dcnode-id="885" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="886" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="887" instrument_node="">Once you run out of straws you’re only left with high-tech (read expensive) procedures like IVF and ICSI. Once these options failed too you’re ‘out of stock’.</span></span></li><li class="q-relative" data-dcnode-id="882" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="883" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="884" instrument_node="">Multiply that above story by 2–3 times depending on the amount of kids you want.</span></span></li><li class="q-relative" data-dcnode-id="879" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="880" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="881" instrument_node="">Don’t do a vasectomy if you have a (future) child wish, use something else until you want kids, and then do it the natural way, even if it takes longer you’ll have a non-limited source of sperm and don’t need to worry about running out.</span></span></li></ul></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="806" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="807" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="808" style="box-sizing: border-box
