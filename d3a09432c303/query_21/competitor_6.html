le="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4699" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4704" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4705" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4706" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4700" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4701"><svg data-dcnode-id="4702" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4703" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4659" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4660" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4661"><span class="q-box qu-userSelect--text" data-dcnode-id="4662" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4687" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4688" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4689" instrument_node="">The moment I hear a man has had a vasectomy, my respect for him instantly increases by about 200 bonus points.</span></span></p><span data-dcnode-id="4686" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4683" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4684" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4685" instrument_node="">I know too many people who refuse to have vasectomies even though they are monogamously married and have had all the kids they want - No, their wives must continue to suffer through the side effects of birth control for the next decade or two because their sense of masculinity is rooted in their balls. It is ridiculous and selfish and the lack of concern for their partners disgusts me. (Oh and these same people will often complain at their wives’ lack of interest in sex, never considering that the oral contraceptives she has to be on to prevent getting pregnant often negatively affects libido, and that fear of pregnancy itself makes sex a lot less fun).</span></span></p><span data-dcnode-id="4682" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4675" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4680" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4681" instrument_node="">I have also known too many men who never want kids, but are still unwilling to have a vasectomy or be celibate. They are willing to just leave something as important as </span></span><span data-dcnode-id="4678" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4679" instrument_node="">making a person and becoming a parent</span></span><span data-dcnode-id="4676" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4677" instrument_node=""> entirely up to someone else. I think this is incredibly immature, selfish, careless, and naive.</span></span></p><span data-dcnode-id="4674" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4671" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4672" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4673" instrument_node="">Honestly, the lack of concern over becoming a parent befuddles me. If I was in their position, and the decision whether I become a parent or not was entirely in someone else’s hands, I would feel incredibly vulnerable. I often hear people complain about this, so it confuses my why more of them don’t apply the obvious solution and take responsibility for what happens to them.</span></span></p><span data-dcnode-id="4670" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4667" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4668" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4669" instrument_node="">That is why I see having had a vasectomy as an indication of maturity, responsibility and respect, as well as an indication of a healthy sense of agency and realism.</span></span></p><span data-dcnode-id="4666" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4663" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4664" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4665" instrument_node="">Call me weird, but those characteristics are kind-of hot…</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4591" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4592" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4593" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4607" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4629" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4630" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4640" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4641" style="box-sizing: border-box; position: relative;"><button aria-label="14 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--cen mponent-sc-1oskqb9-1 TitleText___StyledCssInlineComponent-sc-1hpb63h-0 jPnwvF" data-dcnode-id="4507"><a class="q-box qu-display--block qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/I-had-a-vasectomy-years-ago-without-telling-my-wife-and-now-my-wife-is-saying-she-is-pregnant-what-should-I-do" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4509" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="4510" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="4511" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="4512" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4513" style="box-sizing: border-box;"><span data-dcnode-id="4514" style="background: none;"><span data-dcnode-id="4515" instrument_node="">I had a vasectomy years ago without telling my wife and now my wife is saying she is pregnant, what should I do?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4411" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="4412" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4413" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="4501" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="4414" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4468" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4469" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4470" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4471" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4472" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4496" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4499" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4500" instrument_node="">First of all … </span></span><span data-dcnode-id="4497" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4498" instrument_node="">calm down. Before you start drawing up divorce papers and hiding your assets, you need to look at this rationally.</span></span></p><span data-dcnode-id="4495" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4492" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4493" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4494" instrument_node="">Yes, obviously anyone's first thought it going to be that she cheated on you. However, there is a very BIG possibility that it's not true.</span></span></p><ol class="q-box" data-dcnode-id="4485" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4489" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4490" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4491" instrument_node="">She might not even be pregnant. If the two of you are sexually active and she has no reason to believe you cannot get her pregnant, she honestly might be mistaken. She could be late having her period and assuming it's because she's pregnant or feeling sick in the morning and confusing a flu with pregnancy symptoms.</span></span></li><li class="q-relative" data-dcnode-id="4486" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4487" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4488" instrument_node="">You absolutely co</span></span></li></ol><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4473" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4474" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4475" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4476" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4477" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4482" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4483" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4484" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4478" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4479"><svg data-dcnode-id="4480" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4481" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4415" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4416" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4417"><span class="q-box qu-userSelect--text" data-dcnode-id="4418" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4463" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4466" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4467" instrument_node="">First of all … </span></span><span data-dcnode-id="4464" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4465" instrument_node="">calm down. Before you start drawing up divorce papers and hiding your assets, you need to look at this rationally.</span></span></p><span data-dcnode-id="4462" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4459" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4460" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4461" instrument_node="">Yes, obviously anyone's first thought it going to be that she cheated on you. However, there is a very BIG possibility that it's not true.</span></span></p><ol class="q-box" data-dcnode-id="4452" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4456" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4457" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4458" instrument_node="">She might not even be pregnant. If the two of you are sexually active and she has no reason to believe you cannot get her pregnant, she honestly might be mistaken. She could be late having her period and assuming it's because she's pregnant or feeling sick in the morning and confusing a flu with pregnancy symptoms.</span></span></li><li class="q-relative" data-dcnode-id="4453" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4454" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4455" instrument_node="">You absolutely could be the father. It happens all the time. Men get “fixed” and it reverses itself over time. It can happen to women too.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4445" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4450" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4451" instrument_node="">The very first thing you should do is to sit down with her and gently reveal your secret. Believe it or not, you may feel like the victim here but you betrayed her too. You took away her choice when you solely decided the two of you were done having children. If she was not privy to that decision and was never able to decide for herself, that was extremely</span></span><span data-dcnode-id="4448" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4449" instrument_node=""> </span></span><span data-dcnode-id="4446" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4447" instrument_node="">unfair to her. She will likely be upset and she has every right to be. So brace yourself for that.</span></span></p><span data-dcnode-id="4444" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4441" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4442" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4443" instrument_node="">Once you've broken the news to her the reality of the situation will sink in and either she will break down and admit she cheated or she will be confused because she knows there's nobody else.</span></span></p><span data-dcnode-id="4440" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4437" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4438" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4439" instrument_node="">If she is adamant that she did not step out on you, you should give her the benefit of the doubt. If you treat her like shit for the entire pregnancy, don't go to the appointments with her and ruin the experience only to find out you're the father, you will regret it. Worst case is you stay involved and learn you're not the dad and have to make a choice then but it's better to do that and regret it than to miss out on your child's beginning and regret it.</span></span></p><span data-dcnode-id="4436" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4433" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4434" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4435" instrument_node="">You have some decisions to make no doubt about it but it all needs to start with a conversation. Not a fight. A conversation …. Good luck!</span></span></p><span data-dcnode-id="4432" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4427" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4430" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4431" instrument_node="">Edit: </span></span><span data-dcnode-id="4428" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4429" instrument_node="">someone pointed out a very important point in the comments. In some areas a man is responsible for a child even if the child is not biologically his if he is married to the woman.</span></span></p><span data-dcnode-id="4426" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4423" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4424" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4425" instrument_node="">I'm not entirely sure if this carries over through a divorce, but it is a very good point.</span></span></p><span data-dcnode-id="4422" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4419" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4420" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4421" instrument_node="">Thank you!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4337" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4338" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between q mic it doesn’t affect whether or not I do the procedure… in fact I often agree that not having more children as a couple is probably for the best (not that my opinion is important). The reasons I’ve encountered that men</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3654" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3655" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3656" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3657" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3658" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3663" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3664" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3665" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3659" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3660"><svg data-dcnode-id="3661" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3662" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3632" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3633" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3634"><span class="q-box qu-userSelect--text" data-dcnode-id="3635" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3646" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3647" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3648" instrument_node="">This happens not infrequently and, ultimately, the man seeking a vasectomy is my patient, not his partner. This is also true with women seeking sterilization - sometimes their partner doesn’t know and isn’t involved because he wouldn’t approve or ‘wouldn’t allow it.’ While I might suggest counseling or discuss that making these types of decisions solo indicates an unhealthy dynamic it doesn’t affect whether or not I do the procedure… in fact I often agree that not having more children as a couple is probably for the best (not that my opinion is important). The reasons I’ve encountered that men or women seek sterilization without their partner’s knowledge:</span></span></p><ol class="q-box" data-dcnode-id="3636" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3643" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3644" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3645" instrument_node="">They don’t want more children but their partner does - often the patient has been a victim of reproductive coercion or the partner has intentionally interfered with other methods of contraception (in my experience this is almost always a female patient whose husband is in the dark).</span></span></li><li class="q-relative" data-dcnode-id="3640" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3641" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3642" instrument_node="">They are in an extra-marital relationship and want to prevent pregnancy… but their spouse is already infertile because she is menopausal or has had a sterilization procedure herself. So the (almost always male) patient has no reason he can discuss with his spouse why he would need a vasectomy.</span></span></li><li class="q-relative" data-dcnode-id="3637" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3638" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3639" instrument_node="">One partner has a strong religious objection to contraception / sterilization so even though as a couple they may not want more children one partner may not be supportive of the other’s decision to actually do something to prevent it.</span></span></li></ol></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3564" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3565" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3566" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3580" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3602" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3603" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3613" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3614" style="box-sizing: border-box; position: relative;"><button aria-label="4 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="3615" role="button" style="box-sizing: bor  He adamantly does not want more children, but I do. He doesn’t seem to care at all. How can I explain to my husband that I don't want him to get a vasectomy?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mb--tiny spacing_log_originally_answered_banner qu-color--gray_light qu-passColorToLinks" data-dcnode-id="3083" style="box-sizing: border-box;"><span data-dcnode-id="3085" instrument_node="">Originally Answered: </span><span data-dcnode-id="3084" instrument_node="">How can I explain to my husband that I don't want him to get a vasectomy?</span></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3011" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3012" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3013" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3082" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3014" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3046" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3047" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3048" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3049" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3050" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3079" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3080" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3081" instrument_node="">Having children is only a good idea when both parents want it. Thus when he's opposed to it, that just quite simply should not happen. </span></span></p><span data-dcnode-id="3078" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3075" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3076" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3077" instrument_node="">You have 2 children already. </span></span></p><span data-dcnode-id="3074" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3071" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3072" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3073" instrument_node="">There's a huge difference between having no children, and having children, but the difference between having 2 and having 3, is a lot smaller. There's diminishing returns.</span></span></p><span data-dcnode-id="3070" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3067" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3068" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3069" instrument_node="">You don't say anything about it, but I wonder what the situation around the conception of your second child was. Were you both enthusiastic about it, or did he let himself be convinced about this despite initial scepticism ? </span></span></p><span data-dcnode-id="3066" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3063" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3064" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3065" instrument_node="">He might want the vasectomy quite simply</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3051" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3052" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3053" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3054" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3055" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3060" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3061" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3062" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3056" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3057"><svg data-dcnode-id="3058" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3059" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3015" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3016" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3017"><span class="q-box qu-userSelect--text" data-dcnode-id="3018" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3043" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3044" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3045" instrument_node="">Having children is only a good idea when both parents want it. Thus when he's opposed to it, that just quite simply should not happen. </span></span></p><span data-dcnode-id="3042" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3039" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3040" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3041" instrument_node="">You have 2 children already. </span></span></p><span data-dcnode-id="3038" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3035" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3036" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3037" instrument_node="">There's a huge difference between having no children, and having children, but the difference between having 2 and having 3, is a lot smaller. There's diminishing returns.</span></span></p><span data-dcnode-id="3034" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3031" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3032" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3033" instrument_node="">You don't say anything about it, but I wonder what the situation around the conception of your second child was. Were you both enthusiastic about it, or did he let himself be convinced about this despite initial scepticism ? </span></span></p><span data-dcnode-id="3030" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3027" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3028" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3029" instrument_node="">He might want the vasectomy quite simply to avoid having that happen again. And I can understand it. If he simple does not want any more children, yet he has a wife who pushes him continually on this, despite having 2 children already, a vasectomy is a pretty definite way of saying: "really, i've thought about it, and this topic is closed."</span></span></p><span data-dcnode-id="3026" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3023" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3024" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3025" instrument_node="">I think you should let well-enough be well-enough. Children are a huge comittment, the biggest we ever make. He already made this comittment with you twice. Pushing him to make it even more times is asking a lot.</span></span></p><span data-dcnode-id="3022" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3019" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3020" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3021" instrument_node="">Alternatively, I guess you can divorce him and find another man who wants more children. I don't feel this would be reasonable, but it's your right to do so if you really want to.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2942" style="box-sizing: border-box;"><div class="q-box ActionBa de-id="2254" instrument_node="">Absolutely. You have the right to do what you want with your own body. But it would be an enormous betrayal to make a final decision about the reproductive future of your marriage without having discussions with your wife. This affects her as much as you. If she ends up being opposed to the vasectomy and you choose to proceed anyway, she needs to be aware of your decision. Your body, your choice. But your wife deserves to know the situation so she can make her own informed decisions based on how much or little your choice affects her.</span></span></p><span data-dcnode-id="2251" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2248" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2249" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2250" instrument_node="">Obviously, you already know she either wants another kid or </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2236" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2237" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2238" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2239" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2240" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2245" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2246" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2247" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2241" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2242"><svg data-dcnode-id="2243" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2244" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2216" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2217" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2218"><span class="q-box qu-userSelect--text" data-dcnode-id="2219" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2228" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2229" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2230" instrument_node="">Absolutely. You have the right to do what you want with your own body. But it would be an enormous betrayal to make a final decision about the reproductive future of your marriage without having discussions with your wife. This affects her as much as you. If she ends up being opposed to the vasectomy and you choose to proceed anyway, she needs to be aware of your decision. Your body, your choice. But your wife deserves to know the situation so she can make her own informed decisions based on how much or little your choice affects her.</span></span></p><span data-dcnode-id="2227" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2224" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2225" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2226" instrument_node="">Obviously, you already know she either wants another kid or she is not ready to make this possibly permanent final decision just yet. I can't fathom any other reason why you would hide this information from your wife besides you getting to do what you want without having to participate in a potentially tense conversation.</span></span></p><span data-dcnode-id="2223" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2220" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2221" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2222" instrument_node="">Other than getting a vasectomy or using condoms, women bear the full responsibility for birth control. Often this involves multiple doctors visits and side effects. Here is a short breakdown of her main choices. A painful IUD insertion with hormonal side effects. Or a daily birth control pill that we have to have to think about every day and carries a risk of blood clots, heart attack and stroke. A slightly less annoying patch that she can wear with the same side effects as the pill. A monthly shot (and trip to the doctor) that can cause weight gain, acne and mood changes. Or she can have a device implanted in her upper arm with similar side effects as the shot. You say you planned for two kids. Now that you have them, your wife is likely on or will be on some form of birth control. It seems like a lot to put on someone for no reason. Your body choice ultimately affects her body choice.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2143" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2144" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2145" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2159" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2186" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcn ox qu-overflow--hidden" data-dcnode-id="2023" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2024" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2025" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2050" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2051" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2052" instrument_node="">In Canada, that would most likely be considered sexual assault if a man did it.</span></span></p><span data-dcnode-id="2049" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2042" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2047" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2048" instrument_node="">The foundational case from 2014 is </span></span><span data-dcnode-id="2045" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2046" instrument_node="">R. v. Hutchinson</span></span><span data-dcnode-id="2043" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2044" instrument_node="">, in which a woman agreed to sex with a condom, but the man poked a hole in it. She became pregnant. The court decided the main test is whether his actions caused a substantial risk of bodily harm; since pregnancy and STI’s are a risk of harm, this was found to be the case. In addition, they speak to the woman’s sexual agency.</span></span></p><span data-dcnode-id="2041" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2038" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2039" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2040" instrument_node="">This appears to have been extended to removing a condom immediately before or during sex. I haven’t read the case, but in media coverage it se</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2026" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2027" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2028" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2029" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2030" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><di trument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2010" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2015" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2016" instrument_node="">The foundational case from 2014 is </span></span><span data-dcnode-id="2013" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2014" instrument_node="">R. v. Hutchinson</span></span><span data-dcnode-id="2011" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2012" instrument_node="">, in which a woman agreed to sex with a condom, but the man poked a hole in it. She became pregnant. The court decided the main test is whether his actions caused a substantial risk of bodily harm; since pregnancy and STI’s are a risk of harm, this was found to be the case. In addition, they speak to the woman’s sexual agency.</span></span></p><span data-dcnode-id="2009" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2006" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2007" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2008" instrument_node="">This appears to have been extended to removing a condom immediately before or during sex. I haven’t read the case, but in media coverage it seems like sexual agency is being discussed more.</span></span></p><span data-dcnode-id="2005" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1997" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="1998" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.ca/amp/s/nationalpost.com/news/canada/mans-refusal-to-wear-condom-after-agreeing-to-cancels-out-consent-judge/amp" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.google.ca"><span data-dcnode-id="2004" instrument_node="">Refusing to wear a condom after agreeing to is sexual assault, Ontario judge rules</span></a><span class="q-inlineBlock" data-dcnode-id="1999" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2000"><svg data-dcnode-id="2001" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2002" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="1996" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1993" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1994" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1995" instrument_node="">I think it’s a pretty small jump to say lying about having a vasectomy is comparable to removing or tampering with a condom, even though STI’s are no longer the concern. Pregnancy is still risky.</span></span></p><span data-dcnode-id="1992" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1989" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1990" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1991" instrument_node="">In the case of a woman lying about a tubal ligation, it’s less clear cut. The Crown can’t argue that he was at risk of bodily harm from pregnancy. The case would rely on arguing that the man’s sexual agency was taken away from him - in legal speak, that his consent was vitiated by her fraudulent claim.</span></span></p><span data-dcnode-id="1988" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1985" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1986" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1987" instrument_node="">I don’t know the scenario in other countries.</span></span></p><span data-dcnode-id="1984" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1981" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1982" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1983" instrument_node="">The purpose of sexual assault laws is to discourage people from taking away other people’s sexual agency by engaging them in sexual acts they don’t want to do. This fits those criteria very well, and I think the law in Canada is headed in the right direction with this.</span></span></p><span data-dcnode-id="1980" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1977" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1978" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1979" instrument_node="">For these laws to be meaningful, we need more consent education, especially for kids and judges. If nobody takes consent seriously and nobody enforces the laws, it doesn’t matter how good the laws are.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1905" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1906" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1907" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1921" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1943" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1944" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1954" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1955" style="box-sizing: border-box; position: relative;"><button aria-label="3 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white o they? Yes.</span></span></p><span data-dcnode-id="1815" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1812" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1813" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1814" instrument_node="">When I was married by husband’s doctor required the wife’s signature before he performed surgery.</span></span></p><span data-dcnode-id="1811" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1808" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1809" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1810" instrument_node="">Unfortunately, doctors can be sued by the wife in these situations so they don’t take chances.</span></span></p><span data-dcnode-id="1807" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1804" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1805" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1806" instrument_node="">I worked with a woman who had 2 children and suffered 5 miscarriages and her husband would not give his permission for her to get her tubes tied. Nor would he practice birth control.</span></span></p><span data-dcnode-id="1803" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1800" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1801" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1802" instrument_node="">luckily she found a doctor who took pity on her and did it anyway.</span></span></p><span data-dcnode-id="1799" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1796" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1797" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1798" instrument_node="">No man or woman should have to have anyone else’s permission.</span></span></p></span></span></div><div data-dcnode-id="1792"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="1775" style="box-sizing: border-box;"><span data-dcnode-id="1776"><span class="q-box qu-display--none" data-dcnode-id="1788" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="1785"><span data-dcnode-id="1787" instrument_node="">3.2K</span><span data-dcnode-id="1786" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="1783" style="box-sizing: border-box;"><span data-dcnode-id="1784" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="1780"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="1781" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data-dcnode-id="1782" instrument_node="">View upvotes</span></div></span><span class="q-box qu-display--none" data-dcnode-id="1778" style="box-sizing: border-box;"><span data-dcnode-id="1779" instrument_node=""  are awarded.  </span></span></p><span data-dcnode-id="1609" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1606" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1607" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1608" instrument_node="">A man may argue that he never had a vasectomy. The ex-wife may</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1594" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1595" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1596" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1597" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1598" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1603" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1604" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1605" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1599" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1600"><svg data-dcnode-id="1601" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1602" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1562" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1563" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1564"><span class="q-box qu-userSelect--text" data-dcnode-id="1565" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1582" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1583" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1588" instrument_node="">It is a he said- she said situation. The man may just say that he told the wife about it- and the wife never asked for a reversal. </span><br data-dcnode-id="1587"><span data-dcnode-id="1586" instrument_node="">The wife has to prove injury- she has to prove that they both wanted children, told a number of people about their desire to have kids, sought fertility treatment and so on.   Looks like the couple never sought fertility treatment explicitly- which makes the case very weak. </span><br data-dcnode-id="1585"><span data-dcnode-id="1584" instrument_node="">Some people IGNORE lawsuits like that and fail to file a response. These are the cases where sometimes huge damages are awarded.  </span></span></p><span data-dcnode-id="1581" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1566" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1567" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1580" instrument_node="">A man may argue that he never had a vasectomy. The ex-wife may have to prove that the vasectomy was performed. Very difficult to get past privacy laws. </span><br data-dcnode-id="1579"><span data-dcnode-id="1578" instrument_node="">The man may argue that the vasectomy was indeed performed- but he never got the "all clear" from the Doctors. About 1% of men are fertile 6 months after vasectomy- and require follow up surgery. </span><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">He does not have to produce medical records. He can say that he was on vacation in Mexico - and got tested there. </span><br data-dcnode-id="1575"><span data-dcnode-id="1574" instrument_node="">My feeling is that the judge may just throw out the lawsuit, due to there being no cause of action. Feminist should carefully consider that we have a constitution in this country- and men and women have equal rights. This means that  a right to sue a man for lying about vasectomy- must extend to similar circumstances in women.  There are many women who take birth control pills and lie about it.  This is very common when the woman has children from previous relationships. </span><br data-dcnode-id="1573"><span data-dcnode-id="1572" instrument_node="">With the rising rate of obesity- a fraction of the women of reproductive age are infertile or subfertile.  Some women are infertile or subfertile due to exposure to STDs. Very few women disclose disease related fertility issues. </span><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node="">Comparable situations happen all the time-  women have had a tubal ligation, and lie about it- so as to keep the man interested. Even more common: Loss of fertility has already happened due to age- but the woman prefers to "not dwell on it".  </span><br data-dcnode-id="1569"><span data-dcnode-id="1568" instrument_node="">I am not commenting on the moral aspect of the situation.  It is a myt that every immoral action can be litigated and compensated. </span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1489" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1490" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1491" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1505" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1532" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1533
