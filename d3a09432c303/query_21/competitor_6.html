sInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="779"><svg data-dcnode-id="780" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="781" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="700" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="701" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="702"><span class="q-box qu-userSelect--text" data-dcnode-id="703" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="765" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="766" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="767" instrument_node="">How long does it take to have a vasectomy done? What is the average recovery time after having a vasectomy done, and are they reversible?</span></span></p><span data-dcnode-id="764" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="759" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whattoexpectduringaprostateexamination.quora.com/What-to-Expect-During-a-Prostate-Examination-Do-THIS-Simple-60-Second-Trick-For-Breakfast-Save-Your-Prostate-Click-h" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="whattoexpectduringaprostateexamination.quora.com"><span data-dcnode-id="763" instrument_node="">Sperm </span></a><span data-dcnode-id="760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="761" instrument_node="">are constantly being produced in men, even after a long time from a vasectomy, there should be viable sperm. However, the success of the reversal, in terms of achieving a pregnancy, is dependent upon the experience of the surgeon, the age and fertility status of the female partner, and the length of time since the vasectomy.</span></span></p><span data-dcnode-id="758" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="755" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="756" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="757" instrument_node="">How likely is a positive outcome from a vasectomy reversal?</span></span></p><span data-dcnode-id="754" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="751" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="753" instrument_node="">The outcome of the surgery is more dependent upon what is found at the time of the reversal as well as the experience of the surgeon performing the reversal surgery. During the reversal, the surgeon will check for sperm within the vas. If sperm is present, then the two ends of the vas deferens can be put back together, and the success rate should be fairly high. However, if there is no sperm at the end of the vas, there is likely a blockage closer to the testicle. Then, a more complicated surgery may be performed, but this procedure has a lower success rate.</span></span></p><span data-dcnode-id="750" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="748" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="749" instrument_node="">How is the surgery performed?</span></span></p><span data-dcnode-id="746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="745" instrument_node="">Most vasectomy reversals are performed as an outpatient surgery and can be done under local, regional or general anesthesia.</span></span></p><span data-dcnode-id="742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="739" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="740" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="741" instrument_node="">It typically takes approximately 3 to 4 hours using an operating microscope to perform the surgery.</span></span></p><span data-dcnode-id="738" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="736" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="737" instrument_node="">What is the recovery process?</span></span></p><span data-dcnode-id="734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="731" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="733" instrument_node="">Recovery is variable and can take anywhere from 5 to 14 days. We recommend avoiding heavy lifting and sexual intercourse during the first 4 weeks after this surgery.</span></span></p><span data-dcnode-id="730" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="723" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="728" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="729" instrument_node="">Source:</span></span><a class="q-text qu-dynamicFontSize--tiny qu-verticalAlign--super" data-dcnode-id="724" href="#yECRT" id="cite-yECRT" style="box-sizing: border-box; line-height: 1;"><span data-dcnode-id="727" instrument_node="">[</span><span data-dcnode-id="726" instrument_node="">1</span><span data-dcnode-id="725" instrument_node="">]</span></a></p><span data-dcnode-id="722" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="717" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="720" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="721" instrument_node="">What to Expect During a Prostate Examination - </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22
