</span><div class="elementor-widget-container" data-dcnode-id="2269"><span data-dcnode-id="2273" instrument_node="">
</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Patient Instructions</span></h2><span data-dcnode-id="2270" instrument_node=""> </span></div><span data-dcnode-id="2268" instrument_node="">
</span></div><span data-dcnode-id="2266" instrument_node="">
</span><div class="elementor-element elementor-element-650746aa elementor-widget elementor-widget-text-editor" data-dcnode-id="2225" data-element_type="widget" data-id="650746aa" data-widget_type="text-editor.default"><span data-dcnode-id="2265" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="2227"><span data-dcnode-id="2264" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2229"><span data-dcnode-id="2263" instrument_node="">
</span><ol data-dcnode-id="2231"><li data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Please review the vasectomy pages on this website so you are confident and informed about the process.</span></li><li data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Register online on this website. You will then receive an email asking you to call our office to set an appointment your procedure.</span></li><li data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">For one week prior to your surgery date, do not take any Aspirin, Anticoagulants (warfarin) or Non-Steroidal Anti-inflammatory Drugs (NSAIDs) such as Ibuprofen, Motrin, Aleve, Advil, Ibuprofen, Naproxen, or Diclofenac. These medications will thin your blood.</span></li><li data-dcnode-id="2252"><span data-dcnode-id="2256" instrument_node="">Two business days prior to your appointment, please call our office to confirm your vasectomy at&nbsp;</span><a class="number" data-dcnode-id="2254" href="tel:604-717-6200"><span data-dcnode-id="2255" instrument_node="">604-717-6200</span></a><span data-dcnode-id="2253" instrument_node="">.</span></li><li data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Please avoid any alcohol 2 days before and after the procedure.</span></li><li data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Please shave the underside of the penis and front wall of the scrotum the day before the procedure to save time.</span></li><li data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">On the day of your surgery eat before your procedure (a normal breakfast or lunch) as those who don’t are more likely to become lightheaded.</span></li><li data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Please take a shower with soap and water the day of your procedure.</span></li><li data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Please arrive 15 minutes before for your appointment. You may drive yourself to and from the clinic after your procedure, although you may choose to have a driver if that makes you more comfortable, especially if you have a history of easy fainting.</span></li><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Wear light clothing because it will be warm in the room and wear clothes you won’t mind getting some iodine on.</span></li><li data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">When you are in one of the surgical rooms, you will not be required to fully undress; you just need to lower your pants, lie back on the table and relax. One of our staff with place an elastic band or “lasso” around your penis to bring it out of the operative field, wash the scrotal area with iodine solution, and place surgical towels on your body.</span></li><li data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">You are now ready for your vasectomy. One of our doctors will start by administering the anaesthetic.</span></li><li data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">You are encouraged to bring and listen to any music/podcast or watch any programming or play any games on your mobile device during the procedure.</span></li><li data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">If you have any questions, feel free to discuss with the doctor during your procedure.</span></li></ol><span data-dcnode-id="2230" instrument_node=""> </span></div><span data-dcnode-id="2228" instrument_node="">
</span></div><span data-dcnode-id="2226" instrument_node="">
</span></div><span data-dcnode-id="2224" instrument_node="">
</span></div><span data-dcnode-id="2222" instrument_node="">

</span></div><span data-dcnode-id="2218" instrument_node="">
</span></div><span data-dcnode-id="2216" instrument_node="">

</span></section><span data-dcnode-id="2212" instrument_node="">

</span></div><span data-dcnode-id="2197" instrument_node="">
</span><div class="elementor-element elementor-element-e486710 elementor-widget elementor-widget-text-editor" data-dcnode-id="2182" data-element_type="widget" data-id="e486710" data-widget_type="text-editor.default"><span data-dcnode-id="2196" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2186"><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Starting seven days before the procedure, do not take any aspirin or other anti-inflammatory medication. These thin the blood somewhat and increase the risk of bleeding. You can still take other pain relief medication like acetaminophen.</span></p><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">In addition to aspirin you must entirely avoid Non-Steroidal Anti-inflammatory Drugs such as Ibuprofen, Motrin, Aleve, Advil, Naproxen, Diclofenac, and others. Acetaminophen is acceptable because it does not impact your risk of bleeding during and after surgery.</span></p><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Don’t take aspirin and the other anti-inflammatories for your own safety. Our doctor may not perform your procedure if you have taken these drugs recently. If you have a medical requirement to do so, please discuss the situation with us.</span></p><span data-dcnode-id="2187" instrument_node=""> </span></div><span data-dcnode-id="2185" instrument_node="">

</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Please avoid alcohol for 48 hours before and after the surgery.</span></p><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Wash and then shave your scrotum two nights before your surgery. We recommend shaving then instead of the night before so that any discomfort due to shaving will have passed before you come into the clinic for your vasectomy procedure.</span></p><p data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">The image below shows where to shave, and you may choose to cut first carefully with small scissors prior to shaving with a safety razor or an electric shaver if that is your preference.</span></p><span data-dcnode-id="2061" instrument_node=""> </span></div><span data-dcnode-id="2059" instrument_node="">

</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">For our improved visibility and for hygienic reasons (keeping hair out of the surgical area), we recommend that you shave from the base of the penis and along front and sides of your scrotum. Avoid dry shaving; do it while showering.</span></p><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">While we could easily perform your procedure without having you shave at all, we believe that this is an important step in performing a meticulous surgery.</span></p><span data-dcnode-id="2020" instrument_node=""> </span></div><span data-dcnode-id="2018" instrument_node="">

</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Wear very supportive underwear. Please do not wear boxer shorts, as they do not provide the necessary support.</span></p><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Wear comfortable clothing. Choose pants that you won’t mind getting iodine on after the procedure.</span></p><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">We also recommend that you wear a T-shirt because the room in which we do the procedure is hot and anything heavier may be uncomfortable for you.</span></p><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">The heat of the room relaxes the scrotum and makes the procedure easier to perform. You can imagine yourself on the beach on a southern vacation during the brief surgery.</span></p><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Eat a good breakfast! You will feel much more comfortable during the procedure. Minimize coffee, but have one if skipping it causes you material stress.</span></p><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Plan to arrive a little earlier for your appointment.</span></p><span data-dcnode-id="1969" instrument_node=""> </span></div><span data-dcnode-id="1967" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Consideration Before a Man’s Vasectomy</span></h2><span data-dcnode-id="1598" instrument_node=""> </span></div><span data-dcnode-id="1596" instrument_node="">
</span></div><span data-dcnode-id="1594" instrument_node="">
</span><div class="elementor-element elementor-element-3c6791b4 elementor-widget elementor-widget-text-editor" data-dcnode-id="1579" data-element_type="widget" data-id="3c6791b4" data-widget_type="text-editor.default"><span data-dcnode-id="1593" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1581"><span data-dcnode-id="1592" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1583"><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Choosing to have a vasectomy is a serious decision because it is carried out with the intention of creating permanent sterility.</span></p><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Our experience with patients over the years has shown that some men who opt for a vasectomy later change their minds about their desire to have children after their vasectomy is done. Reasons for this include death of a spouse, death of a child, divorce, separation or just changing their minds.</span></p><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Please review the questions and considerations below to ensure that you make a good decision.</span></p><span data-dcnode-id="1584" instrument_node=""> </span></div><span data-dcnode-id="1582" instrument_node="">
</span></div><span data-dcnode-id="1580" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="1353"><span data-dcnode-id="1576" instrument_node="">

</span><h3 aria-controls="elementor-tab-content-1861" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1560" data-tab="1" id="elementor-tab-title-1861" role="tab"><span data-dcnode-id="1573" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1565"><span data-dcnode-id="1572" instrument_node="">
</span><span class="elementor-toggle-icon-closed" data-dcnode-id="1570"><i class="fas fa-angle-right" data-dcnode-id="1571"></i></span><span data-dcnode-id="1569" instrument_node="">
</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1567"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1568"></i></span><span data-dcnode-id="1566" instrument_node="">
</span></span><span data-dcnode-id="1564" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pollockclinics.com/no-scalpel-vasectomy/before-vasectomy"><span data-dcnode-id="1563" instrument_node="">Do I think that I might want to have more children?</span></a><span data-dcnode-id="1561" instrument_node="">
</span></h3><span data-dcnode-id="1559" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1861" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1557" data-tab="1" id="elementor-tab-content-1861" role="tabpanel"><span data-dcnode-id="1558" instrument_node="">If there is a possibility that you might want additional children in the future, you should not have a vasectomy. Your vasectomy will prevent you from conceiving a child and should be considered a permanent form of male birth control.
Vasectomy reversal surgery is not a fully effective way to restore male fertility, and no one should use surgery to temporarily suppress fertility. A vasectomy reversal may be possible but the results are not certain. A vasectomy is recommended only for men who are certain they will not want to conceive a baby.</span></div><span data-dcnode-id="1556" instrument_node="">
</span></div><span data-dcnode-id="1554" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1531"><span data-dcnode-id="1553" instrument_node="">

</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1544"><span data-dcnode-id="1551" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1546"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1547"></i></span><span data-dcnode-id="1545" instrument_node="">
</span></span><span data-dcnode-id="1543" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pollockclinics.com/no-scalpel-vasectomy/before-vasectomy"><span data-dcnode-id="1542" instrument_node=""> Am I a good candidate for vasectomy surgery?</span></a><span data-dcnode-id="1540" instrument_node="">
</span></h3><span data-dcnode-id="1538" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1862" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1533" data-tab="2" id="elementor-tab-content-1862" role="tabpanel"><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">If you are certain you don’t want more children, the remaining questions are related to your current physical condition, and there are not many contra-indications for a vasectomy procedure.</span></p><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">The main ones are to do with any pre-existing issues affecting your scrotum (hernia in that area, scarring) and your general ability to tolerate a minor surgery (abnormal blood coagulation, other pre-existing conditions). It is also vital that you follow the doctor’s instructions on post-operative care.</span></p></div><span data-dcnode-id="1532" instrument_node="">

</span></h3><span data-dcnode-id="1514" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1863" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1497" data-tab="3" id="elementor-tab-content-1863" role="tabpanel"><ul data-dcnode-id="1500"><span data-dcnode-id="1513" instrument_node="">
</span><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Age – Are you young and have no children?</span></li><span data-dcnode-id="1510" instrument_node="">
</span><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Personal Stress – Do you think you might be making a hasty decision at a stressful time?</span></li><span data-dcnode-id="1507" instrument_node="">
</span><li data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">External Pressure – Do you feel pressured into the decision by someone or by circumstances?</span></li><span data-dcnode-id="1504" instrument_node="">
</span><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Relationship Stability – Do you frequently question the stability of your relationship?</span></li><span data-dcnode-id="1501" instrument_node="">
</span></ul><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">
Permanent contraception may not be for you at this time if you can answer yes to any of the above questions. If this is not the case, and&nbsp;you have decided that no matter what the future brings you will not want any more children, then vasectomy is a reasonable consideration for you.</span></div><span data-dcnode-id="1496" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1450"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1451"></i></span><span data-dcnode-id="1449" instrument_node="">
</span></span><span data-dcnode-id="1447" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pollockclinics.com/no-scalpel-vasectomy/before-vasectomy"><span data-dcnode-id="1446" instrument_node=""> A vasectomy might not be right for you if:</span></a><span data-dcnode-id="1444" instrument_node="">
</span></h3><span data-dcnode-id="1442" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1865" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1440" data-tab="5" id="elementor-tab-content-1865" role="tabpanel"><span data-dcnode-id="1441" instrument_node="">You are very young, your current relationship is not stable, you are having the vasectomy just to please your partner, you are under a lot of stress, or you are counting on being able to reverse the procedure later.&nbsp;
Vasectomy reversal is a more complicated operation than the original vasectomy procedure. Reversal success is not certain and will vary based on how long it has been since the original surgery. Pollock Clinics does not offer vasectomy reversals.</span></div><span data-dcnode-id="1439" instrument_node="">
</span></div><span data-dcnode-id="1437" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1414"><span data-dcnode-id="1436" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1866" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1422" data-tab="6" id="elementor-tab-title-1866" role="tab"><span data-dcnode-id="1435" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1427"><span data-dcnode-id="1434" instrument_node="">
</span><span class="elementor-toggle-icon-closed" data-dcnode-id="1432"><i class="fas fa-angle-right" data-dcnode-id="1433"></i></span><span data-dcnode-id="1431" instrument_node="">
</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1429"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1430"></i></span><span data-dcnode-id="1428" instrument_node="">
</span></span><span data-dcnode-id="1426" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pollockclinics.com/no-scalpel-vasectomy/before-vasectomy"><span data-dcnode-id="1425" instrument_node=""> Can a no-scalpel vasectomy be reversed?</span></a><span data-dcnode-id="1423" instrument_node="">
</span></h3><span data-dcnode-id="1421" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1866" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1416" data-tab="6" id="elementor-tab-content-1866" role="tabpanel"><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Yes, but reversal operations are expensive and not always successful. If you are thinking about reversal, perhaps vasectomy is not right for you. We definitely recommend that you consider vasectomy a permanent form of contraception when making your decision.</span></p><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Pre-vasectomy Sperm Banking (cryopreservation) is a good idea in almost anyone considering a vasectomy.</span></p></div><span data-dcnode-id="1415" instrument_node="">

</span><h3 aria-controls="elementor-tab-content-1867" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1398" data-tab="7" id="elementor-tab-title-1867" role="tab"><span data-dcnode-id="1411" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1405"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1406"></i></span><span data-dcnode-id="1404" instrument_node="">
</span></span><span data-dcnode-id="1402" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pollockclinics.com/no-scalpel-vasectomy/before-vasectomy"><span data-dcnode-id="1401" instrument_node=""> Is now the best time for my vasectomy?</span></a><span data-dcnode-id="1399" instrument_node="">
</span></h3><span data-dcnode-id="1397" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1867" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1388" data-tab="7" id="elementor-tab-content-1867" role="tabpanel"><div class="fusion-panel panel-default" data-dcnode-id="1393" role="tabpanel"><div class="panel-collapse collapse in" data-dcnode-id="1394" id="4c2c23663b408a1b8"><div class="panel-body toggle-content fusion-clearfix" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">You will want to be certain that you are content with the number of children you have. If you have a child under six months of age, you might want to wait because of the “Sudden Infant Death Syndrome (SIDS)”, a condition where a child can die after a few months of life for no apparent reason. Six months of age is often considered the threshold at which SIDS is least likely to occur. Although SIDS is not common (1 in 2000 infants), this might possibly affect the timing of your plans for vasectomy.</span></div></div></div><div class="fusion-panel panel-default" data-dcnode-id="1389" role="tabpanel"><div class="panel-heading" data-dcnode-id="1390"><h4 class="panel-title toggle fusion-responsive-typography-calculated" data-dcnode-id="1391" data-fontsize="16" data-lineheight="22.08px"><span data-dcnode-id="1392" instrument_node="">&nbsp;</span></h4></div></div></div><span data-dcnode-id="1387" instrument_node="">
</span></div><span data-dcnode-id="1385" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1357"><span data-dcnode-id="1384" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1868" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1370" data-tab="8" id="elementor-tab-title-1868" role="tab"><span data-dcnode-id="1383" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1375"><span data-dcnode-id="1382" instrument_node="">
</span><span class="elementor-toggle-icon-closed" data-dcnode-id="1380"><i class="fas fa-angle-right" data-dcnode-id="1381"></i></span><span data-dcnode-id="1379" instrument_node="">
</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1377"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1378"></i></span><span data-dcnode-id="1376" instrument_node="">
</span></span><span data-dcnode-id="1374" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pollockclinics.com/no-scalpel-vasectomy/before-vasectomy"><span data-dcnode-id="1373" instrument_node=""> Should I store sperm?</span></a><span data-dcnode-id="1371" instrument_node="">
</span></h3><span data-dcnode-id="1369" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1868" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1359" data-tab="8" id="elementor-tab-content-1868" role="tabpanel"><div class="fusion-panel panel-default" data-dcnode-id="1360" role="tabpanel"><div class="panel-collapse collapse in" data-dcnode-id="1361" id="4c2c23663b408a1b8"><div class="panel-body toggle-content fusion-clearfix" data-dcnode-id="1362"><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Choosing to have a vasectomy is a serious decision because it is carried out with the intention of creating permanent sterility. Our experience with patients over the years has shown that some men who opt for a vasectomy later change their minds about their desire to have children.</span></p><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">The decision on whether to store sperm as a way to potentially conceive a child in the future is an important one. Conception using stored sperm is not certain, and the necessary medical insemination process can be costly. Cryogenic sperm storage is a good insurance policy, but is not a fully reliable method. If you are concerned to ensure future ability to conceive a child, then the vasectomy itself should be reconsidered.</span></p><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">In the unlikely event that you will want to have kids again in the future, and vasectomy reversal is not an option, or successful, sperm storage may be a way of allowing yourself to procreate again. Please consider storing sperm prior to your vasectomy.</span></p></div></div></div></div><span data-dcnode-id="1358" instrument_node="">
