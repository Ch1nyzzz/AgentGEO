</span><section data-dcnode-id="219"><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="236"><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Vasectomy reversal is a complicated procedure that's not always guaranteed to work.</span></strong></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">A vasectomy, also known as male sterilisation,&nbsp;works by preventing sperm from the testes (the male sex glands&nbsp;that produce and store sperm)&nbsp;reaching the semen that's ejaculated during orgasm.&nbsp;</span></p><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">This is achieved by cutting or blocking the tubes that carry sperm from the testes to the penis.</span></p><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">A vasectomy is usually considered to be a permanent form of contraception because it's not always possible to reverse the procedure. </span></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">If you're considering having a vasectomy, you should bear this in mind and think very carefully before making your decision.</span></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Reversing a vasectomy involves rejoining the sperm-carrying tubes that were cut or blocked during your vasectomy.</span></p><span data-dcnode-id="220" instrument_node="">
</span></section><span data-dcnode-id="218" instrument_node="">
</span><section data-dcnode-id="204"><span data-dcnode-id="217" instrument_node="">
</span><h2 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Can I get a vasectomy reversal on the NHS?</span></h2><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Vasectomy reversal is not usually available on the NHS.&nbsp;If it's available in your area, there may be a very long waiting list. Speak to your GP for more information.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">It's possible to have a vasectomy reversal carried out privately, but it may cost several thousand pounds. </span></p><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">The problem with the procedure is that success rates are not very high and there's no guarantee that your fertility will return.</span></p><span data-dcnode-id="205" instrument_node="">
</span></section><span data-dcnode-id="203" instrument_node="">
</span><section data-dcnode-id="140"><span data-dcnode-id="202" instrument_node="">
</span><h2 data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Success rates for vasectomy reversal</span></h2><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Whether or not a vasectomy reversal is successful may depend on what type of vasectomy you had and how long ago it took place. </span></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">For example, the more time that's passed since your vasectomy, the more scar tissue will have developed in the tubes that carry sperm to your penis.</span></p><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">It's estimated that the success rate of a vasectomy reversal is:</span></p><span data-dcnode-id="190" instrument_node="">
</span><ul data-dcnode-id="173"><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">75% if you have your vasectomy reversed within 3 years</span></li><span data-dcnode-id="186" instrument_node="">
</span><li data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">up to 55% after 3 to 8 years</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">between 40% and 45% after 9 to 14 years</span></li><span data-dcnode-id="180" instrument_node="">
</span><li data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">30% after 15 to 19 years</span></li><span data-dcnode-id="177" instrument_node="">
</span><li data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">less than 10% after 20 years  </span></li><span data-dcnode-id="174" instrument_node="">
</span></ul><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">These figures are based on the number of couples who successfully have a baby after the man has had a vasectomy reversal. </span></p><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Pregnancy rates also depend on the fertility of the female partner and are lower if she is 40 or older.</span></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">In some cases pregnancy still may not&nbsp;happen after a vasectomy reversal, even when there's sperm in your semen. </span></p><span data-dcnode-id="163" instrument_node="">
</span><p data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">This is because your sperm may be less mobile after the procedure than&nbsp;they were before. </span></p><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="155"><span data-dcnode-id="159" instrument_node="">It may be possible to have </span><a data-dcnode-id="157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/infertility/"><span data-dcnode-id="158" instrument_node="">fertility treatment</span></a><span data-dcnode-id="156" instrument_node="">&nbsp;in these cases.</span></p><span data-dcnode-id="154" instrument_node="">
</span><p data-dcnode-id="149"><span data-dcnode-id="153" instrument_node="">For example, you could have sperm surgically removed and then stored before being used in </span><a data-dcnode-id="151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/ivf/"><span data-dcnode-id="152" instrument_node="">IVF treatment</span></a><span data-dcnode-id="150" instrument_node="">. </span></p><span data-dcnode-id="148" instrument_node="">
</span><p data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">You should see your GP for further information and advice about this.</span></p><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="142"><a data-dcnode-id="143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/Service-Search/GP/LocationSearch/4"><span data-dcnode-id="144" instrument_node="">Find a GP near you</span></a></p><span data-dcnode-id="141" instrument_node="">
</span></section><span data-dcnode-id="139" instrument_node="">
