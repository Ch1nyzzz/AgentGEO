</span><h1 data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">How Long is  the Recovery Time for a Vasectomy Reversal?</span></h1><span data-dcnode-id="541" instrument_node="">
</span><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">
</span><h3 data-dcnode-id="536"><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthcentre.org.uk/vasectomy/find.html"><span data-dcnode-id="538" instrument_node="">Find Vasectomy Reversal &amp; Vasectomy Clinics »</span></a></h3><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The recovery  from a vasectomy reversal normally takes a few weeks.&nbsp; Usually you will be able to leave hospital on the same day that the  surgery is completed once you have passed water.&nbsp; However, if drains are used to remove liquids and blood from the  area then you will have to stay at hospital for 24 hours, or until these are  removed.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Usually you  will have dissolvable stitches to close the wound and these will disintegrate  about a week after the surgery.&nbsp;  Surgical clips will need to be removed after two weeks.&nbsp;&nbsp;&nbsp; </span></p><span data-dcnode-id="529" instrument_node="">
For  a month after the procedure you will need to avoid any heavy lifting or  strenuous exercise.&nbsp; After three months  your doctor will check your sperm to see whether the vasectomy reversal has  been successful.
