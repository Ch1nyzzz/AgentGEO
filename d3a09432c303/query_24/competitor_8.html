d in the United States. This straightforward operation is a form of birth control that works by preventing sperm from leaving the body through the penis. Doctors do about 500,000 vasectomies in the US per year. They are usually covered by insurance.</span></p><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Since the 1980s, the preferred method of vasectomy has been the no-scalpel vasectomy. This method is as effective as a traditional vasectomy. The no-scalpel procedure is less invasive and has a shorter recovery time, making it a popular option.</span></p></section><section data-dcnode-id="747"><h2 data-dcnode-id="761" id="091e9c5e821bc2c1-1-2"><span data-dcnode-id="762" instrument_node="">What Does a Vasectomy Do?</span></h2><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">A vasectomy is a highly effective method of birth control. It's a surgical procedure where a doctor blocks off the small tubes that </span><a data-dcnode-id="758" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex-relationships/guide/male-reproductive-system"><span data-dcnode-id="759" instrument_node="">carry sperm out of your testicles</span></a><span data-dcnode-id="757" instrument_node="">. You can still ejaculate but the fluid will not contain any sperm. Without sperm present, there is no risk of your partner getting pregnant.</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Sperm are produced in your testicles. They mix with seminal fluid, which is produced in your prostate and seminal vesicles. The mixture of sperm and seminal fluid travels through a tube called the vas deferens, which takes it to the urethra. The urethra is the tube that runs inside your penis. You pass semen and urine through it.‌</span></p><div class="module ad emb-center-well-ad ad-923" data-dcnode-id="753" id="ad-centerwell-pos-923-1"></div><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:288}" data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">In a vasectomy, your doctor accesses the vas deferens and surgically disconnects it. Once the tube is surgically severed, your doctor seals the cut ends. You still produce sperm in your testicles, and your penis and scrotum look and feel the same from the outside. But with the internal passage blocked, sperm cannot leave the testicles and become </span><a data-dcnode-id="750" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/men/rm-quiz-sperm-semen"><span data-dcnode-id="751" instrument_node="">part of an ejaculation.</span></a><span data-dcnode-id="749" instrument_node=""> Your orgasms will only contain fluid, no sperm.</span></p></section><section data-dcnode-id="737"><h2 data-dcnode-id="745" id="091e9c5e821bc2c1-1-3"><span data-dcnode-id="746" instrument_node="">No-Scalpel vs. Traditional Vasectomy</span></h2><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">There are two types of vasectomy: traditional and no-scalpel vasectomy. Both are outpatient procedures. Many doctors perform them in their offices. In some cases, you may need to go to a hospital or surgical center. The operations only take 30 minutes or so and you can go home the same day.</span></p><div class="module ad ad-5000" data-block-codes="_sex1_0_" data-dcnode-id="742" data-is-mobile="false" data-pos="5000" data-sizes="[]" data-targets="{&quot;art&quot;:&quot;091e9c5e821bc2c1&quot;,&quot;cc&quot;:&quot;16&quot;,&quot;env&quot;:&quot;0&quot;,&quot;hcent&quot;:&quot;1014&quot;,&quot;leaf&quot;:&quot;&quot;,&quot;mcent&quot;:&quot;&quot;,&quot;mic&quot;:&quot;&quot;,&quot;pt&quot;:&quot;4272&quot;,&quot;sec&quot;:&quot;&quot;,&quot;pug&quot;:&quot;&quot;,&quot;scent&quot;:&quot;&quot;,&quot;tmg&quot;:&quot;&quot;,&quot;tug&quot;:&quot;&quot;,&quot;uri&quot;:&quot;/sex/birth-control/what-is-no-scalpel-vasectomy&quot;,&quot;rd&quot;:&quot;1&quot;,&quot;tex&quot;:&quot;vuejs&quot;}" id="ad-pos-5000-1"></div><p data-dcnode-id="738"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Traditional vasectomy. </span></strong><span data-dcnode-id="739" instrument_node="">In a traditional vasectomy, your doctor will use a local anesthetic to numb the area around your scrotum. They will use a needle to inject the anesthetic. Your doctor may offer you medicine to help with any anxiety you feel.‌</span></p></section></div><div class="article-page active-page" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:1774.328125}" data-dcnode-id="703" data-page="2"><div class="module ad emb-top-ad ad-923" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:132}" data-dcnode-id="735" id="ad-top-pos-923-2"></div><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:642.03125}" data-dcnode-id="722"><span data-dcnode-id="734" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:180}" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Your doctor will then make one or two small incisions in the skin of your scrotum. They will find the vas deferens and cut it. They will seal the ends of the vas by tying or cauterizing them. After that, your doctor will close the incisions with stitches or another method.‌‌</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:216}" data-dcnode-id="725"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">No scalpel vasectomy. </span></strong><span data-dcnode-id="729" instrument_node="">With a no-scalpel vasectomy, your doctor will need to numb the skin of your scrotum. Some doctors use traditional local anesthetic administered with a needle. Other doctors offer no-needle numbing, which uses a </span><a data-dcnode-id="727" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/pain-management/news/20040819/needle-free-device-okd-for-local-pain-relief"><span data-dcnode-id="728" instrument_node="">spray to apply topical numbing medicine</span></a><span data-dcnode-id="726" instrument_node="">. Anti-anxiety medication is also available if you want it.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:216}" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Instead of making an incision into the scrotum, your doctor will make a small puncture into the skin then stretch the skin gently to see inside. They will then use the same technique as a traditional vasectomy to cut and seal the vas deferens. The puncture closes immediately after the procedure without any need for stitches.</span></p></section><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:955.546875}" data-dcnode-id="704"><h2 data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:22}" data-dcnode-id="720" id="091e9c5e821bc2c1-2-5"><span data-dcnode-id="721" instrument_node="">Recovering from a No-Scalpel Vasectomy</span></h2><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">The real benefits of a no-scalpel vasectomy come in the recovery period. The recovery time for a traditional vasectomy is close to a week, with lingering soreness, swelling, and bruising. After a no-scalpel vasectomy, most people can resume normal activity levels after only a few days. There is less bruising and swelling.</span></p><div class="module ad emb-center-well-ad ad-923" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:132}" data-dcnode-id="717" id="ad-centerwell-pos-923-2"></div><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:216}" data-dcnode-id="712"><span data-dcnode-id="716" instrument_node="">No matter which type of vasectomy you have, it will </span><a data-dcnode-id="714" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/men/news/20060407/vasectomy-not-always-instant-fix"><span data-dcnode-id="715" instrument_node="">not be fully effective</span></a><span data-dcnode-id="713" instrument_node=""> until several months after your procedure. When you have your vasectomy, the sperm that were in the position to be ejaculated can live for many weeks. You could ejaculate them and cause a pregnancy during that time.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:144}" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Your doctor will ask you to have a follow-up appointment 90 days after your vasectomy to check for any remaining sperm. Use a reliable method of contraception until you know that you're no longer ejaculating live sperm.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:144}" data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">Vasectomies are </span><a data-dcnode-id="707" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/men/features/vasectomy-risks-benefits"><span data-dcnode-id="708" instrument_node="">very reliable as a form of birth control</span></a><span data-dcnode-id="706" instrument_node="">. Fewer than 1% of vasectomies fail. If you are considering a vasectomy, speak with your doctor. They will be able to help you decide if it’s right for you.</span></p></section></div></div><footer data-dcnode-id="653" style=""><div class="pub-info-and-share-bar" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:42}" data-dcnode-id="660"><div class="article__publication-sources" data-_get-element-size="{&quot;w&quot;:135.15625,&quot;h&quot;:29}" data-dcnode-id="683"><span class="sources" data-_get-element-size="{&quot;w&quot;:0,&quot;h&quot;:0}" data-chronicle="091e9c5e81e48710" data-dcnode-id="684" data-e2e="dart-sources"><h4 class="sources__header" data-_get-element-size="{&quot;w&quot;:135.15625,&quot;h&quot;:18}" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node=""> Show
