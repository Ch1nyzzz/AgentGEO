</span><h2 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">The Safest, Most Effective Form of Permanent Male Birth Control</span></h2><span data-dcnode-id="791" instrument_node="">

</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The vasectomy procedure video below shows you how the procedure is performed and also some of the risks and potential complications of having a vasectomy.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">We’ve performed the vasectomy procedure hundreds of times in the last year alone. The no-needle, no-scalpel procedure is just as effective as any other type of vasectomy, but is less painful, less invasive and has a quicker recovery time. Furthermore, the entire procedure can be performed in less than 15 minutes.</span></p><span data-dcnode-id="776" instrument_node="">
