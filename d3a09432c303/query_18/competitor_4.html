</span><li data-dcnode-id="2396" id="cite_note-15"><span class="mw-cite-backlink" data-dcnode-id="2412"><b data-dcnode-id="2413"><a aria-label="Jump up" data-dcnode-id="2414" href="#cite_ref-15" title="Jump up"><span data-dcnode-id="2415" instrument_node="">^</span></a></b></span><span data-dcnode-id="2411" instrument_node=""> </span><span class="reference-text" data-dcnode-id="2398"><link data-dcnode-id="2410" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="2400" id="CITEREFU.S._Department_of_Health_&amp;_Human_Services2012"><span data-dcnode-id="2409" instrument_node="">U.S. Department of Health &amp; Human Services (January 20, 2012). </span><a class="external text" data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20140702150143/http%3A//www.hhs.gov/news/press/2012pres/01/20120120a.html" rel="nofollow"><span data-dcnode-id="2408" instrument_node="">"A statement by U.S. Department of Health and Human Services Secretary Kathleen Sebelius (news release)"</span></a><span data-dcnode-id="2406" instrument_node="">. Washington, D.C.: U.S. Department of Health &amp; Human Services. Archived from </span><a class="external text" data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hhs.gov/news/press/2012pres/01/20120120a.html" rel="nofollow"><span data-dcnode-id="2405" instrument_node="">the original</span></a><span data-dcnode-id="2403" instrument_node=""> on July 2, 2014. </span><q data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">In August 2011, the Department of Health and Human Services issued an interim final rule that will require most health insurance plans to cover preventive services for women including recommended contraceptive services without charging a co-pay, co-insurance or a deductible. The rule allows certain non-profit religious employers that offer insurance to their employees the choice of whether or not to cover contraceptive services. Today the department is announcing that the final rule on preventive health services will ensure that women with health insurance coverage will have access to the full range of the Institute of Medicine's recommended preventive services, including all FDA-approved forms of contraception.</span></q></cite><span class="Z3988" data-dcnode-id="2399" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=A+statement+by+U.S.+Department+of+Health+and+Human+Services+Secretary+Kathleen+Sebelius+%28news+release%29&amp;rft.place=Washington%2C+D.C.&amp;rft.pub=U.S.+Department+of+Health+%26+Human+Services&amp;rft.date=2012-01-20&amp;rft.au=U.S.+Department+of+Health+%26+Human+Services&amp;rft_id=https%3A%2F%2Fwww.hhs.gov%2Fnews%2Fpress%2F2012pres%2F01%2F20120120a.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AContraceptive+mandate"></span></span><span data-dcnode-id="2397" instrument_node="">

rg%3AContraceptive+mandate"></span><span data-dcnode-id="2376" instrument_node=""> p. 39870: On August 1, 2011, HRSA adopted and released guidelines for women's preventive health services (HRSA Guidelines) based on recommendations of the independent Institute of Medicine. As relevant here, the HRSA Guidelines include all Food and Drug Administration (FDA)-approved contraceptive methods, sterilization procedures, and patient education and counseling for women with reproductive capacity, as prescribed by a health care provider (collectively, contraceptive services). However, the HRSA Guidelines exclude services relating to a man's reproductive capacity, such as vasectomies and condoms.</span></span><span data-dcnode-id="2374" instrument_node="">

izing the exemption of group health plans and group health insurance coverage sponsored by certain religious employers from having to cover certain preventive health services under provisions of the Patient Protection and Affordable Care Act</span></i><span data-dcnode-id="2349" instrument_node="">.</span></q></cite><span class="Z3988" data-dcnode-id="2346" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=unknown&amp;rft.btitle=Group+Health+Plans+and+Health+Insurance+Issuers+Relating+to+Coverage+of+Preventive+Services+Under+the+Patient+Protection+and+Affordable+Care+Act+%E2%80%93+Final+Rules&amp;rft.pub=Federal+Register%2C+GPO&amp;rft.date=2012-02-10&amp;rft.au=Dept.+Health+and+Human+Services&amp;rft_id=http%3A%2F%2Fwww.gpo.gov%2Ffdsys%2Fgranule%2FFR-2012-02-15%2F2012-3547%2Fcontent-detail.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AContraceptive+mandate"></span></span><span data-dcnode-id="2344" instrument_node="">
