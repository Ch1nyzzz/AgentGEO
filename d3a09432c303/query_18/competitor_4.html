</span><h2 data-dcnode-id="3799"><span class="mw-headline" data-dcnode-id="3807" id="Birth_control_and_unintended_pregnancy"><span data-dcnode-id="3808" instrument_node="">Birth control and unintended pregnancy</span></span><span class="mw-editsection" data-dcnode-id="3800"><span class="mw-editsection-bracket" data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">[</span></span><a data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D1" title="Edit section: Birth control and unintended pregnancy"><span data-dcnode-id="3804" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3798" instrument_node="">
</span><table class="box-POV plainlinks metadata ambox ambox-content ambox-POV" data-dcnode-id="3760" role="presentation"><tbody data-dcnode-id="3761"><tr data-dcnode-id="3762"><td class="mbox-image" data-dcnode-id="3795"><div data-dcnode-id="3796" style="width:52px"><img alt="Unbalanced scales.svg" data-dcnode-id="3797" data-file-height="354" data-file-width="400" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/45px-Unbalanced_scales.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/68px-Unbalanced_scales.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/90px-Unbalanced_scales.svg.png 2x" width="45"></div></td><td class="mbox-text" data-dcnode-id="3763"><div class="mbox-text-span" data-dcnode-id="3764"><span data-dcnode-id="3794" instrument_node="">The </span><b data-dcnode-id="3788"><a data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANeutral_point_of_view" title="Wikipedia:Neutral point of view"><span data-dcnode-id="3793" instrument_node="">neutrality</span></a><span data-dcnode-id="3791" instrument_node=""> of this section is </span><a data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANPOV_dispute" title="Wikipedia:NPOV dispute"><span data-dcnode-id="3790" instrument_node="">disputed</span></a></b><span data-dcnode-id="3787" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3779"><span data-dcnode-id="3786" instrument_node=""> Relevant discussion may be found on the </span><a data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AContraceptive_mandate%23%2523" title="Talk:Contraceptive mandate"><span data-dcnode-id="3785" instrument_node="">talk page</span></a><span data-dcnode-id="3783" instrument_node="">. Please do not remove this message until </span><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3APOV%23When_to_remove" title="Template:POV"><span data-dcnode-id="3782" instrument_node="">conditions to do so are met</span></a><span data-dcnode-id="3780" instrument_node="">.</span></span><span data-dcnode-id="3778" instrument_node=""> </span><span class="date-container" data-dcnode-id="3772"><i data-dcnode-id="3773"><span data-dcnode-id="3777" instrument_node="">(</span><span class="date" data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">December 2020</span></span><span data-dcnode-id="3774" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3765"><i data-dcnode-id="3766"><span data-dcnode-id="3771" instrument_node=""> (</span><small data-dcnode-id="3768"><a data-dcnode-id="3769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3770" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3767" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3759" instrument_node="">
</span><p data-dcnode-id="3753"><span data-dcnode-id="3758" instrument_node="">In the United States, contraceptive use saves about $21 million in direct medical costs each year.</span><sup class="reference" data-dcnode-id="3755" id="cite_ref-Trussell2009_9-0"><a data-dcnode-id="3756" href="#cite_note-Trussell2009-9"><span data-dcnode-id="3757" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3754" instrument_node="">
</span></p><p data-dcnode-id="3722"><span data-dcnode-id="3752" instrument_node="">About half of U.S. </span><a class="mw-redirect" data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unintended_pregnancy_in_the_United_States" title="Unintended pregnancy in the United States"><span data-dcnode-id="3751" instrument_node="">pregnancies are unintended</span></a><span data-dcnode-id="3749" instrument_node="">.</span><sup class="reference" data-dcnode-id="3746" id="cite_ref-Trussell2009_9-1"><a data-dcnode-id="3747" href="#cite_note-Trussell2009-9"><span data-dcnode-id="3748" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3745" instrument_node=""> Highly effective contraceptives, such as </span><a class="mw-redirect" data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intrauterine_devices" title="Intrauterine devices"><span data-dcnode-id="3744" instrument_node="">intrauterine devices</span></a><span data-dcnode-id="3742" instrument_node=""> (IUDs), are underused in the United States.</span><sup class="reference" data-dcnode-id="3739" id="cite_ref-Cleland_10-0"><a data-dcnode-id="3740" href="#cite_note-Cleland-10"><span data-dcnode-id="3741" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3738" instrument_node="">  Increasing use of highly effective contraceptives could help meet the goal set forward in </span><a class="mw-redirect" data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Healthy_people" title="Healthy people"><span data-dcnode-id="3737" instrument_node="">Healthy People 2020</span></a><span data-dcnode-id="3735" instrument_node=""> to decrease unintended pregnancy by 10% before 2020.</span><sup class="reference" data-dcnode-id="3732" id="cite_ref-Cleland_10-1"><a data-dcnode-id="3733" href="#cite_note-Cleland-10"><span data-dcnode-id="3734" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3731" instrument_node="">  Cost to the user is one factor preventing many US women from using more effective contraceptives.</span><sup class="reference" data-dcnode-id="3728" id="cite_ref-Cleland_10-2"><a data-dcnode-id="3729" href="#cite_note-Cleland-10"><span data-dcnode-id="3730" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3727" instrument_node="">  Making contraceptives available without a copay increases use of highly effective methods, reduces unintended pregnancies, and may be instrumental in achieving the Healthy People 2020 goal.</span><sup class="reference" data-dcnode-id="3724" id="cite_ref-Cleland_10-3"><a data-dcnode-id="3725" href="#cite_note-Cleland-10"><span data-dcnode-id="3726" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3723" instrument_node="">
</span></p><span data-dcnode-id="3721" instrument_node="">
</span><h2 data-dcnode-id="3711"><span class="mw-headline" data-dcnode-id="3719" id="Federal_female_contraception_mandate_before_ACA"><span data-dcnode-id="3720" instrument_node="">Federal female contraception mandate before ACA</span></span><span class="mw-editsection" data-dcnode-id="3712"><span class="mw-editsection-bracket" data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">[</span></span><a data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D2" title="Edit section: Federal female contraception mandate before ACA"><span data-dcnode-id="3716" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3710" instrument_node="">
</span><p data-dcnode-id="3674"><span data-dcnode-id="3709" instrument_node="">Certain aspects of the contraception mandate did not start with the ACA. In December 2000, the </span><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Employment_Opportunity_Commission" title="Equal Employment Opportunity Commission"><span data-dcnode-id="3708" instrument_node="">Equal Employment Opportunity Commission</span></a><span data-dcnode-id="3706" instrument_node=""> ruled that companies that provided prescription drugs to their employees but didn't provide birth control were in violation of </span><a class="mw-redirect" data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Title_VII" title="Title VII"><span data-dcnode-id="3705" instrument_node="">Title VII of the 1964 Civil Rights Act</span></a><span data-dcnode-id="3703" instrument_node="">, which prevents discrimination on the basis of sex. That opinion, which the George W. Bush administration did nothing to alter or withdraw when it took office the next month, is still in effect today</span><sup class="noprint Inline-Template" data-dcnode-id="3696" style="white-space:nowrap;"><span data-dcnode-id="3702" instrument_node="">[</span><i data-dcnode-id="3698"><a data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="3700" title="The time period mentioned near this tag is ambiguous. (August 2016)"><span data-dcnode-id="3701" instrument_node="">when?</span></span></a></i><span data-dcnode-id="3697" instrument_node="">]</span></sup><span data-dcnode-id="3695" instrument_node=""> – and because it relies on Title VII of the Civil Rights Act, it applies to all employers with 15 or more employees.</span><sup class="reference" data-dcnode-id="3692" id="cite_ref-EEOC_2-1"><a data-dcnode-id="3693" href="#cite_note-EEOC-2"><span data-dcnode-id="3694" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3691" instrument_node=""> Currently,</span><sup class="noprint Inline-Template" data-dcnode-id="3684" style="white-space:nowrap;"><span data-dcnode-id="3690" instrument_node="">[</span><i data-dcnode-id="3686"><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="3688" title="The time period mentioned near this tag is ambiguous. (August 2016)"><span data-dcnode-id="3689" instrument_node="">when?</span></span></a></i><span data-dcnode-id="3685" instrument_node="">]</span></sup><span data-dcnode-id="3683" instrument_node=""> employers that do not offer prescription coverage or do not offer insurance at all are exempt, because they treat men and women equally, but the new mandate will require prescription coverage.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3676" style="white-space:nowrap;"><span data-dcnode-id="3682" instrument_node="">[</span><i data-dcnode-id="3678"><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3680" title="This claim needs references to reliable sources. (December 2013)"><span data-dcnode-id="3681" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3677" instrument_node="">]</span></sup><span data-dcnode-id="3675" instrument_node="">
</span></p><p data-dcnode-id="3657"><span data-dcnode-id="3673" instrument_node="">After the EEOC opinion was approved in 2000, reproductive rights groups and employees who wanted birth control access sued employers that refused to comply. The next year, in </span><i data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Erickson v. Bartell Drug Co.</span></i><span data-dcnode-id="3670" instrument_node="">, a federal court</span><sup class="noprint Inline-Template" data-dcnode-id="3663" style="white-space:nowrap;"><span data-dcnode-id="3669" instrument_node="">[</span><i data-dcnode-id="3665"><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="3667" title="Statement needs to be more specific about the content to which it refers. (August 2016)"><span data-dcnode-id="3668" instrument_node="">specify</span></span></a></i><span data-dcnode-id="3664" instrument_node="">]</span></sup><span data-dcnode-id="3662" instrument_node=""> agreed with the EEOC's reasoning. Reproductive rights groups and others used that decision as leverage to force other companies to settle lawsuits and agree to change their insurance plans to include birth control. Some subsequent court decisions echoed Erickson, and some went the other way, but the rule (absent a Supreme Court decision) remained, and over the following decade, the percentage of employer-based plans offering contraceptive coverage tripled to 90%.</span><sup class="reference" data-dcnode-id="3659" id="cite_ref-Nick_Baumann_11-0"><a data-dcnode-id="3660" href="#cite_note-Nick_Baumann-11"><span data-dcnode-id="3661" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3658" instrument_node="">
</span></p><p data-dcnode-id="3613"><span data-dcnode-id="3656" instrument_node="">In 1978, the U.S. Congress made it clear that discrimination on the basis of pregnancy was discrimination on the basis of sex.</span><sup class="reference" data-dcnode-id="3653" id="cite_ref-PDA_1-1"><a data-dcnode-id="3654" href="#cite_note-PDA-1"><span data-dcnode-id="3655" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3652" instrument_node=""> In 2000, the </span><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Employment_Opportunity_Commission" title="Equal Employment Opportunity Commission"><span data-dcnode-id="3651" instrument_node="">Equal Employment Opportunity Commission</span></a><span data-dcnode-id="3649" instrument_node=""> ruled that companies that provided insurance for prescription drugs to their employees but excluded birth control were violating the </span><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Act_of_1964" title="Civil Rights Act of 1964"><span data-dcnode-id="3648" instrument_node="">Civil Rights Act of 1964</span></a><span data-dcnode-id="3646" instrument_node="">.</span><sup class="reference" data-dcnode-id="3643" id="cite_ref-EEOC_2-2"><a data-dcnode-id="3644" href="#cite_note-EEOC-2"><span data-dcnode-id="3645" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3642" instrument_node=""> </span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="3641" instrument_node="">President Obama</span></a><span data-dcnode-id="3639" instrument_node=""> signed the </span><a class="mw-redirect" data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patient_Protection_and_Affordable_Care_Act" title="Patient Protection and Affordable Care Act"><span data-dcnode-id="3638" instrument_node="">Patient Protection and Affordable Care Act</span></a><span data-dcnode-id="3636" instrument_node=""> (ACA) on 23 March 2010. As of 1 August 2011, contraception was added by HHS regulation to a list of preventive services covered by the ACA per regulation that would be provided without patient co-payment. The federal mandate applies to all new health insurance plans in all states from 1 August 2012.</span><sup class="reference" data-dcnode-id="3633" id="cite_ref-NWLC_3-1"><a data-dcnode-id="3634" href="#cite_note-NWLC-3"><span data-dcnode-id="3635" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3630" id="cite_ref-WebMD_4-1"><a data-dcnode-id="3631" href="#cite_note-WebMD-4"><span data-dcnode-id="3632" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3629" instrument_node=""> Grandfathered plans do not have to comply unless they change substantially.</span><sup class="reference" data-dcnode-id="3626" id="cite_ref-NWLC2_5-1"><a data-dcnode-id="3627" href="#cite_note-NWLC2-5"><span data-dcnode-id="3628" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3625" instrument_node=""> To be grandfathered, a group plan must have existed or an individual plan must have been sold before President Obama signed the law; otherwise they must comply with the new law.</span><sup class="reference" data-dcnode-id="3622" id="cite_ref-NWLC3_6-1"><a data-dcnode-id="3623" href="#cite_note-NWLC3-6"><span data-dcnode-id="3624" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3621" instrument_node=""> The </span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guttmacher_Institute" title="Guttmacher Institute"><span data-dcnode-id="3620" instrument_node="">Guttmacher Institute</span></a><span data-dcnode-id="3618" instrument_node=""> noted that even before the federal mandate was implemented, 28 states had their own mandates that required health insurance to cover the prescription contraceptives, but the federal mandate innovated by forbidding insurance companies from charging part of the cost to the patient.</span><sup class="reference" data-dcnode-id="3615" id="cite_ref-gutt2_7-1"><a data-dcnode-id="3616" href="#cite_note-gutt2-7"><span data-dcnode-id="3617" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3614" instrument_node="">
</span></p><span data-dcnode-id="3612" instrument_node="">
</span><h2 data-dcnode-id="3602"><span class="mw-headline" data-dcnode-id="3610" id="ACA_mandatory_coverage_for_contraceptives"><span data-dcnode-id="3611" instrument_node="">ACA mandatory coverage for contraceptives</span></span><span class="mw-editsection" data-dcnode-id="3603"><span class="mw-editsection-bracket" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">[</span></span><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D3" title="Edit section: ACA mandatory coverage for contraceptives"><span data-dcnode-id="3607" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3601" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3600" instrument_node="">With the exception of churches and houses of worship, the </span><a class="mw-redirect" data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patient_Protection_and_Affordable_Care_Act" title="Patient Protection and Affordable Care Act"><span data-dcnode-id="3599" instrument_node="">Patient Protection and Affordable Care Act</span></a><span data-dcnode-id="3597" instrument_node=""> mandates female contraceptive coverage for all employers and educational institutions, even though the mandate itself is not included in the wording of the law(s)</span><sup class="reference" data-dcnode-id="3594" id="cite_ref-12"><a data-dcnode-id="3595" href="#cite_note-12"><span data-dcnode-id="3596" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3593" instrument_node=""> passed by Congress. The mandate applies to all new health insurance plans effective August 2012. It controversially includes Christian hospitals, </span><a class="mw-redirect" data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Charities" title="Catholic Charities"><span data-dcnode-id="3592" instrument_node="">Christian charities</span></a><span data-dcnode-id="3590" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Roman_Catholic_universities_and_colleges_in_the_United_States" title="List of Roman Catholic universities and colleges in the United States"><span data-dcnode-id="3589" instrument_node="">Catholic universities</span></a><span data-dcnode-id="3587" instrument_node="">, and other enterprises owned or controlled by religious organizations that oppose contraception on doctrinal grounds.
</span></p><p data-dcnode-id="3553"><span data-dcnode-id="3585" instrument_node="">On January 20, 2012, </span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Health_and_Human_Services" title="United States Department of Health and Human Services"><span data-dcnode-id="3584" instrument_node="">U.S. Department of Health and Human Services</span></a><span data-dcnode-id="3582" instrument_node=""> </span><a data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Secretary_of_Health_and_Human_Services" title="United States Secretary of Health and Human Services"><span data-dcnode-id="3581" instrument_node="">Secretary</span></a><span data-dcnode-id="3579" instrument_node=""> </span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kathleen_Sebelius" title="Kathleen Sebelius"><span data-dcnode-id="3578" instrument_node="">Kathleen Sebelius</span></a><span data-dcnode-id="3576" instrument_node=""> announced a (then) final rule of an August 1, 2011 interim final rule on health insurance coverage with no cost sharing for </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_and_Drug_Administration" title="Food and Drug Administration"><span data-dcnode-id="3575" instrument_node="">FDA</span></a><span data-dcnode-id="3573" instrument_node="">-approved contraceptives and contraceptive services (including female sterilization) for women of reproductive age if prescribed by health care providers, as part of women's preventive health services guidelines adopted by the </span><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_Resources_and_Services_Administration" title="Health Resources and Services Administration"><span data-dcnode-id="3572" instrument_node="">Health Resources and Services Administration</span></a><span data-dcnode-id="3570" instrument_node=""> (HRSA) for the Affordable Care Act. </span><a class="mw-redirect" data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Male_contraception" title="Male contraception"><span data-dcnode-id="3569" instrument_node="">Male contraception</span></a><span data-dcnode-id="3567" instrument_node=""> is not eligible.</span><sup class="reference" data-dcnode-id="3564" id="cite_ref-13"><a data-dcnode-id="3565" href="#cite_note-13"><span data-dcnode-id="3566" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="3561" id="cite_ref-14"><a data-dcnode-id="3562" href="#cite_note-14"><span data-dcnode-id="3563" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="3558" id="cite_ref-15"><a data-dcnode-id="3559" href="#cite_note-15"><span data-dcnode-id="3560" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="3555" id="cite_ref-16"><a data-dcnode-id="3556" href="#cite_note-16"><span data-dcnode-id="3557" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3554" instrument_node="">
</span></p><p data-dcnode-id="3541"><span data-dcnode-id="3552" instrument_node="">Regulations</span><sup class="reference" data-dcnode-id="3549" id="cite_ref-Final_Rule_17-0"><a data-dcnode-id="3550" href="#cite_note-Final_Rule-17"><span data-dcnode-id="3551" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3548" instrument_node=""> made under the act rely on the recommendations of the independent </span><a class="mw-redirect" data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institute_of_Medicine" title="Institute of Medicine"><span data-dcnode-id="3547" instrument_node="">Institute of Medicine</span></a><span data-dcnode-id="3545" instrument_node=""> (IOM) in its July 19, 2011 report </span><i data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Clinical Preventive Services for Women: Closing the Gaps</span></i><span data-dcnode-id="3542" instrument_node="">, which concluded that birth control is medically necessary "to ensure women's health and well-being".
</span></p><p data-dcnode-id="3527"><span data-dcnode-id="3540" instrument_node="">The administration allowed a religious exemption. The exemption initially applied to church organizations themselves, but not to affiliated nonprofit corporations, like hospitals, that do not rely primarily on members of the faith as employees.</span><sup class="reference" data-dcnode-id="3537" id="cite_ref-18"><a data-dcnode-id="3538" href="#cite_note-18"><span data-dcnode-id="3539" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3536" instrument_node=""> An amendment, the Blunt Amendment, was proposed that "would have allowed employers to refuse to include contraception in health care coverage if it violated their religious or moral beliefs",</span><sup class="reference" data-dcnode-id="3533" id="cite_ref-19"><a data-dcnode-id="3534" href="#cite_note-19"><span data-dcnode-id="3535" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3532" instrument_node=""> but it was voted down 51–48 by the U.S. Senate on March 1, 2012.</span><sup class="reference" data-dcnode-id="3529" id="cite_ref-20"><a data-dcnode-id="3530" href="#cite_note-20"><span data-dcnode-id="3531" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3528" instrument_node="">
</span></p><p data-dcnode-id="3513"><span data-dcnode-id="3526" instrument_node="">In May 2015 the Obama administration stated that under the ACA, at least one form of all 18 FDA-approved methods of birth control for women must be covered without cost-sharing.</span><sup class="reference" data-dcnode-id="3523" id="cite_ref-21"><a data-dcnode-id="3524" href="#cite_note-21"><span data-dcnode-id="3525" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3522" instrument_node=""> These 18 methods include: sterilization surgery, surgical sterilization implant, implantable rod, copper intrauterine device, IUDs with progestin (a hormone), shot/injection, oral contraceptives (the pill), with estrogen and progestin, oral contraceptives with progestin only, oral contraceptives, known as extended or continuous use that delay menstruation, the patch, vaginal contraceptive ring, diaphragm, sponge, cervical cap, female condom, spermicide, emergency contraception (Plan B/morning-after pill), and emergency contraception (a different pill called Ella).</span><sup class="reference" data-dcnode-id="3519" id="cite_ref-22"><a data-dcnode-id="3520" href="#cite_note-22"><span data-dcnode-id="3521" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3518" instrument_node=""> All forms of male birth control are exempt from mandatory coverage under the ACA and the "ObamaCare Facts" page explicitly states that "Plans aren't required to cover services related to a man's reproductive capacity, like vasectomies."</span><sup class="reference" data-dcnode-id="3515" id="cite_ref-23"><a data-dcnode-id="3516" href="#cite_note-23"><span data-dcnode-id="3517" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3514" instrument_node="">
</span></p><span data-dcnode-id="3512" instrument_node="">
</span><h3 data-dcnode-id="3502"><span class="mw-headline" data-dcnode-id="3510" id="Opposition_to_contraceptive_mandate"><span data-dcnode-id="3511" instrument_node="">Opposition to contraceptive mandate</span></span><span class="mw-editsection" data-dcnode-id="3503"><span class="mw-editsection-bracket" data-dcnode-id="3508"><span data-dcnode-id="3509" instrument_node="">[</span></span><a data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D4" title="Edit section: Opposition to contraceptive mandate"><span data-dcnode-id="3507" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3458"><span data-dcnode-id="3500" instrument_node="">In February 2012, a major political controversy erupted with </span><a class="mw-redirect" data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_Party_presidential_primaries%2C_2012" title="Republican Party presidential primaries, 2012"><span data-dcnode-id="3499" instrument_node="">candidates for the Republican nomination for President</span></a><span data-dcnode-id="3497" instrument_node=""> viewing the regulations as a "direct attack on religious liberty".</span><sup class="reference" data-dcnode-id="3494" id="cite_ref-NYTGrady_24-0"><a data-dcnode-id="3495" href="#cite_note-NYTGrady-24"><span data-dcnode-id="3496" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3493" instrument_node=""> 
The </span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Conference_of_Catholic_Bishops" title="United States Conference of Catholic Bishops"><span data-dcnode-id="3492" instrument_node="">United States Conference of Catholic Bishops</span></a><span data-dcnode-id="3490" instrument_node=""> has since taken the lead in opposition to the regulations.</span><sup class="reference" data-dcnode-id="3487" id="cite_ref-25"><a data-dcnode-id="3488" href="#cite_note-25"><span data-dcnode-id="3489" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3486" instrument_node=""> Cardinal </span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timothy_M._Dolan" title="Timothy M. Dolan"><span data-dcnode-id="3485" instrument_node="">Timothy M. Dolan</span></a><span data-dcnode-id="3483" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archbishop_of_New_York" title="Archbishop of New York"><span data-dcnode-id="3482" instrument_node="">archbishop of New York</span></a><span data-dcnode-id="3480" instrument_node=""> and president of the </span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Conference_of_Catholic_Bishops" title="United States Conference of Catholic Bishops"><span data-dcnode-id="3479" instrument_node="">United States Conference of Catholic Bishops</span></a><span data-dcnode-id="3477" instrument_node="">, stated that the provision "represents a challenge and a compromise of our religious liberty".</span><sup class="reference" data-dcnode-id="3474" id="cite_ref-USCCB_26-0"><a data-dcnode-id="3475" href="#cite_note-USCCB-26"><span data-dcnode-id="3476" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3473" instrument_node=""> The regulations issued under the act are also opposed by active Christian </span><a class="mw-redirect" data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evangelicals" title="Evangelicals"><span data-dcnode-id="3472" instrument_node="">Evangelicals</span></a><span data-dcnode-id="3470" instrument_node="">.</span><sup class="reference" data-dcnode-id="3467" id="cite_ref-NYTAll_27-0"><a data-dcnode-id="3468" href="#cite_note-NYTAll-27"><span data-dcnode-id="3469" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3466" instrument_node=""> Other organizations, such as </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planned_Parenthood" title="Planned Parenthood"><span data-dcnode-id="3465" instrument_node="">Planned Parenthood</span></a><span data-dcnode-id="3463" instrument_node="">, supported the provision.</span><sup class="reference" data-dcnode-id="3460" id="cite_ref-sun_compromise_28-0"><a data-dcnode-id="3461" href="#cite_note-sun_compromise-28"><span data-dcnode-id="3462" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3459" instrument_node="">
</span></p><span data-dcnode-id="3457" instrument_node="">
</span><h3 data-dcnode-id="3447"><span class="mw-headline" data-dcnode-id="3455" id="Obama_administration_opt-out_proposal"><span data-dcnode-id="3456" instrument_node="">Obama administration opt-out proposal</span></span><span class="mw-editsection" data-dcnode-id="3448"><span class="mw-editsection-bracket" data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">[</span></span><a data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D5" title="Edit section: Obama administration opt-out proposal"><span data-dcnode-id="3452" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3434"><span data-dcnode-id="3445" instrument_node="">In response to the criticism, the Obama administration proposed changes under which birth control medication would be provided by the insurers without direct involvement by the religious organization. Regulations were issued on March 16, 2012 for employees of enterprises controlled by religious institutions which </span><a class="mw-redirect" data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self_insurance" title="Self insurance"><span data-dcnode-id="3444" instrument_node="">self insure</span></a><span data-dcnode-id="3442" instrument_node="">. Further regulations were issued on March 16, 2012 which require coverage for students at institutions controlled by religious organizations which purchase insurance. It is believed by the federal government that it is not possible under current law to require contraceptive coverage for students at institutions controlled by religious organizations which self insure.</span><sup class="reference" data-dcnode-id="3439" id="cite_ref-NYTStudents_29-0"><a data-dcnode-id="3440" href="#cite_note-NYTStudents-29"><span data-dcnode-id="3441" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="3436" id="cite_ref-WPConRules_30-0"><a data-dcnode-id="3437" href="#cite_note-WPConRules-30"><span data-dcnode-id="3438" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3435" instrument_node="">
</span></p><span data-dcnode-id="3433" instrument_node="">
</span><h3 data-dcnode-id="3423"><span class="mw-headline" data-dcnode-id="3431" id="Response_to_opt-out_regulations"><span data-dcnode-id="3432" instrument_node="">Response to opt-out regulations</span></span><span class="mw-editsection" data-dcnode-id="3424"><span class="mw-editsection-bracket" data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">[</span></span><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D6" title="Edit section: Response to opt-out regulations"><span data-dcnode-id="3428" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3422" instrument_node="">
</span><p data-dcnode-id="3392"><span data-dcnode-id="3421" instrument_node="">The </span><a data-dcnode-id="3419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Health_Association_of_the_United_States" title="Catholic Health Association of the United States"><span data-dcnode-id="3420" instrument_node="">Catholic Health Association</span></a><span data-dcnode-id="3418" instrument_node=""> (CHA) accepted this compromise. Although initially more supportive, Sister </span><a data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carol_Keehan" title="Carol Keehan"><span data-dcnode-id="3417" instrument_node="">Carol Keehan</span></a><span data-dcnode-id="3415" instrument_node="">, CEO of the CHA, registered opposition in a five-page letter to the U.S. Department of Health and Human Services.</span><sup class="reference" data-dcnode-id="3412" id="cite_ref-31"><a data-dcnode-id="3413" href="#cite_note-31"><span data-dcnode-id="3414" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3411" instrument_node=""> The vice president of Catholic identity and mission at </span><a data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_St._Mary%2527s_University" title="Mount St. Mary's University"><span data-dcnode-id="3410" instrument_node="">Mount St. Mary's University</span></a><span data-dcnode-id="3408" instrument_node="">, Stuart Swetland, said, "It shows [Obama] and the administration are listening to our concerns", but reserved the right to "examine the details". However, the United States Conference of Catholic Bishops continued to oppose the regulation, saying that the regulation still requires Catholics in the insurance industry to violate their consciences.</span><sup class="reference" data-dcnode-id="3405" id="cite_ref-sun_compromise_28-1"><a data-dcnode-id="3406" href="#cite_note-sun_compromise-28"><span data-dcnode-id="3407" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3404" instrument_node=""> Catholic opinion is split with a </span><i data-dcnode-id="3401"><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_York_Times" title="The New York Times"><span data-dcnode-id="3403" instrument_node="">The New York Times</span></a></i><span data-dcnode-id="3400" instrument_node="">/CBS News poll showing 57% support of the regulations among Catholic voters and about the same by non-Catholics.</span><sup class="reference" data-dcnode-id="3397" id="cite_ref-NYTsplit_32-0"><a data-dcnode-id="3398" href="#cite_note-NYTsplit-32"><span data-dcnode-id="3399" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="3394" id="cite_ref-33"><a data-dcnode-id="3395" href="#cite_note-33"><span data-dcnode-id="3396" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3393" instrument_node="">
</span></p><p data-dcnode-id="3323"><span data-dcnode-id="3391" instrument_node="">In June 2013, the </span><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Court_of_Appeals_for_the_Tenth_Circuit" title="United States Court of Appeals for the Tenth Circuit"><span data-dcnode-id="3390" instrument_node="">Tenth Circuit Court of Appeals</span></a><span data-dcnode-id="3388" instrument_node=""> allowed a lawsuit against the mandate by arts and crafts retailer </span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hobby_Lobby" title="Hobby Lobby"><span data-dcnode-id="3387" instrument_node="">Hobby Lobby</span></a><span data-dcnode-id="3385" instrument_node=""> to proceed. The </span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Green_%28entrepreneur%29" title="David Green (entrepreneur)"><span data-dcnode-id="3384" instrument_node="">Green</span></a><span data-dcnode-id="3382" instrument_node=""> family objected to contraceptives which they believe may prevent implantation of a fertilized egg, which, according to </span><a class="mw-redirect" data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pro-life" title="Pro-life"><span data-dcnode-id="3381" instrument_node="">pro-life</span></a><span data-dcnode-id="3379" instrument_node=""> advocacy organizations, include the </span><a data-dcnode-id="3377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergency_contraception" title="Emergency contraception"><span data-dcnode-id="3378" instrument_node="">emergency contraceptives</span></a><span data-dcnode-id="3376" instrument_node=""> </span><i data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Plan B</span></i><span data-dcnode-id="3373" instrument_node=""> (</span><a data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Levonorgestrel" title="Levonorgestrel"><span data-dcnode-id="3372" instrument_node="">levonorgestrel</span></a><span data-dcnode-id="3370" instrument_node="">), </span><i data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">ella</span></i><span data-dcnode-id="3367" instrument_node=""> (</span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ulipristal_acetate" title="Ulipristal acetate"><span data-dcnode-id="3366" instrument_node="">ulipristal acetate</span></a><span data-dcnode-id="3364" instrument_node="">), and </span><a class="mw-redirect" data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IUD_with_copper" title="IUD with copper"><span data-dcnode-id="3363" instrument_node="">copper IUDs</span></a><span data-dcnode-id="3361" instrument_node="">.</span><sup class="reference" data-dcnode-id="3358" id="cite_ref-34"><a data-dcnode-id="3359" href="#cite_note-34"><span data-dcnode-id="3360" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3355" id="cite_ref-35"><a data-dcnode-id="3356" href="#cite_note-35"><span data-dcnode-id="3357" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3354" instrument_node=""> In July 2013, the </span><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Court_of_Appeals_for_the_Third_Circuit" title="United States Court of Appeals for the Third Circuit"><span data-dcnode-id="3353" instrument_node="">Third Circuit</span></a><span data-dcnode-id="3351" instrument_node=""> denied a preliminary injunction requested by Conestoga Wood Specialties Corporation, a cabinet manufacturing company owned by a </span><a class="mw-redirect" data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mennonite" title="Mennonite"><span data-dcnode-id="3350" instrument_node="">Mennonite</span></a><span data-dcnode-id="3348" instrument_node=""> family, requesting an exemption from the mandate on religious grounds.</span><sup class="reference" data-dcnode-id="3345" id="cite_ref-36"><a data-dcnode-id="3346" href="#cite_note-36"><span data-dcnode-id="3347" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3344" instrument_node=""> Both of these rulings were appealed to the </span><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="3343" instrument_node="">Supreme Court</span></a><span data-dcnode-id="3341" instrument_node="">, which granted </span><a class="mw-redirect" data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Writ_of_certiorari" title="Writ of certiorari"><span data-dcnode-id="3340" instrument_node="">certiorari</span></a><span data-dcnode-id="3338" instrument_node=""> on the consolidated cases to resolve the split.</span><sup class="reference" data-dcnode-id="3335" id="cite_ref-37"><a data-dcnode-id="3336" href="#cite_note-37"><span data-dcnode-id="3337" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="3332" id="cite_ref-38"><a data-dcnode-id="3333" href="#cite_note-38"><span data-dcnode-id="3334" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3331" instrument_node=""> Another decision by the </span><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Court_of_Appeals_for_the_Sixth_Circuit" title="United States Court of Appeals for the Sixth Circuit"><span data-dcnode-id="3330" instrument_node="">Sixth Circuit</span></a><span data-dcnode-id="3328" instrument_node=""> in a similar case had been appealed to the Supreme Court, and was being held pending the court's decision in the other two cases.</span><sup class="reference" data-dcnode-id="3325" id="cite_ref-39"><a data-dcnode-id="3326" href="#cite_note-39"><span data-dcnode-id="3327" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3324" instrument_node="">
</span></p><p data-dcnode-id="3317"><span data-dcnode-id="3322" instrument_node="">As of January 2014, at least 28 states in the US have contraceptive mandates; however, 20 of them allow some exceptions; four of those attempt to bridge the gap by letting employees buy coverage at the group rate.</span><sup class="reference" data-dcnode-id="3319" id="cite_ref-40"><a data-dcnode-id="3320" href="#cite_note-40"><span data-dcnode-id="3321" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3318" instrument_node="">
</span></p><span data-dcnode-id="3316" instrument_node="">
</span><h3 data-dcnode-id="3306"><span class="mw-headline" data-dcnode-id="3314" id="Supreme_Court_review"><span data-dcnode-id="3315" instrument_node="">Supreme Court review</span></span><span class="mw-editsection" data-dcnode-id="3307"><span class="mw-editsection-bracket" data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">[</span></span><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D7" title="Edit section: Supreme Court review"><span data-dcnode-id="3311" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3305" instrument_node="">
</span><p data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">A number of challenges to the contraceptive mandate have been brought to the Supreme Court by different types of organizations.
</span></p><span data-dcnode-id="3302" instrument_node="">
</span><h4 data-dcnode-id="3292"><span class="mw-headline" data-dcnode-id="3300" id="Closely_held_for-profit_corporations"><span data-dcnode-id="3301" instrument_node="">Closely held for-profit corporations</span></span><span class="mw-editsection" data-dcnode-id="3293"><span class="mw-editsection-bracket" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">[</span></span><a data-dcnode-id="3296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D8" title="Edit section: Closely held for-profit corporations"><span data-dcnode-id="3297" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3291" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3285" role="note"><span data-dcnode-id="3288" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burwell_v._Hobby_Lobby" title="Burwell v. Hobby Lobby"><span data-dcnode-id="3287" instrument_node="">Burwell v. Hobby Lobby</span></a></div><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3271"><span data-dcnode-id="3283" instrument_node="">On June 30, 2014, the Supreme Court ruled 5 to 4 in </span><i data-dcnode-id="3280"><a class="mw-redirect" data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burwell_v._Hobby_Lobby" title="Burwell v. Hobby Lobby"><span data-dcnode-id="3282" instrument_node="">Burwell v. Hobby Lobby</span></a></i><span data-dcnode-id="3279" instrument_node=""> that under the </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_Freedom_Restoration_Act" title="Religious Freedom Restoration Act"><span data-dcnode-id="3278" instrument_node="">Religious Freedom Restoration Act</span></a><span data-dcnode-id="3276" instrument_node=""> (RFRA), closely held for-profit corporations are exempt from the contraceptive mandate, if they object on religious grounds, because the accommodation offered to objecting non-profits would be a less restrictive way to achieve the ACA's interest. Justice Anthony Kennedy, one of the majority justices, wrote in a concurring opinion that the government "makes the case that the mandate serves the Government's compelling interest in providing insurance coverage that is necessary to protect the health of female employees", but that the RFRA's least-restrictive way requirement was not met because "there is an existing, recognized, workable, and already-implemented framework to provide coverage", the non-profit accommodation.</span><sup class="reference" data-dcnode-id="3273" id="cite_ref-41"><a data-dcnode-id="3274" href="#cite_note-41"><span data-dcnode-id="3275" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3272" instrument_node="">
</span></p><span data-dcnode-id="3270" instrument_node="">
</span><h4 data-dcnode-id="3260"><span class="mw-headline" data-dcnode-id="3268" id="Religious_institutions"><span data-dcnode-id="3269" instrument_node="">Religious institutions</span></span><span class="mw-editsection" data-dcnode-id="3261"><span class="mw-editsection-bracket" data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">[</span></span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D9" title="Edit section: Religious institutions"><span data-dcnode-id="3265" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3259" instrument_node="">
</span><link data-dcnode-id="3258" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3254" role="note"><span data-dcnode-id="3257" instrument_node="">Main article: </span><a data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zubik_v._Burwell" title="Zubik v. Burwell"><span data-dcnode-id="3256" instrument_node="">Zubik v. Burwell</span></a></div><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3148"><span class="anchor" data-dcnode-id="3252" id="Priests_for_Life_v._HHS"></span><span data-dcnode-id="3251" instrument_node="">On February 15, 2012, </span><i data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Priests for Life v. HHS</span></i><span data-dcnode-id="3248" instrument_node=""> was filed in the </span><a class="mw-redirect" data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._District_Court_for_the_Eastern_District_of_New_York" title="U.S. District Court for the Eastern District of New York"><span data-dcnode-id="3247" instrument_node="">U.S. District Court for the Eastern District of New York</span></a><span data-dcnode-id="3245" instrument_node=""> challenging the constitutionality of the contraceptive mandate on behalf of </span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priests_for_Life" title="Priests for Life"><span data-dcnode-id="3244" instrument_node="">Priests for Life</span></a><span data-dcnode-id="3242" instrument_node="">, a national Catholic </span><a class="mw-redirect" data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pro-life" title="Pro-life"><span data-dcnode-id="3241" instrument_node="">pro-life</span></a><span data-dcnode-id="3239" instrument_node=""> organization that was based in New York City, but is now headquartered in </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titusville%2C_Florida" title="Titusville, Florida"><span data-dcnode-id="3238" instrument_node="">Titusville, Florida</span></a><span data-dcnode-id="3236" instrument_node="">. The case was dismissed by U.S. District Court Judge </span><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frederic_Block" title="Frederic Block"><span data-dcnode-id="3235" instrument_node="">Frederic Block</span></a><span data-dcnode-id="3233" instrument_node=""> for lack of ripeness because the new compromise regulations were not yet finalized.</span><sup class="reference" data-dcnode-id="3230" id="cite_ref-bloomberg1_42-0"><a data-dcnode-id="3231" href="#cite_note-bloomberg1-42"><span data-dcnode-id="3232" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="3227" id="cite_ref-43"><a data-dcnode-id="3228" href="#cite_note-43"><span data-dcnode-id="3229" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="3224" id="cite_ref-44"><a data-dcnode-id="3225" href="#cite_note-44"><span data-dcnode-id="3226" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3223" instrument_node=""> On November 6, 2015 the </span><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="3222" instrument_node="">Supreme Court of the United States</span></a><span data-dcnode-id="3220" instrument_node=""> decided to review the case combined with 6 other similar challenges to the contraceptive mandate.</span><sup class="reference" data-dcnode-id="3217" id="cite_ref-scotusblog.com_45-0"><a data-dcnode-id="3218" href="#cite_note-scotusblog.com-45"><span data-dcnode-id="3219" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="3214" id="cite_ref-46"><a data-dcnode-id="3215" href="#cite_note-46"><span data-dcnode-id="3216" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3213" instrument_node=""> The case is titled </span><i data-dcnode-id="3210"><a data-dcnode-id="3211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zubik_v._Burwell" title="Zubik v. Burwell"><span data-dcnode-id="3212" instrument_node="">Zubik v. Burwell</span></a></i><span data-dcnode-id="3209" instrument_node=""> and the six other challenges include </span><i data-dcnode-id="3205"><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priests_for_Life" title="Priests for Life"><span data-dcnode-id="3208" instrument_node="">Priests for Life</span></a><span data-dcnode-id="3206" instrument_node=""> v. Burwell</span></i><span data-dcnode-id="3204" instrument_node="">, </span><i data-dcnode-id="3201"><a class="new" data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSouthern_Nazarene_University_v._Burwell%26action%3Dedit%26redlink%3D1" title="Southern Nazarene University v. Burwell (page does not exist)"><span data-dcnode-id="3203" instrument_node="">Southern Nazarene University v. Burwell</span></a></i><span data-dcnode-id="3200" instrument_node="">, </span><i data-dcnode-id="3197"><a class="new" data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGeneva_College_v._Burwell%26action%3Dedit%26redlink%3D1" title="Geneva College v. Burwell (page does not exist)"><span data-dcnode-id="3199" instrument_node="">Geneva College v. Burwell</span></a></i><span data-dcnode-id="3196" instrument_node="">, </span><i data-dcnode-id="3193"><a class="new" data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRoman_Catholic_Archbishop_of_Washington_v._Burwell%26action%3Dedit%26redlink%3D1" title="Roman Catholic Archbishop of Washington v. Burwell (page does not exist)"><span data-dcnode-id="3195" instrument_node="">Roman Catholic Archbishop of Washington v. Burwell</span></a></i><span data-dcnode-id="3192" instrument_node="">, </span><i data-dcnode-id="3189"><a class="new" data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEast_Texas_Baptist_University_v._Burwell%26action%3Dedit%26redlink%3D1" title="East Texas Baptist University v. Burwell (page does not exist)"><span data-dcnode-id="3191" instrument_node="">East Texas Baptist University v. Burwell</span></a></i><span data-dcnode-id="3188" instrument_node=""> and </span><i data-dcnode-id="3184"><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Little_Sisters_of_the_Poor" title="Little Sisters of the Poor"><span data-dcnode-id="3187" instrument_node="">Little Sisters of the Poor</span></a><span data-dcnode-id="3185" instrument_node=""> Home for the Aged v. Burwell</span></i><span data-dcnode-id="3183" instrument_node="">.</span><sup class="reference" data-dcnode-id="3180" id="cite_ref-scotusblog.com_45-1"><a data-dcnode-id="3181" href="#cite_note-scotusblog.com-45"><span data-dcnode-id="3182" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="3177" id="cite_ref-47"><a data-dcnode-id="3178" href="#cite_note-47"><span data-dcnode-id="3179" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="3174" id="cite_ref-48"><a data-dcnode-id="3175" href="#cite_note-48"><span data-dcnode-id="3176" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="3171" id="cite_ref-49"><a data-dcnode-id="3172" href="#cite_note-49"><span data-dcnode-id="3173" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="3168" id="cite_ref-50"><a data-dcnode-id="3169" href="#cite_note-50"><span data-dcnode-id="3170" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="3165" id="cite_ref-51"><a data-dcnode-id="3166" href="#cite_note-51"><span data-dcnode-id="3167" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="3162" id="cite_ref-52"><a data-dcnode-id="3163" href="#cite_note-52"><span data-dcnode-id="3164" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="3159" id="cite_ref-53"><a data-dcnode-id="3160" href="#cite_note-53"><span data-dcnode-id="3161" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="3156" id="cite_ref-54"><a data-dcnode-id="3157" href="#cite_note-54"><span data-dcnode-id="3158" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="3153" id="cite_ref-55"><a data-dcnode-id="3154" href="#cite_note-55"><span data-dcnode-id="3155" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="3150" id="cite_ref-56"><a data-dcnode-id="3151" href="#cite_note-56"><span data-dcnode-id="3152" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3149" instrument_node="">
</span></p><p data-dcnode-id="3136"><span data-dcnode-id="3147" instrument_node="">Due to the death of Justice </span><a data-dcnode-id="3145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antonin_Scalia" title="Antonin Scalia"><span data-dcnode-id="3146" instrument_node="">Antonin Scalia</span></a><span data-dcnode-id="3144" instrument_node=""> before the case was decided, the Supreme Court was deadlocked on </span><i data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Zubik</span></i><span data-dcnode-id="3141" instrument_node="">. Instead of issuing a decision, it ordered the cases back to lower courts and ordered the HHS and other responsible departments to work with the parties to come up with new rules for exemptions for the mandate that took into account the parties' concerns. As part of this, by the end of 2016, an initial period of requests for input has been opened as part of the new rule-making procedure.</span><sup class="reference" data-dcnode-id="3138" id="cite_ref-57"><a data-dcnode-id="3139" href="#cite_note-57"><span data-dcnode-id="3140" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3137" instrument_node="">
</span></p><span data-dcnode-id="3135" instrument_node="">
</span><h3 data-dcnode-id="3125"><span class="mw-headline" data-dcnode-id="3133" id="Trump_administration_change"><span data-dcnode-id="3134" instrument_node="">Trump administration change</span></span><span class="mw-editsection" data-dcnode-id="3126"><span class="mw-editsection-bracket" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">[</span></span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D10" title="Edit section: Trump administration change"><span data-dcnode-id="3130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3124" instrument_node="">
</span><link data-dcnode-id="3123" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3119" role="note"><span data-dcnode-id="3122" instrument_node="">Main article: </span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Little_Sisters_of_the_Poor_Saints_Peter_and_Paul_Home_v._Pennsylvania" title="Little Sisters of the Poor Saints Peter and Paul Home v. Pennsylvania"><span data-dcnode-id="3121" instrument_node="">Little Sisters of the Poor Saints Peter and Paul Home v. Pennsylvania</span></a></div><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3117" instrument_node="">Shortly after taking office, President </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="3116" instrument_node="">Donald Trump</span></a><span data-dcnode-id="3114" instrument_node=""> issued </span><a class="extiw" data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/Executive_Order_13798" title="s:Executive Order 13798"><span data-dcnode-id="3113" instrument_node="">Executive Order 13798, "Promoting Free Speech and Religious Liberty"</span></a><span data-dcnode-id="3111" instrument_node=""> in May 2017 to urge the departments responsible for the ACA to issue a conscience-based exemption for the contraceptive mandate as soon as possible. By October 2017, the HHS and other agencies issued a ruling letting insurers and employers refuse to provide birth control if doing so violates their religious beliefs or moral convictions.</span><sup class="reference" data-dcnode-id="3108" id="cite_ref-bbc.com_8-1"><a data-dcnode-id="3109" href="#cite_note-bbc.com-8"><span data-dcnode-id="3110" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3107" instrument_node="">
</span></p><p data-dcnode-id="3084"><span data-dcnode-id="3105" instrument_node="">Several states immediately challenged the new rules in multiple court cases, believing the rules bypassed the process that the Supreme Court has issued in </span><i data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Zubik</span></i><span data-dcnode-id="3102" instrument_node="">. In separate cases from the Third and Ninth Circuits, the rules were found to be in violation of the </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Administrative_Procedure_Act_%28United_States%29" title="Administrative Procedure Act (United States)"><span data-dcnode-id="3101" instrument_node="">Administrative Procedure Act</span></a><span data-dcnode-id="3099" instrument_node=""> having been issued in an </span><a class="mw-redirect" data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arbitrary_and_capricious" title="Arbitrary and capricious"><span data-dcnode-id="3098" instrument_node="">arbitrary and capricious</span></a><span data-dcnode-id="3096" instrument_node=""> manner, and a nationwide injunction was placed on their enforcement.</span><sup class="reference" data-dcnode-id="3093" id="cite_ref-58"><a data-dcnode-id="3094" href="#cite_note-58"><span data-dcnode-id="3095" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3092" instrument_node=""> The injunction was challenged at the Supreme Court by the government in </span><i data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Little Sisters of the Poor Saints Peter and Paul Home v. Pennsylvania</span></i><span data-dcnode-id="3089" instrument_node="">. There, in July 2020, the Court ruled in a 7–2 that the new rules were valid and put into place properly, lifting the injunction.</span><sup class="reference" data-dcnode-id="3086" id="cite_ref-59"><a data-dcnode-id="3087" href="#cite_note-59"><span data-dcnode-id="3088" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3085" instrument_node="">
</span></p><span data-dcnode-id="3083" instrument_node="">
</span><h3 data-dcnode-id="3073"><span class="mw-headline" data-dcnode-id="3081" id="Reactions"><span data-dcnode-id="3082" instrument_node="">Reactions</span></span><span class="mw-editsection" data-dcnode-id="3074"><span class="mw-editsection-bracket" data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">[</span></span><a data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D11" title="Edit section: Reactions"><span data-dcnode-id="3078" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3072" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3071" instrument_node="">More Democratic politicians favor these mandates than Republican politicians.</span><sup class="reference" data-dcnode-id="3068" id="cite_ref-60"><a data-dcnode-id="3069" href="#cite_note-60"><span data-dcnode-id="3070" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3067" instrument_node=""> </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbara_Boxer" title="Barbara Boxer"><span data-dcnode-id="3066" instrument_node="">Barbara Boxer</span></a><span data-dcnode-id="3064" instrument_node="">, Democratic Party Senator for California, and </span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party_leaders_of_the_United_States_House_of_Representatives" title="Party leaders of the United States House of Representatives"><span data-dcnode-id="3063" instrument_node="">House Minority Leader</span></a><span data-dcnode-id="3061" instrument_node=""> </span><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nancy_Pelosi" title="Nancy Pelosi"><span data-dcnode-id="3060" instrument_node="">Nancy Pelosi</span></a><span data-dcnode-id="3058" instrument_node=""> favor the Obama policy.</span><sup class="reference" data-dcnode-id="3055" id="cite_ref-divides_61-0"><a data-dcnode-id="3056" href="#cite_note-divides-61"><span data-dcnode-id="3057" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3054" instrument_node="">
</span></p><p data-dcnode-id="3027"><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darrell_Issa" title="Darrell Issa"><span data-dcnode-id="3052" instrument_node="">Darrell Issa</span></a><span data-dcnode-id="3050" instrument_node="">, a Republican congressman from California, said that Americans are divided on this issue: "While some Americans may not feel that forcing them to pay for contraception are an infringement on their religious beliefs, others consider it to be an assault against their </span><a class="mw-redirect" data-dcnode-id="3048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_conscience" title="Freedom of conscience"><span data-dcnode-id="3049" instrument_node="">freedom of conscience</span></a><span data-dcnode-id="3047" instrument_node="">."</span><sup class="reference" data-dcnode-id="3044" id="cite_ref-62"><a data-dcnode-id="3045" href="#cite_note-62"><span data-dcnode-id="3046" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3043" instrument_node=""> Issa's </span><a class="mw-redirect" data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2012_Hearing_on_religious_freedom" title="2012 Hearing on religious freedom"><span data-dcnode-id="3042" instrument_node="">February 2012 hearing</span></a><span data-dcnode-id="3040" instrument_node=""> on the matter was criticized</span><sup class="noprint Inline-Template" data-dcnode-id="3033" style="white-space:nowrap;"><span data-dcnode-id="3039" instrument_node="">[</span><i data-dcnode-id="3035"><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="3037" title="The material near this tag may use weasel words or too-vague attribution. (December 2020)"><span data-dcnode-id="3038" instrument_node="">by whom?</span></span></a></i><span data-dcnode-id="3034" instrument_node="">]</span></sup><span data-dcnode-id="3032" instrument_node=""> for including only men from conservative religious institutions, and no women.</span><sup class="reference" data-dcnode-id="3029" id="cite_ref-63"><a data-dcnode-id="3030" href="#cite_note-63"><span data-dcnode-id="3031" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3028" instrument_node="">
</span></p><span data-dcnode-id="3026" instrument_node="">
</span><h4 data-dcnode-id="3016"><span class="mw-headline" data-dcnode-id="3024" id="Framing_the_issue"><span data-dcnode-id="3025" instrument_node="">Framing the issue</span></span><span class="mw-editsection" data-dcnode-id="3017"><span class="mw-editsection-bracket" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">[</span></span><a data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DContraceptive_mandate%26action%3Dedit%26section%3D12" title="Edit section: Framing the issue"><span data-dcnode-id="3021" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3015" instrument_node="">
</span><link data-dcnode-id="3014" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3010" role="note"><span data-dcnode-id="3013" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_Women" title="War on Women"><span data-dcnode-id="3012" instrument_node="">War on Women</span></a></div><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="2978"><span data-dcnode-id="3008" instrument_node="">Some people</span><sup class="noprint Inline-Template" data-dcnode-id="3001" style="white-space:nowrap;"><span data-dcnode-id="3007" instrument_node="">[</span><i data-dcnode-id="3003"><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="3005" title="The material near this tag possibly uses too-vague attribution or weasel words. (December 2020)"><span data-dcnode-id="3006" instrument_node="">who?</span></span></a></i><span data-dcnode-id="3002" instrument_node="">]</span></sup><span data-dcnode-id="3000" instrument_node=""> see the matter as primarily one of </span><a data-dcnode-id="2998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_health" title="Women's health"><span data-dcnode-id="2999" instrument_node="">women's health</span></a><span data-dcnode-id="2997" instrument_node="">, such as the </span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Women%2527s_Law_Center" title="National Women's Law Center"><span data-dcnode-id="2996" instrument_node="">National Women's Law Center</span></a><span data-dcnode-id="2994" instrument_node="">.</span><sup class="reference" data-dcnode-id="2991" id="cite_ref-64"><a data-dcnode-id="2992" href="#cite_note-64"><span data-dcnode-id="2993" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2990" instrument_node=""> Others</span><sup class="noprint Inline-Template" data-dcnode-id="2983" style="white-space:nowrap;"><span data-dcnode-id="2989" instrument_node="">[</span><i data-dcnode-id="2985"><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="2987" title="The material near this tag possibly uses too-vague attribution or weasel words. (December 2020)"><span data-dcnode-id="2988" instrument_node="">who?</span></span></a></i><span data-dcnode-id="2984" instrument_node="">]</span></sup><span data-dcnode-id="2982" instrument_node=""> see it as a matter of </span><a class="mw-redirect" data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_freedom" title="Religious freedom"><span data-dcnode-id="2981" instrument_node="">religious freedom</span></a><span data-dcnode-id="2979" instrument_node="">.
</span></p><p data-dcnode-id="2969"><span data-dcnode-id="2977" instrument_node="">Certain consumers of mandatory health insurance, such as students matriculated at colleges of further education, have criticized what they perceive to be discrimination in provision or in practice: employer-provided plans that cover University faculty and staff may be subject to legal mandates whereas plans that cover the student body may not. </span><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sandra_Fluke" title="Sandra Fluke"><span data-dcnode-id="2976" instrument_node="">Sandra Fluke</span></a><span data-dcnode-id="2974" instrument_node=""> was invited to present oral arguments on behalf of certain female student consumers dissatisfied with restrictions attached to registration for undergraduate and graduate attendance at Georgetown University School of Law.</span><sup class="reference" data-dcnode-id="2971" id="cite_ref-wikisource_65-0"><a data-dcnode-id="2972" href="#cite_note-wikisource-65"><span data-dcnode-id="2973" instrument_node="">[65]</span></a></sup><span data-dcnode-id="2970" instrument_node="">
