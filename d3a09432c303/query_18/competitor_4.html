</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="4055" id="firstHeading"><span data-dcnode-id="4056" instrument_node="">Contraceptive mandate</span></h1><span data-dcnode-id="4054" instrument_node="">
</span><div class="vector-body" data-dcnode-id="430" id="bodyContent"><span data-dcnode-id="4053" instrument_node="">
</span><div class="noprint" data-dcnode-id="4051" id="siteSub"><span data-dcnode-id="4052" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="4050" instrument_node="">

</span><a class="mw-jump-link" data-dcnode-id="4039" href="#searchInput"><span data-dcnode-id="4040" instrument_node="">Jump to search</span></a><span data-dcnode-id="4038" instrument_node="">
</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="505" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="514"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="4036" style="display:none"><span data-dcnode-id="4037" instrument_node="">Government regulation or law that requires health insurance to cover contraceptive costs</span></div><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4018"><span data-dcnode-id="4034" instrument_node="">A </span><b data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">contraceptive mandate</span></b><span data-dcnode-id="4031" instrument_node=""> is a government regulation or law that requires </span><a class="mw-redirect" data-dcnode-id="4029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_insurer" title="Health insurer"><span data-dcnode-id="4030" instrument_node="">health insurers</span></a><span data-dcnode-id="4028" instrument_node="">, or </span><a class="mw-redirect" data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Employer" title="Employer"><span data-dcnode-id="4027" instrument_node="">employers</span></a><span data-dcnode-id="4025" instrument_node=""> that provide their </span><a class="mw-redirect" data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Employee" title="Employee"><span data-dcnode-id="4024" instrument_node="">employees</span></a><span data-dcnode-id="4022" instrument_node=""> with health insurance, to cover some </span><a class="mw-redirect" data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contraception" title="Contraception"><span data-dcnode-id="4021" instrument_node="">contraceptive</span></a><span data-dcnode-id="4019" instrument_node=""> costs in their health insurance plans.
</span></p><p data-dcnode-id="3980"><span data-dcnode-id="4017" instrument_node="">In 1978, the </span><a data-dcnode-id="4015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="4016" instrument_node="">United States Congress</span></a><span data-dcnode-id="4014" instrument_node=""> ruled that </span><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pregnancy_discrimination" title="Pregnancy discrimination"><span data-dcnode-id="4013" instrument_node="">discrimination on the basis of pregnancy</span></a><span data-dcnode-id="4011" instrument_node=""> was discrimination on the basis of sex.</span><sup class="reference" data-dcnode-id="4008" id="cite_ref-PDA_1-0"><a data-dcnode-id="4009" href="#cite_note-PDA-1"><span data-dcnode-id="4010" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4007" instrument_node=""> In 2000, the </span><a data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Employment_Opportunity_Commission" title="Equal Employment Opportunity Commission"><span data-dcnode-id="4006" instrument_node="">Equal Employment Opportunity Commission</span></a><span data-dcnode-id="4004" instrument_node=""> ruled that companies that provided insurance for prescription drugs to their employees but excluded birth control were violating the </span><a data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Act_of_1964" title="Civil Rights Act of 1964"><span data-dcnode-id="4003" instrument_node="">Civil Rights Act of 1964</span></a><span data-dcnode-id="4001" instrument_node="">.</span><sup class="reference" data-dcnode-id="3998" id="cite_ref-EEOC_2-0"><a data-dcnode-id="3999" href="#cite_note-EEOC-2"><span data-dcnode-id="4000" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3997" instrument_node=""> </span><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="3996" instrument_node="">President Obama</span></a><span data-dcnode-id="3994" instrument_node=""> signed the </span><a class="mw-redirect" data-dcnode-id="3992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patient_Protection_and_Affordable_Care_Act" title="Patient Protection and Affordable Care Act"><span data-dcnode-id="3993" instrument_node="">Patient Protection and Affordable Care Act</span></a><span data-dcnode-id="3991" instrument_node=""> (ACA) on 23 March 2010. As of 1 August 2011, female contraception was added to a list of preventive services covered by the ACA that would be provided without </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copayment" title="Copayment"><span data-dcnode-id="3990" instrument_node="">patient co-payment</span></a><span data-dcnode-id="3988" instrument_node="">. The federal mandate applied to all new health insurance plans in all states from 1 August 2012.</span><sup class="reference" data-dcnode-id="3985" id="cite_ref-NWLC_3-0"><a data-dcnode-id="3986" href="#cite_note-NWLC-3"><span data-dcnode-id="3987" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3982" id="cite_ref-WebMD_4-0"><a data-dcnode-id="3983" href="#cite_note-WebMD-4"><span data-dcnode-id="3984" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3981" instrument_node="">
</span></p><p data-dcnode-id="3954"><a class="mw-redirect" data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grandfathered" title="Grandfathered"><span data-dcnode-id="3979" instrument_node="">Grandfathered</span></a><span data-dcnode-id="3977" instrument_node=""> plans did not have to comply unless they changed substantially.</span><sup class="reference" data-dcnode-id="3974" id="cite_ref-NWLC2_5-0"><a data-dcnode-id="3975" href="#cite_note-NWLC2-5"><span data-dcnode-id="3976" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3973" instrument_node=""> To be grandfathered, a group plan must have existed or an individual plan must have been sold before President Obama signed the law; otherwise they were required to comply with the new law.</span><sup class="reference" data-dcnode-id="3970" id="cite_ref-NWLC3_6-0"><a data-dcnode-id="3971" href="#cite_note-NWLC3-6"><span data-dcnode-id="3972" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3969" instrument_node=""> The </span><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guttmacher_Institute" title="Guttmacher Institute"><span data-dcnode-id="3968" instrument_node="">Guttmacher Institute</span></a><span data-dcnode-id="3966" instrument_node=""> said that even before the federal mandate was implemented, twenty-eight states had their own mandates that required health insurance to cover prescription contraceptives, but the federal mandate innovated by forbidding insurance companies from charging part of the cost to the patient.</span><sup class="reference" data-dcnode-id="3963" id="cite_ref-gutt2_7-0"><a data-dcnode-id="3964" href="#cite_note-gutt2-7"><span data-dcnode-id="3965" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3962" instrument_node=""> In 2017, the </span><a class="mw-redirect" data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trump_administration" title="Trump administration"><span data-dcnode-id="3961" instrument_node="">Trump administration</span></a><span data-dcnode-id="3959" instrument_node=""> issued a ruling letting insurers and employers refuse to provide birth control if doing so would violate their religious beliefs or moral convictions.</span><sup class="reference" data-dcnode-id="3956" id="cite_ref-bbc.com_8-0"><a data-dcnode-id="3957" href="#cite_note-bbc.com-8"><span data-dcnode-id="3958" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3955" instrument_node="">
</span></p><span data-dcnode-id="3953" instrument_node="">
</span><div aria-labelledby="mw-toc-heading" class="toc" data-dcnode-id="3810" id="toc" role="navigation"><input class="toctogglecheckbox" data-dcnode-id="3952" id="toctogglecheckbox" role="button" style="display:none" type="checkbox"><div class="toctitle" data-dcnode-id="3947" dir="ltr" lang="en"><h2 data-dcnode-id="3950" id="mw-toc-heading"><span data-dcnode-id="3951" instrument_node="">Contents</span></h2><span class="toctogglespan" data-dcnode-id="3948"><label class="toctogglelabel" data-dcnode-id="3949" for="toctogglecheckbox"></label></span></div><span data-dcnode-id="3946" instrument_node="">

</span><li class="toclevel-1 tocsection-1" data-dcnode-id="3938"><a data-dcnode-id="3939" href="#Birth_control_and_unintended_pregnancy"><span class="tocnumber" data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">1</span></span><span data-dcnode-id="3942" instrument_node=""> </span><span class="toctext" data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">Birth control and unintended pregnancy</span></span></a></li><span data-dcnode-id="3937" instrument_node="">
</span><li class="toclevel-1 tocsection-2" data-dcnode-id="3930"><a data-dcnode-id="3931" href="#Federal_female_contraception_mandate_before_ACA"><span class="tocnumber" data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">2</span></span><span data-dcnode-id="3934" instrument_node=""> </span><span class="toctext" data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Federal female contraception mandate before ACA</span></span></a></li><span data-dcnode-id="3929" instrument_node="">
