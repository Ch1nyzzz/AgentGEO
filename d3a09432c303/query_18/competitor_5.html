</span><hr data-dcnode-id="5354"><span data-dcnode-id="5353" instrument_node="">
</span><h4 data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">
                    Guideline Statement 3
                </span></h4><span data-dcnode-id="5350" instrument_node="">
</span><div data-dcnode-id="5343"><span data-dcnode-id="5349" instrument_node="">
</span><p data-dcnode-id="5345"><span data-dcnode-id="5348" instrument_node="">Clinicians do not need to routinely discuss prostate cancer, coronary heart disease, stroke, hypertension, dementia or testicular cancer in pre-vasectomy counseling of patients because vasectomy is not a risk factor for these conditions. </span><em data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">Standard</span></em></p><span data-dcnode-id="5344" instrument_node="">
</span></div><span data-dcnode-id="5342" instrument_node="">
</span><p data-dcnode-id="5337"><span data-dcnode-id="5341" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="5339" data-feathr-click-track="true" data-target="#x3366" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="5340" instrument_node="">Discussion</span></a><span data-dcnode-id="5338" instrument_node="">
</span></p><span data-dcnode-id="5336" instrument_node="">
</span><div class="modal fade" data-dcnode-id="5065" id="x3366" role="dialog"><span data-dcnode-id="5335" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="5067"><span data-dcnode-id="5334" instrument_node="">
</span><div class="modal-content" data-dcnode-id="5069"><span data-dcnode-id="5333" instrument_node="">
</span><div class="modal-header" data-dcnode-id="5325"><span data-dcnode-id="5332" instrument_node="">
</span><button class="close" data-dcnode-id="5330" data-dismiss="modal" type="button"><span data-dcnode-id="5331" instrument_node="">×</span></button><span data-dcnode-id="5329" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">Discussion</span></h4><span data-dcnode-id="5326" instrument_node="">
</span></div><span data-dcnode-id="5324" instrument_node="">
</span><div class="modal-body" data-dcnode-id="5077"><span data-dcnode-id="5323" instrument_node="">
</span><p data-dcnode-id="5318"><em data-dcnode-id="5320"><strong data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">(Evidence strength – Grade B; Risk/burdens outweigh benefits)</span></strong></em><span data-dcnode-id="5319" instrument_node="">. The studies reviewed below under each disease state constitute Grade B evidence strength. Findings for each subgroup of studies were statistically and/or conceptually consistent, and any sources of bias were likely to result in increased reports of the disease state among vasectomized men compared to non-vasectomized men. Overall, there was no evidence that vasectomy constituted a risk factor for any of the listed conditions. The opinion of the Panel is that discussion of these disease states is not necessary as part of prevasectomy counseling.</span></p><p data-dcnode-id="5302"><em data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Coronary heart disease (CHD).</span></em><span data-dcnode-id="5315" instrument_node=""> Three case-control studies</span><sup data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">69-71</span></sup><span data-dcnode-id="5312" instrument_node=""> and ten comparative observational studies</span><sup data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">72-81</span></sup><span data-dcnode-id="5309" instrument_node=""> examined a possible association between history of vasectomy and coronary heart disease (CHD). A variety of CHD measures were reported (e.g., new diagnosis of CHD, CHD-related hospitalizations, angina, ischemic heart disease, myocardial infarctions), limiting the feasibility of pooling outcomes across studies. Twelve of fourteen studies reported no significant differences between vasectomized and non-vasectomized men in diagnosis of CHD, CHD symptoms, non-fatal myocardial infarction or fatal myocardial infarction. One study reported lower rates of ischemic heart disease among vasectomized men compared to non-vasectomized men (OR 0.7, 95% confidence interval 0.6-1.0).</span><sup data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">80</span></sup><span data-dcnode-id="5306" instrument_node=""> Only one study reported that vasectomized men were at higher risk of angina and CHD-related hospitalization than were non-vasectomized men;76 however, the findings from this study lack certainty because of the very small number of reported events in both groups. No study reported a significant relationship between years since vasectomy and CHD events, new diagnosis or prevalence when these studies controlled for key confounders such as age. The single study that reported on men with CHD risk factors (e.g., advanced age, cigarette smoking, elevated cholesterol, hypertension, family history) also found no significant relationship with vasectomy status.</span><sup data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">71</span></sup><span data-dcnode-id="5303" instrument_node=""> Overall, the body of evidence indicates that there is no association between CHD and vasectomy.</span></p><p data-dcnode-id="5291"><em data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">Stroke</span></em><span data-dcnode-id="5299" instrument_node="">. Five comparative cohort studies evaluated the relationship between vasectomy and stroke.</span><sup data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">72-75,</span></sup><sup data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">80</span></sup><span data-dcnode-id="5294" instrument_node=""> There were no significant differences in incidence or fatality rates between vasectomized and non-vasectomized men. There also was no relationship between time since vasectomy and risk of stroke.</span><sup data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">72-74</span></sup></p><p data-dcnode-id="5275"><em data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">Primary progressive aphasia (PPA) and other forms of dementia</span></em><span data-dcnode-id="5288" instrument_node="">. Only one small study has reported a potential link between vasectomy and dementia.</span><sup data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">82</span></sup><span data-dcnode-id="5285" instrument_node=""> This study reported that vasectomy may be a risk factor for PPA, a rare type of dementia. This small case control study has uncertain significance. Anti-sperm antibodies, which are the putative link between vasectomy and PPA, were not found to be associated with dementia or language ability in a more recent study.</span><sup data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">83</span></sup><span data-dcnode-id="5282" instrument_node=""> Further, a large epidemiologic study found no association between a history of vasectomy and several immune-related diseases.</span><sup data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">84</span></sup><span data-dcnode-id="5279" instrument_node=""> Other large epidemiologic studies of vasectomy have not looked specifically for evidence that vasectomy is a risk factor for dementia; nonetheless, there is no evidence (other than one small study</span><sup data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">82</span></sup><span data-dcnode-id="5276" instrument_node=""> of uncertain significance) that identifies an association between vasectomy and dementia. The opinion of the Panel is that clinicians do not need to routinely discuss PPA or other forms of dementia in pre-vasectomy counseling of patients because there is no convincing evidence that such a relationship exists.</span></p><p data-dcnode-id="5253"><em data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Hypertension.</span></em><span data-dcnode-id="5272" instrument_node=""> Four comparative cohort studies examined the relationship between vasectomy and hypertension.</span><sup data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">76,</span></sup><sup data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">79,</span></sup><sup data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">80,</span></sup><sup data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">85</span></sup><span data-dcnode-id="5263" instrument_node=""> Three studies reported no significant difference in frequency of hypertension in vasectomized men compared to non-vasectomized men.</span><sup data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">79,</span></sup><sup data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">80,</span></sup><sup data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">85</span></sup><span data-dcnode-id="5256" instrument_node=""> One study reported that vasectomized men were at lower risk for the development of hypertension and for the utilization of diuretics and betablockers than were non-vasectomized men.</span><sup data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">76</span></sup></p><p data-dcnode-id="5208"><em data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">Prostate cancer.</span></em><span data-dcnode-id="5250" instrument_node=""> Fourteen papers reporting on ten comparative cohort studies were retrieved in the literature search.</span><sup data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">73,</span></sup><sup data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">77,</span></sup><sup data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">86-97</span></sup><span data-dcnode-id="5243" instrument_node=""> Reports on only three studies indicated a statistically significant relationship between vasectomy and prostate cancer.</span><sup data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">87,</span></sup><sup data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">91,</span></sup><sup data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">96,</span></sup><sup data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">97</span></sup><span data-dcnode-id="5234" instrument_node=""> A meta-analysis of 7 cohort studies that met criteria for pooling was performed to further delineate the possible association of vasectomy and prostate cancer (Coulson 1993; Giovannucci Tosteson 1992, 1993; Hiatt 1994; Lynge 2002; Romero 2012; Sidney 1987, 1991; Siddiqui 2014).</span><sup data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">87-89</span></sup><sup data-dcnode-id="5230"><span data-dcnode-id="5231" instrument_node="">92-97</span></sup><span data-dcnode-id="5229" instrument_node=""> This analysis indicated that the relative risk of prostate cancer in vasectomized versus nonvasectomized men was statistically indistinguishable (Relative risk (RR) 1.07; 95% confidence interval (CI) 0.94 to 1.23, p=0.29). Twenty case-control studies were identified that evaluated the association of vasectomy and prostate cancer (Cossack 2014; Cox 2002; Emard 2001; Ganesh 2011; Hayes 1993; Hennis 2013; Holt 2008; Honda 1988; Hsing 1994; John 1995; Lesko 1999; Mazdak 2012; Mettlin 1990; Patel 2005; Platz 1997; Rosenberg 1990, 1994; Schwingle 2009; Stanford 1999; Zhu 1996);</span><sup data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">98-116</span></sup><span data-dcnode-id="5226" instrument_node=""> only four studies reported a statistically significant odds ratio for this relationship (Emard 2001; one of three control groups reported by Hsing 1994; Mettlin 1990; Rosenberg 1990). A meta-analysis of 13 case-control studies that met inclusion criteria for pooling</span><sup data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">98,</span></sup><sup data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">102,</span></sup><sup data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">104,</span></sup><sup data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">105,</span></sup><sup data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node="">107,</span></sup><sup data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">108,</span></sup><sup data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">110-112,</span></sup><sup data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">114-116</span></sup><span data-dcnode-id="5209" instrument_node=""> indicated that vasectomy was not statistically significantly associated with prostate cancer (pooled odds ratio – 1.7; 95% CI 0.98 to 1.16; p=0.12). The Panel concluded based on the results of the two meta-analyses that vasectomy is not associated with prostate cancer.</span></p><p data-dcnode-id="5122"><span data-dcnode-id="5207" instrument_node="">Of this group of 30 studies, fourteen reported an analysis that focused on whether age at vasectomy conferred differential risk of prostate cancer. Ten studies reported no relationship between age at vasectomy and prostate cancer (Hayes 1993; Holt 2008; John 1995; Lesko 1990; Mettlin 1990; Rosenberg 1994; Schwingl 2009; Sidney 1987, 1991; Stanford 1999; Zhu 1996);</span><sup data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">92,</span></sup><sup data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">93,</span></sup><sup data-dcnode-id="5201"><span data-dcnode-id="5202" instrument_node="">98,</span></sup><sup data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">102,</span></sup><sup data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">104,</span></sup><sup data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">107,</span></sup><sup data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">108,</span></sup><sup data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">110,</span></sup><sup data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">114-116</span></sup><span data-dcnode-id="5188" instrument_node=""> four reported at least one significant statistical test (Patel 2005; Platz 1997; Lynge 2002; Rohrmann 2005).</span><sup data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">89,</span></sup><sup data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">91,</span></sup><sup data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">111,</span></sup><sup data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">112</span></sup><span data-dcnode-id="5179" instrument_node=""> Eighteen studies analyzed whether years since vasectomy conferred differential prostate cancer risk. Thirteen studies concluded there was no relationship between years since vasectomy and prostate cancer;</span><sup data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">89,</span></sup><sup data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">92,</span></sup><sup data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">93,</span></sup><sup data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">98,</span></sup><sup data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">104,</span></sup><sup data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">105,</span></sup><sup data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">107,</span></sup><sup data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">108,</span></sup><sup data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">110,</span></sup><sup data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">114-116</span></sup><span data-dcnode-id="5158" instrument_node=""> five studies reported at least one statistically significant finding (Emard 2001; Giovannucci Tosteson 1992, 1993; Rohrmann 2005; Rosenberg 1990; Siddiqui 2014 ).</span><sup data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">87,</span></sup><sup data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">91,</span></sup><sup data-dcnode-id="5152"><span data-dcnode-id="5153" instrument_node="">96,</span></sup><sup data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">97,</span></sup><sup data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">100,</span></sup><sup data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">113</span></sup><span data-dcnode-id="5145" instrument_node=""> Thirteen studies reported an analysis based on prostate cancer stage. Nine studies reported no association between vasectomy and prostate cancer stage or grade;</span><sup data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">98,</span></sup><sup data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">102,</span></sup><sup data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">104,</span></sup><sup data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">107,</span></sup><sup data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">108,</span></sup><sup data-dcnode-id="5133"><span data-dcnode-id="5134" instrument_node="">114-116</span></sup><span data-dcnode-id="5132" instrument_node=""> four studies reported at least one statistically significant finding.</span><sup data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">91,</span></sup><sup data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">96,</span></sup><sup data-dcnode-id="5126"><span data-dcnode-id="5127" instrument_node="">113,</span></sup><sup data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">106</span></sup><span data-dcnode-id="5123" instrument_node=""> These subgroup analyses were not appropriate for meta-analysis given different data breakdowns across studies (i.e., different age breakdowns, years since vasectomy, and different methods of specifying prostate cancer lethality or stage) and the small sample sizes in some subgroups. Given the overwhelming majority of negative findings from these sub-analyses, however, the Panel interpreted these data to indicate that there is no association between age at vasectomy or years since vasectomy with differential prostate cancer risk, and that vasectomy does not predispose men to develop advanced or lethal prostate cancer.</span></p><p data-dcnode-id="5086"><em data-dcnode-id="5119"><span data-dcnode-id="5120" instrument_node="">Testicular Cancer. </span></em><span data-dcnode-id="5118" instrument_node="">Four case-control studies</span><sup data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">98,</span></sup><sup data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">118-120</span></sup><span data-dcnode-id="5113" instrument_node=""> and seven comparative observational studies</span><sup data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">73,</span></sup><sup data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">77,</span></sup><sup data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">89,</span></sup><sup data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">90,</span></sup><sup data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">94,</span></sup><sup data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">121,</span></sup><sup data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">122</span></sup><span data-dcnode-id="5098" instrument_node=""> investigated whether there is an association between vasectomy and testicular cancer. A meta-analysis conducted as part of the Panel's literature review for the case-control studies indicated no significant difference between groups in terms of the odds of being diagnosed with testicular cancer for vasectomized men compared with non-vasectomized men (Odds ratio (OR) 1.18; 95% CI 0.93-1.49). Outcomes reporting differences across comparative observational studies did not permit a pooled analysis, but all seven studies reported non-significant differences between vasectomized and non-vasectomized men, and in the three studies that reported incidence by group,</span><sup data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">73,</span></sup><sup data-dcnode-id="5094"><span data-dcnode-id="5095" instrument_node="">90,</span></sup><sup data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">94</span></sup><span data-dcnode-id="5091" instrument_node=""> incidence rates ranged from 0.02% to 0.11% across both groups. There was no association between history of vasectomy and testicular cancer stratified by years since vasectomy.</span><sup data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">90,</span></sup><sup data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">98</span></sup></p><p data-dcnode-id="5079"><em data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">Death</span></em><span data-dcnode-id="5083" instrument_node="">. There is only one reported death, which was not in the United States, due to vasectomy.</span><sup data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">62</span></sup><span data-dcnode-id="5080" instrument_node=""> Because the risk of death is very close to zero, the opinion of the Panel is that death due to vasectomy does not need to be discussed in preoperative counseling.</span></p><span data-dcnode-id="5078" instrument_node="">

</span><h4 data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">
                    Guideline Statement 4
                </span></h4><span data-dcnode-id="5059" instrument_node="">
</span><div data-dcnode-id="5052"><span data-dcnode-id="5058" instrument_node="">
</span><p data-dcnode-id="5054"><span data-dcnode-id="5057" instrument_node="">Prophylactic antimicrobials are not indicated for routine vasectomy unless the patient presents a high risk of infection. </span><em data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">Recommendation</span></em></p><span data-dcnode-id="5053" instrument_node="">
</span></div><span data-dcnode-id="5051" instrument_node="">

</span><h4 class="modal-title" data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">Discussion</span></h4><span data-dcnode-id="5035" instrument_node="">
</span></div><span data-dcnode-id="5033" instrument_node="">
</span><div class="modal-body" data-dcnode-id="4761"><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5022"><strong data-dcnode-id="5029"><em data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">(Evidence strength – Grade C; Risks/burdens outweigh benefits).</span></em></strong><span data-dcnode-id="5028" instrument_node=""> </span><a data-dcnode-id="5024" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/documents/education/clinical-guidance/Antimicrobial-Prophylaxis.pdf" onclick="_gaq.push(['_trackEvent', 'PDF', 'Download', 'documents/education/clinical-guidance/Antimicrobial-Prophylaxis.pdf']);" target="_blank"><span data-dcnode-id="5027" instrument_node="">The AUA Best Practice Policy on Urologic Surgery Antimicrobial Prophylaxis </span><span class="pdf" data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">[pdf]</span></span></a><span data-dcnode-id="5023" instrument_node=""> recommends that prophylactic antibiotics for open and laparoscopic surgery (including genital surgery) performed without entering the urinary tract are indicated only if risk factors are present. Risk factors include advanced age, anatomic anomalies of the urinary tract, poor nutritional status, smoking, chronic corticosteroid use, immunodeficiency, distant co-existent infection and prolonged hospitalization. The Panel affirms this recommendation and believes that diabetes is also a risk factor for post-operative infection. The opinion of the Panel is that the presence of one or more of these infection risk factors does not necessarily require the use of antimicrobial prophylaxis. When operating on certain patients who present with comorbidities associated with a particularly high risk of infection, the surgeon should consider the use of prophylactic antimicrobials.</span></p><p data-dcnode-id="5019"><strong data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">Additional Points for Preoperative Practice</span></strong></p><p data-dcnode-id="5015"><em data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">The minimum age requirement for vasectomy is the legal age of consent in the prevailing legal jurisdiction in which the procedure is performed.</span></em><span data-dcnode-id="5016" instrument_node=""> The prospective vasectomy patient must, at a minimum, be the legal age of consent according to relevant legal statutes. In addition, each surgeon should exercise clinical judgment to determine the appropriateness of performing a vasectomy on a particular patient. The patient's age, the number of children that the patient has and other factors that the surgeon's experience indicate may be associated with successful outcomes (e.g., patient satisfaction, absence of regret) should be taken into account in making this decision.</span></p><p data-dcnode-id="5011"><em data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">In the US, there is no requirement for spousal or partner involvement in preoperative consultation, but patients should be advised that partner or spousal involvement is desirable.</span></em><span data-dcnode-id="5012" instrument_node=""> Any consenting adult male may proceed with a vasectomy without consultation with his partner unless local laws stipulate otherwise. However, because the prospective vasectomy patient's decision affects the fertility options for both him and his partner or spouse, it is optimal that his partner should be included in the preoperative consultation and decision-making process.</span></p><p data-dcnode-id="5007"><em data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">Preoperative laboratory tests are not required for vasectomy patients unless the patient's medical history suggests that laboratory work may be necessary to assess the patient's suitability for the vasectomy procedure.</span></em><span data-dcnode-id="5008" instrument_node=""> In particular, preoperative coagulation tests should be considered if the patient has a history of liver disease, bleeding diatheses or is taking anticoagulants.</span></p><p data-dcnode-id="4992"><em data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">Absence from work. </span></em><span data-dcnode-id="5004" instrument_node="">A low-quality, limited amount of literature was available to address how much time men typically take off from work after vasectomy.</span><sup data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">25,</span></sup><sup data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">26,</span></sup><sup data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">52,</span></sup><sup data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">53,</span></sup><sup data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">123-135</span></sup><span data-dcnode-id="4993" instrument_node=""> Time off from work appears to be based on several factors, including type of job, day of the week of the procedure and patient preference. Many men took no time off work after vasectomy; others were absent from one to three days and sometimes more. For men who reported no time out of work, it was generally unclear if scheduled time off following the procedure had been pre-arranged prior to the vasectomy. Time lost from work varied considerably, and there may be cultural and financial reasons that explain the disparities. Insufficient information was provided to explore this hypothesis, however.</span></p><p data-dcnode-id="4989"><em data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">Additional Long-term Postoperative Complications and Outcomes:</span></em></p><p data-dcnode-id="4956"><strong data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">Epididymitis</span></strong><span data-dcnode-id="4986" instrument_node="">. Rates of epididymitis varied across studies. Some variability is likely the result of different definitions used for epididymitis. For example, most studies did not differentiate between infectious epididymitis and non-infectious "congestive" epididymitis. Bacterial epididymitis is often confused with pain caused by distention of the epididymal tubule due to back pressure below the vasectomy site or by epididymal sperm granuloma. Nevertheless, across the 36 available studies, rates of epididymitis were generally low. Fourteen studies reported rates ≤ 1 percent.</span><sup data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">33,</span></sup><sup data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">40,</span></sup><sup data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">55,</span></sup><sup data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">57,</span></sup><sup data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">128,</span></sup><sup data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">136-143</span></sup><span data-dcnode-id="4973" instrument_node=""> Most of the remaining studies reported rates ≤ 3 percent.</span><sup data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">30,</span></sup><sup data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">32,</span></sup><sup data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">46,</span></sup><sup data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">144-151</span></sup><span data-dcnode-id="4964" instrument_node=""> &nbsp;True bacterial epididymitis post-vasectomy was rare and ranged up to 1.5% in the available studies.</span><sup data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">137,</span></sup><sup data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">138,</span></sup><sup data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">148</span></sup><span data-dcnode-id="4957" instrument_node=""> The majority of studies compared vasectomy techniques, rather than using unvasectomized men for controls. The lack of an unvasectomized control group does not allow for a true estimate of the rate of these complications among vasectomized men; the rates presented here may be over-estimations.</span></p><p data-dcnode-id="4923"><strong data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">Sperm granuloma</span></strong><span data-dcnode-id="4953" instrument_node="">. The rate of formation of a symptomatic nodule (presumed to be a sperm granuloma or a suture granuloma if a ligature was used to occlude the transected testicular end of the vas) varies based on technique, but in the overwhelming majority of available studies it was diagnosed at rates &lt; 5% and was rarely symptomatic.</span><sup data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">33,</span></sup><sup data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">35-37,</span></sup><sup data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">39,</span></sup><sup data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">50,</span></sup><sup data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">55,</span></sup><sup data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">106,</span></sup><sup data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">136,</span></sup><sup data-dcnode-id="4937"><span data-dcnode-id="4938" instrument_node="">137,</span></sup><sup data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">139,</span></sup><sup data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">141,</span></sup><sup data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">142,</span></sup><sup data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">145,</span></sup><sup data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">150,</span></sup><sup data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">152-161</span></sup><span data-dcnode-id="4924" instrument_node=""> The occurrence of an asymptomatic inflammatory nodule at the vasectomy site is probably common, and this is not considered a complication of vasectomy. The true rate of nodule formation at the vasectomy site has not been identified. Some of these nodules, whether they are histological sperm granulomata or not, are initially painful but the acute pain spontaneously resolves in two to three months or less in most cases. Treatment for a painful nodule at the vasectomy site is symptomatic therapy with anti-inflammatory agents and analgesics if needed. Persistent pain at the vasectomy site is rare and may respond to excision and repeat vasectomy.</span></p><p data-dcnode-id="4915"><strong data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">Psychosocial outcomes</span></strong><span data-dcnode-id="4920" instrument_node="">.&nbsp;Relatively few studies examined psychological outcomes among vasectomized men. There is a paucity of high-quality, comparative observational studies reporting outcomes measured with validated instruments. In particular, data with applicability to men in the US or in other developed countries are sparse. Outcomes may vary by year of the study, geographic location, measurement tools used, selection of the study population, length of follow-up and other variables. It is thus impossible to draw firm conclusions on the effect of vasectomy on psychological function.</span><sup data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">125,</span></sup><sup data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">162-164</span></sup></p><p data-dcnode-id="4882"><strong data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">Sexual outcomes</span></strong><span data-dcnode-id="4912" instrument_node="">. Although there is a large number of studies examining sexual outcomes after vasectomy,</span><sup data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">45,</span></sup><sup data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">51,</span></sup><sup data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">53,</span></sup><sup data-dcnode-id="4904"><span data-dcnode-id="4905" instrument_node="">55,</span></sup><sup data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">59,</span></sup><sup data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">60,</span></sup><sup data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">123-126,</span></sup><sup data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">131,</span></sup><sup data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">134-136,</span></sup><sup data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">138,</span></sup><sup data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">144,</span></sup><sup data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">149,</span></sup><sup data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">152,</span></sup><sup data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">165-181</span></sup><span data-dcnode-id="4883" instrument_node=""> there are few studies with a comparison group and few studies that report data before and after the procedure. Thus, it is difficult to attribute changes in sexual satisfaction or function to the vasectomy itself. Outcomes relating to sexual function were heterogeneous, often poorly defined, and were usually assessed with instruments that were not validated.</span></p><p data-dcnode-id="4877"><span data-dcnode-id="4881" instrument_node="">Despite the relatively weak study designs, the available data with regard to sexual outcomes of vasectomy were consistent. Men generally resumed intercourse within two weeks of vasectomy. There was an increase in frequency or improvement in sexual satisfaction in half or more of patients and a decrease in frequency of intercourse and in sexual habits in only 5% of men across studies. A recent large population-based study confirmed the lack of sexual problems in men following vasectomy.</span><sup data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">182</span></sup><span data-dcnode-id="4878" instrument_node=""> Overall, it appears that for the vast majority of men who undergo vasectomy, there are no negative effects on sexual function. Many patients are concerned that vasectomy may cause changes in sexual function such as erectile dysfunction, reduced or absent orgasmic sensation, decreased ejaculate volume, reduced sexual interest, decreased genital sensation and/or diminished sexual pleasure. Patients may be reassured that there is no evidence that any of these problems are caused by vasectomy.</span></p><p data-dcnode-id="4831"><strong data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">Dissatisfaction and regret</span></strong><span data-dcnode-id="4874" instrument_node="">. Rates of dissatisfaction with vasectomy and/or regret at having undergone the procedure were in the range of 1-2% across a large number of studies, settings, and techniques.</span><sup data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">51,</span></sup><sup data-dcnode-id="4870"><span data-dcnode-id="4871" instrument_node="">59,</span></sup><sup data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">66,</span></sup><sup data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">124,</span></sup><sup data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">125,</span></sup><sup data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">127,</span></sup><sup data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">134,</span></sup><sup data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">135,</span></sup><sup data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">137,</span></sup><sup data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">145,</span></sup><sup data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">147,</span></sup><sup data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">157,</span></sup><sup data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">167-169,</span></sup><sup data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">173,</span></sup><sup data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">175-178,</span></sup><sup data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">180,</span></sup><sup data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">181,</span></sup><sup data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">183-186</span></sup><span data-dcnode-id="4837" instrument_node=""> Eighty to 100% of vasectomized men would recommend the procedure to others. In the few studies that assessed reasons for dissatisfaction or regret, the most commonly reported reason was the desire for more children.</span><sup data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">127,</span></sup><sup data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">185</span></sup><span data-dcnode-id="4832" instrument_node=""> These data highlight the importance of thoughtful pre-vasectomy counseling.</span></p><p data-dcnode-id="4824"><strong data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">Endocrine outcomes</span></strong><span data-dcnode-id="4828" instrument_node="">. The literature review revealed no evidence of significant effects of vasectomy on testosterone, follicle-stimulating hormone (FSH), luteinizing hormone (LH), lipids (e.g., serum total cholesterol, low-density lipoproteins, high-density lipoproteins, triglycerides) or bone mineral density</span><sup data-dcnode-id="4826"><span data-dcnode-id="4827" instrument_node="">187-194</span></sup><span data-dcnode-id="4825" instrument_node=""> at follow-up durations ranging from one to 21 years.&nbsp;</span></p><p data-dcnode-id="4814"><strong data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">Urolithiasis</span></strong><span data-dcnode-id="4821" instrument_node="">. One low-quality study reported on urolithiasis rates of vasectomized compared to non-vasectomized men.</span><sup data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">195</span></sup><span data-dcnode-id="4818" instrument_node=""> The odds ratio of urolithiasis in vasectomized versus nonvasectomized men &lt; 45 years of age was 1.9 (95% CI, 1.2-3.1); the OR was not statistically significant for men &gt; 45 years of age. The OR was highest in men zero to four years post- vasectomy, compared to men without vasectomy.</span><sup data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">195</span></sup><span data-dcnode-id="4815" instrument_node=""> In the absence of more definitive data or other confirmatory studies, it remains unclear whether there is a relation between vasectomy and urolithiasis.</span></p><p data-dcnode-id="4791"><strong data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">Immunologic outcomes</span></strong><span data-dcnode-id="4811" instrument_node="">. A limited literature was available on the incidence and relevance of anti-sperm antibodies (ASAs) post-vasectomy.</span><sup data-dcnode-id="4809"><span data-dcnode-id="4810" instrument_node="">196-208</span></sup><span data-dcnode-id="4808" instrument_node=""> Most studies are based on measurement techniques which are no longer used. ASAs were rarely present prior to vasectomy and a number of studies demonstrated the appearance of sperm agglutinins and/or immobilizing antibodies in serum after vasectomy.</span><sup data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">201-204,</span></sup><sup data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">207,</span></sup><sup data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">209</span></sup><span data-dcnode-id="4801" instrument_node=""> Few of these studies correlated the presence or titer of such antibodies with pregnancy outcome after vasectomy reversal. One such study showed the presence of such antibodies in the seminal plasma of only 4% of men after vasectomy and the appearance of sperm agglutinins in the seminal plasma of 10 of 29 men after vasectomy reversal.</span><sup data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">208</span></sup><span data-dcnode-id="4798" instrument_node=""> An additional study also showed that pregnancy occurred in the wives of 11 of 13 men without seminal plasma sperm agglutinins after vasovasostomy compared to only 1 of 7 men with seminal plasma sperm agglutinins.</span><sup data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">206</span></sup><span data-dcnode-id="4795" instrument_node=""> To the contrary, one study showed no statistically significant difference in the level of serum sperm agglutinating or immobilizing antibodies one year after vasectomy reversal between 17 men whose partners had become pregnant and 18 men whose partners had not yet become pregnant.</span><sup data-dcnode-id="4793"><span data-dcnode-id="4794" instrument_node="">209</span></sup><span data-dcnode-id="4792" instrument_node=""> These investigators found low to moderate titers of immobilizing or agglutinating antisperm antibodies in the seminal plasma of 5 of 25 men one year after vasectomy reversal; one of these five men had established a pregnancy. Studies pertaining to the influence of antisperm antibodies on pregnancy rates after vasectomy reversal are rare. The precise prevalence of impaired fertility due to anti-sperm antibodies is unknown.</span></p><p data-dcnode-id="4786"><span data-dcnode-id="4790" instrument_node="">In a review of this topic, one study concluded that the most rigorous studies have not proven a cause and effect between abnormal immune parameters, such as the presence of antisperm antibodies, and impaired fertility and noted that there is wide variation and inconsistency regarding this association, depending upon which test(s) are employed, the study methodology used and the patient population under study.</span><sup data-dcnode-id="4788"><span data-dcnode-id="4789" instrument_node="">201</span></sup><span data-dcnode-id="4787" instrument_node=""> That same study also concluded that there is no universal agreement regarding which method of anti-sperm antibody test should be used or the proper treatment if anti-sperm antibodies (ASA) are detected. The opinion of the Panel is that, after vasectomy, impaired fertility due to anti-sperm antibodies is infrequent and that the presence of serum antisperm antibodies should not be considered a deterrent to vasectomy reversal.</span></p><p data-dcnode-id="4772"><strong data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">Testicular changes after vasectomy</span></strong><span data-dcnode-id="4783" instrument_node="">. Data are sparse on the effect of vasectomy on testicular histology and on pathologic changes following vasectomy. The available studies suggest that there may be significant post-vasectomy pathological changes in testes.</span><sup data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">211,</span></sup><sup data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">212</span></sup><span data-dcnode-id="4778" instrument_node=""> Electron microscopy revealed that interstitial fibrosis was present in the testis of 23% (p&lt;0.01) of men following vasectomy and that there was a significant correlation (p&lt;0.01) between these changes and fertility in men who underwent a successful vasectomy reversal as defined by sperm in the ejaculate.</span><sup data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">211</span></sup><span data-dcnode-id="4775" instrument_node=""> These testicular changes were not associated with antisperm antibody status as measured by the indirect immunobead assay.</span><sup data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">212</span></sup></p><p data-dcnode-id="4763"><strong data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">Death as a result of vasectomy</span></strong><span data-dcnode-id="4769" instrument_node="">. The literature review found no reports of death as a result of vasectomy in contemporary American urological practice. There is one report of death after vasectomy due to Fournier's gangrene. This case occurred in Europe and was reported in 1992.</span><sup data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">62</span></sup><span data-dcnode-id="4766" instrument_node=""> In addition, a large cohort study did not show any association between overall mortality and vasectomy.</span><sup data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">97</span></sup></p><span data-dcnode-id="4762" instrument_node="">
</span></div><span data-dcnode-id="4760" instrument_node="">

</span><a class="anchor" data-dcnode-id="4745" data-feathr-click-track="true" name="x3375"></a><span data-dcnode-id="4744" instrument_node="">
</span><h3 data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">
                Techniques for Local Anesthesia
            </span></h3><span data-dcnode-id="4741" instrument_node="">
</span><div data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">
</span></div><span data-dcnode-id="4738" instrument_node="">
</span><div data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">
</span></div><span data-dcnode-id="4735" instrument_node="">
</span><div data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">
</span></div><span data-dcnode-id="4732" instrument_node="">
</span><div data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">
</span></div><span data-dcnode-id="4729" instrument_node="">
</span><h4 data-dcnode-id="4727"><span data-dcnode-id="4728" instrument_node="">
                    Guideline Statement 5
                </span></h4><span data-dcnode-id="4726" instrument_node="">
</span><div data-dcnode-id="4719"><span data-dcnode-id="4725" instrument_node="">
</span><p data-dcnode-id="4721"><span data-dcnode-id="4724" instrument_node="">Vasectomy should be performed with local anesthesia with or without oral sedation. If the patient declines local anesthesia or if the surgeon believes that local anesthesia with or without oral sedation will not be adequate for a particular patient, then vasectomy may be performed with intravenous sedation or general anesthesia.</span><em data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node=""> Expert Opinion</span></em></p><span data-dcnode-id="4720" instrument_node="">
</span></div><span data-dcnode-id="4718" instrument_node="">
</span><p data-dcnode-id="4713"><span data-dcnode-id="4717" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="4715" data-feathr-click-track="true" data-target="#x3364" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="4716" instrument_node="">Discussion</span></a><span data-dcnode-id="4714" instrument_node="">
</span></p><span data-dcnode-id="4712" instrument_node="">
</span><div class="modal fade" data-dcnode-id="4614" id="x3364" role="dialog"><span data-dcnode-id="4711" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="4616"><span data-dcnode-id="4710" instrument_node="">
</span><div class="modal-content" data-dcnode-id="4618"><span data-dcnode-id="4709" instrument_node="">
</span><div class="modal-header" data-dcnode-id="4701"><span data-dcnode-id="4708" instrument_node="">
</span><button class="close" data-dcnode-id="4706" data-dismiss="modal" type="button"><span data-dcnode-id="4707" instrument_node="">×</span></button><span data-dcnode-id="4705" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">Discussion</span></h4><span data-dcnode-id="4702" instrument_node="">
</span></div><span data-dcnode-id="4700" instrument_node="">
</span><div class="modal-body" data-dcnode-id="4626"><span data-dcnode-id="4699" instrument_node="">
</span><p data-dcnode-id="4691"><span data-dcnode-id="4698" instrument_node="">Vasectomy can be safely performed in almost all patients using local anesthesia alone. Occasionally adjunctive oral or intravenous sedation may be optimal or necessary for the few patients who are unable to tolerate vasectomy under local anesthesia alone. For the rare patient in whom preoperative examination suggests that vas isolation will be particularly difficult and in whom oral or intravenous sedation is unlikely to be sufficient for patient comfort, general anesthesia may be necessary. Direct topical application of anesthetic cream at the vasectomy site in addition to standard injection of local anesthesia also may be used. Several small studies have shown that topical application of anesthetic cream before local injection of anesthetic may reduce pain associated with injection of local anesthetic agents.</span><sup data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">213-215</span></sup><span data-dcnode-id="4695" instrument_node=""> One additional study showed no decrease in intraoperative pain when topical anesthetic cream was used.</span><sup data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">216</span></sup><span data-dcnode-id="4692" instrument_node=""> The opinion of the Panel is that there is uncertainty regarding whether the topical application of anesthetic cream reliably reduces pain; the decision regarding the use of anesthetic cream should be left to the judgment of the individual practitioner. The topical cream should be applied by a health care professional rather than by the patient to prevent excessive application and risk of toxicity.</span></p><p data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">Practitioners are cautioned that topical anesthetic cream should not be the sole source of local anesthesia for the performance of vasectomy. Infiltration of local anesthetic agent into the skin and perivasal tissue is always necessary prior to performance of a vasectomy, regardless of whether topical anesthetic cream is used.</span></p><p data-dcnode-id="4686"><em data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">Other Important Points of Technique for Local Anesthesia.</span></em></p><p data-dcnode-id="4679"><strong data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">Needle size</span></strong><span data-dcnode-id="4683" instrument_node="">. In the opinion of the Panel, the smallest available needle should be used for the injection of local anesthesia because small gauge needles typically produce less pain than larger gauge needles. In the Panel's experience, the optimal range of needle sizes is 25 to 32 gauge. One study evaluated patient visual analog scale (VAS) scores in response to blinded forearm intradermal injection with 25 gauge vs. 30 gauge needles.</span><sup data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">217</span></sup><span data-dcnode-id="4680" instrument_node=""> Mean VAS score was 32mm for the 25 gauge needle compared to 25mm for the 30 gauge needle. Although this difference was statistically significant (p&lt;0.05), it is not clear that the difference represents a clinically-meaningful difference in patient pain experience. However, these data do indicate that the pain associated with needle diameters in this range is minor. These data are in agreement with the Panel's opinion that needles between 25 and 32 gauge should be utilized for local infiltration and spermatic cord block to minimize patient pain. Patients may be told that the anesthetic often takes effect within one to three seconds. The majority of members of the panel feel that the use of 30 or 32 gauge needles for injection of the local anesthetic is associated with less pain than occurs with the use of larger needles.</span></p><p data-dcnode-id="4669"><strong data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">Pneumatic injector</span></strong><span data-dcnode-id="4676" instrument_node="">. A pneumatic injector, also known as a jet or no needle device, has been used to deliver anesthetic agent transcutaneously. However, it is not clear that intra-operative pain is reduced by this technique compared to standard injection technique. In one study, the mean VAS score for initial pain after pneumatic injections was 15.6 mm compared to 21.2 mm with needle injection (on a 0 to 100 mm scale). This difference was statistically significant (p=0.029) but may not be clinically meaningful given that VAS scores were low for both techniques.</span><sup data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">218</span></sup><span data-dcnode-id="4673" instrument_node=""> Furthermore, the pain during the remainder of the procedure was 16.8 mm versus 18.6 mm respectively.</span><sup data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">218</span></sup><span data-dcnode-id="4670" instrument_node=""> These differences were not statistically significant.&nbsp;</span></p><p data-dcnode-id="4664"><span data-dcnode-id="4668" instrument_node="">In a separate cohort study, the mean VAS scores were reported for three separate procedures: 33 mm for local infiltration, 22 mm for no-needle pneumatic injector and 17 mm for local infiltration and cord block. The VAS score differences for the initial injection were significantly different between local infiltration and local infiltration with cord block and between local infiltration and pneumatic injection, but there were no differences for the VAS scores during the remainder of the procedure.</span><sup data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">219</span></sup><span data-dcnode-id="4665" instrument_node=""> Overall, the opinion of the Panel is that it is unclear whether use of a pneumatic injector reliably reduces pain to a clinically significant extent; this decision is left to the judgment of the individual practitioner. Pneumatic injection may be especially suitable for needle-phobic men.</span></p><p data-dcnode-id="4654"><strong data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">Addition of buffer, epinephrine or corticosteroids to the local anesthetic agent or a topical cutaneous spray</span></strong><span data-dcnode-id="4661" instrument_node="">. There are insufficient data to know whether addition of buffer, epinephrine or corticosteroids to the local anesthetic agent or topical cutaneous spray reduces pain during vasectomy or reduces postoperative inflammation. Therefore, the addition of these agents is not endorsed by the Panel. Buffers have been added to local anesthetic agents to reduce pain during intradermal injections of various types but not specifically for vasectomy. For example, commercially available xylocaine 1% is buffered to a pH of 6.7 (range 5.5-7.2).</span><sup data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">220</span></sup><span data-dcnode-id="4658" instrument_node=""> In a blinded study, VAS scores for buffered solutions were 18.3 mm and for fresh solutions were 23.5 mm (p=0.05).</span><sup data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">221</span></sup><span data-dcnode-id="4655" instrument_node=""> Although VAS scores were lower for buffered solutions, the difference may not be clinically significant. In the absence of data obtained specifically for vasectomy, the Panel does not endorse the addition of these substances to anesthetic agents.</span></p><table border="1" cellpadding="0" cellspacing="0" class="table table-bordered table-striped" data-dcnode-id="4628" style="width: 590px;"><tbody data-dcnode-id="4629"><tr data-dcnode-id="4648"><th data-dcnode-id="4649" valign="top" width="590"><p align="center" data-dcnode-id="4650"><span data-dcnode-id="4653" instrument_node="">Table 3: Definitions for</span><br data-dcnode-id="4652"><span data-dcnode-id="4651" instrument_node=""> Vas Isolation Techniques</span></p></th></tr><tr data-dcnode-id="4642"><td data-dcnode-id="4643" valign="top" width="590"><p data-dcnode-id="4644"><strong data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">Conventional Vasectomy (CV)</span></strong><span data-dcnode-id="4645" instrument_node="">: One midline or bilateral scrotal incisions are made with a scalpel. Incisions are usually 1.5-3.0 cm long. No special instruments are used. The vas usually is grasped with a towel clip or an Allis forceps. The area of dissection around the vas usually is larger than occurs with MIV techniques.</span></p></td></tr><tr data-dcnode-id="4636"><td data-dcnode-id="4637" valign="top" width="590"><p data-dcnode-id="4638"><strong data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">No-Scalpel Vasectomy (NSV)</span></strong><span data-dcnode-id="4639" instrument_node="">: A minimally invasive method that uses specific instruments and sequential specific steps. Alteration of any of the specific steps does not allow the surgical technique to be called NSV. The NSV incision is usually less than 10 mm, and no skin sutures are needed. Two special instruments (vas ring clamp and vas dissector) are essential to NSV. The area of dissection around the vas is kept to a minimum.</span></p></td></tr><tr data-dcnode-id="4630"><td data-dcnode-id="4631" valign="top" width="590"><p data-dcnode-id="4632"><strong data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">Minimally Invasive Vasectomy (MIV)</span></strong><span data-dcnode-id="4633" instrument_node="">: Methods with minor variations of the NSV technique are defined as MIV methods. Skin openings of ≤10 mm are typical and special instruments such as the vas ring clamp and vas dissector that are used for the NSV technique or similar special instruments are commonly used. The area of dissection around the vas is kept to a minimum.</span></p></td></tr></tbody></table><span data-dcnode-id="4627" instrument_node="">
</span></div><span data-dcnode-id="4625" instrument_node="">
