</span><a class="anchor" data-dcnode-id="4610" data-feathr-click-track="true" name="x3376"></a><span data-dcnode-id="4609" instrument_node="">
</span><h3 data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">
                Vas Isolation
            </span></h3><span data-dcnode-id="4606" instrument_node="">
</span><div data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">
</span></div><span data-dcnode-id="4603" instrument_node="">
</span><div data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">
</span></div><span data-dcnode-id="4600" instrument_node="">
</span><div data-dcnode-id="4494"><span data-dcnode-id="4599" instrument_node="">
</span><p data-dcnode-id="4596"><strong data-dcnode-id="4597"><span data-dcnode-id="4598" instrument_node="">Background Information About Vas Isolation</span></strong></p><p data-dcnode-id="4586"><em data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">Vas Isolation Techniques. </span></em><span data-dcnode-id="4593" instrument_node="">&nbsp;There are two key surgical steps in performing vasectomy: 1) </span><strong data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">isolation</span></strong><span data-dcnode-id="4590" instrument_node=""> of the vas and 2) </span><strong data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">occlusion</span></strong><span data-dcnode-id="4587" instrument_node=""> of the vas. The risks of intraoperative and early postoperative pain, bleeding and infection are related mainly to the method of vas isolation. The success and failure rates of vasectomy are related to the method of vas occlusion (see next section titled Vas Occlusion Techniques).&nbsp; Methods of vas isolation include Conventional Vasectomy (CV) and Minimally-Invasive Vasectomy (MIV), which includes no-scalpel vasectomy (NSV). For definitions, see Table 3 above.</span></p><p data-dcnode-id="4582"><strong data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">Conventional Vasectomy (CV)</span></strong><span data-dcnode-id="4583" instrument_node="">. CV technique was the most common technique before the introduction of MIV techniques and special vasectomy instruments. CV is performed by making either one midline incision or bilateral scrotal incisions using a scalpel. Incisions are usually from 1.5 - 3 cm. No special instruments are used during CV, and the vas usually is grasped with a towel clip or an Allis forceps. During CV, the area of scrotal dissection usually is much larger than occurs with MIV techniques.</span></p><p data-dcnode-id="4570"><strong data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">No-Scalpel Vasectomy (NSV)</span></strong><span data-dcnode-id="4579" instrument_node="">. The no-scalpel vasectomy technique was developed in 1974 in China by Dr. Li Shunqiang to make vasectomy a more acceptable method of contraception. The NSV isolation technique was the first minimally-invasive technique for vasectomy and is described in detail in text and with diagrams by Li et al. (1991).</span><sup data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">222</span></sup><span data-dcnode-id="4576" instrument_node=""> An excellent description of NSV technique also can be found in </span><a data-dcnode-id="4574" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.engenderhealth.org/files/pubs/family-planning/no-scalpel.pdf" onclick="_gaq.push(['_trackEvent', 'PDF', 'Download', 'http://www.engenderhealth.org/files/pubs/family-planning/no-scalpel.pdf']);" target="_blank"><span data-dcnode-id="4575" instrument_node="">training materials prepared by EngenderHealth</span></a><sup data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">223</span></sup><span data-dcnode-id="4571" instrument_node="">. Note that the NSV technique is a method of vas isolation and does not specify a method of vas occlusion. For a detailed description of the NSV technique, see Appendix A.</span></p><p data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">Strictly speaking, to be called a Li no-scalpel vas isolation technique, all of the following surgical steps must be observed:</span></p><ol data-dcnode-id="4549"><li data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">Use vas ring clamp and vas dissector, both of which have been specially designed for no-scalpel vasectomy</span></li><li data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">Apply the vas ring clamp around the vas, perivasal tissue and overlying skin before making the skin opening</span></li><li data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">Create a skin opening of ≤10 mm by piercing the skin with the vas dissector followed by spreading the tissue overlying the vas with the vas dissector to expose the bare anterior wall of the vas</span></li><li data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">Pierce the bare vas with one tip of the vas dissector</span></li><li data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">Then use a supination maneuver to elevate the vas above the skin opening</span></li><li data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">Re-grasp a partial thickness of the vas with the vas ring clamp rather than encircling the vas with the ring clamp</span></li><li data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Complete the posterior dissection with the vas dissector to isolate the vas from surrounding perivasal tissue and vessels</span></li><li data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Divide the vas, with or without excision of a vas segment, and then occlude the vas with the surgeon's preferred technique for vas occlusion</span></li><li data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">Leave the skin opening unsutured except in rare cases that may require a skin suture</span></li></ol><p data-dcnode-id="4545"><span data-dcnode-id="4548" instrument_node="">If all of these specific steps are not used, then the vasectomy should be called a minimally-invasive vasectomy (MIV) rather than a no-scalpel vas isolation technique. As an example, if the only difference is creation of a skin opening ≤10 mm with a scalpel before applying the vas ring clamp around the vas, the technique is labeled as an MIV technique because each exact step of the NSV technique was not used.</span><sup data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">211</span></sup></p><p data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">When difficulty in isolating the vas is encountered or anticipated, as may be expected with a history of surgery for testicular maldescent or perivasal scarring from a previous operative procedure, a larger incision similar to the incision typically used for CV may be needed. Even in these more difficult vasectomies, the vas ring clamp and vas dissector facilitate the procedure and minimize tissue dissection.</span></p><p data-dcnode-id="4535"><strong data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">Minimally-Invasive Vasectomy (MIV)</span></strong><span data-dcnode-id="4540" instrument_node="">. The term "minimally invasive vasectomy" includes any vas isolation procedure, including the NSV technique, which incorporates two key surgical principles.</span><sup data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">39,</span></sup><sup data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">224</span></sup></p><p data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">1. Small (≤10 mm) openings in the scrotal skin, either as a single midline opening or as bilateral openings</span></p><p data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">2. Minimal dissection of the vas and perivasal tissues, which is facilitated by using a vas ring clamp and vas dissector or similar special instruments</span></p><p data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">The three finger technique described in Appendix A for immobilizing the vas or for making the skin opening has been modified slightly by various surgeons using MIV techniques other than the strict NSV technique. These variations include the use of the thumb rather than the middle finger behind the scrotum and other modifications of finger placement, bilateral skin openings or scrotal skin opening(s) made before grasping the vas with the vas ring clamp.&nbsp;</span></p><p data-dcnode-id="4517"><span data-dcnode-id="4528" instrument_node="">MIV isolation techniques utilize either an open access approach or a closed access approach. In the open access approach, the skin opening(s) are made before the vas ring clamp or similar instrument is applied to the vas. In the closed access approach, the vas ring clamp or similar instrument is applied around the vas, perivasal tissue and overlying skin before the skin opening(s) is (are) made. The vas ring clamp and vas dissector are not required to perform MIV but are always very helpful.</span><sup data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">126</span></sup><span data-dcnode-id="4525" instrument_node=""> Other small or specially designed instruments may be used successfully to isolate the vas.</span><sup data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">39,</span></sup><sup data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">126,</span></sup><sup data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">224</span></sup><span data-dcnode-id="4518" instrument_node=""> Open access is sometimes necessary for men with thick scrotal skin or other anatomy that makes closed access difficult or impossible.</span></p><p data-dcnode-id="4513"><em data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">Other Important Points of Surgical Technique</span></em><span data-dcnode-id="4514" instrument_node="">.</span></p><p data-dcnode-id="4506"><strong data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">Single midline or bilateral incisions</span></strong><span data-dcnode-id="4510" instrument_node="">. The use of one midline or bilateral scrotal skin openings should be based on the surgeon's preference. One large observational study (N=1,800) compared single incision to double incision procedures. Fewer adverse events were reported with a single incision and the procedure time was reduced, but no statistical testing was performed.</span><sup data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">225</span></sup><span data-dcnode-id="4507" instrument_node=""> The Panel opinion is that there is no clear advantage to making one or two skin openings. The choice between midline and bilateral incisions should be left to the clinical judgment of the surgeon performing vasectomy.</span></p><p data-dcnode-id="4502"><strong data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">Site of incision(s)</span></strong><span data-dcnode-id="4503" instrument_node="">. For a midline approach, the scrotal skin opening should be made just below the penoscrotal junction or midway between the penoscrotal junction and the top of the testes. For a lateral approach, some experts recommend that the scrotal skin opening should be made at the level of the penoscrotal junction or higher.Scrotal skin openings for vasectomy should be positioned to provide access to the straight portion of the vas. Higher openings allow better access to the straight portion of the vas, make it easier to perform mucosal cautery and create longer vas remnants on the testicular side of the vasectomy. The opinion of the Panel is that occlusion of the vas is more easily performed in the straight portion than in the convoluted portion of the vas. In addition, occlusion of the vas in its straight portion may facilitate the performance of the anastomosis during vasovasostomy if reversal of the vasectomy is requested later.</span></p><p data-dcnode-id="4496"><strong data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Insuring that one vas is not occluded twice</span></strong><span data-dcnode-id="4499" instrument_node="">. For a single-incision vasectomy, the surgeon should ensure that the same vas is not isolated and occluded in two locations, leaving the other vas unoccluded. A gentle tug on each vas during isolation will cause the ipsilateral testis to move.</span><sup data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">226</span></sup></p><span data-dcnode-id="4495" instrument_node="">
</span></div><span data-dcnode-id="4493" instrument_node="">
</span><div data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">
</span></div><span data-dcnode-id="4490" instrument_node="">
</span><h4 data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">
                    Guideline Statement 6
                </span></h4><span data-dcnode-id="4487" instrument_node="">
</span><div data-dcnode-id="4480"><span data-dcnode-id="4486" instrument_node="">
</span><p data-dcnode-id="4482"><span data-dcnode-id="4485" instrument_node="">Isolation of the vas should be performed using a minimally-invasive vasectomy (MIV) technique such as the no-scalpel vasectomy (NSV) technique or other MIV technique.</span><em data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node=""> Standard </span></em></p><span data-dcnode-id="4481" instrument_node="">
</span></div><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4474"><span data-dcnode-id="4478" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="4476" data-feathr-click-track="true" data-target="#x3363" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="4477" instrument_node="">Discussion</span></a><span data-dcnode-id="4475" instrument_node="">
</span></p><span data-dcnode-id="4473" instrument_node="">
</span><div class="modal fade" data-dcnode-id="4388" id="x3363" role="dialog"><span data-dcnode-id="4472" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="4390"><span data-dcnode-id="4471" instrument_node="">
</span><div class="modal-content" data-dcnode-id="4392"><span data-dcnode-id="4470" instrument_node="">
</span><div class="modal-header" data-dcnode-id="4462"><span data-dcnode-id="4469" instrument_node="">
</span><button class="close" data-dcnode-id="4467" data-dismiss="modal" type="button"><span data-dcnode-id="4468" instrument_node="">×</span></button><span data-dcnode-id="4466" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">Discussion</span></h4><span data-dcnode-id="4463" instrument_node="">
</span></div><span data-dcnode-id="4461" instrument_node="">
</span><div class="modal-body" data-dcnode-id="4400"><span data-dcnode-id="4460" instrument_node="">
</span><p data-dcnode-id="4432"><strong data-dcnode-id="4456"><em data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">(Evidence strength – Grade B; Benefits outweigh risks/burdens)</span></em><span data-dcnode-id="4457" instrument_node="">. No-Scalpel Vas Isolation Technique.</span></strong><span data-dcnode-id="4455" instrument_node=""> The available evidence indicates that a minimally-invasive vas isolation procedure results in less discomfort during the procedure and in fewer postoperative complications. One large randomized controlled trial,</span><sup data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">59</span></sup><span data-dcnode-id="4452" instrument_node=""> one comparative study,</span><sup data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">227</span></sup><span data-dcnode-id="4449" instrument_node=""> one observational study,</span><sup data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">222</span></sup><span data-dcnode-id="4446" instrument_node=""> and two systematic reviews</span><sup data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">228,</span></sup><sup data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">229</span></sup><span data-dcnode-id="4441" instrument_node=""> concluded that the NSV technique of vas isolation has fewer early postoperative complications than CV. The randomized trial was a multi-center study at eight sites and included 1,429 men.</span><sup data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">59</span></sup><span data-dcnode-id="4438" instrument_node=""> One study found significantly fewer hematomas and infections, significantly less pain and a more rapid resumption of sexual activity among men who had an NSV procedure. The comparative study included 1,203 vasectomies.</span><sup data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">227</span></sup><span data-dcnode-id="4435" instrument_node=""> While not a randomized trial, the 28 surgeons in the study were all experienced and had participated in previous vasectomy "festivals" in Thailand. One study found that the men who had the NSV technique had significantly fewer hematomas and infections, with an overall complication rate of 0.4/100 procedures for the NSV technique compared with 3.1/100 for conventional vasectomy (p&lt;0.001). This study found that NSV took less time than CV.</span><sup data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">227</span></sup></p><p data-dcnode-id="4406"><strong data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">Other MIV Techniques</span></strong><span data-dcnode-id="4429" instrument_node="">. Reports on other MIV techniques have proposed special instruments other than the vas ring clamp and vas dissector</span><sup data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">39,</span></sup><sup data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">123,</span></sup><sup data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">126,</span></sup><sup data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">224</span></sup><span data-dcnode-id="4420" instrument_node=""> or alternative ways to use the vas ring clamp and vas dissector.</span><sup data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">231</span></sup><span data-dcnode-id="4417" instrument_node=""> The rate of intraoperative and early postoperative complications appear similar to those of the NSV technique.</span><sup data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">39,</span></sup><sup data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">123,</span></sup><sup data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">126,</span></sup><sup data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">224,</span></sup><sup data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">230</span></sup></p><p data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">When any MIV technique is used, the skin opening may be closed with a suture or left open at the end of the procedure. With a skin opening of ≤ 10 mm, sutures are usually not needed for wound closure. The choice of suturing the skin or leaving it open should be based on individual operative conditions and the surgeon's experience.</span></p><p data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">The body of evidence showing the superiority of MIV techniques (reduced intraoperative discomfort and reduced postoperative complications) compared to conventional vasectomy techniques is given Grade B for strength of evidence because it is comprised of a good quality RCT and several systematic reviews in addition to a body of observational studies. Overall, the findings across reports were consistent. It is the strong opinion of the Panel members that isolation of the vas with an MIV technique is superior to CV isolation procedures.</span></p><span data-dcnode-id="4401" instrument_node="">
</span></div><span data-dcnode-id="4399" instrument_node="">

</span><a class="anchor" data-dcnode-id="4384" data-feathr-click-track="true" name="x3377"></a><span data-dcnode-id="4383" instrument_node="">
</span><h3 data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">
                Vas Occlusion
            </span></h3><span data-dcnode-id="4380" instrument_node="">
</span><div data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">
</span></div><span data-dcnode-id="4377" instrument_node="">
</span><div data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">
</span></div><span data-dcnode-id="4374" instrument_node="">
</span><div data-dcnode-id="4220"><span data-dcnode-id="4373" instrument_node="">
</span><p data-dcnode-id="4370"><strong data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">Background Information about Vas Occlusion</span></strong></p><p data-dcnode-id="4366"><span data-dcnode-id="4369" instrument_node="">In the US, virtually all techniques of vasectomy use complete division of the vas with or without excision of a segment of the vas. Following division of the vas, the divided vasal ends may be separated by one of several techniques and/or the flow of fluid and sperm within the vas lumen may be blocked by one of several methods. There is only one technique of vas occlusion, non-divisional extended electrocautery or the Marie Stopes International technique (see below), which does not use division of the vas. This technique is rarely, if ever, used in the United States. Therefore, in this guideline, vas occlusion means that the vas has been completely divided with or without excision of a vas segment, unless otherwise noted. Further, in this document, division/excision (D/E) means that the vas is divided and that a segment may or may not be excised. </span><strong data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">The panel found no consistent evidence indicating that division with excision of a short vas segment (&lt; 4 cm) is preferable to division without excision of a vas segment.</span></strong></p><p data-dcnode-id="4356"><strong data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Vasectomy effectiveness</span></strong><span data-dcnode-id="4363" instrument_node=""> can be defined as either </span><strong data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">contraceptive effectiveness</span></strong><span data-dcnode-id="4360" instrument_node="">, which is the absence of pregnancy, or </span><strong data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">occlusive effectiveness</span></strong><span data-dcnode-id="4357" instrument_node="">, which is demonstrated by the finding on PVSA of azoospermia or of RNMS, as defined in a subsequent section of this Guideline. For definitions, see Table 4.</span></p><table border="1" cellpadding="0" cellspacing="0" class="table table-bordered table-striped" data-dcnode-id="4296" style="width: 590px;"><tbody data-dcnode-id="4297"><tr data-dcnode-id="4352"><th data-dcnode-id="4353" valign="top"><p align="center" data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Table 4: Definitions for Vas Occlusion Methods</span></p></th></tr><tr data-dcnode-id="4346"><td data-dcnode-id="4347" valign="top"><p data-dcnode-id="4348"><strong data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">Contraceptive effectiveness</span></strong><span data-dcnode-id="4349" instrument_node="">: The absence of pregnancy.</span></p></td></tr><tr data-dcnode-id="4340"><td data-dcnode-id="4341" valign="top"><p data-dcnode-id="4342"><strong data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">Division/excision</span></strong><span data-dcnode-id="4343" instrument_node="">: Division with or without excision of a vas segment.</span></p></td></tr><tr data-dcnode-id="4334"><td data-dcnode-id="4335" valign="top"><p data-dcnode-id="4336"><strong data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">Fascial interposition (FI)</span></strong><span data-dcnode-id="4337" instrument_node="">: Placing a layer of the vasal sheath (internal spermatic fascia) between the two severed ends of the vas in order to cover one end, but not the other end, with the vasal sheath.</span></p></td></tr><tr data-dcnode-id="4328"><td data-dcnode-id="4329" valign="top"><p data-dcnode-id="4330"><strong data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">Folding back</span></strong><span data-dcnode-id="4331" instrument_node="">: A method of folding and suturing each divided vas end on itself to prevent the two cut ends from facing each other.</span></p></td></tr><tr data-dcnode-id="4322"><td data-dcnode-id="4323" valign="top"><p data-dcnode-id="4324"><strong data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">Marie Stopes International (MSI) (non-divisional extended electrocautery technique of vas occlusion)</span></strong><span data-dcnode-id="4325" instrument_node="">: The method used by Marie Stopes International (MSI) in the United Kingdom and its international clinics. This method utilizes electrocautery to destroy approximately 2.5 to 3.0 cm of the anterior wall of the vas, the mucosa and a part of the posterior wall of the vas without dividing the vas. This method is rarely, if ever, used in the US.</span></p></td></tr><tr data-dcnode-id="4316"><td data-dcnode-id="4317" valign="top"><p data-dcnode-id="4318"><strong data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">Mucosal cautery (MC)</span></strong><span data-dcnode-id="4319" instrument_node="">: Application of thermal or electrical cautery to the vasal mucosa via intraluminal positioning of the cautery device to create a luminal plug of scar tissue without creating full-thickness thermal damage to the vas after division/excision of the vas</span></p></td></tr><tr data-dcnode-id="4310"><td data-dcnode-id="4311" valign="top"><p data-dcnode-id="4312"><strong data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">Occlusive effectiveness</span></strong><span data-dcnode-id="4313" instrument_node="">: Azoospermia or RNMS without any motile sperm at any time after vasectomy.</span></p></td></tr><tr data-dcnode-id="4304"><td data-dcnode-id="4305" valign="top"><p data-dcnode-id="4306"><strong data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Open ended vasectomy</span></strong><span data-dcnode-id="4307" instrument_node="">: Division/excision with the use of fascial interposition to cover one end of the divided vas combined with occlusion of the abdominal end of the divided vas without occlusion of the testicular end.</span></p></td></tr><tr data-dcnode-id="4298"><td data-dcnode-id="4299" valign="top"><p data-dcnode-id="4300"><strong data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">Vasectomy effectiveness</span></strong><span data-dcnode-id="4301" instrument_node="">: Contraceptive or occlusive effectiveness.</span></p></td></tr></tbody></table><p data-dcnode-id="4295"></p><p data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">The most commonly utilized vasectomy occlusion techniques are the following:</span></p><p data-dcnode-id="4289"><strong data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">Fascial interposition (FI)</span></strong><span data-dcnode-id="4290" instrument_node=""> is the technique of placing a layer of the internal spermatic fascia between the two divided ends of the vas. The fascial layer may be placed over the testicular or the abdominal end. Typically it is combined with other techniques such as ligation and excision or mucosal cautery.</span></p><p data-dcnode-id="4285"><strong data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Ligation</span></strong><span data-dcnode-id="4286" instrument_node=""> means occlusion of the vas with ligatures with division/excision of the vas between the occluded points and with or without FI. The number of ligatures on each end of the divided vas varies between one (most common) and three. The length of the vas segment excised is most commonly approximately 1 cm but varies between 0 and 5 cm.</span></p><p data-dcnode-id="4281"><strong data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">Clips</span></strong><span data-dcnode-id="4282" instrument_node=""> means occlusion of the vas with clips with division/excision of the vas between the occluded points and with or without FI. The number of clips placed on each end of the divided vas is usually one or two but may be more. The length of the vas segment excised is most commonly approximately 1 cm.</span></p><p data-dcnode-id="4277"><strong data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">Folding back</span></strong><span data-dcnode-id="4278" instrument_node=""> is the technique of folding and suturing each divided vas end on itself to prevent the two cut ends from facing each other.</span></p><p data-dcnode-id="4273"><strong data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">Mucosal cautery (MC)</span></strong><span data-dcnode-id="4274" instrument_node=""> is the technique of applying thermal or electrical cautery to the mucosa of the cut ends of the vas to destroy the vasal mucosa while avoiding or minimizing damage to muscle layers. The goal of MC is to create a plug of scar tissue which occludes the vas lumen. The length of the cauterized segment varies from a few mm to 1.5 cm. MC may be combined with excision of a vas segment, folding back or FI. Cauterizing the mucosa while simultaneously limiting cautery damage to the muscular layer of the vas prevents sloughing of the cauterized portion of the vas, which could occur if its full thickness is destroyed by cautery.&nbsp;</span></p><p data-dcnode-id="4262"><strong data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Non-divisional extended electrocautery technique of vas occlusion (Marie Stopes International technique)</span></strong><span data-dcnode-id="4270" instrument_node=""> consists of electrocoagulation of the full thickness of the anterior wall and a partial thickness of the posterior wall of the vas for a length of approximately 2.5 to 3 cm without dividing the vas.</span><sup data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">29,</span></sup><sup data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">153</span></sup><span data-dcnode-id="4265" instrument_node=""> It is the only technique which does not completely divide the vas. It uses monopolar electrocautery delivered by a Hyfrecator through a reusable needle. The technique was developed by Marie Stopes International in London (United Kingdom) as a vasectomy technique that could be easily disseminated, particularly in Third World conditions.</span><sup data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">153</span></sup></p><p data-dcnode-id="4250"><strong data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Open-ended vasectomy</span></strong><span data-dcnode-id="4259" instrument_node=""> is the technique of leaving the testicular end of the divided vas unoccluded while occluding the abdominal end. The hypothetical aims of this technique are 1) to prevent or reduce post-vasectomy pain by decreasing back pressure in the epididymis</span><sup data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">46</span></sup><span data-dcnode-id="4256" instrument_node=""> and 2) to allow the formation of a sperm granuloma at the transected testicular end of the vas, which some experts speculate might increase the chance of success of vasectomy reversal.</span><sup data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">46,</span></sup><sup data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">150</span></sup><span data-dcnode-id="4251" instrument_node=""> When open-ended vasectomy is performed, FI is used to prevent recanalization.</span></p><p data-dcnode-id="4241"><strong data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">Challenges in Interpreting the Evidence.</span></strong><span data-dcnode-id="4247" instrument_node=""> The Panel undertook review of the vas occlusion literature with the goal of identifying with a high level of certainty specific techniques that consistently produce occlusive effectiveness. However, the vas occlusion literature suffers from serious methodological flaws that reduce certainty regarding conclusions about the relative efficacy of various occlusion techniques. These flaws include failure to identify whether enrollment is comprised of consecutive or selected patients; failure to obtain at least one PVSA in large percentages of vasectomized men, resulting in incomplete information regarding vasectomy outcomes; lack of information about follow-up protocols; unclear criteria for vasectomy failure; wide variations in follow-up duration; very short periods of follow-up duration and, possibly, failure to report series that had high failure rates. Two reports showed uncertain significance.</span><sup data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">25,</span></sup><sup data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">45</span></sup><span data-dcnode-id="4242" instrument_node=""> One reported on a series of 14,047 vasectomies among which six men reported late recanalization with pregnancy. It is not clear from this report exactly how many couples were followed for pregnancy occurrence. In the absence of this information, it is not possible to conclude with certainty that the pregnancy failure rate is 6 in 14,047; the pregnancy failure rate may be higher if pregnancy data were not available for all patients. The other study reported no cases of sperm persistence and no pregnancies in 6,248 vasectomy patients. Because the number of patients who were followed and the timing of follow-up are not detailed in this paper, it is not possible to know whether successful vasectomy occurred in 6,248 men or in some number less than 6,248. Methodologically strong studies of occlusion technique effectiveness that would result in a high level of certainty regarding findings are characterized by the following:</span></p><ul data-dcnode-id="4224"><li data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Randomized controlled trial procedures</span></li><li data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">Enrollment of consecutive patients</span></li><li data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">Clearly described technique of vas occlusion</span></li><li data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Standardized PVSA protocol</span></li><li data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">Clearly described criteria for PVSA failure</span></li><li data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">PVSA data on all patients for a minimum of six months post-vasectomy</span></li><li data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">Follow-up regarding pregnancy for a minimum of one year after vasectomy</span></li><li data-dcnode-id="4225"><span data-dcnode-id="4226" instrument_node="">Studies with sufficient sample size to allow precise estimation of effects</span></li></ul><p data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">None of the studies reviewed by the Panel met all of these criteria, and only three studies met a majority of these criteria. This resulted in assigning Grade C as the strength of evidence for the body of literature on the efficacy of vas occlusion. Given the limited certainty associated with the use of Grade C evidence, the Panel focused on identifying methods of vas occlusion that produce consistent findings, including acceptably low failure rates, across multiple studies with large numbers of patients. &nbsp;Four methods of vas occlusion that appear to be consistently reliable with regard to contraceptive and occlusive effectiveness were identified: (1) MC with FI and without the use of ligatures or clips on the vas; (2) MC without FI and without the use of ligatures or clips on the vas; (3) open ended vasectomy leaving the testicular end unoccluded while using MC of the abdominal end of the vas with FI; and (4) the Marie Stopes International method of vasectomy with extended non-divisional electrocautery of the vas. Based on this analysis of the literature, the Recommendations below were created. The Panel acknowledges that, in creating an evidence-based guideline, these Recommendations are necessarily based on the data that are available in the medical literature. The panel recognizes that there may be other techniques of vas occlusion that are reliable in producing occlusive effectiveness, even though detailed reports of the results of such occlusive methods have not been published.</span></p><span data-dcnode-id="4221" instrument_node="">
</span></div><span data-dcnode-id="4219" instrument_node="">
</span><div data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">
</span></div><span data-dcnode-id="4216" instrument_node="">
</span><h4 data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">
                    Guideline Statement 7
                </span></h4><span data-dcnode-id="4213" instrument_node="">
</span><div data-dcnode-id="4193"><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">The ends of the vas should be occluded by one of three divisional methods:</span></p><ol data-dcnode-id="4200"><li data-dcnode-id="4207"><strong data-dcnode-id="4208" style="font-size: 9pt;"><span data-dcnode-id="4209" instrument_node="">Mucosal cautery (MC) with fascial interposition (FI) and without ligatures or clips applied on the vas;</span></strong></li><li data-dcnode-id="4204"><strong data-dcnode-id="4205" style="font-size: 9pt;"><span data-dcnode-id="4206" instrument_node="">MC without FI and without ligatures or clips applied on the vas;</span></strong></li><li data-dcnode-id="4201"><strong data-dcnode-id="4202" style="font-size: 9pt;"><span data-dcnode-id="4203" instrument_node="">Open ended vasectomy leaving the testicular end of the vas unoccluded, using MC on the abdominal end and FI;</span></strong></li></ol><p data-dcnode-id="4195"><strong data-dcnode-id="4196"><span data-dcnode-id="4199" instrument_node="">OR by the non-divisional method of extended electrocautery. </span><em data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">Recommendation</span></em></strong></p><span data-dcnode-id="4194" instrument_node="">
</span></div><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4187"><span data-dcnode-id="4191" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="4189" data-feathr-click-track="true" data-target="#x3362" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="4190" instrument_node="">Discussion</span></a><span data-dcnode-id="4188" instrument_node="">
</span></p><span data-dcnode-id="4186" instrument_node="">
</span><div class="modal fade" data-dcnode-id="3745" id="x3362" role="dialog"><span data-dcnode-id="4185" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="3747"><span data-dcnode-id="4184" instrument_node="">
</span><div class="modal-content" data-dcnode-id="3749"><span data-dcnode-id="4183" instrument_node="">
</span><div class="modal-header" data-dcnode-id="4175"><span data-dcnode-id="4182" instrument_node="">
</span><button class="close" data-dcnode-id="4180" data-dismiss="modal" type="button"><span data-dcnode-id="4181" instrument_node="">×</span></button><span data-dcnode-id="4179" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Discussion</span></h4><span data-dcnode-id="4176" instrument_node="">
</span></div><span data-dcnode-id="4174" instrument_node="">
</span><div class="modal-body" data-dcnode-id="3757"><span data-dcnode-id="4173" instrument_node="">
</span><p data-dcnode-id="4166"><strong data-dcnode-id="4171"><span data-dcnode-id="4172" instrument_node="">(Body of Evidence Strength – Grade C; Benefits outweigh risks/burdens)</span></strong><span data-dcnode-id="4170" instrument_node="">. </span><em data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Reliable Techniques of Vas Occlusion. </span></em><span data-dcnode-id="4167" instrument_node="">The Panel chose to define the acceptable rate of vas occlusion failure as ≤ 1%. In researching the results of vas occlusion techniques, 89 study arms reporting on 126,821 patients were found (see Table 5 below; see text under Discussion sections for citations). Failure of vas occlusion was reported in most of these studies as failure to achieve azoospermia or in a few studies as failure to achieve azoospermia or RNMS.</span></p><p data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">The opinion of the Panel is that, for a method of vas occlusion to be recommended, it should have occlusive failure rates which are consistently ≤1% in large numbers of patients across studies conducted by different surgeons. Three divisional techniques that fit these criteria were identified and are recommended by the Panel: (1) MC with FI and without ligatures or clips applied on the vas; (2) MC without FI and without ligatures or clips applied on the vas; and (3) open ended vasectomy leaving the testicular end of the vas unoccluded, using MC on the abdominal end and interposing fascia between the ends. One non-divisional technique also is recommended:&nbsp; non-divisional extended electrocautery.</span></p><table border="1" cellpadding="0" cellspacing="0" class="table table-bordered table-striped" data-dcnode-id="3848" style="width: 673px;"><tbody data-dcnode-id="3849"><tr data-dcnode-id="4160"><th colspan="4" data-dcnode-id="4161" valign="top" width="673"><p align="center" data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">Table 5: Characteristics of Vas Occlusion Studies</span></p></th></tr><tr data-dcnode-id="4143"><td data-dcnode-id="4153" valign="top" width="346"><p class="subhead3" data-dcnode-id="4158" style="text-align: center;"><span data-dcnode-id="4159" instrument_node="">Occlusion Technique±</span></p><p data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">*Non-divisional technique</span></p><p data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">±Unless otherwise noted, FI was not performed</span></p></td><td data-dcnode-id="4150" valign="top" width="69"><p class="subhead3" data-dcnode-id="4151" style="text-align: center;"><span data-dcnode-id="4152" instrument_node=""># of Study Arms</span></p></td><td data-dcnode-id="4147" valign="top" width="108"><p class="subhead3" data-dcnode-id="4148" style="text-align: center;"><span data-dcnode-id="4149" instrument_node=""># of Patients</span></p></td><td data-dcnode-id="4144" valign="top" width="150"><p class="subhead3" data-dcnode-id="4145" style="text-align: center;"><span data-dcnode-id="4146" instrument_node="">Range of Occlusive Failure Rates</span></p></td></tr><tr data-dcnode-id="4139"><th colspan="4" data-dcnode-id="4140" valign="top" width="673"><p align="center" data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">Recommended Techniques</span></p></th></tr><tr data-dcnode-id="4120"><td data-dcnode-id="4136" valign="top" width="346"><p data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">Mucosal cautery (MC) of both ends and fascial interposition (FI)</span></p></td><td data-dcnode-id="4131" valign="top" width="69"><p align="center" data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">&nbsp;</span></p><p align="center" data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">13</span></p></td><td data-dcnode-id="4126" valign="top" width="108"><p align="center" data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">&nbsp;</span></p> r end; ligation of abdominal end</span></p></td><td data-dcnode-id="3935" valign="top" width="69"><p align="center" data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">2</span></p></td><td data-dcnode-id="3932" valign="top" width="108"><p align="center" data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">758</span></p></td><td data-dcnode-id="3929" valign="top" width="150"><p align="center" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">1.11% – 2.5%</span></p></td></tr><tr data-dcnode-id="3915"><td data-dcnode-id="3925" valign="top" width="346"><p data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Ligation and cautery (non-mucosal) of both ends</span></p></td><td data-dcnode-id="3922" valign="top" width="69"><p align="center" data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">1</span></p></td><td data-dcnode-id="3919" valign="top" width="108"><p align="center" data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">500</span></p></td><td data-dcnode-id="3916" valign="top" width="150"><p align="center" data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">0.40%</span></p></td></tr><tr data-dcnode-id="3902"><td data-dcnode-id="3912" valign="top" width="346"><p data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">Ligation and cautery (non-mucosal) of both ends and FI</span></p></td><td data-dcnode-id="3909" valign="top" width="69"><p align="center" data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">1</span></p></td><td data-dcnode-id="3906" valign="top" width="108"><p align="center" data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">3867</span></p></td><td data-dcnode-id="3903" valign="top" width="150"><p align="center" data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">0.08%</span></p></td></tr><tr data-dcnode-id="3889"><td data-dcnode-id="3899" valign="top" width="346"><p data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Open testicular end; ligation and cautery )non-mucosal) of abdominal end; FI</span></p></td><td data-dcnode-id="3896" valign="top" width="69"><p align="center" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">1</span></p></td><td data-dcnode-id="3893" valign="top" width="108"><p align="center" data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">4330</span></p></td><td data-dcnode-id="3890" valign="top" width="150"><p align="center" data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">0.02%</span></p></td></tr><tr data-dcnode-id="3876"><td data-dcnode-id="3886" valign="top" width="346"><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Open testicular end; abdominal end clipped</span></p></td><td data-dcnode-id="3883" valign="top" width="69"><p align="center" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">1</span></p></td><td data-dcnode-id="3880" valign="top" width="108"><p align="center" data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">262</span></p></td><td data-dcnode-id="3877" valign="top" width="150"><p align="center" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">0.38%</span></p></td></tr><tr data-dcnode-id="3863"><td data-dcnode-id="3873" valign="top" width="346"><p data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">*Clips only; no excision/division</span></p></td><td data-dcnode-id="3870" valign="top" width="69"><p align="center" data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">2</span></p></td><td data-dcnode-id="3867" valign="top" width="108"><p align="center" data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">89</span></p></td><td data-dcnode-id="3864" valign="top" width="150"><p align="center" data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">0.0% – 2.56%</span></p></td></tr><tr data-dcnode-id="3850"><td data-dcnode-id="3860" valign="top" width="346"><p data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">&nbsp;</span></p></td><td data-dcnode-id="3857" valign="top" width="69"><p class="subhead3" data-dcnode-id="3858" style="text-align: center;"><span data-dcnode-id="3859" instrument_node="">Total Study Arms = 89</span></p></td><td data-dcnode-id="3854" valign="top" width="108"><p class="subhead3" data-dcnode-id="3855" style="text-align: center;"><span data-dcnode-id="3856" instrument_node="">Total # Patients = 126,821</span></p></td><td data-dcnode-id="3851" valign="top" width="150"><p align="center" data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">&nbsp;</span></p></td></tr></tbody></table><p data-dcnode-id="3847"></p><p data-dcnode-id="3844"><img alt="Figure 1: Definitions and Diagrams" data-dcnode-id="3845" height="600" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-1.jpg&amp;raw" width="347"></p><h3 data-dcnode-id="3841"><em data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">Mucosal cautery with fascial interposition. </span></em></h3><p data-dcnode-id="3815"><span data-dcnode-id="3840" instrument_node="">Thirteen study arms evaluated MC of both vas ends and FI to occlude the vas in approximately 18,456 patients.</span><sup data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">33,</span></sup><sup data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">35-37,</span></sup><sup data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">39-41,</span></sup><sup data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">43-45,</span></sup><sup data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">47,</span></sup><sup data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">231,</span></sup><sup data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">232</span></sup><span data-dcnode-id="3825" instrument_node=""> In nine study arms FI was performed over the abdominal end, in two study arms FI was performed over the testicular end, and in two study arms the end was not specified. Failure rates for this technique ranged from 0.0% to 0.55%, with most study arms reporting rates of 0.0% failure. Although the majority of these data were from non-randomized observational designs, one study arm was from a high-quality observational study</span><sup data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">231</span></sup><span data-dcnode-id="3822" instrument_node=""> that reported an occlusive failure rate of 0.0% and one technical failure associated with a missed vas. Additional support for the efficacy of MC of both vas ends and FI is provided by Labrecque (2006),</span><sup data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">233</span></sup><span data-dcnode-id="3819" instrument_node=""> which is a secondary analysis of PVSA data from Barone (2004).</span><sup data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">231</span></sup><span data-dcnode-id="3816" instrument_node=""> This paper reported 0% recanalizations with use of this technique. Given the large number of patients evaluated, the overall consistently low failure rates and the low failure rate from the single high-quality study, the panel judged that this vas occlusion technique is likely to be consistently effective.</span></p><p data-dcnode-id="3813"><img alt="Figure 2: Mucosal cautery with fascial interposition. " data-dcnode-id="3814" height="209" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-2.jpg&amp;raw" width="416"></p><h3 data-dcnode-id="3810"><em data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Mucosal cautery without fascial interposition.</span></em></h3><p data-dcnode-id="3797"><span data-dcnode-id="3809" instrument_node="">Six study arms (Barone 2004 – 2 arms; Coffman 1974; O'Brien 1995; Philp 1984; Shapiro 1979) evaluated MC of both vas ends but without FI to occlude the vas in approximately 13,851 patients.</span><sup data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">26,</span></sup><sup data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">32,</span></sup><sup data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">42,</span></sup><sup data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">46,</span></sup><sup data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">231</span></sup><span data-dcnode-id="3798" instrument_node=""> Failure rates for this technique ranged from 0.0% to approximately 1.0%. Four of the six study arms were from non-randomized observational designs, but two arms were from Barone (2004), the high-quality observational study; these two arms reported an overall failure rate of 1.0% It should be noted that the failures in Barone (2004) all occurred in the Brazil arm which is the only arm of the six discussed here that used division without excision. All of the other study arms both divided the vas and excised a segment. Given the relatively large number of patients evaluated, the consistently low failure rates and the low failure rate from the single high-quality study, the panel judged that MC without FI also is likely to be consistently effective.</span></p><p data-dcnode-id="3795"><img alt="Figure 3: MC without FI" data-dcnode-id="3796" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-3.jpg&amp;raw" width="408"></p><h3 data-dcnode-id="3792"><em data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Open ended method leaving the testicular end unoccluded with mucosal cautery of the abdominal end and FI. </span></em></h3><p data-dcnode-id="3776"><span data-dcnode-id="3791" instrument_node="">Four study arms</span><sup data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">38,</span></sup><sup data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">41,</span></sup><sup data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">158,</span></sup><sup data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">231</span></sup><span data-dcnode-id="3782" instrument_node=""> evaluated approximately 4,600 men with an open ended method in which the testicular end was left unoccluded, the abdominal end was occluded with MC and FI was performed. Failure rates ranged from 0.0% to 0.50%. One of the three study arms was from Barone (2004), the high-quality observational study, and reported a failure rate of 0.0%.212231 Additional support for leaving the testicular end open, applying MC to the abdominal end and performing FI is provided by Labrecque et al. (2006), which is a secondary analysis of PVSA data from Barone (2004).</span><sup data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">214,</span></sup><sup data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">233</span></sup><span data-dcnode-id="3777" instrument_node=""> Labrecque (2006) reported 0% recanalizations with use of this technique. Because of the low failure rates, including the low failure rate from the high-quality study arm, the panel judged that this technique also is consistently effective.</span></p><p data-dcnode-id="3771"><span data-dcnode-id="3775" instrument_node="">With regard to the same technique of open ended vasectomy with MC but without FI, only two study arms were found. Both study arms were from the same study evaluated a total of 171 patients and reported failure rates of 4.73% and 4.35% in the two arms of the study.</span><sup data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">46</span></sup><span data-dcnode-id="3772" instrument_node=""> The panel judged that, given the available evidence, uncertainty remains regarding the efficacy of open ended vasectomy with MC to occlude the abdominal end without FI. Therefore, the panel does not advocate the omission of FI in performing open ended vasectomy with MC.</span></p><p data-dcnode-id="3769"><img alt="Figure 4: Testicular end open, abdominal end cauterized with FI" data-dcnode-id="3770" height="215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-4.jpg&amp;raw" width="415"></p><h3 data-dcnode-id="3766"><em data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">Non-divisional vasectomy with extended electrocautery (Marie Stopes technique). </span></em></h3><p data-dcnode-id="3761"><span data-dcnode-id="3765" instrument_node="">One paper reports the findings from a 10-year period at the Marie-Stopes Clinic during which 45,123 vasectomies were performed at more than 20 centers by up to 30 clinicians. PVSAs were obtained on 41,814 patients and revealed 267 early failures (a failure rate of 0.64%) defined as patients whose PVSAs continued to show the presence of sperm and required reoperation.</span><sup data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">29</span></sup><span data-dcnode-id="3762" instrument_node="">&nbsp; Failure rates ranged from 0.28% to 1.3% across centers that used this method. Given the consistency of low failure rates across many centers and many clinicians as well as the very large number of patients, the panel interpreted these data to indicate that non-divisional vasectomy with extended electrocautery of the vas also is consistently effective.</span></p><p data-dcnode-id="3759"><img alt="Figure 5: MSI" data-dcnode-id="3760" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-5.jpg&amp;raw" width="410"></p><span data-dcnode-id="3758" instrument_node="">
</span></div><span data-dcnode-id="3756" instrument_node="">

</span><hr data-dcnode-id="3743"><span data-dcnode-id="3742" instrument_node="">
</span><h4 data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">
                    Guideline Statement 8
                </span></h4><span data-dcnode-id="3739" instrument_node="">
</span><div data-dcnode-id="3732"><span data-dcnode-id="3738" instrument_node="">
</span><p data-dcnode-id="3734"><span data-dcnode-id="3737" instrument_node="">The divided vas may be occluded by ligatures or clips applied to the ends of the vas, with or without FI and with or without excision of a short segment of the vas, by surgeons whose personal training and/or experience enable them to consistently obtain satisfactory results with such methods. </span><em data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Option</span></em></p><span data-dcnode-id="3733" instrument_node="">
</span></div><span data-dcnode-id="3731" instrument_node="">
</span><p data-dcnode-id="3726"><span data-dcnode-id="3730" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="3728" data-feathr-click-track="true" data-target="#x3361" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="3729" instrument_node="">Discussion</span></a><span data-dcnode-id="3727" instrument_node="">
</span></p><span data-dcnode-id="3725" instrument_node="">
</span><div class="modal fade" data-dcnode-id="3562" id="x3361" role="dialog"><span data-dcnode-id="3724" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="3564"><span data-dcnode-id="3723" instrument_node="">
</span><div class="modal-content" data-dcnode-id="3566"><span data-dcnode-id="3722" instrument_node="">
</span><div class="modal-header" data-dcnode-id="3714"><span data-dcnode-id="3721" instrument_node="">
</span><button class="close" data-dcnode-id="3719" data-dismiss="modal" type="button"><span data-dcnode-id="3720" instrument_node="">×</span></button><span data-dcnode-id="3718" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Discussion</span></h4><span data-dcnode-id="3715" instrument_node="">
</span></div><span data-dcnode-id="3713" instrument_node="">
</span><div class="modal-body" data-dcnode-id="3574"><span data-dcnode-id="3712" instrument_node="">
</span><p data-dcnode-id="3708"><strong data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">(Body of Evidence Strength – Grade C; Balance between benefits and risks/burdens uncertain)</span></strong><span data-dcnode-id="3709" instrument_node="">. The Panel has defined consistently satisfactory results as an occlusive failure rate of 1% or less and has focused occlusive technique recommendations on techniques that produce consistently satisfactory results across multiple surgeons and large numbers of patients. The Panel is aware, however, that large numbers of surgeons in the US and elsewhere occlude the vas using ligatures or clips. The available literature reporting on these techniques is characterized by great variability in failure rates, with single surgeons from single institutions reporting satisfactory results (i.e., ≤1.0% failure) and others reporting unacceptably high failure rates. In addition, many studies, including more than half of those that reported on the use of ligation, were published more than 30 years ago and may not reflect the skill level of current surgeons.</span></p><p data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">This highly-variable literature is reviewed in the paragraphs below. The Panel interpreted these data to mean, overall, that the balance between benefits and risks/burdens for these techniques is uncertain. However, individual surgeons who have the training and/or experience that produce consistently satisfactory failure rates of 1% or less are justified in using these techniques.</span></p><h3 data-dcnode-id="3703"><em data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Occlusion of both vasal ends with ligatures without FI. </span></em></h3><p data-dcnode-id="3649"><span data-dcnode-id="3702" instrument_node="">Thirty-one study arms evaluated occlusion by ligatures of both ends of the vas without FI.</span><sup data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">23,</span></sup><sup data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">26,</span></sup><sup data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">28,</span></sup><sup data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">31,</span></sup><sup data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">35,</span></sup><sup data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">36,</span></sup><sup data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">43,</span></sup><sup data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">47,</span></sup><sup data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">131,</span></sup><span data-dcnode-id="3683" instrument_node=""> </span><sup data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">137,</span></sup><sup data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">138,</span></sup><sup data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">140,</span></sup><sup data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">141,</span></sup><sup data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">143,</span></sup><sup data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">145,</span></sup><sup data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">147,</span></sup><sup data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">149,</span></sup><sup data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">155,</span></sup><sup data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">160,</span></sup><sup data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">184,</span></sup><sup data-dcnode-id="3659"><span data-dcnode-id="3660" instrument_node="">234-242</span></sup><span data-dcnode-id="3658" instrument_node=""> Failure rates ranged from 0.0% to 13.79%. Specifically, twelve studies reported failure rates of 1.0% or less (including four studies from the US, one from Canada, three from the UK, two from India, one from Australia and one from Brazil). Six studies reported failure rates between 1.0 and 2.0% (including two studies from the US, one from Canada, one from Thailand, one from El Salvador and one from China). Thirteen studies reported rates higher than 2.0%, including five studies that reported rates higher than 5.0% (comprised of one study from the US, two from Mexico, one from the UK and one from Finland). Two of the three highest failure rates were reported in high-quality studies. The only randomized trial reported a failure rate of 12.74%.</span><sup data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">241</span></sup><span data-dcnode-id="3655" instrument_node=""> A single-group design with more methodological rigor than most studies (e.g., a clear and complete follow-up protocol and all patients accounted for) reported a failure rate of 11.5%.</span><sup data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">242</span></sup><span data-dcnode-id="3652" instrument_node=""> One study reported that in the only randomized controlled trial, the early recanalization rate for this technique was 25.0% with approximately half of these patients eventually achieving a successful vasectomy after delayed occlusion was detected.</span><sup data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">233</span></sup></p><p data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">The panel interpreted this wide range of failure rates to mean, overall, that the balance between benefits and risks/burdens of this technique is uncertain. Nevertheless, the Panel recognizes that some surgeons achieve consistently satisfactory results with this technique.</span></p><p data-dcnode-id="3645"><img alt="Figure 6: Ligation both ends without FI" data-dcnode-id="3646" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-6.jpg&amp;raw" width="414"></p><h3 data-dcnode-id="3642"><em data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Occlusion of both vasal ends with ligatures and FI. </span></em></h3><p data-dcnode-id="3637"><span data-dcnode-id="3641" instrument_node="">Nine study arms evaluated the use of ligatures on both ends of the vas in combination with FI. Six study arms reported failure rates of less than 1.0% (including one UK study, one study from Denmark, one study from Africa, one study from the US and one study from New Zealand); five of these six studies reported 0.0% failure rates. The remaining studies reported failure rates of 1.11%, 1.98%, and 5.85%. The high rate of 5.85% was reported in the only RCT among the included studies.</span><sup data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">241</span></sup><span data-dcnode-id="3638" instrument_node=""> Because the highest quality study also reported the highest failure rate, the Panel interpreted these data to mean that the balance between benefits and risks/burdens for this technique is uncertain but that some surgeons achieve consistently satisfactory results.</span></p><p data-dcnode-id="3635"><img alt="Figure 7: Ligation both ends with FI " data-dcnode-id="3636" height="208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-7.jpg&amp;raw" width="404"></p><h3 data-dcnode-id="3632"><em data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Occlusion of both vasal ends with clips without FI.</span></em></h3><p data-dcnode-id="3617"><span data-dcnode-id="3631" instrument_node="">Seven study arms used clips on both ends of the vas without FI.</span><sup data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">38,</span></sup><sup data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">40,</span></sup><sup data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">132,</span></sup><sup data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">141,</span></sup><sup data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">156,</span></sup><sup data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">243</span></sup><span data-dcnode-id="3618" instrument_node=""> These studies reported failure rates ranging from 0.0% to 8.67%. Four studies reported failure rates less than 1.0% (including three US studies and one Canadian study), one US study reported a failure rate of 1.18%, and the remaining studies (both from Canada) reported failure rates of 5.42% and 8.67%. Again, the Panel interpreted this wide range of failure rates to indicate that, overall, the balance between benefits and risks/burdens of this technique is uncertain but that some surgeons achieve consistently satisfactory results.</span></p><p data-dcnode-id="3612"><span data-dcnode-id="3616" instrument_node="">The literature review identified only one study that combined clips with FI; 0.0% occlusive failures were reported in 1,073 patients.</span><sup data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">244</span></sup><span data-dcnode-id="3613" instrument_node=""> Given the lack of additional studies using this technique, the reliability of clips combined with FI across surgeons and centers is not known. The opinion of the Panel, however, is that vas occlusion by clips and FI is unlikely to produce higher occlusive failure rates than vas occlusion by clips alone.</span></p><p data-dcnode-id="3610"><img alt="Figure 8: Clip Both ends without FI" data-dcnode-id="3611" height="221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/images/Guidelines/Guideline%2520Images/Vasectomy-Figure-8.jpg&amp;raw" width="418"></p><p data-dcnode-id="3606"><em data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Other Occlusive Techniques</span></em><span data-dcnode-id="3607" instrument_node="">. Numerous other occlusive techniques or combinations of occlusive techniques with adjunctive methods have been reported (see Table 5), but insufficient evidence was retrieved to address whether these other techniques with or without adjunctive methods produced consistently satisfactory results. In many cases, a particular technique was reported in only a single study by a single surgeon, making it unclear if results would replicate and generalize to other surgeons and settings.</span></p><p data-dcnode-id="3583"><em data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">Adjunctive Techniques for Vas Occlusion</span></em><span data-dcnode-id="3603" instrument_node="">. The literature was also examined to determine whether adjunctive techniques for vas occlusion are associated with consistently lower failure rates. Insufficient evidence was found to draw conclusions with regard to the techniques of folding back, irrigation of the abdominal end of the divided vas, excision of different lengths of vas segments and FI over the abdominal end compared to FI over the testicular end. With regard to folding back of the vas on itself as a method to separate the ends of the divided vas, the available studies used a variety of occlusive techniques in addition to folding back, making it unclear whether folding back affected failure rates.</span><sup data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">23,</span></sup><sup data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">47,</span></sup><sup data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">143,</span></sup><sup data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">147,</span></sup><sup data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">149,</span></sup><sup data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">150,</span></sup><sup data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">160,</span></sup><sup data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">234</span></sup><span data-dcnode-id="3586" instrument_node=""> Due to these inconclusive reports, the Panel cannot make a recommendation for or against folding back as an adjunctive technique for vasectomy. Similarly, it is not clear whether irrigation of the abdominal end of the vas with various solutions enhances sperm clearance rates.</span><sup data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">245-250</span></sup></p><p data-dcnode-id="3576"><span data-dcnode-id="3582" instrument_node="">There also is insufficient evidence to establish the optimal length of vas which should be excised, if any. Although failure is very rare with any occlusive technique when a 5 cm or larger vas segment is excised, </span><sup data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">234,</span></sup><sup data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">236</span></sup><span data-dcnode-id="3577" instrument_node=""> excising such a long segment requires more extensive dissection of the spermatic cord. The extended dissection may be associated with a higher risk of surgical complications, may make vasectomy reversal more difficult to perform and may make vasectomy reversal less likely to be successful. Most surgeons excise a segment of the vas that ranges from 0.5 to 2.0 cm; the Panel believes that 1.0 cm is an adequate length. In addition, based on the available evidence, there do not appear to be differences in effectiveness when FI is performed over the testicular vs. the abdominal end.</span></p><span data-dcnode-id="3575" instrument_node="">
</span></div><span data-dcnode-id="3573" instrument_node="">

                </span></h4><span data-dcnode-id="3556" instrument_node="">

</span><p data-dcnode-id="3551"><span data-dcnode-id="3554" instrument_node="">Routine histologic examination of the excised vas segments is not required. </span><em data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">Expert Opinion</span></em></p><span data-dcnode-id="3550" instrument_node="">

</span><h4 class="modal-title" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Discussion</span></h4><span data-dcnode-id="3532" instrument_node="">
</span></div><span data-dcnode-id="3530" instrument_node="">
</span><div class="modal-body" data-dcnode-id="3525"><span data-dcnode-id="3529" instrument_node="">
</span><p data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">Although there is no evidence for or against routine histologic examination of excised vas segments, the American Urological Association recommended in 1998 and reaffirmed in 2003 and again in 2007 "that physicians in practice and residency training programs no longer require histologic confirmation of the vas deferens as a measurement of vasectomy success" because the PVSA is the determinant of success of the procedure. The panel agrees with the lack of value of histologic examination of resected vas deferens segments as a determinant of success of the vasectomy. At the discretion of the surgeon, it may be helpful to send excised tissues for histological evaluation for confirmation of vasal tissue.</span></p><span data-dcnode-id="3526" instrument_node="">

</span><h3 data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">
                Post-Operative Practice
            </span></h3><span data-dcnode-id="3505" instrument_node="">
</span><div data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">
</span></div><span data-dcnode-id="3502" instrument_node="">
