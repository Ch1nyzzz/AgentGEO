</span><h2 data-dcnode-id="6034"><span data-dcnode-id="6035" instrument_node="">Vasectomy Guideline (2015)</span></h2><span data-dcnode-id="6033" instrument_node="">
</span><div data-dcnode-id="6002"><span data-dcnode-id="6032" instrument_node="">
</span><p data-dcnode-id="6024"><strong data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">To cite this guideline:</span></strong><br data-dcnode-id="6029"><span data-dcnode-id="6028" instrument_node="">Sharlip ID, Belker AM, Honig S et al: Vasectomy: AUA guideline. J Urol 2012; </span><strong data-dcnode-id="6026"><span data-dcnode-id="6027" instrument_node="">188:</span></strong><span data-dcnode-id="6025" instrument_node=""> 2482.</span></p><span data-dcnode-id="6023" instrument_node="">
</span><h4 data-dcnode-id="6020"><em data-dcnode-id="6021"><span data-dcnode-id="6022" instrument_node="">Published 2012; Amended 2015</span></em></h4><span data-dcnode-id="6019" instrument_node="">
</span><p data-dcnode-id="6017"><span data-dcnode-id="6018" instrument_node="">The purpose of this clinical guideline is to provide guidance to clinicians who offer vasectomy services. This guidance covers pre-operative evaluation and consultation of prospective vasectomy patients; techniques for local anesthesia, isolation of the vas deferens and occlusion of the vas deferens during vasectomy; post-operative follow-up; post-vasectomy semen analysis (PVSA) and potential complications and consequences of vasectomy.</span></p><span data-dcnode-id="6016" instrument_node="">

</span><p data-dcnode-id="6004"><a data-dcnode-id="6006" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/documents/education/clinical-guidance/Vasectomy.pdf" onclick="_gaq.push(['_trackEvent', 'PDF', 'Download', 'documents/education/clinical-guidance/Vasectomy.pdf']);" rel="noopener" target="_blank" title="Unabridged version of this Guideline"><span data-dcnode-id="6007" instrument_node="">Unabridged version of this Guideline</span></a><span data-dcnode-id="6005" instrument_node=""> [pdf]</span></p><span data-dcnode-id="6003" instrument_node="">

</span><div data-dcnode-id="5993"><span data-dcnode-id="5997" instrument_node="">
</span><p data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">Ira D. Sharlip, Arnold M. Belker, Stanton Honig, Michel Labrecque, Joel L. Marmar, Lawrence S. Ross, Jay I. Sandlow, David C. Sokal</span></p><span data-dcnode-id="5994" instrument_node="">
</span></div><span data-dcnode-id="5992" instrument_node="">
</span><a class="anchor" data-dcnode-id="5991" data-feathr-click-track="true" name="x3372"></a><span data-dcnode-id="5990" instrument_node="">
</span><h3 data-dcnode-id="5988"><span data-dcnode-id="5989" instrument_node="">
                Executive Summary
            </span></h3><span data-dcnode-id="5987" instrument_node="">
</span><div data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">
</span></div><span data-dcnode-id="5984" instrument_node="">
</span><div data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">
</span></div><span data-dcnode-id="5981" instrument_node="">
</span><div data-dcnode-id="5867"><span data-dcnode-id="5980" instrument_node="">
</span><h5 data-dcnode-id="5978"><span data-dcnode-id="5979" instrument_node="">Note to the Reader:</span></h5><p data-dcnode-id="5976"><span data-dcnode-id="5977" instrument_node="">Please note that this Guideline was edited in 2015 to include additional information related to vasectomy and the risk of prostate cancer.</span></p><h4 data-dcnode-id="5974"><span data-dcnode-id="5975" instrument_node="">Purpose</span></h4><p data-dcnode-id="5972"><span data-dcnode-id="5973" instrument_node="">The purpose of this Guideline is to provide guidance to clinicians who offer vasectomy services. This guidance covers pre-operative evaluation and consultation of prospective vasectomy patients; techniques for local anesthesia, isolation of the vas deferens and occlusion of the vas deferens during vasectomy; post-operative follow-up; post-vasectomy semen analysis (PVSA) and potential complications and consequences of vasectomy.</span></p><h4 data-dcnode-id="5970"><span data-dcnode-id="5971" instrument_node="">Methods</span></h4><p data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">A systematic review of the literature using the MEDLINE and POPLINE databases (search dates January 1949 to August 2011) was conducted to identify peer-reviewed publications relevant to vasectomy. The search identified almost 2,000 titles and abstracts. Almost 900 articles were retrieved for full-text review. These yielded an evidence base of 275 articles after application of inclusion and exclusion criteria. These publications were used to create the evidence-based portion of the Guideline. When sufficient evidence existed, the body of evidence for a particular treatment was assigned a strength rating of A (high), B (moderate) or C (low). Additional information is provided as Clinical Principles and Expert Opinion when insufficient evidence existed.</span></p><h4 data-dcnode-id="5966"><span data-dcnode-id="5967" instrument_node="">Guideline Statements</span></h4><p data-dcnode-id="5962"><span data-dcnode-id="5965" instrument_node="">1. A preoperative interactive consultation should be conducted, preferably in person. If an in-person consultation is not possible, then preoperative consultation by telephone or electronic communication is an acceptable alternative. </span><em data-dcnode-id="5963"><span data-dcnode-id="5964" instrument_node="">Expert Opinion</span></em></p><p data-dcnode-id="5958"><span data-dcnode-id="5961" instrument_node="">2. The minimum and necessary concepts that should be discussed in a preoperative vasectomy consultation include the following: </span><em data-dcnode-id="5959"><span data-dcnode-id="5960" instrument_node="">Expert Opinion</span></em></p><ul data-dcnode-id="5932"><li data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">Vasectomy is intended to be a permanent form of contraception.</span></li><li data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">Vasectomy does not produce immediate sterility.</span></li><li data-dcnode-id="5952"><span data-dcnode-id="5953" instrument_node="">Following vasectomy, another form of contraception is required until vas occlusion is confirmed by post- vasectomy semen analysis (PVSA).</span></li><li data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">Even after vas occlusion is confirmed, vasectomy is not 100% reliable in preventing pregnancy.</span></li><li data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">The risk of pregnancy after vasectomy is approximately 1 in 2,000 for men who have post-vasectomy azoospermia or PVSA showing rare non-motile sperm (RNMS).</span></li><li data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">Repeat vasectomy is necessary in ≤1% of vasectomies, provided that a technique for vas occlusion known to have a low occlusive failure rate has been used.</span></li><li data-dcnode-id="5944"><span data-dcnode-id="5945" instrument_node="">Patients should refrain from ejaculation for approximately one week after vasectomy.</span></li><li data-dcnode-id="5939"><span data-dcnode-id="5943" instrument_node="">Options for fertility after vasectomy include vasectomy reversal and sperm retrieval with </span><em data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">in vitro</span></em><span data-dcnode-id="5940" instrument_node=""> fertilization. These options are not always successful, and they may be expensive.</span></li><li data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">The rates of surgical complications such as symptomatic hematoma and infection are 1-2%. These rates vary with the surgeon's experience and the criteria used to diagnose these conditions.</span></li><li data-dcnode-id="5935"><span data-dcnode-id="5936" instrument_node="">Chronic scrotal pain associated with negative impact on quality of life occurs after vasectomy in about 1-2% of men. Few of these men require additional surgery.</span></li><li data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">Other permanent and non-permanent alternatives to vasectomy are available.</span></li></ul><p data-dcnode-id="5928"><span data-dcnode-id="5931" instrument_node="">3. Clinicians do not need to routinely discuss prostate cancer, coronary heart disease, stroke, hypertension, dementia or testicular cancer in pre-vasectomy counseling of patients because vasectomy is not a risk factor for these conditions. </span><em data-dcnode-id="5929"><span data-dcnode-id="5930" instrument_node="">Standard (Evidence Strength Grade B)</span></em></p><p data-dcnode-id="5924"><span data-dcnode-id="5927" instrument_node="">4. Prophylactic antimicrobials are not indicated for routine vasectomy unless the patient presents a high risk of infection. </span><em data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">Recommendation (Evidence Strength Grade C)</span></em></p><p data-dcnode-id="5920"><span data-dcnode-id="5923" instrument_node="">5. Vasectomy should be performed with local anesthesia with or without oral sedation. If the patient declines local anesthesia or if the surgeon believes that local anesthesia with or without oral sedation will not be adequate for a particular patient, then vasectomy may be performed with intravenous sedation or general anesthesia.</span><em data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node=""> Expert Opinion</span></em></p><p data-dcnode-id="5916"><span data-dcnode-id="5919" instrument_node="">6. Isolation of the vas should be performed using a minimally-invasive vasectomy (MIV) technique such as the no-scalpel vasectomy (NSV) technique or other MIV technique.</span><em data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node=""> Standard (Evidence Strength Grade B)</span></em></p><p data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">7.&nbsp;The ends of the vas should be occluded by one of three divisional methods:</span></p><ol data-dcnode-id="5901"><li data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">Mucosal cautery (MC) with fascial interposition (FI) and without ligatures or clips applied on the vas;</span></li><li data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">MC without FI and without ligatures or clips applied on the vas;</span></li><li data-dcnode-id="5902"><span data-dcnode-id="5909" instrument_node="">Open ended vasectomy leaving the testicular end of the vas unoccluded, using MC on the abdominal end and FI;</span><br data-dcnode-id="5908"><span data-dcnode-id="5907" instrument_node=""> </span><br data-dcnode-id="5906"><span data-dcnode-id="5905" instrument_node=""> OR by the non-divisional method of extended electrocautery. </span><em data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">Recommendation (Evidence Strength Grade C)</span></em></li></ol><p data-dcnode-id="5897"><span data-dcnode-id="5900" instrument_node="">8.&nbsp;The divided vas may be occluded by ligatures or clips applied to the ends of the vas, with or without FI and with or without excision of a short segment of the vas, by surgeons whose personal training and/or experience enable them to consistently obtain satisfactory results with such methods. </span><em data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">Option&nbsp; (Evidence Strength Grade C)</span></em></p><p data-dcnode-id="5893"><span data-dcnode-id="5896" instrument_node="">9.&nbsp;Routine histologic examination of the excised vas segments is not required. </span><em data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">Expert Opinion</span></em></p><p data-dcnode-id="5889"><span data-dcnode-id="5892" instrument_node="">10. Men or their partners should use other contraceptive methods until vasectomy success is confirmed by PVSA. </span><em data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">Clinical Principle</span></em></p><p data-dcnode-id="5885"><span data-dcnode-id="5888" instrument_node="">11. To evaluate sperm motility, a fresh, uncentrifuged semen sample should be examined within two hours after ejaculation. </span><em data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">&nbsp;Expert Opinion</span></em></p><p data-dcnode-id="5881"><span data-dcnode-id="5884" instrument_node="">12. Patients may stop using other methods of contraception when examination of one well-mixed, uncentrifuged, fresh post-vasectomy semen specimen shows azoospermia or only rare non-motile sperm (RNMS or ≤ 100,000 non-motile sperm/mL). </span><em data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">Recommendation (Evidence Strength Grade C) </span></em></p><p data-dcnode-id="5877"><span data-dcnode-id="5880" instrument_node="">13. Eight to sixteen weeks after vasectomy is the appropriate time range for the first PVSA. The choice of time to do the first PVSA should be left to the judgment of the surgeon. </span><em data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">Option (Evidence Strength Grade C) </span></em></p><p data-dcnode-id="5873"><span data-dcnode-id="5876" instrument_node="">14. Vasectomy should be considered a failure if any motile sperm are seen on PVSA at six months after vasectomy, in which case repeat vasectomy should be considered. </span><em data-dcnode-id="5874"><span data-dcnode-id="5875" instrument_node="">Expert Opinion</span></em></p><p data-dcnode-id="5869"><span data-dcnode-id="5872" instrument_node="">15. If &gt; 100,000 non-motile sperm/mL persist beyond six months after vasectomy, then trends of serial PVSAs and clinical judgment should be used to decide whether the vasectomy is a failure and whether repeat vasectomy should be considered. </span><em data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">Expert Opinion</span></em></p><span data-dcnode-id="5868" instrument_node="">
</span></div><span data-dcnode-id="5866" instrument_node="">
</span><div data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">
</span></div><span data-dcnode-id="5863" instrument_node="">
</span><a class="anchor" data-dcnode-id="5862" data-feathr-click-track="true" name="x3370"></a><span data-dcnode-id="5861" instrument_node="">
</span><h3 data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">
</span></h3><span data-dcnode-id="5858" instrument_node="">
</span><div data-dcnode-id="5856"><span data-dcnode-id="5857" instrument_node="">
</span></div><span data-dcnode-id="5855" instrument_node="">
</span><div data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">
</span></div><span data-dcnode-id="5852" instrument_node="">
</span><div data-dcnode-id="5738"><span data-dcnode-id="5851" instrument_node="">
</span><h3 data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">Purpose</span></h3><p data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">The purpose of this Guideline is to provide guidance to clinicians who offer vasectomy services. The Guideline covers pre-vasectomy evaluation and consultation of prospective vasectomy patients; techniques for local anesthesia, isolation of the vas deferens and occlusion of the vas deferens during vasectomy; post-operative follow-up; post-vasectomy semen analysis (PVSA) to verify sterility and potential complications and consequences of vasectomy. Currently, the practice of vasectomy is characterized by wide variation in pre-operative counseling, surgical technique and post-operative follow-up. The intent of this Guideline is to provide a set of approaches and procedures that maximizes successful vasectomy outcomes and minimizes failure and other adverse events.</span></p><p data-dcnode-id="5845"><span data-dcnode-id="5846" instrument_node="">The strategies and approaches recommended in this document were derived from evidence-based and consensus-based processes. There is a continually expanding literature on vasectomy. The Panel &nbsp;notes that this document constitutes a clinical approach to the practice of vasectomy. This Guideline is not intended to replace the judgment of an individual clinician faced with a particular patient. As the science relevant to vasectomy evolves and improves, the strategies presented here will require updating to remain consistent with the highest standards of clinical care.</span></p><h3 data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">Methodology</span></h3><p data-dcnode-id="5839"><strong data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">Process for Literature Selection</span></strong><span data-dcnode-id="5840" instrument_node="">. A systematic review was conducted to identify published articles relevant to key questions specified by the Panel (See Appendix C). The key questions focused on identifying necessary elements of pre-operative evaluation and consultation, optimal procedures for anesthetic administration, the least traumatic and most effective procedures for isolation of the vas deferens, the most effective procedures for occluding the vas deferens, the complications and consequences of vasectomy and the necessary components of post-operative follow-up, including semen analysis to verify sterility.</span></p><p data-dcnode-id="5832"><span data-dcnode-id="5838" instrument_node="">Literature searches were performed using the MEDLINE® and POPLINE® databases from January 1949 to August 2011 with the goal of identifying literature broadly relevant to the practice of vasectomy. This literature included studies that focused on the prevalence of vasectomy; the demographics of patients and couples who chose vasectomy; vasectomy operative techniques, including techniques for vas isolation and vas occlusion and associated failure rates; short-term and long-term complications of vasectomy, other outcomes potentially associated with vasectomy (e.g., coronary heart disease, stroke, prostate and testicular cancer, sexual outcomes, psychosocial outcomes) and PVSA procedures and timing. Inclusion criteria for operative procedures were conventional vasectomy (CV) and minimally-invasive vasectomy (MIV), including the no-scalpel vasectomy (NSV) technique. All methods for occluding the vas were included. The following topics were excluded from the scope of the review: laparoscopic vasectomy, vasectomy reversal, post-vasectomy options for pregnancy, treatment of post-vasectomy pain syndrome, examination of antibodies to antigens other than sperm post-vasectomy and techniques for teaching vasectomy. Articles on antibiotic prophylaxis also were excluded as the topic of antibiotic prophylaxis in surgical procedures without entering the urinary tract is covered in an </span><a data-dcnode-id="5834" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/documents/education/clinical-guidance/Antimicrobial-Prophylaxis.pdf" onclick="_gaq.push(['_trackEvent', 'PDF', 'Download', 'documents/education/clinical-guidance/Antimicrobial-Prophylaxis.pdf']);" target="_blank"><span data-dcnode-id="5837" instrument_node="">AUA Best Practice Policy </span><span class="pdf" data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">[pdf]</span></span></a><span data-dcnode-id="5833" instrument_node="">. All settings and all ages of vasectomy patients were included. All study designs were included except for single-group cohort studies on immediate post-operative complications with fewer than 500 participants. Review article references were checked to ensure inclusion of all possibly relevant studies. Multiple reports on the same patient group were carefully examined to ensure exclusion of redundant information.</span></p><p data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">Nearly 2,000 citations were reviewed by title and/or abstract. After application of inclusion and exclusion criteria, 275 articles were chosen to form the evidence base of this Guideline. Data were extracted on study design (e.g., randomized controlled trial, comparative observational study, case-series); pre-operative, operative and post-operative parameters; complications and other consequences of vasectomy (e.g., patient satisfaction, patient regret) and vasectomy effectiveness and failure rates.</span></p><p data-dcnode-id="5823"><strong data-dcnode-id="5828"><span data-dcnode-id="5829" instrument_node="">Quality of Individual Studies and Determination of Evidence Strength</span></strong><span data-dcnode-id="5827" instrument_node="">. Quality of individual studies that were randomized controlled trials (RCTs) or comparative observational studies was assessed using the Cochrane Risk of Bias tool.</span><sup data-dcnode-id="5825"><span data-dcnode-id="5826" instrument_node="">1</span></sup><span data-dcnode-id="5824" instrument_node=""> Since there is no widely-accepted quality assessment tool for single-cohort observational studies, the quality of these studies was not assessed.</span></p><p data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">The categorization of evidence strength is conceptually distinct from the quality of individual studies. Evidence strength refers to the body of evidence available for a particular question and includes consideration of study design; individual study quality; the consistency of findings across studies; the adequacy of sample sizes and the generalizability of samples, settings and treatments for the purposes of the Guideline. The AUA categorizes body of evidence strength (ES) as Grade A (well-conducted RCTs or exceptionally strong observational studies), Grade B (RCTs with some weaknesses of procedure or generalizability or generally strong observational studies) or Grade C (observational studies that are inconsistent, have small sample sizes, or have other problems that potentially confound interpretation of data).</span></p><p data-dcnode-id="5784"><strong data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">AUA Nomenclature: Linking Statement Type to Evidence Strength</span></strong><span data-dcnode-id="5818" instrument_node="">. The AUA nomenclature system explicitly links statement type to body of evidence strength and the Panel's judgment regarding the balance between benefits and risks/burdens (see Table 2).</span><sup data-dcnode-id="5816"><span data-dcnode-id="5817" instrument_node="">2</span></sup><span data-dcnode-id="5815" instrument_node=""> </span><strong data-dcnode-id="5812"><em data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">Standards</span></em></strong><span data-dcnode-id="5811" instrument_node=""> are directive statements that an action should (benefits outweigh risks/burdens) or should not (risks/burdens outweigh benefits) be undertaken based on Grade A or Grade B evidence. </span><strong data-dcnode-id="5808"><em data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">Recommendations</span></em></strong><span data-dcnode-id="5807" instrument_node=""> are directive statements that an action should (benefits outweigh risks/burdens) or should not (risks/burdens outweigh benefits) be undertaken based on Grade C evidence. </span><strong data-dcnode-id="5804"><em data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">Options</span></em></strong><span data-dcnode-id="5803" instrument_node=""> are non-directive statements that leave the decision to take an action up to the individual clinician and patient because the balance between benefits and risks/burdens appears relatively equal or appears unclear; </span><em data-dcnode-id="5801"><span data-dcnode-id="5802" instrument_node="">Options</span></em><span data-dcnode-id="5800" instrument_node=""> may be supported by Grade A, B or C evidence. For some clinical issues, there was little or no evidence from which to construct evidence-based statements. Where gaps in the evidence existed, the Panel provides guidance in the form of </span><em data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">Clinical Principles</span></em><span data-dcnode-id="5797" instrument_node=""> or </span><em data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">Expert Opinion</span></em><span data-dcnode-id="5794" instrument_node=""> with consensus achieved using a modified Delphi technique if differences of opinion existed among Panel members.</span><sup data-dcnode-id="5792"><span data-dcnode-id="5793" instrument_node="">3</span></sup><span data-dcnode-id="5791" instrument_node=""> A </span><em data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">Clinical Principle</span></em><span data-dcnode-id="5788" instrument_node=""> is a statement about a component of clinical care that is widely agreed upon by urologists or other clinicians for which there may or may not be evidence in the medical literature. </span><em data-dcnode-id="5786"><span data-dcnode-id="5787" instrument_node="">Expert Opinion</span></em><span data-dcnode-id="5785" instrument_node=""> refers to a statement, achieved by consensus of the Panel, that is based on members' clinical training, experience, knowledge and judgment and for which there is no evidence.</span></p><p data-dcnode-id="5780"><strong data-dcnode-id="5782"><span data-dcnode-id="5783" instrument_node="">Panel Selection and Peer Review Process</span></strong><span data-dcnode-id="5781" instrument_node="">. The Vasectomy Panel was created in 2008 by the American Urological Association Education and Research, Inc. (AUA). The Practice Guidelines Committee (PGC) of the AUA selected the Panel Chair and Vice Chair who in turn appointed the additional panel members, all of whom have specific expertise with regard to vasectomy.</span></p><p data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">The AUA conducted an extensive peer review process. The initial draft of this Guideline was distributed to 72 peer reviewers; 55 responded with comments. The panel reviewed and discussed all submitted comments and revised the draft as needed. Since the changes were substantial, a second draft was circulated to 64 peer reviewers. The panel reviewed and discussed all submitted comments in response to this second round of peer review and again revised the document. Once finalized, the Guideline was submitted for approval to the PGC. It was then submitted to the AUA Board of Directors for final approval. &nbsp;Funding of the panel was provided by the AUA. Panel members received no remuneration for their work.</span></p><table class="table table-striped" data-dcnode-id="5740" style="width: 100%;"><thead data-dcnode-id="5772"><tr data-dcnode-id="5773"><th data-dcnode-id="5774"><span data-dcnode-id="5777" instrument_node="">Table 2: AUA Nomenclature</span><br data-dcnode-id="5776"><span data-dcnode-id="5775" instrument_node=""> Linking Statement Type to Evidence Strength</span></th></tr></thead><tbody data-dcnode-id="5741"><tr data-dcnode-id="5766"><td data-dcnode-id="5767"><p data-dcnode-id="5768"><strong data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">Standard:</span></strong><span data-dcnode-id="5769" instrument_node=""> Directive statement that an action should (benefits outweigh risks/burdens) or should not (risks/burdens outweigh benefits) be taken based on Grade A or B evidence</span></p></td></tr><tr data-dcnode-id="5760"><td data-dcnode-id="5761"><p data-dcnode-id="5762"><strong data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">Recommendation:</span></strong><span data-dcnode-id="5763" instrument_node=""> Directive statement that an action should (benefits outweigh risks/burdens) or should not (risks/burdens outweigh benefits) be taken based on Grade C evidence</span></p></td></tr><tr data-dcnode-id="5754"><td data-dcnode-id="5755"><p data-dcnode-id="5756"><strong data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">Option:</span></strong><span data-dcnode-id="5757" instrument_node=""> Non-directive statement that leaves the decision regarding an action up to the individual clinician and patient because the balance between benefits and risks/burdens appears equal or appears uncertain based on Grade A, B or C evidence</span></p></td></tr><tr data-dcnode-id="5748"><td data-dcnode-id="5749"><p data-dcnode-id="5750"><strong data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">Clinical Principle:</span></strong><span data-dcnode-id="5751" instrument_node=""> &nbsp;a statement about a component of clinical care that is widely agreed upon by urologists or other clinicians for which there may or may not be evidence in the medical literature</span></p></td></tr><tr data-dcnode-id="5742"><td data-dcnode-id="5743"><p data-dcnode-id="5744"><strong data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">Expert Opinion</span></strong><span data-dcnode-id="5745" instrument_node="">: a statement, achieved by consensus of the Panel, that is based on members' clinical training, experience, knowledge, and judgment for which there is no evidence</span></p></td></tr></tbody></table><span data-dcnode-id="5739" instrument_node="">
</span></div><span data-dcnode-id="5737" instrument_node="">
</span><div data-dcnode-id="5735"><span data-dcnode-id="5736" instrument_node="">
</span></div><span data-dcnode-id="5734" instrument_node="">
</span><a class="anchor" data-dcnode-id="5733" data-feathr-click-track="true" name="x3371"></a><span data-dcnode-id="5732" instrument_node="">
</span><h3 data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">
                The Practice of Vasectomy
            </span></h3><span data-dcnode-id="5729" instrument_node="">
</span><div data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">
</span></div><span data-dcnode-id="5726" instrument_node="">
</span><div data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">
</span></div><span data-dcnode-id="5723" instrument_node="">
</span><div data-dcnode-id="5616"><span data-dcnode-id="5722" instrument_node="">
</span><h4 data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">The Importance of Vasectomy</span></h4><p data-dcnode-id="5710"><span data-dcnode-id="5719" instrument_node="">Vasectomy is the most common non-diagnostic operation performed by urologists in the United States (US). Estimates of the number of vasectomies performed annually in the US vary depending on survey type. Data from the National Study of Family Growth in which only married couples were polled indicate a range from 175,000 to 354,000.</span><sup data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">4</span></sup><span data-dcnode-id="5716" instrument_node=""> In a physician survey, an estimated 526,501 vasectomies were performed in the US in 2002.</span><sup data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">5</span></sup><span data-dcnode-id="5713" instrument_node=""> This number seems to have been approximately stable for the previous decade. More than 75% of vasectomies in the US are done by urologists, and about 90% of urology practices in the US perform vasectomy.</span><sup data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">5-6</span></sup></p><p data-dcnode-id="5702"><span data-dcnode-id="5709" instrument_node="">In 2002, data collected in the US show that vasectomy was used by 5.7% of men ages 15-44 and that this represents the fourth most commonly-used contraceptive method. The first three were condoms, used by 29.5% of men, oral contraceptives for women used by 25.6% of couples and tubal ligation used by 8.1% of couples.</span><sup data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">7</span></sup><span data-dcnode-id="5706" instrument_node=""> Compared to tubal ligation , which is also a method of permanent contraception, vasectomy is equally effective in preventing pregnancy; however, vasectomy is simpler, faster, safer and less expensive. Vasectomy is one of the most cost-effective of all methods of contraception; its cost is about one-fourth of the cost of tuba lligation.</span><sup data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">8</span></sup><span data-dcnode-id="5703" instrument_node=""> Vasectomy requires less time off work, requires only local rather than general anesthesia and is usually performed in a doctor's office or clinic. The potential complications of vasectomy are less serious than those of tubal ligation.</span></p><p data-dcnode-id="5692"><span data-dcnode-id="5701" instrument_node="">Despite the clear advantages of vasectomy, prevalence data for 1998-2002 show that tubal ligation was performed about two to three times more often than vasectomy.</span><sup data-dcnode-id="5699"><span data-dcnode-id="5700" instrument_node="">4</span></sup><span data-dcnode-id="5698" instrument_node=""> Among all women in 2002, married and unmarried, ages 15 to 44 years in the United States, only 5.7% relied on vasectomy for contraception compared to 16.7% who relied on tubal ligation.</span><sup data-dcnode-id="5696"><span data-dcnode-id="5697" instrument_node="">9</span></sup><span data-dcnode-id="5695" instrument_node=""> Even among married women and married men who desire permanent contraception, in the US the prevalence of tubal ligation has exceeded the prevalence of vasectomy.</span><sup data-dcnode-id="5693"><span data-dcnode-id="5694" instrument_node="">10</span></sup></p><p data-dcnode-id="5684"><span data-dcnode-id="5691" instrument_node="">Worldwide, the discrepancy between vasectomy and tubal ligation is even more marked than in the US. Data compiled in 2008 by the Population Division of the Department of Economic and Social Affairs of the United Nations show that 33 million married women ages 15-49 relied on vasectomy for contraception compared to 225 million who relied on tubal ligation.</span><sup data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">11</span></sup><span data-dcnode-id="5688" instrument_node=""> There are only eight nations in which vasectomy use is equal to or more frequent than tubal ligation for contraception – Korea, Canada, the United Kingdom, New Zealand, Bhutan, the Netherlands, Denmark and Austria (</span><a data-dcnode-id="5686" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/esa/population/publications/contraceptive2011/wallchart_front.pdf" onclick="_gaq.push(['_trackEvent', 'PDF', 'Download', 'http://www.un.org/esa/population/publications/contraceptive2011/wallchart_front.pdf']);" target="_blank"><span data-dcnode-id="5687" instrument_node="">World Contraceptive Use 2011</span></a><span data-dcnode-id="5685" instrument_node="">).</span></p><p data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">Given that vasectomy and tubal ligation &nbsp;have equivalent contraceptive effectiveness and that vasectomy enjoys advantages compared to tubal sterilization of lower cost, less pain, greater safety and faster recovery, vasectomy should be considered for permanent contraception much more frequently than is the current practice in the United States and most nations of the world.</span></p><h4 data-dcnode-id="5680"><span data-dcnode-id="5681" instrument_node="">Preoperative Practice</span></h4><p data-dcnode-id="5677"><strong data-dcnode-id="5678"><span data-dcnode-id="5679" instrument_node="">Background Information About Who Chooses Vasectomy and Why</span></strong></p><p data-dcnode-id="5666"><em data-dcnode-id="5675"><span data-dcnode-id="5676" instrument_node="">Reasons for Choosing Vasectomy.</span></em><span data-dcnode-id="5674" instrument_node=""> Several studies have addressed the reasons that men or their partners choose vasectomy.</span><sup data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">10,</span></sup><sup data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">12-16</span></sup><span data-dcnode-id="5669" instrument_node=""> The decision for a partner to undergo a sterilization procedure usually is initiated by the female partner. The decision about which partner undergoes a sterilization procedure often is based on information obtained by one of the partners from medical professionals or from friends. Dissatisfaction with or failure of other contraceptive methods may prompt one or both partners to consider surgical sterilization for one of them. In the US, couples with higher numbers of children, higher educational levels and Caucasian ethnicity are more likely to choose vasectomy. </span><sup data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">10</span></sup></p><p data-dcnode-id="5662"><span data-dcnode-id="5665" instrument_node="">One study surveyed 400 couples regarding their choice of sterilization. Vasectomy was chosen when it was believed to be "easier" than tubal ligation, the physician recommended a vasectomy, there was effective couple communication and the previous method of contraception involved the use of condoms. The use of an intrauterine device (IUD) and the use of coitus interruptus were associated with the selection of tubal ligation. More people known by the wife to be satisfied with either vasectomy or tubal ligation predicted the choice of either vasectomy or tubal occlusion.</span><sup data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">12</span></sup></p><p data-dcnode-id="5658"><span data-dcnode-id="5661" instrument_node="">An additional study looked at 84 couples in Scotland who selected vasectomy for contraception. In 46% of couples, both spouses were willing to be sterilized, whereas 23% of men requested vasectomy because their wives were unwilling to be sterilized and 24% of men insisted on vasectomy as their contribution to the partnership. The remaining couples gave medical reasons contraindicating a tubal ligation. The main influences for making the choice of vasectomy were favorable reports from other men (40%) and recommendations by general practitioners (21%).</span><sup data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">13</span></sup></p><p data-dcnode-id="5654"><span data-dcnode-id="5657" instrument_node="">One group examined the psychological correlates of vasectomy in 74 men seeking vasectomy at a urology clinic in a tertiary care teaching hospital in the mid-western US. Half of the men had contemplated vasectomy for one year or less and 85% had a high level of certainty regarding their decision. Ninety-one percent of men indicated that their wives or partners were involved in the decision and 90% indicated that their wives or partners were very certain about the decision (data were not collected from the partners). Mean anxiety level was 3.5 out of 10 (10 was the highest possible anxiety level). The most common reasons for anxiety were anticipated pain (27%) and fear of the unknown (23%). Finality of the procedure was a source of anxiety in only 5%. Fifteen percent of men indicated they understood that vasectomy was not reversible, while 30% believed that it was reversible.</span><sup data-dcnode-id="5655"><span data-dcnode-id="5656" instrument_node="">14</span></sup></p><p data-dcnode-id="5650"><span data-dcnode-id="5653" instrument_node="">One group reported on 719 men undergoing vasectomy compared to similar men identified from a national practice-based survey. The most common reason for choosing vasectomy over other dependably reversible methods of contraception was that vasectomy was perceived as the most secure way of avoiding pregnancy (50% of respondents). Twenty-two percent of respondents stated that the main reason was that they or their partners disliked other contraceptive measures, and 7% reported the reason was a recent unplanned pregnancy or pregnancy scare. Sixty-two percent of men responded that they chose male sterilization over tubal ligation because it was safer and simpler; an additional 14% stated it was their turn to take responsibility for contraception. Health care providers (31%) were the most commonly reported source of information that helped in the decision-making process, followed by wives/partners (25%) and friends (23%).</span><sup data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">15</span></sup></p><p data-dcnode-id="5637"><em data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">Characteristics of Patients and Couples Who Chose Vasectomy.</span></em><span data-dcnode-id="5647" instrument_node=""> Several studies examined the characteristics of men or their partners who choose vasectomy.</span><sup data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">14,</span></sup><sup data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">15,</span></sup><sup data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">17-19</span></sup><span data-dcnode-id="5640" instrument_node=""> One such study examined data from the 1991 National Survey of Men and focused on a subset of 1,671 married men aged 20 to 39 years. Eleven and a half percent of men previously had a vasectomy and 12.6% of women had undergone a tubal ligation. Characteristics that were significantly (p&lt;0.05) associated with choosing a vasectomy were older husband's age, white race of either spouse, living in the western US, smaller number of pregnancies in the current marriage, longer duration of marriage, prior failure with a male method of contraception and wife without religious affiliation. The husband's religion had no effect on the choice of vasectomy.</span><sup data-dcnode-id="5638"><span data-dcnode-id="5639" instrument_node="">17</span></sup></p><p data-dcnode-id="5630"><span data-dcnode-id="5636" instrument_node="">In a large case control study on the relationship of vasectomy and prostate cancer from New Zealand, the demographic characteristics of 1,261 men or their partners who chose a vasectomy were examined.</span><sup data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">18</span></sup><span data-dcnode-id="5633" instrument_node=""> Significant predictors for vasectomy included advanced vocational qualifications, non-Catholic men and men who had fathered one to five children compared with men who had no children. Men with greater numbers of marriages and with more highly-educated wives were significantly more likely to have had a vasectomy (p&lt;0.05). After adjusting for age, the following characteristics were not significant predictors (p&gt;0.05) for vasectomy: socioeconomic status, geographic region of residence and age at first marriage.</span><sup data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">18</span></sup></p><p data-dcnode-id="5626"><span data-dcnode-id="5629" instrument_node="">Additional reporting included characteristics of men undergoing vasectomy compared to a comparison group. Men undergoing vasectomy differed from the comparison group as follows: a higher percentage were married or cohabitating (91% vs 62% in the general US population), a higher proportion of non-Hispanic whites (87% vs 75%) and a greater percentage of vasectomized men had a bachelor's degree (48% vs 25%). The response rate for this survey was low: only 21% of eligible practices provided data.</span><sup data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">15</span></sup></p><p data-dcnode-id="5622"><span data-dcnode-id="5625" instrument_node="">One study examined the use of vasectomy in the 2002 National Survey of Family Growth, a nationally representative survey of US residents ages 15-44 years. They evaluated differences between groups of patients in which the man did and did not have a vasectomy. For men between 30-45 years of age, white race, ever being married, older age, and increasing number of offspring were associated with increased utilization of vasectomy.</span><sup data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">16</span></sup></p><p data-dcnode-id="5618"><span data-dcnode-id="5621" instrument_node="">An additional study also examined data from male participants in the 2002 National Survey of Family Growth. They found that 13.3% of married men reported having had a vasectomy and 13.8% reported tubal sterilization in their partners. It is notable that tubal sterilization was reported by 21.3% of married women participants of the same ages in the 2002 National Survey of Family Growth. The likelihood of vasectomy increased with older age and greater number of biological children, non-Hispanic white ethnicity and having ever gone to a family planning clinic. Tubal ligation as the contraceptive method was more likely among partners of men who had not attended college, those of older age and those with live births.</span><sup data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">10</span></sup></p><span data-dcnode-id="5617" instrument_node="">
</span></div><span data-dcnode-id="5615" instrument_node="">
</span><div data-dcnode-id="5613"><span data-dcnode-id="5614" instrument_node="">
</span></div><span data-dcnode-id="5612" instrument_node="">
</span><a class="anchor" data-dcnode-id="5611" data-feathr-click-track="true" name="x3374"></a><span data-dcnode-id="5610" instrument_node="">
</span><h3 data-dcnode-id="5608"><span data-dcnode-id="5609" instrument_node="">
                General Guideline Statements
            </span></h3><span data-dcnode-id="5607" instrument_node="">
</span><div data-dcnode-id="5605"><span data-dcnode-id="5606" instrument_node="">
</span></div><span data-dcnode-id="5604" instrument_node="">
</span><div data-dcnode-id="5602"><span data-dcnode-id="5603" instrument_node="">
</span></div><span data-dcnode-id="5601" instrument_node="">
</span><div data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">
</span></div><span data-dcnode-id="5598" instrument_node="">
</span><div data-dcnode-id="5596"><span data-dcnode-id="5597" instrument_node="">
</span></div><span data-dcnode-id="5595" instrument_node="">
</span><h4 data-dcnode-id="5593"><span data-dcnode-id="5594" instrument_node="">
                    Guideline Statement 1
                </span></h4><span data-dcnode-id="5592" instrument_node="">
</span><div data-dcnode-id="5585"><span data-dcnode-id="5591" instrument_node="">
</span><p data-dcnode-id="5587"><span data-dcnode-id="5590" instrument_node="">A preoperative interactive consultation should be conducted, preferably in person. If an in-person consultation is not possible, then preoperative consultation by telephone or electronic communication is an acceptable alternative. </span><em data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">Expert Opinion</span></em></p><span data-dcnode-id="5586" instrument_node="">
</span></div><span data-dcnode-id="5584" instrument_node="">
</span><p data-dcnode-id="5579"><span data-dcnode-id="5583" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="5581" data-feathr-click-track="true" data-target="#x3368" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="5582" instrument_node="">Discussion</span></a><span data-dcnode-id="5580" instrument_node="">
</span></p><span data-dcnode-id="5578" instrument_node="">
</span><div class="modal fade" data-dcnode-id="5540" id="x3368" role="dialog"><span data-dcnode-id="5577" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="5542"><span data-dcnode-id="5576" instrument_node="">
</span><div class="modal-content" data-dcnode-id="5544"><span data-dcnode-id="5575" instrument_node="">
</span><div class="modal-header" data-dcnode-id="5567"><span data-dcnode-id="5574" instrument_node="">
</span><button class="close" data-dcnode-id="5572" data-dismiss="modal" type="button"><span data-dcnode-id="5573" instrument_node="">×</span></button><span data-dcnode-id="5571" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="5569"><span data-dcnode-id="5570" instrument_node="">Discussion</span></h4><span data-dcnode-id="5568" instrument_node="">
</span></div><span data-dcnode-id="5566" instrument_node="">
</span><div class="modal-body" data-dcnode-id="5552"><span data-dcnode-id="5565" instrument_node="">
</span><p data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">There should be a consultation with the patient prior to vasectomy. Similar to any surgical procedure, vasectomy requires an interactive discussion regarding risks, benefits and alternatives. Patients selecting vasectomy are choosing to make a permanent change in their fertility status. Some patients later regret this decision. &nbsp;Therefore, a thoughtful preoperative discussion is important. The goal of this discussion is to ensure that the patient has appropriate expectations regarding the preoperative, operative and post-operative consequences of the vasectomy choice. A face-to-face discussion is not necessary if the distance between the patient and surgeon or other factors preclude an in-person meeting, but the consultation setting should allow the surgeon to take the patient's reproductive and medical history; the patient to ask questions of the surgeon and receive answers and the surgeon to provide pre-operative, operative and post-operative information relevant to the patient's decision.</span></p><p data-dcnode-id="5558"><span data-dcnode-id="5562" instrument_node="">Some men need help making the decision to have a vasectomy. The needs for support in making this decision were examined.</span><sup data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">20</span></sup><span data-dcnode-id="5559" instrument_node=""> Forty-eight percent of men reported that the decision to undergo vasectomy was easy; 45% felt that the decision was difficult. Decisional difficulty was associated with the permanence of the procedure, risk of death of a child, fear of the unknown, fear of pain during the procedure and uncertainty about the effectiveness of the procedure. Physicians perceived that the factors that made the decision difficult for patients were fear of pain during the procedure, permanence of the procedure and fear of complications. The consultation procedure should be sufficient to allow the patient to address these kinds of concerns with the surgeon.</span></p><p data-dcnode-id="5556"><span data-dcnode-id="5557" instrument_node="">The surgeon performing vasectomy should obtain a general medical history, with particular emphasis on bleeding diatheses and other possible contraindications to surgery. For example, if a patient requires chronic anticoagulation and the risks of stopping anticoagulation are significant, then the surgeon and patient should consider alternative methods of family planning.</span></p><p data-dcnode-id="5554"><span data-dcnode-id="5555" instrument_node="">A physical exam of the genitalia should be performed prior to vasectomy. This exam may be performed immediately before the operative procedure if the preoperative consultation was not conducted in person. Physical examination at the time of in-person preoperative consultation is highly desirable because it may &nbsp;identify genital pathology, such as a testis tumor or undescended testis, which would contraindicate routine bilateral vasectomy. In addition, physical examination may identify patients who are not good candidates for local anesthesia because of unusual scrotal sensitivity, patients who are too uncomfortable or too anxious to tolerate vasectomy under local anesthesia or patients whose vasa are especially difficult to palpate. It is preferable to do this examination far enough in advance of the vasectomy to allow the surgeon to plan for oral or other sedation if necessary. If preoperative counseling cannot be done in person, the preoperative physical examination may be delayed to a later date or to the day of surgery if necessary.</span></p><span data-dcnode-id="5553" instrument_node="">
</span></div><span data-dcnode-id="5551" instrument_node="">
</span><div class="modal-footer" data-dcnode-id="5546"><span data-dcnode-id="5550" instrument_node="">
</span><button class="btn btn-default" data-dcnode-id="5548" data-dismiss="modal" type="button"><span data-dcnode-id="5549" instrument_node="">Close</span></button><span data-dcnode-id="5547" instrument_node="">
</span></div><span data-dcnode-id="5545" instrument_node="">

</span></div><span data-dcnode-id="5541" instrument_node="">

</span><hr data-dcnode-id="5538"><span data-dcnode-id="5537" instrument_node="">
</span><h4 data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">
                    Guideline Statement 2
                </span></h4><span data-dcnode-id="5534" instrument_node="">
</span><div data-dcnode-id="5501"><span data-dcnode-id="5533" instrument_node="">
</span><p data-dcnode-id="5529"><span data-dcnode-id="5532" instrument_node="">The minimum and necessary concepts that should be discussed in a preoperative vasectomy consultation include the following: </span><em data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">Expert Opinion</span></em></p><ul data-dcnode-id="5503"><li data-dcnode-id="5527"><span data-dcnode-id="5528" instrument_node="">Vasectomy is intended to be a permanent form of contraception.</span></li><li data-dcnode-id="5525"><span data-dcnode-id="5526" instrument_node="">Vasectomy does not produce immediate sterility.</span></li><li data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">Following vasectomy, another form of contraception is required until vas occlusion is confirmed by post- vasectomy semen analysis (PVSA).</span></li><li data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">Even after vas occlusion is confirmed, vasectomy is not 100% reliable in preventing pregnancy.</span></li><li data-dcnode-id="5519"><span data-dcnode-id="5520" instrument_node="">The risk of pregnancy after vasectomy is approximately 1 in 2,000 for men who have post-vasectomy azoospermia or PVSA showing rare non-motile sperm (RNMS).</span></li><li data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">Repeat vasectomy is necessary in ≤1% of vasectomies, provided that a technique for vas occlusion known to have a low occlusive failure rate has been used.</span></li><li data-dcnode-id="5515"><span data-dcnode-id="5516" instrument_node="">Patients should refrain from ejaculation for approximately one week after vasectomy.</span></li><li data-dcnode-id="5510"><span data-dcnode-id="5514" instrument_node="">Options for fertility after vasectomy include vasectomy reversal and sperm retrieval with </span><em data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">in vitro</span></em><span data-dcnode-id="5511" instrument_node=""> fertilization. These options are not always successful, and they may be expensive.</span></li><li data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">The rates of surgical complications such as symptomatic hematoma and infection are 1-2%. These rates vary with the surgeon's experience and the criteria used to diagnose these conditions.</span></li><li data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">Chronic scrotal pain associated with negative impact on quality of life occurs after vasectomy in about 1-2% of men. Few of these men require additional surgery.</span></li><li data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">Other permanent and non-permanent alternatives to vasectomy are available.</span></li></ul><span data-dcnode-id="5502" instrument_node="">
</span></div><span data-dcnode-id="5500" instrument_node="">
</span><p data-dcnode-id="5495"><span data-dcnode-id="5499" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="5497" data-feathr-click-track="true" data-target="#x3367" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="5498" instrument_node="">Discussion</span></a><span data-dcnode-id="5496" instrument_node="">
</span></p><span data-dcnode-id="5494" instrument_node="">
</span><div class="modal fade" data-dcnode-id="5356" id="x3367" role="dialog"><span data-dcnode-id="5493" instrument_node="">

</span><h4 class="modal-title" data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">Discussion</span></h4><span data-dcnode-id="5484" instrument_node="">
</span></div><span data-dcnode-id="5482" instrument_node="">
</span><div class="modal-body" data-dcnode-id="5368"><span data-dcnode-id="5481" instrument_node="">
</span><p data-dcnode-id="5477"><em data-dcnode-id="5479"><span data-dcnode-id="5480" instrument_node="">Vasectomy as a permanent form of contraception.</span></em><span data-dcnode-id="5478" instrument_node=""> It is important for patients to understand that vasectomy is intended to be a permanent form of contraception. For this reason, the surgeon should be sure that the patient's request for vasectomy is soundly reasoned and not made precipitously. Some states require a delay or cool-down period between signing a consent form for vasectomy and the surgical date. The experience of the Panel members is that almost all men who request vasectomy have given the procedure serious thought for months or years, making a cool-down period superfluous in most cases. Nevertheless, state requirements must be observed.</span></p><p data-dcnode-id="5473"><em data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">Vasectomy does not produce immediate sterility. </span></em><span data-dcnode-id="5474" instrument_node="">All patients have motile sperm in the ejaculate after vasectomy for some period of time. Other methods of contraception should be utilized until azoospermia or rare non-motile sperm (RNMS, ≤100,000 non-motile sperm/mL) is achieved. The time from vasectomy to azoospermia or RNMS can vary from weeks to months based on multiple factors, including frequency of ejaculation, patient age, surgical technique and variations in the anatomy of the vasal ampullae and/or seminal vesicles (for detailed discussion, see Section 6: Postoperative Practice). PVSA showing azoospermia or RNMS is necessary for the surgeon to be able to tell the patient if he can rely on his vasectomy for contraception.</span></p><p data-dcnode-id="5471"><span data-dcnode-id="5472" instrument_node="">A patient can be considered to be sterile if the PVSA shows azoospermia or RNMS. Patients whose post-operative semen analyses do not meet these criteria may eventually require a repeat vasectomy to assure occlusive effectiveness. This possibility should be mentioned in the preoperative visit.</span></p><p data-dcnode-id="5464"><em data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">Another form of contraception is required until vas occlusion is confirmed after vasectomy. </span></em><span data-dcnode-id="5468" instrument_node="">Sperm that are left in the male reproductive system distal to the vasectomy site may retain the ability to fertilize an ovum.</span><sup data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">21-24</span></sup><span data-dcnode-id="5465" instrument_node=""> Another form of contraception should be used routinely until PVSA shows azoospermia or RNMS.</span></p><p data-dcnode-id="5446"><em data-dcnode-id="5462"><span data-dcnode-id="5463" instrument_node="">Risk of pregnancy after vasectomy. </span></em><span data-dcnode-id="5461" instrument_node="">Vasectomy is not 100% reliable in preventing pregnancy even after vas occlusion is confirmed by PVSA. There is a very small but finite risk of pregnancy after vasectomy even if the PVSA demonstrates azoospermia. The pregnancy rate in partners of men who have documented azoospermia after a vasectomy is about 1 in 2,000.</span><sup data-dcnode-id="5459"><span data-dcnode-id="5460" instrument_node="">25-29</span></sup><span data-dcnode-id="5458" instrument_node=""> At the Elliot Smith Clinic in the UK, about three-fourths of 16,796 vasectomies were performed with mucosal cautery (MC) and the remainder were performed with ligation, excision and folding back. This Clinic reported a risk of about 1 in 2,800 after documented azoospermia on two consecutive semen analyses.</span><sup data-dcnode-id="5456"><span data-dcnode-id="5457" instrument_node="">25-27</span></sup><span data-dcnode-id="5455" instrument_node=""> Marie Stopes International, which used nondivisional extended electrocautery, reported that approximately 1 in 2,500 vasectomies resulted in pregnancy after confirmation of azoospermia on two consecutive samples.</span><sup data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">29</span></sup><span data-dcnode-id="5452" instrument_node="">&nbsp; Alderman et al. (1988), who used ligation and excision for vas occlusion, reported four pregnancies among 5,331 men who completed the recommended PVSA regimen, giving a rate of about 1 in 1,300.</span><sup data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">28</span></sup><span data-dcnode-id="5449" instrument_node="">&nbsp; However, in other studies using ligation and excision without fascial interposition (FI), the risk of pregnancy has been reported to range from 1 in 30030 to 1 in 66.</span><sup data-dcnode-id="5447"><span data-dcnode-id="5448" instrument_node="">31</span></sup></p><p data-dcnode-id="5434"><em data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">Need for repeat vasectomy/risk of failure. </span></em><span data-dcnode-id="5443" instrument_node="">&nbsp;The possible need for repeat vasectomy, although rare, should be discussed with the patient in the preoperative visit. Vasectomy failure is defined as failure to achieve azoopsermia or RNMS or the occurrence of pregnancy. The patient may be told that the risk of vasectomy failure requiring repeat vasectomy is less than 1% if a technique of vas occlusion known to have a low occlusive failure rate was used during vasectomy (see Discussion under Guideline Statements 7 and 8 &nbsp;regarding occlusive failure rates).</span><sup data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">15,</span></sup><sup data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">26,</span></sup><sup data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">29,</span></sup><sup data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">32-47</span></sup></p><p data-dcnode-id="5430"><em data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">Patients should refrain from ejaculation for approximately one week after vasectomy.</span></em><span data-dcnode-id="5431" instrument_node=""> There is considerable variability among vasectomy surgeons regarding the suggested period of sexual abstinence following vasectomy. The opinion of the Panel is that patients should refrain from ejaculation for approximately one week after vasectomy to allow the surgical sites to heal and to allow for development of luminal occlusion of the vas after methods that use MC for vasal occlusion.</span></p><p data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">Patients who notice hematospermia during the first month or two after vasectomy may be reassured that this will resolve spontaneously and has no clinical significance.</span></p><p data-dcnode-id="5418"><em data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node="">Options for fertility after vasectomy. </span></em><span data-dcnode-id="5425" instrument_node="">&nbsp;Vasectomy reversal, sperm retrieval combined with </span><em data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">in vitro</span></em><span data-dcnode-id="5422" instrument_node=""> fertilization (IVF) and/or intracytoplasmic sperm injection (ICSI) or cryopreserved sperm obtained before vasectomy, if available, may be used to achieve fertility after vasectomy.</span><sup data-dcnode-id="5420"><span data-dcnode-id="5421" instrument_node="">48</span></sup><span data-dcnode-id="5419" instrument_node=""> With these techniques, the chance for pregnancy varies with individual patient conditions and circumstances such as the age of the female partner, the number of years between a vasectomy and its reversal and the number of actively motile sperm after thawing of a cryopreserved specimen. In general, pregnancy with live birth occurs in approximately one of two couples who attempt these techniques. This pregnancy rate is less than the pregnancy rate in couples in whom the male partner has not had a vasectomy. In addition, these reproductive techniques may be expensive.</span></p><p data-dcnode-id="5400"><em data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">Symptomatic hematoma and infection rates. </span></em><span data-dcnode-id="5415" instrument_node="">Many studies with sample sizes &gt;500 patients reported rates of immediate post-operative local complications;</span><sup data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">37,</span></sup><sup data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">49-59</span></sup><span data-dcnode-id="5410" instrument_node=""> rates of hematoma and infection were 1 to 2% in most series. There is some evidence that rates are lowest among urologists compared to family physicians and general surgeons.</span><sup data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">50</span></sup><span data-dcnode-id="5407" instrument_node=""> It is important to note that in this group of studies the method of vas isolation and occlusion often was not reported, making it unclear if surgical technique was related to complication rate. Although these studies were consistent in their findings, they were observational and largely retrospective, and, therefore, present an unknown risk of under-reporting. In addition to these reports of post-operative hematoma and infection in studies with sample sizes &gt; 500 patients, there are very rare case reports of Fournier's gangrene after vasectomy</span><sup data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">60-64</span></sup><span data-dcnode-id="5404" instrument_node=""> including one patient in Europe who died.</span><sup data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">62</span></sup><span data-dcnode-id="5401" instrument_node=""> The opinion of the Panel is that patients should be counseled that the risk of hematoma and wound infection after vasectomy is approximately 1-2%.</span></p><p data-dcnode-id="5384"><em data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">Chronic scrotal pain. </span></em><span data-dcnode-id="5397" instrument_node="">Rarely, some men complain of persistent unilateral or bilateral scrotal pain after vasectomy. The medical literature on post-vasectomy pain is comprised of poor-quality studies characterized by small sample sizes, failure to report inclusion criteria, failure to use validated pain measures, high non-response rates, poorly-specified definitions of outcomes, highly variable rates and lack of clarity regarding whether active or passive surveillance was used to determine chronic pain rates. The opinion of the Panel is that the most important information for patient counseling is the risk of chronic scrotal pain which is severe enough to cause the patient to seek medical attention and/or to interfere with quality of life. The most robust study of this indicates a 0.9% rate of such a pain seven months after the surgery.</span><sup data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">65</span></sup><span data-dcnode-id="5394" instrument_node=""> Only three studies reported follow-up of three years or more regarding severe chronic scrotal pain after vasectomy. One group reported in a single-group retrospective study that at 4.8 years of follow-up, 2.2% of vasectomized men reported chronic scrotal pain sufficient to exert an adverse impact on quality of life.</span><sup data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">66</span></sup><span data-dcnode-id="5391" instrument_node=""> An additional group reported in a prospective single-cohort design with four years of follow-up that 5% of vasectomized men sought medical attention because of testicular pain.</span><sup data-dcnode-id="5389"><span data-dcnode-id="5390" instrument_node="">67</span></sup><span data-dcnode-id="5388" instrument_node=""> In the sole comparative study, at 3.9 years of follow-up 6.0% of vasectomized men reported pain severe enough to motivate the seeking of medical care compared to 2.0% of non-vasectomized men.</span><sup data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">68</span></sup><span data-dcnode-id="5385" instrument_node=""> The opinion of the Panel is that chronic scrotal pain severe enough to interfere with quality of life occurs in 1-2% of men after vasectomy.&nbsp; Medical or surgical therapy is usually, but not always, effective in improving this chronic pain. Few men require surgical treatment for chronic scrotal pain that may occur after vasectomy.</span></p><p data-dcnode-id="5380"><em data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">Permanent and non-permanent vasectomy alternatives. </span></em><span data-dcnode-id="5381" instrument_node="">As with any surgical procedure, alternatives to vasectomy should be discussed. Benefits and risks of other permanent methods of contraception, (e.g., tubal sterilization) and/or non-permanent options for the patient (e.g., barrier methods) and partner (e.g., oral or injectable contraceptives and barrier methods) should be reviewed.</span></p><p data-dcnode-id="5376"><em data-dcnode-id="5378"><span data-dcnode-id="5379" instrument_node="">Additional relevant information.</span></em><span data-dcnode-id="5377" instrument_node=""> During the preoperative consultation, it is important to discuss the reproductive status of the patient's female partner. If the chance for pregnancy in the female partner is poor, the need for vasectomy may be less than the couple initially expected. In addition, if the female partner is pregnant at the time of the preoperative consultation, the couple may be advised to consider delaying the vasectomy until after delivery to avoid regret about vasectomy, which might occur if the pregnancy is lost unexpectedly.</span></p><p data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Clinicians also should provide verbal and/or written instructions regarding post-operative care. The patient should wear supportive undergarments immediately after the procedure to reduce pain caused by tension on the spermatic cord. This support should be continued until the patient is comfortable without it. Mild swelling and pain are common for a few days. The patient should take oral pain medication as recommended by his physician.</span></p><p data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Application of cold temperatures to the scrotum post-operatively is optional. In general, the patient should keep the surgical site clean and dry, but showers may be permitted the day after the surgery including gentle washing of the surgical site(s) with soap and water. Swimming or bathing in a tub of water should be avoided for three to five days.</span></p><p data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">In the absence of bothersome discomfort, patients may return to non-physical work on the day of or the day after vasectomy. The patient should be provided access to the doctor or his or her staff and should be instructed to call in the event of unusually severe pain, excessive bleeding or drainage, excessive swelling, redness, fever or any other problem that concerns the patient. Physical work or physical recreational activity may be resumed when permitted by pain tolerance.</span></p><span data-dcnode-id="5369" instrument_node="">
</span></div><span data-dcnode-id="5367" instrument_node="">
