</span><div data-dcnode-id="3246"><span data-dcnode-id="3498" instrument_node="">
</span><h4 data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">Background Information About Patient Follow-Up and Post-Vasectomy Semen Analysis</span></h4><p data-dcnode-id="3482"><span data-dcnode-id="3495" instrument_node="">PVSA is used to confirm the effectiveness of a vasectomy postoperatively (for definitions, see Table 6). </span><strong data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">Vasectomy effectiveness</span></strong><span data-dcnode-id="3492" instrument_node=""> can be defined as either </span><strong data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">contraceptive effectiveness</span></strong><span data-dcnode-id="3489" instrument_node=""> or </span><strong data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">occlusive effectiveness.</span></strong><span data-dcnode-id="3486" instrument_node=""> The standard definition of contraceptive effectiveness is the absence of pregnancy. The standard definition of occlusive effectiveness is post-vasectomy azoospermia. However, some men fail to achieve azoospermia after vasectomy yet never father a pregnancy. For example, one study found sperm in the semen of 18 of 186 (9.7%) men prior to vasectomy reversal.</span><sup data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">251</span></sup><span data-dcnode-id="3483" instrument_node=""> The average time since vasectomy was 10.7 years and no pregnancies occurred in the partners of these 18 men. Thus the definition of occlusive effectiveness should not be restricted to azoospermia but should include those men whose PVSAs show rare non-motile sperm (RNMS, or ≤100,000 non-motile sperm/mL) and no sperm motility.</span></p><p data-dcnode-id="3469"><em data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">Vasectomy failure.</span></em><span data-dcnode-id="3479" instrument_node=""> Vasectomy failure is the occurrence of pregnancy or failure to achieve azoospermia or RNMS after a reasonable period of time following vasectomy. Vasectomy failure may be a </span><em data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">technical failure</span></em><span data-dcnode-id="3476" instrument_node=""> resulting from a surgical error such as occluding one vas twice without occluding the other vas or failure to identify the very rare situation of vas duplication on one side. </span><em data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">Technical </span></em><span data-dcnode-id="3473" instrument_node="">failure is characterized by persistently normal or nearly normal motile sperm counts and sperm motility after vasectomy. Vasectomy failure also may result from </span><em data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">recanalization</span></em><span data-dcnode-id="3470" instrument_node=""> at the vasectomy site.</span></p><p data-dcnode-id="3464"><span data-dcnode-id="3468" instrument_node="">Recanalization following vasectomy should be suspected if motile sperm or rising sperm concentrations are seen after a routine PVSA has shown azoospermia or RNMS. Recanalization can be either transient or persistent based on the results of serial PVSAs. It is impossible to know the true incidence of late recanalization because PVSA is rarely repeated after a PVSA shows azoospermia or RNMS. Pregnancy due to recanalization is estimated to occur after approximately 1 in 2000 vasectomies or less often.</span><sup data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">25-29</span></sup><span data-dcnode-id="3465" instrument_node=""> The incidence of recanalization is very likely greater than the reported rate of pregnancy after post-vasectomy azoospermia because not all recanalizations result in pregnancy.</span></p><table class="table table-bordered table-striped" data-dcnode-id="3434" style="width: 100%;"><thead data-dcnode-id="3460"><tr data-dcnode-id="3461"><th data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Table 6: Definitions for Post-Vasectomy Semen Analysis (PVSA)</span></th></tr></thead><tbody data-dcnode-id="3435"><tr data-dcnode-id="3454"><td data-dcnode-id="3455"><p data-dcnode-id="3456"><strong data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Azoospermia</span></strong><span data-dcnode-id="3457" instrument_node="">: Absence of sperm during microscopic exam of at least 50 Hpfs in a single well mixed, uncentrifuged semen specimen.</span></p></td></tr><tr data-dcnode-id="3448"><td data-dcnode-id="3449"><p data-dcnode-id="3450"><strong data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Rare non-motile sperm (RNMS)</span></strong><span data-dcnode-id="3451" instrument_node="">: Presence of ≤100,000 non-motile sperm/mL based on microscopic exam of at least 50 Hpfs in a single well mixed, uncentrifuged post-vasectomy semen specimen assuming no motile sperm are observed</span></p></td></tr><tr data-dcnode-id="3442"><td data-dcnode-id="3443"><p data-dcnode-id="3444"><strong data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Recanalization</span></strong><span data-dcnode-id="3445" instrument_node="">: A histologic diagnosis that shows reconnection of the vas ends, either directly or by microcanaliculi, after vasectomy. Recanalization can be suspected clinically based on PVSA results or after an unexpected post-vasectomy pregnancy if a previous PVSA showed azoospermia or RNMS.</span></p></td></tr><tr data-dcnode-id="3436"><td data-dcnode-id="3437"><p data-dcnode-id="3438"><strong data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">Sterility</span></strong><span data-dcnode-id="3439" instrument_node="">: The inability to cause pregnancy</span></p></td></tr></tbody></table><p data-dcnode-id="3433"></p><p data-dcnode-id="3429"><em data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">PVSA Principles. </span></em><span data-dcnode-id="3430" instrument_node="">Controversies in the timing, technique, reporting and significance of PVSA include the following:</span></p><ul data-dcnode-id="3408"><li class="listorder" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">When the first PVSA should be done</span></li><li class="listorder" data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">Number of PVSAs that should be done</span></li><li class="listorder" data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Necessity for the PVSA to be performed on a fresh specimen</span></li><li class="listorder" data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Necessity for centrifugation of the specimen</span></li><li class="listorder" data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Reliability of PVSAs sent for analysis by mail</span></li><li class="listorder" data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">Reliability of PVSA home test kits</span></li><li class="listorder" data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">Criteria of vasectomy success defined by absolute azoospermia or the presence of RNMS</span></li><li class="listorder" data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Volume of semen that should be examined</span></li><li class="listorder" data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">Number of semen aliquots that should be examined</span></li><li class="listorder" data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Number of high power fields that should be examined</span></li></ul><p data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">The aim of a PVSA is to confirm occlusive effectiveness and to advise a patient that he can safely rely on his vasectomy for contraceptive purposes. Practical principles relevant to PVSA are as follows:</span></p><ul data-dcnode-id="3397"><li class="listorder" data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">The PVSA protocol should be as simple as possible to encourage patient compliance.</span></li><li class="listorder" data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">The PVSA should allow for confirmation of occlusive effectiveness as soon as possible after vasectomy while simultaneously minimizing the number of PVSAs required to document occlusive effectiveness.</span></li><li class="listorder" data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">The PVSA protocol should confirm occlusive effectiveness with the highest possible level of certainty.</span></li><li class="listorder" data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Patients should be informed that post-vasectomy pregnancies are rare but have been documented even after multiple serial PVSAs reveal azoospermia.</span></li></ul><p data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">Considering these principles, a vasectomy should be considered successful as soon as a PVSA confirms that the risk of pregnancy is sufficiently low to allow the patient to rely on the vasectomy alone for contraception. Conversely, a vasectomy should be considered a failure – or not yet a success – when a man needs to use another contraceptive method or needs to repeat the surgical procedure before relying on his vasectomy.</span></p><p data-dcnode-id="3378"><em data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">Sperm Clearance After Vasectomy.</span></em><span data-dcnode-id="3392" instrument_node=""> Sperm clearance after vasectomy is time dependent with both large inter-individual variations as well as variability across published reports, including those that used the same vas occlusion technique. Inter-individual variation may result from differences in reproductive anatomy and possibly patient age. Sperm may persist in the ejaculate for many months after vasectomy. Such persistence may be due to residual sperm in the seminal vesicles or ampullae of the vasa, </span><sup data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">252</span></sup><span data-dcnode-id="3389" instrument_node=""> recanalization, or, very rarely, a failure to have performed the vasectomy on one vas. The main reason for the presence of non-motile sperm is probably that residual sperm in the seminal vesicles or ampullae of the vasa are slowly released from the reproductive tract.</span><sup data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">252</span></sup><span data-dcnode-id="3386" instrument_node=""> There are wide variations in the clearance of residual sperm in the seminal vesicles or ampullae of the vasa among men due to inter-individual differences in the anatomy of these structures.</span><sup data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">252</span></sup><span data-dcnode-id="3383" instrument_node=""> However, in most men, either no sperm or only small numbers of non-motile residual sperm in the PVSA are seen at three months or later after vasectomy. Nevertheless, some men have continued to have sperm or sperm parts in the semen which have been found for as long as 31 years post-vasectomy.</span><sup data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">251,</span></sup><sup data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">253</span></sup></p><p data-dcnode-id="3360"><span data-dcnode-id="3377" instrument_node="">With regard to age, several studies have suggested that sperm clearance may take longer in older men compared to younger men.</span><sup data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">10,</span></sup><sup data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">15,</span></sup><sup data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">235,</span></sup><sup data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">254,</span></sup><sup data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">255</span></sup><span data-dcnode-id="3366" instrument_node=""> For example, Marshall and Lyon (1972) reported that younger patients may achieve azoospermia with fewer ejaculations than older patients.</span><sup data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">256</span></sup><span data-dcnode-id="3363" instrument_node=""> Marwood (1979) reported that the frequency of ejaculation affected time to azoospermia more in older than in younger men, with a frequency of three times a week associated with rapid clearance regardless of age.</span><sup data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">257</span></sup></p><p data-dcnode-id="3342"><span data-dcnode-id="3359" instrument_node="">The published literature also contains mixed results regarding the relationship between sperm clearance and number of ejaculations. After 10 ejaculations, rates of azoospermia ranged from 43% to 50%.</span><sup data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">34,</span></sup><sup data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">232,</span></sup><sup data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">258</span></sup><span data-dcnode-id="3352" instrument_node=""> After 12 ejaculations, rates of azoospermia have been reported as 66%</span><sup data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">256</span></sup><span data-dcnode-id="3349" instrument_node=""> and 88%.</span><sup data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">259</span></sup><span data-dcnode-id="3346" instrument_node=""> However, one study with relatively complete follow up showed that only 44% of patients were azoospermic after 20 ejaculations.</span><sup data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">242</span></sup><span data-dcnode-id="3343" instrument_node=""> Many practitioners recommend that the first PVSA should be done after 20 ejaculations. The opinion of the Panel is that rates of azoospermia related to number of post-vasectomy ejaculations are too variable to be useful in determining when to do the first PVSA.</span></p><p data-dcnode-id="3337"><span data-dcnode-id="3341" instrument_node="">Variability across published reports in sperm clearance rates may result from surgical technique used to occlude the vas; differences in criteria for vasectomy success (e.g., one, two or three azoospermic specimens); variations in PVSA laboratory techniques and reporting; small sample sizes in some studies and varying time points at which PVSA was performed. &nbsp;In addition, in many studies, although patients were instructed to report at specific intervals post-vasectomy, some report at later intervals. This inconsistency between requested PVSA timing and actual PVSA timing creates uncertainty regarding true sperm clearance rates because not all articles clearly indicate when patients actually returned for PVSAs. In addition, in most studies about a third of patients do not return for the requested PVSAs.</span><sup data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">260</span></sup><span data-dcnode-id="3338" instrument_node=""> The lack of complete follow-up data also creates uncertainty regarding true sperm clearance rates.</span></p><p data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Another source of variation in the proportion of men achieving azoospermia is variation in the laboratory techniques used for PVSA and for reporting of PVSA results. Rigorous semen examination including centrifugation and examination of hundreds of microscopic fields is likely to find more sperm than less rigorous laboratory techniques. If the physician sends PVSA specimens to a commercial laboratory, the physician should request that the laboratory perform the PVSA without centrifugation because centrifugation may reduce or eliminate sperm motility (see below). The physician should also request the laboratory to report both the presence or absence of sperm and the presence or absence of sperm motility. If only non-motile sperm are present, the physician should request the laboratory to report the number of non-motile sperm per mL. If no sperm are found in the uncentrifuged specimen, then ideally the laboratory should report that the presence of sperm is "below the limit of detection," although most laboratories report "azoospermia" in this situation.</span></p><p data-dcnode-id="3318"><em data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">Clearance of motile sperm. </span></em><span data-dcnode-id="3332" instrument_node="">Clearance of motile sperm is much more rapid than clearance of non-motile sperm. Older studies suggest all motile sperm disappear within three weeks after vasectomy.</span><sup data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">261,</span></sup><sup data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">262</span></sup><span data-dcnode-id="3327" instrument_node=""> More recent studies confirm that when MC and FI are combined to occlude the vas, essentially all motile sperm have disappeared by five to six weeks</span><sup data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">233</span></sup><span data-dcnode-id="3324" instrument_node=""> with only 1% of men continuing to show motile sperm.</span><sup data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">258</span></sup><span data-dcnode-id="3321" instrument_node=""> At 7 to 14 weeks, this proportion drops to 0.4% and by more than 14 weeks post-vasectomy, no motile sperm were observed.</span><sup data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">258</span></sup></p><p data-dcnode-id="3296"><span data-dcnode-id="3317" instrument_node="">Numerous studies have reported the reappearance of nonmotile sperm</span><sup data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">28,</span></sup><sup data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">263-265</span></sup><span data-dcnode-id="3312" instrument_node=""> and even motile sperm</span><sup data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">22,</span></sup><sup data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">28,</span></sup><sup data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">35,</span></sup><sup data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">42,</span></sup><sup data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">256,</span></sup><sup data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">263,</span></sup><sup data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">266</span></sup><span data-dcnode-id="3297" instrument_node=""> after azoospermia was confirmed, with most studies reporting this phenomenon in small numbers of patients (i.e., &lt; 1%). However, it should be noted that many patients in these studies did not return for PVSAs or did not return for a second PVSA when requested, making the true rates of sperm reappearance (both motile and non-motile) unclear.</span></p><p data-dcnode-id="3290"><em data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">PVSA Analytic Techniques: Centrifugation of semen samples for PVSA is unnecessary. </span></em><span data-dcnode-id="3293" instrument_node="">Laboratory techniques, especially centrifugation, influence the presence or absence of azoospermia observed in a PVSA. Over the past two decades, data suggest that centrifugation leads to the identification of more men with small numbers of sperm. This means that correspondingly fewer men are reported with azoospermia, leading to increased follow-up testing and more repeat vasectomies, some of which may not be necessary. </span><sup data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">267</span></sup></p><p data-dcnode-id="3266"><span data-dcnode-id="3289" instrument_node="">The British Andrology Society and the 1992 (3rd edition) and 1999 (4th edition) of the </span><em data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">World Health Organization </span></em><em data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">laboratory manual for the examination of human semen and sperm-cervical mucus interaction </span></em><span data-dcnode-id="3284" instrument_node="">specifically recommended centrifugation of azoospermic semen samples as part of the routine post-vasectomy semen analysis. </span><sup data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">268</span></sup><span data-dcnode-id="3281" instrument_node=""> However, centrifugation is not necessary to confirm that only rare non-motile sperm are present. The 2010 (5th edition) </span><em data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">WHO laboratory manual for the examination and processing of human semen</span></em><span data-dcnode-id="3278" instrument_node=""> suggests relying on careful examination of an uncentrifuged specimen, similar to a recently PVSA protocol proposed by Korthorst (2009).</span><sup data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">244,</span></sup><sup data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">269</span></sup><span data-dcnode-id="3273" instrument_node=""> The 2010 (5th edition) WHO laboratory manual states in Section 2.10.3, page 46, "When motile spermatozoa are sought (e.g., in a post-vasectomy semen sample), diluting the specimen in fixative or high-speed centrifugation of spermatozoa must be avoided."</span><sup data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">269</span></sup><span data-dcnode-id="3270" instrument_node=""> One group examined uncentrifuged azoospermic semen specimens compared with centrifuged specimens (n=2,014 samples) and concluded that uncentrifuged semen analysis is a reliable method of identifying samples with &gt; 100,000 sperm/ml.</span><sup data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">270</span></sup><span data-dcnode-id="3267" instrument_node=""> The sensitivity of the uncentrifuged sample was 99.3% and the negative predictive value was 99.8%.</span></p><p data-dcnode-id="3261"><span data-dcnode-id="3265" instrument_node="">Because centrifugation may interfere with sperm motility</span><sup data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">269</span></sup><span data-dcnode-id="3262" instrument_node=""> and clinically relevant numbers of sperm can be identified without centrifugation, a surgeon should request a clinical laboratory not to perform centrifugation for a PVSA.</span></p><p data-dcnode-id="3257"><em data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Office examination of uncentrifuged post vasectomy semen samples. </span></em><span data-dcnode-id="3258" instrument_node=""> In the US, CDC regulations implementing the 1988 Clinical Laboratory Improvement Act (CLIA) (42 CFR 493.19) distinguish provider-performed microscopy (PPM) analysis from that in laboratories performing tests of high complexity. These regulations allow for semen analysis in a doctor's office, i.e., "provider performed microscopy," as long as the reported result is qualitative, i.e., "limited to the presence or absence of sperm and detection of motility." Thus US physicians are permitted to conduct PVSA in their offices, but they are not allowed to determine sperm concentration unless the office laboratory has a high-complexity level of CLIA certification. There is now interest in developing a method of estimating the number of sperm per mL of semen from the number of sperm per Hpf found in a PVSA. Such a method would allow vasectomy surgeons to correlate the number of sperm per Hpf in PVSAs which do not show azoospermia to various concentrations of sperm/mL.</span></p><p data-dcnode-id="3250"><em data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Self-PVSA Testing.</span></em><span data-dcnode-id="3254" instrument_node=""> A self-PVSA home test has been approved by the FDA and is available for clinical use. This test is sensitive to sperm counts &gt;250,000/ml,</span><sup data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">271</span></sup><span data-dcnode-id="3251" instrument_node=""> but the test does not assess for sperm motility. If two tests are performed and both are negative, then the negative predictive value of a sperm count &gt;250,000 sperm/mL is 99.9%. However, the 250,000 sperm/mL cut-off is significantly higher than the cut-off most commonly used to declare a man sterile after vasectomy. The most commonly used cut-off in the literature and the definition of vasectomy success used in this guideline is ≤100,000 non-motile sperm/mL. Furthermore, no other studies have shown that clearing men at this cut-off without evaluating for motility is reliable enough to recommend discontinuation of contraception, and no studies have followed patients who used the test to assess for the risk of unanticipated pregnancy. In addition, it has been suggested that a home PVSA test might increase patient compliance with PVSA instructions, but improved patient compliance has not yet been studied or proven.</span></p><p data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Because the test results are read by the patient, the surgeon must instruct the patient on all aspects of the test prior to its use. To avoid potential legal problems, careful instruction is essential to ensure that the patient will use the test in a valid manner. The disclosures must include how to set up the test, how to read the final result and the relative risks of pregnancy. Given this requirement and the lack of long-term follow-up data on patients who have used the test, the opinion of the Panel at this time is that, although this test may have potential value that may be proven in the future, there are insufficient data for the panel to come to a conclusion regarding its use in clinical practice.</span></p><span data-dcnode-id="3247" instrument_node="">
</span></div><span data-dcnode-id="3245" instrument_node="">
</span><div data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">
</span></div><span data-dcnode-id="3242" instrument_node="">
</span><h4 data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">
                    Guideline Statement 10
                </span></h4><span data-dcnode-id="3239" instrument_node="">
</span><div data-dcnode-id="3232"><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3237" instrument_node="">Men or their partners should use other contraceptive methods until vasectomy success is confirmed by PVSA. </span><em data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Clinical Principle</span></em></p><span data-dcnode-id="3233" instrument_node="">
</span></div><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3226"><span data-dcnode-id="3230" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="3228" data-feathr-click-track="true" data-target="#x3359" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="3229" instrument_node="">Discussion</span></a><span data-dcnode-id="3227" instrument_node="">
</span></p><span data-dcnode-id="3225" instrument_node="">
</span><div class="modal fade" data-dcnode-id="3189" id="x3359" role="dialog"><span data-dcnode-id="3224" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="3191"><span data-dcnode-id="3223" instrument_node="">
</span><div class="modal-content" data-dcnode-id="3193"><span data-dcnode-id="3222" instrument_node="">
</span><div class="modal-header" data-dcnode-id="3214"><span data-dcnode-id="3221" instrument_node="">
</span><button class="close" data-dcnode-id="3219" data-dismiss="modal" type="button"><span data-dcnode-id="3220" instrument_node="">×</span></button><span data-dcnode-id="3218" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Discussion</span></h4><span data-dcnode-id="3215" instrument_node="">
</span></div><span data-dcnode-id="3213" instrument_node="">
</span><div class="modal-body" data-dcnode-id="3201"><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3211" instrument_node="">During the first few weeks after vasectomy, sperm that are left in the male reproductive system on the abdominal side of the vasectomy site may retain the ability to fertilize an ovum.</span><sup data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">258,</span></sup><sup data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">261,</span></sup><sup data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">262</span></sup><span data-dcnode-id="3204" instrument_node=""> Semen analysis after vasectomy is very strongly advised because it provides assurance for the patient and his partner that the risk of future pregnancy is very low, and it provides a continuing measure of quality control for the physician.</span></p><span data-dcnode-id="3202" instrument_node="">
</span></div><span data-dcnode-id="3200" instrument_node="">
</span><div class="modal-footer" data-dcnode-id="3195"><span data-dcnode-id="3199" instrument_node="">
</span><button class="btn btn-default" data-dcnode-id="3197" data-dismiss="modal" type="button"><span data-dcnode-id="3198" instrument_node="">Close</span></button><span data-dcnode-id="3196" instrument_node="">
</span></div><span data-dcnode-id="3194" instrument_node="">
</span></div><span data-dcnode-id="3192" instrument_node="">
</span></div><span data-dcnode-id="3190" instrument_node="">
</span></div><span data-dcnode-id="3188" instrument_node="">
</span><hr data-dcnode-id="3187"><span data-dcnode-id="3186" instrument_node="">
</span><h4 data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">
                    Guideline Statement 11
                </span></h4><span data-dcnode-id="3183" instrument_node="">
</span><div data-dcnode-id="3176"><span data-dcnode-id="3182" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3181" instrument_node="">To evaluate sperm motility, a fresh uncentrifuged semen sample should be examined within two hours after ejaculation. </span><em data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">&nbsp;Expert Opinion</span></em></p><span data-dcnode-id="3177" instrument_node="">
</span></div><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3170"><span data-dcnode-id="3174" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="3172" data-feathr-click-track="true" data-target="#x3358" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="3173" instrument_node="">Discussion</span></a><span data-dcnode-id="3171" instrument_node="">
</span></p><span data-dcnode-id="3169" instrument_node="">
</span><div class="modal fade" data-dcnode-id="3133" id="x3358" role="dialog"><span data-dcnode-id="3168" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="3135"><span data-dcnode-id="3167" instrument_node="">
</span><div class="modal-content" data-dcnode-id="3137"><span data-dcnode-id="3166" instrument_node="">
</span><div class="modal-header" data-dcnode-id="3158"><span data-dcnode-id="3165" instrument_node="">
</span><button class="close" data-dcnode-id="3163" data-dismiss="modal" type="button"><span data-dcnode-id="3164" instrument_node="">×</span></button><span data-dcnode-id="3162" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">Discussion</span></h4><span data-dcnode-id="3159" instrument_node="">
</span></div><span data-dcnode-id="3157" instrument_node="">
</span><div class="modal-body" data-dcnode-id="3145"><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3149"><span data-dcnode-id="3155" instrument_node="">WHO guidelines (2010) recommend that semen analysis to assess motility should be done within 60 minutes of ejaculation when the semen sample is provided in the laboratory facility.</span><sup data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">269</span></sup><span data-dcnode-id="3152" instrument_node=""> If a man is unable to ejaculate at the clinic, then delivery of a semen sample to the laboratory should be within one hour of ejaculation so that the motility assessment can occur during the second hour after ejaculation. Semen samples should be transported at ambient temperatures, i.e. between 20° and 37°C. In most semen samples, sperm motility does not decrease between one and two hours post-ejaculation.</span><sup data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">272</span></sup></p><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Some clinicians recommend for convenience and compliance reasons, that PVSA specimens can be sent by mail (following regulations regarding shipping biohazards). This approach is adequate to assess only the presence or absence of sperm. Motility cannot be evaluated reliably in a semen sample produced more than two hours before microscopic examination.</span></p><span data-dcnode-id="3146" instrument_node="">
</span></div><span data-dcnode-id="3144" instrument_node="">
</span><div class="modal-footer" data-dcnode-id="3139"><span data-dcnode-id="3143" instrument_node="">
</span><button class="btn btn-default" data-dcnode-id="3141" data-dismiss="modal" type="button"><span data-dcnode-id="3142" instrument_node="">Close</span></button><span data-dcnode-id="3140" instrument_node="">
</span></div><span data-dcnode-id="3138" instrument_node="">
</span></div><span data-dcnode-id="3136" instrument_node="">
</span></div><span data-dcnode-id="3134" instrument_node="">
</span></div><span data-dcnode-id="3132" instrument_node="">
</span><hr data-dcnode-id="3131"><span data-dcnode-id="3130" instrument_node="">
</span><h4 data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">
                    Guideline Statement 12
                </span></h4><span data-dcnode-id="3127" instrument_node="">
</span><div data-dcnode-id="3120"><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3122"><span data-dcnode-id="3125" instrument_node="">Patients may stop using other methods of contraception when examination of one well-mixed, uncentrifuged fresh post-vasectomy semen specimen shows azoospermia or only rare non-motile sperm (RNMS or ≤ 100,000 non-motile sperm/mL). </span><em data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Recommendation</span></em></p><span data-dcnode-id="3121" instrument_node="">
</span></div><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3114"><span data-dcnode-id="3118" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="3116" data-feathr-click-track="true" data-target="#x3357" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="3117" instrument_node="">Discussion</span></a><span data-dcnode-id="3115" instrument_node="">
</span></p><span data-dcnode-id="3113" instrument_node="">
</span><div class="modal fade" data-dcnode-id="3028" id="x3357" role="dialog"><span data-dcnode-id="3112" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="3030"><span data-dcnode-id="3111" instrument_node="">
</span><div class="modal-content" data-dcnode-id="3032"><span data-dcnode-id="3110" instrument_node="">
</span><div class="modal-header" data-dcnode-id="3102"><span data-dcnode-id="3109" instrument_node="">
</span><button class="close" data-dcnode-id="3107" data-dismiss="modal" type="button"><span data-dcnode-id="3108" instrument_node="">×</span></button><span data-dcnode-id="3106" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">Discussion</span></h4><span data-dcnode-id="3103" instrument_node="">
</span></div><span data-dcnode-id="3101" instrument_node="">
</span><div class="modal-body" data-dcnode-id="3040"><span data-dcnode-id="3100" instrument_node="">
</span><p data-dcnode-id="3091"><strong data-dcnode-id="3097"><em data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">(Evidence Strength – Grade C; Benefits outweigh risks/burdens)</span></em></strong><span data-dcnode-id="3096" instrument_node="">. Both azoospermia and RNMS are acceptable criteria for vasectomy success. The definition of RNMS used in the medical literature has varied from more than 0 to less than 1 million/mL, but the most commonly used definition of RNMS is ≤100,000 per mL.</span><sup data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">268,</span></sup><sup data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">273</span></sup></p><p data-dcnode-id="3064"><span data-dcnode-id="3090" instrument_node="">Several studies show that the risk of pregnancy associated with the presence of ≤100,000 non-motile sperm/Hpf is very low and similar to the risk when sperm are absent. Absence of sperm motility appears to be a robust criterion to indicate occlusive effectiveness. One group reported routine testing of men at three to four weeks after vasectomy using MC and FI and provided clearance based on the absence of motile sperm.</span><sup data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">258</span></sup><span data-dcnode-id="3087" instrument_node=""> Among 3,178 vasectomized men, two pregnancies were documented. One man had an apparent late recanalization; the other had not returned for a PVSA. This pregnancy rate is not significantly different from the risk of about 1 in 2,000 after documented azoospermia on two consecutive semen analyses, based on data from the Elliot Smith Clinic,</span><sup data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">25-27</span></sup><span data-dcnode-id="3084" instrument_node=""> from Marie Stopes International,</span><sup data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">29</span></sup><span data-dcnode-id="3081" instrument_node=""> and from large case series reports.</span><sup data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">28</span></sup><span data-dcnode-id="3078" instrument_node=""> Even in men with some motile sperm, risk of pregnancy appears to be low if the concentration of motile and non-motile sperm is ≤100,000/mL. In a WHO study of a hormonal male contraceptive, 8.1 pregnancies/100 person-years were observed in men with 100,000 to 3 million sperm/ml (motile and nonmotile) and 0 pregnancies/100 person-years in men with 0 to 100,000 sperm/ml (motile and nonmotile).</span><sup data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">274</span></sup><span data-dcnode-id="3075" instrument_node=""> Contraceptive failure (pregnancy) after declaration of vasectomy success is a rare event despite the reappearance of nonmotile sperm,</span><sup data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">42,251,265,275</span></sup><span data-dcnode-id="3072" instrument_node=""> and even motile sperm</span><sup data-dcnode-id="3070"><span data-dcnode-id="3071" instrument_node="">22,</span></sup><sup data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">35,</span></sup><sup data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">266</span></sup><span data-dcnode-id="3065" instrument_node=""> after azoospermia was confirmed.</span></p><p data-dcnode-id="3055"><span data-dcnode-id="3063" instrument_node="">Philp et al. (1984) proposed a method for defining when a patient who has persistence of small numbers of non-motile sperm in the PVSA can rely on vasectomy alone for contraception.</span><sup data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">25</span></sup><span data-dcnode-id="3060" instrument_node=""> They analyzed data from 16,796 patients at the Elliot Smith Clinic in Oxford (United Kingdom). About 4,500 vasectomies were performed with ligation and excision between 1970 and 1974, and about 12,300 vasectomies were performed with MC but not FI after 1974. This group used the term "special clearance" to determine when a man whose PVSA showed RNMS could be informed that he is sterile. They defined three criteria for "special clearance:" (1) a level of 10,000 sperm/mL or less in two consecutive semen exams, (2) no motile sperm and (3) at least seven months post-vasectomy. However, the method of semen analysis at the Elliot Smith Clinic has not been reported, except for the information that patients provided semen samples by mail, which precludes an examination for motility. Nonetheless, subsequent reports from this clinic have confirmed a lack of pregnancies among men with only rare sperm.</span><sup data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">27,</span></sup><sup data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">42</span></sup></p><p data-dcnode-id="3044"><span data-dcnode-id="3054" instrument_node="">Korthorst et al. (2009) reported prospective findings from 1,073 men who underwent vas occlusion by clips and FI.</span><sup data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">244</span></sup><span data-dcnode-id="3051" instrument_node=""> Using the threshold of &lt;100,000 non-motile sperm/mL in accordance with the recommendations of the Dutch Urological Association,</span><sup data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">273</span></sup><span data-dcnode-id="3048" instrument_node=""> men were cleared if they met this criterion in a single sample at 12 weeks or later. No pregnancies were reported among 481 men who had &lt; 100,000 non-motile sperm, with a median follow-up of 14 months. Based on data from an additional study, most recanalizations occur during the first year post-vasectomy.</span><sup data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">276</span></sup><span data-dcnode-id="3045" instrument_node=""> Therefore, such results would seem unlikely to change with longer follow-up.</span></p><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">The opinion of the Panel is that both azoospermia and ≤100,000 non-motile sperm/mL are reliable indicators of vasectomy success.</span></p><span data-dcnode-id="3041" instrument_node="">
</span></div><span data-dcnode-id="3039" instrument_node="">
</span><div class="modal-footer" data-dcnode-id="3034"><span data-dcnode-id="3038" instrument_node="">
</span><button class="btn btn-default" data-dcnode-id="3036" data-dismiss="modal" type="button"><span data-dcnode-id="3037" instrument_node="">Close</span></button><span data-dcnode-id="3035" instrument_node="">
</span></div><span data-dcnode-id="3033" instrument_node="">
</span></div><span data-dcnode-id="3031" instrument_node="">
</span></div><span data-dcnode-id="3029" instrument_node="">
</span></div><span data-dcnode-id="3027" instrument_node="">
</span><hr data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node="">
</span><h4 data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">
                    Guideline Statement 13
                </span></h4><span data-dcnode-id="3022" instrument_node="">
</span><div data-dcnode-id="3015"><span data-dcnode-id="3021" instrument_node="">
</span><p data-dcnode-id="3017"><span data-dcnode-id="3020" instrument_node="">Eight to sixteen weeks after vasectomy is the appropriate time range for the first PVSA. The choice of time to do the first PVSA should be left to the judgment of the surgeon. </span><em data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Option</span></em></p><span data-dcnode-id="3016" instrument_node="">
</span></div><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="3009"><span data-dcnode-id="3013" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="3011" data-feathr-click-track="true" data-target="#x3356" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="3012" instrument_node="">Discussion</span></a><span data-dcnode-id="3010" instrument_node="">
</span></p><span data-dcnode-id="3008" instrument_node="">
</span><div class="modal fade" data-dcnode-id="2865" id="x3356" role="dialog"><span data-dcnode-id="3007" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="2867"><span data-dcnode-id="3006" instrument_node="">
</span><div class="modal-content" data-dcnode-id="2869"><span data-dcnode-id="3005" instrument_node="">
</span><div class="modal-header" data-dcnode-id="2997"><span data-dcnode-id="3004" instrument_node="">
</span><button class="close" data-dcnode-id="3002" data-dismiss="modal" type="button"><span data-dcnode-id="3003" instrument_node="">×</span></button><span data-dcnode-id="3001" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Discussion</span></h4><span data-dcnode-id="2998" instrument_node="">
</span></div><span data-dcnode-id="2996" instrument_node="">
</span><div class="modal-body" data-dcnode-id="2877"><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2981"><strong data-dcnode-id="2992"><em data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">(Evidence strength – Grade C; benefits and risks/burdens balanced)</span></em></strong><span data-dcnode-id="2991" instrument_node="">. The choice of time to do the first PVSA should be left to the judgment of the surgeon. It is desirable to select a time for the first PVSA that will minimize the number of PVSAs needed to establish that azoospermia or RNMS has been achieved but still allow men to abandon other forms of contraception as soon as possible after vasectomy. The longer the time period before the first PVSA, the better the chance that the PVSA will show azoospermia or RNMS but the longer the time that the patient must use another method of contraception. Motile sperm disappear within a few weeks after successful vasectomy.</span><sup data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">233,</span></sup><sup data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">258,</span></sup><sup data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">261,</span></sup><sup data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">262</span></sup><span data-dcnode-id="2982" instrument_node=""> Performing the first PVSA earlier than 12 weeks may allow some men to rely on their vasectomy for contraception sooner than if the first PVSA is done at 12 weeks or later. However, if the first PVSA is performed before 12 weeks post-vasectomy, more men will have to submit additional samples for PVSA to confirm the success of the procedure if the initial sample contains motile sperm or &gt;100,000 non-motile sperm/ml.</span></p><blockquote data-dcnode-id="2963"><p data-dcnode-id="2964"><span data-dcnode-id="2980" instrument_node="">While rates of sperm clearance vary across studies, including studies that used the same vas occlusion technique, the available literature indicates that, in general, the proportion of men who achieve azoospermia or RNMS after vasectomy increases with time. Eleven study arms from nine studies reported rates of azoospermia at eight weeks post-vasectomy.</span><sup data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">23,</span></sup><sup data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">35,</span></sup><sup data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">37,</span></sup><sup data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">138,</span></sup><sup data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">170,</span></sup><sup data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">241,</span></sup><sup data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">277-279</span></sup><span data-dcnode-id="2965" instrument_node=""> Azoospermia rates ranged from 30.0% to 88.5% with six studies reporting rates above 80%.</span></p></blockquote><p data-dcnode-id="2933"><span data-dcnode-id="2962" instrument_node="">Sixteen study arms reported azoospermia rates at 12 weeks post-vasectomy.</span><sup data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">23,</span></sup><sup data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">35,</span></sup><sup data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">37,</span></sup><sup data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">138,</span></sup><sup data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">231,</span></sup><sup data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">237,</span></sup><sup data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">241,</span></sup><sup data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">242,</span></sup><sup data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">246,</span></sup><sup data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">263,</span></sup><sup data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">264,</span></sup><sup data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">277-279</span></sup><span data-dcnode-id="2937" instrument_node=""> Rates ranged from 48.0% to 99.0% with eight study arms reporting rates of 90.0% or above and ten study arms reporting rates of 80.0% or above. The lowest rate of 48.0% was reported in the randomized controlled trial</span><sup data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">242</span></sup><span data-dcnode-id="2934" instrument_node=""> in a group of men who underwent vas occlusion by ligation (value estimated from Kaplan-Meier graph).&nbsp;</span></p><p data-dcnode-id="2904"><span data-dcnode-id="2932" instrument_node="">Thirteen study arms reported azoospermia rates at six months post-vasectomy.</span><sup data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">23,</span></sup><sup data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">131,</span></sup><sup data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">137,</span></sup><sup data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">138,</span></sup><sup data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">144,</span></sup><sup data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">231,</span></sup><sup data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">235,</span></sup><sup data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">239,</span></sup><sup data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">241,</span></sup><sup data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">242,</span></sup><sup data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">279,</span></sup><sup data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">280</span></sup><span data-dcnode-id="2907" instrument_node=""> Rates ranged from 61.5% to 99.6% with five study arms reporting rates of 90.0% or above and ten study arms reporting rates of 80.0% or above. The low rate of 61.5% was reported by Barnes (1973) in a group of men who underwent vas occlusion by ligation.</span><sup data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">137</span></sup></p><p data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Given the potential confounders to interpretation discussed in the Vas Occlusion section of this Guideline, it is not clear if vas occlusion technique affects the rate of achieving azoospermia. Of the six studies that reported azoospermia rates above 80% at eight weeks, four used ligation, one used MC and FI and one used ligation and FI. It is worth noting, however, that the methodologically strongest study in this group (the Sokal 2004 RCT) reported relatively low rates of 30.0% and 48.0% at eight weeks (estimated from Kaplan-Meier graphs) in patients who underwent vas occlusion by ligation without and with FI, respectively, with the higher rate in the group that had FI.</span></p><p data-dcnode-id="2895"><span data-dcnode-id="2901" instrument_node="">Similarly, of the eight study arms reporting azoospermia rates of 90.0% or above at 12 weeks, one used MC and clips, one used MC and suturing of the testicular end, three used ligation of both ends, one used MC and FI, one used ligation of both ends and FI and one reported on a mixed group of techniques (Barone 2004; MC with or without FI and MC only).</span><sup data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">231</span></sup><span data-dcnode-id="2898" instrument_node=""> Of the five study arms reporting azoospermia rates of 90.0% or higher at six months, three used ligation, one used ligation of both ends and FI, and the third study reported on mixed techniques (Barone 2004).</span><sup data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">231</span></sup></p><p data-dcnode-id="2890"><span data-dcnode-id="2894" instrument_node="">Additional useful information regarding the potential influence of vas occlusion technique is provided by Labrecque et al. (2006), which is a secondary analysis of serial PVSA data from Barone (2004) and Sokal (2004).</span><sup data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">234</span></sup><span data-dcnode-id="2891" instrument_node=""> The authors document the presence of motile sperm and note that when thermal MC and FI were used, all motile sperm cleared by six weeks post-vasectomy.Â When mucosal electrocautery without FI was used, all motile sperm cleared by 10 weeks post-vasectomy.Â When ligation alone was used, 5 to 10% of tested men continued to exhibit motile sperm at periods up to 26 weeks post-vasectomy.Â When FI was combined with ligation, 1 to 4% of men continued to exhibit motile sperm at up to 26 weeks post-vasectomy.</span></p><p data-dcnode-id="2879"><span data-dcnode-id="2889" instrument_node="">Because the majority of studies reporting azoospermia rates at 12 weeks post-vasectomy indicated that 80% or more of men had achieved this goal, the Panel interpreted these data to indicate that at 12 weeks most men will be azoospermic or will meet the RNMS criterion. In addition, it was found that a 12-week time period was a more reliable parameter for vasectomy success than a specific number of ejaculations (e.g., 20).</span><sup data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">242</span></sup><span data-dcnode-id="2886" instrument_node=""> WHO incorporated this finding in its 2004 guideline and now recommends a waiting period of three months.</span><sup data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">281</span></sup><span data-dcnode-id="2883" instrument_node=""> With regard to the influence of vas occlusion technique on the time to achieve azoospermia or RNMS, the Panel notes that one study</span><sup data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">233</span></sup><span data-dcnode-id="2880" instrument_node=""> demonstrated that the fastest motile sperm clearance rates occurred when MC was combined with FI, and the slowest rates occurred when ligation was used. This study provides additional information that may be considered by the surgeon in the decision regarding when to request the first PVSA.</span></p><span data-dcnode-id="2878" instrument_node="">
</span></div><span data-dcnode-id="2876" instrument_node="">

</span><hr data-dcnode-id="2863"><span data-dcnode-id="2862" instrument_node="">
</span><h4 data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">
                    Guideline Statement 14
                </span></h4><span data-dcnode-id="2859" instrument_node="">
</span><div data-dcnode-id="2852"><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2857" instrument_node="">Vasectomy should be considered a failure if any motile sperm are seen on PVSA at six months after vasectomy, in which case repeat vasectomy should be considered. </span><em data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Expert Opinion</span></em></p><span data-dcnode-id="2853" instrument_node="">
</span></div><span data-dcnode-id="2851" instrument_node="">
</span><p data-dcnode-id="2846"><span data-dcnode-id="2850" instrument_node="">
</span><a class="btn btn-sm btn-custom" data-dcnode-id="2848" data-feathr-click-track="true" data-target="#x3355" data-toggle="modal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/"><span data-dcnode-id="2849" instrument_node="">Discussion</span></a><span data-dcnode-id="2847" instrument_node="">
</span></p><span data-dcnode-id="2845" instrument_node="">
</span><div class="modal fade" data-dcnode-id="2799" id="x3355" role="dialog"><span data-dcnode-id="2844" instrument_node="">
</span><div class="modal-dialog" data-dcnode-id="2801"><span data-dcnode-id="2843" instrument_node="">
</span><div class="modal-content" data-dcnode-id="2803"><span data-dcnode-id="2842" instrument_node="">
</span><div class="modal-header" data-dcnode-id="2834"><span data-dcnode-id="2841" instrument_node="">
</span><button class="close" data-dcnode-id="2839" data-dismiss="modal" type="button"><span data-dcnode-id="2840" instrument_node="">×</span></button><span data-dcnode-id="2838" instrument_node="">
</span><h4 class="modal-title" data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Discussion</span></h4><span data-dcnode-id="2835" instrument_node="">
</span></div><span data-dcnode-id="2833" instrument_node="">
</span><div class="modal-body" data-dcnode-id="2811"><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2831" instrument_node="">When the vas is successfully occluded, motile sperm disappear by a few weeks after vasectomy.</span><sup data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">233,</span></sup><sup data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">258,</span></sup><sup data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">261,</span></sup><sup data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">262</span></sup><span data-dcnode-id="2822" instrument_node=""> The presence of motile sperm at 6 to 12 weeks after vasectomy indicates that recanalization has occurred or that there was a technical failure in vas occlusion. However, vasectomy should not be repeated immediately if motile sperm are found on PVSA prior to six months after vasectomy. Additional PVSAs should be performed at intervals of four to six weeks for up to six months after vasectomy for further evaluation. Motile sperm may represent a risk of pregnancy and indicate the need for continued use of another contraceptive method, further PVSA testing and, if persistent, repeat vasectomy. However, approximately 30% to 50% of men with recanalization eventually achieve azoospermia or RNMS over a period of six months after vasectomy due to fibrosis of the vas and occlusion of the recanalization.</span><sup data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">22,</span></sup><sup data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">241</span></sup><span data-dcnode-id="2817" instrument_node=""> These men continue to have effective occlusion on long term follow-up.</span><sup data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">22</span></sup><span data-dcnode-id="2814" instrument_node=""> Therefore, the decision to repeat the vasectomy should not rely on a single semen analysis showing motile sperm within six months after vasectomy. Repeat vasectomy should be done if the number of motile sperm increases in subsequent semen analyses or if motile sperm persist for &gt;6 months after vasectomy. There are no data to suggest that delayed occlusive success occurs in men who still have any motile sperm in a PVSA at six months after vasectomy.</span></p><span data-dcnode-id="2812" instrument_node="">
</span></div><span data-dcnode-id="2810" instrument_node="">
</span><div class="modal-footer" data-dcnode-id="2805"><span data-dcnode-id="2809" instrument_node="">
</span><button class="btn btn-default" data-dcnode-id="2807" data-dismiss="modal" type="button"><span data-dcnode-id="2808" instrument_node="">Close</span></button><span data-dcnode-id="2806" instrument_node="">
</span></div><span data-dcnode-id="2804" instrument_node="">
