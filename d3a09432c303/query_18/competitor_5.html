</span></div><span data-dcnode-id="2800" instrument_node="">
</span></div><span data-dcnode-id="2798" instrument_node="">
</span><hr data-dcnode-id="2797"><span data-dcnode-id="2796" instrument_node="">
</span><h4 data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">
                    Guideline Statement 15
                </span></h4><span data-dcnode-id="2793" instrument_node="">
</span><div data-dcnode-id="2686"><span data-dcnode-id="2792" instrument_node="">
</span><p data-dcnode-id="2788"><span data-dcnode-id="2791" instrument_node="">If &gt; 100,000 non-motile sperm/mL persist beyond six months after vasectomy, then trends of serial PVSAs and clinical judgment should be used to decide whether the vasectomy is a failure and whether repeat vasectomy should be considered. </span><em data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">Expert Opinion</span></em></p><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">If non-motile sperm are present on the first PVSA in the surgeon's office, one or more repeat PVSAs should be performed in the surgeon's office laboratory to determine if azoospermia develops over time. If azoospermia is not achieved by six months after vasectomy, then a PVSA should be performed in a laboratory approved for high complexity semen testing. If the PVSA shows ≤100,000 non-motile sperm/mL and no motile sperm, then the couple may stop using other methods of contraception.</span></p><p data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">If the PVSA shows &gt; 100,000 non-motile sperm/mL or any motile sperm, then further PVSA monitoring or repeat vasectomy may be considered. The Panel's opinion is that the decision to consider vasectomy a failure if &gt;100,000 non-motile sperm/mL persist should be based on clinical judgment that includes the trend of sperm counts, the patient's preferences and the patient's tolerance for the risk of pregnancy.</span></p><p data-dcnode-id="2781"><strong data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">Additional Important Points of Postoperative Practice.</span></strong></p><p data-dcnode-id="2710"><em data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">After completion of a vasectomy, physicians should consider giving men a specific appointment for the first PVSA to improve compliance with follow-up.</span></em><span data-dcnode-id="2778" instrument_node=""> Based on 46 published studies reviewed in 49 papers, a median of 78% (range 33-100%) of men return for a single PVSA and a median of 73% (range 21-100%) are fully compliant with PVSA study protocols.</span><sup data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">13,</span></sup><sup data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">22-28,</span></sup><sup data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">30,</span></sup><sup data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">34,</span></sup><sup data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">35,</span></sup><sup data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">37,</span></sup><sup data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">38,</span></sup><sup data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">52,</span></sup><sup data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">131,</span></sup><sup data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">134,</span></sup><sup data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">137,</span></sup><sup data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">138,</span></sup><sup data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">142,</span></sup><sup data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">144,</span></sup><sup data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">170,</span></sup><sup data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">181,</span></sup><sup data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">231,</span></sup><sup data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">232,</span></sup><sup data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">235,</span></sup><sup data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">237,</span></sup><sup data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">242,</span></sup><sup data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">243,</span></sup><sup data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">253,</span></sup><sup data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">256-265,</span></sup><sup data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">277,</span></sup><sup data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">280,</span></sup><sup data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">282-288</span></sup><span data-dcnode-id="2723" instrument_node=""> Compliance rates varied greatly across studies and might be lower in clinical practice than in published studies. In the largest cohorts that appear typical of North American vasectomy practice, only about two thirds of men (between 55% and 71%) return for at least one PVSA.</span><sup data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">28,</span></sup><sup data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">30,</span></sup><sup data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">38,</span></sup><sup data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">243,</span></sup><sup data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">260,</span></sup><sup data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">288</span></sup></p><p data-dcnode-id="2706"><span data-dcnode-id="2709" instrument_node="">The number of tests requested (one or two) and the time at which samples were requested (one to two months vs. three to four months) do not appear to make a significant difference in compliance rates. When the second test was requested at three to four months post vasectomy, rates of full compliance were decreased somewhat compared to protocols where two tests were ordered within two months.</span><sup data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">289</span></sup></p><p data-dcnode-id="2701"><span data-dcnode-id="2705" instrument_node="">One randomized controlled trial including 228 men evaluated the effectiveness of scheduling an appointment for the first PVSA versus simply asking men to return at two months post-vasectomy. In the appointment group 84% of men returned for semen analysis versus 65% in the no appointment group.</span><sup data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">290</span></sup><span data-dcnode-id="2702" instrument_node=""> The Panel suggests that the practice of scheduling a follow-up PVSA appointment should be left to the judgment of the individual clinician.</span></p><p data-dcnode-id="2695"><em data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">A postoperative visit with the surgeon specifically for physical examination of the scrotum is not routinely necessary.</span></em><span data-dcnode-id="2698" instrument_node=""> The results of the PVSA and/or the need for one or more additional PVSAs can be conveyed by telephone or other modes of communication. When giving PVSA results, men should be reminded that no contraceptive method, including vasectomy, is 100% effective. At this time, patients should be informed that there is always a remote risk of pregnancy even if azoospermia has been achieved. Each patient should know that if his partner becomes pregnant, he may have experienced a rare vasectomy failure and should return to his surgeon for a semen analysis. Even if a PVSA at such a time reveals azoospermia, a transient recanalization may have occurred with the subsequent disappearance of sperm from the semen, as shown by DNA studies on parents and the child in such situations.</span><sup data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">291</span></sup></p><p data-dcnode-id="2688"><em data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Most men whose partners become pregnant after vasectomy have motile sperm in the semen, </span></em><span data-dcnode-id="2692" instrument_node="">but some are found to be azoospermic on multiple examinations following identification of the pregnancy. If a man reports that his wife has become pregnant and his semen analysis reveals azoospermia, then the physician should inform him that the pregnancy could have been due to a transient recanalization despite the semen analysis results. A number of case reports have confirmed paternity based on genetic testing even though the men previously had multiple semen analyses showing azoospermia, i.e., sperm counts below the limit of detection.</span><sup data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">291-293</span></sup><span data-dcnode-id="2689" instrument_node=""> Patients may be informed that genetic analysis to document paternity is available.</span></p><span data-dcnode-id="2687" instrument_node="">
</span></div><span data-dcnode-id="2685" instrument_node="">
</span><a class="anchor" data-dcnode-id="2684" data-feathr-click-track="true" name="x3352"></a><span data-dcnode-id="2683" instrument_node="">
</span><h3 data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">
                Future Research
            </span></h3><span data-dcnode-id="2680" instrument_node="">
</span><div data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">
</span></div><span data-dcnode-id="2677" instrument_node="">
</span><div data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">
</span></div><span data-dcnode-id="2674" instrument_node="">
</span><div data-dcnode-id="2569"><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">One benefit of a systematic review is to illuminate deficits in the scientific knowledge base, the amelioration of which would move the field forward and allow for advances in clinical care. The Panel identified the following areas for future research efforts.</span></p><p data-dcnode-id="2668"><strong data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Preoperative Evaluation and Counseling</span></strong></p><ul data-dcnode-id="2655"><li data-dcnode-id="2664"><span data-dcnode-id="2667" instrument_node="">Identification of the information most important to patients and partners during and after the decision-making process and, in particular, the type of information and information presentation that is most effective to gain the patient's attention, maximize understanding and minimize post-procedure regret and dissatisfaction. One recent study addressed the value of a patient decision aid before and after the procedure and concluded that it was helpful in both a comprehensive and an abridged version.</span><sup data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">294</span></sup></li><li data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">The percentages of couples who select vasectomy vs. tubal ligation when fully informed regarding both options. This information is central to understand the extent to which the relative under-utilization of vasectomy in the US is a function of lack of understanding of the procedure.</span></li><li data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">The selection of vasectomy or tubal occlusion depending upon whether the patient/couple sees a gynecologist or urologist first.</span></li><li data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Whether rates of dissatisfaction and/or regret are related to the inclusion of the spouse or partner in the preoperative counseling process.</span></li><li data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Do men and partners of men considering vasectomy believe that vasectomy is a family or an individual decision?</span></li></ul><p data-dcnode-id="2652"><strong data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Anesthesia</span></strong></p><ul data-dcnode-id="2643"><li data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Pain levels (measured with visual analog scales) associated with the use of smaller gauge vs. larger gauge needles for local anesthesia administration, with the use of a mini-needle technique (30-32 gauge needle with 3 cc xylocaine) compared to the Li anesthetic block technique (25-27 gauge needle with 10 cc xylocaine) and the use of mini-needles compared to jet injection.</span></li><li data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Whether or not topical anesthetic cream application before injection of local anesthetic reduces the amount of pain (measured by a visual analog score). If the pain of local anesthetic injection is reduced, the extent to which topical anesthetic cream before local anesthetic injection reduces the pain of injection as well as the pain of the vasectomy.</span></li><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Pain level during local anesthesia administration as opposed to during the vasectomy procedure itself.</span></li><li data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Whether or not application of a topical cutaneous spray such as ethyl chloride, cocaine or other products prior to injection of local anesthetic reduces the pain of injection.</span></li></ul><p data-dcnode-id="2640"><strong data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Vas Isolation</span></strong></p><ul data-dcnode-id="2629"><li data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Whether pain is reduced when an NSV or MIV vas isolation technique is used compared to a conventional technique.</span></li><li data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Intraoperative and post-operative pain levels and surgical complications (e.g., at one, two and four weeks) with an MIV technique compared to a conventional vasectomy.</span></li><li data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">The incidence of failed vasectomy with use of a single midline incision compared to bilateral incisions.</span></li><li data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Information regarding how the technical skills required to perform NSV are learned and translated into practice and to what extent practitioners reporting that they perform NSV are adhering to each of the requirements of the technique.</span></li><li data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">The incidence of early post-vasectomy scrotal hematoma and abscess formation according to the method of vas isolation.</span></li></ul><p data-dcnode-id="2626"><strong data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Vas Occlusion</span></strong></p><ul data-dcnode-id="2611"><li data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Methodologically robust (e.g., well-designed prospective observational studies and RCTs) are needed of large cohorts in developed countriesthat compare occlusive techniques with regard to surgical complication rates, post-vasectomy pain and occlusive and contraceptive effectiveness at short-, medium- and long-term follow up points.</span></li><li data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Evaluation of the effectiveness of thermal cautery vs. electrocautery for vas occlusion.</span></li><li data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">RCTs to evaluate the occlusive effectiveness and complication rates associated with cautery and FI vs. cautery alone, open versus closed testicular end with FI and cautery of the abdominal side and complications including anti-sperm antibodies.</span></li><li data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Reliable techniques for applying cautery to the vasal mucosa and avoid damage to the vasal muscularis.</span></li><li data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Information regarding the potential value and possible complications from the addition of folding back to any technique.</span></li><li data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Whether postoperative bleeding complications are more common if FI is performed than if FI is not performed.</span></li><li data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">The development of percutaneous occlusion techniques.</span></li></ul><p data-dcnode-id="2608"><strong data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Post-Vasectomy Follow-up</span></strong></p><ul data-dcnode-id="2585"><li data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">More rigorous study of the prevalence of azoospermia and RNMS related to the method of vas occlusion at various time intervals after vasectomy (e.g., at weeks 6, 9, 12, 16, 20 and 24).</span></li><li data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Study of why some men have RNMS for substantial intervals post-vasectomy (e.g., three, six, nine months) while others do not.</span></li><li data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">Information about the prevalence of paternity at various post-vasectomy time intervals as long as 5 to 10 years.</span></li><li data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Contraceptive effectiveness at different PVSA thresholds (including varying levels of RNMS).</span></li><li data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Whether the PVSA thresholds of commercially available home test kits are sufficient to ensure contraceptive effectiveness.</span></li><li data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">How couples who desire to have more children after a vasectomy choose between vasectomy reversal and sperm retrieval with IVF/ICSI and the percentage of couples choosing each technique.</span></li><li data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Comparisons of PVSA results when the analysis is done by physicians in office laboratories certified for provider performed microscopy compared to results of commercial laboratories certified for high complexity testing.</span></li><li data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Comparison of the number of sperm/HPF between standard light microsopy and phase contrast microsopy.</span></li><li data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Patient preferences for the timing of PVSA with regard to achieving earlier clearance vs. the need for more than one PVSA.</span></li><li data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Investigations of post-vasectomy testicular changes (i.e., histologic changes in the seminiferous tubules and in spermatogenesis, electron microscopic changes of interstitial fibrosis) and how they may correlate with both post-vasectomy antisperm antibody status and with vasectomy reversal outcomes.</span></li><li data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">The incidence of serum antisperm antibodies as determined by immunoglobulin A, G and M testing after vasectomy and how they affect fertility rates after vasectomy reversal and after sperm retrieval with IVF/ICSI (including sperm surface antibody studies in seminal plasma after vasectomy reversal).</span></li></ul><p data-dcnode-id="2582"><strong data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Complications</span></strong></p><ul data-dcnode-id="2571"><li data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Methodologically rigorous studies to provide accurate rates of early post-vasectomy hematoma, wound infection and scrotal abscess formation.</span></li><li data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Studies that distinguish between post-vasectomy pain due to epididymal congestion or epididymal sperm granuloma (resulting from rupture of the epididymal tubule caused by back pressure below the level of the vasectomy) vs. pain due to true bacterial epididymitis.</span></li><li data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Studies of various imaging modalities that allow the accurate diagnosis of the cause of post-vasectomy epididymal pain.</span></li><li data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Incidence of chronic post-vasectomy pain according to standardized scales starting at three to six months and continuing until up to three to five years post-vasectomy.</span></li><li data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Incidence of chronic pain of differing severity, the percentage of patients who feel that their quality of life has been impacted by the pain, the percentage of patients who seek medical help for relief of such pain, the percentage who undergo some type of surgical procedure for pain relief and the success rate of the various procedures for relieving the pain.</span></li></ul><span data-dcnode-id="2570" instrument_node="">

le sperm</span></p></td></tr><tr data-dcnode-id="2343"><td data-dcnode-id="2347" valign="bottom" width="85"><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">RR</span></p></td><td data-dcnode-id="2344" valign="bottom" width="354"><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">relative risk</span></p></td></tr><tr data-dcnode-id="2336"><td data-dcnode-id="2340" valign="bottom" width="85"><p data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">µL</span></p></td><td data-dcnode-id="2337" valign="bottom" width="354"><p data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Microliter</span></p></td></tr><tr data-dcnode-id="2329"><td data-dcnode-id="2333" valign="bottom" width="85"><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">US</span></p></td><td data-dcnode-id="2330" valign="bottom" width="354"><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">United States</span></p></td></tr><tr data-dcnode-id="2322"><td data-dcnode-id="2326" valign="bottom" width="85"><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">VAS</span></p></td><td data-dcnode-id="2323" valign="bottom" width="354"><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">visual analog scale</span></p></td></tr><tr data-dcnode-id="2315"><td data-dcnode-id="2319" valign="bottom" width="85"><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">WHO</span></p></td><td data-dcnode-id="2316" valign="bottom" width="354"><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">World Health Organization</span></p></td></tr></tbody></table><p data-dcnode-id="2307"><span data-dcnode-id="2312" instrument_node="">Related Content:&nbsp;</span><a data-dcnode-id="2310" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.auanet.org/documents/Guidelines/PDF/AQUA%252027.pdf" onc </span><p data-dcnode-id="529"><span data-dcnode-id="532" instrument_node="">This document was written by the Vasectomy Guideline Panel of the American Urological Association Education and Research, Inc., which was created in 2008. The Practice Guidelines Committee (PGC) of the AUA selected the panel chair and co-chair. Panel members were selected by the chair and co-chair. Membership of the panel included urologists, family medicine physicians, and other clinicians with specific expertise on vasectomy techniques. The mission of the committee was to develop recommendations that are evidence-based or consensus-based, depending on Panel processes and available data, for optimal clinical practices in the surgical technique of vasectomy. Funding of the committee was provided by the AUA; committee members received no remuneration for their work. Each member of the committee provides an ongoing conflict of interest disclosure to the AUA. While these guidelines do not necessarily establish the standard of care, AUA seeks to recommend and to encourage compliance by practitioners with current best practices related to the condition being treated. As medical knowledge expands and technology advances, the guidelines will change. Today, these evidence based guideline statements represent not absolute mandates but provisional proposals for treatment under the specific conditions described in each document. For all these reasons, the guidelines do not pre-empt physician judgment in individual cases. Treating physicians must take into account variations in resources, and patient tolerances, needs, and preferences. Conformance with any clinical guideline does not guarantee a successful outcome. These guidelines are not intended to provide legal advice about vasectomy. Although guidelines are intended to encourage best practices and potentially encompass available technologies with sufficient data as of close of the literature review, they are necessarily time-limited. Guidelines cannot include evaluation of all data on emerging technologies or management, including those that are FDA-approved, which may immediately come to represent accepted clinical practices. For this reason, the AUA does not regard technologies or management which are too new to be addressed by these guidelines as necessarily experimental or investigational. The complete evidence report may be requested through AUA.</span><br data-dcnode-id="531"><br data-dcnode-id="530"></p><span data-dcnode-id="528" instrument_node="">
