</span><p data-dcnode-id="7224"><b data-dcnode-id="7240"><span data-dcnode-id="7241" instrument_node="">Clinical breast examination:</span></b><span data-dcnode-id="7239" instrument_node=""> Women with breast disease can use the Cu-IUD (U.S. MEC 1) (</span><i data-dcnode-id="7236"><a data-dcnode-id="7237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7238" instrument_node="">5</span></a></i><span data-dcnode-id="7235" instrument_node="">); therefore, screening for breast disease is not necessary for the safe initiation of the Cu-IUD. Although women with current breast cancer should not use the LNG-IUD (U.S. MEC 4) (</span><i data-dcnode-id="7232"><a data-dcnode-id="7233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7234" instrument_node="">5</span></a></i><span data-dcnode-id="7231" instrument_node="">), screening asymptomatic women with a clinical breast examination before inserting an IUD is not necessary because of the low prevalence of breast cancer among women of reproductive age. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with a breast examination before initiation of hormonal contraceptives (</span><i data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">15</span></i><span data-dcnode-id="7228" instrument_node="">). The incidence of breast cancer among women of reproductive age in the United States is low. In 2009, the incidence of breast cancer among women aged 20–49 years was approximately 72 per 100,000 women (</span><i data-dcnode-id="7226"><span data-dcnode-id="7227" instrument_node="">95</span></i><span data-dcnode-id="7225" instrument_node="">).</span></p><span data-dcnode-id="7223" instrument_node="">
</span><p data-dcnode-id="7202"><b data-dcnode-id="7221"><span data-dcnode-id="7222" instrument_node="">Cervical cytology:</span></b><span data-dcnode-id="7220" instrument_node=""> Although women with cervical cancer should not undergo IUD insertion (U.S. MEC 4) (</span><i data-dcnode-id="7217"><a data-dcnode-id="7218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7219" instrument_node="">5</span></a></i><span data-dcnode-id="7216" instrument_node="">), screening asymptomatic women with cervical cytology before IUD insertion is not necessary because of the high rates of cervical screening, low incidence of cervical cancer in the United States, and high likelihood that a woman with cervical cancer already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with cervical cytology before initiation of IUDs (</span><i data-dcnode-id="7214"><span data-dcnode-id="7215" instrument_node="">14</span></i><span data-dcnode-id="7213" instrument_node="">). Cervical cancer is rare in the United States, with an incidence rate of 8.1 per 100,000 women per year during 2004–2008 (</span><i data-dcnode-id="7211"><span data-dcnode-id="7212" instrument_node="">95</span></i><span data-dcnode-id="7210" instrument_node="">). The incidence and mortality rates from cervical cancer have declined dramatically in the United States, largely because of cervical cytology screening (</span><i data-dcnode-id="7208"><span data-dcnode-id="7209" instrument_node="">96</span></i><span data-dcnode-id="7207" instrument_node="">). Overall screening rates for cervical cancer in the United States are high; among women aged 22–30 years, approximately 87% reported having cervical cytology screening within the last 3 years (</span><i data-dcnode-id="7204"><a data-dcnode-id="7205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/mm6151a2.htm"><span data-dcnode-id="7206" instrument_node="">97</span></a></i><span data-dcnode-id="7203" instrument_node="">)).</span></p><span data-dcnode-id="7201" instrument_node="">
</span><p data-dcnode-id="7187"><b data-dcnode-id="7199"><span data-dcnode-id="7200" instrument_node="">HIV screening:</span></b><span data-dcnode-id="7198" instrument_node=""> Although women with acquired immunodeficiency syndrome (AIDS) who are not clinically well should generally not undergo IUD insertion (U.S. MEC 3) (</span><i data-dcnode-id="7195"><a data-dcnode-id="7196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7197" instrument_node="">5</span></a></i><span data-dcnode-id="7194" instrument_node="">), HIV screening is not necessary before IUD insertion because of the high likelihood that a woman in the United States with such an advanced stage of disease already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened for HIV infection before IUD insertion (</span><i data-dcnode-id="7192"><span data-dcnode-id="7193" instrument_node="">14</span></i><span data-dcnode-id="7191" instrument_node="">). Limited evidence suggests that IUDs are not associated with disease progression, increased infection, or other adverse health effects among women with HIV infection (</span><i data-dcnode-id="7189"><span data-dcnode-id="7190" instrument_node="">98</span></i><span data-dcnode-id="7188" instrument_node="">).</span></p><span data-dcnode-id="7186" instrument_node="">
</span><p data-dcnode-id="7178"><b data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">Other screening:</span></b><span data-dcnode-id="7183" instrument_node=""> Women with hypertension, diabetes, hyperlipidemia, or thrombogenic mutations can use (U.S. MEC 1) or generally can use (U.S. MEC 2) IUDs (</span><i data-dcnode-id="7180"><a data-dcnode-id="7181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7182" instrument_node="">5</span></a></i><span data-dcnode-id="7179" instrument_node="">). Therefore, screening for these conditions is not necessary for the safe initiation of IUDs.</span></p><span data-dcnode-id="7177" instrument_node="">
</span><h4 data-dcnode-id="7175"><span data-dcnode-id="7176" instrument_node="">Provision of Prophylactic Antibiotics at the Time of IUD Insertion</span></h4><span data-dcnode-id="7174" instrument_node="">
</span><ul data-dcnode-id="7171"><li data-dcnode-id="7172"><span data-dcnode-id="7173" instrument_node="">	Prophylactic antibiotics are generally not recommended for Cu-IUD or LNG-IUD insertion.</span></li></ul><span data-dcnode-id="7170" instrument_node="">
</span><p data-dcnode-id="7154"><b data-dcnode-id="7168"><span data-dcnode-id="7169" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="7167" instrument_node=""> Theoretically, IUD insertion could induce bacterial spread and lead to complications such as PID or infective endocarditis. A metaanalysis was conducted of randomized controlled trials examining antibiotic prophylaxis versus placebo or no treatment for IUD insertion (</span><i data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">99</span></i><span data-dcnode-id="7164" instrument_node="">). Use of prophylaxis reduced the frequency of unscheduled return visits but did not significantly reduce the incidence of PID or premature IUD discontinuation. Although the risk for PID was higher within the first 20 days after insertion, the incidence of PID was low among all women who had IUDs inserted (</span><i data-dcnode-id="7162"><span data-dcnode-id="7163" instrument_node="">63</span></i><span data-dcnode-id="7161" instrument_node="">). In addition, the American Heart Association recommends that the use of prophylactic antibiotics solely to prevent infective endocarditis is not needed for genitourinary procedures (</span><i data-dcnode-id="7159"><span data-dcnode-id="7160" instrument_node="">100</span></i><span data-dcnode-id="7158" instrument_node="">). Studies have not demonstrated a conclusive link between genitourinary procedures and infective endocarditis or a preventive benefit of prophylactic antibiotics during such procedures (</span><i data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">100</span></i><span data-dcnode-id="7155" instrument_node="">).</span></p><span data-dcnode-id="7153" instrument_node="">
</span><h4 data-dcnode-id="7151"><span data-dcnode-id="7152" instrument_node="">Routine Follow-Up After IUD Insertion</span></h4><span data-dcnode-id="7150" instrument_node="">
</span><p data-dcnode-id="7148"><span data-dcnode-id="7149" instrument_node="">These recommendations address when routine follow-up is needed for safe and effective continued use of contraception for healthy women. The recommendations refer to general situations and might vary for different users and different situations. Specific populations that might benefit from more frequent follow-up visits include adolescents, persons with certain medical conditions or characteristics, and persons with multiple medical conditions.</span></p><span data-dcnode-id="7147" instrument_node="">
</span><ul data-dcnode-id="7127"><li data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">	Advise a woman to return at any time to discuss side effects or other problems, if she wants to change the method being used, and when it is time to remove or replace the contraceptive method. No routine follow-up visit is required.</span></li><span data-dcnode-id="7144" instrument_node="">
</span><li data-dcnode-id="7128"><span data-dcnode-id="7143" instrument_node="">	At other routine visits, health-care providers who see IUD users should do the following:
				</span><ul class="List-2" data-dcnode-id="7129"><span data-dcnode-id="7142" instrument_node="">
</span><li data-dcnode-id="7140"><span data-dcnode-id="7141" instrument_node="">Assess the woman's satisfaction with her contraceptive method and whether she has any concerns about method use.</span></li><span data-dcnode-id="7139" instrument_node="">
</span><li data-dcnode-id="7137"><span data-dcnode-id="7138" instrument_node="">Assess any changes in health status, including medications, that would change the appropriateness of the IUD for safe and effective continued use on the basis of U.S. MEC (e.g., category 3 and 4 conditions and characteristics).</span></li><span data-dcnode-id="7136" instrument_node="">
</span><li data-dcnode-id="7134"><span data-dcnode-id="7135" instrument_node="">Consider performing an examination to check for the presence of the IUD strings.</span></li><span data-dcnode-id="7133" instrument_node="">
</span><li data-dcnode-id="7131"><span data-dcnode-id="7132" instrument_node="">Consider assessing weight changes and counseling women who are concerned about weight changes perceived to be associated with their contraceptive method. </span></li><span data-dcnode-id="7130" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="7126" instrument_node="">
</span><p data-dcnode-id="7113"><b data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="7123" instrument_node=""> Evidence from a systematic review about the effect of a specific follow-up visit schedule on IUD continuation is very limited and of poor quality. The evidence did not suggest that greater frequency of visits or earlier timing of the first follow-up visit after insertion improves continuation of use (</span><i data-dcnode-id="7121"><span data-dcnode-id="7122" instrument_node="">16</span></i><span data-dcnode-id="7120" instrument_node="">) (Level of evidence: II-2, poor, direct). Evidence from four studies from a systematic review on the incidence of PID among IUD initiators, or IUD removal as a result of PID, suggested that the incidence of PID did not differ between women using Cu-IUDs and those using DMPA, COCs, or LNG-IUDs (</span><i data-dcnode-id="7118"><span data-dcnode-id="7119" instrument_node="">17</span></i><span data-dcnode-id="7117" instrument_node="">) (Level of evidence: I to II-2, good, indirect). Evidence on the timing of PID after IUD insertion is mixed. Although the rate of PID was generally low, the largest study suggested that the rate of PID was significantly higher in the first 20 days after insertion (</span><i data-dcnode-id="7115"><span data-dcnode-id="7116" instrument_node="">63</span></i><span data-dcnode-id="7114" instrument_node="">) (Level of evidence: I to II-3, good to poor, indirect).</span></p><span data-dcnode-id="7112" instrument_node="">
</span><h4 data-dcnode-id="7110"><span data-dcnode-id="7111" instrument_node="">Bleeding Irregularities with Cu-IUD Use</span></h4><span data-dcnode-id="7109" instrument_node="">
</span><ul data-dcnode-id="7092"><li data-dcnode-id="7107"><span data-dcnode-id="7108" instrument_node="">	Before Cu-IUD insertion, provide counseling about potential changes in bleeding patterns during Cu-IUD use. Unscheduled spotting or light bleeding, as well as heavy or prolonged bleeding, is common during the first 3–6 months of Cu-IUD use,  is generally not harmful, and decreases with continued Cu-IUD use.</span></li><span data-dcnode-id="7106" instrument_node="">
</span><li data-dcnode-id="7104"><span data-dcnode-id="7105" instrument_node="">	If clinically indicated, consider an underlying gynecological problem, such as Cu-IUD displacement, an STD, pregnancy, or new pathologic uterine conditions (e.g., polyps or fibroids), especially in women who have already been using the Cu-IUD for a few months or longer and who have developed a new onset of heavy or prolonged bleeding. If an underlying gynecological problem is found, treat the condition or refer for care.</span></li><span data-dcnode-id="7103" instrument_node="">
</span><li data-dcnode-id="7096"><span data-dcnode-id="7102" instrument_node="">	If an underlying gynecological problem is not found and the woman requests treatment, the following treatment option can be considered during days of bleeding:
				</span><ul class="List-2" data-dcnode-id="7097"><span data-dcnode-id="7101" instrument_node="">
</span><li data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">Nonsteroidal antiinflammatory drugs (NSAIDs) for short-term treatment (5–7 days)</span></li><span data-dcnode-id="7098" instrument_node="">
</span></ul></li><span data-dcnode-id="7095" instrument_node="">
</span><li data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">	If bleeding persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="7091" instrument_node="">
</span><p data-dcnode-id="7078"><b data-dcnode-id="7089"><span data-dcnode-id="7090" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="7088" instrument_node=""> During contraceptive counseling and before insertion of the Cu-IUD, information about common side effects such as unscheduled spotting or light bleeding or heavy or prolonged menstrual bleeding, especially during the first 3–6 months of use, should be discussed (</span><i data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">70</span></i><span data-dcnode-id="7085" instrument_node="">). These bleeding irregularities are generally not harmful. Enhanced counseling about expected bleeding patterns and reassurance that bleeding irregularities are generally not harmful has been shown to reduce method discontinuation in clinical trials with other contraceptives (i.e., DMPA) (</span><i data-dcnode-id="7083"><span data-dcnode-id="7084" instrument_node="">101</span></i><span data-dcnode-id="7082" instrument_node="">,</span><i data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">102</span></i><span data-dcnode-id="7079" instrument_node="">).</span></p><span data-dcnode-id="7077" instrument_node="">
</span><p data-dcnode-id="7075"><span data-dcnode-id="7076" instrument_node="">Evidence is limited on specific drugs, doses, and durations of use for effective treatments for bleeding irregularities with Cu-IUD use; therefore, although this document includes general recommendations for treatments to consider, evidence for specific regimens is lacking.</span></p><span data-dcnode-id="7074" instrument_node="">
</span><p data-dcnode-id="7012"><span data-dcnode-id="7073" instrument_node="">A systematic review identified 11 articles that examined various therapeutic treatments for heavy menstrual bleeding, prolonged menstrual bleeding, or both among women using Cu-IUDs (</span><i data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">18</span></i><span data-dcnode-id="7070" instrument_node="">). Nine studies examined the use of various oral NSAIDs for the treatment of heavy or prolonged menstrual bleeding among Cu-IUD users and compared them to either a placebo or a baseline cycle. Three of these trials examined the use of indomethacin (</span><i data-dcnode-id="7068"><span data-dcnode-id="7069" instrument_node="">103</span></i><span data-dcnode-id="7067" instrument_node="">–</span><i data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">105</span></i><span data-dcnode-id="7064" instrument_node="">), another three examined mefenamic acid (</span><i data-dcnode-id="7062"><span data-dcnode-id="7063" instrument_node="">106</span></i><span data-dcnode-id="7061" instrument_node="">–</span><i data-dcnode-id="7059"><span data-dcnode-id="7060" instrument_node="">108</span></i><span data-dcnode-id="7058" instrument_node="">), and another three examined flufenamic acid (</span><i data-dcnode-id="7056"><span data-dcnode-id="7057" instrument_node="">103</span></i><span data-dcnode-id="7055" instrument_node="">,</span><i data-dcnode-id="7053"><span data-dcnode-id="7054" instrument_node="">104</span></i><span data-dcnode-id="7052" instrument_node="">,</span><i data-dcnode-id="7050"><span data-dcnode-id="7051" instrument_node="">109</span></i><span data-dcnode-id="7049" instrument_node="">). Other NSAIDs used in the reported trials included alclofenac (</span><i data-dcnode-id="7047"><span data-dcnode-id="7048" instrument_node="">103</span></i><span data-dcnode-id="7046" instrument_node="">,</span><i data-dcnode-id="7044"><span data-dcnode-id="7045" instrument_node="">104</span></i><span data-dcnode-id="7043" instrument_node="">), suprofen (</span><i data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">110</span></i><span data-dcnode-id="7040" instrument_node="">), and diclofenac sodium (</span><i data-dcnode-id="7038"><span data-dcnode-id="7039" instrument_node="">111</span></i><span data-dcnode-id="7037" instrument_node="">). All but one NSAID study (</span><i data-dcnode-id="7035"><span data-dcnode-id="7036" instrument_node="">107</span></i><span data-dcnode-id="7034" instrument_node="">) demonstrated statistically significant or notable reductions in mean total menstrual blood loss with NSAID use. One study among 19 Cu-IUD users with heavy bleeding suggested that treatment with oral tranexamic acid can significantly reduce mean blood loss during treatment compared with placebo (</span><i data-dcnode-id="7032"><span data-dcnode-id="7033" instrument_node="">111</span></i><span data-dcnode-id="7031" instrument_node="">). Data regarding the overall safety of tranexamic acid are limited; an FDA warning states that tranexamic acid is contraindicated in women with active thromboembolic disease or with a history or intrinsic risk for thrombosis or thromboembolism (</span><i data-dcnode-id="7029"><span data-dcnode-id="7030" instrument_node="">112</span></i><span data-dcnode-id="7028" instrument_node="">,</span><i data-dcnode-id="7026"><span data-dcnode-id="7027" instrument_node="">113</span></i><span data-dcnode-id="7025" instrument_node="">). Treatment with aspirin demonstrated no statistically significant change in mean blood loss among women whose pretreatment menstrual blood loss was &gt;80 mL or 60–80 mL; treatment resulted in a significant increase among women whose pretreatment menstrual blood loss was &lt;60 mL (</span><i data-dcnode-id="7023"><span data-dcnode-id="7024" instrument_node="">114</span></i><span data-dcnode-id="7022" instrument_node="">). One study examined the use of a synthetic form of vasopressin, intranasal desmopressin (300 </span><i data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">µ</span></i><span data-dcnode-id="7019" instrument_node="">g/day), for the first 5 days of menses for three treatment cycles and found a significant reduction in mean blood loss compared with baseline (</span><i data-dcnode-id="7017"><span data-dcnode-id="7018" instrument_node="">106</span></i><span data-dcnode-id="7016" instrument_node="">) (Level of evidence: I to II-3, poor to fair, direct). Only one small study examined treatment of spotting with three separate NSAIDs and did not observe improvements in spotting in any of the groups (</span><i data-dcnode-id="7014"><span data-dcnode-id="7015" instrument_node="">103</span></i><span data-dcnode-id="7013" instrument_node="">) (Level of evidence: I, poor, direct).</span></p><span data-dcnode-id="7011" instrument_node="">
</span><h4 data-dcnode-id="7009"><span data-dcnode-id="7010" instrument_node="">Bleeding Irregularities (Including Amenorrhea) with LNG-IUD Use</span></h4><span data-dcnode-id="7008" instrument_node="">
</span><ul data-dcnode-id="7005"><li data-dcnode-id="7006"><span data-dcnode-id="7007" instrument_node="">	Before LNG-IUD insertion, provide counseling about potential changes in bleeding patterns during LNG-IUD use. Unscheduled spotting or light bleeding is expected during the first 3–6 months of LNG-IUD use, is generally not harmful, and decreases with continued LNG-IUD use. Over time, bleeding generally decreases with LNG-IUD use, and many women experience only light menstrual bleeding or amenorrhea. Heavy or prolonged bleeding, either unscheduled or menstrual, is uncommon during LNG-IUD use.</span></li></ul><span data-dcnode-id="7004" instrument_node="">
</span><h4 data-dcnode-id="7002"><span data-dcnode-id="7003" instrument_node="">Irregular Bleeding (Spotting, Light Bleeding, or Heavy or Prolonged Bleeding)</span></h4><span data-dcnode-id="7001" instrument_node="">
</span><ul data-dcnode-id="6995"><li data-dcnode-id="6999"><span data-dcnode-id="7000" instrument_node="">	If clinically indicated, consider an underlying gynecological problem, such as LNG-IUD displacement, an STD, pregnancy, or new pathologic uterine conditions (e.g., polyps or fibroids). If an underlying gynecological problem is found, treat the condition or refer for care.</span></li><span data-dcnode-id="6998" instrument_node="">
</span><li data-dcnode-id="6996"><span data-dcnode-id="6997" instrument_node="">	If bleeding persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="6994" instrument_node="">
</span><h4 data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">Amenorrhea</span></h4><span data-dcnode-id="6991" instrument_node="">
</span><ul data-dcnode-id="6980"><li data-dcnode-id="6984"><span data-dcnode-id="6990" instrument_node="">	Amenorrhea does not require any medical treatment. Provide reassurance.
				</span><ul class="List-2" data-dcnode-id="6985"><span data-dcnode-id="6989" instrument_node="">
</span><li data-dcnode-id="6987"><span data-dcnode-id="6988" instrument_node="">If a woman's regular bleeding pattern changes abruptly to amenorrhea, consider ruling out pregnancy if clinically indicated.</span></li><span data-dcnode-id="6986" instrument_node="">
</span></ul></li><span data-dcnode-id="6983" instrument_node="">
</span><li data-dcnode-id="6981"><span data-dcnode-id="6982" instrument_node="">	If amenorrhea persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired</span></li></ul><span data-dcnode-id="6979" instrument_node="">
</span><p data-dcnode-id="6966"><b data-dcnode-id="6977"><span data-dcnode-id="6978" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6976" instrument_node=""> During contraceptive counseling and before insertion of the LNG-IUD, information about common side effects such as unscheduled spotting or light bleeding, especially during the first 3–6 months of use, should be discussed. Approximately half of LNG-IUD users are likely to experience amenorrhea or oligomenorrhea by 2 years of use (</span><i data-dcnode-id="6974"><span data-dcnode-id="6975" instrument_node="">115</span></i><span data-dcnode-id="6973" instrument_node="">). These bleeding irregularities are generally not harmful. Enhanced counseling about expected bleeding patterns and reassurance that bleeding irregularities are generally not harmful has been shown to reduce method discontinuation in clinical trials with other hormonal contraceptives (i.e., DMPA) (</span><i data-dcnode-id="6971"><span data-dcnode-id="6972" instrument_node="">101</span></i><span data-dcnode-id="6970" instrument_node="">,</span><i data-dcnode-id="6968"><span data-dcnode-id="6969" instrument_node="">102</span></i><span data-dcnode-id="6967" instrument_node="">). No direct evidence was found regarding therapeutic treatments for bleeding irregularities during LNG-IUD use.</span></p><span data-dcnode-id="6965" instrument_node="">
</span><h4 data-dcnode-id="6963"><span data-dcnode-id="6964" instrument_node="">Management of the IUD when a Cu-IUD or an LNG-IUD User Is Found To Have PID</span></h4><span data-dcnode-id="6962" instrument_node="">
</span><ul data-dcnode-id="6931"><li data-dcnode-id="6953"><span data-dcnode-id="6961" instrument_node="">	Treat the PID according to the CDC </span><i data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">Sexually Transmitted Diseases Treatment Guidelines</span></i><span data-dcnode-id="6958" instrument_node=""> (</span><i data-dcnode-id="6955"><a data-dcnode-id="6956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr5912a1.htm"><span data-dcnode-id="6957" instrument_node="">32</span></a></i><span data-dcnode-id="6954" instrument_node="">)).</span></li><span data-dcnode-id="6952" instrument_node="">
</span><li data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">	Provide comprehensive management for STDs, including counseling about condom use.</span></li><span data-dcnode-id="6949" instrument_node="">
</span><li data-dcnode-id="6947"><span data-dcnode-id="6948" instrument_node="">	The IUD does not need to be removed immediately if the woman needs ongoing contraception.</span></li><span data-dcnode-id="6946" instrument_node="">
</span><li data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">	Reassess the woman in 48–72 hours. If no clinical improvement occurs, continue antibiotics and consider removal of the IUD.</span></li><span data-dcnode-id="6943" instrument_node="">
</span><li data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">	If the woman wants to discontinue use, remove the IUD sometime after antibiotics have been started to avoid the potential risk for bacterial spread resulting from the removal procedure.</span></li><span data-dcnode-id="6940" instrument_node="">
</span><li data-dcnode-id="6938"><span data-dcnode-id="6939" instrument_node="">	If the IUD is removed, consider ECPs if appropriate. Counsel the woman on alternative contraceptive methods, and offer another method if it is desired.</span></li><span data-dcnode-id="6937" instrument_node="">
</span><li data-dcnode-id="6932"><span data-dcnode-id="6936" instrument_node="">	A summary of IUD management in women with PID is provided (</span><a data-dcnode-id="6934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr6205a7.htm%3Fs_cid%3Drr6205a7_w"><span data-dcnode-id="6935" instrument_node="">Appendix F</span></a><span data-dcnode-id="6933" instrument_node="">).</span></li></ul><span data-dcnode-id="6930" instrument_node="">
</span><p data-dcnode-id="6926"><b data-dcnode-id="6928"><span data-dcnode-id="6929" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6927" instrument_node=""> Treatment outcomes do not generally differ between women with PID who retain the IUD and those who have the IUD removed; however, appropriate antibiotic treatment and close clinical follow-up are necessary.</span></p><span data-dcnode-id="6925" instrument_node="">
</span><p data-dcnode-id="6908"><span data-dcnode-id="6924" instrument_node="">A systematic review identified four studies that included women using copper or nonhormonal IUDs who developed PID and compared outcomes between women who had the IUD removed or did not (</span><i data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">19</span></i><span data-dcnode-id="6921" instrument_node="">). One randomized trial showed that women with IUDs removed had longer hospitalizations than those who did not, although no differences in PID recurrences or subsequent pregnancies were observed (</span><i data-dcnode-id="6919"><span data-dcnode-id="6920" instrument_node="">116</span></i><span data-dcnode-id="6918" instrument_node="">). Another randomized trial showed no differences in laboratory findings among women who removed the IUD compared with those who did not (</span><i data-dcnode-id="6916"><span data-dcnode-id="6917" instrument_node="">117</span></i><span data-dcnode-id="6915" instrument_node="">). One prospective cohort study showed no differences in clinical or laboratory findings during hospitalization; however, the IUD removal group had longer hospitalizations (</span><i data-dcnode-id="6913"><span data-dcnode-id="6914" instrument_node="">118</span></i><span data-dcnode-id="6912" instrument_node="">). One randomized trial showed that the rate of recovery for most clinical signs and symptoms was higher among women who had the IUD removed than among women who did not (</span><i data-dcnode-id="6910"><span data-dcnode-id="6911" instrument_node="">119</span></i><span data-dcnode-id="6909" instrument_node="">). No evidence was found regarding women using LNG-IUDs (Level of evidence: I to II-2, fair, direct).</span></p><span data-dcnode-id="6907" instrument_node="">
</span><h4 data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">Management of the IUD when a Cu-IUD or an LNG-IUD User Is Found To Be Pregnant</span></h4><span data-dcnode-id="6904" instrument_node="">
</span><ul data-dcnode-id="6890"><li data-dcnode-id="6902"><span data-dcnode-id="6903" instrument_node="">	Evaluate for possible ectopic pregnancy.</span></li><span data-dcnode-id="6901" instrument_node="">
</span><li data-dcnode-id="6891"><span data-dcnode-id="6900" instrument_node="">	Advise the woman that she has an increased risk for spontaneous abortion (including septic abortion that might be life threatening) and of preterm delivery if the IUD is left in place. The removal of the IUD reduces these risks but might not decrease the risk to the baseline level of a pregnancy without an IUD.
				</span><ul class="List-2" data-dcnode-id="6892"><span data-dcnode-id="6899" instrument_node="">
</span><li data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">If she does not want to continue the pregnancy, counsel her about options.</span></li><span data-dcnode-id="6896" instrument_node="">
</span><li data-dcnode-id="6894"><span data-dcnode-id="6895" instrument_node="">If she wants continue the pregnancy, advise her to seek care promptly if she has heavy bleeding, cramping, pain, abnormal vaginal discharge, or fever.</span></li><span data-dcnode-id="6893" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="6889" instrument_node="">
</span><h4 data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">IUD Strings Are Visible or Can Be Retrieved Safely from the Cervical Canal</span></h4><span data-dcnode-id="6886" instrument_node="">
</span><ul data-dcnode-id="6872"><li data-dcnode-id="6876"><span data-dcnode-id="6885" instrument_node="">	Advise the woman that the IUD should be removed as soon as possible.
				</span><ul class="List-2" data-dcnode-id="6877"><span data-dcnode-id="6884" instrument_node="">
</span><li data-dcnode-id="6882"><span data-dcnode-id="6883" instrument_node="">If the IUD is to be removed, remove it by pulling on the strings gently.</span></li><span data-dcnode-id="6881" instrument_node="">
</span><li data-dcnode-id="6879"><span data-dcnode-id="6880" instrument_node="">Advise the woman that she should return promptly if she has heavy bleeding, cramping, pain, abnormal vaginal discharge, or fever.</span></li><span data-dcnode-id="6878" instrument_node="">
</span></ul></li><span data-dcnode-id="6875" instrument_node="">
</span><li data-dcnode-id="6873"><span data-dcnode-id="6874" instrument_node="">	If she chooses to keep the IUD, advise her to seek care promptly if she has heavy bleeding, cramping, pain, abnormal vaginal discharge, or fever.</span></li></ul><span data-dcnode-id="6871" instrument_node="">
</span><h4 data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">IUD Strings Are Not Visible and Cannot Be Retrieved Safely</span></h4><span data-dcnode-id="6868" instrument_node="">
</span><ul data-dcnode-id="6862"><li data-dcnode-id="6866"><span data-dcnode-id="6867" instrument_node="">	If ultrasonography is available, consider performing or referring for ultrasound examination to determine the location of the IUD. If the IUD cannot be located, it might have been expelled or have perforated the uterine wall.</span></li><span data-dcnode-id="6865" instrument_node="">
</span><li data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">	If ultrasonography is not possible or the IUD is determined by ultrasound to be inside the uterus, advise the woman to seek care promptly if she has heavy bleeding, cramping, pain, abnormal vaginal discharge, or fever.</span></li></ul><span data-dcnode-id="6861" instrument_node="">
</span><p data-dcnode-id="6857"><b data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6858" instrument_node=""> Removing the IUD improves the pregnancy outcome if the IUD strings are visible or the device can be retrieved safely from the cervical canal. Risks for spontaneous abortion, preterm delivery, and infection are substantial if the IUD is left in place.</span></p><span data-dcnode-id="6856" instrument_node="">
</span><p data-dcnode-id="6854"><span data-dcnode-id="6855" instrument_node="">Theoretically, the fetus might be affected by hormonal exposure from an LNG-IUD; however, whether this exposure increases the risk for fetal abnormalities is unknown.</span></p><span data-dcnode-id="6853" instrument_node="">
</span><p data-dcnode-id="6848"><span data-dcnode-id="6852" instrument_node="">A systematic review identified nine studies suggesting that women who did not remove their IUDs during pregnancy were at greater risk for adverse pregnancy outcomes (including spontaneous abortion, septic abortion, preterm delivery, and chorioamnionitis) compared with women who had their IUDs removed or who did not have an IUD (</span><i data-dcnode-id="6850"><span data-dcnode-id="6851" instrument_node="">58</span></i><span data-dcnode-id="6849" instrument_node="">). Cu-IUD removal decreased risks but not to the baseline risk for pregnancies without an IUD. One case series examined LNG-IUDs. When they were not removed, eight in 10 pregnancies ended in spontaneous abortions (Level of evidence: II-2, fair, direct).</span></p><span data-dcnode-id="6847" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="6845"><span data-dcnode-id="6846" instrument_node="">Implants</span></h3><span data-dcnode-id="6844" instrument_node="">
</span><p data-dcnode-id="6839"><span data-dcnode-id="6843" instrument_node="">The etonogestrel implant, a single rod with 68 mg of etonogestrel, is available in the United States. Fewer than 1 woman out of 100 become pregnant in the first year of use of the etonogestrel implant with typical use (</span><i data-dcnode-id="6841"><span data-dcnode-id="6842" instrument_node="">59</span></i><span data-dcnode-id="6840" instrument_node="">). The implant is long acting, is reversible, and can be used by women of all ages, including adolescents. The implant does not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="6838" instrument_node="">
</span><h4 data-dcnode-id="6836"><span data-dcnode-id="6837" instrument_node="">Initiation of Implants</span></h4><span data-dcnode-id="6835" instrument_node="">
</span><h4 data-dcnode-id="6833"><span data-dcnode-id="6834" instrument_node="">Timing</span></h4><span data-dcnode-id="6832" instrument_node="">
</span><ul data-dcnode-id="6826"><li data-dcnode-id="6827"><span data-dcnode-id="6831" instrument_node="">	The implant can be inserted at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6829" href="#Box1"><span data-dcnode-id="6830" instrument_node="">Box 1</span></a><span data-dcnode-id="6828" instrument_node="">).</span></li></ul><span data-dcnode-id="6825" instrument_node="">
</span><h4 data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">Need for Back-Up Contraception</span></h4><span data-dcnode-id="6822" instrument_node="">
</span><ul data-dcnode-id="6816"><li data-dcnode-id="6820"><span data-dcnode-id="6821" instrument_node="">	If the implant is inserted within the first 5 days since menstrual bleeding started, no additional contraceptive protection is needed.</span></li><span data-dcnode-id="6819" instrument_node="">
</span><li data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">	If the implant is inserted &gt;5 days since menstrual bleeding started, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6815" instrument_node="">
</span><h4 data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">Special Considerations</span></h4><span data-dcnode-id="6812" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="6809"><b data-dcnode-id="6810"><span data-dcnode-id="6811" instrument_node="">Amenorrhea (Not Postpartum)</span></b></p><span data-dcnode-id="6808" instrument_node="">
</span><ul data-dcnode-id="6793"><li data-dcnode-id="6800"><span data-dcnode-id="6807" instrument_node=""> </span><b data-dcnode-id="6805"><span data-dcnode-id="6806" instrument_node="">Timing:</span></b><span data-dcnode-id="6804" instrument_node=""> The implant can be inserted at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6802" href="#Box1"><span data-dcnode-id="6803" instrument_node="">Box 1</span></a><span data-dcnode-id="6801" instrument_node="">).</span></li><span data-dcnode-id="6799" instrument_node="">
</span><li data-dcnode-id="6794"><span data-dcnode-id="6798" instrument_node=""> </span><b data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6795" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6792" instrument_node="">
</span><p class="h5" data-dcnode-id="6789"><b data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">Postpartum (Breastfeeding)</span></b></p><span data-dcnode-id="6788" instrument_node="">
</span><ul data-dcnode-id="6770"><li data-dcnode-id="6780"><span data-dcnode-id="6787" instrument_node=""> </span><b data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node="">Timing:</span></b><span data-dcnode-id="6784" instrument_node=""> The implant can be inserted at any time (U.S. MEC 2 if &lt;1 month postpartum and U.S. MEC 1 if ≥1 month postpartum) if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6782" href="#Box1"><span data-dcnode-id="6783" instrument_node="">Box 1</span></a><span data-dcnode-id="6781" instrument_node="">).</span></li><span data-dcnode-id="6779" instrument_node="">
</span><li data-dcnode-id="6771"><span data-dcnode-id="6778" instrument_node=""> </span><b data-dcnode-id="6776"><span data-dcnode-id="6777" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6775" instrument_node=""> If the woman is &lt;6 months postpartum, amenorrheic, and fully or nearly fully breastfeeding (exclusively breastfeeding or the vast majority [≥85%] of feeds are breastfeeds) (</span><i data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">60</span></i><span data-dcnode-id="6772" instrument_node="">), no additional contraceptive protection is needed. Otherwise, a woman who is ≥21 days postpartum and has not experienced return of her menstrual cycle needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. If her menstrual cycles have returned and it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6769" instrument_node="">
</span><p class="h5" data-dcnode-id="6766"><b data-dcnode-id="6767"><span data-dcnode-id="6768" instrument_node="">Postpartum (Not Breastfeeding)</span></b></p><span data-dcnode-id="6765" instrument_node="">
</span><ul data-dcnode-id="6750"><li data-dcnode-id="6757"><span data-dcnode-id="6764" instrument_node=""> </span><b data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">Timing:</span></b><span data-dcnode-id="6761" instrument_node=""> The implant can be inserted at any time, including immediately postpartum (U.S. MEC 1) if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6759" href="#Box1"><span data-dcnode-id="6760" instrument_node="">Box 1</span></a><span data-dcnode-id="6758" instrument_node="">).</span></li><span data-dcnode-id="6756" instrument_node="">
</span><li data-dcnode-id="6751"><span data-dcnode-id="6755" instrument_node=""> </span><b data-dcnode-id="6753"><span data-dcnode-id="6754" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6752" instrument_node=""> A woman who is ≥21 days postpartum and has not experienced return of her menstrual cycle needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. If her menstrual cycles have returned and it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6749" instrument_node="">
</span><p class="h5" data-dcnode-id="6746"><b data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">Postabortion (Spontaneous or Induced)</span></b></p><span data-dcnode-id="6745" instrument_node="">
</span><ul data-dcnode-id="6733"><li data-dcnode-id="6740"><span data-dcnode-id="6744" instrument_node=""> </span><b data-dcnode-id="6742"><span data-dcnode-id="6743" instrument_node="">Timing:</span></b><span data-dcnode-id="6741" instrument_node=""> The implant can be inserted within the first 7 days, including immediately after the abortion (U.S. MEC 1).</span></li><span data-dcnode-id="6739" instrument_node="">
</span><li data-dcnode-id="6734"><span data-dcnode-id="6738" instrument_node=""> </span><b data-dcnode-id="6736"><span data-dcnode-id="6737" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6735" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days unless the implant is placed at the time of a surgical abortion.</span></li></ul><span data-dcnode-id="6732" instrument_node="">
</span><p class="h5" data-dcnode-id="6729"><b data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">Switching from Another Contraceptive Method</span></b></p><span data-dcnode-id="6728" instrument_node="">
</span><ul data-dcnode-id="6696"><li data-dcnode-id="6720"><span data-dcnode-id="6727" instrument_node=""> </span><b data-dcnode-id="6725"><span data-dcnode-id="6726" instrument_node="">Timing:</span></b><span data-dcnode-id="6724" instrument_node=""> The implant can be inserted immediately if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6722" href="#Box1"><span data-dcnode-id="6723" instrument_node="">Box 1</span></a><span data-dcnode-id="6721" instrument_node="">). Waiting for her next menstrual period is unnecessary.</span></li><span data-dcnode-id="6719" instrument_node="">
</span><li data-dcnode-id="6714"><span data-dcnode-id="6718" instrument_node=""> </span><b data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6715" instrument_node=""> If it has been &gt;5 days since menstrual bleeding started, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days after insertion.</span></li><span data-dcnode-id="6713" instrument_node="">
</span><li data-dcnode-id="6697"><span data-dcnode-id="6712" instrument_node=""> </span><b data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">Switching from an IUD:</span></b><span data-dcnode-id="6709" instrument_node=""> If the woman has had sexual intercourse since the start of her current menstrual cycle and it has been &gt;5 days since menstrual bleeding started, theoretically, residual sperm might be in the genital tract, which could lead to fertilization if ovulation occurs. A health-care provider may consider any of the following options:
				</span><ul class="List-2" data-dcnode-id="6698"><span data-dcnode-id="6708" instrument_node="">
</span><li data-dcnode-id="6706"><span data-dcnode-id="6707" instrument_node="">Advise the woman to retain the IUD for at least 7 days after the implant is inserted and return for IUD removal.</span></li><span data-dcnode-id="6705" instrument_node="">
</span><li data-dcnode-id="6703"><span data-dcnode-id="6704" instrument_node="">Advise the woman to abstain from sexual intercourse or use barrier contraception for 7 days before removing the IUD and switching to the new method.</span></li><span data-dcnode-id="6702" instrument_node="">
</span><li data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">Advise the woman to use ECPs at the time of IUD removal.</span></li><span data-dcnode-id="6699" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="6695" instrument_node="">
</span><p data-dcnode-id="6691"><b data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6692" instrument_node=""> In situations in which the health-care provider is uncertain whether the woman might be pregnant, the benefits of starting the implant likely exceed any risk; therefore, starting the implant should be considered at any time, with a follow-up pregnancy test in 2–4 weeks.</span></p><span data-dcnode-id="6690" instrument_node="">
</span><p data-dcnode-id="6688"><span data-dcnode-id="6689" instrument_node="">If a woman needs to use additional contraceptive protection when switching to an implant from another contraceptive method, consider continuing her previous method for 7 days after implant insertion. No direct evidence was found regarding the effects of starting the etonogestrel implant at different times of the cycle.</span></p><span data-dcnode-id="6687" instrument_node="">
</span><h4 data-dcnode-id="6685"><span data-dcnode-id="6686" instrument_node="">Examinations and Tests Needed Before Implant Insertion</span></h4><span data-dcnode-id="6684" instrument_node="">
</span><p data-dcnode-id="6672"><span data-dcnode-id="6683" instrument_node="">Among healthy women, no examinations or tests are needed before initiation of an implant, although a baseline weight and BMI measurement might be useful for monitoring implant users over time </span><span class="callout-pink" data-dcnode-id="6678"><span data-dcnode-id="6682" instrument_node="">(</span><a data-dcnode-id="6680" href="#Tab3"><span data-dcnode-id="6681" instrument_node="">Table 3</span></a><span data-dcnode-id="6679" instrument_node="">)</span></span><span data-dcnode-id="6677" instrument_node="">. Women with known medical problems or other special conditions might need additional examinations or tests before being determined to be appropriate candidates for a particular method of contraception. U.S. MEC might be useful in such circumstances (</span><i data-dcnode-id="6674"><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6676" instrument_node="">5</span></a></i><span data-dcnode-id="6673" instrument_node="">).</span></p><span data-dcnode-id="6671" instrument_node="">
</span><p data-dcnode-id="6660"><b data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6668" instrument_node=""> </span><b data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">Weight (BMI):</span></b><span data-dcnode-id="6665" instrument_node=""> Obese women can use implants (U.S. MEC 1) (</span><i data-dcnode-id="6662"><a data-dcnode-id="6663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6664" instrument_node="">5</span></a></i><span data-dcnode-id="6661" instrument_node="">); therefore, screening for obesity is not necessary for the safe initiation of implants. However, measuring weight and calculating BMI at baseline might be helpful for monitoring any changes and counseling women who might be concerned about weight change perceived to be associated with their contraceptive method.</span></p><span data-dcnode-id="6659" instrument_node="">
</span><p data-dcnode-id="6645"><b data-dcnode-id="6657"><span data-dcnode-id="6658" instrument_node="">Bimanual examination and cervical inspection:</span></b><span data-dcnode-id="6656" instrument_node=""> A pelvic examination is not necessary before initiation of implants because it would not facilitate detection of conditions for which implant use would be unsafe. Women with current breast cancer should not use implants (U.S. MEC 4); women with certain liver diseases generally should not use implants (U.S. MEC 3) (</span><i data-dcnode-id="6653"><a data-dcnode-id="6654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6655" instrument_node="">5</span></a></i><span data-dcnode-id="6652" instrument_node="">). However, none of these conditions are likely to be detected by pelvic examination (</span><i data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">120</span></i><span data-dcnode-id="6649" instrument_node="">). A systematic review identified two case-control studies that compared delayed and immediate pelvic examination before initiation of hormonal contraceptives, specifically oral contraceptives or DMPA (</span><i data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">15</span></i><span data-dcnode-id="6646" instrument_node="">). No differences in risk factors for cervical neoplasia, incidence of STDs, incidence of abnormal Papanicolaou smears, or incidence of abnormal wet mounts were observed. No evidence was found regarding implants (Level of evidence: II-2 fair, direct).</span></p><span data-dcnode-id="6644" instrument_node="">
</span><p data-dcnode-id="6618"><b data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">Liver enzymes:</span></b><span data-dcnode-id="6641" instrument_node=""> Although women with certain liver diseases generally should not use implants (U.S. MEC 3) (</span><i data-dcnode-id="6638"><a data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6640" instrument_node="">5</span></a></i><span data-dcnode-id="6637" instrument_node="">), screening for liver disease before initiation of implants is not necessary because of the low prevalence of these conditions and the high likelihood that women with liver disease already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with liver enzyme tests before initiation of hormonal contraceptives (</span><i data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">14</span></i><span data-dcnode-id="6634" instrument_node="">). The prevalence of liver disorders among women of reproductive age is low. In 2008, the percentage of adults aged 18–44 years with liver disease (not further specified) was 1.0% (</span><i data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">90</span></i><span data-dcnode-id="6631" instrument_node="">). In 2009, the incidence of acute hepatitis A, B, or C among women was &lt;1 per 100,000 population (</span><i data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">91</span></i><span data-dcnode-id="6628" instrument_node="">). During 1998–2007, the incidence of liver carcinoma among women was approximately 3 per 100,000 population (</span><i data-dcnode-id="6626"><span data-dcnode-id="6627" instrument_node="">92</span></i><span data-dcnode-id="6625" instrument_node="">). Because estrogen and progestins are metabolized in the liver, the use of hormonal contraceptives among women with liver disease might, theoretically, be a concern. The use of hormonal contraceptives, specifically COCs and POPs, does not affect disease progression or severity in women with hepatitis, cirrhosis, or benign focal nodular hyperplasia (</span><i data-dcnode-id="6623"><span data-dcnode-id="6624" instrument_node="">93</span></i><span data-dcnode-id="6622" instrument_node="">,</span><i data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">94</span></i><span data-dcnode-id="6619" instrument_node="">), although evidence is limited and no evidence exists for implants.</span></p><span data-dcnode-id="6617" instrument_node="">
</span><p data-dcnode-id="6603"><b data-dcnode-id="6615"><span data-dcnode-id="6616" instrument_node="">Clinical breast examination:</span></b><span data-dcnode-id="6614" instrument_node=""> Although women with current breast cancer should not use implants (U.S. MEC 4) (</span><i data-dcnode-id="6611"><a data-dcnode-id="6612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6613" instrument_node="">5</span></a></i><span data-dcnode-id="6610" instrument_node="">), screening asymptomatic women with a clinical breast examination before initiating an implant is not necessary because of the low prevalence of breast cancer among women of reproductive age (15–49 years). A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with a breast examination before initiation of hormonal contraceptives (</span><i data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">15</span></i><span data-dcnode-id="6607" instrument_node="">). The incidence of breast cancer among women of reproductive age in the United States is low. In 2009, the incidence of breast cancer among women aged 20–49 years was approximately 72 per 100,000 women (</span><i data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">95</span></i><span data-dcnode-id="6604" instrument_node="">).</span></p><span data-dcnode-id="6602" instrument_node="">
</span><p data-dcnode-id="6594"><b data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">Other screening:</span></b><span data-dcnode-id="6599" instrument_node=""> Women with hypertension, diabetes, hyperlipidemia, anemia, thrombogenic mutations, cervical intraepithelial neoplasia, cervical cancer, STDs, or HIV infection can use (U.S. MEC 1) or generally can use (U.S. MEC 2) implants (</span><i data-dcnode-id="6596"><a data-dcnode-id="6597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6598" instrument_node="">5</span></a></i><span data-dcnode-id="6595" instrument_node="">); therefore, screening for these conditions is not necessary for the safe initiation of implants.</span></p><span data-dcnode-id="6593" instrument_node="">
</span><h4 data-dcnode-id="6591"><span data-dcnode-id="6592" instrument_node="">Routine Follow-Up After Implant Insertion</span></h4><span data-dcnode-id="6590" instrument_node="">
</span><p data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">These recommendations address when routine follow-up is needed for safe and effective continued use of contraception for healthy women. The recommendations refer to general situations and might vary for different users and different situations. Specific populations that might benefit from more frequent follow-up visits include adolescents, those with certain medical conditions or characteristics, and those with multiple medical conditions.</span></p><span data-dcnode-id="6587" instrument_node="">
</span><ul data-dcnode-id="6570"><li data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">	Advise a woman to return at any time to discuss side effects or other problems, if she wants to change the method being used, and when it is time to remove or replace the contraceptive method. No routine follow-up visit is required.</span></li><span data-dcnode-id="6584" instrument_node="">
</span><li data-dcnode-id="6571"><span data-dcnode-id="6583" instrument_node="">	At other routine visits, health-care providers seeing implant users should do the following:
				</span><ul class="List-2" data-dcnode-id="6572"><span data-dcnode-id="6582" instrument_node="">
</span><li data-dcnode-id="6580"><span data-dcnode-id="6581" instrument_node="">Assess the woman's satisfaction with her contraceptive method and whether she has any concerns about method use.</span></li><span data-dcnode-id="6579" instrument_node="">
</span><li data-dcnode-id="6577"><span data-dcnode-id="6578" instrument_node="">Assess any changes in health status, including medications, that would change the appropriateness of the implant for safe and effective continued use based on U.S. MEC (e.g., category 3 and 4 conditions and characteristics).</span></li><span data-dcnode-id="6576" instrument_node="">
</span><li data-dcnode-id="6574"><span data-dcnode-id="6575" instrument_node="">Consider assessing weight changes and counseling women who are concerned about weight changes perceived to be associated with their contraceptive method.</span></li><span data-dcnode-id="6573" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="6569" instrument_node="">
</span><p data-dcnode-id="6562"><b data-dcnode-id="6567"><span data-dcnode-id="6568" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6566" instrument_node=""> A systematic review did not identify any evidence regarding whether a routine follow-up visit after initiating an implant improves correct or continued use (</span><i data-dcnode-id="6564"><span data-dcnode-id="6565" instrument_node="">16</span></i><span data-dcnode-id="6563" instrument_node="">).</span></p><span data-dcnode-id="6561" instrument_node="">
</span><h4 data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">Bleeding Irregularities (Including Amenorrhea) During Implant Use</span></h4><span data-dcnode-id="6558" instrument_node="">
</span><ul data-dcnode-id="6555"><li data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">	Before implant insertion, provide counseling about potential changes in bleeding patterns during implant use. Unscheduled spotting or light bleeding is common with implant use, and some women experience amenorrhea. These bleeding changes are generally not harmful and might or might not decrease with continued implant use. Heavy or prolonged bleeding, unscheduled or menstrual, is uncommon during implant use.</span></li></ul><span data-dcnode-id="6554" instrument_node="">
</span><h4 data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">Irregular Bleeding (Spotting, Light Bleeding, or Heavy or Prolonged Bleeding)</span></h4><span data-dcnode-id="6551" instrument_node="">
</span><ul data-dcnode-id="6534"><li data-dcnode-id="6549"><span data-dcnode-id="6550" instrument_node="">	If clinically indicated, consider an underlying gynecological problem, such as interactions with other medications, an STD, pregnancy, or new pathologic uterine conditions (e.g., polyps or fibroids). If an underlying gynecological problem is found, treat the condition or refer for care.</span></li><span data-dcnode-id="6548" instrument_node="">
</span><li data-dcnode-id="6538"><span data-dcnode-id="6547" instrument_node="">	If an underlying gynecologic problem is not found and the woman wants treatment, the following treatment options during days of bleeding can be considered:
				</span><ul class="List-2" data-dcnode-id="6539"><span data-dcnode-id="6546" instrument_node="">
</span><li data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">NSAIDS for short-term treatment (5–7 days)</span></li><span data-dcnode-id="6543" instrument_node="">
</span><li data-dcnode-id="6541"><span data-dcnode-id="6542" instrument_node="">Hormonal treatment (if medically eligible) with low-dose COCs or estrogen for short-term treatment (10–20 days)</span></li><span data-dcnode-id="6540" instrument_node="">
</span></ul></li><span data-dcnode-id="6537" instrument_node="">
</span><li data-dcnode-id="6535"><span data-dcnode-id="6536" instrument_node="">	If irregular bleeding persists and the woman finds it unacceptable, counsel her on alternative methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="6533" instrument_node="">
</span><h4 data-dcnode-id="6531"><span data-dcnode-id="6532" instrument_node="">Amenorrhea</span></h4><span data-dcnode-id="6530" instrument_node="">
</span><ul data-dcnode-id="6519"><li data-dcnode-id="6523"><span data-dcnode-id="6529" instrument_node="">	Amenorrhea does not require any medical treatment. Provide reassurance.
				</span><ul class="List-2" data-dcnode-id="6524"><span data-dcnode-id="6528" instrument_node="">
</span><li data-dcnode-id="6526"><span data-dcnode-id="6527" instrument_node="">If a woman's regular bleeding pattern changes abruptly to amenorrhea, consider ruling out pregnancy if clinically indicated.</span></li><span data-dcnode-id="6525" instrument_node="">
</span></ul></li><span data-dcnode-id="6522" instrument_node="">
</span><li data-dcnode-id="6520"><span data-dcnode-id="6521" instrument_node="">	If amenorrhea persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="6518" instrument_node="">
</span><p data-dcnode-id="6505"><b data-dcnode-id="6516"><span data-dcnode-id="6517" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6515" instrument_node=""> During contraceptive counseling and before insertion of the implant, information about common side effects, such as unscheduled spotting or light bleeding and amenorrhea, especially during the first year of use should be discussed. A pooled analysis of data from 11 clinical trials indicate that a significant proportion of etonogestrel implant users had relatively little bleeding: 22% of women experienced amenorrhea and 34% experienced infrequent spotting, although 7% reported frequent bleeding and 18% reported prolonged bleeding (</span><i data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">121</span></i><span data-dcnode-id="6512" instrument_node="">). Unscheduled bleeding or amenorrhea is generally not harmful. Enhanced counseling about expected bleeding patterns and reassurance that bleeding irregularities are generally not harmful has been shown to reduce discontinuation in clinical trials with other hormonal contraceptives (i.e., DMPA) (</span><i data-dcnode-id="6510"><span data-dcnode-id="6511" instrument_node="">101</span></i><span data-dcnode-id="6509" instrument_node="">,</span><i data-dcnode-id="6507"><span data-dcnode-id="6508" instrument_node="">102</span></i><span data-dcnode-id="6506" instrument_node="">).</span></p><span data-dcnode-id="6504" instrument_node="">
</span><p data-dcnode-id="6445"><span data-dcnode-id="6503" instrument_node="">A systematic review and four newly published studies examined several medications for the treatment of bleeding irregularities with primarily LNG contraceptive implants (</span><i data-dcnode-id="6501"><span data-dcnode-id="6502" instrument_node="">122</span></i><span data-dcnode-id="6500" instrument_node="">–</span><i data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">126</span></i><span data-dcnode-id="6497" instrument_node="">). Two small studies found significant cessation of bleeding within 7 days of start of treatment among women taking oral celecoxib (200 mg) daily for 5 days or oral mefenamic acid (500 mg) 3 times daily for 5 days compared with placebo (</span><i data-dcnode-id="6495"><span data-dcnode-id="6496" instrument_node="">124</span></i><span data-dcnode-id="6494" instrument_node="">,</span><i data-dcnode-id="6492"><span data-dcnode-id="6493" instrument_node="">125</span></i><span data-dcnode-id="6491" instrument_node="">). Differences in bleeding cessation were not found among women with etonogestrel implants taking mifepristone but were found when women with the implants combined mifepristone with either ethinyl estradiol or doxycycline (</span><i data-dcnode-id="6489"><span data-dcnode-id="6490" instrument_node="">126</span></i><span data-dcnode-id="6488" instrument_node="">,</span><i data-dcnode-id="6486"><span data-dcnode-id="6487" instrument_node="">127</span></i><span data-dcnode-id="6485" instrument_node="">). Doxycycline alone or in combination with ethinyl estradiol did not improve bleeding cessation among etonogestrel implant users (</span><i data-dcnode-id="6483"><span data-dcnode-id="6484" instrument_node="">126</span></i><span data-dcnode-id="6482" instrument_node="">). Among LNG implant users, mifepristone reduced the number of bleeding or spotting days but only after 6 months of treatment (</span><i data-dcnode-id="6480"><span data-dcnode-id="6481" instrument_node="">128</span></i><span data-dcnode-id="6479" instrument_node="">). Evidence also suggests that estrogen (</span><i data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node="">129</span></i><span data-dcnode-id="6476" instrument_node="">–</span><i data-dcnode-id="6474"><span data-dcnode-id="6475" instrument_node="">131</span></i><span data-dcnode-id="6473" instrument_node="">), daily COCs (</span><i data-dcnode-id="6471"><span data-dcnode-id="6472" instrument_node="">129</span></i><span data-dcnode-id="6470" instrument_node="">), levonorgestrel pills (</span><i data-dcnode-id="6468"><span data-dcnode-id="6469" instrument_node="">130</span></i><span data-dcnode-id="6467" instrument_node="">), tamoxifen (</span><i data-dcnode-id="6465"><span data-dcnode-id="6466" instrument_node="">132</span></i><span data-dcnode-id="6464" instrument_node="">), or tranexamic acid (</span><i data-dcnode-id="6462"><span data-dcnode-id="6463" instrument_node="">133</span></i><span data-dcnode-id="6461" instrument_node="">) can reduce the number of bleeding or spotting days during treatment among levonorgestrel implant users. In one small study, vitamin E was found to significantly reduce the mean number of bleeding days after the first treatment cycle; however, another larger study reported no significant differences in length of bleeding and spotting episodes with vitamin E treatment (</span><i data-dcnode-id="6459"><span data-dcnode-id="6460" instrument_node="">134</span></i><span data-dcnode-id="6458" instrument_node="">,</span><i data-dcnode-id="6456"><span data-dcnode-id="6457" instrument_node="">135</span></i><span data-dcnode-id="6455" instrument_node="">). Use of aspirin did not result in a significant difference in median length of bleeding or bleeding and spotting episodes after treatment (</span><i data-dcnode-id="6453"><span data-dcnode-id="6454" instrument_node="">134</span></i><span data-dcnode-id="6452" instrument_node="">). One study among implant users reported a reduction in number of bleeding days after initiating ibuprofen; however, another trial did not demonstrate any significant differences in the number of spotting and bleeding episodes with ibuprofen compared with placebo (</span><i data-dcnode-id="6450"><span data-dcnode-id="6451" instrument_node="">123</span></i><span data-dcnode-id="6449" instrument_node="">,</span><i data-dcnode-id="6447"><span data-dcnode-id="6448" instrument_node="">130</span></i><span data-dcnode-id="6446" instrument_node="">).</span></p><span data-dcnode-id="6444" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="6442"><span data-dcnode-id="6443" instrument_node="">Injectables</span></h3><span data-dcnode-id="6441" instrument_node="">
</span><p data-dcnode-id="6436"><span data-dcnode-id="6440" instrument_node="">Progestin-only injectable contraceptives (DMPA, 150 mg intramuscularly or 104 mg subcutaneously) are available in the United States; the only difference between these two formulations is the route of administration. Approximately 6 out of 100 women will become pregnant in the first year of use of DMPA with typical use (</span><i data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">59</span></i><span data-dcnode-id="6437" instrument_node="">). DMPA is reversible and can be used by women of all ages, including adolescents. DMPA does not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="6435" instrument_node="">
</span><h4 data-dcnode-id="6433"><span data-dcnode-id="6434" instrument_node="">Initiation of Injectables</span></h4><span data-dcnode-id="6432" instrument_node="">
</span><h4 data-dcnode-id="6430"><span data-dcnode-id="6431" instrument_node="">Timing</span></h4><span data-dcnode-id="6429" instrument_node="">
</span><ul data-dcnode-id="6423"><li data-dcnode-id="6424"><span data-dcnode-id="6428" instrument_node="">	The first DMPA injection can be given at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6426" href="#Box1"><span data-dcnode-id="6427" instrument_node="">Box 1</span></a><span data-dcnode-id="6425" instrument_node="">).</span></li></ul><span data-dcnode-id="6422" instrument_node="">
</span><h4 data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">Need for Back-Up Contraception</span></h4><span data-dcnode-id="6419" instrument_node="">
</span><ul data-dcnode-id="6413"><li data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">	If DMPA is started within the first 7 days since menstrual bleeding started, no additional contraceptive protection is needed.</span></li><span data-dcnode-id="6416" instrument_node="">
</span><li data-dcnode-id="6414"><span data-dcnode-id="6415" instrument_node="">	If DMPA is started &gt;7 days since menstrual bleeding started, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6412" instrument_node="">
</span><h4 data-dcnode-id="6410"><span data-dcnode-id="6411" instrument_node="">Special Considerations</span></h4><span data-dcnode-id="6409" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="6406"><b data-dcnode-id="6407"><span data-dcnode-id="6408" instrument_node="">Amenorrhea (Not Postpartum)</span></b></p><span data-dcnode-id="6405" instrument_node="">
</span><ul data-dcnode-id="6390"><li data-dcnode-id="6397"><span data-dcnode-id="6404" instrument_node=""> </span><b data-dcnode-id="6402"><span data-dcnode-id="6403" instrument_node="">Timing:</span></b><span data-dcnode-id="6401" instrument_node=""> The first DMPA injection can be given at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6399" href="#Box1"><span data-dcnode-id="6400" instrument_node="">Box 1</span></a><span data-dcnode-id="6398" instrument_node="">).</span></li><span data-dcnode-id="6396" instrument_node="">
</span><li data-dcnode-id="6391"><span data-dcnode-id="6395" instrument_node=""> </span><b data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6392" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6389" instrument_node="">
</span><p class="h5" data-dcnode-id="6386"><b data-dcnode-id="6387"><span data-dcnode-id="6388" instrument_node="">Postpartum (Breastfeeding)</span></b></p><span data-dcnode-id="6385" instrument_node="">
</span><ul data-dcnode-id="6367"><li data-dcnode-id="6377"><span data-dcnode-id="6384" instrument_node=""> </span><b data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">Timing:</span></b><span data-dcnode-id="6381" instrument_node=""> The first DMPA injection can be given at any time, including immediately postpartum (U.S. MEC 2 if &lt;1 month postpartum and U.S. MEC 1 if ≥1 month postpartum) if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6379" href="#Box1"><span data-dcnode-id="6380" instrument_node="">Box 1</span></a><span data-dcnode-id="6378" instrument_node="">).</span></li><span data-dcnode-id="6376" instrument_node="">
</span><li data-dcnode-id="6368"><span data-dcnode-id="6375" instrument_node=""> </span><b data-dcnode-id="6373"><span data-dcnode-id="6374" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6372" instrument_node=""> If the woman is &lt;6 months postpartum, amenorrheic, and fully or nearly fully breastfeeding (exclusively breastfeeding or the vast majority [≥85%] of feeds are breastfeeds) (</span><i data-dcnode-id="6370"><span data-dcnode-id="6371" instrument_node="">60</span></i><span data-dcnode-id="6369" instrument_node="">), no additional contraceptive protection is needed. Otherwise, a woman who is ≥21 days postpartum and has not experienced return of her menstrual cycle needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. If her menstrual cycles have returned and it has been &gt;7 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6366" instrument_node="">
</span><p class="h5" data-dcnode-id="6363"><b data-dcnode-id="6364"><span data-dcnode-id="6365" instrument_node="">Postpartum (Not Breastfeeding)</span></b></p><span data-dcnode-id="6362" instrument_node="">
</span><ul data-dcnode-id="6347"><li data-dcnode-id="6354"><span data-dcnode-id="6361" instrument_node=""> </span><b data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">Timing:</span></b><span data-dcnode-id="6358" instrument_node=""> The first DMPA injection can be given at any time, including immediately postpartum (U.S. MEC 1) if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6356" href="#Box1"><span data-dcnode-id="6357" instrument_node="">Box 1</span></a><span data-dcnode-id="6355" instrument_node="">).</span></li><span data-dcnode-id="6353" instrument_node="">
</span><li data-dcnode-id="6348"><span data-dcnode-id="6352" instrument_node=""> </span><b data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6349" instrument_node=""> a woman who is ≥21 days postpartum and has not experienced return of her menstrual cycle needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. If her menstrual cycles have returned and it has been &gt;7 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="6346" instrument_node="">
</span><p class="h5" data-dcnode-id="6343"><b data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">Postabortion (Spontaneous or Induced)</span></b></p><span data-dcnode-id="6342" instrument_node="">
</span><ul data-dcnode-id="6330"><li data-dcnode-id="6337"><span data-dcnode-id="6341" instrument_node=""> </span><b data-dcnode-id="6339"><span data-dcnode-id="6340" instrument_node="">Timing:</span></b><span data-dcnode-id="6338" instrument_node=""> The first DMPA injection can be given within the first 7 days, including immediately postabortion (U.S. MEC 1).</span></li><span data-dcnode-id="6336" instrument_node="">
</span><li data-dcnode-id="6331"><span data-dcnode-id="6335" instrument_node=""> </span><b data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6332" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days unless the injection is given at the time of a surgical abortion.</span></li></ul><span data-dcnode-id="6329" instrument_node="">
</span><p class="h5" data-dcnode-id="6326"><b data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">Switching from Another Contraceptive Method</span></b></p><span data-dcnode-id="6325" instrument_node="">
</span><ul data-dcnode-id="6293"><li data-dcnode-id="6317"><span data-dcnode-id="6324" instrument_node=""> </span><b data-dcnode-id="6322"><span data-dcnode-id="6323" instrument_node="">Timing:</span></b><span data-dcnode-id="6321" instrument_node=""> The first DMPA injection can be given immediately if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="6319" href="#Box1"><span data-dcnode-id="6320" instrument_node="">Box 1</span></a><span data-dcnode-id="6318" instrument_node="">). Waiting for her next menstrual period is unnecessary.</span></li><span data-dcnode-id="6316" instrument_node="">
