</span><li data-dcnode-id="6311"><span data-dcnode-id="6315" instrument_node=""> </span><b data-dcnode-id="6313"><span data-dcnode-id="6314" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="6312" instrument_node=""> If it has been &gt;7 days since menstrual bleeding started, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li><span data-dcnode-id="6310" instrument_node="">
</span><li data-dcnode-id="6294"><span data-dcnode-id="6309" instrument_node=""> </span><b data-dcnode-id="6307"><span data-dcnode-id="6308" instrument_node="">Switching from an IUD:</span></b><span data-dcnode-id="6306" instrument_node=""> If the woman has had sexual intercourse since the start of her current menstrual cycle and it has been &gt;5 days since menstrual bleeding started, theoretically, residual sperm might be in the genital tract, which could lead to fertilization if ovulation occurs. A health-care provider may consider any of the following options:
				</span><ul class="List-2" data-dcnode-id="6295"><span data-dcnode-id="6305" instrument_node="">
</span><li data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">Advise the women to retain the IUD for at least 7 days after the injection and return for IUD removal.</span></li><span data-dcnode-id="6302" instrument_node="">
</span><li data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">Advise the woman to abstain from sexual intercourse or use barrier contraception for 7 days before removing the IUD and switching to the new method.</span></li><span data-dcnode-id="6299" instrument_node="">
</span><li data-dcnode-id="6297"><span data-dcnode-id="6298" instrument_node="">Advise the woman to use ECPs at the time of IUD removal.</span></li><span data-dcnode-id="6296" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="6292" instrument_node="">
</span><p data-dcnode-id="6288"><b data-dcnode-id="6290"><span data-dcnode-id="6291" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6289" instrument_node=""> In situations in which the health-care provider is uncertain whether the woman might be pregnant, the benefits of starting DMPA likely exceed any risk; therefore, starting DMPA should be considered at any time, with a follow-up pregnancy test in 2–4 weeks. If a woman needs to use additional contraceptive protection when switching to DMPA from another contraceptive method, consider continuing her previous method for 7 days after DMPA injection.</span></p><span data-dcnode-id="6287" instrument_node="">
</span><p data-dcnode-id="6270"><span data-dcnode-id="6286" instrument_node="">A systematic review identified eight articles examining DMPA initiation on different days of the menstrual cycle (</span><i data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">20</span></i><span data-dcnode-id="6283" instrument_node="">). Evidence from two studies with small samples indicated that DMPA injections given up to day 7 of the menstrual cycle inhibited ovulation; when DMPA was administered after day 7, ovulation occurred in some women. Cervical mucus was of poor quality (i.e., not favorable for sperm penetration) in 90% of women within 24 hours of the injection (Level of evidence: II-2, fair) (</span><i data-dcnode-id="6281"><span data-dcnode-id="6282" instrument_node="">136</span></i><span data-dcnode-id="6280" instrument_node="">–</span><i data-dcnode-id="6278"><span data-dcnode-id="6279" instrument_node="">138</span></i><span data-dcnode-id="6277" instrument_node="">). Studies found that use of another contraceptive method until DMPA could be initiated (bridging option) did not help women initiate DMPA and was associated with more unintended pregnancies than immediate receipt of DMPA (</span><i data-dcnode-id="6275"><span data-dcnode-id="6276" instrument_node="">139</span></i><span data-dcnode-id="6274" instrument_node="">–</span><i data-dcnode-id="6272"><span data-dcnode-id="6273" instrument_node="">143</span></i><span data-dcnode-id="6271" instrument_node="">) (Level of evidence: I to II-3, fair to poor, indirect).</span></p><span data-dcnode-id="6269" instrument_node="">
</span><h4 data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">Examinations and Tests Needed Before Initiation of an Injectable</span></h4><span data-dcnode-id="6266" instrument_node="">
</span><p data-dcnode-id="6254"><span data-dcnode-id="6265" instrument_node="">Among healthy women, no examinations or tests are needed before initiation of DMPA, although a baseline weight and BMI measurement might be useful for monitoring DMPA users over time </span><span class="callout-pink" data-dcnode-id="6260"><span data-dcnode-id="6264" instrument_node="">(</span><a data-dcnode-id="6262" href="#Tab4"><span data-dcnode-id="6263" instrument_node="">Table 4</span></a><span data-dcnode-id="6261" instrument_node="">)</span></span><span data-dcnode-id="6259" instrument_node="">. Women with known medical problems or other special conditions might need additional examinations or tests before being determined to be appropriate candidates for a particular method of contraception. U.S. MEC might be useful in such circumstances (</span><i data-dcnode-id="6256"><a data-dcnode-id="6257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6258" instrument_node="">5</span></a></i><span data-dcnode-id="6255" instrument_node="">).</span></p><span data-dcnode-id="6253" instrument_node="">
</span><p data-dcnode-id="6242"><b data-dcnode-id="6251"><span data-dcnode-id="6252" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6250" instrument_node=""> </span><b data-dcnode-id="6248"><span data-dcnode-id="6249" instrument_node="">Weight (BMI):</span></b><span data-dcnode-id="6247" instrument_node=""> Obese women can use (U.S. MEC 1) or generally can use (U.S. MEC 2) DMPA (</span><i data-dcnode-id="6244"><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6246" instrument_node="">5</span></a></i><span data-dcnode-id="6243" instrument_node="">); therefore, screening for obesity is not necessary for the safe initiation of DMPA. However, measuring weight and calculating BMI at baseline might be helpful for monitoring any changes and counseling women who might be concerned about weight change perceived to be associated with their contraceptive method. (See guidance on follow-up for DMPA users for evidence on weight gain with DMPA use.)</span></p><span data-dcnode-id="6241" instrument_node="">
</span><p data-dcnode-id="6227"><b data-dcnode-id="6239"><span data-dcnode-id="6240" instrument_node="">Bimanual examination and cervical inspection:</span></b><span data-dcnode-id="6238" instrument_node=""> Pelvic examination is not necessary before initiation of DMPA because it does not facilitate detection of conditions for which DMPA would be unsafe. Although women with current breast cancer should not use DMPA (U.S. MEC 4), and women with severe hypertension, heart disease, vascular disease, migraine headaches with aura, or certain liver diseases generally should not use DMPA (U.S. MEC 3) (</span><i data-dcnode-id="6235"><a data-dcnode-id="6236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6237" instrument_node="">5</span></a></i><span data-dcnode-id="6234" instrument_node="">), none of these conditions are likely to be detected by pelvic examination (</span><i data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">120</span></i><span data-dcnode-id="6231" instrument_node="">). A systematic review identified two case-control studies that compared delayed versus immediate pelvic examination before initiation of hormonal contraceptives, specifically oral contraceptives or DMPA (</span><i data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">15</span></i><span data-dcnode-id="6228" instrument_node="">). No differences in risk factors for cervical neoplasia, incidence of STDs, incidence of abnormal Papanicolaou smears, or incidence of abnormal wet mounts were observed (Level of evidence: II-2, fair, direct).</span></p><span data-dcnode-id="6226" instrument_node="">
</span><p data-dcnode-id="6212"><b data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">Blood pressure:</span></b><span data-dcnode-id="6223" instrument_node=""> Women with hypertension generally can use DMPA (U.S. MEC 2), with the exception of women with severe hypertension or vascular disease, who generally should not use DMPA (U.S. MEC 3) (</span><i data-dcnode-id="6220"><a data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6222" instrument_node="">5</span></a></i><span data-dcnode-id="6219" instrument_node="">). Screening for hypertension before initiation of DMPA is not necessary because of the low prevalence of undiagnosed severe hypertension and the high likelihood that women with these conditions already would have had them diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with a blood pressure measurement before initiation of progestin-only contraceptives (</span><i data-dcnode-id="6217"><span data-dcnode-id="6218" instrument_node="">21</span></i><span data-dcnode-id="6216" instrument_node="">). The prevalence of undiagnosed hypertension among women of reproductive age is low. During 1999–2008 among women aged 20–44 years in the United States, the percentage with diagnosed hypertension was 7.8%, and the percentage with undiagnosed hypertension was 1.9% (</span><i data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">144</span></i><span data-dcnode-id="6213" instrument_node="">).</span></p><span data-dcnode-id="6211" instrument_node="">
</span><p data-dcnode-id="6191"><b data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">Glucose:</span></b><span data-dcnode-id="6208" instrument_node=""> Although women with complicated diabetes generally should not use DMPA (U.S. MEC 3) (</span><i data-dcnode-id="6205"><a data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6207" instrument_node="">5</span></a></i><span data-dcnode-id="6204" instrument_node="">), screening for diabetes before initiation of DMPA is not necessary because of the low prevalence of undiagnosed diabetes and the high likelihood that women with complicated diabetes would already have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with glucose measurement before initiation of hormonal contraceptives (</span><i data-dcnode-id="6202"><span data-dcnode-id="6203" instrument_node="">14</span></i><span data-dcnode-id="6201" instrument_node="">). The prevalence of diabetes among women of reproductive age is low. During 1999–2008 among women aged 20–44 years in the United States, the percentage with diagnosed diabetes was 3% and the percentage with undiagnosed diabetes was 0.5% (</span><i data-dcnode-id="6199"><span data-dcnode-id="6200" instrument_node="">144</span></i><span data-dcnode-id="6198" instrument_node="">). Although hormonal contraceptives can have some adverse effects on glucose metabolism in healthy and diabetic women, the overall clinical effect is minimal (</span><i data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">145</span></i><span data-dcnode-id="6195" instrument_node="">–</span><i data-dcnode-id="6193"><span data-dcnode-id="6194" instrument_node="">151</span></i><span data-dcnode-id="6192" instrument_node="">).</span></p><span data-dcnode-id="6190" instrument_node="">
</span><p data-dcnode-id="6164"><b data-dcnode-id="6188"><span data-dcnode-id="6189" instrument_node="">Liver enzymes:</span></b><span data-dcnode-id="6187" instrument_node=""> Although women with certain liver diseases generally should not use DMPA (U.S. MEC 3) (</span><i data-dcnode-id="6184"><a data-dcnode-id="6185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6186" instrument_node="">5</span></a></i><span data-dcnode-id="6183" instrument_node="">), screening for liver disease before initiation of DMPA is not necessary because of the low prevalence of these conditions and the high likelihood that women with liver disease already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with liver enzyme tests before initiation of hormonal contraceptives (</span><i data-dcnode-id="6181"><span data-dcnode-id="6182" instrument_node="">14</span></i><span data-dcnode-id="6180" instrument_node="">). The prevalence of liver disorders among women of reproductive age is low. In 2008 among adults aged 18–44 years, the percentage with liver disease (not further specified) was 1.0% (</span><i data-dcnode-id="6178"><span data-dcnode-id="6179" instrument_node="">90</span></i><span data-dcnode-id="6177" instrument_node="">). In 2009, the incidence of acute hepatitis A, B, or C among women was &lt;1 per 100,000 population (</span><i data-dcnode-id="6175"><span data-dcnode-id="6176" instrument_node="">91</span></i><span data-dcnode-id="6174" instrument_node="">). During 1998–2007, the incidence of liver carcinoma among women was approximately 3 per 100,000 population (</span><i data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">92</span></i><span data-dcnode-id="6171" instrument_node="">). Because estrogen and progestins are metabolized in the liver, the use of hormonal contraceptives among women with liver disease might, theoretically, be a concern. The use of hormonal contraceptives, specifically COCs and POPs, does not affect disease progression or severity in women with hepatitis, cirrhosis, or benign focal nodular hyperplasia (</span><i data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">93</span></i><span data-dcnode-id="6168" instrument_node="">,</span><i data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">94</span></i><span data-dcnode-id="6165" instrument_node="">), although evidence is limited and no evidence exists for DMPA.</span></p><span data-dcnode-id="6163" instrument_node="">
</span><p data-dcnode-id="6149"><b data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">Clinical breast examination:</span></b><span data-dcnode-id="6160" instrument_node=""> Although women with current breast cancer should not use DMPA (U.S. MEC 4) (</span><i data-dcnode-id="6157"><a data-dcnode-id="6158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6159" instrument_node="">5</span></a></i><span data-dcnode-id="6156" instrument_node="">), screening asymptomatic women with a clinical breast examination before initiating DMPA is not necessary because of the low prevalence of breast cancer among women of reproductive age. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with a clinical breast examination before initiation of hormonal contraceptives (</span><i data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">15</span></i><span data-dcnode-id="6153" instrument_node="">). The incidence of breast cancer among women of reproductive age in the United States is low. In 2009, the incidence of breast cancer among women aged 20–49 years was approximately 72 per 100,000 women (</span><i data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">95</span></i><span data-dcnode-id="6150" instrument_node="">).</span></p><span data-dcnode-id="6148" instrument_node="">
</span><p data-dcnode-id="6140"><b data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">Other screening:</span></b><span data-dcnode-id="6145" instrument_node=""> Women with hyperlipidemia, anemia, thrombogenic mutations, cervical intraepithelial neoplasia, cervical cancer, HIV infection, or other STDs can use (U.S. MEC 1) or generally can use (U.S. MEC 2) DMPA (</span><i data-dcnode-id="6142"><a data-dcnode-id="6143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="6144" instrument_node="">5</span></a></i><span data-dcnode-id="6141" instrument_node="">); therefore, screening for these conditions is not necessary for the safe initiation of DMPA.</span></p><span data-dcnode-id="6139" instrument_node="">
</span><h4 data-dcnode-id="6137"><span data-dcnode-id="6138" instrument_node="">Routine Follow-Up After Injectable Initiation</span></h4><span data-dcnode-id="6136" instrument_node="">
</span><p data-dcnode-id="6134"><span data-dcnode-id="6135" instrument_node="">These recommendations address when routine follow-up is recommended for safe and effective continued use of contraception for healthy women. The recommendations refer to general situations and might vary for different users and different situations. Specific populations that might benefit from more frequent follow-up visits include adolescents, those with certain medical conditions or characteristics, and those with multiple medical conditions.</span></p><span data-dcnode-id="6133" instrument_node="">
</span><ul data-dcnode-id="6116"><li data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">	Advise a woman to return at any time to discuss side effects or other problems, if she wants to change the method being used, and when it is time for reinjection. No routine follow-up visit is required.</span></li><span data-dcnode-id="6130" instrument_node="">
</span><li data-dcnode-id="6117"><span data-dcnode-id="6129" instrument_node="">	At other routine visits, health-care providers seeing injectable users should do the following:
				</span><ul class="List-2" data-dcnode-id="6118"><span data-dcnode-id="6128" instrument_node="">
</span><li data-dcnode-id="6126"><span data-dcnode-id="6127" instrument_node="">Assess the woman's satisfaction with her contraceptive method and whether she has any concerns about method use.</span></li><span data-dcnode-id="6125" instrument_node="">
</span><li data-dcnode-id="6123"><span data-dcnode-id="6124" instrument_node="">Assess any changes in health status, including medications, that would change the appropriateness of the injectable for safe and effective continued use based on U.S. MEC (e.g., category 3 and 4 conditions and characteristics).</span></li><span data-dcnode-id="6122" instrument_node="">
</span><li data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">Consider assessing weight changes and counseling women who are concerned about weight changes perceived to be associated with their contraceptive method.</span></li><span data-dcnode-id="6119" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="6115" instrument_node="">
</span><p data-dcnode-id="6111"><b data-dcnode-id="6113"><span data-dcnode-id="6114" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6112" instrument_node=""> Although no evidence exists regarding whether a routine follow-up visit after initiating DMPA improves correct or continued use, monitoring weight or BMI change over time is important for DMPA users.</span></p><span data-dcnode-id="6110" instrument_node="">
</span><p data-dcnode-id="6096"><span data-dcnode-id="6109" instrument_node="">A systematic review identified a limited body of evidence that examined whether weight gain in the few months after DMPA initiation predicted future weight gain (</span><i data-dcnode-id="6107"><span data-dcnode-id="6108" instrument_node="">17</span></i><span data-dcnode-id="6106" instrument_node="">). Two studies found significant differences in weight gain or BMI at follow-up periods ranging from 12 to 36 months between early weight gainers (i.e., those who gained &gt;5% of their baseline body weight within 6 months after initiation) and those who were not early weight gainers (</span><i data-dcnode-id="6104"><span data-dcnode-id="6105" instrument_node="">152</span></i><span data-dcnode-id="6103" instrument_node="">,</span><i data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">153</span></i><span data-dcnode-id="6100" instrument_node="">). The differences between groups were more pronounced at 18, 24, and 36 months than at 12 months. One study found that most adolescent DMPA users who had gained &gt;5% of their baseline weight by 3 months gained even more weight by 12 months (</span><i data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">154</span></i><span data-dcnode-id="6097" instrument_node="">) (Level of evidence: II-2, fair, to II-3, fair, direct).</span></p><span data-dcnode-id="6095" instrument_node="">
</span><h4 data-dcnode-id="6093"><span data-dcnode-id="6094" instrument_node="">Timing of Repeat Injections</span></h4><span data-dcnode-id="6092" instrument_node="">
</span><h4 data-dcnode-id="6090"><span data-dcnode-id="6091" instrument_node="">Reinjection Interval</span></h4><span data-dcnode-id="6089" instrument_node="">
</span><ul data-dcnode-id="6086"><li data-dcnode-id="6087"><span data-dcnode-id="6088" instrument_node="">	Provide repeat DMPA injections every 3 months (13 weeks).</span></li></ul><span data-dcnode-id="6085" instrument_node="">
</span><h4 data-dcnode-id="6083"><span data-dcnode-id="6084" instrument_node="">Special Considerations</span></h4><span data-dcnode-id="6082" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="6079"><b data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">Early Injection</span></b></p><span data-dcnode-id="6078" instrument_node="">
</span><ul data-dcnode-id="6075"><li data-dcnode-id="6076"><span data-dcnode-id="6077" instrument_node="">	The repeat DMPA injection can be given early when necessary.</span></li></ul><span data-dcnode-id="6074" instrument_node="">
</span><p class="h5" data-dcnode-id="6071"><b data-dcnode-id="6072"><span data-dcnode-id="6073" instrument_node="">Late Injection</span></b></p><span data-dcnode-id="6070" instrument_node="">
</span><ul data-dcnode-id="6061"><li data-dcnode-id="6068"><span data-dcnode-id="6069" instrument_node="">	The repeat DMPA injection can be given up to 2 weeks late (15 weeks from the last injection) without requiring additional contraceptive protection.</span></li><span data-dcnode-id="6067" instrument_node="">
</span><li data-dcnode-id="6062"><span data-dcnode-id="6066" instrument_node="">	If the woman is &gt;2 weeks late (&gt;15 weeks from the last injection) for a repeat DMPA injection, she can have the injection if it is reasonably certain that she is not pregnant (</span><a data-dcnode-id="6064" href="#Box1"><span data-dcnode-id="6065" instrument_node="">Box 1</span></a><span data-dcnode-id="6063" instrument_node="">). She needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. She might consider the use of emergency contraception if appropriate.</span></li></ul><span data-dcnode-id="6060" instrument_node="">
</span><p data-dcnode-id="6056"><b data-dcnode-id="6058"><span data-dcnode-id="6059" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="6057" instrument_node=""> There are no time limits on early injections; injections can be given when necessary (e.g., when a woman cannot return at the routine interval). WHO has extended the time that a woman can have a late reinjection (i.e., grace period) for DMPA use from 2 weeks to 4 weeks on the basis of data from one study showing low pregnancy rates through 4 weeks; however, the CDC expert group did not consider the data to be generalizable to the United States because a large proportion of women in the study were breastfeeding. Therefore, U.S. SPR recommends a grace period of 2 weeks.</span></p><span data-dcnode-id="6055" instrument_node="">
</span><p data-dcnode-id="6038"><span data-dcnode-id="6054" instrument_node="">A systematic review identified 12 studies evaluating time to pregnancy or ovulation after the last injection of DMPA (</span><i data-dcnode-id="6052"><span data-dcnode-id="6053" instrument_node="">155</span></i><span data-dcnode-id="6051" instrument_node="">). Although pregnancy rates were low during the 2-week interval following the reinjection date and for 4 weeks following the reinjection date, data were sparse and one study included a large proportion of breastfeeding women (</span><i data-dcnode-id="6049"><span data-dcnode-id="6050" instrument_node="">156</span></i><span data-dcnode-id="6048" instrument_node="">–</span><i data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node="">158</span></i><span data-dcnode-id="6045" instrument_node="">). Studies also indicated a wide variation in time to ovulation after the last DMPA injection, with the majority ranging from 15 to 49 weeks from the last injection (</span><i data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">159</span></i><span data-dcnode-id="6042" instrument_node="">–</span><i data-dcnode-id="6040"><span data-dcnode-id="6041" instrument_node="">167</span></i><span data-dcnode-id="6039" instrument_node="">) (Level of evidence:  II-2, fair, direct).</span></p><span data-dcnode-id="6037" instrument_node="">
</span><h4 data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">Bleeding Irregularities (Including Amenorrhea) During Injectable Use</span></h4><span data-dcnode-id="6034" instrument_node="">
</span><ul data-dcnode-id="6031"><li data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">	Before DMPA initiation, provide counseling about potential changes in bleeding patterns during DMPA use. Amenorrhea and unscheduled spotting or light bleeding is common with DMPA use, and heavy or prolonged bleeding can occur with DMPA use. These bleeding irregularities are generally not harmful and might decrease with continued DMPA use.</span></li></ul><span data-dcnode-id="6030" instrument_node="">
</span><h4 data-dcnode-id="6028"><span data-dcnode-id="6029" instrument_node="">Unscheduled Spotting or Light Bleeding</span></h4><span data-dcnode-id="6027" instrument_node="">
</span><ul data-dcnode-id="6013"><li data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node="">	If clinically indicated, consider an underlying gynecological problem, such as interactions with other medications, an STD, pregnancy, or new pathologic uterine conditions (e.g., polyps or fibroids). If an underlying gynecological problem is found, treat the condition or refer for care.</span></li><span data-dcnode-id="6024" instrument_node="">
</span><li data-dcnode-id="6017"><span data-dcnode-id="6023" instrument_node="">	If an underlying gynecologic problem is not found and the woman wants treatment, the following treatment option during days of bleeding can be considered:
				</span><ul class="List-2" data-dcnode-id="6018"><span data-dcnode-id="6022" instrument_node="">
</span><li data-dcnode-id="6020"><span data-dcnode-id="6021" instrument_node="">NSAIDs for short-term treatment (5–7 days)</span></li><span data-dcnode-id="6019" instrument_node="">
</span></ul></li><span data-dcnode-id="6016" instrument_node="">
</span><li data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">	If unscheduled spotting or light bleeding persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="6012" instrument_node="">
</span><h4 data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">Heavy or Prolonged Bleeding</span></h4><span data-dcnode-id="6009" instrument_node="">
</span><ul data-dcnode-id="5992"><li data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">	If clinically indicated, consider an underlying gynecological problem, such as interactions with other medications, an STD, pregnancy, or new pathologic uterine conditions (such as fibroids or polyps). If an underlying gynecologic problem is identified, treat the condition or refer for care.</span></li><span data-dcnode-id="6006" instrument_node="">
</span><li data-dcnode-id="5996"><span data-dcnode-id="6005" instrument_node="">	If an underlying gynecologic problem is not found and the woman wants treatment, the following treatment options during days of bleeding can be considered:
				</span><ul class="List-2" data-dcnode-id="5997"><span data-dcnode-id="6004" instrument_node="">
</span><li data-dcnode-id="6002"><span data-dcnode-id="6003" instrument_node="">NSAIDS for short-term treatment (5–7 days)</span></li><span data-dcnode-id="6001" instrument_node="">
</span><li data-dcnode-id="5999"><span data-dcnode-id="6000" instrument_node="">Hormonal treatment (if medically eligible) with low-dose COCs or estrogen for short-term treatment (10–20 days)</span></li><span data-dcnode-id="5998" instrument_node="">
</span></ul></li><span data-dcnode-id="5995" instrument_node="">
</span><li data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">	If heavy or prolonged bleeding persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="5991" instrument_node="">
</span><h4 data-dcnode-id="5989"><span data-dcnode-id="5990" instrument_node="">Amenorrhea</span></h4><span data-dcnode-id="5988" instrument_node="">
</span><ul data-dcnode-id="5977"><li data-dcnode-id="5981"><span data-dcnode-id="5987" instrument_node="">	Amenorrhea does not require any medical treatment. Provide reassurance.
				</span><ul class="List-2" data-dcnode-id="5982"><span data-dcnode-id="5986" instrument_node="">
</span><li data-dcnode-id="5984"><span data-dcnode-id="5985" instrument_node="">If a woman's regular bleeding pattern changes abruptly to amenorrhea, consider ruling out pregnancy if clinically indicated.</span></li><span data-dcnode-id="5983" instrument_node="">
</span></ul></li><span data-dcnode-id="5980" instrument_node="">
</span><li data-dcnode-id="5978"><span data-dcnode-id="5979" instrument_node="">	If amenorrhea persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="5976" instrument_node="">
</span><p data-dcnode-id="5960"><b data-dcnode-id="5974"><span data-dcnode-id="5975" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5973" instrument_node=""> During contraceptive counseling and before initiation of DMPA, information about common side effects such as irregular bleeding should be discussed. Unscheduled bleeding or spotting is common with DMPA use (</span><i data-dcnode-id="5971"><span data-dcnode-id="5972" instrument_node="">168</span></i><span data-dcnode-id="5970" instrument_node="">). Additionally, amenorrhea is common after ≥1 years of continuous use (</span><i data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">168,169</span></i><span data-dcnode-id="5967" instrument_node="">). These bleeding irregularities are generally not harmful. Enhanced counseling among DMPA users detailing expected bleeding patterns and reassurance that these irregularities generally are not harmful has been shown to reduce DMPA discontinuation in clinical trials (</span><i data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">101</span></i><span data-dcnode-id="5964" instrument_node="">,</span><i data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">102</span></i><span data-dcnode-id="5961" instrument_node="">).</span></p><span data-dcnode-id="5959" instrument_node="">
</span><p data-dcnode-id="5936"><span data-dcnode-id="5958" instrument_node="">A systematic review, as well as two additional studies, examined the treatment of bleeding irregularities during DMPA use (</span><i data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">122</span></i><span data-dcnode-id="5955" instrument_node="">,</span><i data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">170</span></i><span data-dcnode-id="5952" instrument_node="">,</span><i data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">171</span></i><span data-dcnode-id="5949" instrument_node="">). Two small studies found significant cessation of bleeding within 7 days of starting treatment among women taking valdecoxib for 5 days or mefenamic acid for 5 days compared with placebo (</span><i data-dcnode-id="5947"><span data-dcnode-id="5948" instrument_node="">172</span></i><span data-dcnode-id="5946" instrument_node="">,</span><i data-dcnode-id="5944"><span data-dcnode-id="5945" instrument_node="">173</span></i><span data-dcnode-id="5943" instrument_node="">). Treatment with ethinyl estradiol was found to stop bleeding better than placebo during the treatment period, although rates of discontinuation were high, and safety outcomes were not examined (</span><i data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">174</span></i><span data-dcnode-id="5940" instrument_node="">). In one small study among DMPA users who had been experiencing amenorrhea for 2 months, treatment with COCs was found to alleviate amenorrhea better than placebo (</span><i data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">175</span></i><span data-dcnode-id="5937" instrument_node="">). No studies examined the effects of aspirin on bleeding irregularities among DMPA users.</span></p><span data-dcnode-id="5935" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">Combined Hormonal Contraceptives</span></h3><span data-dcnode-id="5932" instrument_node="">
</span><p data-dcnode-id="5915"><span data-dcnode-id="5931" instrument_node="">Combined hormonal contraceptives contain both estrogen and a progestin and include 1) COCs (various formulations), 2) a transdermal contraceptive patch (which releases 150 </span><i data-dcnode-id="5929"><span data-dcnode-id="5930" instrument_node="">µ</span></i><span data-dcnode-id="5928" instrument_node="">g of norelgestromin and 20 </span><i data-dcnode-id="5926"><span data-dcnode-id="5927" instrument_node="">µ</span></i><span data-dcnode-id="5925" instrument_node="">g ethinyl estradiol daily), and 3) a vaginal contraceptive ring (which releases 120 </span><i data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">µ</span></i><span data-dcnode-id="5922" instrument_node="">g etonogestrel and 15 </span><i data-dcnode-id="5920"><span data-dcnode-id="5921" instrument_node="">µ</span></i><span data-dcnode-id="5919" instrument_node="">g ethinyl estradiol daily). Approximately 9 out of 100 women become pregnant in the first year of use with combined hormonal contraceptives with typical use (</span><i data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">59</span></i><span data-dcnode-id="5916" instrument_node="">). These methods are reversible and can be used by women of all ages. Combined hormonal contraceptives are generally used for 21–24 consecutive days, followed by 4–7 hormone-free days (either no use or placebo pills). These methods are sometimes used for an extended period with infrequent or no hormone-free days. Combined hormonal contraceptives do not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="5914" instrument_node="">
</span><h4 data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">Initiation of Combined Hormonal Contraceptives</span></h4><span data-dcnode-id="5911" instrument_node="">
</span><h4 data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">Timing</span></h4><span data-dcnode-id="5908" instrument_node="">
</span><ul data-dcnode-id="5902"><li data-dcnode-id="5903"><span data-dcnode-id="5907" instrument_node="">	Combined hormonal contraceptives can be initiated at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5905" href="#Box1"><span data-dcnode-id="5906" instrument_node="">Box 1</span></a><span data-dcnode-id="5904" instrument_node="">).</span></li></ul><span data-dcnode-id="5901" instrument_node="">
</span><h4 data-dcnode-id="5899"><span data-dcnode-id="5900" instrument_node="">Need for Back-Up Contraception</span></h4><span data-dcnode-id="5898" instrument_node="">
</span><ul data-dcnode-id="5892"><li data-dcnode-id="5896"><span data-dcnode-id="5897" instrument_node="">	If combined hormonal contraceptives are started within the first 5 days since menstrual bleeding started, no additional contraceptive protection is needed.</span></li><span data-dcnode-id="5895" instrument_node="">
</span><li data-dcnode-id="5893"><span data-dcnode-id="5894" instrument_node="">	If combined hormonal contraceptives are started &gt;5 days since menstrual bleeding started, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="5891" instrument_node="">
</span><h4 data-dcnode-id="5889"><span data-dcnode-id="5890" instrument_node="">Special Considerations</span></h4><span data-dcnode-id="5888" instrument_node="">
</span><p class="h5" data-dcnode-id="5885"><b data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">Amenorrhea (Not Postpartum)</span></b></p><span data-dcnode-id="5884" instrument_node="">
</span><ul data-dcnode-id="5869"><li data-dcnode-id="5876"><span data-dcnode-id="5883" instrument_node=""> </span><b data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">Timing:</span></b><span data-dcnode-id="5880" instrument_node=""> Combined hormonal contraceptives can be started at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5878" href="#Box1"><span data-dcnode-id="5879" instrument_node="">Box 1</span></a><span data-dcnode-id="5877" instrument_node="">).</span></li><span data-dcnode-id="5875" instrument_node="">
</span><li data-dcnode-id="5870"><span data-dcnode-id="5874" instrument_node=""> </span><b data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5871" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="5868" instrument_node="">
</span><p class="h5" data-dcnode-id="5865"><b data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">Postpartum (Breastfeeding)</span></b></p><span data-dcnode-id="5864" instrument_node="">
</span><ul data-dcnode-id="5837"><li data-dcnode-id="5847"><span data-dcnode-id="5863" instrument_node=""> </span><b data-dcnode-id="5861"><span data-dcnode-id="5862" instrument_node="">Timing:</span></b><span data-dcnode-id="5860" instrument_node=""> Combined hormonal contraceptives can be started when the woman is medically eligible to use the method (</span><i data-dcnode-id="5857"><a data-dcnode-id="5858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/mm6026a3.htm"><span data-dcnode-id="5859" instrument_node="">176</span></a></i><span data-dcnode-id="5856" instrument_node="">)) and if it is reasonably certain that she is not pregnant. (</span><a data-dcnode-id="5854" href="#Box1"><span data-dcnode-id="5855" instrument_node="">Box 1</span></a><span data-dcnode-id="5853" instrument_node="">).
				</span><ul class="List-2" data-dcnode-id="5848"><span data-dcnode-id="5852" instrument_node="">
</span><li data-dcnode-id="5850"><span data-dcnode-id="5851" instrument_node="">Postpartum women who are breastfeeding should not use combined hormonal contraceptives during the first 3 weeks after delivery (U.S. MEC 4) because of concerns about increased risk for venous thromboembolism and generally should not use combined hormonal contraceptives during the fourth week postpartum (U.S. MEC 3) because of concerns about potential effects on breastfeeding performance. Postpartum, breastfeeding women with other risk factors for venous thromboembolism generally should not use combined hormonal contraceptives 4–6 weeks after delivery (U.S. MEC 3).</span></li><span data-dcnode-id="5849" instrument_node="">
</span></ul></li><span data-dcnode-id="5846" instrument_node="">
</span><li data-dcnode-id="5838"><span data-dcnode-id="5845" instrument_node=""> </span><b data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5842" instrument_node=""> If the woman is &lt;6 months postpartum, amenorrheic, and fully or nearly fully breastfeeding (exclusively breastfeeding or the vast majority [≥85%] of feeds are breastfeeds) (</span><i data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">60</span></i><span data-dcnode-id="5839" instrument_node="">), no additional contraceptive protection is needed. Otherwise, a woman who is ≥21 days postpartum and has not experienced return of her menstrual cycle needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. If her menstrual cycles have returned and it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="5836" instrument_node="">
</span><p class="h5" data-dcnode-id="5833"><b data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">Postpartum (Not Breastfeeding)</span></b></p><span data-dcnode-id="5832" instrument_node="">
</span><ul data-dcnode-id="5808"><li data-dcnode-id="5815"><span data-dcnode-id="5831" instrument_node=""> </span><b data-dcnode-id="5829"><span data-dcnode-id="5830" instrument_node="">Timing:</span></b><span data-dcnode-id="5828" instrument_node=""> Combined hormonal contraceptives can be started when the woman is medically eligible (</span><i data-dcnode-id="5825"><a data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/mm6026a3.htm"><span data-dcnode-id="5827" instrument_node="">176</span></a></i><span data-dcnode-id="5824" instrument_node="">)) and if it is reasonably certain that she is not pregnant (</span><a data-dcnode-id="5822" href="#Box1"><span data-dcnode-id="5823" instrument_node="">Box 1</span></a><span data-dcnode-id="5821" instrument_node="">).
				</span><ul class="List-2" data-dcnode-id="5816"><span data-dcnode-id="5820" instrument_node="">
</span><li data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">Postpartum women should not use combined hormonal contraceptives during the first 3 weeks after delivery (U.S. MEC 4) because of concerns about increased risk for venous thromboembolism. Postpartum women with other risk factors for venous thromboembolism generally should not use combined hormonal contraceptives 3–6 weeks after delivery (U.S. MEC 3).</span></li><span data-dcnode-id="5817" instrument_node="">
</span></ul></li><span data-dcnode-id="5814" instrument_node="">
</span><li data-dcnode-id="5809"><span data-dcnode-id="5813" instrument_node=""> </span><b data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5810" instrument_node=""> A woman who is ≥21 days postpartum and whose menstrual cycles have not returned needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. If her menstrual cycles have returned and it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="5807" instrument_node="">
</span><p class="h5" data-dcnode-id="5804"><b data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">Postabortion (Spontaneous or Induced)</span></b></p><span data-dcnode-id="5803" instrument_node="">
</span><ul data-dcnode-id="5791"><li data-dcnode-id="5798"><span data-dcnode-id="5802" instrument_node=""> </span><b data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">Timing:</span></b><span data-dcnode-id="5799" instrument_node=""> Combined hormonal contraceptives can be started within the first 7 days after first or second trimester abortion, including immediately postabortion (U.S. MEC 1).</span></li><span data-dcnode-id="5797" instrument_node="">
</span><li data-dcnode-id="5792"><span data-dcnode-id="5796" instrument_node=""> </span><b data-dcnode-id="5794"><span data-dcnode-id="5795" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5793" instrument_node=""> She needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days unless combined hormonal contraceptives are started at the time of a surgical abortion.</span></li></ul><span data-dcnode-id="5790" instrument_node="">
</span><p class="h5" data-dcnode-id="5787"><b data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">Switching from Another Contraceptive Method</span></b></p><span data-dcnode-id="5786" instrument_node="">
</span><ul data-dcnode-id="5754"><li data-dcnode-id="5778"><span data-dcnode-id="5785" instrument_node=""> </span><b data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">Timing:</span></b><span data-dcnode-id="5782" instrument_node=""> Combined hormonal contraceptives can be started immediately if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5780" href="#Box1"><span data-dcnode-id="5781" instrument_node="">Box 1</span></a><span data-dcnode-id="5779" instrument_node="">). Waiting for her next menstrual period is unnecessary.</span></li><span data-dcnode-id="5777" instrument_node="">
</span><li data-dcnode-id="5772"><span data-dcnode-id="5776" instrument_node=""> </span><b data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5773" instrument_node=""> If it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li><span data-dcnode-id="5771" instrument_node="">
</span><li data-dcnode-id="5755"><span data-dcnode-id="5770" instrument_node=""> </span><b data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">Switching from an IUD:</span></b><span data-dcnode-id="5767" instrument_node=""> If the woman has had sexual intercourse since the start of her current menstrual cycle and it has been &gt;5 days since menstrual bleeding started, theoretically, residual sperm might be in the genital tract, which could lead to fertilization if ovulation occurs. A health-care provider may consider any of the following options:
				</span><ul class="List-2" data-dcnode-id="5756"><span data-dcnode-id="5766" instrument_node="">
</span><li data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">Advise the women to retain the IUD for at least 7 days after combined hormonal contraceptives are initiated and return for IUD removal.</span></li><span data-dcnode-id="5763" instrument_node="">
</span><li data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">Advise the woman to abstain from sexual intercourse or use barrier contraception for 7 days before removing the IUD and switching to the new method.</span></li><span data-dcnode-id="5760" instrument_node="">
</span><li data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">Advise the woman to use ECPs at the time of IUD removal.</span></li><span data-dcnode-id="5757" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="5753" instrument_node="">
</span><p data-dcnode-id="5749"><b data-dcnode-id="5751"><span data-dcnode-id="5752" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5750" instrument_node=""> In situations in which the health-care provider is uncertain whether the woman might be pregnant, the benefits of starting combined hormonal contraceptives likely exceed any risk; therefore, starting combined hormonal contraceptives should be considered at any time, with a follow-up pregnancy test in 2–4 weeks. If a woman needs to use additional contraceptive protection when switching to combined hormonal contraceptives from another contraceptive method, consider continuing her previous method for 7 days after starting combined hormonal contraceptives.</span></p><span data-dcnode-id="5748" instrument_node="">
</span><p data-dcnode-id="5704"><span data-dcnode-id="5747" instrument_node="">A systematic review of 18 studies examined the effects of starting combined hormonal contraceptives on different days of the menstrual cycle (</span><i data-dcnode-id="5745"><span data-dcnode-id="5746" instrument_node="">22</span></i><span data-dcnode-id="5744" instrument_node="">). Overall, the evidence suggested that pregnancy rates did not differ by the timing of combined hormonal contraceptive initiation (</span><i data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">143</span></i><span data-dcnode-id="5741" instrument_node="">,</span><i data-dcnode-id="5739"><span data-dcnode-id="5740" instrument_node="">177</span></i><span data-dcnode-id="5738" instrument_node="">–</span><i data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">179</span></i><span data-dcnode-id="5735" instrument_node="">) (Level of evidence: I to II-3, fair, indirect). The more follicular activity that occurred before starting COCs, the more likely ovulation was to occur; however, no ovulations occurred when COCs were started at a follicle diameter of 10 mm (mean cycle day 7.6) or when the ring was started at 13 mm (median cycle day 11) (</span><i data-dcnode-id="5733"><span data-dcnode-id="5734" instrument_node="">180</span></i><span data-dcnode-id="5732" instrument_node="">–</span><i data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">189</span></i><span data-dcnode-id="5729" instrument_node="">) (Level of evidence: I to II-3, fair, indirect). Bleeding patterns and other side effects did not vary with the timing of combined hormonal contraceptive initiation (</span><i data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">177</span></i><span data-dcnode-id="5726" instrument_node="">,</span><i data-dcnode-id="5724"><span data-dcnode-id="5725" instrument_node="">178</span></i><span data-dcnode-id="5723" instrument_node="">,</span><i data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">190</span></i><span data-dcnode-id="5720" instrument_node="">–</span><i data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">194</span></i><span data-dcnode-id="5717" instrument_node="">) (Level of evidence: I to II-2, good to poor, direct). Although continuation rates of combined hormonal contraceptives were initially improved by the "quick start" approach (i.e., starting on the day of the visit), the advantage disappeared over time (</span><i data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">178</span></i><span data-dcnode-id="5714" instrument_node="">,</span><i data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">179</span></i><span data-dcnode-id="5711" instrument_node="">,</span><i data-dcnode-id="5709"><span data-dcnode-id="5710" instrument_node="">190</span></i><span data-dcnode-id="5708" instrument_node="">–</span><i data-dcnode-id="5706"><span data-dcnode-id="5707" instrument_node="">195</span></i><span data-dcnode-id="5705" instrument_node="">) (Level of evidence: I to II-2, good to poor, direct).</span></p><span data-dcnode-id="5703" instrument_node="">
</span><h4 data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">Examinations and Tests Needed Before Initiation of Combined Hormonal Contraceptives</span></h4><span data-dcnode-id="5700" instrument_node="">
</span><p data-dcnode-id="5688"><span data-dcnode-id="5699" instrument_node="">Among healthy women, few examinations or tests are needed before initiation of combined hormonal contraceptives </span><span class="callout-pink" data-dcnode-id="5694"><span data-dcnode-id="5698" instrument_node="">(</span><a data-dcnode-id="5696" href="#Tab5"><span data-dcnode-id="5697" instrument_node="">Table 5</span></a><span data-dcnode-id="5695" instrument_node="">)</span></span><span data-dcnode-id="5693" instrument_node="">. Blood pressure should be measured before initiation of combined hormonal contraceptives. Baseline weight and BMI measurements might be useful for monitoring combined hormonal contraceptive users over time. Women with known medical problems or other special conditions might need additional examinations or tests before being determined to be appropriate candidates for a particular method of contraception. U.S. MEC might be useful in such circumstances (</span><i data-dcnode-id="5690"><a data-dcnode-id="5691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5692" instrument_node="">5</span></a></i><span data-dcnode-id="5689" instrument_node="">).</span></p><span data-dcnode-id="5687" instrument_node="">
</span><p data-dcnode-id="5676"><b data-dcnode-id="5685"><span data-dcnode-id="5686" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5684" instrument_node=""> </span><b data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">Blood pressure:</span></b><span data-dcnode-id="5681" instrument_node=""> Women who have more severe hypertension (systolic pressure of ≥160 mm Hg or diastolic pressure of ≥100 mm Hg) or vascular disease should not use combined hormonal contraceptives (U.S. MEC 4), and women who have less severe hypertension (systolic pressure of 140–159 mm Hg or diastolic pressure of 90–99 mm Hg) or adequately controlled hypertension generally should not use combined hormonal contraceptives (U.S. MEC 3) (</span><i data-dcnode-id="5678"><a data-dcnode-id="5679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5680" instrument_node="">5</span></a></i><span data-dcnode-id="5677" instrument_node="">). Therefore, blood pressure should be measured before initiating combined hormonal contraceptives. If access to health care is limited, blood pressure measurements may be obtained in nonclinical settings, such as pharmacies or fire stations, and reported by the woman to her provider. Evidence suggests that cardiovascular outcomes are worse among women who did not have their blood pressure measured before initiating COCs.</span></p><span data-dcnode-id="5675" instrument_node="">
</span><p data-dcnode-id="5655"><span data-dcnode-id="5674" instrument_node="">A systematic review identified six articles from three studies that reported cardiovascular outcomes among women who had blood pressure measurements and women who did not have blood pressure measurements before initiating COCs (</span><i data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">21</span></i><span data-dcnode-id="5671" instrument_node="">). Three case-control studies showed that women who did not have blood pressure measurements before initiating COCs had a higher risk for acute myocardial infarction than women who did have blood pressure measurements (</span><i data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">196</span></i><span data-dcnode-id="5668" instrument_node="">–</span><i data-dcnode-id="5666"><span data-dcnode-id="5667" instrument_node="">198</span></i><span data-dcnode-id="5665" instrument_node="">). Two case-control studies showed that women who did not have blood pressure measurements before initiating COCs had a higher risk for ischemic stroke than women who did have blood pressure measurements (</span><i data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">199</span></i><span data-dcnode-id="5662" instrument_node="">,</span><i data-dcnode-id="5660"><span data-dcnode-id="5661" instrument_node="">200</span></i><span data-dcnode-id="5659" instrument_node="">). One case-control study showed no difference in the risk for hemorrhagic stroke among women who initiated COCs regardless of whether their blood pressure was measured (</span><i data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">201</span></i><span data-dcnode-id="5656" instrument_node="">). Studies that examined hormonal contraceptive methods other than COCs were not identified (Level of evidence: II-2, fair, direct).</span></p><span data-dcnode-id="5654" instrument_node="">
</span><p data-dcnode-id="5646"><b data-dcnode-id="5652"><span data-dcnode-id="5653" instrument_node="">Weight (BMI):</span></b><span data-dcnode-id="5651" instrument_node=""> Obese women generally can use combined hormonal contraceptives (U.S. MEC 2) (</span><i data-dcnode-id="5648"><a data-dcnode-id="5649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5650" instrument_node="">5</span></a></i><span data-dcnode-id="5647" instrument_node="">); therefore, screening for obesity is not necessary for the safe initiation of combined hormonal contraceptives. However, measuring weight and calculating BMI at baseline might be helpful for monitoring any changes and counseling women who might be concerned about weight change perceived to be associated with their contraceptive method.</span></p><span data-dcnode-id="5645" instrument_node="">
</span><p data-dcnode-id="5631"><b data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">Bimanual examination and cervical inspection:</span></b><span data-dcnode-id="5642" instrument_node=""> Pelvic examination is not necessary before initiation of combined hormonal contraceptives because it does not facilitate detection of conditions for which hormonal contraceptives would be unsafe. Women with certain conditions such as current breast cancer, severe hypertension or vascular disease, heart disease, migraine headaches with aura, and certain liver diseases, as well as women aged ≥35 years who smoke ≥15 cigarettes per day, should not use (U.S. MEC 4) or generally should not use (U.S. MEC 3) combined hormonal contraceptives (</span><i data-dcnode-id="5639"><a data-dcnode-id="5640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5641" instrument_node="">5</span></a></i><span data-dcnode-id="5638" instrument_node="">); however, none of these conditions are likely to be detected by pelvic examination (</span><i data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">120</span></i><span data-dcnode-id="5635" instrument_node="">). A systematic review identified two case-control studies that compared delayed and immediate pelvic examination before initiation of hormonal contraceptives, specifically oral contraceptives or DMPA (</span><i data-dcnode-id="5633"><span data-dcnode-id="5634" instrument_node="">15</span></i><span data-dcnode-id="5632" instrument_node="">). No differences in risk factors for cervical neoplasia, incidence of STDs, incidence of abnormal Papanicolaou smears, or incidence of abnormal wet mounts were found (Level of evidence: II-2 fair, direct).</span></p><span data-dcnode-id="5630" instrument_node="">
</span><p data-dcnode-id="5610"><b data-dcnode-id="5628"><span data-dcnode-id="5629" instrument_node="">Glucose:</span></b><span data-dcnode-id="5627" instrument_node=""> Although women with complicated diabetes should not use (U.S. MEC 4) or generally should not use (U.S. MEC 3) combined hormonal contraceptives, depending on the severity of the condition (</span><i data-dcnode-id="5624"><a data-dcnode-id="5625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5626" instrument_node="">5</span></a></i><span data-dcnode-id="5623" instrument_node="">), screening for diabetes before initiation of hormonal contraceptives is not necessary because of the low prevalence of undiagnosed diabetes and the high likelihood that women with complicated diabetes already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with glucose measurement before initiation of hormonal contraceptives (</span><i data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">14</span></i><span data-dcnode-id="5620" instrument_node="">). The prevalence of diabetes among women of reproductive age is low. During 1999–2008 among women aged 20–44 years in the United States, the percentage with diagnosed diabetes was 3% and the percentage with undiagnosed diabetes was 0.5% (</span><i data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">144</span></i><span data-dcnode-id="5617" instrument_node="">). Although hormonal contraceptives can have some adverse effects on glucose metabolism in healthy and diabetic women, the overall clinical effect is minimal (</span><i data-dcnode-id="5615"><span data-dcnode-id="5616" instrument_node="">145</span></i><span data-dcnode-id="5614" instrument_node="">–</span><i data-dcnode-id="5612"><span data-dcnode-id="5613" instrument_node="">151</span></i><span data-dcnode-id="5611" instrument_node="">).</span></p><span data-dcnode-id="5609" instrument_node="">
</span><p data-dcnode-id="5586"><b data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">Lipids:</span></b><span data-dcnode-id="5606" instrument_node=""> Although some women with hyperlipidemias generally should not use combined hormonal contraceptives (U.S. MEC 2/3, depending on the type and severity of the hyperlipidemia and presence of other cardiovascular risk factors) (</span><i data-dcnode-id="5603"><a data-dcnode-id="5604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5605" instrument_node="">5</span></a></i><span data-dcnode-id="5602" instrument_node="">), screening for hyperlipidemia before initiation of hormonal contraceptives is not necessary because of the low prevalence of undiagnosed disease in women of reproductive age and the low likelihood of clinically significant changes with use of hormonal contraceptives. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with lipid measurement before initiation of hormonal contraceptives (</span><i data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">14</span></i><span data-dcnode-id="5599" instrument_node="">). The prevalence of hyperlipidemia among women of reproductive age is low. During 1999–2008 among women aged 20–44 years in the United States, approximately 10% had hypercholesterolemia, defined as total cholesterol ≥ 240 mg/dL or currently taking lipid-lowering medications, and the prevalence of undiagnosed hypercholesterolemia was approximately 2% (</span><i data-dcnode-id="5597"><span data-dcnode-id="5598" instrument_node="">144</span></i><span data-dcnode-id="5596" instrument_node="">). Studies have shown mixed results about the effects of hormonal methods on lipid levels, and the clinical significance of these changes is unclear (</span><i data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">202</span></i><span data-dcnode-id="5593" instrument_node="">–</span><i data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">204</span></i><span data-dcnode-id="5590" instrument_node="">). In addition, women with abnormal lipid levels at baseline were not found to have increased risk for adverse changes to their lipid profile when using hormonal methods (</span><i data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">202</span></i><span data-dcnode-id="5587" instrument_node="">).</span></p><span data-dcnode-id="5585" instrument_node="">
</span><p data-dcnode-id="5559"><b data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">Liver enzymes:</span></b><span data-dcnode-id="5582" instrument_node=""> Although women with certain liver diseases should not use (U.S. MEC 4) or generally should not use (U.S. MEC 3) combined hormonal contraceptives (</span><i data-dcnode-id="5579"><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5581" instrument_node="">5</span></a></i><span data-dcnode-id="5578" instrument_node="">), screening for liver disease before initiation of combined hormonal contraceptives is not necessary because of the low prevalence of these conditions and the high likelihood that women with liver disease already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with liver enzyme tests before initiation of hormonal contraceptives (</span><i data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">14</span></i><span data-dcnode-id="5575" instrument_node="">). The prevalence of liver disorders among women of reproductive age is low. In 2008 among adults aged 18–44 years, the percentage with liver disease (not further specified) was 1.0% (</span><i data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">90</span></i><span data-dcnode-id="5572" instrument_node="">). In 2009, the incidence of acute hepatitis A, B, or C among women was &lt;1 per 100,000 population (</span><i data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">91</span></i><span data-dcnode-id="5569" instrument_node="">). During 1998–2007, the incidence of liver carcinoma among women was approximately 3 per 100,000 population (</span><i data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">92</span></i><span data-dcnode-id="5566" instrument_node="">). Because estrogen and progestins are metabolized in the liver, the use of hormonal contraceptives among women with liver disease might, theoretically, be a concern. The use of hormonal contraceptives, specifically COCs and POPs, does not affect disease progression or severity in women with hepatitis, cirrhosis, or benign focal nodular hyperplasia (</span><i data-dcnode-id="5564"><span data-dcnode-id="5565" instrument_node="">93</span></i><span data-dcnode-id="5563" instrument_node="">,</span><i data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">94</span></i><span data-dcnode-id="5560" instrument_node="">), although evidence is limited; no evidence exists for other types of combined hormonal contraceptives.</span></p><span data-dcnode-id="5558" instrument_node="">
</span><p data-dcnode-id="5541"><b data-dcnode-id="5556"><span data-dcnode-id="5557" instrument_node="">Thrombogenic mutations:</span></b><span data-dcnode-id="5555" instrument_node=""> Women with thrombogenic mutations should not use combined hormonal contraceptives (U.S. MEC 4) (</span><i data-dcnode-id="5552"><a data-dcnode-id="5553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5554" instrument_node="">5</span></a></i><span data-dcnode-id="5551" instrument_node="">) because of the increased risk for venous thromboembolism (</span><i data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">205</span></i><span data-dcnode-id="5548" instrument_node="">). However, studies have shown that universal screening for thrombogenic mutations before initiating COCs is not cost-effective because of the rarity of the conditions and the high cost of screening (</span><i data-dcnode-id="5546"><span data-dcnode-id="5547" instrument_node="">206</span></i><span data-dcnode-id="5545" instrument_node="">–</span><i data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">208</span></i><span data-dcnode-id="5542" instrument_node="">).</span></p><span data-dcnode-id="5540" instrument_node="">
</span><p data-dcnode-id="5526"><b data-dcnode-id="5538"><span data-dcnode-id="5539" instrument_node="">Clinical breast examination:</span></b><span data-dcnode-id="5537" instrument_node=""> Although women with current breast cancer should not use combined hormonal contraceptives (U.S. MEC 4) (</span><i data-dcnode-id="5534"><a data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5536" instrument_node="">5</span></a></i><span data-dcnode-id="5533" instrument_node="">), screening asymptomatic women with a clinical breast examination before initiating combined hormonal contraceptives is not necessary because of the low prevalence of breast cancer among women of reproductive age. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with a breast examination before initiation of hormonal contraceptives (</span><i data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">15</span></i><span data-dcnode-id="5530" instrument_node="">). The incidence of breast cancer among women of reproductive age in the United States is low. In 2009, the incidence of breast cancer among women aged 20–49 years was approximately 72 per 100,000 women (</span><i data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">95</span></i><span data-dcnode-id="5527" instrument_node="">).</span></p><span data-dcnode-id="5525" instrument_node="">
</span><p data-dcnode-id="5517"><b data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">Other screening:</span></b><span data-dcnode-id="5522" instrument_node=""> Women with anemia, cervical intraepithelial neoplasia, cervical cancer, HIV infection, or other STDs can use (U.S. MEC 1) or generally can use (U.S. MEC 2) combined hormonal contraceptives (</span><i data-dcnode-id="5519"><a data-dcnode-id="5520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5521" instrument_node="">5</span></a></i><span data-dcnode-id="5518" instrument_node="">); therefore, screening for these conditions is not necessary for the safe initiation of combined hormonal contraceptives.</span></p><span data-dcnode-id="5516" instrument_node="">
</span><h4 data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">Number of Pill Packs that Should Be Provided at Initial and Return Visits</span></h4><span data-dcnode-id="5513" instrument_node="">
</span><ul data-dcnode-id="5507"><li data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">	At the initial and return visits, provide or prescribe up to a 1-year supply of COCs (e.g., 13 28-day pill packs), depending on the woman's preferences and anticipated use.</span></li><span data-dcnode-id="5510" instrument_node="">
</span><li data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">	A woman should be able to obtain COCs easily in the amount and at the time she needs them.</span></li></ul><span data-dcnode-id="5506" instrument_node="">
</span><p data-dcnode-id="5502"><b data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5503" instrument_node=""> The more pill packs given up to 13 cycles, the higher the continuation rates. Restricting the number of pill packs distributed or prescribed can result in unwanted discontinuation of the method and increased risk for pregnancy.</span></p><span data-dcnode-id="5501" instrument_node="">
</span><p data-dcnode-id="5484"><span data-dcnode-id="5500" instrument_node="">A systematic review of the evidence suggested that providing a greater number of pill packs was associated with increased continuation (</span><i data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">23</span></i><span data-dcnode-id="5497" instrument_node="">). Studies that compared provision of one versus 12 packs, one versus 12 or 13 packs, or three versus seven packs found increased continuation of pill use among women provided with more pill packs (</span><i data-dcnode-id="5495"><span data-dcnode-id="5496" instrument_node="">209</span></i><span data-dcnode-id="5494" instrument_node="">–</span><i data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">211</span></i><span data-dcnode-id="5491" instrument_node="">). However, one study found that there was no difference in continuation when patients were provided one and then three packs versus four packs all at once (</span><i data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">212</span></i><span data-dcnode-id="5488" instrument_node="">). In addition to continuation, a greater number of pills packs provided was associated with fewer pregnancy tests, fewer pregnancies, and lower cost per client. However, a greater number of pill packs (i.e., 13 packs versus three packs) also was associated with increased pill wastage in one study (</span><i data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">210</span></i><span data-dcnode-id="5485" instrument_node="">) (Level of evidence: I to II-2, fair, direct).</span></p><span data-dcnode-id="5483" instrument_node="">
</span><h4 data-dcnode-id="5481"><span data-dcnode-id="5482" instrument_node="">Routine Follow-Up After Combined Hormonal Contraceptive Initiation</span></h4><span data-dcnode-id="5480" instrument_node="">
</span><p data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">These recommendations address when routine follow-up is recommended for safe and effective continued use of contraception for healthy women. The recommendations refer to general situations and might vary for different users and different situations. Specific populations that might benefit from more frequent follow-up visits include adolescents, those with certain medical conditions or characteristics, and those with multiple medical conditions.</span></p><span data-dcnode-id="5477" instrument_node="">
</span><ul data-dcnode-id="5457"><li data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">	Advise a woman to return at any time to discuss side effects or other problems or if she wants to change the method being used. No routine follow-up visit is required.</span></li><span data-dcnode-id="5474" instrument_node="">
</span><li data-dcnode-id="5458"><span data-dcnode-id="5473" instrument_node="">	At other routine visits, health-care providers seeing combined hormonal contraceptive users should do the following:
				</span><ul data-dcnode-id="5459"><span data-dcnode-id="5472" instrument_node="">
</span><li data-dcnode-id="5470"><span data-dcnode-id="5471" instrument_node="">Assess the woman's satisfaction with her contraceptive method and whether she has any concerns about method use.</span></li><span data-dcnode-id="5469" instrument_node="">
</span><li data-dcnode-id="5467"><span data-dcnode-id="5468" instrument_node="">Assess any changes in health status, including medications, that would change the appropriateness of combined hormonal contraceptives for safe and effective continued use based on U.S. MEC (e.g., category 3 and 4 conditions and characteristics).</span></li><span data-dcnode-id="5466" instrument_node="">
</span><li data-dcnode-id="5464"><span data-dcnode-id="5465" instrument_node="">Assess blood pressure.</span></li><span data-dcnode-id="5463" instrument_node="">
</span><li data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">Consider assessing weight changes and counseling women who are concerned about weight changes perceived to be associated with their contraceptive method.</span></li><span data-dcnode-id="5460" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="5456" instrument_node="">
</span><p data-dcnode-id="5452"><b data-dcnode-id="5454"><span data-dcnode-id="5455" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5453" instrument_node=""> No evidence exists regarding whether a routine follow-up visit after initiating combined hormonal contraceptives improves correct or continued use. Monitoring blood pressure is important for combined hormonal contraceptive users. Health-care providers might consider recommending women obtain blood pressure measurements in nonclinical settings (e.g., pharmacy or fire station).</span></p><span data-dcnode-id="5451" instrument_node="">
</span><p data-dcnode-id="5446"><span data-dcnode-id="5450" instrument_node="">A systematic review identified five studies that examined the incidence of hypertension among women who began using a COC versus those who started a nonhormonal method of contraception or a placebo (</span><i data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">17</span></i><span data-dcnode-id="5447" instrument_node="">). Few women developed hypertension after initiating COCs, and studies examining increases in blood pressure after COC initiation found mixed results. No studies were identified that examined changes in blood pressure among patch or vaginal ring users (Level of evidence: I, fair, to II-2, fair, indirect).</span></p><span data-dcnode-id="5445" instrument_node="">
</span><h4 data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">Late or Missed Doses and Side Effects from Combined Hormonal Contraceptive Use</span></h4><span data-dcnode-id="5442" instrument_node="">
