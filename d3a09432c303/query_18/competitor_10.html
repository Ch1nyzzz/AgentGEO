</span><p data-dcnode-id="5422"><span data-dcnode-id="5441" instrument_node="">For the following recommendations, a dose is considered late when &lt;24 hours have elapsed since the dose should have been taken. A dose is considered missed if ≥24 hours have elapsed since the dose should have been taken. For example, if a COC pill was supposed to have been taken on Monday at 9:00 a.m. and is taken at 11:00 a.m., the pill is late; however, by Tuesday morning at 11:00 a.m., Monday's 9:00 a.m. pill has been missed and Tuesday's 9:00 a.m. pill is late. For COCs, the recommendations only apply to late or missed hormonally active pills and not to placebo pills. Recommendations are provided for late or missed pills </span><span class="callout-pink" data-dcnode-id="5436"><span data-dcnode-id="5440" instrument_node="">(</span><a data-dcnode-id="5438" href="#Fig2"><span data-dcnode-id="5439" instrument_node="">Figure 2</span></a><span data-dcnode-id="5437" instrument_node="">)</span></span><span data-dcnode-id="5435" instrument_node="">, the patch </span><span class="callout-pink" data-dcnode-id="5430"><span data-dcnode-id="5434" instrument_node="">(</span><a data-dcnode-id="5432" href="#Fig3"><span data-dcnode-id="5433" instrument_node="">Figure 3</span></a><span data-dcnode-id="5431" instrument_node="">)</span></span><span data-dcnode-id="5429" instrument_node="">, and the ring </span><span class="callout-pink" data-dcnode-id="5424"><span data-dcnode-id="5428" instrument_node="">(</span><a data-dcnode-id="5426" href="#Fig4"><span data-dcnode-id="5427" instrument_node="">Figure 4</span></a><span data-dcnode-id="5425" instrument_node="">)</span></span><span data-dcnode-id="5423" instrument_node="">.</span></p><span data-dcnode-id="5421" instrument_node="">
</span><p data-dcnode-id="5417"><b data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5418" instrument_node=""> Inconsistent or incorrect use of combined hormonal contraceptives is a major cause of combined hormonal contraceptive failure. Extending the hormone-free interval is considered to be a particularly risky time to miss combined hormonal contraceptives. Seven days of continuous combined hormonal contraceptive use is deemed necessary to reliably prevent ovulation. The recommendations reflect a balance between simplicity and precision of science. Women who frequently miss COCs or experience other usage errors with combined hormonal patch or combined vaginal ring should consider an alternative contraceptive method that is less dependent on the user to be effective (e.g., IUD, implant, or injectable).</span></p><span data-dcnode-id="5416" instrument_node="">
</span><p data-dcnode-id="5276"><span data-dcnode-id="5415" instrument_node="">A systematic review identified 36 studies that examined measures of contraceptive effectiveness of combined hormonal contraceptives during cycles with extended hormone-free intervals, shortened hormone-free intervals, or deliberate nonadherence on days not adjacent to the hormone-free interval (</span><i data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">24</span></i><span data-dcnode-id="5412" instrument_node="">). Most of the studies examined COCs (</span><i data-dcnode-id="5410"><span data-dcnode-id="5411" instrument_node="">188</span></i><span data-dcnode-id="5409" instrument_node="">,</span><i data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">213</span></i><span data-dcnode-id="5406" instrument_node="">–</span><i data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">240</span></i><span data-dcnode-id="5403" instrument_node="">), two examined the combined hormonal patch (</span><i data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">234</span></i><span data-dcnode-id="5400" instrument_node="">,</span><i data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">241</span></i><span data-dcnode-id="5397" instrument_node="">), and six examined the combined vaginal ring (</span><i data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">185</span></i><span data-dcnode-id="5394" instrument_node="">,</span><i data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">242</span></i><span data-dcnode-id="5391" instrument_node="">–</span><i data-dcnode-id="5389"><span data-dcnode-id="5390" instrument_node="">246</span></i><span data-dcnode-id="5388" instrument_node="">). No direct evidence on the effect of missed pills on the risk for pregnancy was found. Studies of women deliberately extending the hormone-free interval up to 14 days found wide variability in the amount of follicular development and occurrence of ovulation (</span><i data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">216</span></i><span data-dcnode-id="5385" instrument_node="">,</span><i data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">219</span></i><span data-dcnode-id="5382" instrument_node="">,</span><i data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">221</span></i><span data-dcnode-id="5379" instrument_node="">,</span><i data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">222</span></i><span data-dcnode-id="5376" instrument_node="">,</span><i data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">224</span></i><span data-dcnode-id="5373" instrument_node="">,</span><i data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">225</span></i><span data-dcnode-id="5370" instrument_node="">,</span><i data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">227</span></i><span data-dcnode-id="5367" instrument_node="">–</span><i data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">230</span></i><span data-dcnode-id="5364" instrument_node="">); in general, the risk for ovulation was low, and among women who did ovulate, cycles were usually abnormal. In studies of women who deliberately missed pills on various days during the cycle not adjacent to the hormone-free interval, ovulation occurred infrequently (</span><i data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">214</span></i><span data-dcnode-id="5361" instrument_node="">,</span><i data-dcnode-id="5359"><span data-dcnode-id="5360" instrument_node="">220</span></i><span data-dcnode-id="5358" instrument_node="">–</span><i data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">222</span></i><span data-dcnode-id="5355" instrument_node="">,</span><i data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">230</span></i><span data-dcnode-id="5352" instrument_node="">,</span><i data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">231</span></i><span data-dcnode-id="5349" instrument_node="">,</span><i data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">233</span></i><span data-dcnode-id="5346" instrument_node="">,</span><i data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">234</span></i><span data-dcnode-id="5343" instrument_node="">). Studies comparing 7-day hormone-free intervals with shorter hormone-free intervals found lower rates of pregnancy (</span><i data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">213</span></i><span data-dcnode-id="5340" instrument_node="">,</span><i data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">217</span></i><span data-dcnode-id="5337" instrument_node="">,</span><i data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">226</span></i><span data-dcnode-id="5334" instrument_node="">,</span><i data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">232</span></i><span data-dcnode-id="5331" instrument_node="">) and significantly greater suppression of ovulation (</span><i data-dcnode-id="5329"><span data-dcnode-id="5330" instrument_node="">215</span></i><span data-dcnode-id="5328" instrument_node="">,</span><i data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">225</span></i><span data-dcnode-id="5325" instrument_node="">,</span><i data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">236</span></i><span data-dcnode-id="5322" instrument_node="">–</span><i data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">238</span></i><span data-dcnode-id="5319" instrument_node="">,</span><i data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">240</span></i><span data-dcnode-id="5316" instrument_node="">) among women with shorter intervals in all but one study (</span><i data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">235</span></i><span data-dcnode-id="5313" instrument_node="">), which found no difference. Two studies that compared 30-</span><i data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">µ</span></i><span data-dcnode-id="5310" instrument_node="">g ethinyl estradiol  pills with 20-</span><i data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">µ</span></i><span data-dcnode-id="5307" instrument_node="">g ethinyl estradiol  pills showed more follicular activity when 20-</span><i data-dcnode-id="5305"><span data-dcnode-id="5306" instrument_node="">µ</span></i><span data-dcnode-id="5304" instrument_node="">g ethinyl estradiol  pills were missed (</span><i data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">216</span></i><span data-dcnode-id="5301" instrument_node="">,</span><i data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node="">219</span></i><span data-dcnode-id="5298" instrument_node="">). In studies examining the combined vaginal ring, three studies found that nondeliberate extension of the hormone-free interval for 24 to &lt;48 hours from the scheduled period did not increase the risk for pregnancy (</span><i data-dcnode-id="5296"><span data-dcnode-id="5297" instrument_node="">242</span></i><span data-dcnode-id="5295" instrument_node="">,</span><i data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">243</span></i><span data-dcnode-id="5292" instrument_node="">,</span><i data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">245</span></i><span data-dcnode-id="5289" instrument_node="">); one study found that ring insertion after a deliberately extended hormone-free interval that allowed a 13-mm follicle to develop interrupted ovarian function and further follicular growth (</span><i data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">185</span></i><span data-dcnode-id="5286" instrument_node="">); and one study found that inhibition of ovulation was maintained after deliberately forgetting to remove the ring for up to 2 weeks after normal ring use (</span><i data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">246</span></i><span data-dcnode-id="5283" instrument_node="">). In studies examining the combined hormonal patch, one study found that missing 1–3 consecutive days before patch replacement (either wearing one patch 3 days longer before replacement or going 3 days without a patch before replacing the next patch) on days not adjacent to the patch-free interval resulted in little follicular activity and low risk for ovulation (</span><i data-dcnode-id="5281"><span data-dcnode-id="5282" instrument_node="">234</span></i><span data-dcnode-id="5280" instrument_node="">), and one pharmacokinetic study found that serum levels of ethinyl estradiol and progestin norelgestromin remained within reference ranges after extending patch wear for 3 days (</span><i data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">241</span></i><span data-dcnode-id="5277" instrument_node="">). No studies were found on extending the patch-free interval. In studies that provide indirect evidence on the effects of missed combined hormonal contraception on surrogate measures of pregnancy, how differences in surrogate measures correspond to pregnancy risk is unclear (Level of evidence: I, good, indirect to II-3, poor, direct).</span></p><span data-dcnode-id="5275" instrument_node="">
</span><h4 data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Vomiting or Severe Diarrhea While Using COCs</span></h4><span data-dcnode-id="5272" instrument_node="">
</span><p data-dcnode-id="5264"><span data-dcnode-id="5271" instrument_node="">Certain steps should be taken by women who experience vomiting or severe diarrhea while using COCs </span><span class="callout-pink" data-dcnode-id="5266"><span data-dcnode-id="5270" instrument_node="">(</span><a data-dcnode-id="5268" href="#Fig5"><span data-dcnode-id="5269" instrument_node="">Figure 5</span></a><span data-dcnode-id="5267" instrument_node="">)</span></span><span data-dcnode-id="5265" instrument_node="">.</span></p><span data-dcnode-id="5263" instrument_node="">
</span><p data-dcnode-id="5259"><b data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5260" instrument_node=""> Theoretically, the contraceptive effectiveness of COCs might be decreased because of vomiting or severe diarrhea. Because of the lack of evidence that addresses vomiting or severe diarrhea while using COCs, these recommendations are based on the recommendations for missed COCs. No evidence was found on the effects of vomiting or diarrhea on measures of contraceptive effectiveness including pregnancy, follicular development, hormone levels, or cervical mucus quality.</span></p><span data-dcnode-id="5258" instrument_node="">
</span><h4 data-dcnode-id="5254"><span data-dcnode-id="5257" instrument_node="">Unscheduled Bleeding with Extended or Continuous Use of Combined </span><br data-dcnode-id="5256"><span data-dcnode-id="5255" instrument_node="">Hormonal Contraceptives</span></h4><span data-dcnode-id="5253" instrument_node="">
</span><ul data-dcnode-id="5230"><li data-dcnode-id="5248"><span data-dcnode-id="5252" instrument_node="">	Before initiation of combined hormonal contraceptives, provide counseling about potential changes in bleeding patterns during extended or continuous combined hormonal contraceptive use. (Extended contraceptive use is defined as a planned hormone-free interval after at least two contiguous cycles. Continuous contraceptive use is defined as uninterrupted use of hormonal contraception without a hormone-free interval [</span><i data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">247</span></i><span data-dcnode-id="5249" instrument_node="">].)</span></li><span data-dcnode-id="5247" instrument_node="">
</span><li data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">	Unscheduled spotting or bleeding is common during the first 3–6 months of extended or continuous combined hormonal contraceptive use. It is generally not harmful and decreases with continued combined hormonal contraceptive use.</span></li><span data-dcnode-id="5244" instrument_node="">
</span><li data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">	If clinically indicated, consider an underlying gynecological problem, such as inconsistent use, interactions with other medications, cigarette smoking, an STD, pregnancy, or new pathologic uterine conditions (e.g., polyps or fibroids). If an underlying gynecological problem is found, treat the condition or refer for care.</span></li><span data-dcnode-id="5241" instrument_node="">
</span><li data-dcnode-id="5234"><span data-dcnode-id="5240" instrument_node="">	If an underlying gynecological problem is not found and the woman wants treatment, the following treatment option can be considered:
				</span><ul class="List-2" data-dcnode-id="5235"><span data-dcnode-id="5239" instrument_node="">
</span><li data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">Advise the woman to discontinue combined hormonal contraceptive use (i.e., a hormone-free interval) for 3–4 consecutive days; a hormone-free interval is not recommended during the first 21 days of using the continuous or extended combined hormonal contraceptive method. A hormone-free interval also is not recommended more than once per month because contraceptive effectiveness might be reduced.</span></li><span data-dcnode-id="5236" instrument_node="">
</span></ul></li><span data-dcnode-id="5233" instrument_node="">
</span><li data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">	If unscheduled spotting or bleeding persists and the woman finds it unacceptable, counsel her on alternative contraceptive methods, and offer another method if it is desired.</span></li></ul><span data-dcnode-id="5229" instrument_node="">
</span><p data-dcnode-id="5216"><b data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5226" instrument_node=""> During contraceptive counseling and before initiating extended or continuous combined hormonal contraceptives, information about common side effects such as unscheduled spotting or bleeding, especially during the first 3–6 months of use, should be discussed (</span><i data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">248</span></i><span data-dcnode-id="5223" instrument_node="">). These bleeding irregularities are generally not harmful and usually improve with persistent use of the hormonal method. To avoid unscheduled spotting or bleeding, counseling should emphasize the importance of correct use and timing; for users of contraceptive pills, emphasize consistent pill use. Enhanced counseling about expected bleeding patterns and reassurance that bleeding irregularities are generally not harmful has been shown to reduce method discontinuation in clinical trials with DMPA (</span><i data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">101</span></i><span data-dcnode-id="5220" instrument_node="">,</span><i data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">102</span></i><span data-dcnode-id="5217" instrument_node="">).</span></p><span data-dcnode-id="5215" instrument_node="">
</span><p data-dcnode-id="5201"><span data-dcnode-id="5214" instrument_node="">A systematic review identified three studies with small study populations that addressed treatments for unscheduled bleeding among women using extended or continuous combined hormonal contraceptives (</span><i data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">25</span></i><span data-dcnode-id="5211" instrument_node="">). In two separate randomized clinical trials in which women were taking either contraceptive pills or using the contraceptive ring continuously for 168 days, women assigned to a hormone-free interval of 3 or 4 days reported improved bleeding. Although they noted an initial increase in flow, this was followed by an abrupt decrease 7–8 days later with eventual cessation of flow 11–12 days later. These findings were compared with women who continued to use their method without a hormone-free interval, in which a greater proportion reported either treatment failure or fewer days of amenorrhea (</span><i data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">249</span></i><span data-dcnode-id="5208" instrument_node="">,</span><i data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">250</span></i><span data-dcnode-id="5205" instrument_node="">). In another randomized trial of 66 women with unscheduled bleeding among women using 84 days of hormonally active contraceptive pills, oral doxycycline (100 mg twice daily) initiated the first day of bleeding and taken for 5 days did not result in any improvement in bleeding compared with placebo (</span><i data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">251</span></i><span data-dcnode-id="5202" instrument_node="">) (Level of evidence: I, fair, direct).</span></p><span data-dcnode-id="5200" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">Progestin-Only Pills</span></h3><span data-dcnode-id="5197" instrument_node="">
</span><p data-dcnode-id="5192"><span data-dcnode-id="5196" instrument_node="">POPs contain only a progestin and no estrogen and are available in the United States. Approximately 9 out of 100 women become pregnant in the first year of use with POPs with typical use (</span><i data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">59</span></i><span data-dcnode-id="5193" instrument_node="">). POPs are reversible and can be used by women of all ages. POPs do not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="5191" instrument_node="">
</span><h4 data-dcnode-id="5189"><span data-dcnode-id="5190" instrument_node="">Initiation of POPs</span></h4><span data-dcnode-id="5188" instrument_node="">
</span><h4 data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">Timing</span></h4><span data-dcnode-id="5185" instrument_node="">
</span><ul data-dcnode-id="5179"><li data-dcnode-id="5180"><span data-dcnode-id="5184" instrument_node="">	POPs can be started at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5182" href="#Box1"><span data-dcnode-id="5183" instrument_node="">Box 1</span></a><span data-dcnode-id="5181" instrument_node="">).</span></li></ul><span data-dcnode-id="5178" instrument_node="">
</span><h4 data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">Need for Back-Up Contraception</span></h4><span data-dcnode-id="5175" instrument_node="">
</span><ul data-dcnode-id="5169"><li data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">	If POPs are started within the first 5 days since menstrual bleeding started, no additional contraceptive protection is needed.</span></li><span data-dcnode-id="5172" instrument_node="">
</span><li data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">	If POPs are started &gt;5 days since menstrual bleeding started, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days.</span></li></ul><span data-dcnode-id="5168" instrument_node="">
</span><h4 data-dcnode-id="5166"><span data-dcnode-id="5167" instrument_node="">Special Considerations</span></h4><span data-dcnode-id="5165" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="5162"><b data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">Amenorrhea (Not Postpartum)</span></b></p><span data-dcnode-id="5161" instrument_node="">
</span><ul data-dcnode-id="5146"><li data-dcnode-id="5153"><span data-dcnode-id="5160" instrument_node=""> </span><b data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">Timing:</span></b><span data-dcnode-id="5157" instrument_node=""> POPs can be started at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5155" href="#Box1"><span data-dcnode-id="5156" instrument_node="">Box 1</span></a><span data-dcnode-id="5154" instrument_node="">).</span></li><span data-dcnode-id="5152" instrument_node="">
</span><li data-dcnode-id="5147"><span data-dcnode-id="5151" instrument_node=""> </span><b data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5148" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days.</span></li></ul><span data-dcnode-id="5145" instrument_node="">
</span><p class="h5" data-dcnode-id="5142"><b data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">Postpartum (Breastfeeding)</span></b></p><span data-dcnode-id="5141" instrument_node="">
</span><ul data-dcnode-id="5124"><li data-dcnode-id="5134"><b data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">Timing:</span></b><span data-dcnode-id="5138" instrument_node=""> POPs can be started at any time, including immediately postpartum (U.S. MEC 2 if &lt;1 month postpartum and U.S. MEC 1 if ≥1 month postpartum) if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5136" href="#Box1"><span data-dcnode-id="5137" instrument_node="">Box 1</span></a><span data-dcnode-id="5135" instrument_node="">).</span></li><span data-dcnode-id="5133" instrument_node="">
</span><li data-dcnode-id="5125"><span data-dcnode-id="5132" instrument_node=""> </span><b data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5129" instrument_node=""> If the woman is &lt;6 months postpartum, amenorrheic, and fully or nearly fully breastfeeding (exclusively breastfeeding or the vast majority [≥85%] of feeds are breastfeeds) (</span><i data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">60</span></i><span data-dcnode-id="5126" instrument_node="">), no additional contraceptive protection is needed. Otherwise, a woman who is ≥21 days postpartum and has not experienced return of her menstrual cycles needs to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days. If her menstrual cycles have returned and it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days.</span></li></ul><span data-dcnode-id="5123" instrument_node="">
</span><p class="h5" data-dcnode-id="5120"><b data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">Postpartum (Not Breastfeeding)</span></b></p><span data-dcnode-id="5119" instrument_node="">
</span><ul data-dcnode-id="5104"><li data-dcnode-id="5111"><span data-dcnode-id="5118" instrument_node=""> </span><b data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">Timing:</span></b><span data-dcnode-id="5115" instrument_node=""> POPs can be started at any time, including immediately postpartum (U.S. MEC 1), if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5113" href="#Box1"><span data-dcnode-id="5114" instrument_node="">Box 1</span></a><span data-dcnode-id="5112" instrument_node="">).</span></li><span data-dcnode-id="5110" instrument_node="">
</span><li data-dcnode-id="5105"><span data-dcnode-id="5109" instrument_node=""> </span><b data-dcnode-id="5107"><span data-dcnode-id="5108" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5106" instrument_node=""> Women who are ≥21 days postpartum and whose menstrual cycles have not returned need to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days. If her menstrual cycles have returned and it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days.</span></li></ul><span data-dcnode-id="5103" instrument_node="">
</span><p class="h5" data-dcnode-id="5100"><b data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">Postabortion (Spontaneous or Induced)</span></b></p><span data-dcnode-id="5099" instrument_node="">
</span><ul data-dcnode-id="5087"><li data-dcnode-id="5094"><span data-dcnode-id="5098" instrument_node=""> </span><b data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Timing:</span></b><span data-dcnode-id="5095" instrument_node=""> POPs can be started within the first 7 days, including immediately postabortion (U.S. MEC 1).</span></li><span data-dcnode-id="5093" instrument_node="">
</span><li data-dcnode-id="5088"><span data-dcnode-id="5092" instrument_node=""> </span><b data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5089" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days unless POPs are started at the time of a surgical abortion.</span></li></ul><span data-dcnode-id="5086" instrument_node="">
</span><p class="h5" data-dcnode-id="5083"><b data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">Switching from Another Contraceptive Method</span></b></p><span data-dcnode-id="5082" instrument_node="">
</span><ul data-dcnode-id="5050"><li data-dcnode-id="5074"><span data-dcnode-id="5081" instrument_node=""> </span><b data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">Timing:</span></b><span data-dcnode-id="5078" instrument_node=""> POPs can be started immediately if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="5076" href="#Box1"><span data-dcnode-id="5077" instrument_node="">Box 1</span></a><span data-dcnode-id="5075" instrument_node="">). Waiting for her next menstrual period is unnecessary.</span></li><span data-dcnode-id="5073" instrument_node="">
</span><li data-dcnode-id="5068"><span data-dcnode-id="5072" instrument_node=""> </span><b data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="5069" instrument_node=""> If it has been &gt;5 days since menstrual bleeding started, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 2 days.</span></li><span data-dcnode-id="5067" instrument_node="">
</span><li data-dcnode-id="5051"><span data-dcnode-id="5066" instrument_node=""> </span><b data-dcnode-id="5064"><span data-dcnode-id="5065" instrument_node="">Switching from an IUD:</span></b><span data-dcnode-id="5063" instrument_node=""> If the woman has had sexual intercourse since the start of her current menstrual cycle and it has been &gt;5 days since menstrual bleeding started, theoretically, residual sperm might be in the genital tract, which could lead to fertilization if ovulation occurs. A health-care provider may consider any of the following options:
				</span><ul class="List-2" data-dcnode-id="5052"><span data-dcnode-id="5062" instrument_node="">
</span><li data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">Advise the women to retain the IUD for at least 2 days after POPs are initiated and return for IUD removal.</span></li><span data-dcnode-id="5059" instrument_node="">
</span><li data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">Advise the woman to abstain from sexual intercourse or use barrier contraception for 2 days before removing the IUD and switching to the new method.</span></li><span data-dcnode-id="5056" instrument_node="">
</span><li data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">Advise the woman to use ECPs at the time of IUD removal.</span></li><span data-dcnode-id="5053" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="5049" instrument_node="">
</span><p data-dcnode-id="5045"><b data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5046" instrument_node=""> In situations in which the health-care provider is uncertain whether the woman might be pregnant, the benefits of starting POPs likely exceed any risk; therefore, starting POPs should be considered at any time, with a follow-up pregnancy test in 2–4 weeks.</span></p><span data-dcnode-id="5044" instrument_node="">
</span><p data-dcnode-id="5033"><span data-dcnode-id="5043" instrument_node="">Unlike COCs, POPs inhibit ovulation in about half of cycles, although the rates vary widely by individual (</span><i data-dcnode-id="5041"><span data-dcnode-id="5042" instrument_node="">252</span></i><span data-dcnode-id="5040" instrument_node="">). Peak serum steroid levels are reached about 2 hours after administration, followed by rapid distribution and elimination, such that by 24 hours after administration, serum steroid levels are near baseline (</span><i data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">252</span></i><span data-dcnode-id="5037" instrument_node="">). Therefore, taking POPs at approximately the same time each day is important. An estimated 48 hours of POP use has been deemed necessary to achieve the contraceptive effects on cervical mucus (</span><i data-dcnode-id="5035"><span data-dcnode-id="5036" instrument_node="">252</span></i><span data-dcnode-id="5034" instrument_node="">). If a woman needs to use additional contraceptive protection when switching to POPs from another contraceptive method, consider continuing her previous method for 2 days after starting POPs. No direct evidence was found regarding the effects of starting POPs at different times of the cycle.</span></p><span data-dcnode-id="5032" instrument_node="">
</span><h4 data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">Examinations and Tests Needed Before Initiation of POPs</span></h4><span data-dcnode-id="5029" instrument_node="">
</span><p data-dcnode-id="5017"><span data-dcnode-id="5028" instrument_node="">Among healthy women, no examinations or tests are needed before initiation of POPs, although a baseline weight and BMI measurement might be useful for monitoring POP users over time </span><span class="callout-pink" data-dcnode-id="5023"><span data-dcnode-id="5027" instrument_node="">(</span><a data-dcnode-id="5025" href="#Tab6"><span data-dcnode-id="5026" instrument_node="">Table 6</span></a><span data-dcnode-id="5024" instrument_node="">)</span></span><span data-dcnode-id="5022" instrument_node="">. Women with known medical problems or other special conditions might need additional examinations or tests before being determined to be appropriate candidates for a particular method of contraception. U.S. MEC might be useful in such circumstances (</span><i data-dcnode-id="5019"><a data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5021" instrument_node="">5</span></a></i><span data-dcnode-id="5018" instrument_node="">).</span></p><span data-dcnode-id="5016" instrument_node="">
</span><p data-dcnode-id="5005"><b data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="5013" instrument_node=""> </span><b data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">Weight (BMI):</span></b><span data-dcnode-id="5010" instrument_node=""> Obese women can use POPs (U.S. MEC 1) (</span><i data-dcnode-id="5007"><a data-dcnode-id="5008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5009" instrument_node="">5</span></a></i><span data-dcnode-id="5006" instrument_node="">); therefore, screening for obesity is not necessary for the safe initiation of POPs. However, measuring weight and calculating BMI at baseline might be helpful for monitoring any changes and counseling women who might be concerned about weight change perceived to be associated with their contraceptive method.</span></p><span data-dcnode-id="5004" instrument_node="">
</span><p data-dcnode-id="4990"><b data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">Bimanual examination and cervical inspection:</span></b><span data-dcnode-id="5001" instrument_node=""> Pelvic examination is not necessary before initiation of POPs because it does not facilitate detection of conditions for which POPs would be unsafe. Women with current breast cancer should not use POPs (U.S. MEC 4), and women with certain liver diseases generally should not use POPs (U.S. MEC 3) (</span><i data-dcnode-id="4998"><a data-dcnode-id="4999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="5000" instrument_node="">5</span></a></i><span data-dcnode-id="4997" instrument_node="">); however, neither of these conditions are likely to be detected by pelvic examination (</span><i data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">120</span></i><span data-dcnode-id="4994" instrument_node="">). A systematic review identified two case-control studies that compared delayed versus immediate pelvic examination before initiation of hormonal contraceptives, specifically oral contraceptives or DMPA (</span><i data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">15</span></i><span data-dcnode-id="4991" instrument_node="">). No differences in risk factors for cervical neoplasia, incidence of STDs, incidence of abnormal Papanicolaou smears, or incidence of abnormal wet mounts were observed (Level of evidence: II-2 fair, direct).</span></p><span data-dcnode-id="4989" instrument_node="">
</span><p data-dcnode-id="4963"><b data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">Liver enzymes:</span></b><span data-dcnode-id="4986" instrument_node=""> Although women with certain liver diseases generally should not use POPs (U.S. MEC 3) (</span><i data-dcnode-id="4983"><a data-dcnode-id="4984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="4985" instrument_node="">5</span></a></i><span data-dcnode-id="4982" instrument_node="">), screening for liver disease before initiation of POPs is not necessary because of the low prevalence of these conditions and the high likelihood that women with liver disease already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with liver enzyme tests before initiation of hormonal contraceptives (</span><i data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">14</span></i><span data-dcnode-id="4979" instrument_node="">). The prevalence of liver disorders among women of reproductive age is low. In 2008 among U.S. adults aged 18–44 years, the percentage with liver disease (not further specified) was 1.0% (</span><i data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">90</span></i><span data-dcnode-id="4976" instrument_node="">). In 2009, the incidence of acute hepatitis A, B, or C among women was &lt;1 per 100,000 population (</span><i data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">91</span></i><span data-dcnode-id="4973" instrument_node="">). During 1998–2007, the incidence of liver carcinoma among women was approximately 3 per 100,000 population (</span><i data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">92</span></i><span data-dcnode-id="4970" instrument_node="">). Because estrogen and progestins are metabolized in the liver, the use of hormonal contraceptives among women with liver disease might, theoretically, be a concern. The use of hormonal contraceptives, specifically COCs and POPs, does not affect disease progression or severity in women with hepatitis, cirrhosis, or benign focal nodular hyperplasia (</span><i data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">93</span></i><span data-dcnode-id="4967" instrument_node="">,</span><i data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">94</span></i><span data-dcnode-id="4964" instrument_node="">).</span></p><span data-dcnode-id="4962" instrument_node="">
</span><p data-dcnode-id="4948"><b data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">Clinical breast examination:</span></b><span data-dcnode-id="4959" instrument_node=""> Although women with current breast cancer should not use POPs (U.S. MEC 4) (</span><i data-dcnode-id="4956"><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="4958" instrument_node="">5</span></a></i><span data-dcnode-id="4955" instrument_node="">), screening asymptomatic women with a clinical breast examination before initiating POPs is not necessary because of the low prevalence of breast cancer among women of reproductive age. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with a clinical breast examination before initiation of hormonal contraceptives (</span><i data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">15</span></i><span data-dcnode-id="4952" instrument_node="">). The incidence of breast cancer among women of reproductive age in the United States is low. In 2009, the incidence of breast cancer among women ages 20–49 was approximately 72 per 100,000 women (</span><i data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">95</span></i><span data-dcnode-id="4949" instrument_node="">).</span></p><span data-dcnode-id="4947" instrument_node="">
</span><p data-dcnode-id="4939"><b data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">Other screening:</span></b><span data-dcnode-id="4944" instrument_node=""> Women with hypertension, diabetes, hyperlipidemia, anemia, thrombogenic mutations, cervical intraepithelial neoplasia, cervical cancer, STDs, or HIV infection can use (U.S. MEC 1) or generally can use (U.S. MEC 2) POPs  (</span><i data-dcnode-id="4941"><a data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="4943" instrument_node="">5</span></a></i><span data-dcnode-id="4940" instrument_node="">); therefore, screening for these conditions is not necessary for the safe initiation of POPs.</span></p><span data-dcnode-id="4938" instrument_node="">
</span><h4 data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">Number of Pill Packs that Should Be Provided at Initial and Return Visits</span></h4><span data-dcnode-id="4935" instrument_node="">
</span><ul data-dcnode-id="4929"><li data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">	At the initial and return visits, provide or prescribe up to a 1-year supply of POPs (e.g., 13 28-day pill packs), depending on the woman's preferences and anticipated use.</span></li><span data-dcnode-id="4932" instrument_node="">
</span><li data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">	A woman should be able to obtain POPs easily in the amount and at the time she needs them.</span></li></ul><span data-dcnode-id="4928" instrument_node="">
</span><p data-dcnode-id="4924"><b data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4925" instrument_node=""> The more pill packs given up to 13 cycles, the higher the continuation rates. Restricting the number of pill packs distributed or prescribed can result in unwanted discontinuation of the method and increased risk for pregnancy.</span></p><span data-dcnode-id="4923" instrument_node="">
</span><p data-dcnode-id="4906"><span data-dcnode-id="4922" instrument_node="">A systematic review of the evidence suggested that providing a greater number of pill packs was associated with increased continuation (</span><i data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">23</span></i><span data-dcnode-id="4919" instrument_node="">). Studies that compared provision of one versus 12 packs, one versus 12 or 13 packs, or three versus seven packs found increased continuation of pill use among women provided with more pill packs (</span><i data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">209</span></i><span data-dcnode-id="4916" instrument_node="">–</span><i data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">211</span></i><span data-dcnode-id="4913" instrument_node="">). However, one study found that there was no difference in continuation when patients were provided one and then three packs versus four packs all at once (</span><i data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">212</span></i><span data-dcnode-id="4910" instrument_node="">). In addition to continuation, a greater number of pill packs provided was associated with fewer pregnancy tests, fewer pregnancies, and lower cost per client. However, a greater number of pill packs (13 packs versus three packs) also was associated with increased pill wastage in one study (</span><i data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">210</span></i><span data-dcnode-id="4907" instrument_node="">) (Level of evidence: I to II-2, fair, direct).</span></p><span data-dcnode-id="4905" instrument_node="">
</span><h4 data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">Routine Follow-Up After POP Initiation</span></h4><span data-dcnode-id="4902" instrument_node="">
</span><p data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">These recommendations address when routine follow-up is recommended for safe and effective continued use of contraception for healthy women. The recommendations refer to general situations and might vary for different users and different situations. Specific populations that might benefit from more frequent follow-up visits include adolescents, those with certain medical conditions or characteristics, and those with multiple medical conditions.</span></p><span data-dcnode-id="4899" instrument_node="">
</span><ul data-dcnode-id="4882"><li data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">	Advise a woman to return at any time to discuss side effects or other problems or if she wants to change the method being used. No routine follow-up visit is required.</span></li><span data-dcnode-id="4896" instrument_node="">
</span><li data-dcnode-id="4883"><span data-dcnode-id="4895" instrument_node="">	At other routine visits, health-care providers seeing POP users should do the following:
				</span><ul class="List-2" data-dcnode-id="4884"><span data-dcnode-id="4894" instrument_node="">
</span><li data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">Assess the woman's satisfaction with her contraceptive method and whether she has any concerns about method use.</span></li><span data-dcnode-id="4891" instrument_node="">
</span><li data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Assess any changes in health status, including medications, that would change the appropriateness of  POPs for safe and effective continued use based on U.S. MEC (e.g., category 3 and 4 conditions and characteristics).</span></li><span data-dcnode-id="4888" instrument_node="">
</span><li data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">Consider assessing weight changes and counseling women who are concerned about weight changes perceived to be associated with their contraceptive method.</span></li><span data-dcnode-id="4885" instrument_node="">
</span></ul></li></ul><span data-dcnode-id="4881" instrument_node="">
</span><p data-dcnode-id="4877"><b data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4878" instrument_node=""> No evidence was found regarding whether a routine follow-up visit after initiating POPs improves correct or continued use.</span></p><span data-dcnode-id="4876" instrument_node="">
</span><h4 data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Missed POPs</span></h4><span data-dcnode-id="4873" instrument_node="">
</span><p data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">For the following recommendations, a dose is considered missed if it has been &gt;3 hours since it should have been taken.</span></p><span data-dcnode-id="4870" instrument_node="">
</span><ul data-dcnode-id="4858"><li data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">	Take one pill as soon as possible.</span></li><span data-dcnode-id="4867" instrument_node="">
</span><li data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">	Continue taking pills daily, one each day, at the same time each day, even if it means taking two pills on the same day.</span></li><span data-dcnode-id="4864" instrument_node="">
</span><li data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">	Use back-up contraception (e.g., condoms) or avoid sexual intercourse until pills have been taken correctly, on time, for 2 consecutive days.</span></li><span data-dcnode-id="4861" instrument_node="">
</span><li data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">	Emergency contraception should be considered if the woman has had unprotected sexual intercourse.</span></li></ul><span data-dcnode-id="4857" instrument_node="">
</span><p data-dcnode-id="4844"><b data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4854" instrument_node=""> Inconsistent or incorrect use of oral contraceptive pills is a major reason for oral contraceptive failure. Unlike COCs, POPs inhibit ovulation in about half of cycles, although this rate varies widely by individual (</span><i data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">252</span></i><span data-dcnode-id="4851" instrument_node="">). Peak serum steroid levels are reached about 2 hours after administration, followed by rapid distribution and elimination, such that by 24 hours after administration, serum steroid levels are near baseline (</span><i data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">252</span></i><span data-dcnode-id="4848" instrument_node="">). Therefore, taking POPs at approximately the same time each day is important. An estimated 48 hours of POP use was deemed necessary to achieve the contraceptive effects on cervical mucus (</span><i data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">252</span></i><span data-dcnode-id="4845" instrument_node="">). Women who frequently miss POPs should consider an alternative  contraceptive method that is less dependent on the user to be effective  (e.g., IUD, implant, or injectable). No evidence was found regarding the effects of missed POPs available in the United States on measures of contraceptive effectiveness including pregnancy, follicular development, hormone levels, or cervical mucus quality.</span></p><span data-dcnode-id="4843" instrument_node="">
</span><h4 data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">Vomiting or Severe Diarrhea (for any Reason or Duration) that Occurs Within 3 Hours After Taking a Pill</span></h4><span data-dcnode-id="4840" instrument_node="">
</span><ul data-dcnode-id="4828"><li data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">	Take another pill as soon as possible (if possible, despite discomfort).</span></li><span data-dcnode-id="4837" instrument_node="">
</span><li data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">	Continue taking pills daily, one each day, at the same time each day.</span></li><span data-dcnode-id="4834" instrument_node="">
</span><li data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">	Use back-up contraception (e.g., condoms) or avoid sexual intercourse until 2 days after vomiting or diarrhea has resolved.</span></li><span data-dcnode-id="4831" instrument_node="">
</span><li data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">	Emergency contraception should be considered if the woman has had unprotected sexual intercourse.</span></li></ul><span data-dcnode-id="4827" instrument_node="">
</span><p data-dcnode-id="4823"><b data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4824" instrument_node=""> Theoretically, the contraceptive effectiveness of POPs might be decreased because of vomiting or severe diarrhea.  Because of the lack of evidence to address this question, these recommendations are based on the recommendations for missed POPs. No evidence was found regarding the effects of vomiting or diarrhea on measures of contraceptive effectiveness, including pregnancy, follicular development, hormone levels, or cervical mucus quality.</span></p><span data-dcnode-id="4822" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">Standard Days Method</span></h3><span data-dcnode-id="4819" instrument_node="">
</span><p data-dcnode-id="4811"><span data-dcnode-id="4818" instrument_node="">SDM is a method based on fertility awareness; users must avoid unprotected sexual intercourse on days 8–19 of the menstrual cycle (</span><i data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">253</span></i><span data-dcnode-id="4815" instrument_node="">). Approximately 5 out of 100 women become pregnant in the first year of use with perfect (i.e., correct and consistent) use of SDM (</span><i data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">253</span></i><span data-dcnode-id="4812" instrument_node="">); effectiveness based on typical use is not available for this method but is expected to be lower than that for perfect use. SDM is reversible and can be used by women of all ages. SDM does not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="4810" instrument_node="">
</span><h4 data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">Use of SDM Among Women with Various Menstrual Cycle Durations</span></h4><span data-dcnode-id="4807" instrument_node="">
</span><h4 data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">Menstrual Cycles of 26–32 Days</span></h4><span data-dcnode-id="4804" instrument_node="">
</span><ul data-dcnode-id="4795"><li data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">	These women may use the method.</span></li><span data-dcnode-id="4801" instrument_node="">
</span><li data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">	Provide a barrier method of contraception for protection on days 8–19 if she wants one.</span></li><span data-dcnode-id="4798" instrument_node="">
</span><li data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">	If she has unprotected sexual intercourse during days 8–19, consider the use of emergency contraception if appropriate.</span></li></ul><span data-dcnode-id="4794" instrument_node="">
</span><h4 data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">Two or More Menstrual Cycles of &lt;26 or &gt;32 Days Within Any 1 Year of SDM Use</span></h4><span data-dcnode-id="4791" instrument_node="">
</span><ul data-dcnode-id="4788"><li data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">	Advise the woman that the method might not be appropriate for her because of a higher risk for pregnancy. Help her consider another method.</span></li></ul><span data-dcnode-id="4787" instrument_node="">
</span><p data-dcnode-id="4774"><b data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4784" instrument_node=""> The probability of pregnancy is increased when the menstrual cycle is outside the range of 26–32 days, even if unprotected sexual intercourse is avoided on days 8–19. A study of 7,600 menstrual cycles, including information on cycle length and signs of ovulation, concluded that the theoretical effectiveness of SDM is greatest for women with cycles of 26–32 days, that the method is still effective for women who occasionally have a cycle outside this range, and that it is less effective for women who consistently have cycles outside this range. Information from daily hormonal measurements shows that the timing of the 6-day fertile window varies greatly, even among women with regular cycles (</span><i data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">39</span></i><span data-dcnode-id="4781" instrument_node="">,</span><i data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">254</span></i><span data-dcnode-id="4778" instrument_node="">,</span><i data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">255</span></i><span data-dcnode-id="4775" instrument_node="">).</span></p><span data-dcnode-id="4773" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">Emergency Contraception</span></h3><span data-dcnode-id="4770" instrument_node="">
</span><p data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">Emergency contraception consists of methods that can be used by women after sexual intercourse to prevent pregnancy. Emergency contraception methods have varying ranges of effectiveness depending on the method and timing of administration. Four options are available in the United States: the Cu-IUD and three types of ECPs.</span></p><span data-dcnode-id="4767" instrument_node="">
</span><h4 data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">Types of Emergency Contraception</span></h4><span data-dcnode-id="4764" instrument_node="">
</span><h4 data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">Intrauterine Device</span></h4><span data-dcnode-id="4761" instrument_node="">
</span><ul data-dcnode-id="4758"><li data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">	Cu-IUD</span></li></ul><span data-dcnode-id="4757" instrument_node="">
</span><h4 data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">ECPs</span></h4><span data-dcnode-id="4754" instrument_node="">
</span><ul data-dcnode-id="4739"><li data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">	Ulipristal acetate (UPA) in a single dose (30 mg)</span></li><span data-dcnode-id="4751" instrument_node="">
</span><li data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">	Levonorgestrel in a single dose (1.5 mg) or as a split dose (1 dose of 0.75 mg of levonorgestrel followed by a second dose of 0.75 mg of levonorgestrel 12 hours later)</span></li><span data-dcnode-id="4748" instrument_node="">
</span><li data-dcnode-id="4740"><span data-dcnode-id="4747" instrument_node="">	Combined estrogen and progestin in 2 doses (Yuzpe regimen: 1 dose of 100 </span><i data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">µ</span></i><span data-dcnode-id="4744" instrument_node="">g of ethinyl estradiol plus 0.50 mg of levonorgestrel followed by a second dose of 100 </span><i data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">µ</span></i><span data-dcnode-id="4741" instrument_node="">g of ethinyl estradiol plus 0.50 mg of levonorgestrel 12 hours later)</span></li></ul><span data-dcnode-id="4738" instrument_node="">
</span><h4 data-dcnode-id="4736"><span data-dcnode-id="4737" instrument_node="">Initiation of Emergency Contraception</span></h4><span data-dcnode-id="4735" instrument_node="">
</span><h4 data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">Timing</span></h4><span data-dcnode-id="4732" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="4729"><b data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">Cu-IUD</span></b></p><span data-dcnode-id="4728" instrument_node="">
</span><ul data-dcnode-id="4722"><li data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">	The Cu-IUD can be inserted within 5 days of the first act of unprotected sexual intercourse as an emergency contraceptive.</span></li><span data-dcnode-id="4725" instrument_node="">
</span><li data-dcnode-id="4723"><span data-dcnode-id="4724" instrument_node="">	In addition, when the day of ovulation can be estimated, the Cu-IUD can be inserted beyond 5 days after sexual intercourse, as long as insertion does not occur &gt;5 days after ovulation.</span></li></ul><span data-dcnode-id="4721" instrument_node="">
</span><p class="h5" data-dcnode-id="4718"><b data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">ECPs</span></b></p><span data-dcnode-id="4717" instrument_node="">
</span><ul data-dcnode-id="4714"><li data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">	ECPs should be taken as soon as possible within 5 days of unprotected sexual intercourse.</span></li></ul><span data-dcnode-id="4713" instrument_node="">
</span><p data-dcnode-id="4697"><b data-dcnode-id="4711"><span data-dcnode-id="4712" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4710" instrument_node=""> Cu-IUDs are highly effective as emergency contraception (</span><i data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">256</span></i><span data-dcnode-id="4707" instrument_node="">) and can be continued as regular contraception. UPA and levonorgestrel ECPs have similar effectiveness when taken within 3 days after unprotected sexual intercourse; however, UPA has been shown to be more effective than the levonorgestrel formulation 3–5 days after unprotected sexual intercourse (</span><i data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">257</span></i><span data-dcnode-id="4704" instrument_node="">). The combined estrogen and progestin regimen is less effective than UPA or levonorgestrel and also is associated with more frequent occurrence of side effects (nausea and vomiting) (</span><i data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">258</span></i><span data-dcnode-id="4701" instrument_node="">). The levonorgestrel formulation might be less effective than UPA among obese women (</span><i data-dcnode-id="4699"><span data-dcnode-id="4700" instrument_node="">257</span></i><span data-dcnode-id="4698" instrument_node="">).</span></p><span data-dcnode-id="4696" instrument_node="">
</span><p data-dcnode-id="4679"><span data-dcnode-id="4695" instrument_node="">Two studies of UPA use found consistent decreases in pregnancy rates when administered within 120 hours of unprotected sexual intercourse (</span><i data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">257</span></i><span data-dcnode-id="4692" instrument_node="">,</span><i data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">259</span></i><span data-dcnode-id="4689" instrument_node="">). Five studies found that the levonorgestrel and combined regimens decreased risk for pregnancy through the fifth day after unprotected sexual intercourse; however, rates of pregnancy were slightly higher when ECPs were taken after 3 days (</span><i data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">260</span></i><span data-dcnode-id="4686" instrument_node="">–</span><i data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">264</span></i><span data-dcnode-id="4683" instrument_node="">). A meta-analysis of levonorgestrel ECPs found that pregnancy rates were low when administered within 4 days after unprotected sexual intercourse but increased at 4–5 days (</span><i data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">265</span></i><span data-dcnode-id="4680" instrument_node="">) (Level of evidence: I to II-2, good to poor, direct).</span></p><span data-dcnode-id="4678" instrument_node="">
</span><h4 data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">Advance Provision of ECPs</span></h4><span data-dcnode-id="4675" instrument_node="">
</span><ul data-dcnode-id="4672"><li data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">	An advance supply of ECPs may be provided so that ECPs will be available when needed and can be taken as soon as possible after unprotected sexual intercourse.</span></li></ul><span data-dcnode-id="4671" instrument_node="">
</span><p data-dcnode-id="4664"><b data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4668" instrument_node=""> A systematic review identified 17 studies that reported on safety or effectiveness of advance ECPs in adult or adolescent women (</span><i data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">26</span></i><span data-dcnode-id="4665" instrument_node="">). Any use of ECPs was two to seven times greater among women who received an advance supply of ECPs. However, a summary estimate (relative risk = 0.97; 95% confidence interval = 0.77–1.22) of five randomized controlled trials did not indicate a significant reduction in unintended pregnancies at 12 months with advance provision of ECPs. In the majority of studies among adults or adolescents, patterns of regular contraceptive use, pregnancy rates, and incidence of STDs did not vary between those who received advance ECPs and those who did not. Although available evidence supports the safety of advance provision of ECPs, effectiveness of advance provision of ECPs in reducing pregnancy rates at the population level has not been demonstrated (Level of evidence: I to II-3, good to poor, direct).</span></p><span data-dcnode-id="4663" instrument_node="">
</span><h4 data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">Initiation of Regular Contraception After ECPs</span></h4><span data-dcnode-id="4660" instrument_node="">
</span><h4 data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">UPA</span></h4><span data-dcnode-id="4657" instrument_node="">
</span><ul data-dcnode-id="4648"><li data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">	Any regular contraceptive method can be started immediately after the use of UPA.</span></li><span data-dcnode-id="4654" instrument_node="">
</span><li data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">	The woman needs to abstain from sexual intercourse or use barrier contraception for 14 days or until her next menses, whichever comes first.</span></li><span data-dcnode-id="4651" instrument_node="">
</span><li data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">	Advise the woman to have a pregnancy test if she does not have a withdrawal bleed within 3 weeks.</span></li></ul><span data-dcnode-id="4647" instrument_node="">
</span><h4 data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">Levonorgestrel and Combined Estrogen and Progestin ECPs</span></h4><span data-dcnode-id="4644" instrument_node="">
</span><ul data-dcnode-id="4635"><li data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">	Any regular contraceptive method can be started immediately after the use of levonorgestrel or combined estrogen and progestin ECPs.</span></li><span data-dcnode-id="4641" instrument_node="">
</span><li data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">	The woman needs to abstain from sexual intercourse or use barrier contraception for 7 days.</span></li><span data-dcnode-id="4638" instrument_node="">
</span><li data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">	Advise the woman to have a pregnancy test if she does not have a withdrawal bleed within 3 weeks.</span></li></ul><span data-dcnode-id="4634" instrument_node="">
</span><p data-dcnode-id="4621"><b data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4631" instrument_node=""> Data on when a woman can start regular contraception after ECPs are limited to expert opinion and product labeling (</span><i data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">27</span></i><span data-dcnode-id="4628" instrument_node="">). Theoretically, the effectiveness of systemic hormonal contraception might be decreased when administered concurrently or in close succession because of the antiprogestin properties of UPA (</span><i data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">266</span></i><span data-dcnode-id="4625" instrument_node="">,</span><i data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">267</span></i><span data-dcnode-id="4622" instrument_node="">); these theoretical concerns do not exist for combined estrogen and progestin or levonorgestrel formulations of ECPs. The resumption or initiation of regular hormonal contraception after ECP use involves consideration of the risk for pregnancy if ECPs fail and the risks for unintended pregnancy if contraception initiation is delayed until the subsequent menstrual cycle. If a woman is planning to initiate contraception after the next menstrual period after ECP use, the cycle in which ECPs are used might be shortened, prolonged, or involve unscheduled bleeding.</span></p><span data-dcnode-id="4620" instrument_node="">
</span><h4 data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">Prevention and Management of Nausea and Vomiting with ECP Use</span></h4><span data-dcnode-id="4617" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="4614"><b data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">Nausea and Vomiting</span></b></p><span data-dcnode-id="4613" instrument_node="">
</span><ul data-dcnode-id="4607"><li data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">	Levonorgestrel and UPA ECPs cause less nausea and vomiting than combined estrogen and progestin ECPs.</span></li><span data-dcnode-id="4610" instrument_node="">
</span><li data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">	Routine use of antiemetics before taking ECPs is not recommended. Pretreatment with antiemetics may be considered depending on availability and clinical judgment.</span></li></ul><span data-dcnode-id="4606" instrument_node="">
</span><p class="h5" data-dcnode-id="4603"><b data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">Vomiting Within 3 Hours of Taking ECPs</span></b></p><span data-dcnode-id="4602" instrument_node="">
</span><ul data-dcnode-id="4599"><li data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">	Another dose of ECP should be taken as soon as possible. Use of an antiemetic should be considered.</span></li></ul><span data-dcnode-id="4598" instrument_node="">
</span><p data-dcnode-id="4594"><b data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4595" instrument_node=""> Many women do not experience nausea or vomiting when taking ECPs, and predicting which women will experience nausea or vomiting is difficult. Although routine use of antiemetics before taking ECPs is not recommended, antiemetics are effective in some women and can be offered when appropriate. Health-care providers who are deciding whether to offer antiemetics to women taking ECPs should consider the following: 1) women taking combined estrogen and progestin ECPs are more likely to experience nausea and vomiting than those who take levonorgestrel or UPA ECPs; 2) evidence indicates that antiemetics reduce the occurrence of nausea and vomiting in women taking combined estrogen and progestin ECPs; and 3) women who take antiemetics might experience other side effects from the antiemetics.</span></p><span data-dcnode-id="4593" instrument_node="">
</span><p data-dcnode-id="4564"><span data-dcnode-id="4592" instrument_node="">A systematic review examined incidence of nausea and vomiting with different ECP regimens and effectiveness of antinausea drugs in reducing nausea and vomiting with ECP use (</span><i data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">28</span></i><span data-dcnode-id="4589" instrument_node="">). The levonorgestrel regimen was associated with significantly less nausea than a nonstandard dose of UPA (50 mg) and the standard combined estrogen and progestin regimen (</span><i data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">268</span></i><span data-dcnode-id="4586" instrument_node="">–</span><i data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">270</span></i><span data-dcnode-id="4583" instrument_node="">). Use of the split-dose levonorgestrel showed no differences in nausea and vomiting compared with the single-dose levonorgestrel (</span><i data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">260</span></i><span data-dcnode-id="4580" instrument_node="">,</span><i data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">261</span></i><span data-dcnode-id="4577" instrument_node="">,</span><i data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">263</span></i><span data-dcnode-id="4574" instrument_node="">,</span><i data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">271</span></i><span data-dcnode-id="4571" instrument_node="">) (Level of evidence: I, good-fair, indirect). Two trials of antinausea drugs, meclizine and metoclopramide, taken before combined estrogen and progestin ECPs, reduced the severity of nausea (</span><i data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">272</span></i><span data-dcnode-id="4568" instrument_node="">,</span><i data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">273</span></i><span data-dcnode-id="4565" instrument_node="">). Significantly less vomiting occurred with meclizine but not metoclopramide (Level of evidence: I, good-fair, direct). No direct evidence was found regarding the effects of vomiting after taking ECPs.</span></p><span data-dcnode-id="4563" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">Female Sterilization </span></h3><span data-dcnode-id="4560" instrument_node="">
</span><p data-dcnode-id="4555"><span data-dcnode-id="4559" instrument_node="">Laparoscopic, abdominal, and hysteroscopic methods of female sterilization are available in the United States, and some of these procedures can be performed in an outpatient procedure or office setting. Fewer than 1 out of 100 women become pregnant in the first year after female sterilization (</span><i data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">59</span></i><span data-dcnode-id="4556" instrument_node="">). Because these methods are intended to be irreversible, all women should be appropriately counseled about the permanency of sterilization and the availability of highly effective, long-acting, reversible methods of contraception. Female sterilization does not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="4554" instrument_node="">
</span><h4 data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">When Hysteroscopic Sterilization Is Reliable for Contraception</span></h4><span data-dcnode-id="4551" instrument_node="">
</span><ul data-dcnode-id="4545"><li data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">	Before a woman can rely on hysteroscopic sterilization for contraception, a hysterosalpingogram (HSG) must be performed 3 months after the sterilization procedure to confirm bilateral tubal occlusion. </span></li><span data-dcnode-id="4548" instrument_node="">
</span><li data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">	The woman should be advised that she needs to abstain from sexual intercourse or use additional contraceptive protection until she has confirmed bilateral tubal occlusion.</span></li></ul><span data-dcnode-id="4544" instrument_node="">
</span><h4 data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">When Laparoscopic and Abdominal Approches Are Reliable for Contraception</span></h4><span data-dcnode-id="4541" instrument_node="">
</span><ul data-dcnode-id="4538"><li data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">	A woman can rely on sterilization for contraception immediately after laparoscopic and abdominal approaches. No additional contraceptive protection is needed.</span></li></ul><span data-dcnode-id="4537" instrument_node="">
</span><p data-dcnode-id="4533"><b data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4534" instrument_node=""> HSG confirmation is necessary to confirm bilateral tubal occlusion after hysteroscopic sterilization. The inserts for the hysteroscopic sterilization system available in the United States are placed bilaterally into the fallopian tubes and require 3 months for adequate fibrosis and scarring leading to bilateral tubal occlusion. After hysteroscopic sterilization, advise the woman to correctly and consistently use an effective method of contraception while awaiting confirmation. If compliance with another method might be a problem, a woman and her health-care provider may consider DMPA injection at the time of sterilization to ensure adequate contraception for 3 months. Unlike laparoscopic and abdominal sterilizations, pregnancy risk beyond 7 years of follow-up has not been studied among women who received  hysteroscopic sterilization.</span></p><span data-dcnode-id="4532" instrument_node="">
</span><p data-dcnode-id="4518"><span data-dcnode-id="4531" instrument_node="">Pregnancy risk with at least 10 years of follow-up has been studied among women who received laparoscopic and abdominal sterilizations (</span><i data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">274</span></i><span data-dcnode-id="4528" instrument_node="">,</span><i data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">275</span></i><span data-dcnode-id="4525" instrument_node="">). Although these methods are highly effective, pregnancies can occur many years after the procedure, and the risk for pregnancy is higher among younger women (</span><i data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">274</span></i><span data-dcnode-id="4522" instrument_node="">,</span><i data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">276</span></i><span data-dcnode-id="4519" instrument_node="">).</span></p><span data-dcnode-id="4517" instrument_node="">
