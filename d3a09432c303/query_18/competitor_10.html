</span><p data-dcnode-id="4476"><span data-dcnode-id="4516" instrument_node="">A systematic review was conducted to identify studies that reported whether pregnancies occurred after hysteroscopic sterilization (</span><i data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">29</span></i><span data-dcnode-id="4513" instrument_node="">). Twenty-four studies were identified that reported whether pregnancies occurred after hysteroscopic sterilization and found that very few pregnancies occurred among women with confirmed bilateral tubal occlusion; however, few studies include long-term follow-up, and none with follow-up for &gt;7 years. Among women who had successful bilateral placement, most pregnancies that occurred after hysteroscopic sterilization were in women who did not have confirmed bilateral tubal occlusion at 3 months, either because of lack of follow up or misinterpretation of HSG results (</span><i data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">277</span></i><span data-dcnode-id="4510" instrument_node="">–</span><i data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">279</span></i><span data-dcnode-id="4507" instrument_node="">). Some pregnancies occurred within 3 months of placement, including among women who were already pregnant at the time of the procedure, women who did not use alternative contraception, or women who had failures of alternative contraception (</span><i data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">277</span></i><span data-dcnode-id="4504" instrument_node="">,</span><i data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">278</span></i><span data-dcnode-id="4501" instrument_node="">,</span><i data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">280</span></i><span data-dcnode-id="4498" instrument_node="">–</span><i data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">283</span></i><span data-dcnode-id="4495" instrument_node="">). Although these studies generally demonstrated high rates of bilateral placement, some pregnancies occurred as a result of lack of bilateral placement identified on later imaging (</span><i data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">277</span></i><span data-dcnode-id="4492" instrument_node="">,</span><i data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">278</span></i><span data-dcnode-id="4489" instrument_node="">,</span><i data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">280</span></i><span data-dcnode-id="4486" instrument_node="">,</span><i data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">281</span></i><span data-dcnode-id="4483" instrument_node="">,</span><i data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">283</span></i><span data-dcnode-id="4480" instrument_node="">,</span><i data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">284</span></i><span data-dcnode-id="4477" instrument_node="">). Most pregnancies occurred after deviations from FDA directions, which include placement in the early follicular phase of the menstrual cycle, imaging at 3 months to document proper placement, and use of effective alternative contraception until documented occlusion (Level of evidence: II-3, fair, direct).</span></p><span data-dcnode-id="4475" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">Male Sterilization </span></h3><span data-dcnode-id="4472" instrument_node="">
</span><p data-dcnode-id="4467"><span data-dcnode-id="4471" instrument_node="">Male sterilization, or vasectomy, is one of the few contraceptive methods available to men and can be performed in an outpatient procedure or office setting. Fewer than 1 woman out of 100 becomes pregnant in the first year after her male partner undergoes sterilization (</span><i data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">59</span></i><span data-dcnode-id="4468" instrument_node="">). Because male sterilization is intended to be irreversible, all men should be appropriately counseled about the permanency of sterilization and the availability of highly effective, long-acting, reversible methods of contraception for women. Male sterilization does not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="4466" instrument_node="">
</span><h4 data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">When Vasectomy Is Reliable for Contraception</span></h4><span data-dcnode-id="4463" instrument_node="">
</span><ul data-dcnode-id="4457"><li data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">	A semen analysis should be performed 8–16 weeks after a vasectomy to ensure the procedure was successful.</span></li><span data-dcnode-id="4460" instrument_node="">
</span><li data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">	The man should be advised that he should use additional contraceptive protection or abstain from sexual intercourse until he has confirmation of vasectomy success by postvasectomy semen analysis.</span></li></ul><span data-dcnode-id="4456" instrument_node="">
</span><h4 data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">Other Postprocedure Recommendations</span></h4><span data-dcnode-id="4453" instrument_node="">
</span><ul data-dcnode-id="4450"><li data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">	The man should refrain from ejaculation for approximately 1 week after the vasectomy to allow for healing of surgical sites and, after certain methods of vasectomy, occlusion of the vas.</span></li></ul><span data-dcnode-id="4449" instrument_node="">
</span><p data-dcnode-id="4433"><b data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4446" instrument_node=""> The Vasectomy Guideline Panel of the American Urological Association performed a systematic review of key issues concerning the practice of vasectomy (</span><i data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">285</span></i><span data-dcnode-id="4443" instrument_node="">). All English-language publications on vasectomy published during 1949–2011 were reviewed. For more information, see the American Urological Association </span><i data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">Vasectomy Guidelines</span></i><span data-dcnode-id="4440" instrument_node=""> (available at </span><span class="cdc-decorated" data-dcnode-id="4435"><a class="external" data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.auanet.org/education/vasectomy.cfm"><span data-dcnode-id="4439" instrument_node="">http://www.auanet.org/education/vasectomy.cfm</span></a><a class="external" data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cdc.gov/Other/disclaimer.html" target="_blank"><img alt="External Web Site Icon" class="externalImg" data-dcnode-id="4437" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/TemplatePackage/images/icon_out.png&amp;raw" title="External Web Site Icon"></a></span><span data-dcnode-id="4434" instrument_node="">).</span></p><span data-dcnode-id="4432" instrument_node="">
</span><p data-dcnode-id="4412"><span data-dcnode-id="4431" instrument_node="">Motile sperm disappear within a few weeks after vasectomy (</span><i data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">286</span></i><span data-dcnode-id="4428" instrument_node="">–</span><i data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">289</span></i><span data-dcnode-id="4425" instrument_node="">). The time to azoospermia varies widely in different studies; however, by 12 weeks after the vasectomy, 80% of men have azoospermia, and almost all others have rare nonmotile sperm (defined as ≤100,000 nonmotile sperm per milliliter) (</span><i data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">285</span></i><span data-dcnode-id="4422" instrument_node="">). The number of ejaculations after vasectomy is not a reliable indicator of when azoospermia or rare nonmotile sperm will be achieved (</span><i data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">285</span></i><span data-dcnode-id="4419" instrument_node="">). Once azoospermia or rare nonmotile sperm has been achieved, patients can rely on the vasectomy for contraception, although not with 100% certainty. The risk for pregnancy after a man has achieved postvasectomy azoospermia is approximately one in 2,000 (</span><i data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">290</span></i><span data-dcnode-id="4416" instrument_node="">–</span><i data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">294</span></i><span data-dcnode-id="4413" instrument_node="">).</span></p><span data-dcnode-id="4411" instrument_node="">
</span><p data-dcnode-id="4394"><span data-dcnode-id="4410" instrument_node="">A median of 78% (range 33%–100%) of men return for a single postvasectomy semen analysis (</span><i data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">285</span></i><span data-dcnode-id="4407" instrument_node="">). In the largest cohorts that appear typical of North American vasectomy practice, approximately two thirds of men (55%–71%) return for at least one postvasectomy semen analysis (</span><i data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">291</span></i><span data-dcnode-id="4404" instrument_node="">,</span><i data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">295</span></i><span data-dcnode-id="4401" instrument_node="">–</span><i data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node="">299</span></i><span data-dcnode-id="4398" instrument_node="">). Assigning men an appointment after their vasectomy might improve compliance with follow-up (</span><i data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">300</span></i><span data-dcnode-id="4395" instrument_node="">).</span></p><span data-dcnode-id="4393" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">When Women Can Stop Using Contraceptives</span></h3><span data-dcnode-id="4390" instrument_node="">
</span><ul data-dcnode-id="4387"><li data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">	Contraceptive protection is still needed for women aged &gt;44 years if the woman wants to avoid pregnancy.</span></li></ul><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4361"><b data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="4383" instrument_node=""> The age at which a woman is no longer at risk for pregnancy is not known. Although uncommon, spontaneous pregnancies occur among women aged &gt;44 years. Both the American College of Obstetricians and Gynecologists and the North American Menopause Society recommend that women continue contraceptive use until menopause or age 50–55 years (</span><i data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">301</span></i><span data-dcnode-id="4380" instrument_node="">,</span><i data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">302</span></i><span data-dcnode-id="4377" instrument_node="">). The median age of menopause is approximately 51 years in North America (</span><i data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">301</span></i><span data-dcnode-id="4374" instrument_node="">) but can vary from ages 40 to 60 years (</span><i data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">303</span></i><span data-dcnode-id="4371" instrument_node="">). The median age of definitive loss of natural fertility is 41 years but can range up to age 51 years (</span><i data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">304</span></i><span data-dcnode-id="4368" instrument_node="">,</span><i data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">305</span></i><span data-dcnode-id="4365" instrument_node="">). No reliable laboratory tests are available to confirm definitive loss of fertility in a woman. The assessment of follicle-stimulating hormone levels to determine when a woman is no longer fertile might not be accurate (</span><i data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">301</span></i><span data-dcnode-id="4362" instrument_node="">).</span></p><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4344"><span data-dcnode-id="4359" instrument_node="">Health-care providers should consider the risks for becoming pregnant in a woman of advanced reproductive age, as well as any risks of continuing contraception until menopause. Pregnancies among women of advanced reproductive age are at higher risk for maternal complications, such as hemorrhage, venous thromboembolism, and death, and fetal complications, such as spontaneous abortion, stillbirth, and congenital anomalies (</span><i data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">306</span></i><span data-dcnode-id="4356" instrument_node="">–</span><i data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">308</span></i><span data-dcnode-id="4353" instrument_node="">). Risks associated with continuing contraception, in particular risks for acute cardiovascular events (venous thromboembolism, myocardial infarction, or stroke) or breast cancer, also are important to consider. U.S. MEC states that on the basis of age alone, women aged &gt;45 years can use POPs, implants, the LNG-IUD, or the Cu-IUD (U.S. MEC 1) (</span><i data-dcnode-id="4350"><a data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="4352" instrument_node="">5</span></a></i><span data-dcnode-id="4349" instrument_node="">). Women aged &gt;45 years generally can use combined hormonal contraceptives and DMPA (U.S. MEC 2) (</span><i data-dcnode-id="4346"><a data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="4348" instrument_node="">5</span></a></i><span data-dcnode-id="4345" instrument_node="">). However, women in this age group might have chronic conditions or other risk factors that might render use of hormonal contraceptive methods unsafe; U.S. MEC might be helpful in guiding the safe use of contraceptives in these women.</span></p><span data-dcnode-id="4343" instrument_node="">
</span><p data-dcnode-id="4320"><span data-dcnode-id="4342" instrument_node="">The incidence of venous thromboembolism was higher among oral contraceptive users aged ≥45 years compared with younger oral contraceptive users in two studies (</span><i data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">309</span></i><span data-dcnode-id="4339" instrument_node="">–</span><i data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">311</span></i><span data-dcnode-id="4336" instrument_node="">); however, an interaction between hormonal contraception and increased age compared with baseline risk was not demonstrated (</span><i data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">309</span></i><span data-dcnode-id="4333" instrument_node="">,</span><i data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">310</span></i><span data-dcnode-id="4330" instrument_node="">) or was not examined (</span><i data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">311</span></i><span data-dcnode-id="4327" instrument_node="">). The relative risk for myocardial infarction was higher among all oral contraceptive users than in nonusers, although a trend of increased relative risk with increasing age was not demonstrated (</span><i data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">312</span></i><span data-dcnode-id="4324" instrument_node="">,</span><i data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">313</span></i><span data-dcnode-id="4321" instrument_node="">). No studies were found regarding the risk for stroke in COC users aged ≥45 years (Level of evidence: II-2, good to poor, direct).</span></p><span data-dcnode-id="4319" instrument_node="">
</span><p data-dcnode-id="4311"><span data-dcnode-id="4318" instrument_node="">A pooled analysis by the Collaborative Group on Hormonal Factors and Breast Cancer in 1996 (</span><i data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">314</span></i><span data-dcnode-id="4315" instrument_node="">) found small increased relative risks for breast cancer among women aged ≥45 years whose last use of combined hormonal contraceptives was &lt;5 years previously and for those whose last use was 5–9 years previously. Seven more recent studies suggested small but nonsignificant increased relative risks for breast carcinoma in situ or breast cancer among women who had used oral contraceptives or DMPA when they were aged ≥40 years compared with those who had never used either method (</span><i data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">315–321</span></i><span data-dcnode-id="4312" instrument_node="">) (Level of evidence: II-2, fair, direct).</span></p><span data-dcnode-id="4310" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Conclusion</span></h3><span data-dcnode-id="4307" instrument_node="">
</span><p data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">Women, men, and couples have increasing numbers of safe and effective choices for contraceptive methods, including LARC methods such as IUDs and implants, to reduce the risk for unintended pregnancy. However, with these expanded options comes the need for evidence-based guidance to help health-care providers offer quality family planning care to their patients, including choosing the most appropriate contraceptive method for individual circumstances and using that method correctly, consistently, and continuously to maximize effectiveness. Removing unnecessary barriers can help patients access and successfully use contraceptive methods. Several medical barriers to initiating and continuing contraceptive methods might exist, such as unnecessary screening examinations and tests before starting the method (e.g., a pelvic examination before initiation of COCs), inability to receive the contraceptive on the same day as the visit (e.g., waiting for test results that might not be needed or waiting until the woman's next menstrual period to start use), and difficulty obtaining continued contraceptive supplies (e.g., restrictions on number of pill packs dispensed at one time). Removing unnecessary steps, such as providing prophylactic antibiotics at the time of IUD insertion or requiring unnecessary follow-up procedures, also can help patients access and successfully use contraception.</span></p><span data-dcnode-id="4304" instrument_node="">
</span><p data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">Most women can start most contraceptive methods at any time, and few examinations or tests, if any, are needed before starting a contraceptive method. Routine follow-up for most women includes assessment of her satisfaction with the contraceptive method, concerns about method use, and changes in health status or medications that could affect medical eligibility for continued use of the method. Because changes in bleeding patterns are one of the major reasons for discontinuation of contraception, recommendations are provided for the management of bleeding irregularities with various contraceptive methods. In addition, because women and health-care providers can be confused about the procedures for missed pills and dosing errors with the contraceptive patch and ring, the instructions are streamlined for easier use. ECPs and emergency use of the Cu-IUD are important options for women, and recommendations on using these methods, as well as starting regular contraception after use of emergency contraception, are provided. Male and female sterilization are highly effective methods of contraception for men, women, and couples who have completed childbearing; for men undergoing vasectomy and women undergoing a hysteroscopic sterilization procedure, additional contraceptive protection is needed until the success of the procedure can be confirmed.</span></p><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4296"><span data-dcnode-id="4300" instrument_node="">CDC is committed to working with partners at the federal, national, and local levels to disseminate, implement, and evaluate the recommendations in U.S. SPR so that the information reaches health-care providers. Strategies for dissemination and implementation include collaborating with other federal agencies and professional and service organizations to widely distribute the recommendations through presentations, electronic distribution, newsletters, and other publications; development of provider tools and job aids to assist providers in implementing the new recommendations; and training activities for students, as well as for continuing education. CDC will conduct a survey of family planning health-care providers before and after release of this report to assess attitudes and practices related to contraceptive use. Results from this survey will assist CDC in evaluating the impact of these recommendations on the provision of contraceptives in the United States. Finally, CDC will continually monitor new scientific evidence and will update these recommendations as warranted by new evidence. Updates to the recommendations, as well as provider tools and other resources, are available on the CDC U.S. SPR website (</span><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cdc.gov/reproductivehealth/UnintendedPregnancy/USSPR.htm"><span data-dcnode-id="4299" instrument_node="">http://www.cdc.gov/reproductivehealth/UnintendedPregnancy/USSPR.htm</span></a><span data-dcnode-id="4297" instrument_node="">).</span></p><span data-dcnode-id="4295" instrument_node="">
</span><h3 data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">Acknowledgment</span></h3><span data-dcnode-id="4292" instrument_node="">

</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">	*	Among typical couples who initiate use of a method (not necessarily for the first time), the percentage who experience an accidental pregnancy during the first year if they do not stop use for any other reason. Estimates of the probability of pregnancy during the first year of typical use for spermicides and the diaphragm are taken from the 1995 National Survey of Family Growth (NSFG) corrected for underreporting of abortion; estimates for fertility awareness-based methods, withdrawal, the male condom, the pill and Depo-Provera are taken from the 1995 and 2002 NSFG corrected for underreporting of abortion. </span></p><span data-dcnode-id="2401" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2397"><span class="superscript" data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">	†	</span></span><span data-dcnode-id="2398" instrument_node="">Among couples who initiate use of a method (not necessarily for the first time) and who use it perfectly (both consistently and correctly), the percentage who experience an accidental pregnancy during the first year if they do not stop use for any other reason. </span></p><span data-dcnode-id="2396" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2392"><span class="superscript" data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">	§	</span></span><span data-dcnode-id="2393" instrument_node="">Among couples attempting to avoid pregnancy, the percentage who continues to use a method for 1 year.  </span></p><span data-dcnode-id="2391" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2387"><span class="superscript" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">	¶	</span></span><span data-dcnode-id="2388" instrument_node="">The percentage becoming pregnant in the second and third columns are based on data from populations where contraception is not used and from women who cease using contraception to become pregnant. Among such populations, approximately 89% become pregnant within 1 year. This estimate was lowered slightly (to 85%) to represent the percentage who would become pregnant within 1 year among women not relying on reversible methods of contraception if they abandoned contraception altogether.</span></p><span data-dcnode-id="2386" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">	**	Foams, creams, gels, vaginal suppositories, and vaginal film.</span></p><span data-dcnode-id="2383" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2379"><span class="superscript" data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">	††	</span></span><span data-dcnode-id="2380" instrument_node="">The ovulation and two day methods are based on evaluation of cervical mucus. The standard days method avoids intercourse on cycle days 8–19. The symptothermal method is a double-check method based on evaluation of cervical mucus to determine the first fertile day and evaluation of cervical mucus and temperature to determine the last fertile day.</span></p><span data-dcnode-id="2378" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2374"><span class="superscript" data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">	§§</span></span><span data-dcnode-id="2375" instrument_node="">	Without spermicides.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">	***	With spermicidal cream or jelly.</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-3" data-dcnode-id="2366"><span class="superscript" data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">	†††</span></span><span data-dcnode-id="2367" instrument_node="">	This is a highly effective, temporary method of contraception. However, to maintain in effective protection against pregnancy, another method of contraception must be used as soon as menstruation resumes, the frequency of duration of breastfeeds is reduced, bottle feeds are introduced, or the baby reaches age 6 months.</span></p><span data-dcnode-id="2365" instrument_node="">

</span><p class="title" data-dcnode-id="2313"><b data-dcnode-id="2314"><a data-dcnode-id="2316" name="Box1"></a><span data-dcnode-id="2315" instrument_node="">BOX 1. How To Be Reasonably Certain that a Woman Is Not Pregnant</span></b></p><span data-dcnode-id="2312" instrument_node="">
</span></td></tr><tr data-dcnode-id="2272"><td class="box-body-text" data-dcnode-id="2274" scope="row"><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">A health-care provider can be reasonably certain that a woman is not pregnant if she has no symptoms or signs of pregnancy and meets any one of the following criteria:</span></p><span data-dcnode-id="2303" instrument_node="">
</span><ul data-dcnode-id="2283"><span data-dcnode-id="2302" instrument_node="">
</span><li class="bullet-in-a-box" data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">is ≤7 days after the start of normal menses</span></li><span data-dcnode-id="2299" instrument_node="">
</span><li class="bullet-in-a-box" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">has not had sexual intercourse since the start of last normal menses</span></li><span data-dcnode-id="2296" instrument_node="">
</span><li class="bullet-in-a-box" data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">has been correctly and consistently using a reliable method of contraception</span></li><span data-dcnode-id="2293" instrument_node="">
</span><li class="bullet-in-a-box" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">is ≤7 days after spontaneous or induced abortion</span></li><span data-dcnode-id="2290" instrument_node="">
</span><li class="bullet-in-a-box" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">is within 4 weeks postpartum	</span></li><span data-dcnode-id="2287" instrument_node="">
</span><li class="bullet-in-a-box" data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">is fully or nearly fully breastfeeding (exclusively breastfeeding or the vast majority [≥85%] of feeds are breastfeeds),* amenorrheic, and &lt;6 months postpartum</span></li><span data-dcnode-id="2284" instrument_node="">
</span></ul><span data-dcnode-id="2282" instrument_node="">
</span><p class="Basic-Paragraph" data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">
</span></p><p class="footnote-w-rule-text-indent-1" data-dcnode-id="2276"><b data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">*	Source:</span></b><span data-dcnode-id="2277" instrument_node=""> Labbok M, Perez A, Valdez V, et al. The Lactational Amenorrhea Method (LAM): a postpartum introductory family planning method with policy and program implications. Adv Contracept 1994;10:93–109.</span></p><span data-dcnode-id="2275" instrument_node="">

</span><p class="title" data-dcnode-id="2255"><b data-dcnode-id="2256"><a data-dcnode-id="2258" name="Box2"></a><span data-dcnode-id="2257" instrument_node="">BOX 2. Categories of medical eligibility criteria for contraceptive use</span></b></p><span data-dcnode-id="2254" instrument_node="">
</span></td></tr><tr data-dcnode-id="2218"><td class="box-body-text" data-dcnode-id="2220" scope="row"><span data-dcnode-id="2248" instrument_node="">

</span><p class="x8pt-footnote-supports-indent-1" data-dcnode-id="1841"><b data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">*</span></b><span data-dcnode-id="1853" instrument_node=""> </span><b data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Class A:</span></b><span data-dcnode-id="1850" instrument_node=""> essential and mandatory in all circumstances for safe and effective use of the contraceptive method. </span><b data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Class B:</span></b><span data-dcnode-id="1847" instrument_node=""> contributes substantially to safe and effective use, but implementation may be considered within the public health and/or service context; the risk of not performing an examination or test should be balanced against the benefits of making the contraceptive method available. </span><b data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Class C:</span></b><b data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node=""> </span></b><span data-dcnode-id="1842" instrument_node="">does not contribute substantially to safe and effective use of the contraceptive method.</span></p><span data-dcnode-id="1840" instrument_node="">

</span><p class="x8pt-footnote-supports-indent-1" data-dcnode-id="574"><b data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">*</span></b><span data-dcnode-id="586" instrument_node=""> </span><b data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Class A:</span></b><span data-dcnode-id="583" instrument_node=""> essential and mandatory in all circumstances for safe and effective use of the contraceptive method. </span><b data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Class B:</span></b><span data-dcnode-id="580" instrument_node=""> contributes substantially to safe and effective use, but implementation may be considered within the public health and/or service context; the risk of not performing an examination or test should be balanced against the benefits of making the contraceptive method available. </span><b data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Class C:</span></b><b data-dcnode-id="576"><span data-dcnode-id="577" instrument_node=""> </span></b><span data-dcnode-id="575" instrument_node="">does not contribute substantially to safe and effective use of the contraceptive method.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p class="x8pt-footnote-supports-indent-1" data-dcnode-id="566"><span class="superscript" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">†</span></span><span data-dcnode-id="570" instrument_node="">	Weight (BMI) measurement is not needed to determine medical eligibility for any methods of contraception because all methods can be used (U.S. MEC 1) or generally can be used (U.S. MEC 2) among obese women (</span><a data-dcnode-id="568" href="#Box2"><span data-dcnode-id="569" instrument_node="">Box 2</span></a><span data-dcnode-id="567" instrument_node="">). However, measuring weight and calculating BMI at baseline might be helpful for monitoring any changes and counseling women who might be concerned about weight change perceived to be associated with their contraceptive method. </span></p><span data-dcnode-id="565" instrument_node="">
