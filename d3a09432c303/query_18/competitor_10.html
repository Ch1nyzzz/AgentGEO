</span><h1 data-dcnode-id="8015"><span data-dcnode-id="8016" instrument_node="">U.S. Selected Practice Recommendations for Contraceptive Use, 2013: Adapted from the World Health Organization Selected Practice Recommendations for Contraceptive Use, 2nd Edition</span></h1><span data-dcnode-id="8014" instrument_node="">
</span><div data-dcnode-id="8001"><span data-dcnode-id="8012" instrument_node="">
</span><i data-dcnode-id="8007"><h2 data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">Recommendations and Reports</span></h2></i><strong data-dcnode-id="8005"><span data-dcnode-id="8006" instrument_node="">June 21, 2013 / 62(RR05);1-46</span></strong><br data-dcnode-id="8004"><br data-dcnode-id="8003"><span data-dcnode-id="8002" instrument_node="">
</span></div><span data-dcnode-id="8000" instrument_node="">
</span><p class="author-name" data-dcnode-id="7998"><span data-dcnode-id="7999" instrument_node="">Prepared by</span></p><span data-dcnode-id="7997" instrument_node="">
</span><p class="author-affil" data-dcnode-id="7994"><i data-dcnode-id="7995"><span data-dcnode-id="7996" instrument_node="">Division of Reproductive Health, National Center for Chronic Disease Prevention and Health Promotion</span></i></p><span data-dcnode-id="7993" instrument_node="">
</span><br data-dcnode-id="7992"><div class="box-1-col-no-fill-w-border" data-dcnode-id="7978"><span data-dcnode-id="7991" instrument_node="">
</span><p class="corres-preparer" data-dcnode-id="7988"><b data-dcnode-id="7989"><span data-dcnode-id="7990" instrument_node="">The material in this report originated in the National Center for Chronic Disease Prevention and Health Promotion, Ursula Bauer, PhD, Director; Division of Reproductive Health, Wanda Barfield, MD, Director.</span></b></p><span data-dcnode-id="7987" instrument_node="">
</span><p class="corres-preparer" data-dcnode-id="7980"><b data-dcnode-id="7985"><span data-dcnode-id="7986" instrument_node="">Corresponding preparer:</span></b><span data-dcnode-id="7984" instrument_node=""> Kathryn M. Curtis, PhD, Division of Reproductive Health. Telephone: 770-488-5200; E-mail: </span><a data-dcnode-id="7982" href="mailto:kmc6@cdc.gov"><span data-dcnode-id="7983" instrument_node="">kmc6@cdc.gov</span></a><span data-dcnode-id="7981" instrument_node="">.</span></p><span data-dcnode-id="7979" instrument_node="">
</span></div><span data-dcnode-id="7977" instrument_node="">
</span><br data-dcnode-id="7976"><p class="summary-title" data-dcnode-id="7973"><b data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node="">Summary</span></b></p><span data-dcnode-id="7972" instrument_node="">
</span><p data-dcnode-id="7963"><i data-dcnode-id="7970"><span data-dcnode-id="7971" instrument_node="">The </span></i><span data-dcnode-id="7969" instrument_node="">U. S. Selected Practice Recommendations for Contraceptive Use 2013</span><i data-dcnode-id="7967"><span data-dcnode-id="7968" instrument_node=""> (U.S. SPR), comprises recommendations that address a select group of common, yet sometimes controversial or complex, issues regarding initiation and use of specific contraceptive methods. These recommendations are a companion document to the previously published CDC recommendations </span></i><span data-dcnode-id="7966" instrument_node="">U.S. Medical Eligibility Criteria for Contraceptive Use, 2010</span><i data-dcnode-id="7964"><span data-dcnode-id="7965" instrument_node=""> (U.S. MEC). U.S. MEC describes who can use various methods of contraception, whereas this report describes how contraceptive methods can be used. CDC based these U.S. SPR guidelines on the global family planning guidance provided by the World Health Organization (WHO). Although many of the recommendations are the same as those provided by WHO, they have been adapted to be more specific to U.S. practices or have been modified because of new evidence. In addition, four new topics are addressed, including the effectiveness of female sterilization, extended use of combined hormonal methods and bleeding problems, starting regular contraception after use of emergency contraception, and determining when contraception is no longer needed. The recommendations in this report are intended to serve as a source of clinical guidance for health-care providers; health-care providers should always consider the individual clinical circumstances of each person seeking family planning services. This report is not intended to be a substitute for professional medical advice for individual patients. Persons should seek advice from their health-care providers when considering family planning options.</span></i></p><span data-dcnode-id="7962" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7960"><span data-dcnode-id="7961" instrument_node="">Introduction</span></h3><span data-dcnode-id="7959" instrument_node="">
</span><p data-dcnode-id="7932"><span data-dcnode-id="7958" instrument_node="">Unintended pregnancy rates remain high in the United States; approximately 50% of all pregnancies are unintended, with higher proportions among adolescent and young women, women who are racial/ethnic minorities, and women with lower levels of education and income (</span><i data-dcnode-id="7956"><span data-dcnode-id="7957" instrument_node="">1</span></i><span data-dcnode-id="7955" instrument_node="">). Unintended pregnancies increase the risk for poor maternal and infant outcomes (</span><i data-dcnode-id="7953"><span data-dcnode-id="7954" instrument_node="">2</span></i><span data-dcnode-id="7952" instrument_node="">) and in 2002, resulted in $5 billion in direct medical costs in the United States (</span><i data-dcnode-id="7950"><span data-dcnode-id="7951" instrument_node="">3</span></i><span data-dcnode-id="7949" instrument_node="">). Approximately half of unintended pregnancies are among women who were not using contraception at the time they became pregnant; the other half are among women who became pregnant despite reported use of contraception (</span><i data-dcnode-id="7947"><span data-dcnode-id="7948" instrument_node="">4</span></i><span data-dcnode-id="7946" instrument_node="">). Therefore, strategies to prevent unintended pregnancy include assisting women at risk for unintended pregnancy and their partners with choosing appropriate contraceptive methods and helping women use methods correctly and consistently to prevent pregnancy. In 2010, CDC first adapted global guidance from the World Health Organization (WHO) to help health-care providers counsel women, men, and couples about contraceptive method choice. The </span><i data-dcnode-id="7944"><span data-dcnode-id="7945" instrument_node="">U.S. Medical Eligibility Criteria for Contraceptive Use, 2010</span></i><span data-dcnode-id="7943" instrument_node=""> (U.S. MEC), focuses on who can safely use specific methods of contraception and provides recommendations for the safety of contraceptive methods for women with various medical conditions (e.g., hypertension and diabetes) and characteristics (e.g., age, parity, and smoking status) (</span><a data-dcnode-id="7941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr6205a2.htm%3Fs_cid%3Drr6205a2_w"><span data-dcnode-id="7942" instrument_node="">Appendix A</span></a><span data-dcnode-id="7940" instrument_node="">) (</span><i data-dcnode-id="7937"><a data-dcnode-id="7938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7939" instrument_node="">5</span></a></i><span data-dcnode-id="7936" instrument_node="">). The recommendations in this new guide, </span><i data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">U.S. Selected Practice Recommendations for Contraceptive Use, 2013</span></i><span data-dcnode-id="7933" instrument_node=""> (U.S. SPR), focuses on how contraceptive methods can be used and provides recommendations on optimal use of contraceptive methods for persons of all ages, including adolescents.</span></p><span data-dcnode-id="7931" instrument_node="">
</span><p data-dcnode-id="7911"><span data-dcnode-id="7930" instrument_node="">During the past 15 years, CDC has contributed to the development and updating of the WHO global family planning guidance. CDC has supported WHO by coordinating the identification, critical appraisal, and synthesis of the scientific evidence on which the WHO guidance is based. In 2002, WHO published the first edition of the </span><i data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">Selected Practice Recommendations for Contraceptive Use</span></i><span data-dcnode-id="7927" instrument_node=""> (WHO SPR), which presented evidence-based global guidance on how to use contraceptive methods safely and effectively once they are deemed to be medically appropriate. Since then, WHO has regularly updated its guidance on the basis of new evidence, and the document is now in its second edition (</span><i data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">6</span></i><span data-dcnode-id="7924" instrument_node="">), with an additional update in 2008 (</span><i data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">7</span></i><span data-dcnode-id="7921" instrument_node="">). The WHO global guidance is not intended for use directly by health-care providers; rather, WHO intends for the guidance to be used by local or national policy makers, family planning program managers, and the scientific community as a reference when they develop family planning guidance at the country or program level (</span><i data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">6</span></i><span data-dcnode-id="7918" instrument_node="">). For example, the United Kingdom adapted WHO SPR and in 2002 published the </span><i data-dcnode-id="7916"><span data-dcnode-id="7917" instrument_node="">U.K. Selected Practice Recommendations for Contraceptive Use</span></i><span data-dcnode-id="7915" instrument_node=""> for use by U.K. health-care providers (</span><i data-dcnode-id="7913"><span data-dcnode-id="7914" instrument_node="">8</span></i><span data-dcnode-id="7912" instrument_node="">).</span></p><span data-dcnode-id="7910" instrument_node="">
</span><p data-dcnode-id="7902"><span data-dcnode-id="7909" instrument_node="">CDC initiated a formal adaptation process to create U.S. SPR, using both the second edition of WHO SPR (</span><i data-dcnode-id="7907"><span data-dcnode-id="7908" instrument_node="">6</span></i><span data-dcnode-id="7906" instrument_node="">) and the 2008 update (</span><i data-dcnode-id="7904"><span data-dcnode-id="7905" instrument_node="">7</span></i><span data-dcnode-id="7903" instrument_node="">) as the basis for the U.S. version. Although much of the guidance is the same as the WHO guidance, the recommendations are specific to U.S. family planning practice. In addition, guidance on contraceptive methods not available in the United States has been removed, and four new topics for guidance have been added (the effectiveness of female sterilization, extended use of combined hormonal methods and bleeding problems, starting regular contraception after use of emergency contraception, and determining when contraception is no longer needed). This document contains recommendations for health-care providers for the safe and effective use of contraceptive methods and addresses provision of contraceptive methods and management of side effects and other problems with contraceptive method use. Although the term woman is used throughout this report, these recommendations refer to all females of reproductive age, including adolescents. Adolescents are identified throughout this document as a special population that might benefit from more frequent follow-up. These recommendations are meant to serve as a source of clinical guidance for health-care providers; health-care providers should always consider the individual clinical circumstances of each person seeking family planning services. This report is not intended to be a substitute for professional medical advice for individual patients; persons should seek advice from their health-care providers when considering family planning options.</span></p><span data-dcnode-id="7901" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7899"><span data-dcnode-id="7900" instrument_node="">Methods</span></h3><span data-dcnode-id="7898" instrument_node="">
</span><p data-dcnode-id="7896"><span data-dcnode-id="7897" instrument_node="">CDC initiated a process to adapt WHO SPR for the United States. This adaptation process included four steps: 1) determining the scope of and process for the adaptation, including an October 2010 meeting in which individual feedback was solicited from a small group of partners and experts; 2) preparing the systematic reviews of the evidence during October 2010–September 2011 to be used for the adaptation, including peer review; 3) convening a larger meeting of experts in October 2011 to examine the evidence and receive input on the recommendations; and 4) finalizing recommendations by CDC.</span></p><span data-dcnode-id="7895" instrument_node="">
</span><p data-dcnode-id="7893"><span data-dcnode-id="7894" instrument_node="">During October 21–22, 2010, CDC convened a meeting of 10 partners and U.S. family planning experts in Atlanta, Georgia, to discuss the scope of and process for a U.S. adaptation of WHO SPR. A list of participants is provided at the end of this report. CDC identified the specific WHO recommendations that might benefit from modification for the United States. Criteria used to modify the WHO recommendations included the availability of new scientific evidence or the context in which family planning services are provided in the United States. CDC also identified several WHO recommendations that needed additional specificity to be useful for U.S. health-care providers, as well as the need for additional recommendations not currently included in WHO SPR. In addition, the meeting members discussed removing recommendations that provide information about contraceptive methods that are not available in the United States.</span></p><span data-dcnode-id="7892" instrument_node="">
</span><p data-dcnode-id="7875"><span data-dcnode-id="7891" instrument_node="">Representatives from CDC and WHO conducted systematic reviews of the scientific evidence for each of the WHO recommendations being considered for adaptation and for each new topic being considered for addition to the guidance. The purpose of these systematic reviews was to identify evidence related to the common clinical challenges associated with the recommendations. When no direct evidence was available, indirect evidence and theoretical issues were considered. Standard guidelines were followed for reporting systematic reviews (</span><i data-dcnode-id="7889"><span data-dcnode-id="7890" instrument_node="">9</span></i><span data-dcnode-id="7888" instrument_node="">,</span><i data-dcnode-id="7886"><span data-dcnode-id="7887" instrument_node="">10</span></i><span data-dcnode-id="7885" instrument_node="">), and strength and quality of the evidence were graded using the system of the U.S. Preventive Services Task Force (</span><i data-dcnode-id="7883"><span data-dcnode-id="7884" instrument_node="">11</span></i><span data-dcnode-id="7882" instrument_node="">). Each complete systematic review was peer reviewed by two or three experts before its use in the adaptation process. Peer reviewers, who were identified from the list of persons scheduled to participate in the October 2011 meeting, were asked to comment on the search strategy, list of articles included in the reviews, and the summary of findings. The systematic reviews were finalized and provided to participants before the October 2011 meeting and were published in May 2013 (</span><i data-dcnode-id="7880"><span data-dcnode-id="7881" instrument_node="">12</span></i><span data-dcnode-id="7879" instrument_node="">–</span><i data-dcnode-id="7877"><span data-dcnode-id="7878" instrument_node="">30</span></i><span data-dcnode-id="7876" instrument_node="">).</span></p><span data-dcnode-id="7874" instrument_node="">
</span><p data-dcnode-id="7869"><span data-dcnode-id="7873" instrument_node="">During October 4–7, 2011, CDC convened a meeting in Atlanta, Georgia, of 36 experts who were invited to assist in guideline development and provide their perspective on the scientific evidence presented and the discussions on potential recommendations that followed. The group included obstetrician/gynecologists, pediatricians, family physicians, nurse-midwives, nurse practitioners, epidemiologists, and others with research and clinical practice expertise in contraceptive safety, effectiveness, and management. All participants received all of the systematic reviews before the meeting. During the meeting, the evidence from the systematic review for each topic was presented, and participants discussed the evidence and the translation of the scientific evidence into recommendations that would meet the needs of U.S. health-care providers. In particular, participants discussed whether and how the U.S. context might be different from the global context and whether these differences suggested any need for modifications to the global guidance. CDC gathered the input from the experts during the meeting and finalized the recommendations in this report. The document was peer reviewed by meeting participants, who were asked to comment on specific issues that were raised during the meeting. Feedback also was received from an external review panel, composed of health-care providers who had not participated in the adaptation meetings. These providers were asked to provide comments on the accuracy, feasibility, and clarity of the recommendations, as well as to provide other comments. Areas of research that need additional investigation also were considered during the meeting (</span><i data-dcnode-id="7871"><span data-dcnode-id="7872" instrument_node="">31</span></i><span data-dcnode-id="7870" instrument_node="">).</span></p><span data-dcnode-id="7868" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7866"><span data-dcnode-id="7867" instrument_node="">How To Use This Document</span></h3><span data-dcnode-id="7865" instrument_node="">
</span><p data-dcnode-id="7855"><span data-dcnode-id="7864" instrument_node="">The recommendations in this report are intended to help health-care providers address issues related to use of contraceptives, such as how to help a woman initiate use of a contraceptive method, which examinations and tests are needed before initiating use of a contraceptive method, what regular follow-up is needed, and how to address problems that often arise during use, including missed pills and side effects such as unscheduled bleeding. Each recommendation addresses what a woman or health-care provider can do in specific situations. For situations in which certain groups of women might be medically ineligible to follow the recommendations, comments and reference to U.S. MEC are provided (</span><i data-dcnode-id="7861"><a data-dcnode-id="7862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7863" instrument_node="">5</span></a></i><span data-dcnode-id="7860" instrument_node="">). The full U.S. MEC recommendations and the evidence supporting those recommendations were published in 2010 (</span><i data-dcnode-id="7857"><a data-dcnode-id="7858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7859" instrument_node="">5</span></a></i><span data-dcnode-id="7856" instrument_node="">).</span></p><span data-dcnode-id="7854" instrument_node="">
</span><p data-dcnode-id="7852"><span data-dcnode-id="7853" instrument_node="">The information in this document is organized by contraceptive method, and the methods generally are presented in order of effectiveness, from highest to lowest. However, the recommendations are not intended to provide guidance on every aspect of provision and management of contraceptive method use. Instead, they use the best available evidence to address specific issues regarding common, yet sometimes complex, clinical issues. Each contraceptive method section generally includes information about initiation of the method, regular follow-up, and management of problems with use (e.g., usage errors and side effects). Each section first provides the recommendation and then includes a comments and evidence section, which includes comments about the recommendations and a brief summary of the scientific evidence on which the recommendation is based.</span></p><span data-dcnode-id="7851" instrument_node="">
</span><p data-dcnode-id="7849"><span data-dcnode-id="7850" instrument_node="">Recommendations in this document are provided for permanent methods of contraception, such as vasectomy and female sterilization, as well as for reversible methods of contraception, including the copper-containing intrauterine device (Cu-IUD); levonorgestrel-releasing IUD (LNG-IUD); the etonogestrel implant; progestin-only injectables; progestin-only pills (POPs); combined hormonal contraceptive methods that contain both estrogen and a progestin, including combined oral contraceptives (COCs), a transdermal contraceptive patch, and a vaginal contraceptive ring; and the standard days method (SDM). Recommendations also are provided for emergency use of the Cu-IUD and emergency contraceptive pills (ECPs).</span></p><span data-dcnode-id="7848" instrument_node="">
</span><p data-dcnode-id="7846"><span data-dcnode-id="7847" instrument_node="">For each contraceptive method, recommendations are provided on the timing for initiation of the method and indications for when and for how long additional contraception, or a back-up method, is needed. Many of these recommendations include guidance that a woman can start a contraceptive method at any time during her menstrual cycle if it is reasonably certain that the woman is not pregnant. Guidance for health-care providers on how to be reasonably certain that a woman is not pregnant is provided.</span></p><span data-dcnode-id="7845" instrument_node="">
</span><p data-dcnode-id="7836"><span data-dcnode-id="7844" instrument_node="">For each contraceptive method, recommendations include the examinations and tests needed before initiation of the method. These recommendations apply to persons who are presumed to be healthy. Those with known medical problems or other special conditions might need additional examinations or tests before being determined to be appropriate candidates for a particular method of contraception. U.S. MEC might be useful in such circumstances (</span><i data-dcnode-id="7841"><a data-dcnode-id="7842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7843" instrument_node="">5</span></a></i><span data-dcnode-id="7840" instrument_node="">). Most women need no or very few examinations or tests before initiating a contraceptive method. The following classification system was developed by WHO and adopted by CDC to categorize the applicability of the various examinations or tests before initiation of contraceptive methods (</span><i data-dcnode-id="7838"><span data-dcnode-id="7839" instrument_node="">6</span></i><span data-dcnode-id="7837" instrument_node="">):</span></p><span data-dcnode-id="7835" instrument_node="">
</span><p data-dcnode-id="7831"><b data-dcnode-id="7833"><span data-dcnode-id="7834" instrument_node="">Class A:</span></b><span data-dcnode-id="7832" instrument_node="">&nbsp;These tests and examinations are essential and mandatory in all circumstances for safe and effective use of the contraceptive method.</span></p><span data-dcnode-id="7830" instrument_node="">
</span><p data-dcnode-id="7826"><b data-dcnode-id="7828"><span data-dcnode-id="7829" instrument_node="">Class B:</span></b><span data-dcnode-id="7827" instrument_node=""> These tests and examinations contribute substantially to safe and effective use, although implementation can be considered within the public health context, service context, or both. The risk for not performing an examination or test should be balanced against the benefits of making the contraceptive method available.</span></p><span data-dcnode-id="7825" instrument_node="">
</span><p data-dcnode-id="7821"><b data-dcnode-id="7823"><span data-dcnode-id="7824" instrument_node="">Class C:</span></b><span data-dcnode-id="7822" instrument_node="">&nbsp;These tests and examinations do not contribute substantially to safe and effective use of the contraceptive method.</span></p><span data-dcnode-id="7820" instrument_node="">
</span><p data-dcnode-id="7818"><span data-dcnode-id="7819" instrument_node="">These classifications focus on the relation of the examinations or tests to safe initiation of a contraceptive method. They are not intended to address the appropriateness of these examinations or tests in other circumstances. For example, some of the examinations or tests that are not deemed necessary for safe and effective contraceptive use might be appropriate for good preventive health care or for diagnosing or assessing suspected medical conditions. Systematic reviews were conducted for several different types of examinations and tests to assess whether a screening test was associated with safe use of contraceptive methods.&nbsp;Because no single convention exists for screening panels for certain diseases, including diabetes, lipid disorders, and liver diseases, the search strategies included broad terms for the tests and diseases of interest.</span></p><span data-dcnode-id="7817" instrument_node="">
</span><p data-dcnode-id="7797"><span data-dcnode-id="7816" instrument_node="">Summary charts and clinical algorithms that summarize the guidance for the various contraceptive methods have been developed for many of the recommendations, including when to start using specific contraceptive methods (</span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr6205a3.htm%3Fs_cid%3Drr6205a3_w"><span data-dcnode-id="7815" instrument_node="">Appendix B</span></a><span data-dcnode-id="7813" instrument_node="">), examinations and tests needed before initiating the various contraceptive methods (</span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr6205a4.htm%3Fs_cid%3Drr6205a4_w"><span data-dcnode-id="7812" instrument_node="">Appendix C</span></a><span data-dcnode-id="7810" instrument_node="">), routine follow-up after initiating contraception (</span><a data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr6205a5.htm%3Fs_cid%3Drr6205a5_w"><span data-dcnode-id="7809" instrument_node="">Appendix D</span></a><span data-dcnode-id="7807" instrument_node="">), management of bleeding irregularities (</span><a data-dcnode-id="7805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr6205a6.htm%3Fs_cid%3Drr6205a6_w"><span data-dcnode-id="7806" instrument_node="">Appendix E</span></a><span data-dcnode-id="7804" instrument_node="">), and management of IUDs when users are found to have pelvic inflammatory disease (PID) (</span><a data-dcnode-id="7802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr6205a7.htm%3Fs_cid%3Drr6205a7_w"><span data-dcnode-id="7803" instrument_node="">Appendix F</span></a><span data-dcnode-id="7801" instrument_node="">). These summaries might be helpful to health-care providers when managing family planning patients. Additional tools are available on the U.S. SPR website (</span><a data-dcnode-id="7799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cdc.gov/reproductivehealth/UnintendedPregnancy/USSPR.htm"><span data-dcnode-id="7800" instrument_node="">http://www.cdc.gov/reproductivehealth/UnintendedPregnancy/USSPR.htm</span></a><span data-dcnode-id="7798" instrument_node="">).</span></p><span data-dcnode-id="7796" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7794"><span data-dcnode-id="7795" instrument_node="">Summary of Changes from WHO SPR</span></h3><span data-dcnode-id="7793" instrument_node="">
</span><p data-dcnode-id="7791"><span data-dcnode-id="7792" instrument_node="">Much of the guidance in U.S. SPR is the same or very similar to the WHO SPR guidance. U.S. SPR includes new guidance on the use of the combined contraceptive patch and vaginal ring, as well as recommendations for four new topics:</span></p><span data-dcnode-id="7790" instrument_node="">
</span><ul data-dcnode-id="7776"><span data-dcnode-id="7789" instrument_node="">
</span><li data-dcnode-id="7787"><span data-dcnode-id="7788" instrument_node="">	how to start regular contraception after taking ECPs</span></li><span data-dcnode-id="7786" instrument_node="">
</span><li data-dcnode-id="7784"><span data-dcnode-id="7785" instrument_node="">	management of bleeding irregularities among women using extended or continuous combined hormonal contraceptives (including pills, the patch, and the ring)</span></li><span data-dcnode-id="7783" instrument_node="">
</span><li data-dcnode-id="7781"><span data-dcnode-id="7782" instrument_node="">	when a woman can rely on female sterilization for contraception</span></li><span data-dcnode-id="7780" instrument_node="">
</span><li data-dcnode-id="7778"><span data-dcnode-id="7779" instrument_node="">	when a woman can stop using contraceptives and not be at risk for unintended pregnancy</span></li><span data-dcnode-id="7777" instrument_node="">
</span></ul><span data-dcnode-id="7775" instrument_node="">
</span><p data-dcnode-id="7773"><span data-dcnode-id="7774" instrument_node="">Adaptations to the WHO SPR recommendations include 1) changes to the length of the grace period for depot medroxyprogesterone acetate (DMPA) reinjection, 2) differences in some of the examinations and tests recommended before contraceptive method initiation, 3) differences in some of the recommendations for management of bleeding irregularities because of new data and drug availability in the United States, and 4) a modified missed pill algorithm to respond to concerns of the CDC expert group and other reviewers that simplified algorithms are preferable.</span></p><span data-dcnode-id="7772" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7770"><span data-dcnode-id="7771" instrument_node="">Contraceptive Method Choice</span></h3><span data-dcnode-id="7769" instrument_node="">
</span><p data-dcnode-id="7767"><span data-dcnode-id="7768" instrument_node="">Many elements need to be considered individually by a woman, man, or couple when choosing the most appropriate contraceptive method. Some of these elements include safety, effectiveness, availability (including accessibility and affordability), and acceptability.</span></p><span data-dcnode-id="7766" instrument_node="">
</span><p data-dcnode-id="7752"><span data-dcnode-id="7765" instrument_node="">Contraceptive method effectiveness is critically important in minimizing the risk for unintended pregnancy, particularly among women for whom an unintended pregnancy would pose additional health risks. The effectiveness of contraceptive methods depends both on the inherent effectiveness of the method itself and on how consistently and correctly it is used </span><span class="callout-pink" data-dcnode-id="7760"><span data-dcnode-id="7764" instrument_node="">(</span><a data-dcnode-id="7762" href="#Tab1"><span data-dcnode-id="7763" instrument_node="">Table 1</span></a><span data-dcnode-id="7761" instrument_node="">)</span></span><span data-dcnode-id="7759" instrument_node="">. Both consistent and correct use can vary greatly with characteristics such as age, income, desire to prevent or delay pregnancy, and culture. Methods that depend on consistent and correct use by clients have a wide range of effectiveness between typical and perfect users. IUDs and implants are considered long-acting, reversible contraception (LARC); these methods are highly effective because they do not depend on regular compliance from the user. LARC methods are appropriate for most women, including adolescents and nulliparous women. All women should be counseled about the full range and effectiveness of contraceptive options for which they are medically eligible so that they can identify the optimal method </span><span class="callout-pink" data-dcnode-id="7754"><span data-dcnode-id="7758" instrument_node="">(</span><a data-dcnode-id="7756" href="#Fig1"><span data-dcnode-id="7757" instrument_node="">Figure 1</span></a><span data-dcnode-id="7755" instrument_node="">)</span></span><span data-dcnode-id="7753" instrument_node="">.</span></p><span data-dcnode-id="7751" instrument_node="">
</span><p data-dcnode-id="7730"><span data-dcnode-id="7750" instrument_node="">In choosing a method of contraception, the risk for human immunodeficiency virus (HIV) infection and other sexually transmitted diseases (STDs) also should be considered. Although hormonal contraceptives and IUDs are highly effective at preventing pregnancy, they do not protect against STDs and HIV. Consistent and correct use of the male latex condom reduces the risk for HIV infection and other STDs, including chlamydial infection, gonorrhea, and trichomoniasis (</span><i data-dcnode-id="7747"><a data-dcnode-id="7748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr5912a1.htm"><span data-dcnode-id="7749" instrument_node="">32</span></a></i><span data-dcnode-id="7746" instrument_node="">). On the basis of a limited number of clinical studies, when a male condom cannot be used properly to prevent infection, a female condom should be considered (</span><i data-dcnode-id="7743"><a data-dcnode-id="7744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr5912a1.htm"><span data-dcnode-id="7745" instrument_node="">32</span></a></i><span data-dcnode-id="7742" instrument_node="">)). All patients, regardless of contraceptive choice, should be counseled about the use of condoms and the risk for STDs, including HIV infection (</span><i data-dcnode-id="7739"><a data-dcnode-id="7740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr5912a1.htm"><span data-dcnode-id="7741" instrument_node="">32</span></a></i><span data-dcnode-id="7738" instrument_node="">)). Additional information about prevention and treatment of STDs is available from the CDC </span><i data-dcnode-id="7736"><span data-dcnode-id="7737" instrument_node="">Sexually Transmitted Diseases Treatment Guidelines</span></i><span data-dcnode-id="7735" instrument_node=""> (</span><i data-dcnode-id="7732"><a data-dcnode-id="7733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr5912a1.htm"><span data-dcnode-id="7734" instrument_node="">32</span></a></i><span data-dcnode-id="7731" instrument_node="">)).</span></p><span data-dcnode-id="7729" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7727"><span data-dcnode-id="7728" instrument_node="">Maintaining Updated Guidance</span></h3><span data-dcnode-id="7726" instrument_node="">
</span><p data-dcnode-id="7718"><span data-dcnode-id="7725" instrument_node="">As with any evidence-based guidance document, a key challenge is keeping the recommendations up to date as new scientific evidence becomes available. Working with WHO, CDC uses the continuous identification of research evidence (CIRE) system to ensure that WHO and CDC guidance is based on the best available evidence and that a mechanism is in place to update guidance when new evidence becomes available (</span><i data-dcnode-id="7723"><span data-dcnode-id="7724" instrument_node="">33</span></i><span data-dcnode-id="7722" instrument_node="">). CDC will continue to work with WHO to identify and assess all new relevant evidence and determine whether changes in the recommendations are warranted. In most cases, U.S. SPR will follow any updates in the WHO guidance, which typically occurs every 3–4 years (or sooner if warranted by new data). In addition, CDC will review any interim WHO updates for their application in the United States. CDC also will identify and assess any new literature for the recommendations that are not included in the WHO guidance and will completely review U.S. SPR every 3–4 years. Updates to the guidance can be found on the U.S. SPR website (</span><a data-dcnode-id="7720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cdc.gov/reproductivehealth/UnintendedPregnancy/USSPR.htm"><span data-dcnode-id="7721" instrument_node="">http://www.cdc.gov/reproductivehealth/UnintendedPregnancy/USSPR.htm</span></a><span data-dcnode-id="7719" instrument_node="">).</span></p><span data-dcnode-id="7717" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7715"><span data-dcnode-id="7716" instrument_node="">How To Be Reasonably Certain that a Woman Is Not Pregnant</span></h3><span data-dcnode-id="7714" instrument_node="">
</span><p data-dcnode-id="7700"><span data-dcnode-id="7713" instrument_node="">In most cases, a detailed history provides the most accurate assessment of pregnancy risk in a woman who is about to start using a contraceptive method. Several criteria for assessing pregnancy risk are listed in the recommendation that follows. These criteria are highly accurate (i.e., a negative predictive value of 99%–100%) in ruling out pregnancy among women who are not pregnant (</span><i data-dcnode-id="7711"><span data-dcnode-id="7712" instrument_node="">34</span></i><span data-dcnode-id="7710" instrument_node="">–</span><i data-dcnode-id="7708"><span data-dcnode-id="7709" instrument_node="">37</span></i><span data-dcnode-id="7707" instrument_node="">). Therefore, CDC recommends that health-care providers use these criteria to assess pregnancy status in a woman who is about to start using contraceptives </span><span class="callout-pink" data-dcnode-id="7702"><span data-dcnode-id="7706" instrument_node="">(</span><a data-dcnode-id="7704" href="#Box1"><span data-dcnode-id="7705" instrument_node="">Box 1</span></a><span data-dcnode-id="7703" instrument_node="">)</span></span><span data-dcnode-id="7701" instrument_node="">. If a woman meets one of these criteria (and therefore the health-care provider can be reasonably certain that she is not pregnant), a urine pregnancy test might be considered in addition to these criteria (based on clinical judgment), bearing in mind the limitations of the accuracy of pregnancy testing. If a woman does not meet any of these criteria, then the health-care provider cannot be reasonably certain that she is not pregnant, even with a negative pregnancy test. Routine pregnancy testing for every woman is not necessary.</span></p><span data-dcnode-id="7699" instrument_node="">
</span><p data-dcnode-id="7697"><span data-dcnode-id="7698" instrument_node="">On the basis of clinical judgment, health-care providers might consider the addition of a urine pregnancy test; however, they should be aware of the limitations, including accuracy of the test relative to the time of last sexual intercourse, recent delivery, or spontaneous or induced abortion. Routine pregnancy testing for every woman is not necessary. If a woman has had recent (i.e., within the last 5 days) unprotected sexual intercourse, consider offering emergency contraception (either a Cu-IUD or ECPs), if pregnancy is not desired.</span></p><span data-dcnode-id="7696" instrument_node="">
</span><p data-dcnode-id="7674"><b data-dcnode-id="7694"><span data-dcnode-id="7695" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="7693" instrument_node=""> The criteria for determining whether a woman is pregnant depend on the assurance that she has not ovulated within a certain amount of time after her last menses, spontaneous or induced abortion, or delivery. Among menstruating women, the timing of ovulation can vary widely. During an average 28-day cycle, ovulation generally occurs during days 9–20 (</span><i data-dcnode-id="7691"><span data-dcnode-id="7692" instrument_node="">38</span></i><span data-dcnode-id="7690" instrument_node="">). In addition, the likelihood of ovulation is low from days 1–7 of the menstrual cycle (</span><i data-dcnode-id="7688"><span data-dcnode-id="7689" instrument_node="">39</span></i><span data-dcnode-id="7687" instrument_node="">). After a spontaneous or an induced abortion, ovulation can occur within 2–3 weeks and has been found to occur as early as 8–13 days after the end of the pregnancy. Therefore, the likelihood of ovulation is low ≤7 days after an abortion (</span><i data-dcnode-id="7685"><span data-dcnode-id="7686" instrument_node="">40</span></i><span data-dcnode-id="7684" instrument_node="">–</span><i data-dcnode-id="7682"><span data-dcnode-id="7683" instrument_node="">42</span></i><span data-dcnode-id="7681" instrument_node="">). A recent systematic review reported that the mean day of first ovulation among postpartum nonlactating women occurred 45–94 days after delivery (</span><i data-dcnode-id="7679"><span data-dcnode-id="7680" instrument_node="">43</span></i><span data-dcnode-id="7678" instrument_node="">). In one study, the earliest ovulation was reported at 25 days after delivery. Among women who are within 6 months postpartum, are fully or nearly fully breastfeeding, and are amenorrheic, the risk for pregnancy is &lt;2% (</span><i data-dcnode-id="7676"><span data-dcnode-id="7677" instrument_node="">44</span></i><span data-dcnode-id="7675" instrument_node="">).</span></p><span data-dcnode-id="7673" instrument_node="">
</span><p data-dcnode-id="7650"><span data-dcnode-id="7672" instrument_node="">Although pregnancy tests often are performed before initiating contraception, the accuracy of qualitative urine pregnancy tests varies depending on the timing of the test relative to missed menses, recent sexual intercourse, or recent pregnancy. The sensitivity of a pregnancy test is defined as the concentration of human chorionic gonadotropin (hCG) at which 95% of tests are positive. Most qualitative pregnancy tests approved by the U.S. Food and Drug Administration (FDA) report a sensitivity of 20–25 mIU/mL in urine (</span><i data-dcnode-id="7670"><span data-dcnode-id="7671" instrument_node="">45</span></i><span data-dcnode-id="7669" instrument_node="">–</span><i data-dcnode-id="7667"><span data-dcnode-id="7668" instrument_node="">48</span></i><span data-dcnode-id="7666" instrument_node="">) However, pregnancy detection rates can vary widely because of differences in test sensitivity and the timing of testing relative to missed menses (</span><i data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node="">47</span></i><span data-dcnode-id="7663" instrument_node="">,</span><i data-dcnode-id="7661"><span data-dcnode-id="7662" instrument_node="">49</span></i><span data-dcnode-id="7660" instrument_node="">). Some studies have shown that an additional 11 days past the day of expected menses are needed to detect 100% of pregnancies using qualitative tests (</span><i data-dcnode-id="7658"><span data-dcnode-id="7659" instrument_node="">46</span></i><span data-dcnode-id="7657" instrument_node="">). In addition, pregnancy tests cannot detect a pregnancy resulting from recent sexual intercourse. Qualitative tests also might have positive results for several weeks after termination of pregnancy because hCG can be present for several weeks after delivery or abortion (spontaneous or induced) (</span><i data-dcnode-id="7655"><span data-dcnode-id="7656" instrument_node="">50</span></i><span data-dcnode-id="7654" instrument_node="">–</span><i data-dcnode-id="7652"><span data-dcnode-id="7653" instrument_node="">52</span></i><span data-dcnode-id="7651" instrument_node="">).</span></p><span data-dcnode-id="7649" instrument_node="">
</span><p data-dcnode-id="7632"><span data-dcnode-id="7648" instrument_node="">For contraceptive methods other than IUDs, the benefits of starting to use a contraceptive method likely exceed any risk, even in situations in which the health-care provider is uncertain whether the woman is pregnant. Therefore, the health-care provider can consider having patients start using contraceptive methods other than IUDs at any time, with a follow-up pregnancy test in 2–4 weeks. The risks of not starting to use contraception should be weighed against the risks of initiating contraception use in a woman who might be already pregnant. Most studies have shown no increased risk for adverse outcomes, including congenital anomalies or neonatal or infant death, among infants exposed in utero to COCs (</span><i data-dcnode-id="7646"><span data-dcnode-id="7647" instrument_node="">53</span></i><span data-dcnode-id="7645" instrument_node="">–</span><i data-dcnode-id="7643"><span data-dcnode-id="7644" instrument_node="">55</span></i><span data-dcnode-id="7642" instrument_node="">). Studies also have shown no increased risk for neonatal or infant death or developmental abnormalities among infants exposed in utero to DMPA (</span><i data-dcnode-id="7640"><span data-dcnode-id="7641" instrument_node="">54</span></i><span data-dcnode-id="7639" instrument_node="">,</span><i data-dcnode-id="7637"><span data-dcnode-id="7638" instrument_node="">56</span></i><span data-dcnode-id="7636" instrument_node="">,</span><i data-dcnode-id="7634"><span data-dcnode-id="7635" instrument_node="">57</span></i><span data-dcnode-id="7633" instrument_node="">).</span></p><span data-dcnode-id="7631" instrument_node="">
</span><p data-dcnode-id="7626"><span data-dcnode-id="7630" instrument_node="">In contrast, for women who want to begin using an IUD (Cu-IUD or LNG-IUD), in situations in which the health-care provider is uncertain whether the woman is pregnant, the woman should be provided with another contraceptive method to use until the health-care provider is reasonably certain that she is not pregnant and can insert the IUD. Pregnancies among women with IUDs are at higher risk for complications such as spontaneous abortion, septic abortion, preterm delivery, and chorioamnionitis (</span><i data-dcnode-id="7628"><span data-dcnode-id="7629" instrument_node="">58</span></i><span data-dcnode-id="7627" instrument_node="">).</span></p><span data-dcnode-id="7625" instrument_node="">
</span><p data-dcnode-id="7617"><span data-dcnode-id="7624" instrument_node="">A systematic review identified four analyses of data from three diagnostic accuracy studies that evaluated the performance of the criteria listed above through use of a pregnancy checklist compared with a urine pregnancy test conducted concurrently (</span><i data-dcnode-id="7622"><span data-dcnode-id="7623" instrument_node="">12</span></i><span data-dcnode-id="7621" instrument_node="">). The performance of the checklist to diagnose or exclude pregnancy varied, with sensitivity of 55%–100% and specificity of 39%–89%. The negative predictive value was consistent across studies at 99%–100%; the pregnancy checklist correctly ruled out women who were not pregnant. One of the studies assessed the added usefulness of signs and symptoms of pregnancy and found that these criteria did not substantially improve the performance of the pregnancy checklist, although the number of women with signs and symptoms was small (</span><i data-dcnode-id="7619"><span data-dcnode-id="7620" instrument_node="">34</span></i><span data-dcnode-id="7618" instrument_node="">) (Level of evidence: Diagnostic accuracy studies, fair, direct).</span></p><span data-dcnode-id="7616" instrument_node="">
</span><h3 class="serial_subtitle" data-dcnode-id="7614"><span data-dcnode-id="7615" instrument_node="">Intrauterine Contraception</span></h3><span data-dcnode-id="7613" instrument_node="">
</span><p data-dcnode-id="7608"><span data-dcnode-id="7612" instrument_node="">Three IUDs are available in the United States, the Cu-IUD and two LNG-IUDs (containing a total of either 13.5 mg or 52 mg levonorgestrel). Fewer than 1 woman out of 100 becomes pregnant in the first year of using IUDs (with typical use) (</span><i data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node="">59</span></i><span data-dcnode-id="7609" instrument_node="">). IUDs are long acting, are reversible, and can be used by women of all ages, including adolescents, and both by parous and nulliparous women. IUDs do not protect against STDs; consistent and correct use of male latex condoms reduces the risk for STDs, including HIV.</span></p><span data-dcnode-id="7607" instrument_node="">
</span><h4 data-dcnode-id="7605"><span data-dcnode-id="7606" instrument_node="">Initiation of Cu-IUDs</span></h4><span data-dcnode-id="7604" instrument_node="">
</span><h4 data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">Timing</span></h4><span data-dcnode-id="7601" instrument_node="">
</span><ul data-dcnode-id="7592"><li data-dcnode-id="7596"><span data-dcnode-id="7600" instrument_node="">	The Cu-IUD can be inserted at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7598" href="#Box1"><span data-dcnode-id="7599" instrument_node="">Box 1</span></a><span data-dcnode-id="7597" instrument_node="">).</span></li><span data-dcnode-id="7595" instrument_node="">
</span><li data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node="">	The Cu-IUD also can be inserted within 5 days of the first act of unprotected sexual intercourse as an emergency contraceptive. If the day of ovulation can be estimated, the Cu-IUD also can be inserted &gt;5 days after sexual intercourse as long as insertion does not occur &gt;5 days after ovulation.</span></li></ul><span data-dcnode-id="7591" instrument_node="">
</span><h4 data-dcnode-id="7589"><span data-dcnode-id="7590" instrument_node="">Need for Back-Up Contraception</span></h4><span data-dcnode-id="7588" instrument_node="">
</span><ul data-dcnode-id="7585"><li data-dcnode-id="7586"><span data-dcnode-id="7587" instrument_node="">	No additional contraceptive protection is needed after Cu-IUD insertion.</span></li></ul><span data-dcnode-id="7584" instrument_node="">
</span><h4 data-dcnode-id="7582"><span data-dcnode-id="7583" instrument_node="">Special Considerations</span></h4><span data-dcnode-id="7581" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="7578"><b data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">Amenorrhea (Not Postpartum)</span></b></p><span data-dcnode-id="7577" instrument_node="">
</span><ul data-dcnode-id="7562"><li data-dcnode-id="7569"><span data-dcnode-id="7576" instrument_node=""> </span><b data-dcnode-id="7574"><span data-dcnode-id="7575" instrument_node="">Timing:</span></b><span data-dcnode-id="7573" instrument_node=""> The Cu-IUD can be inserted at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7571" href="#Box1"><span data-dcnode-id="7572" instrument_node="">Box 1</span></a><span data-dcnode-id="7570" instrument_node="">).</span></li><span data-dcnode-id="7568" instrument_node="">
</span><li data-dcnode-id="7563"><span data-dcnode-id="7567" instrument_node=""> </span><b data-dcnode-id="7565"><span data-dcnode-id="7566" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7564" instrument_node=""> No additional contraceptive protection is needed.</span></li></ul><span data-dcnode-id="7561" instrument_node="">
</span><p class="h5" data-dcnode-id="7558"><b data-dcnode-id="7559"><span data-dcnode-id="7560" instrument_node="">Postpartum (Including After Cesarean Section)</span></b></p><span data-dcnode-id="7557" instrument_node="">
</span><ul data-dcnode-id="7539"><li data-dcnode-id="7546"><span data-dcnode-id="7556" instrument_node=""> </span><b data-dcnode-id="7554"><span data-dcnode-id="7555" instrument_node="">Timing:</span></b><span data-dcnode-id="7553" instrument_node=""> The Cu-IUD can be inserted at any time postpartum, including immediately postpartum (U.S. MEC 1 or 2) (</span><a data-dcnode-id="7551" href="#Box2"><span data-dcnode-id="7552" instrument_node="">Box 2</span></a><span data-dcnode-id="7550" instrument_node="">), if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7548" href="#Box1"><span data-dcnode-id="7549" instrument_node="">Box 1</span></a><span data-dcnode-id="7547" instrument_node="">). The Cu-IUD should not be inserted in a woman with puerperal sepsis (U.S. MEC 4).</span></li><span data-dcnode-id="7545" instrument_node="">
</span><li data-dcnode-id="7540"><span data-dcnode-id="7544" instrument_node=""> </span><b data-dcnode-id="7542"><span data-dcnode-id="7543" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7541" instrument_node=""> No additional contraceptive protection is needed.</span></li></ul><span data-dcnode-id="7538" instrument_node="">
</span><p class="h5" data-dcnode-id="7535"><b data-dcnode-id="7536"><span data-dcnode-id="7537" instrument_node="">Postabortion (Spontaneous or Induced)</span></b></p><span data-dcnode-id="7534" instrument_node="">
</span><ul data-dcnode-id="7522"><li data-dcnode-id="7529"><span data-dcnode-id="7533" instrument_node=""> </span><b data-dcnode-id="7531"><span data-dcnode-id="7532" instrument_node="">Timing:</span></b><span data-dcnode-id="7530" instrument_node=""> The Cu-IUD can be inserted within the first 7 days, including immediately postabortion (U.S. MEC 1 for first trimester abortion and U.S. MEC 2 for second trimester abortion). The Cu-IUD should not be inserted immediately after septic abortion (U.S. MEC 4).</span></li><span data-dcnode-id="7528" instrument_node="">
</span><li data-dcnode-id="7523"><span data-dcnode-id="7527" instrument_node=""> </span><b data-dcnode-id="7525"><span data-dcnode-id="7526" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7524" instrument_node=""> No additional contraceptive protection is needed.</span></li></ul><span data-dcnode-id="7521" instrument_node="">
</span><p class="h5" data-dcnode-id="7518"><b data-dcnode-id="7519"><span data-dcnode-id="7520" instrument_node="">Switching from Another Contraceptive Method</span></b></p><span data-dcnode-id="7517" instrument_node="">
</span><ul data-dcnode-id="7502"><li data-dcnode-id="7509"><span data-dcnode-id="7516" instrument_node=""> </span><b data-dcnode-id="7514"><span data-dcnode-id="7515" instrument_node="">Timing:</span></b><span data-dcnode-id="7513" instrument_node=""> The Cu-IUD can be inserted immediately if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7511" href="#Box1"><span data-dcnode-id="7512" instrument_node="">Box 1</span></a><span data-dcnode-id="7510" instrument_node="">). Waiting for her next menstrual period is unnecessary.</span></li><span data-dcnode-id="7508" instrument_node="">
</span><li data-dcnode-id="7503"><span data-dcnode-id="7507" instrument_node=""> </span><b data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7504" instrument_node=""> No additional contraceptive protection is needed.</span></li></ul><span data-dcnode-id="7501" instrument_node="">
</span><p data-dcnode-id="7497"><b data-dcnode-id="7499"><span data-dcnode-id="7500" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="7498" instrument_node=""> In situations in which the health-care provider is not reasonably certain that the woman is not pregnant, the woman should be provided with another contraceptive method to use until the health-care provider can be reasonably certain that she is not pregnant and can insert the Cu-IUD.</span></p><span data-dcnode-id="7496" instrument_node="">
</span><p data-dcnode-id="7491"><span data-dcnode-id="7495" instrument_node="">A systematic review identified eight studies that suggested that timing of Cu-IUD insertion in relation to the menstrual cycle in nonpostpartum women had little effect on long-term outcomes (rates of continuation, removal, expulsion, or pregnancy) or on short-term outcomes (pain at insertion, bleeding at insertion, or immediate expulsion) (</span><i data-dcnode-id="7493"><span data-dcnode-id="7494" instrument_node="">13</span></i><span data-dcnode-id="7492" instrument_node="">) (Level of evidence: II-2, fair, direct).</span></p><span data-dcnode-id="7490" instrument_node="">
</span><h4 data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node="">Initiation of LNG-IUDs</span></h4><span data-dcnode-id="7487" instrument_node="">
</span><h4 data-dcnode-id="7485"><span data-dcnode-id="7486" instrument_node="">Timing of LNG-IUD Insertion</span></h4><span data-dcnode-id="7484" instrument_node="">
</span><ul data-dcnode-id="7478"><li data-dcnode-id="7479"><span data-dcnode-id="7483" instrument_node="">	The LNG-IUD can be inserted at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7481" href="#Box1"><span data-dcnode-id="7482" instrument_node="">Box 1</span></a><span data-dcnode-id="7480" instrument_node="">).</span></li></ul><span data-dcnode-id="7477" instrument_node="">
</span><h4 data-dcnode-id="7475"><span data-dcnode-id="7476" instrument_node="">Need for Back-Up Contraception</span></h4><span data-dcnode-id="7474" instrument_node="">
</span><ul data-dcnode-id="7468"><li data-dcnode-id="7472"><span data-dcnode-id="7473" instrument_node="">	If the LNG-IUD is inserted within the first 7 days since menstrual bleeding started, no additional contraceptive protection is needed.</span></li><span data-dcnode-id="7471" instrument_node="">
</span><li data-dcnode-id="7469"><span data-dcnode-id="7470" instrument_node="">	If the LNG-IUD is inserted &gt;7 days since menstrual bleeding started, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="7467" instrument_node="">
</span><h4 data-dcnode-id="7465"><span data-dcnode-id="7466" instrument_node="">Special Considerations</span></h4><span data-dcnode-id="7464" instrument_node="">
</span><p class="h5-directly-after-h4" data-dcnode-id="7461"><b data-dcnode-id="7462"><span data-dcnode-id="7463" instrument_node="">Amenorrhea (Not Postpartum)</span></b></p><span data-dcnode-id="7460" instrument_node="">
</span><ul data-dcnode-id="7445"><li data-dcnode-id="7452"><span data-dcnode-id="7459" instrument_node=""> </span><b data-dcnode-id="7457"><span data-dcnode-id="7458" instrument_node="">Timing:</span></b><span data-dcnode-id="7456" instrument_node=""> The LNG-IUD can be inserted at any time if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7454" href="#Box1"><span data-dcnode-id="7455" instrument_node="">Box 1</span></a><span data-dcnode-id="7453" instrument_node="">).</span></li><span data-dcnode-id="7451" instrument_node="">
</span><li data-dcnode-id="7446"><span data-dcnode-id="7450" instrument_node=""> </span><b data-dcnode-id="7448"><span data-dcnode-id="7449" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7447" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="7444" instrument_node="">
</span><p class="h5" data-dcnode-id="7441"><b data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">Postpartum (Including After Cesarean Section)</span></b></p><span data-dcnode-id="7440" instrument_node="">
</span><ul data-dcnode-id="7422"><li data-dcnode-id="7432"><span data-dcnode-id="7439" instrument_node=""> </span><b data-dcnode-id="7437"><span data-dcnode-id="7438" instrument_node="">Timing:</span></b><span data-dcnode-id="7436" instrument_node=""> The LNG-IUD can be inserted at any time, including immediately postpartum (U.S. MEC 1 or 2) if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7434" href="#Box1"><span data-dcnode-id="7435" instrument_node="">Box 1</span></a><span data-dcnode-id="7433" instrument_node="">). The LNG-IUD should not be inserted in a woman with puerperal sepsis (U.S. MEC 4).</span></li><span data-dcnode-id="7431" instrument_node="">
</span><li data-dcnode-id="7423"><span data-dcnode-id="7430" instrument_node=""> </span><b data-dcnode-id="7428"><span data-dcnode-id="7429" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7427" instrument_node=""> If the woman is &lt;6 months postpartum, amenorrheic, and fully or nearly fully breastfeeding (exclusively breastfeeding or the vast majority [≥85%] of feeds are breastfeeds) (</span><i data-dcnode-id="7425"><span data-dcnode-id="7426" instrument_node="">60</span></i><span data-dcnode-id="7424" instrument_node="">), no additional contraceptive protection is needed. Otherwise, a woman who is ≥21 days postpartum and has not experienced return of her menstrual cycle needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days. If her menstrual cycles have returned and it has been &gt;7 days since menstrual bleeding began, she needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li></ul><span data-dcnode-id="7421" instrument_node="">
</span><p class="h5" data-dcnode-id="7418"><b data-dcnode-id="7419"><span data-dcnode-id="7420" instrument_node="">Postabortion (Spontaneous or Induced)</span></b></p><span data-dcnode-id="7417" instrument_node="">
</span><ul data-dcnode-id="7405"><li data-dcnode-id="7412"><span data-dcnode-id="7416" instrument_node=""> </span><b data-dcnode-id="7414"><span data-dcnode-id="7415" instrument_node="">Timing:</span></b><span data-dcnode-id="7413" instrument_node=""> The LNG-IUD can be inserted within the first 7 days, including immediately postabortion (U.S. MEC 1 for first-trimester abortion and U.S. MEC 2 for second-trimester abortion). The LNG-IUD should not be inserted immediately after a septic abortion (U.S. MEC 4).</span></li><span data-dcnode-id="7411" instrument_node="">
</span><li data-dcnode-id="7406"><span data-dcnode-id="7410" instrument_node=""> </span><b data-dcnode-id="7408"><span data-dcnode-id="7409" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7407" instrument_node=""> The woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days unless the IUD is placed at the time of a surgical abortion.</span></li></ul><span data-dcnode-id="7404" instrument_node="">
</span><p class="h5" data-dcnode-id="7401"><b data-dcnode-id="7402"><span data-dcnode-id="7403" instrument_node="">Switching from Another Contraceptive Method</span></b></p><span data-dcnode-id="7400" instrument_node="">
</span><ul data-dcnode-id="7379"><li data-dcnode-id="7392"><span data-dcnode-id="7399" instrument_node=""> </span><b data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">Timing:</span></b><span data-dcnode-id="7396" instrument_node=""> The LNG-IUD can be inserted immediately if it is reasonably certain that the woman is not pregnant (</span><a data-dcnode-id="7394" href="#Box1"><span data-dcnode-id="7395" instrument_node="">Box 1</span></a><span data-dcnode-id="7393" instrument_node="">). Waiting for her next menstrual period is unnecessary.</span></li><span data-dcnode-id="7391" instrument_node="">
</span><li data-dcnode-id="7386"><span data-dcnode-id="7390" instrument_node=""> </span><b data-dcnode-id="7388"><span data-dcnode-id="7389" instrument_node="">Need for back-up contraception:</span></b><span data-dcnode-id="7387" instrument_node=""> If it has been &gt;7 days since menstrual bleeding began, the woman needs to abstain from sexual intercourse or use additional contraceptive protection for the next 7 days.</span></li><span data-dcnode-id="7385" instrument_node="">
</span><li data-dcnode-id="7380"><span data-dcnode-id="7384" instrument_node=""> </span><b data-dcnode-id="7382"><span data-dcnode-id="7383" instrument_node="">Switching from a Cu-IUD:</span></b><span data-dcnode-id="7381" instrument_node=""> If the woman has had sexual intercourse since the start of her current menstrual cycle and it has been &gt;5 days since menstrual bleeding started, theoretically, residual sperm might be in the genital tract, which could lead to fertilization if ovulation occurs. A health-care provider can consider providing ECPs at the time of LNG-IUD insertion.</span></li></ul><span data-dcnode-id="7378" instrument_node="">
</span><p data-dcnode-id="7371"><b data-dcnode-id="7376"><span data-dcnode-id="7377" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="7375" instrument_node=""> In situations in which the health-care provider is uncertain whether the woman might be pregnant, the woman should be provided with another contraceptive method to use until the health-care provider can be reasonably certain that she is not pregnant and can insert the LNG-IUD. If a woman needs to use additional contraceptive protection when switching to an LNG-IUD from another contraceptive method, consider continuing her previous method for 7 days after LNG-IUD insertion. No direct evidence was found regarding the effects of inserting LNG-IUDs on different days of the cycle on short- or long-term outcomes (</span><i data-dcnode-id="7373"><span data-dcnode-id="7374" instrument_node="">13</span></i><span data-dcnode-id="7372" instrument_node="">).</span></p><span data-dcnode-id="7370" instrument_node="">
</span><h4 data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">Examinations and Tests Needed Before Initiation of a Cu-IUD or an LNG-IUD</span></h4><span data-dcnode-id="7367" instrument_node="">
</span><p data-dcnode-id="7355"><span data-dcnode-id="7366" instrument_node="">Among healthy women, few examinations or tests are needed before initiation of an IUD </span><span class="callout-pink" data-dcnode-id="7361"><span data-dcnode-id="7365" instrument_node="">(</span><a data-dcnode-id="7363" href="#Tab2"><span data-dcnode-id="7364" instrument_node="">Table 2</span></a><span data-dcnode-id="7362" instrument_node="">)</span></span><span data-dcnode-id="7360" instrument_node="">. Bimanual examination and cervical inspection are necessary before IUD insertion. A baseline weight and BMI measurement might be useful for monitoring IUD users over time. If a woman has not been screened for STDs according to STD screening guidelines, screening can be performed at the time of insertion.  Women with known medical problems or other special conditions might need additional examinations or tests before being determined to be appropriate candidates for a particular method of contraception. U.S. MEC might be useful in such circumstances (</span><i data-dcnode-id="7357"><a data-dcnode-id="7358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7359" instrument_node="">5</span></a></i><span data-dcnode-id="7356" instrument_node="">).</span></p><span data-dcnode-id="7354" instrument_node="">
</span><p data-dcnode-id="7340"><b data-dcnode-id="7352"><span data-dcnode-id="7353" instrument_node="">Comments and Evidence Summary.</span></b><span data-dcnode-id="7351" instrument_node=""> </span><b data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">Weight (BMI):</span></b><span data-dcnode-id="7348" instrument_node=""> Obese women can use IUDs (U.S. MEC 1) (</span><i data-dcnode-id="7345"><a data-dcnode-id="7346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7347" instrument_node="">5</span></a></i><span data-dcnode-id="7344" instrument_node="">); therefore, screening for obesity is not necessary for the safe initiation of IUDs. However, measuring weight and calculating BMI (weight [kg] / height [m]</span><span class="superscript" data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">2</span></span><span data-dcnode-id="7341" instrument_node="">) at baseline might be helpful for monitoring any changes and counseling women who might be concerned about weight change perceived to be associated with their contraceptive method.</span></p><span data-dcnode-id="7339" instrument_node="">
</span><p data-dcnode-id="7329"><b data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">Bimanual examination and cervical inspection:</span></b><span data-dcnode-id="7336" instrument_node=""> Bimanual examination and cervical inspection are necessary before IUD insertion to assess uterine size and position and to detect any cervical or uterine abnormalities that might indicate infection or otherwise prevent IUD insertion (</span><i data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">61</span></i><span data-dcnode-id="7333" instrument_node="">,</span><i data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">62</span></i><span data-dcnode-id="7330" instrument_node="">).</span></p><span data-dcnode-id="7328" instrument_node="">
</span><p data-dcnode-id="7304"><b data-dcnode-id="7326"><span data-dcnode-id="7327" instrument_node="">STDs:</span></b><span data-dcnode-id="7325" instrument_node=""> Women should be routinely screened for chlamydial infection and gonorrhea according to national screening guidelines. The CDC </span><i data-dcnode-id="7323"><span data-dcnode-id="7324" instrument_node="">Sexually Transmitted Diseases Treatment Guidelines</span></i><span data-dcnode-id="7322" instrument_node=""> provide information on screening eligibility, timing, and frequency of screening and on screening for persons with risk factors (</span><i data-dcnode-id="7319"><a data-dcnode-id="7320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr5912a1.htm"><span data-dcnode-id="7321" instrument_node="">32</span></a></i><span data-dcnode-id="7318" instrument_node="">)). If STD screening guidelines have been followed, most women do not need additional STD screening at the time of IUD insertion. If a woman has not been screened according to guidelines, screening can be performed at the time of IUD insertion and insertion should not be delayed. Women with purulent cervicitis or current chlamydial infection or gonorrhea should not undergo IUD insertion (U.S. MEC 4). Women who have a very high individual likelihood of STD exposure (e.g., those with a currently infected partner) generally should not undergo IUD insertion (U.S. MEC 3) (</span><i data-dcnode-id="7315"><a data-dcnode-id="7316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7317" instrument_node="">5</span></a></i><span data-dcnode-id="7314" instrument_node="">). For these women, IUD insertion should be delayed until appropriate testing and treatment occur.  A systematic review did not identify any evidence regarding women who were screened versus not screened for STDs before IUD insertion (</span><i data-dcnode-id="7312"><span data-dcnode-id="7313" instrument_node="">14</span></i><span data-dcnode-id="7311" instrument_node="">). Although women with STDs at the time of IUD insertion have a higher risk for PID, the overall rate of PID among all IUD users is low (</span><i data-dcnode-id="7309"><span data-dcnode-id="7310" instrument_node="">63</span></i><span data-dcnode-id="7308" instrument_node="">,</span><i data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">64</span></i><span data-dcnode-id="7305" instrument_node="">).</span></p><span data-dcnode-id="7303" instrument_node="">
</span><p data-dcnode-id="7274"><b data-dcnode-id="7301"><span data-dcnode-id="7302" instrument_node="">Hemoglobin:</span></b><span data-dcnode-id="7300" instrument_node=""> Women with iron-deficiency anemia can use the LNG-IUD (U.S. MEC 1) (</span><i data-dcnode-id="7297"><a data-dcnode-id="7298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7299" instrument_node="">5</span></a></i><span data-dcnode-id="7296" instrument_node="">); therefore, screening for anemia is not necessary for safe initiation of the LNG-IUD. Women with iron-deficiency anemia generally can use the Cu-IUD (U.S. MEC 2). Measurement of hemoglobin before initiation of Cu-IUDs is not necessary because of the minimal change in hemoglobin among women with and without anemia using Cu-IUDs. A systematic review identified four studies that provided direct evidence for changes in hemoglobin among women with anemia who received Cu-IUDs (</span><i data-dcnode-id="7294"><span data-dcnode-id="7295" instrument_node="">30</span></i><span data-dcnode-id="7293" instrument_node="">). Evidence from one randomized trial (</span><i data-dcnode-id="7291"><span data-dcnode-id="7292" instrument_node="">65</span></i><span data-dcnode-id="7290" instrument_node="">) and one prospective cohort study (</span><i data-dcnode-id="7288"><span data-dcnode-id="7289" instrument_node="">66</span></i><span data-dcnode-id="7287" instrument_node="">) showed no significant changes in hemoglobin among Cu-IUD users with anemia, whereas two prospective cohort studies (</span><i data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">67</span></i><span data-dcnode-id="7284" instrument_node="">,</span><i data-dcnode-id="7282"><span data-dcnode-id="7283" instrument_node="">68</span></i><span data-dcnode-id="7281" instrument_node="">) showed a statistically significant decrease in hemoglobin levels during 12 months of follow-up; however, the magnitude of the decrease was small and most likely not clinically significant. The systematic review also identified 21 studies that provided indirect evidence by examining changes in hemoglobin among healthy women receiving Cu-IUDs (</span><i data-dcnode-id="7279"><span data-dcnode-id="7280" instrument_node="">69</span></i><span data-dcnode-id="7278" instrument_node="">–</span><i data-dcnode-id="7276"><span data-dcnode-id="7277" instrument_node="">89</span></i><span data-dcnode-id="7275" instrument_node="">), which generally showed no clinically significant changes in hemoglobin levels with up to 5 years of follow-up (Level of evidence: I to II-2, fair, direct).</span></p><span data-dcnode-id="7273" instrument_node="">
</span><p data-dcnode-id="7243"><b data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node="">Liver enzymes:</span></b><span data-dcnode-id="7270" instrument_node=""> Women with liver disease can use the Cu-IUD (U.S. MEC 1) (</span><i data-dcnode-id="7267"><a data-dcnode-id="7268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7269" instrument_node="">5</span></a></i><span data-dcnode-id="7266" instrument_node="">); therefore, screening for liver disease is not necessary for the safe initiation of the Cu-IUD. Although women with certain liver diseases generally should not use the LNG-IUD (U.S. MEC 3) (</span><i data-dcnode-id="7263"><a data-dcnode-id="7264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/mmwr/preview/mmwrhtml/rr59e0528a1.htm"><span data-dcnode-id="7265" instrument_node="">5</span></a></i><span data-dcnode-id="7262" instrument_node="">), screening for liver disease before initiation of the LNG-IUD is not necessary because of the low prevalence of these conditions and the high likelihood that women with liver disease already would have had the condition diagnosed. A systematic review did not identify any evidence regarding outcomes among women who were screened versus not screened with liver enzyme tests before initiation of hormonal contraceptive use (</span><i data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">14</span></i><span data-dcnode-id="7259" instrument_node="">). The prevalence of liver disorders among women of reproductive age is low. In 2008, among adults aged 18–44 years, the percentage with liver disease (not further specified) was 1.0% (</span><i data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">90</span></i><span data-dcnode-id="7256" instrument_node="">). In 2009, the incidence of acute hepatitis A, B, or C among women was &lt;1 per 100,000 population (</span><i data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">91</span></i><span data-dcnode-id="7253" instrument_node="">). During 1998–2007, the incidence of liver carcinoma among women was approximately 3 per 100,000 population (</span><i data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">92</span></i><span data-dcnode-id="7250" instrument_node="">). Because estrogen and progestins are metabolized in the liver, the use of hormonal contraceptives among women with liver disease might, theoretically, be a concern. The use of hormonal contraceptives, specifically COCs and POPs, does not affect disease progression or severity in women with hepatitis, cirrhosis, or benign focal nodular hyperplasia (</span><i data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">93</span></i><span data-dcnode-id="7247" instrument_node="">,</span><i data-dcnode-id="7245"><span data-dcnode-id="7246" instrument_node="">94</span></i><span data-dcnode-id="7244" instrument_node="">), although evidence is limited, and no evidence exists for the LNG-IUD. </span></p><span data-dcnode-id="7242" instrument_node="">
