</span><h1 data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Vasectomy Venue</span></h1><span data-dcnode-id="374" instrument_node="">
</span><h2 data-dcnode-id="370"><span data-dcnode-id="373" instrument_node="">Vasectomy Clinic Southport Gold Coast </span><abbrev data-dcnode-id="371" title="Queensland"><span data-dcnode-id="372" instrument_node="">QLD</span></abbrev></h2><span data-dcnode-id="369" instrument_node="">
</span><div class="imagefloatcontainer" data-dcnode-id="366"><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomyvenue.com.au/HealthHQ-Vasectomy-Venue-Sophie-Monk-voiceover-Ad.mp3" target="_blank"><img alt="Sophie Monk stars in the new Vasectomy Venue Radio Ad" data-dcnode-id="368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomyvenue.com.au/images/vasectomy-venue-radio-ad-sophie-monk-thumbskyline.jpg&amp;raw" title="Click to hear Sophie Monk in the new Vasectomy Venue Radio Ad"></a></div><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="361"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Vasectomy is a minor surgical procedure</span></strong><span data-dcnode-id="362" instrument_node=""> performed in order to block the passage of sperm from the testes and therefore to provide a very effective and permanent method of birth control.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="359" instrument_node="">There are variations in the technique performed. The doctor who will perform the vasectomy at the Vasectomy Venue Southport is Dr Matthew Valentine who uses the latest vasectomy improvement which is called either the  </span><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">no scalpel vasectomy technique</span></strong><span data-dcnode-id="356" instrument_node="">, or </span><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">keyhole vasectomy,</span></strong><span data-dcnode-id="353" instrument_node=""> or an </span><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">open ended vasectomy</span></strong><span data-dcnode-id="350" instrument_node="">. </span><br data-dcnode-id="349"><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node="">

Read more about the </span><br data-dcnode-id="346"><br data-dcnode-id="345"><strong data-dcnode-id="342"><a class="btn btn-primary-outline" data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomyvenue.com.au/vasectomy-information.html%23noscalpel"><span data-dcnode-id="344" instrument_node="">no scalpel vasectomy.</span></a></strong></p><br data-dcnode-id="340"><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">
</span><h3 class="faq" data-dcnode-id="336" id="drvalentine"><span data-dcnode-id="337" instrument_node="">Dr Matthew Valentine</span></h3><span data-dcnode-id="335" instrument_node="">
</span><div class="imagefloatcontainer" data-dcnode-id="331"><img alt="Dr Matthew Valentine" data-dcnode-id="334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomyvenue.com.au/images/dr-matthew-valentine.jpg&amp;raw" title="Dr Matthew Valentine"><p class="caption no border" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Dr Matthew Valentine</span></p></div><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="329" instrument_node="">
</span><a class="bookingstyle" data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotdoc.com.au/medical-centres/southport-QLD-4215/health-hq/doctors/dr-matthew-valentine" rel="noopener" target="_blank"><span data-dcnode-id="328" instrument_node="">Make an online booking with Dr Valentine now</span></a><br data-dcnode-id="326"><br data-dcnode-id="325"><span data-dcnode-id="324" instrument_node="">
</span><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Dr Matthew Valentine</span></strong><span data-dcnode-id="321" instrument_node=""> joined Vasectomy Venue in 2021.</span><br data-dcnode-id="320"><br data-dcnode-id="319"><span data-dcnode-id="318" instrument_node="">
Dr Valentine is a general Practitioner (GP) and fellow of the Royal College of General Practitioners.  He graduated from the University of Adelaide (AU) in 2000 and joined the Royal Australian Air Force as a medical officer until 2007 when he entered civilian General Practice.</span><br data-dcnode-id="317"><br data-dcnode-id="316"><span data-dcnode-id="315" instrument_node="">
</span><strong data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">To date Dr Valentine has completed over 5000 vasectomy procedures</span></strong><span data-dcnode-id="312" instrument_node=""> and has been performing vasectomies in Brisbane, on the Gold Coast and in regional QLD since 2008.</span><br data-dcnode-id="311"><br data-dcnode-id="310"><span data-dcnode-id="309" instrument_node="">

Dr Valentine was initially trained in the traditional vasectomy technique, but after completing further training in the USA he now uses the No Scalpel Open Ended Vasectomy technique which research has shown has better outcomes.</span><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">*</span></strong><sup data-dcnode-id="304"><a data-dcnode-id="305" href="#citenotespdt"><span data-dcnode-id="306" instrument_node="">[1][2][3]</span></a></sup><br data-dcnode-id="303"><span data-dcnode-id="302" instrument_node="">
</span><span data-dcnode-id="298" style="font-size:smaller"><strong data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">*</span></strong><span data-dcnode-id="299" instrument_node="">
The no‐scalpel approach to the vas resulted in less bleeding, hematoma, infection, and pain as well as a shorter operation time than the traditional incision technique. No difference in effectiveness was found between the two approaches.</span></span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="295" instrument_node="">The vas deferens cord is cut and sealed at one end and </span><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">no stitches are required</span></strong><span data-dcnode-id="292" instrument_node="">.</span><br data-dcnode-id="291"><span data-dcnode-id="290" instrument_node="">
</span><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">
The open ended no scalpel vasectomy is being adopted as the preferred technique because it has fewer complications.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="282"><strong data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Vasectomy should be considered permanent contraception</span></strong><span data-dcnode-id="283" instrument_node="">. It can be reversed, and sperm can be stored beforehand, and sperm can also be aspirated from the testes post vasectomy. These options are not guaranteed to work, plus they are expensive and  complicated and therefore should not be considered amongst reasons to proceed with getting a vasectomy.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="277"><strong data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Please remember vasectomy is not immediately effective</span></strong><span data-dcnode-id="278" instrument_node="">. Follow up semen samples are required to ensure sperm clearance. Contraception must continue until you are advised the semen is clear.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="272"><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Vasectomy is contraception only</span></strong><span data-dcnode-id="273" instrument_node="">. You should expect to have normal testes, hormones, erections, ejaculation and libido after the procedure. Many men claim their sex life is better once the worry of pregnancy risk is removed.</span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="267"><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Vasectomy is effective contraception</span></strong><span data-dcnode-id="268" instrument_node="">. It is generally accepted that vasectomy failure rates are around one in one thousand because of spontaneous rejoining and opening of the tube. This is many times safer than hormonal or barrier contraception methods.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">You should expect the procedure to go smoothly. Complications are few and unlikely.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Some of these include: bleeding, infection, reactions to the drugs given, sperm granuloma – small nodules related to sperm leak from the cut end of the vas deferens and post vasectomy pain syndrome can occur, but usually resolves spontaneously. Long term problems like heart disease and cancers of the prostate and testes have not been shown to be related to vasectomy.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="256"><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">What about pain during vasectomy?</span></strong><span data-dcnode-id="257" instrument_node=""> We take great care to prevent this. You will be given some sedation and pain relieving medications and some local anaesthetic to ensure you are relaxed and comfortable throughout this 20-30 minute procedure. Some men prefer to have local anaesthetic only so they can drive home.</span></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="248"><strong data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Before your vasectomy</span></strong><span data-dcnode-id="252" instrument_node=""> a consultation to explain the procedure and to ensure you are a suitable candidate for no scalpel vasectomy is desirable. You should </span><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">shave the scrotum and pubic area</span></strong><span data-dcnode-id="249" instrument_node=""> and thoroughly clean the groin and scrotum. Food and fluid should be avoided 4 hours before the procedure</span></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="243"><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">After your vasectomy</span></strong><span data-dcnode-id="244" instrument_node=""> someone should drive you home. You should lie down on the day of the procedure, apply ice packs at intervals and plan an easy day the next day. Some men wish to drive home. This can be permitted if no sedation is given. Generally men having a vasectomy prefer to have some medication to relax and sedate them. Often this will mean sleeping through the vasectomy procedure.</span></p><span data-dcnode-id="242" instrument_node="">
