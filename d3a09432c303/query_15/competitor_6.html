</span><meta content="Vasectomy offers a safe, effective, and permanent method of male contraception, with an overall failure rate of less
than 1% in pooled studies. Men older than 30 years in a stable, committed relationship appear to be the best candidates
for vasectomy. The no-scalpel technique reduces operative complications, shortens operative time, and hastens
resumption of sexual activity. Use of a jet injector instead of a needle to provide local anesthesia (no-needle vasectomy)
may reduce pain. Bleeding and infection are short-term complications of vasectomy; long-term complications include
sperm granuloma and postvasectomy pain syndrome. One postvasectomy semen analysis demonstrating azoospermia
performed after three months and 20 ejaculations is sufficient to establish sterility. Vasectomy reversal is more likely to
be successful if performed less than 15 years after vasectomy and in men whose female partner is younger than 40 years." data-dcnode-id="2651" name="description"><span data-dcnode-id="2650" instrument_node="">

                            </span><span class="bold" data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Patient information</span></span><span data-dcnode-id="2115" instrument_node="">: A handout on vasectomy is available at </span><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//familydoctor.org/familydoctor/en/prevention-wellness/sex-birth-control/birth-control/vasectomy-what-to-expect.html"><span data-dcnode-id="2114" instrument_node="">https://familydoctor.org/familydoctor/en/prevention-wellness/sex-birth-control/birth-control/vasectomy-what-to-expect.html</span></a><span data-dcnode-id="2112" instrument_node="">.</span></p><p class="series-text CME" data-dcnode-id="2108" style="display:none;"><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afpquiz"><span data-dcnode-id="2110" instrument_node="">This clinical content conforms to AAFP criteria for continuing medical education (CME). See CME Quiz Questions.</span></a></p><div class="fn" data-dcnode-id="2105"><p class="fn" data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Author disclosure: No relevant financial affiliations.</span></p></div><div data-dcnode-id="2104" style="display:none;"></div><div class="noPrint articleSections" data-dcnode-id="2073"><h3 data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Article Sections</span></h3><ul data-dcnode-id="2074"><li data-dcnode-id="2099"><a alt="Abstract" data-dcnode-id="2100" href="#abstract"><span data-dcnode-id="2101" instrument_node="">
                                                Abstract
                                            </span></a></li><li data-dcnode-id="2096"><a data-dcnode-id="2097" href="#sec-1"><span data-dcnode-id="2098" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="2093"><a data-dcnode-id="2094" href="#sec-2"><span data-dcnode-id="2095" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="2090"><a data-dcnode-id="2091" href="#sec-3"><span data-dcnode-id="2092" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="2087"><a data-dcnode-id="2088" href="#sec-4"><span data-dcnode-id="2089" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="2084"><a data-dcnode-id="2085" href="#sec-5"><span data-dcnode-id="2086" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="2081"><a data-dcnode-id="2082" href="#sec-6"><span data-dcnode-id="2083" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="2078"><a data-dcnode-id="2079" href="#sec-7"><span data-dcnode-id="2080" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="2075"><a data-dcnode-id="2076" href="#ref-list-1" id="mobRefLink"><span data-dcnode-id="2077" instrument_node="">References</span></a></li></ul></div></div><div class="afpContent" data-dcnode-id="1238"><div class="abstract" data-dcnode-id="2069" id="abstract"><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Vasectomy offers a safe, effective, and permanent method of male contraception, with an overall failure rate of less than 1% in pooled studies. Men older than 30 years in a stable, committed relationship appear to be the best candidates for vasectomy. The no-scalpel technique reduces operative complications, shortens operative time, and hastens resumption of sexual activity. Use of a jet injector instead of a needle to provide local anesthesia (no-needle vasectomy) may reduce pain. Bleeding and infection are short-term complications of vasectomy; long-term complications include sperm granuloma and postvasectomy pain syndrome. One postvasectomy semen analysis demonstrating azoospermia performed after three months and 20 ejaculations is sufficient to establish sterility. Vasectomy reversal is more likely to be successful if performed less than 15 years after vasectomy and in men whose female partner is younger than 40 years.
</span></p></div><p data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node="">Vasectomy is a safe, reliable, and cost-effective option for permanent contraception in men. Of the more than 525,000 vasectomies done each year in the United States, family physicians perform approximately 13%.</span><a class="superscript bibrRef" data-dcnode-id="2066" href="#afp20131201p757-b1"><span data-dcnode-id="2067" instrument_node="">1</span></a><span data-dcnode-id="2065" instrument_node=""> This article reviews common questions about vasectomy and presents evidence-based answers.</span></p><div class="table-format" data-dcnode-id="1922" id="afp20131201p757-ut1"><div class="calltoactionbox" data-dcnode-id="1923"><div class="jDialog highlights" data-dcnode-id="1924"><div class="container secondary" data-dcnode-id="1925"><div class="jDialogPrintHide" data-dcnode-id="1988"><p data-dcnode-id="2050" style="font-size:14px;text-align:right;margin-bottom:6px;margin-top:4px;color:#000;"><i aria-hidden="true" class="fa fa-expand phone-hide" data-dcnode-id="2061" style="padding:2px;border:1px solid;border-radius:3px;"><span data-dcnode-id="2062" style="display:none"><span data-dcnode-id="2063" instrument_node="">&nbsp;</span></span></i><span data-dcnode-id="2060" instrument_node="">&nbsp;</span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/hi-res/afp20131201p757-ut1.gif" id="afp20131201p757-ut1-enlarge

        "><span data-dcnode-id="1872" instrument_node="">BEST PRACTICES IN SURGERY: RECOMMENDATIONS FROM THE CHOOSING WISELY CAMPAIGN</span></h4><table class="cw no-mobile-table" data-dcnode-id="1852"><thead data-dcnode-id="1861"><tr data-dcnode-id="1862"><th align="left" class="th" colspan="1" data-dcnode-id="1867" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1868"><span class="italic" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Recommendation</span></span></span></th><th align="left" class="th" colspan="1" data-dcnode-id="1863" rowspan="1" valign="bottom"><span class="italic" data-dcnode-id="1864"><span class="italic" data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Sponsoring organization</span></span></span></th></tr></thead><tbody data-dcnode-id="1853"><tr data-dcnode-id="1854"><td align="left" colspan="1" data-dcnode-id="1858" rowspan="1" valign="bottom"><p class="Tabledata" data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Avoid routine preoperative testing for low-risk surgeries without a clinical indication.</span></p></td><td align="left" colspan="1" data-dcnode-id="1855" rowspan="1" valign="bottom"><p class="Tabledata" data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">American Society for Clinical Pathology</span></p></td></tr></tbody></table><hr class="table-foot" data-dcnode-id="1851"><div class="table-foot" data-dcnode-id="1840"><div class="fn" data-dcnode-id="1841"><p class="fn" data-dcnode-id="1842"><span class="italic" data-dcnode-id="1844"><span data-dcnode-id="1850" instrument_node="">Source: For supporting citations, see </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/cw-table.pdf"><span data-dcnode-id="1849" instrument_node="">https://www.aafp.org/afp/cw-table.pdf</span></a><span data-dcnode-id="1847" instrument_node="">. For more information on the Choosing Wisely Campaign, see </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.choosingwisely.org/"><span data-dcnode-id="1846" instrument_node="">http://www.choosingwisely.org</span></a></span><span data-dcnode-id="1843" instrument_node="">.</span></p></div></div></div></div></div></div></div></div><div class="jSection" data-dcnode-id="1741" id="sec-1"><h2 data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></h2><div class="mjToggle noPrint" data-dcnode-id="1799"><div class="mjHeader noPrint" data-dcnode-id="1829"><span class="mobileSectionLink" data-dcnode-id="1830" style="margin:5px;"><span data-dcnode-id="1831" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1800" style="display: none;"><ul data-dcnode-id="1801"><li data-dcnode-id="1826"><a alt="Abstract" data-dcnode-id="1827" href="#abstract"><span data-dcnode-id="1828" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1823"><a data-dcnode-id="1824" href="#sec-1"><span data-dcnode-id="1825" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="1820"><a data-dcnode-id="1821" href="#sec-2"><span data-dcnode-id="1822" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="1817"><a data-dcnode-id="1818" href="#sec-3"><span data-dcnode-id="1819" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="1814"><a data-dcnode-id="1815" href="#sec-4"><span data-dcnode-id="1816" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="1811"><a data-dcnode-id="1812" href="#sec-5"><span data-dcnode-id="1813" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="1808"><a data-dcnode-id="1809" href="#sec-6"><span data-dcnode-id="1810" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="1805"><a data-dcnode-id="1806" href="#sec-7"><span data-dcnode-id="1807" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="1802"><a data-dcnode-id="1803" href="#ref-list-1"><span data-dcnode-id="1804" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1793"><span class="italic" data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">No-scalpel vasectomy, in contrast to the traditional incisional technique, is a minimally traumatic approach to accessing the vas deferens that reduces operative complications, shortens operative time, and hastens resumption of sexual activity. No-scalpel vasectomy is therefore the preferred technique</span></span><span data-dcnode-id="1796" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="1794" href="#afp20131201p757-b2"><span data-dcnode-id="1795" instrument_node="">2</span></a></p><h3 data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">EVIDENCE SUMMARY</span></h3><p data-dcnode-id="1777"><span data-dcnode-id="1790" instrument_node="">The traditional approach to accessing the vas deferens relies on a short scrotal skin incision made using a scalpel. Instead of making an incision, no-scalpel vasectomy uses a sharp, pointed hemostat </span><span class="italic" data-dcnode-id="1784"><span data-dcnode-id="1789" instrument_node="">(</span><span class="italic" data-dcnode-id="1786"><a data-dcnode-id="1787" href="#afp20131201p757-f1"><span data-dcnode-id="1788" instrument_node="">Figure 1</span></a></span><span data-dcnode-id="1785" instrument_node="">)</span></span><span data-dcnode-id="1783" instrument_node=""> to puncture a small opening in the scrotal skin. A systematic review of two randomized controlled trials (RCTs) demonstrated the superiority of no-scalpel vasectomy over the incisional method in decreasing clinically relevant outcomes such as intraoperative bleeding (odds ratio [OR] = 0.49), postoperative hematoma (OR = 0.23), perioperative pain (OR = 0.75), postoperative pain (OR = 0.63), and postsurgical infection (OR = 0.21).</span><a class="superscript bibrRef" data-dcnode-id="1781" href="#afp20131201p757-b2"><span data-dcnode-id="1782" instrument_node="">2</span></a><span data-dcnode-id="1780" instrument_node=""> Secondary outcomes such as shorter intraoperative time (OR = 2.4, six minutes or less; OR = 0.56, 11 minutes or more) and faster resumption of sexual activity were also better for no-scalpel vasectomy.</span><a class="superscript bibrRef" data-dcnode-id="1778" href="#afp20131201p757-b2"><span data-dcnode-id="1779" instrument_node="">2</span></a></p><div class="fig" data-dcnode-id="1742" id="afp20131201p757-f1"><div class="calltoactionbox" data-dcnode-id="1743"><div class="jDialog highlights" data-dcnode-id="1744"><div class="container secondary" data-dcnode-id="1745"><div class="jDialogPrintHide" data-dcnode-id="1755"><p class="print-icons-row" data-dcnode-id="1763"><i aria-hidden="true" class="fa fa-expand print-icon" data-dcnode-id="1774"><span data-dcnode-id="1775" style="display:none"><span data-dcnode-id="1776" instrument_node="">&nbsp;</span></span></i><span data-dcnode-id="1773" instrument_node="">&nbsp;</span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/hi-res/afp20131201p757-f1.jpg" id="afp20131201p757-f1-enlarge
                                    " target="_blank"><span data-dcnode-id="1772" instrument_node="">Enlarge
                                  </span></a><span data-dcnode-id="1770" instrument_node="">&nbsp;&nbsp;&nbsp;</span><i aria-hidden="true" class="fa fa-print print-icon" data-dcnode-id="1767"><span data-dcnode-id="1768" style="display:none"><span data-dcnode-id="1769" instrument_node="">&nbsp;</span></span></i><span data-dcnode-id="1766" instrument_node="">&nbsp;</span><a class="printInNewWin" data-dcnode-id="1764" id="afp20131201p757-f1-print

                                  </span></a></p><p data-dcnode-id="1761"><img data-dcnode-id="1762" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/afp20131201p757-f1.jpg&amp;raw" style="max-width:100%"></p><p class="fig-label" data-dcnode-id="1758"><b data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Figure 1.</span></b></p><p class="fig-caption" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Pointed hemostat for gaining access to the vas deferens using the no-scalpel vasectomy technique.</span></p></div><div class="jModal" data-dcnode-id="1746" name="afp20131201p757-f1"><div class="figModal" data-dcnode-id="1747"><img data-dcnode-id="1754" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/afp20131201p757-f1.jpg&amp;raw" style="max-width:none;max-height:none;"><hr data-dcnode-id="1753"><p class="fig-label" data-dcnode-id="1750"><b data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Figure 1.</span></b></p><p class="fig-caption" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Pointed hemostat for gaining access to the vas deferens using the no-scalpel vasectomy technique.</span></p></div></div></div></div></div></div></div><div class="jSection" data-dcnode-id="1652" id="sec-2"><h2 data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></h2><div class="mjToggle noPrint" data-dcnode-id="1706"><div class="mjHeader noPrint" data-dcnode-id="1736"><span class="mobileSectionLink" data-dcnode-id="1737" style="margin:5px;"><span data-dcnode-id="1738" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1707" style="display: none;"><ul data-dcnode-id="1708"><li data-dcnode-id="1733"><a alt="Abstract" data-dcnode-id="1734" href="#abstract"><span data-dcnode-id="1735" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1730"><a data-dcnode-id="1731" href="#sec-1"><span data-dcnode-id="1732" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="1727"><a data-dcnode-id="1728" href="#sec-2"><span data-dcnode-id="1729" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="1724"><a data-dcnode-id="1725" href="#sec-3"><span data-dcnode-id="1726" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="1721"><a data-dcnode-id="1722" href="#sec-4"><span data-dcnode-id="1723" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="1718"><a data-dcnode-id="1719" href="#sec-5"><span data-dcnode-id="1720" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="1715"><a data-dcnode-id="1716" href="#sec-6"><span data-dcnode-id="1717" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="1712"><a data-dcnode-id="1713" href="#sec-7"><span data-dcnode-id="1714" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="1709"><a data-dcnode-id="1710" href="#ref-list-1"><span data-dcnode-id="1711" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1702"><span class="italic" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">No-needle vasectomy involves an alternative technique of administering local anesthesia using a high-pressure jet injector. It may reduce pain associated with local anesthetic infiltration</span></span><span data-dcnode-id="1703" instrument_node="">.</span></p><h3 data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">EVIDENCE SUMMARY</span></h3><p data-dcnode-id="1688"><span data-dcnode-id="1699" instrument_node="">No-needle vasectomy is an increasingly popular alternative to the standard local infiltration technique that uses a hypodermic needle. This technique uses a jet injection device </span><span class="italic" data-dcnode-id="1693"><span data-dcnode-id="1698" instrument_node="">(</span><span class="italic" data-dcnode-id="1695"><a data-dcnode-id="1696" href="#afp20131201p757-f2"><span data-dcnode-id="1697" instrument_node="">Figure 2</span></a></span><span data-dcnode-id="1694" instrument_node="">)</span></span><span data-dcnode-id="1692" instrument_node=""> to deliver high-pressure anesthetic spray through intact skin and into the vas and surrounding tissues. A small single-blind RCT involving 50 patients demonstrated a statistically significant improvement in pain from anesthetic administration with no-needle vasectomy compared with needle injection. However, there was no difference in intraoperative pain between the two techniques.</span><a class="superscript bibrRef" data-dcnode-id="1690" href="#afp20131201p757-b3"><span data-dcnode-id="1691" instrument_node="">3</span></a><span data-dcnode-id="1689" instrument_node=""> Although the jet injector can prevent injury from needlestick and eliminate the burden of syringe and needle disposal, its disadvantages include the initial cost of the device and the potential for inadvertent self-injection of the physician's middle finger through a scrotal exit wound created by the high-pressure spray when using the three-finger technique for vas isolation.</span></p><div class="fig" data-dcnode-id="1653" id="afp20131201p757-f2"><div class="calltoactionbox" data-dcnode-id="1654"><div class="jDialog highlights" data-dcnode-id="1655"><div class="container secondary" data-dcnode-id="1656"><div class="jDialogPrintHide" data-dcnode-id="1666"><p class="print-icons-row" data-dcnode-id="1674"><i aria-hidden="true" class="fa fa-expand print-icon" data-dcnode-id="1685"><span data-dcnode-id="1686" style="display:none"><span data-dcnode-id="1687" instrument_node="">&nbsp;</span></span></i><span data-dcnode-id="1684" instrument_node="">&nbsp;</span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/hi-res/afp20131201p757-f2.jpg" id="afp20131201p757-f2-enlarge
                                    " target="_blank"><span data-dcnode-id="1683" instrument_node="">Enlarge
                                  </span></a><span data-dcnode-id="1681" instrument_node="">&nbsp;&nbsp;&nbsp;</span><i aria-hidden="true" class="fa fa-print print-icon" data-dcnode-id="1678"><span data-dcnode-id="1679" style="display:none"><span data-dcnode-id="1680" instrument_node="">&nbsp;</span></span></i><span data-dcnode-id="1677" instrument_node="">&nbsp;</span><a class="printInNewWin" data-dcnode-id="1675" id="afp20131201p757-f2-print
                                    " name="afp20131201p757-f2.jpg" onclick="thisSource = 'https://www.aafp.org/afp/2013/1201/hi-res/'  + $(this).attr('name');javascript:printImage();" style="cursor:pointer;" target="_blank"><span data-dcnode-id="1676" instrument_node="">Print
                                  </span></a></p><p data-dcnode-id="1672"><img data-dcnode-id="1673" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/afp20131201p757-f2.jpg&amp;raw" style="max-width:100%"></p><p class="fig-label" data-dcnode-id="1669"><b data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Figure 2.</span></b></p><p class="fig-caption" data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">High-pressure jet injector for delivering anesthetic spray during no-needle vasectomy procedure.</span></p></div><div class="jModal" data-dcnode-id="1657" name="afp20131201p757-f2"><div class="figModal" data-dcnode-id="1658"><img data-dcnode-id="1665" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/afp20131201p757-f2.jpg&amp;raw" style="max-width:none;max-height:none;"><hr data-dcnode-id="1664"><p class="fig-label" data-dcnode-id="1661"><b data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Figure 2.</span></b></p><p class="fig-caption" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">High-pressure jet injector for delivering anesthetic spray during no-needle vasectomy procedure.</span></p></div></div></div></div></div></div></div><div class="jSection" data-dcnode-id="1531" id="sec-3"><h2 data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">How Effective Is Vasectomy?</span></h2><div class="mjToggle noPrint" data-dcnode-id="1617"><div class="mjHeader noPrint" data-dcnode-id="1647"><span class="mobileSectionLink" data-dcnode-id="1648" style="margin:5px;"><span data-dcnode-id="1649" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1618" style="display: none;"><ul data-dcnode-id="1619"><li data-dcnode-id="1644"><a alt="Abstract" data-dcnode-id="1645" href="#abstract"><span data-dcnode-id="1646" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1641"><a data-dcnode-id="1642" href="#sec-1"><span data-dcnode-id="1643" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="1638"><a data-dcnode-id="1639" href="#sec-2"><span data-dcnode-id="1640" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="1635"><a data-dcnode-id="1636" href="#sec-3"><span data-dcnode-id="1637" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="1632"><a data-dcnode-id="1633" href="#sec-4"><span data-dcnode-id="1634" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="1629"><a data-dcnode-id="1630" href="#sec-5"><span data-dcnode-id="1631" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="1626"><a data-dcnode-id="1627" href="#sec-6"><span data-dcnode-id="1628" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="1623"><a data-dcnode-id="1624" href="#sec-7"><span data-dcnode-id="1625" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="1620"><a data-dcnode-id="1621" href="#ref-list-1"><span data-dcnode-id="1622" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1603"><span class="italic" data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Vasectomy is the most effective and the only permanent method of male contraception, with a failure rate of less than 1% in pooled studies</span></span><span data-dcnode-id="1614" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="1612" href="#afp20131201p757-b4"><span data-dcnode-id="1613" instrument_node="">4</span></a><span class="superscript" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1608" href="#afp20131201p757-b5"><span data-dcnode-id="1609" instrument_node="">5</span></a><span data-dcnode-id="1607" instrument_node=""> </span><span class="italic" data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node=""> Management of the vasal ends, which determines the procedure's effectiveness, can be accomplished in various ways but fascial interposition should be used routinely because it decreases vasectomy failure rates significantly</span></span><span data-dcnode-id="1604" instrument_node="">.</span></p><h3 data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">EVIDENCE SUMMARY</span></h3><p data-dcnode-id="1581"><span data-dcnode-id="1600" instrument_node="">A systematic review of six RCTs demonstrated no difference in failure rate between the ligation and excision technique compared with vas occlusion with surgical clips (without transection of the vas).</span><a class="superscript bibrRef" data-dcnode-id="1598" href="#afp20131201p757-b6"><span data-dcnode-id="1599" instrument_node="">6</span></a><span data-dcnode-id="1597" instrument_node=""> The same study evaluated the effects of fascial interposition </span><span class="italic" data-dcnode-id="1592"><span data-dcnode-id="1596" instrument_node="">(</span><span class="italic" data-dcnode-id="1593"><a data-dcnode-id="1594" href="#afp20131201p757-f3"><span data-dcnode-id="1595" instrument_node="">Figure 3</span></a></span></span><a class="superscript bibrRef" data-dcnode-id="1590" href="#afp20131201p757-b7"><span data-dcnode-id="1591" instrument_node="">7</span></a><span class="italic" data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">)</span></span><span data-dcnode-id="1587" instrument_node="">, a method of burying one vasal end within the vasal sheath or surrounding connective tissue to separate the anatomic plane between the two vasal ends, hence minimizing the risk of recanalization. Fascial interposition was found to significantly reduce vasectomy failure at 34 weeks compared with no fascial interposition (OR = 0.42); however, it lengthened the operative time by two to three minutes.</span><a class="superscript bibrRef" data-dcnode-id="1585" href="#afp20131201p757-b6"><span data-dcnode-id="1586" instrument_node="">6</span></a><span data-dcnode-id="1584" instrument_node=""> Vas irrigation with water (vs. no water) or with spermicidal agent (vs. water) has not been shown to decrease vasectomy failure rates. No RCT has evaluated the effectiveness of fulguration or electrocautery to occlude the vasal ends, or examined leaving the vasal ends open (without the use of sutures, clips, or fulguration).</span><a class="superscript bibrRef" data-dcnode-id="1582" href="#afp20131201p757-b6"><span data-dcnode-id="1583" instrument_node="">6</span></a></p><div class="fig" data-dcnode-id="1532" id="afp20131201p757-f3"><div class="calltoactionbox" data-dcnode-id="1533"><div class="jDialog highlights" data-dcnode-id="1534"><div class="container secondary" data-dcnode-id="1535"><div class="jDialogPrintHide" data-dcnode-id="1552"><p class="print-icons-row" data-dcnode-id="1567"><i aria-hidden="true" class="fa fa-expand print-icon" data-dcnode-id="1578"><span data-dcnode-id="1579" style="display:none"><span data-dcnode-id="1580" instrument_node="">&nbsp;</span></span></i><span data-dcnode-id="1577" instrument_node="">&nbsp;</span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/hi-res/afp20131201p757-f3.jpg" id="afp20131201p757-f3-enlarge
                                    " target="_blank"><span data-dcnode-id="1576" instrument_node="">Enlarge

                                  </span></a></p><p data-dcnode-id="1565"><img data-dcnode-id="1566" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/afp20131201p757-f3.jpg&amp;raw" style="max-width:100%"></p><p class="fig-label" data-dcnode-id="1562"><b data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Figure 3.</span></b></p><p class="fig-caption" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Fascial interposition for managing vasal ends.</span></p><p class="fig-caption" data-dcnode-id="1553"><span class="italic" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Adapted with permission from Dassow P, Bennett JM. Vasectomy: an update</span></span><span data-dcnode-id="1557" instrument_node="">. Am Fam Physician. </span><span class="italic" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">2006;74(12):2072</span></span><span data-dcnode-id="1554" instrument_node="">.</span></p></div><div class="jModal" data-dcnode-id="1536" name="afp20131201p757-f3"><div class="figModal" data-dcnode-id="1537"><img data-dcnode-id="1551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2013/1201/afp20131201p757-f3.jpg&amp;raw" style="max-width:none;max-height:none;"><hr data-dcnode-id="1550"><p class="fig-label" data-dcnode-id="1547"><b data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Figure 3.</span></b></p><p class="fig-caption" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Fascial interposition for managing vasal ends.</span></p><p class="fig-caption" data-dcnode-id="1538"><span class="italic" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Adapted with permission from Dassow P, Bennett JM. Vasectomy: an update</span></span><span data-dcnode-id="1542" instrument_node="">. Am Fam Physician. </span><span class="italic" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">2006;74(12):2072</span></span><span data-dcnode-id="1539" instrument_node="">.</span></p></div></div></div></div></div></div></div><div class="jSection" data-dcnode-id="1469" id="sec-4"><h2 data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">What Are the Complications of Vasectomy?</span></h2><div class="mjToggle noPrint" data-dcnode-id="1496"><div class="mjHeader noPrint" data-dcnode-id="1526"><span class="mobileSectionLink" data-dcnode-id="1527" style="margin:5px;"><span data-dcnode-id="1528" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1497" style="display: none;"><ul data-dcnode-id="1498"><li data-dcnode-id="1523"><a alt="Abstract" data-dcnode-id="1524" href="#abstract"><span data-dcnode-id="1525" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1520"><a data-dcnode-id="1521" href="#sec-1"><span data-dcnode-id="1522" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="1517"><a data-dcnode-id="1518" href="#sec-2"><span data-dcnode-id="1519" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="1514"><a data-dcnode-id="1515" href="#sec-3"><span data-dcnode-id="1516" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="1511"><a data-dcnode-id="1512" href="#sec-4"><span data-dcnode-id="1513" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="1508"><a data-dcnode-id="1509" href="#sec-5"><span data-dcnode-id="1510" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="1505"><a data-dcnode-id="1506" href="#sec-6"><span data-dcnode-id="1507" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="1502"><a data-dcnode-id="1503" href="#sec-7"><span data-dcnode-id="1504" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="1499"><a data-dcnode-id="1500" href="#ref-list-1"><span data-dcnode-id="1501" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1492"><span class="italic" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Bleeding and infection are short-term complications of vasectomy; long-term complications include sperm granuloma and postvasectomy pain syndrome</span></span><span data-dcnode-id="1493" instrument_node="">.</span></p><h3 data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">EVIDENCE SUMMARY</span></h3><p data-dcnode-id="1483"><span data-dcnode-id="1489" instrument_node="">Bleeding and hematoma formation, the most common complications of vasectomy, often result from injury to the pampiniform venous plexus. Perioperative bleeding occurs in 2.4% of no-scalpel vasectomies and 4.0% of incisional vasectomies, whereas hematoma occurs in 2.4% of no-scalpel vasectomies and 12.5% of incisional vasectomies.</span><a class="superscript bibrRef" data-dcnode-id="1487" href="#afp20131201p757-b2"><span data-dcnode-id="1488" instrument_node="">2</span></a><span data-dcnode-id="1486" instrument_node=""> In extreme cases, these complications can lead to significant morbidity necessitating surgical interventions such as hemostasis, scrotal exploration, and hematoma evacuation. Postoperative infection occurs in 0.7% of no-scalpel vasectomies and 2.2% of incisional vasectomies.</span><a class="superscript bibrRef" data-dcnode-id="1484" href="#afp20131201p757-b2"><span data-dcnode-id="1485" instrument_node="">2</span></a></p><p data-dcnode-id="1479"><span data-dcnode-id="1482" instrument_node="">A sperm granuloma forms as an immunologic reaction to the extravasation of sperm from the testicular vasal end. This process is hypothesized to be protective because it prevents epididymal and testicular obstruction. Although most sperm granulomas are not painful and often disappear over time, they are believed to play a role in postvasectomy pain syndrome and recanalization during vasectomy failure.</span><a class="superscript bibrRef" data-dcnode-id="1480" href="#afp20131201p757-b8"><span data-dcnode-id="1481" instrument_node="">8</span></a></p><p data-dcnode-id="1470"><span data-dcnode-id="1478" instrument_node="">Postvasectomy pain syndrome is persistent or recurrent scrotal pain that occurs months or years after vasectomy. It is thought to be caused by underlying chronic epididymal congestion. Recent studies estimate the incidence of severe postvasectomy pain syndrome to be between 1% and 6%.</span><a class="superscript bibrRef" data-dcnode-id="1476" href="#afp20131201p757-b9"><span data-dcnode-id="1477" instrument_node="">9</span></a><span class="superscript" data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1472" href="#afp20131201p757-b10"><span data-dcnode-id="1473" instrument_node="">10</span></a><span data-dcnode-id="1471" instrument_node=""> Mild postvasectomy pain syndrome is treated symptomatically, whereas severe cases may require vasectomy reversal.</span></p></div><div class="jSection" data-dcnode-id="1388" id="sec-5"><h2 data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></h2><div class="mjToggle noPrint" data-dcnode-id="1434"><div class="mjHeader noPrint" data-dcnode-id="1464"><span class="mobileSectionLink" data-dcnode-id="1465" style="margin:5px;"><span data-dcnode-id="1466" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1435" style="display: none;"><ul data-dcnode-id="1436"><li data-dcnode-id="1461"><a alt="Abstract" data-dcnode-id="1462" href="#abstract"><span data-dcnode-id="1463" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1458"><a data-dcnode-id="1459" href="#sec-1"><span data-dcnode-id="1460" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="1455"><a data-dcnode-id="1456" href="#sec-2"><span data-dcnode-id="1457" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="1452"><a data-dcnode-id="1453" href="#sec-3"><span data-dcnode-id="1454" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="1449"><a data-dcnode-id="1450" href="#sec-4"><span data-dcnode-id="1451" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="1446"><a data-dcnode-id="1447" href="#sec-5"><span data-dcnode-id="1448" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="1443"><a data-dcnode-id="1444" href="#sec-6"><span data-dcnode-id="1445" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="1440"><a data-dcnode-id="1441" href="#sec-7"><span data-dcnode-id="1442" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="1437"><a data-dcnode-id="1438" href="#ref-list-1"><span data-dcnode-id="1439" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1424"><span class="italic" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">One postvasectomy semen analysis demonstrating azoospermia performed after three months and 20 ejaculations is sufficient to establish sterility</span></span><span data-dcnode-id="1431" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="1429" href="#afp20131201p757-b4"><span data-dcnode-id="1430" instrument_node="">4</span></a><span data-dcnode-id="1428" instrument_node=""> </span><span class="italic" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node=""> The entire ejaculate should be obtained after a period of abstinence of two days (but no more than seven days), kept at body temperature, transported within 60 minutes of collection, and analyzed in the laboratory within four hours of ejaculation</span></span><span data-dcnode-id="1425" instrument_node="">.</span></p><h3 data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">EVIDENCE SUMMARY</span></h3><p data-dcnode-id="1408"><span data-dcnode-id="1421" instrument_node="">The lack of standardized postvasectomy semen analysis protocols in vasectomy studies has made it difficult to accurately measure failure rates. A systematic review of 56 studies suggested that about 80% of patients achieve azoospermia three months after vasectomy and after 11 to 20 ejaculations.</span><a class="superscript bibrRef" data-dcnode-id="1419" href="#afp20131201p757-b4"><span data-dcnode-id="1420" instrument_node="">4</span></a><span data-dcnode-id="1418" instrument_node=""> A small number of patients (1.4%) had persistent nonmotile sperm after vasectomy; some eventually achieved azoospermia.</span><a class="superscript bibrRef" data-dcnode-id="1416" href="#afp20131201p757-b4"><span data-dcnode-id="1417" instrument_node="">4</span></a><span data-dcnode-id="1415" instrument_node=""> The British Andrology Society recommends that patients with persistent nonmotile sperm undergo monthly postvasectomy semen analysis until one test demonstrates azoospermia or two consecutive tests demonstrate low numbers of nonmotile sperm (&lt; 100,000 per mL) and seven months have elapsed since vasectomy. The latter group may also stop using contraception because the probability of pregnancy is extremely low.</span><a class="superscript bibrRef" data-dcnode-id="1413" href="#afp20131201p757-b5"><span data-dcnode-id="1414" instrument_node="">5</span></a><span class="superscript" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1409" href="#afp20131201p757-b11"><span data-dcnode-id="1410" instrument_node="">11</span></a></p><p data-dcnode-id="1404"><span data-dcnode-id="1407" instrument_node="">Assuming vasal disruption and occlusion have been adequately achieved during surgery, and assuming the patient adheres to using another contraceptive method while awaiting confirmation of sterility, true causes of vasectomy failure include recanalization (early and late) and, more rarely, aberrant anatomy (e.g., the presence of a third vas). The presence of motile spermatozoa during the three-month postvasectomy semen analysis likely represents vasectomy failure and should be confirmed with another semen analysis one month later. Once motile spermatozoa are reconfirmed, patients should be notified and repeat vasectomy recommended. Recanalization following vasectomy is rare (0.4%) and pregnancy is even rarer (0.07%).</span><a class="superscript bibrRef" data-dcnode-id="1405" href="#afp20131201p757-b4"><span data-dcnode-id="1406" instrument_node="">4</span></a></p><p data-dcnode-id="1396"><span data-dcnode-id="1403" instrument_node="">According to World Health Organization protocols, the entire ejaculate should be obtained by masturbation after a period of abstinence of two days (but no more than seven days), collected in a nontoxic container, kept at body temperature at all times, transported within 60 minutes of collection, and analyzed in the laboratory within four hours of ejaculation. Exceptions to this rigorous protocol can be made if there are extenuating circumstances. However, if sperm motility needs to be verified, this protocol must be followed exactly.</span><a class="superscript bibrRef" data-dcnode-id="1401" href="#afp20131201p757-b5"><span data-dcnode-id="1402" instrument_node="">5</span></a><span class="superscript" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1397" href="#afp20131201p757-b12"><span data-dcnode-id="1398" instrument_node="">12</span></a></p><p data-dcnode-id="1389"><span data-dcnode-id="1395" instrument_node="">A common issue with postvasectomy semen analysis is compliance. In a review of 29 studies, a median of 19% of patients (range: 0% to 63%) failed to provide any semen sample. Of those who sent a semen sample, a median of 5% (range: 0% to 41%) only partially complied with the instructions.</span><a class="superscript bibrRef" data-dcnode-id="1393" href="#afp20131201p757-b4"><span data-dcnode-id="1394" instrument_node="">4</span></a><span data-dcnode-id="1392" instrument_node=""> In response to this compliance issue, a novel, qualitative home test has been developed that can accurately detect sperm counts &lt; 250,000 per mL (positive predictive value = 93%; negative predictive value = 97%). Although approved by the U.S. Food and Drug Administration, this test cannot assess sperm motility and is not yet supported by robust patient-oriented data in larger clinical trials.</span><a class="superscript bibrRef" data-dcnode-id="1390" href="#afp20131201p757-b13"><span data-dcnode-id="1391" instrument_node="">13</span></a></p></div><div class="jSection" data-dcnode-id="1295" id="sec-6"><h2 data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">How Successful Is Vasectomy Reversal?</span></h2><div class="mjToggle noPrint" data-dcnode-id="1353"><div class="mjHeader noPrint" data-dcnode-id="1383"><span class="mobileSectionLink" data-dcnode-id="1384" style="margin:5px;"><span data-dcnode-id="1385" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1354" style="display: none;"><ul data-dcnode-id="1355"><li data-dcnode-id="1380"><a alt="Abstract" data-dcnode-id="1381" href="#abstract"><span data-dcnode-id="1382" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1377"><a data-dcnode-id="1378" href="#sec-1"><span data-dcnode-id="1379" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="1374"><a data-dcnode-id="1375" href="#sec-2"><span data-dcnode-id="1376" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="1371"><a data-dcnode-id="1372" href="#sec-3"><span data-dcnode-id="1373" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="1368"><a data-dcnode-id="1369" href="#sec-4"><span data-dcnode-id="1370" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="1365"><a data-dcnode-id="1366" href="#sec-5"><span data-dcnode-id="1367" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="1362"><a data-dcnode-id="1363" href="#sec-6"><span data-dcnode-id="1364" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="1359"><a data-dcnode-id="1360" href="#sec-7"><span data-dcnode-id="1361" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="1356"><a data-dcnode-id="1357" href="#ref-list-1"><span data-dcnode-id="1358" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1343"><span class="italic" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Microsurgical reconstructive techniques for vasectomy reversal have varying success rates. Two important predictors of success are time since vasectomy and age of female partner; reversals performed less than 15 years after vasectomy and having a female partner younger than 40 years are favorable predictors</span></span><span data-dcnode-id="1350" instrument_node="">.</span><a class="superscript bibrRef" data-dcnode-id="1348" href="#afp20131201p757-b14"><span data-dcnode-id="1349" instrument_node="">14</span></a><span class="superscript" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">–</span></span><a class="superscript bibrRef" data-dcnode-id="1344" href="#afp20131201p757-b16"><span data-dcnode-id="1345" instrument_node="">16</span></a></p><h3 data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">EVIDENCE SUMMARY</span></h3><p data-dcnode-id="1327"><span data-dcnode-id="1340" instrument_node="">Vasectomy reversal techniques involve reanastomosis of the testicular and prostatic vasal ends (vasovasostomy) or connecting the vas to the epididymis (vasoepididymostomy). Vasovasostomy patency rates have been reported between 75% and 86%; pregnancy rates range from 45% to 70%.</span><a class="superscript bibrRef" data-dcnode-id="1338" href="#afp20131201p757-b17"><span data-dcnode-id="1339" instrument_node="">17</span></a><span data-dcnode-id="1337" instrument_node=""> Vasoepididymostomy, a technique used in the presence of epididymal obstruction, has patency rates between 31% and 92%, and pregnancy rates between 10% and 50%.</span><a class="superscript bibrRef" data-dcnode-id="1335" href="#afp20131201p757-b17"><span data-dcnode-id="1336" instrument_node="">17</span></a><span data-dcnode-id="1334" instrument_node=""> Repeat attempts at microsurgical vasectomy reversal appear less successful than first attempts with patency rates between 75% and 79%, and pregnancy rates between 31% and 43%.</span><a class="superscript bibrRef" data-dcnode-id="1332" href="#afp20131201p757-b18"><span data-dcnode-id="1333" instrument_node="">18</span></a><span class="superscript" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1328" href="#afp20131201p757-b19"><span data-dcnode-id="1329" instrument_node="">19</span></a></p><p data-dcnode-id="1314"><span data-dcnode-id="1326" instrument_node="">A large retrospective multi-institutional study involving 1,469 men who underwent microsurgical reconstructive techniques showed a linear decline in patency and pregnancy rates as the time since vasectomy increased.</span><a class="superscript bibrRef" data-dcnode-id="1324" href="#afp20131201p757-b18"><span data-dcnode-id="1325" instrument_node="">18</span></a><span data-dcnode-id="1323" instrument_node=""> Intervals of less than three years showed patency and pregnancy rates of 97% and 76%, respectively; intervals between three and eight years, 88% and 53%; intervals between nine and 14 years, 79% and 44%; and intervals of 15 years or longer, 71% and 30%.</span><a class="superscript bibrRef" data-dcnode-id="1321" href="#afp20131201p757-b18"><span data-dcnode-id="1322" instrument_node="">18</span></a><span data-dcnode-id="1320" instrument_node=""> A smaller retrospective series of 213 microsurgical vasectomy reversal procedures (performed by one surgeon) showed similar patency rates regardless of interval; pregnancy rates were statistically lower (44%; </span><span class="italic" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">P</span></span><span data-dcnode-id="1317" instrument_node=""> &lt; .05) for intervals greater than 15 years compared with less than 15 years (82% to 89%).</span><a class="superscript bibrRef" data-dcnode-id="1315" href="#afp20131201p757-b14"><span data-dcnode-id="1316" instrument_node="">14</span></a></p><p data-dcnode-id="1300"><span data-dcnode-id="1313" instrument_node="">A more recent retrospective study of 334 patients undergoing vasectomy reversal (performed by one surgeon) showed similar patency and pregnancy rates regardless of interval. In this study, the only independent predictor of postreversal pregnancy was age of the female partner.</span><a class="superscript bibrRef" data-dcnode-id="1311" href="#afp20131201p757-b15"><span data-dcnode-id="1312" instrument_node="">15</span></a><span data-dcnode-id="1310" instrument_node=""> This finding is identical to that of a retrospective series of 294 vasectomy reversals (performed by three surgeons) that demonstrated lower pregnancy rates if the female partner was 40 years or older than if the female partner was younger than 40 years (14% vs. 56%).</span><a class="superscript bibrRef" data-dcnode-id="1308" href="#afp20131201p757-b16"><span data-dcnode-id="1309" instrument_node="">16</span></a><span data-dcnode-id="1307" instrument_node=""> Presence of sperm granuloma, one-layer vs. two-layer microsurgical vasovasostomy, and type of anesthesia used appear to have no effect on success rates.</span><a class="superscript bibrRef" data-dcnode-id="1305" href="#afp20131201p757-b14"><span data-dcnode-id="1306" instrument_node="">14</span></a><span class="superscript" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">,</span></span><a class="superscript bibrRef" data-dcnode-id="1301" href="#afp20131201p757-b18"><span data-dcnode-id="1302" instrument_node="">18</span></a></p><p data-dcnode-id="1296"><span data-dcnode-id="1299" instrument_node="">Aside from the variability in success rates, microsurgical vasectomy reversal procedures have significant economic implications. The cost of a successful vasectomy reversal, that is, one that leads to a successful pregnancy carried to delivery, ranges from $16,000 to $30,000. This is mostly an out-of-pocket expense for the individual or couple.</span><a class="superscript bibrRef" data-dcnode-id="1297" href="#afp20131201p757-b20"><span data-dcnode-id="1298" instrument_node="">20</span></a></p></div><div class="jSection" data-dcnode-id="1239" id="sec-7"><h2 data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></h2><div class="mjToggle noPrint" data-dcnode-id="1260"><div class="mjHeader noPrint" data-dcnode-id="1290"><span class="mobileSectionLink" data-dcnode-id="1291" style="margin:5px;"><span data-dcnode-id="1292" instrument_node="">Jump to section +</span></span></div><div class="mjContent noPrint" data-dcnode-id="1261" style="display: none;"><ul data-dcnode-id="1262"><li data-dcnode-id="1287"><a alt="Abstract" data-dcnode-id="1288" href="#abstract"><span data-dcnode-id="1289" instrument_node="">
                                    Abstract
                                </span></a></li><li data-dcnode-id="1284"><a data-dcnode-id="1285" href="#sec-1"><span data-dcnode-id="1286" instrument_node="">What Are the Advantages of No-Scalpel Vasectomy?</span></a></li><li data-dcnode-id="1281"><a data-dcnode-id="1282" href="#sec-2"><span data-dcnode-id="1283" instrument_node="">What Are the Advantages of No-Needle Vasectomy?</span></a></li><li data-dcnode-id="1278"><a data-dcnode-id="1279" href="#sec-3"><span data-dcnode-id="1280" instrument_node="">How Effective Is Vasectomy?</span></a></li><li data-dcnode-id="1275"><a data-dcnode-id="1276" href="#sec-4"><span data-dcnode-id="1277" instrument_node="">What Are the Complications of Vasectomy?</span></a></li><li data-dcnode-id="1272"><a data-dcnode-id="1273" href="#sec-5"><span data-dcnode-id="1274" instrument_node="">When and How Should Semen Analysis Be Performed to Check Sterility?</span></a></li><li data-dcnode-id="1269"><a data-dcnode-id="1270" href="#sec-6"><span data-dcnode-id="1271" instrument_node="">How Successful Is Vasectomy Reversal?</span></a></li><li data-dcnode-id="1266"><a data-dcnode-id="1267" href="#sec-7"><span data-dcnode-id="1268" instrument_node="">Which Patients Are Good Candidates for Vasectomy?</span></a></li><li data-dcnode-id="1263"><a data-dcnode-id="1264" href="#ref-list-1"><span data-dcnode-id="1265" instrument_node="">References</span></a></li></ul></div></div><p data-dcnode-id="1256"><span class="italic" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Men older than 30 years in a stable, committed relationship appear to be the best candidates for vasectomy</span></span><span data-dcnode-id="1257" instrument_node="">.</span></p><h3 data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">EVIDENCE SUMMARY</span></h3><p data-dcnode-id="1247"><span data-dcnode-id="1253" instrument_node="">In a retrospective study involving 365 men who underwent vasectomy, patients in their 20s were 12.5 times more likely to request vasectomy reversal compared with men older than 30 years. In the same study, men whose wives worked outside the home were twice as likely to request vasectomy reversal compared with men whose wives stayed at home. Interestingly, men with children appear to request vasectomy reversal more than men without children. Religious affiliation, occupation, or number of marriages had no impact on request for reversal.</span><a class="superscript bibrRef" data-dcnode-id="1251" href="#afp20131201p757-b21"><span data-dcnode-id="1252" instrument_node="">21</span></a><span data-dcnode-id="1250" instrument_node=""> Finally, change in marital status was strongly associated with request for reversal.</span><a class="superscript bibrRef" data-dcnode-id="1248" href="#afp20131201p757-b22"><span data-dcnode-id="1249" instrument_node="">22</span></a></p><p data-dcnode-id="1246"></p><div class="fn" data-dcnode-id="1241"><p class="fn" data-dcnode-id="1242"><span class="bold" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Data Sources:</span></span><span data-dcnode-id="1243" instrument_node=""> A PubMed search was completed in Clinical Queries using the key term vasectomy. The search included meta-analyses, randomized controlled trials, clinical trials, and reviews. A search was also performed using Essential Evidence Plus. Search dates: October 2011 and August 2013.</span></p></div><p data-dcnode-id="1240"></p></div></div></div><div data-dcnode-id="1197" id="gradientContainer" style="display:none;" xmlns:xlink="http://www.w3.org/1999/xlink"><div class="afpblue" data-dcnode-id="1202"><div data-dcnode-id="1203" id="spopup" style="display: none; position: relative;"><center data-dcnode-id="1231"><p data-dcnode-id="1232"><b data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Read the full article.</span></b></p></center><div class="spopuplist" data-dcnode-id="1223"><ul data-dcnode-id="1224"><li data-dcnode-id="1229"><span data-dcnode-id="1
