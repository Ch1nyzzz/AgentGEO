</span><div class="wrapper" data-dcnode-id="2109"><p data-dcnode-id="2217"><b data-dcnode-id="2218"><a class="bookmark" data-dcnode-id="2219" name="vasectomy_introduction"></a></b></p><div data-dcnode-id="2213" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="2214"><span data-dcnode-id="2215" itemprop="alternativeHeadline"><span data-dcnode-id="2216" instrument_node="">Vasectomy Introduction</span></span></h3></div><p data-dcnode-id="2212"></p><span data-dcnode-id="2211" instrument_node="">
</span><div class="iccArt" data-dcnode-id="2180"><span data-dcnode-id="2210" instrument_node="">
</span><ul data-dcnode-id="2182"><span data-dcnode-id="2209" instrument_node="">
</span><span data-dcnode-id="2207" instrument_node="">
</span><li data-dcnode-id="2198"><span data-dcnode-id="2206" instrument_node="">
</span><span class="icon-bubbles" data-dcnode-id="2205"></span><span data-dcnode-id="2204" instrument_node="">
</span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comments.emedicinehealth.com/vasectomy/viewer-comments_em-1645.htm" onclick="wmdTrack('pc-drv-rd');" rel="ugc nofollow" target="_blank" title="Did you have a vasectomy? Please describe your experience."><span data-dcnode-id="2203" instrument_node="">Readers Comments </span><strong data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">23</span></strong></a><span data-dcnode-id="2199" instrument_node="">
</span></li><span data-dcnode-id="2197" instrument_node="">
</span><span data-dcnode-id="2195" instrument_node="">
</span><span data-dcnode-id="2193" instrument_node="">
</span><li data-dcnode-id="2186"><span data-dcnode-id="2192" instrument_node="">
</span><span class="icon-share" data-dcnode-id="2191"></span><span data-dcnode-id="2190" instrument_node="">
</span><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comments.emedicinehealth.com/script/main/submit-viewer-comments-emh.asp%3Fquestionid%3D1645" onclick="wmdTrack('pc-drv-share');" rel="ugc nofollow" target="_blank" title="Did you have a vasectomy? Please describe your experience."><span data-dcnode-id="2189" instrument_node="">Share Your Story</span></a><span data-dcnode-id="2187" instrument_node="">
</span></li><span data-dcnode-id="2185" instrument_node="">
</span><span data-dcnode-id="2183" instrument_node="">
</span></ul><span data-dcnode-id="2181" instrument_node="">
</span></div><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node="">Vasectomy is a procedure in which the two tubes that carry sperm from the two testicles to the urinary tract are surgically altered so sperm cannot pass through and be released to fertilize a woman's egg during sexual intercourse. For couples who have made the decision not to have any more children, vasectomy is the safest and easiest form of surgical sterilization. While reversible in many cases, vasectomy should be considered a permanent form of </span><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/birth_control_overview/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2177" instrument_node="">birth control</span></a><span data-dcnode-id="2175" instrument_node="">. </span></p><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Vasectomy has grown in popularity throughout the world since its inception in the 19th century. 
Many men each year choose to undergo a vasectomy in the United States alone. 
Many vasectomies are performed by urologists (specialists in men's health), and 15% are performed by family practitioners. The cost ranges from $800 to $1,500 and is frequently covered by insurance plans. Some doctors that do the procedure also offer to store frozen sperm in case the person's situation changes and desires children sometime after the vasectomy and either does not want to undergo a vasectomy reversal operation or the reversal operation is unsuccessful. </span></p><span data-dcnode-id="2170" instrument_node="">
</span><h4 data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Anatomy and technique</span></h4><span data-dcnode-id="2167" instrument_node="">
</span><ul data-dcnode-id="2150"><span data-dcnode-id="2166" instrument_node="">
</span><li data-dcnode-id="2158"><span data-dcnode-id="2165" instrument_node="">A vasectomy involves the surgical interruption of both vas deferens, which are the tubes that carry the sperm from the testicles to the urinary tract. The surgeon reaches the vas deferens through a very small opening made in the front surface of the scrotum, after a local anesthetic makes the area numb. The vas deferens is then brought to skin level, where it is cut or cauterized (burned), then clipped off or tied before being dropped back into the scrotum. A section of the vas deferens may or may not be removed. The man must continue to use </span><a data-dcnode-id="2163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/birth_control_medications_contraceptives/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2164" instrument_node="">contraception</span></a><span data-dcnode-id="2162" instrument_node=""> (such as a </span><a data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/how_to_use_a_condom/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2161" instrument_node="">condom</span></a><span data-dcnode-id="2159" instrument_node="">) until an examination of his semen reveals that no sperm are present. The disappearance of sperm from the semen is not detectable by the patient. Only a specific laboratory and microscopic analysis of the semen can verify the total lack of sperm, which is the goal of the vasectomy surgery.</span></li><span data-dcnode-id="2157" instrument_node="">
</span><li data-dcnode-id="2152"><span data-dcnode-id="2156" instrument_node="">The no-scalpel vasectomy -- a slightly less invasive procedure - was developed in China in the 1970s and was brought to the United States in the late 1980s. This modification uses special instruments, allowing vasectomies to be done faster and through an even smaller opening. Some studies have shown less pain and </span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/wilderness_bleeding/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2155" instrument_node="">bleeding</span></a><span data-dcnode-id="2153" instrument_node=""> with this newer technique.</span></li><span data-dcnode-id="2151" instrument_node="">
</span></ul><span data-dcnode-id="2149" instrument_node="">
</span><h4 data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Terms to know</span></h4><span data-dcnode-id="2146" instrument_node="">
</span><ul data-dcnode-id="2110"><span data-dcnode-id="2145" instrument_node="">
</span><li data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Bladder: A muscular, elastic pouch that serves to store and expel urine</span></li><span data-dcnode-id="2142" instrument_node="">
</span><li data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">Epididymis: Tightly coiled, very small tubes covering the back and sides of the testis, where sperm are stored and mature after leaving the testis before they are transported to the vas deferens</span></li><span data-dcnode-id="2139" instrument_node="">
</span><li data-dcnode-id="2135"><a class="imglink" data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/image-gallery/prostate_gland_picture/images.htm" onclick="wmdTrack('embd-lnk');" rel="emhimg" target="_blank" title="Medical Image"><span data-dcnode-id="2138" instrument_node="">Prostate gland</span></a><span data-dcnode-id="2136" instrument_node="">: Located below the bladder, gland that contributes significantly to seminal secretions and is where the ejaculatory ducts, the vas deferens, and the urethra join </span></li><span data-dcnode-id="2134" instrument_node="">
</span><li data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Scrotum: The sac that contains the testicles, epididymis, and vas deferens </span></li><span data-dcnode-id="2131" instrument_node="">
</span><li data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Semen: The combination of sperm and glandular fluid released by the urethra when a man ejaculates; normally a mixture of less than 1% sperm and 99% seminal fluid</span></li><span data-dcnode-id="2128" instrument_node="">
</span><li data-dcnode-id="2124"><a class="quizlink" data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/low_testosterone_quiz_iq/quiz.htm" onclick="wmdTrack('embd-lnk');" rel="quiz-em" target="_blank" title="Learning Quiz"><span data-dcnode-id="2127" instrument_node="">Seminal vesicle</span></a><span data-dcnode-id="2125" instrument_node="">: A sac at the end of the vas deferens that produces a component of seminal secretions, the fluid that is ejaculated by a man at sexual climax and that transports and nourishes the sperm </span></li><span data-dcnode-id="2123" instrument_node="">
</span><li data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Testes/testicles: Located in the scrotum, the male reproductive glands that produce sperm and male hormone (testosterone)</span></li><span data-dcnode-id="2120" instrument_node="">
</span><li data-dcnode-id="2115"><span data-dcnode-id="2119" instrument_node="">Urethra: The passageway </span><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/running/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2118" instrument_node="">running</span></a><span data-dcnode-id="2116" instrument_node=""> from the bladder to the tip of the penis, which carries urine and semen outside the body</span></li><span data-dcnode-id="2114" instrument_node="">
</span><li data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Vas deferens: The two muscular tubes that carry sperm from the testicle and epididymis to the urinary tract and out the urethra; each referred to as a vas and together as vasa</span></li><span data-dcnode-id="2111" instrument_node="">
</span></ul></div><span data-dcnode-id="2108" instrument_node="">
</span></div><span data-dcnode-id="2106" instrument_node="">
</span><div class="apPage" data-dcnode-id="1707"><span data-dcnode-id="2105" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1727"><p data-dcnode-id="2102"><b data-dcnode-id="2103"><a class="bookmark" data-dcnode-id="2104" name="vasectomy_risks"></a></b></p><div data-dcnode-id="2098" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="2099"><span data-dcnode-id="2100" itemprop="alternativeHeadline"><span data-dcnode-id="2101" instrument_node="">Vasectomy Risks</span></span></h3></div><p data-dcnode-id="2097"></p><span data-dcnode-id="2096" instrument_node="">
</span><ul data-dcnode-id="2034"><span data-dcnode-id="2095" instrument_node="">
</span><li data-dcnode-id="2087"><span data-dcnode-id="2094" instrument_node="">Risks with vasectomy are few. No death has ever been attributed to this procedure. On the other hand, </span><a data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/tubal_sterilization/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2093" instrument_node="">tubal ligation</span></a><span data-dcnode-id="2091" instrument_node="">, a frequently performed surgical sterilization procedure in women, is associated with no fewer than 20 deaths per year. These deaths occur because of the risks of the procedure itself, anesthesia complications, and increased </span><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/ectopic_pregnancy/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2090" instrument_node="">ectopic pregnancy</span></a><span data-dcnode-id="2088" instrument_node=""> rates.</span></li><span data-dcnode-id="2086" instrument_node="">
</span><li data-dcnode-id="2081"><span data-dcnode-id="2085" instrument_node="">Complications with vasectomy are usually related to bleeding or infection. Prolonged pain sometimes occurs as a result of inflammation along the vas due to sperm leakage (sperm granuloma) or congestion of sperm at the epididymis (</span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/testicle_infection_epididymitis/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2084" instrument_node="">epididymitis</span></a><span data-dcnode-id="2082" instrument_node="">). These conditions usually go away with rest and anti-inflammatory medication.</span></li><span data-dcnode-id="2080" instrument_node="">
</span><li data-dcnode-id="2066"><span data-dcnode-id="2079" instrument_node="">Some earlier studies suggested that vasectomy may be associated with an increased risk of </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/coronary_heart_disease/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2078" instrument_node="">heart disease</span></a><span data-dcnode-id="2076" instrument_node=""> and </span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/prostate_cancer/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2075" instrument_node="">prostate cancer</span></a><span data-dcnode-id="2073" instrument_node="">. According to the National Institutes of Health, research that examined this issue found no evidence that men with vasectomies were more likely than others to develop </span><a class="slidelink" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_pictures_visual_guide_to_heart_disease/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="2072" instrument_node="">heart disease</span></a><span data-dcnode-id="2070" instrument_node=""> or any other immune illness. Other studies, including a recent study of 2,000 men, have shown that the risk of </span><a class="slidelink" data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_pictures_prostate_cancer/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="2069" instrument_node="">prostate cancer</span></a><span data-dcnode-id="2067" instrument_node=""> is not increased among vasectomized men.</span></li><span data-dcnode-id="2065" instrument_node="">
</span><li data-dcnode-id="2041"><b data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Fears about the procedure</span></b><span data-dcnode-id="2062" instrument_node="">: Fear can prevent a man from choosing a vasectomy. The following issues are addressed to help a man understand that a vasectomy procedure is simple and safe:
</span><ul data-dcnode-id="2043"><span data-dcnode-id="2061" instrument_node="">
</span><li data-dcnode-id="2057"><a class="slidelink" data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_phobias/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="2060" instrument_node="">Fear of pain</span></a><span data-dcnode-id="2058" instrument_node=""> - Men don't like to think of any procedure near their genitals. Fact: What men need to understand is that an anesthetic is used to numb the area. There is usually no pain or just some pulling after the anesthetic is given. The procedure is usually so well tolerated that upon completion of the procedure, men are frequently surprised that it is over.</span></li><span data-dcnode-id="2056" instrument_node="">
</span><li data-dcnode-id="2048"><span data-dcnode-id="2055" instrument_node="">Fear of loss of masculinity - Fact: A vasectomy does not affect manliness. A vasectomy does not affect the blood and hormone supply to the penis. The amount and appearance of semen ejaculated will not change noticeably. Of course, during the recovery process, men may be sore, thus making sex less desirable. Later, some men report that sex is actually more enjoyable without the threat of </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/pregnancy_week_by_week/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="2054" instrument_node="">pregnancy</span></a><span data-dcnode-id="2052" instrument_node="">. Women may appreciate that their partners have chosen to take the responsibility for sterility (permanent </span><a class="slidelink" data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/birth_control_pictures_slideshow/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="2051" instrument_node="">birth control</span></a><span data-dcnode-id="2049" instrument_node="">).</span></li><span data-dcnode-id="2047" instrument_node="">
</span><li data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Fear of failure of the procedure - Fact: Except for complete abstinence, no method is more effective than vasectomy in preventing pregnancy.</span></li><span data-dcnode-id="2044" instrument_node="">
</span></ul><span data-dcnode-id="2042" instrument_node="">
</span></li><span data-dcnode-id="2040" instrument_node="">
</span><li data-dcnode-id="2036"><b data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Alternatives</span></b><span data-dcnode-id="2037" instrument_node="">: Before choosing a vasectomy, a couple should seriously consider the many alternative methods of contraception (birth control). Table 1 shows that the effectiveness of each of the methods can vary greatly. For a more complete description, visit vasectomy.md.</span></li><span data-dcnode-id="2035" instrument_node="">

</span><div class="wrapper" data-dcnode-id="1227"><p data-dcnode-id="1260"><b data-dcnode-id="1261"><a class="bookmark" data-dcnode-id="1262" name="vasectomy_preparation"></a></b></p><div data-dcnode-id="1256" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1257"><span data-dcnode-id="1258" itemprop="alternativeHeadline"><span data-dcnode-id="1259" instrument_node="">Vasectomy Preparation</span></span></h3></div><p data-dcnode-id="1255"></p><span data-dcnode-id="1254" instrument_node="">
</span><ul data-dcnode-id="1228"><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">The person needs to wash thoroughly and put on clean, snug underwear or an athletic supporter (jock strap) before their appointment.</span></li><span data-dcnode-id="1250" instrument_node="">
</span><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">The doctor may ask the person to shave the front portion of the scrotum the night before surgery.</span></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1233"><span data-dcnode-id="1246" instrument_node="">Do not take </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/drug-aspirin_oral/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhpharm"><span data-dcnode-id="1245" instrument_node="">aspirin</span></a><span data-dcnode-id="1243" instrument_node=""> or other anti-inflammatory medication (such as </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/drug-ibuprofen/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhpharm"><span data-dcnode-id="1242" instrument_node="">Nuprin</span></a><span data-dcnode-id="1240" instrument_node="">, </span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/drug-ibuprofen/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhpharm"><span data-dcnode-id="1239" instrument_node="">Advil</span></a><span data-dcnode-id="1237" instrument_node="">, </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/drug-ibuprofen/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhpharm"><span data-dcnode-id="1236" instrument_node="">Motrin</span></a><span data-dcnode-id="1234" instrument_node="">) for 10 days before the procedure. Such medication can increase the risk of bleeding with vasectomy. </span></li><span data-dcnode-id="1232" instrument_node="">
</span><li data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Prepare any questions for the doctor. The person will be asked to sign a consent form that states they understand the risks involved with vasectomy and that sterility cannot be absolutely guaranteed.</span></li><span data-dcnode-id="1229" instrument_node="">
</span></ul></div><span data-dcnode-id="1226" instrument_node="">
</span></div><div class="apPage" data-dcnode-id="1182"><span data-dcnode-id="1224" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1188"><p data-dcnode-id="1221"><b data-dcnode-id="1222"><a class="bookmark" data-dcnode-id="1223" name="during_the_procedure"></a></b></p><div data-dcnode-id="1217" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1218"><span data-dcnode-id="1219" itemprop="alternativeHeadline"><span data-dcnode-id="1220" instrument_node="">During the Procedure</span></span></h3></div><p data-dcnode-id="1216"></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">The entire procedure usually takes about 10-20 minutes.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><ul data-dcnode-id="1189"><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The patient will be asked to change into a gown and lie on the examination table. The incision site will be washed, shaved, and sterilized, usually with an iodine solution. Sterile drapes will be placed over the patient to guard against infection. </span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">A local anesthetic is administered via a small needle. Some physicians avoid using a needle by utilizing a jet spray device to achieve the full local anesthesia (no-needle anesthesia). </span></li><span data-dcnode-id="1205" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">One or two small opening(s) are made in the scrotum. Either the right or left vas deferens is lifted through this opening. The vas is cut, and a section may be removed. A slight pulling sensation may be noticed during this process.</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">The two ends of the vas are cauterized (heat sealed), tied, or clipped before being returned to the scrotum.</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">The opposite vas deferens is then lifted through the opening for the same procedure.</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">The remaining opening can heal with closure by </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/removing_stitches/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1194" instrument_node="">stitches</span></a><span data-dcnode-id="1192" instrument_node=""> or naturally without stitches.</span></li><span data-dcnode-id="1190" instrument_node="">
</span></ul></div><span data-dcnode-id="1187" instrument_node="">
</span><div class="medianet" data-dcnode-id="1184" id="276324874-5"></div><span data-dcnode-id="1183" instrument_node="">
</span></div><div class="apPage" data-dcnode-id="1090"><span data-dcnode-id="1181" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1110"><p data-dcnode-id="1178"><b data-dcnode-id="1179"><a class="bookmark" data-dcnode-id="1180" name="after_the_procedure"></a></b></p><div data-dcnode-id="1174" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1175"><span data-dcnode-id="1176" itemprop="alternativeHeadline"><span data-dcnode-id="1177" instrument_node="">After the Procedure</span></span></h3></div><p data-dcnode-id="1173"></p><span data-dcnode-id="1172" instrument_node="">

</span><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1159"><span data-dcnode-id="1167" instrument_node="">
</span><span class="icon-bubbles" data-dcnode-id="1166"></span><span data-dcnode-id="1165" instrument_node="">
</span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comments.emedicinehealth.com/vasectomy/viewer-comments_em-1646.htm" onclick="wmdTrack('pc-drv-rd');" rel="ugc nofollow" target="_blank" title="What measures did you take to help heal after your vasectomy?"><span data-dcnode-id="1164" instrument_node="">Readers Comments </span><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">1</span></strong></a><span data-dcnode-id="1160" instrument_node="">

</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">If sedation was not used, then the patient may drive himself home. Any discomfort is usually mild, and pain relievers should be used if needed. The local anesthetic begins to wear off after an hour or so. Recovery time after a no-scalpel vasectomy is usually a little less than that after a traditional vasectomy. The following are general guidelines that help ensure a speedy recovery (talk with the doctor who did the procedure for specific instructions):</span></p><span data-dcnode-id="1137" instrument_node="">
</span><ul data-dcnode-id="1111"><span data-dcnode-id="1136" instrument_node="">
</span><li data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Apply an ice pack or package of frozen peas (or other such package) to the scrotum for the first 24 hours after the procedure. Wrap the ice pack in a towel. Do not place ice directly on the skin.</span></li><span data-dcnode-id="1133" instrument_node="">
</span><li data-dcnode-id="1128"><span data-dcnode-id="1132" instrument_node="">Avoid </span><a data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/walking_for_fitness/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1131" instrument_node="">walking</span></a><span data-dcnode-id="1129" instrument_node=""> or standing as much as possible for a couple of days.</span></li><span data-dcnode-id="1127" instrument_node="">
</span><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Wear snug cotton briefs or an athletic supporter to help apply pressure against the procedure area and for support of the scrotum for the first week or two after the procedure.</span></li><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">Avoid heavy lifting or </span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/exercise/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1122" instrument_node="">exercise</span></a><span data-dcnode-id="1120" instrument_node=""> for at least 2 to 3 days. Doctors commonly 
allow a return to work within 1 to 2 days unless the job involves physical exertion. In general, avoid activities that cause discomfort.</span></li><span data-dcnode-id="1118" instrument_node="">
</span><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Wait at least a week before resuming sexual activity; use birth-control methods until the doctor indicates the patient is sterile (see below).</span></li><span data-dcnode-id="1115" instrument_node="">
</span><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Semen will be collected (usually at home) approximately six to 12 weeks after surgery (and possibly even later) and examined under a microscope 
at the doctor's office or with a new home test kit called SpermCheck Vasectomy 
Home Test (Alere) to make certain that no sperm remain. It is important to use some form of birth control until the doctor specifically tells the patient that they are sterile (no sperm are present).</span></li><span data-dcnode-id="1112" instrument_node="">
</span></ul></div><span data-dcnode-id="1109" instrument_node="">

</span><h4 class="label" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">QUESTION</span></h4><span data-dcnode-id="1099" instrument_node="">

</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Contact the doctor if any of the following symptoms develops:</span></p><span data-dcnode-id="1077" instrument_node="">
</span><ul data-dcnode-id="1049"><span data-dcnode-id="1076" instrument_node="">
</span><li data-dcnode-id="1072"><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/fever_in_adults/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1075" instrument_node="">Fever</span></a><span data-dcnode-id="1073" instrument_node=""> and chills</span></li><span data-dcnode-id="1071" instrument_node="">
</span><li data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">A large black and blue area</span></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Increasing pain</span></li><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Drainage (sign of infection)</span></li><span data-dcnode-id="1062" instrument_node="">
</span><li data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node="">A growing mass (sign of </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/internal_bleeding/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emss"><span data-dcnode-id="1060" instrument_node="">internal bleeding</span></a><span data-dcnode-id="1058" instrument_node=""> or infection) </span></li><span data-dcnode-id="1056" instrument_node="">
</span><li data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Excessive swelling of the scrotum (expect some swelling) </span></li><span data-dcnode-id="1053" instrument_node="">
</span><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Other concerns</span></li><span data-dcnode-id="1050" instrument_node="">
</span></ul></div><div class="wrapper" data-dcnode-id="928"><p data-dcnode-id="1045"><b data-dcnode-id="1046"><a class="bookmark" data-dcnode-id="1047" name="reversing_a_vasectomy"></a></b></p><div data-dcnode-id="1041" itemscope="" itemtype="https://schema.org/CreativeWork"><h3 data-dcnode-id="1042"><span data-dcnode-id="1043" itemprop="alternativeHeadline"><span data-dcnode-id="1044" instrument_node="">Reversing a Vasectomy</span></span></h3></div><p data-dcnode-id="1040"></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">While the best thing about a vasectomy is that it is permanent in almost every individual that gets the procedure, couples sometimes choose to reverse a vasectomy. This reversal procedure is not guaranteed to restore </span><a class="slidelink" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.emedicinehealth.com/slideshow_ovulation_and_fertility/article_em.htm" onclick="wmdTrack('embd-lnk');" rel="emhsli" target="_blank" title="Educational Slideshow"><span data-dcnode-id="1037" instrument_node="">fertility</span></a><span data-dcnode-id="1035" instrument_node=""> and is usually not covered by insurance.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><ul data-dcnode-id="1016"><span data-dcnode-id="1032" instrument_node="">
</span><li data-dcnode-id="1018"><span data-dcnode-id="1031" instrument_node="">Reasons for vasectomy reversal include the following: 
</span><ul data-dcnode-id="1020"><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">A joint decision by the couple to have another child</span></li><span data-dcnode-id="1027" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Death of a child</span></li><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Remarriage</span></li><span data-dcnode-id="1021" instrument_node="">
</span></ul><span data-dcnode-id="1019" instrument_node="">
</span></li><span data-dcnode-id="1017" instrument_node="">
</span></ul><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">The success of a reversal is measured in two separate ways: the ability to open the vas channel and the ability to deliver effective sperm. Delivering sperm, while the most important, is affected by the period of blockage upon the testicles. As an alternative to seeking a reversal later, some men freeze and store sperm at a sperm bank before their vasectomy in case they later choose to have a child.</span></p><span data-dcnode-id="1012" instrument_node="">

</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">A vasectomy is a choice only a man can make, preferably with the support of his partner. While it is safe and simple, the permanent nature of the procedure requires careful consideration. By choosing this nearly 100%-effective procedure, a man can control the size of the family without placing his partner at increased risk. For more information about vasectomies, contact your doctor.</span></p></div><span data-dcnode-id="927" instrument_node="">
