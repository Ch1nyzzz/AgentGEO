</span><div class="in-post-sticky only-desktop" data-dcnode-id="1040"><span data-dcnode-id="1042" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="1041" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-2" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-2"></div></div><h2 data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">1. Condoms</span></h2><p data-dcnode-id="1030"><span data-dcnode-id="1037" instrument_node="">Condoms are </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1035" data-uri="49c5e6211a9defce70a7aff7d4424967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/how-should-a-condom-fit" rel="noopener" target="_blank"><span data-dcnode-id="1036" instrument_node="">worn over an erect penis</span></a><span data-dcnode-id="1034" instrument_node=""> during sex to prevent pregnancy. They are usually made of latex, however, there are also polyurethane, polyisoprene, and lambskin </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1032" data-uri="6c6cb171cb0dd451a6c298782dd3271a" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/latex-allergy-condoms" rel="noopener" target="_blank"><span data-dcnode-id="1033" instrument_node="">non-latex condoms</span></a><span data-dcnode-id="1031" instrument_node=""> for those with latex allergies.&nbsp;</span></p><p data-dcnode-id="1022"><span data-dcnode-id="1029" instrument_node="">Condoms protect against pregnancy by serving as a barrier, physically blocking semen from being released into the vagina, says </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1027" data-uri="7cdd58b93af04dcba25b6ba0e3dbc537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wexnermedical.osu.edu/find-a-doctor/jessica-yih-md-114054" rel="noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">Jessica Yih, MD,</span></a><span data-dcnode-id="1026" instrument_node=""> a urologist at </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1024" data-uri="cb6c3ba2bfead3eeee51fd9a08ca49eb" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wexnermedical.osu.edu/" rel="noopener" target="_blank"><span data-dcnode-id="1025" instrument_node="">The Ohio State University Wexner Medical Center</span></a><span data-dcnode-id="1023" instrument_node="">.</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">In theory, condoms are </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1019" data-uri="fdf2a3205daba2f0ebe3168cc4599891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/condom/how-effective-are-condoms" rel="noopener" target="_blank"><span data-dcnode-id="1020" instrument_node="">98% effective</span></a><span data-dcnode-id="1018" instrument_node=""> if you use them perfectly. However, with typical real-life use, condoms are only around 85% effective.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><span data-dcnode-id="1015" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1012"><span data-dcnode-id="1014" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="1013" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-3" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-3"></div></div><h3 data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Pros of condoms</span></h3><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Yih says some benefits of condoms are:&nbsp;</span></p><ul data-dcnode-id="1001"><li aria-level="1" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">They are widely available and easy to get.</span></li><li aria-level="1" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">They are a non-hormonal birth control option.</span></li><li aria-level="1" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Along with preventing pregnancy, they can also help prevent transmission of STIs.</span></li></ul><span data-dcnode-id="1000" instrument_node="">
</span><span data-dcnode-id="999" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="996"><span data-dcnode-id="998" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="997" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-4" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-4"></div></div><h3 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Cons of condoms</span></h3><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Yih says some disadvantages of condoms are:&nbsp;</span></p><ul data-dcnode-id="980"><li aria-level="1" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">There can be decreased sensation for both partners.</span></li><li aria-level="1" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">It can be awkward to ask to use a condom, and to pause to put one on.</span></li><li aria-level="1" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">If not used correctly every time, they are less effective overall.</span></li><li aria-level="1" data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Compared to prescription birth control, which most health insurance companies fully cover, condoms can be fairly expensive. For example, a pack of 12 on </span><a data-analytics-post-depth="40" data-dcnode-id="983" data-uri="1a3d0f944caa8960ab4ca1c6ebeb2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/reviews/out%3Fasin%3DB00477OXKA%26platform%3Dbrowser%26postSource%3Din%257C6154b31c6bf54a3ded2f98d8%26postTag%3Dbiauto-50668-20%26sc%3Dfalse%26type%3DAMAZON-AFFILIATE-LINK%26u%3Dhttps%253A%252F%252Fwww.amazon.com%252Fdp%252FB00477OXKA%253Ftag%253Dbiauto-50668-20%26sessionid%3D1650877316403fujx5x8b" rel="nofollow sponsored noindex" target="_blank"><span data-dcnode-id="984" instrument_node="">Amazon costs about $8</span></a><span data-dcnode-id="982" instrument_node="">.</span></li></ul><span data-dcnode-id="979" instrument_node="">
</span><span data-dcnode-id="978" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="975"><span data-dcnode-id="977" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="976" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-5" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-5"></div></div><h2 data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">2. Vasectomy&nbsp;</span></h2><p data-dcnode-id="965"><span data-dcnode-id="972" instrument_node="">A vasectomy is a surgical procedure that involves cutting the vas deferens — the tubes that carry sperm. This stops sperm from making its way into semen, says </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="970" data-uri="c03a6f5c26aacd7f111b52fe1abf67f2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yalemedicine.org/specialists/stanton_honig" rel="noopener" target="_blank"><span data-dcnode-id="971" instrument_node="">Stanton Honig, MD</span></a><span data-dcnode-id="969" instrument_node="">, director of Men's Health at </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="967" data-uri="103b5b1d69c38350e5a85578f97146bf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medicine.yale.edu/urology/" rel="noopener" target="_blank"><span data-dcnode-id="968" instrument_node="">Yale Medicine Urology</span></a><span data-dcnode-id="966" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">The procedure is done under local anesthesia and only takes about 20 minutes, Honig says. But it won't go into effect right away.&nbsp;</span></p><p data-dcnode-id="955"><span data-dcnode-id="962" instrument_node="">Even though new sperm won't be able to get into your semen, it takes time to clear out the </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="960" data-uri="4b8555370d715f24b07ec2d8105e17d1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urologyhealth.org/urology-a-z/v/vasectomy" rel="noopener" target="_blank"><span data-dcnode-id="961" instrument_node="">lingering live sperm</span></a><span data-dcnode-id="959" instrument_node="">. Honing says this could take </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="957" data-uri="d4b33819543bf12a4f873bcd08369b3d" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/vasectomy/what-can-i-expect-if-i-have-vasectomy" rel="noopener" target="_blank"><span data-dcnode-id="958" instrument_node="">a few month</span></a><span data-dcnode-id="956" instrument_node="">s, so it's important to get your semen tested before having sex without birth control.&nbsp;</span></p><p data-dcnode-id="944"><span data-dcnode-id="954" instrument_node="">A vasectomy is one of the</span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="952" data-uri="53f9e354b1f208d0e6e6841690a99dcc" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/vasectomy/how-effective-vasectomy" rel="noopener" target="_blank"><span data-dcnode-id="953" instrument_node=""> most effective </span></a><span data-dcnode-id="951" instrument_node="">methods of birth control. It's almost </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="949" data-uri="1c225ac4f1e647eea527a1f1df9351c3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/tests-procedures/vasectomy/about/pac-20384580" rel="noopener" target="_blank"><span data-dcnode-id="950" instrument_node="">100% effective</span></a><span data-dcnode-id="948" instrument_node=""> at preventing pregnancy and the chances it will fail are about </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="946" data-uri="d11bc469d57f88123fd6bf24d3522393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5110415/" rel="noopener" target="_blank"><span data-dcnode-id="947" instrument_node="">one in 2,000</span></a><span data-dcnode-id="945" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="943" instrument_node="">
</span><span data-dcnode-id="942" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="939"><span data-dcnode-id="941" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="940" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-6" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-6"></div></div><h3 data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Pros of vasectomies</span></h3><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Honig says some benefits of vasectomies are:&nbsp;</span></p><ul data-dcnode-id="918"><li aria-level="1" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">They are extremely effective.</span></li><li aria-level="1" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">The procedure is quick with minimal downtime.</span></li><li aria-level="1" data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">It's a </span><a data-analytics-post-depth="60" data-dcnode-id="928" data-uri="be35038424cc4298747d723c618c8715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/vasectomy/how-safe-vasectomy" rel="noopener" target="_blank"><span data-dcnode-id="929" instrument_node="">very safe procedure</span></a><span data-dcnode-id="927" instrument_node="">.</span></li><li aria-level="1" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">They are reversible.&nbsp;</span></li><li aria-level="1" data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">It is usually covered by </span><a data-analytics-post-depth="60" data-dcnode-id="921" data-uri="8bd8b8d458441c734a8cfd03d0edae71" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/vasectomy/how-do-i-get-vasectomy" rel="noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">insurance</span></a><span data-dcnode-id="920" instrument_node=""> (including Medicaid).</span></li></ul><span data-dcnode-id="917" instrument_node="">
</span><span data-dcnode-id="916" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="913"><span data-dcnode-id="915" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="914" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-7" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-7"></div></div><h3 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Cons of vasectomies</span></h3><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Honig says some disadvantages of vasectomies are:&nbsp;</span></p><ul data-dcnode-id="899"><li aria-level="1" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">If you don't wait to confirm that you're sperm-free, you can get someone pregnant post-procedure.</span></li><li aria-level="1" data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">If you decide to reverse it, it can cost from $6,000-$25,000 and insurance </span><a data-analytics-post-depth="60" data-dcnode-id="904" data-uri="3b1e304eba39c9061bcc6a5f50a08c39" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/tests-procedures/vasectomy-reversal/about/pac-20384537" rel="noopener" target="_blank"><span data-dcnode-id="905" instrument_node="">may not cover the cost</span></a><span data-dcnode-id="903" instrument_node="">.&nbsp;</span></li><li aria-level="1" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">It doesn't protect against STIs.&nbsp;</span></li></ul><span data-dcnode-id="898" instrument_node="">
</span><span data-dcnode-id="897" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="894"><span data-dcnode-id="896" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="895" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-8" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-8"></div></div><h2 data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">3. Withdrawal method</span></h2><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">The withdrawal method, also called the "pull out" method, works by physically withdrawing, or pulling out, your penis from the vagina prior to ejaculation, says Yih. In theory, this should stop semen from making it into the vagina, but it's hard to time perfectly.&nbsp;</span></p><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">If you are absolutely certain you don't want to cause a pregnancy, Honig does not recommend the pull-out method. "If you're using withdrawal, you're playing with fire," Honig says. It is only about </span><a data-analytics-module="body_link" data-analytics-post-depth="80" data-dcnode-id="887" data-uri="ccde40c4d3ef13825c6aac135080dd41" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/withdrawal-pull-out-method/how-effective-is-withdrawal-method-pulling-out" rel="noopener" target="_blank"><span data-dcnode-id="888" instrument_node="">78% effective</span></a><span data-dcnode-id="886" instrument_node="">.</span></p><span data-dcnode-id="884" instrument_node="">
</span><span data-dcnode-id="883" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="880"><span data-dcnode-id="882" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="881" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-9" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-9"></div></div><h3 data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Pros of the withdrawal method&nbsp;</span></h3><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Honig says the main benefits of the withdrawal method is:&nbsp;</span></p><ul data-dcnode-id="873"><li aria-level="1" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Personal preference if you don't like the feeling of condoms.</span></li></ul><span data-dcnode-id="872" instrument_node="">
</span><span data-dcnode-id="871" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="868"><span data-dcnode-id="870" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="869" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-10" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-10"></div></div><h3 data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Cons of the withdrawal method</span></h3><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Yih says the disadvantages of the withdrawal method are:&nbsp;</span></p><ul data-dcnode-id="855"><li aria-level="1" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">There's a relatively low effectiveness and, therefore, higher risk of accidental pregnancy.</span></li><li aria-level="1" data-dcnode-id="858"><a data-analytics-post-depth="80" data-dcnode-id="860" data-uri="11be4dac7e9e173def30e4fb5d4c5ced" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/can-you-get-pregnant-from-pre-cum" rel="noopener" target="_blank"><span data-dcnode-id="861" instrument_node="">Pre-ejaculate (pre-cum) can contain sperm,</span></a><span data-dcnode-id="859" instrument_node=""> so sperm may get in the vagina even if you are pulling out before you ejaculate.</span></li><li aria-level="1" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">It doesn't protect against STIs.&nbsp;</span></li></ul><span data-dcnode-id="854" instrument_node="">
</span><span data-dcnode-id="853" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="850"><span data-dcnode-id="852" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="851" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-11" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-11"></div></div><h2 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The male birth control pill</span></h2><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">While some research has been conducted, there is no readily available FDA-approved male birth control pill.&nbsp;</span></p><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Researchers have looked into pills that would block the production or function of sperm, or even cause dry ejaculations, says Honig.</span></p><p data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">For example, one </span><a data-analytics-module="body_link" data-analytics-post-depth="100" data-dcnode-id="841" data-uri="d09bb3ca0648f99e7d18fc714c3fca2c" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//utswmed.org/medblog/pill-guys-male-birth-control-option-passes-safety-tests/" rel="noopener" target="_blank"><span data-dcnode-id="842" instrument_node="">type of pill </span></a><span data-dcnode-id="840" instrument_node="">currently under research works by regulating the hormones that stimulate sperm production including the follicle-stimulating hormone (FSH) and luteinizing hormone (LH), says Yih. The goal is to stop or reduce sperm production.</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">However, the research we have now is inadequate to determine the efficacy and long-term safety of these pills. Moreover, short-term studies have identified some adverse side effects including acne, headaches, weight gain, and reduced sex drive.</span></p><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">"Some prior studies were stopped before due to side effects, which is controversial because many women have these side effects from female birth control pill," says Yih.&nbsp;</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">So, while there may be a male birth control pill in the future, there isn't one available now.&nbsp;</span></p><span data-dcnode-id="832" instrument_node="">
</span><span data-dcnode-id="831" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="828"><span data-dcnode-id="830" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="ashley-laderer,jason-mcknight" data-bi-ad="" data-dcnode-id="829" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,birth-control,men's-health,health-explainers" data-tile-order="tile-12" data-type="ad" data-url="/male-birth-control" id="gpt-post-health-desktop_in_post_ad-desktop-12"></div></div><h2 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Insider's takeaway</span></h2><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The main birth control options for men are condoms, vasectomies, and the withdrawal method, with vasectomies being the most effective and withdrawal being the least effective.&nbsp;</span></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">For now, there is no male birth control pill. However, with ongoing research and innovations, more male birth control options may be available in the future.</span></p><section class="post-authors" data-component-type="post-author" data-dcnode-id="778"><span data-dcnode-id="821" instrument_node="">
