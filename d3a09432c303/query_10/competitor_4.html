</span><section class="post-entry" data-dcnode-id="598"><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">We accept virtually all PPO insurance plans and have found that most insurance companies do cover the procedure.&nbsp; All of our physicians are in-network as participating providers (PPO doctors) with most insurance carriers, including Blue Cross/Blue Shield.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p class="disclaimer" data-dcnode-id="627" style="margin-top: -12.5px;"><span data-dcnode-id="628" instrument_node="">*We do not accept Tricare or HMO plans.</span></p><span data-dcnode-id="626" instrument_node="">

</span><div class="col-lg-8 col-lg-offset-2 col-md-8 col-md-offset-2 col-xs-10 col-xs-offset-1" data-dcnode-id="514"><span data-dcnode-id="582" instrument_node="">
</span><h2 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">So that we may help you estimate your out-of-pocket expense, please call the number on the back of your insurance card and...</span></h2><span data-dcnode-id="579" instrument_node="">
</span><div class="col-sm-6" data-dcnode-id="545"><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="574"><span class="number" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">1</span></span><span data-dcnode-id="575" instrument_node="">Let them know you are coming in for a vasectomy. The insurance representative will need the name of one of our doctors in order to provide you with in-network benefits (they cannot quote you in-network benefits if you just tell them you are going to Vasectomy Clinics of Chicago).</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="572" instrument_node="">Give them the name of any of the doctors listed below, the main procedure code for the vasectomy </span><span class="teal" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">(55250)</span></span><span data-dcnode-id="569" instrument_node=""> and the diagnosis code </span><span class="teal" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">(Z30.2)</span></span><span data-dcnode-id="566" instrument_node="">. Make sure to let them know that the procedure is done </span><span class="teal" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">“in-office”</span></span><span data-dcnode-id="563" instrument_node=""> and not in the hospital.</span></p><span data-dcnode-id="561" instrument_node="">
</span><ul data-dcnode-id="547"><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Kiumars Mostowfi, M.D.</span></li><span data-dcnode-id="557" instrument_node="">
</span><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Dragomir Jovanovic, M.D.</span></li><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Peter Dragisic, M.D.</span></li><span data-dcnode-id="551" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">George Tsoutsias, M.D.</span></li><span data-dcnode-id="548" instrument_node="">
</span></ul><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
</span><div class="col-sm-6" data-dcnode-id="516"><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="539"><span class="number" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">2</span></span><span data-dcnode-id="540" instrument_node="">Ask the representative if your policy has coverage for vasectomy. If they say yes, then ask them the following 6 questions:</span></p><span data-dcnode-id="538" instrument_node="">
</span><ul data-dcnode-id="518"><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">What is my deductible for the year?</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">How much of my deductible have I already met?</span></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">What is my co-insurance percent? (e.g. 90/10, 80/20 etc.)</span></li><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Am I responsible for a co-pay for either the consultation appointment or the vasectomy procedure appointment?</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Is pre-certification required?</span></li><span data-dcnode-id="522" instrument_node="">
</span><li data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">May I have a reference number for this call?</span></li><span data-dcnode-id="519" instrument_node="">
</span></ul><span data-dcnode-id="517" instrument_node="">
</span></div><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
</span></div><span data-dcnode-id="511" instrument_node="">
</span></div><span data-dcnode-id="509" instrument_node=""> </span><div class="pad-section clear" data-dcnode-id="487" id="image-right"><span data-dcnode-id="508" instrument_node="">
</span><div class="row" data-dcnode-id="489"><span data-dcnode-id="507" instrument_node="">
</span><div class="col-lg-5 col-lg-offset-2 col-md-5 col-md-offset-2 col-sm-7 col-sm-offset-1 col-xs-10 col-xs-offset-1" data-dcnode-id="496"><span data-dcnode-id="506" instrument_node="">
</span><h2 data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Once you have the answers to the 6 questions above, please call us at 312-528-9068 and press option 4.</span></h2><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Please provide us with the 6 insurance answers you were given by your insurance representative. We will then be able to estimate your out-of-pocket expense for you. Sometimes it is hard to know what to ask the insurance company, so hopefully having a list of specific questions helps make it a little easier to get that information from your insurance provider. If you have any difficulty obtaining answers to the six questions, please give the insurance representative our telephone number 312-528-9068 and option 4, and ask them to conference us in on your call so we can help you while you are still on the line with them.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498" style="margin-top: 20px;"><span data-dcnode-id="499" instrument_node="">If you would like to schedule an appointment for a consultation or have any questions, we invite you to call us at 312-528-9068 (312-528-9068) at any time. If you call after hours, please leave a message and we will get back to you the next working day. You may also click on the Contact Us tab and give us your name, telephone number, and let us know which of our 4 locations you are interested in, and we’d be happy to give you a call during business hours!</span></p><span data-dcnode-id="497" instrument_node="">
</span></div><span data-dcnode-id="495" instrument_node="">

</span><div class="col-md-8 col-md-offset-2 col-sm-10 col-sm-offset-1 col-xs-12" data-dcnode-id="382" id="testimonial-carousel"><span data-dcnode-id="477" instrument_node="">

</span><div class="item" data-dcnode-id="463"><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">I was extremely nervous during the entire consultation, so I figured the same would hold true with the actual procedure. Not the case at all. Dr. Pete and his staff are amazing. They make you feel comfortable, they explain everything, and before you know it, your done. I can’t recommend Dr. Pete and the clinic enough! Well done!</span></p><span data-dcnode-id="469" instrument_node="">

</span><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Matthew N. – Downers Grove, IL</span></strong><span data-dcnode-id="464" instrument_node="">
</span></div><span data-dcnode-id="462" instrument_node="">
</span><div class="item" data-dcnode-id="452"><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">The procedure was everything I was told it was: fast and pain-free. I have friends that have gone through more traditional procedures, and some had real horror stories. When an office coworker told me about this procedure, and came back to work the same day he had it done, I was convinced. Guys in the office couldn’t believe that I too was back to work the next day. The only thing that kept me coming from in that same day was the snow.</span></p><span data-dcnode-id="458" instrument_node="">
</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
</span><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">John H. – Naperville, IL</span></strong><span data-dcnode-id="453" instrument_node="">
</span></div><span data-dcnode-id="451" instrument_node="">
</span><div class="item" data-dcnode-id="441"><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">THE BEST IN THE MIDWEST! NO PAIN AND GREAT RESULTS, THANK YOU DOC.</span></p><span data-dcnode-id="447" instrument_node="">
</span><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">
</span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Pete Z.-Chicago, IL</span></strong><span data-dcnode-id="442" instrument_node="">
</span></div><span data-dcnode-id="440" instrument_node="">
</span><div class="item" data-dcnode-id="430"><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Wow, I had my procedure done a week ago. I walked out and my wife thought something was wrong. She was surprised to hear that it was over in 20 minutes. No pain. I have to schedule my next dentist appointment this week, I am not looking forward to that. If I could I would rather have a second vasectomy than go to the dentist.</span></p><span data-dcnode-id="436" instrument_node="">
</span><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">
</span><strong data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Shane S. – Frankfort, IL</span></strong><span data-dcnode-id="431" instrument_node="">
</span></div><span data-dcnode-id="429" instrument_node="">
</span><div class="item" data-dcnode-id="419"><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">I just had it done yesterday and wow! No problem! I got home, drank a few with the neighbors, cut my lawn, went to bed and woke up no pain, nothing. I finished working in the yard, and still no pain. I bought some Tylenol just in case, and the bottle still has the seal on it. Dr, Mostowfi is a great guy; he’ll talk to you and answer your questions – he’s just a regular kinda guy! I thought the worst, but I have gotten tattoos that have given me more grief! Thanks, doc! You’re great, and I am going to let all my pals know about you.</span></p><span data-dcnode-id="425" instrument_node="">
</span><br data-dcnode-id="424"><span data-dcnode-id="423" instrument_node="">
</span><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Bill – Oak Forest, IL</span></strong><span data-dcnode-id="420" instrument_node="">
</span></div><span data-dcnode-id="418" instrument_node="">
</span><div class="item" data-dcnode-id="405"><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Dr. Mostowfi, when I asked you if it would be alright for me to play hockey, a few hours after my procedure, I really did not expect you to say yes!! Well I did play, and without any discomfort or pain. I also would like to thank you and your staff for making me feel very comfortable and relaxed.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">I can and will recommend Vasectomy Clinics of Chicago to anyone who is thinking of having this procedure done. It was painless, fast, and professional!! Kudos to all.</span></p><span data-dcnode-id="411" instrument_node="">
</span><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">
</span><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">M.J. – Munster, IN</span></strong><span data-dcnode-id="406" instrument_node="">
</span></div><span data-dcnode-id="404" instrument_node="">
</span><div class="item" data-dcnode-id="394"><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Dr. Mostowfi, Thank you so much for a wonderful experience! I’m a professional athlete and could have went to practice right after the procedure that’s how amazing and painless this procedure is! Dr. Mostowfi is the Best!!</span></p><span data-dcnode-id="400" instrument_node="">
</span><br data-dcnode-id="399"><span data-dcnode-id="398" instrument_node="">
</span><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Steve – Chicago, IL</span></strong><span data-dcnode-id="395" instrument_node="">
</span></div><span data-dcnode-id="393" instrument_node="">
