</span><div class="section-text__content" data-dcnode-id="1667"><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Your particular life circumstances might mean that a vasectomy is a good contraception option for you. You might be considering a vasectomy if:</span></p><span data-dcnode-id="1683" instrument_node="">
</span><ul data-dcnode-id="1672"><span data-dcnode-id="1682" instrument_node="">
</span><li data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">you have already fathered a child or children and you (and your partner) think your family is now complete</span></li><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">you have decided that you don’t want to be a father</span></li><span data-dcnode-id="1676" instrument_node="">
</span><li data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">you and your partner have decided that this permanent and highly effective procedure offers the best form of long-term contraception for your relationship.</span></li><span data-dcnode-id="1673" instrument_node="">
</span></ul><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">It is a highly effective form of contraception: only around one in 2000 men who have the operation impregnate a woman.</span></p><span data-dcnode-id="1668" instrument_node="">

</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Our patients are at the heart of what we do and we want you to be in control of your care. To us, that means you can choose the consultant you want to see, and when you want. They'll be with you every step of the way.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">All of our consultants are of the highest calibre and benefit from working in our modern, well-equipped hospitals.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Our consultants have high standards to meet, often holding specialist NHS posts and delivering expertise in complex sub-specialty surgeries. Many of our consultants have international reputations for their research in their specialised field.</span></p><span data-dcnode-id="1550" instrument_node="">

</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">We've tried to make your experience with us as easy and relaxed as possible.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">For more information on visiting hours, our food, what to pack if you're staying with us, parking and all those other important practicalities, please visit our patient information pages.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Our dedicated team will also give you tailored advice to follow in the run up to your visit.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Don't take aspirin or any other anti-inflammatory medicines for ten days before your operation. Talk to your doctor or pharmacist if you're not sure whether you can take a particular medicine and whether alternatives are available. Some doctors also ask that the patient shaves their scrotum before the operation.</span></p><span data-dcnode-id="1397" instrument_node="">

</span><span data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">The procedure</span></span><span data-dcnode-id="1372" instrument_node=""> </span><i class="fa fa-plus" data-dcnode-id="1371"></i><span data-dcnode-id="1370" instrument_node="">
</span><i class="fa fa-minus" data-dcnode-id="1369"></i><span data-dcnode-id="1368" instrument_node="">
</span></h2><span data-dcnode-id="1366" instrument_node="">
</span></div><span data-dcnode-id="1364" instrument_node="">
</span><div class="section-text__content" data-dcnode-id="1350"><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">We understand that having any operation, even one as relatively straightforward as a vasectomy, can cause anxiety. Our experienced and caring medical staff will be there to reassure you throughout.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">You’ll have a local anaesthetic for the 20 minute procedure. This means you’ll be awake but won’t feel any pain.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Your experienced surgeon will make a small cut on each side of your scrotum to expose the vasa deferentia tubes that carry the sperm from your testicles to the penis. He or she will cut the tubes to remove a small section of each.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">The ends of the tube are sealed or tied before the cuts in the scrotum are closed with dissolvable stitches.</span></p><span data-dcnode-id="1351" instrument_node="">
</span></div><span data-dcnode-id="1349" instrument_node="">
</span></div><span data-dcnode-id="1347" instrument_node="">
</span></div><span data-dcnode-id="1345" instrument_node="">
</span></div><span data-dcnode-id="1343" instrument_node="">
</span></div><span data-dcnode-id="1341" instrument_node="">
</span></div><span data-dcnode-id="1339" instrument_node="">
</span><div class="" data-dcnode-id="1275" style="background-color: #fff"><span data-dcnode-id="1338" instrument_node="">
</span><div class="container container-component container-component--spacing container-component__section-text" data-c-name="sectiontext" data-dcnode-id="1277"><span data-dcnode-id="1337" instrument_node="">
</span><div class="container-component__section-text--mobile-wrapper" data-dcnode-id="1279"><span data-dcnode-id="1336" instrument_node="">
</span><div class="row justify-content-center align-items-center" data-dcnode-id="1281"><span data-dcnode-id="1335" instrument_node="">
</span><div class="col-sm-12 col-md-10 flex-center" data-dcnode-id="1283"><span data-dcnode-id="1334" instrument_node="">
</span><div class="section-text__heading clearfix" data-dcnode-id="1322"><span data-dcnode-id="1333" instrument_node="">
</span><h2 class="" data-dcnode-id="1324"><span data-dcnode-id="1332" instrument_node="">
</span><span data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Aftercare</span></span><span data-dcnode-id="1329" instrument_node=""> </span><i class="fa fa-plus" data-dcnode-id="1328"></i><span data-dcnode-id="1327" instrument_node="">
</span><i class="fa fa-minus" data-dcnode-id="1326"></i><span data-dcnode-id="1325" instrument_node="">
</span></h2><span data-dcnode-id="1323" instrument_node="">
</span></div><span data-dcnode-id="1321" instrument_node="">
</span><div class="section-text__content" data-dcnode-id="1285"><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">You’ll be able to go home soon after the operation is over. However, as you’ll be feeling drowsy after the local anaesthetic and a bit uncomfortable, you’ll need a friend or relative to pick you up, it is sensible to have someone to drive you home.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><hr data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node="">
</span><h3 data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Your recovery</span></h3><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">You’ll have some minor discomfort, swelling and bruising around the scrotum for a few days. If you’re in pain you can use over the counter medicines such as paracetamol. It’s likely that you’ll have blood in your semen for the first few ejaculations.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">It’s a good idea to wear tight underwear day and night as your scrotum recovers. You can shower or bathe but make sure you dry your genitals gently but thoroughly.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">You’ll probably feel fine for work after a day or two but don’t do any heavy lifting or sports for the first week.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><hr data-dcnode-id="1302"><span data-dcnode-id="1301" instrument_node="">
</span><h3 data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">End result</span></h3><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Your semen will need to be tested because sperm can remain in the tubes for several months. You will need to take a semen sample to the hospital eight to 12 weeks after surgery and another two or three weeks after that. Your nurse will tell you the dates and give you bottles for the samples.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">While you can have sex again as soon as things feel comfortable, it’s important that you carry on using contraception until tests confirm there is no sperm in your semen and your surgeon has confirmed that the vasectomy has been successful.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">On rare occasions, complications following a vasectomy can occur. If you experience any of these symptoms – listed below – increased swelling or redness, increased bleeding from the wounds, a high temperature or fever, severe pain - call us straight away. We will talk to you about the possible risks and complications of having this procedure how they apply to you.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">If you have any questions or concerns, we’re ready to help.</span></p><span data-dcnode-id="1286" instrument_node="">
</span></div><span data-dcnode-id="1284" instrument_node="">

</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">We are committed to delivering excellent individual care and customer service across our network of hospitals, clinics and specialist care centres around the UK. Our dedicated and highly trained team aim to achieve consistently excellent results. For us it's more than just treating patients, it's about looking after people.</span></p><span data-dcnode-id="1252" instrument_node="">
