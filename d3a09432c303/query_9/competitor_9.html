te-button-count" data-dcnode-id="756" style=""><span data-dcnode-id="757" instrument_node="">0</span></span></button></div><div class="post-views" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node=""> approximately 35 views in the last month.</span></div></div><div class="clearfix" data-dcnode-id="733"><ul class="nav navbar-nav view-nav pull-right" data-dcnode-id="734"><li data-dcnode-id="747"><span data-dcnode-id="750" instrument_node=""> </span><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.soapnote.org/generator/%3Fsn%3D10653" id="duplicate-btn"><span data-dcnode-id="749" instrument_node="">Duplicate</span></a></li><li data-dcnode-id="735"><span data-dcnode-id="746" instrument_node=""> </span><a data-dcnode-id="743" data-toggle="dropdown" href="#"><span data-dcnode-id="745" instrument_node="">View</span><span class="caret" data-dcnode-id="744"></span></a><ul class="dropdown-menu dropdown-menu-right" data-dcnode-id="736"><li class="active" data-dcnode-id="740"><a data-dcnode-id="741" href="#form_view"><span data-dcnode-id="742" instrument_node="">Live Form</span></a></li><li data-dcnode-id="737"><a data-dcnode-id="738" href="#markup_view"><span data-dcnode-id="739" instrument_node="">Edit Markup</span></a></li></ul></li></ul></div><div class="view-pane tab-content" data-dcnode-id="125"><div class="tab-pane form-view-markup" data-dcnode-id="600" id="markup_view"><span data-dcnode-id="732" instrument_node=""> VASECTOMY PROCEDURE NOTE</span><br data-dcnode-id="731"><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">PROCEDURE: Elective Bilateral Vasectomy -CPT 55250</span><br data-dcnode-id="728"><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">PRE-OP DIAGNOSIS: [text size="60" default="Elective Sterilization Z30.2"]</span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node="">FINDINGS: [checkbox name="findings" value="none"][conditional field="findings" condition="(findings).isNot('none')"][textarea rows="1"][/conditional]</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">POST-OP DIAGNOSIS: [text size="60" default="Elective Sterilization Z30.2"]</span><br data-dcnode-id="721"><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">ANESTHESIA: [checkbox value="Lidocaine 1% without epinephrine|Lidocaine 1% WITH epinephrine|Lidocaine 2% without epinephrine|Lidocaine 2% WITH epinephrine|Marcaine 0.5%|Sodium BiCarb buffering solution"]. Total amount used: [text size="5"] ml.</span><br data-dcnode-id="718"><br data-dcnode-id="717"><span data-dcnode-id="716" instrument_node="">[checkbox name="supervision" value="Supervising Physician:"][conditional field="supervision" condition="(supervision).is('Supervising Physician:')"] Dr. [text size="20"]</span><br data-dcnode-id="715"><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">[/conditional]INDICATIONS/COUNSELING: </span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">-Patient desires elective sterilization. </span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">-Confirmed that Patient was counseled regarding the risks, alternatives, and benefits of male sterilization by vasectomy.</span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">-Confirmed that patient was informed of the risks of the procedure, including but not limited to failure of the procedure to produce sterility, the risks of bleeding, infection, chronic testicular pain, and injury to scrotal contents.</span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">-Confirmed that all questions were answered in the pre-vasectomy counseling visit. No guarantees were given or implied.</span><br data-dcnode-id="704"><span data-dcnode-id="703" instrument_node="">-Verified that the consent form was signed prior to patient taking preprocedural medication(s). </span><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">-A time out was performed prior to the procedure and documented in a hardcopy form to be scanned into patient's record to include ensuring: [comment memo="only select what's applicable" memo_size="small"]</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">[checkbox value=" -Patient was identified using full name and DOB.</span><br data-dcnode-id="698"><span data-dcnode-id="697" instrument_node=""> -Patient was evaluated and medical record reviewed including history and lab/imaging findings if applicable.</span><br data-dcnode-id="696"><span data-dcnode-id="695" instrument_node=""> -Procedure and site/side matches the consent form.</span><br data-dcnode-id="694"><span data-dcnode-id="693" instrument_node=""> -Patient was involved in the site/side marking.</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">"][checkbox name="timeout" value=" -For final timeout, physician paused or verbally confirmed with procedure team of:</span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node=""> -correct patient, correct procedure, and correct site/side. </span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node=""> -The patient has been positioned correctly for the procedure. </span><br data-dcnode-id="686"><span data-dcnode-id="685" instrument_node=""> -All necessary equipment are available.</span><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node=""> -Instrument sterility verified.</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">"]</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">PHYSICAL EXAM: </span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">Inspection/Palpation of the genitalia: [select memo="choose one" name="exam" value="|unremarkable|see below"][conditional field="exam" condition="(exam).is('unremarkable')"]</span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">-no significant abnormalities or contraindications to performing the vasectomy in the outpatient clinic</span><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">-both testes normal without tenderness, masses, hydroceles, varicoceles, erythema or swelling.</span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">-penile shaft normal, meatus normal without discharge</span><br data-dcnode-id="670"><span data-dcnode-id="669" instrument_node="">-anatomic landmarks were confirmed[/conditional][conditional field="exam" condition="(exam).is('see below')"]</span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">[textarea memo="describe abnormalities/anomalies" memo_color="orange" memo_size="small"][/conditional]</span><br data-dcnode-id="666"><br data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">PROCEDURE </span><br data-dcnode-id="663"><span data-dcnode-id="662" instrument_node="">-The patient was laid supine on the procedure table. </span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">-He was prepped and draped in the usual fashion using [select value="Chlorhexidine|Betadine/Iodine"] and allowing proper dry time per manufacturer and infection control recommendations. </span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">-After identifying the vasa bilaterally, the left vas was grasped using the three-finger technique. </span><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node="">-Using a 27g needle, a 1-2 cm wheal was made at the [select name="incisionsite" value="left scrotum|right scrotum|midline scrotal raphe"] 1 cm distal to the base of the penis with anesthetic agent to provide local skin anesthesia. </span><br data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">-The needle was then advanced through the wheal and adjacent to the [select name="VasSide" value="Left|Right"] Vas Deferens. </span><br data-dcnode-id="653"><span data-dcnode-id="652" instrument_node="">-After gentle aspiration, anesthetic agent was injected into the [select value="proximal perivas tissue|external spermatic fascia"] to achieve regional vasal block.</span><br data-dcnode-id="651"><span data-dcnode-id="650" instrument_node="">-The [var name="VasSide"] Vas Deferens was maneuvered to the desired incision site, and [select value="no-scalpel technique with fine cured hemostat|fine-tip Bovie electrocautery|#15 blade scalpel|#11 blade scalpel"] was used to make a 1-2 cm incision. </span><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">-The soft tissue was then bluntly dissected with fine cured hemostats.</span><br data-dcnode-id="647"><span data-dcnode-id="646" instrument_node="">-The [var name="VasSide"] Vas Deferens was grasped and elevated through the incision and exposed using vas fixing forceps. Perivas tissue was bluntly dissected away using [select value="|fine cured hemostats|fine-tip bovie electrocautery"]. </span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">-Once it was decided that sufficient perivas tissue had been dissected away and risk of superimposed vascular tissue over the vas deferens was low, a 1cm section of vas deferens was isolated using vas fixing forceps to grasp distal and proximal ends.</span><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">-[select value="Hemostats|Alice clamps"] were used to secure testicular and prostatic ends of vas deferens prior to transection.</span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">-The 1cm segment of vas deferens was transected/excised using [select value="|#15 blade scalpel|#11 blade scalpel"] and this 1cm section was sent for pathologic examination/review.</span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">-[select value="Electro|Thermal "]cautery was applied to [select value="1cm|0.5cm"] length of the lumen of [select value="|both prostatic &amp; testicular ends|the prostatic end"] of the Vas Deferens until blanching occurred.</span><br data-dcnode-id="637"><span data-dcnode-id="636" instrument_node="">[checkbox memo="only check if applicable" memo_size="small" name="interposition" value="-Facial interposition achieved with figure of eight stitch"][conditional field="interposition" condition="(interposition).is('-Facial interposition achieved with figure of eight stitch')"] using [select value="5-0|4-0"] vicryl suture material.</span><br data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">[/conditional]-The area of remaining Vas Deferens and perivas tissue exposed through the incision was inspected thoroughly.</span><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">-[select name="hemostasis" value="Good hemostasis was noted|Gentle electrocautery applied to achieve good hemostasis|Suturing was required to achieve hemostasis"] before the remaining Vas Deferens was reduced back into the scrotum.</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">[conditional field="hemostasis" condition="(hemostasis).is('Suturing was required to achieve hemostasis')"]-[select value="5-0|4-0"] vicryl suturing material used. </span><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">[/conditional]-These procedural steps described were repeated on the [conditional field="VasSide" condition="(VasSide).is('Left')"]Right[/conditional][conditional field="VasSide" condition="(VasSide).is('Right')"]Left[/conditional] Vas Deferens[conditional field="incisionsite" condition="(incisionsite).is('midline scrotal raphe')"] using the previously created midline raphae incision[/conditional].</span><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">-[select name="EBL" value="Estimated blood loss was less than 2 ml.|Estimated blood loss was"][conditional field="EBL" condition="(EBL).is('Estimated blood loss was')"] [text size="3"]ml and [textarea memo="hemostatic actions taken and referral arrangements as applicable" memo_color="orange" memo_size="small"]</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">-In the interim, patient was given post-op instructions to include: [checkbox value="physical limitations and work restrictions|using ice packs 20min on/off|use of scrotal support underwear (spandex/jock-strap)|avoiding contact with pets or kids for first 48-72hrs that might put patient at risk of accidental trauma and hematoma formation|picking up kit/instructions for semenanalysis from the lab|returning with semen sample to lab after 25 ejaculations AND after 13 weeks have elapsed"]</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">-Patient was given return precautions to include: [checkbox value="worsening pain more than 24hrs after the procedure|rapid increase in the amount of swelling of scrotum over the course of a few hours|white pus draining from wound(s)|development of fever"].</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">-Patient left in stable condition.</span><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">[/conditional][conditional field="EBL" condition="(EBL).is('Estimated blood loss was less than 2 ml.')"]</span><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node="">-For closure, scrotal fascia/skin was [select name="closure" value="allowed to close by secondary intention|closed with"][/conditional][conditional field="closure" condition="(closure).is('closed with')"] [select value="4-0|5-0"] [select value="Prolene|Nylon|Silk|Ethibond"] suture material[/conditional].[conditional field="EBL" condition="(EBL).is('Estimated blood loss was less than 2 ml.')"]</span><br data-dcnode-id="615"><span data-dcnode-id="614" instrument_node="">-Skin was dressed with sterile gauze.</span><br data-dcnode-id="613"><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">DISPOSITION</span><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">[checkbox value="-The patient tolerated the procedure well. No immediate complications noted."]</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">-Patient was reminded of post-procedural instructions including: [checkbox value="physical limitations and work restrictions|using ice packs 20min on/off|use of scrotal support underwear (spandex/jock-strap)|avoiding contact with pets or kids for first 48-72hrs that might put patient at risk of accidental trauma and hematoma formation|picking up kit/instructions for semenanalysis from the lab|returning with semen sample to lab after 25 ejaculations AND after 13 weeks have elapsed"]</span><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">-Gave patient return precautions to include: [checkbox value="worsening pain more than 24hrs after the procedure|rapid increase in the amount of swelling of scrotum over the course of a few hours|white pus draining from wound(s)|development of fever"].</span><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node="">-Patient left in stable condition. </span><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">-Followup plan: [textarea].[/conditional]</span></div><div class="tab-pane form-view-content active" data-dcnode-id="126" id="form_view"><p data-dcnode-id="599" id="element_count" style="display: none"></p><form autocomplete="off" data-dcnode-id="148" id="form_1" method="get"><span data-dcnode-id="598" instrument_node="">VASECTOMY PROCEDURE NOTE</span><br data-dcnode-id="597"><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">PROCEDURE: Elective Bilateral Vasectomy -CPT 55250</span><br data-dcnode-id="594"><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">PRE-OP DIAGNOSIS: </span><input data- label data-dcnode-id="560"><input data-dcnode-id="562" name="checkbox_6264f189c690b" type="checkbox" value="Lidocaine 2% WITH epinephrine"><span data-dcnode-id="561" instrument_node=""> Lidocaine 2% WITH epinephrine</span></label><span data-dcnode-id="559" instrument_node=""> </span><label data-dcnode-id="556"><input data-dcnode-id="558" name="checkbox_6264f189c690b" type="checkbox" value="Marcaine 0.5%"><span data-dcnode-id="557" instrument_node=""> Marcaine 0.5%</span></label><span data-dcnode-id="555" instrument_node=""> </span><label data-dcnode-id="552"><input data-dcnode-id="554" name="checkbox_6264f189c690b" type="checkbox" value="Sodium BiCarb buffering solution"><span data-dcnode-id="553" instrument_node=""> Sodium BiCarb buffering solution</span></label></span><span data-dcnode-id="550" instrument_node="">. Total amount used: </span><input data-dcnode-id="549" name="text_6264f189c693a" size="5" type="text" value=""><span data-dcnode-id="548" instrument_node=""> ml.</span><br data-dcnode-id="547"><br data-dcnode-id="546"><span class="checkbox" data-dcnode-id="541" name="supervision"><span data-dcnode-id="545" instrument_node=""> </span><label data-dcnode-id="542"><input data-dcnode-id="544" name="supervision" type="checkbox" value="Supervising Physician:"><span data-dcnode-id="543" instrument_node=""> Supervising Physician:</span></label></span><span class="hidden" data-dcnode-id="536" name="conditional_76156264f189c6974"><span data-dcnode-id="540" instrument_node=""> Dr. </span><input data-dcnode-id="539" name="text_6264f189c699d" size="20" type="text" value=""><br data-dcnode-id="538"><br data-dcnode-id="537"></span><span data-dcnode-id="535" instrument_node="">INDICATIONS/COUNSELING: </span><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">-Patient desires elective sterilization. </span><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">-Confirmed that Patient was counseled regarding the risks, alternatives, and benefits of male sterilization by vasectomy.</span><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">-Confirmed that patient was informed of the risks of the procedure, including but not limited to failure of the procedure to produce sterility, the risks of bleeding, infection, chronic testicular pain, and injury to scrotal contents.</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">-Confirmed that all questions were answered in the pre-vasectomy counseling visit. No guarantees were given or implied.</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">-Verified that the consent form was signed prior to patient taking preprocedural medication(s). </span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">-A time out was performed prior to the procedure and documented in a hardcopy form to be scanned into patient's record to include ensuring: </span><span class="memo exclude memo-small" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">only select what's applicable</span></span><br data-dcnode-id="520"><span class="checkbox" data-dcnode-id="508" name="checkbox_6264f189c69f6"><span data-dcnode-id="519" instrument_node=""> </span><label data-dcnode-id="509"><input data-dcnode-id="518" name="checkbox_6264f189c69f6" type="checkbox" value=" -Patient was identified using full name and DOB.<br> -Patient was evaluated and medical record reviewed including history and lab/imaging findings if applicable.<br> -Procedure and site/side matches the consent form.<br> -Patient was involved in the site/side marking.<br>"><span data-dcnode-id="517" instrument_node=""> -Patient was identified using full name and DOB.</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node=""> -Patient was evaluated and medical record reviewed including history and lab/imaging findings if applicable.</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node=""> -Procedure and site/side matches the consent form.</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node=""> -Patient was involved in the site/side marking.</span><br data-dcnode-id="510"></label></span><span class="checkbox" data-dcnode-id="494" name="timeout"><span data-dcnode-id="507" instrument_node=""> </span><label data-dcnode-id="495"><input data-dcnode-id="506" name="timeout" type="checkbox" value=" -For final timeout, physician paused or verbally confirmed with procedure team of:<br> -correct patient, correct procedure, and correct site/side. <br> -The patient has been positioned correctly for the procedure. <br> -All necessary equipment are available.<br> -Instrument sterility verified.<br>"><span data-dcnode-id="505" instrument_node=""> -For final timeout, physician paused or verbally confirmed with procedure team of:</span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node=""> -correct patient, correct procedure, and correct site/side. </span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node=""> -The patient has been positioned correctly for the procedure. </span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node=""> -All necessary equipment are available.</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node=""> -Instrument sterility verified.</span><br data-dcnode-id="496"></label></span><br data-dcnode-id="493"><span data-dcnode-id="492" instrument_node="">PHYSICAL EXAM: </span><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node="">Inspection/Palpation of the genitalia: </span><select data-dcnode-id="484" name="exam"><option data-dcnode-id="489" value=""></option><option data-dcnode-id="487" value="unremarkable">unremarkable</option><option data-dcnode-id="485" value="see below">see below</option></select><span class="memo exclude" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">choose one</span></span><span class="hidden" data-dcnode-id="473" name="conditional_42026264f189c6a67"><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">-no significant abnormalities or contraindications to performing the vasectomy in the outpatient clinic</span><br data-dcnode-id="479"><span data-dcnode-id="478" instrument_node="">-both testes normal without tenderness, masses, hydroceles, varicoceles, erythema or swelling.</span><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">-penile shaft normal, meatus normal without discharge</span><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">-anatomic landmarks were confirmed</span></span><span class="hidden" data-dcnode-id="468" name="conditional_40286264f189c6a78"><br data-dcnode-id="472"><textarea class="textarea_6264f189c6aa6" cols="60" data-dcnode-id="471" name="textarea_6264f189c6aa6" rows="5"></textarea><span class="memo exclude memo-orange memo-small" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">describe abnormalities/anomalies</span></span></span><br data-dcnode-id="467"><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">PROCEDURE </span><br data-dcnode-id="464"><span data-dcnode-id="463" instrument_node="">-The patient was laid supine on the procedure table. </span><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">-He was prepped and draped in the usual fashion using </span><select data-dcnode-id="456" name="select_6264f189c6ace"><option data-dcnode-id="459" value="Chlorhexidine">Chlorhexidine</option><option data-dcnode-id="457" value="Betadine/Iodine">Betadine/Iodine</option></select><span data-dcnode-id="455" instrument_node=""> and allowing proper dry time per manufacturer and infection control recommendations. </span><br data-dcnode-id="454"><span data-dcnode-id="453" instrument_node="">-After identifying the vasa bilaterally, the left vas was grasped using the three-finger technique. </span><br data-dcnode-id="452"><span data-dcnode-id="451" instrument_node="">-Using a 27g needle, a 1-2 cm wheal was made at the </span><select data-dcnode-id="444" name="incisionsite"><option data-dcnode-id="449" value="left scrotum">left scrotum</option><option data-dcnode-id="447" value="right scrotum">right scrotum</option><option data-dcnode-id="445" value="midline scrotal raphe">midline scrotal raphe</option></select><span data-dcnode-id="443" instrument_node=""> 1 cm distal to the base of the penis with anesthetic agent to provide local skin anesthesia. </span><br data-dcnode-id="442"><span data-dcnode-id="441" instrument_node="">-The needle was then advanced through the wheal and adjacent to the </span><select data-dcnode-id="436" name="VasSide"><option data-dcnode-id="439" value="Left">Left</option><option data-dcnode-id="437" value="Right">Right</option></select><span data-dcnode-id="435" instrument_node=""> Vas Deferens. </span><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">-After gentle aspiration, anesthetic agent was injected into the </span><select data-dcnode-id="428" name="select_6264f189c6b2e"><option data-dcnode-id="431" value="proximal perivas tissue">proximal perivas tissue</option><option data-dcnode-id="429" value="external spermatic fascia">external spermatic fascia</option></select><span data-dcnode-id="427" instrument_node=""> to achieve regional vasal block.</span><br data-dcnode-id="426"><span data-dcnode-id="425" instrument_node="">-The </span><span class="var" data-dcnode-id="423" name="VasSide"><span data-dcnode-id="424" instrument_node="">VasSide</span></span><span data-dcnode-id="422" instrument_node=""> Vas Deferens was maneuvered to the desired incision site, and </span><select data-dcnode-id="413" name="select_6264f189c6b6a"><option data-dcnode-id="420" value="no-scalpel technique with fine cured hemostat">no-scalpel technique with fine cured hemostat</option><option data-dcnode-id="418" value="fine-tip Bovie electrocautery">fine-tip Bovie electrocautery</option><option data-dcnode-id="416" value="#15 blade scalpel">#15 blade scalpel</option><option data-dcnode-id="414" value="#11 blade scalpel">#11 blade scalpel</option></select><span data-dcnode-id="412" instrument_node=""> was used to make a 1-2 cm incision. </span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node="">-The soft tissue was then bluntly dissected with fine cured hemostats.</span><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node="">-The </span><span class="var" data-dcnode-id="406" name="VasSide"><span data-dcnode-id="407" instrument_node="">VasSide</span></span><span data-dcnode-id="405" instrument_node=""> Vas Deferens was grasped and elevated through the incision and exposed using vas fixing forceps. Perivas tissue was bluntly dissected away using </span><select data-dcnode-id="399" name="select_6264f189c6ba3"><option data-dcnode-id="404" value=""></option><option data-dcnode-id="402" value="fine cured hemostats">fine cured hemostats</option><option data-dcnode-id="400" value="fine-tip bovie electrocautery">fine-tip bovie electrocautery</option></select><span data-dcnode-id="398" instrument_node="">. </span><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node="">-Once it was decided that sufficient perivas tissue had been dissected away and risk of superimposed vascular tissue over the vas deferens was low, a 1cm section of vas deferens was isolated using vas fixing forceps to grasp distal and proximal ends.</span><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">-</span><select data-dcnode-id="389" name="select_6264f189c6bbf"><option data-dcnode-id="392" value="Hemostats">Hemostats</option><option data-dcnode-id="390" value="Alice clamps">Alice clamps</option></select><span data-dcnode-id="388" instrument_node=""> were used to secure testicular and prostatic ends of vas deferens prior to transection.</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">-The 1cm segment of vas deferens was transected/excised using </span><select data-dcnode-id="380" name="select_6264f189c6bdb"><option data-dcnode-id="385" value=""></option><option data-dcnode-id="383" value="#15 blade scalpel">#15 blade scalpel</option><option data-dcnode-id="381" value="#11 blade scalpel">#11 blade scalpel</option></select><span data-dcnode-id="379" instrument_node=""> and this 1cm section was sent for pathologic examination/review.</span><br data-dcnode-id="378"><span data-dcnode-id="377" instrument_node="">-</span><select data-dcnode-id="372" name="select_6264f189c6bf6"><option data-dcnode-id="375" value="Electro">Electro</option><option data-dcnode-id="373" value="Thermal ">Thermal</option></select><span data-dcnode-id="371" instrument_node="">cautery was applied to </span><select data-dcnode-id="366" name="select_6264f189c6c10"><option data-dcnode-id="369" value="1cm">1cm</option><option data-dcnode-id="367" value="0.5cm">0.5cm</option></select><span data-dcnode-id="365" instrument_node=""> length of the lumen of </span><select data-dcnode-id="359" name="select_6264f189c6c2a"><option data-dcnode-id="364" value=""></option><option data-dcnode-id="362" value="both prostatic &amp; testicular ends">both prostatic &amp; testicular ends</option><option data-dcnode-id="360" value="the prostatic end">the prostatic end</option></select><span data-dcnode-id="358" instrument_node=""> of the Vas Deferens until blanching occurred.</span><br data-dcnode-id="357"><span class="checkbox" data-dcnode-id="350" name="interposition"><span data-dcnode-id="356" instrument_node=""> </span><label data-dcnode-id="353"><input data-dcnode-id="355" name="interposition" type="checkbox" value="-Facial interposition achieved with figure of eight stitch"><span data-dcnode-id="354" instrument_node=""> -Facial interposition achieved with figure of eight stitch</span></label><span class="memo exclude memo-small" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">only check if applicable</span></span></span><span class="hidden" data-dcnode-id="341" name="conditional_15916264f189c6c60"><span data-dcnode-id="349" instrument_node=""> using </span><select data-dcnode-id="344" name="select_6264f189c6c99"><option data-dcnode-id="347" value="5-0">5-0</option><option data-dcnode-id="345" value="4-0">4-0</option></select><span data-dcnode-id="343" instrument_node=""> vicryl suture material.</span><br data-dcnode-id="342"></span><span data-dcnode-id="340" instrument_node="">-The area of remaining Vas Deferens and perivas tissue exposed through the incision was inspected thoroughly.</span><br data-dcnode-id="339"><span data-dcnode-id="338" instrument_node="">-</span><select data-dcnode-id="331" name="hemostasis"><option data-dcnode-id="336" value="Good hemostasis was noted">Good hemostasis was noted</option><option data-dcnode-id="334" value="Gentle electrocautery applied to achieve good hemostasis">Gentle electrocautery applied to achieve good hemostasis</option><option data-dcnode-id="332" value="Suturing was required to achieve hemostasis">Suturing was required to achieve hemostasis</option></select><span data-dcnode-id="330" instrument_node=""> before the remaining Vas Deferens was reduced back into the scrotum.</span><br data-dcnode-id="329"><span class="hidden" data-dcnode-id="320" name="conditional_61766264f189c6ccc"><span data-dcnode-id="328" instrument_node="">-</span><select data-dcnode-id="323" name="select_6264f189c6cf0"><option data-dcnode-id="326" value="5-0">5-0</option><option data-dcnode-id="324" value="4-0">4-0</option></select><span data-dcnode-id="322" instrument_node=""> vicryl suturing material used. </span><br data-dcnode-id="321"></span><span data-dcnode-id="319" instrument_node="">-These procedural steps described were repeated on the </span><span class="" data-dcnode-id="317" name="conditional_55076264f189c6d05"><span data-dcnode-id="318" instrument_node="">Right</span></span><span class="hidden" data-dcnode-id="315" name="conditional_68976264f189c6d14"><span data-dcnode-id="316" instrument_node="">Left</span></span><span data-dcnode-id="314" instrument_node=""> Vas Deferens</span><span class="hidden" data-dcnode-id="312" name="conditional_29936264f189c6d24"><span data-dcnode-id="313" instrument_node=""> using the previously created midline raphae incision</span></span><span data-dcnode-id="311" instrument_node="">.</span><br data-dcnode-id="310"><span data-dcnode-id="309" instrument_node="">-</span><select data-dcnode-id="304" name="EBL"><option data-dcnode-id="307" value="Estimated blood loss was less than 2 ml.">Estimated blood loss was less than 2 ml.</option><option data-dcnode-id="305" value="Estimated blood loss was">Estimated blood loss was</option></select><span class="hidden" data-dcnode-id="247" name="conditional_75376264f189c6d4f"><span data-dcnode-id="303" instrument_node=""> </span><input data-dcnode-id="302" name="text_6264f189c6d95" size="3" type="text" value=""><span data-dcnode-id="301" instrument_node="">ml and</span><textarea class="textarea_6264f189c6dab" cols="60" data-dcnode-id="300" name="textarea_6264f189c6dab" rows="5"></textarea><span class="memo exclude memo-orange memo-small" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">hemostatic actions taken and referral arrangements as applicable</span></span><br data-dcnode-id="297"><span data-dcnode-id="296" instrument_node="">-In the interim, patient was given post-op instructions to include: </span><span class="checkbox" data-dcnode-id="271" name="checkbox_6264f189c6dc6"><span data-dcnode-id="295" instrument_node=""> </span><label data-dcnode-id="292"><input data-dcnode-id="294" name="checkbox_6264f189c6dc6" type="checkbox" value="physical limitations and work restrictions"><span data-dcnode-id="293" instrument_node=""> physical limitations and work restrictions</span></label><span data-dcnode-id="291" instrument_node=""> </span><label data-dcnode-id="288"><input data-dcnode-id="290" name="checkbox_6264f189c6dc6" type="checkbox" value="using ice packs 20min on/off"><span data-dcnode-id="289" instrument_node=""> using ice packs 20min on/off</span></label><span data-dcnode-id="287" instrument_node=""> </span><label data-dcnode-id="284"><input data-dcnode-id="286" name="checkbox_6264f189c6dc6" type="checkbox" value="use of scrotal support underwear (spandex/jock-strap)"><span data-dcnode-id="285" instrument_node=""> use of scrotal support underwear (spandex/jock-strap)</span></label><span data-dcnode-id="283" instrument_node=""> </span><label data-dcnode-id="280"><input data-dcnode-id="282" name="checkbox_6264f189c6dc6" type="checkbox" value="avoiding contact with pets or kids for first 48-72hrs that might put patient at risk of accidental trauma and hematoma formation"><span data-dcnode-id="281" instrument_node=""> avoiding contact with pets or kids for first 48-72hrs that might put patient at risk of accidental trauma and hematoma formation</span></label><span data-dcnode-id="279" instrument_node=""> </span><label data-dcnode-id="276"><input data-dcnode-id="278" name="checkbox_6264f189c6dc6" type="checkbox" value="picking up kit/instructions for semenanalysis from the lab"><span data-dcnode-id="277" instrument_node=""> picking up kit/instructions for semenanalysis from the lab</span></label><span data-dcnode-id="275" instrument_node=""> </span><label data-dcnode-id="272"><input data-dcnode-id="274" name="checkbox_6264f189c6dc6" type="checkbox" value="returning with semen sample to lab after 25 ejaculations AND after 13 weeks have elapsed"><span data-dcnode-id="273" instrument_node=""> returning with semen sample to lab after 25 ejaculations AND after 13 weeks have elapsed</span></label></span><br data-dcnode-id="270"><span data-dcnode-id="269" instrument_node="">-Patient was given return precautions to include: </span><span class="checkbox" data-dcnode-id="252" name="checkbox_6264f189c6ddf"><span data-dcnode-id="268" instrument_node="">
