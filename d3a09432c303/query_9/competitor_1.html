"> </span></span></a></span></div></div></nav><div class="site grid-container container hfeed" data-dcnode-id="272" id="page"><div class="site-content" data-dcnode-id="273" id="content"><div class="content-area" data-dcnode-id="436" id="primary"><main class="site-main" data-dcnode-id="437" id="main"><div class="grid-container yoast-breadcrumb" data-dcnode-id="1370"><p data-dcnode-id="1371" id="breadcrumbs"><span data-dcnode-id="1372"><span data-dcnode-id="1373"><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/"><span data-dcnode-id="1382" instrument_node="">Vasectomy Information</span></a><span data-dcnode-id="1380" instrument_node=""> › </span><span data-dcnode-id="1374"><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/what-to-know/"><span data-dcnode-id="1379" instrument_node="">What to know</span></a><span data-dcnode-id="1377" instrument_node=""> › </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">History</span></span></span></span></span></p></div><article class="post-40 page type-page status-publish has-post-thumbnail infinite-scroll-item" data-dcnode-id="478" id="post-40" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="479"><header class="entry-header" data-dcnode-id="1367"><h1 class="entry-title" data-dcnode-id="1368" itemprop="headline"><span data-dcnode-id="1369" instrument_node="">History of Vasectomy: Brief history of the procedure</span></h1></header><div class="entry-content" data-dcnode-id="579" itemprop="text"><div class="toc" data-dcnode-id="1355"><a data-dcnode-id="1365" href="#early-studies"><span data-dcnode-id="1366" instrument_node="">Early studies</span></a><span data-dcnode-id="1364" instrument_node=""> | </span><a data-dcnode-id="1362" href="#eugenics-and-treatment"><span data-dcnode-id="1363" instrument_node="">Eugenics and treatment</span></a><span data-dcnode-id="1361" instrument_node=""> | </span><a data-dcnode-id="1359" href="#method-of-birth-control"><span data-dcnode-id="1360" instrument_node="">Method of birth control</span></a><span data-dcnode-id="1358" instrument_node=""> | </span><a data-dcnode-id="1356" href="#recent-developments"><span data-dcnode-id="1357" instrument_node="">Recent developments</span></a></div><p data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node="">Most people would say </span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/"><span data-dcnode-id="1353" instrument_node="">vasectomy</span></a><span data-dcnode-id="1351" instrument_node=""> came in during the late 1950’s/1960’s as a male birth control method. This to an extent is true. However, the history of vasectomy is long and interesting. It’s also not been used purely as a lifestyle choice as it is today.</span></p><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">This page is a history of the procedure, both political and clinical. You’ll probably find it more interesting than you might think!</span></p><h2 class="anchor" data-dcnode-id="1346" id="early-studies"><span data-dcnode-id="1347" instrument_node="">Early vasectomy studies and contraceptives</span></h2><h3 data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">1470-1530</span></h3><p data-dcnode-id="1336"><span data-dcnode-id="1343" instrument_node="">The vas deferens was named by </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacopo_Berengario_da_Carpi" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1342" instrument_node="">Berengarius of Carpi</span></a><span data-dcnode-id="1340" instrument_node=""> </span><em data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">(1470–1530)</span></em><span data-dcnode-id="1337" instrument_node=""> from the Latin for “Vessel”, and the Latin “Deferre” – to carry down. He was under the misapprehension that sperm passes down the vas.</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1335" instrument_node="">John Hunter chanced across a blocked vas deferens during the dissection of a corpse</span><sup class="modern-footnotes-footnote" data-dcnode-id="1333" data-mfn="1" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1334" instrument_node="">1</span></sup><span data-dcnode-id="1332" instrument_node="">, but the vas deferens otherwise seems to have been ignored until the 19th century.</span></p><h3 data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">1640</span></h3><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">The oldest condoms were found in the foundations of Dudley Castle near Birmingham, England. They were made of fish and animal intestine and dated back to 1640. They were probably used to prevent transmission of sexually transmitted infections during the war between the forces of Oliver Cromwell and soldiers loyal to King Charles I.</span></p><h3 data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">1830</span></h3><p data-dcnode-id="1321"><span data-dcnode-id="1324" instrument_node="">Sir Ashley Cooper’s “Observations on the Structure and Diseases of the Testis” published in London. Cooper’s experiments were on dogs – it’s not certain who first attempted the operation in humans.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1322" data-mfn="2" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1323" instrument_node="">2</span></sup></p><p data-dcnode-id="1316"><span data-dcnode-id="1320" instrument_node="">Based on the ligation of one of a dog’s testicles in 1822 where the artery and vein were tied.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1318" data-mfn="3" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1319" instrument_node="">3</span></sup><span data-dcnode-id="1317" instrument_node=""> It was observed that no issue followed coitus. The conclusion after killing and dissecting the testicle was that merely closing the outlet duct of the testicle had no effect on the germinal portion of the organ, and did not stop generation of sperm, but the epidermis was much enlarged to accommodate the products of germinal cell activity. Sperm generation continued for 6 years.</span></p><h3 data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">1844</span></h3><p data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">Goodyear and Hancock began to mass produce condoms made out of vulcanized rubber. </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/vulcanization" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1312" instrument_node="">Vulcanization</span></a><span data-dcnode-id="1310" instrument_node=""> is a process which turns crude rubber into a strong elastic material.</span></p><h3 data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">1847</span></h3><p data-dcnode-id="1303"><span data-dcnode-id="1306" instrument_node="">Gosselin whilst dissecting human corpses noticed cases in which the vas deferens was entirely blocked, and had undoubtedly been so for many years. He observed that the enlarged epididymis contained quantities of spermatozoa and undertook the experimental study of effects of ligation and resection of the vas deferens, using dogs as experimental material.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1304" data-mfn="4" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1305" instrument_node="">4</span></sup></p><h3 data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">1861</span></h3><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">The first advertisement for condoms was published in an American newspaper when The New York Times printed an ad. for “Dr. Power’s French Preventatives.”</span></p><h3 data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">1873</span></h3><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">USA – </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/wgbh/americanexperience/features/pill-anthony-comstocks-chastity-laws/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1295" instrument_node="">The Comstock Law</span></a><span data-dcnode-id="1293" instrument_node=""> was passed. Named after Anthony Comstock, the Comstock Law made illegal the advertising of any sort of birth control, and it also allowed the postal service to confiscate condoms sold through the mail.</span></p><h3 data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">1884</span></h3><p data-dcnode-id="1282"><span data-dcnode-id="1289" instrument_node="">Brissaud</span><sup class="modern-footnotes-footnote" data-dcnode-id="1287" data-mfn="5" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1288" instrument_node="">5</span></sup><span data-dcnode-id="1286" instrument_node=""> and Griffiths</span><sup class="modern-footnotes-footnote" data-dcnode-id="1284" data-mfn="6" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1285" instrument_node="">6</span></sup><span data-dcnode-id="1283" instrument_node="">, working on rabbits and dogs respectively, observed that blocking the outlet of the vas deferens duct had no influence on spermatogenesis. IE sperm are still produced after sealing off the vas deferens. Like Cooper in 1830, they also observed no testicular degeneration and an enlarged epidermis due to the immense amount of spermatozoa carried to it.</span></p><p data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">Moullin publishes a paper describing the effect of castration on the prostate that was occasionally performed by surgeons for “Symptoms of severe prostatic hypertrophy”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1279" data-mfn="7" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1280" instrument_node="">7</span></sup><span data-dcnode-id="1278" instrument_node=""> The purpose being that after removal of the testes, the enlarged prostate quickly shrank. He noted that “In a large proportion of cases, following removal of the testes there is a rapid absorption of the enlarged prostate. The gland entirely disappears leaving a fibrous mass”.</span></p><h3 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">1890</span></h3><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Vasectomy suggested as an alternative to castration by Ewing Mears for the treatment of severe symptoms of prostatic hypertrophy.</span></p><h2 class="anchor" data-dcnode-id="1271" id="eugenics-and-treatment"><span data-dcnode-id="1272" instrument_node="">Eugenics and vasectomy as a treatment</span></h2><h3 data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">1899</span></h3><p data-dcnode-id="1262"><span data-dcnode-id="1268" instrument_node="">Ochsner </span><em data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">(future professor of Surgery at the University of Illinois)</span></em><span data-dcnode-id="1265" instrument_node=""> publishes his paper “Surgical treatment of habitual criminals”, which kick-starts the Eugenics movement.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1263" data-mfn="8" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1264" instrument_node="">8</span></sup></p><p data-dcnode-id="1255"><span data-dcnode-id="1261" instrument_node="">According to Jhaver, Harry Sharp, the physician in a penal institution in Indiana had a 19 year old male patient who complained of “Excessive masturbation” who insisted on castration. Sharp ruled out castration as it was deemed too mutilating, so advised vasectomy.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1259" data-mfn="3" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1260" instrument_node="">3</span></sup><span data-dcnode-id="1258" instrument_node=""> After a few weeks despite no spermatozoa in the ejaculate there was no improvement, so the vasectomy was repeated. Several months later he was reported to have stopped masturbating and was making good progress in the prison school. Sharp claimed to have seen no unfavourable symptoms of vasectomy in the patient. “On the contrary he became more of a sunny disposition, brighter of intellect and ceased to masturbate”. The patient then subsequently “advised his fellows to submit to the operation for their own good”. Sharp also claimed that “The man’s mind and nervous system – especially the centres of self restraint are strengthened by re-absorption of sperm”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1256" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1257" instrument_node="">9</span></sup></p><h3 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">1900</span></h3><p data-dcnode-id="1242"><span data-dcnode-id="1252" instrument_node="">Harrison publishes a paper based on over 100 cases where “Vasectomy was the primary procedure or an adjunct to facilitate removal of bladder stones”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1250" data-mfn="10" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1251" instrument_node="">10</span></sup><span data-dcnode-id="1249" instrument_node=""> Claims of rapid and substantial improvement with minimal morbidity led to the treatment being fashionable for a short time for management of BPH </span><em data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">(see 2003)</span></em><span data-dcnode-id="1246" instrument_node="">, but fell into disrepute quickly due to being based on rather dubious reports. Wood publishes a case study of 193 patients undergoing vasectomy as treatment for enlarged prostate.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1244" data-mfn="11" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1245" instrument_node="">11</span></sup><span data-dcnode-id="1243" instrument_node=""> 15% had improved urination, but 67% manifested some “General improvement”.</span></p><h3 data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">1902</span></h3><p data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">According to Jhaver, the operation of Epilidyno-vasotomy was introduced by Martin in 1902.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1237" data-mfn="12" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1238" instrument_node="">12</span></sup><span data-dcnode-id="1236" instrument_node=""> The technique of the operation bears a close resemblance to the same operation by the name of Vaso-epididmostomy, as described by Phadke in 1953. Later to be known as Epididymectomy. It was practiced as a cure for Tuberculosis.</span></p><h3 data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">1904</span></h3><p data-dcnode-id="1225"><span data-dcnode-id="1232" instrument_node="">Bilateral Vasectomy first established to be effective in reducing the incidence of epididymitis after prostatectomy.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1230" data-mfn="13" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1231" instrument_node="">13</span></sup><span data-dcnode-id="1229" instrument_node=""> The medical profession had sought hard to find an alternative to the existing practice of castration for enlarged prostate, and it was established by White that vasectomy was an effective treatment.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1227" data-mfn="14" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1228" instrument_node="">14</span></sup><span data-dcnode-id="1226" instrument_node=""> One of the reasons alternatives were sought is the reputed case whereby a disgruntled patient murdered a surgeon! Vasectomy remained in common use as a cure for post-prostate surgery until antibiotics were common place.</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1224" instrument_node="">Wallace reviewed the results of vas deferens ligation in man.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1222" data-mfn="15" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1223" instrument_node="">15</span></sup><span data-dcnode-id="1221" instrument_node=""> He commented on the practice of vasectomy to relieve the symptoms of BPH. He remarked that bearing in mind that rest had good results on prostate enlargement, it was an open question as to if the results in the vasectomy research on the condition may have been </span><em data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">(in part)</span></em><span data-dcnode-id="1218" instrument_node=""> due to rest. He also performed vasectomy on cats and dogs to test the result obtained on animals by Bouin &amp; Ancel in their experiments 1903 onwards.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1216" data-mfn="16" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1217" instrument_node="">16</span></sup><span data-dcnode-id="1215" instrument_node=""> Unlike them, he found that the testes in such cases were perfectly normal many months later than Bouin &amp; Ancel would imply was “Sufficient time” to expect degeneration. He concluded that “Single or double vasectomy has no effect on the spermatogenic function of the testes, with them continuing to produce spermatozoa months or years after total occlusion of both vas deferens”.</span></p><p data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">Shattock &amp; Seligman performed double vasectomy on Hardwick Rams.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1211" data-mfn="17" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1212" instrument_node="">17</span></sup><span data-dcnode-id="1210" instrument_node=""> 18 months after the vasectomy they observed that the testes were normal sized and spermatogenesis continued. As with others, they noted that the epididymis was larger than normal, and they also noted that if the blood vessels were included in the ligation, then the testes may be abnormal.</span></p><h3 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">1907</span></h3><p data-dcnode-id="1200"><span data-dcnode-id="1206" instrument_node="">Indiana introduces a bill authorising “Compulsory sterilisation of any confirmed criminal, idiot, rapist or imbecile in a state institution”. Eventually 29 other states followed.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1204" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1205" instrument_node="">9</span></sup><span data-dcnode-id="1203" instrument_node=""> In the UK, the Eugenics Education Society was formed, but failed to do little more than influencing various committees.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1201" data-mfn="18" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1202" instrument_node="">18</span></sup></p><p data-dcnode-id="1196"><span data-dcnode-id="1199" instrument_node="">Parlovechoi first attempted to reverse an accidental vasectomy that occurred in a hernia operation. Later authors describe the technique under the names of Vasorraphy or vasovasal anastomis.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1197" data-mfn="19" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1198" instrument_node="">19</span></sup></p><h3 data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">1908</span></h3><p data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node="">In a series of studies from 1903 – 1908, Bouin &amp; Ancel examined the effect on sex glands in animals after vasectomy.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1191" data-mfn="16" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1192" instrument_node="">16</span></sup><span data-dcnode-id="1190" instrument_node=""> They concluded that vasectomy in post-puberty animals causes degeneration of the germinal tissues of the testes. The dismissed earlier researchers contrary findings by presuming an “Insufficient length of time after the operation before the animals were killed”.</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1188" instrument_node="">Belfield publishes his paper “Race suicide for social parasites”. He was one of the proponents of enforced vasectomy for criminals.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1186" data-mfn="20" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1187" instrument_node="">20</span></sup></p><h3 data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">1909</span></h3><p data-dcnode-id="1179"><span data-dcnode-id="1182" instrument_node="">Sharp publishes “Vasectomy as a means of preventing procreation in defectives”. He urged colleagues to lobby legislative bodies for laws to allow clinicians to sterilize every male in all state institutions. </span><sup class="modern-footnotes-footnote" data-dcnode-id="1180" data-mfn="21" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1181" instrument_node="">21</span></sup></p><h3 data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">1910</span></h3><p data-dcnode-id="1173"><span data-dcnode-id="1176" instrument_node="">Russian Government sends a delegation to the American Prison Association conference to witness a sterilization procedure. Sharp duly obliged with a “consenting” prison inmate.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1174" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1175" instrument_node="">9</span></sup></p><h3 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">1918</span></h3><p data-dcnode-id="1157"><span data-dcnode-id="1170" instrument_node="">Steinach performs the first vasectomy on humans for “Rejuvenation”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1168" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1169" instrument_node="">9</span></sup><span data-dcnode-id="1167" instrument_node=""> Based an experiment on a rat he believed so old to have lost it’s germ cell production capacity, he observed that senile rats were “Transformed after obstructing the outflow from the testes by vasectomy”. Papers were not published on the effects of vasectomy on rats until 1920</span><sup class="modern-footnotes-footnote" data-dcnode-id="1165" data-mfn="22" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1166" instrument_node="">22</span></sup><span data-dcnode-id="1164" instrument_node="">, 1921</span><sup class="modern-footnotes-footnote" data-dcnode-id="1162" data-mfn="23" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1163" instrument_node="">23</span></sup><span data-dcnode-id="1161" instrument_node=""> and 1923</span><sup class="modern-footnotes-footnote" data-dcnode-id="1159" data-mfn="24" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1160" instrument_node="">24</span></sup><span data-dcnode-id="1158" instrument_node="">. Notable characters such as Sigmund Freud and WB Yeats had vasectomy for rejuvenation.</span></p><h3 data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">1920</span></h3><p data-dcnode-id="1145"><span data-dcnode-id="1154" instrument_node="">A paper on “Testicle Transplantation” published.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1152" data-mfn="25" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1153" instrument_node="">25</span></sup><span data-dcnode-id="1151" instrument_node=""> It had been observed by Sharp</span><sup class="modern-footnotes-footnote" data-dcnode-id="1149" data-mfn="21" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1150" instrument_node="">21</span></sup><sup class="modern-footnotes-footnote" data-dcnode-id="1147" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1148" instrument_node="">9</span></sup><span data-dcnode-id="1146" instrument_node=""> that a hormone boost by injecting an extract fresh from the testes under the skin had a remarkable influence on various conditions. In the paper, transplanting testicles from executed prisoners was shown to have a beneficial effect. “A mentally dull 25 year old received a double transplant from a Negro, after which he became more active, talked more, wrote better letters, comprehended jokes and had more sexual activity”.</span></p><h3 data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">1921</span></h3><p data-dcnode-id="1132"><span data-dcnode-id="1142" instrument_node="">Simmonds in human autopsies, found blocking of the vas deferens that had been there for many years without any injury to the generative part.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1140" data-mfn="26" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1141" instrument_node="">26</span></sup><span data-dcnode-id="1139" instrument_node=""> Neither testicular degeneration nor loss of the germinal epithelium had occurred, and the epididymis was enlarged by the immense number of spermatozoa carried to it. Tiedje followed Steinarch in believing that vasectomy rejuvenated germinal epithelium cells</span><sup class="modern-footnotes-footnote" data-dcnode-id="1137" data-mfn="27" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1138" instrument_node="">27</span></sup><span data-dcnode-id="1136" instrument_node="">, and Wheelon found in dogs that nine months after vasectomy the testis contained all elements of germinal epithelium.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1134" data-mfn="28" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1135" instrument_node="">28</span></sup><span data-dcnode-id="1133" instrument_node=""> He believed that either all the tubules did not degenerate, or that some rejuvenation had indeed happened.</span></p><h3 data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">1922</span></h3><p data-dcnode-id="1123"><span data-dcnode-id="1129" instrument_node="">Benjamin publishes papers describing the scientific principles, theory and practice of the Steinarch operation.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1127" data-mfn="29" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1128" instrument_node="">29</span></sup><sup class="modern-footnotes-footnote" data-dcnode-id="1125" data-mfn="30" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1126" instrument_node="">30</span></sup><span data-dcnode-id="1124" instrument_node=""> The theory was that the back pressure in the testicle caused by cutting the vas deferens led to an increase of male hormone production. The closer to the testicle the ligation, the more hormone stimulation. He reported a series of cases where patients reported regrowth of hair, better colour, better erections less premature ejaculation and increased libido. He recommended that men with two healthy testicles should have the operation done on one testicle only, leaving room to do the operation again on the other side at a later date for another boost of rejuvenation.</span></p><h3 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">1924</span></h3><p data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">Moore &amp; Quick tested the hypothesis of early degeneration of the testes on a series of rabbits. They found no degeneration of the testes, and as with others an enlarged epididymis.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1118" data-mfn="31" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1119" instrument_node="">31</span></sup><span data-dcnode-id="1117" instrument_node=""> They found no evidence to lead them to assume an early degeneration of germinal epithelium followed by regeneration.</span></p><h3 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">1927</span></h3><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Virginia sterilisation law challenged, but upheld in the case of an inmate in the state colony for epileptics. The inmate had a mentally subnormal mother and daughter, and the judge felt that “Three generations of imbeciles are enough”. Many of the early laws were quickly overturned following legal challenges, however between 1909 and 1924 over 6000 people were forcibly sterilised – half of them in California.</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1111" instrument_node="">In Germany, the Kaiser Wilhelm Institute for Anthropology, Human Genetics and Eugenics was established. It experimented into how to “Discriminate race on the basis of blood group, shape of tongue and outer ear, and the half moon at the base of fingernails”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1109" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1110" instrument_node="">9</span></sup></p><h3 data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">1928</span></h3><p data-dcnode-id="1102"><span data-dcnode-id="1105" instrument_node="">Switzerland introduces the first European eugenics law.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1103" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1104" instrument_node="">9</span></sup></p><h3 data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">1931</span></h3><p data-dcnode-id="1096"><span data-dcnode-id="1099" instrument_node="">In the UK Major A.G. Church of the Committee for legalising Eugenic Sterilisation attempted to introduce a bill to Parliament. It was defeated because of opposition from the Labour party who said it was fundamentally against the working classes.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1097" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1098" instrument_node="">9</span></sup></p><h3 data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">1932</span></h3><p data-dcnode-id="1090"><span data-dcnode-id="1093" instrument_node="">In Germany, a Reich Sterilisation law was drafted. This was before Hitler’s Chancellorship started in January 1933.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1091" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1092" instrument_node="">9</span></sup></p><h3 data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">1933</span></h3><p data-dcnode-id="1084"><span data-dcnode-id="1087" instrument_node="">In Germany, a law was passed requiring certification of fitness to marry issued by the local health office. Unsuccessful candidates were considered candidates and tried in “Hereditary health courts”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1085" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1086" instrument_node="">9</span></sup></p><h3 data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">1936</span></h3><p data-dcnode-id="1077"><span data-dcnode-id="1081" instrument_node="">Abeshouse publishes “Vasectomy for prevention of epididymitis in prostatic surgery”. A common complication of prostate surgery at the time was epididymo-orchitis, presumed due to the retrograde flow of infected urine.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1079" data-mfn="32" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1080" instrument_node="">32</span></sup><span data-dcnode-id="1078" instrument_node=""> The technique remained in common usage until the advent of anti-biotics.</span></p><h3 data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">1938</span></h3><p data-dcnode-id="1067"><span data-dcnode-id="1074" instrument_node="">Twyman &amp; Nelson reported a successful case of Vasectomy Anastomosis </span><em data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">(reversal)</span></em><span data-dcnode-id="1071" instrument_node="">.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1069" data-mfn="33" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1070" instrument_node="">33</span></sup><span data-dcnode-id="1068" instrument_node=""> The patient underwent the Anastomosis procedure 4 years after elective vasectomy was performed. The operation was recommended by reason of emotional depression due to the desire to father children. The patient’s emotional condition improved considerably, and he has subsequently had normal offspring.”</span></p><h3 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">1945</span></h3><p data-dcnode-id="1059"><span data-dcnode-id="1064" instrument_node="">German enforced sterilisation under the “Fitness to marry” legislation ceases after Allied victory in Europe. 320,000 people were sterilised during the period 1933 to 1945 under the law.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1062" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1063" instrument_node="">9</span></sup><sup class="modern-footnotes-footnote" data-dcnode-id="1060" data-mfn="34" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1061" instrument_node="">34</span></sup></p><p data-dcnode-id="1055"><span data-dcnode-id="1058" instrument_node="">Cameron reports “A case of a 26-year-old man who had been sterilized via ligation and cutting of the spermatic cords underwent vasorrhaphy and anastomosis of the vas deferens in an attempt to be able to conceive. 3 months after the operation a sperm count was 2,500,000 sperm/cc semen indicating a successful patency”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1056" data-mfn="35" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1057" instrument_node="">35</span></sup></p><h2 class="anchor" data-dcnode-id="1053" id="method-of-birth-control"><span data-dcnode-id="1054" instrument_node="">Vasectomy as method of birth control</span></h2><h3 data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">1948</span></h3><p data-dcnode-id="1047"><span data-dcnode-id="1050" instrument_node="">O’Connor lists the indications for vasectomy as being:</span><sup class="modern-footnotes-footnote" data-dcnode-id="1048" data-mfn="9" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1049" instrument_node="">9</span></sup></p><ul data-dcnode-id="1031"><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Prevention of the insane, criminal or perverse producing offspring.</span></li><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">If the wife has precarious health and is unable or refuses to undergo tubal ligation.</span></li><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">An agreement between husband and wife to prevent pregnancy.</span></li><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">To prevent epididymitis following prostate surgery.</span></li><li data-dcnode-id="1034"><span data-dcnode-id="1038" instrument_node="">Rejuvenation </span><em data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">(Steinarch procedure)</span></em><span data-dcnode-id="1035" instrument_node="">.</span></li><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Mass sterilization for the purpose of racial limitation/extermination.</span></li></ul><h3 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">1950</span></h3><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">Garrison &amp; Gamble publish a paper in the US titled Sexual effects of vasectomy.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1026" data-mfn="36" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1027" instrument_node="">36</span></sup><span data-dcnode-id="1025" instrument_node=""> The report based on a sample size of 50 finds that 47 were satisfied and would do it again. They remark that few men reported any sexual changes, but of those that did, both libido and frequency of intercourse were slightly increased.</span></p><h3 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">1951</span></h3><p data-dcnode-id="1014"><span data-dcnode-id="1021" instrument_node="">Handley reports a case where vassoraphy </span><em data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">(repair)</span></em><span data-dcnode-id="1018" instrument_node=""> war performed ten years after the original vasectomy with a complete recovery of function.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1016" data-mfn="37" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1017" instrument_node="">37</span></sup><span data-dcnode-id="1015" instrument_node=""> His wife became pregnant about 6 months after the operation.</span></p><h3 data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">1952</span></h3><p data-dcnode-id="1008"><span data-dcnode-id="1011" instrument_node="">Phadke reads a paper at the Third international conference on planned parenthood commenting “Favourably” on the use of vasectomy for sterilization.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1009" data-mfn="38" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1010" instrument_node="">38</span></sup></p><h3 data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">1953</span></h3><p data-dcnode-id="999"><span data-dcnode-id="1005" instrument_node="">Walker stared that “It can be said with confidence that vasectomy has no adverse effects on the physical or mental welfare of the patient.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1003" data-mfn="39" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1004" instrument_node="">39</span></sup><span data-dcnode-id="1002" instrument_node=""> Operative patients have now been watched for a period of 30 years and no delayed adverse effects have been noted”. He followed up the cases at varying intervals. It was observed that complications occurred as a result of technical surgical errors.</span><sup class="modern-footnotes-footnote" data-dcnode-id="1000" data-mfn="40" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="1001" instrument_node="">40</span></sup></p><h3 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">1955</span></h3><p data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">Jhaver introduces the single incision, single stitch approach. His paper on the technique was published in 1958.</span><sup class="modern-footnotes-footnote" data-dcnode-id="994" data-mfn="19" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="995" instrument_node="">19</span></sup><span data-dcnode-id="993" instrument_node=""> The advantage of the technique being that a bilateral vasectomy was possible using one incision, therefore less surgical trauma and post operative care.</span></p><h3 data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">1956</span></h3><p data-dcnode-id="983"><span data-dcnode-id="989" instrument_node="">Evridge-Vernon publish a paper on “Natural reunion and canalization” following the division of the vas deferens in humans and animals.</span><sup class="modern-footnotes-footnote" data-dcnode-id="987" data-mfn="41" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="988" instrument_node="">41</span></sup><span data-dcnode-id="986" instrument_node=""> The authors did a follow up two years later and observed natural reunion in some cases.</span><sup class="modern-footnotes-footnote" data-dcnode-id="984" data-mfn="40" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="985" instrument_node="">40</span></sup></p><p data-dcnode-id="979"><a aria-label="undefined (opens in a new tab)" data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregory_Goodwin_Pincus" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="982" instrument_node="">Gregory Pincus</span></a><span data-dcnode-id="980" instrument_node="">, his colleague Dr. Min Chuh Chang and Dr. John Rock, gynecologist from Harvard, conduct the first trials of the oral contraceptive with 60 female volunteers. Pincus carries out the first large trial with 6,000 participants in Puerto Rico and Haiti – successfully.</span></p><h3 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">1960</span></h3><p data-dcnode-id="973"><a aria-label="undefined (opens in a new tab)" data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//embryo.asu.edu/pages/enovid-first-hormonal-birth-control-pill" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="976" instrument_node="">Enovid</span></a><span data-dcnode-id="974" instrument_node="">®, produced by US company Searle, is registered as a female contraceptive in the United States.</span></p><h3 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">1963</span></h3><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">In California, Poffenberger publishes his report on 2000 voluntary vasectomies performed between 1956 – 1961.</span><sup class="modern-footnotes-footnote" data-dcnode-id="968" data-mfn="42" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="969" instrument_node="">42</span></sup><span data-dcnode-id="967" instrument_node=""> He reports that “Not only were men pleased with the result of the operation but they talked about its advantages freely and attempted, often with success, to convince others to have it done. In some cases, men came several hundred miles to have the operation. 85.6% of the men there was no medical problem stated as a reason for requesting vasectomy”. At the time, vasectomy was often used as a cure for other conditions, and not for family planning.</span></p><h3 data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">1964</span></h3><p data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">In India, Phadke publishes a paper titled “Vasectomy: sterilization of the male”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="961" data-mfn="43" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="962" instrument_node="">43</span></sup><span data-dcnode-id="960" instrument_node=""> He reports on who is a suitable candidate, the procedure including after care and known problems.</span></p><h3 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">1965</span></h3><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">On June 7 the U.S. Supreme Court, in Griswold v. Connecticut, struck down state laws that had made the use of birth control by married couples illegal. The court’s landmark decision — coming five years after oral contraceptives became available to American women and 49 years after Margaret Sanger opened the first birth control clinic in the U.S. — legalized the use of birth control and paved the way for the nearly unanimous acceptance of contraception that now exists in this country.</span></p><p data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">In China, Lal published a study pointing out that third pregnancies were routinely “Interrupted” and the woman sterilized.</span><sup class="modern-footnotes-footnote" data-dcnode-id="952" data-mfn="44" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="953" instrument_node="">44</span></sup><span data-dcnode-id="951" instrument_node=""> It calculated that 43 million sterilizations were needed to depress the population’s growth rate to 1%. It queried if the Government would ever follow a policy that was “So contrary to Confucian ideals and Marxist dogmatism”.</span></p><h3 data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">1966</span></h3><p data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">In the UK, the “Simon Population Trust” project was announced in “The Lancet”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="945" data-mfn="45" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="946" instrument_node="">45</span></sup><span data-dcnode-id="944" instrument_node=""> The Trust’s sterilization project first function was to make known how voluntary sterilization can help to solve or prevent family problems and to facilitate its practice in Britain. The project was also concerned to correct the erroneous belief, still held by a dwindling number of medical and law persons, that sterilization was against the law. At the time of the report, at least 2000 men have already been sterilized through the mediation of this Project.</span></p><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">1967</span></h3><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">In India, Kothari &amp; Pardanani demonstrate that it’s possible to produce a subfertile sperm count by using a synthetic thread to temporarily obstruct the vas deferens with the idea of removing it to restore fertility.</span><sup class="modern-footnotes-footnote" data-dcnode-id="938" data-mfn="46" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="939" instrument_node="">46</span></sup><span data-dcnode-id="937" instrument_node=""> Based on two cases, the authors say that the thread was left in for 20 weeks, and six weeks later fertility had returned to previous levels.</span></p><p data-dcnode-id="928"><span data-dcnode-id="935" instrument_node="">Bergen published a report detailing the legality of sterilization in the US. He reported that sterilization for therapeutic purposes was not prohibited in any state, and was still prohibited for birth control purposes in Connecticut, Kansas, and Utah. Sterilization for certain eugenic purposes was authorized in 28 states.</span><sup class="modern-footnotes-footnote" data-dcnode-id="933" data-mfn="47" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="934" instrument_node="">47</span></sup><span data-dcnode-id="932" instrument_node=""> Voluntary sterilization for any reason </span><em data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">(with limitation concerning age and consent)</span></em><span data-dcnode-id="929" instrument_node=""> was permitted by statute in Georgia, North Carolina, and Virginia.</span></p><h3 data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">1968</span></h3><p data-dcnode-id="922"><span data-dcnode-id="925" instrument_node="">Article published in the Journal of American Medicine reports that lower income males often have great difficulty in obtaining sterilization operations because physicians are concerned about the opposition of the Catholic Church, the question of legality, and the possibility of civil damages.</span><sup class="modern-footnotes-footnote" data-dcnode-id="923" data-mfn="48" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="924" instrument_node="">48</span></sup></p><h3 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">1969</span></h3><p data-dcnode-id="912"><span data-dcnode-id="919" instrument_node="">In Bangladesh a study was undertaken by Quddus, Ratcliffe &amp; Croley to inquire into the background of individuals known as “vasectomy agents”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="917" data-mfn="49" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="918" instrument_node="">49</span></sup><span data-dcnode-id="916" instrument_node=""> These commission paid individuals acted by bringing men into the East Pakistan </span><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">(Bangladesh)</span></em><span data-dcnode-id="913" instrument_node=""> Family Planning Clinics for vasectomy. Their activities have caused the number of vasectomies to rise beyond expectation. About 40% had undergone vasectomy themselves. Due to the success of these unofficial agents, the government decided that they should be given official recognition. Partly so that recruiting activities could be supervised.</span></p><h3 data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">1970</span></h3><p data-dcnode-id="906"><span data-dcnode-id="909" instrument_node="">An article published in the Journal of the American Medical Association entitled “Vaccine against sperm?” finds that the autoimmune response in vasectomized men may suggest a path for development of a male contraceptive vaccine.</span><sup class="modern-footnotes-footnote" data-dcnode-id="907" data-mfn="50" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="908" instrument_node="">50</span></sup></p><h3 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">1971</span></h3><p data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">“Family planning festival” in Cochin city, Kerala, India. Cash incentives offered for participants.</span><sup class="modern-footnotes-footnote" data-dcnode-id="901" data-mfn="47" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="902" instrument_node="">47</span></sup><span data-dcnode-id="900" instrument_node=""> 913 vasectomies performed in one month as a result of the campaign. Total estimated cost was 9 million Rupees, total estimated saving to the government 162 million Rupees.</span></p><p data-dcnode-id="895"><span data-dcnode-id="898" instrument_node="">Jhaver et all evaluate the use of tantalum clips placed around the vas with the hypothesis that the procedure would lend itself to more successful reversibility.</span><sup class="modern-footnotes-footnote" data-dcnode-id="896" data-mfn="51" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="897" instrument_node="">51</span></sup></p><h3 data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">1972</span></h3><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">Gujurat state </span><em data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">(India)</span></em><span data-dcnode-id="889" instrument_node=""> carries out 222,000 in a two moth period. This campaign was less successful than the 1971 Kerala program, as that program offered rewards for officials and volunteers.</span></p><p data-dcnode-id="884"><span data-dcnode-id="887" instrument_node="">Swiss program to control Gypsy population ended.</span><sup class="modern-footnotes-footnote" data-dcnode-id="885" data-mfn="34" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="886" instrument_node="">34</span></sup></p><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">An article by Prucell profiling D. Pai of Bombay attributes the lower birthrate in Bombay to his sterilization program. 3 old buses, equipped with the best medical equipment and manned by trained physicians, tour Bombay.</span><sup class="modern-footnotes-footnote" data-dcnode-id="881" data-mfn="52" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="882" instrument_node="">52</span></sup><span data-dcnode-id="880" instrument_node=""> Each has been the site of 10,000 vasectomies. In addition, free condom distribution centers and vasectomy clinics have been set up in Bombay railroad stations. Pai and his doctors also approach women who have just delivered their second child. Nearly 30% accept tubectomy.</span></p><p data-dcnode-id="871"><span data-dcnode-id="878" instrument_node="">On March 22, the US Supreme Court ruled on the historic </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eisenstadt_v._Baird" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="877" instrument_node="">Baird vs. Eisenstadt case</span></a><span data-dcnode-id="875" instrument_node="">, which legalized birth control for non-married people and established the primary precedent for Roe vs. Wade </span><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">(1/21/73)</span></em><span data-dcnode-id="872" instrument_node="">.</span></p><p data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">In the UK, the The National Health Service </span><em data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">(Family Planning)</span></em><span data-dcnode-id="867" instrument_node=""> Amendment Act 1972 authorizes the performing of vasectomy operations for contraceptive purposes. Prior to this, the law was unclear – especially in Scotland, where feudal laws were still standing.</span></p><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">A similar argument in France meant the law was not clarified there until 2001. Prior to that, under the existing Napoleonic code vasectomy was regarded as “mutilation”, with a similar inference that messing with a man’s testicles makes him particularly unfit as a soldier.</span></p><h3 data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">1973</span></h3><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Over 7 million vasectomies performed in India to date due to cash initiative schemes.</span></p><p data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">The term “vasectomania” coined in a report by D &amp; H Wolfers.</span><sup class="modern-footnotes-footnote" data-dcnode-id="857" data-mfn="53" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="858" instrument_node="">53</span></sup><span data-dcnode-id="856" instrument_node=""> At the time, various countries governments were using incentives to promote vasectomy, and the term originally referred to these political initiatives. However, the term got misused in later years. The report said that men should NOT be pressured to undergo the procedure, and that “The free, unprompted, informed decision of a man to terminate his own fertility is the only legitimate reason for vasectomy. The following should NOT be given as reasons for vasectomy:</span></p><ol data-dcnode-id="844"><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">That it is the best present they can give to their wives.</span></li><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">That it is reversible.</span></li><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">That men experience greater libido or feelings of better general health.</span></li><li data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">That it was ever used for rejuvenation.</span></li><li data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">That it is a way to contribute to the solution of the world’s problems.</span></li></ol><p data-dcnode-id="833"><span data-dcnode-id="843" instrument_node="">An article published in Biomed News entitled “Implants seen as reversible contraceptives”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="841" data-mfn="54" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="842" instrument_node="">54</span></sup><span data-dcnode-id="840" instrument_node=""> discusses an implant that may offer a reversible contraceptive. The device </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">(not yet tested on humans)</span></em><span data-dcnode-id="837" instrument_node=""> plugs the entrance to the Fallopian tube without surgery using a new instrument </span><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">(steerable hysteroscope)</span></em><span data-dcnode-id="834" instrument_node="">. It is hoped to offer better protection that the IUD 2% pregnancy rate. Removal is accomplished with an attached string.</span></p><h2 class="anchor" data-dcnode-id="831" id="recent-developments"><span data-dcnode-id="832" instrument_node="">Recent developments and legislation</span></h2><h3 data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">1974</span></h3><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">No-Scalpel vasectomy developed in China by Dr. Li Shunqiang of the Chongqing Family Planning Research Institute, Sichuan province. At the time, vasectomy was unpopular with Chinese men, and tubal ligation was the most commonly used method of voluntary sterilisation. The procedure was minimally invasive with a much lower complication than conventional vasectomy, especially in extremely rural areas with limited medical facilities.</span></p><p data-dcnode-id="823"><span data-dcnode-id="826" instrument_node="">It was reported that in the richer parts of the world, vasectomy became more widespread due to adverse publicity about the pill and a feminist campaign to encourage greater male responsibility in sexual matters.</span><sup class="modern-footnotes-footnote" data-dcnode-id="824" data-mfn="55" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="825" instrument_node="">55</span></sup></p><h3 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">1975</span></h3><p data-dcnode-id="817"><span data-dcnode-id="820" instrument_node="">A ruling is made in Germany when a man tried to sue for a child born after a failed vasectomy. The case was dismissed on the grounds that the consent form signed by the patient mentioned failure as a possibility, and the Doctor had performed the service “as per contract”.</span><sup class="modern-footnotes-footnote" data-dcnode-id="818" data-mfn="56" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="819" instrument_node="">56</span></sup></p><p data-dcnode-id="813"><span data-dcnode-id="816" instrument_node="">A study by Wagenaar into the usefulness of vasectomy in prostatic surgery finds that vasectomy does not reduce the incidence of epididymitis, and concludes that “vasectomy as a routine in prostatic surgery is not indicated”. It lists sterility as a “possible complication”!</span><sup class="modern-footnotes-footnote" data-dcnode-id="814" data-mfn="57" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="815" instrument_node="">57</span></sup></p><p data-dcnode-id="809"><span data-dcnode-id="812" instrument_node="">A study by Kaplan &amp; Huether into failed vasectomy finds that the length of excised vas deferens is crucial. Less than 15mm had up to a 25-fold greater incidence of failure.</span><sup class="modern-footnotes-footnote" data-dcnode-id="810" data-mfn="58" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="811" instrument_node="">58</span></sup></p><p data-dcnode-id="805"><span data-dcnode-id="808" instrument_node="">Drueschke, Zaneveld, Burns, Rodzen, Wingfield &amp; Maness publish a paper detailing their research into “Rigid, reversible, vas deferens occlusive devices” similar to plumbing valves.</span><sup class="modern-footnotes-footnote" data-dcnode-id="806" data-mfn="59" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="807" instrument_node="">59</span></sup></p><p data-dcnode-id="801"><span data-dcnode-id="804" instrument_node="">In the Philippines, a program sponsored by Churches and hospitals reports the growing popularity of voluntary sterilisation since the criminal penalties against it have been removed.</span><sup class="modern-footnotes-footnote" data-dcnode-id="802" data-mfn="60" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="803" instrument_node="">60</span></sup></p><h3 data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">1977</span></h3><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">The Family Planning Association of Hong Kong launches a TV campaign to encourage men to “do their bit”. the “Mr Family Planning” campaign had television personalities portraying two characters, Mr Birth Control and Mr Vasectomy.</span></p><h3 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">1983</span></h3><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Male and Female sterilization legalized in Turkey</span></p><h3 data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">1985</span></h3><p data-dcnode-id="783"><span data-dcnode-id="790" instrument_node="">First US No-scalpel vasectomy performed by </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marc_Goldstein" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="789" instrument_node="">Dr. Marc Goldstein</span></a><span data-dcnode-id="787" instrument_node=""> at the New York Presbyterian Hospital Cornell Medical Center. Dr. Goldstein was a member of the international team sponsored by the Association of Voluntary Surgical Contraception </span><em data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">(Now Engender health)</span></em><span data-dcnode-id="784" instrument_node=""> to go to China to learn the procedure. The procedure was introduced to other countries of the world by other team members.</span></p><h3 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">1990</span></h3><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">FDA gives the female implant contraceptive “Norplant” approval.</span></p><h3 data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">1997</span></h3><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Male and Female sterilization legalized in Brazil</span></p><h3 data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">1999</span></h3><p data-dcnode-id="766"><span data-dcnode-id="772" instrument_node="">No-needle vasectomy introduced in August </span><em data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">(after six years of preparation)</span></em><span data-dcnode-id="769" instrument_node=""> using a “hypospray” jet injector for anesthesia. The technique was developed by Charles L. Wilson, M.D of Seattle, USA in consultation with the late Ralph Adam, M.D. – the inventor of the MadaJet device used in the technique.</span><sup class="modern-footnotes-footnote" data-dcnode-id="767" data-mfn="61" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="768" instrument_node="">61</span></sup></p><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">April – “Norplant” ceases to be available in the UK due to virtually no demand for the product. August – It was reported that the maker of Norplant will pay over $50 million to more than 36,000 women to settle claims that the implantable contraceptive device caused headaches, irregular menstrual bleeding, nausea and depression. Wyeth-Ayerst Laboratories said the move to end five years of litigation was “purely a business decision.”</span></p><h3 data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">2001</span></h3><p data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">The law in France was changed to allow sterilization </span><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">(male and female)</span></em><span data-dcnode-id="758" instrument_node="">.</span></p><h3 data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">2003</span></h3><p data-dcnode-id="748"><span data-dcnode-id="754" instrument_node="">A study published in China into the long term effects of vasectomy on BPH concludes that “Vasectomy reduces the incidence rate of BPH significantly.” BPH stands for Benign prostatic hyperplasia </span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">(benign enlargement of the prostate)</span></em><span data-dcnode-id="751" instrument_node="">.</span><sup class="modern-footnotes-footnote" data-dcnode-id="749" data-mfn="62" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="750" instrument_node="">62</span></sup></p><h3 data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">2004</span></h3><p data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">Robotic vasectomy reversal first performed on rats. In a study by Schiff, Li &amp; Goldstein a new microsurgical robot that had FDA approval in 2000 was used to perform two types of reversal procedures on rats.</span><sup class="modern-footnotes-footnote" data-dcnode-id="743" data-mfn="63" data-mfn-post-scope="0000000077cc6c39000000005a70af39_40"><span data-dcnode-id="744" instrument_node="">63</span></sup><span data-dcnode-id="742" instrument_node=""> The robot does not have the shake that human hands do. Initial results were that patency was higher in the robotic group than the group where humans performed the operation, and the incidence of granuloma’s was significantly lower in one of the robotic groups.</span></p><h3 data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">2005</span></h3><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Publication of further research into the technique of using a high-pressure injector to administer the anaesthetic results in less discomfort for patients, and is faster acting than needle administered local anaesthesia known as “No Needle”. The technique was introduced into practice by in Canada by Dr. Ronald Weiss of the University of Ottawa.</span></p><span data-dcnode-id="736" instrument_node=""> </span><details class="ref" data-dcnode-id="600"><span data-dcnode-id="735" instrument_node=""> </span><summary data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">References and further reading</span></summary><span data-dcnode-id="732" instrument_node=""> </span><small data-dcnode-id="728"><span data-dcnode-id="731" instrument_node="">Vasectomy-Information.com has a strict sourcing policy. We rely on evidence-based medicine, peer-reviewed studies, reputable clinical journals, and medical associations. Learn more about how we ensure our content is accurate and up-to-date by reading our </span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy-information.com/about-us/%23editorial-policy"><span data-dcnode-id="730" instrument_node="">editorial policy.</span></a></small><ol data-dcnode-id="601"><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Hunter J. On the glands called vesiculae seminales. In: Palmer JF, Complete Works. London: Longman, Reese, Orm, Brown, Green &amp; Longman, 1737;4: 23</span></li><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Cooper A. Observations on the Structure and Diseases of the Testis. 1830</span></li><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">P.S. Jhaver. Male sterilisation and it’s effects Thesis. Agra University India, 1952 – 1954.</span></li><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node=""> Gosselin, P. Memoire sur les obliterations devoies spermatique. Arch. Gen. De Med. (4th series) 1847.</span></li><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Brissaud, E. Les effects de la ligature due canal deferent, Arch. D Physio, 2nd series. 1880.</span></li><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Griffiths Journ Anat &amp; Physiol 1894.</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Moullin CWM Enlargement of the Prostate. H.K. Lewis (London) 1884.</span></li><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Ochsner AJ S
