</span><div class="body" data-dcnode-id="549"><p class="numberData" data-dcnode-id="1178"><strong data-dcnode-id="1179" style="line-height: 1.5em;"><span data-dcnode-id="1180" instrument_node="">Number:&nbsp;0027</span></strong></p><span data-dcnode-id="1177" instrument_node="">
</span><p class="cpbNumberText displayBlock" data-dcnode-id="1176"></p><span data-dcnode-id="1175" instrument_node="">
</span><h2 class="policyHead" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Policy</span></h2><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Aetna considers the following vasectomy procedures (not an all-inclusive list) experimental and investigational because of insufficient evidence of&nbsp;their effectiveness:</span></p><span data-dcnode-id="1168" instrument_node="">
</span><ul data-dcnode-id="1151"><span data-dcnode-id="1167" instrument_node="">
</span><li class="bullet" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Endoscopic vasectomy</span></li><span data-dcnode-id="1164" instrument_node="">
</span><li class="bullet" data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">Implantable vas deferens ligation clip (Vasclip, VMBC, LLC, Roseville, MN)</span></li><span data-dcnode-id="1161" instrument_node="">
</span><li class="bullet" data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Pro-Vas occlusion method</span></li><span data-dcnode-id="1158" instrument_node="">
</span><li class="bullet" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Vasal injection (e.g., reversible inhibition of sperm under guidance (RISUG)</span></li><span data-dcnode-id="1155" instrument_node="">
</span><li class="bullet" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Vasal occlusion (e.g., Intra Vas Plug, and LigaSure).</span></li><span data-dcnode-id="1152" instrument_node="">
</span></ul><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Aetna considers the following procedures experimental and investigational for the treatment of post-vasectomy pain syndrome because there is inadequate evidence in the peer-reviewed published literature regarding their effectiveness (not an all-inclusive list):</span></p><span data-dcnode-id="1147" instrument_node="">
</span><ul data-dcnode-id="1136" style="margin-bottom: 70px;"><span data-dcnode-id="1146" instrument_node="">
</span><li class="bullet" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Epididymectomy</span></li><span data-dcnode-id="1143" instrument_node="">
</span><li class="bullet" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Micro-denervation of the spermatic cord</span></li><span data-dcnode-id="1140" instrument_node="">
</span><li class="bullet" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Vasectomy reversal procedure.</span></li><span data-dcnode-id="1137" instrument_node="">
</span></ul><span data-dcnode-id="1135" instrument_node="">
</span><span data-dcnode-id="1133" instrument_node="">
</span><h2 data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Background</span></h2><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">According to a guideline on sterilization by the American College of Obstetricians and Gynecologists (ACOG, 2003), approximately 500,000 vasectomies are performed annually in the United States by urologists, general surgeons, and family physicians.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">During vasectomy, an incision or puncture (no-scalpel technique) is made in the scrotum and the vas deferens is then cut to disconnect it, thereby interrupting the sperm's route from the testicles to the penis.&nbsp; A piece of the vas is removed (to reduce the chances of the&nbsp;2 ends of the vas rejoining) and the&nbsp;2 ends are then clipped, tied, or cauterized.&nbsp; Fascial interposition, in which one end of the vas is covered by either the sheath tissues of the vas itself or with adjacent connective tissue, is also widely used in conjunction with occlusion techniques to reduce the risk of re-canalization.&nbsp; A controversial and less widespread practice involves leaving the testicular end of the vas unsealed to allow sperm to flow out of the vas in order to minimize pressure on and damage to the epididymis (Errey et al, 1986).&nbsp; Once the vasectomy is performed, the testicles still generate sperm, but their movement is blocked.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">The rate of vasectomy failure, defined as lack of azoospermia on follow-up semen analysis (SA) or presence of pregnancy, has generally been reported to be between 0 % to 2 % (Cook et al, 2004; ACOG, 2003).&nbsp; The&nbsp;3 main causes of vasectomy failure are operative failure, unprotected intercourse before the semen is cleared of sperm, and spontaneous early or late recanalization of the vas (Cook et al, 2004).&nbsp; Failure rates are reportedly lower when traditional vasectomy is performed by more experienced surgeons (Schwingl et al, 2000).&nbsp; Vasectomy is considered a low-risk procedure with fewer than 3 % of cases resulting in complications; complications include: infection, bleeding, hematoma, acute and chronic pain and congestive epididymitis.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Since the late 1960s, attempts have been made to develop an alternative method of vasectomy that would be more easily reversible than a standard vasectomy.&nbsp; Most of these efforts focused on the use of mechanical valves that could be opened and closed.&nbsp; The Vasclip, a locking ligation clip the size of a grain of rice, was cleared for marketing by the Food and Drug Administration (FDA) based on a 510(k) application.&nbsp; Thus, the manufacturer was not required to supply the evidence of effectiveness that would be required to support a pre-market approval application (PMA).&nbsp; The FDA 510(k) summary of substantial equivalence stated the Vasclip is identical in use to the Hem-o-lok, a polymer ligating clip that is used to close off vessels that supply blood to organs.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">An unpublished prospective clinical study available through VMBC, LLC, the VASCLIP Company and on their website, reported the results of 124 men who had the Vasclip procedure.&nbsp; Three of the men (2.5 %) did not become infertile due to improper placement of the Vasclip, 0.8 % developed a hematoma and 0.8 % developed a sperm granuloma.&nbsp; Sixty-eight of the patients who returned for a SA all tested as infertile (no live sperm) at an average of 373 days after the Vasclip procedure and all of the 78 patients who returned for a SA tested as infertile at an average of 853 days after.&nbsp; Reported range of significant pain was 5 %.&nbsp; Statistics on reversal are not yet available.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">The potential for enhancing reversal is one main rationale for the use of vas occlusion with clips (Schwingl et al, 2000).&nbsp; In addition, the manufacturer states that the Vasclip results in lower complication rates than conventional male sterilization procedures.&nbsp; However, it is not known whether the Vasclip compresses the vas so tightly that the blood supply to the underlying portion of vas is permanently damaged.&nbsp; There is no adequate evidence in the peer-reviewed published medical literature that the Vasclip has a reduced late failure rate, lower complication rate or improved reversal rate then traditional vasectomy.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p class="noMarginInline" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">There is inconsistent evidence regarding the effectiveness of the Vasclip implant compared to standard vasectomy procedures.&nbsp; Kirby et al (2006) examined if the Vasclip implant procedure would</span></p><span data-dcnode-id="1108" instrument_node="">
</span><ol aria-hidden="true" class="listInsideParagraph" data-dcnode-id="1097"><span data-dcnode-id="1107" instrument_node="">
</span><li data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">be equivalent to vasectomy in producing azoospermia,</span></li><span data-dcnode-id="1104" instrument_node="">
</span><li data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">produce greater patient satisfaction post-operatively, and</span></li><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">result in lower complication rates, post-operative pain, hematoma formation, spermatic granuloma, and surgical site infection when compared with historical controls.</span></li><span data-dcnode-id="1098" instrument_node="">
</span></ol><ol class="hiddenDecimal sr-only" data-dcnode-id="1086" type="1"><span data-dcnode-id="1096" instrument_node="">
</span><li data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">be equivalent to vasectomy in producing azoospermia,</span></li><span data-dcnode-id="1093" instrument_node="">
</span><li data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">produce greater patient satisfaction post-operatively, and</span></li><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">result in lower complication rates, post-operative pain, hematoma formation, spermatic granuloma, and surgical site infection when compared with historical controls.</span></li><span data-dcnode-id="1087" instrument_node="">
</span></ol><span data-dcnode-id="1085" instrument_node="">
</span><p class="displayInline" data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Successful sterilization, defined by azoospermia at 10 to 14 months, was observed in 116 of 119 subjects. The authors stated that effectiveness seemed to be equivalent to that of vasectomy, although the study did not include an internal control group of subjects receiving vasectomy.&nbsp; The authors observed that the incidence of post-operative pain and hematoma formation was similar to that which had been reported for standard vasectomy.&nbsp; The Vasclip procedure also had similar infection rates.&nbsp; The authors reported that the Vasclip procedure seemed to have lower rates of sperm granuloma formation compared to standard vasectomy.&nbsp; In&nbsp;3 subjects with persistent presence of sperm, histological examination after traditional vasectomy indicated that misalignment of the device led to partial vas incision with recanalization.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080" style="display: inline;"><span data-dcnode-id="1081" instrument_node="">The authors reported that 99 % of survey respondents would recommend that other men considering a vasectomy have the Vasclip procedure.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077" style="margin-top: 20px;"><span data-dcnode-id="1078" instrument_node="">On the other hand, Levine et al (2006) found persistent motile sperm after the Vasclip procedure.&nbsp; The authors assessed the effectiveness and mechanism of failure in a small case series of Vasclip vasectomies.&nbsp; Microscopic semen analysis was done a minimum of 4 weeks post-operatively and after at least 15 ejaculations.&nbsp; The number of sperm and motility were quantified in 15 or more high power fields.&nbsp; Successful vasectomy was defined as 2 consecutive post-operative unspun semen analyses containing no sperm.&nbsp; Patients with failed vasectomy underwent bilateral surgical removal of the vas deferens segments containing the ligation band for gross and histological analysis.&nbsp; Six of 8 patients (75 %) were deemed azoospermic after 2 semen analyses at a mean follow-up of 7 and 11 weeks post-operatively, respectively.&nbsp; Two of 8 patients (25 %) had semen analyses containing multiple motile sperm after vasectomy.&nbsp; In the 2 failed cases 1 side was patent, as demonstrated by vasal cannulation and irrigation with dilute methylene blue despite a well-positioned, intact and secure ligation band.&nbsp; Histological analysis showed extravasation and sperm granuloma on the patent side.&nbsp; The authors concluded that the Vasclip was found to fail at an unexpectedly high rate.&nbsp; Pathological analysis suggests sperm extravasation and fistula tract formation as the mechanism.&nbsp; One failure resulted in an unwanted pregnancy, which demonstrates the need for patient counseling regarding post-operative follow-up.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Cook et al (2004) systematically reviewed the evidence comparing male sterilization techniques.&nbsp; They identified&nbsp;2 controlled clinical trials (Gupta et al, 1997 [n = 110]; Clausen et al, 1983 [n = 79]) comparing vas occlusion with clips (no transection of the vas) versus a conventional vasectomy technique (transaction of the vas with both ends of the vas ligated and looped back).&nbsp; Neither trial found a significant difference between the&nbsp;2 groups with regard to the primary outcome of failure to reach azoospermia. However, Cook et al (2004)&nbsp;stated that no firm conclusions can be made about the comparative effectiveness, safety, and acceptability of these vas occlusion techniques due to the poor quality of the studies.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">In a Cochrane review on vasectomy occlusion techniques for male sterilization that include excision and ligation, thermal or electrocautery, mechanical/chemical occlusion, as well as vasectomy with vas irrigation or with fascial inter-position (Cook et al, 2007), the authors concluded that for vas occlusion with clips or vasectomy with vas irrigation, no conclusions can be made as those studies were of low quality and under-powered.&nbsp; Fascial inter-position reduced vasectomy failure.&nbsp; An intra-vas device was less effective in reducing sperm count than was no-scalpel vasectomy.&nbsp; They noted that randomized controlled studies evaluating other vasectomy techniques were not available; more and better quality research is needed to examine vasectomy techniques.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">The Pro-Vas occlusion technique utilizes a titanium spring ligation clip that stops the flow of sperm without the need to cut or burn the sperm ducts.&nbsp; Pro-Vas has also been reported to result in less post-procedure pain and quicker return to normal activities compared with traditional vasectomy.&nbsp; Additionally, there were no complications following Pro-Vas occlusions, however, it is acknowledged the number of patients is not sufficient to provide statistically significant results.&nbsp; According to Dr. Swartz, the Pro-Vas occlusion technique has the potential to simplify and standardize the vasectomy technique.&nbsp; It may provide less experienced vasectomy surgeons a means for achieving clinical results similar to those of experienced surgeons.&nbsp; The Pro-Vas technique also spares sacrificing the vasal artery.&nbsp; Dr. Swartz added that there should be a lower re-canalization rate with the Pro-Vas method because the spring ligation clip cannot dislodge or ever lose its constant low-pressure occlusion force.&nbsp; Additionally, the clip is designed not to apply so much pressure that may result in necrosis – a situation that sometimes occurs with other types of ligatures.&nbsp; Should the patient ever change his mind with regard to his vasectomy, reversal of the Pro-Vas procedure should be much easier as the clip is very easy to identify and dissection to find the two occluded ends of the vas will be much simpler.&nbsp; Patient acceptance may be higher with the Pro-Vas occlusion technique than traditional vasectomy because overall quality of the outcomes may be improved.&nbsp; However, these hypotheses need to be confirmed by additional clinical studies.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Michielsen and Beerthuizen (2010) performed a systematic Medline/PubMed and Cochrane Library review of the literature with regard to technique, effectiveness, safety and complications of male sterilization.&nbsp; Vasectomy is an outpatient procedure which can be performed under local anesthesia.&nbsp; The vas deferens is accessed by means of either a conventional incision with a scalpel or by using the "no-scalpel technique".&nbsp; A closed-ended vasectomy (by means of suture ligature, surgical clips or electro-cautery) or the open-ended alternative is then carried out.&nbsp; Each of these techniques has both advantages and drawbacks.&nbsp; Fascial interposition has been shown to reduce the risk of failure.&nbsp; A promising alternative for occluding the vas consists of placing an intra-vas device.&nbsp; Hematoma and pain are the most common complications.&nbsp; Non-steroidal anti-inflammatory drugs, narcotic analgesics and neuroleptic drugs are effective for treatment of pain.&nbsp; The success of vasectomy reversal ranges from 30 to 60 %.&nbsp; The data on record convincingly demonstrate that vasectomy is a safe and cost-effective intervention for permanent male contraception.&nbsp; The no-scalpel vasectomy under local anesthesia is recommended.&nbsp; Occlusion of the vas is most successful when performed by means of an electrocautery; fascial interposition should complete the procedure.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><span class="beforeList" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">The American Urological Association’s guideline on "Vasectomy" (Sharlip et al, 2012) provided guidance to clinicians who offer vasectomy services.&nbsp; This guideline was peer-reviewed by 55 independent experts during the guideline development process.&nbsp; The guideline stated that vas isolation should be performed using a minimally-invasive vasectomy technique such as the no-scalpel vasectomy technique.&nbsp; Vas occlusion should be performed by any 1 of 4 techniques that are associated with occlusive failure rates consistently below 1 %.&nbsp; These are mucosal cautery of both ends of the divided vas without ligation or clips </span></span><span data-dcnode-id="1061" instrument_node="">
</span><ol aria-hidden="true" class="listInsideParagraph decimal" data-dcnode-id="1047"><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">with or</span></li><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">without fascial interposition;</span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">open testicular end of the divided vas with mucosal cautery of abdominal end with fascial interposition and without ligation or clips; and</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">non-divisional extended electrocautery.</span></li><span data-dcnode-id="1048" instrument_node="">
</span></ol><ol class="hiddenDecimal sr-only" data-dcnode-id="1033" type="1"><span data-dcnode-id="1046" instrument_node="">
</span><li data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">with or</span></li><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">without fascial interposition;</span></li><span data-dcnode-id="1040" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">open testicular end of the divided vas with mucosal cautery of abdominal end with fascial interposition and without ligation or clips; and</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">non-divisional extended electrocautery.</span></li><span data-dcnode-id="1034" instrument_node="">
</span></ol><span data-dcnode-id="1032" instrument_node="">
</span><p class="displayInline" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Patients may stop using other methods of contraception when 1 un-centrifuged fresh semen specimen shows azoospermia or less than or equal to 100,000 non-motile sperm/ml. The authors concluded that vasectomy should be considered for permanent contraception much more frequently than is the current practice in the U.S. and many other nations.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027" style="margin-top: 24px;"><span data-dcnode-id="1028" instrument_node="">The European Association of Urology’s guidelines on "Male infertility" (Jungwirth et al, 2013) stated that fascial interposition and cauterization appears to be the most effective vasectomy technique.&nbsp; Furthermore, methods of male contraception other than vasectomy are associated with high failure rates or are still experimental (e.g., hormonal approach).</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">In a Cochrane review, Cook et al (2014) compared the effectiveness, safety, acceptability and costs of vasectomy techniques for male sterilization.&nbsp; In February 2014, these investigators updated the searches of CENTRAL, MEDLINE, POPLINE and LILACS.&nbsp; They looked for recent clinical trials in ClinicalTrials.gov and the International Clinical Trials Registry Platform.&nbsp; Previous searches also included EMBASE.&nbsp; For the initial review, the authors searched the reference lists of relevant articles and book chapters.&nbsp; They included randomized controlled trials (RCTs) comparing vasectomy techniques, which could include suture ligature, surgical clips, thermal or electrocautery, chemical occlusion, vas plugs, vas excision, open-ended vas, fascial interposition, or vas irrigation.&nbsp; These researchers assessed all titles and abstracts located in the literature searches; 2 reviewers independently extracted data from articles identified for inclusion.&nbsp; Outcome measures include contraceptive efficacy, safety, discontinuation, and acceptability.&nbsp; Peto odds ratios (OR) with 95 % confidence intervals (CI) were used for dichotomous outcomes, such as azoospermia.&nbsp; The mean difference (MD) was used for the continuous variable of operating time.&nbsp; A total of 6 studies met the inclusion criteria; 1 trial compared vas occlusion with clips versus a conventional vasectomy technique.&nbsp; No difference was found in failure to reach azoospermia (no sperm detected).&nbsp; Three trials examined vasectomy with vas irrigation; 2 studies looked at irrigation with water versus no irrigation, while 1 examined irrigation with water versus the spermicide euflavine.&nbsp; None found a difference between the groups for time to azoospermia.&nbsp; However, 1 trial reported that the median number of ejaculations to azoospermia was lower in the euflavine group compared to the water irrigation group.&nbsp; One high-quality trial compared vasectomy with fascial interposition versus vasectomy without fascial interposition.&nbsp; The fascial interposition group was less likely to have vasectomy failure.&nbsp; Fascial interposition had more surgical difficulties, but the groups were similar in side effects.&nbsp; Lastly, 1 trial found that an intra-vas was less likely to produce azoospermia than was no-scalpel vasectomy.&nbsp; More men were satisfied with the intra-vas device, however.&nbsp; The authors concluded that for vas occlusion with clips or vasectomy with vas irrigation, no conclusions can be made as those studies were of low quality and under-powered.&nbsp; Fascial interposition reduced vasectomy failure.&nbsp; An intra-vas device was less effective in reducing sperm count than was no-scalpel vasectomy.&nbsp; Moreover, they stated that RCTs examining other vasectomy techniques were not available.&nbsp; More and better quality research is needed to examine vasectomy techniques.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Tan and Levine (2016) stated that post-vasectomy pain syndrome (PVPS) remains one of the more challenging urological problems to manage.&nbsp; This can be a frustrating process for both the patient and clinician as there is no well-recognized diagnostic regimen or reliable effective treatment.&nbsp; The authors noted that while excision of sperm granuloma, micro-denervation of the spermatic cord (MDSC), epididymectomy, vasectomy reversal or orchiectomy has been used in refractory cases of PVPS, the success rates of these procedures remain unclear due to the availability of only small case series of men undergoing surgical treatment for this condition.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Smith and colleagues (2016) noted that variations in vasectomy techniques have failed to define a means of preventing PVPS.&nbsp; In addition, studies examining the pathophysiology of this condition have failed to elucidate a reproducible cause.&nbsp; Prevailing assumptions are focused upon epididymal congestion and obstruction.&nbsp; Potentially, up-and-coming techniques such as vasal occlusive gels, currently under development, offer novel alternatives to traditional vasectomy.&nbsp; Such an intra-vasal approach could involve the percutaneous puncture of the vasal lumen and instillation of a reversible, semi-permeable polymer gel.&nbsp; This intra-vasal option could theoretically decrease the negative side effects that result from direct scrotal manipulation.&nbsp; However, if the assumption of epididymal congestion holds true, it would stand to reason that any mechanism that retards the flow of sperm from the epididymis has the potential to result in post-vasectomy pain.&nbsp; Thus, potentially the best correction for post-vasectomy pain rests with the generation of a hypothetical male oral conceptive.&nbsp; Such a medication, by avoiding the need to have an occlusive process for vasectomy, could eliminate post-vasectomy pain and its related sequelae.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><h3 data-dcnode-id="1014"><span data-dcnode-id="1016" instrument_node="">Vasal Injection and Vasal Occlusion</span><span aria-hidden="true" data-dcnode-id="1015"></span></h3><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Kanakis and Goulis (2015) stated that despite the variety of available female contraceptive methods, many pregnancies are still undesired.&nbsp; Many men want to participate equally with their partner in family planning; however, male contraceptive methods (MCMs) account for only 14 % of those used worldwide and no pharmaceutical MCM is available so far.&nbsp; The only 2 MCMs currently available are condoms, which despite protecting against sexually transmitted diseases have high failure rates, and vasectomy, which though very efficient (99 %) is poorly reversible.&nbsp; Among MCMs under investigation, male hormonal contraceptives (MHCs) are those that have come closest to commercialization.&nbsp; The action of MHCs relies on the disruption of spermatogenesis that exogenous androgen administration evokes by suppressing the hypophyseal-gonadal axis.&nbsp; Various regimens of androgens as monotherapy or in combination with progestins have been tested in clinical trials achieving a Pearl Index that is equal to that of the female oral contraceptive pill; however, concerns regarding the variable response rates observed (non-responders: 5 to 20 %), the impracticality of parenteral administration and long-term prostate-associated or cardiovascular morbidity have deflected the interest of the pharmaceutical industry from further research.&nbsp; Non-hormonal contraception methods may be, at least theoretically, more specific by selectively disrupting spermatogenesis and sperm transport or fertilizing ability.&nbsp; The authors noted that only a few have been tested in clinical trials (Intra Vas Plugs ,and reversible inhibition of sperm under guidance [RISUG]); most of them are still in pre-clinical development or have been abandoned due to toxicity (gossypol).</span></p><span data-dcnode-id="1010" instrument_node="">
</span><span class="beforeList" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Ansari and colleagues (2016) stated that among the vas-based methods on trial, RISUG, a co-polymer of styrene and maleic anhydride is being projected as an effective alternative to no scalpel vasectomy (NSV).&nbsp; Reversible inhibition of sperm under guidance offers long-term contraception with safety, effectiveness in human trials and can be delivered by no-scalpel injection.&nbsp; Currently, the procedure is under phase-III clinical trial.&nbsp; However, reversal of this vas-based drug-induced contraception needs to be established in animal models prior to clinical trials to ensure its claim as an effective alternative for vasectomy.&nbsp; In the present investigation, the relative suitability of dimethyl sulphoxide (DMSO) and sodium bicarbonate (NaHCO3) for RISUG induced long-term vas occlusion reversal was carried out in albino rats.&nbsp; Animals were allocated into 4 groups: </span></span><span data-dcnode-id="1007" instrument_node="">
</span><ol aria-hidden="true" class="listInsideParagraph" data-dcnode-id="993"><span data-dcnode-id="1006" instrument_node="">
</span><li data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">sham-operated control (group-I),</span></li><span data-dcnode-id="1003" instrument_node="">
</span><li data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">vas occlusion with RISUG for 360 days (group-II),</span></li><span data-dcnode-id="1000" instrument_node="">
</span><li data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">vas occlusion with RISUG for 360 days and reversal with DMSO (group-III) and</span></li><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">vas occlusion with RISUG for 360 days and reversal with NaHCO3 (group-IV); n = 10 for each group.</span></li><span data-dcnode-id="994" instrument_node="">
</span></ol><ol class="hiddenDecimal sr-only" data-dcnode-id="979" type="1"><span data-dcnode-id="992" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">sham-operated control (group-I),</span></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">vas occlusion with RISUG for 360 days (group-II),</span></li><span data-dcnode-id="986" instrument_node="">
</span><li data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">vas occlusion with RISUG for 360 days and reversal with DMSO (group-III) and</span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">vas occlusion with RISUG for 360 days and reversal with NaHCO3 (group-IV); n = 10 for each group.</span></li><span data-dcnode-id="980" instrument_node="">
</span></ol><span data-dcnode-id="978" instrument_node="">
</span><p class="displayInline" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">A variable response in fertility was observed in different groups.&nbsp; Absolute sterility in group III at all mating intervals, while, 0 % fertility in groups II and IV following 90 days of occlusion was observed.&nbsp; Following reversal restoration of fertility with DMSO at 45 days, whereas, reversal by NaHCO3 at 30 days was noticed.&nbsp; Ejaculated spermatozoa of RISUG injected and initial intervals of reversed animals exhibited various degrees of abnormalities.&nbsp; The testes exhibited focal degeneration in vas-occluded animals.&nbsp; The occluded lumen of the vas deferens contained an eosinated polymer with exfoliated epithelium.&nbsp; Following vas occlusion reversal, a complete regeneration in the vas epithelium was seen.&nbsp; All other parameters remained unaltered.&nbsp; The authors concluded that the reversal with NaHCO3 resulted in an early resumption of fertility when compared with DMSO and the procedure was found to be successful, feasible and safe up to F1 generation.&nbsp; They state that RISUG provides a hope for reversible male contraceptives.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973" style="margin-top: 24px;"><span data-dcnode-id="974" instrument_node="">Ansari and associates (2017) evaluated reversal of short- and long-term vas occlusion with RISUG using DMSO and NaHCO3 in male rabbits; animals were divided into 7 groups (n= 5 for each group).&nbsp; Fortnightly, semen analysis revealed that sperm concentration and output steadily declined after vas occlusion and complete azoospermia was attained at 30 to 60 days post-injection.&nbsp; Spermatozoa re-appeared at 60 to 75 days of reversal and normal zoospermia was noticed between 135 days and 150 days in the reversal groups.&nbsp; All spermatozoa were found non-motile before azoospermia and a gradual recovery in sperm motility was observed between 105 days and 135 days of reversal.&nbsp; A significant decline in viability of sperms was noticed during vas occlusion up to 30 to 60 days, which recovered at 60 to 75 days post-reversal and normalized by 75 to 105 days in the reversal groups.&nbsp; A significant enhancement in the sperm abnormalities was recorded in all vas-occluded animals as well as those in initial periods of reversal.&nbsp; Other parameters, namely, semen volume, ejaculation time, pH, color, and consistency, remained unaltered during all phases of the study.&nbsp; Fertility test, at the intervals of 15 days, demonstrated that animals exhibited complete sterility during the entire period of vas occlusion.&nbsp; A gradual recovery in fertility was observed with the appearance of spermatozoa following vas occlusion reversal and 100 % fertility was observed following 135 to 150 days of reversal; F1 progeny of reversed animals was found normal.&nbsp; The authors concluded that these findings suggested that reversal with DMSO or NaHCO3 is feasible, with normal progeny, following short- and long-term contraception.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">An UpToDate review on "Vasectomy and other vasal occlusion techniques for male contraception" (Viera, 2016) states that "Vasal occlusion with a plug (e.g., "Shug" or medical grade silicone rubber), requires microsurgery for implantation and later removal.&nbsp; Either a conventional open or no-scalpel technique may be used to isolate the vas deferens for the implantation of these devices.&nbsp; Surgical vasal occlusion procedures claim to produce reversible azoospermia without affecting spermatogenesis, but there are no human data on success rates.&nbsp; Vasal injection – Percutaneous methods can be used for injecting chemicals directly into the vas deferens to effect temporary (polymer) or permanent (sclerosing agents) occlusion.&nbsp; One technique intended for permanent sterilization involves first injecting 2 dyes into the vas, using a different color for the left and right vas.&nbsp; Then, a sclerosing agent is then injected into the vas lumen distal to the previously injected dye.&nbsp; Successful occlusion is determined by having the patient void to see which, if any, dye is excreted in the urine.&nbsp; The chemicals required for this procedure are not available for use in the US.&nbsp; Another technique, reversible inhibition of sperm under guidance (RISUG) involves injection the non-sclerotic polymer, styrene maleic anhydride (SMA).&nbsp; It is claimed to offer long-term contraception without adverse side effects.&nbsp; The purported advantages of this method are that it provides long-term contraception without the side effects associated with male hormonal contraception, and in contrast to the other techniques listed above, is reversible without surgery.&nbsp; Clinical trials are ongoing".</span></p><span data-dcnode-id="969" instrument_node="">
</span><h3 data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Endoscopic Vasectomy</span></h3><span data-dcnode-id="966" instrument_node="">
</span><span class="beforeList" data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Schlager and colleagues (2017) noted that surgical vasectomy remains the gold standard for fertility control in men.&nbsp; Endoluminal occlusion of the seminal ducts, thus avoiding an external incision, may become an appealing alternative to this approach.&nbsp; These researchers had shown that non-traumatic endoscopic inspection of the seminal ducts is feasible in the human cadaver.&nbsp; They examined the feasibility and reliability of occlusion using several commercially available medical sealing agents in the porcine vas deferens (VD).&nbsp; Tests were conducted using 25 porcine spermatic ducts (10 cm in length) ex-vivo.&nbsp; The explanted specimens were fixed and cannulated using the Seldinger technique.&nbsp; These investigators administered 5 different occluding agents:</span></span><span data-dcnode-id="963" instrument_node="">
</span><ol aria-hidden="true" class="listInsideParagraph" data-dcnode-id="946"><span data-dcnode-id="962" instrument_node="">
</span><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">n-butyle-2-cyanoacrylate,</span></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">n-butyle-2-cyanoacrylate in combination with a platinum vascular coil,</span></li><span data-dcnode-id="956" instrument_node="">
</span><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Tissucol Duo S,</span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Gelita Spon, and</span></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">AFP Plug endoluminally.&nbsp;</span></li><span data-dcnode-id="947" instrument_node="">
</span></ol><ol class="hiddenDecimal sr-only" data-dcnode-id="929" type="1"><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">n-butyle-2-cyanoacrylate,</span></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">n-butyle-2-cyanoacrylate in combination with a platinum vascular coil,</span></li><span data-dcnode-id="939" instrument_node="">
</span><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Tissucol Duo S,</span></li><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Gelita Spon, and</span></li><span data-dcnode-id="933" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">AFP Plug endoluminally.&nbsp;</span></li><span data-dcnode-id="930" instrument_node="">
</span></ol><span data-dcnode-id="928" instrument_node="">
</span><p class="displayInline" data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">Tightness was evaluated after 5, 15, 60, 360, 720, and 1,440 minutes for each of the 5 grades, respectively, using a solution of methylene blue and saline injected under controlled pressure of 300 mm Hg followed by histological examination.&nbsp; All agents were administered into the porcine seminal ducts (4 out of 5 via a ureteric catheter).&nbsp; Gelita Spon and Tissucol Duo S did not occlude the lumen sufficiently, whereas n-butyle-2-cyanoacrylate, n-butyle-2-cyanoacrylate in combination with coil, Tissucol Duo and AFP Plug performed satisfactorily.&nbsp; In particular, cyanoacrylate combined with a coil was able to close the seminal duct tightly and for a long time.&nbsp; Histological findings confirmed this sealant's gapless adhesion.&nbsp; AFP Plug application revealed similarly good results.&nbsp; However, its form needs to be optimized to ensure its suitability for endoscopic use.&nbsp; The authors concluded that various developments regarding minimally invasive fertility control methods have been underway for decades.&nbsp; Further miniaturization of endoscopy and novel materials may pave the way for endoscopic fertility control in males in the future.&nbsp; These researchers demonstrated the potential of commercially available medical sealing agents to reliably occlude the porcine VD.</span><br data-dcnode-id="926"><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">Furthermore, an UpToDate review on "Vasectomy" (Viera, 2017) does not mention endoscopic vasectomy as a vasectomy option.</span></p><span data-dcnode-id="922" instrument_node="">
</span><h3 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Vessel Sealing Device (e.g., LigaSure) for Vasectomy</span></h3><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Guzelburc and associates (2019) stated that vasectomy is a popular and effective male surgical contraceptive method.&nbsp; Different techniques have been proposed to reduce failure rates and complications.&nbsp; In this study, these researchers compared vas deferens occlusion rates using both standard occlusion techniques and LigaSure (LSVS) for vasectomy.&nbsp; A total of 9 patients underwent open radical retropubic prostatectomy at the authors’ institution.&nbsp; During the procedure, a total of 125 fresh vas deferens samples were obtained and divided into 4 groups as follows: Group 1: ligation (n = 22), Group 2; ligation and electro-cauterization (n = 18), Group 3; 5 mm LSVS (n = 44), and Group 4; 10 mm LSVS (n = 41).&nbsp; All specimens were harvested during surgery and subsequent histopathological assessments were performed to assess the luminal status of the vas deferens.&nbsp; Histopathological evaluation revealed that the majority of vas lumens with LSVS (79.5 % of Group 3 and 89.4 % of Group 4) were totally occluded.&nbsp; With standard techniques, however, the majority of vas lumens (86.4 % and 77.8 % of Groups 1 and 2, respectively) maintained a tiny patency.&nbsp; The authors concluded that on histopathological review, the application of LSVS resulted in better occlusion rates, compared to standard ligation methods.&nbsp; Moreover, they stated that these findings suggested a higher occlusive role for LSVS for vasectomy; further clinical studies are needed to confirm the safety and&nbsp; efficacy of this technique.</span></p><span data-dcnode-id="916" instrument_node="">
</span><h3 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Micro-Denervation of the Spermatic Cord for Post-Vasectomy Pain Syndrome</span></h3><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">In a retrospective study, Tan and colleagues (2018) evaluated the outcomes of patients who underwent MDSC for PVPS.&nbsp; All patients who underwent MDSC for PVPS by a single surgeon between March 2002 and October 2016 were included in this study.&nbsp; Pain was documented using the numerical rating scale (NRS); spermatic cord block (SCB) was performed on all patients, and success was defined as NRS score of less than or equal to 1 for more than 4 hours.&nbsp; All patients had failed medical therapy prior to MDSC; and all previous procedures for PVPS had been performed elsewhere.&nbsp; Surgical success was defined as a post-operative NRS score of less than or equal to 1.&nbsp; A total of 27 patients with 28 scrotal units underwent MDSC for PVPS.&nbsp; The median (first quartile; third quartile) follow-up was 10 (2; 16.5) months.&nbsp; The median (range) duration of pain prior to surgery was 57 (8 to 468) months.&nbsp; Pain was bilateral in 14 (52 %), left-sided in 8 (30 %) and right-sided in 5 patients (19 %).&nbsp; Data on SCB were available for 23 patients, with a success rate of 96 %.&nbsp; The median (range) pre-operative pain NRS score was 7 (2 to 10). The median (range) pain score after SCB on the NRS scale was 0 (0 to 5).&nbsp; The median (range) post-operative pain score on the NRS was 0 (0 to 9).&nbsp; Overall success was achieved in 20 of 28 testicular units (71 %).&nbsp; Patients with involvement of multiple structures in the scrotum (i.e., testis, epididymis, spermatic cord) had a success rate of 81 % and were more likely to have a successful surgery (p &lt; 0.001); 5 patients had failed a prior epididymectomy and 3 had failed a vaso-vasostomy for PVPS; this had no correlation with the success of MDSC (p = 0.89).&nbsp; The authors concluded that MDSC was a reasonably successful, durable and valuable approach for PVPS, especially when pain involves multiple structures in the scrotum (testis, epididymis, spermatic cord).&nbsp; They stated that MDSC was equally effective in patients who had previously failed a procedure for PVPS.&nbsp; No patient had a worsening NRS score after MDSC.&nbsp; This was the largest study to-date evaluating MDSC for the treatment of PVPS.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p class="displayInline" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Furthermore, an UpToDate review on "Vasectomy" (Viera, 2018) does not mention micro-denervation of the spermatic cord as a therapeutic option for post-vasectomy pain syndrome.</span></p><span data-dcnode-id="907" instrument_node="">
</span><h3 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Opioids for Post-Vasectomy Pain Control</span></h3><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Barham and colleagues (2019) noted that the American Urological Association (AUA) Position Statement on opioid use recommends using opioids only when necessary.&nbsp; These investigators examined if routine prescribing of opioids is necessary for pain control following vasectomy, and if an association exists with persistent use.&nbsp; They retrospectively reviewed the charts of patients who underwent vasectomy in clinic between April 2017 and March 2018.&nbsp; Patients were stratified into 2 groups, including those initially prescribed opioids and those not receiving opioid prescriptions at the time of vasectomy.&nbsp; The initial pain medication regimen depended on the standard prescription practice of each provider.&nbsp; Encounters with a medical provider for scrotal pain within 30 days, subsequent opioid prescriptions and new persistent opioid prescriptions between 90 and 180 days were compared between the 2 groups using the Fisher exact test.&nbsp; Between April 2017 and March 2018, a total of 228 patients underwent clinic vasectomy as performed by 8 urologists.&nbsp; At the time of vasectomy 102 patients received opioid prescriptions and 126 received no opioid prescriptions.&nbsp; There was no statistically significant difference between the opioid and non-opioid groups in encounters for scrotal pain (12.7 % versus 18.4 %, p = 0.279).&nbsp; The incidence of new persistent opioid use was 7.8 % in the opioid cohort compared to 1.5 % in the nonopioid cohort (p = 0.046).&nbsp; The authors concluded that opioids, which did not appear to be necessary in men who undergo vasectomy, were associated with persistent use in 7.8 % of patients at 3 to 6 months.&nbsp; These researchers stated that in the face of an opioid epidemic urologists should limit over prescription of opioids following vasectomy.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899" style="margin-bottom: 70px;"><span data-dcnode-id="900" instrument_node="">In a retrospective, cohort study, Welk and associates (2020) examined if filling a post-operative opioid prescription following low acuity urologic surgery is associated with new persistent opioid use.&nbsp; This trial was conducted using linked administrative data from Ontario, Canada.&nbsp; Participants were adults who underwent their first vasectomy, transurethral prostatectomy, urethrotomy, circumcision, spermatocelectomy, or hydrocelectomy between 2013 and 2016.&nbsp; These researchers excluded men with prior opioid use, confounding concurrent procedures, prolonged hospitalization, or cancer.&nbsp; They determined whether the patient filled a prescription for an opioid within 5 days of their surgery.&nbsp; The primary outcome was evidence of at least 2 opioid prescriptions filled 9 to 15 months following urologic surgery.&nbsp; The secondary outcome was admission for opioid over-dose.&nbsp; Primary analysis was adjusted logistic regression analysis.&nbsp; These investigators identified 91,083 men, most of whom underwent vasectomy (78 %).&nbsp; A total of 32,174 (35 %) men filled a prescription for an opioid after their procedure.&nbsp; The most common opioid prescribed was codeine (70 %), and urologists were the primary prescribers (81 %).&nbsp; Men who filled a post-procedure opioid prescription did not differ, for most of the 57 medical co-morbidities or markers of healthcare utilization that we measured, from those who did not fill an opioid prescription.&nbsp; There was long-term opioid use in 1,447 (1.6 %); men who had filled a post-operative opioid prescription had a significantly higher risk of long-term opioid use (OR 1.4, 95 % CI: 1.3 to 1.6) and opioid over-dose (OR 3.0, 95 % CI: 1.5 to 5.9).&nbsp; The authors concluded that prescription of opioids following low acuity urology procedures was significantly associated with increased opioid use at 1 year after surgery.&nbsp; These researchers stated that efforts should be made to reduce post-operative opioids, especially for urologic procedures that do not typically require opioids.&nbsp; Moreover, they noted that a limitation of this study was that they could not determine the indication for long-term opioid prescriptions.</span></p><span data-dcnode-id="898" instrument_node="">
