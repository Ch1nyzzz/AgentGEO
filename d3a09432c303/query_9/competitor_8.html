</span><div class="container" data-dcnode-id="2741"><span data-dcnode-id="2760" instrument_node="">
</span><div class="row clearfix" data-dcnode-id="2743"><span data-dcnode-id="2759" instrument_node="">
</span><div class="col-md-12 column" data-dcnode-id="2745"><span data-dcnode-id="2758" instrument_node="">
</span><div data-dcnode-id="2747"><span data-dcnode-id="2757" instrument_node="">
</span><h1 class="intro" data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Vasectomy</span></h1><span data-dcnode-id="2754" instrument_node="">
</span><h2 data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">permanent contraception&nbsp;for men who are sure they will</span></h2><span data-dcnode-id="2751" instrument_node="">
</span><h2 data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">never&nbsp;want children</span></h2><span data-dcnode-id="2748" instrument_node="">
</span></div><span data-dcnode-id="2746" instrument_node="">
</span></div><span data-dcnode-id="2744" instrument_node=""> </span></div><span data-dcnode-id="2742" instrument_node="">
</span></div><span data-dcnode-id="2740" instrument_node="">
</span></div><span data-dcnode-id="2738" instrument_node="">
</span><div data-dcnode-id="2287"><span data-dcnode-id="2737" instrument_node="">
</span><div class="container" data-dcnode-id="2289"><span data-dcnode-id="2736" instrument_node="">
</span><div class="row clearfix" data-dcnode-id="2291"><span data-dcnode-id="2735" instrument_node="">
</span><div class="col-md-12 column" data-dcnode-id="2293"><span data-dcnode-id="2734" instrument_node="">
</span><div data-dcnode-id="2295"><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2731"><img alt="" class="content-border-top" data-dcnode-id="2732" height="28" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bpas.org/media/1226/content-top-border.jpg&amp;raw" width="970"></p><span data-dcnode-id="2730" instrument_node="">
</span><div class="content" data-dcnode-id="2297"><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">BPAS provides vasectomy on a self-funded basis and also has contracts with the NHS in some areas.</span></p><span data-dcnode-id="2726" instrument_node="">
</span><h3 data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Who can have a vasectomy?</span></h3><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Single, married, divorced, widowed, childless or with a family - any man can have a vasectomy, regardless of his circumstances.&nbsp;</span></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Vasectomy is a safe and effective, permanent method of contraception. &nbsp;It should only be considered if you are sure that you never want children at any time in the future, even if your circumstances change. If you are aged under 30 and have not yet had children, there is a higher chance that in future, you will regret having a vasectomy. Vasectomy reversal is not routinely available on the NHS.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">You shouldn't consider having a vasectomy if you are under stress, whether or not that stress relates to concerns about pregnancy or your relationship or anything else. If you are in a relationship, we strongly advise you to talk it through with your partner, even though their agreement is not required if you do choose to have a vasectomy.</span></p><span data-dcnode-id="2714" instrument_node="">
</span><h3 data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Vasectomy explained</span></h3><span data-dcnode-id="2711" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Sperm travels through two tubes (vasa deferentia) during sex, and mixes with semen before ejaculation. Vasectomy is a minor operation to cut and tie or seal the tubes, so sperm are not released into the semen. Vasectomy is 99.95% effective at preventing pregnancy.</span></p><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">You still ejaculate but your semen does not contain sperm, so the risk of pregnancy is extremely low.&nbsp;</span></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">There are two types of vasectomy; scalpel and non-scalpel. BPAS offers non-scalpel vasectomy with local anaesthetic.</span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">The main difference is that with the scalpel method a small incision is made in the scrotum with a small sharp blade to access the tubes (vasa), while the non-scalpel method uses either cautery or a special instrument to enter the scrotum.&nbsp;You will be given an anaesthetic so that you do not feel this.</span></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2696"><a data-dcnode-id="2697" data-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bpas.org/more-services-information/vasectomy/non-scalpel-vasectomy/" rel="noopener" target="_blank" title="Non-scalpel vasectomy"><span data-dcnode-id="2698" instrument_node="">BPAS non-scalpel vasectomy procedure (includes diagrams)</span></a></p><span data-dcnode-id="2695" instrument_node="">
</span><h3 data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Consultation</span></h3><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Sometimes consultation and medical assessment before BPAS vasectomy treatment is done by the NHS. If you are paying for your treatment yourself, your consultation will be done by BPAS and will last about an hour. We will discuss your reasons for vasectomy, whether you are sure of your decision, and alternatives methods of contraception. You will be asked to complete a short medical questionnaire and will have a medical assessment.</span></p><span data-dcnode-id="2689" instrument_node="">
</span><div class="ui-accordion ui-widget ui-helper-reset" data-dcnode-id="2452" id="accordion" role="tablist"><span data-dcnode-id="2688" instrument_node="">
</span><h4 aria-controls="ui-id-2" aria-expanded="false" aria-selected="false" class="ui-accordion-header ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2685" id="ui-id-1" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon accordion-arrow1" data-dcnode-id="2687"></span><span data-dcnode-id="2686" instrument_node="">Risks and complications</span></h4><span data-dcnode-id="2684" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-1" class="ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="2617" id="ui-id-2" role="tabpanel" style="display: none;"><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2680"><strong data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Significant, unavoidable or frequently occurring risks</span></strong></p><span data-dcnode-id="2679" instrument_node="">
</span><ul data-dcnode-id="2659"><span data-dcnode-id="2678" instrument_node="">
</span><li data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">Sore and tender scrotum, minor bruising and swelling of scrotum</span></li><span data-dcnode-id="2675" instrument_node="">
</span><li data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Infection</span></li><span data-dcnode-id="2672" instrument_node="">
</span><li data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Bleeding during procedure or after</span></li><span data-dcnode-id="2669" instrument_node="">
</span><li data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Blood clot in scrotum (haematoma)</span></li><span data-dcnode-id="2666" instrument_node="">
</span><li data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Sperm granuloma</span></li><span data-dcnode-id="2663" instrument_node="">
</span><li data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Chronic testicular pain (1-2% of men)</span></li><span data-dcnode-id="2660" instrument_node="">
</span></ul><span data-dcnode-id="2658" instrument_node="">
</span><p data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Failure of procedure or recanalisation in future</span></p><span data-dcnode-id="2655" instrument_node="">
</span><ul data-dcnode-id="2638"><span data-dcnode-id="2654" instrument_node="">
</span><li data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">The overall risk of failure is 1 in 2,000</span></li><span data-dcnode-id="2651" instrument_node="">
</span><li data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Failure at time of surgery or early recanalisation (rejoining) of the vas deferens occurs in 3.6 in 1,000 of cases</span></li><span data-dcnode-id="2648" instrument_node="">
</span><li data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Late failure of recanalisation (rejoining) of the vas deferens has been reported in 4-8 in 10,000 of cases</span></li><span data-dcnode-id="2645" instrument_node="">
</span><li data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">Persistent non-motile sperm/need for special clearance</span></li><span data-dcnode-id="2642" instrument_node="">
</span><li data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Regret</span></li><span data-dcnode-id="2639" instrument_node="">
</span></ul><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2634"><strong data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Extra procedures which may become necessary:</span></strong></p><span data-dcnode-id="2633" instrument_node="">
</span><ul data-dcnode-id="2625"><span data-dcnode-id="2632" instrument_node="">
</span><li data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Transfer to NHS facility to manage complication</span></li><span data-dcnode-id="2629" instrument_node="">
</span><li data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Repeat procedure if failed/recanalized</span></li><span data-dcnode-id="2626" instrument_node="">
</span></ul><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2623" instrument_node="">Other highly effective methods of reversible contraception are available. Please refer to our&nbsp;</span><a data-dcnode-id="2621" data-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bpas.org/more-services-information/contraception/" title="Contraception"><span data-dcnode-id="2622" instrument_node="">contraception pages</span></a><span data-dcnode-id="2620" instrument_node=""> for more information. Another method of permanent contraception is female sterilisation. However, vasectomy is quicker to perform and is associated with fewer complications than female sterilisation.</span></p><span data-dcnode-id="2618" instrument_node="">
</span></div><span data-dcnode-id="2616" instrument_node="">
</span><h4 aria-controls="ui-id-4" aria-expanded="false" aria-selected="false" class="ui-accordion-header ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2613" id="ui-id-3" role="tab" tabindex="-1"><span class="ui-accordion-header-icon ui-icon accordion-arrow1" data-dcnode-id="2615"></span><span data-dcnode-id="2614" instrument_node="">Medical assessment</span></h4><span data-dcnode-id="2612" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-3" class="ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="2562" id="ui-id-4" role="tabpanel" style="display: none;"><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">A healthcare professional will ask you about your medical history. It's important to answer these questions as accurately as possible.</span></p><span data-dcnode-id="2608" instrument_node="">
</span><h5 data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Relevant medical history</span></h5><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Some aspects of your medical history affect the surgeon's ability to carry out a vasectomy safely – we will ask about:</span></p><span data-dcnode-id="2602" instrument_node="">
</span><ul data-dcnode-id="2576"><span data-dcnode-id="2601" instrument_node="">
</span><li data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Bleeding problems</span></li><span data-dcnode-id="2598" instrument_node="">
</span><li data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Other medical conditions (such as diabetes)</span></li><span data-dcnode-id="2595" instrument_node="">
</span><li data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Past history of injury to your scrotum or groin (such as a hernia operation)</span></li><span data-dcnode-id="2592" instrument_node="">
</span><li data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">History of sexually transmitted infections</span></li><span data-dcnode-id="2589" instrument_node="">
</span><li data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Erection or ejaculation problems</span></li><span data-dcnode-id="2586" instrument_node="">
</span><li data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">whether you have a cardiac pacemaker</span></li><span data-dcnode-id="2583" instrument_node="">
</span><li data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Allergies to medications</span></li><span data-dcnode-id="2580" instrument_node="">
</span><li data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Any medications you currently use</span></li><span data-dcnode-id="2577" instrument_node="">
</span></ul><span data-dcnode-id="2575" instrument_node="">
</span><h5 data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Physical examination</span></h5><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">We examine your scrotum during a brief physical examination, and we record your height, weight and blood pressure.</span></p><span data-dcnode-id="2569" instrument_node="">
</span><h5 data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Consent</span></h5><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">We explain the associated risks and complications and answer your questions about the procedure. Once this is all completed we ask you to sign a consent form and give you a copy</span></p><span data-dcnode-id="2563" instrument_node="">
</span></div><span data-dcnode-id="2561" instrument_node="">
</span><h4 aria-controls="ui-id-6" aria-expanded="false" aria-selected="false" class="ui-accordion-header ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2558" id="ui-id-5" role="tab" tabindex="-1"><span class="ui-accordion-header-icon ui-icon accordion-arrow1" data-dcnode-id="2560"></span><span data-dcnode-id="2559" instrument_node="">Treatment appointment</span></h4><span data-dcnode-id="2557" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-5" class="ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="2454" id="ui-id-6" role="tabpanel" style="display: none;"><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Your appointment lasts about an hour. You may eat a light meal and drink before your treatment appointment. &nbsp;Do not drink alcohol.</span></p><span data-dcnode-id="2553" instrument_node="">
</span><h5 data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">How do I prepare for my treatment?</span></h5><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Bathe or shower on the day of your appointment. If instructed, please shave the area. Do not use hair removal cream as it may irritate the skin.</span></p><span data-dcnode-id="2547" instrument_node="">
</span><h5 data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Metal body piercings</span></h5><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2543" instrument_node="">Metal body piercings close to the surgical site </span><span data-dcnode-id="2541" style="text-decoration: underline;"><span data-dcnode-id="2542" instrument_node="">must</span></span><span data-dcnode-id="2540" instrument_node=""> be removed before surgery, all other piercings should be removed if possible.</span></p><span data-dcnode-id="2538" instrument_node="">
</span><h5 data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">What to wear</span></h5><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Wear comfortable, loose-fitting clothing for your treatment appointment. It is important to wear supportive underpants (NOT boxer shorts) and a t-shirt or polo shirt.</span></p><span data-dcnode-id="2532" instrument_node="">
</span><h5 data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">What should I bring with me?</span></h5><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Bring any medicines you are taking (or the prescription) so that we can record this in your notes.</span></p><span data-dcnode-id="2526" instrument_node="">
</span><h5 data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Can I bring somebody with me?</span></h5><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2522" instrument_node="">Yes, but space is limited so please bring only one friend or relative with you. </span><span data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">There are no facilities for children so please make arrangements for childcare. However, if that is difficult for you please inform the advisor when booking the appointment.&nbsp;</span></span></p><span data-dcnode-id="2518" instrument_node="">
</span><h5 data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Travelling to and from your appointment</span></h5><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">We advise you not to drive yourself home, after treatment. &nbsp;If you have no other transportation options than driving yourself home, please tell your healthcare professional as soon as you can. &nbsp;We will then discuss the potential risks of driving directly following treatment.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><h5 data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Eating/drinking</span></h5><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">You may eat and drink before your appointment - no alcohol.</span></p><span data-dcnode-id="2506" instrument_node="">
</span><h5 data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">On the day of treatment</span></h5><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">A BPAS member of staff will ask you to confirm your details and you will wait in the pre-operative area, probably alongside other men having a vasectomy, until the surgeon is ready for you.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">You will go into theatre or a treatment room to undress and get onto a treatment couch.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">The surgeon will ensure that you are fit for surgery by:</span></p><span data-dcnode-id="2494" instrument_node="">
</span><ul data-dcnode-id="2477"><span data-dcnode-id="2493" instrument_node="">
</span><li data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Checking your paperwork has been fully completed</span></li><span data-dcnode-id="2490" instrument_node="">
</span><li data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Rechecking your medical history</span></li><span data-dcnode-id="2487" instrument_node="">
</span><li data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Ensuring you want to go ahead with the vasectomy</span></li><span data-dcnode-id="2484" instrument_node="">
</span><li data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Examining your testicles to ensure they can easily locate the vas deferens</span></li><span data-dcnode-id="2481" instrument_node="">
</span><li data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Advising whether shaving is necessary</span></li><span data-dcnode-id="2478" instrument_node="">
</span></ul><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">The BPAS surgeon reserves the right to delay the procedure if he/she feels the conditions are not appropriate (for example if you have an infection).</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">After all of the above steps are complete your vasectomy procedure will take place.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Once the procedure is completed a BPAS nurse will walk you into a recovery room where you can relax with a tea or coffee until you are ready to leave the clinic.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><h5 data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Local Anaesthetic</span></h5><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Almost all vasectomies are done with local anaesthetic which lessens the sensation in a part of the body. &nbsp;You are awake but will feel no pain. &nbsp;The doctor injects local anaesthetic into the skin at the side of your scrotum. &nbsp;It is not injected into your testicles. &nbsp;You may feel a pulling or tugging sensation during the procedure.&nbsp;</span></p><span data-dcnode-id="2461" instrument_node="">
</span><h5 data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Leaving the centre</span></h5><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">A healthcare professional will ensure you are fit to leave by going through some simple questions and examining the operative site. If everything is OK you will be discharged. You will be given a testing kit for semen analysis.</span></p><span data-dcnode-id="2455" instrument_node="">
</span></div><span data-dcnode-id="2453" instrument_node="">
</span></div><span data-dcnode-id="2451" instrument_node="">
</span><h3 data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Recovery</span></h3><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">After your operation, rest for the remainder of the day.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">If you are worried about any aspect of your recovery, telephone your BPAS clinic or call 0300 333 68 28 as soon as possible. This line is open 24 hours a day. Alternatively, you could contact your GP.</span></p><span data-dcnode-id="2442" instrument_node="">
</span><div data-dcnode-id="2441"></div><span data-dcnode-id="2440" instrument_node="">
</span><div class="ui-accordion ui-widget ui-helper-reset" data-dcnode-id="2314" id="accordion2" role="tablist"><span data-dcnode-id="2439" instrument_node="">
</span><h4 aria-controls="ui-id-8" aria-expanded="false" aria-selected="false" class="ui-accordion-header ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2436" id="ui-id-7" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon accordion-arrow1" data-dcnode-id="2438"></span><span data-dcnode-id="2437" instrument_node="">What to expect after your vasectomy</span></h4><span data-dcnode-id="2435" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-7" class="ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="2412" id="ui-id-8" role="tabpanel" style="display: none;"><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2433" instrument_node="">As the anaesthetic wears off, most men do feel some discomfort, which may last for a few days and up to 2 weeks. This can usually be controlled by non-prescription anti-inflammatory painkillers such as ibuprofen, you can take paracetamol. Some slight swelling may occur the day after the vasectomy. </span><strong data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">This is normal</span></strong><span data-dcnode-id="2430" instrument_node="">. Any discomfort should disappear after a couple of weeks.</span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Keep the dressing in place until the following evening when you should have a bath or shower. You will not need the dressing after this and a daily bath or shower will keep the area clean and help the stitches dissolve.</span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Clear fluid oozing from the wound can sometimes occur. You may wish to buy sterile cotton gauze from the chemist and put it in your underwear to protect the incision.</span></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Wear tight underpants or an athletic support for the first few days following the procedure, including the night for the initial 48 hours or longer according to symptoms. &nbsp;</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">You may have sex as soon as it is comfortable for you. We recommend that you abstain for at least 2 days after your procedure.</span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Our Aftercare line is provided, by another healthcare organisation which is closely monitored and follows BPAS policies and procedures.&nbsp;</span></p><span data-dcnode-id="2413" instrument_node="">
</span></div><span data-dcnode-id="2411" instrument_node="">
</span><h4 aria-controls="ui-id-10" aria-expanded="false" aria-selected="false" class="ui-accordion-header ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2408" id="ui-id-9" role="tab" tabindex="-1"><span class="ui-accordion-header-icon ui-icon accordion-arrow1" data-dcnode-id="2410"></span><span data-dcnode-id="2409" instrument_node="">Do's and Don'ts</span></h4><span data-dcnode-id="2407" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-9" class="ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="2371" id="ui-id-10" role="tabpanel" style="display: none;"><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Do:</span></p><span data-dcnode-id="2403" instrument_node="">
</span><ul data-dcnode-id="2389"><span data-dcnode-id="2402" instrument_node="">
</span><li data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Relax at home, taking a few days off work if necessary</span></li><span data-dcnode-id="2399" instrument_node="">
</span><li data-dcnode-id="2394"><span data-dcnode-id="2398" instrument_node="">Take care when showering or taking a bath </span><strong data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">for about 2 weeks - clean the area gently</span></strong><span data-dcnode-id="2395" instrument_node="">.</span></li><span data-dcnode-id="2393" instrument_node="">
</span><li data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Contact BPAS if you are concerned following the procedure or if you experience: persistent bleeding, pain, fever, pus at the wound, or rapid swelling on one or both sides of the scrotum (which could indicate bleeding).&nbsp;</span></li><span data-dcnode-id="2390" instrument_node="">
</span></ul><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Don't:</span></p><span data-dcnode-id="2385" instrument_node="">
</span><ul data-dcnode-id="2373"><span data-dcnode-id="2384" instrument_node="">
</span><li data-dcnode-id="2380"><span data-dcnode-id="2383" instrument_node="">Do anything strenuous, including heavy lifting or driving long distances, </span><strong data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">for up to 2 weeks</span></strong></li><span data-dcnode-id="2379" instrument_node="">
</span><li data-dcnode-id="2375"><span data-dcnode-id="2378" instrument_node="">Play any sports (including going to the gym) </span><strong data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">for at least 2 weeks</span></strong></li><span data-dcnode-id="2374" instrument_node="">
</span></ul><span data-dcnode-id="2372" instrument_node="">
</span></div><span data-dcnode-id="2370" instrument_node="">
</span><h4 aria-controls="ui-id-12" aria-expanded="false" aria-selected="false" class="ui-accordion-header ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="2367" id="ui-id-11" role="tab" tabindex="-1"><span class="ui-accordion-header-icon ui-icon accordion-arrow1" data-dcnode-id="2369"></span><span data-dcnode-id="2368" instrument_node="">Follow-up semen analysis</span></h4><span data-dcnode-id="2366" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="ui-id-11" class="ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="2316" id="ui-id-12" role="tabpanel" style="display: none;"><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Before you leave the clinic after your vasectomy, you will be given a semen testing kit, which you will need to submit before BPAS can confirm the operation has been successful.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Until you receive the all clear, you cannot consider your vasectomy complete.</span></p><span data-dcnode-id="2359" instrument_node="">
</span><h5 data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Testing instruction</span></h5><span data-dcnode-id="2356" instrument_node="">
</span><ul data-dcnode-id="2336"><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Your semen sample should be sent no sooner than 12 weeks and 20 ejaculations after the procedure. You should be given a date to send in the sample before you leave the clinic (the date will be written at the front of your vasectomy guide).</span></li><span data-dcnode-id="2352" instrument_node="">
</span><li data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Do not ejaculate for at least 48 hours but no more than 7 days before giving each sample.</span></li><span data-dcnode-id="2349" instrument_node="">
</span><li data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Mark the containers with your name, date of birth and client number (shown at the front of your vasectomy booklet).</span></li><span data-dcnode-id="2346" instrument_node="">
</span><li data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Collect your sample by ejaculating into one of the containers provided.</span></li><span data-dcnode-id="2343" instrument_node="">
</span><li data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Complete the details on the return slip and place the container and the return slip into the prepaid postal envelope provided.</span></li><span data-dcnode-id="2340" instrument_node="">
</span><li data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Post immediately.</span></li><span data-dcnode-id="2337" instrument_node="">
</span></ul><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">BPAS will contact you with the results after the sample has been processed.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><h5 data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Getting the all clear</span></h5><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">You must use another form of contraception until you get the all clear from us</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">We will send you written confirmation that your vasectomy has been successful if the sample we receive is sperm-free. If not, you will need to provide further samples. If you have infrequent sex, masturbation will help clear the sperm.</span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">It can take up to 7 months before some men get the all clear.</span></p><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">On very rare occasions, a small number of immobile sperm remain in the sample. No pregnancies have been reported in these rare cases. If this happens, you will be given a ‘special clearance' letter that confirms that the procedure was successful.</span></p><span data-dcnode-id="2317" instrument_node="">
</span></div><span data-dcnode-id="2315" instrument_node="">
</span></div><span data-dcnode-id="2313" instrument_node="">
