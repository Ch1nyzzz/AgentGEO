</span><h4 data-dcnode-id="969"><span class="field-wrapper" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Vasectomy</span></span><span data-dcnode-id="970" instrument_node="">
</span></h4><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="967"></p><span data-dcnode-id="966" instrument_node="">
</span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthymale.org.au/resource-library"><span data-dcnode-id="965" instrument_node="">More resources</span></a><span data-dcnode-id="963" instrument_node="">
</span></div><span data-dcnode-id="961" instrument_node="">
</span></div><span data-dcnode-id="959" instrument_node="">
</span></div><span data-dcnode-id="957" instrument_node="">
</span></div><span data-dcnode-id="955" instrument_node="">
</span></div><span data-dcnode-id="953" instrument_node="">
</span><div class="field-wrapper field field-node--field-ht-content-blocks field-name-field-ht-content-blocks field-type-entity-reference-revisions field-label-hidden" data-dcnode-id="709"><span data-dcnode-id="952" instrument_node="">
</span><div class="field-items" data-dcnode-id="711"><span data-dcnode-id="951" instrument_node="">
</span><div class="field-item" data-dcnode-id="864"><span data-dcnode-id="950" instrument_node="">
</span><div data-dcnode-id="866" id="anchor-1102"><span data-dcnode-id="949" instrument_node="">
</span><div class="callout" data-dcnode-id="871"><span data-dcnode-id="948" instrument_node="">
</span><h2 data-dcnode-id="938"><div class="field-wrapper field field-paragraph--field-htcs-title field-name-field-htcs-title field-type-string field-label-hidden" data-dcnode-id="940"><span data-dcnode-id="947" instrument_node="">
</span><div class="field-items" data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">
</span><div class="field-item" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">What is a vasectomy?</span></div><span data-dcnode-id="943" instrument_node="">
</span></div><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span></h2><span data-dcnode-id="937" instrument_node="">
</span><div class="field-wrapper field field-paragraph--field-htcs-body field-name-field-htcs-body field-type-text-long field-label-hidden" data-dcnode-id="873"><span data-dcnode-id="936" instrument_node="">
</span><div class="field-items" data-dcnode-id="875"><span data-dcnode-id="935" instrument_node="">
</span><div class="field-item" data-dcnode-id="877"><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">A vasectomy is a surgical procedure that causes permanent sterilisation of men, preventing them from fathering children. During a vasectomy, the vas deferens is cut and a small length is usually removed so that sperm produced by the testis (testicle) can’t travel further through the reproductive system. The same procedure is used on both sides of the scrotum.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">A vasectomy is a very safe, reliable, and permanent method of contraception</span><sup data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">1</span></sup><span data-dcnode-id="928" instrument_node="">.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="925" instrument_node="">The number of Australian men who have had a vasectomy is not accurately known. The commonly reported prevalence of around 8-15% overall</span><sup data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">2</span></sup><span data-dcnode-id="922" instrument_node="">, and 25% of Australian men aged over 40 years</span><sup data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">3</span></sup><span data-dcnode-id="919" instrument_node="">, is based on survey responses from women about their contraceptive use.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">Nearly 29,000 vasectomies are performed each year in Australia</span><sup data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">4</span></sup><span data-dcnode-id="913" instrument_node="">. Most vasectomies are performed in men who have already fathered children and don’t want any more.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="908"><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Who performs a vasectomy?</span></strong></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Vasectomies are performed by some general practitioners, general surgeons, and urologists. The procedure can be performed as a day procedure in a hospital, under general anaesthesia, or in a medical clinic under local anaesthesia.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="901"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">What happens after a vasectomy?</span></strong></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">As with any surgical procedure, there’s a small risk of pain, bleeding, bruising, and/or infection after a vasectomy. Your doctor will provide advice about how to minimise the risk or treat these problems.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="894"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">How successful is vasectomy in preventing pregnancy?</span></strong></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="892" instrument_node="">Sperm remain in the </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthymale.org.au/mens-health/male-reproductive-system"><span data-dcnode-id="891" instrument_node="">reproductive system</span></a><span data-dcnode-id="889" instrument_node=""> for some time, so it’s important to use condoms or some other suitable form of contraception after your vasectomy until you confirm that the vasectomy was successful. </span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthymale.org.au/mens-health/semen-analysis"><span data-dcnode-id="888" instrument_node="">Analysis of a semen sample</span></a><span data-dcnode-id="886" instrument_node=""> around three months after the procedure can confirm there are no sperm in the ejaculate. Pregnancy occurs in about 1 in 700 couples within the first year after vasectomy</span><sup data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">5</span></sup><span data-dcnode-id="883" instrument_node="">. Pregnancy after successful vasectomy (confirmed by no sperm in the ejaculate) is believed to be very rare, but low numbers of sperm in ejaculate may occur for a short period in 1 in 150 to 1 in 200 men</span><sup data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">6</span></sup><span data-dcnode-id="880" instrument_node="">.</span></p><span data-dcnode-id="878" instrument_node="">
</span></div><span data-dcnode-id="876" instrument_node="">
</span></div><span data-dcnode-id="874" instrument_node="">

</span><h2 data-dcnode-id="850"><div class="field-wrapper field field-paragraph--field-htcs-title field-name-field-htcs-title field-type-string field-label-hidden" data-dcnode-id="852"><span data-dcnode-id="859" instrument_node="">

</span><div class="field-item" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Health effects of a vasectomy</span></div><span data-dcnode-id="855" instrument_node="">
</span></div><span data-dcnode-id="853" instrument_node="">
</span></div><span data-dcnode-id="851" instrument_node="">
</span></h2><span data-dcnode-id="849" instrument_node="">
</span><div class="field-wrapper field field-paragraph--field-htcs-body field-name-field-htcs-body field-type-text-long field-label-hidden" data-dcnode-id="805"><span data-dcnode-id="848" instrument_node="">
</span><div class="field-items" data-dcnode-id="807"><span data-dcnode-id="847" instrument_node="">
</span><div class="field-item" data-dcnode-id="809"><p data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">A vasectomy doesn’t protect you or your partner(s) from </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthymale.org.au/mens-health/sexually-transmitted-infections-stis" rel="noopener" target="_blank"><span data-dcnode-id="845" instrument_node="">sexually transmitted infections</span></a><span data-dcnode-id="843" instrument_node="">. The best way to avoid these infections is the proper use of condoms.</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">You probably won’t notice any change in the appearance or amount of your ejaculate after your vasectomy because sperm make up only a small percentage (5-10%) of the ejaculate volume. The production of fluids from the bulbourethral glands, seminal vesicles, and prostate, which make up most of the ejaculate, doesn’t change following a vasectomy.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="837" instrument_node="">Because a vasectomy has no effect on the testes (testicles) or other parts of the reproductive system, your levels of </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthymale.org.au/mens-health/testosterone"><span data-dcnode-id="836" instrument_node="">testosterone</span></a><span data-dcnode-id="834" instrument_node=""> and other hormones won’t be affected by a vasectomy</span><sup data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">7</span></sup><span data-dcnode-id="831" instrument_node="">. Your sexual satisfaction might increase after a vasectomy</span><sup data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">8</span></sup><span data-dcnode-id="828" instrument_node="">.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Due to the permanent nature of a vasectomy, it is important to consider not only what is right for you now, but what may be right for you in the future. For example, if you are in a relationship it is important to consider if you might want children outside of this relationship should your situation change.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="820"><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Can a vasectomy be reversed?</span></strong></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="818" instrument_node="">Although a vasectomy should be considered irreversible when you’re making a decision about whether it’s right for you, an operation to reconnect the vas deferens is possible if you want to recover your fertility. About 3 out of 4 couples who want to conceive after a vasectomy reversal do achieve pregnancy, but success is influenced by many other fertility-related factors like age and other health conditions</span><sup data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">9</span></sup><span data-dcnode-id="815" instrument_node="">, as well as the time since vasectomy. An alternative to a vasectomy reversal for men who wish to father children is the use of assisted reproductive technologies (ART)</span><sup data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">9</span></sup><span data-dcnode-id="812" instrument_node="">.</span></p><span data-dcnode-id="810" instrument_node="">
</span></div><span data-dcnode-id="808" instrument_node="">
</span></div><span data-dcnode-id="806" instrument_node="">
</span></div><span data-dcnode-id="804" instrument_node="">

</span><div class="field-item" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">What to do about a vasectomy</span></div><span data-dcnode-id="787" instrument_node="">
</span></div><span data-dcnode-id="785" instrument_node="">
</span></div><span data-dcnode-id="783" instrument_node="">
</span></h2><span data-dcnode-id="781" instrument_node="">
</span><div class="field-wrapper field field-paragraph--field-htcs-body field-name-field-htcs-body field-type-text-long field-label-hidden" data-dcnode-id="762"><span data-dcnode-id="780" instrument_node="">
</span><div class="field-items" data-dcnode-id="764"><span data-dcnode-id="779" instrument_node="">
</span><div class="field-item" data-dcnode-id="766"><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">You should discuss fertility and contraceptive options, including vasectomy, with your partner(s) and your doctor.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Your doctor can help you consider and access many different types of contraceptives.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">An important factor in making decisions about vasectomy is to compare it to other long-term contraceptive options. The female equivalent of vasectomy is tubal ligation, which is more complicated, more expensive, and more invasive (and thereby, potentially riskier) than vasectomy</span><sup data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">5</span></sup><span data-dcnode-id="769" instrument_node="">.</span></p><span data-dcnode-id="767" instrument_node="">
