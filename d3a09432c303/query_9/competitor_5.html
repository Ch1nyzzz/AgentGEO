"2941" instrument_node="">request an appointment now online</span></a><span data-dcnode-id="2939" instrument_node="">&nbsp;and we will email you instructions on next steps, including how to send us the necessary doctor’s referral. Appointments are available fast once the referral is received.</span></p><p data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">*Your vasectomy procedure will be fully covered by OHIP.</span></p><span data-dcnode-id="2935" instrument_node=""> </span></div><span data-dcnode-id="2933" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">No-Scalpel Vasectomy Trends in Toronto</span></h2><span data-dcnode-id="1893" instrument_node=""> </span></div><span data-dcnode-id="1891" instrument_node="">
</span></div><span data-dcnode-id="1889" instrument_node="">
</span><div class="elementor-element elementor-element-31ed32cf elementor-widget elementor-widget-text-editor" data-dcnode-id="1876" data-element_type="widget" data-id="31ed32cf" data-widget_type="text-editor.default"><span data-dcnode-id="1888" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1880"><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">In recent years, vasectomy has experienced a steady growth in its popularity amongst Toronto and Ontario men seeking permanent contraception. This trend suggests that more and more people are recognizing the overall convenience, safety and reliability of this procedure.</span></p><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Now, with the introduction of the No-Scalpel Vasectomy (NSV) technique, this procedure has become even more simple.</span></p><span data-dcnode-id="1881" instrument_node=""> </span></div><span data-dcnode-id="1879" instrument_node="">
</span></div><span data-dcnode-id="1877" instrument_node="">

</span><h3 class="elementor-heading-title elementor-size-default" data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">No-Scalpel Vasectomy in Ontario – The History</span></h3><span data-dcnode-id="1870" instrument_node=""> </span></div><span data-dcnode-id="1868" instrument_node="">
</span></div><span data-dcnode-id="1866" instrument_node="">
</span><div class="elementor-element elementor-element-2951b058 elementor-widget elementor-widget-text-editor" data-dcnode-id="1849" data-element_type="widget" data-id="2951b058" data-widget_type="text-editor.default"><span data-dcnode-id="1865" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1851"><span data-dcnode-id="1864" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1853"><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">No-Scalpel Vasectomy (NSV) was developed in China in 1974 by Dr. Li Shunqiang. By 1985, an international team made up of members from the World Health Organization (WHO) and Access to Voluntary and Safe Contraception (AVSC), formerly the Association for Voluntary Surgical Contraception, were visiting China to study alternative vasectomy procedures, including NSV.</span></p><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">In 1988, after careful observation and review of the NSV procedure, they decided to introduce the technique to North America.</span></p><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Since then, over 1,000,000 No-Scalpel vasectomies have been performed in North America and nearly 20,000,000 in China, and the numbers around the world are growing.</span></p><p data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Our Toronto vasectomy clinic uses this advanced method and Gentle Procedures Clinics across North America have been performing scalpel-free vasectomies with great success for many years.&nbsp;In fact, Canada has one of the highest prevalence for vasectomy worldwide.</span></p><span data-dcnode-id="1854" instrument_node=""> </span></div><span data-dcnode-id="1852" instrument_node="">
</span></div><span data-dcnode-id="1850" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">NSV Benefits vs. Conventional Vasectomy</span></h2><span data-dcnode-id="1825" instrument_node=""> </span></div><span data-dcnode-id="1823" instrument_node="">
</span></div><span data-dcnode-id="1821" instrument_node="">
</span><div class="elementor-element elementor-element-621185e elementor-widget elementor-widget-text-editor" data-dcnode-id="1801" data-element_type="widget" data-id="621185e" data-widget_type="text-editor.default"><span data-dcnode-id="1820" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1803"><span data-dcnode-id="1819" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1805"><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">No scalpel vasectomy is a simple and elegant in-office procedure that many studies show has significant advantages over conventional vasectomy. NSV is comparatively faster, has a swifter recovery time, safer (one-eighth the rate of bleeding and infection) and can be virtually pain-free at our Toronto free vasectomy clinic.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">With a conventional vasectomy procedure, a doctor would make two incisions, one on each side of the scrotum, perform the procedure, and then stitch up the incisions. The stitches would then have to be removed about a week later.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">With this new approach there is no knife, no cutting incision, no stitches and no-needle. Men who have undergone NSV express amazement at the minimal physical discomfort they experienced both during the procedure and during recovery.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Men who were previously not considering vasectomy because they feared the scalpel can now feel comfortable, relaxed and confident with this simple procedure.</span></p><span data-dcnode-id="1806" instrument_node=""> </span></div><span data-dcnode-id="1804" instrument_node="">

</span></span><span data-dcnode-id="1571" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1570" instrument_node="">Why do I need to get a doctor’s referral?</span></a><span data-dcnode-id="1568" instrument_node="">
</span></h3><span data-dcnode-id="1566" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1561" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1559" data-tab="1" id="elementor-tab-content-1561" role="tabpanel"><p data-dcnode-id="1560"><span data-dcnode-id="1565" instrument_node="">OHIP requires a doctor’s referral for vasectomy. We will schedule your procedure as soon as we get your referral from your doctor or a clinic. This step can be a small inconvenience but helps ensure that you make an informed decision – and OHIP pays the full cost of your procedure.&nbsp;</span><strong data-dcnode-id="1562"><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/vasectomy/appointment/"><span data-dcnode-id="1564" instrument_node="">Enter your email here and we will email you the referral form for your doctor.</span></a></strong><span data-dcnode-id="1561" instrument_node="">&nbsp;Thanks.</span></p></div><span data-dcnode-id="1558" instrument_node="">
</span></div><span data-dcnode-id="1556" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1533"><span data-dcnode-id="1555" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1562" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1541" data-tab="2" id="elementor-tab-title-1562" role="tab"><span data-dcnode-id="1554" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1546"><span data-dcnode-id="1553" instrument_node="">
</span><span class="elementor-toggle-icon-closed" data-dcnode-id="1551"><i class="fas fa-angle-right" data-dcnode-id="1552"></i></span><span data-dcnode-id="1550" instrument_node="">
</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1548"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1549"></i></span><span data-dcnode-id="1547" instrument_node="">
</span></span><span data-dcnode-id="1545" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1544" instrument_node="">Is there any discomfort during the procedure?</span></a><span data-dcnode-id="1542" instrument_node="">
</span></h3><span data-dcnode-id="1540" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1562" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1535" data-tab="2" id="elementor-tab-content-1562" role="tabpanel"><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Before the vasectomy, you will not need any sedatives. No-Scalpel Vasectomy is virtually painless. Afterwards you will likely be sore for a couple of days and should take a mild painkiller. The discomfort is less with the no-scalpel technique because there is minimal injury to the tissues.</span></p><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">You can book a consultation with our doctor to see if a penile frenulectomy of frenuloplasty procedure could be appropriate in your case.</span></p></div><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1532" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1511"><span data-dcnode-id="1531" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1563" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1517" data-tab="3" id="elementor-tab-title-1563" role="tab"><span data-dcnode-id="1530" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1522"><span data-dcnode-id="1529" instrument_node="">
</span><span class="elementor-toggle-icon-closed" data-dcnode-id="1527"><i class="fas fa-angle-right" data-dcnode-id="1528"></i></span><span data-dcnode-id="1526" instrument_node="">
</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1524"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1525"></i></span><span data-dcnode-id="1523" instrument_node="">
</span></span><span data-dcnode-id="1521" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1520" instrument_node="">How soon after my vasectomy can I go back to work?</span></a><span data-dcnode-id="1518" instrument_node="">
</span></h3><span data-dcnode-id="1516" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1563" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1513" data-tab="3" id="elementor-tab-content-1563" role="tabpanel"><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">You should not do any heavy physical labour for seven days after your vasectomy. If your job does not involve this kind of work, you can go back sooner. Many men have their vasectomy on Friday, so they can take it easy over the weekend and go back to work on Monday.</span></p></div><span data-dcnode-id="1512" instrument_node="">
</span></div><span data-dcnode-id="1510" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1488"><span data-dcnode-id="1509" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1564" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1495" data-tab="4" id="elementor-tab-title-1564" role="tab"><span data-dcnode-id="1508" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1500"><span data-dcnode-id="1507" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1502"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1503"></i></span><span data-dcnode-id="1501" instrument_node="">
</span></span><span data-dcnode-id="1499" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1498" instrument_node="">Will the vasectomy change me sexually?</span></a><span data-dcnode-id="1496" instrument_node="">
</span></h3><span data-dcnode-id="1494" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1564" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1490" data-tab="4" id="elementor-tab-content-1564" role="tabpanel"><ul data-dcnode-id="1491"><li data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The only thing that will change is that you will not be able to make your partner pregnant. Your body will continue to produce the hormones that make you a man. You will have the same amount of semen. Vasectomy won’t change your voice, beard, your muscles, your sex drive, your erections, or your climaxes. Some men say that without the worry of accidental pregnancy and the bother of other birth control methods, sex is more relaxed and enjoyable than before.</span></li></ul></div><span data-dcnode-id="1489" instrument_node="">
</span></div><span data-dcnode-id="1487" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1466"><span data-dcnode-id="1486" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1565" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1472" data-tab="5" id="elementor-tab-title-1565" role="tab"><span data-dcnode-id="1485" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1477"><span data-dcnode-id="1484" instrument_node="">
</span><span class="elementor-toggle-icon-closed" data-dcnode-id="1482"><i class="fas fa-angle-right" data-dcnode-id="1483"></i></span><span data-dcnode-id="1481" instrument_node="">
</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1479"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1480"></i></span><span data-dcnode-id="1478" instrument_node="">
</span></span><span data-dcnode-id="1476" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1475" instrument_node="">Does No-Scalpel Vasectomy work?</span></a><span data-dcnode-id="1473" instrument_node="">
</span></h3><span data-dcnode-id="1471" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1565" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1468" data-tab="5" id="elementor-tab-content-1565" role="tabpanel"><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">NSV is extremely effective! In fact, the success rate of vasectomy in our clinics has been better than 99.9%, which is amongst the highest in North America. Our Toronto vasectomy clinic offers the same procedure and potential success rate.</span></p></div><span data-dcnode-id="1467" instrument_node="">
</span></div><span data-dcnode-id="1465" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1444"><span data-dcnode-id="1464" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1566" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1450" data-tab="6" id="elementor-tab-title-1566" role="tab"><span data-dcnode-id="1463" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1455"><span data-dcnode-id="1462" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1457"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1458"></i></span><span data-dcnode-id="1456" instrument_node="">
</span></span><span data-dcnode-id="1454" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1453" instrument_node="">Will I be sterile right away?</span></a><span data-dcnode-id="1451" instrument_node="">
</span></h3><span data-dcnode-id="1449" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1566" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1446" data-tab="6" id="elementor-tab-content-1566" role="tabpanel"><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">No, after a vasectomy, there are always some active sperm in your system. It usually takes 2-3 months plus 20 ejaculations to clear them. You and your partner should use some other form of birth control until a semen test confirms that your semen is sperm free. You will be given semen test instructions after your free vasectomy procedure – full covered by OHIP.</span></p></div><span data-dcnode-id="1445" instrument_node="">
</span></div><span data-dcnode-id="1443" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1422"><span data-dcnode-id="1442" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1567" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1428" data-tab="7" id="elementor-tab-title-1567" role="tab"><span data-dcnode-id="1441" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1435"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1436"></i></span><span data-dcnode-id="1434" instrument_node="">
</span></span><span data-dcnode-id="1432" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1431" instrument_node="">Is No-Scalpel Vasectomy safe?</span></a><span data-dcnode-id="1429" instrument_node="">
</span></h3><span data-dcnode-id="1427" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1567" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1424" data-tab="7" id="elementor-tab-content-1567" role="tabpanel"><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Most medical experts, including special panels convened by the National Institutes of Health and by the World Health Organization, have concluded that vasectomy is a safe and simple procedure. Vasectomy is surgery, and all surgery has some risks, such as bleeding and infection. But serious problems are uncommon at our Ontario free vasectomy clinic in Toronto.</span></p></div><span data-dcnode-id="1423" instrument_node="">
</span></div><span data-dcnode-id="1421" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1400"><span data-dcnode-id="1420" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1568" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1406" data-tab="8" id="elementor-tab-title-1568" role="tab"><span data-dcnode-id="1419" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1413"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1414"></i></span><span data-dcnode-id="1412" instrument_node="">
</span></span><span data-dcnode-id="1410" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1409" instrument_node="">Is the procedure really free?</span></a><span data-dcnode-id="1407" instrument_node="">
</span></h3><span data-dcnode-id="1405" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1568" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1402" data-tab="8" id="elementor-tab-content-1568" role="tabpanel"><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Yes. OHIP covers the full cost.</span></p></div><span data-dcnode-id="1401" instrument_node="">
</span></div><span data-dcnode-id="1399" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1378"><span data-dcnode-id="1398" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-1569" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1384" data-tab="9" id="elementor-tab-title-1569" role="tab"><span data-dcnode-id="1397" instrument_node="">
</span><span aria-hidden="true" class="elementor-toggle-icon elementor-toggle-icon-left" data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1391"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1392"></i></span><span data-dcnode-id="1390" instrument_node="">
</span></span><span data-dcnode-id="1388" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1387" instrument_node="">Can a No-Scalpel Vasectomy be reversed?</span></a><span data-dcnode-id="1385" instrument_node="">
</span></h3><span data-dcnode-id="1383" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1569" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1380" data-tab="9" id="elementor-tab-content-1569" role="tabpanel"><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Yes, but reversal operations are expensive and not always successful. If you are thinking about reversal, perhaps vasectomy is not right for you. Pre-vasectomy Sperm Banking (cryopreservation) is a good idea for almost anyone considering a vasectomy. Ask our staff for details. Our Toronto vasectomy clinic does not offer reversals.</span></p></div><span data-dcnode-id="1379" instrument_node="">
</span></div><span data-dcnode-id="1377" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1356"><span data-dcnode-id="1376" instrument_node="">
</span><h3 aria-controls="elementor-tab-content-15610" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1362" data-tab="10" id="elementor-tab-title-15610" role="tab"><span data-dcnode-id="1375" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1369"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1370"></i></span><span data-dcnode-id="1368" instrument_node="">
</span></span><span data-dcnode-id="1366" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1365" instrument_node="">How much does a vasectomy cost in Ontario?</span></a><span data-dcnode-id="1363" instrument_node="">
</span></h3><span data-dcnode-id="1361" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-15610" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1358" data-tab="10" id="elementor-tab-content-15610" role="tabpanel"><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">In Ontario, the public health insurance program, OHIP, pays the doctor for performing the vasectomy procedure.</span></p></div><span data-dcnode-id="1357" instrument_node="">
</span></div><span data-dcnode-id="1355" instrument_node="">
</span><div class="elementor-toggle-item" data-dcnode-id="1334"><span data-dcnode-id="1354" instrument_node="">

</span><span class="elementor-toggle-icon-opened" data-dcnode-id="1347"><i class="elementor-toggle-icon-opened fas fa-angle-up" data-dcnode-id="1348"></i></span><span data-dcnode-id="1346" instrument_node="">
</span></span><span data-dcnode-id="1344" instrument_node="">
</span><a class="elementor-toggle-title" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1343" instrument_node="">When can I start having sex again?</span></a><span data-dcnode-id="1341" instrument_node="">
</span></h3><span data-dcnode-id="1339" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-15611" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1336" data-tab="11" id="elementor-tab-content-15611" role="tabpanel"><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">As soon as you are comfortable, after a minimum of seven days, but remember to use some other kind of birth control until your semen analysis confirms you are sterile. Please expect to continue with your existing method of contraception for three months after your vasectomy.</span></p></div><span data-dcnode-id="1335" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1321" instrument_node="">How long will a No-Scalpel Vasectomy take?</span></a><span data-dcnode-id="1319" instrument_node="">
</span></h3><span data-dcnode-id="1317" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-15612" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1314" data-tab="12" id="elementor-tab-content-15612" role="tabpanel"><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">On average, the whole procedure takes less than 10 minutes. It is a simple procedure that can be performed in our procedure rooms in our Toronto vasectomy clinic. After your procedure, we recommend that you have someone to drive you home, or that you extend your stay at our clinic to be sure that your are fully recovered before driving yourself home.</span></p></div><span data-dcnode-id="1313" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1299" instrument_node="">What are some potential benefits of open-ended vasectomy?</span></a><span data-dcnode-id="1297" instrument_node="">
</span></h3><span data-dcnode-id="1295" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-15613" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1292" data-tab="13" id="elementor-tab-content-15613" role="tabpanel"><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">In an open-ended vasectomy, once the vas tube is cut, the end from the testicle is left open (i.e. not cauterized), while the end of the tube leading to the penis is closed. Studies have suggested that this could be the ideal way to block the vas end. There may be less post-operative discomfort because there is no sudden pressure back-up to the testicles.</span></p></div><span data-dcnode-id="1291" instrument_node="">
</span></div><span data-dcnode-id="1289" instrument_node="">

</span><a class="elementor-toggle-title" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gentleprocedurestoronto.ca/vasectomy"><span data-dcnode-id="1277" instrument_node="">Where do the sperm go after vasectomy?</span></a><span data-dcnode-id="1275" instrument_node="">
</span></h3><span data-dcnode-id="1273" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-15614" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1270" data-tab="14" id="elementor-tab-content-15614" role="tabpanel"><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Your vasectomy procedure will prevent your sperm from getting into your semen, but they will continue to be produced by your testicles. The sperm will be reabsorbed into your body, the same as happens now if you don’t ejaculate regularly. There is no reason to be concerned about the disposition of your sperm after your vasectomy surgery. They will be fine. In fact, some surveys find that sperm are actually happier knowing that they will not be suddenly called upon to shoot out and take on the potential responsibility of inseminating an ovum.</span></p></div><span data-dcnode-id="1269" instrument_node="">
