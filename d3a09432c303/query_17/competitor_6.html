</span><p data-dcnode-id="1699"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Non-graphic informational video.</span></strong><span data-dcnode-id="1700" instrument_node=""> It is essential that you watch this video prior to your vasectomy appointment.</span></p><span data-dcnode-id="1698" instrument_node=""> </span></div><span data-dcnode-id="1696" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="1672"><span data-dcnode-id="1692" instrument_node="">
</span><h4 data-dcnode-id="1689"><span data-dcnode-id="1690" data-preserver-spaces="true"><span data-dcnode-id="1691" instrument_node="">The Gentle Touch Vasectomy</span></span></h4><p data-dcnode-id="1686"><span data-dcnode-id="1687" data-preserver-spaces="true"><span data-dcnode-id="1688" instrument_node="">The No-Needle, No-Scalpel Vasectomy is also known as a Gentle Touch Vasectomy. It is a simple, safe, and effective form of permanent birth control for men. This gentle, office-based procedure takes 10-20 minutes to complete.</span></span></p><p data-dcnode-id="1683"><span data-dcnode-id="1684" data-preserver-spaces="true"><span data-dcnode-id="1685" instrument_node="">A vasectomy works by blocking the vas deferens, the tubes that carry sperm from the testicles. This prevents sperm from entering the semen.</span></span></p><p data-dcnode-id="1680"><span data-dcnode-id="1681" data-preserver-spaces="true"><span data-dcnode-id="1682" instrument_node="">With the Gentle Touch Vasectomy technique, the skin and underlying tissue are anesthetized with a spray applicator. A single, small puncture is made in the scrotum under the penis. Through this tiny skin opening, we access the vas. The vas is then divided, and the abdominal end is sealed off with a cautery. We use a small titanium clip or silk tie to bury the abdominal end of the vas in the surrounding fascia. This is known as fascial interposition. The testicular end is left open, allowing the sperm to leak out and be recycled.</span></span></p><p data-dcnode-id="1677"><span data-dcnode-id="1678" data-preserver-spaces="true"><span data-dcnode-id="1679" instrument_node="">At the end of the procedure, the vas falls into its anatomical position. No sutures are required to close the skin.&nbsp;</span></span></p><p data-dcnode-id="1674"><span data-dcnode-id="1675" data-preserver-spaces="true"><span data-dcnode-id="1676" instrument_node="">You can go home directly after the procedure.</span></span></p><span data-dcnode-id="1673" instrument_node=""> </span></div><span data-dcnode-id="1671" instrument_node="">
</span></div><span data-dcnode-id="1669" instrument_node="">
</span><div class="elementor-element elementor-element-5cb97e7 elementor-widget elementor-widget-text-editor" data-dcnode-id="1656" data-element_type="widget" data-id="5cb97e7" data-widget_type="text-editor.default"><span data-dcnode-id="1668" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1658"><span data-dcnode-id="1667" instrument_node="">
</span><h4 data-dcnode-id="1664"><span data-dcnode-id="1665" data-preserver-spaces="true"><span data-dcnode-id="1666" instrument_node="">Vasectomy is permanent</span></span></h4><p data-dcnode-id="1660"><span data-dcnode-id="1661" data-preserver-spaces="true"><span data-dcnode-id="1663" instrument_node="">Vasectomy is for life. After a vasectomy, you will no longer be able to get a woman pregnant. If you are unsure about wanting more children someday, a vasectomy might not be a good choice for you. A surgical procedure does exist to reverse vasectomy; but this operation is expensive and does not always work. </span><br data-dcnode-id="1662"></span></p><span data-dcnode-id="1659" instrument_node=""> </span></div><span data-dcnode-id="1657" instrument_node="">
</span></div><span data-dcnode-id="1655" instrument_node="">
</span><div class="elementor-element elementor-element-b774a19 elementor-widget elementor-widget-text-editor" data-dcnode-id="1640" data-element_type="widget" data-id="b774a19" data-widget_type="text-editor.default"><span data-dcnode-id="1654" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1642"><span data-dcnode-id="1653" instrument_node="">
</span><h4 data-dcnode-id="1650"><span data-dcnode-id="1651" data-preserver-spaces="true"><span data-dcnode-id="1652" instrument_node="">Vasectomy risks</span></span></h4><p data-dcnode-id="1647"><span data-dcnode-id="1648" data-preserver-spaces="true"><span data-dcnode-id="1649" instrument_node="">A vasectomy is a very safe, low-risk procedure, but with any surgery, some complications may occur. Mild bruising is the most common complication. We recommend wearing tight underpants for the first week after the vasectomy to decrease your chances of bleeding or swelling.</span></span></p><p data-dcnode-id="1644"><span data-dcnode-id="1645" data-preserver-spaces="true"><span data-dcnode-id="1646" instrument_node="">Other rare complications include: infection (very rare and can be treated with antibiotics), a painful bump on the vas (sperm granuloma), and bleeding into the scrotum, causing a collection of blood (scrotal hematoma). Several weeks after the procedure, about 5% of men experience pain in the testicles that usually only lasts a few days. This is resolved with oral anti-inflammatory medications, like Advil or Motrin. Chronic pain is a very rare complication (about 0.1-1%).</span></span></p><span data-dcnode-id="1643" instrument_node=""> </span></div><span data-dcnode-id="1641" instrument_node="">

</span><h4 data-dcnode-id="1622"><span data-dcnode-id="1623" data-preserver-spaces="true"><span data-dcnode-id="1624" instrument_node="">Vasectomy advantages</span></span></h4><p data-dcnode-id="1619"><span data-dcnode-id="1620" data-preserver-spaces="true"><span data-dcnode-id="1621" instrument_node="">• No noticeable change in the semen&nbsp;</span></span></p><p data-dcnode-id="1616"><span data-dcnode-id="1617" data-preserver-spaces="true"><span data-dcnode-id="1618" instrument_node="">• No change in sex drive or climax sensation&nbsp;</span></span></p><p data-dcnode-id="1613"><span data-dcnode-id="1614" data-preserver-spaces="true"><span data-dcnode-id="1615" instrument_node="">• No change in the testes</span></span></p><p data-dcnode-id="1610"><span data-dcnode-id="1611" data-preserver-spaces="true"><span data-dcnode-id="1612" instrument_node="">• No change in erections</span></span></p><p data-dcnode-id="1607"><span data-dcnode-id="1608" data-preserver-spaces="true"><span data-dcnode-id="1609" instrument_node="">• No need to use other methods of birth control</span></span></p><span data-dcnode-id="1606" instrument_node=""> </span></div><span data-dcnode-id="1604" instrument_node="">

</span><h4 data-dcnode-id="1591"><span data-dcnode-id="1592" data-preserver-spaces="true"><span data-dcnode-id="1593" instrument_node="">Vasectomy limitations:</span></span></h4><p data-dcnode-id="1588"><span data-dcnode-id="1589" data-preserver-spaces="true"><span data-dcnode-id="1590" instrument_node="">• Not 100% reversible.</span></span></p><p data-dcnode-id="1585"><span data-dcnode-id="1586" data-preserver-spaces="true"><span data-dcnode-id="1587" instrument_node="">• Must use other forms of birth control until sperm-free.</span></span></p><p data-dcnode-id="1582"><span data-dcnode-id="1583" data-preserver-spaces="true"><span data-dcnode-id="1584" instrument_node="">• Does not prevent transmission of sexually transmitted infections (STI’s).</span></span></p><span data-dcnode-id="1581" instrument_node=""> </span></div><span data-dcnode-id="1579" instrument_node="">

</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1277"><i class="fas fa-minus" data-dcnode-id="1278"></i></span><span data-dcnode-id="1276" instrument_node="">
</span></span><span data-dcnode-id="1274" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1273" instrument_node="">What is the difference between the No-Scalpel and the Classic vasectomy?</span></a><span data-dcnode-id="1271" instrument_node="">
</span></div><span data-dcnode-id="1269" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1641" class="elementor-tab-content elementor-clearfix elementor-active" data-dcnode-id="1264" data-tab="1" id="elementor-tab-content-1641" role="tabpanel" style="display: block;"><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">No-scalpel vasectomy does not use a scalpel. It uses special small tools to reach the vas by making a tiny opening in the scrotum without cutting. Because this opening is so small, stitches are not needed. This is different from the classic vasectomy that makes two larger openings on the scrotum and sometimes needs stitches. The chance of complications (infection and bleeding) is less with the no scalpel technique. Recovery is also faster. The no-scalpel vasectomy is as effective as classic vasectomy for birth control.</span></p><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The no-needle and no-scalpel vasectomy technique is the most advanced medical method available.</span></p></div><span data-dcnode-id="1263" instrument_node="">
</span></div><span data-dcnode-id="1261" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1240"><span data-dcnode-id="1260" instrument_node="">
</span><div aria-controls="elementor-tab-content-1642" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1246" data-tab="2" id="elementor-tab-title-1642" role="tab"><span data-dcnode-id="1259" instrument_node="">
</span><span aria-hidden="true" class="elementor-accordion-icon elementor-accordion-icon-left" data-dcnode-id="1251"><span data-dcnode-id="1258" instrument_node="">
</span><span class="elementor-accordion-icon-closed" data-dcnode-id="1256"><i class="fas fa-plus" data-dcnode-id="1257"></i></span><span data-dcnode-id="1255" instrument_node="">
</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1253"><i class="fas fa-minus" data-dcnode-id="1254"></i></span><span data-dcnode-id="1252" instrument_node="">
</span></span><span data-dcnode-id="1250" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1249" instrument_node="">How well does it work?</span></a><span data-dcnode-id="1247" instrument_node="">
</span></div><span data-dcnode-id="1245" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1642" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1242" data-tab="2" id="elementor-tab-content-1642" role="tabpanel"><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">A vasectomy is an extremely effective method of permanent contraception. However, it can take up to 3 months for it to start working. The semen needs to be checked after the surgery to make sure there is no more sperm in it. Until then, another method of birth control must be used. Sometimes it takes more than one test before it is clear of sperm.</span></p></div><span data-dcnode-id="1241" instrument_node="">
</span></div><span data-dcnode-id="1239" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1216"><span data-dcnode-id="1238" instrument_node="">
</span><div aria-controls="elementor-tab-content-1643" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1224" data-tab="3" id="elementor-tab-title-1643" role="tab"><span data-dcnode-id="1237" instrument_node="">
</span><span aria-hidden="true" class="elementor-accordion-icon elementor-accordion-icon-left" data-dcnode-id="1229"><span data-dcnode-id="1236" instrument_node="">
</span><span class="elementor-accordion-icon-closed" data-dcnode-id="1234"><i class="fas fa-plus" data-dcnode-id="1235"></i></span><span data-dcnode-id="1233" instrument_node="">
</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1231"><i class="fas fa-minus" data-dcnode-id="1232"></i></span><span data-dcnode-id="1230" instrument_node="">
</span></span><span data-dcnode-id="1228" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1227" instrument_node="">Does vasectomy change your sex drive?</span></a><span data-dcnode-id="1225" instrument_node="">
</span></div><span data-dcnode-id="1223" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1643" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1218" data-tab="3" id="elementor-tab-content-1643" role="tabpanel"><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">For most men, not at all. Some men notice an increased sex drive after a vasectomy.</span></p><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Vasectomy does not affect the male hormones produced by the testicles. After a vasectomy, sexual function does not change. Sensation, erection, and ejaculation are the same except the ejaculate no longer contains sperm.</span></p></div><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1192"><span data-dcnode-id="1214" instrument_node="">
</span><div aria-controls="elementor-tab-content-1644" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1200" data-tab="4" id="elementor-tab-title-1644" role="tab"><span data-dcnode-id="1213" instrument_node="">
</span><span aria-hidden="true" class="elementor-accordion-icon elementor-accordion-icon-left" data-dcnode-id="1205"><span data-dcnode-id="1212" instrument_node="">
</span><span class="elementor-accordion-icon-closed" data-dcnode-id="1210"><i class="fas fa-plus" data-dcnode-id="1211"></i></span><span data-dcnode-id="1209" instrument_node="">
</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1207"><i class="fas fa-minus" data-dcnode-id="1208"></i></span><span data-dcnode-id="1206" instrument_node="">
</span></span><span data-dcnode-id="1204" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1203" instrument_node="">Will I be able to notice any change in my semen?</span></a><span data-dcnode-id="1201" instrument_node="">
</span></div><span data-dcnode-id="1199" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1644" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1194" data-tab="4" id="elementor-tab-content-1644" role="tabpanel"><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">No. The amount of sperm in semen is so small that men do not notice any change. More than 95% of the semen is made in the the prostate and seminal vesicles above the vas. Only a small portion of the total semen volume is made in the testes. After a vasectomy, the only way to tell the difference in the semen is with a microscopic semen analysis.</span></p><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">A vasectomy does not prevent ejaculation. You will not notice a difference in your semen.</span></p></div><span data-dcnode-id="1193" instrument_node="">
</span></div><span data-dcnode-id="1191" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1170"><span data-dcnode-id="1190" instrument_node="">
</span><div aria-controls="elementor-tab-content-1645" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1176" data-tab="5" id="elementor-tab-title-1645" role="tab"><span data-dcnode-id="1189" instrument_node="">
</span><span aria-hidden="true" class="elementor-accordion-icon elementor-accordion-icon-left" data-dcnode-id="1181"><span data-dcnode-id="1188" instrument_node="">
</span><span class="elementor-accordion-icon-closed" data-dcnode-id="1186"><i class="fas fa-plus" data-dcnode-id="1187"></i></span><span data-dcnode-id="1185" instrument_node="">
</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1183"><i class="fas fa-minus" data-dcnode-id="1184"></i></span><span data-dcnode-id="1182" instrument_node="">
</span></span><span data-dcnode-id="1180" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1179" instrument_node="">What happens to the sperm after a vasectomy?</span></a><span data-dcnode-id="1177" instrument_node="">
</span></div><span data-dcnode-id="1175" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1645" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1172" data-tab="5" id="elementor-tab-content-1645" role="tabpanel"><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Your body reabsorbs the sperm. Our bodies are very good at recycling old or unused cells. For example, we make red blood cells every day, and our bodies do not become overloaded with excess blood. Our bodies simply reabsorb the older blood cells and recycle their proteins and parts. Similarly, the body reabsorbs the sperm that continues to be produced by the testes after the vasectomy.</span></p></div><span data-dcnode-id="1171" instrument_node="">
</span></div><span data-dcnode-id="1169" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1148"><span data-dcnode-id="1168" instrument_node="">
</span><div aria-controls="elementor-tab-content-1646" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1154" data-tab="6" id="elementor-tab-title-1646" role="tab"><span data-dcnode-id="1167" instrument_node="">
</span><span aria-hidden="true" class="elementor-accordion-icon elementor-accordion-icon-left" data-dcnode-id="1159"><span data-dcnode-id="1166" instrument_node="">
</span><span class="elementor-accordion-icon-closed" data-dcnode-id="1164"><i class="fas fa-plus" data-dcnode-id="1165"></i></span><span data-dcnode-id="1163" instrument_node="">
</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1161"><i class="fas fa-minus" data-dcnode-id="1162"></i></span><span data-dcnode-id="1160" instrument_node="">
</span></span><span data-dcnode-id="1158" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1157" instrument_node="">What is the recovery like?</span></a><span data-dcnode-id="1155" instrument_node="">
</span></div><span data-dcnode-id="1153" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1646" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1150" data-tab="6" id="elementor-tab-content-1646" role="tabpanel"><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Most men feel some soreness for a night or two after the procedure and then feel fine. We recommend wearing tight underpants for the first week after the vasectomy to decrease your discomfort and chances of bleeding. Avoid any vigorous activity, including sports and sex, for the first week after your vasectomy.</span></p></div><span data-dcnode-id="1149" instrument_node="">
</span></div><span data-dcnode-id="1147" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1126"><span data-dcnode-id="1146" instrument_node="">
</span><div aria-controls="elementor-tab-content-1647" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1132" data-tab="7" id="elementor-tab-title-1647" role="tab"><span data-dcnode-id="1145" instrument_node="">

</span><span class="elementor-accordion-icon-closed" data-dcnode-id="1142"><i class="fas fa-plus" data-dcnode-id="1143"></i></span><span data-dcnode-id="1141" instrument_node="">
</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1139"><i class="fas fa-minus" data-dcnode-id="1140"></i></span><span data-dcnode-id="1138" instrument_node="">
</span></span><span data-dcnode-id="1136" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1135" instrument_node="">Why do I have to wait 3 months to get my semen checked?</span></a><span data-dcnode-id="1133" instrument_node="">
</span></div><span data-dcnode-id="1131" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1647" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1128" data-tab="7" id="elementor-tab-content-1647" role="tabpanel"><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">You should not consider yourself “clear” until a semen check verifies that your semen no longer contains viable sperm. The semen check is an important part of the vasectomy, but bringing the sample in too soon can give you a scare. Sperm can hide in the prostate and seminal vesicles for 2-3 months, so early on a sperm count could be positive even though the vas tubes were successfully sealed. Waiting allows the hidden sperm to be flushed out. There is a very rare chance that the vas can grow back together after a vasectomy. After three months, the semen analysis should show if this occurred. The sample can be collected in the comfort of your home. For most men, the semen check is a simple, last step in the process to ensure a successful vasectomy.</span></p></div><span data-dcnode-id="1127" instrument_node="">
</span></div><span data-dcnode-id="1125" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1104"><span data-dcnode-id="1124" instrument_node="">

</span><span class="elementor-accordion-icon-opened" data-dcnode-id="1117"><i class="fas fa-minus" data-dcnode-id="1118"></i></span><span data-dcnode-id="1116" instrument_node="">
</span></span><span data-dcnode-id="1114" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1113" instrument_node="">How does the no-needle anesthesia work?</span></a><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1648" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1106" data-tab="8" id="elementor-tab-content-1648" role="tabpanel"><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">&nbsp;We use a high-pressure device that sprays the local anesthetic through the skin without making a puncture wound.</span></p></div><span data-dcnode-id="1105" instrument_node="">
</span></div><span data-dcnode-id="1103" instrument_node="">
</span><div class="elementor-accordion-item" data-dcnode-id="1082"><span data-dcnode-id="1102" instrument_node="">
</span><div aria-controls="elementor-tab-content-1649" aria-expanded="false" class="elementor-tab-title" data-dcnode-id="1088" data-tab="9" id="elementor-tab-title-1649" role="tab"><span data-dcnode-id="1101" instrument_node="">

</span></span><span data-dcnode-id="1092" instrument_node="">
</span><a class="elementor-accordion-title" data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//albertavasectomy.ca/information"><span data-dcnode-id="1091" instrument_node="">How does the sedation work?</span></a><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1087" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-1649" class="elementor-tab-content elementor-clearfix" data-dcnode-id="1084" data-tab="9" id="elementor-tab-content-1649" role="tabpanel"><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">We will give you a single-use inhalation device and you can decide when and how much of the anesthetic you need.</span></p></div><span data-dcnode-id="1083" instrument_node="">

</span><h4 data-dcnode-id="507"><span data-dcnode-id="508" data-preserver-spaces="true"><span data-dcnode-id="509" instrument_node="">Special message for young men with fewer than two children</span></span></h4><p data-dcnode-id="504"><span data-dcnode-id="505" data-preserver-spaces="true"><span data-dcnode-id="506" instrument_node="">If you are less than 30 years old and you have had fewer than 2 children, please consider the following points before having a vasectomy:</span></span></p><ol data-dcnode-id="465"><li data-dcnode-id="498"><strong data-dcnode-id="501"><span data-dcnode-id="502" data-preserver-spaces="true"><span data-dcnode-id="503" instrument_node="">You may regret it.</span></span></strong><span data-dcnode-id="499" data-preserver-spaces="true"><span data-dcnode-id="500" instrument_node="">&nbsp;Men who have vasectomies when they are in their 20’s, especially if they have had fewer than two children, may be the ones most likely to seek vasectomy reversal at a later date, often regretting their vasectomy decisions if their reversals are not successful.</span></span></li><li data-dcnode-id="492"><strong data-dcnode-id="495"><span data-dcnode-id="496" data-preserver-spaces="true"><span data-dcnode-id="497" instrument_node="">You may change.</span></span></strong><span data-dcnode-id="493" data-preserver-spaces="true"><span data-dcnode-id="494" instrument_node="">&nbsp;Many men who think they will never want children when they are in their early 20’s are delighted with fatherhood when they are in their 30’s. You may be totally convinced now that you will never want children, but people change, and you may have a much different outlook 10 years from now.</span></span></li><li data-dcnode-id="486"><strong data-dcnode-id="489"><span data-dcnode-id="490" data-preserver-spaces="true"><span data-dcnode-id="491" instrument_node="">Women change.</span></span></strong><span data-dcnode-id="487" data-preserver-spaces="true"><span data-dcnode-id="488" instrument_node="">&nbsp;Similarly, women who have no desire for children when they are in their early 20’s may have a much stronger desire when they are in their 30’s and when many of their friends are having children of their own.</span></span></li><li data-dcnode-id="480"><strong data-dcnode-id="483"><span data-dcnode-id="484" data-preserver-spaces="true"><span data-dcnode-id="485" instrument_node="">Relationships end.</span></span></strong><span data-dcnode-id="481" data-preserver-spaces="true"><span data-dcnode-id="482" instrument_node="">&nbsp;You may not be with the same partner ten years from now, and a new partner may have a much stronger desire for children than your present partner does.</span></span></li><li data-dcnode-id="474"><strong data-dcnode-id="477"><span data-dcnode-id="478" data-preserver-spaces="true"><span data-dcnode-id="479" instrument_node="">Considered a vasectomy as permanent</span></span></strong><span data-dcnode-id="475" data-preserver-spaces="true"><span data-dcnode-id="476" instrument_node="">&nbsp;and non-reversible procedure</span></span></li><li data-dcnode-id="466"><strong data-dcnode-id="471"><span data-dcnode-id="472" data-preserver-spaces="true"><span data-dcnode-id="473" instrument_node="">Consider&nbsp;</span></span></strong><a class="editor-rtfLink" data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.repromed.ca/sperm_storage.html" rel="noopener" target="_blank"><strong data-dcnode-id="468"><span data-dcnode-id="469" data-preserver-spaces="true"><span data-dcnode-id="470" instrument_node="">sperm storage</span></span></strong></a></li></ol><span data-dcnode-id="464" instrument_node=""> </span></div><span data-dcnode-id="462" instrument_node="">
