</span><div class="dslc-text-module-content" data-dcnode-id="1011"><h2 data-dcnode-id="1012" id="contact-form"><span data-dcnode-id="1013" instrument_node="">Read Our Frequent Asked Questions</span></h2></div><span data-dcnode-id="1010" instrument_node="">

</span><div class="dslc-module-front dslc-module-DSLC_Accordion dslc-in-viewport-check dslc-in-viewport-anim-none dslc-col dslc-12-col dslc-last-col dslc-module-handle-like-accordion dslc-in-viewport" data-dcnode-id="696" data-dslc-anim="none" data-dslc-anim-delay="0" data-dslc-anim-duration="650" data-dslc-anim-easing="ease" data-dslc-module-id="DSLC_Accordion" data-dslc-module-size="12" data-dslc-preset="none" data-module-id="84" id="dslc-module-84" style="animation: 0.65s ease 0s 1 normal none running forwards;"><span data-dcnode-id="1003" instrument_node="">
</span><div class="dslc-accordion" data-dcnode-id="699" data-open="0"><span data-dcnode-id="1002" instrument_node="">
</span><div class="dslc-accordion-item dslc-inactive" data-dcnode-id="976"><span data-dcnode-id="1001" instrument_node="">
</span><div class="dslc-accordion-header dslc-accordion-hook" data-dcnode-id="996"><span data-dcnode-id="1000" instrument_node="">
</span><span class="dslc-accordion-title" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">What will my vasectomy reversal recovery be like?                                </span></span><span data-dcnode-id="997" instrument_node="">
</span></div><span data-dcnode-id="995" instrument_node="">
</span><div class="dslc-accordion-content" data-dcnode-id="979" style="display: none;"><span data-dcnode-id="994" instrument_node="">
</span><div class="dslca-editable-content" data-dcnode-id="981"><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">A vasectomy reversal procedure does not require an overnight hospital stay.</span></p><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Immediately after the surgery, ice packs placed on the scrotum area are recommended to reduce any swelling and pain. A prescription pain medication will be available after the vasectomy reversal procedure and can be taken as necessary. Often times after the second day, Tylenol will be sufficient to eliminate discomfort or pain.</span></p><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Due to the superficial nature of the procedure, risks, post-procedure discomfort and disruption of normal activities are limited. Patients routinely return back to work in an office setting in approximately 3-7 days and physically strenuous work within 4 weeks. Sexual intercourse can be resumed as soon as 2 weeks after a vasectomy reversal.</span></p><p data-dcnode-id="983"><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">PLEASE NOTE:</span></strong><span data-dcnode-id="984" instrument_node=""> You must be accompanied by a responsible adult upon discharge to drive you home after surgery</span></p><span data-dcnode-id="982" instrument_node=""> </span></div><span data-dcnode-id="980" instrument_node="">
</span></div><span data-dcnode-id="977" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span><div class="dslc-accordion-item dslc-inactive" data-dcnode-id="956"><span data-dcnode-id="973" instrument_node="">
</span><div class="dslc-accordion-header dslc-accordion-hook" data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">
</span><span class="dslc-accordion-title" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">             Is it possible to reverse a vasectomy after 10 years?             </span></span><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span><div class="dslc-accordion-content" data-dcnode-id="959" style="display: none;"><span data-dcnode-id="966" instrument_node="">
</span><div class="dslca-editable-content" data-dcnode-id="961"><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Yes. Contrary to popularly beliefs, it is possible to have a successful vasectomy reversal 10 years after a vasectomy.</span></p><span data-dcnode-id="962" instrument_node=""> </span></div><span data-dcnode-id="960" instrument_node="">
</span></div><span data-dcnode-id="957" instrument_node="">
</span></div><span data-dcnode-id="954" instrument_node="">
</span><div class="dslc-accordion-item dslc-inactive" data-dcnode-id="934"><span data-dcnode-id="953" instrument_node="">
</span><div class="dslc-accordion-header dslc-accordion-hook" data-dcnode-id="948"><span data-dcnode-id="952" instrument_node="">
</span><span class="dslc-accordion-title" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">            What is the success rate of vasectomy reversal?                          </span></span><span data-dcnode-id="949" instrument_node="">
</span></div><span data-dcnode-id="947" instrument_node="">
</span><div class="dslc-accordion-content" data-dcnode-id="937" style="display: none;"><span data-dcnode-id="946" instrument_node="">
</span><div class="dslca-editable-content" data-dcnode-id="939"><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">The likelihood of sperm again appearing in the ejaculate after a vasectomy reversal is excellent. Although this does not guarantee pregnancy, the likelihood of a subsequent pregnancy are still high. The likelihood of finding sperm at the time of vasectomy reversal is determined by two important factors: 1) the time elapsed since the vasectomy, and 2) the site of the vasectomy.</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Keep in mind that the sperm produced from the resulting vasectomy reversal can also be used with additional assisted reproductive techniques to significantly increase the chances of a pregnancy.</span></p><span data-dcnode-id="940" instrument_node=""> </span></div><span data-dcnode-id="938" instrument_node="">
</span></div><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="932" instrument_node="">
</span><div class="dslc-accordion-item dslc-inactive" data-dcnode-id="892"><span data-dcnode-id="931" instrument_node="">
</span><div class="dslc-accordion-header dslc-accordion-hook" data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">
</span><span class="dslc-accordion-title" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">           What accommodation options are available?                       </span></span><span data-dcnode-id="927" instrument_node="">
</span></div><span data-dcnode-id="925" instrument_node="">
</span><div class="dslc-accordion-content" data-dcnode-id="895" style="display: none;"><span data-dcnode-id="924" instrument_node="">
</span><div class="dslca-editable-content" data-dcnode-id="897"><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">We would like to make your stay as convenient as possible when you arrive for your Vasectomy Reversal surgery. For out-of-town visitors there are many hotels available around our clinic.</span></p><div class="bottom_margin_10" data-dcnode-id="918"><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chelsea.eatonhotels.com/" target="_blank"><img align="absmiddle" data-dcnode-id="920" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vasectomyreversal.ca/images/Eaton_Chelsea.jpg&amp;raw"></a></div><div class="bottom_margin_10" data-dcnode-id="915"><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chelsea.eatonhotels.com/" target="_blank"><span data-dcnode-id="917" instrument_node="">Eaton Chelsea Hotel</span></a></div><div class="bottom_margin_10" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">&nbsp;</span></div><div class="bottom_margin_10" data-dcnode-id="910"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.holidayinn.com/hotels/us/en/toronto/yyzct/hoteldetail" target="_blank"><img align="absmiddle" data-dcnode-id="912" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vasectomyreversal.ca/images/construct/holidayinnhotels.gif&amp;raw"></a></div><div class="bottom_margin_10" data-dcnode-id="907"><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.holidayinn.com/hotels/us/en/toronto/yyzct/hoteldetail" target="_blank"><span data-dcnode-id="909" instrument_node="">Toronto Downtown Centre</span></a></div><div class="bottom_margin_10" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">&nbsp;</span></div><div class="bottom_margin_10" data-dcnode-id="902"><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.metropolitan.com/toronto/" target="_blank"><img align="absmiddle" data-dcnode-id="904" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vasectomyreversal.ca/images/construct/metropolitanhotels.gif&amp;raw"></a></div><div class="bottom_margin_10" data-dcnode-id="899"><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.metropolitan.com/toronto/" target="_blank"><span data-dcnode-id="901" instrument_node="">Metropolitan Hotel Toronto</span></a></div><span data-dcnode-id="898" instrument_node=""> </span></div><span data-dcnode-id="896" instrument_node="">
</span></div><span data-dcnode-id="893" instrument_node="">
</span></div><span data-dcnode-id="890" instrument_node="">
</span><div class="dslc-accordion-item dslc-inactive" data-dcnode-id="872"><span data-dcnode-id="889" instrument_node="">
</span><div class="dslc-accordion-header dslc-accordion-hook" data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">
</span><span class="dslc-accordion-title" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">          Do I need a referral from my family doctor?                      </span></span><span data-dcnode-id="885" instrument_node="">
</span></div><span data-dcnode-id="883" instrument_node="">
</span><div class="dslc-accordion-content" data-dcnode-id="875" style="display: none;"><span data-dcnode-id="882" instrument_node="">
</span><div class="dslca-editable-content" data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">A referral from your general practitioner is not necessary.</span></p><span data-dcnode-id="878" instrument_node=""> </span></div><span data-dcnode-id="876" instrument_node="">
</span></div><span data-dcnode-id="873" instrument_node="">
</span></div><span data-dcnode-id="870" instrument_node="">
</span><div class="dslc-accordion-item dslc-inactive" data-dcnode-id="852"><span data-dcnode-id="869" instrument_node="">
</span><div class="dslc-accordion-header dslc-accordion-hook" data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">
</span><span class="dslc-accordion-title" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">         If a vasectomy reversal fails, should I consider a repeat reversal?                 </span></span><span data-dcnode-id="865" instrument_node="">
</span></div><span data-dcnode-id="863" instrument_node="">
</span><div class="dslc-accordion-content" data-dcnode-id="855" style="display: none;"><span data-dcnode-id="862" instrument_node="">
</span><div class="dslca-editable-content" data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">When a vasectomy reversal fails, often times it can be successfully “redone” or other alternatives can be considered. The chances for success depend on the reason for failure of the original surgery, and the type of reversal surgery originally performed. Since each case is different, specialists like Dr. Lo can evaluate your situation and offer you a solution.</span></p><span data-dcnode-id="858" instrument_node=""> </span></div><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="853" instrument_node="">
</span></div><span data-dcnode-id="850" instrument_node="">
</span><div class="dslc-accordion-item dslc-inactive" data-dcnode-id="776"><span data-dcnode-id="849" instrument_node="">
</span><div class="dslc-accordion-header dslc-accordion-hook" data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">
</span><span class="dslc-accordion-title" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">                                                   







Patients Instructions                </span></span><span data-dcnode-id="845" instrument_node="">
</span></div><span data-dcnode-id="843" instrument_node="">
</span><div class="dslc-accordion-content" data-dcnode-id="779" style="display: none;"><span data-dcnode-id="842" instrument_node="">
</span><div class="dslca-editable-content" data-dcnode-id="781"><span data-dcnode-id="841" instrument_node="">
</span><h3 class="blueheading" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Before Surgery</span></h3><ul data-dcnode-id="826"><ul data-dcnode-id="827"><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">NSAIDs such as Aspirin, ibuprofen, naproxen and other pain killers should be discontinued for 10 days prior to any procedure as these medicines can thin the blood and lead to an increase in bleeding during or after surgery</span></li><li data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">If you are not certain if you are currently taking any NSAID’s occasionally or on a regular basis, please check with our office.</span></li><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Nothing to eat or drink after midnight the evening prior to your surgery date</span></li><li data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">Arrange for someone to drive you home after your </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vasectomyreversal.ca/vasectomy_reversal.asp"><span data-dcnode-id="831" instrument_node="">vasectomy reversal</span></a><span data-dcnode-id="829" instrument_node=""> surgery.</span></li></ul></ul><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">&nbsp;</span></p><h3 class="blueheading" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">After Surgery</span></h3><p data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">Apply ice bag to scrotum for 10 minutes on, then 10 minutes off, for the first two hours after the </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vasectomyreversal.ca/vasectomy_reversal.asp"><span data-dcnode-id="820" instrument_node="">vasectomy reversal</span></a><span data-dcnode-id="818" instrument_node="">. Repeat in the next 3-4 days in the evenings</span></p><ul data-dcnode-id="788"><li data-dcnode-id="813"><span data-dcnode-id="816" instrument_node="">Prescription pain medicine can be taken as necessary</span><br data-dcnode-id="815"><br data-dcnode-id="814"></li><li data-dcnode-id="809"><span data-dcnode-id="812" instrument_node="">An athletic supporter (jockstraps) or tight supportive underwear is recommended for 7-10 days</span><br data-dcnode-id="811"><br data-dcnode-id="810"></li><li data-dcnode-id="805"><span data-dcnode-id="808" instrument_node="">Patients can shower after 48 hours. Baths should be avoided for 2 weeks</span><br data-dcnode-id="807"><br data-dcnode-id="806"></li><li data-dcnode-id="801"><span data-dcnode-id="804" instrument_node="">Sexual activity can resume 2-3 weeks after the reversal</span><br data-dcnode-id="803"><br data-dcnode-id="802"></li><li data-dcnode-id="797"><span data-dcnode-id="800" instrument_node="">No strenuous work for 4-6 weeks</span><br data-dcnode-id="799"><br data-dcnode-id="798"></li><li data-dcnode-id="793"><span data-dcnode-id="796" instrument_node="">Return to the office in 2-4 weeks for a follow up visit</span><br data-dcnode-id="795"><br data-dcnode-id="794"></li><li data-dcnode-id="789"><span data-dcnode-id="792" instrument_node="">A sperm count will be ordered 8 weeks following surgery</span><br data-dcnode-id="791"><br data-dcnode-id="790"></li></ul><p data-dcnode-id="785"><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vasectomyreversal.ca/vasectomy-reversal/_wp_link_placeholder"><span data-dcnode-id="787" instrument_node="">If you have any questions Contact Us</span></a></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">&nbsp;</span></p><span data-dcnode-id="782" instrument_node=""> </span></div><span data-dcnode-id="780" instrument_node="">

</span><div class="dslc-text-module-content" data-dcnode-id="611"><p data-dcnode-id="619" style="text-align: center;"><span data-dcnode-id="620" instrument_node="">&nbsp;</span></p><p data-dcnode-id="616" style="text-align: center;"><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/18585765"><span data-dcnode-id="618" instrument_node="">http://www.ncbi.nlm.nih.gov/pubmed/18585765</span></a></p><p data-dcnode-id="614" style="text-align: center;"><span data-dcnode-id="615" instrument_node="">A wide variety of techniques have been described in the literature for Vasectomy Reversal, and as with most techniques, they continue to evolve in current surgical practice. Traditionally, incisions for vasectomy reversal (vasovasostomy) have been up to 3cm or larger. We have developed a mini-incision non-scalpel technique at the University of Toronto for Vasectomy Reversal where the incision is less than 1 centimeter. The Mini-Incision technique for the vasectomy reversal reduces pain, heals quicker and helps men get back to normal activities or work sooner.&nbsp;</span></p><p data-dcnode-id="612" style="text-align: center;"><span data-dcnode-id="613" instrument_node="">Read More about&nbsp;Mini-incision vasectomy reversal using no-scalpel vasectomy instruments and principles</span></p></div><span data-dcnode-id="610" instrument_node="">
