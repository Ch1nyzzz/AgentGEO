="445" itemprop="name"><span data-dcnode-id="446" instrument_node="">Home</span></span><meta content="1" data-dcnode-id="444" itemprop="position"></a></li><span data-dcnode-id="441" instrument_node=""> </span><i class="fa fa-angle-right" data-dcnode-id="440"></i><li data-dcnode-id="434" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/vasectomy-reversal" itemprop="item"><span data-dcnode-id="439" instrument_node=""> </span><span data-dcnode-id="437" itemprop="name"><span data-dcnode-id="438" instrument_node="">Vasectomy Reversal</span></span><meta content="2" data-dcnode-id="436" itemprop="position"></a></li><span data-dcnode-id="433" instrument_node=""> </span><i class="fa fa-angle-right" data-dcnode-id="432"></i><li data-dcnode-id="428" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><span data-dcnode-id="430" itemprop="name"><span data-dcnode-id="431" instrument_node="">Vasectomy Reversal Fees &amp; Costs</span></span><meta content="3" data-dcnode-id="429" itemprop="position"></li></ul><div data-dcnode-id="353" id="content"><h1 data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Vasectomy Reversal Fees &amp; Costs</span></h1><h2 data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Affordable, World-Class Vasectomy Reversal Surgery</span></h2><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">MFS keeps vasectomy reversal costs as low as possible for patients while maintaining the highest level of patient care. By offering a fixed, all-inclusive price for the </span><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/vasectomy-reversal"><span data-dcnode-id="421" instrument_node="">vasectomy reversal</span></a><span data-dcnode-id="419" instrument_node=""> and the more complicated vasoepididymostomy, patients can rely on clear, up-front pricing, without any hidden fees and costs.</span></p><span data-dcnode-id="417" instrument_node=""> </span><aside class="orange" data-dcnode-id="409"><h3 data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Spring Special! Free Vasectomy Reversal Consultation</span></h3><p data-dcnode-id="410"><span data-dcnode-id="414" instrument_node="">For a limited time, MFS will waive the consultation fee for vasectomy reversal surgery. </span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/contact%3Fsubject%3DFREE%2520Vasectomy%2520Reversal%2520Consultation"><span data-dcnode-id="413" instrument_node="">Contact us before June 30th</span></a><span data-dcnode-id="411" instrument_node=""> to schedule a complimentary consultation at our office in San Diego or on the phone (for patients outside the San Diego area). Please note that consultations must be scheduled on or before June 30th, but the actual consultation can take place later. This offer is only valid for vasectomy reversals.</span></p></aside><h3 data-dcnode-id="405"><span data-dcnode-id="408" instrument_node="">Vasectomy Reversal Procedure Fees – </span><em data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Reduced</span></em></h3><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">In these challenging times, we have managed to lower the overall cost of a vasectomy reversal surgery to help restore your dreams of having a child. There are three components of the vasectomy reversal procedure. These include the fees for the surgeon, the anesthesia and the facility where the surgery is performed. After performing thousands of microsurgical procedures over the years, MFS is able to offer vasectomy reversals at a lower cost than many other physicians. Our staff has negotiated reduced fees in a highly accredited surgical facility, and we are pleased to pass the savings on to our patients.</span></p><h4 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Our fee schedule is easy to understand, without surprises or hidden costs. If there are additional procedures or tests necessary, the MFS staff gives a written estimate before the procedure to make sure that you have a full understanding of all fees and costs involved.</span></h4><h4 data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">All vasectomy reversal procedures at MFS are performed personally by Dr. Martin Bastuba, M.D., F.A.C.S.</span></h4><span data-dcnode-id="398" instrument_node=""> </span><aside data-dcnode-id="375"><h3 data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Vasectomy Reversal Procedure Total Fee: $8,100* (Reduced from $8,650)</span></h3><ol data-dcnode-id="380"><li data-dcnode-id="385"><span data-dcnode-id="395" instrument_node="">Surgeon’s Fee: $5,000 </span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node=""> </span><em data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Paid in full prior to procedure. See our </span></em><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/male-infertility-resources/fertility-financing"><em data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">payment options</span></em></a><em data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">.</span></em></li><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Anesthesia Professional Fee: $900</span></li><li data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Surgery Center Facility Fee: $2,200</span></li></ol><p data-dcnode-id="376"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">A $1,200 non-refundable deposit will be due at the time of scheduling the procedure</span></strong><span data-dcnode-id="377" instrument_node="">.</span></p></aside><h4 data-dcnode-id="370"><span data-dcnode-id="374" instrument_node="">Please note that a $1,200 non-refundable deposit will be due at the time when you are scheduling the procedure, with the full payment due two weeks prior to the procedure. See our </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/male-infertility-resources/fertility-financing"><span data-dcnode-id="373" instrument_node="">financing options for vasectomy reversal surgery</span></a><span data-dcnode-id="371" instrument_node="">.</span></h4><p data-dcnode-id="366"><small data-dcnode-id="367"><em data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">* Price is based on surgery at Grossmont Plaza Surgery Center and Physicians Surgery Center. Exact fees depend on outpatient surgery center location where the procedure is scheduled.</span></em></small></p><span data-dcnode-id="365" instrument_node=""> </span><aside data-dcnode-id="354"><h3 data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Nitrous Oxide and the Pro-Nox System</span></h3><p data-dcnode-id="355"><span data-dcnode-id="362" instrument_node="">MFS and </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spermbankcalifornia.com/" target="_blank"><span data-dcnode-id="361" instrument_node="">FCC</span></a><span data-dcnode-id="359" instrument_node=""> are introducing the use of nitrous oxide with the Pro-Nox System, a safe and effective analgesic method that has been used in hospitals and medical practices for decades. The system rapidly deploys a 50/50 mix of Oxygen and Nitrous Oxide to help ease a patient's pain and anxiety. This option will now be available for patients undergoing in-office procedural care at MFS and FCC. </span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/blog/nitrous-oxide-now-available-at-mfs-and-fcc"><span data-dcnode-id="358" instrument_node="">Learn more</span></a><span data-dcnode-id="356" instrument_node=""> about nitrous oxide and the Pro-Nox system today.</span></p></aside></div><div class="fixed hidden" data-dcnode-id="346" id="inner-social"><span data-dcnode-id="352" instrument_node=""> </span><figure data-dcnode-id="350"><img alt="" data-dcnode-id="351" height="24" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/content/share.svg&amp;raw" width="24"></figure><div class="share-text" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Share</span></div><div class="addthis_sharing_toolbox" data-dcnode-id="347"></div></div><div data-dcnode-id="293" id="sidebar"><div class="lazy cta-box" data-dcnode-id="334" style="display: inline-block; background-image: url(&quot;https://www.malefertility.com/content/image7.jpg&quot;);"><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/male-fertility-clinic/martin-bastuba-male-fertility-doctor"><figure data-dcnode-id="344"><img alt="image7" data-dcnode-id="345" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/thumbs/cta-logo-410x330.png&amp;raw" srcset="https://www.malefertility.com/thumbs/cta-logo-410x330.png 1x, https://www.malefertility.com/thumbs/cta-logo-730x588.png 2x" width="410"></figure><div class="text" data-dcnode-id="339"><div class="title" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Dr. Bastuba: An International Leader</span></div><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Patients have visited Dr. Bastuba from 30+ countries, including China, Spain, Russia, Australia and many more.</span></p></div><div class="overlay" data-dcnode-id="336"><button data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Meet Dr. Bastuba</span></button></div></a></div><div class="lazy cta-box" data-dcnode-id="322" style="display: inline-block; background-image: url(&quot;https://www.malefertility.com/content/image9.jpg&quot;);"><a data-dcnode-id="323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/contact%3Fsubject%3DFREE%2520Vasectomy%2520Reversal%2520Consultation"><figure data-dcnode-id="332"><img alt="image9" data-dcnode-id="333" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/thumbs/cta-logo-410x330.png&amp;raw" srcset="https://www.malefertility.com/thumbs/cta-logo-410x330.png 1x, https://www.malefertility.com/thumbs/cta-logo-730x588.png 2x" width="410"></figure><div class="text" data-dcnode-id="327"><div class="title" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Free Consultations Through 6/30</span></div><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">If you are considering a vasectomy reversal, don't wait! Take advantage of this offer today with Dr. Bastuba.</span></p></div><div class="overlay" data-dcnode-id="324"><button data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Schedule Today</span></button></div></a></div><div class="lazy cta-box" data-dcnode-id="308" style="display: inline-block; background-image: url(&quot;https://www.malefertility.com/content/image2.jpg&quot;);"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/blog/the-beauty-of-a-differential-diagnosis-in-male-fertility"><figure data-dcnode-id="320"><img alt="image2" data-dcnode-id="321" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.malefertility.com/thumbs/cta-logo-410x330.png&amp;raw" srcset="https://www.malefertility.com/thumbs/cta-logo-410x330.png 1x, https://www.malefertility.com/thumbs/cta-logo-730x588.png 2x" width="410"></figur
