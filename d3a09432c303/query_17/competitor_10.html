</span><h2 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">NO-NEEDLE NO-SCALPEL VASECTOMY</span></h2><span data-dcnode-id="883" instrument_node="">

</span><h3 class="blue_color" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">WHAT IS A VASECTOMY ?</span></h3><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">A vasectomy is a simple, safe and effective form of permanent contraception. It is a quick and popular procedure (20,000 per year in Ontario) that is performed in a doctor’s clinic with local anaesthesia in less than 15 minutes. A </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ovic.clinic/"><span data-dcnode-id="863" instrument_node="">vasectomy</span></a><span data-dcnode-id="861" instrument_node=""> prevents the sperm from entering the semen by blocking the tubes (vas deferens) that carry sperm from the testicles.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="858"></p></div><span data-dcnode-id="856" instrument_node="">
</span><div class="col-lg-6" data-dcnode-id="831"><span data-dcnode-id="855" instrument_node="">
</span><h3 class="blue_color" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">WHY OVIC?</span></h3><span data-dcnode-id="852" instrument_node="">
</span><ul class="list_dot2" data-dcnode-id="832"><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">No-Needle No-Scalpel Vasectomy</span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Open-Ended Vasectomy</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Short wait times</span></li><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Fully covered (OHIP only)</span></li><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Accepting Quebec patients</span></li><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">No follow-up visit required</span></li><span data-dcnode-id="833" instrument_node="">
</span></ul></div><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="829"></p></div><span data-dcnode-id="827" instrument_node="">
</span></div><span data-dcnode-id="825" instrument_node="">
</span><div class="what_benefits" data-dcnode-id="757"><span data-dcnode-id="824" instrument_node="">

</span><div class="row" data-dcnode-id="762"><span data-dcnode-id="822" instrument_node="">
</span><div class="col-lg-12" data-dcnode-id="816"><span data-dcnode-id="821" instrument_node="">
</span><h3 data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">WHAT ARE THE BENEFITS?</span></h3><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="817"></p></div><span data-dcnode-id="815" instrument_node="">
</span><div class="col-lg-6" data-dcnode-id="799"><span data-dcnode-id="814" instrument_node="">
</span><h4 data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">FOR MEN</span></h4><span data-dcnode-id="811" instrument_node="">
</span><ul class="list_dot" data-dcnode-id="800"><span data-dcnode-id="810" instrument_node="">
</span><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Highly reliable permanent birth control</span></li><span data-dcnode-id="807" instrument_node="">
</span><li data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Peace of mind by eliminating the fear of unintended pregnancy</span></li><span data-dcnode-id="804" instrument_node="">
</span><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Alleviates the dependence on their partner’s compliance to their own birth control methods</span></li><span data-dcnode-id="801" instrument_node="">
</span></ul></div><span data-dcnode-id="798" instrument_node="">
</span><div class="col-lg-6" data-dcnode-id="782"><span data-dcnode-id="797" instrument_node="">
</span><h4 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">FOR WOMEN</span></h4><span data-dcnode-id="794" instrument_node="">
</span><ul class="list_dot" data-dcnode-id="783"><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Minimizes the risk of pregnancy and childbirth</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Eliminates the need to use hormonal birth control</span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Avoid risks of female sterilization (tubal ligation)</span></li><span data-dcnode-id="784" instrument_node="">
</span></ul></div><span data-dcnode-id="781" instrument_node="">
</span><div class="col-lg-12" data-dcnode-id="765"><span data-dcnode-id="780" instrument_node="">
</span><h4 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">FOR MEN AND FOR WOMEN</span></h4><span data-dcnode-id="777" instrument_node="">
</span><ul class="list_dot" data-dcnode-id="766"><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Easily achievable benefits in a simple and safe 15 minute procedure under local anaesthesia</span></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Peace of mind and increased sexual satisfaction as a result of decreased fears of unintentional pregnancy</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Extremely low failure rate of 1/4000 (0.025%)</span></li><span data-dcnode-id="767" instrument_node="">
</span></ul></div><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="763"></p></div><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="760"></p></div><span data-dcnode-id="758" instrument_node="">
</span></div><span data-dcnode-id="756" instrument_node="">
</span><div class="container" data-dcnode-id="704"><span data-dcnode-id="755" instrument_node="">
</span><div class="row" data-dcnode-id="706"><span data-dcnode-id="754" instrument_node="">
</span><div class="col-lg-12" data-dcnode-id="709"><span data-dcnode-id="753" instrument_node="">
</span><h3 class="blue_color" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">WHAT SHOULD YOU CONSIDER?</span></h3><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="746"><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">PERMANENCE –</span></b><span data-dcnode-id="747" instrument_node=""> A vasectomy is a form of permanent contraception and, although reversible in theory, it should be considered non-reversible. A vasectomy reversal is a much longer, more complicated and more expensive procedure (not OHIP covered). With variable success rates, reversibility cannot be guaranteed.</span></p><span data-dcnode-id="745" instrument_node="">
</span><h3 class="blue_color" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">IF YOU ARE UNDER 30 AND HAVE LESS THAN 2 CHILDREN</span></h3><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="735"><b data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">REGRET –</span></b><span data-dcnode-id="739" instrument_node=""> Men who have a </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ovic.clinic/"><span data-dcnode-id="738" instrument_node="">vasectomy</span></a><span data-dcnode-id="736" instrument_node=""> in their 20s and/or have fewer than 2 children are the most likely to seek a vasectomy reversal. The longer it has been since your vasectomy, the less likely you are of having a successful reversal. This may lead to regret and tension in ongoing or new relationships.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="730"><b data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">YOU MAY CHANGE –</span></b><span data-dcnode-id="731" instrument_node=""> Just like your favourite hockey team or favourite car model, your opinion may change with time. You are not the same person in your mid 20s as you may become in your mid 30s. Your outlook on children may change.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="725"><b data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">WOMEN CHANGE –</span></b><span data-dcnode-id="726" instrument_node=""> Similarly, your partner’s views and desire to have children may change over time, especially if she has less than 2 children of her own and if her friends are having children as well.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="720"><b data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">RELATIONSHIPS END –</span></b><span data-dcnode-id="721" instrument_node=""> Since more than 50% of marriages end in divorce, you may not be with the same partner ten years from now, and a new partner may have a much stronger desire for children.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="712"><b data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">BACK-UP PLAN –</span></b><span data-dcnode-id="716" instrument_node=""> Young men may want to consider sperm storage. The </span><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.conceive.ca/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="715" instrument_node="">Ottawa Fertility Centre</span></a><span data-dcnode-id="713" instrument_node=""> offers this service.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="710"></p></div><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="707"></p></div><span data-dcnode-id="705" instrument_node="">
</span></div><span data-dcnode-id="703" instrument_node="">
