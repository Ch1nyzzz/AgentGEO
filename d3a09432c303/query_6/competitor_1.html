</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">A vasectomy with Marie Stopes is a procedure with the leading name in reproductive healthcare. Our vasectomy doctors perform only the most modern, effective and safe vasectomy procedure method (no scalpel, open ended vasectomy), and only use technologies that have been approved for use in Australia.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="694" instrument_node="">Our painless anaesthetic delivery technique is the benchmark in vasectomy procedures. Pioneered by our lead vasectomist Dr Justin Low, the painless needle technique has been found to reduce sensations of pain caused by the local anaesthetic needle for most patients – with </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/faqs/vasectomy-pain/"><span data-dcnode-id="693" instrument_node="">79% reporting experiencing less pain than expected or no pain at all</span></a><span data-dcnode-id="691" instrument_node="">.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="688"></p></div><div class="x-text x-text-headline e25-28 mp-14 mp-17 mp-1a mp-1b mp-1c mp-1d" data-dcnode-id="681"><div class="x-text-content" data-dcnode-id="682"><div class="x-text-content-text" data-dcnode-id="683"><h2 class="x-text-content-text-primary" data-dcnode-id="684"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/procedure/"><span data-dcnode-id="686" instrument_node="">Vasectomy procedure information</span></a></h2></div></div></div><div class="x-text e25-29 mp-1z mp-20 mp-21 mp-22" data-dcnode-id="660"><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">As the largest vasectomy provider in Australia, we offer our patients the gold standard vasectomy procedure known as ‘no scalpel, open ended vasectomy.’</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">Our doctors are also trained in the</span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/faqs/vasectomy-pain/"><span data-dcnode-id="676" instrument_node=""> ‘painless needle’ technique</span></a><span data-dcnode-id="674" instrument_node="">, which is a method pioneered in Australia by our lead surgeon Dr Justin Low, as a way to reduce discomfort involved in delivering local anaesthetic.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="671" instrument_node="">You don’t need a referral from your doctor to have a vasectomy procedure at Marie Stopes. Simply </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/contact/"><span data-dcnode-id="670" instrument_node="">contact us</span></a><span data-dcnode-id="668" instrument_node=""> and we can organise a pre-care consultation with a nurse and book you straight in for a vasectomy appointment.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">While a vasectomy procedure only takes up to 15 minutes, it requires specialist skill and training to minimise the risk of pain from the procedure itself and during recovery.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Your consultation and vasectomy procedure will take place on the same day with a specialist vasectomy doctor.</span></p></div></div></div></div><div class="x-section e25-30 mp-2 mp-7 mp-8 mp-b mp-c mp-d" data-dcnode-id="639"><div class="x-container max width e25-31 mp-q mp-r" data-dcnode-id="640"><div class="x-column x-sm x-1-1 e25-32 mp-v mp-w mp-x" data-dcnode-id="641"><a class="x-anchor x-anchor-button e25-33 mp-1e mp-1f mp-1g mp-1h mp-1j mp-1k mp-1l mp-1p" data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/procedure/" tabindex="0"><div class="x-anchor-content" data-dcnode-id="653"><div class="x-anchor-text" data-dcnode-id="654"><span class="x-anchor-text-primary" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Procedure</span></span></div></div></a><a class="x-anchor x-anchor-button e25-34 mp-1e mp-1j mp-1k mp-1l mp-1m" data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/recovery/" rel="nofollow" tabindex="0"><div class="x-anchor-content" data-dcnode-id="648"><div class="x-anchor-text" data-dcnode-id="649"><span class="x-anchor-text-primary" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Recovery</span></span></div></div></a><a class="x-anchor x-anchor-button e25-35 mp-1e mp-1f mp-1h mp-1j mp-1k mp-1l mp-1n mp-1o" data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/faqs/" tabindex="0"><div class="x-anchor-content" data-dcnode-id="643"><div class="x-anchor-text" data-dcnode-id="644"><span class="x-anchor-text-primary" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">FAQs</span></span></div></div></a></div></div></div><div class="x-section e25-36 mp-0 mp-1 mp-2 mp-8 mp-a mp-e x-hide-lg x-hide-md x-hide-sm x-hide-xl x-hide-xs" data-dcnode
