ts/"><span data-dcnode-id="370" instrument_node="">Remote Appointments</span></a></li></ul></li><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-728" data-dcnode-id="363"><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//payment.patient.athenahealth.com/statement/"><span data-dcnode-id="365" instrument_node="">Bill Pay</span></a></li></ul></div></nav></div></div></div></div></header><section class="cct-inner-banner-wrap" data-dcnode-id="351" data-live-edit-fields="services_banner_image,services_banner_content" data-live-edit-id="393-services_banner_image-services_banner_content" data-live-edit-post_id="393" style="background-image: url(https://www.tvfammed.com/wp-content/uploads/2020/03/Patient-Header.jpg)"><div class="container" data-dcnode-id="352"><h1 data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Vasectomy</span></h1></div></section><section class="cct-services-top-wrap" data-dcnode-id="340" data-live-edit-fields="services_top_content" data-live-edit-id="393-services_top_content" data-live-edit-post_id="393"><div class="container" data-dcnode-id="341"><h3 data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">MERIDIAN, BOISE &amp; NAMPA VASECTOMY DOCTORS</span></h3><h6 data-dcnode-id="346"><strong data-dcnode-id="347" style="color: #000000;"><span data-dcnode-id="348" instrument_node="">Vasectomy Male Permanent Easy Birth Control</span></strong></h6><p data-dcnode-id="344"><img alt="img" class="aligncenter" data-dcnode-id="345" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tvfammed.com/wp-content/uploads/2020/02/Out-Patent-Vasectomy-Procedure.jpg&amp;raw"></p><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Vasectomy is an outpatient clinic procedure that makes a man sterile (permanently unable to get a woman pregnant). It involves blocking the sperm transport tubes (vas deferens), so that sperm cannot be released during orgasm. It is more effective than tubal ligation for women, and MUCH less invasive than internal pelvic surgery in the hospital.</span></p></div></section><section class="cct-services-middle-wrap" data-dcnode-id="320" data-live-edit-fields="services_mid_bg,services_middle_content" data-live-edit-id="393-services_mid_bg-services_middle_content" data-live-edit-post_id="393" style="background-image: url(https://www.tvfammed.com/wp-content/themes/tvfm/images/price-above-bg.jpg)"><div class="container" data-dcnode-id="321"><h3 data-dcnode-id="337"><small data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Vasectomy does NOT:</span></small></h3><ul data-dcnode-id="322"><li data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Affect erections (sex performance)</span></li><li data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Affect testosterone production (sex drive)</span></li><li data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Affect urination</span></li><li data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Involve the testicles</span></li><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Change orgasm fluid (cum)</span></li><li data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Appearance or volume</span></li><li data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Change intensity of orgasm sensations</span></li></ul></div></section><section class="cct-services-bottom-wrap" data-dcnode-id="297" data-live-edit-fields="services_bottom_hide,services_bottom_content" data-live-edit-id="393-services_bottom_hide-services_bottom_content" data-live-edit-post_id="393"><div class="container" data-dcnode-id="298"><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Vasectomy is meant to be IRREVERSIBLE. It is only for men who clearly are done fathering children. Men should NOT plan on sperm banking or a reversal procedure, if they are truly ready for a vasectomy. While reversal is a possibility, it is expensive, difficult microsurgery that typically is not covered by insurance.</span></p><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Why receive your vasectomy at TVFM? Dr. Crownover has performed hundreds of no-scalpel vasectomies for over 20 years. He has taught dozens of resident physicians how to perform the 30-minute outpatient procedure. Many patients have said afterwards, “my dentist was more uncomfortable”, and “that was much easier than my buddies promised”.</span></p><p data-dcnode-id="311"><span data-dcnode-id="315" instrument_node="">Cost will surprise you. Many insurance plans will cover most or all the amount. For those without insurance or who have high deductibles, we challenge you to call around town; our direct </span><strong data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">CASH discount price </span></strong><span data-dcnode-id="312" instrument_node=""> will beat any Urologist in the Treasure Valley.</span></p><p data-dcnode-id="304"><span data-dcnode-id="310" instrument_node="">We encourage you to visit us to learn more in person. You can read more at: </span><a data-dcnode-id="308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//familydoctor.org/vasectomy-what-to-expect/" rel="noopener" target="_blank"><span data-dcnode-id="309" instrument_node=""> https://goo.gl/9bQBHl </span></a><span data-dcnode-id="307" instrument_node="">or </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uptodate.com/contents/vasectomy-beyond-the-basics" rel="noopener" target="_blank"><span data-dcnode-id="306" instrument_node=""> http://www.uptodate.com/contents/vasectomy-beyond-the-basics. </span></a></p><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Still have unanswered questions about vasectomy procedures, recovery time, or w
