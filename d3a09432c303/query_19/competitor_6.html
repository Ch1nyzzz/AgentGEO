</span><figure aria-describedby="caption-attachment-39251" class="wp-caption aligncenter" data-dcnode-id="2348" id="attachment_39251" style="width: 215px"><img alt="Dr Frank Redwig - Hobart Private Hospital" class="size-medium wp-image-39251 td-animation-stack-type0-2" data-dcnode-id="2351" height="300" loading="lazy" sizes="(max-width: 215px) 100vw, 215px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestinau.com.au/wp-content/uploads/2019/05/Dr-Frank-Redwig-Hobart-Private-Hospital-215x300.jpg&amp;raw" srcset="https://bestinau.com.au/wp-content/uploads/2019/05/Dr-Frank-Redwig-Hobart-Private-Hospital-215x300.jpg 215w, https://bestinau.com.au/wp-content/uploads/2019/05/Dr-Frank-Redwig-Hobart-Private-Hospital-300x420.jpg 300w, https://bestinau.com.au/wp-content/uploads/2019/05/Dr-Frank-Redwig-Hobart-Private-Hospital.jpg 613w" width="215"><figcaption class="wp-caption-text" data-dcnode-id="2349" id="caption-attachment-39251"><span data-dcnode-id="2350" instrument_node="">Dr Frank Redwig – Hobart Private Hospital</span></figcaption></figure><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2343"><strong data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Dr Frank Redwig</span></strong><span data-dcnode-id="2344" instrument_node=""> is a urological surgeon graduated from the University of Muenster in Germany in 1999 and was then awarded Doctor of Medicine in 2002. In 2004 he finished his postgraduate specialist training in urology at the Klinikum Dortmund, Germany.</span></p><span data-dcnode-id="2342" instrument_node="">
</span><p class="font_7" data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Dr Redwig and his wife moved to Tasmania in February 2005 and they now have 4 lovely boys who call Hobart home. Since moving he has been working as a consultant in the Department of Urology at the Royal Hobart Hospital.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p class="font_7" data-dcnode-id="2335"><span class="wixGuard" data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">​</span></span><span data-dcnode-id="2336" instrument_node="">In 2007 he obtained the Fellowship of the Royal Australasian College of Surgeons (FRACS) and started a private practice.</span></p><span data-dcnode-id="2334" instrument_node="">
</span><p class="font_7" data-dcnode-id="2330"><span class="wixGuard" data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">​Dr Redwig</span></span><span data-dcnode-id="2331" instrument_node=""> is a member of the Urological Society of Australia and New Zealand (USANZ), German Urological Society (DGU), and European Association of Urology (EAU) and served as the elected Tasmanian Representative Director on the Board of Directors of USANZ from 2015-2018.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2326"><strong data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Products/Services:</span></strong></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">General Urology, Voiding Dysfunction, Urinary Tract Stone Management, Urological Oncology</span></p><span data-dcnode-id="2322" instrument_node="">
