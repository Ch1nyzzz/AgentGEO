</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="1457"><div class="field-items" data-dcnode-id="1458"><div class="field-item even" data-dcnode-id="1459" property="content:encoded"><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Our pet health services include a full range of medical services for canine and feline health. With seven veterinarians, and our dedicated staff members, your pets are as important to us as they are to you! Our high tech facilities offer the latest array of equipment to serve your pet's medical needs for effective and efficient treatment.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p class="toggler" data-dcnode-id="1475"><span data-dcnode-id="1477" instrument_node="">Learn More </span><i class="icon-arrow-down" data-dcnode-id="1476"></i></p><span data-dcnode-id="1474" instrument_node="">
</span><div data-dcnode-id="1461" style="display: none;"><span data-dcnode-id="1473" instrument_node="">
</span><h2 data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Get to know your veterinarian</span></h2><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">We are a fully accredited member of the prestigious American Animal Hospital Association. Our commitment and dedication to upholding the high standards of AAHA is unwavering. Our facilities undergo voluntary evaluations every three years in order to maintain our accreditation. Our Veterinary staff is highly experienced and completely enthusiastic about practicing veterinary medicine. They constantly educate themselves to keep abreast of the most current and effective diagnostics and treatments available in veterinary medicine. Our doctors work together as a team and eagerly share their knowledge and expertise of their craft in order to ensure every patient receives the benefit of multiple opinions. We at Newport Harbor Animal Hospital understand the value of peace of mind and are eager to play an integral role in the health, well-being and development of your family's pets. Rest assured, from the moment you walk into our facility, our highly trained staff and accomplished group of veterinarians will treat you and your pet like their own.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><h2 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Our Animal Hospital Offers Cutting Edge, Affordable Care</span></h2><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Newport Harbor Animal Hospital is an animal care facility equipped to handle all medical and surgical needs. From preventive health care services to advanced diagnostic and surgical services, our doctors and staff are trained to manage all of your pet's needs. We are continually updating our equipment and educating our team to the latest medical information. We know that everyone has a budget and we will work within the confines of your budget to get the best outcome for your pet.
</span></p></div><span data-dcnode-id="1460" instrument_node="">
