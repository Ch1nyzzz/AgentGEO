</span><figure class="wp-caption aligncenter" data-dcnode-id="2437" style="width: 206px"><img alt="Dr John Kourambas - Southern Urology" class="td-animation-stack-type0-2" data-dcnode-id="2440" height="247" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surol.com.au/images/John-Kourambas2.jpg&amp;raw" width="206"><figcaption class="wp-caption-text" data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Dr John Kourambas – Southern Urology</span></figcaption></figure><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2432"><strong data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Dr John Kourambas</span></strong><span data-dcnode-id="2433" instrument_node=""> has been a Consultant Urologist in Melbourne since 2000. He was admitted as a Fellow of the Australian and New Zealand College of Surgeons in 1998 and has completed two Fellowships overseas.</span></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">The first was at the esteemed John Radcliffe Hospital in Oxford in the United Kingdom and the second was as Endo Urology Fellow at Duke University Medical Centre in the USA.</span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">He is currently the Urological Society of Australia and New Zealand’s Endourology Special Advisory Group Leader .</span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">He currently consults at his rooms at 7 Chester Street , Bentleigh East, 198 Wattletree Road , Malvern [ Opposite Cabrini Hospital ] and at South Eastern Private Hospital Consulting Rooms in Noble Park.</span></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">He operates several times per week at Cabrini Hospital (Malvern and Brighton), Monash Medical Centre, The Valley Private Hospital, Masada Private, and from 2017 at the new Holmesglen Private Hospital in Moorabbin</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">He and his partners at Southern Urology provide 24 hour, seven day per week comprehensive on-call for their patients and referring practitioners.</span></p><div class="code-block code-block-4" data-dcnode-id="2409" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2416" instrument_node="">
</span><span data-dcnode-id="2414" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4999738705137353" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="9307688818" data-dcnode-id="2413" style="display:block; text-align:center;"></ins><span data-dcnode-id="2412" instrument_node="">
</span></div><p data-dcnode-id="2406"><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Products/Services:</span></strong></p><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">General Urology – male and female, Endourology, Laparoscopic (Keyhole) surgery, Robotic Prostate Surgery, Stone Disease and Uro-Oncology</span></p><span data-dcnode-id="2402" instrument_node="">
