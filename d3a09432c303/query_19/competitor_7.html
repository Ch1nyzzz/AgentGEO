</span><figure aria-describedby="caption-attachment-41330" class="wp-caption aligncenter" data-dcnode-id="2482" id="attachment_41330" style="width: 300px"><img alt="Dr. Glen Wood - Brisbane Urology Clinic" class="size-medium wp-image-41330 td-animation-stack-type0-2" data-dcnode-id="2485" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestinau.com.au/wp-content/uploads/2019/06/Dr.-Glen-Wood-300x300.png&amp;raw" srcset="https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-Glen-Wood-300x300.png 300w, https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-Glen-Wood-150x150.png 150w, https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-Glen-Wood.png 360w" width="300"><figcaption class="wp-caption-text" data-dcnode-id="2483" id="caption-attachment-41330"><span data-dcnode-id="2484" instrument_node="">Dr. Glen Wood – Brisbane Urology Clinic</span></figcaption></figure><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2477"><strong data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Dr. Glen Wood</span></strong><span data-dcnode-id="2478" instrument_node=""> completed a Science degree and two years of full time research at Monash University, Victoria, prior to completing his medical degree at the University of Queensland. He completed his advanced surgical training in Urology in Queensland and was the urology registrar at Greenslopes Private Hospital in 1997. Following further training in Christchurch, New Zealand, to obtain further experience in laser stone surgery and the diagnosis and treatment of prostate cancer, Dr. Glen Wood returned to Brisbane as a consultant urologist and commenced practice at Greenslopes Private Hospital in 2001.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Dr. Wood has completed training in Seed Brachytherapy at the Seattle Prostate Institute and founded Queensland’s first Seed brachytherapy program at the Greenslopes Private Hospital in 2003.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Since returning to Brisbane as a Consultant Urologist in 2001, Dr. Wood has worked in collaboration with many of Brisbane’s leading IVF specialist, harvesting sperm for a wide range of causes of male infertility. Procedures range from open sperm collection performed comfortably under local anaesthetic, right through to microsurgical sperm retrieval. Dr. Wood also performs microscopic vasectomy reversal and vasectomy.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Dr. Wood is a member of the Royal Australian College of Surgeons court of examiners and is one of the founding surgeons in the establishment and development of the Greenslopes Private Hospital robotic radical prostatectomy program. He has performed over 800 robotic prostatectomies and been involved in the robotic training of urologists at Greenslopes Private Hospital and other Queensland Hospitals.</span></p><div class="code-block code-block-2" data-dcnode-id="2460" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2467" instrument_node="">

</span></div><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">He is currently the chairman of the Medical Advisory Committee at Greenslopes Private Hospital and is a financial supporter of the Gallipoli Foundation.</span></p><span data-dcnode-id="2457" instrument_node="">

</span><figure aria-describedby="caption-attachment-41331" class="wp-caption aligncenter" data-dcnode-id="2407" id="attachment_41331" style="width: 300px"><img alt="Dr. David Winkle" class="size-medium wp-image-41331 td-animation-stack-type0-2" data-dcnode-id="2410" height="289" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestinau.com.au/wp-content/uploads/2019/06/Dr.-David-Winkle-300x289.jpg&amp;raw" srcset="https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-David-Winkle-300x289.jpg 300w, https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-David-Winkle-768x740.jpg 768w, https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-David-Winkle.jpg 1024w, https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-David-Winkle-696x671.jpg 696w, https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-David-Winkle-436x420.jpg 436w" width="300"><figcaption class="wp-caption-text" data-dcnode-id="2408" id="caption-attachment-41331"><span data-dcnode-id="2409" instrument_node="">Dr. David Winkle</span></figcaption></figure><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2402"><strong data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Dr. David Winkle</span></strong><span data-dcnode-id="2403" instrument_node=""> is a urological surgeon treating adult and paediatric patients. He is a consultant urologist at the Mater Adult Hospital, the Lady Cilento Children’s Hospital (LCCH), and works privately at the Mater Private Hospital and a number of other private hospitals in Brisbane. Dr. Winkle has extensive experience in the fields of urological reconstruction, bladder dysfunction and urinary stone disease. He has worked as a urologic surgeon for over three decades.</span></p><span data-dcnode-id="2401" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Dr. Winkle is a graduate from the University of Queensland and obtained his initial surgical and urological training in Queensland. As the Australian Travelling Fellow in Urology, he studied and worked in the United Kingdom at the Institute of Urology in London and at the Bristol Hospital for Sick Children. He commenced practice in urology in Brisbane in 1992.</span></p><div class="code-block code-block-3" data-dcnode-id="2391" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2398" instrument_node="">
</span><span data-dcnode-id="2396" instrument_node="">

</span></div><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Dr. Winkle is a Senior Lecturer at University of Queensland. He is an examiner for the Royal Australasian College of Surgeons. He has been an invited lecturer at numerous national and international meetings and has publications in the fields of paediatric and adult urologic reconstruction.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Dr. Winkle was the President of the Urological Society of Australia and New Zealand from 2013 to 2015. He is currently Chairman of the International Committee of the Urological Association of Asia (UAA) and was previously Deputy Director of the Scientific Committee of that organisation. Dr. Winkle holds positions in a number of other national and international professional bodies.</span></p><span data-dcnode-id="2385" instrument_node="">

</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" style="font-weight: 400;"><span data-dcnode-id="2351" instrument_node="">“David Winkle has been My urologist for most of my life. He is very caring and he understands you and also tells you things that you can understand. I gave him 5 Stars as he is the best and he has looked after me for most of my life as a boy, right now at 32.” – Matthew Phillip George Wrigley</span></span></p><span data-dcnode-id="2348" instrument_node="">
</span><h3 data-dcnode-id="2345"><span data-dcnode-id="2346" id="Dr_Boon_Kua"><span data-dcnode-id="2347" instrument_node="">Dr. Boon Kua</span></span></h3><span data-dcnode-id="2344" instrument_node="">
</span><figure aria-describedby="caption-attachment-41343" class="wp-caption aligncenter" data-dcnode-id="2340" id="attachment_41343" style="width: 205px"><img alt="Dr. Boon Kua" class="size-medium wp-image-41343 td-animation-stack-type0-2" data-dcnode-id="2343" height="300" loading="lazy" sizes="(max-width: 205px) 100vw, 205px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestinau.com.au/wp-content/uploads/2019/06/Dr.-Boon-Kua-205x300.png&amp;raw" srcset="https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-Boon-Kua-205x300.png 205w, https://bestinau.com.au/wp-content/uploads/2019/06/Dr.-Boon-Kua.png 250w" width="205"><figcaption class="wp-caption-text" data-dcnode-id="2341" id="caption-attachment-41343"><span data-dcnode-id="2342" instrument_node="">Dr. Boon Kua</span></figcaption></figure><span data-dcnode-id="2339" instrument_node="">
</span><div data-dcnode-id="2316"><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2334"><strong data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Dr. Boon Kua&nbsp;</span></strong><span data-dcnode-id="2335" instrument_node="">is an experienced urologist and director of Urobriz based at the Wesley hospital. He completed his Bachelor of Medicine and Bachelor of Surgery in 1994 at the University of Queensland. He did his urological including fellowship training in Queensland and New South Wales and obtained his specialist qualification, FRACS (Urology) in 2005.</span></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">He is an experienced and certified Da Vinci robotic and laparoscopic (keyhole) surgeon at the Wesley hospital. He was the first urologist in Queensland to have completed a laparoscopic radical prostatectomy in 2006. In 2010 he underwent a certified training course in robotic surgery at the leading centre at Global Robotics Institute in Florida, USA. Upon his return from the USA, he started Da Vinci robotic surgery at the Wesley hospital. He sits on the Medical Advisory Board at the Wesley hospital and was part of the original team that brought robotic surgery to the Wesley hospital. To date he has performed almost 1000 cases of robotic and laparoscopic prostate and kidney surgeries. He is now a proctor to urologists and advanced trainees learning robotic and laparoscopic radical prostatectomy, nephrectomy, partial nephrectomy and pyeloplasty.</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">He also performs prostate brachytherapy and penile prosthesis as part of a comprehensive treatment for prostate cancer patients. He completed his training in brachytherapy at a leading centre at the Seattle Prostate Institute, USA in 2006 and has been treating prostate cancer patients with low dose rate (radioactive iodine seed) and high dose rate brachytherapy since then. He also recognizes the importance of restoring erectile function to men who has lost their erections following treatment for prostate cancer. He therefore underwent further training in penile implant at a leading centre at the Coral Gables Institute, Florida with Dr Paul Perito.</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">He is a clinical lecturer to medical students from University of Queensland, Bond University and Griffith University. He is the surgical intern supervisor at the Wesley hospital and is a committee member of the Australasian Doctors Association (AADA). He has been a visiting urologist to the Redcliffe hospital since 2006.</span></p><div class="code-block code-block-4" data-dcnode-id="2317" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2324" instrument_node="">

</span></div></div><p data-dcnode-id="2313"><b data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Products/Services:</span></b></p><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Robotic Nerve Sparing Radical Prostatectomy, NanoKnife, High Dose Rate Brachytherapy, Low Dose Rate Brachytherapy, Benign Prostatic Hyperplasia, UwoLift, Laser Prostatectomy, Prostate MRI, PUJ Obstruction, Robotic Nephrectomy, Robotic Partial Nephrectomy, Robotic Pyeloplasty, Penile Prosthesis</span></p><span data-dcnode-id="2309" instrument_node="">
