i class="menu-item menu-item-type-custom menu-item-object-custom menu-item-2712" data-dcnode-id="1465"><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2946.portal.athenahealth.com/" rel="noopener" target="_blank"><span data-dcnode-id="1467" instrument_node="">Patient Portal</span></a></li></ul></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-196" data-dcnode-id="1460"><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//austinurologyinstitute.com/contact/"><span data-dcnode-id="1462" instrument_node="">Contact</span></a></li></ul></div></div></header><section class="hero-info" data-dcnode-id="1455" style="background-image: url('https://sp-ao.shortpixel.ai/client/q_glossy,ret_img/https://austinurologyinstitute.com/wp-content/uploads/2019/10/cancer-bg-1.jpg');"></section><section class="blog-post-single" data-dcnode-id="383"><div class="h-wrap v-wrap" data-dcnode-id="384"><div class="v-wrap" data-dcnode-id="385"><h1 data-dcnode-id="1452"><span class="small" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Epididymitis and Vasectomy</span></span></h1><p class="date" data-dcnode-id="1449"><strong class="large" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">November 1, 2015</span></strong></p><div class="content" data-dcnode-id="386"><p data-dcnode-id="1442"><span data-dcnode-id="1443" style="font-weight: 400;"><span data-dcnode-id="1448" instrument_node="">Epididymitis is an infection or inflammation of the epididymis. This is a structure that sits on the testicle and transports sperm to the vas deferens. It is a common infection in men and is </span><strong data-dcnode-id="1445"><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//austinurologyinstitute.com/contact/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1447" instrument_node="">typically treated with a two week course of antibiotics</span></a></strong><span data-dcnode-id="1444" instrument_node="">. The symptoms include pain of the epididymis with or without touch, feeling of a “pull” above the testicle, burning with urination, and lower abdominal pain.</span></span></p><p data-dcnode-id="923"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="924" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/YIF126LKW1Q&amp;raw" width="560"><html data-cast-api-enabled="true" data-dcnode-id="926" dir="ltr" lang="en"><head data-dcnode-id="1416"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1436" name="viewport"/><link data-dcnode-id="1431" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="Bts64wBS4ppyZQ6O8+rzzw" rel="stylesheet"/><title data-dcnode-id="1418">YouTube</title><link data-dcnode-id="1417" href="https://www.youtube.com/watch?v=YIF126LKW1Q" rel="canonical"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="927" dir="ltr"><div data-dcnode-id="934" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="935" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="1414" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="1415" playsinline="" style="width: 560px; height: 315px; left: 0px; top: -315px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcno //chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//austinurologyinstitute.com/vasectomy/"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">After a vasectomy</span></strong></a><span data-dcnode-id="918" instrument_node="">, it is common to have discomfort and swelling for up to 2 weeks. If your symptoms persist beyond this time, or if pain is severe/uncontrolled along with urinary symptoms it may indicated epididymitis. Epidymitis is not common after a vasectomy, but it can happen. Luckily, </span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//austinurologyinstitute.com/mens-health/epididymitis-orchitis/"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">treatment is available</span></strong></a><span data-dcnode-id="914" instrument_node="">.&nbsp;</span></span></p><p data-dcnode-id="909"><span data-dcnode-id="910" style="font-weight: 400;"><span data-dcnode-id="911" instrument_node="">Treatment is usually done with a one or two week course of antibiotics. We also recommend wearing supportive underwear, using ice on the scrotum, and limiting physical activity for one week. These techniques also help with the vasectomy healing process. Even after antibiotic treatment though, symptoms may take 4-6 weeks to fully resolve. If symptoms persist, we may consider further evaluation with a semen culture and/or and ultrasound of the scrotum. </span></span></p><p data-dcnode-id="390"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="391" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/X5IMdxrv_r0&amp;raw" width="560"><html data-cast-api-enabled="true" data-dcnode-id="393" dir="ltr" lang="en"><head data-dcnode-id="883"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="903" name="viewport"/><link data-dcnode-id="898" href="https://www.youtu
