</span><h3 data-dcnode-id="2227"><strong data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">At Veterinary Village and International Canine Semen Bank your pets are special to us</span></strong></h3><span data-dcnode-id="2226" instrument_node="">
</span><div class="img-block" data-dcnode-id="2224"><img alt="happy kid" class="rounded" data-dcnode-id="2225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smallanimalclinic.com/sites/default/files/photos/events/event-1-main-image.jpg&amp;raw" srcset="/sites/default/files/photos/events/event-1-main-image.jpg 2x"></div><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2221" data-pm-slice="1 1 []"><span data-dcnode-id="2222" instrument_node="">Our passion is to make you and your pet feel safe in good times and times of crisis. We understand pets are part of your family. And when you visit us, your pets become a part of our family too.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">We want to be YOUR veterinarian.</span></p><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2216" instrument_node="">Our practice provides state-of-the-art veterinary care, as well as </span><a data-dcnode-id="2214" onmouseout="this.style.color='#9c1729'" onmouseover="this.style.color='#0e1a4d'" style="color:#9c1729"><span data-dcnode-id="2215" instrument_node="">breeding and reproductive services</span></a><span data-dcnode-id="2213" instrument_node="">. We are proud to offer our patients a full range of services including pet wellness care, pet dentistry, pain management, spay and neutering, pet pharmacy, laser therapy, euthanasia, and more. Canine reproduction is one of our special interests and we provide comprehensive breeding management services.</span></p><span data-dcnode-id="2211" instrument_node="">

</span><div class="heading" data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">
</span><h1 data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">About Veterinary Village	</span></h1><span data-dcnode-id="772" instrument_node="">
</span></div><span data-dcnode-id="770" instrument_node="">
</span><h2 data-dcnode-id="768" data-uw-styling-context="true"><span data-dcnode-id="769" instrument_node="">Get to know your veterinarian</span></h2><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765" data-uw-styling-context="true"><span data-dcnode-id="766" instrument_node="">We have found the key to quality veterinary care is a combination of medical competence, empathy for pet owners and compassion for our animal companions. Our veterinarians will listen to your concerns, diagnose any medical conditions, help you understand your options and work with you to make the right decisions for you and your pet.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762" data-uw-styling-context="true"><span data-dcnode-id="763" instrument_node="">At Veterinary Village, our team is made up of a diverse group of veterinarians and support staff professionals who bring their love for animals to work with them every day. Our veterinary team comes from all backgrounds, and they have joined Veterinary Village because of their desire to make a difference in the lives of animals, as well as the people who love those animals.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="757" data-uw-styling-context="true"><span data-dcnode-id="760" instrument_node="">To learn more about our dedicated veterinary team, please&nbsp;</span><a data-dcnode-id="758" data-uw-styling-context="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smallanimalclinic.com/about-us/staff/veterinarians"><span data-dcnode-id="759" instrument_node="">click here.</span></a></p><span data-dcnode-id="756" instrument_node="">
</span><h2 data-dcnode-id="754" data-uw-styling-context="true"><span data-dcnode-id="755" instrument_node="">Our Animal Hospital Offers Cutting Edge, Affordable Care</span></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751" data-uw-styling-context="true"><span data-dcnode-id="752" instrument_node="">Veterinary Village is an animal care facility equipped to handle all medical and surgical needs. From preventive health care services to advanced diagnostic and surgical services, our doctors and staff are trained to manage all of your pet's needs. We are continually updating our equipment and educating our team to the latest medical information. We know that everyone has a budget and we will work within the confines of your budget to get the best outcome for your pet.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="739" data-uw-styling-context="true"><span data-dcnode-id="749" instrument_node="">At Veterinary Village we employ&nbsp;</span><a data-dcnode-id="747" data-uw-styling-context="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fearfreepets.com/" rel="nofollow" target="_blank"><span data-dcnode-id="748" instrument_node="">Fear Free</span></a><span data-dcnode-id="746" instrument_node="">&nbsp;practices to try to make your pet's visit to us as relaxed as possible. While there are many&nbsp;</span><a data-dcnode-id="744" data-uw-styling-context="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fearfreepets.com/" rel="nofollow" target="_blank"><span data-dcnode-id="745" instrument_node="">Fear Free</span></a><span data-dcnode-id="743" instrument_node="">&nbsp;practices we use, one of them is offering treats like peanut butter and chicken baby food to give your pet a distraction while we do exams and testing to reduce anxiety and stress. We know that a&nbsp;</span><a data-dcnode-id="741" data-uw-styling-context="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fearfreepets.com/" rel="nofollow" target="_blank"><span data-dcnode-id="742" instrument_node="">Fear Free</span></a><span data-dcnode-id="740" instrument_node="">&nbsp;experience is a benefit to you, your pet, and also our staff.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="735"><a class="btn btn-warning" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smallanimalclinic.com/about-us"><span data-dcnode-id="737" instrument_node="">Read more</span></a></p><span data-dcnode-id="734" instrument_node="">
