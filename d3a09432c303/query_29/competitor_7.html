</span><h2 data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Will Insurance Pay for the Vasectomy Reversal Costs in 2022?</span></h2><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">The goal of this article, by microsurgeon and author </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dadsagain.com/about-icvr/about-dr-marks/"><span data-dcnode-id="514" instrument_node="">Dr. Sheldon Marks,</span></a><span data-dcnode-id="512" instrument_node=""> is to explain how and why insurance rarely pays for a vas reversal.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="509" instrument_node="">Bottom line, for most men a vasectomy reversal is usually </span><strong data-dcnode-id="504"><span data-dcnode-id="508" instrument_node=""> </span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//parkfarmshoot.co.uk/clay-pigeon-shooting-worcestershire/"><span data-dcnode-id="507" instrument_node="">Mangalagiri</span></a><span data-dcnode-id="505" instrument_node=""> not covered</span></strong><span data-dcnode-id="503" instrument_node=""> by most insurance plans. Insurance companies think it is an elective and not a “medically necessary” procedure. They do not want to pay for correcting a decision that men now regret. Plus, I have been told by an insurance insider that a successful vasectomy reversal will increase insurance company costs as they now have to pay for the delivery and costs for more children with no additional income to cover these expenses.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="487"><strong data-dcnode-id="496"><span data-dcnode-id="500" instrument_node=""> </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gruphoms.com/%3Fp%3D1943"><span data-dcnode-id="499" instrument_node="">http://gruphoms.com/?p=1943</span></a><span data-dcnode-id="497" instrument_node=""> How to find out if insurance will pay for the vasectomy reversal?&nbsp;</span></strong><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node="">
Because there are many thousands of insurance plans and so many variations within each plan, each patient will have to call the insurance company and find out if the specific plan that they have will cover an “outpatient microsurgical vasovasostomy” (code # </span><strong data-dcnode-id="489"><span data-dcnode-id="493" instrument_node=""> </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goodvibeswebsitedesign.co.uk/blog/category/uncategorized/"><span data-dcnode-id="492" instrument_node="">http://goodvibeswebsitedesign.co.uk/blog/category/uncategorized/</span></a><span data-dcnode-id="490" instrument_node=""> 55400-50</span></strong><span data-dcnode-id="488" instrument_node="">). It is best not to say the words “vasectomy reversal.”</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="478"><strong data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">  The vasectomy reversal is approved!…maybe…probably not!</span></strong><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">
Even if the insurance company representative says that “yes, an outpatient vas reversal is covered,” as they often do, please know that what the representative says </span><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">usually is not</span></strong><span data-dcnode-id="479" instrument_node=""> true and they will refuse to pay later on. It’s one of those fine print things buried deep in the health insurance contract that no one ever reads. When they say “yes, it is covered” what they really are saying is that under the terms of the insurance contract, outpatient surgery even with a non-contracted provider is usually a “covered expense.” The problem is that in the decades of our performing many thousands and thousands of&nbsp;vasectomy reversals, the insurance company almost always will deny payment later on after the surgery. Here’s how they can do that – the authorization department that says that it is “covered” is not the same department that later on has to approve the payment and write the check. The payment division then explains that even if “pre-approved,” the insurance company is not legally bound to pay. This then leaves the patient now responsible to pay the unexpected bill.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Even if the insurance company or agency does “approve” the vas reversal and actually sends a check to the doctor, in my experience it may be only a few hundred dollars for a several thousand-dollar procedure. They reason is that the insurance company alone gets to decide how much they think is “reasonable and customary” for a vasectomy reversal in 2021, even though it is many thousands less than the true costs. Some insurance plans try to direct patients to an “in plan” contracted urologist to do the vas reversal, even if the doctor is not trained, skilled or experienced in urologic microsurgery.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="466"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">How the ICVR team works with each patient</span></strong><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
ICVR is </span><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">not</span></strong><span data-dcnode-id="467" instrument_node=""> contracted with any insurance company, business or government/military entity or veterans agency. We simply cannot hire several more full-time employees just to file and re-file hundreds of claims over and over again with months of challenges and battles with insurance companies all over the US and around the world. Instead, we have found that is is easier for the patient pay for the vas reversal up front and then apply to the insurance company for reimbursement. We provide a copy of the operative note to help with this process. </span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">Plus, because we know that a well performed microsurgical reverse vasectomy is not cheap, we offer </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dadsagain.com/cost-of-a-reversal/payment-options/"><span data-dcnode-id="463" instrument_node="">payment options</span></a><span data-dcnode-id="461" instrument_node=""> for most couples.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="458" instrument_node="">If there are any questions about vasectomy reversals or to set up a no-cost phone, Skype, Zoom, in office or Face Time consultation with one of the 2 microsurgeons, please call our </span><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">full-time, vas reversal only</span></strong><span data-dcnode-id="455" instrument_node=""> center at </span><strong data-dcnode-id="452"><a data-dcnode-id="453" href="tel:+18887222929"><span data-dcnode-id="454" instrument_node="">888-722-2929</span></a></strong><span data-dcnode-id="451" instrument_node=""> or email us at </span><a data-dcnode-id="448" href="mailto:info@dadsagain.com"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">info@dadsagain.com</span></strong></a><span data-dcnode-id="447" instrument_node="">.</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">This page was reviewed, edited and updated January 1, 2022 by Sheldon H. F. Marks, MD.</span></p><span data-dcnode-id="442" instrument_node="">
