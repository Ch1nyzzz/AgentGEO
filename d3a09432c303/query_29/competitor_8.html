</span><article class="post-373 post type-post status-publish format-standard hentry category-cost category-eligibility category-faqs tag-tubal-ligation tag-vasectomy-vs-tubal-ligation no-post-thumbnail" data-dcnode-id="390" id="post-373"><span data-dcnode-id="678" instrument_node="">
</span><div class="entry-featured" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">

</span><div class="entry-wrap" data-dcnode-id="400"><span data-dcnode-id="674" instrument_node="">
</span><header class="entry-header" data-dcnode-id="649"><span data-dcnode-id="673" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Vasectomy vs Tubal ligation</span></h1><span data-dcnode-id="670" instrument_node="">
</span><p class="p-meta" data-dcnode-id="650"><span data-dcnode-id="667"><i class="x-icon-pencil" data-dcnode-id="669" data-x-icon-s=""></i><span data-dcnode-id="668" instrument_node=""> anna.jabour@mariestopes.org.au</span></span><span data-dcnode-id="663"><time class="entry-date" data-dcnode-id="664" datetime="2021-02-23T10:36:46+11:00"><i class="x-icon-calendar" data-dcnode-id="666" data-x-icon-s=""></i><span data-dcnode-id="665" instrument_node=""> February 23, 2021</span></time></span><span data-dcnode-id="651"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/category/faqs/cost/" title="View all posts in: “Cost”"><i class="x-icon-bookmark" data-dcnode-id="662" data-x-icon-s=""></i><span data-dcnode-id="661" instrument_node=""> Cost</span></a><span data-dcnode-id="659" instrument_node="">, </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/category/faqs/eligibility/" title="View all posts in: “Eligibility”"><i class="x-icon-bookmark" data-dcnode-id="658" data-x-icon-s=""></i><span data-dcnode-id="657" instrument_node=""> Eligibility</span></a><span data-dcnode-id="655" instrument_node="">, </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/category/faqs/" title="View all posts in: “FAQs”"><i class="x-icon-bookmark" data-dcnode-id="654" data-x-icon-s=""></i><span data-dcnode-id="653" instrument_node=""> FAQs</span></a></span></p></header><span data-dcnode-id="648" instrument_node="">
</span><div class="entry-content content" data-dcnode-id="402"><span data-dcnode-id="647" instrument_node="">
</span><div class="cs-content" data-dcnode-id="404" id="cs-content"><div class="x-section e373-1 mad-0" data-dcnode-id="405"><div class="x-container e373-2 mad-1" data-dcnode-id="406"><div class="x-column x-sm x-1-1 e373-3 mad-2" data-dcnode-id="407"><div class="x-text e373-4 mad-3 mad-4" data-dcnode-id="644"><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">If you’re in a heterosexual, monogamous relationship and have decided not to have any/more children, then you and your partner might be weighing up your options around permanent contraception methods, also referred to as sterilisation. The two to consider are tubal ligation and a vasectomy.</span></p></div><span class="x-image e373-5 mad-6 mad-7" data-dcnode-id="642"><img alt="Image" data-dcnode-id="643" height="483" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/wp-content/uploads/vasectomy-vs-tubal-ligation.jpg&amp;raw" width="724"></span><div class="x-text x-text-headline e373-6 mad-9 mad-a mad-b" data-dcnode-id="637"><div class="x-text-content" data-dcnode-id="638"><div class="x-text-content-text" data-dcnode-id="639"><h2 class="x-text-content-text-primary" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Tubal ligation</span></h2></div></div></div><div class="x-text e373-7 mad-3 mad-4" data-dcnode-id="626"><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node=""> Tubal ligation involves making an incision in the abdominal wall, locating the fallopian tubes and closing them.</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">There are many methods of closing the fallopian tubes: they can be cut and then tied off, clamped or cauterized. Alternatively they might be kept whole, but closed with a clip, band or ring.</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Tubal ligation is a more a complex procedure than a vasectomy and involves going under general anaesthetic and several scalpel incisions.</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">After the procedure, most women will spend several hours in the hospital, however since it’s often performed as part of another procedure, (such as a c-section) they may stay longer.</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Post procedure, patients can expect symptoms such as shoulder pain, sore throat, bloating, and vaginal bleeding and discharge. These will last around two to four days, and most patients can resume their normal routine after this. However physical activities should be avoided for the first week after surgery, and anything involving heavy lifting should be avoided for around three weeks.</span></p></div><div class="x-text x-text-headline e373-8 mad-9 mad-a mad-b" data-dcnode-id="621"><div class="x-text-content" data-dcnode-id="622"><div class="x-text-content-text" data-dcnode-id="623"><h2 class="x-text-content-text-primary" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Tubal occlusion</span></h2></div></div></div><div class="x-text e373-9 mad-3 mad-4" data-dcnode-id="616"><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Tubal occlusion involves inserting a small coil into the fallopian tube via a catheter through the vagina. The coil then induces the body to form a barrier around it, much like scar tissue, that then creates a natural blockage in the fallopian tube.</span></p><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Tubal occlusion is not currently available in Australia due to the product being recalled by the manufacturer after the Therapeutic Goods Administration issued a hazard alert.</span></p></div><div class="x-text x-text-headline e373-10 mad-9 mad-a mad-b" data-dcnode-id="611"><div class="x-text-content" data-dcnode-id="612"><div class="x-text-content-text" data-dcnode-id="613"><h2 class="x-text-content-text-primary" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Vasectomy</span></h2></div></div></div><div class="x-text e373-11 mad-3 mad-4" data-dcnode-id="602"><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">There are two types of vasectomy: closed and open ended. In a closed ended vasectomy the two ends of the vas deferens are sealed. In an open ended vasectomy the end connected to the testicles is left open, which allows the sperm to freely escape into the intra-scrotal space. The sperm then die and are reabsorbed by the body. The end connected to the prostate gland is closed permanently which leads to sterility. Both are equally effective, however an open ended is considered the best option as it has far fewer complications.</span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">A vasectomy is performed under local anaesthetic, with patients having the option to choose twilight sedation if desired. The whole process takes around 15 minutes and patients are able to leave almost immediately after the procedure.</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Post procedure patients can expect minor discomfort for 2-3 days and occasionally some mild swelling or bruising which can be treated with Paracetamol and a properly applied ice pack.</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Strenuous physical activity and non-contact sports should be avoided for two weeks, and contact sports should be avoided for one month.</span></p></div><div class="x-text x-text-headline e373-12 mad-9 mad-a mad-c" data-dcnode-id="597"><div class="x-text-content" data-dcnode-id="598"><div class="x-text-content-text" data-dcnode-id="599"><h2 class="x-text-content-text-primary" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Weighing up your options</span></h2></div></div></div><span class="x-image e373-13 mad-6 mad-8" data-dcnode-id="595"><img alt="Choosing between vasectomy and tubal ligation" data-dcnode-id="596" height="483" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/wp-content/uploads/choosing-between-vasectomy-and-tubal-ligation.jpg&amp;raw" width="724"></span><div class="x-text x-text-headline e373-14 mad-9 mad-a mad-d" data-dcnode-id="590"><div class="x-text-content" data-dcnode-id="591"><div class="x-text-content-text" data-dcnode-id="592"><h3 class="x-text-content-text-primary" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Efficacy</span></h3></div></div></div><div class="x-text e373-15 mad-3 mad-4" data-dcnode-id="585"><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">There is no real difference in the efficacy rate between the two procedures; both have a higher than 99% success rate. However, experienced vasectomy surgeons typically have success rates greater than 99.9% equivalent to failure rates of less than 1 in 1000.</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">After tubal ligation the patient is considered sterile and there are no follow up tests. After vasectomy the patient needs to use birth control for an additional three months until they’ve had a semen test to confirm the success of the operation.</span></p></div><div class="x-text x-text-headline e373-16 mad-9 mad-a mad-d" data-dcnode-id="580"><div class="x-text-content" data-dcnode-id="581"><div class="x-text-content-text" data-dcnode-id="582"><h3 class="x-text-content-text-primary" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Cost</span></h3></div></div></div><div class="x-text e373-17 mad-3 mad-4" data-dcnode-id="577"><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Vasectomy is the more affordable procedure. With private health insurance, you can be completely covered with no gap or a minimal fee under $100. Tubal ligation, because it involves a general anaesthetic, is more expensive and often costs around $4500.</span></p></div><div class="x-text x-text-headline e373-18 mad-9 mad-a mad-d" data-dcnode-id="572"><div class="x-text-content" data-dcnode-id="573"><div class="x-text-content-text" data-dcnode-id="574"><h3 class="x-text-content-text-primary" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Safety</span></h3></div></div></div><div class="x-text e373-19 mad-3 mad-4" data-dcnode-id="565"><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Both procedures are incredibly safe, however because the tubal ligation involves a general anaesthetic and scalpel incisions, it is subject to the usual risks associated with this, such as: nausea, vomiting, infections, bruising, bleeding and issues with bladder or bowel function. These complications are rare though.</span></p><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">In addition, tubal ligation has a greater risk of ectopic pregnancies occurring. Around 1 in 200 women may still fall pregnant due to an incomplete closure of the fallopian tubes, if this happens the pregnancy may develop outside the uterus (ectopic pregnancy). This can be a painful and dangerous condition that requires emergency surgery.</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">By contrast, vasectomy patients are not subject to either a scalpel or general anaesthetic so the largest risks they face are bruising, infection and swelling. Some experience epididymitis, which can be resolved with antibiotics. A small percentage of patients might experience a hematoma, where a blood vessel forms a clot; however this is typically reabsorbed by the body.</span></p></div><div class="x-text x-text-headline e373-20 mad-9 mad-a mad-d" data-dcnode-id="560"><div class="x-text-content" data-dcnode-id="561"><div class="x-text-content-text" data-dcnode-id="562"><h3 class="x-text-content-text-primary" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Reversal</span></h3></div></div></div><div class="x-text e373-21 mad-3 mad-4" data-dcnode-id="557"><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Both procedures should absolutely be considered permanent. These are not procedures you should undergo if you are unsure about whether you would still like to have children. Even though both tubal ligation and vasectomy are technically reversible, the success rates will depend largely upon how long ago you had the procedure done. Reversals are expensive and usually not covered by insurance. We do not perform reversals.</span></p></div><div class="x-text x-text-headline e373-22 mad-9 mad-a mad-c" data-dcnode-id="552"><div class="x-text-content" data-dcnode-id="553"><div class="x-text-content-text" data-dcnode-id="554"><h2 class="x-text-content-text-primary" data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Last thoughts</span></h2></div></div></div><div class="x-text e373-23 mad-3 mad-5" data-dcnode-id="549"><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Ultimately this comes down to lifestyle and personal choice. A vasectomy is preferable for most couples as it has lower rates of complications, is a simpler procedure and costs less. However tubal ligation is still a very reliable and safe method of sterilisation that many women might choose to undergo for peace of mind. If you know or suspect that you are both particularly fertile, it’s not unreasonable to undergo both procedures.</span></p></div><div class="x-entry-share" data-dcnode-id="530" style="margin-top: 20px;"><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Share this Post</span></p><div class="x-share-options" data-dcnode-id="531"><a class="x-share" data-dcnode-id="545" data-original-title="Share on Facebook" data-x-element="extra" data-x-params="{&quot;type&quot;:&quot;tooltip&quot;,&quot;trigger&quot;:&quot;hover
