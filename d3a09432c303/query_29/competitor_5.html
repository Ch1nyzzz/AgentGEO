</span><div class="et_pb_tab_content" data-dcnode-id="265"><p data-dcnode-id="275"><span data-dcnode-id="279" instrument_node="">Vasectomy reversal is not just for my male patients seeking an addition to their family. With an all-inclusive </span><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">vasectomy reversal cost</span></strong><span data-dcnode-id="276" instrument_node=""> of $3,300 reversing a vasectomy is now being used to combat the onset of male depression following the original procedure. Patients have seen a return to their more virile days and a lifting of the “male fog.” Dr. Mark Hickman performs a microsurgical repair of the vas deferens with a powerful operating microscope and fine nylon suture (much finer than a human hair). A typical repair requires 10-15 stitches. The goal is to create direct and careful alignment of the lumen of the two ends of the vas and a watertight closure for a higher success rate.</span></p><span data-dcnode-id="274" instrument_node="">
</span><h3 data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Experienced Minimally Invasive Surgeon</span></h3><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="266"><img alt="vasectomy reversal cost" class="wp-image-682 alignnone size-medium entered lazyloaded" data-dcnode-id="270" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed-300x141.jpg" data-lazy-srcset="https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed-300x141.jpg 300w, https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed.jpg 374w" data-ll-status="loaded" height="141" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed-300x141.jpg&amp;raw" srcset="https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed-300x141.jpg 300w, https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed.jpg 374w" style="float: right;" width="300"><noscript data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">&lt;img src="https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed-300x141.jpg" alt="vasectomy reversal cost" class="wp-image-682 alignnone size-medium" style="float: right;" width="300" height="141" srcset="https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed-300x141.jpg 300w, https://micro-vas-reversals.com/wp-content/uploads/2013/11/can-a-vasectomy-be-reversed.jpg 374w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="267" instrument_node="">Dr. Hickman has more than 26 years of experience under his belt as a leading minimally invasive surgeon. With more than 1,300 vasectomy reversals, Dr. Hickman has too many to count pregnancies!&nbsp; Dr. Hickman has ‘corrected’ many vasectomy reversals from other providers as well with&nbsp;great success. Surgical procedures and results&nbsp;vary widely among providers. Clients from around the world trust Dr. Hickman because of his dedication, high success rate, and bedside manner. Be thorough and sure in your decision.</span></p></div><span data-dcnode-id="264" instrument_node="">
</span></div><div class="et_pb_tab et_pb_tab_1 clearfix" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">
</span></div><div class="et_pb_tab et_pb_tab_2 clearfix" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">
</span></div><div class="et_pb_tab et_pb_tab_3 clearfix" data-dcnode-id="140"><span data-dcnode-id="258" instrument_node="">
</span><div class="et_pb_tab_content" data-dcnode-id="142"><p data-dcnode-id="242"><span data-dcnode-id="257" instrument_node="">Vasectomy reversal is a term used for surgical procedures that reconnect the male reproductive tract after interruption by a vasectomy. Two procedures are possible at the time of vasectomy reversal: vasovasostomy (vas deferens to vas deferens connection) and vasoepididymostomy (epididymis to vas deferens connection). Although vasectomy is considered a permanent form of contraception, advances in microsurgery have improved the success of vasectomy reversal procedures. The procedures remain technically demanding and expensive, and may not restore the pre-vasectomy condition. A general or regional anesthetic is most commonly used, as this offers the least interruption by patient movement for microsurgery. Local anesthesia, with or without sedation, can also be used. The procedure is generally done on a “come and go” basis. The actual operating time can range from 1–4 hours, depending on the anatomical complexity, skill of the surgeon and the kind of procedure performed. After anesthesia and scrubbing the scrotum with soap and water, the vas deferens is exposed through a small, 1–2 cm incision in the upper scrotum on each side. The vas deferens is cut sharply in half, both above and below the vasectomy site. A special bipolar microcautery is used to judiciously control any bleeding. One end of the vas deferens, termed the abdominal end, is inspected and flushed with salt solution to ensure that it is not blocked as it courses from the scrotum to the prostate (a “saline vasogram”). In order to assess for the presence of possible obstruction above the vasectomy site the testicular end of the vas deferens can be compressed and inspected for fluid. This fluid is examined with a microscope for color, consistency and for sperm. This information is used by some surgeons to decide whether or not a secondary epididymal obstruction is present. </span><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node="">1 Normal appearing sperm with motility Vasovasostomy</span><br data-dcnode-id="254"><span data-dcnode-id="253" instrument_node="">2 Mostly normal appearing, nonmotile Vasovasostomy</span><br data-dcnode-id="252"><span data-dcnode-id="251" instrument_node="">3 Mostly sperm heads without tails, nonmotile Vasovasostomy</span><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node="">4 Only sperm heads Vasovasostomy</span><br data-dcnode-id="248"><span data-dcnode-id="247" instrument_node="">5 No sperm, creamy fluid Vasoepididymostomy</span><br data-dcnode-id="246"><span data-dcnode-id="245" instrument_node="">6 No fluid Vasoepididymostomy</span><br data-dcnode-id="244"><span data-dcnode-id="243" instrument_node="">7 Clear fluid, no sperm It depends</span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">If sperm are found at the testicular end of the vas deferens, then it is assumed that a secondary epididymal obstruction has not occurred and a vas deferens-to-vas deferens reconnection (vasovasostomy) is planned. If sperm are not found, then some surgeon consider this to be prime facie evidence that an epididymal obstruction is present and that an epididymis to vas deferens connection (vasoepididymostomy) should be considered to restore sperm flow. Other, more subtle findings that can be observed in the fluid—including the presence of sperm fragments and clear, good quality fluid without any sperm—require surgical decision-making to successfully treat. There are however, no large randomised prospective controlled trials comparing patency or pregnancy rates following the decision to perform either microsurgical vasovasostomy to microsurgical vasoepididymosty as determined by this paradigm. For a vasovasostomy, two microsurgical approaches are most commonly used. Neither has proven superior to the other.[1] What has been shown to be important, however, is that the surgeon use optical magnification to perform the vasectomy reversal. One approach is the modified 1-layer vasovasostomy and the other is a formal, 2-layer vasovasostomy. A vasoepididymostomy involves a connection of the vas deferens to the epididymis. This is necessary when there is no sperm present in the vas deferens. With vasectomy reversal surgery, there are two typical measures of success: patency rate, or return of some moving sperm to the ejaculate after vasectomy reversal, and pregnancy rates. In a recently published report[2] 95% of men with a vasovasostomy had motile sperm in the ejaculate within 1 year after vasectomy reversal. Almost 80% of these men achieved sperm motility within 3 months of vasectomy reversal. The case for vasoepididymostomy is different. Fewer men will eventually achieve motile sperm counts and the time to achieve motile sperm counts is longer.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Additional information:</span></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="234" instrument_node="">The age of the patient at the time of vasectomy reversal does not appear to matter. Using different age cut-offs, including &lt;35, 36-45, and &gt; 45 years old, no differences in patency rates were detected in a recent vasectomy reversal series.[2]</span><br data-dcnode-id="233"><span data-dcnode-id="232" instrument_node="">The patency rates after vasovasostomy appear equivalent when performed in the straight or convoluted segments of the vas deferens[3]</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Another issue to consider is the likelihood of vasoepididymostomy at the time of vasectomy reversal, as this technique is generally associated with lower patency and pregnancy rates than vasovasostomy. Web-based, computer models and calculations have been proposed and published that described the chance of needing an vasoepididymostomy at reversal surgery.The pregnancy rate is often seen as a more reliable way of measuring the success of a vasectomy reversal than the patency rates, as they measure the real-life success of whether the man succeeds in the aim of having a new child.</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">It is important to appreciate that female age is the single most powerful factor determining the pregnancy rate following any fertility treatment and vasectomy reversal is no exception. No large studies have stratified the results of vasectomy reversal by female age and hence assessing outcomes is confounded by this issue.</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Pregnancy rates range widely in published series, with a large study in 1991 observing the best outcome of 76% pregnancy success rate with vasectomy reversals performed within 3 years or less of the original vasectomy, dropping to 53% for reversals 3–8 years out from the vasectomy, 44% for reversals 9–14 years out from the vasectomy, and 30% for reversals 15 or more years after the vasectomy.[5] BPAS cites the average pregnancy success rate of a vasectomy reversal is around 55% if performed within 10 years, and drops to 25% if performed over 10 years.[6] Higher success rates are found with reversal of vasovasostomy than those with a vasoepididymostomy, and factors such as antisperm antibodies and epididymal dysfunction are also implicated in success rates.Sperm are produced in the male sex gland or testicle. From there they travel through tubes (efferent tubules), exit the testes and enter a “storage site” or epididymis. The epididymis is a single, 18-foot-long (5.5 m), tightly coiled, small tube, within which sperm mature to the point where they can move, swim and fertilize eggs. Testicular sperm are not able to fertilize eggs naturally (but can if they are injected directly into the egg in the laboratory), as the ability to fertilize eggs is developed slowly over several months of storage in the epididymis. From the epididymis, a 14-inch, 3 mm-thick muscular tube called the vas deferens carries the sperm to the urethra near the base of the penis. The urethra then carries the sperm through the penis during ejaculation. A vasectomy interrupts sperm flow within the vas deferens. After a vasectomy, the testes still make sperm, but because the exit is blocked, the sperm die and eventually are reabsorbed by the body.</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">A problem in the delicate tubes of epididymis can develop over time after vasectomy.[5] The longer the time since the vasectomy, the greater the “back-pressure” behind the vasectomy. This “back-pressure” may cause a “blowout” in the delicate epididymal tubule, the weakest point in the system. The blowout may or may not cause symptoms, but will probably scar the epididymal tubule, thus blocking sperm flow at second point. To summarize, with time, a man with a vasectomy can develop a second obstruction deeper in the reproductive tract that can make the vasectomy more difficult to reverse. Having the skill to detect and fix this problem during vasectomy reversal is the essence of a skilled surgeon. If the surgeon simply reconnects the two freshened ends of the vas deferens without examining for a second, deeper obstruction, then the procedure can fail, as sperm-containing fluids are still unable to flow to the place of the connection. In this case, the vas deferens must be connected to the epididymis in front of the second blockage, to bypass both blockages and allow the sperm to reenter the urethra in the ejaculate. Since the epididymal tubule is much smaller (0.3 mm diameter) than the vas deferens (3 mm diameter, 10-fold larger), epididymal surgery is far more complicated and precise than the simple vas deferens-to-vas deferens connection. Vasectomy is a common method of contraception worldwide, with an estimated 40-60 million individuals having the procedure and 5-10% of couples choosing it as a birth control method.[17] In the USA, about 2% of men later go on to have a vasectomy reversal afterwards.[18] However the number of men inquiring about vasectomy reversals is significantly higher – from 3% to 8%[15] – with many “put off” by the high costs of the procedure and pregnancy success rates (as opposed to “patency rates”) only being around 55%.[19] 90% of men are satisfied with having had the procedure.[20]</span></p><span data-dcnode-id="218" instrument_node="">
</span><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">While there are a number of reasons that men seek a vasectomy reversal, some of these include wanting a family with a new partner following a relationship breakdown / divorce, their original wife/partner dying and subsequently going on re-partner and to want children, the unexpected death of a child (or children – such as by car accident), or a long-standing couple changing their mind some time later often by situations such as improved finances or existing children approaching the age of school or leaving home.[21] Patients often comment that they never anticipated such situations as a relationship breakdown or death (of their partner or child) may affect their situation. A small number of vasectomy reversals are also performed in attempts to relieve post-vasectomy pain syndrome.</span></p><span data-dcnode-id="215" instrument_node="">
</span><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">In the UK, 16% of all men under 70 have had a vasectomy, and with remarriages accounting for 40% of all marriages, there are a significant proportion of men finding themselves in a new relationship and regretting their decision to have a vasectomy.[21] Combined with longer life histories, the rate of divorce and remarriage is thought to be driving the increase in vasectomy reversals and inquiries for vasectomy reversals in recent times.Every patient who is considering vasectomy reversal should undergo a screening visit before the procedure to learn as much as possible about his current fertility potential. At this visit, the patient can decide whether he is a good candidate for vasectomy reversal and assess if it is right for him. Issues to be discussed at this visit include:</span></p><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="211" instrument_node="">Female partner’s history of past pregnancies</span><br data-dcnode-id="210"><span data-dcnode-id="209" instrument_node="">Male’s medical and surgical history</span><br data-dcnode-id="208"><span data-dcnode-id="207" instrument_node="">Complications during or after the vasectomy</span><br data-dcnode-id="206"><span data-dcnode-id="205" instrument_node="">Female partner’s age, menstrual cycle and fertility</span><br data-dcnode-id="204"><span data-dcnode-id="203" instrument_node="">Brief physical examination to assess male reproductive tract anatomy</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node="">A review of the vasectomy reversal procedure, its nature, benefits and risks, and complications</span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">Alternatives to vasectomy reversal</span><br data-dcnode-id="198"><span data-dcnode-id="197" instrument_node="">Freezing of sperm at the time of vasectomy reversal</span><br data-dcnode-id="196"><span data-dcnode-id="195" instrument_node="">Questions about the surgery, the success rates, and recovery</span><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">Analysis of hormones such as testosterone or FSH in selected cases to better determine whether sperm production is normal</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Immediately before the procedure, the following information is important for patients:</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="182"><span data-dcnode-id="187" instrument_node="">They should eat normally the night before the vasectomy reversal, but follow the directions that anesthesia recommends for the morning of the reversal. If no specific directions are given, all food and drink should be withheld after midnight and on the morning of the surgery.</span><br data-dcnode-id="186"><span data-dcnode-id="185" instrument_node="">Stop taking aspirin, or any medications containing ibuprofen (Advil, Motrin, Aleve), at least 10 days prior to vasectomy reversal, as these medications have a side effect that can reduce platelet function and therefore lower blood clotting ability.</span><br data-dcnode-id="184"><span data-dcnode-id="183" instrument_node="">Be prepared to be driven home or to a hotel after the vasectomy reversal</span></p><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">After the procedure, patients should perform the following tasks:</span></p><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="177" instrument_node="">Remove dressings from inside the athletic supporter in 48 hours; continue with the scrotal support for 1 week. Shower once the dressings are removed.</span><br data-dcnode-id="176"><span data-dcnode-id="175" instrument_node="">Wear athletic supporter at all times for the first 4 weeks.</span><br data-dcnode-id="174"><span data-dcnode-id="173" instrument_node="">Apply frequent ice packs (or frozen peas, any brand) to the scrotum the evening after the vasectomy reversal and the day after that for 24 hours to reduce swelling.</span><br data-dcnode-id="172"><span data-dcnode-id="171" instrument_node="">Take prescribed pain medication as directed.</span><br data-dcnode-id="170"><span data-dcnode-id="169" instrument_node="">Resume a normal, well-balanced diet upon returning home or to the hotel. Drinks plenty of fluids.</span><br data-dcnode-id="168"><span data-dcnode-id="167" instrument_node="">Normal, non-vigorous activity can be restarted after 48 hours or when feeling better. Activities that cause discomfort should be stopped for the time being. Heavy activities such as jogging and weight lifting can be resumed in 2 to 4 weeks depending on the particular procedure.</span><br data-dcnode-id="166"><span data-dcnode-id="165" instrument_node="">Refrain from sexual intercourse for 4 weeks depending on the procedure and the surgeon’s recommendations.</span><br data-dcnode-id="164"><span data-dcnode-id="163" instrument_node="">The semen is checked for sperm at between 6 and 12 weeks post-operatively and then depending on the results may be requested monthly semen analyses are then obtained for about 6 months or until the semen quality stabilizes.</span><br data-dcnode-id="162"><span data-dcnode-id="161" instrument_node="">You may experience discomfort after the vasectomy reversal. Symptoms that may not require a doctor’s attention are: (a) light bruising and discoloration of the scrotal skin and base of penis. This will take one week to go away. b) limited scrotal swelling (a grapefruit is too large); (c) small amounts of thin, clear, pinkish fluid may drain from the incision for a few days after reversal surgery. Keep the area clean and dry and it will stop.</span><br data-dcnode-id="160"><span data-dcnode-id="159" instrument_node="">If you received general anesthesia, a sore throat, nausea, constipation, and general “body ache” may occur. These problems should resolve within 48 hours.</span><br data-dcnode-id="158"><span data-dcnode-id="157" instrument_node="">Consider calling a provider for the following issues: (a) wound infection as suggested by a fever, a warm, swollen, red and painful incision area, with pus draining from the site. Antibiotics are necessary to treat this. (b) scrotal hematoma as suggested by extreme discoloration (black and blue) of the skin and continuing scrotal enlargement from bleeding underneath. This can cause throbbing pain and a bulging of the wound. If the scrotum continues to hurt more and continues to enlarge after 72 hours, then it may need to be drained. Sometimes it is not clear to couples who want children whether they should do a vasectomy reversal or pursue assisted reproduction. There are several questions for couples to ask themselves.</span></p><span data-dcnode-id="155" instrument_node="">
</span><p data-dcnode-id="143"><span data-dcnode-id="154" instrument_node="">How long ago was the vasectomy performed? An older vasectomy, especially those more than 20–25 years, may make vasectomy reversal less likely to work.[5]</span><br data-dcnode-id="153"><span data-dcnode-id="152" instrument_node="">How many children do we want? Sperm retrieval and IVF-ICSI may be a better fit for the couple who wants only one child, as it generally results in both fresh embryos and frozen embryos that can make conceiving one child very reasonable. However, if not pregnancy does not result from IVF the necessary sperm retrieval procedures may compromise the results of subsequent vasectomy reversal.</span><br data-dcnode-id="151"><span data-dcnode-id="150" instrument_node="">Are we comfortable with dealing with birth control issues again? Birth control may be required again after vasectomy reversal.</span><br data-dcnode-id="149"><span data-dcnode-id="148" instrument_node="">How long are we willing to wait for a child? The average time to pregnancy after vasectomy reversal ranges from 9–14 months.[5]</span><br data-dcnode-id="147"><span data-dcnode-id="146" instrument_node="">What will each approach cost us? Most insurance companies do not cover the cost of vasectomy reversal. However, sometimes insurance companies cover the cost (partially or fully) for IVF-ICSI.</span><br data-dcnode-id="145"><span data-dcnode-id="144" instrument_node="">Are we comfortable with assisted reproductive technology? How do we feel about children conceived with the help of technology?</span></p></div><span data-dcnode-id="141" instrument_node="">
</span></div><span data-dcnode-id="139" instrument_node="">
</span></div><span data-dcnode-id="137" instrument_node="">
