</span></header><main class="jupiterx-main" data-dcnode-id="421" id="jupiterx-main"><div class="jupiterx-main-header" data-dcnode-id="622"><div class="container" data-dcnode-id="623"><h1 class="jupiterx-main-header-post-title" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">What happens during a vasectomy procedure and how does it work?</span></h1><ol class="breadcrumb" data-dcnode-id="624"><li class="breadcrumb-item" data-dcnode-id="644"><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/"><span data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Home</span></span></a><meta content="1" data-dcnode-id="645"></li><li class="breadcrumb-item" data-dcnode-id="639"><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/category/blog/"><span data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Blog</span></span></a><meta content="2" data-dcnode-id="640"></li><li class="breadcrumb-item" data-dcnode-id="634"><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/category/st-petersburg-fl/"><span data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">St. Petersburg, FL</span></span></a><meta content="3" data-dcnode-id="635"></li><li class="breadcrumb-item" data-dcnode-id="629"><a data-dcnode-id="631" href="#"><span data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">...</span></span></a><meta content="4" data-dcnode-id="630"></li><li aria-current="page" class="breadcrumb-item active" data-dcnode-id="625"><span data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">What happens during a vasectomy procedure and how does it work?</span></span><meta content="5" data-dcnode-id="626"></li></ol></div></div><div class="jupiterx-main-content" data-dcnode-id="422"><div class="container" data-dcnode-id="423"><div class="row" data-dcnode-id="424"><div class="jupiterx-primary col-lg-12" data-dcnode-id="425" id="jupiterx-primary"><div class="jupiterx-content" data-dcnode-id="426" role="main"><article class="jupiterx-post post-7539 post type-post status-publish format-standard has-post-thumbnail hentry category-blog category-st-petersburg-fl category-vasectomy-cat category-vasectomy-reversal tag-contraception tag-fl tag-florida tag-st-petersburg tag-urologist tag-urology tag-vasectomy-cat tag-vasectomy-reversal" data-dcnode-id="509" id="7539"><header class="jupiterx-post-header" data-dcnode-id="595"><ul class="jupiterx-post-meta list-inline" data-dcnode-id="596"><li class="jupiterx-post-meta-date list-inline-item" data-dcnode-id="617"><span data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Posted on </span></span><time data-dcnode-id="618" datetime="2017-04-14T10:34:43+00:00"><span data-dcnode-id="619" instrument_node="">April 14, 2017</span></time></li><li class="jupiterx-post-meta-author list-inline-item" data-dcnode-id="611"><span data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">By </span></span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/author/spuadmin/" rel="author"><span data-dcnode-id="614" instrument_node="">St Pete Urology</span><meta content="St Pete Urology" data-dcnode-id="613"></a></li><li class="jupiterx-post-meta-categories list-inline-item" data-dcnode-id="597"><span data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">In </span></span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/category/blog/" rel="category"><span data-dcnode-id="608" instrument_node="">Blog</span></a><span data-dcnode-id="606" instrument_node="">, </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/category/st-petersburg-fl/" rel="category"><span data-dcnode-id="605" instrument_node="">St. Petersburg, FL</span></a><span data-dcnode-id="603" instrument_node="">, </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/category/vasectomy-cat/" rel="category"><span data-dcnode-id="602" instrument_node="">Vasectomy</span></a><span data-dcnode-id="600" instrument_node="">, </span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/category/vasectomy-reversal/" rel="category"><span data-dcnode-id="599" instrument_node="">Vasectomy Reversal</span></a></li></ul></header><div class="jupiterx-post-body" data-dcnode-id="510"><div class="jupiterx-post-content clearfix" data-dcnode-id="525"><div class="wp_geo_map wpgeo_map" data-dcnode-id="594" id="wpgeo_map_7539_1" style="width:100%;height:300px;"></div><div data-dcnode-id="537" style="text-align: justify;"><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="592" instrument_node="">Vasectomy is considered a permanent birth control method because it prevents the release of sperm during </span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vocabulary.com/dictionary/ejaculation"><span data-dcnode-id="591" instrument_node="">ejaculation</span></a><span data-dcnode-id="589" instrument_node="">. During a vasectomy, the tube (vas deferens) from each testicle is carefully clamped, sealed or cut to prevent the mixing of sperm with ejaculated </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.news-medical.net/health/What-is-Semen.aspx"><span data-dcnode-id="588" instrument_node="">semen</span></a><span data-dcnode-id="586" instrument_node="">. The testicles will continue to produce sperm but the female egg cannot be fertilized without sperm in the semen. Since the tubes are sealed off before the seminal vesicles and prostate, a man will still ejaculate the same amount of fluid.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="580"><img alt="What happens during a vasectomy procedure" class="alignright wp-image-7547 lazyloaded" data-dcnode-id="583" data-sizes="(max-width: 272px) 100vw, 272px" data-src="https://stpeteurology.com/wp-content/uploads/2017/04/image-2-200x300.jpg" data-srcset="https://stpeteurology.com/wp-content/uploads/2017/04/image-2-200x300.jpg 200w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2-768x1151.jpg 768w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2-683x1024.jpg 683w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2.jpg 1240w" height="409" sizes="(max-width: 272px) 100vw, 272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stpeteurology.com/wp-content/uploads/2017/04/image-2-200x300.jpg&amp;raw" srcset="https://stpeteurology.com/wp-content/uploads/2017/04/image-2-200x300.jpg 200w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2-768x1151.jpg 768w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2-683x1024.jpg 683w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2.jpg 1240w" title="What happens during a vasectomy procedure" width="272"><noscript data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">&lt;img class="alignright wp-image-7547" src="https://stpeteurology.com/wp-content/uploads/2017/04/image-2-200x300.jpg" alt="What happens during a vasectomy procedure" title="What happens during a vasectomy procedure" width="272" height="409" srcset="https://stpeteurology.com/wp-content/uploads/2017/04/image-2-200x300.jpg 200w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2-768x1151.jpg 768w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2-683x1024.jpg 683w, https://stpeteurology.com/wp-content/uploads/2017/04/image-2.jpg 1240w" sizes="(max-width: 272px) 100vw, 272px" /&gt;</span></noscript></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="576"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">So what happens during a vasectomy?</span></strong></p><span data-dcnode-id="575" instrument_node="">
</span><ul data-dcnode-id="555"><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">(a) The testicles and scrotum are first cleaned with antiseptic and may be shaved.</span></li><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">(b) You may be given an intravenous (IV) or oral medicine to minimize anxiety and make you sleepy. If given the medicine, you may not remember much of what happens during the procedure.</span></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">(c) The </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.google.com/%2BStPeteUrology_ReidGraves"><span data-dcnode-id="566" instrument_node="">urologist</span></a><span data-dcnode-id="564" instrument_node=""> will locate each vas deferens by touch and then inject a local anesthetic into the area.</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">(d) The doctor will make 1 or 2 small openings on the scrotum. Then through an opening, the 2 vas deferens tubes are cut, tied and stitched, or sealed. Scar tissue from the operation will help block the tubes.</span></li><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">(e) The urologist will then replace the vas deferens inside the scrotum and close the skin with stitches that dissolve on their own. A vasectomy procedure takes 10-30 minutes and can be done in a clinic or office of a urologist, general surgeon or family medicine doctor.</span></li><span data-dcnode-id="556" instrument_node="">
</span></ul><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="551"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">How does vasectomy work?</span></strong></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">The scrotum will be numb for 1 to 2 hours after the surgery. You are expected to apply cold packs to the area and get as much rest as possible while lying on your back. Wearing a jockstrap or snug underwear will protect the area and ease the discomfort. You may experience minor pain and swelling for a few days, but rarely anything more serious. After two days you can resume light work, but must wait for at least a week for heavy lifting and strenuous work.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">While you can resume sexual intercourse as soon as you feel comfortable, waiting for a week is advisable. Remember, your sperm count will not be zero and you can still get your partner pregnant, so use an alternative birth control method such as condoms until follow-up sperm count tests show no sperm in the semen, usually two months after the procedure.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="543" instrument_node="">Vasectomies are 99.85% effective, with only 1 or 2 women in 1000 getting pregnant after their partners have undergone the procedure. It will not interfere with your sex drive, sensation of orgasm, ability to ejaculate or ability to have erections. However, it is a permanent </span><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.webmd.com/sex/birth-control/"><span data-dcnode-id="542" instrument_node="">birth control</span></a><span data-dcnode-id="540" instrument_node=""> method that must only be considered by those who do not want to have children in the future. For more information on vasectomies, visit St Pete Urology in St Petersburg, Florida.</span></p><span data-dcnode-id="538" instrument_node="">
</span></div><span data-dcnode-id="536" instrument_node="">
