</span><span class="date updated" data-dcnode-id="787" style="display:none !important;"><span data-dcnode-id="788" instrument_node="">9:41 pm</span></span><span data-dcnode-id="786" instrument_node="">
</span><span class="vcard author" data-dcnode-id="783" style="display:none !important;"><span class="fn" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Martin Bastuba</span></span></span><span data-dcnode-id="782" instrument_node="">
</span><div class="cmsms_cc" data-dcnode-id="457"><span data-dcnode-id="781" instrument_node="">
</span><div class="two_third first_column" data-dcnode-id="663" data-folder="column" data-type=""><div data-dcnode-id="776" data-folder="text" data-type=""><div class="headline sdvc" data-dcnode-id="778"><h1 data-dcnode-id="779" style="margin-bottom:30px; line-height:30px;"><span data-dcnode-id="780" instrument_node="">San Diego Vasectomy Center</span></h1></div><br data-dcnode-id="777"></div><div data-dcnode-id="664" data-folder="tab" data-type="tour"><div class="tour_content" data-dcnode-id="665"><ul class="tour active" data-dcnode-id="755"><li class="current" data-dcnode-id="772"><a data-dcnode-id="773" href="#"><span data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Trust Our Experience</span></span></a></li><li data-dcnode-id="768"><a data-dcnode-id="769" href="#"><span data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">No Needle, No Scalpel</span></span></a></li><li data-dcnode-id="764"><a data-dcnode-id="765" href="#"><span data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">No Worries!</span></span></a></li><li data-dcnode-id="760"><a data-dcnode-id="761" href="#"><span data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Total Convenience</span></span></a></li><li data-dcnode-id="756"><a data-dcnode-id="757" href="#"><span data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Low Vasectomy Costs</span></span></a></li></ul><div class="tour_box_content" data-dcnode-id="667"><div class="tour_box" data-dcnode-id="734"><div class="tour_box_inner" data-dcnode-id="735"><h2 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Trust Our Experience</span></h2><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Dr. Martin Bastuba, MD FACS, has performed over 5,000 microsurgeries throughout his career and performs more than 300 vasectomies per year. Known as "</span><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">the doctor's doctor</span></strong><span data-dcnode-id="749" instrument_node="">", he is the top choice of local physicians and surgeons for vasectomy care.</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Unlike other vasectomy doctors, Dr. Bastuba is board certified in urology, with specialized training in male fertility and is a Fellow of the American College of Surgeons. He cares deeply about his patients who visit from San Diego, Southern California and, indeed, around the world.</span></p><p data-dcnode-id="739"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">There's no better choice for your vasectomy.</span></strong><br data-dcnode-id="743"><span data-dcnode-id="742" instrument_node="">“We were lucky to have had such a wonderful doctor!” - M.A.</span><em data-dcnode-id="740"><br data-dcnode-id="741"></em></p><p data-dcnode-id="736"><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sandiegovasectomycenter.com/contact-us/request-an-appointment/"><span data-dcnode-id="738" instrument_node="">Request an appointment »</span></a></p></div></div><div class="tour_box" data-dcnode-id="717"><div class="tour_box_inner" data-dcnode-id="718"><h2 data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">No Needle, No Scalpel Vasectomy</span></h2><p data-dcnode-id="727"><span data-dcnode-id="731" instrument_node="">The </span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sandiegovasectomycenter.com/%3Fp%3D53"><span data-dcnode-id="730" instrument_node="">no needle, no scalpel vasectomy</span></a><span data-dcnode-id="728" instrument_node=""> is the most advanced vasectomy technique available with virtually no pain, faster recovery times and less risk than other vasectomy procedures.</span></p><p data-dcnode-id="724"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">There will be no needles, no stitches and no sutures involved.</span></strong></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">The vasectomy is a 10 minute procedure, that will be performed from start to finish by Dr. Martin Bastuba, a male fertility and microsurgical expert. Our staff will do everything we can to ensure that you are comfortable throughout your vasectomy - we know you take that part of your body very seriously!</span></p><p data-dcnode-id="719"><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sandiegovasectomycenter.com/contact-us/contact-sdvc/"><span data-dcnode-id="721" instrument_node="">Learn More »</span></a></p></div></div><div class="tour_box" data-dcnode-id="703"><div class="tour_box_inner" data-dcnode-id="704"><h2 data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">No Worries!</span></h2><p data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">San Diego Vasectomy Center is excited to offer nitrous oxide to vasectomy patients. </span><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Nitrous oxide (commonly known as laughing gas)</span></strong><span data-dcnode-id="711" instrument_node="">, helps patients to remain calm and relaxed during the procedure. It is self administered so that the patient may increase or decrease as needed and has a 7 minute half life so the patient can even drive himself home after.</span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">As for any COVID-19 concerns: San Diego Vasectomy Center uses a special disposable mouthpiece with an additional exhalation HEPA filter. These two measures greatly minimize any possible spread of COVID-19 via airborne or superficial transmission.</span></p><p data-dcnode-id="705"><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sandiegovasectomycenter.com/contact-us/request-an-appointment/"><span data-dcnode-id="707" instrument_node="">Request an appointment »</span></a></p></div></div><div class="tour_box" data-dcnode-id="686"><div class="tour_box_inner" data-dcnode-id="687"><h2 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Total Convenience</span></h2><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">San Diego Vasectomy Center offers two convenient Southern California locations in San Diego and La Jolla.</span></p><p data-dcnode-id="695"><span data-dcnode-id="698" instrument_node="">We understand that patients have a choice in providers for their vasectomy surgery - therefore, we make every effort to go above and beyond expectations with</span><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node=""> streamlined patient intake forms, shorter waiting room times and even weekend appointments.</span></strong></p><p data-dcnode-id="688"><span data-dcnode-id="694" instrument_node="">As part of our commitment to our patients, we have introduced San Diego's first </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sandiegovasectomycenter.com/%3Fp%3D71"><span data-dcnode-id="693" instrument_node="">Executive Vasectomy Package</span></a><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sandiegovasectomycenter.com/options-costs/upgrade-executive-vasectomy/"><span data-dcnode-id="691" instrument_node="">, </span></a><span data-dcnode-id="689" instrument_node="">offering a more refined level in a serene, spa-like atmosphere in our new La Jolla vasectomy clinic.</span></p></div></div><div class="tour_box" data-dcnode-id="668"><div class="tour_box_inner" data-dcnode-id="669"><h2 data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Low Vasectomy Costs</span></h2><p data-dcnode-id="680"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Most patients pay little to nothing for a vasectomy with insurance.</span></strong><span data-dcnode-id="681" instrument_node=""> Insurance typically covers all vasectomy costs, not including deductibles and co-pays.</span></p><p data-dcnode-id="676"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The all-inclusive price for a vasectomy is $1,395 at San Diego Vasectomy Center.</span></strong><span data-dcnode-id="677" instrument_node=""> This price includes your $200 consultation fee, and is for patients without health insurance or those choosing to go out-of-network to benefit from Dr. Bastuba's expertise. We work hard to keep the quality of our vasectomy procedures high, while maintaining an affordable price for all patients.</span></p><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">Please </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sandiegovasectomycenter.com/contact-us/contact-sdvc/"><span data-dcnode-id="674" instrument_node="">contact our staff</span></a><span data-dcnode-id="672" instrument_node=""> with any questions about vasectomy insurance &amp; vasectomy cost.</span></p><br data-dcnode-id="670"></div></div></div><div class="cl" data-dcnode-id="666"></div></div></div></div><div class="one_third" data-dcnode-id="581" data-folder="column" data-type=""><div data-dcnode-id="643" data-folder="text" data-type=""><h2 data-dcnode-id="660"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sandiegovasectomycenter.com/blog" id="blog-header"><span data-dcnode-id="662" instrument_node="">Vasectomy Blog</span></a></h2><div class="hp_post_wrapper" data-dcnode-id="652"><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sandiegovasectomycenter.com/%3Fp%3D1935"><img alt="Serious mixed race male student with serious face sitting at the deck in library and using laptop for school project." class="attachment-60x60 si
