t_table_comparebutton" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Compare</span></button></div></div></div></form></section></div><p data-dcnode-id="2317"><small data-dcnode-id="2318"><em data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">*Quotes are based on single individual with less than $90,000 income and living in Sydney.</span></em></small></p><h3 class="header-underline" data-dcnode-id="2315" id="compare-all"><span data-dcnode-id="2316" instrument_node="">Compare health insurance policies from 30+ providers</span></h3><p data-dcnode-id="2312" style="text-align: center; font-color: #fa8643 !important; margin-top: 38px; margin-bottom: 38px;"><a class="luna-button luna-button--action luna-button--fluid" data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/health-insurance"><span data-dcnode-id="2314" instrument_node="">Compare Health Insurance</span></a></p><span data-dcnode-id="2311" instrument_node="">
</span><h3 class="header-underline" data-dcnode-id="2307" id="how-does-private-health-insurance-cover-insulin-pumps"><span data-dcnode-id="2308" instrument_node="">How does private health insurance cover insulin pumps?</span></h3><p data-dcnode-id="2302"><span data-dcnode-id="2306" instrument_node="">The </span><i data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Private Health Insurance Act 2007</span></i><span data-dcnode-id="2303" instrument_node=""> says private health funds must meet the cost of insulin pumps under either their hospital cover or general treatment cover for gold-tier policies. However, the level of cover provided varies depending on factors, including whether you receive the pump as part of hospital treatment or not.</span></p><div class="u-grid" data-dcnode-id="2286" style="padding-bottom: 20px;"><div class="u-grid__col u-1/5@s" data-dcnode-id="2299"><span data-dcnode-id="2301" instrument_node=""> </span><img alt="Hospital icon" class="aligncenter size-full wp-image-2490626" data-dcnode-id="2300" data-queued="true" data-sizes="(max-width: 210px) 100vw, 210px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2021/06/hospital_flaticon_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/06/hospital_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/06/hospital_flaticon_512x512.png?fit=210 210w" height="70" sizes="(max-width: 210px) 100vw, 210px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/finder-au/wp-uploads/2021/06/hospital_flaticon_512x512.png&amp;raw" srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/06/hospital_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/06/hospital_flaticon_512x512.png?fit=210 210w" title="Icon by Good Ware from www.flaticon.com" width="70"></div><div class="u-grid__col u-4/5@s" data-dcnode-id="2287"><h4 data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">In hospital</span></h4><p data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">        If you're hospitalised due to diabetes and receive an insulin pump, and if you have an adequate level of hospital cover in place, your health fund is required to provide cover for:</span></p><ul class="list-4" data-dcnode-id="2288"><li data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">The cost of the insulin pump</span></li><li data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">Your hospital accommodation fees</span></li><li data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Your doctor's fees</span></li></ul></div></div><div class="u-grid" data-dcnode-id="2278" style="padding-bottom: 20px;"><div class="u-grid__col u-1/5@s" data-dcnode-id="2284"><img alt="Home icon" class="aligncenter size-full wp-image-2490626" data-dcnode-id="2285" data-queued="true" data-sizes="(max-width: 210px) 100vw, 210px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2016/12/home_flaticon_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2016/12/home_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2016/12/home_flaticon_512x512.png?fit=210 210w" height="70" sizes="(max-width: 210px) 100vw, 210px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/finder-au/wp-uploads/2016/12/home_flaticon_512x512.png&amp;raw" srcset="https://www.finder.com.au/finder-au/wp-uploads/2016/12/home_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2016/12/home_flaticon_512x512.png?fit=210 210w" title="Icon from by freepik www.flaticon.com" width="70"></div><div class="u-grid__col u-4/5@s" data-dcnode-id="2279"><h4 data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Out of hospital</span></h4><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">        If you do not need to be hospitalised in order to receive an insulin pump, then your health fund may or may not cover your costs. You'll need to check whether your fund covers the cost of an insulin pump where hospitalisation is not required.    </span></p></div></div><div class="u-grid" data-dcnode-id="2266" style="padding-bottom: 20px;"><div class="u-grid__col u-1/5@s" data-dcnode-id="2275"><span data-dcnode-id="2277" instrument_node=""> </span><img alt="Diabetes icon" class="aligncenter size-full wp-image-2490626" data-dcnode-id="2276" data-queued="true" data-sizes="(max-width: 210px) 100vw, 210px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes_flaticon_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes_flaticon_512x512.png?fit=210 210w" height="70" sizes="(max-width: 210px) 100vw, 210px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes_flaticon_512x512.png&amp;raw" srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes_flaticon_512x512.png?fit=210 210w" title="Icon made by itim2101 from www.flaticon.com" width="70"></div><div class="u-grid__col u-4/5@s" data-dcnode-id="2267"><h4 data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">Other diabetes coverage</span></h4><p data-dcnode-id="2268"><span data-dcnode-id="2272" instrument_node="">            Depending on your health fund and the </span><a data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/health-insurance/extras-cover" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2271" instrument_node="">level of extras cover</span></a><span data-dcnode-id="2269" instrument_node=""> you have, you may receive a benefit for other costs, including blood glucose monitoring devices, test strips and meters. The cost of consumables or sensors is not typically included in this cover, but some health funds will also cover the cost of dietary education services. Check with your health fund for details.        </span></p></div></div><article class="luna-card luna-card--shadow" data-dcnode-id="2215"><div class="luna-card__block" data-dcnode-id="2216"><h3 class="header-underline" data-dcnode-id="2264" id="case-study-caitlin-s-diabetes-and-private-health-insurance"><span data-dcnode-id="2265" instrument_node="">Case study: Caitlin's diabetes and private health insurance</span></h3><p data-dcnode-id="2261"><span data-dcnode-id="2263" instrument_node=""> </span><img alt="Caitlin case study" class="aligncenter size-full wp-image-2490626" data-dcnode-id="2262" data-queued="true" data-sizes="(max-width: 450px) 100vw, 450px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png?fit=360 360w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png?fit=450 450w" height="150" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png&amp;raw" srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png?fit=360 360w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/caitlin-case-study_unsplash_512x512.png?fit=450 450w" title="Caitlin case study (unsplash)" width="150"></p><div class="u-grid" data-dcnode-id="2253"><div class="u-grid__col u-1/3@s" data-dcnode-id="2256"><span data-dcnode-id="2260" instrument_node=""> </span><strong data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">What type of diabetes do you have?</span></strong><span data-dcnode-id="2257" instrument_node=""> </span></div><div class="u-grid__col u-2/3@s" data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">        "I've have type 1 diabetes since I was 13 years old (I'm 26 now)."    </span></div></div><div class="u-grid" data-dcnode-id="2245"><div class="u-grid__col u-1/3@s" data-dcnode-id="2248"><span data-dcnode-id="2252" instrument_node=""> </span><strong data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">How do you treat your diabetes?</span></strong><span data-dcnode-id="2249" instrument_node=""> </span></div><div class="u-grid__col u-2/3@s" data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">        "With an insulin pump. I take a short acting insulin intravenously throughout the day, administered via an insulin pump."    </span></div></div><div class="u-grid" data-dcnode-id="2237"><div class="u-grid__col u-1/3@s" data-dcnode-id="2240"><span data-dcnode-id="2244" instrument_node=""> </span><strong data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">Do you have health insurance?</span></strong><span data-dcnode-id="2241" instrument_node=""> </span></div><div class="u-grid__col u-2/3@s" data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">        "I am with ahm and have its Silver Plus Hospital and Lifestyle Extras cover. I'm currently looking at changing this policy as after the price increase it will be costing me a fair bit each month – over $140 a month."    </span></div></div><div class="u-grid" data-dcnode-id="2229"><div class="u-grid__col u-1/3@s" data-dcnode-id="2232"><span data-dcnode-id="2236" instrument_node=""> </span><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Was your insulin pump covered by your health fund?</span></strong><span data-dcnode-id="2233" instrument_node=""> </span></div><div class="u-grid__col u-2/3@s" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">        "My current insurance policy covers the cost of an insulin pump every 4 years, if my health professional says it's a necessary item and completes all the paperwork."    </span></div></div><div class="u-grid" data-dcnode-id="2221"><div class="u-grid__col u-1/3@s" data-dcnode-id="2224"><span data-dcnode-id="2228" instrument_node=""> </span><strong data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Did you have any issues with getting health insurance?</span></strong><span data-dcnode-id="2225" instrument_node=""> </span></div><div class="u-grid__col u-2/3@s" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">        "Not so far. The only issues I've had are the cost of the pump and understanding the fine print of each policy (i.e. finding out information specific to the insulin pump)."    </span></div></div><div data-dcnode-id="2217" style="text-align: center;"><span data-dcnode-id="2220" instrument_node=""> </span><a class="luna-button luna-button--primary" data-dcnode-id="2218" href="#compare-all" role="button"><span data-dcnode-id="2219" instrument_node="">Compare polices from 30+ providers</span></a></div></div></article><h3 class="header-underline" data-dcnode-id="2213" id="what-are-the-different-types-of-diabetes"><span data-dcnode-id="2214" instrument_node="">What are the different types of diabetes?</span></h3><article class="luna-card luna-card--alt" data-dcnode-id="2111" style="border-radius: 8px;"><div class="luna-card__block" data-dcnode-id="2112" style="margin: 20px;"><ul class="nav nav-tabs pb-tabs" data-dcnode-id="2200"><li class="active" data-dcnode-id="2210"><a data-dcnode-id="2211" data-toggle="tab" href="#tab8356"><span data-dcnode-id="2212" instrument_node="">Type 1 diabetes</span></a></li><li class="" data-dcnode-id="2207"><a data-dcnode-id="2208" data-toggle="tab" href="#tab1867"><span data-dcnode-id="2209" instrument_node="">Type 2 diabetes</span></a></li><li class="" data-dcnode-id="2204"><a data-dcnode-id="2205" data-toggle="tab" href="#tab7698"><span data-dcnode-id="2206" instrument_node="">Gestational diabetes</span></a></li><li class="" data-dcnode-id="2201"><a data-dcnode-id="2202" data-toggle="tab" href="#tab3494"><span data-dcnode-id="2203" instrument_node="">Prediabetes</span></a></li></ul><div class="tab-content" data-dcnode-id="2113"><div class="tab-pane active" data-dcnode-id="2174" id="tab8356"><div class="u-grid" data-dcnode-id="2175"><div class="u-grid__col u-1/5@s" data-dcnode-id="2194"><p data-dcnode-id="2197"><span data-dcnode-id="2199" instrument_node=""> </span><img alt="Type 1 diabetes" class="aligncenter size-full wp-image-2490626" data-dcnode-id="2198" data-queued="true" data-sizes="(max-width: 210px) 100vw, 210px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-1_flaticon_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-1_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-1_flaticon_512x512.png?fit=210 210w" height="70" sizes="(max-width: 210px) 100vw, 210px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-1_flaticon_512x512.png&amp;raw" srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-1_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-1_flaticon_512x512.png?fit=210 210w" title="Icon made by itim2101, Pixel Buddha from www.flaticon.com" width="70"></p><h4 data-dcnode-id="2195" style="text-align: center;"><span data-dcnode-id="2196" instrument_node="">Type 1 diabetes</span></h4></div><div class="u-grid__col u-4/5@s" data-dcnode-id="2176"><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">        Type 1 diabetes is a hereditary auto-immune condition that accounts for 1 in 10 Australian diabetics. Also known as insulin-dependent diabetes, type 1 diabetes sees the body attack insulin-producing cells in the pancreas. Symptoms include:</span></p><ul data-dcnode-id="2181"><li data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Excessive thirst</span></li><li data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Excessive urination</span></li><li data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Unexplained weight loss</span></li><li data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Fatigue and weakness</span></li><li data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Blurred vision</span></li></ul><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Skipping a meal or exercising heavily can also cause the patient's blood sugar levels to fall, which can lead to hypoglycaemia.</span></p><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">Type 1 diabetes is typically diagnosed before the age of 30 and those with the condition require insulin injections in order to effectively process glucose. While there is no cure for type 1 diabetes, it can be managed with insulin injections as well as proper diet and exercise.</span></p></div></div></div><div class="tab-pane" data-dcnode-id="2142" id="tab1867"><div class="u-grid" data-dcnode-id="2143"><div class="u-grid__col u-1/5@s" data-dcnode-id="2168"><p data-dcnode-id="2171"><span data-dcnode-id="2173" instrument_node=""> </span><img alt="Type 2 diabetes" class="aligncenter size-full wp-image-2490625" data-dcnode-id="2172" data-queued="true" data-sizes="(max-width: 210px) 100vw, 210px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-2_flaticon_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-2_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/diabetes-type-2_flaticon_512x512.png?fit=210 210w" height="70" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5IiBoZWlnaHQ9IjUiIHN0eWxlPSJiYWNrZ3JvdW5kLWNvbG9yOiAjRjVGNkY3OyIvPg==" title="Icon made by itim2101, Pixel Buddha from www.flaticon.com" width="70"></p><h4 data-dcnode-id="2169" style="text-align: center;"><span data-dcnode-id="2170" instrument_node="">Type 2 diabetes</span></h4></div><div class="u-grid__col u-4/5@s" data-dcnode-id="2144"><p data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">        Type 2 diabetes is a much more common condition in Australia, representing up to 90% of all cases of diabetes. Also referred to as non-insulin-dependent diabetes, it is a progressive auto-immune condition that occurs as the body stops responding to the effects of insulin. This means carbohydrates and sugars are not properly metabolised, and the condition usually occurs in adults over 45 years of age.</span></p><p data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Obesity, insufficient exercise and poor diet are all contributing factors to the onset of type 2 diabetes, but there is currently no cure for the condition. Many people with type 2 diabetes have no symptoms, but some symptoms to keep an eye out for include:</span></p><ul data-dcnode-id="2147"><li data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Excessive thirst and urination</span></li><li data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Feeling tired and lethargic</span></li><li data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Feeling hungry all the time</span></li><li data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Dizziness and mood swings</span></li><li data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Blurred vision</span></li><li data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Itching and skin infections</span></li><li data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Gradually putting on weight</span></li><li data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Leg cramps</span></li></ul><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Type 2 diabetes can be managed with healthy eating, regular exercise and sometimes medication.</span></p></div></div></div><div class="tab-pane" data-dcnode-id="2125" id="tab7698"><div class="u-grid" data-dcnode-id="2126"><div class="u-grid__col u-1/5@s" data-dcnode-id="2136"><p data-dcnode-id="2139"><span data-dcnode-id="2141" instrument_node=""> </span><img alt="Gestational diabetes" class="aligncenter size-full wp-image-2490625" data-dcnode-id="2140" data-queued="true" data-sizes="(max-width: 210px) 100vw, 210px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2021/07/pregnant_flaticon_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/pregnant_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/pregnant_flaticon_512x512.png?fit=210 210w" height="70" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5IiBoZWlnaHQ9IjUiIHN0eWxlPSJiYWNrZ3JvdW5kLWNvbG9yOiAjRjVGNkY3OyIvPg==" title="Icon made by freepik from www.flaticon.com" width="70"></p><h4 data-dcnode-id="2137" style="text-align: center;"><span data-dcnode-id="2138" instrument_node="">Gestational diabetes</span></h4></div><div class="u-grid__col u-4/5@s" data-dcnode-id="2127"><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">        Gestational diabetes is diabetes that occurs during pregnancy. It affects 5-10% of pregnant women but usually goes away once the baby has been born.</span></p><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">A woman's likelihood of developing gestational diabetes is influenced by a range of factors, including a family history of type 2 diabetes, being overweight, and being from certain ethnic backgrounds.</span></p><p data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Gestational diabetes can be managed through healthy eating, regular exercise and monitoring your blood glucose levels. Most women with gestational diabetes have a normal pregnancy and a healthy baby, if the condition is not properly managed it can lead to a large baby, miscarriage or stillbirth.</span></p><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Once the pregnancy is over, blood glucose levels return to normal and gestational diabetes disappears, but women who suffer from the condition have an increased risk of developing type 2 diabetes later in life.</span></p></div></div></div><div class="tab-pane" data-dcnode-id="2114" id="tab3494"><div class="u-grid" data-dcnode-id="2115"><div class="u-grid__col u-1/5@s" data-dcnode-id="2119"><p data-dcnode-id="2122"><span data-dcnode-id="2124" instrument_node=""> </span><img alt="Prediabetes blood drop" class="aligncenter size-full wp-image-2490625" data-dcnode-id="2123" data-queued="true" data-sizes="(max-width: 210px) 100vw, 210px" data-src="https://www.finder.com.au/finder-au/wp-uploads/2021/07/blood-type_flaticon_512x512.png" data-srcset="https://www.finder.com.au/finder-au/wp-uploads/2021/07/blood-type_flaticon_512x512.png?fit=180 180w, https://www.finder.com.au/finder-au/wp-uploads/2021/07/blood-type_flaticon_512x512.png?fit=210 210w" height="70" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5IiBoZWlnaHQ9IjUiIHN0eWxlPSJiYWNrZ3JvdW5kLWNvbG9yOiAjRjVGNkY3OyIvPg==" title="Icon made by freepik from www.flaticon.com" width="70"></p><h4 data-dcnode-id="2120" style="text-align: center;"><span data-dcnode-id="2121" instrument_node="">Prediabetes</span></h4></div><div class="u-grid__col u-4/5@s" data-dcnode-id="2116"><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">        Prediabetes refers to a condition where the body has higher-than-normal blood glucose levels, although not high enough for you to be diagnosed with full diabetes. While prediabetes does not have any signs or symptoms, sufferers are more likely to develop type 2 diabetes or cardiovascular disease later in life. Treatment involves sustained lifestyle changes, including regular exercise and healthy eating.</span></p></div></div></div></div></div></article><h3 class="header-underline" data-dcnode-id="2109" id="frequently-asked-questions"><span data-dcnode-id="2110" instrument_node="">Frequently asked questions</span></h3><ul class="luna-accordionGroup accordionGroup" data-dcnode-id="1914" itemscope="" itemtype="https://schema.org/FAQPage"><li class="luna-accordion" data-accordion="accordion" data-dcnode-id="2074" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="2108" instrument_node="">

</span><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Health insurance with insulin pump coverage typically has a 2-month waiting period if you do not have a pre-existing condition. If you have a pre-existing condition, there will be a 12-month waiting period before you can receive a benefit.</span></p><span data-dcnode-id="2009" instrument_node="">

</span><button aria-controls="faq-builder-0000000006" aria-expanded="false" class="luna-accordion__action collapsed" data-dcnode-id="1984" data-target="#faq-builder-0000000006" data-toggle="collapse"><span data-dcnode-id="1997" instrument_node="">
</span><span class="luna-accordion__title" data-dcnode-id="1995" itemprop="name"><span data-dcnode-id="1996" instrument_node="">Am I covered if my insulin pump needs replacing?</span></span><span data-dcnode-id="1994" instrument_node="">
</span><svg aria-hidden="true" class="luna-icon" data-dcnode-id="1985"><use data-accordion-icon="show" data-dcnode-id="1990" xlink:href="#add"><svg data-dcnode-id="1991" id="add" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" data-dcnode-id="1993"></path><path d="M0 0h24v24H0z" data-dcnode-id="1992" fill="none"></path></svg></use><use data-dcnode-id="1986" xlink:href="#remove"><svg data-dcnode-id="1987" id="remove" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 13H5v-2h14v2z" data-dcnode-id="1989"></path><path d="M0 0h24v24H0z" data-dcnode-id="1988" fill="none"></path></svg></use></svg></button><span data-dcnode-id="1983" instrument_node="">
</span></h5><span data-dcnode-id="1981" instrument_node="">
</span></div><span data-dcnode-id="1979" instrument_node="">
</span><div aria-hidden="true" class="luna-accordion__details collapse" data-accordion="details" data-dcnode-id="1963" id="faq-builder-0000000006"><span data-dcnode-id="1978" instrument_node="">
</span><div class="accordionContent" data-dcnode-id="1965" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="1977" instrument_node="">
</span><div data-dcnode-id="1967" itemprop="text"><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">If you need to replace an insulin pump, most funds will only pay benefits if you have used your existing pump for a specified period of time. Although those time limits vary between funds, they're commonly around 4 or 5 years. With this in mind, check with your fund to find out what benefits you are eligible for before you have an insulin pump replaced.</span></p><p data-dcnode-id="1969"><span data-dcnode-id="1973" instrument_node="">If your pump needs to be repaired it may be under warranty, so get in touch with the manufacturer to find out whether it will be covered. If the warranty period has ended or the repair is simply not covered, check with your </span><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/health-insurance/best-health-insurance" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1972" instrument_node="">private health fund</span></a><span data-dcnode-id="1970" instrument_node=""> to see if it will provide the financial support you need.</span></p><span data-dcnode-id="1968" instrument_node="">
</span></div><span data-dcnode-id="1966" instrument_node="">
</span></div><span data-dcnode-id="1964" instrument_node="">
</span></div><span data-dcnode-id="1962" instrument_node="">
</span></li><span data-dcnode-id="1960" instrument_node="">
</span><li class="luna-accordion" data-accordion="accordion" data-dcnode-id="1916" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="1959" instrument_node="">
</span><div class="luna-accordion__summary" data-dcnode-id="1939"><span data-dcnode-id="1958" instrument_node="">

</span><button aria-controls="faq-builder-0000000007" aria-expanded="false" class="luna-accordion__action collapsed" data-dcnode-id="1943" data-target="#faq-builder-0000000007" data-toggle="collapse"><span data-dcnode-id="1956" instrument_node="">
</span><span class="luna-accordion__title" data-dcnode-id="1954" itemprop="name"><span data-dcnode-id="1955" instrument_node="">Are insulin pumps on the Protheses List?</span></span><span data-dcnode-id="1953" instrument_node="">
</span><svg aria-hidden="true" class="luna-icon" data-dcnode-id="1944"><use data-accordion-icon="show" data-dcnode-id="1949" xlink:href="#add"><svg data-dcnode-id="1950" id="add" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" data-dcnode-id="1952"></path><path d="M0 0h24v24H0z" data-dcnode-id="1951" fill="none"></path></svg></use><use data-dcnode-id="1945" xlink:href="#remove"><svg data-dcnode-id="1946" id="remove" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 13H5v-2h14v2z" data-dcnode-id="1948"></path><path d="M0 0h24v24H0z" data-dcnode-id="1947" fill="none"></path></svg></use></svg></button><span data-dcnode-id="1942" instrument_node="">
</span></h5><span data-dcnode-id="1940" instrument_node="">
</span></div><span data-dcnode-id="1938" instrument_node="">
</span><div aria-hidden="true" class="luna-accordion__details collapse" data-accordion="details" data-dcnode-id="1918" id="faq-builder-0000000007"><span data-dcnode-id="1937" instrument_node="">
</span><div class="accordionContent" data-dcnode-id="1920" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="1936" instrument_node="">
</span><div data-dcnode-id="1922" itemprop="text"><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1934" instrument_node="">Yes, insulin pumps are included in Section C of the Australian Government's Prostheses List. This means they are guaranteed a permanent place on the list. Private hospital cover from Australian health funds which include cover for prostheses must pay a benefit for an </span><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/health-insurance-for-prostheses" rel="noopener noreferrer" target="_blank" title="Prostheses list"><span data-dcnode-id="1933" instrument_node="">insulin pump on the Prostheses List</span></a><span data-dcnode-id="1931" instrument_node=""> when:</span></p><ul class="list-1" data-dcnode-id="1923"><li data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">The pump is provided during a service for which Medicare offers a benefit.</span></li><li data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">The service is provided by a consultant health care professional.</span></li><li data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">The service is a certified Type C procedure for which hospitalisation was necessary due to your medical condition or other circumstances.</span></li></ul></div><span data-dcnode-id="1921" instrument_node="">
</span></div><span data-dcnode-id="1919" instrument_node="">
</span></div><span data-dcnode-id="1917" instrument_node="">
</span></li><span data-dcnode-id="1915" instrument_node="">
</span></ul><div data-dcnode-id="1910" style="text-align: center;  padding-bottom: 20px;"><span data-dcnode-id="1913" instrument_node=""> </span><a class="luna-button luna-button--primary" data-dcnode-id="1911" href="#compare-all" role="button"><span data-dcnode-id="1912" instrument_node="">Compare polices from 30+ providers</span></a></div><p data-dcnode-id="1906"><sup data-dcnode-id="1907"><sub data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Icons made by Good Ware, itim2101, Pixel Buddha, Freepik from www.flaticon.com</span></sub></sup></p><div class="sources" data-dcnode-id="1877" data-expand=""><span data-dcnode-id="1905" instrument_node="">

</span><h3 data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Important information about this website</span></h3><span data-dcnode-id="287" instrument_node="">
</span></div><span data-dcnode-id="285" instrument_node="">
</span><div class="modal-body" data-dcnode-id="241"><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="283" instrument_node="">finder.com.au is one of Australia's leading comparison websites. We compare from a wide set of banks, insurers and product issuers. We value our editorial independence and follow </span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/editorial-guidelines" rel="nofollow"><span data-dcnode-id="282" instrument_node="">editorial guidelines</span></a><span data-dcnode-id="280" instrument_node="">.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">finder.com.au has access to track details from the product issuers listed on our sites. Although we provide information on the products offered by a wide range of issuers, we don't cover every available product or service.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Please note that the information published on our site should not be construed as personal advice and does not consider your personal needs and circumstances. While our site will provide you with factual information and general advice to help you make better decisions, it isn't a substitute for professional advice. You should consider whether the products or services featured on our site are appropriate for your needs. If you're unsure about anything, seek professional advice before you apply for any product or commit to any plan.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Products marked as 'Promoted' or 'Advertisement' are prominently displayed either as a result of a commercial advertising arrangement or to highlight a particular product, provider or feature. Finder may receive remuneration from the Provider if you click on the related link, purchase or enquire about the product. Finder's decision to show a 'promoted' product is neither a recommendation that the product is appropriate for you nor an indication that the product is the best in its category. We encourage you to use the tools and information we provide to compare your options.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="268" instrument_node="">Where our site links to particular products or displays 'Go to site' buttons, we may receive a commission, referral fee or payment when you click on those buttons or apply for a product. You can learn more about how we make money </span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/how-we-make-money" rel="nofollow"><span data-dcnode-id="267" instrument_node="">here</span></a><span data-dcnode-id="265" instrument_node="">.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">When products are grouped in a table or list, the order in which they are initially sorted may be influenced by a range of factors including price, fees and discounts; commercial partnerships; product features; and brand popularity. We provide tools so you can sort and filter these lists to highlight features that matter to you.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">We try to take an open and transparent approach and provide a broad-based comparison service. However, you should be aware that while we are an independently owned service, our comparison service does not include all providers or all products available in the market.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Some product issuers may provide products or offer services through multiple brands, associated companies or different labelling arrangements. This can make it difficult for consumers to compare alternatives or identify the companies behind the products. However, we aim to provide information to enable consumers to understand these issues.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Providing or obtaining an estimated insurance quote through us does not guarantee you can get the insurance. Acceptance by insurance companies is based on things like occupation, health and lifestyle. By providing you with the ability to apply for a credit card or loan, we are not guaranteeing that your application will be approved. Your application for credit products is subject to the Provider's terms and conditions as well as their application and lending criteria.</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="250" instrument_node="">Please read our website </span><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/terms-and-conditions" rel="nofollow"><span data-dcnode-id="249" instrument_node="">terms of use</span></a><span data-dcnode-id="247" instrument_node=""> and </span><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.finder.com.au/privacy-policy" rel="nofollow"><span data-dcnode-id="246" instrument_node="">privacy policy</span></a><span data-dcnode-id="244" instrument_node=""> for more information about our services and our approach to privacy.</span></p><span data-dcnode-id="242" instrument_node="">
