</span><h1 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">AHCIP Alberta Coverage Summary</span></h1><span data-dcnode-id="669" instrument_node="">
</span><h2 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Alberta Health Care Insurance Plan (AHCIP)</span></h2><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Alberta’s provincial healthcare plan or the AHCIP coverage summary, which stands for Alberta Health Care Insurance Plan.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">The following is a summary of AHCIP benefits and coverage.Affordable Health &amp; Dental Plans</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">We offer health plans that:</span></p><span data-dcnode-id="657" instrument_node="">
</span><ul data-dcnode-id="645"><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Have no medical questions.</span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Are guaranteed acceptance.</span></li><li data-dcnode-id="646"><span data-dcnode-id="652" instrument_node="">Come with instant,&nbsp;</span><strong data-dcnode-id="648"><span data-dcnode-id="651" instrument_node="">online&nbsp;</span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthquotes.ca/guaranteed-issue/guaranteed-issue-instant-quotes/%3FsProvPlan%3DAlberta"><span data-dcnode-id="650" instrument_node="">quotes</span></a></strong><span data-dcnode-id="647" instrument_node="">.</span></li></ul><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">Health and dental coverage starting from&nbsp;</span><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">$76.10</span></strong><span data-dcnode-id="640" instrument_node="">&nbsp;per month!</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">All residents of Alberta must register themselves and their dependents with AHCIP in order to qualify for benefits.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Generally speaking, any service that is deemed medically necessary is covered by AHCIP.</span></p><span data-dcnode-id="632" instrument_node="">
</span><h3 data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Expenses/Services Covered by AHCIP</span></h3><span data-dcnode-id="629" instrument_node="">
</span><ul data-dcnode-id="606"><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Services deemed medically necessary by a qualified physician (applies to all services listed below).</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Standard hospital wards (semi-private and private rooms ONLY if medically required, which is rare).</span></li><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Medically necessary nursing services.</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">One eye examination for seniors (aged 65 and up) and children aged 18 and under per year.</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Laboratory and diagnostic procedures.</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Medications that are administered in a hospital.</span></li><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Partial coverage for some oral, dental and maxillofacial surgeries.</span></li><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Ambulance transportation from one medical facility to another.</span></li><li data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Vasectomies (but not vasectomy reversal).</span></li><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Bariatric surgery for residents who qualify via the Alberta Weight Wise program.</span></li><li data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Psychiatrists (psychologists not covered).</span></li></ul><span data-dcnode-id="605" instrument_node="">
</span><h3 data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Expenses Not Covered by AHCIP</span></h3><span data-dcnode-id="602" instrument_node="">
</span><ul data-dcnode-id="568"><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Cosmetic surgery unless deemed medically necessary. Examples are vasectomy reversals, abdominoplasty (tummy tuck) and breast reductions (mammoplasty).</span></li><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Prescription drugs obtained outside of a hospital or nursing home (however, there are specialty programs, see below for more information).</span></li><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Eye exams for residents aged 19-64 UNLESS deemed medically necessary as a result of some trauma.</span></li><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Routine dental treatment (e.g. cleanings, fillings and extractions).</span></li><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Ambulance transportation (except between medical facilities).</span></li><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Vision care such as glasses, laser eye surgery and contact lenses.</span></li><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Health services provided by people who are not physicians (e.g. massage therapists, chiropractors, acupuncturists, physiotherapists, naturopaths, nutritionists, psychologists, homeopaths and nurse practitioners). Note: services such as physiotherapy may be covered if performed in a hospital and deemed medically necessary.</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Hearing aids.</span></li><li data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">Surgical and medical appliances, prosthetics, wheelchairs and other mobility devices. Note that basic medical equipment MAY be covered via the&nbsp;</span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alberta.ca/alberta-aids-to-daily-living.aspx"><span data-dcnode-id="584" instrument_node="">Alberta Aids to Daily Living</span></a><span data-dcnode-id="582" instrument_node="">&nbsp;program.</span></li><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Publicly funded services (e.g. funded by Alberta Health Services) performed OUTSIDE of Alberta. For example: midwivery, physiotherapy, cancer and homecare services, optometry and podiatry services, etc.</span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Clinical psychologist services.</span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Contact lenses and eye glasses.</span></li><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Semi-private and private hospital rooms UNLESS medically necessary.</span></li><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Medical advice obtained over the telephone.</span></li><li data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Dentures.</span></li></ul><span data-dcnode-id="567" instrument_node="">
</span><h3 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Services that are Partially Covered</span></h3><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">The following are partially covered by AHCIP:</span></p><span data-dcnode-id="561" instrument_node="">
</span><ul data-dcnode-id="549"><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Podiatry: some, although not all, podiatry services are covered up to a maximum of $250 per year. Contact the Alberta government for further details.</span></li><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Some dental, oral and maxillofacial surgical services if deemed medically necessary.</span></li><li data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">Some dental benefits for seniors with low to moderate incomes (see the&nbsp;</span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alberta.ca/dental-optical-assistance-seniors.aspx"><span data-dcnode-id="555" instrument_node="">Dental and Optical Assistance for Seniors Program</span></a><span data-dcnode-id="553" instrument_node="">).</span></li><li data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Partial or full coverage for some optometry costs if treatment is required as a result of specific medical conditions. Contact the Alberta government for further details.</span></li></ul><span data-dcnode-id="548" instrument_node="">
</span><h3 data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Prescription Drug Coverage Programs</span></h3><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The following lists specialty AHCIP prescription drug programs:</span></p><span data-dcnode-id="542" instrument_node="">
</span><h4 data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Outpatient Cancer Drug Benefit Program</span></h4><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Certain medications used to directly treat cancer are covered.</span></p><span data-dcnode-id="536" instrument_node="">
</span><h4 data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Specialized High Cost Drug Program</span></h4><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Some funding is available for drugs used in specialized procedures such as organ transplants and major heart surgery.</span></p><span data-dcnode-id="530" instrument_node="">
</span><h4 data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Retina Anti-Vascular Endothelial Growth Factor Program for Intraocular Disease</span></h4><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">The RAPD program offers coverage for Avastin, Lucentis and Eylea, drugs which are used to slow down loss of vision.</span></p><span data-dcnode-id="524" instrument_node="">
</span><h4 data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Insulin Pump Therapy Program</span></h4><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">designed for Albertans who have Type 1 or Type 3 diabetes. Covers the cost of an insulin pump and associated supplies.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">– for full details go to the&nbsp;</span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alberta.ca/ahcip.aspx"><span data-dcnode-id="516" instrument_node="">Alberta government’s health plan</span></a><span data-dcnode-id="514" instrument_node="">&nbsp;web site –</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="511" instrument_node="">Protect yourself from costs not covered by AHCIP. Get free, instant&nbsp;</span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthquotes.ca/individual/health-insurance-quotes/%3FsProvPlan%3DAlberta"><span data-dcnode-id="510" instrument_node="">health insurance quotes</span></a><span data-dcnode-id="508" instrument_node="">!</span><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">(please consider sharing this article)</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="501"><em data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Last updated March, 2019</span></em></p><span data-dcnode-id="500" instrument_node="">
