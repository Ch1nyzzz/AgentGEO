node=""> </span><div class="article-header__category" data-dcnode-id="601" data-v-32314f5a=""><a class="article-header__category-link" data-dcnode-id="602" data-v-32314f5a="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.embracepetinsurance.com/waterbowl/medical/"><span data-dcnode-id="603" instrument_node="">

		</span></a></div></header><span data-dcnode-id="599" instrument_node=""> </span><div class="blog__content" data-dcnode-id="537" data-v-033d575e=""><span data-dcnode-id="598" instrument_node=""> </span><div class="article__content" data-dcnode-id="538" data-v-033d575e="" data-v-97e9a980=""><picture class="picture article__image" data-dcnode-id="588" data-v-033d575e="" data-v-97e9a980="" data-v-afa99398=""><source data-dcnode-id="597" data-v-afa99398="" media="(min-width: 1024px)" srcset="//images.ctfassets.net/nx3pzsky0bc9/3U5PgjCMwPz7sK2qDKrcrX/41e519b57bdf2514f5bd2833e76f15f9/doberman-getting-and-iv-at-the-vet.jpg?w=806&amp;fm=webp" type="image/webp"><source data-dcnode-id="596" data-v-afa99398="" media="(min-width: 768px)" srcset="//images.ctfassets.net/nx3pzsky0bc9/3U5PgjCMwPz7sK2qDKrcrX/41e519b57bdf2514f5bd2833e76f15f9/doberman-getting-and-iv-at-the-vet.jpg?w=933&amp;fm=webp" type="image/webp"><span data-dcnode-id="595" instrument_node=""> </span><source data-dcnode-id="594" data-v-afa99398="" media="(min-width: 1024px)" srcset="//images.ctfassets.net/nx3pzsky0bc9/3U5PgjCMwPz7sK2qDKrcrX/41e519b57bdf2514f5bd2833e76f15f9/doberman-getting-and-iv-at-the-vet.jpg?w=806" type="image/jpeg"><source data-dcnode-id="593" data-v-afa99398="" media="(min-width: 768px)" srcset="//images.ctfassets.net/nx3pzsky0bc9/3U5PgjCMwPz7sK2qDKrcrX/41e519b57bdf2514f5bd2833e76f15f9/doberman-getting-and-iv-at-the-vet.jpg?w=933" type="image/jpeg"><span data-dcnode-id="592" instrument_node=""> </span><source data-dcnode-id="591" data-v-afa99398="" srcset="//images.ctfassets.net/nx3pzsky0bc9/3U5PgjCMwPz7sK2qDKrcrX/41e519b57bdf2514f5bd2833e76f15f9/doberman-getting-and-iv-at-the-vet.jpg?w=355&amp;fm=webp" type="image/webp"><span data-dcnode-id="590" instrument_node=""> </span><img alt="doberman getting and IV at the vet" class="picture__img" data-dcnode-id="589" data-v-afa99398="" height="186" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/nx3pzsky0bc9/3U5PgjCMwPz7sK2qDKrcrX/41e519b57bdf2514f5bd2833e76f15f9/doberman-getting-and-iv-at-the-vet.jpg%3Fw%3D355&amp;raw" width="355"></picture><span data-dcnode-id="587" instrument_node=""> </span><div class="o-rich-text o-rich-text article__body" data-dcnode-id="539" data-v-033d575e="" data-v-97e9a980=""><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">I’ve been blogging and writing columns for pet health publications for nearly a decade now. Which means a sizable amount of mail comes my way on the subject of individual pet concerns.</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Of all these missives (I’m probably up to ten unique queries a day), the most popular question outstrips all other subjects by a lot. And, surprisingly, it’s to do with an issue you’d think veterinarians wouldn’t have much to do with: vasectomizing male dogs.</span></p><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Yes, the single most commonly queried issue has to do with how to source a vasectomy for dogs. Apparently, it’s near impossible to find veterinarians willing to tackle this simple procedure. Whether we’re talking California, New York, Miami, or the sum total of all the progressive places in between, vasectomy is currently not considered an alternative to traditional castration of dogs. Not by the vast majority of veterinarians, anyway.</span></p><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Which is endlessly frustrating to pet owners who have read my articles advancing vasectomy as a safe and effective approach to sterilizing their male dogs.</span></p><p data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">Yes, I’ll confess: I brought all these questions upon myself after I started thinking about vasectomies for dogs (about seven or eight years ago now). Since some of my own human friends and family were undertaking it at the time and the veterinary community was just starting to admit to itself that castration of male dogs might not necessarily be ideal for every single patient (see&nbsp;</span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.embracepetinsurance.com/waterbowl/article/spay-neuter-timing"><span data-dcnode-id="577" instrument_node="">this article</span></a><span data-dcnode-id="575" instrument_node="">&nbsp;for background), I couldn’t help wondering whether simply rendering a dog sterile and not removing the entirety of his gonadal apparatus might not be a rational substitute.</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">After all, if population control is the primary imperative behind castration, why not just do a smaller snip-snip and leave those “balls” alone?</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Based on these musings, I decided to ask a few board-certified veterinary surgeons to weigh in: How hard is a vasectomy to perform? Is this a really fiddly procedure with a steep learning curve? What can go wrong? Have you done one? Would you?</span></p><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">In the end, they all assured me there’s no surgical reason why we don’t routinely perform what amounts to an easier, quicker, less invasive procedure than traditional castration. Indeed, the only issues that hold any of us back from performing vasectomies on a routine basis include the following:</span></p><h2 data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">#1 Behavior Issues</span></h2><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Castration alters a dog’s behavior along with his ability to pass on his genetic material. Removing the entirety of the testicular tissue permanently eliminates the vast majority of his testosterone production. And since testosterone influences unwanted behaviors like aggression, roaming, marking, and humping, those who don’t have their testes out risk higher rates of these troubles.</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">But here’s the thing: Plenty of dogs never show any signs of behavior problems that might be influenced by testosterone. May we be throwing the baby out with the bath water?</span></p><h2 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">#2 Medical Concerns</span></h2><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">High levels of testosterone are associated with all kinds of ailments. Though preventing reproduction and unwanted behaviors rank higher on our list of issues, medical issues come in third. Indeed, removing the testes means there’s no testicular cancer to worry about, fewer perineal hernias, low rates of perianal adenomas, and no benign prostatic enlargement to fuss over.</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Despite these advantages, the truth is that castration can always be undertaken in the event these diseases do occur. While some of these problems can be expensive, they’re typically treatable and/or reversible upon castration (even very late in life).</span></p><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Moreover, we’re starting to find that certain diseases might be more prevalent in castrated males. Some studies strongly suggest that cruciate ligament disease and the rate of certain cancers are elevated in castrated males.</span></p><h2 data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">#3 History and Politics</span></h2><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">What can I say? We’re people, so politics and history will inevitably play a role. After all, castration is the way we’ve been doing things for hundreds of years now. And it’s understandably difficult to get everyone thinking about a new way of doing things when dogs are still being killed in shelters at rates that would doubtless make you cry if you allowed your thoughts to stray there.</span></p><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">#4 Teaching the Technique</span></h2><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">To a large extent, vasectomization isn’t on the average veterinarian’s radar screen because we weren’t taught anything about it in school.</span></p><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">By design, those at the forefront of clinical change in our profession have traditionally been those who teach in university settings. They influence all of us through the papers they write and the students they teach. But these professors have little incentive to teach vasectomies or even ponder their significance. They don’t live and work in the real world, after all.</span></p><h2 data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">#5 Fashion</span></h2><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Sometimes we make serious decisions about our own healthcare that have more to do with what physicians are collectively thinking about than with anything else. (Not to open a can of worms but male circumcision is a great example.) It only makes sense that veterinarians would do the same. Which is probably why, despite the rationality of canine vasectomization as a procedure, it’ll take some time for the concept to come into vogue. We’re just not chattering enough about it… yet.</span></p></div></div></div></div><span data-dcnode-id="535" instrument_node=""> </span><span data-dcnode-id="533" instrument_node=""> </span><aside class="blog__aside" data-dcnode-id="463" data-v-033d575e=""><span data-dcnode-id="531" instrument_node=""> </span><section class="reources blog__resources" data-dcnode-id="466" data-v-033d575e="" data-v-26ef5626=""><h2 class="m--h3 resources__heading" data-dcnode-id="529" data-v-26e
