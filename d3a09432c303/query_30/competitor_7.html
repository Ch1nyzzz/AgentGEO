</span><div class="col-12 col-sm-12 col-md-9 col-lg-9 blogContent" data-dcnode-id="839" itemprop="articleBody"><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">When the Affordable Care Act’s (ACA) </span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/find-state-exchange-websites/"><span data-dcnode-id="1706" instrument_node="">state-based and federally facilitated health insurance marketplaces</span></a><span data-dcnode-id="1704" instrument_node=""> opened on Oct. 1, 2013, we were introduced to a new way of selecting health insurance: by actuarial tier, more commonly referred to as “metal level.”</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Several years into the ACA, if you’re still confused about the difference between a bronze plan and a platinum plan, we’ve got the information you need so that you can pick the best health insurance plan for you.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">After we cover the metal levels in detail, including what they are, how they’re different and how to know which one may be best for you, we’ll outline some supplemental and non-ACA health insurance options that may fit your needs.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1693" style="text-align: center"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Enroll in an individual ACA Major Medical plan during open enrollment or a qualifying special enrollment.&nbsp;</span></strong></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1689" style="text-align: center"><a class="btn btn-orange" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/major-medical-insurance/quote/"><span data-dcnode-id="1691" instrument_node="">Shop + Compare ACA Plans</span></a></p><span data-dcnode-id="1688" instrument_node="">
</span><h2 data-dcnode-id="1686" id="why-metal-levels"><span data-dcnode-id="1687" instrument_node="">Why Metal Levels?</span></h2><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1684" instrument_node="">The metal level tiers were primarily established to:</span><a class="footnoteLink" data-container="body" data-content="What the Actuarial Values in the Affordable Care Act Mean. (April 2011). Kff.org. Retrieved 8 May 2019, from <a href=https://www.kff.org/wp-content/uploads/2013/01/8177.pdf>https://www.kff.org/wp-content/uploads/2013/01/8177.pdf</a> " data-dcnode-id="1681" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_1" id="FootnoteSUPNo_1" title=""><sup data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">[1]</span></sup></a></p><span data-dcnode-id="1679" instrument_node="">
</span><ol data-dcnode-id="1668"><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Set a minimum amount of coverage people must have to satisfy the ACA’s individual mandate.</span></li><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Establish standardized levels of major medical insurance available through HealthCare.gov, the state-based exchanges and the private market.</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Set a benchmark for premium tax credits and cost-sharing reduction subsidies.</span></li><span data-dcnode-id="1669" instrument_node="">
</span></ol><span data-dcnode-id="1667" instrument_node="">
</span><h2 data-dcnode-id="1665" id="what-are-the-aca-metal-levels"><span data-dcnode-id="1666" instrument_node="">What Are the ACA Metal Levels?</span></h2><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1663" instrument_node="">All individual </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/major-medical-insurance/"><span data-dcnode-id="1662" instrument_node="">major medical health insurance</span></a><span data-dcnode-id="1660" instrument_node=""> plans on the market today are categorized into four tiers based on how covered medical costs are shared between the health insurance policy and you, the policyholder. It has nothing to do with the level of care or covered services included in the plan.</span><a class="footnoteLink" data-container="body" data-content="Understanding Marketplace health insurance categories. HealthCare.gov. Retrieved 8 May 2019, from <a href=https://www.healthcare.gov/choose-a-plan/plans-categories/>https://www.healthcare.gov/choose-a-plan/plans-categories/</a> " data-dcnode-id="1657" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_2" id="FootnoteSUPNo_2" title=""><sup data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">[2]</span></sup></a></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Under the ACA, these tiers have been assigned a metal name: bronze, silver, gold or platinum.</span></p><span data-dcnode-id="1652" instrument_node="">

ata-dcnode-id="1541" style="width: 20%"><span data-dcnode-id="1542" instrument_node="">No</span></td><td data-dcnode-id="1538" style="width: 20%"><span data-dcnode-id="1539" instrument_node="">Yes</span></td><td data-dcnode-id="1535" style="width: 20%"><span data-dcnode-id="1536" instrument_node="">No</span></td><td data-dcnode-id="1532" style="width: 20%"><span data-dcnode-id="1533" instrument_node="">No</span></td></tr><tr data-dcnode-id="1509"><td data-dcnode-id="1523" style="width: 20%"><span data-dcnode-id="1527" instrument_node="">Eligible to apply a premium tax credit?</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1524" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_5" id="FootnoteSUPNo_5" title=""><sup data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">[5]</span></sup></a></td><td data-dcnode-id="1520" style="width: 20%"><span data-dcnode-id="1521" instrument_node="">Yes</span></td><td data-dcnode-id="1517" style="width: 20%"><span data-dcnode-id="1518" instrument_node="">Yes</span></td><td data-dcnode-id="1514" style="width: 20%"><span data-dcnode-id="1515" instrument_node="">Yes</span></td><td data-dcnode-id="1511" style="width: 20%"><span data-dcnode-id="1512" instrument_node="">Yes</span></td></tr></tbody></table><span data-dcnode-id="1504" instrument_node="">
</span><h2 data-dcnode-id="1502" id="which-aca-plan-is-right-for-you"><span data-dcnode-id="1503" instrument_node="">Which ACA Plan is Right For You?</span></h2><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1500" instrument_node="">In general, the lower your health insurance policy’s out-of-pocket expenses (</span><a data-content="The fixed dollar amount an insured individual and/or family must pay each year before the health plan’s benefits take effect." data-dcnode-id="1498" data-original-title="deductible" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/deductible/" title=""><span data-dcnode-id="1499" instrument_node="">deductible</span></a><span data-dcnode-id="1497" instrument_node="">, </span><a data-content="The percentage of out-of-pocket costs you're responsible for for covered healthcare services after you've met the deductible amount." data-dcnode-id="1495" data-original-title="coinsurance" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/coinsurance/" title=""><span data-dcnode-id="1496" instrument_node="">coinsurance</span></a><span data-dcnode-id="1494" instrument_node=""> and </span><a data-content="A fixed amount that you pay for a covered healthcare service after you've met your deductible amount." data-dcnode-id="1492" data-original-title="copay" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/copay/" title=""><span data-dcnode-id="1493" instrument_node="">copay</span></a><span data-dcnode-id="1491" instrument_node="">), the higher your monthly premium and vice versa.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><h3 data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Bronze Plan</span></h3><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1485" instrument_node="">You may want to choose a </span><a data-content="One of four plan categories in the Health Insurance Marketplace, bronze plans have the lowest monthly premiums and highest deductibles of the four plan types." data-dcnode-id="1483" data-original-title="bronze (metal level) health plan" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/bronze-health-plan/" title=""><span data-dcnode-id="1484" instrument_node="">bronze plan</span></a><span data-dcnode-id="1482" instrument_node=""> if you tend to use very few healthcare services and primarily want a health plan for serious, unexpected illnesses or injuries. You will pay for more of your routine care out of pocket, and will generally have higher out-of-pocket costs when you need medical care. However, you’ll have a lower monthly premium.</span><a class="footnoteLink" data-container="body" data-content="Understanding Marketplace health insurance categories. HealthCare.gov. Retrieved 8 May 2019, from <a href=https://www.healthcare.gov/choose-a-plan/plans-categories/>https://www.healthcare.gov/choose-a-plan/plans-categories/</a> " data-dcnode-id="1479" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_6" id="FootnoteSUPNo_6" title=""><sup data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">[6]</span></sup></a></p><span data-dcnode-id="1477" instrument_node="">
</span><h3 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Silver Plan</span></h3><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1473" instrument_node="">You may want to choose a </span><a data-content="One of four plan ACA health plan levels. Silver plans fall in the middle: You pay moderate monthly premiums and moderate costs when you need care." data-dcnode-id="1471" data-original-title="silver (metal level) health plan" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/silver-health-plan/" title=""><span data-dcnode-id="1472" instrument_node="">silver plan</span></a><span data-dcnode-id="1470" instrument_node=""> if you wish to use your health insurance for minimal preventive care during the year but don’t require regular visits to the doctor, such as to manage a chronic health condition. If you qualify for a </span><a data-content="Income-based financial assistance to purchase a silver metal level plan from the ACA Exchange, available to individuals that qualify." data-dcnode-id="1468" data-original-title="cost-sharing reduction" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/cost-sharing-reduction/" title=""><span data-dcnode-id="1469" instrument_node="">cost-sharing reduction</span></a><span data-dcnode-id="1467" instrument_node=""> you will want to select a silver plan from the </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/find-state-exchange-websites/"><span data-dcnode-id="1466" instrument_node="">ACA federal marketplace or your state exchange</span></a><span data-dcnode-id="1464" instrument_node=""> to receive that subsidy.</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1461" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_7" id="FootnoteSUPNo_7" title=""><sup data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">[7]</span></sup></a></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1456" style="text-align: center"><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Find out if you could qualify for a subsidy for ACA-qualifying health coverage.</span></strong></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1452" style="text-align: center"><a class="btn btn-blue" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/obamacare-calculator/"><span data-dcnode-id="1454" instrument_node="">ACA Subsidy Calculator</span></a></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1443" style="text-align: center"><span data-dcnode-id="1450" instrument_node="">Learn more about </span><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/subsidies-tax-credits/"><span data-dcnode-id="1449" instrument_node="">ACA subsidies and tax credits</span></a><span data-dcnode-id="1447" instrument_node="">, and </span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/aca-subsidy-income-limits/"><span data-dcnode-id="1446" instrument_node="">how to qualify</span></a><span data-dcnode-id="1444" instrument_node="">.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><h3 data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Gold Plan</span></h3><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1438" instrument_node="">You may want to choose a </span><a data-content="One of four ACA plan categories (aka “metal levels”). Gold plans usually have higher monthly premiums but lower costs when you get care." data-dcnode-id="1436" data-original-title="gold (metal level) health plan" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/gold-health-plan/" title=""><span data-dcnode-id="1437" instrument_node="">gold plan</span></a><span data-dcnode-id="1435" instrument_node=""> if you make frequent trips to the doctor, have chronic health conditions that require ongoing medical attention, and want to keep your deductible lower so you can access your benefits earlier in the year. Remember, you’ll be paying a higher premium each month.</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1432" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_8" id="FootnoteSUPNo_8" title=""><sup data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">[8]</span></sup></a></p><span data-dcnode-id="1430" instrument_node="">
</span><h3 data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Platinum Plan</span></h3><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1426" instrument_node="">You may want to choose a </span><a data-content="One of four plan categories (“metal levels”) in the Health Insurance Marketplace, these plans have the highest monthly premiums and lowest out-of-pocket costs when you seek treatment." data-dcnode-id="1424" data-original-title="platium (metal level) health plan" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/platium-health-plan/" title=""><span data-dcnode-id="1425" instrument_node="">platinum plan</span></a><span data-dcnode-id="1423" instrument_node=""> if you expect your medical expenses to be substantial and want the lowest deductible possible in order to access your plan benefits as early in the year as possible. Typically, you will pay the most in monthly premium with a platinum health insurance policy, however, nearly all other costs will be covered.</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1420" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_9" id="FootnoteSUPNo_9" title=""><sup data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">[9]</span></sup></a></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" style="font-weight: 400"></span></p><div class="su-box su-box-style-default" data-dcnode-id="1399" style="border-color:#000000;border-radius:3px"><div class="su-box-title" data-dcnode-id="1414" style="background-color:#333333;color:#FFFFFF;border-top-left-radius:1px;border-top-right-radius:1px"><span data-dcnode-id="1415" instrument_node="">ACA Catastrophic Plans</span></div><div class="su-box-content su-u-clearfix su-u-trim" data-dcnode-id="1400" style="border-bottom-left-radius:1px;border-bottom-right-radius:1px"><span data-dcnode-id="1413" instrument_node="">There’s one other ACA plan you should be aware of: </span><a data-content="Health plans that meet all of the qualified health plan requirements but that don't cover any benefits other than 3 primary care visits per year before the plan's deductible is met." data-dcnode-id="1411" data-original-title="Catastrophic health plan" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/catastrophic-health-plan/" title=""><span data-dcnode-id="1412" instrument_node="">Catastrophic health plans</span></a><span data-dcnode-id="1410" instrument_node="">. These plans have very low monthly premiums and very high deductibles. They truly are a plan primarily meant to cover catastrophic injuries and illnesses. These plans are only available if you meet specific criteria such as if you’re under 30 years old or if you qualify for a hardship exemption.</span><p data-dcnode-id="1409"></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1404"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/catastrophic-health-plans-and-obamacare/"><span data-dcnode-id="1407" instrument_node="">Learn more about catastrophic health insurance</span></a><span data-dcnode-id="1405" instrument_node="">.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" style="font-weight: 400"></span></p></div></div><p data-dcnode-id="1398"></p><span data-dcnode-id="1397" instrument_node="">
</span><h2 data-dcnode-id="1395" id="do-aca-plan-benefits-differ-by-metal-level"><span data-dcnode-id="1396" instrument_node="">Do ACA Plan Benefits Differ by Metal Level?</span></h2><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1393" instrument_node="">Generally, no. The ACA requires that all major medical insurance plans include the same minimal coverage for healthcare items and services included in the </span><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/what-are-aca-required-essential-health-benefits/"><span data-dcnode-id="1392" instrument_node="">essential health benefits</span></a><span data-dcnode-id="1390" instrument_node="">:</span></p><span data-dcnode-id="1388" instrument_node="">
</span><ul data-dcnode-id="1353"><span data-dcnode-id="1387" instrument_node="">
</span><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Ambulatory patient services</span></li><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Emergency services</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Hospitalization</span></li><span data-dcnode-id="1378" instrument_node="">
</span><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Pregnancy, maternity, and newborn care</span></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Mental health and substance use disorder services</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Prescription drugs</span></li><span data-dcnode-id="1369" instrument_node="">
</span><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Rehabilitative and habilitative services and devices</span></li><span data-dcnode-id="1366" instrument_node="">
</span><li data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Lab services</span></li><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Preventive and wellness services, chronic disease management</span></li><span data-dcnode-id="1360" instrument_node="">
</span><li data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node="">Pediatric services</span><a class="footnoteLink" data-container="body" data-content="Find out what Marketplace health insurance plans cover. HealthCare.gov. Retrieved 8 May 2019, from <a href=https://www.healthcare.gov/coverage/what-marketplace-plans-cover/>https://www.healthcare.gov/coverage/what-marketplace-plans-cover/</a> " data-dcnode-id="1356" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_10" id="FootnoteSUPNo_10" title=""><sup data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">[10]</span></sup></a></li><span data-dcnode-id="1354" instrument_node="">
</span></ul><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node="">Carriers may choose to offer more than the minimum essential health benefits, and they may have to provide more coverage within the broader health service categories based on state requirements. That is where plans could vary.</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1348" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_11" id="FootnoteSUPNo_11" title=""><sup data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">[11]</span></sup></a></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1345" instrument_node="">ACA-qualifying major medical plans don’t cover everything. For example, they typically do not cover infertility treatment, elective cosmetic surgery, weight loss surgery, dental and vision care for adults, long-term care, chiropractic and acupuncture, and abortion care and male contraception like a vasectomy.</span><a class="footnoteLink" data-container="body" data-content="Does the ACA require infertility treatment to be covered by health insurance? (Feb. 2018). healthinsurance.org. Retrieved 8 May 2019, from <a href=https://www.healthinsurance.org/faqs/does-the-aca-require-infertility-treatment-to-be-covered-by-health-insurance/>https://www.healthinsurance.org/faqs/does-the-aca-require-infertility-treatment-to-be-covered-by-health-insurance/</a> " data-dcnode-id="1342" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_12" id="FootnoteSUPNo_12" title=""><sup data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">[12]</span></sup></a><span data-dcnode-id="1341" instrument_node=""> </span><a class="footnoteLink" data-container="body" data-content="Cold, F., &amp; Health, E. Is This Covered Under the Affordable Care Act? WebMD. Retrieved 8 May 2019, from <a href=https://www.webmd.com/health-insurance/affordable-care-act-is-this-covered#1>https://www.webmd.com/health-insurance/affordable-care-act-is-this-covered#1</a>  and <a href=https://www.webmd.com/health-insurance/affordable-care-act-is-this-covered#1>https://www.webmd.com/health-insurance/affordable-care-act-is-this-covered#1</a> " data-dcnode-id="1338" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_13" id="FootnoteSUPNo_13" title=""><sup data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">[13]</span></sup></a></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1335" instrument_node="">Cost, including plan premium and deductible, is the biggest difference between metal levels. That is why it is important to shop with </span><a data-content="The share of insurance costs that you pay out of your own pocket relating to deductibles, coinsurance, and copayments, or similar charges." data-dcnode-id="1333" data-original-title="cost sharing" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/cost-sharing/" title=""><span data-dcnode-id="1334" instrument_node="">cost-sharing</span></a><span data-dcnode-id="1332" instrument_node=""> in mind. Determine what share of covered medical expenses you and your family can afford if you need healthcare and not just select the plan with the lowest monthly premium.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1327"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Next Steps:</span></strong></p><span data-dcnode-id="1326" instrument_node="">
</span><ul data-dcnode-id="1311"><span data-dcnode-id="1325" instrument_node="">
</span><li data-dcnode-id="1321"><span data-dcnode-id="1324" instrument_node="">Get more information about </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/5-tips-for-choosing-the-right-obamacare-health-insurance-plan/"><span data-dcnode-id="1323" instrument_node="">how to choose the right ACA health plan</span></a></li><span data-dcnode-id="1320" instrument_node="">
</span><li data-dcnode-id="1317"><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/learn/get-health-insurance-now/"><span data-dcnode-id="1319" instrument_node="">Find out if you can get an ACA health plan now</span></a></li><span data-dcnode-id="1316" instrument_node="">
</span><li data-dcnode-id="1313"><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/find-state-exchange-websites/"><span data-dcnode-id="1315" instrument_node="">Find your public ACA exchange to enroll</span></a></li><span data-dcnode-id="1312" instrument_node="">
</span></ul><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1309" instrument_node="">Now that we’ve covered the ACA metal levels, we’re going to overview some </span><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/supplemental-health-insurance/"><span data-dcnode-id="1308" instrument_node="">supplemental insurance options</span></a><span data-dcnode-id="1306" instrument_node=""> that may be beneficial to you depending on the type of ACA plan you’ve selected, and a non-ACA health insurance option if you decide you don’t want to enroll in a major medical plan.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><h2 data-dcnode-id="1302" id="do-you-have-enough-coverage-if-you-re-diagnosed-with-a-critical-illness"><span data-dcnode-id="1303" instrument_node="">Do You Have Enough Coverage if You’re Diagnosed With a Critical Illness?</span></h2><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Most of us assume that if we enroll in a comprehensive major medical policy we’ll have the coverage and financial protection we need. Unfortunately, major medical coverage does not guarantee that you won’t face financial difficulty as a result of medical bills.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1297" instrument_node="">According to </span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kff.org/report-section/the-burden-of-medical-debt-section-1-who-has-medical-bill-problems-and-what-are-the-contributing-factors/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1296" instrument_node="">Kaiser Family Fund (KFF)</span></a><span data-dcnode-id="1294" instrument_node="">, more and more Americans </span><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">with</span></em><span data-dcnode-id="1291" instrument_node=""> major medical insurance find themselves </span><em data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">underinsured</span></em><span data-dcnode-id="1288" instrument_node=""> and experiencing problems paying medical bills:</span></p><span data-dcnode-id="1286" instrument_node="">
</span><ul data-dcnode-id="1266"><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">20% of insured adults between 18 and 64 had trouble paying medical bills.</span></li><span data-dcnode-id="1282" instrument_node="">
</span><li data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">26% of insured adults with </span><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">high deductible health plans</span></em><span data-dcnode-id="1278" instrument_node=""> had trouble paying medical bills.</span></li><span data-dcnode-id="1276" instrument_node="">
</span><li data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">66% of those having trouble paying medical bills say the bill was the result of a one-time or short-term medical expense such as a hospital stay or accident.</span></li><span data-dcnode-id="1273" instrument_node="">
</span><li data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">Heart disease, heart attacks, stroke, cancer, and gastrointestinal/stomach conditions were the most common health conditions that led to medical bills.</span><a class="footnoteLink" data-container="body" data-content="The Burden of Medical Debt: Results from the Kaiser Family Foundation/New York Times Medical Bills Survey – Section 1: Who Has Medical Bill Problems and What Are the Contributing Factors? (Jan. 2016). The Henry J. Kaiser Family Foundation. Retrieved 8 May 2019, from <a href=https://www.kff.org/report-section/the-burden-of-medical-debt-section-1-who-has-medical-bill-problems-and-what-are-the-contributing-factors/>https://www.kff.org/report-section/the-burden-of-medical-debt-section-1-who-has-medical-bill-problems-and-what-are-the-contributing-factors/</a> " data-dcnode-id="1269" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_14" id="FootnoteSUPNo_14" title=""><sup data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">[14]</span></sup></a></li><span data-dcnode-id="1267" instrument_node="">
</span></ul><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Even if you have major medical insurance you’ll still be responsible for out-of-pocket costs if you are diagnosed with a critical illness like cancer. For example, you pay:</span></p><span data-dcnode-id="1262" instrument_node="">
</span><ul data-dcnode-id="1227"><span data-dcnode-id="1261" instrument_node="">
</span><li data-dcnode-id="1254"><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Your annual deductible amount</span></strong><span data-dcnode-id="1258" instrument_node=""> – in 2018, the average individual annual deductible for an employer health plan was $1,644</span><a class="footnoteLink" data-container="body" data-content="2020 Employer Health Benefits Survey – Summary of Findings. (Oct. 2020). Retrieved 15 October 2020, from <a href=https://www.kff.org/report-section/ehbs-2020-summary-of-findings/>https://www.kff.org/report-section/ehbs-2020-summary-of-findings/</a> " data-dcnode-id="1255" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_15" id="FootnoteSUPNo_15" title=""><sup data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">[15]</span></sup></a></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1246"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Coinsurance and copays</span></strong><span data-dcnode-id="1250" instrument_node=""> until you’ve reached the annual out-of-pocket maximum – The 2021 out-of-pocket maximum for individuals with an ACA plan is $8,550 and $17,100 for families</span><a class="footnoteLink" data-container="body" data-content="Out-of-pocket maximum/limit – HealthCare.gov Glossary. Retrieved 15 October 2020, from <a href=https://www.healthcare.gov/glossary/out-of-pocket-maximum-limit/>https://www.healthcare.gov/glossary/out-of-pocket-maximum-limit/</a> " data-dcnode-id="1247" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_16" id="FootnoteSUPNo_16" title=""><sup data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">[16]</span></sup></a></li><span data-dcnode-id="1245" instrument_node="">
</span><li data-dcnode-id="1239"><strong data-dcnode-id="1241"><span data-dcnode-id="1244" instrument_node="">The extra cost of medical care you receive </span><a data-content="Medical care received from providers and at clinics and hospitals that do not participate in the HMO or PPO network associated with your policy." data-dcnode-id="1242" data-original-title="out-of-network care" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/out-of-network-care/" rel="noopener noreferrer" target="_blank" title=""><span data-dcnode-id="1243" instrument_node="">out-of-network</span></a></strong><span data-dcnode-id="1240" instrument_node=""> if you need it</span></li><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1234"><strong data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Rehabilitative and home healthcare services</span></strong><span data-dcnode-id="1235" instrument_node=""> that may not be covered by your major medical policy</span></li><span data-dcnode-id="1233" instrument_node="">
</span><li data-dcnode-id="1229"><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">For any alternative or supplemental treatments</span></strong><span data-dcnode-id="1230" instrument_node=""> you receive that are not covered by your policy (e.g., acupuncture, chiropractic, herbal supplements)</span></li><span data-dcnode-id="1228" instrument_node="">
</span></ul><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">In addition to the added medical bills, regular household bills don’t stop just because you’re sick. In fact, you may have to take time away from work to recover and may find yourself with reduced income. Major medical insurance does not pay for groceries, childcare or gas.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1220"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">How does critical illness insurance work?</span></strong></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1218" instrument_node="">That’s where </span><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/supplemental-health-insurance/critical-illness-insurance/"><span data-dcnode-id="1217" instrument_node="">critical illness insurance</span></a><span data-dcnode-id="1215" instrument_node=""> may be able to help. Critical illness coverage either pays a lump sum (fixed) cash benefit upon diagnosis of a covered illness, or a benefit amount based on treatment received (indemnity coverage) depending on the plan design.</span><a class="footnoteLink" data-container="body" data-content="Consumer Guide to Critical Illness Insurance. (Sep. 2017). Nahu.org. Retrieved 8 May 2019, from <a href=https://nahu.org/looking-for-an-agent/helpful-guides/consumer-guide-to-critical-illness-insurance>https://nahu.org/looking-for-an-agent/helpful-guides/consumer-guide-to-critical-illness-insurance</a> " data-dcnode-id="1212" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_17" id="FootnoteSUPNo_17" title=""><sup data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">[17]</span></sup></a></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1207"><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Who should consider critical illness insurance?</span></strong></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Critical illness plan premiums are typically affordable because coverage is limited to specific illnesses. You may want to consider a critical illness policy if you:</span></p><span data-dcnode-id="1203" instrument_node="">
</span><ul data-dcnode-id="1186"><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Have a high deductible major medical plan</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Have very little in savings or income to pay your out-of-pocket costs</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Are at an increased risk for developing a critical illness like cancer, heart disease or stroke due to lifestyle (i.e., tobacco use) or family history</span></li><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">Are between 18 and 65 years old – the younger you are when you enroll the lower your premium.</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1189" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_18" id="FootnoteSUPNo_18" title=""><sup data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">[18]</span></sup></a></li><span data-dcnode-id="1187" instrument_node="">
</span></ul><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1182"><strong data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">How do you qualify?</span></strong></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1180" instrument_node="">While you do have to qualify for these plans (they may not be guaranteed issue), many with lump sum amounts under $70,000 are considered “simplified issue.” That means you’re not subject to a full underwriting process, you just have to answer a few questions to qualify.</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1177" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_19" id="FootnoteSUPNo_19" title=""><sup data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">[19]</span></sup></a></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">Plans with larger benefit amounts (over $70,000) will likely require underwriting. And some group plans offered by employers are guaranteed issue.</span><a class="footnoteLink" data-container="body" data-content="Ibid" data-dcnode-id="1171" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_20" id="FootnoteSUPNo_20" title=""><sup data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">[20]</span></sup></a></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1166" style="text-align: center"><strong data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Get a quick quote to compare supplemental critical illness plans and costs.</span></strong></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1162" style="text-align: center"><a class="btn btn-orange" data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/supplemental-health-insurance/medical-gap/quote/"><span data-dcnode-id="1164" instrument_node="">Shop Critical Illness Insurance</span></a></p><span data-dcnode-id="1161" instrument_node="">
</span><h2 data-dcnode-id="1159" id="help-using-your-high-deductible-health-plan"><span data-dcnode-id="1160" instrument_node="">Help Using Your High-Deductible Health Plan</span></h2><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">While a low monthly premium can be appealing, it is often paired with a higher plan deductible.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1154" instrument_node="">For instance, you could qualify for a premium tax credit that brings your monthly bronze plan premium down to little or nothing.</span><a class="footnoteLink" data-container="body" data-content="4.2 Million Uninsured People Could Get a Bronze Plan in the ACA Marketplace with $0 Premiums After Tax Credits. (Dec. 2018). The Henry J. Kaiser Family Foundation. Retrieved 8 May 2019, from <a href=https://www.kff.org/health-reform/press-release/4-2-million-uninsured-people-could-get-a-bronze-plan-in-the-aca-marketplace-with-0-premiums-after-tax-credits/>https://www.kff.org/health-reform/press-release/4-2-million-uninsured-people-could-get-a-bronze-plan-in-the-aca-marketplace-with-0-premiums-after-tax-credits/</a> " data-dcnode-id="1151" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_21" id="FootnoteSUPNo_21" title=""><sup data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">[21]</span></sup></a><span data-dcnode-id="1150" instrument_node=""> However, that bronze plan will include a deductible that must be met before your health insurance policy benefits take effect, and you will pay out of pocket toward that amount.</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">In 2020, the average annual plan deductible for enrollees on healthcare.gov that did not qualify for a cost sharing reduction was $5,316.</span><a class="footnoteLink" data-container="body" data-content="Health Insurance Exchanges 2020 Open Enrollment Report. (Apr. 2020). Retrieved 15 October 2020, from <a href=https://www.cms.gov/files/document/4120-health-insurance-exchanges-2020-open-enrollment-report-final.pdf>https://www.cms.gov/files/document/4120-health-insurance-exchanges-2020-open-enrollment-report-final.pdf</a> " data-dcnode-id="1144" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_22" id="FootnoteSUPNo_22" title=""><sup data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">[22]</span></sup></a></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1141" instrument_node="">One solution to the high deductible problem is to purchase a supplemental </span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/supplemental-health-insurance/medical-gap/"><span data-dcnode-id="1140" instrument_node="">medical gap</span></a><span data-dcnode-id="1138" instrument_node=""> or </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/alternative-health-insurance/hospital/"><span data-dcnode-id="1137" instrument_node="">hospital indemnity insurance</span></a><span data-dcnode-id="1135" instrument_node=""> policy.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1132" instrument_node="">Supplemental health insurance generally is not ACA-compliant, meaning it is not </span><a data-content="A requirement that health plans must permit you to enroll." data-dcnode-id="1130" data-original-title="guaranteed issue" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/guaranteed-issue/" title=""><span data-dcnode-id="1131" instrument_node="">guaranteed issue</span></a><span data-dcnode-id="1129" instrument_node=""> and does not cover </span><a data-content="The 10 healthcare services for which all qualified major medical health plans must include coverage." data-dcnode-id="1127" data-original-title="essential health benefits" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/essential-health-benefits/" title=""><span data-dcnode-id="1128" instrument_node="">essential health benefits</span></a><span data-dcnode-id="1126" instrument_node="">.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Instead, they pay lump-sum benefits for covered accidents or critical illnesses in addition to whatever benefits your major medical plan provides. Again, you can use these benefits however you choose, whether to pay down your major medical deductible or to help with other costs.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">The best way to find out how much these plans could cost you, and if you qualify, is to get a quick quote (it just takes a couple of minutes to get multiple plan options to compare).</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1115" style="text-align: center"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Want additional benefits to help with a high deductible health plan?</span></strong></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1111" style="text-align: center"><a class="btn btn-orange" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/supplemental-health-insurance/medical-gap/quote/"><span data-dcnode-id="1113" instrument_node="">Shop Gap Insurance</span></a></p><span data-dcnode-id="1110" instrument_node="">
</span><h2 data-dcnode-id="1108" id="short-term-health-insurance-a-non-aca-health-insurance-option"><span data-dcnode-id="1109" instrument_node="">Short Term Health Insurance – A Non-ACA Health Insurance Option</span></h2><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1097"><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/alternative-health-insurance/short-term/"><span data-dcnode-id="1106" instrument_node="">Short term health insurance</span></a><span data-dcnode-id="1104" instrument_node=""> is one non-ACA option that could provide you coverage for unexpected illnesses or injuries for 30 to 364 days </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/find-state-exchange-websites/"><span data-dcnode-id="1103" instrument_node="">depending on your state</span></a><span data-dcnode-id="1101" instrument_node=""> (or possibly up to 36 months depending on the policy renewal rules in your state).</span><a class="footnoteLink" data-container="body" data-content="Duration and renewals of 2019 Short Term Medical plans by state (Feb. 2019). Healthinsurance.org. Retrieved 8 May 2019, from <a href=https://www.healthinsurance.org/assets/img/landing_pages/stm_pdf/state-by-state-short-term-health-insurance.pdf>https://www.healthinsurance.org/assets/img/landing_pages/stm_pdf/state-by-state-short-term-health-insurance.pdf</a> " data-dcnode-id="1098" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_23" id="FootnoteSUPNo_23" title=""><sup data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">[23]</span></sup></a></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1093"><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Some benefits of short term medical plans include:</span></strong></p><span data-dcnode-id="1092" instrument_node="">
</span><ul data-dcnode-id="1075"><span data-dcnode-id="1091" instrument_node="">
</span><li data-dcnode-id="1086"><span data-dcnode-id="1090" instrument_node="">Monthly premiums are 54% lower than unsubsidized major medical insurance premiums on average.</span><a class="footnoteLink" data-container="body" data-content="Why Do Short-Term Health Insurance Plans Have Lower Premiums Than Plans That Comply with the ACA?. (Oct. 2018). Retrieved 15 October 2020, from <a href=https://www.kff.org/health-reform/issue-brief/why-do-short-term-health-insurance-plans-have-lower-premiums-than-plans-that-comply-with-the-aca/>https://www.kff.org/health-reform/issue-brief/why-do-short-term-health-insurance-plans-have-lower-premiums-than-plans-that-comply-with-the-aca/</a> " data-dcnode-id="1087" data-html="true" data-original-title="" data-placement="bottom" data-toggle="popover" href="#FootnoteDetailsNo_24" id="FootnoteSUPNo_24" title=""><sup data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">[24]</span></sup></a></li><span data-dcnode-id="1085" instrument_node="">
</span><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">There’s no open enrollment period so you can apply year-round.</span></li><span data-dcnode-id="1082" instrument_node="">
</span><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Plans are highly customizable so you don’t have to pay for coverage you don’t need.</span></li><span data-dcnode-id="1079" instrument_node="">
</span><li data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">No provider network limitations means you can visit your preferred healthcare provider.</span></li><span data-dcnode-id="1076" instrument_node="">
</span></ul><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1071"><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Some drawbacks of short term medical plans include:</span></strong></p><span data-dcnode-id="1070" instrument_node="">
</span><ul data-dcnode-id="1059"><span data-dcnode-id="1069" instrument_node="">
</span><li data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">They are not guaranteed-issue, you must be approved by the carrier in order to enroll.</span></li><span data-dcnode-id="1066" instrument_node="">
</span><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">They are not considered minimum essential coverage and don’t include the essential health benefits.</span></li><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Pre-existing conditions are not covered.</span></li><span data-dcnode-id="1060" instrument_node="">
</span></ul><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1054"><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/save/is-temporary-health-insurance-right-for-you/"><span data-dcnode-id="1057" instrument_node="">Find out if short term medical insurance is right for you</span></a><span data-dcnode-id="1055" instrument_node="">.</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1050"><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">What STM Plans May Cover</span></strong></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1048" instrument_node="">Temporary health plans are meant to be an affordable way to maintain some level of insurance coverage </span><em data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">while you’re in between major medical plans</span></em><span data-dcnode-id="1045" instrument_node="">, for example, if you’re unemployed or in an employer waiting period for employee benefits.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Plans typically provide benefits for hospital room and board; emergency room, anesthesiology, and surgical care; diagnostic services (x-rays, lab tests, and analysis); ambulance and surgical services; and doctor office visits.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1039" instrument_node="">However, if you don’t qualify for subsidies and ACA premiums are too expensive, or you prefer to carry a pared-back health plan and pay for more of your healthcare services and medications yourself, a short term medical policy may be an option for you now that the Federal </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/calculate-aca-tax-penalty/"><span data-dcnode-id="1038" instrument_node="">individual mandate tax penalty has been repealed</span></a><span data-dcnode-id="1036" instrument_node=""> (note that some states have implemented their own </span><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/aca/state-health-insurance-mandates/"><span data-dcnode-id="1035" instrument_node="">state individual mandates and penalties</span></a><span data-dcnode-id="1033" instrument_node="">).</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Remember, these plans are not comparable to ACA plans and have much more limited coverage (it’s one reason why premiums are so low). So it’s important to understand what is covered and what is excluded in any short term medical plans you’re considering.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1025" style="text-align: center"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">The best way to find short term medical plans available in your area and to compare your costs is to request a quote. It just takes a minute.</span></strong></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1021" style="text-align: center"><a class="btn btn-orange" data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/alternative-health-insurance/short-term/quote/"><span data-dcnode-id="1023" instrument_node="">Shop Short Term Health Insurance</span></a></p><span data-dcnode-id="1020" instrument_node="">
</span><h2 data-dcnode-id="1018" id="summary-next-steps"><span data-dcnode-id="1019" instrument_node="">Summary + Next Steps</span></h2><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1016" instrument_node="">If you’re not sure which ACA-qualifying major medical plan is right for you, call </span><a class="phn_nbmr" data-dcnode-id="1014" href="tel:888-855-6837" style=""><span data-dcnode-id="1015" instrument_node="">              888-855-6837</span></a><span data-dcnode-id="1013" instrument_node=""> to speak with a licensed agent.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1006"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Do you need coverage right away?&nbsp;</span></strong><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/blog/learn/get-health-insurance-now/"><span data-dcnode-id="1008" instrument_node="">Find out what your enrollment options are today.</span></a></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Consider supplementing a major medical policy with higher out-of-pocket costs with:</span></p><span data-dcnode-id="1002" instrument_node="">
</span><ul data-dcnode-id="988"><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="998"><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/supplemental-health-insurance/medical-gap/"><span data-dcnode-id="1000" instrument_node="">Gap insurance</span></a></li><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="994"><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/alternative-health-insurance/hospital/"><span data-dcnode-id="996" instrument_node="">Hospital indemnity insurance</span></a></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="990"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/supplemental-health-insurance/critical-illness-insurance/"><span data-dcnode-id="992" instrument_node="">Critical illness insurance</span></a></li><span data-dcnode-id="989" instrument_node="">
</span></ul><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="986" instrument_node="">Or, if a major medical plan isn’t available to you for one reason or another, consider a </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/alternative-health-insurance/short-term/"><span data-dcnode-id="985" instrument_node="">short term health insurance policy</span></a><span data-dcnode-id="983" instrument_node="">.</span></p><span data-dcnode-id="981" instrument_node="">

</span><ul class="list-unstyled" data-dcnode-id="758"><li data-dcnode-id="795"><a data-content="One of four plan categories in the Health Insurance Marketplace, bronze plans have the lowest monthly premiums and highest deductibles of the four plan types." data-dcnode-id="796" data-original-title="bronze (metal level) health plan" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/bronze-health-plan/" title=""><span data-dcnode-id="797" instrument_node="">bronze (metal level) health plan</span></a></li><li data-dcnode-id="792"><a data-content="Health plans that meet all of the qualified health plan requirements but that don't cover any benefits other than 3 primary care visits per year before the plan's deductible is met." data-dcnode-id="793" data-original-title="Catastrophic health plan" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/catastrophic-health-plan/" title=""><span data-dcnode-id="794" instrument_node="">Catastrophic health plan</span></a></li><li data-dcnode-id="789"><a data-content="The percentage of out-of-pocket costs you're responsible for for covered healthcare services after you've met the deductible amount." data-dcnode-id="790" data-original-title="coinsurance" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/coinsurance/" title=""><span data-dcnode-id="791" instrument_node="">coinsurance</span></a></li><li data-dcnode-id="786"><a data-content="A fixed amount that you pay for a covered healthcare service after you've met your deductible amount." data-dcnode-id="787" data-original-title="copay" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/copay/" title=""><span data-dcnode-id="788" instrument_node="">copay</span></a></li><li data-dcnode-id="783"><a data-content="Income-based financial assistance to purchase a silver metal level plan from the ACA Exchange, available to individuals that qualify." data-dcnode-id="784" data-original-title="cost-sharing reduction" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/cost-sharing-reduction/" title=""><span data-dcnode-id="785" instrument_node="">cost-sharing reduction</span></a></li><li data-dcnode-id="780"><a data-content="The share of insurance costs that you pay out of your own pocket relating to deductibles, coinsurance, and copayments, or similar charges." data-dcnode-id="781" data-original-title="cost sharing" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/cost-sharing/" title=""><span data-dcnode-id="782" instrument_node="">cost sharing</span></a></li><li data-dcnode-id="777"><a data-content="The fixed dollar amount an insured individual and/or family must pay each year before the health plan’s benefits take effect." data-dcnode-id="778" data-original-title="deductible" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/deductible/" title=""><span data-dcnode-id="779" instrument_node="">deductible</span></a></li><li data-dcnode-id="774"><a data-content="The 10 healthcare services for which all qualified major medical health plans must include coverage." data-dcnode-id="775" data-original-title="essential health benefits" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/essential-health-benefits/" title=""><span data-dcnode-id="776" instrument_node="">essential health benefits</span></a></li><li data-dcnode-id="771"><a data-content="One of four ACA plan categories (aka “metal levels”). Gold plans usually have higher monthly premiums but lower costs when you get care." data-dcnode-id="772" data-original-title="gold (metal level) health plan" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/gold-health-plan/" title=""><span data-dcnode-id="773" instrument_node="">gold (metal level) health plan</span></a></li><li data-dcnode-id="768"><a data-content="A requirement that health plans must permit you to enroll." data-dcnode-id="769" data-original-title="guaranteed issue" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/guaranteed-issue/" title=""><span data-dcnode-id="770" instrument_node="">guaranteed issue</span></a></li><li data-dcnode-id="765"><a data-content="Medical care received from providers and at clinics and hospitals that do not participate in the HMO or PPO network associated with your policy." data-dcnode-id="766" data-original-title="out-of-network care" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/out-of-network-care/" title=""><span data-dcnode-id="767" instrument_node="">out-of-network care</span></a></li><li data-dcnode-id="762"><a data-content="One of four plan categories (“metal levels”) in the Health Insurance Marketplace, these plans have the highest monthly premiums and lowest out-of-pocket costs when you seek treatment." data-dcnode-id="763" data-original-title="platium (metal level) health plan" data-placement="bottom" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthedeals.com/glossary/platium-health-plan/" title=""><span dat
