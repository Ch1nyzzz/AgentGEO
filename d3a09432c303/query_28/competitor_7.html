</span><span class="heading-toc" data-dcnode-id="3277" id="toc-birth-control-methods"></span><span data-dcnode-id="3276" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="3271" id="mntl-sc-block_1-0-6"><span data-dcnode-id="3275" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node=""> Birth Control Methods </span></span><span data-dcnode-id="3272" instrument_node=""> </span></h2><span data-dcnode-id="3270" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3268" id="mntl-sc-block_1-0-7"><span data-dcnode-id="3269" instrument_node="">
Birth control methods can be broken down into categories based on their mode of use, including:
</span></p><span data-dcnode-id="3267" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3259" id="mntl-sc-block_1-0-8"><div class="comp mntl-native" data-dcnode-id="3260" data-right-rail-index="1" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="3266" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="3262" id="mntl-native__adunit_1-0"><span data-dcnode-id="3265" instrument_node="">
</span><div class="wrapper" data-dcnode-id="3264" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="3263" instrument_node="">
</span></div><span data-dcnode-id="3261" instrument_node="">
</span></div></div><span data-dcnode-id="3258" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3239" id="mntl-sc-block_1-0-9"><span data-dcnode-id="3257" instrument_node="">
</span><li data-dcnode-id="3253"><strong data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Single use</span></strong><span data-dcnode-id="3254" instrument_node="">: These methods must be used for each episode of intercourse.</span></li><li data-dcnode-id="3249"><strong data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Scheduled</span></strong><span data-dcnode-id="3250" instrument_node="">: These methods involve planning outside of the act of intercourse, on an ongoing basis.</span></li><li data-dcnode-id="3245"><strong data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Low maintenance</span></strong><span data-dcnode-id="3246" instrument_node="">: These methods are long-acting and don't require regular planning or action.</span></li><li data-dcnode-id="3241"><strong data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Permanent</span></strong><span data-dcnode-id="3242" instrument_node="">: These are surgical procedures that permanently end a person's ability to become pregnant or to impregnate someone else.</span></li><span data-dcnode-id="3240" instrument_node="">
</span></ul><span data-dcnode-id="3238" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3237" id="mntl-sc-block_1-0-10"></div><span data-dcnode-id="3236" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3229" id="mntl-sc-block_1-0-11"><span data-dcnode-id="3235" instrument_node="">
Most birth control methods have two effectiveness rates. The first is how effective it is at preventing pregnancy when used exactly as intended, under ideal conditions. The second is how </span><a data-component="link" data-dcnode-id="3233" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/how-do-you-interpret-birth-control-failure-rates-906657"><span data-dcnode-id="3234" instrument_node="">effective it is with typical use</span></a><span data-dcnode-id="3232" instrument_node="">, taking into account human error and other factors that may lower the real-life effectiveness.</span><br data-dcnode-id="3231"><span data-dcnode-id="3230" instrument_node="">
</span></p><span data-dcnode-id="3228" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3227" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="3226" instrument_node="">
</span><div class="comp theme-keyfeatures mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="3205" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-14"><span data-dcnode-id="3225" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="3223" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="3224" instrument_node="">
Contraception Does Not Mean Protection from STIs</span></h3><span data-dcnode-id="3222" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="3207" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="3221" instrument_node="">
</span><p data-dcnode-id="3216"><span data-dcnode-id="3220" instrument_node="">With the exception of internal and external condoms, contraceptive methods do not protect against </span><a data-component="link" data-dcnode-id="3218" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/std-causes-3133097"><span data-dcnode-id="3219" instrument_node="">sexually transmitted infections (STIs)</span></a><span data-dcnode-id="3217" instrument_node="">.</span></p><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">If protection from STIs are needed in addition to the prevention of pregnancy, barrier methods (condoms) must be used, and may be combined with other forms of birth control.</span></p><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3208"><span data-dcnode-id="3211" instrument_node="">Only latex and plastic condoms protect against STIs. Lambskin condoms help prevent pregnancy, but do not protect against STIs.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3209" data-id="#citation-1"><span data-dcnode-id="3210" instrument_node="">1</span></span></p></div><span data-dcnode-id="3206" instrument_node="">
</span></div><span data-dcnode-id="3204" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="3203" id="toc-single-use-contraceptives"></span><span data-dcnode-id="3202" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="3197" id="mntl-sc-block_1-0-15"><span data-dcnode-id="3201" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node=""> Single-Use Contraceptives </span></span><span data-dcnode-id="3198" instrument_node=""> </span></h2><span data-dcnode-id="3196" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="3191" id="mntl-sc-block_1-0-17"><span data-dcnode-id="3195" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node=""> Condoms </span></span><span data-dcnode-id="3192" instrument_node=""> </span></h3><span data-dcnode-id="3190" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3182" id="mntl-sc-block_1-0-18"><span data-dcnode-id="3189" instrument_node="">
</span><a data-component="link" data-dcnode-id="3187" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/how-to-use-a-condom-4020370"><span data-dcnode-id="3188" instrument_node="">External condoms </span></a><span data-dcnode-id="3186" instrument_node="">are thin pouches that are slipped on over the erect penis right before intercourse. They are usually made of latex, but plastic condoms and lambskin condoms are available for people who are allergic to latex.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3184" data-id="#citation-1"><span data-dcnode-id="3185" instrument_node="">1</span></span><span data-dcnode-id="3183" instrument_node="">
</span></p><span data-dcnode-id="3181" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3180" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="3179" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3171" id="mntl-sc-block_1-0-20"><span data-dcnode-id="3178" instrument_node="">
</span><a data-component="link" data-dcnode-id="3176" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/how-to-use-the-female-condom-3133071"><span data-dcnode-id="3177" instrument_node="">Internal condoms</span></a><span data-dcnode-id="3175" instrument_node=""> are thin pouches that create a barrier between the penis and the vagina. Internal condoms go inside the vagina (or anus) instead of on the penis.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3173" data-id="#citation-21"><span data-dcnode-id="3174" instrument_node="">2</span></span><span data-dcnode-id="3172" instrument_node="">
</span></p><span data-dcnode-id="3170" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3169" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="3168" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3166" id="mntl-sc-block_1-0-22"><span data-dcnode-id="3167" instrument_node="">
Both condoms prevent skin-to-skin contact between the penis and the partner's skin. They also "catch" pre-ejaculate and ejaculate (semen), preventing sperm from reaching the egg.
</span></p><span data-dcnode-id="3165" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3164" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="3163" instrument_node="">

Typical use: About 79% effective

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3130" id="mntl-sc-block_1-0-34"><span data-dcnode-id="3134" instrument_node="">
</span><strong data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">How Much Does It Cost?</span></strong><span data-dcnode-id="3131" instrument_node="">

External condoms cost about $2–$6 for a box of three. Packs of 12 or more often work out to about $1 per condom.&nbsp;Internal condoms cost $2–$3 each. Some places such as sexual health clinics will give out condoms for free.

</span><strong data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">Pros</span></strong><span data-dcnode-id="3118" instrument_node="">

</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3115" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="3114" instrument_node="">

</span><li data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">Easy to access</span></li><li data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Easy to use (once you get the hang of it; practice first if you are new to condom use)</span></li><li data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">Affordable, discreet, and portable</span></li><li data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Effective against STIs (except for lambskin)</span></li><li data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">No side effects for either partner (if an allergy or irritation presents, non-latex options are available)</span></li><li data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Can be used with most other birth control methods for added protection</span></li><span data-dcnode-id="3100" instrument_node="">

</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3097" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="3096" instrument_node="">

The birth control </span><a data-component="link" data-dcnode-id="3066" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/how-to-insert-the-today-sponge-906822"><span data-dcnode-id="3067" instrument_node="">sponge</span></a><span data-dcnode-id="3065" instrument_node=""> is a small, round, squishy plastic sponge that is placed deep inside the vagina (to cover the cervix) before sex. The sponge blocks sperm from entering the uterus. It contains spermicide, which slows down sperm.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3063" data-id="#citation-3"><span data-dcnode-id="3064" instrument_node="">3</span></span><span data-dcnode-id="3062" instrument_node="">
</span></p><span data-dcnode-id="3060" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3059" id="mntl-sc-block_1-0-49"></div><span data-dcnode-id="3058" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3053" id="mntl-sc-block_1-0-50"><span data-dcnode-id="3057" instrument_node="">
</span><strong data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">How Effective Is It?</span></strong><span data-dcnode-id="3054" instrument_node="">

</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3051" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="3050" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3048" id="mntl-sc-block_1-0-52"><span data-dcnode-id="3049" instrument_node="">
Ideal use: About 91% effective. About 80% effective if you have given birth.
</span></p><span data-dcnode-id="3047" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3046" id="mntl-sc-block_1-0-53"></div><span data-dcnode-id="3045" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3043" id="mntl-sc-block_1-0-54"><span data-dcnode-id="3044" instrument_node="">
Typical use: About 88% effective. About 76% effective&nbsp;if you have given birth.
</span></p><span data-dcnode-id="3042" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3041" id="mntl-sc-block_1-0-55"></div><span data-dcnode-id="3040" instrument_node="">

</span><strong data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">How Much Does It Cost?</span></strong><span data-dcnode-id="3036" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3030" id="mntl-sc-block_1-0-58"><span data-dcnode-id="3031" instrument_node="">
A pack of three sponges costs about $15.
</span></p><span data-dcnode-id="3029" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3028" id="mntl-sc-block_1-0-59"></div><span data-dcnode-id="3027" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="3022" id="mntl-sc-block_1-0-60"><span data-dcnode-id="3026" instrument_node="">
</span><strong data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Pros</span></strong><span data-dcnode-id="3023" instrument_node="">

</span><strong data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Cons</span></strong><span data-dcnode-id="2999" instrument_node="">

</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2983" id="mntl-sc-block_1-0-66"><span data-dcnode-id="2994" instrument_node="">
</span><li data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Can irritate the vagina or penis with its spermicide (nonoxynol-9), which can give infections an easier pathway into the body, increasing the risk for human immunodeficiency virus (HIV) and other STIs (using condoms along with the sponge can help prevent STIs)</span></li><li data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Increased risk of toxic shock syndrome</span></li><li data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Can be hard to use correctly</span></li><li data-dcnode-id="2985"><span data-dcnode-id="2987" instrument_node="">Must be left in for at least six hours after the last time you had sex (but no more than 30 hours total)</span><br data-dcnode-id="2986"></li><span data-dcnode-id="2984" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2964" id="mntl-sc-block_1-0-70"><span data-dcnode-id="2973" instrument_node="">
A </span><a data-component="link" data-dcnode-id="2971" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-is-a-diaphragm-906847"><span data-dcnode-id="2972" instrument_node="">diaphragm</span></a><span data-dcnode-id="2970" instrument_node=""> is a soft, shallow, silicone cup that is inserted into the vagina to cover the cervix.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2968" data-id="#citation-24"><span data-dcnode-id="2969" instrument_node="">4</span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2966" data-id="#citation-4"><span data-dcnode-id="2967" instrument_node="">5</span></span><span data-dcnode-id="2965" instrument_node=""> It prevents sperm from entering the uterus by blocking the cervix.
</span></p><span data-dcnode-id="2963" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2962" id="mntl-sc-block_1-0-71"></div><span data-dcnode-id="2961" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2959" id="mntl-sc-block_1-0-72"><span data-dcnode-id="2960" instrument_node="">
A diaphragm is used with spermicide, which slows sperm and increases the effectiveness of the diaphragm. Spermicide also helps keep the diaphragm in place.
</span></p><span data-dcnode-id="2958" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2957" id="mntl-sc-block_1-0-73"></div><span data-dcnode-id="2956" instrument_node="">

</span><strong data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">How Effective Is It?</span></strong><span data-dcnode-id="2952" instrument_node="">
</span></p><span data-dcnode-id="2950" instrument_node="">

Ideal use (with spermicide): 94% effective
</span></p><span data-dcnode-id="2945" instrument_node="">

</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2931" id="mntl-sc-block_1-0-81"></div><span data-dcnode-id="2930" instrument_node="">

</span><a data-component="link" data-dcnode-id="2704" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/types-of-spermicide-906824"><span data-dcnode-id="2705" instrument_node="">Spermicide</span></a><span data-dcnode-id="2703" instrument_node=""> is an over-the-counter (OTC) product that comes in gel, cream, foam, or suppository. It is inserted deep in the vagina to prevent sperm from reaching an egg. There is also a prescription gel called </span><a data-component="link" data-dcnode-id="2701" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/fda-approves-non-hormonal-birth-control-gel-4869870"><span data-dcnode-id="2702" instrument_node="">Phexxi</span></a><span data-dcnode-id="2700" instrument_node=""> that works in a similar way to impair sperm mobility.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2698" data-id="#citation-25"><span data-dcnode-id="2699" instrument_node="">7</span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2696" data-id="#citation-6"><span data-dcnode-id="2697" instrument_node="">8</span></span><span data-dcnode-id="2695" instrument_node="">

The </span><a data-component="link" data-dcnode-id="2471" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/depo-provera-a2-906849"><span data-dcnode-id="2472" instrument_node="">birth control shot</span></a><span data-dcnode-id="2470" instrument_node=""> (also called Depo-Provera) is a hormonal injection received every three months.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2468" data-id="#citation-9"><span data-dcnode-id="2469" instrument_node="">10</span></span><span data-dcnode-id="2467" instrument_node=""> The birth control shot contains the hormone progestin, which prevents ovulation.&nbsp;It also makes cervical mucus thicker, making it hard for sperm to get through.
</span></p><span data-dcnode-id="2465" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2464" id="mntl-sc-block_1-0-174"></div><span data-dcnode-id="2463" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2453" id="mntl-sc-block_1-0-177"><span data-dcnode-id="2454" instrument_node="">

</span></p><span data-dcnode-id="2452" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2451" id="mntl-sc-block_1-0-178"></div><span data-dcnode-id="2450" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2448" id="mntl-sc-block_1-0-179"><span data-dcnode-id="2449" instrument_node="">
Typical use: About 94% effective
</span></p><span data-dcnode-id="2447" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2446" id="mntl-sc-block_1-0-180"></div><span data-dcnode-id="2445" instrument_node="">

</span><strong data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">How Much Does It Cost?</span></strong><span data-dcnode-id="2441" instrument_node="">

Including an exam, it may cost up to $250. Each additional visit may cost up to $150. Costs are often covered by insurance or programs such as Medicaid or other state programs.</span><br data-dcnode-id="2435"><span data-dcnode-id="2434" instrument_node="">

</span><strong data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Pros</span></strong><span data-dcnode-id="2426" instrument_node="">

</span><li data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Convenient (only need to think about birth control four times a year)</span></li><li data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Can make periods lighter and/or less frequent</span></li><li data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">May ease cramps and premenstrual syndrome (PMS)</span></li><span data-dcnode-id="2414" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2375" id="mntl-sc-block_1-0-195"><span data-dcnode-id="2382" instrument_node="">
The </span><a data-component="link" data-dcnode-id="2380" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/nuvaring-description-advantages-and-effectiveness-906865"><span data-dcnode-id="2381" instrument_node="">birth control ring</span></a><span data-dcnode-id="2379" instrument_node=""> (also called the vaginal ring, or the ring) is a small, flexible ring that goes inside the vagina and releases estrogen and progestin into the body.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2377" data-id="#citation-10"><span data-dcnode-id="2378" instrument_node="">11</span></span><span data-dcnode-id="2376" instrument_node=""> These hormones prevent ovulation and thicken cervical mucus.
</span></p><span data-dcnode-id="2374" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2373" id="mntl-sc-block_1-0-196"></div><span data-dcnode-id="2372" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2370" id="mntl-sc-block_1-0-197"><span data-dcnode-id="2371" instrument_node="">
The two kinds of birth control rings are:
</span></p><span data-dcnode-id="2369" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2368" id="mntl-sc-block_1-0-198"></div><span data-dcnode-id="2367" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2360" id="mntl-sc-block_1-0-199"><span data-dcnode-id="2366" instrument_node="">
</span><li data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">NuvaRing is put in the vagina for three weeks, then removed for one week a month to allow for a period. A new ring is used each month.</span></li><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">The ANNOVERA ring lasts for a year (13 cycles). It goes in the vagina for 21 days, then is taken out for seven days and stored in a case. After those seven days, the same ring goes back in.</span></li><span data-dcnode-id="2361" instrument_node="">
</span></ul><span data-dcnode-id="2359" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2358" id="mntl-sc-block_1-0-200"></div><span data-dcnode-id="2357" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2352" id="mntl-sc-block_1-0-201"><span data-dcnode-id="2356" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2347" id="mntl-sc-block_1-0-203"><span data-dcnode-id="2348" instrument_node="">
Ideal use: 99% effective
</span></p><span data-dcnode-id="2346" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2345" id="mntl-sc-block_1-0-204"></div><span data-dcnode-id="2344" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2340" id="mntl-sc-block_1-0-205"><span data-dcnode-id="2343" instrument_node="">
Typical use: 91% effective</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">
</span></p><span data-dcnode-id="2339" instrument_node="">

</span><li data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Doesn't protect against STIs</span></li><li data-dcnode-id="2193"><span data-dcnode-id="2195" instrument_node="">Can have side effects</span><br data-dcnode-id="2194"></li><span data-dcnode-id="2192" instrument_node="">

Both pills work to prevent ovulation and thicken cervical mucus (making it harder for sperm to get in). It is taken daily ideally at the same time. The minipill must be taken within the same three-hour window each day.

</span></p><span data-dcnode-id="2147" instrument_node="">

The progestin-only pill is slightly less effective than the combination pill.
</span></p><span data-dcnode-id="2142" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2135" id="mntl-sc-block_1-0-255"><span data-dcnode-id="2139" instrument_node="">
</span><strong data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">How Much Does It Cost?</span></strong><span data-dcnode-id="2136" instrument_node="">

</span><strong data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Pros</span></strong><span data-dcnode-id="2121" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2072" id="mntl-sc-block_1-0-269"><span data-dcnode-id="2079" instrument_node="">
</span><a data-component="link" data-dcnode-id="2077" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/rhythm-method-of-birth-control-5202158"><span data-dcnode-id="2078" instrument_node="">Fertility awareness methods</span></a><span data-dcnode-id="2076" instrument_node=""> (also called "natural family planning” or the rhythm method) are routines that track ovulation so that sex can be avoided on days most likely to result in pregnancy.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2074" data-id="#citation-13"><span data-dcnode-id="2075" instrument_node="">15</span></span><span data-dcnode-id="2073" instrument_node="">
</span></p><span data-dcnode-id="2071" instrument_node="">

Tracking methods can include taking your temperature every morning before getting out of bed, checking cervical mucus (vaginal discharge) daily, and charting your cycle on a calendar or in a period tracking app.
</span></p><span data-dcnode-id="2066" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2065" id="mntl-sc-block_1-0-272"></div><span data-dcnode-id="2064" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2059" id="mntl-sc-block_1-0-273"><span data-dcnode-id="2063" instrument_node="">
</span><strong data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">How Effective Is It?</span></strong><span data-dcnode-id="2060" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2031" id="mntl-sc-block_1-0-281"><span data-dcnode-id="2035" instrument_node="">
</span><strong data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Pros</span></strong><span data-dcnode-id="2032" instrument_node="">

The </span><a data-component="link" data-dcnode-id="1969" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/nexplanon-birth-control-implant-faq-906864"><span data-dcnode-id="1970" instrument_node="">birth control implant</span></a><span data-dcnode-id="1968" instrument_node=""> is a small rod that is implanted into the upper arm by a healthcare provider.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1966" data-id="#citation-14"><span data-dcnode-id="1967" instrument_node="">17</span></span><span data-dcnode-id="1965" instrument_node=""> The implant releases the hormone progestin, which prevents ovulation. It also thickens cervical mucus, which helps stop sperm from getting in.
</span></p><span data-dcnode-id="1963" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1962" id="mntl-sc-block_1-0-293"></div><span data-dcnode-id="1961" instrument_node="">

</span></p><span data-dcnode-id="1956" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1919" id="mntl-sc-block_1-0-304"><span data-dcnode-id="1923" instrument_node="">
</span><strong data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Pros</span></strong><span data-dcnode-id="1920" instrument_node="">
</span></p><span data-dcnode-id="1918" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1917" id="mntl-sc-block_1-0-305"></div><span data-dcnode-id="1916" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1904" id="mntl-sc-block_1-0-306"><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Very effective</span></li><li data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Convenient</span></li><li data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Can ease period cramps and make periods lighter</span></li><li data-dcnode-id="1906"><span data-dcnode-id="1908" instrument_node="">Is long-term but reversible (the implant can be removed at any time)</span><br data-dcnode-id="1907"></li><span data-dcnode-id="1905" instrument_node="">
</span></ul><span data-dcnode-id="1903" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1902" id="mntl-sc-block_1-0-307"></div><span data-dcnode-id="1901" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1896" id="mntl-sc-block_1-0-308"><span data-dcnode-id="1900" instrument_node="">
</span><strong data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Cons</span></strong><span data-dcnode-id="1897" instrument_node="">
</span></p><span data-dcnode-id="1895" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1894" id="mntl-sc-block_1-0-309"></div><span data-dcnode-id="1893" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1883" id="mntl-sc-block_1-0-310"><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Doesn't protect against STIs</span></li><li data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Can have side effects</span></li><li data-dcnode-id="1885"><span data-dcnode-id="1887" instrument_node="">Infection in the arm is possible (this is rare)</span><br data-dcnode-id="1886"></li><span data-dcnode-id="1884" instrument_node="">
</span></ul><span data-dcnode-id="1882" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1881" id="mntl-sc-block_1-0-311"></div><span data-dcnode-id="1880" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1875" id="mntl-sc-block_1-0-313"><span data-dcnode-id="1879" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node=""> IUD </span></span><span data-dcnode-id="1876" instrument_node=""> </span></h3><span data-dcnode-id="1874" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1869" id="mntl-sc-block_1-0-314"><span data-dcnode-id="1873" instrument_node="">
</span><strong data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">What Is It?</span></strong><span data-dcnode-id="1870" instrument_node="">
</span></p><span data-dcnode-id="1868" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1867" id="mntl-sc-block_1-0-315"></div><span data-dcnode-id="1866" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1858" id="mntl-sc-block_1-0-316"><span data-dcnode-id="1865" instrument_node="">
An </span><a class="pseudoStyle" data-component="link" data-dcnode-id="1863" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/all-about-the-iud-906770"><span data-dcnode-id="1864" instrument_node="">intrauterine device</span></a><span data-dcnode-id="1862" instrument_node="">, or IUD, is a small, flexible </span><em data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">T</span></em><span data-dcnode-id="1859" instrument_node="">-shaped contraption that is inserted into the uterus by a healthcare provider. There are two types of IUDs: hormonal and nonhormonal. Both thicken the cervical mucus to keep sperm out.
</span></p><span data-dcnode-id="1857" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1856" id="mntl-sc-block_1-0-317"></div><span data-dcnode-id="1855" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1850" id="mntl-sc-block_1-0-318"><span data-dcnode-id="1854" instrument_node="">
Hormonal IUDs release a tiny amount of the&nbsp;hormone&nbsp;progestin (which prevents ovulation) into the uterus over a period of three to seven years, depending on which IUD is used.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1852" data-id="#citation-15"><span data-dcnode-id="1853" instrument_node="">18</span></span><span data-dcnode-id="1851" instrument_node="">
</span></p><span data-dcnode-id="1849" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1848" id="mntl-sc-block_1-0-319"></div><span data-dcnode-id="1847" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1841" id="mntl-sc-block_1-0-320"><span data-dcnode-id="1846" instrument_node="">
The nonhormonal IUD releases a small amount of copper (which is toxic to sperm). It is effective for up to 12 years.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1844" data-id="#citation-29"><span data-dcnode-id="1845" instrument_node="">19</span></span><br data-dcnode-id="1843"><span data-dcnode-id="1842" instrument_node="">
</span></p><span data-dcnode-id="1840" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1839" id="mntl-sc-block_1-0-321"></div><span data-dcnode-id="1838" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1833" id="mntl-sc-block_1-0-322"><span data-dcnode-id="1837" instrument_node="">
</span><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">How Effective Is It?</span></strong><span data-dcnode-id="1834" instrument_node="">
</span></p><span data-dcnode-id="1832" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1831" id="mntl-sc-block_1-0-323"></div><span data-dcnode-id="1830" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1826" id="mntl-sc-block_1-0-324"><span data-dcnode-id="1829" instrument_node="">
More than 99% effective</span><br data-dcnode-id="1828"><span data-dcnode-id="1827" instrument_node="">
</span></p><span data-dcnode-id="1825" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1824" id="mntl-sc-block_1-0-325"></div><span data-dcnode-id="1823" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1818" id="mntl-sc-block_1-0-326"><span data-dcnode-id="1822" instrument_node="">
</span><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">How Much Does It Cost?</span></strong><span data-dcnode-id="1819" instrument_node="">
</span></p><span data-dcnode-id="1817" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1816" id="mntl-sc-block_1-0-327"></div><span data-dcnode-id="1815" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1811" id="mntl-sc-block_1-0-328"><span data-dcnode-id="1814" instrument_node="">
An IUD can cost up to $1,300, including medical exams, getting the IUD put in, and follow-up visits. This is often at least partially covered by insurance or programs such as Medicaid.</span><br data-dcnode-id="1813"><span data-dcnode-id="1812" instrument_node="">
</span></p><span data-dcnode-id="1810" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1809" id="mntl-sc-block_1-0-329"></div><span data-dcnode-id="1808" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1803" id="mntl-sc-block_1-0-330"><span data-dcnode-id="1807" instrument_node="">
</span><strong data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Pros</span></strong><span data-dcnode-id="1804" instrument_node="">
</span></p><span data-dcnode-id="1802" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1801" id="mntl-sc-block_1-0-331"></div><span data-dcnode-id="1800" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1786" id="mntl-sc-block_1-0-332"><span data-dcnode-id="1799" instrument_node="">
</span><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Very effective</span></li><li data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Convenient</span></li><li data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Can make your period lighter</span></li><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Is long-term but reversible (the IUD can be removed at any time)</span></li><li data-dcnode-id="1788"><span data-dcnode-id="1790" instrument_node="">Can help treat people who suffer from severe cramps, really heavy periods, and anemia</span><br data-dcnode-id="1789"></li><span data-dcnode-id="1787" instrument_node="">
</span></ul><span data-dcnode-id="1785" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1784" id="mntl-sc-block_1-0-333"></div><span data-dcnode-id="1783" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1778" id="mntl-sc-block_1-0-334"><span data-dcnode-id="1782" instrument_node="">
</span><strong data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Cons</span></strong><span data-dcnode-id="1779" instrument_node="">
</span></p><span data-dcnode-id="1777" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1776" id="mntl-sc-block_1-0-335"></div><span data-dcnode-id="1775" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1758" id="mntl-sc-block_1-0-336"><span data-dcnode-id="1774" instrument_node="">
</span><li data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Doesn't protect against STIs</span></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Can have side effects and rare risks (talk to your healthcare provider)</span></li><span data-dcnode-id="1768" instrument_node="">
</span><li data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Can be painful or uncomfortable to insert (like period cramps) but is temporary</span></li><span data-dcnode-id="1765" instrument_node="">
</span><li data-dcnode-id="1760"><span data-dcnode-id="1764" instrument_node="">Needs to be removed right away in the small chance a pregnancy occurs, to avoid complications such as </span><a data-component="link" data-dcnode-id="1762" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfamily.com/ectopic-pregnancy-2371494" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1763" instrument_node="">ectopic pregnancy</span></a><br data-dcnode-id="1761"></li><span data-dcnode-id="1759" instrument_node="">
</span></ul><span data-dcnode-id="1757" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1756" id="mntl-sc-block_1-0-337"></div><span data-dcnode-id="1755" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1745" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-339"><span data-dcnode-id="1754" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1752" id="mntl-sc-block-callout-heading_1-0-3"><span data-dcnode-id="1753" instrument_node="">
Emergency Contraception</span></h3><span data-dcnode-id="1751" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1747" id="mntl-sc-block-callout-body_1-0-3"><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">The nonhormonal copper IUD can also be used as emergency contraception. It is 99.9% effective at preventing pregnancy if it is inserted within 120 hours (five days) after having unprotected sex. It can remain in afterward to prevent future pregnancies.</span></p></div><span data-dcnode-id="1746" instrument_node="">
</span></div><span data-dcnode-id="1744" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1743" id="toc-permanent-contraceptives"></span><span data-dcnode-id="1742" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1737" id="mntl-sc-block_1-0-340"><span data-dcnode-id="1741" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node=""> Permanent Contraceptives </span></span><span data-dcnode-id="1738" instrument_node=""> </span></h2><span data-dcnode-id="1736" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1735" id="toc-vasectomy"></span><span data-dcnode-id="1734" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1729" id="mntl-sc-block_1-0-341"><span data-dcnode-id="1733" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node=""> Vasectomy </span></span><span data-dcnode-id="1730" instrument_node=""> </span></h2><span data-dcnode-id="1728" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1718" id="mntl-sc-block_1-0-342"><span data-dcnode-id="1727" instrument_node="">
A </span><a data-component="link" data-dcnode-id="1725" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/vasectomy-day-of-surgery-4844593"><span data-dcnode-id="1726" instrument_node="">vasectomy</span></a><span data-dcnode-id="1724" instrument_node=""> is a surgery in which the small tubes (vas deferens) in the&nbsp;scrotum&nbsp;that carry&nbsp;sperm&nbsp;are cut or blocked off. It is performed by a healthcare provider in an office, hospital, or clinic. The procedure is very short (about 20 minutes) and heals within a few days. It permanently prevents pregnancy.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1722" data-id="#citation-23"><span data-dcnode-id="1723" instrument_node="">20</span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1720" data-id="#citation-17"><span data-dcnode-id="1721" instrument_node="">21</span></span><span data-dcnode-id="1719" instrument_node="">
</span></p><span data-dcnode-id="1717" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1716" id="mntl-sc-block_1-0-343"></div><span data-dcnode-id="1715" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1710" id="mntl-sc-block_1-0-344"><span data-dcnode-id="1714" instrument_node="">
</span><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">How Effective Is It?</span></strong><span data-dcnode-id="1711" instrument_node="">
</span></p><span data-dcnode-id="1709" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1708" id="mntl-sc-block_1-0-345"></div><span data-dcnode-id="1707" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1703" id="mntl-sc-block_1-0-346"><span data-dcnode-id="1706" instrument_node="">
Almost 100%</span><br data-dcnode-id="1705"><span data-dcnode-id="1704" instrument_node="">
</span></p><span data-dcnode-id="1702" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1701" id="mntl-sc-block_1-0-347"></div><span data-dcnode-id="1700" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1695" id="mntl-sc-block_1-0-348"><span data-dcnode-id="1699" instrument_node="">
</span><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">How Much Does It Cost?</span></strong><span data-dcnode-id="1696" instrument_node="">
</span></p><span data-dcnode-id="1694" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1693" id="mntl-sc-block_1-0-349"></div><span data-dcnode-id="1692" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1690" id="mntl-sc-block_1-0-350"><span data-dcnode-id="1691" instrument_node="">
A vasectomy can cost up to $1,000, including follow-up visits. Vasectomies may be fully or partially covered by some health insurance plans, Medicaid, and other government programs.
</span></p><span data-dcnode-id="1689" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1688" id="mntl-sc-block_1-0-351"></div><span data-dcnode-id="1687" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1682" id="mntl-sc-block_1-0-352"><span data-dcnode-id="1686" instrument_node="">
</span><strong data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Pros</span></strong><span data-dcnode-id="1683" instrument_node="">
</span></p><span data-dcnode-id="1681" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1680" id="mntl-sc-block_1-0-353"></div><span data-dcnode-id="1679" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1671" id="mntl-sc-block_1-0-354"><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Very effective</span></li><li data-dcnode-id="1673"><span data-dcnode-id="1675" instrument_node="">Permanent</span><br data-dcnode-id="1674"></li><span data-dcnode-id="1672" instrument_node="">
</span></ul><span data-dcnode-id="1670" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1669" id="mntl-sc-block_1-0-355"></div><span data-dcnode-id="1668" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1663" id="mntl-sc-block_1-0-356"><span data-dcnode-id="1667" instrument_node="">
</span><strong data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Cons</span></strong><span data-dcnode-id="1664" instrument_node="">
</span></p><span data-dcnode-id="1662" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1661" id="mntl-sc-block_1-0-357"></div><span data-dcnode-id="1660" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1646" id="mntl-sc-block_1-0-358"><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Doesn't protect against STIs</span></li><li data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Not easily reversed, and a reversal may not work</span></li><li data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Can have risks (discuss with your healthcare provider)</span></li><li data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Is not immediately effective–takes about three months for there to be no sperm in the semen (after three months, this will be tested to make sure the semen is sperm-free)</span></li><li data-dcnode-id="1648"><span data-dcnode-id="1650" instrument_node="">Can be painful or uncomfortable procedure, which is temporary</span><br data-dcnode-id="1649"></li><span data-dcnode-id="1647" instrument_node="">
</span></ul><span data-dcnode-id="1645" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1644" id="mntl-sc-block_1-0-359"></div><span data-dcnode-id="1643" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1638" id="mntl-sc-block_1-0-361"><span data-dcnode-id="1642" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node=""> Tubal Ligation </span></span><span data-dcnode-id="1639" instrument_node=""> </span></h3><span data-dcnode-id="1637" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1626" id="mntl-sc-block_1-0-362"><span data-dcnode-id="1636" instrument_node="">
</span><a data-component="link" data-dcnode-id="1634" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/getting-your-tubes-tied-906939"><span data-dcnode-id="1635" instrument_node="">Tubal ligation</span></a><span data-dcnode-id="1633" instrument_node=""> (“getting your tubes tied”) is a surgical procedure in which a healthcare provider </span><a class="pseudoStyle" data-component="link" data-dcnode-id="1631" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/birth-control-permanent-methods-4013783"><span data-dcnode-id="1632" instrument_node="">permanently</span></a><span data-dcnode-id="1630" instrument_node=""> cuts or seals off the fallopian tubes to prevent eggs from being released into the uterus.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1628" data-id="#citation-18"><span data-dcnode-id="1629" instrument_node="">22</span></span><span data-dcnode-id="1627" instrument_node=""> This keeps eggs and sperm from meeting.
</span></p><span data-dcnode-id="1625" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1624" id="mntl-sc-block_1-0-363"></div><span data-dcnode-id="1623" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1621" id="mntl-sc-block_1-0-364"><span data-dcnode-id="1622" instrument_node="">
It's usually a laparoscopic procedure (through one or two small cuts, using a tool with a light and a lens), with either local or general anesthesia. It takes about 20–30 minutes and leaves little scarring. Most people go home the same day.
</span></p><span data-dcnode-id="1620" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1619" id="mntl-sc-block_1-0-365"></div><span data-dcnode-id="1618" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1613" id="mntl-sc-block_1-0-366"><span data-dcnode-id="1617" instrument_node="">
</span><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">How Effective Is It?</span></strong><span data-dcnode-id="1614" instrument_node="">
</span></p><span data-dcnode-id="1612" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1611" id="mntl-sc-block_1-0-367"></div><span data-dcnode-id="1610" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1608" id="mntl-sc-block_1-0-368"><span data-dcnode-id="1609" instrument_node="">
More than 99% effective
</span></p><span data-dcnode-id="1607" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1606" id="mntl-sc-block_1-0-369"></div><span data-dcnode-id="1605" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1600" id="mntl-sc-block_1-0-370"><span data-dcnode-id="1604" instrument_node="">
</span><strong data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">How Much Does It Cost?</span></strong><span data-dcnode-id="1601" instrument_node="">
</span></p><span data-dcnode-id="1599" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1598" id="mntl-sc-block_1-0-371"></div><span data-dcnode-id="1597" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1593" id="mntl-sc-block_1-0-372"><span data-dcnode-id="1596" instrument_node="">
Tubal ligation can cost up to $6,000, including follow-up visits. This may be fully or partially covered by some health insurance plans, Medicaid, and other government programs.</span><br data-dcnode-id="1595"><span data-dcnode-id="1594" instrument_node="">
</span></p><span data-dcnode-id="1592" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1591" id="mntl-sc-block_1-0-373"></div><span data-dcnode-id="1590" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1585" id="mntl-sc-block_1-0-374"><span data-dcnode-id="1589" instrument_node="">
</span><strong data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Pros</span></strong><span data-dcnode-id="1586" instrument_node="">
</span></p><span data-dcnode-id="1584" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1583" id="mntl-sc-block_1-0-375"></div><span data-dcnode-id="1582" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1574" id="mntl-sc-block_1-0-376"><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Very effective</span></li><li data-dcnode-id="1576"><span data-dcnode-id="1578" instrument_node="">Permanent</span><br data-dcnode-id="1577"></li><span data-dcnode-id="1575" instrument_node="">
</span></ul><span data-dcnode-id="1573" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1572" id="mntl-sc-block_1-0-377"></div><span data-dcnode-id="1571" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1566" id="mntl-sc-block_1-0-378"><span data-dcnode-id="1570" instrument_node="">
</span><strong data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Cons</span></strong><span data-dcnode-id="1567" instrument_node="">
</span></p><span data-dcnode-id="1565" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1564" id="mntl-sc-block_1-0-379"></div><span data-dcnode-id="1563" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1549" id="mntl-sc-block_1-0-380"><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Doesn't protect against STIs</span></li><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Not easily reversed, and a reversal may not work</span></li><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Can have risks (discuss with your healthcare provider)</span></li><li data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Can cause some pain or discomfort, but it is temporary</span></li><li data-dcnode-id="1551"><span data-dcnode-id="1553" instrument_node="">Can develop a pregnancy in your fallopian tube (ectopic pregnancy), which is dangerous but rare</span><br data-dcnode-id="1552"></li><span data-dcnode-id="1550" instrument_node="">
</span></ul><span data-dcnode-id="1548" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1547" id="mntl-sc-block_1-0-381"></div><span data-dcnode-id="1546" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1545" id="toc-choosing-the-best-birth-control"></span><span data-dcnode-id="1544" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1539" id="mntl-sc-block_1-0-382"><span data-dcnode-id="1543" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node=""> Choosing the Best Birth Control </span></span><span data-dcnode-id="1540" instrument_node=""> </span></h2><span data-dcnode-id="1538" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1536" id="mntl-sc-block_1-0-383"><span data-dcnode-id="1537" instrument_node="">
There are more factors to consider than effectiveness and cost when choosing birth control. The birth control that is best for you depends on things such as:
</span></p><span data-dcnode-id="1535" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1534" id="mntl-sc-block_1-0-384"></div><span data-dcnode-id="1533" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1514" id="mntl-sc-block_1-0-385"><span data-dcnode-id="1532" instrument_node="">
</span><li data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Do you want to get pregnant in the future?</span></li><li data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Are STIs something you need to protect against?</span></li><li data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Do you want a method you use every time or something that lasts longer?</span></li><li data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Can you be sure that you will use that method correctly every time?</span></li><li data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Do you or your partner have any health concerns or allergies that might affect which method you choose?</span></li><li data-dcnode-id="1518"><span data-dcnode-id="1521" instrument_node="">How often do you have sex?</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1519" data-id="#citation-27"><span data-dcnode-id="1520" instrument_node="">23</span></span></li><li data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">How many sexual partners do you have?</span></li><span data-dcnode-id="1515" instrument_node="">
</span></ul><span data-dcnode-id="1513" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1512" id="mntl-sc-block_1-0-386"></div><span data-dcnode-id="1511" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1505" id="mntl-sc-block_1-0-387"><span data-dcnode-id="1510" instrument_node="">
Condoms plus another form of birth control is a good way to prevent pregnancy and STIs.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1508" data-id="#citation-20"><span data-dcnode-id="1509" instrument_node="">24</span></span><br data-dcnode-id="1507"><span data-dcnode-id="1506" instrument_node="">
</span></p><span data-dcnode-id="1504" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1503" id="mntl-sc-block_1-0-388"></div><span data-dcnode-id="1502" instrument_node="">
</span><div class="comp theme-keyfeatures mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1490" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-390"><span data-dcnode-id="1501" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1499" id="mntl-sc-block-callout-heading_1-0-4"><span data-dcnode-id="1500" instrument_node="">
Start with Your Healthcare Provider</span></h3><span data-dcnode-id="1498" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1492" id="mntl-sc-block-callout-body_1-0-4"><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Before starting a birth control method, it's a good idea to speak with your healthcare provider, even if your method of choice doesn't require a prescription.</span></p><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Your healthcare provider can help you decide what would best suit your needs, discuss any risks you should be aware of, and help make sure you are using the method correctly.</span></p></div><span data-dcnode-id="1491" instrument_node="">
</span></div><span data-dcnode-id="1489" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1488" id="toc-a-word-from-verywell"></span><span data-dcnode-id="1487" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1482" id="mntl-sc-block_1-0-391"><span data-dcnode-id="1486" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node=""> A Word From Verywell </span></span><span data-dcnode-id="1483" instrument_node=""> </span></h2><span data-dcnode-id="1481" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1479" id="mntl-sc-block_1-0-392"><span data-dcnode-id="1480" instrument_node="">
If you are having penis-in-vagina sex and you don't wish to become pregnant or cause someone else to, you will need to find an effective birth control method.
</span></p><span data-dcnode-id="1478" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1477" id="mntl-sc-block_1-0-393"></div><span data-dcnode-id="1476" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1474" id="mntl-sc-block_1-0-394"><span data-dcnode-id="1475" instrument_node="">
There are many choices available, each with benefits and disadvantages. Talk to your healthcare provider about your options and which method or methods work best for you and your needs.
</span></p><span data-dcnode-id="1473" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1472" id="mntl-sc-block_1-0-395"></div><span data-dcnode-id="1471" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1467" id="mntl-sc-block_1-0-396"><span data-dcnode-id="1470" instrument_node="">
It's important to remember that the only birth control method that protects against STIs are condoms. Combining condoms with another form of birth control protects against STIs and gives extra protection from pregnancy.</span><br data-dcnode-id="1469"><span data-dcnode-id="1468" instrument_node="">
</span></p><span data-dcnode-id="1466" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1465" id="mntl-sc-block_1-0-397"></div><span data-dcnode-id="1464" instrument_node="">
</span><div class="comp mntl-sc-block health-sc-block-faq mntl-sc-block-faq mntl-block" data-dcnode-id="1384" id="mntl-sc-block_1-0-398"><span data-dcnode-id="1463" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1462" id="toc-frequently-asked-questions-0e62b939-8ac2-4ac4-ad6d-30e67012b005"></span><span data-dcnode-id="1461" instrument_node="">
</span><h3 class="comp mntl-sc-block-faq__title mntl-text-block" data-dcnode-id="1459" id="mntl-sc-block-faq__title_1-0"><span data-dcnode-id="1460" instrument_node="">
Frequently Asked Questions</span></h3><span data-dcnode-id="1458" instrument_node="">
</span><ul class="comp mntl-sc-block-faq__content mntl-accordion js-accordion" data-dcnode-id="1388" data-tracking-container="true" id="mntl-sc-block-faq__content_1-0"><span data-dcnode-id="1457" instrument_node="">
</span><li class="accordion__item js-accordion-item" data-dcnode-id="1425"><span data-dcnode-id="1456" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="1441" id="mntl-sc-block-faq__content_1-section-0"><span data-dcnode-id="1455" instrument_node="">

</span><span data-dcnode-id="1445" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">What birth control is best for me?</span></span><span data-dcnode-id="1442" instrument_node="">
</span></div><span data-dcnode-id="1439" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="1428"><span data-dcnode-id="1438" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="1430" id="mntl-sc-block-faq__accordion-content_1-0-section-0"><span data-dcnode-id="1437" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Which birth control is the best depends on what your personal needs and comfort levels are. In general, using condoms along with another form of birth control helps protect against STIs and gives extra protection from pregnancy.</span></p><span data-dcnode-id="1433" instrument_node="">
</span></div><span data-dcnode-id="1431" instrument_node="">
</span></div><span data-dcnode-id="1429" instrument_node="">
</span></div><span data-dcnode-id="1426" instrument_node="">
</span></li><span data-dcnode-id="1423" instrument_node="">
</span><li class="accordion__item js-accordion-item" data-dcnode-id="1391"><span data-dcnode-id="1422" instrument_node="">
</span><div class="accordion__header js-accordion-trigger" data-dcnode-id="1407" id="mntl-sc-block-faq__content_1-section-1"><span data-dcnode-id="1421" instrument_node="">
</span><svg class="icon icon-arrow-down accordion__icon" data-dcnode-id="1412"></svg><span data-dcnode-id="1420" instrument_node="">
</span><use data-dcnode-id="1414" xlink:href="#icon-arrow-down" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1415" id="icon-arrow-down"></svg><span data-dcnode-id="1419" instrument_node="">
</span><svg data-dcnode-id="1417" viewBox="0 0 131.403 81.64" xmlns="http://www.w3.org/2000/svg"><path d="M85.411 15.995l.01-.009-13.35-13.35a9 9 0 00-12.728 0l-13.31 13.31.006.006-12.318 12.307-.008.008L3.26 58.689a11.161 11.161 0 000 15.766l3.92 3.92a11.148 11.148 0 0015.765 0l42.738-42.737 42.737 42.737a11.148 11.148 0 0015.766 0l3.92-3.92a11.123 11.123 0 00.043-15.766z" data-dcnode-id="1418"></path></svg><span data-dcnode-id="1416" instrument_node=""> </span></use><span data-dcnode-id="1413" instrument_node="">
</span><span data-dcnode-id="1411" instrument_node="">
</span><span class="accordion__title" data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Which birth control is best for acne?</span></span><span data-dcnode-id="1408" instrument_node="">
</span></div><span data-dcnode-id="1405" instrument_node="">
</span><div class="accordion__body" data-dcnode-id="1394"><span data-dcnode-id="1404" instrument_node="">
</span><div class="comp class com.about.mantle.model.extended.docv2.sc.blocks.StructuredContentFaqEx$Faq mntl-sc-block-faq__accordion-content" data-dcnode-id="1396" id="mntl-sc-block-faq__accordion-content_1-0-section-1"><span data-dcnode-id="1403" instrument_node="">
</span><div class="faq-accordion__item-answer" data-dcnode-id="1398"><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Hormonal birth control methods such as the birth control pill or patch can help with acne.</span></p><span data-dcnode-id="1399" instrument_node="">
</span></div><span data-dcnode-id="1397" instrument_node="">
</span></div><span data-dcnode-id="1395" instrument_node="">
</span></div><span data-dcnode-id="1392" instrument_node="">
</span></li><span data-dcnode-id="1389" instrument_node="">
</span></ul><span data-dcnode-id="1387" instrument_node="">
</span><span data-dcnode-id="1385" instrument_node="">
