de-id="1505" instrument_node="">Lifestyle methods</span></a></div><div class="styles__StyledBox-sc-1gq8tiz-0 iekGXn" data-dcnode-id="1500"><a class="styles__StyledAction-sc-1xjy49r-0 bfPlEo JumpLink___StyledLink-vpuzq2-0 BkNzs" data-dcnode-id="1501" data-qa="health-jump-links" href="#getting-birth-control" rel="" tabindex="0" target="_self"><span data-dcnode-id="1502" instrument_node="">Getting birth control</span></a></div><div class="styles__StyledBox-sc-1gq8tiz-0 iekGXn" data-dcnode-id="1497"><a class="styles__StyledAction-sc-1xjy49r-0 bfPlEo JumpLink___StyledLink-vpuzq2-0 BkNzs" data-dcnode-id="1498" data-qa="health-jump-links" href="#common-concerns" rel="" tabindex="0" target="_self"><span data-dcnode-id="1499" instrument_node="">Common concerns</span></a></div><div class="styles__StyledBox-sc-1gq8tiz-0 iekGXn" data-dcnode-id="1494"><a class="styles__StyledAction-sc-1xjy49r-0 bfPlEo JumpLink___StyledLink-vpuzq2-0 BkNzs" data-dcnode-id="1495" data-qa="health-jump-links" href="#references" rel="" tabindex="0" target="_self"><span data-dcnode-id="1496" instrument_node="">References</span></a></div><div class="styles__StyledBox-sc-1gq8tiz-0 iekGXn" data-dcnode-id="1491"><a class="styles__StyledAction-sc-1xjy49r-0 bfPlEo JumpLink___StyledLink-vpuzq2-0 BkNzs" data-dcnode-id="1492" data-qa="health-jump-links" href="#resources-and-tools" rel="" tabindex="0" target="_self"><span data-dcnode-id="1493" instrument_node="">Resources and tools</span></a></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 jdtYfQ" data-dcnode-id="1427" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 hNhQFE" data-dcnode-id="1451"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1489" id="definition"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Definition</span></h2><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Birth control, also known as contraception, is a term for preventing unplanned pregnancy.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1479"><span data-dcnode-id="1484" instrument_node="">Although most people who menstruate are sexually active, not all of them are ready for pregnancy and parenthood. About </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.guttmacher.org/journals/psrh/2008/sexual-behavior-single-adult-american-women%23%3A~%3Atext%3DOverall%252C%252089%2525%2520of%2520single%2520women%2Cfor%2520married%2520or%2520cohabiting%2520women." rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">95%</span></u></a><span data-dcnode-id="1480" instrument_node=""> of women who are married or living with a partner are sexually active. Approximately 89% of single women are sexually experienced, and 70% of them are sexually active.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Being able to prevent pregnancy is important for many reasons. Whatever your reason, you have the right to choose if, when, and how you become pregnant.&nbsp;&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Although preventing pregnancy is the obvious benefit of contraception, you might be interested in getting it for its other effects. Depending on which form you choose, birth control can help you have:</span></p><ul class="richTextToMDS___StyledUl-sc-1cotaf0-2 gcRBQI" data-dcnode-id="1460"><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1472"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Lighter and less painful periods</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1469"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Improved symptoms related to endometriosis or PMDD</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1466"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Better control over acne</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1461"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1462"><span data-dcnode-id="1465" instrument_node="">Less unwanted hormone-related hair growth&nbsp;</span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node=""></span></p></li></ul><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">There are lots of options when it comes to birth control —&nbsp;prescription, over-the-counter, and lifestyle.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1452"><span data-dcnode-id="1457" instrument_node="">Keep in mind that most contraceptive methods don’t protect against </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsddc.org/resource/stds-the-basics/" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">sexually transmitted infections or diseases</span></u></a><span data-dcnode-id="1453" instrument_node="">, such as chlamydia or HIV. Also, no contraceptive is 100% effective at preventing unplanned pregnancy. Only abstinence can prevent both.</span></p></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledButtonWrapper-sc-6e0e5k-0 dOTTcY re-flex" data-dcnode-id="1445" data-qa="read-more"><button _css2="10" class="styles__StyledAction-sc-1xjy49r-0 chSBES ReadMore___StyledButton-sc-1b3c6jn-1 itMwTS" data-dcnode-id="1446" type="button"><span data-dcnode-id="1449" style="text-decoration: underline;"><span data-dcnode-id="1450" instrument_node="">Read More</span></span><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 iCmmeb material-icons-round expand_more" data-dcnode-id="1447" style="font-size: 24px;"><span data-dcnode-id="1448" instrument_node="">expand_more</span></span></button></div><div class="styles__StyledBox-sc-1gq8tiz-0 cHNoZL" data-dcnode-id="1428"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledColumn-sc-1rccnrb-0 fJGfJa FlexRecommendedRead___StyledColumn-gacv8l-0 hFHnYm re-flex" data-dcnode-id="1429"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1430"><div class="styles__StyledBox-sc-1gq8tiz-0 kWkNSM h-full" data-dcnode-id="1431" data-qa="ArticleCardHorizontal" width="100%"><a class="styles__StyledAction-sc-1xjy49r-0 cfuuxi styles__StyledContainer-sc-1k8skqy-0-Container fwYdvT" data-dcnode-id="1432" data-qa="link-container" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/emergency-contraceptive/plan-b-a-to-z-everything-you-need-to-know-about-emergency-contraception" rel="" style="display:inline-block" tabindex="0" target="_self"><div class="styles__StyledBox-sc-1gq8tiz-0 fuvNPe styles__StyledRoot-sc-1k8skqy-1 bvbVbS" data-dcnode-id="1433" height="100%" width="100%"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit ArticleCard___StyledFlex2-sc-1nns7w-2 kzgbQj re-flex" data-dcnode-id="1434"><div class="styles__StyledBox-sc-1gq8tiz-0 jZSSRT styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1435"><div class="styles__StyledBox-sc-1gq8tiz-0 jfWfHw" data-dcnode-id="1442"><div class="styles__StyledMediaItemContainer-sc-1p5vowo-1 cBKRmV" data-dcnode-id="1443" data-qa="article-card-image" orientation="landscape" width="100%"><img alt="oral-contraceptive-goodrx.png" class="styles__StyledImage-jn74i1-0 gYdya styles__StyledImage-sc-1p5vowo-0 fMaVIg object-fit-image" data-dcnode-id="1444" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grxstatic.com/4f3rgqwzdznj/39TZMYe37V33TraWvwxAie/d0f26407b849345c351a1c0015f24ae9/oral-contraceptive-goodrx.png%3Fformat%3Dpng%26auto%3Dwebp%26width%3D350&amp;raw"></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1436"><h3 class="styles__StyledText-sc-1vmlgyl-0 dZBqcW re-text" color="$text-primary" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">What If I Need Emergency Contraceptives? What You Need To Know</span></h3><span class="styles__StyledText-sc-1vmlgyl-0 dUFbXR re-text" color="$text-secondary" data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Written by Ronilee Shye, PharmD, BCGP, BCACP, CDE</span></span><span data-dcnode-id="1437" instrument_node=""></span></div></div></div></div></a></div></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 hehevX" data-dcnode-id="1423" data-qa="health-page-ad"><div class="styles__StyledBox-sc-1gq8tiz-0 jcgAZO" data-dcnode-id="1424"><div class="styles__StyledBox-sc-1gq8tiz-0 bFGBFP styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1425" width="1"><div data-dcnode-id="1426" id="gpt-leaderboard_health_page-section-0"></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 jdtYfQ" data-dcnode-id="1359" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 hNhQFE" data-dcnode-id="1383"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1422" id="how-it-works"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">How it works</span></h2><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1414"><span data-dcnode-id="1419" instrument_node="">Several forms of birth control are available, and they work in different ways. (If you want a good refresher on how pregnancy happens, click </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ucsfhealth.org/education/conception-how-it-works" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">here</span></u></a><span data-dcnode-id="1415" instrument_node="">.)&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1408"><span data-dcnode-id="1413" instrument_node="">Barrier methods, such as </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/health-topic/sexual-health/what-to-do-if-a-condom-breaks" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">condoms</span></u></a><span data-dcnode-id="1409" instrument_node=""> and diaphragms, physically block the sperm’s access to an egg. These options do not have hormones, and they must be used every time you have sex.</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1402"><span data-dcnode-id="1407" instrument_node="">Sterilization also keeps the sperm from getting to an egg. This is a permanent (not reversible) surgical procedure that closes the fallopian tubes (so sperm can’t get to the eggs). You may have heard of it as “getting your tubes tied.” It’s over </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acog.org/womens-health/faqs/sterilization-for-women-and-men" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">99% effective</span></u></a><span data-dcnode-id="1403" instrument_node="">.</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">However, most forms of birth control contain human-made versions of the sex hormones estrogen and progestin, or in some cases, progestin only. These methods are collectively known as hormonal contraception. They prevent pregnancy by:</span></p><ul class="richTextToMDS___StyledUl-sc-1cotaf0-2 gcRBQI" data-dcnode-id="1390"><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1397"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Stopping the ovaries from releasing eggs (called ovulation)</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1394"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Thickening the mucus in the cervix (the opening of the uterus or womb), which makes it harder for sperm to reach and fertilize an egg</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1391"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Making the lining of the uterus less hospitable to a fertilized egg&nbsp;</span></p></li></ul><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1384"><span data-dcnode-id="1389" instrument_node="">According to the National Center for Health Statistics, approximately </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/nchs/products/databriefs/db327.htm%23%3A~%3Atext%3DIn%25202015%25E2%2580%25932017%252C%252064.9%2525%25E2%2580%2594or%252046.9%2520million%2520of%2Camong%2520women%2520aged%252040%25E2%2580%259349." rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">65%</span></u></a><span data-dcnode-id="1385" instrument_node=""> of women aged 15 to 49 in the U.S. were using some type of birth control between 2015 and 2017. That’s almost 47 million people. Female sterilization is the most common choice (18.6%), followed by the oral contraceptive pill (12.6%).</span></p></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledButtonWrapper-sc-6e0e5k-0 dOTTcY re-flex" data-dcnode-id="1377" data-qa="read-more"><button _css2="10" class="styles__StyledAction-sc-1xjy49r-0 chSBES ReadMore___StyledButton-sc-1b3c6jn-1 itMwTS" data-dcnode-id="1378" type="button"><span data-dcnode-id="1381" style="text-decoration: underline;"><span data-dcnode-id="1382" instrument_node="">Read More</span></span><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 iCmmeb material-icons-round expand_more" data-dcnode-id="1379" style="font-size: 24px;"><span data-dcnode-id="1380" instrument_node="">expand_more</span></span></button></div><div class="styles__StyledBox-sc-1gq8tiz-0 cHNoZL" data-dcnode-id="1360"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledColumn-sc-1rccnrb-0 fJGfJa FlexRecommendedRead___StyledColumn-gacv8l-0 hFHnYm re-flex" data-dcnode-id="1361"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1362"><div class="styles__StyledBox-sc-1gq8tiz-0 kWkNSM h-full" data-dcnode-id="1363" data-qa="ArticleCardHorizontal" width="100%"><a class="styles__StyledAction-sc-1xjy49r-0 cfuuxi styles__StyledContainer-sc-1k8skqy-0-Container fwYdvT" data-dcnode-id="1364" data-qa="link-container" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/birth-control/annual-cost-of-birth-control" rel="" style="display:inline-block" tabindex="0" target="_self"><div class="styles__StyledBox-sc-1gq8tiz-0 fuvNPe styles__StyledRoot-sc-1k8skqy-1 bvbVbS" data-dcnode-id="1365" height="100%" width="100%"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit ArticleCard___StyledFlex2-sc-1nns7w-2 kzgbQj re-flex" data-dcnode-id="1366"><div class="styles__StyledBox-sc-1gq8tiz-0 jZSSRT styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1367"><div class="styles__StyledBox-sc-1gq8tiz-0 jfWfHw" data-dcnode-id="1374"><div class="styles__StyledMediaItemContainer-sc-1p5vowo-1 cBKRmV" data-dcnode-id="1375" data-qa="article-card-image" orientation="landscape" width="100%"><img alt="Health: Birth Control: GettyImages-1326254115" class="styles__StyledImage-jn74i1-0 gYdya styles__StyledImage-sc-1p5vowo-0 fMaVIg object-fit-image" data-dcnode-id="1376" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grxstatic.com/4f3rgqwzdznj/5WFmr7m99Gy5i87z2bBggR/686527ebfadc86dc14d92cc09b786cb8/GettyImages-1326254115.jpg%3Fformat%3Dpjpg%26auto%3Dwebp%26width%3D350&amp;raw"></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1368"><h3 class="styles__StyledText-sc-1vmlgyl-0 dZBqcW re-text" color="$text-primary" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">What Is The Annual Cost of Birth Control?</span></h3><span class="styles__StyledText-sc-1vmlgyl-0 dUFbXR re-text" color="$text-secondary" data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Written by Sasha Guttentag, PhD</span></span><span data-dcnode-id="1369" instrument_node=""></span></div></div></div></div></a></div></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 jdtYfQ" data-dcnode-id="1313" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 eYwIwH" data-dcnode-id="1331"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1358" id="the-pill"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">The pill</span></h2><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">You’ve probably heard of birth control pills (“the pill”), since they’ve been around for decades. Pills contain estrogen and progestin (called combination pills) or only progestin (sometimes called the “mini-pill”).&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1340"><span data-dcnode-id="1353" instrument_node="">The pill has to be taken every day to work properly, and it typically prevents unplanned pregnancy in around </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/contraception/how-effective-contraception/" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">91 out of 100 users</span></u></a><span data-dcnode-id="1349" instrument_node="">. It is also prescribed to treat pain from periods, </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/pcos" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">PCOS</span></u></a><span data-dcnode-id="1345" instrument_node="">, and </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/endometriosis" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">endometriosis</span></u></a><span data-dcnode-id="1341" instrument_node="">, and it can even treat acne.</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">The most common combination pills have the same amount of hormone in each pill. These are called monophasic pills. Some pills have different levels of hormones from one week to the next, like your normal monthly cycle would. These are called phasic (biphasic or triphasic) pills.</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1332"><span data-dcnode-id="1337" instrument_node="">Multiple versions of the pill are available, and </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/birth-control/birth-control-pill%23how-to-choose" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">choosing</span></u></a><span data-dcnode-id="1333" instrument_node=""> one can feel overwhelming. Pills have different levels of hormones, so they have different benefits and risks. Your provider or pharmacist can help you choose which is best for you, based on your medical history, reason for taking the pill, and cost. At the end of the day, though, it’s common to go through a period of trial-and-error before finding a pill that works for them.&nbsp;</span></p></div><div class="styles__StyledBox-sc-1gq8tiz-0 cHNoZL" data-dcnode-id="1314"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledColumn-sc-1rccnrb-0 fJGfJa FlexRecommendedRead___StyledColumn-gacv8l-0 hFHnYm re-flex" data-dcnode-id="1315"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1316"><div class="styles__StyledBox-sc-1gq8tiz-0 kWkNSM h-full" data-dcnode-id="1317" data-qa="ArticleCardHorizontal" width="100%"><a class="styles__StyledAction-sc-1xjy49r-0 cfuuxi styles__StyledContainer-sc-1k8skqy-0-Container fwYdvT" data-dcnode-id="1318" data-qa="link-container" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/birth-control/birth-control-pill" rel="" style="display:inline-block" tabindex="0" target="_self"><div class="styles__StyledBox-sc-1gq8tiz-0 fuvNPe styles__StyledRoot-sc-1k8skqy-1 bvbVbS" data-dcnode-id="1319" height="100%" width="100%"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit ArticleCard___StyledFlex2-sc-1nns7w-2 kzgbQj re-flex" data-dcnode-id="1320"><div class="styles__StyledBox-sc-1gq8tiz-0 jZSSRT styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1321"><div class="styles__StyledBox-sc-1gq8tiz-0 jfWfHw" data-dcnode-id="1328"><div class="styles__StyledMediaItemContainer-sc-1p5vowo-1 cBKRmV" data-dcnode-id="1329" data-qa="article-card-image" orientation="landscape" width="100%"><img alt="Health: Birth Control: GettyImages-1298906610 2" class="styles__StyledImage-jn74i1-0 gYdya styles__StyledImage-sc-1p5vowo-0 fMaVIg object-fit-image" data-dcnode-id="1330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grxstatic.com/4f3rgqwzdznj/3bHJJh5XnKq2kcdwsNtscF/8f332f2d9c0d8e61546b12a43b1b7f33/GettyImages-1298906610_2.jpg%3Fformat%3Dpjpg%26auto%3Dwebp%26width%3D350&amp;raw"></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1322"><h3 class="styles__StyledText-sc-1vmlgyl-0 dZBqcW re-text" color="$text-primary" data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Which Contraceptive Pill Is Best And How Should I Choose?</span></h3><span class="styles__StyledText-sc-1vmlgyl-0 dUFbXR re-text" color="$text-secondary" data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Written by Mandy Armitage, MD</span></span><span data-dcnode-id="1323" instrument_node=""></span></div></div></div></div></a></div></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 jdtYfQ" data-dcnode-id="1216" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 hNhQFE" data-dcnode-id="1240"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1312" id="pill-alternatives"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Pill alternatives</span></h2><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">The pill is a popular contraceptive option, but it’s not for everyone. Some other options require you to see a healthcare provider, such as implants, intrauterine devices (IUDs), and shots. There are others that you can apply and remove yourself, including vaginal rings, patches, and caps.&nbsp;</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Long-acting reversible contraceptives</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1300"><span data-dcnode-id="1305" instrument_node="">Long-acting reversible contraceptives (LARCs) are the most effective (</span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/contraception/how-effective-contraception/%23%3A~%3Atext%3DAround%25201%2520in%2520100%2520women%2Cget%2520pregnant%2520in%2520a%2520year." rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">over 99%</span></u></a><span data-dcnode-id="1301" instrument_node="">) non-pill, nonsurgical contraceptives. These include:&nbsp;</span></p><ul class="richTextToMDS___StyledUl-sc-1cotaf0-2 gcRBQI" data-dcnode-id="1293"><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1297"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">The contraceptive implant, a thin plastic rod containing etonogestrel (a progestin), which is placed into your arm.</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1294"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">IUDs, T-shaped contraceptive devices that are placed in the uterus. Five of the available IUDs contain progestin, and the copper IUD is hormone-free.&nbsp;</span></p></li></ul><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">LARCs require a visit to your healthcare provider for placement, and they provide protection against unplanned pregnancy for years.&nbsp;</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Contraceptive injection&nbsp;</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1283"><span data-dcnode-id="1288" instrument_node="">The injection is the next most effective form of birth control. The injection contains progestin, and it protects against pregnancy for several weeks. You will need to get the shot from your healthcare provider at first, but then you can continue the injections on your own. Real-world efficacy is around </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/contraception/how-effective-contraception/%23%3A~%3Atext%3DAround%25201%2520in%2520100%2520women%2Cget%2520pregnant%2520in%2520a%2520year." rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">94%</span></u></a><span data-dcnode-id="1284" instrument_node="">.&nbsp;</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Vaginal rings and contraceptive patches&nbsp;</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1267"><span data-dcnode-id="1280" instrument_node="">You can replace and remove these hormonal (estrogen and progestin) methods yourself. The </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/nuvaring%3Fdosage%3D0.12mg-0.015mg%26form%3Dring%26label_override%3Deluryng%26quantity%3D1%26sort_type%3Dpopularity" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">ring</span></u></a><span data-dcnode-id="1276" instrument_node=""> stays in place (in your vagina) for several weeks, whereas the </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/xulane" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">patch</span></u></a><span data-dcnode-id="1272" instrument_node=""> (on your skin) needs to be replaced weekly. Their efficacy is around </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/contraception/how-effective-contraception/%23%3A~%3Atext%3DAround%25201%2520in%2520100%2520women%2Cget%2520pregnant%2520in%2520a%2520year." rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">91%</span></u></a><span data-dcnode-id="1268" instrument_node="">.</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1263"><span data-dcnode-id="1266" instrument_node="">Cervical caps and diaphragms</span><b data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">&nbsp;</span></b></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1253"><span data-dcnode-id="1262" instrument_node="">These are the least effective non-pill, prescription birth control. These are non-hormonal barrier methods: They put a physical barrier between sperm and egg. You only use them when you need them (they’re placed right before you have sex) —&nbsp;which requires planning. They are </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nhs.uk/conditions/contraception/how-effective-contraception/%23%3A~%3Atext%3DAround%25201%2520in%2520100%2520women%2Cget%2520pregnant%2520in%2520a%2520year." rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">less than 90%</span></u></a><span data-dcnode-id="1258" instrument_node=""> effective, and you need to use </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/spermicide" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">spermicide</span></u></a><span data-dcnode-id="1254" instrument_node=""> with caps and diaphragms for them to work.</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Phexxi</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1241"><span data-dcnode-id="1250" instrument_node="">This non-hormonal vaginal gel containing lactic acid, citric acid, and potassium bitartrate is the </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/phexxi/fda-approves-phexxi-new-non-hormonal-birth-control" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">latest prescription contraceptive option</span></u></a><span data-dcnode-id="1246" instrument_node="">. It works by keeping the pH in the vagina at a level that is inhospitable to sperm. It’s applied to your vagina before sex, and it’s about </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/32685920/" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">86%</span></u></a><span data-dcnode-id="1242" instrument_node=""> effective.</span></p></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledButtonWrapper-sc-6e0e5k-0 dOTTcY re-flex" data-dcnode-id="1234" data-qa="read-more"><button _css2="10" class="styles__StyledAction-sc-1xjy49r-0 chSBES ReadMore___StyledButton-sc-1b3c6jn-1 itMwTS" data-dcnode-id="1235" type="button"><span data-dcnode-id="1238" style="text-decoration: underline;"><span data-dcnode-id="1239" instrument_node="">Read More</span></span><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 iCmmeb material-icons-round expand_more" data-dcnode-id="1236" style="font-size: 24px;"><span data-dcnode-id="1237" instrument_node="">expand_more</span></span></button></div><div class="styles__StyledBox-sc-1gq8tiz-0 cHNoZL" data-dcnode-id="1217"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledColumn-sc-1rccnrb-0 fJGfJa FlexRecommendedRead___StyledColumn-gacv8l-0 hFHnYm re-flex" data-dcnode-id="1218"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1219"><div class="styles__StyledBox-sc-1gq8tiz-0 kWkNSM h-full" data-dcnode-id="1220" data-qa="ArticleCardHorizontal" width="100%"><a class="styles__StyledAction-sc-1xjy49r-0 cfuuxi styles__StyledContainer-sc-1k8skqy-0-Container fwYdvT" data-dcnode-id="1221" data-qa="link-container" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/birth-control/birth-control-pill-alternatives" rel="" style="display:inline-block" tabindex="0" target="_self"><div class="styles__StyledBox-sc-1gq8tiz-0 fuvNPe styles__StyledRoot-sc-1k8skqy-1 bvbVbS" data-dcnode-id="1222" height="100%" width="100%"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit ArticleCard___StyledFlex2-sc-1nns7w-2 kzgbQj re-flex" data-dcnode-id="1223"><div class="styles__StyledBox-sc-1gq8tiz-0 jZSSRT styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1224"><div class="styles__StyledBox-sc-1gq8tiz-0 jfWfHw" data-dcnode-id="1231"><div class="styles__StyledMediaItemContainer-sc-1p5vowo-1 cBKRmV" data-dcnode-id="1232" data-qa="article-card-image" orientation="landscape" width="100%"><img alt="Health: Birth Control: GettyImages-1276497677" class="styles__StyledImage-jn74i1-0 gYdya styles__StyledImage-sc-1p5vowo-0 fMaVIg object-fit-image" data-dcnode-id="1233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grxstatic.com/4f3rgqwzdznj/6ebIA7d4tcSdfYFAFG7u5q/414af639d2f5fe7e9ed43b6e2bb3fc8f/GettyImages-1276497677.jpg%3Fformat%3Dpjpg%26auto%3Dwebp%26width%3D350&amp;raw"></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1225"><h3 class="styles__StyledText-sc-1vmlgyl-0 dZBqcW re-text" color="$text-primary" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Birth Control Options That Aren’t the Pill</span></h3><span class="styles__StyledText-sc-1vmlgyl-0 dUFbXR re-text" color="$text-secondary" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Written by Mandy Armitage, MD</span></span><span data-dcnode-id="1226" instrument_node=""></span></div></div></div></div></a></div></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 hehevX" data-dcnode-id="1212" data-qa="health-page-ad"><div class="styles__StyledBox-sc-1gq8tiz-0 jcgAZO" data-dcnode-id="1213"><div class="styles__StyledBox-sc-1gq8tiz-0 bFGBFP styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1214" width="1"><div data-dcnode-id="1215" id="gpt-leaderboard_health_page-section-1"></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 jdtYfQ" data-dcnode-id="1168" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 eYwIwH" data-dcnode-id="1186"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1211" id="over-the-counter-options"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Over-the-counter options</span></h2><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">These forms of birth control do not require a prescription and can be found at your local pharmacy, drugstore, or online. They must be used every time you have sex to be effective.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1197"><span data-dcnode-id="1206" instrument_node="">Condoms are single-use physical barriers that keep sperm from entering the vagina. They are the only contraceptive that also provides protection against sexually transmitted infections (except those made of lambskin). Condoms are made for both male and </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/condomeffectiveness/Female-condom-use.html" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">female</span></u></a><span data-dcnode-id="1202" instrument_node=""> body parts, but condoms for the penis are </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/reproductivehealth/contraception/index.htm%3FCDC_AA_refVal%3Dhttps%253A%252F%252Fwww.cdc.gov%252Freproductivehealth%252Funintendedpregnancy%252Fcontraception.htm" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">more effective</span></u></a><span data-dcnode-id="1198" instrument_node=""> at preventing unplanned pregnancy than are female (or internal) condoms. This is likely due to how well they fit and stay in place during sex, as well as the learning curve. Keep in mind that male and female condoms should not be used at the same time — they are designed to be used alone.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1187"><span data-dcnode-id="1196" instrument_node=""></span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/spermicide" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Spermicide</span></u></a><span data-dcnode-id="1192" instrument_node=""> is a chemical that slows sperm cells down and makes it harder for them to travel. It comes in different forms — gels, foams, and creams — that you insert into your vagina. Spermicide can be used alone or with other contraceptive methods. It’s approximately </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/spermicide/how-effective-spermicide" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">72%</span></u></a><span data-dcnode-id="1188" instrument_node=""> effective on its own. But spermicide can cause allergic reactions and vaginal irritation. Because of this, it increases your risk of HIV and other sexually transmitted infections.</span></p></div><div class="styles__StyledBox-sc-1gq8tiz-0 cHNoZL" data-dcnode-id="1169"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledColumn-sc-1rccnrb-0 fJGfJa FlexRecommendedRead___StyledColumn-gacv8l-0 hFHnYm re-flex" data-dcnode-id="1170"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1171"><div class="styles__StyledBox-sc-1gq8tiz-0 kWkNSM h-full" data-dcnode-id="1172" data-qa="ArticleCardHorizontal" width="100%"><a class="styles__StyledAction-sc-1xjy49r-0 cfuuxi styles__StyledContainer-sc-1k8skqy-0-Container fwYdvT" data-dcnode-id="1173" data-qa="link-container" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/std-testing" rel="" style="display:inline-block" tabindex="0" target="_self"><div class="styles__StyledBox-sc-1gq8tiz-0 fuvNPe styles__StyledRoot-sc-1k8skqy-1 bvbVbS" data-dcnode-id="1174" height="100%" width="100%"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit ArticleCard___StyledFlex2-sc-1nns7w-2 kzgbQj re-flex" data-dcnode-id="1175"><div class="styles__StyledBox-sc-1gq8tiz-0 jZSSRT styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1176"><div class="styles__StyledBox-sc-1gq8tiz-0 jfWfHw" data-dcnode-id="1183"><div class="styles__StyledMediaItemContainer-sc-1p5vowo-1 cBKRmV" data-dcnode-id="1184" data-qa="article-card-image" orientation="landscape" width="100%"><img alt="Autoimmune Diseases: Answer: Infections Meta" class="styles__StyledImage-jn74i1-0 gYdya styles__StyledImage-sc-1p5vowo-0 fMaVIg object-fit-image" data-dcnode-id="1185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grxstatic.com/4f3rgqwzdznj/4GrDnyGwIC8ElRRCh6Cjjx/626d5eece69b3af5be10ce352b484bc1/test_vials.png%3Fformat%3Dpng%26auto%3Dwebp%26width%3D350&amp;raw"></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1177"><h3 class="styles__StyledText-sc-1vmlgyl-0 dZBqcW re-text" color="$text-primary" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">STIs, STDs, and Testing</span></h3><span class="styles__StyledText-sc-1vmlgyl-0 dUFbXR re-text" color="$text-secondary" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">Written by Maria Robinson, MD</span></span><span data-dcnode-id="1178" instrument_node=""></span></div></div></div></div></a></div></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 eYUJao" data-dcnode-id="1129" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 eYwIwH" data-dcnode-id="1130"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1167" id="lifestyle-methods"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Lifestyle methods</span></h2><ul class="richTextToMDS___StyledUl-sc-1cotaf0-2 gcRBQI" data-dcnode-id="1131"><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1153"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1154"><b data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">The lactational amenorrhea method (LAM):</span></b><span data-dcnode-id="1162" instrument_node=""> This can be thought of as using breastfeeding as birth control. Lactation means making human milk, and amenorrhea means not having a menstrual cycle. In the first 6 months after giving birth, provided you haven’t restarted your period and you’re nursing </span><i data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">exclusively</span></i><span data-dcnode-id="1159" instrument_node="">, there’s a </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.lww.com/clinicalobgyn/fulltext/2004/09000/Contraception_and_Breastfeeding.26.aspx%3Fcasa_token%3DoM1N6lxBSN0AAAAA%3AtQSx07LNZbmrYG5QSe2LpRYIGOp891XIFoQT5O6yC2YcLjdRz6kjzeDwpyuge6RVR9ZQHz0rt7VqI4UUlR0CGu2jDdM" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">98%</span></u></a><span data-dcnode-id="1155" instrument_node=""> chance you won’t become pregnant.&nbsp;</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1143"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1144"><span data-dcnode-id="1152" instrument_node=""></span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/fertility-awareness" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1149"><b data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Fertility awareness</span></b></u></a><b data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node=""> or natural family planning:</span></b><span data-dcnode-id="1145" instrument_node=""> This is using your body’s signs to determine when you’re most likely to get pregnant, and avoiding sex on those days. It’s also called “the rhythm method.” Every day, you take your temperature and check your cervical mucus, and plot your menstrual cycle on a calendar. This method is around 76% to 88% effective, depending on how well you use it. It’s best to work with a healthcare provider on this.</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1132"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1133"><b data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">“Pulling out”:</span></b><span data-dcnode-id="1140" instrument_node=""> Removing the penis from the vagina before ejaculation is another way to avoid pregnancy. However, it’s not very effective on its own — only </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fertstert.org/article/S0015-0282%2816%2962744-9/fulltext" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">70% to 75%</span></u></a><span data-dcnode-id="1136" instrument_node="">.&nbsp;</span><br data-dcnode-id="1135"><span data-dcnode-id="1134" instrument_node=""></span></p></li></ul></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 jdtYfQ" data-dcnode-id="1040" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 hNhQFE" data-dcnode-id="1064"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1128" id="getting-birth-control"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Getting birth control</span></h2><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">If you have insurance and a trusted healthcare provider</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">If you’re not sure which birth control method is right for you, and you have access to a provider, it’s best to talk through your options. Remember to share any past and current medical problems, as well as your medications. It’s OK to ask lots of questions, and it’s important to weigh up all of the benefits and risks before choosing.&nbsp;&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">You will need to see a healthcare provider if you’re interested in having your tubes tied (sterilization) or getting an IUD or implant.</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">If you have insurance but no time for an appointment</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1112"><span data-dcnode-id="1117" instrument_node="">In some states, you can get the pill, the patch, or the ring from your local pharmacist without making an appointment with your healthcare provider. This is a good option if you need a refill but you just can’t find the time to make an appointment with your healthcare provider. You can find out more </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/birth-control/heres-how-to-get-birth-control-without-a-doctors-prescription" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">here</span></u></a><span data-dcnode-id="1113" instrument_node="">.&nbsp;</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">If you don’t have insurance</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">If access is an issue for you, don’t worry: You still have options.&nbsp;</span></p><ul class="richTextToMDS___StyledUl-sc-1cotaf0-2 gcRBQI" data-dcnode-id="1087"><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1105"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Ask about generic versions of the pill, which can be more affordable out of pocket.</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1098"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1099"><span data-dcnode-id="1104" instrument_node="">Check out these </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/birth-control/birth-control-options-no-insurance" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">GoodRx savings</span></u></a><span data-dcnode-id="1100" instrument_node=""> on birth control.</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1091"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1092"><span data-dcnode-id="1097" instrument_node="">Visit your local women’s health or </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opa-fpclinicdb.hhs.gov/" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">family-planning clinic</span></u></a><span data-dcnode-id="1093" instrument_node="">, which may be able to help.</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1088"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">You can get condoms and spermicide without a prescription.</span></p></li></ul><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Of course, you can still pursue sterilization, LARCs, or any option without health insurance. But the out-of-pocket costs could be considerable.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1079"><span data-dcnode-id="1084" instrument_node="">According to the </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthcare.gov/coverage/birth-control-benefits/" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Affordable Care Act</span></u></a><span data-dcnode-id="1080" instrument_node="">, plans in the Health Insurance Marketplace must cover birth control and counseling without copays or coinsurance when in-network.</span></p><h3 class="styles__StyledText-sc-1vmlgyl-0 cVONVH re-text" color="$text-primary" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">If you don’t want to see a provider in person</span></h3><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1065"><span data-dcnode-id="1076" instrument_node="">If you don't have a regular provider, need </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/care/services/birth-control" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">a refill for your current birth control</span></u></a><span data-dcnode-id="1072" instrument_node="">, or need </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/care/services/emergency-contraception" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">emergency contraception</span></u></a><span data-dcnode-id="1068" instrument_node="">, consider scheduling a consultation with an online doctor through a telehealth service like GoodRx Care.</span><br data-dcnode-id="1067"><span data-dcnode-id="1066" instrument_node=""></span></p></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledButtonWrapper-sc-6e0e5k-0 dOTTcY re-flex" data-dcnode-id="1058" data-qa="read-more"><button _css2="10" class="styles__StyledAction-sc-1xjy49r-0 chSBES ReadMore___StyledButton-sc-1b3c6jn-1 itMwTS" data-dcnode-id="1059" type="button"><span data-dcnode-id="1062" style="text-decoration: underline;"><span data-dcnode-id="1063" instrument_node="">Read More</span></span><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 iCmmeb material-icons-round expand_more" data-dcnode-id="1060" style="font-size: 24px;"><span data-dcnode-id="1061" instrument_node="">expand_more</span></span></button></div><div class="styles__StyledBox-sc-1gq8tiz-0 cHNoZL" data-dcnode-id="1041"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit styles__StyledColumn-sc-1rccnrb-0 fJGfJa FlexRecommendedRead___StyledColumn-gacv8l-0 hFHnYm re-flex" data-dcnode-id="1042"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1043"><div class="styles__StyledBox-sc-1gq8tiz-0 kWkNSM h-full" data-dcnode-id="1044" data-qa="ArticleCardHorizontal" width="100%"><a class="styles__StyledAction-sc-1xjy49r-0 cfuuxi styles__StyledContainer-sc-1k8skqy-0-Container fwYdvT" data-dcnode-id="1045" data-qa="link-container" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/birth-control/how-can-i-get-birth-control-online" rel="" style="display:inline-block" tabindex="0" target="_self"><div class="styles__StyledBox-sc-1gq8tiz-0 fuvNPe styles__StyledRoot-sc-1k8skqy-1 bvbVbS" data-dcnode-id="1046" height="100%" width="100%"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledFlex-sc-7g5s04-0 fUXjit ArticleCard___StyledFlex2-sc-1nns7w-2 kzgbQj re-flex" data-dcnode-id="1047"><div class="styles__StyledBox-sc-1gq8tiz-0 jZSSRT styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1048"><div class="styles__StyledBox-sc-1gq8tiz-0 jfWfHw" data-dcnode-id="1055"><div class="styles__StyledMediaItemContainer-sc-1p5vowo-1 cBKRmV" data-dcnode-id="1056" data-qa="article-card-image" orientation="landscape" width="100%"><img alt="Health: Birth Control:GettyImages-1328087047" class="styles__StyledImage-jn74i1-0 gYdya styles__StyledImage-sc-1p5vowo-0 fMaVIg object-fit-image" data-dcnode-id="1057" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grxstatic.com/4f3rgqwzdznj/4BgsUQRkM0kt2AogIfLcBa/23160e8626d70ecf7dbddab15c384b31/GettyImages-1328087047.jpg%3Fformat%3Dpjpg%26auto%3Dwebp%26width%3D350&amp;raw"></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf" data-dcnode-id="1049"><h3 class="styles__StyledText-sc-1vmlgyl-0 dZBqcW re-text" color="$text-primary" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">How to Get Birth Control for Free or at Low Cost</span></h3><span class="styles__StyledText-sc-1vmlgyl-0 dUFbXR re-text" color="$text-secondary" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Written by Lauren Chase</span></span><span data-dcnode-id="1050" instrument_node=""></span></div></div></div></div></a></div></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 hehevX" data-dcnode-id="1036" data-qa="health-page-ad"><div class="styles__StyledBox-sc-1gq8tiz-0 jcgAZO" data-dcnode-id="1037"><div class="styles__StyledBox-sc-1gq8tiz-0 bFGBFP styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1038" width="1"><div data-dcnode-id="1039" id="gpt-leaderboard_health_page-section-2"></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 eYUJao" data-dcnode-id="922" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 eYwIwH" data-dcnode-id="923"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="1035" id="common-concerns"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Common concerns</span></h2><div class="styles__StyledBox-sc-1gq8tiz-0 NwUzq styles__StyledBox-t9aw5y-0 lakbaH" data-dcnode-id="924"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf re-accordion" data-dcnode-id="925"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemRoot-sc-1h5xs3r-0 dlSHkI AccordionMDS___StyledAccordionItem-sc-1btrm1d-0 ehwmee" data-dcnode-id="1021"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemHeaderRoot-sc-1h5xs3r-1 gALvYH" data-dcnode-id="1026"><div class="styles__StyledBox-sc-1gq8tiz-0 hvzNgv styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1029"><div data-dcnode-id="1030"><span class="styles__StyledText-sc-1vmlgyl-0 RLMCr re-text" color="$text-primary" data-dcnode-id="1031" display="block"><span data-dcnode-id="1032" instrument_node="">What’s the most effective form of birth control?</span></span></div></div><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 rTcsl styles__StyledItemHeaderArrow-sc-1h5xs3r-2 bVmDTn material-icons-round expand_more" data-dcnode-id="1027" style="font-size: 22px;"><span data-dcnode-id="1028" instrument_node="">expand_more</span></span></div><div class="styles__StyledContainer-sc-3490hv-0 eYwWBy re-collapse" data-dcnode-id="1022" data-open="false" data-qa="collapse-container" height="0"><div class="styles__StyledBox-sc-1gq8tiz-0 cJcNNY" color="" data-dcnode-id="1023"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">No birth control gives 100% protection against unplanned pregnancy. The most effective contraceptive methods are implants, IUDs, and tubal ligation (also called sterilization).&nbsp;</span></p></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemRoot-sc-1h5xs3r-0 dlSHkI AccordionMDS___StyledAccordionItem-sc-1btrm1d-0 ehwmee" data-dcnode-id="996"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemHeaderRoot-sc-1h5xs3r-1 gALvYH" data-dcnode-id="1014"><div class="styles__StyledBox-sc-1gq8tiz-0 hvzNgv styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="1017"><div data-dcnode-id="1018"><span class="styles__StyledText-sc-1vmlgyl-0 RLMCr re-text" color="$text-primary" data-dcnode-id="1019" display="block"><span data-dcnode-id="1020" instrument_node="">What’s the difference between hormonal and non-hormonal birth control?</span></span></div></div><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 rTcsl styles__StyledItemHeaderArrow-sc-1h5xs3r-2 bVmDTn material-icons-round expand_more" data-dcnode-id="1015" style="font-size: 22px;"><span data-dcnode-id="1016" instrument_node="">expand_more</span></span></div><div class="styles__StyledContainer-sc-3490hv-0 eYwWBy re-collapse" data-dcnode-id="997" data-open="false" data-qa="collapse-container" height="0"><div class="styles__StyledBox-sc-1gq8tiz-0 cJcNNY" color="" data-dcnode-id="998"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Hormonal birth control options contain the sex hormones estrogen and progestin, or progestin only. Birth control options without hormones include:&nbsp;</span></p><ul class="richTextToMDS___StyledUl-sc-1cotaf0-2 gcRBQI" data-dcnode-id="999"><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1009"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">The copper IUD</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1006"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Barrier methods</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1003"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Vaginal contraceptive gel</span></p></li><li class="richTextToMDS___StyledText-sc-1cotaf0-3 NqbHr" data-dcnode-id="1000"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">The lifestyle methods mentioned above (LAM, fertility awareness)</span></p></li></ul></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemRoot-sc-1h5xs3r-0 dlSHkI AccordionMDS___StyledAccordionItem-sc-1btrm1d-0 ehwmee" data-dcnode-id="984"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemHeaderRoot-sc-1h5xs3r-1 gALvYH" data-dcnode-id="989"><div class="styles__StyledBox-sc-1gq8tiz-0 hvzNgv styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="992"><div data-dcnode-id="993"><span class="styles__StyledText-sc-1vmlgyl-0 RLMCr re-text" color="$text-primary" data-dcnode-id="994" display="block"><span data-dcnode-id="995" instrument_node="">Which birth control method can help with PMS symptoms and heavy periods?</span></span></div></div><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 rTcsl styles__StyledItemHeaderArrow-sc-1h5xs3r-2 bVmDTn material-icons-round expand_more" data-dcnode-id="990" style="font-size: 22px;"><span data-dcnode-id="991" instrument_node="">expand_more</span></span></div><div class="styles__StyledContainer-sc-3490hv-0 eYwWBy re-collapse" data-dcnode-id="985" data-open="false" data-qa="collapse-container" height="0"><div class="styles__StyledBox-sc-1gq8tiz-0 cJcNNY" color="" data-dcnode-id="986"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Any contraceptive with hormones can help with these symptoms. You might need to try a few to find the one that suits you best.</span></p></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemRoot-sc-1h5xs3r-0 dlSHkI AccordionMDS___StyledAccordionItem-sc-1btrm1d-0 ehwmee" data-dcnode-id="964"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemHeaderRoot-sc-1h5xs3r-1 gALvYH" data-dcnode-id="977"><div class="styles__StyledBox-sc-1gq8tiz-0 hvzNgv styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="980"><div data-dcnode-id="981"><span class="styles__StyledText-sc-1vmlgyl-0 RLMCr re-text" color="$text-primary" data-dcnode-id="982" display="block"><span data-dcnode-id="983" instrument_node="">What are the risks of using birth control?</span></span></div></div><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 rTcsl styles__StyledItemHeaderArrow-sc-1h5xs3r-2 bVmDTn material-icons-round expand_more" data-dcnode-id="978" style="font-size: 22px;"><span data-dcnode-id="979" instrument_node="">expand_more</span></span></div><div class="styles__StyledContainer-sc-3490hv-0 eYwWBy re-collapse" data-dcnode-id="965" data-open="false" data-qa="collapse-container" height="0"><div class="styles__StyledBox-sc-1gq8tiz-0 cJcNNY" color="" data-dcnode-id="966"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="967"><span data-dcnode-id="976" instrument_node="">There are risks specific to placement of implants and IUDs, as well as medical risks with hormonal contraceptives. Specifically, there’s a higher risk of </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6322116/" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">blood clots</span></u></a><span data-dcnode-id="972" instrument_node=""> (except maybe with IUDs) and </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6124967/" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">breast cancer</span></u></a><span data-dcnode-id="968" instrument_node="">.&nbsp;&nbsp;&nbsp;</span></p></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemRoot-sc-1h5xs3r-0 dlSHkI AccordionMDS___StyledAccordionItem-sc-1btrm1d-0 ehwmee" data-dcnode-id="948"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemHeaderRoot-sc-1h5xs3r-1 gALvYH" data-dcnode-id="957"><div class="styles__StyledBox-sc-1gq8tiz-0 hvzNgv styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="960"><div data-dcnode-id="961"><span class="styles__StyledText-sc-1vmlgyl-0 RLMCr re-text" color="$text-primary" data-dcnode-id="962" display="block"><span data-dcnode-id="963" instrument_node="">What are my options for emergency contraception?</span></span></div></div><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 rTcsl styles__StyledItemHeaderArrow-sc-1h5xs3r-2 bVmDTn material-icons-round expand_more" data-dcnode-id="958" style="font-size: 22px;"><span data-dcnode-id="959" instrument_node="">expand_more</span></span></div><div class="styles__StyledContainer-sc-3490hv-0 eYwWBy re-collapse" data-dcnode-id="949" data-open="false" data-qa="collapse-container" height="0"><div class="styles__StyledBox-sc-1gq8tiz-0 cJcNNY" color="" data-dcnode-id="950"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="951"><span data-dcnode-id="956" instrument_node="">You have a few options when it comes to emergency contraception, such as the copper IUD or morning-after pills (emergency birth control taken after unprotected sex). Which one to choose depends on a few things, like whether you’re already using another form of birth control, your weight, and when you last had sex. You can read more in our </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodrx.com/conditions/emergency-contraceptive/emergency-contraception-options-how-they-work-ways-to-save" rel="" tabindex="0" target="_self" title=""><u data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">post</span></u></a><span data-dcnode-id="952" instrument_node=""> on emergency contraception.&nbsp;</span></p></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemRoot-sc-1h5xs3r-0 dlSHkI AccordionMDS___StyledAccordionItem-sc-1btrm1d-0 ehwmee" data-dcnode-id="926"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemHeaderRoot-sc-1h5xs3r-1 gALvYH" data-dcnode-id="941"><div class="styles__StyledBox-sc-1gq8tiz-0 hvzNgv styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="944"><div data-dcnode-id="945"><span class="styles__StyledText-sc-1vmlgyl-0 RLMCr re-text" color="$text-primary" data-dcnode-id="946" display="block"><span data-dcnode-id="947" instrument_node="">What are birth control options for men?</span></span></div></div><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0 rTcsl styles__StyledItemHeaderArrow-sc-1h5xs3r-2 bVmDTn material-icons-round expand_more" data-dcnode-id="942" style="font-size: 22px;"><span data-dcnode-id="943" instrument_node="">expand_more</span></span></div><div class="styles__StyledContainer-sc-3490hv-0 eYwWBy re-collapse" data-dcnode-id="927" data-open="false" data-qa="collapse-container" height="0"><div class="styles__StyledBox-sc-1gq8tiz-0 cJcNNY" color="" data-dcnode-id="928"><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="935"><span data-dcnode-id="940" instrument_node="">People with male reproductive anatomy have a couple contraceptive options — </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/condomeffectiveness/male-condom-use.html" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">condoms</span></u></a><span data-dcnode-id="936" instrument_node=""> and vasectomy.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="929"><span data-dcnode-id="934" instrument_node=""></span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/vasectomy" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Vasectomy</span></u></a><span data-dcnode-id="930" instrument_node=""> is a sterilization procedure in which the tube that carries sperm out of the testicles is cut. It doesn’t change anything about your ability to have sex — it simply keeps sperm out of the semen. It is the most effective contraceptive method for people with a penis, and it’s permanent.&nbsp;&nbsp;</span></p></div></div></div></div></div></div></div><div class="styles__StyledBox-sc-1gq8tiz-0 kUdRAo styles__StyledCard-sc-14406l3-0 eYUJao" data-dcnode-id="753" data-qa="health-hub-content-block" overflow="hidden"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf ReadMore___StyledBox-sc-1b3c6jn-0 eYwIwH" data-dcnode-id="754"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledBox-sc-1o3n47c-2 gddBrX" data-dcnode-id="755" data-qa="referencesContainer"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText2-sc-1w3etqv-1 cQhVLQ re-text" color="$text-primary" data-dcnode-id="921" id="references"></span><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf createHealthPageSections___StyledBox-sc-1w3etqv-2 fOLQtD" data-dcnode-id="902"><span class="styles__StyledText-sc-1vmlgyl-0 OiiAQ createHealthPageSections___StyledText-sc-1w3etqv-0 ebwrWD re-text" color="$text-primary" data-dcnode-id="920" id="references"></span><h2 class="styles__StyledText-sc-1vmlgyl-0 crvpxJ re-text" color="$text-primary" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">References</span></h2><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="912"><span data-dcnode-id="917" instrument_node="">American College of Obstetricians and Gynecologists. (2020). </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acog.org/womens-health/faqs/sterilization-for-women-and-men" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Sterilization for women and men</span></u></a><span data-dcnode-id="913" instrument_node="">.&nbsp;</span></p><p class="styles__StyledText-sc-1vmlgyl-0 cfApjY re-text" color="$text-primary" data-dcnode-id="903"><span data-dcnode-id="911" instrument_node="">Amory, J. K. (2016). </span><a class="styles__StyledAction-sc-1xjy49r-0 ioOKSl richTextToMDS___StyledLink-sc-1cotaf0-0 kJcHSi" data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fertstert.org/article/S0015-0282%2816%2962744-9/fulltext" rel="" tabindex="0" target="_blank" title=""><u data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Male contraception</span></u></a><span data-dcnode-id="907" instrument_node="">. </span><i data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Fertility and Sterility</span></i><span data-dcnode-id="904" instrument_node="">.</span></p></div><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf createHealthPageSections___StyledAccordion-sc-1w3etqv-3 kkDcKQ re-accordion" data-dcnode-id="763" data-qa="reference-accordion" style="margin-top:24px"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemRoot-sc-1h5xs3r-0 dlSHkI createHealthPageSections___StyledAccordionItem-sc-1w3etqv-4 dPDraT" data-dcnode-id="764"><div class="styles__StyledBox-sc-1gq8tiz-0 kIgWNf styles__StyledItemHeaderRoot-sc-1h5xs3r-1 gALvYH" data-dcnode-id="895"><div class="styles__StyledBox-sc-1gq8tiz-0 hvzNgv styles__StyledFlex-sc-7g5s04-0 fUXjit re-flex" data-dcnode-id="898"><div data-dcnode-id="899"><span class="styles__StyledText-sc-1vmlgyl-0 RLMCr re-text" color="$text-primary" data-dcnode-id="900" display="block"><span data-dcnode-id="901" instrument_node="">View All References (18)</span></span></div></div><span aria-hidden="true" class="material-icons MuiIcon-root styles__StyledIcon-sc-191m2mr-0
