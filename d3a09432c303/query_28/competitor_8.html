, do they still work? Read on to find out. </span></p><div data-dcnode-id="1102" id="m7177bee7-c5fa-4f21-a96f-64999a626662"><div data-dcnode-id="1103"><div class="myFinance-widget myFinance-ad-unit" data-campaign="nurx-hl-default" data-dcnode-id="1104" data-sub-id="nurx_hl_middle_inlinedefault_38416" data-widget-id="d9517293-4001-4eaf-8457-aa09e53f251b"><iframe class="myFinance-iframe" data-dcnode-id="1105" data-loaded="1" data-src="https://inline.healthline.com/r/ssr/d9517293-4001-4eaf-8457-aa09e53f251b?utm_campaign=nurx-hl-default&amp;utm_medium=embed&amp;selector=%23m7177bee7-c5fa-4f21-a96f-64999a626662+%3E+div+%3E+div&amp;csid=178a850c-88c8-4c97-a256-82d099cbb5a6&amp;caid=c7ee0dbf-eee9-4c5b-b3e5-e0e841c337e3&amp;ciid=621c3834-68c3-4eaa-a108-4537f50ad833&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2RvLWJpcnRoLWNvbnRyb2wtcGlsbHMtZXhwaXJl&amp;_mfuuid_=03b438e1-4011-430f-864c-beebc95bf333&amp;width=584&amp;subId=nurx_hl_middle_inlinedefault_38416" id="MyFiAd0" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/d9517293-4001-4eaf-8457-aa09e53f251b%3Futm_campaign%3Dnurx-hl-default%26utm_medium%3Dembed%26selector%3D%2523m7177bee7-c5fa-4f21-a96f-64999a626662%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3D178a850c-88c8-4c97-a256-82d099cbb5a6%26caid%3Dc7ee0dbf-eee9-4c5b-b3e5-e0e841c337e3%26ciid%3D621c3834-68c3-4eaa-a108-4537f50ad833%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srckey%3Dsrc_1Tqf7BF96WTbG5QbUndHWIgKoFo%26imre%3DaHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2RvLWJpcnRoLWNvbnRyb2wtcGlsbHMtZXhwaXJl%26_mfuuid_%3D03b438e1-4011-430f-864c-beebc95bf333%26width%3D584%26subId%3Dnurx_hl_middle_inlinedefault_38416&amp;raw" style="overflow: hidden; height: 632px;" title="Advertisement"><html data-dcnode-id="1107" lang="en"><head data-dcnode-id="1262"><meta charset="utf-8"/><span data-dcnode-id="1298" instrum </span><div data-dcnode-id="1109" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="1096"><aside class="css-0 css-0" data-dcnode-id="1097"><div data-dcnode-id="1098"><div class="css-10gx9pb" data-dcnode-id="1099" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1101"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1100" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1077"><span data-dcnode-id="1094" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1090"><div data-dcnode-id="1091"><a class="chartbeat-section" data-dcnode-id="1092" name="How-Birth-Control-Pills-Work"><span data-dcnode-id="1093" instrument_node="">How Birth Control Pills Work</span></a></div></h2><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Birth control pills are a form of hormonal birth control. They’re available as either combination pills or minipills. Combination pills contain the hormones estrogen and progestin. Minipills contain progestin only.</span></p><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Combination pills work to prevent pregnancy in three ways. First, the hormones stop ovulation from occurring. Second, they thicken the cervical mucus to prevent sperm from traveling to an egg if one is released. Lastly, they thin the lining of the uterus to help prevent implantation.</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">The progestin found in the minipill functions in a similar way. This hormone also stops ovulation and thickens cervical mucus to prevent sperm from reaching an egg.</span></p><div class="css-1cg0byz" data-dcnode-id="1078"><aside class="css-0 css-0" data-dcnode-id="1079"><div data-dcnode-id="1080"><div class="css-az6x7v" data-dcnode-id="1081" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1083"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1082" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1040"><span data-dcnode-id="1076" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1072"><div data-dcnode-id="1073"><a class="chartbeat-section" data-dcnode-id="1074" name="What-the-Expiration-Date-Means"><span data-dcnode-id="1075" instrument_node="">What the Expiration Date Means</span></a></div></h2><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">The expiration date on any medication helps determine whether the product is safe and effective. Using expired medication is risky and may be harmful.</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">When a medication expires, it may not be as potent. The medication’s chemical composition may also change. At this point, manufacturers can no longer guarantee that the drug isn’t deteriorating. Because of this, taking expired birth control pills may result in an unwanted pregnancy. </span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">The U.S. Food and Drug Administration requires manufacturers to list an expiration date on the packaging for all medications. The date may be printed on the label or stamped on the pill container. If a month is listed but not a year, it’s understood that the pills expire on the last day of that month. For example, if you have a pack of pills that expire in May of the current year, you can still take these pills during that month. You wouldn’t want to take this pack anytime after that month, though. </span></p><p data-dcnode-id="1062"><strong data-dcnode-id="1063"><a class="content-link css-5r4717" data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/birth-control/methods" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1065" instrument_node="">Read more: Which birth control is right for you? »</span></a></strong></p><p data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node="">You should dispose of expired birth control pills properly. Most medication package inserts have disposal instructions, or you can check to see if there’s a </span><a class="content-link css-5r4717" data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.deadiversion.usdoj.gov/drug_disposal/takeback/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1060" instrument_node="">drug take-back program</span></a><span data-dcnode-id="1058" instrument_node=""> in your area. Be aware that most pharmacies won’t exchange expired pill packs for new ones.</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">If you choose to dispose of expired pills in the trash, the FDA suggests these disposal guidelines:</span></p><ol data-dcnode-id="1048"><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Mix pills with an unpalatable substance such as cat litter, used coffee grounds, or dirt.</span></li><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Put the mixture in a sealed container or plastic bag.</span></li><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Throw the container away.</span></li></ol><div data-dcnode-id="1047" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="1041"><aside class="css-0 css-0" data-dcnode-id="1042"><div data-dcnode-id="1043"><div class="css-10gx9pb" data-dcnode-id="1044" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1046"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="1045" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1030"><span data-dcnode-id="1039" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1035"><div data-dcnode-id="1036"><a class="chartbeat-section" data-dcnode-id="1037" name="-What-Happens-If-You-Take-Expired-Birth-Control-Pills-"><span data-dcnode-id="1038" instrument_node=""> What Happens If You Take Expired Birth Control Pills </span></a></div></h2><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">If you take expired birth control pills, your risk of pregnancy increases. If you discover that your pills have expired, use a backup birth control method such as condoms until you can start a new pill pack. </span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="1032" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="1031" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="1006"><span data-dcnode-id="1029" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1025"><div data-dcnode-id="1026"><a class="chartbeat-section" data-dcnode-id="1027" name="How-to-Avoid-Having-Expired-Pills"><span data-dcnode-id="1028" instrument_node="">How to Avoid Having Expired Pills</span></a></div></h2><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">It can be easy to let birth control pills expire without even realizing it. If you receive more than one month’s supply at a time, be sure to use the oldest pack first. You can also maximize your pill’s effectiveness by taking it at the same time every day. </span></p><p data-dcnode-id="1015"><span data-dcnode-id="1022" instrument_node="">Birth control pills are up to </span><a class="content-link css-5r4717" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/birth-control-pill" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1021" instrument_node="">99 percent</span></a><span data-dcnode-id="1019" instrument_node=""> effective when taken at the same time every day without missing a dose. This is considered “perfect use.” If you miss a dose or take the pill at a different time each day, the pill is about </span><a class="content-link css-5r4717" data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plannedparenthood.org/learn/birth-control/birth-control-pill" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1018" instrument_node="">91 percent</span></a><span data-dcnode-id="1016" instrument_node=""> effective. This is considered “typical use.” </span></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Combination birth control pills are available in 21- or 28-day packs. In both types of packs, there are 21 pills that contain hormones. In the case of 28-day packs, there are seven “reminder pills” that don’t contain hormones. </span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">When taking 21-day packs, one pill is taken every day around the same time for three weeks. The following week no pills are taken, and the week after that you start a new pack. </span></p><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Twenty-eight day packs are taken the same way, but you take the seven inactive pills the last week. If you skip this week of inactive pills, you may forget to start your new pack on time. This can affect the level of hormones present in your body and may affect your birth control’s effectiveness.</span></p><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Progestin-only pills come in 28-day packs. All pills contain progestin and are taken once daily around the same time. There are no placebo pills in a progestin-only pill pack.</span></p></div><div class="css-0" data-dcnode-id="979"><span data-dcnode-id="1005" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1001"><div data-dcnode-id="1002"><a class="chartbeat-section" data-dcnode-id="1003" name="Deciding-Which-Birth-Control-Is-Right-for-You"><span data-dcnode-id="1004" instrument_node="">Deciding Which Birth Control Is Right for You</span></a></div></h2><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">If you think you’ll have difficulty remembering to take a daily pill or you’re concerned about pills expiring, you may want to consider other birth control options. Other forms of reversible birth control include diaphragms, intrauterine devices (IUDs), and patches. Permanent forms of birth control include vasectomy for men and tubal ligation for women. </span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">When choosing birth control, you should consider:</span></p><ul data-dcnode-id="986"><li data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">whether it contains any hormones</span></li><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">it’s effectiveness</span></li><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">it’s cost </span></li><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">it’s availability</span></li><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">how soon you wish to become pregnant </span></li></ul><div class="css-20w1gi" data-dcnode-id="980"><aside class="css-0 css-0" data-dcnode-id="981"><div data-dcnode-id="982"><div class="css-1sq15os" data-dcnode-id="983" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="985"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="984" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="971"><span data-dcnode-id="978" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="974"><div data-dcnode-id="975"><a class="chartbeat-section" data-dcnode-id="976" name="The-Takeaway"><span data-dcnode-id="977" instrument_node="">The Takeaway</span></a></div></h2><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Like all medications, birth control pills expire. Taking expired pills may result in an unplanned pregnancy, so why take the risk? You should always check the expiration date on your pills before you begin using them. If you have questions or concerns, your doctor or pharmacist may be able to assist you. </span></p></div></article><div data-dcnode-id="562" id="mb5cacf80-0945-4131-80a3-b92623c720bb"><div data-dcnode-id="563"><div class="myFinance-widget myFinance-ad-unit" data-campaign="multipartner_hl_birthcontrol_bot_widget_34564" data-dcnode-id="564" data-sub-id="multipartner_hl_birthcontrol_bot_widget_34564_35103" data-widget-id="a0310519-344c-4905-ac00-d3b86620276a"><iframe class="myFinance-iframe" data-dcnode-id="565" data-loaded="1" data-src="https://inline.healthline.com/r/ssr/a0310519-344c-4905-ac00-d3b86620276a?utm_campaign=multipartner_hl_birthcontrol_bot_widget_34564&amp;utm_medium=embed&amp;selector=%23mb5cacf80-0945-4131-80a3-b92623c720bb+%3E+div+%3E+div&amp;csid=178a850c-88c8-4c97-a256-82d099cbb5a6&amp;caid=c7ee0dbf-eee9-4c5b-b3e5-e0e841c337e3&amp;ciid=621c3834-68c3-4eaa-a108-4537f50ad833&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2RvLWJpcnRoLWNvbnRyb2wtcGlsbHMtZXhwaXJl&amp;_mfuuid_=03b438e1-4011-430f-864c-beebc95bf333&amp;width=584&amp;subId=multipartner_hl_birthcontrol_bot_widget_34564_35103" id="MyFiAd" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/a0310519-344c-4905-ac00-d3b86620276a%3Futm_campaign%3Dmultipartner_hl_birthcontrol_bot_widget_34564%26utm_medium%3Dembed%26selector%3D%2523mb5cacf80-0945-4131-80a3-b92623c720bb%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3D178a850c-88c8-4c97-a256-82d099cbb5a6%26caid%3Dc7ee0dbf-eee9-4c5b-b3e5-e0e841c337e3%26ciid%3D621c3834-68c3-4eaa-a108-4537f50ad833%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srcke
