</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="451" width="655"><tbody data-dcnode-id="452"><tr data-dcnode-id="2820"><td data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2817"><td data-dcnode-id="2818"></td></tr><tr data-dcnode-id="2801"><td data-dcnode-id="2802"><table align="left" border="0" cellpadding="0" cellspacing="0" data-dcnode-id="2803" width="100%"><tbody data-dcnode-id="2804"><tr data-dcnode-id="2805"><td data-dcnode-id="2814" width="10"><img data-dcnode-id="2815" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//im.costhelper.com/spacer.gif&amp;raw" width="10"></td><td data-dcnode-id="2812"><img alt="low cost" data-dcnode-id="2813" height="45" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//im.costhelper.com/low-cost.gif&amp;raw" valign="middle" width="30"></td><td data-dcnode-id="2810" id="lowprice" width="261"><span data-dcnode-id="2811" instrument_node="">With Insurance: $5-$40 a month</span></td><td data-dcnode-id="2808"><img alt="average cost" data-dcnode-id="2809" height="47" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//im.costhelper.com/average-cost.gif&amp;raw" valign="middle" width="47"></td><td data-dcnode-id="2806" id="mediumprice" width="261"><span data-dcnode-id="2807" instrument_node="">Without Insurance: $20-$50+ a month</span></td></tr></tbody></table></td></tr><tr data-dcnode-id="2789"><td data-dcnode-id="2790"><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">Combination birth control pills contain a combination of estrogen and progestin, while the "mini pill" contains only progestin. Both are designed to prevent pregnancy; the "mini pill" is slightly less effective but is tolerated better by some women. The pill is one of the most popular methods of birth control, but is sometimes prescribed to help stabilize irregular menstrual cycles, to lessen menstrual cramps, to decrease the risk of anemia associated with heavy periods, and for other medical reasons.</span><p data-dcnode-id="2791"><span data-dcnode-id="2794" instrument_node="">
</span><font data-dcnode-id="2792" id="topiccaption"><span data-dcnode-id="2793" instrument_node="">Typical costs:</span></font></p></td></tr><tr data-dcnode-id="2745"><td data-dcnode-id="2746"><ul data-dcnode-id="2761"><li data-dcnode-id="2781"><span data-dcnode-id="2788" instrument_node="">For patients not covered by health insurance, birth control pills typically cost </span><strong data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node=""> $20 </span></strong><span data-dcnode-id="2785" instrument_node="">to </span><strong data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node=""> $50 a month</span></strong><span data-dcnode-id="2782" instrument_node="">.</span></li><li data-dcnode-id="2767"><span data-dcnode-id="2780" instrument_node="">For patients covered by health insurance, out-of-pocket costs typically consist of a prescription drug copay. Most insurance plans offer the lowest copays on generic medication -- usually </span><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node=""> $5 </span></strong><span data-dcnode-id="2777" instrument_node="">to </span><strong data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node=""> $15 </span></strong><span data-dcnode-id="2774" instrument_node="">-- and higher copays of </span><strong data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node=""> $30 </span></strong><span data-dcnode-id="2771" instrument_node="">to </span><strong data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node=""> $40 </span></strong><span data-dcnode-id="2768" instrument_node="">for non-preferred brands.</span></li><li data-dcnode-id="2762"><span data-dcnode-id="2766" instrument_node="">Birth control pills, the most commonly covered contraceptive, are covered by more than 80 percent of health insurance plans, according to the Association of Reproductive Health Professionals. And in some states, it's mandatory; the Kaiser Family Foundation[</span><a data-dcnode-id="2764" href="#extres1"><span data-dcnode-id="2765" instrument_node="">1</span></a><span data-dcnode-id="2763" instrument_node="">] lists 33 states that require coverage of birth control.</span></li></ul><span data-dcnode-id="2760" instrument_node="">
</span><font data-dcnode-id="2758" id="topiccaption"><span data-dcnode-id="2759" instrument_node="">Related articles:</span></font><span data-dcnode-id="2757" instrument_node=""> </span><a data-dcnode-id="2755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.costhelper.com/morning-after-pill.html"><span data-dcnode-id="2756" instrument_node="">Morning After Pill</span></a><span data-dcnode-id="2754" instrument_node="">, </span><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.costhelper.com/iud.html"><span data-dcnode-id="2753" instrument_node="">IUD</span></a><span data-dcnode-id="2751" instrument_node="">, </span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.costhelper.com/vasectomy.html"><span data-dcnode-id="2750" instrument_node="">Vasectomy</span></a><br data-dcnode-id="2748"><br data-dcnode-id="2747"></td></tr><tr data-dcnode-id="2740"><td data-dcnode-id="2741"><span data-dcnode-id="2744" instrument_node="">
</span><font data-dcnode-id="2742" id="topiccaption"><span data-dcnode-id="2743" instrument_node="">What should be included:</span></font></td></tr><tr data-dcnode-id="2721"><td data-dcnode-id="2722"><ul data-dcnode-id="2726"><li data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">The American College of Obstetricians and Gynecologists offers an overview of how birth control pills work.</span></li><li data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Standard combination birth control pills -- for example, Yasmin and Ortho Tricyclen are taken on a 28-day cycle.</span></li><li data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Extended-cycle pills are designed to be taken continuously for three months; however, many women experience spotting or breakthrough bleeding while taking extended-cycle pills.</span></li><li data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">There are more than 40 brands of birth control pills available in the United States, each with slightly different doses or forms of hormones. Because women's bodies can react to even slight changes in formulation, sometimes several brands will have to be tried, with the help of a doctor, to get the fewest negative side effects -- such as mood changes or weight gain -- or the desired positive side effects -- such as better skin and less menstrual cramping.</span></li><li data-dcnode-id="2727"><span data-dcnode-id="2731" instrument_node="">Birth control pills are 98 to 99 percent effective when taken exactly as directed -- at the same time every day without missing a day. Vomiting before the hormones get into your system also can lower effectiveness. The U.S. Food and Drug Administration[</span><a data-dcnode-id="2729" href="#extres2"><span data-dcnode-id="2730" instrument_node="">2</span></a><span data-dcnode-id="2728" instrument_node="">] offers a chart comparing risks and effectiveness rates of various forms of birth control.</span></li></ul><span data-dcnode-id="2725" instrument_node="">
</span><font data-dcnode-id="2723" id="topiccaption"><span data-dcnode-id="2724" instrument_node="">Additional costs:</span></font></td></tr><tr data-dcnode-id="2701"><td data-dcnode-id="2702"><ul data-dcnode-id="2706"><li data-dcnode-id="2707"><span data-dcnode-id="2720" instrument_node="">Birth control pills are available only with a prescription; getting one requires visiting a doctor for a pelvic exam and sexually transmitted disease tests. This can cost </span><strong data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node=""> $35 </span></strong><span data-dcnode-id="2717" instrument_node="">to </span><strong data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node=""> $200</span></strong><span data-dcnode-id="2714" instrument_node="">, or a copay of </span><strong data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node=""> $10 </span></strong><span data-dcnode-id="2711" instrument_node="">to </span><strong data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node=""> $30</span></strong><span data-dcnode-id="2708" instrument_node=""> for patients covered by health insurance.</span></li></ul><span data-dcnode-id="2705" instrument_node="">
</span><font data-dcnode-id="2703" id="topiccaption"><span data-dcnode-id="2704" instrument_node="">Discounts:</span></font></td></tr><tr data-dcnode-id="2679"><td data-dcnode-id="2680"><ul data-dcnode-id="2684"><li data-dcnode-id="2696"><span data-dcnode-id="2700" instrument_node="">Clinics such as those operated by Planned Parenthood[</span><a data-dcnode-id="2698" href="#extres3"><span data-dcnode-id="2699" instrument_node="">3</span></a><span data-dcnode-id="2697" instrument_node="">] offer discounted birth control pills to women who qualify. And most college campus health centers do the same for enrolled students.</span></li><li data-dcnode-id="2685"><span data-dcnode-id="2695" instrument_node="">In most states, Wal-Mart[</span><a data-dcnode-id="2693" href="#extres4"><span data-dcnode-id="2694" instrument_node="">4</span></a><span data-dcnode-id="2692" instrument_node="">] , Target[</span><a data-dcnode-id="2690" href="#extres5"><span data-dcnode-id="2691" instrument_node="">5</span></a><span data-dcnode-id="2689" instrument_node="">] and Kroger pharmacies offer a limited selection of generic birth control pills for </span><strong data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node=""> $9 </span></strong><span data-dcnode-id="2686" instrument_node="">per month.</span></li></ul><span data-dcnode-id="2683" instrument_node="">
</span><font data-dcnode-id="2681" id="topiccaption"><span data-dcnode-id="2682" instrument_node="">Shopping for birth control pills:</span></font></td></tr><tr data-dcnode-id="2657"><td data-dcnode-id="2658"><ul data-dcnode-id="2660"><li data-dcnode-id="2668"><span data-dcnode-id="2678" instrument_node="">To get a prescription for birth control pills, make an appointment with your general practitioner, gynecologist or a clinic. The American College of Obstetricians and Gynecologists[</span><a data-dcnode-id="2676" href="#extres6"><span data-dcnode-id="2677" instrument_node="">6</span></a><span data-dcnode-id="2675" instrument_node="">] offers a physician locator by state and Planned Parenthood[</span><a data-dcnode-id="2673" href="#extres7"><span data-dcnode-id="2674" instrument_node="">7</span></a><span data-dcnode-id="2672" instrument_node="">] offers a clinic locator by zip code. Or, the U.S. Department of Health and Human Services[</span><a data-dcnode-id="2670" href="#extres8"><span data-dcnode-id="2671" instrument_node="">8</span></a><span data-dcnode-id="2669" instrument_node="">] offers a local clinic locator by city or zip code.</span></li><li data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Birth control pills are not recommended for women who have had blood clots, have serious heart or liver disease, have had breast or uterine cancer, or are over 35 and smoke.</span></li><li data-dcnode-id="2661"><span data-dcnode-id="2665" instrument_node="">According to the U.S. Food and Drug Administration[</span><a data-dcnode-id="2663" href="#extres9"><span data-dcnode-id="2664" instrument_node="">9</span></a><span data-dcnode-id="2662" instrument_node="">] , risks include dizziness, nausea, changes in cycle, changes in mood, weight gain, high blood pressure, blood clots, heart attack and stroke.</span></li></ul><span data-dcnode-id="2659" instrument_node="">
</span></td></tr><tr data-dcnode-id="2645"><td data-dcnode-id="2647"><span data-dcnode-id="2652" instrument_node=""> </span><b data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Material on this page is for informational purposes only and should not be construed as medical advice. Always consult your physician or pharmacist regarding medications or medical procedures.</span></b><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="2608"><td data-dcnode-id="2610"><span data-dcnode-id="2642" instrument_node="">
