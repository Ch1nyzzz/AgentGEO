</span><div class="elementor-widget-container" data-dcnode-id="1253"><span data-dcnode-id="1266" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1255"><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">The procedure is simple, seamless, and virtually pain free, taking only 15 minutes. The anaesthetic is applied to the vasa using a fine needle with no injections into the testes or penis. A single, small opening only 2-4mm in size is then made in the centre of the scrotum below the penis without a scalpel. It will close rapidly and heal without needing stitches. It is a unique feature of Dr Snip ‘no scalpel’ microKeyhole™ surgery.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">The vasa are located and are gently drawn through the same opening one at a time. The vas is divided. The centre of the top end of each vas having been sealed (mucosal cautery) and covered with tissue (fascial interposition) using either a tiny clip or a dissolving thread to further prevent them from re-joining. The bottom end of each vas is left open (the open-ended technique) to minimise post-operative pain.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Using this method, there is much less chance of complications and the patient feels more comfortable in stark contrast to the traditional method which is often performed under general anaesthetic, involving cutting through the skin and underlying tissue and blood vessels on each side and requiring sutures</span></p><span data-dcnode-id="1256" instrument_node=""> </span></div><span data-dcnode-id="1254" instrument_node="">

</span><div class="plus-content-editor" data-dcnode-id="848"><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">The Dr Snip team members are the most experienced vasectomy specialists in Australia who have pioneered the ‘no- scalpel’ vasectomy technique and work with world-leaders in vasectomy to bring you the most minimally invasive and latest vasectomy techniques. At Dr Snip, our team members:</span></p><ul data-dcnode-id="849"><li data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Have completed over 40,000 vasectomies</span></li><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Pioneered the routine use of no-scalpel, no-needle vasectomies</span></li><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Deliver a virtually pain free procedure using local anaesthetic</span></li><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Use no sedation enabling you to drive yourself home</span></li><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Provide affordable pricing with limited out of pocket expenses</span></li><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Participate in World Vasectomy Day and have a member on the Board</span></li><li data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Are Directors of No Scalpel Vasectomy Australia Limited</span></li><li data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Are Fellows of No Scalpel Vasectomy Australia Limited</span></li><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Perform charitable works in developing countries</span></li><li data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Are international speakers and lecturers on vasectomy</span></li></ul></div><span data-dcnode-id="847" instrument_node="">
</span></div><span data-dcnode-id="845" instrument_node="">
</span></div><span data-dcnode-id="843" instrument_node="">

</span><span data-dcnode-id="835" style="width:100%"><span data-dcnode-id="836" instrument_node="">How It Works?</span></span><span data-dcnode-id="834" instrument_node=""> </span></div><span data-dcnode-id="832" instrument_node="">
</span><div aria-labelledby="elementor-tab-title-8112" class="elementor-tab-content elementor-clearfix plus-accordion-content no" data-dcnode-id="822" data-tab="2" id="elementor-tab-content-8112" role="tabpanel"><span data-dcnode-id="831" instrument_node="">
</span><div class="plus-content-editor" data-dcnode-id="824"><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">The procedure is simple, seamless, virtually pain-free and over in 10-15 min – and most patients can drive themselves home!</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">We utilise local anaesthetic to the vasa using a fine needle, with no injections into the testes. We make a single opening 2-4mm in size which will close rapidly and heal without the need of stitches with our signature ‘no scalpel’ microKeyhole™ surgical method.</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">If you have any questions, please contact our team directly to discuss your concerns with a consultation.</span></p></div><span data-dcnode-id="823" instrument_node="">

</span><div class="plus-content-editor" data-dcnode-id="776"><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Vasectomy is the name given to the operation which makes men infertile by producing a block to sperm movement from the testes and is the most efficient form of contraception currently available. Immature sperm are produced in both testes (testicles) and travel up in a tube called the vas deferens(plural=vasa) on each side to a sponge-like storage area near the seminal vesicle at the back of the bladder where they are stored and mature prior to release.</span></p></div><span data-dcnode-id="775" instrument_node="">
