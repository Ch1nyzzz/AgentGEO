</span><div class="cs-content" data-dcnode-id="310" id="cs-content"><div class="x-section e1772-1 m1d8-0 m1d8-1 m1d8-2 m1d8-3 m1d8-4" data-dcnode-id="866"><div class="x-row x-container max width e1772-2 m1d8-b m1d8-c m1d8-d m1d8-e m1d8-f" data-dcnode-id="867"><div class="x-row-inner" data-dcnode-id="868"><div class="x-col e1772-3 m1d8-o m1d8-p m1d8-q m1d8-r m1d8-s m1d8-t m1d8-u sydney-banner" data-dcnode-id="872"><div class="x-text e1772-4 m1d8-10 m1d8-11 m1d8-12" data-dcnode-id="873"><h1 data-dcnode-id="874" style="font-size: 3em;"><span data-dcnode-id="875" style="font-family: Calluna-Regular; color: #375172;"><span data-dcnode-id="878" instrument_node="">Marie Stopes Vasectomy Newcastle and Central&nbsp;Coast</span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">
</span></span></h1></div></div><div class="x-col e1772-5 m1d8-o m1d8-q m1d8-r m1d8-t m1d8-u m1d8-v m1d8-w" data-dcnode-id="869"><span class="x-image e1772-6 m1d8-19" data-dcnode-id="870"><img alt="Image" data-dcnode-id="871" height="401" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/wp-content/uploads/vas-newcastle-image.jpg&amp;raw" width="600"></span></div></div></div></div><div class="x-section e1772-7 m1d8-1 m1d8-4 m1d8-5 m1d8-6 m1d8-7 m1d8-8" data-dcnode-id="865"></div><div class="x-section e1772-8 m1d8-0 m1d8-1 m1d8-4 m1d8-7 m1d8-8" data-dcnode-id="838"><div class="x-row x-container max width e1772-9 m1d8-b m1d8-c m1d8-e m1d8-f m1d8-g" data-dcnode-id="839"><div class="x-row-inner" data-dcnode-id="840"><div class="x-col e1772-10 m1d8-q m1d8-r m1d8-t m1d8-w" data-dcnode-id="852"><div class="x-text e1772-11 m1d8-11 m1d8-13 m1d8-14 m1d8-15 m1d8-16" data-dcnode-id="853"><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Looking for a vasectomy in Newcastle or the Central Coast? At Marie Stopes Australia, we offer an easy, fast procedure with fewer complications by using the 'gold standard' technique.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="861" instrument_node="">As part of our commitment to increasing access to vasectomy services, Marie Stopes Australia is very excited to partner with </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brunkermedical.com.au/" rel="noopener" target="_blank"><span data-dcnode-id="860" instrument_node="">Brunker Road Medical Centre</span></a><span data-dcnode-id="858" instrument_node=""> in Adamstown, Newcastle&nbsp;and the </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ccdhospital.com.au/" rel="noopener" target="_blank"><span data-dcnode-id="857" instrument_node="">Central Coast Day Hospital</span></a><span data-dcnode-id="855" instrument_node=""> to provide quality vasectomy care.</span></p></div></div><div class="x-col e1772-12 m1d8-q m1d8-r m1d8-t m1d8-w" data-dcnode-id="841"><div class="x-text e1772-13 m1d8-11 m1d8-13 m1d8-14 m1d8-15 m1d8-16" data-dcnode-id="842"><p data-dcnode-id="848"><span data-dcnode-id="849" style="font-family: 'Arial',sans-serif; color: black;"><span data-dcnode-id="851" instrument_node="">We have two models of care to allow you to choose the service that best suits your needs and circumstances. You may be looking for somewhere that is the closest to you, maybe you know you would like to be ‘knocked out’ (IV sedation) or perhaps you want to use your private hospital insurance.</span><o:p data-dcnode-id="850"></o:p></span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="843" style="margin: 0cm;"><span data-dcnode-id="844" style="font-family: 'Arial',sans-serif; color: black;"><span data-dcnode-id="846" instrument_node="">Whatever your wishes and circumstances are, we have an option for you. Both options allow you to have your vasectomy in a convenient location, in accredited clinics and receive high quality care. To learn more about the different models and their locations, take a look below.</span><o:p data-dcnode-id="845"></o:p></span></p></div></div></div></div></div><div class="x-section e1772-14 m1d8-1 m1d8-4 m1d8-7 m1d8-8 m1d8-9" data-dcnode-id="704"><div class="x-row x-container max width e1772-15 m1d8-b m1d8-c m1d8-g m1d8-h m1d8-i m1d8-j" data-dcnode-id="746"><div class="x-row-inner" data-dcnode-id="747"><div class="x-col e1772-16 m1d8-q m1d8-r m1d8-t m1d8-u m1d8-w" data-dcnode-id="748"><div class="x-text x-text-headline e1772-17 m1d8-1a m1d8-1b" data-dcnode-id="832"><div class="x-text-content" data-dcnode-id="833"><div class="x-text-content-text" data-dcnode-id="834"><h4 class="x-text-content-text-primary" data-dcnode-id="835"><span data-dcnode-id="836" style="font-family: Calluna; color: #375172; font-weight: 700; font-size: 1em;"><span data-dcnode-id="837" instrument_node="">Vasectomy in a medical centre</span></span></h4></div></div></div><div class="x-row e1772-18 m1d8-b m1d8-c m1d8-g m1d8-i m1d8-j" data-dcnode-id="749"><div class="x-row-inner" data-dcnode-id="750"><div class="x-col e1772-19 m1d8-r m1d8-t m1d8-w m1d8-x" data-dcnode-id="751"><ul class="x-nav x-nav-tabs two-up top" data-dcnode-id="825" data-x-element="tab_nav" data-x-params="{&quot;orientation&quot;:&quot;horizontal&quot;}" role="tablist"><li class="x-nav-tabs-item active" data-dcnode-id="829" role="presentation"><a aria-controls="x-legacy-panel-1" aria-selected="true" data-dcnode-id="830" data-x-toggle="tab" data-x-toggle-group="62694bd44b378" data-x-toggleable="x-legacy-tab-1" id="x-legacy-tab-1" role="tab"><span data-dcnode-i
