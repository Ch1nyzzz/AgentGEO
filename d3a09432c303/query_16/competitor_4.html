wrapper" data-dcnode-id="498"><h2 data-dcnode-id="549" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="550" instrument_node="">No-Scalpel, No-Needle Vasectomy</span></h2><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">The Intramed Medical Centre offers high quality male vasectomy care – with the No-Scalpel, No-Needle Vasectomy procedure. This simple, quick and virtually painless procedure is done in a surgical suite in our doctor’s office, and is sometimes referred to as “The Gentle Vasectomy”.</span></p><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">For maximum comfort, we also offer the option of nitrous oxide sedation (laughing gas) with our premium vasectomy package, for those men who may be anxious about the procedure.</span></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Dr. Crouse’s no-needle, no-scalpel vasectomy surgery is covered by Alberta Health Care (except in the case of a second or subsequent vasectomy) and offers you all of the following benefits:</span></p><ul data-dcnode-id="526"><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Convenience</span></li><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">No incision</span></li><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">No needle</span></li><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Quick procedure</span></li><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">No stitches</span></li><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Fast recovery</span></li><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Minimal discomfort</span></li><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Effective contraception</span></li></ul><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Our Calgary clinic team is proud to offer world-class surgical methods. We are Canadian and global leaders in performing no-scalpel no-needle vasectomy procedures – right here in Alberta. Our vasectomy clinic performs between 2000 and 3000 vasectomies annually.</span></p><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="520" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="521" instrument_node="">The Intramed Difference</span></h3><p data-dcnode-id="516"><img alt="" class="alignright wp-image-3078 size-full error" data-dcnode-id="519" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://intramed.ca/wp-content/uploads/2022/01/image0.jpg" data-lazy-srcset="https://intramed.ca/wp-content/uploads/2022/01/image0.jpg 500w, https://intramed.ca/wp-content/uploads/2022/01/image0-300x225.jpg 300w" data-was-processed="true" height="375" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/wp-content/uploads/2022/01/image0.jpg&amp;raw" srcset="https://intramed.ca/wp-content/uploads/2022/01/image0.jpg 500w, https://intramed.ca/wp-content/uploads/2022/01/image0-300x225.jpg 300w" width="500"><noscript data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">&lt;img class="alignright wp-image-3078 size-full" src="https://intramed.ca/wp-content/uploads/2022/01/image0.jpg" alt="" width="500" height="375" srcset="https://intramed.ca/wp-content/uploads/2022/01/image0.jpg 500w, https://intramed.ca/wp-content/uploads/2022/01/image0-300x225.jpg 300w" sizes="(max-width: 500px) 100vw, 500px" /&gt;</span></noscript></p><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Our vasectomy clinic team understands the situation of men requiring a vasectomy surgery.</span></p><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">We do our best to provide a private and personalized experience for our clients during the consultation, procedure, and afterwards.</span></p><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Our doctor and staff are happy to assist you with any questions or concerns that you may have, and are available by phone, or by booking a consultation.</span></p><p data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">The clinic generally has appointments available and you can </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/registration/"><span data-dcnode-id="508" instrument_node="">request a vasectomy appointment now</span></a><span data-dcnode-id="506" instrument_node=""> on line.</span></p><p data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">Please feel free to call us at </span><a class="number" data-dcnode-id="502" href="tel:4032556196"><span data-dcnode-id="503" instrument_node="">403-255-6196</span></a><span data-dcnode-id="501" instrument_node=""> during our hours of operation Monday to Friday, and please use the contact forms anytime to get in touch.</span></p><div class="fusion-clearfix" data-dcnode-id="499"></div></div></div><div class="fusion-one-fourth fusion-layout-column fusion-column-last fusion-spacing-yes" data-dcnode-id="454" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper" data-dcnode-id="455"><div class="fusion-widget-area fusion-widget-area-1 fusion-content-widget-area" data-dcnode-id="457"><div class="widget widget_text" data-dcnode-id="488" id="text-9"><div class="textwidget" data-dcnode-id="489"><div data-dcnode-id="490" style="margin-top:40px;"><div class="fusion-button-wrapper" data-dcnode-id="491"><a class="fusion-button button-flat button-round button-large button-default button-1" data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/registration/" rel="noopener noreferrer" target="_self"><span class="fusion-button-text" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Book Appointment</span></span></a></div></div></div></div><div class="widget widget_nav_menu" data-dcnode-id="467" id="nav_menu-10"><div class="menu-vasectomy-container" data-dcnode-id="468"><ul class="menu" data-dcnode-id="469" id="menu-vasectomy"><li class="menu-item menu-item-type-post_type menu-item-object-page current-menu-item page_item page-item-11 current_page_item menu-item-1066" data-dcnode-id="485" id="menu-item-1066"><a aria-current="page" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/"><span data-dcnode-id="487" instrument_node="">Our Vasectomy Clinic</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1147" data-dcnode-id="482" id="menu-item-1147"><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/no-scalpel-no-needle/"><span data-dcnode-id="484" instrument_node="">The Vasectomy Procedure</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1070" data-dcnode-id="479" id="menu-item-1070"><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/before/"><span data-dcnode-id="481" instrument_node="">Before Vasectomy</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-1071" data-dcnode-id="476" id="menu-item-1071"><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/after/"><span data-dcnode-id="478" instrument_node="">After Vasectomy</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-3030" data-dcnode-id="473" id="menu-item-3030"><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/registration/"><span data-dcnode-id="475" instrument_node="">Request Appointment</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-2731" data-dcnode-id="470" id="menu-item-2731"><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/about-us/"><span data-dcnode-id="472" instrument_node="">About Us</span></a></li></ul></div></div><div class="widget widget_text" data-dcnode-id="459" id="text-7"><div class="textwidget" data-dcnode-id="460"><div class="fusion-button-wrapper fusion-alignleft" data-dcnode-id="461"><a class="fusion-button button-flat button-round button-large button-default button-2" data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/registration/" rel="noopener noreferrer" target="_self"><span class="fusion-button-text" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Register Online</span></span></a></div></div></div><div class="fusion-additional-widget-content" data-dcnode-id="458"></div></div><div class="fusion-clearfix" data-dcnode-id="456"></div></div></div><div class="fusion-clearfix" data-dcnode-id="453"></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-fullwidth-2 fusion-parallax-none nonhundred-percent-fullwidth" data-dcnode-id="435" style="border-color:#eae9e9;border-bottom-width: 0px;border-top-width: 0px;border-bottom-style: solid;border-top-style: solid;padding-bottom:0px;padding-top:0px;padding-left:30px;padding-right:30px;padding-left:30px !important;padding-right:30px !important;"><div class="fusion-row" data-dcnode-id="436"><h2 data-dcnode-id="447" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="448" instrument_node="">Our Mission – Why a Calgary Vasectomy Clinic?</span></h2><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">We are dedicated to strive to uphold high standards of male surgical care in vasectomy while treating our patients with compassion, dignity, and respect. These objectives are achieved in our focused clinic, following a simple and clear mission. Because we are focused on this surgical procedure, we are able to excel at it.</span></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Intramed Medical Centre meets the needs of men and families for reliable permanent birth control and delivers quality care. At our clinic the clients come first.</span></p><h3 data-dcnode-id="441" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="442" instrument_node="">Please note:</span></h3><h3 data-dcnode-id="439" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="440" instrument_node="">The cost of the operation is fully covered by Alberta Health Services (AHS), irrespective if done in a hospital or a private clinic.</span></h3><h3 data-dcnode-id="437" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="438" instrument_node="">No Alberta patient with Alberta coverage is obligated to pay for the operation.</span></h3></div></div><div class="fusion-fullwidth fullwidth-box fusion-fullwidth-3 fusion-parallax-none nonhundred-percent-fullwidth" data-dcnode-id="375" style="border-color:#eae9e9;border-bottom-width: 0px;border-top-width: 0px;border-bottom-style: solid;border-top-style: solid;padding-bottom:0px;padding-top:0px;padding-left:30px;padding-right:30px;padding-left:30px !important;padding-right:30px !important;"><div class="fusion-row" data-dcnode-id="376"><div class="fusion-one-full fusion-layout-column fusion-column-last fusion-spacing-yes" data-dcnode-id="378" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper" data-dcnode-id="379"><p data-dcnode-id="429"><img alt="" class="wp-image-2763 size-full alignright error" data-dcnode-id="432" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://intramed.ca/wp-content/uploads/2018/08/couple2.jpg" data-lazy-srcset="https://intramed.ca/wp-content/uploads/2018/08/couple2.jpg 400w, https://intramed.ca/wp-content/uploads/2018/08/couple2-300x200.jpg 300w" data-was-processed="true" height="267" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/wp-content/uploads/2018/08/couple2.jpg&amp;raw" srcset="https://intramed.ca/wp-content/uploads/2018/08/couple2.jpg 400w, https://intramed.ca/wp-content/uploads/2018/08/couple2-300x200.jpg 300w" width="400"><noscript data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">&lt;img class="wp-image-2763 size-full alignright" src="https://intramed.ca/wp-content/uploads/2018/08/couple2.jpg" alt="" width="400" height="267" srcset="https://intramed.ca/wp-content/uploads/2018/08/couple2.jpg 400w, https://intramed.ca/wp-content/uploads/2018/08/couple2-300x200.jpg 300w" sizes="(max-width: 400px) 100vw, 400px" /&gt;</span></noscript></p><h2 data-dcnode-id="427" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="428" instrument_node="">What makes an Intramed vasectomy different?</span></h2><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Typical surgery when done in a hospital:</span></p><p data-dcnode-id="411"><span data-dcnode-id="424" instrument_node="">1. Get a referral from a family physician</span><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node=""> 2. Consultation with the surgeon</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node=""> 3. Wait for an appointment for surgery (can take months)</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node=""> 4. Have the operation</span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node=""> 5. One or two follow-up visits</span><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node=""> 6. Semen analysis lab appointment at 3 months</span><br data-dcnode-id="413"><span data-dcnode-id="412" instrument_node=""> 7. Go back to the surgeon to discuss the results</span></p><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">That is a lot of time away from work, traveling, gas, parking, etc.</span></p><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">At Intramed we offer a Premium Package to make the process simple and convenient, with choices to suit your lifestyle. If you choose this OPTIONAL premium package, you can have your consultation and operation done in a single short appointment and be back in the office the next day.</span></p><p data-dcnode-id="404" style="margin: 35px 0 55px 0;"><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/registration/" id="book-online-button"><span data-dcnode-id="406" instrument_node="">Book an Appointment</span></a></p><h3 data-dcnode-id="402" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="403" instrument_node="">What is the PREMIUM PACKAGE offered by Intramed?</span></h3><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">This is a package offered by Intramed to patients that may request additional services to streamline their visit and experience to Intramed.</span></p><h2 data-dcnode-id="398" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="399" instrument_node="">Premium Package Vasectomy Key Benefits</span></h2><p data-dcnode-id="394"><img alt="" class="size-full wp-image-2764 alignright error" data-dcnode-id="397" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://intramed.ca/wp-content/uploads/2018/08/couple1.jpg" data-lazy-srcset="https://intramed.ca/wp-content/uploads/2018/08/couple1.jpg 400w, https://intramed.ca/wp-content/uploads/2018/08/couple1-300x200.jpg 300w" data-was-processed="true" height="267" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/wp-content/uploads/2018/08/couple1.jpg&amp;raw" srcset="https://intramed.ca/wp-content/uploads/2018/08/couple1.jpg 400w, https://intramed.ca/wp-content/uploads/2018/08/couple1-300x200.jpg 300w" width="400"><noscript data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">&lt;img class="size-full wp-image-2764 alignright" src="https://intramed.ca/wp-content/uploads/2018/08/couple1.jpg" alt="" width="400" height="267" srcset="https://intramed.ca/wp-content/uploads/2018/08/couple1.jpg 400w, https://intramed.ca/wp-content/uploads/2018/08/couple1-300x200.jpg 300w" sizes="(max-width: 400px) 100vw, 400px" /&gt;</span></noscript></p><ul data-dcnode-id="381"><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Option for just a single visit for consult and procedure.</span></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">We will supply you with all your post-operative supplies (analgesics, dressings, ice pack, etc.) – including post-op refreshments.</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">All your follow ups will be done by telephone. So, rather than having to come back to the office multiple times and dealing with the time lost from work, driving, parking, gas, waiting, etc., we will do all post-procedure follow-up by telephone. This includes giving your semen test results by telephone. All this will save you 6-8 hours of time.</span></li><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">You will have unlimited access to speak to Dr. Crouse as needed for a year. You will have his cell phone number.</span></li><li data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Sick certificate supplied as needed.</span></li><li data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Optional nitrous oxide sedation at no cost for men who are feeling anxious about the procedure.</span></li></ul><div class="fusion-clearfix" data-dcnode-id="380"></div></div></div><div class="fusion-clearfix" data-dcnode-id="377"></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-fullwidth-4 fusion-parallax-none nonhundred-percent-fullwidth" data-dcnode-id="335" style="border-color:#eae9e9;border-bottom-width: 0px;border-top-width: 0px;border-bottom-style: solid;border-top-style: solid;padding-bottom:0px;padding-top:0px;padding-left:30px;padding-right:30px;padding-left:30px !important;padding-right:30px !important;"><div class="fusion-row" data-dcnode-id="336"><h2 data-dcnode-id="371" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="372" instrument_node="">Why do most clients choose Premium?</span></h2><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">For something that is so life-changing, we want to provide the most convenient and most comfortable way of getting the job done. That is why we provide a Premium Service package to address the greatest inconveniences our patients have while providing high quality care.</span></p><h3 data-dcnode-id="367" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="368" instrument_node="">The choice is yours.</span></h3><ul data-dcnode-id="362"><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Book a consultation, then your Premium vasectomy</span></li><li data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Choose the single visit Premium vasectomy package</span></li></ul><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Getting a vasectomy is a big deal in your life. Have it done with as little stress as possible.</span></p><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Dr. Crouse does more vasectomies than anyone else in Alberta and has done so for many years and on thousands of patients.</span></p><p data-dcnode-id="355" style="margin: 30px 0 40px 0;"><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/registration/" id="book-online-button"><span data-dcnode-id="357" instrument_node="">Book an Appointment</span></a></p><h3 data-dcnode-id="353" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="354" instrument_node="">Initial Consultation Appointment or One Visit for Consult &amp; Procedure</span></h3><p data-dcnode-id="348"><img alt="calgary clinic for vasectomy" class="alignright wp-image-1268 lazyloaded" data-dcnode-id="352" data-lazy-sizes="(max-width: 225px) 100vw, 225px" data-lazy-src="/wp-content/uploads/2016/02/couple-index.jpg" data-lazy-srcset="/wp-content/uploads/2016/02/couple-index.jpg 325w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-150x150.jpg 150w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-300x300.jpg 300w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-66x66.jpg 66w" data-was-processed="true" height="225" sizes="(max-width: 225px) 100vw, 225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/wp-content/uploads/2016/02/couple-index.jpg&amp;raw" srcset="/wp-content/uploads/2016/02/couple-index.jpg 325w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-150x150.jpg 150w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-300x300.jpg 300w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-66x66.jpg 66w" width="225"><noscript data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">&lt;img class="alignright wp-image-1268" src="/wp-content/uploads/2016/02/couple-index.jpg" alt="calgary clinic for vasectomy" width="225" height="225" srcset="/wp-content/uploads/2016/02/couple-index.jpg 325w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-150x150.jpg 150w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-300x300.jpg 300w, https://intramed.ca/wp-content/uploads/2016/02/couple-index-66x66.jpg 66w" sizes="(max-width: 225px) 100vw, 225px" /&gt;</span></noscript><span data-dcnode-id="349" instrument_node="">Choose the process that is best for you. Either way our dedicated physician and staff will be pleased to&nbsp;help you. We take pride in providing personalized services and individualized care. In all cases we provide full support before and after all procedures.</span></p><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Dr. Crouse will be available to you to answer any questions or concerns. We perform two thousand vasectomies per year with an excellent success rate.</span></p><p data-dcnode-id="341"><span data-dcnode-id="345" instrument_node="">Please use the </span><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/vasectomy/registration/"><span data-dcnode-id="344" instrument_node="">Appointment Request form</span></a><span data-dcnode-id="342" instrument_node=""> to let us know when you might be available for an appointment.</span></p><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Men come to our clinic from all over Alberta for vasectomy. Clients fly down from Fort McMurray and drive in from Red Deer, Medicine Hat, and Lethbridge every day.</span></p><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Intramed Medical Centre is a provincial centre of surgical excellence in the provision of no-scalpel vasectomy in Alberta.</span></p></div></div><div class="fusion-fullwidth fullwidth-box fusion-fullwidth-5 fusion-parallax-none nonhundred-percent-fullwidth" data-dcnode-id="325" style="border-color:#eae9e9;border-bottom-width: 0px;border-top-width: 0px;border-bottom-style: solid;border-top-style: solid;padding-bottom:0px;padding-top:20px;padding-left:30px;padding-right:30px;padding-left:30px !important;padding-right:30px !important;"><div class="fusion-row" data-dcnode-id="326"><p class="bluecta" data-dcnode-id="327" style="text-align: center; background: #56a0b8; margin: 20px 0 10px 0;"><span data-dcnode-id="332" instrument_node="">Call Us to Book!</span><br data-dcnode-id="331"><span data-dcnode-id="330" instrument_node=""> </span><a class="number" data-dcnode-id="328" href="tel:4032556196" style="color: #ffffff;"><span data-dcnode-id="329" instrument_node="">403-255-6196</span></a></p></div></div><div class="fusion-fullwidth fullwidth-box fusion-fullwidth-6 fusion-parallax-none nonhundred-percent-fullwidth" data-dcnode-id="268" style="border-color:#eae9e9;border-bottom-width: 0px;border-top-width: 0px;border-bottom-style: solid;border-top-style: solid;padding-bottom:20px;padding-top:20px;padding-left:30px;padding-right:30px;padding-left:30px !important;padding-right:30px !important;"><div class="fusion-row" data-dcnode-id="269"><div class="fusion-one-full fusion-layout-column fusion-column-last fusion-spacing-yes" data-dcnode-id="271" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper" data-dcnode-id="272"><h2 data-dcnode-id="321" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="322" instrument_node="">Frequent Questions at our Vasectomy Clinic</span></h2><h3 data-dcnode-id="319" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="320" instrument_node="">Is there any discomfort afterwards?</span></h3><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Before the vasectomy, you will not need any sedatives. No-Scalpel Vasectomy is virtually painless. Afterwards some people may be sore for a few days, and may want to take a mild painkiller. (Compare to the discomfort you feel after a visit to your dentist when the freezing wears off). The discomfort is less with the no-scalpel technique, because there is minimal injury to the tissues.</span></p><h3 data-dcnode-id="315" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="316" instrument_node="">Will the procedure be painful?</span></h3><p data-dcnode-id="311"><span data-dcnode-id="314" instrument_node="">The short procedure is pretty much painless once the anesthesia takes effect. You will only feel a little discomfort for a few seconds during the anesthetic application. </span><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Nitrous oxide sedation is a good option for men that may be feeling anxious about the procedure.</span></strong></p><h3 data-dcnode-id="309" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="310" instrument_node="">How soon can I go back to work?</span></h3><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">You should avoid doing any physical activity for one week (7 days) after the procedure. If you have a physical work, arrange to take one week of rest at home. If you have a sedentary (office) job, you can return to work by the next day, provided your work is sitting down. If it involves walking and standing around, arrange to take a week off from work. Not adhering to the recommendations will increase your chance of complications, swelling, bleeding, etc.</span></p><h3 data-dcnode-id="305" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="306" instrument_node="">Will vasectomy change me sexually?</span></h3><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">The only thing that will change is that you will not be able to make your partner pregnant. Your body will&nbsp;continue to make the hormones that make you a man. You will have the same amount of semen. Vasectomy won’t change your voice, beard, your muscles, your sex drive, your erections or your climaxes. Some men say that without the worry of accidental pregnancy and the bother of other birth control methods, sex is more relaxed and enjoyable than before.</span></p><h3 data-dcnode-id="301" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="302" instrument_node="">Will I be sterile right away?</span></h3><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">No, after the vasectomy there are still some active sperm left in your system. It also takes the body about 3 months to completely heal after injury or surgery. For that reason you should wait at least 3 months before doing your post vasectomy semen analysis. Before doing the “3 month test” you are encouraged to ejaculate at least 20-25 times to get rid of all the dead sperm in the tubes. You and your partner should use some other form of contraception until post-operative semen analysis confirms the absence of live sperm.</span></p><h3 data-dcnode-id="297" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="298" instrument_node="">When can I start having sex again?</span></h3><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">As soon as you are comfortable after a minimum of 7 days, but remember to use some other kind of birth control until your semen analysis confirms sterility.</span></p><h3 data-dcnode-id="293" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="294" instrument_node="">Is No-Scalpel Vasectomy safe?</span></h3><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Most medical experts, including special panels convened by the National Institutes of Health and by the World Health Organization, have concluded that vasectomy is a safe and simple procedure. Vasectomy is surgery, and all surgery has some risks, such as bleeding and infection. Serious problems are uncommon.</span></p><h3 data-dcnode-id="289" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="290" instrument_node="">What are some potential benefits of open-ended vasectomy?</span></h3><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Open-ended vasectomy is where, once the vas tube is cut, the end from the testicle is left open (i.e. uncauterized), while the end of the tube leading to the penis is closed. Studies have suggested that this&nbsp;could be the ideal way to block the vas end. There may be less post-operative discomfort because there is no sudden pressure back-up to the testicles. Vasectomy reversal may also be easier to perform later, if required.</span></p><h3 data-dcnode-id="285" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="286" instrument_node="">Can a No-Scalpel Vasectomy be reversed?</span></h3><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Yes, but reversal operations are expensive and not always successful. If you are thinking about reversal, perhaps vasectomy is not right for you. Pre-vasectomy Sperm Banking (cryopreservation) is a good idea for almost anyone considering a vasectomy. Ask our staff for details.</span></p><h3 data-dcnode-id="281" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="282" instrument_node="">Why is shaving the area suggested before the procedure?</span></h3><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">While we can easily perform your procedure without having you shave at all, we like other surgeons believe that this is an important step in performing a meticulous surgery. We believe it is important for optimal visibility and for hygienic reasons (keeping hair out of the surgical area during the procedure).</span></p><h3 data-dcnode-id="277" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="278" instrument_node="">How long will a No-Scalpel Vasectomy take?</span></h3><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">On average, the whole procedure takes less than 10 minutes. It is a simple procedure that can be performed in our surgical rooms in our office (rather than the hospital). After your procedure, we recommend that you have someone to drive you home, or that you extend your stay at our clinic to be sure that your are fully recovered before driving yourself home.</span></p><h3 data-dcnode-id="274" data-fontsize="19" data-lineheight="33"></h3><div class="fusion-clearfix" data-dcnode-id="273"></div></div></div><div class="fusion-clearfix" data-dcnode-id="270"></div></div></div><div class="fusion-fullwidth fullwidth-box fusion-fullwidth-7 fusion-parallax-none nonhundred-percent-fullwidth" data-dcnode-id="201" style="border-color:#eae9e9;border-bottom-width: 0px;border-top-width: 0px;border-bottom-style: solid;border-top-style: solid;padding-bottom:20px;padding-top:0px;padding-left:30px;padding-right:30px;padding-left:30px !important;padding-right:30px !important;"><div class="fusion-row" data-dcnode-id="202"><div class="fusion-one-full fusion-layout-column fusion-column-last fusion-spacing-yes" data-dcnode-id="218" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper" data-dcnode-id="219"><h2 data-dcnode-id="264" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="265" instrument_node="">Considerations Before a Man’s Vasectomy</span></h2><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">The decision to have a vasectomy is a serious one with lifelong consequences. There are many factors to consider and there are two that we will highlight here:</span></p><h3 data-dcnode-id="260" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="261" instrument_node="">Do I think that I might want to have more children?</span></h3><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">If there is a possibility that you might want additional children in the future you should not have a vasectomy. Your vasectomy will prevent you from conceiving a child and should be considered a permanent form of male birth control.</span></p><p data-dcnode-id="254"><span data-dcnode-id="257" instrument_node="">Vasectomy reversal surgery is not a fully effective way to restore male fertility, and no one should use</span><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node=""> surgery to temporarily suppress fertility. A vasectomy reversal may be possible but the results are not certain. A vasectomy is recommended only for men who are certain they will not want to conceive a baby.</span></p><h3 data-dcnode-id="252" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="253" instrument_node="">Am I a good candidate for vasectomy surgery?</span></h3><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">If you are certain you don’t want more children, the remaining questions are related to your current physical condition, and there are not many contra-indications for a vasectomy procedure.</span></p><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">The main ones are to do with any pre-existing issues affecting your scrotum (hernia in that area, scarring) and your general ability to tolerate a minor surgery (abnormal blood coagulation, other pre-existing conditions). It is also vital that you follow the doctor’s instructions on post-operative care.</span></p><h3 data-dcnode-id="246" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="247" instrument_node="">Male Sterilization – Potential Regrets</span></h3><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Vasectomy should be considered permanent and non-reversible as reversals are not guaranteed.</span></p><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">You may regret your decision one day if it is taken prematurely. Younger men, especially those in their 20s with fewer than 2 children, are most likely to seek a reversal in the future, often citing that they thought it was the right decision at the time only to be disappointed when their reversal procedure was unsuccessful.</span></p><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Men change. Some men are totally convinced that they do not want kids. In our experience, some men develop a different attitude about having children as they get older and their life situation changes.</span></p><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Women also change. Some women who do not want children change their minds as they grow older. Some who have had bad reactions to pregnancy feel they would never want to go through another pregnancy only to change their minds after a few years.</span></p><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Relationships can end. Despite how stable our relationships may seem, there is a chance that in a few years, you may be with a different partner who may have a strong desire to have kids.</span></p><h3 data-dcnode-id="234" data-fontsize="19" data-lineheight="33"><span data-dcnode-id="235" instrument_node="">Sperm Storage</span></h3><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">In the unlikely event that you will want to have kids again in the future, and vasectomy reversal is not an option, or successful, sperm storage may be a way of allowing yourself to procreate again. Please consider storing sperm prior to your vasectomy.</span></p><h2 data-dcnode-id="230" data-fontsize="28" data-lineheight="27" style="font-size: 25.536px; line-height: 24.624px;"><span data-dcnode-id="231" instrument_node="">Important:</span></h2><ul data-dcnode-id="221"><li data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">The Premium Package is entirely optional.</span></li><li data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Whether you choose it or not, the operation is exactly the same.</span></li><li data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Under no circumstances are you obligated to take it.</span></li><li data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">The Premium Package is an uninsured service, meaning that the costs related to it are not services covered by Alberta Health Services but are offered by Intramed and are completely optional.</span></li></ul><div class="fusion-clearfix" data-dcnode-id="220"></div></div></div><div class="fusion-clearfix" data-dcnode-id="217"></div><div class="fusion-one-full fusion-layout-column fusion-column-last fusion-spacing-yes" data-dcnode-id="204" style="margin-top:50px;margin-bottom:0px;"><div class="fusion-column-wrapper" data-dcnode-id="205"><h3 data-dcnode-id="215" data-fontsize="19" data-lineheight="33" style="text-align: center;"><span data-dcnode-id="216" instrument_node="">Calgary Clinic Location</span></h3><div data-dcnode-id="207" style="text-align: center;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="214" data-lazy-src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d10035.332750454303!2d-114.1337123!3d51.0377016!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x26cbe5db6cf81a10!2sIntramed+Medical+Clinic!5e0!3m2!1sen!2sca!4v1474373451249" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="400" loading="lazy" src="about:blank" style="border: 0;" width="800"></iframe><noscript data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">&lt;iframe style="border: 0;" src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d10035.332750454303!2d-114.1337123!3d51.0377016!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x26cbe5db6cf81a10!2sIntramed+Medical+Clinic!5e0!3m2!1sen!2sca!4v1474373451249" width="800" height="400" frameborder="0" allowfullscreen="allowfullscreen"&gt;&lt;/iframe&gt;</span></noscript><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node=""> tel : </span><a class="number" data-dcnode-id="208" href="tel:4032556196" style="font-size: 15px;"><span data-dcnode-id="209" instrument_node="">403-255-6196</span></a></div><div class="fusion-clearfix" data-dcnode-id="206"></div></div></div><div class="fusion-clearfix" data-dcnode-id="203"></div></div></div></div></div></div></div></div><div class="fusion-footer" dat links-footer" data-dcnode-id="83"><div class="fusion-social-networks" data-dcnode-id="84"><div class="fusion-social-networks-wrapper" data-dcnode-id="85"><a class="fusion-social-network-icon fusion-tooltip fusion-facebook fusion-icon-facebook fusion-last-social-icon" data-dcnode-id="86" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/Intramed-Medical-Center-561979334178526/" style="color:#1390b7;" target="_blank" title="Facebook"></a></div></div></div></div></div></footer></div></div><span data-dcnode-id="77" instrument_node=""> </span><a class="fusion-one-page-text-link fusion-page-load-link" data-dcnode-id="76"></a><div data-dcnode-id="52" style="display: none;"><div data-dcnode-id="53" id="boxzilla-box-3019-content"><p data-dcnode-id="73"><strong data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">Important information before booking a vasectomy.</span></strong></p><p data-dcnode-id="71"><span data-dcnode-id="72" instrument_node="">For 7 days following the vasectomy please stay off your feet.</span></p><ul data-dcnode-id="58"><li data-dcnode-id="69"><span data-dcnode-id="70" instrument_node="">If you have a sitting office job, you can return to work in a day or two.</span></li><li data-dcnode-id="67"><span data-dcnode-id="68" instrument_node="">The day of the operation, go home and NOT back to your office.</span></li><li data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">If you have a physical job, stay at home for a week.</span></li><li data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">No shopping, walking the dog, mowing the lawn, etc. Stay off your feet. Sit or lie down.</span></li><li data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">After one week of rest, gradually return to normal activities, including gentle sexual activity.</span></li><li data-dcnode-id="59"><span data-dcnode-id="60" instrument_node="">For a total of 3 weeks avoid unnecessary activities (running, cycling, gym, jumping, heavy lifting) etc. Yes, you can pick up a small baby.</span></li></ul><p data-dcnode-id="56"><span data-dcnode-id="57" instrument_node="">Most operations take up to 3 months to heal completely (approx.. 10% per week). Keep that in mind if you are planning physical exercise.</span></p><p data-dcnode-id="54"><span data-dcnode-id="55" instrument_node="">Kindly book your surgery with these points in mind. We take your testicles and recovery seriously. We expect you to do the same. If you will be unable to follow above recommendations please do not book a vasectomy.</span></p></div></div><div class="mtsnb mtsnb-shown mtsnb-bottom mtsnb-fixed" data-bar-animation="" data-bar-content-animation="mtsnb-bounceIn" data-dcnode-id="39" data-mtsnb-id="2671" id="mtsnb-2671" style="background-color:#e1dacb;color:#393939;"><div class="mtsnb-container-outer" data-dcnode-id="40"><div class="mtsnb-container mtsnb-clearfix" data-dcnode-id="41" style="padding-top: 10px; padding-bottom: 10px;"><div class="mtsnb-custom-type mtsnb-content mtsnb-animated mtsnb-bounceIn" data-dcnode-id="42" data-mtsnb-variation="none"><div class="mtsnb-custom-content" data-dcnode-id="43"><span data-dcnode-id="49" instrument_node="">Call us : </span><a class="number" data-dcnode-id="47" href="tel:4032556196"><span data-dcnode-id="48" instrument_node="">403 255 6196</span></a><span data-dcnode-id="46" instrument_node=""> | </span><a data-dcnode-id="44" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intramed.ca/covid-19-info/"><span data-dcnode-id="45" instrument_node="">COVID-19 INFO</span></a></div></div></div></div></div><span data-dcnode-id="38" instrument_node=""> </span><span data-dcnode-id="35" instrument_node=""> </span><span data-dcnode-id="32" instrument_node=""> </span><span data-dcnode-id="28" instrument_node=""> </span><noscript data-dcnode-id="24"><span data-dcnode-id="25" instrument_node="">&lt;link rel='stylesheet' id='parent-styleshee
