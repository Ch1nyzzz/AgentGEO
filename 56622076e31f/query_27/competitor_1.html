</span><h2 data-dcnode-id="556"><span data-dcnode-id="557" id="What_countries_still_use_DDT_today"><span data-dcnode-id="558" instrument_node="">What countries still use DDT today?</span></span></h2><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Production, use, and management DDT is currently being produced in three countries: India, China, and the Democratic People’s Republic of Korea (DPRK; North Korea) (Table 1). By far the largest amounts are produced in India for the purpose of disease vector control.</span></p><span data-dcnode-id="552" instrument_node="">
</span><h2 data-dcnode-id="549"><span data-dcnode-id="550" id="Where_is_DDT_still_legal"><span data-dcnode-id="551" instrument_node="">Where is DDT still legal?</span></span></h2><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">It is legal to manufacture DDT in the US, though it can only be exported for use in foreign nations. DDT can only be used in the US for public health emergencies, such as controlling vector disease. Today, DDT is manufactured in North Korea, India, and China.</span></p><span data-dcnode-id="545" instrument_node="">
</span><h2 data-dcnode-id="542"><span data-dcnode-id="543" id="What_are_the_harmful_effects_of_DDT"><span data-dcnode-id="544" instrument_node="">What are the harmful effects of DDT?</span></span></h2><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Human health effects from DDT at low environmental doses are unknown. Following exposure to high doses, human symptoms can include vomiting, tremors or shakiness, and seizures. Laboratory animal studies showed effects on the liver and reproduction. DDT is considered a possible human carcinogen.</span></p><div class="code-block code-block-4" data-dcnode-id="529" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="538" instrument_node="">
</span><span data-dcnode-id="536" instrument_node="">
</span><span data-dcnode-id="534" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1967985298216066" data-ad-format="auto" data-ad-slot="3101752784" data-dcnode-id="533" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="532" instrument_node="">
</span></div><span data-dcnode-id="528" instrument_node="">
</span><h2 data-dcnode-id="525"><span data-dcnode-id="526" id="Is_DDT_banned_in_Europe"><span data-dcnode-id="527" instrument_node="">Is DDT banned in Europe?</span></span></h2><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">DDT (dichlorodiphenyltrichloroethane) is an insecticide widely used until the 1960s to control insects in agriculture and insects that carry diseases such as malaria. Although it is banned in many countries, including all EU Member States, DDT is still employed in some developing countries affected by malaria.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h2 data-dcnode-id="518"><span data-dcnode-id="519" id="Is_DDT_a_fertilizer"><span data-dcnode-id="520" instrument_node="">Is DDT a fertilizer?</span></span></h2><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">DDT is a synthetic insecticide of very high contact toxicity which, until recently, was used on a global scale. However, DDT was a truly important development in its time and a major weapon in the control of malaria. Dr. Muller was awarded the Nobel Prize for Medicine in 1948.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h2 data-dcnode-id="511"><span data-dcnode-id="512" id="Why_is_DDT_bad_for_the_environment"><span data-dcnode-id="513" instrument_node="">Why is DDT bad for the environment?</span></span></h2><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">DDT is very insoluble in water and very persistent in the environment, making it a highly polluting hazard. It’s half life has been reported to be between 2 and 15 years. Due to it’s low solubility, it has a greater rate of bioaccumulation in water, and thus poses a great long-term threat to aquatic wildlife.</span></p><span data-dcnode-id="507" instrument_node="">
</span><h2 data-dcnode-id="504"><span data-dcnode-id="505" id="Which_is_the_true_for_DDT_it_is"><span data-dcnode-id="506" instrument_node="">Which is the true for DDT it is?</span></span></h2><span data-dcnode-id="503" instrument_node="">
</span><div class="code-block code-block-5" data-dcnode-id="493" style="margin: 8px 0; clear: both;"><span data-dcnode-id="502" instrument_node="">
</span><span data-dcnode-id="500" instrument_node="">
</span><span data-dcnode-id="498" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1967985298216066" data-ad-format="auto" data-ad-slot="7071938992" data-dcnode-id="497" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="496" instrument_node="">
</span></div><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Complete Answer: It is a colorless and odourless crystalline chemical compound. DDT is a non-biodegradable pollutant widely used as a modern synthetic insecticide. DDT is an insecticide which is a non-biodegradable pollutant.</span></p><span data-dcnode-id="489" instrument_node="">
</span><h2 data-dcnode-id="486"><span data-dcnode-id="487" id="How_long_does_DDT_stay_in_the_soil"><span data-dcnode-id="488" instrument_node="">How long does DDT stay in the soil?</span></span></h2><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The half-life of DDT in soil can vary between 2 and 15 years, depending on the soil acidity and temperature. that only small amounts will move though soil into groundwater.</span></p><span data-dcnode-id="482" instrument_node="">
</span><h2 data-dcnode-id="479"><span data-dcnode-id="480" id="Why_should_DDT_be_banned"><span data-dcnode-id="481" instrument_node="">Why should DDT be banned?</span></span></h2><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">DDT should be phased out of use and ultimately banned. Because DDT can travel long distances and accumulate in the body, millions of humans and animals worldwide have buildups of the chemical in their tissue, even though it may have been used on another continent.</span></p><span data-dcnode-id="475" instrument_node="">
</span><h2 data-dcnode-id="472"><span data-dcnode-id="473" id="Which_pollution_does_DDT_cause"><span data-dcnode-id="474" instrument_node="">Which pollution does DDT cause?</span></span></h2><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Spraying of DDT on crops causes pollution of: I) Soil and Water II) Air and Soil. Spraying of DDT chemicals leads to the pollution of the air, soil and water. Soil is the main polluting part when DDT is sprayed to the crops.</span></p><span data-dcnode-id="468" instrument_node="">
</span><h2 data-dcnode-id="465"><span data-dcnode-id="466" id="How_does_DDT_enter_the_human_body"><span data-dcnode-id="467" instrument_node="">How does DDT enter the human body?</span></span></h2><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Most DDT exposure is through consuming contaminated food that contains small amounts. DDT is not absorbed through the skin or lungs easily. When DDT enters the body, it tends to be stored in the fatty tissues and is excreted from the body over time.</span></p><span data-dcnode-id="461" instrument_node="">
</span><h2 data-dcnode-id="458"><span data-dcnode-id="459" id="Is_DDT_an_endocrine_disruptor"><span data-dcnode-id="460" instrument_node="">Is DDT an endocrine disruptor?</span></span></h2><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">At high doses DDT is a potent neurotoxin, but numerous studies in laboratory animals, and in vitro assays have established that at low doses it can act as an endocrine disruptor. Even though DDT is no longer used in the US, human exposure to DDT and its metabolites is ongoing.</span></p><span data-dcnode-id="454" instrument_node="">
</span><h2 data-dcnode-id="451"><span data-dcnode-id="452" id="Is_DDT_antibiotic"><span data-dcnode-id="453" instrument_node="">Is DDT antibiotic?</span></span></h2><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">DDT is A An antibiotic B A biodegradable pollutant class 11 biology CBSE.</span></p><span data-dcnode-id="447" instrument_node="">
</span><h2 data-dcnode-id="444"><span data-dcnode-id="445" id="Is_DDT_biodegradable"><span data-dcnode-id="446" instrument_node="">Is DDT biodegradable?</span></span></h2><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">DDT is harm to all biota of the planet as it is non-biodegradable, and tends to become more concentrated as it moves up the food chain. It is a fat-soluble chemical, and accumulates in the fat deposits of the body.</span></p><span data-dcnode-id="440" instrument_node="">
</span><h2 data-dcnode-id="437"><span data-dcnode-id="438" id="Is_DDT_a_non-biodegradable_waste"><span data-dcnode-id="439" instrument_node="">Is DDT a non-biodegradable waste?</span></span></h2><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">DDT (Dichlorodiphenyltrichloroethane) is non-biodegradable pesticide i.e. it cannot be degraded by the action of microbes. Thus, it is a non-biodegradable compound. The wastewater generated from the homes and factories is known as ‘Sewage’ which is rich in microbes and thus biodegradable.</span></p><span data-dcnode-id="433" instrument_node="">
</span><h2 data-dcnode-id="430"><span data-dcnode-id="431" id="Is_glass_biodegradable"><span data-dcnode-id="432" instrument_node="">Is glass biodegradable?</span></span></h2><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Non-biodegradable materials like glass do not decompose quickly. In fact, glass bottles can stay intact in the environment for hundreds of years. It’s thought glass bottles will never biodegrade, but they will break down slowly.</span></p><span data-dcnode-id="426" instrument_node="">
</span><h2 data-dcnode-id="423"><span data-dcnode-id="424" id="Is_DDT_primary_pollutant"><span data-dcnode-id="425" instrument_node="">Is DDT primary pollutant?</span></span></h2><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Primary pollutants persist in the form they are released in the environment. Secondary pollutants are formed by reaction amongst the primary pollutants. DDT is a primary pollutant.</span></p><span data-dcnode-id="419" instrument_node="">
</span><h2 data-dcnode-id="416"><span data-dcnode-id="417" id="What_are_the_5_primary_pollutants"><span data-dcnode-id="418" instrument_node="">What are the 5 primary pollutants?</span></span></h2><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Types of primary pollutants include:</span></p><span data-dcnode-id="412" instrument_node="">
</span><ul data-dcnode-id="389"><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Nitrogen oxides (NOx)</span></li><span data-dcnode-id="408" instrument_node="">
</span><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Carbon monoxide (CO)</span></li><span data-dcnode-id="405" instrument_node="">
</span><li data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Volatile organic compounds (VOCs)</span></li><span data-dcnode-id="402" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Sulfur oxides (SOx)</span></li><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Particulate matter (PM)</span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Mercury.</span></li><span data-dcnode-id="393" instrument_node="">
</span><li data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">and more.</span></li><span data-dcnode-id="390" instrument_node="">
</span></ul><span data-dcnode-id="388" instrument_node="">
</span><h2 data-dcnode-id="385"><span data-dcnode-id="386" id="Which_type_of_pollutant_is_DDT"><span data-dcnode-id="387" instrument_node="">Which type of pollutant is DDT?</span></span></h2><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">persistent organic pollutant</span></p><span data-dcnode-id="381" instrument_node="">
</span><h2 data-dcnode-id="378"><span data-dcnode-id="379" id="Which_is_more_harmful_primary_or_secondary_pollutants"><span data-dcnode-id="380" instrument_node="">Which is more harmful primary or secondary pollutants?</span></span></h2><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Though these statistics are horrifying, secondary pollutants can be more harmful and severe to human health than primary pollutants. Smog is an example of a secondary pollutant.</span></p><span data-dcnode-id="374" instrument_node="">
