</span><div class="entry-featured-media entry-featured-media-main g1-size-1of1" data-dcnode-id="1320" itemprop="image" itemscope="" itemtype="http://schema.org/ImageObject"><div class="g1-frame" data-dcnode-id="1326"><div class="g1-frame-inner" data-dcnode-id="1327" style="padding-bottom: 52.34375000%;"><img alt="Animal Testing" class="attachment-bimber-classic-1of1 size-bimber-classic-1of1 wp-post-image" data-dcnode-id="1329" height="603" itemprop="contentUrl" sizes="(max-width: 1152px) 100vw, 1152px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-1152x603.jpg&amp;raw" srcset="https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-1152x603.jpg 1152w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-510x267.jpg 510w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-300x157.jpg 300w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-1024x536.jpg 1024w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-768x402.jpg 768w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-561x294.jpg 561w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-1122x587.jpg 1122w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-364x190.jpg 364w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-728x381.jpg 728w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-608x318.jpg 608w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1-758x397.jpg 758w, https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1.jpg 1200w" width="1152"><span class="g1-frame-icon g1-frame-icon-" data-dcnode-id="1328"></span></div></div><meta content="https://hostadebate.com/wp-content/uploads/2021/08/Untitled-design-1.jpg" data-dcnode-id="1325" itemprop="url"><meta content="1200" data-dcnode-id="1324" itemprop="width"><meta content="628" data-dcnode-id="1323" itemprop="height"><figcaption class="wp-caption-text" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Source- VegNews</span></figcaption></div><span data-dcnode-id="1319" instrument_node="">
</span><div class="g1-content-narrow g1-typography-xl entry-content" data-dcnode-id="980" itemprop="articleBody"><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Animal testing or also known as animal experimentation safeguards us, humans, from the side effects of the variety of products. Also lets discuss what and how we can use alternatives for animal testing as it is highly debatable that if it should be banned as many feel it is very much unethical.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><h2 data-dcnode-id="1311"><strong data-dcnode-id="1312"><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Animal Testing</span></strong></strong></h2><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">The process involves the use of animals to test the efficiency of the products around the world. So, let’s dig in and inquire whether animal experimentation is an inhumane practice or not.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><h3 data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">What Does Animal Testing Mean?</span></h3><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Performing experiments on animals to check for the safety, and quality of the products. Several products like – medicines, and cosmetics, etc only get quality labels when they pass animal tests. The tests check for the side effects caused by a particular product. </span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Animal testing at times can be harsh and painful for the animals as when products are injected into their system cause a great deal of pain and even lead to organ failure and eventually to the death of the animals.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Animal testing involves the following methods-</span></p><span data-dcnode-id="1295" instrument_node="">
</span><ul data-dcnode-id="1288"><li data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Injecting certain drugs, chemicals to study the physiological changes.</span></li><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Inflicting pain to carry on experiments.</span></li><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Multiple surgeries to remove a body part.</span></li></ul><span data-dcnode-id="1287" instrument_node="">
</span><h3 data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Story Behind Animal Testing-</span></h3><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1283" instrument_node="">Animal testing was into play from the early ages before we even started practicing it. The concept of animal experimentation dates back to around the 3</span><sup data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">rd</span></sup><span data-dcnode-id="1280" instrument_node=""> and 4</span><sup data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">th</span></sup><span data-dcnode-id="1277" instrument_node=""> centuries BCE.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><h4 data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Animal Testing- History</span></h4><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">It was around this time when Greek men like Aristotle and Erasistratus also used to perform experiments on animals. Then, around 217 A.D. another scientist named, Galen started off with animal testing to provide a comprehensive study of anatomy and physiology. </span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Ibn Zuhr presented entirely a new application of animal testing, he yielded that it can be used to test for procedures involved in surgery before being performed on a human.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><h2 data-dcnode-id="1263"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Why Do Animals Become The Victims?</span></strong></h2><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node=""> A very common question which most of you must be having, as already discussed in the history of animal testing, i.e. it tests for the safety of the products and procedures to be performed on a human being. Many people in favor of this concept, defend their position stating that animals are inferior to us humans thus, their life is less important than ours.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><h2 data-dcnode-id="1256"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Why Animal Testing Is Necessary?</span></strong></h2><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Besides, several arguments that depict this as an evil practice, some cases show why such an evil concept is important! So, let’s take a look at the important details of animal experimentation.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><h3 data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Animal Testing- Benefits</span></h3><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">A few decades back, animal research came into play to benefit us, humans. It certainly helped in our medical progress, from developing vaccines and products that don’t react or irritate our body parts.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Following are the benefits of animal research:</span></p><span data-dcnode-id="1243" instrument_node="">
</span><ul data-dcnode-id="1228"><li data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Advancement in medical sciences helped to treat several diseases like tuberculosis, Parkinson’s disease.</span></li><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">The process of transplantation became easy because through animal experimentation proper immune responses could be studied.</span></li><li data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Helps to know possible side effects of medicine etc.</span></li><li data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">The credit for the success of cardiovascular- renal-related surgeries goes to dogs because they have a comparatively elaborate renal system that facilitates proper procedures. It also helped in making open-heart surgeries possible.</span></li><li data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Helps in understanding the human psyche, behavior, and memory, etc.</span></li><li data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">This has also helped in the treatment of animal diseases, like transplantation, etc.</span></li><li data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">It also helped in the conversation of endangered species of various animals, due to the advancement in the field of genetics.</span></li></ul><span data-dcnode-id="1227" instrument_node="">
</span><h3 data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Does It Help In Any Progress?</span></h3><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&nbsp;We just had a glance at the possible benefits of animal research but the question is- Does exploiting animals for the sake of progress is just?</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1218"><em data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">“The claim that animal experimentation is essential to medical development is not supported by proper, scientific evidence but by opinion and anecdote. Systematic reviews of its effectiveness don’t support the claims made on its behalf” (Pandora Pound et al. British Medical Journal 328, 514-7, 2004).</span></em></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">This line is enough to know the importance of this practice. Moreover, considering their lives as nothing is unjustified behavior.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><h2 data-dcnode-id="1211"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">What Is The Animal Testing Debate All About?</span></strong></h2><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">For years we have been talking about animal testing. Some in its favor and others against it. The debate is nothing but circles around the justness of the practice and why animal testing should not be banned. </span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1206" instrument_node="">A scientist named </span><em data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Claude Bernard stated that “experiments on animals are entirely conclusive for the toxicology and hygiene of man. The effects of these substances are the same on man as on animals, save for differences in degree”. </span></em></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">But some people believe the opposite to be the real case. Now, we will consider different aspects and try to conclude this debate.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><h2 data-dcnode-id="1196"><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Is Animal Testing Justified?</span></strong></h2><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">The central issue of this debate revolves around the conduct of ethically sound and just behavior.&nbsp; </span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">After talking about the benefits that can be derived, we move towards the cons of animal experimentation.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h3 data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">&nbsp;Why Animal Testing Is Bad?</span></h3><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Kant, stated that “we should never use someone as a mere means.” </span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Animals too have life but they are treated as mere means by scientists for the benefit of the human population. Now, let’s discuss some more points in detail-</span></p><span data-dcnode-id="1180" instrument_node="">
</span><h4 data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">&nbsp;Violates the rights of animals-</span></h4><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">As already stated, animals too have a life and they too have the right to live their life without any problems and pain. But, conducting experiments on them violates their right to life, as in extreme cases it causes the death of the animals, and to torture, is another violation of their rights.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><h4 data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Causes extreme pain and death-</span></h4><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">&nbsp;The experiments performed on these animals are so harsh and inflict a lot of pain and in severe cases leads to organ failure. Animals are injected with a lot of drugs and are exposed to high-stress conditions.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><h4 data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">They are innocent beings-</span></h4><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Just because animals can’t speak our language and put their feelings into words doesn’t give us the right to torture them. Our superiority doesn’t give us the power to take the lives of others. Moreover, no animal sacrifices itself willingly to us thus, this practice should be put to an end.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><h3 data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Is Animal Testing Cruel?</span></h3><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">It is cruel definitely, and it also makes us cruel as we indulge in such inhumane practices. They say, “who gave us the power to decide for others” beautifully defines the theme of this debate as while performing these experiments we are the ones who choose to risk the lives of animals. Thus, it is totally cruel to risk someone’s life and to choose for them when it’s a matter of their life and death.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><h2 data-dcnode-id="1153"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Techniques of Animal Testing:</span></strong></h2><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node=""> Numerous techniques and tests are carried on the animals. We have tried to discuss some of the important tests that signify the agonizing nature of animal testing.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><h3 data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">&nbsp;Draize Test-</span></h3><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Performed to check for the safety and efficiency of eye-related products. The process involves administering the chemical in the eye (conjunctival sac) of the rabbit. For the results, redness of iris and the extent of cornea damaged determines the quality of the product. This test leads to some irreversible changes in the animal body.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><h3 data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Lethality Tests-</span></h3><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">It involves administration of chemicals in the body of the animals to determine whether the animal will die or not and if dies the number of animals that will die.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">&nbsp;LD50 Test-</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">It stands for Lethal Dose test, helps determine the dosage or concentration of the chemical that is to be administered. Animals are pumped with huge amounts of test chemicals that their digestive systems get damaged or eventually leads to the death of the animal.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><h3 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Side Effects-</span></h3><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">These experiments inflict some serious problems on these little creatures.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><ul data-dcnode-id="1118"><li data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Organ failure.</span></li><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Chemicals involved in the Draize test damage the cornea of the eye, making the rabbit blind.</span></li><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Lethal tests as the name suggests are accompanied by a lot of pain and suffering, like gastrointestinal tract blasts when filled with excess chemicals, multiple organ failure, and eventually, death.</span></li></ul><span data-dcnode-id="1117" instrument_node="">
</span><h2 data-dcnode-id="1114"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Nations That Have Banned Animal Testing-</span></strong></h2><span data-dcnode-id="1113" instrument_node="">
</span><h3 data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">The USA-</span></h3><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">The FDA regulated Federal Food, Drug, and Cosmetic Act prohibits the use of cosmetics that conduct animal tests before rolling out their products in the market. The cosmetics don’t require animal test clearances to label them as safe for use.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><h3 data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">China-</span></h3><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">China recently banned this practice in 2021 for imported cosmetic products. it allowed the import of ordinary products without any such trials. A few years back in 2009, China allowed the use of ordinary products by banning the cosmetics that required animal tests.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><h3 data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">European Union-</span></h3><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">In 1993, EU put a ban on animal tests. They banned the cosmetics based on animal tests, but due to the lack of alternatives, it was finally passed by all the nations of the union in 2013</span></p><span data-dcnode-id="1095" instrument_node="">
</span><h2 data-dcnode-id="1092"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Is Animal Testing Banned in India?</span></strong></h2><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Like other countries, India too has banned animal experimentations. The Indian government has passed various laws to restrict this practice. Let’s study some of these laws in detail-</span></p><span data-dcnode-id="1088" instrument_node="">
</span><h3 data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Laws Concerning Animal Testing-</span></h3><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">The Committee for the Purpose of Control and Supervision of Experiments on Animals (CPSEA) a statuary body formed by the Central government of India under Section 15 (1) of Prevention of Cruelty to Animals Act, 1960. This law prohibits any kind of painful torture targeted towards innocent animals.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><h4 data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Principles-</span></h4><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">CPSEA has set certain principles that are as follows-</span></p><span data-dcnode-id="1076" instrument_node="">
</span><ul data-dcnode-id="1065"><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The purpose behind the experiment, certain types of experiments can be performed on animals if they lead to the discovery in the field of physiology or helps in finding the cure of any disease related to animals, plants, and humans.</span></li><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Avoid performing animal tests, in case an alternative exists.</span></li><li data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">While experimenting the main aim should be to cause no pain or very little pain with the use of proper anesthesia, it also says, to treat animals no less than humans.</span></li><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">After the experiment, the scientist must check for the health and welfare of the animal. If the animal experiences discomfort or pain, euthanasia or mercy-killing is an option to put an end to their suffering.</span></li><li data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">There should be suitable living conditions for their proper growth.</span></li></ul><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Breeding of and Experiments on Animals (Control and Supervision) Rules, 1982. It is responsible for making principles and makes necessary changes with CPSEA. It has outlined several rules on experiments(Rule 2) and the procurement of animals. (Rule 10)</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Institutional Animal Ethics Committee (IAEC), a committee formed under Rule 13 of Breeding of and Experiments on Animals (Control and Supervision) Rules. The IAEC is a 6 member quorum that looks over the functions of an establishment.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><h3 data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">How Strict Are Animal Testing Laws In India?</span></h3><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">To talk about the strictness of laws, it’s quite evident that Indian laws are very strict because all these organizations together keep a check on the function of each other and our constitution also prohibits the practice of animal experimentation.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><ul data-dcnode-id="1047"><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">In the Indian Penal Code, Section 428 and Section 429 define the killing of animals as a transgression.</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">The Drugs and Cosmetics Rule 1945, has banned cosmetics based on these trials. ( Rules 135B and 148C).</span></li></ul><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Violating these laws could lead to imprisonment and fine . Thus, India has an elaborate system of rules to stop this evil practice.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><h2 data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Is Animal Testing reliable?</span></h2><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">It isn’t reliable source to test products for there later use on humans. There are multiple reasons behind this belief. Firstly, there is a difference between the types of diseases that develop in animals and humans. The diseases may belong to the same class but not of the same form, like they may affect distinct body parts of animals and humans differently. </span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">For example, some 85 AIDS vaccines have been so far successful to cure AIDS in non-primates or animals whereas, these vaccines have failed to produce any significant result in humans.&nbsp; Moreover, animals and humans have very distinct anatomy and physiology. Unlike humans, animals don’t have an elaborate digestive system like dogs comparatively have smaller digestive tracts than humans and ruminants also have a different type of digestive tract which highlights the differences between animals and humans and bringing us to the conclusion that we can’t depend on animal tests and experiments to safeguard our lives.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">According to a report, 92% of drugs passing animal trials fail to show any positive effect on humans or have the potential to lead to serious health issues.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><h2 data-dcnode-id="1028"><strong data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Alternatives For Animal Testing-</span></strong></h2><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Most of the countries banned these tests when some alternatives were available to them. As people became aware they started to search for some alternatives of animal experimentations, some of them are as follows-</span></p><span data-dcnode-id="1024" instrument_node="">
</span><ul data-dcnode-id="1017"><li data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Use of safe and natural ingredients in the manufacturing of products.</span></li><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Artificial Skin proved to be an excellent alternative to skin-based products or cosmetics.</span></li><li data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Eyetax –  checks for the efficiency and safety of eye – related products.</span></li></ul><span data-dcnode-id="1016" instrument_node="">
</span><h2 data-dcnode-id="1013"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Conclusion-</span></strong></h2><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">As we have reached the end of this article, a question remains unanswered. We have till now understood the concept of animal experimentation, but to conclude this debate we need to answer certain questions that are-</span></p><span data-dcnode-id="1009" instrument_node="">
</span><h3 data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Is It Ethically Just?</span></h3><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">The Medical Corporation of India (MCI) has also banned the use of animals declaring it unethical and unjust. Moreover, product testing or safety doesn’t justify our act of killing these creatures for our own selfish reasons. They should also get the same respect and decent treatment.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><h3 data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Human And Animal Relationship-</span></h3><span data-dcnode-id="1000" instrument_node="">
</span><p class="has-medium-font-size" data-dcnode-id="995"><em data-dcnode-id="996"><span data-dcnode-id="999" instrument_node="">“</span><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The greatness of a nation and its moral progress can be judged by the way its animals are treated.”</span></strong></em></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="991"><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">– Mahatma Gandhi</span></em></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">&nbsp;A healthy environment comprises the biotic, abiotic, and interaction between these two units of the environment. Both humans and animals interact with each other, and abiotic factors. It’s like a give and take relationship where both of them play a necessary role in the lives of each other. Moreover, animals and humans live near each other and if we didn’t stop this practice this human-animal relationship will fail, they would fear getting near to us and in near future, the populations of their species would also decrease considerably.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Thus, it’s an unethical practice that is a combination of lots of pain and agony and must be banned.</span></p><span data-dcnode-id="984" instrument_node="">
</span><h3 data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="981" instrument_node="">
