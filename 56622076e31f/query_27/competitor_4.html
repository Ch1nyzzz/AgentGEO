o live, but the room to roam and populate has it's limits. For example, deer populations need to be restricted by the available food limits of their respective habitats. Without hunting, the deer population would grow to the point of encroaching into human areas far worse than now, causing safety issues for humans and animals (many more vehicle/deer collision), and human crops being overrun by a deer population explosion; more deer require more food.&lt;&lt;&lt;</span><br data-dcnode-id="2599"><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">The true facts are... what you will find for all those who say NO to this question, are a special interest group of Hunters, who like to call themselves "sportsmen"   What is wrong with the lame argument above about needing to control population.  1)  it is known, that these hunters actually "raise" deer to keep their hunting population going..  2) if hunters completely left wildlife alone to their natural course.   Nature would take care of itself.  The environment would thrive, and animals would be balanced out based on each's predatory nature.  </span><br data-dcnode-id="2596"><br data-dcnode-id="2595"><span data-dcnode-id="2594" instrument_node="">However hunters are a blood thirsty tight  knit group.... unlikely to ever want to put down their guns and give up their hobby of "Killing"  other living beings for their kicks.</span></p><span data-dcnode-id="2592" instrument_node=""> </span><div class="qt" data-dcnode-id="2584"><cite data-dcnode-id="2588"><span data-dcnode-id="2591" instrument_node="">Posted by: </span><a data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/dgeclipsed/"><span data-dcnode-id="2590" instrument_node="">dgeclipsed</span></a></cite><div class="report" data-dcnode-id="2585" id="25AD8B29-2870-49B5-A169-95E53BD50C5B" r_type="argument"><a data-dcnode-id="2586" href="javascript:void(0)" id="report-content" onclick="

st die, it's like killing the weeds in your front yard. Also, many people grew up hunting, that's just something they love to do. You get to sit out in the woods, harvest an animal, and gut it and skin it. Then you get to eat it, which allows you to see the full circle of life. It really is an amazing thing when you think about it.  </span></p><span data-dcnode-id="1784" instrument_node=""> </span><div class="qt" data-dcnode-id="1779"><cite data-dcnode-id="1783"></cite><div class="report" data-dcnode-id="1780" id="84AC7B6B-A127-4AD0-AFE7-66E7D7C62405" r_type="argument"><a data-dcnode-id="1781" href="javascript:void(0)" id="report-content" onclick="

anything go to waste. When I was 10 years old, he was diagnosed with leukemia. Even after that, he found a way to take me hunting every year, even though I could see how much it hurt him. When I was 13 years old, he passed away. I am now 17, and I still go hunting every year. It is one of the only times that I can feel at peace. When I am out there in the mountains, I feel like he is still with me. If you want to take that away from me, then go ahead and try, but I sure won't let it go without a fight.  </span></p><span data-dcnode-id="1719" instrument_node=""> </span><div class="qt" data-dcnode-id="1714"><cite data-dcnode-id="1718"></cite><div class="report" data-dcnode-id="1715" id="A569F1A0-6749-4378-A9BA-7C9667813D2E" r_type="argument"><a data-dcnode-id="1716" href="javascript:void(0)" id="report-content" onclick="

killed in a much less humane manner than hunting. Hunting is not for fun. Hunting is for food. People enjoy putting food on the table for their families, just like the non-hunters. Those who are opposed to hunting may not have all the facts. Hunters don't go into the forest and kill the first animal that crosses their path, they wait for the right deer (3 1/2 yr old deer or older) before they shoot. The older the deer, the more meat, and every year the deer is alive; the less likely the deer will survive the next harsh winter. I live in a sub-division that everyone has at least an acre. We have white-tail deer everywhere and they get hit by cars and die slowly on the side of the road. If their numbers were thinned out, there wouldn't be so many hit by cars and there wouldn't be malnourished deer, with their ribs showing, in the winter months as the deer compete for food. There are a lot of people who throw out corn for the deer thinking it will sustain them; it's like trying to sustain your child on candy. There is no nutritional value to corn. The deer that are hit most in our sub-division are the deer that are crossing the road to get to the corn feeders. I would much rather see a deer shot and killed in a humane way than watch deer starve to death during the winter or starve to death as their teeth grind down (due to age) and they are unable to keep food in their mouths long enough to swallow it. I agree that there are unethical hunters, it would be ignorant to think otherwise, but most hunters follow the ethical laws of hunting. Those are the hunters and hunting that I support.</span></p><span data-dcnode-id="1648" instrument_node=""> </span><div class="qt" data-dcnode-id="1643"><cite data-dcnode-id="1647"></cite><div class="report" data-dcnode-id="1644" id="6BC8A79B-F7CB-4BF8-A152-4825DB916F9C" r_type="argument"><a data-dcnode-id="1645" href="javascript:void(0)" id="report-content" onclick="

ing animals into the city. Plus with that those animals will suffer from disease and it keeps the animal population controlled. But with species that the population becomes low and is no longer hunted till the population is back up. This is how we have lived for thousands of years and it should stay that way.</span></p><span data-dcnode-id="1521" instrument_node=""> </span><div class="qt" data-dcnode-id="1516"><cite data-dcnode-id="1520"></cite><div class="report" data-dcnode-id="1517" id="B784412B-68ED-41F4-895E-0D7D08B6FD99" r_type="argument"><a data-dcnode-id="1518" href="javascript:void(0)" id="report-content" onclick="

that we were given molars to chew through meat. We can also find written in the Bible: "Every moving thing that lives shall be food for you." So that makes hunting morally correct.</span><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">We humans need meat in order to survive because we need the vitamin B12 and proteins. If we do not consume this vitamin we could end-up having anemia, which in severe cases leads to leukemia. Research shows that we can also get protein from nuts but nuts have cholesterol and sugar which leads to other illness. So that makes it also biologically correct.</span><br data-dcnode-id="1458"><span data-dcnode-id="1457" instrument_node="">Hunting is also a source of income for farmers, thus making it economically correct because it   starts to rotate the fabled economic wheel of one creating sales and profit for the other.</span><br data-dcnode-id="1456"><span data-dcnode-id="1455" instrument_node="">My final reason would be that as we know animals are creatures that relay on instinct and there for produce a lot of young which can lead to over population causing disease between animals leading to an illness in us humans. Such as the recent Bird flu and Swine flu. An over population of animals  can also force the animals into the city causing bitter disasters. For example recently in London [in London fox hunting is not allowed] a young girl was attacked by a fox for hunger reasons.</span><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">I would also like to say a piece of my county's history in Malta during the stay of the Cavaliers of Saint John or better known as the knights of Malta banned hunting on types of animals including wild rabbit. That year the harvest was ruined, forcing the country to import more food from Sicily resulting in an increase in taxation to pay for the products this led to the revolt of the priests.</span><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">I would like to conclude with this quote -With great power comes great responsibility-.   The reason for this quote is that I believe that although hunting has its pros we must use it responsibly avoiding cruelty to animals and restoring balance.  </span></p><span data-dcnode-id="1449" instrument_node=""> </span><div class="qt" data-dcnode-id="1441"><cite data-dcnode-id="1445"><span data-dcnode-id="1448" instrument_node="">Posted by: </span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/SarahSpiteri/"><span data-dcnode-id="1447" instrument_node="">SarahSpiteri</span></a></cite><div class="report" data-dcnode-id="1442" id="88853F22-7DE7-4900-AAB2-A50E19ED0657" r_type="argument"><a data-dcnode-id="1443" href="javascript:void(0)" id="report-content" onclick="

            "><span data-dcnode-id="1179" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node=""> Noswad63 is right. Even though I'm against hunting, I agree with Noswad63. Hunting of endangered animals should stop, though</span></div></div><div cid="1E646E0D-C5AB-40B1-88F5-1946DC3878E8" class="q-comment" data-dcnode-id="1160"><div class="q-comment-hdr" data-dcnode-id="1163"><span class="user-name" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Anonymous</span></span><span data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">2013-05-03T11:02:37.973</span></span><div class="report" data-dcnode-id="1164" id="1E646E0D-C5AB-40B1-88F5-1946DC3878E8" r_type="comment"><a data-dcnode-id="1165" id="report-content" onclick="
              _gaq.push(['_trackEvent', 'UI', 'Report Post', 'https://www.debate.org/opinions/should-animal-hunting-be-banned'])
            "><span data-dcnode-id="1166" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node=""> I don't think many people actually understand what we are. We are animals. No matter how you play it, how you describe how 'advanced' we are and how many believe we are God's gift to the earth, we're no more above or below the fox I see roaming the fields. We are omnivores. That means we eat fruits, vegetables, berries, roots etc, but also meat. Meat from animals. I agree that trophy hunting is ridiculous, but hunting for food? Hunting for food is, apart from reproduction, the most natural thing we can do, and all these people preaching that "deer and boar will become extinct" are completely wrong. In fact, the people who think it's better to eat meat and vegetables from some farm they'll never see are the ones killing off the more rare animals on this planet. Animals such as Bears and Wolves, both under threat of being killed off in many areas, are being cleared out, trapped and shot because of angry farmers who need more land to support the food many people eat - meat and vegetables. So take a look at yourselves, 'Yes' voters, and decide whether eating a few deer every year from the far overpopulated herd is worse than killing off another pack of wolves or family of bears so you can eat your steak or salads.</span></div></div><div cid="49D88D56-04AE-4B51-825C-FE11D67DEE49" class="q-comment" data-dcnode-id="1146"><div class="q-comment-hdr" data-dcnode-id="1150"><span class="user-name" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Anonymous</span></span><span data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">2013-05-09T18:08:50.153</span></span><div class="report" data-dcnode-id="1151" id="49D88D56-04AE-4B51-825C-FE11D67DEE49" r_type="comment"><a data-dcnode-id="1152"             "><span data-dcnode-id="1153" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="1147"><span data-dcnode-id="1149" instrument_node=""> Hunting should not be banned becasue these animals we hunt kill humans more annualy that humans kill humans. These animals cary diseases too.</span><br data-dcnode-id="1148"></div></div><div cid="F99C3F6A-374B-4DC9-AB90-5EC96197CEE8" class="q-comment" data-dcnode-id="1130"><div class="q-comment-hdr" data-dcnode-id="1136"><span class="user-name" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Anonymous</span></span><span data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">2013-05-15T19:15:02.803</span></span><div class="report" data-dcnode-id="1137" id="F99C3F6A-374B-4DC9-AB90-5EC96197CEE8" r_type="comment"><a data-dcnode-id="1138" id="report-content" onclick="
              _gaq.push(['_trackEvent', 'UI', 'Report Post', 'https://www.debate.org/opinions/should-animal-hunting-be-banned'])
            "><span data-dcnode-id="1139" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node=""> This is the reason I hunt, and I'm sure some can agree.</span><br data-dcnode-id="1134"><br data-dcnode-id="1133"><span data-dcnode-id="1132" instrument_node="">Waking up early morning around 4:30am, slapping on all your clothes only thinking of the reason you got up. Today, is hunting day. Your wide awake driving down the highway, got your best friend (and hunting buddy) beside you, both with a coffee from timmies. Finally reach your destination, with a few laughs on the way. All your gear is ready and you start walking into the bush, you start to talking less and   focus on whats around you. Suddenly you feel at peace and start developing a bond with the forest, you look around you and focus on details you never really thought mattered, you notice how tall some trees get, how big, and how many there are. The moss around your feet, around the rocks, and trees and just how much there is. And then you think of how many different types of animals there are (of coarse you think of the small ones first) like, chipmunks, partridge (one of the most popular game animals), rabbits, foxes, deer, moose, wolves. This feeling of fear develops, but its alright cause you have your gun (we use a bow) with you so your safe, feeling you get, so you continue on. Walking through the forest, something catches your eye on the side, you look over to your amazement.Its a moose.Suddenly   your .22 isn't big enough anymore. Your frozen, but not scared, so you watch the moose. A true respect is developed for the animal. In this case, this is where us hunters would to some people shoot the moose cause we like killing all animals. I think its safe to say those people have zero idea of a true hunting experience.You both move on. You feel the true pulse of nature. Its safe and lethal all in one, all the time. To all animals its survival of the fittest, bottom line. When we hunt we have a weapon that allows us to take our target animal down one shot, when animals hunt they attack one on one, or with wolves, in packs. When we shoot the animal our wepon is designed to bring it down on impact, when animals hunt the tear, rip, and claw, other wise suffering as long as it's fighting back, sometimes it can take a good hour. Again i think its safe to say that our way of "cruel hunting" is the way id rather see them go. I understand that people don't understand why we hunt, but its population control. When there's an over population of insects, its terrible and everyone partakes in killing them all. Eventually all those insects will be at a normal population control again, but every time you see that insect you still kill it. Is that anymore different then hunting? But that being said its not like every time we see a partridge we kill it, or anything bigger or smaller. That is the reason there are seasons, they breed the population climbs, the season opens. And you work for that animal, if your the fun type of hunter, hunters that stay in vehicles that i don't understand, you search for your animal, maybe see a few incredible once in a lifetime things on the way, enjoy the outdoors, fresh air, and feel the respect for your surroundings. In the whole time you read this message did you feel any of that? That, is another reason to go out hunting.</span></div></div><div cid="4C2E037B-33B9-4BA4-9DC5-60A7186389D9" class="q-comment" data-dcnode-id="1113"><div class="q-comment-hdr" data-dcnode-id="1120"><span class="user-name" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Anonymous</span></span><span data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">2013-05-16T18:42:40.983</span></span><div class="report" data-dcnode-id="1121" id="4C2E037B-33B9-4BA4-9DC5-60A7186389D9" r_type="comment"><a data-dcnode-id="1122" id="report-content" onclick="
              _gaq.push(['_trackEvent', 'UI', 'Report Post', 'https://www.debate.org/opinions/should-animal-hunting-be-banned'])
            "><span data-dcnode-id="1123" instrument_node="">
            Report Post</span></a></div></div><div class="q-comment-body" data-dcnode-id="1114"><span data-dcnode-id="1119" instrument_node="">Nice story. In my opinion it's a rather silly comparison to compare insects to animals. Secondly, your weak argument that animals "tear" and "claw" their prey while you kill "humanely" is laughable at best. Animals "tear" and "claw" their prey at their own device because that is all they have to survive. Perhaps if they had guns and arrows at their disposal and were taught how to use them then they wouldn't have the need to "claw" and "tear" at its prey. </span><br data-dcnode-id="1118"><span data-dcnode-id="1117" instrument_node="">I was brought up in a family where my father hunted to provide for his family so I have no problem with hunting, provided its for the sole purpose to survive, whether its in North America or in the rest of the world. </span><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">My issue is with the Trophy Hunters, in particular the ones that travel to Africa . Many companies disperse the meat of a downed animal such as a wildebeest, Kudu, Gazelle etc, to the local tribes people after the hunt, many companies don't. My issue and disgust is with the farmers in Africa that raise beautiful lions for the sole purpose of Trophy Hunting and for pure profit. Its sickening to see these majestic animals propped up with their mouths open to mimic a roar, while the gun toting hunters are grinning from ear to ear. I've exchanged many words with the men and women that hunt these beautiful lions. They with use phrases like "population control" and if you can believe this one "conservation". Where does killing an incredible Male/Female lion fall into "population control or conservation". When a male lion is shot in the wild, his pride no longer has their protection, and other male lions take over that pride killing all of the offspring of the shot/killed male lion ( to have their own genes introduced into the pride) disturbing the already delicate balance of the lion population. I was told once to "get a life by one of these hunters" among other things. To those hunters I say "Get a life instead of taking one". It's disturbing enough that they hunt the resident lions let alone the ones that are raised to be killed. </span></div></div><div cid="B7B62403-5D4B-4B66-88ED-66FC15B6155D" class="q-comment" data-dcnode-id="1100"><div class="q-comment-hdr" data-dcnode-id="1103"><span class="user-name" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Anonymous</span></span><span data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">2013-05-20T17:27:27.253</span></span><div class="report" data-dcnode-id="1104" id="B7B62403-5D4B-4B66-88ED-66FC15B6155D" r_type="comment"><a data-dcnode-id="1105" id="report-content" onclick="

            "><span data-dcnode-id="1106" instrument_node="">

 everyone in the world while sippin our tea like lil smart girls and then kill ourselves because we realize how pointless life becomes so in conclusion no animal hunting obviously will never and should not be banned.</span></div></div><div cid="3CDD4095-1565-45EF-BF93-3445AE026634" class="q-comment" data-dcnode-id="969"><div class="q-comment-hdr" data-dcnode-id="972"><a class="user-name" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/supergerty"><span data-dcnode-id="981" instrument_node="">supergerty</span></a><span data-dcnode-id="978"><span data-dcnode-id="979" instrument_node=""> says</span></span><span class="q-comment-time" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">2014-04-05T19:42:26.483</span></span><div class="report" data-dcnode-id="973" id="3CDD4095-1565-45EF-BF93-3445AE026634" r_type="comment"><a data-dcnode-id="974" id="report-content" onclick="
