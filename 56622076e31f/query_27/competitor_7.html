</span><h1 class="entry-title" data-dcnode-id="1352" itemprop="headline"><span data-dcnode-id="1353" instrument_node="">Blood Sports Should Be Banned</span></h1><span data-dcnode-id="1351" instrument_node=""> </span></header><span data-dcnode-id="1349" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1210" itemprop="text"><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Should blood sports be banned?</span></p><span data-dcnode-id="1345" instrument_node="">
</span><h2 data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">All the </span><span class="has-inline-color" data-dcnode-id="1342" style="color:#2e9c12"><span data-dcnode-id="1343" instrument_node="">Yes</span></span><span data-dcnode-id="1341" instrument_node=""> points:</span></h2><span data-dcnode-id="1339" instrument_node="">
</span><ol data-dcnode-id="1323"><li data-dcnode-id="1336"><a data-dcnode-id="1337" href="#yes1"><span data-dcnode-id="1338" instrument_node="">The test for whether beings should enjoy moral significance is their capacity to feel pain. Animals…</span></a></li><li data-dcnode-id="1333"><a data-dcnode-id="1334" href="#yes2"><span data-dcnode-id="1335" instrument_node="">Blood sports are cruel since the suffering caused can be unnecessary and prolonged, especially in th…</span></a></li><li data-dcnode-id="1330"><a data-dcnode-id="1331" href="#yes3"><span data-dcnode-id="1332" instrument_node="">Another moral objection is that people take pleasure in the process of often-pointless killing. Man…</span></a></li><li data-dcnode-id="1327"><a data-dcnode-id="1328" href="#yes4"><span data-dcnode-id="1329" instrument_node="">Wanting to ban blood sports is not the same as rejecting the need for the culling of animals. In Br…</span></a></li><li data-dcnode-id="1324"><a data-dcnode-id="1325" href="#yes5"><span data-dcnode-id="1326" instrument_node="">An argument that highlights the economic costs of banning blood sports is analogous to arguing for t…</span></a></li></ol><span data-dcnode-id="1322" instrument_node="">
</span><h2 data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">All the </span><span class="has-inline-color" data-dcnode-id="1319" style="color:#ec090e"><span data-dcnode-id="1320" instrument_node="">No</span></span><span data-dcnode-id="1318" instrument_node=""> points:</span></h2><span data-dcnode-id="1316" instrument_node="">
</span><h2 class="highlight_point" data-dcnode-id="1314" id="yes1"><span data-dcnode-id="1315" instrument_node="">The test for whether beings should enjoy moral significance is their capacity to feel pain. Animals…</span></h2><span data-dcnode-id="1313" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_yes animated none" data-dcnode-id="1305" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1309" style="background:#bdf7b0"><h3 data-dcnode-id="1311" style="color:#333333"><span data-dcnode-id="1312" instrument_node="">Yes because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1310" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1306"><p data-dcnode-id="1307" style="color:#5d5d5d"><span data-dcnode-id="1308" instrument_node="">The test for whether beings should enjoy moral significance is their capacity to feel pain. Animals react in a way consistent with our understanding of what it is to be in pain – they scream and avoid the source of that pain. Research also shows that the pain sensing structures of animals’ nervous systems are similar to our own. A distinction cannot be made between animals and humans on grounds of intelligence since we don’t consider the new-born, senile or mentally impaired to be non-human. Therefore, both humans and animals should enjoy equal moral consideration. Any attempt to distinguish between animals and people is ‘speciesism’. To say that animals deserve less consideration simply because they are animals is analogous to claiming that women deserve inferior treatment by virtue of their sex. ‘The question is not, Can animals reason? Nor, Can they talk? But can they suffer’ (Vicki Hearn, What’s Wrong with Animal Rights?)</span></p></div></div><span data-dcnode-id="1304" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_no animated none" data-dcnode-id="1296" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1300" style="background:#f59e9e"><h3 data-dcnode-id="1302" style="color:#333333"><span data-dcnode-id="1303" instrument_node="">No because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1301" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1297"><p data-dcnode-id="1298" style="color:#5d5d5d"><span data-dcnode-id="1299" instrument_node="">Common sense tells us that there is a difference between animals and humans. In the presence of the senile or disabled we feel sorry for them because they lack the faculties that humans normally possess. We feel no such pity for animals because they lack faculties that they can never have. For example, animals cannot construct hypothetical scenarios, don’t have values and are not consciously aware. The value of animals is not only instrumental but also because they contribute to the beauty of the natural world and furthermore because of the symbiotic relationship between animals and human communities. People are the most developed of all the species and as such are in the best position to consider the interests of all of nature.</span></p></div></div><span data-dcnode-id="1295" instrument_node="">
</span><h2 class="highlight_point" data-dcnode-id="1293" id="yes2"><span data-dcnode-id="1294" instrument_node="">Blood sports are cruel since the suffering caused can be unnecessary and prolonged, especially in th…</span></h2><span data-dcnode-id="1292" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_yes animated none" data-dcnode-id="1284" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1288" style="background:#bdf7b0"><h3 data-dcnode-id="1290" style="color:#333333"><span data-dcnode-id="1291" instrument_node="">Yes because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1289" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1285"><p data-dcnode-id="1286" style="color:#5d5d5d"><span data-dcnode-id="1287" instrument_node="">Blood sports are cruel since the suffering caused can be unnecessary and prolonged, especially in the case of hunting with dogs, where death comes only after an exhausting chase and may involve the animal being ripped apart by the hounds. Even when the animals are ultimately shot, they are seldom despatched by an expert, trained marksman, so they may not be killed immediately, but wounded and left to die very slowly from their injuries.</span></p></div></div><span data-dcnode-id="1283" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_no animated none" data-dcnode-id="1275" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1279" style="background:#f59e9e"><h3 data-dcnode-id="1281" style="color:#333333"><span data-dcnode-id="1282" instrument_node="">No because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1280" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1276"><p data-dcnode-id="1277" style="color:#5d5d5d"><span data-dcnode-id="1278" instrument_node="">Hunting is an integral part of effective wildlife management and makes a positive contribution to the countryside in general. Only those animals that are edible or pests are hunted – and they would have to be killed anyway regardless of whether it was for sport or not. Hunting with dogs is not especially cruel as it is natural to many animals to be chased, and the adrenaline they experience limits their suffering. Hounds may rip a fox apart, but this only occurs after its death, which is usually very quick.In America, taxes collected from hunters are used to fund conservation work and monitor the number of animals that need to be killed each season. Evidence from America shows a strong positive correlation between increases in hunting and the numbers of game species, largely because hunting provides an incentive to protect land rather than manage it purely in the interests of agriculture.</span></p></div></div><span data-dcnode-id="1274" instrument_node="">
</span><h2 class="highlight_point" data-dcnode-id="1272" id="yes3"><span data-dcnode-id="1273" instrument_node="">Another moral objection is that people take pleasure in the process of often-pointless killing. Man…</span></h2><span data-dcnode-id="1271" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_yes animated none" data-dcnode-id="1263" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1267" style="background:#bdf7b0"><h3 data-dcnode-id="1269" style="color:#333333"><span data-dcnode-id="1270" instrument_node="">Yes because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1268" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1264"><p data-dcnode-id="1265" style="color:#5d5d5d"><span data-dcnode-id="1266" instrument_node="">Another moral objection is that people take pleasure in the process of often-pointless killing. Man has moved well beyond his natural state of being a hunter-gatherer and needing to hunt for food. There is something perverse about breeding animals, or managing the land to encourage them, just so they can be shot. Bear- and badger-baiting and cock-fighting have been banned already and it the abolition of other blood sports is well overdue.</span></p></div></div><span data-dcnode-id="1262" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_no animated none" data-dcnode-id="1254" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1258" style="background:#f59e9e"><h3 data-dcnode-id="1260" style="color:#333333"><span data-dcnode-id="1261" instrument_node="">No because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1259" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1255"><p data-dcnode-id="1256" style="color:#5d5d5d"><span data-dcnode-id="1257" instrument_node="">Hunters are not bloodthirsty individuals- they derive their enjoyment from the thrill of the chase or practicing their marksmanship. The key difference between blood sports today and practices that have already been banned, is that badgers, bear and chickens are not vermin whose numbers need to be controlled. If animals have to be killed anyway, why does it make any difference that people enjoy hunting them?</span></p></div></div><span data-dcnode-id="1253" instrument_node="">
</span><h2 class="highlight_point" data-dcnode-id="1251" id="yes4"><span data-dcnode-id="1252" instrument_node="">Wanting to ban blood sports is not the same as rejecting the need for the culling of animals. In Br…</span></h2><span data-dcnode-id="1250" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_yes animated none" data-dcnode-id="1242" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1246" style="background:#bdf7b0"><h3 data-dcnode-id="1248" style="color:#333333"><span data-dcnode-id="1249" instrument_node="">Yes because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1247" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1243"><p data-dcnode-id="1244" style="color:#5d5d5d"><span data-dcnode-id="1245" instrument_node="">Wanting to ban blood sports is not the same as rejecting the need for the culling of animals. In Britain, the Burns Committee concluded that investing money in better nutrition for ewes rather than in killing foxes would save more livestock. Technology provides more humane ways of killing, (e.g. trapping and lamping), whilst also allowing devotees to test their skills against clay pigeons or in drag hunts.</span></p></div></div><span data-dcnode-id="1241" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_no animated none" data-dcnode-id="1233" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1237" style="background:#f59e9e"><h3 data-dcnode-id="1239" style="color:#333333"><span data-dcnode-id="1240" instrument_node="">No because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1238" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1234"><p data-dcnode-id="1235" style="color:#5d5d5d"><span data-dcnode-id="1236" instrument_node="">Many of the supposed alternatives to hunting with dogs are impractical. For example, it is illegal to use guns in proximity to public roads and footpaths. It may not be possible to reach traps in time to prevent animals injuring themselves trying to escape. Traps are also indiscriminate as to what they catch. Shooting or hunting with hounds ensures a kind of natural selection with the weakest or sickest animals killed while the fittest survive, thus maintaining a healthy population. Death at the hands of hound or hunter is much quicker than a lingering death due to starvation or disease.</span></p></div></div><span data-dcnode-id="1232" instrument_node="">
</span><h2 class="highlight_point" data-dcnode-id="1230" id="yes5"><span data-dcnode-id="1231" instrument_node="">An argument that highlights the economic costs of banning blood sports is analogous to arguing for t…</span></h2><span data-dcnode-id="1229" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_yes animated none" data-dcnode-id="1221" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1225" style="background:#bdf7b0"><h3 data-dcnode-id="1227" style="color:#333333"><span data-dcnode-id="1228" instrument_node="">Yes because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1226" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1222"><p data-dcnode-id="1223" style="color:#5d5d5d"><span data-dcnode-id="1224" instrument_node="">An argument that highlights the economic costs of banning blood sports is analogous to arguing for the continuation of slavery because slave traders might lose their livelihoods. Investigations in Britain have cast doubt on the extent of problems that a ban would cause. Overall, however, the essential point is that it is morally wrong to kill animals for pleasure and no amount of economic benefits can make that right.</span></p></div></div><span data-dcnode-id="1220" instrument_node="">
</span><div class="wp-block-kb-accordion kb-accordion kb-accordion-open kb-align-left os-animation highlight_no animated none" data-dcnode-id="1212" data-os-animation="none" style="text-align:left"><div class="kb-accordion-title" data-dcnode-id="1216" style="background:#f59e9e"><h3 data-dcnode-id="1218" style="color:#333333"><span data-dcnode-id="1219" instrument_node="">No because…</span></h3><span class="fas fa-angle-down" data-dcnode-id="1217" style="color:#333333"></span></div><div class="kb-accordion-text" data-dcnode-id="1213"><p data-dcnode-id="1214" style="color:#5d5d5d"><span data-dcnode-id="1215" instrument_node="">Many rural communities would be devastated by a ban on hunting. Figures from the US estimate that some 1,000,000 jobs depend on hunting, (which contributes $30 billion each year to the economy). In Britain figures from the Field Sports Society estimate, that hunting is worth £175 million to the economy with some 11,000 jobs depending on the hunting industry. Whilst these numbers might seem relatively small as a percentage of the workforce, the jobs are concentrated in a small number of areas across the country. The majority of those who seek a ban live in cities where their only experience with animals has been with animated or domesticated creatures. This encourages anthropomorphic attitudes that cloud judgements on rural issues and animal welfare. While opinion polls might be against hunting, any change in the law would be the result of a tyranny of an ignorant majority.</span></p></div></div><span data-dcnode-id="1211" instrument_node="">
</span></div><span data-dcnode-id="1209" instrument_node="">

</span><span data-dcnode-id="474" wpd-tooltip="Comment Link" wpd-tooltip-position="left"><i aria-hidden="true" class="fas fa-link" data-dcnode-id="475" data-wpd-clipboard="https://debatewise.org/2665-blood-sports/#comment-11069"></i></span><span data-dcnode-id="473" instrument_node="">

    Reply to&nbsp;
    </span><a data-dcnode-id="464" href="#comment-4135"><span data-dcnode-id="465" instrument_node="">
        Dave
    </span></a><span data-dcnode-id="463" instrument_node="">
</span></div><span data-dcnode-id="461" instrument_node="">
</span><div class="wpd-comment-text" data-dcnode-id="433"><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="459" instrument_node="">Much of what has been written here in favour of blood sports and hunting is utter nonsense and is using statistics from the US where a larger population will of course skew towards more dramatic numbers in terms of the economic benefits or numbers of jobs supported by hunting. A better metric would be an analysis on percentage terms – though I suspect there’s a reason why the debater has opted not to assert their position in those terms.</span><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node="">
In the UK for example, grouse shooting contributes just 0.005% of GDP. It would not be surprising to see similarly miniscule figures from the US if expressed in percentage terms, albeit with a suspected increase due to the levels of gun ownership which contribute economically. Although of course, one could simply shoot targets and clays.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="454" instrument_node="">Beyond that glaring omission, I see much of the myth and nonsense surrounding hunting that I myself was told and repeated growing up in the farming community, persists. Having attended fox hunts both as a supporter and latterly in opposition, I can assure anyone reading, that the “quick nip to the neck” thing is absolutely not true and indeed this is backed up by independent autopsies carried out on hunted animals whose bodies have been retrieved by activists.</span><br data-dcnode-id="453"><span data-dcnode-id="452" instrument_node="">
Any notions of pest control are dashed by the practice of capturing and raising young cubs to be “bagged” (shoved in a sack with their paws cut to slow them down, then released in a covert near the waiting hounds to guarantee a chase and kill on a poor day.)</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">The assertion one cannot shoot near a footpath or public road is also misleading. Shooting in these locations is permitted in the UK provided certain precautions are taken and anyone in the hunting and shooting community would know this, thus revealing the dishonest intentions of the author.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Similar misrepresentation is occurring in the statement that shot game ends up on the table. In truth, whilst each gun will take a brace or two for the freezer, and occasionally a local butcher can be found with a game license, this isn’t true for the whole of the UK or even true for a particular shoot all the way through a season. Due to the high number of birds bred and the number of guns per shoot plus shoots per season, the bulk of shot game will simply end up on a “stink pit” – a hole in the ground full of rotten game birds, foxes, raptors etc used to attract scavengers like foxes or stoats, to be snared then shot, sometimes after days of choking in agony.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="443" instrument_node="">Finally we come to the old chestnut that only urban townies are against hunting. As previously stated, I grew up farming and supporting hunting. Since changing my views I’ve met many others who farmed or hunted, kept game or even poached or worked in abbatoirs who have since changed sides – many because of their direct experiences of the viciousness of that community and trade.</span><br data-dcnode-id="442"><span data-dcnode-id="441" instrument_node="">
There’s also the simple fact that activists are only able to protest and sabotage hunts because they get tip offs from within the hunting community. Disgruntled locals, ex-hunters, farmers sick of losing lambs and pregnant sheep when the hunt rides over their land and sends them into shock (often without any ability to stop it if they are tenants on land owned by the hunt and/or their staff) and many others pass information that helps stop blood sports. Such information is often obscured as regards the source as local people who object to hunting often end up threatened, assaulted, abused, harassed and have even had their pets tortured and killed or dead animals dumped on their doorsteps. Chris Packham in the UK is the most high profile victim of this intimidation but it goes on almost constantly behind the scenes and away from media attention.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="438" instrument_node="">There’s much more to pick apart in this and it would be a real pleasure to do so, however a comment can only touch on the most egregious and deliberate errors in the piece. Much of what is written and said in support of hunting is either false or misrepresents the position and the argument is part of a long running culture war between rural landowners and those who support and/or work for them and the rest of society that understands the cruelty of what is happening.</span><br data-dcnode-id="437"><span data-dcnode-id="436" instrument_node="">
Having been on both sides of this debate and having studied the topic at length – initially to disprove the animal rights lobby – I reached the only sensible and logical position: that hunting and shooting animals for pleasure is morally repugnant and environmentally unsustainable. It must be ended if humanity is to progress as a species.</span></p><span data-dcnode-id="434" instrument_node="">
