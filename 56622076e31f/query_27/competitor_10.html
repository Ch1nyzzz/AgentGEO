</span><p data-dcnode-id="628"></p><p data-dcnode-id="617"><span data-dcnode-id="627" instrument_node="">He had his bodyguards carry him on their shoulders up the </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cnn.com/2013/10/02/travel/justin-bieber-great-wall-of-china/" target="_blank"><span data-dcnode-id="626" instrument_node="">Great Wall of China</span></a><span data-dcnode-id="624" instrument_node="">. He took selfies in front of Tokyo's notorious </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodreporter.com/news/justin-bieber-visits-controversial-japanese-698364" target="_blank"><span data-dcnode-id="623" instrument_node="">Yasukuni Shrine</span></a><span data-dcnode-id="621" instrument_node=""> for WWII war criminals. He wrote a ridiculous Holocaust survivor joke in the guest book at the </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cnn.com/2013/04/14/showbiz/bieber-anne-frank/" target="_blank"><span data-dcnode-id="620" instrument_node="">Anne Frank House</span></a><span data-dcnode-id="618" instrument_node="">. Yup, everywhere Justin Bieber goes, some folks would prefer he hurry up and leave. Let's take a look at some notable places that took heroic measures to make sure the Biebs never comes back.</span></p><span data-dcnode-id="616" instrument_node="">
</span><div data-dcnode-id="325" style="width: 100%; height: 100%;"><div class="primisslate" data-dcnode-id="326" id="primisPlayerContainerDiv" style="margin-right: auto; margin-left: auto; max-width: 500px;"><iframe data-dcnode-id="615" frameborder="0" id="google_ads_iframe_dummy_sekindoParent347" marginheight="0" marginwidth="0" scrolling="no" style="width: 1px; height: 1px; position: absolute;" title="Primis Frame"></iframe><div data-dcnode-id="327" id="primis_container_div"><div data-dcnode-id="328" id="primis_playerSekindoSPlayer6267ca13b436e" style="overflow: hidden; position: relative; width: 500px; height: 281px;"><div data-dcnode-id="329" id="Player-Div-SekindoSPlayer6267ca13b436e" style="width: max-content; height: max-content; top: auto; left: auto; position: static; transform: none;"><div data-dcnode-id="330" id="Video-Div-SekindoSPlayer6267ca13b436e" style="position: relative;"><div data-dcnode-id="336" id="Video-iFrame-SekindoSPlayer6267ca13b436e" style="overflow: hidden; position: relative; width: 500px; height: 281px;"><div data-dcnode-id="555" id="videoContainerDiv" style="width: 100%; height: 100%; background: black; position: relative; z-index: 1;"><div data-dcnode-id="613" style="width: 100%; height: 100%; display: block;"><video crossorigin="anonymous" data-dcnode-id="614" playsinline="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//video.primis.tech/uploads/cn3/video/users/converted/30954/video_61966eff77a35297354385/vid625ab3156b7b6365581494.mp4&amp;raw" style="width: 100%; height: 100%;"></video></div><div data-dcnode-id="556" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.42857, 0.703125); z-index: 3; visibility: visible; width: 350px; height: 400px; display: none;"><div data-dcnode-id="612" style="width: 51px; height: 51px; background-image: url(&quot;https://video.primis.tech/uploads/cn11/video/users/converted/30954/video_61966eff77a35297354385/vid619e3898b6b5a403432254 </span><h2 class="" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Argentina</span></h2><span data-dcnode-id="313" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="303" data-post-id="16439" data-slide-num="1"><span data-dcnode-id="312" instrument_node="">
</span><picture data-dcnode-id="308"><span data-dcnode-id="311" instrument_node="">
</span><img alt="" class="gallery-image" data-dcnode-id="310" data-lazy-src="https://www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/argentina-1500656744.jpg" data-post-id="16439" data-slide-num="1" data-slide-title="Places That Have Banned Justin Bieber: Argentina" data-slide-url="https://www.nickiswift.com/16439/places-banned-justin-bieber/slide/argentina-2/" height="437" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/argentina-1500656744.jpg&amp;raw" width="780"><span data-dcnode-id="309" instrument_node="">
</span></picture><span data-dcnode-id="307" instrument_node="">
</span><span class="gallery-image-credit" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Getty Images</span></span><span data-dcnode-id="304" instrument_node=""> </span></div><span data-dcnode-id="302" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="277"><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="300"></p><p data-dcnode-id="295"><span data-dcnode-id="299" instrument_node="">If there's a country that hates Bieber more than Argentina, we've yet to see it. The South American leg of his 2013 Believe tour started in the most Bieber way imaginable. He walked off stage during a show in Colombia and then was hit with a misdemeanor after </span><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tmz.com/2013/11/06/justin-bieber-brazil-spray-paint-tag-rio-illegal-police/" target="_blank"><span data-dcnode-id="298" instrument_node="">tagging an abandoned hotel</span></a><span data-dcnode-id="296" instrument_node=""> in Brazil. That's the good news. When the tour hit Argentina, all Bieber broke loose.</span></p><span data-dcnode-id="294" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="293"></div><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="291" instrument_node="">He reportedly </span><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usatoday.com/story/life/people/2013/11/14/justin-bieber-apologizes-after-kicking-argentine-flag/3530339/" target="_blank"><span data-dcnode-id="290" instrument_node="">defiled the Argentine flag</span></a><span data-dcnode-id="288" instrument_node=""> on stage, and after he allegedly </span><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/music/2014/nov/14/justin-bieber-faces-questioning-over-alleged-attack-argentinian-photographer" target="_blank"><span data-dcnode-id="287" instrument_node="">unleashed a bodyguard on a photographer</span></a><span data-dcnode-id="285" instrument_node=""> outside a nightclub, a warrant was issued for his arrest. The warrant was eventually dismissed, but when Bieber tried to roll through the country again for his 2016 Purpose tour, the government said it was </span><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hollywoodlife.com/2016/05/16/justin-bieber-banned-argentina-tweets-purpose-tour/" target="_blank"><span data-dcnode-id="284" instrument_node="">too late now to say sorry</span></a><span data-dcnode-id="282" instrument_node="">.</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="279"></p><span data-dcnode-id="278" instrument_node="">
</span></div><span data-dcnode-id="276" instrument_node="">
</span></div><span data-dcnode-id="274" instrument_node="">
</span><div class="news-article" data-dcnode-id="237"><span data-dcnode-id="273" instrument_node="">
</span><h2 class="" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">The Middle East</span></h2><span data-dcnode-id="270" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="263" data-post-id="16439" data-slide-num="2"><span data-dcnode-id="269" instrument_node="">
</span><picture data-dcnode-id="265"><span data-dcnode-id="268" instrument_node="">
</span><img alt="" class="gallery-image" data-dcnode-id="267" data-lazy-src="https://www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/the-middle-east-1500656744.jpg" data-post-id="16439" data-slide-num="2" data-slide-title="Places That Have Banned Justin Bieber: The Middle East" data-slide-url="https://www.nickiswift.com/16439/places-banned-justin-bieber/slide/the-middle-east/" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/the-middle-east-1500656744.jpg&amp;raw" width="780"><span data-dcnode-id="266" instrument_node="">
</span></picture><span data-dcnode-id="264" instrument_node="">
</span></div><span data-dcnode-id="262" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="239"><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="260"></p><p data-dcnode-id="249"><span data-dcnode-id="259" instrument_node="">If you're shirtless on your album cover with a cross tattoo on your chest, you'd have a better chance of dropping your album in Mordor than you would the Middle East. According to </span><em data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">TMZ,</span></em><span data-dcnode-id="256" instrument_node=""> Bieber's </span><em data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Purpose</span></em><span data-dcnode-id="253" instrument_node=""> album was rejected in "</span><a data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tmz.com/2015/10/13/justin-bieber-album-banned-middle-east-religion/" target="_blank"><span data-dcnode-id="252" instrument_node="">several Middle Eastern countries, as well as Indonesia</span></a><span data-dcnode-id="250" instrument_node="">." The pop star's public relations team reportedly rushed to get a more palatable cover redesign specifically for that market, but that made little difference. No word yet if Jesus approved of the strategy.</span></p><span data-dcnode-id="248" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="247"></div><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="245"></p><span data-dcnode-id="244" instrument_node="">
</span><div class="vidad-container" data-dcnode-id="243"></div><span data-dcnode-id="242" instrument_node="">
</span><div class="teads-container" data-dcnode-id="241"></div><span data-dcnode-id="240" instrument_node="">
</span></div><span data-dcnode-id="238" instrument_node="">
</span></div><span data-dcnode-id="236" instrument_node="">
</span><div class="news-article" data-dcnode-id="206"><span data-dcnode-id="235" instrument_node="">
</span><h2 class="" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">TV commercials in the UK</span></h2><span data-dcnode-id="232" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="225" data-post-id="16439" data-slide-num="3"><span data-dcnode-id="231" instrument_node="">
</span><picture data-dcnode-id="227"><span data-dcnode-id="230" instrument_node="">
</span><img alt="" class="gallery-image" data-dcnode-id="229" data-lazy-src="https://www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/tv-commercials-in-the-uk-1500656744.jpg" data-post-id="16439" data-slide-num="3" data-slide-title="Places That Have Banned Justin Bieber: TV commercials in the UK" data-slide-url="https://www.nickiswift.com/16439/places-banned-justin-bieber/slide/tv-commercials-in-the-uk/" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/tv-commercials-in-the-uk-1500656744.jpg&amp;raw" width="780"><span data-dcnode-id="228" instrument_node="">
</span></picture><span data-dcnode-id="226" instrument_node="">
</span></div><span data-dcnode-id="224" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="208"><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="222"></p><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">You know those celebrity Proactiv commercials—the ones where you need a telescopic lens to see the blemishes on stars' faces? Well, back in 2012, Katy Perry and Bieber shot ads for the skincare line, but they were quickly pulled from UK airwaves.</span></p><span data-dcnode-id="219" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="218"></div><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="216" instrument_node="">Why? The British version of the products don't have the same active ingredients as the U.S. line, and the UK Advertising Standards Authority did not believe Proactiv's claim that Perry and Bieber had used the British version prior to the commercial shoot. "In that context, we therefore considered the claims of continued use had not been substantiated," the authority said in a </span><a data-dcnode-id="214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesun.co.uk/archives/news/776574/katy-perry-and-justin-bieber-spot-ads-banned-in-uk/" target="_blank"><span data-dcnode-id="215" instrument_node="">statement</span></a><span data-dcnode-id="213" instrument_node="">. "We concluded that the ads were misleading. The ads must not appear again in their current form." There's a "Belieber" joke in here somewhere.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="210"></p><span data-dcnode-id="209" instrument_node="">
</span></div><span data-dcnode-id="207" instrument_node="">
</span></div><span data-dcnode-id="205" instrument_node="">
</span><div class="news-article" data-dcnode-id="162"><span data-dcnode-id="204" instrument_node="">
</span><h2 class="" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Las Vegas Indoor Skydiving</span></h2><span data-dcnode-id="201" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="191" data-post-id="16439" data-slide-num="4"><span data-dcnode-id="200" instrument_node="">
</span><picture data-dcnode-id="196"><span data-dcnode-id="199" instrument_node="">
</span><img alt="" class="gallery-image" data-dcnode-id="198" data-lazy-src="https://www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/las-vegas-indoor-skydiving-1500656744.jpg" data-post-id="16439" data-slide-num="4" data-slide-title="Places That Have Banned Justin Bieber: Las Vegas Indoor Skydiving" data-slide-url="https://www.nickiswift.com/16439/places-banned-justin-bieber/slide/las-vegas-indoor-skydiving/" height="439" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/las-vegas-indoor-skydiving-1500656744.jpg&amp;raw" width="780"><span data-dcnode-id="197" instrument_node="">
</span></picture><span data-dcnode-id="195" instrument_node="">
</span><span class="gallery-image-credit" data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Getty Images</span></span><span data-dcnode-id="192" instrument_node=""> </span></div><span data-dcnode-id="190" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="164"><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="188"></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Another story involving Bieber being an insufferable brat? Get outta here. Back in 2013, Bieber and six of his bros showed up to Las Vegas Indoor Skydiving at closing time. We could probably stop the story there, but wait, there's more!</span></p><span data-dcnode-id="185" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="184"></div><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="182" instrument_node="">According to </span><em data-dcnode-id="179"><a data-dcnode-id="180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eonline.com/news/432321/justin-bieber-banned-from-las-vegas-indoor-skydiving-facility-for-life-find-out-why" target="_blank"><span data-dcnode-id="181" instrument_node="">E! News</span></a></em><span data-dcnode-id="178" instrument_node="">, the staff described the crew as "a disrespectful bunch" who trashed the bathroom. The leader of the pack was reportedly "very standoff-ish toward mostly everyone outside of his crew." When approached with the $1,600 bill, Bieber allegedly agreed to give the business an Instagram shout out in lieu of cash. That's a good deal considering the Biebs has tens of millions of followers, but it's only worth it if the pop star follows through.</span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="175" instrument_node="">An insider told </span><em data-dcnode-id="170"><em data-dcnode-id="172"><a data-dcnode-id="173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eonline.com/news/432321/justin-bieber-banned-from-las-vegas-indoor-skydiving-facility-for-life-find-out-why" target="_blank"><span data-dcnode-id="174" instrument_node="">E! News</span></a></em><span data-dcnode-id="171" instrument_node="">,</span></em><span data-dcnode-id="169" instrument_node=""> Bieber "actually faked like he was posting something, per the agreement, but never did." Even worse? He didn't even tip. Bieber is now on the facility's no fly list for life.</span></p><span data-dcnode-id="167" instrument_node="">
</span><p data-dcnode-id="166"></p><span data-dcnode-id="165" instrument_node="">
</span></div><span data-dcnode-id="163" instrument_node="">
</span></div><span data-dcnode-id="161" instrument_node="">
</span><div class="news-article" data-dcnode-id="131"><span data-dcnode-id="160" instrument_node="">
</span><h2 class="" data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Passage club in Vienna, Austria</span></h2><span data-dcnode-id="157" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="147" data-post-id="16439" data-slide-num="5"><span data-dcnode-id="156" instrument_node="">
</span><picture data-dcnode-id="152"><span data-dcnode-id="155" instrument_node="">
</span><img alt="" class="gallery-image" data-dcnode-id="154" data-lazy-src="https://www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/passage-club-in-vienna-austria-1500656744.jpg" data-post-id="16439" data-slide-num="5" data-slide-title="Places That Have Banned Justin Bieber: Passage club in Vienna, Austria" data-slide-url="https://www.nickiswift.com/16439/places-banned-justin-bieber/slide/passage-club-in-vienna-austria/" height="438" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/passage-club-in-vienna-austria-1500656744.jpg&amp;raw" width="780"><span data-dcnode-id="153" instrument_node="">
</span></picture><span data-dcnode-id="151" instrument_node="">
</span><span class="gallery-image-credit" data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Getty Images</span></span><span data-dcnode-id="148" instrument_node=""> </span></div><span data-dcnode-id="146" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="133"><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="144"></p><p data-dcnode-id="139"><span data-dcnode-id="143" instrument_node="">Once again, during his 2013 Believe tour, Bieber visited a foreign country and left it worse than he found it. At the Passage club in Vienna, Austria, Bieber's bodyguards allegedly ran roughshod over fans and customers alike, destroying cameras and smashing cellphones. The club's manager, Joachim Bankel, kept it short and sweet during his subsequent interview with the Austrian Times: "</span><a data-dcnode-id="141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.huffingtonpost.com/2013/04/01/justin-bieber-banned-club_n_2992811.html" target="_blank"><span data-dcnode-id="142" instrument_node="">Justin Bieber is no longer welcome here</span></a><span data-dcnode-id="140" instrument_node="">."</span></p><span data-dcnode-id="138" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="137"></div><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="135"></p><span data-dcnode-id="134" instrument_node="">
</span></div><span data-dcnode-id="132" instrument_node="">
</span></div><span data-dcnode-id="130" instrument_node="">
</span><div class="news-article" data-dcnode-id="100"><span data-dcnode-id="129" instrument_node="">
</span><h2 class="" data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">Mayan ruins</span></h2><span data-dcnode-id="126" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="119" data-post-id="16439" data-slide-num="6"><span data-dcnode-id="125" instrument_node="">
</span><picture data-dcnode-id="121"><span data-dcnode-id="124" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="123" data-lazy-src="https://www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/mayan-ruins-1500656744.jpg" data-post-id="16439" data-slide-num="6" data-slide-title="Places That Have Banned Justin Bieber: Mayan ruins" data-slide-url="https://www.nickiswift.com/16439/places-banned-justin-bieber/slide/mayan-ruins/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="122" instrument_node="">
</span></picture><span data-dcnode-id="120" instrument_node="">
</span></div><span data-dcnode-id="118" instrument_node="">
</span><div class="columns-holder" data-dcnode-id="102"><span data-dcnode-id="117" instrument_node="">
</span><p data-dcnode-id="116"></p><p data-dcnode-id="108"><span data-dcnode-id="115" instrument_node="">While on vacation in Cancun, Mexico in January 2016, Bieber and his entourage decided to pay a visit to Mayan temple ruins in Tulum. What could go wrong? A lot. According to </span><em data-dcnode-id="112"><a data-dcnode-id="113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tmz.com/2016/01/08/justin-bieber-booted-mayan-ruins-mexico/" target="_blank"><span data-dcnode-id="114" instrument_node="">TMZ</span></a></em><span data-dcnode-id="111" instrument_node="">, the group arrived with open beer bottles, which immediately ticked off the staff, and then Bieber proceeded to climb the ruins...and drop his pants for everyone to see. Naturally, Bieber and his buddies were asked to leave. They eventually did, "but not before hurling insults at the staff," reported </span><em data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">TMZ.</span></em></p><span data-dcnode-id="107" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="106"></div><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="104"></p><span data-dcnode-id="103" instrument_node="">
</span></div><span data-dcnode-id="101" instrument_node="">
</span></div><span data-dcnode-id="99" instrument_node="">
</span><div class="news-article" data-dcnode-id="53"><span data-dcnode-id="98" instrument_node="">
</span><h2 class="" data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">China</span></h2><span data-dcnode-id="95" instrument_node="">
</span><div class="slide-key image-holder gallery-image-holder credit-image-wrap" data-dcnode-id="85" data-post-id="16439" data-slide-num="7"><span data-dcnode-id="94" instrument_node="">
</span><picture data-dcnode-id="90"><span data-dcnode-id="93" instrument_node="">
</span><img alt="" class="gallery-image lazyload" data-dcnode-id="92" data-lazy-src="https://www.nickiswift.com/img/gallery/places-that-have-banned-justin-bieber/china-1500656744.jpg" data-post-id="16439" data-slide-num="7" data-slide-title="Places That Have Banned Justin Bieber: China" data-slide-url="https://www.nickiswift.com/16439/places-banned-justin-bieber/slide/china-5/" height="439" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" width="780"><span data-dcnode-id="91" instrument_node="">
</span></picture><span data-dcnode-id="89" instrument_node="">
</span><span class="gallery-image-credit" data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">Getty Images</span></span><span data-dcnode-id="86" instrument_node=""> </span></div><span data-dcnode-id="84" instrument_node="">
</span><div class="columns-holder added-content" data-dcnode-id="55"><span data-dcnode-id="83" instrument_node="">
</span><p data-dcnode-id="82"></p><p data-dcnode-id="73"><span data-dcnode-id="81" instrument_node="">The Biebs' </span><a data-dcnode-id="79" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cnn.com/travel/article/justin-bieber-great-wall-of-china/index.html" target="_blank"><span data-dcnode-id="80" instrument_node="">behavior at the Great Wall of China</span></a><span data-dcnode-id="78" instrument_node="">&nbsp;may have been enough to get him booted from the country for good. </span><em data-dcnode-id="75"><a data-dcnode-id="76" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cnn.com/2017/07/21/asia/justin-bieber-banned-beijing/index.html" target="_blank"><span data-dcnode-id="77" instrument_node="">CNN</span></a></em><span data-dcnode-id="74" instrument_node="">&nbsp;reported that The Beijing Municipal Bureau of Culture has banned the "Sorry" singer from performing "on the mainland" in an attempt to "purify" the country's entertainment industry. "His series of misbehaviors while living abroad and during his performances in China has caused public resentment," said the bureau in a statement.</span></p><span data-dcnode-id="72" instrument_node="">
</span><div class="google-ad-placeholder between-p" data-ad-height="any" data-ad-pos="between-p" data-ad-width="any" data-dcnode-id="71"></div><span data-dcnode-id="70" instrument_node="">
</span><p data-dcnode-id="62"><span data-dcnode-id="69" instrument_node="">The reason for the ban was reportedly revealed after one Belieber asked the&nbsp;bureau's website why the Canadian wunderkind didn't make any mainland China stops during his 2016 Purpose tour. The bureau responded by referring to Bieber as </span><a data-dcnode-id="67" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//variety.com/2017/music/news/justin-bieber-banned-china-bad-behavior-1202502196/" target="_blank"><span data-dcnode-id="68" instrument_node="">"a controversial young foreign idol"</span></a><span data-dcnode-id="66" instrument_node=""> who has a record of </span><a data-dcnode-id="64" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//variety.com/2017/music/news/justin-bieber-banned-china-bad-behavior-1202502196/" target="_blank"><span data-dcnode-id="65" instrument_node="">"bad behavior"</span></a><span data-dcnode-id="63" instrument_node=""> on and off stage.</span></p><span data-dcnode-id="61" instrument_node="">
</span><p data-dcnode-id="59"><span data-dcnode-id="60" instrument_node="">Great. We can't wait for his protest concert in Tibet where he'll probably get to meet the Dalai Lama and be amazed that he isn't a farmyard animal.</span></p><span data-dcnode-id="58" instrument_node="">
</span><p data-dcnode-id="57"></p><span data-dcnode-id="56" instrument_node="">
