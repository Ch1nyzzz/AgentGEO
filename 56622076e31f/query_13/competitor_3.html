</span><span data-dcnode-id="1852" id="freeTextauthor166568" style="display:none"><span data-dcnode-id="1871" instrument_node="">Walter Williams is an economist, commentator, columnist, and academician known for his classical liberal/libertarian views. </span><br data-dcnode-id="1870"><br data-dcnode-id="1869"><span data-dcnode-id="1868" instrument_node="">Dr. Walter E. Williams holds a B.A. in economics from California State University, Los Angeles, and M.A. and Ph.D. degrees in economics from UCLA. He also holds a Doctor of Humane Letters from Virginia Union University and Grove City College, Doctor of Laws from Washington and Jefferson College and Doctor Honoris Causa en Ciencias Sociales from Universidad Francisco Marroquin, in Guatemala, where he is also Professor Honorario. </span><br data-dcnode-id="1867"><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node="">Dr. Williams has served on the faculty of George Mason University as John M. Olin Distinguished Professor of Economics, since 1980; from 1995 to 2001, he served as department chairman. He has also served on the faculties of Los Angeles City College, California State University Los Angeles, and Temple University in Philadelphia, and Grove City College.</span><br data-dcnode-id="1864"><br data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">Dr. Williams is the author of many books and over 150 publications which have appeared in scholarly journals such as Economic Inquiry, American Economic Review, Georgia Law Review, Journal of Labor Economics, Social Science Quarterly, and Cornell Journal of Law and Public Policy and popular publications such as Newsweek, Ideas on Liberty, National Review, Reader's Digest, Cato Journal, and Policy Review. </span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">He has made scores of radio and television appearances which include “Nightline,” “Firing Line,” “Face the Nation,” Milton Friedman’s “Free To Choose,” “Crossfire,” “MacNeil/Lehrer,” “Wall Street Week” and was a regular commentator for “Nightly Business Report.” He is also occasional substitute host for the “Rush Limbaugh” show. In addition Dr. Williams writes a nationally syndicated weekly column that is carried by approximately 140 newspapers and several web sites. </span><br data-dcnode-id="1859"><br data-dcnode-id="1858"><span data-dcnode-id="1857" instrument_node="">Dr. Williams serves as Emeritus Trustee at Grove City College and the Reason Foundation. He serves as Director for the Chase Foundation and Americans for Prosperity. He also serves on numerous advisory boards including: Cato Institute, Landmark Legal Foundation, Institute of Economic Affairs, and Heritage Foundation. Dr. Williams serves as Distinguished Affiliated Scholar at the Mercatus Center at George Mason University. </span><br data-dcnode-id="1856"><br data-dcnode-id="1855"><span data-dcnode-id="1854" instrument_node="">Dr. Williams has received numerous fellowships and awards including: the 2017 Bradley Prize from the Lynde and Harry Bradley Foudation, the Fund for American Studies David Jones Lifetime Achievement Award, Foundation for Economic Education Adam Smith Award, Hoover Institution National Fellow, Ford Foundation Fellow, Valley Forge Freedoms Foundation George Washington Medal of Honor, Veterans of Foreign Wars U.S. News Media Award, Adam Smith Award, California State University Distinguished Alumnus Award, George Mason University Faculty Member of the Year, and Alpha Kappa Psi Award. </span><br data-dcnode-id="1853"></span><span data-dcnode-id="1851" instrument_node="">

</span><div class="clearFloats bigBox" data-dcnode-id="240"><div class="h2Container gradientHeaderContainer" data-dcnode-id="366"><h2 class="brownBackground" data-dcnode-id="367"><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/quotes/166568.Walter_Williams"><span data-dcnode-id="369" instrument_node="">Quotes by Walter Williams</span></a></h2></div><div class="bigBoxBody" data-dcnode-id="242"><div class="bigBoxContent containerWithHeaderContent" data-dcnode-id="243"><span data-dcnode-id="365" instrument_node="">
</span><div class="quote mediumText" data-dcnode-id="335"><span data-dcnode-id="364" instrument_node="">
</span><div class="quoteDetails" data-dcnode-id="345"><span data-dcnode-id="363" instrument_node="">
</span><div class="quoteText" data-dcnode-id="356"><span data-dcnode-id="362" instrument_node="">

  </span><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node="">  ―
  </span><span class="authorOrTitle" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">
    Walter Williams
  </span></span><span data-dcnode-id="357" instrument_node="">
</span></div><span data-dcnode-id="355" instrument_node="">

      “Maybe your college professor taught that the legacy of colonialism explains Third World poverty. That’s nonsense as well. Canada was a colony. So were Australia, New Zealand and Hong Kong. In fact, the richest country in the world, the United States, was once a colony. By contrast, Ethiopia, Liberia, Tibet, Sikkim, Nepal and Bhutan were never colonies, but they are home to the world’s poorest people.”

</span><div class="quoteText" data-dcnode-id="273"><span data-dcnode-id="279" instrument_node="">
      “I've hailed taxis in downtown Washington, D.C., at night, only to watch the driver pass me up and pick up a white passenger down the street. As often as not, the driver was black. Was the driver a racist? Or was he using my skin color as a proxy for an undesirable destination such as a high-crime neighborhood or as a proxy for the probability of being robbed? He was racially profiling me, but he was wrong in my case. It is never pleasant to be a victim of racial profiling, but whom should I blame: the taxi driver who's not God and is simply doing what he can to protect himself? Or should I blame black thugs who prey on taxi drivers, making them leery about picking up black customers at night?”
  </span><br data-dcnode-id="278"><span data-dcnode-id="277" instrument_node="">  ―
  </span><span class="authorOrTitle" data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">
