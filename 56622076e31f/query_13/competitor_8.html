</span><p class="card-text" data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node=""> The All India War Memorial, popularly known as the India Gate, is a war memorial located in New Delhi. It is dedicated to the 82,000 soldiers, both Indian and British, who died during the First World War and the Third Anglo-Afghan War. The Amar Jawan Jyoti is the burning structure, right underneath the archway, which symbolizes the eternal, immortal soldiers of India. </span></p><span data-dcnode-id="4494" instrument_node="">

</span><p class="card-text" data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node=""> The magnificent City Palace in Jaipur is one of the most famous tourist attractions in the city. Built by Maharaja Sawai Jai Singh during the years 1729 to&nbsp;1732, the vast complex of the palace occupied one-seventh of the walled city. In fact, it was once the seat of the Maharaja of Jaipur. Planned with precise intricacies, the palace is divided into a series of courtyards, buildings and gardens including the Chandra Mahal and the Mubarak Mahal. The museum showcases various unique handcrafted products and other things that belong to the royal heritage of the City Palace. The historical structure is located in the old part of Jaipur city and can be easily located and reached by any means of transport. </span></p><span data-dcnode-id="2794" instrument_node="">

</span><p class="card-text" data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node=""> Jaisalmer Fort, nestled on the golden sands of Thar Desert, is not just a fort but a mini-town with houses, temples, shops, and restaurants. A UNESCO World Heritage Site, it falls under the category of 'Hill Forts of India'.  Built in 1156, Jaisalmer Fort gets its name from the former Bhati Rajput ruler Rao Jaisal. More than three thousand people live within the fort walls with multiple entrance gates on the path up top, the last of which directs you to the popular public square named Dashera Chowk. The fort stands at an impressive height of 250 ft. and is surrounded by a 30 ft. tall walls.  </span></p><span data-dcnode-id="2710" instrument_node="">

</span><p class="card-text" data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node=""> The Leh Palace, also known as 'Lhachen Palkhar' is one of the most historically rich edifices that can be found in the country and is located in the breathtakingly beautiful Kashmir, in the town of Leh in India. This grand structure was built in the 17th century by King Sengge Namgyal as a royal palace, and the King and his family were the former residents of the majestic mansion. The Leh Palace is also one of the tallest buildings of its time with nine stories in all, and offers marvellous panoramic views of the entire town of Leh, as well as of the Stok Kangri and Zanskar mountains of the mighty Himalayan ranges, thereby giving the palace a strategic position. </span></p><span data-dcnode-id="2626" instrument_node="">

</span><p class="card-text" data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node=""> Located near the famous Golden Temple of Amritsar, Jallianwala Bagh is a public garden that also houses a memorial&nbsp;to commemorate the massacre of peaceful celebrators by the British forces.&nbsp;Spread over 6.5 acres of land, Jallianwala Bagh is associated with one of the saddest days in Indian History when thousands of innocent people were killed on the orders of General Dyer as they gathered for a peaceful celebration of Baisakhi. Established by the government of India in 1951, the massacre memorial was inaugurated by Dr Rajendra Prasad on 13th April 1961.&nbsp; </span></p><span data-dcnode-id="2542" instrument_node="">

</span><p class="card-text" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node=""> Located at a distance of 22 km from Lahore and 28 km from Amritsar, Wagah Border marks the boundaries between Indian and Pakistani borders. It runs along the Grand Trunk Road between Amritsar in Punjab, India, and Punjab in Lahore, Pakistan. People from all over the country visit this place to witness the Beating Retreat Ceremony that is held every day before sunset. This ceremony includes the closing of the international gates and lowering the flags of both countries. It is a spectacle to be witnessed and is an occasion where the heart of every Indian is filled with pride and enthusiasm. The flag ceremony has been conducted by the Indian Border Security Force and Pakistan Rangers since 1959. </span></p><span data-dcnode-id="2458" instrument_node="">

</span><p class="card-text" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node=""> Nahargarh Fort is located in the Pink City of Jaipur and is one of the many&nbsp;countless palaces and beautiful historic buildings that speak of the magnificent and rich history of this city.&nbsp;Embellished with delicate carvings and stonework, the Nahargarh Fort is an impregnable&nbsp;structure, that together with its two neighbouring forts - Amer and Jaigarh, once stood as the strong defence of Jaipur city.&nbsp;The Fort was built by Maharaja Sawai Jai Singh II in the year 1734 as a retreat. With some breathtaking views of the city, the Nahargarh Fort is known for its extended wall that connects it to Jaigarh Fort. </span></p><span data-dcnode-id="2374" instrument_node="">

</span><p class="card-text" data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node=""> Mehrangarh, also known as Mehran Fort was built by Rao Jodha in 1459 in Jodhpur, is one of the largest forts in the country. It is situated at the top of a 410 feet elevated hill and guarded by massive walls. One of the most easily recognisable forts in Jodhpur, it has appeared in many Hollywood and Bollywood productions such as The Lion King, The Dark Knight Rises, and the more recent - Thugs of Hindostan. The entrance of the fort, atop a hill, is majestic and has seven gates. These are called Victory Gate, Fateh Gate, Gopal Gate, Bhairon Gate, Dedh Kamgra Gate, Marti Gate and finally Loha Gate.  </span></p><span data-dcnode-id="2314" instrument_node="">

</span><p class="card-text" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node=""> Famous for the historical ruins and the ghost stories, Bhangarh has been regarded as the most haunted place in the country. It is located on the way between Jaipur and Delhi. The Bhangarh Fort is a 17th Century fort built in the Alwar district of Rajasthan. It was built by one of the Navratans of Akbar's court, Man Singh I for his grandson Madho Singh I. It was named by Madho Singh after his grandfather Man Singh or Bhan Singh.  </span></p><span data-dcnode-id="2230" instrument_node="">

</span><p class="card-text" data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node=""> Kumbhalgarh Fort is one of the five hill forts of Rajasthan that were declared the UNESCO world heritage site in 2013. It is situated in Rajsamand district of Rajasthan and lies 82 kilometres northwest of the city of Udaipur. Constructed on the foothills of Aravalli ranges, it is surrounded by thirteen hill peaks of the ranges and is perched at an elevation of 1,914 m. The magnificent fort is situated in the middle of a forest which has been turned into a wildlife sanctuary. It is the second largest and the most important Mewar fort of Rajasthan after Chittorgarh palace. </span></p><span data-dcnode-id="2146" instrument_node="">

</span><p class="card-text" data-dcnode-id="2042"><span data-dcnode-id="2045" instrument_node=""> Qila Mubarak is a monument of great historical importance and is situated in the city of Bathinda in Punjab. The origin of the fort can be traced back to the period between 90 and 110 AD, and the Qila Mubarak is the oldest surviving fort in India,  known to historians.&nbsp;This majestic piece of architecture merges perfectly with the surrounding desert area and looks subtle and elegant. This is perhaps why the Qila Mubarak continues to be a significant tourist attraction in Punjab till date. </span><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node=""> </span></p><span data-dcnode-id="2041" instrument_node="">

</span><p class="card-text" data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node=""> Also known as the National Museum of India, the National Museum in New Delhi is one the largest museums in India, situated on the corner of the Janpath and Maulana Azad Road. Established in 1949, the blueprints of the majestic repository were prepared by the Gwyer Committee set up by the Government of India in 1946. Today, the museum boasts of possessing a whopping 200,000 artworks, both Indian and foreign, and is maintained by the Ministry of Culture, Department of India. Covering an extensive range of products from the prehistoric times to modern works of art, the museum traces the rich cultural heritage of nations across the world, from over 5000 years ago. </span></p><span data-dcnode-id="1985" instrument_node="">
