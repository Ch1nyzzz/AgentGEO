Mumbai is the capital city of the Indian state of Maharashtra. About 149 km from Pune, it is the wealthiest city in India with highest number of billionaires and is also one of the must include places in </span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/maharashtra" target="_blank"><span data-dcnode-id="6875" instrument_node="">Maharashtra tour packages</span></a><span data-dcnode-id="6873" instrument_node="">.</span><br data-dcnode-id="6872"><br data-dcnode-id="6871"><span data-dcnode-id="6870" instrument_node="">Mumbai is more affectionately known as the city of dreams. The city is a collection of 7 islands and was named after the goddess Mumbadevi. </span><a data-dcnode-id="6868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/mumbai/gateway-of-india" target="_blank"><span data-dcnode-id="6869" instrument_node="">Gateway of India</span></a><span data-dcnode-id="6867" instrument_node="">, Chhatrapati Shivaji Terminus (Victoria Terminus), Elephanta Caves, Kanheri Caves, Haji Ali Darga, Siddivinayaka Temple, Juhu Beach, Marve Beach, Marine Drive, Chowpatty, Film City, Mani Bhavan Gandhi Sangrahalaya, Babulnath Temple and Mount Mary Church are some of the popular places to visit in Mumbai as part of </span><a data-dcnode-id="6865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/mumbai" target="_blank"><span data-dcnode-id="6866" instrument_node="">Mumbai tour packages</span></a><span data-dcnode-id="6864" instrument_node="">. </span><br data-dcnode-id="6863"><br data-dcnode-id="6862"><span data-dcnode-id="6861" instrument_node="">Mumbai is the entertainment capital as well as financial powerhouse of India. The city is also famous for fashionable clothes and imitation jewellery. Mumbai is the perfect stopover point because this city is the gateway to a plethora of tourist destinations - you can choose from ancient temples, hill stations, and historic forts for a quick weekend getaway. Alibaug, </span><a data-dcnode-id="6859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/lonavala" target="_blank"><span data-dcnode-id="6860" instrument_node="">Lonavala</span></a><span data-dcnode-id="6858" instrument_node="">, Mahabaleshwar, and Panchgani.

Ajanta Caves are one of the oldest UNESCO World </span><a data-dcnode-id="6782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/heritage" target="_blank"><span data-dcnode-id="6783" instrument_node="">heritage sites in Maharashtra</span></a><span data-dcnode-id="6781" instrument_node="">, and among the most prominent </span><a data-dcnode-id="6779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/best" target="_blank"><span data-dcnode-id="6780" instrument_node="">Maharashtra tourist places</span></a><span data-dcnode-id="6778" instrument_node="">. One of the most visited ancient monuments in India, these caves are situated about 98 km from Aurangabad, 326 km from Pune, and 443 km from Mumbai.</span><br data-dcnode-id="6777"><br data-dcnode-id="6776"><span data-dcnode-id="6775" instrument_node="">Carved between 2nd Century BC and 6th Century AD, Ajanta Caves are excavated in a horseshoe-shaped bend of rock surface nearly 76 m in height overlooking the Waghur River. The complex consists of 29 rock-cut cave monuments built during the Satavahana period and the Vakataka period. The caves at Ajanta are famous for beautiful mural paintings and sculptures that depict tales of Jatakas. The world-famous paintings at Ajanta also fall into two broad phases. The earliest is noticed in the form of fragmentary specimens in Cave 9 &amp; 10, which are among the must-visit places as part of </span><a data-dcnode-id="6773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/ajanta-caves" target="_blank"><span data-dcnode-id="6774" instrument_node="">Ajanta holiday packages</span></a><span data-dcnode-id="6772" instrument_node="">. The second phase of paintings started around the 5th - 6th centuries and the specimen of these exemplary paintings could be noticed in Cave 1, 2, 16, and 17. </span><br data-dcnode-id="6771"><br data-dcnode-id="6770"><span data-dcnode-id="6769" instrument_node="">Various incidents from the life of Gautama Buddha and the Jataka Tales are represented and recreated on the walls of these caves. It can be visited along with </span><a data-dcnode-id="6767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/aurangabad" target="_blank"><span data-dcnode-id="6768" instrument_node="">Aurangabad tour packages</span></a><span data-dcnode-id="6766" instrument_node="">.
</span></p><span data-dcnode-id="6764" instrument_node="">

An UNESCO World Heritage Site, Ellora Caves are the most visited places of </span><a data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/heritage" target="_blank"><span data-dcnode-id="6691" instrument_node="">heritage in Maharashtra</span></a><span data-dcnode-id="6689" instrument_node="">, and among the must include places in </span><a data-dcnode-id="6687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/maharashtra" target="_blank"><span data-dcnode-id="6688" instrument_node="">Maharashtra tour packages</span></a><span data-dcnode-id="6686" instrument_node="">. Situated about 28 km from Aurangabad, 253 km from Pune, and 344 km from Mumbai. </span><br data-dcnode-id="6685"><br data-dcnode-id="6684"><span data-dcnode-id="6683" instrument_node="">Ellora Caves is an impressive complex of Buddhist, Hindu, and Jain Cave temples carved out of the vertical face of the Charanandri hills between the 6th and 10th centuries AD. Ellora is one of the prominent heritage </span><a data-dcnode-id="6681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/mumbai/200kms" target="_blank"><span data-dcnode-id="6682" instrument_node="">places to visit near Mumbai</span></a><span data-dcnode-id="6680" instrument_node="">. The caves have a slightly less dramatic setting than those at Ajanta, but more exquisite sculptures. The cave complex comprises 34 caves includes 12 Buddhist, 17 Hindu, and 5 Jain Caves. The central attraction at Ellora is </span><a data-dcnode-id="6678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/ellora-caves/kailasa-temple-kailasanath-temple-cave-16" target="_blank"><span data-dcnode-id="6679" instrument_node="">Kailash Temple (Cave 16)</span></a><span data-dcnode-id="6677" instrument_node="">, which is the most remarkable. </span><br data-dcnode-id="6676"><br data-dcnode-id="6675"><span data-dcnode-id="6674" instrument_node="">Every year Ajanta-Ellora Festival is organized in Aurangabad to pay tribute to the legendary caves of Ellora, Ajanta, and other historical monuments in the region. Earlier the venue for this festival was Kailasa Temple of Ellora Caves but it has now been shifted to Soneri Mahal, among the must include places in </span><a data-dcnode-id="6672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/aurangabad" target="_blank"><span data-dcnode-id="6673" instrument_node="">Aurangabad tour packages</span></a><span data-dcnode-id="6671" instrument_node="">.

Aurangabad is a historical city and also the tourism capital of Maharashtra. Situated about 232 km from Pune, and 350 km from Mumbai, it is one of the top </span><a data-dcnode-id="6493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/pune/200kms" target="_blank"><span data-dcnode-id="6494" instrument_node="">places to visit near Pune</span></a><span data-dcnode-id="6492" instrument_node=""> and also one of the top places to visit as part of </span><a data-dcnode-id="6490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/maharashtra" target="_blank"><span data-dcnode-id="6491" instrument_node="">Maharashtra tour packages</span></a><span data-dcnode-id="6489" instrument_node="">.</span><br data-dcnode-id="6488"><br data-dcnode-id="6487"><span data-dcnode-id="6486" instrument_node="">Named after the Mughal emperor, Aurangzeb, Aurangabad is a tourist hub of Maharashtra. The city is surrounded by many historical monuments, including the world-famous Ajanta - </span><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/ellora-caves" target="_blank"><span data-dcnode-id="6485" instrument_node="">Ellora Caves</span></a><span data-dcnode-id="6483" instrument_node="">, which are UNESCO World Heritage Sites. Daulatabad Fort, Jama Masjid, Panchakki, and the 52 gates are the important tourist attractions to visit as part of </span><a data-dcnode-id="6481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/aurangabad" target="_blank"><span data-dcnode-id="6482" instrument_node="">Aurangabad tour packages</span></a><span data-dcnode-id="6480" instrument_node="">. There are also many temples, mosques, museums, and even some gardens to explore.</span><br data-dcnode-id="6479"><br data-dcnode-id="6478"><span data-dcnode-id="6477" instrument_node="">The city is also home to the famous </span><a data-dcnode-id="6475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/aurangabad/bibi-ka-maqbara" target="_blank"><span data-dcnode-id="6476" instrument_node="">Bibi ka Maqbara</span></a><span data-dcnode-id="6474" instrument_node="">, a beautiful mausoleum of Rabia-ul-Daurani alias Dilras Banu Begum, the wife of Mughal Emperor Aurangzeb. Aurangzeb's son, Prince Azam Shah built the mausoleum between 1651 AD and 1661 AD in the memory of his mother. This mausoleum is a replica of the world-famous Taj Mahal. Also known as Mini Taj, the mausoleum is far less ornamental than the Taj Mahal in Agra.

Situated at the confluence of Mula and Mutha Rivers, Pune is one of the most popular cities in India and the second-largest city in Maharashtra. About 161 km from Mumbai, Pune is one of the must include places in </span><a data-dcnode-id="6394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/maharashtra" target="_blank"><span data-dcnode-id="6395" instrument_node="">Maharashtra tour packages</span></a><span data-dcnode-id="6393" instrument_node="">.</span><br data-dcnode-id="6392"><br data-dcnode-id="6391"><span data-dcnode-id="6390" instrument_node="">Pune boasts of several historical monuments from the Maratha period and many places of tourist interest. </span><a data-dcnode-id="6388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/pune/shaniwar-wada-fort" target="_blank"><span data-dcnode-id="6389" instrument_node="">Shaniwar Wada</span></a><span data-dcnode-id="6387" instrument_node="">, Osho Ashram, Dagdusheth Ganapathi, Pataleshwar Cave Temple, Rajiv Gandhi Zoological Park, Shinde Chhatri, Raja Dinkar Kelkar Museum, National War Museum, Bund Garden, Saras Baug, Parvati Hill, Aga Khan Palace, Rajgad Fort, and Darshan Museum are the some of the prominent attractions one must visit as part of </span><a data-dcnode-id="6385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/pune" target="_blank"><span data-dcnode-id="6386" instrument_node="">Pune tour packages</span></a><span data-dcnode-id="6384" instrument_node="">.</span><br data-dcnode-id="6383"><br data-dcnode-id="6382"><span data-dcnode-id="6381" instrument_node="">Also, Pune is considered as the cultural capital of Maharashtra and is renowned for its cultural activities such as classical music, spirituality, theater, sports, and literature. The city is also known for its IT, manufacturing and automobile industries, and prestigious educational institutions. Pune is also one of the fastest-growing cities in the Asia-Pacific region. The 'Mercer 2015 Quality of Living' rankings evaluated local living conditions in more than 440 cities around the world where Pune ranked at 145, second in India after </span><a data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/telangana/hyderabad" target="_blank"><span data-dcnode-id="6380" instrument_node="">Hyderabad</span></a><span data-dcnode-id="6378" instrument_node=""> (138).

At a distance of 16 km from Aurangabad Railway Station, Daulatabad is an ancient hill fort situated on the way to Ellora Caves from Aurangabad in Maharashtra. It is one of the best-preserved places of </span><a data-dcnode-id="6111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/heritage" target="_blank"><span data-dcnode-id="6112" instrument_node="">heritage in Maharashtra</span></a><span data-dcnode-id="6110" instrument_node="">, and also one of the best </span><a data-dcnode-id="6108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/aurangabad/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="6109" instrument_node="">Aurangabad tourist places</span></a><span data-dcnode-id="6107" instrument_node="">. </span><br data-dcnode-id="6106"><br data-dcnode-id="6105"><span data-dcnode-id="6104" instrument_node="">The historical triangular fort of Daulatabad was built by Yadava king Bhillama V in 1187 AD. It is one of the best historical </span><a data-dcnode-id="6102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/pune/200kms" target="_blank"><span data-dcnode-id="6103" instrument_node="">places near Pune</span></a><span data-dcnode-id="6101" instrument_node="">. The city was then called 'Deogiri', meaning the hill of gods. Daulatabad or 'the abode of wealth' was the name given by Muhammad-bin-Tughlaq when he made his capital here in 1327 AD. The region and the fort passed on into the hands of Bahamani rulers under Hasan Gangu in 1347 AD and Nizam Shahis of Ahmednagar in 1499 AD. Daulatabad became the capital of the Nizam Shahi dynasty in 1607 AD. The fort passed several hands, captured and re-captured by the Mughals, Marathas, Peshwas, and finally placed under the control of the Nizams of Hyderabad in 1724 AD till independence. It is one of the most visited places as part of </span><a data-dcnode-id="6099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/aurangabad" target="_blank"><span data-dcnode-id="6100" instrument_node="">Aurangabad tour packages</span></a><span data-dcnode-id="6098" instrument_node="">.</span><br data-dcnode-id="6097"><br data-dcnode-id="6096"><span data-dcnode-id="6095" instrument_node="">Daulatabad Fort was one of the most powerful forts during the medieval period. Built on a 200 m high conical hill, the fort was defended by a moat and a glacis. The fortifications ...

At a distance of 32 km from Pune Junction, Sinhagad or Sinhagarh means the Lion Fort, is a fortress located southwest of Pune City. Sinhagad Fort is one of the popular places of </span><a data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/trekking-adventure" target="_blank"><span data-dcnode-id="5727" instrument_node="">trekking in Maharashtra</span></a><span data-dcnode-id="5725" instrument_node="">, and among the must include places in </span><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/pune" target="_blank"><span data-dcnode-id="5724" instrument_node="">Pune packages</span></a><br data-dcnode-id="5722"><br data-dcnode-id="5721"><span data-dcnode-id="5720" instrument_node="">Previously called Kondana, the fort has been the site of many important battles, most notably the Battle of Sinhagad in 1671 CE. It is one of the top </span><a data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/pune/200kms" target="_blank"><span data-dcnode-id="5719" instrument_node="">places to visit near Pune</span></a><span data-dcnode-id="5717" instrument_node=""> City. According to history, the fort was built 2,000 years ago and it is said that the name Kondana was derived from sage Kaundinya. Mohammed bin Tughalak captured the fort from the Koli tribal chieftain, Nag Naik in 1340 CE. And in 1496 CE, Malik Ahmad, the founder of the Nizam Shahi dynasty took control of the fort. </span><br data-dcnode-id="5716"><br data-dcnode-id="5715"><span data-dcnode-id="5714" instrument_node="">Nearly 200 years later, the Maratha leader Shahaji Bhonsale captured the fort. In 1647 CE, Shivaji held the stronghold and renamed it Sinhagad. In 1665 CE, as per the Treaty of Purandar, Shivaji handed over Sinhagad to the Mughals and again captured it in 1670 CE, under the direction of Tanaji who was Shivaji's favorite general. Aurangzeb laid siege to Sinhagad in 1701- 03 CE, but could not hold it for long. Finally the British seized the fort from the Marathas in 1818 AD. The fort was later used as a retreat for many European residents of Pune. </span><br data-dcnode-id="5713"><br data-dcnode-id="5712"><span data-dcnode-id="5711" instrument_node="">Counted as one of the ...

At a distance of 5 km from Lohagad Fort, 15 km from Lonavala, 71 km from Pune &amp; 119 km from Mumbai, Bhaja Caves are one of the popular Buddhist caves of Hinayana faith in Maharashtra. These caves are one of the top </span><a data-dcnode-id="5635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/lonavala/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="5636" instrument_node="">places to visit in Lonavala</span></a><span data-dcnode-id="5634" instrument_node=""> and among the well known tourist places to visit near Pune &amp; </span><a data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/mumbai" target="_blank"><span data-dcnode-id="5633" instrument_node="">Mumbai</span></a><span data-dcnode-id="5631" instrument_node="">. These caves are well known historical places near </span><a data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/pune" target="_blank"><span data-dcnode-id="5630" instrument_node="">Pune</span></a><span data-dcnode-id="5628" instrument_node=""> protected as National Monument by the Archaeological Survey of India.</span><br data-dcnode-id="5627"><br data-dcnode-id="5626"><span data-dcnode-id="5625" instrument_node="">Bhaja Caves or Bhaje caves are a group of 22 rock-cut caves dating back to the 2nd century BC. The caves are 400 feet above the village of Bhaja on an ancient trade route, which extends from the eastern side of the Arabian Sea towards the Deccan.</span><br data-dcnode-id="5624"><br data-dcnode-id="5623"><span data-dcnode-id="5622" instrument_node="">The Bhaja Caves are similar to the Karla Caves in style and architectural designs. The most prominent among the excavations is the chaityagriha (Cave 12). The chaityagriha is considered to be the earliest of its kind. It consists of a large apsidal hall and is divided into a central nave and side aisles by 27 pillars. The ceiling of the nave is vaulted and original wooden beams are fixed. Chaitya contains stupa at its far end with a hole in the top for wooden umbrella.</span><br data-dcnode-id="5621"><br data-dcnode-id="5620"><span data-dcnode-id="5619" instrument_node="">Cave 18 is a monastery and consists of a rectangular hall with a front pillared verandah. Depictions of the Sun God Surya and Lord Indra are present ...

At a distance of 20 km from Mahabaleshwar, 140 km from Pune &amp; 221 km from Mumbai, Pratapgad, also known as Pratapgarh, is a large hill fort located in the Satara district of Maharashtra. It is one of the best heritage </span><a data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/mumbai/200kms" target="_blank"><span data-dcnode-id="5540" instrument_node="">places to visit near Mumbai</span></a><span data-dcnode-id="5538" instrument_node="">, and among the popular attractions not to miss as part of </span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/mahabaleshwar" target="_blank"><span data-dcnode-id="5537" instrument_node="">Mahabaleshwar packages</span></a><span data-dcnode-id="5535" instrument_node="">.</span><br data-dcnode-id="5534"><br data-dcnode-id="5533"><span data-dcnode-id="5532" instrument_node="">The fort lies at an altitude of 1080 m and is built on a spur that overlooks the road between the villages of Par and Kinesvar. Maratha king Shivaji Maharaj had commissioned Moropant Pingle, his prime minister, to commence the construction of this fort to defend Nira and the Koyna River banks, and also to guard the Par pass. It is one of the most scenic </span><a data-dcnode-id="5530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/mahabaleshwar/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="5531" instrument_node="">places to visit in Mahabaleshwar</span></a><span data-dcnode-id="5529" instrument_node="">. The construction of the fortress was completed in the year 1656. The fort stands as the witness of the historic Battle of Pratapgarh between Shivaji and Afzal Khan, the commander of the Bijapur Sultanate, on 10th November 1659. In 1818, the Maratha forces had to surrender the Pratapgad Fort after losing the third Anglo-Maratha War.</span><br data-dcnode-id="5528"><br data-dcnode-id="5527"><span data-dcnode-id="5526" instrument_node="">After the Battle of Pratapgad, the Afzal tower was constructed outside the fort as a lookout for enemies. It is said that Afzal Khan's head is buried under the Afzal tower which is also known as Afzal Buruj. Afzal Khan's tomb is situated to the northwest ...

At a distance of 5 km from Korlai, 18 km from Alibaug and 15 km from Kashid, Revdanda Fort is an ancient Portuguese fort located at Revdanda in Raigad district of Maharashtra. The fort is located at the mouth of the Kundalika River.</span><br data-dcnode-id="5447"><br data-dcnode-id="5446"><span data-dcnode-id="5445" instrument_node="">Revdanda Fort, also known as Revdanda Aagarkot, was built by Portuguese Captain Soj in 1558 CE. In 1740 CE, Revdanda along with the Korlai Fort came under Maratha kingdom as per the treaty signed by the Portuguese. Angres defeated the fort in 1817 CE but it came under the British Raj in 1818 AD.</span><br data-dcnode-id="5444"><br data-dcnode-id="5443"><span data-dcnode-id="5442" instrument_node="">The periphery of the fort is around 5 km. The entire fortification has two main doors one from north and the other from south. Of which the northern gate was for land connection and the southern gate was used as a passage to the sea. This route opens to the main sea through the Revdanda creek. Portuguese built a dock over here which had become non-existent over time. The north and south gate is connected directly by a long road made of stones. Now, only the western part of the compound has some relics of the ancient fort. The remaining portion has eventually become the Revdanda village with houses and patches of farmlands. </span><br data-dcnode-id="5441"><br data-dcnode-id="5440"><span data-dcnode-id="5439" instrument_node="">The fort has a 4 storey tower and a couple of cannons within its walls. There is an old passage beneath the principle walls which is presently blocked. Revdanda had a chapel where St Francis Xaviers delivered one of his earliest sermons in the Indian subcontinent. Revdanda was also the first place in India where Afanasy ...

At a distance of 8 km from Nashik Central Bus Station, Pandavleni Caves or Trirashmi Caves are the ancient rock cut caves situated on Trirashmi Hills to the south of Nashik. The location of the caves is a holy Buddhist site in Maharashtra and also one of the popular places to visit in Nashik.</span><br data-dcnode-id="5364"><br data-dcnode-id="5363"><span data-dcnode-id="5362" instrument_node="">Pandavleni Caves are a group of 24 caves carved between the 3rd century BC and the 2nd century AD, representing the Hinayana Buddhism and has nothing to do with the characters of Mahabharata (the Pandavas).These caves were built by the rulers of that time like Satavahanas and Kshaharatas for Hinayana Buddhist monks. More ancient name of caves is Trirashmi Caves where the root 'Trirashmi' means 'triple royal'.</span><br data-dcnode-id="5361"><br data-dcnode-id="5360"><span data-dcnode-id="5359" instrument_node="">Most of the caves are Viharas except for the 18th cave which is a Chaitya. Caves 3, 10, 18 and 20 are the most significant and fascinating caves among the 24 caves which are noted for their magnificent sculptures. Cave 3 has a large Vihara with fascinating sculptures. Cave 10 is also a Vihara but it is much older and finer than Cave 3. It is believed to be as old as the Karla Caves near Lonavala. These caves houses shrines, cisterns, rare inscription, carved figures of Buddha and Bodhisattva, along with icons of some of the Jain Teerthankaras like Vrishabhdeo, Ambikadevi, Veer Manibhadraji etc. The Chaitya (Cave 18) is well sculptured with an elaborate facade. </span><br data-dcnode-id="5358"><br data-dcnode-id="5357"><span data-dcnode-id="5356" instrument_node="">There are several inscriptions found in these caves. Inscriptions in caves 3, 11, 12, 13, 14, 15, 19 and ...

ighbouring forts from the Adilshahi ruler of Bijapur. In 1704 CE, the Mughal Emperor Aurangzeb captured the fort from the Marathas. However, the Marathas regained its control in 1705 CE. In 1713 CE, Shahu Maharaj handed over Rajmachi fort to Kanhoji Angre. Eventually in 1818 CE with the downfall of the Marathas, the British took over the Rajmachi Fort.</span><br data-dcnode-id="5262"><br data-dcnode-id="5261"><span data-dcnode-id="5260" instrument_node="">Rajmachi Fort consists of two citadels namely Shrivardhan and Manaranjan Forts. It is a very famous ...

At a distance of 3.5 km from Neral Railway Station,13 km from Matheran, 88 km from Mumbai &amp; 117 km from Pune, Peb Fort, also known as Vikatgad, is an ancient fort situated near Neral. This is one of the popular places of </span><a data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/best-trekking-adventure-places-near-mumbai" target="_blank"><span data-dcnode-id="5091" instrument_node="">trekking near Mumbai</span></a><span data-dcnode-id="5089" instrument_node="">, and among the must-visit places as part of </span><a data-dcnode-id="5087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/matheran" target="_blank"><span data-dcnode-id="5088" instrument_node="">Matheran Tour Packages</span></a><span data-dcnode-id="5086" instrument_node="">.</span><br data-dcnode-id="5085"><br data-dcnode-id="5084"><span data-dcnode-id="5083" instrument_node="">Situated at an altitude of 2100 feet, the fort derives its name from the Goddess Pebi at the base of the fort. The fort is also named Vikatgad for its supposed shape of the Elephant Headed God, Ganesh. Historical references clearly indicate that Shivaji Maharaj used the caves on the fort to store the grains. It is one of the popular </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/matheran/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="5082" instrument_node="">places to visit in Matheran</span></a><span data-dcnode-id="5080" instrument_node="">.</span><br data-dcnode-id="5079"><br data-dcnode-id="5078"><span data-dcnode-id="5077" instrument_node="">The fort is famous for its caves which are maintained by disciples of Swami Samartha and the meditation chambers carved out from the rock inside the mountain. To get inside the meditation chamber, one has to crawl through a narrow passage and then climb down into the meditation chamber. The chamber is very well maintained with tiles on the floor for people to sit and meditate. The fort also has a temple dedicated to Swami Samartha on the top and has the footwear or Padukas worn by the great saint kept on the top. The view of the entire Neral and Karjat region from the top is worth the climb. Another ...

o its north, ...

At a distance of 40 km from Matheran, 19 km from Karjat, 66 km from Mumbai &amp; 115 km from Pune, Irshalgad is a fortress located between Matheran and Panvel in Maharashtra. It is a twin fort to Prabalgad and among ideal weekend getaways near Mumbai. The area of the fort is not large but there are several water tanks cut from the rock.</span><br data-dcnode-id="4817"><br data-dcnode-id="4816"><span data-dcnode-id="4815" instrument_node="">Irshalgad pinnacle is accessible by an easy to moderate 3 km trek and it takes about 1.5 hours. The trek starts from Karja village which is about 11 km from Karjat Railway Station. From Karja village one can follow a well-defined path till Irshalwadi village. The path from Karja passes through a steep ridge and then tapers to an easy ascend till Irshalwadi. From the village one has to walk straight up to a small temple dedicated to a local deity. Take left from the temple, standing at this point one can see the Irshalgad peak on the right side. However one has to traverse from left to reach the base of the pinnacle. </span><br data-dcnode-id="4814"><br data-dcnode-id="4813"><span data-dcnode-id="4812" instrument_node="">There is a water tank on the route from the Irshal plateau to the peak. From there, visitors will reach the needle hole near the top through a simple rock-climbing route. To reach the top of the pinnacle, it is essential to have rock climbing equipment. From the top one can see the forts of Prabalgad, Matheran, Chanderi, Malang gad, Karnala and Manikgad.

At a distance of 18 km from Bamnoli, 56 km from Satara, 70 km from Mahabaleshwar and 82 km from </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/panchgani" target="_blank"><span data-dcnode-id="4733" instrument_node="">Panchgani</span></a><span data-dcnode-id="4731" instrument_node="">, Vasota Fort is an ancient hill fort situated at an altitude of 1171 m near Bamnoli in Satara district of Maharashtra. The fort is situated in the deep forests and valleys of Koyna Wildlife Sanctuary. It is one of the best places to visit in Satara and also one of the popular places of trekking in Maharashtra apart from being an ideal picnic spots near Pune for one day trip.</span><br data-dcnode-id="4730"><br data-dcnode-id="4729"><span data-dcnode-id="4728" instrument_node="">Situated on the banks of the Shivsagar Lake, Vasota Fort is surrounded by water on three sides. The Fort was built by King Bhojraj II of Shilhara dynasty in 1178-1193 AD. Chhatrapati Shivaji Maharaj captured the fort in 1655 AD and renamed it as Vyagragad. In 1818 AD along with other forts of Marathas this fort also came under British control.</span><br data-dcnode-id="4727"><br data-dcnode-id="4726"><span data-dcnode-id="4725" instrument_node="">Vasota Fort, now in ruins, is famous for its traditional Maharashtrian architectural style. The fort comprises of three main sections - Old Fort, New Fort and Nageshwar. The bastions of the fort are still in well condition. There are two temples on the fort, the Mahadev temple and the Nageshwar temple. The temple of Lord Hanuman is placed at the entrance. Babu Kada is a huge U shaped cliff lies next to the Vasota Fort. From this point one can view the Old Vasota Fort which is closed for trekkers due to the presence of wild animals. Nageshwar is a cave carved in the pinnacle with Mahadev temple inside. ...

At a distance of 26 km from Satara, Chandan - Vandan Forts are twin forts situated at Belmachi in Satara district of Maharashtra. Chandan - Vandan Forts are among the top Satara tourist places.</span><br data-dcnode-id="4646"><br data-dcnode-id="4645"><span data-dcnode-id="4644" instrument_node="">Chandan - Vandan Forts were built by king Bhoj II of Shilhara dynasty in late 12th century. Shivaji Maharaj won these forts from Adil Shah of Bijapur in 1673 CE along with Kalyangad, Sajjangad, and Ajinkyatara during the campaign of Satara. It was under the control of Marathas till 1689 CE after it passed in the hand of Moghuls. In 1707 CE, the fort was occupied by Marathas under Sahu Maharaj. </span><br data-dcnode-id="4643"><br data-dcnode-id="4642"><span data-dcnode-id="4641" instrument_node="">There are two bastions at the entrance gate of Chandan Fort which are presently in a half-demolished state. There is a banyan tree at the upper side of the entrance which is known as Panchvad, as it is comprised of five banyan trees. A temple of Lord Shiva is situated near the Banyan tree. The fort also houses an old mosque. An intact bastion can be seen at the north end of the fort with a Shivalinga and statue of lord Hanuman over the bastion. Three rooms without roof can be seen at the southern part of the fort. According to villagers, it was a storage room for ammunitions. There is a large quadrangular raised platform, commonly known as Sadar, at the center of the fort.</span><br data-dcnode-id="4640"><br data-dcnode-id="4639"><span data-dcnode-id="4638" instrument_node="">The Vandan Fort is in good condition. There are few rooms built near the gate. The southern part of the fort has a Dargah built using stone. There fort has two entrances. The first entrance is sturdy having ...

At a distance of 40 km from Sangli, and 61 km from Kolhapur, Sri Kopeshwar Temple is an ancient Hindu temple situated at Khidrapur village in the Kolhapur district of Maharashtra. Located at the border of Maharashtra and Karnataka, it is one of the ancient </span><a data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/pilgrimages" target="_blank"><span data-dcnode-id="4559" instrument_node="">temples in Maharashtra</span></a><span data-dcnode-id="4557" instrument_node="">, and among popular </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/kolhapur/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="4556" instrument_node="">places to visit near Kolhapur</span></a><span data-dcnode-id="4554" instrument_node="">.</span><br data-dcnode-id="4553"><br data-dcnode-id="4552"><span data-dcnode-id="4551" instrument_node="">Built on the banks of River Krishna, Kopeshwar Temple is dedicated to Lord Shiva, and is one of the must include places in </span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/kolhapur" target="_blank"><span data-dcnode-id="4550" instrument_node="">Kolhapur tour</span></a><span data-dcnode-id="4548" instrument_node="">. According to archaeologists, the construction of the temple began by Badami Chalukyas in the 7th century AD and remained incomplete for a long time. It was patronized by the Shilahara Kings during the 12th century. Lord Shiva has worshiped here in the form of a Shivalinga as well as a sculpture of his fierce form, Veerbhadra. Legend has it that Lord Shiva got angry when Sati sacrificed herself and he was then brought to this temple by Lord Vishnu. This is how the temple got its name as Kopeshwar which means furious god. </span><br data-dcnode-id="4547"><br data-dcnode-id="4546"><span data-dcnode-id="4545" instrument_node="">Kopeshwar Temple is a magnificent piece of intricate Chalukyan architecture. Built with basalt stone, the entire temple is divided into four parts Swarga Mandap, Sabha Mandapa, Antarala, and Garbhagriha / Sanctum Sanctorum. The Swarg Mandap of the temple is unique and stunning. The mandap is supported ...

At a distance of 80 km from Kolhapur, and 89 km from Ratnagiri, Vishalgad Fort is an ancient fort situated at Vishalgad village in Kolhapur district of Maharashtra. It is one of the historical forts in Maharashtra, and among the best places to visit near Kolhapur. </span><br data-dcnode-id="4466"><br data-dcnode-id="4465"><span data-dcnode-id="4464" instrument_node="">Also called Khelna or Khilna by the locals, Vishalgad Fort was one of the important forts of the Maratha empire. According to history, Vishalgad Fort was built in the year 1058 by Shilahara king Marsinh and was initially known as Khilgil. In 1209, the then king of Seuna Yadavas of Devagiri defeated Shilaharas and captured the fort. In 1309, Allauddin Khilji defeated King Ramchandra of the Seuna Yadavas of Devagiri and soon the fort was attached to the Khilji dynasty. Later, the fort was under the rule of the Vijayanagar Empire, and then the Adishlahi dynasty. In 1659, Shivaji captured the fort from Adilshah and renamed the fort 'Vishalgad' which means grand or giant fort.</span><br data-dcnode-id="4463"><br data-dcnode-id="4462"><span data-dcnode-id="4461" instrument_node="">In July 1660, the fort witnessed Shivaji's escape from the Adilshahi blockade around Fort Panhala and the Battle of Pawan Khind. After Shivaji's death, Chhatrapati Sambhaji would spend most of his time on the fort. He took initiative in the renovation and reconstruction of some parts of the fortresses and gates of the fort. During the times of the Maratha Empire, Vishalgad was made the capital of a large region consisting of ninety towns and villages in Kolhapur and Ratnagiri districts. In 1844, as a result of mutiny by the Killedars, ...

At a distance of 22 km from Kolhapur, Panhala Fort is an ancient fort situated at Panhala town in Kolhapur district of Maharashtra. Also known as Panhalgad, it is one of the historical forts in Maharashtra, and among the best places to visit near Kolhapur. </span><br data-dcnode-id="4386"><br data-dcnode-id="4385"><span data-dcnode-id="4384" instrument_node="">Panhala Fort is strategically located looking over a pass in the Sahyadri mountain range which was a major trade route from Bijapur in the interior of Maharashtra to the coastal areas. Due to its strategic location, it was the center of several battles in the Deccan involving the Marathas, the Mughals, and the British East India Company, the most notable being the Battle of Pawan Khind. It is also called the 'Fort of Snakes' as it is zigzagged in shape.</span><br data-dcnode-id="4383"><br data-dcnode-id="4382"><span data-dcnode-id="4381" instrument_node="">Built between 1178 and 1209 CE, Panhala Fort was one of the 15 forts built by the Shilahara ruler Bhoja II. A copper plate found in Satara shows that Raja Bhoja held court at Panhala from 1191-1192 CE. It was successively held by the Yadava and Bahamani Kings. In 1489 AD, the fort and the territory were taken over by the Adil Shahi dynasty of Bijapur. Shivaji seized the fort in 1659 AD. In July 1660, Shivaji escaped from the Adilshahi blockade around Fort Panhala and the Battle of Pawan Khind. The fort went to Adil Shah, and it was only later, in 1673, that Shivaji occupied the fort once again, stationing 15,000 horses and 20,000 soldiers here. Panhala would be the second-most important fort in the Maratha empire after the capital, Raigad.</span><br data-dcnode-id="4380"><br data-dcnode-id="4379"><span data-dcnode-id="4378" instrument_node="">After the death ...

At a distance of 42 km from Mumbai Chhatrapati Shivaji Terminus, Kanheri caves are located inside Sanjay Gandhi National Park to the north of Borivali in the outskirts of North Mumbai in Maharashtra. These Caves are considered one of the top </span><a data-dcnode-id="4302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/mumbai/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="4303" instrument_node="">tourist places in Mumbai</span></a><span data-dcnode-id="4301" instrument_node="">.</span><br data-dcnode-id="4300"><br data-dcnode-id="4299"><span data-dcnode-id="4298" instrument_node="">The name of these caves has originated from the Sanskrit word Krishnagiri, meaning black. These are the must-include places in </span><a data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/mumbai" target="_blank"><span data-dcnode-id="4297" instrument_node="">Mumbai tour packages</span></a><span data-dcnode-id="4295" instrument_node="">, especially for history buff.The Kanheri Caves constitute a group of rock-cut monuments chiseled out of a massive basaltic rock. The caves demonstrate the Buddhist influence on the art and culture of India. These caves were formed between the 1st century BC and 10th century AD, with the earliest rocks comprising 109 tiny rock-cut cells. Most caves were named Buddhist Viharas in ancient times and were meant for living, study, and meditation. The site also served as a university during the rule of Kushanas and Mauryas.</span><br data-dcnode-id="4294"><br data-dcnode-id="4293"><span data-dcnode-id="4292" instrument_node="">Kanheri caves are divided into three different caves, each of which has a stone plinth for a bed. The caves have chaityagrihas with rock-cut stupas where Buddhists worshipped. There are single and multiple celled viharas or monasteries that were abode to Buddhist monks. The caves also had podhis or water cisterns which were dug skillfully to trap rainwater for use during summers. </span><br data-dcnode-id="4291"><br data-dcnode-id="4290"><span data-dcnode-id="4289" instrument_node="">The initial caves are small ...

Purana.</span><br data-dcnode-id="4198"><br data-dcnode-id="4197"><span data-dcnode-id="4196" instrument_node="">Rohidas, Taramati, and Harishchandra are the three peaks in Harishchandragad. Taramati peak is the highest peak in the fort and provides a beautiful panoramic view of the nearby surroundings and the forest area. Many peaks and attractions ...

At a distance of 48 km from Malshej Ghat, Ajoba or Ajaparvat is one of the highest peaks in the Sahyadri ranges of the Western Ghats in Maharashtra. Situated near Dehene village, it is one of the popular places of trekking near Mumbi and among the best places to visit as part of Malshej Ghat Packages for adventure enthusiasts.</span><br data-dcnode-id="4111"><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">Standing at a height of over 4,511 feet, Ajoba Hill is one of the highest peaks in the Western Ghats. Midway to the fort lies Valmiki Ashram which is believed to be the place where Valmiki wrote the epic 'Ramayana'. According to the legend, this is the place where Goddess Sita was said to be staying after being separated from Lord Rama. Carvings on the Ashram wall depict stories of Gods and Goddesses. The fort was named 'Ajobagad' after the great sage Valmiki who was called 'Ajoba' or grandfather by Luv and Kush.</span><br data-dcnode-id="4108"><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">Nestled amidst thick greenery, the Ajoba Hill Fort is a delight for trekkers as it presents an exciting trail to the top. People interested in rock climbing also come here to feel the adrenaline rush. The trek to the Ajoba hill starts from the Dehene Village. The trek is in two halves where the first half is till the Valmiki Ashram which is a leisure walk through the sacred forest with rich flora and fauna. There are some carved stones and a small hut near the ashram where one can stay. A little downhill from the Ashram lies a mountain stream carrying clear potable water. While, the second half of the trek is to Luv Kush Cave from Nalichi ...
</span></p><span data-dcnode-id="4104" instrument_node="">

At a distance of 13 km from Malshej Ghat, Sindola or Shindola Fort is a small hill fort situated on top of Malshej Ghat Plateau. It is one of the wonderful places of trekking near Pune and among the famous places to visit in Malshej Ghat.</span><br data-dcnode-id="4027"><br data-dcnode-id="4026"><span data-dcnode-id="4025" instrument_node="">Situated at an altitude of 1128 feet, Sindola mountain is distinct by its pinnacle structure visible from anywhere. Sindola is more of a sort of military base as it offers a whole view of Malshej and the Pargaon region and all of its neighboring forts. Sindola dates back very old at similar times of Nimgiri and Hadsar. Sindola fort is a small fort. Ruins of bastions &amp; only a couple of water cisterns and idols of Ganesh are present on the top. </span><br data-dcnode-id="4024"><br data-dcnode-id="4023"><span data-dcnode-id="4022" instrument_node="">Sindola is one of the popular trekking places in Malshej Ghat and is a one day trek. There are 3 base villages from where one can start the trek to Sindola Fort. The trek that starts from Karanjale village, is one of the best and popular routes. Bagadwadi at Pargaon is the other starting point of Sindola Fort trek. Karanjale is situated on Kaylan-Malshej-Alephata Highway in between Khubi phata &amp; Velkhind. It is about 2 km from Malshej Ghat Bus Stop at Khubi Phata. The route starts from the fields opposite the signboard of Karanjale village. The 2.5 km trek route is pretty straight forward and easy to moderate climb (monsoon). The route is not marked but is quite distinct as one has to go up and reach Sindola plateau, the start point of the ridge. Climb to the ridge can be started from any ...

At a distance of 2 km from Naneghat and 32 km from Malshej Ghat, Jivdhan Fort is a hill fortress located near Malshej in Maharashtra. Situated near Naneghat, it is one of the historical forts in Malshej Ghat and among the popular trekking places near Pune. </span><br data-dcnode-id="3943"><span data-dcnode-id="3942" instrument_node="">Situated at a height of about 3,757 feet in the Sahyadri Mountain range, Jivdhan Fort is a part of the 'Famous 5' forts near Pune. The other four being the Chavaand, Hadsar, Shivneri, and Naneghat. As per the history, Jivdhan Fort dates back to the Satavahana era and has been a significant fort throughout history due to its proximity to the historic Naneghat. Jivdhan Fort guarded this route, which was a strategic location for many kingdoms. The Mughals imprisoned Murtaza, the last ruler of Adilshahi of Ahmednagar, at Jivdhan Fort. In 1635 Shahaji Bhosle, the father of Chhatrapati Shivaji Maharaj freed him from the prison and declared him the king of Ahmednagar. The fort was sacked and plundered by the British upon siege between 1815 and 1818.</span><br data-dcnode-id="3941"><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">Although the fortifications have crumbled down, one can see a huge storehouse or Kothi, which has was used to store grains. Besides the storehouse, there are several interesting ruins and remnants, including a few water cisterns and a temple dedicated to Goddess Jivai, who is supposed to be the patron deity of the fort. The fort's Northern bastion is in a pretty good condition even today. One can also see a few cisterns and remnants of old buildings near this bastion. From this ...

At a distance of 73 km from Mumbai Chhatrapati Shivaji Terminus, Vasai Fort, also known as the Bassein Fort, is an ancient fort located at Vasai in the suburbs of North Mumbai. The fort, overlooks the confluence of the Ulhas River, is one of the top places to visit in Mumbai.</span><br data-dcnode-id="3864"><br data-dcnode-id="3863"><span data-dcnode-id="3862" instrument_node="">Vasai was known as a place for ship building in the 15th Century. Bahadur Shah, a Mughal Emperor had built the Bassein Fort in the 1530s. The fort covers an area of around 110 acre. The Portuguese conquered and destroyed most of the fort a year after it was built. The Portuguese remodeled the fort into a flourishing city by building a citadel inside. The fort was under the Portuguese control till 1739 AD. In the 18th century, the fort was raided and overtaken by the Maratha army under Chimaji Appa. They stood strong for 3 long years, and then the British took over the fort in the First Anglo-Maratha War.</span><br data-dcnode-id="3861"><br data-dcnode-id="3860"><span data-dcnode-id="3859" instrument_node="">Once a strategic place on the Western coast of India, this fort has now mostly turned into ruins. Despite the fort is so old and in the condition of ageing, there are many remains, which are still livens the wonderful architecture of the olden days. Three chapels inside the fort are in the condition, which can be easily recognized. The southernmost chapel has a well-preserved barrel vaulted ceiling and the walls are covered with tree roots and palm groves. Many of the watchtowers still stand so strong, with secure staircases. Surrounded by sea on the three sides, it is a favourite location of ...

At a distance of 94 km from Pune Junction, Shivneri Fort is an ancient fort situated near Junnar in Pune district of Maharashtra. Shivneri Fort is one of the most magnificent as well as historically rich forts of India. It is a famous trekking destination and also a popular weekend picnic destination near Pune. It is also one of the top tourist places in Pune visiting.</span><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node=""> </span><br data-dcnode-id="3692"><span data-dcnode-id="3691" instrument_node="">The Shivneri Fort was built during the time of Satavahanas. After the Satavahanas, the Shivneri Fort was occupied by the Shilaharas, the Yadavas, and the Bahamanis. In 1599 AD the hill fort was granted to Shivaji's grandfather, Maloji Bhosale and passed down to Shahaji. Jijabai (Shivaji's mother) spent the days of her pregnancy here and this was the birth place of Shivaji, the famous Maratha warrior who was born in 1630 AD. Shivaji spent his childhood in Shivneri Fort and also undertook his military training here. </span><br data-dcnode-id="3690"><br data-dcnode-id="3689"><span data-dcnode-id="3688" instrument_node="">Shivneri is a triangular shape hill fort and has its entrance from the South-West side of the hill. Apart from the main gate there is an entrance to the fort from Eastern side called locally as the chain gate, where in one has to hold chains to climb up to the fort gate. The fort extends up to 1 mi with seven spiral well-defended gates. There are mud walls all around the fort. The fort also exhibits a small water pond named Badami Talav, located in the center of the fort. Close to the pond lies the idol of Jijabai along with her son Shivaji. Shiv Janmasthan, Ambarkhana, Kadelot Point, Ganga ...

At a distance of 30 km from Nashik, Sinnar is a town and a municipal council in Sinnar taluka of Nashik district in Maharashtra. Sinnar is mainly famous for Sri Gondeshwar Temple and Gargoti Museum. It is one of the famous </span><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/aurangabad/200kms" target="_blank"><span data-dcnode-id="3613" instrument_node="">places to visit near Aurangabad</span></a><span data-dcnode-id="3611" instrument_node="">.</span><br data-dcnode-id="3610"><br data-dcnode-id="3609"><span data-dcnode-id="3608" instrument_node="">Gondeshwar Temple is situated about 2 km from Sinnar Bus Station and it represents the best example of the Hemadpanti style of architecture. The structure was constructed using the locally available black basalt stone and lime. The temple's origin dates back to 12 - 13th century during the Yadava dynasty. Some sources claim that Raj Govinda of the Yadava dynasty built this great temple. Yet another tradition assigns the building to Govindaraja, another Yadava king who ruled about the beginning of the twelfth century AD.</span><br data-dcnode-id="3607"><br data-dcnode-id="3606"><span data-dcnode-id="3605" instrument_node="">It is a Shaiva Panchayatan or a group of five temples within a large enclosure. The central shrine is dedicated to Lord Shiva and the remaining four temples are dedicated to goddess Parvati, Sri Ganapathi, Surya Bhagwan, and Lord Vishnu. This is the largest, most complete, and best-preserved example of the medieval temples of the Deccan of the Indo-Aryan style.</span><br data-dcnode-id="3604"><br data-dcnode-id="3603"><span data-dcnode-id="3602" instrument_node="">The temple is an astonishing display of stone carvings and sculptures portraying the stories from the Puranas, Mahabharata &amp; Ramayana. Sculptures of Gods, Goddesses, Apsaras, Yakshas, Kinnaras, and Gandharvas adorn the entire complex. The temple of Lord Shiva is beautifully proportioned ...

At a distance of 18 km from Kannad and 77 km from Aurangabad, the Pitalkhora Caves are an ancient rock cut caves located on Chandora hill near Ambala village in </span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/aurangabad" target="_blank"><span data-dcnode-id="3527" instrument_node="">Aurangabad</span></a><span data-dcnode-id="3525" instrument_node=""> district of Maharashtra. </span><br data-dcnode-id="3524"><br data-dcnode-id="3523"><span data-dcnode-id="3522" instrument_node="">Pitalkhora consisting of 14 Buddhist Caves and are believed to be one of the earliest of the rock cut cave structures in the vicinity. It is believed that Pitalkhora Caves belongs to 2nd century BC. They are cut in a variety of basalt rock which weathers faster in contrast to other parts in Maharashtra. All the caves belong to the Hinayana period but the painting executed in the caves are of Mahayana period. The caves boast paintings, many sculptures, animal motifs, miniature chaitya windows, wonderful Yaksha figures, the elephants, dwarapalas and mithuna figures. The sculptural representations here are similar to that of found in the stupas of Sanchi, Karla, Nasik, of the same period.</span><br data-dcnode-id="3521"><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">The caves are in two groups, one is a cluster of 10 caves and the second of 4 caves. Out of the 14, four are chaityas (one housing votive stupas, one apsidal and single-cell) and the rest are viharas. The 1st cave, which has been damaged, was used as a monastery or vihara. The 2nd, 3rd and 4th caves have similar courtyards and seem to belong to the same period.</span><br data-dcnode-id="3518"><br data-dcnode-id="3517"><span data-dcnode-id="3516" instrument_node="">The Cave 3 has the best paintings and there are 37 pillars that separate the aisle from the hall. The inscriptions on each pillar indicate that they were added At a distance of 52 km from Pune and 11 km from Yavat, Bhuleshwar is an ancient Hindu temple situated on a hill near Malshiras in Pune district of Maharashtra. It has been declared as a protected monument and is maintained by Archeological Survey of India.</span><br data-dcnode-id="3437"><br data-dcnode-id="3436"><span data-dcnode-id="3435" instrument_node="">The temple is dedicated to Lord Shiva and was built in 13th century during Yadava Rulers. It is believed that the temple was ruined by Muslim invaders and reconstructed later because the entrance of the temple is hidden like Gaimukhi Buruj construction of Shivaji's time. The fort on which the temple is situated is called as Daulat Mangalgad Fort.</span><br data-dcnode-id="3434"><br data-dcnode-id="3433"><span data-dcnode-id="3432" instrument_node="">The temple is unique because of its architecture. Black basalt rock was brought to construct this temple which is different as compared to surrounding brownish color basalt rock. From outside it appears to more as a mosque than a temple due to its resemblance to Islamic architecture like circular domes and minarets. There are classical carvings on the walls.</span><br data-dcnode-id="3431"><br data-dcnode-id="3430"><span data-dcnode-id="3429" instrument_node="">The temple contains five Shivlingas in its sanctum. Owing to their being hidden in a trench, these Shiva Lingams can be seen in light. Goddess Lakshmi, Lord Vishnu and Lord Mahadev are also housed in this temple. The temple also has an idol of Ganesh in female attire and is popularly called as Ganeshwari or Lambodari or Ganeshyani.</span><br data-dcnode-id="3428"><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">This temple gets huge crowds during Mahashivratri. There is a local belief, when a bowl of sweet is offered to Lord Shiva, one or more of the sweets disappear. A little further ...

At a distance of 96 km from Pune, Junnar Caves are ancient rock cut caves situated at Junnar in Pune district of Maharashtra. Junnar has the largest and longest cave excavations in India. These are the ASI protected monuments and also one of the popular Pune tourist places. </span><br data-dcnode-id="3351"><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">Junnar has over 200 independent excavations spread over four hills. All the excavations belong to the Hinayana phase and are datable from mid-3rd century BC to late 3rd century AD. The presence of largest number of rock cut excavations and a large number of inscriptions enabling a paleographical study makes Junnar a prominent site for the study of rock cut architecture. Here there are 24 inscriptions, which provide useful paleographical data for the relative dating of the caves. </span><br data-dcnode-id="3348"><br data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">Junnar Caves are classified into various groups depending upon the location of these excavations. They are Tulja Caves, Manmodi Group of Caves, Shivneri Group of Caves and Lenyadri or Ganesh Lena Caves. The Lenyadri or Ganesh Lena Group is the main group and located 6 km north of Junnar across the River Kukdi. The hill is variously known as Sulaiman Pahar and Ganesh Pahar. There are nearly 40 caves in this group of which the main group of 30 caves are located in a line and stretch from east to west, all facing south and overlooking the Valley of Kukdi River. Among them Cave 6 and 14 are chaityagrihas and the remaining are viharas. Of which Cave 7 is the largest and also houses the image of Ganesh. It is one of the Ashtavinayak ...

oods and steep rocks which have to be carefully scaled to reach its base. Earlier, the only way to reach this place was through an artificial tunnel, which is now blocked by a big rock. There are no buildings on the top or walls of any kind or even a gateway, which is unusual for a fort in this area. </span><br data-dcnode-id="3254"><span data-dcnode-id="3253" instrument_node=""> </span><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node="">The only structure on the top ...

At a distance of 18 km from Lohagad Fort (3 km by Walk) and 24 km from Lonavala Railway Station, Visapur Fort or Visapoor Fort is a hill fort near Visapur village in </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/pune" target="_blank"><span data-dcnode-id="3172" instrument_node="">Pune</span></a><span data-dcnode-id="3170" instrument_node=""> district of Maharashtra. It is part of the Lohagad-Visapur fortification. It is one of the popular trekking places in Lonavala and also one of the important </span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/lonavala/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="3169" instrument_node="">places of interest in Lonavala</span></a><span data-dcnode-id="3167" instrument_node="">.</span><br data-dcnode-id="3166"><br data-dcnode-id="3165"><span data-dcnode-id="3164" instrument_node="">The fort has an elevation of 1084 m above sea level. It was built during 1713-1720 CE by Balaji Vishwanath, the first Peshwa of Maratha Empire. Visapur fort was built to guard the Lohagad Fort and it has an impressive fortification and plateau at its top. Making use of its higher elevation and proximity to Lohagad, the British troops set up their cannons on Visapur and bombarded Lohagad, forcing the Marathas to flee. Thus, in 1818, Lohagad and Visapur were taken over by the British.</span><br data-dcnode-id="3163"><br data-dcnode-id="3162"><span data-dcnode-id="3161" instrument_node="">Visapur Fort is larger and at a higher elevation than Lohagad fort. The fort is famous for its protective walls and intricate designs. The fort has several structures like caves, cisterns of water and the ruins of a large stone built house known as the Peshwa's palace. In addition to a huge carving of Hanuman, and several temples scattered all over the place. Hanuman was likely the At a distance of 14 km from Guhagar and 90 km from Ganpatipule, Gopalgad is an ancient hill fort located at Anjanvel village in Ratnagiri district of Maharashtra. It is one of the most popular forts in Konkan and also one of the best tourist places to visit near Ganpatipule.</span><br data-dcnode-id="2993"><br data-dcnode-id="2992"><span data-dcnode-id="2991" instrument_node="">Popularly known as Anjanvel Fort, Gopalgad Fort is believed to have been built by Siddisad, a sardar of Bijapur rulers in the 16th century. The fort was captured by Shivaji Maharaj in 1660 CE. In 1699 CE, it was captured by Khairatkhan, a Siddi ruler who ruled from Murud Janjira. Tulaji Angre then won this fort in 1744 CE and then later lost it to Peshwas in 1755 CE. During the Peshwa rule, the Anjanvel was a center for ship building industry and cloth weaving. With the fall of the Maratha Empire in 1818 CE, the fort came under the control of the British until India got its independence in 1947 CE.</span><br data-dcnode-id="2990"><br data-dcnode-id="2989"><span data-dcnode-id="2988" instrument_node="">Gopalgad Fort was built on the banks of Vashishti creek for the protection of Dabhol, an ancient port city. It spreads over an area of around 7 acres and the fort is divided into two parts. The lower part of the fort walls is called Padkot while the upper walls are referred to as Balekot. Strong fort walls comprising 12 burujs have been constructed to protect the fort against attacks. It has two main entrance gates, situated on the eastern and western sides.</span><br data-dcnode-id="2987"><br data-dcnode-id="2986"><span data-dcnode-id="2985" instrument_node="">Now, the fort is in ruins with some of its walls crumbling. There is a well in the fort almost at the center around which there are remnants ...

At a distance of 24 km from Lonavala, 67 km from Pune, 121 km from Mumbai and 31 km from Lohagad Fort, Tung Fort is an ancient hill fort situated near Pawna dam in Pune district of Maharashtra. It lies at an altitude of 1075 m and is one of the best </span><a data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/lonavala" target="_blank"><span data-dcnode-id="2906" instrument_node="">Lonavala</span></a><span data-dcnode-id="2904" instrument_node=""> attractions. It is also among well known </span><a data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/lonavala/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="2903" instrument_node="">Pune places to visit</span></a><span data-dcnode-id="2901" instrument_node="">.</span><br data-dcnode-id="2900"><br data-dcnode-id="2899"><span data-dcnode-id="2898" instrument_node="">Tung fort is also named as Kathingad fort. It is one of the well known forts around </span><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/pune" target="_blank"><span data-dcnode-id="2897" instrument_node="">Pune</span></a><span data-dcnode-id="2895" instrument_node="">. The word Kathin in Marathi means difficult. While climbing, one can experience the difficult challenge of reaching this fort. Tung Fort was built by the rulers of the Adilshahi dynasty before 1600 CE. However it was later occupied by Chatrapati Shivaji Maharaj of the Maratha Empire. It is a small fortification and supported around 200 soldiers only. This fort served as a watchtower in the past because the site offers a panoramic view of the Maval region of Pawna and Mulshi valley. The Dhamale family, one of the Deshmukhs from the Maval region, was charged with ensuring the security of Tung Fort. During invasion, it served to provide a temporary distraction for invaders. Thus, the major forts of Visapur and Lohagad would have time to prepare themselves to meet the invading army. </span><br data-dcnode-id="2894"><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node="">The fort is conical and consists of strongly fortified walls, ramparts and also has several bastions. It ...

At a distance of 19 km from Ganpatipule and 42 km from Ratnagiri, Jaigad Fort is coastal fortification that is located near Jaigad village in Maharashtra. It is one of the popular forts in Konkan region and also one of the top </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/pune/200kms" target="_blank"><span data-dcnode-id="2817" instrument_node="">tourist places near Pune</span></a><span data-dcnode-id="2815" instrument_node=""> for history lovers. It is a protected monument under Archeological Survey of India. </span><br data-dcnode-id="2814"><br data-dcnode-id="2813"><span data-dcnode-id="2812" instrument_node="">Jaigad Fort is one of the prime places to include in </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/ganpatipule" target="_blank"><span data-dcnode-id="2811" instrument_node="">Ganpatipule tour</span></a><span data-dcnode-id="2809" instrument_node=""> The meeting point of the river Shashtri and Arabian Sea is called as the creek of Jaigad. For the protection of this creek two forts were constructed, one is Vijaygad at the north direction and the other is Jaigad at south. Situated on a cliff, Jaigad has a commanding view of the bay and the open sea. A jetty port and a lighthouse are located nearby.</span><br data-dcnode-id="2808"><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node="">It is believed that the construction of Jaigad was initiated in 14th century and completed by Sultan of Bijapur and was named after Jayba Mahar's sacrificing his life for building the fort. It was conquered by Kanhoji Angre, the commander-in-chief during Chhatrapati Shivaji Maharaja's regime. Shivaji also controlled the fort for some time before handing it over to the Peshwas who finally lost the fort to the British in the year 1818. </span><br data-dcnode-id="2805"><br data-dcnode-id="2804"><span At a distance of 16 km from Tung Fort, 25 km from Lonavala and 32 km from Lohagad Fort, Korigad, also called Koraigad, is a hill fort in Pune district of Maharashtra. Situated at an altitude of 929 m, Korigad is one of the popular forts near </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/maharashtra/lonavala" target="_blank"><span data-dcnode-id="2724" instrument_node="">Lonavala</span></a><span data-dcnode-id="2722" instrument_node=""> and also one of the famous weekend getaways from Pune and Mumbai, well known for trekking.</span><br data-dcnode-id="2721"><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">Its date of construction is not known but likely predates 1500 AD. This fort was taken over into his kingdom by Chhatrapati Shivaji along with the forts of Lohagad, Visapur, Tung and Tikona in 1657 AD. Later in 1818 AD this fort went under the British reign. The fort is in good condition and well maintained. There are many cannons, temples and small caves on the fort.</span><br data-dcnode-id="2718"><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node="">On the top of the fort is a huge plateau. There is temple of Goddess Korai Devi on the fort and the idol of Korai Devi is around 4 feet. This temple has been renovated recently. There are many bastions on the Southern side of the fort. There are 6 cannons and two more temples on this fort. Of these, the biggest cannon named Laxmi lies next to the Korai Devi temple. There are also two lakes on the top of the fort and ahead of them are two caves. Here visitors can see the idol of lord Vishnu holding the Conch, Discus, Mace and Lotus flower. One can enjoy beautiful view of Aamby Valley city developed by Sahara Group from the fort.</span><br data-dcnode-id="2715"><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">The base village of the fort is Peth Shahpur or Ambivali, which is about 1 km north ...

At a distance of 2 km from Devgad Beach, 31.5 km from Vijaydurg Fort, 55 km from Malvan and 103 km from Ratnagiri, Devgad Fort is located at Devgad in Sindhudurg district of Maharashtra. Devgad town got its name from this legendary fort. </span><br data-dcnode-id="2638"><br data-dcnode-id="2637"><span data-dcnode-id="2636" instrument_node="">Devgad Fort is situated at the confluence of Devgad Creek and Arabian Sea. Placed strategically on a narrow strip of land jutting into the Arabian Sea, Devgad Fort was constructed by Kanhoji Angre, the brave warrior of Konkan coast, in 1705 AD on a highland of the sea port of Devgad. It was used as a surveillance center. It was attacked by the British Naval Battalion in charge of Commander Walter Brown.</span><br data-dcnode-id="2635"><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">After changing many hands, this 120 acre fort finally came under the British in 1818 AD. Now, only a few strips of the fortifications remain. The walls and the structures of this fort are still intact and in good condition. Devgad Fort commands a panoramic view of the Arabian Sea as well as the casuarinas lining the long stretch of Devgad Beach. A Ganesh temple, three old cannons and a 15 m high Lighthouse are situated inside the fort and is worth a visit.</span><br data-dcnode-id="2632"><br data-dcnode-id="2631"><span data-dcnode-id="2630" instrument_node="">The fort offers a pleasant panoramic view of the harbor and the Arabian Sea. The best time to visit the fort is in the evenings. The enticing views of the sunset are an added attraction, making it a favourite picnic destination for the family and friends. </span><br data-dcnode-id="2629"><span data-dcnode-id="2628" instrument_node="">Lighthouse Timings: 4 PM to 5 PM.
</span></p><span data-dcnode-id="2626" instrument_node="">

At a distance of 10 km from Ganeshgule and 24 km from Ratnagiri, Purnagad Fort is an ancient sea fort situated at Purnagad village in Ratnagiri district of Maharashtra. It is one of the popular forts of Konkan and also one of the best places to visit in Ratnagiri.</span><br data-dcnode-id="2553"><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">Purnagad Fort is situated on a mountain which is at the confluence of Muchkundi creek and the Arabian Sea. It is believed that the fort of Purnagad was constructed by Chhatrapati Shivaji Maharaj, but some evidences suggested that it was constructed by Sakhoji Aangre, son of Kanhoji Angre. </span><br data-dcnode-id="2550"><br data-dcnode-id="2549"><span data-dcnode-id="2548" instrument_node="">Spread over an area of 22 acres, Purnagad Fort has two entrance gates, one facing east and the other facing west. The main entrance door is a very robust structure between the two bastions. There is a Hanuman shrine and a well at the entrance. Pictures of Moon, Sun and Lord Ganesh are carved onto the main entrance door. Vestibules of security guards are present on the either sides of the main entrance door. There are stair cases from four sides to reach the top of the fort.</span><br data-dcnode-id="2547"><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">Although covered in thick vegetation and overgrown trees, this small fort is in good condition. The main entrance door and its buruj, boundary wall are still in good condition. The fort is located very close to the village Purnagad and it is a ten minutes' walk. One can get a captivating view of the Arabian Sea, Muchkundi creek and surrounding places from the top of the fort.
</span></p><span data-dcnode-id="2543" instrument_node="">

At a distance of 29 km from Devgad, 73 km from Malvan and 100 km from Ratnagiri, Vijaydurg Fort is an ancient fort situated on a hill near the mouth of the Vaghotan River in Sindhudurg district of Maharashtra. It is one of the largest forts on the Konkan coast of Maharashtra and also one of the top places to visit in Ratnagiri. It is a protected monument under ASI.</span><br data-dcnode-id="2470"><br data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node="">Vijaydurg Fort is located at the tip of the peninsular region of Vijaydurg in Devgad Taluka. It was earlier known as Gheria because of its proximity to the village Girye and functioned as a strong military base for Admiral Kanhoji Angre. The fort is also known as the 'Gibraltar of the East' since it was so impregnable, surrounded by the Arabian Sea from three sides. </span><br data-dcnode-id="2467"><br data-dcnode-id="2466"><span data-dcnode-id="2465" instrument_node="">The original fort was built by Bhojraja Shilahar between 1196 and 1206 AD. The Maratha king Shivaji took control of this fort from Adil Shahi dynasty in 1656 AD and renamed it as Vijay Durg. Thereafter the fort was the main Maratha naval base under Kanoji Angre. The fort was attacked in 1717, 1720 and 1724 AD by the British, Portuguese and Dutch - but could not be conquered. The fort was under the control of British and Peshwas in 1756 AD and remained with the Peshwas till 1818 AD. In 1818 Vijaydurg was totally fell into the hands of the British Empire.</span><br data-dcnode-id="2464"><br data-dcnode-id="2463"><span data-dcnode-id="2462" instrument_node="">The earlier fort encompassed an area of 5 acres and was surrounded by sea on all the 4 sides. Presently the area of fort is about 17 acres and is surrounded by Arabian Sea on three sides. ...
</span></p><span data-dcnode-id="2460" instrument_node="">

At a distance of 5 km from Mahad, 28 km from Raigad Fort and 62 km from Mahabaleshwar, Gandharpale or Pale Caves are situated on a hill near Mahad on Mumbai-Goa highway at the confluence of Savitri and Gandhari Rivers in Raigad district of Maharashtra. These caves are the popular tourist attractions near Raigad Fort.</span><br data-dcnode-id="2385"><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">The Gandharpale Caves have probably taken the name from two villages in the vicinity of Mahad viz Pale village. These Buddhist caves built between 150 and 300 AD. According to the mythological story, the ancient Pandav Leni in Gandharpale is the sculptured houses built in one night by the Pandavas. But according to historians and archaeologists these are Buddhist caves built during the reign of Prince Vishnupalita Kambhoja. </span><br data-dcnode-id="2382"><br data-dcnode-id="2381"><span data-dcnode-id="2380" instrument_node="">Gandharpale Caves are a group of 31 Buddhist caves. Some caves are on upper side of the hill and some are on the lower side of the hill. They are mostly Buddhist viharas belongs to Hinayana Sect. The caves have a few small stupas located in prayer halls called chaityagrihas. There also exist a few carvings of Lord Buddha the Bodhisatvas along with attendants on the vihara walls and pillars. There is also an inscription in the brahmi script carved on the wall of one cave. </span><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">One can see water cisterns and rooms and other remnants near these caves.</span><br data-dcnode-id="2377"><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">Cave 1, Cave 8, Cave 15 and Cave 21 are the important caves in Gandharpale Leni. Cave 1 has a Verandah in front, which is 53 feet long and 8 feet wide. Shrine has sculpture images ...

At a distance of 5 km from Revdanda, 12 km from Kashid Beach, and 22 km from Alibaug, Korlai Fort is a Portuguese fort situated at Korlai in Raigad district of Maharashtra. It is one of the best places of sightseeing in Alibag and also one of the popular historical places near Mumbai.</span><br data-dcnode-id="2296"><br data-dcnode-id="2295"><span data-dcnode-id="2294" instrument_node="">Korlai Fort, also called Morro or Castle Curlew, was built by the Portuguese in 1521AD under the permission of Sultanate of Ahmednagar. It was built on Morro de Chaul Island which secures the way to the Revdanda Creek. It was meant as a companion to the fort at Chaul. The Portuguese built this fort as a strategic decision to defend their rule from Bassein to Korlai. </span><br data-dcnode-id="2293"><br data-dcnode-id="2292"><span data-dcnode-id="2291" instrument_node="">In 1521 AD, taking advantage of the confusion in the aftermath of the death of the Burhan Nizam the Portuguese tried to take over the fort but the Ahmednagar sultanate occupied the island. However in 1594, the Portuguese won the fort but not having enough men to stand guard there chose to destroy it leaving only the central tower and a battery intact. The fort was taken by the Marathas who held it from 1739 - 1818 CE.</span><br data-dcnode-id="2290"><br data-dcnode-id="2289"><span data-dcnode-id="2288" instrument_node="">A huge and tall fortification surrounds the entire fort area, which is of a length of 2828 feet and width of 8 feet. There are 11 large gates, of which four are outside and the remaining 7 are inside. All the gates exhibit the ancient Portuguese inscriptions. The area within the fort walls is divided into three enclosures by two lines of bastioned fortifications. The outside fortification has 305 parapets ...
