         Due to the vast number of historical places in Uttarakhand, it is also referred to as Dev Bhoomi or the Land of Gods. The state has been ruled by the Kushanas, Kudinas, Kanishka, Samudra, Guptas, Pau</span><span class="clickable linkColor morelinkSmall" data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node=""> (Read More)</span></span><span class="moreTextHidden" data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">ravas, Katuris, Palas, Chandras, Pawaras and the British. After Independence, the Tehri princely state was merged into Uttar Pradesh state, while Uttarakhand composed the Garhwal and Kumaon Divisions. The term Uttaranchal came into use when the Bharatiya Janata Party (BJP) initiated a new round of state reorganisation in 1998 and introduced its preferred name.  </span></span><span data-dcnode-id="3284" instrument_node="">
