</span><article class="mkdf-tour-item-wrapper post-7231 tour-item type-tour-item status-publish has-post-thumbnail hentry tour-category-districts" data-dcnode-id="1065"><span data-dcnode-id="2426" instrument_node="">
</span><div class="mkdf-tour-item-section mkdf-tour-tab-container" data-dcnode-id="2157" id="tour-item-info-id"><span data-dcnode-id="2425" instrument_node="">
</span><div class="mkdf-info-section-part mkdf-tour-item-title-holder" data-dcnode-id="2411"><span data-dcnode-id="2424" instrument_node="">
</span><h3 class="mkdf-tour-item-title" data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">
</span></h3><span data-dcnode-id="2421" instrument_node="">
</span><h5 class="mkdf-tour-item-price-holder" data-dcnode-id="2413"><span data-dcnode-id="2420" instrument_node="">
</span><span class="mkdf-tour-item-price" data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">
</span></span><span data-dcnode-id="2417" instrument_node="">
</span><span class="mkdf-tour-item-price-text" data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">
</span></span><span data-dcnode-id="2414" instrument_node="">
</span></h5><span data-dcnode-id="2412" instrument_node="">
</span></div><span data-dcnode-id="2410" instrument_node="">
</span><div class="mkdf-info-section-part mkdf-tour-item-content" data-dcnode-id="2185"><span data-dcnode-id="2409" instrument_node="">
</span><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="2289"><div class="wpb_column vc_column_container vc_col-sm-8" data-dcnode-id="2340"><div class="vc_column-inner" data-dcnode-id="2341"><div class="wpb_wrapper" data-dcnode-id="2342"><span data-dcnode-id="2408" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="2344"><span data-dcnode-id="2407" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="2346"><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Udupi is a coastal district in Karnataka, carved out of Dakshina Kannada district in 1997. Udupi is popular for its food, temples, beaches and educational as well as financial institutions.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2370"><span data-dcnode-id="2401" style="font-weight: 400;"><span data-dcnode-id="2402" instrument_node="">The name “</span></span><i data-dcnode-id="2398"><span data-dcnode-id="2399" style="font-weight: 400;"><span data-dcnode-id="2400" instrument_node="">Udupi</span></span></i><span data-dcnode-id="2396" style="font-weight: 400;"><span data-dcnode-id="2397" instrument_node="">” is believed to have come from the Sanskrit words “</span></span><i data-dcnode-id="2393"><span data-dcnode-id="2394" style="font-weight: 400;"><span data-dcnode-id="2395" instrument_node="">Udu</span></span></i><span data-dcnode-id="2391" style="font-weight: 400;"><span data-dcnode-id="2392" instrument_node=""> &amp; </span></span><i data-dcnode-id="2388"><span data-dcnode-id="2389" style="font-weight: 400;"><span data-dcnode-id="2390" instrument_node="">Pa</span></span></i><span data-dcnode-id="2386" style="font-weight: 400;"><span data-dcnode-id="2387" instrument_node="">” that means “</span></span><i data-dcnode-id="2383"><span data-dcnode-id="2384" style="font-weight: 400;"><span data-dcnode-id="2385" instrument_node="">stars</span></span></i><span data-dcnode-id="2381" style="font-weight: 400;"><span data-dcnode-id="2382" instrument_node="">” and “</span></span><i data-dcnode-id="2378"><span data-dcnode-id="2379" style="font-weight: 400;"><span data-dcnode-id="2380" instrument_node="">Lord</span></span></i><span data-dcnode-id="2376" style="font-weight: 400;"><span data-dcnode-id="2377" instrument_node="">“. According to legend, the Moon’s light was once reduced due to a curse by King Daksha. The Moon prayed to Lord Shiva to get back the original shine and the prayer was believed to be made at the Chandramouleshwara Temple here. Pleased, Lord Shiva restored the Moon’s shine. It is also believed that the name Udupi was derived from the Tulu word “</span></span><i data-dcnode-id="2373"><span data-dcnode-id="2374" style="font-weight: 400;"><span data-dcnode-id="2375" instrument_node="">Odipu</span></span></i><span data-dcnode-id="2371" style="font-weight: 400;"><span data-dcnode-id="2372" instrument_node="">” which is associated with the Odabhanishwara Temple at Malpe. </span></span></p><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2368" instrument_node="">Vegetarian restaurants run by people who have their roots in this place are popular all over India and abroad as ‘Udupi Hotels’. Yakshagana folk art, </span><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/kambala/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2367" instrument_node="">Kambala buffalo race</span></a><span data-dcnode-id="2365" instrument_node="">, Huli Vesha, Paryaya festival are some of the unique experiences not to be missed. </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/udupi-sri-krishna-temple/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2364" instrument_node="">Udupi Sri Krishna Temple</span></a><span data-dcnode-id="2362" instrument_node=""> and Kollur Mookambika Temple are two of the most popular temples in Karnataka.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2359" instrument_node="">Dr Kota Shivarama Karantha, Jnanapeetha Award winning poet and writer was born in Kota near Udupi. This district has one of the highest literacy rates in the state and is 400 kms west of</span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/bengaluru-rural/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2358" instrument_node=""> Bengaluru</span></a><span data-dcnode-id="2356" instrument_node="">, bordering Dakshina Kannada, Shivamogga, Chikmagalur and Uttara Kannada districts. With Arabian Sea on one side and the Western Ghats on the other, This place offers both beach and forest experiences.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2348"><strong data-dcnode-id="2349"><span data-dcnode-id="2353" instrument_node="">For further information, visit the official district website </span><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//udupi.nic.in/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2351" style="text-decoration: underline;"><span data-dcnode-id="2352" instrument_node="">click here!</span></span></a></strong></p><span data-dcnode-id="2347" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">
	                Beaches	            </span></h6><span data-dcnode-id="2140" instrument_node="">
</span></div><span data-dcnode-id="2138" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="2088"><span data-dcnode-id="2137" instrument_node="">
</span><ul data-dcnode-id="2092"><span data-dcnode-id="2136" instrument_node="">
</span><li data-dcnode-id="2130"><strong data-dcnode-id="2132"><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/malpe-beach/"><span data-dcnode-id="2135" instrument_node="">Malpe Beach</span></a><span data-dcnode-id="2133" instrument_node="">:</span></strong><span data-dcnode-id="2131" instrument_node=""> The Malpe Beach is a virgin beach, located at a distance about 6 kms from Udupi. It is an important port and a fishing harbor in the state of Karnataka. The endless stretch of golden sand, graciously swaying palm trees, clear blue sky and the gentle murmur of the sea, set the perfect mood for an idyllic holiday. Be sure to visit the Balarama Temple and Malpe’s oldest tile factory, set up by the Basel Mission.</span></li><span data-dcnode-id="2129" instrument_node="">
</span><li data-dcnode-id="2123"><strong data-dcnode-id="2125"><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/maravanthe-beach/"><span data-dcnode-id="2128" instrument_node="">Maravanthe Beach (54 km)</span></a><span data-dcnode-id="2126" instrument_node="">: </span></strong><span data-dcnode-id="2124" instrument_node="">Maravanthe wears the look of a fairyland with the picturesque Kodachadri Hills forming a backdrop to the Sauparnika River on one side and miles of unspoilt white sand on the other. Maravanthe is a uniquely positioned beach in Coastal Karnataka with Arabian Sea on one side and Souparnika river on the other. This unique combination of sea and river on each side of a highway is hard to find elsewhere and is said to be the only one in India. The golden sand, clear blue sky, swaying palm trees, and the endless shore make Maravanthe an undoubtedly attractive tourist destination. Some major tourist attractions in and around the beach are Baindur, a hamlet 45 km from Maravanthe with a lovely beach, Ottinane with its overhanging cliffs and the Belaka Theertha Falls. Water sports at Maravanthe Beach are famous and one of the favorite activities among visitors. Outlook Traveler has rated Maravanthe as Karnataka’s most beautiful beach in 2005.</span></li><span data-dcnode-id="2122" instrument_node="">
</span><li data-dcnode-id="2116"><strong data-dcnode-id="2118"><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/ottinene-beach/"><span data-dcnode-id="2121" instrument_node="">Ottinene Beach</span></a><span data-dcnode-id="2119" instrument_node="">:</span></strong><span data-dcnode-id="2117" instrument_node=""> Baindur, a hamlet 45 km from Maravanthe has a lovely beach, Ottinene with its overhanging cliffs and backwaters below Kshitija Nesara Dhama.</span></li><span data-dcnode-id="2115" instrument_node="">
</span><li data-dcnode-id="2109"><strong data-dcnode-id="2111"><a data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/kapu-beach/"><span data-dcnode-id="2114" instrument_node="">Kapu Beach (12 km)</span></a><span data-dcnode-id="2112" instrument_node="">:</span></strong><span data-dcnode-id="2110" instrument_node=""> Kapu is a beach village in coastal Karnataka. Kapu's long sandy beaches offer a panoramic view of the Arabian Sea. With its tropical climate and a bevy of attractions that beckon tourists from across the country, Kapu is predominantly known for its greenery that surrounds the beach. One of the main attractions of the Kapu beach is the century old 130 ft. lighthouse. Other must-see spots in Kapu include the two temples of Goddess Mariamma and the Jain Basadis.</span></li><span data-dcnode-id="2108" instrument_node="">
</span><li data-dcnode-id="2104"><strong data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Udyavar Beach:</span></strong><span data-dcnode-id="2105" instrument_node=""> Pithrody Udyavar beach is popular for its long stretch of land between river and sea.</span></li><span data-dcnode-id="2103" instrument_node="">
</span><li data-dcnode-id="2099"><strong data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Padubidri Beach (24 km):</span></strong><span data-dcnode-id="2100" instrument_node=""> Let the cool shade of the rows of coconut trees unwind your nerves as you sit and enjoy the breeze from the sea at Padubidri Beach. With its calmness and serenity, Padubidri beach is your one-stop destination to relax and have fun. The beach is long and sandy with palm trees lining it. Even if you want a little adventure, Padubidri beach has you covered with numerous activities that include water scooter and banana boat rides. Padubidri end point is another interesting place, where the river meets the sea.</span></li><span data-dcnode-id="2098" instrument_node="">
</span><li data-dcnode-id="2094"><strong data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Kodi Beach:</span></strong><span data-dcnode-id="2095" instrument_node=""> Popular beach 7 kms from Kundapura city for relaxed evenings and sunset experiences.</span></li><span data-dcnode-id="2093" instrument_node="">
</span></ul><span data-dcnode-id="2091" instrument_node="">

</span><ul data-dcnode-id="1999"><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2062"><strong data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">White Water Rafting at Sitanadi: </span></strong><span data-dcnode-id="2063" instrument_node="">Sitanadi (Sita River) gives the opportunity for outdoor adventure enthusiasts to explore and experience the White Water Rafting in the Western Ghats. Originating in Agumbe – the free flowing River Sita travels around over 60 km, through the lush greenery of the forest to offer you an exciting white water rafting experience. There are varying options of rafting to choose from depending on the length of the course and the time you require to spend. Seethanadi Nature Camp offers the best location for your stay as well as rafting activities.</span></li><span data-dcnode-id="2061" instrument_node="">
</span><li data-dcnode-id="2055"><strong data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">St Mary’s Island(10 km): </span></strong><span data-dcnode-id="2058" instrument_node="">A National Geological Monument, St. Mary's Island is a quaint island just off the coast of Udupi. A 30-minute boat ride away from Malpe harbour, St. Mary's Island is a geological treasure and hosts some of the most beautiful beaches in the country. The island is around 300m long and 100m
wide. It is famous for its unique salt rock formations. Due to this geological importance, St Mary’s Island is declared as a National Geological Monument. Watching the sunset standing on the crystalline rocks is one of the most alluring experiences on the island. St. Mary’s Island still bears the cross that was placed by Vasco Da Gama in 1498.</span><strong data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">
</span></strong></li><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2050"><strong data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Kudlu Theertha:</span></strong><span data-dcnode-id="2051" instrument_node=""> Kudlu Theertha is a scenic waterfall amidst Western Ghats. Kudlu Theertha falls is also referred to as Sita falls and is located near Hebri in Udupi district. Kudlu Theertha falls is situated in Someshwara wildlife sanctuary area.</span></li><span data-dcnode-id="2049" instrument_node="">
</span><li data-dcnode-id="2044"><strong data-dcnode-id="2046"><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/hastha-shilpa-heritage-village/"><span data-dcnode-id="2048" instrument_node="">Hastha Shilpa Heritage Village: </span></a></strong><span data-dcnode-id="2045" instrument_node="">Hasta Shilpa, is an open-air museum which aims to preserve the traditional homes and artefacts of the coastal Karnataka region. Founded by the late Vijayanath Shenoy, a renowned heritage conservationist and antique collector who had at times saved many precious artifacts from garbage and waste dumps. His own house was his first museum which he later turned into a trust “Hastha Shilpa Trust” with like-minded people. Today, this museum, on about 6 acres of land, has restored around 30 traditional buildings for people to see. It offers a fascinating glimpse of the coastal Karnataka’s history and architecture.</span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2037"><strong data-dcnode-id="2039"><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/manipal-museum-of-anatomy-and-pathology/"><span data-dcnode-id="2042" instrument_node="">Manipal Museum of Anatomy &amp; Pathology</span></a><span data-dcnode-id="2040" instrument_node="">:</span></strong><span data-dcnode-id="2038" instrument_node=""> Manipal Museum of Anatomy &amp; Pathology houses 3000+ specimens and samples related to anatomy. Manipal is an education hub with a large number of educational institutes run by Manipal Academy of Higher Education (MAHE). It attracts more than twenty five thousand students every year from various countries who pursue medicine, dental sciences, engineering and business management.</span></li><span data-dcnode-id="2036" instrument_node="">
</span><li data-dcnode-id="2032"><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">End Point Manipal:</span></strong><span data-dcnode-id="2033" instrument_node=""> A scenic viewpoint and park near Manipal, 6 kms from Udupi</span></li><span data-dcnode-id="2031" instrument_node="">
</span><li data-dcnode-id="2027"><strong data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Dr. Kota Shivaram Karanth Theme Park, Kota (24 km): </span></strong><span data-dcnode-id="2028" instrument_node="">Kota, a small village in Udupi, is synonymous with renowned writer and Jananapeeth awardee Dr. Kota Shivaram Karanth, also known as ‘Kadala Teerada Bhargava’. Here, a theme park dedicated to him has been constructed that comprises a landscaped garden, a library, an art gallery, an anganawadi and an indoor auditorium. In the garden, there's a small pool with bronze statue of Dr. Karanth in the middle. Sculptures that represent some of the iconic characters of his novels also decorate this garden. The library has a collection of all the works of the author and also from his personal collections.</span></li><span data-dcnode-id="2026" instrument_node="">
</span><li data-dcnode-id="2022"><strong data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Kshtija Nesara Dhama:</span></strong><span data-dcnode-id="2023" instrument_node=""> A viewpoint and picnic centre overlooking Ottinene beach near Byndoor.</span></li><span data-dcnode-id="2021" instrument_node="">
</span><li data-dcnode-id="2017"><strong data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Belakal Theertha:</span></strong><span data-dcnode-id="2018" instrument_node=""> Belakal Theertha near Madur and Ganganadu Falls near Sirur are two lesser known waterfalls of Udupi district.</span></li><span data-dcnode-id="2016" instrument_node="">
</span><li data-dcnode-id="2009"><strong data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Barkur:</span></strong><span data-dcnode-id="2013" instrument_node=""> A town with historic significance has ruins of two forts of Vijayanagara era. More than a dozen temples, few dating back to 8</span><sup data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">th</span></sup><span data-dcnode-id="2010" instrument_node=""> century AD are located in Barkur.</span></li><span data-dcnode-id="2008" instrument_node="">
</span><li data-dcnode-id="2001"><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/kodachadri-hills/"><strong data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Kodachadri</span></strong></a><strong data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node=""> (110 km): </span></strong><span data-dcnode-id="2002" instrument_node="">The Kodachadri hill is a part of the Western Ghats and forms a lovely backdrop to the famous Kollur Mookambika Temple. Famed for its glorious sunrises and sunsets, this hill range is part of the Mookambika Temple Nature Reserve. The peak of Kodachadri (at an altitude of 1343 m above sea level) can be reached by a five-hour trek. Trekking in Kodachadri can be an adventurous and spiritual experience. On the western side, the hill descends steeply for about 1220 m, meeting the forests of Udupi district. The trek up to the ancient temple from this point involves a climb of 4 km through thick jungle trails. Kollur is an ideal base from which to explore the hills.</span></li><span data-dcnode-id="2000" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">
	                Religious Places	            </span></h6><span data-dcnode-id="1977" instrument_node="">
</span></div><span data-dcnode-id="1975" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1872"><span data-dcnode-id="1974" instrument_node="">
</span><ul data-dcnode-id="1876"><span data-dcnode-id="1973" instrument_node="">
</span><li data-dcnode-id="1968"><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/udupi-sri-krishna-temple/"><strong data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Udupi Sri Krishna Temple:</span></strong></a><span data-dcnode-id="1969" instrument_node=""> Sri Krishna Temple
Thousands of devotees throng this temple town to offer prayers to Lord Krishna. It is said that the Krishna idol here is the most beautiful idol of Lord Krishna. Lord Krishna is depicted here as a small boy (Balakrishna). The idol is not seen directly, but through a 9 holed window called the Navagraha Kitiki.
Another interesting attraction at this temple is the ‘Kanakana Kindi’ - a small window through which Lord Krishna is believed to have given darshan to his ardent devotee, saint Kanakadasa. According to legend, Kanakadasa was of a low caste and was not allowed entry to the temple. Undaunted, he went behind the temple and prayed to the Lord through a small crack in the wall. Pleased, the statue of Lord Krishna turned around and gave him darshan. Just adjacent is the Kanakadasa Mantapa, which houses a statue of the saint. There is a beautiful water tank nearby called Madhwa Sarovara with a little mantapa in the centre. The image of Lord Krishna is taken on a float during festivals. Udupi is a great centre of Sanskrit learning and the language is imparted through the Ashta Mathas (Eight Maths): Puttige, Pejavara, Palimaru, Adamaru, Shirur, Sodhe, Krishnapura and Kaniyuru, which are located around the temple.</span></li><span data-dcnode-id="1967" instrument_node="">
</span><li data-dcnode-id="1963"><strong data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Anantheshwara and Chandramouleshwara Temple: </span></strong><span data-dcnode-id="1964" instrument_node="">These 2 temples located nearby are much older than the celebrated Sri Krishna Temple. Anantheshwara Temple is where saint Madhwacharya received spiritual education. Located opposite is the Chandramouleshwara Temple.</span></li><span data-dcnode-id="1962" instrument_node="">
</span><li data-dcnode-id="1956"><strong data-dcnode-id="1958"><a data-dcnode-id="1960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/sri-mookambika-temple/"><span data-dcnode-id="1961" instrument_node="">Kollur Mookambika Temple (74 km)</span></a><span data-dcnode-id="1959" instrument_node="">:</span></strong><span data-dcnode-id="1957" instrument_node=""> Sri Mookambika Temple in Kollur, Udupi district attracts devotees from all parts of South India. The village of Kollur lies amid the green canopy of the Western Ghats, on the base of Kodachadri Hill. Here, the Mookambika Temple, one of the seven most sacred spots of Salvation, is dedicated to the Goddess of emotional power and strength. The temple has a gold plated crest and copper roofs. Adi Shankaracharya, the great philosopher, is said to have visited this temple to perform penance. Adi Shankaracharya is also believed to have consecrated the idol of Goddess Mookambika.</span></li><span data-dcnode-id="1955" instrument_node="">
</span><li data-dcnode-id="1946"><strong data-dcnode-id="1951"><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/chaturmukha-basadi/"><span data-dcnode-id="1954" instrument_node="">Chaturmukha Basadi Karkala</span></a><span data-dcnode-id="1952" instrument_node="">:</span></strong><span data-dcnode-id="1950" instrument_node=""> Chaturmukha Basadi is a popular 16</span><sup data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">th</span></sup><span data-dcnode-id="1947" instrument_node=""> century Jain temple in Karkala, a taluk headquarter and town in Udupi district in coastal Karnataka. Chaturmukha basadi is located on an elevated field in the middle of coconut plantation and paddy fields. Chaturmukha translates to “four faces”. Chaturmukha Basadi is open on all four sides, with four identical doorways all leading to inner sanctum- Gurba Gruha. Temple doorways feature various Jain Thirthankaras as well as Hindu gods and goddesses.
There is also a 700 year old stone temple dedicated to Lord Ananthapadmanabha (a form of Lord Vishnu). Nearby is St Lawrence Church at Attur, a catholic church christened after St. Lawrence and was built in 1839 in Karkala.</span></li><span data-dcnode-id="1945" instrument_node="">
</span><li data-dcnode-id="1941"><strong data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Karkala Gomateshwara:</span></strong><span data-dcnode-id="1942" instrument_node=""> Built in 1432, the towering 42ft monolith of Lord Gomateshwara, (the biggest one after the monolith at Shravanabelagola) standing atop a granite outcrop on the outskirts of the town, is the main attraction in Karkala.</span></li><span data-dcnode-id="1940" instrument_node="">
</span><li data-dcnode-id="1936"><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Varanga:</span></strong><span data-dcnode-id="1937" instrument_node=""> A scenic basadi in the centre of a pond, 40 kms from Udupi.</span></li><span data-dcnode-id="1935" instrument_node="">
</span><li data-dcnode-id="1928"><strong data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Mahalinga Temple Brahmavara: </span></strong><span data-dcnode-id="1932" instrument_node="">9</span><sup data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">th</span></sup><span data-dcnode-id="1929" instrument_node=""> century temple in Brahmavara, 12 kms from Udupi.</span></li><span data-dcnode-id="1927" instrument_node="">
</span><li data-dcnode-id="1923"><strong data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Ambalpadi Temple: </span></strong><span data-dcnode-id="1924" instrument_node="">Ambalpadi Temple is famous for the image of Lord Janardhana and draws a large number of devotees. A Mahakali shrine with a 5ft high wooden image is also found here.</span></li><span data-dcnode-id="1922" instrument_node="">
</span><li data-dcnode-id="1916"><strong data-dcnode-id="1918"><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/mount-rosary-church/"><span data-dcnode-id="1921" instrument_node="">Mount Rosary Church</span></a><span data-dcnode-id="1919" instrument_node="">: </span></strong><span data-dcnode-id="1917" instrument_node="">Mount Rosary Church is a roman catholic church in the coastal town of Udupi. Built in 1837, Mount Rosary church is very close to National Highway 66 and an important place of worship among Christian community in Udupi.</span></li><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1911"><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Basrur:</span></strong><span data-dcnode-id="1912" instrument_node=""> Nakhareshwara and Tuluveshwara temples</span></li><span data-dcnode-id="1910" instrument_node="">
</span><li data-dcnode-id="1906"><strong data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Mahisha Mardini Temple:&nbsp;</span></strong><span data-dcnode-id="1907" instrument_node="">
It is considered as one of the oldest temples in the region. Located in Shivalli village, the temple architecture resembles the style of Chaluckyan style of architecture. The garbhagriha is built of black stone and the statue of Goddess Mahisha Mardini is in a standing posture.</span></li><span data-dcnode-id="1905" instrument_node="">
</span><li data-dcnode-id="1898"><strong data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Kantheshwara Temple: </span></strong><span data-dcnode-id="1902" instrument_node="">A 10</span><sup data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">th</span></sup><span data-dcnode-id="1899" instrument_node=""> century temple in Kanthavara, 14 kms from Karkala town.</span></li><span data-dcnode-id="1897" instrument_node="">
</span><li data-dcnode-id="1893"><strong data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Kota:</span></strong><span data-dcnode-id="1894" instrument_node=""> Narasimhadeva, Mahadeva and Amriteshwari temples</span></li><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1888"><strong data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Koteshwara:</span></strong><span data-dcnode-id="1889" instrument_node=""> Popular for Kotilingeshwara temple</span></li><span data-dcnode-id="1887" instrument_node="">
</span><li data-dcnode-id="1883"><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Anegudde:</span></strong><span data-dcnode-id="1884" instrument_node=""> Popular Vinayaka temple in the district, located on a mini hill near Kumbhashi.</span></li><span data-dcnode-id="1882" instrument_node="">
</span><li data-dcnode-id="1878"><strong data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Makkekattu:</span></strong><span data-dcnode-id="1879" instrument_node=""> Known for Nandikeshwara temple and more popularly, its dolls.Few dolls are as high as 10-12 feet. Dolls represent various characters such as king, women, warrior, animals etc. Makkekattu is 24 kms from Udupi</span></li><span data-dcnode-id="1877" instrument_node="">
</span></ul><span data-dcnode-id="1875" instrument_node="">

</span><ul data-dcnode-id="1835"><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1844"><strong data-dcnode-id="1846"><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/someshwara-wildlife-sanctuary/"><span data-dcnode-id="1849" instrument_node="">Someshwara Wildlife Sanctuary (55 km)</span></a><span data-dcnode-id="1847" instrument_node="">:</span></strong><span data-dcnode-id="1845" instrument_node="">Someshwara Wildlife Sanctuary has been named after Lord “Someshwara” the presiding deity of the famous Someshwara Temple located within the limits of the sanctuary. It is situated in Karkala and Kundhapur Taluk of Udupi. With an area of about 314.25 sq. km., Someshwara Wildlife Sanctuary has semi-evergreen and evergreen forests. The Kudremukh National Park lies to the Southeast of this sanctuary. The Agumbe Ghat located inside this sanctuary receives average rainfall of about 8000 mm and thus called “Cherrapunji‎ of South India”. The state run Jungle Lodges and Resorts operates the Seethanadi Nature Camp in Hebri.</span></li><span data-dcnode-id="1843" instrument_node="">
</span><li data-dcnode-id="1837"><strong data-dcnode-id="1839"><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/mookambika-wildlife-sanctuary/"><span data-dcnode-id="1842" instrument_node="">Mookambika Wildlife Sanctuary</span></a><span data-dcnode-id="1840" instrument_node="">:</span></strong><span data-dcnode-id="1838" instrument_node="">Named after Goddess Mookambika the presiding deity of the famous Mookambika Temple at Kollur which is located at the heart of the Sanctuary. Mookambika Wildlife Sanctuary spans over 370.37 sq km and is thick with evergreen, semi-evergreen and moist deciduous forests of the Western Ghats, and small patches of teak plantations. Mookambika Wildlife Sanctuary forms a vital connecting link between Someshwara Wildlife Sanctuary located on the southern side and Sharavathi Wildlife Sanctuary located on the northern side.
The state run Jungle Lodges and Resorts operates the Anejhari Butterfly Camp which is located inside the sanctuary.</span></li><span data-dcnode-id="1836" instrument_node="">

</span><li data-dcnode-id="1786"><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Kodi Bengre:</span></strong><span data-dcnode-id="1787" instrument_node=""> A unique stretch of land accessible either by boat or road, with scenic views and beaches. A houseboat is also stationed here.</span></li><span data-dcnode-id="1785" instrument_node="">
</span><li data-dcnode-id="1781"><strong data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Pajaka Shetra:</span></strong><span data-dcnode-id="1782" instrument_node=""> Philosopher Sri Madhvacharya was born in Pajaka, 13 kms from Udupi.</span></li><span data-dcnode-id="1780" instrument_node="">

</span><li data-dcnode-id="1768"><strong data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Kallianpur:</span></strong><span data-dcnode-id="1769" instrument_node=""> Known for Vijayanagara era fort ruins, Milagres Church and annual Dhakke Bali ritual</span></li><span data-dcnode-id="1767" instrument_node="">
</span><li data-dcnode-id="1763"><strong data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Shankaranarayana:</span></strong><span data-dcnode-id="1764" instrument_node=""> Known for Shankaranarayana temple and scenic views of Western Ghats.</span></li><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1758"><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Suralu:</span></strong><span data-dcnode-id="1759" instrument_node=""> Known for a beautiful palace with several ornate pieces of wooden sculptures</span></li><span data-dcnode-id="1757" instrument_node="">

	                Art &amp; Festivals	            </span></h6><span data-dcnode-id="1734" instrument_node="">
</span></div><span data-dcnode-id="1732" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1675"><span data-dcnode-id="1731" instrument_node="">
</span><ul data-dcnode-id="1679"><span data-dcnode-id="1730" instrument_node="">
</span><li data-dcnode-id="1724"><strong data-dcnode-id="1726"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/yakshagana/"><span data-dcnode-id="1729" instrument_node="">Yakshagana</span></a><span data-dcnode-id="1727" instrument_node="">:</span></strong><span data-dcnode-id="1725" instrument_node=""> Yakshagana is a traditional folk dance form popular in coastal Karnataka districts. Watching Yakshagana performance is a treat to the senses due to the amalgamation of unique costumes, rhythmic music and unique performance involving dialogues, music, dance and action.</span></li><span data-dcnode-id="1723" instrument_node="">
</span><li data-dcnode-id="1717"><strong data-dcnode-id="1719"><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/huli-vesha/"><span data-dcnode-id="1722" instrument_node="">Huli Vesha</span></a><span data-dcnode-id="1720" instrument_node="">:</span></strong><span data-dcnode-id="1718" instrument_node=""> Huli Vesha or Tiger faced dance is a dance form unique to coastal Karnataka. Huli vesha is performed by local youth during the navarathri festivals (the 9 nights long festival which often falls in the month of October).</span></li><span data-dcnode-id="1716" instrument_node="">
</span><li data-dcnode-id="1712"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Vitla Pindi:</span></strong><span data-dcnode-id="1713" instrument_node=""> Vitla Pindi, also known as Mosaru Kudike is a popular festival in Udupi city, coastal Karnataka. Vitla Pindi helps people recall childhood antics of Lord Krishna and is celebrated during Srikrishna Janmastami, which falls during the month of August-September.</span></li><span data-dcnode-id="1711" instrument_node="">
</span><li data-dcnode-id="1707"><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Centre for Folk, Performing Arts, Udupi:</span></strong><span data-dcnode-id="1708" instrument_node="">
The centre aims at documenting, preserving and disseminating the folk theatre of Karnataka. This initiative is funded by the Ford Foundation and supported by the Academy of General Education, Manipal and MGM College Trust. The centre houses information on almost all forms of folk worship
traditions, folk medicine traditions, folk music and cultural beliefs of the State. It maintains an archival treasure house consisting of videos, documentaries, slides, photographs.
and audio tapes.</span></li><span data-dcnode-id="1706" instrument_node="">
</span><li data-dcnode-id="1700"><strong data-dcnode-id="1702"><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/nagamandala/"><span data-dcnode-id="1705" instrument_node="">Nagamandala</span></a><span data-dcnode-id="1703" instrument_node="">:</span></strong><span data-dcnode-id="1701" instrument_node=""> A popular ritual of worshipping snake god</span></li><span data-dcnode-id="1699" instrument_node="">
</span><li data-dcnode-id="1695"><strong data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Maranakatte Temple Festival:</span></strong><span data-dcnode-id="1696" instrument_node=""> 30 kms from Kundapura, Maranakatte Brahmalingeshwara temple celebrates an annual festival each year that draws devotees from all parts of the state. Maranakatte festival is held for about 3 days during sankranti time (mid January).</span></li><span data-dcnode-id="1694" instrument_node="">
</span><li data-dcnode-id="1688"><strong data-dcnode-id="1690"><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/udupi-paryaya-utsava/"><span data-dcnode-id="1693" instrument_node="">Paryaya Festival</span></a><span data-dcnode-id="1691" instrument_node="">:</span></strong><span data-dcnode-id="1689" instrument_node=""> The colourful Paryaya Festival, where officiating priests from one of the Ashta Mathas hand over their responsibilities to other pontiffs, beckons thousands of devotees from all over the country every alternate year.</span></li><span data-dcnode-id="1687" instrument_node="">
</span><li data-dcnode-id="1681"><strong data-dcnode-id="1683"><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/kambala/"><span data-dcnode-id="1686" instrument_node="">Kambala</span></a><span data-dcnode-id="1684" instrument_node="">: </span></strong><span data-dcnode-id="1682" instrument_node="">Famed buffalo race event where well nurtured buffalos race in a slushy field</span></li><span data-dcnode-id="1680" instrument_node="">
</span></ul><span data-dcnode-id="1678" instrument_node="">

</span><li data-dcnode-id="1647"><strong data-dcnode-id="1649"><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/patrode/"><span data-dcnode-id="1652" instrument_node="">Patrode</span></a><span data-dcnode-id="1650" instrument_node="">:</span></strong><span data-dcnode-id="1648" instrument_node=""> An itchy, tangy dish made from colocasia leaves one should not miss when in Udupi.</span></li><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1640"><strong data-dcnode-id="1642"><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/neer-dosa/"><span data-dcnode-id="1645" instrument_node="">Neer Dose</span></a><span data-dcnode-id="1643" instrument_node="">:</span></strong><span data-dcnode-id="1641" instrument_node=""> A simple but tasty dosa variant made from soaked rice, served with jaggery and coconut grating.</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1633"><strong data-dcnode-id="1635"><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/destinations/banana-bun/"><span data-dcnode-id="1638" instrument_node="">Banana Bun</span></a><span data-dcnode-id="1636" instrument_node="">: </span></strong><span data-dcnode-id="1634" instrument_node="">Sweet and tasty bun, a perfect snack or quick bite.</span></li><span data-dcnode-id="1632" instrument_node="">
</span><li data-dcnode-id="1628"><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Koli Saaru (Chicken-Rasam):</span></strong><span data-dcnode-id="1629" instrument_node=""> For the non-vegetarians, a rasam made by cooking chicken and spicy masala.</span></li><span data-dcnode-id="1627" instrument_node="">
</span><li data-dcnode-id="1623"><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Gadbad Ice cream:</span></strong><span data-dcnode-id="1624" instrument_node=""> A multi layered ice cream with dry fruits- colourful, tasty and unique.</span></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1618"><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Mundakki Upkari:</span></strong><span data-dcnode-id="1619" instrument_node=""> A tasty snack made from puffed rice, spiced up with oil and chili powder.</span></li><span data-dcnode-id="1617" instrument_node="">
</span></ul><span data-dcnode-id="1615" instrument_node="">

</span><h5 class="mkdf-location-excerpt" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">
</span></h5><span data-dcnode-id="1589" instrument_node="">
</span><div class="mkdf-location-content" data-dcnode-id="1552"><span data-dcnode-id="1588" instrument_node="">
</span><strong data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Udupi is well connected by rail and road network from all over Karnataka. Udupi is 400 kms from Bengaluru and 60 kms from Mangaluru.</span></strong><span data-dcnode-id="1585" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1579"><span class="reach-img" data-dcnode-id="1582"><span data-dcnode-id="1583" style="font-weight: 400;"><img alt="" class="alignnone size-full wp-image-6909" data-dcnode-id="1584" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-01.png&amp;raw" width="50"></span></span><span class="reach-cont" data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node=""> Mangaluru is the nearest airport 60 kms away.</span></span></div><span data-dcnode-id="1578" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1572"><span class="reach-img" data-dcnode-id="1575"><span data-dcnode-id="1576" style="font-weight: 400;"><img alt="" class="alignnone size-full wp-image-6908" data-dcnode-id="1577" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-02.png&amp;raw" width="50"></span></span><span class="reach-cont" data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Udupi city has a railway station on Konkan railway line. Barkur, Kundapura and Baindoor are other major stations.</span></span></div><span data-dcnode-id="1571" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1565"><span class="reach-img" data-dcnode-id="1568"><span data-dcnode-id="1569" style="font-weight: 400;"><img alt="" class="alignnone size-full wp-image-6907" data-dcnode-id="1570" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-03.png&amp;raw" width="50"></span></span><span class="reach-cont" data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Udupi has excellent bus connectivity from all parts of Karnataka.</span></span></div><span data-dcnode-id="1564" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1558"><span class="reach-img" data-dcnode-id="1561"><span data-dcnode-id="1562" style="font-weight: 400;"><img alt="" class="alignnone size-full wp-image-6906" data-dcnode-id="1563" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-04.png&amp;raw" width="50"></span></span><span class="reach-cont" data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node=""> Udupi district has well connected private bus services to almost all major towns and villages. Taxis can be hired in major cities such as Udupi, Kundapura, Karkala and Baindoor to explore Udupi. Autos are best suited for local commutes. Self-drive bikes and car rentals are available in Udupi and Mangaluru. </span></span></div><span data-dcnode-id="1557" instrument_node="">

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

ನೈಸರ್ಗಿಕ ಪರಿಸರದ ನಡುವೆ ವಿಭಿನ್ನ ಆವೃತ್ತಿ ಹೊಂದಿರುವ ಮಿರ್ಜಾನ್ ಕೋಟೆ 16 ಶತಮಾನಗಳ ಸಾಂಸ್ಕೃತಿಕ ವೈಭವ ಮತ್ತು ವಿಶಿಷ್ಟ ಇತಿಹಾಸವನ್ನು ಹೊಂದಿದೆ. ಈ ಕೋಟೆಯನ್ನು &quot;ಮೆಣಸಿನ ರಾಣಿ &quot; ಎಂದು ಕರೆಯಲ್ಪಡುವ ಗೆರೊಪ್ಪಾ ರಾಣಿ ಚೆನ್ನೈ ಭೈರವಿ ದೇವಿ ನಿರ್ಮಿಸಿದಳು. ಎತ್ತರದ ಛಾವಣಿಗಳು ಮತ್ತು ಬುರುಜುಗಳನ್ನು ಹೊಂದಿರುವ ಕೋಟೆಯು ಕಂದಕಗಳು, ರಹಸ್ಯ ಮಾರ್ಗಗಳು, ಕಾಲುವೆಗಳು ಮತ್ತು 4 ಮುಖ್ಯ ಪ್ರವೇಶ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದ್ದು ಕೋಟೆಯು ಪ್ರಸಿದ್ಧ ವಾಸ್ತುಶಿಲ್ಪದ ಅದ್ಭುತವಾಗಿದೆ.

Mirjan Fort 

Mirjan Fort boasts 16 centuries of cultural splendor and unique history, with its various interpretation of the natural environment. Queen Bhairavi Devi of Geroppa, often known as the &quot;Pepper Queen,&quot; constructed the fort. With trenches, secret passages, canals, and four main entrances, the fort is a renowned architectural marvel with lofty ceilings and towers.

To know more info : https://www.karnatakatourism.org/tour-item/mirjan-fort/

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.

World Heritage Day

Karnataka has two UNESCO World Heritage Sites, Hampi, and Pattadakal. The remains of the historic Vijayanagara Empire in Hampi are seen as an open museum. The Chalukyas in the 7th and 8th centuries witnessed the richness and timeless glory. The Pattadakal stone temple complex is a mixture of both Dravidian and Aryan styles of architecture. Let's pledge and save our heritage as it is our primary duty to preserve our cultural heritage.

Gomteshwara or Baghubali

The monolithic statue of Baghubali or Gomteshwara, 57 feet in the Vindhyagiri hill, was built by Chavundaraya, the commander of the Ganga dynasty in 981 AD. Mahamastakabhisheka festival is a long celebration that takes place every twelve years.

The specialty of Jain art, architecture, religion and culture can be seen in Shravanabelagola

ಹಳೇಬೀಡು ದೇವಸ್ಥಾನವು ಹಳೇಬೀಡಿನಲ್ಲಿ ವಿಷ್ಣುವರ್ಧನ ಮತ್ತು ಎರಡನೇ ಬಲ್ಲಾಳ ಇವರುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿರುವ ಹೊಯ್ಸಳೇಶ್ವರ ಮತ್ತು ಕೇದಾರೇಶ್ವರ ಜೋಡಿದೇವಸ್ಥಾನಗಳು, ದೇಗುಲ ವಾಸ್ತು ಶಿಲ್ಪಕ್ಕೆ ಇನ್ನೊಂದು ಅತ್ಯುತ್ತಮ ಉದಾಹರಣೆಯಾಗಿದೆ. ರಾಮಾಯಣ, ಮಹಾಭಾರತ, ಭಾಗವತಗಳಲ್ಲಿನ ದೃಷ್ಟಾಂತಗಳನ್ನು ಈ ದೇಗುಲಗಳ ಹೊರಗೋಡೆಗಳ ಮೇಲೆ ಚಿತ್ರಿಸಲಾಗಿದೆ. ಇಲ್ಲಿ ಕಲ್ಲಿನ ಮೇಲೆ ಕೊರೆದಿರುವ ದೃಷ್ಟಾಂತ ಕಥೆಗಳು ಶಿಲ್ಪಕಲೆಯ ದಕ್ಷತೆ, ನೈಪುಣ್ಯತೆ ಎಂಥವರನ್ನೂ ಮರುಳುಗೊಳಿಸುವಂತಿವೆ. 

Hoysaleshwara Temple.

Halebidu temple is another great example of temple architecture the twin temples of Hoysaleshwara, Kedareshwara built by Vishnuvardhana and Ballala-II at Halabidu. Sequences from Ramayana, Mahabharatha &amp; Bhagavatha are depicted on the outer walls of these temples. The efficiency and experience of the sculpture, who had carved these stories in stone is bewitching.

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

                                                ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನ

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

ನೈಸರ್ಗಿಕ ಪರಿಸರದ ನಡುವೆ ವಿಭಿನ್ನ ಆವೃತ್ತಿ ಹೊಂದಿರುವ ಮಿರ್ಜಾನ್ ಕೋಟೆ 16 ಶತಮಾನಗಳ ಸಾಂಸ್ಕೃತಿಕ ವೈಭವ ಮತ್ತು ವಿಶಿಷ್ಟ ಇತಿಹಾಸವನ್ನು ಹೊಂದಿದೆ. ಈ ಕೋಟೆಯನ್ನು &quot;ಮೆಣಸಿನ ರಾಣಿ &quot; ಎಂದು ಕರೆಯಲ್ಪಡುವ ಗೆರೊಪ್ಪಾ ರಾಣಿ ಚೆನ್ನೈ ಭೈರವಿ ದೇವಿ ನಿರ್ಮಿಸಿದಳು. ಎತ್ತರದ ಛಾವಣಿಗಳು ಮತ್ತು ಬುರುಜುಗಳನ್ನು ಹೊಂದಿರುವ ಕೋಟೆಯು ಕಂದಕಗಳು, ರಹಸ್ಯ ಮಾರ್ಗಗಳು, ಕಾಲುವೆಗಳು ಮತ್ತು 4 ಮುಖ್ಯ ಪ್ರವೇಶ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದ್ದು ಕೋಟೆಯು ಪ್ರಸಿದ್ಧ ವಾಸ್ತುಶಿಲ್ಪದ ಅದ್ಭುತವಾಗಿದೆ.

Mirjan Fort 

Mirjan Fort boasts 16 centuries of cultural splendor and unique history, with its various interpretation of the natural environment. Queen Bhairavi Devi of Geroppa, often known as the &quot;Pepper Queen,&quot; constructed the fort. With trenches, secret passages, canals, and four main entrances, the fort is a renowned architectural marvel with lofty ceilings and towers.

To know more info : https://www.karnatakatourism.org/tour-item/mirjan-fort/

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

</span><img alt="ರಾಜ ಸಮಾಧಿ (ಗದ್ದಿಗೆ)

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.

</span><img alt="ವಿಶ್ವ ಪರಂಪರೆಯ ದಿನ 

ಕರ್ನಾಟಕವು ಎರಡು ಯುನೆಸ್ಕೋ ವಿಶ್ವ ಪರಂಪರೆಯ ತಾಣಗಳಾದ ಹಂಪಿ ಮತ್ತು ಪಟ್ಟದಕಲ್ಲು ಹೊಂದಿದೆ. ಐತಿಹಾಸಿಕ ವಿಜಯನಗರ ಸಾಮ್ರಾಜ್ಯದ ಹಂಪಿಯಲ್ಲಿರುವ ಅವಶೇಷಗಳು ತೆರೆದ ವಸ್ತುಸಂಗ್ರಹಾಲಯವಾಗಿದೆ. 7 ಮತ್ತು 8ನೇ ಶತಮಾನದಲ್ಲಿ ಚಾಲುಕ್ಯರ ಶ್ರೀಮಂತಿಕೆ ಮತ್ತು ಕಾಲಾತೀತ ವೈಭವಕ್ಕೆ ಸಾಕ್ಷಿಯಾಗಿದೆ. ಪಟ್ಟದಕಲ್ಲು ತನ್ನ ದೇವಾಲಯದ ಸಂಕೀರ್ಣದಲ್ಲಿ ದ್ರಾವಿಡ, ಆರ್ಯನ್ ಎರಡೂ ಶೈಲಿಗಳ ಮಿಶ್ರಣದಿಂದ ದೇವಾಲಯದ ವಾಸ್ತುಶಿಲ್ಪವನ್ನು ಹೊಂದಿದೆ. ನಮ್ಮ ಈ ಸಾಂಸ್ಕೃತಿಕ ಪಾರಂಪರಿಕತೆಯನ್ನು ಕಾಪಾಡುವುದು ನಮ್ಮ ಆದ್ಯತೆಯ ಕರ್ತವ್ಯವಾಗಿದೆ.

World Heritage Day

Karnataka has two UNESCO World Heritage Sites, Hampi, and Pattadakal. The remains of the historic Vijayanagara Empire in Hampi are seen as an open museum. The Chalukyas in the 7th and 8th centuries witnessed the richness and timeless glory. The Pattadakal stone temple complex is a mixture of both Dravidian and Aryan styles of architecture. Let's pledge and save our heritage as it is our primary duty to preserve our cultural heritage.

To know more info : https://www.karnatakatourism.org/world-heritage-week/

ವಿಂದ್ಯಗಿರಿ ಬೆಟ್ಟದಲ್ಲಿರುವ 57 ಅಡಿಯ ಶ್ರವಣಬೆಳಗೊಳದ ಬಾಹುಬಲಿ ಅಥವಾ ಗೊಮ್ಮಟೇಶ್ವರ ಏಕಶಿಲಾ ಮೂರ್ತಿಯನ್ನು ಗಂಗ ಸಾಮ್ರಾಜ್ಯದ ಸೇನಾನಿಯಾದ ಚಾವುಂಡರಾಯನು ಕ್ರಿ.ಶ.981ರಲ್ಲಿ ನಿರ್ಮಿಸಿದನು. ಮಹಾಮಸ್ತಕಾಭಿಷೇಕ ಉತ್ಸವವು, ಹನ್ನೆರಡು ವರ್ಷಗಳಿಗೊಮ್ಮೆ ಜರುಗುವ ಒಂದು ಸುದೀರ್ಘವಾದ ಆಚರಣೆಯಾಗಿದೆ. 

ಜೈನರ ಕಲೆ, ವಾಸ್ತುಶಿಲ್ಪ, ಧರ್ಮ, ಮತ್ತು ಸಂಸ್ಕೃತಿಯ ವಿಶೇಷತೆಯನ್ನು ಶ್ರವಣಬೆಳಗೊಳದಲ್ಲಿ ಕಾಣಬಹುದು 

Gomteshwara or Baghubali

The monolithic statue of Baghubali or Gomteshwara, 57 feet in the Vindhyagiri hill, was built by Chavundaraya, the commander of the Ganga dynasty in 981 AD. Mahamastakabhisheka festival is a long celebration that takes place every twelve years.

The specialty of Jain art, architecture, religion and culture can be seen in Shravanabelagola

To know more info : https://www.karnatakatourism.org/tour-item/shravanabelagola/

ಹಳೇಬೀಡು ದೇವಸ್ಥಾನವು ಹಳೇಬೀಡಿನಲ್ಲಿ ವಿಷ್ಣುವರ್ಧನ ಮತ್ತು ಎರಡನೇ ಬಲ್ಲಾಳ ಇವರುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿರುವ ಹೊಯ್ಸಳೇಶ್ವರ ಮತ್ತು ಕೇದಾರೇಶ್ವರ ಜೋಡಿದೇವಸ್ಥಾನಗಳು, ದೇಗುಲ ವಾಸ್ತು ಶಿಲ್ಪಕ್ಕೆ ಇನ್ನೊಂದು ಅತ್ಯುತ್ತಮ ಉದಾಹರಣೆಯಾಗಿದೆ. ರಾಮಾಯಣ, ಮಹಾಭಾರತ, ಭಾಗವತಗಳಲ್ಲಿನ ದೃಷ್ಟಾಂತಗಳನ್ನು ಈ ದೇಗುಲಗಳ ಹೊರಗೋಡೆಗಳ ಮೇಲೆ ಚಿತ್ರಿಸಲಾಗಿದೆ. ಇಲ್ಲಿ ಕಲ್ಲಿನ ಮೇಲೆ ಕೊರೆದಿರುವ ದೃಷ್ಟಾಂತ ಕಥೆಗಳು ಶಿಲ್ಪಕಲೆಯ ದಕ್ಷತೆ, ನೈಪುಣ್ಯತೆ ಎಂಥವರನ್ನೂ ಮರುಳುಗೊಳಿಸುವಂತಿವೆ. 

Hoysaleshwara Temple.

Halebidu temple is another great example of temple architecture the twin temples of Hoysaleshwara, Kedareshwara built by Vishnuvardhana and Ballala-II at Halabidu. Sequences from Ramayana, Mahabharatha &amp; Bhagavatha are depicted on the outer walls of these temples. The efficiency and experience of the sculpture, who had carved these stories in stone is bewitching.

Halebidu temple is another great example of temple architecture the twin temples of Hoysaleshwara, Kedareshwara built by Vishnuvardhana and Ballala-II at Halabidu. Sequences from Ramayana, Mahabharatha &amp; Bhagavatha are depicted on the outer walls of these temples. The efficiency and experience of the sculpture, who had carved these stories in stone is bewitching.
