</span><article class="mkdf-tour-item-wrapper post-7059 tour-item type-tour-item status-publish has-post-thumbnail hentry tour-category-districts" data-dcnode-id="1069"><span data-dcnode-id="1946" instrument_node="">

</span><h3 class="mkdf-tour-item-title" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">
</span></h3><span data-dcnode-id="1941" instrument_node="">
</span><h5 class="mkdf-tour-item-price-holder" data-dcnode-id="1933"><span data-dcnode-id="1940" instrument_node="">

</span></h5><span data-dcnode-id="1932" instrument_node="">
</span></div><span data-dcnode-id="1930" instrument_node="">
</span><div class="mkdf-info-section-part mkdf-tour-item-content" data-dcnode-id="1878"><span data-dcnode-id="1929" instrument_node="">
</span><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1893"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1894"><div class="vc_column-inner" data-dcnode-id="1895"><div class="wpb_wrapper" data-dcnode-id="1896"><span data-dcnode-id="1928" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1898"><span data-dcnode-id="1927" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1900"><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1925" instrument_node="">Belagavi was originally known as Velugrama or Venugrama as per historical records and it literally meant “bamboo village”. Venu stands for bamboo which is found abundantly in these areas. Belagavi is surrounded by Uttara Kannada and </span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/dharwad/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1924" instrument_node="">Dharwad</span></a><span data-dcnode-id="1922" instrument_node=""> in the south, </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/bagalkote/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1921" instrument_node="">Bagalkote</span></a><span data-dcnode-id="1919" instrument_node=""> and Gadag in the east, Maharashtra state in the north and Goa state in the west. Belagavi is one of the oldest cities of Karnataka and is the largest in terms of size. It lies in a zone of cultural transition between Karnataka, Maharashtra and Goa with antiquity clearly traceable up to 2nd Century AD. Due to its proximity to the states of Maharashtra and Goa, Belagavi has acquired a distinct cultural flavour of these states and blended it with the local Kannada culture to create a unique heritage. The principal rivers of the district are the Krishna, the Ghataprabha and the Malaprabha.</span></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Belagavi is synonymous with India’s freedom struggle. The most notable personality from Belagavi is the brave Kittur Rani Chennamma, the famed lady warrior who fought against the British to protect her kingdom. Belagavi was chosen as the venue of the 39th session of Indian National Congress (INC) in December 1924 under the Presidency of Mahatma Gandhiji. The session left a landmark in the city called the “Congress well” which was the source of supplying water to the many delegates.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">This district has a distinguished presence in different fields like art, literature, spirituality, education, industry and sports. The Visveswaraiah Technological University (VTU) is located here; all technical and engineering colleges in Karnataka State come under this University.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">And endowed with a rich religious and historical heritage, Belagavi offers visitors many diverse touristic options like heritage monuments, enchanting hill-ranges and deep rugged rocky valleys covered by evergreen forests. The city is widely known for its delicious Belagavi Kunda and Karadantu which is a must try delicacy. It is also known for its toy-making craft – Gokak toys, which exists even today. Varieties of wood are used to carve out exquisite pieces of art. Toys of items like fruits, vegetables, animals, birds, etc are usually carved which makes for a wonderful souvenir.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1902"><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">For further information, visit the official district website </span></strong><span data-dcnode-id="1903" style="text-decoration: underline;"><a data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//belagavi.nic.in/en/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1905" instrument_node="">click here!</span></a></span></p><span data-dcnode-id="1901" instrument_node="">
</span></div><span data-dcnode-id="1899" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">
	                Tourist Attractions	            </span></h6><span data-dcnode-id="1833" instrument_node="">
</span></div><span data-dcnode-id="1831" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1768"><span data-dcnode-id="1830" instrument_node="">
</span><ul data-dcnode-id="1772"><span data-dcnode-id="1829" instrument_node="">
</span><li data-dcnode-id="1825"><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Congress Well: </span></strong><span data-dcnode-id="1826" instrument_node="">Belgaum was chosen as the venue of the 39th session of Indian National Congress (INC) in December 1924 under the President ship of Mahatma Gandhiji. Notably, this was the only session of the INC that was presided over by the Gandhiji himself and the only session held in Karnataka. The session left another landmark in the city in the form of the “Congress well" which was source of supplying water to the many delegates who turned up to attend the 1924 session.</span></li><span data-dcnode-id="1824" instrument_node="">
</span><li data-dcnode-id="1820"><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Ghataprabha Bird Sanctuary: </span></strong><span data-dcnode-id="1821" instrument_node="">Located in Gokak taluk, this sanctuary is in an area about 29 sq km and is enclosed by the Ghataprabha River. This sanctuary has many migratory winged visitors; the more famed ones include the Demoiselle Crane and European White Stork. The ideal time for bird enthusiasts would be November to March as it is the nesting season for many of these birds.</span></li><span data-dcnode-id="1819" instrument_node="">
</span><li data-dcnode-id="1814"><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/gokak-falls/"><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Gokak Falls</span></strong></a><span data-dcnode-id="1815" instrument_node="">: Gokak Falls is 6 km away from Gokak town and gets its name from the Goki trees found in abundance in these areas. It resembles the Niagara Falls due to its features like the fall, shape etc. Here, River Ghataprabha takes a leap of 52 metres over the sand-stone cliff amidst a picturesque gorge of the rugged valley, making a beautiful sight. This place has the credit of generating electricity for the first time in the country in about 1887. A prime attraction of the Gokak Falls is the hanging 200-m-long bridge that lies 14 m above the bedrock. Tourists can also visit monuments on both sides of the rocky gorge which include temples of Goddess Durga, Lord Shanmukha and Lord Mahalingeshwara built in the traditional Chalukyan style of architecture.</span></li><span data-dcnode-id="1813" instrument_node="">
</span><li data-dcnode-id="1809"><strong data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Malaprabha Dam: </span></strong><span data-dcnode-id="1810" instrument_node="">Malaprabha dam, also known as Navilutheertha dam is Karnataka’s shortest dam (only about 40 meters wide and only four gates) and tourist attraction in Belagavi district. Malaprabha dam provides drinking water to nearby towns such as Belagavi and Dharawada.</span></li><span data-dcnode-id="1808" instrument_node="">
</span><li data-dcnode-id="1800"><strong data-dcnode-id="1804"><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/godachinamalki-falls/"><span data-dcnode-id="1807" instrument_node="">Godachinamalki Falls</span></a><span data-dcnode-id="1805" instrument_node="">: </span></strong><span data-dcnode-id="1803" instrument_node="">Located around 15 km away from Gokak is the beautiful Godachinmalki Falls, also known as Markandeya Falls, as it is located in the Markandeya River. The Falls is actually located in a rugged valley, approachable from Godachinmalki village by walking through an irregular forest route for about 2.5 km. The Markandeya takes a first jump from a height of about 25 metres and flows into a rocky valley and after a short distance from here it takes a second jump from a height of about 18 metres. Later, it joins the Ghataprabha River. June to September is the ideal time to visit this Falls in all its glory.</span><strong data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">
</span></strong></li><span data-dcnode-id="1799" instrument_node="">
</span><li data-dcnode-id="1795"><strong data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Navilutirtha:</span></strong><span data-dcnode-id="1796" instrument_node=""> Navilutirtha located in Saundatti is a low valley situated in between the two hills, is an enchanting place. Long ago, it is told that the place was full of peacocks, frequently flocking the Malaprabha basin. And thus, the place was named Navilutirtha. Presently, the place has a dam built across the Malaprabha which was completed in 1975 creating the Renuka Sagar reservoir.</span></li><span data-dcnode-id="1794" instrument_node="">
</span><li data-dcnode-id="1790"><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Dhupdal: </span></strong><span data-dcnode-id="1791" instrument_node="">Dhupdal is a popular dam in Belagavi district, close to Gokak falls. Dhupdal is 72 kms from Belagavi city and 8 kms from Gokak Falls.</span></li><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1785"><strong data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Barapede Caves: </span></strong><span data-dcnode-id="1786" instrument_node="">Natural caves known as breeding area for bats, located near Bhimgad.</span></li><span data-dcnode-id="1784" instrument_node="">
</span><li data-dcnode-id="1779"><strong data-dcnode-id="1781"><strong data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Rakaskop: </span></strong></strong><span data-dcnode-id="1780" instrument_node="">Rakaskop is around 15 km from Belagavi and it literally means a hamlet of a rakkasa (giant), who is stated to have lived on a hillock near this village. A laterite cave on the hillock resembles a huge seated human figure which is believed to be the rakkasa. Here a dam is built across the Markandeya River which supplies drinking water to Belagavi. The reservoir is visible from this hillock, which be reached by climbing steps behind the reservoir. A panoramic view of the reservoir and a stunning view of surrounding village landscape can be had from this hillock.</span></li><span data-dcnode-id="1778" instrument_node="">
</span><li data-dcnode-id="1774"><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Gokak Toys: </span></strong><span data-dcnode-id="1775" instrument_node="">In Gokak, local artisans create bright and colorful wooden toys mainly in the form of fruits, vegetables, animals and birds. This craft is believed to be at least 200 years old. Here, the toys are made using a specialised soft variety of wood usually hariwala, polki, and hale wood.</span></li><span data-dcnode-id="1773" instrument_node="">
</span></ul><span data-dcnode-id="1771" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">
	                Adventure/Activities	            </span></h6><span data-dcnode-id="1750" instrument_node="">
</span></div><span data-dcnode-id="1748" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1717"><span data-dcnode-id="1747" instrument_node="">
</span><ul data-dcnode-id="1721"><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1741"><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/sada-falls-trek/"><strong data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Sada Falls Trek: </span></strong></a><span data-dcnode-id="1742" instrument_node="">Sada waterfall is a mystic, offbeat waterfall deep in the forests of Western Ghats, on the Karnataka-Goa border. A guided trek to Sada Falls is a highly recommended activity in Belagavi district. While road network is available till Sada village, the last few kms till Sada waterfall need to be covered on foot. Trekking distance could vary between 8 to 18 kms depending on starting point and trail used. Sada Falls trek is medium to high complexity trek involving crossing of streams, negotiating boulders and possibly battling the leeches (during monsoon season). Sada waterfall is 200 meters tall and offers breathtaking views in between two big hills.</span></li><span data-dcnode-id="1740" instrument_node="">
</span><li data-dcnode-id="1736"><strong data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Vajrapoha Falls:</span></strong><span data-dcnode-id="1737" instrument_node=""> Located 23 kms from Khanapur inside Jamboti forest, accessible via trekking.</span></li><span data-dcnode-id="1735" instrument_node="">
</span><li data-dcnode-id="1728"><strong data-dcnode-id="1730"><strong data-dcnode-id="1731"><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/bhimgad-wildlife-sanctuary/"><span data-dcnode-id="1734" instrument_node="">Bhimgad Wildlife Sanctuary</span></a><span data-dcnode-id="1732" instrument_node="">: </span></strong></strong><span data-dcnode-id="1729" instrument_node="">Bhimgad Wildlife Sanctuary is located in Khanapur taluk and is spread over an area of around 190 sq km. This sanctuary is known for the Barapede caves, the only known breeding area of the Wroughton’s Free-tailed Bat, a threatened species on the verge of extinction. The sanctuary is also home to other species like the Velvet-fronted Nuthatch, Malabar Grey Hornbill, Imperial Pigeon, Emerald Dove and the elusive Malabar Trogon.</span></li><span data-dcnode-id="1727" instrument_node="">
</span><li data-dcnode-id="1723"><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Belgaum Golf Course:</span></strong><span data-dcnode-id="1724" instrument_node=""> Located nearby to Bhimgad Adventure Camp, a property of the state-run Jungle Lodges &amp; Resorts, the Belgaum Golf Course is perhaps the only course available to the public in the North Karnataka region. The Golf Course and Club, set up by the Belgaum Golf Association at Desur, is an 18-hole Golf Course. This is the first public initiative for such facilities in the whole of the Northern Karnataka-Goa region.</span></li><span data-dcnode-id="1722" instrument_node="">
</span></ul><span data-dcnode-id="1720" instrument_node="">
</span><div data-dcnode-id="1719" style="display: none;"></div><span data-dcnode-id="1718" instrument_node=""> </span></div><span data-dcnode-id="1716" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">
	                Heritage Sites	            </span></h6><span data-dcnode-id="1699" instrument_node="">
</span></div><span data-dcnode-id="1697" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1630"><span data-dcnode-id="1696" instrument_node="">
</span><ul data-dcnode-id="1634"><span data-dcnode-id="1695" instrument_node="">
</span><li data-dcnode-id="1691"><strong data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Belagavi Fort: </span></strong><span data-dcnode-id="1692" instrument_node="">It is an ancient pre-muslim monument where temples and mosques co-exist in perfect harmony, though not much of the original structure remains. The fort was believed to be built in the 12th century AD by the local Ratta rulers. It was renovated and built on by successive rulers who ruled Belagavi from time-to-time. At the very entrance, you will find two shrines; one dedicated to Lord Ganpati and the other to Goddess Durga. A Mahishamardini and four Matrika statues are also seen. Safa Masjid is one of the two mosques inside the fort and is one of the finest in the city. The minars, domes and arches point to a typical fusion of Indo-Saracenic and Deccan styles of the architecture.</span></li><span data-dcnode-id="1690" instrument_node="">
</span><li data-dcnode-id="1686"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Kitturu:</span></strong><span data-dcnode-id="1687" instrument_node=""> Located on the Pune-Bangalore Highway about 50 km from Belagavi and 32 km from Dharwad, the tiny town of Kittur with its palace, forts and horse tongas (rickshaws) evokes the glories of a bygone era. Kittur, a small town in Belagavi, was the birth place of Rani Chennamma, a brave ruler who led one of the first freedom struggles of India against the British forces. Today, the place has the remains of the historic fort which houses the Kittur Palace, a fine specimen of the Peshwa-Islamic style of architecture an archaeological museum that is replete with antiques and ancient relics like stone idols, paintings, idols of deities, weaponry etc. depicting the history of the place. The fort stands as testimony to the great freedom struggle led by Rani Chennamma.</span></li><span data-dcnode-id="1685" instrument_node="">
</span><li data-dcnode-id="1681"><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Rajahansagad</span></strong><span data-dcnode-id="1682" instrument_node="">: Rajahansagad is an ancient fort 20 kms south of Belagavi. The Rajahansagad fort is about 1000 meters above sea level and offers an excellent view of the surrounding. The village is also referred to as Yellurgad and is home to multiple temples including temples of Kalmeshwara, Lakshmi, Dattatreya, Parameshwara and Changaleshwari.</span></li><span data-dcnode-id="1680" instrument_node="">
</span><li data-dcnode-id="1674"><strong data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Halasi:</span></strong><span data-dcnode-id="1677" instrument_node="">The erstwhile capital of the Kadamba dynasty, Halasi is known for the Bhuvaraha Laxmi Narasimha Temple. Built during the 5th century AD, the temple stands as a fine specimen of the Kadamba style of architecture. The temple complex is surrounded by a stone wall and has arched doors on all its four sides. The main temple's pyramidical shikhara has been built in the Kadamba style of architecture and its top is adorned with a kalash. There are two sanctum sanctorum in the temple. The first one houses a four-foot-tall idol of Lord Vishnu in a sitting posture. Just behind the main idol are the idols of Lord Suryanarayana and Goddess Mahalakshmi. The second sanctorum houses an idol of Lord Bhuvaraha Swamy. Other important temples here include shrines dedicated to Lord Gokarneshwara, Lord Kapileshwara, Lord Swarneshwara and Lord Hatakeshwara.</span><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">
</span></strong></li><span data-dcnode-id="1673" instrument_node="">
</span><li data-dcnode-id="1666"><strong data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Bhimgad Fort:</span></strong><span data-dcnode-id="1670" instrument_node=""> Historical ruins of Bhimgad Fort are located inside the Bhimgad Wildlife Sanctuary. Bhimgad Fort was built by Chatrapati Shivaji Maharaj during the 17</span><sup data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">th</span></sup><span data-dcnode-id="1667" instrument_node=""> century and offered defense against Portuguese military that occupied Goa. Bhimgad fort has fresh water ponds, canons and large walls which are reasonably intact</span></li><span data-dcnode-id="1665" instrument_node="">
</span><li data-dcnode-id="1661"><strong data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Torgal:</span></strong><span data-dcnode-id="1662" instrument_node=""> Known for its inscriptions from Vijayanagara era and Adil Shahi era. Bhutanatha temple complex has two temples facing each other.</span></li><span data-dcnode-id="1660" instrument_node="">
</span><li data-dcnode-id="1656"><strong data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Saptasagar:</span></strong><span data-dcnode-id="1657" instrument_node=""> A pre-historic site where seven sages were said to have performed Yajna. An ancient Shiva temple, Hanuman temple and Lakkava temples can be visited in Saptasagar. A private plantation in Saptasagar with birds and animals is popular as a picnic spot.</span></li><span data-dcnode-id="1655" instrument_node="">
</span><li data-dcnode-id="1651"><strong data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Parasgad Fort: </span></strong><span data-dcnode-id="1652" instrument_node="">This fort is situated in the village of Saundatti. A road leading to the famed Yellamma Temple passes nearby the fort. This rugged rocky fort, stands on the southwest edge overlooking the black soil plain down below. Atop the hill-fort is a small ruined shrine of Lord Hanuman. The fort is uninhabited and is in a damaged condition with remains of old houses and has a deep gorge in between. Nearby, is a tank 30 metres long and six metres broad which is called Ramteertha. Here in a cave are statues of Jamadagni, Parashurama, Rama, Seeta and a Shivalinga and Nandi.</span></li><span data-dcnode-id="1650" instrument_node="">
</span><li data-dcnode-id="1646"><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Jawaharlal Water works:</span></strong><span data-dcnode-id="1647" instrument_node=""> A picnic spot 2 kms from Nippani.</span></li><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1641"><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Nippani:</span></strong><span data-dcnode-id="1642" instrument_node=""> Worth visiting for interesting murals at Nippani Wada and several temples.</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1636"><strong data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Belwadi:</span></strong><span data-dcnode-id="1637" instrument_node=""> Has remains of a fort and palace, once ruled by Belwadi Mallamma.</span></li><span data-dcnode-id="1635" instrument_node="">
</span></ul><span data-dcnode-id="1633" instrument_node="">
</span><div data-dcnode-id="1632" style="display: none;"></div><span data-dcnode-id="1631" instrument_node=""> </span></div><span data-dcnode-id="1629" instrument_node="">
</span></div><span data-dcnode-id="1627" instrument_node="">
</span><div class="mkdf-info-section-part mkdf-tour-item-plan-part clearfix" data-dcnode-id="1389"><span data-dcnode-id="1626" instrument_node="">
</span><div class="mkdf-route-top-holder" data-dcnode-id="1611"><span data-dcnode-id="1625" instrument_node="">
</span><div class="mkdf-route-id" data-dcnode-id="1623" style="line-height:0px !important;background-color:transparent;"><img data-dcnode-id="1624" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/IconReligious.png&amp;raw"></div><span data-dcnode-id="1622" instrument_node="">
</span><span data-dcnode-id="1620" instrument_node="">

</span></span><span data-dcnode-id="1615" instrument_node="">
</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">
	                Religious Places	            </span></h6><span data-dcnode-id="1612" instrument_node="">
</span></div><span data-dcnode-id="1610" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1391"><span data-dcnode-id="1609" instrument_node="">
</span><ul data-dcnode-id="1395"><span data-dcnode-id="1608" instrument_node="">
</span><li data-dcnode-id="1602"><strong data-dcnode-id="1604"><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/st-marys-church/"><span data-dcnode-id="1607" instrument_node="">St Mary’s Church, Belagavi</span></a><span data-dcnode-id="1605" instrument_node="">:</span></strong><span data-dcnode-id="1603" instrument_node="">St Mary's Church was built in 1869. It was consecrated by the then Governor of the Bombay Presidency and is built in the Gothic Style. Rev Francis Gell is believed to have designed the building. This imposing stone church of the Anglicans has fine piers in the prayer hall and gorgeous stained glasses at its doors and windows. The altar is built with teak and marble and is
towered by an exceptionally beautiful stained-glass collage which depicts the life of Jesus from birth to resurrection in 12 frames.</span></li><span data-dcnode-id="1601" instrument_node="">
</span><li data-dcnode-id="1597"><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Kapileshwara Temple: </span></strong><span data-dcnode-id="1598" instrument_node="">Dedicated to Lord Shiva, Kapileshwara Temple is said to be one of the oldest temples in Belagavi. The garbhagriha has a flat Peetha with a Shivalinga with loose sculptures of Mahishamardini and a dwarapalaka. A huge hall before it has paintings on Puranic themes on its walls. Within the precincts of the temple in a mantapa is an image of Kalabhairava. A Ganapati shrine of the Peshwa times is also beside the mantapa. The annual jatra is held during Mahashivratri that attracts thousands of devotees when the palanquin procession is taken out.</span></li><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1590"><strong data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Kamala Basadi: </span></strong><span data-dcnode-id="1593" instrument_node="">Out of the two basadis in the fort, the more prominent one is the Kamala Basadi, built in 1204 by Bichana (or Bichiraja), a minister of Kartavirya IV of the Ratta dynasty. The Kamala Basadi (or Ratta Jinalaya) has a star shaped garbhagriha, an ardhamantapa and a vestibule leading to the frontal mukhamantapa. The garbhagriha has the seated image of Neminatha (the 22nd Jain Tirthankara) carved in black stone. The lathe-turned pillars of the navaranga are beautifully engraved with floral and other geometrical designs. One of the striking features of this Basadi is the well-executed mukhamantapa. The ceiling of the mukhamantapa has floral designs with a pendant of lotus projecting from the centre, a marvellous creation in stone. This is the reason why it is called Kamala (Lotus) Basadi.</span><strong data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">
</span></strong></li><span data-dcnode-id="1589" instrument_node="">
</span><li data-dcnode-id="1585"><strong data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Yellamma Temple, Saundatti: </span></strong><span data-dcnode-id="1586" instrument_node="">Saundatti reminds us of the beautiful and ancient temple of Goddesss Renuka which is popularly known as the Yellamma Temple and is situated atop a hill. It is at a distance of 70 Kms from Belagavi and at a distance of 5 Kms from Saundatti. The temple is built in the Chalukyan and Rashtrakuta style and the carvings also contains Jain Tirthankaras. Nearby, there also temples dedicated to Lord Ganesh, Lord Parashurama and Lord Kalabhairava etc. Devotees from Maharashtra, Goa and Andhra Pradesh regularly visit here apart from people from Karnataka. During the famous Yellamma Jatra (festival) held here, it is believed to be attended by around three lakh devotees.</span></li><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1580"><strong data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Military Mahadeva Temple: </span></strong><span data-dcnode-id="1581" instrument_node="">This is a modern temple dedicated to Lord Shiva. It has for long been used as a place of worship by the personnel of the defense forces including Maratha Light Infantry Regimental Centre posted here which is why it came to be called Military Mahadeva Temple. It also has a beautiful garden with a small zoo.</span></li><span data-dcnode-id="1579" instrument_node="">
</span><li data-dcnode-id="1573"><strong data-dcnode-id="1575"><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/sri-sogal-kshetra/"><span data-dcnode-id="1578" instrument_node="">Sri Sogal Kshetra</span></a><span data-dcnode-id="1576" instrument_node="">: </span></strong><span data-dcnode-id="1574" instrument_node="">Sogal is a temple town and historical place attributed to a sage named Sugol Muni. Sogal is located on a hill range in Belagavi district, 16 kms from Bailhongal town. Someshwara Temple, Veerabhadra Temple, Bhramaramba Temple, Shiddheshwara Linga cave Shrine, Kadamba Narayana Fort ruins, Ajjappana Gudi, Surya Chandra Shrine, Girija Temple and a mini waterfall are major attractions in Sri Sogal Kshetra.</span></li><span data-dcnode-id="1572" instrument_node="">
</span><li data-dcnode-id="1568"><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Ramathirtha: </span></strong><span data-dcnode-id="1569" instrument_node="">Ramathirtha is a village in Belagavi district close to Maharastra border (167 kms from Belagavi city) and is known for Uma Rameshwar T</span></li><span data-dcnode-id="1567" instrument_node="">
</span><li data-dcnode-id="1563"><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Degaon: </span></strong><span data-dcnode-id="1564" instrument_node="">Degaon (Deganve) is a village popular for Kamala Narayana Temple. Degaon is 54 kms from Belagavi city.</span></li><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1558"><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Shabari Kolla: </span></strong><span data-dcnode-id="1559" instrument_node="">Shabari Kolla is a temple dedicated to Lord Rama’s devotee, Shabari. Shabari Kolla temple is located in Ramadurga taluk, Belagavi.</span></li><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1553"><strong data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Nidasosi: </span></strong><span data-dcnode-id="1554" instrument_node="">Nidasosi is a town 55 kms north of Belagavi popular for its Lakshmi T</span></li><span data-dcnode-id="1552" instrument_node="">
</span><li data-dcnode-id="1548"><strong data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Gurudwara Singh Sabha: </span></strong><span data-dcnode-id="1549" instrument_node="">Located in Goaves locality, Gurudwara Singh Sabha is a popular Sikh religious and community centre in Belagavi.</span></li><span data-dcnode-id="1547" instrument_node="">
</span><li data-dcnode-id="1543"><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Yamakanmardi:</span></strong><span data-dcnode-id="1544" instrument_node=""> Popular for Banashankari Temple with Chalukyan pillars. There are multiple other temples dedicated to Yellamma, Lakshmi, Venugopala, Hanumantha, Navakotinarayana and an agrahara from Peshwa period in Yamkanmardi.</span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1538"><strong data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Yadwad:</span></strong><span data-dcnode-id="1539" instrument_node=""> Home to Bennekrishna Temple, Basavanna, Harideva, Rameshwara, Narayana and other temples.</span></li><span data-dcnode-id="1537" instrument_node="">
</span><li data-dcnode-id="1533"><strong data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Yadur:</span></strong><span data-dcnode-id="1534" instrument_node=""> Popular for Veerabhadra Temple, Muruku Gudi, Adrishyeshwara Temple and Hanuman T</span></li><span data-dcnode-id="1532" instrument_node="">
</span><li data-dcnode-id="1528"><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Telsang:</span></strong><span data-dcnode-id="1529" instrument_node=""> Home to temples of Satyappa-Sannappa, Vithoba, Yellamma, Durgavva, Kamaleshwara Shankaralinga and Basavanna.</span></li><span data-dcnode-id="1527" instrument_node="">
</span><li data-dcnode-id="1523"><strong data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Tavadi:</span></strong><span data-dcnode-id="1524" instrument_node=""> Popular Jain pilgrimage centre with Parshwanatha statue, Brahmadeva Temple and a basadi.</span></li><span data-dcnode-id="1522" instrument_node="">
</span><li data-dcnode-id="1518"><strong data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Shippur:</span></strong><span data-dcnode-id="1519" instrument_node=""> Home to Ramalinga temple of Chalukya style.</span></li><span data-dcnode-id="1517" instrument_node="">
</span><li data-dcnode-id="1513"><strong data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Sulebhavi:</span></strong><span data-dcnode-id="1514" instrument_node=""> Home to Lakshmidevi temple as well as Maruti, Basavanna, Ganapathi, Banashankari and Kalmeshwara T</span></li><span data-dcnode-id="1512" instrument_node="">
</span><li data-dcnode-id="1505"><strong data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Sirasangi:</span></strong><span data-dcnode-id="1509" instrument_node=""> Home to Kalikamba temple and two 12</span><sup data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">th</span></sup><span data-dcnode-id="1506" instrument_node=""> century inscriptions. Also has two small hillocks and caves in the outskirts of the village.</span></li><span data-dcnode-id="1504" instrument_node="">
</span><li data-dcnode-id="1500"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Shedbal:</span></strong><span data-dcnode-id="1501" instrument_node=""> Home to temples of Basavanna, Hanumantha, Vithoba and Yellamma</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1495"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Savadi:</span></strong><span data-dcnode-id="1496" instrument_node=""> Popular for Gopalakrishna temple on the banks of River Krishna, among several other temples such as Shiva and Lakshmi temples.</span></li><span data-dcnode-id="1494" instrument_node="">
</span><li data-dcnode-id="1490"><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Pant Balekundri:</span></strong><span data-dcnode-id="1491" instrument_node=""> A pilgrimage center with Dattatreya T</span></li><span data-dcnode-id="1489" instrument_node="">
</span><li data-dcnode-id="1482"><strong data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Satti</span></strong><span data-dcnode-id="1486" instrument_node="">: Known for 12</span><sup data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">th</span></sup><span data-dcnode-id="1483" instrument_node=""> century inscriptions and temples of Kalmeshwara, Mallikarjuna, Maruti and Veerabhadra.</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1477"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Sankeshwar:</span></strong><span data-dcnode-id="1478" instrument_node=""> Home to Chalukyan era Narayana Temple, Lakshmi, Maruti, Vithoba, Banashankari, Basavanna and Dattatreya Temples</span></li><span data-dcnode-id="1476" instrument_node="">
</span><li data-dcnode-id="1472"><strong data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Sampagaon:</span></strong><span data-dcnode-id="1473" instrument_node=""> Home to Bayalu Basaveshwara, Lakshmi and Siddheshwara Temples</span></li><span data-dcnode-id="1471" instrument_node="">
</span><li data-dcnode-id="1467"><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Raybag:</span></strong><span data-dcnode-id="1468" instrument_node=""> Has temples of Siddeshwara, Somanatha, Bankanatha, Hanumantha, Dattatreya, Vittala, Narasimha and Ambebai.</span></li><span data-dcnode-id="1466" instrument_node="">
</span><li data-dcnode-id="1462"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Ramadurga:</span></strong><span data-dcnode-id="1463" instrument_node=""> On the banks of River Malaprabha, Ramadurga is famous for Venkateshwara T Other major temples are Amba Bhavani, Maruti, Shankaralinga and Ganesha.</span></li><span data-dcnode-id="1461" instrument_node="">
</span><li data-dcnode-id="1457"><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Murgod:</span></strong><span data-dcnode-id="1458" instrument_node=""> Home to Surya Temple, Mallikarjuna Temple, several other lesser known temples such as Bharamaramba, Dattatreya, Rama and Karigudi.</span></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1452"><strong data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Mudalgi:</span></strong><span data-dcnode-id="1453" instrument_node=""> Popular for Vithoba temple</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1447"><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Kudachi:</span></strong><span data-dcnode-id="1448" instrument_node=""> Popular muslim pilgrimage centre with Shirah-ud-din Baghdadi’s Durgag and Makhdum Shah Wali Dargah.</span></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1442"><strong data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Mangsuli:</span></strong><span data-dcnode-id="1443" instrument_node=""> Popular for Mailara Temple complex</span></li><span data-dcnode-id="1441" instrument_node="">
</span><li data-dcnode-id="1437"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Kothali:</span></strong><span data-dcnode-id="1438" instrument_node=""> Jain pilgrimage centre with three standing statues (of Mahaveera, Chandraprabha and Shantinatha), a Kalamandira (a U shaped hall displaying marble images of 24 Jain thirthankaras) and a religious congregation hall.</span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1432"><strong data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Kokatnur:</span></strong><span data-dcnode-id="1433" instrument_node=""> Historic village with temples of Veerabhadra, Amritalingeshwara, Mallikarjuna, Kadasiddheshwara and Papanasi.</span></li><span data-dcnode-id="1431" instrument_node="">
</span><li data-dcnode-id="1427"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Hukkeri:</span></strong><span data-dcnode-id="1428" instrument_node=""> Taluk headquarter and historic town with temples of Maruti, Ishwara, Someshwara, Kalabhairava and Vittana. Also home to Jain monuments and Dargahs. Saveral muslim monuments can be seen in Hukkeri.</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1422"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Bailahongal:</span></strong><span data-dcnode-id="1423" instrument_node=""> A taluk in Belagavi with Mardi Basaveshwara, Hanumantha, Ramalingeshwara and Veerabhadreshwara Temples</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1417"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Kallolli:</span></strong><span data-dcnode-id="1418" instrument_node=""> Home to Trikutachala Basti, Ramalingeshwara Temple and several other temples.</span></li><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1412"><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Hooli: </span></strong><span data-dcnode-id="1413" instrument_node="">Hooli is located in Saundatti, and is perhaps one of the oldest towns in the district. This ancient agrahara is dotted with several temples with most of them having Chalukhya style of architecture. Among them, the Panchalingeshwara Temple dedicated to Lord Shiva is the famous temple. Apart from this shrine, the other temples located at Hooli are Andhakeshwara, Tarakeshwara, Banashankari, Madaneshwara, Dakshina Kashi Vishveshwara, Rameshwara, Narayana, Veerabhadra, Kalmeshwara, Kere Siddheshwara and Agastyeshwara.are some of the other temples.</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1407"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Golihalli:</span></strong><span data-dcnode-id="1408" instrument_node=""> Home to Kotilingeshwara, Rudreshwara and Kalmeshwara Temples</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1402"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Chinchalli:</span></strong><span data-dcnode-id="1403" instrument_node=""> Home to Goddess Mayakkadevi</span></li><span data-dcnode-id="1401" instrument_node="">
</span><li data-dcnode-id="1397"><strong data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Athani:</span></strong><span data-dcnode-id="1398" instrument_node=""> One of the important towns in Belagavi district with temples of Ramalinga, Amrithalingeshwara, Kalmeshwara, Narasimha, Siddeshwara, Hanumantha and Ganapathi. Athani also has 10 mosques. Athani has a footwear manufacturing factory.</span></li><span data-dcnode-id="1396" instrument_node="">
</span></ul><span data-dcnode-id="1394" instrument_node="">

</span><h4 data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Belagavi is well connected by air, rail and road network from all over Karnataka.</span></h4><span data-dcnode-id="1364" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1359"><span class="reach-img" data-dcnode-id="1362"><img alt="" class="alignnone size-full wp-image-6909" data-dcnode-id="1363" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-01.png&amp;raw" width="50"></span><span class="reach-cont" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node=""> Belagavi has its own airport.</span></span></div><span data-dcnode-id="1358" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1353"><span class="reach-img" data-dcnode-id="1356"><img alt="" class="alignnone size-full wp-image-6908" data-dcnode-id="1357" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-02.png&amp;raw" width="50"></span><span class="reach-cont" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node=""> Belagavi has a railway station providing access from Bengaluru and Maharashtra</span></span></div><span data-dcnode-id="1352" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1347"><span class="reach-img" data-dcnode-id="1350"><img alt="" class="alignnone size-full wp-image-6907" data-dcnode-id="1351" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-03.png&amp;raw" width="50"></span><span class="reach-cont" data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node=""> Belagavi has excellent bus connectivity from major cities of Karnataka.</span></span></div><span data-dcnode-id="1346" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1341"><span class="reach-img" data-dcnode-id="1344"><img alt="" class="alignnone size-full wp-image-6906" data-dcnode-id="1345" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-04.png&amp;raw" width="50"></span><span class="reach-cont" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node=""> Local transport: Taxis are easily available in major towns of Belagavi. Autos are convenient for intra-city movements.</span></span></div><span data-dcnode-id="1340" instrument_node="">
&nbsp;

Kamala Basti (Basadi).

The &quot;porch&quot; of the lotus basti (basadi), built in 1204, is carved in the shape of a lotus flower. The statue of Neminatha which exhibits the Chalukya style is carved in black stone.

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

ನೈಸರ್ಗಿಕ ಪರಿಸರದ ನಡುವೆ ವಿಭಿನ್ನ ಆವೃತ್ತಿ ಹೊಂದಿರುವ ಮಿರ್ಜಾನ್ ಕೋಟೆ 16 ಶತಮಾನಗಳ ಸಾಂಸ್ಕೃತಿಕ ವೈಭವ ಮತ್ತು ವಿಶಿಷ್ಟ ಇತಿಹಾಸವನ್ನು ಹೊಂದಿದೆ. ಈ ಕೋಟೆಯನ್ನು &quot;ಮೆಣಸಿನ ರಾಣಿ &quot; ಎಂದು ಕರೆಯಲ್ಪಡುವ ಗೆರೊಪ್ಪಾ ರಾಣಿ ಚೆನ್ನೈ ಭೈರವಿ ದೇವಿ ನಿರ್ಮಿಸಿದಳು. ಎತ್ತರದ ಛಾವಣಿಗಳು ಮತ್ತು ಬುರುಜುಗಳನ್ನು ಹೊಂದಿರುವ ಕೋಟೆಯು ಕಂದಕಗಳು, ರಹಸ್ಯ ಮಾರ್ಗಗಳು, ಕಾಲುವೆಗಳು ಮತ್ತು 4 ಮುಖ್ಯ ಪ್ರವೇಶ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದ್ದು ಕೋಟೆಯು ಪ್ರಸಿದ್ಧ ವಾಸ್ತುಶಿಲ್ಪದ ಅದ್ಭುತವಾಗಿದೆ.

Mirjan Fort 

Mirjan Fort boasts 16 centuries of cultural splendor and unique history, with its various interpretation of the natural environment. Queen Bhairavi Devi of Geroppa, often known as the &quot;Pepper Queen,&quot; constructed the fort. With trenches, secret passages, canals, and four main entrances, the fort is a renowned architectural marvel with lofty ceilings and towers.

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.

1204ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾದ ಕಮಲ ಬಸ್ತಿಯ (ಬಸದಿ) “ಮುಖಮಂಟಪವು" ಕಮಲದ ಹೂವಿನ ಆಕಾರದಲ್ಲಿ ಕೆತ್ತಲಾಗಿದೆ. ಈ ಬಸದಿಯಲ್ಲಿ ಚಾಲುಕ್ಯ ಶೈಲಿಯಲ್ಲಿ ನೇಮಿನಾಥರ ಮೂರ್ತಿಯನ್ನು ಕಪ್ಪು ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಲಾಗಿದೆ.

Kamala Basti (Basadi).

The "porch" of the lotus basti (basadi), built in 1204, is carved in the shape of a lotus flower. The statue of Neminatha which exhibits the Chalukya style is carved in black stone.

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

Mirjan Fort

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

</span><img alt="ರಾಜ ಸಮಾಧಿ (ಗದ್ದಿಗೆ)

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.
