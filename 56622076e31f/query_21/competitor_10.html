</span><h3 class="tagline w-100" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node=""> "Land of palm trees, blue seas and golden sands" </span></h3><span data-dcnode-id="3476" instrument_node="">
</span><h2 class="heading2 w-100" data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">  Gokarna Tourism  </span></h2><span data-dcnode-id="3473" instrument_node="">
</span><div class="readMoreText compact" data-dcnode-id="3459"><span data-dcnode-id="3472" instrument_node="">
</span><p data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node=""> With its pristine beaches and breathtaking landscapes, Gokarna is a Hindu pilgrimage town in Karnataka and a newly found hub for beach lovers and hippies.&nbsp;Situated on the coast of Karwar, every year Gokarna&nbsp;welcomes hordes of tourists from around the world in search of sanctity and relaxation. The out-of-town beaches like Kudle beach and Om Beach are a different contrast to life inside the town.&nbsp;</span></p><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3468"></p><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node=""> Palm clad beaches are dotted with foreign tourists in a majority and very few Indians are seen across. Gokarna is not very conventionally touristy. The beaches are meant for a slow, relaxed holiday and everything on the beach goes at the same relaxed pace. Full of coconut and palm trees, the ocean and clean sands, Gokarna is a 'one of&nbsp;a kind' place in the country.</span></p><span data-dcnode-id="3464" instrument_node="">

</span><h2 class="heading2 w-100" data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">  More on Gokarna  </span></h2><span data-dcnode-id="2905" instrument_node="">
</span></div><span data-dcnode-id="2903" instrument_node="">
</span><div class="accordion" data-dcnode-id="2724" id="accordionFlexibleParagraphs"><span data-dcnode-id="2902" instrument_node="">
</span><div class="card" data-dcnode-id="2866"><span data-dcnode-id="2901" instrument_node="">
</span><div class="card-header" data-dcnode-id="2896" data-target="#collapse1" data-toggle="collapse" id="heading1"><span data-dcnode-id="2900" instrument_node="">
</span><h2 data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node=""> Beaches in Gokarna - An Unexplored Beach Paradise </span></h2><span data-dcnode-id="2897" instrument_node="">
</span></div><span data-dcnode-id="2895" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2868" id="collapse1"><span data-dcnode-id="2894" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2870"><span data-dcnode-id="2893" instrument_node=""> Over the past few years, Gokarna has become an important tourist destination owing to its alluring beaches that promise a peaceful vacation leaving behind the tourist rush of Goa. The sprawling beaches are the chief tourist attraction in the holy town of Gokarna. Gokarna has a vast sea line to offer to the visitors. They are calm and serene amid the waters, hills and sunlight.</span><br data-dcnode-id="2892"><figure class="image align-center" contenteditable="false" data-dcnode-id="2886"><img caption="true" data-dcnode-id="2891" data-mce-src="https://www.holidify.com/images/cmsuploads/compressed/GettyImages-541506666-590aa6905f9b586470bb3d71_20200406172244.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/images/cmsuploads/compressed/GettyImages-541506666-590aa6905f9b586470bb3d71_20200406172244.jpg&amp;raw" width="700"><figcaption contenteditable="true" data-dcnode-id="2887"><span data-dcnode-id="2890" instrument_node="">Gokarna Main Beach&nbsp;</span><a data-dcnode-id="2888" data-mce-href="https://www.tripsavvy.com/thmb/OaBqx5bhdUkFDyr9HRaeT1s-wGM=/2000x1333/filters:no_upscale():max_bytes(150000):strip_icc()/GettyImages-541506666-590aa6905f9b586470bb3d71.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tripsavvy.com/thmb/OaBqx5bhdUkFDyr9HRaeT1s-wGM%3D/2000x1333/filters%3Ano_upscale%28%29%3Amax_bytes%28150000%29%3Astrip_icc%28%29/GettyImages-541506666-590aa6905f9b586470bb3d71.jpg" rel="nofollow"><span data-dcnode-id="2889" instrument_node="">Source</span></a></figcaption></figure><br data-dcnode-id="2885"><span data-dcnode-id="2884" instrument_node=""> The famous trio of</span><a data-dcnode-id="2882" data-mce-href="https://www.holidify.com/collections/beaches-in-gokarna" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/collections/beaches-in-gokarna"><span data-dcnode-id="2883" instrument_node=""> beaches in Gokarna</span></a><span data-dcnode-id="2881" instrument_node="">, the Kudle Beach, The Half-moon Beach and the Paradise beach are the most famous ones that have brought in international recognition. Surrounded by small hills and islands between them, these beaches are must-see places for all the passionate nature lovers. </span><br data-dcnode-id="2880"><figure class="image align-center" contenteditable="false" data-dcnode-id="2873"><img caption="true" data-dcnode-id="2879" data-mce-src="https://www.holidify.com/images/cmsuploads/compressed/Kudle_beach_gokarna_20170428134309.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/images/cmsuploads/compressed/Kudle_beach_gokarna_20170428134309.jpg&amp;raw" width="700"><figcaption contenteditable="true" data-dcnode-id="2874"><span data-dcnode-id="2878" instrument_node="">Kudle Beach </span><a data-dcnode-id="2876" data-mce-href="https://upload.wikimedia.org/wikipedia/commons/8/8c/Kudle_beach_gokarna.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/8/8c/Kudle_beach_gokarna.jpg"><span data-dcnode-id="2877" instrument_node="">Source</span></a><br data-dcnode-id="2875"></figcaption></figure><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">While these beaches are famous amongst the tourist, the main Gokarna Beach is only preferred by the pilgrims. According to religious customs, pilgrims must take a dip in the waters of Gokarna Beach before entering the Mahabaleshwara Temple. One can find shacks, cafés and guesthouses in most of the beaches that serve delicious food in the evenings. Some&nbsp;of the beaches like the Half Moon Beach and Paradise Beach can only be reached by trekking or a boat ride. The main forms of leisure are the beautiful view of the Arabian Sea, star gazing at night and other activities like watersports, snorkelling, parasailing and boat rides. </span></div><span data-dcnode-id="2869" instrument_node="">
</span></div><span data-dcnode-id="2867" instrument_node="">
</span></div><span data-dcnode-id="2865" instrument_node="">
</span><div class="card" data-dcnode-id="2851"><span data-dcnode-id="2864" instrument_node="">
</span><div class="card-header" data-dcnode-id="2859" data-target="#collapse2" data-toggle="collapse" id="heading2"><span data-dcnode-id="2863" instrument_node="">
</span><h2 data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node=""> Gokarna - The Holy Town </span></h2><span data-dcnode-id="2860" instrument_node="">
</span></div><span data-dcnode-id="2858" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2853" id="collapse2"><span data-dcnode-id="2857" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node=""> Brimming with the rich history and culture Gokarna is the holy town which houses a number of temples and holds a great importance for Hindu religion. It is the holy land with various temples dedicated to Lord Shiva and hence a huge number of pilgrims visit this town to seek the blessings of Lord Shiva. Gokarna has also some of the Lord Shiva's temple with the original image of the Shiva Lingam. Mahabaleshwar temple, Murudeshwar temple, and Maha Ganpati temple are the must visit temples of the town.
 </span></div><span data-dcnode-id="2854" instrument_node="">
</span></div><span data-dcnode-id="2852" instrument_node="">
</span></div><span data-dcnode-id="2850" instrument_node="">
</span><div class="card" data-dcnode-id="2826"><span data-dcnode-id="2849" instrument_node="">
</span><div class="card-header" data-dcnode-id="2844" data-target="#collapse3" data-toggle="collapse" id="heading3"><span data-dcnode-id="2848" instrument_node="">
</span><h2 data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node=""> Nightlife in Gokarna </span></h2><span data-dcnode-id="2845" instrument_node="">
</span></div><span data-dcnode-id="2843" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2828" id="collapse3"><span data-dcnode-id="2842" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2830"><span data-dcnode-id="2841" instrument_node=""> </span><figure class="image align-center" contenteditable="false" data-dcnode-id="2835"><img caption="true" data-dcnode-id="2840" data-mce-src="https://www.holidify.com/images/cmsuploads/compressed/1547526954_restaurent_at_night_1000x800_20200406171833.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/images/cmsuploads/compressed/1547526954_restaurent_at_night_1000x800_20200406171833.jpg&amp;raw" width="700"><figcaption contenteditable="true" data-dcnode-id="2836"><a data-dcnode-id="2838" data-mce-href="https://static2.tripoto.com/media/filter/tst/img/518407/TripDocument/1547526954_restaurent_at_night_1000x800.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static2.tripoto.com/media/filter/tst/img/518407/TripDocument/1547526954_restaurent_at_night_1000x800.jpg"><span data-dcnode-id="2839" instrument_node="">Source</span></a><br data-dcnode-id="2837"></figcaption></figure><span data-dcnode-id="2834" instrument_node="">Gokarna does not have much in terms of bars and pubs since it is considered as a holy city. Many of the shacks serve beer but do enquire before. One can get the finest wine that Gokarna can offer in the Hunters Lodge. The history of this place and its ties with royalty adds to its charm. </span><br data-dcnode-id="2833"><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">However, one can always enjoy their nights at the beaches that are open to the public at night. Each beach is unique to itself. The lack of industrial lightings in the area gives a perfect view of the starlit sky at night. </span></div><span data-dcnode-id="2829" instrument_node="">
</span></div><span data-dcnode-id="2827" instrument_node="">
</span></div><span data-dcnode-id="2825" instrument_node="">
</span><div class="card" data-dcnode-id="2808"><span data-dcnode-id="2824" instrument_node="">
</span><div class="card-header" data-dcnode-id="2819" data-target="#collapse4" data-toggle="collapse" id="heading4"><span data-dcnode-id="2823" instrument_node="">
</span><h2 data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node=""> History of Gokarna - The Legend </span></h2><span data-dcnode-id="2820" instrument_node="">
</span></div><span data-dcnode-id="2818" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2810" id="collapse4"><span data-dcnode-id="2817" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2812"><span data-dcnode-id="2816" instrument_node=""> Gokarna means cow’s ear in Sanskrit. According to one of the Hindu Epics, Lord Shiva emerged from the ear of a cow here. It is at the ear-shaped union of two rivers Gangavali and Aghanashini. In the Shrimada Bhagavata Purana, Gokarna is mentioned as being the home of the brothers Gokarna and Dhundhakari. As per another legend, Ravana was given Atmalinga (a very powerful weapon) by Lord Shiva and instructed him that it would stay permanently where it was placed first on land. </span><br data-dcnode-id="2815"><br data-dcnode-id="2814"><span data-dcnode-id="2813" instrument_node="">While Ravana was performing a ritual, Lord Ganesha came disguised as a little boy and placed it in Gokarna. Ravana discovered that he had been deceived by the Gods to keep Ravana from getting a weapon as intense as the Atmalinga. Ravana tries to remove it, bringing about tossing the covers of the Linga to Surathkal, Dhareshwar, Gunavanteshwar, Murudeshwar and Shejjeshwar temples. Gokarna is known as one of the seven important Hindu pilgrimage centres. </span></div><span data-dcnode-id="2811" instrument_node="">
</span></div><span data-dcnode-id="2809" instrument_node="">
</span></div><span data-dcnode-id="2807" instrument_node="">
</span><div class="card" data-dcnode-id="2778"><span data-dcnode-id="2806" instrument_node="">
</span><div class="card-header" data-dcnode-id="2801" data-target="#collapse5" data-toggle="collapse" id="heading5"><span data-dcnode-id="2805" instrument_node="">
</span><h2 data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node=""> Restaurants and Local Food in Gokarna </span></h2><span data-dcnode-id="2802" instrument_node="">
</span></div><span data-dcnode-id="2800" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2780" id="collapse5"><span data-dcnode-id="2799" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2782"><span data-dcnode-id="2798" instrument_node=""> Since Gokarna is a religious place, the town has a lot of vegetarian- only places. At the same time due to the proximity to the seaside, finding seafood is not at all difficult. Beaches are lined up with small restaurants offering all kinds of exotic cuisines - Mexican, Israeli, English breakfast, Indian etc. </span><br data-dcnode-id="2797"><i data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Fresh pineapple juice and Nutella pancakes</span></i><span data-dcnode-id="2794" instrument_node=""> in the area, are definitely worth a try. You can also find local cuisine of Karnataka and an authentic thali with some of the richest and traditional preparations. Other than this, the favorites of the town include </span><i data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node=""> Upma, Prawn Masala, Pomfret, Kingfish</span></i><span data-dcnode-id="2791" instrument_node=""> as well as some of the most delicious ice-creams to relish. </span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">
</span><a data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/places/gokarna/restaurants-places-to-eat-local-cuisine.html"><span data-dcnode-id="2788" instrument_node=""> </span><b data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node=""> View Top Restaurants in Gokarna </span></b><span data-dcnode-id="2785" instrument_node=""> </span></a><span data-dcnode-id="2783" instrument_node=""> </span></div><span data-dcnode-id="2781" instrument_node="">
</span></div><span data-dcnode-id="2779" instrument_node="">
</span></div><span data-dcnode-id="2777" instrument_node="">
</span><div class="card" data-dcnode-id="2750"><span data-dcnode-id="2776" instrument_node="">
</span><div class="card-header" data-dcnode-id="2771" data-target="#collapse6" data-toggle="collapse" id="heading6"><span data-dcnode-id="2775" instrument_node="">
</span><h2 data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node=""> Suggested Itinerary for Gokarna </span></h2><span data-dcnode-id="2772" instrument_node="">
</span></div><span data-dcnode-id="2770" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2752" id="collapse6"><span data-dcnode-id="2769" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2754"><span data-dcnode-id="2768" instrument_node=""> </span><b data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node=""> Day 1- </span></b><span data-dcnode-id="2765" instrument_node="">  Arrive at Dabolim airport or Ankola railway station. Check-in at the hotel.
Stay at the hotel. </span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">
</span><b data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node=""> Day 2- </span></b><span data-dcnode-id="2760" instrument_node=""> Visit the most famous Om beach of Gokarna, which makes the sign of Om with its shore and hence the name. Afterwards, visit the Kudle beach another attraction of Gokarna. Later visit the famous Mahabaleshwar temple dedicated to Lord Shiva.

</span><h2 data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node=""> What is famous about Gokarna? </span></h2><span data-dcnode-id="2224" instrument_node="">
</span></div><span data-dcnode-id="2222" instrument_node="">

</span><h2 data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node=""> What is not so good about Gokarna? </span></h2><span data-dcnode-id="2209" instrument_node="">
</span></div><span data-dcnode-id="2207" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2202" id="collapse2"><span data-dcnode-id="2206" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node=""> There aren't many things to do apart from sightseeing and visiting temples. Does not have its own airport. 
 </span></div><span data-dcnode-id="2203" instrument_node="">

</span><h2 data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node=""> Who should visit Gokarna? </span></h2><span data-dcnode-id="2194" instrument_node="">
</span></div><span data-dcnode-id="2192" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2187" id="collapse3"><span data-dcnode-id="2191" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node=""> Religious people, as it has a number of ancient temples. Also, perfect for the beach lovers.

</span><div class="card-header" data-dcnode-id="2178" data-target="#collapse4" data-toggle="collapse" id="heading4"><span data-dcnode-id="2182" instrument_node="">
</span><h2 data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node=""> What is the best time to visit Gokarna? </span></h2><span data-dcnode-id="2179" instrument_node="">
</span></div><span data-dcnode-id="2177" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2168" id="collapse4"><span data-dcnode-id="2176" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2170"><span data-dcnode-id="2175" instrument_node=""> The best time to visit Gokarna would definitely be from October to March when the humidity is at its very least.&nbsp; November to February is especially crowded with a lot of foreigners. The offseason, that is the rainy season, is not the ideal time to go to the beaches with all of them looking desolate and unkempt with limited food options.&nbsp;The temples in the town are most lively around festivals of Shivratri and Ganesh Chaturthi.</span><br data-dcnode-id="2174"><a data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/places/gokarna/best-time-to-visit.html"><span data-dcnode-id="2173" instrument_node="">Read More</span></a><span data-dcnode-id="2171" instrument_node=""> </span></div><span data-dcnode-id="2169" instrument_node="">
</span></div><span data-dcnode-id="2167" instrument_node="">
</span></div><span data-dcnode-id="2165" instrument_node="">
</span><div class="card" data-dcnode-id="2140"><span data-dcnode-id="2164" instrument_node="">
</span><div class="card-header" data-dcnode-id="2159" data-target="#collapse5" data-toggle="collapse" id="heading5"><span data-dcnode-id="2163" instrument_node="">
</span><h2 data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node=""> What is the local food in Gokarna? </span></h2><span data-dcnode-id="2160" instrument_node="">
</span></div><span data-dcnode-id="2158" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2142" id="collapse5"><span data-dcnode-id="2157" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2144"><span data-dcnode-id="2156" instrument_node=""> Since Gokarna is a religious place, the town has a lot of vegetarian- only places. At the same time due to the proximity to the seaside, finding seafood is not at all difficult. Beaches are lined up with small restaurants offering all kinds of exotic cuisines - Mexican, Israeli, English breakfast, Indian etc. </span><br data-dcnode-id="2155"><i data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Fresh pineapple juice and Nutella pancakes</span></i><span data-dcnode-id="2152" instrument_node=""> in the area, are definitely worth a try. You can also find local cuisine of Karnataka and an authentic thali with some of the richest and traditional preparations. Other than this, the favorites of the town include </span><i data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node=""> Upma, Prawn Masala, Pomfret, Kingfish</span></i><span data-dcnode-id="2149" instrument_node=""> as well as some of the most delicious ice-creams to relish.</span><br data-dcnode-id="2148"><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/places/gokarna/restaurants-places-to-eat-local-cuisine.html"><span data-dcnode-id="2147" instrument_node="">Read More</span></a><span data-dcnode-id="2145" instrument_node=""> </span></div><span data-dcnode-id="2143" instrument_node="">
</span></div><span data-dcnode-id="2141" instrument_node="">
</span></div><span data-dcnode-id="2139" instrument_node="">
</span><div class="card" data-dcnode-id="2121"><span data-dcnode-id="2138" instrument_node="">

</span><h2 data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node=""> What is the best way to reach Gokarna? </span></h2><span data-dcnode-id="2134" instrument_node="">
</span></div><span data-dcnode-id="2132" instrument_node="">
</span><div class="collapse accordion-item" data-dcnode-id="2123" id="collapse6"><span data-dcnode-id="2131" instrument_node="">
</span><div class="card-body article" data-dcnode-id="2125"><span data-dcnode-id="2130" instrument_node=""> Gokarna is connected well by train and road from all major cities in Karnataka. The nearest airport is at Dabolim, Goa that is 150 km away.&nbsp;The Gokarna&nbsp;railway station is located 10 km from the centre of the city. Bus services are also available from Bangalore and Goa.</span><br data-dcnode-id="2129"><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/places/gokarna/how-to-reach.html"><span data-dcnode-id="2128" instrument_node="">Read More</span></a><span data-dcnode-id="2126" instrument_node=""> </span></div><span data-dcnode-id="2124" instrument_node="">
</span></div><span data-dcnode-id="2122" instrument_node="">
