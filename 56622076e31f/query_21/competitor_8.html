</span><article class="mkdf-tour-item-wrapper post-6950 tour-item type-tour-item status-publish has-post-thumbnail hentry tour-category-districts" data-dcnode-id="1069"><span data-dcnode-id="1886" instrument_node="">
</span><div class="mkdf-tour-item-section mkdf-tour-tab-container" data-dcnode-id="1717" id="tour-item-info-id"><span data-dcnode-id="1885" instrument_node="">
</span><div class="mkdf-info-section-part mkdf-tour-item-title-holder" data-dcnode-id="1871"><span data-dcnode-id="1884" instrument_node="">
</span><h3 class="mkdf-tour-item-title" data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">
</span></h3><span data-dcnode-id="1881" instrument_node="">
</span><h5 class="mkdf-tour-item-price-holder" data-dcnode-id="1873"><span data-dcnode-id="1880" instrument_node="">
</span><span class="mkdf-tour-item-price" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">
</span></span><span data-dcnode-id="1877" instrument_node="">
</span><span class="mkdf-tour-item-price-text" data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">
</span></span><span data-dcnode-id="1874" instrument_node="">
</span></h5><span data-dcnode-id="1872" instrument_node="">
</span></div><span data-dcnode-id="1870" instrument_node="">
</span><div class="mkdf-info-section-part mkdf-tour-item-content" data-dcnode-id="1745"><span data-dcnode-id="1869" instrument_node="">
</span><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1760"><div class="wpb_column vc_column_container vc_col-sm-8" data-dcnode-id="1816"><div class="vc_column-inner" data-dcnode-id="1817"><div class="wpb_wrapper" data-dcnode-id="1818"><span data-dcnode-id="1868" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="1820"><span data-dcnode-id="1867" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1822"><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1865" instrument_node="">Ramanagara was called </span><em data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Closepet</span></em><span data-dcnode-id="1862" instrument_node=""> during pre-independence times, named so after Sir Barry Close who built the old bridge here. Ramanagara district was carved out of the erstwhile </span><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/bengaluru-rural/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1861" instrument_node="">Bengaluru Rural</span></a><span data-dcnode-id="1859" instrument_node=""> district in 2007. The district is surrounded by </span><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/bengaluru-urban/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1858" instrument_node="">Bangalore Urban</span></a><span data-dcnode-id="1856" instrument_node=""> and Tumakuru in the north, Mandya in the west, </span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/chamarajanagar/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1855" instrument_node="">Chamarajanagar</span></a><span data-dcnode-id="1853" instrument_node=""> in the south and Tamil Nadu state in the west. Cauvery, Arkavathi &amp; Kanva are the three rivers flowing in the District.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1850" instrument_node="">Ramanagara is known for its Channapatna toys and sericulture. It houses one of the biggest silk markets in India and the silk produced in this region forms the main raw material for the famous Mysore silk sarees. Ramanagara is the largest market for silk cocoons in Asia. Therefore, it is also known as </span><em data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">“Silk City’’.</span></em></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1845" instrument_node="">Being a short drive away makes Ramanagara a popular weekend getaway for the Bengalureans and is also a perfect stopover enroute to Mysuru/Kodagu from Bengaluru. Ramanagara is a popular base for many adventure sports/ team building activities. It is famed for rock climbing and is also called the </span><em data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Mecca of Rock Climbers.</span></em><span data-dcnode-id="1842" instrument_node=""> The rocks and boulders were the perfect setting for the Hindi blockbuster movie </span><em data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Sholay</span></em><span data-dcnode-id="1839" instrument_node=""> which was shot on these picturesque rocks. Trekking at Savanadurga and Mekadaatu is also quite popular. It also has a film city located in Bidadi which is also famous as an industrial hub. And while in Bidadi, try the lip-smacking </span><em data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Bidadi Thatte Idli</span></em><span data-dcnode-id="1836" instrument_node=""> which is a larger and flatter variant of the traditional south Indian </span><em data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Idli</span></em><span data-dcnode-id="1833" instrument_node=""> but equally delicious.</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1824"><strong data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">For further information, visit the official district website</span></strong><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ramanagara.nic.in/en/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1828" instrument_node="">&nbsp;</span><span data-dcnode-id="1826" style="text-decoration: underline;"><span data-dcnode-id="1827" instrument_node="">click here!</span></span></a></p><span data-dcnode-id="1823" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">
	                Tourist Attractions	            </span></h6><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1637"><span data-dcnode-id="1697" instrument_node="">
</span><ul data-dcnode-id="1641"><span data-dcnode-id="1696" instrument_node="">
</span><li data-dcnode-id="1692"><strong data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Ramadevara Betta Vulture Sanctuary</span></strong><span data-dcnode-id="1693" instrument_node="">: Forests around Ramadevara betta are declared a vulture sanctuary. Birds, particularly giant vultures are spotted here.</span></li><span data-dcnode-id="1691" instrument_node="">
</span><li data-dcnode-id="1680"><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnatakatourism.org/tour-item/mekedatu/" rel="noopener" target="_blank"><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Mekedatu &amp; Sangama</span></strong></a><span data-dcnode-id="1687" instrument_node="">:
Located in Kanakapura Taluk, it is an ideal spot for one-day outings. Sangama is the confluence of Cauvery and Akravati rivers. Nearby is a Shiva Temple locally called as Sangameshwara Temple. From here, trek 5 km to Mekedatu, amidst dense green forest and majestic hills, while you listen to the thunderous roar of the Cauvery River, as well as the sweet chirping of birds. Here the Cauvery River passes through a narrow crevice where it is believed that even goats could leap across; hence the name Mekedatu </span><em data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">(Goat’s leap)</span></em><span data-dcnode-id="1684" instrument_node="">.
Karnataka State Tourism Development Corporation Limited (KSTDC) runs the </span><em data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Hotel Mayura Sangama Mekedatu</span></em><span data-dcnode-id="1681" instrument_node=""> here.</span></li><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1675"><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Janapada Loka</span></strong><span data-dcnode-id="1676" instrument_node="">: Sri. HL Nage Gowda, is the creator and conceptual architect of this cultural centre. It is dedicated to promoting, preserving, publishing and propagating the native folk culture of Karnataka. Since its inception in 1979, it has been a platform for rural artisans, musicians and craftspeople to showcase as well as market their works of art. The main attraction of Janapada Loka is the folk arts museum which contains a spectacular collection of around 5000 artefacts that represents the essence of Karnataka's folk culture. Spanning over 15 acres, the complex houses museums, an open-air theatre, a studio and other structures.</span></li><span data-dcnode-id="1674" instrument_node="">
</span><li data-dcnode-id="1670"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node=""> Revanasiddeshwara Hills</span></strong><span data-dcnode-id="1671" instrument_node="">: Revanasiddeshwara betta (hill) is a lofty conical granite hill south of Ramanagara. Revanasiddeshwara Hill is 3300 ft above mean sea level and has motorable road till the top. Bhimeshwara temple is said to be the oldest temple in the hill. Has an inner sanctum with brick and mortar shikhara in Vijayanagara style. Revanasiddeshwara shrine on top of a huge boulder is the main place of worship on the hill. View from top is mesmerizing.</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1665"><strong data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Veerabhadraswamy Hills</span></strong><span data-dcnode-id="1666" instrument_node="">: Adjacent to Revanasiddheshwara hills five more hills named after Veerabhadraswamy are also popular. These can be accessed via villages near them such as Kotahalli, Nelehalli and Achchalu.</span></li><span data-dcnode-id="1664" instrument_node="">
</span><li data-dcnode-id="1660"><strong data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node=""> Kanva Reservoir</span></strong><span data-dcnode-id="1661" instrument_node="">: Kanva Reservoir is 10 kms from Ramanagara city and is an ideal picnic spot</span></li><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1655"><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Tippagondanahalli</span></strong><span data-dcnode-id="1656" instrument_node="">: Large reservoir near Magadi town, currently closed to tourists for maintenance.</span></li><span data-dcnode-id="1654" instrument_node="">
</span><li data-dcnode-id="1648"><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnatakatourism.org/tour-item/savanadurga/" rel="noopener" target="_blank"><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node=""> Savanadurga</span></strong><span data-dcnode-id="1651" instrument_node="">:</span></a><span data-dcnode-id="1649" instrument_node=""> Savandurga lures you with its gigantic hills, lush vegetation and spectacular landscapes. This is a tall granite hill formed by the union of two high peaks (4024 ft above MSL). Two prominent temples frequented by pilgrims are the Veerabhadreshwara Swamy and Narasimha Swamy temples situated at the foothill. Tourists can go on a trekking, rock climbing or on a biking-hiking trail and indulge their adventurous spirit! Since the region is covered by thick vegetation, and inhabited by bears and leopards, ensure not to stay at the top after dark. Do carry essentials like water, food, a first aid kit and a survival kit in your backpack. Be careful while ascending or descending, and always move in groups.</span></li><span data-dcnode-id="1647" instrument_node="">
</span><li data-dcnode-id="1643"><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Manchanabele Dam</span></strong><span data-dcnode-id="1644" instrument_node="">:
Situated around 45km from Bengaluru, the Manchanabele Dam is a small water dam built across the Arkavati River. The dam is one of the best spots for bird watching in these areas.</span></li><span data-dcnode-id="1642" instrument_node="">
</span></ul><span data-dcnode-id="1640" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">
	                Adventure/Activities	            </span></h6><span data-dcnode-id="1619" instrument_node="">
</span></div><span data-dcnode-id="1617" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1570"><span data-dcnode-id="1616" instrument_node="">
</span><ul data-dcnode-id="1574"><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1611"><strong data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Ramanagara Rock Climbing:</span></strong><span data-dcnode-id="1612" instrument_node=""> Ramanagara district is known for its giant rocks. Ramadevara betta in Ramanagara attracts adventure seekers and rock climbers. Rock climbing and rappelling activities give a sense of adventure and test one’s endurance and fitness levels. Several travel companies operate guided tours and rock climbing expeditions to Ramanagara. One can sign up for such activities as rock climbing cannot be done alone or in small groups without expert help and supervision. Check https://www.wandertrails.com/activities/ramanagara-trek</span></li><span data-dcnode-id="1610" instrument_node="">
</span><li data-dcnode-id="1606"><strong data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Longest Zip Lining:</span></strong><span data-dcnode-id="1607" instrument_node=""> Shilhaandara Resort in Ramanagara offers South India’s longest Zip line adventure and other activities such as ATV Ride and team building activities.</span></li><span data-dcnode-id="1605" instrument_node="">
</span><li data-dcnode-id="1601"><strong data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Eagleton - The Golf Village: </span></strong><span data-dcnode-id="1602" instrument_node="">Eagleton is an award winning 18-hole international standard golf course which is surrounded by a resort and golf academy with an expansive residential enclave with all modern amenities and facilities. Eagleton has been awarded as one of the Best Course in India by Asian Golf Monthly. It is the only course in South India to be listed in the Rolex Top 1000 Golf Courses of the World. In a first of its kind in India, Eagleton has also introduced night golf with the Par 3, 9 holes Executive Night Golf Course.</span></li><span data-dcnode-id="1600" instrument_node="">
</span><li data-dcnode-id="1595"><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnatakatourism.org/tour-item/wonderla/" rel="noopener" target="_blank"><strong data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Wonderla Theme Park</span></strong></a><span data-dcnode-id="1596" instrument_node="">: Wonder La is one of India’s largest amusement and water theme parks. Located on the outskirts of Bengaluru in Ramanagara district, Wonderla is spread across 82 acres, and has over 60 thrill packed rides offering entertainment and fun for all age groups. It also has a resort inside the amusement park - making it the first amusement park in India to have a resort built right inside it.</span></li><span data-dcnode-id="1594" instrument_node="">
</span><li data-dcnode-id="1590"><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Coracle Ride at Mekedatu:</span></strong><span data-dcnode-id="1591" instrument_node=""> Visitors need to take a coracle ride in Sangama to reach Mekedatu, a scenic spot where Kaveri River is so narrow, even a goat can jump across.</span></li><span data-dcnode-id="1589" instrument_node="">
</span><li data-dcnode-id="1583"><strong data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Adventure Sports and Games</span></strong><span data-dcnode-id="1586" instrument_node="">: Private operators such as Eagles Unbound organize ATV Rides, Zip lining, team building activities, obstacles course etc. </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eaglesunbound.com/"><span data-dcnode-id="1585" instrument_node="">Click here for Website</span></a></li><span data-dcnode-id="1582" instrument_node="">
</span><li data-dcnode-id="1576"><strong data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Fever Pitch</span></strong><span data-dcnode-id="1579" instrument_node="">: An outdoor adventure sports location near Magadi, 38 kms from Bengaluru. Offers ATV rides, Kayaking, watersports, camping experiences, team building activities etc </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feverpitchholidays.com/"><span data-dcnode-id="1578" instrument_node="">Click here for Website</span></a></li><span data-dcnode-id="1575" instrument_node="">
</span></ul><span data-dcnode-id="1573" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">
	                Religious Places	            </span></h6><span data-dcnode-id="1552" instrument_node="">
</span></div><span data-dcnode-id="1550" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1451"><span data-dcnode-id="1549" instrument_node="">
</span><ul data-dcnode-id="1455"><span data-dcnode-id="1548" instrument_node="">
</span><li data-dcnode-id="1541"><strong data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Kabbalamma Temple, Kabbal: </span></strong><span data-dcnode-id="1545" instrument_node="">Located 14 km from Kanakapura, Kabbal has a big steep hill which resembles a Shivalinga. At the foothills, is a highly venerated shrine called locally as Kabbalamma. The deity here is also referred to as “Kalikadevi”. The </span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">jatra</span></em><span data-dcnode-id="1542" instrument_node=""> of this temple is held annually during Shivarathri which is visited by thousands of devotees.</span></li><span data-dcnode-id="1540" instrument_node="">
</span><li data-dcnode-id="1536"><strong data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Ramadevara Betta Temple</span></strong><span data-dcnode-id="1537" instrument_node="">: Most popular spot in Ramanagara, located inside the Ramadevara Betta Vulture Sanctuary, requires climbing 400+ steps. Houses shrines of Lord Rameshwara and Parvathi. After visiting the temple and pond, hiking around the rocks gives captivating views of the surrounding.</span></li><span data-dcnode-id="1535" instrument_node="">
</span><li data-dcnode-id="1526"><strong data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Magadi</span></strong><span data-dcnode-id="1532" instrument_node="">: The historic town of Magadi is located around 40 km away from Bengaluru city. In 1638, Kempe Gowda (who founded Bengaluru) was forced to leave Bengaluru and then made Magadi his headquarters. He built a fort and the Rameshwara Temple. Outside the town, is the complex of Someshwara Temple which was built in 1712. To the left of the temple is a </span><em data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">mantapa</span></em><span data-dcnode-id="1529" instrument_node=""> that is believed to be Kempegowda’s </span><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Hajara.</span></em></li><span data-dcnode-id="1525" instrument_node="">
</span><li data-dcnode-id="1512"><strong data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Ranganatha Swamy Temple, Magadi:</span></strong><span data-dcnode-id="1522" instrument_node="">
Ranganatha Swamy Temple is located in Magadi and built in an elevated place called Swarnadri Parvata. It has a striking </span><em data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">rajagopura</span></em><span data-dcnode-id="1519" instrument_node=""> which is visible from a long distance. The area in which this temple is situated is called </span><em data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">“Tirumale”</span></em><span data-dcnode-id="1516" instrument_node="">. There is vast </span><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">prakara</span></em><span data-dcnode-id="1513" instrument_node=""> with a gateway. The garbhagriha has a Dravida shikara also having Vijayanagara workmanship. The main deity is a standing image of Lord Narayana.</span></li><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1507"><b data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Hanumanthaayya Temple, Kengal: </span></b><span data-dcnode-id="1508" instrument_node="">Located on the Bangalore- Mysore highway (3 km from Channapatna), is the temple dedicated to Lord Hanuman - Hanumanthaayya Temple. The Temple was renovated during the period of Sri. Kengal Hanumanthaiah, a former Chief Minister of Karnataka who is also credited with the conception and construction of the Vidhana Soudha in Bengaluru. The image of Lord Hanuman is sculpted in red granite (called as kengal locally) here; hence the place came to be known as Kengal. This image is believed to be consecrated by Saint Vyasa and the images of Rama, Sita and Lakshmana are also enshrined in it.</span></li><span data-dcnode-id="1506" instrument_node="">
</span><li data-dcnode-id="1502"><strong data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Dodda Mallur:</span></strong><span data-dcnode-id="1503" instrument_node=""> A village in Channapattana Taluk, popular for temples of Aravindavalli, Sri Ramaprameya Swamy, and Ambegalu Navaneeta Krishna. Dodda Mallur village is located on the banks of Kanva River, 3 kms from Channapattana.</span></li><span data-dcnode-id="1501" instrument_node="">
</span><li data-dcnode-id="1497"><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Devara Hosahalli:</span></strong><span data-dcnode-id="1498" instrument_node=""> Home to Vijayanagara era Prasanna Anjaneya temple</span></li><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1492"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Brahmanipura:</span></strong><span data-dcnode-id="1493" instrument_node=""> Home to Vijayanagara era Anjaneya temple, 5 kms from Chennapattana.</span></li><span data-dcnode-id="1491" instrument_node="">
</span><li data-dcnode-id="1487"><strong data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Harohalli: </span></strong><span data-dcnode-id="1488" instrument_node="">Home to Arunachaleshwara, Krishaswami, Basaveshwara, Bhimeshwara and Anjaneya temples.</span></li><span data-dcnode-id="1486" instrument_node="">
</span><li data-dcnode-id="1482"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Honganur: </span></strong><span data-dcnode-id="1483" instrument_node="">Home to Nagaswamy, Kodi Bhairava, Anjaneya, Lakshmi, Koladamma, Gopalakrishna, Maramma and Ishwara temples.</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1477"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Jalamangala:</span></strong><span data-dcnode-id="1478" instrument_node=""> Home to Lakshmi Narayana temple built in later Vijayanagara style and another Narayanaswamy temple said to be from Kempegowda era.</span></li><span data-dcnode-id="1476" instrument_node="">
</span><li data-dcnode-id="1472"><strong data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Kallahalli: </span></strong><span data-dcnode-id="1473" instrument_node="">Popular for Vijayanagara style Srinivasa temple.</span></li><span data-dcnode-id="1471" instrument_node="">
</span><li data-dcnode-id="1467"><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Kengal:</span></strong><span data-dcnode-id="1468" instrument_node=""> Birthplace of Kengal Hanumanthayya, late chief minister of Mysuru was born in Kengal, a town 3 kms from Chennapattana. Kengal is home to Anjaneya temple, Venkataramana and Shani temple.</span></li><span data-dcnode-id="1466" instrument_node="">
</span><li data-dcnode-id="1462"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Kudlur: </span></strong><span data-dcnode-id="1463" instrument_node="">Home to Mangaleshwara temple and Sri Rama temple. Kudlur was a popular town during the Chola era.</span></li><span data-dcnode-id="1461" instrument_node="">
</span><li data-dcnode-id="1457"><strong data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Sugganahalli: </span></strong><span data-dcnode-id="1458" instrument_node="">Home to Narasimha temple of Vijayanagara era.</span></li><span data-dcnode-id="1456" instrument_node="">
</span></ul><span data-dcnode-id="1454" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">
	                Nature &amp; Wildlife	            </span></h6><span data-dcnode-id="1433" instrument_node="">
</span></div><span data-dcnode-id="1431" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1414"><span data-dcnode-id="1430" instrument_node="">
</span><ul data-dcnode-id="1418"><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1425"><strong data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Ramadevarabetta Vulture Sanctuary: </span></strong><span data-dcnode-id="1426" instrument_node="">In 2012, around 346.41 hectares was earmarked as a protected area for the vultures which have been roosting in these areas for many decades - which is the Ramadevarabetta Vulture Sanctuary. It is India’s only vulture sanctuary, and perhaps the only place in Karnataka where the critically endangered and endemic Indian white-backed vulture and long-billed vultures are found.</span></li><span data-dcnode-id="1424" instrument_node="">
</span><li data-dcnode-id="1420"><strong data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Galibore Nature Camp</span></strong><span data-dcnode-id="1421" instrument_node="">: Take a break from the chaos of city life, unwind, and rest in the lap of nature. A property of Jungle Lodges &amp; Resorts, the Galibore Nature Camp offers a fascinating wildlife experience. Get cozy with spotted deers, grizzled giant squirrel, marsh crocodiles, turtles and snakes, etc and get acquainted with over 230 species of birds. For more information, visit www.junglelodges.com</span></li><span data-dcnode-id="1419" instrument_node="">
</span></ul><span data-dcnode-id="1417" instrument_node="">

</span><h6 class="mkdf-tour-item-plan-part-title" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">
	                Others	            </span></h6><span data-dcnode-id="1396" instrument_node="">
</span></div><span data-dcnode-id="1394" instrument_node="">
</span><div class="mkdf-tour-item-plan-part-description" data-dcnode-id="1360"><span data-dcnode-id="1393" instrument_node="">
</span><ul data-dcnode-id="1364"><span data-dcnode-id="1392" instrument_node="">
</span><li data-dcnode-id="1386"><strong data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Channapatna Lacquerware: </span></strong><span data-dcnode-id="1389" instrument_node="">60 km from Bengaluru is the small town of Channapatna or locally called as gombegala ooru (the town of toys). Every day, over 3000 local craftsmen produce colourful lacquerware including wooden toys, games/ puzzles, jewellery, coasters, napkin rings, powder boxes etc. This vegetable-dyed lacquerware is protected as a geographical indication (GI) under the World Trade Organization.
The toys, which are lightweight yet tough, were originally made exclusively from ivory wood and coated with lacquer made from vegetable dyes. Traditionally, the colours used are a mix of vegetable dyes and food-grade pigments. The natural dyes include turmeric for yellow, indigo powder for blue, vermillion or kumkum powder for orange and red, and katha (acacia tree extract) for brown. The colours used for these toys specially for infants/ children is non-toxic and thus safe. Visitors are encouraged to visit toy shops or manufacturing units and encourage local craft by purchasing toys or dolls that appeal to them.
In the 2015 Republic Day parade, the Karnataka tableau featured Channapatna handicrafts and won the third prize. </span><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">
</span></strong></li><span data-dcnode-id="1385" instrument_node="">
</span><li data-dcnode-id="1381"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Innovative Film City:
</span></strong><span data-dcnode-id="1382" instrument_node="">Located at Bidadi in the Bengaluru-Mysuru highway, this entertainment zone contains a global film production centre, museums, India’s first comprehensive film school, an amphitheater, a 100,000 sq ft food court, water rides, go karting and much more.</span></li><span data-dcnode-id="1380" instrument_node="">
</span><li data-dcnode-id="1376"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Pyramid Valley International: </span></strong><span data-dcnode-id="1377" instrument_node="">Located in Kanakapura Road, Pyramid Valley International is administered and run by Pyramid Spiritual Societies Movement. The Trust, a not-for-profit organization, was founded by Brahmarshi Patriji in the year 2003, to setup an international Meditational University near Bengaluru. It is considered to be the world’s largest meditation Pyramid and is constructed in a scientific way. The centre conducts regular classes and seminars on Meditation/ New Age Spirituality and its benefits. The place also has a library with a good collection of Spiritual books. A must visit place for mental relaxation.</span></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1371"><strong data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Bevooru:</span></strong><span data-dcnode-id="1372" instrument_node=""> Ancient Jain center and popular for pottery and toys. Thimmappana Betta near Bevoor has a 16th century Venkataramana temple. Bevoor is also home to Usalamma Chowdeshwari, Sri Rama, Maramma and Kempamma temples.</span></li><span data-dcnode-id="1370" instrument_node="">
</span><li data-dcnode-id="1366"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Bidadi:</span></strong><span data-dcnode-id="1367" instrument_node=""> Toyota Kirloskar Motors, makers of Toyota cars and SUVs have their plant in Bidadi. Bidadi is also home to several other industries</span></li><span data-dcnode-id="1365" instrument_node="">
</span></ul><span data-dcnode-id="1363" instrument_node="">

</span><h5 class="mkdf-location-excerpt" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">
</span></h5><span data-dcnode-id="1337" instrument_node="">
</span><div class="mkdf-location-content" data-dcnode-id="1303"><span data-dcnode-id="1336" instrument_node="">
</span><h4 data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Ramanagara is well connected by rail and road network from Bengaluru and Mysuru. Ramanagara is 60 kms south-west of Bengaluru.</span></h4><span data-dcnode-id="1333" instrument_node="">
&nbsp;
</span><div class="reach-all" data-dcnode-id="1327"><span class="reach-img" data-dcnode-id="1330"><img alt="" class="alignnone size-full wp-image-6909" data-dcnode-id="1332" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-01.png&amp;raw" width="50"><span data-dcnode-id="1331" instrument_node=""> </span></span><span class="reach-cont" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Bengaluru is the nearest airport to Ramanagara (80 kms).</span></span></div><span data-dcnode-id="1326" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1321"><span class="reach-img" data-dcnode-id="1324"><img alt="" class="alignnone size-full wp-image-6908" data-dcnode-id="1325" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-02.png&amp;raw" width="50"></span><span class="reach-cont" data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node=""> Ramanagara has a train station with connectivity to Bengaluru and Mysuru.</span></span></div><span data-dcnode-id="1320" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1315"><span class="reach-img" data-dcnode-id="1318"><img alt="" class="alignnone size-full wp-image-6907" data-dcnode-id="1319" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-03.png&amp;raw" width="50"></span><span class="reach-cont" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node=""> Ramanagara has excellent bus connectivity from major cities in Bengaluru, Mysuru, Mandya districts.</span></span></div><span data-dcnode-id="1314" instrument_node="">
</span><div class="reach-all" data-dcnode-id="1309"><span class="reach-img" data-dcnode-id="1312"><img alt="" class="alignnone size-full wp-image-6906" data-dcnode-id="1313" height="50" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2017/08/Icons-04.png&amp;raw" width="50"></span><span class="reach-cont" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node=""> Taxis can be hired in Ramanagara town or from Bengaluru. Self drive cars and bikes are available in Bengaluru.</span></span></div><span data-dcnode-id="1308" instrument_node="">

Kamala Basti (Basadi).

The &quot;porch&quot; of the lotus basti (basadi), built in 1204, is carved in the shape of a lotus flower. The statue of Neminatha which exhibits the Chalukya style is carved in black stone.

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

ನೈಸರ್ಗಿಕ ಪರಿಸರದ ನಡುವೆ ವಿಭಿನ್ನ ಆವೃತ್ತಿ ಹೊಂದಿರುವ ಮಿರ್ಜಾನ್ ಕೋಟೆ 16 ಶತಮಾನಗಳ ಸಾಂಸ್ಕೃತಿಕ ವೈಭವ ಮತ್ತು ವಿಶಿಷ್ಟ ಇತಿಹಾಸವನ್ನು ಹೊಂದಿದೆ. ಈ ಕೋಟೆಯನ್ನು &quot;ಮೆಣಸಿನ ರಾಣಿ &quot; ಎಂದು ಕರೆಯಲ್ಪಡುವ ಗೆರೊಪ್ಪಾ ರಾಣಿ ಚೆನ್ನೈ ಭೈರವಿ ದೇವಿ ನಿರ್ಮಿಸಿದಳು. ಎತ್ತರದ ಛಾವಣಿಗಳು ಮತ್ತು ಬುರುಜುಗಳನ್ನು ಹೊಂದಿರುವ ಕೋಟೆಯು ಕಂದಕಗಳು, ರಹಸ್ಯ ಮಾರ್ಗಗಳು, ಕಾಲುವೆಗಳು ಮತ್ತು 4 ಮುಖ್ಯ ಪ್ರವೇಶ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದ್ದು ಕೋಟೆಯು ಪ್ರಸಿದ್ಧ ವಾಸ್ತುಶಿಲ್ಪದ ಅದ್ಭುತವಾಗಿದೆ.

Mirjan Fort 

Mirjan Fort boasts 16 centuries of cultural splendor and unique history, with its various interpretation of the natural environment. Queen Bhairavi Devi of Geroppa, often known as the &quot;Pepper Queen,&quot; constructed the fort. With trenches, secret passages, canals, and four main entrances, the fort is a renowned architectural marvel with lofty ceilings and towers.

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.

</span><img alt="ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನ

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

Mirjan Fort

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

</span><img alt="ರಾಜ ಸಮಾಧಿ (ಗದ್ದಿಗೆ)

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.
