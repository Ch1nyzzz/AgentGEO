</span><div class="article-content retro-folders" data-dcnode-id="883" id="main-article"><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1542" instrument_node="">
</span><span data-dcnode-id="1540" instrument_node="">
</span><span data-dcnode-id="1538" instrument_node="">
</span><span data-dcnode-id="1536" instrument_node="">
</span><span data-dcnode-id="1534" instrument_node="">
</span></p><div class="quoteright" data-dcnode-id="1529" style="width:305px;"><a class="twikilink" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Pathfinder" title="/pmwiki/pmwiki.php/TabletopGame/Pathfinder"><div class="lazy_load_img_box" data-dcnode-id="1531" style="padding-top:120%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/pathfinder_kitsune.png" border="0" class="embeddedimage" data-dcnode-id="1532" height="420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/pathfinder_kitsune.png&amp;raw" width="350"></div></a></div><span data-dcnode-id="1528" instrument_node="">
</span><span data-dcnode-id="1526" instrument_node="">
</span><div class="indent" data-dcnode-id="1508"><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">"Oh my god, what is that? It's like a fox, but kinda looks like a girl."</span></em><span data-dcnode-id="1523" instrument_node="">
</span><div class="indent" data-dcnode-id="1509"><span data-dcnode-id="1522" instrument_node="">—</span><strong data-dcnode-id="1519"><a class="createlink" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LetsPlay/PhoenixSC" title="/pmwiki/pmwiki.php/LetsPlay/PhoenixSC"><span data-dcnode-id="1521" instrument_node="">Phoenix SC</span></a></strong><span data-dcnode-id="1518" instrument_node=""> analyzing a user-created </span><em data-dcnode-id="1515"><a class="twikilink" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Minecraft" title="/pmwiki/pmwiki.php/VideoGame/Minecraft"><span data-dcnode-id="1517" instrument_node="">Minecraft</span></a></em><span data-dcnode-id="1514" instrument_node=""> recipe, </span><a class="urllink" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DffFN6iuDweQ"><span data-dcnode-id="1513" instrument_node="">"Dumb Minecraft Crafting Recipes"</span><img data-dcnode-id="1512" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1510" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1502"><span class="ad-caption" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1503" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="1497"><span data-dcnode-id="1501" instrument_node="">A subtrope of </span><a class="twikilink" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeastMan" title="/pmwiki/pmwiki.php/Main/BeastMan"><span data-dcnode-id="1500" instrument_node="">Beast Man</span></a><span data-dcnode-id="1498" instrument_node="">, a Fox Man is a character with foxlike traits. Typical features are pointy ears, nose, fur, and the all-important bushy tail. Most vulpinoid characters tend to be based off on red foxes — other species are far rarer.
</span></p><p data-dcnode-id="1480"><span data-dcnode-id="1496" instrument_node="">Their personality tends to be sly, intelligent and </span><a class="twikilink" data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CunningLikeAFox" title="/pmwiki/pmwiki.php/Main/CunningLikeAFox"><span data-dcnode-id="1495" instrument_node="">cunning</span></a><span data-dcnode-id="1493" instrument_node="">, sometimes even </span><a class="twikilink" data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FoulFox" title="/pmwiki/pmwiki.php/Main/FoulFox"><span data-dcnode-id="1492" instrument_node="">foul</span></a><span data-dcnode-id="1490" instrument_node="">, and if you encounter one you can bet that they are some sort of trickster or </span><a class="twikilink" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ConArtist" title="/pmwiki/pmwiki.php/Main/ConArtist"><span data-dcnode-id="1489" instrument_node="">Con Artist</span></a><span data-dcnode-id="1487" instrument_node="">. They are depicted in both positive and negative light, ranging from heroic if tricksy people, to annoying but ultimately harmless, to </span><a class="twikilink" data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreyAndGrayMorality" title="/pmwiki/pmwiki.php/Main/GreyAndGrayMorality"><span data-dcnode-id="1486" instrument_node="">morally grey</span></a><span data-dcnode-id="1484" instrument_node=""> characters with </span><a class="twikilink" data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiddenDepths" title="/pmwiki/pmwiki.php/Main/HiddenDepths"><span data-dcnode-id="1483" instrument_node="">Hidden Depths</span></a><span data-dcnode-id="1481" instrument_node="">, to simply being villains.
</span></p><p data-dcnode-id="1460"><span data-dcnode-id="1479" instrument_node="">Characters of this variety fall on the </span><a class="twikilink" data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlidingScaleOfAnthropomorphism" title="/pmwiki/pmwiki.php/Main/SlidingScaleOfAnthropomorphism"><span data-dcnode-id="1478" instrument_node="">Sliding Scale of Anthropomorphism</span></a><span data-dcnode-id="1476" instrument_node=""> as </span><a class="twikilink" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleBitBeastly" title="/pmwiki/pmwiki.php/Main/LittleBitBeastly"><span data-dcnode-id="1475" instrument_node="">Little Bit Beastly</span></a><span data-dcnode-id="1473" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeastMan" title="/pmwiki/pmwiki.php/Main/BeastMan"><span data-dcnode-id="1472" instrument_node="">Beast Man</span></a><span data-dcnode-id="1470" instrument_node="">. For varieties that are actual foxes — ranging on the scale from </span><a class="twikilink" data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunnyAnimal" title="/pmwiki/pmwiki.php/Main/FunnyAnimal"><span data-dcnode-id="1469" instrument_node="">Funny Animal</span></a><span data-dcnode-id="1467" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NearlyNormalAnimal" title="/pmwiki/pmwiki.php/Main/NearlyNormalAnimal"><span data-dcnode-id="1466" instrument_node="">Nearly Normal Animal</span></a><span data-dcnode-id="1464" instrument_node=""> — see </span><a class="twikilink" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticFoxes" title="/pmwiki/pmwiki.php/Main/FantasticFoxes"><span data-dcnode-id="1463" instrument_node="">Fantastic Foxes</span></a><span data-dcnode-id="1461" instrument_node="">.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="1454"><span class="ad-caption" data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Advertisement:</span></span><div data-dcnode-id="1455" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="1443"><span data-dcnode-id="1453" instrument_node="">See also </span><a class="twikilink" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Kitsune" title="/pmwiki/pmwiki.php/Main/Kitsune"><span data-dcnode-id="1452" instrument_node="">Kitsune</span></a><span data-dcnode-id="1450" instrument_node="">, a page on foxes in Japanese folklore and mythology. A supertrope to </span><a class="twikilink" data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FoxyVixen" title="/pmwiki/pmwiki.php/Main/FoxyVixen"><span data-dcnode-id="1449" instrument_node="">Foxy Vixen</span></a><span data-dcnode-id="1447" instrument_node="">. For their wolf cousins, see </span><a class="twikilink" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WolfMan" title="/pmwiki/pmwiki.php/Main/WolfMan"><span data-dcnode-id="1446" instrument_node="">Wolf Man</span></a><span data-dcnode-id="1444" instrument_node="">.
</span></p><hr data-dcnode-id="1442"><h2 data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Examples:</span></h2><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1438"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="1436" onclick="toggleAllFolders();"><span data-dcnode-id="1437" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1434"></p><div class="folderlabel" data-dcnode-id="1432" onclick="togglefolder('folder0');"><span data-dcnode-id="1433" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Anime and Manga&nbsp;</span></div><div class="folder" data-dcnode-id="1404" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="1431" instrument_node="">
</span><ul data-dcnode-id="1405"><li data-dcnode-id="1418"><span data-dcnode-id="1430" instrument_node=""> </span><em data-dcnode-id="1427"><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DigimonTamers" title="/pmwiki/pmwiki.php/Anime/DigimonTamers"><span data-dcnode-id="1429" instrument_node="">Digimon Tamers</span></a></em><span data-dcnode-id="1426" instrument_node="">: Renamon is a bipedal fox with yellow fur and piercing blue eyes. Her Ultimate/Perfect-level form Taomon has more or less the same design, but is dressed in priestly garb. Taomon's blue </span><a class="twikilink" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaletteSwap" title="/pmwiki/pmwiki.php/Main/PaletteSwap"><span data-dcnode-id="1425" instrument_node="">Palette Swap</span></a><span data-dcnode-id="1423" instrument_node=""> Doumon appears in </span><em data-dcnode-id="1420"><a class="twikilink" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DigimonFusion" title="/pmwiki/pmwiki.php/Anime/DigimonFusion"><span data-dcnode-id="1422" instrument_node="">Digimon Fusion</span></a></em><span data-dcnode-id="1419" instrument_node=""> as a minor villain.
</span></li><li data-dcnode-id="1406"><span data-dcnode-id="1417" instrument_node=""> </span><em data-dcnode-id="1414"><a class="twikilink" data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/TamamoChansAFox" title="/pmwiki/pmwiki.php/Manga/TamamoChansAFox"><span data-dcnode-id="1416" instrument_node="">Tamamo-chan’s a Fox!</span></a></em><span data-dcnode-id="1413" instrument_node="">: Tamamo and her sisters are </span><a class="twikilink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Kitsune" title="/pmwiki/pmwiki.php/Main/Kitsune"><span data-dcnode-id="1412" instrument_node="">divine fox spirits</span></a><span data-dcnode-id="1410" instrument_node=""> who assume a glamor that makes them look human so they can live in the human world. Those who can see past the glamor, such as 99.9% of the student body of Tamamo's school and one </span><a class="twikilink" data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SenseiChan" title="/pmwiki/pmwiki.php/Main/SenseiChan"><span data-dcnode-id="1409" instrument_node="">Sensei-chan</span></a><span data-dcnode-id="1407" instrument_node="">, see the sisters as bipedal, humanoid foxes with white fur.
</span></li></ul></div><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1402"></p><div class="folderlabel" data-dcnode-id="1400" onclick="togglefolder('folder1');"><span data-dcnode-id="1401" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Fan Works&nbsp;</span></div><div class="folder" data-dcnode-id="1375" id="folder1" isfolder="true" style="display:block;"><span data-dcnode-id="1399" instrument_node="">
</span><span data-dcnode-id="1397" instrument_node="">
</span><ul data-dcnode-id="1376"><li data-dcnode-id="1391"><span data-dcnode-id="1396" instrument_node=""> </span><em data-dcnode-id="1393"><a class="twikilink" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Fanfic/TeanasTravels" title="/pmwiki/pmwiki.php/Fanfic/TeanasTravels"><span data-dcnode-id="1395" instrument_node="">Teana's Travels</span></a></em><span data-dcnode-id="1392" instrument_node="">: Aspatrians are a race of vulpine sapients, who were under the control of a vicous dictatorship who violently oppressed and objectified women and children (to the point where they literally weren't considered people). The League caught wind of this thanks to an escaped slave, and promptly leapt in and deposed the dictator and his armies. The Aspatrians, now much happier and more stable, were made a "protectorate" of the Tripartate.
</span></li><li data-dcnode-id="1377"><span data-dcnode-id="1390" instrument_node=""> </span><em data-dcnode-id="1386"><a class="urllink" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archiveofourown.org/works/27736435"><span data-dcnode-id="1389" instrument_node="">Zero Context: Taking Out the Trash</span><img data-dcnode-id="1388" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a></em><span data-dcnode-id="1385" instrument_node="">: Aldonza Karate is a Kittenoan, an alien race of anthropomorphic cats and dogs that draw inspiration from the </span><em data-dcnode-id="1382"><a class="twikilink" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/SonicTheHedgehog" title="/pmwiki/pmwiki.php/Franchise/SonicTheHedgehog"><span data-dcnode-id="1384" instrument_node="">Sonic the Hedgehog</span></a></em><span data-dcnode-id="1381" instrument_node=""> franchise, and is described as a mixed-breed fox caninoid. </span><a class="twikilink" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="1380" instrument_node="">Word of God</span></a><span data-dcnode-id="1378" instrument_node=""> clarifies this to mean that she has both red fox and bat-eared fox heritage, giving her the coloration of the former and the ears and teeth of the latter.
</span></li></ul></div><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1373"></p><div class="folderlabel" data-dcnode-id="1371" onclick="togglefolder('folder2');"><span data-dcnode-id="1372" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Literature&nbsp;</span></div><div class="folder" data-dcnode-id="1258" id="folder2" isfolder="true" style="display:block;"><span data-dcnode-id="1370" instrument_node="">
</span><ul data-dcnode-id="1259"><li data-dcnode-id="1364"><span data-dcnode-id="1369" instrument_node=""> </span><em data-dcnode-id="1366"><a class="twikilink" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AmaranthineSaga" title="/pmwiki/pmwiki.php/Literature/AmaranthineSaga"><span data-dcnode-id="1368" instrument_node="">Amaranthine Saga</span></a></em><span data-dcnode-id="1365" instrument_node="">: Amaranthines are shapeshifters who can change between a "speaking form", which is humanoid with some inhuman and animalistic traits, and a "truest form", which is an unusually large form of whatever animal their clan is aligned with. Fox-clan Amaranthines are thus a subtle version of this in speaking form, appearing as humans with vulpine ears, tails or eyes. Unusually, however, most of the foxes focused on in the series are silver foxes, not the typical reds (although Lady Nona and her sister are red foxes).
</span></li><li data-dcnode-id="1352"><span data-dcnode-id="1363" instrument_node=""> </span><em data-dcnode-id="1360"><a class="createlink" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBookOfDeacon" title="/pmwiki/pmwiki.php/Literature/TheBookOfDeacon"><span data-dcnode-id="1362" instrument_node="">The Book Of Deacon</span></a></em><span data-dcnode-id="1359" instrument_node="">, by Joseph Lallo, has malthropes</span><span class="notelabel" data-dcnode-id="1356" onclick="togglenote('note0swbo');" style="cursor: pointer;"><sup data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1354" id="note0swbo" isnote="true" onclick="togglenote('note0swbo');" style="display: none; cursor: pointer;"><span data-dcnode-id="1355" instrument_node="">mixed Latin and Greek for "bad person/human"</span></span><span data-dcnode-id="1353" instrument_node=""> who look like fox-people and are hunted down as vermin by the humanoid races. Practically to extinction on the continent where most of the stories take place.
</span></li><li data-dcnode-id="1340"><span data-dcnode-id="1351" instrument_node=""> </span><em data-dcnode-id="1348"><a class="twikilink" data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheDarkProfitSaga" title="/pmwiki/pmwiki.php/Literature/TheDarkProfitSaga"><span data-dcnode-id="1350" instrument_node="">The Dark Profit Saga</span></a></em><span data-dcnode-id="1347" instrument_node="">: Most breeds of Gnoll look like canine halflings</span><span class="notelabel" data-dcnode-id="1344" onclick="togglenote('note11mn0');" style="cursor: pointer;"><sup data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="1342" id="note11mn0" isnote="true" onclick="togglenote('note11mn0');" style="display: none; cursor: pointer;"><span data-dcnode-id="1343" instrument_node="">they were originally a clan of Gnome that was corrupted by the Dark God</span></span><span data-dcnode-id="1341" instrument_node="">; Fennekin are a Demi-gnoll breed with more fox-like features and large ears.
</span></li><li data-dcnode-id="1328"><span data-dcnode-id="1339" instrument_node=""> </span><em data-dcnode-id="1336"><a class="twikilink" data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/IsItWrongToTryToPickUpGirlsInADungeon" title="/pmwiki/pmwiki.php/LightNovel/IsItWrongToTryToPickUpGirlsInADungeon"><span data-dcnode-id="1338" instrument_node="">Is It Wrong to Try to Pick Up Girls in a Dungeon?</span></a></em><span data-dcnode-id="1335" instrument_node=""> has the Renards, a rare race from the Far East who are known for having </span><a class="twikilink" data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleBitBeastly" title="/pmwiki/pmwiki.php/Main/LittleBitBeastly"><span data-dcnode-id="1334" instrument_node="">fox-like ears and a tail.</span></a><span data-dcnode-id="1332" instrument_node=""> They're unique among the races as they're integral to the creation of a Killing Stone, which rips a renard's soul out of their body to allow the holder to use whatever magic that renard could. </span><span class="spoiler" data-dcnode-id="1330" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1331" instrument_node="">Ishtar wanted to force Haruhime to create a Killing Stone for her so she could use her magic to overrun the Freya Familia.</span></span><span data-dcnode-id="1329" instrument_node="">
</span></li><li data-dcnode-id="1284"><span data-dcnode-id="1327" instrument_node=""> </span><em data-dcnode-id="1324"><a class="twikilink" data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/LogHorizon" title="/pmwiki/pmwiki.php/LightNovel/LogHorizon"><span data-dcnode-id="1326" instrument_node="">Log Horizon</span></a></em><span data-dcnode-id="1323" instrument_node="">:
</span><ul data-dcnode-id="1285"><li data-dcnode-id="1303"><span data-dcnode-id="1322" instrument_node=""> Fox Tails are one of the three Beast Folk races in the </span><a class="twikilink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MMORPG" title="/pmwiki/pmwiki.php/Main/MMORPG"><span data-dcnode-id="1321" instrument_node="">MMORPG</span></a><span data-dcnode-id="1319" instrument_node=""> Elder Tale, resembling </span><a class="twikilink" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleBitBeastly" title="/pmwiki/pmwiki.php/Main/LittleBitBeastly"><span data-dcnode-id="1318" instrument_node="">humans with fox ears and one or more tails</span></a><span data-dcnode-id="1316" instrument_node=""> (which they can hide with magic). While they have high magical stats, they're </span><a class="twikilink" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TierInducedScrappy" title="/pmwiki/pmwiki.php/Main/TierInducedScrappy"><span data-dcnode-id="1315" instrument_node="">unpopular with players</span></a><span data-dcnode-id="1313" instrument_node=""> due to </span><a class="twikilink" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MechanicallyUnusualClass" title="/pmwiki/pmwiki.php/Main/MechanicallyUnusualClass"><span data-dcnode-id="1312" instrument_node="">a bizarre mechanic</span></a><span data-dcnode-id="1310" instrument_node=""> which replaces one of their skills with a random one every few levels (with results that can vary from </span><a class="twikilink" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JokeCharacter" title="/pmwiki/pmwiki.php/Main/JokeCharacter"><span data-dcnode-id="1309" instrument_node="">Joke Character</span></a><span data-dcnode-id="1307" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameBreaker" title="/pmwiki/pmwiki.php/Main/GameBreaker"><span data-dcnode-id="1306" instrument_node="">Game-Breaker</span></a><span data-dcnode-id="1304" instrument_node="">).
</span></li><li data-dcnode-id="1286"><span data-dcnode-id="1302" instrument_node=""> When Elder Tale somehow fuses with a real fantasy world, the trapped players find that the mix of real and videogame physics allows them to </span><a class="twikilink" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EmergentGameplay" title="/pmwiki/pmwiki.php/Main/EmergentGameplay"><span data-dcnode-id="1301" instrument_node="">use their characters' abilities in previously impossible ways</span></a><span data-dcnode-id="1299" instrument_node="">, nicknamed "Overskills". One Fox Tail player, Nureha, invents an Overskill which takes the race's </span><a class="twikilink" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Kitsune" title="/pmwiki/pmwiki.php/Main/Kitsune"><span data-dcnode-id="1298" instrument_node="">Kitsune</span></a><span data-dcnode-id="1296" instrument_node=""> themes </span><a class="twikilink" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpToEleven" title="/pmwiki/pmwiki.php/Main/UpToEleven"><span data-dcnode-id="1295" instrument_node="">Up to Eleven</span></a><span data-dcnode-id="1293" instrument_node=""> — </span><a class="twikilink" data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbilityMixing" title="/pmwiki/pmwiki.php/Main/AbilityMixing"><span data-dcnode-id="1292" instrument_node="">combining the racial "hide your ears" illusion with the persuasion abilities of her Courtesan subclass</span></a><span data-dcnode-id="1290" instrument_node=""> in order to create a </span><a class="twikilink" data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Glamour" title="/pmwiki/pmwiki.php/Main/Glamour"><span data-dcnode-id="1289" instrument_node="">Glamour</span></a><span data-dcnode-id="1287" instrument_node=""> effect that can disguise her as other people.
</span></li></ul></li><li data-dcnode-id="1278"><span data-dcnode-id="1283" instrument_node=""> </span><em data-dcnode-id="1280"><a class="createlink" data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Medea" title="/pmwiki/pmwiki.php/Literature/Medea"><span data-dcnode-id="1282" instrument_node="">Medea</span></a></em><span data-dcnode-id="1279" instrument_node="">: The alien Fuxes start life as foxlike, 6 legged, female centaurs that lose a pair of hind limbs each time they reproduce. When the final pair drop off, they are left as bipedal and male.
</span></li><li data-dcnode-id="1272"><span data-dcnode-id="1277" instrument_node=""> </span><em data-dcnode-id="1274"><a class="twikilink" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheRedVixenAdventures" title="/pmwiki/pmwiki.php/Literature/TheRedVixenAdventures"><span data-dcnode-id="1276" instrument_node="">The Red Vixen Adventures</span></a></em><span data-dcnode-id="1273" instrument_node="">: The Foxen are alien race that happen to look like anthropomorphic foxes have a culture strongly resembling Edwardian England.
</span></li><li data-dcnode-id="1266"><span data-dcnode-id="1271" instrument_node=""> </span><em data-dcnode-id="1268"><a class="twikilink" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TourOfTheMerrimack" title="/pmwiki/pmwiki.php/Literature/TourOfTheMerrimack"><span data-dcnode-id="1270" instrument_node="">Tour of the Merrimack</span></a></em><span data-dcnode-id="1267" instrument_node="">: In the final book, a planet with is discovered whose primary sapient inhabitants are bipedal, foxlike marsupials at an approximately stone-age level of development.
</span></li><li data-dcnode-id="1260"><span data-dcnode-id="1265" instrument_node=""> </span><em data-dcnode-id="1262"><a class="twikilink" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/XanaduStoryverse" title="/pmwiki/pmwiki.php/Literature/XanaduStoryverse"><span data-dcnode-id="1264" instrument_node="">Xanadu (Storyverse)</span></a></em><span data-dcnode-id="1261" instrument_node="">: Anthropomorphic foxes are one of the more common variants of animal people produced by the Change. They feature particularly prominently in "Against Type", where the main villains are a pair of fox morphs who plan to use mad science to turn humans into more foxes like themselves.
</span></li></ul></div><span data-dcnode-id="1257" instrument_node="">

</span><ul data-dcnode-id="1235"><li data-dcnode-id="1236"><span data-dcnode-id="1246" instrument_node=""> </span><em data-dcnode-id="1243"><a class="twikilink" data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Grimm" title="/pmwiki/pmwiki.php/Series/Grimm"><span data-dcnode-id="1245" instrument_node="">Grimm</span></a></em><span data-dcnode-id="1242" instrument_node="">:
</span><ul data-dcnode-id="1237"><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node=""> Fuchsbau are wesen based on foxes. In accordance with animal stereotypes, they're generally considered to be less than trustworthy, being cunning, mischievous and sly. Rosalee Calvert is part of the main cast, making the Fuchsbau the second most prominent Wesen to appear.
</span></li><li data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node=""> Vulpesmyrca are bigger black fox wesen, with less human shaped heads, larger fox like ears and much more pronounced fangs. They also possess enhance physical strength and speed, and who commonly work as mercenaries and prey upon Willaharas (rabbit wesen) for their feet.
</span></li></ul></li></ul></div><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1232"></p><div class="folderlabel" data-dcnode-id="1230" onclick="togglefolder('folder4');"><span data-dcnode-id="1231" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Tabletop Games&nbsp;</span></div><div class="folder" data-dcnode-id="1186" id="folder4" isfolder="true" style="display:block;"><span data-dcnode-id="1229" instrument_node="">
</span><ul data-dcnode-id="1187"><li data-dcnode-id="1209"><span data-dcnode-id="1228" instrument_node=""> </span><em data-dcnode-id="1225"><a class="twikilink" data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="1227" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="1224" instrument_node="">:
</span><ul data-dcnode-id="1210"><li data-dcnode-id="1213"><span data-dcnode-id="1223" instrument_node=""> The 3rd edition </span><em data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Oriental Adventures</span></em><span data-dcnode-id="1220" instrument_node=""> sourcebook has a hengeyokai race with the Shapechanger type, who can switch between humanoid, animal and </span><a class="twikilink" data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PartialTransformation" title="/pmwiki/pmwiki.php/Main/PartialTransformation"><span data-dcnode-id="1219" instrument_node="">hybrid</span></a><span data-dcnode-id="1217" instrument_node=""> forms; 3.5 removes the Shapechanger type, making them Humanoids (resulting in some </span><a class="twikilink" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation" title="/pmwiki/pmwiki.php/Main/GameplayAndStorySegregation"><span data-dcnode-id="1216" instrument_node="">Gameplay and Story Segregation</span></a><span data-dcnode-id="1214" instrument_node="">, as they're still described like Magical Beasts).
</span></li><li data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node=""> The vulpins are a race of foxlike humanoids with a reputation as formidable warriors and very capable and honorable leaders. Unfortunately, some human societies and religions never accepted them and hunted them to their brink of extinction.
</span></li></ul></li><li data-dcnode-id="1200"><span data-dcnode-id="1208" instrument_node=""> </span><em data-dcnode-id="1205"><a class="twikilink" data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/FadingSuns" title="/pmwiki/pmwiki.php/TabletopGame/FadingSuns"><span data-dcnode-id="1207" instrument_node="">Fading Suns</span></a></em><span data-dcnode-id="1204" instrument_node=""> has Vulpanthropes, a species created as shock troops by a noble with </span><a class="twikilink" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadScientist" title="/pmwiki/pmwiki.php/Main/MadScientist"><span data-dcnode-id="1203" instrument_node="">Mad Scientist</span></a><span data-dcnode-id="1201" instrument_node=""> leanings from human and fox DNA. They proved more prolific than expected and have come to plague isolated human settlements on many planets.
</span></li><li data-dcnode-id="1188"><span data-dcnode-id="1199" instrument_node=""> </span><em data-dcnode-id="1196"><a class="twikilink" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Tabletopgame/Pathfinder" title="/pmwiki/pmwiki.php/Tabletopgame/Pathfinder"><span data-dcnode-id="1198" instrument_node="">Pathfinder</span></a></em><span data-dcnode-id="1195" instrument_node=""> has a race called kitsune, although despite the name they're only nominally related to traditional kitsune in Japanese mythology. </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Pathfinder</span></em><span data-dcnode-id="1192" instrument_node=""> kitsune are based on the 3.5 fox hengeyokai, but </span><a class="twikilink" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Nerf" title="/pmwiki/pmwiki.php/Main/Nerf"><span data-dcnode-id="1191" instrument_node="">Nerfed</span></a><span data-dcnode-id="1189" instrument_node=""> by removing the animal form (which instead becomes a "disguise" that higher-level kitsune can learn by spending a feat) and making the hybrid form their true form. They also have a reputation as tricksters who use their guile and charms to get what they want, and have a racial rogue archetype based on fitting this stereotype.
</span></li></ul></div><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1184"></p><div class="folderlabel" data-dcnode-id="1182" onclick="togglefolder('folder5');"><span data-dcnode-id="1183" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Video Games&nbsp;</span></div><div class="folder" data-dcnode-id="1003" id="folder5" isfolder="true" style="display:block;"><span data-dcnode-id="1181" instrument_node="">
</span><ul data-dcnode-id="1174"><li data-dcnode-id="1175"><span data-dcnode-id="1180" instrument_node=""> </span><em data-dcnode-id="1177"><a class="twikilink" data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ArmyOfTentacles" title="/pmwiki/pmwiki.php/VideoGame/ArmyOfTentacles"><span data-dcnode-id="1179" instrument_node="">Army Of Tentacles</span></a></em><span data-dcnode-id="1176" instrument_node="">: Thatcher is a friendly, if shy, student with fox ears and tail.
</span></li></ul><ul data-dcnode-id="1004"><li data-dcnode-id="1167"><span data-dcnode-id="1172" instrument_node=""> </span><em data-dcnode-id="1169"><a class="twikilink" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BreathOfFireDragonQuarter" title="/pmwiki/pmwiki.php/VideoGame/BreathOfFireDragonQuarter"><span data-dcnode-id="1171" instrument_node="">Breath of Fire: Dragon Quarter</span></a></em><span data-dcnode-id="1168" instrument_node="">: Hortensia has fox ears. Concept art shows she was going to have a tail too, like Lin, but her final design doesn't have one.
</span></li><li data-dcnode-id="1155"><span data-dcnode-id="1166" instrument_node=""> </span><em data-dcnode-id="1163"><a class="twikilink" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkCloud2" title="/pmwiki/pmwiki.php/VideoGame/DarkCloud2"><span data-dcnode-id="1165" instrument_node="">Dark Cloud 2</span></a></em><span data-dcnode-id="1162" instrument_node="">: The Hunter Fox and its </span><a class="twikilink" data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaletteSwap" title="/pmwiki/pmwiki.php/Main/PaletteSwap"><span data-dcnode-id="1161" instrument_node="">Palette Swap</span></a><span data-dcnode-id="1159" instrument_node=""> Red Fox are legless, floating fox folk with a </span><a class="twikilink" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GentlemanAdventurer" title="/pmwiki/pmwiki.php/Main/GentlemanAdventurer"><span data-dcnode-id="1158" instrument_node="">Gentleman Adventurer</span></a><span data-dcnode-id="1156" instrument_node=""> motif. Unfortunately for the protagonists, humans seem to be their game of choice.

</span></li><li data-dcnode-id="1119"><span data-dcnode-id="1130" instrument_node=""> The vupfox in </span><em data-dcnode-id="1127"><a class="twikilink" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ExodusBorealis" title="/pmwiki/pmwiki.php/VideoGame/ExodusBorealis"><span data-dcnode-id="1129" instrument_node="">Exodus Borealis</span></a></em><span data-dcnode-id="1126" instrument_node=""> look like anthropomorphic foxes in colonial-era clothes. </span><a class="urllink" data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smugmarmot.com/wp-content/uploads/2021/06/Pair-of-Fox-1024-1024x683.png"><span data-dcnode-id="1125" instrument_node="">The art</span><img data-dcnode-id="1124" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">◊</span></small><span data-dcnode-id="1120" instrument_node=""> on the developer's website shows them with tails, but the in-game assets lack them.

</span></li><li data-dcnode-id="1095"><span data-dcnode-id="1112" instrument_node=""> </span><em data-dcnode-id="1109"><a class="twikilink" data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FireEmblemFates" title="/pmwiki/pmwiki.php/VideoGame/FireEmblemFates"><span data-dcnode-id="1111" instrument_node="">Fire Emblem Fates</span></a></em><span data-dcnode-id="1108" instrument_node=""> has Kitsune as a </span><a class="twikilink" data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterClass" title="/pmwiki/pmwiki.php/Main/CharacterClass"><span data-dcnode-id="1107" instrument_node="">Character Class</span></a><span data-dcnode-id="1105" instrument_node="">. They’re depicted as </span><a class="twikilink" data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleBitBeastly" title="/pmwiki/pmwiki.php/Main/LittleBitBeastly"><span data-dcnode-id="1104" instrument_node="">Little Bit Beastly</span></a><span data-dcnode-id="1102" instrument_node=""> characters, with fox ears and a tail, and the ability to </span><a class="twikilink" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Shapeshifting" title="/pmwiki/pmwiki.php/Main/Shapeshifting"><span data-dcnode-id="1101" instrument_node="">turn into an actual fox</span></a><span data-dcnode-id="1099" instrument_node=""> for their attacks. Their chief, Kaden, is very friendly, and puts a lot of value into repaying kindness, but can </span><a class="twikilink" data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BewareTheNiceOnes" title="/pmwiki/pmwiki.php/Main/BewareTheNiceOnes"><span data-dcnode-id="1098" instrument_node="">become very dangerous</span></a><span data-dcnode-id="1096" instrument_node=""> when someone is after the fur of himself, or his daughter, Selkie. Kaden even straight up lures Corrin into a trap in Conquest, and him and the generic Kitsune enemies in that chapter can use illusions to avoid combat temporarily.
</span></li><li data-dcnode-id="1089"><span data-dcnode-id="1094" instrument_node=""> </span><em data-dcnode-id="1091"><a class="twikilink" data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FoxNForests" title="/pmwiki/pmwiki.php/VideoGame/FoxNForests"><span data-dcnode-id="1093" instrument_node="">Fox N Forests</span></a></em><span data-dcnode-id="1090" instrument_node=""> has you play as Rick, an anthropomorphic fox on a quest to save the forest from whatever dark forces are trying to force a fifth season on them.

</span></li><li data-dcnode-id="1023"><span data-dcnode-id="1031" instrument_node=""> </span><em data-dcnode-id="1028"><a class="twikilink" data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheTenthLine" title="/pmwiki/pmwiki.php/VideoGame/TheTenthLine"><span data-dcnode-id="1030" instrument_node="">The Tenth Line</span></a></em><span data-dcnode-id="1027" instrument_node="">: Rik is a Kobold, a humanoid fox </span><a class="twikilink" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SapientFurTrade" title="/pmwiki/pmwiki.php/Main/SapientFurTrade"><span data-dcnode-id="1026" instrument_node="">whose fur is sought after by hunters</span></a><span data-dcnode-id="1024" instrument_node="">.

</span><ul data-dcnode-id="949"><li data-dcnode-id="986"><span data-dcnode-id="997" instrument_node=""> </span><em data-dcnode-id="994"><a class="twikilink" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/CrimsonFlag" title="/pmwiki/pmwiki.php/Webcomic/CrimsonFlag"><span data-dcnode-id="996" instrument_node="">Crimson Flag</span></a></em><span data-dcnode-id="993" instrument_node="">: Reyn, the primary sapient species of the setting, are based on different species of fox. Reds, Grays, Snow, and Fens have been seen. It eventually turned out </span><span class="spoiler" data-dcnode-id="988" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="992" instrument_node=""> they are foxes that were uplifted by the "goddess" worshiped by the Reds as a </span><a class="twikilink" data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ServantRace" title="/pmwiki/pmwiki.php/Main/ServantRace"><span data-dcnode-id="991" instrument_node="">Servant Race</span></a><span data-dcnode-id="989" instrument_node="">.</span></span><span data-dcnode-id="987" instrument_node="">
</span></li><li data-dcnode-id="978"><span data-dcnode-id="985" instrument_node=""> </span><em data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Dela the Hooda</span></em><span data-dcnode-id="982" instrument_node="">: "Hoodas" are a vulpine species from the </span><a class="twikilink" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScienceFantasy" title="/pmwiki/pmwiki.php/Main/ScienceFantasy"><span data-dcnode-id="981" instrument_node="">Science Fantasy</span></a><span data-dcnode-id="979" instrument_node=""> world of Mhâr where they exist alongside more "traditional" fantasy races like goblins, elves, dwarves, and humans. Dela found herself in Canada after an accident with her halfling boss's experimental jump drive.
</span></li><li data-dcnode-id="962"><span data-dcnode-id="977" instrument_node=""> </span><em data-dcnode-id="974"><a class="twikilink" data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/KeychainOfCreation" title="/pmwiki/pmwiki.php/Webcomic/KeychainOfCreation"><span data-dcnode-id="976" instrument_node="">Keychain of Creation</span></a></em><span data-dcnode-id="973" instrument_node="">: Marena is a </span><a class="twikilink" data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Exalted" title="/pmwiki/pmwiki.php/TabletopGame/Exalted"><span data-dcnode-id="972" instrument_node="">Lunar Exalted</span></a><span data-dcnode-id="970" instrument_node=""> with the fox totem, and as such her </span><a class="twikilink" data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShapeshifterDefaultForm" title="/pmwiki/pmwiki.php/Main/ShapeshifterDefaultForm"><span data-dcnode-id="969" instrument_node="">Shapeshifter Default Form</span></a><span data-dcnode-id="967" instrument_node=""> has fox ears and tail and her </span><a class="urllink" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//keychain.patternspider.net/archive/koc0142.html"><span data-dcnode-id="966" instrument_node="">warform</span><img data-dcnode-id="965" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="963" instrument_node=""> is a giant anthropomorphic fox.

</span><ul data-dcnode-id="913"><li data-dcnode-id="927"><span data-dcnode-id="942" instrument_node=""> </span><em data-dcnode-id="939"><a class="twikilink" data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WebAnimation/Hololive" title="/pmwiki/pmwiki.php/WebAnimation/Hololive"><span data-dcnode-id="941" instrument_node="">hololive</span></a></em><span data-dcnode-id="938" instrument_node="">: Fubuki Shirakami is a fox-girl, but unfortunately </span><a class="twikilink" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OnceDoneNeverForgotten" title="/pmwiki/pmwiki.php/Main/OnceDoneNeverForgotten"><span data-dcnode-id="937" instrument_node="">still</span></a><span data-dcnode-id="935" instrument_node=""> has to deal with "cat-girl" commenters due to a </span><em data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">very</span></em><span data-dcnode-id="932" instrument_node=""> catchy song that </span><a class="urllink" data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DE-Xxo6utgNA"><span data-dcnode-id="931" instrument_node="">claims she's a cat and not a fox.</span><img data-dcnode-id="930" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="928" instrument_node="">
