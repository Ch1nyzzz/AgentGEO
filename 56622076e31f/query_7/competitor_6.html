pan></span></div></div></div><div class="header__background zoom-blur" data-dcnode-id="1624"><img alt="woman wearing sustainable sports bra" class="zoom-blur__image zoom-blur__image--wide zoom-blur__image--blur" data-dcnode-id="1625" sizes="100vw" srcset="https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras.jpg 2000w, https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras-150x120.jpg 150w, https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras-768x614.jpg 768w, https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras-1536x1229.jpg 1536w, https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras-640x512.jpg 640w, https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras-100x80.jpg 100w, https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras-300x240.jpg 300w, https://goodonyou.eco/wp-content/uploads/2020/12/Sustainable-Sports-Bras-1600x1280.jpg 1600w"></div></header><main class="container" data-dcnode-id="324"><section class="section" data-dcnode-id="431"><div class="section__inner" data-dcnode-id="432"><div class="grid" data-dcnode-id="433"><article class="article" data-dcnode-id="434"><div class="article__block" data-dcnode-id="1601"><h1 class="article__title" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Top 15 Eco-Friendly and Sustainable Sports Bras</span></h1><div class="article__meta" data-dcnode-id="1602"><div class="meta-labels" data-dcnode-id="1610"><div class="meta-labels__row" data-dcnode-id="1617"><span data-dcnode-id="1620" instrument_node="">Words: </span><a class="meta-labels__no-wrap" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goodonyou.eco/author/iwolfe"><span data-dcnode-id="1619" instrument_node="">Isobella Wolfe</span></a></div><div class="meta-labels__row" data-dcnode-id="1613"><span data-dcnode-id="1616" instrument_node="">Category: </span><a class="meta-labels__no-wrap" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goodonyou.eco/category/top-picks/"><span data-dcnode-id="1615" instrument_node="">Top Picks</span></a></div><div class="meta-labels__row" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Published: 07 Jan 2021</span></div></div><div class="social" data-dcnode-id="1603"><p class="social__cta" data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Share for change</span></p><a class="social__link" data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fgoodonyou.eco%252Fsustainable-sports-bras%252F" target="_blank"><span data-dcnode-id="1607" instrument_node="">FB</span></a><a class="social__link" data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/home%3Fstatus%3DTop%2B15%2BEco-Friendly%2Band%2BSustainable%2BSports%2BBras%250AWhether%2Byou%2Bneed%2Blight%2Bsupport%2Bfor%2Byoga%2Bor%2Bgardening%252C%2Bor%2Bsomething%2Ba%2Blittle%2Bsturdier%2Bfor%2Bhigh-impact%2Bsports%252C%2Bwe%25E2%2580%2599ve%2Bgot%2Byou%2B%28partially%29%2Bcovered.%250Ahttps%3A%252F%252Fgoodonyou.eco%252Fsustainable-sports-bras%252F" target="_blank"><span data-dcnode-id="1605" instrument_node="">TW</span></a></div></div></div><div class="article__block" data-dcnode-id="1564"><div class="article__content rich-text" data-dcnode-id="1565"><p data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">Ahh, sports bras—a revolutionary essential for active women and non-binary folks the world over. The first iterations of the sports bra were invented in the late 1970’s, and were dubbed “jockstraps for breasts”. Unfortunate naming aside, they were </span><i data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">sorely</span></i><span data-dcnode-id="1597" instrument_node=""> needed, with countless people complaining of runaway straps, chafing, and soreness while wearing regular bras during exercise.</span></p><span data-dcnode-id="1595" instrument_node=""> </span><p data-dcnode-id="1581"><span data-dcnode-id="1594" instrument_node="">Care for ourselves should go hand-in-hand with care for the world around us, which is why conscious consumers should avoid those trendy activewear companies you see splashed across your screens like </span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directory.goodonyou.eco/brand/lululemon" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1593" instrument_node="">Lululemon</span></a><span data-dcnode-id="1591" instrument_node="">, </span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directory.goodonyou.eco/brand/lorna-jane" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1590" instrument_node="">Lorna Jane</span></a><span data-dcnode-id="1588" instrument_node="">, and </span><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directory.goodonyou.eco/brand/gymshark" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1587" instrument_node="">Gymshark</span></a><span data-dcnode-id="1585" instrument_node="">, who are all ‘Not Good Enough’ for people, the planet, and animals. These and similar brands will often participate in a touch of </span><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wokewashing.com/%23%3A~%3Atext%3DAbout%2Ccause%2520harm%2520to%2520vulnerable%2520communities."><span data-dcnode-id="1584" instrument_node="">wokewashing</span></a><span data-dcnode-id="1582" instrument_node=""> in their advertising. Occasionally using inclusive models or saying they care about their community is all well and good, but if they’re not backing up their claims with transparency or solid action on living wages or sustainable fabrics, for example, then they simply don’t deserve your support!</span></p><span data-dcnode-id="1580" instrument_node=""> </span><p data-dcnode-id="1566"><span data-dcnode-id="1579" instrument_node="">Thankfully, more sustainable sports bras are cropping up every day. Whether you need light support for yoga or gardening, or something a little sturdier for high-impact sports, we’ve got you (partially) covered. From </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directory.goodonyou.eco/brand/boob" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1578" instrument_node="">Boob</span></a><span data-dcnode-id="1576" instrument_node="">’s maternity sports bra, to extended sizing sports bras from </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directory.goodonyou.eco/brand/elle-evans" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1575" instrument_node="">Elle Evans</span></a><span data-dcnode-id="1573" instrument_node=""> and </span><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directory.goodonyou.eco/brand/girlfriend-collective" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1572" instrument_node="">Girlfriend Collective</span></a><span data-dcnode-id="1570" instrument_node="">, to organic plant-dyed yoga bras from </span><a data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//directory.goodonyou.eco/brand/purusha-people" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1569" instrument_node="">Purusha People</span></a><span data-dcnode-id="1567" instrument_node="">, we hope you find an option that meets your needs.</span></p></div></div><div class="article__block" data-dcnode-id="1500"><div class="layout-block" data-brand-name="Elle Evans" data-dcnode-id="1501"><h2 class="layout-block__heading" data-dcnode-id="1561"><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elleevansswimwear.com.au/%3Futm_campaign%3DGoY-article%26utm_medium%3Dreferral%26utm_source%3DGoodOnYou%26utm_content%3D%252Fsustainable-sports-bras%252F%26oid%3D73%26affid%3D1%26source_id%3DGoY-article%26sub1%3D%252Fsustainable-sports-bras%252F" target="_blank"><span data-dcnode-id="1563" instrument_node="">Elle Evans</span></a></h2><div class="layout-block__aside" data-dcnode-id="1530"><div class="rating" data-dcnode-id="1534" data-rating="5"><div class="rating__inner" data-dcnode-id="1535"><div class="rating__item" data-dcnode-id="1556"><svg data-dcnode-id="1557" height="36" width="36" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1558" fill="none" fill-rule="evenodd" stroke-width="1.4"><path d="M35.3 18A17.3 17.3 0 1 0 .7 18a17.3 17.3 0 0 0 34.6 0z" data-dcnode-id="1560"></path><path d="M9 26.12h18a9.02 9.02 0 0 0-18 0z" data-dcnode-id="1559"></path></g></svg></div><div class="rating__item" data-dcnode-id="1551"><svg data-dcnode-id="1552" height="36" width="36" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1553" fill="none" fill-rule="evenodd" stroke-width="1.4"><path d="M35.3 18A17.3 17.3 0 1 0 .7 18a17.3 17.3 0 0 0 34.6 0z" data-dcnode-id="1555"></path><path d="M7.88 25.28a12.15 12.15 0 0 1 20.24-.13" data-dcnode-id="1554"></path></g></svg></div><div class="rating__item" data-dcnode-id="1546"><svg data-dcnode-id="1547" height="36" width="36" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1548" fill="none" fill-rule="evenodd" stroke-width="1.4"><path d="M35.3 18A17.3 17.3 0 1 0 .7 18a17.3 17.3 0 0 0 34.6 0z" data-dcnode-id="1550"></path><path d="M8.28 23.4h19.44" data-dcnode-id="1549"></path></g></svg></div><div class="rating__item" data-dcnode-id="1541"><svg data-dcnode-id="1542" height="36" width="36" xmlns="http://www.w3.org/2000/sv
