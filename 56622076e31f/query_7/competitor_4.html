</span><ul data-dcnode-id="2840"><li data-dcnode-id="2850"><span data-dcnode-id="2857" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/CirqueDuSoleil" title="/pmwiki/pmwiki.php/Creator/CirqueDuSoleil"><span data-dcnode-id="2856" instrument_node="">Cirque du Soleil</span></a><span data-dcnode-id="2854" instrument_node="">'s </span><em data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Amaluna</span></em><span data-dcnode-id="2851" instrument_node=""> has Cali, Miranda's pet half-human lizard who later becomes the main antagonist, and the reptilian creatures who perform the Suspended Poles act.
</span></li><li data-dcnode-id="2841"><span data-dcnode-id="2849" instrument_node=""> In </span><a class="createlink" data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/EdwardAlbee" title="/pmwiki/pmwiki.php/Creator/EdwardAlbee"><span data-dcnode-id="2848" instrument_node="">Edward Albee</span></a><span data-dcnode-id="2846" instrument_node="">'s play </span><em data-dcnode-id="2843"><a class="twikilink" data-dcnode-id="2844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Theatre/Seascape" title="/pmwiki/pmwiki.php/Theatre/Seascape"><span data-dcnode-id="2845" instrument_node="">Seascape</span></a></em><span data-dcnode-id="2842" instrument_node=""> a husband and wife vacationing on a beach meet a reptilian couple who have just emerged from the ocean hoping to evolve upwards; misunderstandings and complications ensue.
</span></li></ul></div><span data-dcnode-id="2838" instrument_node="">
</span><p data-dcnode-id="2837"></p><div class="folderlabel" data-dcnode-id="2835" onclick="togglefolder('folder14');"><span data-dcnode-id="2836" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Video Games&nbsp;</span></div><div class="folder" data-dcnode-id="1507" id="folder14" isfolder="true" style="display:block;"><span data-dcnode-id="2834" instrument_node="">
</span><ul data-dcnode-id="2690"><li data-dcnode-id="2828"><span data-dcnode-id="2833" instrument_node=""> </span><em data-dcnode-id="2830"><a class="twikilink" data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AgeOfWonders" title="/pmwiki/pmwiki.php/VideoGame/AgeOfWonders"><span data-dcnode-id="2832" instrument_node="">Age of Wonders</span></a></em><span data-dcnode-id="2829" instrument_node="">: Lizardmen were a playable race. As they were neutral, both good and evil players could choose them as a second race during the campaign. In the sequel, they got replaced by the draconians.
</span></li><li data-dcnode-id="2822"><span data-dcnode-id="2827" instrument_node=""> </span><em data-dcnode-id="2824"><a class="twikilink" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/AncientEmpires" title="/pmwiki/pmwiki.php/VideoGame/AncientEmpires"><span data-dcnode-id="2826" instrument_node="">Ancient Empires</span></a></em><span data-dcnode-id="2823" instrument_node=""> has the green-scaled Lizards as a unit type. They're as strong as normal soldiers on land, but get massive boosts to mobility and defence when in the water.
</span></li><li data-dcnode-id="2813"><span data-dcnode-id="2821" instrument_node=""> </span><em data-dcnode-id="2818"><a class="twikilink" data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ArcanaHeart" title="/pmwiki/pmwiki.php/VideoGame/ArcanaHeart"><span data-dcnode-id="2820" instrument_node="">Arcana Heart</span></a></em><span data-dcnode-id="2817" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Meido" title="/pmwiki/pmwiki.php/Main/Meido"><span data-dcnode-id="2816" instrument_node="">Fiona's</span></a><span data-dcnode-id="2814" instrument_node=""> ending shows a Lizard folk swordsman helping her in her quest to return to the human world.
</span></li><li data-dcnode-id="2807"><span data-dcnode-id="2812" instrument_node=""> </span><em data-dcnode-id="2809"><a class="twikilink" data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ArcanumOfSteamworksAndMagickObscura" title="/pmwiki/pmwiki.php/VideoGame/ArcanumOfSteamworksAndMagickObscura"><span data-dcnode-id="2811" instrument_node="">Arcanum: Of Steamworks &amp; Magick Obscura</span></a></em><span data-dcnode-id="2808" instrument_node="">: The Bedokaan are large, primitive and live in a swamp. They're not really evil, but have a very different psychology than "warmbloods". The conflict with them can be resolved peacefully, and one of them may join the party.
</span></li><li data-dcnode-id="2792"><span data-dcnode-id="2806" instrument_node=""> In </span><em data-dcnode-id="2803"><a class="twikilink" data-dcnode-id="2804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Arknights" title="/pmwiki/pmwiki.php/VideoGame/Arknights"><span data-dcnode-id="2805" instrument_node="">Arknights</span></a></em><span data-dcnode-id="2802" instrument_node="">, most members of the reptilian races </span><a class="twikilink" data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleBitBeastly" title="/pmwiki/pmwiki.php/Main/LittleBitBeastly"><span data-dcnode-id="2801" instrument_node="">just have scaly tails</span></a><span data-dcnode-id="2799" instrument_node=""> on otherwise human bodies, but </span><a class="twikilink" data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheStoic" title="/pmwiki/pmwiki.php/Main/TheStoic"><span data-dcnode-id="2798" instrument_node="">12F</span></a><span data-dcnode-id="2796" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolOldGuy" title="/pmwiki/pmwiki.php/Main/CoolOldGuy"><span data-dcnode-id="2795" instrument_node="">Rangers</span></a><span data-dcnode-id="2793" instrument_node=""> are full-on lizard men, with fully scaled bodies and lizard heads. Additionally, Archosauria enemies in Gavial's sidestory are anthropomorphic crocodile-men.
</span></li><li data-dcnode-id="2783"><span data-dcnode-id="2791" instrument_node=""> </span><em data-dcnode-id="2788"><a class="twikilink" data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ArmiesOfExigo" title="/pmwiki/pmwiki.php/VideoGame/ArmiesOfExigo"><span data-dcnode-id="2790" instrument_node="">Armies of Exigo</span></a></em><span data-dcnode-id="2787" instrument_node=""> : The Lizardmen are an intelligent race who supply the Beast hordes with Striders (fast-moving, dinosaur-mounted, axe-throwing cavalry) and Warlocks (astrologer-type spellcasters). They're far more cultured than their </span><a class="twikilink" data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeastMan" title="/pmwiki/pmwiki.php/Main/BeastMan"><span data-dcnode-id="2786" instrument_node="">Beast Man</span></a><span data-dcnode-id="2784" instrument_node=""> allies, and seem to have a society built on slavery and reading the stars.
</span></li><li data-dcnode-id="2777"><span data-dcnode-id="2782" instrument_node=""> </span><em data-dcnode-id="2779"><a class="twikilink" data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Ascendancy" title="/pmwiki/pmwiki.php/VideoGame/Ascendancy"><span data-dcnode-id="2781" instrument_node="">Ascendancy</span></a></em><span data-dcnode-id="2778" instrument_node="">: The Chamachies are Lizard folk Centaurs. Very smart Lizard folk Centaurs.
</span></li><li data-dcnode-id="2771"><span data-dcnode-id="2776" instrument_node=""> </span><em data-dcnode-id="2773"><a class="twikilink" data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Avernum" title="/pmwiki/pmwiki.php/VideoGame/Avernum"><span data-dcnode-id="2775" instrument_node="">Avernum</span></a></em><span data-dcnode-id="2772" instrument_node="">: The Slithzerikai are bipedal semi-aquatic lizards (or maybe crested crocodiles) with rather complex backstory. There's supposedly a highly magical peaceful civilisation hiding far deep, and the sliths you meet descend from the ones cast out for violence. There are both savage tribes you keep fighting and neutral to friendly civilized ones, hoping to be admitted back someday. The latter have integrated into Avernite society and become a PC race from game 2 onwards. All of them are skilled in combat or in clerical magic, if not both.
</span></li><li data-dcnode-id="2762"><span data-dcnode-id="2770" instrument_node=""> From </span><em data-dcnode-id="2767"><a class="twikilink" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Battleborn" title="/pmwiki/pmwiki.php/VideoGame/Battleborn"><span data-dcnode-id="2769" instrument_node="">Battleborn</span></a></em><span data-dcnode-id="2766" instrument_node="">:A couple of skins for the other Battleborn turn them into reptilians. Whiskey Foxtrot's "It's Reptile Foxtrot!" skin turns him into a reptile scaled version of his normal self. Meanwhile, Ernest's appropriately named "Devolved" skin basically devolves the </span><a class="twikilink" data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BirdPeople" title="/pmwiki/pmwiki.php/Main/BirdPeople"><span data-dcnode-id="2765" instrument_node="">bird man</span></a><span data-dcnode-id="2763" instrument_node=""> back into a feathered dino man.
</span></li><li data-dcnode-id="2756"><span data-dcnode-id="2761" instrument_node=""> </span><em data-dcnode-id="2758"><a class="twikilink" data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BattleCircuit" title="/pmwiki/pmwiki.php/VideoGame/BattleCircuit"><span data-dcnode-id="2760" instrument_node="">Battle Circuit</span></a></em><span data-dcnode-id="2757" instrument_node="">: The Reptails, Dr. Saturn's henchmen, are green bipedal lizards.
</span></li><li data-dcnode-id="2750"><span data-dcnode-id="2755" instrument_node=""> </span><em data-dcnode-id="2752"><a class="twikilink" data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BattleForWesnoth" title="/pmwiki/pmwiki.php/VideoGame/BattleForWesnoth"><span data-dcnode-id="2754" instrument_node="">Battle for Wesnoth</span></a></em><span data-dcnode-id="2751" instrument_node=""> has the Saurians and the Drakes (both members of the same faction). The former are your average scaled semi-humanoids, the latter mini-dragons.
</span></li><li data-dcnode-id="2740"><span data-dcnode-id="2749" instrument_node=""> </span><em data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Bloodstone</span></em><span data-dcnode-id="2746" instrument_node="">, a somewhat obscure CRPG which used </span><em data-dcnode-id="2742"><a class="twikilink" data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheMagicCandle" title="/pmwiki/pmwiki.php/VideoGame/TheMagicCandle"><span data-dcnode-id="2745" instrument_node="">The Magic Candle</span></a><span data-dcnode-id="2743" instrument_node=""> III</span></em><span data-dcnode-id="2741" instrument_node=""> engine, had the Tlengle. Big, scaly, strong, usually red. But they were also known for being skilled tailors, and the playable Tlengle would often crack terrible jokes. Bloodstone also had the Tlatol, primitive and violent evolutionary cousins to the Tlengle.
</span></li><li data-dcnode-id="2721"><span data-dcnode-id="2739" instrument_node=""> Deis/Bleu in the </span><em data-dcnode-id="2736"><a class="twikilink" data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BreathOfFire" title="/pmwiki/pmwiki.php/VideoGame/BreathOfFire"><span data-dcnode-id="2738" instrument_node="">Breath of Fire</span></a></em><span data-dcnode-id="2735" instrument_node=""> series is one of these. She would be a </span><a class="twikilink" data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnakePeople" title="/pmwiki/pmwiki.php/Main/SnakePeople"><span data-dcnode-id="2734" instrument_node="">snake person</span></a><span data-dcnode-id="2732" instrument_node="">, but her entry in </span><em data-dcnode-id="2729"><a class="twikilink" data-dcnode-id="2730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BreathOfFireIV" title="/pmwiki/pmwiki.php/VideoGame/BreathOfFireIV"><span data-dcnode-id="2731" instrument_node="">Breath of Fire IV</span></a></em><span data-dcnode-id="2728" instrument_node=""> shows her to be a </span><a class="twikilink" data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Shapeshifting" title="/pmwiki/pmwiki.php/Main/Shapeshifting"><span data-dcnode-id="2727" instrument_node="">shapeshifter</span></a><span data-dcnode-id="2725" instrument_node=""> goddess, so she falls into this category as well as </span><a class="twikilink" data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnakePeople" title="/pmwiki/pmwiki.php/Main/SnakePeople"><span data-dcnode-id="2724" instrument_node="">Snake People</span></a><span data-dcnode-id="2722" instrument_node="">.
</span></li><li data-dcnode-id="2715"><span data-dcnode-id="2720" instrument_node=""> </span><em data-dcnode-id="2717"><a class="twikilink" data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Brigandine" title="/pmwiki/pmwiki.php/VideoGame/Brigandine"><span data-dcnode-id="2719" instrument_node="">Brigandine</span></a></em><span data-dcnode-id="2716" instrument_node=""> has trident-wielding lizard men. They're an effective low-tier unit with decent stats who are especially noted for their impressive accuracy and high rate of critical hits, these traits shoot up even further when they evolve.
</span></li><li data-dcnode-id="2697"><span data-dcnode-id="2714" instrument_node=""> The obscure XBOX shooter </span><em data-dcnode-id="2711"><a class="twikilink" data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/BruteForce" title="/pmwiki/pmwiki.php/VideoGame/BruteForce"><span data-dcnode-id="2713" instrument_node="">Brute Force</span></a></em><span data-dcnode-id="2710" instrument_node=""> has Brutus, a "Feral" (a scaly green lizard man with a voice like </span><a class="twikilink" data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/InspectorGadget" title="/pmwiki/pmwiki.php/WesternAnimation/InspectorGadget"><span data-dcnode-id="2709" instrument_node="">Doctor Claw</span></a><span data-dcnode-id="2707" instrument_node="">) as one of the main </span><a class="twikilink" data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacters" title="/pmwiki/pmwiki.php/Main/PlayerCharacters"><span data-dcnode-id="2706" instrument_node="">Player Characters</span></a><span data-dcnode-id="2704" instrument_node="">. He's by far the toughest squad member, and sports a </span><a class="twikilink" data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HealingFactor" title="/pmwiki/pmwiki.php/Main/HealingFactor"><span data-dcnode-id="2703" instrument_node="">Healing Factor</span></a><span data-dcnode-id="2701" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AuraVision" title="/pmwiki/pmwiki.php/Main/AuraVision"><span data-dcnode-id="2700" instrument_node="">Aura Vision</span></a><span data-dcnode-id="2698" instrument_node="">.
</span></li><li data-dcnode-id="2691"><span data-dcnode-id="2696" instrument_node=""> </span><em data-dcnode-id="2693"><a class="twikilink" data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/CastleInTheDarkness" title="/pmwiki/pmwiki.php/VideoGame/CastleInTheDarkness"><span data-dcnode-id="2695" instrument_node="">Castle in the Darkness</span></a></em><span data-dcnode-id="2692" instrument_node=""> features blue lizardmen as enemies found in the Cave of Serpents, which was stated to be used to be Alexandria's mine before the lizardmen took it over. They appear in two varieties: spear-wielding ones who charge at the player character when they spot him, and shield-wielding ones who stay in place and jump up synchronically with the player's jumping.
</span></li></ul><ul data-dcnode-id="1508"><li data-dcnode-id="2680"><span data-dcnode-id="2688" instrument_node=""> </span><em data-dcnode-id="2685"><a class="twikilink" data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ChoiceOfGames" title="/pmwiki/pmwiki.php/VideoGame/ChoiceOfGames"><span data-dcnode-id="2687" instrument_node="">Choice of Games</span></a></em><span data-dcnode-id="2684" instrument_node=""> "Silverworld": The ophidians, an advanced nonhuman civilization in service to the </span><a class="twikilink" data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="2683" instrument_node="">False Icon</span></a><span data-dcnode-id="2681" instrument_node="">.
</span></li><li data-dcnode-id="2650"><span data-dcnode-id="2679" instrument_node=""> </span><em data-dcnode-id="2676"><a class="twikilink" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ChronoTrigger" title="/pmwiki/pmwiki.php/VideoGame/ChronoTrigger"><span data-dcnode-id="2678" instrument_node="">Chrono Trigger</span></a></em><span data-dcnode-id="2675" instrument_node="">:
</span><ul data-dcnode-id="2651"><li data-dcnode-id="2667"><span data-dcnode-id="2674" instrument_node=""> The first game had the caveman of </span><a class="twikilink" data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OneMillionBC" title="/pmwiki/pmwiki.php/Main/OneMillionBC"><span data-dcnode-id="2673" instrument_node="">65 million BC</span></a><span data-dcnode-id="2671" instrument_node=""> battling Reptites, humanoid, sapient dinosaurs. For the most part, the humans were losing the evolutionary war, but the </span><a class="twikilink" data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColonyDrop" title="/pmwiki/pmwiki.php/Main/ColonyDrop"><span data-dcnode-id="2670" instrument_node="">arrival</span></a><span data-dcnode-id="2668" instrument_node=""> of a starfaring planetary parasite named Lavos doomed the Reptites to extinction and ensured humanity's dominance.
</span></li><li data-dcnode-id="2661"><span data-dcnode-id="2666" instrument_node=""> </span><em data-dcnode-id="2663"><a class="twikilink" data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ChronoCross" title="/pmwiki/pmwiki.php/VideoGame/ChronoCross"><span data-dcnode-id="2665" instrument_node="">Chrono Cross</span></a></em><span data-dcnode-id="2662" instrument_node=""> offers us a glimpse of what the Reptites would have become — an advanced species called Dragonians who would master both technology and magic, while living in harmony with nature. Unfortunately for the Reptites, the future changed.
</span></li><li data-dcnode-id="2652"><span data-dcnode-id="2660" instrument_node=""> In the DS remake of </span><em data-dcnode-id="2657"><a class="twikilink" data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ChronoTrigger" title="/pmwiki/pmwiki.php/VideoGame/ChronoTrigger"><span data-dcnode-id="2659" instrument_node="">Chrono Trigger</span></a></em><span data-dcnode-id="2656" instrument_node="">, after </span><span class="spoiler" data-dcnode-id="2654" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2655" instrument_node="">the Ocean Palace</span></span><span data-dcnode-id="2653" instrument_node="">, weird time distortions appear in 65 million BC and 600 AD. There is a village of good Reptites you can visit, and perform many small quests, which eventually provide a store which sells the best items in the game.
</span></li></ul></li><li data-dcnode-id="2644"><span data-dcnode-id="2649" instrument_node=""> </span><em data-dcnode-id="2646"><a class="twikilink" data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheCurseOfIssyos" title="/pmwiki/pmwiki.php/VideoGame/TheCurseOfIssyos"><span data-dcnode-id="2648" instrument_node="">The Curse of Issyos</span></a></em><span data-dcnode-id="2645" instrument_node=""> has them as common enemies in the first couple of stages.
</span></li><li data-dcnode-id="2618"><span data-dcnode-id="2643" instrument_node=""> </span><em data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Dark Planet: Battle for Natrolis</span></em><span data-dcnode-id="2640" instrument_node=""> has Sorin, the native inhabitants of eponymous planet. While they are living in civilization of roughly medieval level (though they also have </span><a class="twikilink" data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SchizoTech" title="/pmwiki/pmwiki.php/Main/SchizoTech"><span data-dcnode-id="2639" instrument_node="">some more advanced inventions</span></a><span data-dcnode-id="2637" instrument_node=""> like blimps or hot air balloons) with </span><a class="twikilink" data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterPartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterPartCulture"><span data-dcnode-id="2636" instrument_node="">visible Asian flavour</span></a><span data-dcnode-id="2634" instrument_node="">, the game itself is set in science-fiction setting, pitting them against </span><a class="twikilink" data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanityIsAdvanced" title="/pmwiki/pmwiki.php/Main/HumanityIsAdvanced"><span data-dcnode-id="2633" instrument_node="">high-tech human Colonists</span></a><span data-dcnode-id="2631" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts" title="/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts"><span data-dcnode-id="2630" instrument_node="">space bugs Dreil</span></a><span data-dcnode-id="2628" instrument_node="">. However, they can still fight them on equal ground, thanks to their </span><a class="twikilink" data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagiTek" title="/pmwiki/pmwiki.php/Main/MagiTek"><span data-dcnode-id="2627" instrument_node="">magic</span></a><span data-dcnode-id="2625" instrument_node=""> and sheer badassery. They are the ones who defend their homeworld against alien invaders, which technically makes them the good guys, but they are also quite ruthless and not above </span><a class="twikilink" data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ImAHumanitarian" title="/pmwiki/pmwiki.php/Main/ImAHumanitarian"><span data-dcnode-id="2624" instrument_node="">eating their defeated enemies</span></a><span data-dcnode-id="2622" instrument_node=""> and tactics which involve slaughtering their foes </span><a class="twikilink" data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/KillEmAll" title="/pmwiki/pmwiki.php/Main/KillEmAll"><span data-dcnode-id="2621" instrument_node="">to the last man</span></a><span data-dcnode-id="2619" instrument_node="">.
</span></li><li data-dcnode-id="2612"><span data-dcnode-id="2617" instrument_node=""> </span><em data-dcnode-id="2614"><a class="twikilink" data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkSoulsII" title="/pmwiki/pmwiki.php/VideoGame/DarkSoulsII"><span data-dcnode-id="2616" instrument_node="">Dark Souls II</span></a></em><span data-dcnode-id="2613" instrument_node=""> has the truly bizarre Flexile Sentry, which consists of two armoured Lizard Men torsos attached to a single set of legs.
</span></li><li data-dcnode-id="2591"><span data-dcnode-id="2611" instrument_node=""> </span><em data-dcnode-id="2608"><a class="twikilink" data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DarkVoid" title="/pmwiki/pmwiki.php/VideoGame/DarkVoid"><span data-dcnode-id="2610" instrument_node="">Dark Void</span></a></em><span data-dcnode-id="2607" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AncientAstronauts" title="/pmwiki/pmwiki.php/Main/AncientAstronauts"><span data-dcnode-id="2606" instrument_node="">The Watchers</span></a><span data-dcnode-id="2604" instrument_node=""> are manipulative shapeshifting reptilians exiled into </span><a class="twikilink" data-dcnode-id="2602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnotherDimension" title="/pmwiki/pmwiki.php/Main/AnotherDimension"><span data-dcnode-id="2603" instrument_node="">Another Dimension</span></a><span data-dcnode-id="2601" instrument_node=""> by early humans. In keeping with this trope, their </span><a class="twikilink" data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BizarreAlienBiology" title="/pmwiki/pmwiki.php/Main/BizarreAlienBiology"><span data-dcnode-id="2600" instrument_node="">life cycle</span></a><span data-dcnode-id="2598" instrument_node=""> is based on metamorphosis: they emerge from the egg as larval, wormlike hatchlings, and they pilot </span><a class="twikilink" data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PoweredArmor" title="/pmwiki/pmwiki.php/Main/PoweredArmor"><span data-dcnode-id="2597" instrument_node="">Powered Armor</span></a><span data-dcnode-id="2595" instrument_node=""> suits as basic mooks. As they get older and more intelligent, they grow arms and legs and become more snake-like; they also get to pilot something like an alien </span><a class="twikilink" data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumongousMecha" title="/pmwiki/pmwiki.php/Main/HumongousMecha"><span data-dcnode-id="2594" instrument_node="">Humongous Mecha</span></a><span data-dcnode-id="2592" instrument_node="">. Finally, the Elder form is the most intelligent, and can shapeshift to perfectly mimic a human appearance. These serve as spies in human society and leaders for the rest of the species.
</span></li><li data-dcnode-id="2569"><span data-dcnode-id="2590" instrument_node=""> In the </span><em data-dcnode-id="2587"><a class="twikilink" data-dcnode-id="2588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DivineDivinity" title="/pmwiki/pmwiki.php/VideoGame/DivineDivinity"><span data-dcnode-id="2589" instrument_node="">Divine Divinity</span></a></em><span data-dcnode-id="2586" instrument_node=""> series, the Lizards are one of seven key species populating the world of Rivellon (alongside humans, elves, dwarves, orcs, imps, and the undead), although they hardly make an appearance in early games.
</span><ul data-dcnode-id="2570"><li data-dcnode-id="2580"><span data-dcnode-id="2585" instrument_node=""> </span><em data-dcnode-id="2582"><a class="twikilink" data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DivinityDragonCommander" title="/pmwiki/pmwiki.php/VideoGame/DivinityDragonCommander"><span data-dcnode-id="2584" instrument_node="">Divinity: Dragon Commander</span></a></em><span data-dcnode-id="2581" instrument_node="">: The Lizards are an aristocratic and high-class race who favor logic and pragmatism above all else. They're one of the more liberal races in the game, though the lizard general Edmund is a rather stuffy sort who can't help but talk down to the other races.
</span></li><li data-dcnode-id="2571"><span data-dcnode-id="2579" instrument_node=""> </span><em data-dcnode-id="2576"><a class="twikilink" data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DivinityOriginalSinII" title="/pmwiki/pmwiki.php/VideoGame/DivinityOriginalSinII"><span data-dcnode-id="2578" instrument_node="">Divinity: Original Sin II</span></a></em><span data-dcnode-id="2575" instrument_node=""> has the Ancient Empire, which is run by lizard folk, who happen to be extremely haughty and look down on other races, mostly because they think they're descended from dragons. </span><span class="spoiler" data-dcnode-id="2573" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2574" instrument_node="">They are.</span></span><span data-dcnode-id="2572" instrument_node=""> One of your possible protagonists/companions, the Red Prince, is an exiled prince from these lands, hell-bent on getting his throne back, and loves to remind the other party members how much better he is than them. He does eat some humble pie during the adventure, though, even if he gets his throne back at the end.
</span></li></ul></li><li data-dcnode-id="2557"><span data-dcnode-id="2568" instrument_node=""> </span><em data-dcnode-id="2565"><a class="twikilink" data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DonkeyKongCountry" title="/pmwiki/pmwiki.php/VideoGame/DonkeyKongCountry"><span data-dcnode-id="2567" instrument_node="">Donkey Kong Country</span></a></em><span data-dcnode-id="2564" instrument_node="">: The Kremlings are </span><a class="twikilink" data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunnyAnimal" title="/pmwiki/pmwiki.php/Main/FunnyAnimal"><span data-dcnode-id="2563" instrument_node="">Funny Animal</span></a><span data-dcnode-id="2561" instrument_node=""> crocodiles in that they stand upright and wear clothes. Most of them are evil </span><a class="twikilink" data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="2560" instrument_node="">mooks</span></a><span data-dcnode-id="2558" instrument_node=""> and their king is named "K. Rool" (i.e. "cruel").
</span></li><li data-dcnode-id="2551"><span data-dcnode-id="2556" instrument_node=""> </span><em data-dcnode-id="2553"><a class="twikilink" data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DoubleCross" title="/pmwiki/pmwiki.php/VideoGame/DoubleCross"><span data-dcnode-id="2555" instrument_node="">Double Cross</span></a></em><span data-dcnode-id="2552" instrument_node="">: Reptarria is a dimension where the dinosaurs never went extinct, though a recent cataclysm has devastated the lands.
</span></li><li data-dcnode-id="2545"><span data-dcnode-id="2550" instrument_node=""> In </span><em data-dcnode-id="2547"><a class="twikilink" data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/DragonsWake" title="/pmwiki/pmwiki.php/Videogame/DragonsWake"><span data-dcnode-id="2549" instrument_node="">Dragon's Wake</span></a></em><span data-dcnode-id="2546" instrument_node=""> the player character is adopted by a village of friendly lizard folk.
</span></li><li data-dcnode-id="2539"><span data-dcnode-id="2544" instrument_node=""> The </span><em data-dcnode-id="2541"><a class="twikilink" data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DungeonSiege" title="/pmwiki/pmwiki.php/VideoGame/DungeonSiege"><span data-dcnode-id="2543" instrument_node="">Dungeon Siege</span></a></em><span data-dcnode-id="2540" instrument_node=""> expansion pack Legends of Aranna featured the Zaurask which fit the tribal muscled variety.
</span></li><li data-dcnode-id="2527"><span data-dcnode-id="2538" instrument_node=""> </span><em data-dcnode-id="2535"><a class="twikilink" data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DwarfFortress" title="/pmwiki/pmwiki.php/VideoGame/DwarfFortress"><span data-dcnode-id="2537" instrument_node="">Dwarf Fortress</span></a></em><span data-dcnode-id="2534" instrument_node="">: Reptile men are fairly typical Lizard Folk. They’re one of the subterranean animal people, living in in small bands </span><a class="twikilink" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeneathTheEarth" title="/pmwiki/pmwiki.php/Main/BeneathTheEarth"><span data-dcnode-id="2533" instrument_node="">Beneath the Earth</span></a><span data-dcnode-id="2531" instrument_node=""> and attacking intruders with spears and blowguns. They also speak in </span><a class="twikilink" data-dcnode-id="2529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SssnakeTalk" title="/pmwiki/pmwiki.php/Main/SssnakeTalk"><span data-dcnode-id="2530" instrument_node="">Sssnake Talk</span></a><span data-dcnode-id="2528" instrument_node="">. In addition, the multitude of aboveground humanoid animals includes actual lizard men, saltwater crocodile men, alligator men, monitor lizard men, gila monster men, iguana men, skink men and chameleon men.
</span></li><li data-dcnode-id="2521"><span data-dcnode-id="2526" instrument_node=""> </span><em data-dcnode-id="2523"><a class="createlink" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/DynaGear" title="/pmwiki/pmwiki.php/VideoGame/DynaGear"><span data-dcnode-id="2525" instrument_node="">Dyna Gear</span></a></em><span data-dcnode-id="2522" instrument_node=""> have you crash-landing on a planet where dinosaurs still exist, and your enemies include hostile dinosauroids in the village area.
</span></li><li data-dcnode-id="2467"><span data-dcnode-id="2520" instrument_node=""> </span><em data-dcnode-id="2517"><a class="twikilink" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheElderScrolls" title="/pmwiki/pmwiki.php/Franchise/TheElderScrolls"><span data-dcnode-id="2519" instrument_node="">The Elder Scrolls</span></a></em><span data-dcnode-id="2516" instrument_node="">:
</span><ul data-dcnode-id="2468"><li data-dcnode-id="2484"><span data-dcnode-id="2515" instrument_node=""> The Argonians are the series' resident Lizard Folk. They are a species of humanoid reptilians with scales, elongated snouts, claws, tails, and </span><a class="twikilink" data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlienHair" title="/pmwiki/pmwiki.php/Main/AlienHair"><span data-dcnode-id="2514" instrument_node="">Alien Hair</span></a><span data-dcnode-id="2512" instrument_node="">. They are known to reproduce via laying eggs and are said to be cold-blooded (but can survive in colder climates as adults thanks to "concentrated magicka" within the </span><a class="twikilink" data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WiseTree" title="/pmwiki/pmwiki.php/Main/WiseTree"><span data-dcnode-id="2511" instrument_node="">Hist</span></a><span data-dcnode-id="2509" instrument_node=""> sap that they drink). They also have some traits in common with some amphibians, including </span><a class="twikilink" data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperNotDrowningSkills" title="/pmwiki/pmwiki.php/Main/SuperNotDrowningSkills"><span data-dcnode-id="2508" instrument_node="">the ability to breathe in and out of water</span></a><span data-dcnode-id="2506" instrument_node="">, and they are said to go through "life phases" in which their physical forms can change drastically, including, per some sources, </span><a class="twikilink" data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenderBender" title="/pmwiki/pmwiki.php/Main/GenderBender"><span data-dcnode-id="2505" instrument_node="">changing sexes</span></a><span data-dcnode-id="2503" instrument_node="">. They are usually portrayed as a civilized and friendly people (and are playable), just like the </span><a class="twikilink" data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurOrcsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurOrcsAreDifferent"><span data-dcnode-id="2502" instrument_node="">Orcs</span></a><span data-dcnode-id="2500" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CatFolk" title="/pmwiki/pmwiki.php/Main/CatFolk"><span data-dcnode-id="2499" instrument_node="">Khajiit</span></a><span data-dcnode-id="2497" instrument_node="">, and generally are treated well within </span><a class="twikilink" data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFederation" title="/pmwiki/pmwiki.php/Main/TheFederation"><span data-dcnode-id="2496" instrument_node="">the Empire</span></a><span data-dcnode-id="2494" instrument_node="">. This has not prevented them from repeatedly becoming victims of </span><a class="twikilink" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="2493" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="2491" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlaveRace" title="/pmwiki/pmwiki.php/Main/SlaveRace"><span data-dcnode-id="2490" instrument_node="">slavery</span></a><span data-dcnode-id="2488" instrument_node=""> throughout much of the series' continuity, however, they get a number of </span><a class="twikilink" data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheDogBitesBack" title="/pmwiki/pmwiki.php/Main/TheDogBitesBack"><span data-dcnode-id="2487" instrument_node="">The Dog Bites Back</span></a><span data-dcnode-id="2485" instrument_node=""> moments. They are slow to trust others, and their alien biology and culture are said to make it difficult for them to communicate with other races (for instance, they cannot express emotions facially), but this seldom comes up in-game, possibly due to most Argonians in the series being born or raised outside of their homeland. They are gifted in alchemy and magic, and due to their reptilian physiology, the treacherous swamps of their homeland, and centuries upon centuries of fighting back invasion and enslavement, they excel in stealth in guerilla combat.
</span></li><li data-dcnode-id="2469"><span data-dcnode-id="2483" instrument_node=""> </span><em data-dcnode-id="2480"><a class="twikilink" data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheElderScrollsArena" title="/pmwiki/pmwiki.php/VideoGame/TheElderScrollsArena"><span data-dcnode-id="2482" instrument_node="">Arena</span></a></em><span data-dcnode-id="2479" instrument_node=""> has an enemy type called Lizard Men, hostile reptilian troglodytes described as "once thought to be distant cousins of the argonians [...] whose use of language stretches only far enough to communicate the location of their prey to the rest of their hunting party, which then move to attack and feed". Interestingly, they resemble the </span><a class="twikilink" data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvolutionaryRetcon" title="/pmwiki/pmwiki.php/Main/EvolutionaryRetcon"><span data-dcnode-id="2478" instrument_node="">modern Argonian design</span></a><span data-dcnode-id="2476" instrument_node=""> much more than </span><em data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Arena</span></em><span data-dcnode-id="2473" instrument_node="">'s </span><a class="twikilink" data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarlyInstallmentWeirdness" title="/pmwiki/pmwiki.php/Main/EarlyInstallmentWeirdness"><span data-dcnode-id="2472" instrument_node="">version</span></a><span data-dcnode-id="2470" instrument_node="">, where they resembled gray-skinned zombies more than reptiles.
</span></li></ul></li><li data-dcnode-id="2461"><span data-dcnode-id="2466" instrument_node=""> </span><em data-dcnode-id="2463"><a class="twikilink" data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Elite" title="/pmwiki/pmwiki.php/VideoGame/Elite"><span data-dcnode-id="2465" instrument_node="">Elite</span></a></em><span data-dcnode-id="2462" instrument_node="">: In the entry on alien life forms, the instruction manual mentions that the Reptiloid life forms of Esanbe can make a trader's life very difficult.
</span></li><li data-dcnode-id="2446"><span data-dcnode-id="2460" instrument_node=""> </span><em data-dcnode-id="2457"><a class="twikilink" data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/EndlessLegend" title="/pmwiki/pmwiki.php/Videogame/EndlessLegend"><span data-dcnode-id="2459" instrument_node="">Endless Legend</span></a></em><span data-dcnode-id="2456" instrument_node="">'s Drakken are a race of dragon-like reptiles that were </span><a class="twikilink" data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UpliftedAnimal" title="/pmwiki/pmwiki.php/Main/UpliftedAnimal"><span data-dcnode-id="2455" instrument_node="">uplifted</span></a><span data-dcnode-id="2453" instrument_node=""> by the </span><a class="twikilink" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="2452" instrument_node="">Endless</span></a><span data-dcnode-id="2450" instrument_node="">. When their world's </span><a class="twikilink" data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JustBeforeTheEnd" title="/pmwiki/pmwiki.php/Main/JustBeforeTheEnd"><span data-dcnode-id="2449" instrument_node="">climate started to collapse</span></a><span data-dcnode-id="2447" instrument_node="">, Drakken eggs started to hatch bearing Drakken with hands instead of wings and with a more bipedal posture. Drakken Ancients born before the collapse still have wings and look much more like traditional dragons. Unlike most lizard folk, the Drakken are a race of scholars and diplomats, and their special ability allows them to force diplomacy between two factions that are at war. Their armies are small but very powerful.
</span></li><li data-dcnode-id="2436"><span data-dcnode-id="2445" instrument_node=""> In </span><em data-dcnode-id="2441"><a class="twikilink" data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/EverOasis" title="/pmwiki/pmwiki.php/VideoGame/EverOasis"><span data-dcnode-id="2444" instrument_node="">Ever Oasis</span></a><span data-dcnode-id="2442" instrument_node="">,</span></em><span data-dcnode-id="2440" instrument_node=""> the Drauk are a </span><a class="twikilink" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="2439" instrument_node="">Proud Warrior Race</span></a><span data-dcnode-id="2437" instrument_node=""> of lizard people who also happen to be entirely female. Considering the desert setting, this may be a reference to whiptail lizards, some species of which are entirely female.
</span></li><li data-dcnode-id="2427"><span data-dcnode-id="2435" instrument_node=""> </span><em data-dcnode-id="2432"><a class="twikilink" data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/EverQuest" title="/pmwiki/pmwiki.php/VideoGame/EverQuest"><span data-dcnode-id="2434" instrument_node="">EverQuest</span></a></em><span data-dcnode-id="2431" instrument_node=""> brings us the Iksar. As worshipers of a god of fear, they are </span><a class="twikilink" data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="2430" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="2428" instrument_node=""> and you get to play as them. Although EQ2 describes them as the orderly, structured evil to the dark elves' chaotic type. Considering the societies of Cabilis and Neriak respectively, this is not an unfair comparison.
</span></li><li data-dcnode-id="2421"><span data-dcnode-id="2426" instrument_node=""> </span><em data-dcnode-id="2423"><a class="twikilink" data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/EvilIslands" title="/pmwiki/pmwiki.php/VideoGame/EvilIslands"><span data-dcnode-id="2425" instrument_node="">Evil Islands</span></a></em><span data-dcnode-id="2422" instrument_node="">: The most dangerous regular enemies in Gipath.
</span></li><li data-dcnode-id="2399"><span data-dcnode-id="2420" instrument_node=""> </span><em data-dcnode-id="2417"><a class="twikilink" data-dcnode-id="2418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Fallout" title="/pmwiki/pmwiki.php/VideoGame/Fallout"><span data-dcnode-id="2419" instrument_node="">Fallout</span></a></em><span data-dcnode-id="2416" instrument_node="">:
</span><ul data-dcnode-id="2400"><li data-dcnode-id="2411"><span data-dcnode-id="2415" instrument_node=""> The genetically engineered, chameleon-based Deathclaws. Although the typical Deathclaw is more like a vicious animal that attack humans on sight, the modified talking Deathclaws in the second game had the intelligence of eight-year olds and were capable of abstract thought and reasoning (despite their tendency to mimic human speech the way parrots do). Contrary to their violent relations with humanity, their own social groups was rigidly hierarchical, peaceful, and pack-based with a very strong </span><a class="twikilink" data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ApeShallNeverKillApe" title="/pmwiki/pmwiki.php/Main/ApeShallNeverKillApe"><span data-dcnode-id="2414" instrument_node="">Ape Shall Never Kill Ape</span></a><span data-dcnode-id="2412" instrument_node=""> attitude.
</span></li><li data-dcnode-id="2401"><span data-dcnode-id="2410" instrument_node=""> </span><em data-dcnode-id="2406"><a class="twikilink" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FalloutNewVegas" title="/pmwiki/pmwiki.php/VideoGame/FalloutNewVegas"><span data-dcnode-id="2409" instrument_node="">Fallout: New Vegas</span></a><span data-dcnode-id="2407" instrument_node="">: Lonesome Road</span></em><span data-dcnode-id="2405" instrument_node=""> has the Tunnelers, bioluminescent reptile-skinned troglodytes descended from Divide residents who </span><a class="twikilink" data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MoleMen" title="/pmwiki/pmwiki.php/Main/MoleMen"><span data-dcnode-id="2404" instrument_node="">took shelter underground</span></a><span data-dcnode-id="2402" instrument_node=""> during the Great War and were mutated by the radiation.
</span></li></ul></li><li data-dcnode-id="2393"><span data-dcnode-id="2398" instrument_node=""> </span><em data-dcnode-id="2395"><a class="twikilink" data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Faria" title="/pmwiki/pmwiki.php/VideoGame/Faria"><span data-dcnode-id="2397" instrument_node="">Faria</span></a></em><span data-dcnode-id="2394" instrument_node=""> has the Lizard Men, whose language is practically unintelligible to anyone not using the Translation Machine from Teodoor.
</span></li><li data-dcnode-id="2369"><span data-dcnode-id="2392" instrument_node=""> Reptilian humanoids are not an uncommon sight in </span><em data-dcnode-id="2389"><a class="twikilink" data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FarnhamFables" title="/pmwiki/pmwiki.php/VideoGame/FarnhamFables"><span data-dcnode-id="2391" instrument_node="">Farnham Fables</span></a></em><span data-dcnode-id="2388" instrument_node="">. Although they look like reptiles externally, their anatomy is mostly the same as a human's, as is the case with the other types of animal humanoids, meaning that they have </span><a class="twikilink" data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonMammalianHair" title="/pmwiki/pmwiki.php/Main/NonMammalianHair"><span data-dcnode-id="2387" instrument_node="">Non-Mammalian Hair</span></a><span data-dcnode-id="2385" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonMammalMammaries" title="/pmwiki/pmwiki.php/Main/NonMammalMammaries"><span data-dcnode-id="2384" instrument_node="">Mammaries</span></a><span data-dcnode-id="2382" instrument_node="">. Notable examples include the natives who inhabit Glekutsu Village, and the Edison family. They're definitely examples of </span><a class="twikilink" data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LovableLizard" title="/pmwiki/pmwiki.php/Main/LovableLizard"><span data-dcnode-id="2381" instrument_node="">Lovable Lizards</span></a><span data-dcnode-id="2379" instrument_node=""> rather than </span><a class="twikilink" data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="2378" instrument_node="">Reptiles Are Abhorrent</span></a><span data-dcnode-id="2376" instrument_node=""> (for example, the Edisons are </span><a class="twikilink" data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expies" title="/pmwiki/pmwiki.php/Main/Expies"><span data-dcnode-id="2375" instrument_node="">expies</span></a><span data-dcnode-id="2373" instrument_node=""> of </span><a class="twikilink" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic" title="/pmwiki/pmwiki.php/WesternAnimation/MyLittlePonyFriendshipIsMagic"><span data-dcnode-id="2372" instrument_node="">the Apple family</span></a><span data-dcnode-id="2370" instrument_node="">).
</span></li><li data-dcnode-id="2363"><span data-dcnode-id="2368" instrument_node=""> </span><em data-dcnode-id="2365"><a class="twikilink" data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/FTLFasterThanLightMultiverse" title="/pmwiki/pmwiki.php/Videogame/FTLFasterThanLightMultiverse"><span data-dcnode-id="2367" instrument_node="">FTL : Multiverse</span></a></em><span data-dcnode-id="2364" instrument_node=""> has Guntput and his primitive Lizard race, based on the "furry tree lizards" from a vanilla event on a primitive planet.
</span></li><li data-dcnode-id="2351"><span data-dcnode-id="2362" instrument_node=""> </span><em data-dcnode-id="2359"><a class="twikilink" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Fate" title="/pmwiki/pmwiki.php/VideoGame/Fate"><span data-dcnode-id="2361" instrument_node="">Fate</span></a></em><span data-dcnode-id="2358" instrument_node="">. Lizardmen appear as enemies who can wield weapons like swords, clubs, bows and crossbows. They come in two flavors: Standard Lizardmen and the much more powerful </span><a class="twikilink" data-dcnode-id="2356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PaletteSwap" title="/pmwiki/pmwiki.php/Main/PaletteSwap"><span data-dcnode-id="2357" instrument_node="">Komodo Warriors</span></a><span data-dcnode-id="2355" instrument_node="">. The fourth sequel, </span><em data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">The Cursed King</span></em><span data-dcnode-id="2352" instrument_node="">, introduces Horned Lizardmen which resemble bipedal Horned Toads.
</span></li><li data-dcnode-id="2312"><span data-dcnode-id="2350" instrument_node=""> </span><em data-dcnode-id="2347"><a class="twikilink" data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/FinalFantasy" title="/pmwiki/pmwiki.php/Franchise/FinalFantasy"><span data-dcnode-id="2349" instrument_node="">Final Fantasy</span></a></em><span data-dcnode-id="2346" instrument_node="">:
</span><ul data-dcnode-id="2313"><li data-dcnode-id="2337"><span data-dcnode-id="2345" instrument_node=""> The lizard-like Bangaa race appear in most of the games set in Ivalice. Thanks to their muscled builds they're naturally formidable physical fighters, but they have little magical aptitude, in part because their raspy vocal cords make chanting spells difficult. They're noted not to be true reptiles, as they're capable of growing facial hair, and calling a bangaa a lizard is a </span><em data-dcnode-id="2342"><a class="twikilink" data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IAmNotWeasel" title="/pmwiki/pmwiki.php/Main/IAmNotWeasel"><span data-dcnode-id="2344" instrument_node="">very</span></a></em><span data-dcnode-id="2341" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IAmNotWeasel" title="/pmwiki/pmwiki.php/Main/IAmNotWeasel"><span data-dcnode-id="2340" instrument_node="">bad idea</span></a><span data-dcnode-id="2338" instrument_node="">.
</span></li><li data-dcnode-id="2319"><span data-dcnode-id="2336" instrument_node=""> </span><em data-dcnode-id="2333"><a class="twikilink" data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/FinalFantasyXIV" title="/pmwiki/pmwiki.php/VideoGame/FinalFantasyXIV"><span data-dcnode-id="2335" instrument_node="">Final Fantasy XIV</span></a></em><span data-dcnode-id="2332" instrument_node="">: The Amalj'aa race are portrayed as a warrior tribe that live a nomadic lifestyle. The Amalj'aa easily dwarf the common races of Eorzea by a good headcount and </span><a class="twikilink" data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TopHeavyGuy" title="/pmwiki/pmwiki.php/Main/TopHeavyGuy"><span data-dcnode-id="2331" instrument_node="">are extremely muscular from the waist up</span></a><span data-dcnode-id="2329" instrument_node="">. Most of the Amalj'aa are shown as worshipers of </span><a class="twikilink" data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilGod" title="/pmwiki/pmwiki.php/Main/EvilGod"><span data-dcnode-id="2328" instrument_node="">Ifrit</span></a><span data-dcnode-id="2326" instrument_node=""> and they kidnap people to use them as </span><a class="twikilink" data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrainwashedAndCrazy" title="/pmwiki/pmwiki.php/Main/BrainwashedAndCrazy"><span data-dcnode-id="2325" instrument_node="">mindless servants for their god</span></a><span data-dcnode-id="2323" instrument_node="">. However, there are also a small group of Amalj'aa known as the Brotherhood of Ash that do not worship Ifrit and wish to preserve their old way of life as a </span><a class="twikilink" data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="2322" instrument_node="">noble warrior tribe</span></a><span data-dcnode-id="2320" instrument_node=""> while fighting their own zealot kin.
</span></li><li data-dcnode-id="2314"><span data-dcnode-id="2318" instrument_node=""> </span><em data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">XIV</span></em><span data-dcnode-id="2315" instrument_node=""> also features, in smaller number, the Mamool Ja. In comparison, the Mamool Ja are smaller and less muscular than the Amalj'aa, and more resemble geckos. The Mamool Ja are immigrates from the New World who came to Eorzea to work as mercenaries during the country's era of strife.
</span></li></ul></li><li data-dcnode-id="2300"><span data-dcnode-id="2311" instrument_node=""> </span><em data-dcnode-id="2308"><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/ForgeQuest" title="/pmwiki/pmwiki.php/VideoGame/ForgeQuest"><span data-dcnode-id="2310" instrument_node="">Forge Quest</span></a></em><span data-dcnode-id="2307" instrument_node="">: The Kobold are a race of reptilian humanoids, which can be encountered as enemies, but the </span><a class="twikilink" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayerCharacter" title="/pmwiki/pmwiki.php/Main/PlayerCharacter"><span data-dcnode-id="2306" instrument_node="">Player Character</span></a><span data-dcnode-id="2304" instrument_node=""> can also choose to be one in the </span><a class="twikilink" data-dcnode-id="2302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterCustomization" title="/pmwiki/pmwiki.php/Main/CharacterCustomization"><span data-dcnode-id="2303" instrument_node="">Character Customization</span></a><span data-dcnode-id="2301" instrument_node="">.
</span></li><li data-dcnode-id="2289"><span data-dcnode-id="2299" instrument_node=""> </span><em data-dcnode-id="2296"><a class="twikilink" data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/GalaxyOnFire" title="/pmwiki/pmwiki.php/VideoGame/GalaxyOnFire"><span data-dcnode-id="2298" instrument_node="">Galaxy on Fire</span></a></em><span data-dcnode-id="2295" instrument_node="">:
</span><ul data-dcnode-id="2290"><li data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node=""> The Nivelians are lizard-like humanoids. They tend to be hard workers and are extremely loyal to their family. Most of the Nivelians live in the Nivelian Republic, but some broke away and formed the Mido Confederation with a group of Terrans and outlaws. Midorian Nivelians tend to be more easygoing than their cousins, having picked up those habits from Terrans.
</span></li><li data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node=""> It's pointed out that many Terrans assume the Vossk are also reptilian. They're not.
</span></li></ul></li><li data-dcnode-id="2283"><span data-dcnode-id="2288" instrument_node=""> One of the enemy types encountered in </span><em data-dcnode-id="2285"><a class="twikilink" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/GoblinSword" title="/pmwiki/pmwiki.php/VideoGame/GoblinSword"><span data-dcnode-id="2287" instrument_node="">Goblin Sword</span></a></em><span data-dcnode-id="2284" instrument_node=""> is red lizard men in green armour who wield a sword.
</span></li><li data-dcnode-id="2277"><span data-dcnode-id="2282" instrument_node=""> </span><em data-dcnode-id="2279"><a class="twikilink" data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Halcyon6" title="/pmwiki/pmwiki.php/VideoGame/Halcyon6"><span data-dcnode-id="2281" instrument_node="">Halcyon6</span></a></em><span data-dcnode-id="2278" instrument_node="">: The Yabblings, with green skin and red eyes.
</span></li><li data-dcnode-id="2268"><span data-dcnode-id="2276" instrument_node=""> The Elites/Sangheili from </span><em data-dcnode-id="2273"><a class="twikilink" data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Halo" title="/pmwiki/pmwiki.php/Franchise/Halo"><span data-dcnode-id="2275" instrument_node="">Halo</span></a></em><span data-dcnode-id="2272" instrument_node=""> are a cross between this and </span><a class="twikilink" data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PredatorPastiche" title="/pmwiki/pmwiki.php/Main/PredatorPastiche"><span data-dcnode-id="2271" instrument_node="">Predator Pastiche</span></a><span data-dcnode-id="2269" instrument_node="">, essentially resembling humanoid theropods with segmented mandibles.
</span></li><li data-dcnode-id="2258"><span data-dcnode-id="2267" instrument_node=""> </span><em data-dcnode-id="2264"><a class="twikilink" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/Incursion" title="/pmwiki/pmwiki.php/Videogame/Incursion"><span data-dcnode-id="2266" instrument_node="">Incursion</span></a></em><span data-dcnode-id="2263" instrument_node="">: Lizard folk follow the specification of </span><em data-dcnode-id="2260"><a class="twikilink" data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="2262" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="2259" instrument_node="">, with some liberties like having an alien mindset from a mammal point of view — something akin to an unconscious hive mind, and their main purpose in life is to preserve life, not necessarily intelligent life.
</span></li><li data-dcnode-id="2253"><span data-dcnode-id="2257" instrument_node=""> The MMO </span><em data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Istaria: Chronicles of the Gifted</span></em><span data-dcnode-id="2254" instrument_node=""> features the Sslik as a playable race. Apart from their hermaphrodite natures they tick all the tribal, muscled trope boxes.
</span></li><li data-dcnode-id="2247"><span data-dcnode-id="2252" instrument_node=""> </span><em data-dcnode-id="2249"><a class="twikilink" data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/LastCloudia" title="/pmwiki/pmwiki.php/VideoGame/LastCloudia"><span data-dcnode-id="2251" instrument_node="">Last Cloudia</span></a></em><span data-dcnode-id="2248" instrument_node=""> has the Vazards, a race of lizard-like humanoids who wield four-pronged tridents. Normally, they are enemies, but one can be unlocked as a playable character.
</span></li><li data-dcnode-id="2187"><span data-dcnode-id="2246" instrument_node=""> </span><em data-dcnode-id="2243"><a class="twikilink" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheLegendOfZelda" title="/pmwiki/pmwiki.php/Franchise/TheLegendOfZelda"><span data-dcnode-id="2245" instrument_node="">The Legend of Zelda</span></a></em><span data-dcnode-id="2242" instrument_node="">:
</span><ul data-dcnode-id="2188"><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node=""> A race of humanoid lizard monsters called Lizalfos appear as semi-recurring enemies in a number of games. The name presumably presumably means "lizard folk" based off the other "fos" enemy humanoids like Stalfos and Wolfos.
</span></li><li data-dcnode-id="2228"><span data-dcnode-id="2239" instrument_node=""> The ones in </span><em data-dcnode-id="2236"><a class="twikilink" data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaBreathOfTheWild" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaBreathOfTheWild"><span data-dcnode-id="2238" instrument_node="">The Legend of Zelda: Breath of the Wild</span></a></em><span data-dcnode-id="2235" instrument_node=""> look specifically like chameleons, and can camouflage themselves to ambush Link. The same game also introduces some variants, including skeletal Lizalfos and Lizalfos that attack Link with </span><a class="twikilink" data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShockAndAwe" title="/pmwiki/pmwiki.php/Main/ShockAndAwe"><span data-dcnode-id="2234" instrument_node="">electricity</span></a><span data-dcnode-id="2232" instrument_node=""> or with </span><a class="twikilink" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreathWeapon" title="/pmwiki/pmwiki.php/Main/BreathWeapon"><span data-dcnode-id="2231" instrument_node="">fire or ice breath</span></a><span data-dcnode-id="2229" instrument_node="">.
</span></li><li data-dcnode-id="2218"><span data-dcnode-id="2227" instrument_node=""> Other related enemies include the larger and stronger Dinolfos (</span><em data-dcnode-id="2224"><a class="twikilink" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaOcarinaOfTime" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaOcarinaOfTime"><span data-dcnode-id="2226" instrument_node="">The Legend of Zelda: Ocarina of Time</span></a></em><span data-dcnode-id="2223" instrument_node="">) and the winged Aerolfos (</span><em data-dcnode-id="2220"><a class="twikilink" data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaTwilightPrincess" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaTwilightPrincess"><span data-dcnode-id="2222" instrument_node="">The Legend of Zelda: Twilight Princess</span></a></em><span data-dcnode-id="2219" instrument_node="">).
</span></li><li data-dcnode-id="2212"><span data-dcnode-id="2217" instrument_node=""> </span><em data-dcnode-id="2214"><a class="twikilink" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaOracleGames" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaOracleGames"><span data-dcnode-id="2216" instrument_node="">The Legend of Zelda: Oracle Games</span></a></em><span data-dcnode-id="2213" instrument_node=""> had the Tokay, who were mischievous but friendly lizard folk.
</span></li><li data-dcnode-id="2202"><span data-dcnode-id="2211" instrument_node=""> The Zazak enemy from </span><em data-dcnode-id="2208"><a class="twikilink" data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaALinkToThePast" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaALinkToThePast"><span data-dcnode-id="2210" instrument_node="">The Legend of Zelda: A Link to the Past</span></a></em><span data-dcnode-id="2207" instrument_node=""> and </span><em data-dcnode-id="2204"><a class="twikilink" data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaALinkBetweenWorlds" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaALinkBetweenWorlds"><span data-dcnode-id="2206" instrument_node="">The Legend of Zelda: A Link Between Worlds</span></a></em><span data-dcnode-id="2203" instrument_node=""> are humanoid Lizard Thieves with durable armor and mohawks. In the former game, they were actually hylians under a curse.
</span></li><li data-dcnode-id="2189"><span data-dcnode-id="2201" instrument_node=""> In </span><em data-dcnode-id="2198"><a class="twikilink" data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/HyruleWarriors" title="/pmwiki/pmwiki.php/VideoGame/HyruleWarriors"><span data-dcnode-id="2200" instrument_node="">Hyrule Warriors</span></a></em><span data-dcnode-id="2197" instrument_node="">, Lizalfos and the stronger Dinolfos relatives appear as Elite Mooks. Aeralfos, the winged versions of the Lizalfos from </span><em data-dcnode-id="2194"><a class="twikilink" data-dcnode-id="2195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaTwilightPrincess" title="/pmwiki/pmwiki.php/VideoGame/TheLegendOfZeldaTwilightPrincess"><span data-dcnode-id="2196" instrument_node="">The Legend of Zelda: Twilight Princess</span></a></em><span data-dcnode-id="2193" instrument_node="">, appear as </span><a class="twikilink" data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AirborneMooks" title="/pmwiki/pmwiki.php/Main/AirborneMooks"><span data-dcnode-id="2192" instrument_node="">Airborne Mooks</span></a><span data-dcnode-id="2190" instrument_node="">, along with the new Fiery Aeralfos. There are also the Lizalfos and Dinolfos chieftains, who are larger and tougher than their regular counterparts.
</span></li></ul></li><li data-dcnode-id="2181"><span data-dcnode-id="2186" instrument_node=""> In </span><em data-dcnode-id="2183"><a class="twikilink" data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/LordsOfMagic" title="/pmwiki/pmwiki.php/VideoGame/LordsOfMagic"><span data-dcnode-id="2185" instrument_node="">Lords of Magic</span></a></em><span data-dcnode-id="2182" instrument_node=""> the Water faction gets two units of these, Lizardmen and Slingers. Clearly suggesting it came about before the days of people saying Lizard folk instead of Lizardmen, the Slingers are male, while the Lizardmen are female.
</span></li><li data-dcnode-id="2169"><span data-dcnode-id="2180" instrument_node=""> </span><em data-dcnode-id="2177"><a class="twikilink" data-dcnode-id="2178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Lusternia" title="/pmwiki/pmwiki.php/VideoGame/Lusternia"><span data-dcnode-id="2179" instrument_node="">Lusternia</span></a></em><span data-dcnode-id="2176" instrument_node=""> has the Dracnari. Unusually for the trope, they're generally good guys — or at least </span><a class="twikilink" data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChaoticNeutral" title="/pmwiki/pmwiki.php/Main/ChaoticNeutral"><span data-dcnode-id="2175" instrument_node="">neutral guys</span></a><span data-dcnode-id="2173" instrument_node=""> in their native city of </span><a class="twikilink" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BuildLikeAnEgyptian" title="/pmwiki/pmwiki.php/Main/BuildLikeAnEgyptian"><span data-dcnode-id="2172" instrument_node="">Gaudiguch</span></a><span data-dcnode-id="2170" instrument_node="">. They're both hardier and more intelligent than humans, and have a proud tradition as mystics and warriors.
