</span><div class="article-content retro-folders" data-dcnode-id="1042" id="main-article"><span data-dcnode-id="5388" instrument_node="">
</span><p data-dcnode-id="5387"></p><div class="quoteright" data-dcnode-id="5383" style="width:330px;"><a class="twikilink" data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Warhammer" title="/pmwiki/pmwiki.php/TabletopGame/Warhammer"><div class="lazy_load_img_box" data-dcnode-id="5385" style="padding-top:75.15%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/lizardmenskinks-1.jpg" border="0" class="embeddedimage" data-dcnode-id="5386" height="248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/lizardmenskinks-1.jpg&amp;raw" width="330"></div></a></div><span data-dcnode-id="5382" instrument_node="">
</span><div class="acaptionright" data-dcnode-id="5377" style="width:330px;"><span data-dcnode-id="5381" instrument_node=""> Apparently, lizards are </span><a class="twikilink" data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mayincatec" title="/pmwiki/pmwiki.php/Main/Mayincatec"><span data-dcnode-id="5380" instrument_node="">Mayincatec</span></a><span data-dcnode-id="5378" instrument_node="">.</span></div><span data-dcnode-id="5376" instrument_node="">
</span><p data-dcnode-id="5375"></p><div class="indent" data-dcnode-id="5360"><span data-dcnode-id="5374" instrument_node=""> </span><strong data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Cole</span></strong><span data-dcnode-id="5371" instrument_node="">: My husband was joking about Reptilians earlier. I bet you've seen them with your own eyes. </span><br data-dcnode-id="5370"><strong data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">Ruby</span></strong><span data-dcnode-id="5367" instrument_node="">: Damn hard to kill.
</span><div class="indent" data-dcnode-id="5361"><span data-dcnode-id="5366" instrument_node="">— </span><em data-dcnode-id="5363"><a class="twikilink" data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/TheDepartmentOfTruth" title="/pmwiki/pmwiki.php/ComicBook/TheDepartmentOfTruth"><span data-dcnode-id="5365" instrument_node="">The Department of Truth</span></a></em><span data-dcnode-id="5362" instrument_node="">
</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5354"><span class="ad-caption" data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5355" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="5328"><span data-dcnode-id="5353" instrument_node="">Almost every </span><a class="twikilink" data-dcnode-id="5351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StandardFantasySetting" title="/pmwiki/pmwiki.php/Main/StandardFantasySetting"><span data-dcnode-id="5352" instrument_node="">Standard Fantasy Setting</span></a><span data-dcnode-id="5350" instrument_node=""> with the </span><a class="twikilink" data-dcnode-id="5348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StandardFantasyRaces" title="/pmwiki/pmwiki.php/Main/StandardFantasyRaces"><span data-dcnode-id="5349" instrument_node="">Standard Fantasy Races</span></a><span data-dcnode-id="5347" instrument_node=""> is bound to to have one group of these guys. A civilized or semi-civilized race of humanoid lizards, they vary from being </span><a class="twikilink" data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RubberForeheadAliens" title="/pmwiki/pmwiki.php/Main/RubberForeheadAliens"><span data-dcnode-id="5346" instrument_node="">scaly humans</span></a><span data-dcnode-id="5344" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeastMan" title="/pmwiki/pmwiki.php/Main/BeastMan"><span data-dcnode-id="5343" instrument_node="">large bipedal lizards</span></a><span data-dcnode-id="5341" instrument_node=""> to </span><a class="twikilink" data-dcnode-id="5339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs" title="/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs"><span data-dcnode-id="5340" instrument_node="">small dinosaurs</span></a><span data-dcnode-id="5338" instrument_node=""> and everything in-between. Sadly, they are </span><a class="twikilink" data-dcnode-id="5336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="5337" instrument_node="">almost always one of the bad guys</span></a><span data-dcnode-id="5335" instrument_node="">, and even when not </span><a class="twikilink" data-dcnode-id="5333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="5334" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="5332" instrument_node="">, they usually end up as antagonists. More modern depictions tend to make them </span><a class="twikilink" data-dcnode-id="5330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueNeutral" title="/pmwiki/pmwiki.php/Main/TrueNeutral"><span data-dcnode-id="5331" instrument_node="">True Neutral</span></a><span data-dcnode-id="5329" instrument_node="">, being an old race that just wants to live with their old ways without modern civilization stamping down on them.
</span></p><p data-dcnode-id="5323"><span data-dcnode-id="5327" instrument_node="">Most Reptilian Humanoids fall somewhere into this category, with the notable exception of lamias, nagas, and gorgons, which generally fall under </span><a class="twikilink" data-dcnode-id="5325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnakePeople" title="/pmwiki/pmwiki.php/Main/SnakePeople"><span data-dcnode-id="5326" instrument_node="">Snake People</span></a><span data-dcnode-id="5324" instrument_node="">.
</span></p><p data-dcnode-id="5309"><span data-dcnode-id="5322" instrument_node="">Lizard folk are generally divided into two types, the large muscled and brutish type, often dinosauric or crocodilian in appearance, and the smaller, leaner, more generically reptillian type, usually the more sympathetic of the two but possibly running an evil </span><a class="twikilink" data-dcnode-id="5320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilianConspiracy" title="/pmwiki/pmwiki.php/Main/ReptilianConspiracy"><span data-dcnode-id="5321" instrument_node="">Reptilian Conspiracy</span></a><span data-dcnode-id="5319" instrument_node="">. Whenever </span><a class="twikilink" data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnakePeople" title="/pmwiki/pmwiki.php/Main/SnakePeople"><span data-dcnode-id="5318" instrument_node="">Snake People</span></a><span data-dcnode-id="5316" instrument_node=""> are given hind legs, they are usually just Lizard Folk with fangs. They also rarely ever look like turtles, except for perhaps some individuals having beaks for mouths or using turtle shells as shields. If given a culture or civilization expect them to live in either a jungle, swamp or more rarely a desert, be fairly primitive and tribal, and use various larger reptiles as </span><a class="twikilink" data-dcnode-id="5314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HorseOfADifferentColor" title="/pmwiki/pmwiki.php/Main/HorseOfADifferentColor"><span data-dcnode-id="5315" instrument_node="">beasts of burden</span></a><span data-dcnode-id="5313" instrument_node="">. The more human-like in appearance the Lizard Folk are, the more </span><a class="twikilink" data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman" title="/pmwiki/pmwiki.php/Main/WhatMeasureIsANonHuman"><span data-dcnode-id="5312" instrument_node="">sympathetically they tend to be portrayed</span></a><span data-dcnode-id="5310" instrument_node="">.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5303"><span class="ad-caption" data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5304" id="proper-ad-tvtropes_mobile_ad_2"></div></div><p data-dcnode-id="5292"><span data-dcnode-id="5302" instrument_node="">Lizard folk are often depicted as a very ancient race, far older than humanity. In such depictions, they will have once ruled the world before the rise of warm-blooded peoples, in a callback to how the </span><a class="twikilink" data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AgeOfReptiles" title="/pmwiki/pmwiki.php/Main/AgeOfReptiles"><span data-dcnode-id="5301" instrument_node="">Age of Reptiles</span></a><span data-dcnode-id="5299" instrument_node=""> preceded the Age of Mammals. In this case they might be considerably more civilized, or rather they were in the past but are now a dying, degenerate fragment of a once mighty civilization. As lizards are exotic, their civilizations tend to be based on real life ones considered exotic, such as </span><a class="twikilink" data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mayincatec" title="/pmwiki/pmwiki.php/Main/Mayincatec"><span data-dcnode-id="5298" instrument_node="">Mayincatec</span></a><span data-dcnode-id="5296" instrument_node=""> (as in the trope picture) or based on </span><a class="twikilink" data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DarkestAfrica" title="/pmwiki/pmwiki.php/Main/DarkestAfrica"><span data-dcnode-id="5295" instrument_node="">Darkest Africa</span></a><span data-dcnode-id="5293" instrument_node="">, and Lizard Folk typically come from analogues to these environments.
</span></p><p data-dcnode-id="5269"><span data-dcnode-id="5291" instrument_node="">Expect some form of </span><a class="twikilink" data-dcnode-id="5289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Sssssnaketalk" title="/pmwiki/pmwiki.php/Main/Sssssnaketalk"><span data-dcnode-id="5290" instrument_node="">Sssssnaketalk</span></a><span data-dcnode-id="5288" instrument_node="">, regardless of whether or not the culture (or species) is actually snake-themed. </span><a class="twikilink" data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Phlegmings" title="/pmwiki/pmwiki.php/Main/Phlegmings"><span data-dcnode-id="5287" instrument_node="">A mouthful of phlegm or mucus</span></a><span data-dcnode-id="5285" instrument_node=""> is also popular. May overlap with </span><a class="twikilink" data-dcnode-id="5283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishPeople" title="/pmwiki/pmwiki.php/Main/FishPeople"><span data-dcnode-id="5284" instrument_node="">Fish People</span></a><span data-dcnode-id="5282" instrument_node="">, </span><a class="twikilink" data-dcnode-id="5280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FrogMen" title="/pmwiki/pmwiki.php/Main/FrogMen"><span data-dcnode-id="5281" instrument_node="">Frog Men</span></a><span data-dcnode-id="5279" instrument_node=""> and/or </span><a class="twikilink" data-dcnode-id="5277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DraconicHumanoid" title="/pmwiki/pmwiki.php/Main/DraconicHumanoid"><span data-dcnode-id="5278" instrument_node="">Draconic Humanoids</span></a><span data-dcnode-id="5276" instrument_node="">, </span><a class="twikilink" data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ColdBloodedWhatever" title="/pmwiki/pmwiki.php/Main/ColdBloodedWhatever"><span data-dcnode-id="5275" instrument_node="">depending on how willing the author is to stretch or disregard conventional taxonomy</span></a><span data-dcnode-id="5273" instrument_node="">. If the lizard folk are friendly, or even cute, this can overlap with </span><a class="twikilink" data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LovableLizard" title="/pmwiki/pmwiki.php/Main/LovableLizard"><span data-dcnode-id="5272" instrument_node="">Lovable Lizard</span></a><span data-dcnode-id="5270" instrument_node="">.
</span></p><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="5263"><span class="ad-caption" data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">Advertisement:</span></span><div data-dcnode-id="5264" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="5255"><span data-dcnode-id="5262" instrument_node="">Also, expect that appearances aside most Lizard Folk don't have any biological link with the lizards you'll find here on Earth. In fact, Lizard Folk tend to be more commonly associated with </span><a class="twikilink" data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs" title="/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs"><span data-dcnode-id="5261" instrument_node="">dinosaurs</span></a><span data-dcnode-id="5259" instrument_node=""> than living reptiles, in which case the race name will include 'Saur' in it. Such dinosaur-derived creatures are sometimes called "dinosauroids", a term first popularized by paleontologist Dale Russell's hypothetical </span><em data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">Troodon</span></em><span data-dcnode-id="5256" instrument_node="">-descended humanoid.
</span></p><p data-dcnode-id="5238"><span data-dcnode-id="5254" instrument_node="">Along with </span><a class="twikilink" data-dcnode-id="5252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CatFolk" title="/pmwiki/pmwiki.php/Main/CatFolk"><span data-dcnode-id="5253" instrument_node="">Cat Folk</span></a><span data-dcnode-id="5251" instrument_node="">, Lizard Folk are one of the most common types of </span><a class="twikilink" data-dcnode-id="5249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeastMan" title="/pmwiki/pmwiki.php/Main/BeastMan"><span data-dcnode-id="5250" instrument_node="">Beast Man</span></a><span data-dcnode-id="5248" instrument_node="">. Also common in both </span><a class="twikilink" data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScienceFiction" title="/pmwiki/pmwiki.php/Main/ScienceFiction"><span data-dcnode-id="5247" instrument_node="">sci-fi</span></a><span data-dcnode-id="5245" instrument_node=""> </span><a class="twikilink" data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceOpera" title="/pmwiki/pmwiki.php/Main/SpaceOpera"><span data-dcnode-id="5244" instrument_node="">Space Opera</span></a><span data-dcnode-id="5242" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OralTradition" title="/pmwiki/pmwiki.php/Main/OralTradition"><span data-dcnode-id="5241" instrument_node="">mythology</span></a><span data-dcnode-id="5239" instrument_node="">.
</span></p><hr data-dcnode-id="5237"><h2 data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">Examples:</span></h2><span data-dcnode-id="5234" instrument_node="">
</span><p data-dcnode-id="5233"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="5231" onclick="toggleAllFolders();"><span data-dcnode-id="5232" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><span data-dcnode-id="5230" instrument_node="">
</span><p data-dcnode-id="5229"></p><div class="folderlabel" data-dcnode-id="5227" onclick="togglefolder('folder0');"><span data-dcnode-id="5228" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Anime &amp; Manga&nbsp;</span></div><div class="folder" data-dcnode-id="5097" id="folder0" isfolder="true" style="display:block;"><span data-dcnode-id="5226" instrument_node="">
</span><ul data-dcnode-id="5121"><li data-dcnode-id="5217"><span data-dcnode-id="5225" instrument_node=""> </span><em data-dcnode-id="5222"><a class="twikilink" data-dcnode-id="5223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/Slayers" title="/pmwiki/pmwiki.php/LightNovel/Slayers"><span data-dcnode-id="5224" instrument_node="">Slayers</span></a></em><span data-dcnode-id="5221" instrument_node="">: Lizardmen are well-loved by many of the show's villains as </span><a class="twikilink" data-dcnode-id="5219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="5220" instrument_node="">mooks</span></a><span data-dcnode-id="5218" instrument_node="">.
</span></li><li data-dcnode-id="5211"><span data-dcnode-id="5216" instrument_node=""> </span><em data-dcnode-id="5213"><a class="twikilink" data-dcnode-id="5214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DoraemonNobitaAndTheKnightsOnDinosaurs" title="/pmwiki/pmwiki.php/Anime/DoraemonNobitaAndTheKnightsOnDinosaurs"><span data-dcnode-id="5215" instrument_node="">Doraemon: Nobita and the Knights on Dinosaurs</span></a></em><span data-dcnode-id="5212" instrument_node=""> have the gang discovering an underground race of human-raptors, descendants of velociraptors who escaped underground during the extinction of dinosaurs millions of years ago.
</span></li><li data-dcnode-id="5199"><span data-dcnode-id="5210" instrument_node=""> </span><em data-dcnode-id="5207"><a class="twikilink" data-dcnode-id="5208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Dorohedoro" title="/pmwiki/pmwiki.php/Manga/Dorohedoro"><span data-dcnode-id="5209" instrument_node="">Dorohedoro</span></a></em><span data-dcnode-id="5206" instrument_node="">: </span><a class="twikilink" data-dcnode-id="5204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheProtagonist" title="/pmwiki/pmwiki.php/Main/TheProtagonist"><span data-dcnode-id="5205" instrument_node="">The Protagonist</span></a><span data-dcnode-id="5203" instrument_node=""> Kaiman was once a normal guy who had his head turned into a lizard’s through a spell, and spends a good part of the series trying to find the person who transformed him so he can play </span><a class="twikilink" data-dcnode-id="5201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoOntologicalInertia" title="/pmwiki/pmwiki.php/Main/NoOntologicalInertia"><span data-dcnode-id="5202" instrument_node="">No Ontological Inertia</span></a><span data-dcnode-id="5200" instrument_node=""> fatally straight and get his normal head back.
</span></li><li data-dcnode-id="5174"><span data-dcnode-id="5198" instrument_node=""> </span><em data-dcnode-id="5195"><a class="twikilink" data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Digimon" title="/pmwiki/pmwiki.php/Franchise/Digimon"><span data-dcnode-id="5197" instrument_node="">Digimon</span></a></em><span data-dcnode-id="5194" instrument_node=""> has more than a few of these, usually falling under the "Dragon Man" classification. Examples include WarGreymon from </span><em data-dcnode-id="5191"><a class="twikilink" data-dcnode-id="5192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DigimonAdventure" title="/pmwiki/pmwiki.php/Anime/DigimonAdventure"><span data-dcnode-id="5193" instrument_node="">Digimon Adventure</span></a></em><span data-dcnode-id="5190" instrument_node="">, and OmegaShoutmon from </span><em data-dcnode-id="5186"><a class="twikilink" data-dcnode-id="5188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DigimonFusion" title="/pmwiki/pmwiki.php/Anime/DigimonFusion"><span data-dcnode-id="5189" instrument_node="">Digimon Fusion</span></a><span data-dcnode-id="5187" instrument_node="">.</span></em><span data-dcnode-id="5185" instrument_node=""> This being Digimon, they tend to overlap with </span><a class="twikilink" data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent"><span data-dcnode-id="5184" instrument_node="">Our Dragons Are Different</span></a><span data-dcnode-id="5182" instrument_node="">, and others.
</span><ul data-dcnode-id="5175"><li data-dcnode-id="5176"><span data-dcnode-id="5181" instrument_node=""> </span><em data-dcnode-id="5178"><a class="twikilink" data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/DigimonFusion" title="/pmwiki/pmwiki.php/Anime/DigimonFusion"><span data-dcnode-id="5180" instrument_node="">Digimon Fusion</span></a></em><span data-dcnode-id="5177" instrument_node=""> also introduces Iguneetmon, a Reptile Man type based on the Iguana.
</span></li></ul></li><li data-dcnode-id="5168"><span data-dcnode-id="5173" instrument_node=""> </span><em data-dcnode-id="5170"><a class="twikilink" data-dcnode-id="5171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/Overlord" title="/pmwiki/pmwiki.php/LightNovel/Overlord"><span data-dcnode-id="5172" instrument_node="">Overlord</span></a></em><span data-dcnode-id="5169" instrument_node="">: Lizardmen became vassals of Ainz Ooal Gown after impressing his guardian Cocytus in battle. Notably, these Lizardmen are portrayed as being peaceful, friendly and very badass.
</span></li><li data-dcnode-id="5162"><span data-dcnode-id="5167" instrument_node=""> Bido from </span><em data-dcnode-id="5164"><a class="twikilink" data-dcnode-id="5165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/FullmetalAlchemist" title="/pmwiki/pmwiki.php/Manga/FullmetalAlchemist"><span data-dcnode-id="5166" instrument_node="">Fullmetal Alchemist</span></a></em><span data-dcnode-id="5163" instrument_node=""> is a somewhat downplayed example. He's a chimera who's part-lizard, and, while he's more human-like than some examples, he's got a tail and visible scales on some parts of his body. Also, he's got a lizard-like ability to easily scale walls.
</span></li><li data-dcnode-id="5156"><span data-dcnode-id="5161" instrument_node=""> </span><em data-dcnode-id="5158"><a class="twikilink" data-dcnode-id="5159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/ThatTimeIGotReincarnatedAsASlime" title="/pmwiki/pmwiki.php/LightNovel/ThatTimeIGotReincarnatedAsASlime"><span data-dcnode-id="5160" instrument_node="">That Time I Got Reincarnated as a Slime</span></a></em><span data-dcnode-id="5157" instrument_node=""> has Lizard Folk. The main character form an alliance with them to battle against the Orc Lord.
</span></li><li data-dcnode-id="5150"><span data-dcnode-id="5155" instrument_node=""> One of the regular customers of the </span><em data-dcnode-id="5152"><a class="twikilink" data-dcnode-id="5153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/RestaurantToAnotherWorld" title="/pmwiki/pmwiki.php/LightNovel/RestaurantToAnotherWorld"><span data-dcnode-id="5154" instrument_node="">Restaurant to Another World</span></a></em><span data-dcnode-id="5151" instrument_node=""> is a lizard man who always orders omelet rice and orders takeout for the rest of his tribe. Only the strongest warrior in the tribe is allowed to enter the restaurant to bring back food.
</span></li><li data-dcnode-id="5144"><span data-dcnode-id="5149" instrument_node=""> One of the members of </span><em data-dcnode-id="5146"><a class="twikilink" data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/LightNovel/GoblinSlayer" title="/pmwiki/pmwiki.php/LightNovel/GoblinSlayer"><span data-dcnode-id="5148" instrument_node="">Goblin Slayer</span></a></em><span data-dcnode-id="5145" instrument_node="">'s party is a Lizard Priest who dresses like a Native American and worships dinosaurs.
</span></li><li data-dcnode-id="5138"><span data-dcnode-id="5143" instrument_node=""> The Dinosaur Empire from </span><em data-dcnode-id="5140"><a class="twikilink" data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/GetterRobo" title="/pmwiki/pmwiki.php/Manga/GetterRobo"><span data-dcnode-id="5142" instrument_node="">Getter Robo</span></a></em><span data-dcnode-id="5139" instrument_node=""> are composed of Lizard Folk Mooks, with several humanoid, scaled generals with a variety of dinosaur features.
</span></li><li data-dcnode-id="5128"><span data-dcnode-id="5137" instrument_node=""> Daibazaal/Zarkon in </span><em data-dcnode-id="5134"><a class="twikilink" data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/GoLion" title="/pmwiki/pmwiki.php/Anime/GoLion"><span data-dcnode-id="5136" instrument_node="">GoLion</span></a></em><span data-dcnode-id="5133" instrument_node="">/</span><em data-dcnode-id="5130"><a class="twikilink" data-dcnode-id="5131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Anime/Voltron" title="/pmwiki/pmwiki.php/Anime/Voltron"><span data-dcnode-id="5132" instrument_node="">Voltron</span></a></em><span data-dcnode-id="5129" instrument_node=""> has slitted eyes, scales on his body, and finned ears. Several other residents of Planet Galra/Doom have similar appearances.
</span></li><li data-dcnode-id="5122"><span data-dcnode-id="5127" instrument_node=""> </span><em data-dcnode-id="5124"><a class="twikilink" data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/HeterogeniaLinguistico" title="/pmwiki/pmwiki.php/Manga/HeterogeniaLinguistico"><span data-dcnode-id="5126" instrument_node="">Heterogenia Linguistico</span></a></em><span data-dcnode-id="5123" instrument_node="">: Among the many species Hakaba meets are lizardmen. Their heads look just like an alligator or crocodile's, and their "written" language is very color-based. Two of them, siblings Kashoo and Kekoo, become Hakaba and Susuki's traveling companions.
</span></li></ul><ul data-dcnode-id="5098"><li data-dcnode-id="5108"><span data-dcnode-id="5119" instrument_node=""> One of the </span><em data-dcnode-id="5116"><a class="twikilink" data-dcnode-id="5117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/Doraemon" title="/pmwiki/pmwiki.php/Manga/Doraemon"><span data-dcnode-id="5118" instrument_node="">Doraemon</span></a></em><span data-dcnode-id="5115" instrument_node=""> movies deal with reptilians whose civilization thrives </span><a class="twikilink" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeneathTheEarth" title="/pmwiki/pmwiki.php/Main/BeneathTheEarth"><span data-dcnode-id="5114" instrument_node="">Beneath the Earth</span></a><span data-dcnode-id="5112" instrument_node="">, and seek to alter the timeline so it's them, not the humans, who flourish above ground. Despite their sinister motives, they are actually no less moral than humans, if not objectively better (their technology being far more eco-friendly, for example). The finale of the movie has them agree to stay under the earth, because </span><a class="twikilink" data-dcnode-id="5110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeusExMachina" title="/pmwiki/pmwiki.php/Main/DeusExMachina"><span data-dcnode-id="5111" instrument_node="">Doraemon's future gadgets</span></a><span data-dcnode-id="5109" instrument_node=""> saved their ancestors from extinction.
</span></li><li data-dcnode-id="5099"><span data-dcnode-id="5107" instrument_node=""> </span><em data-dcnode-id="5104"><a class="twikilink" data-dcnode-id="5105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Manga/MyHeroAcademia" title="/pmwiki/pmwiki.php/Manga/MyHeroAcademia"><span data-dcnode-id="5106" instrument_node="">My Hero Academia</span></a></em><span data-dcnode-id="5103" instrument_node="">: Spinner's overall character design is this due to his Quirk, </span><a class="twikilink" data-dcnode-id="5101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllOfTheOtherReindeer" title="/pmwiki/pmwiki.php/Main/AllOfTheOtherReindeer"><span data-dcnode-id="5102" instrument_node="">which he was ostracized for</span></a><span data-dcnode-id="5100" instrument_node=""> in his conservative, backwater hometown.
</span></li></ul></div><span data-dcnode-id="5096" instrument_node="">
</span><p data-dcnode-id="5095"></p><div class="folderlabel" data-dcnode-id="5093" onclick="togglefolder('folder1');"><span data-dcnode-id="5094" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Card Games&nbsp;</span></div><div class="folder" data-dcnode-id="5066" id="folder1" isfolder="true" style="display:block;"><span data-dcnode-id="5092" instrument_node="">
</span><ul data-dcnode-id="5067"><li data-dcnode-id="5068"><span data-dcnode-id="5091" instrument_node=""> </span><em data-dcnode-id="5088"><a class="twikilink" data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/MagicTheGathering" title="/pmwiki/pmwiki.php/TabletopGame/MagicTheGathering"><span data-dcnode-id="5090" instrument_node="">Magic: The Gathering</span></a></em><span data-dcnode-id="5087" instrument_node="">: The Viashino creature type represents humanoid lizards found on various planes. Regardless of their plane of origin, they are known to share a relationship with dragons, as they are, alongside true dragons and the four-limbed flying drakes, descended from the victors of a civil war between the god-like Elder Dragons of the multiverse's distant past. They are almost always aligned with red, the color of (among other things) chaos, emotion, impulsivity and barbarians.
</span><ul data-dcnode-id="5069"><li data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node=""> The viashino of Dominaria live in clans throughout the volcanic mountains of Shiv and the Burning Islands, where constant warfare against the goblins, human barbarians and dragons who also live there has turned them into fearsome warriors, although they're also known for their skill as smiths.
</span></li><li data-dcnode-id="5076"><span data-dcnode-id="5084" instrument_node=""> The viashino of Alara resemble hulking humanoid crocodiles and live in the red-aligned shard of Jund, a </span><a class="twikilink" data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathWorld" title="/pmwiki/pmwiki.php/Main/DeathWorld"><span data-dcnode-id="5083" instrument_node="">Death World</span></a><span data-dcnode-id="5081" instrument_node=""> of volcanoes, swamps and jungles full of monsters and barbarians and ruled by dragons. They live in groups known as “thrashes”, and unlike other viashino may not be descended from dragons, but instead share ancestry with the nonsapient crocodiles that inhabit Naya, the green-aligned shard. After the shards fused once more, some viashino adopted aetherium technology to give themselves wings, forming the </span><a class="urllink" data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//magiccards.info/query%3Fq%3D%2521Skyclaw%2Bthrash"><span data-dcnode-id="5080" instrument_node="">Skyclaw Thrash</span><img data-dcnode-id="5079" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5077" instrument_node="">.
</span></li><li data-dcnode-id="5070"><span data-dcnode-id="5075" instrument_node=""> Ravnican viashino are of the </span><a class="urllink" data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//magiccards.info/gp/en/64.html"><span data-dcnode-id="5074" instrument_node="">small, wiry and sneaky</span><img data-dcnode-id="5073" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="5071" instrument_node=""> type, often serving as warriors, rogues and assassins for the red-aligned guilds or on their own account.
</span></li></ul></li></ul></div><span data-dcnode-id="5065" instrument_node="">

</span><ul data-dcnode-id="4622"><li data-dcnode-id="4717"><span data-dcnode-id="4746" instrument_node=""> </span><em data-dcnode-id="4743"><a class="twikilink" data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/SuperMarioBros" title="/pmwiki/pmwiki.php/Film/SuperMarioBros"><span data-dcnode-id="4745" instrument_node="">Super Mario Bros.</span></a></em><span data-dcnode-id="4742" instrument_node=""> presents </span><a class="twikilink" data-dcnode-id="4740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AnotherDimension" title="/pmwiki/pmwiki.php/Main/AnotherDimension"><span data-dcnode-id="4741" instrument_node="">Another Dimension</span></a><span data-dcnode-id="4739" instrument_node=""> where </span><a class="twikilink" data-dcnode-id="4737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs" title="/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs"><span data-dcnode-id="4738" instrument_node="">dinosaurs</span></a><span data-dcnode-id="4736" instrument_node=""> have survived and evolved into a species that outwardly resemble humans. There are still a handful on dinosaurs that haven't fully evolved, namely Yoshi.
</span><div class="indent" data-dcnode-id="4718"><strong data-dcnode-id="4732"><a class="twikilink" data-dcnode-id="4734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheHero" title="/pmwiki/pmwiki.php/Main/TheHero"><span data-dcnode-id="4735" instrument_node="">Mario</span></a><span data-dcnode-id="4733" instrument_node="">:</span></strong><span data-dcnode-id="4731" instrument_node=""> What single-cell organism did </span><em data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">you</span></em><span data-dcnode-id="4728" instrument_node=""> evolve from? </span><br data-dcnode-id="4727"><strong data-dcnode-id="4723"><a class="twikilink" data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4726" instrument_node="">Koopa</span></a><span data-dcnode-id="4724" instrument_node="">:</span></strong><span data-dcnode-id="4722" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/TyrannosaurusRex" title="/pmwiki/pmwiki.php/UsefulNotes/TyrannosaurusRex"><span data-dcnode-id="4721" instrument_node="">Tyrannosaurus rex</span></a><span data-dcnode-id="4719" instrument_node=""> — the lizard king, thank you very much.
</span></div></li><li data-dcnode-id="4658"><span data-dcnode-id="4716" instrument_node=""> </span><em data-dcnode-id="4713"><a class="twikilink" data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarWars" title="/pmwiki/pmwiki.php/Franchise/StarWars"><span data-dcnode-id="4715" instrument_node="">Star Wars</span></a></em><span data-dcnode-id="4712" instrument_node=""> has </span><a class="urllink" data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//starwars.wikia.com/wiki/Category%3AReptilian_sentient_species"><span data-dcnode-id="4711" instrument_node="">an extensive list.</span><img data-dcnode-id="4710" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4708" instrument_node="">
</span><ul data-dcnode-id="4659"><li data-dcnode-id="4700"><span data-dcnode-id="4707" instrument_node=""> The Trandoshans — or T'doshok, as they name themselves — are the main reptilian species in the setting. They're scaly humanoids with poor reputations and a history of warfare and slave trading. They're also very fond of hunting — and Trandoshan rites of passage involve hunting other intelligent beings. The most notable member of the species is Bossk, one of the </span><a class="twikilink" data-dcnode-id="4705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BountyHunter" title="/pmwiki/pmwiki.php/Main/BountyHunter"><span data-dcnode-id="4706" instrument_node="">Bounty Hunters</span></a><span data-dcnode-id="4704" instrument_node=""> sent after the heroes by </span><a class="twikilink" data-dcnode-id="4702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEmpire" title="/pmwiki/pmwiki.php/Main/TheEmpire"><span data-dcnode-id="4703" instrument_node="">The Empire</span></a><span data-dcnode-id="4701" instrument_node="">.
</span></li><li data-dcnode-id="4690"><span data-dcnode-id="4699" instrument_node=""> The </span><a class="urllink" data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//starwars.wikia.com/wiki/Sarkan"><span data-dcnode-id="4698" instrument_node="">Sarkans,</span><img data-dcnode-id="4697" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4695" instrument_node=""> which are sentient, egg-laying bipedal reptiles. The species made its debut in the 1997 special edition of </span><em data-dcnode-id="4692"><a class="twikilink" data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ANewHope" title="/pmwiki/pmwiki.php/Film/ANewHope"><span data-dcnode-id="4694" instrument_node="">A New Hope</span></a></em><span data-dcnode-id="4691" instrument_node="">.
</span></li><li data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node=""> A more humanoid example are the Falleen, who appear to be green-skinned humans except for their long claws and spinal ridges. (They even have hair!)
</span></li><li data-dcnode-id="4670"><span data-dcnode-id="4687" instrument_node=""> The </span><em data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">Legends</span></em><span data-dcnode-id="4684" instrument_node=""> Universe includes Barabels, who are predatory pack-hunters but also generally good guys, though since the Vong War they are somewhat endangered. The species </span><a class="twikilink" data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CanonImmigrant" title="/pmwiki/pmwiki.php/Main/CanonImmigrant"><span data-dcnode-id="4683" instrument_node="">became canon</span></a><span data-dcnode-id="4681" instrument_node=""> after being introduced in the first issue of the </span><em data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">Darth Maul</span></em><span data-dcnode-id="4678" instrument_node=""> comics.
</span><div class="indent" data-dcnode-id="4671"><span data-dcnode-id="4677" instrument_node="">"On Nal Hutta, the </span><a class="twikilink" data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScaryDogmaticAliens" title="/pmwiki/pmwiki.php/Main/ScaryDogmaticAliens"><span data-dcnode-id="4676" instrument_node="">Vong</span></a><span data-dcnode-id="4674" instrument_node=""> are invaderz. What doez one call them on Barab?" </span><br data-dcnode-id="4673"><span data-dcnode-id="4672" instrument_node="">"Prey?"
</span></div></li><li data-dcnode-id="4660"><span data-dcnode-id="4669" instrument_node=""> </span><em data-dcnode-id="4666"><a class="twikilink" data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/AttackOfTheClones" title="/pmwiki/pmwiki.php/Film/AttackOfTheClones"><span data-dcnode-id="4668" instrument_node="">Attack of the Clones</span></a></em><span data-dcnode-id="4665" instrument_node=""> features </span><a class="urllink" data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//starwars.wikia.com/wiki/Zam_Wesell"><span data-dcnode-id="4664" instrument_node="">Zam Wesell</span><img data-dcnode-id="4663" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="4661" instrument_node="">, a shapeshifting Clawdite assassin hired to kill Senator Amidala.
</span></li></ul></li><li data-dcnode-id="4652"><span data-dcnode-id="4657" instrument_node=""> In </span><em data-dcnode-id="4654"><a class="twikilink" data-dcnode-id="4655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Cinderella2015" title="/pmwiki/pmwiki.php/Film/Cinderella2015"><span data-dcnode-id="4656" instrument_node="">Cinderella (2015)</span></a></em><span data-dcnode-id="4653" instrument_node="">, the lizards transformed into footmen by the fairy godmother retain a number of reptilian traits (such as long tongues).
</span></li><li data-dcnode-id="4645"><span data-dcnode-id="4651" instrument_node=""> Grig, the overenthusiastic gunner from </span><em data-dcnode-id="4647"><a class="twikilink" data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheLastStarfighter" title="/pmwiki/pmwiki.php/Film/TheLastStarfighter"><span data-dcnode-id="4650" instrument_node="">The Last Starfighter</span></a><span data-dcnode-id="4648" instrument_node="">,</span></em><span data-dcnode-id="4646" instrument_node=""> is a rare heroic example.

</span></li><li data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node=""> Crocaryx are crocodilian humanoids in service of the god Kai, who guard the Lorestone of Tahou in the lost city of Zaaryx.
</span></li></ul></li><li data-dcnode-id="4540"><span data-dcnode-id="4557" instrument_node=""> </span><em data-dcnode-id="4554"><a class="twikilink" data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/FightingFantasy" title="/pmwiki/pmwiki.php/Literature/FightingFantasy"><span data-dcnode-id="4556" instrument_node="">Fighting Fantasy</span></a></em><span data-dcnode-id="4553" instrument_node=""> gamebooks like </span><em data-dcnode-id="4550"><a class="twikilink" data-dcnode-id="4551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/IslandOfTheLizardKing" title="/pmwiki/pmwiki.php/Literature/IslandOfTheLizardKing"><span data-dcnode-id="4552" instrument_node="">Island of the Lizard King</span></a></em><span data-dcnode-id="4549" instrument_node=""> and </span><em data-dcnode-id="4546"><a class="twikilink" data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BattlebladeWarrior" title="/pmwiki/pmwiki.php/Literature/BattlebladeWarrior"><span data-dcnode-id="4548" instrument_node="">Battleblade Warrior</span></a></em><span data-dcnode-id="4545" instrument_node=""> features the heroes battling against the tyranny of evil Lizard Men. Subverted in </span><em data-dcnode-id="4542"><a class="twikilink" data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/IslandOfTheUndead" title="/pmwiki/pmwiki.php/Literature/IslandOfTheUndead"><span data-dcnode-id="4544" instrument_node="">Island of the Undead</span></a></em><span data-dcnode-id="4541" instrument_node="">. The titular island is also home to a tribe of lizard people, but while some are hostile, there's also a tribe of harmless lizard people who can help you if you get on their good side.

</span><ul data-dcnode-id="4129"><li data-dcnode-id="4518"><span data-dcnode-id="4532" instrument_node=""> </span><em data-dcnode-id="4529"><a class="twikilink" data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheFirstDwarfKing" title="/pmwiki/pmwiki.php/Literature/TheFirstDwarfKing"><span data-dcnode-id="4531" instrument_node="">The First Dwarf King</span></a></em><span data-dcnode-id="4528" instrument_node="">: The Tarsi are a race of Lizard Folk whose culture is based upon </span><a class="twikilink" data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ImperialJapan" title="/pmwiki/pmwiki.php/UsefulNotes/ImperialJapan"><span data-dcnode-id="4527" instrument_node="">Imperial Japan</span></a><span data-dcnode-id="4525" instrument_node="">. Unusually for this trope, they are </span><a class="twikilink" data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvertedTrope" title="/pmwiki/pmwiki.php/Main/InvertedTrope"><span data-dcnode-id="4524" instrument_node="">some of the most morally good people on the planet</span></a><span data-dcnode-id="4522" instrument_node="">, and they possess both </span><a class="twikilink" data-dcnode-id="4520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SuperStrength" title="/pmwiki/pmwiki.php/Main/SuperStrength"><span data-dcnode-id="4521" instrument_node="">Super Strength</span></a><span data-dcnode-id="4519" instrument_node=""> and the Gift of Wisdom.
</span></li><li data-dcnode-id="4509"><span data-dcnode-id="4517" instrument_node=""> </span><em data-dcnode-id="4514"><a class="twikilink" data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AlmostNight" title="/pmwiki/pmwiki.php/Literature/AlmostNight"><span data-dcnode-id="4516" instrument_node="">Almost Night</span></a></em><span data-dcnode-id="4513" instrument_node="">: Several are seen throughout the story. They have green scales and never wear shirts. A row red spikes go down their back. They're called velikaps and they avert the </span><a class="twikilink" data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="4512" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="4510" instrument_node="">.
</span></li><li data-dcnode-id="4500"><span data-dcnode-id="4508" instrument_node=""> </span><em data-dcnode-id="4505"><a class="twikilink" data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Destroyermen" title="/pmwiki/pmwiki.php/Literature/Destroyermen"><span data-dcnode-id="4507" instrument_node="">Destroyermen</span></a></em><span data-dcnode-id="4504" instrument_node="">: The Grik, descended from raptors according to the </span><a class="twikilink" data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="4503" instrument_node="">Word of God</span></a><span data-dcnode-id="4501" instrument_node="">. The fact that they have feathers as well as scales is further proof of their ancestry. They also have other avian characteristics, such as hollow bones.
</span></li><li data-dcnode-id="4494"><span data-dcnode-id="4499" instrument_node=""> </span><em data-dcnode-id="4496"><a class="twikilink" data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Animorphs" title="/pmwiki/pmwiki.php/Literature/Animorphs"><span data-dcnode-id="4498" instrument_node="">Animorphs</span></a></em><span data-dcnode-id="4495" instrument_node="">: The Hork-Bajir are large, dinosaur-like herbivores with blades growing from their heads and limbs, enslaved by the villains.
</span></li><li data-dcnode-id="4485"><span data-dcnode-id="4493" instrument_node=""> </span><em data-dcnode-id="4490"><a class="twikilink" data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/WellWorld" title="/pmwiki/pmwiki.php/Literature/WellWorld"><span data-dcnode-id="4492" instrument_node="">Well World</span></a></em><span data-dcnode-id="4489" instrument_node="">: Marquoz starts life as one of a small saurian </span><a class="twikilink" data-dcnode-id="4487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreathWeapon" title="/pmwiki/pmwiki.php/Main/BreathWeapon"><span data-dcnode-id="4488" instrument_node="">fire-breathing</span></a><span data-dcnode-id="4486" instrument_node=""> race. After reaching the Well World, he is reborn as a Hakazit, a race of huge armored dinosaurlike war machines.
</span></li><li data-dcnode-id="4479"><span data-dcnode-id="4484" instrument_node=""> </span><em data-dcnode-id="4481"><a class="twikilink" data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ConanTheBarbarian" title="/pmwiki/pmwiki.php/Literature/ConanTheBarbarian"><span data-dcnode-id="4483" instrument_node="">Conan the Barbarian</span></a></em><span data-dcnode-id="4480" instrument_node="">: The Serpent Men, despite their name, are usually portrayed with a full set of limbs.
</span></li><li data-dcnode-id="4467"><span data-dcnode-id="4478" instrument_node=""> The Ternaui in </span><em data-dcnode-id="4475"><a class="twikilink" data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheExcaliburAlternative" title="/pmwiki/pmwiki.php/Literature/TheExcaliburAlternative"><span data-dcnode-id="4477" instrument_node="">The Excalibur Alternative</span></a></em><span data-dcnode-id="4474" instrument_node="">. Initially appearing as silent bodyguards to the </span><a class="twikilink" data-dcnode-id="4472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4473" instrument_node="">Big Bad</span></a><span data-dcnode-id="4471" instrument_node="">, it turns out that </span><span class="spoiler" data-dcnode-id="4469" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4470" instrument_node=""> they are telepathic and detest their slavery. Eventually they side with the humans</span></span><span data-dcnode-id="4468" instrument_node="">.
</span></li><li data-dcnode-id="4455"><span data-dcnode-id="4466" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/PoulAnderson" title="/pmwiki/pmwiki.php/Creator/PoulAnderson"><span data-dcnode-id="4465" instrument_node="">Poul Anderson</span></a><span data-dcnode-id="4463" instrument_node="">'s Merseians in </span><em data-dcnode-id="4460"><a class="twikilink" data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TechnicHistory" title="/pmwiki/pmwiki.php/Literature/TechnicHistory"><span data-dcnode-id="4462" instrument_node="">Technic History</span></a></em><span data-dcnode-id="4459" instrument_node="">, although usually at odds with humanity, are a more nuanced portrayal (and have a culture </span><a class="twikilink" data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture"><span data-dcnode-id="4458" instrument_node="">based off of the Sassanid Empire</span></a><span data-dcnode-id="4456" instrument_node="">).
</span></li><li data-dcnode-id="4442"><span data-dcnode-id="4454" instrument_node=""> David Brin's Uplift Series has a few Reptillians, but two stand out:
</span><ul data-dcnode-id="4443"><li data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node=""> The Soro are imperialistic, cruel and warlike. And to be expected, enemies of Earth Clan.
</span></li><li data-dcnode-id="4444"><span data-dcnode-id="4451" instrument_node=""> The Thennannin are also reptiles. They are incredibly conservative, self-righteous and dogmatic. However they are not actually evil. In the second novel, </span><em data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">Startide Rising</span></em><span data-dcnode-id="4448" instrument_node="">, they are fighting Humans along with everyone else to get the big secret they think the Streaker is carrying. By the third novel they have "adopted" </span><span class="spoiler" data-dcnode-id="4446" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4447" instrument_node="">Gorillas</span></span><span data-dcnode-id="4445" instrument_node=""> as a client species and are dutifully helping protect Earth.
</span></li></ul></li><li data-dcnode-id="4436"><span data-dcnode-id="4441" instrument_node=""> The Quintaglios of Robert J. Sawyer's </span><em data-dcnode-id="4438"><a class="twikilink" data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/QuintaglioAscension" title="/pmwiki/pmwiki.php/Literature/QuintaglioAscension"><span data-dcnode-id="4440" instrument_node="">Quintaglio Ascension</span></a></em><span data-dcnode-id="4437" instrument_node=""> trilogy are the descendants of small Tyrannosaurs. Since the series focuses on an important period of their planet's history, we get a characterization of them that is far more nuanced than usual.

ata-dcnode-id="4419" instrument_node="">Universal Translators</span></a><span data-dcnode-id="4417" instrument_node=""> can't handle it. While the first ones to show up are basically incompetent </span><a class="twikilink" data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpacePirates" title="/pmwiki/pmwiki.php/Main/SpacePirates"><span data-dcnode-id="4416" instrument_node="">Space Pirates</span></a><span data-dcnode-id="4414" instrument_node="">, it turns out that neither of these traits </span><a class="twikilink" data-dcnode-id="4412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlanetOfHats" title="/pmwiki/pmwiki.php/Main/PlanetOfHats"><span data-dcnode-id="4413" instrument_node="">is their hat</span></a><span data-dcnode-id="4411" instrument_node="">.

ink" data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="4381" instrument_node="">mooks</span></a><span data-dcnode-id="4379" instrument_node=""> for the book's </span><a class="twikilink" data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4378" instrument_node="">Big Bad</span></a><span data-dcnode-id="4376" instrument_node="">. They live in clans identified by the shape of the weapon on their tails, and Ssil's proves her to be the </span><a class="twikilink" data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RagsToRoyalty" title="/pmwiki/pmwiki.php/Main/RagsToRoyalty"><span data-dcnode-id="4375" instrument_node="">only known heir to the banished queen</span></a><span data-dcnode-id="4373" instrument_node=""> who </span><a class="twikilink" data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceTurn" title="/pmwiki/pmwiki.php/Main/HeelFaceTurn"><span data-dcnode-id="4372" instrument_node="">turned against</span></a><span data-dcnode-id="4370" instrument_node=""> the </span><a class="twikilink" data-dcnode-id="4368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="4369" instrument_node="">Big Bad</span></a><span data-dcnode-id="4367" instrument_node=""> long ago.</span></span><span data-dcnode-id="4365" instrument_node="">

m</span></a><span data-dcnode-id="4319" instrument_node="">. Oh, and once the humans enter the picture in a significant way, they immediately become the </span><a class="twikilink" data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CardCarryingVillain" title="/pmwiki/pmwiki.php/Main/CardCarryingVillain"><span data-dcnode-id="4318" instrument_node="">Card Carrying Villains</span></a><span data-dcnode-id="4316" instrument_node=""> of the book because </span><a class="twikilink" data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreSpecial" title="/pmwiki/pmwiki.php/Main/HumansAreSpecial"><span data-dcnode-id="4315" instrument_node="">humans</span></a><span data-dcnode-id="4313" instrument_node=""> are </span><a class="twikilink" data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MostWritersAreHuman" title="/pmwiki/pmwiki.php/Main/MostWritersAreHuman"><span data-dcnode-id="4312" instrument_node="">awesome</span></a><span data-dcnode-id="4310" instrument_node=""> and reptiles... </span><a class="twikilink" data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="4309" instrument_node="">well duh</span></a><span data-dcnode-id="4307" instrument_node="">. It's awkward.

</span></li><li data-dcnode-id="4243"><span data-dcnode-id="4250" instrument_node=""> Norton's Zacathans turn this trope upside down and inside out. Yes, they're reptiles. They're also highly intelligent, extremely civilized, and tend to be top-level Intelligentsia (having very long lifespans gives them lots of time to learn a lot of stuff); their </span><a class="twikilink" data-dcnode-id="4248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlanetOfHats" title="/pmwiki/pmwiki.php/Main/PlanetOfHats"><span data-dcnode-id="4249" instrument_node="">"hat"</span></a><span data-dcnode-id="4247" instrument_node=""> is archaeology and history.</span><a class="twikilink" data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LawOfAlienNames" title="/pmwiki/pmwiki.php/Main/LawOfAlienNames"><span data-dcnode-id="4246" instrument_node="">Their names all begin with "Z".</span></a><span data-dcnode-id="4244" instrument_node=""> And they're still outstanding fighters if they have to be, due to reptile hide and very long teeth. (Oh yes, and the highest known psi rating in the galaxy, which they keep a Deep Dark Secret.)
</span></li></ul></li><li data-dcnode-id="4229"><span data-dcnode-id="4240" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TamoraPierce" title="/pmwiki/pmwiki.php/Creator/TamoraPierce"><span data-dcnode-id="4239" instrument_node="">Tamora Pierce</span></a><span data-dcnode-id="4237" instrument_node="">'s </span><em data-dcnode-id="4234"><a class="twikilink" data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TortallUniverse" title="/pmwiki/pmwiki.php/Literature/TortallUniverse"><span data-dcnode-id="4236" instrument_node="">Tortall Universe</span></a></em><span data-dcnode-id="4233" instrument_node=""> series has basilisks, which are bipedal, 7-foot tall, slender, lizard-like immortals that use </span><a class="twikilink" data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SssssnakeTalk" title="/pmwiki/pmwiki.php/Main/SssssnakeTalk"><span data-dcnode-id="4232" instrument_node="">Sssssnake Talk</span></a><span data-dcnode-id="4230" instrument_node="">, speak most mortal languages, and can turn enemies to stone with a spell. The only basilisk seen in the series, Tkaa, is a good guy.

</span></li><li data-dcnode-id="4211"><span data-dcnode-id="4216" instrument_node=""> The Viis, the main antagonists of Deborah Chester's </span><em data-dcnode-id="4213"><a class="twikilink" data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/AlienChronicles" title="/pmwiki/pmwiki.php/Literature/AlienChronicles"><span data-dcnode-id="4215" instrument_node="">Alien Chronicles</span></a></em><span data-dcnode-id="4212" instrument_node=""> novels, are decadent, humanoid, frilled lizards.
</span></li><li data-dcnode-id="4193"><span data-dcnode-id="4210" instrument_node=""> </span><em data-dcnode-id="4207"><a class="twikilink" data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/HumanxCommonwealth" title="/pmwiki/pmwiki.php/Literature/HumanxCommonwealth"><span data-dcnode-id="4209" instrument_node="">Humanx Commonwealth</span></a></em><span data-dcnode-id="4206" instrument_node="">: The AAnn. Lighter and weaker than humans but much faster with sharp claws and teeth. </span><span class="spoiler" data-dcnode-id="4204" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4205" instrument_node="">Almost</span></span><span data-dcnode-id="4203" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="4202" instrument_node="">Always the antagonist</span></a><span data-dcnode-id="4200" instrument_node=""> when they appear. Includes </span><a class="twikilink" data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SssssnakeTalk" title="/pmwiki/pmwiki.php/Main/SssssnakeTalk"><span data-dcnode-id="4199" instrument_node="">Sssssnake Talk</span></a><span data-dcnode-id="4197" instrument_node="">. They also communicate with hand gestures to show emotion, although this is a common linguistic trait in that universe. </span><span class="spoiler" data-dcnode-id="4195" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4196" instrument_node="">There have been several sympathetic AAnn characters in the Flinx setting, even one that fell in love with the titular redhead. None outlast the book they are introduced in.</span></span><span data-dcnode-id="4194" instrument_node="">
</span></li><li data-dcnode-id="4171"><span data-dcnode-id="4192" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TerryPratchett" title="/pmwiki/pmwiki.php/Creator/TerryPratchett"><span data-dcnode-id="4191" instrument_node="">Terry Pratchett</span></a><span data-dcnode-id="4189" instrument_node="">'s </span><em data-dcnode-id="4186"><a class="twikilink" data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Discworld" title="/pmwiki/pmwiki.php/Literature/Discworld"><span data-dcnode-id="4188" instrument_node="">Discworld</span></a></em><span data-dcnode-id="4185" instrument_node=""> has (in </span><em data-dcnode-id="4182"><a class="twikilink" data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheLastHero" title="/pmwiki/pmwiki.php/Literature/TheLastHero"><span data-dcnode-id="4184" instrument_node="">The Last Hero</span></a></em><span data-dcnode-id="4181" instrument_node="">) the last two "Stupid Lizard Men", a race whose entire purpose seemed to be to act as drama-appropriate idiotic </span><a class="twikilink" data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="4180" instrument_node="">mooks</span></a><span data-dcnode-id="4178" instrument_node=""> for </span><a class="twikilink" data-dcnode-id="4176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilOverlord" title="/pmwiki/pmwiki.php/Main/EvilOverlord"><span data-dcnode-id="4177" instrument_node="">evil overlords</span></a><span data-dcnode-id="4175" instrument_node="">. They're all called Slime. Given that other races considered absent from the Disc, namely orcs and goblins, make a return it may turn out those were just the last two </span><em data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">stupid</span></em><span data-dcnode-id="4172" instrument_node=""> ones.
</span></li><li data-dcnode-id="4162"><span data-dcnode-id="4170" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RichardKMorgan" title="/pmwiki/pmwiki.php/Creator/RichardKMorgan"><span data-dcnode-id="4169" instrument_node="">Richard K. Morgan</span></a><span data-dcnode-id="4167" instrument_node="">'s </span><em data-dcnode-id="4164"><a class="twikilink" data-dcnode-id="4165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ALandFitForHeroes" title="/pmwiki/pmwiki.php/Literature/ALandFitForHeroes"><span data-dcnode-id="4166" instrument_node="">The Steel Remains</span></a></em><span data-dcnode-id="4163" instrument_node=""> frequently refers to a great war that happened before the book itself is set, between the forces of humanity and their allies against the aquatic, lizard-like "Scaled Folk".
</span></li><li data-dcnode-id="4153"><span data-dcnode-id="4161" instrument_node=""> How the archaic human protagonists of </span><em data-dcnode-id="4158"><a class="twikilink" data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/QuestForFire" title="/pmwiki/pmwiki.php/Literature/QuestForFire"><span data-dcnode-id="4160" instrument_node="">Quest for Fire</span></a></em><span data-dcnode-id="4157" instrument_node=""> perceive the anatomically modern Wah tribe: They have strange cylindrical bodies with arms that stick out without shoulders to speak of, </span><a class="twikilink" data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BodyPaint" title="/pmwiki/pmwiki.php/Main/BodyPaint"><span data-dcnode-id="4156" instrument_node="">seemingly scaly skin</span></a><span data-dcnode-id="4154" instrument_node=""> and a lethargic temperament.

</span><ul data-dcnode-id="4137"><li data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node=""> The Race is a species of chameleon-like reptilians whose strong sense of cultural pride drives them to try and conquer Earth. The two species they subjugated before invading Earth (Rabotevs and Halessi, though those are probably the Race's names for them) are also reptilian in nature, as they are mentioned as being fairly similar to the Race.
</span></li><li data-dcnode-id="4138"><span data-dcnode-id="4145" instrument_node=""> In </span><em data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">Homeward Bound</span></em><span data-dcnode-id="4142" instrument_node="">, humans finally meet members of the two other species after reaching Home, although they claim to have already seen pictures of them. This is also the first description of the races that the readers get. The Rabotevs have two thumbs on each hand and eye stalks instead of the Race's eye turrets. The Halessi look more like cross between </span><a class="twikilink" data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleGreenMen" title="/pmwiki/pmwiki.php/Main/LittleGreenMen"><span data-dcnode-id="4141" instrument_node="">Little Green Men</span></a><span data-dcnode-id="4139" instrument_node=""> and lizards, being small, squeaky-voiced, more erect and smaller-snouted than members of the Race. Unlike the Race, the Rabotevs and the Halessi don't suffer narcotic or mating-inducing effects from ginger.
</span></li></ul></li><li data-dcnode-id="4130"><span data-dcnode-id="4135" instrument_node=""> The Aandrisk in </span><em data-dcnode-id="4132"><a class="twikilink" data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheLongWayToASmallAngryPlanet" title="/pmwiki/pmwiki.php/Literature/TheLongWayToASmallAngryPlanet"><span data-dcnode-id="4134" instrument_node="">The Long Way to A Small, Angry Planet</span></a></em><span data-dcnode-id="4131" instrument_node=""> look like human-sized bipedal lizards with multicolored feathers on their heads.
</span></li></ul><ul data-dcnode-id="4119"><li data-dcnode-id="4120"><span data-dcnode-id="4127" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MarionZimmerBradley" title="/pmwiki/pmwiki.php/Creator/MarionZimmerBradley"><span data-dcnode-id="4126" instrument_node="">Marion Zimmer Bradley</span></a><span data-dcnode-id="4124" instrument_node="">'s </span><em data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">The Brass Dragon</span></em><span data-dcnode-id="4121" instrument_node="">. The Dikri are a race of cold, ruthless dragon-like aliens who can Shape Shift into human form. They act as renegades, interfering on primitive worlds in violation of interstellar rules.
</span></li></ul><ul data-dcnode-id="3892"><li data-dcnode-id="4112"><span data-dcnode-id="4117" instrument_node=""> </span><em data-dcnode-id="4114"><a class="twikilink" data-dcnode-id="4115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/WildCards" title="/pmwiki/pmwiki.php/Literature/WildCards"><span data-dcnode-id="4116" instrument_node="">Wild Cards</span></a></em><span data-dcnode-id="4113" instrument_node=""> has Wyrm, Troll, and Detective Harvey Kant, all scaly reptilian Jokers.
