</span><ul data-dcnode-id="3314"><li data-dcnode-id="3321"><span data-dcnode-id="3338" instrument_node=""> The </span><a class="urllink" data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Alien"><span data-dcnode-id="3337" instrument_node="">Alien</span><img data-dcnode-id="3336" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3334" instrument_node=""> archetype. Most of the members have some sort of lizard-like attributes to them, and they are all Reptile-type. They aren't exactly portrayed in a good light either, considering their card artworks depict things like </span><a class="urllink" data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Brainwashing_Beam"><span data-dcnode-id="3333" instrument_node="">brainwashing</span><img data-dcnode-id="3332" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3330" instrument_node="">, </span><a class="urllink" data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/%2522A%2522_Cell_Recombination_Device"><span data-dcnode-id="3329" instrument_node="">experimentation</span><img data-dcnode-id="3328" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3326" instrument_node="">, and </span><a class="urllink" data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Planet_Pollutant_Virus"><span data-dcnode-id="3325" instrument_node="">planetary invasion</span><img data-dcnode-id="3324" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3322" instrument_node="">.
</span></li><li data-dcnode-id="3315"><span data-dcnode-id="3320" instrument_node=""> There is also the </span><a class="urllink" data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yugioh.wikia.com/wiki/Worm"><span data-dcnode-id="3319" instrument_node="">Worm</span><img data-dcnode-id="3318" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3316" instrument_node=""> archetype. While they don't have much in the way of reptilian features, they are also extraterrestrial invaders, and are likely Reptile-type because of this trope.
</span></li></ul></li><li data-dcnode-id="3301"><span data-dcnode-id="3312" instrument_node=""> From </span><em data-dcnode-id="3309"><a class="twikilink" data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/MagicTheGathering" title="/pmwiki/pmwiki.php/TabletopGame/MagicTheGathering"><span data-dcnode-id="3311" instrument_node="">Magic: The Gathering</span></a></em><span data-dcnode-id="3308" instrument_node="">, we have the Viashino, a race of lizard folk with </span><a class="twikilink" data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DragonAncestry" title="/pmwiki/pmwiki.php/Main/DragonAncestry"><span data-dcnode-id="3307" instrument_node="">Dragon Ancestry</span></a><span data-dcnode-id="3305" instrument_node=""> that are heavily associated with Red mana, and tend to be </span><a class="twikilink" data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LeanAndMean" title="/pmwiki/pmwiki.php/Main/LeanAndMean"><span data-dcnode-id="3304" instrument_node="">Lean and Mean</span></a><span data-dcnode-id="3302" instrument_node="">.
</span></li><li data-dcnode-id="3226"><span data-dcnode-id="3300" instrument_node=""> </span><em data-dcnode-id="3297"><a class="twikilink" data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="3299" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="3296" instrument_node="">:
</span><ul data-dcnode-id="3227"><li data-dcnode-id="3291"><span data-dcnode-id="3295" instrument_node=""> The Lizard Folk give this trope its name (they were "lizard men" in first and second edition). They're generally depicted as swamp-dwelling tribals, and while not actually evil — their canon alignment is </span><a class="twikilink" data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueNeutral" title="/pmwiki/pmwiki.php/Main/TrueNeutral"><span data-dcnode-id="3294" instrument_node="">True Neutral</span></a><span data-dcnode-id="3292" instrument_node=""> — they don't like humans much. Except as emergency rations.
</span></li><li data-dcnode-id="3286"><span data-dcnode-id="3290" instrument_node=""> In the same series are the smaller draconic (in more recent editions) </span><a class="twikilink" data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurKoboldsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurKoboldsAreDifferent"><span data-dcnode-id="3289" instrument_node="">kobolds</span></a><span data-dcnode-id="3287" instrument_node="">, and the similar-in-appearance but more hostile troglodytes.
</span></li><li data-dcnode-id="3269"><span data-dcnode-id="3285" instrument_node=""> The </span><em data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">almost</span></em><span data-dcnode-id="3282" instrument_node=""> comprehensive list of reptilian humanoids that have appeared at some point or another in at least one </span><em data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">D&amp;D</span></em><span data-dcnode-id="3279" instrument_node=""> setting: lizardmen/folk, kobolds, troglodytes, saurials, cay-men (later renamed "cayma), gator men (renamed "gurrash"), chameleon men (wallaras, in their own tongue), yuan-ti, draconians (another humanoid dragon race), braxats, asheratis, dragonkin (</span><em data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">another</span></em><span data-dcnode-id="3276" instrument_node=""> humanoid dragon race), firenewts, pterafolk (humanoid pterodactyls), ophidians, sarkrith, khumats (humanoid crocodiles), scaled stalkers, and dragonborn (yet </span><em data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">another</span></em><span data-dcnode-id="3273" instrument_node=""> humanoid dragon race). Almost all of these races where created by the Sarrukh, the Reptilian </span><a class="twikilink" data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="3272" instrument_node="">Creator Race</span></a><span data-dcnode-id="3270" instrument_node="">, for one purpose or the other).
</span></li><li data-dcnode-id="3260"><span data-dcnode-id="3268" instrument_node=""> The </span><em data-dcnode-id="3265"><a class="twikilink" data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/ForgottenRealms" title="/pmwiki/pmwiki.php/TabletopGame/ForgottenRealms"><span data-dcnode-id="3267" instrument_node="">Forgotten Realms</span></a></em><span data-dcnode-id="3264" instrument_node=""> have several breeds of saurials, </span><a class="twikilink" data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs" title="/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs"><span data-dcnode-id="3263" instrument_node="">which are dinosaur-like humanoids</span></a><span data-dcnode-id="3261" instrument_node="">.
</span></li><li data-dcnode-id="3251"><span data-dcnode-id="3259" instrument_node=""> In </span><em data-dcnode-id="3256"><a class="twikilink" data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Mystara" title="/pmwiki/pmwiki.php/TabletopGame/Mystara"><span data-dcnode-id="3258" instrument_node="">Mystara</span></a></em><span data-dcnode-id="3255" instrument_node="">, you can find Cay-men (little peaceful dudes), gator men (big ravenous thugs), and chameleon men (weird dragon-worshiping aborigine-analogs). Also </span><a class="twikilink" data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin" title="/pmwiki/pmwiki.php/Main/ExactlyWhatItSaysOnTheTin"><span data-dcnode-id="3254" instrument_node="">turtles and snappers</span></a><span data-dcnode-id="3252" instrument_node="">, if Turtle Folk count here.
</span></li><li data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node=""> The Yuan-ti are snake people, but pureblood versions just look like people with scales and reptile-like eyes.
</span></li><li data-dcnode-id="3240"><span data-dcnode-id="3248" instrument_node=""> </span><em data-dcnode-id="3245"><a class="twikilink" data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DarkSun" title="/pmwiki/pmwiki.php/TabletopGame/DarkSun"><span data-dcnode-id="3247" instrument_node="">Dark Sun</span></a></em><span data-dcnode-id="3244" instrument_node=""> doesn't have lizard folk </span><span class="spoiler" data-dcnode-id="3242" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3243" instrument_node=""> because they were wiped out, except those at the Last Sea</span></span><span data-dcnode-id="3241" instrument_node="">. It has ssurans instead, who look quite similar (and in the 4th Edition, are identical).
</span></li><li data-dcnode-id="3234"><span data-dcnode-id="3239" instrument_node=""> In </span><em data-dcnode-id="3236"><a class="twikilink" data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Spelljammer" title="/pmwiki/pmwiki.php/TabletopGame/Spelljammer"><span data-dcnode-id="3238" instrument_node="">Spelljammer</span></a></em><span data-dcnode-id="3235" instrument_node="">, Lizard folk in Wildspace are chiefly descended from planet-bound ones taken as slaves by humans and mind flayers, who later escaped and freed themselves. They are more civilized than their planetary brethren and believe this to be due to being closer to the various suns in space. As such, they habitually fly their nursery ships as close to suns as safely possible in order to expose their eggs to as much solar radiation as they can.
</span></li><li data-dcnode-id="3228"><span data-dcnode-id="3233" instrument_node=""> </span><em data-dcnode-id="3230"><a class="twikilink" data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Planescape" title="/pmwiki/pmwiki.php/TabletopGame/Planescape"><span data-dcnode-id="3232" instrument_node="">Planescape</span></a></em><span data-dcnode-id="3229" instrument_node="">: Khaasta are natives of the Outer Planes, chiefly the chaotic ones and the neutral Outlands, who strongly resemble lizard folk. They're nomadic raiders and petty warriors, roving across the planes in search of sustenance, loot and opportunities to fight and swindle people. Their society is a shifting chaos of power grabs and backstabbing, and they're noted to be entirely willing to eat other thinking beings if that's what's available.
</span></li></ul></li><li data-dcnode-id="3210"><span data-dcnode-id="3225" instrument_node=""> </span><em data-dcnode-id="3222"><a class="twikilink" data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/PalladiumFantasy" title="/pmwiki/pmwiki.php/TabletopGame/PalladiumFantasy"><span data-dcnode-id="3224" instrument_node="">Palladium Fantasy</span></a></em><span data-dcnode-id="3221" instrument_node="">:
</span><ul data-dcnode-id="3211"><li data-dcnode-id="3216"><span data-dcnode-id="3220" instrument_node=""> Lizard men are a reclusive race of humanoid, semiaquatic reptiles native to the Yin-Sloth Jungles. They are a </span><a class="twikilink" data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DyingRace" title="/pmwiki/pmwiki.php/Main/DyingRace"><span data-dcnode-id="3219" instrument_node="">Dying Race</span></a><span data-dcnode-id="3217" instrument_node="">, as constant conflict with other jungle-dwelling species and the aggressive colonization efforts of the Western Empire have taken a steady toll on their numbers and society.
</span></li><li data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node=""> Lizard mages are a distinct and more draconic species that ruled the world in ancient times. They were eventualy overthrown by their servants, and are now a scattered and uncommon race of reclusive scholars obsessed with amassing knowledge and magical power.
</span></li><li data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node=""> Eandroth are another reptilian species mostly found as nomads in deserts and grasslands. They're proud and aggressive warriors, and ride theropod dinosaurs.
</span></li></ul></li><li data-dcnode-id="3181"><span data-dcnode-id="3209" instrument_node=""> </span><em data-dcnode-id="3206"><a class="twikilink" data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Pathfinder" title="/pmwiki/pmwiki.php/TabletopGame/Pathfinder"><span data-dcnode-id="3208" instrument_node="">Pathfinder</span></a></em><span data-dcnode-id="3205" instrument_node="">:
</span><ul data-dcnode-id="3182"><li data-dcnode-id="3199"><span data-dcnode-id="3204" instrument_node=""> Lizard folk appear in much the same vein as they do in </span><em data-dcnode-id="3201"><a class="twikilink" data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="3203" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="3200" instrument_node="">, as a highly territorial but not strictly hostile swamp-dwelling tribal people. Variants include the large and powerful Lizard Scions, a desert-dwelling subspecies known as the sandfolk, and another, gecko-like subspecies that inhabits tropical mountains and can climb on vertical surfaces.
</span></li><li data-dcnode-id="3194"><span data-dcnode-id="3198" instrument_node=""> The subterranean, primitive troglodytes — renamed xulgaths in 2nd Edition — are the descendants of a great empire that collapsed long ago, leaving them as scattered bands of primitives lurking in the caverns of the </span><a class="twikilink" data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeneathTheEarth" title="/pmwiki/pmwiki.php/Main/BeneathTheEarth"><span data-dcnode-id="3197" instrument_node="">Darklands</span></a><span data-dcnode-id="3195" instrument_node="">. They are also incredibly prone to mutation, and any given tribe can include a fair number of Lizard Folk variants, including gigantic, multi-limbed or poison-spitting ones.
</span></li><li data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node=""> Saurians are towering tyrannosaur people who live in isolated jungles, tropical mountains, and the jungle-filled, dinosaur-infested cavern-world of Deep Tolguth, which they share with the xulgaths. They see themselves as protectors of the natural world, and are particularly focused on protecting areas where dinosaurs and primordial megafauna still thrive.
</span></li><li data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node=""> Lizard folk, troglodytes and saurians are all incredibly ancient species, long predating the warm-blooded species' civilizations, and tracing their histories to a time when reptiles ruled the world. The lizard folk and saurians have changed little since ancient times, although their numbers have generally fallen, while the troglodytes' ancestors ruled a great empire before their descent into savagery.
</span></li><li data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node=""> Kobolds also return as diminutive dragon-worshippers who live in complex and trap-laden tunnel systems underground. 2nd Edition redesigns them to have a squatter, more compact look, with a pair of thick horns growing from their heads.
</span></li><li data-dcnode-id="3183"><span data-dcnode-id="3187" instrument_node=""> Reptials are agathions — </span><a class="twikilink" data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NeutralGood" title="/pmwiki/pmwiki.php/Main/NeutralGood"><span data-dcnode-id="3186" instrument_node="">Neutral Good</span></a><span data-dcnode-id="3184" instrument_node=""> outsiders whose various kinds are all based on various sorts of animals — resembling robust, three-foot-tall bipedal lizards with emerald-green scales and large crests on their heads. Unlike typical depictions of lizard folk, reptials are scholars and researchers by nature, putting a greater focus on overcoming evil through knowledge and learning than through martial might.
</span></li></ul></li><li data-dcnode-id="3150"><span data-dcnode-id="3180" instrument_node=""> </span><em data-dcnode-id="3177"><a class="twikilink" data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Starfinder" title="/pmwiki/pmwiki.php/TabletopGame/Starfinder"><span data-dcnode-id="3179" instrument_node="">Starfinder</span></a></em><span data-dcnode-id="3176" instrument_node="">:
</span><ul data-dcnode-id="3151"><li data-dcnode-id="3162"><span data-dcnode-id="3175" instrument_node=""> The vesk are an alien race of </span><a class="twikilink" data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="3174" instrument_node="">proud warriors</span></a><span data-dcnode-id="3172" instrument_node=""> who, historically, went to war with humanity before </span><a class="twikilink" data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyMine" title="/pmwiki/pmwiki.php/Main/EnemyMine"><span data-dcnode-id="3171" instrument_node="">being forced to team up</span></a><span data-dcnode-id="3169" instrument_node=""> against the even greater danger of the </span><a class="twikilink" data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts" title="/pmwiki/pmwiki.php/Main/HordeOfAlienLocusts"><span data-dcnode-id="3168" instrument_node="">Hive</span></a><span data-dcnode-id="3166" instrument_node="">. Physically, vesk resemble big, muscular Lizard Folk. They tend to be </span><a class="twikilink" data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LawfulNeutral" title="/pmwiki/pmwiki.php/Main/LawfulNeutral"><span data-dcnode-id="3165" instrument_node="">Lawful Neutral</span></a><span data-dcnode-id="3163" instrument_node=""> and live in a highly-regimented, militaristic society.
</span></li><li data-dcnode-id="3157"><span data-dcnode-id="3161" instrument_node=""> The reptoids are the classic conspiracy theory take on this trope, in contrast to the vesk's more modern science-fiction interpretation. They're scaly humanoids with tails and lizardlike crests in their true forms, but they can </span><a class="twikilink" data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VoluntaryShapeshifting" title="/pmwiki/pmwiki.php/Main/VoluntaryShapeshifting"><span data-dcnode-id="3160" instrument_node="">alter their appearance</span></a><span data-dcnode-id="3158" instrument_node=""> to resemble other humanoid species, an ability they employ to infiltrate other cultures and manipulate them for their own unknown ends.
</span></li><li data-dcnode-id="3152"><span data-dcnode-id="3156" instrument_node=""> And then, there are the ikeshti; cute little red-scaled desert-dwelling iguana people who </span><a class="twikilink" data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WasOnceAMan" title="/pmwiki/pmwiki.php/Main/WasOnceAMan"><span data-dcnode-id="3155" instrument_node="">metamorphose into ravening lizard-ogres</span></a><span data-dcnode-id="3153" instrument_node=""> if their first (and potentially deadly) breeding season goes badly.
</span></li></ul></li><li data-dcnode-id="3142"><span data-dcnode-id="3149" instrument_node=""> One of Mayfair Games' last 3rd-party D&amp;D supplements was </span><em data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Lizardmen</span></em><span data-dcnode-id="3146" instrument_node="">, which addressed common Lizard Folk society and history. It also introduced several variant types, including Marsh Runners (diminutive pranksters with basilisk lizards' ability to </span><a class="twikilink" data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WalkOnWater" title="/pmwiki/pmwiki.php/Main/WalkOnWater"><span data-dcnode-id="3145" instrument_node="">Walk on Water</span></a><span data-dcnode-id="3143" instrument_node="">), lizardmen of Tek (monkish gecko-footed jungle tree-climbers), and the Mad Lizardmen of Pang-Leng (brutish, oversized Warders ruled over by frail, lunatic Artificers).
</span></li><li data-dcnode-id="3054"><span data-dcnode-id="3141" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/GamesWorkshop" title="/pmwiki/pmwiki.php/Creator/GamesWorkshop"><span data-dcnode-id="3140" instrument_node="">Games Workshop</span></a><span data-dcnode-id="3138" instrument_node=""> games:
</span><ul data-dcnode-id="3055"><li data-dcnode-id="3129"><span data-dcnode-id="3137" instrument_node=""> </span><em data-dcnode-id="3134"><a class="twikilink" data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Necromunda" title="/pmwiki/pmwiki.php/TabletopGame/Necromunda"><span data-dcnode-id="3136" instrument_node="">Necromunda</span></a></em><span data-dcnode-id="3133" instrument_node=""> has Scalies, large reptilian </span><a class="twikilink" data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanSubspecies" title="/pmwiki/pmwiki.php/Main/HumanSubspecies"><span data-dcnode-id="3132" instrument_node="">abhumans</span></a><span data-dcnode-id="3130" instrument_node=""> with tough scaled skin and the ability to regenerate wounds. While there are rumours of Scaly tribes existing in the most isolated and polluted sections of the Underhive, they are most often encountered alongside gangs of mutant Scavvies.
</span></li><li data-dcnode-id="3083"><span data-dcnode-id="3128" instrument_node=""> </span><em data-dcnode-id="3125"><a class="twikilink" data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Warhammer" title="/pmwiki/pmwiki.php/TabletopGame/Warhammer"><span data-dcnode-id="3127" instrument_node="">Warhammer</span></a></em><span data-dcnode-id="3124" instrument_node="">:
</span><ul data-dcnode-id="3084"><li data-dcnode-id="3095"><span data-dcnode-id="3123" instrument_node=""> Lizardmen give this race a complete army and civilization (the </span><a class="twikilink" data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture" title="/pmwiki/pmwiki.php/Main/FantasyCounterpartCulture"><span data-dcnode-id="3122" instrument_node="">Fantasy Counterpart Culture</span></a><span data-dcnode-id="3120" instrument_node=""> of </span><a class="twikilink" data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mayincatec" title="/pmwiki/pmwiki.php/Main/Mayincatec"><span data-dcnode-id="3119" instrument_node="">various Mesoamerican civilizations</span></a><span data-dcnode-id="3117" instrument_node="">, at that) which so happens to be the most ancient surviving civilization in the </span><em data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Warhammer</span></em><span data-dcnode-id="3114" instrument_node=""> setting. Their leaders are a priestly </span><a class="twikilink" data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticCasteSystem" title="/pmwiki/pmwiki.php/Main/FantasticCasteSystem"><span data-dcnode-id="3113" instrument_node="">caste</span></a><span data-dcnode-id="3111" instrument_node=""> of magic using Frog Folk, the Slann, who are by a good margin the most powerful mages in the setting. Other lizardmen races include the the Skinks (small and skittish skirmishers, assassins and wizards), the </span><a class="twikilink" data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs" title="/pmwiki/pmwiki.php/Main/EverythingsBetterWithDinosaurs"><span data-dcnode-id="3110" instrument_node="">Saurus</span></a><span data-dcnode-id="3108" instrument_node=""> (</span><a class="twikilink" data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="3107" instrument_node="">strong, ruthless and single-minded warriors</span></a><span data-dcnode-id="3105" instrument_node="">) and the Kroxigor (</span><a class="twikilink" data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmashMook" title="/pmwiki/pmwiki.php/Main/SmashMook"><span data-dcnode-id="3104" instrument_node="">huge, strong</span></a><span data-dcnode-id="3102" instrument_node="">, </span><a class="twikilink" data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DumbMuscle" title="/pmwiki/pmwiki.php/Main/DumbMuscle"><span data-dcnode-id="3101" instrument_node="">not overly bright</span></a><span data-dcnode-id="3099" instrument_node=""> saurians who work both as heavy support fighters and manual labour). They were created as servants to </span><a class="twikilink" data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AncientAstronauts" title="/pmwiki/pmwiki.php/Main/AncientAstronauts"><span data-dcnode-id="3098" instrument_node="">the Old Ones</span></a><span data-dcnode-id="3096" instrument_node=""> (described as fairly reptilian themselves). Their armies also make liberal use of distinctly dinosaurian monsters. Unusually for this trope, they're on the side of good, being opposed to Chaos, the Skaven, and other evil races, and the last remnants of a once-proud civilization. However, they're generally hostile towards the other good races as well, though the fact that they keep trying to colonize their lands probably doesn't help.
</span></li><li data-dcnode-id="3090"><span data-dcnode-id="3094" instrument_node=""> In early editions of the game, the frog-like Slann are the Old Ones themselves, a degenerate remnant of the starfarers stranded after the fall of the polar gates to the Warp, while the Lizardmen were a separate, evil race found in caves deep underground and often at war with goblins and dwarves. Their own civilization was destroyed in a war against the Slann, and many of their remaining tribes are subjugated by the latter and used as soldiers for the Slann empire. There were also the Troglodytes, larger and stupid relatives of the Lizardmen reminiscent of the later Kroxigors, who likewise fought as vassal soldiers for the Slann. While this is no longer canon, references to similar creatures persist as far as the 6th edition's </span><em data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Beasts of Chaos</span></em><span data-dcnode-id="3091" instrument_node=""> armybook, which mentions a species of primitive, reptilian humanoids covered in rocky scales and native to the mountains of Naggaroth, where they live a primitive existence in caves, war amongst each other with clubs and stone axes and periodically join up with Chaos hosts when these war against the Dark Elves.
</span></li><li data-dcnode-id="3085"><span data-dcnode-id="3089" instrument_node=""> The Fimir are a reclusive race of evil, cyclopean lizard folk who dwell in isolated bogs and marshes and worship Chaos. Originally </span><a class="twikilink" data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Retconned" title="/pmwiki/pmwiki.php/Main/Retconned"><span data-dcnode-id="3088" instrument_node="">Retconned</span></a><span data-dcnode-id="3086" instrument_node=""> out of the game the Fimir were later reintroduced in the background material (with the whole "reproduce only through raping human women" thing scrupulously excised) and received models from Games Workshop's subsidiary Forge World.
</span></li></ul></li><li data-dcnode-id="3065"><span data-dcnode-id="3082" instrument_node=""> </span><em data-dcnode-id="3078"><a class="twikilink" data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/WarhammerAgeOfSigmar" title="/pmwiki/pmwiki.php/TabletopGame/WarhammerAgeOfSigmar"><span data-dcnode-id="3081" instrument_node="">Warhammer: Age of Sigmar</span></a><span data-dcnode-id="3079" instrument_node="">:</span></em><span data-dcnode-id="3077" instrument_node="">
</span><ul data-dcnode-id="3066"><li data-dcnode-id="3069"><span data-dcnode-id="3076" instrument_node=""> The Seraphon were once the Lizardmen of the </span><a class="twikilink" data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Warhammer" title="/pmwiki/pmwiki.php/TabletopGame/Warhammer"><span data-dcnode-id="3075" instrument_node="">world-that-was</span></a><span data-dcnode-id="3073" instrument_node=""> who have since become beings of celestial magic rather than flesh and blood creatures. Summoned into battle by the powerful Slann Starmasters, the Seraphon fulfil the role of </span><a class="twikilink" data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurAngelsAreDifferent"><span data-dcnode-id="3072" instrument_node="">Daemons of Order</span></a><span data-dcnode-id="3070" instrument_node="">.
</span></li><li data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node=""> The Fimir of the Mortal Realms are creatures of destruction that resemble bipedal, hunchbacked lizards with a single malevolent eye.
</span></li></ul></li><li data-dcnode-id="3056"><span data-dcnode-id="3064" instrument_node=""> </span><em data-dcnode-id="3061"><a class="twikilink" data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Warhammer40000" title="/pmwiki/pmwiki.php/TabletopGame/Warhammer40000"><span data-dcnode-id="3063" instrument_node="">Warhammer 40,000</span></a></em><span data-dcnode-id="3060" instrument_node="">: The Loxatl are a minor race of reptilian mercenaries, although quadrupedal and are more salamander than lizard. Early material also describes the Slann, based on their early </span><em data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">Warhammer</span></em><span data-dcnode-id="3057" instrument_node=""> characterization as decadent descendants of an ancient empire.
</span></li></ul></li><li data-dcnode-id="3043"><span data-dcnode-id="3053" instrument_node=""> </span><em data-dcnode-id="3050"><a class="twikilink" data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Rifts" title="/pmwiki/pmwiki.php/TabletopGame/Rifts"><span data-dcnode-id="3052" instrument_node="">Rifts</span></a></em><span data-dcnode-id="3049" instrument_node=""> has a number of lizard-like races, mainly the plain old Lizardmen, Tautons (crocodile-men with scorpion tails that worship Egyptian Gods), Blucies (giant, blue-skinned and crocodile-headed reptile people from the wildernesses of Canada), Bruutasaurs (eleven-foot, Stone Age giants with prehensile tails), Gromek, and others.
</span><ul data-dcnode-id="3044"><li data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node=""> In South America, a peaceful collection of Lizardman tribes was taken over by an organization of evil dragons who have set up their own religion with dragons as gods, and have built their own city for the various reptilian races. The Lizardmen, who would rather return to their simple lives along the (greatly-expanded) Amazon, are growing increasingly dissatisfied with this arrangement.
</span></li><li data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node=""> The Lyvorrk resemble loosely humanoid versions of outdated raptorial dinosaurs, being cold-blooded and having scaly skin, long serpentine tails and almost iguana-liked heads topped with spiny frills, in addition to an almost obsessive fondness for lizards and snakes. They don't make many concessions to anthropomorphism beyond a more upright stance and scaly and clawed but otherwise very humanoid arms and hands. Overall, they resemble sapient lizards far more than sapient theropods — ironically, they're more lizardlike than many of the actual lizard people.
</span></li></ul></li><li data-dcnode-id="3037"><span data-dcnode-id="3042" instrument_node=""> </span><em data-dcnode-id="3039"><a class="twikilink" data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Earthdawn" title="/pmwiki/pmwiki.php/TabletopGame/Earthdawn"><span data-dcnode-id="3041" instrument_node="">Earthdawn</span></a></em><span data-dcnode-id="3038" instrument_node=""> has the T'skrang, a river-dwelling race of flamboyant pirates and story-spinners.
</span></li><li data-dcnode-id="3023"><span data-dcnode-id="3036" instrument_node=""> </span><em data-dcnode-id="3033"><a class="twikilink" data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Exalted" title="/pmwiki/pmwiki.php/TabletopGame/Exalted"><span data-dcnode-id="3035" instrument_node="">Exalted</span></a></em><span data-dcnode-id="3032" instrument_node="">:
</span><ul data-dcnode-id="3024"><li data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node=""> The Dragon Kings are highly-advanced immortal, perfectly reincarnating humanoid reptiles who evolved from bestial savagery, make use of plant and mineral technology, use disciplined elemental powers, and ruled the world long ago. Who occasionally breath fire.
</span></li><li data-dcnode-id="3025"><span data-dcnode-id="3029" instrument_node=""> Wyld mutations and... </span><a class="twikilink" data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BestialityIsDepraved" title="/pmwiki/pmwiki.php/Main/BestialityIsDepraved"><span data-dcnode-id="3028" instrument_node="">inventive</span></a><span data-dcnode-id="3026" instrument_node=""> Lunars can produce lizard or dinosaur beastmen, who can sometimes pass for Dragon Kings in poor light.
</span></li></ul></li><li data-dcnode-id="3014"><span data-dcnode-id="3022" instrument_node=""> </span><em data-dcnode-id="3019"><a class="twikilink" data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/WerewolfTheApocalypse" title="/pmwiki/pmwiki.php/TabletopGame/WerewolfTheApocalypse"><span data-dcnode-id="3021" instrument_node="">Werewolf: The Apocalypse</span></a></em><span data-dcnode-id="3018" instrument_node="">, despite including the were-crocodile/were-monitor Mokolé </span><a class="twikilink" data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Splat" title="/pmwiki/pmwiki.php/Main/Splat"><span data-dcnode-id="3017" instrument_node="">Splat</span></a><span data-dcnode-id="3015" instrument_node="">, does not have their forms resembling Lizard Folk. Instead, they transform into a mishmash of dinosaur anatomy based on their race's shared memory/dream of the time of Dinosaurs. However, they believe that during the Paleozoic, their ancestors known as the Lizard Kings managed to produce a race of Lizard Folk called Drachids that they and other prehistoric Werebeasts of the time could transform into (as humans did not exist yet).
</span></li><li data-dcnode-id="3008"><span data-dcnode-id="3013" instrument_node=""> From fan-made </span><em data-dcnode-id="3010"><a class="twikilink" data-dcnode-id="3011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/GeniusTheTransgression" title="/pmwiki/pmwiki.php/TabletopGame/GeniusTheTransgression"><span data-dcnode-id="3012" instrument_node="">Genius: The Transgression</span></a></em><span data-dcnode-id="3009" instrument_node="">, the original Lemurians.
</span></li><li data-dcnode-id="3002"><span data-dcnode-id="3007" instrument_node=""> </span><em data-dcnode-id="3004"><a class="twikilink" data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Talislanta" title="/pmwiki/pmwiki.php/TabletopGame/Talislanta"><span data-dcnode-id="3006" instrument_node="">Talislanta</span></a></em><span data-dcnode-id="3003" instrument_node="">: Saurans and sauruds follow the trope right down to having a faster (saurans) and a heftier (sauruds) variety. They do live in volcanic hill country rather than swamps or deserts, though, and are skilled metalworkers.
</span></li><li data-dcnode-id="2981"><span data-dcnode-id="3001" instrument_node=""> </span><em data-dcnode-id="2998"><a class="twikilink" data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/GURPS" title="/pmwiki/pmwiki.php/TabletopGame/GURPS"><span data-dcnode-id="3000" instrument_node="">GURPS</span></a></em><span data-dcnode-id="2997" instrument_node="">:
</span><ul data-dcnode-id="2982"><li data-dcnode-id="2992"><span data-dcnode-id="2996" instrument_node=""> The fantasy setting of </span><em data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Banestorm</span></em><span data-dcnode-id="2993" instrument_node=""> includes the Reptile Men, a race of reptile people originally from the Desert World of Gabrook.
</span></li><li data-dcnode-id="2983"><span data-dcnode-id="2991" instrument_node=""> </span><em data-dcnode-id="2988"><a class="twikilink" data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/InfiniteWorlds" title="/pmwiki/pmwiki.php/TabletopGame/InfiniteWorlds"><span data-dcnode-id="2990" instrument_node="">Infinite Worlds</span></a></em><span data-dcnode-id="2987" instrument_node=""> includes Lizardia, a parallel universe in which humans don't exist and "neo-troodons" (the descendants of a small theropod dinosaur similar to a velociraptor) take their place. (Neo-troodons, by the way, avert the usual stereotype by being no more </span><a class="twikilink" data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="2986" instrument_node="">abhorrent</span></a><span data-dcnode-id="2984" instrument_node=""> than humans.)
</span></li></ul></li><li data-dcnode-id="2975"><span data-dcnode-id="2980" instrument_node=""> </span><em data-dcnode-id="2977"><a class="twikilink" data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/FadingSuns" title="/pmwiki/pmwiki.php/TabletopGame/FadingSuns"><span data-dcnode-id="2979" instrument_node="">Fading Suns</span></a></em><span data-dcnode-id="2976" instrument_node=""> has the Hironem, who are a race of reptilian humanoids. Unlike many examples of this trope, they have saurian internal features, but their body shape (save for a short tail) and stature are very human-like.
</span></li><li data-dcnode-id="2966"><span data-dcnode-id="2974" instrument_node=""> The German RPG </span><em data-dcnode-id="2971"><a class="twikilink" data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/TheDarkEye" title="/pmwiki/pmwiki.php/TabletopGame/TheDarkEye"><span data-dcnode-id="2973" instrument_node="">The Dark Eye</span></a></em><span data-dcnode-id="2970" instrument_node=""> has the Achaz as a playable race, as well as the more bestial Maru and Krakonians (who fit the </span><a class="twikilink" data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="2969" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="2967" instrument_node=""> bill). Apparently the Lizard Folk once ruled most of the known world, as servants to a great dragon.
</span></li><li data-dcnode-id="2960"><span data-dcnode-id="2965" instrument_node=""> In the Glorantha setting for </span><em data-dcnode-id="2962"><a class="twikilink" data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/RuneQuest" title="/pmwiki/pmwiki.php/TabletopGame/RuneQuest"><span data-dcnode-id="2964" instrument_node="">RuneQuest</span></a></em><span data-dcnode-id="2961" instrument_node="">, dragonewts. Not evil or excessively hostile, but very alien in mindset and unable to speak human languages without surgery.
</span></li><li data-dcnode-id="2933"><span data-dcnode-id="2959" instrument_node=""> </span><em data-dcnode-id="2956"><a class="twikilink" data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Rym" title="/pmwiki/pmwiki.php/TabletopGame/Rym"><span data-dcnode-id="2958" instrument_node="">Rym</span></a></em><span data-dcnode-id="2955" instrument_node=""> has two of them:
</span><ul data-dcnode-id="2934"><li data-dcnode-id="2943"><span data-dcnode-id="2954" instrument_node=""> The Koba, a race of humanoid Parasaurolophus' who actually deconstruct the </span><em data-dcnode-id="2951"><a class="twikilink" data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="2953" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="2950" instrument_node=""> tradition of portraying lizardfolk as dumb primitives by giving it a basis in </span><a class="twikilink" data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome" title="/pmwiki/pmwiki.php/Main/SurprisinglyRealisticOutcome"><span data-dcnode-id="2949" instrument_node="">Surprisingly Realistic Outcome</span></a><span data-dcnode-id="2947" instrument_node=""> — the Koba are </span><em data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">herbivores</span></em><span data-dcnode-id="2944" instrument_node=""> who already possess formidable natural defenses and armaments, meaning their brains never evolved as far as those of the other races of Rym and nor did they develop particularly advanced technology because they simply never needed to be smart to thrive and prosper.
</span></li><li data-dcnode-id="2935"><span data-dcnode-id="2942" instrument_node=""> The Czath, who have been brainwashed by the evil alien liches who have conquered the planet through a cocktail of potent drugs and religious indoctrination, leaving them suicidally zealous berserkers used as </span><a class="twikilink" data-dcnode-id="2940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CannonFodder" title="/pmwiki/pmwiki.php/Main/CannonFodder"><span data-dcnode-id="2941" instrument_node="">Cannon Fodder</span></a><span data-dcnode-id="2939" instrument_node=""> by an empire that already has plenty of </span><a class="twikilink" data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NightOfTheLivingMooks" title="/pmwiki/pmwiki.php/Main/NightOfTheLivingMooks"><span data-dcnode-id="2938" instrument_node="">undead thralls</span></a><span data-dcnode-id="2936" instrument_node=""> to fill that role.
</span></li></ul></li><li data-dcnode-id="2927"><span data-dcnode-id="2932" instrument_node=""> </span><em data-dcnode-id="2929"><a class="twikilink" data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Space1889" title="/pmwiki/pmwiki.php/TabletopGame/Space1889"><span data-dcnode-id="2931" instrument_node="">Space 1889</span></a></em><span data-dcnode-id="2928" instrument_node=""> has the lizard men of Mars. They are not evil or sadistic though.
</span></li><li data-dcnode-id="2915"><span data-dcnode-id="2926" instrument_node=""> The Ithklur in </span><em data-dcnode-id="2923"><a class="twikilink" data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/Traveller" title="/pmwiki/pmwiki.php/TabletopGame/Traveller"><span data-dcnode-id="2925" instrument_node="">Traveller</span></a></em><span data-dcnode-id="2922" instrument_node=""> are a </span><a class="twikilink" data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="2921" instrument_node="">Proud Warrior Race</span></a><span data-dcnode-id="2919" instrument_node=""> that serves as soldiers to the Hivers (who need them badly being rather courage-deprived as a rule). The Ithklur are not evil but are </span><a class="twikilink" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BoisterousBruiser" title="/pmwiki/pmwiki.php/Main/BoisterousBruiser"><span data-dcnode-id="2918" instrument_node="">hearty souls that love a good fight</span></a><span data-dcnode-id="2916" instrument_node="">.
</span></li><li data-dcnode-id="2900"><span data-dcnode-id="2914" instrument_node=""> </span><em data-dcnode-id="2911"><a class="twikilink" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/GeniusTheTransgression" title="/pmwiki/pmwiki.php/TabletopGame/GeniusTheTransgression"><span data-dcnode-id="2913" instrument_node="">Genius: The Transgression</span></a></em><span data-dcnode-id="2910" instrument_node="">, being based on mad science, has these in the Third Race. They are manes (creatures made when the idea behind them was disproven- these guys came to life when everyone realized that there </span><em data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">wasn't</span></em><span data-dcnode-id="2907" instrument_node=""> a hidden continent populated by lizard people) who formerly lived in the Bardo of Lemuria, before they </span><a class="twikilink" data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RetGone" title="/pmwiki/pmwiki.php/Main/RetGone"><span data-dcnode-id="2906" instrument_node="">ret-goned</span></a><span data-dcnode-id="2904" instrument_node=""> it by screwing with </span><a class="twikilink" data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeTravel" title="/pmwiki/pmwiki.php/Main/TimeTravel"><span data-dcnode-id="2903" instrument_node="">Time Travel</span></a><span data-dcnode-id="2901" instrument_node="">. They formed the Baramins of Lemuria to steer scientific development so their home could come about again, but they were overthrown by human Genii in a process beginning in the Renaissance. The race is now dying out, with the few remaining members in hiding.
</span></li><li data-dcnode-id="2891"><span data-dcnode-id="2899" instrument_node=""> One of the potential races that you can play as in the </span><em data-dcnode-id="2896"><a class="twikilink" data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/RedDwarf" title="/pmwiki/pmwiki.php/TabletopGame/RedDwarf"><span data-dcnode-id="2898" instrument_node="">Red Dwarf</span></a></em><span data-dcnode-id="2895" instrument_node=""> Role-Playing Game is a race of evolved Iguanas (or Iguana Sapiens). They are </span><a class="twikilink" data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WelcomeToTheCaribbeanMon" title="/pmwiki/pmwiki.php/Main/WelcomeToTheCaribbeanMon"><span data-dcnode-id="2894" instrument_node="">based on Jamacian Stereotypes</span></a><span data-dcnode-id="2892" instrument_node=""> and compared to humans, have inferior intelligence dexterity (but have superior willpower).
</span></li><li data-dcnode-id="2877"><span data-dcnode-id="2890" instrument_node=""> The Martians in the 1962 Topps trading card series </span><em data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Mars Attacks</span></em><span data-dcnode-id="2887" instrument_node=""> looked like </span><a class="twikilink" data-dcnode-id="2885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LittleGreenMen" title="/pmwiki/pmwiki.php/Main/LittleGreenMen"><span data-dcnode-id="2886" instrument_node="">Little Green Men</span></a><span data-dcnode-id="2884" instrument_node="">, only with skull-like faces and vaguely reptilian skin. When the cards were adapted for the </span><a class="twikilink" data-dcnode-id="2882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/MarsAttacks" title="/pmwiki/pmwiki.php/Film/MarsAttacks"><span data-dcnode-id="2883" instrument_node="">1996 Tim Burton movie</span></a><span data-dcnode-id="2881" instrument_node="">, the production designers tried to make the Martians (according to </span><a class="twikilink" data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WordOfGod" title="/pmwiki/pmwiki.php/Main/WordOfGod"><span data-dcnode-id="2880" instrument_node="">Word of God</span></a><span data-dcnode-id="2878" instrument_node="">) look like a cross between skeletons and snakes.
</span></li><li data-dcnode-id="2865"><span data-dcnode-id="2876" instrument_node=""> Green Ronin games </span><em data-dcnode-id="2873"><a class="twikilink" data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/MutantsAndMasterminds" title="/pmwiki/pmwiki.php/TabletopGame/MutantsAndMasterminds"><span data-dcnode-id="2875" instrument_node="">Mutants &amp; Masterminds</span></a></em><span data-dcnode-id="2872" instrument_node=""> and </span><em data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">Freeport: The City of Adventure</span></em><span data-dcnode-id="2869" instrument_node=""> have the Serpent Men, who worship </span><a class="twikilink" data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EldritchAbomination" title="/pmwiki/pmwiki.php/Main/EldritchAbomination"><span data-dcnode-id="2868" instrument_node="">Eldritch Abominations</span></a><span data-dcnode-id="2866" instrument_node=""> and used to rule the world in prehistory.
</span></li></ul></div><span data-dcnode-id="2862" instrument_node="">
