</span><ul data-dcnode-id="2091"><li data-dcnode-id="2103"><span data-dcnode-id="2126" instrument_node=""> The krogan and the drell; the former are from a hulking, dinosaur-style </span><a class="twikilink" data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="2125" instrument_node="">warrior-race</span></a><span data-dcnode-id="2123" instrument_node="">, while the latter are more humanoid (but still scaly) and specifically built to be </span><a class="twikilink" data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MrFanservice" title="/pmwiki/pmwiki.php/Main/MrFanservice"><span data-dcnode-id="2122" instrument_node="">Mr. Fanservice</span></a><span data-dcnode-id="2120" instrument_node="">. According to Javik in </span><em data-dcnode-id="2117"><a class="twikilink" data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MassEffect3" title="/pmwiki/pmwiki.php/VideoGame/MassEffect3"><span data-dcnode-id="2119" instrument_node="">Mass Effect 3</span></a></em><span data-dcnode-id="2116" instrument_node="">, the salarians were essentially frogs back in his time.
</span><div class="indent" data-dcnode-id="2104"><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Javik:</span></strong><span data-dcnode-id="2113" instrument_node=""> The lizard people evolved? </span><br data-dcnode-id="2112"><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Liara:</span></strong><span data-dcnode-id="2109" instrument_node=""> I believe they're amphibious.  </span><br data-dcnode-id="2108"><strong data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Javik:</span></strong><span data-dcnode-id="2105" instrument_node=""> They used to eat flies.
</span></div></li><li data-dcnode-id="2098"><span data-dcnode-id="2102" instrument_node=""> The turians (in this case, </span><a class="twikilink" data-dcnode-id="2100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpaceRomans" title="/pmwiki/pmwiki.php/Main/SpaceRomans"><span data-dcnode-id="2101" instrument_node="">Space Romans</span></a><span data-dcnode-id="2099" instrument_node="">) remind some humans of the link between dinosaurs and birds.
</span></li><li data-dcnode-id="2092"><span data-dcnode-id="2097" instrument_node=""> Unusually, none of the quasi-reptilian species from </span><em data-dcnode-id="2094"><a class="twikilink" data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/MassEffect" title="/pmwiki/pmwiki.php/Franchise/MassEffect"><span data-dcnode-id="2096" instrument_node="">Mass Effect</span></a></em><span data-dcnode-id="2093" instrument_node=""> are portrayed as evil. The krogan tend to be aggressive, warlike, and are frequently antagonists from shady mercenary gangs and the like, but two party members from the series are krogan and the species shows strong signs of moving beyond its violent past. The turians attacked the first humans they encountered, but this was because of a misunderstanding. The drell overindustrialized and destroyed the ecosystem of their planet, but they are now the devoted servants of the gentle, mystical hanar. The salarians have lots of....ethically questionable scientists, but overall they are portrayed positively.
</span></li></ul></li><li data-dcnode-id="2078"><span data-dcnode-id="2089" instrument_node=""> </span><em data-dcnode-id="2086"><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MercsOfBoom" title="/pmwiki/pmwiki.php/VideoGame/MercsOfBoom"><span data-dcnode-id="2088" instrument_node="">Mercs of Boom</span></a></em><span data-dcnode-id="2085" instrument_node="">: Reptoids are the second type of aliens you encounter and likely the aliens' front-line troops. They are much tougher than the </span><a class="twikilink" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGreys" title="/pmwiki/pmwiki.php/Main/TheGreys"><span data-dcnode-id="2084" instrument_node="">Grey</span></a><span data-dcnode-id="2082" instrument_node="">-like Imps and carry heavy </span><a class="twikilink" data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnergyWeapon" title="/pmwiki/pmwiki.php/Main/EnergyWeapon"><span data-dcnode-id="2081" instrument_node="">Energy Weapons</span></a><span data-dcnode-id="2079" instrument_node="">. Regular Reptoids wear blue armor, while Sergeants were red.
</span></li><li data-dcnode-id="2028"><span data-dcnode-id="2077" instrument_node=""> </span><em data-dcnode-id="2074"><a class="twikilink" data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Metroid" title="/pmwiki/pmwiki.php/Franchise/Metroid"><span data-dcnode-id="2076" instrument_node="">Metroid</span></a></em><span data-dcnode-id="2073" instrument_node="">:
</span><ul data-dcnode-id="2029"><li data-dcnode-id="2048"><span data-dcnode-id="2072" instrument_node=""> When they don't resemble </span><a class="twikilink" data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsectoidAliens" title="/pmwiki/pmwiki.php/Main/InsectoidAliens"><span data-dcnode-id="2071" instrument_node="">Insectoid Aliens</span></a><span data-dcnode-id="2069" instrument_node="">, the Space Pirates occasionally have elements of this, particularly in the first </span><em data-dcnode-id="2066"><a class="twikilink" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MetroidPrime" title="/pmwiki/pmwiki.php/VideoGame/MetroidPrime"><span data-dcnode-id="2068" instrument_node="">Metroid Prime</span></a></em><span data-dcnode-id="2065" instrument_node="">. This may be tied into the fact that two of their leaders, Ridley and Kraid, are both very reptilian, being a </span><a class="twikilink" data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent"><span data-dcnode-id="2064" instrument_node="">dragon</span></a><span data-dcnode-id="2062" instrument_node=""> and a </span><a class="twikilink" data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Godzilla" title="/pmwiki/pmwiki.php/Franchise/Godzilla"><span data-dcnode-id="2061" instrument_node="">Godzilla-like</span></a><span data-dcnode-id="2059" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Kaiju" title="/pmwiki/pmwiki.php/Main/Kaiju"><span data-dcnode-id="2058" instrument_node="">Kaiju</span></a><span data-dcnode-id="2056" instrument_node=""> respectively (at least since </span><em data-dcnode-id="2053"><a class="twikilink" data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SuperMetroid" title="/pmwiki/pmwiki.php/VideoGame/SuperMetroid"><span data-dcnode-id="2055" instrument_node="">Super Metroid</span></a></em><span data-dcnode-id="2052" instrument_node="">; the </span><a class="twikilink" data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Metroid1" title="/pmwiki/pmwiki.php/VideoGame/Metroid1"><span data-dcnode-id="2051" instrument_node="">very first game</span></a><span data-dcnode-id="2049" instrument_node=""> had concept art portraying Ridley as some weird multi-eyed bug creature and Kraid as having fur).
</span></li><li data-dcnode-id="2030"><span data-dcnode-id="2047" instrument_node=""> </span><em data-dcnode-id="2044"><a class="twikilink" data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/MetroidPrime3Corruption" title="/pmwiki/pmwiki.php/VideoGame/MetroidPrime3Corruption"><span data-dcnode-id="2046" instrument_node="">Metroid Prime 3: Corruption</span></a></em><span data-dcnode-id="2043" instrument_node=""> has the </span><a class="twikilink" data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultiArmedAndDangerous" title="/pmwiki/pmwiki.php/Main/MultiArmedAndDangerous"><span data-dcnode-id="2042" instrument_node="">Multi-Armed and Dangerous</span></a><span data-dcnode-id="2040" instrument_node=""> Reptilicus of Bryyo, one of the more atypical examples of this trope. Once known as the intelligent Bryyonians, with enough clout to have extensive contact with the </span><a class="twikilink" data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Precursors" title="/pmwiki/pmwiki.php/Main/Precursors"><span data-dcnode-id="2039" instrument_node="">Chozo</span></a><span data-dcnode-id="2037" instrument_node="">, a brutal conflict </span><a class="twikilink" data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicVersusScience" title="/pmwiki/pmwiki.php/Main/MagicVersusScience"><span data-dcnode-id="2036" instrument_node="">between the tech-using Lords of Science and the magic-using Primals</span></a><span data-dcnode-id="2034" instrument_node=""> devastated the planet. The point of no return came when the Leviathan Seed crashed into the planet and spread </span><a class="twikilink" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheCorruption" title="/pmwiki/pmwiki.php/Main/TheCorruption"><span data-dcnode-id="2033" instrument_node="">Phazon</span></a><span data-dcnode-id="2031" instrument_node=""> everywhere, after which the Bryyonians degenerated into savage beasts.

umanityIsSuperior"><span data-dcnode-id="1836" instrument_node="">Humanity Is Superior</span></a><span data-dcnode-id="1834" instrument_node="">, lizardfolk are restricted from command roles and are frequently subject to </span><a class="twikilink" data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="1833" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="1831" instrument_node="">, nor are they protected by the </span><a class="twikilink" data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThreeLawsOfRobotics" title="/pmwiki/pmwiki.php/Main/ThreeLawsOfRobotics"><span data-dcnode-id="1830" instrument_node="">Three Laws of Robotics</span></a><span data-dcnode-id="1828" instrument_node=""> of station </span><a class="twikilink" data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialIntelligence" title="/pmwiki/pmwiki.php/Main/ArtificialIntelligence"><span data-dcnode-id="1827" instrument_node="">A.I.s</span></a><span data-dcnode-id="1825" instrument_node="">. For a more stereotypical example, there are also the </span><a class="twikilink" data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="1824" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="1822" instrument_node=""> tribial lizardfolk referred to as Ashwalkers dwelling near the station's </span><a class="twikilink" data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AsteroidMining" title="/pmwiki/pmwiki.php/Main/AsteroidMining"><span data-dcnode-id="1821" instrument_node="">mining outpost</span></a><span data-dcnode-id="1819" instrument_node=""> on a </span><a class="twikilink" data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LethalLavaLand" title="/pmwiki/pmwiki.php/Main/LethalLavaLand"><span data-dcnode-id="1818" instrument_node="">volcanic planetoid</span></a><span data-dcnode-id="1816" instrument_node=""> and hunting the miners and native megafauna alike.

</span></li><li data-dcnode-id="1782"><span data-dcnode-id="1799" instrument_node=""> The Draske in </span><em data-dcnode-id="1796"><a class="twikilink" data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/StarbaseOrion" title="/pmwiki/pmwiki.php/VideoGame/StarbaseOrion"><span data-dcnode-id="1798" instrument_node="">Starbase Orion</span></a></em><span data-dcnode-id="1795" instrument_node=""> are small, winged reptiles whose natural flight ability makes them superior pilots and navigators. </span><a class="twikilink" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllThereInTheManual" title="/pmwiki/pmwiki.php/Main/AllThereInTheManual"><span data-dcnode-id="1794" instrument_node="">According to their backstory</span></a><span data-dcnode-id="1792" instrument_node="">, they are not warlike and haven't had to fight anyone in the thousands of years they have been exploring space (mostly using sublight ships). They are extremely long-lived (their lifespans are measured in thousands of years) and are ruled by </span><a class="twikilink" data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Matriarchy" title="/pmwiki/pmwiki.php/Main/Matriarchy"><span data-dcnode-id="1791" instrument_node="">Matriarchs</span></a><span data-dcnode-id="1789" instrument_node="">. Every year, many Draske participate in tournaments. The victors experience a great boost in their careers. Those who lose the tournaments three times typically commit suicide to spare their families the shame. The Draske Hegemony incorporates several other races as client members, including the </span><a class="twikilink" data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StarfishAliens" title="/pmwiki/pmwiki.php/Main/StarfishAliens"><span data-dcnode-id="1788" instrument_node="">Harge</span></a><span data-dcnode-id="1786" instrument_node=""> and the </span><a class="twikilink" data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CatFolk" title="/pmwiki/pmwiki.php/Main/CatFolk"><span data-dcnode-id="1785" instrument_node="">Felinoids</span></a><span data-dcnode-id="1783" instrument_node="">. The reason they're on part with the other races in the game is mostly due to them being unaccustomed to warfare.
</span></li><li data-dcnode-id="1767"><span data-dcnode-id="1781" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnakeTalk" title="/pmwiki/pmwiki.php/Main/SnakeTalk"><span data-dcnode-id="1780" instrument_node="">snake-talking</span></a><span data-dcnode-id="1778" instrument_node=""> Thrynn in </span><em data-dcnode-id="1775"><a class="twikilink" data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Starflight" title="/pmwiki/pmwiki.php/VideoGame/Starflight"><span data-dcnode-id="1777" instrument_node="">Starflight</span></a></em><span data-dcnode-id="1774" instrument_node="">. Interstellar merchants and con-artists who, despite their depiction as having purely carnivorous dental structure, find themselves in constant war with their </span><a class="twikilink" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlantAliens" title="/pmwiki/pmwiki.php/Main/PlantAliens"><span data-dcnode-id="1773" instrument_node="">neighbors, the Elowan</span></a><span data-dcnode-id="1771" instrument_node="">. The Thrynn have </span><a class="twikilink" data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EatsBabies" title="/pmwiki/pmwiki.php/Main/EatsBabies"><span data-dcnode-id="1770" instrument_node="">a taste for Elowan "headfruit"</span></a><span data-dcnode-id="1768" instrument_node=""> you see. Despite this habit, they are generally peaceful with other races, and selling plutonium to them can be highly profitable—unless you have an Elowan aboard, that is.
</span></li><li data-dcnode-id="1758"><span data-dcnode-id="1766" instrument_node=""> </span><em data-dcnode-id="1763"><a class="twikilink" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/StarFox" title="/pmwiki/pmwiki.php/VideoGame/StarFox"><span data-dcnode-id="1765" instrument_node="">Star Fox</span></a></em><span data-dcnode-id="1762" instrument_node="">: Being a series with a cast composed almost entirely of </span><a class="twikilink" data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeastMan" title="/pmwiki/pmwiki.php/Main/BeastMan"><span data-dcnode-id="1761" instrument_node="">Beast Men</span></a><span data-dcnode-id="1759" instrument_node=""> it naturally has some anthropomorphic reptiles, the most notable of them being Leon of team Star Wolf.
</span></li><li data-dcnode-id="1749"><span data-dcnode-id="1757" instrument_node=""> The Cardianon in </span><em data-dcnode-id="1754"><a class="twikilink" data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/StarOceanTheLastHope" title="/pmwiki/pmwiki.php/VideoGame/StarOceanTheLastHope"><span data-dcnode-id="1756" instrument_node="">Star Ocean: The Last Hope</span></a></em><span data-dcnode-id="1753" instrument_node="">. Originally a primitive race, the </span><a class="twikilink" data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1752" instrument_node="">Grigori</span></a><span data-dcnode-id="1750" instrument_node=""> accelerated their evolution, and provided them with knowledge that led to them becoming one of the most technologically advanced races in the universe in a very short span of time, but also turned them into a bunch of fanatical planet conquerors. They look like somewhat reptilian humanoids in the lowest stage of evolution they're seen in, but their more advanced forms are traditional lizardmen, then dragonmen, and lastly, full fledged dragons.
</span></li><li data-dcnode-id="1740"><span data-dcnode-id="1748" instrument_node=""> </span><em data-dcnode-id="1745"><a class="twikilink" data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Stellaris" title="/pmwiki/pmwiki.php/VideoGame/Stellaris"><span data-dcnode-id="1747" instrument_node="">Stellaris</span></a></em><span data-dcnode-id="1744" instrument_node=""> has "reptilian" as a category of species (along with stuff like "avian", "mammalian" or "fungoid"). There's an achievement for doing the "alien infiltration" ploy on a pre-FTL reptilian species with a human empire, and the achievement's symbol is </span><a class="twikilink" data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/V1983" title="/pmwiki/pmwiki.php/Series/V1983"><span data-dcnode-id="1743" instrument_node="">a reversed "V"</span></a><span data-dcnode-id="1741" instrument_node="">.
</span></li><li data-dcnode-id="1731"><span data-dcnode-id="1739" instrument_node=""> </span><em data-dcnode-id="1736"><a class="twikilink" data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SuikodenIII" title="/pmwiki/pmwiki.php/VideoGame/SuikodenIII"><span data-dcnode-id="1738" instrument_node="">Suikoden III</span></a></em><span data-dcnode-id="1735" instrument_node=""> had a race of lizard men. They weren't portrayed as evil or stupid but, more as a </span><a class="twikilink" data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="1734" instrument_node="">Proud Warrior Race</span></a><span data-dcnode-id="1732" instrument_node="">. They also lived giant underground halls and specialized in blacksmithing. So they basically served the traditional role of dwarves in the setting.
</span></li><li data-dcnode-id="1716"><span data-dcnode-id="1730" instrument_node=""> The Tarka from </span><em data-dcnode-id="1727"><a class="twikilink" data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/SwordOfTheStars" title="/pmwiki/pmwiki.php/VideoGame/SwordOfTheStars"><span data-dcnode-id="1729" instrument_node="">Sword of the Stars</span></a></em><span data-dcnode-id="1726" instrument_node=""> evolved from lizards but are very human-like, resembling </span><a class="urllink" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sots.rorschach.net/images/9/95/SotS_TarkaMale.jpg"><span data-dcnode-id="1725" instrument_node="">scaled apes</span><img data-dcnode-id="1724" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><small data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">◊</span></small><span data-dcnode-id="1720" instrument_node=""> more than actual lizards. They are a highly civilized and pragmatic </span><a class="twikilink" data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="1719" instrument_node="">warrior race</span></a><span data-dcnode-id="1717" instrument_node=""> whose empire is a few thousand years older than human civilization, and are presented as sympathetic if fairly machiavellian, warlike, and prone to picking on those weaker than themselves.
</span></li><li data-dcnode-id="1704"><span data-dcnode-id="1715" instrument_node=""> </span><em data-dcnode-id="1712"><a class="twikilink" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TalesOfLegendia" title="/pmwiki/pmwiki.php/VideoGame/TalesOfLegendia"><span data-dcnode-id="1714" instrument_node="">Tales of Legendia</span></a></em><span data-dcnode-id="1711" instrument_node="">: Lizardmen show up one of the enemy types. There are some rather silly variants, like one donning a baker costume that tries to give you a </span><a class="twikilink" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BaguetteBeatdown" title="/pmwiki/pmwiki.php/Main/BaguetteBeatdown"><span data-dcnode-id="1710" instrument_node="">Baguette Beatdown</span></a><span data-dcnode-id="1708" instrument_node="">, and </span><a class="twikilink" data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SmashingWatermelons" title="/pmwiki/pmwiki.php/Main/SmashingWatermelons"><span data-dcnode-id="1707" instrument_node="">a blindfolded, stick wielding one in a swimsuit who's accompanied by a killer watermelon</span></a><span data-dcnode-id="1705" instrument_node="">.
</span></li><li data-dcnode-id="1695"><span data-dcnode-id="1703" instrument_node=""> </span><em data-dcnode-id="1700"><a class="twikilink" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TecmoKnight" title="/pmwiki/pmwiki.php/VideoGame/TecmoKnight"><span data-dcnode-id="1702" instrument_node="">Tecmo Knight</span></a></em><span data-dcnode-id="1699" instrument_node=""> have you battling </span><a class="twikilink" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeastMen" title="/pmwiki/pmwiki.php/Main/BeastMen"><span data-dcnode-id="1698" instrument_node="">Beast Men</span></a><span data-dcnode-id="1696" instrument_node="">, a lot of them which are reptilian in origin. There's notably crocodile-men who breathes fire, tortoise-men who attempts to crush you with their shells, and bomb-throwing lizard men.
</span></li><li data-dcnode-id="1683"><span data-dcnode-id="1694" instrument_node=""> </span><em data-dcnode-id="1691"><a class="twikilink" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TelepathTactics" title="/pmwiki/pmwiki.php/VideoGame/TelepathTactics"><span data-dcnode-id="1693" instrument_node="">Telepath Tactics</span></a></em><span data-dcnode-id="1690" instrument_node=""> has the lissit, natives to the Dundar Archipelago who live apart from humans. </span><a class="twikilink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RaisedByNatives" title="/pmwiki/pmwiki.php/Main/RaisedByNatives"><span data-dcnode-id="1689" instrument_node="">They raise the protagonists in the campaign</span></a><span data-dcnode-id="1687" instrument_node="">, and the campaign features them pretty heavily as a result. </span><a class="twikilink" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonMammalMammaries" title="/pmwiki/pmwiki.php/Main/NonMammalMammaries"><span data-dcnode-id="1686" instrument_node="">Non-Mammal Mammaries</span></a><span data-dcnode-id="1684" instrument_node=""> is averted here; females have spines on their head and back instead.
</span></li><li data-dcnode-id="1677"><span data-dcnode-id="1682" instrument_node=""> </span><em data-dcnode-id="1679"><a class="twikilink" data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TerraBattle" title="/pmwiki/pmwiki.php/VideoGame/TerraBattle"><span data-dcnode-id="1681" instrument_node="">Terra Battle</span></a></em><span data-dcnode-id="1678" instrument_node=""> has the aptly named Lizard folk race. The narrations in early chapters describe them as savages who never smile. However, the actual Lizard folk characters who can join your team has just as much variety in personality and appearance as the other races. One particular trait is that their names always have an apostrophe in them (for example: A'misandra, Piz'fer, Ma'curi)
</span></li><li data-dcnode-id="1665"><span data-dcnode-id="1676" instrument_node=""> </span><em data-dcnode-id="1673"><a class="twikilink" data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Thunderscape" title="/pmwiki/pmwiki.php/Franchise/Thunderscape"><span data-dcnode-id="1675" instrument_node="">Thunderscape</span></a></em><span data-dcnode-id="1672" instrument_node="">: Rapacians are one of PC races (good guys, in other words). They are man-sized civilized bipedal lizards. Another PC race is ferrans — humanoids who were </span><a class="twikilink" data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LegoGenetics" title="/pmwiki/pmwiki.php/Main/LegoGenetics"><span data-dcnode-id="1671" instrument_node="">genetically engineered</span></a><span data-dcnode-id="1669" instrument_node=""> as slaves but gained freedom long since. Ferrans can be based on any mammal, bird or reptile, the only in-game difference is the portrait. In the novels there are also nagas (evil, but usually opposed to </span><a class="twikilink" data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1668" instrument_node="">Big Bad</span></a><span data-dcnode-id="1666" instrument_node="">).
</span></li><li data-dcnode-id="1656"><span data-dcnode-id="1664" instrument_node=""> </span><em data-dcnode-id="1661"><a class="twikilink" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TrafficDepartment2192" title="/pmwiki/pmwiki.php/VideoGame/TrafficDepartment2192"><span data-dcnode-id="1663" instrument_node="">Traffic Department 2192</span></a></em><span data-dcnode-id="1660" instrument_node=""> has the Selarian species, and their representative in Vulthaven's TD, Lieutenant Junior Grade Koth. If he's any indication, their species </span><a class="twikilink" data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnakeTalk" title="/pmwiki/pmwiki.php/Main/SnakeTalk"><span data-dcnode-id="1659" instrument_node="">hisses their S's</span></a><span data-dcnode-id="1657" instrument_node="">.
</span></li><li data-dcnode-id="1644"><span data-dcnode-id="1655" instrument_node=""> </span><em data-dcnode-id="1652"><a class="twikilink" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/TyTheTasmanianTiger" title="/pmwiki/pmwiki.php/VideoGame/TyTheTasmanianTiger"><span data-dcnode-id="1654" instrument_node="">Ty the Tasmanian Tiger</span></a></em><span data-dcnode-id="1651" instrument_node="">: </span><a class="twikilink" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="1650" instrument_node="">Frill Lizards</span></a><span data-dcnode-id="1648" instrument_node=""> along with their beefed-up counterparts, </span><a class="twikilink" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EliteMooks" title="/pmwiki/pmwiki.php/Main/EliteMooks"><span data-dcnode-id="1647" instrument_node="">Über Frills</span></a><span data-dcnode-id="1645" instrument_node="">.
</span></li><li data-dcnode-id="1625"><span data-dcnode-id="1643" instrument_node=""> Many </span><em data-dcnode-id="1640"><a class="twikilink" data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Ultima" title="/pmwiki/pmwiki.php/VideoGame/Ultima"><span data-dcnode-id="1642" instrument_node="">Ultima</span></a></em><span data-dcnode-id="1639" instrument_node=""> games feature Lizardmen as </span><a class="twikilink" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="1638" instrument_node="">mooks</span></a><span data-dcnode-id="1636" instrument_node="">. </span><em data-dcnode-id="1633"><a class="twikilink" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/UltimaUnderworld" title="/pmwiki/pmwiki.php/VideoGame/UltimaUnderworld"><span data-dcnode-id="1635" instrument_node="">Ultima Underworld</span></a></em><span data-dcnode-id="1632" instrument_node="">, however, </span><a class="twikilink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SubvertedTrope" title="/pmwiki/pmwiki.php/Main/SubvertedTrope"><span data-dcnode-id="1631" instrument_node="">subverted this</span></a><span data-dcnode-id="1629" instrument_node=""> — in the </span><a class="twikilink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Backstory" title="/pmwiki/pmwiki.php/Main/Backstory"><span data-dcnode-id="1628" instrument_node="">Backstory</span></a><span data-dcnode-id="1626" instrument_node="">, it turned out that the Lizardmen are actually quite intelligent, and were assumed to be mere monsters because they look fierce and are physically incapable of speaking the common tongue. When offered a peace deal and the opportunity to participate in a new, multi-cultural society, they eagerly accepted.
</span></li><li data-dcnode-id="1604"><span data-dcnode-id="1624" instrument_node=""> </span><em data-dcnode-id="1621"><a class="twikilink" data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Warcraft" title="/pmwiki/pmwiki.php/VideoGame/Warcraft"><span data-dcnode-id="1623" instrument_node="">Warcraft</span></a></em><span data-dcnode-id="1620" instrument_node="">:
</span><ul data-dcnode-id="1605"><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node=""> While there are no lizard men per se (a small wonder considering how many different humanoid animal races there are in the games), the serpentine Naga probably still fit under this trope, being humanoid reptilians. They're also technically an Elf subspecies, just to make it confusing.
</span></li><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node=""> There are also dragonspawn, which are dragon-like humanoids.
</span></li><li data-dcnode-id="1606"><span data-dcnode-id="1615" instrument_node=""> </span><em data-dcnode-id="1611"><a class="twikilink" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/WorldOfWarcraft" title="/pmwiki/pmwiki.php/VideoGame/WorldOfWarcraft"><span data-dcnode-id="1614" instrument_node="">World of Warcraft</span></a><span data-dcnode-id="1612" instrument_node="">: Mists of Pandaria</span></em><span data-dcnode-id="1610" instrument_node=""> introduces the saurok, a race of </span><a class="twikilink" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChaoticNeutral" title="/pmwiki/pmwiki.php/Main/ChaoticNeutral"><span data-dcnode-id="1609" instrument_node="">Chaotic Neutral</span></a><span data-dcnode-id="1607" instrument_node=""> reptilian beings created by the mogu who turned against their masters after the latter tried to commit genocide against them and are often grouped into tribes across Pandaria, pillaging at the expense of the pandaren.
</span></li></ul></li><li data-dcnode-id="1595"><span data-dcnode-id="1603" instrument_node=""> </span><em data-dcnode-id="1600"><a class="twikilink" data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/Wizardry" title="/pmwiki/pmwiki.php/VideoGame/Wizardry"><span data-dcnode-id="1602" instrument_node="">Wizardry</span></a></em><span data-dcnode-id="1599" instrument_node="">: Lizardmen are a playable race. They're strong, tough, fast, resistant to acid, resistant to psionics... and comparing their intelligence to a sack of potatoes would be a grave </span><a class="twikilink" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsultToRocks" title="/pmwiki/pmwiki.php/Main/InsultToRocks"><span data-dcnode-id="1598" instrument_node="">insult to the spuds</span></a><span data-dcnode-id="1596" instrument_node="">.
</span></li><li data-dcnode-id="1561"><span data-dcnode-id="1594" instrument_node=""> The Teladi from the </span><em data-dcnode-id="1591"><a class="twikilink" data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/X" title="/pmwiki/pmwiki.php/VideoGame/X"><span data-dcnode-id="1593" instrument_node="">X-Universe</span></a></em><span data-dcnode-id="1590" instrument_node=""> series are a </span><a class="twikilink" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanoidAliens" title="/pmwiki/pmwiki.php/Main/HumanoidAliens"><span data-dcnode-id="1589" instrument_node="">humanoid</span></a><span data-dcnode-id="1587" instrument_node=""> reptilian race whose aspect of life is entirely motivated by </span><a class="twikilink" data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudMerchantRace" title="/pmwiki/pmwiki.php/Main/ProudMerchantRace"><span data-dcnode-id="1586" instrument_node="">money</span></a><span data-dcnode-id="1584" instrument_node="">. Their society is comprised of a </span><a class="twikilink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MegaCorp" title="/pmwiki/pmwiki.php/Main/MegaCorp"><span data-dcnode-id="1583" instrument_node="">Mega-Corp</span></a><span data-dcnode-id="1581" instrument_node=""> which dominates their politics and businesses, and their government is essentially a corporate republic. Because of their reptilian nature, the Teladi have a... </span><a class="twikilink" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SnakeTalk" title="/pmwiki/pmwiki.php/Main/SnakeTalk"><span data-dcnode-id="1580" instrument_node="">tendency to speak with an accent that emphasizes the letter s</span></a><span data-dcnode-id="1578" instrument_node=""> in such a way that it becomes </span><a class="twikilink" data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MemeticMutation" title="/pmwiki/pmwiki.php/Main/MemeticMutation"><span data-dcnode-id="1577" instrument_node="">memetic</span></a><span data-dcnode-id="1575" instrument_node="">. </span><a class="twikilink" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueNeutral" title="/pmwiki/pmwiki.php/Main/TrueNeutral"><span data-dcnode-id="1574" instrument_node="">They tend to be neutral to all the other factions</span></a><span data-dcnode-id="1572" instrument_node="">, even the </span><a class="twikilink" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpacePirates" title="/pmwiki/pmwiki.php/Main/SpacePirates"><span data-dcnode-id="1571" instrument_node="">Space Pirates</span></a><span data-dcnode-id="1569" instrument_node="">. Because of this last note, it's not surprising to see some factories produce a fancy drug known as </span><a class="twikilink" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticDrug" title="/pmwiki/pmwiki.php/Main/FantasticDrug"><span data-dcnode-id="1568" instrument_node="">Space Weed</span></a><span data-dcnode-id="1566" instrument_node="">, which is basically the series' version of marijuana </span><span class="font-s" data-dcnode-id="1563"><a class="twikilink" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RecycledInSpace" title="/pmwiki/pmwiki.php/Main/RecycledInSpace"><span data-dcnode-id="1565" instrument_node="">IN SPACE!</span></a></span><span data-dcnode-id="1562" instrument_node=""> This drug is considered contraband in any sector that isn't Teladi or Pirate-owned, and often is a popular source of income to would-be smugglers.
</span></li><li data-dcnode-id="1555"><span data-dcnode-id="1560" instrument_node=""> </span><em data-dcnode-id="1557"><a class="twikilink" data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/XCOMTerrorFromTheDeep" title="/pmwiki/pmwiki.php/VideoGame/XCOMTerrorFromTheDeep"><span data-dcnode-id="1559" instrument_node="">XCOM Terror From The Deep</span></a></em><span data-dcnode-id="1556" instrument_node=""> has two examples: the Gillmen and the Tasoths. The Gillmen are an evolutionary offshoot of the human race that had, presumably, went extinct at the time mammals became dominant, but were somehow preserved and enslaved by the aliens. The Tasoths are creatures that look like lizardmen, but are in fact organic androids manufactured by the aliens.
</span></li><li data-dcnode-id="1537"><span data-dcnode-id="1554" instrument_node=""> The Snakemen in </span><em data-dcnode-id="1551"><a class="twikilink" data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/XCOMUFODefense" title="/pmwiki/pmwiki.php/Videogame/XCOMUFODefense"><span data-dcnode-id="1553" instrument_node="">X-COM: UFO Defense</span></a></em><span data-dcnode-id="1550" instrument_node=""> are human-sized snake-like aliens with rapid reproduction times and appear about midway through the game. In </span><em data-dcnode-id="1547"><a class="twikilink" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/XCOMEnemyUnknown" title="/pmwiki/pmwiki.php/Videogame/XCOMEnemyUnknown"><span data-dcnode-id="1549" instrument_node="">XCOM: Enemy Unknown</span></a></em><span data-dcnode-id="1546" instrument_node="">, the Thin Men are a reptilian species that have been genetically-modified to resemble humans in order to serve as infiltration units. </span><em data-dcnode-id="1543"><a class="twikilink" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/XCOM2" title="/pmwiki/pmwiki.php/VideoGame/XCOM2"><span data-dcnode-id="1545" instrument_node="">XCOM 2</span></a></em><span data-dcnode-id="1542" instrument_node=""> wheeled out the Vipers, a race of </span><a class="urllink" data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dmb0Fo6-_b3g"><span data-dcnode-id="1541" instrument_node="">sexy lady snakes</span><img data-dcnode-id="1540" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1538" instrument_node="">, the Thin Men's true form.
</span></li><li data-dcnode-id="1527"><span data-dcnode-id="1536" instrument_node=""> </span><em data-dcnode-id="1533"><a class="twikilink" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/XenobladeChronicles1" title="/pmwiki/pmwiki.php/VideoGame/XenobladeChronicles1"><span data-dcnode-id="1535" instrument_node="">Xenoblade Chronicles</span></a></em><span data-dcnode-id="1532" instrument_node=""> and </span><em data-dcnode-id="1529"><a class="twikilink" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/XenobladeChronicles2" title="/pmwiki/pmwiki.php/VideoGame/XenobladeChronicles2"><span data-dcnode-id="1531" instrument_node="">Xenoblade Chronicles 2</span></a></em><span data-dcnode-id="1528" instrument_node=""> have the Igna, a lizard-like race native to Satorl Marsh in the first game and Uraya in the second game. The latter game also sees them riding reptilian mounts.
</span></li><li data-dcnode-id="1509"><span data-dcnode-id="1526" instrument_node=""> The Ma-non of </span><em data-dcnode-id="1523"><a class="twikilink" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/VideoGame/XenobladeChroniclesX" title="/pmwiki/pmwiki.php/VideoGame/XenobladeChroniclesX"><span data-dcnode-id="1525" instrument_node="">Xenoblade Chronicles X</span></a></em><span data-dcnode-id="1522" instrument_node=""> are a highly nonstandard example. Essentially resembling short </span><a class="twikilink" data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarWars" title="/pmwiki/pmwiki.php/Franchise/StarWars"><span data-dcnode-id="1521" instrument_node="">Gungans</span></a><span data-dcnode-id="1519" instrument_node=""> with more reptile-like scutes and ridges, their highly technology-dependent culture means that nearly every single one is a </span><a class="twikilink" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrilliantButLazy" title="/pmwiki/pmwiki.php/Main/BrilliantButLazy"><span data-dcnode-id="1518" instrument_node="">Brilliant, but Lazy</span></a><span data-dcnode-id="1516" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManChild" title="/pmwiki/pmwiki.php/Main/ManChild"><span data-dcnode-id="1515" instrument_node="">Manchild</span></a><span data-dcnode-id="1513" instrument_node=""> who prefers to spend time eating </span><a class="twikilink" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrademarkFavoriteFood" title="/pmwiki/pmwiki.php/Main/TrademarkFavoriteFood"><span data-dcnode-id="1512" instrument_node="">pizza</span></a><span data-dcnode-id="1510" instrument_node=""> rather than putting effort into building and maintaining New LA. They're as chipper and trusting as can be, always excitedly asking questions about their new human and Nopon friends and never assuming maliciousness from anyone (Ackwar of the Mediators is an exception, as his familiarity with the cultures and mindsets of humans and other xenos makes him far less naive when it comes to his detective work). The "reptilian" part only ever explicitly comes up with a prejudiced shopkeeper who doesn't want to interact with the Ma-non due to her preexisting anxiety around reptiles from Earth; with some coaxing from the player, she can be convinced that they're nicer aliens than she is initially willing to give them credit for.
</span></li></ul></div><span data-dcnode-id="1506" instrument_node="">

</span></li><li data-dcnode-id="1472"><span data-dcnode-id="1486" instrument_node=""> </span><em data-dcnode-id="1483"><a class="twikilink" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/IrregularWebcomic" title="/pmwiki/pmwiki.php/Webcomic/IrregularWebcomic"><span data-dcnode-id="1485" instrument_node="">Irregular Webcomic!</span></a></em><span data-dcnode-id="1482" instrument_node="">: Being a </span><a class="twikilink" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StandardFantasySetting" title="/pmwiki/pmwiki.php/Main/StandardFantasySetting"><span data-dcnode-id="1481" instrument_node="">Standard Fantasy Setting</span></a><span data-dcnode-id="1479" instrument_node="">, there are Lizard folk in the Fantasy subset. We don't see much of the civilization though, the most we know is that Draak is serving as a mercenary to support his home. He's also </span><a class="twikilink" data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EloquentInMyNativeTongue" title="/pmwiki/pmwiki.php/Main/EloquentInMyNativeTongue"><span data-dcnode-id="1478" instrument_node="">pretty smart and articulate</span></a><span data-dcnode-id="1476" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HulkSpeak" title="/pmwiki/pmwiki.php/Main/HulkSpeak"><span data-dcnode-id="1475" instrument_node="">just not in common</span></a><span data-dcnode-id="1473" instrument_node="">.
</span></li><li data-dcnode-id="1463"><span data-dcnode-id="1471" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Harkovast" title="/pmwiki/pmwiki.php/Webcomic/Harkovast"><span data-dcnode-id="1470" instrument_node="">Harkovast</span></a><span data-dcnode-id="1468" instrument_node="">: The Tsung Dao are a peaceful race of lizard-folk, but there is one </span><a class="urllink" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.harkovast.com/post/159242436571"><span data-dcnode-id="1467" instrument_node="">exception...</span><img data-dcnode-id="1466" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1464" instrument_node="">
</span></li><li data-dcnode-id="1457"><span data-dcnode-id="1462" instrument_node=""> </span><em data-dcnode-id="1459"><a class="twikilink" data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheChallengesofZona" title="/pmwiki/pmwiki.php/Webcomic/TheChallengesofZona"><span data-dcnode-id="1461" instrument_node="">The Challengesof Zona</span></a></em><span data-dcnode-id="1458" instrument_node="">: The Urrt
</span></li><li data-dcnode-id="1448"><span data-dcnode-id="1456" instrument_node=""> </span><em data-dcnode-id="1453"><a class="twikilink" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Terinu" title="/pmwiki/pmwiki.php/Webcomic/Terinu"><span data-dcnode-id="1455" instrument_node="">Terinu</span></a></em><span data-dcnode-id="1452" instrument_node="">: The Galapados are justified in that they were genetically engineered from Galapagos Lava Lizards to serve as cannon fodder for the </span><a class="twikilink" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1451" instrument_node="">Big Bad</span></a><span data-dcnode-id="1449" instrument_node="">.
</span></li><li data-dcnode-id="1431"><span data-dcnode-id="1447" instrument_node=""> </span><em data-dcnode-id="1444"><a class="twikilink" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick" title="/pmwiki/pmwiki.php/Webcomic/TheOrderOfTheStick"><span data-dcnode-id="1446" instrument_node="">The Order of the Stick</span></a></em><span data-dcnode-id="1443" instrument_node=""> is a </span><em data-dcnode-id="1440"><a class="twikilink" data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons" title="/pmwiki/pmwiki.php/TabletopGame/DungeonsAndDragons"><span data-dcnode-id="1442" instrument_node="">Dungeons &amp; Dragons</span></a></em><span data-dcnode-id="1439" instrument_node=""> parody, so no surprise that this race eventually shows up. They seem to be common minions in the </span><a class="twikilink" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEmpire" title="/pmwiki/pmwiki.php/Main/TheEmpire"><span data-dcnode-id="1438" instrument_node="">Empire of Blood</span></a><span data-dcnode-id="1436" instrument_node="">. The prequel book </span><em data-dcnode-id="1433"><a class="twikilink" data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/StartOfDarkness" title="/pmwiki/pmwiki.php/Recap/StartOfDarkness"><span data-dcnode-id="1435" instrument_node="">Start of Darkness</span></a></em><span data-dcnode-id="1432" instrument_node=""> also features a tribe of swamp-dwelling lizard folk. Roy also brings up the "lizardmen — lizard folk" changeover, with Belkar quipping that "the lizard-feminists must be so proud of you."
</span></li><li data-dcnode-id="1425"><span data-dcnode-id="1430" instrument_node=""> </span><em data-dcnode-id="1427"><a class="twikilink" data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TheMansionOfE" title="/pmwiki/pmwiki.php/Webcomic/TheMansionOfE"><span data-dcnode-id="1429" instrument_node="">The Mansion of E</span></a></em><span data-dcnode-id="1426" instrument_node=""> has (cave-dwelling) Troglodytes and (forest-dwelling) Saurs.
</span></li><li data-dcnode-id="1419"><span data-dcnode-id="1424" instrument_node=""> </span><em data-dcnode-id="1421"><a class="twikilink" data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Holystone" title="/pmwiki/pmwiki.php/Webcomic/Holystone"><span data-dcnode-id="1423" instrument_node="">Holystone</span></a></em><span data-dcnode-id="1420" instrument_node="">: Agamidians are one of the three races. The villainous implications are averted, as they're largely treated like normal people who happen to be more cold-blooded and prickly than others.
</span></li><li data-dcnode-id="1413"><span data-dcnode-id="1418" instrument_node=""> Issue 7 of </span><em data-dcnode-id="1415"><a class="twikilink" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/LaMouetteNoire" title="/pmwiki/pmwiki.php/Webcomic/LaMouetteNoire"><span data-dcnode-id="1417" instrument_node="">La Mouette Noire</span></a></em><span data-dcnode-id="1414" instrument_node=""> has the Space Lizards. While the mooks are not very intelligent, their leader is.
</span></li><li data-dcnode-id="1404"><span data-dcnode-id="1412" instrument_node=""> </span><em data-dcnode-id="1409"><a class="twikilink" data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TowerOfGod" title="/pmwiki/pmwiki.php/Webcomic/TowerOfGod"><span data-dcnode-id="1411" instrument_node="">Tower of God</span></a></em><span data-dcnode-id="1408" instrument_node="">: There are three kinds of Lizard Folk in the Tower so far: Anaak's species, green humans with stout tails as long as their legs; Rak's species, giant, bipedal alligators with clawed hands, scales and a humanoid torso so that they look similar to </span><a class="twikilink" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Godzilla" title="/pmwiki/pmwiki.php/Franchise/Godzilla"><span data-dcnode-id="1407" instrument_node="">Godzilla</span></a><span data-dcnode-id="1405" instrument_node="">; and Levin's kind, basically humans with deep-slitted cheeks and reptilian fangs.
</span></li><li data-dcnode-id="1395"><span data-dcnode-id="1403" instrument_node=""> </span><em data-dcnode-id="1400"><a class="twikilink" data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Unsounded" title="/pmwiki/pmwiki.php/Webcomic/Unsounded"><span data-dcnode-id="1402" instrument_node="">Unsounded</span></a></em><span data-dcnode-id="1399" instrument_node="">: Called "two-toes" here, named after the fact that they have, well, two toes per foot. They're pretty small compared to humans though. They used to be subterranean, so they have poor sight and hearing but excellent senses of smell, making them useful as trackers. They're also almost universally treated as a shunned, ignored, and despised servant caste by the human majority. Stockyard takes advantage of their status by </span><span class="spoiler" data-dcnode-id="1397" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1398" instrument_node="">using the cleaning lizards as spies</span></span><span data-dcnode-id="1396" instrument_node="">.
</span></li><li data-dcnode-id="1374"><span data-dcnode-id="1394" instrument_node=""> </span><em data-dcnode-id="1391"><a class="twikilink" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/SlightlyDamned" title="/pmwiki/pmwiki.php/Webcomic/SlightlyDamned"><span data-dcnode-id="1393" instrument_node="">Slightly Damned</span></a></em><span data-dcnode-id="1390" instrument_node="">: No two </span><a class="twikilink" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurDemonsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurDemonsAreDifferent"><span data-dcnode-id="1389" instrument_node="">demons</span></a><span data-dcnode-id="1387" instrument_node=""> look alike and some have this kind of appearance, (it is most common with </span><a class="twikilink" data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlayingWithFire" title="/pmwiki/pmwiki.php/Main/PlayingWithFire"><span data-dcnode-id="1386" instrument_node="">fire</span></a><span data-dcnode-id="1384" instrument_node=""> and especially </span><a class="twikilink" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MakingASplash" title="/pmwiki/pmwiki.php/Main/MakingASplash"><span data-dcnode-id="1383" instrument_node="">water</span></a><span data-dcnode-id="1381" instrument_node=""> demons) the two most prominent of these reptilian demons is the water demon </span><a class="twikilink" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DefectingForLove" title="/pmwiki/pmwiki.php/Main/DefectingForLove"><span data-dcnode-id="1380" instrument_node="">Lakritz</span></a><span data-dcnode-id="1378" instrument_node=""> and the fire demon </span><a class="twikilink" data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvilOldFolks" title="/pmwiki/pmwiki.php/Main/EvilOldFolks"><span data-dcnode-id="1377" instrument_node="">Dakos</span></a><span data-dcnode-id="1375" instrument_node="">.
</span></li><li data-dcnode-id="1368"><span data-dcnode-id="1373" instrument_node=""> </span><em data-dcnode-id="1370"><a class="twikilink" data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/ChampionsOfFaraus" title="/pmwiki/pmwiki.php/Webcomic/ChampionsOfFaraus"><span data-dcnode-id="1372" instrument_node="">Champions of Far'aus</span></a></em><span data-dcnode-id="1369" instrument_node=""> has Lizardos, which are more lizard-like in body shape. One coffee shop has a sign that specifically advertises that they have lizardo-friendly seating available.
</span></li><li data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node=""> Legrakix is a morbidly obese version of this trope, though he isn't evil. Unless eating everybody's lunch at work is evil.
</span></li><li data-dcnode-id="1360"><span data-dcnode-id="1365" instrument_node=""> The Reptoids in </span><em data-dcnode-id="1362"><a class="twikilink" data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/TryingHuman" title="/pmwiki/pmwiki.php/Webcomic/TryingHuman"><span data-dcnode-id="1364" instrument_node="">Trying Human</span></a></em><span data-dcnode-id="1361" instrument_node=""> can be divided into two main subspecies: Draconian and Terran Reptoids. The long-tailed Terran Reptoids evolved from Troodon dinosaurs and were uplifted by the winged Draconian Reptoids, making them forever indebted to their benefactors. Both sub-races are capable of shape-shifting and enjoy eating meat, including human.
</span></li><li data-dcnode-id="1354"><span data-dcnode-id="1359" instrument_node=""> In </span><em data-dcnode-id="1356"><a class="twikilink" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/Earthsong" title="/pmwiki/pmwiki.php/Webcomic/Earthsong"><span data-dcnode-id="1358" instrument_node="">Earthsong</span></a></em><span data-dcnode-id="1355" instrument_node="">, one of the ill-fated Guards in Earthsong's welcoming party for Beluosus is a Reptilian.
</span></li><li data-dcnode-id="1338"><span data-dcnode-id="1353" instrument_node=""> </span><em data-dcnode-id="1350"><a class="twikilink" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/ReptilisRex" title="/pmwiki/pmwiki.php/Webcomic/ReptilisRex"><span data-dcnode-id="1352" instrument_node="">Reptilis Rex</span></a></em><span data-dcnode-id="1349" instrument_node=""> is centered around the "Reptoids" being forced to move to the surface and reveal themselves to mankind, which </span><a class="twikilink" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="1348" instrument_node="">treats them like second class citizens</span></a><span data-dcnode-id="1346" instrument_node="">. They can't shapeshift per se but own shapeshifting pets which they can wear as masks, hence there have been an unknown number of Reptoid infiltrators throughout history including </span><span class="spoiler" data-dcnode-id="1340" title="you can set spoilers visible by default on your profile"><a class="twikilink" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/BarackObama" title="/pmwiki/pmwiki.php/UsefulNotes/BarackObama"><span data-dcnode-id="1345" instrument_node="">Barack Obama</span></a><span data-dcnode-id="1343" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/MittRomney" title="/pmwiki/pmwiki.php/UsefulNotes/MittRomney"><span data-dcnode-id="1342" instrument_node="">Mitt Romney</span></a></span><span data-dcnode-id="1339" instrument_node="">.
</span></li><li data-dcnode-id="1329"><span data-dcnode-id="1337" instrument_node=""> They make a brief appearance in </span><em data-dcnode-id="1334"><a class="twikilink" data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/RasputinBarxotka" title="/pmwiki/pmwiki.php/Webcomic/RasputinBarxotka"><span data-dcnode-id="1336" instrument_node="">Rasputin Barxotka</span></a></em><span data-dcnode-id="1333" instrument_node="">, with their planned invasion of Earth thwarted by the strip's version of </span><a class="twikilink" data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGreys" title="/pmwiki/pmwiki.php/Main/TheGreys"><span data-dcnode-id="1332" instrument_node="">The Greys</span></a><span data-dcnode-id="1330" instrument_node="">.
</span></li><li data-dcnode-id="1323"><span data-dcnode-id="1328" instrument_node=""> </span><em data-dcnode-id="1325"><a class="twikilink" data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/NeoKosmos" title="/pmwiki/pmwiki.php/Webcomic/NeoKosmos"><span data-dcnode-id="1327" instrument_node="">Neo Kosmos</span></a></em><span data-dcnode-id="1324" instrument_node="">: Compies are very lizard-like humanoid aliens, with gray-blue skin, long tails, and sharp teeth.
</span></li><li data-dcnode-id="1309"><span data-dcnode-id="1322" instrument_node=""> In </span><em data-dcnode-id="1319"><a class="twikilink" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Webcomic/ElGoonishShive" title="/pmwiki/pmwiki.php/Webcomic/ElGoonishShive"><span data-dcnode-id="1321" instrument_node="">El Goonish Shive</span></a></em><span data-dcnode-id="1318" instrument_node="">, Nanase and Sarah get </span><a class="urllink" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.egscomics.com/egsnp/nanasecraft-14"><span data-dcnode-id="1317" instrument_node="">turned</span><img data-dcnode-id="1316" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1314" instrument_node=""> </span><a class="urllink" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.egscomics.com/egsnp/nanasecraft-17"><span data-dcnode-id="1313" instrument_node="">into</span><img data-dcnode-id="1312" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1310" instrument_node=""> humanoid geckos during the "Nanase Craft And The Crypt of Zappiness" storyline.
</span></li></ul></div><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1305"></p><div class="folderlabel" data-dcnode-id="1303" onclick="togglefolder('folder16');"><span data-dcnode-id="1304" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Web Original&nbsp;</span></div><div class="folder" data-dcnode-id="1270" id="folder16" isfolder="true" style="display:block;"><span data-dcnode-id="1302" instrument_node="">
</span><ul data-dcnode-id="1271"><li data-dcnode-id="1296"><span data-dcnode-id="1301" instrument_node=""> In </span><em data-dcnode-id="1298"><a class="twikilink" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Roleplay/TheGamersAlliance" title="/pmwiki/pmwiki.php/Roleplay/TheGamersAlliance"><span data-dcnode-id="1300" instrument_node="">The Gamer's Alliance</span></a></em><span data-dcnode-id="1297" instrument_node="">, the Sirithai are lizard folk who live in the desert. They initially appear to be antagonistic but the Alliance eventually convinces them to join their cause...although later a renegade faction of the Sirithai end up working behind the Alliance's back for their own goals.
</span></li><li data-dcnode-id="1290"><span data-dcnode-id="1295" instrument_node=""> </span><em data-dcnode-id="1292"><a class="twikilink" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Legatum" title="/pmwiki/pmwiki.php/Literature/Legatum"><span data-dcnode-id="1294" instrument_node="">Legatum</span></a></em><span data-dcnode-id="1291" instrument_node=""> has the stilios, which are anthropomorphic lizard and salamander creatures.
