</span></li><li data-dcnode-id="1272"><span data-dcnode-id="1283" instrument_node=""> </span><em data-dcnode-id="1280"><a class="twikilink" data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TalesOfMU" title="/pmwiki/pmwiki.php/Literature/TalesOfMU"><span data-dcnode-id="1282" instrument_node="">Tales of MU</span></a></em><span data-dcnode-id="1279" instrument_node=""> has a few Lizard folk students, most prominently "</span><a class="twikilink" data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUnpronounceable" title="/pmwiki/pmwiki.php/Main/TheUnpronounceable"><span data-dcnode-id="1278" instrument_node="">Hissy</span></a><span data-dcnode-id="1276" instrument_node="">". They aren't evil, though they are in the wrong clique for the </span><a class="twikilink" data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/UnreliableNarrator" title="/pmwiki/pmwiki.php/Main/UnreliableNarrator"><span data-dcnode-id="1275" instrument_node="">Unreliable Narrator</span></a><span data-dcnode-id="1273" instrument_node=""> to think much of them.
</span></li></ul></div><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1268"></p><div class="folderlabel" data-dcnode-id="1266" onclick="togglefolder('folder17');"><span data-dcnode-id="1267" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Western Animation&nbsp;</span></div><div class="folder" data-dcnode-id="1096" id="folder17" isfolder="true" style="display:block;"><span data-dcnode-id="1265" instrument_node="">
</span><ul data-dcnode-id="1255"><li data-dcnode-id="1256"><span data-dcnode-id="1264" instrument_node=""> </span><em data-dcnode-id="1261"><a class="twikilink" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Ben10AlienForce" title="/pmwiki/pmwiki.php/WesternAnimation/Ben10AlienForce"><span data-dcnode-id="1263" instrument_node="">Ben 10: Alien Force</span></a></em><span data-dcnode-id="1260" instrument_node=""> introduces Humungousaur, a huge humanoid dinosaur-like alien. He seems to be based on multiple herbivorous dinosaur species, having a sauropod-like face with flat teeth and developing stegosaurus-like spinal plates in his </span><a class="twikilink" data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Sizeshifter" title="/pmwiki/pmwiki.php/Main/Sizeshifter"><span data-dcnode-id="1259" instrument_node="">larger form</span></a><span data-dcnode-id="1257" instrument_node="">.
</span></li></ul><ul data-dcnode-id="1163"><li data-dcnode-id="1248"><span data-dcnode-id="1253" instrument_node=""> </span><em data-dcnode-id="1250"><a class="twikilink" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Centaurworld" title="/pmwiki/pmwiki.php/WesternAnimation/Centaurworld"><span data-dcnode-id="1252" instrument_node="">Centaurworld</span></a></em><span data-dcnode-id="1249" instrument_node="">: The only minotaur seen without a helmet is a lanky, humanoid and hornless lizard with a forked tongue. Notably, the characters still refer to it as a minotaur.
</span></li><li data-dcnode-id="1236"><span data-dcnode-id="1247" instrument_node=""> </span><em data-dcnode-id="1244"><a class="twikilink" data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Chaotic" title="/pmwiki/pmwiki.php/WesternAnimation/Chaotic"><span data-dcnode-id="1246" instrument_node="">Chaotic</span></a></em><span data-dcnode-id="1243" instrument_node="">: The Mipedians are fairly decent and honorable Lizard Folk, compared to the other tribes in the setting. They're desert dwelling, have wise members, and generally aren't a given episode's aggressor's, having even been the subject of at least one episode proving false </span><a class="twikilink" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeautyEqualsGoodness" title="/pmwiki/pmwiki.php/Main/BeautyEqualsGoodness"><span data-dcnode-id="1242" instrument_node="">Beauty Equals Goodness</span></a><span data-dcnode-id="1240" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="1239" instrument_node="">Reptiles Are Abhorrent</span></a><span data-dcnode-id="1237" instrument_node="">. Peyton is on very good terms with the entire tribe (and possibly some of the insectoid Danian's as well), more so than Tom, Kaz, and Sara with the Overworlders, Underworlders, and Danians respectively.
</span></li><li data-dcnode-id="1230"><span data-dcnode-id="1235" instrument_node=""> </span><em data-dcnode-id="1232"><a class="twikilink" data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Dogstar" title="/pmwiki/pmwiki.php/WesternAnimation/Dogstar"><span data-dcnode-id="1234" instrument_node="">Dogstar</span></a></em><span data-dcnode-id="1231" instrument_node="">: The Gavinians. Gemma ends up joining the crew of the Valiant.
</span></li><li data-dcnode-id="1221"><span data-dcnode-id="1229" instrument_node=""> </span><em data-dcnode-id="1226"><a class="twikilink" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/FlashGordon1979" title="/pmwiki/pmwiki.php/WesternAnimation/FlashGordon1979"><span data-dcnode-id="1228" instrument_node="">Flash Gordon (1979)</span></a></em><span data-dcnode-id="1225" instrument_node="">: There is a race of sexily dressed Lizard Women who all serve Ming the Merciless — he even has a few in his harem. In a later episode, we meet a Lizard Man </span><a class="twikilink" data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BountyHunter" title="/pmwiki/pmwiki.php/Main/BountyHunter"><span data-dcnode-id="1224" instrument_node="">Bounty Hunter</span></a><span data-dcnode-id="1222" instrument_node=""> whom Ming hires to capture Flash. But when they crashland on a planet and Flash saves his life, he decides to aid him instead.
</span></li><li data-dcnode-id="1215"><span data-dcnode-id="1220" instrument_node=""> </span><em data-dcnode-id="1217"><a class="twikilink" data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/HeManAndTheMastersOfTheUniverse1983" title="/pmwiki/pmwiki.php/WesternAnimation/HeManAndTheMastersOfTheUniverse1983"><span data-dcnode-id="1219" instrument_node="">He-Man and the Masters of the Universe (1983)</span></a></em><span data-dcnode-id="1216" instrument_node=""> occasionally featured Lizard Man, a friendly and helpful character, though not much of a fighter. Good for getting into a second-story window, though.
</span></li><li data-dcnode-id="1206"><span data-dcnode-id="1214" instrument_node=""> </span><em data-dcnode-id="1211"><a class="twikilink" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/InsideJob2021" title="/pmwiki/pmwiki.php/WesternAnimation/InsideJob2021"><span data-dcnode-id="1213" instrument_node="">Inside Job (2021)</span></a></em><span data-dcnode-id="1210" instrument_node=""> has the Reptoids, the race of shape-shifting lizard-like beings who live in secret amongst humanity </span><a class="twikilink" data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilianConspiracy" title="/pmwiki/pmwiki.php/Main/ReptilianConspiracy"><span data-dcnode-id="1209" instrument_node="">with the goal of world domination</span></a><span data-dcnode-id="1207" instrument_node="">.
</span></li><li data-dcnode-id="1191"><span data-dcnode-id="1205" instrument_node=""> </span><em data-dcnode-id="1202"><a class="twikilink" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/JusticeLeague" title="/pmwiki/pmwiki.php/WesternAnimation/JusticeLeague"><span data-dcnode-id="1204" instrument_node="">Justice League</span></a></em><span data-dcnode-id="1201" instrument_node="">: "Eclipsed" has the Ophidians, who fought humanity "before cities, before writing", and whose spirits now form </span><a class="twikilink" data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SealedEvilInACan" title="/pmwiki/pmwiki.php/Main/SealedEvilInACan"><span data-dcnode-id="1200" instrument_node="">Sealed Evil in a Can</span></a><span data-dcnode-id="1198" instrument_node="">. They're clearly meant as an </span><a class="twikilink" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlternateCompanyEquivalent" title="/pmwiki/pmwiki.php/Main/AlternateCompanyEquivalent"><span data-dcnode-id="1197" instrument_node="">Alternate Company Equivalent</span></a><span data-dcnode-id="1195" instrument_node=""> of </span><a class="twikilink" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/ConanTheBarbarian" title="/pmwiki/pmwiki.php/Franchise/ConanTheBarbarian"><span data-dcnode-id="1194" instrument_node="">Conan's</span></a><span data-dcnode-id="1192" instrument_node=""> Serpent Men.
</span></li><li data-dcnode-id="1185"><span data-dcnode-id="1190" instrument_node=""> </span><em data-dcnode-id="1187"><a class="twikilink" data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MenInBlackTheSeries" title="/pmwiki/pmwiki.php/WesternAnimation/MenInBlackTheSeries"><span data-dcnode-id="1189" instrument_node="">Men in Black: The Series</span></a></em><span data-dcnode-id="1186" instrument_node="">: A race of iguana-like alien gangsters appear as antagonists in one episode.
</span></li><li data-dcnode-id="1179"><span data-dcnode-id="1184" instrument_node=""> </span><em data-dcnode-id="1181"><a class="twikilink" data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/MightyDucksTheAnimatedSeries" title="/pmwiki/pmwiki.php/WesternAnimation/MightyDucksTheAnimatedSeries"><span data-dcnode-id="1183" instrument_node="">Mighty Ducks: The Animated Series</span></a></em><span data-dcnode-id="1180" instrument_node=""> has a straight-up evil race made up of anthropomorphic ceratopsians, along with more conventional lizard-people types.
</span></li><li data-dcnode-id="1164"><span data-dcnode-id="1178" instrument_node=""> </span><em data-dcnode-id="1175"><a class="twikilink" data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/RockosModernLife" title="/pmwiki/pmwiki.php/WesternAnimation/RockosModernLife"><span data-dcnode-id="1177" instrument_node="">Rocko's Modern Life</span></a></em><span data-dcnode-id="1174" instrument_node="">: All the high-level executives at the </span><a class="twikilink" data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeOverTheWorld" title="/pmwiki/pmwiki.php/Main/TakeOverTheWorld"><span data-dcnode-id="1173" instrument_node="">world domination</span></a><span data-dcnode-id="1171" instrument_node=""> bent </span><a class="twikilink" data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MegaCorp" title="/pmwiki/pmwiki.php/Main/MegaCorp"><span data-dcnode-id="1170" instrument_node="">Mega-Corp</span></a><span data-dcnode-id="1168" instrument_node=""> Conglom-O (including the CEO, Mr. Dupette) are </span><a class="twikilink" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunnyAnimal" title="/pmwiki/pmwiki.php/Main/FunnyAnimal"><span data-dcnode-id="1167" instrument_node="">lizards</span></a><span data-dcnode-id="1165" instrument_node=""> with a habit of picking their noses.
</span></li></ul><ul data-dcnode-id="1117"><li data-dcnode-id="1156"><span data-dcnode-id="1161" instrument_node=""> </span><em data-dcnode-id="1158"><a class="twikilink" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/StarTrekLowerDecks" title="/pmwiki/pmwiki.php/WesternAnimation/StarTrekLowerDecks"><span data-dcnode-id="1160" instrument_node="">Star Trek: Lower Decks</span></a></em><span data-dcnode-id="1157" instrument_node="">: The Anabaj are humanoid aliens with a long forked tongue, a frilled-neck like a chlamydosaurus, and their ability to climb up vertical surfaces is lizard-like.
</span></li><li data-dcnode-id="1145"><span data-dcnode-id="1155" instrument_node=""> </span><em data-dcnode-id="1152"><a class="twikilink" data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/StarVsTheForcesOfEvil" title="/pmwiki/pmwiki.php/WesternAnimation/StarVsTheForcesOfEvil"><span data-dcnode-id="1154" instrument_node="">Star vs. the Forces of Evil</span></a></em><span data-dcnode-id="1151" instrument_node=""> gives us Toffee. Despite his rather silly name, he's actually the show's most competent villain. For starters, not only has he been awfully close to take Star's wand in a couple occasions, but he's also </span><span class="spoiler" data-dcnode-id="1147" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1150" instrument_node=""> upstaged Ludo and taken his role of </span><a class="twikilink" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigBad" title="/pmwiki/pmwiki.php/Main/BigBad"><span data-dcnode-id="1149" instrument_node="">Big Bad</span></a></span><span data-dcnode-id="1146" instrument_node="">. There is also Rasticore, a burly bodyguard and bounty hunter. In this universe, lizardmen who are called Septarians in this series can apparently regenerate to the point that they can grown back (slowly) from just a severed limb.
</span></li><li data-dcnode-id="1139"><span data-dcnode-id="1144" instrument_node=""> </span><em data-dcnode-id="1141"><a class="twikilink" data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/TazMania" title="/pmwiki/pmwiki.php/WesternAnimation/TazMania"><span data-dcnode-id="1143" instrument_node="">Taz-Mania</span></a></em><span data-dcnode-id="1140" instrument_node="">: Bull Gator and Axl are pretty much good examples of this, in that they are anthropomorphic alligators who try to catch Taz for zoo-going children.
</span></li><li data-dcnode-id="1130"><span data-dcnode-id="1138" instrument_node=""> </span><em data-dcnode-id="1135"><a class="twikilink" data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TeenageMutantNinjaTurtles" title="/pmwiki/pmwiki.php/Franchise/TeenageMutantNinjaTurtles"><span data-dcnode-id="1137" instrument_node="">Teenage Mutant Ninja Turtles</span></a></em><span data-dcnode-id="1134" instrument_node="">: The Triceratons, essentially </span><a class="twikilink" data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="1133" instrument_node="">Proud Warrior Race</span></a><span data-dcnode-id="1131" instrument_node=""> anthropomorphic ceratopsians.
</span></li><li data-dcnode-id="1118"><span data-dcnode-id="1129" instrument_node=""> </span><em data-dcnode-id="1126"><a class="twikilink" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/ThunderCats2011" title="/pmwiki/pmwiki.php/WesternAnimation/ThunderCats2011"><span data-dcnode-id="1128" instrument_node="">ThunderCats (2011)</span></a></em><span data-dcnode-id="1125" instrument_node=""> has the </span><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Lizards</span></em><span data-dcnode-id="1122" instrument_node="">, led by Slithe. It's true that they're mooks for Mumm-Ra, but he had an easy time winning them over because the cats treated them like vermin. When Lion-O shows one of them kindness, </span><a class="twikilink" data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BecauseYouWereNiceToMe" title="/pmwiki/pmwiki.php/Main/BecauseYouWereNiceToMe"><span data-dcnode-id="1121" instrument_node="">that one returns it</span></a><span data-dcnode-id="1119" instrument_node="">.
</span></li></ul><ul data-dcnode-id="1097"><li data-dcnode-id="1107"><span data-dcnode-id="1115" instrument_node=""> </span><em data-dcnode-id="1112"><a class="twikilink" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/UncleGrandpa" title="/pmwiki/pmwiki.php/WesternAnimation/UncleGrandpa"><span data-dcnode-id="1114" instrument_node="">Uncle Grandpa</span></a></em><span data-dcnode-id="1111" instrument_node="">: Mr. Gus is a </span><a class="twikilink" data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Godzilla" title="/pmwiki/pmwiki.php/Franchise/Godzilla"><span data-dcnode-id="1110" instrument_node="">Godzilla-esque</span></a><span data-dcnode-id="1108" instrument_node=""> humanoid dinosaur.
</span></li><li data-dcnode-id="1098"><span data-dcnode-id="1106" instrument_node=""> </span><em data-dcnode-id="1103"><a class="twikilink" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/XiaolinShowdown" title="/pmwiki/pmwiki.php/WesternAnimation/XiaolinShowdown"><span data-dcnode-id="1105" instrument_node="">Xiaolin Showdown</span></a></em><span data-dcnode-id="1102" instrument_node="">: Chase Young from can turn into a lizard man because he drank </span><a class="twikilink" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PsychoSerum" title="/pmwiki/pmwiki.php/Main/PsychoSerum"><span data-dcnode-id="1101" instrument_node="">Psycho Serum</span></a><span data-dcnode-id="1099" instrument_node="">.
</span></li></ul></div><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1094"></p><div class="folderlabel" data-dcnode-id="1092" onclick="togglefolder('folder18');"><span data-dcnode-id="1093" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Other&nbsp;</span></div><div class="folder" data-dcnode-id="1046" id="folder18" isfolder="true" style="display:block;"><span data-dcnode-id="1091" instrument_node="">
</span><ul data-dcnode-id="1047"><li data-dcnode-id="1077"><span data-dcnode-id="1090" instrument_node=""> In the 2008 Minnesota Senate recount, </span><a class="urllink" data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20091127155704/http%3A//blog.rifftrax.com/2008/11/21/dont-blame-me-i-voted-for-lizard-people/"><span data-dcnode-id="1089" instrument_node="">one of the ballots reviewed contained a write-in vote for "Lizard People" in every race</span><img data-dcnode-id="1088" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1086" instrument_node="">. Likely a reference to </span><em data-dcnode-id="1083"><a class="twikilink" data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheHitchhikersGuideToTheGalaxy" title="/pmwiki/pmwiki.php/Franchise/TheHitchhikersGuideToTheGalaxy"><span data-dcnode-id="1085" instrument_node="">The Hitchhiker's Guide to the Galaxy</span></a></em><span data-dcnode-id="1082" instrument_node=""> and its Ancient Democracy where </span><a class="urllink" data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/quotes/162557-it-comes-from-a-very-ancient-democracy-you-see-you"><span data-dcnode-id="1081" instrument_node="">the people hate the lizards and the lizards rule the people</span><img data-dcnode-id="1080" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1078" instrument_node="">.
</span></li><li data-dcnode-id="1065"><span data-dcnode-id="1076" instrument_node=""> According to the conspiracy theory professed by </span><a class="twikilink" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/DavidIcke" title="/pmwiki/pmwiki.php/Creator/DavidIcke"><span data-dcnode-id="1075" instrument_node="">David Icke</span></a><span data-dcnode-id="1073" instrument_node=""> and others, the world is secretly ruled by lizard people from space and many prominent families are actually of this race and only disguised as human. This was since spawned its own trope, the </span><a class="twikilink" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilianConspiracy" title="/pmwiki/pmwiki.php/Main/ReptilianConspiracy"><span data-dcnode-id="1072" instrument_node="">Reptilian Conspiracy</span></a><span data-dcnode-id="1070" instrument_node="">. Other groups also proposed this, the Happy Science Foundation, for example. In one of their tract movies, </span><a class="urllink" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DTGhzqhh_PQ0"><span data-dcnode-id="1069" instrument_node="">lizard men pretended to be gods</span><img data-dcnode-id="1068" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1066" instrument_node=""> to the Incas. They're also aliens.
</span></li><li data-dcnode-id="1048"><span data-dcnode-id="1064" instrument_node=""> Palaeontologist Dale Russell suggested in the early 1980s that if the rather intelligent dinosaur </span><em data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Troodon</span></em><span data-dcnode-id="1061" instrument_node=""> had survived to the present day, it may have evolved into reptilian humanoids like this (it should be noted that Russell was strongly religious and on numerous occasions mentioned his belief that </span><a class="twikilink" data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreSpecial" title="/pmwiki/pmwiki.php/Main/HumansAreSpecial"><span data-dcnode-id="1060" instrument_node="">he considered humans close to the pinnacle of life</span></a><span data-dcnode-id="1058" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EvolutionaryLevels" title="/pmwiki/pmwiki.php/Main/EvolutionaryLevels"><span data-dcnode-id="1057" instrument_node="">and evolution</span></a><span data-dcnode-id="1055" instrument_node="">). However, most other scientists consider it unlikely that there's any inherent correlation between intelligence and humanoid anatomy, and in any case </span><a class="twikilink" data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScienceMarchesOn" title="/pmwiki/pmwiki.php/Main/ScienceMarchesOn"><span data-dcnode-id="1054" instrument_node="">we now know</span></a><span data-dcnode-id="1052" instrument_node=""> </span><em data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Troodon</span></em><span data-dcnode-id="1049" instrument_node=""> was almost certainly covered in feathers rather than scales, so this idea is discredited nowadays.
</span></li></ul></div><span data-dcnode-id="1045" instrument_node="">
