" instrument_node=""> Daniel something fierce; interestingly, his </span><a class="twikilink" data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BattleButler" title="/pmwiki/pmwiki.php/Main/BattleButler"><span data-dcnode-id="4077" instrument_node="">servant</span></a><span data-dcnode-id="4075" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SociopathicHero" title="/pmwiki/pmwiki.php/Main/SociopathicHero"><span data-dcnode-id="4074" instrument_node="">Hogg</span></a><span data-dcnode-id="4072" instrument_node=""> gets along just fine with Fallert.
</span></li><li data-dcnode-id="4065"><span data-dcnode-id="4070" instrument_node=""> The Rrertaxi in the </span><em data-dcnode-id="4067"><a class="twikilink" data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Spaceforce" title="/pmwiki/pmwiki.php/Literature/Spaceforce"><span data-dcnode-id="4069" instrument_node="">Spaceforce</span></a></em><span data-dcnode-id="4066" instrument_node=""> universe. We don't know much about them other than their spicy cuisine has become popular with Earthers.
</span></li><li data-dcnode-id="4044"><span data-dcnode-id="4064" instrument_node=""> The </span><em data-dcnode-id="4061"><a class="twikilink" data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Dragonlance" title="/pmwiki/pmwiki.php/Literature/Dragonlance"><span data-dcnode-id="4063" instrument_node="">Dragonlance</span></a></em><span data-dcnode-id="4060" instrument_node=""> universe has Draconians. They start off </span><a class="twikilink" data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="4059" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="4057" instrument_node="">, and usually appear as some variety of </span><a class="twikilink" data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Mooks" title="/pmwiki/pmwiki.php/Main/Mooks"><span data-dcnode-id="4056" instrument_node="">mook</span></a><span data-dcnode-id="4054" instrument_node=""> (either regular or </span><a class="twikilink" data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EliteMooks" title="/pmwiki/pmwiki.php/Main/EliteMooks"><span data-dcnode-id="4053" instrument_node="">improved</span></a><span data-dcnode-id="4051" instrument_node="">, depending on the story), but the depictions have become more nuanced over time. The most notable subversion is Kang and his band of engineers, who while starting out as evil (in the alignment sense) are nonetheless sympathetic, likable, and relatively honorable characters (they eventually ensure their race's future, found a city, and if a scene at the end of the War of Souls trilogy is anything to go by, pull a </span><a class="twikilink" data-dcnode-id="4049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeelFaceTurn" title="/pmwiki/pmwiki.php/Main/HeelFaceTurn"><span data-dcnode-id="4050" instrument_node="">Heel–Face Turn</span></a><span data-dcnode-id="4048" instrument_node=""> on </span><span class="spoiler" data-dcnode-id="4046" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4047" instrument_node="">Takhisis</span></span><span data-dcnode-id="4045" instrument_node="">).
</span></li><li data-dcnode-id="4023"><span data-dcnode-id="4043" instrument_node=""> The silkar in the </span><em data-dcnode-id="4040"><a class="createlink" data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/DuelOfSorceryTrilogy" title="/pmwiki/pmwiki.php/Literature/DuelOfSorceryTrilogy"><span data-dcnode-id="4042" instrument_node="">Duel of Sorcery</span></a></em><span data-dcnode-id="4039" instrument_node=""> and </span><em data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Dancer</span></em><span data-dcnode-id="4036" instrument_node=""> trilogies. Our first introduction to the race is in the form of a minor character "scaled like a viper and green as the new leaves of spring", who has a voice described as "</span><a class="twikilink" data-dcnode-id="4034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SssssnakeTalk" title="/pmwiki/pmwiki.php/Main/SssssnakeTalk"><span data-dcnode-id="4035" instrument_node="">harsh and inhuman</span></a><span data-dcnode-id="4033" instrument_node="">." They're implied, however, to be </span><a class="twikilink" data-dcnode-id="4031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IntelligentGerbil" title="/pmwiki/pmwiki.php/Main/IntelligentGerbil"><span data-dcnode-id="4032" instrument_node="">quite human-looking</span></a><span data-dcnode-id="4030" instrument_node=""> </span><a class="twikilink" data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RubberForeheadAliens" title="/pmwiki/pmwiki.php/Main/RubberForeheadAliens"><span data-dcnode-id="4029" instrument_node="">otherwise</span></a><span data-dcnode-id="4027" instrument_node="">; they've even got </span><a class="twikilink" data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonMammalianHair" title="/pmwiki/pmwiki.php/Main/NonMammalianHair"><span data-dcnode-id="4026" instrument_node="">hair</span></a><span data-dcnode-id="4024" instrument_node=""> (although it's green).
</span></li><li data-dcnode-id="4015"><span data-dcnode-id="4022" instrument_node=""> H. Beam Piper messed with this trope in </span><em data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Uller Uprising</span></em><span data-dcnode-id="4019" instrument_node="">. When the reptilian Ullerians fight against the humans on Uller, some forces side with the humans. The story was a retelling of the Sepoy Mutiny In Space, with the humans as the British, so </span><a class="twikilink" data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FridgeLogic" title="/pmwiki/pmwiki.php/Main/FridgeLogic"><span data-dcnode-id="4018" instrument_node="">Fridge Logic</span></a><span data-dcnode-id="4016" instrument_node=""> gets a workout. The people of Uller, good and bad, are multi-dimensional and complex, with several different cultures.
</span></li><li data-dcnode-id="3998"><span data-dcnode-id="4014" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpeculativeDocumentary" title="/pmwiki/pmwiki.php/Main/SpeculativeDocumentary"><span data-dcnode-id="4013" instrument_node="">Speculative Documentary</span></a><span data-dcnode-id="4011" instrument_node=""> book </span><em data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">All Tomorrows</span></em><span data-dcnode-id="4008" instrument_node=""> by Nemo Ramjet one of the successors of mankind is a race known as the Saurosapients, which evolved from large lizards brought to a tropical planet by humans. Ironically they were once the livestock of a minimally-intelligent species of genetically modified human, who degenerated to become </span><em data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">their</span></em><span data-dcnode-id="4005" instrument_node=""> livestock after the reptiles out-evolved them. Saurosapients are neither evil nor very human-like in general appearance (more like featherless raptors), but their society grows paranoid that an alien race will wipe them out like the humans before them. </span><span class="spoiler" data-dcnode-id="4000" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="4004" instrument_node=""> It's presumed that robot humans did wipe them out eventually, along with many other races that </span><em data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">were</span></em><span data-dcnode-id="4001" instrument_node=""> human-descended.</span></span><span data-dcnode-id="3999" instrument_node="">
</span></li><li data-dcnode-id="3952"><span data-dcnode-id="3997" instrument_node=""> The </span><em data-dcnode-id="3994"><a class="twikilink" data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/MalazanBookOfTheFallen" title="/pmwiki/pmwiki.php/Literature/MalazanBookOfTheFallen"><span data-dcnode-id="3996" instrument_node="">Malazan Book of the Fallen</span></a></em><span data-dcnode-id="3993" instrument_node=""> series feature the K'Chain Che'Malle. They destroyed themselves warring with the Short-tails, the K'Chain Nah'ruk, which </span><a class="twikilink" data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard" title="/pmwiki/pmwiki.php/Main/HoistByHisOwnPetard"><span data-dcnode-id="3992" instrument_node="">they themselves had created</span></a><span data-dcnode-id="3990" instrument_node=""> as a </span><a class="twikilink" data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ServantRace" title="/pmwiki/pmwiki.php/Main/ServantRace"><span data-dcnode-id="3989" instrument_node="">Servant Race</span></a><span data-dcnode-id="3987" instrument_node="">. Mostly a fallen and forgotten civilization by the time of the main series, they appear as </span><a class="twikilink" data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurZombiesAreDifferent" title="/pmwiki/pmwiki.php/Main/OurZombiesAreDifferent"><span data-dcnode-id="3986" instrument_node="">powerful zombies</span></a><span data-dcnode-id="3984" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LandmarkOfLore" title="/pmwiki/pmwiki.php/Main/LandmarkOfLore"><span data-dcnode-id="3983" instrument_node="">large ruins</span></a><span data-dcnode-id="3981" instrument_node="">. A few living individuals are encountered, one having been imprisoned in an </span><a class="twikilink" data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AncientTomb" title="/pmwiki/pmwiki.php/Main/AncientTomb"><span data-dcnode-id="3980" instrument_node="">Ancient Tomb</span></a><span data-dcnode-id="3978" instrument_node=""> and now quite mad, two others </span><a class="twikilink" data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EliteMooks" title="/pmwiki/pmwiki.php/Main/EliteMooks"><span data-dcnode-id="3977" instrument_node="">aiding</span></a><span data-dcnode-id="3975" instrument_node=""> a human who encountered them "in another land". The K'Chain Che'Malle organized themselves around </span><a class="twikilink" data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiveQueen" title="/pmwiki/pmwiki.php/Main/HiveQueen"><span data-dcnode-id="3974" instrument_node="">Matrons</span></a><span data-dcnode-id="3972" instrument_node=""> in a manner similar to ants or bees and lived in </span><a class="twikilink" data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FloatingContinent" title="/pmwiki/pmwiki.php/Main/FloatingContinent"><span data-dcnode-id="3971" instrument_node="">levitating hive cities</span></a><span data-dcnode-id="3969" instrument_node=""> they had carved out of mountains. A Matron could produce several kinds of breeds (workers, warriors, assassins, and so on) depending on the task they were needed for. Despite possessing their own </span><a class="twikilink" data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FunctionalMagic" title="/pmwiki/pmwiki.php/Main/FunctionalMagic"><span data-dcnode-id="3968" instrument_node="">racial Warren</span></a><span data-dcnode-id="3966" instrument_node="">, the K'Chain Che'Malle also were able to manufacture what they called </span><a class="twikilink" data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Nanomachines" title="/pmwiki/pmwiki.php/Main/Nanomachines"><span data-dcnode-id="3965" instrument_node="">drones</span></a><span data-dcnode-id="3963" instrument_node=""> and enable them to run certain programs even thousands of years after their makers had died, creating the effect of </span><a class="twikilink" data-dcnode-id="3961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicFromTechnology" title="/pmwiki/pmwiki.php/Main/MagicFromTechnology"><span data-dcnode-id="3962" instrument_node="">Magic from Technology</span></a><span data-dcnode-id="3960" instrument_node="">. </span><em data-dcnode-id="3957"><a class="twikilink" data-dcnode-id="3958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/DustOfDreams" title="/pmwiki/pmwiki.php/Literature/DustOfDreams"><span data-dcnode-id="3959" instrument_node="">Dust of Dreams</span></a></em><span data-dcnode-id="3956" instrument_node=""> features the last remaining functioning hive city called Kalse Rooted and reigned over by the failing and mad Matron Gunth'an Acyl. It also reveals the </span><a class="twikilink" data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BlueAndOrangeMorality" title="/pmwiki/pmwiki.php/Main/BlueAndOrangeMorality"><span data-dcnode-id="3955" instrument_node="">beliefs and morals of the K'Chain Che'Malle</span></a><span data-dcnode-id="3953" instrument_node="">.
</span></li><li data-dcnode-id="3934"><span data-dcnode-id="3951" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/TerryBrooks" title="/pmwiki/pmwiki.php/Creator/TerryBrooks"><span data-dcnode-id="3950" instrument_node="">Terry Brooks</span></a><span data-dcnode-id="3948" instrument_node="">' </span><em data-dcnode-id="3945"><a class="twikilink" data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Shannara" title="/pmwiki/pmwiki.php/Literature/Shannara"><span data-dcnode-id="3947" instrument_node="">Shannara</span></a></em><span data-dcnode-id="3944" instrument_node=""> series has the Mwellrets. They're actually a subspecies of </span><a class="twikilink" data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllTrollsAreDifferent" title="/pmwiki/pmwiki.php/Main/AllTrollsAreDifferent"><span data-dcnode-id="3943" instrument_node="">Troll</span></a><span data-dcnode-id="3941" instrument_node="">, that survived in the swamps instead of the northern mountains. They have hypnotic eyes, limited control of magic, and a penchant for </span><a class="twikilink" data-dcnode-id="3939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticRacism" title="/pmwiki/pmwiki.php/Main/FantasticRacism"><span data-dcnode-id="3940" instrument_node="">Fantastic Racism</span></a><span data-dcnode-id="3938" instrument_node="">. One of the few species that has so far been </span><a class="twikilink" data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil" title="/pmwiki/pmwiki.php/Main/AlwaysChaoticEvil"><span data-dcnode-id="3937" instrument_node="">Always Chaotic Evil</span></a><span data-dcnode-id="3935" instrument_node="">.
</span></li><li data-dcnode-id="3925"><span data-dcnode-id="3933" instrument_node=""> The Chingers of </span><em data-dcnode-id="3930"><a class="twikilink" data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BillTheGalacticHero" title="/pmwiki/pmwiki.php/Literature/BillTheGalacticHero"><span data-dcnode-id="3932" instrument_node="">Bill the Galactic Hero</span></a></em><span data-dcnode-id="3929" instrument_node=""> are a peaceful race of four-armed space lizards. Not that this stops the galactic empire from making </span><a class="twikilink" data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumansAreBastards" title="/pmwiki/pmwiki.php/Main/HumansAreBastards"><span data-dcnode-id="3928" instrument_node="">war with them</span></a><span data-dcnode-id="3926" instrument_node="">.
</span></li><li data-dcnode-id="3919"><span data-dcnode-id="3924" instrument_node=""> The rakoshi from F. Paul Wilson's </span><em data-dcnode-id="3921"><a class="twikilink" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/RepairmanJack" title="/pmwiki/pmwiki.php/Literature/RepairmanJack"><span data-dcnode-id="3923" instrument_node="">The Tomb</span></a></em><span data-dcnode-id="3920" instrument_node=""> hatch out of eggs and are described in highly reptilian terms, although they don't have scales.
</span></li><li data-dcnode-id="3911"><span data-dcnode-id="3918" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/VernorVinge" title="/pmwiki/pmwiki.php/Creator/VernorVinge"><span data-dcnode-id="3917" instrument_node="">Vernor Vinge</span></a><span data-dcnode-id="3915" instrument_node="">'s proto-cyberpunk novella, "</span><a class="twikilink" data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TrueNames" title="/pmwiki/pmwiki.php/Literature/TrueNames"><span data-dcnode-id="3914" instrument_node="">True Names</span></a><span data-dcnode-id="3912" instrument_node="">", the guardian of the Coven's online castle is a t-shirt-wearing Lizard Man named Alan Turing (after a famous computing pioneer from WWII).
</span></li><li data-dcnode-id="3902"><span data-dcnode-id="3910" instrument_node=""> In </span><a class="twikilink" data-dcnode-id="3908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RobertSilverberg" title="/pmwiki/pmwiki.php/Creator/RobertSilverberg"><span data-dcnode-id="3909" instrument_node="">Robert Silverberg</span></a><span data-dcnode-id="3907" instrument_node="">'s </span><em data-dcnode-id="3904"><a class="twikilink" data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/MajipoorSeries" title="/pmwiki/pmwiki.php/Literature/MajipoorSeries"><span data-dcnode-id="3906" instrument_node="">Majipoor Series</span></a></em><span data-dcnode-id="3903" instrument_node="">, the Ghayrogs, one of the many species living on Majipoor, resemble humanoid lizards, right down to their forked tongues. They display little emotion from a human perspective (as it's mostly expressed via changes in scent), rarely sleep, and sometimes serve as functionaries in the human-dominated government.
</span></li><li data-dcnode-id="3893"><span data-dcnode-id="3901" instrument_node=""> The ssyrean in </span><em data-dcnode-id="3898"><a class="twikilink" data-dcnode-id="3899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SsaliaAndTheDragonsOfAvienot" title="/pmwiki/pmwiki.php/Literature/SsaliaAndTheDragonsOfAvienot"><span data-dcnode-id="3900" instrument_node="">Ssalia and the Dragons of Avienot</span></a></em><span data-dcnode-id="3897" instrument_node="">, to which the eponymous Ssalia belongs. They're </span><a class="twikilink" data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CallASmeerpARabbit" title="/pmwiki/pmwiki.php/Main/CallASmeerpARabbit"><span data-dcnode-id="3896" instrument_node="">referred to as snakes</span></a><span data-dcnode-id="3894" instrument_node=""> and do possess some snake-like attributes, but have a humanoid shape with arms and legs, making them closer to this.
</span></li></ul><ul data-dcnode-id="3702"><li data-dcnode-id="3886"><span data-dcnode-id="3890" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="3888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/PerryRhodan" title="/pmwiki/pmwiki.php/Literature/PerryRhodan"><span data-dcnode-id="3889" instrument_node="">Perry Rhodan</span></a><span data-dcnode-id="3887" instrument_node=""> franchise, the reptilian Topidians from planet Topide are introduced as a not-quite-as-smart-as-human race in "The Vega Sector", number 5 in the American translation. They exhibit foolish traits such as keeping their fleet's high ranking officers in the flagship instead of sending them down to the planet to investigate what is happening first-hand. Cold-blooded cwards! They show up from time to time in later books.
</span></li><li data-dcnode-id="3880"><span data-dcnode-id="3885" instrument_node=""> </span><em data-dcnode-id="3882"><a class="twikilink" data-dcnode-id="3883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/JourneyToChaos" title="/pmwiki/pmwiki.php/Literature/JourneyToChaos"><span data-dcnode-id="3884" instrument_node="">Journey to Chaos</span></a></em><span data-dcnode-id="3881" instrument_node="">: There is a race called the lizard demons living on Tariatla. They look like mundane lizards except they're over five feet tall and walk on their hind legs. Eric meets one when he attends Roalt Public High, Oito. He's a prankster and a rookie jouster.
</span></li><li data-dcnode-id="3862"><span data-dcnode-id="3879" instrument_node=""> </span><em data-dcnode-id="3876"><a class="twikilink" data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SwordOfTruth" title="/pmwiki/pmwiki.php/Literature/SwordOfTruth"><span data-dcnode-id="3878" instrument_node="">Sword of Truth</span></a></em><span data-dcnode-id="3875" instrument_node=""> has mriswith, a race that came from a </span><a class="twikilink" data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoneHorriblyRight" title="/pmwiki/pmwiki.php/Main/GoneHorriblyRight"><span data-dcnode-id="3874" instrument_node="">Gone Horribly Right</span></a><span data-dcnode-id="3872" instrument_node=""> attempt to give wizards invisibility. They also overlap with </span><a class="twikilink" data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeePeople" title="/pmwiki/pmwiki.php/Main/BeePeople"><span data-dcnode-id="3871" instrument_node="">Bee People</span></a><span data-dcnode-id="3869" instrument_node="">, since, though covered with scales and possessing </span><a class="twikilink" data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ChameleonCamouflage" title="/pmwiki/pmwiki.php/Main/ChameleonCamouflage"><span data-dcnode-id="3868" instrument_node="">Chameleon Camouflage</span></a><span data-dcnode-id="3866" instrument_node="">, they procreate through a dragon sized, pheromone communicating </span><a class="twikilink" data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiveQueen" title="/pmwiki/pmwiki.php/Main/HiveQueen"><span data-dcnode-id="3865" instrument_node="">Hive Queen</span></a><span data-dcnode-id="3863" instrument_node="">.
</span></li><li data-dcnode-id="3853"><span data-dcnode-id="3861" instrument_node=""> The </span><em data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">hertasi</span></em><span data-dcnode-id="3858" instrument_node=""> of the </span><em data-dcnode-id="3855"><a class="twikilink" data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/HeraldsOfValdemar" title="/pmwiki/pmwiki.php/Literature/HeraldsOfValdemar"><span data-dcnode-id="3857" instrument_node="">Heralds of Valdemar</span></a></em><span data-dcnode-id="3854" instrument_node=""> series, who like to work, and most of them are servants/helpers to the Hawkbrothers, who protect them from being used as slaves by the outside world.
</span></li><li data-dcnode-id="3836"><span data-dcnode-id="3852" instrument_node=""> </span><em data-dcnode-id="3849"><a class="twikilink" data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheBalancedSword" title="/pmwiki/pmwiki.php/Literature/TheBalancedSword"><span data-dcnode-id="3851" instrument_node="">The Balanced Sword</span></a></em><span data-dcnode-id="3848" instrument_node="">: Zarathan, the setting of the story, has two prominent types of reptile folk:
</span><ul data-dcnode-id="3837"><li data-dcnode-id="3840"><span data-dcnode-id="3847" instrument_node=""> The </span><em data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">mazakh</span></em><span data-dcnode-id="3844" instrument_node=""> are the bad-guy type; they're demon-worshippers and commonly appear as mooks. The point is made, however, that their unpleasantness is due to culture and upbringing, not inherent nature, and that non-evil members of the species can and do exist (though they tend to call themselves something other than </span><em data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">mazakh</span></em><span data-dcnode-id="3841" instrument_node="">).
</span></li><li data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node=""> The Saurans are a larger and more impressive type of lizard folk (the appendix uses the phrase "miniature Godzilla"), reputedly descended from dragons, who fill the setting's ancient and advanced civilization role.
</span></li></ul></li><li data-dcnode-id="3830"><span data-dcnode-id="3835" instrument_node=""> In </span><em data-dcnode-id="3832"><a class="twikilink" data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheLarkAndTheWren" title="/pmwiki/pmwiki.php/Literature/TheLarkAndTheWren"><span data-dcnode-id="3834" instrument_node="">The Lark and the Wren</span></a></em><span data-dcnode-id="3831" instrument_node="">, Topaz, one of the ladies who works at Lady Amber's establishment, is implied to be one of these. The main character, Rune, doesn't have the temerity to ask exactly what race Topaz is from, but notes that she is humanoid enough to be popular with the patrons that frequent the place, and suspects that close inspection would reveal tiny scales instead of skin.
</span></li><li data-dcnode-id="3824"><span data-dcnode-id="3829" instrument_node=""> </span><em data-dcnode-id="3826"><a class="twikilink" data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheWanderingInn" title="/pmwiki/pmwiki.php/Literature/TheWanderingInn"><span data-dcnode-id="3828" instrument_node="">The Wandering Inn</span></a></em><span data-dcnode-id="3825" instrument_node="">: One of the most frequently seen races are the Drakes, which are humanoid lizards, though you should never call them that.
</span></li><li data-dcnode-id="3818"><span data-dcnode-id="3823" instrument_node=""> The German SF series </span><em data-dcnode-id="3820"><a class="createlink" data-dcnode-id="3821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/Maddrax" title="/pmwiki/pmwiki.php/Literature/Maddrax"><span data-dcnode-id="3822" instrument_node="">Maddrax</span></a></em><span data-dcnode-id="3819" instrument_node=""> has the daa'mures. A race of alien lizardmen.
</span></li><li data-dcnode-id="3808"><span data-dcnode-id="3817" instrument_node=""> </span><em data-dcnode-id="3814"><a class="twikilink" data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheHitchhikersGuideToTheGalaxy" title="/pmwiki/pmwiki.php/Franchise/TheHitchhikersGuideToTheGalaxy"><span data-dcnode-id="3816" instrument_node="">The Hitchhiker's Guide to the Galaxy</span></a></em><span data-dcnode-id="3813" instrument_node=""> introduces a robot in </span><em data-dcnode-id="3810"><a class="twikilink" data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SoLongAndThanksForAllTheFish" title="/pmwiki/pmwiki.php/Literature/SoLongAndThanksForAllTheFish"><span data-dcnode-id="3812" instrument_node="">So Long, and Thanks for All the Fish</span></a></em><span data-dcnode-id="3809" instrument_node=""> that comes from a planet where "the people are people and the leaders are lizards".
</span></li><li data-dcnode-id="3802"><span data-dcnode-id="3807" instrument_node=""> In the science fiction novel </span><em data-dcnode-id="3804"><a class="twikilink" data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/NationOfTheThirdEye" title="/pmwiki/pmwiki.php/Literature/NationOfTheThirdEye"><span data-dcnode-id="3806" instrument_node="">Nation of the Third Eye</span></a></em><span data-dcnode-id="3803" instrument_node=""> by K.K. Savage, there is the reptilian race of Draconians. They live in a higher astral dimension but can also enter physicality at will. Needless to say, they are among the bad guys.
</span></li><li data-dcnode-id="3793"><span data-dcnode-id="3801" instrument_node=""> Invoked by the Pervects of the </span><em data-dcnode-id="3798"><a class="twikilink" data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/MythAdventures" title="/pmwiki/pmwiki.php/Literature/MythAdventures"><span data-dcnode-id="3800" instrument_node="">Myth Adventures</span></a></em><span data-dcnode-id="3797" instrument_node=""> series, who are green-scaled, sharp-toothed humanoids from the dimension Perv. Although they look the part, most </span><em data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">actual</span></em><span data-dcnode-id="3794" instrument_node=""> Pervects aren't so much evil as rude, pushy, and egotistical; their racial reputation for being decadent, cruel and bloodthirsty is mostly propaganda, disseminated by the Pervects themselves to discourage non-Pervect freeloaders from immigrating to their wealthier, more advanced dimension.
</span></li><li data-dcnode-id="3787"><span data-dcnode-id="3792" instrument_node=""> In </span><em data-dcnode-id="3789"><a class="twikilink" data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TimeRiders" title="/pmwiki/pmwiki.php/Literature/TimeRiders"><span data-dcnode-id="3791" instrument_node="">TimeRiders</span></a></em><span data-dcnode-id="3788" instrument_node="">, the heroes travel back in time to the dinosaurs. There they encounter a species of humanoid and intelligent dinosaurs.
</span></li><li data-dcnode-id="3781"><span data-dcnode-id="3786" instrument_node=""> </span><em data-dcnode-id="3783"><a class="twikilink" data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/TheHighCrusade" title="/pmwiki/pmwiki.php/Literature/TheHighCrusade"><span data-dcnode-id="3785" instrument_node="">The High Crusade</span></a></em><span data-dcnode-id="3782" instrument_node="">: The Wersgorix are reptilian aliens who have blue skin.
</span></li><li data-dcnode-id="3754"><span data-dcnode-id="3780" instrument_node=""> In </span><em data-dcnode-id="3777"><a class="twikilink" data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/SolarWarden" title="/pmwiki/pmwiki.php/Literature/SolarWarden"><span data-dcnode-id="3779" instrument_node="">Alien Secrets</span></a></em><span data-dcnode-id="3776" instrument_node="">, the race the humans calls the Saurians are one of the three known alien races (alongside the </span><a class="twikilink" data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanAliens" title="/pmwiki/pmwiki.php/Main/HumanAliens"><span data-dcnode-id="3775" instrument_node="">Nordics</span></a><span data-dcnode-id="3773" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheGreys" title="/pmwiki/pmwiki.php/Main/TheGreys"><span data-dcnode-id="3772" instrument_node="">The Greys</span></a><span data-dcnode-id="3770" instrument_node="">) and are the only race to be truly extraterrestrial. The other two are </span><a class="twikilink" data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Ultraterrestrials" title="/pmwiki/pmwiki.php/Main/Ultraterrestrials"><span data-dcnode-id="3769" instrument_node="">Ultraterrestrials</span></a><span data-dcnode-id="3767" instrument_node=""> from different time periods in the future (about 11,000 years and a million years, respectively). They first made contact with the Nazis (who called them the Eidesche, "lizards") in </span><a class="twikilink" data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheThirties" title="/pmwiki/pmwiki.php/Main/TheThirties"><span data-dcnode-id="3766" instrument_node="">The '30s</span></a><span data-dcnode-id="3764" instrument_node="">, after one of their ships crash-landed in the Black Forest with only a single survivor. Since they're a telepathic </span><a class="twikilink" data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HiveMind" title="/pmwiki/pmwiki.php/Main/HiveMind"><span data-dcnode-id="3763" instrument_node="">Hive Mind</span></a><span data-dcnode-id="3761" instrument_node="">, more Eidesche followed and offered to help the Nazis develop advanced aircraft using </span><a class="twikilink" data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ArtificialGravity" title="/pmwiki/pmwiki.php/Main/ArtificialGravity"><span data-dcnode-id="3760" instrument_node="">Artificial Gravity</span></a><span data-dcnode-id="3758" instrument_node=""> and other alien tech (apparently, had the war lasted a little longer, the Nazis would have had the weapons they needed to crush the Allies once and for all). After the fall of Berlin, the man in charge of the secret program fled on an experimental space/time vehicle called </span><em data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Die Glocke</span></em><span data-dcnode-id="3755" instrument_node=""> ("the bell"), piloted by an Eidesche. The vehicle traveled 20 years into the future and landed in Kecksburg, PA, where it was retrieved by the Americans.
</span></li><li data-dcnode-id="3745"><span data-dcnode-id="3753" instrument_node=""> </span><em data-dcnode-id="3750"><a class="twikilink" data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ShadowsOfTheEmpire" title="/pmwiki/pmwiki.php/Literature/ShadowsOfTheEmpire"><span data-dcnode-id="3752" instrument_node="">Shadows of the Empire</span></a></em><span data-dcnode-id="3749" instrument_node="">: Xizor's people, the Falleen, had evolved from reptiles. However, they look more like humans than most examples, even having some hair, though only enough for a single topknot (oddly). Their females </span><a class="twikilink" data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NonMammalMammaries" title="/pmwiki/pmwiki.php/Main/NonMammalMammaries"><span data-dcnode-id="3748" instrument_node="">have breasts</span></a><span data-dcnode-id="3746" instrument_node=""> as well (though none appear in the book). Aside from green, slightly scaly skin, they don't have much "reptilian" features.
</span></li><li data-dcnode-id="3733"><span data-dcnode-id="3744" instrument_node=""> In the first book of </span><em data-dcnode-id="3741"><a class="twikilink" data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/InCryptid" title="/pmwiki/pmwiki.php/Literature/InCryptid"><span data-dcnode-id="3743" instrument_node="">InCryptid</span></a></em><span data-dcnode-id="3740" instrument_node="">, Verity learns that the cultists have been creating reptilian "Servitors" by exposing humans to mutagenic </span><a class="twikilink" data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThePowerOfBlood" title="/pmwiki/pmwiki.php/Main/ThePowerOfBlood"><span data-dcnode-id="3739" instrument_node="">dragon blood</span></a><span data-dcnode-id="3737" instrument_node="">. She calls them "</span><a class="twikilink" data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/LandOfTheLost" title="/pmwiki/pmwiki.php/Series/LandOfTheLost"><span data-dcnode-id="3736" instrument_node="">Sleestaks</span></a><span data-dcnode-id="3734" instrument_node="">" until she finds out what they are.
</span></li><li data-dcnode-id="3727"><span data-dcnode-id="3732" instrument_node=""> </span><em data-dcnode-id="3729"><a class="twikilink" data-dcnode-id="3730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire" title="/pmwiki/pmwiki.php/Literature/ASongOfIceAndFire"><span data-dcnode-id="3731" instrument_node="">A Song of Ice and Fire</span></a></em><span data-dcnode-id="3728" instrument_node="">: Children of House Targaryen are sometimes born with scaly skin, tiny wings, and tail, which may be connected to the family's historical relations with dragons. In this case, however, these children are always stillborn. Daenerys is the latest to suffer this, when a witch curses her child, Rhaego, in exchange for saving her husband. Rhaego is also made as though he has been dead for years, because when his skin is touched, it falls off to reveal graveworms.
</span></li><li data-dcnode-id="3715"><span data-dcnode-id="3726" instrument_node=""> </span><em data-dcnode-id="3723"><a class="twikilink" data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/BazilBroketail" title="/pmwiki/pmwiki.php/Literature/BazilBroketail"><span data-dcnode-id="3725" instrument_node="">Bazil Broketail</span></a></em><span data-dcnode-id="3722" instrument_node="">: </span><a class="twikilink" data-dcnode-id="3720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent" title="/pmwiki/pmwiki.php/Main/OurDragonsAreDifferent"><span data-dcnode-id="3721" instrument_node="">Dragons of Argonath</span></a><span data-dcnode-id="3719" instrument_node=""> definitely have shades of this trope, being essentially bipedal, sentient and tool-using lizards who live within a civilized society. Just don't even think of calling them "lizards" to their faces. That won't end well. Also, they're good guys, </span><a class="twikilink" data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="3718" instrument_node="">unlike most examples</span></a><span data-dcnode-id="3716" instrument_node="">.
</span></li><li data-dcnode-id="3703"><span data-dcnode-id="3714" instrument_node=""> </span><em data-dcnode-id="3711"><a class="twikilink" data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Literature/KnownSpace" title="/pmwiki/pmwiki.php/Literature/KnownSpace"><span data-dcnode-id="3713" instrument_node="">Known Space</span></a></em><span data-dcnode-id="3710" instrument_node=""> has the </span><a class="twikilink" data-dcnode-id="3708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbusivePrecursors" title="/pmwiki/pmwiki.php/Main/AbusivePrecursors"><span data-dcnode-id="3709" instrument_node="">Thrint</span></a><span data-dcnode-id="3707" instrument_node=""> - green-skinned, one-eyed alien carnivores. Also called the Slavers, because of their ability to mind-control other sapients. They dominated the galaxy long before the evolution of humans, and were extinct before then too. See, the Thrint faced a </span><a class="twikilink" data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SlaveRevolt" title="/pmwiki/pmwiki.php/Main/SlaveRevolt"><span data-dcnode-id="3706" instrument_node="">Slave Revolt</span></a><span data-dcnode-id="3704" instrument_node=""> amongst their chief slaves, the Tnuctipun, and when they realized they were going to lose the war, they issued a single amplified telepathic command to every living chordate in the entire galaxy: "Die". The Thrint were apparently very stupid for sentient life (the very smartest of their kind would have an IQ of 80) and self-absorbed since they just relied on other races for anything that relied on thought or effort and held a fervent belief that their telepathic abilities gave them a divine destiny to conquer the Galaxy. It took a billion years for life more advanced than bacteria to evolve from their food yeast.
</span></li></ul></div><span data-dcnode-id="3700" instrument_node="">
</span><p data-dcnode-id="3699"></p><div class="folderlabel" data-dcnode-id="3697" onclick="togglefolder('folder8');"><span data-dcnode-id="3698" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;Live-Action TV&nbsp;</span></div><div class="folder" data-dcnode-id="3461" id="folder8" isfolder="true" style="display:block;"><span data-dcnode-id="3696" instrument_node="">
</span><ul data-dcnode-id="3555"><li data-dcnode-id="3690"><span data-dcnode-id="3695" instrument_node=""> </span><em data-dcnode-id="3692"><a class="twikilink" data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Knightmare" title="/pmwiki/pmwiki.php/Series/Knightmare"><span data-dcnode-id="3694" instrument_node="">Knightmare</span></a></em><span data-dcnode-id="3691" instrument_node="">: Lissard, Lord Fear's henchman in later seasons.
</span></li><li data-dcnode-id="3653"><span data-dcnode-id="3689" instrument_node=""> </span><em data-dcnode-id="3686"><a class="twikilink" data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/StarTrek" title="/pmwiki/pmwiki.php/Franchise/StarTrek"><span data-dcnode-id="3688" instrument_node="">Star Trek</span></a></em><span data-dcnode-id="3685" instrument_node="">:
</span><ul data-dcnode-id="3654"><li data-dcnode-id="3680"><span data-dcnode-id="3684" instrument_node=""> The Gorn. Most famously one had a duel with Kirk in the original series. In other media they've been more neutral, or in </span><a class="twikilink" data-dcnode-id="3682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Videogame/StarTrekStarfleetCommand" title="/pmwiki/pmwiki.php/Videogame/StarTrekStarfleetCommand"><span data-dcnode-id="3683" instrument_node="">Star Trek: Starfleet Command</span></a><span data-dcnode-id="3681" instrument_node=""> they're actually allies of The Federation.
</span></li><li data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node=""> The rarely-seen brandy-making Saurians.
</span></li><li data-dcnode-id="3673"><span data-dcnode-id="3677" instrument_node=""> The Cardassians. Though they're the least reptilian, looking pretty much like </span><a class="twikilink" data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RubberForeheadAliens" title="/pmwiki/pmwiki.php/Main/RubberForeheadAliens"><span data-dcnode-id="3676" instrument_node="">humans with scales tacked on</span></a><span data-dcnode-id="3674" instrument_node="">, they also happen to be the most villainous of the reptoid lot.
</span></li><li data-dcnode-id="3667"><span data-dcnode-id="3672" instrument_node=""> The Reptilian Xindi in </span><em data-dcnode-id="3669"><a class="twikilink" data-dcnode-id="3670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StarTrekEnterprise" title="/pmwiki/pmwiki.php/Series/StarTrekEnterprise"><span data-dcnode-id="3671" instrument_node="">Star Trek: Enterprise</span></a></em><span data-dcnode-id="3668" instrument_node="">.
</span></li><li data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node=""> The Voth were descended from Earth hadrosaurs. Which is at least a new one, as far as Dinosauroids go.
</span></li><li data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node=""> The Hirogen and the Jem'Hadar also at least look the part, and are the villains in most of their appearances.
</span></li><li data-dcnode-id="3655"><span data-dcnode-id="3662" instrument_node=""> The Beta Annari, whose highly-developed olfactory senses make them a </span><a class="twikilink" data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LivingLieDetector" title="/pmwiki/pmwiki.php/Main/LivingLieDetector"><span data-dcnode-id="3661" instrument_node="">Living Lie Detector</span></a><span data-dcnode-id="3659" instrument_node="">. They can also smell the last thing you ate and the last person you had sex with...</span><a class="twikilink" data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OutWithABang" title="/pmwiki/pmwiki.php/Main/OutWithABang"><span data-dcnode-id="3658" instrument_node="">if they're not the same thing</span></a><span data-dcnode-id="3656" instrument_node="">.
</span></li></ul></li><li data-dcnode-id="3626"><span data-dcnode-id="3652" instrument_node=""> </span><em data-dcnode-id="3649"><a class="twikilink" data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BabylonFive" title="/pmwiki/pmwiki.php/Series/BabylonFive"><span data-dcnode-id="3651" instrument_node="">Babylon 5</span></a></em><span data-dcnode-id="3648" instrument_node="">:
</span><ul data-dcnode-id="3627"><li data-dcnode-id="3630"><span data-dcnode-id="3647" instrument_node=""> The Drazi, along with other less significant species, in </span><em data-dcnode-id="3644"><a class="twikilink" data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BabylonFive" title="/pmwiki/pmwiki.php/Series/BabylonFive"><span data-dcnode-id="3646" instrument_node="">Babylon 5</span></a></em><span data-dcnode-id="3643" instrument_node="">, although their </span><a class="twikilink" data-dcnode-id="3641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy" title="/pmwiki/pmwiki.php/Main/ProudWarriorRaceGuy"><span data-dcnode-id="3642" instrument_node="">Proud Warrior Race Guy</span></a><span data-dcnode-id="3640" instrument_node=""> personalities are a bit different from the metaphorically cold-blooded norm, and were not hostile to Humans (during the </span><a class="twikilink" data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HopelessWar" title="/pmwiki/pmwiki.php/Main/HopelessWar"><span data-dcnode-id="3639" instrument_node="">Earth-Minbari War</span></a><span data-dcnode-id="3637" instrument_node=""> they were the one member of the League of Non-Aligned Worlds to send warships to help Earth. Even after their fleet 'disappeared' in hyperspace and they were forced to neutrality, they still gave Earth the plans for a </span><a class="twikilink" data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WaveMotionGun" title="/pmwiki/pmwiki.php/Main/WaveMotionGun"><span data-dcnode-id="3636" instrument_node="">Wave-Motion Gun</span></a><span data-dcnode-id="3634" instrument_node=""> to mount on defensive satellites). The Drazi do engage in random ceremonial war with one another in one episode, which proves to be a hazard </span><span class="spoiler" data-dcnode-id="3632" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="3633" instrument_node=""> until Ivanova inadvertently forces them to stop</span></span><span data-dcnode-id="3631" instrument_node="">.
</span></li><li data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node=""> Subverted with the much more significant Narns, who have scaly skin and appear reptilian from the outside, but are actually closer to marsupials in terms of Earth biological analogies.
</span></li></ul></li><li data-dcnode-id="3617"><span data-dcnode-id="3625" instrument_node=""> </span><em data-dcnode-id="3622"><a class="twikilink" data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/CSI" title="/pmwiki/pmwiki.php/Series/CSI"><span data-dcnode-id="3624" instrument_node="">CSI</span></a></em><span data-dcnode-id="3621" instrument_node=""> had an episode, "Leapin' Lizards", where the dead guy of the week was a believer in a </span><a class="twikilink" data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilianConspiracy" title="/pmwiki/pmwiki.php/Main/ReptilianConspiracy"><span data-dcnode-id="3620" instrument_node="">Reptilian Conspiracy</span></a><span data-dcnode-id="3618" instrument_node="">. Their website is shown, with several world leaders morphing into reptilians, and one of the guys hallucinates Brass with a reptilian tongue and Greg with reptilian characteristics-which leads to Greg being bitten.
</span></li><li data-dcnode-id="3599"><span data-dcnode-id="3616" instrument_node=""> </span><em data-dcnode-id="3613"><a class="twikilink" data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Farscape" title="/pmwiki/pmwiki.php/Series/Farscape"><span data-dcnode-id="3615" instrument_node="">Farscape</span></a></em><span data-dcnode-id="3612" instrument_node="">: The extremely brutal Scarrans, who create one of the two </span><a class="twikilink" data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheEmpire" title="/pmwiki/pmwiki.php/Main/TheEmpire"><span data-dcnode-id="3611" instrument_node="">evil empires</span></a><span data-dcnode-id="3609" instrument_node=""> of the show. The one </span><a class="twikilink" data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalfHumanHybrid" title="/pmwiki/pmwiki.php/Main/HalfHumanHybrid"><span data-dcnode-id="3608" instrument_node="">Half-Human Hybrid</span></a><span data-dcnode-id="3606" instrument_node=""> we see of them is also a vicious </span><a class="twikilink" data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManipulativeBastard" title="/pmwiki/pmwiki.php/Main/ManipulativeBastard"><span data-dcnode-id="3605" instrument_node="">Manipulative Bastard</span></a><span data-dcnode-id="3603" instrument_node="">. He also requires technology to survive (cooling rods in the brain that have to be replaced regularly), as his reptilian half craves heat, while his </span><a class="twikilink" data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanAliens" title="/pmwiki/pmwiki.php/Main/HumanAliens"><span data-dcnode-id="3602" instrument_node="">Human Aliens</span></a><span data-dcnode-id="3600" instrument_node=""> half can't stand it.
</span></li><li data-dcnode-id="3565"><span data-dcnode-id="3598" instrument_node=""> </span><em data-dcnode-id="3595"><a class="twikilink" data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/DoctorWho" title="/pmwiki/pmwiki.php/Series/DoctorWho"><span data-dcnode-id="3597" instrument_node="">Doctor Who</span></a></em><span data-dcnode-id="3594" instrument_node="">:
</span><ul data-dcnode-id="3566"><li data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node=""> The Ice Warriors, the inhabitants of Mars, though their reptilian features aren't emphasized as much because they're usually seen in full armour.
</span></li><li data-dcnode-id="3569"><span data-dcnode-id="3591" instrument_node=""> The Silurians and their aquatic cousins the Sea Devils.</span><span class="notelabel" data-dcnode-id="3588" onclick="togglenote('note0dv3c');" style="cursor: pointer;"><sup data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">note&nbsp;</span></sup></span><span class="inlinefolder font-s" data-dcnode-id="3577" id="note0dv3c" isnote="true" onclick="togglenote('note0dv3c');" style="display: none; cursor: pointer;"><span data-dcnode-id="3587" instrument_node="">Both of these are technically </span><a class="twikilink" data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticSlurs" title="/pmwiki/pmwiki.php/Main/FantasticSlurs"><span data-dcnode-id="3586" instrument_node="">Fantastic Slurs</span></a><span data-dcnode-id="3584" instrument_node="">: the </span><a class="twikilink" data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/DoctorWhoExpandedUniverse" title="/pmwiki/pmwiki.php/Franchise/DoctorWhoExpandedUniverse"><span data-dcnode-id="3583" instrument_node="">Expanded Universe</span></a><span data-dcnode-id="3581" instrument_node=""> has "Earth Reptiles" as a more respectful term, and the Eleventh Doctor uses the taxonomically inaccurate "</span><em data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Homo reptilia</span></em><span data-dcnode-id="3578" instrument_node="">."</span></span><span data-dcnode-id="3576" instrument_node=""> They are not extraterrestrials, but the previous inhabitants of Earth before humans came around. They do live underground and abduct people, though, which still fits in with Reptilian lore. However the </span><a class="twikilink" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/DoctorWhoS7E2DoctorWhoAndTheSilurians" title="/pmwiki/pmwiki.php/Recap/DoctorWhoS7E2DoctorWhoAndTheSilurians"><span data-dcnode-id="3575" instrument_node="">serial</span></a><span data-dcnode-id="3573" instrument_node=""> in which the Silurians are introduced </span><a class="twikilink" data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreyAndGrayMorality" title="/pmwiki/pmwiki.php/Main/GreyAndGrayMorality"><span data-dcnode-id="3572" instrument_node="">avoids presenting them as evil</span></a><span data-dcnode-id="3570" instrument_node="">; instead they're not that different from the humans.
</span></li><li data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node=""> There are also the Slitheen, a clan of Raxacoricofallapatorians who invade Earth, kill human government officials, and wear their skins to infiltrate our society.
</span></li></ul></li><li data-dcnode-id="3556"><span data-dcnode-id="3564" instrument_node=""> </span><em data-dcnode-id="3561"><a class="twikilink" data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/LandOfTheLost" title="/pmwiki/pmwiki.php/Series/LandOfTheLost"><span data-dcnode-id="3563" instrument_node="">Land of the Lost</span></a></em><span data-dcnode-id="3560" instrument_node="">: The Sleestak are primitive, tribal bipidal lizard folk with bug eyes, who are generally hostile to the humans who they perceive to be intruding on their territory. They were once called Altrusians, and boasted a great civilization, but it collapsed long ago. One </span><a class="twikilink" data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FishOutOfTemporalWater" title="/pmwiki/pmwiki.php/Main/FishOutOfTemporalWater"><span data-dcnode-id="3559" instrument_node="">time displaced</span></a><span data-dcnode-id="3557" instrument_node=""> Altrusian from that civilized period becomes a friend and ally to the humans through most of the series.
</span></li></ul><ul data-dcnode-id="3462"><li data-dcnode-id="3545"><span data-dcnode-id="3553" instrument_node=""> </span><em data-dcnode-id="3550"><a class="twikilink" data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BuckRogersInTheTwentyFifthCentury" title="/pmwiki/pmwiki.php/Series/BuckRogersInTheTwentyFifthCentury"><span data-dcnode-id="3552" instrument_node="">Buck Rogers in the 25th Century</span></a></em><span data-dcnode-id="3549" instrument_node="">: The Saurians were evil and they were also able to take </span><a class="twikilink" data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VoluntaryShapeShifting" title="/pmwiki/pmwiki.php/Main/VoluntaryShapeShifting"><span data-dcnode-id="3548" instrument_node="">human form</span></a><span data-dcnode-id="3546" instrument_node="">. Exposing them to cold stripped away the disguise and revealed their true form.
</span></li><li data-dcnode-id="3536"><span data-dcnode-id="3544" instrument_node=""> </span><em data-dcnode-id="3541"><a class="twikilink" data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheOrville" title="/pmwiki/pmwiki.php/Series/TheOrville"><span data-dcnode-id="3543" instrument_node="">The Orville</span></a></em><span data-dcnode-id="3540" instrument_node="">: The Krill are a hostile race of reptilian humanoids with pale skin who double as </span><a class="twikilink" data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScaryDogmaticAliens" title="/pmwiki/pmwiki.php/Main/ScaryDogmaticAliens"><span data-dcnode-id="3539" instrument_node="">Scary Dogmatic Aliens</span></a><span data-dcnode-id="3537" instrument_node="">, being religious zealots who see it as their divine right to rule over all other lifeforms.
</span></li><li data-dcnode-id="3527"><span data-dcnode-id="3535" instrument_node=""> Many of the alien species featured in </span><em data-dcnode-id="3532"><a class="twikilink" data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheOuterLimits1995" title="/pmwiki/pmwiki.php/Series/TheOuterLimits1995"><span data-dcnode-id="3534" instrument_node="">The Outer Limits (1995)</span></a></em><span data-dcnode-id="3531" instrument_node=""> fit this trope. In most cases, </span><a class="twikilink" data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent" title="/pmwiki/pmwiki.php/Main/ReptilesAreAbhorrent"><span data-dcnode-id="3530" instrument_node="">Reptiles Are Abhorrent</span></a><span data-dcnode-id="3528" instrument_node="">.
</span></li><li data-dcnode-id="3521"><span data-dcnode-id="3526" instrument_node=""> </span><em data-dcnode-id="3523"><a class="twikilink" data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/StargateSG1" title="/pmwiki/pmwiki.php/Series/StargateSG1"><span data-dcnode-id="3525" instrument_node="">Stargate SG-1</span></a></em><span data-dcnode-id="3522" instrument_node=""> has the Unas. They are a species that lives primitively and is a race of hunters. On some planets, they are also the slaves of humans. They were the first hosts for the Goa'uld before they developed a preference for humans as hosts.
</span></li><li data-dcnode-id="3515"><span data-dcnode-id="3520" instrument_node=""> </span><em data-dcnode-id="3517"><a class="twikilink" data-dcnode-id="3518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Grimm" title="/pmwiki/pmwiki.php/Series/Grimm"><span data-dcnode-id="3519" instrument_node="">Grimm</span></a></em><span data-dcnode-id="3516" instrument_node="">: Various reptilian Wesen are standard lizard-like Skalengecks and Phansigars, snake-like Lausenshlange and Konigschlangethe turtle-like Genio innocuo, the alligator and crocodilian Skalenzahen and Gelemcaedus, draconian Daemonfeuer, and even the glow-in-the-dark alien-like Gluhenvolk are reptilian.
</span></li><li data-dcnode-id="3509"><span data-dcnode-id="3514" instrument_node=""> In </span><em data-dcnode-id="3511"><a class="twikilink" data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/BuffyTheVampireSlayer" title="/pmwiki/pmwiki.php/Series/BuffyTheVampireSlayer"><span data-dcnode-id="3513" instrument_node="">Buffy the Vampire Slayer</span></a></em><span data-dcnode-id="3510" instrument_node=""> there are demons that look like this. However, you rarely see them in the series, but more often in the books and comics.
</span></li><li data-dcnode-id="3490"><span data-dcnode-id="3508" instrument_node=""> The Visitors from </span><em data-dcnode-id="3505"><a class="twikilink" data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/V1983" title="/pmwiki/pmwiki.php/Series/V1983"><span data-dcnode-id="3507" instrument_node="">V (1983)</span></a></em><span data-dcnode-id="3504" instrument_node=""> are the </span><a class="twikilink" data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TropeCodifier" title="/pmwiki/pmwiki.php/Main/TropeCodifier"><span data-dcnode-id="3503" instrument_node="">Trope Codifiers</span></a><span data-dcnode-id="3501" instrument_node="">. They infiltrate many parts of human society, and they want to </span><em data-dcnode-id="3498"><a class="twikilink" data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToServeMan" title="/pmwiki/pmwiki.php/Main/ToServeMan"><span data-dcnode-id="3500" instrument_node="">eat us</span></a></em><span data-dcnode-id="3497" instrument_node=""> (along with other tasty mammals). Rather than shapeshifting, however, they use fake human-like skin to mask their true appearance, a method best exemplified by the iconic shot of Diana peeling back the skin on one side of her face to reveal green scaly skin and a catlike eye. It should be noted that, aside from </span><a class="twikilink" data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FollowTheLeader" title="/pmwiki/pmwiki.php/Main/FollowTheLeader"><span data-dcnode-id="3496" instrument_node="">inspiring the creation of other fictional Reptilians</span></a><span data-dcnode-id="3494" instrument_node="">, </span><em data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">V</span></em><span data-dcnode-id="3491" instrument_node=""> led to the plethora of conspiracy theories about Reptilians, which were pretty much nonexistent before the show aired.
</span></li><li data-dcnode-id="3478"><span data-dcnode-id="3489" instrument_node=""> The </span><em data-dcnode-id="3486"><a class="twikilink" data-dcnode-id="3487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/V2009" title="/pmwiki/pmwiki.php/Series/V2009"><span data-dcnode-id="3488" instrument_node="">V (2009)</span></a></em><span data-dcnode-id="3485" instrument_node=""> reboot series was much the same, except the Visitors were more of a combination of </span><a class="twikilink" data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatMeasureIsANonCute" title="/pmwiki/pmwiki.php/Main/WhatMeasureIsANonCute"><span data-dcnode-id="3484" instrument_node="">yucky reptile-people and icky bug-people</span></a><span data-dcnode-id="3482" instrument_node="">. The reboot also has them literally grafting human skin onto their scales. One form of punishment for the Vs is to be skinned alive, which causes just as much pain as it would a human, since the grafted skin has perfectly working nerves. There's also the possibility of </span><a class="twikilink" data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalfHumanHybrid" title="/pmwiki/pmwiki.php/Main/HalfHumanHybrid"><span data-dcnode-id="3481" instrument_node="">interbreeding</span></a><span data-dcnode-id="3479" instrument_node=""> between humans and Vs.
</span></li><li data-dcnode-id="3472"><span data-dcnode-id="3477" instrument_node=""> In </span><em data-dcnode-id="3474"><a class="twikilink" data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/WarOfTheWorlds1988" title="/pmwiki/pmwiki.php/Series/WarOfTheWorlds1988"><span data-dcnode-id="3476" instrument_node="">War of the Worlds (1988)</span></a></em><span data-dcnode-id="3473" instrument_node="">, the Martians are essentially turned into the aforementioned Visitors. Except that they're body snatchers.
</span></li><li data-dcnode-id="3463"><span data-dcnode-id="3471" instrument_node=""> </span><em data-dcnode-id="3468"><a class="twikilink" data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/ResidentAlien" title="/pmwiki/pmwiki.php/Series/ResidentAlien"><span data-dcnode-id="3470" instrument_node="">Resident Alien</span></a></em><span data-dcnode-id="3467" instrument_node="">: The reptilian aliens of UFO folklore exist, Harry confirms, and are trying to conquer the universe by </span><a class="twikilink" data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalfHumanHybrid" title="/pmwiki/pmwiki.php/Main/HalfHumanHybrid"><span data-dcnode-id="3466" instrument_node="">breeding hybrids</span></a><span data-dcnode-id="3464" instrument_node=""> on Earth, but they won't succeed because they're "gross" and have "serious hygiene problems".
</span></li></ul></div><span data-dcnode-id="3460" instrument_node="">

</span><ul data-dcnode-id="3446"><li data-dcnode-id="3447"><span data-dcnode-id="3455" instrument_node=""> </span><em data-dcnode-id="3452"><a class="twikilink" data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Magazine/Analog" title="/pmwiki/pmwiki.php/Magazine/Analog"><span data-dcnode-id="3454" instrument_node="">Analog</span></a></em><span data-dcnode-id="3451" instrument_node="">: The </span><a class="twikilink" data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Recap/Analog1931" title="/pmwiki/pmwiki.php/Recap/Analog1931"><span data-dcnode-id="3450" instrument_node="">April 1931 cover</span></a><span data-dcnode-id="3448" instrument_node=""> has a bunch of crocodile-like humanoid figures menacing a pair of humans.

</span><ul data-dcnode-id="3423"><li data-dcnode-id="3431"><span data-dcnode-id="3435" instrument_node=""> There was a race called the Ophiogenees (meaning "serpent born") who were born from the union between a drakon — one of the snakelike, usually limbless dragons of Greek myth — and a </span><a class="twikilink" data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Squick" title="/pmwiki/pmwiki.php/Main/Squick"><span data-dcnode-id="3434" instrument_node="">human woman</span></a><span data-dcnode-id="3432" instrument_node="">. It was said that the males of this race could cure people of snake bites with a touch of their hand.
</span></li><li data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node=""> Another race of Reptilian humanoids were the Skiritai, who were a nomadic tribe of lizard folk that have a bow legged stance.
</span></li><li data-dcnode-id="3424"><span data-dcnode-id="3428" instrument_node=""> A bandit named Sauros </span><a class="twikilink" data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AmbiguousSituation" title="/pmwiki/pmwiki.php/Main/AmbiguousSituation"><span data-dcnode-id="3427" instrument_node="">may or may not</span></a><span data-dcnode-id="3425" instrument_node=""> have been one. He attacked Heracles when the demigod was on his way to capture the Erymathian Boar and was slain.
</span></li></ul></li><li data-dcnode-id="3408"><span data-dcnode-id="3421" instrument_node=""> The field of cryptozoology has its share of reptilian humanoids, including the </span><a class="urllink" data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Lizard_Man_of_Scape_Ore_Swamp"><span data-dcnode-id="3420" instrument_node="">Lizard Man of Scape Ore Swamp</span><img data-dcnode-id="3419" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3417" instrument_node=""> and the </span><a class="urllink" data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Loveland_frog"><span data-dcnode-id="3416" instrument_node="">Loveland Frog</span><img data-dcnode-id="3415" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3413" instrument_node="">. The </span><a class="urllink" data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Thetis_Lake_Monster"><span data-dcnode-id="3412" instrument_node="">Thetis Lake Monster</span><img data-dcnode-id="3411" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="3409" instrument_node=""> was described as such, however, one of the witnesses has come forward and said that the encounter was a hoax.
</span></li><li data-dcnode-id="3382"><span data-dcnode-id="3407" instrument_node=""> From Louisiana folklore we have the Grunch, who crosses this with </span><a class="twikilink" data-dcnode-id="3405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FaunsAndSatyrs" title="/pmwiki/pmwiki.php/Main/FaunsAndSatyrs"><span data-dcnode-id="3406" instrument_node="">Fauns and Satyrs</span></a><span data-dcnode-id="3404" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BigRedDevil" title="/pmwiki/pmwiki.php/Main/BigRedDevil"><span data-dcnode-id="3403" instrument_node="">Big Red Devil</span></a><span data-dcnode-id="3401" instrument_node="">. The Grunch is a satyr </span><a class="twikilink" data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwampsAreEvil" title="/pmwiki/pmwiki.php/Main/SwampsAreEvil"><span data-dcnode-id="3400" instrument_node="">who haunts the bayous</span></a><span data-dcnode-id="3398" instrument_node=""> with scales, fangs, claws and a forked tongue. Depending on the story, it was either </span><a class="twikilink" data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HillbillyHorrors" title="/pmwiki/pmwiki.php/Main/HillbillyHorrors"><span data-dcnode-id="3397" instrument_node="">created from inbred dwarfs and albinos</span></a><span data-dcnode-id="3395" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MultipleChoicePast" title="/pmwiki/pmwiki.php/Main/MultipleChoicePast"><span data-dcnode-id="3394" instrument_node="">or from</span></a><span data-dcnode-id="3392" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Satan" title="/pmwiki/pmwiki.php/Main/Satan"><span data-dcnode-id="3391" instrument_node="">Satan</span></a><span data-dcnode-id="3389" instrument_node="">'s testicles after they were (allegedly) </span><a class="twikilink" data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GroinAttack" title="/pmwiki/pmwiki.php/Main/GroinAttack"><span data-dcnode-id="3388" instrument_node="">severed by</span></a><span data-dcnode-id="3386" instrument_node=""> </span><a class="twikilink" data-dcnode-id="3384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealLife" title="/pmwiki/pmwiki.php/Main/RealLife"><span data-dcnode-id="3385" instrument_node="">Real Life</span></a><span data-dcnode-id="3383" instrument_node=""> voodoo queen Marie Laveau.
