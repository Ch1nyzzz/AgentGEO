</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="3643" data-field="cheat" id="cb81626"><div data-dcnode-id="3644"><span data-dcnode-id="3677" instrument_node="">An easy way to get the exchange prizes is to of course find out the day of the 5 point special where every item will be 5x more. </span><br data-dcnode-id="3676"><br data-dcnode-id="3675"><span data-dcnode-id="3674" instrument_node="">Ex: 2,243 bells is 22 points, and times that by 5 you will get that amount of points. </span><br data-dcnode-id="3673"><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">This makes it easier to get the items you want. If you run out of items to buy in the store, just keep ordering from the catalog. This will get you more points to buy your 'exchange present'. </span><br data-dcnode-id="3670"><br data-dcnode-id="3669"><span data-dcnode-id="3668" instrument_node="">Here are some of the items:</span><br data-dcnode-id="3667"><span data-dcnode-id="3666" instrument_node="">Peach's Parasol</span><br data-dcnode-id="3665"><span data-dcnode-id="3664" instrument_node="">Toads Hat</span><br data-dcnode-id="3663"><span data-dcnode-id="3662" instrument_node="">Bad Bro Stache</span><br data-dcnode-id="3661"><span data-dcnode-id="3660" instrument_node="">Mario Kart</span><br data-dcnode-id="3659"><span data-dcnode-id="3658" instrument_node="">Yoshi's Egg</span><br data-dcnode-id="3657"><span data-dcnode-id="3656" instrument_node="">Samus's Helmet, Hero Cap (comes with Link's hair ^^ )</span><br data-dcnode-id="3655"><span data-dcnode-id="3654" instrument_node="">Samus's clothes, Hero Clothes</span><br data-dcnode-id="3653"><span data-dcnode-id="3652" instrument_node="">Midna's mask</span><br data-dcnode-id="3651"><span data-dcnode-id="3650" instrument_node="">Yoshi's egg</span><br data-dcnode-id="3649"><span data-dcnode-id="3648" instrument_node="">Theres more than these, these are the ones that I can think of. This will take a lot of bells but there really cool to have in a house (prefurrably a Nintendo room or Mario Room).</span><br data-dcnode-id="3647"><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node="">Hope this helped ^0^</span></div></div><span data-dcnode-id="3642" instrument_node="">

</span><strong data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">save a ton of time watering - works great if you're wanting hybrids!</span></strong><span data-dcnode-id="3099" instrument_node="">
</span></div><span data-dcnode-id="3097" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="3085" data-field="cheat" id="cb76205"><div data-dcnode-id="3086"><span data-dcnode-id="3096" instrument_node="">Planting in an "X" pattern works great for producing hybrids. If you have a hybrid that you are trying to produce more of, place it in the center of the "X" and at the tips of the "X" place flowers that produce that type of hybrid. Here's an example were F = flower and S = space</span><br data-dcnode-id="3095"><br data-dcnode-id="3094"><span data-dcnode-id="3093" instrument_node="">F S F</span><br data-dcnode-id="3092"><span data-dcnode-id="3091" instrument_node="">S F S</span><br data-dcnode-id="3090"><span data-dcnode-id="3089" instrument_node="">F S F here's the awesome part, you only have to water the center flower in the "X" this also works for an "H" or a whole square of flowers (watering exactly on the center flower will water all 9 flowers) I've done this for a couple months. I've even purposely skipped watering some of the squares to test if watering only the center will revive the wilted flowers. I haven't lost a flower yet and I have a ton hybrids. You can apply this to long rows of flowers say going from North to South and only water on one side of the row. This is great for places where u want the flowers to aide in the regrowth of grass!! Then you only have to walk on it minimally to water all the flowers! </span><br data-dcnode-id="3088"><br data-dcnode-id="3087"></div></div><span data-dcnode-id="3084" instrument_node="">

</span></div><span data-dcnode-id="3025" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="3004" data-field="cheat" id="cb75608"><div data-dcnode-id="3005"><span data-dcnode-id="3024" instrument_node="">The scorpion and tarantula are annoying, because when you take out your net, they chase you until they sting you.  Well, there is a solution the works perfectly if they are along the coastline.  Find one, go in a straight line right or left and take out your net.  They will come after you.  Just catch it while it wants to ram you.</span><br data-dcnode-id="3023"><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">Here's a map:    N=net  s/t=scorpion or tarantula</span><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">s/t  you</span><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node="">Now:</span><br data-dcnode-id="3016"><span data-dcnode-id="3015" instrument_node="">s/t  you with net</span><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">Next:</span><br data-dcnode-id="3012"><span data-dcnode-id="3011" instrument_node="">s/t-&gt; you with net</span><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">Finally:</span><br data-dcnode-id="3008"><span data-dcnode-id="3007" instrument_node="">s/t-&gt;   nn</span><br data-dcnode-id="3006"></div></div><span data-dcnode-id="3003" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="2966" data-field="cheat" id="cb74313"><div data-dcnode-id="2967"><span data-dcnode-id="2977" instrument_node="">If you are starting a new city, you can choose the fruit that is native to your city. </span><br data-dcnode-id="2976"><br data-dcnode-id="2975"><span data-dcnode-id="2974" instrument_node="">At the "Animal Crossing: City Folk" title screen, the camera will follow a resident around your potential city. If you see the fruit you like in the trees, start the game. Otherwise, reset the Wii and repeat until you see the fruit you want.</span><br data-dcnode-id="2973"><br data-dcnode-id="2972"><span data-dcnode-id="2971" instrument_node="">I believe this also works with the resident the camera follows around, so if you want a particular resident in your town at startup, the same trick should work.</span><br data-dcnode-id="2970"><br data-dcnode-id="2969"><br data-dcnode-id="2968"></div></div><span data-dcnode-id="2965" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="2869" data-field="cheat" id="cb73107"><div data-dcnode-id="2870"><span data-dcnode-id="2876" instrument_node="">when it is snowing look around every day you will find two snowballs on the ground. take one ball and roll it around in the snow and make it quite big. while making the other a lot smaller. then you push the small one into the big one and you have made a snowman. if he likes the way you built him he mail you some snowman furniture.</span><br data-dcnode-id="2875"><br data-dcnode-id="2874"><br data-dcnode-id="2873"><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">if you accidentally make one of them too big just roll it around in the mud until it is the size you want</span></div></div><span data-dcnode-id="2868" instrument_node="">

</span></div><span data-dcnode-id="2814" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="2798" data-field="cheat" id="cb81956"><div data-dcnode-id="2799"><span data-dcnode-id="2813" instrument_node="">Don't you HATE when your turnips get spoiled? Well here's a way to actually get something good out of it!</span><br data-dcnode-id="2812"><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">1) Drop the turnip somewhere you'll find it, like near your house.</span><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node="">2) go in your house or something.</span><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node="">3) after a couple of min., go back.  There should be ants crawling all over it.</span><br data-dcnode-id="2805"><span data-dcnode-id="2804" instrument_node="">4) now get your net out and swipe at the turnip.  You should have caught an ant.</span><br data-dcnode-id="2803"><span data-dcnode-id="2802" instrument_node="">5) if you haven't already, donate it to the museum.  If you have, then sell it!!</span><br data-dcnode-id="2801"><span data-dcnode-id="2800" instrument_node="">6) WARNING: the spoiled turnip will only last for one day.</span></div></div><span data-dcnode-id="2797" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="2302" data-field="cheat" id="cb80182"><div data-dcnode-id="2303"><span data-dcnode-id="2325" instrument_node="">Did you know that there are a ton of different towns that you can get when you start the game? There's 3 different types of gates, different levels of the town, and even special things with the river. </span><br data-dcnode-id="2324"><br data-dcnode-id="2323"><span data-dcnode-id="2322" instrument_node="">-Palace Gates</span><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">-Castle Gates</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">-Old Gates</span><br data-dcnode-id="2317"><br data-dcnode-id="2316"><span data-dcnode-id="2315" instrument_node="">-Island</span><br data-dcnode-id="2314"><span data-dcnode-id="2313" instrument_node="">-Split in a river</span><br data-dcnode-id="2312"><span data-dcnode-id="2311" instrument_node="">-2, maybe 3, sets of levels in your town connected by hills</span><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">-2 areas where water rushes in to the ocean</span><br data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node="">-1, 2, 3, or even 4 ponds</span><br data-dcnode-id="2306"><br data-dcnode-id="2305"><span data-dcnode-id="2304" instrument_node="">There are also may other variations of things in the town that you could keep restarting the game to get, like having one of the 5 different town fruits, or the position of the main houses, the neighbor houses, or the stores like Able's and Nooks.</span></div></div><span data-dcnode-id="2301" instrument_node="">

</span></div><span data-dcnode-id="2116" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="2099" data-field="cheat" id="cb79850"><div data-dcnode-id="2100"><span data-dcnode-id="2115" instrument_node="">Well when it starts gettin' cold and you find snowballs and you think "Snowman Furniture!" but you need to make a perfect snowman! I'll tell you how to make one! (There super hard for you but not me cause I have experience) </span><br data-dcnode-id="2114"><br data-dcnode-id="2113"><span data-dcnode-id="2112" instrument_node="">1. Make sure your hair is in a flat style. (No bedhair)</span><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">2. Find 2 snowballs. (Kinda close in there vicinities)</span><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">3. Roll one so it's as tall as you character. (or just about as tall)</span><br data-dcnode-id="2107"><span data-dcnode-id="2106" instrument_node="">4. Roll the other one until it's up to your nose. (or about)</span><br data-dcnode-id="2105"><span data-dcnode-id="2104" instrument_node="">5. Roll the one that's up to your nose on top of the bigger one.</span><br data-dcnode-id="2103"><br data-dcnode-id="2102"><span data-dcnode-id="2101" instrument_node="">Now wait (or Time Travel) 'till you get the letter with the furniture! </span></div></div><span data-dcnode-id="2098" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="2065" data-field="cheat" id="cb85680"><div data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">If you don't log into a certain character on your game for a very long time, your character will wake up with "bed hair". Bed hair is when your hair sticks up and is messy (all over the place). There is a myth that wearing flowers, clovers, hats or headgear etc. will prevent bed hair but this is NOT true. To get rid of bed hair, go to Shampoodle and Harriet will style your hair again (for the regular price of 3,000 Bells). I recommend logging in every once in a while, to prevent being a bed head.</span></div></div><span data-dcnode-id="2064" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1954" data-field="cheat" id="cb78998"><div data-dcnode-id="1955"><span data-dcnode-id="1961" instrument_node="">Coconut Palms</span><br data-dcnode-id="1960"><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">Sometimes you see a coconut on the shore line. Get a shovel and plant the coconut on the shore line that seperates the grass from the sand. Plant the coconut and in 3 days (you can time travel) go back and there is your coconut tree! You can plant as many as you like to get alot of bells. Since its a foreign fruit its worth 500 bells. The only bad thing is there is 2 coconuts on the tree instead of 3! Hope It helped!</span><br data-dcnode-id="1957"><br data-dcnode-id="1956"></div></div><span data-dcnode-id="1953" instrument_node="">

</span><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Ways to get Bells and more Tips!</span></strong><span data-dcnode-id="1891" instrument_node="">
</span></div><span data-dcnode-id="1889" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1851" data-field="cheat" id="cb80655"><div data-dcnode-id="1852"><span data-dcnode-id="1888" instrument_node="">- Go fishing or find bugs! Sell them to get a lot of bells!</span><br data-dcnode-id="1887"><br data-dcnode-id="1886"><span data-dcnode-id="1885" instrument_node="">- Get items or sell them by looking inside the Recycling Bin at the Town Hall or look in the Lost and Found by talking to the dog (on the left) that is guarding the gate.</span><br data-dcnode-id="1884"><br data-dcnode-id="1883"><span data-dcnode-id="1882" instrument_node="">- Give unwanted items to your town residents. (Furniture, Walls, etc.) Mail it to them then they'll give you a gift back which could be better then the one you sent! Then you'll be able to sell it if you want.</span><br data-dcnode-id="1881"><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node="">- Hit rocks with your shovel! Every day there will be a rock full of bells! First, you find a rock and go in front of it. Second, you dig one hole behind you and another hole either on the left or right side of you. If there is no bells coming out then move on to the next rock. But if there is bells coming out keep hitting the rock until no bells come out. You should at least earn 8,100 Bells or even more!</span><br data-dcnode-id="1878"><br data-dcnode-id="1877"><span data-dcnode-id="1876" instrument_node="">- Get or find Foreign fruits! Visit your friend's town and take some fruits and go back to your town to sell it! It costs about 500 Bells! Or you could plant it so it could turn into a tree. Another way of gettig Foreign fruit is sending mail to one of your town residents and giving them a fruit. Possibility of them giving a fruit back. BUT SOME POSSIBLY WON'T.</span><br data-dcnode-id="1875"><br data-dcnode-id="1874"><span data-dcnode-id="1873" instrument_node="">- Well you could save your bells? Save your bells into your bank account. Keep doing it and you'll end up having huge amount of bells in your account!</span><br data-dcnode-id="1872"><br data-dcnode-id="1871"><span data-dcnode-id="1870" instrument_node="">- Find Gyroids or Fossils! Sell them to Tom Nook and get amounts of bells back! You don't have to give the fossils to Blathers (Owl in the museum) but only if you want too.</span><br data-dcnode-id="1869"><br data-dcnode-id="1868"><span data-dcnode-id="1867" instrument_node="">- Make Money trees! YOU NEED A GOLDEN SHOVEL TO DO THIS! &lt;- It's the only</span><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node="">shovel that can do this. (A easy way to get the golden shovel is to make sure you have two shovels. Then you bury ONLY ONE of the shovels. You wait till the next day and dig it back up. Then you got a golden shovel.) First, dig a hole wherever you want. Then you bury your money. (As much as you want). Then the gold you buried will turn into a money tree. MAKE SURE YOU TAKE CARE OF IT!</span><br data-dcnode-id="1864"><br data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">NO NEED BUYING TREES! - Instead of wasting your money buying trees at Tom Nook's store. You could use your town's fruit or any other fruit and bury it. It will turn into a tree! Which does not take any money from you.</span><br data-dcnode-id="1861"><br data-dcnode-id="1860"><span data-dcnode-id="1859" instrument_node="">OH COCONUT, WHERE ARE YOU? - Have you ever seen a coconut washed up on the shore? Well if you have, TAKE IT! But don't sell it just yet. Try making a bunch of coconut trees. A whole pocket full of coconuts is 7,500 Bells. But imagine how it would be if you could sell sooooo much of them!</span><br data-dcnode-id="1858"><br data-dcnode-id="1857"><span data-dcnode-id="1856" instrument_node="">Hope this helps you with getting Bells! Good luck! </span><img alt="" border="0" data-dcnode-id="1855" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/smile.gif&amp;raw" vspace="2"><br data-dcnode-id="1854"><br data-dcnode-id="1853"></div></div><span data-dcnode-id="1850" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1711" data-field="cheat" id="cb72550"><div data-dcnode-id="1712"><span data-dcnode-id="1716" instrument_node="">Many people do not know how to plant coconut trees, or do not know how to get them!</span><br data-dcnode-id="1715"><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">To get them, first have a coconut wash up on the shore of your town.  Plant the coconut normally on the part of the land which the sand and dirt/grass meet!  That way, it will grow most likely!  Good luck!</span></div></div><span data-dcnode-id="1710" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1381" data-field="cheat" id="cb82492"><div data-dcnode-id="1382"><span data-dcnode-id="1432" instrument_node="">What you'll need:</span><br data-dcnode-id="1431"><br data-dcnode-id="1430"><span data-dcnode-id="1429" instrument_node="">- A shovel</span><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">- A friend</span><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">- A house to glitch against</span><br data-dcnode-id="1424"><br data-dcnode-id="1423"><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">1) Dig holes against a house, like on the diagram below:</span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">GGGGGG</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">HGOOOG</span><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">HGOOOG</span><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">HOOOOG</span><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">HOOOOG</span><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node="">GGGGGG</span><br data-dcnode-id="1408"><br data-dcnode-id="1407"><span data-dcnode-id="1406" instrument_node="">G = Ground</span><br data-dcnode-id="1405"><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node="">O = Hole</span><br data-dcnode-id="1402"><br data-dcnode-id="1401"><span data-dcnode-id="1400" instrument_node="">H = House</span><br data-dcnode-id="1399"><br data-dcnode-id="1398"><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">2) Get you and your friend to run into the space of ground between the holes and the house (sort of like the lighthouse glitch)</span><br data-dcnode-id="1395"><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">3) Eventually, one of you will end up inbetween 4 holes. This may take a long time to do.</span><br data-dcnode-id="1392"><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">4) Try using a shovel inbetween the holes. It may make a noise as if you're hitting a building or a rock, or you/your friend may dig a hole from a space away.</span><br data-dcnode-id="1389"><br data-dcnode-id="1388"><span data-dcnode-id="1387" instrument_node="">5) Get the person who's not trapped to fill the holes to release the trapped person.</span><br data-dcnode-id="1386"><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">Thank you for reading, and happy glitching </span><img alt="" border="0" data-dcnode-id="1383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/smile.gif&amp;raw" vspace="2"></div></div><span data-dcnode-id="1380" instrument_node="">

</span></div><span data-dcnode-id="1292" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1289" data-field="cheat" id="cb72976"><div data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">When shaking trees, you are bound to find some bees. They will come down and if you can't go inside a building or catch them with your net, you will be stung. Whenever you talk to other villagers like this they will be freaked out and tell you not to go around shaking trees. The normal way to fix this would be to go buy medicine from Nook's for 400 bells. However, if you went to Shampoodle in the city and got the Mii Mask, simply put that on and it will be as though you were never stung!</span></div></div><span data-dcnode-id="1288" instrument_node="">

</span></div><span data-dcnode-id="1258" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1255" data-field="cheat" id="cb77769"><div data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Ever taken a painting to the museum and told it was a fake? Of course. Everyone has. Funny thing can happen though. If the museum already has a painting and you buy the same one, obviously the newly one you bought is a fake. The thing is Mr. Blathers won't say it's a fake. If you take it to Nook, he'll buy it like it's the genuine item. </span></div></div><span data-dcnode-id="1254" instrument_node="">

</span></div><span data-dcnode-id="1229" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1221" data-field="cheat" id="cb76634"><div data-dcnode-id="1222"><span data-dcnode-id="1228" instrument_node="">Want to go slow? Well all you do is press B half way down (around that point) and walk. You should go slow and it is best when you need to get somwhere in a certain amount of time and you are right next door to the location!</span><br data-dcnode-id="1227"><span data-dcnode-id="1226" instrument_node="">Hope i helped!!</span><br data-dcnode-id="1225"><br data-dcnode-id="1224"><span data-dcnode-id="1223" instrument_node="">Shaymin_Queen</span></div></div><span data-dcnode-id="1220" instrument_node="">

</span></span><span data-dcnode-id="1200" instrument_node="">
</span><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">The Bunker/Cooper Glitch</span></strong><span data-dcnode-id="1197" instrument_node="">
</span></div><span data-dcnode-id="1195" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1189" data-field="cheat" id="cb81993"><div data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">While in the the "gate" area of your town, with Cooper and Bunker, you can actually get squeezed in between them and the wall! You'll need two players while on wifi to do this glitch. </span><br data-dcnode-id="1193"><br data-dcnode-id="1192"><span data-dcnode-id="1191" instrument_node="">To get in that small crack, you must both crash into it. Both coming from slightly different angles. Eventually, one of you will be pushed right next to Bunker/Cooper, almost inside of them. It'll take a few tries, but you'll soon be able to get it really easy.</span></div></div><span data-dcnode-id="1188" instrument_node="">
</span><div class="cheatbuttons section-footer" data-dcnode-id="1176"><span data-dcnode-id="1187" instrument_node="">

</span><span class="pull-right" data-dcnode-id="1169" style="margin-top:8px;"><span data-dcnode-id="1170" instrument_node="">
</span></span><span data-dcnode-id="1168" instrument_node="">
</span><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">The lighthouse glitch</span></strong><span data-dcnode-id="1165" instrument_node="">
</span></div><span data-dcnode-id="1163" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1154" data-field="cheat" id="cb80919"><div data-dcnode-id="1155"><span data-dcnode-id="1162" instrument_node="">Once you obtain the Lighthouse from donating a certain amount of money to the Town Hall's donation section, you'll be given a lighthouse near the beach of your town. To get on top of the lighthouse, you'll need to make sure that it's closed to a corner of land. If not, it will be much more difficult, but could still work.</span><br data-dcnode-id="1161"><br data-dcnode-id="1160"><span data-dcnode-id="1159" instrument_node="">If your lighthouse has a small strip of land on the side of it; it's much easier to get on top. At just about the same time you and your friend crash into that small crevice. This MUST have two or more people to do it. You'll want to get one person in the strip merely seconds before the other so that you can push him into the edge of the land; ultimately ending up in the character on top of the lighthouse. Though, only one person is up there. Once one is up there, they can get the other up as well. Simply take out your shovel and do the same thing, but before the other gets to the end of the small strip bury a hole so that they are stuck in between the hole and the land's edge. Then they must twist, and will soon be atop the lighthouse. </span><br data-dcnode-id="1158"><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">If you don't have that small strip of land beside your lighthouse you can do the same thing with the shovel, but from the ground and not on top of the lighthouse.</span></div></div><span data-dcnode-id="1153" instrument_node="">
</span><div class="cheatbuttons section-footer" data-dcnode-id="1141"><span data-dcnode-id="1152" instrument_node="">
</span><div class="by text-small clearfix" data-dcnode-id="1143"><span data-dcnode-id="1151" instrument_node="">
</span><span class="pull-left" data-dcnode-id="1145"><span class="hidden-xs" data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Submitted by: </span></span><span class="cheatsubmitter" data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Justin</span></span><span data-dcnode-id="1146" instrument_node=""> on Mar 20, 2010</span></span><span data-dcnode-id="1144" instrument_node="">
</span></div><span data-dcnode-id="1142" instrument_node="">
</span></div><span data-dcnode-id="1140" instrument_node="">
</span></div><span data-dcnode-id="1138" instrument_node="">

</span><span class="pull-right" data-dcnode-id="1134" style="margin-top:8px;"><span data-dcnode-id="1135" instrument_node="">
</span></span><span data-dcnode-id="1133" instrument_node="">
</span><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">The museum glitch</span></strong><span data-dcnode-id="1130" instrument_node="">
</span></div><span data-dcnode-id="1128" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1122" data-field="cheat" id="cb80976"><div data-dcnode-id="1123"><span data-dcnode-id="1127" instrument_node="">This glitch is just like the able's glitch, and the lighthouse glitch, but in the museum. This glitch is usually the hardest to do, but once done it's really fun. </span><br data-dcnode-id="1126"><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">First, get a friend or two to help you. You NEED them to do this, but more then one works better. At the count of three, rush into the small crack in between the sign and the roost. After a few, or many, tries you'll be pushed through the wall and into the black darkness outside of the actual museum. Here you have a limited space to run around, but it's really fun to take pictures. You can't get out of this unless you turn your console off.</span></div></div><span data-dcnode-id="1121" instrument_node="">
</span><div class="cheatbuttons section-footer" data-dcnode-id="1109"><span data-dcnode-id="1120" instrument_node="">
</span><div class="by text-small clearfix" data-dcnode-id="1111"><span data-dcnode-id="1119" instrument_node="">

</span></div><span data-dcnode-id="1110" instrument_node="">

</span><span class="pull-right" data-dcnode-id="1102" style="margin-top:8px;"><span data-dcnode-id="1103" instrument_node="">
</span></span><span data-dcnode-id="1101" instrument_node="">
</span><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">The nook glitch</span></strong><span data-dcnode-id="1098" instrument_node="">
</span></div><span data-dcnode-id="1096" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1093" data-field="cheat" id="cb80979"><div data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Like the others, this glitch recquires more then one person and the final upgraded version on nooks. On the bottom floor, back away as far as you can from the sign above his register. At the count of three, rush into the small crack in between it, and try to get your friends to get there just seconds before you. If this is done right, you'll be pushed into the wall and into the black outer part of the store. There's not much space, but if you save while in this you'll be pushed even higher, and will appear as a huge character right above nook.</span></div></div><span data-dcnode-id="1092" instrument_node="">
</span><div class="cheatbuttons section-footer" data-dcnode-id="1080"><span data-dcnode-id="1091" instrument_node="">

</span><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Tree Humper Other</span></strong><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1052" data-field="cheat" id="cb82969"><div data-dcnode-id="1053"><span data-dcnode-id="1066" instrument_node="">This glitch is used with a tree.</span><br data-dcnode-id="1065"><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">Go to a tree, circle a tree (walk around a tree), close in on the tree (get closer as you walk around the tree), when you are close enough to shake it (while moving), press A and keep moving.</span><br data-dcnode-id="1062"><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">You can move away from the tree and still shake things. With this glitch, you can pretend to hump people or bob your head! During Wi-Fi or in your town alone. </span><img alt="" border="0" data-dcnode-id="1059" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/wink.gif&amp;raw" vspace="2"><br data-dcnode-id="1058"><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">[ watch video here ] - &lt;a href="http://www.youtube.com/watch?v=c1VcfIXPlYw" target="_blank"&gt;</span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3Dc1VcfIXPlYw%253C/a%253E" target="_blank"><span data-dcnode-id="1055" instrument_node="">http://www.youtube.com/watch?v=c1VcfIXPlYw&lt;/a&gt;</span></a></div></div><span data-dcnode-id="1051" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="1022" data-field="cheat" id="cb74308"><div data-dcnode-id="1023"><span data-dcnode-id="1025" instrument_node="">If you are on Wi-Fi with a person (I only tried with 1 person over) there is a chance of lag. while doing that the person you are with will sometimes seem to walk through trees or sometimes will seem to teleport to a location a couple feet away! </span><img alt="" border="0" data-dcnode-id="1024" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/smile.gif&amp;raw" vspace="2"></div></div><span data-dcnode-id="1021" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="951" data-field="cheat" id="cb80464"><div data-dcnode-id="952"><span data-dcnode-id="957" instrument_node=""> OK, you know the King Tut Mask? Well, it's cursed. Yeah. Seriously cursed. I dunno what Nintendo was thinking. Here's the story. I was once in the Able Sisters' when I found a AWESOME looking mask, so I bought it. I put it on, but it had a different tune, like the Zap Masks, but different, like lower. So when I went outside I found a fossil spot, and walked over it, PITFALL! It was not there before!!! I thought nothing of it. I run alot in this but I kept tripping. Even I tripped when I walked! So only 2 days from buying it, I put it in my basement hoping to not see it again. But I sold it, FINNALY!!! </span><br data-dcnode-id="956"><br data-dcnode-id="955"><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">The chance of all these happening is quite small!!! =O</span></div></div><span data-dcnode-id="950" instrument_node="">

</span><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Candy is better than bunny foil!!!</span></strong><span data-dcnode-id="888" instrument_node="">
</span></div><span data-dcnode-id="886" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="883" data-field="cheat" id="cb76036"><div data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Okay, so you're digging for eggs. You REALLY want some bunny foil. To give to Zipper T., right? Well don't be discouraged if it seems that you only get candy... Because candy is better than bunny foil!! Once you've found all the bunny eggs that can be found (or what seems like it), save, start your game again, and set the time to Festivale. This is not a major time jump, (for 2009, Bunny Day is April 12, and Festivale is February 23)therefore you won't see much of a difference in weeds. Once at Festivale, go to Pave and give him three of the candies in the color he asks for. He will reward you with a piece from the Pave series, 12,000 bells each! (Sell them, the colors are a bit.. well, they're not my style.) You make the most money if you have 4 characters, each gets about 12-60,000 bells each!! What a haul!!  </span></div></div><span data-dcnode-id="882" instrument_node="">

</span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Golden Slingshot</span></strong><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="818" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="812" data-field="cheat" id="cb80670"><div data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">All you need is a regular slingshot.  In your town a balloon with a present will come by about every 10 minutes.  The requirement is to have shot down at least 10 balloon presents. Then the next time you shoot down a balloon present, it may be a golden slingshot! You may not get one the first time but try and try again until you get one. The golden slingshot has a three way shot so you have a better chance of shooting down a balloon.</span><br data-dcnode-id="816"><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">hope this helped! </span></div></div><span data-dcnode-id="811" instrument_node="">

</span><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Harvest Fest</span></strong><span data-dcnode-id="783" instrument_node="">
</span></div><span data-dcnode-id="781" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="750" data-field="cheat" id="cb72756"><div data-dcnode-id="751"><span data-dcnode-id="780" instrument_node="">On Thanksgiving day from: 3:00pm-8:00pm Franklin turkey will come visit your town as a special visitor. Tortimer will be in front of the Town Hall, go talk to him. He will tell you a special visitor is coming then ask you to deliver you of your town members "Fork &amp; Knife". You can either find them and give it to them(which I never did, so you could see what happens) OR find Franklin to give it to him. He will reward you with one of the many Harvest Furniture pieces:</span><br data-dcnode-id="779"><span data-dcnode-id="778" instrument_node="">Harvest Wall</span><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">Harvest Rug</span><br data-dcnode-id="775"><span data-dcnode-id="774" instrument_node="">Harvest TV</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">Harvest Bed</span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node="">Harvest Lamp</span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">Harvest Dresser</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">Harvest Bureu</span><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">Harvest Mirror</span><br data-dcnode-id="763"><span data-dcnode-id="762" instrument_node="">Harvest Clock</span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">Harvest Sofa</span><br data-dcnode-id="759"><span data-dcnode-id="758" instrument_node="">Harvest Table</span><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node=""> </span><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">That all I found you might find more...Just a heads up every time you give Franklin the "Fork &amp; Knife" he will go off and hide some where else in your town. Behind houses, trees, and signs are most common. All YOU have to do is get more "Forks &amp; knifes" give them to him and Wall-LA! You can't buy the Harvest items, and they sell for a lot so even if you don't plan on keeping the furniture HAPPY HUNTING/MONEY MAKING!!!</span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node=""> </span></div></div><span data-dcnode-id="749" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="678" data-field="cheat" id="cb78867"><div data-dcnode-id="679"><span data-dcnode-id="689" instrument_node="">When you enter the HRA in the city, immediately turn right and keep on going until you the the mini table and press A, if you're close eoungh an orange speech bubble will appear and say</span><br data-dcnode-id="688"><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node="">"*Happy Room Academy*</span><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">The home is a window</span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">into the soul, and sun light</span><br data-dcnode-id="681"><span data-dcnode-id="680" instrument_node="">brightens your life."</span></div></div><span data-dcnode-id="677" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="642" data-field="cheat" id="cb72815"><div data-dcnode-id="643"><span data-dcnode-id="646" instrument_node="">Ok, if you go to Mable and Sable's and talk to Sable, she'll usually ignore you. Well, if you keep talking to here everyday, then she will become more friendly with you and if u keep talking to her more after that, her and Mable eventually tell you of how they started their business and about their parents.</span><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">And c'mon, haven't you always wanted to know where those little porcupines came from anyways???</span></div></div><span data-dcnode-id="641" instrument_node="">

</span></div><span data-dcnode-id="471" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="389" data-field="cheat" id="cb81730"><div data-dcnode-id="390"><span data-dcnode-id="470" instrument_node="">#1  Go to the day before the fourth sunday in January (the day before the flea market in January).</span><br data-dcnode-id="469"><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">#2  Empty all the stuff in your pockets and put the stuff outside of your pockets on the ground.</span><br data-dcnode-id="466"><br data-dcnode-id="465"><span data-dcnode-id="464" instrument_node="">#3  Go to your house and take everything that's on the bottom floor of your house (NOT YOUR BASEMENT) out and put it in a dresser.  Drop the dresser outside of your house.</span><br data-dcnode-id="463"><br data-dcnode-id="462"><span data-dcnode-id="461" instrument_node="">#4  Fish until your pockets are full and put the fish in your house. Repeat this step until your house is full.</span><br data-dcnode-id="460"><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">#5  Skip to the fleamarket that is the fourth sunday of january.</span><br data-dcnode-id="457"><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">#6  Sell all your fish for double the price that you would sell to Nook.</span><br data-dcnode-id="454"><br data-dcnode-id="453"><span data-dcnode-id="452" instrument_node="">&lt;span class="wikilists"&gt;</span><ol data-dcnode-id="449"><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node=""> 7 Repeat steps 1 - 6 except in febuary not january </span></li></ol><span data-dcnode-id="448" instrument_node="">&lt;/span&gt;&lt;!-- wikilists --&gt;</span><br data-dcnode-id="447"><br data-dcnode-id="446"><span data-dcnode-id="445" instrument_node="">&lt;span class="wikilists"&gt;</span><ol data-dcnode-id="442"><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node=""> 8 Repeat steps 1 - 6 except in march not febuary </span></li></ol><span data-dcnode-id="441" instrument_node="">&lt;/span&gt;&lt;!-- wikilists --&gt;</span><br data-dcnode-id="440"><br data-dcnode-id="439"><span data-dcnode-id="438" instrument_node="">#9 Go to easter, that means bunny day.dig up all the bunny eggs put the candy in your dresser or outside the town hall give the bunny foils to zipper t bunny .then sell the bunny stuff.</span><br data-dcnode-id="437"><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">#9 skip 2 days ahead load your charater walk to the your mail box then save</span><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">(this is so the game will let the bunny eggs to get buried in the next step)</span><br data-dcnode-id="432"><br data-dcnode-id="431"><span data-dcnode-id="430" instrument_node="">#10 go back to bunny day the eggs will be rebuired  because of step 8 ) dig up all the bunny eggs put the candy in your dresser or outside the town hall give the bunny foils to zipper t bunny . then sell the bunny stuff. repeat step 8 then 7 as many times until your satisfied with the amount of bells you've made . </span><br data-dcnode-id="429"><br data-dcnode-id="428"><span data-dcnode-id="427" instrument_node="">#11 repeat steps 1 - 6 except in may not march </span><br data-dcnode-id="426"><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">#12 repeat steps 1 - 6 except in june not may</span><br data-dcnode-id="423"><br data-dcnode-id="422"><span data-dcnode-id="421" instrument_node="">#13 repeat steps 1 - 6  except in july not june </span><br data-dcnode-id="420"><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">#14 repeat steps 1 - 6  except in september not july or august beacause there is no flea market in august.</span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node="">&lt;span class="wikilists"&gt;</span><ol data-dcnode-id="413"><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node=""> 15 wear  one of your designs ,put the candy that you got from easter in your letters to keep from getting stolen from your neibors on halloween .Go to halloween night and give jack the candy out of your letters (he is the one that doesnt chase after you). Duh you have to take it out of yor letters before you speak to him !restock on candy when you run out of candy in your letters.</span></li></ol><span data-dcnode-id="412" instrument_node="">&lt;/span&gt;&lt;!-- wikilists --&gt;</span><br data-dcnode-id="411"><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node=""> </span><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node="">&lt;span class="wikilists"&gt;</span><ol data-dcnode-id="404"><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node=""> 16 when you run out of candy to give jack go  to the fourth thursday of november and collect the knives and forks from the Mayor and give them to Franklin the turkey (the harvest festival).sell the furniture .</span></li></ol><span data-dcnode-id="403" instrument_node="">&lt;/span&gt;&lt;!-- wikilists --&gt;</span><br data-dcnode-id="402"><br data-dcnode-id="401"><span data-dcnode-id="400" instrument_node="">#17 (Make sure you have lots of different sets of clothing and accessories) and go to december twenty-fourth and find jingle multiple times using different accessories and clothing until you run out.  Sell all jingle furniture.</span><br data-dcnode-id="399"><br data-dcnode-id="398"><span data-dcnode-id="397" instrument_node="">#18 Deposit 50,000 bells into your bank then save and quit. Go to your Wii menu and skip ten years ahead. go back to the game an play look in your mailbox you will have earned 99,999 bells of intrest !</span><br data-dcnode-id="396"><br data-dcnode-id="395"><span data-dcnode-id="394" instrument_node="">#19 When you get to the max year you can skip to change the year to 2000)repeat step 17 until you have no more money in your pockets left.  </span><br data-dcnode-id="393"><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">you will have the most money youve ever seen without hacking!!!!!!!!</span></div></div><span data-dcnode-id="388" instrument_node="">
