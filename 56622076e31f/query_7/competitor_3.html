</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="9846" data-field="cheat" id="cb73689"><div data-dcnode-id="9847"><span data-dcnode-id="9851" instrument_node="">In AC:CF, you can change the type and colour of your shoes. Firstly, make sure its a clear or sunny day (not raining, cloudy, stormy, or snowing)then put on your favourite shirt (might be good to put on the one you wear most) and head over to the city, with at least 500 bells. When you get to the city, look for the auction house, but don't enter it. On the right of the auction house, there should be a run  down house with a boarded up door. In front of the door, there should be a black and white skunk sitting on one of the steps. Talk to him, and he'll change your shoes. He's use your most dominating colour, e.g. red hair, green shirt = red shoes, green laces. Thanks!</span><br data-dcnode-id="9850"><br data-dcnode-id="9849"><span data-dcnode-id="9848" instrument_node="">NOTE: Kicks may not be there every day! </span></div></div><span data-dcnode-id="9845" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="9809" data-field="cheat" id="cb72662"><div data-dcnode-id="9810"><span data-dcnode-id="9814" instrument_node="">alright so go to any sunday at 8:00 and find joan walking in your town and check her turnip prices. if it is below 100 then get a friend to get on his wii and go to any day theats not a sunday and check turnip prices to sell at tom nooks store.... if it is above 120 then buy alot of turnips from your town for below 90 and sell it to ur friends town for over 120... and over and over again...</span><br data-dcnode-id="9813"><br data-dcnode-id="9812"><span data-dcnode-id="9811" instrument_node="">i got 2 mill an hour</span></div></div><span data-dcnode-id="9808" instrument_node="">

</span><strong data-dcnode-id="9781"><span data-dcnode-id="9782" instrument_node="">2 Ways to Gain Bells or HRA Points in the Fall</span></strong><span data-dcnode-id="9780" instrument_node="">
</span></div><span data-dcnode-id="9778" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="9743" data-field="cheat" id="cb72547"><div data-dcnode-id="9744"><span data-dcnode-id="9777" instrument_node="">1. When it is fall, look around your town for mushrooms. Some are just plain mushrooms while others contain mush furniture. You can either sell the mush furniture for a profit or, you can place the furniture in your home for some HUGE points in the Happy Room Academy.</span><br data-dcnode-id="9776"><br data-dcnode-id="9775"><span data-dcnode-id="9774" instrument_node="">2. When it is the Harvest Festival (around 3 pm on Thanksgiving), go to the mayor and he will give you a fork and a knife. Then, look around for Franklin the turkey and give him the fork and knife (he is usually hiding behind something)and he will give you harvest furniture. I assume they are worth big points in the HRA so you can place them in your home or sell them for a profit. Then go to the mayor and repeat the process.</span><br data-dcnode-id="9773"><br data-dcnode-id="9772"><span data-dcnode-id="9771" instrument_node="">Franklin becomes very annoying because he changes his hiding place all the time. Plus he sometimes gives you the same furniture. I made so many bells because he kept on selling me the furniture.</span><br data-dcnode-id="9770"><br data-dcnode-id="9769"><span data-dcnode-id="9768" instrument_node="">The 2nd way earns you a lot of Bells because it seems like the Mayor won't stop giving you forks and knives.</span><br data-dcnode-id="9767"><br data-dcnode-id="9766"><span data-dcnode-id="9765" instrument_node="">Hey, if anybody knows how to get the entire harvest theme, please contact me at the e-mail below. Here is what I have so far.</span><br data-dcnode-id="9764"><br data-dcnode-id="9763"><span data-dcnode-id="9762" instrument_node="">Harvest Wall</span><br data-dcnode-id="9761"><span data-dcnode-id="9760" instrument_node="">Harvest Rug</span><br data-dcnode-id="9759"><span data-dcnode-id="9758" instrument_node="">Harvest TV</span><br data-dcnode-id="9757"><span data-dcnode-id="9756" instrument_node="">Harvest Bed</span><br data-dcnode-id="9755"><span data-dcnode-id="9754" instrument_node="">Harvest Lamp</span><br data-dcnode-id="9753"><span data-dcnode-id="9752" instrument_node="">Harvest Dresser</span><br data-dcnode-id="9751"><span data-dcnode-id="9750" instrument_node="">Harvest Bureu</span><br data-dcnode-id="9749"><span data-dcnode-id="9748" instrument_node="">Harvest Mirror</span><br data-dcnode-id="9747"><br data-dcnode-id="9746"><span data-dcnode-id="9745" instrument_node="">Is there anything else?</span></div></div><span data-dcnode-id="9742" instrument_node="">

</span><strong data-dcnode-id="9715"><span data-dcnode-id="9716" instrument_node="">28,700 - 56,700 Bells a week</span></strong><span data-dcnode-id="9714" instrument_node="">
</span></div><span data-dcnode-id="9712" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="9649" data-field="cheat" id="cb80669"><div data-dcnode-id="9650"><span data-dcnode-id="9711" instrument_node="">Want 28,700 to 56,700 bells a week? Here's how!</span><br data-dcnode-id="9710"><br data-dcnode-id="9709"><span data-dcnode-id="9708" instrument_node="">First dig 3 holes behind you next to a rock</span><br data-dcnode-id="9707"><span data-dcnode-id="9706" instrument_node="">Example:</span><br data-dcnode-id="9705"><span data-dcnode-id="9704" instrument_node="">... &lt;- holes</span><br data-dcnode-id="9703"><span data-dcnode-id="9702" instrument_node=""> .  &lt;- you</span><br data-dcnode-id="9701"><span data-dcnode-id="9700" instrument_node=""> .  &lt;- rock</span><br data-dcnode-id="9699"><br data-dcnode-id="9698"><span data-dcnode-id="9697" instrument_node="">Next, hit the rock, check if it's your money rock for that day, or if you have one. If it isn't repeat this untill you find your money rock</span><br data-dcnode-id="9696"><br data-dcnode-id="9695"><span data-dcnode-id="9694" instrument_node="">What you'll need to do, is hit it 7 times, but make sure you DON'T move, or you'll screw up.</span><br data-dcnode-id="9693"><br data-dcnode-id="9692"><span data-dcnode-id="9691" instrument_node="">1st hit: 100 bells</span><br data-dcnode-id="9690"><span data-dcnode-id="9689" instrument_node="">2nd hit: 200 bells</span><br data-dcnode-id="9688"><span data-dcnode-id="9687" instrument_node="">3rd hit: 300 bells</span><br data-dcnode-id="9686"><span data-dcnode-id="9685" instrument_node="">4th hit: 500 bells</span><br data-dcnode-id="9684"><span data-dcnode-id="9683" instrument_node="">5th hit: 1,000 bells</span><br data-dcnode-id="9682"><span data-dcnode-id="9681" instrument_node="">6th hit: 2,000 bells</span><br data-dcnode-id="9680"><span data-dcnode-id="9679" instrument_node="">7th hit: 4,000 bells</span><br data-dcnode-id="9678"><span data-dcnode-id="9677" instrument_node="">8th hit or more: nothing more</span><br data-dcnode-id="9676"><br data-dcnode-id="9675"><span data-dcnode-id="9674" instrument_node="">If you move while hitting the rock, or stop hitting it at any time, you will NOT get the 4,000 bells, but you may still bet the 2,000 bells.</span><br data-dcnode-id="9673"><br data-dcnode-id="9672"><span data-dcnode-id="9671" instrument_node="">If you do this each day for a week, and each time you get all the way to 4,000 bell bag, then</span><br data-dcnode-id="9670"><br data-dcnode-id="9669"><span data-dcnode-id="9668" instrument_node="">1 day of getting the 4,000 bell bag</span><br data-dcnode-id="9667"><br data-dcnode-id="9666"><span data-dcnode-id="9665" instrument_node="">100 + 200 + 300 + 500 + 1,000 + 2,000 + 4,000 x 7 = 56,700 bells.</span><br data-dcnode-id="9664"><br data-dcnode-id="9663"><span data-dcnode-id="9662" instrument_node="">or </span><br data-dcnode-id="9661"><br data-dcnode-id="9660"><span data-dcnode-id="9659" instrument_node="">1 day of getting the 2,000 bell bag</span><br data-dcnode-id="9658"><br data-dcnode-id="9657"><span data-dcnode-id="9656" instrument_node="">100 + 200 + 300 + 500 + 1,000 + 2,000 x 7 = 28,700 bells.</span><br data-dcnode-id="9655"><br data-dcnode-id="9654"><span data-dcnode-id="9653" instrument_node="">Hope I helped!</span><br data-dcnode-id="9652"><br data-dcnode-id="9651"></div></div><span data-dcnode-id="9648" instrument_node="">

</span><strong data-dcnode-id="9458"><span data-dcnode-id="9459" instrument_node="">Avoid Resetti</span></strong><span data-dcnode-id="9457" instrument_node="">
</span></div><span data-dcnode-id="9455" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="9449" data-field="cheat" id="cb78153"><div data-dcnode-id="9450"><span data-dcnode-id="9454" instrument_node="">In the last game, there was no possible way to avoid Resetti. However, there is one way I've found in this game. It's not something you can easily make happen, it's easier said than done. What happened to me was when Pete came to my door to give me a letter from Nintendo, my pockets were full so he said he'd come back later. So then I got curious, if he waits at your door, how would Resetti come? So I reset, I talked to Pete, and sure enough Resetti never showed. The hard part about this is that you have to wait until Nintendo sends out a letter. Once Pete shows up though, you can keep resetting. You can save as well, but make sure you have 8 letters in your pocket. If you have less, when you play next he will give it to you and leave.</span><br data-dcnode-id="9453"><br data-dcnode-id="9452"><span data-dcnode-id="9451" instrument_node="">So keep 8 letters in your pocket all the time, switch in and out when you get new ones in your mailbox. And when Pete comes, he will wait at your door until you start up with an open spot for his letter.</span></div></div><span data-dcnode-id="9448" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="8694" data-field="cheat" id="cb81733"><div data-dcnode-id="8695"><span data-dcnode-id="8696" instrument_node="">Hey you! Are you annoyed that scorpions and tarantulas keep on biting you when you try to catch them? Well here is how to catch those little demons. Fast forward time to August at 1:00 A.M. and run around until you find one. Do not have your net out. If you take it out they will run after you. when you see one, get a bit of a distance and take out your net. It will find you. When it does, run to the level of your town thing (you know the hills where you climb up and down!) and cut the corner really fast. That should leave the tarantula or scorpion running against the wall. It will be stuck like that. Now swing your net. If you miss try swinging in a different spot but BE CAREFUL you don't set it free or else X(! Another way is get it stuck on a sign post.</span></div></div><span data-dcnode-id="8693" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="8665" data-field="cheat" id="cb81411"><div data-dcnode-id="8666"><span data-dcnode-id="8667" instrument_node="">If you change your complete outfit INCLUDING HAIR, kick will not recognize you and you will be able to change your shoe color to whatever you want! THis cheat also works on the prize man.</span></div></div><span data-dcnode-id="8664" instrument_node="">

</span><strong data-dcnode-id="8642"><span data-dcnode-id="8643" instrument_node="">Cheating Nook and Earning Easy Bells</span></strong><span data-dcnode-id="8641" instrument_node="">
</span></div><span data-dcnode-id="8639" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="8602" data-field="cheat" id="cb75071"><div data-dcnode-id="8603"><span data-dcnode-id="8638" instrument_node="">You know that annoying part of the game, where Nook makes you work for him? You can cheat him! I do! Ok, so here is what he asks you to do and how you can cheat him:</span><br data-dcnode-id="8637"><br data-dcnode-id="8636"><span data-dcnode-id="8635" instrument_node="">Talk to Everyone: They all hang around near or in there houses at this stage, there's really no way to cheat out of this, just go to their houses and talk to them all. Don't forget Tortimer in the town hall! He asks your favorite animal, just say Turtle and he'll love you.</span><br data-dcnode-id="8634"><span data-dcnode-id="8633" instrument_node="">Put on your Work Uniform: Put it on. Yes, it's ugly, but keep it even after you're done. On Halloween you can change it into a Moldy or Patched Shirt.</span><br data-dcnode-id="8632"><span data-dcnode-id="8631" instrument_node="">Plant Flowers and Trees: You can steal these and put them outside your house. Nook has no idea, plus it makes your house look pretty.</span><br data-dcnode-id="8630"><br data-dcnode-id="8629"><span data-dcnode-id="8628" instrument_node="">I don't know the exact order of the next parts, I'll just put them in order as best as I can.</span><br data-dcnode-id="8627"><br data-dcnode-id="8626"><span data-dcnode-id="8625" instrument_node="">Direct Mail: Write something random, like "Nook loves you" or "Nook is a Panda" or something of that nature. He has no idea, plus it's fun to embarrass him a little! (NOTE: If you drop the stationary outside the store, he'll give you more. You can continue dropping to get as much as you want to send tons of letters to your animal friends!)</span><br data-dcnode-id="8624"><span data-dcnode-id="8623" instrument_node="">Delivering Furniture and Carpet: Deliver it. No real way to cheat. But, the animals give you furniture/carpets back, so it's all good.</span><br data-dcnode-id="8622"><span data-dcnode-id="8621" instrument_node="">Delivering Watering Can: This will be to the person you wrote the letter to. Deliver it and laugh when they show you the letter. It's fun to see how they have absolutely no idea what the letter means.</span><br data-dcnode-id="8620"><span data-dcnode-id="8619" instrument_node="">Message Board: Write pretty much the same thing as you wrote in the letter. It's fun to see him even MORE publicly humiliated! Serves him right for enslaving you against your will.</span><br data-dcnode-id="8618"><span data-dcnode-id="8617" instrument_node="">Then, you're done with Nook!!</span><br data-dcnode-id="8616"><br data-dcnode-id="8615"><span data-dcnode-id="8614" instrument_node="">Here's how to earn easy bells:</span><br data-dcnode-id="8613"><span data-dcnode-id="8612" instrument_node="">Go to the Lost and Found or Recycling Bin.</span><br data-dcnode-id="8611"><span data-dcnode-id="8610" instrument_node="">Take all the stuff out.</span><br data-dcnode-id="8609"><span data-dcnode-id="8608" instrument_node="">Keep what you want, sell the rest to Nook.</span><br data-dcnode-id="8607"><span data-dcnode-id="8606" instrument_node="">You can continue doing this, and also shaking trees and selling the furniture.</span><br data-dcnode-id="8605"><span data-dcnode-id="8604" instrument_node="">Another way is if a neighbor asks you to deliver something, and you're not afraid of making that certain neighbor angry, open the present and keep or sell it, depending upon what the present is.</span></div></div><span data-dcnode-id="8601" instrument_node="">

</span><strong data-dcnode-id="8540"><span data-dcnode-id="8541" instrument_node="">Checklist!</span></strong><span data-dcnode-id="8539" instrument_node="">
</span></div><span data-dcnode-id="8537" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="8509" data-field="cheat" id="cb73580"><div data-dcnode-id="8510"><span data-dcnode-id="8536" instrument_node="">Ok, so you're running low on bells, you HRA pints are awful and your neighbours hate you. Here's a checklist to get by all of these:</span><br data-dcnode-id="8535"><br data-dcnode-id="8534"><span data-dcnode-id="8533" instrument_node="">1. Earn 10,000 (or more) bells a day by selling fruit.</span><br data-dcnode-id="8532"><span data-dcnode-id="8531" instrument_node="">2. Catch 10 fish and sell them.</span><br data-dcnode-id="8530"><span data-dcnode-id="8529" instrument_node="">3. Catch 5 bugs and sell them (in winter, catch 5 more fish)</span><br data-dcnode-id="8528"><span data-dcnode-id="8527" instrument_node="">4. Dig up 5 cracks and sell contents.</span><br data-dcnode-id="8526"><span data-dcnode-id="8525" instrument_node="">5. Water wilting flowers and plant 5 or more flowers and 1 tree.</span><br data-dcnode-id="8524"><span data-dcnode-id="8523" instrument_node="">6. Talk to all neighbours 5 times.</span><br data-dcnode-id="8522"><span data-dcnode-id="8521" instrument_node="">7. Write a letter to all neighbours and attach gift.</span><br data-dcnode-id="8520"><span data-dcnode-id="8519" instrument_node="">8. Sell shells.</span><br data-dcnode-id="8518"><span data-dcnode-id="8517" instrument_node="">9. Rearrange your furniture but don't change it.</span><br data-dcnode-id="8516"><span data-dcnode-id="8515" instrument_node="">10. Pay half of the money of your mortgage.</span><br data-dcnode-id="8514"><br data-dcnode-id="8513"><span data-dcnode-id="8512" instrument_node="">Do this for a couple of weeks and your town will flourish. You're enviroment comments will be excellent, you will be rich, the HRA will love you and everyone in town will be your BFF!</span><br data-dcnode-id="8511"></div></div><span data-dcnode-id="8508" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="8475" data-field="cheat" id="cb77173"><div data-dcnode-id="8476"><span data-dcnode-id="8477" instrument_node="">Sometimes you see a coconut on the shore line. Get a shovel and plant the coconut on the shore line that seperates the grass from the sand. Plant the coconut and in 3 days (you can time travel) go back and there is your coconut tree! You can plant as many as you like to get alot of bells. Since its a foreign fruit its worth 500 bells. The only bad thing is there is 2 coconuts on the tree instead of 3! Hope I helped!!!</span></div></div><span data-dcnode-id="8474" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="8438" data-field="cheat" id="cb80463"><div data-dcnode-id="8439"><span data-dcnode-id="8443" instrument_node="">1) Find a coconut along side the coast of your beach and sell it to Tom Nook for 500 bells</span><br data-dcnode-id="8442"><br data-dcnode-id="8441"><span data-dcnode-id="8440" instrument_node="">2) Find a coconut along side the coast of your beach and plant the coconut along the coast of your beach. Wait for a few days until it grows into a coconut tree. It grows up to 2 coconuts at a time. Each one will still be worth 500 bells.</span></div></div><span data-dcnode-id="8437" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="8021" data-field="cheat" id="cb75580"><div data-dcnode-id="8022"><span data-dcnode-id="8023" instrument_node="">If you have a mean neighbor like Gaston etc., or someone you don't like listen to these tips: Be mean to them. Hit them with items. If you talk to them and they ask you if you need something say no. Use Pitfall Seeds on them. Push them around by running into them. On the Town Message Board or Messages or even Letters say mean things about them. Also when they need your attention ignore them or say no and if they want you to deliver open the presents. Finally, Don't come to their birthday when they invite you and leave your house when they come there for the Flea Market and don't let them come over. That is a lot to do but it works. Have fun and remember to annoy them.</span></div></div><span data-dcnode-id="8020" instrument_node="">

</span><strong data-dcnode-id="7796"><span data-dcnode-id="7797" instrument_node="">Dorado Info</span></strong><span data-dcnode-id="7795" instrument_node="">
</span></div><span data-dcnode-id="7793" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7787" data-field="cheat" id="cb81920"><div data-dcnode-id="7788"><span data-dcnode-id="7792" instrument_node="">A dorado is a uber rare fish that can be caught in the summer. They are found in rivers and can be sold to nook for 15k! (Caught in summer) If you've ever caught an eel you'd know how long an eel is in-game, a dorado is as long as an eel and much wider.</span><br data-dcnode-id="7791"><br data-dcnode-id="7790"><span data-dcnode-id="7789" instrument_node="">P.S.: On the says of a flea market you can sell a dorado for 30k bells!</span></div></div><span data-dcnode-id="7786" instrument_node="">

</span><strong data-dcnode-id="7764"><span data-dcnode-id="7765" instrument_node="">DS suitcase, what's that?</span></strong><span data-dcnode-id="7763" instrument_node="">
</span></div><span data-dcnode-id="7761" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7753" data-field="cheat" id="cb77702"><div data-dcnode-id="7754"><span data-dcnode-id="7760" instrument_node="">So, when I was playing my wii game, and I saw that DS suitcase thing at the beginning, I thought it just meant that you could send over items and Bells from one to the other. Well, it doesn't really mean that. These are any DS-wii interactions I know of:</span><br data-dcnode-id="7759"><br data-dcnode-id="7758"><span data-dcnode-id="7757" instrument_node="">-Playing with another friend on their wii. YOu use your DS to download your wii data, and then you bring your DS to a friend's house, play around, have your guy go back into the DS, go back home and have your character go back into your wii. I've never done this with a friend, so I'm only guessing. For more details, just check your ACCF handbook thingy that came with the game.</span><br data-dcnode-id="7756"><span data-dcnode-id="7755" instrument_node="">-You can also start a new resident with one from your DS, onto the wii. He'll have some of the catalog items from the DS, and I think any bells he had saved from the last game. The character will still be in the DS, though. Once again, check around in your guidebook for details; I've never done this before.</span></div></div><span data-dcnode-id="7752" instrument_node="">
</span><div class="cheatbuttons section-footer" data-dcnode-id="7740"><span data-dcnode-id="7751" instrument_node="">
</span><div class="by text-small clearfix" data-dcnode-id="7742"><span data-dcnode-id="7750" instrument_node="">

</span></div><span data-dcnode-id="7741" instrument_node="">

</span><strong data-dcnode-id="7730"><span data-dcnode-id="7731" instrument_node="">Duplicate</span></strong><span data-dcnode-id="7729" instrument_node="">
</span></div><span data-dcnode-id="7727" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7724" data-field="cheat" id="cb91363"><div data-dcnode-id="7725"><span data-dcnode-id="7726" instrument_node="">So you know how every one says that you can have 99,000 bells in 5 or 6 mins, but at the cost of a weedy town? No more of that. If you go to friends town. Drop some bells, and when you come back from their town,booker will talk to you. And at the second sentence, go to the wii menu and reset. When you get back, you'll still have the bells you dropped, and when you go back to your friends town, the bells will be there too. But be sure to ask your friend.</span></div></div><span data-dcnode-id="7723" instrument_node="">

</span><strong data-dcnode-id="7701"><span data-dcnode-id="7702" instrument_node="">Easier Rock Money</span></strong><span data-dcnode-id="7700" instrument_node="">
</span></div><span data-dcnode-id="7698" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7692" data-field="cheat" id="cb77631"><div data-dcnode-id="7693"><span data-dcnode-id="7697" instrument_node="">You know how when you smack a rock and money comes out? Well, sometimes you don't get all the money. There is a way to insure that you get every last drop of money out of that rock. There is a total of 8,100 bells in the rocks. If you dig 3 holes horizontally 2 spaces above the rock then you can rebound off the holes and keep hitting the rock. You should get all the money out of the rock if you just keep smacking it.  </span><br data-dcnode-id="7696"><br data-dcnode-id="7695"><span data-dcnode-id="7694" instrument_node="">It's possible to get a total of 16,100 bells, if you get at least 7 "points" of Yellow Feng Shui in your house. Then the next day at 6 am you will be able to get the last bag worth 8,000 bells.</span></div></div><span data-dcnode-id="7691" instrument_node="">

</span><strong data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node="">Easy Bug-off win</span></strong><span data-dcnode-id="7663" instrument_node="">
</span></div><span data-dcnode-id="7661" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7658" data-field="cheat" id="cb79409"><div data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">The most Bug-off's happen in summer. To easily win, go to a summer night before the bug-off. This is the best time to catch bugs. The best thing you can catch is an Oak Silk Moth. It's the largest bug in the game. (I think) Also, if it's day-time, catch a birdwing butterfly. Those are almost as big as the oak silk moths. This will win you the bug-off easily.</span></div></div><span data-dcnode-id="7657" instrument_node="">

</span></div><span data-dcnode-id="7632" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7621" data-field="cheat" id="cb84010"><div data-dcnode-id="7622"><span data-dcnode-id="7631" instrument_node="">On Halloween night at 6:00pm have your pockets full of fruit and one candy *for Jack*. When a player approaches you and says "Trick or Treat" keep pressing the Z button; but only allow this to happen for the number of fruit that you have on you!! The fruit will be turned into Jack In The Box, which you can then sell at Nook's place for a little over $1000 apiece. </span><br data-dcnode-id="7630"><br data-dcnode-id="7629"><span data-dcnode-id="7628" instrument_node="">You can avoid all the other players *they will run after you and Jack won't, so you will know who is who by that* until your candy has been given to Jack for the Spooky gifts; then start picking the fruit off the trees, or shells off the ground and run into the players and do the Z button trick. Continue to do this until you've run out of fruit and shells, and continue returning to Nook's every time your pockets are full of Jack In the Box *gets 15,465 bells every time*. I know that some flowers can also be turned into Jack In The Box, but some wont...I've no idea about bugs or fish yet </span><img alt="" border="0" data-dcnode-id="7627" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/wink.gif&amp;raw" vspace="2"><br data-dcnode-id="7626"><br data-dcnode-id="7625"><span data-dcnode-id="7624" instrument_node="">I ended up stopping this when Nook's closed at 9:00pm because I had nowhere to put anymore Jack In The Boxes. I ended up with around 300,000 bells </span><img alt="" border="0" data-dcnode-id="7623" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/bigsmile.gif&amp;raw" vspace="2"></div></div><span data-dcnode-id="7620" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7586" data-field="cheat" id="cb72602"><div data-dcnode-id="7587"><span data-dcnode-id="7594" instrument_node="">First, get the golden shovel.. to do this: bury a normal shovel, and wait 1 day, and dig it up and it will be golden,</span><br data-dcnode-id="7593"><br data-dcnode-id="7592"><span data-dcnode-id="7591" instrument_node="">Next, Bury a bag of 10,000 bells, and a tree sprout will pop up. wait until it grows, and you will have 3-10,000 bell bags. The more money you bury, the better chance it will have of becoming an actual money tree. For example, burying 90,000 bells is very likely to work. While 10,000 is not. </span><br data-dcnode-id="7590"><br data-dcnode-id="7589"><span data-dcnode-id="7588" instrument_node="">*****NOTE: This cheat won't always work, because not all trees that you plant will live, so just know you could be risking 10,000 bells. Also, sometimes a tree may grow but no money will come out.*****</span></div></div><span data-dcnode-id="7585" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7537" data-field="cheat" id="cb81731"><div data-dcnode-id="7538"><span data-dcnode-id="7554" instrument_node="">1) Time travel, or of course wait, for a Nook Points special.</span><br data-dcnode-id="7553"><br data-dcnode-id="7552"><span data-dcnode-id="7551" instrument_node="">2) Order loads of expensive (but not too expensive, also) items.</span><br data-dcnode-id="7550"><br data-dcnode-id="7549"><span data-dcnode-id="7548" instrument_node="">3) You will now have alot of Nook Points.</span><br data-dcnode-id="7547"><br data-dcnode-id="7546"><span data-dcnode-id="7545" instrument_node="">4) Spend your Nook Points on cool items!</span><br data-dcnode-id="7544"><br data-dcnode-id="7543"><span data-dcnode-id="7542" instrument_node="">5) Sell the ordered items if you don't want them.</span><br data-dcnode-id="7541"><br data-dcnode-id="7540"><span data-dcnode-id="7539" instrument_node="">Just remember, this takes quite some time and alot of bells. Don't do this if you don't have many bells.</span></div></div><span data-dcnode-id="7536" instrument_node="">

</span></div><span data-dcnode-id="7511" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7483" data-field="cheat" id="cb74310"><div data-dcnode-id="7484"><span data-dcnode-id="7510" instrument_node="">Follow the below steps to get easy money in 10-15 minutes.</span><br data-dcnode-id="7509"><br data-dcnode-id="7508"><span data-dcnode-id="7507" instrument_node="">1. Go to Bunny Day (12th April)</span><br data-dcnode-id="7506"><span data-dcnode-id="7505" instrument_node="">2. Dig up eggs</span><br data-dcnode-id="7504"><span data-dcnode-id="7503" instrument_node="">3. Open your eggs, you'll either get a candy or a token</span><br data-dcnode-id="7502"><span data-dcnode-id="7501" instrument_node="">4. Go talk to Zipper (the bunny at the Town Hall) and he'll give you furniture for your tokens</span><br data-dcnode-id="7500"><span data-dcnode-id="7499" instrument_node="">5. Keep the candy for the next part</span><br data-dcnode-id="7498"><span data-dcnode-id="7497" instrument_node="">6. Time travel to Halloween (31st October)</span><br data-dcnode-id="7496"><span data-dcnode-id="7495" instrument_node="">7. Find Jack and give him candy</span><br data-dcnode-id="7494"><span data-dcnode-id="7493" instrument_node="">8. Repeat step 6 until you've no candy left</span><br data-dcnode-id="7492"><span data-dcnode-id="7491" instrument_node="">9. Sell all your furniture that you get from Jack</span><br data-dcnode-id="7490"><br data-dcnode-id="7489"><span data-dcnode-id="7488" instrument_node="">Just repeat the steps until you have enough money!</span><br data-dcnode-id="7487"><br data-dcnode-id="7486"><span data-dcnode-id="7485" instrument_node="">Hope I helped!</span></div></div><span data-dcnode-id="7482" instrument_node="">

</span></div><span data-dcnode-id="7452" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7413" data-field="cheat" id="cb91579"><div data-dcnode-id="7414"><span data-dcnode-id="7451" instrument_node="">There's is this one time, that Mabel and nook don't follow you. because they are having what's known as an "episode" if you do these following things:1.Speak to Pelly at least once.</span><br data-dcnode-id="7450"><span data-dcnode-id="7449" instrument_node="">2.Purchase at least one item at Able Sisters.</span><br data-dcnode-id="7448"><span data-dcnode-id="7447" instrument_node="">3.Become friends with Sable. This requires the player to speak to her daily for twelve days.</span><br data-dcnode-id="7446"><span data-dcnode-id="7445" instrument_node="">4.Obtain Nookington's.</span><br data-dcnode-id="7444"><span data-dcnode-id="7443" instrument_node="">5.Purchase at least one item at GracieGrace.</span><br data-dcnode-id="7442"><span data-dcnode-id="7441" instrument_node="">6.Obtain three fashion checks from Gracie. These fashion checks can be either passing or failing.</span><br data-dcnode-id="7440"><span data-dcnode-id="7439" instrument_node="">Then talk to these people in order:1.Speak to Sable and Mabel.</span><br data-dcnode-id="7438"><span data-dcnode-id="7437" instrument_node="">2.Speak to Pelly, Labelle, and Gracie.</span><br data-dcnode-id="7436"><span data-dcnode-id="7435" instrument_node="">3.Speak to Tom Nook.</span><br data-dcnode-id="7434"><span data-dcnode-id="7433" instrument_node="">4.Speak to Mabel.</span><br data-dcnode-id="7432"><span data-dcnode-id="7431" instrument_node="">5.Speak to Tom Nook.</span><br data-dcnode-id="7430"><span data-dcnode-id="7429" instrument_node="">6.Speak to Gracie and Labelle.</span><br data-dcnode-id="7428"><span data-dcnode-id="7427" instrument_node="">7.Speak to Mabel.</span><br data-dcnode-id="7426"><span data-dcnode-id="7425" instrument_node="">8.Speak to Sable.</span><br data-dcnode-id="7424"><span data-dcnode-id="7423" instrument_node="">9.Speak to Labelle.</span><br data-dcnode-id="7422"><span data-dcnode-id="7421" instrument_node="">10.Speak to Mabel.</span><br data-dcnode-id="7420"><br data-dcnode-id="7419"><span data-dcnode-id="7418" instrument_node="">As you know, The able sisters have another sister , Labelle, but, how did she get there? Why isn't she with her sisters? If any of you guys play acnl, you'd know that Labelle works in the accessory side of the shop, but in accf, she worked with gracie. Now, why would she go from a fashion designer, to her sisters? you won't hear much about this cheat as the other ones, but i'll show you a video.</span><br data-dcnode-id="7417"><br data-dcnode-id="7416"><span data-dcnode-id="7415" instrument_node="">&lt;iframe width="853" height="510" src="http://www.youtube.com/embed/7FNr2NUB5ns?wmode=transparent&amp;start=" frameborder="0" allowfullscreen&gt;&lt;/iframe&gt; Ever wonder why Sable's so unfriendly? This explains it all, with a secret the whole town's in on, but you! So whether you wanna know the truth or not, it's up to you.</span></div></div><span data-dcnode-id="7412" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7384" data-field="cheat" id="cb76639"><div data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">To get exotic fruit, send letters saying "plz send fruit" with cheap seashells attatched as gifts to all of your neighbors, and about 1/2 of them will send fruit, usually exotics.  Plant fruits, tend them, and you will have orchards full of exotic fruit at 500 bells each instead of local fruit at 100 bells each.  You will be able to make money very quickly</span></div></div><span data-dcnode-id="7383" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7349" data-field="cheat" id="cb78997"><div data-dcnode-id="7350"><span data-dcnode-id="7357" instrument_node="">Ok you have designed really nice designs and put them on display at Able sisters but you only made new nice designs so you can get the desings already made in the shop designed by someone else-but you dont want to have bad desings in the shop when local town residents come in the shop and think "Wow __________(&lt;--- You name eg Bob)"Wow Bob desinged this he is so slobby and all I mean look at this design whats wrong with him?" and that means your giving able sisters a bad name and they might wear it and look bad in the design. so you design a nice pattern or something and about (hang on a second let me estimate how long it takes) a month later you see 1 neighbour wearing that design and when you speak to them they say "hey! ____ (eg Mandy) you designed this it's really nice and then when that resident speaks to others around town they share the design and more residents now wanting to go in to Able sisters and doing anything FOR YOUR DESIGNS its now not a fashion crisis it's now a fashion miricale!</span><br data-dcnode-id="7356"><br data-dcnode-id="7355"><span data-dcnode-id="7354" instrument_node="">-ZoloCanGoLow</span><br data-dcnode-id="7353"><br data-dcnode-id="7352"><span data-dcnode-id="7351" instrument_node="">P.S. sometimes in the city you hear people talking about the famous person who is you and wanting to move to your town because of the fashion and when you exchange designs with friends on the wii and the same will happon again and if you visit that friends town the peolpe who have your design will praise you and sending you letters and wanting to see you more often and if you give the design to someone then they move out of town they still might be wearing your design in the city and then spreading your fashion name!</span></div></div><span data-dcnode-id="7348" ins </span></div><span data-dcnode-id="7323" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7320" data-field="cheat" id="cb73310"><div data-dcnode-id="7321"><span data-dcnode-id="7322" instrument_node="">My sister and I both have this game. Both Wiis are on different dates. My town was on a Sunday AM and Joan was selling her turnips for 100 bells. My sister's Wii was on a different day of the week where Nook was buying them for 500 bells each. I left my gate open and while I would buy 1500 turnips and drop them off at the gate she would come back and forth between towns to sell them in her town. Turnips don't go bad when the Wii's are on different dates and just crossing towns. We made 5,000,000 each once we split the profit in two hours strait from an initial 200,000 bell investment.</span></div></div><span data-dcnode-id="7319" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7153" data-field="cheat" id="cb79595"><div data-dcnode-id="7154"><span data-dcnode-id="7161" instrument_node="">Everyone on Halloween is wearing the same outfit. Ugh, so how do you know which one is Jack? I trapped everyone of my neighbors in holes. It was challenging because they kept moving around and trying to talk to me. But then they were stuck there for the rest of the night. I went around looking for Jack and found him. I didn't know he would disappear but he did. Glad I Dug holes!! Now, Jack was the only one that wasn't in the holes. It was easy, and i got a lot of furniture!</span><br data-dcnode-id="7160"><br data-dcnode-id="7159"><span data-dcnode-id="7158" instrument_node="">Warning!!!-One time Jack ended up with a neighbor in the hole trap. I didn't know which one was him, so i guessed. I was wrong and got a pumpkin head. But the other creature was Jack, so i did get candy.</span><br data-dcnode-id="7157"><br data-dcnode-id="7156"><span data-dcnode-id="7155" instrument_node="">Warning!!!-Nieghbors can still talk to you if you are right beside the holes or in between them.</span></div></div><span data-dcnode-id="7152" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="7112" data-field="cheat" id="cb92935"><div data-dcnode-id="7113"><span data-dcnode-id="7121" instrument_node="">Don't you hate it when you want to try to find someone but you can't find them because they're unfortunately not at home? Whether it trying to deliver something, reporting something is delivered, or giving them what they need, It's really inconvenient! They also walk really fast, faster than you would think. So if you just head on over to their house, you won't find them.</span><br data-dcnode-id="7120"><span data-dcnode-id="7119" instrument_node="">The best way to solve this problem is by saving and quitting. The you just log on onto your character again, and head on over to their house. If their house is far away, you should probably run. They might go pretty far away. If you're fast enough, you should see them standing right by their house, bringing you no difficulty of finding them.</span><br data-dcnode-id="7118"><br data-dcnode-id="7117"><span data-dcnode-id="7116" instrument_node="">Really Hope I Helped You Guys Out There! I Love Animal Crossing!</span><br data-dcnode-id="7115"><span data-dcnode-id="7114" instrument_node="">--- L.X.G. &lt;3</span></div></div><span data-dcnode-id="7111" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="6300" data-field="cheat" id="cb72544"><div data-dcnode-id="6301"><span data-dcnode-id="6307" instrument_node="">It is advisable to have all of the tools in your inventory. You can easily swap between each tools by pressing the arrows on your D pad.</span><br data-dcnode-id="6306"><br data-dcnode-id="6305"><span data-dcnode-id="6304" instrument_node="">Pressing left or right will swap the item in your hands.</span><br data-dcnode-id="6303"><span data-dcnode-id="6302" instrument_node="">Pressing down will put the item away.</span></div></div><span data-dcnode-id="6299" instrument_node="">

SD card after your done Put it in your PC Then load up The SD card and go to the cheat text files... (You dont have to do this, You can just play with the cheats in cheat manager and play the game but if you want to do the balloon man cheat, Then Continue reading this) Click the txt file so it opens note pad and get rid of some of the cloned cheats (The same effect as other ones) and also shorten LONG Named ones to short Named... (NOTE: KEEP THE THINGS AT THE END LIKE THIS [GMO] or something like that) Oh and the reason Im telling you to get Rid of some is cause cheat manager only desplays 46 Pages per TXT file cheat thing... so PICK WISELY and If you screw up, Redownload it and overwrite the old one :3 ... So after doing that, SAVE, SAVE, SAAAAAAVVVVEEEEE (GAWD i sound like ressetti LOL) Insert the SD card into the wii Pull up cheat manager AND click the txt file with the cheats for the game, Hit A on there for the List of Cheats you can select and use Go to the cheat you want to put on the game Press + to add the cheat and press Minus to remove the cheat. Select the one to foward time and go backwards. and hit one and after its done go to gecko OS and Launch the game, Now go to the city and go fowards in time to another day to Meet the ballon man (B+ -&gt; = Bacwards &lt;- is fowards Down is for normal time) and thewre now you get more stuff from him! NOW YOU CAN GET CHEATS FOR GAMES!</span></div></div><span data-dcnode-id="6259" instrument_node="">

</span></div><span data-dcnode-id="6199" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="6195" data-field="cheat" id="cb76633"><div data-dcnode-id="6196"><span data-dcnode-id="6198" instrument_node="">You know how your grass gets worn down after you run on it a lot? Do you want to grow it back pretty easily? I figured out how to make the grass grow back pretty quickly and here is how: Plant flowers (Best to use Gold Roses since they don't wilt) where the grass is worn down and time travel one day ahead at a time. This will grow your grass back quickly, the only downside is that you will get some weeds not many though. If you time travel more then one day at a time it won't work for some reason. Planting trees and flowers where the grass is worn down will help it grow faster, If you don't have anything planted there it will still grow back just much slower.</span><br data-dcnode-id="6197"></div></div><span data-dcnode-id="6194" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="6033" data-field="cheat" id="cb80652"><div data-dcnode-id="6034"><span data-dcnode-id="6041" instrument_node="">WARNING: This only works if you got coffee from him a few times! Just keep drinking up some coffee and keep talking to him to see if he asks you about the Gyroid!</span><br data-dcnode-id="6040"><span data-dcnode-id="6039" instrument_node="">Don't have much room to store your Gyroids in? Well Brewster can help!</span><br data-dcnode-id="6038"><span data-dcnode-id="6037" instrument_node="">Go talk to Brewster. (He is in the museum down in the Coffee place).</span><br data-dcnode-id="6036"><span data-dcnode-id="6035" instrument_node="">Talk to him and if you brung a Gyroid along with you he notice that and ask you if he could store it for you. Just choose whatever Gyroid you want to store and he will keep it safe in storage. You can come back anytime and talk to him to get the Gyroid back. (Any Gyroid is acceptable and no payment is needed...well only if you want coffee). &gt;_&gt;</span></div></div><span data-dcnode-id="6032" instrument_node="">

br data-dcnode-id="5967"><span data-dcnode-id="5966" instrument_node="">Something warm!</span><br data-dcnode-id="5965"><span data-dcnode-id="5964" instrument_node="">Safe...</span><br data-dcnode-id="5963"><br data-dcnode-id="5962"><span data-dcnode-id="5961" instrument_node="">Hope these help someone! </span><img alt="" border="0" data-dcnode-id="5960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/bigsmile.gif&amp;raw" vspace="2"></div></div><span data-dcnode-id="5957" instrument_node="">

</span></div><span data-dcnode-id="5748" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5718" data-field="cheat" id="cb78994"><div data-dcnode-id="5719"><br data-dcnode-id="5747"><span data-dcnode-id="5746" instrument_node="">Ok, so you're running low on bells, you HRA pints are awful and your neighbours hate you. Here's a checklist to get by all of these:</span><br data-dcnode-id="5745"><br data-dcnode-id="5744"><span data-dcnode-id="5743" instrument_node="">1. Earn 10,000 (or more) bells a day by selling fruit.</span><br data-dcnode-id="5742"><span data-dcnode-id="5741" instrument_node="">2. Catch 10 fish and sell them.</span><br data-dcnode-id="5740"><span data-dcnode-id="5739" instrument_node="">3. Catch 5 bugs and sell them (in winter, catch 5 more fish)</span><br data-dcnode-id="5738"><span data-dcnode-id="5737" instrument_node="">4. Dig up 5 cracks and sell contents.</span><br data-dcnode-id="5736"><span data-dcnode-id="5735" instrument_node="">5. Water wilting flowers and plant 5 or more flowers and 1 tree.</span><br data-dcnode-id="5734"><span data-dcnode-id="5733" instrument_node="">6. Talk to all neighbours 5 times.</span><br data-dcnode-id="5732"><span data-dcnode-id="5731" instrument_node="">7. Write a letter to all neighbours and attach gift.</span><br data-dcnode-id="5730"><span data-dcnode-id="5729" instrument_node="">8. Sell shells.</span><br data-dcnode-id="5728"><span data-dcnode-id="5727" instrument_node="">9. Rearrange your furniture but don't change it.</span><br data-dcnode-id="5726"><span data-dcnode-id="5725" instrument_node="">10. Pay half of the money of your mortgage.</span><br data-dcnode-id="5724"><br data-dcnode-id="5723"><span data-dcnode-id="5722" instrument_node="">Do this for a couple of weeks and your town will flourish. You're enviroment comments will be excellent, you will be rich, the HRA will love you and everyone in town will be your BFF!</span><br data-dcnode-id="5721"><br data-dcnode-id="5720"></div></div><span data-dcnode-id="5717" instrument_node="">

</span><strong data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">How to Build a Snowman</span></strong><span data-dcnode-id="5694" instrument_node="">
</span></div><span data-dcnode-id="5692" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5678" data-field="cheat" id="cb74315"><div data-dcnode-id="5679"><span data-dcnode-id="5691" instrument_node="">You can only build a snowman when there is snow on the ground from December to February. First, locate both snowballs hidden somewhere in your village. Roll one of the snowballs to the location of the other one (this one will probably be the bottom because you have rolled it and gotten it big.) Then, make the second snowball so that it is only slightly smaller than the other snowball. Finally, roll the second, smaller snowball into the first ( the snowman will come alive.)</span><br data-dcnode-id="5690"><br data-dcnode-id="5689"><span data-dcnode-id="5688" instrument_node="">Hint **If you accidentally let one snowball go into the river or the ocean or something, don't worry, BOTH snowballs will reset themselves in different parts of the village. Also, the snowballs will only get bigger if you roll them in snow so if you don't want it to grow then roll it on dry ground.</span><br data-dcnode-id="5687"><br data-dcnode-id="5686"><span data-dcnode-id="5685" instrument_node="">Remember **The snowman will only send you furniture if your proportions are exact so don't make the head too big or the body too small. Also, remember that you can only make one snowman a day.  </span><br data-dcnode-id="5684"><br data-dcnode-id="5683"><br data-dcnode-id="5682"><br data-dcnode-id="5681"><span data-dcnode-id="5680" instrument_node=""> </span></div></div><span data-dcnode-id="5677" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5647" data-field="cheat" id="cb74564"><div data-dcnode-id="5648"><span data-dcnode-id="5651" instrument_node="">When your out and about, shaking trees and what have ya...a bee's nest plops out...your thinking..ahhh! But don't run inside, all you have to do is just keep your net in your pockets out of all the equipment, and put the rest in letters or at home. Run a few steps then press the side button on your wii remote and wait 1 or 2 seconds, it depends how far away you are. You have to be precise in catching it, try to face diagonal towards the screen, or the other way, it depends what way the bee's come out. Then swing! You may get stung once or twice before you finally catch one, when you do, the rest of the bee's just dissapear, and its very useful to catch a bee because that goes towards your bug encyclopedia- one step closer to that beautiful golden net! I hope this works for you! </span><img alt="" border="0" data-dcnode-id="5650" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.neoseeker.com/d/icons/smile.gif&amp;raw" vspace="2"><span data-dcnode-id="5649" instrument_node=""> Oh, and if anyone has any tips on how to catch a scorpion in summer, just create a cheat please, just call me juicylucy- don't ask. Lol. Thankyou!</span></div></div><span data-dcnode-id="5646" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5537" data-field="cheat" id="cb92312"><div data-dcnode-id="5538"><span data-dcnode-id="5557" instrument_node="">I have done this cheat so many times!</span><br data-dcnode-id="5556"><br data-dcnode-id="5555"><span data-dcnode-id="5554" instrument_node="">1. Before you log into AC, go on Settings and change the date to 09/03/2000. </span><br data-dcnode-id="5553"><br data-dcnode-id="5552"><span data-dcnode-id="5551" instrument_node="">2. Go onto AC and put 50,000 bells into the bank (deposit). Then save the game.</span><br data-dcnode-id="5550"><br data-dcnode-id="5549"><span data-dcnode-id="5548" instrument_node="">3. When your are back on the Wii menu, go on settings and change the date to 09/03/2035. Then go back on AC.</span><br data-dcnode-id="5547"><br data-dcnode-id="5546"><span data-dcnode-id="5545" instrument_node="">4. You should have a letter from the bank saying that 99,999 bells have been added to your account and that add 50k means 149,999, which is close to 150k.</span><br data-dcnode-id="5544"><br data-dcnode-id="5543"><span data-dcnode-id="5542" instrument_node="">FACT: If this is the first time of using this cheat, you will also be awarded a shopping card. If its the second a tissue box, 3rd etc. I think someone put in a bank unlockables cheat so look at that to see what you can get! </span><br data-dcnode-id="5541"><br data-dcnode-id="5540"><span data-dcnode-id="5539" instrument_node="">You can do this cheat over and over again! But you must have 50k bells and you must change the dates.</span></div></div><span data-dcnode-id="5536" instrument_node="">

</span><strong data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">How to get 99,999 bells in just a few minutes for free!</span></strong><span data-dcnode-id="5513" instrument_node="">
</span></div><span data-dcnode-id="5511" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5471" data-field="cheat" id="cb74309"><div data-dcnode-id="5472"><span data-dcnode-id="5510" instrument_node="">Okay, So to use this cheat you need at least 100,000 bells in your bank account, it may work with less money but you will not get 99,999 bells you will get alot less.</span><br data-dcnode-id="5509"><span data-dcnode-id="5508" instrument_node="">To get your initial 100,000 bells you can: </span><br data-dcnode-id="5507"><span data-dcnode-id="5506" instrument_node="">sell fruit to Tom Nook,</span><br data-dcnode-id="5505"><span data-dcnode-id="5504" instrument_node="">sell shells to Tom Nook,</span><br data-dcnode-id="5503"><span data-dcnode-id="5502" instrument_node="">catch fish and sell them to Tom Nook,</span><br data-dcnode-id="5501"><span data-dcnode-id="5500" instrument_node="">catch bugs and sell them to Tom Nook,</span><br data-dcnode-id="5499"><span data-dcnode-id="5498" instrument_node="">dig up fossils take them to blathers and say 'check a fossil' them give him the fossil if he askes you to donate it to the museum say 'give it back' then sell them to Tom Nook,</span><br data-dcnode-id="5497"><span data-dcnode-id="5496" instrument_node="">dig up Gyroids and sell them to Tom Nook.</span><br data-dcnode-id="5495"><span data-dcnode-id="5494" instrument_node="">n.b.native fruit (the friut that grows naturally in your town are worth 100 bells each, other fruit and coconuts are worth 500 bells each)</span><br data-dcnode-id="5493"><br data-dcnode-id="5492"><span data-dcnode-id="5491" instrument_node="">1. once you have at least 100,000 bells in your bank account, save and quit.</span><br data-dcnode-id="5490"><span data-dcnode-id="5489" instrument_node="">2. in the wii menu click 'wii' in the bottom left corner then clich 'settings' then click 'calander' then click 'date' then change the wii year to 2035 then exit out of the wii settings and go back into animal crossing, </span><br data-dcnode-id="5488"><span data-dcnode-id="5487" instrument_node="">3. load up your character and check your mail.</span><br data-dcnode-id="5486"><span data-dcnode-id="5485" instrument_node="">4. you should have recieved a letter from 'bell point notice' open it and it will say that you have earned 99,999 bells of interest in your account</span><br data-dcnode-id="5484"><span data-dcnode-id="5483" instrument_node="">5. save and quit go back into the wii settings and change the wii year back to the real year </span><br data-dcnode-id="5482"><span data-dcnode-id="5481" instrument_node="">6. go back into animal crossing and read your mail again </span><br data-dcnode-id="5480"><span data-dcnode-id="5479" instrument_node="">7. save and quit </span><br data-dcnode-id="5478"><br data-dcnode-id="5477"><span data-dcnode-id="5476" instrument_node="">repeat steps 2-7 to get another 99.999 and so on.</span><br data-dcnode-id="5475"><br data-dcnode-id="5474"><span data-dcnode-id="5473" instrument_node="">THERE IS ONE SIDE AFFECT TO 'TIME TRAVEL', WEEDS! WEEDS! WEEDS! AND COCROACHES IN YOUR HOUSE,  THE COCROACHES CAN BE KILLED IN SECONDS, BUT TO GET RID OF ALL THE WEEDS IT WILL TAKE A FEW HOURS&lt; WHEN YOU HAVE PULLED UP ALL THE WEEDS YOU MUST DIG UP THE MONSTER WEED (THE BIG RED FLOWERY THING YOU WILL SEE AFTER TIMR TRAVELING) WITH A SHOVEL.</span></div></div><span data-dcnode-id="5470" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5413" data-field="cheat" id="cb79378"><div data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node="">Y'know that lion Elvis? If he moves into your town, go to his house. He should have 2 thrones. Once you talk to him after a while, he just might ask you for something. Wheather it's fish or bugs, it doesn't matter. If you keep on giving him stuff, he might toss one of his thrones into the recycle bin. Get it, and you can sell it for, like, 300,000 bells! When it happened to me, I payed off my 248,000 bell loan.</span></div></div><span data-dcnode-id="5412" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5194" data-field="cheat" id="cb74996"><div data-dcnode-id="5195"><span data-dcnode-id="5215" instrument_node="">After building a lot of "duds", I looked for some way to consistently make a perfect Snowman, each and every time.  So I began counting how many steps/ paces forward I took, while rolling each half of the body, and this is what I found (note: counting actually begins after you start pushing the snowball with your hands):</span><br data-dcnode-id="5214"><br data-dcnode-id="5213"><span data-dcnode-id="5212" instrument_node="">The Bottom Half:</span><br data-dcnode-id="5211"><span data-dcnode-id="5210" instrument_node="">I'm almost sure there is a limit to how big a snowball can ever get (so don't stress over making it too big)--nevertheless, I found that after approx. 70 paces, the snowman base (the bigger half) was complete.</span><br data-dcnode-id="5209"><br data-dcnode-id="5208"><span data-dcnode-id="5207" instrument_node="">The Top Half:</span><br data-dcnode-id="5206"><span data-dcnode-id="5205" instrument_node="">This is the half of the body that must be more precise.  I've noticed that if the head is approx. 2/3 the size of the body, you're Snowman is a success... about 40 steps has been pretty reliable for me, so far (I've acquired the entire Snowman set using this method, so it's certainly worth trying!).</span><br data-dcnode-id="5204"><br data-dcnode-id="5203"><span data-dcnode-id="5202" instrument_node="">Note:  I always scope out where each snowball is first, before I begin rolling them around (so I don't ever have to make size adjustments to the top half later on, or lose count of my steps).  I also try to choose the widest, snowiest, most open location for the job (mostly because I have a short attention span, and will otherwise forget where one of them is!).  However, if you DO make the second half too big, just roll it over a non-snowy surface, until it's the right size (you might be better off destroying the "bad half", and starting over again with a freshly spawned snowball).</span><br data-dcnode-id="5201"><br data-dcnode-id="5200"><span data-dcnode-id="5199" instrument_node="">You only have three months to build 12 perfect specimens, and just one shot at it per day, so having a consistent method can save you a lot of frustration.  And if you are really good, you can easily exceed this number, and make a ton of bells by selling the extra furniture at Nooks, or even at auction.</span><br data-dcnode-id="5198"><br data-dcnode-id="5197"><span data-dcnode-id="5196" instrument_node="">Hope this helps!</span></div></div><span data-dcnode-id="5193" instrument_node="">

</span></div><span data-dcnode-id="5168" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5149" data-field="cheat" id="cb72758"><div data-dcnode-id="5150"><span data-dcnode-id="5167" instrument_node="">On the game you'll need:</span><br data-dcnode-id="5166"><br data-dcnode-id="5165"><span data-dcnode-id="5164" instrument_node="">1 axe (preferably silver/gold but normal will work)</span><br data-dcnode-id="5163"><span data-dcnode-id="5162" instrument_node="">1 shovel (gold)</span><br data-dcnode-id="5161"><span data-dcnode-id="5160" instrument_node="">10,000G or more</span><br data-dcnode-id="5159"><span data-dcnode-id="5158" instrument_node="">A worthless tree (No fruit trees)</span><br data-dcnode-id="5157"><br data-dcnode-id="5156"><span data-dcnode-id="5155" instrument_node="">What you do is you get your axe out, go to a worthless tree, and chop it down. All you have left is a stump. Dig the stump up. Now you have a hole dug where the tree used to be. Bury the money the your golden shovel and watch the tree grow!</span><br data-dcnode-id="5154"><br data-dcnode-id="5153"><span data-dcnode-id="5152" instrument_node="">Now, keep in mind this WILL NOT always work. Sometimes your tree will grow, but it will not bear any money. But if you want to increase your chances, bury more money! It's rumored that it works somewhat like this: 10,000G = 10% chance, 50,000G = 50% chance, etc. </span><br data-dcnode-id="5151"></div></div><span data-dcnode-id="5148" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="5115" data-field="cheat" id="cb77540"><div data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">On days when there are flea markets, put everything worth selling in front of the door, so you don't have to put everything away. Second, know how much everything sells for at Nook's. Then when someone comes and asks to buy something, multiply the amount it sold for at Nook's by 2.5, and sell it! For example, A hammerhead sells for 8,000. Muliply it by 2.5 to get 20,000. Sell for 20,000! The neighbors will almost always accept it for this method. Hope that I could help!</span></div></div><span data-dcnode-id="5114" instrument_node="">

ot of money and it's funny to trick your neighbors!</span></div></div><span data-dcnode-id="5032" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4878" data-field="cheat" id="cb79038"><div data-dcnode-id="4879"><span data-dcnode-id="4907" instrument_node="">After visiting Shampoodles in the City,</span><br data-dcnode-id="4906"><br data-dcnode-id="4905"><span data-dcnode-id="4904" instrument_node="">you will have a free Mii mask.</span><br data-dcnode-id="4903"><br data-dcnode-id="4902"><span data-dcnode-id="4901" instrument_node="">However, to change your mask to another Mii,</span><br data-dcnode-id="4900"><br data-dcnode-id="4899"><span data-dcnode-id="4898" instrument_node="">you must pay.</span><br data-dcnode-id="4897"><br data-dcnode-id="4896"><span data-dcnode-id="4895" instrument_node="">Not any more! My wife discovered the Infinite Mask trick!</span><br data-dcnode-id="4894"><br data-dcnode-id="4893"><span data-dcnode-id="4892" instrument_node="">Simply go into your Mii Chanel and EDIT the Mii</span><br data-dcnode-id="4891"><br data-dcnode-id="4890"><span data-dcnode-id="4889" instrument_node="">that you chose to wear as a mask!</span><br data-dcnode-id="4888"><br data-dcnode-id="4887"><span data-dcnode-id="4886" instrument_node="">The changes you make to that Mii will appear on your Mask</span><br data-dcnode-id="4885"><br data-dcnode-id="4884"><span data-dcnode-id="4883" instrument_node="">in City Folk next time you play!</span><br data-dcnode-id="4882"><br data-dcnode-id="4881"><span data-dcnode-id="4880" instrument_node="">(Just do not delete that Mii, of course).</span></div></div><span data-dcnode-id="4877" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4822" data-field="cheat" id="cb73809"><div data-dcnode-id="4823"><span data-dcnode-id="4846" instrument_node="">Are you always getting confused with hair colours?</span><br data-dcnode-id="4845"><span data-dcnode-id="4844" instrument_node="">you read tips on your computer you want to try them out.</span><br data-dcnode-id="4843"><span data-dcnode-id="4842" instrument_node="">So then you go on to your game switch the machine on put the disc in get it set up start the game get in to the city ask Hariiet for what hair style you want then colour then...By this time you will have forgot so you try sneek quickly back on the computer but a family member is on it</span><br data-dcnode-id="4841"><br data-dcnode-id="4840"><span data-dcnode-id="4839" instrument_node="">So,Here are some ways of remembering one of the two most commonly used Hair Colours in the section of warm</span><br data-dcnode-id="4838"><br data-dcnode-id="4837"><span data-dcnode-id="4836" instrument_node="">Blonde is Light hearted:</span><br data-dcnode-id="4835"><span data-dcnode-id="4834" instrument_node="">I'm very fond of the colour Blonde,</span><br data-dcnode-id="4833"><span data-dcnode-id="4832" instrument_node="">And to get you started the word is light hearted!</span><br data-dcnode-id="4831"><br data-dcnode-id="4830"><span data-dcnode-id="4829" instrument_node="">Brown is safe:</span><br data-dcnode-id="4828"><span data-dcnode-id="4827" instrument_node="">Turn that frown upside down then you will have a happy face,</span><br data-dcnode-id="4826"><span data-dcnode-id="4825" instrument_node="">Turn that frow upside down &amp; remember that brown is safe</span><br data-dcnode-id="4824"></div></div><span data-dcnode-id="4821" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4558" data-field="cheat" id="cb72424"><div data-dcnode-id="4559"><span data-dcnode-id="4581" instrument_node="">Yes, you can make bells fast in this game!</span><br data-dcnode-id="4580"><br data-dcnode-id="4579"><span data-dcnode-id="4578" instrument_node="">Steps:</span><br data-dcnode-id="4577"><br data-dcnode-id="4576"><span data-dcnode-id="4575" instrument_node="">1. Put 50,000 bells in the deposit inside of Town Hall</span><br data-dcnode-id="4574"><span data-dcnode-id="4573" instrument_node="">2. Save + Quit</span><br data-dcnode-id="4572"><span data-dcnode-id="4571" instrument_node="">3. On your Wii, change the date to 12 years ahead</span><br data-dcnode-id="4570"><span data-dcnode-id="4569" instrument_node="">4. When you start the game, you will have almost or more than double of what you had (100,000+ bells)</span><br data-dcnode-id="4568"><span data-dcnode-id="4567" instrument_node="">5. Repeat all steps to continue gaining bells!</span><br data-dcnode-id="4566"><br data-dcnode-id="4565"><span data-dcnode-id="4564" instrument_node="">&lt;span class="wikilists"&gt;</span><ul data-dcnode-id="4561"><li data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node=""> Be aware that this may cause neighbors to dislike you/move away, tons of unwanted weeds to grow, or other time traveling side effects.&lt;/li&gt;</span></li></ul><span data-dcnode-id="4560" instrument_node="">&lt;/span&gt;&lt;!-- wikilists --&gt;</span></div></div><span data-dcnode-id="4557" instrument_node="">

</span></div><span data-dcnode-id="4361" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4352" data-field="cheat" id="cb74516"><div data-dcnode-id="4353"><span data-dcnode-id="4360" instrument_node="">This will be described in steps. This will help if you want the very expensive gracie grace furniture or want to pay off a loan.</span><br data-dcnode-id="4359"><span data-dcnode-id="4358" instrument_node="">Step 1: (note: you will need to have created 4 residents to live in the houses provided, plus they will need a shovel! Make sure you have completed the jobs from tom nook first!) Go round the four characters and find the money rock for each of them (yes! 4 money rocks!) which from each rock you will get 8100 bells. In a day, you will recieve 8100 x 4= 32,400.  </span><br data-dcnode-id="4357"><span data-dcnode-id="4356" instrument_node="">Step 2: Get the four money rocks each day for 7 days and you will get 226,800 in a week! Plus, buy a red turnip from joan on a sunday morning and take care of it for a week and you will get 16,000 bells if you sell it on saturday. </span><br data-dcnode-id="4355"><span data-dcnode-id="4354" instrument_node="">Step 3: Do this procedure for 5 weeks running, saving every bell you make and you will get 1214000 bells! Ok, so 5 weeks is a bit over a month, but still! Now use the money wisely, and you may even get more if you sell fruit and fossils, fish e.c.t. - Good Money making luck!</span></div></div><span data-dcnode-id="4351" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4270" data-field="cheat" id="cb73311"><div data-dcnode-id="4271"><span data-dcnode-id="4288" instrument_node="">I did this on the DS version and it works the same principle in this game.</span><br data-dcnode-id="4287"><span data-dcnode-id="4286" instrument_node="">1st. You need a friend who has the game and is willing to restsrt his town all the time (or hav more than one friend)</span><br data-dcnode-id="4285"><span data-dcnode-id="4284" instrument_node="">2nd. Take the fruit from your friends town (providing its different than your fruit) Then cut down a big are of trees in a part of your town (start in a top corner and count a 16 by 16 grid, easiest way is dig 16 holes in a row) and in this box neatly plant your fruit (1 kind of fruit) so it creates a nice Orchard.</span><br data-dcnode-id="4283"><span data-dcnode-id="4282" instrument_node="">3rd. Do this for all the fruits ( have more than 1 Orchard of each fruit)</span><br data-dcnode-id="4281"><br data-dcnode-id="4280"><span data-dcnode-id="4279" instrument_node="">Now the explaining part:</span><br data-dcnode-id="4278"><span data-dcnode-id="4277" instrument_node="">To get a perfect town you need to have a certain amount of trees in an area (16 by 16 grid if its the same as the DS)(i think its 9 to 12 trees) and you also need 3 or more flowers and no weeds of wilting flowers. but you need your entire town done like that. thats how you get the golden watering can!</span><br data-dcnode-id="4276"><span data-dcnode-id="4275" instrument_node="">Now that you have all or some different fruit sell it all and you will make about 200,000 in an hour, then time travel 2 - 3 days so the fruit grows back and sell it again.</span><br data-dcnode-id="4274"><br data-dcnode-id="4273"><span data-dcnode-id="4272" instrument_node="">Hope this helps cause me and my mates did it and now we're filthy rich (in bells of course)</span></div></div><span data-dcnode-id="4269" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4104" data-field="cheat" id="cb80986"><div data-dcnode-id="4105"><span data-dcnode-id="4115" instrument_node="">If you want to only bury 10,000 bells for a money tree and want it to definitely grow, follow these steps!</span><br data-dcnode-id="4114"><br data-dcnode-id="4113"><span data-dcnode-id="4112" instrument_node="">1. use an axe (gold or silver but normal will do) and chop down a tree, dig up the stump but don't seal the whole.</span><br data-dcnode-id="4111"><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">2.Get a bag of money (any amount but 10,000 will do) and bury it in the whole.</span><br data-dcnode-id="4108"><br data-dcnode-id="4107"><span data-dcnode-id="4106" instrument_node="">3. Place a lucky clover next to the tree and wait til it grows. It is a 99.9% chance of it working this way. Guess what? After this, money will grow on that tree.</span></div></div><span data-dcnode-id="4103" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4052" data-field="cheat" id="cb73688"><div data-dcnode-id="4053"><span data-dcnode-id="4077" instrument_node="">You Need:</span><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">-Shovel</span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node="">-a Fruit that DOESN'T grow in your town</span><br data-dcnode-id="4072"><span data-dcnode-id="4071" instrument_node="">-Axe</span><br data-dcnode-id="4070"><br data-dcnode-id="4069"><span data-dcnode-id="4068" instrument_node="">1.Find Fruit Tree</span><br data-dcnode-id="4067"><span data-dcnode-id="4066" instrument_node="">2.Cut it down</span><br data-dcnode-id="4065"><span data-dcnode-id="4064" instrument_node="">3.Dig out Stump</span><br data-dcnode-id="4063"><span data-dcnode-id="4062" instrument_node="">4.Stand in front of hole</span><br data-dcnode-id="4061"><span data-dcnode-id="4060" instrument_node="">5.Open Pocket</span><br data-dcnode-id="4059"><span data-dcnode-id="4058" instrument_node="">6.Select bury on Fruit</span><br data-dcnode-id="4057"><br data-dcnode-id="4056"><span data-dcnode-id="4055" instrument_node="">Wait till the tree grows your new fruit then harvest it. Repeat all steps. Sell fruit for more money than original fruit.</span><br data-dcnode-id="4054"></div></div><span data-dcnode-id="4051" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="4014" data-field="cheat" id="cb72468"><div data-dcnode-id="4015"><span data-dcnode-id="4020" instrument_node="">If you want tons of money read this</span><br data-dcnode-id="4019"><span data-dcnode-id="4018" instrument_node="">when you start your game go to other things and change the date to halloweennow when you start the game put on a shirt that is worth almost nothing i.e. work uniform. Now that you have changed you shirt fill your pockets with fruits from you town or stuff that worth nothing. now go outside and when someone asks you for candy say no and they will change your head to a pumpkin. dont worry it acts like a helm so you can take it off and keep it.next time someone asks say no and they will ruin your shirt. k now is where the money come in. now every time you say no when someone asks for money. they will change something in your inventory into a jack in the box. now go to tom nooks store and sell your jack in the boxs. they sell for 1000 bells each. and since the trick or treaters only tranform at worthless item it is pure profit.</span><br data-dcnode-id="4017"><span data-dcnode-id="4016" instrument_node="">hope i helped :]</span></div></div><span data-dcnode-id="4013" instrument_node="">

</span></div><span data-dcnode-id="3988" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="3982" data-field="cheat" id="cb81477"><div data-dcnode-id="3983"><span data-dcnode-id="3987" instrument_node="">Give yourself more bag space by writing letters to yourself, but not sending them. You can then put items up there like fruit, furniture, and your tools while walking around town. When you get to Nook's, remove the items from the letters and sell what you want. I personally use 9 which allows for easy fruit gathering with 15 slots in the bags, but you can use however many you want. Letters are so cheap that if I get a lot of mail I throw them away so I can read my mail, then buy new ones, but most times, I'll just read my mail one at a time. </span><br data-dcnode-id="3986"><br data-dcnode-id="3985"><span data-dcnode-id="3984" instrument_node="">This allows me to bring in 3 more trees at a time and when I'm harvesting non-native fruit, that's 500 bells a pop allowing for much faster fruit harvesting!</span></div></div><span data-dcnode-id="3981" instrument_node="">

</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="3953" data-field="cheat" id="cb73323"><div data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Every day if you go down to the beach and walk around you will see sea shells. If you pick them up you can sell them to Nook for easy bells. Its much easier than fruit harvesting because every few minutes or so, more shells will appear on the shoreline.</span></div></div><span data-dcnode-id="3952" instrument_node="">

</span><strong data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Multiple Jingle Gifts</span></strong><span data-dcnode-id="3929" instrument_node="">
</span></div><span data-dcnode-id="3927" instrument_node="">
</span><div class="cheat_body text collapsed_wrapper large" data-dcnode-id="3892" data-field="cheat" id="cb73544"><div data-dcnode-id="3893"><span data-dcnode-id="3926" instrument_node="">O.K. just to be clear for everyone.</span><br data-dcnode-id="3925"><span data-dcnode-id="3924" instrument_node="">Jingle comes late Christmas Eve from 8:00P.M. to midnight (12:00A.M.)</span><br data-dcnode-id="3923"><br data-dcnode-id="3922"><span data-dcnode-id="3921" instrument_node="">Important: He will give you one present depending on the accessories or hats you have on at the time of meeting him.</span><br data-dcnode-id="3920"><br data-dcnode-id="3919"><span data-dcnode-id="3918" instrument_node="">1.Go find Jingle on the 24th without anything on except your shirt.</span><br data-dcnode-id="3917"><span data-dcnode-id="3916" instrument_node="">2.After you get the present go inside a house, museum, whatever and put on 1 of either a hat or accessory.</span><br data-dcnode-id="3915"><span data-dcnode-id="3914" instrument_node="">3.Walk back out and find Jingle again, he will say that he thought he saw someone like you before and will proceed with the interrogation of what you like again so he can make up his mind on what kind of gift to give you.</span><br data-dcnode-id="3913"><span data-dcnode-id="3912" instrument_node="">4.Repeat this method as many times as you like or until you get every piece of furniture.</span><br data-dcnode-id="3911"><span data-dcnode-id="3910" instrument_node="">5.If Jingle happens to dissapear during this, don't panic.</span><br data-dcnode-id="3909"><span data-dcnode-id="3908" instrument_node="">6.Save your game.</span><br data-dcnode-id="3907"><span data-dcnode-id="3906" instrument_node="">7.Rewind time back 1 day.</span><br data-dcnode-id="3905"><span data-dcnode-id="3904" instrument_node="">8.Load your character up so it registers the day change.</span><br data-dcnode-id="3903"><span data-dcnode-id="3902" instrument_node="">9.Save again and fast forward back to the 24th.</span><br data-dcnode-id="3901"><span data-dcnode-id="3900" instrument_node="">10.And repeat steps 1-3 as desired.</span><br data-dcnode-id="3899"><br data-dcnode-id="3898"><span data-dcnode-id="3897" instrument_node="">I hope this helps everyone!!!</span><br data-dcnode-id="3896"><br data-dcnode-id="3895"><span data-dcnode-id="3894" instrument_node="">~AmazingXeno</span></div></div><span data-dcnode-id="3891" instrument_node="">
