ir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya_dynasty" title="Chalukya dynasty"><span data-dcnode-id="4919" instrument_node="">Chalukya</span></a><span data-dcnode-id="4917" instrument_node=""> dynasties and the </span><a data-dcnode-id="4915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoysala_Empire" title="Hoysala Empire"><span data-dcnode-id="4916" instrument_node="">Hoysala Empire</span></a><span data-dcnode-id="4914" instrument_node="">. Today the state is home to a number of Jain monuments, such as </span><a data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jain_temple" title="Jain temple"><span data-dcnode-id="4913" instrument_node="">temples</span></a><span data-dcnode-id="4911" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gommata_statue" title="Gommata statue"><span data-dcnode-id="4910" instrument_node="">Gommata statues</span></a><span data-dcnode-id="4908" instrument_node=""> and </span><a data-dcnode-id="4906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stambha" title="Stambha"><span data-dcnode-id="4907" instrument_node="">stambhas</span></a><span data-dcnode-id="4905" instrument_node="">.

</span><h2 data-dcnode-id="4761"><span class="mw-headline" data-dcnode-id="4769" id="History"><span data-dcnode-id="4770" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="4762"><span class="mw-editsection-bracket" data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">[</span></span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJainism_in_Karnataka%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="4766" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4760" instrument_node="">
</span><p data-dcnode-id="4725"><span data-dcnode-id="4759" instrument_node="">Historical association of Jainism with </span><a data-dcnode-id="4757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="4758" instrument_node="">Karnataka</span></a><span data-dcnode-id="4756" instrument_node=""> dates back to the 3rd century BC.</span><sup class="reference" data-dcnode-id="4753" id="cite_ref-FOOTNOTESangave2001a115_1-0"><a data-dcnode-id="4754" href="#cite_note-FOOTNOTESangave2001a115-1"><span data-dcnode-id="4755" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="4750" id="cite_ref-jain_2-0"><a data-dcnode-id="4751" href="#cite_note-jain-2"><span data-dcnode-id="4752" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4749" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acharya_Bhadrabahu" title="Acharya Bhadrabahu"><span data-dcnode-id="4748" instrument_node="">Acharya Bhadrabahu</span></a><span data-dcnode-id="4746" instrument_node=""> predicted a twelve-year-long famine in north India and led the migration of Jain sangha to the south.</span><sup class="reference" data-dcnode-id="4743" id="cite_ref-FOOTNOTESangave2001a115_1-1"><a data-dcnode-id="4744" href="#cite_note-FOOTNOTESangave2001a115-1"><span data-dcnode-id="4745" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4742" instrument_node=""> He was accompanied by his disciple </span><a data-dcnode-id="4740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chandragupta_Maurya" title="Chandragupta Maurya"><span data-dcnode-id="4741" instrument_node="">Chandragupta Maurya</span></a><span data-dcnode-id="4739" instrument_node=""> and the </span><i data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">Sangha</span></i><span data-dcnode-id="4736" instrument_node=""> halted at </span><a class="mw-redirect" data-dcnode-id="4734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chandragiri_Hill" title="Chandragiri Hill"><span data-dcnode-id="4735" instrument_node="">Chandragiri Hill</span></a><span data-dcnode-id="4733" instrument_node="">. Realising that he was nearing the end of his life, Bhadrabahu instructed his disciples to spread the religion and he undertook </span><a data-dcnode-id="4731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sallekhana" title="Sallekhana"><span data-dcnode-id="4732" instrument_node="">sallekhana</span></a><span data-dcnode-id="4730" instrument_node=""> at Chandragiri.</span><sup class="reference" data-dcnode-id="4727" id="cite_ref-3"><a data-dcnode-id="4728" href="#cite_note-3"><span data-dcnode-id="4729" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4726" instrument_node="">
</span></p><p data-dcnode-id="4719"><span data-dcnode-id="4724" instrument_node="">Chandragupta Maurya continued to live on this hill worshipping the foot prints of his teacher and later he too took Sallekhana. There are two monuments on the hill recalling this event, a rock cut cave called Bhadrabahu cave and a structural shrine called the Chandragupta Basadi.</span><sup class="reference" data-dcnode-id="4721" id="cite_ref-4"><a data-dcnode-id="4722" href="#cite_note-4"><span data-dcnode-id="4723" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4720" instrument_node="">
</span></p><span data-dcnode-id="4718" instrument_node="">

nabelagola"><span data-dcnode-id="4698" instrument_node="">Shravanabelagola</span></a></div></div></div><span data-dcnode-id="4693" instrument_node="">
</span><p data-dcnode-id="4657"><span data-dcnode-id="4692" instrument_node="">There are a number of monuments relating to the Jain religion in Karnataka. The Jain monuments include smaller shrines, Jain temples (known as </span><i data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">Bastis</span></i><span data-dcnode-id="4689" instrument_node=""> or Basadis), Gommata statues and Sthambas (pillars). Moodabidri is home to the </span><a class="mw-redirect" data-dcnode-id="4687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1000_Pillar_Jain_temple" title="1000 Pillar Jain temple"><span data-dcnode-id="4688" instrument_node="">1000 Pillar Jain temple</span></a><span data-dcnode-id="4686" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4679" style="white-space:nowrap;"><span data-dcnode-id="4685" instrument_node="">[</span><i data-dcnode-id="4681"><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4683" title="This claim needs references to reliable sources. (May 2021)"><span data-dcnode-id="4684" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4680" instrument_node="">]</span></sup><span data-dcnode-id="4678" instrument_node=""> The Ganga-Permadi temple at </span><a data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annigeri" title="Annigeri"><span data-dcnode-id="4677" instrument_node="">Annigeri</span></a><span data-dcnode-id="4675" instrument_node=""> in Navalgund taluq received donation of land from </span><i data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">mahasamanta</span></i><span data-dcnode-id="4672" instrument_node=""> Katarsa in 1074 CE for maintenance of charity-houses.</span><sup class="reference" data-dcnode-id="4669" id="cite_ref-FOOTNOTERam_Bhushan_Prasad_Singh200883_5-0"><a data-dcnode-id="4670" href="#cite_note-FOOTNOTERam_Bhushan_Prasad_Singh200883-5"><span data-dcnode-id="4671" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4668" instrument_node=""> Another temple named </span><i data-dcnode-id="4666"><span data-dcnode-id="4667" instrument_node="">Samyakratnakara basadi</span></i><span data-dcnode-id="4665" instrument_node=""> situated at Mugad, </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharwad_district" title="Dharwad district"><span data-dcnode-id="4664" instrument_node="">Dharwad district</span></a><span data-dcnode-id="4662" instrument_node=""> received a similar donation some time before 11th century CE.</span><sup class="reference" data-dcnode-id="4659" id="cite_ref-FOOTNOTERam_Bhushan_Prasad_Singh200883_5-1"><a data-dcnode-id="4660" href="#cite_note-FOOTNOTERam_Bhushan_Prasad_Singh200883-5"><span data-dcnode-id="4661" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4658" instrument_node="">

</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4483" role="note"><span data-dcnode-id="4486" instrument_node="">Main article: </span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahubali" title="Bahubali"><span data-dcnode-id="4485" instrument_node="">Bahubali</span></a></div><span data-dcnode-id="4482" instrument_node="">
</span><p data-dcnode-id="4460"><a data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shravanabelagola" title="Shravanabelagola"><span data-dcnode-id="4481" instrument_node="">Shravanabelagola</span></a><span data-dcnode-id="4479" instrument_node=""> has the world famous monolithic statue, </span><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gommateshwara_statue" title="Gommateshwara statue"><span data-dcnode-id="4478" instrument_node="">Gommateshwara statue</span></a><span data-dcnode-id="4476" instrument_node="">. Similar Monolithic statues of Lord </span><a data-dcnode-id="4474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahubali" title="Bahubali"><span data-dcnode-id="4475" instrument_node="">Bahubali</span></a><span data-dcnode-id="4473" instrument_node=""> can be also seen in </span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venur" title="Venur"><span data-dcnode-id="4472" instrument_node="">Venur</span></a><span data-dcnode-id="4470" instrument_node="">, </span><a data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharmasthala" title="Dharmasthala"><span data-dcnode-id="4469" instrument_node="">Dharmasthala</span></a><span data-dcnode-id="4467" instrument_node="">, </span><a data-dcnode-id="4465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karkala" title="Karkala"><span data-dcnode-id="4466" instrument_node="">Karkala</span></a><span data-dcnode-id="4464" instrument_node=""> and </span><a data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore" title="Mysore"><span data-dcnode-id="4463" instrument_node="">Mysore</span></a><span data-dcnode-id="4461" instrument_node="">.
</span></p><p data-dcnode-id="4447"><span data-dcnode-id="4459" instrument_node="">There are five monolithic statues of Bahubali in </span><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="4458" instrument_node="">Karnataka</span></a><span data-dcnode-id="4456" instrument_node=""> measuring more than 20 feet in height.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4449" style="white-space:nowrap;"><span data-dcnode-id="4455" instrument_node="">[</span><i data-dcnode-id="4451"><a data-dcnode-id="4452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4453" title="This claim needs references to reliable sources. (February 2019)"><span data-dcnode-id="4454" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4450" instrument_node="">]</span></sup><span data-dcnode-id="4448" instrument_node="">
</span></p><span data-dcnode-id="4446" instrument_node="">
</span><ul data-dcnode-id="4401"><li data-dcnode-id="4438"><span data-dcnode-id="4445" instrument_node="">57 feet at </span><a data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shravanabelagola" title="Shravanabelagola"><span data-dcnode-id="4444" instrument_node="">Shravanabelagola</span></a><span data-dcnode-id="4442" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hassan_District" title="Hassan District"><span data-dcnode-id="4441" instrument_node="">Hassan District</span></a><span data-dcnode-id="4439" instrument_node=""> in 981 CE</span></li><span data-dcnode-id="4437" instrument_node="">

</span><p data-dcnode-id="4387"><span data-dcnode-id="4399" instrument_node="">In all of the above-mentioned places, the holy festival of </span><i data-dcnode-id="4396"><a data-dcnode-id="4397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahamastakabhisheka" title="Mahamastakabhisheka"><span data-dcnode-id="4398" instrument_node="">Mahamastakabhisheka</span></a></i><span data-dcnode-id="4395" instrument_node=""> is held once every 12 years when the statue of Bahubali is worshiped and bathed in holy water, milk, turmeric, and other natural herbs that have their own significant importance.</span><sup class="reference" data-dcnode-id="4392" id="cite_ref-7"><a data-dcnode-id="4393" href="#cite_note-7"><span data-dcnode-id="4394" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="4389" id="cite_ref-8"><a data-dcnode-id="4390" href="#cite_note-8"><span data-dcnode-id="4391" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4388" instrument_node="">

</span><link data-dcnode-id="4292" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4288" role="note"><span data-dcnode-id="4291" instrument_node="">Main article: </span><a data-dcnode-id="4289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jainism_in_North_Karnataka" title="Jainism in North Karnataka"><span data-dcnode-id="4290" instrument_node="">Jainism in North Karnataka</span></a></div><span data-dcnode-id="4287" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4274"><div class="thumbinner" data-dcnode-id="4275" style="width:222px;"><a class="image" data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg"><img alt="" class="thumbimage" data-dcnode-id="4286" data-file-height="1302" data-file-width="2592" decoding="async" height="111" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Jain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg/220px-Jain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Jain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg/330px-Jain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Jain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg/440px-Jain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg 2x" width="220"></a><span data-dcnode-id="4284" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4276"><div class="magnify" data-dcnode-id="4282"><a class="internal" data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJain_temple_at_Lakkundi_built_in_the_Kalyani_Chalukya_style.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="4280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brahma_Jinalaya" title="Brahma Jinalaya"><span data-dcnode-id="4281" instrument_node="">Brahma Jinalaya</span></a><span data-dcnode-id="4279" instrument_node=""> at </span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakkundi" title="Lakkundi"><span data-dcnode-id="4278" instrument_node="">Lakkundi</span></a></div></div></div><span data-dcnode-id="4273" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4257"><div class="thumbinner" data-dcnode-id="4258" style="width:222px;"><a class="image" data-dcnode-id="4271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJain_Narayana_temple_at_Pattadakal.JPG"><img alt="" class="thumbimage" data-dcnode-id="4272" data-file-height="1944" data-file-width="2592" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Jain_Narayana_temple_at_Pattadakal.JPG/220px-Jain_Narayana_temple_at_Pattadakal.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Jain_Narayana_temple_at_Pattadakal.JPG/330px-Jain_Narayana_temple_at_Pattadakal.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Jain_Narayana_temple_at_Pattadakal.JPG/440px-Jain_Narayana_temple_at_Pattadakal.JPG 2x" width="220"></a><span data-dcnode-id="4270" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4259"><div class="magnify" data-dcnode-id="4268"><a class="internal" data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJain_Narayana_temple_at_Pattadakal.JPG" title="Enlarge"></a></div><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattadakal%23Jain_Narayana_Temple" title="Pattadakal"><span data-dcnode-id="4267" instrument_node="">Jain Narayana temple</span></a><span data-dcnode-id="4265" instrument_node="">, a </span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="4264" instrument_node="">UNESCO</span></a><span data-dcnode-id="4262" instrument_node=""> </span><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Heritage_Site" title="World Heritage Site"><span data-dcnode-id="4261" instrument_node="">World Heritage Site</span></a></div></div></div><span data-dcnode-id="4256" instrument_node="">
</span><p data-dcnode-id="4235"><span data-dcnode-id="4255" instrument_node="">Jainism in North Karnataka flourished under the </span><a class="mw-redirect" data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukyas" title="Chalukyas"><span data-dcnode-id="4254" instrument_node="">Chalukyas</span></a><span data-dcnode-id="4252" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadamba_Dynasty" title="Kadamba Dynasty"><span data-dcnode-id="4251" instrument_node="">Kadamba</span></a><span data-dcnode-id="4249" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashtrakutas" title="Rashtrakutas"><span data-dcnode-id="4248" instrument_node="">Rashtrakutas</span></a><span data-dcnode-id="4246" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara_empire" title="Vijayanagara empire"><span data-dcnode-id="4245" instrument_node="">Vijayanagara empire</span></a><span data-dcnode-id="4243" instrument_node="">.</span><sup class="reference" data-dcnode-id="4240" id="cite_ref-9"><a data-dcnode-id="4241" href="#cite_note-9"><span data-dcnode-id="4242" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4239" instrument_node=""> Imbued with an intense religious feeling, lavish patronage was extended towards the building of basadis, temples and magnificent statues. </span><a data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jainism" title="Jainism"><span data-dcnode-id="4238" instrument_node="">Jainism</span></a><span data-dcnode-id="4236" instrument_node=""> enjoyed the highest repute among the people particularly the ruling classes and the mercantile community thus virtually becoming the state religion.
</span></p><p data-dcnode-id="4195"><span data-dcnode-id="4234" instrument_node="">The earliest dated structure is a </span><a class="mw-redirect" data-dcnode-id="4232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basadi" title="Basadi"><span data-dcnode-id="4233" instrument_node="">Basadi</span></a><span data-dcnode-id="4231" instrument_node=""> at </span><a data-dcnode-id="4229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halasi" title="Halasi"><span data-dcnode-id="4230" instrument_node="">Halasi</span></a><span data-dcnode-id="4228" instrument_node=""> built under the </span><a class="mw-redirect" data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadamba_Dynasty" title="Kadamba Dynasty"><span data-dcnode-id="4227" instrument_node="">Kadamba Dynasty</span></a><span data-dcnode-id="4225" instrument_node=""> of </span><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banavasi" title="Banavasi"><span data-dcnode-id="4224" instrument_node="">Banavasi</span></a><span data-dcnode-id="4222" instrument_node=""> thus laying the foundation for Jain architecture in </span><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Karnataka" title="North Karnataka"><span data-dcnode-id="4221" instrument_node="">North Karnataka</span></a><span data-dcnode-id="4219" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="4217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rastrakutas" title="Rastrakutas"><span data-dcnode-id="4218" instrument_node="">Rastrakutas</span></a><span data-dcnode-id="4216" instrument_node=""> period is the golden age of Jainism in Karnataka. The Jaina monuments of the Rashtrakutas period are found at </span><a data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattadakal" title="Pattadakal"><span data-dcnode-id="4215" instrument_node="">Pattadakal</span></a><span data-dcnode-id="4213" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malkhed" title="Malkhed"><span data-dcnode-id="4212" instrument_node="">Malkhed</span></a><span data-dcnode-id="4210" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakshmeshwar" title="Lakshmeshwar"><span data-dcnode-id="4209" instrument_node="">Lakshmeshwar</span></a><span data-dcnode-id="4207" instrument_node="">, </span><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Koppal" title="Koppal"><span data-dcnode-id="4206" instrument_node="">Koppal</span></a><span data-dcnode-id="4204" instrument_node="">, Bankur, of North Karnataka. Jainism exerted considerable influence over the cultural life of Karnataka during the rule of the Rashtrakutas.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4197" style="white-space:nowrap;"><span data-dcnode-id="4203" instrument_node="">[</span><i data-dcnode-id="4199"><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4201" title="This claim needs references to reliable sources. (February 2019)"><span data-dcnode-id="4202" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4198" instrument_node="">]</span></sup><span data-dcnode-id="4196" instrument_node="">
</span></p><p data-dcnode-id="4181"><a class="mw-redirect" data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadambas" title="Kadambas"><span data-dcnode-id="4194" instrument_node="">Kadambas</span></a><span data-dcnode-id="4192" instrument_node=""> of </span><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banavasi" title="Banavasi"><span data-dcnode-id="4191" instrument_node="">Banavasi</span></a><span data-dcnode-id="4189" instrument_node=""> were known to be patrons of Jainism. After the rule of the Kadambas of Banavasi most parts of north Karnataka came under the rule of the early Chalukya or </span><a class="mw-redirect" data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badami_Chalukyas" title="Badami Chalukyas"><span data-dcnode-id="4188" instrument_node="">Badami Chalukyas</span></a><span data-dcnode-id="4186" instrument_node="">.</span><sup class="reference" data-dcnode-id="4183" id="cite_ref-FOOTNOTESangave2001b174_10-0"><a data-dcnode-id="4184" href="#cite_note-FOOTNOTESangave2001b174-10"><span data-dcnode-id="4185" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4182" instrument_node="">
</span></p><p data-dcnode-id="4154"><span data-dcnode-id="4180" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukyas" title="Chalukyas"><span data-dcnode-id="4179" instrument_node="">Chalukyas</span></a><span data-dcnode-id="4177" instrument_node=""> of </span><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badami" title="Badami"><span data-dcnode-id="4176" instrument_node="">Badami</span></a><span data-dcnode-id="4174" instrument_node=""> built cave temples at </span><a data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badami" title="Badami"><span data-dcnode-id="4173" instrument_node="">Badami</span></a><span data-dcnode-id="4171" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattadkal" title="Pattadkal"><span data-dcnode-id="4170" instrument_node="">Pattadkal</span></a><span data-dcnode-id="4168" instrument_node=""> and </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aihole" title="Aihole"><span data-dcnode-id="4167" instrument_node="">Aihole</span></a><span data-dcnode-id="4165" instrument_node="">. </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakshmeshwara_Jain_temples" title="Lakshmeshwara Jain temples"><span data-dcnode-id="4164" instrument_node="">Puligere</span></a><span data-dcnode-id="4162" instrument_node=""> (modern </span><a data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakshmeshwara" title="Lakshmeshwara"><span data-dcnode-id="4161" instrument_node="">Lakshmeshwara</span></a><span data-dcnode-id="4159" instrument_node="">) was a strong centre of religious activities of the Jain monks during this era.</span><sup class="reference" data-dcnode-id="4156" id="cite_ref-FOOTNOTEAbram2003285_11-0"><a data-dcnode-id="4157" href="#cite_note-FOOTNOTEAbram2003285-11"><span data-dcnode-id="4158" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4155" instrument_node="">
</span></p><p data-dcnode-id="4137"><a data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakkundi" title="Lakkundi"><span data-dcnode-id="4153" instrument_node="">Lakkundi</span></a><span data-dcnode-id="4151" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="4149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gadag_District" title="Gadag District"><span data-dcnode-id="4150" instrument_node="">Gadag District</span></a><span data-dcnode-id="4148" instrument_node=""> has a large Brahma Jinalaya of </span><i data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">Chalukya</span></i><span data-dcnode-id="4145" instrument_node=""> style, built by a noble lady, </span><a data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attimabbe" title="Attimabbe"><span data-dcnode-id="4144" instrument_node="">Attimabbe</span></a><span data-dcnode-id="4142" instrument_node="">.</span><sup class="reference" data-dcnode-id="4139" id="cite_ref-FOOTNOTEHartmannRay20202360_12-0"><a data-dcnode-id="4140" href="#cite_note-FOOTNOTEHartmannRay20202360-12"><span data-dcnode-id="4141" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4138" instrument_node="">
</span></p><p data-dcnode-id="4126"><a data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navagraha_Jain_Temple" title="Navagraha Jain Temple"><span data-dcnode-id="4136" instrument_node="">Navagraha Jain Temple</span></a><span data-dcnode-id="4134" instrument_node=""> at Varur near </span><a data-dcnode-id="4132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubli" title="Hubli"><span data-dcnode-id="4133" instrument_node="">Hubli</span></a><span data-dcnode-id="4131" instrument_node=""> is one of the major pilgrimage. The temple features a 61 feet (18.6 m) tall monolithic idol of the Shri 1008 Bhagavan Parshvanatha and the smaller statues of the other 8 Jain teerthankaras.</span><sup class="reference" data-dcnode-id="4128" id="cite_ref-13"><a data-dcnode-id="4129" href="#cite_note-13"><span data-dcnode-id="4130" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4127" instrument_node="">

</span><p data-dcnode-id="4077"><span data-dcnode-id="4107" instrument_node="">The </span><a data-dcnode-id="4105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dakshin_Bharat_Jain_Sabha" title="Dakshin Bharat Jain Sabha"><span data-dcnode-id="4106" instrument_node="">Dakshin Bharat Jain Sabha</span></a><span data-dcnode-id="4104" instrument_node=""> is a religious and social service organisation of the </span><a data-dcnode-id="4102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jainism" title="Jainism"><span data-dcnode-id="4103" instrument_node="">Jains</span></a><span data-dcnode-id="4101" instrument_node=""> of South India. The organisation is headquartered at </span><a data-dcnode-id="4099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kolhapur" title="Kolhapur"><span data-dcnode-id="4100" instrument_node="">Kolhapur</span></a><span data-dcnode-id="4098" instrument_node="">, Maharashtra, India.</span><sup class="reference" data-dcnode-id="4095" id="cite_ref-14"><a data-dcnode-id="4096" href="#cite_note-14"><span data-dcnode-id="4097" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4094" instrument_node=""> The association is credited with being one of the first Jain associations to start reform movements among the Jains in modern India.</span><sup class="reference" data-dcnode-id="4091" id="cite_ref-15"><a data-dcnode-id="4092" href="#cite_note-15"><span data-dcnode-id="4093" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="4088" id="cite_ref-16"><a data-dcnode-id="4089" href="#cite_note-16"><span data-dcnode-id="4090" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4087" instrument_node=""> The organisation mainly seeks to represent the interests of the native Jains of Maharashtra (</span><a class="mw-redirect" data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marathi_Jains" title="Marathi Jains"><span data-dcnode-id="4086" instrument_node="">Marathi Jains</span></a><span data-dcnode-id="4084" instrument_node="">), Karnataka (</span><a class="mw-redirect" data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_Jains" title="Kannada Jains"><span data-dcnode-id="4083" instrument_node="">Kannada Jains</span></a><span data-dcnode-id="4081" instrument_node="">) and </span><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jainism_in_Goa" title="Jainism in Goa"><span data-dcnode-id="4080" instrument_node="">Goa</span></a><span data-dcnode-id="4078" instrument_node="">.
