</span><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="1137"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="1138"><div class="vc_column-inner" data-dcnode-id="1139"><div class="wpb_wrapper" data-dcnode-id="1140"><span data-dcnode-id="1289" instrument_node="">

</span><div class="wpb_wrapper" data-dcnode-id="1146"><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Karnataka is the land of spectacular scenic beauty and picturesque views. It has some of the most incredible and wide array of beaches. These exquisite coasts along the Arabian Sea are extremely beautiful and captivating with its sparkling water and glistening sand beaches. Some of the must visit beaches in the State of Karnataka are:</span></p><span data-dcnode-id="1284" instrument_node="">
</span><h4 data-dcnode-id="1280"><span data-dcnode-id="1281" style="text-decoration: underline;"><b data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Om Beach</span></b></span></h4><span data-dcnode-id="1279" instrument_node="">
</span><h4 data-dcnode-id="1276"><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/accommodation/om-beach-resort/" rel="noopener noreferrer" target="_blank"><img alt="" class="size-full wp-image-123564 aligncenter" data-dcnode-id="1278" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Boats-in-Om-Beach.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Boats-in-Om-Beach.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Boats-in-Om-Beach-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Boats-in-Om-Beach-768x384.jpg 768w" width="100%!important"></a></h4><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1271"><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/accommodation/om-beach-resort/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1274" instrument_node="">Om Beach</span></a><span data-dcnode-id="1272" instrument_node=""> is located in Gokarna and it has become a popular tourist destination. The beach gets its name from the Hindu religious symbol Om as the shape of this coast resembles this particular symbol.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><h4 data-dcnode-id="1266"><span data-dcnode-id="1267" style="text-decoration: underline;"><b data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Panambur Beach</span></b></span></h4><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><img alt="" class="aligncenter size-full wp-image-123566" data-dcnode-id="1264" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Panambur-Beach-1.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Panambur-Beach-1.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Panambur-Beach-1-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Panambur-Beach-1-768x384.jpg 768w" width="100%!important"></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">Located in Mangalore, the </span><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/panambur-beach/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1260" instrument_node="">Panambur beach</span></a><span data-dcnode-id="1258" instrument_node=""> is a beautiful reflection of sunset and sunrise in the dark waters of Arabian Sea. It has become a famous picnic spot for the amazing views that can be enjoyed from here. It is one of the cleanest and safest beaches in Karnataka.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><h4 data-dcnode-id="1252"><span data-dcnode-id="1253" style="text-decoration: underline;"><b data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Kudle Beach</span></b></span></h4><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1248"><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/accommodation/kudle-beach-view-resort-spa/" rel="noopener noreferrer" target="_blank"><img alt="" class="aligncenter size-full wp-image-123568" data-dcnode-id="1250" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Kudle-Beach.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Kudle-Beach.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Kudle-Beach-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Kudle-Beach-768x384.jpg 768w" width="100%!important"></a></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1243"><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/accommodation/kudle-beach-view-resort-spa/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1246" instrument_node="">Kudle Beach</span></a><span data-dcnode-id="1244" instrument_node=""> is also located in Gokarna and is best for tourists who like to spend some time alone with themselves. The ambience of this beach is quite serene and tranquil which offers unmatched peace of mind.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><h4 data-dcnode-id="1238"><span data-dcnode-id="1239" style="text-decoration: underline;"><b data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Paradise Beach</span></b></span></h4><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1234"><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/accommodation/kudle-beach-view-resort-spa/" rel="noopener noreferrer" target="_blank"><img alt="" class="aligncenter size-full wp-image-123569" data-dcnode-id="1236" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Paradise-Beach1.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Paradise-Beach1.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Paradise-Beach1-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Paradise-Beach1-768x384.jpg 768w" width="100%!important"></a></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1229"><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/accommodation/kudle-beach-view-resort-spa/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1232" instrument_node="">Paradise beach</span></a><span data-dcnode-id="1230" instrument_node=""> is located in Gokarna, There are several adventurous activities that you can take part in when visiting the beach. Sport events as well as sailing are some of the amazing and exciting things you can be a part of.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><h4 data-dcnode-id="1224"><span data-dcnode-id="1225" style="text-decoration: underline;"><b data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Tannirbhavi Beach</span></b></span></h4><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1220"><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/tannirbhavi-beach/" rel="noopener noreferrer" target="_blank"><img alt="" class="aligncenter size-full wp-image-123571" data-dcnode-id="1222" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Tannirbhavi-Beach.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Tannirbhavi-Beach.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Tannirbhavi-Beach-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Tannirbhavi-Beach-768x384.jpg 768w" width="100%!important"></a></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1215"><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/tannirbhavi-beach/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1218" instrument_node="">Tannirbhavi beach</span></a><span data-dcnode-id="1216" instrument_node=""> is located in Mangalore and is white clean and well maintained. It has lush green trees at some distance which complement the blue water of the sea perfectly.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><h4 data-dcnode-id="1210"><span data-dcnode-id="1211" style="text-decoration: underline;"><b data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Half Moon Beach</span></b></span></h4><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><img alt="" class="aligncenter size-full wp-image-123572" data-dcnode-id="1208" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Half-Moon-Beach.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Half-Moon-Beach.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Half-Moon-Beach-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Half-Moon-Beach-768x384.jpg 768w" width="100%!important"></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">This beach is located in Gokarna and is quite an attractive tourist spot. This place is unreachable by road. You would have to hike to get to Half Moon beach or you can take motorboats available from Om Beach.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><h4 data-dcnode-id="1199"><span data-dcnode-id="1200" style="text-decoration: underline;"><b data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Malpe Beach</span></b></span></h4><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1195"><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/malpe-beach/" rel="noopener noreferrer" target="_blank"><img alt="" class="aligncenter size-full wp-image-123573" data-dcnode-id="1197" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Malpe-Beach.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Malpe-Beach.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Malpe-Beach-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Malpe-Beach-768x384.jpg 768w" width="100%!important"></a></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1190"><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/malpe-beach/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1193" instrument_node="">Malpe Beach</span></a><span data-dcnode-id="1191" instrument_node="">&nbsp;coastal area is located about 6 kilometres away from Udupi and is perfect for a holiday with friends and family. It offers the perfect view of St. Mary’s Island and it looks extremely beautiful since this place has not been exploited by commercial tourism.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h4 data-dcnode-id="1185"><span data-dcnode-id="1186" style="text-decoration: underline;"><b data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Kasarkod Beach</span></b></span></h4><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><img alt="" class="aligncenter size-full wp-image-123574" data-dcnode-id="1183" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Kasarkod-beach.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Kasarkod-beach.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Kasarkod-beach-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Kasarkod-beach-768x384.jpg 768w" width="100%!important"></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1180" instrument_node="">This spectacular beach is located next to the</span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/my-trip-to-the-blue-flag-beaches/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1179" instrument_node=""> Kasarkod</span></a><span data-dcnode-id="1177" instrument_node=""> village and is a certified </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/my-trip-to-the-blue-flag-beaches/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1176" instrument_node="">blue flag beach</span></a><span data-dcnode-id="1174" instrument_node="">. It is clean and very well maintained. It has one of the most brilliant views of the sea in Karnataka.</span></p><span data-dcnode-id="1172" instrument_node="">
</span><h4 data-dcnode-id="1168"><span data-dcnode-id="1169" style="text-decoration: underline;"><b data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Padubidri Beach</span></b></span></h4><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><img alt="" class="aligncenter size-full wp-image-123575" data-dcnode-id="1166" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/Padubidri-Beach.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/Padubidri-Beach.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Padubidri-Beach-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/Padubidri-Beach-768x384.jpg 768w" width="100%!important"></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">This coastal front is located in Udupi and is another one of the blue flag beaches. The reflection of the deep blue sky on the water creates an adventurous and thrilling environment.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><h4 data-dcnode-id="1157"><span data-dcnode-id="1158" style="text-decoration: underline;"><b data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Devbagh Beach</span></b></span></h4><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1153"><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/devbagh-beach-karwar/" rel="noopener noreferrer" target="_blank"><img alt="" class="aligncenter size-full wp-image-123576" data-dcnode-id="1155" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/wp-content/uploads/2021/05/devbagh-beach-karwar-2.jpg&amp;raw" srcset="https://www.karnatakatourism.org/wp-content/uploads/2021/05/devbagh-beach-karwar-2.jpg 1000w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/devbagh-beach-karwar-2-300x150.jpg 300w, https://www.karnatakatourism.org/wp-content/uploads/2021/05/devbagh-beach-karwar-2-768x384.jpg 768w" width="100%!important"></a></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1148"><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnatakatourism.org/tour-item/devbagh-beach-karwar/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1151" instrument_node="">Devbagh Beach</span></a><span data-dcnode-id="1149" instrument_node="">&nbsp;is perfect for people who love the sea. It is located in the Uttara Kannada district and has been maintained impeccably by the state.</span></p><span data-dcnode-id="1147" instrument_node="">

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

ನೈಸರ್ಗಿಕ ಪರಿಸರದ ನಡುವೆ ವಿಭಿನ್ನ ಆವೃತ್ತಿ ಹೊಂದಿರುವ ಮಿರ್ಜಾನ್ ಕೋಟೆ 16 ಶತಮಾನಗಳ ಸಾಂಸ್ಕೃತಿಕ ವೈಭವ ಮತ್ತು ವಿಶಿಷ್ಟ ಇತಿಹಾಸವನ್ನು ಹೊಂದಿದೆ. ಈ ಕೋಟೆಯನ್ನು &quot;ಮೆಣಸಿನ ರಾಣಿ &quot; ಎಂದು ಕರೆಯಲ್ಪಡುವ ಗೆರೊಪ್ಪಾ ರಾಣಿ ಚೆನ್ನೈ ಭೈರವಿ ದೇವಿ ನಿರ್ಮಿಸಿದಳು. ಎತ್ತರದ ಛಾವಣಿಗಳು ಮತ್ತು ಬುರುಜುಗಳನ್ನು ಹೊಂದಿರುವ ಕೋಟೆಯು ಕಂದಕಗಳು, ರಹಸ್ಯ ಮಾರ್ಗಗಳು, ಕಾಲುವೆಗಳು ಮತ್ತು 4 ಮುಖ್ಯ ಪ್ರವೇಶ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದ್ದು ಕೋಟೆಯು ಪ್ರಸಿದ್ಧ ವಾಸ್ತುಶಿಲ್ಪದ ಅದ್ಭುತವಾಗಿದೆ.

Mirjan Fort 

Mirjan Fort boasts 16 centuries of cultural splendor and unique history, with its various interpretation of the natural environment. Queen Bhairavi Devi of Geroppa, often known as the &quot;Pepper Queen,&quot; constructed the fort. With trenches, secret passages, canals, and four main entrances, the fort is a renowned architectural marvel with lofty ceilings and towers.

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.

World Heritage Day

Karnataka has two UNESCO World Heritage Sites, Hampi, and Pattadakal. The remains of the historic Vijayanagara Empire in Hampi are seen as an open museum. The Chalukyas in the 7th and 8th centuries witnessed the richness and timeless glory. The Pattadakal stone temple complex is a mixture of both Dravidian and Aryan styles of architecture. Let's pledge and save our heritage as it is our primary duty to preserve our cultural heritage.

To know more info : https://www.karnatakatourism.org/world-heritage-week/

</span><img alt="ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನ

ಯಗಚಿ ನದಿಯ ದಂಡೆಯಲ್ಲಿರುವ ಬೇಲೂರಿನ ಚನ್ನಕೇಶವ ದೇವಸ್ಥಾನವನ್ನು ಹೊಯ್ಸಳ ರಾಜ ವಿಷ್ಣುವರ್ಧನನ ಆಳ್ವಿಕೆಯ ಸಮಯದಲ್ಲಿ ತಂದೆ ಮತ್ತು ಮಗನಾದ ದಾಸೋಜ ಮತ್ತು ಚವನ ಎಂಬ ಕುಶಲಕಲಾಕಾರರಿಂದ ಈ ದೇವಸ್ಥಾನವು ಕಟ್ಟಲ್ಪಟ್ಟಿದೆ. ಈ ದೇವಸ್ಥಾನದ ಕಟ್ಟಡಗಳಿಗೆ ಅತ್ಯಂತ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗಾಗಿ ಹೊಯ್ಸಳರು ಮೃದು ಬಳಪದ ಕಲ್ಲನ್ನು ಬಳಸಿದ್ದರು. ದರ್ಪಣಸುಂದರಿ ಶಿಲ್ಪ, ದೇವಸ್ಥಾನದ ಸೌಂದರ್ಯವನ್ನು ಹಾಗೂ ಭವ್ಯತೆಯನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತದೆ. ಬೇಲೂರಿನ ಚೆನ್ನಕೇಶವ ದೇವಸ್ಥಾನದ ಶಿಲ್ಪಕಲೆಗೆ ಮನಸೋಲದವರಿಲ್ಲ ಸೋತು ಅಚ್ಚರಿಯಾಗದವರಿಲ್ಲ, ಶಿಲ್ಪಕಲಾವಿದನ ಈ ಸೂಕ್ಷ್ಮ ಕೆತ್ತನೆಗಳಿಗೆ ಕಲಾ ನೈಪುಣ್ಯತೆ ಮತ್ತು ಕೈಚಳಕ ನಿಜವಾಗಿಯೂ ಆಶ್ಚರ್ಯಕರವಾಗಿದೆ.

Chennakeshava Temple 

The Channakesava Temple at Belur on the banks of the Yagachi River was built by the artisans Dasoja and Chavana, father and son, during the reign of Hoysala King Vishnuvardhana. The Hoysalas used soft caramel stone for the most delicate carvings on the temple buildings. The Darpanasundari highlights the beauty and grandeur of the temple as it considered one of the most unique sculptures of the Chennakesava Temple at Belur.

To know more info : https://www.karnatakatourism.org/tour-item/beluru/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

14ನೇ ಶತಮಾನದಲ್ಲಿ ಬೀದರ್ ಬಹುಮನಿ ಸಾಮ್ರಾಜ್ಯದ ರಾಜಧಾನಿಯಾಗಿತ್ತು. ಬೀದರ್ ನ ಕೋಟೆಯು ಟ್ರ್ಯಾಪ್ ಕಲ್ಲುಗಳಿಂದ ನಿರ್ಮಿಸಲ್ಪಟ್ಟಿದ್ದು 7 ಮುಖ್ಯ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದೆ ಮತ್ತು ಲೋಹದ ರಕ್ಷಾಕವಚದ ಫಿರಂಗಿಗಳೊಂದಿಗೆ ಅಷ್ಟಭುಜಾಕೃತಿಯ 37 ಬುರುಜುಗಳು (ಕಾವಲು ಗೋಪುರಗಳು), ಅರಮನೆ, ಮಸೀದಿ ಮತ್ತು ಸ್ಮಾರಕಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಇಸ್ಲಾಮಿಕ್ ಮತ್ತು ಪರ್ಷಿಯನ್ ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರವಾಸಿಗರನ್ನು ತನ್ನತ್ತ ಸೆಳೆಯುತ್ತಿದೆ.

Bidar Fort 

Bidar was the capital of the Bahmani Empire in the 14th century. Bidar's castle features 37 octagonal towers, a palace, a mosque, and monuments with metal armour cannons, and is built of trap rocks with seven main entrances. Tourists are particularly drawn to the Islamic and Persian architecture.

To know more info: https://www.karnatakatourism.org/tour-item/bidar-fort/

ನೈಸರ್ಗಿಕ ಪರಿಸರದ ನಡುವೆ ವಿಭಿನ್ನ ಆವೃತ್ತಿ ಹೊಂದಿರುವ ಮಿರ್ಜಾನ್ ಕೋಟೆ 16 ಶತಮಾನಗಳ ಸಾಂಸ್ಕೃತಿಕ ವೈಭವ ಮತ್ತು ವಿಶಿಷ್ಟ ಇತಿಹಾಸವನ್ನು ಹೊಂದಿದೆ. ಈ ಕೋಟೆಯನ್ನು &quot;ಮೆಣಸಿನ ರಾಣಿ &quot; ಎಂದು ಕರೆಯಲ್ಪಡುವ ಗೆರೊಪ್ಪಾ ರಾಣಿ ಚೆನ್ನೈ ಭೈರವಿ ದೇವಿ ನಿರ್ಮಿಸಿದಳು. ಎತ್ತರದ ಛಾವಣಿಗಳು ಮತ್ತು ಬುರುಜುಗಳನ್ನು ಹೊಂದಿರುವ ಕೋಟೆಯು ಕಂದಕಗಳು, ರಹಸ್ಯ ಮಾರ್ಗಗಳು, ಕಾಲುವೆಗಳು ಮತ್ತು 4 ಮುಖ್ಯ ಪ್ರವೇಶ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದ್ದು ಕೋಟೆಯು ಪ್ರಸಿದ್ಧ ವಾಸ್ತುಶಿಲ್ಪದ ಅದ್ಭುತವಾಗಿದೆ.

Mirjan Fort 

Mirjan Fort boasts 16 centuries of cultural splendor and unique history, with its various interpretation of the natural environment. Queen Bhairavi Devi of Geroppa, often known as the &quot;Pepper Queen,&quot; constructed the fort. With trenches, secret passages, canals, and four main entrances, the fort is a renowned architectural marvel with lofty ceilings and towers.

To know more info : https://www.karnatakatourism.org/tour-item/mirjan-fort/

                                                ಮಿರ್ಜಾನ್ ಕೋಟೆ 

ನೈಸರ್ಗಿಕ ಪರಿಸರದ ನಡುವೆ ವಿಭಿನ್ನ ಆವೃತ್ತಿ ಹೊಂದಿರುವ ಮಿರ್ಜಾನ್ ಕೋಟೆ 16 ಶತಮಾನಗಳ ಸಾಂಸ್ಕೃತಿಕ ವೈಭವ ಮತ್ತು ವಿಶಿಷ್ಟ ಇತಿಹಾಸವನ್ನು ಹೊಂದಿದೆ. ಈ ಕೋಟೆಯನ್ನು "ಮೆಣಸಿನ ರಾಣಿ " ಎಂದು ಕರೆಯಲ್ಪಡುವ ಗೆರೊಪ್ಪಾ ರಾಣಿ ಚೆನ್ನೈ ಭೈರವಿ ದೇವಿ ನಿರ್ಮಿಸಿದಳು. ಎತ್ತರದ ಛಾವಣಿಗಳು ಮತ್ತು ಬುರುಜುಗಳನ್ನು ಹೊಂದಿರುವ ಕೋಟೆಯು ಕಂದಕಗಳು, ರಹಸ್ಯ ಮಾರ್ಗಗಳು, ಕಾಲುವೆಗಳು ಮತ್ತು 4 ಮುಖ್ಯ ಪ್ರವೇಶ ದ್ವಾರಗಳನ್ನು ಹೊಂದಿದ್ದು ಕೋಟೆಯು ಪ್ರಸಿದ್ಧ ವಾಸ್ತುಶಿಲ್ಪದ ಅದ್ಭುತವಾಗಿದೆ.

Mirjan Fort 

Mirjan Fort boasts 16 centuries of cultural splendor and unique history, with its various interpretation of the natural environment. Queen Bhairavi Devi of Geroppa, often known as the "Pepper Queen," constructed the fort. With trenches, secret passages, canals, and four main entrances, the fort is a renowned architectural marvel with lofty ceilings and towers.

To know more info : https://www.karnatakatourism.org/tour-item/mirjan-fort/

</span><img alt="ಗೋಳ ಗುಮ್ಮಟ

ವಿಶ್ವದ 2ನೇ ಅತಿದೊಡ್ಡ ಗುಮ್ಮಟ ಎಂದು ಹೇಳಲಾದ ಗೋಲ್ ಗುಂಬಜ್ ವಿಜಯಪುರದ ಅತ್ಯಂತ ಪ್ರಸಿದ್ದ ಸ್ಮಾರಕವಾಗಿದೆ. ಇದು ಮೊಹಮದ್ ಆದಿಲ್ ಷಾ ಅವರ ಸಮಾದಿಯಾಗಿದೆ (ಆಡಳಿತ ಅವದಿ 1627 -1657). ಈ ಸ್ಮಾರಕದ ಆಕರ್ಷಣೆಯೆಂದರೆ ಪ್ರತಿ ಶಬ್ದವು 7 ಬಾರಿ ಪ್ರತಿಧ್ವನಿಸುತ್ತದೆ ಮತ್ತು ವಿಸ್ಪರಿಂಗ್  ಗ್ಯಾಲರಿಯಲ್ಲಿ 37 ಮೀಟರ್ ದೂರದಲ್ಲಿನ ಶಬ್ದಗಳು ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ನಿಮಿಷದವರೆಗೆ ಕೇಳಬಹುದು. ಇಲ್ಲಿರುವ ಅಕೌಸ್ಟಿಕ್ಸ್ ಯಾವುದೇ ಶಬ್ದವನ್ನು 10 ಬಾರಿ ಪುನರಾವರ್ತಿಸಲಾಗುತ್ತದೆ ಎಂದು ಹೇಳಲಾಗಿದೆ.

Gol Gumbaz

The most remarkable monument in Vijayapur is Gol Gumbaz, the world's second largest dome. It is Mohamed Adil Shah's tomb (Run period  1627 -1657). The attractiveness of this monument is that each sound echoes seven times, and sounds in the Whispering Gallery can be clearly heard for a minute from a distance of 37 metres. Any sound is believed to be repeated 10 times here due to the acoustics.

ವೀರರಾಜೇಂದ್ರ ಮತ್ತು ಅವರ ಪತ್ನಿಯರ ಸಮಾಧಿಯನ್ನು 1821 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ ಮತ್ತು ಲಿಂಗರಾಜೇಂದ್ರನ ಸಮಾಧಿಯನ್ನು 1809 ರಲ್ಲಿ ನಿರ್ಮಿಸಲಾಗಿದೆ. ಈ ಸಮಾಧಿಯು ಇಸ್ಲಾಮಿಕ್ ಶೈಲಿಯ ಗುಮ್ಮಟಗಳು ಮತ್ತು ಮಿನಾರೆಟ್ ತರಹದ ಗೋಪುರಗಳನ್ನು ಹೊಂದಿದ್ದು ಪ್ರತಿಯೊಂದು ಕಂಬದ ಮೇಲೂ ಬಸವಣ್ಣ(ಗೂಳಿ) ಚಿತ್ರಗಳು, ಕಲ್ಲಿನಲ್ಲಿ ಕೆತ್ತಿದ ಸುಂದರವಾದ ಕಿಟಕಿಗಳು ಮಡಿಕೇರಿಯ ಸ್ಕೈಲೈನ್‌ನಲ್ಲಿ ಪ್ರಮುಖವಾಗಿವೆ.

Raja’s Tomb (Gaddige)

The tomb of Veerarajendra and his wives were constructed in 1821, whereas Lingarajendra's monument was constructed in 1809. The tomb features Islamic domes and minaret-like structures, as well as stunning windows carved into Madikeri's skyline and basavanna (bull) paintings on each pillar.

ಕರ್ನಾಟಕವು ಎರಡು ಯುನೆಸ್ಕೋ ವಿಶ್ವ ಪರಂಪರೆಯ ತಾಣಗಳಾದ ಹಂಪಿ ಮತ್ತು ಪಟ್ಟದಕಲ್ಲು ಹೊಂದಿದೆ. ಐತಿಹಾಸಿಕ ವಿಜಯನಗರ ಸಾಮ್ರಾಜ್ಯದ ಹಂಪಿಯಲ್ಲಿರುವ ಅವಶೇಷಗಳು ತೆರೆದ ವಸ್ತುಸಂಗ್ರಹಾಲಯವಾಗಿದೆ. 7 ಮತ್ತು 8ನೇ ಶತಮಾನದಲ್ಲಿ ಚಾಲುಕ್ಯರ ಶ್ರೀಮಂತಿಕೆ ಮತ್ತು ಕಾಲಾತೀತ ವೈಭವಕ್ಕೆ ಸಾಕ್ಷಿಯಾಗಿದೆ. ಪಟ್ಟದಕಲ್ಲು ತನ್ನ ದೇವಾಲಯದ ಸಂಕೀರ್ಣದಲ್ಲಿ ದ್ರಾವಿಡ, ಆರ್ಯನ್ ಎರಡೂ ಶೈಲಿಗಳ ಮಿಶ್ರಣದಿಂದ ದೇವಾಲಯದ ವಾಸ್ತುಶಿಲ್ಪವನ್ನು ಹೊಂದಿದೆ. ನಮ್ಮ ಈ ಸಾಂಸ್ಕೃತಿಕ ಪಾರಂಪರಿಕತೆಯನ್ನು ಕಾಪಾಡುವುದು ನಮ್ಮ ಆದ್ಯತೆಯ ಕರ್ತವ್ಯವಾಗಿದೆ.

World Heritage Day

Karnataka has two UNESCO World Heritage Sites, Hampi, and Pattadakal. The remains of the historic Vijayanagara Empire in Hampi are seen as an open museum. The Chalukyas in the 7th and 8th centuries witnessed the richness and timeless glory. The Pattadakal stone temple complex is a mixture of both Dravidian and Aryan styles of architecture. Let's pledge and save our heritage as it is our primary duty to preserve our cultural heritage.

To know more info : https://www.karnatakatourism.org/world-heritage-week/
