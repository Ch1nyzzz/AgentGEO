</span><h1 data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Talakadu</span></h1><span data-dcnode-id="282" instrument_node="">
</span><a aria-label="Direction - External site that opens in a new window" class="btn btn-gov push-left btn-sm dir-btn" data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/maps/dir//12.194678%2C77.030539" onclick="return confirm('You are being redirected to an external website. Please note that District Mysuru, Government of Karnataka | Heritage city cannot be held responsible for external websites content &amp; privacy policies.');" target="_blank" title="Direction - External site that opens in a new window"><span data-dcnode-id="281" instrument_node="">
</span><span class="icon-map-location" data-dcnode-id="280"></span><span data-dcnode-id="279" instrument_node=""> Direction                      </span></a><span data-dcnode-id="277" instrument_node="">
</span></div><span data-dcnode-id="275" instrument_node="">
</span></div><span data-dcnode-id="273" instrument_node="">
</span></div><span data-dcnode-id="271" instrument_node="">
</span><div class="row" data-dcnode-id="191"><span data-dcnode-id="270" instrument_node="">
</span><div class="col-6" data-dcnode-id="256"><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">The Kaveri river makes a sharp bend and on the left banks at this turn is Talakad, also known as Talakadu. It is 45 km from Mysore and 185 km from Bangalore in Karnataka, India. Talakad historic site and of archaeological importance. It’s not only a spiritual pilgrimage center but is a scenic beauty with vast spreads of sand.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">History : The illustrious and powerful Western Gangas ruled from 350 to 1050 AD until they were overthrown by the Cholas in the 11th century. Talakad came under the Hoysala Empire in the 12th century. The Hoysala ruler built the impressive Vijayanarayana Chennakesava Temple at Belur. Subsequently, after the Hoysalas, the powerful Vijayanagara Kingdom rulers and the Maharajas of Mysore ruled the place.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Temples : The temples were submerged in sand. Among the temples of Talakad, the five Lingams believed to represent the five faces of Shiva form the Pancha Pathi are famous. They are Pathaleshwara, Maruleshwara, Arkeshwara, Vaidyanatheeshwara and Mallikarjuna temples. As a tribute to these five Shiva temples, a festival is held once every 12 years called Panchalinga Darshana, last held in 2006.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">The Panchalinga Darshana is held on a new moon day in the month of Karthika when two stars conjoin, the stars of Khuha Yoga and Vishaka. On this day, tradition has it that pilgrims should first bathe in the Gokarna theertham, worship Gokarneswara and Chandikadevi, and then worship Vaidyeshwara, Arkeshwara, Pataleshwara, Maraleshwara and Mallikarjuna finally worship Kirtinarayana and conclude the pilgrimage in one day.</span></p><span data-dcnode-id="257" instrument_node="">
