Udupi is one of the most famous pilgrimage sites in Karnataka, and among the top </span><a data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/mangalore/200kms" target="_blank"><span data-dcnode-id="4074" instrument_node="">places to visit near Mangalore</span></a><span data-dcnode-id="4072" instrument_node="">. Located between the verdant mountains of the Western Ghats and the Arabian Sea, Udupi is the land of breathtaking beauty. It is about 59 km from Mangalore, and 403 km from the city of Bangalore.</span><br data-dcnode-id="4071"><br data-dcnode-id="4070"><span data-dcnode-id="4069" instrument_node="">Udupi is famous for </span><a data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/udupi/udupi-sri-krishna-temple" target="_blank"><span data-dcnode-id="4068" instrument_node="">Sri Krishna Temple</span></a><span data-dcnode-id="4066" instrument_node=""> which attracts pilgrims from all over India. This temple has a fascinating idol of Lord Krishna that is richly adorned with jewels. Apart from the temple, Malpe Beach, Kaup Beach &amp; St Mary's Island are the top places to visit as part of </span><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/udupi" target="_blank"><span data-dcnode-id="4065" instrument_node="">Udupi holiday packages</span></a><span data-dcnode-id="4063" instrument_node="">.</span><br data-dcnode-id="4062"><br data-dcnode-id="4061"><span data-dcnode-id="4060" instrument_node="">Udupi can also be visited along with </span><a data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/murudeshwar" target="_blank"><span data-dcnode-id="4059" instrument_node="">Murudeshwar packages</span></a><span data-dcnode-id="4057" instrument_node="">. It is also the source of renowned Udupi cuisine, which is served all over India in the efficiently-run Udupi restaurants, famous for dosas, idlis and other snacks. The tradition of this cuisine started in the great kitchens of the Krishna Temple which serve meals in the form of prasad to the thousands of devotees who come to pray at the holy shrine. </span><br data-dcnode-id="4056"><br data-dcnode-id="4055"><span data-dcnode-id="4054" instrument_node="">Explore our </span><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/udupi" target="_blank"><span data-dcnode-id="4053" instrument_node="">Udupi Travel Guide</span></a><span data-dcnode-id="4051" instrument_node=""> for complete details on the holy shrine.

Murudeshwar is one of the most famous </span><a data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/best" target="_blank"><span data-dcnode-id="3972" instrument_node="">places to visit in Karnataka</span></a><span data-dcnode-id="3970" instrument_node=""> and among the popular places of </span><a data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/pilgrimages" target="_blank"><span data-dcnode-id="3969" instrument_node="">pilgrimage in Karnataka</span></a><span data-dcnode-id="3967" instrument_node="">. It is about 162 km from Mangalore &amp; 497 km from Bangalore. </span><br data-dcnode-id="3966"><br data-dcnode-id="3965"><span data-dcnode-id="3964" instrument_node="">Murudeshwar is the abode of Lord Shiva. The temple town is famous for the world's second tallest Shiva statue (123 ft) &amp; tallest temple tower (249 feet). The sea on three sides surrounds the </span><a data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/murudeshwar/murudeshwar-temple" target="_blank"><span data-dcnode-id="3963" instrument_node="">Murudeshwar Temple</span></a><span data-dcnode-id="3961" instrument_node=""> towering on the small hill called Kanduka Giri. This is a great place to watch the sunset. Murdeshwar Beach, Kollur Temple are popular sites to visit as part of </span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/murudeshwar" target="_blank"><span data-dcnode-id="3960" instrument_node="">Murudeshwar holiday packages</span></a><span data-dcnode-id="3958" instrument_node="">. Gokarna, Karwar, Kollur, Udupi, Jog Falls, Sirsi &amp; Sringeri are the nearby attractions.</span><br data-dcnode-id="3957"><br data-dcnode-id="3956"><span data-dcnode-id="3955" instrument_node="">Maha Shivaratri during February is the important festival celebrated here with much devotion and religious rituals. The best time to visit Murudeshwar is from November to February. Murudeshwar can also be visited along with </span><a data-dcnode-id="3953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/gokarna" target="_blank"><span data-dcnode-id="3954" instrument_node="">Gokarna packages</span></a><span data-dcnode-id="3952" instrument_node="">.</span><br data-dcnode-id="3951"><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">Explore our </span><a data-dcnode-id="3947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/murudeshwar" target="_blank"><span data-dcnode-id="3948" instrument_node="">Murudeshwar Travel Guide</span></a><span data-dcnode-id="3946" instrument_node=""> for complete details on the beautiful and sacred placce.

At a distance of 12 km from Mangalore Railway Station, Tannirbavi Beach is located towards the southern end of Mangalore Port. The beach is the property of Mangalore port trust. This is one of the best beaches in Mangalore and among the top </span><a data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/mangalore/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="3582" instrument_node="">Mangalore tourist places</span></a><span data-dcnode-id="3580" instrument_node="">.</span><br data-dcnode-id="3579"><br data-dcnode-id="3578"><span data-dcnode-id="3577" instrument_node="">The soft sands of the beach and breezy winds of the Arabian Sea offer a memorable experience as part of </span><a data-dcnode-id="3575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/mangalore" target="_blank"><span data-dcnode-id="3576" instrument_node="">Mangalore Tour Packages</span></a><span data-dcnode-id="3574" instrument_node="">. It is also a favorite spot to watch the sunset. You can see the remains of a ship which sank 15 years ago near the beach. This beach is comparatively deserted and is a great spot for safe swimming.</span><br data-dcnode-id="3573"><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">Due to the poor connectivity, it's important to have your own vehicle to visit this beach in Mangaluru.</span><br data-dcnode-id="3570"><br data-dcnode-id="3569"><span data-dcnode-id="3568" instrument_node="">Timings: 6 AM - 6 PM</span><br data-dcnode-id="3567"><br data-dcnode-id="3566"><span data-dcnode-id="3565" instrument_node="">Entry: Free

At a distance of 6 km from Gokarna Bus Station, Om Beach is a pristine beach situated in Gokarna. Along the Arabian Sea coast, it is one of the most famous </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/beaches" target="_blank"><span data-dcnode-id="3490" instrument_node="">Karnataka beaches</span></a><span data-dcnode-id="3488" instrument_node="">, and among the must visit </span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/gokarna/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="3487" instrument_node="">Gokarna tourist places</span></a><span data-dcnode-id="3485" instrument_node="">.</span><br data-dcnode-id="3484"><br data-dcnode-id="3483"><span data-dcnode-id="3482" instrument_node="">Om Beach is the most famous beach in Gokarna. It is shaped as two semi crescents joined together forming the shape of Om (Hindu religious symbol) hence the name Om Beach. Om Beach is further along the coast from Kudle Beach. The curve of the symbol forms a pool which can be a safe bathing area for even non-swimmers. </span><br data-dcnode-id="3481"><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node="">Blessed with tropical weather, the area has plenty of palm trees dotting its coastline. Its azure waters are ideal for an exciting dolphin spotting trip. Om Beach is the center for several water sport activities such as boating, surfing, water-skiing, parasailing, and banana boat rides, which will surely spike your adrenaline to an altogether new level. </span><br data-dcnode-id="3478"><br data-dcnode-id="3477"><span data-dcnode-id="3476" instrument_node="">The beach is well maintained and there are commercial establishments like restaurants and resorts in close vicinity. In the rainy season, there are very limited options for boarding and lodging. This beach currently does not have beach rules and is open to camping and bonfires on the beach. </span><br data-dcnode-id="3475"><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">This beach can be accessible by foot from the nearest road point which ends at a hillock near the beach. Visitors need to decent about 100 well-laid steps ...

At a distance of 15 km from Udupi Railway Station, 65 km from Mangalore &amp; 100 km from </span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/murudeshwar" target="_blank"><span data-dcnode-id="3394" instrument_node="">Murudeshwar</span></a><span data-dcnode-id="3392" instrument_node="">, St. Mary's Island is a group of small beautiful islands situated to the north of Malpe Beach near Udupi. It is one of the best places to visit as part of </span><a data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/udupi" target="_blank"><span data-dcnode-id="3391" instrument_node="">Udupi Packages</span></a><span data-dcnode-id="3389" instrument_node="">.</span><br data-dcnode-id="3388"><br data-dcnode-id="3387"><span data-dcnode-id="3386" instrument_node="">A quaint island just off the coast of Udupi, St. Mary's Island is an island of white sand beaches, rock monoliths, and great wildlife making it one of the best </span><a data-dcnode-id="3384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/udupi/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="3385" instrument_node="">places to visit in Udupi</span></a><span data-dcnode-id="3383" instrument_node="">. It is said that Vasco da Gama first reached this Island before reaching the Kappad Beach (near Calicut) while finding a sea route to India. </span><br data-dcnode-id="3382"><br data-dcnode-id="3381"><span data-dcnode-id="3380" instrument_node="">This island is a group of four individual islands namely Coconut Island, North Island, South Island, and Daryabahadurgarh Island. The island has two beautiful beaches and crystallized basalt rock formations which were created at the time Madagascar Island got separated from India. These unique rock formations scattered throughout the island giving a special landscap At a distance of 13 km from Karwar Bus Stand, 2.5 km from Majali Bus Stop, Tilmati or the Black Sand Beach is located at Majali village in Karnataka. Situated just beside Polem Beach of South Goa, it is one of the popular </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/karwar/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="3207" instrument_node="">places to visit in Karwar</span></a><span data-dcnode-id="3205" instrument_node="">. </span><br data-dcnode-id="3204"><br data-dcnode-id="3203"><span data-dcnode-id="3202" instrument_node="">Tilmati Beach is one of the most beautiful </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/beaches" target="_blank"><span data-dcnode-id="3201" instrument_node="">beaches in Karnataka</span></a><span data-dcnode-id="3199" instrument_node=""> and among the must include places in </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/karwar" target="_blank"><span data-dcnode-id="3198" instrument_node="">Karwar Tour Packages</span></a><span data-dcnode-id="3196" instrument_node="">. At this little beach, one can find coarse black sand of basaltic rock making the beach black in color. Tilmati literally translates to sesame sand or the sand that looks like sesame. This stretch of black sand, spread over 200 m, is said to be formed when the waves hit the basaltic rocks that are concentrated in this area. It is also believed that the Arabian Sea dumps the fine black sand brought by River Kali to this place. </span><br data-dcnode-id="3195"><br data-dcnode-id="3194"><span data-dcnode-id="3193" instrument_node="">Majali Beach and Palm Beach are adjacent to each other hence it can be visited along with </span><a data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/goa" target="_blank"><span data-dcnode-id="3192" instrument_node="">Goa Tour Packages</span></a><span data-dcnode-id="3190" instrument_node="">. Tilmati Beach in Karwar is an ideal place for picnicking. It is a tourist destination suitable for those who want to spend time lonely and enjoy amidst the sea waves. This secluded beach set amidst hillocks also offers stunning sunset views. Abundant flora and fauna present near the beach makes it one of the rarest coastal forestlands in the state. ...

At a distance of 10 km from Udupi Railway Station, Malpe Beach is a pristine beach situated along the shores of the Arabian Sea at Malpe village near Udupi. Spread between Swarna Nandi River and Malpe Port is one of the finest </span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/beaches" target="_blank"><span data-dcnode-id="3103" instrument_node="">beaches in Karnataka</span></a><span data-dcnode-id="3101" instrument_node="">, and among the top places to visit as part of </span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/udupi" target="_blank"><span data-dcnode-id="3100" instrument_node="">Udupi Tour Packages</span></a><span data-dcnode-id="3098" instrument_node="">.</span><br data-dcnode-id="3097"><br data-dcnode-id="3096"><span data-dcnode-id="3095" instrument_node="">Malpe Beach is situated at the mouth of the Udyavara River, a small river that is commonly referred to as the Malpe River by the locals. Characterized by silver-white sands, and rocky islands, Malpe Beach is still quite secluded and not visited by a lot of tourists. It is one of the popular </span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/udupi/places-to-visit-things-to-do" target="_blank"><span data-dcnode-id="3094" instrument_node="">Udupi tourist places</span></a><span data-dcnode-id="3092" instrument_node=""> for those who want to spend some time alone at the beach.</span><br data-dcnode-id="3091"><br data-dcnode-id="3090"><span data-dcnode-id="3089" instrument_node="">The vast coastline of Malpe has four rocky islands. The northern-most island is the Daria-Bahadurgad, the middle one is the Daria-Gadara-Kallu, the southernmost island is the Kari-Illada-Kallu, while the fourth rocky island is St. Mary's Island, among the most famous and frequently visited one of all. </span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/udupi/st-marys-island" target="_blank"><span data-dcnode-id="3088" instrument_node="">St. Mary's Island</span></a><span data-dcnode-id="3086" instrument_node=""> can be reached from here.</span><br data-dcnode-id="3085"><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">The endless stretch of golden sand, graciously swaying palm trees, the clear blue sky, and the clean waters of the Arabian Sea all set a perfect mood for an unforgettable holiday. Besides, the beach offers a variety ...

At a distance of 10 km from Karwar Bus Stand, Majali Beach is located at Majali Village, which is a small coastal town lies on the northern tip of coastal Karnataka and just a few kilometers South of Goa. This 4.5 km long beach is situated towards north of Devbagh beach. Indulging in activities at Majali Beach is one of the top things to do in </span><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/karwar" target="_blank"><span data-dcnode-id="3008" instrument_node="">Karwar</span></a><span data-dcnode-id="3006" instrument_node="">. </span><br data-dcnode-id="3005"><br data-dcnode-id="3004"><span data-dcnode-id="3003" instrument_node="">Majali Beach is a renowned attraction in Karwar and is known for its sea facing cottages and resorts. Majali Beach Village offers six Row Cottages with all the modern amenities. Apart from this, the resort also boasts of wonderful Wood House and Tree House. The resorts located along the beach provide with facilities like private balcony, sit-outs, in-house laundry and many more. Majali Beach Village has a fine restaurant that offers delicious local and coastal cuisine.</span><br data-dcnode-id="3002"><br data-dcnode-id="3001"><span data-dcnode-id="3000" instrument_node="">The Resort also offers recreation facilities like boating, fishing, kayaking, pedaling, a swing on the lake etc. Cruises to the Tilmati Beach, with its unique stretch of black sand, trips to the islands nearby, dolphin watching, river cruises, rock climbing, visit to ship wreck, bird watching, and much more. It is beautiful to see the sunset in the evening.

At a distance of 16 km from Udupi, Kaup Beach is a beautiful beach situated close to NH17 between Udupi &amp; Mangalore. It is one of the must include places in </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/tour-packages/udupi" target="_blank"><span data-dcnode-id="2925" instrument_node="">Udupi Tour Packages</span></a><span data-dcnode-id="2923" instrument_node="">, and among the best </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/best-beaches-near-bangalore" target="_blank"><span data-dcnode-id="2922" instrument_node="">beaches near Bangalore</span></a><span data-dcnode-id="2920" instrument_node="">.</span><br data-dcnode-id="2919"><br data-dcnode-id="2918"><span data-dcnode-id="2917" instrument_node="">Kaup Beach is one of the famous </span><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/beaches" target="_blank"><span data-dcnode-id="2916" instrument_node="">beaches in Karnataka</span></a><span data-dcnode-id="2914" instrument_node=""> where tourists enjoy the beauty of the environment, the long stretches of golden sands, and the cool sea breeze. The beach is covered by palm groves. There is a lighthouse here, constructed in 1901, which is open every day for an hour from 5.30 AM. The delightful view of the entire seashore and the beach from the lighthouse is every photographer's dream.</span><br data-dcnode-id="2913"><br data-dcnode-id="2912"><span data-dcnode-id="2911" instrument_node="">Besides the lighthouse, Kaup also has ruins of Jain Basadis that line across the stretch of sand, and these are definitely worth a visit. Kaup is also known for the temple of Goddess Mariamman. There is also an ancient fort located in Kaup which is in ruins now.</span><br data-dcnode-id="2910"><br data-dcnode-id="2909"><span data-dcnode-id="2908" instrument_node="">This beach is also popular with students who come from Manipal, a student town. The beach also has small shacks and eateries where one can sample a bit of the local cuisine.</span><br data-dcnode-id="2907"><br data-dcnode-id="2906"><span data-dcnode-id="2905" instrument_node="">Timings: 6 AM - 6 PM

At a distance of 10 Kms from Mangalore Railway Station, Someshwar Beach located near Ullal Railway Station is a well known beach near Mangalore. This beach is famous for clean &amp; white sands. It is one of the popular Mangalore places to visit. It is also known for the large rocks called 'Rudra Shile' situated near the beach. Someshwara Beach is a natural, safe and clean beach. The beach offers breathtaking views of the Arabian Sea and is an ideal spot for nature lovers and swimmers. </span><br data-dcnode-id="2664"><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">The other attraction of Someshwar beach is the historical Somanath Temple constructed during the rule of the famous Queen Abbakka Devi (16th century) is situated towards north. Presiding deity here is Lord Shiva and the temple is adorned with beautiful sculptures. In the temple premises there is the statue of great sage Parusharama. As per mythology, the coastal region of Karnataka (along with Kerala) was the creation of Parusharama.

At a distance of 4.5 km from Karwar Bus Stand and 3 km from Devbagh Beach, Kodibag Beach or Koodi Bagh Beach is located at the confluence of the Kali River and the Arabian Sea in </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/karwar" target="_blank"><span data-dcnode-id="2249" instrument_node="">Karwar</span></a><span data-dcnode-id="2247" instrument_node="">. </span><br data-dcnode-id="2246"><br data-dcnode-id="2245"><span data-dcnode-id="2244" instrument_node="">Koodi Bagh is among the most beautiful shorelines of Karwar and also one of the tourist places in Karwar. The meeting point of the Kali River and the Arabian Sea is a spectacular sight to watch. This beach is situated at the northern end of the </span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.trawell.in/karnataka/karwar" target="_blank"><span data-dcnode-id="2243" instrument_node="">Karwar Beach</span></a><span data-dcnode-id="2241" instrument_node="">.</span><br data-dcnode-id="2240"><br data-dcnode-id="2239"><span data-dcnode-id="2238" instrument_node="">This beach offers an amazing view of sunset. It is good to have a relaxing time with some fun at this Beach. Long leisurely walks in the cool beach sands will be a soothing experience. This beach is very clean and is a perfect destination for adventure lovers. At this palm-fringed beach various activities such as canoeing, kayaking, paddling, banana boat riding and many more can be enjoyed.

At a distance of 4 km off the coast of Karwar, Kurumgad or Koormagad Island is a tortoise shaped island in the Arabia Sea and is adjacent to Devbagh. </span><br data-dcnode-id="2163"><br data-dcnode-id="2162"><span data-dcnode-id="2161" instrument_node="">This tortoise shaped island is one of the five islands in this region; the other four islands are Devbagh, Sanyasi, Anjadip and Oyster. The Island is now privately owned and belongs to a Coffee Planter Suresh Mathias. </span><br data-dcnode-id="2160"><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">It bears a very old fort which is said to be related to Maratha rulers. This island contains some sightseeing places like Narasimha Temple and Kurumgad Beach. The hilltop Narasimha Temple attracts thousands of devotees during the annual jatra held on Pushya Purnima every year in early January. One has to climb the mountain to access the temple and thus the trekkers can have some good time here. Large number of people from Goa &amp; Karnataka flocks to this island in January to offer prayers to Lord Narasimha. The Island has a sweet water pond despite the fact that it is located in mid Arabian Sea.</span><br data-dcnode-id="2157"><br data-dcnode-id="2156"><span data-dcnode-id="2155" instrument_node="">There are palm trees along the coastline and the sight of the grey sea is simply soothing for the eyes. Kurumgad is a snorkeling site with coral reefs extending over half a kilometer. Kurumgad is famous for water sports. Tourists can enjoy exotic beach walks, nature walks, swimming, fishing, bonfires and barbecues, dolphin spotting, boat rides and beach volleyball. There are many sea animals such as otters and dolphins that can be found near the island. </span><br data-dcnode-id="2154"><br data-dcnode-id="2153"><span data-dcnode-id="2152" instrument_node="">Kurumgad Island can be reached by travelling ...
