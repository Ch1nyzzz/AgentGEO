</span><h1 data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">History of Mysuru</span></h1><div class="post-2733 page type-page status-publish hentry" data-dcnode-id="122" id="post-2733"><span data-dcnode-id="344" instrument_node="">
</span><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="124"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="125"><div class="vc_column-inner" data-dcnode-id="126"><div class="wpb_wrapper" data-dcnode-id="127"><span data-dcnode-id="343" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="129"><span data-dcnode-id="342" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="131"><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">&nbsp;</span></p><span data-dcnode-id="338" instrument_node="">
</span><h2 data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">About Mysuru History</span></h2><span data-dcnode-id="335" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="333"><img alt="Mahisha Mysuru" data-dcnode-id="334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018080931-221x300.jpg&amp;raw"></div><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="331" instrument_node="">The word </span><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Mysuru</span></strong><span data-dcnode-id="328" instrument_node=""> is a corrupted version of “</span><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">mysooru</span></strong><span data-dcnode-id="325" instrument_node="">“, which is derived from the word “</span><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">mahishur</span></strong><span data-dcnode-id="322" instrument_node="">” or “</span><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Mahishasurana Ooru</span></strong><span data-dcnode-id="319" instrument_node="">“, which means the town of </span><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Mahishasura</span></strong><span data-dcnode-id="316" instrument_node=""> in Kannada, the local language. Mysuru has been associated with the Puranic story found in the </span><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Devi Bhagavatha</span></strong><span data-dcnode-id="313" instrument_node="">. According to the story in the Devi Purana, Mysuru was ruled by the demon King Mahishasura who was a buffalo-headed monster. In response to the prayer by the Gods and Goddesses to save them from the demon, Goddess </span><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Parvathi</span></strong><span data-dcnode-id="310" instrument_node="">, took birth as </span><strong data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Chamundeshwari</span></strong><span data-dcnode-id="307" instrument_node=""> and killed the monster on top of the Chamundi hill near Mysuru. Hence the hill and the city have the names </span><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Chamundi Hill</span></strong><span data-dcnode-id="304" instrument_node=""> and Mysuru respectively.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="301" instrument_node="">There is an inscription in Mysuru by the Hoysalas that dates back to the 11th and 12th century. The Mysuru was ruled by Gangas, Chalukyas, Cholas and Hoysalas. After the Hoysalas came, the Vijayanagar Kings and then the</span><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node=""> Mysuru Yadu dynasty</span></strong><span data-dcnode-id="298" instrument_node=""> came to power in 1399A.D. They were the feudatories of the Vijayanagar Kings. This dynasty also contributed to temple building in Mysuru. Bettada Chamaraja Wadiyar, the raja of Mysuru rebuilt the fort of Mysuru and made his headquarters and called the city ‘</span><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Mahishura Nagara</span></strong><span data-dcnode-id="295" instrument_node="">‘ meaning the city of </span><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Mahishur</span></strong><span data-dcnode-id="292" instrument_node="">. Many inscriptions done in the 17th century and later refer to </span><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Mysuru</span></strong><span data-dcnode-id="289" instrument_node=""> as ‘</span><strong data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Mahishuru</span></strong><span data-dcnode-id="286" instrument_node="">‘.</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">During the reign of Krishnaraja Wadiyar III the town of Mysuru expanded and moved beyond the walls of the fort. Krishnaraja Wadiyar IV developed Mysuru into a beautiful city with excellent planning. Under his reign Mysuru became famous for its wide roads, magnificent building and elegant parks. Today Mysuru is a modern city that has managed to retain its quaint old world charm. Today Mysuru in famous in the world for its sandalwood and rosewood artifacts, stone sculptures, incense sticks, inlay work with ivory and its exquisite silk sarees.</span></p><span data-dcnode-id="281" instrument_node="">
</span><hr data-dcnode-id="280"><span data-dcnode-id="279" instrument_node="">
</span><h2 data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Folk Art of Mysuru</span></h2><span data-dcnode-id="276" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="274"><img alt="Kunita Dance" data-dcnode-id="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018081037-224x300.jpg&amp;raw"></div><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Karnataka has a rich tradition of folk arts and folklore. Different branches of folk art like singing, drama, dance and puppet shows are popular in the rural parts of Karnataka. On different festivals and especially during Dasara these artistes visit the city of Mysuru and perform. In the olden days they performed before the King, today they perform on the streets of Mysuru or in specially designated areas during Dasara. Presentation of Folk Art by popular folk groups of the state has become an established and regular part of the Dasara celebrations.</span></p><span data-dcnode-id="270" instrument_node="">
</span><ul data-dcnode-id="246"><span data-dcnode-id="269" instrument_node="">
</span><li data-dcnode-id="248" style="list-style-type: none;"><span data-dcnode-id="268" instrument_node="">
</span><ul data-dcnode-id="250"><span data-dcnode-id="267" instrument_node="">
</span><li data-dcnode-id="263"><strong data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Pooja Kunitha</span></strong><span data-dcnode-id="264" instrument_node=""> :In Puja Kunitha dance, the emphasis is more on the visual presentation than the oral narration. Here the spectacular exhibition of colourful bamboo structure is ably matched by the skilful body movements.</span></li><span data-dcnode-id="262" instrument_node="">
</span><li data-dcnode-id="252"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Dollu Kunitha</span></strong><span data-dcnode-id="259" instrument_node=""> :&nbsp;This is a group dance named after the </span><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Dollu</span></strong><span data-dcnode-id="256" instrument_node=""> used in its performance, and performed by the men of the </span><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Kuruba</span></strong><span data-dcnode-id="253" instrument_node=""> community. The group consists of 16 dancers, each wearing a drum and playing different rhythms while dancing. The beat is directed by a leader with cymbals in the center. Slow and fast rhythms alternate, and the group weaves a varied pattern. Costumes are simple; the upper part of the body is usually left bare, while a black sheet is tied on the lower body over the dhoti.</span></li><span data-dcnode-id="251" instrument_node="">
</span></ul><span data-dcnode-id="249" instrument_node="">
</span></li><span data-dcnode-id="247" instrument_node="">
</span></ul><span data-dcnode-id="245" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="243"><img alt="Kunitha" data-dcnode-id="244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018081057-200x300.jpg&amp;raw"></div><span data-dcnode-id="242" instrument_node="">
</span><ul data-dcnode-id="223"><span data-dcnode-id="241" instrument_node="">
</span><li data-dcnode-id="237"><strong data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Beesu Kamsale and kamsale Nritya :</span></strong><span data-dcnode-id="238" instrument_node="">This is a group dance performed by village men in the Mysuru, Nanjanagudu, Kollegala and Bangalore regions. It is named after the kamsale, which is played and as a prop by the dancers. The kamsale is a cymbal in one hand and a bronze disc in the other, producing a rhythmic clang. The kamsale nritya is connected to a tradition of worship of Male Mahadeshwara (Shiva) by the Kuruba community, from which most of the dancers are drawn. The dance is performed to rhythmic, melodious music sung in praise of Shiva. It is part of a diiksha(oath), and is taught by a spiritual leader.</span></li><span data-dcnode-id="236" instrument_node="">
</span><li data-dcnode-id="225"><strong data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Somana Kunita :</span></strong><strong data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Somana Kunita (the Mask Dance)</span></strong><span data-dcnode-id="231" instrument_node=""> is a celebratory form of guardian spirit worship popular in southern Karnataka, performed primarily in village shrines dedicated to the Mother Goddess by the Gangemata community. The dance is characterised by elaborate masks (somas) painted in a variety of colours, with each mask’s colour indicating the god’s nature. A benevolent deity is represented by a red mask, while a yellow or black mask suggests the opposite. There are many types of masks, differing from region to region.
</span><p data-dcnode-id="227"><strong data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Somana Kunitha</span></strong><span data-dcnode-id="228" instrument_node=""> is a ritualistic dance associated with worship of the Grama Devate [village deity], and is primarily celebrated after Ugadi and before the onset of the monsoon at Maha Shivaratri. It is most popular in the old Mysuru region</span></p><span data-dcnode-id="226" instrument_node="">
</span></li><span data-dcnode-id="224" instrument_node="">
</span></ul><span data-dcnode-id="222" instrument_node="">
</span><hr data-dcnode-id="221"><span data-dcnode-id="220" instrument_node="">
</span><h2 data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Mysuru Weather</span></h2><span data-dcnode-id="217" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="215"><img alt="Weather" data-dcnode-id="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018081095.jpg&amp;raw"></div><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Mysuru is located in the southern part of the Deccan Plateau. The district of Mysuru is an undulating table land that is partly covered by granite outcrops and fringed with lush green forests. The city is at 770m above sea level and 140kms from Bangalore, the state capital. Mysuru has an area of 6,307 sq km and a population of 30,01,127 (2011 census). The city is also known as the City of Palaces, Mysuru has always enchanted its visitors with its quaint charm.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Mysuru has a warm and cool climate throughout the year. It has a salubrious climate. The climate of Mysuru is moderate. The weather in winter is cool and the summers are bearable. The minimum temperature in winter is around 15 degrees Celsius and in summer the maximum temperature is around 35 degrees Celsius. Mysuru gets most of its rains during the monsoon between June to September. Mysuru average rainfall annually is around 86 centimeters.</span></p><span data-dcnode-id="208" instrument_node="">
</span><hr data-dcnode-id="207"><span data-dcnode-id="206" instrument_node="">
</span><h2 data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Cuisine of Mysuru</span></h2><span data-dcnode-id="203" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="201"><img alt="Mysore MysuruPak" data-dcnode-id="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018080772.jpg&amp;raw"></div><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Mysuru is in South India and like all the other states in this part of the country, most of the food is rice based. There is more to Mysuru cuisine that the famous dosa and idli that is well known all over the world as the food of the South. Though idli and dosa form an important part of the cuisine of Mysuru but the different types of dosas and idlis and chutneys to accompany them will take one by surprise. Traditional Mysuru breakfast is simple, wholesome and delicious. Most of them are rice based and are normally served with chutney.</span></p><span data-dcnode-id="197" instrument_node="">
</span><hr data-dcnode-id="196"><span data-dcnode-id="195" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="193"><img alt="Mysore Masala Dosa" data-dcnode-id="194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018080751.jpg&amp;raw"></div><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">A traditional lunch of Mysuru is a splendid spread that includes a number of essential dishes. These includes a cereal salads like kosambri, playas, gojju tovve, huli or saaru . chitranna, famous bisibelebath, vangibath are part of the traditional food of Mysuru. In the other parts of Karnataka ragi muddae eaten with soppina huli or saaru or curry. To complete your delicious meal, indulge in some of the unique sweets of Mysuru like chiroti,, Mysuru Pak, obbattu and shavige payasa etc.,</span></p><span data-dcnode-id="189" instrument_node="">
</span><hr data-dcnode-id="188"><span data-dcnode-id="187" instrument_node="">
</span><h2 data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Culture of Mysuru</span></h2><span data-dcnode-id="184" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="182"><img alt="Culture" data-dcnode-id="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018081070-300x186.jpg&amp;raw"></div><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Mysuru has been a city where all religions have co-existed in harmony for many centuries. Even when Mysuru was culturally at its zenith under the Vijayanagar Empire and the Wadiyars the rulers always encouraged all religions and cultures without any discrimination. The continuous patronage and support of the Kings in every field led to the evolution of a distinct style known as the “Mysuru Style” in the all the fields like painting, architecture, music, poetry etc. Over a period of time as this culture spread far and wide it was prefixed with the word “Mysuru” to identify the unique cultural heritage.</span></p><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Though Mysuru has become a modern city it has not lost touch with its tradition and culture. The ultimate expression of cultural unity is witnessed during the 10 daylong Dasara festivities that is synonymous with Mysuru. The celebration not only includes religious ceremonies but also the decoration of houses, display of dolls, distribution of sweets to neighbours and children. The residents of Mysuru have celebrated Dasara in this manner for decades.</span></p><span data-dcnode-id="175" instrument_node="">
</span><hr data-dcnode-id="174"><span data-dcnode-id="173" instrument_node="">
</span><h2 data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Local Transport in Mysuru</span></h2><span data-dcnode-id="170" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="168"><img alt="Horse-chariot" data-dcnode-id="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/09/2018091836-300x220.jpg&amp;raw"></div><span data-dcnode-id="167" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="165"><img alt="Transportation" data-dcnode-id="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/08/2018081054-300x196.jpg&amp;raw"></div><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Mysuru has played an important role in the history of South India from ancient times. Hence there are number monuments in the city that represent this rich cultural heritage. Mysuru is known for its splendid palaces and magnificent temples. These monuments are spread in and around modern Mysuru. While visiting Mysuru you will have to travel to these places. The local transport available in Mysuru to commute like auto, private taxis, buses and tongas to the various tourist attractions.</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Railway junction for places around Mysuru city. Railway lines connect Mysuru to Bangalore (north-east) through Mandya, Hassan in the northwest and Chamarajanagar in the south-east. Road connectivity is available from Mysuru to different parts of Karnataka and neighboring states and from Chennai to Mandakalli airport near Mysuru.</span></p><span data-dcnode-id="158" instrument_node="">
</span><hr data-dcnode-id="157"><span data-dcnode-id="156" instrument_node="">
</span><h2 data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Modern Mysuru</span></h2><span data-dcnode-id="153" instrument_node="">
</span><div class="pull-right sample-img-cntr" data-dcnode-id="151"><img alt="Trin Trin" class="size-medium wp-image-29685" data-dcnode-id="152" height="201" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/10/2018103193-300x201.jpg&amp;raw" srcset="https://cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/10/2018103193-300x201.jpg 300w, https://cdn.s3waas.gov.in/s30d3180d672e08b4c5312dcdafdf6ef36/uploads/2018/10/2018103193.jpg 660w" width="300"></div><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">Mysuru as a modern city has managed to retain its quaint old world charm and is one of the tourism hot spots and receives maximum number of tourist during the period of Dasara festival from all over the world. Mysuru is famous in the world for its sandalwood and rosewood artifacts, stone sculptures, incense sticks, inlay work with ivory and its exquisite silk sarees.</span></p><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">Mysuru emerged to be one of the major IT hubs in Karnataka. Mysuru is second in state for software exports. The robust growth of the IT sector in the city is attributed because of major contributions from Infosys, Larsen Toubro (L&amp;T), Wipro Technologies, Software Paradigms India etc. There are around 50 IT Companies in Mysuru. Karnataka Industrial Areas Development Board (KIADB) has established five industrial areas in and around Mysore, these are located at Belagola, Belavadi, Hebbal (Electronic City), Metagally and Hootagalli. Major industries like Bharat Earth Movers Limited, Kirloskar, Vikrant Tyres, Jay Bearings, Automotive Axel AT&amp;S, Nestle, Reid and Taylor, TVS Company, Bannari Amma Sugar Factory, South India Paper Mills, ABB. Technology/software technology training centre like Infosys, Wipro, L&amp;T, SPI etc have established their presence in Mysuru. Good living conditions and availability of skilled manpower is another major factor that attracts investors to establish them in the city.</span></p><span data-dcnode-id="144" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Mysuru Junction is the City’s main station and there are trains plying the route between Bangalore, Chennai, Mumbai, New Delhi, Thanjavur, Ajmer, Hyderabad, Shirdi etc. Railway Line electrification between Mysuru and Krantiveera Sangolli Rayannna Station  will be built on international standards. High-speed train between Mysuru and Chennai is also approved.</span></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">The road networks of Mysuru city are in a gridiron fashion with numerous parallel roads “grids” the city. And then there are some 5 radial roads, all originating from Mysuru Palace, which is the focal point of the city. Mysuru has a very good road network, Bengaluru city is connected by SH-17 with 4 lane road. National Highway 212 and State Highways 17,33,88 pass through Mysuru connecting it to nearby by cities. Mysuru has Outer Ring Road of 42.5-kilometers, all these highways intersect the Outer Ring Road.</span></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Mandakalli Airport is situated around 10 kms from Mysuru City. Nearest international airport is Kempegowda International Airport, Bengaluru around 170 kms from Mysuru.</span></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">There are 2 Medical colleges, 14 Engineering colleges, 12 Polytechnic Colleges, 1 Nature Cure and Yoga college, 2 Ayurveda College and 36 Degree Colleges in Mysuru District.</span></p><span data-dcnode-id="132" instrument_node="">
