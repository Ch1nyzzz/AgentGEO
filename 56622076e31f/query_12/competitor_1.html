</span><span class="post-views-count" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">138</span></span></div><h4 data-dcnode-id="1910"><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">IMPACT OF COMMUNITY BANKS ON RURAL DEVELOPMENT</span></strong><strong data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">(A CASE STUDY OF UMUEZE COMMUNITY BANK ENUGU).</span></strong></h4><p data-dcnode-id="1907"><strong data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">ABSTRACT</span></strong></p><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">The establishment of community banks by the Federal Government with particular reference to Umueze Community Bank Enugu was necessitated by the desire of Government to improve the standard&nbsp; of living of the urural dwellers and to encourage rapid development of the communities.</span></p><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">It is in realization of this objectives that this study is being carried out to ascertain the impact of these community banks on rural development.</span></p><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Also the study is designed to determine the performance the community bank and the commitment of the staffs to realize this set objectives.&nbsp; The inscriptional survey method was used for the study with some fractional number of the total members of Umueze Community Bank Enugu.&nbsp; Both primary and secondary data were combined in collecting information used for this study.A total number of 20 questionnaires were given our, though not all were returned and the information collected were very useful in achieving the objectives of this research.</span></p><p data-dcnode-id="1898"><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">TABLE OF CONTENTS</span></strong></p><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrume </span><li data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">RECOMMENDATIONS</span></li><span data-dcnode-id="1817" instrument_node="">
</span><li data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">CONCLUSION</span></li></ul><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">BIBLIOGRAPHY</span></p><h4 data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">CHAPTER ONE</span></h4><h4 data-dcnode-id="1806"><span data-dcnode-id="1809" instrument_node="">1.1&nbsp;</span><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">BACKGROUND OF THE STUDY</span></strong></h4><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">This study deals with the impact of community Banks on rural development.&nbsp; But the study is on the Community&nbsp; Bank in Enugu North Local Government.</span></p><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">In recent past, our rural dwellers have been finding it very difficult to save their money and other valuables in the Commercial Banks in urban areas.&nbsp; This is because of the enormous paper work involved in opening a savings accounts and also distance in moving from where they are living to an urban location of commercial banks.&nbsp; Community Banks are established financial institution to cater for the savings and credits needs of small scale producers throughout the country.&nbsp; Inspite of government policy such as agricultural credit guarantee scheme, local dwellers face the constraint of not having a collateral to put down as a security before loans could be secured.</span></p><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Conclusively, the commutative effect of these trends above include; low productivities, slow pace to development of the rural areas low accumulative capital to finance small scale businesses.</span></p><p data-dcnode-id="1794"><span data-dcnode-id="1799" instrument_node="">1.2&nbsp;</span><strong data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">STATEMENT OF&nbsp;</span></strong><b data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">PROBLEMS</span></b></p><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Rural development is now a matter&nbsp; of crucial concern in most developing countries in general and Nigeria in particular.&nbsp; Indeed the problem is to ensure that community banks has adequately impacted the rural communities.&nbsp; However, some of these problems are:</span></p><ul data-dcnode-id="1785"><span data-dcnode-id="1791" instrument_node="">
</span><li data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">What impact has the Community Banks creates in rural dwellers.</span></li><span data-dcnode-id="1788" instrument_node="">
</span><li data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Are the banking habits of local dweller improved.</span></li></ul><p data-dcnode-id="1782"><strong data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">1.3&nbsp;&nbsp;&nbsp; OBJECTIVES OF THE STUDY</span></strong></p><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">This study is aimed at investing the impact of Community Banks on rural development.&nbsp; It is also aimed at showing how Community Banking system had stimulated earning culture to the populace.&nbsp; To identify the rapid enhancement of development productive activities in rural and urban areas.&nbsp; To identify the improvement of the economic status of small producers in the informal sectors of the national economy of the rural community.</span></p><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Conclusively, to suggest solutions and possible recommendations that would enhanced and speed up more development in the rural areas by the operations of the community banks.</span></p><p data-dcnode-id="1775"><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">1.4&nbsp;&nbsp;&nbsp; RESEARCH QUESTIONS</span></strong></p><ul data-dcnode-id="1768"><span data-dcnode-id="1774" instrument_node="">
</span><li data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Are Community Banks really a modernization and simplification of an otherwise sophisticated banking system.</span></li><span data-dcnode-id="1771" instrument_node="">
</span><li data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">How has the operation of community banks serve the development needs of the grassroots people.</span></li></ul><p data-dcnode-id="1765"><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">1.5 SCOPE OF THE STUDY</span></strong></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">The scope of this study is limited only to Enugu North Local Government.&nbsp; A case study of Umueze Community Development Association.&nbsp; This is because of the time involve in covering the whole Enugu State.&nbsp; The research is based, on finding but the impact of community banks on rural development and thus the rural dweller’s to be mindful of the operations of community bank.</span></p><p data-dcnode-id="1760"><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">1.6 LIMITATIONS OF THE STUDY</span></strong></p><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Limitations are challenges that are bound to occur when carrying out a research project.&nbsp; Some of the limitations during the course of this project are:</span></p><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">(i)&nbsp;&nbsp;&nbsp;&nbsp; Time Factor:&nbsp; The time allocated to this project was very short as wished by the researcher.</span></p><ul data-dcnode-id="1746"><span data-dcnode-id="1755" instrument_node="">
</span><li data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Financial Constraints: This is a challenge encountered by the researcher in carrying out the project.&nbsp; It includes transportation fee foolscap fee, feeding fee as well as photocopying of some relevant information to facilitate the research project.</span></li><span data-dcnode-id="1752" instrument_node="">
</span><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Lack of equipped Library: Library was not equipped enough with current information.</span></li><span data-dcnode-id="1749" instrument_node="">
</span><li data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Apathetic behavior of the respondent: This is problem involve in serving questionnaire and also when collecting it.</span></li></ul><p data-dcnode-id="1743"><strong data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">1.7 SIGNIFICANCE OF THE STUDY</span></strong></p><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">It requires a little reasoning to discover that this&nbsp; research will be of immense benefit to Community Banks and Local Communities.&nbsp; It will be relevant to students of business and financial studies.</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">It will also serve as a literature review for further researchers.</span></p><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Further more, this research work will enable Community Bank to the prospects of their effort toward rural development.&nbsp; The local communities will see the impact of community banks on rural development.</span></p><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Imperatively, it will serve as a means of re-discovering the problem faced by rural communities, and a possible modification to ensure their continuity.</span></p><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Conclusively, it would be of immense benefit to the economy as a whole.&nbsp; This is because the need for more community banks would arose, and therefore their activities would oil the wheel of the economy.</span></p><p data-dcnode-id="1727"><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">1.8</span></strong><span data-dcnode-id="1730" instrument_node="">&nbsp;</span><strong data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">THE IMPACT OF COMMUNITY BANK ON RURAL DEVELOPMENT</span></strong></p><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">A Community Bank is a self sustaining bank established owned and managed by a community or a group of communities.&nbsp; The power was given by the federal government in 1990.&nbsp; the budget speech of the then president and&nbsp; commander in Chief of the armed forces, General/Ibrahin Babangida announced the creation of Community Banks.&nbsp; The first community bank took off in December 1990.</span></p><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">However, the main reasons of community banks are to educate the local communities the need or importance of banking services.&nbsp; To encourage the local communities to save and accumulate capital for small scale investment, provide the banking needs of local market women, farmers and petty traders.&nbsp; In Nigeria, the National Board for Community Banks (NBCB) controls the community banks.</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Community Banks help the rural people in depositing of money in the bank.&nbsp; Through the banks, the rural people can obtain short-term loans for economic activities.&nbsp; Without these loans the rural people will find it very difficult to finance their businesses.&nbsp; Through the development of community banks, long and medium term businessmen can also obtain loans for development purpose.</span></p><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Further more, the development of community banks on rural areas has help the people in many ways.&nbsp; Community banks will provide the long-term capitals for investment and offer financial and technical advice to investors, they have experts in various fields who provide the advice investors may need in order to run successful business.&nbsp; They may carryout investment in areas such as industry, agriculture and commerce either wholly or in joint partnership with other, investors, conducting studies or researcher on the economy.&nbsp; They accept cash deposit facilities for safe keeping of money belonging to their customers.&nbsp; Such money may be deposited in current, savings or fixed deposit account.</span></p><p data-dcnode-id="1713"><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">1.9</span></strong><span data-dcnode-id="1716" instrument_node="">&nbsp;</span><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">HISTORY OF UMUEZE COMMUNITY BANK</span></strong></p><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Within this period, there has been a growing enthusiasm among communities to establish their own banks.According to statistics out of one thousand three hundred (1300) licensed banks in Nigeria, Enugu State has twenty eight (28) community banks.However, this researcher is being carried out on Umueze community bank in Enugu North Local Government.</span></p><p data-dcnode-id="1703"><span data-dcnode-id="1710" instrument_node="">The bank was official given license on 30</span><sup data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">th</span></sup><span data-dcnode-id="1707" instrument_node=""> June 1991 and look off on the 1</span><sup data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">st</span></sup><span data-dcnode-id="1704" instrument_node=""> July 1991, it was established with (9) nine staffs, four (4) senior staffs and five (5) junior staff.&nbsp; It came into existence as a result of enthusiasm of Umueze Community development Association for community bank.&nbsp; The Association according to federal government fiscal policy of 1997 owns (30%) of the bank share capital.&nbsp; It operates on line and staff organizational structure.&nbsp; The number of staff has increased from nine (9) to thirteen (13).&nbsp; The bank has also witness an increase in the number of customers, say one thousand two hundred (1200) current account operators one thousand five hundred savings accounts operators.</span></p><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">However, several project was been carried out by the bank through the Umueze Community Development&nbsp; Association like the accessible road at Umueze and lower interest rate agricultural loans to farmer.</span></p><p data-dcnode-id="1698"><strong data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">1.10&nbsp;DEFINITION OF TERMS</span></strong></p><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Community:&nbsp; This means a group of people living together and United by shared interest, religion, nationality.</span></p><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Rural dwellers:&nbsp; This means a group of people dwelling in a rural community.</span></p><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Development:&nbsp; This means the improvement in living conditions of the local communities.</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Small-scale:&nbsp; This means a business enterprises with a small capital.</span></p><p data-dcnode-id="1687"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">REFERENCES</span></strong></p><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Ikemenam (1997) practice of banking, Lagos Goe publishers P.9</span></p><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Adeola (1994) Rural Urban Migration in Nigeria, Ogun, Emeco publishers, p. 190.</span></p><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Ubah C.E. (2000) Rural development strategy Delta City Publication, P. 95.</span></p><h3 data-dcnode-id="1677" style="text-align: center;"><strong data-dcnode-id="1678"><a data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.modishproject.com/download-complete-project-topics-and-materials/"><span data-dcnode-id="1680" instrument_node="">DOWNLOAD COMPLETE PROJECT MATERIAL</span></a></strong></h3><h4 data-dcnode-id="1672"><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">IMPACT OF COMMUNITY BANKS ON RURAL DEVELOPMENT</span></strong><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">(A CASE STUDY OF UMUEZE COMMUNITY BANK ENUGU).</span></strong></h4><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">&nbsp;</span></p><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="1649"><div class="robots-nocontent sd-block sd-social sd-social-icon sd-sharing" data-dcnode-id="1650"><h3 class="sd-title" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="1651"><ul data-dcnode-id="1652" data-sharing-events-added="true"><li class="share-twitter" data-dcnode-id="1659"><a class="share-twitter sd-button share-icon no-text" data-dcnode-id="1660" data-shared="sharing-twitter-34670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.modishproject.com/community-banks-rural-development/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="1663"></span><span class="sharing-screen-reader-text" data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Click to share on Twitter (Opens in new window)</span></span></a></li><li class="share-facebook" data-dcnode-id="1654"><a class="share-facebook sd-button share-icon no-text" data-dcnode-id="1655" data-shared="sharing-facebook-34670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.modishproject.com/community-banks-rural-development/%3Fshare%3Dfac
