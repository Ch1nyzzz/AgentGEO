t.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypoallergenic" title="Hypoallergenic"><span data-dcnode-id="5072" instrument_node="">hypoallergenic</span></a><span data-dcnode-id="5070" instrument_node=""> properties of </span><a data-dcnode-id="5068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmetics" title="Cosmetics"><span data-dcnode-id="5069" instrument_node="">cosmetic</span></a><span data-dcnode-id="5067" instrument_node=""> products for use by humans.
</span></p><p data-dcnode-id="5032"><span data-dcnode-id="5065" instrument_node="">Since this type of animal testing is often harmful to the animal subjects, it is opposed by </span><a data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal_rights" title="Animal rights"><span data-dcnode-id="5064" instrument_node="">animal rights</span></a><span data-dcnode-id="5062" instrument_node=""> activists and others. Cosmetic animal testing is banned in many parts of the world, including </span><a data-dcnode-id="5060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colombia" title="Colombia"><span data-dcnode-id="5061" instrument_node="">Colombia</span></a><span data-dcnode-id="5059" instrument_node="">, the </span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="5058" instrument_node="">European Union</span></a><span data-dcnode-id="5056" instrument_node="">, the </span><a data-dcnode-id="5054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="5055" instrument_node="">United Kingdom</span></a><span data-dcnode-id="5053" instrument_node="">, </span><a data-dcnode-id="5051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="5052" instrument_node="">India</span></a><span data-dcnode-id="5050" instrument_node="">, </span><a data-dcnode-id="5048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="5049" instrument_node="">Israel</span></a><span data-dcnode-id="5047" instrument_node="">,</span><sup class="reference" data-dcnode-id="5044" id="cite_ref-1"><a data-dcnode-id="5045" href="#cite_note-1"><span data-dcnode-id="5046" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="5041" id="cite_ref-HSUS_2-0"><a data-dcnode-id="5042" href="#cite_note-HSUS-2"><span data-dcnode-id="5043" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5040" instrument_node=""> and </span><a data-dcnode-id="5038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norway" title="Norway"><span data-dcnode-id="5039" instrument_node="">Norway</span></a><span data-dcnode-id="5037" instrument_node="">.</span><sup class="reference" data-dcnode-id="5034" id="cite_ref-US_Bill_3-0"><a data-dcnode-id="5035" href="#cite_note-US_Bill-3"><span data-dcnode-id="5036" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5033" instrument_node="">
</span></p><p data-dcnode-id="5023"><span data-dcnode-id="5031" instrument_node="">Cosmetics that have been produced without any testing on animals are sometimes known as "</span><b data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">cruelty-free cosmetics</span></b><span data-dcnode-id="5028" instrument_node="">".</span><sup class="reference" data-dcnode-id="5025" id="cite_ref-fda_cruelty-free_4-0"><a data-dcnode-id="5026" href="#cite_note-fda_cruelty-free-4"><span data-dcnode-id="5027" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5024" instrument_node="">
