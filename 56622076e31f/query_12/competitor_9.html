</span><h2 data-dcnode-id="4720"><span class="mw-headline" data-dcnode-id="4728" id="Definition"><span data-dcnode-id="4729" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="4721"><span class="mw-editsection-bracket" data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">[</span></span><a data-dcnode-id="4724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="4725" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4719" instrument_node="">
</span><p data-dcnode-id="4692"><span data-dcnode-id="4718" instrument_node="">Using animal testing in the development of </span><a data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmetics" title="Cosmetics"><span data-dcnode-id="4717" instrument_node="">cosmetics</span></a><span data-dcnode-id="4715" instrument_node=""> may involve testing either a finished product or the individual ingredients of a finished product on animals, often </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbit" title="Rabbit"><span data-dcnode-id="4714" instrument_node="">rabbits</span></a><span data-dcnode-id="4712" instrument_node="">, as well as </span><a class="mw-redirect" data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mice" title="Mice"><span data-dcnode-id="4711" instrument_node="">mice</span></a><span data-dcnode-id="4709" instrument_node="">, </span><a data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rat" title="Rat"><span data-dcnode-id="4708" instrument_node="">rats</span></a><span data-dcnode-id="4706" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monkeys" title="Monkeys"><span data-dcnode-id="4705" instrument_node="">monkeys</span></a><span data-dcnode-id="4703" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dogs" title="Dogs"><span data-dcnode-id="4702" instrument_node="">dogs</span></a><span data-dcnode-id="4700" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guinea_pigs" title="Guinea pigs"><span data-dcnode-id="4699" instrument_node="">Guinea pigs</span></a><span data-dcnode-id="4697" instrument_node=""> and other animals. Cosmetics can be defined as products applied to the body in various ways in order to enhance the body's appearance or to cleanse the body. This includes all hair products, makeup, and skin products .</span><sup class="reference" data-dcnode-id="4694" id="cite_ref-5"><a data-dcnode-id="4695" href="#cite_note-5"><span data-dcnode-id="4696" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4693" instrument_node="">
</span></p><p data-dcnode-id="4683"><span data-dcnode-id="4691" instrument_node="">The United States </span><a data-dcnode-id="4689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_and_Drug_Administration" title="Food and Drug Administration"><span data-dcnode-id="4690" instrument_node="">Food and Drug Administration</span></a><span data-dcnode-id="4688" instrument_node=""> (FDA) continues to endorse animal testing methods.</span><sup class="reference" data-dcnode-id="4685" id="cite_ref-aavs.org_6-0"><a data-dcnode-id="4686" href="#cite_note-aavs.org-6"><span data-dcnode-id="4687" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4684" instrument_node="">
</span></p><p data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">Re-using existing test data obtained from previous animal testing is generally not considered to be cosmetic testing on animals; however, the acceptability of this to opponents of testing is inversely proportional to how recent the data is.
</span></p><span data-dcnode-id="4680" instrument_node="">
</span><h2 data-dcnode-id="4670"><span class="mw-headline" data-dcnode-id="4678" id="Methods"><span data-dcnode-id="4679" instrument_node="">Methods</span></span><span class="mw-editsection" data-dcnode-id="4671"><span class="mw-editsection-bracket" data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">[</span></span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D2" title="Edit section: Methods"><span data-dcnode-id="4675" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4669" instrument_node="">
</span><p data-dcnode-id="4663"><span data-dcnode-id="4668" instrument_node="">Methods of testing cosmetics on animals include various tests that are categorized differently based on which areas the cosmetics will be used for. One new ingredient in any cosmetic product used in these tests could lead to the deaths of at least 1,400 animals.</span><sup class="reference" data-dcnode-id="4665" id="cite_ref-7"><a data-dcnode-id="4666" href="#cite_note-7"><span data-dcnode-id="4667" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4664" instrument_node="">
</span></p><p data-dcnode-id="4657"><span data-dcnode-id="4662" instrument_node="">Dermal penetration: Rats are mostly used in this method that analyzes chemical movement, through the penetration of the chemical into the bloodstream. Dermal penetration is a method that creates a better understanding of skin absorption.</span><sup class="reference" data-dcnode-id="4659" id="cite_ref-aavs.org_6-1"><a data-dcnode-id="4660" href="#cite_note-aavs.org-6"><span data-dcnode-id="4661" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4658" instrument_node="">
</span></p><p data-dcnode-id="4651"><span data-dcnode-id="4656" instrument_node="">Skin sensitization: This is a method that tests for allergic reactions for different chemicals. In some tests, a chemical adjuvant is injected to boost the immune system, which was typically performed on guinea pigs. In some tests no chemical adjuvant is injected with the test chemical, or the chemical is applied on a shaved patch of skin. The reaction is then recorded by the appearance of the skin afterwards.</span><sup class="reference" data-dcnode-id="4653" id="cite_ref-aavs.org_6-2"><a data-dcnode-id="4654" href="#cite_note-aavs.org-6"><span data-dcnode-id="4655" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4652" instrument_node="">
</span></p><p data-dcnode-id="4645"><span data-dcnode-id="4650" instrument_node="">Acute toxicity: This test is used to determine danger of exposure to a chemical by mouth, skin, or inhalation. It shows the various dangerous effects of a substance that result from a short period of exposure. Large amounts of rats and mice are injected in these Lethal Dose 50 (LD50) tests that continue until half of the test subjects die. Other tests can use a smaller amount of animals, but can cause convulsions, loss of motor function, and seizures. The animals are often then all killed afterwards to gather information about the internal effects of the chemicals.</span><sup class="reference" data-dcnode-id="4647" id="cite_ref-aavs.org_6-3"><a data-dcnode-id="4648" href="#cite_note-aavs.org-6"><span data-dcnode-id="4649" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4646" instrument_node="">
</span></p><p data-dcnode-id="4632"><a data-dcnode-id="4643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Draize_test" title="Draize test"><span data-dcnode-id="4644" instrument_node="">Draize test</span></a><span data-dcnode-id="4642" instrument_node="">: This is a method of testing that may cause irritation or corrosion to the skin or eye on animals, dermal sensitization, airway sensitization, endocrine disruption, and </span><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Median_lethal_dose" title="Median lethal dose"><span data-dcnode-id="4641" instrument_node="">LD</span><sub data-dcnode-id="4639" style="font-size:-1"><span data-dcnode-id="4640" instrument_node="">50</span></sub></a><span data-dcnode-id="4637" instrument_node=""> (which refers to the lethal dose which kills 50% of the treated animals).</span><sup class="reference" data-dcnode-id="4634" id="cite_ref-aavs.org_6-4"><a data-dcnode-id="4635" href="#cite_note-aavs.org-6"><span data-dcnode-id="4636" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4633" instrument_node="">
</span></p><p data-dcnode-id="4626"><span data-dcnode-id="4631" instrument_node="">Skin corrosivity or irritation: This method of test assesses the potential of a substance causing irreversible damage to the skin. It is typically performed on rabbits and involves putting chemicals on a shaved patch of skin. This determines the level of damage to the skin that includes itching, inflammation, swelling, etc.</span><sup class="reference" data-dcnode-id="4628" id="cite_ref-aavs.org_6-5"><a data-dcnode-id="4629" href="#cite_note-aavs.org-6"><span data-dcnode-id="4630" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4627" instrument_node="">
</span></p><span data-dcnode-id="4625" instrument_node="">
</span><h2 data-dcnode-id="4615"><span class="mw-headline" data-dcnode-id="4623" id="Alternatives"><span data-dcnode-id="4624" instrument_node="">Alternatives</span></span><span class="mw-editsection" data-dcnode-id="4616"><span class="mw-editsection-bracket" data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">[</span></span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D3" title="Edit section: Alternatives"><span data-dcnode-id="4620" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4614" instrument_node="">
</span><p data-dcnode-id="4602"><span data-dcnode-id="4613" instrument_node="">There is a variety of alternatives that exist instead of animal testing. Nowadays with new advances in technology and science, there are options that are safe for both animals and humans. Cosmetics manufacturers who do not test on animals may now use </span><i data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">in vitro</span></i><span data-dcnode-id="4610" instrument_node=""> screens to test for endpoints which can determine potential risk to humans with a very high sensitivity and specificity. Companies such as CeeTox in the USA, recently acquired by Cyprotex, specialize in such testing and organizations like the Center for Alternatives to Animal Testing (CAAT), PETA and many other organizations advocate the use of </span><i data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">in vitro</span></i><span data-dcnode-id="4607" instrument_node=""> and other non-animal tests in the development of consumer products. Using safe ingredients from a list of 5,000 which have already been tested in conjunction with modern methods of cosmetics testing, the need for tests using animals are negated.</span><sup class="reference" data-dcnode-id="4604" id="cite_ref-8"><a data-dcnode-id="4605" href="#cite_note-8"><span data-dcnode-id="4606" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4603" instrument_node="">
</span></p><p data-dcnode-id="4585"><span data-dcnode-id="4601" instrument_node="">EpiSkin™, EpiDerm™, and SkinEthic are each composed of artificial human skin as an option for alternative testing. Artificial skin can imitate the reaction actual human skin will have to a product and the chemicals it contains and can be altered to mimic different skin types and ages. For example, using UV light on EpiSkin can cause it to resemble older skin and adding melanocytes will turn the skin a darker color. This helped create a spectrum of different skin colors that are then used to compare the results of sunblock on a different variety of people.</span><sup class="reference" data-dcnode-id="4598" id="cite_ref-9"><a data-dcnode-id="4599" href="#cite_note-9"><span data-dcnode-id="4600" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4597" instrument_node=""> To address potential issues with other parts of the human body, research companies such as NOTOX have developed a synthetic model of the human liver, which is the main organ to detox the body, in order to test harmful ingredients and chemicals to see if the liver can detox those elements.</span><sup class="reference" data-dcnode-id="4594" id="cite_ref-10"><a data-dcnode-id="4595" href="#cite_note-10"><span data-dcnode-id="4596" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4593" instrument_node=""> Research companies can also use body parts and organs taken from animals slaughtered for the </span><a data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meat_industry" title="Meat industry"><span data-dcnode-id="4592" instrument_node="">meat industry</span></a><span data-dcnode-id="4590" instrument_node=""> to perform tests such as the Bovine Corneal Opacity and Permeability Test and Isolated Chicken Eye Test.</span><sup class="reference" data-dcnode-id="4587" id="cite_ref-11"><a data-dcnode-id="4588" href="#cite_note-11"><span data-dcnode-id="4589" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4586" instrument_node="">
</span></p><p data-dcnode-id="4575"><span data-dcnode-id="4584" instrument_node="">Lab-grown tissues are now being used to test chemicals in makeup products. MatTek is one of the companies that do this. It sells small amounts of skin cells to companies to test their products on them. Some of these companies are those that make laundry detergent, makeup, toilet bowl cleaner, anti-aging creams, and tanning lotion. Without these tissues, companies would be testing their products on living animals. Lab-grown tissues are a great alternative to testing harmful products on animals.</span><sup class="reference" data-dcnode-id="4581" id="cite_ref-12"><a data-dcnode-id="4582" href="#cite_note-12"><span data-dcnode-id="4583" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4580" instrument_node=""> One lab was able to grow 11 different types of tissues in a petri dish. The downfall was that the tissues were not fully functional on their own, in fact, many of these tissues only resembled tiny parts of an actual sized human organ, most of which were too small to transplant into humans. The bright side is that they were a great learning experience for many of the students researching there. This technology could potentially be great, but it was a major downfall, 'Ministomachs that took about nine weeks to cultivate in a petri dish formed "oval-shaped, hollow structures".</span><sup class="reference" data-dcnode-id="4577" id="cite_ref-13"><a data-dcnode-id="4578" href="#cite_note-13"><span data-dcnode-id="4579" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4576" instrument_node="">
</span></p><p data-dcnode-id="4557"><span data-dcnode-id="4574" instrument_node="">Many companies have not made the switch to cruelty-free yet for many reasons, one of them being the time it takes for lab-grown tissues to be useable. Animals on the other hand, can mature quickly. Rats, for example, have a much quicker growth rate "From birth to adult, rats take about three weeks to mature and begin fending for themselves. The rodents reach sexual maturity in about five weeks and begin mating soon after to produce the next generation to start the rat life cycle over again".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4567" style="white-space:nowrap;"><span data-dcnode-id="4573" instrument_node="">[</span><i data-dcnode-id="4569"><a data-dcnode-id="4570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4571" title="This claim needs references to reliable sources. (February 2021)"><span data-dcnode-id="4572" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4568" instrument_node="">]</span></sup><span data-dcnode-id="4566" instrument_node=""> On top of the extremely short time it takes a rat to mature, they can provide us with a complete set of organ systems, not just a paper-thin sheet of cells. Rats can also reproduce, and they do so at a very fast pace "In general, rats produce about seven offspring per litter and can reach up to 14 at times. Typical gestation periods last only a few weeks, allowing each female rat to produce around five litters a year".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4559" style="white-space:nowrap;"><span data-dcnode-id="4565" instrument_node="">[</span><i data-dcnode-id="4561"><a data-dcnode-id="4562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4563" title="This claim needs references to reliable sources. (February 2021)"><span data-dcnode-id="4564" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4560" instrument_node="">]</span></sup><span data-dcnode-id="4558" instrument_node="">
</span></p><span data-dcnode-id="4556" instrument_node="">
</span><h2 data-dcnode-id="4546"><span class="mw-headline" data-dcnode-id="4554" id="History"><span data-dcnode-id="4555" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="4547"><span class="mw-editsection-bracket" data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">[</span></span><a data-dcnode-id="4550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D4" title="Edit section: History"><span data-dcnode-id="4551" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4545" instrument_node="">
</span><p data-dcnode-id="4539"><span data-dcnode-id="4544" instrument_node="">The first known tests on animals were done as early as 300 BC. "Writings of ancient civilizations all document the use of animal testing. These civilizations, led by men like Aristotle and Erasistratus, used live animals to test various medical procedures".</span><sup class="reference" data-dcnode-id="4541" id="cite_ref-14"><a data-dcnode-id="4542" href="#cite_note-14"><span data-dcnode-id="4543" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4540" instrument_node=""> This testing was important because it led to new discoveries such as how blood circulated and the fact that living beings needed air to survive. The idea of taking an animal and comparing it to how human beings survived was a completely new idea. It would not have existed (at least not as quickly as it did) without our ancestors studying animals and how their bodies worked.
</span></p><p data-dcnode-id="4533"><span data-dcnode-id="4538" instrument_node="">"Proving the germ theory of disease was the crowning achievement of the French scientist Louis Pasteur. He was not the first to propose that diseases were caused by microscopic organisms, but the view was controversial in the 19th century and opposed the accepted theory of 'spontaneous generation'".</span><sup class="reference" data-dcnode-id="4535" id="cite_ref-15"><a data-dcnode-id="4536" href="#cite_note-15"><span data-dcnode-id="4537" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4534" instrument_node=""> The idea of germs and other microscopic organisms was a completely new idea and wouldn't have come to be without the use of animals. In 1665, scientists Robert Hooke and Antoni van Leeuwenhoek discovered and studied how germs worked. They published a book about their discovery, which was not accepted by very many people, including the science community, at first. After some time, scientists were able to give animals diseases from microbes and realized that microbes really did exist. From there they were able to use animals to understand how the disease worked, and the effects it could potentially have on the human body. 
</span></p><p data-dcnode-id="4527"><span data-dcnode-id="4532" instrument_node="">All of this has led up to something a bit more recent, the use of animals to test beauty products. This has become a very controversial topic in recent years. There are various people who are extremely against the use of animals for this purpose, and for a good reason. "Typically, animal tests for cosmetics include skin and eye irritation tests where chemicals are rubbed onto the shaved skin or dripped into the eyes of rabbits; repeated oral force-feeding studies lasting weeks or months to look for signs of general illness or specific health hazards, such as cancer or birth defects; and even widely condemned "lethal dose" tests, in which animals are forced to swallow massive amounts of a test chemical to determine the dose that causes death".</span><sup class="reference" data-dcnode-id="4529" id="cite_ref-16"><a data-dcnode-id="4530" href="#cite_note-16"><span data-dcnode-id="4531" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4528" instrument_node=""> This kind of testing can be vital in finding important information about products but can be harmful to the animals it is tested on.
</span></p><p data-dcnode-id="4510"><span data-dcnode-id="4526" instrument_node="">In 1937, a mistake was made that ended up changing the pharmaceutical industry drastically. A company created a medicine (</span><a data-dcnode-id="4524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elixir_sulfanilamide" title="Elixir sulfanilamide"><span data-dcnode-id="4525" instrument_node="">Elixir sulfanilamide</span></a><span data-dcnode-id="4523" instrument_node="">) "to treat streptococcal infections", and without any scientific research the medicine was out on shelves.</span><sup class="reference" data-dcnode-id="4520" id="cite_ref-:1_17-0"><a data-dcnode-id="4521" href="#cite_note-:1-17"><span data-dcnode-id="4522" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4519" instrument_node=""> This medicine turned out to be extremely poisonous to people, leading to large poisoning outbreaks followed by over 100 deaths.</span><sup class="reference" data-dcnode-id="4516" id="cite_ref-:1_17-1"><a data-dcnode-id="4517" href="#cite_note-:1-17"><span data-dcnode-id="4518" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4515" instrument_node=""> This epidemic led to a law being passed in 1938, called the U.S. Food, Drug, and Cosmetics Act, enforcing more rigorous guidelines on cosmetic products.</span><sup class="reference" data-dcnode-id="4512" id="cite_ref-:1_17-2"><a data-dcnode-id="4513" href="#cite_note-:1-17"><span data-dcnode-id="4514" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4511" instrument_node=""> After this law was passed companies looked to animals to test their products, in turn, creating the first encounters of cosmetic animal testing.
</span></p><span data-dcnode-id="4509" instrument_node="">
</span><h2 data-dcnode-id="4499"><span class="mw-headline" data-dcnode-id="4507" id="Non-profit_organizations"><span data-dcnode-id="4508" instrument_node="">Non-profit organizations</span></span><span class="mw-editsection" data-dcnode-id="4500"><span class="mw-editsection-bracket" data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">[</span></span><a data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D5" title="Edit section: Non-profit organizations"><span data-dcnode-id="4504" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4498" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4489"><div class="thumbinner" data-dcnode-id="4490" style="width:182px;"><a class="image" data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANoAnimalTesting.png"><img alt="" class="thumbimage" data-dcnode-id="4497" data-file-height="192" data-file-width="180" decoding="async" height="192" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/5/51/NoAnimalTesting.png&amp;raw" width="180"></a><span data-dcnode-id="4495" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4491"><div class="magnify" data-dcnode-id="4493"><a class="internal" data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANoAnimalTesting.png" title="Enlarge"></a></div><span data-dcnode-id="4492" instrument_node="">This "Leaping Bunny" indicates that cosmetic products with this logo have not been tested on animals.</span></div></div></div><span data-dcnode-id="4488" instrument_node="">
</span><ul data-dcnode-id="4453"><li data-dcnode-id="4463"><b data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">Cruelty Free International: </span></b><span data-dcnode-id="4485" instrument_node="">Cruelty Free International and its partners manage the certification of all the companies across the world looking to be cruelty free. Companies producing beauty and household products which do not test their products on animals for any market can request membership of </span><i data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">The Leaping Bunny Program</span></i><span data-dcnode-id="4482" instrument_node="">, which allows that company to feature </span><a data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cruelty_Free_International" title="Cruelty Free International"><span data-dcnode-id="4481" instrument_node="">Cruelty Free International</span></a><span data-dcnode-id="4479" instrument_node="">'s Leaping Bunny logo on their products. This program sets global standard of operations and sales. Companies headquartered internationally can obtain certification from Cruelty Free International.</span><sup class="reference" data-dcnode-id="4476" id="cite_ref-18"><a data-dcnode-id="4477" href="#cite_note-18"><span data-dcnode-id="4478" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4475" instrument_node=""> Companies headquartered in the United States and Canada can obtain certification from The Coalition for Consumer Information on Cosmetics (CCIC)</span><sup class="reference" data-dcnode-id="4472" id="cite_ref-19"><a data-dcnode-id="4473" href="#cite_note-19"><span data-dcnode-id="4474" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4471" instrument_node=""> In 2013, over 500 companies were certified.</span><sup class="reference" data-dcnode-id="4468" id="cite_ref-20"><a data-dcnode-id="4469" href="#cite_note-20"><span data-dcnode-id="4470" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4467" instrument_node=""> However, some company's certifications were revoked after it was discovered they continued to test on animals in Asia.</span><sup class="reference" data-dcnode-id="4464" id="cite_ref-21"><a data-dcnode-id="4465" href="#cite_note-21"><span data-dcnode-id="4466" instrument_node="">[21]</span></a></sup></li><span data-dcnode-id="4462" instrument_node="">
</span><li data-dcnode-id="4454"><b data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">Humane Society International:</span></b><span data-dcnode-id="4459" instrument_node=""> This is a global animal protection organization that works to help all animals—including animals in laboratories.</span><sup class="reference" data-dcnode-id="4456" id="cite_ref-22"><a data-dcnode-id="4457" href="#cite_note-22"><span data-dcnode-id="4458" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4455" instrument_node=""> This organization promotes human animal interaction to tackle the existence of all cruelty that innocent animals experience.</span></li></ul><span data-dcnode-id="4452" instrument_node="">
</span><h2 data-dcnode-id="4442"><span class="mw-headline" data-dcnode-id="4450" id="Procedures_of_animal_testing"><span data-dcnode-id="4451" instrument_node="">Procedures of animal testing</span></span><span class="mw-editsection" data-dcnode-id="4443"><span class="mw-editsection-bracket" data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">[</span></span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D6" title="Edit section: Procedures of animal testing"><span data-dcnode-id="4447" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4441" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4435" role="note"><span data-dcnode-id="4438" instrument_node="">See also: </span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_Rs_%28animal_research%29" title="Three Rs (animal research)"><span data-dcnode-id="4437" instrument_node="">Three Rs (animal research)</span></a></div><span data-dcnode-id="4434" instrument_node="">
</span><p data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">There is a strategy used in animal testing laboratories titled the 'Three R's:' Reduction, refinement, and replacement' (Doke, "Alternatives to Animal Testing: A Review"). 
</span></p><span data-dcnode-id="4431" instrument_node="">
</span><ul data-dcnode-id="4409"><li data-dcnode-id="4420"><b data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">Replacement:</span></b><span data-dcnode-id="4428" instrument_node=""> This provides the opportunity to study the response of cellular models, but in other words, replacement searches for alternatives that could be done rather than testing on animal subjects.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4421" style="white-space:nowrap;"><span data-dcnode-id="4427" instrument_node="">[</span><i data-dcnode-id="4423"><a data-dcnode-id="4424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4425" title="This claim needs references to reliable sources. (December 2015)"><span data-dcnode-id="4426" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4422" instrument_node="">]</span></sup></li><span data-dcnode-id="4419" instrument_node="">
</span><li data-dcnode-id="4415"><b data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">Reduction:</span></b><span data-dcnode-id="4416" instrument_node=""> This approach is built upon the ethics to have a minimal number of animal subjects being tested on for current and later tests.</span></li><span data-dcnode-id="4414" instrument_node="">
</span><li data-dcnode-id="4410"><b data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Refinement:</span></b><span data-dcnode-id="4411" instrument_node=""> This suggests that the planned distress and pain caused to an animal subject to be as little as possible. This approach focuses on making a home for the animals before entering testing grounds in order to elongate the life of laboratory animals. Discomfort to animals causes an imbalance in hormonal levels which create fluctuating results during testing.</span></li></ul><span data-dcnode-id="4408" instrument_node="">
</span><h2 data-dcnode-id="4398"><span class="mw-headline" data-dcnode-id="4406" id="Legal_requirements_and_status"><span data-dcnode-id="4407" instrument_node="">Legal requirements and status</span></span><span class="mw-editsection" data-dcnode-id="4399"><span class="mw-editsection-bracket" data-dcnode-id="4404"><span data-dcnode-id="4405" instrument_node="">[</span></span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D7" title="Edit section: Legal requirements and status"><span data-dcnode-id="4403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4397" instrument_node="">
</span><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="4376" role="presentation"><tbody data-dcnode-id="4377"><tr data-dcnode-id="4378"><td class="mbox-image" data-dcnode-id="4394"><div data-dcnode-id="4395" style="width:52px"><img alt="Ambox current red Asia Australia.svg" data-dcnode-id="4396" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/42px-Ambox_current_red_Asia_Australia.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/63px-Ambox_current_red_Asia_Australia.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/84px-Ambox_current_red_Asia_Australia.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="4379"><div class="mbox-text-span" data-dcnode-id="4380"><span data-dcnode-id="4393" instrument_node="">This section needs to be </span><b data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">updated</span></b><span data-dcnode-id="4390" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="4387" instrument_node=""> </span><span class="date-container" data-dcnode-id="4381"><i data-dcnode-id="4382"><span data-dcnode-id="4386" instrument_node="">(</span><span class="date" data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">December 2015</span></span><span data-dcnode-id="4383" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4375" instrument_node="">
</span><p data-dcnode-id="4370"><span data-dcnode-id="4374" instrument_node="">Due to the strong public backlash against cosmetic testing on animals, most cosmetic manufacturers say their products are not tested on animals. However, they are still required by trading standards and </span><a data-dcnode-id="4372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consumer_protection" title="Consumer protection"><span data-dcnode-id="4373" instrument_node="">consumer protection</span></a><span data-dcnode-id="4371" instrument_node=""> laws in most countries to show their products are not toxic and not dangerous to public health. They also need to show that the ingredients are not dangerous in large quantities, such as when in transport or in the manufacturing plant. In some countries, it is possible to meet these requirements without any further tests on animals. Other countries, may require animal testing to meet legal requirements. The United States and Japan are frequently criticized for their insistence on stringent safety measures, which often requires animal testing.
</span></p><p data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Some retailers distinguish themselves in the marketplace by their stance on animal testing.
</span></p><span data-dcnode-id="4367" instrument_node="">
</span><h3 data-dcnode-id="4357"><span class="mw-headline" data-dcnode-id="4365" id="Legal_requirements_in_Japan"><span data-dcnode-id="4366" instrument_node="">Legal requirements in Japan</span></span><span class="mw-editsection" data-dcnode-id="4358"><span class="mw-editsection-bracket" data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">[</span></span><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D8" title="Edit section: Legal requirements in Japan"><span data-dcnode-id="4362" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4356" instrument_node="">
</span><p data-dcnode-id="4346"><span data-dcnode-id="4355" instrument_node="">Although Japanese law doesn't require non-medicated cosmetics to be tested on animals, it does not prohibit it either, leaving the decision to individual companies.</span><sup class="reference" data-dcnode-id="4352" id="cite_ref-hsi.org_23-0"><a data-dcnode-id="4353" href="#cite_note-hsi.org-23"><span data-dcnode-id="4354" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4351" instrument_node=""> Animal testing is required when the product contains newly-developed tar colors, ultraviolet ray protective ingredients or preservatives, and when the amount of any ingredient regulated in terms of how much can be added is increased.</span><sup class="reference" data-dcnode-id="4348" id="cite_ref-24"><a data-dcnode-id="4349" href="#cite_note-24"><span data-dcnode-id="4350" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4347" instrument_node="">
</span></p><p data-dcnode-id="4334"><span data-dcnode-id="4345" instrument_node="">Japanese Brands such as Shiseido and Mandom have ended much, but not all, of their animal testing. However, most other leading cosmetics companies in Japan still test on animals.</span><sup class="reference" data-dcnode-id="4342" id="cite_ref-hsi.org_23-1"><a data-dcnode-id="4343" href="#cite_note-hsi.org-23"><span data-dcnode-id="4344" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="4339" id="cite_ref-25"><a data-dcnode-id="4340" href="#cite_note-25"><span data-dcnode-id="4341" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="4336" id="cite_ref-26"><a data-dcnode-id="4337" href="#cite_note-26"><span data-dcnode-id="4338" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4335" instrument_node="">
</span></p><span data-dcnode-id="4333" instrument_node="">
</span><h3 data-dcnode-id="4323"><span class="mw-headline" data-dcnode-id="4331" id="Jurisdictions_with_bans"><span data-dcnode-id="4332" instrument_node="">Jurisdictions with bans</span></span><span class="mw-editsection" data-dcnode-id="4324"><span class="mw-editsection-bracket" data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">[</span></span><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D9" title="Edit section: Jurisdictions with bans"><span data-dcnode-id="4328" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4322" instrument_node="">
</span><h4 data-dcnode-id="4311"><span data-dcnode-id="4321" id="Brazil.2C_S.C3.A3o_Paulo"></span><span class="mw-headline" data-dcnode-id="4319" id="Brazil,_São_Paulo"><span data-dcnode-id="4320" instrument_node="">Brazil, São Paulo</span></span><span class="mw-editsection" data-dcnode-id="4312"><span class="mw-editsection-bracket" data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">[</span></span><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D10" title="Edit section: Brazil, São Paulo"><span data-dcnode-id="4316" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4310" instrument_node="">
</span><p data-dcnode-id="4302"><a data-dcnode-id="4308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S%25C3%25A3o_Paulo" title="São Paulo"><span data-dcnode-id="4309" instrument_node="">São Paulo</span></a><span data-dcnode-id="4307" instrument_node=""> in Brazil, banned cosmetic animal testing in 2014.</span><sup class="reference" data-dcnode-id="4304" id="cite_ref-Sao_Paulo_27-0"><a data-dcnode-id="4305" href="#cite_note-Sao_Paulo-27"><span data-dcnode-id="4306" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4303" instrument_node="">
</span></p><span data-dcnode-id="4301" instrument_node="">
</span><h4 data-dcnode-id="4291"><span class="mw-headline" data-dcnode-id="4299" id="Colombia"><span data-dcnode-id="4300" instrument_node="">Colombia</span></span><span class="mw-editsection" data-dcnode-id="4292"><span class="mw-editsection-bracket" data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">[</span></span><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D11" title="Edit section: Colombia"><span data-dcnode-id="4296" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4290" instrument_node="">
</span><p data-dcnode-id="4277"><span data-dcnode-id="4289" instrument_node="">In June 2020, the </span><a data-dcnode-id="4287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senate_of_Colombia" title="Senate of Colombia"><span data-dcnode-id="4288" instrument_node="">Senate of the Republic of Colombia</span></a><span data-dcnode-id="4286" instrument_node=""> approved a resolution banning the commercialization and testing of cosmetics on animals.</span><sup class="reference" data-dcnode-id="4283" id="cite_ref-28"><a data-dcnode-id="4284" href="#cite_note-28"><span data-dcnode-id="4285" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4282" instrument_node=""> In August 2020, presidential assent was granted to the resolution thus effectively banning the testing of cosmetics on animals in Colombia.</span><sup class="reference" data-dcnode-id="4279" id="cite_ref-29"><a data-dcnode-id="4280" href="#cite_note-29"><span data-dcnode-id="4281" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4278" instrument_node="">
</span></p><span data-dcnode-id="4276" instrument_node="">
</span><h4 data-dcnode-id="4266"><span class="mw-headline" data-dcnode-id="4274" id="European_Union"><span data-dcnode-id="4275" instrument_node="">European Union</span></span><span class="mw-editsection" data-dcnode-id="4267"><span class="mw-editsection-bracket" data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">[</span></span><a data-dcnode-id="4270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D12" title="Edit section: European Union"><span data-dcnode-id="4271" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4265" instrument_node="">
</span><p data-dcnode-id="4240"><span data-dcnode-id="4264" instrument_node="">The European Union (EU) followed suit, after it agreed to phase in a near-total ban on the sale of animal-tested cosmetics throughout the EU from 2009, and to ban cosmetics-related animal testing.</span><sup class="reference" data-dcnode-id="4261" id="cite_ref-Euro_30-0"><a data-dcnode-id="4262" href="#cite_note-Euro-30"><span data-dcnode-id="4263" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4260" instrument_node=""> Animal testing is regulated in </span><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/EC_Regulation_1223/2009_on_cosmetics%23Restrictions_for_hazardous_ingredients_and_animal_testing" title="EC Regulation 1223/2009 on cosmetics"><span data-dcnode-id="4259" instrument_node="">EC Regulation 1223/2009 on cosmetics</span></a><span data-dcnode-id="4257" instrument_node="">. Imported cosmetics ingredients tested on animals were phased out for EU consumer markets in 2013 by the ban,</span><sup class="reference" data-dcnode-id="4254" id="cite_ref-Euro_30-1"><a data-dcnode-id="4255" href="#cite_note-Euro-30"><span data-dcnode-id="4256" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4253" instrument_node=""> but can still be sold to outside of the EU.</span><sup class="reference" data-dcnode-id="4250" id="cite_ref-Rhiannon_31-0"><a data-dcnode-id="4251" href="#cite_note-Rhiannon-31"><span data-dcnode-id="4252" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4249" instrument_node=""> Norway banned cosmetics animal testing the same time as the EU.</span><sup class="reference" data-dcnode-id="4246" id="cite_ref-32"><a data-dcnode-id="4247" href="#cite_note-32"><span data-dcnode-id="4248" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4245" instrument_node=""> In May 2018 the European Parliament voted for the EU and its Member States to work towards a UN convention against the use of animal testing for cosmetics.</span><sup class="reference" data-dcnode-id="4242" id="cite_ref-33"><a data-dcnode-id="4243" href="#cite_note-33"><span data-dcnode-id="4244" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4241" instrument_node="">
</span></p><span data-dcnode-id="4239" instrument_node="">
</span><h4 data-dcnode-id="4229"><span class="mw-headline" data-dcnode-id="4237" id="European_Free_Trade_Association"><span data-dcnode-id="4238" instrument_node="">European Free Trade Association</span></span><span class="mw-editsection" data-dcnode-id="4230"><span class="mw-editsection-bracket" data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">[</span></span><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D13" title="Edit section: European Free Trade Association"><span data-dcnode-id="4234" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4222"><span data-dcnode-id="4227" instrument_node="">The rest of the EFTA, including Norway, Liechtenstein, Switzerland, and Iceland also banned cosmetic testing.</span><sup class="reference" data-dcnode-id="4224" id="cite_ref-34"><a data-dcnode-id="4225" href="#cite_note-34"><span data-dcnode-id="4226" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4223" instrument_node="">
</span></p><span data-dcnode-id="4221" instrument_node="">
</span><h4 data-dcnode-id="4211"><span class="mw-headline" data-dcnode-id="4219" id="Guatemala"><span data-dcnode-id="4220" instrument_node="">Guatemala</span></span><span class="mw-editsection" data-dcnode-id="4212"><span class="mw-editsection-bracket" data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">[</span></span><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D14" title="Edit section: Guatemala"><span data-dcnode-id="4216" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4210" instrument_node="">
</span><p data-dcnode-id="4204"><span data-dcnode-id="4209" instrument_node="">In 2017, Guatemala banned cosmetic animal testing.</span><sup class="reference" data-dcnode-id="4206" id="cite_ref-35"><a data-dcnode-id="4207" href="#cite_note-35"><span data-dcnode-id="4208" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4205" instrument_node="">
</span></p><span data-dcnode-id="4203" instrument_node="">
</span><h4 data-dcnode-id="4193"><span class="mw-headline" data-dcnode-id="4201" id="India"><span data-dcnode-id="4202" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="4194"><span class="mw-editsection-bracket" data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">[</span></span><a data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D15" title="Edit section: India"><span data-dcnode-id="4198" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4182"><span data-dcnode-id="4191" instrument_node="">In early 2014, India announced a ban on testing cosmetics on animals in the country, thereby becoming the second country in Asia to do so.</span><sup class="reference" data-dcnode-id="4188" id="cite_ref-India_36-0"><a data-dcnode-id="4189" href="#cite_note-India-36"><span data-dcnode-id="4190" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4187" instrument_node=""> Later India banned import of cosmetics tested on animals in November 2014.</span><sup class="reference" data-dcnode-id="4184" id="cite_ref-Mohan_2014_37-0"><a data-dcnode-id="4185" href="#cite_note-Mohan_2014-37"><span data-dcnode-id="4186" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4183" instrument_node="">
</span></p><span data-dcnode-id="4181" instrument_node="">
</span><h4 data-dcnode-id="4171"><span class="mw-headline" data-dcnode-id="4179" id="Israel"><span data-dcnode-id="4180" instrument_node="">Israel</span></span><span class="mw-editsection" data-dcnode-id="4172"><span class="mw-editsection-bracket" data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">[</span></span><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D16" title="Edit section: Israel"><span data-dcnode-id="4176" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4170" instrument_node="">
</span><p data-dcnode-id="4164"><span data-dcnode-id="4169" instrument_node="">Israel banned "the import and marketing of cosmetics, toiletries or detergents that were tested on animals" in 2013.</span><sup class="reference" data-dcnode-id="4166" id="cite_ref-Israel_38-0"><a data-dcnode-id="4167" href="#cite_note-Israel-38"><span data-dcnode-id="4168" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4165" instrument_node="">
</span></p><span data-dcnode-id="4163" instrument_node="">
</span><h4 data-dcnode-id="4153"><span class="mw-headline" data-dcnode-id="4161" id="New_Zealand"><span data-dcnode-id="4162" instrument_node="">New Zealand</span></span><span class="mw-editsection" data-dcnode-id="4154"><span class="mw-editsection-bracket" data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">[</span></span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D17" title="Edit section: New Zealand"><span data-dcnode-id="4158" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4152" instrument_node="">
</span><p data-dcnode-id="4142"><span data-dcnode-id="4151" instrument_node="">In 2015, New Zealand also banned animal testing.</span><sup class="reference" data-dcnode-id="4148" id="cite_ref-39"><a data-dcnode-id="4149" href="#cite_note-39"><span data-dcnode-id="4150" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4147" instrument_node=""> However, the ban on testing cosmetics on animals was unlikely to lead to products being stripped from shelves in New Zealand as around 90 per cent of cosmetic products sold in New Zealand were made overseas.</span><sup class="reference" data-dcnode-id="4144" id="cite_ref-40"><a data-dcnode-id="4145" href="#cite_note-40"><span data-dcnode-id="4146" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4143" instrument_node="">
</span></p><span data-dcnode-id="4141" instrument_node="">
</span><h4 data-dcnode-id="4131"><span class="mw-headline" data-dcnode-id="4139" id="Taiwan"><span data-dcnode-id="4140" instrument_node="">Taiwan</span></span><span class="mw-editsection" data-dcnode-id="4132"><span class="mw-editsection-bracket" data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">[</span></span><a data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D18" title="Edit section: Taiwan"><span data-dcnode-id="4136" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4130" instrument_node="">
</span><p data-dcnode-id="4113"><span data-dcnode-id="4129" instrument_node="">In 2015, Taiwan launched a bill proposing a ban on cosmetic testing on animals.</span><sup class="reference" data-dcnode-id="4126" id="cite_ref-41"><a data-dcnode-id="4127" href="#cite_note-41"><span data-dcnode-id="4128" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4125" instrument_node=""> It passed in 2016 and went into effect in 2019.</span><sup class="reference" data-dcnode-id="4122" id="cite_ref-effect2019_42-0"><a data-dcnode-id="4123" href="#cite_note-effect2019-42"><span data-dcnode-id="4124" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="4119" id="cite_ref-43"><a data-dcnode-id="4120" href="#cite_note-43"><span data-dcnode-id="4121" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4118" instrument_node=""> Shortly before the ban went into effect on 9 November 2019, however, it was noted that most Taiwan cosmetic companies already did not experiment with animals.</span><sup class="reference" data-dcnode-id="4115" id="cite_ref-effect2019_42-1"><a data-dcnode-id="4116" href="#cite_note-effect2019-42"><span data-dcnode-id="4117" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4114" instrument_node="">
</span></p><span data-dcnode-id="4112" instrument_node="">
</span><h4 data-dcnode-id="4102"><span class="mw-headline" data-dcnode-id="4110" id="Turkey"><span data-dcnode-id="4111" instrument_node="">Turkey</span></span><span class="mw-editsection" data-dcnode-id="4103"><span class="mw-editsection-bracket" data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">[</span></span><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D19" title="Edit section: Turkey"><span data-dcnode-id="4107" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4101" instrument_node="">
</span><p data-dcnode-id="4095"><span data-dcnode-id="4100" instrument_node="">Turkey "banned any animal testing for cosmetic products that have already been introduced to the market."</span><sup class="reference" data-dcnode-id="4097" id="cite_ref-44"><a data-dcnode-id="4098" href="#cite_note-44"><span data-dcnode-id="4099" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4096" instrument_node="">
</span></p><span data-dcnode-id="4094" instrument_node="">
</span><h4 data-dcnode-id="4084"><span class="mw-headline" data-dcnode-id="4092" id="UK"><span data-dcnode-id="4093" instrument_node="">UK</span></span><span class="mw-editsection" data-dcnode-id="4085"><span class="mw-editsection-bracket" data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">[</span></span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D20" title="Edit section: UK"><span data-dcnode-id="4089" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4083" instrument_node="">
</span><p data-dcnode-id="4077"><span data-dcnode-id="4082" instrument_node="">Animal testing on cosmetics or their ingredients was banned in the UK in 1998.</span><sup class="reference" data-dcnode-id="4079" id="cite_ref-45"><a data-dcnode-id="4080" href="#cite_note-45"><span data-dcnode-id="4081" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4078" instrument_node="">
</span></p><span data-dcnode-id="4076" instrument_node="">
</span><h3 data-dcnode-id="4066"><span class="mw-headline" data-dcnode-id="4074" id="Jurisdictions_where_prohibitions_are_considered"><span data-dcnode-id="4075" instrument_node="">Jurisdictions where prohibitions are considered</span></span><span class="mw-editsection" data-dcnode-id="4067"><span class="mw-editsection-bracket" data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">[</span></span><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D21" title="Edit section: Jurisdictions where prohibitions are considered"><span data-dcnode-id="4071" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4065" instrument_node="">
</span><h4 data-dcnode-id="4055"><span class="mw-headline" data-dcnode-id="4063" id="Association_of_Southeast_Asian_Nations"><span data-dcnode-id="4064" instrument_node="">Association of Southeast Asian Nations</span></span><span class="mw-editsection" data-dcnode-id="4056"><span class="mw-editsection-bracket" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">[</span></span><a data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D22" title="Edit section: Association of Southeast Asian Nations"><span data-dcnode-id="4060" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4045"><span data-dcnode-id="4053" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Association_of_Southeast_Asian_Nations" title="Association of Southeast Asian Nations"><span data-dcnode-id="4052" instrument_node="">Association of Southeast Asian Nations</span></a><span data-dcnode-id="4050" instrument_node=""> (ASEAN) is potentially "making strides toward ending cosmetics testing on animals."</span><sup class="reference" data-dcnode-id="4047" id="cite_ref-US_Bill_3-1"><a data-dcnode-id="4048" href="#cite_note-US_Bill-3"><span data-dcnode-id="4049" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4046" instrument_node="">
</span></p><span data-dcnode-id="4044" instrument_node="">
</span><h4 data-dcnode-id="4034"><span class="mw-headline" data-dcnode-id="4042" id="Australia"><span data-dcnode-id="4043" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="4035"><span class="mw-editsection-bracket" data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">[</span></span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D23" title="Edit section: Australia"><span data-dcnode-id="4039" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4033" instrument_node="">
</span><p data-dcnode-id="4020"><span data-dcnode-id="4032" instrument_node="">In Australia, the </span><i data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node="">End Cruel Cosmetics Bill</span></i><span data-dcnode-id="4029" instrument_node=""> was introduced to Parliament in March 2014, which would ban local testing, which generally doesn't happen there, and importation of cosmetics tested on animals.</span><sup class="reference" data-dcnode-id="4026" id="cite_ref-Aus_46-0"><a data-dcnode-id="4027" href="#cite_note-Aus-46"><span data-dcnode-id="4028" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4025" instrument_node=""> In 2016 a bill was passed to ban the sale of cosmetics tested on animals, which came into effect in July 2017.</span><sup class="reference" data-dcnode-id="4022" id="cite_ref-47"><a data-dcnode-id="4023" href="#cite_note-47"><span data-dcnode-id="4024" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4021" instrument_node="">
</span></p><span data-dcnode-id="4019" instrument_node="">
</span><h4 data-dcnode-id="4009"><span class="mw-headline" data-dcnode-id="4017" id="Brazil"><span data-dcnode-id="4018" instrument_node="">Brazil</span></span><span class="mw-editsection" data-dcnode-id="4010"><span class="mw-editsection-bracket" data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">[</span></span><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D24" title="Edit section: Brazil"><span data-dcnode-id="4014" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4008" instrument_node="">
</span><p data-dcnode-id="4002"><span data-dcnode-id="4007" instrument_node="">Brazil's legislation will vote on a nationwide animal testing for cosmetics ban by the end of March 2014.</span><sup class="reference" data-dcnode-id="4004" id="cite_ref-HSUS_2-1"><a data-dcnode-id="4005" href="#cite_note-HSUS-2"><span data-dcnode-id="4006" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4003" instrument_node="">
</span></p><span data-dcnode-id="4001" instrument_node="">
</span><h4 data-dcnode-id="3991"><span class="mw-headline" data-dcnode-id="3999" id="Canada"><span data-dcnode-id="4000" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="3992"><span class="mw-editsection-bracket" data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">[</span></span><a data-dcnode-id="3995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D25" title="Edit section: Canada"><span data-dcnode-id="3996" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3990" instrument_node="">
</span><p data-dcnode-id="3984"><span data-dcnode-id="3989" instrument_node="">The animal experimentation industry is largely unregulated and allowed to operate in near secrecy. No one knows exactly how many animals are used because many private-sector experimenters are unregulated and not required to disclose the numbers of animals used, species, or the types of tests they perform. The number of private facilities conducting animal experiments in Canada is unknown.</span><sup class="reference" data-dcnode-id="3986" id="cite_ref-48"><a data-dcnode-id="3987" href="#cite_note-48"><span data-dcnode-id="3988" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3985" instrument_node="">
</span></p><span data-dcnode-id="3983" instrument_node="">
</span><h4 data-dcnode-id="3973"><span class="mw-headline" data-dcnode-id="3981" id="United_States"><span data-dcnode-id="3982" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="3974"><span class="mw-editsection-bracket" data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">[</span></span><a data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D26" title="Edit section: United States"><span data-dcnode-id="3978" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3972" instrument_node="">
</span><p data-dcnode-id="3963"><span data-dcnode-id="3971" instrument_node="">In March 2014, the </span><i data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">Humane Cosmetics Act</span></i><span data-dcnode-id="3968" instrument_node=""> was introduced to the U.S. congress which would ban cosmetic testing on animals and eventually would ban the sale of cosmetics tested on animals.</span><sup class="reference" data-dcnode-id="3965" id="cite_ref-US_Bill_3-2"><a data-dcnode-id="3966" href="#cite_note-US_Bill-3"><span data-dcnode-id="3967" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3964" instrument_node=""> The bill did not advance.
</span></p><p data-dcnode-id="3957"><span data-dcnode-id="3962" instrument_node="">Testing cosmetics on animals has been banned in six US states: California, Nevada, Illinois, Virginia, Maryland, and Maine.</span><sup class="reference" data-dcnode-id="3959" id="cite_ref-49"><a data-dcnode-id="3960" href="#cite_note-49"><span data-dcnode-id="3961" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3958" instrument_node="">
</span></p><span data-dcnode-id="3956" instrument_node="">
</span><h4 data-dcnode-id="3946"><span class="mw-headline" data-dcnode-id="3954" id="Mexico"><span data-dcnode-id="3955" instrument_node="">Mexico</span></span><span class="mw-editsection" data-dcnode-id="3947"><span class="mw-editsection-bracket" data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">[</span></span><a data-dcnode-id="3950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D27" title="Edit section: Mexico"><span data-dcnode-id="3951" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3945" instrument_node="">
</span><p data-dcnode-id="3935"><span data-dcnode-id="3944" instrument_node="">On 19 March 2020, the Mexican Senate unanimously passed legislation banning testing cosmetics on animals.</span><sup class="reference" data-dcnode-id="3941" id="cite_ref-50"><a data-dcnode-id="3942" href="#cite_note-50"><span data-dcnode-id="3943" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3940" instrument_node=""> The proposed ban now awaits approval from the lower house of the Mexican Congress, the Mexican Chamber of Deputies.</span><sup class="reference" data-dcnode-id="3937" id="cite_ref-51"><a data-dcnode-id="3938" href="#cite_note-51"><span data-dcnode-id="3939" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3936" instrument_node="">
</span></p><span data-dcnode-id="3934" instrument_node="">
</span><h4 data-dcnode-id="3924"><span class="mw-headline" data-dcnode-id="3932" id="South_Korea"><span data-dcnode-id="3933" instrument_node="">South Korea</span></span><span class="mw-editsection" data-dcnode-id="3925"><span class="mw-editsection-bracket" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">[</span></span><a data-dcnode-id="3928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D28" title="Edit section: South Korea"><span data-dcnode-id="3929" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3923" instrument_node="">
</span><p data-dcnode-id="3917"><span data-dcnode-id="3922" instrument_node="">South Korea is also potentially "making strides toward ending cosmetics testing on animals."</span><sup class="reference" data-dcnode-id="3919" id="cite_ref-US_Bill_3-3"><a data-dcnode-id="3920" href="#cite_note-US_Bill-3"><span data-dcnode-id="3921" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3918" instrument_node="">
</span></p><span data-dcnode-id="3916" instrument_node="">
</span><h3 data-dcnode-id="3906"><span class="mw-headline" data-dcnode-id="3914" id="Other_statuses"><span data-dcnode-id="3915" instrument_node="">Other statuses</span></span><span class="mw-editsection" data-dcnode-id="3907"><span class="mw-editsection-bracket" data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">[</span></span><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D29" title="Edit section: Other statuses"><span data-dcnode-id="3911" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3905" instrument_node="">
</span><h4 data-dcnode-id="3895"><span class="mw-headline" data-dcnode-id="3903" id="China"><span data-dcnode-id="3904" instrument_node="">China</span></span><span class="mw-editsection" data-dcnode-id="3896"><span class="mw-editsection-bracket" data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">[</span></span><a data-dcnode-id="3899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D30" title="Edit section: China"><span data-dcnode-id="3900" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3894" instrument_node="">
</span><p data-dcnode-id="3877"><span data-dcnode-id="3893" instrument_node="">China passed a law on 30 June 2014 to eliminate the requirement for animal testing of cosmetics. Though domestically-produced ordinary cosmetic goods do not require testing, animal testing is still mandated by law for Chinese-made "cosmeceuticals" (cosmetic goods which make a functional claim) which are available for sale in China. Cosmetics intended solely for export are exempt from the animal testing requirement.</span><sup class="reference" data-dcnode-id="3890" id="cite_ref-52"><a data-dcnode-id="3891" href="#cite_note-52"><span data-dcnode-id="3892" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3889" instrument_node=""> As of March 2019, post-market testing (i.e. tests on cosmetics after they hit the market) for finished imported and domestically produced cosmetic products will no longer require animal testing.</span><sup class="reference" data-dcnode-id="3886" id="cite_ref-53"><a data-dcnode-id="3887" href="#cite_note-53"><span data-dcnode-id="3888" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3885" instrument_node=""> Chinese law was further amended in April 2020, fully dropping all remaining mandatory animal testing requirements for all cosmetics - both locally produced and imported, instead creating a regulatory 'preference' for non-animal based testing methods in the safety certification of cosmetic products.</span><sup class="reference" data-dcnode-id="3882" id="cite_ref-54"><a data-dcnode-id="3883" href="#cite_note-54"><span data-dcnode-id="3884" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="3879" id="cite_ref-55"><a data-dcnode-id="3880" href="#cite_note-55"><span data-dcnode-id="3881" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3878" instrument_node="">
</span></p><span data-dcnode-id="3876" instrument_node="">
</span><h4 data-dcnode-id="3866"><span class="mw-headline" data-dcnode-id="3874" id="Russia"><span data-dcnode-id="3875" instrument_node="">Russia</span></span><span class="mw-editsection" data-dcnode-id="3867"><span class="mw-editsection-bracket" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">[</span></span><a data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D31" title="Edit section: Russia"><span data-dcnode-id="3871" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3865" instrument_node="">
</span><p data-dcnode-id="3856"><span data-dcnode-id="3864" instrument_node="">In 2013, the Russian Ministry of Health stated "Toxicological testing is performed by means of testing for skin allergic reaction or test on </span><a class="mw-redirect" data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mucous_tissue" title="Mucous tissue"><span data-dcnode-id="3863" instrument_node="">mucous tissue</span></a><span data-dcnode-id="3861" instrument_node="">/eye area (with use of lab animals) or by use of alternative general toxicology methods (IN VITRO). In this manner the technical regulations include measures which provide an alternative to animal testing".</span><sup class="reference" data-dcnode-id="3858" id="cite_ref-Russia_56-0"><a data-dcnode-id="3859" href="#cite_note-Russia-56"><span data-dcnode-id="3860" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3857" instrument_node="">
</span></p><span data-dcnode-id="3855" instrument_node="">
</span><h2 data-dcnode-id="3845"><span class="mw-headline" data-dcnode-id="3853" id="See_also"><span data-dcnode-id="3854" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="3846"><span class="mw-editsection-bracket" data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">[</span></span><a data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTesting_cosmetics_on_animals%26action%3Dedit%26section%3D32" title="Edit section: See also"><span data-dcnode-id="3850" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3844" instrument_node="">
</span><ul data-dcnode-id="3828"><li data-dcnode-id="3841"><a data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal_testing_on_invertebrates" title="Animal testing on invertebrates"><span data-dcnode-id="3843" instrument_node="">Animal testing on invertebrates</span></a></li><span data-dcnode-id="3840" instrument_node="">
</span><li data-dcnode-id="3837"><a data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal_testing_on_non-human_primates" title="Animal testing on non-human primates"><span data-dcnode-id="3839" instrument_node="">Animal testing on non-human primates</span></a></li><span data-dcnode-id="3836" instrument_node="">
