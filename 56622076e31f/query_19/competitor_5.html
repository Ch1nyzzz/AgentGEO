</span><meta content="Biosensors, as an application for animal health management, are an emerging market that is quickly gaining recognition in the global market. Globally,…" data-dcnode-id="11770" property="og:description"><span data-dcnode-id="11769" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0050&quot;>Biosensors, as an application for animal health management, are an emerging market that is quickly gaining recognition in the global market. Globally, a number of sensors being produced for animal health management are at various stages of commercialization. Some technologies for producing an accurate health status and disease diagnosis are applicable only for humans, with few modifications or testing in animal models. Now, these innovative technologies are being considered for their future use in livestock development and welfare. Precision livestock farming techniques, which include a wide span of technologies, are being applied, along with advanced technologies like microfluidics, sound analyzers, image-detection techniques, sweat and salivary sensing, serodiagnosis, and others. However, there is a need to integrate all the available sensors and create an efficient online monitoring system so that animal health status can be monitored in real time, without delay. This review paper discusses the scope of different wearable technologies for animals, nano biosensors and advanced molecular biology diagnostic techniques for the detection of various infectious diseases of cattle, along with the efforts to enlist and compare these technologies with respect to their drawbacks and advantages in the domain of animal health management. The paper considers all recent developments in the field of biosensors and their applications for animal health to provide insight regarding the appropriate approach to be used in the future of enhanced animal welfare.</p></div></div></div>" data-dcnode-id="11768" lang="en" name="citation_abstract"><span data-dcnode-id="11767" instrument_node="">

Info" data-dcnode-id="11168"><div class="License" data-dcnode-id="11172"><span data-dcnode-id="11175"><span data-dcnode-id="11176" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="11173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11174" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="11169"><span class="access-indicator" data-dcnode-id="11171"></span><span data-dcnode-id="11170" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="11167"></section><section class="ReferencedArticles" data-dcnode-id="11166"></section><div class="PageDivider" data-dcnode-id="11165"></div><div class="Abstracts u-font-serif" data-dcnode-id="11140" id="abstracts"><div class="abstract author" data-dcnode-id="11141" id="ab0005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11163"><span data-dcnode-id="11164" instrument_node="">Abstract</span></h2><div data-dcnode-id="11142" id="as0005"><p data-dcnode-id="11143" id="sp0050"><span data-dcnode-id="11159"><a class="topic-link" data-dcnode-id="11161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biosensors" title="Learn more about Biosensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11162" instrument_node="">Biosensors</span></a><span data-dcnode-id="11160" instrument_node="">, as an application for animal health management, are an emerging market that is quickly gaining recognition in the global market. Globally, a number of sensors being produced for animal health management are at various stages of </span></span><a class="topic-link" data-dcnode-id="11157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/commercialisation" title="Learn more about commercialization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11158" instrument_node="">commercialization</span></a><span data-dcnode-id="11144"><span data-dcnode-id="11156" instrument_node="">. Some technologies for producing an accurate health status and disease diagnosis are applicable only for humans, with few modifications or testing in animal models. Now, these innovative technologies are being considered for their future use in livestock development and welfare. Precision livestock farming techniques, which include a wide span of technologies, are being applied, along with advanced technologies like </span><a class="topic-link" data-dcnode-id="11154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microfluidics" title="Learn more about microfluidics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11155" instrument_node="">microfluidics</span></a><span data-dcnode-id="11145"><span data-dcnode-id="11153" instrument_node="">, sound analyzers, image-detection techniques, sweat and salivary sensing, serodiagnosis, and others. However, there is a need to integrate all the available sensors and create an efficient online monitoring system so that animal health status can be monitored in real time, without delay. This review paper discusses the scope of different </span><a class="topic-link" data-dcnode-id="11151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/wearable-technology" title="Learn more about wearable technologies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11152" instrument_node="">wearable technologies</span></a><span data-dcnode-id="11146"><span data-dcnode-id="11150" instrument_node=""> for animals, </span><a class="topic-link" data-dcnode-id="11148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanobiosensor" title="Learn more about nano biosensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11149" instrument_node="">nano biosensors</span></a><span data-dcnode-id="11147" instrument_node=""> and advanced molecular biology diagnostic techniques for the detection of various infectious diseases of cattle, along with the efforts to enlist and compare these technologies with respect to their drawbacks and advantages in the domain of animal health management. The paper considers all recent developments in the field of biosensors and their applications for animal health to provide insight regarding the appropriate approach to be used in the future of enhanced animal welfare.</span></span></span></span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="11117" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="11129"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="11130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2214180416301441"><svg class="icon icon-navigate-left" data-dcnode-id="11138" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="11139"></path></svg><span class="button-alternative-text" data-dcnode-id="11131"><strong data-dcnode-id="11136"><span data-dcnode-id="11137" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="11134"><span data-dcnode-id="11135" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11132"><span data-dcnode-id="11133" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="11118"><button class="button-alternative button-alternative-tertiary" data-dcnode-id="11119" disabled="" type="button"><span class="button-alternative-text" data-dcnode-id="11122"><strong data-dcnode-id="11127"><span data-dcnode-id="11128" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="11125"><span data-dcnode-id="11126" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="11123"><span data-dcnode-id="11124" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="11120" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="11121"></path></svg></button></li></ul><div class="Keywords u-font-serif" data-dcnode-id="11083"><div class="keywords-section" data-dcnode-id="11084" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11115"><span data-dcnode-id="11116" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="11112" id="kw0005"><span data-dcnode-id="11113" id="tx0005"><span data-dcnode-id="11114" instrument_node="">Biosensor</span></span></div><div class="keyword" data-dcnode-id="11109" id="kw0010"><span data-dcnode-id="11110" id="tx0010"><span data-dcnode-id="11111" instrument_node="">Wearable technology</span></span></div><div class="keyword" data-dcnode-id="11106" id="kw0015"><span data-dcnode-id="11107" id="tx0015"><span data-dcnode-id="11108" instrument_node="">Animal health diagnostics</span></span></div><div class="keyword" data-dcnode-id="11103" id="kw0020"><span data-dcnode-id="11104" id="tx0020"><span data-dcnode-id="11105" instrument_node="">On-farm disease surveillance</span></span></div><div class="keyword" data-dcnode-id="11100" id="kw0025"><span data-dcnode-id="11101" id="tx0025"><span data-dcnode-id="11102" instrument_node="">Nanotechnology</span></span></div><div class="keyword" data-dcnode-id="11097" id="kw0030"><span data-dcnode-id="11098" id="tx0030"><span data-dcnode-id="11099" instrument_node="">Microfluidics</span></span></div><div class="keyword" data-dcnode-id="11094" id="kw0035"><span data-dcnode-id="11095" id="tx0035"><span data-dcnode-id="11096" instrument_node="">Precision livestock farming (PLF)</span></span></div><div class="keyword" data-dcnode-id="11091" id="kw0040"><span data-dcnode-id="11092" id="tx0040"><span data-dcnode-id="11093" instrument_node="">Sweat sensing</span></span></div><div class="keyword" data-dcnode-id="11088" id="kw0045"><span data-dcnode-id="11089" id="tx0045"><span data-dcnode-id="11090" instrument_node="">Stress detection</span></span></div><div class="keyword" data-dcnode-id="11085" id="kw0050"><span data-dcnode-id="11086" id="tx0050"><span data-dcnode-id="11087" instrument_node="">Serodiagnosis</span></span></div></div></div><span data-dcnode-id="11082" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="8737" id="body"><div data-dcnode-id="8761"><section data-dcnode-id="10924" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11078" id="st0015"><span data-dcnode-id="11081" instrument_node="">1</span><span data-dcnode-id="11080" instrument_node="">. </span><span data-dcnode-id="11079" instrument_node="">Introduction</span></h2><p data-dcnode-id="11062" id="p0005"><span data-dcnode-id="11069"><span data-dcnode-id="11077" instrument_node="">The use of </span><a class="topic-link" data-dcnode-id="11075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biosensors" title="Learn more about biosensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11076" instrument_node="">biosensors</span></a><span data-dcnode-id="11070"><span data-dcnode-id="11074" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="11072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/wearable-technology" title="Learn more about wearable technologies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11073" instrument_node="">wearable technologies</span></a><span data-dcnode-id="11071" instrument_node=""> is becoming increasingly important for animal health management. These devices, if built precisely and used correctly, can provide timely diagnosis of diseases in animals, eventually decreasing economic losses. Such devices are particularly useful for dairy cattle and poultry farms. Instead of relying solely on farmers' senses and knowledge, on-site sensors can provide reliable data about the physical condition of the animals. Due to the superior performance of wearable technologies and sensors, they can make a breakthrough in livestock development, and promises to become one the most impactful and practicable technology in the animal health market. New wearable technologies are being customized to meet the needs of animals, pets and livestock. Products such as medication patches, tracking collars, and electronic saddle optimization are being purchased at higher rates </span></span></span><a class="workspace-trigger" data-dcnode-id="11067" href="#bb0005" name="bbb0005"><span data-dcnode-id="11068" instrument_node="">[1]</span></a><span data-dcnode-id="11066" instrument_node=""> and harnessed for the healthier upbringing of farm animals. These wearable technologies are multifunctional and efficient, allowing animal owners to do more in less time. Global growth of this sector in the next ten years has been predicted to soar from $0.91 billion to $2.6 billion </span><a class="workspace-trigger" data-dcnode-id="11064" href="#bb0005" name="bbb0005"><span data-dcnode-id="11065" instrument_node="">[1]</span></a><span data-dcnode-id="11063" instrument_node="">.</span></p><p data-dcnode-id="10994" id="p0010"><span data-dcnode-id="11061" instrument_node="">Sensors and wearable technologies can be implanted on animals to detect their sweat constituents </span><a class="workspace-trigger" data-dcnode-id="11059" href="#bb0010" name="bbb0010"><span data-dcnode-id="11060" instrument_node="">[2]</span></a><span data-dcnode-id="11058" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11056" href="#bb0015" name="bbb0015"><span data-dcnode-id="11057" instrument_node="">[3]</span></a><span data-dcnode-id="11055" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11053" href="#bb0020" name="bbb0020"><span data-dcnode-id="11054" instrument_node="">[4]</span></a><span data-dcnode-id="11052" instrument_node="">, measure body temperature </span><a class="workspace-trigger" data-dcnode-id="11050" href="#bb0025" name="bbb0025"><span data-dcnode-id="11051" instrument_node="">[5]</span></a><span data-dcnode-id="11049" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11047" href="#bb0030" name="bbb0030"><span data-dcnode-id="11048" instrument_node="">[6]</span></a><span data-dcnode-id="11046" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11044" href="#bb0035" name="bbb0035"><span data-dcnode-id="11045" instrument_node="">[7]</span></a><span data-dcnode-id="11043" instrument_node="">, observe behavior and movement </span><a class="workspace-trigger" data-dcnode-id="11041" href="#bb0040" name="bbb0040"><span data-dcnode-id="11042" instrument_node="">[8]</span></a><span data-dcnode-id="11040" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11038" href="#bb0045" name="bbb0045"><span data-dcnode-id="11039" instrument_node="">[9]</span></a><span data-dcnode-id="11037" instrument_node="">, detect stress </span><a class="workspace-trigger" data-dcnode-id="11035" href="#bb0050" name="bbb0050"><span data-dcnode-id="11036" instrument_node="">[10]</span></a><span data-dcnode-id="11034" instrument_node="">, analyze sound </span><a class="workspace-trigger" data-dcnode-id="11032" href="#bb0055" name="bbb0055"><span data-dcnode-id="11033" instrument_node="">[11]</span></a><span data-dcnode-id="11031" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11029" href="#bb0060" name="bbb0060"><span data-dcnode-id="11030" instrument_node="">[12]</span></a><span data-dcnode-id="11028" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11026" href="#bb0065" name="bbb0065"><span data-dcnode-id="11027" instrument_node="">[13]</span></a><span data-dcnode-id="11025" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11023" href="#bb0070" name="bbb0070"><span data-dcnode-id="11024" instrument_node="">[14]</span></a><span data-dcnode-id="11022" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11020" href="#bb0075" name="bbb0075"><span data-dcnode-id="11021" instrument_node="">[15]</span></a><span data-dcnode-id="11019" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11017" href="#bb0080" name="bbb0080"><span data-dcnode-id="11018" instrument_node="">[16]</span></a><span data-dcnode-id="11016" instrument_node="">, detect pH </span><a class="workspace-trigger" data-dcnode-id="11014" href="#bb0085" name="bbb0085"><span data-dcnode-id="11015" instrument_node="">[17]</span></a><span data-dcnode-id="11013" instrument_node="">, prevent disease </span><a class="workspace-trigger" data-dcnode-id="11011" href="#bb0090" name="bbb0090"><span data-dcnode-id="11012" instrument_node="">[18]</span></a><span data-dcnode-id="11010" instrument_node="">, detect analytes and detect presence of viruses and pathogens </span><a class="workspace-trigger" data-dcnode-id="11008" href="#bb0095" name="bbb0095"><span data-dcnode-id="11009" instrument_node="">[19]</span></a><span data-dcnode-id="11007" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11005" href="#bb0100" name="bbb0100"><span data-dcnode-id="11006" instrument_node="">[20]</span></a><span data-dcnode-id="11004" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11002" href="#bb0105" name="bbb0105"><span data-dcnode-id="11003" instrument_node="">[21]</span></a><span data-dcnode-id="11001" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10999" href="#bb0110" name="bbb0110"><span data-dcnode-id="11000" instrument_node="">[22]</span></a><span data-dcnode-id="10998" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10996" href="#bb0115" name="bbb0115"><span data-dcnode-id="10997" instrument_node="">[23]</span></a><span data-dcnode-id="10995" instrument_node="">. Wearable sensors help farmers catch disease early, and thereby prevent deaths of animals. Farmers can also cull diseased animals in time to prevent the spread of disease in whole cattle herds through prediction.</span></p><p data-dcnode-id="10985" id="p0015"><span data-dcnode-id="10989"><span data-dcnode-id="10993" instrument_node="">Apart from collecting useful data regarding animal health, general farm monitoring can also be made easier and more reliable by using biosensors integrated with </span><a class="topic-link" data-dcnode-id="10991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/cellphone" title="Learn more about cellphones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10992" instrument_node="">cellphones</span></a><span data-dcnode-id="10990" instrument_node=""> and handheld devices instead of conventional methods, such as writing notes, keeping a farm diary, or using simple equipment without data-sharing functions. A number of systems have been developed on cellphones and handheld devices to reduce the effort of recording data manually </span></span><a class="workspace-trigger" data-dcnode-id="10987" href="#bb0120" name="bbb0120"><span data-dcnode-id="10988" instrument_node="">[24]</span></a><span data-dcnode-id="10986" instrument_node="">. Solar-powered receivers mounted on livestock can collect data that is transmitted to a central server. The final data can easily be viewed on a custom dashboard or office computer, which makes this technology very convenient for farmers.</span></p><p data-dcnode-id="10971" id="p0020"><span data-dcnode-id="10984" instrument_node="">A biosensing device that attaches to ears to measure the body temperature of animals now costs $100,000 for 10,000 cattle. Commercially available biosensor collars are also being used in cows for detection of estrus period </span><a class="workspace-trigger" data-dcnode-id="10982" href="#bb0125" name="bbb0125"><span data-dcnode-id="10983" instrument_node="">[25]</span></a><span data-dcnode-id="10981" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10979" href="#bb0130" name="bbb0130"><span data-dcnode-id="10980" instrument_node="">[26]</span></a><span data-dcnode-id="10978" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10976" href="#bb0135" name="bbb0135"><span data-dcnode-id="10977" instrument_node="">[27]</span></a><span data-dcnode-id="10975" instrument_node="">. An innovative robotic grazing system uses electronic leg bands that interact with sensors mounted on the animal to record data on its feeding and milking behavior and pattern </span><a class="workspace-trigger" data-dcnode-id="10973" href="#bb0140" name="bbb0140"><span data-dcnode-id="10974" instrument_node="">[28]</span></a><span data-dcnode-id="10972" instrument_node="">.</span></p><p data-dcnode-id="10963" id="p0025"><span data-dcnode-id="10970" instrument_node="">It's a big challenge to provide good quality, safe meat to meet the increasing global demand for meat and poultry products. With rising demand comes growing concerns relating to animal health </span><a class="workspace-trigger" data-dcnode-id="10968" href="#bb0145" name="bbb0145"><span data-dcnode-id="10969" instrument_node="">[29]</span></a><span data-dcnode-id="10967" instrument_node="">. Devices that can be integrated inside the body of animal, patched under its skin, or remain in its stomach give animal owner's useful information regarding their behavior and medical conditions. These electronic devices are expected to be used for the medical treatment of animals, detection of heating and cooling needs, iontophoretic drug delivery, and even conservation of wild species </span><a class="workspace-trigger" data-dcnode-id="10965" href="#bb0005" name="bbb0005"><span data-dcnode-id="10966" instrument_node="">[1]</span></a><span data-dcnode-id="10964" instrument_node="">.</span></p><p data-dcnode-id="10958" id="p0030"><span data-dcnode-id="10962" instrument_node="">Another important use of biosensors is antibiotic detection. With the unhampered and frequent use of antibiotics in the animal industry, antibiotic resistance has become a major threat for farmers. Ecological instability is caused by the uncontrolled use of sub-therapeutic antibiotics in concentrated animal feeding operations (CAFOs), which in turn causes antibiotic resistance in animals. There is a dire need for farmers to switch to alternatives to avoid animals becoming immune to antibiotic treatment. The amount of antibiotics administered in the blood serum and muscles of farm animals should be kept in a certain range, and there should be a proper system to detect the antibiotic levels in the animal body. It is nearly impossible to put a ban on the use of antibiotics in the livestock health management, since antibiotics help cure the most common ailments, like enteric and respiratory infections. The use of antibiotics in sub-therapeutic concentrations for increasing development and growth of farm animals is also well recognized. To address this prevailing issue, the European Union set up a standard to prevent the antibiotic resistance. This principle, which has been suggested as precautionary measure, focuses on banning certain antimicrobial growth promoters. Maximum Residue Limits (MRLs) have been set up for those antibiotics that are still allowed to be administered in animals in the United States and European countries. MRL is that amount of pharmacologically active substances, and their derived metabolites, which is legally acceptable. Biosensors have been identified as being helpful in this regard; they can easily detect antibiotic levels and warn the farmer if the antibiotics level exceeds a maximum range </span><a class="workspace-trigger" data-dcnode-id="10960" href="#bb0095" name="bbb0095"><span data-dcnode-id="10961" instrument_node="">[19]</span></a><span data-dcnode-id="10959" instrument_node="">.</span></p><p data-dcnode-id="10953" id="p0035"><span data-dcnode-id="10957" instrument_node="">The international market for wearable technology for animals is expected to grow from around $1 billion to $2.5 billion in the next decade, increasing more than 2.5 times </span><a class="workspace-trigger" data-dcnode-id="10955" href="#bb0005" name="bbb0005"><span data-dcnode-id="10956" instrument_node="">[1]</span></a><span data-dcnode-id="10954" instrument_node="">. The highest percentage of manufacturers of this unique technology is in China, which is providing these products at a very cheap price, followed by the USA.</span></p><p data-dcnode-id="10945" id="p0040"><span data-dcnode-id="10952" instrument_node="">A significant amount of money is spent every year on agricultural research and animal health management. However, this does not necessarily translate to better productivity or increased health of animals. More often than not, the funding is aimed to provide newer solutions to the problems, rather than bridging the gap between research and industry. Banhazi and Black </span><a class="workspace-trigger" data-dcnode-id="10950" href="#bb0150" name="bbb0150"><span data-dcnode-id="10951" instrument_node="">[30]</span></a><span data-dcnode-id="10949" instrument_node=""> have suggested that a rigorous procedure be carried out to ensure that agricultural practices are correct and consistent in accordance with the current knowledge and research findings </span><a class="workspace-trigger" data-dcnode-id="10947" href="#bb0150" name="bbb0150"><span data-dcnode-id="10948" instrument_node="">[30]</span></a><span data-dcnode-id="10946" instrument_node="">. This ambitious standard can only be accomplished by integrating data measurements and data acquisition systems through novel biosensing technologies.</span></p><p data-dcnode-id="10943" id="p0045"><span data-dcnode-id="10944" instrument_node="">To meet the current and emerging challenges of farmed animal disease surveillance, diagnostics and control, it is imperative that a paradigm shift occurs in how diseases are identified. This shift involves replacing the shipping samples from farms to labs with rapid diagnosis on the farm itself. The world organization for animal health (OIE) has warned that the zoonotic diseases from farmed animals can have devastating impacts on public health if there is spill over from the farmed animal reservoir, and the livestock industry is under heavy pressure to improve its biosecurity protocols and enhance animal traceability and welfare. Hence, the livestock industries and watch dog food safety inspection agencies are seeking new tools and technologies, to enable rapid, real-time and on-farm monitoring of diseases and record keeping.</span></p><p data-dcnode-id="10941" id="p0050"><span data-dcnode-id="10942" instrument_node="">Biosensing technologies provides promise to improve the performance, cost, and productivity in the area of disease management in livestock. Development and deployment of reliable, rapid tests will allow earlier and more specific treatment of diseases, potentially resulting in reduced antimicrobial usage and improved animal welfare. In addition, the biosensors and sensing technologies to alert producers of diseases even before the disease occurs will be a novelty and could form management components of the integrated farm inspection and proAction model. The opportunity to detect diseases and factors concerning milk production through the use of technologies will establish risk mitigation in on-farm operations and thereby will enhance the animal care and biosecurity components of proAction.</span></p><p data-dcnode-id="10932" id="p0055"><span data-dcnode-id="10940" instrument_node="">The integration of </span><a class="topic-link" data-dcnode-id="10938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/novel-diagnostics" title="Learn more about novel diagnostic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10939" instrument_node="">novel diagnostic</span></a><span data-dcnode-id="10933"><span data-dcnode-id="10937" instrument_node=""> and disease detection systems using biosensors would keep livestock and agricultural industry one step ahead of invisible diseases through satellites and smartphones. Smart and precision livestock farming and animal health management will continue to grow in importance to meet the increasing demand for food and ensure sustainability in farming. The biosensing technologies with the advances in the </span><a class="topic-link" data-dcnode-id="10935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/internet-of-things" title="Learn more about internet of things from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10936" instrument_node="">internet of things</span></a><span data-dcnode-id="10934" instrument_node=""> (IoT) paradigm will promote rapid, on-farm and real-time monitoring of farmed animal diseases. The real-time dissemination of data collected from the farms through these biosensors will have value beyond the farm as well; allowing food manufacturing stakeholders' access to this information that will prove essential to the social license issues facing our agricultural sector and will be a key to our continued global competitiveness.</span></span></p><p data-dcnode-id="10927" id="p0060"><span data-dcnode-id="10931" instrument_node="">Early detection of diseases using biosensors allows for shifting of the epidemiological curve to the left by enabling rapid response, reducing the spread of the disease and associated production, social and economic consequences. Reducing the time to obtain results in diagnosing infectious disease biomarkers on-farm in a real time fashion will provide an </span><a class="topic-link" data-dcnode-id="10929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/early-warning-system" title="Learn more about early warning system from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10930" instrument_node="">early warning system</span></a><span data-dcnode-id="10928" instrument_node=""> for smart livestock health management.</span></p><p data-dcnode-id="10925" id="p0065"><span data-dcnode-id="10926" instrument_node="">The purpose of this review article is to describe, compare and analyze various wearable technologies that have been developed recently towards providing solutions for farmed animal health management.</span></p></section><section data-dcnode-id="8798" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10920" id="st0020"><span data-dcnode-id="10923" instrument_node="">2</span><span data-dcnode-id="10922" instrument_node="">. </span><span data-dcnode-id="10921" instrument_node="">Biosensors and underlying technologies</span></h2><p data-dcnode-id="10908" id="p0070"><span data-dcnode-id="10915"><span data-dcnode-id="10919" instrument_node="">The ability to quickly, accurately and reliably detect the presence or absence of biomarkers or specific chemicals can be a matter of life or death of the farmed animals. Monitoring of glucose or proteins or enzymes in the bloodstream, testing for harmful compounds such as metals or antibiotic residues in animals, and early warning of the biological and chemical agents in the livestock animal health sector requires sensitive and reliable sensing devices. While the demand for real-time detection of diseases using the sensors and devices are ever more urgent, the capability of several relevant enabling technologies to build the sensing devices is also unprecedented. </span><a class="topic-link" data-dcnode-id="10917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/bionanotechnology" title="Learn more about Bionanotechnology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10918" instrument_node="">Bionanotechnology</span></a><span data-dcnode-id="10916" instrument_node=""> and microelectronics made it possible to fabricate transistors smaller than 100</span></span><span data-dcnode-id="10914" instrument_node="">&nbsp;</span><span data-dcnode-id="10909"><span data-dcnode-id="10913" instrument_node="">nm and to integrate several hundreds of them into a functional circuit on a small chip. Rapid progresses in </span><a class="topic-link" data-dcnode-id="10911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanofabrication-process" title="Learn more about nanofabrication from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10912" instrument_node="">nanofabrication</span></a><span data-dcnode-id="10910" instrument_node=""> has also offered novel enabling technologies.</span></span></p><section data-dcnode-id="10730" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10904" id="st0025"><span data-dcnode-id="10907" instrument_node="">2.1</span><span data-dcnode-id="10906" instrument_node="">. </span><span data-dcnode-id="10905" instrument_node="">Biosensors</span></h3><p data-dcnode-id="10884" id="p0075"><span data-dcnode-id="10895"><span data-dcnode-id="10903" instrument_node="">A variety of methods are used to detect the level of antibiotics in the body to avoid </span><a class="topic-link" data-dcnode-id="10901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/health-hazards" title="Learn more about health hazards from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10902" instrument_node="">health hazards</span></a><span data-dcnode-id="10896"><span data-dcnode-id="10900" instrument_node="">. </span><a class="topic-link" data-dcnode-id="10898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biosensors" title="Learn more about Biosensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10899" instrument_node="">Biosensors</span></a><span data-dcnode-id="10897" instrument_node=""> are the most prevalent method. The mechanism and configuration of biosensors is very simple and easy to understand, and provides fast, accurate detection of antibiotics. Biosensors work with the help of a recognition element and a transducing device. The recognition element works on the mechanism of affinity-pairing, such as enzyme/substrate and antibody/antigen receptors (</span></span></span><a class="workspace-trigger" data-dcnode-id="10893" href="#f0010" name="bf0010"><span data-dcnode-id="10894" instrument_node="">Fig. 2</span></a><span data-dcnode-id="10888"><span data-dcnode-id="10892" instrument_node="">). The </span><a class="topic-link" data-dcnode-id="10890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/transducers" title="Learn more about transducer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10891" instrument_node="">transducer</span></a><span data-dcnode-id="10889" instrument_node=""> detects any contact between such pairs by producing detectable electrical signals in response to biological activity, which is later analyzed. The use of biosensors is limited in the field currently mainly because the biological sensing element is affected by different factors, including environmental factors and type of molecules. Moreover, the size of transducer can also affect the efficiency and functioning of a biosensor </span></span><a class="workspace-trigger" data-dcnode-id="10886" href="#bb0095" name="bbb0095"><span data-dcnode-id="10887" instrument_node="">[19]</span></a><span data-dcnode-id="10885" instrument_node="">.</span></p><section data-dcnode-id="10863" id="s0020"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10880" id="st0030"><span data-dcnode-id="10883" instrument_node="">2.1.1</span><span data-dcnode-id="10882" instrument_node="">. </span><span data-dcnode-id="10881" instrument_node="">Antibiotic detection</span></h4><p data-dcnode-id="10864" id="p0080"><a class="workspace-trigger" data-dcnode-id="10878" href="#f0005" name="bf0005"><span data-dcnode-id="10879" instrument_node="">Fig. 1</span></a><span data-dcnode-id="10877" instrument_node=""> illustrates the distribution of analytical methods used for determining antiobiotic levels in food (</span><a class="workspace-trigger" data-dcnode-id="10875" href="#f0010" name="bf0010"><span data-dcnode-id="10876" instrument_node="">Fig. 2</span></a><span data-dcnode-id="10874" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10872" href="#f0015" name="bf0015"><span data-dcnode-id="10873" instrument_node="">Fig. 3</span></a><span data-dcnode-id="10871" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10869" href="#f0020" name="bf0020"><span data-dcnode-id="10870" instrument_node="">Fig. 4</span></a><span data-dcnode-id="10868" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10866" href="#f0025" name="bf0025"><span data-dcnode-id="10867" instrument_node="">Fig. 5</span></a><span data-dcnode-id="10865" instrument_node="">).</span></p></section><section data-dcnode-id="10842" id="s0025"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10859" id="st0035"><span data-dcnode-id="10862" instrument_node="">2.1.2</span><span data-dcnode-id="10861" instrument_node="">. </span><span data-dcnode-id="10860" instrument_node="">Microfluidics</span></h4><p data-dcnode-id="10843" id="p0085"><span data-dcnode-id="10854"><span data-dcnode-id="10858" instrument_node="">Another technology which is becoming widely used is microfluidics, which makes the rapid detection of analytes possible. In different disciplines, including food safety, the detection of analytes is of primary importance, and this technology has proved to be advantageous in this regard. </span><a class="topic-link" data-dcnode-id="10856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microfluidic-technology" title="Learn more about Microfluidics technology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10857" instrument_node="">Microfluidics technology</span></a><span data-dcnode-id="10855" instrument_node=""> is able to utilize small samples, which can be quickly detected and lead to less reagent wastage. Furthermore, the utilization of microfluidics technology in Point of Care (POC) operations has been successful, as this substantially reduces the risk of cross contamination </span></span><a class="workspace-trigger" data-dcnode-id="10852" href="#bb0155" name="bbb0155"><span data-dcnode-id="10853" instrument_node="">[31]</span></a><span data-dcnode-id="10847"><span data-dcnode-id="10851" instrument_node="">. The use of paper-based and </span><a class="topic-link" data-dcnode-id="10849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/thermoplastics" title="Learn more about thermoplastic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10850" instrument_node="">thermoplastic</span></a><span data-dcnode-id="10848" instrument_node=""> chips has revolutionized the development of disease diagnostic platforms. Paper-based chips exclude the need for preprocessing samples. On the other hand, thermoplastic chips are feasible because they are disposable and cost effective </span></span><a class="workspace-trigger" data-dcnode-id="10845" href="#bb0095" name="bbb0095"><span data-dcnode-id="10846" instrument_node="">[19]</span></a><span data-dcnode-id="10844" instrument_node="">.</span></p></section><section data-dcnode-id="10828" id="s0030"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10838" id="st0040"><span data-dcnode-id="10841" instrument_node="">2.1.3</span><span data-dcnode-id="10840" instrument_node="">. </span><span data-dcnode-id="10839" instrument_node="">Fluorescence resonance energy transfer (FRET)</span></h4><p data-dcnode-id="10829" id="p0090"><span data-dcnode-id="10833"><span data-dcnode-id="10837" instrument_node="">Integration of microfluidics and fluorescent labels ensures not only the requirement of minimum sample volume, but also an enhancement in sensitivity by successfully reducing the background signal noise. </span><a class="topic-link" data-dcnode-id="10835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microfluidics" title="Learn more about Microfluidics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10836" instrument_node="">Microfluidics</span></a><span data-dcnode-id="10834" instrument_node=""> technology also aids in minimizing the signal-to-noise ratio, and in reducing the noises during the measurement of Raman scattering and Rayleigh </span></span><a class="topic-link" data-dcnode-id="10831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/stray-light" title="Learn more about stray light from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10832" instrument_node="">stray light</span></a><span data-dcnode-id="10830" instrument_node=""> signals during biomarkers or analyte detection. The chip material for microfluidics technology should be suitable for microscopy, and possess characteristics like being non-adsorbent to the molecules. DNA analysis can also be done by the use of this versatile technology by incorporating fluorescence resonance energy transfer (FRET).</span></p></section><section data-dcnode-id="10806" id="s0035"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10824" id="st0045"><span data-dcnode-id="10827" instrument_node="">2.1.4</span><span data-dcnode-id="10826" instrument_node="">. </span><span data-dcnode-id="10825" instrument_node="">Quantum dots</span></h4><p data-dcnode-id="10807" id="p0095"><span data-dcnode-id="10811"><span data-dcnode-id="10819"><span data-dcnode-id="10823" instrument_node="">Features of microfluidics, such as allowing spatial and temporal resolution and easy differentiation between non-hybridizing and hybridizing </span><a class="topic-link" data-dcnode-id="10821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/oligomers" title="Learn more about oligomers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10822" instrument_node="">oligomers</span></a><span data-dcnode-id="10820" instrument_node=""> of DNA, give it an advantage over previously used technologies. However, since issues of pH sensitivity and photo bleaching are common in FRET-based techniques, quantum dots (QD) are utilized to provide stability. QD has an extensive </span></span><a class="topic-link" data-dcnode-id="10817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/emission-wavelength" title="Learn more about emission wavelength from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10818" instrument_node="">emission wavelength</span></a><span data-dcnode-id="10812"><span data-dcnode-id="10816" instrument_node="">, which can be adjusted by changing their size and composition with other </span><a class="topic-link" data-dcnode-id="10814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/nanomaterial" title="Learn more about nanomaterials from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10815" instrument_node="">nanomaterials</span></a><span data-dcnode-id="10813" instrument_node=""> </span></span></span><a class="workspace-trigger" data-dcnode-id="10809" href="#bb0095" name="bbb0095"><span data-dcnode-id="10810" instrument_node="">[19]</span></a><span data-dcnode-id="10808" instrument_node="">.</span></p></section><section data-dcnode-id="10754" id="s0040"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10802" id="st0050"><span data-dcnode-id="10805" instrument_node="">2.1.5</span><span data-dcnode-id="10804" instrument_node="">. </span><span data-dcnode-id="10803" instrument_node="">Surface Plasmon Resonance technology (SPR)</span></h4><p data-dcnode-id="10781" id="p0100"><span data-dcnode-id="10793"><span data-dcnode-id="10801" instrument_node="">SPR technology makes the future of biosensors very promising. About 20 commercial standard SPR platforms are currently present on the market. The application of gold </span><a class="topic-link" data-dcnode-id="10799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanoparticle" title="Learn more about nanoparticles from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10800" instrument_node="">nanoparticles</span></a><span data-dcnode-id="10794"><span data-dcnode-id="10798" instrument_node=""> for detecting antibiotics in food residues has caught the attention of the food industry. Recently, nanoparticles have been shown to amplify SPR signals. Gold nanoparticles upon combination with screen-printed electrodes can produce versatile and suitable electrochemical properties. The physical and chemical properties of these particles, such as efficient mass transport and enhanced surface area, are desirable due to the high surface to volume ratio. Gold nanoparticles have found their application in antibiotic detection due to a fast binding rate with the </span><a class="topic-link" data-dcnode-id="10796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biomolecule" title="Learn more about biomolecules from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10797" instrument_node="">biomolecules</span></a><span data-dcnode-id="10795" instrument_node=""> and low toxicity of these versatile particles. Using </span></span></span><a class="topic-link" data-dcnode-id="10791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/solid-phase-extraction" title="Learn more about Solid Phase Extraction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10792" instrument_node="">Solid Phase Extraction</span></a><span data-dcnode-id="10782"><span data-dcnode-id="10786"><span data-dcnode-id="10790" instrument_node=""> (SPE) combined with </span><a class="topic-link" data-dcnode-id="10788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/self-assembled-monolayers" title="Learn more about Self Assembled Monolayer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10789" instrument_node="">Self Assembled Monolayer</span></a><span data-dcnode-id="10787" instrument_node=""> (SAM) cysteine (Cys) on </span></span><a class="topic-link" data-dcnode-id="10784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/gold-nanoparticle" title="Learn more about gold nanoparticles from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10785" instrument_node="">gold nanoparticles</span></a><span data-dcnode-id="10783" instrument_node=""> also raises the selectivity of this technique and boosts the sensitivity, by increasing efficiency.</span></span></p><p data-dcnode-id="10772" id="p0105"><span data-dcnode-id="10780" instrument_node="">Using impedimetric immunosensors is another highly sensitive and fast way to detect biomarkers and analytes of interest. Integrating the soluble gel-derived silica-based material with these immunosensors ensures </span><a class="topic-link" data-dcnode-id="10778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/encapsulation" title="Learn more about encapsulation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10779" instrument_node="">encapsulation</span></a><span data-dcnode-id="10773"><span data-dcnode-id="10777" instrument_node=""> of </span><a class="topic-link" data-dcnode-id="10775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biorecognition-element" title="Learn more about biorecognition elements from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10776" instrument_node="">biorecognition elements</span></a><span data-dcnode-id="10774" instrument_node=""> with adequate mechanical stability.</span></span></p><p data-dcnode-id="10770" id="p0110"><span data-dcnode-id="10771" instrument_node="">The most recent development in biosensing technology is the introduction of an SPR device for portable detection of antibiotics. This approach is very practical and gives highly sensitive results for antibiotic detection in chicken muscle/blood serum in slaughterhouses.</span></p><p data-dcnode-id="10755" id="p0115"><span data-dcnode-id="10769" instrument_node="">However, there is still a large growth potential for technology that detects larger families of antibiotics more easily and quickly </span><a class="workspace-trigger" data-dcnode-id="10767" href="#bb0095" name="bbb0095"><span data-dcnode-id="10768" instrument_node="">[19]</span></a><span data-dcnode-id="10762"><span data-dcnode-id="10766" instrument_node="">, and applied SPR to the detection of </span><a class="topic-link" data-dcnode-id="10764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/catalase" title="Learn more about catalase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10765" instrument_node="">catalase</span></a><span data-dcnode-id="10763" instrument_node=""> in milk samples </span></span><a class="workspace-trigger" data-dcnode-id="10760" href="#bb0160" name="bbb0160"><span data-dcnode-id="10761" instrument_node="">[32]</span></a><span data-dcnode-id="10759" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10757" href="#bb0165" name="bbb0165"><span data-dcnode-id="10758" instrument_node="">[33]</span></a><span data-dcnode-id="10756" instrument_node="">.</span></p></section><section data-dcnode-id="10731" id="s0045"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10750" id="st0055"><span data-dcnode-id="10753" instrument_node="">2.1.6</span><span data-dcnode-id="10752" instrument_node="">. </span><span data-dcnode-id="10751" instrument_node="">Hybrid technologies</span></h4><p data-dcnode-id="10741" id="p0120"><span data-dcnode-id="10745"><span data-dcnode-id="10749" instrument_node="">The combinations of QD, FRET and microfluidics ensure that the signal is amplified during DNA analysis and the molecular size is accurately detected. The combination of gold nanoparticles and microfluidics is reported to be 150 times more sensitive than the traditional ELISA method in the detection of interleukin-2. </span><a class="topic-link" data-dcnode-id="10747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/digital-microfluidics" title="Learn more about Digital microfluidics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10748" instrument_node="">Digital microfluidics</span></a><span data-dcnode-id="10746" instrument_node=""> with SPR is applicable for industrial use due to its astonishingly accurate screening. This technology is convenient, since it does not require labelling prior to analysis </span></span><a class="workspace-trigger" data-dcnode-id="10743" href="#bb0095" name="bbb0095"><span data-dcnode-id="10744" instrument_node="">[19]</span></a><span data-dcnode-id="10742" instrument_node="">.</span></p><p data-dcnode-id="10732" id="p0125"><span data-dcnode-id="10736"><span data-dcnode-id="10740" instrument_node="">There are, however, some disadvantages associated with this technology, such as non-specific adsorption and the difficulty of functionalizing metal surfaces. Microfluidics can also be integrated with Surface-enhanced Raman Spectroscopy or Surface-enhanced Raman Scattering (SERS). This technique increases Raman scattering by </span><a class="topic-link" data-dcnode-id="10738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/adsorbed-molecule" title="Learn more about molecules adsorbed from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10739" instrument_node="">molecules adsorbed</span></a><span data-dcnode-id="10737" instrument_node=""> on rough metal surfaces. The unique combination of microfluidics and SERS results in precise, reproducible results and consistent mixing conditions. The drawback of this combination is the unfeasible size of Raman instruments for detection. Microfluidics and SERS combination is being used for analyte detection for homeland security, and has significantly aided the successful recognition of cells leading to cancer </span></span><a class="workspace-trigger" data-dcnode-id="10734" href="#bb0095" name="bbb0095"><span data-dcnode-id="10735" instrument_node="">[19]</span></a><span data-dcnode-id="10733" instrument_node="">.</span></p></section></section><section data-dcnode-id="10534" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10726" id="st0060"><span data-dcnode-id="10729" instrument_node="">2.2</span><span data-dcnode-id="10728" instrument_node="">. </span><span data-dcnode-id="10727" instrument_node="">Sweat analyzers</span></h3><div data-dcnode-id="10535"><p data-dcnode-id="10681" id="p0130"><span data-dcnode-id="10725" instrument_node="">Analyzing sweat can relay useful information about an individual animal's health </span><a class="workspace-trigger" data-dcnode-id="10723" href="#bb0170" name="bbb0170"><span data-dcnode-id="10724" instrument_node="">[34]</span></a><span data-dcnode-id="10722" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10720" href="#bb0175" name="bbb0175"><span data-dcnode-id="10721" instrument_node="">[35]</span></a><span data-dcnode-id="10719" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10717" href="#bb0180" name="bbb0180"><span data-dcnode-id="10718" instrument_node="">[36]</span></a><span data-dcnode-id="10716" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10714" href="#bb0185" name="bbb0185"><span data-dcnode-id="10715" instrument_node="">[37]</span></a><span data-dcnode-id="10713" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10711" href="#bb0190" name="bbb0190"><span data-dcnode-id="10712" instrument_node="">[38]</span></a><span data-dcnode-id="10710" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10708" href="#bb0195" name="bbb0195"><span data-dcnode-id="10709" instrument_node="">[39]</span></a><span data-dcnode-id="10707" instrument_node="">. Wearable sweat analyzers have not yet been made commercial, mainly because of the size constraints of the equipment. However, low-cost robust designs have been developed in laboratories </span><a class="workspace-trigger" data-dcnode-id="10705" href="#bb0200" name="bbb0200"><span data-dcnode-id="10706" instrument_node="">[40]</span></a><span data-dcnode-id="10704" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10702" href="#bb0205" name="bbb0205"><span data-dcnode-id="10703" instrument_node="">[41]</span></a><span data-dcnode-id="10701" instrument_node="">. Methods for collecting sweat include using an electrical current to drive a chemical stimulant into the skin—iontophoresis—but there is a need for methods that not only collect but also analyze and monitor sweat throughout the day or as required </span><a class="workspace-trigger" data-dcnode-id="10699" href="#bb0015" name="bbb0015"><span data-dcnode-id="10700" instrument_node="">[3]</span></a><span data-dcnode-id="10698" instrument_node="">. Recent developments made in sweat analyzers aim to restrict the size of the system so it is wearable and easy to handle (</span><a class="workspace-trigger" data-dcnode-id="10696" href="#t0005" name="bt0005"><span data-dcnode-id="10697" instrument_node="">Table 1</span></a><span data-dcnode-id="10691"><span data-dcnode-id="10695" instrument_node="">). Real-time sweat monitoring of sodium by disposable </span><a class="topic-link" data-dcnode-id="10693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/potentiometric" title="Learn more about potentiometric from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10694" instrument_node="">potentiometric</span></a><span data-dcnode-id="10692" instrument_node=""> strips integrated with microfluidic chips has been developed; it is connected to a mini wireless system to detect sodium levels in sweat </span></span><a class="workspace-trigger" data-dcnode-id="10689" href="#bb0210" name="bbb0210"><span data-dcnode-id="10690" instrument_node="">[42]</span></a><span data-dcnode-id="10688" instrument_node="">. Monitoring a number of electrolytes simultaneously is more useful; hence, the system developed by Gao et al. conveys levels of sodium, potassium, lactate, glucose and skin temperature simultaneously. Integrated Bluetooth technology enables sharing and monitoring of the measured data </span><a class="workspace-trigger" data-dcnode-id="10686" href="#bb0215" name="bbb0215"><span data-dcnode-id="10687" instrument_node="">[43]</span></a><span data-dcnode-id="10685" instrument_node="">. Biomonitoring of sweat in animals has great potential for animal health because of its non-invasive nature. The amount of metals can also be detected by sweat analyzers </span><a class="workspace-trigger" data-dcnode-id="10683" href="#bb0220" name="bbb0220"><span data-dcnode-id="10684" instrument_node="">[44]</span></a><span data-dcnode-id="10682" instrument_node="">. If such a technology is introduced on farms, changes in animal health can be monitored in a novel fashion to significantly prevent health and economic loss.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="10536" id="t0005"><span class="captions" data-dcnode-id="10674"><span data-dcnode-id="10675" id="ca0030"><p data-dcnode-id="10676" id="sp0030"><span class="label" data-dcnode-id="10679"><span data-dcnode-id="10680" instrument_node="">Table 1</span></span><span data-dcnode-id="10678" instrument_node="">. </span><span data-dcnode-id="10677" instrument_node="">Analytes and methodologies involved in sweat analyzers.</span></p></span></span><div class="groups" data-dcnode-id="10537"><table class="rowsep-1 colsep-1" data-dcnode-id="10538"><thead data-dcnode-id="10664"><tr class="valign-top rowsep-1" data-dcnode-id="10665"><th data-dcnode-id="10672" scope="col"><span data-dcnode-id="10673" instrument_node="">Bio fluid</span></th><th data-dcnode-id="10670" scope="col"><span data-dcnode-id="10671" instrument_node="">Detection method/Platform</span></th><th data-dcnode-id="10668" scope="col"><span data-dcnode-id="10669" instrument_node="">Analytes</span></th><th data-dcnode-id="10666" scope="col"><span data-dcnode-id="10667" instrument_node="">References</span></th></tr></thead><tbody data-dcnode-id="10539"><tr class="valign-top" data-dcnode-id="10650"><th data-dcnode-id="10662" scope="row"><span data-dcnode-id="10663" instrument_node="">Sweat</span></th><td data-dcnode-id="10660"><span data-dcnode-id="10661" instrument_node="">Conductometric sensor based on poly-(2-acrylamido-2 methylpropane sulfonate) connected to impedance meter</span></td><td data-dcnode-id="10654"><span data-dcnode-id="10659" instrument_node="">pH, Cl</span><span data-dcnode-id="10658" instrument_node="">&nbsp;</span><span data-dcnode-id="10657" instrument_node="">− and Na</span><span data-dcnode-id="10656" instrument_node="">&nbsp;</span><span data-dcnode-id="10655" instrument_node="">+ concentration (help in clinical management of Cystic Fibrosis)</span></td><td data-dcnode-id="10651"><a class="workspace-trigger" data-dcnode-id="10652" href="#bb0170" name="bbb0170"><span data-dcnode-id="10653" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10640"><th data-dcnode-id="10648" scope="row"><span data-dcnode-id="10649" instrument_node="">Sweat</span></th><td data-dcnode-id="10646"><span data-dcnode-id="10647" instrument_node="">Multi-device characterized by three fringing field sensors</span></td><td data-dcnode-id="10644"><span data-dcnode-id="10645" instrument_node="">Glucose (role in diabetes management)</span></td><td data-dcnode-id="10641"><a class="workspace-trigger" data-dcnode-id="10642" href="#bb0170" name="bbb0170"><span data-dcnode-id="10643" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10630"><th data-dcnode-id="10638" scope="row"><span data-dcnode-id="10639" instrument_node="">Sweat</span></th><td data-dcnode-id="10636"><span data-dcnode-id="10637" instrument_node="">Device based on an amperometric biosensor characterized by a graphite electrode with embedded alcohol oxidase, horseradish peroxidase and ferrocene. It is connected to a miniaturized potentiostat and a microprocessor</span></td><td data-dcnode-id="10634"><span data-dcnode-id="10635" instrument_node="">Ethanol</span></td><td data-dcnode-id="10631"><a class="workspace-trigger" data-dcnode-id="10632" href="#bb0170" name="bbb0170"><span data-dcnode-id="10633" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10620"><th data-dcnode-id="10628" scope="row"><span data-dcnode-id="10629" instrument_node="">Sweat</span></th><td data-dcnode-id="10626"><span data-dcnode-id="10627" instrument_node="">Electro generated chemiluminescence (ECL) biosensor using a luminol hydrogen peroxide sensitive compound, lactate dehydrogenase and pyruvate oxidase (as catalyst), adsorbed onto a carbon nanotubes layer.</span></td><td data-dcnode-id="10624"><span data-dcnode-id="10625" instrument_node="">Lactate (indicates the switch from aerobic to anaerobic metabolic conditions in sports science applications)</span></td><td data-dcnode-id="10621"><a class="workspace-trigger" data-dcnode-id="10622" href="#bb0170" name="bbb0170"><span data-dcnode-id="10623" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10610"><th data-dcnode-id="10618" scope="row"><span data-dcnode-id="10619" instrument_node="">Sweat</span></th><td data-dcnode-id="10616"><span data-dcnode-id="10617" instrument_node="">Textile-based fluid handling system made of a moisture wicking material (mixture of polyester (92%) and lycra (8%)),and an optical pH sensor based on bromocresol purple with the optical detection system</span></td><td data-dcnode-id="10614"><span data-dcnode-id="10615" instrument_node="">pH</span></td><td data-dcnode-id="10611"><a class="workspace-trigger" data-dcnode-id="10612" href="#bb0170" name="bbb0170"><span data-dcnode-id="10613" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10598"><th data-dcnode-id="10608" scope="row"><span data-dcnode-id="10609" instrument_node="">Sweat</span></th><td data-dcnode-id="10606"><span data-dcnode-id="10607" instrument_node="">Potentiometric sensors</span></td><td data-dcnode-id="10602"><span data-dcnode-id="10605" instrument_node="">Ammonium, pH and Na</span><span data-dcnode-id="10604" instrument_node="">&nbsp;</span><span data-dcnode-id="10603" instrument_node="">+</span></td><td data-dcnode-id="10599"><a class="workspace-trigger" data-dcnode-id="10600" href="#bb0170" name="bbb0170"><span data-dcnode-id="10601" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10588"><th data-dcnode-id="10596" scope="row"><span data-dcnode-id="10597" instrument_node="">Sweat</span></th><td data-dcnode-id="10594"><span data-dcnode-id="10595" instrument_node="">Amperometric sensor</span></td><td data-dcnode-id="10592"><span data-dcnode-id="10593" instrument_node="">Lactate</span></td><td data-dcnode-id="10589"><a class="workspace-trigger" data-dcnode-id="10590" href="#bb0170" name="bbb0170"><span data-dcnode-id="10591" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10578"><th data-dcnode-id="10586" scope="row"><span data-dcnode-id="10587" instrument_node="">Sweat</span></th><td data-dcnode-id="10584"><span data-dcnode-id="10585" instrument_node="">Fully integrated mechanically flexible sensor array for multiplexed in situ perspiration analysis</span></td><td data-dcnode-id="10582"><span data-dcnode-id="10583" instrument_node="">Sweat metabolites (such as glucose and lactate) and electrolytes (such as sodium and potassium ions), as well as the skin temperature (to calibrate the response of the sensors)</span></td><td data-dcnode-id="10579"><a class="workspace-trigger" data-dcnode-id="10580" href="#bb0180" name="bbb0180"><span data-dcnode-id="10581" instrument_node="">[36]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10568"><th data-dcnode-id="10576" scope="row"><span data-dcnode-id="10577" instrument_node="">Sweat</span></th><td data-dcnode-id="10574"><span data-dcnode-id="10575" instrument_node="">Wearable electrochemical sensor e.g. temporary tattoo-based printable stripping-voltametric sensor</span></td><td data-dcnode-id="10572"><span data-dcnode-id="10573" instrument_node="">Trace metals like zinc</span></td><td data-dcnode-id="10569"><a class="workspace-trigger" data-dcnode-id="10570" href="#bb0220" name="bbb0220"><span data-dcnode-id="10571" instrument_node="">[44]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10550"><th data-dcnode-id="10566" scope="row"><span data-dcnode-id="10567" instrument_node="">Sweat</span></th><td data-dcnode-id="10564"><span data-dcnode-id="10565" instrument_node="">Microfluidic models.</span></td><td data-dcnode-id="10554"><span data-dcnode-id="10563" instrument_node="">Ions (Na</span><span data-dcnode-id="10562" instrument_node="">&nbsp;</span><span data-dcnode-id="10561" instrument_node="">+, Cl</span><span data-dcnode-id="10560" instrument_node="">&nbsp;</span><span data-dcnode-id="10559" instrument_node="">−, K</span><span data-dcnode-id="10558" instrument_node="">&nbsp;</span><span data-dcnode-id="10557" instrument_node="">+, NH4</span><span data-dcnode-id="10556" instrument_node="">&nbsp;</span><span data-dcnode-id="10555" instrument_node="">+), small molecules (ethanol, cortisol, urea, and lactate), and peptides(neuropeptides and cytokines)</span></td><td data-dcnode-id="10551"><a class="workspace-trigger" data-dcnode-id="10552" href="#bb0185" name="bbb0185"><span data-dcnode-id="10553" instrument_node="">[37]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10540"><th data-dcnode-id="10548" scope="row"><span data-dcnode-id="10549" instrument_node="">Sweat</span></th><td data-dcnode-id="10546"><span data-dcnode-id="10547" instrument_node="">Standard laboratory procedures for calcium detection or calcium level tests for cows like a Water hardness test kit or a suitable test strip. Other tests like titrimetric, ion selective electrodes and photometric determination methods can be used as well.</span></td><td data-dcnode-id="10544"><span data-dcnode-id="10545" instrument_node="">Calcium</span></td><td data-dcnode-id="10541"><a class="workspace-trigger" data-dcnode-id="10542" href="#bb0190" name="bbb0190"><span data-dcnode-id="10543" instrument_node="">[38]</span></a></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="10490" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10530" id="st0065"><span data-dcnode-id="10533" instrument_node="">2.3</span><span data-dcnode-id="10532" instrument_node="">. </span><span data-dcnode-id="10531" instrument_node="">Detecting subclinical ketosis using microfluidic biosensors</span></h3><p data-dcnode-id="10522" id="p0135"><span data-dcnode-id="10529" instrument_node="">Regular monitoring of clinically important β-hydroxybutyrate BHBA to provide early diagnosis of Subclinical Ketosis (SCK) is essential for management of dairy cattle health. Early detection of SCK helps reduce the risk of the disease progressing into a clinical stage. Previously the literature focused on the diagnosis of diabetic ketoacidosis, specifically in humans. This method is inaccurate because it fails to account for the multiple blood groupings in cows. Although both cows and humans are mammals, they have considerably differences in their basic physiology. There are 11 major blood group systems in a cow, whereas there are only four blood group systems in humans. Due to variation in the blood group system, there is a contrast in the antigen expressions in cows and humans which makes it unsuitable to use human ketosis detectors in cows for the determination of β-HBA. Therefore, the reliable measurement of β-HBA in animal samples is possible only through highly specific and sensitive sensors which have been built based on microfluidic systems </span><a class="workspace-trigger" data-dcnode-id="10527" href="#bb0225" name="bbb0225"><span data-dcnode-id="10528" instrument_node="">[45]</span></a><span data-dcnode-id="10526" instrument_node="">. The early and efficient detection of SCK can be achieved by using these robust and movable devices. This will not only help in the prevention and control of ketosis, but significantly contribute to the health management of dairy animals </span><a class="workspace-trigger" data-dcnode-id="10524" href="#bb0230" name="bbb0230"><span data-dcnode-id="10525" instrument_node="">[46]</span></a><span data-dcnode-id="10523" instrument_node="">.</span></p><p data-dcnode-id="10491" id="p0140"><span data-dcnode-id="10521" instrument_node="">Microfluidic technology is an effective way for on-farm detection of this disease. Recent prototypes seem promising, and are cost effective as compared to the conventional laboratory methods like chemistry analyzers and microplate readers. In one study, real-time determination of βHBA was set as a prime indicator in the diagnosis of ketosis, and the miniaturized biosensor was characterized by high sensitivity and specificity towards β-HBA, with a detection limit of 0.05</span><span data-dcnode-id="10520" instrument_node="">&nbsp;</span><span data-dcnode-id="10519" instrument_node="">mM. The developed biosensor used the spectroscopic principle of the absorbance of UV in 445–455</span><span data-dcnode-id="10518" instrument_node="">&nbsp;</span><span data-dcnode-id="10513"><span data-dcnode-id="10517" instrument_node="">nm range. The βHBA concentration in samples is depicted by the intensity of light signals transmitted by the Si </span><a class="topic-link" data-dcnode-id="10515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/photodiode" title="Learn more about photodiode from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10516" instrument_node="">photodiode</span></a><span data-dcnode-id="10514" instrument_node="">. Detailed analysis of the light absorption was performed by a custom-built optical biosensor </span></span><a class="workspace-trigger" data-dcnode-id="10511" href="#bb0230" name="bbb0230"><span data-dcnode-id="10512" instrument_node="">[46]</span></a><span data-dcnode-id="10510" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10508" href="#bb0235" name="bbb0235"><span data-dcnode-id="10509" instrument_node="">[47]</span></a><span data-dcnode-id="10499"><span data-dcnode-id="10507" instrument_node="">. Veerapandian et al. described an electrochemical </span><a class="topic-link" data-dcnode-id="10505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biosensor-platform" title="Learn more about biosensor platform from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10506" instrument_node="">biosensor platform</span></a><span data-dcnode-id="10500"><span data-dcnode-id="10504" instrument_node=""> that can selectively detect β-hydroxybutyrate by immobilizing the enzyme 3-hydroxybutyrate </span><a class="topic-link" data-dcnode-id="10502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/dehydrogenases" title="Learn more about dehydrogenase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10503" instrument_node="">dehydrogenase</span></a><span data-dcnode-id="10501" instrument_node="">. Xuan Weng et al. also developed a rapid, low-cost microfluidic biosensor with high sensitivity and specificity. The microfluidic biosensor showed a response time of 1</span></span></span><span data-dcnode-id="10498" instrument_node="">&nbsp;</span><span data-dcnode-id="10497" instrument_node="">min and a detection limit of 0.05</span><span data-dcnode-id="10496" instrument_node="">&nbsp;</span><span data-dcnode-id="10495" instrument_node="">mM concentration </span><a class="workspace-trigger" data-dcnode-id="10493" href="#bb0235" name="bbb0235"><span data-dcnode-id="10494" instrument_node="">[47]</span></a><span data-dcnode-id="10492" instrument_node="">.</span></p></section><section data-dcnode-id="10221" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10486" id="st0070"><span data-dcnode-id="10489" instrument_node="">2.4</span><span data-dcnode-id="10488" instrument_node="">. </span><span data-dcnode-id="10487" instrument_node="">Farm monitoring</span></h3><p data-dcnode-id="10474" id="p0145"><span data-dcnode-id="10481"><span data-dcnode-id="10485" instrument_node="">Traditional farm monitoring, such as using written notes or a simple device without data sharing capabilities, is an inaccurate method with high probability of human error. Previously, the use of </span><a class="topic-link" data-dcnode-id="10483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/global-positioning-system" title="Learn more about Global Positioning Systems from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10484" instrument_node="">Global Positioning Systems</span></a><span data-dcnode-id="10482" instrument_node=""> was proposed, but it required detailed field maps and was costly due to the involvement of transmission of data from satellites. Voice entry systems also has its drawbacks because of noisy backgrounds in farms and fields. A recognition method for farming operations using Radio-frequency identification (RFID) has also been proposed. RFID tags attached to farm animals can record simple farming tasks. RFID tags can also be attached to or embedded in animal bodies, tracking such health control factors as fattening management, milking management, and behavior </span></span><a class="workspace-trigger" data-dcnode-id="10479" href="#bb0120" name="bbb0120"><span data-dcnode-id="10480" instrument_node="">[24]</span></a><span data-dcnode-id="10478" instrument_node="">. Tagging animals has now become a trend, as millions of fish, bees and even racing pigeons have been tagged to keep tabs on their locations </span><a class="workspace-trigger" data-dcnode-id="10476" href="#bb0010" name="bbb0010"><span data-dcnode-id="10477" instrument_node="">[2]</span></a><span data-dcnode-id="10475" instrument_node="">.</span></p><p data-dcnode-id="10458" id="p0150"><span data-dcnode-id="10469"><span data-dcnode-id="10473" instrument_node="">RFID tagging, which is being employed in different </span><a class="topic-link" data-dcnode-id="10471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/diagnostic-device" title="Learn more about diagnostic devices from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10472" instrument_node="">diagnostic devices</span></a><span data-dcnode-id="10470" instrument_node=""> including implants and collars, has recently merited attention in the international animal market. There has, however, been a legal concern related to the manufacture and sale of these advanced products, since some dog training collars have been used to deliver electric shocks to dogs </span></span><a class="workspace-trigger" data-dcnode-id="10467" href="#bb0130" name="bbb0130"><span data-dcnode-id="10468" instrument_node="">[26]</span></a><span data-dcnode-id="10462"><span data-dcnode-id="10466" instrument_node="">. RFID-based systems require fixed, coordinated </span><a class="topic-link" data-dcnode-id="10464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/top
