ics/engineering/pressure-probe" title="Learn more about pressure sensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10465" instrument_node="">pressure sensors</span></a><span data-dcnode-id="10463" instrument_node="">. Banhazi and Black </span></span><a class="workspace-trigger" data-dcnode-id="10460" href="#bb0150" name="bbb0150"><span data-dcnode-id="10461" instrument_node="">[30]</span></a><span data-dcnode-id="10459" instrument_node=""> have discussed the need to integrate data measurement and acquisition systems, as well as protocols to identify inefficiencies and automated decision making.</span></p><div data-dcnode-id="10350"><p data-dcnode-id="10437" id="p0155"><span data-dcnode-id="10457" instrument_node="">The principles of Total Quality Management (TQM) and Hazard Analysis Critical Control Point (HACCP) form the basis of Precision Livestock Farming </span><a class="workspace-trigger" data-dcnode-id="10455" href="#bb0150" name="bbb0150"><span data-dcnode-id="10456" instrument_node="">[30]</span></a><span data-dcnode-id="10454" instrument_node="">. Precision Livestock Farming (PLF) has revolutionized the livestock industry and contributed towards animal welfare. It is a system which comes with many benefits and ensures maximum use of all resources, thus controlling the health status of animals. PLF helps bring maximum productivity, even in a varying environment, through the sensible use of feed and water for animals (</span><a class="workspace-trigger" data-dcnode-id="10452" href="#t0010" name="bt0010"><span data-dcnode-id="10453" instrument_node="">Table 2</span></a><span data-dcnode-id="10447"><span data-dcnode-id="10451" instrument_node="">). It helps utilize animals for the benefit of humankind through production of high quality results. PLF makes the real-time supply chain management throughout the animal industry possible. This system integrates electronic technology in farming and ensures that the information obtained through measurements is used in a way benefitting farmers. PLF has helped reduce </span><a class="topic-link" data-dcnode-id="10449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/greenhouse-gas-emission" title="Learn more about greenhouse gas emission from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10450" instrument_node="">greenhouse gas emission</span></a><span data-dcnode-id="10448" instrument_node="">, enabled better marketing of livestock products, and enhanced the economic development of rural areas. Reliable statistics from farms and optimization of the livestock feed, depending on the feedback of different farms, can lead to more successful farms and help make smart business decisions </span></span><a class="workspace-trigger" data-dcnode-id="10445" href="#bb0240" name="bbb0240"><span data-dcnode-id="10446" instrument_node="">[48]</span></a><span data-dcnode-id="10444" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10442" href="#bb0245" name="bbb0245"><span data-dcnode-id="10443" instrument_node="">[49]</span></a><span data-dcnode-id="10441" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10439" href="#bb0250" name="bbb0250"><span data-dcnode-id="10440" instrument_node="">[50]</span></a><span data-dcnode-id="10438" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="10351" id="t0010"><span class="captions" data-dcnode-id="10430"><span data-dcnode-id="10431" id="ca0035"><p data-dcnode-id="10432" id="sp0035"><span class="label" data-dcnode-id="10435"><span data-dcnode-id="10436" instrument_node="">Table 2</span></span><span data-dcnode-id="10434" instrument_node="">. </span><span data-dcnode-id="10433" instrument_node="">Recent developments in PLF systems.</span></p></span></span><div class="groups" data-dcnode-id="10352"><table class="rowsep-1 colsep-1" data-dcnode-id="10353"><thead data-dcnode-id="10424"><tr class="valign-top rowsep-1" data-dcnode-id="10425"><th data-dcnode-id="10428" scope="col"><span data-dcnode-id="10429" instrument_node="">PLF technologies over the years</span></th><th data-dcnode-id="10426" scope="col"><span data-dcnode-id="10427" instrument_node="">References</span></th></tr></thead><tbody data-dcnode-id="10354"><tr class="valign-top" data-dcnode-id="10418"><th data-dcnode-id="10422" scope="row"><span data-dcnode-id="10423" instrument_node="">Weight estimation of pigs via vision tools</span></th><td data-dcnode-id="10419"><a class="workspace-trigger" data-dcnode-id="10420" href="#bb0045" name="bbb0045"><span data-dcnode-id="10421" instrument_node="">[9]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10406"><th data-dcnode-id="10416" scope="row"><span data-dcnode-id="10417" instrument_node="">Cattle monitoring system and tracking dairy cow behavior</span></th><td data-dcnode-id="10407"><a class="workspace-trigger" data-dcnode-id="10414" href="#bb0480" name="bbb0480"><span data-dcnode-id="10415" instrument_node="">[96]</span></a><span data-dcnode-id="10413" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10411" href="#bb0330" name="bbb0330"><span data-dcnode-id="10412" instrument_node="">[66]</span></a><span data-dcnode-id="10410" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10408" href="#bb0320" name="bbb0320"><span data-dcnode-id="10409" instrument_node="">[64]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10397"><th data-dcnode-id="10404" scope="row"><span data-dcnode-id="10405" instrument_node="">Cough analysis in animals using audio and video data for identification of respiratory infections</span></th><td data-dcnode-id="10398"><a class="workspace-trigger" data-dcnode-id="10402" href="#bb0055" name="bbb0055"><span data-dcnode-id="10403" instrument_node="">[11]</span></a><span data-dcnode-id="10401" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10399" href="#bb0060" name="bbb0060"><span data-dcnode-id="10400" instrument_node="">[12]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10391"><th data-dcnode-id="10395" scope="row"><span data-dcnode-id="10396" instrument_node="">Sound analysis in cows</span></th><td data-dcnode-id="10392"><a class="workspace-trigger" data-dcnode-id="10393" href="#bb0070" name="bbb0070"><span data-dcnode-id="10394" instrument_node="">[14]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10385"><th data-dcnode-id="10389" scope="row"><span data-dcnode-id="10390" instrument_node="">Detection of pig screams</span></th><td data-dcnode-id="10386"><a class="workspace-trigger" data-dcnode-id="10387" href="#bb0455" name="bbb0455"><span data-dcnode-id="10388" instrument_node="">[91]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10379"><th data-dcnode-id="10383" scope="row"><span data-dcnode-id="10384" instrument_node="">Stress detection in laying hens</span></th><td data-dcnode-id="10380"><a class="workspace-trigger" data-dcnode-id="10381" href="#bb0050" name="bbb0050"><span data-dcnode-id="10382" instrument_node="">[10]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10373"><th data-dcnode-id="10377" scope="row"><span data-dcnode-id="10378" instrument_node="">Automatic detection of cow's oestrus in audio surveillance system</span></th><td data-dcnode-id="10374"><a class="workspace-trigger" data-dcnode-id="10375" href="#bb0450" name="bbb0450"><span data-dcnode-id="10376" instrument_node="">[90]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10367"><th data-dcnode-id="10371" scope="row"><span data-dcnode-id="10372" instrument_node="">Noise analysis to evaluate chick thermal comfort</span></th><td data-dcnode-id="10368"><a class="workspace-trigger" data-dcnode-id="10369" href="#bb0465" name="bbb0465"><span data-dcnode-id="10370" instrument_node="">[93]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10361"><th data-dcnode-id="10365" scope="row"><span data-dcnode-id="10366" instrument_node="">Sensor and instrumentation for progesterone detection</span></th><td data-dcnode-id="10362"><a class="workspace-trigger" data-dcnode-id="10363" href="#bb0305" name="bbb0305"><span data-dcnode-id="10364" instrument_node="">[61]</span></a></td></tr><tr class="valign-top" data-dcnode-id="10355"><th data-dcnode-id="10359" scope="row"><span data-dcnode-id="10360" instrument_node="">Wireless system for pregnancy detection in cows by monitoring temperature changes in body</span></th><td data-dcnode-id="10356"><a class="workspace-trigger" data-dcnode-id="10357" href="#bb0460" name="bbb0460"><span data-dcnode-id="10358" instrument_node="">[92]</span></a></td></tr></tbody></table></div></div></div><p data-dcnode-id="10339" id="p0160"><span data-dcnode-id="10349" instrument_node="">PLF works for animal welfare through a variety of devices, including automated tools that integrate audio- and video-captured data for early disease detection and warning systems (</span><a class="workspace-trigger" data-dcnode-id="10347" href="#f0015" name="bf0015"><span data-dcnode-id="10348" instrument_node="">Fig. 3</span></a><span data-dcnode-id="10346" instrument_node="">). The sound and image data is analyzed by animal experts into a database used for creating suitable algorithms </span><a class="workspace-trigger" data-dcnode-id="10344" href="#bb0255" name="bbb0255"><span data-dcnode-id="10345" instrument_node="">[51]</span></a><span data-dcnode-id="10343" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10341" href="#bb0260" name="bbb0260"><span data-dcnode-id="10342" instrument_node="">[52]</span></a><span data-dcnode-id="10340" instrument_node="">.</span></p><p data-dcnode-id="10334" id="p0165"><span data-dcnode-id="10338" instrument_node="">A technology called Flockman™ is a recent and innovative feed control system for broiler chickens. This PLF system monitors the regular feed intake of living birds and allows the farmers to alter the feeding system as needed. A system that determines the growth trajectory of the body mass of chickens and controls the feed intake is also being used. This technology has significantly reduced the mortality rate of broiler chickens. Flockman also analyzes the impact of different environmental factors in the facility, such as heat, ventilation and humidity, on the growth and health of chickens </span><a class="workspace-trigger" data-dcnode-id="10336" href="#bb0265" name="bbb0265"><span data-dcnode-id="10337" instrument_node="">[53]</span></a><span data-dcnode-id="10335" instrument_node="">.</span></p><p data-dcnode-id="10306" id="p0170"><span data-dcnode-id="10313"><span data-dcnode-id="10321"><span data-dcnode-id="10325"><span data-dcnode-id="10333" instrument_node="">Subcutaneous </span><a class="topic-link" data-dcnode-id="10331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biophotonics" title="Learn more about biophotonics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10332" instrument_node="">biophotonics</span></a><span data-dcnode-id="10326"><span data-dcnode-id="10330" instrument_node=""> sensors can help track the </span><a class="topic-link" data-dcnode-id="10328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/hemodynamic-parameter" title="Learn more about hemodynamic parameters from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10329" instrument_node="">hemodynamic parameters</span></a><span data-dcnode-id="10327" instrument_node=""> of animals. It uses </span></span></span><a class="topic-link" data-dcnode-id="10323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/photodetector" title="Learn more about photodetectors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10324" instrument_node="">photodetectors</span></a><span data-dcnode-id="10322" instrument_node=""> and surface-mount light sources, like glass capsules used for </span></span><a class="topic-link" data-dcnode-id="10319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microchip" title="Learn more about microchip from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10320" instrument_node="">microchip</span></a><span data-dcnode-id="10314"><span data-dcnode-id="10318" instrument_node=""> implants. These sensors use reflectance-based </span><a class="topic-link" data-dcnode-id="10316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/pulse-oximetry" title="Learn more about pulse oximetry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10317" instrument_node="">pulse oximetry</span></a><span data-dcnode-id="10315" instrument_node=""> measurements to track cows' pulses </span></span></span><a class="workspace-trigger" data-dcnode-id="10311" href="#bb0270" name="bbb0270"><span data-dcnode-id="10312" instrument_node="">[54]</span></a><span data-dcnode-id="10310" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10308" href="#bb0275" name="bbb0275"><span data-dcnode-id="10309" instrument_node="">[55]</span></a><span data-dcnode-id="10307" instrument_node="">.</span></p><p data-dcnode-id="10295" id="p0175"><span data-dcnode-id="10305" instrument_node="">In contrast to previous approaches, PLF systems allow real-time monitoring of animals so immediate action can be taken by farmers in support of animal health and better product yield. A recently developed system called the eYeNamic system automatically monitors the behavior of housed chickens. The spatial distribution of birds allows the calculation of zone occupation index and zone activity index of the broilers with the help of top-view cameras. PLF technology clearly has great potential as a livestock management tool for farmers </span><a class="workspace-trigger" data-dcnode-id="10303" href="#bb0030" name="bbb0030"><span data-dcnode-id="10304" instrument_node="">[6]</span></a><span data-dcnode-id="10302" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10300" href="#bb0145" name="bbb0145"><span data-dcnode-id="10301" instrument_node="">[29]</span></a><span data-dcnode-id="10299" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10297" href="#bb0280" name="bbb0280"><span data-dcnode-id="10298" instrument_node="">[56]</span></a><span data-dcnode-id="10296" instrument_node="">.</span></p><p data-dcnode-id="10273" id="p0180"><span data-dcnode-id="10286"><span data-dcnode-id="10290"><span data-dcnode-id="10294" instrument_node="">Sensor systems for measuring fat and protein content in milk are used frequently on farms nowadays. The sensor system used differs according to the milking systems used on each farm. These sensors provide health and fertility data of cattle. Reproductive performance in dairy herds can be analyzed through estrus detection. Sensor systems have been reported to detect roughly 80–85% of cows in estrus. It is not fully determined whether the use of sensor systems also benefits health and production of cows. In older studies, it has been proved that higher estrus detection resulted in a shorter calving interval, consequently leading to increased milk production. High </span><a class="topic-link" data-dcnode-id="10292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/somatic-cell" title="Learn more about somatic cell from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10293" instrument_node="">somatic cell</span></a><span data-dcnode-id="10291" instrument_node=""> count has been linked with lower milk production. Usage of automatic milking systems has proved to increase milk production. Different statistical analyses can be used to see the role of sensors for mastitis and estrus detection for dairy cows. Fat, protein, temperature and milk </span></span><a class="topic-link" data-dcnode-id="10288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/thermal-sensor" title="Learn more about temperature sensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10289" instrument_node="">temperature sensors</span></a><span data-dcnode-id="10287" instrument_node=""> can also be used </span></span><a class="workspace-trigger" data-dcnode-id="10284" href="#bb0285" name="bbb0285"><span data-dcnode-id="10285" instrument_node="">[57]</span></a><span data-dcnode-id="10283" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10281" href="#bb0290" name="bbb0290"><span data-dcnode-id="10282" instrument_node="">[58]</span></a><span data-dcnode-id="10280" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10278" href="#bb0295" name="bbb0295"><span data-dcnode-id="10279" instrument_node="">[59]</span></a><span data-dcnode-id="10277" instrument_node=""> to enhance the animal production systems. Studies have suggested that dogs can be trained, through positive reinforcement and an optimized training protocol, to sense the differentiation of vaginal mucus samples from cows which are in estrus and samples from cows in diestrus </span><a class="workspace-trigger" data-dcnode-id="10275" href="#bb0300" name="bbb0300"><span data-dcnode-id="10276" instrument_node="">[60]</span></a><span data-dcnode-id="10274" instrument_node="">.</span></p><p data-dcnode-id="10222" id="p0185"><span data-dcnode-id="10248"><span data-dcnode-id="10252"><span data-dcnode-id="10264"><span data-dcnode-id="10272" instrument_node="">Better reproduction rates in cattle can be obtained if hormone levels are measured efficiently. Using Electrochemical Impedance Spectroscopy (EIS) techniques, which can detect </span><a class="topic-link" data-dcnode-id="10270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/progesterone" title="Learn more about progesterone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10271" instrument_node="">progesterone</span></a><span data-dcnode-id="10265"><span data-dcnode-id="10269" instrument_node=""> in purified water, is one solution. Planar capacitive sensors use </span><a class="topic-link" data-dcnode-id="10267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/silicon-substrate" title="Learn more about silicon substrate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10268" instrument_node="">silicon substrate</span></a><span data-dcnode-id="10266" instrument_node="">, thin-film microelectromechanical-based </span></span></span><a class="topic-link" data-dcnode-id="10262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/semiconductor-device-fabrication" title="Learn more about semiconductor device fabrication from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10263" instrument_node="">semiconductor device fabrication</span></a><span data-dcnode-id="10253"><span data-dcnode-id="10261" instrument_node=""> technology. This sensor can evaluate </span><a class="topic-link" data-dcnode-id="10259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/conductivity" title="Learn more about conductivity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10260" instrument_node="">conductivity</span></a><span data-dcnode-id="10254"><span data-dcnode-id="10258" instrument_node="">, permeability and </span><a class="topic-link" data-dcnode-id="10256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/dielectric-property" title="Learn more about dielectric properties from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10257" instrument_node="">dielectric properties</span></a><span data-dcnode-id="10255" instrument_node=""> of the </span></span></span></span><a class="topic-link" data-dcnode-id="10250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/reproductive-hormone" title="Learn more about reproductive hormone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10251" instrument_node="">reproductive hormone</span></a><span data-dcnode-id="10249" instrument_node=""> progesterone and its concentration quantification in purified water </span></span><a class="workspace-trigger" data-dcnode-id="10246" href="#bb0305" name="bbb0305"><span data-dcnode-id="10247" instrument_node="">[61]</span></a><span data-dcnode-id="10241"><span data-dcnode-id="10245" instrument_node="">. Integrating wireless sensors for online </span><a class="topic-link" data-dcnode-id="10243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/health-monitoring-system" title="Learn more about health monitoring systems from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10244" instrument_node="">health monitoring systems</span></a><span data-dcnode-id="10242" instrument_node=""> has been designed and been investigated as monitoring systems </span></span><a class="workspace-trigger" data-dcnode-id="10239" href="#bb0310" name="bbb0310"><span data-dcnode-id="10240" instrument_node="">[62]</span></a><span data-dcnode-id="10238" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10236" href="#bb0315" name="bbb0315"><span data-dcnode-id="10237" instrument_node="">[63]</span></a><span data-dcnode-id="10235" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10233" href="#bb0320" name="bbb0320"><span data-dcnode-id="10234" instrument_node="">[64]</span></a><span data-dcnode-id="10232" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10230" href="#bb0325" name="bbb0325"><span data-dcnode-id="10231" instrument_node="">[65]</span></a><span data-dcnode-id="10229" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10227" href="#bb0330" name="bbb0330"><span data-dcnode-id="10228" instrument_node="">[66]</span></a><span data-dcnode-id="10226" instrument_node="">. Proportional Integral Derivative (PID) control technique has also been applied to reduce labor and yield higher profits in poultry feeding management </span><a class="workspace-trigger" data-dcnode-id="10224" href="#bb0335" name="bbb0335"><span data-dcnode-id="10225" instrument_node="">[67]</span></a><span data-dcnode-id="10223" instrument_node="">.</span></p></section><section data-dcnode-id="9875" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10217" id="st0075"><span data-dcnode-id="10220" instrument_node="">2.5</span><span data-dcnode-id="10219" instrument_node="">. </span><span data-dcnode-id="10218" instrument_node="">Pathogen detection</span></h3><section data-dcnode-id="10121" id="s0070"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10213" id="st0080"><span data-dcnode-id="10216" instrument_node="">2.5.1</span><span data-dcnode-id="10215" instrument_node="">. </span><span data-dcnode-id="10214" instrument_node="">Detecting influenza virus using FRET</span></h4><p data-dcnode-id="10208" id="p0190"><span data-dcnode-id="10212" instrument_node="">Influenza virus is a highly contagious disease among birds. It can spread through saliva, nasal secretions and other excretions from infected birds </span><a class="workspace-trigger" data-dcnode-id="10210" href="#bb0345" name="bbb0345"><span data-dcnode-id="10211" instrument_node="">[69]</span></a><span data-dcnode-id="10209" instrument_node="">.</span></p><p data-dcnode-id="10152" id="p0195"><span data-dcnode-id="10195"><span data-dcnode-id="10203"><span data-dcnode-id="10207" instrument_node="">A homogenized and uniform fluorescence-quenching-based assay has recently been developed which specifically detects influenza virus surface antigen </span><a class="topic-link" data-dcnode-id="10205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/hemagglutinin" title="Learn more about hemagglutinins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10206" instrument_node="">hemagglutinins</span></a><span data-dcnode-id="10204" instrument_node=""> (HAs). This assay will revolutionize the process of detecting viruses, and can be a sensitive diagnostic tool for influenza virus discrimination. The assay consists of two nanoprobes: the glycan-conjugated highly </span></span><a class="topic-link" data-dcnode-id="10201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/luminiscence-type" title="Learn more about luminescent from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10202" instrument_node="">luminescent</span></a><span data-dcnode-id="10196"><span data-dcnode-id="10200" instrument_node=""> quantum dots (Gly-QDs), and the HA-specific antibody-modified gold nanoparticle (Ab-Au NPs). These nanoprobes are brought together when exposed to strain-specific HA. This happens due to a very specific binding event between the HA and the two nanoprobes, which forms a sandwich complex. QDs </span><a class="topic-link" data-dcnode-id="10198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/fluorescence-intensity" title="Learn more about fluorescence intensity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10199" instrument_node="">fluorescence intensity</span></a><span data-dcnode-id="10197" instrument_node=""> is hence diminished, as a non-radiative energy transfer occurs from QDs to Au NPs </span></span></span><a class="workspace-trigger" data-dcnode-id="10193" href="#bb0350" name="bbb0350"><span data-dcnode-id="10194" instrument_node="">[70]</span></a><span data-dcnode-id="10180"><span data-dcnode-id="10188"><span data-dcnode-id="10192" instrument_node="">. The fluorescence changes, and a resulting correlation between the targets HA concentrations are easily observed. Moreover, HAs origin can be detected easily and, due to the specific interaction between HA and </span><a class="topic-link" data-dcnode-id="10190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/polysaccharides" title="Learn more about glycan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10191" instrument_node="">glycan</span></a><span data-dcnode-id="10189" instrument_node=""> with </span></span><a class="topic-link" data-dcnode-id="10186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/sialic-acid" title="Learn more about sialic acid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10187" instrument_node="">sialic acid</span></a><span data-dcnode-id="10181"><span data-dcnode-id="10185" instrument_node=""> residues, we can distinguish between the human (H1) and avian (H5) viral subtypes. Normally, the influenza virus is detected by the so-called “gold standard” viral culture and RT-PCR, which is time- and labor-intensive. The </span><a class="topic-link" data-dcnode-id="10183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/immunoassay" title="Learn more about immunoassays from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10184" instrument_node="">immunoassays</span></a><span data-dcnode-id="10182" instrument_node=""> like ELISA are less specific and less sensitive, which makes them inconvenient to use for this purpose. However, fluorescence resonance energy transfer (FRET) is sensitive enough to detect small changes in interaction between the biomolecules. It is a very powerful method in which non-radiative energy is transferred from an excited donor to an acceptor at ground state (quencher) placed almost 1 to 10</span></span></span><span data-dcnode-id="10179" instrument_node="">&nbsp;</span><span data-dcnode-id="10178" instrument_node="">nm away </span><a class="workspace-trigger" data-dcnode-id="10176" href="#bb0350" name="bbb0350"><span data-dcnode-id="10177" instrument_node="">[70]</span></a><span data-dcnode-id="10159"><span data-dcnode-id="10163"><span data-dcnode-id="10167"><span data-dcnode-id="10175" instrument_node="">. Illegal feed additives can also be detected using </span><a class="topic-link" data-dcnode-id="10173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/fluorescence-quenching" title="Learn more about fluorescence quenching from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10174" instrument_node="">fluorescence quenching</span></a><span data-dcnode-id="10168"><span data-dcnode-id="10172" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="10170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/immunochromatography" title="Learn more about immunochromatography from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10171" instrument_node="">immunochromatography</span></a><span data-dcnode-id="10169" instrument_node="">; e.g., determination of </span></span></span><a class="topic-link" data-dcnode-id="10165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/ractopamine" title="Learn more about ractopamine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10166" instrument_node="">ractopamine</span></a><span data-dcnode-id="10164" instrument_node=""> and </span></span><a class="topic-link" data-dcnode-id="10161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/clenbuterol" title="Learn more about clenbuterol from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10162" instrument_node="">clenbuterol</span></a><span data-dcnode-id="10160" instrument_node=""> in porcine muscle and swine urine </span></span><a class="workspace-trigger" data-dcnode-id="10157" href="#bb0355" name="bbb0355"><span data-dcnode-id="10158" instrument_node="">[71]</span></a><span data-dcnode-id="10156" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10154" href="#bb0360" name="bbb0360"><span data-dcnode-id="10155" instrument_node="">[72]</span></a><span data-dcnode-id="10153" instrument_node="">.</span></p><p data-dcnode-id="10131" id="p0200"><span data-dcnode-id="10147"><span data-dcnode-id="10151" instrument_node="">Direct contact with infected poultry can infect healthy birds with avian influenza virus. Even sharing water and feed can result in contamination. The disease manifests itself in two forms, with low and high extremes of virulence. The low pathogenic form is less virulent and shows mild symptoms, like lesser egg production. The highly pathogenic form manifests itself by rapidly spreading through flocks and affecting multiple internal organs. A system called Sensor Networks assists in collecting data from a desired location and transmitting it to a computer. Sensor Networks contains different sensors which perform extraordinary signal, alarm, and decision-making functions. This sensor system uses open source technology—Arduino—an electronics prototype that provides parameters like body temperature and movement of the animals. The alarm is sent to an observing station, which is used to monitor whether the observed value is lesser or greater than the normal value. The detection of avian influenza is thus assisted by monitoring the level of H5H1 virus, which causes mortality in chickens. The use of easily implementable ZIGBEE wireless protocols also helps in constant monitoring. </span><a class="topic-link" data-dcnode-id="10149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/wireless-sensor-network" title="Learn more about Wireless Sensor Networks from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10150" instrument_node="">Wireless Sensor Networks</span></a><span data-dcnode-id="10148" instrument_node=""> can be enhanced through antennas and amplifications for long-distance applications. The ADXL320 accelerometer detects chicken motion, feeds it to Arduino, and records the readings </span></span><a class="workspace-trigger" data-dcnode-id="10145" href="#bb0040" name="bbb0040"><span data-dcnode-id="10146" instrument_node="">[8]</span></a><span data-dcnode-id="10144" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10142" href="#bb0340" name="bbb0340"><span data-dcnode-id="10143" instrument_node="">[68]</span></a><span data-dcnode-id="10141" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10139" href="#bb0365" name="bbb0365"><span data-dcnode-id="10140" instrument_node="">[73]</span></a><span data-dcnode-id="10138" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10136" href="#bb0370" name="bbb0370"><span data-dcnode-id="10137" instrument_node="">[74]</span></a><span data-dcnode-id="10135" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10133" href="#bb0375" name="bbb0375"><span data-dcnode-id="10134" instrument_node="">[75]</span></a><span data-dcnode-id="10132" instrument_node="">.</span></p><p data-dcnode-id="10122" id="p0205"><span data-dcnode-id="10126"><span data-dcnode-id="10130" instrument_node="">Other viruses linked to reproductive or respiratory diseases, such as Porcine Reproductive and Respiratory Syndrome Virus (PRRSV), can also be detected using biosensor-based Imaging </span><a class="topic-link" data-dcnode-id="10128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/ellipsometry" title="Learn more about Ellipsometry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10129" instrument_node="">Ellipsometry</span></a><span data-dcnode-id="10127" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="10124" href="#bb0380" name="bbb0380"><span data-dcnode-id="10125" instrument_node="">[76]</span></a><span data-dcnode-id="10123" instrument_node="">.</span></p></section><section data-dcnode-id="10023" id="s0075"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10117" id="st0085"><span data-dcnode-id="10120" instrument_node="">2.5.2</span><span data-dcnode-id="10119" instrument_node="">. </span><span data-dcnode-id="10118" instrument_node="">Detection of bacteria using SERS</span></h4><p data-dcnode-id="10066" id="p0210"><span data-dcnode-id="10116" instrument_node="">SERS, a label-free biosensing method for bacterial detection, provides information about the chemical structures of analytes. SERS uses the intrinsic vibrational fingerprint of analytes to detect molecules. Moreover, the performance of Raman spectroscopy remains unaffected by the surrounding water, allowing easy bacteria detection </span><a class="workspace-trigger" data-dcnode-id="10114" href="#bb0105" name="bbb0105"><span data-dcnode-id="10115" instrument_node="">[21]</span></a><span data-dcnode-id="10105"><span data-dcnode-id="10109"><span data-dcnode-id="10113" instrument_node="">. Raman spectroscopy has found its application in even the label-free modes in the analysis of chemical and biological components. The detection of disease-causing bacteria in drinking water, using the label-free near-infrared surface-enhanced Raman scattering/spectroscopy (NIR-SERS) method is a recently proposed technology, and provides a diagnostic platform. This analytical method is a rapid way for the successful label-free identification of pathogenic bacterium in health-care applications. The in situ synthesis of </span><a class="topic-link" data-dcnode-id="10111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/silver-nanoparticle" title="Learn more about silver nanoparticles from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10112" instrument_node="">silver nanoparticles</span></a><span data-dcnode-id="10110" instrument_node=""> (Ag NPs) within the </span></span><a class="topic-link" data-dcnode-id="10107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/bacterial-cell" title="Learn more about bacterial cell from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10108" instrument_node="">bacterial cell</span></a><span data-dcnode-id="10106" instrument_node=""> suspensions provides a means for the detection of foodborne bacteria. This method requires no preparatory phase and is label free. To enhance the assay's sensitivity, Triton X-100 is used to pre-treat the bacterial cells. However, probing the fingerprints of bacteria through this method becomes difficult due to poor selectivity, as it is a simple mixing process. This remarkable technology not only helps detect the pathogenic bacteria, but also enables the discrimination between different types of these bacteria, such as Methicillin-resistant, </span></span><span data-dcnode-id="10099"><em data-dcnode-id="10103"><span data-dcnode-id="10104" instrument_node="">Pseudomonas </span></em><em data-dcnode-id="10100"><a class="topic-link" data-dcnode-id="10101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/aeruginosa" title="Learn more about aeruginosa from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10102" instrument_node="">aeruginosa</span></a></em></span><span data-dcnode-id="10098" instrument_node="">, </span><em data-dcnode-id="10096"><span data-dcnode-id="10097" instrument_node="">Escherichia coli</span></em><span data-dcnode-id="10095" instrument_node="">, </span><em data-dcnode-id="10093"><span data-dcnode-id="10094" instrument_node="">Staphylococcus aureus</span></em><span data-dcnode-id="10088"><span data-dcnode-id="10092" instrument_node=""> (MRSA), and </span><a class="topic-link" data-dcnode-id="10090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/listeria" title="Learn more about Listeria from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10091" instrument_node="">Listeria</span></a><span data-dcnode-id="10089" instrument_node=""> spp. This method also helps to differentiate between two species—L. </span></span><em data-dcnode-id="10086"><span data-dcnode-id="10087" instrument_node="">monocytogenes</span></em><span data-dcnode-id="10085" instrument_node=""> and </span><em data-dcnode-id="10083"><span data-dcnode-id="10084" instrument_node="">L</span></em><span data-dcnode-id="10082" instrument_node="">. </span><em data-dcnode-id="10080"><span data-dcnode-id="10081" instrument_node="">innocua</span></em><span data-dcnode-id="10079" instrument_node="">—through the comparison of the SERS spectra and Raman frequencies. Similarly, it is also possible to discriminate between two MRSA strains from clinical isolates </span><a class="workspace-trigger" data-dcnode-id="10077" href="#bb0385" name="bbb0385"><span data-dcnode-id="10078" instrument_node="">[77]</span></a><span data-dcnode-id="10072"><span data-dcnode-id="10076" instrument_node="">. Even the most intricate details, like the molecular composition of a sample, can be revealed using this spectroscopy technique at a micrometer scale. </span><a class="topic-link" data-dcnode-id="10074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/metallic-nanoparticles" title="Learn more about Metallic nanoparticles from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10075" instrument_node="">Metallic nanoparticles</span></a><span data-dcnode-id="10073" instrument_node=""> (NPs) on the order of 104–106</span></span><span data-dcnode-id="10071" instrument_node="">&nbsp;</span><span data-dcnode-id="10070" instrument_node="">nm were used with SERS via SPR. This method makes sure there is homogenous contact of constituents of the bacterial cells to nanoparticles, and provides an intense spectrum with better selectivity </span><a class="workspace-trigger" data-dcnode-id="10068" href="#bb0385" name="bbb0385"><span data-dcnode-id="10069" instrument_node="">[77]</span></a><span data-dcnode-id="10067" instrument_node="">.</span></p><p data-dcnode-id="10033" id="p0215"><span data-dcnode-id="10061"><span data-dcnode-id="10065" instrument_node="">Another study explored a novel </span><a class="topic-link" data-dcnode-id="10063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microfluidic-platform" title="Learn more about microfluidic platform from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10064" instrument_node="">microfluidic platform</span></a><span data-dcnode-id="10062" instrument_node=""> that employs methodologies for chemo metric data analysis, including a combination of principle component analysis and linear discriminant analysis, as well as silver nanoparticles. Distinguishing eight key foodborne pathogens (</span></span><em data-dcnode-id="10059"><span data-dcnode-id="10060" instrument_node="">E</span></em><span data-dcnode-id="10058" instrument_node="">. </span><em data-dcnode-id="10056"><span data-dcnode-id="10057" instrument_node="">coli</span></em><span data-dcnode-id="10055" instrument_node="">, </span><em data-dcnode-id="10053"><span data-dcnode-id="10054" instrument_node="">L</span></em><span data-dcnode-id="10052" instrument_node="">. </span><em data-dcnode-id="10050"><span data-dcnode-id="10051" instrument_node="">monocytogenes</span></em><span data-dcnode-id="10049" instrument_node="">, </span><em data-dcnode-id="10047"><span data-dcnode-id="10048" instrument_node="">L</span></em><span data-dcnode-id="10046" instrument_node="">. </span><em data-dcnode-id="10044"><span data-dcnode-id="10045" instrument_node="">innocua</span></em><span data-dcnode-id="10043" instrument_node="">, S. typhimirium, S. enteritis, Pseudomonas aeruginosa, MRSA 35 and MRSA 86) which significantly affect the food industry has been made possible through this method. Surface-enhanced Raman spectroscopy technique has made the imaging and detection of gram-negative and gram-positive bacteria successful as well. The discrimination between two types of bacteria depends on the difference in the scattering intensity of gram positive bacteria, which is higher than that of the gram negative bacteria. Another method for bacteria detection suggests the synthesis of magnetic–plasmonic Fe</span><sub data-dcnode-id="10041"><span data-dcnode-id="10042" instrument_node="">3</span></sub><span data-dcnode-id="10040" instrument_node="">O</span><sub data-dcnode-id="10038"><span data-dcnode-id="10039" instrument_node="">4</span></sub><span data-dcnode-id="10037" instrument_node="">–Au core–shell nanoparticles to concentrate bacterial cells. This is accomplished through the application of an external point magnetic field and SERS </span><a class="workspace-trigger" data-dcnode-id="10035" href="#bb0105" name="bbb0105"><span data-dcnode-id="10036" instrument_node="">[21]</span></a><span data-dcnode-id="10034" instrument_node="">.</span></p><p data-dcnode-id="10024" id="p0220"><span data-dcnode-id="10032" instrument_node="">Biosensors can also be used to detect live bacteria in drinking water using Ag nanoparticles. This novel technology has also detected anthrax spores on </span><a class="topic-link" data-dcnode-id="10030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanospheres" title="Learn more about nanosphere from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10031" instrument_node="">nanosphere</span></a><span data-dcnode-id="10025"><span data-dcnode-id="10029" instrument_node=""> substrates. The-multi drug-resistant strains of bacteria can also be detected using complex nanohybrid systems. These systems are developed by combining antibody-conjugated gold nanoparticles with single-walled </span><a class="topic-link" data-dcnode-id="10027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/carbon-nanotube" title="Learn more about carbon nanotubes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10028" instrument_node="">carbon nanotubes</span></a><span data-dcnode-id="10026" instrument_node="">.</span></span></p></section><section data-dcnode-id="9976" id="s0080"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10019" id="st0090"><span data-dcnode-id="10022" instrument_node="">2.5.3</span><span data-dcnode-id="10021" instrument_node="">. </span><span data-dcnode-id="10020" instrument_node="">Detection of pathogens using HNPs-GO electrodes</span></h4><p data-dcnode-id="9977" id="p0225"><span data-dcnode-id="10018" instrument_node="">HNPs-GO electrodes, known for their remarkable electrochemical immune-sensing properties, are being employed to detect </span><em data-dcnode-id="10016"><span data-dcnode-id="10017" instrument_node="">Listeria monocytogenes</span></em><span data-dcnode-id="10007"><span data-dcnode-id="10011"><span data-dcnode-id="10015" instrument_node=""> (Lm), a major foodborne pathogen. Lm is a gram-positive bacterium that causes listeriosis, which is very prevalent and has a high mortality rate. This alarming situation calls for an efficient system to detect Lm in food products. </span><a class="topic-link" data-dcnode-id="10013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/nanosheet" title="Learn more about Nanosheets from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10014" instrument_node="">Nanosheets</span></a><span data-dcnode-id="10012" instrument_node=""> of graphene oxide (GO) coated with the hybrid nanoparticles of a silver–ruthenium </span></span><a class="topic-link" data-dcnode-id="10009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/bipyridine" title="Learn more about bipyridine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10010" instrument_node="">bipyridine</span></a><span data-dcnode-id="10008" instrument_node=""> complex (Ag@ [Ru (bpy) 3]2</span></span><span data-dcnode-id="10006" instrument_node="">&nbsp;</span><span data-dcnode-id="9981"><span data-dcnode-id="9997"><span data-dcnode-id="10005" instrument_node="">+) core and chitosan shell have significant immunosensing properties. The oxygenated groups of </span><a class="topic-link" data-dcnode-id="10003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/graphene-oxide" title="Learn more about GO from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10004" instrument_node="">GO</span></a><span data-dcnode-id="9998"><span data-dcnode-id="10002" instrument_node=""> and the </span><a class="topic-link" data-dcnode-id="10000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/amine" title="Learn more about amine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10001" instrument_node="">amine</span></a><span data-dcnode-id="9999" instrument_node=""> groups on the surface of the hybrid nanoparticles play a significant role in this unique application. Contamination in milk and other food products can be easily detected using </span></span></span><a class="topic-link" data-dcnode-id="9995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/monoclonal-antibody" title="Learn more about monoclonal antibodies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9996" instrument_node="">monoclonal antibodies</span></a><span data-dcnode-id="9982"><span data-dcnode-id="9994" instrument_node=""> and HNPs-GO immunosensors. Hence, intelligent and specific optimization of the bio-recognition elements on the HNPs-GO electrode has a bright future in the food processing industries. Having good fabrication, thin layering and tunable oxygen functional groups make two-dimensional graphene oxide (GO) and </span><a class="topic-link" data-dcnode-id="9992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/reduced-graphene-oxide" title="Learn more about reduced GO from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9993" instrument_node="">reduced GO</span></a><span data-dcnode-id="9983"><span data-dcnode-id="9991" instrument_node=""> (rGO) preferable. Surface treatment of the active components on GO nano sheets change the </span><a class="topic-link" data-dcnode-id="9989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/crystallite-size" title="Learn more about crystallite size from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9990" instrument_node="">crystallite size</span></a><span data-dcnode-id="9984"><span data-dcnode-id="9988" instrument_node=""> and related properties. Strategies like elemental doping and photoirradiation are applied to vary the physico-chemical functionalities of GO. Biosensing applications can be improved to a great extent by incorporating a durable single hybrid nanostructure on the GO surface with suitable optical and biocompatible capabilities. Reactivity of the oxygen functional groups present on the edges of GO govern the chemical </span><a class="topic-link" data-dcnode-id="9986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/functionalization" title="Learn more about functionalization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9987" instrument_node="">functionalization</span></a><span data-dcnode-id="9985" instrument_node=""> of the materials on GO's surface </span></span></span></span></span><a class="workspace-trigger" data-dcnode-id="9979" href="#bb0390" name="bbb0390"><span data-dcnode-id="9980" instrument_node="">[78]</span></a><span data-dcnode-id="9978" instrument_node="">. The detection of pathogens from the skins, oral cavity, feces of farm animals and also in the environment of the barn or pen can be efficiently quantified using the hybrid nanoparticle based biosensors.</span></p></section><section data-dcnode-id="9915" id="s0085"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9972" id="st0095"><span data-dcnode-id="9975" instrument_node="">2.5.4</span><span data-dcnode-id="9974" instrument_node="">. </span><span data-dcnode-id="9973" instrument_node="">Detection of infectious agents</span></h4><p data-dcnode-id="9970" id="p0230"><span data-dcnode-id="9971" instrument_node="">Globalization has led to the rapid and unhampered distribution of animal products all over the world, posing great threats to humans. Transboundary animal diseases (TADs), including foot-and-mouth disease and classical swine fever, can spread very quickly across borders and countries. These diseases affect the animal trade and have a devastating impact on animal husbandry. Some animal diseases cross the species barrier and can affect humans, causing zoonotic infections. Therefore, appropriate methods must be applied for the diagnosis of such diseases. This will help in devising special precautionary measures like vaccinations and quarantine.</span></p><p data-dcnode-id="9965" id="p0235"><span data-dcnode-id="9969" instrument_node="">In direct detection methods, infectious agents can easily be detected in samples collected from animals. Classical methods for detection of microbes include identification by culture techniques and immunofluorescence. Molecular techniques include Polymerase Chain Reaction (PCR) and loop-mediated </span><a class="topic-link" data-dcnode-id="9967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/isothermal" title="Learn more about isothermal from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9968" instrument_node="">isothermal</span></a><span data-dcnode-id="9966" instrument_node=""> amplification (LAMP). Occurrence of infections in hosts can be diagnosed though indirect methods as well; for example, by identifying the antibodies against various infectious agents.</span></p><p data-dcnode-id="9948" id="p0240"><span data-dcnode-id="9952"><span data-dcnode-id="9964" instrument_node="">The advantage of </span><a class="topic-link" data-dcnode-id="9962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/polymerase-chain-reaction" title="Learn more about PCR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9963" instrument_node="">PCR</span></a><span data-dcnode-id="9953"><span data-dcnode-id="9957"><span data-dcnode-id="9961" instrument_node=""> is its high specificity. PCR is a highly sensitive assay that can diagnose infectious agents at molecular levels. Since every microorganism has its own unique genome, PCR enables amplification of the genetic material, including DNA and RNA. The real-time PCR technique has many variants, e.g. FRET-based assays, TaqMan assays, etc. SYBR Green is a cost-effective method, since it avoids the use of probes. PCR techniques are thus affordable, and are put to use in lightweight portable devices for on-site infection detection. Use of novel isothermal amplification methods further facilitates the on-site diagnosis of infections in animals. For example, loop-mediated isothermal amplification (LAMP) runs at a single temperature level and gives results readable by the naked eye. </span><a class="topic-link" data-dcnode-id="9959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/simultaneous-detection" title="Learn more about Simultaneous detection from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9960" instrument_node="">Simultaneous detection</span></a><span data-dcnode-id="9958" instrument_node=""> of different infectious agents is also made possible using various technical approaches, such as the padlock probes and various liquid </span></span><a class="topic-link" data-dcnode-id="9955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microarrays" title="Learn more about microarray from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9956" instrument_node="">microarray</span></a><span data-dcnode-id="9954" instrument_node=""> readouts of PCR results </span></span></span><a class="workspace-trigger" data-dcnode-id="9950" href="#bb0395" name="bbb0395"><span data-dcnode-id="9951" instrument_node="">[79]</span></a><span data-dcnode-id="9949" instrument_node="">.</span></p><p data-dcnode-id="9931" id="p0245"><span data-dcnode-id="9939"><span data-dcnode-id="9947" instrument_node="">Enzymes used in PCR include polymerases, </span><a class="topic-link" data-dcnode-id="9945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/reverse-transcriptase" title="Learn more about reverse transcriptases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9946" instrument_node="">reverse transcriptases</span></a><span data-dcnode-id="9940"><span data-dcnode-id="9944" instrument_node="">, nucleases, etc. Use of thermostable polymerases allows amplification through thermocycling. The PCR product can be visualized through </span><a class="topic-link" data-dcnode-id="9942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/agarose-gel-electrophoresis" title="Learn more about agarose gel electrophoresis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9943" instrument_node="">agarose gel electrophoresis</span></a><span data-dcnode-id="9941" instrument_node=""> using </span></span></span><a class="topic-link" data-dcnode-id="9937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/fluorescent-dye" title="Learn more about fluorescent dyes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9938" instrument_node="">fluorescent dyes</span></a><span data-dcnode-id="9932"><span data-dcnode-id="9936" instrument_node="">. </span><a class="topic-link" data-dcnode-id="9934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/electrophoresis" title="Learn more about Electrophoresis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9935" instrument_node="">Electrophoresis</span></a><span data-dcnode-id="9933" instrument_node=""> allows estimation of the amplicon length and maintains the specificity. But using gel-based PCR can sometimes be laborious, and doesn't allow the quantification of the initial viral load. Due to lack of specificity, problems like false positive detection arise. This problem has been solved with real-time PCR, which allows a closed-tube assay with minimum risk of cross contamination. In this assay, the product is monitored during reaction by DNA-binding moieties that bind to the amplified DNA and emit fluorescence without the requirement of the step of gel formation. The cycle number at which the fluorescence reaches its threshold level depends on the initial viral load. Communication of laboratory results with the health authorities in a rapid manner can lead to the successful eradication of infectious diseases from animals; rapid two-way communication between laboratories and the practitioners will ensure the success of control program. Three final PCR technologies aiding the detection of infectious agents include MAP, the Field Effective sensor, and Vantix.</span></span></p><p data-dcnode-id="9926" id="p0250"><span data-dcnode-id="9930" instrument_node="">Johne's disease (JD) is a major gastrointestinal disease of cattle caused by Mycobacterium Avium subspecies Paratuberculosis (MAP). This cattle disease causes premature culling and reduced milk production. This disease can be controlled using conductometric biosensors which combine immunomigration technology with electronic signal detection </span><a class="workspace-trigger" data-dcnode-id="9928" href="#bb0400" name="bbb0400"><span data-dcnode-id="9929" instrument_node="">[80]</span></a><span data-dcnode-id="9927" instrument_node="">.</span></p><p data-dcnode-id="9921" id="p0255"><span data-dcnode-id="9925" instrument_node="">The Field Effective sensor can be used for direct serological analysis. BHV-1, the pathogen causing bovine respiratory disease, can be detected through this method, which is faster than ELISA and plays an effective role in disease intervention </span><a class="workspace-trigger" data-dcnode-id="9923" href="#bb0405" name="bbb0405"><span data-dcnode-id="9924" instrument_node="">[81]</span></a><span data-dcnode-id="9922" instrument_node="">.</span></p><p data-dcnode-id="9916" id="p0260"><span data-dcnode-id="9920" instrument_node="">Bovine herpes virus-1 antibodies can be detected by the biosensor assay, which provides quantitative analysis of antibodies in milk samples. One such biosensor assay, Vantix™, has been developed recently, and provides a platform for rapid routine immunological testing </span><a class="workspace-trigger" data-dcnode-id="9918" href="#bb0410" name="bbb0410"><span data-dcnode-id="9919" instrument_node="">[82]</span></a><span data-dcnode-id="9917" instrument_node="">.</span></p></section><section data-dcnode-id="9876" id="s0090"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9911" id="st0100"><span data-dcnode-id="9914" instrument_node="">2.5.5</span><span data-dcnode-id="9913" instrument_node="">. </span><span data-dcnode-id="9912" instrument_node="">Hybrid technology</span></h4><p data-dcnode-id="9886" id="p0265"><span data-dcnode-id="9890"><span data-dcnode-id="9906"><span data-dcnode-id="9910" instrument_node="">There are fair chances that </span><a class="topic-link" data-dcnode-id="9908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/bacterial-concentration" title="Learn more about bacterial concentration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9909" instrument_node="">bacterial concentration</span></a><span data-dcnode-id="9907" instrument_node=""> can obscure the relative peak and baseline intensity of the spectral data from the biosensor. A hybrid technology has been proposed to avoid this. The uniform concentration of bacteria can be achieved through the modification of </span></span><a class="topic-link" data-dcnode-id="9904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/substrate-surface" title="Learn more about substrate surfaces from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9905" instrument_node="">substrate surfaces</span></a><span data-dcnode-id="9891"><span data-dcnode-id="9903" instrument_node="">, using microfluidics to avoid spectral interference in RAMAN spectra from mixed bacterial samples. </span><a class="topic-link" data-dcnode-id="9901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/miniaturization" title="Learn more about Miniaturization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9902" instrument_node="">Miniaturization</span></a><span data-dcnode-id="9892"><span data-dcnode-id="9896"><span data-dcnode-id="9900" instrument_node=""> of the RAMAN </span><a class="topic-link" data-dcnode-id="9898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/spectrometer" title="Learn more about spectrometer from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9899" instrument_node="">spectrometer</span></a><span data-dcnode-id="9897" instrument_node=""> is needed to further develop this technology. The integration of the RAMAN spectrometer and the </span></span><a class="topic-link" data-dcnode-id="9894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microfluidic-device" title="Learn more about microfluidic device from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9895" instrument_node="">microfluidic device</span></a><span data-dcnode-id="9893" instrument_node=""> platform faces various challenges, but must be considered for the successful application of NIR-SERS detection of foodborne pathogens </span></span></span></span><a class="workspace-trigger" data-dcnode-id="9888" href="#bb0385" name="bbb0385"><span data-dcnode-id="9889" instrument_node="">[77]</span></a><span data-dcnode-id="9887" instrument_node="">.</span></p><p data-dcnode-id="9877" id="p0270"><span data-dcnode-id="9881"><span data-dcnode-id="9885" instrument_node="">Another method, using electrokinetics-enhanced capacitive immunosensors for point-of-care serodiagnosis of infectious diseases, has been reported. Capacitive bio-affinity detection using </span><a class="topic-link" data-dcnode-id="9883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microelectrode" title="Learn more about microelectrodes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9884" instrument_node="">microelectrodes</span></a><span data-dcnode-id="9882" instrument_node=""> is considered as a promising label-free method for point-of-care diagnosis, though it has challenges in sensitivity and time </span></span><a class="workspace-trigger" data-dcnode-id="9879" href="#bb0415" name="bbb0415"><span data-dcnode-id="9880" instrument_node="">[83]</span></a><span data-dcnode-id="9878" instrument_node="">.</span></p></section></section><section data-dcnode-id="9808" id="s0095"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9871" id="st0105"><span data-dcnode-id="9874" instrument_node="">2.6</span><span data-dcnode-id="9873" instrument_node="">. </span><span data-dcnode-id="9872" instrument_node="">Movement and behavior</span></h3><p data-dcnode-id="9846" id="p0275"><span data-dcnode-id="9870" instrument_node="">Movement and behavior of farm animals can relay information about their level of activity and well-being. Moreover, physical defects in limbs can be detected early by abnormal movement. In large farms, relying on naked-eye observation can result in human error and a delay in diagnosis. Therefore, better methods for observing farms should be incorporated. For instance, a top-view camera may be used to analyze motion and detect low weight in pigs. The automatic detection of a low-weight pig through this method does not require any manual inspection by a farm administrator (</span><a class="workspace-trigger" data-dcnode-id="9868" href="#f0025" name="bf0025"><span data-dcnode-id="9869" instrument_node="">Fig. 5</span></a><span data-dcnode-id="9859"><span data-dcnode-id="9867" instrument_node="">) and hence decreases labor for farmers. By using motion detection technology and recorded video, object areas are identified using Hue </span><a class="topic-link" data-dcnode-id="9865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/saturation-value" title="Learn more about saturation values from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9866" instrument_node="">saturation values</span></a><span data-dcnode-id="9860"><span data-dcnode-id="9864" instrument_node=""> (HSV) color information. This detection technique can also identify a group of touching pigs standing close together. </span><a class="topic-link" data-dcnode-id="9862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/gaussian-mixture-model" title="Learn more about Gaussian Mixture Model from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9863" instrument_node="">Gaussian Mixture Model</span></a><span data-dcnode-id="9861" instrument_node=""> (GMM) is applied for the detection of and determining the size of individual moving pigs. The partially and fully moving pigs can also be identified using this model and hence, low-weight pigs can be identified without human intervention </span></span></span><a class="workspace-trigger" data-dcnode-id="9857" href="#bb0045" name="bbb0045"><span data-dcnode-id="9858" instrument_node="">[9]</span></a><span data-dcnode-id="9856" instrument_node="">. GPS and 3D collar-mounted accelerometers have also been developed </span><a class="workspace-trigger" data-dcnode-id="9854" href="#bb0420" name="bbb0420"><span data-dcnode-id="9855" instrument_node="">[84]</span></a><span data-dcnode-id="9853" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9851" href="#bb0425" name="bbb0425"><span data-dcnode-id="9852" instrument_node="">[85]</span></a><span data-dcnode-id="9850" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9848" href="#bb0430" name="bbb0430"><span data-dcnode-id="9849" instrument_node="">[86]</span></a><span data-dcnode-id="9847" instrument_node="">.</span></p><p data-dcnode-id="9841" id="p0280"><span data-dcnode-id="9845" instrument_node="">A technology named MooMonitor is also helping farmers determine the health of their cows through measurement of the </span><a class="topic-link" data-dcnode-id="9843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/physiological-condition" title="Learn more about physiological conditions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9844" instrument_node="">physiological conditions</span></a><span data-dcnode-id="9842" instrument_node=""> of individual farm animal. This technology makes use of wireless sensors that allows the farmers to detect individual cow heats and health events with ease through data analysis. Heat in cows and their illnesses can thus be recognized through this device which can help the farmers keep their livestock ideal and healthy. A similar technology, Silent Herdsman, has been specially formulated for farmers to be used on farm animals. Like a collar, it's wrapped around the neck of each animal and supervises all activities of cows and their behaviors. First it records behavioral patterns, and then it detects and records any changes in those patterns. In this way, estrus cycles and onset of certain sicknesses can be successfully identified and monitored.</span></p><p data-dcnode-id="9832" id="p0285"><span data-dcnode-id="9836"><span data-dcnode-id="9840" instrument_node="">The Royal Botanic Gardens in Kew, United Kingdom uses micro-technology to track the movement and locomotion of honey bees and their pollination activities. It is believed that this can provide breakthrough research on the constantly declining population of honey bees, which are a valuable asset for humans. Australia's Commonwealth Scientific and Industrial Research Organisation (CSIRO) is also interested in solving the rising issue of a sharp and continuous decline in honey bee populations. A large number of Australian honey bees have been tagged with </span><a class="topic-link" data-dcnode-id="9838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microsensor" title="Learn more about microsensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9839" instrument_node="">microsensors</span></a><span data-dcnode-id="9837" instrument_node=""> to analyze the lifestyle and behavior of hives. This technology, Swarm Sensing, is assisting Australian entomologists determine the patterns of honeybee movement </span></span><a class="workspace-trigger" data-dcnode-id="9834" href="#bb0435" name="bbb0435"><span data-dcnode-id="9835" instrument_node="">[87]</span></a><span data-dcnode-id="9833" instrument_node="">.</span></p><p data-dcnode-id="9820" id="p0290"><span data-dcnode-id="9827"><span data-dcnode-id="9831" instrument_node="">An Israeli company is currently offering a full array of GPS systems to make the detection of predators easy. It also sends </span><a class="topic-link" data-dcnode-id="9829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/drones" title="Learn more about drones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9830" instrument_node="">drones</span></a><span data-dcnode-id="9828" instrument_node=""> from phone to record the video of animal grazing and forms afence around animals so they don't wander off </span></span><a class="workspace-trigger" data-dcnode-id="9825" href="#bb0140" name="bbb0140"><span data-dcnode-id="9826" instrument_node="">[28]</span></a><span data-dcnode-id="9824" instrument_node="">. Motion History Image-based technology (MHI) is an innovative and reliable method that isolates the shaking motion of a coughing from other motions </span><a class="workspace-trigger" data-dcnode-id="9822" href="#bb0055" name="bbb0055"><span data-dcnode-id="9823" instrument_node="">[11]</span></a><span data-dcnode-id="9821" instrument_node="">. Image-based video analysis can help farmers isolate a coughing animal from its herd.</span></p><p data-dcnode-id="9809" id="p0295"><span data-dcnode-id="9816"><a class="topic-link" data-dcnode-id="9818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/computervision" title="Learn more about Computer vision from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9819" instrument_node="">Computer vision</span></a><span data-dcnode-id="9817" instrument_node=""> technology is based on the real-time monitoring of pigs based on the circadian rhythms. Camera sensors can easily detect the relationship between the dust concentration present in pig barns and pig activities. Different image-processing systems can be employed to classify the thermal comfort states of pigs and analyze their behaviors. The circadian rhythms in pig barns without windows, and with 24-h light-on conditions, can be investigated. This system of visual streaming data can analyze the activities of weaning and individual pigs as well </span></span><a class="workspace-trigger" data-dcnode-id="9814" href="#bb0440" name="bbb0440"><span data-dcnode-id="9815" instrument_node="">[88]</span></a><span data-dcnode-id="9813" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9811" href="#bb0445" name="bbb0445"><span data-dcnode-id="9812" instrument_node="">[89]</span></a><span data-dcnode-id="9810" instrument_node="">.</span></p></section><section data-dcnode-id="9754" id="s0100"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9804" id="st0110"><span data-dcnode-id="9807" instrument_node="">2.7</span><span data-dcnode-id="9806" instrument_node="">. </span><span data-dcnode-id="9805" instrument_node="">Stress detection</span></h3><p data-dcnode-id="9795" id="p0300"><span data-dcnode-id="9799"><span data-dcnode-id="9803" instrument_node="">Stress has deleterious effects on the productivity of commercial chickens, so a quick, accurate stress measurement technology would be advantageous. Sound analysis is a reliable measure to indicate stress in chickens. An inexpensive and automatic prototype has hence been developed recently to notify farmers to stress levels using sound data. Its structure consists of three binary-classifier </span><a class="topic-link" data-dcnode-id="9801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/support-vector-machine" title="Learn more about support vector machines from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9802" instrument_node="">support vector machines</span></a><span data-dcnode-id="9800" instrument_node="">. The sound emitted by the hens is first detected; then the classification module identifies and classifies the stress in the sound. An experimental evaluation is then prepared, using real-time sound data from an audio surveillance system. This model has been validated at 96.2% accuracy and is a very precise classification model </span></span><a class="workspace-trigger" data-dcnode-id="9797" href="#bb0050" name="bbb0050"><span data-dcnode-id="9798" instrument_node="">[10]</span></a><span data-dcnode-id="9796" instrument_node="">.</span></p><p data-dcnode-id="9774" id="p0305"><span data-dcnode-id="9778"><span data-dcnode-id="9786"><span data-dcnode-id="9790"><span data-dcnode-id="9794" instrument_node="">Lactate is an important indicator of stress in animals, as it plays a significant role in </span><a class="topic-link" data-dcnode-id="9792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/tissue-homeostasis" title="Learn more about tissue homeostasis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9793" instrument_node="">tissue homeostasis</span></a><span data-dcnode-id="9791" instrument_node="">. Being a product of anaerobic and aerobic glucose metabolism, it is a main component of glycolysis. During stress, excess </span></span><a class="topic-link" data-dcnode-id="9788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/pyruvate" title="Learn more about pyruvate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9789" instrument_node="">pyruvate</span></a><span data-dcnode-id="9787" instrument_node=""> is produced during glycolysis, which is converted to lactate and stored in tissues or exported to blood. This increased level of lactate in blood and tissues can be detected and used as an indicator of stress. </span></span><a class="topic-link" data-dcnode-id="9784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/amperometric" title="Learn more about Amperometric from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9785" instrument_node="">Amperometric</span></a><span data-dcnode-id="9779"><span data-dcnode-id="9783" instrument_node=""> biosensors have gained popularity, since they are used for lactate sensing. These biosensors are composed of </span><a class="topic-link" data-dcnode-id="9781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/electrode-material" title="Learn more about electrode material from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9782" instrument_node="">electrode material</span></a><span data-dcnode-id="9780" instrument_node=""> which is chemically modified and has </span></span></span><a class="topic-link" data-dcnode-id="9776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biological-recognition-element" title="Learn more about biological recognition elements from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9777" instrument_node="">biological recognition elements</span></a><span data-dcnode-id="9775" instrument_node=""> (BRE). Moreover, body-sensing technology senses various metabolites and electrolytes using Band-Aid like RFID sensor patches and temporary tattoo-based sensors.</span></p><p data-dcnode-id="9755" id="p0310"><span data-dcnode-id="9769"><span data-dcnode-id="9773" instrument_node="">The need for power, short battery life, and packaging material are major disadvantages of conventional methods. Now, using mobile phone and </span><a class="topic-link" data-dcnode-id="9771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/smartphone" title="Learn more about smartphone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9772" instrument_node="">smartphone</span></a><span data-dcnode-id="9770" instrument_node=""> apps, the data can be transmitted wirelessly. However, wireless sensors also need batteries, and the replacement of these batteries becomes a time-consuming task. These batteries are also environmentally unfriendly and need to be recycled. Therefore, ther
