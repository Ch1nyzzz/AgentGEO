"418" instrument_node="">Lansink</span><div data-dcnode-id="415" id="ref-id-rf0565"><strong class="title" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Economic consequences of investing in sensor systems on dairy farms</span></strong></div></div><div class="host" data-dcnode-id="394"><span data-dcnode-id="413" instrument_node="">Comput. Electron. Agric.</span><span data-dcnode-id="411" instrument_node="">, </span><span data-dcnode-id="409" instrument_node="">119</span><span data-dcnode-id="407" instrument_node=""> (</span><span data-dcnode-id="405" instrument_node="">2015</span><span data-dcnode-id="403" instrument_node="">)</span><span data-dcnode-id="401" instrument_node="">, pp. </span><span data-dcnode-id="399" instrument_node="">33</span><span data-dcnode-id="397" instrument_node="">-</span><span data-dcnode-id="395" instrument_node="">39</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="390"><span data-dcnode-id="393" instrument_node=""></span><a aria-describedby="ref-id-rf0565" class="link" data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DEconomic%2520consequences%2520of%2520investing%2520in%2520sensor%2520systems%2520on%2520dairy%2520farms%26publication_year%3D2015%26author%3DW.%2520Steeneveld%26author%3DH.%2520Hogeveen%26author%3DA.O.%2520Lansink" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="392" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="240" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="241"><div class="PageDivider" data-dcnode-id="385"></div><header data-dcnode-id="382" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Cited by (183)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="242"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="243"><ul data-dcnode-id="249"><li class="ListArticleItem" data-dcnode-id="364"><div class="sub-heading" data-dcnode-id="376"><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0925231222003150" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="380" id="citing-articles-article0-title"><span data-dcnode-id="381" instrument_node="">A survey of machine learning approaches in animal behaviour</span></h3></a><div class="article-source ellipsis" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">2022, Neurocomputing</span></div></div><div class="buttons" data-dcnode-id="370"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="371" type="button"><span class="button-link-text" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="372" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="373"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="365"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="366" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="367"><p data-dcnode-id="368" id="sp0005"><span data-dcnode-id="369" instrument_node="">Animal activity recognition is an important topic that facilitates understanding of animal behavior that is useful for analyzing and classifying their wellbeing. Research studies have been reporting the use of animal activity as an effective indicator of their health state. This survey focuses on recent advancements in machine intelligence utilizing wearable devices for sheep activity recognition. We summarise existing works focusing on various types of sensors used in agricultural sheep activity recognition. Furthermore, data segmentation methods used in each study, followed by the potential recommendations on window size and sample rate selection are addressed in detail. Finally, we present the features being identified as significant along with an overview of machine learning algorithms used in the domain of sheep activity recognition using accelerometer data.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="346"><div class="sub-heading" data-dcnode-id="358"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168159122000557" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="362" id="citing-articles-article1-title"><span data-dcnode-id="363" instrument_node="">Tracking performance in poultry is affected by data cleaning method and housing system</span></h3></a><div class="article-source ellipsis" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">2022, Applied Animal Behaviour Science</span></div></div><div class="buttons" data-dcnode-id="352"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="353" type="button"><span class="button-link-text" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="354" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="355"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="347"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="348" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="349"><p data-dcnode-id="350" id="sp0040"><span data-dcnode-id="351" instrument_node="">Sensor-based behavioural observation methods improve our understanding of individual behaviour and welfare in large commercial groups, including poultry. Validating automatically generated data is essential to account for potential sources of error. Our study aimed to validate a sensor-based tracking system for broiler breeders (BB) and laying hens (LH) in commercially relevant housing systems. The BB study was conducted in 10 pens with 33 females and three males (Ross 308) per pen. Half of the pens contained a raised slatted area and two raised group nests (Raised), while in the remaining five pens, the nests and slats were on the floor (Floor). For the LH study, six pens with a commercial aviary were used, with 225 Dekalb White hens housed per pen (Aviary). Focal hens (BB, 10/pen; LH, 18/pen) were equipped with backpacks containing tracking devices that registered transitions between four (BB) or five (LH) resource-related zones covering all accessible areas within each housing system. The tracking data was compared against video observations for 20 focal BB on two days and 18 focal LH on three days (3&nbsp;×&nbsp;20&nbsp;min/day). Three data cleaning methods tested with 30 values of a duration parameter were evaluated for reliability and stability with a cross-validation approach. Initial and post-cleaning performance were assessed with accuracy, precision, and sensitivity of recorded transitions and by calculating the reliability for two aspects of movement: total transitions (Lin’s Concordance Correlation Coefficient) and locations (mean proportion of matching duration). A mixed model was applied to evaluate the duration of stay after false and true tracking registrations. Initial location reliability was high (&gt; 0.949) in all housing systems, while reliability of total transitions was low (&lt; 0.264), particularly in both BB housing systems (&lt; 0.064). The cross-validation revealed suitable cleaning procedures for Aviary and Raised but not for Floor, thus Floor was not used for further analysis. Cleaning improved total transitions (&gt; 0.832) while reliability of locations remained high (&gt; 0.949) in Aviary and Raised. The duration between registrations was affected by housing system (p&nbsp;&lt;&nbsp;0.001) and was longer for true compared to false registrations (p&nbsp;&lt;&nbsp;0.001). Initial tracking performance varied between movement aspects and housing systems. The difference in duration between true and false registrations allowed for the application of simple yet effective data cleaning in Aviary and Raised, ensuring that the generated data better represented the animal's actual movement with reduced error associated with the tracking system.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="322"><div class="sub-heading" data-dcnode-id="340"><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1751731121002755" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="344" id="citing-articles-article2-title"><span data-dcnode-id="345" instrument_node="">Review: Precision Livestock Farming technologies in pasture-based livestock systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2022, Animal</span></div></div><div class="buttons" data-dcnode-id="334"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="335" type="button"><span class="button-link-text" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="336" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="337"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="323"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="324" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="325"><p data-dcnode-id="326" id="sp0010"><span data-dcnode-id="333" instrument_node="">Precision Livestock Farming (</span><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">PLF</span></strong><span data-dcnode-id="330" instrument_node="">) encompasses the combined application of single technologies or multiple tools in integrated systems for real-time and individual monitoring of livestock. In grazing systems, some PLF applications could substantially improve farmers’ control of livestock by overcoming issues related to pasture utilisation and management, and animal monitoring and control. A focused literature review was carried out to identify technologies already applied or at an advanced stage of development for livestock management in pastures, specifically cattle, sheep, goats, pigs, poultry. Applications of PLF in pasture-based systems were examined for cattle, sheep, goats, pigs, and poultry. The earliest technology applied to livestock was the radio frequency identification tag, allowing the identification of individuals, but also for retrieving important information such as maternal pedigree. Walk-over-weigh platforms were used to record individual and flock weights. Coupled with automatic drafting systems, they were tested to divide the animals according to their needs. Few studies have dealt with remote body temperature assessment, although the use of thermography is spreading to monitor both intensively reared and wild animals. Global positioning system and accelerometers are among the most applied technologies, with several solutions available on the market. These tools are used for several purposes, such as animal location, theft prevention, assessment of activity budget, behaviour, and feed intake of grazing animals, as well as for reproduction monitoring (i.e., oestrus, calving, or lambing). Remote sensing by satellite images or unmanned aerial vehicles (</span><strong data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">UAVs</span></strong><span data-dcnode-id="327" instrument_node="">) seems promising for biomass assessment and herd management based on pasture availability, and some attempts to use UAVs to monitor, track, or even muster animals have been reported recently. Virtual fencing is among the upcoming technologies aimed at grazing management. This system allows the management of animals at pasture without physical fences but relies on associative learning between audio cues and an electric shock delivered if the animal does not change direction after the acoustic warning. Regardless of the different technologies applied, some common constraints have been reported on the application of PLF in grazing systems, especially when compared with indoor or confined livestock systems. Battery lifespan, transmission range, service coverage, storage capacity, and economic affordability were the main factors. However, even if the awareness of the existence and the potential of these upcoming tools are still limited, farmers’ and researchers’ demands are increasing, and positive outcomes in terms of rangeland conservation, animal welfare, and labour optimisation are expected from the spread of PLF in grazing systems.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="304"><div class="sub-heading" data-dcnode-id="316"><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0924424721007342" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="320" id="citing-articles-article3-title"><span data-dcnode-id="321" instrument_node="">MOOnitor: An IoT based multi-sensory intelligent device for cattle activity monitoring</span></h3></a><div class="article-source ellipsis" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">2022, Sensors and Actuators A: Physical</span></div></div><div class="buttons" data-dcnode-id="310"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="311" type="button"><span class="button-link-text" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="312" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="313"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="305"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="306" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="307"><p data-dcnode-id="308" id="sp0105"><span data-dcnode-id="309" instrument_node="">Continuous activity monitoring of dairy cattle is essential to acquire a comprehensive knowledge on health and well-being of the animals. In this research, we have reported the development and deployment of "MOOnitor", a neck-mounted intelligent IoT device for cattle monitoring. The device facilitates classification of salient activities of cattle through appropriately positioned sensors. MOOnitor is an integration of a temperature sensor, a global positioning system (GPS) module, and a 3-axis accelerometer in a lightweight enclosure, which is attached to a halter that allows transmission of data to an IoT server using a microcontroller and a cellular GSM module. After acquiring the necessary sensory information, the most significant features were strategically extracted for enhanced data interpretation. Thereafter, optimally tuned eXtreme Gradient Boosting (XGBoost) and Random Forests classifiers were implemented to classify activities like ‘standing’, ‘lying’, ‘standing and ruminating’, ‘lying and ruminating’, ‘walking’, and ‘walking and grazing’. The performances of the two classifiers towards identification of different cattle activities were compared in terms of accuracy. Furthermore, the importance of using a temperature sensor and a GPS module in addition to an accelerometer in cattle activity recognition could be justified. An overall classification accuracy as high as ~97% was achieved using the XGBoost based classifier. In addition, accuracy, precision, sensitivity and specificity for standing (0.98, 0.97, 0.97, 0.98), lying (0.97, 0.90, 1, 0.96), standing and ruminating (0.99, 1, 0.97, 1), lying and ruminating (0.99, 1, 0.83, 1), walking (1, 1, 1, 1), and walking and grazing (0.99, 1, 0.75, 1) shows the suitability of the proposed method in effective cattle activity monitoring. Since cattle activity states are indicative of various factors such as estrous and several diseases like mastitis, foot-and-mouth disease, etc, the MOOnitor may be used for early detection of these conditions in addition to general health monitoring.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="268"><div class="sub-heading" data-dcnode-id="298"><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1871141321004091" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="302" id="citing-articles-article4-title"><span data-dcnode-id="303" instrument_node="">Can cattle geolocation data yield behavior-based criteria to inform precision grazing systems on rangeland?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">2022, Livestock Science</span></div></div><div class="buttons" data-dcnode-id="292"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="293" type="button"><span class="button-link-text" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="294" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="295"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="269"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="270" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="271"><p data-dcnode-id="272" id="spara007"><span data-dcnode-id="291" instrument_node="">A key challenge of precision grazing systems is identifying behavior anomalies associated with situations of reduced animal production and wellbeing. We determined typical ranges of diel variation of movement and activity patterns of steers on rangeland to identify metrics that could serve as sensitive indicators of behavior anomalies. Seventeen Raramuri Criollo or Criollo crossbred yearling steers weighing 318&nbsp;±&nbsp;9.3&nbsp;kg (winter; W) or 358&nbsp;±&nbsp;8.4&nbsp;kg (late summer; LS) were fitted with GPS collars that recorded animal location at 5-min intervals. Steers grazed a 3,215-ha rangeland pasture for approximately 67 d in W or LS of 2016 and 2017. GPS data were used to derive 22 commonly monitored behavior variables. Means and day-to-day variation (CV%) of all behavior metrics were calculated for each animal as well as linear correlations between the CV of each behavior and ADG. Daily time spent resting or grazing exhibited the least day-to-day variation in both W and LS (CV resting =10.8 and 9.9%, respectively; CV grazing =13.8 and 14.8%, respectively); predawn area explored (CV =240.8%) and time spent at drinkers (CV =336.6%) exhibited the most daily variation in W and LS, respectively. During W, increasing day-to-day variation in daytime distance traveled and area explored, as well as daily time spent traveling were associated with increasing ADG (</span><em data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">r</span></em><span data-dcnode-id="288" instrument_node="">&nbsp;=&nbsp;0.56 to 0.58; </span><em data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">P</span></em><span data-dcnode-id="285" instrument_node=""> &lt; 0.05). In LS, steers with greater CV for 24-h area explored, time spent traveling, or daytime distance traveled tended to gain less weight (</span><em data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">r</span></em><span data-dcnode-id="282" instrument_node=""> =-0.77 to -0.84; </span><em data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">P</span></em><span data-dcnode-id="279" instrument_node=""> &lt; 0.01), while steers with more flexible 24&nbsp;hour path sinuosity tended to gain more weight (</span><em data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">r</span></em><span data-dcnode-id="276" instrument_node="">&nbsp;=&nbsp;0.93; </span><em data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">P</span></em><span data-dcnode-id="273" instrument_node=""> &lt; 0.01). Behavior metrics more closely associated with forage intake processes, such as daily time spent grazing or resting, exhibited lowest diel variation levels and could be used to diagnose non-normal behavior of cattle on rangeland.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="250"><div class="sub-heading" data-dcnode-id="262"><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0165993621002818" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="266" id="citing-articles-article5-title"><span data-dcnode-id="267" instrument_node="">Electrochemical biosensors with Aptamer recognition layer for the diagnosis of pathogenic bacteria: Barriers to commercialization and remediation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">2021, TrAC - Trends in Analytical Chemistry</span></div></div><div class="buttons" data-dcnode-id="256"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="257" type="button"><span class="button-link-text" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="258" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="259"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="251"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="252" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="253"><p data-dcnode-id="254" id="abspara0010"><span data-dcnode-id="255" instrument_node="">One of the serious public health threats is pathogenic bacteria due to the lack of affordable and early-stage diagnosis and treatment. The existing diagnostic methods are tedious, time-consuming, expensive, and labor-intensive. Therefore, there is an urgent need for achieving simple, low-cost, precise, and rapid detection methods. Besides a plethora of efforts to meet those promises, electrochemical biosensors technologies with aptamers (synthetic ssDNA or ssRNA) recognition moieties have emerged as a promising sensing platform for bacterial diagnosis. In this review, we have comprehensively discussed the recent advances of different potentiometric and non-potentiometric electrochemical aptasensors emphasizing their surface designs, functionalization, and significant performance for the detection of pathogenic bacteria. At the end of this review, various quality advancements of aptasensors technologies, prospects, challenges, and boundaries of commercialization with research directions have been focused on and summarized.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84997701868%26md5%3Dfd14c4cd91a441aa71a7ecdad6a94b" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="247" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="248"></path></svg><span class="button-alternative-text" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><
