e is a need for self-powered biosensors. Using battery-free sensors fueled by a biofuel cell is an economic approach, since these biofuels use enzymes. The discussion of these enzyme-based biofuels in sensors gained momentum more than a decade ago. Lactate levels can be analyzed in sweat using an enzymatic sensor. This sensor is NAD</span></span><span data-dcnode-id="9768" instrument_node="">&nbsp;</span><span data-dcnode-id="9759"><span data-dcnode-id="9767" instrument_node="">+-dependent and has a biofuel cell as its power source. This sensor patch has reportedly excellent performance, since the lactate dehydrogenase-based sensor component shows linear current response with increasing lactate concentrations. The sensor, which was coupled with the power source, energy </span><a class="topic-link" data-dcnode-id="9765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/harvesters" title="Learn more about harvester from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9766" instrument_node="">harvester</span></a><span data-dcnode-id="9760"><span data-dcnode-id="9764" instrument_node=""> and micropotentiostat, is a great success. Connecting the sensor with the Micro </span><a class="topic-link" data-dcnode-id="9762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/potentiostat" title="Learn more about Potentiostat from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9763" instrument_node="">Potentiostat</span></a><span data-dcnode-id="9761" instrument_node=""> makes the chronoamperometric detection of lactate relatively easier and possible. This Sensor Patch System has been tested under laboratory conditions and its performance has been verified </span></span></span><a class="workspace-trigger" data-dcnode-id="9757" href="#bb0020" name="bbb0020"><span data-dcnode-id="9758" instrument_node="">[4]</span></a><span data-dcnode-id="9756" instrument_node="">.</span></p></section><section data-dcnode-id="9686" id="s0105"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9750" id="st0115"><span data-dcnode-id="9753" instrument_node="">2.8</span><span data-dcnode-id="9752" instrument_node="">. </span><span data-dcnode-id="9751" instrument_node="">Sound analyzers</span></h3><p data-dcnode-id="9733" id="p0315"><span data-dcnode-id="9749" instrument_node="">The sound an animal makes can give a hint to its physical well-being. Some sounds are used to attract mating partners and some to threaten predators, while others can indicate respiratory diseases </span><a class="workspace-trigger" data-dcnode-id="9747" href="#bb0065" name="bbb0065"><span data-dcnode-id="9748" instrument_node="">[13]</span></a><span data-dcnode-id="9746" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9744" href="#bb0080" name="bbb0080"><span data-dcnode-id="9745" instrument_node="">[16]</span></a><span data-dcnode-id="9743" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9741" href="#bb0450" name="bbb0450"><span data-dcnode-id="9742" instrument_node="">[90]</span></a><span data-dcnode-id="9740" instrument_node="">. For instance, a rumination microphone helps to observe cud chewing in cows </span><a class="workspace-trigger" data-dcnode-id="9738" href="#bb0140" name="bbb0140"><span data-dcnode-id="9739" instrument_node="">[28]</span></a><span data-dcnode-id="9737" instrument_node="">. Technologies like deploying cameras on pets or farm grazing animals and analyzing their sounds (like barking and or coughing) can be used efficiently to keep check on the animals so they don't go missing or wander off </span><a class="workspace-trigger" data-dcnode-id="9735" href="#bb0005" name="bbb0005"><span data-dcnode-id="9736" instrument_node="">[1]</span></a><span data-dcnode-id="9734" instrument_node="">.</span></p><p data-dcnode-id="9721" id="p0320"><span data-dcnode-id="9728"><span data-dcnode-id="9732" instrument_node="">Sound analyzers can also be used to monitor pigs' health and body conditions. Their sounds help farmers evaluate whether the animal is under stress or not. The interference of environmental and background noise can hinder the detection of pig screams. An automatic scream-detection method has been devised recently which distinguishes the screams of pigs from other sounds on the basis of sound structure, power, frequency, duration and variability. By using different algorithms and differentiating between the </span><a class="topic-link" data-dcnode-id="9730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/spectrogram" title="Learn more about spectrograms from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9731" instrument_node="">spectrograms</span></a><span data-dcnode-id="9729" instrument_node="">, this classifier is a big breakthrough in animal health management </span></span><a class="workspace-trigger" data-dcnode-id="9726" href="#bb0455" name="bbb0455"><span data-dcnode-id="9727" instrument_node="">[91]</span></a><span data-dcnode-id="9725" instrument_node="">. Respiratory diseases can also be detected using sound </span><a class="workspace-trigger" data-dcnode-id="9723" href="#bb0060" name="bbb0060"><span data-dcnode-id="9724" instrument_node="">[12]</span></a><span data-dcnode-id="9722" instrument_node="">.</span></p><p data-dcnode-id="9713" id="p0325"><span data-dcnode-id="9720" instrument_node="">The sound data from a group of Korean native cows (</span><em data-dcnode-id="9718"><span data-dcnode-id="9719" instrument_node="">Bos Taurus coreanea</span></em><span data-dcnode-id="9717" instrument_node="">) has helped in detecting the abnormalities in the oestrus cycle of cows </span><a class="workspace-trigger" data-dcnode-id="9715" href="#bb0450" name="bbb0450"><span data-dcnode-id="9716" instrument_node="">[90]</span></a><span data-dcnode-id="9714" instrument_node="">. An automated analysis of these anomalies using a sound sensor has contributed significantly to livestock management. Using remote sensing techniques, vocalizations can be used to recognize the weaning and hungry states of cows as well. Previously, research has been done to extract meaning from specific calls of cows and accurately evaluate the emotional state of a cow.</span></p><p data-dcnode-id="9692" id="p0330"><span data-dcnode-id="9712" instrument_node="">Bird vocalizations can be used to estimate thermal comfort for chicks during the heating phase (</span><a class="workspace-trigger" data-dcnode-id="9710" href="#f0020" name="bf0020"><span data-dcnode-id="9711" instrument_node="">Fig. 4</span></a><span data-dcnode-id="9705"><span data-dcnode-id="9709" instrument_node="">). Group behavioral patterns and their vocalizations were found to be correlated not only by the </span><a class="topic-link" data-dcnode-id="9707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/noise-amplitude" title="Learn more about noise amplitude from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9708" instrument_node="">noise amplitude</span></a><span data-dcnode-id="9706" instrument_node="">, but also by the noise frequency spectrum. Such noise sensors may be important to determine the effect of environment on chick health </span></span><a class="workspace-trigger" data-dcnode-id="9703" href="#bb0465" name="bbb0465"><span data-dcnode-id="9704" instrument_node="">[93]</span></a><span data-dcnode-id="9702" instrument_node="">. Analyzing and correlating the sound frequencies of different vocalizations during the life of birds can serve as a very useful tool for the detection of growth of chickens </span><a class="workspace-trigger" data-dcnode-id="9700" href="#bb0055" name="bbb0055"><span data-dcnode-id="9701" instrument_node="">[11]</span></a><span data-dcnode-id="9699" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9697" href="#bb0470" name="bbb0470"><span data-dcnode-id="9698" instrument_node="">[94]</span></a><span data-dcnode-id="9696" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9694" href="#bb0075" name="bbb0075"><span data-dcnode-id="9695" instrument_node="">[15]</span></a><span data-dcnode-id="9693" instrument_node="">.</span></p><p data-dcnode-id="9687" id="p0335"><span data-dcnode-id="9691" instrument_node="">Wasting disease is a potentially risky and highly contagious condition in livestock which requires 24-h monitoring for timely detection of disease. This disease can be detected successfully by obtaining and using audio and video data. The cough sound can be detected through audio analysis and motion detection </span><a class="workspace-trigger" data-dcnode-id="9689" href="#bb0475" name="bbb0475"><span data-dcnode-id="9690" instrument_node="">[95]</span></a><span data-dcnode-id="9688" instrument_node="">.</span></p></section><section data-dcnode-id="9625" id="s0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9682" id="st0120"><span data-dcnode-id="9685" instrument_node="">2.9</span><span data-dcnode-id="9684" instrument_node="">. </span><span data-dcnode-id="9683" instrument_node="">Determining metabolic activity</span></h3><p data-dcnode-id="9669" id="p0340"><span data-dcnode-id="9673"><span data-dcnode-id="9681" instrument_node="">Metabolic disorders in cows can be detected by increased concentrations of non-esterified fatty acids (NEFA) in biological fluids, which act as significant biomarkers. Cost-effective and bio-friendly sensor elements based on </span><a class="topic-link" data-dcnode-id="9679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/ruthenium" title="Learn more about ruthenium from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9680" instrument_node="">ruthenium</span></a><span data-dcnode-id="9674"><span data-dcnode-id="9678" instrument_node=""> bipyridyl complex-modified graphene oxide nano sheets ([Ru (bpy) 3]2þ-GO) can be used for early diagnosis of metabolic diseases of cows. These biosensors can be used for Circulating Non-Esterified Fatty Acid (NEFA) detection through </span><a class="topic-link" data-dcnode-id="9676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/electro-analytical-method" title="Learn more about electrochemical analysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9677" instrument_node="">electrochemical analysis</span></a><span data-dcnode-id="9675" instrument_node="">. [Ru (bpy) 3]2þ-GO electrodes have reliable redox properties as compared to GO electrodes. NEFA levels are a good indicator of negative energy balance (NEB). During NEB, adipose fat is mobilized as NEFA and transported to the liver to be oxidized or re-esterified into </span></span></span><a class="topic-link" data-dcnode-id="9671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/triglycerides" title="Learn more about triglycerides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9672" instrument_node="">triglycerides</span></a><span data-dcnode-id="9670" instrument_node="">. In the liver, excessive NEFA might increase the risk for clinical malignancies such as fatty liver, ketosis, displaced abomasum, metritis, and retained placenta. NEFA has a prime economic value for livestock producers and also indicates fertility issues in cows. NEFA represents a dairy cow's health and plays a crucial role in the health management of livestock.</span></p><p data-dcnode-id="9626" id="p0345"><span data-dcnode-id="9636"><span data-dcnode-id="9640"><span data-dcnode-id="9644"><span data-dcnode-id="9652"><span data-dcnode-id="9664"><span data-dcnode-id="9668" instrument_node="">Carbon electrodes are the electrochemical-sensing platforms and have the ability to be used in the robotic </span><a class="topic-link" data-dcnode-id="9666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/milking-machines" title="Learn more about milking machine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9667" instrument_node="">milking machine</span></a><span data-dcnode-id="9665" instrument_node=""> and other important </span></span><a class="topic-link" data-dcnode-id="9662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/system-diagnostics" title="Learn more about diagnostic systems from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9663" instrument_node="">diagnostic systems</span></a><span data-dcnode-id="9653"><span data-dcnode-id="9661" instrument_node="">. Redox active hybrid GO materials, being cost effective and electrochemically stable, are actively used in the bio detection applications. Newly-fabricated nano-biosensors have iron-containing enzymes like </span><a class="topic-link" data-dcnode-id="9659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/lipoxygenases" title="Learn more about lipoxygenases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9660" instrument_node="">lipoxygenases</span></a><span data-dcnode-id="9654"><span data-dcnode-id="9658" instrument_node="">, which form acid peroxides by catalyzing the oxidation of </span><a class="topic-link" data-dcnode-id="9656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/polyunsaturated-fatty-acid" title="Learn more about polyunsaturated fatty acids from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9657" instrument_node="">polyunsaturated fatty acids</span></a><span data-dcnode-id="9655" instrument_node="">. Lipoxygenases have a future in scalable bio-catalysis. Using the GO nano sheets allows </span></span></span></span><a class="topic-link" data-dcnode-id="9650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/electrochemical-detection" title="Learn more about electrochemical detection from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9651" instrument_node="">electrochemical detection</span></a><span data-dcnode-id="9645"><span data-dcnode-id="9649" instrument_node=""> of NEFA; the lipoxygenase immobilized on the </span><a class="topic-link" data-dcnode-id="9647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/electrode-surface" title="Learn more about electrode surface from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9648" instrument_node="">electrode surface</span></a><span data-dcnode-id="9646" instrument_node=""> catalyzes the NEFA into fatty </span></span></span><a class="topic-link" data-dcnode-id="9642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/enone" title="Learn more about enones from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9643" instrument_node="">enones</span></a><span data-dcnode-id="9641" instrument_node=""> and affects the </span></span><a class="topic-link" data-dcnode-id="9638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/redox-reactions" title="Learn more about redox reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9639" instrument_node="">redox reaction</span></a><span data-dcnode-id="9637" instrument_node=""> occurring in interface. This electrode system is linearly dependent on different concentrations of the standard NEFA, as well as serum samples, hence providing accurate data for detection of metabolic disorders of cows </span></span><a class="workspace-trigger" data-dcnode-id="9634" href="#bb0480" name="bbb0480"><span data-dcnode-id="9635" instrument_node="">[96]</span></a><span data-dcnode-id="9633" instrument_node="">. Increased milk production and body temperature in cows after insemination acts as an indicator of the mother's immune response to the embryo's entry into the uterus. Hence, low-cost electronic components and materials could be used as non-invasive pregnancy detection in cows without human interference </span><a class="workspace-trigger" data-dcnode-id="9631" href="#bb0460" name="bbb0460"><span data-dcnode-id="9632" instrument_node="">[92]</span></a><span data-dcnode-id="9630" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9628" href="#bb0305" name="bbb0305"><span data-dcnode-id="9629" instrument_node="">[61]</span></a><span data-dcnode-id="9627" instrument_node="">.</span></p></section><section data-dcnode-id="9567" id="s0115"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9621" id="st0125"><span data-dcnode-id="9624" instrument_node="">2.10</span><span data-dcnode-id="9623" instrument_node="">. </span><span data-dcnode-id="9622" instrument_node="">Detection of toxins</span></h3><p data-dcnode-id="9612" id="p0350"><span data-dcnode-id="9620" instrument_node="">Microfluidic devices allow effective toxin and antigen detection, which has many beneficial applications in health care for animal health. </span><a class="topic-link" data-dcnode-id="9618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/neurotoxin" title="Learn more about Neurotoxins from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9619" instrument_node="">Neurotoxins</span></a><span data-dcnode-id="9613"><span data-dcnode-id="9617" instrument_node=""> can be detected using microfluidic devices. Recently, the National Center for Food Protection and Defense in St. Paul carried out extensive research and developed a highly sensitive microfluidic platform for detecting botulinum neurotoxin in solution. These microfluidic devices are composed of input and detection ports connected by a </span><a class="topic-link" data-dcnode-id="9615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microchannel" title="Learn more about microchannel from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9616" instrument_node="">microchannel</span></a><span data-dcnode-id="9614" instrument_node="">.</span></span></p><p data-dcnode-id="9599" id="p0355"><span data-dcnode-id="9607"><span data-dcnode-id="9611" instrument_node="">Microfluidics are also being used in the food and dairy industry, where liquids and solids are blended together to manufacture dairy products. Microfluidics technology is very helpful in the formation of homogenous liquid mixtures, keeping viscosity and density balanced. The valuable microfluidics technology can also be combined with food processing equipment to make suspensions of various compositions. </span><a class="topic-link" data-dcnode-id="9609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/micro-porosity" title="Learn more about Microporous from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9610" instrument_node="">Microporous</span></a><span data-dcnode-id="9608" instrument_node=""> calcium </span></span><a class="topic-link" data-dcnode-id="9605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/alginates" title="Learn more about alginate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9606" instrument_node="">alginate</span></a><span data-dcnode-id="9600"><span data-dcnode-id="9604" instrument_node=""> gels, low-energy food products, foams and emulsions can be produced through this technology as well. </span><a class="topic-link" data-dcnode-id="9602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanoparticle-synthesis" title="Learn more about Nanoparticle synthesis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9603" instrument_node="">Nanoparticle synthesis</span></a><span data-dcnode-id="9601" instrument_node=""> and formation of plastic microfluidic chips for applications in food safety has also increased recently.</span></span></p><p data-dcnode-id="9594" id="p0360"><span data-dcnode-id="9598" instrument_node="">Microfluidic devices are being employed for culture and manipulation of embryos in assisted reproduction of cattle </span><a class="workspace-trigger" data-dcnode-id="9596" href="#bb0485" name="bbb0485"><span data-dcnode-id="9597" instrument_node="">[97]</span></a><span data-dcnode-id="9595" instrument_node="">.</span></p><p data-dcnode-id="9581" id="p0365"><span data-dcnode-id="9585"><span data-dcnode-id="9593" instrument_node="">Quantitative analysis of the proteins wheat gluten and Ara h 1 can be done by the use of a microfluidic ELISA platform combined with a recently developed custom-designed </span><a class="topic-link" data-dcnode-id="9591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/optical-sensors" title="Learn more about optical sensor from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9592" instrument_node="">optical sensor</span></a><span data-dcnode-id="9586"><span data-dcnode-id="9590" instrument_node="">. This microfluidic ELISA biosensor dramatically reduces the total assay time from hours to minutes and decreases the consumption of sample/reagents compared to commercial ELISA. Therefore, this technology has a big edge over commercially available conventional methods like </span><a class="topic-link" data-dcnode-id="9588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/dipstick" title="Learn more about dipstick from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9589" instrument_node="">dipstick</span></a><span data-dcnode-id="9587" instrument_node=""> tests. It is hoped that this detection technique will soon be commercialized and applied in food control agencies for better human and animal health. Technologies which only use microfluidic chips require expensive and heavy instruments, and thus cannot be used as portable devices. Integrating microfluidics and biosensors has helped in the development of point-of-care (POC) diagnostics. This useful ELISA device can be used by food safety inspectors and industries in favor of better health management </span></span></span><a class="workspace-trigger" data-dcnode-id="9583" href="#bb0490" name="bbb0490"><span data-dcnode-id="9584" instrument_node="">[98]</span></a><span data-dcnode-id="9582" instrument_node="">.</span></p><p data-dcnode-id="9568" id="p0370"><span data-dcnode-id="9572"><span data-dcnode-id="9576"><span data-dcnode-id="9580" instrument_node="">L-glutamate is an excitatory </span><a class="topic-link" data-dcnode-id="9578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/neurotransmitter" title="Learn more about neurotransmitter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9579" instrument_node="">neurotransmitter</span></a><span data-dcnode-id="9577" instrument_node="">, and its regulation is related to important cognition processes. Different </span></span><a class="topic-link" data-dcnode-id="9574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/electrochemical-sensor" title="Learn more about electrochemical sensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9575" instrument_node="">electrochemical sensors</span></a><span data-dcnode-id="9573" instrument_node=""> can be implanted in the bodies of animals for its detection. Microsensors are used for this purpose, but these sensors pose difficulties, as they are susceptible to interference by other chemicals, and yield small signal responses. Current commercial recording systems are inefficient, as they restrict the movement of subjects. Hence there is a need for a wireless system which reduces interference and enables data transmission to the Internet or smartphone </span></span><a class="workspace-trigger" data-dcnode-id="9570" href="#bb0495" name="bbb0495"><span data-dcnode-id="9571" instrument_node="">[99]</span></a><span data-dcnode-id="9569" instrument_node="">.</span></p></section><section data-dcnode-id="9520" id="s0120"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9563" id="st0130"><span data-dcnode-id="9566" instrument_node="">2.11</span><span data-dcnode-id="9565" instrument_node="">. </span><span data-dcnode-id="9564" instrument_node="">Detection of temperature</span></h3><p data-dcnode-id="9532" id="p0375"><span data-dcnode-id="9554"><span data-dcnode-id="9558"><span data-dcnode-id="9562" instrument_node="">Body temperature of animals is a very important indicator of their physiological well-being. For this purpose, </span><a class="topic-link" data-dcnode-id="9560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/thermistors" title="Learn more about thermistors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9561" instrument_node="">thermistors</span></a><span data-dcnode-id="9559" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="9556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/thermocouples" title="Learn more about thermocouples from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9557" instrument_node="">thermocouples</span></a><span data-dcnode-id="9555" instrument_node=""> and infrared radiation sensors can be used. Coupling these technologies with user-friendly interfaces can lead to development of new portable gadgets for farmers, contributing to PLF </span></span><a class="workspace-trigger" data-dcnode-id="9552" href="#bb0035" name="bbb0035"><span data-dcnode-id="9553" instrument_node="">[7]</span></a><span data-dcnode-id="9551" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9549" href="#bb0500" name="bbb0500"><span data-dcnode-id="9550" instrument_node="">[100]</span></a><span data-dcnode-id="9536"><span data-dcnode-id="9548" instrument_node="">. Data obtained by studying the thermoregulation process in animals with factors influencing the body temperature, like pregnancy, parturition and lactation can be used to get an idea of basic status of animal. Body core and basal </span><a class="topic-link" data-dcnode-id="9546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/rectal" title="Learn more about rectal from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9547" instrument_node="">rectal</span></a><span data-dcnode-id="9537"><span data-dcnode-id="9541"><span data-dcnode-id="9545" instrument_node=""> temperatures can be used to analyze body temperature variations and link them with various abnormalities. </span><a class="topic-link" data-dcnode-id="9543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/core-body-temperature" title="Learn more about Body core temperature from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9544" instrument_node="">Body core temperature</span></a><span data-dcnode-id="9542" instrument_node=""> reveals the temperature near major organs of body, such as the heart, viscera and brain. This temperature is measured by rectal, vaginal, vascular and digestive-tract sensors. Mid-peripheral temperature, on the other hand, is the temperature of the body parts intermediate between body core and surface sites. It is thus evaluated through intramuscular chips. Peripheral temperature is measured through an animal's outer surface; microchips are embedded a few centimeters deep into skin to measure this temperature. Similarly, infrared thermal imaging cameras serve as infrared </span></span><a class="topic-link" data-dcnode-id="9539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/radiation-thermometer" title="Learn more about radiation thermometers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9540" instrument_node="">radiation thermometers</span></a><span data-dcnode-id="9538" instrument_node=""> which measure body temperature at various points, thus producing a two-dimensional image called a thermogram. This software-intensive technology allows monitoring the body temperature of animals in different environments </span></span></span><a class="workspace-trigger" data-dcnode-id="9534" href="#bb0025" name="bbb0025"><span data-dcnode-id="9535" instrument_node="">[5]</span></a><span data-dcnode-id="9533" instrument_node="">.</span></p><p data-dcnode-id="9521" id="p0380"><span data-dcnode-id="9531" instrument_node="">Recently, </span><em data-dcnode-id="9529"><span data-dcnode-id="9530" instrument_node="">E</span></em><span data-dcnode-id="9528" instrument_node="">-Pills have been used to track health data. These pills stay in a cow's rumen for a very long time and transmit data through cloud software. In this way, the farmer can successfully collect the important data regarding body temperature, heart rate, etc. of the animal </span><a class="workspace-trigger" data-dcnode-id="9526" href="#bb0005" name="bbb0005"><span data-dcnode-id="9527" instrument_node="">[1]</span></a><span data-dcnode-id="9525" instrument_node="">. Similar sensors have been developed for non-lactating dairy goats </span><a class="workspace-trigger" data-dcnode-id="9523" href="#bb0505" name="bbb0505"><span data-dcnode-id="9524" instrument_node="">[101]</span></a><span data-dcnode-id="9522" instrument_node="">. The use of e-tags, which monitor body temperature to detect disease onset, is also becoming common.</span></p></section><section data-dcnode-id="8992" id="s0125"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9516" id="st0135"><span data-dcnode-id="9519" instrument_node="">2.12</span><span data-dcnode-id="9518" instrument_node="">. </span><span data-dcnode-id="9517" instrument_node="">Saliva analyzer</span></h3><div data-dcnode-id="9435"><p data-dcnode-id="9500" id="p0385"><span data-dcnode-id="9507"><span data-dcnode-id="9515" instrument_node="">Biological fluids of living beings, like tears, sweat, and saliva, can be used for testing health and detecting pathological conditions. Similarly, breath and </span><a class="topic-link" data-dcnode-id="9513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/interstitial-fluid" title="Learn more about interstitial fluids from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9514" instrument_node="">interstitial fluids</span></a><span data-dcnode-id="9508"><span data-dcnode-id="9512" instrument_node=""> of the body can also be used for this purpose. Noninvasive monitoring of </span><a class="topic-link" data-dcnode-id="9510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/uric-acid" title="Learn more about uric acid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9511" instrument_node="">uric acid</span></a><span data-dcnode-id="9509" instrument_node=""> in saliva can be done using a mouth guard with an integrated screen-printed electrode system. The uricase enzyme is utilized in this system, which uses electronics (potentiostat, Bluetooth and microcontroller). Usually, biosensors require a lot of power. However, this platform is capable of transmitting information to laptops and smartphones, where the information can be processed and stored. This mouth guard biosensor is highly selective and stable for uric acid detection in saliva, since it covers a large range of concentrations. This real-time biosensor is an wearable monitor being employed in different health applications </span></span></span><a class="workspace-trigger" data-dcnode-id="9505" href="#bb0175" name="bbb0175"><span data-dcnode-id="9506" instrument_node="">[35]</span></a><span data-dcnode-id="9504" instrument_node="">. Analyzing saliva is a noninvasive, readily available method. It is extremely useful in analyzing mouth conditions and Gastrophageal Reflux Diseases (</span><a class="workspace-trigger" data-dcnode-id="9502" href="#t0015" name="bt0015"><span data-dcnode-id="9503" instrument_node="">Table 3</span></a><span data-dcnode-id="9501" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="9436" id="t0015"><span class="captions" data-dcnode-id="9490"><span data-dcnode-id="9491" id="ca0040"><p data-dcnode-id="9492" id="sp0040"><span class="label" data-dcnode-id="9498"><span data-dcnode-id="9499" instrument_node="">Table 3</span></span><span data-dcnode-id="9497" instrument_node="">. </span><span data-dcnode-id="9496" instrument_node="">Selected wearable salivary </span><a class="topic-link" data-dcnode-id="9494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/electrochemical-sensor" title="Learn more about electrochemical sensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9495" instrument_node="">electrochemical sensors</span></a><span data-dcnode-id="9493" instrument_node="">.</span></p></span></span><div class="groups" data-dcnode-id="9437"><table class="rowsep-1 colsep-1" data-dcnode-id="9438"><thead data-dcnode-id="9480"><tr class="valign-top rowsep-1" data-dcnode-id="9481"><th data-dcnode-id="9488" scope="col"><span data-dcnode-id="9489" instrument_node="">Bio fluid</span></th><th data-dcnode-id="9486" scope="col"><span data-dcnode-id="9487" instrument_node="">Methodology/Platform</span></th><th data-dcnode-id="9484" scope="col"><span data-dcnode-id="9485" instrument_node="">Application</span></th><th data-dcnode-id="9482" scope="col"><span data-dcnode-id="9483" instrument_node="">References</span></th></tr></thead><tbody data-dcnode-id="9439"><tr class="valign-top" data-dcnode-id="9470"><th data-dcnode-id="9478" scope="row"><span data-dcnode-id="9479" instrument_node="">Saliva</span></th><td data-dcnode-id="9476"><span data-dcnode-id="9477" instrument_node="">Enzyme (uricase) modified screen printed electrode system integrated onto a mouth guard platform along with anatomically-miniaturized instrumentation electronics featuring a potentiostat, microcontroller, and a Bluetooth Low Energy(BLE) transceiver</span></td><td data-dcnode-id="9474"><span data-dcnode-id="9475" instrument_node="">Uric acid detection in saliva for various health applications.</span></td><td data-dcnode-id="9471"><a class="workspace-trigger" data-dcnode-id="9472" href="#bb0170" name="bbb0170"><span data-dcnode-id="9473" instrument_node="">[34]</span></a></td></tr><tr class="valign-top" data-dcnode-id="9460"><th data-dcnode-id="9468" scope="row"><span data-dcnode-id="9469" instrument_node="">Saliva</span></th><td data-dcnode-id="9466"><span data-dcnode-id="9467" instrument_node="">Microfluidic health monitoring device in a lollipop (Lollylab system) using saliva as sample. The chip is embedded with a candy shell that includes saliva stimulants.</span></td><td data-dcnode-id="9464"><span data-dcnode-id="9465" instrument_node="">Disease monitoring, pregnancy testing, hormone monitoring, detection of virus and strep throat infection in livestock animals, and monitoring of medications</span></td><td data-dcnode-id="9461"><a class="workspace-trigger" data-dcnode-id="9462" href="#bb0490" name="bbb0490"><span data-dcnode-id="9463" instrument_node="">[98]</span></a></td></tr><tr class="valign-top" data-dcnode-id="9450"><th data-dcnode-id="9458" scope="row"><span data-dcnode-id="9459" instrument_node="">Saliva</span></th><td data-dcnode-id="9456"><span data-dcnode-id="9457" instrument_node="">Carbon nanotubes and graphene</span></td><td data-dcnode-id="9454"><span data-dcnode-id="9455" instrument_node="">Analyzing the mouth conditions and Gastrophageal Reflux Diseases. Monitoring lactate variations in saliva is another practice which is being used for the detection of health conditions in animals</span></td><td data-dcnode-id="9451"><a class="workspace-trigger" data-dcnode-id="9452" href="#bb0195" name="bbb0195"><span data-dcnode-id="9453" instrument_node="">[39]</span></a></td></tr><tr class="valign-top" data-dcnode-id="9440"><th data-dcnode-id="9448" scope="row"><span data-dcnode-id="9449" instrument_node="">Saliva</span></th><td data-dcnode-id="9446"><span data-dcnode-id="9447" instrument_node="">Partial chrome-cobalt denture employing potentiometry</span></td><td data-dcnode-id="9444"><span data-dcnode-id="9445" instrument_node="">Fluoride detection using Lanthanum fluoride</span></td><td data-dcnode-id="9441"><a class="workspace-trigger" data-dcnode-id="9442" href="#bb0170" name="bbb0170"><span data-dcnode-id="9443" instrument_node="">[34]</span></a></td></tr></tbody></table></div></div></div><p data-dcnode-id="9422" id="p0390"><span data-dcnode-id="9434" instrument_node="">Monitoring lactate variations in saliva is another practice used to detect health conditions in animals. Materials like carbon nanotubes and graphene can be employed in the production and promotion of such health-care related technologies. Wearable “lab on a chip” systems are gaining popularity among animal handlers. Combining textiles and sensors lead to more robust, mechanically strong microfluidic devices. Polymers like Kapton and </span><a class="topic-link" data-dcnode-id="9432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/mylar" title="Learn more about Mylar from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9433" instrument_node="">Mylar</span></a><span data-dcnode-id="9423"><span data-dcnode-id="9431" instrument_node=""> are used because of their impressive thermostable characteristics. Other materials, like GoreTex, combine hydrophobic properties with water permeability. Similarly, chemical and biosensors can be brought together, as in the case of Google Glass, which can collect all the sensor data from a body. Such novel </span><a class="topic-link" data-dcnode-id="9429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/wearable-technology" title="Learn more about wearable technologies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9430" instrument_node="">wearable technologies</span></a><span data-dcnode-id="9424"><span data-dcnode-id="9428" instrument_node=""> are undoubtedly opening avenues for facilitated animal health management. Glucose can be successfully detected in </span><a class="topic-link" data-dcnode-id="9426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/interstitials" title="Learn more about interstitial from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9427" instrument_node="">interstitial</span></a><span data-dcnode-id="9425" instrument_node=""> body fluids and is an analyte of great interest. Other analytes, like ethanol, can also be quantified through skin poration. This technique does not cause pain and acts as an interstitial harvesting system.</span></span></span></p><p data-dcnode-id="9401" id="p0395"><span data-dcnode-id="9413"><span data-dcnode-id="9421" instrument_node="">Breath monitoring for clinical analysis and therapy is catching the interest of livestock handlers as well. The amounts of oxygen and </span><a class="topic-link" data-dcnode-id="9419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/nitric-oxide" title="Learn more about nitric oxide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9420" instrument_node="">nitric oxide</span></a><span data-dcnode-id="9414"><span data-dcnode-id="9418" instrument_node=""> in breath give an understanding of health conditions. The vapors emitted from animal's breath makes the noninvasive detection of different analytes possible. However, there are challenges associated with this method as well. These include humidity interference and insufficient accuracy of breath measurement methods. Portable hand-held breath analyzers are quite helpful in this regard. These sensors are based on basic </span><a class="topic-link" data-dcnode-id="9416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/electrochemical-technique" title="Learn more about electrochemical techniques from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9417" instrument_node="">electrochemical techniques</span></a><span data-dcnode-id="9415" instrument_node="">. They contain a pressure meter, spectrometer, and a </span></span></span><a class="topic-link" data-dcnode-id="9411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/teflon" title="Learn more about Teflon from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9412" instrument_node="">Teflon</span></a><span data-dcnode-id="9402"><span data-dcnode-id="9410" instrument_node=""> piece attached to a Mylar balloon for breath sample collection. Many monitoring tools, like oxygen breath analyzers, contain sensors based on Organically Modified Silicate, or sol-gel. Ruthenium oxygen-sensitive luminophores and </span><a class="topic-link" data-dcnode-id="9408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/fluorophore" title="Learn more about fluorophores from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9409" instrument_node="">fluorophores</span></a><span data-dcnode-id="9403"><span data-dcnode-id="9407" instrument_node=""> produce </span><a class="topic-link" data-dcnode-id="9405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/fluorescence-emission" title="Learn more about fluorescence emissions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9406" instrument_node="">fluorescence emissions</span></a><span data-dcnode-id="9404" instrument_node=""> after interacting with oxygen. These devices have an appreciably good response time which make them preferable.</span></span></span></p><div data-dcnode-id="8993"><p data-dcnode-id="9373" id="p0400"><span data-dcnode-id="9392"><span data-dcnode-id="9400" instrument_node="">Ammonia can also be detected in breath, and is an indicator of many stomach infections. Ammonia can also give insight into the respiratory system of animal, since it diffuses out of blood and travels to lungs. Similarly, pH can also be monitored with the help of sensors. Such sensors use textile-based fluid-handling systems along with optical pH sensors containing </span><a class="topic-link" data-dcnode-id="9398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/bromocresol-purple" title="Learn more about bromocresol purple from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9399" instrument_node="">bromocresol purple</span></a><span data-dcnode-id="9393"><span data-dcnode-id="9397" instrument_node="">. The sensors measuring sodium levels in sweat contain </span><a class="topic-link" data-dcnode-id="9395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/ion-selective-electrode" title="Learn more about Ion Selective Electrodes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9396" instrument_node="">Ion Selective Electrodes</span></a><span data-dcnode-id="9394" instrument_node="">. Some wearable technologies (</span></span></span><a class="workspace-trigger" data-dcnode-id="9390" href="#t0020" name="bt0020"><span data-dcnode-id="9391" instrument_node="">Table 4</span></a><span data-dcnode-id="9377"><span data-dcnode-id="9389" instrument_node="">) also contain attached </span><a class="topic-link" data-dcnode-id="9387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/bluetooth-device" title="Learn more about Bluetooth devices from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9388" instrument_node="">Bluetooth devices</span></a><span data-dcnode-id="9378"><span data-dcnode-id="9386" instrument_node="">. The introduction of screen-printed technologies that attach electrodes to skin are also gaining success. </span><a class="topic-link" data-dcnode-id="9384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/potentiometric-sensor" title="Learn more about Potentiometric sensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9385" instrument_node="">Potentiometric sensors</span></a><span data-dcnode-id="9379"><s age"><span class="anchor-text" data-dcnode-id="9040"><span data-dcnode-id="9043" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9041"><span data-dcnode-id="9042" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9022"><span data-dcnode-id="9023" id="ca0020"><p data-dcnode-id="9024" id="sp0020"><span class="label" data-dcnode-id="9034"><span data-dcnode-id="9035" instrument_node="">Fig. 4</span></span><span data-dcnode-id="9033" instrument_node="">. </span><span data-dcnode-id="9028"><span data-dcnode-id="9032" instrument_node="">Schematic of a health indicating parameters and biomarkers measured by </span><a class="topic-link" data-dcnode-id="9030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biosensors" title="Learn more about biosensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9031" instrument_node="">biosensors</span></a><span data-dcnode-id="9029" instrument_node=""> in a Poultry farm </span></span><a class="workspace-trigger" data-dcnode-id="9026" href="#bb0265" name="bbb0265"><span data-dcnode-id="9027" instrument_node="">[53]</span></a><span data-dcnode-id="9025" instrument_node="">.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="8994" id="f0025"><span data-dcnode-id="9005"><img alt="Fig. 5" aria-describedby="ca0025" data-dcnode-id="9020" height="306" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2214180416301350-gr5.jpg&amp;raw"><span data-dcnode-id="9019" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9006"><li data-dcnode-id="9013"><a class="anchor download-link u-font-sans" data-dcnode-id="9014" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2214180416301350-gr5_lrg.jpg" target="_blank" title="Download high-res image (113KB)"><span class="anchor-text" data-dcnode-id="9015"><span data-dcnode-id="9018" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9016"><span data-dcnode-id="9017" instrument_node="">Download high-res image (113KB)</span></span></span></a></li><li data-dcnode-id="9007"><a class="anchor download-link u-font-sans" data-dcnode-id="9008" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2214180416301350-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9009"><span data-dcnode-id="9012" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9010"><span data-dcnode-id="9011" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8995"><span data-dcnode-id="8996" id="ca0025"><p data-dcnode-id="8997" id="sp0025"><span class="label" data-dcnode-id="9003"><span data-dcnode-id="9004" instrument_node="">Fig. 5</span></span><span data-dcnode-id="9002" instrument_node="">. </span><span data-dcnode-id="9001" instrument_node="">Schematic showing a framework deploying sensor technologies for detecting low-weight pigs </span><a class="workspace-trigger" data-dcnode-id="8999" href="#bb0045" name="bbb0045"><span data-dcnode-id="9000" instrument_node="">[9]</span></a><span data-dcnode-id="8998" instrument_node="">.</span></p></span></span></figure></div></section><section data-dcnode-id="8928" id="s0130"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8988" id="st0140"><span data-dcnode-id="8991" instrument_node="">2.13</span><span data-dcnode-id="8990" instrument_node="">. </span><span data-dcnode-id="8989" instrument_node="">Monitoring of metabolites</span></h3><p data-dcnode-id="8960" id="p0405"><span data-dcnode-id="8971"><span data-dcnode-id="8983"><span data-dcnode-id="8987" instrument_node="">Monitoring metabolic activities of animals is important. Integrating bio-nanosensors to detect metabolites like lactate, glucose and ATP is being evaluated with animal models. These sensors contain electrochemical components combined with a radio frequency communication system with an antenna. This system has proved to be reliable when tested on animal models. These bio-nanosensors have also been tested for inflammation in tissues when introduced in the animal models. No effect was seen on the concentration of ATP in the subcutaneous </span><a class="topic-link" data-dcnode-id="8985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microenvironments" title="Learn more about microenvironment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8986" instrument_node="">microenvironment</span></a><span data-dcnode-id="8984" instrument_node=""> by suture. However, </span></span><a class="topic-link" data-dcnode-id="8981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/neutrophil" title="Learn more about neutrophils from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8982" instrument_node="">neutrophils</span></a><span data-dcnode-id="8972"><span data-dcnode-id="8980" instrument_node=""> </span><a class="topic-link" data-dcnode-id="8978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/infiltration" title="Learn more about infiltration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8979" instrument_node="">infiltration</span></a><span data-dcnode-id="8973"><span data-dcnode-id="8977" instrument_node=""> is detected by </span><a class="topic-link" data-dcnode-id="8975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/invasive-procedure" title="Learn more about invasive procedures from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8976" instrument_node="">invasive procedures</span></a><span data-dcnode-id="8974" instrument_node="">, like puncturing for biochip or nano-biosensor implantation of Nano-Bio-Sensors </span></span></span></span><a class="workspace-trigger" data-dcnode-id="8969" href="#bb0510" name="bbb0510"><span data-dcnode-id="8970" instrument_node="">[102]</span></a><span data-dcnode-id="8964"><span data-dcnode-id="8968" instrument_node="">. After hemorrhage, the intestinal tract is the organs which is involved in an ischemic injury, which can be measured by glucose and lactate. Intestinal ischemia causes variation of intracellular </span><a class="topic-link" data-dcnode-id="8966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/biochemical-marker" title="Learn more about biochemical markers from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8967" instrument_node="">biochemical markers</span></a><span data-dcnode-id="8965" instrument_node="">, which assists in the physiological monitoring of the bowel under stress. Online biosensors have been used successfully to monitor the effect of hypoxia on metabolic rates </span></span><a class="workspace-trigger" data-dcnode-id="8962" href="#bb0515" name="bbb0515"><span data-dcnode-id="8963" instrument_node="">[103]</span></a><span data-dcnode-id="8961" instrument_node="">.</span></p><p data-dcnode-id="8929" id="p0410"><span data-dcnode-id="8947"><span data-dcnode-id="8955"><span data-dcnode-id="8959" instrument_node="">Monitoring the metabolism of free-moving animals can sometimes be an arduous task. However, an </span><a class="topic-link" data-dcnode-id="8957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/medical-implant" title="Learn more about implantable device from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8958" instrument_node="">implantable device</span></a><span data-dcnode-id="8956" instrument_node=""> with a micro-fabricated sensing platform, a power coil and custom designed integrated circuits has been proposed. It allows the electrochemical detection of endogenous and exogenous metabolites. An epoxy-enhanced </span></span><a class="topic-link" data-dcnode-id="8953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/polyurethanes" title="Learn more about polyurethane from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8954" instrument_node="">polyurethane</span></a><span data-dcnode-id="8948"><span data-dcnode-id="8952" instrument_node=""> membrane capable of retaining </span><a class="topic-link" data-dcnode-id="8950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/enzyme-activity" title="Learn more about enzyme activity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8951" instrument_node="">enzyme activity</span></a><span data-dcnode-id="8949" instrument_node=""> up to 35</span></span></span><span data-dcnode-id="8946" instrument_node="">&nbsp;</span><span data-dcnode-id="8933"><span data-dcnode-id="8941"><span data-dcnode-id="8945" instrument_node="">days was used for biocompatibility. Using a biocompatible membrane produced less inflammation at the site of implantation of device. Electrochemical sensors for glucose and lactate measurement in animal bodies are commercially available, and more such prototypes are being validated. Implantable devices for monitoring drugs would help personalize dosages of drugs for animals. Electrochemical sensors are being proved as ideal devices for rapid analyte detection and are helping us monitor the therapeutic range of various metabolites. The sensor sensitivity is improved by using nanostructured materials. The biocompatibility of sensors should, however, be addressed. Carbon nanotubes have proved to be advantageous in recent research, but they may be toxic. When implanting a sensor in animal body, the </span><a class="topic-link" data-dcnode-id="8943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/sensor-stability" title="Learn more about sensor stability from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8944" instrument_node="">sensor stability</span></a><span data-dcnode-id="8942" instrument_node=""> must be kept in mind, so the host can tolerate the sensor and there is a limited </span></span><a class="topic-link" data-dcnode-id="8939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/foreign-body-reaction" title="Learn more about foreign body reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8940" instrument_node="">foreign body reaction</span></a><span data-dcnode-id="8934"><span data-dcnode-id="8938" instrument_node="">. Moreover, sufficient power should be supplied to these </span><a class="topic-link" data-dcnode-id="8936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/implanted-device" title="Learn more about implanted devices from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8937" instrument_node="">implanted devices</span></a><span data-dcnode-id="8935" instrument_node="">, as heavy batteries need to be replaced and may add as an undesirable bulkiness to the device </span></span></span><a class="workspace-trigger" data-dcnode-id="8931" href="#bb0520" name="bbb0520"><span data-dcnode-id="8932" instrument_node="">[104]</span></a><span data-dcnode-id="8930" instrument_node="">.</span></p></section><section data-dcnode-id="8823" id="s0135"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8924" id="st0145"><span data-dcnode-id="8927" instrument_node="">2.14</span><span data-dcnode-id="8926" instrument_node="">. </span><span data-dcnode-id="8925" instrument_node="">Breath analyzer</span></h3><p data-dcnode-id="8889" id="p0415"><span data-dcnode-id="8911"><span data-dcnode-id="8915"><span data-dcnode-id="8919"><span data-dcnode-id="8923" instrument_node="">The composition of </span><a class="topic-link" data-dcnode-id="8921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/volatile-organic-compound" title="Learn more about volatile organic compounds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8922" instrument_node="">volatile organic compounds</span></a><span data-dcnode-id="8920" instrument_node=""> in the breath can provide deep insight about </span></span><a class="topic-link" data-dcnode-id="8917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/blood-glucose" title="Learn more about blood glucose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8918" instrument_node="">blood glucose</span></a><span data-dcnode-id="8916" instrument_node=""> level. The Volatile Organic Compounds (VOC)s are separated and quantified for this purpose. Usually, the glucose level in blood is associated with VOCs like </span></span><a class="topic-link" data-dcnode-id="8913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/ketone-body" title="Learn more about ketone bodies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8914" instrument_node="">ketone bodies</span></a><span data-dcnode-id="8912" instrument_node="">, ethanol, methanol and exogenous compounds </span></span><a class="workspace-trigger" data-dcnode-id="8909" href="#bb0525" name="bbb0525"><span data-dcnode-id="8910" instrument_node="">[105]</span></a><span data-dcnode-id="8900"><span data-dcnode-id="8904"><span data-dcnode-id="8908" instrument_node="">. Moreover, volatile composition of the exhaled breath can be used for breath analysis—a noninvasive approach for urgent diagnosis. These diseases include many cardiovascular (CVDs) and chronic respiratory diseases. The volatile composition of breath reflects the composition of bloodstream and airways, which gives a comprehensive status of the organism's metabolism. Procedures like solid-phase and needle trap </span><a class="topic-link" data-dcnode-id="8906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/microextraction" title="Learn more about micro extraction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8907" instrument_node="">micro extraction</span></a><span data-dcnode-id="8905" instrument_node=""> can be combined with modern analytical technologies, such as </span></span><a class="topic-link" data-dcnode-id="8902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/mass-spectrometry" title="Learn more about mass spectrometry from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8903" instrument_node="">mass spectrometry</span></a><span data-dcnode-id="8901" instrument_node="">, which allows the analysis of exhaled breath. This facilitates the statistical analysis of heterogeneous datasets obtained from research and allows early disease diagnosis </span></span><a class="workspace-trigger" data-dcnode-id="8898" href="#bb0530" name="bbb0530"><span data-dcnode-id="8899" instrument_node="">[106]</span></a><span data-dcnode-id="8893"><span data-dcnode-id="8897" instrument_node="">. Scent detection from animals by electronic devices can be used for disease detection. Dogs and rats are frequently used for the detection of lung cancer and tuberculosis. Their noses have special sensory cells that detect the presence of certain </span><a class="topic-link" data-dcnode-id="8895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/volatile-agent" title="Learn more about volatile compounds from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8896" instrument_node="">volatile compounds</span></a><span data-dcnode-id="8894" instrument_node="">. Man-made electronic devices, such as Enoses, has attempted to replicate this intricate biological system with moderate success </span></span><a class="workspace-trigger" data-dcnode-id="8891" href="#bb0535" name="bbb0535"><span data-dcnode-id="8892" instrument_node="">[107]</span></a><span data-dcnode-id="8890" instrument_node="">.</span></p><p data-dcnode-id="8841" id="p0420"><span data-dcnode-id="8888" instrument_node="">Bovine tuberculosis is a cattle disease with an international public health importance. The ability to identify volatile organic compounds produced by pathogens has led to an emerging interest in human and veterinary medicine alike in diagnosing this disease. </span><em data-dcnode-id="8886"><span data-dcnode-id="8887" instrument_node="">M</span></em><span data-dcnode-id="8885" instrument_node="">. </span><em data-dcnode-id="8883"><span data-dcnode-id="8884" instrument_node="">bovis</span></em><span data-dcnode-id="8882" instrument_node=""> infection can be easily identified through changes in the volatile organic compound profiles present in breath </span><a class="workspace-trigger" data-dcnode-id="8880" href="#bb0540" name="bbb0540"><span data-dcnode-id="8881" instrument_node="">[108]</span></a><span data-dcnode-id="8863"><span data-dcnode-id="8879" instrument_node="">. Many established breath biomarkers, like ammonia, methane, carbon dioxide, </span><a class="topic-link" data-dcnode-id="8877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/acetone" title="Learn more about acetone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8878" instrument_node="">acetone</span></a><span data-dcnode-id="8864"><span data-dcnode-id="8876" instrument_node=""> and nitric oxide, can be analyzed by high-sensitivity laser spectroscopic techniques, like tunable </span><a class="topic-link" data-dcnode-id="8874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/diode-laser-absorption-spectroscopy" title="Learn more about diode laser absorption spectroscopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8875" instrument_node="">diode laser absorption spectroscopy</span></a><span data-dcnode-id="8865"><span data-dcnode-id="8873" instrument_node=""> (TDLAS), integrated cavity output spectroscopy (ICOS), cavity leak out spectroscopy (CALOS), </span><a class="topic-link" data-dcnode-id="8871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/chemistry/cavity-enhanced-absorption-spectroscopy" title="Learn more about cavity enhanced absorption spectroscopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8872" instrument_node="">cavity enhanced absorption spectroscopy</span></a><span data-dcnode-id="8866"><span data-dcnode-id="8870" instrument_node=""> (CEAS), and quartz enhanced photoacoustic spectroscopy (QEPAS). Fingerprints of the biomarkers extend from UV to IR </span><a class="topic-link" data-dcnode-id="8868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/spectral-region" title="Learn more about spectral regions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8869" instrument_node="">spectral regions</span></a><span data-dcnode-id="8867" instrument_node="">. These sensors, using the laser spectroscopic techniques, are now commercially available and employed for breath analysis </span></span></span></span></span><a class="workspace-trigger" data-dcnode-id="8861" href="#bb0545" name="bbb0545"><span data-dcnode-id="8862" instrument_node="">[109]</span></a><span data-dcnode-id="8860" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8858" href="#bb0550" name="bbb0550"><span data-dcnode-id="8859" instrument_node="">[110]</span></a><span data-dcnode-id="8857" instrument_node="">. Gas-chromatography/mass-spectrometry analysis can reveal the presence of VOCs associated with </span><em data-dcnode-id="8855"><span data-dcnode-id="8856" instrument_node="">M</span></em><span data-dcnode-id="8854" instrument_node="">. </span><em data-dcnode-id="8852"><span data-dcnode-id="8853" instrument_node="">bovis</span></em><span data-dcnode-id="8851" instrument_node=""> infection. A nanotechnology-based array of sensors has been tailored for detection of </span><em data-dcnode-id="8849"><span data-dcnode-id="8850" instrument_node="">M</span></em><span data-dcnode-id="8848" instrument_node="">. </span><em data-dcnode-id="8846"><span data-dcnode-id="8847" instrument_node="">bovis</span></em><span data-dcnode-id="8845" instrument_node="">-infected cattle via breath, which allows real-time cattle monitoring </span><a class="workspace-trigger" data-dcnode-id="8843" href="#bb0555" name="bbb0555"><span data-dcnode-id="8844" instrument_node="">[111]</span></a><span data-dcnode-id="8842" instrument_node="">.</span></p><p data-dcnode-id="8824" id="p0425"><span data-dcnode-id="8840" instrument_node="">Sources of foot-and-mouth disease can be identified using a noninvasive general screening approach. This method employs hand-held air samplers using electrostatic particle capture, which captures airborne infectious agents and are later subjected to real-time PCR. This technique allows foot and mouth disease virus monitoring in epidemiological contingencies </span><a class="workspace-trigger" data-dcnode-id="8838" href="#bb0560" name="bbb0560"><span data-dcnode-id="8839" instrument_node="">[112]</span></a><span data-dcnode-id="8837" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8835" href="#bb0565" name="bbb0565"><span data-dcnode-id="8836" instrument_node="">[113]</span></a><span data-dcnode-id="8834" instrument_node="">. Arrays of monolayer-capped gold nanoparticle (GNP) sensors can be used effectively, in combination with pattern recognition methods, for fast and cost-effective diagnostic results from exhaled breath samples. The rationale and benefits of using breath analysis utilizing monolayer-capped GNP sensors in different fields of medicine like infectiology, respiratory medicine and oncology have been thoroughly determined </span><a class="workspace-trigger" data-dcnode-id="8832" href="#bb0570" name="bbb0570"><span data-dcnode-id="8833" instrument_node="">[114]</span></a><span data-dcnode-id="8831" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8829" href="#bb0575" name="bbb0575"><span data-dcnode-id="8830" instrument_node="">[115]</span></a><span data-dcnode-id="8828" instrument_node="">. A recent patent, which may be helpful to determine respiratory health in animals, can detect carbon dioxide from fluid </span><a class="workspace-trigger" data-dcnode-id="8826" href="#bb0375" name="bbb0375"><span data-dcnode-id="8827" instrument_node="">[75]</span></a><span data-dcnode-id="8825" instrument_node="">.</span></p></section><section data-dcnode-id="8811" id="s0140"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8819" id="st0150"><span data-dcnode-id="8822" instrument_node="">2.15</span><span data-dcnode-id="8821" instrument_node="">. </span><span data-dcnode-id="8820" instrument_node="">Digital animal health</span></h3><p data-dcnode-id="8817" id="p0430"><span data-dcnode-id="8818" instrument_node="">Advances in digital technology are revolutionizing the animal health market. Apps have been developed to strengthen the relationship between veterinarians and pet owners. Engineers at all leading companies are developing digital technology to fulfill the needs of pet owners, dairy farmers and livestock managers. PetDialog is an app that allows users to monitor exercise and nutritional intake, socialization and other activities with the help of a built-in calendar that sends out alerts for routine care such as vaccines. Veterinary hospitals were found lacking in online appointment scheduling and online money transfers systems, and had cumbersome animal insurance procedures, but new development of digital systems is making it easier to manage animal health. Apps on smartphones can track and send animal behavior to veterinarians for faster, more accurate medical aid.</span></p><p data-dcnode-id="8812" id="p0435"><span data-dcnode-id="8816" instrument_node="">Apps are also being designed to automate long-standing practices in food production. An app called BCS Cowdition has been released in ten languages due to its ability to track cow's body conditions. Many illnesses that spread to humans originate in animals; therefore, digital health technologies can help control disease outbreaks </span><a class="workspace-trigger" data-dcnode-id="8814" href="#bb0580" name="bbb0580"><span data-dcnode-id="8815" instrument_node="">[116]</span></a><span data-dcnode-id="8813" instrument_node="">.</span></p></section><section data-dcnode-id="8799" id="s0145"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8807" id="st0155"><span data-dcnode-id="8810" instrument_node="">2.16</span><span data-dcnode-id="8809" instrument_node="">. </span><span data-dcnode-id="8808" instrument_node="">Economic consequences</span></h3><p data-dcnode-id="8805" id="p0440"><span data-dcnode-id="8806" instrument_node="">Several ingenious sensing devices and concepts have been demonstrated and also proposed in recent past years, but building a miniaturized device that can transmit data in a real-time fashion and also can simultaneously detect multiple target molecules remains a bottleneck.</span></p><p data-dcnode-id="8800" id="p0445"><span data-dcnode-id="8804" instrument_node="">Farmers must consider the economic dimensions of investing in sensors. The accounting data of farms can provide significant information regarding the productivity of these farms and the impact of using sensor systems. A study conducted on 217 Dutch dairy farms has proved to be useful in this regard, giving us insight into the economic consequences of such investments. The Malmquist Total Factor Productivity index is used to measure the productivity change for farms with and without sensor systems. This index reveals the gradual changes in a farm's productivity, and tells us how technical changes contribute to success. Recent studies have suggested that sensor systems may significantly influence the productivity on dairy farms, and this issue needs to be explored for economically viable deployment of sensors. Farmers should be briefed more about techniques to improve the performance of sensor systems, and the claims of the producers of such devices must materialize on farms </span><a class="workspace-trigger" data-dcnode-id="8802" href="#bb0585" name="bbb0585"><span data-dcnode-id="8803" instrument_node="">[117]</span></a><span data-dcnode-id="8801" instrument_node="">.</span></p></section></section><section data-dcnode-id="8772" id="s0150"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8794" id="st0160"><span data-dcnode-id="8797" instrument_node="">3</span><span data-dcnode-id="8796" instrument_node="">. </span><span data-dcnode-id="8795" instrument_node="">Conclusions</span></h2><p data-dcnode-id="8773" id="p0450"><span data-dcnode-id="8785"><span data-dcnode-id="8793" instrument_node="">Animal health is a serious global issue that demands apt scientific techniques. For this purpose, innovative approaches, like the use of </span><a class="topic-link" data-dcnode-id="8791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/biosensors" title="Learn more about biosensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8792" instrument_node="">biosensors</span></a><span data-dcnode-id="8786"><span data-dcnode-id="8790" instrument_node=""> for animal health management, has gained recognition. These sensors are at various steps of </span><a class="topic-link" data-dcnode-id="8788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/commercialisation" title="Learn more about commercialization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8789" instrument_node="">commercialization</span></a><span data-dcnode-id="8787" instrument_node="">, but are making their way into the practical use and application in the domain of animal health. Some technologies for gaining an accurate health status and disease diagnosis are applicable only for humans. With modifications and testing in animal models, these innovative technologies are now being considered for their future use in livestock development and welfare. Precision livestock farming techniques, which include a wide span of technologies, are being applied, along with advanced technologies like </span></span></span><a class="topic-link" data-dcnode-id="8783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/microfluidics" title="Learn more about microfluidics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8784" instrument_node="">microfluidics</span></a><span data-dcnode-id="8774"><span data-dcnode-id="8782" instrument_node="">, sound analyzers, image detection techniques, sweat and saliva sensing, serodiagnosis and others. However, there is a need to integrate all the available sensors and create an efficient online monitoring system, so that animal health can be monitored in real time, without delay. Looking at an optimistic future of different </span><a class="topic-link" data-dcnode-id="8780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/wearable-technology" title="Learn more about wearable technologies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8781" instrument_node="">wearable technologies</span></a><span data-dcnode-id="8775"><span data-dcnode-id="8779" instrument_node=""> for animals, including </span><a class="topic-link" data-dcnode-id="8777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/nanobiosensor" title="Learn more about nano biosensors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8778" instrument_node="">nano biosensors</span></a><span data-dcnode-id="8776" instrument_node=""> and advanced molecular biology diagnostic techniques for the detection of various infectious diseases of cattle, a large-scale adoption of the modern techniques discussed here is likely.</span></span></span></p></section><section data-dcnode-id="8767" id="s0155"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8770" id="st0165"><span data-dcnode-id="8771" instrument_node="">Author contributions</span></h2><p data-dcnode-id="8768" id="p0455"><span data-dcnode-id="8769" instrument_node="">SN designed the concept of this paper, and critically reviewed and drafted the article.</span></p></section><section data-dcnode-id="8762" id="s0160"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8765" id="st0170"><span data-dcnode-id="8766" instrument_node="">Conflicts of interest</span></h2><p data-dcnode-id="8763" id="p0460"><span data-dcnode-id="8764" instrument_node="">The authors declare no conflict of interest.</span></p>
