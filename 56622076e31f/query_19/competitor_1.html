</span><p data-dcnode-id="3846"><b data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Animals in sport</span></b><span data-dcnode-id="3847" instrument_node=""> are a specific form of working animals.  Many animals, at least in more commercial sports, are highly trained.  Two of the most common animals in sport are horses and dogs.

</span><h2 data-dcnode-id="3719"><span class="mw-headline" data-dcnode-id="3727" id="Types_of_animal_sporting_events"><span data-dcnode-id="3728" instrument_node="">Types of animal sporting events</span></span><span class="mw-editsection" data-dcnode-id="3720"><span class="mw-editsection-bracket" data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">[</span></span><a data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D1" title="Edit section: Types of animal sporting events"><span data-dcnode-id="3724" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3718" instrument_node="">
</span><p data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">There are many types of animal sporting events, with varying levels of participation from humans. Some are solely between the animals while others use the animals in a lesser role.  Most sports involve training, while some can also involve selective breeding.
</span></p><p data-dcnode-id="3690"><span data-dcnode-id="3715" instrument_node="">There are some large-scale events that include animals in a variety of sports.  A </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodeo" title="Rodeo"><span data-dcnode-id="3714" instrument_node="">rodeo</span></a><span data-dcnode-id="3712" instrument_node=""> can comprise many different sports, ranging from </span><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bull_riding" title="Bull riding"><span data-dcnode-id="3711" instrument_node="">bull riding</span></a><span data-dcnode-id="3709" instrument_node=""> to </span><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pole_bending" title="Pole bending"><span data-dcnode-id="3708" instrument_node="">pole bending</span></a><span data-dcnode-id="3706" instrument_node="">. Some of the most well known types of animal racing are </span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horse_racing" title="Horse racing"><span data-dcnode-id="3705" instrument_node="">horse racing</span></a><span data-dcnode-id="3703" instrument_node="">, dog racing (e.g. </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greyhound_racing" title="Greyhound racing"><span data-dcnode-id="3702" instrument_node="">Greyhound racing</span></a><span data-dcnode-id="3700" instrument_node="">, </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sled_dog_racing" title="Sled dog racing"><span data-dcnode-id="3699" instrument_node="">sled dog racing</span></a><span data-dcnode-id="3697" instrument_node="">), </span><a data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pigeon_racing" title="Pigeon racing"><span data-dcnode-id="3696" instrument_node="">pigeon racing</span></a><span data-dcnode-id="3694" instrument_node="">, and </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camel_racing" title="Camel racing"><span data-dcnode-id="3693" instrument_node="">camel racing</span></a><span data-dcnode-id="3691" instrument_node="">.
</span></p><span data-dcnode-id="3689" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3680"><div class="thumbinner" data-dcnode-id="3681" style="width:222px;"><a class="image" data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJASDogRace.JPG"><img alt="" class="thumbimage" data-dcnode-id="3688" data-file-height="1944" data-file-width="2592" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/be/JASDogRace.JPG/220px-JASDogRace.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/be/JASDogRace.JPG/330px-JASDogRace.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/be/JASDogRace.JPG/440px-JASDogRace.JPG 2x" width="220"></a><span data-dcnode-id="3686" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3682"><div class="magnify" data-dcnode-id="3684"><a class="internal" data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJASDogRace.JPG" title="Enlarge"></a></div><span data-dcnode-id="3683" instrument_node="">Greyhounds preparing for a race.</span></div></div></div><span data-dcnode-id="3679" instrument_node="">
</span><h3 data-dcnode-id="3669"><span class="mw-headline" data-dcnode-id="3677" id="Racing"><span data-dcnode-id="3678" instrument_node="">Racing</span></span><span class="mw-editsection" data-dcnode-id="3670"><span class="mw-editsection-bracket" data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">[</span></span><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D2" title="Edit section: Racing"><span data-dcnode-id="3674" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3668" instrument_node="">
</span><p data-dcnode-id="3654"><span data-dcnode-id="3667" instrument_node="">Racing is the most popular form of animal-related sport, particularly </span><a data-dcnode-id="3665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horse_racing" title="Horse racing"><span data-dcnode-id="3666" instrument_node="">horse racing</span></a><span data-dcnode-id="3664" instrument_node="">.  Some racing events directly involve humans as riders while others see the animals race alone.  In some sports the rider is not directly riding the animal, instead being pulled along.  Examples of this include </span><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harness_racing" title="Harness racing"><span data-dcnode-id="3663" instrument_node="">harness racing</span></a><span data-dcnode-id="3661" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dogsled_racing" title="Dogsled racing"><span data-dcnode-id="3660" instrument_node="">dogsled racing</span></a><span data-dcnode-id="3658" instrument_node=""> and popular ancient Greece and Roman Empire sport of </span><a data-dcnode-id="3656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chariot_racing" title="Chariot racing"><span data-dcnode-id="3657" instrument_node="">chariot racing</span></a><span data-dcnode-id="3655" instrument_node="">.
</span></p><p data-dcnode-id="3632"><a data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greyhound_racing" title="Greyhound racing"><span data-dcnode-id="3653" instrument_node="">Greyhound racing</span></a><span data-dcnode-id="3651" instrument_node="">, a popular form of animal racing, dates back to the 1800s in the United States, after the dogs were brought over from Europe to help control the </span><a data-dcnode-id="3649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hare" title="Hare"><span data-dcnode-id="3650" instrument_node="">hare</span></a><span data-dcnode-id="3648" instrument_node=""> population. While track racing is the most common, there are other forms of racing.  </span><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pigeon_racing" title="Pigeon racing"><span data-dcnode-id="3647" instrument_node="">Pigeon racing</span></a><span data-dcnode-id="3645" instrument_node="">, for example, sees </span><a class="mw-redirect" data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homing_pigeons" title="Homing pigeons"><span data-dcnode-id="3644" instrument_node="">homing pigeons</span></a><span data-dcnode-id="3642" instrument_node=""> finding their way home from a set distance away. </span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kambala" title="Kambala"><span data-dcnode-id="3641" instrument_node="">Kambala</span></a><span data-dcnode-id="3639" instrument_node="">, he-buffalo racing in coastal </span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="3638" instrument_node="">Karnataka</span></a><span data-dcnode-id="3636" instrument_node="">, India is a rural spectator racing conducted every year during winter in about 50 towns/villages.
Racing events are a common way to </span><a data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gambling" title="Gambling"><span data-dcnode-id="3635" instrument_node="">gamble</span></a><span data-dcnode-id="3633" instrument_node="">, with billions spent worldwide every year.  This is one reason that some countries or states have made such sports illegal.
</span></p><span data-dcnode-id="3631" instrument_node="">
</span><h3 data-dcnode-id="3621"><span class="mw-headline" data-dcnode-id="3629" id="One-on-one_and_team_events"><span data-dcnode-id="3630" instrument_node="">One-on-one and team events</span></span><span class="mw-editsection" data-dcnode-id="3622"><span class="mw-editsection-bracket" data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">[</span></span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D3" title="Edit section: One-on-one and team events"><span data-dcnode-id="3626" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3603"><span data-dcnode-id="3619" instrument_node="">There are some non-racing competitive events involving animals.  </span><a data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polo" title="Polo"><span data-dcnode-id="3618" instrument_node="">Polo</span></a><span data-dcnode-id="3616" instrument_node=""> is an example, with competitors hitting a </span><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ball" title="Ball"><span data-dcnode-id="3615" instrument_node="">ball</span></a><span data-dcnode-id="3613" instrument_node=""> with </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mallet" title="Mallet"><span data-dcnode-id="3612" instrument_node="">mallets</span></a><span data-dcnode-id="3610" instrument_node=""> while on horseback.  </span><a data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elephant_polo" title="Elephant polo"><span data-dcnode-id="3609" instrument_node="">Elephant polo</span></a><span data-dcnode-id="3607" instrument_node=""> dates back to the early 20th century when members of the British aristocracy in </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nepal" title="Nepal"><span data-dcnode-id="3606" instrument_node="">Nepal</span></a><span data-dcnode-id="3604" instrument_node=""> began playing the sport.
</span></p><p data-dcnode-id="3598"><span data-dcnode-id="3602" instrument_node="">In the 14th to 16th centuries </span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jousting" title="Jousting"><span data-dcnode-id="3601" instrument_node="">jousting</span></a><span data-dcnode-id="3599" instrument_node=""> was a popular one-on-one tournament event involving knights on horseback.
</span></p><span data-dcnode-id="3597" instrument_node="">
</span><h3 data-dcnode-id="3587"><span class="mw-headline" data-dcnode-id="3595" id="Fighting"><span data-dcnode-id="3596" instrument_node="">Fighting</span></span><span class="mw-editsection" data-dcnode-id="3588"><span class="mw-editsection-bracket" data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">[</span></span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D4" title="Edit section: Fighting"><span data-dcnode-id="3592" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3586" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3577"><div class="thumbinner" data-dcnode-id="3578" style="width:222px;"><a class="image" data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABull_attacks_matador.jpg"><img alt="" class="thumbimage" data-dcnode-id="3585" data-file-height="409" data-file-width="600" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/24/Bull_attacks_matador.jpg/220px-Bull_attacks_matador.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/24/Bull_attacks_matador.jpg/330px-Bull_attacks_matador.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/24/Bull_attacks_matador.jpg/440px-Bull_attacks_matador.jpg 2x" width="220"></a><span data-dcnode-id="3583" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3579"><div class="magnify" data-dcnode-id="3581"><a class="internal" data-dcnode-id="3582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABull_attacks_matador.jpg" title="Enlarge"></a></div><span data-dcnode-id="3580" instrument_node="">Bullfighting is lawful in some countries.</span></div></div></div><span data-dcnode-id="3576" instrument_node="">
</span><p data-dcnode-id="3540"><span data-dcnode-id="3575" instrument_node="">In most countries, the act of causing two or more animals to fight each other, as in </span><a class="mw-redirect" data-dcnode-id="3573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cockfighting" title="Cockfighting"><span data-dcnode-id="3574" instrument_node="">cockfighting</span></a><span data-dcnode-id="3572" instrument_node=""> and </span><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dog_fighting" title="Dog fighting"><span data-dcnode-id="3571" instrument_node="">dog fighting</span></a><span data-dcnode-id="3569" instrument_node="">, is seen as cruel and is therefore banned by the law.  Some animal fights are lawful in countries around the world, including </span><a class="mw-redirect" data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cow_fighting" title="Cow fighting"><span data-dcnode-id="3568" instrument_node="">cow fighting</span></a><span data-dcnode-id="3566" instrument_node=""> and </span><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camel_wrestling" title="Camel wrestling"><span data-dcnode-id="3565" instrument_node="">camel wrestling</span></a><span data-dcnode-id="3563" instrument_node="">.  There are also some forms of lawful sport in which humans fight animals, such as </span><a data-dcnode-id="3561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullfighting" title="Bullfighting"><span data-dcnode-id="3562" instrument_node="">bullfighting</span></a><span data-dcnode-id="3560" instrument_node="">, which has a long history in </span><a data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="3559" instrument_node="">Spanish</span></a><span data-dcnode-id="3557" instrument_node=""> and </span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portugal" title="Portugal"><span data-dcnode-id="3556" instrument_node="">Portuguese</span></a><span data-dcnode-id="3554" instrument_node=""> tradition.  Not all animals are large, however, with </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cricket_fighting" title="Cricket fighting"><span data-dcnode-id="3553" instrument_node="">cricket fighting</span></a><span data-dcnode-id="3551" instrument_node=""> being a popular sport in </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macau" title="Macau"><span data-dcnode-id="3550" instrument_node="">Macau</span></a><span data-dcnode-id="3548" instrument_node=""> and </span><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong" title="Hong Kong"><span data-dcnode-id="3547" instrument_node="">Hong Kong</span></a><span data-dcnode-id="3545" instrument_node="">, although gambling on it is now against the law.</span><sup class="reference" data-dcnode-id="3542" id="cite_ref-1"><a data-dcnode-id="3543" href="#cite_note-1"><span data-dcnode-id="3544" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3541" instrument_node="">
</span></p><p data-dcnode-id="3509"><span data-dcnode-id="3539" instrument_node="">There are several other </span><a data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blood_sport" title="Blood sport"><span data-dcnode-id="3538" instrument_node="">blood sports</span></a><span data-dcnode-id="3536" instrument_node=""> in history that were intended as entertainment, many of which involved </span><a class="mw-redirect" data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bait_%28dogs%29" title="Bait (dogs)"><span data-dcnode-id="3535" instrument_node="">baiting by dogs</span></a><span data-dcnode-id="3533" instrument_node="">.  Many different types of animal have been placed into a pit, sometimes tied to a post, and set upon by dogs.  This ranges from </span><a data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rat-baiting" title="Rat-baiting"><span data-dcnode-id="3532" instrument_node="">rat-baiting</span></a><span data-dcnode-id="3530" instrument_node=""> and </span><a data-dcnode-id="3528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badger-baiting" title="Badger-baiting"><span data-dcnode-id="3529" instrument_node="">badger-baiting</span></a><span data-dcnode-id="3527" instrument_node=""> to </span><a data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bear-baiting" title="Bear-baiting"><span data-dcnode-id="3526" instrument_node="">bear-baiting</span></a><span data-dcnode-id="3524" instrument_node=""> and </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lion-baiting" title="Lion-baiting"><span data-dcnode-id="3523" instrument_node="">lion-baiting</span></a><span data-dcnode-id="3521" instrument_node="">.  There are even some tales of </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human-baiting" title="Human-baiting"><span data-dcnode-id="3520" instrument_node="">human-baiting</span></a><span data-dcnode-id="3518" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3511" style="white-space:nowrap;"><span data-dcnode-id="3517" instrument_node="">[</span><i data-dcnode-id="3513"><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3515" title="This claim needs references to reliable sources. (April 2019)"><span data-dcnode-id="3516" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3512" instrument_node="">]</span></sup><span data-dcnode-id="3510" instrument_node="">
</span></p><p data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Animals that take part in animal fights are usually specifically bred for strength and stamina.
</span></p><span data-dcnode-id="3506" instrument_node="">
</span><h3 data-dcnode-id="3496"><span class="mw-headline" data-dcnode-id="3504" id="Killing"><span data-dcnode-id="3505" instrument_node="">Killing</span></span><span class="mw-editsection" data-dcnode-id="3497"><span class="mw-editsection-bracket" data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">[</span></span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D5" title="Edit section: Killing"><span data-dcnode-id="3501" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3495" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3486"><div class="thumbinner" data-dcnode-id="3487" style="width:222px;"><a class="image" data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABedaleHunt2005.jpg"><img alt="" class="thumbimage" data-dcnode-id="3494" data-file-height="581" data-file-width="875" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/65/BedaleHunt2005.jpg/220px-BedaleHunt2005.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/65/BedaleHunt2005.jpg/330px-BedaleHunt2005.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/65/BedaleHunt2005.jpg/440px-BedaleHunt2005.jpg 2x" width="220"></a><span data-dcnode-id="3492" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3488"><div class="magnify" data-dcnode-id="3490"><a class="internal" data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABedaleHunt2005.jpg" title="Enlarge"></a></div><span data-dcnode-id="3489" instrument_node="">Fox hunting has been a recent controversial issue, particularly in the United Kingdom.</span></div></div></div><span data-dcnode-id="3485" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3479" role="note"><span data-dcnode-id="3482" instrument_node="">Main article: </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hunting" title="Hunting"><span data-dcnode-id="3481" instrument_node="">Hunting</span></a></div><span data-dcnode-id="3478" instrument_node="">
</span><p data-dcnode-id="3464"><span data-dcnode-id="3477" instrument_node="">Hunting began as a crucial component of </span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hunter-gatherer" title="Hunter-gatherer"><span data-dcnode-id="3476" instrument_node="">hunter-gatherer</span></a><span data-dcnode-id="3474" instrument_node=""> societies, being an important source of food.  The domestication of animals and the development of </span><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agriculture" title="Agriculture"><span data-dcnode-id="3473" instrument_node="">agriculture</span></a><span data-dcnode-id="3471" instrument_node=""> lessened the need for hunts, with food being more readily available. Hunting became a sport for those of the high </span><a data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_class" title="Social class"><span data-dcnode-id="3470" instrument_node="">social classes</span></a><span data-dcnode-id="3468" instrument_node="">.  In most parts of </span><a class="mw-redirect" data-dcnode-id="3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medieval" title="Medieval"><span data-dcnode-id="3467" instrument_node="">medieval</span></a><span data-dcnode-id="3465" instrument_node=""> Europe, the upper-class (aristocracy and higher clergy) obtained as privilege the sole rights to hunt in certain areas of a feudal territory.
</span></p><p data-dcnode-id="3444"><span data-dcnode-id="3463" instrument_node="">Dangerous hunting, as for lions or wild boars, usually on horseback (or from a </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chariot" title="Chariot"><span data-dcnode-id="3462" instrument_node="">chariot</span></a><span data-dcnode-id="3460" instrument_node="">, as in </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_ancient_Egypt" title="History of ancient Egypt"><span data-dcnode-id="3459" instrument_node="">Pharaonic Egypt</span></a><span data-dcnode-id="3457" instrument_node=""> and </span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamia" title="Mesopotamia"><span data-dcnode-id="3456" instrument_node="">Mesopotamia</span></a><span data-dcnode-id="3454" instrument_node="">) also had function similar to </span><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tournament_%28medieval%29" title="Tournament (medieval)"><span data-dcnode-id="3453" instrument_node="">tournaments</span></a><span data-dcnode-id="3451" instrument_node=""> and manly sports: an honourable, somewhat competitive pastime to help the aristocracy practice skills of war in times of peace.  In </span><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_Rome" title="Ancient Rome"><span data-dcnode-id="3450" instrument_node="">ancient Rome</span></a><span data-dcnode-id="3448" instrument_node=""> the "</span><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venatio" title="Venatio"><span data-dcnode-id="3447" instrument_node="">Venatio</span></a><span data-dcnode-id="3445" instrument_node="">" was a form of entertainment that pitted humans against animals in an amphitheater.
</span></p><p data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">In modern times, hunting is usually legal as long as the hunter has a license, though there are some unregulated forms in some countries.  Animals can be on either side of a hunt, assisting the hunters or being hunted themselves.
</span></p><p data-dcnode-id="3435"><a data-dcnode-id="3440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fox_hunting" title="Fox hunting"><span data-dcnode-id="3441" instrument_node="">Fox hunting</span></a><span data-dcnode-id="3439" instrument_node=""> has been a controversial issue, particularly in the United Kingdom, regarding its necessity and the cruelty involved (See </span><a class="mw-redirect" data-dcnode-id="3437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fox_hunting_legislation" title="Fox hunting legislation"><span data-dcnode-id="3438" instrument_node="">Fox hunting legislation</span></a><span data-dcnode-id="3436" instrument_node="">).
</span></p><span data-dcnode-id="3434" instrument_node="">
</span><h4 data-dcnode-id="3424"><span class="mw-headline" data-dcnode-id="3432" id="Fishing"><span data-dcnode-id="3433" instrument_node="">Fishing</span></span><span class="mw-editsection" data-dcnode-id="3425"><span class="mw-editsection-bracket" data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">[</span></span><a data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D6" title="Edit section: Fishing"><span data-dcnode-id="3429" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3423" instrument_node="">
</span><p data-dcnode-id="3416"><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fishing" title="Fishing"><span data-dcnode-id="3422" instrument_node="">Fishing</span></a><span data-dcnode-id="3420" instrument_node=""> is somewhat different from other sports and is most commonly a pastime or hobby.  However, it can also be </span><a class="mw-redirect" data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sport_fishing" title="Sport fishing"><span data-dcnode-id="3419" instrument_node="">a competitive sport</span></a><span data-dcnode-id="3417" instrument_node="">.
</span></p><span data-dcnode-id="3415" instrument_node="">
</span><h4 data-dcnode-id="3405"><span class="mw-headline" data-dcnode-id="3413" id="Pigeon_shooting"><span data-dcnode-id="3414" instrument_node="">Pigeon shooting</span></span><span class="mw-editsection" data-dcnode-id="3406"><span class="mw-editsection-bracket" data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">[</span></span><a data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D7" title="Edit section: Pigeon shooting"><span data-dcnode-id="3410" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3394"><a class="mw-redirect" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pigeon_shooting" title="Pigeon shooting"><span data-dcnode-id="3403" instrument_node="">Pigeon shooting</span></a><span data-dcnode-id="3401" instrument_node=""> was one of the </span><a data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shooting_at_the_1900_Summer_Olympics" title="Shooting at the 1900 Summer Olympics"><span data-dcnode-id="3400" instrument_node="">shooting events</span></a><span data-dcnode-id="3398" instrument_node=""> of the </span><a data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1900_Summer_Olympics" title="1900 Summer Olympics"><span data-dcnode-id="3397" instrument_node="">1900 Summer Olympics</span></a><span data-dcnode-id="3395" instrument_node="">. Competitors in these events had to kill as many live pigeons as possible. Birds were released one at a time from 'traps' in front of the shooters.
</span></p><span data-dcnode-id="3393" instrument_node="">
</span><h3 data-dcnode-id="3383"><span class="mw-headline" data-dcnode-id="3391" id="Shows_of_training_or_breeding"><span data-dcnode-id="3392" instrument_node="">Shows of training or breeding</span></span><span class="mw-editsection" data-dcnode-id="3384"><span class="mw-editsection-bracket" data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">[</span></span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D8" title="Edit section: Shows of training or breeding"><span data-dcnode-id="3388" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3382" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3370"><div class="thumbinner" data-dcnode-id="3371" style="width:222px;"><a class="image" data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJackRussellJump_wb.jpg"><img alt="" class="thumbimage" data-dcnode-id="3381" data-file-height="410" data-file-width="285" decoding="async" height="316" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/JackRussellJump_wb.jpg/220px-JackRussellJump_wb.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/b/b4/JackRussellJump_wb.jpg 1.5x" width="220"></a><span data-dcnode-id="3379" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3372"><div class="magnify" data-dcnode-id="3377"><a class="internal" data-dcnode-id="3378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJackRussellJump_wb.jpg" title="Enlarge"></a></div><span data-dcnode-id="3376" instrument_node="">A </span><a data-dcnode-id="3374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jack_Russell_Terrier" title="Jack Russell Terrier"><span data-dcnode-id="3375" instrument_node="">Jack Russell Terrier</span></a><span data-dcnode-id="3373" instrument_node=""> competing in a dog agility event.</span></div></div></div><span data-dcnode-id="3369" instrument_node="">
</span><p data-dcnode-id="3343"><span data-dcnode-id="3368" instrument_node="">Shows are intended to highlight the excellence of training or </span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selective_breeding" title="Selective breeding"><span data-dcnode-id="3367" instrument_node="">breeding</span></a><span data-dcnode-id="3365" instrument_node=""> of the animals involved.  There is a variety of horse riding sports in this category, including </span><a data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Show_jumping" title="Show jumping"><span data-dcnode-id="3364" instrument_node="">show jumping</span></a><span data-dcnode-id="3362" instrument_node=""> and </span><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dressage" title="Dressage"><span data-dcnode-id="3361" instrument_node="">dressage</span></a><span data-dcnode-id="3359" instrument_node="">, both of which are featured at the </span><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olympic_Games" title="Olympic Games"><span data-dcnode-id="3358" instrument_node="">Olympic Games</span></a><span data-dcnode-id="3356" instrument_node="">. At lower levels, </span><a data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horse_show" title="Horse show"><span data-dcnode-id="3355" instrument_node="">horse shows</span></a><span data-dcnode-id="3353" instrument_node=""> offer a wide variety of competition both </span><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equestrianism" title="Equestrianism"><span data-dcnode-id="3352" instrument_node="">riding and driving</span></a><span data-dcnode-id="3350" instrument_node=""> as well as </span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halter_%28horse_show%29" title="Halter (horse show)"><span data-dcnode-id="3349" instrument_node="">In-hand</span></a><span data-dcnode-id="3347" instrument_node=""> classes that evaluate </span><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equine_conformation" title="Equine conformation"><span data-dcnode-id="3346" instrument_node="">equine conformation</span></a><span data-dcnode-id="3344" instrument_node="">.
</span></p><p data-dcnode-id="3317"><span data-dcnode-id="3342" instrument_node="">Dogs, being easily </span><a class="mw-redirect" data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Domesticated_animal" title="Domesticated animal"><span data-dcnode-id="3341" instrument_node="">domesticated</span></a><span data-dcnode-id="3339" instrument_node="">, are one of the most popular animals to have in shows. </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cattle" title="Cattle"><span data-dcnode-id="3338" instrument_node="">Cattle</span></a><span data-dcnode-id="3336" instrument_node=""> and </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheepdog_trial" title="Sheepdog trial"><span data-dcnode-id="3335" instrument_node="">sheepdog trials</span></a><span data-dcnode-id="3333" instrument_node=""> are popular in many countries and are used to show how well a dog can </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muster_%28livestock%29" title="Muster (livestock)"><span data-dcnode-id="3332" instrument_node="">gather</span></a><span data-dcnode-id="3330" instrument_node=""> livestock. Other </span><a class="mw-redirect" data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dog_sports" title="Dog sports"><span data-dcnode-id="3329" instrument_node="">dog sports</span></a><span data-dcnode-id="3327" instrument_node=""> of this category include </span><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dog_agility" title="Dog agility"><span data-dcnode-id="3326" instrument_node="">dog agility</span></a><span data-dcnode-id="3324" instrument_node=""> events, whereby the dogs must tackle </span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Obstacle_course" title="Obstacle course"><span data-dcnode-id="3323" instrument_node="">obstacle courses</span></a><span data-dcnode-id="3321" instrument_node="">, and </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Obedience_trial" title="Obedience trial"><span data-dcnode-id="3320" instrument_node="">obedience trials</span></a><span data-dcnode-id="3318" instrument_node="">, where they must execute a predefined set of tasks.
</span></p><p data-dcnode-id="3307"><a data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crufts" title="Crufts"><span data-dcnode-id="3316" instrument_node="">Crufts</span></a><span data-dcnode-id="3314" instrument_node="">, a British </span><a class="mw-redirect" data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conformation_show" title="Conformation show"><span data-dcnode-id="3313" instrument_node="">conformation show</span></a><span data-dcnode-id="3311" instrument_node=""> for dogs, has grown since it started in 1886.  While dogs are the most common show animal, </span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cat_show" title="Cat show"><span data-dcnode-id="3310" instrument_node="">cat shows</span></a><span data-dcnode-id="3308" instrument_node=""> are also common.  Both of these animals have a wide variety of breeds and compete in categories, comparing each individual to the breed "ideal."
</span></p><p data-dcnode-id="3296"><span data-dcnode-id="3306" instrument_node="">Some unusual animals also take part in shows, such as the competitors in </span><a data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabbit_show_jumping" title="Rabbit show jumping"><span data-dcnode-id="3305" instrument_node="">rabbit show jumping</span></a><span data-dcnode-id="3303" instrument_node=""> and </span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_chaffinch" title="Common chaffinch"><span data-dcnode-id="3302" instrument_node="">common chaffinches</span></a><span data-dcnode-id="3300" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vinkenzetting" title="Vinkenzetting"><span data-dcnode-id="3299" instrument_node="">vinkenzetting</span></a><span data-dcnode-id="3297" instrument_node="">.
</span></p><span data-dcnode-id="3295" instrument_node="">
</span><h2 data-dcnode-id="3285"><span class="mw-headline" data-dcnode-id="3293" id="Popular_culture"><span data-dcnode-id="3294" instrument_node="">Popular culture</span></span><span class="mw-editsection" data-dcnode-id="3286"><span class="mw-editsection-bracket" data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">[</span></span><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnimals_in_sport%26action%3Dedit%26section%3D9" title="Edit section: Popular culture"><span data-dcnode-id="3290" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3283" instrument_node="">Films and television series about animals in sport can be realistic or fictional, involving animals in an activity that they cannot really perform.  </span><i data-dcnode-id="3280"><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seabiscuit_%28film%29" title="Seabiscuit (film)"><span data-dcnode-id="3282" instrument_node="">Seabiscuit</span></a></i><span data-dcnode-id="3279" instrument_node=""> is a fairly accurate portrayal of the famous American </span><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seabiscuit" title="Seabiscuit"><span data-dcnode-id="3278" instrument_node="">horse of the same name</span></a><span data-dcnode-id="3276" instrument_node="">, while </span><i data-dcnode-id="3273"><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MVP%3A_Most_Valuable_Primate" title="MVP: Most Valuable Primate"><span data-dcnode-id="3275" instrument_node="">MVP: Most Valuable Primate</span></a></i><span data-dcnode-id="3272" instrument_node="">, a film about a </span><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ice_hockey" title="Ice hockey"><span data-dcnode-id="3271" instrument_node="">hockey</span></a><span data-dcnode-id="3269" instrument_node="">-playing </span><a data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chimpanzee" title="Chimpanzee"><span data-dcnode-id="3268" instrument_node="">chimpanzee</span></a><span data-dcnode-id="3266" instrument_node="">, is unrealistic.
</span></p><p data-dcnode-id="3231"><span data-dcnode-id="3264" instrument_node="">The 1980 </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animation" title="Animation"><span data-dcnode-id="3263" instrument_node="">animated</span></a><span data-dcnode-id="3261" instrument_node=""> film </span><i data-dcnode-id="3258"><a data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animalympics" title="Animalympics"><span data-dcnode-id="3260" instrument_node="">Animalympics</span></a></i><span data-dcnode-id="3257" instrument_node=""> is a spoof of the Olympic Games and features </span><a class="mw-redirect" data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthropomorphic" title="Anthropomorphic"><span data-dcnode-id="3256" instrument_node="">anthropomorphicised</span></a><span data-dcnode-id="3254" instrument_node=""> animals.  In the combination </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Live_action" title="Live action"><span data-dcnode-id="3253" instrument_node="">live action</span></a><span data-dcnode-id="3251" instrument_node=""> and </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animation" title="Animation"><span data-dcnode-id="3250" instrument_node="">animation</span></a><span data-dcnode-id="3248" instrument_node=""> film </span><i data-dcnode-id="3245"><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bedknobs_and_Broomsticks" title="Bedknobs and Broomsticks"><span data-dcnode-id="3247" instrument_node="">Bedknobs and Broomsticks</span></a></i><span data-dcnode-id="3244" instrument_node="">, animated animals play a game of </span><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Association_football" title="Association football"><span data-dcnode-id="3243" instrument_node="">football</span></a><span data-dcnode-id="3241" instrument_node="">.  Similarly, several television commercials used the </span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budweiser_Clydesdales" title="Budweiser Clydesdales"><span data-dcnode-id="3240" instrument_node="">Budweiser Clydesdales</span></a><span data-dcnode-id="3238" instrument_node=""> and other animals in live-action and </span><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_animation" title="Computer animation"><span data-dcnode-id="3237" instrument_node="">CGA</span></a><span data-dcnode-id="3235" instrument_node=""> roles to appear to be playing </span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_football" title="American football"><span data-dcnode-id="3234" instrument_node="">American football</span></a><span data-dcnode-id="3232" instrument_node="">.
</span></p><p data-dcnode-id="3215"><span data-dcnode-id="3230" instrument_node="">From 1976 to 1999, the </span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BBC" title="BBC"><span data-dcnode-id="3229" instrument_node="">BBC</span></a><span data-dcnode-id="3227" instrument_node=""> broadcast </span><i data-dcnode-id="3224"><a data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_Man_and_His_Dog" title="One Man and His Dog"><span data-dcnode-id="3226" instrument_node="">One Man and His Dog</span></a></i><span data-dcnode-id="3223" instrument_node="">, a television series about sheepdog trials.  They also commissioned three series of </span><i data-dcnode-id="3220"><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pets_Win_Prizes" title="Pets Win Prizes"><span data-dcnode-id="3222" instrument_node="">Pets Win Prizes</span></a></i><span data-dcnode-id="3219" instrument_node="">, a </span><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Game_show" title="Game show"><span data-dcnode-id="3218" instrument_node="">game show</span></a><span data-dcnode-id="3216" instrument_node=""> with contestants' pets having to perform in various tasks.
</span></p><p data-dcnode-id="3201"><i data-dcnode-id="3212"><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Man_vs._Beast" title="Man vs. Beast"><span data-dcnode-id="3214" instrument_node="">Man vs. Beast</span></a></i><span data-dcnode-id="3211" instrument_node=""> is an American television show that pitches humans against animals in a variety of unusual challenges, including </span><a data-dcnode-id="3209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Competitive_eating" title="Competitive eating"><span data-dcnode-id="3210" instrument_node="">competitive eating</span></a><span data-dcnode-id="3208" instrument_node=""> between world champion </span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Takeru_Kobayashi" title="Takeru Kobayashi"><span data-dcnode-id="3207" instrument_node="">Takeru Kobayashi</span></a><span data-dcnode-id="3205" instrument_node=""> and a </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brown_bear" title="Brown bear"><span data-dcnode-id="3204" instrument_node="">brown bear</span></a><span data-dcnode-id="3202" instrument_node="">.
</span></p><span data-dcnode-id="3200" instrument_node="">
