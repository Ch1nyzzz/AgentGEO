</span><p data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Australian governments develop public policy to communicate and deliver on strategic intentions. It guides decisions and government investment including support and financial assistance provided to individuals, organisations, and other community groups.</span></p><p data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Australian sport policy reflects the value and importance our society places upon sport. It will often be leveraged by—or integrated with—objectives beyond the sport sector including preventative health and well-being; community and urban development; tourism and trade; and, international relations.</span></p><span data-dcnode-id="2984" instrument_node="">

</span><h3 data-dcnode-id="2886"><span data-dcnode-id="2887" instrument_node="">Roles and responsibilities of Australian governments</span></h3><span data-dcnode-id="2885" instrument_node="">

</span><div class="col-12 col-xl-8 col-lg-10 col-md-11" data-dcnode-id="2856"><p data-dcnode-id="2869" style="border: 0px"><span data-dcnode-id="2874" instrument_node="">Australia has three levels of government - the Australian Government (also referred to as the Commonwealth or Federal Government), State and Territory Governments, and Local Governments (also known as municipal or local councils). More information about the broad roles and responsibilities of these different governments is available from the </span><a data-dcnode-id="2871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.australia.gov.au/about-government/how-government-works" style="border: 0px" target="_blank"><span data-dcnode-id="2873" instrument_node="">How Government Works</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2872"></i></a><span data-dcnode-id="2870" instrument_node=""> website.</span></p><p data-dcnode-id="2867" style="border: 0px"><span data-dcnode-id="2868" instrument_node="">For sport, the Commonwealth, State, and Territory governments work independently and through coordinated approaches to develop and implement sport related policies and programs targeting all or part of the Australian sporting pathway from grassroots to elite level sport.</span></p><p data-dcnode-id="2865" style="border: 0px"><span data-dcnode-id="2866" instrument_node="">Local governments play an important role in developing and maintaining sport and recreation infrastructure, and provide a range of services essential to making sport accessible to all Australians.</span></p><p data-dcnode-id="2863" style="border: 0px"><span data-dcnode-id="2864" instrument_node="">Non-government organisations, such as national and state sporting bodies and their affiliated clubs, work closely with various government agencies to initiate and/or implement sport related programs and services.</span></p><p data-dcnode-id="2858" style="border: 0px"><span data-dcnode-id="2862" instrument_node="">A detailed description of the various segments of the Australian sport sector is provided in the Clearinghouse </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/kb/structure-of-australian-sport" style="border: 0px"><span data-dcnode-id="2861" instrument_node="">Structure of Australian Sport</span></a><span data-dcnode-id="2859" instrument_node=""> topic.</span></p><span data-dcnode-id="2857" instrument_node="">

</span><div class="col-12 pb-2 pt-5 pt-lg-0" data-dcnode-id="2774"><span data-dcnode-id="2778" instrument_node="">
</span><h1 class="h2" data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Australian government involvement in sports policy</span></h1><span data-dcnode-id="2775" instrument_node="">
</span></div><span data-dcnode-id="2773" instrument_node="">
</span></div><span data-dcnode-id="2771" instrument_node="">
</span><div class="row mt-2" data-dcnode-id="2727"><span data-dcnode-id="2770" instrument_node="">
</span><span data-dcnode-id="2767" instrument_node="">
</span><div class="col-12 table-highlight__primary" data-dcnode-id="2729"><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2757" style="border: 0px"><span data-dcnode-id="2765" instrument_node="">Prior to the 1970’s there was limited Australian Government involvement in national sport policy or program development. However, during the Whitlam Government (1972-1975), the </span><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frank_Stewart" style="border: 0px" target="_blank"><span data-dcnode-id="2764" instrument_node="">Hon. Francis 'Frank' Stewart</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2763"></i></a><span data-dcnode-id="2761" instrument_node=""> [</span><em data-dcnode-id="2759" style="border: 0px"><span data-dcnode-id="2760" instrument_node="">Wikipedia</span></em><span data-dcnode-id="2758" instrument_node="">], Minister for Tourism and Recreation, commissioned two significant reports:</span></p><ul data-dcnode-id="2748"><li data-dcnode-id="2749"><span data-dcnode-id="2756" instrument_node="">'</span><a data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/ais/The_Role%2C_Scope_and_Development_of_Recreation_in_Australia.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2755" instrument_node="">The Role, Scope and Development of Recreation in Australia</span></a><span data-dcnode-id="2753" instrument_node="">' (</span><em data-dcnode-id="2751" style="border: 0px"><span data-dcnode-id="2752" instrument_node="">Bloomfield Report</span></em><span data-dcnode-id="2750" instrument_node="">). Professor John Bloomfield AM, (1973). Made a number of key recommendations, including a need for greater emphasis on the professionalism (i.e. governance) of Australian sporting organisations, and strengthening elite sport while championing the need to improve levels of community physical fitness. There was also a focus placed upon the development of a national institute of sport and federal sports funding grants to national sporting organisations and state/territory governments.</span></li></ul><ul data-dcnode-id="2736"><li data-dcnode-id="2737"><span data-dcnode-id="2747" instrument_node="">'</span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/ais/Report_of_the_Australian_Sports_Institute_Study_Group.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2746" instrument_node="">The Report of the Australian Sports Institute Study Group</span></a><span data-dcnode-id="2744" instrument_node="">' (</span><em data-dcnode-id="2742" style="border: 0px"><span data-dcnode-id="2743" instrument_node="">Coles Report</span></em><span data-dcnode-id="2741" instrument_node="">). Dr. Allan Coles, (1975). This report responded to a number of recommendations stemming from the </span><em data-dcnode-id="2739" style="border: 0px"><span data-dcnode-id="2740" instrument_node="">Bloomfield Report </span></em><span data-dcnode-id="2738" instrument_node="">and ;specifically examined the feasibility of a National Institute of Sport. Key recommendations included the establishment of the Australian Institute of Sport (AIS) in Canberra, with decentralised state branches; development of a national coaching system; and sports science and medicine services facilitated by the AIS.</span></li></ul><p data-dcnode-id="2731" style="border: 0px"><span data-dcnode-id="2735" instrument_node="">In 1976 some of the recommended national sport reforms were scaled back by the incoming Fraser Government. However, Australia's poor medal winning performance at the 1976 Montreal Olympic Games, and subsequent lobbying by national sporting organisations, provided a catalyst for reshaping the Australian Government’s policy position. Funding streams to sporting organisations were established and the Victorian Government's </span><em data-dcnode-id="2733" style="border: 0px"><span data-dcnode-id="2734" instrument_node="">Life Be In It </span></em><span data-dcnode-id="2732" instrument_node="">advertising campaign was launched as a national initiative to reverse the increasing trend toward sedentary lifestyles in the Australian population.</span></p><span data-dcnode-id="2730" instrument_node="">
</span></div><span data-dcnode-id="2728" instrument_node="">
</span></div><span data-dcnode-id="2726" instrument_node="">
</span></div><span data-dcnode-id="2724" instrument_node="">
</span></div><span data-dcnode-id="2722" instrument_node="">
</span><div class="content-block pt-6 pt-sm-7 pt-lg-8" data-dcnode-id="2634"><span data-dcnode-id="2721" instrument_node="">
</span><div class="container theme-default overflow-right" data-dcnode-id="2636" style=""><span data-dcnode-id="2720" instrument_node="">
</span><div class="row" data-dcnode-id="2712" id="Content_Container"><span data-dcnode-id="2719" instrument_node="">
</span><div class="col-12 pb-2 pt-5 pt-lg-0" data-dcnode-id="2714"><span data-dcnode-id="2718" instrument_node="">
</span><h2 class="h3" data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Australian Institute of Sport (AIS)</span></h2><span data-dcnode-id="2715" instrument_node="">
</span></div><span data-dcnode-id="2713" instrument_node="">
</span></div><span data-dcnode-id="2711" instrument_node="">
</span><div class="row mt-2" data-dcnode-id="2638"><span data-dcnode-id="2710" instrument_node="">
</span><span data-dcnode-id="2707" instrument_node="">
</span><div class="col-12 table-highlight__primary" data-dcnode-id="2640"><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2680"><span data-dcnode-id="2705" instrument_node="">In 1978 the first signs of a national elite sport policy started to take shape. The </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bob_Ellicott" style="border: 0px" target="_blank"><span data-dcnode-id="2704" instrument_node="">Hon. Robert 'Bob' Ellicott</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2703"></i></a><span data-dcnode-id="2701" instrument_node=""> [</span><em data-dcnode-id="2699" style="border: 0px"><span data-dcnode-id="2700" instrument_node="">Wikipedia</span></em><span data-dcnode-id="2698" instrument_node="">], Federal Minister for Home Affairs and Minister for the Capital Territory, successfully lobbied his Government to establish the AIS in Canberra. The establishment of the AIS was officially announced on 25 January 1980, and opened on the 26th of January (Australia Day) in 1981 by Prime Minister </span><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malcolm_Fraser" style="border: 0px" target="_blank"><span data-dcnode-id="2697" instrument_node="">Malcolm Fraser</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2696"></i></a><span data-dcnode-id="2694" instrument_node=""> [</span><em data-dcnode-id="2692" style="border: 0px"><span data-dcnode-id="2693" instrument_node="">Wikipedia</span></em><span data-dcnode-id="2691" instrument_node="">]. The establishment of the AIS was, in part, the Fraser Government's response to Australia's 1976 Montreal Olympic poor medal result, with the aim of improving Australia’s competitiveness in future international competitions. The organisation was initially established as a public company under the </span><em data-dcnode-id="2689" style="border: 0px"><span data-dcnode-id="2690" instrument_node="">Australian Capital Territory’s Companies Ordinance, 1981. </span></em><span data-dcnode-id="2688" instrument_node="">It became a Federal Statutory Authority in October 1986 when the </span><a data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.gov.au/Details/C2004A03344" style="border: 0px" target="_blank"><span data-dcnode-id="2687" instrument_node="">AIS Act 1986</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2686"></i></a><span data-dcnode-id="2684" instrument_node=""> was passed.</span><em data-dcnode-id="2682" style="border: 0px"><span data-dcnode-id="2683" instrument_node=""> </span></em><span data-dcnode-id="2681" instrument_node="">This Act was repealed in 1989 when the AIS was officially merged with the Australian Sports Commission (ASC).</span></p><p data-dcnode-id="2677" style="border: 0px"><strong data-dcnode-id="2678" style="border: 0px"><span data-dcnode-id="2679" instrument_node="">United States-led boycott of the 1980 Moscow Summer Olympic Games</span></strong></p><p data-dcnode-id="2668" style="border: 0px"><span data-dcnode-id="2676" instrument_node="">The United States President Jimmy Carter’s boycott of the 1980 Moscow Olympic Games was primarily motivated by the Soviet Union invasion of Afghanistan in December 1979. The Fraser Government supported the boycott and encouraged athletes not to attend the Games. However, 120 Australian athletes (92 men and 28 women) competed under the Olympic Flag at the Games. Taking part in 92 events in 17 sports [</span><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australia_at_the_1980_Summer_Olympics" style="border: 0px" target="_blank"><span data-dcnode-id="2675" instrument_node="">Australia at the 1980 Summer Olympics</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2674"></i></a><span data-dcnode-id="2672" instrument_node="">, </span><em data-dcnode-id="2670" style="border: 0px"><span data-dcnode-id="2671" instrument_node="">Wikipedia</span></em><span data-dcnode-id="2669" instrument_node="">].</span></p><div data-dcnode-id="2650" style="border: 0px"><p data-dcnode-id="2651" style="border: 0px"><em data-dcnode-id="2663" style="border: 0px"><strong data-dcnode-id="2666" style="border: 0px"><span data-dcnode-id="2667" instrument_node="">Further reading:</span></strong><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">In Australian Olympic circles Malcolm Fraser’s name provokes decidedly mixed feelings. For example, Fraser was a supporter of the establishment of the AIS in Canberra following Australia’s poor performance in the 1976 Games in Montreal. But his behaviour in 1980 still has bitter memories for some, including those whose once-in-a-life time Olympic dream was snatched away from them.</span></em><cite data-dcnode-id="2652" style="border: 0px"><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theaustralian.com.au/sport/malcolm-fraser-bitter-memories-of-push-to-boycott-1980-olympics/news-story/434a496de9260c104920bb35ecaca218" style="border: 0px" target="_blank"><span data-dcnode-id="2662" instrument_node="">Malcolm Fraser: Bitter memories of push to boycott 1980 Olympics</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2661"></i></a><span data-dcnode-id="2659" instrument_node="">. </span><strong data-dcnode-id="2657" style="border: 0px"><span data-dcnode-id="2658" instrument_node="">[paywall]</span></strong><span data-dcnode-id="2656" instrument_node=""> Korporaal, G. </span><em data-dcnode-id="2654" style="border: 0px"><span data-dcnode-id="2655" instrument_node="">The Australian,</span></em><span data-dcnode-id="2653" instrument_node=""> (21 March 2015) </span></cite></p></div><p data-dcnode-id="2647"><strong data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">National Institute Network</span></strong></p><p data-dcnode-id="2642" style="border: 0px"><span data-dcnode-id="2646" instrument_node="">The </span><a data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/research/nin" style="border: 0px" target="_blank"><span data-dcnode-id="2645" instrument_node="">National Institute Network</span></a><span data-dcnode-id="2643" instrument_node=""> (NIN) comprises the Directors of the AIS and the eight State and Territory Institutes and Academies of Sport (SIS/SAS). The purpose of the National Institute Network (NIN) is to: enhance the alignment of state and federal government investment committed to Australia’s international sporting success; optimise the performance of athletes and sport programs; and, strengthen the efficiency and effectiveness of the operations of the NIN and the respective individual institutes and academies.</span></p><span data-dcnode-id="2641" instrument_node="">
</span></div><span data-dcnode-id="2639" instrument_node="">
</span></div><span data-dcnode-id="2637" instrument_node="">
</span></div><span data-dcnode-id="2635" instrument_node="">
</span></div><span data-dcnode-id="2633" instrument_node="">
</span><div class="content-block pt-6 pt-sm-7 pt-lg-8" data-dcnode-id="2567"><span data-dcnode-id="2632" instrument_node="">
</span><div class="container theme-default overflow-right" data-dcnode-id="2569" style=""><span data-dcnode-id="2631" instrument_node="">
</span><div class="row" data-dcnode-id="2623" id="Content_Container"><span data-dcnode-id="2630" instrument_node="">
</span><div class="col-12 pb-2 pt-5 pt-lg-0" data-dcnode-id="2625"><span data-dcnode-id="2629" instrument_node="">
</span><h2 class="h3" data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Australian Sports Commission (ASC)</span></h2><span data-dcnode-id="2626" instrument_node="">
</span></div><span data-dcnode-id="2624" instrument_node="">
</span></div><span data-dcnode-id="2622" instrument_node="">
</span><div class="row mt-2" data-dcnode-id="2571"><span data-dcnode-id="2621" instrument_node="">
</span><span data-dcnode-id="2618" instrument_node="">
</span><div class="col-12 table-highlight__primary" data-dcnode-id="2573"><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2610"><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportaus.gov.au/__data/assets/pdf_file/0010/957115/35987_Multi-agency-one-pager-v10.pdf"><span data-dcnode-id="2616" instrument_node="">Supporting Australian Sport</span></a><span data-dcnode-id="2614" instrument_node="">, The Australian Government is taking a coordinated and collaborative approach to Australian sport at all levels, with a vision to be the world’s most active and healthy sporting nation, committed to encouraging safe participation and known for its integrity and success. (</span><em data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">Sport Australia</span></em><span data-dcnode-id="2611" instrument_node="">)</span></p><p data-dcnode-id="2601"><span data-dcnode-id="2609" instrument_node="">The </span><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportaus.gov.au/" target="_blank"><span data-dcnode-id="2608" instrument_node="">Australian Sports Commission</span></a><span data-dcnode-id="2606" instrument_node=""> (ASC), comprises Sport Australia and the AIS. It is a Commonwealth entity within the Australian Government’s Department of Health portfolio. The ASC was established in 1985 and operates under the </span><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.gov.au/Details/C2020C00256" style="border: 0px" target="_blank"><span data-dcnode-id="2605" instrument_node="">Australian Sports Commission Act 1989</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2604"></i></a><span data-dcnode-id="2602" instrument_node="">. It is governed by a board of commissioners appointed by the Australian Government. The board determines the overall direction, decides on actual allocation of resources and policy for delegated decisions, and is accountable to the Minister for Sport and to Parliament.</span></p><p data-dcnode-id="2581" style="border: 0px"><span data-dcnode-id="2600" instrument_node="">The establishment of the ASC was first announced in 1984, when the Prime Minister, the </span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bob_Hawke" style="border: 0px" target="_blank"><span data-dcnode-id="2599" instrument_node="">Hon. Robert "Bob" Hawke</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2598"></i></a><span data-dcnode-id="2596" instrument_node=""> [</span><em data-dcnode-id="2594" style="border: 0px"><span data-dcnode-id="2595" instrument_node="">Wikipedia</span></em><span data-dcnode-id="2593" instrument_node="">], and the Minister for Sport, the </span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Brown_%28Australian_politician%29" style="border: 0px" target="_blank"><span data-dcnode-id="2592" instrument_node="">Hon. John Brown</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2591"></i></a><span data-dcnode-id="2589" instrument_node=""> [</span><em data-dcnode-id="2587" style="border: 0px"><span data-dcnode-id="2588" instrument_node="">Wikipedia</span></em><span data-dcnode-id="2586" instrument_node="">], formally announced the membership of the ASC's Board and its terms of reference. Legislation was introduced into Parliament on 3 May 1985 and proclaimed on July 1985. The ASC was formally established as a Commonwealth Statutory Authority by the </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.gov.au/Details/C2004A03116" style="border: 0px" target="_blank"><span data-dcnode-id="2585" instrument_node="">Australian Sports Commission Act 1985</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2584"></i></a><span data-dcnode-id="2582" instrument_node="">.</span></p><p data-dcnode-id="2575" style="border: 0px"><span data-dcnode-id="2580" instrument_node="">Rationalisation of Commonwealth assistance to the sport sector in the late 1980's resulted in the amalgamation of the AIS with the ASC. The ASC subsequently became the principal Australian Government agency responsible for sport under the revised </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.gov.au/Details/C2020C00256" style="border: 0px" target="_blank"><span data-dcnode-id="2579" instrument_node="">Australian Sports Commission Act 1989</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2578"></i></a><span data-dcnode-id="2576" instrument_node="">.</span></p><span data-dcnode-id="2574" instrument_node="">

</span><h2 class="h3" data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">National sport policy initiatives and strategy</span></h2><span data-dcnode-id="2559" instrument_node="">
</span></div><span data-dcnode-id="2557" instrument_node="">
</span></div><span data-dcnode-id="2555" instrument_node="">
</span><div class="row mt-2" data-dcnode-id="2438"><span data-dcnode-id="2554" instrument_node="">
</span><span data-dcnode-id="2551" instrument_node="">
</span><div class="col-12 table-highlight__primary" data-dcnode-id="2440"><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2544" style="border: 0px"><span data-dcnode-id="2549" instrument_node="">The Federal Minister for Sport is responsible for national sport policy in Australia and is supported by the </span><a data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.gov.au/internet/main/publishing.nsf/content/sports-home" style="border: 0px" target="_blank"><span data-dcnode-id="2548" instrument_node="">Office for Sport</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2547"></i></a><span data-dcnode-id="2545" instrument_node="">, The Office for Sport leads and directs a range of Australian Government sport and physical activity policy areas, including water safety, and the bidding and hosting of major sporting events in Australia. The Australian Government also assists sporting organisations and communities through other Government portfolios, such as the 'Building Better Regions Fund' (BBRF) administered by the Department of Infrastructure, Transport, Regional Development and Communications.</span></p><p data-dcnode-id="2541" style="border: 0px"><strong data-dcnode-id="2542" style="border: 0px"><span data-dcnode-id="2543" instrument_node="">National Sports Plan: Sport 2030</span></strong></p><p data-dcnode-id="2535" style="border: 0px"><span data-dcnode-id="2540" instrument_node="">The Australian Government makes a significant contribution to Australian sport, with over AUD $357 million being invested to support sport and recreation activities and facilities in 2016-17 [</span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ausport.gov.au/nationalsportsplan" style="border: 0px" target="_blank"><span data-dcnode-id="2539" instrument_node="">National Sports Plan website</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2538"></i></a><span data-dcnode-id="2536" instrument_node="">].</span></p><ul data-dcnode-id="2518"><li data-dcnode-id="2519"><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportaus.gov.au/__data/assets/pdf_file/0005/677894/Sport_2030_-_National_Sport_Plan_-_2018.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2534" instrument_node="">Sport 2030</span></a><span data-dcnode-id="2532" instrument_node=""> </span><em data-dcnode-id="2530" style="border: 0px"><span data-dcnode-id="2531" instrument_node="">Commonwealth of Australia</span></em><span data-dcnode-id="2529" instrument_node="">, (2018). Sport 2030 is Australia’s first national sport plan — and represents the Australian Government’s long-term commitment to seeing Australian sport thrive. Sport 2030 is the vision and the plan for sport and physical activity in Australia over the next 12 years to be delivered in partnership with Australia’s sporting, physical activity, technology, education and corporate community. The strategic priorities are: </span><ul data-dcnode-id="2520"><li data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Build a more active Australia — More Australians, more active, more often;</span></li><li data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Achieving sporting excellence — National pride, inspiration and motivation through international sporting success;</span></li><li data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Safeguarding the integrity of sport — A fair, safe and strong sport sector free from corruption; and,</span></li><li data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Strengthening Australia’s sport industry — A thriving Australian sport and recreation industry.</span></li></ul></li></ul><ul data-dcnode-id="2510"><li data-dcnode-id="2511"><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportaus.gov.au/__data/assets/pdf_file/0003/717501/National-HP-Sport-Strategy-2024_FINAL.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2517" instrument_node="">National High Performance Sport Strategy 2024</span></a><span data-dcnode-id="2515" instrument_node=""> (2019). The NHPSS was </span><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportaus.gov.au/media_centre/news/delivering-new-national-high-performance-sports-strategy" style="border: 0px" target="_blank"><span data-dcnode-id="2514" instrument_node="">released</span></a><span data-dcnode-id="2512" instrument_node=""> in November 2019 and was developed to support the priorities and objectives of Sport2030. The NHPSS is a joint strategy of National Sporting Organisations (NSO), the National Institute Network (NIN) and other system partners. The NHPSS is a first, positioning Australia’s HP Institutes/Academies and athletes under a national framework, strengthening its dealings with governments, communities, academic institutions, industry and the private sector, moving towards a common goal of National Pride and Inspiration through International Sporting Success.</span></li></ul><p data-dcnode-id="2507" style="border: 0px"><strong data-dcnode-id="2508" style="border: 0px"><span data-dcnode-id="2509" instrument_node="">Previous national sport policies</span></strong></p><ul data-dcnode-id="2442"><li data-dcnode-id="2500"><a data-dcnode-id="2505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/The_Australian_Sports_Kit.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2506" instrument_node="">The Australian sports kit - Next Step</span></a><span data-dcnode-id="2504" instrument_node=""> </span><em data-dcnode-id="2502" style="border: 0px"><span data-dcnode-id="2503" instrument_node="">Australian Government; Arts, Sport, the Environment, Tourism and Territories,</span></em><span data-dcnode-id="2501" instrument_node=""> (1989). The Australian Government's first plan of action, under the aegis of the ASC, to increase the level of participation in sport by all Australians. Equally, it aimed to improve the level of performance of Australian athletes nationally and internationally.</span></li><li data-dcnode-id="2487"><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/mtm.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2499" instrument_node="">Maintain the momentum: Australian government sports policy 1992 to 1996</span></a><span data-dcnode-id="2497" instrument_node=""> </span><em data-dcnode-id="2495" style="border: 0px"><span data-dcnode-id="2496" instrument_node="">Australian Government; Department for the Arts, Sport, the Environment and Territories</span></em><span data-dcnode-id="2494" instrument_node=""> (1992). </span><em data-dcnode-id="2492" style="border: 0px"><span data-dcnode-id="2493" instrument_node="">Maintain the Momentum</span></em><span data-dcnode-id="2491" instrument_node=""> was a four-year sports policy and funding program which brought the government funding cycle into line with the Olympic Games cycle. It also provided funding to continue to grow and consolidate the gains from the </span><em data-dcnode-id="2489" style="border: 0px"><span data-dcnode-id="2490" instrument_node="">Next Step</span></em><span data-dcnode-id="2488" instrument_node=""> policy including maintaining, or increasing, funding to the ASC, AIS, and Australian Sports Drug Agency (ASDA).</span></li><li data-dcnode-id="2474"><a data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/oapfact-Factsheet-1-Overview.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2486" instrument_node="">Olympic athlete program: making great Australians</span></a><span data-dcnode-id="2484" instrument_node=""> </span><em data-dcnode-id="2482" style="border: 0px"><span data-dcnode-id="2483" instrument_node="">Australian Government, Department of Environment, Sport and Territories</span></em><span data-dcnode-id="2481" instrument_node=""> (1994). The </span><em data-dcnode-id="2479" style="border: 0px"><span data-dcnode-id="2480" instrument_node="">Olympic Athlete Program </span></em><span data-dcnode-id="2478" instrument_node="">provided $135 million funding over six years. This was additional funding to the </span><em data-dcnode-id="2476" style="border: 0px"><span data-dcnode-id="2477" instrument_node="">Maintain the Momentum</span></em><span data-dcnode-id="2475" instrument_node=""> policy and was the direct outcome of Australia’s successful bid to host the 2000 Olympic Games and Paralympics in Sydney.</span></li><li data-dcnode-id="2467"><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/active.pdf" library="" partypol="" style="border: 0px" target="_blank"><span data-dcnode-id="2473" instrument_node="">Backing Australia's Sporting Ability - A More Active Australia</span></a><span data-dcnode-id="2471" instrument_node=""> </span><em data-dcnode-id="2469" style="border: 0px"><span data-dcnode-id="2470" instrument_node="">Australian Government </span></em><span data-dcnode-id="2468" instrument_node="">(2001). This policy had two objectives: to support top athletes to continue reaching 'new peaks', and to increase the talent pool for future world champions by increasing community sport participation.</span></li><li data-dcnode-id="2460"><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/PathwaySuccess.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2466" instrument_node="">Australian sport: the pathway to success</span></a><span data-dcnode-id="2464" instrument_node=""> </span><em data-dcnode-id="2462" style="border: 0px"><span data-dcnode-id="2463" instrument_node="">Australian Government; Department of Health </span></em><span data-dcnode-id="2461" instrument_node="">(2010). This policy announced a new way forward, one that focused upon boosting the participation of Australians for the benefit of communities and sporting success. A way forward that not only delivered on the Australian Government’s commitment to boost funding to both community and high performance sport, but also for the first time, one that delivered a significant investment to the development pathway, which is the vital link that connects grassroots and high performance sport.</span></li><li data-dcnode-id="2455"><span data-dcnode-id="2459" instrument_node="">The </span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/meeting_of_sport_and_recreation_ministers_msrm/committee_of_australian_sport_and_recreation_officials_casro/National_Sport_and_Active_Recreation_Policy_Framework.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2458" instrument_node="">National Sport and Active Recreation Policy Framework</span></a><span data-dcnode-id="2456" instrument_node=""> was agreed to by all Ministers (Federal/State/Territory) responsible for sport and recreation in June 2011. The Framework guides cross-jurisdictional cooperation of public policy and program development for the sport and active recreation sectors. It identifies priority areas for investment and sets targets for a range of policy objectives, including participation, international sporting success, and the sustainability of the Australian sport system.</span></li><li data-dcnode-id="2443"><a data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.gov.au/Details/C1941A00026" style="border: 0px" target="_blank"><span data-dcnode-id="2454" instrument_node="">National Fitness Act 1941</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2453"></i></a><span data-dcnode-id="2451" instrument_node=""> </span><em data-dcnode-id="2449" style="border: 0px"><span data-dcnode-id="2450" instrument_node="">Australian Government</span></em><span data-dcnode-id="2448" instrument_node="">, (1941-1994) [no longer in force]. Originally passed during the Second World War the purpose of this Act was to improve the fitness of Australian young people, and better prepare them for work in the armed services and industry. It made federal funding available to state-based fitness councils to coordinate promotional campaigns, programs, education, and infrastructure. Most of this work was accomplished by volunteers with a focus on children and youth playgrounds, clubs, camping programs, and the development of physical education in schools [source: </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mja.com.au/journal/2011/195/11/fit-purpose-australias-national-fitness-campaign" style="border: 0px" target="_blank"><span data-dcnode-id="2447" instrument_node="">Fit for purpose: Australia’s National Fitness Campaign</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2446"></i></a><span data-dcnode-id="2444" instrument_node="">, Julie Collins and Peter Lekkas, Medical Journal of Australia, (2011)] .</span></li></ul><span data-dcnode-id="2441" instrument_node="">

</span><h1 class="h2" data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">National reports and related papers</span></h1><span data-dcnode-id="2344" instrument_node="">

</span><div class="col-12 table-highlight__primary" data-dcnode-id="2160"><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2327" style="border: 0px"><span data-dcnode-id="2334" instrument_node="">Government policy is shaped by evidence accumulated from various reviews, discussion papers, and inquiries. The </span><em data-dcnode-id="2332" style="border: 0px"><span data-dcnode-id="2333" instrument_node="">Bloomfield Report </span></em><span data-dcnode-id="2331" instrument_node="">(1973), and the </span><em data-dcnode-id="2329" style="border: 0px"><span data-dcnode-id="2330" instrument_node="">Coles Report</span></em><span data-dcnode-id="2328" instrument_node=""> (1975), were precursors to the establishment of the AIS and ASC [now Sport Australia]. Other significant papers include:</span></p><ul data-dcnode-id="2162"><li data-dcnode-id="2311"><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ausport.libero.com.au/libero/WebOpac.cls%3FVERSION%3D2%26ACTION%3DDISPLAY%26RSN%3D24171%26DATA%3DASC%26TOKEN%3Do3cMnGzjaf4023%26Z%3D1%26SET%3D2" style="border: 0px" target="_blank"><span data-dcnode-id="2326" instrument_node="">Sport and recreation development: discussion paper</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2325"></i></a><span data-dcnode-id="2323" instrument_node="">, </span><em data-dcnode-id="2321" style="border: 0px"><span data-dcnode-id="2322" instrument_node="">Department of Environment, Housing and Community,</span></em><span data-dcnode-id="2320" instrument_node=""> (1976). This discussion paper outlines the current state of sport, recreation and fitness in Australia. It briefly examines the </span><em data-dcnode-id="2318" style="border: 0px"><span data-dcnode-id="2319" instrument_node="">Australian Sports Institute Study Group</span></em><span data-dcnode-id="2317" instrument_node=""> report. </span><em data-dcnode-id="2315" style="border: 0px"><span data-dcnode-id="2316" instrument_node="">(Held by Australian Sports Commission&nbsp;</span></em><span data-dcnode-id="2314" instrument_node="">[print], [call number </span><em data-dcnode-id="2312" style="border: 0px"><span data-dcnode-id="2313" instrument_node="">GV675.A87)</span></em></li><li data-dcnode-id="2303"><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/australian-sports-commission/asc_publications/asc_corporate_publications/interim.pdf" target="_blank"><span data-dcnode-id="2310" instrument_node="">Interim Committee for the Australian Sports Commission</span></a><v data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">, Report to the Minister for Sport, Recreation and Tourism, March 1984, </span><em data-dcnode-id="2306" style="border: 0px"><span data-dcnode-id="2307" instrument_node="">Australian Government Publishing Service</span></em><span data-dcnode-id="2305" instrument_node=""> (1985). This report looked at the potential role of the Australian Sports Commission and provided guidelines for its establishment. The report also discussed the role of the Commonwealth Government in sports development and outlined possible funding options for sport outside of government sources. </span></v></li><li data-dcnode-id="2290"><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/Active_Australia_-_A_national_participation_framework_1996.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2302" instrument_node="">Active Australia: a national participation framework</span></a><v data-dcnode-id="2291"><em data-dcnode-id="2299" style="border: 0px"><span data-dcnode-id="2300" instrument_node="">, Australian Sports Commission,</span></em><span data-dcnode-id="2298" instrument_node=""> (1996). The </span><em data-dcnode-id="2296" style="border: 0px"><span data-dcnode-id="2297" instrument_node="">Active Australia Framework </span></em><span data-dcnode-id="2295" instrument_node="">offered a strategic and cooperative approach to encourage participation in physical activity by all Australians. The </span><em data-dcnode-id="2293" style="border: 0px"><span data-dcnode-id="2294" instrument_node="">Framework</span></em><span data-dcnode-id="2292" instrument_node=""> was supported by the Standing Committee on Sport and Recreation (SCORS); the Department of Health and Family Services; the National Office of Local Government; State/Territory Governments; and national peak health organisations and sport organisations. </span></v></li><li data-dcnode-id="2282"><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/Shaping_Up-_A_Review_of_Commonwealth_Involvement_in_Sport_and_Recreation_in_Australia.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2289" instrument_node="">Shaping up: a review of Commonwealth involvement in sport and recreation in Australia</span></a><v data-dcnode-id="2283"><span data-dcnode-id="2287" instrument_node="">, 'Oakley Report'</span><em data-dcnode-id="2285" style="border: 0px"><span data-dcnode-id="2286" instrument_node="">, Sport 2000 Task Force,</span></em><span data-dcnode-id="2284" instrument_node=""> (1999). This review provides an excellent summary of the Australian sport system in 2000. Key recommendations involve the autonomy of sporting organisations, recreational organisations having greater access to Australian government resources, and development of four business units to assist&amp; sport and recreation;industries. </span></v></li><li data-dcnode-id="2275"><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/__data/assets/pdf_file/0009/872073/The_Australian_Sports_Commission-_Beyond_2000.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2281" instrument_node="">The Australian Sports Commission: beyond 2000</span></a><v data-dcnode-id="2276"><em data-dcnode-id="2278" style="border: 0px"><span data-dcnode-id="2279" instrument_node="">, Australian Sports Commission,</span></em><span data-dcnode-id="2277" instrument_node=""> (1999). Discussion paper by the ASC that looked at the Australian sport system beyond the Sydney Olympic and Paralympic Games. This paper argued that funding should not be diluted and the ASC role should move from an interventionist managerial approach to one based more on a facilitative approach. </span></v></li><li data-dcnode-id="2268"><a data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/Game_plan_2006_-_sport_and_leisure_industry_strategic_national_plan.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2274" instrument_node="">Game Plan 2006: sport and leisure industry strategic national plan</span></a><v data-dcnode-id="2269"><em data-dcnode-id="2271" style="border: 0px"><span data-dcnode-id="2272" instrument_node="">, Sport and Tourism Division, Department of Industry, Science and Resources,</span></em><span data-dcnode-id="2270" instrument_node=""> (2001). A national strategic plan for the Australian sport and leisure industry. The plan endeavoured to take advantage of Australia hosting the 2000 Olympic and Paralympic Games. Industry encompassed four areas: professional services (coaching, sport science, fitness etc.); facility management (planning, construction and management); goods and equipment (manufacturing and retailing); and media (print, television, cable and satellite). </span></v></li><li data-dcnode-id="2261"><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/Australian_Sport_Emerging_Challenges%2C_New_Directions.pdf"><span data-dcnode-id="2267" instrument_node="">Australian sport: emerging challenges, new directions</span></a><v data-dcnode-id="2262"><em data-dcnode-id="2264" style="border: 0px"><span data-dcnode-id="2265" instrument_node="">, Department of Health and Ageing,</span></em><span data-dcnode-id="2263" instrument_node=""> (2008). This directions paper on Australian sport policy announced the appointment of an Independent Sport Panel. The Panel would examine the delivery of elite sporting programs to minimize duplication and maximise the benefits and effectiveness of available resources. Other areas for the Panel to investigate were: sport and physical activity as key elements of the Government's preventative health agenda; improving the status of women in sport; improving delivery of Indigenous sport; and improving access to sport for persons with disability. </span></v></li><li data-dcnode-id="2251"><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/department-of-health/CrawfordReport.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2260" instrument_node="">The future of sport in Australia</span></a><span data-dcnode-id="2258" instrument_node="">, Independent Sport Panel, </span><em data-dcnode-id="2256" style="border: 0px"><span data-dcnode-id="2257" instrument_node="">Department of Health and Ageing,</span></em><span data-dcnode-id="2255" instrument_node=""> (2009).This report, also known as the </span><em data-dcnode-id="2253" style="border: 0px"><span data-dcnode-id="2254" instrument_node="">Crawford Report</span></em><span data-dcnode-id="2252" instrument_node="">, made 38 recommendations; among them: development of a national approach to sports policy at both an elite and community level; that the ASC should not be involved in service delivery; that the Active After-school Communities (AASC) program should be contracted out to appropriate providers at agreed performance standards; that there should be a wider definition of sporting success to include measures of our nation’s fitness and participation in activity; and that there should be an increased focus on physical education in schools.</span></li><li data-dcnode-id="2244"><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/australias_winning_edge/Australias_Winning_Edge.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2250" instrument_node="">Australia's Winning Edge 2012-2022: our game plan for moving from world class to world best</span></a><span data-dcnode-id="2248" instrument_node="">, </span><em data-dcnode-id="2246" style="border: 0px"><span data-dcnode-id="2247" instrument_node="">Australian Sports Commission in partnership with Australia's High Performance Network</span></em><span data-dcnode-id="2245" instrument_node="">, (2012). Australia's Winning Edge was a collaborative effort led by the ASC with key partners in the sport sector, and builds on the National Sport and Active Recreation Policy Framework (the Policy Framework) and National Institute System Intergovernmental Agreement. The Policy Framework focussed on five key areas: investing for success; planning to perform; the right support; good governance &amp; capability; and evidence-based decisions.</span></li><li data-dcnode-id="2237"><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/__data/assets/pdf_file/0005/859109/The_Future_of_Australian_Sport_-_Full_Report.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2243" instrument_node="">The Future of Australian Sport: Megatrends shaping the sports sector over coming decades</span></a><span data-dcnode-id="2241" instrument_node="">, Hajkowicz, S.A., Cook, H., Wilhelmseder, L., et.al., </span><em data-dcnode-id="2239" style="border: 0px"><span data-dcnode-id="2240" instrument_node="">Australian Sports Commission &amp; CSIRO</span></em><span data-dcnode-id="2238" instrument_node="">, (2013). The ASC partnered with Australia's peak science agency, the Commonwealth Scientific and Industrial Research Organisation (CSIRO), to jointly conduct research into the future of Australian sport. The sports played in Australia, as well as how and why we play them, are changing over time. The Report highlighted six sports megatrends, defined as: a major shift in environmental, social and economic conditions that will substantially alter the way people live. Megatrends occur at the intersection of multiple trends. A trend is defined as an important pattern of social, economic or environmental activity that will play out in the future, that will play a role in shaping long-term policy, investment, and strategic planning within government, the sport sector and broader community.</span></li><li data-dcnode-id="2218"><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/research/market-seg" style="border: 0px" target="_blank"><span data-dcnode-id="2236" instrument_node="">Market Segmentation for Sports Participation</span></a><span data-dcnode-id="2234" instrument_node="">, </span><em data-dcnode-id="2232" style="border: 0px"><span data-dcnode-id="2233" instrument_node="">Australian Sports Commission</span></em><span data-dcnode-id="2231" instrument_node="">, (2013-2015). The Market Segmentation Studies provide key insights regarding how participation in sport is consumed among the Australian population. This research is designed to help organisations refine strategies to recruit and retain adults, children, parents and volunteers in sport and sport clubs and ensure our sporting landscape remains strong. Research was published relating to specific population groups including </span><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/research/market-seg/adults" style="border: 0px" target="_blank"><span data-dcnode-id="2230" instrument_node="">Adults</span></a><span data-dcnode-id="2228" instrument_node=""> (2013), </span><a data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/research/market-seg/adults" style="border: 0px" target="_blank"><span data-dcnode-id="2227" instrument_node="">Children</span></a><span data-dcnode-id="2225" instrument_node=""> (2013), </span><a data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/research/market-seg/volunteers" style="border: 0px" target="_blank"><span data-dcnode-id="2224" instrument_node="">Volunteers</span></a><span data-dcnode-id="2222" instrument_node=""> (2014), and </span><a data-dcnode-id="2220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/research/market-seg/parents" style="border: 0px" target="_blank"><span data-dcnode-id="2221" instrument_node="">Parents</span></a><span data-dcnode-id="2219" instrument_node=""> (2015).</span></li><li data-dcnode-id="2208"><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/australian_sports_policy/play.sport.australia/ASCs_participation_game_plan_web.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2217" instrument_node="">Play.Sport.Australia</span></a><span data-dcnode-id="2215" instrument_node="">,</span><em data-dcnode-id="2213" style="border: 0px"><span data-dcnode-id="2214" instrument_node=""> Australian Sports Commission, </span></em><span data-dcnode-id="2212" instrument_node="">(March 2015). The policy looks at how sport has changed in the last decade and plots the opportunities the Australian sports sector must embrace and maximise in the years ahead. It also provides a clear outline of where the Australian Sports Commission expects sports participation to be in the future. </span><em data-dcnode-id="2210" style="border: 0px"><span data-dcnode-id="2211" instrument_node="">Play.Sport.Australia. </span></em><span data-dcnode-id="2209" instrument_node="">complements the national high performance plan and is built around better engagement with the community, stronger governance for sports, and innovative ways to improve their long-term financial sustainability.</span></li><li data-dcnode-id="2187"><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/__data/assets/pdf_file/0008/874799/Intergenerational_Review_of_Australian_Sport_2017.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2207" instrument_node="">Intergenerational Review of Australian Sport</span></a><span data-dcnode-id="2205" instrument_node="">, </span><em data-dcnode-id="2203" style="border: 0px"><span data-dcnode-id="2204" instrument_node="">BCG Boston Consulting Group</span></em><span data-dcnode-id="2202" instrument_node=""> for the Australian Sports Commission, (2017). In recent years, the ASC has observed significant trends relating to sports participation, performance and consumption. To understand these trends and their impact in the future and to best prepare Australian sport to adapt for success, the ASC Board engaged The Boston Consulting Group (BCG) to undertake </span><em data-dcnode-id="2200" style="border: 0px"><span data-dcnode-id="2201" instrument_node="">The Intergenerational Review of Australian Sport (IGRS)</span></em><span data-dcnode-id="2199" instrument_node="">. The IGRS had five objectives: </span><ul data-dcnode-id="2188"><li data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Objective 1: To identify the value of sport to Australia and the key forces and trends that are challenging sporting organisations and the sector as a whole;</span></li><li data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Objective 2: To understand the current investment in Australian sport, within an international context;</span></li><li data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Objective 3: To articulate and quantify, to the extent possible, the return from the investment in sport in Australia and internationally;</span></li><li data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Objective 4: To identify strategies to maximise the opportunities and return for all Australians, in line with broad government policy; and</span></li><li data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Objective 5: To identify ways for the sports system to work together more cohesively.</span></li></ul></li><li data-dcnode-id="2170"><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www1.health.gov.au/internet/main/publishing.nsf/Content/the-review-of-australias-sports-integrity-arrangements" style="border: 0px" target="_blank"><span data-dcnode-id="2186" instrument_node="">Report of the Review of Australia’s Sports Integrity Arrangements</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2185"></i></a><span data-dcnode-id="2183" instrument_node=""> [Wood Review], </span><em data-dcnode-id="2181" style="border: 0px"><span data-dcnode-id="2182" instrument_node="">Commonwealth of Australia as represented by the Department of Health</span></em><span data-dcnode-id="2180" instrument_node="">, (2018). The Review of Australia’s Sports Integrity Arrangements (the Review) was commissioned by the Turnbull Government in response to the growing global threat to the integrity of sport. The Review was conducted by an independent, expert panel led by the Hon James Wood AO QC, supported by Mr David Howman CNZM and Mr Ray Murrihy. The Report of the Review of Australia’s Sports Integrity Arrangements was presented to the Australian Government in March 2018. In line with its terms of reference, the Review addresses key domestic and international threats to the integrity of sport and makes 52 recommendations across five key themes: A stronger national response to match fixing; Australian Sports Wagering Scheme; Enhancing Australia's anti-doping capability; A National Sports Tribunal; A National Sports Integrity Commission. </span><ul data-dcnode-id="2171"><li data-dcnode-id="2172"><a data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www1.health.gov.au/internet/main/publishing.nsf/Content/the-government-response-to-the-wood-review" style="border: 0px" target="_blank"><span data-dcnode-id="2179" instrument_node="">The Government Response to the Wood Review</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2178"></i></a><span data-dcnode-id="2176" instrument_node="">, </span><em data-dcnode-id="2174" style="border: 0px"><span data-dcnode-id="2175" instrument_node="">Australian Government, Department of Health,</span></em><span data-dcnode-id="2173" instrument_node=""> (12 February 2019). The Government is supportive of the recommendations provided in the Wood Review, and committed to ensuring that Australian sport is protected against the rapidly evolving sports integrity threat environment. This means Australians can be confident that their sports will continue to be clean, fair, safe and inclusive.</span></li></ul></li><li data-dcnode-id="2163"><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/research/smi/ausplay" style="border: 0px" target="_blank"><span data-dcnode-id="2169" instrument_node="">AusPlay survey</span></a><span data-dcnode-id="2167" instrument_node="">, </span><em data-dcnode-id="2165" style="border: 0px"><span data-dcnode-id="2166" instrument_node="">Sport Australia, </span></em><span data-dcnode-id="2164" instrument_node="">(2015-). AusPlay is a large scale national survey that tracks Australian sport participation behaviours and informs investment, policy, and sport delivery by National Sporting Organisations (NSOs) and the sports network. Previously this data—which is used by many government initiatives who have adopted sport and physical recreation participation estimates as a performance indicator—was published by the Australian Bureau of Statistics (ABS). However, in June 2014 the ABS announced their cessation of funding for all sport and recreation data collection. The Ausplay survey sought to fill this major gap in national sport and physical recreation data. Since late 2015 it has become the single-source data currency for government and the sport sector.</span></li></ul><span data-dcnode-id="2161" instrument_node="">
