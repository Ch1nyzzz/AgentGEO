</span><h1 class="h2" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Parliament of Australia reports</span></h1><span data-dcnode-id="2064" instrument_node="">
</span></div><span data-dcnode-id="2062" instrument_node="">
</span></div><span data-dcnode-id="2060" instrument_node="">
</span><div class="row mt-2" data-dcnode-id="1813"><span data-dcnode-id="2059" instrument_node="">
</span><span data-dcnode-id="2056" instrument_node="">
</span><div class="col-12 table-highlight__primary" data-dcnode-id="1815"><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053" style="border: 0px"><span data-dcnode-id="2054" instrument_node="">The Parliament of Australia conducts inquiries into issues or legislation brought before its various Committees. These inquiries often invite public submissions and produce a report. Generally, the Australian Government will provide a response to recommendations made in these reports.</span></p><p data-dcnode-id="2051" style="border: 0px"><span data-dcnode-id="2052" instrument_node="">Inquiries and submissions often provide valuable research and evidence on an issue, which can be helpful in policy formulation. Parliamentary inquiries have covered a broad range of sport topics, including: doping; funding; facilities; broadcasting and communications; gambling; health and safety; physical education; Aboriginal and Torres Strait Islander Peoples sport participation; and, women in sport.</span></p><ul data-dcnode-id="1817"><li data-dcnode-id="2043"><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Dreports/1983/1983_pp311report.htm" style="border: 0px" target="_blank"><span data-dcnode-id="2050" instrument_node="">The way we play: Commonwealth assistance for sport and recreation</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2049"></i></a><span data-dcnode-id="2047" instrument_node="">, House of Representatives Standing Committee on Expenditure, </span><em data-dcnode-id="2045" style="border: 0px"><span data-dcnode-id="2046" instrument_node=""> Parliament of Australia, </span></em><span data-dcnode-id="2044" instrument_node=""> (1983). This report examined the pattern of sport and recreation provision and Commonwealth involvement, as well as the efficiency and effectiveness of specific Commonwealth programs in sport and recreation.</span></li><li data-dcnode-id="2034"><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Dreports/1984/1984_pp117.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="2042" instrument_node="">Payments to athletes and teams who did not participate at the 1980 Moscow Olympics, May 1984</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2041"></i></a><v data-dcnode-id="2035"><span data-dcnode-id="2039" instrument_node=""> , House of Representatives Standing Committee on Expenditure, </span><em data-dcnode-id="2037" style="border: 0px"><span data-dcnode-id="2038" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="2036" instrument_node=""> (1984). This report examined the nature and purpose of payments made to athletes and teams that did not participate at the 1980 Moscow Olympic Games. The Fraser Government had requested sporting organisations and their athletes and teams boycott the Games. </span></v></li><li data-dcnode-id="2025"><v data-dcnode-id="2026"><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3D/reports/1987/1987_pp3report.htm" style="border: 0px" target="_blank"><span data-dcnode-id="2033" instrument_node="">Sports aviation safety</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2032"></i></a><span data-dcnode-id="2030" instrument_node="">, House of Representatives Standing Committee on Transport Safety, </span><em data-dcnode-id="2028" style="border: 0px"><span data-dcnode-id="2029" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="2027" instrument_node=""> (1987). This report examined safety practices of Australian sports involved in aviation activities. </span></v></li><li data-dcnode-id="2017"><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/Completed_inquiries/pre1996/drugsint/index" style="border: 0px" target="_blank"><span data-dcnode-id="2024" instrument_node="">Drugs in sport: an interim report</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2023"></i></a><span data-dcnode-id="2021" instrument_node="">, Senate Standing Committee on Environment, Recreation and the Arts, </span><em data-dcnode-id="2019" style="border: 0px"><span data-dcnode-id="2020" instrument_node=""> Parliament of Australia, </span></em><span data-dcnode-id="2018" instrument_node=""> (1989). This interim report examined allegations of doping practices relating to track and field and weightlifting at the Australian Institute of Sport. Recommendations from this report led to the establishment of the Australian Sports Drug Agency (now known as the Australian Sports Anti-Doping Authority).</span></li><li data-dcnode-id="2009"><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/Completed_inquiries/pre1996/drug2nd/index" style="border: 0px" target="_blank"><span data-dcnode-id="2016" instrument_node="">Drugs in sport. Second report</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2015"></i></a><span data-dcnode-id="2013" instrument_node="">, 'Black Enquiry'. Senate Standing Committee on Environment, Recreation and the Arts, </span><em data-dcnode-id="2011" style="border: 0px"><span data-dcnode-id="2012" instrument_node=""> Parliament of Australia, </span></em><span data-dcnode-id="2010" instrument_node=""> (1990). This report included responses to recommendations from the interim report and examined weightlifting, power-lifting and professional sports in Australia.</span></li><li data-dcnode-id="2000"><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aph.gov.au/parliamentary_business/committees/house_of_representatives_committees%3Furl%3D/report_register/bykeylist.asp%3Fid%3D1631" style="border: 0px" target="_blank"><span data-dcnode-id="2008" instrument_node="">Going for gold: The first report on an Inquiry into Sports Funding and Administration</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="2007"></i></a><v data-dcnode-id="2001"><span data-dcnode-id="2005" instrument_node=""> , House of Representatives Standing Committee on Finance and Public Administration, </span><em data-dcnode-id="2003" style="border: 0px"><span data-dcnode-id="2004" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="2002" instrument_node=""> (1989). This report focused on high performance sport funding in Australia and made recommendations regarding the role of the Australian Institute of Sport. </span></v></li><li data-dcnode-id="1992"><a data-dcnode-id="1997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Dreports/1989/1989_pp482report.htm" style="border: 0px" target="_blank"><span data-dcnode-id="1999" instrument_node="">Can sport be bought?</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1998"></i></a><span data-dcnode-id="1996" instrument_node=""> 'Martin Report'. Second report on an inquiry into Sports Funding and Administration, House of Representatives Standing Committee on Finance and Public Administration, </span><em data-dcnode-id="1994" style="border: 0px"><span data-dcnode-id="1995" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1993" instrument_node=""> (1990). This report focused on sports participation funding, particularly for women and sport for the disabled. The inquiry examined tobacco sponsorship of sport.</span></li><li data-dcnode-id="1984"><a data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Significant_Reports/animalwelfarectte/welfarecompetitiveevents/index" style="border: 0px" target="_blank"><span data-dcnode-id="1991" instrument_node="">Equine welfare in competitive events other than racing </span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1990"></i></a><span data-dcnode-id="1988" instrument_node="">Senate Select Committee on Animal Welfare, </span><em data-dcnode-id="1986" style="border: 0px"><span data-dcnode-id="1987" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1985" instrument_node=""> (1991). This report examined equine welfare at rodeos, camp drafting, eventing and endurance riding. It did not cover the horse racing industry in Australia.</span></li><li data-dcnode-id="1976"><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/Completed%2520inquiries/pre1996/physportedu/index" style="border: 0px" target="_blank"><span data-dcnode-id="1983" instrument_node="">Physical and sport education</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1982"></i></a><span data-dcnode-id="1980" instrument_node="">. Senate Standing Committee on Environment, Recreation and the Arts, </span><em data-dcnode-id="1978" style="border: 0px"><span data-dcnode-id="1979" instrument_node=""> Parliament of Australia, </span></em><span data-dcnode-id="1977" instrument_node=""> (1992). This report outlined the state of sport and physical skills in Australian school children, training of teachers and community sport providers in provision of physical education and sport, and the allocation of resources to physical education and sport in Australian schools.</span></li><li data-dcnode-id="1967"><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Dreports/1994/1994_pp421.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="1975" instrument_node="">Inquiry into the Sydney Olympics: the adequacy of existing and planned aviation services and infrastructure</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1974"></i></a><v data-dcnode-id="1968"><span data-dcnode-id="1972" instrument_node=""> , House of Representatives Standing Committee on Transport, Communication and Infrastructure, </span><em data-dcnode-id="1970" style="border: 0px"><span data-dcnode-id="1971" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1969" instrument_node=""> (1994). This report examined the implications of Sydney hosting the 2000 Olympic and Paralympic Games on broadcast spectrums, transmission facilities, aviation infrastructure and land transport. </span></v></li><li data-dcnode-id="1959"><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trove.nla.gov.au/work/11558993" style="border: 0px" target="_blank"><span data-dcnode-id="1966" instrument_node="">The Community Cultural, Recreational and Sporting Facilities Program: A review of a report on an efficiency audit by the Auditor-General</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1965"></i></a><span data-dcnode-id="1963" instrument_node="">, House of Representatives Standing Committee on Environment, Recreation and the Arts, </span><em data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Parliament of Australia</span></em><span data-dcnode-id="1960" instrument_node="">, (1994). The report of the efficiency audit of the Community Cultural, Recreational and Sporting Facilities Program dealt with two main issues - the general administration of the program and the accountability of the Minister. The second issue arose because the Minister was responsible for selecting projects to receive funding and there had been allegations that there was a bias towards Labor held electorates in the allocation of funds. The Department of the Environment, Sport and Territories seemed initially not concerned by the serious criticisms made by the Auditor-General about the general administration of the program. However, during the course of the Committee's review of the audit report, the Secretary of the Department, and the Minister, gave assurances that the Auditor-General's findings were now largely accepted and that the Department's procedures will be reformed along the lines recommended in the audit report.</span></li><li data-dcnode-id="1951"><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/Completed%2520inquiries/pre1996/soccer/index" style="border: 0px" target="_blank"><span data-dcnode-id="1958" instrument_node="">Soccer: first report</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1957"></i></a><span data-dcnode-id="1955" instrument_node="">, Senate Environment, Recreation, Communications and the Arts References Committee, </span><em data-dcnode-id="1953" style="border: 0px"><span data-dcnode-id="1954" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1952" instrument_node=""> (1995). This report inquired into player transfers in Australian soccer.</span></li><li data-dcnode-id="1943"><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/Completed%2520inquiries/pre1996/soccer/report2/index" style="border: 0px" target="_blank"><span data-dcnode-id="1950" instrument_node="">Soccer: second report</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1949"></i></a><span data-dcnode-id="1947" instrument_node="">, Senate Environment, Recreation, Communications and the Arts References Committee, </span><em data-dcnode-id="1945" style="border: 0px"><span data-dcnode-id="1946" instrument_node=""> Parliament of Australia, </span></em><span data-dcnode-id="1944" instrument_node=""> (1995). This second report examined the administration of soccer in Australia and followed up recommendations from the first report.</span></li><li data-dcnode-id="1932"><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ausport.libero.com.au/libero/WebOpac.cls%3FVERSION%3D2%26ACTION%3DDISPLAY%26RSN%3D21137%26DATA%3DASC%26TOKEN%3Dnqn3J2cjiT8777%26Z%3D1%26SET%3D2" style="border: 0px" target="_blank"><span data-dcnode-id="1942" instrument_node="">Cashing in on the Olympics: protecting the Olympics from ambush marketing</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1941"></i></a><span data-dcnode-id="1939" instrument_node="">, Senate Legal and Constitutional References Committee, </span><em data-dcnode-id="1937" style="border: 0px"><span data-dcnode-id="1938" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1936" instrument_node="">(1995). This report examined the scope of existing protection afforded to the words and symbols associated with the Olympic Games in light of Sydney winning the right to host the 2000 Olympic Games. [</span><em data-dcnode-id="1934" style="border: 0px"><span data-dcnode-id="1935" instrument_node="">Held by Clearinghouse for Sport, GV722 2000.M1.A88</span></em><span data-dcnode-id="1933" instrument_node="">]</span></li><li data-dcnode-id="1923"><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Dreports/1995/1995_pp115.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="1931" instrument_node="">Olympics 2000 … and the winner is?</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1930"></i></a><v data-dcnode-id="1924"><span data-dcnode-id="1928" instrument_node=""> House of Representatives Standing Committee on Industry, Science and Technology, </span><em data-dcnode-id="1926" style="border: 0px"><span data-dcnode-id="1927" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1925" instrument_node=""> (1995). This report examined opportunities for Australian industries with Sydney hosting the Olympic and Paralympic Games. Industries covered include: tourism, construction, broadcasting and communications, environmentally sustainable development, sports related industries, and merchandising. </span></v></li><li data-dcnode-id="1906"><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Denviron/sportinq/sportrpt/fullreport.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="1922" instrument_node="">Rethinking the funding of community sporting and recreational facilities: a sporting chance</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1921"></i></a><span data-dcnode-id="1919" instrument_node="">, </span><em data-dcnode-id="1917" style="border: 0px"><span data-dcnode-id="1918" instrument_node="">House of Representatives Standing Committee on Environment, Recreation and the Arts</span></em><span data-dcnode-id="1916" instrument_node="">, (1997). </span><ul data-dcnode-id="1907"><li data-dcnode-id="1908"><a data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Denviron/sportinq/govresp.doc" style="border: 0px" target="_blank"><span data-dcnode-id="1915" instrument_node="">Government response - 1998</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1914"></i></a><span data-dcnode-id="1912" instrument_node="">. There had been no funding for community sport since the termination of the </span><em data-dcnode-id="1910" style="border: 0px"><span data-dcnode-id="1911" instrument_node="">Community Cultural Recreational and Sporting Facilities Program</span></em><span data-dcnode-id="1909" instrument_node=""> in 1994. This inquiry found nearly universal support for the Commonwealth Government to re-enter the field of funding sporting and recreational facilities at the community level.</span></li></ul></li><li data-dcnode-id="1898"><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Joint/Completed_Inquiries/pwc/ais/report" style="border: 0px" target="_blank"><span data-dcnode-id="1905" instrument_node="">Redevelopment of the Australian Institute of Sport, Bruce, Australian Capital Territory</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1904"></i></a><span data-dcnode-id="1902" instrument_node="">, </span><em data-dcnode-id="1900" style="border: 0px"><span data-dcnode-id="1901" instrument_node="">Parliamentary Standing Committee on Public Works, (</span></em><span data-dcnode-id="1899" instrument_node="">August 2003). Report into the redevelopment of the AIS Bruce Facility, which was approved.</span></li><li data-dcnode-id="1890"><a data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/Completed_inquiries/2004-07/womeninsport/report/index" style="border: 0px" target="_blank"><span data-dcnode-id="1897" instrument_node="">About time! women in sport and recreation in Australia</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1896"></i></a><span data-dcnode-id="1894" instrument_node="">. Senate Environment, Recreation, Communications and the Arts, Reference Committee, </span><em data-dcnode-id="1892" style="border: 0px"><span data-dcnode-id="1893" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1891" instrument_node=""> (2006). This Senate inquiry reported on five main issues related to women in sport and recreation: (1) health benefit of sport participation; (2) grass roots participation; (3) elite sport; (4) leadership and governance, and; (5) mass media.</span></li><li data-dcnode-id="1882"><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/Completed%2520inquiries/2008-10/sportsnews/index" style="border: 0px" target="_blank"><span data-dcnode-id="1889" instrument_node="">The reporting of sports news and the emergence of digital media</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1888"></i></a><span data-dcnode-id="1886" instrument_node="">, Senate Standing Committee on Environment, Communication and the Arts, </span><em data-dcnode-id="1884" style="border: 0px"><span data-dcnode-id="1885" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1883" instrument_node=""> (2009). This report examined the nature of sports news reporting in the digital age, in particular the impact of new technologies, video streaming on the Internet, archived photo galleries, and mobile devices. It examined the role of sports organisations in relation to broadcasting.</span></li><li data-dcnode-id="1874"><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Joint/Former_Committees/gamblingreform/completedinquires/2010-13/gamblingsport/index" style="border: 0px" target="_blank"><span data-dcnode-id="1881" instrument_node="">The advertising and promotion of gambling services in sport</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1880"></i></a><span data-dcnode-id="1878" instrument_node="">, Joint Committee on Gambling Reform, </span><em data-dcnode-id="1876" style="border: 0px"><span data-dcnode-id="1877" instrument_node=""> Parliament of Australia, </span></em><span data-dcnode-id="1875" instrument_node=""> (2013). Report on the Broadcasting Services Amendment (Advertising for Sports Betting) Bill 2013. This report focused on the advertising and promotion of gambling services in sport.</span></li><li data-dcnode-id="1866"><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/House_of_Representatives_Committees%3Furl%3Datsia/sport/index.htm" style="border: 0px" target="_blank"><span data-dcnode-id="1873" instrument_node="">Sport - more than just a game: contribution of sport to Indigenous wellbeing and mentoring</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1872"></i></a><span data-dcnode-id="1870" instrument_node="">, House of Representatives Standing Committee on Aboriginal and Torres Strait Islander Affairs, </span><em data-dcnode-id="1868" style="border: 0px"><span data-dcnode-id="1869" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1867" instrument_node=""> (2013). This report focused on how sporting bodies can increase opportunities for Indigenous participation; non-government organisations utilising sport as a vehicle to improve health and social outcomes for Indigenous people; and the contribution of Indigenous sporting programs.</span></li><li data-dcnode-id="1858"><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Rural_and_Regional_Affairs_and_Transport/Completed_inquiries/2012-13/sportsantidoping/index" style="border: 0px" target="_blank"><span data-dcnode-id="1865" instrument_node="">Australian Sports Anti-Doping Authority Amendment Bill 2013</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1864"></i></a><span data-dcnode-id="1862" instrument_node="">, Senate Standing Committees on Rural and Regional Affairs and Transport, </span><em data-dcnode-id="1860" style="border: 0px"><span data-dcnode-id="1861" instrument_node="">Parliament of Australia, </span></em><span data-dcnode-id="1859" instrument_node="">(2013). This report includes submissions on proposed amendments to the Australian Sports Anti-Doping Authority Act 2006. Proposed amendments included:ASADA working more closely with police and intelligence agencies; banning athletes from working with sports professionals involved in doping; and increasing first offence bans from two to four years.</span></li><li data-dcnode-id="1850"><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Rural_and_Regional_Affairs_and_Transport/Completed%2520inquiries/2012-13/sportsscience/index" style="border: 0px" target="_blank"><span data-dcnode-id="1857" instrument_node="">Practice of sports science in Australia</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1856"></i></a><span data-dcnode-id="1854" instrument_node="">, Senate Standing Committees on Rural and Regional Affairs and Transport, </span><em data-dcnode-id="1852" style="border: 0px"><span data-dcnode-id="1853" instrument_node="">Parliament of Australia,</span></em><span data-dcnode-id="1851" instrument_node=""> (2013). This report examined the current state of sport science in Australia in terms of accreditation, management of sports scientists by sports organisations, and duty of care and ethical considerations of sport scientists.</span></li><li data-dcnode-id="1837"><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.childabuseroyalcommission.gov.au/case-study/63e7ffa5-6e29-4dc3-8434-d55c4e020199/case-study-39%2C-april-2016%2C-sydney" style="border: 0px" target="_blank"><span data-dcnode-id="1849" instrument_node="">Royal Commission into Institutional Responses to Child Sexual Abuse</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1848"></i></a><span data-dcnode-id="1846" instrument_node="">, (2013). On Friday 11 January 2013, The Honourable Dame Quentin Bryce AD CVO, then Governor-General of the Commonwealth of Australia, appointed a six-member </span><a data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.childabuseroyalcommission.gov.au/" style="border: 0px" target="_blank"><span data-dcnode-id="1845" instrument_node="">Royal Commission</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1844"></i></a><span data-dcnode-id="1842" instrument_node=""> to investigate Institutional Responses to Child Sexual Abuse. A </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.childabuseroyalcommission.gov.au/case-study/63e7ffa5-6e29-4dc3-8434-d55c4e020199/case-study-39%2C-april-2016%2C-sydney" style="border: 0px" target="_blank"><span data-dcnode-id="1841" instrument_node="">public hearing</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1840"></i></a><span data-dcnode-id="1838" instrument_node=""> into sporting clubs and institutions was held in April 2016. It is the role of the Royal Commission to uncover where systems have failed to protect children so it can make recommendations on how to improve laws, policies and practices. The Royal Commission investigated how institutions such as schools, churches, sporting bodies and Government organisations have responded to allegations and instance of child abuse. It is also the role of the Royal Commission to uncover where systems have failed to protect children so it can make recommendations on how to improve laws, policies and practices.</span></li><li data-dcnode-id="1818"><a data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aph.gov.au/Parliamentary_Business/Committees/Senate/Environment_and_Communications/SportsBetting/Report" style="border: 0px" target="_blank"><span data-dcnode-id="1836" instrument_node="">Interactive Gambling Amendment (Sports Betting Reform) Bill 2015</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1835"></i></a><span data-dcnode-id="1833" instrument_node="">. Environment and Communications Legislation Committee, </span><em data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Parliament of Australia</span></em><span data-dcnode-id="1830" instrument_node="">, (March 2017). Report from the Committee investigating the the Bill that proposes to amend the Interactive Gambling Act 2001 to implement harm minimisation measures to help individuals using online sports betting to better control their gambling. The Bill also proposes to establish an Interactive Gambling Regulator and National Self-exclusion Register. The committee concluded that the evidence presented regarding problem gambling, and in particular, problem gambling in the online environment is highly concerning. And that national reform is necessary and should be a priority. However, the committee recommended not passing this specific Bill as it noted the government's commitment to establishing a safe wagering environment for Australians by implementing the recommendations of the </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.dss.gov.au/review-impact-of-illegal-offshore-wagering/government-response" style="border: 0px" target="_blank"><span data-dcnode-id="1829" instrument_node="">O'Farrell review</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1828"></i></a><span data-dcnode-id="1826" instrument_node=""> into the </span><em data-dcnode-id="1824" style="border: 0px"><span data-dcnode-id="1825" instrument_node="">Impact of illegal offshore wagering</span></em><span data-dcnode-id="1823" instrument_node=""> as per the </span><a data-dcnode-id="1820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dss.gov.au/communities-and-vulnerable-people/programmes-services/gambling/government-response-to-the-2015-review-of-the-impact-of-illegal-offshore-wagering" style="border: 0px" target="_blank"><span data-dcnode-id="1822" instrument_node="">Government response</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1821"></i></a><span data-dcnode-id="1819" instrument_node="">.</span></li></ul><span data-dcnode-id="1816" instrument_node="">

</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Various Departments have been responsible for the sport portfolio since 1972. The annual reports of these Departments contains information about activities and expenditures outside the budget of Sport Australia. These activities include: water safety, sport integrity, and major international sporting events in Australia. Annual reports from 1972 to 2000 are held by the Clearinghouse for Sport. Annual reports post 2000 can be located on the relevant Department website.</span></p><ul data-dcnode-id="1679"><li data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Tourism and Recreation (1972-1975),</span></li><li data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Environment, Housing and Community Development (1976-1978),</span></li><li data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Home Affairs (1978/79-1979/80),</span></li><li data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Home Affairs and Environment (1980/81-1981/82),</span></li><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Sport, Recreation and Tourism (1982/83-1986/87),</span></li><li data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Arts, Sport, the Environment, Tourism and Territories (1987/88-1991/92),</span></li><li data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Environment, Sport and Territories (1992/93-1996-97),</span></li><li data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Industry, Science and Tourism (1997/98),</span></li><li data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Industry, Science and Resources (1998/99-2000/2001),</span></li><li data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Communications, Information Technology and the Arts (2001/2002-2007/2008)</span></li><li data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Health and Aging (2008/09) - 2009/2010)</span></li><li data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Prime Minister and Cabinet (2010/11)</span></li><li data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Regional Australia, Local Government, Arts and Sport (2011/12-2012/13)</span></li><li data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Health (2013/14 - current)</span></li></ul><p data-dcnode-id="1676" style="border: 0px"><strong data-dcnode-id="1677" style="border: 0px"><span data-dcnode-id="1678" instrument_node="">Budget documents</span></strong></p><ul data-dcnode-id="1671"><li data-dcnode-id="1672"><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clearinghouseforsport.gov.au/australian-sport-publication-archive/federal-government/asc_budget_papers" style="border: 0px" target="_blank"><span data-dcnode-id="1675" instrument_node="">Australian Government Budgets Documents related to Sport</span></a><span data-dcnode-id="1673" instrument_node=""> (1981/82 to present day). Covers Australian Sports Commission, Sport Integrity Australia (formerly Australian Sports Anti-Doping Authority), Office for Sport.</span></li></ul><div data-dcnode-id="1661" style="border: 0px"><p data-dcnode-id="1668" style="border: 0px"><strong data-dcnode-id="1669" style="border: 0px"><span data-dcnode-id="1670" instrument_node="">Australian Government Ministers for Sport - 1972 to present day</span></strong></p><ul data-dcnode-id="1662"><li data-dcnode-id="1663"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Minister_for_Sport_%28Australia%29" style="border: 0px" target="_blank"><span data-dcnode-id="1667" instrument_node="">Ministers for Sport</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1666"></i></a><span data-dcnode-id="1664" instrument_node=""> [ </span><h1 class="h2" data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Australian Government initiatives leveraging sport for broader policy objectives</span></h1><span data-dcnode-id="1563" instrument_node="">
</span></div><span data-dcnode-id="1561" instrument_node="">
</span></div><span data-dcnode-id="1559" instrument_node="">
</span><div class="row mt-2" data-dcnode-id="1481"><span data-dcnode-id="1558" instrument_node="">
</span><span data-dcnode-id="1555" instrument_node="">
</span><div class="col-12 table-highlight__primary" data-dcnode-id="1483"><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">The Australian Government uses sport as a platform to support a number of other public policy objectives including preventative health and well-being; community and urban development; tourism and trade; and, international relations.</span></p><ul data-dcnode-id="1485"><li data-dcnode-id="1544"><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www1.health.gov.au/internet/main/publishing.nsf/Content/Sports-Diplomacy-2030" style="border: 0px" target="_blank"><span data-dcnode-id="1551" instrument_node="">Sport Diplomacy 2030</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1550"></i></a><span data-dcnode-id="1548" instrument_node="">,&nbsp;</span><em data-dcnode-id="1546" style="border: 0px"><span data-dcnode-id="1547" instrument_node="">Commonwealth of Australia as represented by the Department of Health</span></em><span data-dcnode-id="1545" instrument_node="">; contributing portfolio agencies: Department of Foreign Affairs and Trade, Department of Health, Sport Australia, Tourism Australia, Austrade, (2019). This strategy works to bring the Government’s first national sports plan, Sport 2030, to an international stage. Australia recognises the power of sport to bring people and nations together. In 2015, when Australia released its first sport diplomacy strategy, we were a pioneer in the field. Sports Diplomacy 2030 is the second Australian sport diplomacy strategy, building on the success of the first strategy. Sports Diplomacy 2030 envisages closer collaboration between the Australian sports codes, industry and government to leverage the nation’s sporting excellence in ways that enhance Australia’s influence and reputation to advance our national interests.</span></li><li data-dcnode-id="1536"><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dfat.gov.au/about-us/publications/Pages/australian-sports-diplomacy-strategy-2015-18" style="border: 0px" target="_blank"><span data-dcnode-id="1543" instrument_node="">Australian Sports Diplomacy Strategy 2015-18</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1542"></i></a><span data-dcnode-id="1540" instrument_node="">, </span><em data-dcnode-id="1538" style="border: 0px"><span data-dcnode-id="1539" instrument_node="">Australian Government, Department of Foreign Affairs and Trade</span></em><span data-dcnode-id="1537" instrument_node="">; contributing portfolio agencies: Australian Sports Commission, Department of Health, Tourism Australia, Austrade, (2015). This document provides a strategy that focuses on the goals of connecting, developing, showcasing, and sustaining new and existing channels of sports support, sports industry partnerships, and international sports networks. Australia’s sports diplomacy strategy is a whole-of-government approach that will maximise people-to-people links which develop cultural, trade, investment, education, and tourism opportunities.</span></li><li data-dcnode-id="1528"><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trove.nla.gov.au/work/179839069" style="border: 0px" target="_blank"><span data-dcnode-id="1535" instrument_node="">National Binge Drinking Strategy</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1534"></i></a><span data-dcnode-id="1532" instrument_node="">, ‘Be the Influence'. </span><em data-dcnode-id="1530" style="border: 0px"><span data-dcnode-id="1531" instrument_node="">Department of Health,</span></em><span data-dcnode-id="1529" instrument_node=""> (2008-2015). This program involved 16 national sporting organisations tackling binge drinking by providing sporting environments, from national through to community level, that were alcohol-promotion free.</span></li><li data-dcnode-id="1520"><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.austrade.gov.au/International/Buy/Australian-industry-capabilities/Major-sporting-events" style="border: 0px" target="_blank"><span data-dcnode-id="1527" instrument_node="">Australia. Creating world class sporting events</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1526"></i></a><span data-dcnode-id="1524" instrument_node="">, </span><em data-dcnode-id="1522" style="border: 0px"><span data-dcnode-id="1523" instrument_node="">Australian Trade and Investment Commission (Austrade)</span></em><span data-dcnode-id="1521" instrument_node="">, (accessed 24 July 2020). Brochure highlighting Australian expertise across every stage of the major sporting event lifecycle and offering to connect foreign investors/hosts to Australian specialists with the vision and proven capability to help create your premier sporting event.</span></li><li data-dcnode-id="1512"><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ourwatch.org.au/our-work/preventing-violence-against-women-through-sport" style="border: 0px" target="_blank"><span data-dcnode-id="1519" instrument_node="">Preventing violence against women through sport</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1518"></i></a><span data-dcnode-id="1516" instrument_node="">, </span><em data-dcnode-id="1514" style="border: 0px"><span data-dcnode-id="1515" instrument_node="">Our Watch</span></em><span data-dcnode-id="1513" instrument_node="">, (accessed 2 March 2021). Our Watch is supported by the Commonwealth Government and all state/territory governments. Our Watch works with sporting organisations to embed gender equality and respectful relationships into their networks and communities, and build cultures that help prevent violence against women and their children. How sport can change the story provides practical examples of actions that everyone involved in sport – whether you’re a Board member, CEO, manager, coach, player, umpire, staff, volunteer or fan – can do to play a role in preventing violence against women.</span></li><li data-dcnode-id="1500"><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//itstopswithme.humanrights.gov.au/" style="border: 0px" target="_blank"><span data-dcnode-id="1511" instrument_node="">Racism.It Stops with Me</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1510"></i></a><span data-dcnode-id="1508" instrument_node="">, </span><em data-dcnode-id="1506" style="border: 0px"><span data-dcnode-id="1507" instrument_node="">Australian Human Rights Commission (AHRC)</span></em><span data-dcnode-id="1505" instrument_node="">, National Anti-Racism Strategy, (2012). In partnership with </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.playbytherules.net.au/about-pbtr" style="border: 0px" target="_blank"><span data-dcnode-id="1504" instrument_node="">Play by the Rules</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1503"></i></a><span data-dcnode-id="1501" instrument_node=""> sport is used as a platform to counter racism.</span></li><li data-dcnode-id="1486"><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.playbytherules.net.au/resources/videos/the-story-of-you-can-play" style="border: 0px" target="_blank"><span data-dcnode-id="1499" instrument_node="">You Can Play</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1498"></i></a><span data-dcnode-id="1496" instrument_node="">, </span><em data-dcnode-id="1494" style="border: 0px"><span data-dcnode-id="1495" instrument_node="">Play by the Rules</span></em><span data-dcnode-id="1493" instrument_node="">, (accessed 2 March 2021). The &amp; </span><em data-dcnode-id="1491" style="border: 0px"><span data-dcnode-id="1492" instrument_node="">You Can Play anti-homophobia in sport campaign</span></em><span data-dcnode-id="1490" instrument_node=""> started in the US and came to Australia in 2013. The story of </span><em data-dcnode-id="1488" style="border: 0px"><span data-dcnode-id="1489" instrument_node="">You Can Play</span></em><span data-dcnode-id="1487" instrument_node=""> is an interesting and powerful story. You Can Play is now supported by many sporting stars and organisations nationally and internationally.</span></li></ul><span data-dcnode-id="1484" instrument_node="">

-dcnode-id="1116" instrument_node="">, Government of South Australia, Office for Recreation and Sport. A key issue facing local government is ensuring that sport and recreation facilities will meet future needs, while being affordable and fit-for-purpose. To deal with this, Councils are looking at a range of strategies including: a focus on multi-function and shared use facilities including schools; facility consolidation; and working closely with local communities, including sports clubs.</span></li></ul><p data-dcnode-id="1109"><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sasi.sa.gov.au/" style="border: 0px" target="_blank"><span data-dcnode-id="1113" instrument_node="">South Australian Sports Institute</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="1112"></i></a><span data-dcnode-id="1110" instrument_node=""> (est.1982)</span></p><span data-dcnode-id="1108" instrument_node="">

</span><div class="col-12 pb-3 pr-4 mx-1" data-dcnode-id="735"><span data-dcnode-id="785" instrument_node="">
</span><ul data-dcnode-id="750"><li data-dcnode-id="780"><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sirc.ca/app/uploads/files/content/docs/Document/csp2012_en.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="784" instrument_node="">Canadian Sport Policy 2012,</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="783"></i></a><span data-dcnode-id="781" instrument_node="">This Policy sets direction for the period 2012-2022 for all governments, institutions and organizations that are committed to realizing the positive impacts of sport on individuals, communities and society.</span></li><li data-dcnode-id="775"><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/canadian-heritage/services/sport-policies-acts-regulations/high-performance-strategy.html" style="border: 0px" target="_blank"><span data-dcnode-id="779" instrument_node="">Canadian High Performance Sport Strategy</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="778"></i></a><span data-dcnode-id="776" instrument_node="">(2019). Within the Canadian Sport Policy, the High Performance goal states that "Canadians are systematically achieving world-class results at the highest levels of international competition through fair and ethical means".</span></li><li data-dcnode-id="767"><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/public-health/services/publications/healthy-living/lets-get-moving.html" style="border: 0px" target="_blank"><span data-dcnode-id="774" instrument_node="">A Common Vision for increasing physical activity and reducing sedentary living in Canada: Let’s Get Moving</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="773"></i></a><span data-dcnode-id="771" instrument_node="">, </span><em data-dcnode-id="769" style="border: 0px"><span data-dcnode-id="770" instrument_node="">Federal, provincial and territorial governments</span></em><span data-dcnode-id="768" instrument_node="">. (2018). Never before has Canada had a singular policy focus on physical activity and its relationship to sport, recreation, health, and other relevant policy areas. The Common Vision is a new, collective way forward that will guide the country towards ways of increasing physical activity and reducing sedentary living. It is a national policy document that is intended to move the country.</span></li><li data-dcnode-id="759"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/canadian-heritage/services/sport-policies-acts-regulations.html" style="border: 0px" target="_blank"><span data-dcnode-id="766" instrument_node="">Other Canadian sport policies</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="765"></i></a><span data-dcnode-id="763" instrument_node="">, </span><em data-dcnode-id="761" style="border: 0px"><span data-dcnode-id="762" instrument_node="">Sport Canada</span></em><span data-dcnode-id="760" instrument_node="">, (accessed 27 July 2020). For example: Women and girls, Indigenous, Disability, event hosting, etc.</span></li><li data-dcnode-id="751"><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sirc.ca/canadian-sport-policies" style="border: 0px" target="_blank"><span data-dcnode-id="758" instrument_node="">Current priorities in sport policy</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="757"></i></a><span data-dcnode-id="755" instrument_node="">, </span><em data-dcnode-id="753" style="border: 0px"><span data-dcnode-id="754" instrument_node="">Sport Information Resource Centre (SIRC)</span></em><span data-dcnode-id="752" instrument_node="">, (accessed 27 July 2020).</span></li></ul><div data-dcnode-id="737" style="border: 0px"><p data-dcnode-id="747" style="border: 0px"><strong data-dcnode-id="748" style="border: 0px"><span data-dcnode-id="749" instrument_node="">Research</span></strong></p><ul data-dcnode-id="738"><li data-dcnode-id="739"><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lop.parl.ca/sites/PublicWebsite/default/en_CA/ResearchPublications/202012E" target="_blank"><span data-dcnode-id="746" instrument_node="">Sport Canada and the Public Policy Framework for Participation and Excellence in Sport</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="745"></i></a><span data-dcnode-id="743" instrument_node="">, Marie-Claude Langlois, Reference and Strategic Analysis Division, and Marion Ménard, Legal and Social Affairs Division,</span><em data-dcnode-id="741" style="border: 0px"><span data-dcnode-id="742" instrument_node=""> Library of Parliament,</span></em><span data-dcnode-id="740" instrument_node=""> Ottawa, Canada, (2013). This paper deals primarily with the work Sport Canada - part of Canadian Heritage - does to promote participation and excellence in sport. The first section of the paper discusses why governments want to play a role in amateur sport and summarizes the history of sport public policy in Canada. The second section describes the federal government’s involvement in and priorities for sport, as well as the Sport Canada programs that help achieve these priorities. The third section provides a brief overview of what Canada has accomplished with the support of Sport Canada.</span></li></ul></div><span data-dcnode-id="736" instrument_node="">

</span><div class="col-12 pb-3 pr-4 mx-1" data-dcnode-id="636"><span data-dcnode-id="668" instrument_node="">
</span><ul data-dcnode-id="638"><li data-dcnode-id="657"><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sportnz.org.nz/about-us/our-publications/our-strategies/sport-new-zealand-2020-2032-strategic-direction" style="border: 0px" target="_blank"><span data-dcnode-id="667" instrument_node="">Sport New Zealand 2020-2032 Strategic Direction</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="666"></i></a><span data-dcnode-id="664" instrument_node="">, Sport NZ ‘s vision is simple - to get Every Body Active in Aotearoa New Zealand. How we work towards the long-term goals is outlined in three four-year strategic plans, the first of which covers the period 2020 to 2024. Each strategic plan sets out the key target audience against which we seek to grow participation and the Key Result Areas (KRAs) against which we will measure success. </span><ul data-dcnode-id="658"><li data-dcnode-id="659"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sportnz.org.nz/about-us/our-publications/our-strategies/sport-new-zealand-2020-2021-strategic-priorities" style="border: 0px" target="_blank"><span data-dcnode-id="663" instrument_node="">Sport New Zealand 2020-2021 Strategic Priorities</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="662"></i></a><span data-dcnode-id="660" instrument_node="">, (2020). In light of the ever changing COVID-19 environment, we have developed a document to outline our single year strategic priorities. This will be our focus for the next 12 months.</span></li></ul></li><li data-dcnode-id="652"><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hpsnz.org.nz/what-we-do/2030-hp-system-strategy/" target="_blank"><span data-dcnode-id="656" instrument_node="">2032 HP System Strategy</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="655"></i></a><span data-dcnode-id="653" instrument_node="">,(2020). The 2032 HP System Strategy is a living roadmap that sets out what the High Performance Sport System as a whole in New Zealand needs to achieve between now and 2032 and how it will go about this. It provides a whole of system view and contains 12 workstreams that span the breadth of the New Zealand High Performance system.</span></li><li data-dcnode-id="647"><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sportnz.org.nz/about-us/our-publications/our-strategies/new-zealand-coaching-strategy" style="border: 0px" target="_blank"><span data-dcnode-id="651" instrument_node="">New Zealand Coaching Strategy</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="650"></i></a><span data-dcnode-id="648" instrument_node=""> (2016)</span></li><li data-dcnode-id="643"><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sportnz.org.nz/about-us/our-publications/our-strategies/sport-nz-group-strategic-plan-2015-2020" style="border: 0px" target="_blank"><span data-dcnode-id="646" instrument_node="">Sport NZ Group Strategic Plan 2015-2020</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="645"></i></a></li><li data-dcnode-id="639"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sportnz.org.nz/about-us/our-publications/our-strategies/community-sport-strategy" style="border: 0px" target="_blank"><span data-dcnode-id="642" instrument_node="">Community Sport Strategy 2015-2020</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="641"></i></a></li></ul><span data-dcnode-id="637" instrument_node="">

</span><div class="row" data-dcnode-id="499"><span data-dcnode-id="569" instrument_node="">
</span><div class="col-12 pb-3 pr-4 mx-1" data-dcnode-id="501"><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="565" style="border: 0px"><strong data-dcnode-id="566" style="border: 0px"><span data-dcnode-id="567" instrument_node="">England</span></strong></p><ul data-dcnode-id="554"><li data-dcnode-id="560"><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/government/uploads/system/uploads/attachment_data/file/486622/Sporting_Future_ACCESSIBLE.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="564" instrument_node="">Sporting Future: A new strategy for an active nation</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="563"></i></a><span data-dcnode-id="561" instrument_node="">, HM Government, (December 2015). this new strategy for sport and physical activity moves beyond merely looking at how many people take part. It will consider what people get out of participating and what more can be done to make a physically active life truly transformative. In the future, funding decisions will be made on the basis of the social good that sport and physical activity can deliver, not simply on the number of participants. We are redefining what success looks like in sport by concentrating on five key outcomes: physical wellbeing, mental wellbeing, individual development, social and community development and economic development.</span></li><li data-dcnode-id="555"><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportengland.org/media/10629/sport-england-towards-an-active-nation.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="559" instrument_node="">Sport England: Towards an Active Nation Strategy 2016-2021</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="558"></i></a><span data-dcnode-id="556" instrument_node="">,In December 2015 the Government published Sporting Future: A New Strategy for an Active Nation. Putting this policy into practice to achieve these outcomes will mean significant change for Sport England and for our partners. This strategy sets out how we will deliver this task.</span></li></ul><div data-dcnode-id="545" style="border: 0px"><div data-dcnode-id="551" style="border: 0px"><strong data-dcnode-id="552" style="border: 0px"><span data-dcnode-id="553" instrument_node="">Northern Ireland</span></strong></div><ul data-dcnode-id="546"><li data-dcnode-id="547"><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sportni.net/about-us/sports-strategy" style="border: 0px" target="_blank"><span data-dcnode-id="550" instrument_node="">Sport Matters: The Northern Ireland Strategy for Sport and Physical Recreation, 2009-2019</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="549"></i></a></li></ul></div><div data-dcnode-id="542" style="border: 0px"><strong data-dcnode-id="543" style="border: 0px"><span data-dcnode-id="544" instrument_node="">Scotland</span></strong></div><ul data-dcnode-id="528"><li data-dcnode-id="534"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sportforlife.org.uk/" style="border: 0px" target="_blank"><span data-dcnode-id="541" instrument_node="">Sport for Life: A vision for sport in Scotland</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="540"></i></a><span data-dcnode-id="538" instrument_node="">,&nbsp;</span><em data-dcnode-id="536" style="border: 0px"><span data-dcnode-id="537" instrument_node="">sportscotland</span></em><span data-dcnode-id="535" instrument_node="">, (2019). Fun, health, developing skills or winning medals. Whatever the reasons for getting into sport, we want people to enjoy as many of its benefits as possible.</span></li><li data-dcnode-id="529"><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sportscotland.org.uk/about-us/what-we-do/publications/business-plan" style="border: 0px" target="_blank"><span data-dcnode-id="533" instrument_node="">Sport Scotland Business &amp; Corporate Plans</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="532"></i></a><span data-dcnode-id="530" instrument_node="">, including the Strategic guidance letter from Scottish Government to sportscotland 2018-19 to 2020-21.</span></li></ul><p data-dcnode-id="525"><strong data-dcnode-id="526" style="border: 0px"><span data-dcnode-id="527" instrument_node="">Wales</span></strong></p><div data-dcnode-id="503" style="border: 0px"><ul data-dcnode-id="504" type="disc"><li data-dcnode-id="520"><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//visionforsport.wales/" style="border: 0px" target="_blank"><span data-dcnode-id="524" instrument_node="">Vision for Sport #WeCanWales</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="523"></i></a><span data-dcnode-id="521" instrument_node="">. The Vision for Sport seeks to transform Wales into an Active Nation following conversations with individuals from every part of the country.</span></li><li data-dcnode-id="515"><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//futures.sport.wales/%231" style="border: 0px" target="_blank"><span data-dcnode-id="519" instrument_node="">Embracing the Vision for Sport in Wales: the new Sport Wales Strategy</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="518"></i></a><span data-dcnode-id="516" instrument_node="">. The vision is to create an active nation. We want as many people as possible to be inspired to be active through sport.</span></li><li data-dcnode-id="510"><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sport.wales/files/89a4427c91ad4d1b260eea4c567ac7f7.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="514" instrument_node="">Elite Sport Strategy </span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="513"></i></a><span data-dcnode-id="511" instrument_node="">The blueprint for a sustained level of achievement at the highest level of sport.</span></li><li data-dcnode-id="505"><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sport.wales/files/b5e81f7bc09379bf700c08c80ff4806d.pdf" style="border: 0px" target="_blank"><span data-dcnode-id="509" instrument_node="">Facilities for Future Generations Report </span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="508"></i></a><span data-dcnode-id="506" instrument_node="">(2016). A blueprint for sport and active recreation in Wales.</span></li></ul></div><span data-dcnode-id="502" instrument_node="">

</span><div class="row" data-dcnode-id="444"><span data-dcnode-id="474" instrument_node="">
</span><div class="col-12 pb-3 pr-4 mx-1" data-dcnode-id="446"><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="468" style="border: 0px"><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spliss.be/" style="border: 0px" target="_blank"><span data-dcnode-id="472" instrument_node="">SPLISS</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="471"></i></a><span data-dcnode-id="469" instrument_node=""> is an international network of research cooperation that coordinates, develops and shares expertise in innovative high performance sport policy research in cooperation with policy makers, National Olympic Committees (NOCs), international (sport) organisations, and researchers worldwide. The SPLISS project has so far published two major reports:</span></p><ul data-dcnode-id="448"><li data-dcnode-id="457"><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ausport.libero.com.au/libero/WebopacOpenURL.cls%3FACTION%3DDISPLAY%26sid%3DLIBERO%3AASC%26RSN%3D68144" style="border: 0px" target="_blank"><span data-dcnode-id="467" instrument_node="">The global sporting arms race:&nbsp;an international comparative study on sports policy factors leading to international sporting success</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="466"></i></a><span data-dcnode-id="464" instrument_node="">. De Bosscher, V., </span><em data-dcnode-id="462" style="border: 0px"><span data-dcnode-id="463" instrument_node="">Meyer &amp; Meyer Sport</span></em><span data-dcnode-id="461" instrument_node="">, (2008). This volume draws on research involving more than 1,400 athletes, coaches, and performance directors at the highest levels and seeks to evaluate and compare over 100 factors that lead to international sporting success. An international comparison of elite sports systems and policies in six nations (Belgium, Canada, Italy, the Netherlands, Norway and the United Kingdom) provides a basis for measuring the efficiency and effectiveness of sport management systems and identifies for investigation possible factors leading to international sporting success. Key concepts are funding, integrated policy development, participation rates, talent identification and development systems, long term athlete development including post career support, training facilities, coaching provision and coach development, intyernational competition and sports science research. [</span><em data-dcnode-id="459" style="border: 0px"><span data-dcnode-id="460" instrument_node="">book held by the Clearinghouse for Sport, GV713.B67</span></em><span data-dcnode-id="458" instrument_node="">]</span></li><li data-dcnode-id="449"><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ausport.libero.com.au/libero/WebopacOpenURL.cls%3FACTION%3DDISPLAY%26sid%3DLIBERO%3AASC%26RSN%3D512703" style="border: 0px" target="_blank"><span data-dcnode-id="456" instrument_node="">Successful elite sport policies : an international comparison of the sports policy factors leading to international sporting success (SPLISS 2.0) in 15 nations</span><i aria-hidden="true" class="icon-external-link ml-1" data-dcnode-id="455"></i></a><span data-dcnode-id="453" instrument_node="">. De Bosscher, V., </span><em data-dcnode-id="451" style="border: 0px"><span data-dcnode-id="452" instrument_node="">Meyer &amp; Meyer Sport</span></em><span data-dcnode-id="450" instrument_node="">, (2015). This book deals with the strategic policy planning process that underpins the development of successful national elite sport development systems. Drawing on various international competitiveness studies, it examines how nations develop and implement policies that are based on the critical success factors that may lead to competitive advantage in world sport. An international group of researchers joined forces to develop theories, methods and a model on the Sports Policy factors Leading to International Sporting Success (SPLISS). The book presents the results of the large-scale international SPLISS-project. In this project the research team identified, compared and contrasted elite sport policies and strategies in place for the Olympic Games and other events in 15 distinct nations. With input from 58 researchers and 33 policy makers worldwide and the views of over 3000 elite athletes, 1300 high performance coaches and 240 performance directors, this work is the largest benchmarking study of national elite sport policies ever conducted.</span></li></ul><span data-dcnode-id="447" instrument_node="">
