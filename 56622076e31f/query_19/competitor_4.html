</span><p align="center" data-dcnode-id="1650"><span data-dcnode-id="1656" instrument_node="">

</span><p align="center" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p align="center" data-dcnode-id="1640"><span data-dcnode-id="1645" instrument_node="">
</span><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">A</span></strong><strong data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">BSTRACT</span></strong></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1638" instrument_node="">
</span><em data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">During the 30 years of R</span></em><em data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">eform and </span></em><em data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">O</span></em><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">pening</span></em><span data-dcnode-id="1629" instrument_node=""> </span><em data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">up, China’s agricultural policy has formed a relatively complete framework. This framework generally consists of three major categories: basic agricultural policies, policies to support agricultural production, and policies to protect agricultural benefits. In details, the policies cover 16 areas, including basic rural management system, agricultural subsid</span></em><em data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">y</span></em><em data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node=""> policy, agricultural technology policy, and resources and environment protection policy, etc. </span></em><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">T</span></em><em data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">hese policies have played an important role in the development of the agricultural and rural economics. However, the agricultural and rural development of China still faces many challenges, such as tight balance between supply and demand of major agricultural products, difficulty in </span></em><em data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">price </span></em><em data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">regulation</span></em><span data-dcnode-id="1614" instrument_node=""> </span><em data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">of the agricultural products, increased </span></em><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">demand for </span></em><em data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">agricultural socialization service, </span></em><em data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">relative stagnation of </span></em><em data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">agricultural technology, increased difficulty in improving rural governance, and pressure to continuously increase famer’s income, etc. </span></em><em data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">B</span></em><em data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">ased on the existing policies, Chinese government has developed a number of new policies for the future development of agriculture. The new policies generally include: improving national food security system, enhancing agricultural supporting and protection system, establishing long-term sustainable development mechanism of agriculture, deepening the reform of rural land system, </span></em><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">building</span></em><em data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node=""> of new agricultural management system, accelerating rural financial system innovation and developing the mechanism of urban-rural integration, etc.</span></em></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">
	Key words: China’s agricultural policies, effective supply of agricultural products, increase farmers’ income, agricultural modernization</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p align="center" data-dcnode-id="1582"><span data-dcnode-id="1587" instrument_node="">
</span><strong data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">1. </span></strong><strong data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Introduction</span></strong></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579" style="margin-left:6pt;"><span data-dcnode-id="1580" instrument_node="">
	Since the 1980s, the agricultural economy and rural development in China has made tremendous achievements, and innovation and implementation of agricultural policies played a key role. However, entering the new century, China is facing a more complex macroeconomic situation:</span></p><span data-dcnode-id="1578" instrument_node="">
</span><ul data-dcnode-id="1567"><span data-dcnode-id="1577" instrument_node="">
</span><li data-dcnode-id="1575" style="margin-left: 40px;"><span data-dcnode-id="1576" instrument_node="">
		The rapid development of industrialization, informatization and urbanization has made the demand for simultaneously pushing forward agricultural modernization more urgent,</span></li><span data-dcnode-id="1574" instrument_node="">
</span><li data-dcnode-id="1572" style="margin-left: 40px;"><span data-dcnode-id="1573" instrument_node="">
		The contradiction between ensuring the supply of grain and other important agricultural products</span></li><span data-dcnode-id="1571" instrument_node="">
</span><li data-dcnode-id="1569" style="margin-left: 40px;"><span data-dcnode-id="1570" instrument_node="">
		The bearing capacity of resources and the environment has become increasingly more acute and the profound changes in the economic structure and the social structure have put forward tasks in innovating rural social management that badly need to be fulfilled.</span></li><span data-dcnode-id="1568" instrument_node="">
</span></ul><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564" style="margin-left:6pt;"><span data-dcnode-id="1565" instrument_node="">
	So, to keep agriculture sustainable, stable and harmonious development, China has to promote agricultural policy innovation based on the new features of its own agricultural development and continuing to strengthen the foundation of existing agricultural policies.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561" style="margin-left:6pt;"><span data-dcnode-id="1562" instrument_node="">
	This paper provides a systematic insight into the China agricultural policies since the new century. The second part introduces the main objective of China's agricultural policy based on summarizing its new features at the present stage; The third part shows China’s basic agricultural policy framework involving a total of 16 specific policy aspects of three major classes; The fourth part Analyzes the role played by the existing agricultural policies and the new challenges faced by the existing agricultural policies recently; the fifth part focuses on the new thoughts “Sannong” (works related to agriculture, farmers and rural areas) development and the highlights of agricultural policy innovation; the final part is the concluding comments.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p align="center" data-dcnode-id="1556"><span data-dcnode-id="1559" instrument_node="">
</span><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">2. The Objectives of China’s Agricultural Policies</span></strong></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1554" instrument_node="">
</span><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">2.1 Features of the development of China’s agriculture in the new century</span></strong></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548" style="margin-left:6pt;"><span data-dcnode-id="1549" instrument_node="">
	Since the new century, China has undergone significant changes in economy and society, and agricultural economy and rural development has stepped into a new stage. Obvious features are shown in management of agricultural system, demand and supply of agricultural products, cost and price of agricultural products, rural labor force, operation mode, technology, farmers’ income, etc.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1539" style="margin-left:6pt;"><span data-dcnode-id="1546" instrument_node="">
	The first feature is that the management system of agriculture was converted to active design from passive adjustment. From 1980 to the end of 20</span><sup data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">th</span></sup><span data-dcnode-id="1543" instrument_node=""> century, the dominant way of China’s agricultural system management was passive adjustment, such as household contract responsibility system, reform of grain circulation system, and reform of taxes and fees. Since the new century, especially after 2004, </span><stockticker data-dcnode-id="1541" w:st="on"><span data-dcnode-id="1542" instrument_node="">CPC</span></stockticker><span data-dcnode-id="1540" instrument_node=""> (Communist Party of China) central committee has issued 11 consecutive “No. 1” documents, focusing on issues of agriculture, farmer and rural area. Government has implemented a series of "giving more, taking less and liberalize" policies to benefit the agriculture, and agricultural system started to convert from passive adjustment to active design.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536" style="margin-left:6pt;"><span data-dcnode-id="1537" instrument_node="">
	The second feature is the tight balance of the overall supply and demand of the agricultural products and accelerated shortage of some varieties. In 2004, China encountered its first deficit in agricultural product international trade, and the situation has not reversed till now. Food self-sufficiency rate has dropped from 99.6% in1990s to around 90% in 2010. The structural shortage of some varieties is serious, for example, 2.84 million tons of cotton was imported in 2010, taking about half of the domestic cotton production (5.96 million tons);&nbsp; 6.87 million tons of vegetable oil was imported, taking 1/3 of the domestic consumption (25.75 million tons). In addition, structural shortage is also partially reflected on the shortage of high-quality agricultural products. The occurrence of a series of food safety incidents has driven a sharp increase in demand for safe and high quality agricultural products.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533" style="margin-left:6pt;"><span data-dcnode-id="1534" instrument_node="">
	The third feature is the rising of production cost and various fees. Since 2003, the cost of agricultural production started a new round of rising, and the costs started to increase significantly in 2006. Meanwhile, the various types of agricultural production costs hiked, and the unit costs, such as wages per working day, the costs of land, fertilizer, and machinery per Mu, kept increasing for farming.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530" style="margin-left:6pt;"><span data-dcnode-id="1531" instrument_node="">
	The fourth feature is the volatile rising of agricultural products and the growing number of affecting factors. From 1999 to 2003, the price index of China’s major agricultural products dropped by approximately 10%, while from 2004 to 2011, it rose by about 72%, and the price of agricultural products has obviously turned into upward trend since 2004. The prices of three major grain (rice, wheat and corn), vegetable and cotton have less annual volatility, while that of soybeans, cooking oil and pork is greater; and the prices of vegetables have strong cyclical fluctuations within the year. The dominant causes of the rising of agricultural products are the increased cost, changes in demand-supply structure, excessive money supply, and influences of international prices, etc.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527" style="margin-left:6pt;"><span data-dcnode-id="1528" instrument_node="">
	The fifth feature is the limited rural labor surplus and structural shortage of agricultural labor. Because of China's large rural population, there are currently about 100 million rural surplus laborers. However, with a large number of rural labor force moving to urban, the proportion of young, relatively well-educated, and male labor force dropped significantly, leading to a significant shortage in young rural labor force in busy seasons and certain regions.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1521" style="margin-left:6pt;"><span data-dcnode-id="1525" instrument_node="">
	The sixth feature is the acceleration of the process of agricultural organization and diversity of the operation modes. Farmers’ specialized cooperatives and various types of agriculture industrialization organizations were developing rapidly, and agricultural organization process was accelerated significantly. By the end of 2003, 982,400 farmer cooperatives were registered nationwide, and 74.12 million farmer families joined the cooperative, taking up to 28.5% of the total number of farmer households.</span><a data-dcnode-id="1523" href="#_ftn1" id="_ftnref1" name="_ftnref1" title=""><span data-dcnode-id="1524" instrument_node="">[1]</span></a><span data-dcnode-id="1522" instrument_node=""> The operation modes of agriculture was getting more diverse, with joint-development of family-operated, collective managed, cooperative and business modes, etc. Vertical integration of agriculture process was speeding up, and the scale of operation of agriculture was expanded.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518" style="margin-left:6pt;"><span data-dcnode-id="1519" instrument_node="">
	The seventh feature is the steady growth of technology contribution rate and the increasingly prominent position of technology in agriculture. Recent years, the technology contribution rate in agriculture increased rapidly with a yearly increment of 1%, and has reached 53.5% in 2003, which has surpassed the contributions of land, labor, and material input factors.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515" style="margin-left:6pt;"><span data-dcnode-id="1516" instrument_node="">
	The eighth feature is the steady growth of farmers’ income, and both wage income and household business income increases. From 1998 to 2003, the average annual increment of farmers’ net income per capita was 3.5%, and it was 6.5% from 2004 to 2013, which was 1.9 times greater. The percentages of wage income, household business income, transfer income, and property income in 2003 were 45.3%, 42.6%, 8.8%, and3.3% respectively, and the wage income surpassed the household business income for the first time, and became the primary income source for farmers（Rural Development Institute Chinese Academy of Social Scinece 2014.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1510" style="margin-left:4.5pt;"><span data-dcnode-id="1513" instrument_node="">
</span><strong data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">2.2 The objectives of China’s agricultural policies in current stage</span></strong></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">
	Based on the above features of agricultural economics and rural development, the overall objective of China’s agricultural policies in current stage is to ensure the sustainability, stability, harmony, and innovation of development of agriculture. Sustainability is to well handle the relationship of the exploitation, conservation and protection of the agricultural resources, and to ensure environmental friendly, ecological improving, and sustainable development of agriculture. Stability is to keep steady growth of agricultural production, to ensure food safety, to keep steady growth of farmers’ income, and to protect farmers’ benefits. Harmony is to coordinate the development between agriculture and other industries, and to prevent stagnation in agricultural development. Innovation is to develop modern agriculture, and to realize innovation of technology, agricultural system and management.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">
	Currently, the objectives of China’s agricultural policies include:</span></p><span data-dcnode-id="1503" instrument_node="">
</span><ul data-dcnode-id="1489"><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">
		Ensure effective supply of agricultural products. Since 1978, food production in China has been greatly increased, but there is still a lot of pressure in medium and long-term food security. Therefore, ensuring effective supply of agricultural products and national food safety is the primary objective of China’s agricultural policies.</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">
		Promote the steady growth of farmers’ income. Improve farmers’ income and welfare is an important objective of China's agricultural policy. The policies must place steady improvement of farmers’ income in the position equally important as the effective supply of agricultural products. Farmers will increase the agricultural input and supply of agricultural products only with the stimulation of the increase of their income.</span></li><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">
		Realize sustainable development of agriculture. In the context of global climate change, the realization of sustainable development of agriculture is the major objective of China’s agricultural policies. This is not only the need to undertake the responsibility of country with great power, but also the requirement of the economic development of the entire society and the actual conditions of China.</span></li><span data-dcnode-id="1493" instrument_node="">
</span><li data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">
		Promote agricultural modernization. This is not only an important part of transformation of China’s economic development mode and building a well-off society, but also a necessary requirement to improve agricultural production capacity, increase farmers’ income, and build a new socialist countryside. Completing the transition from traditional agriculture to modern agriculture through innovation of technology, agricultural system and management is an important strategic objective of China’s agricultural policies.</span></li><span data-dcnode-id="1490" instrument_node="">
</span></ul><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1482" style="text-align: center;"><span data-dcnode-id="1484" instrument_node="">
</span><img alt="" data-dcnode-id="1483" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ap.fftc.org.tw/upload/images/ap/ap_policy/266/china%2520zhen%2520zhong%2520t1.jpg&amp;raw" style="width: 456px; height: 600px;"></p><span data-dcnode-id="1481" instrument_node="">
</span><p align="center" data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p align="center" data-dcnode-id="1471"><span data-dcnode-id="1474" instrument_node="">
</span><strong data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">3. China’s Agricultural Policy Framework</span></strong></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1465" style="margin-left:6pt;"><span data-dcnode-id="1469" instrument_node="">
	Since 1950s, Chinese government has implemented a series of policies and measures for agriculture according to the national economic and agricultural development in different periods. After 30 years’ development of reform and opening up, China’s agricultural policy has formed a relatively complete framework. This framework generally consists of three major categories: basic agricultural policies, policies to support agricultural production, and policies to protect agricultural benefits. </span><a data-dcnode-id="1467" href="#_ftn2" id="_ftnref2" name="_ftnref2" title=""><span data-dcnode-id="1468" instrument_node="">[2]</span></a><span data-dcnode-id="1466" instrument_node="">(Figure 1)</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462" style="margin-left:6pt;"><span data-dcnode-id="1463" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459" style="margin-left:6pt;"><span data-dcnode-id="1460" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1455" style="margin-left: 6pt; text-align: center;"><span data-dcnode-id="1457" instrument_node="">
</span><img alt="" data-dcnode-id="1456" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ap.fftc.org.tw/upload/images/ap/ap_policy/266/china%2520zhen%2520zhong%2520f1.jpg&amp;raw" style="width: 438px; height: 600px;"></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452" style="margin-left: 6pt; text-align: center;"><span data-dcnode-id="1453" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1447" style="margin-left:6pt;"><span data-dcnode-id="1450" instrument_node="">
</span><strong data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">3.1 Basic agricultural policies</span></strong></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444" style="margin-left:5.65pt;"><span data-dcnode-id="1445" instrument_node="">
	3.1.1 Basic rural management system</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441" style="margin-left:5.75pt;"><span data-dcnode-id="1442" instrument_node="">
	An important historical experience of China’s rural reform is to insist on the basic rural management system created by millions of peasants, which adapts to the socialist economic system and accord with China’s agricultural production features. The dual management system, basing itself on the family contractual operation, is a fundamental management system for Chinese countryside. The main elements of this policy are: collective ownership of rural lands and other major means of production, basis of family contractual operation, land contractual management rights which can be transferred according to laws, enhancement on collective organization services, and support on the various types of cooperation with farmers, etc. In 2003, NPC Standing Committee passed the “Land contract law of the people's Republic of China”, which conducted a systematic review and improvement of land contract policies at a legal dimension since the family contractual operation system. Meetings of CPC and NPC since 2004 have proposed to continue to “stabilized and improve the basic rural management system”. Therefore, the dual management system, basing itself on the family contractual operation, is the most important institutional achievement on China’s rural reform, the cornerstone of the rural policy, and the foundation of various specific agricultural policies.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438" style="margin-left:5.65pt;"><span data-dcnode-id="1439" instrument_node="">
	3.1.2Farmland protection policy</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1429" style="margin-left:5.75pt;"><span data-dcnode-id="1436" instrument_node="">
	Farmland resource constraint is the “bottleneck” and “short board” of China’s agricultural development and China has taken the farmland protection as the long-term basic nation policy. When talking about farmland protection, the core content is to maintain the quantity and improve the quality of the farmland, including establishing the basic farmland protection system, implementing the most stringent farmland protection system, strengthening the farmland quality improvement, and improving the land requisition system, etc. Article 4 of “The land administration law of the people's Republic of China” states that “It shall rigidly restrict conversion of land for agriculture to land for construction, keep the total area of land for construction under control and give special protection to cultivated land”. In 2003, implementing the most stringent farmland system was proposed in the 16</span><sup data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">th</span></sup><span data-dcnode-id="1433" instrument_node="">third plenum of the CPC. In 2008, the 17</span><sup data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">th</span></sup><span data-dcnode-id="1430" instrument_node=""> third plenum of CPC emphasized to “improve the strictly regulated rural land management system”. In 2002, the new “National modern agriculture development plan (2011-2015)” stated that “continue to implement the most stringent farmland protection system, strengthen the farmland quality improvement, make sure to keep the amount of arable land at 1.818 billion Mu, and the amount of farmland not less than 1.56 million Mu”.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426" style="margin-left:5.65pt;"><span data-dcnode-id="1427" instrument_node="">
	3.1.3 Food security policy</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1420" style="margin-left:5.75pt;"><span data-dcnode-id="1424" instrument_node="">
	Chinese government has paid great attention to food security. Since 1980s, the government has implemented a series of policies and measures to benefit the food development: adhere to the principle that meeting demand with domestic production; implement governor responsibility system of food; improve comprehensive production capacity of food; increase the input to agriculture and food fields; improve financial awards policy; highly strengthen agricultural technology innovation and application; strengthen protection of arable land, water resource and other primary elements for production; improve the reform of food circulation system; promote the food price protection; improve the policy of the regulatory mechanism of food reserves; and establish the food security policy system that obey the rules of market economy. The contents of the policies have been in a prime position in the No. 1 document of CPC central committee since 2004. In the background of global food crisis, the 17</span><sup data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">th</span></sup><span data-dcnode-id="1421" instrument_node=""> third plenum of CPC stated that ensuring the national food security and effective supply of major agricultural products is necessary. “The national modern agricultural development plan (2011-2015)” further implemented strategic objectives of steady development of grain, cotton, oil, and sugar, to ensure the national food security.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1415" style="margin-left:6pt;"><span data-dcnode-id="1418" instrument_node="">
</span><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">3.2 Agricultural production supporting policies</span></strong></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412" style="margin-left:5.65pt;"><span data-dcnode-id="1413" instrument_node="">
	3.2.1 Agricultural structural adjustment policy</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409" style="margin-left:5.75pt;"><span data-dcnode-id="1410" instrument_node="">
	The main content of the agricultural structural adjustment policy are: promote the upgrading and optimization of industrial structure of agriculture; promote the arrangement optimization of the main area; promote the improvement of agricultural product quality; promote the development of agricultural industrialization; strengthen agricultural research and technology; and construct the structural adjustment supporting system of agricultural industrialization, etc. Before 1990s, the major objective of the agricultural structural adjustment policy is to never relax grain production, and actively carry out a variety of business. Since 1992, the central committee declared to be guided by the market, accelerate the development of productive, high quality, efficient agriculture, and promote the regionalization, specialization, and commercialization of agricultural production. The agricultural structural adjustment focused on grain and cotton production, “non-staple food project” and the effective supply of agricultural products. Since 2000,the central committee has declared to include developing product processing and ensuring the product quality and safety in the main content of the agricultural structural adjustment, and take improving the quality and efficiency, and realizing sustainable agricultural development as the target of the structural adjustment. In 2006, the No. 1 document stated that “adjust the agricultural structure according to requirement on the high productivity, high quality, high efficiency, ecology, and safety”. In 2009, government support growing oil plants, cotton and other economic crops in advantageous areas, and started to implement a new round of arrangement of agricultural advantageous area. In 2003, the No. 1 document again proposed to “adhere to area stabilization, structural optimization, and unit output improvement in grain production”, and continue to support the construction of production base of cotton, oil and sugar plants in the advantageous area.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406" style="margin-left:5.65pt;"><span data-dcnode-id="1407" instrument_node="">
	3.2.2 Agricultural product quality and safety policy</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1391" style="margin-left:5.75pt;"><span data-dcnode-id="1404" instrument_node="">
	Since 1980s, the food quality problem has been more and more serious, as the pressure of food quantity problem got relaxed. As a result, China implemented a series of policies and measures, including: establish monitoring system on product quality, quality certification and labeling system, product quality standards system, safe production supporting system, and product quality traceability system, etc. Since the 21</span><sup data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">st</span></sup><span data-dcnode-id="1401" instrument_node=""> century, China has started to formulate rules and provisions relating to agricultural product quality in the law dimension. April 29</span><sup data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">th</span></sup><span data-dcnode-id="1398" instrument_node=""> 2006, the “Quality and safety law of the people's Republic of China Agricultural Products” was passed in 21</span><sup data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">st</span></sup><span data-dcnode-id="1395" instrument_node=""> meeting of the 10</span><sup data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">th</span></sup><span data-dcnode-id="1392" instrument_node=""> standing committee of NPC. This was a milestone in the history of China’s agricultural product quality and safety control, and it stated that “the country shall establish and improve standards of agricultural products quality and safety”. The product quality and safety issues were considered seriously in the No. 1 documents in the new century: arranged product quality and safety tasks comprehensively (2005); proposed “development of healthy aquaculture” (2007); proposed to “strengthen agricultural standardization and product quality and safety” (2008); proposed to “strictly monitor the product quality and safety” (2009); proposed to “accelerate the construction of the monitor and inspection system of product quality and safety, and actively develop pollution-free, green and organic food” (2010); and emphasized to reform and improve the food safety regulatory system, and implementation of regulatory responsibility from the farm to the table, etc.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388" style="margin-left:5.65pt;"><span data-dcnode-id="1389" instrument_node="">
	3.2.3 Agricultural taxes policy</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1358" style="margin-left:5.75pt;"><span data-dcnode-id="1386" instrument_node="">
	Agricultural taxes are the taxes levied by the government from all companies and individuals working on agricultural production and have agricultural income. The taxes policy, from June 3</span><sup data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">rd</span></sup><span data-dcnode-id="1383" instrument_node=""> 1958 when “The agricultural tax regulations of the people's Republic of China” was first passed in the 96</span><sup data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">th</span></sup><span data-dcnode-id="1380" instrument_node=""> meeting of the Standing Committee of the first NPC to the end of 20</span><sup data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">th</span></sup><span data-dcnode-id="1377" instrument_node=""> century, has made a significant contribution to the development of the country, but it has also accumulated a large number of agricultural and rural conflicts. In the new century, from the trial operation in Anhui in 2000, to nationwide operation in 2003, China started the reform the taxes policy aiming to reduce farmers’ burden. Starting from 2004, the taxes reform went into a deeper stage, all or part of the agricultural taxes were waived in 8 provinces including Jilin and Heilongjiang, and the agricultural taxes were reduced by 3% in 11 major grain producing areas such as Hebei, and by 1% in other areas. In 2005, all agricultural taxes were waived in 28 provinces, and were reduced to 2% or less in Hebei, Shandong, and Yunnan. December 29</span><sup data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">th</span></sup><span data-dcnode-id="1374" instrument_node=""> 2005, the 19</span><sup data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">th</span></sup><span data-dcnode-id="1371" instrument_node="">meeting of the Standing Committee of the 10</span><sup data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">th</span></sup><span data-dcnode-id="1368" instrument_node=""> NPC decided to abolish “agricultural tax regulations” from January 1</span><sup data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">st</span></sup><span data-dcnode-id="1365" instrument_node=""> 2006, abolish taxes on special agricultural products except for tobacco, and abolish all livestock tax. From December 1</span><sup data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">st</span></sup><span data-dcnode-id="1362" instrument_node=""> 2010, all toll roads nationwide (including independent toll bridges and tunnels) were included in the network of “easy access” of fresh agricultural product transportation, and vehicles legally loaded with fresh and live agricultural products are allowed to run across china free of tolls. From January 1</span><sup data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">st</span></sup><span data-dcnode-id="1359" instrument_node=""> 2010, value-added tax in the link of vegetable circulation was exempted. The current main policies and measures include: the abolition of agricultural tax, special agricultural product tax, slaughter tax, and property tax, cancelling "three deductions" and the "five charges", cancelling systems of labor accumulation and volunteer work, and promoting coordinated reform.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355" style="margin-left:5.65pt;"><span data-dcnode-id="1356" instrument_node="">
	3.2.4Agricultural subsidy policy</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352" style="margin-left:5.75pt;"><span data-dcnode-id="1353" instrument_node="">
	Currently, China generally is in the development stage of “promoting agriculture with industry, rural area with urban”. The state government has implemented basic policies of “industry nurturing agriculture, city supporting countryside” and “giving more, taking less and loosening control”, and a agricultural subsidy policy system is initially formed, focusing on grain production, farmer’s income, and environment protection, combining comprehensive and specialized subsidies, and covering contents including infrastructure construction, seeds, agricultural machinery, agricultural products, production technology, and disaster relief, etc. In 2004 direct subsidy for grain farmers were fully implemented nationwide, and in 2012 the grain farmer subsidy came up to 15.1 billion Yuan. In 2006, the state took the fuel price adjustment as an opportunity, and established the comprehensive agricultural price subsidy system. The subsidy fund in the same year was 12 billion Yuan, and increase to 107.8 billion Yuan in 2012. In 2009, the agricultural subsidy was greatly increased, full coverage of seed subsidy was realized for rice, wheat, corn and cotton, and the scale of seed subsidy for canola and soybean was also expanded. In 2010, scale of subsidy for potato farming was expanded, highland barley seed subsidy was started, peanut seed subsidy was started in trial areas, and animal husbandry, forestry and drought control, and water-saving machinery were included in the scope of subsidy for agricultural machinery and tool purchase. From 2004 to 2012, the funds for agricultural “Four Subsidys” kept increasing, and were accumulated to 166.8 billion Yuan by 2012.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1348" style="margin-left: 5.75pt; text-align: center;"><span data-dcnode-id="1350" instrument_node="">
</span><img alt="" data-dcnode-id="1349" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ap.fftc.org.tw/upload/images/ap/ap_policy/266/china%2520zhen%2520zhong%2520t2.jpg&amp;raw" style="width: 600px; height: 283px;"></p><span data-dcnode-id="1347" instrument_node="">
</span><p align="center" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342" style="margin-left:5.65pt;"><span data-dcnode-id="1343" instrument_node="">
	3.2.5 Agricultural product marketing policy</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1336" style="margin-left:5.75pt;"><span data-dcnode-id="1340" instrument_node="">
	After 20 years of reform, China agricultural product market has formed a complete market circulation system by the end of the 20</span><sup data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">th</span></sup><span data-dcnode-id="1337" instrument_node=""> century. In the new century, the main content of agricultural product market circulation included: establish diversified market main body, promote diversity of circulation modes; improve construction of various types of markets, construct nationwide circulation network; improve agricultural product quality monitor, and improve the market macro-control capacity. “The national modern agricultural development plan (2011-2015)” proposed to improve the infrastructure construction of circulation and guidance of marketing information, upgrade and reconstruct the agricultural product wholesale market; develop new forms of circulation, promote production with orders and integrate with agriculture and supermarket, implement “easy access” policy for transportation of fresh/live agricultural products, reduce costs of product circulation, and standardize and improve the agricultural futures market. In 2012, the state council issued “opinion on deepening the reform of circulation system and accelerating the development of circulation industry”, and supported to construction and renovation of nonprofit agricultural products wholesale markets, farmers markets, vegetable markets, community markets, and fair price markets, as well as major merchandise reserve facilities, large logistics distribution center, and agricultural products cold chain logistics facilities, etc. In 2013, the No. 1 document again stressed the need to “improve the efficiency of agricultural products circulation”, continue to implement “transport grain from north to south”, “transport vegetable from south to north”, “transport fruit from west to east”, rural retail network developing project, and the new rural modern circulation network project, and construct comprehensive demonstration zone of modern circulation of agricultural products.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333" style="margin-left:5.65pt;"><span data-dcnode-id="1334" instrument_node="">
	3.2.6 Agricultural science and technology policy</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330" style="margin-left:5.75pt;"><span data-dcnode-id="1331" instrument_node="">
	Science and technology is the key element of agricultural development. Since the new century, the main content of China’s agricultural technology policy includes: make breakthroughs on major technical problems relating to agricultural economics and development, support agricultural high-tech development, strengthen the research on agricultural foundations and applications, actively promote technical achievements and advanced applicable technology,&nbsp; promote the development of agricultural technology enterprises, and support research on agricultural policies, etc. Major related agricultural technology includes: animal and plant genetics and breeding technology, cultivation and breeding technology, major pest and disease control technology, mid- and low-yield field improve and regional agricultural comprehensive development technology, Agricultural mechanization and facilities technology, and biotechnology. From 2004 to now, there are year-to-year differences on the focus of agricultural technology policies (table 3). For example, the focus was the construction of national agricultural technology innovation system in 2007; it was to improve the ability of the agricultural technology promotion in 2010; and it was to support agriculture with meteorological, hydrological and hydraulic technology in 2011. The core idea is about the research and development, conversion, promotion and application of the agricultural technology. And the fundamental purpose is to promote the sustainable and stable development of China's agricultural economy and rural society.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327" style="margin-left:5.75pt;"><span data-dcnode-id="1328" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1323" style="margin-left: 5.75pt; text-align: center;"><span data-dcnode-id="1325" instrument_node="">
</span><img alt="" data-dcnode-id="1324" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ap.fftc.org.tw/upload/images/ap/ap_policy/266/china%2520zhen%2520zhong%2520t3.jpg&amp;raw" style="width: 600px; height: 301px;"></p><span data-dcnode-id="1322" instrument_node="">
</span><p align="center" data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317" style="margin-left:5.75pt;"><span data-dcnode-id="1318" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314" style="margin-left:5.65pt;"><span data-dcnode-id="1315" instrument_node="">
	3.2.7 Rural finance policy</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311" style="margin-left:5.75pt;"><span data-dcnode-id="1312" instrument_node="">
	Since 2000, the state has formulated a series of policies and measures of the construction of rural financial system, including improving fiscal support policy and monetary policy support of rural finance, actively developing rural insurance and cooperative foundations, gradually establishing rural disaster compensation system, strengthening the rural financial law system, supporting rural finance policy in the law dimension, standardizing and systematizing the finances, taxation, monetary support policy and agricultural insurance etc. Since 2004, the state has clarified the obligations of county financial institution to serve “agriculture, farmer and rural areas”, focus on improve the quality of rural service area, and vigorously implement agricultural insurance policy. Since 2007, trial operations of agricultural insurance premium subsidy were carried out in Inner Mongolia, Jilin, Jiangsu, Hunan, Sichuan and Xinjiang provinces, with 2.1billion Yuan arranged mainly focusing on grain, cotton and oil crops and sow insurance premium subsidy. In 2011, the state-arranged agricultural insurance premium subsidy came to 2.1 million Yuan. In 2012, the agricultural insurance policy was further improved, the supporting efforts to the agricultural insurance were increased, and the types of insurance premium subsidy were increased. On the basis of present 14 types of central financial insurance subsidy, sugar plants were taken into the scope of insurance subsidy; agricultural insurance subsidy was implemented in selected trial areas; and subsidy was issued to farmers developing equipped agriculture. In 2013, the state further proposed to “improve rural financial services”, fully give play to the role of policy finance and cooperative finance, innovate financial products and services, Strengthen effective cooperation of fiscal leverage and financial policies, support the social capital to participate in the establishment of new rural financial institutions, and establish of multi-level, multi form agriculture credit guarantee system.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308" style="margin-left:5.65pt;"><span data-dcnode-id="1309" instrument_node="">
	3.2.8 Agricultural labor transfer and employment policy</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1302" style="margin-left:5.75pt;"><span data-dcnode-id="1306" instrument_node="">
	In the past relatively long time, China’s policy was to prohibit farmers to work in the cities, and implemented various policies restricting farmers to work in cities. Since 21</span><sup data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">st</span></sup><span data-dcnode-id="1303" instrument_node=""> century, policies on rural labor transfer and employment were actively changed, including: rural labor transfer and employment service, rural labor benefit protection, rural labor transfer and employment training, rural labor living condition improvement, and solving education problems for rural labors. In January 2002,CPC Central Committee and State Council in “opinions on works related to agriculture and rural area in 2002”proposed for the first time the policies on rural labors working in cities as “Fair treatment, reasonable guidance, perfect management, good service”. In January 2003, Office of the State Council issued the "notice concerning managing and serving rural migrant workers”, and proposed to abolish unreasonable restrictions on migrant farmers employment, and arrange with multiple ways for migrant workers' children’s education. In April 2003, the State Council announced the "Regulations of insurance for occupational injury” and the rural migrant workers for the first time were covered in the insurance scope. In September 2003, the Ministry of agriculture and other departments launched the rural labor transfer training “sunshine project”. In 2006, the “opinion of the State Council on solving problems of migrant workers” was introduced and proposed to strictly implement the labor contract system, and gradually implement equal opportunity employment system. In 2008, the “employment promotion law of the people’s republic of China” was implemented and clearly proposed to implement the policy for coordinated employment in urban and rural areas. From 2009 to present, the No. 1 document proposed to actively expand the employment and entrepreneurship of rural labors, and gradually promote the urbanization of agricultural transfer population.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299" style="margin-left:5.65pt;"><span data-dcnode-id="1300" instrument_node="">
	3.2.9 Agricultural infrastructure construction policy</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296" style="margin-left:5.75pt;"><span data-dcnode-id="1297" instrument_node="">
	Agricultural infrastructure generally include: irrigation and water conservancy construction, rural power grid construction, rural road construction, agricultural product circulation equipment construction, commodity grain and cotton production base, timber production base and the construction of protection forest and rural education, health, drinking water, research, technology promotion and meteorological infrastructure construction. Strengthening agricultural infrastructure construction is one of the important measures to promote rural economic development, and promote the modernization of agriculture. In recent years, China strengthened agricultural infrastructure construction focusing on farmland water conservancy, increased investment in agricultural infrastructure, issued a series of policies and measures, and the main contents include: increased financial investment in agricultural infrastructure construction, implemented comprehensive agricultural development, guided social capital investment in agricultural infrastructure construction, promoted balanced regional development, and reformed rural small-scale infrastructure and other property rights system. In 2010, No. 1 document proposed to focus on the construction of water conservancy infrastructure, promotion of the construction of high standard farmland, construction of protective screen of the ecology. “The national modern agricultural development plan (2011 - 2015)”proposed the goal to “improve agricultural infrastructure and equipment conditions”. Therefore, the government will continue to increase the intensity of public finance coverage of rural infrastructure, and gradually establish investment protection and operation management mechanism.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1291" style="margin-left:6pt;"><span data-dcnode-id="1294" instrument_node="">
</span><strong data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">3.3 Agricultural benefit protection policies</span></strong></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288" style="margin-left:5.65pt;"><span data-dcnode-id="1289" instrument_node="">
	3.3.1 Agricultural product price protection policy</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285" style="margin-left:5.75pt;"><span data-dcnode-id="1286" instrument_node="">
	Before the reform and opening up, China’s agricultural product prices were set by the government with the low purchase price policy, and the agricultural surplus were transferred to industry through the "price scissors" approach with the price difference between agricultural and industrial products, supporting national industrialization development. Since the reform and opening up, the agricultural product market was gradually open up, price protection policy for grain and other major agricultural products was implemented from 1990’s, and the price maintaining policy for grain and other major agricultural products was gradually established to implement the minimum purchase price (table 5). In 2009, No.1 document proposed to “keep the agricultural product price at a reasonable level”, and keep increasing the minimum purchase prices of grain. "The national modern agricultural development plan (2011-2015 years)" proposed to improve the control mechanism of the agricultural product market. Steadily increase in the minimum purchase price of rice and wheat, improve temporary collection and storage policy for corn, soybeans, rapeseed, cotton and other agricultural products. Improve the throughput of major agricultural products and regulation mechanism, improve the important agricultural products storage system, and stabilized the market with the help of major enterprise. Continue to strengthen the construction of market monitor and alert system of pigs, vegetables and other major “food basket” product, improve the control plan for pig, cotton, sugar and border selling tea, and formulate control measures of fresh agricultural products. Provincial governors and mayors held directly responsible for ensuring basic food supplies.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1281" style="margin-left: 5.75pt; text-align: center;"><span data-dcnode-id="1283" instrument_node="">
</span><img alt="" data-dcnode-id="1282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ap.fftc.org.tw/upload/images/ap/ap_policy/266/china%2520zhen%2520zhong%2520t5.jpg&amp;raw" style="width: 600px; height: 315px;"></p><span data-dcnode-id="1280" instrument_node="">
</span><p align="center" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1275" style="margin-left:5.75pt;"><span data-dcnode-id="1276" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272" style="margin-left:5.75pt;"><span data-dcnode-id="1273" instrument_node="">
	3.3.2 Agricultural product trading policy</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269" style="margin-left:5.75pt;"><span data-dcnode-id="1270" instrument_node="">
	Agricultural trade policy include: import policy, export policy, regional free trade policy. In 2004, No. 1document proposed to “to expand the export of competitive agricultural products” and further improve the policies and measures to promote export of China’s competitive agricultural products. Encourage and guide agricultural export processing enterprises to go to export processing trade zone. Strengthen international negotiation process, sign bilateral quarantine and beneficial trade agreements with major market countries and regions. Accelerate the establishment of industry and trade associations for healthy poultry, vegetables, fruits and other key agricultural exports. In 2009, No. 1 document proposed to grasp the timing and rhythm of the import and export of major agricultural products, support competitive agricultural exports, and prevent the impact of excessive imports of some varieties to the domestic market. In 2010, the No. 1 document, from the view of improving the opening up level of agriculture, supported the export of competitive products and provided convenience and benefits to export clearance, inspection and quarantine. "The national modern agricultural development plan (2011-2015 years)" issued in 2012 implemented the following policies on agricultural product trade: promote agricultural cooperation with foreign countries, improve the quality of the agricultural “bringing-in”, broaden the channels of agricultural “going-out”,&nbsp; strengthen the international trade of agricultural products, strengthen bilateral , multilateral and regional negotiations, formulate international trade rules relating to agriculture, establish systems of foreign operations of agricultural products and production means access which comply with WTO policies, actively respond to international trade conflicts, support industry associations to protect benefits and rights of businesses, and further improve the agricultural loss alert mechanism. Utilize relevant measures in line with WTO rules, and regulate import and export of agricultural products flexibly and effectively.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266" style="margin-left:5.65pt;"><span data-dcnode-id="1267" instrument_node="">
	3.3.3 Agricultural resources and environment protection policy</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263" style="margin-left:5.75pt;"><span data-dcnode-id="1264" instrument_node="">
	Since the reform and opening up, China has paid great attention to agricultural resource utilization and environmental protection, has taken agricultural resources and environmental protection into the entire agenda of economic and social development, has rationally developed and effectively protected arable land, fresh water, grasslands, fisheries and agricultural waste resources, and has implemented a series of policy measures on energy saving and emission reduction. The main content includes: rational utilization and protection of water resources, rational utilization and protection of grassland resources, fishery resources utilization and ecological protection, returning farmland to forest (grass) project, farmland shelterbelt construction, rural renewable energy development, energy saving in rural life and production, and development of circulation agriculture. In 2010, No. 1 document proposed to “build strong protective screen of ecology”, continue to promote the forestry ecology project construction, vigorously increase forest carbon sink, strengthen the agricultural area pollution control, and develop circulating agriculture and ecological agriculture. In 2013 No.1 document proposed to “promote the construction of ecological civilization in rural areas”, strengthen the rural ecological construction, environmental protection and comprehensive improvement, and strive to build a beautiful countryside.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260" style="margin-left:5.65pt;"><span data-dcnode-id="1261" instrument_node="">
	3.3.4 Rural development and poverty support policy</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1254" style="margin-left:5.75pt;"><span data-dcnode-id="1258" instrument_node="">
	Since late 1970’s, Chinese government has implemented a large-scale, scheduled and organized poverty support development focusing on solving food and clothing problems for rural poor. In the 21</span><sup data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">st</span></sup><span data-dcnode-id="1255" instrument_node=""> century, the Chinese government implemented new poverty support policy based on the national conditions that rural poverty still exists in the new stage of well-off society. In 2001, “outline Chinese rural poverty alleviation and development (2001-2010)” was published. In 2004, the state proposed to focus on solving problems of living and production difficulties of rural poverty population and disaster affected population, in 2006, the state proposed to implement the mode of all-village development according to local conditions, in 2008, No. 1 document proposed to encourage the society to participate in poverty alleviation and development, and in 2010, the state proposed to fully implement the poverty support policy for rural low-income population. In November 2011, the CPC Central Committee and the State Council issued “compendium of Chinese rural poverty alleviation and development (2011－2020)”, which was is a programmatic document guiding China poverty alleviation and development for a period in the future work. The goal was: by 2020, the rural poverty population should have no problems in food, clothing, education, basic medical care and housing. The growth rate of per capita net income of farmers in poverty areas is higher than the national average, major indicators of basic public services are close to the national average, and reverse the growing gap trend. The national poverty alleviation standard was gradually increased from 865 Yuan in 2000 to 1274 Yuan in 2010. In 2011, the state further increased the standard greatly to 2300 Yuan (355.6 US dollars).</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p align="center" data-dcnode-id="1249"><span data-dcnode-id="1252" instrument_node="">
</span><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">4. The achievements and challenges of China’s agricultural policy</span></strong></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1247" instrument_node="">
</span><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">4.1 &nbsp;Major achievements of agricultural policy</span></strong></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">
	Since the reform and opening up, Chinese government has fully promoted the innovation of practice, theory and system of “Sannong”, implemented a series of important policies such as “giving more, taking less and loosening control” and “industry nurturing agriculture, city supporting countryside”, constructed frameworks of systems of agricultural production management, agriculture support and protection, rural social security, and coordinated development of rural and urban areas. Agricultural production has been greatly developed, the countryside has been greatly improved, and the peasants have got a lot of benefits. In details, the achievements are as following:</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">
	Firstly, the demand and supply of grain and other agricultural products has been stabilized. This is a contribution to all Chinese citizens as well as the world. China is raising 21% of the world population with less than 9% of the world’s farmland. From 2004 to 2013, China’s food production has achieved continuous growth for 1e 0 years.</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">
	Secondly, the reform of the agricultural taxes and fees has greatly reduced farmers’ burden. Since the cancellation of agricultural taxes in 2006, the burden of farmers was reduced by 133.5 billion Yuan every year. The four types of agricultural subsidy funds arranged by central finance has been increased from 0.33 billion Yuan in 2003 to 140.6 billion Yuan in 2011. At the meantime, from 2004 to 2011, grain reserve expenditure was arranged to be 208.9 billion Yuan by the central finance, which ensured the fast growth of farmers’ production for 10 years.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">
	Thirdly, the weak financial support for agriculture has been improved systematically. The central finance expenditure for “agriculture, peasants and rural areas” was increased from 145.67 billion Yuan in 2001 to 1379.9 billion Yuan in 2013, and the average annual increment was more than 20%.</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">
	Fourthly, the food and clothing problems of rural poverty have been generally solved. In the first 10 years of this century, the national standard of rural poverty support was increased from 865 Yuan in 2000 to 1274 Yuan in 2010, and rural poverty population based on this standard was reduced from 94220 thousand in 2000 to 26880 thousand in 2010; rural poverty rate was reduced from 10.2% in 2000 to 2.8% in 2010. (New standard was established after 2011)</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">
	Fifthly, the international trade of agricultural products contributes more and more to the country and worldwide. China’s agricultural product market has been changed from a highly protected market into a free market. China has become one of the countries with minimal intervention on agricultural trade. From 2000 to 2013, the total amount of China’s imported and exported agricultural products were increased from 16.95 billion dollars to 186.69 billion dollars.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">
	In general, it is proved that the guideline of rural reform and development formulated by CPC and the government was correct, and the policies to benefit and develop agriculture were useful and efficient.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1219" style="text-align: center;"><span data-dcnode-id="1221" instrument_node="">
</span><img alt="" data-dcnode-id="1220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ap.fftc.org.tw/upload/images/ap/ap_policy/266/china%2520zhen%2520zhong%2520t6.jpg&amp;raw" style="width: 600px; height: 418px;"></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p align="center" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1208" style="margin-left:6pt;"><span data-dcnode-id="1211" instrument_node="">
</span><strong data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">4.2 Recent challenges of agriculture development</span></strong></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205" style="margin-left:5.65pt;"><span data-dcnode-id="1206" instrument_node="">
	Challenges go with the achievements. Especially in the recent 5 years, the development of China’s agriculture has faced new challenges.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202" style="margin-left:5.65pt;"><span data-dcnode-id="1203" instrument_node="">
	Firstly, as the further accelerated development of industrialization and urbanization, the agricultural modernization was expected to keep up the pace. From 2001 to 2010, the increment of industry was increased from 4358.1 billion Yuan to 16003 billion Yuan, and the percentage of urban population was increased from 37.7% to 49.7%. However, the agricultural modernization construction was apparently lagged behind the industrialization and urbanization. The foundation of agriculture was still weak, the restriction of farmland and water resource was getting more serious, the deterioration of agricultural ecological environment has not changed fundamentally, the construction of farmland infrastructure was underdeveloped, machinery and equipment level was not high, and overall quality of agricultural management was low.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199" style="margin-left:5.65pt;"><span data-dcnode-id="1200" instrument_node="">
	Secondly, the demand and supply of major product may keep in a tight balance, and pressure of certain varieties is further increased. From 2000 to 2010, the import of soybean, corn, cotton and oil plants was increased from 10420, 0.3, 50, and 1790 thousand tons to 54800, 1572.4 2840 and 6870 thousand tons respectively. The demand and production gap was gradually increased.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196" style="margin-left:5.65pt;"><span data-dcnode-id="1197" instrument_node="">
	Thirdly, agricultural product prices will remain high, and the difficulty of regulation is increased. As the fast development of industrialization and urbanization, the competition in labor forces and farmlands is getting serious between agricultural and non-agricultural production, rural and urban areas. The costs of agricultural labor and land are further increased. Influenced by the international energy price, the prices of fertilizer, machinery and pesticide are also increasing. This will lead to a continuous high price of agricultural products. At the meantime, the number of unknown factors that influence the prices is increasing, as well as the factors affecting price regulation which make it more difficult.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193" style="margin-left:5.65pt;"><span data-dcnode-id="1194" instrument_node="">
	Fourthly, the organization, large scale and cluster of agriculture are getting more significant, and the tasks of agricultural social service system are getting heavier. With higher government support level, enhanced cooperative awareness of farmers and faster transfer of land, the number of farmer cooperative business organizations keeps increasing and the scale keeps getting larger. By the first half of 2011, the transferred land area took 6.2% of the total area of contracted farmland, which is 11% higher than that of 2007. In addition, China’s agricultural production management activities start to appear obvious trend of cluster, such as vegetable production cluster in Shouguang, Shandong, and Fruit production cluster in Yangshan, Anhui. The corresponding tasks of agricultural social service system are heavier. The infrastructure for water, power, road, gas, and housing services still cannot match with the organized, large-scale and clustered modern agriculture.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190" style="margin-left:5.65pt;"><span data-dcnode-id="1191" instrument_node="">
	Fifthly, agricultural technology and innovation is further improved, but is still relatively underdeveloped. Although China still has a lower contribution rate of agricultural technology compared to the developed countries in Europe and America. Also, the contribution rates in different areas are unbalanced, for example, in 2010 the contribution rate of technology in Beijing was 70% while in some other regions the rates were only 30% - 40%.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187" style="margin-left:5.65pt;"><span data-dcnode-id="1188" instrument_node="">
	Sixthly, the opening up of agriculture is further expanded, and the production security is more serious. With the higher level of opening up of agriculture, the domestic market is impacted by the low price foreign products. The foreign investments have got greater and greater control of the domestic seed and fertilizer business, and the multinational corporations have more and more influences on the import and export of China’s agricultural products. These changes not only increase the difficulty of macro-regulation of the state, but also bring greater challenges to the production security of China’s agriculture.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184" style="margin-left:5.65pt;"><span data-dcnode-id="1185" instrument_node="">
	Seventhly, the process of migrant workers citizenry is accelerated, while the difficulties in developing rural social business and regulation are greater. With a lot of young and talented workers moving out of the countryside, the rural areas have serious problems with higher rate of aged, maternal, child, and less talented workers. This would not only affect the effective supply of rural public goods, but also bring challenges to rural pension, medical and education. In addition, the loss of rural elites would lead to risks to social stability.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181" style="margin-left:5.65pt;"><span data-dcnode-id="1182" instrument_node="">
	Eighthly, the farmers’ income is increasing steadily, and the pressure of increasing income is getting higher. With the help of the policy of increasing agricultural product prices and farmers’ wages, the farmers’ income is increasing steadily. But the pressure to increase the income is higher: the cost of agricultural products is increasing, the space of income increase from household business is smaller, the financial crisis is challenging the stability of employment, the pressure to increase wages is higher, the reform of land property rights has far to go, property income is still uncertain, and transferred income is limited with the restriction of WTO rules and the national finance.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178" style="margin-left:5.65pt;"><span data-dcnode-id="1179" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p align="center" data-dcnode-id="1173"><span data-dcnode-id="1176" instrument_node="">
</span><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">5. New measures of China agricultural policies</span></strong></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1168" style="margin-left:6pt;"><span data-dcnode-id="1171" instrument_node="">
</span><strong data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">5.1New agriculture development strategies</span></strong></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1159" style="margin-left:5.65pt;"><span data-dcnode-id="1166" instrument_node="">
	It is because of China's agriculture is facing many new challenges, the new CPC central committee and the Chinese government proposed new thoughts for further deepen reform and&nbsp; promote “Sannong” development. The main idea reflected in the 18th CPC congress report in 2012 and the&nbsp;3</span><sup data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">rd</span></sup><span data-dcnode-id="1163" instrument_node=""> plenary&nbsp;session&nbsp;of&nbsp;the&nbsp;18</span><sup data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">th</span></sup><span data-dcnode-id="1160" instrument_node=""> CPC&nbsp;central&nbsp;committee resolution in 2013. According to these political documents, the core concept of the Chinese government to promote the development of agriculture and rural economy can be summarized as “urban-rural integration”, and its official statement is “must improve institutional mechanisms, in order to promote the formation of the new agricultural-industrial and urban-rural relationship, in which agriculture is advanced by industry, rural areas is supported by cities, agriculture and industry are mutual beneficial, urban and rural&nbsp; areas are integrated, so that the majority of farmers can equally participate in the process of modernization and share the fruits of modern”. This concept consists of the following four aspects:</span></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156" style="margin-left:5.65pt;"><span data-dcnode-id="1157" instrument_node="">
	Firstly, accelerate the building of a new agricultural management system based on a mix of family, collective, cooperative and enterprise operations. Land-contracting rights will be protected. Farmers are allowed to become shareholders in the agriculture-industrialization via their land-contracting rights. Private capital is encouraged to invest in a modern planting and breeding industry, and for introducing modern production and management methods.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153" style="margin-left:5.65pt;"><span data-dcnode-id="1154" instrument_node="">
	Secondly, farmers will be given more property rights. They are encouraged to develop a shareholding system from which they can realize benefits. Meanwhile, they can also sell a share or take it as collateral or warranty. They also have the right of succession. Moreover, the homestead system in rural areas will be improved, and farmers' usufruct rights of homestead will be ensured. A pilot program will be carried out in some areas to discover other channels for improving farmers' income. A rural property-rights trading market will be established.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150" style="margin-left:5.65pt;"><span data-dcnode-id="1151" instrument_node="">
	Thirdly, a more balanced allocation of public resources between urban and rural areas will be promoted. Migrant workers should get the same pay for the same job. Farmers should receive a fair share of the profits from land-value appreciation. Deposits in rural financial institutions should be mainly used to finance the development of agriculture and rural areas. The agricultural subsidiary system and insurance system will be improved. Social-capital investment is encouraged for construction in rural areas.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147" style="margin-left:5.65pt;"><span data-dcnode-id="1148" instrument_node="">
