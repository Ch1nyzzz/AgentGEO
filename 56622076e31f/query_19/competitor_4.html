	Fourthly, build a healthy urbanization that puts people at the center. Reform of the hukou (or household registration) system will be accelerated to help farmers become urban residents. The country will relax overall control of farmers settling in towns and small cities, and relax restrictions on settling in medium-sized cities in an orderly manner. China should set reasonable requirements for rural residents to obtain hukou in large cities, and strictly control the size of population in megacities. Efforts should be made to make basic urban public services available to all permanent residents in cities, including all rural residents. This includes the affordable-housing system and the social security network.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1142" style="margin-left:6pt;"><span data-dcnode-id="1145" instrument_node="">
</span><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">5.2Recent agricultural policy highlights</span></strong></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139" style="margin-left:5.65pt;"><span data-dcnode-id="1140" instrument_node="">
	According to the basic thinking of "urban-rural integration", the recent major agricultural policies are mainly reflected in the No.1 document of 2014.&nbsp; The specific measures include the following nine aspects.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136" style="margin-left:5.65pt;"><span data-dcnode-id="1137" instrument_node="">
	5.2.1 Food security and safety</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1134" instrument_node="">
</span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">a) </span></strong><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Perfect the </span></strong><strong data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">n</span></strong><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">ational grain security strategy under the new situation. </span></strong></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1123" instrument_node="">
	Holding the rice bowl firmly in own hands is a basic policy that China must be adhered to in governing the country for a long time to come. Comprehensively consider the domestic conditions of resources and the environment, the grain supply and demand pattern and changes in the international trade environment and implement a national grain security strategy that </span><strong data-dcnode-id="1120"><u data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">takes our side as the dominant factor, bases itself on our own country, guarantees the production capacity, imports appropriately and has the support of science and technology.</span></u></strong><span data-dcnode-id="1119" instrument_node=""> At no time should domestic grain production be relaxed, the red line for farmland protection should be strictly guarded, permanent basic farmland should be demarcated, the comprehensive agricultural production capacity should be increased continuously, and</span><strong data-dcnode-id="1116"><u data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node=""> basic self-sufficiency of grain and absolute grain ration security should be ensured</span></u></strong><span data-dcnode-id="1115" instrument_node="">. More actively use the international market of agricultural products and international agricultural resources to effectively regulate and supplement domestic grain supply. Make greater efforts to implement the “rice bag” governor responsibility system and more clearly define the responsibility and the division of work in grain security between the central government and the local governments. Main sales areas should also set a baseline for grain acreage and ensure a certain grain ration self-sufficiency rate. Strengthen the awareness of saving grain of the whole society and spread the use of facilities and technologies to save grain and reduce damage to grain in the whole process of production, distribution and consumption.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1112" instrument_node="">
</span><strong data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">b)Strengthen supervision and control over the quality of agricultural products and food safety. </span></strong></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1107" instrument_node="">
	Establish the strictest food safety supervision and control system that covers the whole process, improve laws, regulations and the standards system and make sure local governments will assume their responsibility for administration under their jurisdiction and administration of main bodies in production management. </span><strong data-dcnode-id="1104"><u data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Support standard production, carry out risk monitoring and give early warning for key products, build a food tracing system and increase subsidies for expenses for quality and safety inspection and tests of wholesale markets.</span></u></strong><span data-dcnode-id="1103" instrument_node=""> Promote and speed up the establishment of a system for inspecting and testing the quality and safety of food products and agricultural products at the township and county level and the building of the supervision and control capability of townships and counties. Carry out stricter management of agricultural input products, make great efforts to set up horticultural crop standard park, carry out scale livestock and poultry breeding and healthy aquatic breeding and conduct other creative activities. Improve the evaluation and appraisal system for the work to ensure the quality of agricultural products and food safety and carry out experiments at selected points on building demonstration cities and counties.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099" style="margin-left:5.65pt;"><span data-dcnode-id="1100" instrument_node="">
	5.2.2 Agricultural Management System innovation</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1097" instrument_node="">
</span><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">a) Develop various kinds of scale management. </span></strong></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">
	Encourage farm households which meet relevant requirements to transfer the management right of contract land and speed up improving the market for transferring the land management right and the three-tier service and management networks at the village, township and county levels. </span><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Explore the establishment of a risk security fund system for the transfer of land for the use of agriculture to industrial and commercial enterprises and strictly ban the use of farmland for non-agricultural use. </span></strong><span data-dcnode-id="1089" instrument_node="">In places where relevant conditions are available, awards and subsidies can be given to land transfer. In carrying out land transfer and appropriate scale management, it is necessary to respect the wish of the farmers and such acts should not be promoted in a coercive manner.&nbsp;</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1086" instrument_node="">
</span><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">b) Support the development of new types of agricultural operators. </span></strong></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1081" instrument_node="">
</span><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Encourage the development of professional cooperation, shareholding cooperation and other forms of farmers’ cooperatives</span></strong><span data-dcnode-id="1078" instrument_node="">, guide and standardize the operation of such cooperation and focus efforts on increasing capability. </span><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Allow financial funds for projects to be directly invested in cooperatives that meet relevant requirements,</span></strong><span data-dcnode-id="1075" instrument_node=""> allow assets formed with financial subsides to be held, managed and taken care of by cooperatives and departments concerned should establish a standard and transparent management system. </span><strong data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Promote experiments at selected points on financial support for the innovation of the farmers’ cooperatives and guide the development of joint cooperatives of the farmers’ professional cooperatives. </span></strong><span data-dcnode-id="1072" instrument_node="">Carry out registration of family farms according to the principle of free will. Encourage the development of leading enterprises of industrialized agriculture under mixed ownership, promote cluster development and establish closer benefits-linking relationship between these enterprises and farm households and farmers’ cooperatives. In the government annual quota of construction land, separately list a certain ratio especially for the construction of matching auxiliary facilities of a new type of agricultural management main bodies. Encourage local governments and non-government investment to set up financing guarantee companies to provide loan guarantee services for a new type of agricultural management main bodies. Make greater efforts to </span><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">educate and train a new type of professional farmers and leaders of a new type of agricultural management main bodies.</span></strong><span data-dcnode-id="1069" instrument_node=""> Implement and improve relevant tax preferential policies and support farmers’ cooperatives in their efforts to develop the processing and distribution of agricultural products.&nbsp;</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1066" instrument_node="">
</span><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">c) Improve the agricultural socialized service system. </span></strong></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node="">
	Stabilize agricultural public service institutions and improve the expenditure guarantee and achievement evaluation and encouragement mechanisms. </span><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">By means of financial assistance, tax and fee preferential treatment, credit support and other measures, make great efforts to develop socialized services with diversified main bodies, various forms and full competition, promote cooperation-oriented, order-oriented, entrustment-oriented and other modes of services and expand the scope of experiments at selected points on whole-process socialized services for agricultural production. </span></strong><span data-dcnode-id="1058" instrument_node="">By means of the purchase of services by the government and other ways, support qualified business service organizations in their efforts to provide agricultural public welfare services. Support the development of farmers’ water cooperation organizations, flood control and drought relief professional teams, professional technology associations and a contingent of farmer brokers. Improve the rural grass-roots meteorological disaster prevention and mitigation organization system and provide direct meteorological services for a new type of agricultural management main bodies.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054" style="margin-left:5.65pt;"><span data-dcnode-id="1055" instrument_node="">
	5.2.3 Agricultural land management</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1052" instrument_node="">
</span><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">a) Improve the rural land contract policy</span></strong></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1047" instrument_node="">
	Stabilize the rural land contract relationships and maintain them for a long time to come. With the precondition of adhering to and improving the strictest farmland protection system, </span><strong data-dcnode-id="1044"><u data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">give the farmers the powers and functions of the occupation, use, benefits, transfer, as well as the use of the contract land management right for mortgage and guarantee</span></u></strong><span data-dcnode-id="1043" instrument_node="">. On the basis of ensuring the collective ownership of rural land, stabilize the farm household contract right, relax restrictions on the land management right and </span><strong data-dcnode-id="1040"><u data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">allow to use the contract land management right for mortgage in financing from financial institutions.</span></u></strong><span data-dcnode-id="1039" instrument_node=""> Departments concerned should seize the time study and put forward standard implementation procedures, establish a matching mechanism for the disposal of mortgaged assets and promote the amendment of laws and regulations concerned. Earnestly strengthen organization and leadership, </span><strong data-dcnode-id="1036"><u data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">firmly seize the confirmation, registration and certification of the rural land contract management right</span></u></strong><span data-dcnode-id="1035" instrument_node=""> and fully depend on farmers in resolving contradictions and problems encountered in the work through independent consultation. Both the right and the land can be confirmed or the right and share can be confirmed without confirming the land. Expenses on the work of confirmation, registration and certification of the right should be included into local financial budgets with subsidy given by the central finance. Stabilize and improve the grassland contract management system and </span><strong data-dcnode-id="1032"><u data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">the work to confirm the right, to contract grassland and to demarcate basic grassland should be basically completed in 2015.</span></u></strong><span data-dcnode-id="1031" instrument_node=""> </span><strong data-dcnode-id="1028"><u data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Earnestly protect the land contract right and benefits of women</span></u></strong><span data-dcnode-id="1027" instrument_node="">. Strengthen the building of the rural operation and management system. Deepen the comprehensive rural reform, improve the reform of the collective forest right system, improve the operation and management structure of state-owned forest areas and continue to push forward the reform of the function of state farms in running the society.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1024" instrument_node="">
</span><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">b) Guide and standardize the entry into the market of rural collective operational construction land. </span></strong></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1019" instrument_node="">
	With the precondition of meeting the requirements of relevant programs and land use purposes, </span><strong data-dcnode-id="1016"><u data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">allow the transfer, renting and selling for shares of the rural collective operational construction land.</span></u></strong><span data-dcnode-id="1015" instrument_node=""> </span><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Such land should enter the market in the same way as state-owned land with the same right and same price.</span></strong><span data-dcnode-id="1012" instrument_node=""> </span><strong data-dcnode-id="1009"><u data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Speed up the establishment of a property right transfer and value added profit distribution system for rural collective operational construction land. </span></u></strong><span data-dcnode-id="1008" instrument_node="">Departments concerned should put forward as soon as possible concrete guiding opinions and push forward the amendment of laws and regulations concerned. Various localities should follow unified central arrangements and push forward the work in a standard and orderly manner.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1005" instrument_node="">
</span><strong data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">c) Improve the rural residential land management system.</span></strong></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="1000" instrument_node="">
	&nbsp;Reform the rural residential land management system and improve the policy for the distribution of rural residential land. With the precondition of protecting the usufructuary right of the residential land of farm households, </span><strong data-dcnode-id="997"><u data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">select a number of points for experiments and prudently and steadily promote the use of the farmers’ housing property right for mortgage, guarantee and transfer.</span></u></strong><span data-dcnode-id="996" instrument_node=""> Departments concerned should seize the time to put forward a plan for concrete experiments at selected points and various localities should not act as they think fit or jump the gun and cross the limit. </span><strong data-dcnode-id="993"><u data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Improve the experiment at selected points on linking the increase with the decrease of construction land of the urban areas and the rural areas</span></u></strong><span data-dcnode-id="992" instrument_node=""> and earnestly ensure that the farmland area will not decrease and the quality of farmland will improve. Speed up the investigation on the rural land cadaster, including the rural residential land, and the confirmation, registration and certification of the right to use the rural collective construction land.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="989" instrument_node="">
</span><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">&nbsp;d) Push forward and speed up the reform of the land acquisition system.</span></strong></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="984" instrument_node="">
</span><strong data-dcnode-id="981"><u data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">&nbsp;Reduce the scope of land acquisition, standardize the acquisition procedures and improve the mechanism for the rational, standard and diversified protection for farmers whose land is acquired.</span></u></strong><span data-dcnode-id="980" instrument_node=""> Seize the time to amend laws and regulations concerned, ensure that the farmers can share in a fair manner the value-added proceeds of land and change the methods for compensating the farmers whose land is acquired. In addition to compensation for farmers’ collective land acquired, </span><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">it is also imperative to ensure the housing, social security and employment training of the farmers.</span></strong><span data-dcnode-id="977" instrument_node=""> Take various measures, </span><strong data-dcnode-id="974"><u data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">such as setting aside land for resettlement and compensation, suiting measures to local conditions, and ensure the farmers are benefited over a long time.</span></u></strong><span data-dcnode-id="973" instrument_node=""> Raise the standard for collecting fees for the restoration of forest vegetation. Improve the mediation and arbitration mechanism for land acquisition disputes and ensure the right to know, the right to participate, the right to complain and the right to supervise of the farmers whose land is acquired.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969" style="margin-left:5.65pt;"><span data-dcnode-id="970" instrument_node="">
	5.2.4 Production and marketing</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="967" instrument_node="">
</span><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">a) Production supporting and interests protecting measures</span></strong></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">
	- Improve the system for the steady growth in input into “Sannong".</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">
	Improve the policy of financial support for agriculture and increase expenditure on “Sannong." Public finance should persistently regard “Sannong" as the key point of expenditure, central investment in capital construction should continue to tilt toward “Sannong" and give priority to ensure the steady increase in input into “Sannong." Widen the channels for the input of funds into “Sannong," give full play to the guiding role of financial funds and bring along the input of more financial and social funds into “Sannong" through interest discount, awards, risk compensation, tax and fee reduction and exemption and other measures.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">
	-&nbsp; &nbsp;Improve the agricultural subsidy policy.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="953" instrument_node="">
	In accordance with the requirements of stabilizing the stock, increasing the total amount, improving methods and making gradual readjustment, actively carry out experiments at selected points on improving the methods for subsidizing agriculture. </span><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Continue to implement policies of direct subsidy for grain growers, subsidy for improved crop species and comprehensive subsidy for means of agricultural production and tilt newly-added subsidies toward grain and other important agricultural products, the new type of agricultural management main bodies and main production areas.</span></strong><span data-dcnode-id="950" instrument_node=""> In places where relevant conditions are available, carry out experiments at selected points on subsidizing producers according to the actual sowing area or output of grain and increase the accuracy and have a correct direction for subsidies. </span><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Increase the subsidy for the purchase of farm machinery, improve subsidy methods and continue to promote the experiment at selected points on subsidizing the discarding and updating of farm machinery. </span></strong><span data-dcnode-id="947" instrument_node="">Increase subsidies for key technologies for guarding against and relieving disasters and stabilizing and increasing output of agriculture. Continue to implement the policy for subsidizing improved varieties of livestock.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">
	- &nbsp;Speed up the establishment of a benefit compensation mechanism.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="941" instrument_node="">
</span><strong data-dcnode-id="938"><u data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Increase the financial transfer payment for main grain production areas,</span></u></strong><span data-dcnode-id="937" instrument_node=""> increase awards and subsidies to big commodity grain production provinces and big grain, edible oil and hog production counties, encourage main sales areas to make investment in main production areas to build grain production bases through various ways and to undertake more tasks of national grain reserves and improve the benefit compensation mechanism of main grain production areas. </span><strong data-dcnode-id="934"><u data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Support main grain production areas in their efforts to develop the grain processing industry.</span></u></strong><span data-dcnode-id="933" instrument_node=""> Lower or cancel matching funds directly used for grain production construction items and other construction items in big grain production counties. Improve the compensation system for forests, grassland, wetland, water and soil conservation and other ecological compensation, continue to implement the subsidy and award policy for public welfare forest compensation and grassland ecological protection, and establish an ecological compensation mechanism for important river source areas, important water ecological restoration and improvement areas and flood storage and detention areas. Support localities in their efforts to provide compensation for farmland protection.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">
	-&nbsp; Improve the supervision and protection mechanism for farmland irrigation construction.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="927" instrument_node="">
</span><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Deepen the reform of water conservation project management structure and speed up the implementation of the policy of financial subsidy for expenditure on the operation and maintenance of irrigation and drainage projects.</span></strong><span data-dcnode-id="924" instrument_node=""> Carry out experiments at selected points on the reform of the property right system of farmland irrigation facilities and on innovating the operation management and maintenance mechanism and define the management and maintenance main bodies, their responsibility and the expenses of small irrigation projects. By means of replacing subsidies with awards, putting construction before subsidies and other ways, explore a new mechanism for the farmland irrigation capital construction. </span><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Push forward the in-depth comprehensive reform of the price of water for agriculture</span></strong><span data-dcnode-id="921" instrument_node="">. Increase the input of governments at various levels into water conservation construction, implement and improve the policy of setting aside funds for farmland irrigation from land transfer proceeds, raise the standard for collecting water resource fees and increase such fees. Improve the policy of compensation for acquiring land for the construction of medium and large water conservation projects. </span><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Make plans for the construction of a number of large water conservation projects </span></strong><span data-dcnode-id="918" instrument_node="">that have a bearing on the the national economy and the people's livelihood, strengthen the construction of water source projects and the use of rain and flood resources, activate the implementation of a national drought resistance program and increase the capability of agriculture in resisting droughts and floods.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="915" instrument_node="">
</span><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">b) Marketing and trade strategies</span></strong></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">
	Recent related focus is not on the trade liberalization countermeasures, but on the agricultural prices mechanism improvement and domestic markets construction. There are three main aspects.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">
	-&nbsp; Improve the price formation mechanism for grain and other important agricultural products.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="904" instrument_node="">
	Continue to adhere to the market pricing principle, explore and promote the reform of linking the price formation mechanism for agricultural products with government subsidies, </span><strong data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">gradually establish a </span><u data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">target price system for agricultural products</span></u><span data-dcnode-id="900" instrument_node="">,</span></strong><span data-dcnode-id="898" instrument_node=""> </span><strong data-dcnode-id="895"><u data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">subsidize the low-income consumers when market prices are too high and subsidize the producers when market prices are lower than the target prices according to price differences and earnestly ensure the farmers’ benefits. </span></u></strong><span data-dcnode-id="894" instrument_node="">In 2014, launch the experiment at selected points on target price subsidies for </span><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">soybeans in Northeastern China and Inner Mongolia</span></strong><span data-dcnode-id="891" instrument_node=""> and for </span><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">cotton in Xinjiang</span></strong><span data-dcnode-id="888" instrument_node="">, explore the experiment to be carried out at selected points on </span><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">target price insurance for grain, hogs and other agricultural product</span></strong><span data-dcnode-id="885" instrument_node="">s and launch the experiment at selected points on </span><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">loans for the operation and sales of scale management main bodies of grain production</span></strong><span data-dcnode-id="882" instrument_node="">. Continue to implement the policy of the minimum procurement prices for rice and wheat and the policy of the temporary purchase and reserve of corn, rapeseed and sugar.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">
	-&nbsp; Improve the system for regulating and controlling the agricultural product market.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="876" instrument_node="">
	Comprehensively use taking in and sending out reserves, regulating import and export and other means to rationally set the fluctuation regulation and control range of prices for different agricultural products and ensure basic stability of the market of important agricultural products. Scientifically determine the reserve function and scale of important agricultural products strengthen the reserve responsibility of localities, especially the main sales areas, and optimize the regional layout and variety structure. </span><strong data-dcnode-id="873"><u data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Improve the central reserve grain management structure and encourage qualified main bodies of diversified markets to participate in policy-related purchase and reserve of agricultural bulk products.</span></u></strong><span data-dcnode-id="872" instrument_node=""> Improve the evaluation and encouragement mechanism of the “vegetable basket” mayor responsibility system, improve the system for regulating and controlling the prices of the hog market and properly grasp the production and supply of beef and mutton. Further conduct government direct statistical investigation on big agricultural counties. Formulate and promulgate authoritative price indexes of agricultural products.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">
	-&nbsp; Strengthen the building of the market system of agricultural products.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="866" instrument_node="">

es and to conserve soil and water and carry out the construction of ecological and clean small river basins.</span></p><span data-dcnode-id="800" instrument_node="">

lding ratio between major initiating banks and other shareholders.</span></u></strong><span data-dcnode-id="760" instrument_node=""> </span><strong data-dcnode-id="757"><u data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Support the establishment of small and medium banks and financial leasing companies at the county level that serve “Sannong” initiated by the social capital.</span></u></strong><span data-dcnode-id="756" instrument_node=""> S</span><strong data-dcnode-id="753"><u data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">mall-loan companies should widen financing channels, improve the management policy, speed up their convergence with the credit reference system and play the role of supporting agriculture and small enterprises. </span></u></strong><span data-dcnode-id="752" instrument_node="">Support the stock issuance and listing of qualified agricultural enterprises in the main board and the second board markets, supervise and urge listed agricultural enterprises to improve their corporate governance structure, guide high-growth and innovative agricultural enterprises that are not yet qualified for listing to be openly quoted and transferred in the national system for the transfer of the stocks of small and medium enterprises and push forward the development of individualized products suitable for “Sannong” by securities and futures business institutions.</span></p><span data-dcnode-id="750" instrument_node="">

	Speed up improvement in the basic conditions for running schools of rural schools which are weak in providing compulsory education and appropriately raise the standard of the average public expenses for students receiving rural compulsory education. Make great efforts to support the development of pre-school education in the rural areas. </span><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Implement the policy of government aid to secondary vocational education, and, in close connection with market demand, strengthen rural vocational education and skill training.</span></strong><span data-dcnode-id="661" instrument_node=""> Increase the percentage of rural students enrolled by key institutions of higher education. E</span><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">ffectively streamline various kinds of rural cultural projects and resources for benefiting the people and promote the construction of public cultural and sports facilities and the building of service standards of townships and counties. </span></strong><span data-dcnode-id="658" instrument_node="">Deepen the comprehensive reform of the rural grass-roots medical and health institutions and implement a general practitioners special post plan in the western and central regions. </span><strong data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Continue to raise the financing standards and protection level of a new type of rural cooperative medical service, improve the insurance and assistance system for major diseases and promote unified urban-rural planning for the basic medical insurance system.</span></strong><span data-dcnode-id="655" instrument_node=""> Stabilize the network and the contingent of workers for rural family planning and carry out the experiment at selected points on the equalization of public services for family planning and health between the urban areas and the rural areas. </span><strong data-dcnode-id="652"><u data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Streamline the basic old-age insurance system for the urban and rural residents, gradually establish a mechanism for the normal readjustment of the basic pension standard and speed up the establishment of a rural social old-age care service system.</span></u></strong><span data-dcnode-id="651" instrument_node=""> Strengthen the standard management in ensuring a minimum standard of living in the rural areas. Carry out the experiment at selected points on the standardization of public services. Make efforts to innovate the working mechanism for poverty-relief through making development, improve the procedures for evaluating the work of the government in poverty-relief through making development in key counties, increase the precision of poverty-relief and firmly carry out key work in poverty-relief through making development.</span></p><span data-dcnode-id="649" instrument_node="">

</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">
	Institutional innovation is an important power for promoting the development of agricultural economy (Lin,1992). Over 30 years’ practice of China's reform and opening up has proven this. In this process, China has initially formed a complete agricultural policy framework, but new challenges require Chinese government continues to promote innovative agricultural policies. Based on the above analysis, we can see that, the emphasis of China's future agricultural policy will be placed on new food security strategy, agricultural land policy, agricultural marketing, rural finance, new agricultural management system, farmers’ income growth, etc. The corresponding main tasks can be summarized as follows:</span></p><span data-dcnode-id="617" instrument_node="">

</span><li data-dcnode-id="611" style="margin-left: 42pt;"><span data-dcnode-id="612" instrument_node="">

</span><li data-dcnode-id="608" style="margin-left: 42pt;"><span data-dcnode-id="609" instrument_node="">

</span><li data-dcnode-id="605" style="margin-left: 42pt;"><span data-dcnode-id="606" instrument_node="">
		Support new agricultural operator, construct efficient agricultural social service system;</span></li><span data-dcnode-id="604" instrument_node="">

		Fast agricultural science and technology innovation, and further nurture new farmers with better quality;</span></li><span data-dcnode-id="601" instrument_node="">
</span><li data-dcnode-id="599" style="margin-left: 42pt;"><span data-dcnode-id="600" instrument_node="">

</span><li data-dcnode-id="596" style="margin-left: 42pt;"><span data-dcnode-id="597" instrument_node="">
		Continue to deepen the reform of the household registration system, to promote the equalization of urban and rural public services;</span></li><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="593" style="margin-left: 42pt;"><span data-dcnode-id="594" instrument_node="">
		Adjust national income distribution, make efforts to broaden the channels for farmers' income.</span></li><span data-dcnode-id="592" instrument_node="">
</span></ul><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">
	Anyway, the economic and social development of China is in a transformation period and the rural reform and development are faced with a more complicated environment and increased difficulties and challenges. It is impossible for China to achieve a high level of agricultural modernization within a short period of time. So Chinese government will comply with the following principles in policy implementation:</span></p><span data-dcnode-id="587" instrument_node="">
</span><ul data-dcnode-id="564"><span data-dcnode-id="586" instrument_node="">
</span><li data-dcnode-id="584" style="margin-left: 42pt;"><span data-dcnode-id="585" instrument_node="">
		adhere to the direction of the socialist market economy reform,</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="581" style="margin-left: 42pt;"><span data-dcnode-id="582" instrument_node="">
		properly handle the relationship between the government and the market</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="578" style="margin-left: 42pt;"><span data-dcnode-id="579" instrument_node="">
		stimulate the vitality of the rural&nbsp;economy and society;</span></li><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="575" style="margin-left: 42pt;"><span data-dcnode-id="576" instrument_node="">
		support localities to be the first to implement and experiment</span></li><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="572" style="margin-left: 42pt;"><span data-dcnode-id="573" instrument_node="">
		respect the practice and creative work of farmers;</span></li><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="569" style="margin-left: 42pt;"><span data-dcnode-id="570" instrument_node="">
		suit measures to local conditions, make progress gradually and in an orderly manner;</span></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="566" style="margin-left: 42pt;"><span data-dcnode-id="567" instrument_node="">
		avoid rigid uniformity, do not seek settling a matter at one go and permit making differential and transitional institutional and policy arrangements.</span></li><span data-dcnode-id="565" instrument_node="">
</span></ul><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">
	Thereby, the trend of China agricultural development in long term, we can forecast that:</span></p><span data-dcnode-id="560" instrument_node="">
</span><ul data-dcnode-id="543"><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557" style="margin-left: 42pt;"><span data-dcnode-id="558" instrument_node="">
		New types of agricultural operators such as cooperatives, family farm, agricultural enterprises and so on, will be fast growing and play a more important role in China agriculture.</span></li><span data-dcnode-id="556" instrument_node="">
</span><li data-dcnode-id="554" style="margin-left: 42pt;"><span data-dcnode-id="555" instrument_node="">
		Agricultural production is likely to maintain momentum of stable growth,</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551" style="margin-left: 42pt;"><span data-dcnode-id="552" instrument_node="">
		Farm product price hikes are expected to ease,</span></li><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548" style="margin-left: 42pt;"><span data-dcnode-id="549" instrument_node="">
		The deficit in agricultural trade would widen,</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545" style="margin-left: 42pt;"><span data-dcnode-id="546" instrument_node="">
		Farmers’ earnings are expected to see rapid growth.</span></li><span data-dcnode-id="544" instrument_node="">
</span></ul><span data-dcnode-id="542" instrument_node="">
</span><p align="center" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="539" instrument_node="">
