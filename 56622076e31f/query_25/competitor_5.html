der-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4286" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4287" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4288" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4309" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4310" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4311" instrument_node="">Makar Sankranti, meaning “movement of the Sun to Capricorn zodiac constellation” in Sanskrit, is celebrated on 14th or 15th of January every year.</span></span></p><span data-dcnode-id="4308" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4305" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4306" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4307" instrument_node="">It is one of the few Hindu festivals, which is based on the solar calendar and celebrated on a fixed date i.e. 14th/15th of January. The harvest festival is also regarded as the beginning of an auspicious phase of transition. On this day, people pray to Saraswati, the Hindu Goddess of Education and Knowledge (Jnana), which marks the beginning of an auspicious phase in Indian culture.</span></span></p><span data-dcnode-id="4304" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4301" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4302" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4303" instrument_node="">It is the festival of Sun God; the sun on this day ends its southwar</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4289" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4290" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4291" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4292" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4293" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4298" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4299" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4300" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4294" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4295"><svg data-dcnode-id="4296" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4297" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4193" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4194" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4195"><span class="q-box qu-userSelect--text" data-dcnode-id="4196" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4281" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4282" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4283" instrument_node="">Makar Sankranti, meaning “movement of the Sun to Capricorn zodiac constellation” in Sanskrit, is celebrated on 14th or 15th of January every year.</span></span></p><span data-dcnode-id="4280" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4277" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4278" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4279" instrument_node="">It is one of the few Hindu festivals, which is based on the solar calendar and celebrated on a fixed date i.e. 14th/15th of January. The harvest festival is also regarded as the beginning of an auspicious phase of transition. On this day, people pray to Saraswati, the Hindu Goddess of Education and Knowledge (Jnana), which marks the beginning of an auspicious phase in Indian culture.</span></span></p><span data-dcnode-id="4276" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4273" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4274" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4275" instrument_node="">It is the festival of Sun God; the sun on this day ends its southward journey, i.e. dakshinayan, and starts moving northwards i.e. uttarayan, towards the Tropic of Cancer in the Hindu month of Paush (starts mid-December).</span></span></p><span data-dcnode-id="4272" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4269" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4270" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4271" instrument_node="">Uttarayan is the daytime of the deity. Night is considered as the symbol of sin and false doing, whereas day is regarded as the symbol of truth, virtue and religion. So when it is day for Gods, all works of virtue are performed on Makar Sankranti when days become longer and nights become shorter.</span></span></p><span data-dcnode-id="4268" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4265" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4266" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4267" instrument_node="">To Hindus, the Sun stands for knowledge, spiritual light and wisdom. Makar Sankranti signifies that we should turn away from the darkness of delusion in which we live and begin to joyously let the light within us shine bright. We should grow in purity, wisdom and knowledge just as the sun does from this day. Sun stands for all ideals; its message is that of light, unity, equality and true selflessness. These are the ideals of a karma yogi. Hence, the sun is the biggest karma yogi. Does it ask for any rewards for all that it gives us ? If it stops giving light, we will be doomed. If we learn this one lesson from the sun, our lives will shine with the divine lustre.</span></span></p><span data-dcnode-id="4264" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4261" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4262" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4263" instrument_node="">Story behind Makar Sankranti:</span></span></p><span data-dcnode-id="4260" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4257" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4258" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4259" instrument_node="">Capricorn is the sign of Saturn (shani); the sun on this day enters the sigh of Saturn. The sun is the father of Saturn and as per Hindu mythology, father (sun) and son (shani) don’t get along well. But on this day, the father goes to meet his son. Both Saturn and Sun are mighty planets whose auspicious blessings can make humans achieve great success. Hence on Makar Sankranti, people pray to both sun and Saturn. In the era of Mahabharat, Bhishma Pitamaha had a blessing of wish death. Although lying on the bed of arrows, he did not sacrifice his life in dakshinayan and waited for the sun to go in uttarayan to discard his body. It is believed that people who die in uttarayan get a place in Krishna lok, and get moksha. Another story is that on this day King Bhagirath brought Ganga to earth, thus providing moksha to 60,000 sons of Maharaj Sagar.</span></span></p><span data-dcnode-id="4256" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4253" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4254" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4255" instrument_node="">Spiritual importance:</span></span></p><span data-dcnode-id="4252" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4249" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4250" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4251" instrument_node="">On Makar Sankranti from sunrise to sunset, the environment is full of chaitanya or divine consciousness. Thus a seeker doing sadhana (spiritual practice) can derive the maximum benefit of the increased chaitanya. Due to the chaitanya, tejtattva (absolute fire principle) also increases in seekers. This day is very conducive for sadhana.</span></span></p><span data-dcnode-id="4248" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4245" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4246" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4247" instrument_node="">Harvest Festival:</span></span></p><span data-dcnode-id="4244" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4241" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4242" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4243" instrument_node="">This festival is related to foodgrain harvesting; it is also called lohri in Punjab. Traditionally lohri is associated with the harvest of Rabi crop. This is the time to sow sugarcane crop, which is harvested between December and March with a 12 to 18 month cycle. Sugarcane products such as gur and gajak are an important part of lohri.</span></span></p><span data-dcnode-id="4240" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4237" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4238" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4239" instrument_node="">Significance of sesame sweets:</span></span></p><span data-dcnode-id="4236" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4233" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4234" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4235" instrument_node="">Sesame seed sweets have the ability to absorb and emit high amounts of sattva frequencies. By consuming seed sweets, inner purification happens which helps improve one’s sadhana. By distributing these sweets to each other, there is an exchange of sattvikta. According to Ayurveda, eating sesame seeds in winters is beneficial for our health.</span></span></p><span data-dcnode-id="4232" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4229" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4230" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4231" instrument_node="">Fairs and Festivals:</span></span></p><span data-dcnode-id="4228" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4225" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4226" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4227" instrument_node="">On this day many fairs are held in different regions of India. The biggest fair is held at Ganga Sagar in West Bengal, where River Ganga enters the sea thousands of pilgrims and sadhus come here for the holy bath on Makar Sankranti. The bullock festival, cattle fair is held at different places on this day, where camels, horses and bullocks are sold and purchased. A famous and unique fair is held at Rajgir in Bihar.</span></span></p><span data-dcnode-id="4224" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4221" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4222" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4223" instrument_node="">Surya mantra:</span></span></p><span data-dcnode-id="4220" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4217" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4218" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4219" instrument_node="">On the day of Makar Sankranti, surya mantra japa should be done and the sun should be worshipped. The mantra to be recited is: “Om Hreem Hreem Hroumm Sah Suryaya Namah.”</span></span></p><span data-dcnode-id="4216" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4213" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4214" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4215" instrument_node="">Celebration known by different names:</span></span></p><span data-dcnode-id="4212" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4209" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4210" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4211" instrument_node="">Makar Sankranti is also called Pongal by Tamilians for whom it ushers in the new year. The day begins with surya pongal or sun worship. The newly harvested corn is then cooked for the first time. Sankranti is celebrated all over South Asia with some regional variations. It is known by different names with different customs, like Pongal in Tamil Nadu, Uttrayan in Gujarat, Bhogali Bihu in Assam, Shishir Sakranti in Kashmir, Makar Sankranti in Karnataka, Telangana, Andhra Pradesh, Rajasthan, Maharashtra and Haryana.</span></span></p><span data-dcnode-id="4208" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4205" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4206" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4207" instrument_node="">Makar Sankranti as an International festival since it is celebrated not just in India. Makar Sankranti is celebrated in Nepal as Maghe Sankranti, in Myanamar as Thingyan, in Cambodia as Moha Sagkran, in Thailand as Songkran and in Sri Lanka as Uzhavar Pongal.</span></span></p><span data-dcnode-id="4204" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4201" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4202" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4203" instrument_node="">During this holy festival, we learn to feel oneness with all creations, we learn to be unselfish and to tread the path of love, purity and forgiveness. We learn that our real wealth is the goodwill and friendship of those around us, the land on which our food grows, and the animals that help make our work easier.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4197" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4198"><div class="q-box unzoomed" data-dcnode-id="4199" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-324dbd94c4a1daefee8f8591c33c5348-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--ac cultures following solar calendar and the cultures following lunisolar calendar. The people of western Indian and northern plains are more familiar with the lunisolar calendar, while those in Tamilnadu and on east follow the solar calendar.</span></span></p><span data-dcnode-id="3882" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3870" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3880" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3881" instrument_node="">The </span></span><span class="q-inline" data-dcnode-id="3873" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sankranti" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3879" instrument_node="">Sankranti</span></a><span class="q-inlineBlock" data-dcnode-id="3874" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3875"><svg data-dcnode-id="3876" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3877" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3871" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3872" instrument_node=""> festivals are example of solar festivals and comes around the constant time of the year. As you might know there is not one Sankranti, but 12. And these are unrelated to nakshtras and tithis that many of the Indian lunisolar festivals (like Deepavali, Holi and Navratri) follow.</span></span></p><span data-dcnode-id="3869" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3864" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3867" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3868" instrument_node="">April 14/15 (Mesha Sankranti) </span></span><span data-dcnode-id="3865" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3866" instrument_node="">is celebrated in the solar cultures across India as the new year — Puthandu/Vishu/Bihu/Vaishaki/Baisaki. The day forms among the most important days for Tamils, Assamese, Malayalis, Punjabis, Bengalis, Odias etc to mark the beginning of the year.</span></span></p><span data-dcnode-id="3863" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3853" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3861" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3862" instrument_node="">On the other hand, the folks following the lunisolar calendar — such as Marathis, Telugus, Kannadigas, Biharis, UPites — have the new year fall in Mar-Apr in a day decided by the moon’s position. You can see the various new year days of India in this page: </span></span><span class="q-inline" data-dcnode-id="3854" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_New_Year%2527s_days" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3860" instrument_node="">Indian New Year's days.</span></a><span class="q-inlineBlock" data-dcnode-id="3855" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3856"><svg data-dcnode-id="3857" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3858" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3852" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3845" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3850" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3851" instrument_node="">Similarly </span></span><span data-dcnode-id="3848" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3849" instrument_node="">Jan 14/15 (Makara Sankranti)</span></span><span data-dcnode-id="3846" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3847" instrument_node=""> is celebrated as a key day for most of the solar cultures as Pongal, Bhogali Bihu, Lohri, Sankranti, Sangkkaran etc. This is the time of farm bounty after a successful harvest. While the Makara Sankranti is celebrated in AP and other cultures following lunisolar, it is the top festival for those in solar calendar.</span></span></p><span data-dcnode-id="3844" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3817" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3842" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3843" instrument_node="">There are also lesser known solar festivals. On Meena Sankranti (</span></span><span data-dcnode-id="3840" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3841" instrument_node="">March 14)</span></span><span data-dcnode-id="3838" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3839" instrument_node="">, some Tamil communities celebrate a festival called </span></span><span class="q-inline" data-dcnode-id="3831" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karadaiyan_Nonbu" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="en.wikipedia.org"><span data-dcnode-id="3837" instrument_node="">Karadaiyan Nonbu</span></a><span class="q-inlineBlock" data-dcnode-id="3832" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3833"><svg data-dcnode-id="3834" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3835" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3829" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3830" instrument_node=""> sort of like Karva Chauth in the north. The Sikhs celebrate it as Nanakshahi new year. The Thula Sankranti (</span></span><span data-dcnode-id="3827" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3828" instrument_node="">October 18) </span></span><span data-dcnode-id="3825" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3826" instrument_node="">is celebrated in Assam as Kati Bihu and also an auspicious day in many cultures following the solar pattern. The Sabarimala temple is open for 5 days of Thula masya puja. Karnataka, Odisha celebrate it as the </span></span><span class="q-inline" data-dcnode-id="3818" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hellotravel.com/events/garbhana-sankranti" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.hellotravel.com"><span data-dcnode-id="3824" instrument_node="">Garbhana Sankranti.</span></a><span class="q-inlineBlock" data-dcnode-id="3819" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3820"><svg data-dcnode-id="3821" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3822" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="3816" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3809" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3814" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3815" instrument_node="">The Dhanu Sankranti </span></span><span data-dcnode-id="3812" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3813" instrument_node="">(Dec 16</span></span><span data-dcnode-id="3810" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3811" instrument_node="">) is an important festival in Jagannath temple of Puri and celebrated in temples across Tamil Nadu and Karnataka — everything is pushed an hour earlier during that month.</span></span></p><span data-dcnode-id="3808" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3805" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3806" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3807" instrument_node="">In short, Pongal/Makara Sankranti is not the only one to be celebrated by the solar calendar. And India doesn’t follow one calendar, but two.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3723" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3724" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3725" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3739" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3771" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3772" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3782" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3783" style="box-sizing: border-box; position: relative;"><button aria-label="522 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="3784" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;" tabindex="0"><div class="q-relative qu-display--inli r: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="2584" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="2585" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="2586" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2587" style="box-sizing: border-box;"><span data-dcnode-id="2588" style="background: none;"><span data-dcnode-id="2589" instrument_node="">What is the difference between Makar Sankranti and Sankranti?</span></span></span></div></div></div></div></a></span></span></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2565" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit; cursor: initial;" tabindex="-1" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2566" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2568" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2569"><span class="q-box qu-userSelect--text" data-dcnode-id="2570" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2575" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2576" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2577" instrument_node="">Sankranti means Transit. On Makar Sankranti day, the Sun transits from Dhanu/ Saggitarius to Makar/ Capricorn.</span></span></p><span data-dcnode-id="2574" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2571" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2572" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2573" instrument_node="">Sankranti , as said above is a common word for Transit. In terms of the calendar, it happens 12 times a year as the Sun transits from one Zodiac Sign/ rashi to the next one. However since Makar Sankranti marks the end of winter it is the most important of the 12 Sankrantis. The other 11 have negligible significance. In common usage when people say Sankranti, they usually mean Makar Sankranti.</span></span></p></span></span></div><div data-dcnode-id="2567"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="2539" style="box-sizing: border-box;"><span data-dcnode-id="2540"><span class="q-box qu-display--none" data-dcnode-id="2563" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="2560"><span data-dcnode-id="2562" instrument_node="">133</span><span data-dcnode-id="2561" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="2558" style="box-sizing: border-box;"><span data-dcnode-id="2559" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="2555"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2556" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data as it holds a religious significance for the Hindus. According to the Puranas, on this day, the Sun visits the house of Shani, the Swami of Makar Rashi. Also, this day symbolises the importance of special father-son relationship. It is believed that on this day Lord Vishnu conquered the demons and buried them under the Manadara Parvata, thereby marking the day as the victory of good over </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2202" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2203" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2204" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2205" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2206" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2211" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2212" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2213" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2207" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2208"><svg data-dcnode-id="2209" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2210" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2144" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2145" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2146"><span class="q-box qu-userSelect--text" data-dcnode-id="2147" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2192" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2195" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2196" instrument_node="">Makar Sankranti </span></span><span data-dcnode-id="2193" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2194" instrument_node="">is a harvest festival that is celebrated every year on 14th January, in the month of Magha, as per the Hindu calendar. Makar Sankranti is one of the most auspicious days in the Hindu calendar, as it holds a religious significance for the Hindus. According to the Puranas, on this day, the Sun visits the house of Shani, the Swami of Makar Rashi. Also, this day symbolises the importance of special father-son relationship. It is believed that on this day Lord Vishnu conquered the demons and buried them under the Manadara Parvata, thereby marking the day as the victory of good over evil. Apart from this, this festival holds special mention in the epics of the Mahabharata. The story relates to Bhishma Pitamaha, wherein during a war, Arjuna’s arrows injured Bhishma Pitamaha. However, he chose to wait for the Uttarayan to set in so that he would get salvation and free himself from the cycle of rebirth.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2188" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="2189"><div class="q-box unzoomed" data-dcnode-id="2190" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="2191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-0cdae65a7c0fb7e52a2346e1643b0675-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2185" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2186" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2187" instrument_node="">The festival of Makar Sankranti is also given due importance in the Sikh community as the tenth Sikh Guru, Sri Guru Gobind Singh got Moksha (salvation) for fourteen Sikhs. This festival is celebrated with great zeal and enthusiasm in the states of Karnataka, Bihar and Uttar Pradesh. Besides this, Makar Sankranti is also celebrated in other parts of the country and is known by different names viz. Pongal in Tamil Nadu, Bihu in Assam, Bhogi in Andhra Pradesh and Uttarayan in Gujarat.</span></span></p><span data-dcnode-id="2184" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2181" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2182" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2183" instrument_node="">Traditional Celebrations</span></span></p><span data-dcnode-id="2180" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2177" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2178" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2179" instrument_node="">The traditional celebrations and rituals associated with Makar Sankranti vary from state to state. Since the festival traditionally coincides with the Sun’s northwards journey into the Uttarayan, when it enters the sign of Makar Rashi (the Capricorn), people in huge number take dips in the holy Ganga River at Haridwar and offer water to the Sun God (Surya). It is believed that by doing this, all sins will be purified and one can attain salvation. Also on this day, people worship Goddess Saraswati who is considered as the Goddess of knowledge. Apart from this, kite flying is a popular tradition on the occasion of Makar Sankranti. This is so because this festival coincides with the International Kite Festival which is held at Ahmedabad, Gujarat on 14th January.</span></span></p><span data-dcnode-id="2176" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2173" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2174" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2175" instrument_node="">How to celebrate Makar Sankranti at home?</span></span></p><ul class="q-box" data-dcnode-id="2151" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="2170" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2171" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2172" instrument_node="">Wake-up early in the morning, before sunrise, have bath and dress up in new traditional clothes.</span></span></li><li class="q-relative" data-dcnode-id="2167" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2168" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2169" instrument_node="">Tell your children the significance of celebrating the festival of Makar Sankranti.</span></span></li><li class="q-relative" data-dcnode-id="2164" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2165" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2166" instrument_node="">Teach ‘Gayatri Mantra’ to your children.</span></span></li><li class="q-relative" data-dcnode-id="2161" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2162" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2163" instrument_node="">Worship the rising sun by offering water, flowers while chanting the Gayatri Mantra.</span></span></li><li class="q-relative" data-dcnode-id="2158" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2159" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2160" instrument_node="">Prepare special delicacies such as rice khichadi, til ke laddu, coconut chikki, ganee ki kheer etc.</span></span></li><li class="q-relative" data-dcnode-id="2155" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="2156" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2157" instrument_node="">Encourage your children to make bright kites of different colours, sizes and shapes.</span></span></li><li class="q-relative" data-dcnode-id="2152" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="2153" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2154" instrument_node="">Involve your children in flying kites.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2148" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2149" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2150" instrument_node="">So, on this auspicious occasion of Makar Sankranti, pray to God for the well-being of one and all.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2071" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-d rflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1983" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1984" instrument_node="">Hindus use lunar calendars which fix the</span></span><span data-dcnode-id="1981" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1982" instrument_node=""> thithi</span></span><span data-dcnode-id="1979" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1980" instrument_node=""> for our festivals. Naturally the date corresponding to the </span></span><span data-dcnode-id="1977" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1978" instrument_node="">thithi</span></span><span data-dcnode-id="1975" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1976" instrument_node=""> will be a different date each year in the Gregarian (solar) calendar. For example</span></span><span data-dcnode-id="1973" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1974" instrument_node=""> Ratha sapthami (thithi </span></span><span data-dcnode-id="1971" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1972" instrument_node="">is 7th day of Shukla Paksha in the month of Phalguna) falls on Febraury 1st this year but will be on a different date next year. Sankranthi is the day on which the sun is at the point of summer equinox which has nothing to do with the moon. The event is defined by the apparent motion of the sun around the earth and always happens on January 15.</span></span></p></span></span></div><div data-dcnode-id="1966"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="1954" style="box-sizing: border-box;"><span data-dcnode-id="1955"><span class="q-box qu-display--none" data-dcnod strument_node="">Importance of Makar Sankranti</span></span></p><span data-dcnode-id="1812" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1809" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1810" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1811" instrument_node="">Lord Surya on His dazzling chariot, that has thousands of spokes and magnificent wheels, and is driven by seven horses (seven colours of the spectrum) begins His journey northward into the Makara Rasi on this day, filling our lives with light and getting rid of the darkness. This light not only fills our material life and helps our plants grow at seedin</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1797" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1798" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1799" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1800" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1801" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1806" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1807" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1808" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1802" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1803"><svg data-dcnode-id="1804" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1805" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1707" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1708" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1709"><span class="q-box qu-userSelect--text" data-dcnode-id="1710" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1789" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1790" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1791" instrument_node="">The auspicious day of Makar Sankranti, which falls in the Krishna paksha of Magha maas (month of January), is considered a very auspicious day, and marks the entering of the sun into the sign of Capricorn or ‘Makar’.</span></span></p><span data-dcnode-id="1788" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1785" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1786" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1787" instrument_node="">Importance of Makar Sankranti</span></span></p><span data-dcnode-id="1784" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1781" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1782" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1783" instrument_node="">Lord Surya on His dazzling chariot, that has thousands of spokes and magnificent wheels, and is driven by seven horses (seven colours of the spectrum) begins His journey northward into the Makara Rasi on this day, filling our lives with light and getting rid of the darkness. This light not only fills our material life and helps our plants grow at seeding time, but also gets rid of our “internal” darkness, showing the path of self-realisation.</span></span></p><span data-dcnode-id="1780" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1777" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1778" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1779" instrument_node="">The Brahma-Sutras proclaim that the time of death is immaterial in the case of a devotee. It is established that although one who has knowledge of the Lord can die during any time; the exaltations of uttarayana are to praise meditation on the path to Vaikuntha, which the wise devotee takes upon death. This divine path beginning with light, is presided upon by deities of greater and greater brilliance, with uttarayana being one of them. This marga (path) culminates in Vaikuntha, the state of moksha, and shastra says it should be meditated upon daily by the yogi of devotion. Although in ancient times all Sankrantis were observed and celebrated, Makar Sankranti is of special importance, as it marks the beginning of the auspicious six month period of Uttarayan.</span></span></p><span data-dcnode-id="1776" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1773" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1774" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1775" instrument_node="">Past events on Makar Sankranti</span></span></p><span data-dcnode-id="1772" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1767" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1770" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1771" instrument_node="">a. Bhishma Dev leaves his body:</span></span><span data-dcnode-id="1768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1769" instrument_node=""> After the war on the battlefield of Kurukshetra, when Bhishma Dev was lying on a bed of arrows and was about to leave his body, at that time he was waiting for the sun to enter into Uttarayan, as it is considered to be an auspicious time, and he left his body on the auspicious day of Makar Sankranti while beholding the beautiful face of Lord Krishna in the holy place of Kurukshetra, which is also known as Dharmakshetra. The uttarayana (norther course of the Sun) was traditionally considered more auspicious than the Dakshin Ayana (southern course of the Sun).</span></span></p><span data-dcnode-id="1766" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1761" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1764" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1765" instrument_node="">b. Descent of Mother Ganges:</span></span><span data-dcnode-id="1762" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1763" instrument_node=""> This glorious day also marks the descent of mother Ganges on this earthly planet, after the austere penances performed by King Bhageerath with the aspiration to free his ancestors from the curse of Kapila rishi, who, at being falsely accused by the sixty thousand sons of King Sagar for stealing the sacrificial horse actually stolen by indra, cursed them to go to the Nether regions. After being pacified by their prayers, he proclaimed that the only way for their salvation would be if the river Ganges would descend from the heavenly planets and come down to the earth and up to the nether regions, then by being purified by her they shall be freed from the curse. After the austere penances of King Bhageerath, the most purifying Mother Ganges came down to the earth on the day of Maker Sankranti. This descent of hers is celebrated till today in the form of Ganga Sagar Mela, when numerous pilgrims go to the Sagar islands in West Bengal and bathe in the holy confluence of the Ganga with the ocean.</span></span></p><span data-dcnode-id="1760" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1755" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1758" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1759" instrument_node="">c. Acceptance of Sannyasa by Shri Chaitanya Mahaprabhu:</span></span><span data-dcnode-id="1756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1757" instrument_node=""> Another significant event that took place on this day was the acceptance of the Sannyas order of life by Shri Chaitanya Mahaprabhu for the purpose of preaching and propagating the path of devotional service and delivering all the fallen conditioned souls in this age of Kali. It was on this day that He left behind His widowed mother and young wife in Mayapur, and in the village of Katwa He renounced His Grhastha ashram and accepted Sannyasa from Shri Keshava Bharati, shaving His beautiful locks of hair and donning saffron cloths. Although, being the Supreme Personality of Godhead, one of His opulence is that He is the most renounced and therefore there was no need for Him to accept the renounced order of Sannyas, yet seeing the fault-finding nature of the people and understanding that if He would accept the life of a renunciant then the general populace would be able to give Him the proper respect and refrain from committing offences at His lotus feet, He decided to take sannyasa. Thereafter He inundated the entire universe with Krishna Bhakti and it is due to His causeless mercy alone that we are able to today tread the path of devotion following in the footsteps of his devotees.</span></span></p><span data-dcnode-id="1754" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1751" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1752" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1753" instrument_node="">Celebrations on the day of Makara Sankranti (Local Traditions)</span></span></p><span data-dcnode-id="1750" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1745" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1748" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1749" instrument_node="">a. Special Dishes:</span></span><span data-dcnode-id="1746" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1747" instrument_node=""> On this day, devotees prepare a dish made of green grams, rice and jaggery (sarkkarai pongal) – representing Lord Narayana, Laxmi and Their Divine love. The festival reminds us that we need to establish that Divine Love within ourselves and give a direction to this “chanchala buddhi” and fix it our Lord Narayana, who brings light in our lives. Sesame oil is used in making sweets and dishes, particularly on this day. It is believed that sesame seeds are used for purificatory purposed (or as being auspicious – “tila juhomi sarasaagum sapishhthaam gandhaara mama chitteramanutu swaaha”, “tila krishnaa tila shevataa tila saumyaa vashaanugaa”…).</span></span></p><span data-dcnode-id="1744" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1741" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1742" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1743" instrument_node="">So generally special offerings of til (sesame) rice and corn (first harvest) are offered and distributed. Especially preparations of rice Khitcheri with sesame and corn are a preferred offering to the Lord on this day. In different parts of India slight variations (gauna – local traditions prevail) but the general observance is very much the same. Some devotees also have elaborate festivals offering six kinds of sesame preparation in the service of the Lord on Sat-tila ekadasi.</span></span></p><span data-dcnode-id="1740" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1738" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1739" instrument_node="">b. Celebration of the new harvest:</span></span><span data-dcnode-id="1736" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1737" instrument_node=""> This same festival is celebrated as Pongal in the South of India. Harvest is brought home, the new rice is then boiled in milk to make the sweet called “chakrapongali”, the special cuisine of the eve. This harvest festival is celebrated for 3 days. The delicacy is first offered to Sun God, the chief deity under worship, that is later distributed to all as prasadam. The harvest is celebrated as being blessed with Dhanyalakshmi and a splendid feast is shared by all after the Ishta Devatha pujas.</span></span></p><span data-dcnode-id="1734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1729" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1732" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1733" instrument_node="">c. Flying Kites</span></span><span data-dcnode-id="1730" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1731" instrument_node=""> – kites are seen soaring high in the sky on the day of Makara Sankranti. This is symbolic of the existence of mankind, with the kites depicting the human lives and the manza depicting the eternal bond between us and the divine self. People however seem to correlate the soaring kites with their high spirits on the eve of Makara sankranti. Competitions held with kites of all sizes and shapes and the sharp edged manza draw people on the terraces and in open grounds to witness the riot of colours – fun for the gurukulis.</span></span></p><span data-dcnode-id="1728" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1723" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1726" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1727" instrument_node="">d. Gobbemmalu</span></span><span data-dcnode-id="1724" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1725" instrument_node=""> – Young girls are seen to put up Gobbemmalu, round balls of cow dung that are decorated with vermilion, turmeric and coloured flowers. These are placed in the middle of the bright muggus in the front yards of the dwellings and are worshipped with Navadhanyas (nine types of grains) to welcome the Lakshmi, the Goddess of abundance and prosperity. Spinsters worship for good husbands on the occasion. After this, the women folk get gathered to sing and dance to the accompaniment around these gobbis.</span></span></p><span data-dcnode-id="1722" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1717" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1720" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1721" instrument_node="">e. Other celebations:</span></span><span data-dcnode-id="1718" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1719" instrument_node=""> Many traditional folk forms add glory to the festive scenario. Haridasulu (Madhwa Devotees) are seen singing eulogies of the Almighty and seeking arms from the people in the early hours of the days. Gangireddu Ata, is another festival where trained oxen dance to the tunes of the Nagaswaram played by their master is a great attraction. Kommudasarulu &amp; PittalaDora are other folklore that brighten the days with their healthy humour.</span></span></p><span data-dcnode-id="1716" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1711" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1712" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1715" instrument_node="">Hope this help u.</span><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">Hare Krishna.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1639" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1640" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1641" style="box-sizing: border-box; display: f eligious level.</span></span></p><span data-dcnode-id="1540" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1537" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1538" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1539" instrument_node="">It signifies the arrival of longer days. Makar Sankranti falls in the Hindu calendar</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1525" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1526" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1527" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1528" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1529" style="box-sizing
