nstrument_node="">What is Makar Sankranti? And Why do we celebrate it?</span></span></p><span data-dcnode-id="1516" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1513" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1514" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1515" instrument_node="">India is a diverse country with many different cultures and religions coexisting with each other in peace and harmony. From the gargantuan amounts of cultural backgrounds come equally vast amounts of Festivals.</span></span></p><span data-dcnode-id="1512" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1504" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="1505" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wishesnews.com/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: bold; font-style: normal; background: none;" target="_blank" title="wishesnews.com"><span data-dcnode-id="1511" instrument_node="">Makar Sankranti Wishes</span></a><span class="q-inlineBlock" data-dcnode-id="1506" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="1507"><svg data-dcnode-id="1508" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="1509" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="1503" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1500" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1501" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1502" instrument_node="">Makar Sankranti is one of such festivals with cultural, religious, and historical significance. Though it is a Harvest festival, the day is also used to give respects to the Sun God Dharma, thereby elevating it to a religious level.</span></span></p><span data-dcnode-id="1499" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1496" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1497" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1498" instrument_node="">It signifies the arrival of longer days. Makar Sankranti falls in the Hindu calendar solar month of Makara and the lunar month of Magha (the festival is also called Magha Sankranti or Magha festival in parts of India). The festival celebrates the first month with consistently longer days.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1492" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1493"><div class="q-box unzoomed" data-dcnode-id="1494" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-4b2329f729b463c932d44c9f102a7726-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1489" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1490" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1491" instrument_node="">It is celebrated to welcome the beginnings of a new harvest season. But in various parts of the world, different cultures worship different gods to bring forth good omens for this festival; for example, in the U.P, people pray to the Sun God Surya, but in Kerala, Ayappa is worshipped on an auspicious day.</span></span></p><span data-dcnode-id="1488" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1485" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1487" instrument_node="">Makar Sankranti is regarded as important for spiritual practices, and accordingly, people take a holy dip in rivers, especially Ganga, Yamuna, Godavari, Krishna, and Kaveri. The bathing is believed to result in the merit or absolution of past sins.</span></span></p><span data-dcnode-id="1484" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1482" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1483" instrument_node="">Cultural Significance</span></span></p><span data-dcnode-id="1480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1477" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1478" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1479" instrument_node="">The roots of Makar Sankranti go far back as the Vedic age; hence its origin is veiled in mystery. The only present evidence is oral myths passed down from generation to generation.</span></span></p><span data-dcnode-id="1476" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1473" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1474" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1475" instrument_node="">According to it, there once existed an all-powerful deity by Sankranti's name; he fought a vile and vicious demon by the name of Sankarasur and, after a long and tedious battle, defeated him. The villagers and commoners who were tormented by the demon named the day Makar Sankranti to commemorate this win. It is also said that the very next day, the deity slew another demon by the name Kinkarasur and the day is since celebrated as Kinkarant.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1469" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1470"><div class="q-box unzoomed" data-dcnode-id="1471" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1472" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-569c2c6c678de728c36a19ff7d6ec130-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1466" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1467" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1468" instrument_node="">In some parts of India, it is also believed that performing religious ceremonies such as Haldi Kumkum on this day invites emissive waves from the Adi-Shakti (God) of this Universe. This is believed to strengthen the impression of Shagun devotion in the mind of followers and worshippers and improves spiritual connections with God.</span></span></p><span data-dcnode-id="1465" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1458" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1461" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="1464" instrument_node="">Different Regions, Different Names</span><br data-dcnode-id="1463"><span data-dcnode-id="1462" instrument_node=""></span></span><span data-dcnode-id="1459" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1460" instrument_node="">It is known by different names and celebrated with different customs in different Indian states and South Asian countries:</span></span></p><span data-dcnode-id="1457" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1452" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1455" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1456" instrument_node="">Suggi Habba, Makara Sankramana, Makara Sankranti:</span></span><span data-dcnode-id="1453" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1454" instrument_node=""> Karnataka, Andhra Pradesh, Madhya Pradesh, Telangana</span></span></p><span data-dcnode-id="1451" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1438" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1449" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1450" instrument_node="">Makara Sankranti</span></span><span data-dcnode-id="1447" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1448" instrument_node=""> or </span></span><span data-dcnode-id="1445" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1446" instrument_node="">Makara Mela</span></span><span data-dcnode-id="1443" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1444" instrument_node=""> and </span></span><span data-dcnode-id="1441" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1442" instrument_node="">Makara Chaula</span></span><span data-dcnode-id="1439" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1440" instrument_node=""> : Odisha</span></span></p><span data-dcnode-id="1437" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1428" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1435" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1436" instrument_node="">Makara Sankranti</span></span><span data-dcnode-id="1433" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1434" instrument_node=""> or </span></span><span data-dcnode-id="1431" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1432" instrument_node="">Til Sankrant</span></span><span data-dcnode-id="1429" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1430" instrument_node=""> : Bihar</span></span></p><span data-dcnode-id="1427" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1410" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1425" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1426" instrument_node="">Makar Sankranti</span></span><span data-dcnode-id="1423" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1424" instrument_node="">, </span></span><span data-dcnode-id="1421" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1422" instrument_node="">Maghi Sankrant</span></span><span data-dcnode-id="1419" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1420" instrument_node="">, </span></span><span data-dcnode-id="1417" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1418" instrument_node="">Haldi Kumkum</span></span><span data-dcnode-id="1415" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1416" instrument_node=""> or </span></span><span data-dcnode-id="1413" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1414" instrument_node="">Sankranti</span></span><span data-dcnode-id="1411" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1412" instrument_node=""> : Maharashtra, Goa, Nepal</span></span></p><span data-dcnode-id="1409" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1400" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1407" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1408" instrument_node="">Thai Pongal</span></span><span data-dcnode-id="1405" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1406" instrument_node=""> or </span></span><span data-dcnode-id="1403" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1404" instrument_node="">Uzhavar Thirunal</span></span><span data-dcnode-id="1401" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1402" instrument_node="">: Tamil Nadu, Sri Lanka, Singapore, Malaysia</span></span></p><span data-dcnode-id="1399" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1394" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1397" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1398" instrument_node="">Uttarayan:</span></span><span data-dcnode-id="1395" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1396" instrument_node=""> Gujrat</span></span></p><span data-dcnode-id="1393" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1388" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1391" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1392" instrument_node="">Maghi:</span></span><span data-dcnode-id="1389" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1390" instrument_node=""> Haryana, Himachal Pradesh, and Punjab</span></span></p><span data-dcnode-id="1387" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1378" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1385" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1386" instrument_node="">Magh Bihu</span></span><span data-dcnode-id="1383" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1384" instrument_node=""> or </span></span><span data-dcnode-id="1381" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1382" instrument_node="">Bhogali Bihu</span></span><span data-dcnode-id="1379" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1380" instrument_node="">: Assam</span></span></p><span data-dcnode-id="1377" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1372" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1375" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1376" instrument_node="">Shishur Saenkraat:</span></span><span data-dcnode-id="1373" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1374" instrument_node=""> Kashmir</span></span></p><span data-dcnode-id="1371" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1362" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1369" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1370" instrument_node="">Sakraat</span></span><span data-dcnode-id="1367" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1368" instrument_node=""> or </span></span><span data-dcnode-id="1365" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1366" instrument_node="">Khichdi:</span></span><span data-dcnode-id="1363" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1364" instrument_node=""> Uttar Pradesh and western Bihar</span></span></p><span data-dcnode-id="1361" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1356" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1359" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1360" instrument_node="">Poush Sangkranti</span></span><span data-dcnode-id="1357" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1358" instrument_node="">: West Bengal, Bangladesh</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1352" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1353"><div class="q-box unzoomed" data-dcnode-id="1354" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1355" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-fe50757990d23df2b26f2c6455f7a2a4-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1349" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1350" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1351" instrument_node="">This festival is full of happiness and joy by socializing with people. This festival unites all of us. We enjoy spending time together celebrating this festival with family and eating sweets made up of til and jaggery, a mouth-watering delicacy of India.</span></span></p><span data-dcnode-id="1348" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1345" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1346" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1347" instrument_node="">Makar Sankranti is only one of the thousands of culturally rich festivals of India, which proves time and time again the worth of our country’s heritage and history and how it needs to be preserved and documented properly for the coming generations to learn and enjoy whether these festivals still prevail in the far future or not.</span></span></p><span data-dcnode-id="1344" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1341" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1342" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1343" instrument_node="">If you like this please upvote.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1264" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1265" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--n nent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1109"><span class="q-box qu-userSelect--text" data-dcnode-id="1110" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1159" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1160" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1161" instrument_node="">Makar Sankranti 2022: Here's all you need to know about the date, puja timings, history, significance and celebrations of one of the most auspicious Hindu festivals.</span></span></p><span data-dcnode-id="1158" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1153" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1156" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1157" instrument_node="">Makar Sankranti 2022: </span></span><span data-dcnode-id="1154" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1155" instrument_node="">One of the major festivals celebrated with much pomp in India, Makar Sankranti holds great significance for Hindus. The festival is considered auspicious for tenacity, worship, charity and sacrifice in the scriptures. Makar sankranti or simply sankranti is dedicated to Lord Surya (Sun God) and marks the sun's transit into Makara (Capricorn) raashi (zodiac sign). This festival is considered the most auspicious occasion and is one of the few Hindu festivals aligned with the solar cycle. It marks the beginning of the harvest season when people worship new crops and share them with delight.</span></span></p><span data-dcnode-id="1152" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1149" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1150" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1151" instrument_node="">Makar Sankranti Date And Timings</span></span></p><span data-dcnode-id="1148" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1145" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1146" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1147" instrument_node="">This year, Makar Sankranti falls on Friday, January 14, 2022, according to Drik Panchang. Additionally, the Makar Sankranti Punya Kala timings are from 02:43 pm to 05:45 pm. The duration is 3 Hours, 2 Mins. The Makar Sankranti Maha Punya Kala timings are from 02:43 pm to 04:28 pm. Lastly, the Makara Sankranti moment is 02:43 pm, as per Drik Panchang.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1141" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1142"><div class="q-box unzoomed" data-dcnode-id="1143" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-502a998a52498fc488023bf8b6fc088d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1138" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1139" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1140" instrument_node="">Makar Sankranti History</span></span></p><span data-dcnode-id="1137" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1134" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1135" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1136" instrument_node="">It is believed that Sankranti, after whom the festival is named, was a deity who killed a demon called Sankarasur. On the following day of Makar Sankranti, called Karidin or Kinkrant, the Devi killed the villain Kinkarasur.</span></span></p><span data-dcnode-id="1133" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1130" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1131" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1132" instrument_node="">This is also the time when the sun begins to move north. Before Makar Sankranti, the sun shines on the southern hemisphere. Hindus believe this period to be auspicious, and it is known as Uttarayana or Winter Solstice. According to the Mahabharata, Bhishma Pitamah had waited for the sun to be in Uttarayana to embrace death.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1126" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1127"><div class="q-box unzoomed" data-dcnode-id="1128" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-f3aa3b43232329f702a47e20932b7509-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1123" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1124" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1125" instrument_node="">Makar Sankranti Celebrations</span></span></p><span data-dcnode-id="1122" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1119" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1120" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1121" instrument_node="">In most regions, Sankranti festivities last for two to four days. People worship the Sun God during the festival. They also go for a holy dip in sacred water bodies, perform charity by giving alms to the needy, fly kites, prepare sweets made of sesame and jaggery, worship livestock and more.</span></span></p><span data-dcnode-id="1118" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1115" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1116" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1117" instrument_node="">Additionally, Khichdi is made and consumed during this festival, especially in Eastern Uttar Pradesh, Bihar, and Jharkhand. This is the reason why Makar Sankranti is also known as Khichdi. In Gorakhpur, it is customary for devotees to offer Khichdi to the Gorakhnath temple. In Haryana, Punjab and Delhi, Lohri is observed one day before Makar Sankranti.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="1111" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="1112"><div class="q-box unzoomed" data-dcnode-id="1113" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="1114" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-a90cb7896b1303f67144c98aabea27c6-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1039" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1040" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1041" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1055" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1077" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1078" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1088" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1089" style="box-sizing: border-box; position: relative;"><button aria-label="1 upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBott 48" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="549" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="550" instrument_node="">They also set cow-dung balls called ‘Gobbemma’ and placed a fresh harvest of rice, turmeric and sugarcane. The houses were decorated with marigold flowers and mango leaves.</span></span></p><span data-dcnode-id="547" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="544" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="545" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="546" instrument_node="">Sankranti is a major festival, which highlights the rich Telugu culture.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="540" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="541"><div class="q-box unzoomed" data-dcnode-id="542" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="543" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-86d4bcf1fc0b25e12a44c9d5cf8d424c-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="537" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="538" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="539" instrument_node="">The celebrations kicked off on Wednesday with ‘Bhogi’ or burning of old and unwanted items like old clothes, mats and broom sticks in the belief that new things will usher into their lives.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="534" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="535" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="536" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-18f968585564110fa77c90959eb92105-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="531" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="532" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="533" instrument_node="">Lakhs of people employed in Hyderabad headed to their homes in various districts of Telangana and neighbouring Andhra Pradesh.</span></span></p><span data-dcnode-id="530" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="527" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="528" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="529" instrument_node="">‘Haridasus’ and ‘Basvannas’, the uniquely attired alm seekers with ornately decorated oxen, made rounds of the villages. Youths took to kite flying across the state.</span></span></p><span data-dcnode-id="526" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="523" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="524" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="525" instrument_node="">The families, after offering prayers in temples, prepare various dishes, especially Pongal — made of rice and daal. Decoration of bulls, cock-fight, bull fight and other rural sports mark the festival.</span></span></p><span data-dcnode-id="522" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="519" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="520" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="521" instrument_node="">While the Telangana government cancelled the international kite and sweet festival, an annual event, in view of Covid-19, Bharatiya Janata Party (BJP) organised the kite festival at Necklace Road on the banks of Hussain Sagar lake in Hyderabad.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="516" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="517" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="518" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-0a15726830934870a253253009210987-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="513" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="514" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="515" instrument_node="">Union Minister of State for Home G. Kishan Reddy inaugurated the festival. He greeted the people and hoped that Sankranti will usher in happiness and prosperity.</span></span></p><span data-dcnode-id="512" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="509" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="510" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="511" instrument_node="">The BJP leader hoped that Covid vaccination beginning on Saturday will bring an end to the pandemic which gripped the country for nearly a year.</span></span></p><span data-dcnode-id="508" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="505" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="506" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="507" instrument_node="">He said it was matter of pride that out of four vaccines developed in the world, two have come from India and one of the companies in India is based in Hyderabad.</span></span></p><span data-dcnode-id="504" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="501" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="502" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="503" instrument_node="">Kishan Reddy, BJP OBC Morcha national president K. Laxman and other leaders participated in kite flying.</span></span></p><span data-dcnode-id="500" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="497" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="499" instrument_node="">State Governor Tamilisai Soundararajan and Chief Minister K. Chandrasekhar Rao greeted people on Sankranti.</span></span></p><span data-dcnode-id="496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="493" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="494" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="495" instrument_node="">“I wish the Sankranti, which is the festival of harvest, may bring in abundant happiness, prosperity, and health to you all.</span></span></p><span data-dcnode-id="492" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="489" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="490" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="491" instrument_node="">“Makar Sankranti has a great significance in our cultural horizon and is celebrated with lot of gaiety and jubilation. Makar Sankranti is the day when we enter into auspicious phase of time and true to its traditional significance, this year our country is launching the world’s biggest vaccination programme to protect the people from Covid-19,” she added.</span></span></p><span data-dcnode-id="488" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="485" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="487" instrument_node="">The Chief Minister hoped that the state should be prosperous, wealthy and also be blessed with happiness and joy.</span></span></p><span data-dcnode-id="484" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="481" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="483" instrument_node="">He prayed for people to live in peace and happiness. He urged people to celebrate the festival with joy.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="409" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="410" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="411" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="425" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="452" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="453" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="463" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="464" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR
