-Sankranti-celebrated-in-Kerala/answer/Meenu-Vij-13" rel="nofollow" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><span data-dcnode-id="5546" instrument_node="">Answered </span><span data-dcnode-id="5545" instrument_node="">1</span><span data-dcnode-id="5544" instrument_node=""> year </span><span data-dcnode-id="5543" instrument_node="">ago</span></a><span class="q-box" data-dcnode-id="5529" style="box-sizing: border-box;"><span data-dcnode-id="5538"><span data-dcnode-id="5541" instrument_node=""> </span><span data-dcnode-id="5540" instrument_node="">·</span><span data-dcnode-id="5539" instrument_node=""> </span></span><span data-dcnode-id="5537" instrument_node="">Author has </span><span class="q-text qu-bold" data-dcnode-id="5535" style="box-sizing: border-box;"><span data-dcnode-id="5536" instrument_node="">102</span></span><span data-dcnode-id="5534" instrument_node=""> answers</span><span data-dcnode-id="5533" instrument_node=""> and </span><span class="q-text qu-bold" data-dcnode-id="5531" style="box-sizing: border-box;"><span data-dcnode-id="5532" instrument_node="">52.3K</span></span><span data-dcnode-id="5530" instrument_node=""> answer views</span></span></div><div class="q-inline qu-verticalAlign--middle" data-dcnode-id="5527" style="box-sizing: border-box; display: inline;"></div></div></div><div class="q-inlineFlex qu-ml--small qu-alignItems--center" data-dcnode-id="5523" style="box-sizing: border-box; display: inline-flex;"><div class="q-flex" data-dcnode-id="5524" style="box-sizing: border-box; display: flex;"></div></div></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="5502" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit; cursor: initial;" tabindex="-1" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="5503" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5505" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5506"><span class="q-box qu-userSelect--text" data-dcnode-id="5507" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5516" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5517" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5518" instrument_node="">It is known Maghara Valaku in Kerala, and by other names as Pedda Panduga in Andhra Pradesh and Telangana, Makar Sankranti in Karnataka and Maharashtra, Pongal in Tamil Nadu, Magh Bihu in Assam, Magha Mela in parts of central and north India, as Makar Sankranti in the west.</span></span></p><span data-dcnode-id="5515" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5512" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5513" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5514" instrument_node="">Makar Sankranti is celebrated in Kerala at Sabarimala where the Makara Jyothi is visible followed by the Makaravilakku celebrations. Makaravilakku breaks up into Makara (a malayalam month) and villaku (lamp) literally translated means the lamp of the makara month.</span></span></p><span data-dcnode-id="5511" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5508" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5509" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5510" instrument_node="">For centuries, Sabarimala in Pathanamthitta has been a major pilgrim centre in Kerala attracting thousands of devotees from all over India, more so from the southern states. The presiding deity is Lord Ayyappa known as Dharma Sastha, a considered symbol of unity between Vaishnavites and Shaivites.</span></span></p></span></span></div><div data-dcnode-id="5504"></div></div></div></div><div class="q-text qu-dynamicFontSize--small qu-mt--small qu-color--gray_light qu-passColorToLinks" data-dcnode-id="5487" style="box-sizing: border-box;"><span data-dcnode-id="5488"><span class="q-box qu-display--none" data-dcnode-id="5500" style="box-sizing: border-box;"></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 bxBZxD" data-dcnode-id="5497"><span data-dcnode-id="5499" instrument_node="">874</span><span data-dcnode-id="5498" instrument_node=""> views</span></span><span class="q-box qu-display--none" data-dcnode-id="5495" style="box-sizing: border-box;"><span data-dcnode-id="5496" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="5492"><div class="q-click-wrapper qu-display--inline-block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="5493" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><span data-dcnode-id="5494" instrument_node="">View upvotes</span></div></span><span class="q-box qu-display--none" data-dcnode-id="5490" style="box-sizing: border-box;"><span data-dcnode-id="5491" instrument_node=""> · </span></span><span class="CssComponent-sc-1oskqb9-0 AbstractSeparatedItems___StyledCssComponent-sc-46kfvf-0 diCWLm" data-dcnode-id="5489"></span></span></div><div class="q-box de-id="5328" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="5280" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="5300" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="5301" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="5302" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="5303" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="5304" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5325" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5326" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5327" instrument_node="">Originally Makara Sankranthi was harvest festival in greater India right from the Indus civilization period . Harvest festival was renamed as Makara Sankaranthi by the Sanskritists. It refers to the day on which the Sun passes from Sagittarius to Capricornus ,that's transition from south to north .</span></span></p><span data-dcnode-id="5324" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5321" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5322" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5323" instrument_node="">Actually it is a thanks giving day to the Sun in addition to rain ,cattle and good governance of the king .It is known as Pongal festival in Tamil ,continuously celebrated for four days.</span></span></p><span data-dcnode-id="5320" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5317" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5318" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5319" instrument_node="">Harvest of wheat is called Lokri.Punjabies called it Baisaki. Marathies named it Gudi padwa .Assamese named it Bigu</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5305" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5306" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5307" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5308" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5309" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5314" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5315" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5316" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5310" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5311"><svg data-dcnode-id="5312" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5313" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5281" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5282" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5283"><span class="q-box qu-userSelect--text" data-dcnode-id="5284" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5297" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5298" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5299" instrument_node="">Originally Makara Sankranthi was harvest festival in greater India right from the Indus civilization period . Harvest festival was renamed as Makara Sankaranthi by the Sanskritists. It refers to the day on which the Sun passes from Sagittarius to Capricornus ,that's transition from south to north .</span></span></p><span data-dcnode-id="5296" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5293" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5294" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5295" instrument_node="">Actually it is a thanks giving day to the Sun in addition to rain ,cattle and good governance of the king .It is known as Pongal festival in Tamil ,continuously celebrated for four days.</span></span></p><span data-dcnode-id="5292" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5289" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5290" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5291" instrument_node="">Harvest of wheat is called Lokri.Punjabies called it Baisaki. Marathies named it Gudi padwa .Assamese named it Bigu.Orissa people collect bundled sheath of newly harvested paddy ,offer it to God with reverence. This Navuha festival has been spread by them almost in all the south Asian countries. Kerala people observe it as Punnel ( new paddy) festival by offering new paddy in the famous temple of Ayyappa. Coorg people celebrate it as Puttari Namme (new rice offering)</span></span></p><span data-dcnode-id="5288" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5285" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5286" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5287" instrument_node="">Therefore,it is not fair to hide the historical and cultural identity of Pongal Harvest Festival observed throughout India by simply changing the name as Sankaranthi .</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="5203" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="5204" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="5205" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="5219" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="5251" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="5252" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="5262" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="5263" style="box-sizing: border-box; position: relative;"><button aria-label="11 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-d calendar. All other Indian festivals are celebrated as per the lunar calendar, which make their days of celebration on the solar calendar vary every year.</span></span></p><span data-dcnode-id="5029" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5026" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5027" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5028" instrument_node="">The difference is easy to see. In India, we follow a lunar calendar; the moon goes from new moon to new moon or full moon to full moon in 29.5 days. We get 12 full moons in 354 days, making a lunar calendar year 354 days long. However, the Sun retur</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5014" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5015" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5016" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5017" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5018" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5023" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5024" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5025" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5019" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5020"><svg data-dcnode-id="5021" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5022" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4889" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4890" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4891"><span class="q-box qu-userSelect--text" data-dcnode-id="4892" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5006" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5007" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="5008" instrument_node="">Why do we celebrate Makar Sankranti on January 14 every year?</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="5002" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="5003"><div class="q-box unzoomed" data-dcnode-id="5004" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="5005" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-dd56bee2c4e734961fb72965db1e359d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4999" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5000" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5001" instrument_node="">On January 14 every year, we celebrate Makar Sankranti. It is the only Indian festival celebrated on a fixed calendric day of the solar calendar. All other Indian festivals are celebrated as per the lunar calendar, which make their days of celebration on the solar calendar vary every year.</span></span></p><span data-dcnode-id="4998" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4991" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4996" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4997" instrument_node="">The difference is easy to see. In India, we follow a lunar calendar; the moon goes from new moon to new moon or full moon to full moon in 29.5 days. We get 12 full moons in 354 days, making a lunar calendar year 354 days long. However, the Sun returns to the same spot in the sky every 365.25 days. So, there is a difference of 11.25 days between the solar and lunar years. Every 2.5 years, therefore, an intercalary month (the </span></span><span data-dcnode-id="4994" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4995" instrument_node="">Adhik Maas</span></span><span data-dcnode-id="4992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4993" instrument_node="">) is added to the lunar calendar to roughly synchronise the two.</span></span></p><span data-dcnode-id="4990" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4987" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4988" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4989" instrument_node="">This is crucial because weather patterns follow the solar calendar, not the lunar. On the other hand, accurate ‘mahurat’ (or ‘muhurat’) calculations are better done with the relatively faster moving moon. In fact, to make such calculations more accurate, the path of the moon, which is slightly off from the path of the sun, is divided into 27 ‘nakshatras’ while the path of the sun is divided into 12 ‘rashis’.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4984" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4985" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4986" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-e95a981d4fe542bb506f28fbb952bab2-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4981" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4982" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4983" instrument_node="">All this is simple and good. The exact calculations are a bit more complex since the fractions given above are not exact. Moreover, Indian calculations are done with natural numbers rather than fractions, so numbers have to be magnified accordingly.</span></span></p><span data-dcnode-id="4980" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4977" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4978" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4979" instrument_node="">But the problem of Makar Sankranti is unique: it goes entirely by the solar calendar. The clue to this mystery lies in the fact that Makar Sankranti is also called Uttarayan, or the day on which the sun begins its northward journey.</span></span></p><span data-dcnode-id="4976" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4973" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4974" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4975" instrument_node="">The solar calendar itself is fairly rigid (except for the 0.25 at the end of 365 which in reality is 365.256363004 days). So this additional 0.006363004 over 365.25 means that we slightly over compensate when in a leap year we add February 29. To re-correct for it, we don’t have a leap year in the years ending with 00. This gives a reasonably accurate and stable calendar.</span></span></p><span data-dcnode-id="4972" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4969" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4970" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4971" instrument_node="">In this system, the sun enters different zodiacs on a fixed day with an error of one day on either side depending on how close you are to the leap year. In the Indian system, this correction mechanism is more subtle and complex, and involves use of additional days with the same lunar date etc.</span></span></p><span data-dcnode-id="4968" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4965" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4966" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4967" instrument_node="">The path of the sun over one year is divided into ‘rashis’, which are identical to the zodiacs.</span></span></p><span data-dcnode-id="4964" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4961" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4962" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4963" instrument_node="">So around mid-December, the sun rises in the Sagittarius or Dhanush, in January in Capricorn or Makara, and so on.</span></span></p><span data-dcnode-id="4960" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4957" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4958" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4959" instrument_node="">We celebrate January 14 as the day on which the sun begins to rise in the Makara Rashi, Sankranti meaning entering.</span></span></p><span data-dcnode-id="4956" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4953" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4954" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4955" instrument_node="">But then there is an additional problem. The Earth’s axis of rotation moves north-south. So if you look to the sky everyday and note where the sun rises, you will notice that in one year it drifts from north of east to south of east. The same will be true in the west if you track sunset. For the northern hemisphere, the further south the sun is, the less it remains in the sky and the colder it is on earth. This is visible in the image below:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4950" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4951" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4952" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-c1807e6f6412bbf56b385c2eaa15fe92-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4947" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4948" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4949" instrument_node="">So the point at which the sun rises is crucial in deciding the seasons. When the sun starts moving south, the days get colder. In reality, because the Earth can store some heat and its daily motion is relatively small, it takes a few weeks after the sun begins to move south to get colder.</span></span></p><span data-dcnode-id="4946" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4943" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4944" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4945" instrument_node="">Hence, from time immemorial, the days on which the sun touches its northernmost and southernmost points are noted. These are called solstices – winter or summer. In Sanskrit, the journey southwards is called Dakshinayan, and the one northward is called Uttarayan, ‘dakshin’ and ‘uttar’ being south and north respectively.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4940" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4941" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4942" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-3c17e3f5aa12cdb205b204721ede2ae5-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4937" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4938" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4939" instrument_node="">Now the question is how to map this directional movement of the sun with its movement in the zodiac. In principle it is easy. We know the winter solstice falls on December 21, and hence Uttarayan begins on that day, while the summer solstice falls on June 21, when Dakshinayan begins.</span></span></p><span data-dcnode-id="4936" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4933" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4934" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4935" instrument_node="">So, why do we celebrate Uttarayan on Makar Sankranti, when, as you must have realised, it should be celebrated on Dhanu Sankranti? This is where history comes in.</span></span></p><span data-dcnode-id="4932" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4929" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4930" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4931" instrument_node="">While the exact day on which the winter or summer solstice occurs remains steady (within one day error), there is a slight change in the way the Earth’s rotation axis is aligned to the sun, as can be seen from the figure below:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4926" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4927" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4928" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b00e3a2892f5a203a4ab1e9cb71431cd-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4923" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4924" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4925" instrument_node="">Hence, over a period of a few hundred years, this drift means that even though the sun begins its Uttarayan on December 21, it is not in the Makara rashi as it was about 1,500 years ago. So, 1,500 years ago, during the time of Aryabhata, the Uttarayan and Makar Sankranti coincided. Now Makar Sankranti comes on January 14, but Uttarayan happens on Dhanu Sankranti!</span></span></p><span data-dcnode-id="4922" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4917" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4920" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4921" instrument_node="">So what should we celebrate? Well, if you want to celebrate Uttarayan, do it on December 21, but if you want to celebrate Makar Sankranti, January 14 is about right</span></span><span data-dcnode-id="4918" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4919" instrument_node="">. Incidentally, it also means that winter, which is at its peak in January and February, used to be at its peak in February and March at the time of Aryabhata. Also, the Dhruva Tara was about 5o off from the exact pole, close enough to be called stationary, but still, to a discerning eye, it would have wobbled a little.</span></span></p><span data-dcnode-id="4916" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4904" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4914" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4915" instrument_node="">Credit : </span></span><span class="q-inline" data-dcnode-id="4907" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//google.co.in/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="google.co.in"><span data-dcnode-id="4913" instrument_node="">Google</span></a><span class="q-inlineBlock" data-dcnode-id="4908" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4909"><svg data-dcnode-id="4910" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4911" fil ome build bonfires, some make sweets, some go to the Ganges and some feed the cattles.</span></span></p><span data-dcnode-id="4681" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4678" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4679" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4680" instrument_node="">Sankranti, Bhuya Tribes Of Orissa</span></span></p><span data-dcnode-id="4677" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4674" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4675" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4676" instrument_node="">Sankranti is observed largely in Odisha by both Anarya and Arya, i.e., by Adivasi (Tribal caste) and general. In the districts of Mayurbhanj, Sundargarh and Keonjhar where the tribal community make up for more than forty per cent of its population; the festivity is celebrated with great zeal and merriment. They dance and sing, and relish life for about a week. The Bhuya (tribes) families of Odisha have their Maghyatra in which miniature home-made items are put up for sale.</span></span></p><span data-dcnode-id="4673" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4670" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4671" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4672" instrument_node="">Dhanu-Maun(prounanced as mua) is the traditional food.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4666" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4667"><div class="q-box unzoomed" data-dcnode-id="4668" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4669" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-383c36313a150c2688d4da615814d159-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4663" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4664" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4665" instrument_node="">Along with that non tribal people of odisha celebrate this festival by with great enthusiasm. They eat dishes made up of sesame seed (til) .</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4659" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4660"><div class="q-box unzoomed" data-dcnode-id="4661" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4662" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-5a1c5990c1771c8d092a738dfd90f070-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4656" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4657" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4658" instrument_node="">Rashi(til) Kheer</span></span></p><span data-dcnode-id="4655" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4652" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4653" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4654" instrument_node="">Lohri and Maghi, Punjab</span></span></p><span data-dcnode-id="4651" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4648" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4649" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4650" instrument_node="">Lohri is observed to denote the last of the coolest days of winter. Besides Punjab, people from other Northern Indian states ( Haryana, Delhi, Himachal Pradesh, and Jammu ) become busy making preparations for the festival.</span></span></p><span data-dcnode-id="4647" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4640" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4645" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4646" instrument_node="">Traditional Food</span></span><span data-dcnode-id="4643" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4644" instrument_node="">:</span></span><span data-dcnode-id="4641" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4642" instrument_node=""> Gajak and Rewri</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4637" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4638" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4639" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-2fa7622a039b3989028b125706ed6816-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4634" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4635" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4636" instrument_node="">Makar Sankranti, Andhra Pradesh</span></span></p><span data-dcnode-id="4633" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4630" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4631" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4632" instrument_node="">In Andhra Pradesh, Makar Sankranti is a four-day affair. The first day is Bhogi which involves the burning of old things in a bonfire and singing and dancing around it. On this auspicious day, people wear new fashionable clothes, decorate the house, paint rangolis and prepare Pongal; made of rice, milk, and jaggery. Cattles are honoured and worshipped for their offering towards the produce.</span></span></p><span data-dcnode-id="4629" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4622" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4627" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4628" instrument_node="">Traditional Food</span></span><span data-dcnode-id="4625" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4626" instrument_node="">:</span></span><span data-dcnode-id="4623" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4624" instrument_node=""> Ariselu</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4619" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4620" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4621" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-80bcd9b7c0e0350a2eedf0c38c291ee6-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4616" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4617" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4618" instrument_node="">Sakraat, Uttar Pradesh</span></span></p><span data-dcnode-id="4615" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4612" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4613" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4614" instrument_node="">In the state of Uttar Pradesh, Hindu adherents dip in the holy Ganges on this auspicious day. A big carnival is organised in Allahabad called Magha Mela. Devotees firstly take bathe during the daybreak and then savour sweets such as Gud Laddo (known as Tillava in Bhojpuri) and Til Ladoo. In addition to that, Kite flying is one of the most partaken activity during the festival in Uttar Pradesh.</span></span></p><span data-dcnode-id="4611" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4604" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4609" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4610" instrument_node="">Traditional Food</span></span><span data-dcnode-id="4607" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4608" instrument_node="">:</span></span><span data-dcnode-id="4605" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4606" instrument_node=""> Til Laddoot and Gud Laddoo</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4601" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4602" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4603" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-06f57e106faea98e62dfbdedb78a2d18-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4598" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4599" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4600" instrument_node="">Uttarayan, Gujarat</span></span></p><span data-dcnode-id="4597" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4594" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4595" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4596" instrument_node="">Gujarat, one of the significant states in India, and is an excellent place to be in during Uttarayan or Sankranti. Every city in Gujurat is a kaleidoscope of energy; from markets that sell multicoloured kites, the colourful Manjha (the thread tied to the kites), hovering lights to food stalls peddling delicacies.</span></span></p><span data-dcnode-id="4593" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4586" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4591" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4592" instrument_node="">Traditional Food</span></span><span data-dcnode-id="4589" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4590" instrument_node="">:</span></span><span data-dcnode-id="4587" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4588" instrument_node=""> Undhiyu.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4583" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4584" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4585" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-d4c6ba6d25a63b4ef68cc98052fb38b7-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4580" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4581" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4582" instrument_node="">Makara Sankranti, Maharashtra</span></span></p><span data-dcnode-id="4579" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4576" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4577" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4578" instrument_node="">Similar to other South Indian states, in Maharashtra too, people go to each other's homes to distribute sweets and traditional food such as Tilgul (made of sugar granules, sesame seeds and jaggery). Moreover, on this auspicious day, women dress up in black sarees and use sugar granules as ornaments.</span></span></p><span data-dcnode-id="4575" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4572" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4573" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4574" instrument_node="">Traditional Food: Tilgul, Gulachi Poli</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4569" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4570" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4571" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-ea4bcecf675c231c382f92430c8fee38-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4566" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4567" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4568" instrument_node="">Magha Saaji, Himachal Pradesh</span></span></p><span data-dcnode-id="4565" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4562" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4563" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4564" instrument_node="">In Himachal Pradesh, Sankranti or Magha Saaji is commemorated as a new beginning to the harvest season. People celebrate Magha Saaji with much pomp and grandeur.</span></span></p><span data-dcnode-id="4561" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4554" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4559" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4560" instrument_node="">Traditional Food</span></span><span data-dcnode-id="4557" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4558" instrument_node="">:</span></span><span data-dcnode-id="4555" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4556" instrument_node=""> Khichdi with Ghee &amp; Chaas</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4550" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4551"><div class="q-box unzoomed" data-dcnode-id="4552" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-37a0517b7467b9ec84e3eb17c51236ab-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4547" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4548" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4549" instrument_node="">Pongal, Tamil Nadu</span></span></p><span data-dcnode-id="4546" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4543" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4544" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4545" instrument_node="">The practice includes making of unusual and striking rangolis and serving of traditional delicacy, Sakkarai Pongal; rice in mud pots and jaggery. The house is cleaned and decorated, and mango leaves are dangled at the main door to revere the festivity. Moreover, there are unique poojas to appreciate the role of cattle during the reaping season.</span></span></p><span data-dcnode-id="4542" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4539" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4540" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4541" instrument_node="">Traditional Food: Murukku, Payasam</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4536" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4537" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4538" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-4a6d7f096aa63c8c995f1bb95e5242e5-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4533" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4534" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4535" instrument_node="">Bhogali Bihu or Magh Bihu, Assam</span></span></p><span data-dcnode-id="4532" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4529" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4530" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4531" instrument_node="">Celebrated in honour of mother earth for providing food and crops, Bihu marks the beginning of the new harvest season. Traditional dance and campfires mark the holiday. Ceremonies also feature popular Assamese games such as buffalo fighting and Tekeli Bhonga.</span></span></p><span data-dcnode-id="4528" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4523" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4526" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4527" instrument_node="">Traditional Food: </span></span><span data-dcnode-id="4524" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4525" instrument_node="">Til Pitha and Laru</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4520" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4521" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4522" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-a76e2853319e76ac8c5c7e4f9b0e82fd-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4517" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4518" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4519" instrument_node="">Laru :)</span></span></p><span data-dcnode-id="4516" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4513" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4514" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4515" instrument_node="">Makara Sankramana, Karnataka</span></span></p><span data-dcnode-id="4512" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4509" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4510" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4511" instrument_node="">Sankranti or Makara Sankramana is an important festival for farmers of Karnataka. Makara Sankramana involves honouring the gods for a good yield, wearing brand new clothes, and painting new rangolis. The highlight is the mixture of Ellu-Bella; it is a mish-mash of jaggery, fried groundnut, dry coconut, and white sesame, which is distributed among the next-door-neighbour. Along with this, women also share bananas, pieces of sugarcane, Haldi and Kum Kum. Traditional prayers are offered to cows, and then they are taken on a celebratory march.</span></span></p><span data-dcnode-id="4508" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4501" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4506" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4507" instrument_node="">Traditional Food</span></span><span data-dcnode-id="4504" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4505" instrument_node="">:</span></span><span data-dcnode-id="4502" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4503" instrument_node=""> Ellu Bella</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4497" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4498"><div class="q-box unzoomed" data-dcn
