</span><span data-dcnode-id="1111"><span data-dcnode-id="1112"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnataka.com/"><span data-dcnode-id="1121" instrument_node="">Home</span></a><span data-dcnode-id="1119" instrument_node=""> » </span><span data-dcnode-id="1113"><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnataka.com/festivals/"><span data-dcnode-id="1118" instrument_node="">Festivals</span></a><span data-dcnode-id="1116" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Festivals of Karnataka- The A to Z</span></span></span></span></span></div><span data-dcnode-id="1109" instrument_node=""> </span><article aria-label="Festivals of Karnataka- The A to Z" class="post-92 post type-post status-publish format-standard has-post-thumbnail category-festivals tag-festivals-of-karnataka entry" data-dcnode-id="779"><header class="entry-header" data-dcnode-id="1096"><h1 class="entry-title" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Festivals of Karnataka- The A to Z</span></h1><span data-dcnode-id="1106" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="1097"><time class="entry-time" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">March 15, 2017</span></time><span data-dcnode-id="1103" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="1099"><a class="entry-author-link" data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnataka.com/author/raggi/" rel="author"><span class="entry-author-name" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Raggi Mudde</span></span></a></span><span data-dcnode-id="1098" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="813"><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Karnataka is a vibrant state famous for its grand festivals.&nbsp; Many festivals of Karnataka are conducted in the name of art, religion, seasons etc. The famous Dussera festival of Mysore to Kambala Buffalo race in Mangalore, the state is full of festivals and fiestas. Karnataka is also known for its heritage and culture; the state has a wide range of celebrations that truly keeps the audience off their feet.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><div class="code-block code-block-11" data-dcnode-id="1088" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1091" instrument_node="">
</span><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Here are few important festivals of Karnataka:</span></p><span data-dcnode-id="1084" instrument_node="">
</span><h3 data-dcnode-id="1081"><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Ganesha Chaturthi</span></strong></h3><span data-dcnode-id="1080" instrument_node="">
</span><div class="wp-block-image size-full wp-image-8041" data-dcnode-id="1069"><figure class="aligncenter" data-dcnode-id="1076"><img alt="Ganesha idol in front of Ulsoor temple, Bangalore" class="wp-image-8041" data-attachment-id="8041" data-comments-opened="1" data-dcnode-id="1079" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Ganesha idol in front of Ulsoor temple, Bangalore" data-large-file="https://www.karnataka.com/wp-content/uploads/2008/09/ganesha-ulsoor-temple.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2008/09/ganesha-ulsoor-temple-300x194.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2008/09/ganesha-ulsoor-temple.jpg" data-orig-size="708,458" data-permalink="https://www.karnataka.com/festivals/ganesha-shlokas/attachment/ganesha-ulsoor-temple/" height="458" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2008/09/ganesha-ulsoor-temple.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2008/09/ganesha-ulsoor-temple.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2008/09/ganesha-ulsoor-temple-231x150.jpg 231w, https://karnataka.b-cdn.net/wp-content/uploads/2008/09/ganesha-ulsoor-temple-300x194.jpg 300w" width="708"><figcaption data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Ganesha idol in front of Ulsoor temple, Bangalore</span></figcaption></figure><div class="code-block code-block-12" data-dcnode-id="1071" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1075" instrument_node="">
</span><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">The months of August-September one can witness hundreds of rath yathras on the streets of Karnataka. The 10-days festival is celebrated from the Shukla Chaturthi that lasts till the Anantha Chaturdashi. The streets will be clad with wax and clay models of Ganesha and people offering their prayers to the idols.</span></p><div class="code-block code-block-3" data-dcnode-id="1056" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1065" instrument_node="">
</span><div data-dcnode-id="1061" id="div-gpt-ad-1641798205821-0"><span data-dcnode-id="1064" instrument_node="">
</span><span data-dcnode-id="1062" instrument_node="">
</span></div><span data-dcnode-id="1060" instrument_node="">
</span><amp-auto-ads data-ad-client="ca-pub-0453400831391596" data-dcnode-id="1058" type="adsense"><span data-dcnode-id="1059" instrument_node="">
</span></amp-auto-ads><span data-dcnode-id="1057" instrument_node="">
</span></div><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">The 10 days are celebrated with great percussions and poojas with hundreds of people witnessing it. The prasadam offered here is the modak.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">The Pooja continues for 9 days till the last of Visarjan which is celebrated with great pomp and mind-blowing percussions and processions. For Visarjan, the Ganapati is taken to a riverside and then immersed into the water.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h3 data-dcnode-id="1046"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Hampi Festival or Vijaya Utsava</span></strong></h3><span data-dcnode-id="1045" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1042"><figure class="aligncenter" data-dcnode-id="1043"><img alt="Hampi Utsav, festivals of Karnataka" class="wp-image-10412" data-attachment-id="10412" data-comments-opened="1" data-dcnode-id="1044" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Hampi Utsav" data-large-file="https://www.karnataka.com/wp-content/uploads/2014/01/hampi-utsav-2.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2014/01/hampi-utsav-2-300x136.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2014/01/hampi-utsav-2.jpg" data-orig-size="708,321" data-permalink="https://www.karnataka.com/hampi/hampi-festival/attachment/hampi-utsav-2/" height="321" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2014/01/hampi-utsav-2.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2014/01/hampi-utsav-2.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2014/01/hampi-utsav-2-300x136.jpg 300w" width="708"></figure></div><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">The festival is celebrated to commemorate the birthday of an ancient poet Purandaradasa. This festival of Karnataka lasts for 3 days. Vijaya Utsava falls in the month of October or November and is celebrated in Hampi as a grand commemoration.</span></p><div class="code-block code-block-1" data-dcnode-id="1032" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1038" instrument_node="">
</span><div data-dcnode-id="1034" id="div-gpt-ad-1641798243894-0" style="min-width: 300px; min-height: 250px;"><span data-dcnode-id="1037" instrument_node="">
</span><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1033" instrument_node="">
</span></div><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Being a poet’s birthday, the festival is more like showcasing the art and talents of the Kannadigas. The festival is usually accompanied by performances by artists showcasing music, dance and art. Hampi being the cultural centre in Karnataka, celebrate these kinds of festivals with great pompous honoring all the artists.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Vijaya Utsava is conducted in the architectural ruins of Hampi on well-decorated stages with the amazing backgrounds of the ruins. The stage hosts multiple shows, with various prominent and upcoming stars.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><h3 data-dcnode-id="1022"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Gowri Festival </span></strong></h3><span data-dcnode-id="1021" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1018"><figure class="aligncenter" data-dcnode-id="1019"><img alt="Gowri idol, Gowri Festival, festival of Karnataka" class="wp-image-8037" data-attachment-id="8037" data-comments-opened="1" data-dcnode-id="1020" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Gowri idol – colored" data-large-file="https://www.karnataka.com/wp-content/uploads/2013/09/gowri-festival-01.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2013/09/gowri-festival-01-300x199.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2013/09/gowri-festival-01.jpg" data-orig-size="708,470" data-permalink="https://www.karnataka.com/festivals/gowri/attachment/gowri-festival-01/" height="470" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2013/09/gowri-festival-01.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2013/09/gowri-festival-01.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2013/09/gowri-festival-01-300x199.jpg 300w" width="708"></figure></div><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">The festival is celebrated to a day before the Ganesh Chaturthi to pay tribute to the Goddess Gowri for her power to bequeath strength and valour on the people. It is widely celebrated all over India. It is believed that Goddess Gowri returns to her home on that day like a married woman, and the next day Lord Ganesha comes to take her back home.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">During the Pooja, Goddess Gowri is offered a bagina which contains kum kum, turmeric, small mirror, comb, bangles, dal, rice, and coconut.</span></p><div class="code-block code-block-5" data-dcnode-id="1005" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1011" instrument_node="">
</span><div data-dcnode-id="1007" id="div-gpt-ad-1641798278881-0"><span data-dcnode-id="1010" instrument_node="">
</span><span data-dcnode-id="1008" instrument_node="">
</span></div><span data-dcnode-id="1006" instrument_node="">
</span></div><span data-dcnode-id="1004" instrument_node="">
</span><h3 data-dcnode-id="1001"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Karaga Festival</span></strong></h3><span data-dcnode-id="1000" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="997"><figure class="aligncenter" data-dcnode-id="998"><img alt="Karaga festival, festival of Karnataka" class="wp-image-12509" data-attachment-id="12509" data-comments-opened="1" data-dcnode-id="999" data-image-caption="<p>Karaga festival in Bangalore. </p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="Karaga festival in Bangalore. Source Wiki" data-large-file="https://www.karnataka.com/wp-content/uploads/2014/04/karaga-wiki.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2014/04/karaga-wiki-300x272.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2014/04/karaga-wiki.jpg" data-orig-size="687,623" data-permalink="https://www.karnataka.com/festivals/karaga-festival/attachment/karaga-wiki/" height="623" loading="lazy" sizes="(max-width: 687px) 100vw, 687px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2014/04/karaga-wiki.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2014/04/karaga-wiki.jpg 687w, https://karnataka.b-cdn.net/wp-content/uploads/2014/04/karaga-wiki-300x272.jpg 300w" width="687"></figure></div><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Karaga is a folk dance performed as a tribute to Draupadi.&nbsp; The ritual is an old festival conducted in Bangalore. The legend says that in the last portion of Mahabharata, Draupadi took the form of Shakti goddess and created soldiers called the veerakumaras to deal with a demon called Tripusara. As Draupadi couldn’t stay for a long time, hence she promised to visit her devotees every first full moon as per the Hindu Calendar.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">During this festival of Karnataka rich meals are served. A Karaga carrier, a male dressed up as female all covered in flowers walk to meet the Veerakumaras in the Holy deity form.&nbsp; The mystery inside the Karaga is still not known, yet the carrier balances it well. At the end of the festival, the Karaga returns to the temple.</span></p><span data-dcnode-id="990" instrument_node="">
</span><h3 data-dcnode-id="987"><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Pattadakal Dance Festival </span></strong></h3><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The Pattadakal festival is conducted to honor the famous temples every year in the month of January. This festival of Karnataka is decked up with the performances of the traditional dancers of the state. Along with these grand celebrations, the craft festival is indeed an attention-grabbing one.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">The Pattadakal village is located around 20 kms from Badami in the state of Karnataka.&nbsp; Pattadakal was the second capital of Chalukyas and has some marvellous constructions. The village is famous for the architectural temples that flaunt the splendid carvings and structures. Most of the temples here are devoted to Lord Shiva. The temples of Virupaksha and Mallikarjuna are located here.</span></p><span data-dcnode-id="980" instrument_node="">
</span><h3 data-dcnode-id="977"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Mahamastakabhisheka at Shravanabelagola</span></strong></h3><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Karnataka is also a state that lets religions diversity. Shravanbelogola is a major Jain centre in Karnataka. The Jain festival Mahamastakabhisheka is celebrating with equal pompous and grandeur in Karnataka. Once in 12 years, the festival takes place with the function of the statue. The statue of Siddha Bahubali is around 17.3736 meters tall.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">At first, the people who come to the festival are sprinkled with blessed holy water and the unction of the statue. Many offerings are given at the statue and the statue is bathed in milk, saffron past, sugarcane juice, sandalwood powder etc. The Jain nuns must climb up the stairs to reach the top of the statue. At the end of the celebration, the statue is showered with flowers from the helicopter.</span></p><span data-dcnode-id="970" instrument_node="">
</span><h3 data-dcnode-id="967"><strong data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Kambala Festival</span></strong></h3><span data-dcnode-id="966" instrument_node="">
</span><div class="wp-block-image size-full wp-image-19723" data-dcnode-id="959"><figure class="aligncenter" data-dcnode-id="960"><img alt="Kambala, festival of Karnataka" class="wp-image-19723" data-attachment-id="19723" data-comments-opened="0" data-dcnode-id="965" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="800px-Kadri_Kambala" data-large-file="https://www.karnataka.com/wp-content/uploads/2017/02/800px-Kadri_Kambala.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2017/02/800px-Kadri_Kambala-300x223.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2017/02/800px-Kadri_Kambala.jpg" data-orig-size="708,526" data-permalink="https://www.karnataka.com/festivals/kambala/attachment/800px-kadri_kambala/" height="526" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2017/02/800px-Kadri_Kambala.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2017/02/800px-Kadri_Kambala.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2017/02/800px-Kadri_Kambala-300x223.jpg 300w" width="708"><figcaption data-dcnode-id="961"><span data-dcnode-id="964" instrument_node="">Kambala. Image courtesy </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AKadri_Kambala.jpg"><span data-dcnode-id="963" instrument_node="">wildxplorer</span></a></figcaption></figure></div><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Splashing the mud and racing across the fields, the roaring buffalos raced by a man are an interesting watch. On the first day of Kambala, a parade is conducted with all the buffalos. The buffalos are pegged against each other before the race. The festival is believed to be conducted in the honor of Lord Kadri Manjunatheshwara to seek blessings for a better harvest. The festival is usually conducted for two days. The sport is majorly conducted by farmers. This local festival of Karnataka is a must watch. Plan your trip to Mangalore during the Kambala race.</span></p><span data-dcnode-id="955" instrument_node="">
</span><h3 data-dcnode-id="952"><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Ugadi</span></strong></h3><span data-dcnode-id="951" instrument_node="">
</span><div class="wp-block-image size-full wp-image-19836" data-dcnode-id="944"><figure class="aligncenter" data-dcnode-id="945"><img alt="Ugadi Pacchadi, festival of Karnataka" class="wp-image-19836" data-attachment-id="19836" data-comments-opened="0" data-dcnode-id="950" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Ugadi_Pacchadi" data-large-file="https://www.karnataka.com/wp-content/uploads/2007/07/Ugadi_Pacchadi.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2007/07/Ugadi_Pacchadi-225x300.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2007/07/Ugadi_Pacchadi.jpg" data-orig-size="708,944" data-permalink="https://www.karnataka.com/festivals/festivals-of-karnataka/attachment/ugadi_pacchadi/" height="944" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2007/07/Ugadi_Pacchadi.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2007/07/Ugadi_Pacchadi.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2007/07/Ugadi_Pacchadi-225x300.jpg 225w" width="708"><figcaption data-dcnode-id="946"><span data-dcnode-id="949" instrument_node="">Ugadi Pacchadi. Image courtesy: </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AUgadi_Pacchadi.jpg"><span data-dcnode-id="948" instrument_node="">PrashuKalyan</span></a></figcaption></figure></div><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">The festival symbolizes New Year for Kannadigas. The term Ugadi means new (uge) beginning (adi) or the beginning of the new age. As it is the New Year, people buy and wear new clothes, deck up houses and streets and welcome the New Year with great joy and prayers.</span></p><span data-dcnode-id="940" instrument_node="">
</span><h3 data-dcnode-id="937"><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Sankranti or Pongal</span></strong></h3><span data-dcnode-id="936" instrument_node="">
</span><div class="wp-block-image size-full wp-image-17866" data-dcnode-id="929"><figure class="aligncenter" data-dcnode-id="930"><img alt="Sweet Pongal. Photographer Babithajcosta" class="wp-image-17866" data-attachment-id="17866" data-comments-opened="0" data-dcnode-id="935" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Sweet Pongal. Photographer Babithajcosta https:\/\/commons.wikimedia.org\/wiki\/File:Sarkarai_Pongal.JPG&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Sweet Pongal. Photographer Babithajcosta" data-large-file="https://www.karnataka.com/wp-content/uploads/2008/02/sweet-pongal-wiki.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2008/02/sweet-pongal-wiki-300x177.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2008/02/sweet-pongal-wiki.jpg" data-orig-size="708,417" data-permalink="https://www.karnataka.com/recipe-and-food/pongal-recipe/attachment/sweet-pongal-wiki/" height="417" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2008/02/sweet-pongal-wiki.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2008/02/sweet-pongal-wiki.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2008/02/sweet-pongal-wiki-300x177.jpg 300w" width="708"><figcaption data-dcnode-id="931"><span data-dcnode-id="934" instrument_node="">Sweet Pongal. Photographer </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASarkarai_Pongal.JPG"><span data-dcnode-id="933" instrument_node="">Babithajcosta</span></a></figcaption></figure></div><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Sankranti is Pongal celebrated in Karnataka in the month of January. On this day, people offer Pooja to cattle and feed them. On this day, a special dish called Pongal is prepared and offered to God. The decorated cattle with powerful costumes and painted horns are then made to jump over a bonfire to commemorate the festival. A cattle procession is also conducted.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">On Makar Sankranti, people enjoy Kite flying. The festival of Makar Sankranti is conducted as a four-day long festival Bhogi festival, Kanu festival and Kanum Pongal festival.</span></p><span data-dcnode-id="922" instrument_node="">
</span><h3 data-dcnode-id="919"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Vairamudi Festival</span></strong></h3><span data-dcnode-id="918" instrument_node="">
</span><div class="wp-block-image size-full wp-image-19837" data-dcnode-id="911"><figure class="aligncenter" data-dcnode-id="912"><img alt="Dollu Kunitha, Festival of Karnataka" class="wp-image-19837" data-attachment-id="19837" data-comments-opened="0" data-dcnode-id="917" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Dollu Kunitha performance at the Fireflies" data-large-file="https://www.karnataka.com/wp-content/uploads/2007/07/Dollu-Kunitha-performance-at-the-Fireflies-.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2007/07/Dollu-Kunitha-performance-at-the-Fireflies--300x200.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2007/07/Dollu-Kunitha-performance-at-the-Fireflies-.jpg" data-orig-size="708,471" data-permalink="https://www.karnataka.com/festivals/festivals-of-karnataka/attachment/dollu-kunitha-performance-at-the-fireflies/" height="471" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2007/07/Dollu-Kunitha-performance-at-the-Fireflies-.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2007/07/Dollu-Kunitha-performance-at-the-Fireflies-.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2007/07/Dollu-Kunitha-performance-at-the-Fireflies--300x200.jpg 300w" width="708"><figcaption data-dcnode-id="913"><span data-dcnode-id="916" instrument_node="">Dollu Kunitha performance. Image courtesy: </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//photo.wn.com/Kannada_Rajyotsava_Cultural_Event_Pruksa_Silvana"><span data-dcnode-id="915" instrument_node="">Kiran Jonnalagadda</span></a></figcaption></figure></div><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">In the temple of Cheluvanarayana located in Melkote, on the third day of Brahmotsavam, the Vairamudi festival is celebrated. On this day, the statue of Cheluvaraswamy is adorned with diamond studded ornaments and crown that are brought from the Mysore Palace. The festival is usually in the month of March-April and is proceeded by a colorful procession.</span></p><span data-dcnode-id="907" instrument_node="">
</span><h3 data-dcnode-id="904"><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Karnataka Rajyotsava</span></strong></h3><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">The day Karnataka state was formed is celebrated with great grandeur by the people of Karnataka on November 1st every year. This festival of Karnataka is celebrated by people with great enthusiasm. Various Kannada language promotional and cultural activities are conducted during the month of November.</span></p><span data-dcnode-id="900" instrument_node="">
</span><h3 data-dcnode-id="897"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Dussera </span></strong></h3><span data-dcnode-id="896" instrument_node="">
</span><div class="wp-block-image size-full wp-image-13693" data-dcnode-id="889"><figure class="aligncenter" data-dcnode-id="890"><img alt="dasara procession dolls. Image source W@yfarer's Club" class="wp-image-13693" data-attachment-id="13693" data-comments-opened="1" data-dcnode-id="895" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="dasara procession dolls. Image source W@yfarer’s Club" data-large-file="https://www.karnataka.com/wp-content/uploads/2014/09/dasara-procession-dolls.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2014/09/dasara-procession-dolls-300x171.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2014/09/dasara-procession-dolls.jpg" data-orig-size="708,405" data-permalink="https://www.karnataka.com/festivals/dasara-dolls-arrangement-ideas/attachment/dasara-procession-dolls/" height="405" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2014/09/dasara-procession-dolls.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2014/09/dasara-procession-dolls.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2014/09/dasara-procession-dolls-300x171.jpg 300w, https://karnataka.b-cdn.net/wp-content/uploads/2014/09/dasara-procession-dolls-332x190.jpg 332w, https://karnataka.b-cdn.net/wp-content/uploads/2014/09/dasara-procession-dolls-700x400.jpg 700w" width="708"><figcaption data-dcnode-id="891"><span data-dcnode-id="894" instrument_node="">Image source </span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wayfarersclub.blogspot.com/2012/10/top-5-unique-dussehra-celebrations.html"><span data-dcnode-id="893" instrument_node="">W@yfarer’s Club</span></a></figcaption></figure></div><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">It is a 10-days long festival of Karnataka that is conducted in the city of Mysore with pomp and glory. The Mysore Palace is all decked up and well lit. The cultural extravaganza is witnessed by thousands of people. The well-lit city all decked up to celebrate the Dussera festival is a must visit one. Dance, bands etc. accompany the processions in the streets. This festival of Karnataka has usually celebrated October. On the day of Ayudha Pooja, everyone offers Pooja to their tools and seek blessing from the Goddess Durga.</span></p><span data-dcnode-id="885" instrument_node="">
</span><h3 data-dcnode-id="882"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Vara Mahalakshmi Pooja</span></strong></h3><span data-dcnode-id="881" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="878"><figure class="aligncenter" data-dcnode-id="879"><img alt="vara mahalakshmi, festival of Karnataka" class="wp-image-7699" data-attachment-id="7699" data-comments-opened="1" data-dcnode-id="880" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;}" data-image-title="vara mahalakshmi" data-large-file="https://www.karnataka.com/wp-content/uploads/2007/07/varamahalakshmi-banner.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2007/07/varamahalakshmi-banner-300x159.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2007/07/varamahalakshmi-banner.jpg" data-orig-size="708,376" data-permalink="https://www.karnataka.com/festivals/festivals-of-karnataka/attachment/varamahalakshmi-banner/" height="376" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2007/07/varamahalakshmi-banner.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2007/07/varamahalakshmi-banner.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2007/07/varamahalakshmi-banner-300x159.jpg 300w" width="708"></figure></div><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">The goddess of wealth Mahalakshmi is worshipped by Kannadigas on this special occasion. To attain health and wealth, the people offer poojas and offerings to Goddess Lakshmi. It is also for the long life of husbands that married women conduct the Pooja. It falls on the Shravanmasa.</span></p><span data-dcnode-id="874" instrument_node="">
