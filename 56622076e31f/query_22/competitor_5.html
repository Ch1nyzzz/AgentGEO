</span></div><span class="marker before-article" data-dcnode-id="906"></span><div class="md-sentinel--spy-target" data-dcnode-id="905"></div><section data-dcnode-id="880" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="887"><strong data-dcnode-id="902"><span data-dcnode-id="904" id="ref235081"></span><span data-dcnode-id="903" instrument_node="">cycling</span></strong><span data-dcnode-id="901" instrument_node="">,  use of a </span><a class="md-crosslink" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/bicycle"><span data-dcnode-id="900" instrument_node="">bicycle</span></a><span data-dcnode-id="898" instrument_node=""> for sport, recreation, or </span><a class="md-crosslink autoxref" data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/transportation-technology"><span data-dcnode-id="897" instrument_node="">transportation</span></a><span data-dcnode-id="895" instrument_node="">. The sport of cycling consists of professional and </span><span data-dcnode-id="894" id="ref708814"></span><a class="md-crosslink" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/amateur-sport"><span data-dcnode-id="893" instrument_node="">amateur races</span></a><span data-dcnode-id="891" instrument_node="">, which are held mostly in continental Europe, the United States, and Asia. The recreational use of the bicycle is </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="889" data-term="widespread" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/widespread"><span data-dcnode-id="890" instrument_node="">widespread</span></a><span data-dcnode-id="888" instrument_node=""> in Europe and the United States. Use of the bicycle as a mode of transportation is particularly important in non-Western nations and in flatter countries, some of which, like the Netherlands, have a widespread system of bicycle paths.</span></p><span class="marker p1" data-dcnode-id="885"></span><span class="marker AM1 am-inline" data-dcnode-id="883"></span><span class="marker MOD1 mod-inline" data-dcnode-id="881"></span></section><span data-dcnode-id="879" instrument_node="">
</span><span class="marker h2" data-dcnode-id="877"></span><div class="md-sentinel--spy-target" data-dcnode-id="876"></div><section data-dcnode-id="781" data-has-spy="true" data-level="1" id="ref1668"><h2 class="h1" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Early history of the sport</span></h2><span data-dcnode-id="872" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="858"><span data-dcnode-id="871" instrument_node="">Cycling as a sport officially began on May 31, 1868, with a 1,200-metre (1,312-yard) race between the fountains and the entrance of Saint-Cloud Park (near Paris). The winner was </span><span data-dcnode-id="870" id="ref701614"></span><span data-dcnode-id="869" instrument_node="">James Moore, an 18-year-old expatriate Englishman from Paris. On November 7, 1869, the first city-to-city race was held between Paris and Rouen; again Moore was the winner, having covered the 135 km (84 miles) in 10 hours 25 minutes, including time spent </span><a class="md-crosslink autoxref" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/walking-recreation"><span data-dcnode-id="868" instrument_node="">walking</span></a><span data-dcnode-id="866" instrument_node=""> his bicycle up the steeper hills. While </span><span data-dcnode-id="865" id="ref235082"></span><a class="md-crosslink" data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/road-race"><span data-dcnode-id="864" instrument_node="">road racing</span></a><span data-dcnode-id="862" instrument_node=""> became common within a few years in continental Europe, in England the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="860" data-term="deteriorated" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/deteriorated"><span data-dcnode-id="861" instrument_node="">deteriorated</span></a><span data-dcnode-id="859" instrument_node=""> conditions of the roads made them unsuitable, and therefore the sport there focused on the track or time trials.</span></p><span class="marker p2" data-dcnode-id="856"></span><span class="marker AM2 am-inline" data-dcnode-id="854"></span><a class="info-module quiz-module p-5 d-block border m-sm-50 mb-30" data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/quiz/quick-quiz-all-about-cycling"><span data-dcnode-id="853" instrument_node="">
</span><div class="wrapper p-30" data-dcnode-id="831"><span data-dcnode-id="852" instrument_node="">
</span><div class="grid" data-dcnode-id="833"><span data-dcnode-id="851" instrument_node="">
</span><div class="col-md-auto col-100 mb-15 mb-sm-0" data-dcnode-id="847"><span data-dcnode-id="850" instrument_node="">
</span><img alt="The peloton, including Thomas Voeckler-Europcar, passing the Col de Val Lauron-Azet during the stage 9 of Le Tour de France on July 7,2013. (cycling, extreme sports)" data-dcnode-id="849" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/38/218438-131-914166E8/Cycling-Stage-9-Tour-de-France-July-7-2013.jpg&amp;raw"><span data-dcnode-id="848" instrument_node="">

</span><div class="label text-black font-13 font-weight-bold text-uppercase" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Britannica Quiz</span></div><span data-dcnode-id="842" instrument_node="">
</span><div class="title font-18 font-weight-bold lh-base mb-5" data-dcnode-id="840" href="/quiz/quick-quiz-all-about-cycling"><span data-dcnode-id="841" instrument_node="">Quick Quiz: All About Cycling</span></div><span data-dcnode-id="839" instrument_node="">
</span><div class="font-14 text-muted lh-base" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">What stimulant did 19th-century cyclists start using to improve their performance? Who was the first non-European to win the Tour de France? Race through this quick quiz to find out how much you really know about cycling. </span></div><span data-dcnode-id="836" instrument_node="">
</span></div><span data-dcnode-id="834" instrument_node="">
</span></div><span data-dcnode-id="832" instrument_node="">
</span></div><span data-dcnode-id="830" instrument_node="">
</span></a><span class="marker MOD2 mod-inline" data-dcnode-id="827"></span><span data-dcnode-id="826" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="807"><span data-dcnode-id="825" instrument_node="">In the </span><span data-dcnode-id="824" id="ref702157"></span><a class="md-crosslink" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/United-States"><span data-dcnode-id="823" instrument_node="">United States</span></a><span data-dcnode-id="821" instrument_node=""> the first recorded race was held on May 24, 1878, in Boston, two years after the start of professional </span><a class="md-crosslink autoxref" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/baseball"><span data-dcnode-id="820" instrument_node="">baseball</span></a><span data-dcnode-id="818" instrument_node=""> and 13 years before </span><a class="md-crosslink autoxref" data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/basketball"><span data-dcnode-id="817" instrument_node="">basketball</span></a><span data-dcnode-id="815" instrument_node=""> was invented. Almost all of the early American racing was on tracks, in long races sometimes employing </span><span data-dcnode-id="814" id="ref235089"></span><span data-dcnode-id="813" instrument_node="">pacers who rode ahead of contestants at a fast speed and then dropped away. By the 1890s there were about 100 dirt, cement, or wooden tracks around the country, mainly in big cities. More than 600 professionals traveled on this national circuit, which ranged from Boston to San Francisco, with competitions in such cities as St. Louis, </span><a class="md-crosslink autoxref" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Salt-Lake-City"><span data-dcnode-id="812" instrument_node="">Salt Lake City</span></a><span data-dcnode-id="810" instrument_node="">, Denver, and Los Angeles. The sport received an enormous publicity boost on June 30, 1899, when one of these riders, </span><span data-dcnode-id="809" id="ref702480"></span><span data-dcnode-id="808" instrument_node="">Charles M. Murphy, rode on a wooden track behind a Long Island Rail Road train and covered a mile in 57.8 seconds, earning the nickname of Mile-a-Minute Murphy.</span></p><span class="marker p3" data-dcnode-id="805"></span><span class="marker AM3 am-inline" data-dcnode-id="803"></span><span class="marker MOD3 mod-inline" data-dcnode-id="801"></span><span data-dcnode-id="800" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="788"><span data-dcnode-id="799" instrument_node="">A particularly grueling form of racing </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="797" data-term="flourished" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/flourished"><span data-dcnode-id="798" instrument_node="">flourished</span></a><span data-dcnode-id="796" instrument_node=""> in the United States in the 1890s: the </span><span data-dcnode-id="795" id="ref235090"></span><a class="md-crosslink" data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/six-day-race"><span data-dcnode-id="794" instrument_node="">six-day race</span></a><span data-dcnode-id="792" instrument_node="">, 142 hours (since the races usually started at midnight and ended, six days later, at 10 </span><span class="text-smallcaps" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">pm</span></span><span data-dcnode-id="789" instrument_node="">) of nonstop competition with prizes up to $10,000 and an international field of riders. This form of racing was transformed with the change from one-man teams to two-man teams in 1899, and six-day races retained their popularity well into the 1930s. While no longer held in the United States, these races continue to attract large crowds in Belgium, Italy, France, and Germany.</span></p><span class="marker p4" data-dcnode-id="786"></span><span class="marker AM4 am-inline" data-dcnode-id="784"></span><span class="marker MOD4 mod-inline" data-dcnode-id="782"></span></section><span data-dcnode-id="780" instrument_node="">
</span><span class="marker h3" data-dcnode-id="778"></span><div class="md-sentinel--spy-target" data-dcnode-id="777"></div><section data-dcnode-id="688" data-has-spy="true" data-level="1" id="ref1669"><h2 class="h1" data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Modern sport racing</span></h2><span data-dcnode-id="773" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="749"><span data-dcnode-id="772" instrument_node="">The development of racing as a popular sport in Europe began in the 1890s with the improvement in road conditions and the introduction of some of the one-day classics that continue to this day (for example, the Paris-Roubaix race). After </span><span data-dcnode-id="771" id="ref702143"></span><a class="md-crosslink" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/France"><span data-dcnode-id="770" instrument_node="">France</span></a><span data-dcnode-id="768" instrument_node=""> and Belgium, races were introduced in </span><span data-dcnode-id="767" id="ref702144"></span><a class="md-crosslink" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Italy"><span data-dcnode-id="766" instrument_node="">Italy</span></a><span data-dcnode-id="764" instrument_node="">, </span><span data-dcnode-id="763" id="ref702147"></span><a class="md-crosslink" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Spain"><span data-dcnode-id="762" instrument_node="">Spain</span></a><span data-dcnode-id="760" instrument_node="">, and the Netherlands. In 1903 the 21-day-long </span><span data-dcnode-id="759" id="ref235092"></span><a class="md-crosslink" data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/Tour-de-France"><span data-dcnode-id="758" instrument_node="">Tour de France</span></a><span data-dcnode-id="756" instrument_node=""> was inaugurated and has continued every year since except during World Wars I and II. Ranking just behind this premier race are the grand three-week tours of Italy (the </span><span data-dcnode-id="755" id="ref702104"></span><span data-dcnode-id="754" instrument_node="">Giro d’Italia) and Spain (the </span><span data-dcnode-id="753" id="ref702107"></span><a class="md-crosslink" data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Vuelta-a-Espana"><span data-dcnode-id="752" instrument_node="">Vuelta a España</span></a><span data-dcnode-id="750" instrument_node="">). Usually, the Giro is held in May and June, the Tour de France in July, the Vuelta in September, and the World Championships in October. Prizes in these races are substantial, amounting to $2.5 million in the Tour de France alone.</span></p><span class="marker p5" data-dcnode-id="747"></span><span class="marker AM5 am-inline" data-dcnode-id="745"></span><span class="marker MOD5 mod-inline" data-dcnode-id="743"></span><span data-dcnode-id="742" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="734"><span data-dcnode-id="741" instrument_node="">European road racing was under the sponsorship of bicycle manufacturers until the late 1920s, when national and regional teams were introduced. Trade </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="739" data-term="sponsors" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/sponsors"><span data-dcnode-id="740" instrument_node="">sponsors</span></a><span data-dcnode-id="738" instrument_node=""> returned after </span><a class="md-crosslink autoxref" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/event/World-War-II"><span data-dcnode-id="737" instrument_node="">World War II</span></a><span data-dcnode-id="735" instrument_node=""> but with the waning of bicycle manufacturers, teams began turning to various sponsors, including automobile manufacturers, insurance companies, and banks. The professional road-racing season now begins in January with races in Australia and Malaysia, continues from February through October in Europe and the United States, and closes, again in Asia, in November and December. For most riders, the season includes about 120 days of competition spread over eight months.</span></p><span class="marker p6" data-dcnode-id="732"></span><span class="marker AM6 am-inline" data-dcnode-id="730"></span><span class="marker MOD6 mod-inline" data-dcnode-id="728"></span><span data-dcnode-id="727" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="718"><span data-dcnode-id="726" instrument_node="">With the waning of six-day races during the Depression in the United States, American interest in cycling began to fade until the 1980s.  American riders dominated the Olympic Games in Los Angeles in 1984, and in 1986 </span><span data-dcnode-id="725" id="ref702109"></span><a class="md-crosslink" data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Greg-LeMond"><span data-dcnode-id="724" instrument_node="">Greg LeMond</span></a><span data-dcnode-id="722" instrument_node=""> won the first of his three Tours de France, rekindling American interest. In England, racing  declined in popularity after the turn of the 20th century, with the advent of the automobile; despite the occasional Briton who makes a career as a professional on the Continent and a </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="720" data-term="sporadic" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/sporadic"><span data-dcnode-id="721" instrument_node="">sporadic</span></a><span data-dcnode-id="719" instrument_node=""> series of races, such as the Milk Race and the Prutour, both now defunct, the sport remains marginal. Hindering the growth of the sport in England is the public clamour that arises whenever a road is closed for a bicycle race. In Asia and Australia, however, there is no such resistance, and the roads are usually lined with spectators for such races as the Tour Down Under in Australia, the Tour of Langkawi in Malaysia, and the Japan Cup. These races attract many professional teams from Europe and the United States. Many other Asian countries have races also, mainly for amateur teams from the region.</span></p><span class="marker p7" data-dcnode-id="716"></span><span class="marker AM7 am-inline" data-dcnode-id="714"></span><span class="marker MOD7 mod-inline" data-dcnode-id="712"></span><span data-dcnode-id="711" instrument_node="">
</span><p class="topic-paragraph" data-dcnode-id="695"><span data-dcnode-id="710" instrument_node="">Road and track races for men were held at the first modern </span><span data-dcnode-id="709" id="ref235096"></span><a class="md-crosslink" data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/Olympic-Games"><span data-dcnode-id="708" instrument_node="">Olympic Games</span></a><span data-dcnode-id="706" instrument_node=""> in 1896; women entered Olympic competition in road races in 1984 and track races in 1988. </span><span data-dcnode-id="705" id="ref702260"></span><a class="md-crosslink" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/mountain-biking"><span data-dcnode-id="704" instrument_node="">Mountain biking</span></a><span data-dcnode-id="702" instrument_node="">, a cross-country race over rough </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="700" data-term="terrain" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/terrain"><span data-dcnode-id="701" instrument_node="">terrain</span></a><span data-dcnode-id="699" instrument_node="">, became an Olympic event for men and women at the 1996 Games in Atlanta. The Atlanta Games also marked the first Olympics at which professionals were allowed to enter the </span><a class="md-crosslink autoxref" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/sports/road-race"><span data-dcnode-id="698" instrument_node="">road race</span></a><span data-dcnode-id="696" instrument_node=""> and time trial competitions.</span></p><span class="marker p8" data-dcnode-id="693"></span><span class="marker AM8 am-inline" data-dcnode-id="691"></span><span class="marker MOD8 mod-inline" data-dcnode-id="689"></span></section><span data-dcnode-id="687" instrument_node="">
</span><span class="marker end-of-content" data-dcnode-id="685"></span><span class="marker after-article" data-dcnode-id="683"></span></div><span data-dcnode-id="681" instrument_node="">
