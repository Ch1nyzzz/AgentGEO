</span></p><span data-dcnode-id="1114" instrument_node="">

Camptown in&nbsp;Pennsylvania, near Foster's hometown, is thought by some to be the inspiration for the song, though the Pennsylvania Historical and Museum Commission cannot say for certain whether there was a racetrack in or near the city or its length. Other sources say that there were horse races from the city to&nbsp;Wyalusing, Pennsylvania, about five miles between each city center. Others believe the song refers to "camp towns," established by transient workers near </span><a data-component="link" data-dcnode-id="800" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/ive-been-working-on-the-railroad-traditional-1322525"><span data-dcnode-id="801" instrument_node="">railroads</span></a><span data-dcnode-id="799" instrument_node="">. Or it could be all of the above.&nbsp;&nbsp;
</span></p><span data-dcnode-id="797" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="786" id="mntl-sc-block_1-0-6"><div class="comp mntl-block" data-dcnode-id="787" id="mntl-block_6-0"><span data-dcnode-id="796" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="784" id="toc-camptown-races-and-the-minstrel-tradition"></span><span data-dcnode-id="783" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="778" id="mntl-sc-block_1-0-7"><span data-dcnode-id="782" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node=""> "Camptown Races" and the Minstrel Tradition </span></span><span data-dcnode-id="779" instrument_node=""> </span></h2><span data-dcnode-id="777" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="775" id="mntl-sc-block_1-0-8"><span data-dcnode-id="776" instrument_node="">
The song reflects an important transition time in American history, as the tune was popular in the decade leading up to the Civil War. Migrant workers were common in this time period, as were their camp towns.&nbsp;Establishment of these camps made it easier for the workers to hop trains as they went from job to job and town to town, and they were often populated by African-Americans.
</span></p><span data-dcnode-id="774" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="763" id="mntl-sc-block_1-0-9"><div class="comp mntl-block" data-dcnode-id="764" id="mntl-block_7-0"><span data-dcnode-id="773" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="760" id="mntl-sc-block_1-0-10"><span data-dcnode-id="761" instrument_node="">
One cannot overlook the comical song's relevance to the minstrel shows that often parodied the African-American population. The original title of the song, "Gwine to Run All Night," referenced the African-American stereotype dialect in which the song was written. The lyrics talk about a group of transients in a camp town who bet on horses to try to make some money. Being that betting on horses was considered immoral, the "Camptown ladies" may also have been shady.
</span></p><span data-dcnode-id="759" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="748" id="mntl-sc-block_1-0-11"><div class="comp mntl-block" data-dcnode-id="749" id="mntl-block_8-0"><span data-dcnode-id="758" instrument_node="">

</span></div></div><span data-dcnode-id="747" instrument_node="">
</span><blockquote class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="736" id="mntl-sc-block_1-0-12"><span data-dcnode-id="746" instrument_node="">
</span><em data-dcnode-id="738"><span data-dcnode-id="745" instrument_node="">"Gwine to run all night,</span><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">Gwine to run all day,</span><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">I bet my money on a bob-tailed nag,</span><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">Somebody bet on the gray."</span></em><span data-dcnode-id="737" instrument_node="">
</span></blockquote><span data-dcnode-id="735" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="734" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="733" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="728" id="mntl-sc-block_1-0-14"><span data-dcnode-id="732" instrument_node="">
The minstrel tradition, which featured performers painting their faces Black to mock African-Americans, is now considered incredibly </span><a data-component="link" data-dcnode-id="730" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/what-is-racism-2834955" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="731" instrument_node="">racist</span></a><span data-dcnode-id="729" instrument_node="">, but this and other songs written during that period have managed to stick around in our national repertory as standards.&nbsp;
</span></p><span data-dcnode-id="727" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="726" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="725" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="724" id="toc-americas-first-composer"></span><span data-dcnode-id="723" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="718" id="mntl-sc-block_1-0-16"><span data-dcnode-id="722" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node=""> America's First Composer </span></span><span data-dcnode-id="719" instrument_node=""> </span></h2><span data-dcnode-id="717" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="710" id="mntl-sc-block_1-0-17"><span data-dcnode-id="716" instrument_node="">
"Camptown Races" was written and first published in 1850 by Foster, who is often called "America's first composer" or "father of American music" and is well-known for many catchy tunes, including "</span><a data-component="link" data-dcnode-id="712" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/oh-susanna-chords-4072018"><span data-dcnode-id="715" instrument_node="">Oh! Susanna</span><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">.</span></em></a><span data-dcnode-id="711" instrument_node="">" Every year before the Kentucky Derby, Foster's "My Old Kentucky Home" is sung with great fervor as well. He wrote about 200 songs, penning the music as well as the lyrics.
</span></p><span data-dcnode-id="709" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="687" id="mntl-sc-block_1-0-20"><span data-dcnode-id="688" instrument_node="">
The first recording of "Camptown Races" was made by Christy's Minstrels. The mid-1850s were a popular time for minstrel shows, and Edwin P. Christy's group was among the best known. Their success stemmed from their relationship with Foster, as they often sang his latest songs.
</span></p><span data-dcnode-id="686" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="674" id="mntl-sc-block_1-0-23"><span data-dcnode-id="675" instrument_node="">
