</span><meta content="Dance is an art form that came into being by purposefully recreating selected sequences of human motion. In dance, lots of symbolism and aesthetic values are involved that are appreciated by observers and performers within the particular culture. Dance can be free from choreography or might involve some traditional moves. Dance can be performed on various functions such as competitive, erotic, social, and martial. Dancing has two distinct forms. One is a theatrical dance in which dancers perform for a specific audience. Second is social dancing in which dancing will be performed in a group to encourage anyone.

Folk dance was invented several centuries back. About the origin of folk dance, very little detail is available. Nobody can even imagine how folk dancing looked like about two thousand years ago. Historians of folk dancing are very much sure that it already existed at that time. Folk dances are traditional and such dances are taught through generations. So due to this reason, the evolution of folk dance takes place slowly. Several cultural groups preserve the tradition of folk dance. In this article, you will find out the history of folk dance, its evolution, and its current importance.&nbsp;
Origins of Folk Dancing
Most of the cultural dances came into being because of a social function. It came into being because of lots of agricultural events and weaving recreation into celebrations. Nowadays most of the groups perform the folk dance on stage. Till the middle of the 20th century, it was not performed on stage for the most part. During the late 1800s and early 1900s, this type of exotic dancing gained popularity in Europe. Different artists from Paris and London performed the folk dance and display their culture on stage. They successfully removed the social aspect of the genre.&nbsp;
As the nature of the folk dance is social, so lots of special costumes were also presented on stage. Not only the costumes were presented, musical rhythms for the cultural dances were also evident. During that time, evidence of slowly evolving cultural tradition and evidence of deep was also seen. Until the last century, there were lots of isolated world regions. Lots of different forms of folk dancing evolved all around the world. 

Folk dancing from Mexico looks very different from that of Mexico. Although the form of folk dancing was different still it all happened under the umbrella of folk dancing.&nbsp; Folk dancing appeared as a social activity so it steeped in tradition instead of cultural innovation.&nbsp;
History of&nbsp;Latin American Folk Dance

Influences of African and European immigrants and from native cultures, this Latin American Folk Dance arises from the outset. Native dances of Brazilians are pure in style but folk dancing we know and see today is a merger of different styling. Mexican dances were influenced greatly by Spanish movement styles and rhythms. Samba was influenced by Africans. Since the 1900s lots of folk dances evolved from this region. These dances were latterly converted into the social dance with a performative goal and at the top of the list is Samba.&nbsp;
History of&nbsp;British Folk Dance

Many forms of dance styles evolved in Great Britain over the years.&nbsp; A good thing about these ancient and traditional dances is these are still part of the modern dance world.&nbsp;
History of&nbsp;Eastern Folk Dance

Lots of different cultural dances have been evolved in the far and middle East. As the region is vast, there is a rich variety of folk dancing. From the Korean Sword Dancing to the Iranian cultural dance there are different forms of folk dancing.&nbsp;
History of Irish Dance

The most modern accomplishment of folk dancing was found in Irish step dancing. Live performances such as River dance make it popular in the 1990s. You will see children wearing a traditional Irish dress and rhythmically producing beat with their feet. It is a perfect example of folk dance, and you will see it in the streets as well.&nbsp;
History of&nbsp;Persian Dance

Iranian and traditional Persian music starts to develop right from the start. It became the basis for lots of movement schools and several musical schools. Early Iranian music can be divided into Cordoba and Baghdad traditions, and both of these developed their distinct dances. Cordoba style moves to Spain and laid a platform for flamenco dancing along with the other traditional dancing.&nbsp;
In different regions of Persia, different dance styles came into being. Regarding the timelines of these dances, no historical record is present. Dancing held in many societies but it is still questionable from where it was originated.&nbsp;
History of Indian Dance
India's ancient dance culture goes back hundreds of years. The UNESCO world heritage site at Bhimbetka rock shelters shows dance scenes from the earliest paleolithic and neolithic cave paintings.
The history of the dance form in India can be traced back to the pre-Vedic period. The people of those times were well versed in the art of dancing, and it was found in a figurine that was found during the excavations at Mohan Jodaro and Harappa.

Fugdi - It is a Goan dance performed in the Konkan region. Performed by women, this dance form is given life during Hindu festivals. The dancers make different formations like circles or rows and go about singing and dancing. The dance begins slowly and gains pace gradually.
Tertali Dance - It is performed by the Kamar tribe of Chhattisgarh. The dance is performed only by women who start by squatting. A musical instrument called ‘Manjira' is tied all over their body – most commonly to their legs and the same is played by the performers throughout the ritual.
Karagattam - It is an ancient folk dance of Tamil Nadu. Karagattam is performed while worshipping the goddess of the rain. Dancers balance huge pots on their heads and dance to the tunes of musicians.
Jhumur - This dance is performed in the states of Assam, Jharkhand, West Bengal, and Odisha. The dance is performed by young girls while men take care of the musical part. The dancers place their arms around the waist of the adjacent dancer and sway to and fro in a synchronized manner.
Chhau - This dance form traces its roots to Odisha, Jharkhand, and West Bengal but it is popular in other parts as well. As masks form an important feature of this dance it is called ‘Chhau', which translates to ‘mask'. The performers wield weapons such as swords and shields while dancing.
Bagurumba - It is performed mainly by the Bodo tribe in Assam. Usually performed by the women, the dance is accompanied by instruments like drums and flutes. Bagurumba dance has a rich history and is believed to be inspired by nature.
Dalkhai - This dance is popular in parts of Odisha. The dance is performed by young women who are later joined by men, playing drums and other instruments. Interestingly, the men address the women as their girlfriends throughout the play.

More about Folk Dance
An adjective folk was added to noun dance to modify its meaning and add certain kinds of styles and features so that it can be distinguished from other dancing styles. The term folk dance has been in use since the late 19th century. A backlash developed folk dance in the middle of the 20th century. Mostly the word folk is avoided because of the attitude it presents. Most of the dance groups in the world have put an objection to the word “Folk”. They think their performance should not be characterized by this term. Some dancing organizations changed the world folk with traditional.
Common Ground
Folk dancing developed in multiple areas all around the world at the same time. Folk dancing from Brazil is totally different from folk dancing in Korea. One thing that is common in all the folk dancing styles is the tradition. Folk dancing represents the culture and tradition from which it is originated. Folk dancing serves as an important social and artistic function for the people of the same region.&nbsp;
Due to the historical viewpoint and to preserve the culture focus is on saving the tradition instead of breaking free from them. Folk dancing offers the opportunity to look back on the dancing history and appreciate the artistry along the way. So, the history of folk dancing is different in different regions. In some regions, it is hard to find out when it was originated because no proper documentation is available. To preserve the culture and tradition folk dancing is the best way to do.&nbsp;" data-dcnode-id="955" property="og:description"><span data-dcnode-id="954" instrument_node="">

</span><div class="grid" data-dcnode-id="248"><span data-dcnode-id="678" instrument_node="">
</span><div class="grid__item medium-up--five-sixths medium-up--push-one-twelfth" data-dcnode-id="250"><span data-dcnode-id="677" instrument_node="">
</span><div class="shopify-section" data-dcnode-id="437" id="shopify-section-article-template"><div class="section-header text-center" data-dcnode-id="666"><span data-dcnode-id="676" instrument_node="">
</span><h1 class="article__title" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">History of Folk Dance</span></h1><span data-dcnode-id="673" instrument_node="">
</span><span class="article__date" data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">
</span><time data-dcnode-id="670" datetime="2021-10-22T08:30:00Z"><span data-dcnode-id="671" instrument_node="">October 22, 2021</span></time><span data-dcnode-id="669" instrument_node="">
</span></span><span data-dcnode-id="667" instrument_node="">
</span></div><span data-dcnode-id="665" instrument_node="">
</span><div class="rte" data-dcnode-id="489"><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" style="font-weight: 400;"><span data-dcnode-id="663" instrument_node="">Dance is an art form that came into being by purposefully recreating selected sequences of human motion. In dance, lots of symbolism and aesthetic values are involved that are appreciated by observers and performers within the particular culture. Dance can be free from choreography or might involve some traditional moves. Dance can be performed on various functions such as competitive, erotic, social, and martial. Dancing has two distinct forms. One is a theatrical dance in which dancers perform for a specific audience. Second is social dancing in which dancing will be performed in a group to encourage anyone.</span></span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" style="font-weight: 400;"><img alt="Folk Dance" data-dcnode-id="659" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0278/5021/1412/files/e24c9cbda79e58ca38607c5367dc-1591171_large.jpg%3Fv%3D1577287557&amp;raw"></span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" style="font-weight: 400;"><span data-dcnode-id="655" instrument_node="">Folk dance was invented several centuries back. About the origin of folk dance, very little detail is available. Nobody can even imagine how folk dancing looked like about two thousand years ago. Historians of folk dancing are very much sure that it already existed at that time. Folk dances are traditional and such dances are taught through generations. So due to this reason, the evolution of folk dance takes place slowly. Several cultural groups preserve the tradition of folk dance. In this article, you will find out the history of folk dance, its evolution, and its current importance.&nbsp;</span></span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="649"><b data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Origins of Folk Dancing</span></b></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="646" style="font-weight: 400;"><span data-dcnode-id="647" instrument_node="">Most of the cultural dances came into being because of a social function. It came into being because of lots of agricultural events and weaving recreation into celebrations. Nowadays most of the groups perform the folk dance on stage. Till the middle of the 20</span></span><span data-dcnode-id="644" style="font-weight: 400;"><span data-dcnode-id="645" instrument_node="">th</span></span><span data-dcnode-id="642" style="font-weight: 400;"><span data-dcnode-id="643" instrument_node=""> century, it was not performed on stage for the most part. During the late 1800s and early 1900s, this type of exotic dancing gained popularity in Europe. Different artists from Paris and London performed the folk dance and display their culture on stage. They successfully removed the social aspect of the genre.&nbsp;</span></span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" style="font-weight: 400;"><span data-dcnode-id="639" instrument_node="">As the nature of the folk dance is social, so lots of special costumes were also presented on stage. Not only the costumes were presented, musical rhythms for the cultural dances were also evident. During that time, evidence of slowly evolving cultural tradition and evidence of deep was also seen. Until the last century, there were lots of isolated world regions. Lots of different forms of folk dancing evolved all around the world. </span></span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" style="font-weight: 400;"><img alt="Mexico Folk Dance" data-dcnode-id="635" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0278/5021/1412/files/4936429115_a798be4457_b_large.jpg%3Fv%3D1577287637&amp;raw"></span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" style="font-weight: 400;"><span data-dcnode-id="631" instrument_node="">Folk dancing from Mexico looks very different from that of Mexico. Although the form of folk dancing was different still it all happened under the umbrella of folk dancing.&nbsp; Folk dancing appeared as a social activity so it steeped in tradition instead of cultural innovation.&nbsp;</span></span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="622"><b data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">History of</span><span data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">&nbsp;</span></span><span data-dcnode-id="624" instrument_node="">Latin American Folk Dance</span></b></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="618"><b data-dcnode-id="619"><img alt="Latin American Folk Dance" data-dcnode-id="620" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0278/5021/1412/files/21381327949_a2a9274ebc_b_large.jpg%3Fv%3D1577287815&amp;raw"></b></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" style="font-weight: 400;"><span data-dcnode-id="616" instrument_node="">Influences of African and European immigrants and from native cultures, this Latin American Folk Dance arises from the outset. Native dances of Brazilians are pure in style but folk dancing we know and see today is a merger of different styling. Mexican dances were influenced greatly by Spanish movement styles and rhythms. Samba was influenced by Africans. Since the 1900s lots of folk dances evolved from this region. These dances were latterly converted into the social dance with a performative goal and at the top of the list is Samba.&nbsp;</span></span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="607"><b data-dcnode-id="608"><span data-dcnode-id="612" instrument_node="">History of</span><span data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">&nbsp;</span></span><span data-dcnode-id="609" instrument_node="">British Folk Dance</span></b></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="603"><b data-dcnode-id="604"><img alt="British Folk Dance" data-dcnode-id="605" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0278/5021/1412/files/Folk_dance_H6140_Tanhuajat_P_large.jpg%3Fv%3D1577287669&amp;raw"></b></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" style="font-weight: 400;"><span data-dcnode-id="601" instrument_node="">Many forms of dance styles evolved in Great Britain over the years.&nbsp; A good thing about these ancient and traditional dances is these are still part of the modern dance world.&nbsp;</span></span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="592"><b data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">History of</span><span data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">&nbsp;</span></span><span data-dcnode-id="594" instrument_node="">Eastern Folk Dance</span></b></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" style="font-weight: 400;"><img alt="Eastern Folk Dance" data-dcnode-id="590" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0278/5021/1412/files/Palestinian_Dabke_large.jpg%3Fv%3D1577287698&amp;raw"></span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" style="font-weight: 400;"><span data-dcnode-id="586" instrument_node="">Lots of different cultural dances have been evolved in the far and middle East. As the region is vast, there is a rich variety of folk dancing. From the Korean Sword Dancing to the Iranian cultural dance there are different forms of folk dancing.&nbsp;</span></span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="580"><b data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">History of Irish Dance</span></b></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" style="font-weight: 400;"><img alt="Irish Dance" data-dcnode-id="578" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0278/5021/1412/files/3276038876_674d16357d_z_large.jpg%3Fv%3D1577287743&amp;raw"></span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" style="font-weight: 400;"><span data-dcnode-id="574" instrument_node="">The most modern accomplishment of folk dancing was found in Irish step dancing. Live performances such as River dance make it popular in the 1990s. You will see children wearing a traditional Irish dress and rhythmically producing beat with their feet. It is a perfect example of folk dance, and you will see it in the streets as well.&nbsp;</span></span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="565"><b data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">History of</span><span data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">&nbsp;</span></span><span data-dcnode-id="567" instrument_node="">Persian Dance</span></b></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="561"><b data-dcnode-id="562"><img alt="Persian Dance" data-dcnode-id="563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0278/5021/1412/files/6036385009_a68c092885_z_large.jpg%3Fv%3D1577287772&amp;raw"></b></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" style="font-weight: 400;"><span data-dcnode-id="559" instrument_node="">Iranian and traditional Persian music starts to develop right from the start. It became the basis for lots of movement schools and several musical schools. Early Iranian music can be divided into Cordoba and Baghdad traditions, and both of these developed their distinct dances. Cordoba style moves to Spain and laid a platform for flamenco dancing along with the other traditional dancing.&nbsp;</span></span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" style="font-weight: 400;"><span data-dcnode-id="555" instrument_node="">In different regions of Persia, different dance styles came into being. Regarding the timelines of these dances, no historical record is present. Dancing held in many societies but it is still questionable from where it was originated.&nbsp;</span></span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="549"><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">History of Indian Dance</span></strong></p><span data-dcnode-id="548" instrument_node="">
</span><p class="" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">India's ancient dance culture goes back hundreds of years. The UNESCO world heritage site at Bhimbetka rock shelters shows dance scenes from the earliest paleolithic and neolithic cave paintings.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p class="" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The history of the dance form in India can be traced back to the pre-Vedic period. The people of those times were well versed in the art of dancing, and it was found in a figurine that was found during the excavations at Mohan Jodaro and Harappa.</span></p><span data-dcnode-id="542" instrument_node="">
</span><ul data-dcnode-id="519"><span data-dcnode-id="541" instrument_node="">
</span><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Fugdi - It is a Goan dance performed in the Konkan region. Performed by women, this dance form is given life during Hindu festivals. The dancers make different formations like circles or rows and go about singing and dancing. The dance begins slowly and gains pace gradually.</span></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Tertali Dance - It is performed by the Kamar tribe of Chhattisgarh. The dance is performed only by women who start by squatting. A musical instrument called ‘Manjira' is tied all over their body – most commonly to their legs and the same is played by the performers throughout the ritual.</span></li><span data-dcnode-id="535" instrument_node="">
</span><li data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Karagattam - It is an ancient folk dance of Tamil Nadu. Karagattam is performed while worshipping the goddess of the rain. Dancers balance huge pots on their heads and dance to the tunes of musicians.</span></li><span data-dcnode-id="532" instrument_node="">
</span><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Jhumur - This dance is performed in the states of Assam, Jharkhand, West Bengal, and Odisha. The dance is performed by young girls while men take care of the musical part. The dancers place their arms around the waist of the adjacent dancer and sway to and fro in a synchronized manner.</span></li><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Chhau - This dance form traces its roots to Odisha, Jharkhand, and West Bengal but it is popular in other parts as well. As masks form an important feature of this dance it is called ‘Chhau', which translates to ‘mask'. The performers wield weapons such as swords and shields while dancing.</span></li><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Bagurumba - It is performed mainly by the Bodo tribe in Assam. Usually performed by the women, the dance is accompanied by instruments like drums and flutes. Bagurumba dance has a rich history and is believed to be inspired by nature.</span></li><span data-dcnode-id="523" instrument_node="">
</span><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Dalkhai - This dance is popular in parts of Odisha. The dance is performed by young women who are later joined by men, playing drums and other instruments. Interestingly, the men address the women as their girlfriends throughout the play.</span></li><span data-dcnode-id="520" instrument_node="">
</span></ul><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="515"><b data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">More about Folk Dance</span></b></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="512" style="font-weight: 400;"><span data-dcnode-id="513" instrument_node="">An adjective folk was added to noun dance to modify its meaning and add certain kinds of styles and features so that it can be distinguished from other dancing styles. The term folk dance has been in use since the late 19</span></span><span data-dcnode-id="510" style="font-weight: 400;"><span data-dcnode-id="511" instrument_node="">th</span></span><span data-dcnode-id="508" style="font-weight: 400;"><span data-dcnode-id="509" instrument_node=""> century. A backlash developed folk dance in the middle of the 20</span></span><span data-dcnode-id="506" style="font-weight: 400;"><span data-dcnode-id="507" instrument_node="">th</span></span><span data-dcnode-id="504" style="font-weight: 400;"><span data-dcnode-id="505" instrument_node=""> century. Mostly the word folk is avoided because of the attitude it presents. Most of the dance groups in the world have put an objection to the word “Folk”. They think their performance should not be characterized by this term. Some dancing organizations changed the world folk with traditional.</span></span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="499"><b data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Common Ground</span></b></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" style="font-weight: 400;"><span data-dcnode-id="497" instrument_node="">Folk dancing developed in multiple areas all around the world at the same time. Folk dancing from Brazil is totally different from folk dancing in Korea. One thing that is common in all the folk dancing styles is the tradition. Folk dancing represents the culture and tradition from which it is originated. Folk dancing serves as an important social and artistic function for the people of the same region.&nbsp;</span></span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" style="font-weight: 400;"><span data-dcnode-id="493" instrument_node="">Due to the historical viewpoint and to preserve the culture focus is on saving the tradition instead of breaking free from them. Folk dancing offers the opportunity to look back on the dancing history and appreciate the artistry along the way. So, the history of folk dancing is different in different regions. In some regions, it is hard to find out when it was originated because no proper documentation is available. To preserve the culture and tradition folk dancing is the best way to do.&nbsp;</span></span></p><span data-dcnode-id="490" instrument_node="">
</span></div><span data-dcnode-id="488" instrument_node="">
