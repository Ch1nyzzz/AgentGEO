</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="815" id="mntl-sc-block_1-0"><span data-dcnode-id="816" instrument_node="">
You know the song and you know it well, yet it may surprise you that "This Little Light of Mine" was not a slave spiritual before it was popularized during the Civil Rights movement of the 1960s. The real story for this American folk music classic begins with a Michigan music minister who penned over 1500 gospel songs and 3000 tunes in his career.
</span></p><span data-dcnode-id="814" instrument_node="">

The song is actually attributed to Harry Dixon&nbsp;Loes. He was gospel songwriter and music director from Michigan who worked at the Moody Bible Institute. Loes wrote the song for children in the 20s. Though Dixon was a white man from the North, the song is often attributed (even in hymnals) as an "African-American spiritual." This is understandable&nbsp;because it sounds similar to other Southern spirituals of the time.
</span></p><span data-dcnode-id="776" instrument_node="">
