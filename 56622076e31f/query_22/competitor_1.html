</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1405" id="mntl-sc-block_1-0"><span data-dcnode-id="1409" instrument_node="">
The folk revival of the 1960s is often the starting point of fascination with the style for many contemporary folk fans. One big effect of the '60s folk revival—thanks in no small part to </span><a data-component="link" data-dcnode-id="1407" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/joan-baezs-best-songs-1321773"><span data-dcnode-id="1408" instrument_node="">Bob Dylan</span></a><span data-dcnode-id="1406" instrument_node="">—was that it marked the beginning of folk singers, on a large scale, writing their own material. Many traditionalists believe that this diluted the very definition of folk music, while revivalists look at it as just another turn in the evolution of the genre.
</span></p><span data-dcnode-id="1404" instrument_node="">

Another result of the folk revival was the proliferation of bluegrass music and the popularization of old-timey music. In a lot of ways, there were two schools during the folk revival: the singer/songwriters who wrote their own words to traditional melodies and, in some cases, began writing entirely new melodies; and the old-timers, who simply stuck to traditional songs and styles, popularizing the music of Appalachia, </span><a data-component="link" data-dcnode-id="1389" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/zydeco-music-basics-3553001"><span data-dcnode-id="1390" instrument_node="">Cajun music</span></a><span data-dcnode-id="1388" instrument_node="">, and other traditional styles.
</span></p><span data-dcnode-id="1386" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1385" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1384" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1383" id="toc-how-and-why-did-the-folk-revival-happen"></span><span data-dcnode-id="1382" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1377" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1381" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node=""> How and Why Did the Folk Revival Happen? </span></span><span data-dcnode-id="1378" instrument_node=""> </span></h2><span data-dcnode-id="1376" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1374" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1375" instrument_node="">
There were a lot of things that conspired to influence the folk music revival of the 1960s, but three major influences can be highlighted.
</span></p><span data-dcnode-id="1373" instrument_node="">

</span><div class="rail-video__title" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">A Brief History of the 1970s</span></div><span data-dcnode-id="862" instrument_node="">
</span></div><span data-dcnode-id="860" instrument_node="">
</span></div><span data-dcnode-id="858" instrument_node="">
</span></div></div><span data-dcnode-id="855" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="850" id="mntl-sc-block_1-0-7"><span data-dcnode-id="854" instrument_node="">
</span><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">1. The Folklorists</span></strong><span data-dcnode-id="851" instrument_node="">: During the early 20th Century, folklorists headed out across the country in hopes of documenting the musical styles traditional to various communities. John Lomax, for example, focused on documenting cowboy songs and the music of the African-American community (i.e. field recordings and prison recordings). The songs these folks collected—as documents and recordings—were a big part of the inspiration for the '60s revival.
</span></p><span data-dcnode-id="849" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="838" id="mntl-sc-block_1-0-8"><div class="comp mntl-block" data-dcnode-id="839" id="mntl-block_6-0"><span data-dcnode-id="848" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="841" id="mntl-native_2-0" style="--native-ad-height: auto"><span data-dcnode-id="847" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad scads-ad-placed" data-dcnode-id="843" id="mntl-native__adunit_2-0"><span data-dcnode-id="846" instrument_node="">
</span><div class="wrapper" data-dcnode-id="845" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="844" instrument_node="">
</span></div><span data-dcnode-id="842" instrument_node="">
</span></div><span data-dcnode-id="840" instrument_node="">
</span></div></div><span data-dcnode-id="837" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="829" id="mntl-sc-block_1-0-9"><span data-dcnode-id="836" instrument_node="">
</span><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">2. The Anthology</span></strong><span data-dcnode-id="833" instrument_node="">: Second was the anthology, compiled by filmmaker and record collector Harry Smith (the folklorists of the early 20th century are also to thank for many of the records on Smith's </span><em data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Anthology</span></em><span data-dcnode-id="830" instrument_node="">). This compilation featured artists ranging in style from banjo player Charlie Poole to the music of the Carter Family, folk-blues field recordings, and beyond. It gave budding folksingers a one-stop resource that exposed them to styles of music indigenous to communities they may never visit. Suddenly, musicians in Chicago could hear the music of Mississippi, for example.
</span></p><span data-dcnode-id="828" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="827" id="mntl-sc-block_1-0-10"></div><span data-dcnode-id="826" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="818" id="mntl-sc-block_1-0-11"><span data-dcnode-id="825" instrument_node="">
</span><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">3. Pete Seeger and Woody Guthrie</span></strong><span data-dcnode-id="822" instrument_node="">: Finally, was the work of Pete Seeger and </span><a data-component="link" data-dcnode-id="820" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/the-guthrie-family-tree-1322857"><span data-dcnode-id="821" instrument_node="">Woody Guthrie</span></a><span data-dcnode-id="819" instrument_node="">, and the groups with which they performed during the '40s and '50s. The Almanac Singers and the groups they spun off into were a huge influence on the emergence of topical songwriting during the turbulent 1960s.
</span></p><span data-dcnode-id="817" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="736" id="mntl-sc-block_1-0-23"><span data-dcnode-id="740" instrument_node="">
It can be argued that folk-rock started with </span><a data-component="link" data-dcnode-id="738" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/the-weavers-1321802"><span data-dcnode-id="739" instrument_node="">the Weavers</span></a><span data-dcnode-id="737" instrument_node="">, who started the folk-pop movement. Eventually, the advent of folk-pop, and the influence (and popularity) of rock bands like the Beatles, helped inspire folk revivalists to experiment with folk-rock.
</span></p><span data-dcnode-id="735" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="724" id="mntl-sc-block_1-0-24"><div class="comp mntl-block" data-dcnode-id="725" id="mntl-block_9-0"><span data-dcnode-id="734" instrument_node="">

</span><div class="wrapper" data-auction-floor-id="0abbfc8e83044f309e841dd290031025" data-auction-floor-value="105" data-dcnode-id="731" data-pos="btf4" data-priority="7" data-rtb="true" data-sizes="[[300, 250],[300, 254],[250, 250],[200, 200],[180, 150],[6, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard5"></div><span data-dcnode-id="730" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="718" id="mntl-sc-block_1-0-25"><span data-dcnode-id="722" instrument_node="">
However, it can also be argued that it all began when Bob Dylan went electric at the Newport Folk Festival in 1965. While many other artists had hit the Newport stage with electric instruments, it was that Dylan went electric, that was so controversial. Many fans will never forgive him, and many of them booed throughout that performance (and booed during the concerts that followed, as Dylan traveled on tour). However, history has shown that as a defining moment in the evolution of </span><a data-component="link" data-dcnode-id="720" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/folk-rock-101-1322485"><span data-dcnode-id="721" instrument_node="">folk-rock music</span></a><span data-dcnode-id="719" instrument_node="">.
</span></p><span data-dcnode-id="717" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="716" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="715" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="714" id="toc-what-about-the-60s-protest-song-movement"></span><span data-dcnode-id="713" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="708" id="mntl-sc-block_1-0-27"><span data-dcnode-id="712" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node=""> What About the '60s Protest Song Movement? </span></span><span data-dcnode-id="709" instrument_node=""> </span></h2><span data-dcnode-id="707" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="705" id="mntl-sc-block_1-0-28"><span data-dcnode-id="706" instrument_node="">
The 1960s were a turbulent time in American history. The Civil Rights Movement, which had been stewing for some time, came to a head. The Cold War was at its height. The United States was going from a turbulent war in Korea to another in Vietnam. And, with the baby boom generation coming of age, there was a lot of change in the air.
</span></p><span data-dcnode-id="704" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="693" id="mntl-sc-block_1-0-29"><div class="comp mntl-block" data-dcnode-id="694" id="mntl-block_10-0"><span data-dcnode-id="703" instrument_node="">

</span></p><span data-dcnode-id="672" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="671" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="670" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="668" id="mntl-sc-block_1-0-38"><span data-dcnode-id="669" instrument_node="">
However, folksingers didn't just sing the topical songs, they also joined the activists. It can be argued that the peace movement of the 1960s, and that of Civil Rights, may not have been so organized without the voluminous soundtrack of folk and topical rock music.
</span></p><span data-dcnode-id="667" instrument_node="">

Hardly. Some people only think of folk music in the context of the 1960s, but, hopefully, the information on this Web site will convince them otherwise. American folk music has spanned the entire history of the country, although its popularity does fluctuate (as does the popularity of pretty much everything).
</span></p><span data-dcnode-id="644" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="643" id="mntl-sc-block_1-0-42"></div><span data-dcnode-id="642" instrument_node="">
