ent_node=""> </span><section data-dcnode-id="186" id="main_content"><span data-dcnode-id="1051" instrument_node=""> </span><div class="blog_post_preview format-standard-image" data-dcnode-id="371"><span data-dcnode-id="1050" instrument_node=""> </span><div class="single_meta post-18396 post type-post status-publish format-standard has-post-thumbnail hentry category-spanish-resources-recommendations tag-curated-list" data-dcnode-id="373"><span data-dcnode-id="1049" instrument_node=""> </span><div class="item_wrapper" data-dcnode-id="375"><span data-dcnode-id="1048" instrument_node=""> </span><div class="blog_content" data-dcnode-id="377"><span data-dcnode-id="1047" instrument_node=""> </span><div class="blog_post_media" data-dcnode-id="1045"><img alt="" class="lazyloaded" data-dcnode-id="1046" height="628" id="MzA0OjE5OA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-Featured-Image.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-Featured-Image.jpg&amp;raw" width="1200"></div><span data-dcnode-id="1044" instrument_node=""> </span><div class="listing_meta" data-dcnode-id="1026"><span data-dcnode-id="1043" instrument_node=""> </span><span data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">September 15, 2021</span></span><span data-dcnode-id="1040" instrument_node=""> </span><span data-dcnode-id="1036"><span data-dcnode-id="1039" instrument_node="">by </span><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spanish.academy/blog/author/javiergrazioso/"><span data-dcnode-id="1038" instrument_node="">Javier Grazioso</span></a></span><span data-dcnode-id="1035" instrument_node=""> </span><span data-dcnode-id="1032"><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spanish.academy/blog/category/spanish-resources-recommendations/" rel="category tag"><span data-dcnode-id="1034" instrument_node="">Curated Lists</span></a></span><span data-dcnode-id="1031" instrument_node=""> </span><span data-dcnode-id="1028"><a data-dcnode-id="1029" href="#respond"><span data-dcnode-id="1030" instrument_node="">0 comments</span></a></span><span data-dcnode-id="1027" instrument_node=""> </span></div><span data-dcnode-id="1025" instrument_node=""> </span><h1 class="blogpost_title" data-dcnode-id="1022"><i class="fa fa-camera" data-dcnode-id="1024"></i><span data-dcnode-id="1023" instrument_node="">9 Traditional Folk Dances of Guatemala</span></h1><span data-dcnode-id="1021" instrument_node=""> </span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Traditional folk dances are highly important to Guatemalan culture. They are a celebration of the Guatemalan indigenous tribes and their mixture with the Spanish and African cultures that made their way to the territory during the conquest.</span></p><span data-dcnode-id="1018" instrument_node=""> </span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">If you’re eager to learn more about Guatemalan ethnicities and their traditional dances, join me as I unravel them ahead.</span></p><span data-dcnode-id="1015" instrument_node=""> </span><h2 class="has-text-color" data-dcnode-id="1013" style="color:#1a7abc;"><span data-dcnode-id="1014" instrument_node="">The Ethnicities of Guatemala</span></h2><span data-dcnode-id="1012" instrument_node=""> </span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Guatemala is divided politically into 8 regions, 22 departments, and 340 municipalities. This vast territory is home to many different ethnicities.&nbsp;</span></p><span data-dcnode-id="1009" instrument_node=""> </span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Here are the most popular ethnicities of Guatemala:</span></p><span data-dcnode-id="1006" instrument_node=""> </span><ul data-dcnode-id="985"><li data-dcnode-id="999"><span data-dcnode-id="1005" instrument_node="">Mestizo (or </span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">ladino)</span></em><span data-dcnode-id="1002" instrument_node=""> is a person of European and indigenous descent.</span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">&nbsp;</span></em></li><li data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">Creole </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">(criollo)</span></em><span data-dcnode-id="995" instrument_node=""> is someone of European descent who was born in Guatemala.</span></li><li data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Maya, of which there are 22 different tribes—the most popular are Kaqchikeles and Quichés.</span></li><li data-dcnode-id="988"><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Garífuna</span></em><span data-dcnode-id="989" instrument_node=""> is a person of African descent and who was born in Guatemala.</span></li><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Xinca, who make up for an indigenous tribe apart from the Maya.</span></li></ul><span data-dcnode-id="984" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="977"><figure class="aligncenter size-full is-resized" data-dcnode-id="978"><img alt="Guatemala map" class="wp-image-18397 lazyloaded" data-dcnode-id="983" height="663" id="MzM0OjY0MA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6.jpg" nitro-lazy-srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6.jpg 880w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6-300x283.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6-768x725.jpg 768w" sizes="(max-width: 702px) 100vw, 702px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6.jpg&amp;raw" srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6.jpg 880w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6-300x283.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-6-768x725.jpg 768w" width="702"><figcaption data-dcnode-id="979"><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/3Ahngm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="982" instrument_node="">Guatemala mapa 2</span></a><span data-dcnode-id="980" instrument_node=""> | © Axel/Flickr&nbsp;</span></figcaption></figure></div><span data-dcnode-id="976" instrument_node=""> </span><p data-dcnode-id="972"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">FUN FACT! </span></strong><span data-dcnode-id="973" instrument_node="">Many municipalities in Guatemala combine the Spanish and indigenous cultures by using a saint’s name combined with an indigenous name. Some examples are San Antonio Xenacoj, Santa María Nebaj, and San Gaspar Ixchil.&nbsp;</span></p><span data-dcnode-id="971" instrument_node=""> </span><h2 class="has-text-color" data-dcnode-id="969" style="color:#1a7abc;"><span data-dcnode-id="970" instrument_node="">1. Dance of the Deer</span></h2><span data-dcnode-id="968" instrument_node=""> </span><ul data-dcnode-id="963"><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Departments: Guatemala, Alta Verapaz, Baja Verapaz, Chimaltenango, Sacatepéquez, San Marcos, Sololá, Huehuetenango, and Quiché</span></li><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Origin: Prehispanic</span></li></ul><span data-dcnode-id="962" instrument_node=""> </span><p data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">Dance of the Deer </span><em data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">(El baile del venado) </span></em><span data-dcnode-id="958" instrument_node="">is one of the most famous traditional folk dances of Guatemala—people dance it in at least 9 departments.&nbsp;</span></p><span data-dcnode-id="956" instrument_node=""> </span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Guatemalans dance the Dance of the Deer on different dates and with different details as well. Each municipality celebrates with this dance on their respective patronal feast.</span></p><span data-dcnode-id="953" instrument_node=""> </span><p data-dcnode-id="948"><span data-dcnode-id="952" instrument_node="">The dance of the deer has 26 dancers, who start the process of rehearsing 1 or </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//diariodelosaltos.com/2019/07/30/tradiciones-la-danza-del-venado/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="951" instrument_node="">2 months</span></a><span data-dcnode-id="949" instrument_node=""> before presenting the dance. They spend this time purifying their body and their spirit.</span></p><span data-dcnode-id="947" instrument_node=""> </span><p data-dcnode-id="943"><em data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">El baile del venado </span></em><span data-dcnode-id="944" instrument_node="">represents the story of the ancient hunting ritual the Maya performed. They meant to hunt down deer to eat, but in the process they must fight against other animals who want to eat deer too. A lion and a tiger represent these animals. In the process there are also monkeys involved, which add a fun tone to the representation. Dancers dance to the notes that the marimba (a wooden xylophone) player produces.</span></p><span data-dcnode-id="942" instrument_node=""> </span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The traditional dance ends well with everybody being invited to eat some meat.</span></p><span data-dcnode-id="939" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="932"><figure class="aligncenter size-full" data-dcnode-id="933"><img alt="traditional folk dances" class="wp-image-18398 lazyloaded" data-dcnode-id="938" height="540" id="MzcwOjY1NA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1.jpg" nitro-lazy-srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1.jpg 799w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1-300x203.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1-768x519.jpg 768w" sizes="(max-width: 799px) 100vw, 799px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1.jpg&amp;raw" srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1.jpg 799w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1-300x203.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-1-768x519.jpg 768w" width="799"><figcaption data-dcnode-id="934"><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/4ohbQN" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="937" instrument_node="">Baile del venado–Dance of the Deer</span></a><span data-dcnode-id="935" instrument_node=""> | © John Tran/Flickr&nbsp;</span></figcaption></figure></div><span data-dcnode-id="931" instrument_node=""> </span><p data-dcnode-id="927"><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">PRO TIP! </span></strong><span data-dcnode-id="928" instrument_node="">Some countries divide themselves into states, regions, or provinces. Guatemala, however, divides itself politically into 22 departments.&nbsp;</span></p><span data-dcnode-id="926" instrument_node=""> </span><h2 class="has-text-color" data-dcnode-id="924" style="color:#1a7abc;"><span data-dcnode-id="925" instrument_node="">2. Dance of the Flying Stick</span></h2><span data-dcnode-id="923" instrument_node=""> </span><ul data-dcnode-id="918"><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Departments: Quiché and Baja Verapaz</span></li><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Origin: prehispanic</span></li></ul><span data-dcnode-id="917" instrument_node=""> </span><p data-dcnode-id="900"><span data-dcnode-id="916" instrument_node="">The Dance of the Flying Stick </span><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">(El baile del palo volador </span></em><span data-dcnode-id="913" instrument_node="">or simply </span><em data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">El palo volador) </span></em><span data-dcnode-id="910" instrument_node="">is a very special dance that only people from Quiché (</span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">quichelenses)</span></em><span data-dcnode-id="907" instrument_node=""> and Baja Verapaz </span><em data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">(baja verapaceños) </span></em><span data-dcnode-id="904" instrument_node="">celebrate. More specifically in </span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aprende.guatemala.com/cultura-guatemalteca/tradiciones/la-danza-del-palo-volador/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="903" instrument_node="">4 municipalities</span></a><span data-dcnode-id="901" instrument_node=""> on their respective patronal feasts.</span></p><span data-dcnode-id="899" instrument_node=""> </span><ul data-dcnode-id="888"><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Cubulco, Baja Verapaz (July 25th)</span></li><li data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Granados, Baja Verapaz (May 3rd)</span></li><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Joyabaj, Quiché (August 15th)</span></li><li data-dcnode-id="889"><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spanish.academy/blog/guatemalas-biggest-most-colorful-market-chichicastenango/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="892" instrument_node="">Chichicastenango</span></a><span data-dcnode-id="890" instrument_node="">, Quiché (December 21st)</span></li></ul><span data-dcnode-id="887" instrument_node=""> </span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">This dance is based on the Popol Vuh (an ancient Mayan book which explains the origin of life in the Mayan perspective), and tells the story of two twin brothers who wanted to assassinate their other brothers but failed and became monkeys.</span></p><span data-dcnode-id="884" instrument_node=""> </span><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Men dressed as monkeys dance to the sound of the marimba as they start climbing up “the stick” </span><em data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">(el palo), </span></em><span data-dcnode-id="880" instrument_node="">which is about 100 feet tall (30 m). Up there, they swing from ropes as they spin around the stick. As the ropes extend, they safely and gracefully reach the ground.</span></p><span data-dcnode-id="878" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="871"><figure class="aligncenter size-full" data-dcnode-id="872"><img alt="traditional folk dances" class="wp-image-18400 lazyloaded" data-dcnode-id="877" height="536" id="NDAyOjY1NA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3.jpg" nitro-lazy-srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3.jpg 800w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3-300x201.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3-768x515.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3.jpg&amp;raw" srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3.jpg 800w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3-300x201.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-3-768x515.jpg 768w" width="800"><figcaption data-dcnode-id="873"><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/2eFU4fo" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="876" instrument_node="">Palo Volante, Chichicastenango, Guatemala</span></a><span data-dcnode-id="874" instrument_node=""> | © Tom Christensen/Flickr</span></figcaption></figure></div><span data-dcnode-id="870" instrument_node=""> </span><p data-dcnode-id="866"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">PRO TIP! </span></strong><span data-dcnode-id="867" instrument_node="">Each of Guatemala’s 22 departments has its own patronal feasts depending on the municipality’s saint.</span></p><span data-dcnode-id="865" instrument_node=""> </span><h2 class="has-text-color" data-dcnode-id="863" style="color:#1a7abc;"><span data-dcnode-id="864" instrument_node="">3. The Dance of Moors and Christians</span></h2><span data-dcnode-id="862" instrument_node=""> </span><ul data-dcnode-id="857"><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Departments: Guatemala, Alta Verapaz, Baja Verapaz, Chiquimula, Chimaltenango, Sacatepéquez, San Marcos, Sololá, and Suchitepéquez</span></li><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Origin: hispanic</span></li></ul><span data-dcnode-id="856" instrument_node=""> </span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">The dance of Moors and Christians is another widely popular dance in Guatemala, which Guatemalans dance in 9 departments.</span></p><span data-dcnode-id="853" instrument_node=""> </span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">When Spaniards came to Guatemala they used this dance in order to convert the indigenous tribes into Christians. This represented the 800 year-long battle of the Spaniards against the Moors in their territory.&nbsp;</span></p><span data-dcnode-id="850" instrument_node=""> </span><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">The dancers who represent the Spaniards wear masks with beards and white faces, whereas the dancers who represent the moors wear masks with darker tones. All of them dance to the marimba which dictates the rhythm of the dance and they carry some </span><em data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">maracas </span></em><span data-dcnode-id="846" instrument_node="">which they sound as they dance.</span></p><span data-dcnode-id="844" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="837"><figure class="aligncenter size-full" data-dcnode-id="838"><img alt="traditional folk dances" class="wp-image-18402 lazyloaded" data-dcnode-id="843" height="600" id="NDMwOjY1NA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2.jpg" nitro-lazy-srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2.jpg 800w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2-300x225.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2.jpg&amp;raw" srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2.jpg 800w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2-300x225.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-2-768x576.jpg 768w" width="800"><figcaption data-dcnode-id="839"><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/5j1HPK" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="842" instrument_node="">Baile de Moros</span></a><span data-dcnode-id="840" instrument_node=""> | © Jorge Cabrera/Flickr</span></figcaption></figure></div><span data-dcnode-id="836" instrument_node=""> </span><h2 class="has-text-color" data-dcnode-id="834" style="color:#1a7abc;"><span data-dcnode-id="835" instrument_node="">4. Dance of the Rabinal Achí</span></h2><span data-dcnode-id="833" instrument_node=""> </span><ul data-dcnode-id="828"><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Departments: Baja Verapaz</span></li><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Origin: Hispanic</span></li></ul><span data-dcnode-id="827" instrument_node=""> </span><p data-dcnode-id="819"><span data-dcnode-id="826" instrument_node="">The dance of the </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aprende.guatemala.com/cultura-guatemalteca/tradiciones/danza-rabinal-achi-guatemala/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="825" instrument_node="">Rabinal Achí</span></a><span data-dcnode-id="823" instrument_node=""> </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">(La danza del Rabinal Achí)</span></em><span data-dcnode-id="820" instrument_node=""> is the only Guatemalan dance that remains intact and was born before the Spanish colonization. People dance it in the municipality of San Pablo Rabinal. They celebrate it in Rabinal, Baja Verapaz every January 25th.&nbsp;</span></p><span data-dcnode-id="818" instrument_node=""> </span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">The dance, however, is not presented in Spanish but in Achí (an indigenous language that locals speak in Guatemala) and it tells the story of two princes. The Quiché prince and the Rabinal prince.&nbsp;</span></p><span data-dcnode-id="815" instrument_node=""> </span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The Quiché prince attacks and captures an important member of the Rabinal tribe, but the Rabinal prince spots him and defends his people. The Rabinal people sentence the Quiché prince to a trial, and he has the option to spare his own life—but his pride makes him choose death instead, along with three last wishes:</span></p><span data-dcnode-id="812" instrument_node=""> </span><ul data-dcnode-id="805"><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Drinking the Rabinaleb beverage.</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Dancing with the Rabinal princess</span></li><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Getting 260 days to say goodbye to his land.</span></li></ul><span data-dcnode-id="804" instrument_node=""> </span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">The Quiché prince finally fulfills his sentence and the Rabinal people execute him.</span></p><span data-dcnode-id="801" instrument_node=""> </span><p data-dcnode-id="793"><span data-dcnode-id="800" instrument_node="">The Guatemalan </span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mcd.gob.gt/tag/rabinal-achi/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="799" instrument_node="">Ministry of Culture and Sports</span></a><span data-dcnode-id="797" instrument_node=""> declared this dance as a National Intangible Heritage in 2004. </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ich.unesco.org/es/RL/la-tradicin-del-teatro-bailado-rabinal-ach-00144" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="796" instrument_node="">UNESCO</span></a><span data-dcnode-id="794" instrument_node=""> declared it Masterpiece and Oral and Intangible Heritage of the World in 2005.</span></p><span data-dcnode-id="792" instrument_node=""> </span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">This dance also involves 9 ceremonies before and after playing it to ask for the permission of their ancestors to execute the dance well as well as to thank them for letting them interpret the dance. The dance has 21 different characters!</span></p><span data-dcnode-id="789" instrument_node=""> </span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="774"><div class="wp-block-embed__wrapper" data-dcnode-id="775"><span data-dcnode-id="788" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="" data-dcnode-id="777" frameborder="0" height="529" loading="lazy" nitro-og-src="https://www.youtube.com/embed/yqRPC1yCRSw?feature=oembed&amp;autoplay=1" src="data:text/html;https://www.youtube.com/embed/yqRPC1yCRSw?feature=oembed&amp;autoplay=1;base64,PGJvZHkgc3R5bGU9J3dpZHRoOjEwMCU7aGVpZ2h0OjEwMCU7bWFyZ2luOjA7cGFkZGluZzowO2JhY2tncm91bmQ6dXJsKGh0dHBzOi8vaW1nLnlvdXR1YmUuY29tL3ZpL3lxUlBDMXlDUlN3LzAuanBnKSBjZW50ZXIvMTAwJSBuby1yZXBlYXQnPjxzdHlsZT5ib2R5ey0tYnRuQmFja2dyb3VuZDpyZ2JhKDAsMCwwLC42NSk7fWJvZHk6aG92ZXJ7LS1idG5CYWNrZ3JvdW5kOnJnYmEoMCwwLDApO2N1cnNvcjpwb2ludGVyO30jcGxheUJ0bntkaXNwbGF5OmZsZXg7YWxpZ24taXRlbXM6Y2VudGVyO2p1c3RpZnktY29udGVudDpjZW50ZXI7Y2xlYXI6Ym90aDt3aWR0aDoxMDBweDtoZWlnaHQ6NzBweDtsaW5lLWhlaWdodDo3MHB4O2ZvbnQtc2l6ZTo0NXB4O2JhY2tncm91bmQ6dmFyKC0tYnRuQmFja2dyb3VuZCk7dGV4dC1hbGlnbjpjZW50ZXI7Y29sb3I6I2ZmZjtib3JkZXItcmFkaXVzOjE4cHg7dmVydGljYWwtYWxpZ246bWlkZGxlO3Bvc2l0aW9uOmFic29sdXRlO3RvcDo1MCU7bGVmdDo1MCU7bWFyZ2luLWxlZnQ6LTUwcHg7bWFyZ2luLXRvcDotMzVweH0jcGxheUFycm93e3dpZHRoOjA7aGVpZ2h0OjA7Ym9yZGVyLXRvcDoxNXB4IHNvbGlkIHRyYW5zcGFyZW50O2JvcmRlci1ib3R0b206MTVweCBzb2xpZCB0cmFuc3BhcmVudDtib3JkZXItbGVmdDoyNXB4IHNvbGlkICNmZmY7fTwvc3R5bGU+PGRpdiBpZD0ncGxheUJ0bic+PGRpdiBpZD0ncGxheUFycm93Jz48L2Rpdj48L2Rpdj48c2NyaXB0PmRvY3VtZW50LmJvZHkuYWRkRXZlbnRMaXN0ZW5lcignY2xpY2snLCBmdW5jdGlvbigpe3dpbmRvdy5wYXJlbnQucG9zdE1lc3NhZ2Uoe2FjdGlvbjogJ3BsYXlCdG5DbGlja2VkJ30sICcqJyk7fSk7PC9zY3JpcHQ+PC9ib2R5Pg==" title="DANZA DRAMA RABINAL ACHI" width="940"><html data-dcnode-id="779"><head data-dcnode-id="787"><meta charset="utf-8"/></head><body data-dcnode-id="780" style="width:100%;height:100%;margin:0;padding:0;background:url(https://img.youtube.com/vi/yqRPC1yCRSw/0.jpg) center/100% no-repeat"><div data-dcnode-id="783" id="playBtn"><div data-dcnode-id="784" id="playArrow"></div></div></body></html></iframe><span data-dcnode-id="776" instrument_node=""> </span></div></figure><span data-dcnode-id="773" instrument_node=""> </span><h2 class="has-text-color" data-dcnode-id="771" style="color:#1a7abc;"><span data-dcnode-id="772" instrument_node="">5. Dance of the Monkeys</span></h2><span data-dcnode-id="770" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="765"><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Department: Alta Verapaz and Totonicapán</span></li><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Origin: Prehispanic</span></li></ul><span data-dcnode-id="764" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="751"><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aprende.guatemala.com/cultura-guatemalteca/patrimonios/danza-de-los-micos-de-guatemala/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="763" instrument_node="">Dance of the Monkeys</span></a><span data-dcnode-id="761" instrument_node=""> </span><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">(Danza de los micos) </span></em><span data-dcnode-id="758" instrument_node="">has its origin in the municipality of San Antonio Senahu, in Alta Verapaz, in the northern region of Guatemala. This municipality has its patronal feast on June 13th, which is when they perform this dance.</span><em data-dcnode-id="756"><span data-dcnode-id="757" instrument_node=""> </span></em><span data-dcnode-id="755" instrument_node="">This is a similar traditional folk dance to </span><em data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">el palo volador </span></em><span data-dcnode-id="752" instrument_node="">because the brave locals perform it in a kind of tight rope.</span></p><span data-dcnode-id="750" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">They place one 100 feet tall (30 m) stick and connect it with the Cathedral in the town’s square. From there people perform erratic, acrobatic, monkey-like stunts. This dance revives the creation of the monkey—a highly important animal in the Maya culture, based on the Popol Vuh. As many other Guatemalan traditional folk dances, marimba accompanies the dance with its own set piece named Ah Xul.</span></p><span data-dcnode-id="747" instrument_node=""> </span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-4-3 wp-has-aspect-ratio nitro-offscreen" data-dcnode-id="732"><div class="wp-block-embed__wrapper" data-dcnode-id="733"><span data-dcnode-id="746" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="" data-dcnode-id="735" frameborder="0" height="705" loading="lazy" nitro-og-src="https://www.youtube.com/embed/yPHz1BWZN8Y?feature=oembed&amp;autoplay=1" src="data:text/html;https://www.youtube.com/embed/yPHz1BWZN8Y?feature=oembed&amp;autoplay=1;base64,PGJvZHkgc3R5bGU9J3dpZHRoOjEwMCU7aGVpZ2h0OjEwMCU7bWFyZ2luOjA7cGFkZGluZzowO2JhY2tncm91bmQ6dXJsKGh0dHBzOi8vaW1nLnlvdXR1YmUuY29tL3ZpL3lQSHoxQldaTjhZLzAuanBnKSBjZW50ZXIvMTAwJSBuby1yZXBlYXQnPjxzdHlsZT5ib2R5ey0tYnRuQmFja2dyb3VuZDpyZ2JhKDAsMCwwLC42NSk7fWJvZHk6aG92ZXJ7LS1idG5CYWNrZ3JvdW5kOnJnYmEoMCwwLDApO2N1cnNvcjpwb2ludGVyO30jcGxheUJ0bntkaXNwbGF5OmZsZXg7YWxpZ24taXRlbXM6Y2VudGVyO2p1c3RpZnktY29udGVudDpjZW50ZXI7Y2xlYXI6Ym90aDt3aWR0aDoxMDBweDtoZWlnaHQ6NzBweDtsaW5lLWhlaWdodDo3MHB4O2Zvbn ode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikiguate.com.gt/baile-de-la-conquista/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="720" instrument_node="">Dance of the Conquest</span></a><span data-dcnode-id="718" instrument_node=""> </span><em data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">(La danza de la conquista) </span></em><span data-dcnode-id="715" instrument_node="">in Guatemala in order to convert the indigenous into Christianity by leading them to think that&nbsp; the conquest of Guatemala was thanks to a more powerful deity (God in a Catholic point of view) than theirs.</span></p><span data-dcnode-id="713" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">This dance tells, possibly, the most famous Guatemalan legend ever. The legend of the Quiché prince, Tecún Umán, and how&nbsp; Pedro de Alvarado led the Spaniards to defeat the Quiché empire. The legend says that the Quetzal (Guatemala’s national bird) has a red chest, because he stood in the Quiché warrior’s chest, covered in blood, in his dying breath.&nbsp;</span></p><span data-dcnode-id="710" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Many Guatemalan municipalities celebrate and perform this dance on their own patronal feasts dancing to the beat of a marimba, Spanish drums and hornpipes.</span></p><span data-dcnode-id="707" instrument_node=""> </span><div class="wp-block-image nitro-offscreen" data-dcnode-id="700"><figure class="aligncenter size-full" data-dcnode-id="701"><img alt="traditional folk dances" class="wp-image-18405 lazyloaded" data-dcnode-id="706" height="600" id="NTE4OjY1NA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4.jpg" nitro-lazy-srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4.jpg 800w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4-300x225.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4.jpg&amp;raw" srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4.jpg 800w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4-300x225.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-4-768x576.jpg 768w" width="800"><figcaption data-dcnode-id="702"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/4qfSfP" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="705" instrument_node="">quetzal</span></a><span data-dcnode-id="703" instrument_node=""> | © frank wouters/Flickr</span></figcaption></figure></div><span data-dcnode-id="699" instrument_node=""> </span><h2 class="has-text-color nitro-offscreen" data-dcnode-id="697" style="color:#1a7abc;"><span data-dcnode-id="698" instrument_node="">7. Dance of the Cowboys</span></h2><span data-dcnode-id="696" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="691"><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Departments: Guatemala, Baja Verapaz, Chimaltenango, San Marcos, Sololá and Quiché</span></li><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Origin: hispanic</span></li></ul><span data-dcnode-id="690" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="679"><span data-dcnode-id="689" instrument_node="">The </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mundochapin.com/2011/11/danza-del-torito/2561/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="688" instrument_node="">Dance of the Cowboys</span></a><span data-dcnode-id="686" instrument_node=""> (literally </span><em data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">el baile de los vaqueros </span></em><span data-dcnode-id="683" instrument_node="">but locals know it more popularly as </span><em data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">el baile del torito </span></em><span data-dcnode-id="680" instrument_node="">which translates literally to “dance of the little bull”) is a Guatemalan traditional folk dance focused on comedy and mischief.</span></p><span data-dcnode-id="678" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">This traditional folk dance is inspired by a warden who doesn’t let cowboys tame a bull because the animal is too furious. The cowboys coerce the warden to do it himself and he unfortunately dies because of it.&nbsp;&nbsp;</span></p><span data-dcnode-id="675" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">This traditional folk dance, as many others, is danced on each municipality’s patronal feast. This, however, is a long dance. They dance for 10 hours straight, for ten days, and cannot take off their masks, since they believe this brings bad luck. The dance consists of people trying to grab the bull (a person with a bull’s mask) who is trying to scare the crowd, and release him to repeat the ritual. There are 38 characters.</span></p><span data-dcnode-id="672" instrument_node=""> </span><div class="wp-block-image nitro-offscreen" data-dcnode-id="665"><figure class="aligncenter size-full" data-dcnode-id="666"><img alt="Guatemala dance" class="wp-image-18406 nitro-lazy" data-dcnode-id="671" height="720" id="NTQyOjY0Ng==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-5.jpg" nitro-lazy-srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-5.jpg 960w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-5-300x225.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-5-768x576.jpg 768w" sizes="(max-width: 960px) 100vw, 960px" src="data:image/svg+xml;nitro-empty-id=NTQyOjY0Ng==-1;base64,PHN2ZyB2aWV3Qm94PSIwIDAgOTYwIDcyMCIgd2lkdGg9Ijk2MCIgaGVpZ2h0PSI3MjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PC9zdmc+" width="960"><figcaption data-dcnode-id="667"><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AToritos_al_ball_dels_toritos_01.JPG%23/media/File%3AToritos_al_ball_dels_toritos_01.JPG" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="670" instrument_node="">Bullok in the Baile de los Toritos at the Santo Tomás Festival in Chichicastenango, Guatemala </span></a><span data-dcnode-id="668" instrument_node="">| © Pitxiquin/Wikimedia Commons</span></figcaption></figure></div><span data-dcnode-id="664" instrument_node=""> </span><h2 class="has-text-color nitro-offscreen" data-dcnode-id="660" style="color:#1a7abc;"><span data-dcnode-id="663" instrument_node="">8. </span><em data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Convite</span></em></h2><span data-dcnode-id="659" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="654"><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Departments: Guatemala, Alta Verapaz, San Marcos, Sololá, and Quiché</span></li><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Origin: hispanic</span></li></ul><span data-dcnode-id="653" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="645"><span data-dcnode-id="652" instrument_node="">The word convite comes from the verb “to share” </span><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">(convidar o</span></em><span data-dcnode-id="649" instrument_node=""> </span><em data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">compartir). </span></em><span data-dcnode-id="646" instrument_node="">This dance is a direct inheritance from the Spanish parades in carnivals. Convites have evolved over time.&nbsp;</span></p><span data-dcnode-id="644" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Guatemalans started to celebrate convites in each municipality’s patronal feast, and they used to be a religious celebration exclusively in which they venerated the municipality’s saint. People used to wear different animal’s masks as costumes.</span></p><span data-dcnode-id="641" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Nowadays, however, convites have changed drastically and people use contemporary music and dress up as famous TV characters.</span></p><span data-dcnode-id="638" instrument_node=""> </span><div class="wp-block-image nitro-offscreen" data-dcnode-id="631"><figure class="aligncenter size-full" data-dcnode-id="632"><img alt="traditional folk dances" class="wp-image-18407 nitro-lazy" data-dcnode-id="637" height="596" id="NTY2OjY1NA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-7.jpg" nitro-lazy-srcset="https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-7.jpg 800w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-7-300x224.jpg 300w, https://cdn-blbpl.nitrocdn.com/yERRkNKpiDCoDrBCLMpaauJAEtjVyDjw/assets/static/optimized/rev-16671f5/wp-content/uploads/2021/09/9-Traditional-Folk-Dances-of-Guatemala-7-768x572.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" src="data:image/svg+xml;nitro-empty-id=NTY2OjY1NA==-1;base64,PHN2ZyB2aWV3Qm94PSIwIDAgODAwIDU5NiIgd2lkdGg9IjgwMCIgaGVpZ2h0PSI1OTYiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PC9zdmc+" width="800"><figcaption data-dcnode-id="633"><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/sXBgZA" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="636" instrument_node="">Convite</span></a><span data-dcnode-id="634" instrument_node=""> | © Kenneth Cruz/Flickr</span></figcaption></figure></div><span data-dcnode-id="630" instrument_node=""> </span><h2 class="has-text-color nitro-offscreen" data-dcnode-id="626" style="color:#1a7abc;"><span data-dcnode-id="629" instrument_node="">9. </span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Yancunú</span></em></h2><span data-dcnode-id="625" instrument_node=""> </span><ul class="nitro-offscreen" data-dcnode-id="620"><li data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Department: Izabal</span></li><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Origin: hispanic</span></li></ul><span data-dcnode-id="619" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="608"><span data-dcnode-id="618" instrument_node="">The </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vivaguateguatemala.blogspot.com/2009/03/yancunu-danza-garifuna.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="617" instrument_node="">Yancunú dance</span></a><span data-dcnode-id="615" instrument_node=""> </span><em data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">(yancunú or baile de los mascaros) </span></em><span data-dcnode-id="612" instrument_node="">&nbsp;is a </span><em data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">garífuna</span></em><span data-dcnode-id="609" instrument_node=""> dance which garifunas dance in Izabal. They dance it on November 26th in order to celebrate the garífuna settlement day, and receive Honduran and Belizean garifunas too.</span></p><span data-dcnode-id="607" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">During the dance, musicians play to the rhythm of the dancers (yes! you read that right), who wear snail shells on their knees and they shake around when they dance. The legend says that garífunas heard that British troops were coming back to Guatemala to mistreat them, so the men decided to dress as women in order to calm the British troops. Once calm they would attack and repel the invasion, dancing once more because of the victory obtained.</span></p><span data-dcnode-id="604" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Garifunas also dance the Yancunú in order to say goodbye to their deceased ones.</span></p><span data-dcnode-id="601" instrument_node=""> </span><p class="nitro-offscreen" data-dcnode-id="594"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Learn more about Guatemala:</span></strong><span data-dcnode-id="598" instrument_node=""> </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spanish.academy/blog/10-ways-to-celebrate-guatemala-independence-day-like-a-local/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="597" instrument_node="">10 Ways to Celebrate Guatemala’s Independence Day Like a Local</span></a><span data-dcnode-id="595" instrument_node="">!</span></p><span data-dcnode-id="593" instrument_node=""> </span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-4-3 wp-has-aspect-ratio nitro-offscreen" data-dcnode-id="578"><div class="wp-block-embed__wrapper" data-dcnode-id="579"><span data-dcnode-id="592" instrument_node=""> </span><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="" data-dcnode-id="581" frameborder="0" height="705" loading="lazy" nitro-og-src="https://www.youtube.com/embed/dDaOwaiiZDA?feature=oembed&amp;autoplay=1" src="data:text/html;https://www.youtube.com/embed/dDaOwaiiZDA?feature=oembed&amp;autoplay=1;base64,PGJvZHkgc3R5bGU9J3dpZHRoOjEwMCU7aGVpZ2h0OjEwMCU7bWFyZ2luOjA7cGFkZGluZzowO2JhY2tncm91bmQ6dXJsKGh0dHBzOi8vaW1nLnlvdXR1YmUuY29tL3ZpL2REYU93YWlpWkRBLzAuanBnKSBjZW50ZXIvMTAwJSBuby1yZXBlYXQnPjxzdHlsZT5ib2R5ey0tYnRuQmFja2dyb3VuZDpyZ2JhKDAsMCwwLC42NSk7fWJvZHk6aG92ZXJ7LS1idG5CYWNrZ3JvdW5kOnJnYmEoMCwwLDApO2N1cnNvcjpwb2
