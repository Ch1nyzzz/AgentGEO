</span><div class="col-xs-12" data-dcnode-id="5774" style="margin-bottom: 20px;"><span data-dcnode-id="5775" style="font-size:2.222222rem; "><span data-dcnode-id="5780" instrument_node="">A popular sport in Southeast Asia, this action-packed game resembles </span><a data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ba-bamail.com/video.aspx%3Femailid%3D9533" target="_blank"><strong data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">volleyball </span></strong></a><span data-dcnode-id="5776" instrument_node="">but instead of hands, players use their feet, knees, chest, and head to move the ball around, which is made from softwood. The&nbsp;International Sepak Takraw Federation&nbsp;holds competitions with teams from over a hundred different countries.&nbsp;</span></span></div><span data-dcnode-id="5773" instrument_node="">

</span><div class="col-xs-12" data-dcnode-id="5753" style="margin-bottom: 20px;"><span data-dcnode-id="5754" style="font-size:2.222222rem; "><span data-dcnode-id="5759" instrument_node="">This sport was first described in the popular Harry Potter book series, which is meant to be played on flying broomsticks. Real-world enthusiasts have invented a land version that is played on a hockey field. The game first began in US colleges and has since spread across the states. Supporters refer to the game as a&nbsp;</span><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//magazine.ucla.edu/features/brooms_up_extra_rules/" target="_blank"><strong data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">muggle quidditch</span></strong></a><span data-dcnode-id="5755" instrument_node=""> because muggles are what the series characters call non-magic folk.&nbsp;</span></span></div><span data-dcnode-id="5752" instrument_node="">

</span><div class="col-xs-12" data-dcnode-id="5732" style="margin-bottom: 20px;"><span data-dcnode-id="5733" style="font-size:2.222222rem; "><span data-dcnode-id="5738" instrument_node="">This sport began in South Australia in the small fishing community of </span><a data-dcnode-id="5735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//visitportlincoln.net.au/" target="_blank"><strong data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">Port Lincoln</span></strong></a><span data-dcnode-id="5734" instrument_node="">. It was inspired by the local fishermen who would toss fish onto their trucks with&nbsp;force and started being used as a way to&nbsp;spice up a local festival. The winner is the person who manages to throw a 20-pound fish the furthest. Nowadays the competition has become somewhat cleaner: participants use&nbsp;rubber fish instead.</span></span></div><span data-dcnode-id="5731" instrument_node="">

</span><div class="col-xs-12" data-dcnode-id="4936" style="margin-bottom: 20px;"><span data-dcnode-id="4937" style="font-size:2.222222rem; "><span data-dcnode-id="4938" instrument_node="">Underwater football is basically American football that's usually played in a swimming pool. Players have to wear snorkeling equipment and are tasked with getting the weighted football to the gutter on the other side of the pool.</span></span></div><span data-dcnode-id="4935" instrument_node="">
</span><h2 class="col-xs-12" data-dcnode-id="4932" style="margin-bottom: 10px;"><span data-dcnode-id="4933" style="font-size:2.666667rem; "><span data-dcnode-id="4934" instrument_node="">16. Unicycle Hockey</span></span></h2><span data-dcnode-id="4931" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4929" style="margin-bottom: 10px;"><img alt="unusual sports - Unicycle Hockey" class="img-responsive" data-dcnode-id="4930" data-src="https://en.bcdn.biz/Images/2018/5/17/f9ea06a5-382f-452c-b40b-8317e59dfd4d.jpg" height="573" src="data:," style="border-width: 0px; border-style: solid;" width="730"></div><span data-dcnode-id="4928" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4921" style="margin-bottom: 20px;"><span data-dcnode-id="4922" style="font-size:2.222222rem; "><span data-dcnode-id="4927" instrument_node="">This one's almost as self-explanatory as underwater football, since unicycle hockey is pretty much nothing more than hockey on </span><a data-dcnode-id="4924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ba-bamail.com/video.aspx%3Femailid%3D27109" target="_blank"><strong data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">unicycles</span></strong></a><span data-dcnode-id="4923" instrument_node="">, as insane and dangerous as that may sound. Each team consists of 5 players who are required to have both feet on their unicycle at all times.</span></span></div><span data-dcnode-id="4920" instrument_node="">
</span><div class="col-xs-12 responsive-player" data-dcnode-id="4918" style="margin-bottom: 10px;"><div allowfullscreen="" class="lazy" data-dcnode-id="4919" data-loader="iframeLoader" data-src="https://www.youtube.com/embed/gIaLfqXdb1g" frameborder="0" height="315" src="data:," width="560"></div></div><span data-dcnode-id="4917" instrument_node="">
</span><h2 class="col-xs-12" data-dcnode-id="4914" style="margin-bottom: 10px;"><span data-dcnode-id="4915" style="font-size:2.666667rem; "><span data-dcnode-id="4916" instrument_node="">17. Competitive Worm Charming</span></span></h2><span data-dcnode-id="4913" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4911" style="margin-bottom: 10px;"><img alt="unusual sports - Competitive Worm Charming" class="img-responsive" data-dcnode-id="4912" data-src="https://en.bcdn.biz/Images/2018/5/17/b5e0e7e5-e8ab-4d45-a706-6f00d31c67fc.jpg" height="546" src="data:," style="border-width: 0px; border-style: solid;" width="730"></div><span data-dcnode-id="4910" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4907" style="margin-bottom: 20px;"><span data-dcnode-id="4908" style="font-size:2.222222rem; "><span data-dcnode-id="4909" instrument_node="">Worm charming is a sport in which participants attempt to lure as many earthworms out of the ground as possible within a pre-defined timeframe. There are many kinds of techniques that can be used, however, the most common one is to simply tap the ground rhythmically until the worms begin to emerge.</span></span></div><span data-dcnode-id="4906" instrument_node="">
</span><h2 class="col-xs-12" data-dcnode-id="4903" style="margin-bottom: 10px;"><span data-dcnode-id="4904" style="font-size:2.666667rem; "><span data-dcnode-id="4905" instrument_node="">18. Log Rolling</span></span></h2><span data-dcnode-id="4902" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4900" style="margin-bottom: 10px;"><img alt="unusual sports - Log Rolling" class="img-responsive" data-dcnode-id="4901" data-src="https://en.bcdn.biz/Images/2018/5/17/4f0b9953-a2fd-4f1d-8cb1-29ec574a829c.jpg" height="483" src="data:," style="border-width: 0px; border-style: solid;" width="730"></div><span data-dcnode-id="4899" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4896" style="margin-bottom: 20px;"><span data-dcnode-id="4897" style="font-size:2.222222rem; "><span data-dcnode-id="4898" instrument_node="">Log rolling tournaments consist of two&nbsp;participants balancing on a floating log, while trying to push their opponent off, without crossing the centerline or making any physical contact. Participants typically win by repeatedly kicking the log, to make it bounce or change direction.</span></span></div><span data-dcnode-id="4895" instrument_node="">
</span><h2 class="col-xs-12" data-dcnode-id="4892" style="margin-bottom: 10px;"><span data-dcnode-id="4893" style="font-size:2.666667rem; "><span data-dcnode-id="4894" instrument_node="">19. Bubble Soccer</span></span></h2><span data-dcnode-id="4891" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4889" style="margin-bottom: 10px;"><img alt="unusual sports - Bubble Soccer" class="img-responsive" data-dcnode-id="4890" data-src="https://en.bcdn.biz/Images/2018/5/17/df3b9387-6d71-4d5f-8b2e-68e4468470a2.jpg" height="487" src="data:," style="border-width: 0px; border-style: solid;" width="730"></div><span data-dcnode-id="4888" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4881" style="margin-bottom: 20px;"><span data-dcnode-id="4882" style="font-size:2.222222rem; "><span data-dcnode-id="4887" instrument_node="">In this quirky sport, players are strapped into huge inflatable bubbles, which cover their head and upper body. Each team typically consists of five players each, and the game is played with much of the same rules that soccer has. This sport is not only incredibly fun to play, but&nbsp;it's also </span><a data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ba-bamail.com/video.aspx%3Femailid%3D4876" target="_blank"><strong data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">absolutely hilarious to watch</span></strong></a><span data-dcnode-id="4883" instrument_node="">!</span></span></div><span data-dcnode-id="4880" instrument_node="">
</span><h2 class="col-xs-12" data-dcnode-id="4877" style="margin-bottom: 10px;"><span data-dcnode-id="4878" style="font-size:2.666667rem; "><span data-dcnode-id="4879" instrument_node="">20. Cycleball</span></span></h2><span data-dcnode-id="4876" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4874" style="margin-bottom: 10px;"><img alt="unusual sports - Cycleball" class="img-responsive" data-dcnode-id="4875" data-src="https://en.bcdn.biz/Images/2018/5/17/0b0bd207-5836-432b-a584-4b2aba8c4e07.jpg" height="487" src="data:," style="border-width: 0px; border-style: solid;" width="730"></div><span data-dcnode-id="4873" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4870" style="margin-bottom: 20px;"><span data-dcnode-id="4871" style="font-size:2.222222rem; "><span data-dcnode-id="4872" instrument_node="">Also known as 'radball', this sport is essentially a game of soccer played with bicycles. The catch is that you're not allowed to use any part of your body, and must only touch the ball with your bicycle. The craziest part is that the bicycles used have absolutely no brakes installed!</span></span></div><span data-dcnode-id="4869" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4789" style="margin-bottom: 20px;"><span data-dcnode-id="4868" instrument_node="">
</span><h2 data-dcnode-id="4865"><span data-dcnode-id="4866" style="font-size:2.666667rem;"><span data-dcnode-id="4867" instrument_node="">21. Pumpkin Chucking</span></span></h2><span data-dcnode-id="4864" instrument_node="">
</span><img alt="unusual sports - Pumpkin Chucking" class="img-responsive" data-dcnode-id="4863" data-src="https://en.bcdn.biz/Images/2018/6/20/59c85e89-2560-4cd8-8921-f9d6c03c0874.jpg" height="548" src="data:," width="730"><span data-dcnode-id="4862" instrument_node="">
</span><p data-dcnode-id="4855"><span data-dcnode-id="4856" style="font-size:2.222222rem;"><span data-dcnode-id="4861" instrument_node="">Also known as '</span><a data-dcnode-id="4858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.howstuffworks.com/transport/engines-equipment/question502.htm" target="_blank"><strong data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">punkin chunkin</span></strong></a><span data-dcnode-id="4857" instrument_node="">', this weird sport requires participants to hurl a pumpkin through the sky as far as possible using a homemade mechanical device. The devices created often vary greatly from one participant to the next, and include gigantic catapults, slingshots, trebuchets, bolt throwers, pneumatic cannons, and centrifugals.</span></span></p><span data-dcnode-id="4854" instrument_node="">
</span><div class="col-xs-12 responsive-player" data-dcnode-id="4852" style="margin-bottom: 10px;"><div allowfullscreen="" class="lazy" data-dcnode-id="4853" data-loader="iframeLoader" data-src="https://www.youtube.com/embed/MtKyCrfmInA" frameborder="0" height="315" src="data:," width="560"></div></div><span data-dcnode-id="4851" instrument_node="">
</span><h2 data-dcnode-id="4846"><br data-dcnode-id="4850"><span data-dcnode-id="4849" instrument_node="">
</span><span data-dcnode-id="4847" style="font-size:2.666667rem;"><span data-dcnode-id="4848" instrument_node="">22. Dog Surfing</span></span></h2><span data-dcnode-id="4845" instrument_node="">
</span><img alt="unusual sports - Dog Surfing" class="img-responsive" data-dcnode-id="4844" data-src="https://en.bcdn.biz/Images/2018/6/20/c05f45e2-f2a2-4ca9-8d8a-4bae3a296eb0.jpg" height="502" src="data:," width="730"><span data-dcnode-id="4843" instrument_node="">
</span><p data-dcnode-id="4836"><span data-dcnode-id="4837" style="font-size:2.222222rem;"><span data-dcnode-id="4842" instrument_node="">This one should be pretty self-explanatory, since it merely involves dogs riding the waves on surfboards, whether alone or accompanied by a human. It originated in California in the 1920s, and </span><a data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.surfdogchampionships.com/" target="_blank"><strong data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">competitions are now held all across the USA's coastal areas</span></strong></a><span data-dcnode-id="4838" instrument_node="">. &nbsp;</span></span></p><span data-dcnode-id="4835" instrument_node="">
</span><h2 data-dcnode-id="4832"><span data-dcnode-id="4833" style="font-size:2.666667rem;"><span data-dcnode-id="4834" instrument_node="">23. Lawnmower Racing</span></span></h2><span data-dcnode-id="4831" instrument_node="">
</span><img alt="unusual sports - Lawnmower Racing" class="img-responsive" data-dcnode-id="4830" data-src="https://en.bcdn.biz/Images/2018/6/20/0a567c13-73cd-4d21-bae9-de2100ee28a3.jpg" height="500" src="data:," width="730"><span data-dcnode-id="4829" instrument_node="">
</span><p data-dcnode-id="4822"><span data-dcnode-id="4823" style="font-size:2.222222rem;"><span data-dcnode-id="4828" instrument_node="">Invented in England's West Sussex in 1968 by a group of motoring enthusiasts who couldn't afford racecars, </span><a data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blmra.co.uk/" target="_blank"><strong data-dcnode-id="4826"><span data-dcnode-id="4827" instrument_node="">this weird sport puts a new spin on doing a spot of gardening</span></strong></a><span data-dcnode-id="4824" instrument_node="">. Usually, each lawnmower's blades are removed due to safety concerns, but the original mower engines are generally untouched.</span></span></p><span data-dcnode-id="4821" instrument_node="">
</span><h2 data-dcnode-id="4818"><span data-dcnode-id="4819" style="font-size:2.666667rem;"><span data-dcnode-id="4820" instrument_node="">24. Gurning Contests</span></span></h2><span data-dcnode-id="4817" instrument_node="">
</span><img alt="unusual sports - Gurning Contest" class="img-responsive" data-dcnode-id="4816" data-src="https://en.bcdn.biz/Images/2018/6/20/c3218812-321f-4d42-99eb-ec2f4cd8fc0f.jpg" height="488" src="data:," width="730"><span data-dcnode-id="4815" instrument_node="">
</span><p data-dcnode-id="4808"><span data-dcnode-id="4809" style="font-size:2.222222rem;"><span data-dcnode-id="4814" instrument_node="">Gurning contests are a rural British tradition where participants compete to pull the most distorted facial expression possible. The World Gurning Championship takes place at the </span><strong data-dcnode-id="4811"><a data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.egremontcrabfair.com/" target="_blank"><span data-dcnode-id="4813" instrument_node="">Egremont Crab Fair</span></a></strong><span data-dcnode-id="4810" instrument_node=""> once a year, which dates back to 1267 when it was granted a Royal Charter by King Henry III.</span></span></p><span data-dcnode-id="4807" instrument_node="">
</span><h2 data-dcnode-id="4804"><span data-dcnode-id="4805" style="font-size:2.666667rem;"><span data-dcnode-id="4806" instrument_node="">25. Caber Tossing</span></span></h2><span data-dcnode-id="4803" instrument_node="">
</span><img alt="unusual sports - Caber Tossing" class="img-responsive" data-dcnode-id="4802" data-src="https://en.bcdn.biz/Images/2018/6/20/c278f2f5-669a-4739-859e-155ae4794ec5.jpg" height="487" src="data:," width="730"><span data-dcnode-id="4801" instrument_node="">
</span><p data-dcnode-id="4794"><span data-dcnode-id="4795" style="font-size:2.222222rem;"><span data-dcnode-id="4800" instrument_node="">Caber tossing is a </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scotland.org/events/highland-games/highland-games-traditions" target="_blank"><strong data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">traditional Scottish game</span></strong></a><span data-dcnode-id="4796" instrument_node=""> where people compete by tossing a heavy log, known as a caber (Gaelic for 'wooden beam'). However, the aim is not to toss it as far as possible but to vertically flip it over so that it lands in the '12 o'clock position' in reference to the thrower.</span></span></p><span data-dcnode-id="4793" instrument_node="">
</span><div class="col-xs-12 responsive-player" data-dcnode-id="4791" style="margin-bottom: 10px;"><div allowfullscreen="" class="lazy" data-dcnode-id="4792" data-loader="iframeLoader" data-src="https://www.youtube.com/embed/xb0FU8rSisU" frameborder="0" height="315" src="data:," width="560"></div></div><span data-dcnode-id="4790" instrument_node="">
</span></div><span data-dcnode-id="4788" instrument_node="">
</span><div class="col-xs-12" data-dcnode-id="4782" style="margin-bottom: 20px;"><span data-dcnode-id="4783" style="font-size:2.222222rem; "><span data-dcnode-id="4787" instrument_node="">If you enjoyed this article, then we think you'd like these </span><a data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/content.aspx%3Femailid%3D4976" target="_blank"><strong data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">hilarious well-timed&nbsp;sports photos!</span></strong></a></span></div><span data-dcnode-id="4781" instrument_node="">
</span></div><span data-dcnode-id="4779" instrument_node="">
</span></div><span data-dcnode-id="4777" instrument_node="">
