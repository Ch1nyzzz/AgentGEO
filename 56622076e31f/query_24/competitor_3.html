</span><li data-dcnode-id="1103"><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-touch.htm"><span data-dcnode-id="1106" instrument_node="">Touch Rugby</span></a><span data-dcnode-id="1104" instrument_node=""> — a team sport derived from Rugby Football, in which the tackling is replaced with just a touch.</span></li><span data-dcnode-id="1102" instrument_node="">
</span><li data-dcnode-id="1098"><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/car-racing-touring.htm"><span data-dcnode-id="1101" instrument_node="">Touring Car Racing</span></a><span data-dcnode-id="1099" instrument_node=""> — a type of auto track racing, which uses heavily modified road-going cars.</span></li><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1093"><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tower-running.htm"><span data-dcnode-id="1096" instrument_node="">Tower Running</span></a><span data-dcnode-id="1094" instrument_node=""> — grueling races up tall man-made structures. Also known as Stair Climbing.</span></li><span data-dcnode-id="1092" instrument_node="">
</span><li data-dcnode-id="1088"><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cycling-track.htm"><span data-dcnode-id="1091" instrument_node="">Track Cycling</span></a><span data-dcnode-id="1089" instrument_node=""> — bicycle races conducted on velodromes or other specially designed tracks that feature a steep banking.</span></li><span data-dcnode-id="1087" instrument_node="">
</span><li data-dcnode-id="1081"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/track-and-field.htm"><span data-dcnode-id="1086" instrument_node="">Track &amp; Field</span></a><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node=""> </span></strong><span data-dcnode-id="1082" instrument_node="">— also known as athletics.</span></li><span data-dcnode-id="1080" instrument_node="">
</span><li data-dcnode-id="1076"><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tractor-pulling.htm"><span data-dcnode-id="1079" instrument_node="">Tractor Pulling</span></a><span data-dcnode-id="1077" instrument_node=""> — a motorsport involving modified tractors that pull a weighted sled along a 10m wide, 100m track.</span></li><span data-dcnode-id="1075" instrument_node="">
</span><li data-dcnode-id="1071"><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/trampolining.htm"><span data-dcnode-id="1074" instrument_node="">Trampolining</span></a><span data-dcnode-id="1072" instrument_node=""> — competitors perform acrobatics while jumping on a trampoline.</span></li><span data-dcnode-id="1070" instrument_node="">
</span><li data-dcnode-id="1063"><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/shooting-trap.htm"><span data-dcnode-id="1069" instrument_node="">Trap Shooting</span></a><span data-dcnode-id="1067" instrument_node=""> — one of the variants of </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/shooting-clay-pigeon.htm"><span data-dcnode-id="1066" instrument_node="">clay pigeon shooting</span></a><span data-dcnode-id="1064" instrument_node="">, where 1 or 2 targets are thrown away from a trap situated 15m in front of the shooter.</span></li><span data-dcnode-id="1062" instrument_node="">
</span><li data-dcnode-id="1058"><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/equestrian-trec.htm"><span data-dcnode-id="1061" instrument_node="">TREC</span></a><span data-dcnode-id="1059" instrument_node=""> — a French equestrian sport in which the objective is to test both the horse and the rider in competitions consisting of three separate events.</span></li><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1053"><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/climbing-tree.htm"><span data-dcnode-id="1056" instrument_node="">Tree Climbing</span></a><span data-dcnode-id="1054" instrument_node=""> — competitions in which competitors climb trees as fast as possible using various techniques based on the daily working conditions of arborists.</span></li><span data-dcnode-id="1052" instrument_node="">
</span><li data-dcnode-id="1048"><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/triathle.htm"><span data-dcnode-id="1051" instrument_node="">Triathle</span></a><span data-dcnode-id="1049" instrument_node=""> — a shortened version of the Modern Pentathlon, athletes compete in shooting, swimming and running events as a part of a single race.</span></li><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1043"><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/triathlon.htm"><span data-dcnode-id="1046" instrument_node="">Triathlon</span></a><span data-dcnode-id="1044" instrument_node=""> — a race consisting of three events, usually swimming, cycling, and running in consecutive order.</span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1038"><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tricking.htm"><span data-dcnode-id="1041" instrument_node="">Tricking</span></a><span data-dcnode-id="1039" instrument_node=""> — performers combine martial arts movements with flips, kicks, twists and various dance moves to show off their tricks.</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1030"><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-triple-jump.htm"><span data-dcnode-id="1036" instrument_node=""> Triple jump</span></a><span data-dcnode-id="1034" instrument_node=""> — a track and field event where the participant attempts to hop, skip and jump the longest distance. Also called the hop, skip and jump for obvious reasons. Similar to the </span><a data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-long-jump.htm"><span data-dcnode-id="1033" instrument_node="">long jump</span></a><span data-dcnode-id="1031" instrument_node="">.</span></li><span data-dcnode-id="1029" instrument_node="">
</span><li data-dcnode-id="1025"><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/trugo.htm"><span data-dcnode-id="1028" instrument_node="">Trugo</span></a><span data-dcnode-id="1026" instrument_node=""> — Australian sport in which players strike a rubber ring, which is called a whell, with a mallet through goalposts.</span></li><span data-dcnode-id="1024" instrument_node="">
</span><li data-dcnode-id="1020"><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tug-of-war.htm"><span data-dcnode-id="1023" instrument_node="">Tug of War</span></a><span data-dcnode-id="1021" instrument_node=""> — two teams pull on opposite ends of a rope.</span></li><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1015"><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-tumbling.htm"><span data-dcnode-id="1018" instrument_node="">Tumbling</span></a><span data-dcnode-id="1016" instrument_node=""> — a gymnastics event involving tumbling along a mat performing flips, rolls, jumps, performing somersaults and handsprings.</span></li><span data-dcnode-id="1014" instrument_node="">
</span><li data-dcnode-id="1010"><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cricket-t20.htm"><span data-dcnode-id="1013" instrument_node="">Twenty20</span></a><span data-dcnode-id="1011" instrument_node=""> — a fast-paced limited over cricket match played 20 overs per team. Also known as T20 Cricket.</span></li><span data-dcnode-id="1009" instrument_node="">
</span></ul><div class="clearfix" data-dcnode-id="1007"></div><span data-dcnode-id="1006" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2714899191075238" data-ad-format="auto" data-ad-slot="1836756938" data-dcnode-id="1005" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1004" instrument_node="">
</span><h3 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">U Sports</span></h3><span data-dcnode-id="999" instrument_node="">
</span><ul data-dcnode-id="890"><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="994"><a data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ulama.htm"><span data-dcnode-id="997" instrument_node="">Ulama</span></a><span data-dcnode-id="995" instrument_node=""> — a traditional ball sport from Mexico, players keep the ball inbounds by hitting it with their hips or forearms.</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="989"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ultimate.htm"><span data-dcnode-id="992" instrument_node="">Ultimate</span></a><span data-dcnode-id="990" instrument_node=""> — played with a disc (frisbee), with points scored by passing the disc to a teammate in the opposing end zone.</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="984"><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ultralight-aviation.htm"><span data-dcnode-id="987" instrument_node=""> Ultralight Aviation</span></a><span data-dcnode-id="985" instrument_node=""> — events with lightweight aircraft which have 1 or 2 seat fixed-wings.</span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="979"><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ultramarathon.htm"><span data-dcnode-id="982" instrument_node="">Ultramarathon</span></a><span data-dcnode-id="980" instrument_node=""> — very long-distance endurance events, ranging from greater than Marathon distance to several days. Ultramarathons can either cover a specified distance, or take place during a specified time frame, with the winner covering the most distance in that time.</span></li><span data-dcnode-id="978" instrument_node="">
</span><li data-dcnode-id="971"><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-football.htm"><span data-dcnode-id="977" instrument_node="">Underwater</span></a><span data-dcnode-id="975" instrument_node=""> </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-football.htm"><span data-dcnode-id="974" instrument_node="">Football</span></a><span data-dcnode-id="972" instrument_node=""> — played in a swimming pool with snorkeling equipment, the aim is to maneuver a slightly negatively buoyant ball underwater (by carrying and passing) from one side of a pool to the other. Scoring is achieved by placing the ball in the gutter on the side of the pool.</span></li><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="966"><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-hockey.htm"><span data-dcnode-id="969" instrument_node="">Underwater Hockey</span></a><span data-dcnode-id="967" instrument_node=""> — two teams of six push a puck along the bottom of a swimming pool. (also known as 'Octopush' or Water Hockey).</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="958"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-ice-hockey.htm"><span data-dcnode-id="964" instrument_node="">Underwater Ice Hockey</span></a><span data-dcnode-id="962" instrument_node=""> — A variation of </span><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Ice Hockey </span></strong><span data-dcnode-id="959" instrument_node="">played upside-down underneath frozen pools or ponds. Participants wear snorkeling equipment and wet suits and use the underside of the frozen surface as the playing area for a floating puck (also called sub-aqua ice hockey).</span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="953"><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-orienteering.htm"><span data-dcnode-id="956" instrument_node="">Underwater Orienteering</span></a><span data-dcnode-id="954" instrument_node=""> — individual and team events in which competitors wearing scuba diving equipment swim an underwater course following a route marked on a map prepared by the competition organizers, using a compass and a counter meter to measure the distance covered.</span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="948"><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-photography.htm"><span data-dcnode-id="951" instrument_node="">Underwater Photography</span></a><span data-dcnode-id="949" instrument_node=""> — teams of competitors using scuba gear and using a digital underwater camera dive and photograph the same saltwater ocean sites at the same time over a two-day period, with the submitted digital images assessed to find the winner.</span></li><span data-dcnode-id="947" instrument_node="">
</span><li data-dcnode-id="943"><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-rugby.htm"><span data-dcnode-id="946" instrument_node="">Underwater Rugby</span></a><span data-dcnode-id="944" instrument_node=""> — two teams compete for a slightly negatively buoyant ball (filled with saltwater) and score by placing it into the opponents' goal (heavy metal bucket) at the bottom of a swimming pool.</span></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="938"><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/underwater-target-shooting.htm"><span data-dcnode-id="941" instrument_node="">Underwater Target Shooting</span></a><span data-dcnode-id="939" instrument_node=""> — competitors free dive in a swimming pool, using spearguns to fire at targets.</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="936" instrument_node="">Underwater Wrestling — an alternative name for </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/aquathlon.htm"><span data-dcnode-id="935" instrument_node="">Aquathlon</span></a><span data-dcnode-id="933" instrument_node="">.</span></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="927"><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-uneven-bars.htm"><span data-dcnode-id="930" instrument_node="">Uneven Bars</span></a><span data-dcnode-id="928" instrument_node=""> — an artistic gymnastics apparatus used only by female gymnasts comprising a pair of parallel bars set at different heights (also called asymmetric bars).</span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="922"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/unicycle-basketball.htm"><span data-dcnode-id="925" instrument_node="">Unicycle Basketball</span></a><span data-dcnode-id="923" instrument_node=""> — a version of Basketball with all competitors riding unicycles. The sport uses a regulation basketball on a regular basketball court with the same rules.</span></li><span data-dcnode-id="921" instrument_node="">
</span><li data-dcnode-id="917"><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/unicycle-handball.htm"><span data-dcnode-id="920" instrument_node="">Unicycle Handball</span></a><span data-dcnode-id="918" instrument_node=""> — competitors ride unicycles and a handball-sized ball, with the aim to throw it into a vertical hoop placed about 6 feet (1.8 m) above the ground.</span></li><span data-dcnode-id="916" instrument_node="">
</span><li data-dcnode-id="912"><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/unicycle-hockey.htm"><span data-dcnode-id="915" instrument_node=""> Unicycle Hockey</span></a><span data-dcnode-id="913" instrument_node=""> — a team sport, similar to roller or inline hockey, though all competitors are riding a unicycle and using a tennis ball and ice-hockey sticks.</span></li><span data-dcnode-id="911" instrument_node="">
</span><li data-dcnode-id="907"><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/unicycle-races.htm"><span data-dcnode-id="910" instrument_node="">Unicycling Racing</span></a><span data-dcnode-id="908" instrument_node=""> — a competition that involves racing using a unicycle.</span></li><span data-dcnode-id="906" instrument_node="">
</span><li data-dcnode-id="902"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/unicycle-trials.htm"><span data-dcnode-id="905" instrument_node="">Unicycle Trials</span></a><span data-dcnode-id="903" instrument_node=""> — a form of unicycling that involves participants riding a unicycle over obstacles without any part of the rider touching the ground.</span></li><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="897"><a data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/unicycling.htm"><span data-dcnode-id="900" instrument_node=""> Unicycling</span></a><span data-dcnode-id="898" instrument_node=""> — sports using a single-wheel cycle.</span></li><span data-dcnode-id="896" instrument_node="">
</span><li data-dcnode-id="892"><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/golf-urban.htm"><span data-dcnode-id="895" instrument_node="">Urban Golf</span></a><span data-dcnode-id="893" instrument_node=""> — golf played anywhere that there's free space and not too many people about.</span></li><span data-dcnode-id="891" instrument_node="">
</span></ul><span data-dcnode-id="889" instrument_node="">
</span><h3 data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">V Sports</span></h3><span data-dcnode-id="886" instrument_node="">
</span><ul data-dcnode-id="786"><span data-dcnode-id="885" instrument_node="">
</span><li data-dcnode-id="881"><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/vajramushti.htm"><span data-dcnode-id="884" instrument_node="">Vajra-mushti</span></a><span data-dcnode-id="882" instrument_node=""> — an Indian martial art in which a knuckleduster-like weapon called the Vajra-mushti is employed.</span></li><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="868"><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/valencian-fronto.htm"><span data-dcnode-id="879" instrument_node="">Va</span></a><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/valencian-fronto.htm"><span data-dcnode-id="877" instrument_node="">lencian Frontó</span></a><span data-dcnode-id="875" instrument_node=""> — modified </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/valencian-pilota.htm"><span data-dcnode-id="874" instrument_node="">Valencian Pilota</span></a><span data-dcnode-id="872" instrument_node=""> version of the original </span><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Basque Pelota</span></strong><span data-dcnode-id="869" instrument_node=""> game. The players don't stand face-to-face as in the more popular Valencian Pilota but share a common playing area.</span></li><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="857"><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/valencian-pilota.htm"><span data-dcnode-id="866" instrument_node="">Valencian Pilota</span></a><span data-dcnode-id="864" instrument_node=""> — is a traditional handball sport played in the Valencian Community of Spain. The ball is usually struck with a bare hand in a game involving two teams made from two up to five players each (depending on the particular version played). Unlike the original </span><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Basque Pelota</span></strong><span data-dcnode-id="861" instrument_node="">, it is not played against a wall. Instead, teams are placed face to face separated either by a line on the ground or a net. Versions include </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/valencian-fronto.htm"><span data-dcnode-id="860" instrument_node="">Valencian Frontó</span></a><span data-dcnode-id="858" instrument_node="">.</span></li><span data-dcnode-id="856" instrument_node="">
</span><li data-dcnode-id="852"><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/varpa.htm"><span data-dcnode-id="855" instrument_node="">Varpa</span></a><span data-dcnode-id="853" instrument_node=""> — an old outdoor game dating back to the Viking Age. It is similar to boules but played with a flat and heavy thrower known as "varpa" instead of balls, once made of shaped stones but nowadays aluminum is more popular.</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="841"><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/varzesh-e-bastani.htm"><span data-dcnode-id="850" instrument_node="">Varzesh-e Bastani</span></a><span data-dcnode-id="848" instrument_node=""> — a traditional Iranian martial arts. The sport is practiced in a gymnasium called </span><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Zourkhaneh</span></strong><span data-dcnode-id="845" instrument_node="">, which is another name by which the sport is known. Also called </span><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node=""> Varzesh-e Pahlavani</span></strong><span data-dcnode-id="842" instrument_node="">.</span></li><span data-dcnode-id="840" instrument_node="">
</span><li data-dcnode-id="836"><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-vault.htm"><span data-dcnode-id="839" instrument_node="">Vault</span></a><span data-dcnode-id="837" instrument_node=""> — an artistic gymnastics event for men and women, in which the athlete leaps over a vault or pommel horse, using the hands for pushing off.</span></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="831"><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skateboarding-vert.htm"><span data-dcnode-id="834" instrument_node="">Vert Skateboarding</span></a><span data-dcnode-id="832" instrument_node=""> — an acrobatic sport in which athletes riding a skateboard perform various tricks while being airborne.</span></li><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="826"><a data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skating-vert.htm"><span data-dcnode-id="829" instrument_node="">Vert Skating</span></a><span data-dcnode-id="827" instrument_node=""> — acrobatic inline or roller skating sport performed on a ramp.</span></li><span data-dcnode-id="825" instrument_node="">
</span><li data-dcnode-id="815"><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/vigoro.htm"><span data-dcnode-id="824" instrument_node="">Vigoro</span></a><span data-dcnode-id="822" instrument_node=""> — an Australian sport that combines elements of </span><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Cricket</span></strong><span data-dcnode-id="819" instrument_node=""> and </span><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Baseball</span></strong><span data-dcnode-id="816" instrument_node="">, mainly played by women. Played on a pitch shorter than for cricket, with a bat with a long handle like a paddle.</span></li><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Vintage Racing — a form of Auto-Racing, with vehicles limited to Vintage types.</span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="798"><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/volleyball.htm"><span data-dcnode-id="810" instrument_node="">Volleyball</span></a><span data-dcnode-id="808" instrument_node=""> — a game for two teams of six players, in which a large ball is hit by hand over a high net, the aim being to score points by making the ball reach the ground on the opponent's side of the court. See also </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/volleyball-beach.htm"><span data-dcnode-id="807" instrument_node="">Beach Volleyball</span></a><span data-dcnode-id="805" instrument_node="">. Similar sports and variations include </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/throwball.htm"><span data-dcnode-id="804" instrument_node="">Throwball</span></a><span data-dcnode-id="802" instrument_node="">, </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/newcomb-ball.htm"><span data-dcnode-id="801" instrument_node="">Newcomb Ball</span></a><span data-dcnode-id="799" instrument_node="">.</span></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="793"><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/vovinam.htm"><span data-dcnode-id="796" instrument_node="">Vovinam</span></a><span data-dcnode-id="794" instrument_node=""> — a Vietnamese martial art.</span></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="788"><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/vx.htm"><span data-dcnode-id="791" instrument_node="">Vx</span></a><span data-dcnode-id="789" instrument_node=""> — a ball sport from the UK, originally known as Rock-It-Ball. It is played by two teams of five players. The court is roughly the size of a basketball court, with 5 balls in play. Players carry a VstiX for carrying, throwing and catching the ball.</span></li><span data-dcnode-id="787" instrument_node="">
</span></ul><span data-dcnode-id="785" instrument_node="">
</span><h3 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">W Sports</span></h3><span data-dcnode-id="782" instrument_node="">
</span><ul data-dcnode-id="596"><span data-dcnode-id="781" instrument_node="">
</span><li data-dcnode-id="777"><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wakeboarding.htm"><span data-dcnode-id="780" instrument_node="">Wakeboarding</span></a><span data-dcnode-id="778" instrument_node=""> — riding a board and doing tricks on the wake behind a boat.</span></li><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="772"><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-walking.htm"><span data-dcnode-id="775" instrument_node="">Walking Football</span></a><span data-dcnode-id="773" instrument_node=""> — a version of association football in which players are only allowed to walk during game play, developed for older people to keep fit.</span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="767"><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/netball-walking.htm"><span data-dcnode-id="770" instrument_node="">Walking Netball</span></a><span data-dcnode-id="768" instrument_node=""> — a variation of netball, in which players can only walk, developed for older people to keep active.</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="762"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wallball.htm"><span data-dcnode-id="765" instrument_node="">Wallball</span></a><span data-dcnode-id="763" instrument_node=""> — a wall-based sport similar to squash in which a hi-bounce rubber ball has to be hit onto the wall after a single bounce.</span></li><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="757"><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wallyball.htm"><span data-dcnode-id="760" instrument_node="">Wallyball</span></a><span data-dcnode-id="758" instrument_node=""> — a variation of volleyball, that is played on a racquetball court enclosed with walls on all four sides.</span></li><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="752"><a data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/washer-pitching.htm"><span data-dcnode-id="755" instrument_node="">Washer Pitching</span></a><span data-dcnode-id="753" instrument_node=""> — a target throwing game similar to horseshoes, in which players take turns to toss washers into a box or hole.</span></li><span data-dcnode-id="751" instrument_node="">
</span><li data-dcnode-id="747"><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basketball-water.htm"><span data-dcnode-id="750" instrument_node="">Water Basketball</span></a><span data-dcnode-id="748" instrument_node=""> — a mix of basketball and water polo played in a swimming pool with basketball goals.</span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="742"><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/water-polo.htm"><span data-dcnode-id="745" instrument_node="">Water Polo</span></a><span data-dcnode-id="743" instrument_node=""> — a team sport played in swimming pools, the aim is to pass the ball over the water and into the goal net.</span></li><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="737"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/waterskiing.htm"><span data-dcnode-id="740" instrument_node="">Water Skiing</span></a><span data-dcnode-id="738" instrument_node=""> — riders are pulled along behind a boat skimming atop the water wearing one or two skis.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="732"><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/volleyball-water.htm"><span data-dcnode-id="735" instrument_node="">Water Volleyball</span></a><span data-dcnode-id="733" instrument_node=""> — a team sport derived from volleyball in which the games are played in water.</span></li><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="727"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/weightlifting-olympic.htm"><span data-dcnode-id="730" instrument_node="">Weightlifting</span></a><span data-dcnode-id="728" instrument_node=""> — in Olympic Weightlifting competitors attempt to lift weights, mounted on barbells, above their head.</span></li><span data-dcnode-id="726" instrument_node="">
</span><li data-dcnode-id="722"><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/throw-weight.htm"><span data-dcnode-id="725" instrument_node="">Weight Throw</span></a><span data-dcnode-id="723" instrument_node=""> — a family of heavy weight throwing events, in which the objective is to either throw the weight as far as possible or as high as possible.</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="717"><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/western-pleasure.htm"><span data-dcnode-id="720" instrument_node="">Western Pleasure</span></a><span data-dcnode-id="718" instrument_node=""> — a horse show competition in which horses are evaluated for their manners and composure.</span></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="712"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basketball-wheelchair.htm"><span data-dcnode-id="715" instrument_node="">Wheelchair Basketball</span></a><span data-dcnode-id="713" instrument_node=""> — basically regular basketball played on a wheelchair.</span></li><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="707"><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/curling-wheelchair.htm"><span data-dcnode-id="710" instrument_node="">Wheelchair Curling</span></a><span data-dcnode-id="708" instrument_node=""> — a variation of curling in which athletes with a disability affecting their lower limbs use a wheelchair to play the sport.</span></li><span data-dcnode-id="706" instrument_node="">
</span><li data-dcnode-id="702"><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/dancing-wheelchair.htm"><span data-dcnode-id="705" instrument_node="">Wheelchair Dancing</span></a><span data-dcnode-id="703" instrument_node=""> — all of the participants of a team perform dance routines while riding in a wheelchair.</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="694"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fencing-wheelchair.htm"><span data-dcnode-id="700" instrument_node="">Wheelchair Fencing</span></a><span data-dcnode-id="698" instrument_node=""> — a version of </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fencing.htm"><span data-dcnode-id="697" instrument_node="">Fencing</span></a><span data-dcnode-id="695" instrument_node=""> in which disabled athletes fight with thin swords while sitting in wheelchairs that are tightly fastened to the floor.</span></li><span data-dcnode-id="693" instrument_node="">
</span><li data-dcnode-id="689"><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wheelchair-racing.htm"><span data-dcnode-id="692" instrument_node="">Wheelchair Racing</span></a><span data-dcnode-id="690" instrument_node=""> — a type of racing in which athletes with physical disabilities compete with the help of a wheelchair.</span></li><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="684"><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-wheelchair.htm"><span data-dcnode-id="687" instrument_node="">Wheelchair Rugby</span></a><span data-dcnode-id="685" instrument_node=""> — a full-contact indoor team sport conducted for players with disabilities.</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="679"><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-league-wheelchair.htm"><span data-dcnode-id="682" instrument_node="">Wheelchair Rugby League</span></a><span data-dcnode-id="680" instrument_node=""> — a version of rugby league football but played using a wheelchair.</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="674"><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tennis-wheelchair.htm"><span data-dcnode-id="677" instrument_node="">Wheelchair Tennis</span></a><span data-dcnode-id="675" instrument_node=""> — a version of lawn tennis for those who have lower body disabilities.</span></li><span data-dcnode-id="673" instrument_node="">
</span><li data-dcnode-id="663"><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/whitewater-slalom.htm"><span data-dcnode-id="672" instrument_node="">Whitewater Slalom</span></a><span data-dcnode-id="670" instrument_node=""> — a </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kayaking.htm"><span data-dcnode-id="669" instrument_node="">kayaking</span></a><span data-dcnode-id="667" instrument_node=""> and </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/canoeing.htm"><span data-dcnode-id="666" instrument_node="">canoeing</span></a><span data-dcnode-id="664" instrument_node=""> sport in which athletes use a kayak or canoe to navigate through a course that consists of hanging gates on river rapids.</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="655"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wiffleball.htm"><span data-dcnode-id="661" instrument_node="">Wiffleball</span></a><span data-dcnode-id="659" instrument_node=""> — a variation of </span><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Baseball</span></strong><span data-dcnode-id="656" instrument_node=""> designed for indoor or outdoor play in confined areas, using a perforated, light-weight, rubbery plastic ball and a long, plastic yellow bat.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="650"><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/windsurfing.htm"><span data-dcnode-id="653" instrument_node="">Windsurfing</span></a><span data-dcnode-id="651" instrument_node=""> — riding a modified surfboard manoeuvered using a sail on a movable mast.</span></li><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="645"><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wingsuit-flying.htm"><span data-dcnode-id="648" instrument_node="">Wingsuit Flying</span></a><span data-dcnode-id="646" instrument_node=""> — a type of skydiving, where a person will fly in the air using a special jumpsuit called the wingsuit.</span></li><span data-dcnode-id="644" instrument_node="">
</span><li data-dcnode-id="640"><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/winter-guard.htm"><span data-dcnode-id="643" instrument_node="">Winter Guard</span></a><span data-dcnode-id="641" instrument_node=""> — an indoor sport of the color guard discipline in which teams perform several routines using supporting equipment to recorded background music.</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="635"><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/triathlon-winter.htm"><span data-dcnode-id="638" instrument_node="">Winter Triathlon</span></a><span data-dcnode-id="636" instrument_node=""> — athletes compete in running, mountain biking and cross-country skiing.</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="627"><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse-womens.htm"><span data-dcnode-id="633" instrument_node="">Women's lacrosse</span></a><span data-dcnode-id="631" instrument_node=""> — a limited-contact version of </span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse.htm"><span data-dcnode-id="630" instrument_node="">lacrosse</span></a><span data-dcnode-id="628" instrument_node="">.</span></li><span data-dcnode-id="626" instrument_node="">
</span><li data-dcnode-id="619"><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/woodball.htm"><span data-dcnode-id="625" instrument_node="">Woodball</span></a><span data-dcnode-id="623" instrument_node=""> — a sport where a mallet is used to pass a ball through gates. This game can be played on grass, sand or indoor. See also </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/woodball-beach.htm"><span data-dcnode-id="622" instrument_node="">Beach Woodball</span></a><span data-dcnode-id="620" instrument_node="">.</span></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="614"><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/woodchopping.htm"><span data-dcnode-id="617" instrument_node="">Wood Chopping</span></a><span data-dcnode-id="615" instrument_node=""> — participants attempt to cut or saw a log or other types of wood in the quickest time.</span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="603"><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/wrestling-sports.htm"><span data-dcnode-id="612" instrument_node="">Wrestling</span></a><span data-dcnode-id="610" instrument_node=""> — a general term for a combat sport between two competitors involving grappling-type techniques. Popular forms include the Olympic styles of </span><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Greco-Roman</span></strong><span data-dcnode-id="607" instrument_node=""> and </span><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Freestyle</span></strong><span data-dcnode-id="604" instrument_node="">. There are many regional forms of wrestling.</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="598"><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wushu.htm"><span data-dcnode-id="601" instrument_node="">Wushu</span></a><span data-dcnode-id="599" instrument_node=""> — a full-contact sport derived from traditional Chinese martial arts.</span></li><span data-dcnode-id="597" instrument_node="">
</span></ul><span data-dcnode-id="595" instrument_node="">
</span><h3 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">X Sports</span></h3><span data-dcnode-id="592" instrument_node="">
</span><ul data-dcnode-id="576"><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="584"><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/xare.htm"><span data-dcnode-id="590" instrument_node="">Xare</span></a><span data-dcnode-id="588" instrument_node=""> — a racket sport, a form of </span><a data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basque-pelota.htm"><span data-dcnode-id="587" instrument_node="">Basque pelota</span></a><span data-dcnode-id="585" instrument_node="">, where players face each other across a net that is strung across the middle of an indoor court.</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">Xingyiquan — is one of the major "internal" styles of Chinese martial arts (probably </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/what-is-a-sport.htm"><span data-dcnode-id="581" instrument_node="">not a sport</span></a><span data-dcnode-id="579" instrument_node="">).</span></li><span data-dcnode-id="577" instrument_node="">
</span></ul><span data-dcnode-id="575" instrument_node="">
</span><h3 data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Y Sports</span></h3><span data-dcnode-id="572" instrument_node="">
</span><ul data-dcnode-id="529"><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="559"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wrestling-oil.htm"><span data-dcnode-id="570" instrument_node="">Yağlı Güreş</span></a><span data-dcnode-id="568" instrument_node=""> — Turkish for Oil Wrestling, also called </span><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">grease wrestling</span></strong><span data-dcnode-id="565" instrument_node="">. In this form of </span><strong data-dcnode-id="561"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/wrestling-sports.htm"><span data-dcnode-id="564" instrument_node="">wrestling,</span></a><span data-dcnode-id="562" instrument_node=""> </span></strong><span data-dcnode-id="560" instrument_node=""> the wrestlers cover themselves in oil. It is the national sport of Turkey.</span></li><span data-dcnode-id="558" instrument_node="">
