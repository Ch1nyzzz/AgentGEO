</span><p data-dcnode-id="6180"><span data-dcnode-id="6184" instrument_node="">Here is our alphabetical list of over 800+ sports played around the world. In addition to individual sports, the list includes some names of sports groups, styles and codes. There is undoubtedly more sports than are listed here, there are many regional sports, modified rules and new sports being developed every day (see </span><a data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/new/index.htm"><span data-dcnode-id="6183" instrument_node="">new sports</span></a><span data-dcnode-id="6181" instrument_node="">).</span></p><span data-dcnode-id="6179" instrument_node="">
</span><p data-dcnode-id="6171"><span data-dcnode-id="6178" instrument_node="">The core of this list is the </span><a data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/recognized-sports.htm"><span data-dcnode-id="6177" instrument_node="">200+ recognized sports</span></a><span data-dcnode-id="6175" instrument_node=""> with national or international federations. There is also a comprehensive list of </span><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/team-sports.htm"><span data-dcnode-id="6174" instrument_node="">team sports</span></a><span data-dcnode-id="6172" instrument_node=""> that are played around the world.</span></p><span data-dcnode-id="6170" instrument_node="">
</span><p data-dcnode-id="6162"><span data-dcnode-id="6169" instrument_node="">You can find even more sports described in the section about </span><a data-dcnode-id="6167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/unusual/index.htm"><span data-dcnode-id="6168" instrument_node="">unusual sports</span></a><span data-dcnode-id="6166" instrument_node="">, and there are plenty of sports that are no longer played, which we have listed as </span><a data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/extinct/index.htm"><span data-dcnode-id="6165" instrument_node="">extinct sports</span></a><span data-dcnode-id="6163" instrument_node="">.</span></p><div class="clearfix" data-dcnode-id="6161"></div><span data-dcnode-id="6160" instrument_node="">

</span><li data-dcnode-id="6005"><span data-dcnode-id="6009" instrument_node="">All-Terrain Boarding — another name for </span><a data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/mountainboarding.htm"><span data-dcnode-id="6008" instrument_node="">Mountainboarding</span></a><span data-dcnode-id="6006" instrument_node="">.</span></li><span data-dcnode-id="6004" instrument_node="">
</span><li data-dcnode-id="6000"><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-alpine.htm"><span data-dcnode-id="6003" instrument_node="">Alpine Skiing</span></a><span data-dcnode-id="6001" instrument_node=""> — commonly known as Downhill Skiing, involves racing down snow-covered hills on skis with fixed-heel bindings. There are alpine skiing competitions in disciplines such as slalom, giant slalom, super giant slalom, and downhill.</span></li><span data-dcnode-id="5999" instrument_node="">
</span><li data-dcnode-id="5995"><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/mountaineering.htm"><span data-dcnode-id="5998" instrument_node="">Alpinism</span></a><span data-dcnode-id="5996" instrument_node=""> — the sport of mountain climbing.</span></li><span data-dcnode-id="5994" instrument_node="">
</span><li data-dcnode-id="5981"><a data-dcnode-id="5992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-american.htm"><span data-dcnode-id="5993" instrument_node=""> American Football</span></a><span data-dcnode-id="5991" instrument_node=""> — a team sport played on a rectangular field with goalposts at each end. Each team attempts to advance an oval ball down the field into the end zone by running or passing it. It is also known in some parts of the world (outside of the US) as </span><strong data-dcnode-id="5989"><span data-dcnode-id="5990" instrument_node="">Gridiron</span></strong><span data-dcnode-id="5988" instrument_node="">. In the US it is referred to simply as football. Variations include </span><a data-dcnode-id="5986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-arena.htm"><span data-dcnode-id="5987" instrument_node="">Arena Football</span></a><span data-dcnode-id="5985" instrument_node="">, </span><a data-dcnode-id="5983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-six-man.htm"><span data-dcnode-id="5984" instrument_node="">6-Man Football</span></a><span data-dcnode-id="5982" instrument_node="">.</span></li><span data-dcnode-id="5980" instrument_node="">
</span><li data-dcnode-id="5973"><a data-dcnode-id="5978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/handball-american.htm"><span data-dcnode-id="5979" instrument_node="">American Handball</span></a><span data-dcnode-id="5977" instrument_node=""> — players use their hands to hit a small rubber ball against a wall. There are three versions (four-wall handball, three-wall handball and one-wall handball) that can each be played by either two, three or four players. It can be compared to squash without rackets. It is very different from the Olympic sport of </span><a data-dcnode-id="5975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/handball.htm"><span data-dcnode-id="5976" instrument_node="">(Team) Handball</span></a><span data-dcnode-id="5974" instrument_node="">.</span></li><span data-dcnode-id="5972" instrument_node="">
</span><li data-dcnode-id="5967"><span data-dcnode-id="5971" instrument_node="">Angling — often used to refer to fishing, it is the principal method of </span><a data-dcnode-id="5969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fishing.htm"><span data-dcnode-id="5970" instrument_node="">sport fishing</span></a><span data-dcnode-id="5968" instrument_node="">.</span></li><span data-dcnode-id="5966" instrument_node="">

</span><li data-dcnode-id="5938"><a data-dcnode-id="5943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/aquathlon2.htm"><span data-dcnode-id="5944" instrument_node="">Aquathlon</span></a><span data-dcnode-id="5942" instrument_node=""> (2) — a continuous race involving swimming followed by running. It is usually over a shorter distance than the similar </span><a data-dcnode-id="5940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/biathle.htm"><span data-dcnode-id="5941" instrument_node="">Biathle</span></a><span data-dcnode-id="5939" instrument_node="">.</span></li><span data-dcnode-id="5937" instrument_node="">
</span><li data-dcnode-id="5912"><a data-dcnode-id="5935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery.htm"><span data-dcnode-id="5936" instrument_node="">Archery</span></a><span data-dcnode-id="5934" instrument_node=""> — competitive archery involves shooting arrows at a target for accuracy from a set distance or distances. The main forms of archery are </span><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-target.htm"><span data-dcnode-id="5933" instrument_node="">Target Archery</span></a><span data-dcnode-id="5931" instrument_node=""> and </span><a data-dcnode-id="5929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-field.htm"><span data-dcnode-id="5930" instrument_node="">Field Archery</span></a><span data-dcnode-id="5928" instrument_node="">, and others include </span><a data-dcnode-id="5926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-clout.htm"><span data-dcnode-id="5927" instrument_node="">Clout Archery</span></a><span data-dcnode-id="5925" instrument_node="">, </span><a data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-3d.htm"><span data-dcnode-id="5924" instrument_node="">3D archery</span></a><span data-dcnode-id="5922" instrument_node="">, </span><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-crossbow.htm"><span data-dcnode-id="5921" instrument_node="">Crossbow Archery</span></a><span data-dcnode-id="5919" instrument_node="">, </span><a data-dcnode-id="5917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-flight.htm"><span data-dcnode-id="5918" instrument_node="">Flight Archery</span></a><span data-dcnode-id="5916" instrument_node="">, and </span><a data-dcnode-id="5914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-ski.htm"><span data-dcnode-id="5915" instrument_node="">Ski Archery</span></a><span data-dcnode-id="5913" instrument_node="">.</span></li><span data-dcnode-id="5911" instrument_node="">
</span><li data-dcnode-id="5904"><a data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-arena.htm"><span data-dcnode-id="5910" instrument_node=""> Arena Football</span></a><span data-dcnode-id="5908" instrument_node=""> — a variety of&nbsp;</span><a data-dcnode-id="5906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-american.htm"><span data-dcnode-id="5907" instrument_node="">American Football</span></a><span data-dcnode-id="5905" instrument_node=""> (Gridiron), played indoors on a smaller field resulting in a faster and higher-scoring game.</span></li><span data-dcnode-id="5903" instrument_node="">
</span><li data-dcnode-id="5896"><a data-dcnode-id="5901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/polo-arena.htm"><span data-dcnode-id="5902" instrument_node="">Arena Polo</span></a><span data-dcnode-id="5900" instrument_node=""> — a minified version of </span><a data-dcnode-id="5898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/polo-horse.htm"><span data-dcnode-id="5899" instrument_node="">polo</span></a><span data-dcnode-id="5897" instrument_node=""> that is played on horseback on a field much smaller in size and enclosed by walls on all sides.</span></li><span data-dcnode-id="5895" instrument_node="">
</span><li data-dcnode-id="5888"><a data-dcnode-id="5893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-arena.htm"><span data-dcnode-id="5894" instrument_node="">Arena Rugby</span></a><span data-dcnode-id="5892" instrument_node=""> — a variation of&nbsp;</span><a data-dcnode-id="5890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-union.htm"><span data-dcnode-id="5891" instrument_node="">Rugby Union</span></a><span data-dcnode-id="5889" instrument_node="">, played indoors on a smaller field resulting in a faster and higher-scoring game.</span></li><span data-dcnode-id="5887" instrument_node="">
</span><li data-dcnode-id="5880"><a data-dcnode-id="5885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wrestling-arm.htm"><span data-dcnode-id="5886" instrument_node=""> Arm Wrestling</span></a><span data-dcnode-id="5884" instrument_node=""> — a type of </span><a data-dcnode-id="5882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/wrestling-sports.htm"><span data-dcnode-id="5883" instrument_node="">Wrestling</span></a><span data-dcnode-id="5881" instrument_node=""> where each participant place one elbow on a surface while gripping the other participant's hand. The aim is to pin the other's arm onto the surface.</span></li><span data-dcnode-id="5879" instrument_node="">
</span><li data-dcnode-id="5875"><a data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/arnis.htm"><span data-dcnode-id="5878" instrument_node="">Arnis</span></a><span data-dcnode-id="5876" instrument_node=""> — the national martial art sport of the Philippines which emphasizes weapon-based fighting.</span></li><span data-dcnode-id="5874" instrument_node="">
</span><li data-dcnode-id="5867"><a data-dcnode-id="5872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/billiards-artistic.htm"><span data-dcnode-id="5873" instrument_node=""> Artistic Billiards</span></a><span data-dcnode-id="5871" instrument_node=""> — a </span><a data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/billiards-carom.htm"><span data-dcnode-id="5870" instrument_node="">Carom Billiards</span></a><span data-dcnode-id="5868" instrument_node=""> discipline in which players score points for performing 76 preset shots of varying difficulty. It is sometimes called&nbsp;fantasy billiards.</span></li><span data-dcnode-id="5866" instrument_node="">
</span><li data-dcnode-id="5862"><a data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cycling-artistic.htm"><span data-dcnode-id="5865" instrument_node="">Artistic Cycling</span></a><span data-dcnode-id="5863" instrument_node=""> — a form of competitive indoor cycling in which athletes perform tricks for points on specialized, fixed-gear bikes in a format similar to ballet or gymnastics.</span></li><span data-dcnode-id="5861" instrument_node="">
</span><li data-dcnode-id="5833"><a data-dcnode-id="5859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-artistic.htm"><span data-dcnode-id="5860" instrument_node=""> Artistic Gymnastics</span></a><span data-dcnode-id="5858" instrument_node=""> — an Olympic sport where gymnasts perform short routines on different apparatus, such as the </span><a data-dcnode-id="5856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-vault.htm"><span data-dcnode-id="5857" instrument_node="">Vault</span></a><span data-dcnode-id="5855" instrument_node="">, </span><a data-dcnode-id="5853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-floor.htm"><span data-dcnode-id="5854" instrument_node="">Floor</span></a><span data-dcnode-id="5852" instrument_node=""> (men and women), </span><a data-dcnode-id="5850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-pommel-horse.htm"><span data-dcnode-id="5851" instrument_node="">Pommel Horse</span></a><span data-dcnode-id="5849" instrument_node="">, </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-rings.htm"><span data-dcnode-id="5848" instrument_node="">Rings</span></a><span data-dcnode-id="5846" instrument_node="">, </span><a data-dcnode-id="5844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-uneven-bars.htm"><span data-dcnode-id="5845" instrument_node="">Parallel Bars</span></a><span data-dcnode-id="5843" instrument_node="">, </span><a data-dcnode-id="5841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-horizontal-bar.htm"><span data-dcnode-id="5842" instrument_node="">High Bar</span></a><span data-dcnode-id="5840" instrument_node=""> (men), and </span><a data-dcnode-id="5838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-uneven-bars.htm"><span data-dcnode-id="5839" instrument_node="">Uneven Bars</span></a><span data-dcnode-id="5837" instrument_node="">, </span><a data-dcnode-id="5835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-balance-beam.htm"><span data-dcnode-id="5836" instrument_node="">Balance Beam</span></a><span data-dcnode-id="5834" instrument_node=""> (women).</span></li><span data-dcnode-id="5832" instrument_node="">
</span><li data-dcnode-id="5828"><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/pool-artistic.htm"><span data-dcnode-id="5831" instrument_node="">Artistic Pool</span></a><span data-dcnode-id="5829" instrument_node=""> — a trick shot competition on a pocket billiards table in which players score points for performing 56 preset shots of varying difficulty.</span></li><span data-dcnode-id="5827" instrument_node="">
</span><li data-dcnode-id="5823"><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/roller-skating-artistic.htm"><span data-dcnode-id="5826" instrument_node="">Artistic Roller Skating</span></a><span data-dcnode-id="5824" instrument_node=""> — is a sport that consists of a number of events (Figures, Dance, Freestyle and Precision Teams) usually accomplished on quad skates, though sometimes inline skates are used.</span></li><span data-dcnode-id="5822" instrument_node="">
</span><li data-dcnode-id="5815"><a data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/croquet-association.htm"><span data-dcnode-id="5821" instrument_node="">Association Croquet</span></a><span data-dcnode-id="5819" instrument_node=""> — an advanced game of </span><a data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/croquet.htm"><span data-dcnode-id="5818" instrument_node="">Croquet</span></a><span data-dcnode-id="5816" instrument_node=""> played at the international level involving four balls teamed in pairs, with both balls going through every hoop for one pair to win.</span></li><span data-dcnode-id="5814" instrument_node="">
</span><li data-dcnode-id="5804"><a data-dcnode-id="5812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-association.htm"><span data-dcnode-id="5813" instrument_node=""> Association Football</span></a><span data-dcnode-id="5811" instrument_node=""> — more commonly known as </span><strong data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">Football</span></strong><span data-dcnode-id="5808" instrument_node=""> or </span><strong data-dcnode-id="5806"><span data-dcnode-id="5807" instrument_node="">Soccer</span></strong><span data-dcnode-id="5805" instrument_node="">. It is the world's most popular sport, played between two teams of eleven players with a spherical ball. The game is played on a rectangular field with a goal at each end. The object is to score by using any part of the body except the arms and hands to get the ball into the opposing goal.</span></li><span data-dcnode-id="5803" instrument_node="">
</span><li data-dcnode-id="5784"><a data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/athletics/index.htm"><span data-dcnode-id="5802" instrument_node="">Athletics</span></a><span data-dcnode-id="5800" instrument_node=""> — commonly known as Track and Field, though it is an umbrella sport, which in addition to </span><strong data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">Track and Field</span></strong><span data-dcnode-id="5797" instrument_node=""> it also comprises </span><strong data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">Cross Country</span></strong><span data-dcnode-id="5794" instrument_node=""> </span><strong data-dcnode-id="5792"><span data-dcnode-id="5793" instrument_node="">Running</span></strong><span data-dcnode-id="5791" instrument_node="">, </span><strong data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">Road Running</span></strong><span data-dcnode-id="5788" instrument_node=""> and </span><strong data-dcnode-id="5786"><span data-dcnode-id="5787" instrument_node="">Racewalking</span></strong><span data-dcnode-id="5785" instrument_node="">.</span></li><span data-dcnode-id="5783" instrument_node="">
</span><li data-dcnode-id="5776"><a data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-australian.htm"><span data-dcnode-id="5782" instrument_node=""> Australian Football</span></a><span data-dcnode-id="5780" instrument_node=""> — a fast-paced football code from Australia, played between two teams of eighteen players on a large oval field</span><strong data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">.</span></strong><span data-dcnode-id="5777" instrument_node=""> Six points are scored by kicking the ball between two tall goalposts, or one point for passing the ball on either side of these. Alternative names are Australian Football, Aussie Rules, AFL, Australian Rules Football.</span></li><span data-dcnode-id="5775" instrument_node="">
</span><li data-dcnode-id="5768"><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/handball-australian.htm"><span data-dcnode-id="5774" instrument_node=""> Australian Handball</span></a><span data-dcnode-id="5772" instrument_node=""> — similar to </span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/squash.htm"><span data-dcnode-id="5771" instrument_node="">Squash</span></a><span data-dcnode-id="5769" instrument_node="">, though played without a racquet.</span></li><span data-dcnode-id="5767" instrument_node="">
</span><li data-dcnode-id="5763"><a data-dcnode-id="5765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/auto-race.htm"><span data-dcnode-id="5766" instrument_node="">Auto Race</span></a><span data-dcnode-id="5764" instrument_node=""> — a Japanese motorcycle speedway competition which is held on tarmac tracks, predominantly a gambling sport.</span></li><span data-dcnode-id="5762" instrument_node="">
</span><li data-dcnode-id="5755"><a data-dcnode-id="5760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/auto-racing.htm"><span data-dcnode-id="5761" instrument_node="">Auto Racing</span></a><span data-dcnode-id="5759" instrument_node=""> — a sport involving the racing of automobiles for competition. There are numerous different categories including Formula 1, Touring Car, Rally Cars, Drag Racing, Stock Car Racing,</span><strong data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node=""> Vintage Racing</span></strong><span data-dcnode-id="5756" instrument_node="">. Also known as Car Racing, Motor Racing or Automobile Racing.</span></li><span data-dcnode-id="5754" instrument_node="">
</span><li data-dcnode-id="5747"><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/autocross.htm"><span data-dcnode-id="5753" instrument_node="">Autocross</span></a><span data-dcnode-id="5751" instrument_node=""> — a type of Auto Racing in which drivers navigate one at a time through a defined course on either a sealed or an unsealed surface in the shortest time. See also the motorcycle version, </span><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-gymkhana.htm"><span data-dcnode-id="5750" instrument_node="">Motorcycle Gymkhana</span></a><span data-dcnode-id="5748" instrument_node="">.</span></li><span data-dcnode-id="5746" instrument_node="">
</span><li data-dcnode-id="5742"><a data-dcnode-id="5744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/autograss.htm"><span data-dcnode-id="5745" instrument_node="">Autograss</span></a><span data-dcnode-id="5743" instrument_node=""> — a type of Auto Racing on natural surfaces such as grass or mud, usually held on quarter-mile oval tracks.</span></li><span data-dcnode-id="5741" instrument_node="">
</span><li data-dcnode-id="5737"><a data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/autospeedway.htm"><span data-dcnode-id="5740" instrument_node="">Autospeedway</span></a><span data-dcnode-id="5738" instrument_node=""> — a motorsport similar to motorcycle speedway, but with cars.</span></li><span data-dcnode-id="5736" instrument_node="">
</span><li data-dcnode-id="5732"><a data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/throwing-axe.htm"><span data-dcnode-id="5735" instrument_node="">Axe Throwing</span></a><span data-dcnode-id="5733" instrument_node=""> — competitors throw axes at a circular target.</span></li><span data-dcnode-id="5731" instrument_node="">
</span></ul><span data-dcnode-id="5729" instrument_node="">
</span><h3 data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">B Sports</span></h3><span data-dcnode-id="5726" instrument_node="">
</span><ul data-dcnode-id="5629"><span data-dcnode-id="5725" instrument_node="">
</span><li data-dcnode-id="5721"><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/swimming-backstroke.htm"><span data-dcnode-id="5724" instrument_node="">Backstroke</span></a><span data-dcnode-id="5722" instrument_node=""> — a swimming stroke performed on the back with the arms lifted alternately out of the water in a backward circular motion and the legs extended and kicking.</span></li><span data-dcnode-id="5720" instrument_node="">
</span><li data-dcnode-id="5716"><a data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/badminton.htm"><span data-dcnode-id="5719" instrument_node="">Badminton</span></a><span data-dcnode-id="5717" instrument_node=""> — an indoor game with rackets in which a shuttlecock is hit back and forth across a net.</span></li><span data-dcnode-id="5715" instrument_node="">
</span><li data-dcnode-id="5711"><a data-dcnode-id="5713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-balance-beam.htm"><span data-dcnode-id="5714" instrument_node="">Balance Beam</span></a><span data-dcnode-id="5712" instrument_node=""> — a female Olympic Games gymnastics event in which a gymnast balances on a narrow horizontal bar raised off the floor, while performing exercises.</span></li><span data-dcnode-id="5710" instrument_node="">
</span><li data-dcnode-id="5703"><a data-dcnode-id="5708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/balkline.htm"><span data-dcnode-id="5709" instrument_node="">Balkline</span></a><span data-dcnode-id="5707" instrument_node=""> — a </span><strong data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">Carom Billiards </span></strong><span data-dcnode-id="5704" instrument_node="">discipline. A point is scored each time a player's cue ball makes contact with both object balls on a single stroke. It is played on a pocketless table that is divided by balklines on the cloth marking playing regions. Its precursor was a game called Straight Rail.</span></li><span data-dcnode-id="5702" instrument_node="">
</span><li data-dcnode-id="5695"><a data-dcnode-id="5700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/badminton-ball.htm"><span data-dcnode-id="5701" instrument_node="">Ball Badminton</span></a><span data-dcnode-id="5699" instrument_node=""> — a racket game native to India, played with a yellow ball made of wool, with similarities to </span><a data-dcnode-id="5697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/badminton.htm"><span data-dcnode-id="5698" instrument_node="">Badminton</span></a><span data-dcnode-id="5696" instrument_node="">.</span></li><span data-dcnode-id="5694" instrument_node="">
</span><li data-dcnode-id="5684"><a data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-ball.htm"><span data-dcnode-id="5693" instrument_node="">Ball Hockey</span></a><span data-dcnode-id="5691" instrument_node=""> — a variation of </span><a data-dcnode-id="5689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-ice.htm"><span data-dcnode-id="5690" instrument_node="">Ice Hockey</span></a><span data-dcnode-id="5688" instrument_node="">, a lot like </span><strong data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">Street Hockey</span></strong><span data-dcnode-id="5685" instrument_node="">, in which the game is played on foot on a non-ice surface, and a ball is used instead of a hockey puck.</span></li><span data-dcnode-id="5683" instrument_node="">
</span><li data-dcnode-id="5679"><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ballooning.htm"><span data-dcnode-id="5682" instrument_node="">Ballooning</span></a><span data-dcnode-id="5680" instrument_node=""> — competitive hot air ballooning is a test of accuracy, not speed. The aim is to fly as close as possible to a target and drop a weighted marker.</span></li><span data-dcnode-id="5678" instrument_node="">
</span><li data-dcnode-id="5671"><a data-dcnode-id="5676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bandy.htm"><span data-dcnode-id="5677" instrument_node="">Bandy</span></a><span data-dcnode-id="5675" instrument_node=""> — a team sport played on ice using sticks to direct a ball into the opposing team's goal, a precursor to ice hockey. A variation is </span><a data-dcnode-id="5673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bandy-rink.htm"><span data-dcnode-id="5674" instrument_node="">Rink Bandy</span></a><span data-dcnode-id="5672" instrument_node="">.</span></li><span data-dcnode-id="5670" instrument_node="">
</span><li data-dcnode-id="5666"><a data-dcnode-id="5668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/banger-racing.htm"><span data-dcnode-id="5669" instrument_node="">Banger Racing</span></a><span data-dcnode-id="5667" instrument_node=""> — racing event which is done on a dirt track using scrap cars.</span></li><span data-dcnode-id="5665" instrument_node="">
</span><li data-dcnode-id="5661"><a data-dcnode-id="5663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/banzai-skydiving.htm"><span data-dcnode-id="5664" instrument_node="">Banzai Skydiving</span></a><span data-dcnode-id="5662" instrument_node=""> — a form of skydiving in which the diver throws their parachute out the airplane door, waits and then jumps after it.</span></li><span data-dcnode-id="5660" instrument_node="">
</span><li data-dcnode-id="5656"><a data-dcnode-id="5658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/waterskiing-barefoot.htm"><span data-dcnode-id="5659" instrument_node="">Barefoot Skiing</span></a><span data-dcnode-id="5657" instrument_node=""> — involves skiing barefoot on water without the use of water skis.</span></li><span data-dcnode-id="5655" instrument_node="">
</span><li data-dcnode-id="5651"><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/boxing-bare-knuckle.htm"><span data-dcnode-id="5654" instrument_node="">Bare-knuckle boxing</span></a><span data-dcnode-id="5652" instrument_node=""> — two individuals participate to fight against each other without using boxing gloves or any other type of padding on their hands. Also called Fisticuffs.</span></li><span data-dcnode-id="5650" instrument_node="">
</span><li data-dcnode-id="5646"><a data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rodeo-barrel-racing.htm"><span data-dcnode-id="5649" instrument_node="">Barrel Racing</span></a><span data-dcnode-id="5647" instrument_node=""> — a rodeo event where participants and horses complete a clover-leaf pattern around barrels.</span></li><span data-dcnode-id="5645" instrument_node="">
</span><li data-dcnode-id="5641"><a data-dcnode-id="5643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/baseball.htm"><span data-dcnode-id="5644" instrument_node="">Baseball</span></a><span data-dcnode-id="5642" instrument_node=""> — a bat and ball game in which the aim is to hit the ball and score runs by running around four bases.</span></li><span data-dcnode-id="5640" instrument_node="">
</span><li data-dcnode-id="5636"><a data-dcnode-id="5638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/base-jumping.htm"><span data-dcnode-id="5639" instrument_node="">BASE Jumping</span></a><span data-dcnode-id="5637" instrument_node=""> — involves parachuting from a structure or cliff, with competitions based on landing accuracy.</span></li><span data-dcnode-id="5635" instrument_node="">
</span><li data-dcnode-id="5631"><a data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basketball.htm"><span data-dcnode-id="5634" instrument_node="">Basketball</span></a><span data-dcnode-id="5632" instrument_node=""> — players attempt to shoot the ball through the hoop on the opponent’s court, moving the ball by throwing and dribbling.</span></li><span data-dcnode-id="5630" instrument_node="">
</span></ul><span data-dcnode-id="5628" instrument_node="">
</span><div class="captioned" data-dcnode-id="5625"><img alt="basketball game" data-dcnode-id="5627" height="406" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/basketball/images/basketball-game-pixabay.jpg&amp;raw" width="700"><span data-dcnode-id="5626" instrument_node=""> basketball game</span></div><span data-dcnode-id="5624" instrument_node="">
</span><ul data-dcnode-id="5236"><span data-dcnode-id="5623" instrument_node="">
</span><li data-dcnode-id="5604"><a data-dcnode-id="5621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basque-pelota.htm"><span data-dcnode-id="5622" instrument_node="">Basque Pelota</span></a><span data-dcnode-id="5620" instrument_node=""> — a variety of court sports that involve hitting a ball against a wall using the hand, a racket, a wooden bat or a basket. Other forms include Pala Corta, Rubber-paleta, Paleta-Leather, </span><a data-dcnode-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/xare.htm"><span data-dcnode-id="5619" instrument_node="">Xare</span></a><span data-dcnode-id="5617" instrument_node="">, Cesta Punta, </span><a data-dcnode-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/frontenis.htm"><span data-dcnode-id="5616" instrument_node="">Frontenis</span></a><span data-dcnode-id="5614" instrument_node="">, Hand-Pelota, </span><a data-dcnode-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/valencian-pilota.htm"><span data-dcnode-id="5613" instrument_node="">Valencian Pilota</span></a><span data-dcnode-id="5611" instrument_node="">, </span><a data-dcnode-id="5609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/valencian-fronto.htm"><span data-dcnode-id="5610" instrument_node="">Valencian Frontó</span></a><span data-dcnode-id="5608" instrument_node="">. </span><a data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jai-alai.htm"><span data-dcnode-id="5607" instrument_node="">Jai Alai</span></a><span data-dcnode-id="5605" instrument_node=""> is a variety of Basque Pelota.</span></li><span data-dcnode-id="5603" instrument_node="">
</span><li data-dcnode-id="5599"><a data-dcnode-id="5601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basse.htm"><span data-dcnode-id="5602" instrument_node="">Basse</span></a><span data-dcnode-id="5600" instrument_node=""> — a bag ball game from Norway in which the ball is kept from landing in the player's area, using any part of the body except the hands.</span></li><span data-dcnode-id="5598" instrument_node="">
</span><li data-dcnode-id="5594"><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bat-and-trap.htm"><span data-dcnode-id="5597" instrument_node="">Bat-and-Trap</span></a><span data-dcnode-id="5595" instrument_node=""> — an old English bat and ball game, in which a ball is projected into the air out of a trap using a bat, and then hit between posts 21 feet away.</span></li><span data-dcnode-id="5593" instrument_node="">
</span><li data-dcnode-id="5589"><a data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/baton-twirling.htm"><span data-dcnode-id="5592" instrument_node="">Baton Twirling</span></a><span data-dcnode-id="5590" instrument_node=""> — a metal rod called a baton, is manipulated, while simultaneously making coordinated dance moves.</span></li><span data-dcnode-id="5588" instrument_node="">
</span><li data-dcnode-id="5583"><span data-dcnode-id="5587" instrument_node="">Bavarian Curling — another name for </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-stock-sport.htm"><span data-dcnode-id="5586" instrument_node="">Ice Stock Sport</span></a><span data-dcnode-id="5584" instrument_node="">.</span></li><span data-dcnode-id="5582" instrument_node="">
</span><li data-dcnode-id="5578"><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basketball-beach.htm"><span data-dcnode-id="5581" instrument_node="">Beach Basketball</span></a><span data-dcnode-id="5579" instrument_node=""> — a version of basketball played on sand with two teams of three players.</span></li><span data-dcnode-id="5577" instrument_node="">
</span><li data-dcnode-id="5573"><a data-dcnode-id="5575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/surflifesaving-flags.htm"><span data-dcnode-id="5576" instrument_node="">Beach Flags</span></a><span data-dcnode-id="5574" instrument_node=""> — a surf lifesaving sport in which competitors race in the sand to collect a flag.</span></li><span data-dcnode-id="5572" instrument_node="">
</span><li data-dcnode-id="5568"><a data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/golf-beach.htm"><span data-dcnode-id="5571" instrument_node="">Beach Golf</span></a><span data-dcnode-id="5569" instrument_node=""> — a simplified version of golf played on sand with a polyurethane foam ball.</span></li><span data-dcnode-id="5567" instrument_node="">

</span><li data-dcnode-id="5313"><span data-dcnode-id="5320" instrument_node="">Bowls — commonly refers to </span><a data-dcnode-id="5318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lawn-bowls.htm"><span data-dcnode-id="5319" instrument_node="">Lawn Bowls</span></a><span data-dcnode-id="5317" instrument_node="">. For other types of bowls sports, see </span><a data-dcnode-id="5315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/bowling-sports.htm"><span data-dcnode-id="5316" instrument_node="">Bowling</span></a><span data-dcnode-id="5314" instrument_node="">.</span></li><span data-dcnode-id="5312" instrument_node="">
</span><li data-dcnode-id="5308"><a data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse-box.htm"><span data-dcnode-id="5311" instrument_node="">Box lacrosse</span></a><span data-dcnode-id="5309" instrument_node=""> — a version of lacrosse that is played in a smaller indoor arena (box), with six players in each team.</span></li><span data-dcnode-id="5307" instrument_node="">
</span><li data-dcnode-id="5303"><a data-dcnode-id="5305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/boxing.htm"><span data-dcnode-id="5306" instrument_node="">Boxing</span></a><span data-dcnode-id="5304" instrument_node=""> — a combat sport in which two players throw punches at each other.</span></li><span data-dcnode-id="5302" instrument_node="">

</span><li data-dcnode-id="5281"><a data-dcnode-id="5283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/swimming-breaststroke.htm"><span data-dcnode-id="5284" instrument_node="">Breaststroke</span></a><span data-dcnode-id="5282" instrument_node=""> — one of the major swimming strokes, performed with the swimmer with his chest forward and facing towards to bottom of the pool.</span></li><span data-dcnode-id="5280" instrument_node="">

</span><li data-dcnode-id="5243"><a data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/swimming-butterfly.htm"><span data-dcnode-id="5246" instrument_node="">Butterfly stroke</span></a><span data-dcnode-id="5244" instrument_node=""> — one of the major swimming stroke styles, swum on the breast, with both arms moving simultaneously, accompanied by a "dolphin kick".</span></li><span data-dcnode-id="5242" instrument_node="">

</span><li data-dcnode-id="5086"><a data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fishing-casting.htm"><span data-dcnode-id="5089" instrument_node="">Casting</span></a><span data-dcnode-id="5087" instrument_node=""> — fishing without fish, the objective is to test the accuracy and distance of a cast.</span></li><span data-dcnode-id="5085" instrument_node="">

</span><li data-dcnode-id="4561"><a data-dcnode-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-enduro.htm"><span data-dcnode-id="4564" instrument_node="">Enduro</span></a><span data-dcnode-id="4562" instrument_node=""> — a motorcycle sport with the main objective to traverse a series of checkpoints, arriving exactly at a predetermined time. The courses are usually run over thickly wooded terrain, sometimes with large obstacles.</span></li><span data-dcnode-id="4560" instrument_node="">
</span><li data-dcnode-id="4556"><a data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-endurocross.htm"><span data-dcnode-id="4559" instrument_node="">Endurocross</span></a><span data-dcnode-id="4557" instrument_node=""> — hybrid sport combining elements from Supercross, Enduro, and Trials (also called indoor enduro).</span></li><span data-dcnode-id="4555" instrument_node="">
</span><li data-dcnode-id="4545"><a data-dcnode-id="4553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/billiards-english.htm"><span data-dcnode-id="4554" instrument_node=""> English Billiards</span></a><span data-dcnode-id="4552" instrument_node=""> — sometimes just called </span><strong data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">Billiards</span></strong><span data-dcnode-id="4549" instrument_node="">, requires two cue balls and a red object ball. The game features both cannons (caroms) and the pocketing of balls as objects of play, scoring points for each of these. See </span><a data-dcnode-id="4547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cue-sports.htm"><span data-dcnode-id="4548" instrument_node="">Cue Sports</span></a><span data-dcnode-id="4546" instrument_node="">.</span></li><span data-dcnode-id="4544" instrument_node="">
</span><li data-dcnode-id="4540"><a data-dcnode-id="4542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/equestrian.htm"><span data-dcnode-id="4543" instrument_node="">Equestrian</span></a><span data-dcnode-id="4541" instrument_node=""> — competitions testing horse riding skills.</span></li><span data-dcnode-id="4539" instrument_node="">
</span><li data-dcnode-id="4535"><a data-dcnode-id="4537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/equestrian-vaulting.htm"><span data-dcnode-id="4538" instrument_node="">Equestrian Vaulting</span></a><span data-dcnode-id="4536" instrument_node=""> — a gymnastics and dance discipline completed on horseback.</span></li><span data-dcnode-id="4534" instrument_node="">
</span><li data-dcnode-id="4530"><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/esports.htm"><span data-dcnode-id="4533" instrument_node="">e-Sports</span></a><span data-dcnode-id="4531" instrument_node=""> — competitive form of playing computer games (gaming).</span></li><span data-dcnode-id="4529" instrument_node="">
</span><li data-dcnode-id="4522"><a data-dcnode-id="4527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fives-eton.htm"><span data-dcnode-id="4528" instrument_node="">Eton Fives</span></a><span data-dcnode-id="4526" instrument_node=""> — a handball sport derived from the English sport </span><a data-dcnode-id="4524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fives.htm"><span data-dcnode-id="4525" instrument_node="">Fives</span></a><span data-dcnode-id="4523" instrument_node="">.</span></li><span data-dcnode-id="4521" instrument_node="">
</span><li data-dcnode-id="4516"><span data-dcnode-id="4520" instrument_node="">European (Team) Handball — another name for the sport of </span><a data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/handball.htm"><span data-dcnode-id="4519" instrument_node="">Handball</span></a><span data-dcnode-id="4517" instrument_node="">.</span></li><span data-dcnode-id="4515" instrument_node="">
</span><li data-dcnode-id="4511"><a data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/equestrian-eventing.htm"><span data-dcnode-id="4514" instrument_node="">Eventing</span></a><span data-dcnode-id="4512" instrument_node=""> — riders compete in three types of races, dressage, cross-country and show jumping, in a single competition.</span></li><span data-dcnode-id="4510" instrument_node="">
</span><li data-dcnode-id="4505"><span data-dcnode-id="4509" instrument_node="">Expedition racing — an endurance event combining two or more disciplines. More commonly called </span><a data-dcnode-id="4507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/adventure-racing.htm"><span data-dcnode-id="4508" instrument_node="">Adventure Racing</span></a><span data-dcnode-id="4506" instrument_node="">.</span></li><span data-dcnode-id="4504" instrument_node="">
</span></ul><span data-dcnode-id="4502" instrument_node="">
</span><h3 data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">F Sports</span></h3><span data-dcnode-id="4499" instrument_node="">
</span><ul data-dcnode-id="4150"><span data-dcnode-id="4498" instrument_node="">
</span><li data-dcnode-id="4494"><a data-dcnode-id="4496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/softball-fastpitch.htm"><span data-dcnode-id="4497" instrument_node="">Fast Pitch Softball </span></a><span data-dcnode-id="4495" instrument_node=""> — the competitive form of softball, where the pitcher's arm rotates 360 degrees around the shoulder until the ball is released from the hand.</span></li><span data-dcnode-id="4493" instrument_node="">

</span><li data-dcnode-id="4476"><a data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fencing.htm"><span data-dcnode-id="4479" instrument_node="">Fencing</span></a><span data-dcnode-id="4477" instrument_node=""> — competitors face each other and attempt to touch each other with the tip of a thin sword.</span></li><span data-dcnode-id="4475" instrument_node="">

</span><li data-dcnode-id="4449"><a data-dcnode-id="4451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-field.htm"><span data-dcnode-id="4452" instrument_node="">Field Hockey</span></a><span data-dcnode-id="4450" instrument_node=""> — played outdoors on turf, players hit a hard round ball through goals using sticks with curved ends.</span></li><span data-dcnode-id="4448" instrument_node="">

</span><li data-dcnode-id="4436"><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/shooting-field-target.htm"><span data-dcnode-id="4439" instrument_node="">Field Target</span></a><span data-dcnode-id="4437" instrument_node=""> — an outdoor air gun discipline.</span></li><span data-dcnode-id="4435" instrument_node="">

</span><li data-dcnode-id="4417"><a data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/figure-skating.htm"><span data-dcnode-id="4426" instrument_node="">Figure Skating</span></a><span data-dcnode-id="4424" instrument_node=""> — an artistic ice skating sport where athletes perform routines on an ice rink. Includes the disciplines of </span><strong data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">Ice Dancing</span></strong><span data-dcnode-id="4421" instrument_node=""> and </span><strong data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">Synchronized Skating</span></strong><span data-dcnode-id="4418" instrument_node="">.</span></li><span data-dcnode-id="4416" instrument_node="">
</span><li data-dcnode-id="4412"><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skittles-finnish.htm"><span data-dcnode-id="4415" instrument_node="">Finnish Skittles</span></a><span data-dcnode-id="4413" instrument_node=""> — opposing players take turns to knock down their opponent's skittles.</span></li><span data-dcnode-id="4411" instrument_node="">
</span><li data-dcnode-id="4407"><a data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/finswimming.htm"><span data-dcnode-id="4410" instrument_node="">Finswimming</span></a><span data-dcnode-id="4408" instrument_node=""> — an underwater swimming sport where athletes race against each other while wearing breathing apparatus.</span></li><span data-dcnode-id="4406" instrument_node="">
</span><li data-dcnode-id="4401"><span data-dcnode-id="4405" instrument_node="">Fishing — usually a recreational activity, though when in competition it can be a sport. See </span><a data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fishing.htm"><span data-dcnode-id="4404" instrument_node="">Sport Fishing</span></a><span data-dcnode-id="4402" instrument_node="">.</span></li><span data-dcnode-id="4400" instrument_node="">
</span><li data-dcnode-id="4396"><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fistball.htm"><span data-dcnode-id="4399" instrument_node="">Fistball</span></a><span data-dcnode-id="4397" instrument_node=""> — an outdoor team sport similar to volleyball.</span></li><span data-dcnode-id="4395" instrument_node="">
</span><li data-dcnode-id="4390"><span data-dcnode-id="4394" instrument_node="">Fisticuffs — another name for </span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/boxing-bare-knuckle.htm"><span data-dcnode-id="4393" instrument_node="">bare-knuckle boxing</span></a><span data-dcnode-id="4391" instrument_node="">.</span></li><span data-dcnode-id="4389" instrument_node="">

</span><li data-dcnode-id="4372"><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/billiards-five-pin.htm"><span data-dcnode-id="4378" instrument_node=""> Five-Pin Billiards</span></a><span data-dcnode-id="4376" instrument_node=""> — a </span><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/billiards-carom.htm"><span data-dcnode-id="4375" instrument_node="">Carom Billiards </span></a><span data-dcnode-id="4373" instrument_node="">discipline popular in Italy and Argentina, in which points are gained by using one's cue ball to cause the opponent's cue ball to knock over pins.</span></li><span data-dcnode-id="4371" instrument_node="">
</span><li data-dcnode-id="4367"><a data-dcnode-id="4369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fives.htm"><span data-dcnode-id="4370" instrument_node="">Fives</span></a><span data-dcnode-id="4368" instrument_node=""> — an English sport in which a ball is propelled against the walls in a specially designed court by using a bare or gloved hand.</span></li><span data-dcnode-id="4366" instrument_node="">
</span><li data-dcnode-id="4362"><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-flag.htm"><span data-dcnode-id="4365" instrument_node="">Flag Football</span></a><span data-dcnode-id="4363" instrument_node=""> — similar to American football but instead of tackling players the defensive team have to remove a flag from the ball carrier.</span></li><span data-dcnode-id="4361" instrument_node="">
</span><li data-dcnode-id="4354"><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-flight.htm"><span data-dcnode-id="4360" instrument_node="">Flight Archery</span></a><span data-dcnode-id="4358" instrument_node=""> — a form of </span><a data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery.htm"><span data-dcnode-id="4357" instrument_node="">archery</span></a><span data-dcnode-id="4355" instrument_node=""> in which the aim is to shoot the arrow as far as possible.</span></li><span data-dcnode-id="4353" instrument_node="">
</span><li data-dcnode-id="4349"><a data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gymnastics-floor.htm"><span data-dcnode-id="4352" instrument_node="">Floor (Gymnastics)</span></a><span data-dcnode-id="4350" instrument_node=""> — gymnasts perform a tumbling and dance routine on a floor space.</span></li><span data-dcnode-id="4348" instrument_node="">
</span><li data-dcnode-id="4344"><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-floor.htm"><span data-dcnode-id="4347" instrument_node="">Floor Hockey</span></a><span data-dcnode-id="4345" instrument_node=""> — refers to a collection of indoor hockey sports that were derived from various hockey codes, played on dry, flat floor surfaces such as a gymnasium or basketball court.</span></li><span data-dcnode-id="4343" instrument_node="">
</span><li data-dcnode-id="4339"><a data-dcnode-id="4341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/floorball.htm"><span data-dcnode-id="4342" instrument_node="">Floorball</span></a><span data-dcnode-id="4340" instrument_node=""> — a type of floor hockey sport played indoors, popular in Nordic countries.</span></li><span data-dcnode-id="4338" instrument_node="">
