</span><li data-dcnode-id="3444"><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kite-surfing.htm"><span data-dcnode-id="3447" instrument_node="">Kitesurfing</span></a><span data-dcnode-id="3445" instrument_node=""> — a board and kite are used on the water utilizing different styles consisting of freeride, speed, down winders and racing.</span></li><span data-dcnode-id="3443" instrument_node="">
</span><li data-dcnode-id="3439"><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/klootschieten.htm"><span data-dcnode-id="3442" instrument_node="">Klootschieten</span></a><span data-dcnode-id="3440" instrument_node=""> — German sport in which participants throw a ball as far as they can.</span></li><span data-dcnode-id="3438" instrument_node="">
</span><li data-dcnode-id="3434"><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kneeboarding.htm"><span data-dcnode-id="3437" instrument_node="">Kneeboarding</span></a><span data-dcnode-id="3435" instrument_node=""> — a waterskiing event where a participant is pulled along while kneeling on a convex board.</span></li><span data-dcnode-id="3433" instrument_node="">
</span><li data-dcnode-id="3429"><a data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/throwing-knife.htm"><span data-dcnode-id="3432" instrument_node="">Knife Throwing</span></a><span data-dcnode-id="3430" instrument_node=""> — like archery, the knife is thrown towards a target.</span></li><span data-dcnode-id="3428" instrument_node="">
</span><li data-dcnode-id="3424"><a data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kolf.htm"><span data-dcnode-id="3427" instrument_node="">Kolf</span></a><span data-dcnode-id="3425" instrument_node=""> — an indoor sport from the Netherlands, the aim is to get a ball as close to a pole as possible with&nbsp;rings marked on the ground around the target used to determine the score.</span></li><span data-dcnode-id="3423" instrument_node="">
</span><li data-dcnode-id="3419"><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/korfball.htm"><span data-dcnode-id="3422" instrument_node="">Korfball</span></a><span data-dcnode-id="3420" instrument_node=""> — a mixed-gender ball sport that is similar to netball and basketball, developed in The Netherlands.</span></li><span data-dcnode-id="3418" instrument_node="">
</span><li data-dcnode-id="3414"><a data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/krachtbal.htm"><span data-dcnode-id="3417" instrument_node="">Krachtbal</span></a><span data-dcnode-id="3415" instrument_node=""> — a team sport from Flanders, where points are scored by throwing the ball using a neck or back throw into the opponent’s goal area.</span></li><span data-dcnode-id="3413" instrument_node="">
</span><li data-dcnode-id="3409"><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/krolf.htm"><span data-dcnode-id="3412" instrument_node="">Krolf</span></a><span data-dcnode-id="3410" instrument_node=""> — a mix of croquet and golf from Denmark, players use a mallet to hit the ball into a hole.</span></li><span data-dcnode-id="3408" instrument_node="">
</span><li data-dcnode-id="3404"><a data-dcnode-id="3406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kronum.htm"><span data-dcnode-id="3407" instrument_node="">Kronum</span></a><span data-dcnode-id="3405" instrument_node=""> — a team sport that combines aspects of football, handball, basketball, and rugby into a single sport.</span></li><span data-dcnode-id="3403" instrument_node="">
</span><li data-dcnode-id="3399"><a data-dcnode-id="3401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bowling-kubb.htm"><span data-dcnode-id="3402" instrument_node="">Kubb</span></a><span data-dcnode-id="3400" instrument_node=""> — a lawn game where the object is to knock over wooden blocks ('kubbs') by throwing wooden batons at them.</span></li><span data-dcnode-id="3398" instrument_node="">
</span><li data-dcnode-id="3393"><span data-dcnode-id="3397" instrument_node="">Kung Fu — a general term for Chinese martial arts, the competition format is </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wushu.htm"><span data-dcnode-id="3396" instrument_node="">Wushu</span></a><span data-dcnode-id="3394" instrument_node="">.</span></li><span data-dcnode-id="3392" instrument_node="">
</span><li data-dcnode-id="3388"><a data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wrestling-kurash.htm"><span data-dcnode-id="3391" instrument_node="">Kurash</span></a><span data-dcnode-id="3389" instrument_node=""> — folk wrestling style from Central Asia in which wrestlers use towels to hold their opponents, and their goal is to throw their opponents off the feet.</span></li><span data-dcnode-id="3387" instrument_node="">
</span></ul><div class="clearfix" data-dcnode-id="3385"></div><span data-dcnode-id="3384" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2714899191075238" data-ad-format="auto" data-ad-slot="1836756938" data-dcnode-id="3383" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="3382" instrument_node="">
</span><h3 data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">L Sports</span></h3><span data-dcnode-id="3377" instrument_node="">
</span><ul data-dcnode-id="3238"><span data-dcnode-id="3376" instrument_node="">
</span><li data-dcnode-id="3360"><a data-dcnode-id="3374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse.htm"><span data-dcnode-id="3375" instrument_node="">Lacrosse </span></a><span data-dcnode-id="3373" instrument_node="">— a team game, originally played by North American Indians, in which the ball is thrown, caught, and carried with a long-handled stick with a piece of shallow netting at one end. Versions include </span><a data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse-field.htm"><span data-dcnode-id="3372" instrument_node="">Field Lacrosse</span></a><span data-dcnode-id="3370" instrument_node="">, </span><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse-box.htm"><span data-dcnode-id="3369" instrument_node="">Box Lacrosse</span></a><span data-dcnode-id="3367" instrument_node="">, </span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse-womens.htm"><span data-dcnode-id="3366" instrument_node="">Women's Lacrosse</span></a><span data-dcnode-id="3364" instrument_node="">, </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse-sixes.htm"><span data-dcnode-id="3363" instrument_node="">Sixes Lacrosse</span></a><span data-dcnode-id="3361" instrument_node="">.</span></li><span data-dcnode-id="3359" instrument_node="">
</span><li data-dcnode-id="3355"><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lagori.htm"><span data-dcnode-id="3358" instrument_node="">Lagori</span></a><span data-dcnode-id="3356" instrument_node=""> — from Southern India, this game involves a ball and a pile of flat stones. A member of one team throws a soft ball at a pile of stones to knock them over, then tries to restore the pile of stones while the opposing team throws the ball at them (also known as Lingocha).</span></li><span data-dcnode-id="3354" instrument_node="">
</span><li data-dcnode-id="3350"><a data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/sailing-land.htm"><span data-dcnode-id="3353" instrument_node=""> Land Sailing</span></a><span data-dcnode-id="3351" instrument_node=""> — racing in three-wheeled vehicles moving across land powered by wind through the use of a sail. Also known as sand yachting or land yachting.</span></li><span data-dcnode-id="3349" instrument_node="">
</span><li data-dcnode-id="3345"><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/land-speed-records.htm"><span data-dcnode-id="3348" instrument_node=""> Land Speed Records</span></a><span data-dcnode-id="3346" instrument_node=""> — in various vehicle classes, competitors attempt to create the fastest time over a fixed distance. Two runs are required in opposite directions within one hour to set a new mark.</span></li><span data-dcnode-id="3344" instrument_node="">
</span><li data-dcnode-id="3337"><a data-dcnode-id="3342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/windsurfing-land.htm"><span data-dcnode-id="3343" instrument_node=""> Land Windsurfing</span></a><span data-dcnode-id="3341" instrument_node=""> — similar to traditional </span><a data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/windsurfing.htm"><span data-dcnode-id="3340" instrument_node="">Windsurfing</span></a><span data-dcnode-id="3338" instrument_node=""> though performed on land rather than water, using a four-wheeled deck to travel across the surface. Also known as "Terrasailing", "street sailing", "land sailing" and "dirt windsurfing".</span></li><span data-dcnode-id="3336" instrument_node="">
</span><li data-dcnode-id="3332"><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lapta.htm"><span data-dcnode-id="3335" instrument_node="">Lapta</span></a><span data-dcnode-id="3333" instrument_node=""> — a Russian traditional bat and ball game. The aim of the game is to hit a ball, served by a player of the opposite team, with a bat as far as possible, then run across the field, and if possible back again.</span></li><span data-dcnode-id="3331" instrument_node="">
</span><li data-dcnode-id="3327"><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/laser-run.htm"><span data-dcnode-id="3330" instrument_node="">Laser Run</span></a><span data-dcnode-id="3328" instrument_node=""> — four legs of laser pistol shooting followed by an 800m run.</span></li><span data-dcnode-id="3326" instrument_node="">
</span><li data-dcnode-id="3322"><a data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skirmish-laser-tag.htm"><span data-dcnode-id="3325" instrument_node=""> Laser Tag</span></a><span data-dcnode-id="3323" instrument_node=""> — a skirmish sport in which players attempt to score points by tagging targets, typically with a hand-held infrared-emitting targeting device.</span></li><span data-dcnode-id="3321" instrument_node="">
</span><li data-dcnode-id="3317"><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lawn-bowls.htm"><span data-dcnode-id="3320" instrument_node=""> Lawn Bowls</span></a><span data-dcnode-id="3318" instrument_node=""> — the objective is to roll biased balls so that they stop close to a smaller ball called a "jack" or "kitty".</span></li><span data-dcnode-id="3316" instrument_node="">
</span><li data-dcnode-id="3312"><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lawn-mower-racing.htm"><span data-dcnode-id="3315" instrument_node="">Lawn Mower Racing</span></a><span data-dcnode-id="3313" instrument_node=""> — motorsport where participants use race-modified lawn mowers.</span></li><span data-dcnode-id="3311" instrument_node="">
</span><li data-dcnode-id="3307"><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/climbing-lead.htm"><span data-dcnode-id="3310" instrument_node="">Lead Climbing</span></a><span data-dcnode-id="3308" instrument_node=""> — climbers attempt to get highest on challenging route on a vertical wall within a pre-determined timeframe.</span></li><span data-dcnode-id="3306" instrument_node="">
</span><li data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Legends Car Racing — a racing sport using identical spec vehicles, with bodyshells made of 5/8-scale replicas of American automobiles from the 1930s and 1940s and powered by a Yamaha motorcycle engine.</span></li><span data-dcnode-id="3303" instrument_node="">
</span><li data-dcnode-id="3299"><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lelo-burti.htm"><span data-dcnode-id="3302" instrument_node=""> Lelo Burti</span></a><span data-dcnode-id="3300" instrument_node=""> — a Georgian folk sport, a full-contact ball game very similar to rugby.</span></li><span data-dcnode-id="3298" instrument_node="">
</span><li data-dcnode-id="3294"><a data-dcnode-id="3296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kickboxing-lethwei.htm"><span data-dcnode-id="3297" instrument_node="">Lethwei</span></a><span data-dcnode-id="3295" instrument_node=""> — an unarmed Burmese martial art similar to other kickboxing styles from the region.</span></li><span data-dcnode-id="3293" instrument_node="">
</span><li data-dcnode-id="3286"><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/letterboxing.htm"><span data-dcnode-id="3292" instrument_node="">Letterboxing</span></a><span data-dcnode-id="3290" instrument_node="">— an outdoor sport that combines orienteering, art, and puzzle solving. Small weatherproof boxes are hidden in publicly accessible places (like parks) and clues are distributed to find the box. Similar to </span><strong data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">GeoCaching</span></strong><span data-dcnode-id="3287" instrument_node="">.</span></li><span data-dcnode-id="3285" instrument_node="">
</span><li data-dcnode-id="3281"><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/log-rolling.htm"><span data-dcnode-id="3284" instrument_node="">Log Rolling</span></a><span data-dcnode-id="3282" instrument_node=""> — two challengers attempt to stay on a floating log the longest.</span></li><span data-dcnode-id="3280" instrument_node="">
</span><li data-dcnode-id="3276"><a data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skateboarding-longboard.htm"><span data-dcnode-id="3279" instrument_node="">Longboarding</span></a><span data-dcnode-id="3277" instrument_node=""> — a skateboarding sport in which athletes use a longboard to compete in downhill races.</span></li><span data-dcnode-id="3275" instrument_node="">
</span><li data-dcnode-id="3271"><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/golf-long-drive.htm"><span data-dcnode-id="3274" instrument_node="">Long Drive</span></a><span data-dcnode-id="3272" instrument_node=""> — golf competition in which players attempt to hit the ball the longest distance.</span></li><span data-dcnode-id="3270" instrument_node="">
</span><li data-dcnode-id="3263"><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-long-jump.htm"><span data-dcnode-id="3269" instrument_node="">Long Jump</span></a><span data-dcnode-id="3267" instrument_node=""> — a track and field event where the participant attempts to jump the longest into a sand pit. See also the similar </span><a data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-triple-jump.htm"><span data-dcnode-id="3266" instrument_node="">Triple Jump</span></a><span data-dcnode-id="3264" instrument_node="">.</span></li><span data-dcnode-id="3262" instrument_node="">
</span><li data-dcnode-id="3258"><a data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-speedway-longtrack.htm"><span data-dcnode-id="3261" instrument_node="">Long Track Motorcycle Speedway</span></a><span data-dcnode-id="3259" instrument_node=""> — a version of motorcycle speedway, but taking place on longer tracks at much higher speeds.</span></li><span data-dcnode-id="3257" instrument_node="">
</span><li data-dcnode-id="3250"><a data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/longue-paume.htm"><span data-dcnode-id="3256" instrument_node="">Longue Paume</span></a><span data-dcnode-id="3254" instrument_node=""> — an outdoor version of the racket sport, </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/extinct/jeu-de-paume.htm"><span data-dcnode-id="3253" instrument_node="">jeu de paume</span></a><span data-dcnode-id="3251" instrument_node="">, played without a net.</span></li><span data-dcnode-id="3249" instrument_node="">
</span><li data-dcnode-id="3245"><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/luge.htm"><span data-dcnode-id="3248" instrument_node="">Luge</span></a><span data-dcnode-id="3246" instrument_node=""> — a Winter Olympic sport in which competitors race down an ice track in a small one- or two-person sled lying supine (face up) and feet-first.</span></li><span data-dcnode-id="3244" instrument_node="">
</span><li data-dcnode-id="3240"><a data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lumberjack.htm"><span data-dcnode-id="3243" instrument_node=""> Lumberjack</span></a><span data-dcnode-id="3241" instrument_node=""> — competitions involving many different events, including log rolling, chopping, timed hot (power) saw and bucksaw cutting, and pole climbing.</span></li><span data-dcnode-id="3239" instrument_node="">
</span></ul><span data-dcnode-id="3237" instrument_node="">
</span><h3 data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">M Sports</span></h3><span data-dcnode-id="3234" instrument_node="">
</span><ul data-dcnode-id="3026"><span data-dcnode-id="3233" instrument_node="">
</span><li data-dcnode-id="3229"><a data-dcnode-id="3231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/mallakhamba.htm"><span data-dcnode-id="3232" instrument_node="">Mallakhamba</span></a><span data-dcnode-id="3230" instrument_node=""> — a traditional Indian sport, where athletes perform various types of gymnastics moves and hold various poses on a vertical wooden pole or a rope.</span></li><span data-dcnode-id="3228" instrument_node="">
</span><li data-dcnode-id="3224"><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/running-marathon.htm"><span data-dcnode-id="3227" instrument_node="">Marathon</span></a><span data-dcnode-id="3225" instrument_node=""> — a distance running athletics event over 42.2 km.</span></li><span data-dcnode-id="3223" instrument_node="">
</span><li data-dcnode-id="3219"><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/marching-band.htm"><span data-dcnode-id="3222" instrument_node="">Marching Band</span></a><span data-dcnode-id="3220" instrument_node=""> — a large team of participants play musical instruments as they perform various routines while moving around on a huge outdoor field.</span></li><span data-dcnode-id="3218" instrument_node="">
</span><li data-dcnode-id="3214"><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wrestling-mas.htm"><span data-dcnode-id="3217" instrument_node="">Mas Wrestling</span></a><span data-dcnode-id="3215" instrument_node=""> — participants sit and face each other with their feet braced against a board and each with both hands on a stick. The aim is to pull the other player over to your side.</span></li><span data-dcnode-id="3213" instrument_node="">
</span><li data-dcnode-id="3206"><a data-dcnode-id="3211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/matkot.htm"><span data-dcnode-id="3212" instrument_node="">Matkot</span></a><span data-dcnode-id="3210" instrument_node=""> — a beach paddle sport from Israel that is very similar to beach tennis. Also called </span><strong data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Frescobol</span></strong><span data-dcnode-id="3207" instrument_node="">.</span></li><span data-dcnode-id="3205" instrument_node="">
</span><li data-dcnode-id="3201"><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/shooting-metallic-silhouette.htm"><span data-dcnode-id="3204" instrument_node="">Metallic Silhouette Shooting</span></a><span data-dcnode-id="3202" instrument_node=""> — players compete to test their skills by shooting at silhouette metal targets.</span></li><span data-dcnode-id="3200" instrument_node="">
</span><li data-dcnode-id="3196"><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/footy-metro.htm"><span data-dcnode-id="3199" instrument_node="">Metro Footy</span></a><span data-dcnode-id="3197" instrument_node=""> — a modified version of Australian football played on a rectangular field, predominantly in the USA.</span></li><span data-dcnode-id="3195" instrument_node="">
</span><li data-dcnode-id="3188"><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-middle-distance.htm"><span data-dcnode-id="3194" instrument_node="">Middle Distance</span></a><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-sprint.htm"><strong data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node=""> </span></strong></a><span data-dcnode-id="3189" instrument_node=""> — a set of track and field running events over distances such as 800m, 1500m, not a sprint and not an endurance race.</span></li><span data-dcnode-id="3187" instrument_node="">
</span><li data-dcnode-id="3183"><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/pentathlon-military.htm"><span data-dcnode-id="3186" instrument_node="">Military Pentathlon</span></a><span data-dcnode-id="3184" instrument_node=""> — a competition involving a shooting phase, obstacle run, obstacle swimming, grenade throwing, and cross-country running.</span></li><span data-dcnode-id="3182" instrument_node="">
</span><li data-dcnode-id="3175"><a data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/mind-sports.htm"><span data-dcnode-id="3181" instrument_node="">Mind Sports</span></a><span data-dcnode-id="3179" instrument_node=""> — a family of sports in which the objective is to test mental strength rather than physical strength. Some may be considered actual sports such as </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cue-sport-novuss.htm"><span data-dcnode-id="3178" instrument_node="">speed cubing</span></a><span data-dcnode-id="3176" instrument_node="">, while others not (memory, chess).</span></li><span data-dcnode-id="3174" instrument_node="">
</span><li data-dcnode-id="3167"><a data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/golf-miniature.htm"><span data-dcnode-id="3173" instrument_node="">Minigolf or Miniature Golf</span></a><span data-dcnode-id="3171" instrument_node=""> — a game utilizing only the putting aspect of </span><strong data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">Golf</span></strong><span data-dcnode-id="3168" instrument_node="">, played on short holes on artificial putting surfaces often with obstacles. Officially called minigolf, but also can be called by the name miniature golf, mini-golf, midget golf, goofy golf, shorties, extreme golf, put-put, crazy golf, adventure golf, mini-putt and many others.</span></li><span data-dcnode-id="3166" instrument_node="">
</span><li data-dcnode-id="3159"><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-mini.htm"><span data-dcnode-id="3165" instrument_node="">Mini Rugby</span></a><span data-dcnode-id="3163" instrument_node=""> — a modified version for </span><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-union.htm"><span data-dcnode-id="3162" instrument_node="">Rugby Union</span></a><span data-dcnode-id="3160" instrument_node="">, to make the sport suitable to be introduced to children.</span></li><span data-dcnode-id="3158" instrument_node="">
</span><li data-dcnode-id="3154"><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/mma.htm"><span data-dcnode-id="3157" instrument_node="">Mixed Martial Arts (MMA)</span></a><span data-dcnode-id="3155" instrument_node=""> — a full-contact individual combat sport that includes aspects of several other combat
sports and martial arts.</span></li><span data-dcnode-id="3153" instrument_node="">
</span><li data-dcnode-id="3149"><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/modern-pentathlon.htm"><span data-dcnode-id="3152" instrument_node="">Modern Pentathlon</span></a><span data-dcnode-id="3150" instrument_node=""> — an Olympic sport that comprises five events: fencing, 200m freestyle swimming, show jumping, and a combined event of pistol shooting and 3200m cross country run.</span></li><span data-dcnode-id="3148" instrument_node="">
</span><li data-dcnode-id="3144"><a data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-mogul.htm"><span data-dcnode-id="3147" instrument_node="">Mogul Skiing</span></a><span data-dcnode-id="3145" instrument_node=""> — snow skiers compete on a specially designed downhill course, in which the primary focus is on the technique used for turns, aerial maneuvers, and speed.</span></li><span data-dcnode-id="3143" instrument_node="">
</span><li data-dcnode-id="3139"><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bowling-molkky.htm"><span data-dcnode-id="3142" instrument_node="">Mölkky</span></a><span data-dcnode-id="3140" instrument_node=""> — players use a wooden pin (also called "mölkky") to try to knock over wooden pins.</span></li><span data-dcnode-id="3138" instrument_node="">
</span><li data-dcnode-id="3134"><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wrestling-mongolian.htm"><span data-dcnode-id="3137" instrument_node="">Mongolian Wrestling</span></a><span data-dcnode-id="3135" instrument_node=""> — a folk wrestling style from the Mongolian region, in which the aim is to get your opponent to touch his upper body, knee or elbow to the ground.</span></li><span data-dcnode-id="3133" instrument_node="">
</span><li data-dcnode-id="3129"><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/broomball-moscow.htm"><span data-dcnode-id="3132" instrument_node="">Moscow Broomball</span></a><span data-dcnode-id="3130" instrument_node=""> — a variation of Broomball, an ice hockey type sport, played in Moscow and only by non-Russians.</span></li><span data-dcnode-id="3128" instrument_node="">
</span><li data-dcnode-id="3124"><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motoball.htm"><span data-dcnode-id="3127" instrument_node="">Motoball</span></a><span data-dcnode-id="3125" instrument_node=""> — similar to football, except all players (except goalkeepers) are riding motorcycles, and the ball is much bigger (also called Motorcycle Polo).</span></li><span data-dcnode-id="3123" instrument_node="">
</span><li data-dcnode-id="3116"><a data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motocross.htm"><span data-dcnode-id="3122" instrument_node="">Motocross</span></a><span data-dcnode-id="3120" instrument_node=""> — a form of motorcycle racing held on enclosed off-road circuits which include embankments and jumps. See also </span><a data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motocross-freestyle.htm"><span data-dcnode-id="3119" instrument_node="">Freestyle Motocross</span></a><span data-dcnode-id="3117" instrument_node="">.</span></li><span data-dcnode-id="3115" instrument_node="">
</span><li data-dcnode-id="3111"><a data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-road-racing.htm"><span data-dcnode-id="3114" instrument_node="">Motorcycling Road Racing</span></a><span data-dcnode-id="3112" instrument_node=""> — a motorcycle sport involving racing motorcycles as teams or individuals around a circular track. At the elite level it is in the form of MotoGP racing. Also known as Moto racing and Bike racing.</span></li><span data-dcnode-id="3110" instrument_node="">
</span><li data-dcnode-id="3103"><a data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-gymkhana.htm"><span data-dcnode-id="3109" instrument_node="">Motorcycle Gymkhana</span></a><span data-dcnode-id="3107" instrument_node=""> — a motorcycle time trial sport around cones on a paved area. The winner is the competitor who completes the course in the shortest time. Time penalties are incurred by putting a foot down, hitting a cone, or going outside the designated area. It is similar to car </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/autocross.htm"><span data-dcnode-id="3106" instrument_node="">Autocross</span></a><span data-dcnode-id="3104" instrument_node="">.</span></li><span data-dcnode-id="3102" instrument_node="">
</span><li data-dcnode-id="3098"><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-sidecar.htm"><span data-dcnode-id="3101" instrument_node="">Motorcycle Sidecar Racing</span></a><span data-dcnode-id="3099" instrument_node=""> — rider and a passenger compete in custom-built vehicles.</span></li><span data-dcnode-id="3097" instrument_node="">
</span><li data-dcnode-id="3087"><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-speedway.htm"><span data-dcnode-id="3096" instrument_node="">Motorcycle Speedway</span></a><span data-dcnode-id="3094" instrument_node=""> — a </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorsports.htm"><span data-dcnode-id="3093" instrument_node="">Motorsport</span></a><span data-dcnode-id="3091" instrument_node=""> in which the motorcycles have one gear and no brakes, and race around a circular track. Also commonly known by just Speedway. Variations include </span><strong data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">Ice Speedway</span></strong><span data-dcnode-id="3088" instrument_node="">.</span></li><span data-dcnode-id="3086" instrument_node="">
</span><li data-dcnode-id="3082"><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorcycle-trials.htm"><span data-dcnode-id="3085" instrument_node="">Motorcycle Trials</span></a><span data-dcnode-id="3083" instrument_node=""> — a test of skill on a motorcycle whereby the rider attempts to cover rocky terrain without placing a foot on the ground. The winner is the rider with the least penalty points. Known in the USA as "Observed Trials".</span></li><span data-dcnode-id="3081" instrument_node="">
</span><li data-dcnode-id="3077"><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motorsports.htm"><span data-dcnode-id="3080" instrument_node="">Motorsports</span></a><span data-dcnode-id="3078" instrument_node=""> — includes a wide range of sports, each linked with its use of a motor to propel a driver, and all have an element of thrill and danger for the driver and spectator.</span></li><span data-dcnode-id="3076" instrument_node="">
</span><li data-dcnode-id="3072"><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/mountain-biking.htm"><span data-dcnode-id="3075" instrument_node="">Mountain Biking</span></a><span data-dcnode-id="3073" instrument_node=""> — held on steep and rough terrain, involving jumps, rock gardens, and other obstacles.</span></li><span data-dcnode-id="3071" instrument_node="">
</span><li data-dcnode-id="3067"><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/unicycling-mountain.htm"><span data-dcnode-id="3070" instrument_node="">Mountain Unicycling</span></a><span data-dcnode-id="3068" instrument_node=""> — an adventure sport that consists of traversing rough terrain on a unicycle.</span></li><span data-dcnode-id="3066" instrument_node="">

<span data-dcnode-id="2935" instrument_node="">Nordic Combined</span></a><span data-dcnode-id="2933" instrument_node=""> and </span><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-telemark.htm"><span data-dcnode-id="2932" instrument_node="">Telemark Skiing</span></a><span data-dcnode-id="2930" instrument_node="">.</span></li><span data-dcnode-id="2928" instrument_node="">

</span><li data-dcnode-id="1305"><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/synchronized-skating.htm"><span data-dcnode-id="1311" instrument_node="">Synchronized Skating</span></a><span data-dcnode-id="1309" instrument_node=""> — a sport of the </span><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/figure-skating.htm"><span data-dcnode-id="1308" instrument_node="">figure skating</span></a><span data-dcnode-id="1306" instrument_node=""> discipline in which 8 to 20 skaters perform routines as a team on an ice rink.</span></li><span data-dcnode-id="1304" instrument_node="">
</span><li data-dcnode-id="1300"><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/synchronized-swimming.htm"><span data-dcnode-id="1303" instrument_node="">Synchronized Swimming</span></a><span data-dcnode-id="1301" instrument_node=""> — athletes perform synchronized dance routines to music while floating in the water.</span></li><span data-dcnode-id="1299" instrument_node="">
</span></ul><span data-dcnode-id="1297" instrument_node="">
</span><h3 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">T Sports</span></h3><span data-dcnode-id="1294" instrument_node="">
</span><ul data-dcnode-id="1008"><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1289"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-table.htm"><span data-dcnode-id="1292" instrument_node="">Table Football</span></a><span data-dcnode-id="1290" instrument_node=""> — also called Fußball or Foosball, using figures mounted on rows of rotatable bars to hit a ball.</span></li><span data-dcnode-id="1288" instrument_node="">

</span><li data-dcnode-id="1279"><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/taekwondo.htm"><span data-dcnode-id="1282" instrument_node="">Taekwondo</span></a><span data-dcnode-id="1280" instrument_node=""> — a self-defense discipline that originated in Korea.</span></li><span data-dcnode-id="1278" instrument_node="">
</span><li data-dcnode-id="1258"><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-tag.htm"><span data-dcnode-id="1277" instrument_node="">Tag Rugby</span></a><span data-dcnode-id="1275" instrument_node=""> — a team sport similar to touch rugby in which instead of a tackle a Velcro attached tag if pulled off the ball carrier. Similar in play to </span><strong data-dcnode-id="1272"><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rugby-touch.htm"><span data-dcnode-id="1274" instrument_node="">Touch Rugby</span></a></strong><span data-dcnode-id="1271" instrument_node="">. Also known as </span><strong data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Flag Rugby</span></strong><span data-dcnode-id="1268" instrument_node="">. Played in several forms, such as </span><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">OzTag</span></strong><span data-dcnode-id="1265" instrument_node=""> and </span><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Mini Tag</span></strong><span data-dcnode-id="1262" instrument_node="">. </span><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">American flag rugby</span></strong><span data-dcnode-id="1259" instrument_node=""> played in the US K1-9 is a variation of Tag Rugby.</span></li><span data-dcnode-id="1257" instrument_node="">
</span><li data-dcnode-id="1253"><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tamburello.htm"><span data-dcnode-id="1256" instrument_node="">Tamburello</span></a><span data-dcnode-id="1254" instrument_node=""> — racquet and a ball based sport from Italy.</span></li><span data-dcnode-id="1252" instrument_node="">
</span><li data-dcnode-id="1245"><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery-target.htm"><span data-dcnode-id="1251" instrument_node="">Target Archery</span></a><span data-dcnode-id="1249" instrument_node=""> — a popular </span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/archery.htm"><span data-dcnode-id="1248" instrument_node="">Archery</span></a><span data-dcnode-id="1246" instrument_node=""> competition where competitors shoot at stationary circular targets from different distances.</span></li><span data-dcnode-id="1244" instrument_node="">
</span><li data-dcnode-id="1240"><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/golf-target.htm"><span data-dcnode-id="1243" instrument_node="">Target Golf</span></a><span data-dcnode-id="1241" instrument_node=""> — players hit a golf ball at a large net, scoring points based on where the ball lands.</span></li><span data-dcnode-id="1239" instrument_node="">
</span><li data-dcnode-id="1235"><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/shooting-target.htm"><span data-dcnode-id="1238" instrument_node="">Target Shooting</span></a><span data-dcnode-id="1236" instrument_node=""> — guns of any type used for aiming at a target.</span></li><span data-dcnode-id="1234" instrument_node="">

</span><li data-dcnode-id="1225"><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tchoukball.htm"><span data-dcnode-id="1228" instrument_node="">Tchoukball</span></a><span data-dcnode-id="1226" instrument_node=""> — an indoor team sport in which the players can score by throwing a ball onto a rebound frame at either end of the court and the ball landing back on the court without being caught.</span></li><span data-dcnode-id="1224" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1223" instrument_node="">Team Handball — a commonly used name for the sport of </span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/handball.htm"><span data-dcnode-id="1222" instrument_node="">Handball</span></a><span data-dcnode-id="1220" instrument_node="">.</span></li><span data-dcnode-id="1218" instrument_node="">

</span><li data-dcnode-id="1204"><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tejo-argentina.htm"><span data-dcnode-id="1207" instrument_node="">Tejo (Argentina) </span></a><span data-dcnode-id="1205" instrument_node=""> — a sport from Argentina in which two teams throw metal discs to land as close as possible to a neutral disc.</span></li><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1199"><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tejo.htm"><span data-dcnode-id="1202" instrument_node="">Tejo (Colombia) </span></a><span data-dcnode-id="1200" instrument_node=""> — a Colombian sport in which metal discs are thrown 20m to a target that explodes when hit.</span></li><span data-dcnode-id="1198" instrument_node="">
</span><li data-dcnode-id="1194"><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-telemark.htm"><span data-dcnode-id="1197" instrument_node="">Telemark Skiing</span></a><span data-dcnode-id="1195" instrument_node=""> — The bindings for telemark skiing holds the boot by the toes, unlike Alpine Skiing which is fixed-heel. Also known as free hill skiing and telemarking.</span></li><span data-dcnode-id="1193" instrument_node="">

</span><li data-dcnode-id="1184"><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tennis.htm"><span data-dcnode-id="1187" instrument_node="">Tennis</span></a><span data-dcnode-id="1185" instrument_node=""> — a court sport where players use a stringed racket to hit a ball to each other over a net.</span></li><span data-dcnode-id="1183" instrument_node="">

</span><li data-dcnode-id="1174"><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bowling-tenpin.htm"><span data-dcnode-id="1177" instrument_node="">Tenpin Bowling </span></a><span data-dcnode-id="1175" instrument_node=""> — a player rolls a bowling ball along a wooden or synthetic lane to knock down pins.</span></li><span data-dcnode-id="1173" instrument_node="">
</span><li data-dcnode-id="1169"><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tent-pegging.htm"><span data-dcnode-id="1172" instrument_node="">Tent Pegging</span></a><span data-dcnode-id="1170" instrument_node=""> — the objective for a horse rider is to pierce, pick-up and carry a target, with a lance or a sword, as they gallop towards the target.</span></li><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1164"><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/teqball.htm"><span data-dcnode-id="1167" instrument_node="">Teqball</span></a><span data-dcnode-id="1165" instrument_node=""> — a new football-based sport that combines table tennis and football (soccer).</span></li><span data-dcnode-id="1163" instrument_node="">
</span><li data-dcnode-id="1159"><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cricket-test.htm"><span data-dcnode-id="1162" instrument_node="">Test Cricket</span></a><span data-dcnode-id="1160" instrument_node=""> — the longest form of cricket, played over 5 days.</span></li><span data-dcnode-id="1158" instrument_node="">
</span><li data-dcnode-id="1154"><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tetherball.htm"><span data-dcnode-id="1157" instrument_node="">Tetherball</span></a><span data-dcnode-id="1155" instrument_node=""> — two players hit a ball attached by a rope to the top of a stationary pole.</span></li><span data-dcnode-id="1153" instrument_node="">
</span><li data-dcnode-id="1149"><a data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-tetradecathlon.htm"><span data-dcnode-id="1152" instrument_node="">Tetradecathlon</span></a><span data-dcnode-id="1150" instrument_node=""> — a double heptathlon consisting of 14 events, including the 7 traditional heptathlon events with 7 additional track and field events.</span></li><span data-dcnode-id="1148" instrument_node="">
</span><li data-dcnode-id="1144"><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/tetrathlon.htm"><span data-dcnode-id="1147" instrument_node="">Tetrathlon</span></a><span data-dcnode-id="1145" instrument_node=""> — composed of 4 out of the 5 disciplines of Modern Pentathlon: Swimming, Running, Shooting and either Fencing or Equestrian.</span></li><span data-dcnode-id="1143" instrument_node="">
</span><li data-dcnode-id="1139"><a data-dcnode-id="1141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/horseracing-thoroughbred.htm"><span data-dcnode-id="1142" instrument_node="">Thoroughbred Racing</span></a><span data-dcnode-id="1140" instrument_node=""> — horse racing sport that involves the racing of thoroughbred horses.</span></li><span data-dcnode-id="1138" instrument_node="">
</span><li data-dcnode-id="1131"><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/billiards-three-cushion.htm"><span data-dcnode-id="1137" instrument_node="">Three-Cushion Billiards</span></a><span data-dcnode-id="1135" instrument_node=""> — a very challenging </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cue-sports.htm"><span data-dcnode-id="1134" instrument_node="">cue sport</span></a><span data-dcnode-id="1132" instrument_node=""> and Carom Billiards discipline, where the aim is to carom the cue ball off both object balls and contact the rail cushions at least three times before the last object ball.</span></li><span data-dcnode-id="1130" instrument_node="">
</span><li data-dcnode-id="1123"><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/throwball.htm"><span data-dcnode-id="1129" instrument_node="">Throwball</span></a><span data-dcnode-id="1127" instrument_node=""> — a sport very similar to </span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/newcomb-ball.htm"><span data-dcnode-id="1126" instrument_node="">Newcomb Ball</span></a><span data-dcnode-id="1124" instrument_node=""> (a variation of Volleyball) that is played in India.</span></li><span data-dcnode-id="1122" instrument_node="">
</span><li data-dcnode-id="1118"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/torball.htm"><span data-dcnode-id="1121" instrument_node="">Torball</span></a><span data-dcnode-id="1119" instrument_node=""> — a team sport for the visually impaired with an inflated ball with bells inside. The aim is to throw the ball through the opponent´s goal line.</span></li><span data-dcnode-id="1117" instrument_node="">
</span><li data-dcnode-id="1113"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/toros-coleados.htm"><span data-dcnode-id="1116" instrument_node="">Toros Coleados</span></a><span data-dcnode-id="1114" instrument_node=""> — involves chasing down a bull while riding on horseback (also called Bull-Tailing).</span></li><span data-dcnode-id="1112" instrument_node="">
