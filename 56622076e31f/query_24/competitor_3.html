</span><li data-dcnode-id="4318"><a data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/footbag-net.htm"><span data-dcnode-id="4321" instrument_node="">Footbag Net</span></a><span data-dcnode-id="4319" instrument_node=""> — players have to kick a footbag over a 5ft high net.</span></li><span data-dcnode-id="4317" instrument_node="">
</span><li data-dcnode-id="4304"><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football.htm"><span data-dcnode-id="4316" instrument_node="">Football</span></a><span data-dcnode-id="4314" instrument_node=""> — Around the world, Football mostly refers to </span><a data-dcnode-id="4312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-association.htm"><span data-dcnode-id="4313" instrument_node="">Association Football</span></a><span data-dcnode-id="4311" instrument_node="">, also known as </span><strong data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Soccer</span></strong><span data-dcnode-id="4308" instrument_node=""> in some places. In the USA, Football refers to </span><a data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-american.htm"><span data-dcnode-id="4307" instrument_node="">American Football (Gridiron)</span></a><span data-dcnode-id="4305" instrument_node="">. In Australia, Football refers to Australian Rules Football.</span></li><span data-dcnode-id="4303" instrument_node="">
</span><li data-dcnode-id="4296"><a data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-tennis.htm"><span data-dcnode-id="4302" instrument_node="">Football Tennis</span></a><span data-dcnode-id="4300" instrument_node=""> — also known as </span><em data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">futnet</span></em><span data-dcnode-id="4297" instrument_node="">, played by kicking a ball over a low net, with a bounce allowed.</span></li><span data-dcnode-id="4295" instrument_node="">
</span><li data-dcnode-id="4291"><a data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/footgolf.htm"><span data-dcnode-id="4294" instrument_node="">Footgolf</span></a><span data-dcnode-id="4292" instrument_node=""> — a mix of golf and football, where players use football skills to kick a ball into holes.</span></li><span data-dcnode-id="4290" instrument_node="">
</span><li data-dcnode-id="4286"><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/footpool.htm"><span data-dcnode-id="4289" instrument_node="">Footpool</span></a><span data-dcnode-id="4287" instrument_node=""> — novelty version of billiards using an oversized table and soccer balls.</span></li><span data-dcnode-id="4285" instrument_node="">
</span><li data-dcnode-id="4281"><a data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/footvolley.htm"><span data-dcnode-id="4284" instrument_node="">Footvolley</span></a><span data-dcnode-id="4282" instrument_node=""> — like beach volleyball though you can only use your feet.</span></li><span data-dcnode-id="4280" instrument_node="">
</span><li data-dcnode-id="4276"><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/formula-racing.htm"><span data-dcnode-id="4279" instrument_node="">Formula Racing</span></a><span data-dcnode-id="4277" instrument_node=""> — motor racing using open-wheeled single-seat vehicles.</span></li><span data-dcnode-id="4275" instrument_node="">
</span><li data-dcnode-id="4271"><a data-dcnode-id="4273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/four-square.htm"><span data-dcnode-id="4274" instrument_node="">Four Square</span></a><span data-dcnode-id="4272" instrument_node=""> — schoolyard ball game played in a quadrant.</span></li><span data-dcnode-id="4270" instrument_node="">
</span><li data-dcnode-id="4262"><span data-dcnode-id="4269" instrument_node="">Four-Ball — a </span><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/billiards-carom.htm"><span data-dcnode-id="4268" instrument_node="">Carom Billiards </span></a><span data-dcnode-id="4266" instrument_node="">discipline, played on a pocketless table with four balls (2 red, 2 white), where a point is scored when a player caroms on any two other balls, and two points are scored when the player caroms on each of the three other balls. A variant played in Asia is called </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/yotsudama.htm"><span data-dcnode-id="4265" instrument_node="">Yotsudama</span></a><span data-dcnode-id="4263" instrument_node="">.</span></li><span data-dcnode-id="4261" instrument_node="">
</span><li data-dcnode-id="4257"><a data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/free-diving.htm"><span data-dcnode-id="4260" instrument_node="">Freediving</span></a><span data-dcnode-id="4258" instrument_node=""> — underwater diving sport which relies on the diver’s ability to hold their breath.</span></li><span data-dcnode-id="4256" instrument_node="">
</span><li data-dcnode-id="4252"><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/freerunning.htm"><span data-dcnode-id="4255" instrument_node="">Freerunning</span></a><span data-dcnode-id="4253" instrument_node=""> — a version of parkour that adds acrobatic moves that are purely aesthetic, also known as tricking.</span></li><span data-dcnode-id="4251" instrument_node="">
</span><li data-dcnode-id="4247"><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bmx-freestyle.htm"><span data-dcnode-id="4250" instrument_node="">Freestyle BMX</span></a><span data-dcnode-id="4248" instrument_node=""> — stunt riding sport using BMX bikes.</span></li><span data-dcnode-id="4246" instrument_node="">
</span><li data-dcnode-id="4242"><a data-dcnode-id="4244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/disc-freestyle.htm"><span data-dcnode-id="4245" instrument_node="">Freestyle Flying Disc</span></a><span data-dcnode-id="4243" instrument_node=""> — creative, acrobatic, and athletic maneuvers with a flying disc.</span></li><span data-dcnode-id="4241" instrument_node="">
</span><li data-dcnode-id="4237"><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/footbag-freestyle.htm"><span data-dcnode-id="4240" instrument_node="">Freestyle Footbag</span></a><span data-dcnode-id="4238" instrument_node=""> — performing various tricks with a footbag.</span></li><span data-dcnode-id="4236" instrument_node="">
</span><li data-dcnode-id="4232"><a data-dcnode-id="4234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-freestyle.htm"><span data-dcnode-id="4235" instrument_node="">Freestyle Football</span></a><span data-dcnode-id="4233" instrument_node=""> — athletes compete to perform various tricks using a football.</span></li><span data-dcnode-id="4231" instrument_node="">
</span><li data-dcnode-id="4224"><a data-dcnode-id="4229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motocross-freestyle.htm"><span data-dcnode-id="4230" instrument_node=""> Freestyle Motocross</span></a><span data-dcnode-id="4228" instrument_node=""> — competition based upon points for acrobatic ability on an MX bike over jumps. See also </span><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/motocross.htm"><span data-dcnode-id="4227" instrument_node="">Motocross</span></a><span data-dcnode-id="4225" instrument_node="">.</span></li><span data-dcnode-id="4223" instrument_node="">
</span><li data-dcnode-id="4219"><a data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skateboarding-freestyle.htm"><span data-dcnode-id="4222" instrument_node="">Freestyle Skateboarding</span></a><span data-dcnode-id="4220" instrument_node=""> — performing tricks with a skateboard while flat ground skateboarding.</span></li><span data-dcnode-id="4218" instrument_node="">
</span><li data-dcnode-id="4214"><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-freestyle.htm"><span data-dcnode-id="4217" instrument_node="">Freestyle Skiing</span></a><span data-dcnode-id="4215" instrument_node=""> — different forms of freestyle skiing including Aerial skiing, Mogul skiing, Ski ballet, Ski cross, Half-pipe skiing, Slopestyle skiing.</span></li><span data-dcnode-id="4213" instrument_node="">
</span><li data-dcnode-id="4209"><a data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/inline-skating-slalom.htm"><span data-dcnode-id="4212" instrument_node="">Freestyle Slalom Skating</span></a><span data-dcnode-id="4210" instrument_node=""> — involves performing tricks around a straight line of equally spaced cones while wearing inline skates.</span></li><span data-dcnode-id="4208" instrument_node="">
</span><li data-dcnode-id="4204"><a data-dcnode-id="4206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/snowboarding-freestyle.htm"><span data-dcnode-id="4207" instrument_node="">Freestyle Snowboarding</span></a><span data-dcnode-id="4205" instrument_node=""> — competitors ride on a snowboard and do tricks along as they descend shoulders onto the mat to earn maximum scores.</span></li><span data-dcnode-id="4203" instrument_node="">
</span><li data-dcnode-id="4199"><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/swimming-freestyle.htm"><span data-dcnode-id="4202" instrument_node="">Freestyle Swimming</span></a><span data-dcnode-id="4200" instrument_node=""> — in these events competitors can swim using any stroke of their choice.</span></li><span data-dcnode-id="4198" instrument_node="">
</span><li data-dcnode-id="4194"><a data-dcnode-id="4196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wrestling-freestyle.htm"><span data-dcnode-id="4197" instrument_node="">Freestyle Wrestling</span></a><span data-dcnode-id="4195" instrument_node=""> — the objective is to pin down the opponent's shoulders onto the mat, the legs are allowed to be used.</span></li><span data-dcnode-id="4193" instrument_node="">
</span><li data-dcnode-id="4188"><span data-dcnode-id="4192" instrument_node="">Frescoball (see </span><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/matkot.htm"><span data-dcnode-id="4191" instrument_node="">Matkot</span></a><span data-dcnode-id="4189" instrument_node="">).</span></li><span data-dcnode-id="4187" instrument_node="">
</span><li data-dcnode-id="4183"><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fricket.htm"><span data-dcnode-id="4186" instrument_node="">Fricket</span></a><span data-dcnode-id="4184" instrument_node=""> — a ‘two-on-two’ flying disc game, also known as disc cricket, cups, suzy sticks and crispy wickets.</span></li><span data-dcnode-id="4182" instrument_node="">
</span><li data-dcnode-id="4178"><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/handball-frisian.htm"><span data-dcnode-id="4181" instrument_node="">Frisian Handball</span></a><span data-dcnode-id="4179" instrument_node=""> — a traditional sport from the Netherlands in which players attempt to land a ball at the end of a long rectangular field.</span></li><span data-dcnode-id="4177" instrument_node="">
</span><li data-dcnode-id="4173"><a data-dcnode-id="4175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/frontenis.htm"><span data-dcnode-id="4176" instrument_node="">Frontenis</span></a><span data-dcnode-id="4174" instrument_node=""> — a sport using rackets and a rubber ball on a ‘pelota court’.</span></li><span data-dcnode-id="4172" instrument_node="">
</span><li data-dcnode-id="4168"><a data-dcnode-id="4170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/shooting-fullbore-target-rifle.htm"><span data-dcnode-id="4171" instrument_node="">Fullbore target rifle</span></a><span data-dcnode-id="4169" instrument_node=""> — using rifles, shooters hit the paper targets in a prone position.</span></li><span data-dcnode-id="4167" instrument_node="">
</span><li data-dcnode-id="4162"><span data-dcnode-id="4166" instrument_node="">Fußball&nbsp;(also spelled Fussball) — this is the German name for (Association) Football, and also the name used for </span><a data-dcnode-id="4164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-table.htm"><span data-dcnode-id="4165" instrument_node="">Table Football</span></a><span data-dcnode-id="4163" instrument_node="">.</span></li><span data-dcnode-id="4161" instrument_node="">
</span><li data-dcnode-id="4157"><a data-dcnode-id="4159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/futsal.htm"><span data-dcnode-id="4160" instrument_node="">Futsal</span></a><span data-dcnode-id="4158" instrument_node=""> — a variant of association football played on a smaller field usually indoors.</span></li><span data-dcnode-id="4156" instrument_node="">
</span><li data-dcnode-id="4152"><a data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/fuzzball.htm"><span data-dcnode-id="4155" instrument_node="">Fuzzball</span></a><span data-dcnode-id="4153" instrument_node=""> — a street version of baseball played in some regions of the US.</span></li><span data-dcnode-id="4151" instrument_node="">
</span></ul><div class="clearfix" data-dcnode-id="4149"></div><span data-dcnode-id="4148" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2714899191075238" data-ad-format="auto" data-ad-slot="1836756938" data-dcnode-id="4147" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="4146" instrument_node="">
</span><h3 data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">G Sports</span></h3><span data-dcnode-id="4141" instrument_node="">
</span><ul data-dcnode-id="4029"><span data-dcnode-id="4140" instrument_node="">
</span><li data-dcnode-id="4136"><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-gaelic.htm"><span data-dcnode-id="4139" instrument_node="">Gaelic Football</span></a><span data-dcnode-id="4137" instrument_node=""> —a type of football from Ireland with a goal similar to that used in rugby but having a net attached below the crossbar. The object is to kick or punch the round ball into the net (three points) or over the crossbar (one point).</span></li><span data-dcnode-id="4135" instrument_node="">
</span><li data-dcnode-id="4131"><a data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/handball-gaelic.htm"><span data-dcnode-id="4134" instrument_node="">Gaelic Handball</span></a><span data-dcnode-id="4132" instrument_node=""> — a wall-based sport, played in Ireland, similar to squash though the ball is hit with the hand.</span></li><span data-dcnode-id="4130" instrument_node="">
</span><li data-dcnode-id="4126"><a data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gateball.htm"><span data-dcnode-id="4129" instrument_node="">Gateball</span></a><span data-dcnode-id="4127" instrument_node=""> — a team sport played with a wooden mallet and wooden balls. Each player attempts to strike their allocated ball through all the gates and finally strike the goal pole.</span></li><span data-dcnode-id="4125" instrument_node="">
</span><li data-dcnode-id="4115"><a data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-giant-slalom.htm"><span data-dcnode-id="4124" instrument_node="">Giant Slalom</span></a><span data-dcnode-id="4122" instrument_node=""> — downhill skiers have to navigate through a fixed set of gates, spaced farther apart than in </span><a data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-slalom.htm"><span data-dcnode-id="4121" instrument_node="">Slalom</span></a><span data-dcnode-id="4119" instrument_node=""> though not as much as in </span><a data-dcnode-id="4117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-super-g.htm"><span data-dcnode-id="4118" instrument_node="">Super-G</span></a><span data-dcnode-id="4116" instrument_node="">, therefore medium-sized turns.</span></li><span data-dcnode-id="4114" instrument_node="">
</span><li data-dcnode-id="4110"><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gilli-danda.htm"><span data-dcnode-id="4113" instrument_node="">Gilli-Danda</span></a><span data-dcnode-id="4111" instrument_node=""> — a South Asian game played with two sticks; the long stick is used to strike the shorter one in the air.</span></li><span data-dcnode-id="4109" instrument_node="">
</span><li data-dcnode-id="4105"><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/gliding.htm"><span data-dcnode-id="4108" instrument_node="">Gliding</span></a><span data-dcnode-id="4106" instrument_node=""> — an air sport in which pilots use an unpowered aircraft.</span></li><span data-dcnode-id="4104" instrument_node="">
</span><li data-dcnode-id="4100"><a data-dcnode-id="4102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/glima.htm"><span data-dcnode-id="4103" instrument_node="">Glima</span></a><span data-dcnode-id="4101" instrument_node=""> — a belt wrestling style from Scandinavia, based on a popular sport of the Vikings from over 1200 years ago.</span></li><span data-dcnode-id="4099" instrument_node="">
</span><li data-dcnode-id="4095"><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/goalball.htm"><span data-dcnode-id="4098" instrument_node="">Goalball</span></a><span data-dcnode-id="4096" instrument_node=""> — a Paralympic sport for blind athletes using a ball with bells.</span></li><span data-dcnode-id="4094" instrument_node="">
</span><li data-dcnode-id="4090"><a data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/golf.htm"><span data-dcnode-id="4093" instrument_node="">Golf</span></a><span data-dcnode-id="4091" instrument_node=""> — players use a club to hit balls into a series of holes on a course, using the fewest number of strokes.</span></li><span data-dcnode-id="4089" instrument_node="">
</span><li data-dcnode-id="4082"><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/croquet-golf.htm"><span data-dcnode-id="4088" instrument_node="">Golf Croquet</span></a><span data-dcnode-id="4086" instrument_node=""> — a popular form of </span><a data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/croquet.htm"><span data-dcnode-id="4085" instrument_node="">croquet</span></a><span data-dcnode-id="4083" instrument_node=""> in which each player takes a stroke in turn, trying to hit a ball through the same hoop.</span></li><span data-dcnode-id="4081" instrument_node="">
</span><li data-dcnode-id="4077"><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bowling-gorodki.htm"><span data-dcnode-id="4080" instrument_node="">Gorodki</span></a><span data-dcnode-id="4078" instrument_node=""> — a folk sport from Russia, where competitors strike down a group of cylindrical wooden objects by throwing a bat.</span></li><span data-dcnode-id="4076" instrument_node="">
</span><li data-dcnode-id="4072"><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/skiing-grass.htm"><span data-dcnode-id="4075" instrument_node="">Grass Skiing</span></a><span data-dcnode-id="4073" instrument_node=""> — involves skiing on grass-covered slopes on skis with wheels.</span></li><span data-dcnode-id="4071" instrument_node="">
</span><li data-dcnode-id="4067"><a data-dcnode-id="4069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/wrestling-greco-roman.htm"><span data-dcnode-id="4070" instrument_node="">Greco-Roman Wrestling</span></a><span data-dcnode-id="4068" instrument_node=""> — In this wrestling style, competitors are prohibited from holding any part of the opponent’s body below the waist.</span></li><span data-dcnode-id="4066" instrument_node="">
</span><li data-dcnode-id="4061"><span data-dcnode-id="4065" instrument_node="">Greyhound Racing — a dog sport also called </span><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/dog-racing.htm"><span data-dcnode-id="4064" instrument_node="">Dog Racing</span></a><span data-dcnode-id="4062" instrument_node="">.</span></li><span data-dcnode-id="4060" instrument_node="">

</span><h3 data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">I Sports</span></h3><span data-dcnode-id="3821" instrument_node="">

</span><li data-dcnode-id="3811"><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/climbing-ice.htm"><span data-dcnode-id="3814" instrument_node="">Ice Climbing</span></a><span data-dcnode-id="3812" instrument_node=""> — athletes climb vertical ice formations with the use of ropes and other protective gear.</span></li><span data-dcnode-id="3810" instrument_node="">
</span><li data-dcnode-id="3806"><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-cross-downhill.htm"><span data-dcnode-id="3809" instrument_node="">Ice Cross Downhill</span></a><span data-dcnode-id="3807" instrument_node=""> — an extreme winter racing sport that involves direct racing of multiple skaters on a downhill course.</span></li><span data-dcnode-id="3805" instrument_node="">
</span><li data-dcnode-id="3798"><a data-dcnode-id="3803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-dancing.htm"><span data-dcnode-id="3804" instrument_node="">Ice Dancing</span></a><span data-dcnode-id="3802" instrument_node=""> — one of the events in </span><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/figure-skating.htm"><span data-dcnode-id="3801" instrument_node="">Figure Skating</span></a><span data-dcnode-id="3799" instrument_node="">, which has its roots in ballroom dancing.</span></li><span data-dcnode-id="3797" instrument_node="">
</span><li data-dcnode-id="3793"><a data-dcnode-id="3795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-ice.htm"><span data-dcnode-id="3796" instrument_node="">Ice Hockey</span></a><span data-dcnode-id="3794" instrument_node=""> — a contact sport that is played on ice while wearing skates and using a stick to hit a puck into a goal.</span></li><span data-dcnode-id="3792" instrument_node="">
</span><li data-dcnode-id="3788"><a data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-racing.htm"><span data-dcnode-id="3791" instrument_node="">Ice Racing</span></a><span data-dcnode-id="3789" instrument_node=""> — racing of motorized vehicles on predominantly natural ice surfaces like frozen lakes or rivers.</span></li><span data-dcnode-id="3787" instrument_node="">
</span><li data-dcnode-id="3780"><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-speedway.htm"><span data-dcnode-id="3786" instrument_node="">Ice Speedway</span></a><span data-dcnode-id="3784" instrument_node=""> — similar to</span><strong data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node=""> Motorcycle Speedway Racing</span></strong><span data-dcnode-id="3781" instrument_node="">, though using a motorbike developed specifically for racing on ice. The bikes race anti-clockwise around oval tracks between 260 and 425 meters in length.</span></li><span data-dcnode-id="3779" instrument_node="">
</span><li data-dcnode-id="3775"><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-skating.htm"><span data-dcnode-id="3778" instrument_node="">Ice Skating</span></a><span data-dcnode-id="3776" instrument_node=""> — a range of sports that involve traveling on ice using metal blades attached to shoes, such as ice hockey, figure skating and speed skating.</span></li><span data-dcnode-id="3774" instrument_node="">
</span><li data-dcnode-id="3770"><a data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-sledge-racing.htm"><span data-dcnode-id="3773" instrument_node="">Ice Sledge Racing</span></a><span data-dcnode-id="3771" instrument_node=""> — a winter Paralympic sport in which contestants use a lightweight sledge and propel themselves using two poles.</span></li><span data-dcnode-id="3769" instrument_node="">
</span><li data-dcnode-id="3765"><a data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-stock-sport.htm"><span data-dcnode-id="3768" instrument_node="">Ice Stock Sport</span></a><span data-dcnode-id="3766" instrument_node=""> — a winter sport similar to curling, in which ice-stocks are slid across the ice to a target area. Also called Bavarian Curling.</span></li><span data-dcnode-id="3764" instrument_node="">
</span><li data-dcnode-id="3760"><a data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cycling-ice.htm"><span data-dcnode-id="3763" instrument_node="">Ice Track Cycling</span></a><span data-dcnode-id="3761" instrument_node=""> — racing a modified bicycle around a 400 m frozen track.</span></li><span data-dcnode-id="3759" instrument_node="">
</span><li data-dcnode-id="3755"><a data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ice-yachting.htm"><span data-dcnode-id="3758" instrument_node="">Ice Yachting</span></a><span data-dcnode-id="3756" instrument_node=""> — sail boats called ice yachts are used to race on frozen lakes and rivers.</span></li><span data-dcnode-id="3754" instrument_node="">
</span><li data-dcnode-id="3750"><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-icosathlon.htm"><span data-dcnode-id="3753" instrument_node="">Icosathlon</span></a><span data-dcnode-id="3751" instrument_node=""> — a double decathlon consisting of 20 events, including the 10 traditional decathlon events with 10 additional track and field events.</span></li><span data-dcnode-id="3749" instrument_node="">
</span><li data-dcnode-id="3745"><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/cricket-indoor.htm"><span data-dcnode-id="3748" instrument_node="">Indoor Cricket</span></a><span data-dcnode-id="3746" instrument_node=""> — a modified version of cricket played indoor with nets for walls.</span></li><span data-dcnode-id="3744" instrument_node="">
</span><li data-dcnode-id="3740"><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-field-indoor.htm"><span data-dcnode-id="3743" instrument_node="">Indoor Field Hockey</span></a><span data-dcnode-id="3741" instrument_node=""> — indoor team sport that was derived from field hockey.</span></li><span data-dcnode-id="3739" instrument_node="">
</span><li data-dcnode-id="3732"><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/netball-indoor.htm"><span data-dcnode-id="3738" instrument_node="">Indoor Netball</span></a><span data-dcnode-id="3736" instrument_node=""> — a variation of </span><a data-dcnode-id="3734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/netball.htm"><span data-dcnode-id="3735" instrument_node="">netball</span></a><span data-dcnode-id="3733" instrument_node="">, played indoors with netting all around the court.</span></li><span data-dcnode-id="3731" instrument_node="">
</span><li data-dcnode-id="3727"><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/rowing-indoor.htm"><span data-dcnode-id="3730" instrument_node="">Indoor Rowing</span></a><span data-dcnode-id="3728" instrument_node=""> — competitions performed on a rowing machine that simulates the on-water action.</span></li><span data-dcnode-id="3726" instrument_node="">
</span><li data-dcnode-id="3722"><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/soccer-indoor.htm"><span data-dcnode-id="3725" instrument_node="">Indoor Soccer</span></a><span data-dcnode-id="3723" instrument_node=""> — an indoor version of Association Football developed in North America with side walls keeping the ball in play.</span></li><span data-dcnode-id="3721" instrument_node="">
</span><li data-dcnode-id="3717"><a data-dcnode-id="3719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/triathlon-indoor.htm"><span data-dcnode-id="3720" instrument_node="">Indoor Triathlon</span></a><span data-dcnode-id="3718" instrument_node=""> — swimming in an indoor pool, cycling on a stationary bike, and running on an indoor track or treadmill.</span></li><span data-dcnode-id="3716" instrument_node="">
</span><li data-dcnode-id="3709"><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-inline.htm"><span data-dcnode-id="3715" instrument_node="">Inline Hockey</span></a><span data-dcnode-id="3713" instrument_node=""> — similar to </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/hockey-ice.htm"><span data-dcnode-id="3712" instrument_node="">ice hockey</span></a><span data-dcnode-id="3710" instrument_node="">, players move around on a wooden or concrete surface wearing inline skates.</span></li><span data-dcnode-id="3708" instrument_node="">
</span><li data-dcnode-id="3704"><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/inline-skating.htm"><span data-dcnode-id="3707" instrument_node="">Inline Skating</span></a><span data-dcnode-id="3705" instrument_node=""> — also known as roller blading, a variety of sports performed while wearing skates with two to five polyurethane wheels arranged in a single line.</span></li><span data-dcnode-id="3703" instrument_node="">
</span><li data-dcnode-id="3699"><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/speed-skating-inline.htm"><span data-dcnode-id="3702" instrument_node="">Inline Speed Skating</span></a><span data-dcnode-id="3700" instrument_node=""> — athletes use inline skates to race around tracks.</span></li><span data-dcnode-id="3698" instrument_node="">
</span><li data-dcnode-id="3691"><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/intercrosse.htm"><span data-dcnode-id="3697" instrument_node="">Intercrosse</span></a><span data-dcnode-id="3695" instrument_node=""> — a non-contact version of </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/lacrosse.htm"><span data-dcnode-id="3694" instrument_node="">lacrosse</span></a><span data-dcnode-id="3692" instrument_node="">.</span></li><span data-dcnode-id="3690" instrument_node="">
</span><li data-dcnode-id="3686"><a data-dcnode-id="3688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/international-fronton.htm"><span data-dcnode-id="3689" instrument_node="">International Fronton</span></a><span data-dcnode-id="3687" instrument_node=""> — played by striking a ball onto a wall with bare hands, using rules adapted from many wall ball sports.</span></li><span data-dcnode-id="3685" instrument_node="">
</span><li data-dcnode-id="3681"><a data-dcnode-id="3683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/international-game.htm"><span data-dcnode-id="3684" instrument_node="">International Game</span></a><span data-dcnode-id="3682" instrument_node=""> — a team sport that is played by striking a ball with hands, created so that players from similar handball sports could play against each other.</span></li><span data-dcnode-id="3680" instrument_node="">
</span><li data-dcnode-id="3670"><a data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/international-rules.htm"><span data-dcnode-id="3679" instrument_node="">International Rules Football</span></a><span data-dcnode-id="3677" instrument_node=""> — invented so that </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-australian.htm"><span data-dcnode-id="3676" instrument_node="">Aussie Rules Football</span></a><span data-dcnode-id="3674" instrument_node=""> players can play games against Irish </span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/football-gaelic.htm"><span data-dcnode-id="3673" instrument_node="">Gaelic football</span></a><span data-dcnode-id="3671" instrument_node=""> players.</span></li><span data-dcnode-id="3669" instrument_node="">
</span><li data-dcnode-id="3665"><a data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/bowling-irish-road.htm"><span data-dcnode-id="3668" instrument_node="">Irish Road Bowling</span></a><span data-dcnode-id="3666" instrument_node=""> — competitors attempt to take the fewest throws to propel a metal ball along a predetermined course of country roads.</span></li><span data-dcnode-id="3664" instrument_node="">
</span><li data-dcnode-id="3660"><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/surflifesaving-ironman.htm"><span data-dcnode-id="3663" instrument_node="">Ironman Surflifesaving</span></a><span data-dcnode-id="3661" instrument_node=""> — combines four major aspects of surf-lifesaving into a single race: swimming, board paddling, ski paddling, and beach running.</span></li><span data-dcnode-id="3659" instrument_node="">
</span></ul><span data-dcnode-id="3657" instrument_node="">
</span><h3 data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">J Sports</span></h3><span data-dcnode-id="3654" instrument_node="">
</span><ul data-dcnode-id="3577"><span data-dcnode-id="3653" instrument_node="">
</span><li data-dcnode-id="3646"><a data-dcnode-id="3651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jai-alai.htm"><span data-dcnode-id="3652" instrument_node="">Jai Alai</span></a><span data-dcnode-id="3650" instrument_node=""> — a sport derived from </span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/basque-pelota.htm"><span data-dcnode-id="3649" instrument_node="">Basque Pelota</span></a><span data-dcnode-id="3647" instrument_node="">, usually played indoors. Popular in many Latin American countries.</span></li><span data-dcnode-id="3645" instrument_node="">
</span><li data-dcnode-id="3641"><a data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/athletics-javelin.htm"><span data-dcnode-id="3644" instrument_node="">Javelin</span></a><span data-dcnode-id="3642" instrument_node=""> — track and field event involving throwing a spear-like implement as far as possible.</span></li><span data-dcnode-id="3640" instrument_node="">
</span><li data-dcnode-id="3636"><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jereed.htm"><span data-dcnode-id="3639" instrument_node="">Jereed</span></a><span data-dcnode-id="3637" instrument_node=""> — a traditional Turkish team equestrian sport in which the objective is to throw blunt wooden javelins at players of the opposing team.</span></li><span data-dcnode-id="3635" instrument_node="">
</span><li data-dcnode-id="3631"><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jetski-racing.htm"><span data-dcnode-id="3634" instrument_node="">Jet Ski Racing</span></a><span data-dcnode-id="3632" instrument_node=""> — a water sport similar to powerboat racing, in which riders use jet skis to compete.</span></li><span data-dcnode-id="3630" instrument_node="">
</span><li data-dcnode-id="3626"><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jetsprint.htm"><span data-dcnode-id="3629" instrument_node="">Jetsprint</span></a><span data-dcnode-id="3627" instrument_node=""> — a high-speed boat racing sport in which a team of two riders, race through a course by themselves in a time-trial format (also known as sprint boat racing).</span></li><span data-dcnode-id="3625" instrument_node="">
</span><li data-dcnode-id="3621"><a data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jeu-provencal.htm"><span data-dcnode-id="3624" instrument_node="">Jeu Provençal</span></a><span data-dcnode-id="3622" instrument_node=""> (Boule Lyonnaise) — a popular French form of Boules, where the objective is to throw a set of hollow metal balls as close as possible to a target ball.</span></li><span data-dcnode-id="3620" instrument_node="">
</span><li data-dcnode-id="3616"><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jianzi.htm"><span data-dcnode-id="3619" instrument_node="">Jianzi</span></a><span data-dcnode-id="3617" instrument_node=""> — a traditional Chinese national sport, where players aim to keep a shuttlecock-type object in the air by kicking it, usually played with a net between teams. Also called Shuttlecock.</span></li><span data-dcnode-id="3615" instrument_node="">
</span><li data-dcnode-id="3611"><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/joggling.htm"><span data-dcnode-id="3614" instrument_node="">Joggling</span></a><span data-dcnode-id="3612" instrument_node=""> — running (jogging) races while juggling.</span></li><span data-dcnode-id="3610" instrument_node="">
</span><li data-dcnode-id="3606"><a data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jokgu.htm"><span data-dcnode-id="3609" instrument_node="">Jokgu</span></a><span data-dcnode-id="3607" instrument_node=""> — a Korean sport that resembles a mix of football and volleyball.</span></li><span data-dcnode-id="3605" instrument_node="">
</span><li data-dcnode-id="3601"><a data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jorkyball.htm"><span data-dcnode-id="3604" instrument_node="">Jorkyball</span></a><span data-dcnode-id="3602" instrument_node=""> — a type of indoor soccer played on a small rectangular field surrounded by glass walls.</span></li><span data-dcnode-id="3600" instrument_node="">
</span><li data-dcnode-id="3596"><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/judo.htm"><span data-dcnode-id="3599" instrument_node="">Judo</span></a><span data-dcnode-id="3597" instrument_node=""> — the objective is to throw or takedown the opposing player to the ground.</span></li><span data-dcnode-id="3595" instrument_node="">
</span><li data-dcnode-id="3591"><a data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jugger.htm"><span data-dcnode-id="3594" instrument_node="">Jugger</span></a><span data-dcnode-id="3592" instrument_node=""> — a brutal sport inspired by the movie “The Salute of the Jugger”, the objective is for the team to get to the other team’s foam dog skull.</span></li><span data-dcnode-id="3590" instrument_node="">
</span><li data-dcnode-id="3584"><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jujutsu.htm"><span data-dcnode-id="3589" instrument_node="">Jiu-Jitsu / Jujutsu</span></a><strong data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node=""> </span></strong><span data-dcnode-id="3585" instrument_node="">— a Japanese martial art using close combat for defeating an armed and armored opponent, with only a short weapon or none at all.</span></li><span data-dcnode-id="3583" instrument_node="">
</span><li data-dcnode-id="3579"><a data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/jukskei.htm"><span data-dcnode-id="3582" instrument_node="">Jukskei</span></a><span data-dcnode-id="3580" instrument_node=""> — a folk sport from South Africa where competitors throw wooden pins to try and knock down a target wooden peg.</span></li><span data-dcnode-id="3578" instrument_node="">
</span></ul><span data-dcnode-id="3576" instrument_node="">
</span><h3 data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">K Sports</span></h3><span data-dcnode-id="3573" instrument_node="">
</span><ul data-dcnode-id="3386"><span data-dcnode-id="3572" instrument_node="">
</span><li data-dcnode-id="3568"><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kabaddi.htm"><span data-dcnode-id="3571" instrument_node="">Kabaddi</span></a><span data-dcnode-id="3569" instrument_node=""> — a "raider" enters the opposite team's half to tag opponents without taking a breath.</span></li><span data-dcnode-id="3567" instrument_node="">
</span><li data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Kaisa — a cue sport (type carom billiards) mainly played in Finland. (also known as Karoliina).</span></li><span data-dcnode-id="3564" instrument_node="">
</span><li data-dcnode-id="3560"><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kalaripayattu.htm"><span data-dcnode-id="3563" instrument_node="">Kalaripayattu</span></a><span data-dcnode-id="3561" instrument_node=""> — an ancient martial art from Kerala, India.</span></li><span data-dcnode-id="3559" instrument_node="">
</span><li data-dcnode-id="3555"><a data-dcnode-id="3557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/karate.htm"><span data-dcnode-id="3558" instrument_node="">Karate</span></a><span data-dcnode-id="3556" instrument_node=""> — a martial art developed in Japan that uses punching, kicking, knee strikes, elbow strikes, and some open-hand techniques.</span></li><span data-dcnode-id="3554" instrument_node="">

</span><li data-dcnode-id="3545"><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kayaking.htm"><span data-dcnode-id="3548" instrument_node="">Kayaking</span></a><span data-dcnode-id="3546" instrument_node=""> — boat races using a small, narrow boat propelled by means of a double-bladed paddle.</span></li><span data-dcnode-id="3544" instrument_node="">

</span><li data-dcnode-id="3488"><a data-dcnode-id="3490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kilikiti.htm"><span data-dcnode-id="3491" instrument_node="">Kilikiti</span></a><span data-dcnode-id="3489" instrument_node=""> — a traditional Tuvalu sport similar to cricket.</span></li><span data-dcnode-id="3487" instrument_node="">
</span><li data-dcnode-id="3483"><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kin-ball.htm"><span data-dcnode-id="3486" instrument_node="">Kin-Ball</span></a><span data-dcnode-id="3484" instrument_node=""> — played with three teams and a large inflated ball.</span></li><span data-dcnode-id="3482" instrument_node="">
</span><li data-dcnode-id="3478"><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/ki-o-rahi.htm"><span data-dcnode-id="3481" instrument_node="">Ki-o-rahi</span></a><span data-dcnode-id="3479" instrument_node=""> — a traditional New Zealand Maori game played on a circular field.</span></li><span data-dcnode-id="3477" instrument_node="">
</span><li data-dcnode-id="3473"><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kite-fighting.htm"><span data-dcnode-id="3476" instrument_node="">Kite Fighting</span></a><span data-dcnode-id="3474" instrument_node=""> — battle to cut the lines on the opponents' kites.</span></li><span data-dcnode-id="3472" instrument_node="">
</span><li data-dcnode-id="3468"><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kite-foil.htm"><span data-dcnode-id="3471" instrument_node="">Kite Foil Racing</span></a><span data-dcnode-id="3469" instrument_node=""> — kiteboard racing on boards with a&nbsp;hydrofoil&nbsp;that extends below the board into the water.</span></li><span data-dcnode-id="3467" instrument_node="">
</span><li data-dcnode-id="3463"><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.topendsports.com/sport/list/kite-landboarding.htm"><span data-dcnode-id="3466" instrument_node="">Kite Landboarding</span></a><span data-dcnode-id="3464" instrument_node=""> — using a kite and wind power to manoeuver a huge skateboard-type board over land.</span></li><span data-dcnode-id="3462" instrument_node="">
