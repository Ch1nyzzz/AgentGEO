</span><a class="popupFancyBox" data-dcnode-id="323" data-fancybox-type="iframe" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ich.unesco.org/en/photo-pop-up-00973%3FphotoID%3D01919" title=""><span data-dcnode-id="326" instrument_node="">

</span></div><span data-dcnode-id="318" instrument_node="">
</span></div><span data-dcnode-id="316" instrument_node="">
</span><p class="wiki-text" data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Instances of intangible cultural heritage are not limited to a single manifestation and many include elements from multiple domains. Take, for example, a shamanistic rite. This might involve traditional music and dance, prayers and songs, clothing and sacred items as well as ritual and ceremonial practices and an acute awareness and knowledge of the natural world. Similarly, festivals are complex expressions of intangible cultural heritage that include singing, dancing, theatre, feasting, oral tradition and storytelling, displays of craftsmanship, sports and other entertainments. The boundaries between domains are extremely fluid and often vary from community to community. It is difficult, if not impossible, to impose rigid categories externally. While one community might view their chanted verse as a form of ritual, another would interpret it as song. Similarly, what one community defines as ‘theatre’ might be interpreted as ‘dance’ in a different cultural context. There are also differences in scale and scope: one community might make minute distinctions between variations of expression while another group considers them all diverse parts of a single form.</span></p><span data-dcnode-id="313" instrument_node="">
</span><p class="wiki-text" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">While the Convention sets out a framework for identifying forms of intangible cultural heritage, the list of domains it provides is intended to be inclusive rather than exclusive; it is not necessarily meant to be ‘complete’. States may use a different system of domains. There is already a wide degree of variation, with some countries dividing up the manifestations of intangible cultural heritage differently, while others use broadly similar domains to those of the Convention with alternative names. They may add further domains or new sub-categories to existing domains. This may involve incorporating ‘sub-domains’ already in use in countries where intangible cultural heritage is recognized, including ‘traditional play and games’, ‘culinary traditions’, ‘animal husbandry’, ‘pilgrimage’ or ‘places of memory’.</span></p><span data-dcnode-id="310" instrument_node="">
</span></div><span data-dcnode-id="308" instrument_node="">
