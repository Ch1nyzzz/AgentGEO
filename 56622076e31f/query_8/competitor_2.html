</span><h2 data-dcnode-id="830"><a data-dcnode-id="832" id="about"></a><span data-dcnode-id="831" instrument_node="">Finns and Finnish Culture</span></h2><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="824"><b data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">The Kalevala: at the root of Finland</span></b><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
  It is said "to know the heart of Finns, you must read The Kalevala". First published in 1835, The Kalevala is Finland's national epic and draws from a rich oral tradition of folklore and mythology. Physician and philologist Elias Lönnrot travelled the Finnish-Russian borderlands recording the ballads and charms sung by the rural people. From these he assembled a fantastical tale of spells, love, war and revenge - a mythic history of the ancient Finns which fired the imaginations and national consciousness of the Finnish people, and became a foundation of Finnish cultural identity.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node=""> The tale is steeped in magic both dreamlike and dramatic. The Kalevala's heroes - who spend much time in the pursuit of wives and its attendant obstacles - include the wise shaman Väinämöinen, the skilful smith Ilmarinen and the reckless womanizer Lemminkäinen. Louhi, the Mistress of the North, and Marjatta, the young virgin of Kalevala, also feature importantly. Stories of the protagonists' interactions with each other, and the spiritual and natural worlds, unfold over fifty 'songs'.</span></p><span data-dcnode-id="820" instrument_node="">
</span><div class="photo" data-dcnode-id="818"><img alt="Kalevala" data-dcnode-id="819" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.expat-finland.com/images/kalevala.jpg&amp;raw" style="max-width:470px;"></div><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node=""> The Kalevala established Finnish as a literary language and inspired a flourishing of Finnish art and music. It also played a crucial role in the Finns' struggle for independence, providing a heroic history and a focus for national pride.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="810" multilinks-noscroll="true"><span data-dcnode-id="813" instrument_node=""> The Kalevala is not 'an easy read'. A good introduction is the </span><a data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cantos_of_the_Kalevala" rel="nofollow" target="_blank" title="en.wikipedia.org/wiki/Cantos_of_the_Kalevala"><span data-dcnode-id="812" instrument_node="">Wikipedia synopsis</span></a></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="808" instrument_node=""> Then - as you will be fascinated by how Finns ended up as they are! -   the</span><i data-dcnode-id="806"><span data-dcnode-id="807" instrument_node=""> complete </span></i><span data-dcnode-id="805" instrument_node="">Kalevala is available in English at the following sites,   free to read, share, and re-publish:</span><br data-dcnode-id="804"><span data-dcnode-id="803" instrument_node="">
</span><b data-dcnode-id="801"><span data-dcnode-id="802" instrument_node=""> PDF: </span></b><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jrbooksonline.com/pdf_books_added2009-2/kalevala.pdf" rel="nofollow" target="_blank" title="www.jrbooksonline.com/pdf_books_added2009-2/kalevala.pdf"><span data-dcnode-id="800" instrument_node="">www.jrbooksonline.com</span></a><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
</span><b data-dcnode-id="795"><span data-dcnode-id="796" instrument_node=""> Other formats, including Kindle: </span></b><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gutenberg.org/ebooks/5186" rel="nofollow" target="_blank"><span data-dcnode-id="794" instrument_node="">www.gutenberg.org/ebooks/5186</span></a></p><span data-dcnode-id="791" instrument_node="">
</span><h3 class="bott" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">What are Finns like? Direct!</span></h3><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">The best way to gain a contemporary understanding of Finland's culture and its people is to live here and interact with them. First impressions can be misleading. People from some cultures find Finns harsh, or even rude, because Finns are not  focused on verbal niceties like, for example, Americans and the British. Once you've been here a while, however, the no-nonsense Finnish culture may  be one of the reasons you choose to stay.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="771"><b data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">My experience: An alien in Finland</span></b><br data-dcnode-id="782"><span data-dcnode-id="781" instrument_node="">
      I'm from Australia; I like the direct Finnish approach and it was not too shocking for me when I first arrived because there are many similarities to my own culture. After almost 20 years in Finland though, I</span><i data-dcnode-id="779"><span data-dcnode-id="780" instrument_node=""> still </span></i><span data-dcnode-id="778" instrument_node="">sometimes feel 'slapped in the face' by the Finnish style. If you ever feel the same, try to remember it's unlikely the person you are talking to intends to be rude to you or offend you. If a Finn</span><i data-dcnode-id="776"><span data-dcnode-id="777" instrument_node=""> is </span></i><span data-dcnode-id="775" instrument_node="">being rude to you, you'll</span><i data-dcnode-id="773"><span data-dcnode-id="774" instrument_node=""> know </span></i><span data-dcnode-id="772" instrument_node="">about it!</span></p><span data-dcnode-id="770" instrument_node="">
</span><p class="bott" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">I'm not in Finland for the weather; I'm here because of the people and their culture</span></p><span data-dcnode-id="767" instrument_node="">
</span><ul data-dcnode-id="728"><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="756"><b data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Finns are usually honest and responsible</span></b><span data-dcnode-id="763" instrument_node="">, without requiring an omnipresent police force. Finns don't vandalise or steal the infrastructure, so everything's in good shape. Finns are safe drivers; most Finns won't get behind the wheel after even</span><i data-dcnode-id="761"><span data-dcnode-id="762" instrument_node=""> one </span></i><span data-dcnode-id="760" instrument_node="">alcoholic drink, even though by law they</span><i data-dcnode-id="758"><span data-dcnode-id="759" instrument_node=""> could</span></i><span data-dcnode-id="757" instrument_node="">. Street crime is rare; there's no heightened anxiety when you leave your home. If you do business with Finns, they fulfil their side of the deal, quietly and efficiently. Corruption is low. The examples are endless: Finns are good people!</span></li><span data-dcnode-id="755" instrument_node="">
</span><li data-dcnode-id="751"><b data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Finns are smart</span></b><span data-dcnode-id="752" instrument_node="">. People worldwide marvel at the  Finnish education system, but 'the system' shouldn't get all the credit; the culture has a lot to do with it. Finns embrace education and awareness. I don't recall ever meeting a Finn who thought ignorance was 'cool' or that reading was like a punishment. Many Finns study all their lives, purely in pursuit of knowledge, and the Constitution of Finland guarantees lifelong access to education. In addition, most Finns are aware of and sensibly conversant upon a broad range of issues both local and global.</span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="746"><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node=""> Gender equality without antagonism</span></b><span data-dcnode-id="747" instrument_node="">. Sexual equality just naturally "is". I've lived in many countries and Finland's the only one where the "men versus women" mentality hardly exists. If you mention this to Finns most seem genuinely perplexed that it's such a major issue in other countries. This in stark contrast to my old home  Australia, where the sex war shenanigans are ongoing, pervasive and disruptive.</span></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="735"><b data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Freedom! </span></b><span data-dcnode-id="742" instrument_node="">Finland has what I consider true freedom. If you don't commit crimes or go out of your way to annoy people, you'll largely be left to your own devices without comment or interference; your business is your business. Finnish freedom is also exemplified in </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.expat-finland.com/pdf/everymans_right.pdf" target="_blank" title="PDF: Rules, rights and responsibilities of land access in Finland"><span data-dcnode-id="741" instrument_node="">Everyman's right</span></a><span data-dcnode-id="739" instrument_node=""> (</span><i data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">jokamiehenoikeus</span></i><span data-dcnode-id="736" instrument_node="">); the legal concept giving everybody access to land for outdoor pursuits, regardless of land ownership.</span></li><span data-dcnode-id="734" instrument_node="">
</span><li data-dcnode-id="730"><b data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Direct</span></b><span data-dcnode-id="731" instrument_node="">. That famous Finnish directness again... it's not always pretty but at least you know where you stand! </span></li><span data-dcnode-id="729" instrument_node="">
</span></ul><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">I'm not saying Finland's perfect, but I'd challenge anyone who  purported that Finns, or Finnish culture, are "bad". The worst opinion you could reach is "It's not my style." Fair enough, but if you don't share the values I've described and you choose to remain in Finland, please don't corrupt this rare and honourable culture for everybody else.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="723" instrument_node="">Get more insights on Finnish culture in the following section, and at</span><b class="blue" data-dcnode-id="721"><span data-dcnode-id="722" instrument_node=""> thisisFinland</span></b><span data-dcnode-id="720" instrument_node="">: </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finland.fi/life-society/a-guide-to-finnish-customs-and-manners/" target="_blank"><span data-dcnode-id="719" instrument_node="">A guide to Finnish customs and manners</span></a></p><span data-dcnode-id="716" instrument_node="">
</span><h2 data-dcnode-id="713"><a data-dcnode-id="715" id="postcards"></a><span data-dcnode-id="714" instrument_node="">Postcards from the Inside: Personal Perspectives</span></h2><span data-dcnode-id="712" instrument_node="">

</span><h2 data-dcnode-id="501"><a data-dcnode-id="503" id="museums"></a><span data-dcnode-id="502" instrument_node="">Visit the Museums!</span></h2><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">If you'd like to acquire a little culture, what better way to do it than visiting Finland's museums? Finnish culture galore!</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">There are over 1,000 museums in Finland, including museums of Art, Cultural History, Natural History, and almost 20 national Specialised museums. Although over a third of Finnish museums are run professionally, the Finns' love of culture and history is clearly seen in the number of</span><i data-dcnode-id="494"><span data-dcnode-id="495" instrument_node=""> locally </span></i><span data-dcnode-id="493" instrument_node="">run museums and galleries in every town and city.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="476"><b data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Museums Finland </span></b><span data-dcnode-id="488" instrument_node="">and</span><b data-dcnode-id="486"><span data-dcnode-id="487" instrument_node=""> Visit Finland </span></b><span data-dcnode-id="485" instrument_node="">will get you started!</span><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">
    Museums Finland: </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//museot.fi/searchmuseums/" rel="nofollow" target="_blank" title="museot.fi/searchmuseums/"><span data-dcnode-id="482" instrument_node="">Museums &amp; Galleries</span></a><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">
    Visit Finland: 
    </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visitfinland.com/article/10-museums-visit-finland/" rel="nofollow" target="_blank" title="www.visitfinland.com/article/10-museums-visit-finland/"><span data-dcnode-id="478" instrument_node="">10 Museums to Visit in Finland</span></a></p><span data-dcnode-id="475" instrument_node="">
</span><h2 data-dcnode-id="472"><a data-dcnode-id="474" id="libraries"></a><span data-dcnode-id="473" instrument_node="">Finnish
      Public Libraries</span></h2><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="463"><b data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Quick Facts:</span></b><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">
      Finland is known for its comprehensive library network, high user and lending rates, and effective use of technology and information networks.
      
      The guiding principle is to offer</span><i data-dcnode-id="465"><span data-dcnode-id="466" instrument_node=""> free access for everyone, irrespective of their place of residence and financial standing</span></i><span data-dcnode-id="464" instrument_node="">. No fee is charged for either borrowing or the use of library collections at the library.
      
      About 80% of Finns are regular library users, visiting a library 10 times a year on average. They take out 18 books or other items per year on average.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="461" instrument_node="">A decent selection of</span><i data-dcnode-id="459"><span data-dcnode-id="460" instrument_node=""> foreign language </span></i><span data-dcnode-id="458" instrument_node="">books is available, and some libraries have 'swap shelves' where visitors can exchange their own books for others.</span><i data-dcnode-id="456"><span data-dcnode-id="457" instrument_node=""> Electronic media </span></i><span data-dcnode-id="455" instrument_node="">and an increasing range of 'things' can also be borrowed; some libraries for example offer</span><i data-dcnode-id="453"><span data-dcnode-id="454" instrument_node=""> power tools, appliances </span></i><span data-dcnode-id="452" instrument_node="">such as sewing machines,</span><i data-dcnode-id="450"><span data-dcnode-id="451" instrument_node=""> musical instruments</span></i><span data-dcnode-id="449" instrument_node="">, and one even has a rowboat! Once the borrower has a library card, library items can be borrowed from</span><i data-dcnode-id="447"><span data-dcnode-id="448" instrument_node=""> any branch</span></i><span data-dcnode-id="446" instrument_node="">. Access to the Internet is available at all libraries free of charge.</span><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">
</span><i data-dcnode-id="442"><span data-dcnode-id="443" instrument_node=""> See also </span></i><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.expat-finland.com/shopping_in_finland/online_shopping.html%23books"><span data-dcnode-id="441" instrument_node="">Books in English</span></a></p><span data-dcnode-id="438" instrument_node="">
</span><p class="bott" data-dcnode-id="433"><b data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Services &amp; Facilities</span></b><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">
      Finnish libraries not just about borrowing. The larger libraries offer a veritable cornucopia of free services, including</span></p><span data-dcnode-id="432" instrument_node="">
</span><ul data-dcnode-id="406"><span data-dcnode-id="431" instrument_node="">
</span><li data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Use of computers, scanners, printers, et cetera, with multilingual software</span></li><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Use of 3D printers</span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">VR and gaming facilities</span></li><span data-dcnode-id="422" instrument_node="">
</span><li data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Use of music studios, with instruments and stages</span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Exhibition rooms</span></li><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Spaces to work, talk on your mobile or have a video conference</span></li><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Facilities for digitisation of your old media, such as vinyl albums, video cassettes, and even audio cassettes</span></li><span data-dcnode-id="410" instrument_node="">
</span><li class="blue" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Look up your local library to check the facilities it has available</span></li><span data-dcnode-id="407" instrument_node="">
</span></ul><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="397"><b data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Find Your Local Library</span></b><br data-dcnode-id="402"><span data-dcnode-id="401" instrument_node="">
      A comprehensive directory of all Finland's
      public libraries, with details of their web pages and catalogues,
      can be found at </span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.libraries.fi/" target="_blank"><span data-dcnode-id="400" instrument_node="">www.libraries.fi</span></a><span data-dcnode-id="398" instrument_node=""> along with a large amount of additional services.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="379"><b data-dcnode-id="392"><span data-dcnode-id="395" instrument_node="">How to obtain a Library
      Card</span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node="">
</span></b><span data-dcnode-id="391" instrument_node="">You can obtain a library card and borrowing rights from</span><i data-dcnode-id="389"><span data-dcnode-id="390" instrument_node=""> any library </span></i><span data-dcnode-id="388" instrument_node="">by presenting a photo-ID such as an I.D. card from EU countries, passport, Finnish driver’s licence, Finnish SII card with photo or Finnish residence permit.</span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">
</span><b data-dcnode-id="382"><span data-dcnode-id="385" instrument_node="">Visit </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.libraries.fi/" target="_blank"><span data-dcnode-id="384" instrument_node="">www.libraries.fi</span></a></b><i data-dcnode-id="380"><span data-dcnode-id="381" instrument_node=""> &nbsp;En, Fi, Sw</span></i></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="364"><b data-dcnode-id="374"><span data-dcnode-id="377" instrument_node="">Helsinki Metropolitan Area Libraries: HelMet</span><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node="">
</span></b><span data-dcnode-id="373" instrument_node="">The HelMet network consists of the city libraries of Helsinki, Espoo, Kauniainen, and Vantaa. HelMet offers many useful services, including the ability to surf the web library and request materials to be delivered to a library near you free of charge.</span><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">
</span><b data-dcnode-id="367"><span data-dcnode-id="370" instrument_node="">Visit </span><a data-dcnode-id="368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.helmet.fi/en-US" target="_blank"><span data-dcnode-id="369" instrument_node="">www.helmet.fi</span></a></b><i data-dcnode-id="365"><span data-dcnode-id="366" instrument_node=""> &nbsp;En, Fi, Ru, Sw</span></i></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="350"><span class="hd" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Matti Pohto, an Unsung Hero:</span></span><br data-dcnode-id="360"><span data-dcnode-id="359" instrument_node="">
In 2017 National broadcaster Yle produced a touching video about Matti Pohto (1817–1857). A poor drifter, Matti collected some 5000 books and helped the beleagured Finnish library system after the Finnish national book collection was destroyed in the Great Fire of Turku in 1827. Sadly Matti met with a violent end.</span><br data-dcnode-id="358"><span data-dcnode-id="357" instrument_node="">
</span><a class="no-br" data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//areena.yle.fi/1-4226220" rel="nofollow" target="_blank" title="areena.yle.fi/1-4226220"><span data-dcnode-id="356" instrument_node="">Video: Yle&nbsp;Areena</span></a><span data-dcnode-id="354" instrument_node=""> Thanks to</span><span class="blk" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node=""> Teemu Laaksonen </span></span><span data-dcnode-id="351" instrument_node="">at Yle!</span></p><span data-dcnode-id="349" instrument_node="">
</span><h2 data-dcnode-id="346"><a data-dcnode-id="348" id="books"></a><span data-dcnode-id="347" instrument_node="">Books from Finland</span></h2><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="338"><i data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Books from Finland </span></i><span data-dcnode-id="342" instrument_node="">is a journal of writing from and about Finland.
      
      Published by the Finnish Literature Society in association with the Finnish Literature Exchange, and with financial assistance from the Finnish Ministry of Education,</span><i data-dcnode-id="340"><span data-dcnode-id="341" instrument_node=""> Books from Finland </span></i><span data-dcnode-id="339" instrument_node="">is an independent literary journal designed for those with an interest in Finnish literature: publishers, translators, writers, media professionals, teachers, librarians, students – and anyone interested in Finland and its culture.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p class="bott" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">The range of articles reflects the scope of Finnish literary life:</span></p><span data-dcnode-id="334" instrument_node="">
</span><ul data-dcnode-id="317"><span data-dcnode-id="333" instrument_node="">
</span><li data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">contemporary writers and their work: profiles, interviews</span></li><span data-dcnode-id="330" instrument_node="">
</span><li data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">poetry, prose, drama, essays: new translations by native English speakers</span></li><span data-dcnode-id="327" instrument_node="">
</span><li data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">classic authors: features, reappraisals</span></li><span data-dcnode-id="324" instrument_node="">
</span><li data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">reviews: both fiction and non-fiction – literature history, politics, folklore, design, architecture, photography, fine arts, music</span></li><span data-dcnode-id="321" instrument_node="">
</span><li data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">comment, debate, news</span></li><span data-dcnode-id="318" instrument_node="">
</span></ul><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="311"><b data-dcnode-id="312"><span data-dcnode-id="315" instrument_node="">Visit </span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booksfromfinland.fi/" target="_blank"><span data-dcnode-id="314" instrument_node="">www.booksfromfinland.fi</span></a></b></p><span data-dcnode-id="310" instrument_node="">
</span><h2 data-dcnode-id="307"><a data-dcnode-id="309" id="caisa"></a><span data-dcnode-id="308" instrument_node="">Caisa: Finnish International Cultural Centre, Helsinki</span></h2><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="302"><b data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Caisa </span></b><span data-dcnode-id="303" instrument_node="">is
      the International Cultural Centre in Kaisaniemi,  Helsinki. It supports multicultural
      development of the city by promoting the interaction of
      people from different countries, and providing information
      about various cultures and  Finnish society. Founded in 1995, about half of Caisa's visitors and partners are immigrants, and half are Finns. Caisa welcomes all visitors interested in  multicultural and/or immigration issues. </span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="300" instrument_node="">Caisa organises and holds concerts, food festivals, exhibitions, seminars, courses, clubs and its own singing competition</span><i data-dcnode-id="298"><span data-dcnode-id="299" instrument_node=""> The Ourvision Singing Contest</span></i><span data-dcnode-id="297" instrument_node="">. Caisa also makes its rooms available for educational and entertainment purposes, and works closely with different societies and organisations working for cultural causes.</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="288"><b data-dcnode-id="290"><span data-dcnode-id="294" instrument_node="">Visit </span><a data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.caisa.fi/" target="_blank"><span data-dcnode-id="293" instrument_node="">www.caisa.fi</span></a><span data-dcnode-id="291" instrument_node=""> Phone </span></b><span data-dcnode-id="289" instrument_node="">(09) 310 37500</span></p><span data-dcnode-id="287" instrument_node="">
</span><h2 class="bott" data-dcnode-id="284"><a data-dcnode-id="286" id="joulupukki"></a><span data-dcnode-id="285" instrument_node="">Joulupukki: A Very Scary Christmas!</span></h2><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="282" instrument_node="">In Finland Santa is known as Joulupukki, which translates literally as 'Christmas Goat'. Our modern notion of a jolly Santa Claus bringing merriment to one and all is a far cry from Finland's early Joulupukki, who is frankly terrifying! In appearance Joulupukki is similar to Krampus, the half-goat half-demon found in several countries including Austria, Bavaria, Croatia, Czech Republic and Hungary. Joulupukki's origin is probably rooted in Finnish paganism, which also shares similarities with the pre-Christian religious practices of neighbouring cultures, such as Germanic, Norse and Baltic paganism.</span><br data-dcnode-id="281"><span data-dcnode-id="280" instrument_node="">
</span><a class="gry" data-dcnode-id="278" href="javascript:toggle_visibility('joulupukki-pics');"><span data-dcnode-id="279" instrument_node="">Click to see large images and read a little more</span></a><span data-dcnode-id="277" instrument_node="">.</span></p><span data-dcnode-id="275" instrument_node="">
</span><a class="gry" data-dcnode-id="272" href="javascript:toggle_visibility('joulupukki-pics');" title="Click to see large images and text"><div class="photo" data-dcnode-id="273"><img data-dcnode-id="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.expat-finland.com/images/joulupukki_sm.jpg&amp;raw" style="max-width:759px;"></div></a><span data-dcnode-id="271" instrument_node="">
</span><div class="photo" data-dcnode-id="221" id="joulupukki-pics" style="display:none; float:none;"><a class="gry no-uline" data-dcnode-id="222" href="javascript:toggle_visibility('joulupukki-pics');" title="Click to close pictures"><div data-dcnode-id="269" style="width:100%;"><img data-dcnode-id="270" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.expat-finland.com/images/joulupukki_1.jpg&amp;raw" style="max-width:960px; margin:0px auto;"></div><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="257" style="text-align:left;"><b data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Picture 1: Nuutinpäivä</span></b><br data-dcnode-id="265"><span data-dcnode-id="264" instrument_node="">
Saint Knut's Day, Nuutinpäivä, was traditionally celebrated in Finland on 13 January. On Nuutinpäivä young men dressed as goats (Nuuttipukki) and visited houses in the neighbourhood. Usually the dress was an inside-out fur jacket, a leather or birch bark mask, and horns. The men wandered from house to house, entering and demanding food and drink from the household - especially leftover alcoholic beverages. The Nuuttipukki tradition is reportedly kept alive in some areas of Satakunta, Southwest Finland and Ostrobothnia. However, nowadays the character is usually played by children and involves a happy encounter.</span><br data-dcnode-id="263"><span data-dcnode-id="262" instrument_node="">
</span><b data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Picture 2: Alkupukki</span></b><br data-dcnode-id="259"><span data-dcnode-id="258" instrument_node="">
Alkupukki is one of the Elder Ones, basically the first Joulupukki. Here he is 'gathering nourishment for the winter' - badly behaved children, it seems. This fellow would not be welcome down your chimney!</span></p><span data-dcnode-id="256" instrument_node="">
</span><div data-dcnode-id="254" style="width:100%;"><img data-dcnode-id="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.expat-finland.com/images/joulupukki_2.jpg&amp;raw" style="max-width:960px; margin:0px auto;"></div><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="242" style="text-align:left;"><b data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Picture 3: Joulupukki</span></b><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node="">
The old fashioned Joulupukki, with his Christmas cauldron, administering a little discipline to a child whose behaviour has apparently been less than perfect!</span><br data-dcnode-id="248"><span data-dcnode-id="247" instrument_node="">
</span><b data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Picture 4: Joulupukki</span></b><br data-dcnode-id="244"><span data-dcnode-id="243" instrument_node="">
All that discipline makes Joulupukki hungry! Here he enjoys a light reindeer snack before returning to his chores.</span></p><span data-dcnode-id="241" instrument_node="">
</span><div data-dcnode-id="239" style="width:100%;"><img data-dcnode-id="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.expat-finland.com/images/joulupukki_3.jpg&amp;raw" style="max-width:960px; margin:0px auto;"></div><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="224" style="text-align:left;"><b data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Picture 5: Joulupukki</span></b><br data-dcnode-id="235"><span data-dcnode-id="234" instrument_node="">
Here Joulupukki guards the skulls of children he has taken as hunting trophies. According to some, this pile of skulls grew into what is now the</span><i data-dcnode-id="232"><span data-dcnode-id="233" instrument_node=""> real </span></i><span data-dcnode-id="231" instrument_node="">home of Santa Claus; Korvatunturi fell in Savukoski, Lapland.</span><br data-dcnode-id="230"><span data-dcnode-id="229" instrument_node="">
</span><b data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Picture 6: Joulupukki</span></b><br data-dcnode-id="226"><span data-dcnode-id="225" instrument_node=""> 
Joulupukki's work is never done. Here he returns to the whip, which he does not apply sparingly!</span></p><span data-dcnode-id="223" instrument_node="">
</span></a></div><span data-dcnode-id="220" instrument_node="">
