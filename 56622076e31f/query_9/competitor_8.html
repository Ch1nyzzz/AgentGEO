/upscbuddy.com/ncert-books-for-class-8/"><span data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">NCERT Books For Class 8</span></span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-post menu-item-11302" data-dcnode-id="588" id="menu-item-11302"><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upscbuddy.com/ncert-books-for-class-9/"><span data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">NCERT Books For Class 9</span></span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-post menu-item-11317" data-dcnode-id="584" id="menu-item-11317"><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upscbuddy.com/ncert-books-for-class-10/"><span data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">NCERT Books For Class 10</span></span></a></li></ul></li><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-11449" data-dcnode-id="578" id="menu-item-11449"><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upscbuddy.com/scert-kerala-textbooks/"><span data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">SCERT Textbooks</span></span></a></li></ul></div></nav></div></header><div class="site-inner" data-dcnode-id="35"><div class="content-sidebar-wrap" data-dcnode-id="36"><main class="content" data-dcnode-id="336" id="genesis-content"><article aria-label="World Heritage Day 2022: Date, Theme, Importance, Celebration" class="post-11025 post type-post status-publish format-standard has-post-thumbnail category-events entry" data-dcnode-id="347"><header class="entry-header" data-dcnode-id="563"><h1 class="entry-title" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">World Heritage Day 2022: Date, Theme, Importance, Celebration</span></h1><p class="entry-meta" data-dcnode-id="564"><time class="entry-time" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">April 12, 2022</span></time><span data-dcnode-id="568" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="565"><span class="entry-author-name" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Era</span></span></span></p></header><div class="entry-content" data-dcnode-id="354"><p data-dcnode-id="558"><span data-dcnode-id="562" instrument_node="">Our ancestors have given us a rich cultural past, and their efforts to preserve our heritage shouldn’t go in vain. </span><strong data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">World Heritage Day</span></strong><span data-dcnode-id="559" instrument_node=""> is celebrated to spread awareness of our rich cultural diversity and the importance of preserving our ancient heritage. The purpose of celebrating this date is to share an important message to the younger generations to carry forward their legacy and preserve our culture.</span></p><span data-dcnode-id="557" instrument_node=""> </span><div class="quads-location quads-ad1" data-dcnode-id="546" id="quads-ad1" style="float:none;margin:0px;"><span data-dcnode-id="555" instrument_node=""> </span><span data-dcnode-id="553" instrument_node=""> </span><span data-dcnode-id="551" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-2478479960967234" data-ad-format="auto" data-ad-slot="1329654420" data-dcnode-id="550" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="549" instrument_node=""> </span></div><div class="ez-toc-v2_0_19 counter-hierarchy counter-decimal ez-toc-light-blue" data-dcnode-id="512" id="ez-toc-container"><div class="ez-toc-title-container" data-dcnode-id="539"><p class="ez-toc-title" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">TABLE OF CONTENTS</span></p><span data-dcnode-id="543" instrument_node=""> </span><span class="ez-toc-title-toggle" data-dcnode-id="540"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="541" style="display: inline;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="542"></i></a></span></div><nav data-dcnode-id="513"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="514"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="536"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="537" href="#when-is-world-heritage-day-2022" title="When is World Heritage Day 2022?"><span data-dcnode-id="538" instrument_node="">When is World Heritage Day 2022?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="533"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="534" href="#why-world-heritage-day-is-celebrated-on-18th-april" title="Why World Heritage Day is Celebrated on 18th April?"><span data-dcnode-id="535" instrument_node="">Why World Heritage Day is Celebrated on 18th April?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="530"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="531" href="#what-is-the-theme-of-world-heritage-day-2022" title="What is the theme of World Heritage Day 2022?"><span data-dcnode-id="532" instrument_node="">What is the theme of World Heritage Day 2022?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="527"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="528" href="#how-to-celebrate-world-heritage-day-2022" title="How to Celebrate World Heritage Day 2022?"><span data-dcnode-id="529" instrument_node="">How to Celebrate World Heritage Day 2022?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="524"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="525" href="#what-is-a-world-heritage-site" title="What is a World Heritage Site?"><span data-dcnode-id="526" instrument_node="">What is a World Heritage Site?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="521"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="522" href="#most-popular-unesco-world-heritage-sites" title="Most Popular UNESCO World Heritage Sites"><span data-dcnode-id="523" instrument_node="">Most Popular UNESCO World Heritage Sites</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="518"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="519" href="#quotes-slogans-on-world-heritage-day-2022" title="Quotes &amp; Slogans on World Heritage Day 2022"><span data-dcnode-id="520" instrument_node="">Quotes &amp; Slogans on World Heritage Day 2022</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="515"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="516" href="#faqs-on-world-heritage-day-2022" title="FAQs on World Heritage Day 2022"><span data-dcnode-id="517" instrument_node="">FAQs on World Heritage Day 2022</span></a></li></ul></nav></div><h2 data-dcnode-id="508"><span class="ez-toc-section" data-dcnode-id="511" id="when-is-world-heritage-day-2022"></span><span data-dcnode-id="510" instrument_node="">When is World Heritage Day 2022?</span><span class="ez-toc-section-end" data-dcnode-id="509"></span></h2><p data-dcnode-id="504"><em data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Every year, World Heritage Day is observed on 18 April.</span></em><span data-dcnode-id="505" instrument_node=""> It is an internationally recognised day to preserve monuments and historical sites and rich inheritance associated with them. The way we live tells a lot about our culture.</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">But one particular day that is entirely dedicated to the collaborative chronicles of the human race and culture is much needed. The International Council on Monuments and Sites (ICOMOS) has done tremendous work in this regard, and it is a true celebration of their efforts too.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">We as humans need to respect the diversity in our cultural offerings and preserve them for future generations to come. The ancient historical monuments are not just a living wonder but speak volumes of history and fascinating ancient lives.</span></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Protecting these assets for many more years into the future is impossible through a single individual or group. Community participation and global awareness can change things for the better and help preserve our rich and varied culture across the world.</span></p><h2 data-dcnode-id="494"><span class="ez-toc-section" data-dcnode-id="497" id="why-world-heritage-day-is-celebrated-on-18th-april"></span><span data-dcnode-id="496" instrument_node="">Why World Heritage Day is Celebrated on 18th April?</span><span class="ez-toc-section-end" data-dcnode-id="495"></span></h2><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">The year 1982 was a significant year for recognizing the efforts of ICOMOS. The suggestion rolled out by ICOMOS to globally celebrate World Heritage Day on 18th April finally took shape in 1982. The pending approval in front of UNESCO was finally sanctioned during the 22nd General Conference.</span></p><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Some of the vital findings by ICOMOS during the stage of approval were to garner solidarity on international terms in tasks of strengthening and protecting global heritage sites. The Venice Charter, also known as the 1964 International Charter on conservation and restoration of monuments and sites, is the guiding spirit behind the establishment of ICOMOS.</span></p><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Additionally, the International Council of Mountains and Sights stepped next to a proposal straight away to celebrate World Heritage Day in 1982. This took solid shape during an important seminar in Tunisia. With all these efforts in hindsight, finally, in November 1983, the 22nd conference of UNESCO passed an ultimate resolution, and from then on, International Day for Monuments and Sites has been in celebration on April 18th every year.</span></p><h2 data-dcnode-id="484"><span class="ez-toc-section" data-dcnode-id="487" id="what-is-the-theme-of-world-heritage-day-2022"></span><span data-dcnode-id="486" instrument_node="">What is the theme of World Heritage Day 2022?</span><span class="ez-toc-section-end" data-dcnode-id="485"></span></h2><p data-dcnode-id="477"><em data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">The World Heritage Day 2022 theme is “</span><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Heritage and Climate</span></strong><span data-dcnode-id="480" instrument_node="">“.</span></em><span data-dcnode-id="478" instrument_node=""> Let’s look at some of the interesting past year themes. We find out that they have a close association with an appreciation of artistic hands, traditions, and cultures, with an imbibed essence of culture blooming in its core. Let’s look at some of the previous year themes here:</span></p><ul data-dcnode-id="464"><li data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">The World Heritage Day 2021 theme was “Complex Pasts: Diverse Futures.”</span></li><li data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">The theme for World Heritage Day 2020 was “Shared cultures, shared heritage and shared responsibility”. In the dawn of the global pandemic COVID-19 outbreak, the theme played an important role in essaying the world health crisis.</span></li><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">“Rural Landscapes” was the vibrant theme for 2019 that brought global unity to the fore. The connectivity of a place with its landscapes and communities was the central point of interest in this particular year.</span></li><li data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">“Heritage for Generations” was the theme for the year 2018. The theme pleads to future generations to protect monuments and learn more about preserving our cultural heritage through learning and education.</span></li><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">“Cultural heritage and sustainable tourism” for the year 2017 in lieu of the agenda set for the year 2030. It aims to renew our living conditions based on the context of sustainable development goals.</span></li><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">“Heritage of Sports” was the theme for the year 2016. The year recognised cultural legacies globally and helped humanity develop different sport skills right from prehistoric times.</span></li></ul><h2 data-dcnode-id="460"><span class="ez-toc-section" data-dcnode-id="463" id="how-to-celebrate-world-heritage-day-2022"></span><span data-dcnode-id="462" instrument_node="">How to Celebrate World Heritage Day 2022?</span><span class="ez-toc-section-end" data-dcnode-id="461"></span></h2><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">The glorious past has much to add to the beautiful treasures of world cultures. Kids can be made aware of World Heritage day through recreational activities in school. It could include storytelling sessions, visits to monuments and heritage sites in India, organizing essay &amp; speech writing competitions, drawing &amp; poster making design, photography contests of ancient heritage monuments, conducting heritage festivals, telecasting movies with messages of culture and traditions.</span></p><span data-dcnode-id="457" instrument_node=""> </span><div class="quads-location quads-ad2" data-dcnode-id="455" id="quads-ad2" style="float:none;margin:0px;"></div><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Communities can post images, collect great information and prepare videos on ways to preserve our cultural past. We can encourage community participation within our respective countries and spread messages to our families and friends via social media using hashtags. Expert talks, webinars, and podcasts on heritage concerned topics could be a wonderful celebration idea. Discussions and virtual tours about famous monumental sites could be an amazing thing to do!</span></p><h2 data-dcnode-id="449"><span class="ez-toc-section" data-dcnode-id="452" id="what-is-a-world-heritage-site"></span><span data-dcnode-id="451" instrument_node="">What is a World Heritage Site?</span><span class="ez-toc-section-end" data-dcnode-id="450"></span></h2><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">A landmark site of cultural and natural importance as recognised by UNESCO and offered special care and preservation is termed world heritage sites. Additionally, these sites own global appraise in universal recognition and are of immense value to humanity and its rich cultural legacy. In essence, world heritage sites belong to all world citizens, are not limited by territories or locations and backed by lawsuits for protection through international treaties. These sites are the elements of protection, recognition and risk, portray diversities in geological and biological landscapes and are of interest to the global political communities.</span></p><h2 data-dcnode-id="443"><span class="ez-toc-section" data-dcnode-id="446" id="most-popular-unesco-world-heritage-sites"></span><span data-dcnode-id="445" instrument_node="">Most Popular UNESCO World Heritage Sites</span><span class="ez-toc-section-end" data-dcnode-id="444"></span></h2><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Around the world, these supernatural legendary sites have amusing stories to tell humanity. The top ones are:</span></p><ul data-dcnode-id="420"><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Bagan in Myanmar, which has more than 2200 temples lined up amidst the lush green misty landscapes.</span></li><li data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Sintra in Portugal for its marvellous life-size gardens with tropical flowering beds and charismatic fortresses.</span></li><li data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Venice in Italy is the perfect picturesque location for exploring the never-ending floating cities and the famous gondola strolls.</span></li><li data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Colosseum in Italy has the world’s largest amphitheatre offering a mystique understanding of its mind-blowing ancient past.</span></li><li data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The Vatican City in Rome’s central district is home to some of the splendid architectural marvels and sculptures that define art.</span></li><li data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Cinque Terre in Italy is known for its beautiful natural landscapes that house multicoloured mansions, scintillating coastlines and marine oceans.</span></li><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Ksar, the Moroccan village known for constructing buildings exclusively from mud and for its natural desert wonder during moonlight.</span></li><li data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">For its unique palace designs and artistic showcases, Istanbul in Turkey bridges the cultural and religious diversities between Asia and Europe.</span></li><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Rock Sites in Turkey where tourists can enjoy caves, a night full of gazing stars and most of all, a place that we can hardly believe ever exists!</span></li><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">The Great Wall of China, for its impeccable structure of the gigantic wall, spans more than 20,000 kilometers.</span></li></ul><h2 data-dcnode-id="416"><span class="ez-toc-section" data-dcnode-id="419" id="quotes-slogans-on-world-heritage-day-2022"></span><span data-dcnode-id="418" instrument_node="">Quotes &amp; Slogans on World Heritage Day 2022</span><span class="ez-toc-section-end" data-dcnode-id="417"></span></h2><ul data-dcnode-id="405"><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Cultural heritage and diversity are prized ornaments of humanity.</span></li><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Our monuments are a beautiful reflection of our ancient cultural roots.</span></li><li data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">The pride of every heritage can be glorified when we preserve their identities.</span></li><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Our aesthetic legacies define our national identity and cultural richness.</span></li><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Monuments speak volumes of our values and connect us directly to our roots.</span></li></ul><h2 data-dcnode-id="401"><span class="ez-toc-section" data-dcnode-id="404" id="faqs-on-world-heritage-day-2022"></span><span data-dcnode-id="403" instrument_node="">FAQs on World Heritage Day 2022</span><span class="ez-toc-section-end" data-dcnode-id="402"></span></h2><p data-dcnode-id="395"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">1.</span></strong><span data-dcnode-id="398" instrument_node=""> What is National Heritage Day?</span><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node=""> April 18 is annually celebrated as Heritage Day on lines of global celebration as World Heritage day. The day focuses on celebrating the world’s greatest architectural sculptures and spreading awareness of the rich culture and diversity of human heritage.</span></p><p data-dcnode-id="389"><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">2.</span></strong><span data-dcnode-id="392" instrument_node=""> What is World Heritage Week?</span><br data-dcnode-id="391"><span data-dcnode-id="390" instrument_node=""> World Heritage week is a special celebration in India carried out by the ASI [Archaeological Survey of India]. Every year 19th to 25th of November, is especially dedicated to the country’s natural heritage marvels, and awareness about the preservation of national monuments is created among the general public.</span></p><p data-dcnode-id="383"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">3.</span></strong><span data-dcnode-id="386" instrument_node=""> How many World Heritage Sites are there in Nepal?</span><br data-dcnode-id="385"><span data-dcnode-id="384" instrument_node=""> There are four world heritage sites in Nepal: Chitwan National Park, Sagarmatha National Park, Kathmandu valley with seven sites, and Lumbini.</span></p><p data-dcnode-id="377"><strong data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">4.</span></strong><span data-dcnode-id="380" instrument_node=""> Which country has the most UNESCO World Heritage?</span><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node=""> China has the most number of UNESCO world heritage sites. The total number of heritage sites is 55 in number, the highest count ever.</span></p><p data-dcnode-id="371"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">5.</span></strong><span data-dcnode-id="374" instrument_node=""> Which city is known as the heritage city of India?</span><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node=""> Ahmedabad has been declared as the heritage city of India. UNESCO has recognised the heritage value of the 600 year ancient walled city built by Ahmed Shah.</span></p><p data-dcnode-id="365"><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">6.</span></strong><span data-dcnode-id="368" instrument_node=""> Who started Heritage Day?</span><br data-dcnode-id="367"><span data-dcnode-id="366" instrument_node=""> Nelson Mandela declared in the year 1996 that a global celebration to spread awareness of India’s rich and varied culture needs to be recognized.</span></p><p data-dcnode-id="359"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">7.</span></strong><span data-dcnode-id="362" instrument_node=""> How many World Heritage Sites are there in the world?</span><br data-dcnode-id="361"><span data-dcnode-id="360" instrument_node=""> The World Heritage list has recognised 252 natural sites as world heritage sites. This includes 213 exclusive sites and 39 mixed sites.</span></p><p data-dcnode-id="356"><span data-dcnode-id="358" instrument_node="">IF you like this article, do share it. </span></p><div class="quads-location quads-ad3" data-dcnode-id="355" id="quads-ad3" style="float:none;margin:0px;"></div></div><footer class="entry-footer" data-dcnode-id="348"><p class="entry-meta" data-dcnode-id="349"><span class="entry-categories" data-dcnode-id="350"><span data-dcnode-id="353" instrument_node="">Filed Under: </span><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upscbuddy.com/category/events/" rel="category tag"><span data-dcnode-id="352" instrument_node="">Events</span></a></span></p></footer></article><div class="after-entry widget-area" data-dcnode-id="337"><section class="widget_text widget widget_custom_html" data-dcnode-id="338" id="custom_html-12"><div class="widget_text widget-wrap" data-dcnode-id="339"><div class="textwidget custom-html-widget" data-dcnode-id="340"><span data-dcnode-id="345" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-2478479960967234" data-ad-format="autorelaxed" data-ad-slot="1762873461" data-dcnode-id="344" style="display:block"></ins><span data-dcnode-id="343" instrument_node=""> </span></div></div></section></
