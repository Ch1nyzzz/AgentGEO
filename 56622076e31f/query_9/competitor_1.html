</span><span class="wpml-ls-slot-post_translations wpml-ls-item wpml-ls-item-hi wpml-ls-first-item wpml-ls-last-item wpml-ls-item-legacy-post-translations" data-dcnode-id="3005"><a class="wpml-ls-link" data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//testbook.com/blog/hi/unesco-world-heritage-sites-in-india/"><span class="wpml-ls-display" data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Hindi</span></span></a></span></p><p data-dcnode-id="2978"><span data-dcnode-id="3002" style="font-weight: 400;"><span data-dcnode-id="3003" instrument_node="">One of the important parts of many Bank and Government examinations is the General Knowledge section. The GK sections in the competitive exams always include questions based on India’s geography, history, polity, and other achievements. One of the most common and recurring topics from the GK section in the Banking and SSC exams is UNESCO World Heritage Sites in India. You can expect questions from the latest updates such as the</span></span><b data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node=""> ‘Ramappa Temple’, Telangana</span></b><span data-dcnode-id="2995" style="font-weight: 400;"><span data-dcnode-id="2999" instrument_node=""> and </span><strong data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">‘Dholavira’, Gujarat </span></strong><span data-dcnode-id="2996" instrument_node="">which are included in the list of </span></span><b data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">UNESCO World Heritage sites</span></b><span data-dcnode-id="2991" style="font-weight: 400;"><span data-dcnode-id="2992" instrument_node=""> in 2021. This decision was made in</span></span><span data-dcnode-id="2990" instrument_node=""> the</span><b data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node=""> UNESCO</span></b><span data-dcnode-id="2987" instrument_node=""> </span><b data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">World Heritage Committee’s 44th session held in China. </span></b><span data-dcnode-id="2983" style="font-weight: 400;"><span data-dcnode-id="2984" instrument_node="">In 2021 the total number of World Heritage Sites has increased from 38 to 40 ,i.e., UNESCO added two more. To crack the upcoming </span></span><b data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">SSC CGL, IBPS PO, RBI Grade B, IBPS Clerk</span></b><span data-dcnode-id="2979" style="font-weight: 400;"><span data-dcnode-id="2980" instrument_node=""> exams, you should know about the UNESCO World Heritage Sites in India 2021.</span></span></p><p data-dcnode-id="2977"></p><div class="tb-ads-div" data-dcnode-id="2976" data-json="{&quot;exam_group_id&quot;:&quot;557af9de0ea5ce31f052918b&quot;,&quot;exam&quot;:&quot;general&quot;,&quot;exam_id&quot;:&quot;&quot;,&quot;target_group_id&quot;:&quot;&quot;,&quot;target_id&quot;:&quot;&quot;,&quot;target_slug&quot;:&quot;&quot;,&quot;exam_group_name&quot;:&quot;gk-and-current-affairs&quot;,&quot;type&quot;:&quot;test-series&quot;,&quot;specific_exams&quot;:[],&quot;lang&quot;:&quot;en&quot;,&quot;position&quot;:&quot;page-unit-1&quot;,&quot;affiliate&quot;:&quot;blogp1&quot;,&quot;id&quot;:&quot;&quot;,&quot;version&quot;:&quot;&quot;}" id="L65jWunsoq"></div><p data-dcnode-id="2975"></p><span data-dcnode-id="2974" instrument_node=""> </span><span data-dcnode-id="2971" instrument_node=""> </span><p data-dcnode-id="2967"><img alt="UNESCO World Heritage Sites in India- Testbook" class="alignnone lazyloaded" data-dcnode-id="2970" data-lazy-src="https://blogmedia.testbook.com/blog/wp-content/uploads/2020/05/unesco-world-heritage-sites-india-a83ada90.jpg" data-was-processed="true" height="730" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogmedia.testbook.com/blog/wp-content/uploads/2020/05/unesco-world-heritage-sites-india-a83ada90.jpg&amp;raw" width="1904"><noscript data-dcnode-id="2968"> </span></a></span></div><ul class="ez-toc-list" data-dcnode-id="2932"><li data-dcnode-id="2939"><a data-dcnode-id="2940" href="#Selection-Criteria-for-UNESCO-World-Heritage-Sites" title="Selection Criteria for UNESCO World Heritage Sites"><span data-dcnode-id="2941" instrument_node="">Selection Criteria for UNESCO World Heritage Sites</span></a></li><li data-dcnode-id="2936"><a data-dcnode-id="2937" href="#List-of-UNESCO-World-Heritage-Sites-in-India" title="List of UNESCO World Heritage Sites in India"><span data-dcnode-id="2938" instrument_node="">List of UNESCO World Heritage Sites in India</span></a></li><li data-dcnode-id="2933"><a data-dcnode-id="2934" href="#Frequently-Asked-Questions" title="Frequently Asked Questions"><span data-dcnode-id="2935" instrument_node="">Frequently Asked Questions</span></a></li></ul></div><h2 data-dcnode-id="2928"><span class="ez-toc-section" data-dcnode-id="2929" id="Selection-Criteria-for-UNESCO-World-Heritage-Sites"><span data-dcnode-id="2930" instrument_node="">Selection Criteria for UNESCO World Heritage Sites</span></span></h2><p data-dcnode-id="2917"><span data-dcnode-id="2926" style="font-weight: 400;"><span data-dcnode-id="2927" instrument_node="">Before jumping to the list of </span></span><b data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">40 UNESCO World Heritage Sites</span></b><span data-dcnode-id="2922" style="font-weight: 400;"><span data-dcnode-id="2923" instrument_node=""> let’s quickly look at the criteria based on which the UNESCO selects the Sites to include in the World Heritage Sites of India. There are a total of </span></span><b data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">ten criteria</span></b><span data-dcnode-id="2918" style="font-weight: 400;"><span data-dcnode-id="2919" instrument_node=""> among which one is required for getting enlisted in the World Heritage Sites. These are as follows:</span></span></p><ol data-dcnode-id="2896"><li data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Human creative genius.</span></li><li data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">Interchange of values.</span></li><li data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Testimony to cultural tradition.</span></li><li data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Significance in human history.</span></li><li data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Traditional human settlement.</span></li><li data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Heritage associated with events of universal significance.</span></li><li data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">Natural phenomena or beauty.</span></li><li data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Major stages of Earth’s history.</span></li><li data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">Significant ecological and biological processes.</span></li><li data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">The significant natural habitat for biodiversity.</span></li></ol><p data-dcnode-id="2891"><span data-dcnode-id="2895" instrument_node="">Know </span><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogmedia.testbook.com/blog/wp-content/uploads/2018/01/Detailed-List-of-Major-Forts-in-India-GK-Notes-for-SSC-Bank-Exams-in-PDF.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2894" instrument_node="">Detailed List of Major Forts in India</span></a><span data-dcnode-id="2892" instrument_node=""> – GK Notes for SSC &amp; Bank Exams in PDF</span></p><p data-dcnode-id="2869"><span data-dcnode-id="2889" style="font-weight: 400;"><span data-dcnode-id="2890" instrument_node="">These UNESCO Heritage sites of India are among the cultural or natural heritage. India’s </span></span><b data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">first 2 sites were marked on the list in the year 1983 these are the Ajanta Caves and the Agra Fort</span></b><span data-dcnode-id="2885" style="font-weight: 400;"><span data-dcnode-id="2886" instrument_node="">. Over the years, in India, more 38 sites have been inscribed. The latest is </span></span><b data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">‘Ramappa Temple’ </span></b><span data-dcnode-id="2882" instrument_node="">of Telangana and ‘</span><strong data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Dholavira’ </span></strong><span data-dcnode-id="2879" instrument_node="">from Gujarat</span><b data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">. </span></b><span data-dcnode-id="2875" style="font-weight: 400;"><span data-dcnode-id="2876" instrument_node="">Among these 40 UNESCO Heritage sites of India, the list includes </span></span><b data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">32</span></b><span data-dcnode-id="2872" instrument_node="">&nbsp;</span><b data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">cultural sites, 7 natural sites, and 1 mixed site.</span></b></p><p data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">Students should check to the related links given below which will help you preparing for your exam:</span></p><p data-dcnode-id="2866"></p><div class="tb-ads-div" data-dcnode-id="2865" data-json="{&quot;exam_group_id&quot;:&quot;557af9de0ea5ce31f052918b&quot;,&quot;exam&quot;:&quot;general&quot;,&quot;exam_id&quot;:&quot;&quot;,&quot;target_group_id&quot;:&quot;&quot;,&quot;target_id&quot;:&quot;&quot;,&quot;target_slug&quot;:&quot;&quot;,&quot;exam_group_name&quot;:&quot;gk-and-current-affairs&quot;,&quot;type&quot;:&quot;courses&quot;,&quot;specific_exams&quot;:[],&quot;lang&quot;:&quot;en&quot;,&quot;position&quot;:&quot;page-unit-2&quot;,&quot;affiliate&quot;:&quot;blogp2&quot;,&quot;id&q he latest recruitments and updates of all government examinations.</span></span></p><h2 data-dcnode-id="2193"><span class="ez-toc-section" data-dcnode-id="2194" id="Frequently-Asked-Questions"><span data-dcnode-id="2195" instrument_node="">Frequently Asked Questions</span></span></h2><div class="mks_accordion" data-dcnode-id="2132"><div class="mks_accordion_item" data-dcnode-id="2181"><div class="mks_accordion_heading" data-dcnode-id="2188"><strong data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Q.1&nbsp;What is UNESCO?</span></strong><i class="fa fa-plus" data-dcnode-id="2190"></i><i class="fa fa-minus" data-dcnode-id="2189"></i></div><div class="mks_accordion_content" data-dcnode-id="2182"><strong data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Ans.1 </span></strong><p data-dcnode-id="2185"></p><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">United Nations Educational, Scientific, and Cultural Organization (UNESCO) is an organization that contributes by building peace,&nbsp; eradicating poverty, sustainable development, and spreading awareness regarding the intercultural through education, the sciences, culture, communication, and information.</span></p></div></div><div class="mks_accordion_item" data-dcnode-id="2169"><div class="mks_accordion_heading" data-dcnode-id="2176"><strong data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Q.2&nbsp;How many world heritage sites are present in India?</span></strong><i class="fa fa-plus" data-dcnode-id="2178"></i><i class="fa fa-minus" data-dcnode-id="2177"></i></div><div class="mks_accordion_content" data-dcnode-id="2170"><strong data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Ans.2 </span></strong><p data-dcnode-id="2173"></p><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">There are a total of 40 world heritage sites present in India.</span></p></div></div><div class="mks_accordion_item" data-dcnode-id="2157"><div class="mks_accordion_heading" data-dcnode-id="2164"><strong data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Q.3&nbsp;Which site is considered as the first world heritage site in India?</span></strong><i class="fa fa-plus" data-dcnode-id="2166"></i><i class="fa fa-minus" data-dcnode-id="2165"></i></div><div class="mks_accordion_content" data-dcnode-id="2158"><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Ans.3 </span></strong><p data-dcnode-id="2161"></p><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Agra Fort is also called as “Laal Quila” which is located in Agra, India. It was tagged as the world heritage site of India in 1983.</span></p></div></div><div class="mks_accordion_item" data-dcnode-id="2145"><div class="mks_accordion_heading" data-dcnode-id="2152"><strong data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Q.4&nbsp;What is considered as the national heritage of India?</span></strong><i class="fa fa-plus" data-dcnode-id="2154"></i><i class="fa fa-minus" data-dcnode-id="2153"></i></div><div class="mks_accordion_content" data-dcnode-id="2146"><strong data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Ans.4 </span></strong><p data-dcnode-id="2149"></p><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Taj Mahal is significantly considered as the national heritage of India.</span></p></div></div><div class="mks_accordion_item" data-dcnode-id="2133"><div class="mks_accordion_heading" data-dcnode-id="2140"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">Q.5&nbsp;When is world heritage day celebrated?</span></strong><i class="fa fa-plus" data-dcnode-id="2142"></i><i class="fa fa-minus" data-dcnode-id="2141"></i></div><div class="mks_accordion_content" data-dcnode-id="2134"><strong data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Ans.5 </span></strong><p data-dcnod
