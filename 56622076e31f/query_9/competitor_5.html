</span><a aria-controls="collapsedecision7419" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="4846" data-toggle="collapse" href="#decision7419" id="ext-element-20" role="button"><span data-dcnode-id="4853" instrument_node="">
</span><span data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">43COM 7.1</span></span><span data-dcnode-id="4850" instrument_node="">
											Statutory matters related to Reactive Monitoring 
												(2019)
											
											</span><span class="material-icons-sharp" data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">expand_more</span></span><span data-dcnode-id="4847" instrument_node="">
</span></a><span data-dcnode-id="4845" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="4702" id="decision7419"><span data-dcnode-id="4844" instrument_node="">
</span><div data-dcnode-id="4840"><strong data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">Code:</span></strong><span data-dcnode-id="4841" instrument_node=""> 43COM 7.1</span></div><span data-dcnode-id="4839" instrument_node="">
</span><div data-dcnode-id="4835"><strong data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">Title:</span></strong><span data-dcnode-id="4836" instrument_node=""> Statutory matters related to Reactive Monitoring</span></div><span data-dcnode-id="4834" instrument_node=""> </span><div data-dcnode-id="4830"><strong data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">Year:</span></strong><span data-dcnode-id="4831" instrument_node=""> 2019</span></div><span data-dcnode-id="4829" instrument_node="">
</span><p data-dcnode-id="4828"></p><p data-dcnode-id="4826"><span data-dcnode-id="4827" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="4825" instrument_node="">
</span><ol data-dcnode-id="4708"><span data-dcnode-id="4824" instrument_node="">
</span><li data-dcnode-id="4820"><u data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">Having examined</span></u><span data-dcnode-id="4821" instrument_node=""> Documents WHC/19/43.COM/7,</span></li><span data-dcnode-id="4819" instrument_node="">
</span><li data-dcnode-id="4806"><u data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">Recalling</span></u><span data-dcnode-id="4816" instrument_node=""> Decisions </span><strong data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">40&nbsp;COM 7</span></strong><span data-dcnode-id="4813" instrument_node="">, </span><strong data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">41&nbsp;COM 7</span></strong><span data-dcnode-id="4810" instrument_node="">, and </span><strong data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">42&nbsp;COM 7</span></strong><span data-dcnode-id="4807" instrument_node="">, adopted at its 40th (Istanbul/UNESCO, 2016), 41st (Krakow, 2017) and 42nd (Manama, 2018) sessions respectively,</span></li><span data-dcnode-id="4805" instrument_node="">
</span><li data-dcnode-id="4790"><u data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">Thanks</span></u><span data-dcnode-id="4802" instrument_node=""> the State Party of Azerbaijan, Host Country of the 43rd session of the World Heritage Committee (Baku, 2019), for having organized the third World Heritage Site Managers’ Forum, as a capacity-building exercise aimed at increasing the understanding of the World Heritage decision-making process among site managers, in order to achieve more effective protection of Outstanding Universal Value (OUV), </span><u data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">takes note with appreciation</span></u><span data-dcnode-id="4799" instrument_node=""> of the 2019 World Heritage Site Managers’ Forum Statement and </span><u data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">encourages</span></u><span data-dcnode-id="4796" instrument_node=""> the future Host Countries to continue this initiative in conjunction with the World Heritage Committee session;</span><br data-dcnode-id="4795"><br data-dcnode-id="4794"><span data-dcnode-id="4793" instrument_node="">Evaluation of the Reactive Monitoring process </span><br data-dcnode-id="4792"><br data-dcnode-id="4791"></li><span data-dcnode-id="4789" instrument_node="">
</span><li data-dcnode-id="4779"><u data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">Taking note with appreciation</span></u><span data-dcnode-id="4786" instrument_node=""> of the evaluation of the Reactive Monitoring process launched by the World Heritage Centre, </span><u data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">thanks</span></u><span data-dcnode-id="4783" instrument_node=""> the State Party of Switzerland for its financial support, as well as the experts tasked with this evaluation, for their thorough analysis of this process, instrumental in achieving the objectives of the </span><em data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="4780" instrument_node="">;</span></li><span data-dcnode-id="4778" instrument_node="">
</span><li data-dcnode-id="4771"><u data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">Expresses its gratitude</span></u><span data-dcnode-id="4775" instrument_node=""> to all the stakeholders of the </span><em data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">Convention </span></em><span data-dcnode-id="4772" instrument_node="">who have actively contributed to this evaluation;</span></li><span data-dcnode-id="4770" instrument_node="">
</span><li data-dcnode-id="4760"><u data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">Notes</span></u><span data-dcnode-id="4767" instrument_node=""> that the recommendations formulated in the evaluation refer to improvements of the current practices and do not call for structural changes nor amendments to the statutory documents, and </span><u data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">requests</span></u><span data-dcnode-id="4764" instrument_node=""> all stakeholders of the </span><em data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">Convention </span></em><span data-dcnode-id="4761" instrument_node="">to take them on-board and implement them at their level as soon as possible;</span></li><span data-dcnode-id="4759" instrument_node="">
</span><li data-dcnode-id="4755"><u data-dcnode-id="4757"><span data-dcnode-id="4758" instrument_node="">Agrees</span></u><span data-dcnode-id="4756" instrument_node=""> that the World Heritage Centre should prioritize implementation of the high priority recommendations, with an initial focus on those relevant to communication, capacity-building, including for site managers, and finance;</span></li><span data-dcnode-id="4754" instrument_node="">
</span><li data-dcnode-id="4745"><u data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">Also requests</span></u><span data-dcnode-id="4751" instrument_node=""> the World Heritage Centre to present a progress report on the implementation of the recommendations, for examination by the World Heritage Committee at its 44th session in 2020;</span><br data-dcnode-id="4750"><br data-dcnode-id="4749"><span data-dcnode-id="4748" instrument_node="">Issues related to the List of World Heritage in Danger</span><br data-dcnode-id="4747"><br data-dcnode-id="4746"></li><span data-dcnode-id="4744" instrument_node="">
</span><li data-dcnode-id="4740"><u data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Reaffirming</span></u><span data-dcnode-id="4741" instrument_node=""> the need to promote a better understanding of the implications and benefits of properties being inscribed on the List of World Heritage in Danger,</span></li><span data-dcnode-id="4739" instrument_node="">
</span><li data-dcnode-id="4735"><u data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">Thanks</span></u><span data-dcnode-id="4736" instrument_node=""> the State Party of Romania for its initiative to host a multi-stakeholder international workshop focusing on the List of World Heritage in Danger, including exchange of good practice, promotion of the properties inscribed on this List and the conservation needs to improve their state of conservation, such as Costed Action Plans;</span></li><span data-dcnode-id="4734" instrument_node="">
</span><li data-dcnode-id="4725"><u data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">Requests</span></u><span data-dcnode-id="4731" instrument_node=""> the World Heritage Centre to present a report on this workshop and other initiatives related to the List of World Heritage in Danger at the 44th session in 2020;</span><br data-dcnode-id="4730"><br data-dcnode-id="4729"><span data-dcnode-id="4728" instrument_node="">Selection of the World Heritage properties to be proposed for discussion </span><br data-dcnode-id="4727"><br data-dcnode-id="4726"></li><span data-dcnode-id="4724" instrument_node="">
</span><li data-dcnode-id="4720"><u data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">Reaffirming</span></u><span data-dcnode-id="4721" instrument_node=""> the importance of focusing the debates on those properties and global conservation issues of greatest concern during the World Heritage Committee sessions, and taking into account the results of the evaluation of the Reactive Monitoring process,</span></li><span data-dcnode-id="4719" instrument_node="">
</span><li data-dcnode-id="4715"><u data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">Supports</span></u><span data-dcnode-id="4716" instrument_node=""> the outcomes of the reflection conducted by the World Heritage Centre and the Advisory Bodies regarding the elaboration of the list of state of conservation reports to be proposed for discussion by the Committee, as well as the current practice allowing Committee members to add to this list the reports they wish to discuss, by providing a written request to the Chairperson of the Committee, through the World Heritage Centre, sufficiently in advance of the session, and indicating the reason why the reports are requested to be opened for discussion;</span></li><span data-dcnode-id="4714" instrument_node="">
</span><li data-dcnode-id="4710"><u data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">Recognizes</span></u><span data-dcnode-id="4711" instrument_node=""> that the selection of the state of conservation reports to be discussed by the Committee during its sessions should be based on clear and objective criteria, including the level of threat to the property, rather than being based on representativity.</span></li><span data-dcnode-id="4709" instrument_node="">
</span></ol><p data-dcnode-id="4707"></p><span data-dcnode-id="4706" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/7419"><span data-dcnode-id="4705" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="4703" instrument_node="">
</span></div><span data-dcnode-id="4701" instrument_node="">
</span></span><span data-dcnode-id="4699" instrument_node="">
</span></div><span data-dcnode-id="4697" instrument_node="">
</span><div class="list-counter mb-1" data-dcnode-id="4525" id="list-7420" style=""><span data-dcnode-id="4696" instrument_node="">
</span><span data-dcnode-id="4527"><span data-dcnode-id="4695" instrument_node="">
</span><a aria-controls="collapsedecision7420" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="4687" data-toggle="collapse" href="#decision7420" id="ext-element-21" role="button"><span data-dcnode-id="4694" instrument_node="">
</span><span data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">43COM 7.2</span></span><span data-dcnode-id="4691" instrument_node="">
											Pressing conservation issues 
												(2019)
											
											</span><span class="material-icons-sharp" data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">expand_more</span></span><span data-dcnode-id="4688" instrument_node="">
</span></a><span data-dcnode-id="4686" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="4529" id="decision7420"><span data-dcnode-id="4685" instrument_node="">
</span><div data-dcnode-id="4681"><strong data-dcnode-id="4683"><span data-dcnode-id="4684" instrument_node="">Code:</span></strong><span data-dcnode-id="4682" instrument_node=""> 43COM 7.2</span></div><span data-dcnode-id="4680" instrument_node="">
</span><div data-dcnode-id="4676"><strong data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">Title:</span></strong><span data-dcnode-id="4677" instrument_node=""> Pressing conservation issues</span></div><span data-dcnode-id="4675" instrument_node=""> </span><div data-dcnode-id="4671"><strong data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">Year:</span></strong><span data-dcnode-id="4672" instrument_node=""> 2019</span></div><span data-dcnode-id="4670" instrument_node="">
</span><p data-dcnode-id="4669"></p><p data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="4666" instrument_node="">
</span><ol data-dcnode-id="4535"><span data-dcnode-id="4665" instrument_node="">
</span><li data-dcnode-id="4661"><u data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">Having examined</span></u><span data-dcnode-id="4662" instrument_node=""> Documents WHC/19/43.COM/7, WHC/19/43.COM/7A, WHC/19/43.COM/7A.Add, WHC/19/43.COM/7A.Add.2, WHC/19/43.COM/7A.Add.3, WHC/19/43.COM/7B, WHC/19/43.COM/7B.Add, WHC/19/43.COM/7B.Add.2 and WHC/19/43.COM/7A.Add.3,</span></li><span data-dcnode-id="4660" instrument_node="">
</span><li data-dcnode-id="4642"><u data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">Recalling</span></u><span data-dcnode-id="4657" instrument_node=""> Decisions </span><strong data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">40&nbsp;COM 7</span></strong><span data-dcnode-id="4654" instrument_node="">, </span><strong data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">41&nbsp;COM 7</span></strong><span data-dcnode-id="4651" instrument_node="">, and </span><strong data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">42 COM 7</span></strong><span data-dcnode-id="4648" instrument_node="">, adopted at its 40th (Istanbul/UNESCO, 2016), 41st (Krakow, 2017) and 42nd (Manama, 2018) sessions respectively,</span><br data-dcnode-id="4647"><br data-dcnode-id="4646"><span data-dcnode-id="4645" instrument_node="">Emergency situations resulting from conflicts</span><br data-dcnode-id="4644"><br data-dcnode-id="4643"></li><span data-dcnode-id="4641" instrument_node="">
</span><li data-dcnode-id="4634"><u data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">Deplores</span></u><span data-dcnode-id="4638" instrument_node=""> the loss of human life as well as the degradation of humanitarian conditions resulting from the prevailing conflict situations in several countries, and </span><u data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">expresses its utmost concern</span></u><span data-dcnode-id="4635" instrument_node=""> at the devastating damage sustained and the continuing threats facing cultural and natural heritage in general;</span></li><span data-dcnode-id="4633" instrument_node="">
</span><li data-dcnode-id="4629"><u data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">Expresses its deep concern</span></u><span data-dcnode-id="4630" instrument_node=""> at the inter-community conflicts observed in Mali between the Dogon and Fulani communities, which have caused considerable loss of human life and significant damage to the cultural heritage, particularly within the World Heritage property of the Cliffs of Bandiagara (Land of the Dogons);</span></li><span data-dcnode-id="4628" instrument_node="">
</span><li data-dcnode-id="4621"><u data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">Thanks</span></u><span data-dcnode-id="4625" instrument_node=""> the State Party of Mali for the urgent actions that have been put in place to ensure the safety of communities in and around the property, and </span><u data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">encourages</span></u><span data-dcnode-id="4622" instrument_node=""> the State Party, to also take into account in its actions the protection of the property’s rich cultural heritage, and to do so in collaboration with the stakeholders involved in the establishment of long-term peace in Mali;</span></li><span data-dcnode-id="4620" instrument_node="">
</span><li data-dcnode-id="4616"><u data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">Welcomes</span></u><span data-dcnode-id="4617" instrument_node=""> the dispatch of a UNESCO mission to assess the damage caused to the property, and identify the needs related to the built and intangible cultural heritage and the objects and practices associated with the Cliffs of Bandiagara, in order to propose an Action Plan for the rehabilitation of the villages concerned;</span></li><span data-dcnode-id="4615" instrument_node="">
</span><li data-dcnode-id="4611"><u data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">Urges again</span></u><span data-dcnode-id="4612" instrument_node=""> all parties associated with conflicts to refrain from any action that would cause further damage to cultural and natural heritage and to fulfill their obligations under international law by taking all possible measures to protect such heritage, in particular the safeguarding of World Heritage properties and the sites included in the Tentative List;</span></li><span data-dcnode-id="4610" instrument_node="">
</span><li data-dcnode-id="4606"><u data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">Also urges again</span></u><span data-dcnode-id="4607" instrument_node=""> States Parties to adopt measures against using World Heritage properties for military purposes and to stop related uncontrolled development and impact;</span></li><span data-dcnode-id="4605" instrument_node="">
</span><li data-dcnode-id="4598"><u data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">Reiterates its utmost concern</span></u><span data-dcnode-id="4602" instrument_node=""> about the continuing threats of wildlife poaching and illegal trafficking of wildlife products linked to impacts of conflict and organized crime, which is eroding the biodiversity and Outstanding Universal Value (OUV) of many World Heritage sites across the world, and </span><u data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">urges</span></u><span data-dcnode-id="4599" instrument_node=""> States Parties to take the necessary measures to curb this problem, including through the implementation of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES);</span></li><span data-dcnode-id="4597" instrument_node="">
</span><li data-dcnode-id="4593"><u data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">Calls upon</span></u><span data-dcnode-id="4594" instrument_node=""> the international community to further support the safeguarding of the cultural and natural heritage of countries affected by conflict, through earmarked funds or through contributions to the UNESCO Heritage Emergency Fund;</span></li><span data-dcnode-id="4592" instrument_node="">
</span><li data-dcnode-id="4583"><u data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">Appeals</span></u><span data-dcnode-id="4589" instrument_node=""> to all Member States of UNESCO to cooperate in the fight against the illicit trafficking of cultural objects, as well as cultural heritage protection in general, including through the implementation of United Nations Security Council Resolutions 2199 (2015), 2253 (2015) and 2347 (2017);</span><br data-dcnode-id="4588"><br data-dcnode-id="4587"><span data-dcnode-id="4586" instrument_node="">Reconstruction</span><br data-dcnode-id="4585"><br data-dcnode-id="4584"></li><span data-dcnode-id="4582" instrument_node="">
</span><li data-dcnode-id="4578"><u data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">Thanks</span></u><span data-dcnode-id="4579" instrument_node=""> the State Party of Poland for the efforts to widely disseminate the Warsaw Recommendation on Recovery and Reconstruction of Cultural Heritage, as well as the proceedings of the international conference "The Challenges of World Heritage Recovery" held in Warsaw in May 2018;</span></li><span data-dcnode-id="4577" instrument_node="">
</span><li data-dcnode-id="4573"><u data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Welcomes</span></u><span data-dcnode-id="4574" instrument_node=""> the policy document "Culture in the reconstruction and rehabilitation of cities", published by UNESCO and the World Bank, which contributes to the reflection launched on the challenges related to the reconstruction of World Heritage properties;</span></li><span data-dcnode-id="4572" instrument_node="">
</span><li data-dcnode-id="4557"><u data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">Requests</span></u><span data-dcnode-id="4569" instrument_node=""> the World Heritage Centre, ICOMOS and ICCROM and the States Parties to the </span><em data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="4566" instrument_node="">, to continue the reflection on the recovery and reconstruction of World Heritage properties, and </span><u data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">requests</span></u><span data-dcnode-id="4563" instrument_node=""> the World Heritage Centre and the Advisory Bodies report back to the World Heritage Committee on the progress made in improving advice in this regard;</span><br data-dcnode-id="4562"><br data-dcnode-id="4561"><span data-dcnode-id="4560" instrument_node="">Climate Change </span><br data-dcnode-id="4559"><br data-dcnode-id="4558"></li><span data-dcnode-id="4556" instrument_node="">
</span><li data-dcnode-id="4552"><u data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Notes with appreciation</span></u><span data-dcnode-id="4553" instrument_node=""> the initiatives taken by the World Heritage Centre and the Advisory Bodies to advance work on updating the Policy Document on the Impacts of Climate Change on World Heritage properties, including through a planned widespread online consultation with States Parties, Advisory Bodies and civil society;</span></li><span data-dcnode-id="4551" instrument_node="">
</span><li data-dcnode-id="4547"><u data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">Requests</span></u><span data-dcnode-id="4548" instrument_node=""> that the development of the updated Policy Document be completed for consideration by the Committee at its 44th session in 2020;</span></li><span data-dcnode-id="4546" instrument_node="">
</span><li data-dcnode-id="4542"><u data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">Welcomes</span></u><span data-dcnode-id="4543" instrument_node=""> the initiative taken by the World Heritage Centre together with a global private-public consortium of partners, to build climate adaptation strategies across five marine World Heritage sites in Australia, Belize, France and Palau;</span></li><span data-dcnode-id="4541" instrument_node="">
</span><li data-dcnode-id="4537"><u data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">Urges</span></u><span data-dcnode-id="4538" instrument_node=""> all States Parties to step up action toward better understanding the climate vulnerability of World Heritage properties and put in place adaptation strategies that strengthen the resilience of properties and ensure the conservation of their Outstanding Universal Value.</span></li><span data-dcnode-id="4536" instrument_node="">
</span></ol><p data-dcnode-id="4534"></p><span data-dcnode-id="4533" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="4531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/7420"><span data-dcnode-id="4532" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="4530" instrument_node="">
</span></div><span data-dcnode-id="4528" instrument_node="">
</span></span><span data-dcnode-id="4526" instrument_node="">
</span></div><span data-dcnode-id="4524" instrument_node="">
</span><div class="list-counter mb-1" data-dcnode-id="4379" id="list-7421" style=""><span data-dcnode-id="4523" instrument_node="">
</span><span data-dcnode-id="4381"><span data-dcnode-id="4522" instrument_node="">
</span><a aria-controls="collapsedecision7421" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="4514" data-toggle="collapse" href="#decision7421" id="ext-element-22" role="button"><span data-dcnode-id="4521" instrument_node="">

												(2019)
											
											</span><span class="material-icons-sharp" data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">expand_more</span></span><span data-dcnode-id="4515" instrument_node="">
</span></a><span data-dcnode-id="4513" instrument_node="">

</span><div data-dcnode-id="4508"><strong data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">Code:</span></strong><span data-dcnode-id="4509" instrument_node=""> 43COM 7.3</span></div><span data-dcnode-id="4507" instrument_node="">
</span><div data-dcnode-id="4503"><strong data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Title:</span></strong><span data-dcnode-id="4504" instrument_node=""> Other matters</span></div><span data-dcnode-id="4502" instrument_node=""> </span><div data-dcnode-id="4498"><strong data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Year:</span></strong><span data-dcnode-id="4499" instrument_node=""> 2019</span></div><span data-dcnode-id="4497" instrument_node="">
</span><p data-dcnode-id="4496"></p><p data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="4493" instrument_node="">
</span><ol data-dcnode-id="4389"><span data-dcnode-id="4492" instrument_node="">
</span><li data-dcnode-id="4488"><u data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">Having examined</span></u><span data-dcnode-id="4489" instrument_node=""> Documents WHC/19/43.COM/7, WHC/19/43.COM/7A, WHC/19/43.COM/7A.Add, WHC/19/43.COM/7A.Add.2, WHC/19/43.COM/7A.Add.3, WHC/19/43.COM/7B, WHC/19/43.COM/7B.Add, WHC/19/43.COM/7B.Add.2 and WHC/19/43.COM/7A.Add.3,</span></li><span data-dcnode-id="4487" instrument_node="">
</span><li data-dcnode-id="4475"><u data-dcnode-id="4485"><span data-dcnode-id="4486" instrument_node="">Recalling</span></u><span data-dcnode-id="4484" instrument_node=""> Decision </span><strong data-dcnode-id="4482"><span data-dcnode-id="4483" instrument_node="">42&nbsp;COM 7</span></strong><span data-dcnode-id="4481" instrument_node="">, adopted at its 42nd (Manama, 2018),</span><br data-dcnode-id="4480"><br data-dcnode-id="4479"><span data-dcnode-id="4478" instrument_node="">Management Plans in the context of urban development</span><br data-dcnode-id="4477"><br data-dcnode-id="4476"></li><span data-dcnode-id="4474" instrument_node="">
</span><li data-dcnode-id="4470"><u data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">Noting</span></u><span data-dcnode-id="4471" instrument_node=""> that the many Management Plans and management systems for urban properties are not adequately anchored in the legal mechanisms, systems, and processes for urban development,</span></li><span data-dcnode-id="4469" instrument_node="">
</span><li data-dcnode-id="4465"><u data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">Also noting</span></u><span data-dcnode-id="4466" instrument_node=""> that the pressures of high investment urban development projects in and around properties are increasingly a threat to their Outstanding Universal Value (OUV), and that in contrast, the OUV could provide a valuable opportunity for the property and its wider setting to define a new urban vision that integrates and valorizes the OUV with new needs and aspirations,</span></li><span data-dcnode-id="4464" instrument_node="">
</span><li data-dcnode-id="4457"><u data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">Recalling</span></u><span data-dcnode-id="4461" instrument_node=""> that the approach of the 2011 UNESCO Recommendation on the Historic Urban Landscape has highlighted the need for urban areas to be well integrated into their wider social, economic and cultural context, </span><u data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">calls on</span></u><span data-dcnode-id="4458" instrument_node=""> all States Parties to prepare and deliver Management Plans, for properties in and around urban areas, so that their planning elements can be integrated directly into the planning and development policies, plans, processes and instruments; regardless of whether the property is inscribed for its urban values or not;</span></li><span data-dcnode-id="4456" instrument_node="">
</span><li data-dcnode-id="4452"><u data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">Requests</span></u><span data-dcnode-id="4453" instrument_node=""> the World Heritage Centre and the Advisory Bodies to continue reflecting on the mechanisms and tools needed to assess and guide interventions in and around urban properties to sustain the OUV of the properties and to promote sustainable development and actively engage with the wider development processes that could over time impact the appearance, use, and meaning of buildings and spaces in properties and their settings;</span></li><span data-dcnode-id="4451" instrument_node="">
</span><li data-dcnode-id="4444"><u data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">Notes with appreciation</span></u><span data-dcnode-id="4448" instrument_node=""> the International Union of Architects Forum (UIA) on “Mass Tourism in Historic Cities”, which was held in Baku, Azerbaijan, on 7-9 June 2019 and </span><u data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">welcomes</span></u><span data-dcnode-id="4445" instrument_node=""> the proposal of the UIA to prepare, in close cooperation with the World Heritage Centre and the Advisory Bodies, guidelines for architectural competitions in and around World Heritage urban properties that will recognise their Outstanding Universal Value;</span></li><span data-dcnode-id="4443" instrument_node="">
</span><li data-dcnode-id="4437"><u data-dcnode-id="4441"><span data-dcnode-id="4442" instrument_node="">W</span></u><u data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">elcomes</span></u><span data-dcnode-id="4438" instrument_node=""> the offer of the Government of Japan to host an international experts meeting in January 2020 to provide further guidelines for the integration of the assessment of the impacts for interventions in the wider processes of urban management by applying the 2011 Recommendation on the Historic Urban Landscape to address the challenges of increased urbanization in close cooperation with the World Heritage Centre and the Advisory Bodies;</span></li><span data-dcnode-id="4436" instrument_node="">
</span><li data-dcnode-id="4427"><u data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">Calls on</span></u><span data-dcnode-id="4433" instrument_node=""> the UNESCO Secretariat to develop measures to address the inherently limited nature of institutional capacity in SIDS, acting as an impediment in identifying, inventorying and proposing potential cultural and natural heritage sites for listing;</span><br data-dcnode-id="4432"><br data-dcnode-id="4431"><span data-dcnode-id="4430" instrument_node="">Tourism</span><br data-dcnode-id="4429"><br data-dcnode-id="4428"></li><span data-dcnode-id="4426" instrument_node="">
</span><li data-dcnode-id="4419"><u data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">Acknowledging</span></u><span data-dcnode-id="4423" instrument_node=""> the contribution of sustainable tourism to the 2030 Agenda on Sustainable Development and the positive impact it can have on local communities and the protection of World Heritage properties, nevertheless </span><u data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">notes with concern</span></u><span data-dcnode-id="4420" instrument_node=""> that the number of properties negatively affected by overcrowding, congestion and tourism infrastructure development continues to increase;</span></li><span data-dcnode-id="4418" instrument_node="">
</span><li data-dcnode-id="4411"><u data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">Noting</span></u><span data-dcnode-id="4415" instrument_node=""> that the protection of Outstanding Universal Value (OUV) must be a central objective for all World Heritage properties, </span><u data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">requests</span></u><span data-dcnode-id="4412" instrument_node=""> States Parties to develop visitor management plans and strategies that address the seasonality of tourism (smoothing visitor numbers over time and spreading visitors across sites), encourage longer more in-depth experiences promoting tourism products and services that reflect natural and cultural values, and limit access and activities to improve visitor flows and experiences, while reducing pressures on the attributes which underpin OUV ;</span></li><span data-dcnode-id="4410" instrument_node="">
</span><li data-dcnode-id="4406"><u data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">Encourages</span></u><span data-dcnode-id="4407" instrument_node=""> the States Parties to support UNESCO in its efforts to assist heritage and tourism managers with system development and data collection to help destinations understand their specific situations and early warning signs, provide incentives for sustainable tourism development and raise awareness to change visitor behaviour;</span></li><span data-dcnode-id="4405" instrument_node="">
</span><li data-dcnode-id="4396"><u data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Calls on</span></u><span data-dcnode-id="4402" instrument_node=""> UNESCO Secretariat to recognize opportunities for forging synergies between core UNESCO activities that could be harnessed to strengthen heritage sites: youth, heritage tourism training, sustainable heritage tourism and biodiversity, and relate it directly to SIDS;</span><br data-dcnode-id="4401"><br data-dcnode-id="4400"><span data-dcnode-id="4399" instrument_node="">Heritage Impact Assessments / Environmental Impact Assessments (HIAs/EIAs)</span><br data-dcnode-id="4398"><br data-dcnode-id="4397"></li><span data-dcnode-id="4395" instrument_node="">
</span><li data-dcnode-id="4391"><u data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">Notes</span></u><span data-dcnode-id="4392" instrument_node=""> the progress of revising the guidance on impact assessment for World Heritage undertaken by the ICCROM/IUCN World Heritage Leadership Programme together with the World Heritage Centre and ICOMOS.</span></li><span data-dcnode-id="4390" instrument_node="">
</span></ol><p data-dcnode-id="4388"></p><span data-dcnode-id="4387" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/7421"><span data-dcnode-id="4386" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="4384" instrument_node="">

</span><a aria-controls="collapsedecision7112" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="4368" data-toggle="collapse" href="#decision7112" id="ext-element-23" role="button"><span data-dcnode-id="4375" instrument_node="">
</span><span data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">42COM 7</span></span><span data-dcnode-id="4372" instrument_node="">
											State of Conservation of World Heritage Properties 
												(2018)
											
											</span><span class="material-icons-sharp" data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">expand_more</span></span><span data-dcnode-id="4369" instrument_node="">
</span></a><span data-dcnode-id="4367" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="3845" id="decision7112"><span data-dcnode-id="4366" instrument_node="">
</span><div data-dcnode-id="4362"><strong data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Code:</span></strong><span data-dcnode-id="4363" instrument_node=""> 42COM 7</span></div><span data-dcnode-id="4361" instrument_node="">
</span><div data-dcnode-id="4357"><strong data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">Title:</span></strong><span data-dcnode-id="4358" instrument_node=""> State of Conservation of World Heritage Properties</span></div><span data-dcnode-id="4356" instrument_node=""> </span><div data-dcnode-id="4352"><strong data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Year:</span></strong><span data-dcnode-id="4353" instrument_node=""> 2018</span></div><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4350"></p><p data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="4347" instrument_node="">
</span><ol data-dcnode-id="3851"><span data-dcnode-id="4346" instrument_node="">
</span><li data-dcnode-id="4342"><u data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">Having examined</span></u><span data-dcnode-id="4343" instrument_node=""> Documents WHC/18/42.COM/7, WHC/18/42.COM/7A, WHC/18/42.COM/7A.Add, WHC/18/42.COM/7A.Add.2, WHC/18/42.COM/7B and WHC/18/42.COM/7B.Add and WHC/18/42.COM/7B.Add.2,</span></li><span data-dcnode-id="4341" instrument_node="">
</span><li data-dcnode-id="4331"><u data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Recalling</span></u><span data-dcnode-id="4338" instrument_node=""> Decisions </span><strong data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">40&nbsp;COM 7</span></strong><span data-dcnode-id="4335" instrument_node=""> and </span><strong data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">41&nbsp;COM 7</span></strong><span data-dcnode-id="4332" instrument_node="">, adopted at its 40th (Istanbul/UNESCO, 2016) and 41st (Krakow, 2017) sessions respectively, </span></li><span data-dcnode-id="4330" instrument_node="">
</span><li data-dcnode-id="4320"><u data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">Thanks</span></u><span data-dcnode-id="4327" instrument_node=""> the State Party of Bahrain for having organized a World Heritage Site Managers Forum (Manama, 2018), as a capacity-building exercise aiming at increasing the understanding of the World Heritage decision-making process among site managers, in order to achieve a more effective protection of the Outstanding Universal Value (OUV); </span><u data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">acknowledges</span></u><span data-dcnode-id="4324" instrument_node=""> the importance and benefit of this Forum and </span><u data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">considers</span></u><span data-dcnode-id="4321" instrument_node=""> that it should be convened in conjunction with all future sessions of the World Heritage Committee; </span></li><span data-dcnode-id="4319" instrument_node="">
</span><li data-dcnode-id="4301"><u data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">Takes note</span></u><span data-dcnode-id="4309"><span data-dcnode-id="4310"><span data-dcnode-id="4316" instrument_node=""> of the Statement of Participants to the Forum and </span><u data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">encourages</span></u><span data-dcnode-id="4313" instrument_node=""> States Parties to support the participation of their respective site managers to future fora and other capacity-building opportunities in order to enable them to provide appropriate information with regard to the management of their respective sites;</span><br data-dcnode-id="4312"><br data-dcnode-id="4311"></span></span><span data-dcnode-id="4308" instrument_node="">
</span><p data-dcnode-id="4303"><strong data-dcnode-id="4305"><span data-dcnode-id="4307" instrument_node="">Statutory matters related to Reactive Monitoring</span><br data-dcnode-id="4306"></strong><span data-dcnode-id="4304" instrument_node="">Reactive Monitoring evaluation</span></p><span data-dcnode-id="4302" instrument_node="">
</span></li><span data-dcnode-id="4300" instrument_node="">
</span><li data-dcnode-id="4290"><span data-dcnode-id="4299" instrument_node="">
</span><p data-dcnode-id="4292"><u data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Takes note with appreciation</span></u><span data-dcnode-id="4296" instrument_node=""> that the World Heritage Centre has launched an evaluation of the Reactive Monitoring process and </span><u data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">thanks</span></u><span data-dcnode-id="4293" instrument_node=""> the State Party of Switzerland for its financial support to this activity;</span></p><span data-dcnode-id="4291" instrument_node="">
</span></li><span data-dcnode-id="4289" instrument_node="">
</span><li data-dcnode-id="4282"><u data-dcnode-id="4287"><span data-dcnode-id="4288" instrument_node="">Notes with concern</span></u><span data-dcnode-id="4286" instrument_node=""> that some properties have remained on the List of World Heritage in Danger for more than ten years; this raises questions on whether the OUV has been maintained and </span><u data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">requests</span></u><span data-dcnode-id="4283" instrument_node=""> the World Heritage Centre to establish an inclusive working mechanism for assessing the OUV of these sites, and to present a report during the 44th session;</span></li><span data-dcnode-id="4281" instrument_node="">
</span><li data-dcnode-id="4277"><u data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">Urges</span></u><span data-dcnode-id="4278" instrument_node=""> States Parties along with other stakeholders to actively contribute to the evaluation of the Reactive Monitoring process to ensure this mechanism remains a valuable indicator and overview of the state of conservation of heritage;</span></li><span data-dcnode-id="4276" instrument_node="">
</span><li data-dcnode-id="4272"><u data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">Also takes note</span></u><span data-dcnode-id="4273" instrument_node=""> that the Secretariat has prepared audio-visual communication and outreach material related to the List of World Heritage in Danger;</span></li><span data-dcnode-id="4271" instrument_node="">
</span><li data-dcnode-id="4264"><u data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">Encourages</span></u><span data-dcnode-id="4268" instrument_node=""> all stakeholders of the </span><em data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="4265" instrument_node=""> to engage in the promotion of a better understanding of the implications and benefits of properties being inscribed on the List of World Heritage in Danger, and to develop appropriate information material in this regard with a view to overcome the negative perceptions of the List of World Heritage in Danger;</span></li><span data-dcnode-id="4263" instrument_node="">
</span><li data-dcnode-id="4256"><u data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Requests</span></u><span data-dcnode-id="4260" instrument_node=""> that the Reactive Monitoring Evaluation includes options for process improvements for sites on the List of World Heritage in Danger, in particular how actions recommended by Reactive Monitoring missions to assist States Parties meet their Desired state of conservation should be incorporated into the costed Action Plans decided by the World Heritage Committee in its Decision </span><strong data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">41 COM 14</span></strong><span data-dcnode-id="4257" instrument_node="">;</span></li><span data-dcnode-id="4255" instrument_node="">
</span><li data-dcnode-id="4248"><u data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Further requests</span></u><span data-dcnode-id="4252" instrument_node=""> the World Heritage Centre develop a proposal, for sharing in the World Heritage Market Place, for funds to support a workshop to assist States Parties with sites on the List of World Heritage in Danger to develop and implement prioritized, staged and costed actions plans, and </span><u data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">notes</span></u><span data-dcnode-id="4249" instrument_node=""> that these plans can be linked to requests for international assistance and shared in the Market Place;</span></li><span data-dcnode-id="4247" instrument_node="">
</span><li data-dcnode-id="4235"><u data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">Recognizing</span></u><span data-dcnode-id="4236"><span data-dcnode-id="4244" instrument_node=""> the importance of focusing on those properties of greatest concern, </span><u data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">recommends</span></u><span data-dcnode-id="4241" instrument_node=""> that, with effect from the 43rd session of the Committee, the World Heritage Centre considers geographical and thematic distribution of properties as additional criteria when determining which properties to open for discussion under Agenda items 7A and 7B;</span><br data-dcnode-id="4240"><br data-dcnode-id="4239"><span data-dcnode-id="4238" instrument_node="">Dialogue with civil society</span><br data-dcnode-id="4237"></span></li><span data-dcnode-id="4234" instrument_node="">
</span><li data-dcnode-id="4227"><u data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">Welcomes</span></u><span data-dcnode-id="4231" instrument_node=""> the continued interest of civil society organizations in the </span><em data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">Convention</span></em><span data-dcnode-id="4228" instrument_node="">, acknowledging the important contribution that can be made to the promotion and conservation of heritage on the ground and to capacity-building;</span></li><span data-dcnode-id="4226" instrument_node="">
</span><li data-dcnode-id="4219"><u data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">Also welcomes</span></u><span data-dcnode-id="4223" instrument_node=""> the initiative of the World Heritage Centre to open the consultation processes related to the </span><em data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">Convention</span></em><span data-dcnode-id="4220" instrument_node=""> to a larger number of stakeholders, including civil society; </span></li><span data-dcnode-id="4218" instrument_node="">
</span><li data-dcnode-id="4211"><u data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">Takes note</span></u><span data-dcnode-id="4215" instrument_node=""> of the World Heritage Civil Society Workshop organized further to the initiative of World Wildlife Fund (WWF) in March 2018, which discussed how civil society participation in the </span><em data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Convention</span></em><span data-dcnode-id="4212" instrument_node="">, and specifically in World Heritage Committee sessions, can be further improved;</span></li><span data-dcnode-id="4210" instrument_node="">
</span><li data-dcnode-id="4198"><u data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Encourages again</span></u><span data-dcnode-id="4207" instrument_node=""> States Parties and civil society organizations to continue to explore possibilities to further civil society engagement in the </span><em data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Convention</span></em><span data-dcnode-id="4204" instrument_node="">, both by contributing to enhanced conservation of heritage on the site and national level and by providing relevant input to the heritage related debate at the global level;</span><br data-dcnode-id="4203"><strong data-dcnode-id="4200"><br data-dcnode-id="4202"><span data-dcnode-id="4201" instrument_node="">Emergency situations resulting from conflicts</span></strong><br data-dcnode-id="4199"></li><span data-dcnode-id="4197" instrument_node="">
</span><li data-dcnode-id="4190"><u data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Deplores</span></u><span data-dcnode-id="4194" instrument_node=""> the loss of human life as well as the degradation of humanitarian conditions resulting from the conflict situations prevailing in several countries, and </span><u data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">expresses its utmost concern</span></u><span data-dcnode-id="4191" instrument_node=""> at the devastating damage sustained and the continuing threats facing cultural and natural heritage in general; </span></li><span data-dcnode-id="4189" instrument_node="">
</span><li data-dcnode-id="4185"><u data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">Urges</span></u><span data-dcnode-id="4186" instrument_node=""> all parties associated with conflicts to refrain from any action that would cause further damage to cultural and natural heritage and to fulfill their obligations under international law by taking all possible measures to protect such heritage, in particular the safeguarding of World Heritage properties and the sites included in the Tentative List;</span></li><span data-dcnode-id="4184" instrument_node="">
</span><li data-dcnode-id="4180"><u data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Also urges </span></u><span data-dcnode-id="4181" instrument_node="">the States Parties to adopt measures against World Heritage properties being used for military purposes and to stop uncontrolled development; </span></li><span data-dcnode-id="4179" instrument_node="">
</span><li data-dcnode-id="4175"><u data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Also expresses its utmost concern</span></u><span data-dcnode-id="4176" instrument_node=""> about the impacts of conflicts causing an escalation of the already severe poaching crisis in central Africa, as armed groups are financing their activities through illegal wildlife trade, which is having a severe impact on wildlife populations, thereby degrading the Outstanding Universal Value (OUV) of natural World Heritage properties; </span></li><span data-dcnode-id="4174" instrument_node="">
</span><li data-dcnode-id="4160"><u data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Appeals</span></u><span data-dcnode-id="4168"><span data-dcnode-id="4171" instrument_node=""> to all Member States of UNESCO to cooperate in the fight against the illicit trafficking of cultural objects and illegal wildlife trade, as well as cultural heritage protection in general, including through the implementation of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES), and of United Nations Security Council Resolutions 2199 (2015), 2253 (2015) and 2347 (2017) and of the 1970 Convention on the Means of Prohibiting and Preventing the Illicit Import and Export and Transfer of Ownership of Cultural Property;</span><br data-dcnode-id="4170"><br data-dcnode-id="4169"></span><span data-dcnode-id="4167" instrument_node="">
</span><p data-dcnode-id="4163"><strong data-dcnode-id="4164"><span data-dcnode-id="4166" instrument_node="">Emergency situations resulting from natural disasters</span><br data-dcnode-id="4165"></strong></p><span data-dcnode-id="4162" instrument_node="">
</span><u data-dcnode-id="4161"></u></li><span data-dcnode-id="4159" instrument_node="">
</span><li data-dcnode-id="4155"><u data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Welcomes</span></u><span data-dcnode-id="4156" instrument_node=""> the efforts undertaken by the World Heritage Centre to implement the Strategy for Reducing Risks from Disasters at World Heritage Properties;</span></li><span data-dcnode-id="4154" instrument_node="">
</span><li data-dcnode-id="4150"><u data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">Urges</span></u><span data-dcnode-id="4151" instrument_node=""> States Parties, in coordination with the World Heritage Centre, to give priority within international assistance in implementing emergency measures to mitigate significant damages resulting from natural disasters that are likely to affect the Outstanding Universal Value of World Heritage properties;</span></li><span data-dcnode-id="4149" instrument_node="">
</span><li data-dcnode-id="4135"><u data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">Encourages</span></u><span data-dcnode-id="4144"><span data-dcnode-id="4146" instrument_node=""> States Parties and other stakeholders to further strengthen international cooperation aiming at mitigating impacts of major natural disasters affecting World Heritage properties and reducing vulnerabilities on lives, properties and livelihoods;</span><br data-dcnode-id="4145"></span><span data-dcnode-id="4143" instrument_node="">
</span><p data-dcnode-id="4137"><strong data-dcnode-id="4139"><br data-dcnode-id="4142"><span data-dcnode-id="4141" instrument_node="">Other conservation issues</span><br data-dcnode-id="4140"></strong><span data-dcnode-id="4138" instrument_node="">Reconstruction</span></p><span data-dcnode-id="4136" instrument_node="">
</span></li><span data-dcnode-id="4134" instrument_node="">
</span><li data-dcnode-id="4130"><u data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">Thanks</span></u><span data-dcnode-id="4131" instrument_node=""> the Government of Poland for hosting the International Conference on Reconstruction “The Challenges of World Heritage Recovery” (Warsaw, 6-8 May 2018), providing a forum for review of specific case studies and understanding of the role of reconstruction in recovery, especially in post-conflict and post-disaster situations;</span></li><span data-dcnode-id="4129" instrument_node="">
</span><li data-dcnode-id="4122"><u data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Welcomes</span></u><span data-dcnode-id="4126" instrument_node=""> the Warsaw Recommendation providing clear principles on reconstruction and recovery and </span><u data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">requests</span></u><span data-dcnode-id="4123" instrument_node=""> the World Heritage Centre and the Advisory Bodies to broadly disseminate it among States Parties, World Heritage stakeholders and partner organizations;</span></li><span data-dcnode-id="4121" instrument_node="">
</span><li data-dcnode-id="4117"><u data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">Also requests</span></u><span data-dcnode-id="4118" instrument_node=""> the World Heritage Centre and the Advisory Bodies to continue the reflection and report back to its 43rd session in 2019 on the implementation of the Warsaw Recommendation; </span></li><span data-dcnode-id="4116" instrument_node="">
</span><li data-dcnode-id="4105"><u data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">Encourages</span></u><span data-dcnode-id="4110"><span data-dcnode-id="4113" instrument_node=""> the ongoing cooperation with the World Bank and with United Nations agencies in addressing the challenges of World Heritage recovery and reconstruction;</span><br data-dcnode-id="4112"><br data-dcnode-id="4111"></span><span data-dcnode-id="4109" instrument_node="">
</span><p data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Climate Change</span></p><span data-dcnode-id="4106" instrument_node="">
</span></li><span data-dcnode-id="4104" instrument_node="">
</span><li data-dcnode-id="4097"><u data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">Expresses its continued concern</span></u><span data-dcnode-id="4101" instrument_node=""> about the impacts of climate change on the Outstanding Universal Value (OUV) of World Heritage properties and </span><u data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">reiterates</span></u><span data-dcnode-id="4098" instrument_node=""> the importance of States Parties undertaking the most ambitious implementation of the Paris Agreement of the United Nations Framework Convention on Climate Change (UNFCCC), by holding the increase in the global average temperature to well below 2 °C above pre-industrial levels and by pursuing efforts to limit the global average temperature increase to 1.5 °C above pre-industrial levels, recognizing that this would significantly reduce the risks and impacts of climate change;</span></li><span data-dcnode-id="4096" instrument_node="">
</span><li data-dcnode-id="4092"><u data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">Notes with appreciation</span></u><span data-dcnode-id="4093" instrument_node=""> the initiatives taken by the World Heritage Centre and the Advisory Bodies to advance work on the updating of the Policy Document on the impacts of climate change on World Heritage properties; </span></li><span data-dcnode-id="4091" instrument_node="">
</span><li data-dcnode-id="4087"><u data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">Requests</span></u><span data-dcnode-id="4088" instrument_node=""> that the development of the updated Policy Document include consultation with States Parties, the Advisory Bodies and civil society, and be completed for consideration by the Committee at its 43rd session in 2019;</span></li><span data-dcnode-id="4086" instrument_node="">
</span><li data-dcnode-id="4082"><u data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">Expresses its gratitude</span></u><span data-dcnode-id="4083" instrument_node=""> to the State Party of Germany for the organization of a workshop on World Heritage and Climate Change (Vilm, October 2017), to the State Party of the Netherlands for its generous support to the updating of the Policy Document and to the State Party of France for its generous support to the first global scientific assessment of climate change impacts on World Heritage-listed coral reefs; </span></li><span data-dcnode-id="4081" instrument_node="">
</span><li data-dcnode-id="4070"><u data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">Thanks</span></u><span data-dcnode-id="4075"><span data-dcnode-id="4078" instrument_node=""> the Secretariat of the UNFCCC for its active participation in the above-mentioned workshop and inputs into the forthcoming broader Policy Document updating process;</span><br data-dcnode-id="4077"><br data-dcnode-id="4076"></span><span data-dcnode-id="4074" instrument_node="">
</span><p data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">Absent or unclear boundaries</span></p><span data-dcnode-id="4071" instrument_node="">
</span></li><span data-dcnode-id="4069" instrument_node="">
</span><li data-dcnode-id="4065"><u data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">Urges</span></u><span data-dcnode-id="4066" instrument_node=""> States Parties that still have properties with unclear boundaries and/or buffer zones to undertake the necessary mapping exercises to clarify their boundaries and buffer zones of properties at the time of their inscription, and submit those to the World Heritage Centre for subsequent examination by the World Heritage Committee;</span></li><span data-dcnode-id="4064" instrument_node="">
</span><li data-dcnode-id="4050"><u data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Reminds</span></u><span data-dcnode-id="4056"><span data-dcnode-id="4061" instrument_node=""> States Parties that any change to existing boundaries and buffer zones must be approved by the World Heritage Committee through the applicable procedures, as outlined in paragraphs 163-167 of the </span><em data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="4058" instrument_node="">;</span><br data-dcnode-id="4057"></span><span data-dcnode-id="4055" instrument_node="">
</span><p data-dcnode-id="4052"><br data-dcnode-id="4054"><span data-dcnode-id="4053" instrument_node="">Heritage Impact Assessments/Environmental Impact Assessments (HIAs/EIAs)</span></p><span data-dcnode-id="4051" instrument_node="">
</span></li><span data-dcnode-id="4049" instrument_node="">
</span><li data-dcnode-id="4042"><u data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Welcomes</span></u><span data-dcnode-id="4046" instrument_node=""> the increasing use of Heritage Impact Assessments (HIAs) to assess the potential impact of proposed development projects on the Outstanding Universal Value (OUV) of cultural World Heritage properties, and </span><u data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">encourages</span></u><span data-dcnode-id="4043" instrument_node=""> States Parties to use the HIA methodology for all developments within or otherwise affecting cultural World Heritage properties, as part of the accepted decision-making process;</span></li><span data-dcnode-id="4041" instrument_node="">
</span><li data-dcnode-id="4034"><u data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">Stresses</span></u><span data-dcnode-id="4038" instrument_node=""> the necessity for HIAs and Environmental Impact Assessments (EIAs) to be proportionate to the scope and scale of projects, with simpler assessments being undertaken for smaller projects and Strategic Environmental Assessments (SEAs) for very large projects, and the necessity for assessments to be undertaken in a timely fashion and submitted to the World Heritage Centre for review by the Advisory Bodies, as part of notifications made under Paragraph&nbsp;172 of the </span><em data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="4035" instrument_node="">;</span></li><span data-dcnode-id="4033" instrument_node="">
</span><li data-dcnode-id="4029"><u data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">Reiterates</span></u><span data-dcnode-id="4030" instrument_node=""> that HIAs and EIAs should include a dedicated section examining the potential impact of the project on the OUV of the World Heritage property, in accordance with the existing ICOMOS Guidance and IUCN Advice Note; </span></li><span data-dcnode-id="4028" instrument_node="">
</span><li data-dcnode-id="4021"><u data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Notes</span></u><span data-dcnode-id="4025" instrument_node=""> that HIAs cannot be assessed as stand-alone documents and </span><u data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">requests</span></u><span data-dcnode-id="4022" instrument_node=""> States Parties to ensure that when HIAs are submitted to the World Heritage Centre for review by the Advisory Bodies that they are accompanied by full details of the project to which they refer;</span></li><span data-dcnode-id="4020" instrument_node="">
</span><li data-dcnode-id="4012"><u data-dcnode-id="4018"><span data-dcnode-id="4019" instrument_node="">Also welcomes</span></u><span data-dcnode-id="4017" instrument_node=""> the initiative of IUCN and ICCROM to develop further advice on impact assessment for cultural and natural heritage in the framework of the World Heritage Leadership programme with the support of Norway;</span><br data-dcnode-id="4016"><br data-dcnode-id="4015"><span data-dcnode-id="4014" instrument_node="">Large scale development projects and Strategic Environmental Assessments</span><br data-dcnode-id="4013"></li><span data-dcnode-id="4011" instrument_node="">
</span><li data-dcnode-id="4007"><u data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">Noting with concern</span></u><span data-dcnode-id="4008" instrument_node=""> that an increasing number of properties are threatened by large-scale development projects including dams, extractive industries, and transportation infrastructure, located both inside and outside their boundaries, </span></li><span data-dcnode-id="4006" instrument_node="">
</span><li data-dcnode-id="4002"><u data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">Also noting</span></u><span data-dcnode-id="4003" instrument_node=""> that Environmental Impact Assessments (EIAs) and Heritage Impact Assessments (HIAs) do not always allow for a broad enough assessment of the potential impact of these large-scale developments, nor an assessment of a broad enough range of options at an early enough stage in the planning process, </span></li><span data-dcnode-id="4001" instrument_node="">
</span><li data-dcnode-id="3997"><u data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">Requests</span></u><span data-dcnode-id="3998" instrument_node=""> States Parties to ensure that the potential impacts of such large-scale developments on the Outstanding Universal Value (OUV) of World Heritage properties directly affected or located within their zone of influence are assessed through Strategic Environmental Assessments (SEAs) at an early stage in the development of the overall project, before locations/routes have been fixed and prior to any approvals being given;</span></li><span data-dcnode-id="3996" instrument_node="">
</span><li data-dcnode-id="3979"><u data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">Recalling</span></u><span data-dcnode-id="3993" instrument_node=""> Article 6 of the </span><em data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">Convention</span></em><span data-dcnode-id="3990" instrument_node="">, </span><u data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">also requests</span></u><span data-dcnode-id="3987" instrument_node=""> States Parties to systematically inform the World Heritage Centre, in accordance with Paragraph 172 of the </span><em data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="3984" instrument_node="">, of any planned large-scale development projects in their territories that may impact on the OUV of a property, even if the property concerned is situated on the territory of other States Parties, and to ensure that these impacts are assessed as part of the SEA of the project concerned;</span><br data-dcnode-id="3983"><br data-dcnode-id="3982"><span data-dcnode-id="3981" instrument_node="">Tourism and Visitor Management</span><br data-dcnode-id="3980"></li><span data-dcnode-id="3978" instrument_node="">
</span><li data-dcnode-id="3971"><u data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">Acknowledging</span></u><span data-dcnode-id="3975" instrument_node=""> the contribution of sustainable tourism to the 2030 Agenda on Sustainable Development and the positive impact it can have on local communities and the protection of World Heritage properties, </span><u data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">nevertheless notes with concern</span></u><span data-dcnode-id="3972" instrument_node=""> that the number of properties negatively affected by inadequate visitor management and tourism infrastructure development continues to increase;</span></li><span data-dcnode-id="3970" instrument_node="">
</span><li data-dcnode-id="3966"><u data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Requests</span></u><span data-dcnode-id="3967" instrument_node=""> States Parties to develop Visitor Management Plans that assess appropriate carrying capacity of properties for visitors and address the issue of unregulated tourism;</span></li><span data-dcnode-id="3965" instrument_node="">
</span><li data-dcnode-id="3957"><u data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Encourages</span></u><span data-dcnode-id="3962" instrument_node=""> the States Parties to support UNESCO in its effort to develop an overall Visitor Management Strategy for World Heritage, with policy recommendations to assist States Parties in addressing the issues of unregulated and unsustainable tourism use and development, and to provide resources to UNESCO for the implementation of the Strategy;</span><br data-dcnode-id="3961"><br data-dcnode-id="3960"><span data-dcnode-id="3959" instrument_node="">Impact of sports facilities and activities on World Heritage properties</span><br data-dcnode-id="3958"></li><span data-dcnode-id="3956" instrument_node="">
</span><li data-dcnode-id="3949"><u data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Welcomes</span></u><span data-dcnode-id="3953" instrument_node=""> the continued agreement between IUCN and the International Olympic Committee (IOC) aiming at integrating biodiversity considerations in IOC’s processes, and </span><u data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">takes note</span></u><span data-dcnode-id="3950" instrument_node=""> of the Sport and Biodiversity guide launched by IUCN as the first in a series of reports that will provide guidance to the sports sector regarding its potential impacts on nature, including on World Heritage properties</span></li><span data-dcnode-id="3948" instrument_node="">
</span><li data-dcnode-id="3937"><u data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">Also welcomes</span></u><span data-dcnode-id="3945" instrument_node=""> the World Rowing Federation (FISA) commitment to respect and preserve the Outstanding Universal Value (OUV) of natural and mixed World Heritage properties, and </span><u data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">calls on</span></u><span data-dcnode-id="3942" instrument_node=""> other Sport Federations to consider making similar commitments, including for all types of World Heritage, both natural and cultural;</span><br data-dcnode-id="3941"><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">Dialogue with the extractive industries and the finance sector on the “No-go Commitment”</span><br data-dcnode-id="3938"></li><span data-dcnode-id="3936" instrument_node="">
</span><li data-dcnode-id="3932"><u data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Takes note</span></u><span data-dcnode-id="3933" instrument_node=""> of the continued dialogue between the World Heritage Centre and the extractive industries on extending the “No-go” commitment to other companies;</span></li><span data-dcnode-id="3931" instrument_node="">
</span><li data-dcnode-id="3921"><u data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">Welcomes</span></u><span data-dcnode-id="3928" instrument_node=""> the growing interest from the investment sector for the conservation of World Heritage properties and </span><u data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">strongly encourages</span></u><span data-dcnode-id="3925" instrument_node=""> all banks, investment funds, the insurance industry and other relevant private and public sector companies to integrate into their sustainability policies, provisions for ensuring that they are not financing projects that may negatively impact World Heritage properties and that the companies they are investing in subscribe to the “No-go commitment”, and </span><u data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">invites</span></u><span data-dcnode-id="3922" instrument_node=""> them to lodge these policies with the UNESCO World Heritage Centre;</span></li><span data-dcnode-id="3920" instrument_node="">
</span><li data-dcnode-id="3912"><u data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">Requests</span></u><span data-dcnode-id="3917" instrument_node=""> the World Heritage Centre, in cooperation with the Advisory Bodies, to continue the fruitful dialogue with extractive industries and the investment sector, including reflections on how to make these commitments and policies publically available online to inspire other companies in these sectors to follow suit;</span><br data-dcnode-id="3916"><br data-dcnode-id="3915"><span data-dcnode-id="3914" instrument_node="">Earth Observation technologies</span><br data-dcnode-id="3913"></li><span data-dcnode-id="3911" instrument_node="">
</span><li data-dcnode-id="3904"><u data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">Noting</span></u><span data-dcnode-id="3908" instrument_node=""> that Earth Observation satellite technologies and spatial analysis tools have tremendously improved over the past decade and that they provide powerful additional means for decision-makers and stakeholders of the </span><em data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Convention</span></em><span data-dcnode-id="3905" instrument_node=""> to find comprehensive solutions to today’s global challenges for World Heritage properties,</span></li><span data-dcnode-id="3903" instrument_node="">
</span><li data-dcnode-id="3892"><u data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">Encourages</span></u><span data-dcnode-id="3897"><span data-dcnode-id="3900" instrument_node=""> States Parties to make full use of such Earth Observation technologies for the early detection of activities potentially harmful to the Outstanding Universal Value (OUV) of World Heritage properties, such as deforestation, mining, illegal fisheries, agricultural encroachment, etc. and to better understand trends and respond appropriately;</span><br data-dcnode-id="3899"><br data-dcnode-id="3898"></span><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">Illegal trade in endangered species and the cooperation with the CITES Convention</span></p><span data-dcnode-id="3893" instrument_node="">
</span></li><span data-dcnode-id="3891" instrument_node="">
</span><li data-dcnode-id="3887"><u data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">Reiterates its utmost concern</span></u><span data-dcnode-id="3888" instrument_node=""> about the growing impacts of the illegal trade in endangered species, which is affecting many natural World Heritage properties;</span></li><span data-dcnode-id="3886" instrument_node="">
</span><li data-dcnode-id="3879"><u data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Welcomes</span></u><span data-dcnode-id="3883" instrument_node=""> the increased attention to this threat and </span><u data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">launches an appeal</span></u><span data-dcnode-id="3880" instrument_node=""> to all Member States of UNESCO to fully implement Resolution&nbsp;71/326 of United Nations General Assembly on “Tackling illicit trafficking in wildlife”, including through the implementation of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES), and with the full engagement of transit and destination countries;</span></li><span data-dcnode-id="3878" instrument_node="">
</span><li data-dcnode-id="3868"><u data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Also welcomes</span></u><span data-dcnode-id="3875" instrument_node=""> the continued fruitful cooperation between the World Heritage Centre, IUCN and the CITES Secretariat and </span><u data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">invites</span></u><span data-dcnode-id="3872" instrument_node=""> the World Heritage Centre and IUCN to further strengthen this cooperation;</span><br data-dcnode-id="3871"><br data-dcnode-id="3870"><span data-dcnode-id="3869" instrument_node="">Invasive species</span></li><span data-dcnode-id="3867" instrument_node="">
</span><li data-dcnode-id="3863"><u data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Notes with concern</span></u><span data-dcnode-id="3864" instrument_node=""> the important number of properties significantly affected by invasive alien species (IAS); </span></li><span data-dcnode-id="3862" instrument_node="">
</span><li data-dcnode-id="3858"><u data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">Recalls its encouragement</span></u><span data-dcnode-id="3859" instrument_node=""> to States Parties to develop adequately-resourced IAS strategies that emphasize prevention and early warning and rapid response in World Heritage properties;</span></li><span data-dcnode-id="3857" instrument_node="">
</span><li data-dcnode-id="3853"><u data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">Strongly encourages</span></u><span data-dcnode-id="3854" instrument_node=""> States Parties to incorporate IAS response strategies into climate change mitigation policies for World Heritage properties. </span></li><span data-dcnode-id="3852" instrument_node="">
</span></ol><p data-dcnode-id="3850"></p><span data-dcnode-id="3849" instrument_node="">

</span></div><span data-dcnode-id="3844" instrument_node="">
</span></span><span data-dcnode-id="3842" instrument_node="">
</span></div><span data-dcnode-id="3840" instrument_node="">
