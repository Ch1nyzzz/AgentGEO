											</span><span class="material-icons-sharp" data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">expand_more</span></span><span data-dcnode-id="2846" instrument_node="">
</span></a><span data-dcnode-id="2844" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="2675" id="decision5948"><span data-dcnode-id="2843" instrument_node="">
</span><div data-dcnode-id="2839"><strong data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">Code:</span></strong><span data-dcnode-id="2840" instrument_node=""> 38COM 7</span></div><span data-dcnode-id="2838" instrument_node="">
</span><div data-dcnode-id="2834"><strong data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Title:</span></strong><span data-dcnode-id="2835" instrument_node=""> State of conservation of World Heritage properties</span></div><span data-dcnode-id="2833" instrument_node=""> </span><div data-dcnode-id="2829"><strong data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Year:</span></strong><span data-dcnode-id="2830" instrument_node=""> 2014</span></div><span data-dcnode-id="2828" instrument_node="">
</span><p data-dcnode-id="2827"></p><p data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="2824" instrument_node="">
1. </span><u data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Having examined</span></u><span data-dcnode-id="2821" instrument_node=""> Document WHC-14/38.COM/7,</span><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node="">2. </span><span data-dcnode-id="2817" style="text-decoration: underline;"><span data-dcnode-id="2818" instrument_node="">R</span></span><u data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">ecalling</span></u><span data-dcnode-id="2814" instrument_node=""> Decisions </span><strong data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">35 COM 12B, 35 COM 12E</span></strong><span data-dcnode-id="2811" instrument_node=""> and </span><strong data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">37 COM 7C</span></strong><span data-dcnode-id="2808" instrument_node=""> adopted at its 35th (UNESCO, 2011) and 37th (Phnom Penh, 2013) sessions respectively,
</span><p data-dcnode-id="2805"><strong data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">Issues emerging from the 2014 state of conservation reports </span></strong></p><span data-dcnode-id="2804" instrument_node="">
3. </span><span data-dcnode-id="2802" style="text-decoration: underline;"><span data-dcnode-id="2803" instrument_node="">Noting</span></span><u data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node=""> with regret</span></u><span data-dcnode-id="2799" instrument_node=""> that issues related to Management Plan / System remain a serious cause for concern, </span><u data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">requests</span></u><span data-dcnode-id="2796" instrument_node=""> all States Parties to ensure that all World Heritage properties are managed in such a manner that their Outstanding Universal Value (OUV) is not put at risk and, whenever necessary, develop/update and fully implement Management Plans or Systems;</span><br data-dcnode-id="2795"><span data-dcnode-id="2794" instrument_node="">4. </span><u data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Taking note</span></u><span data-dcnode-id="2791" instrument_node=""> of the benefits to States Parties of systematically utilizing Heritage and Environmental Impact Assessments in the review of development projects, </span><u data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">recommends</span></u><span data-dcnode-id="2788" instrument_node=""> that States Parties use these tools in assessing projects before they reach a point where the World Heritage reactive monitoring process comes into play;</span><br data-dcnode-id="2787"><span data-dcnode-id="2786" instrument_node="">5. </span><u data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Also noting</span></u><span data-dcnode-id="2783" instrument_node=""> that tourism development in and around World Heritage properties is a key issue for their management, </span><u data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">strongly encourages</span></u><span data-dcnode-id="2780" instrument_node=""> States Parties to ensure sustainable planning and management of tourism at World Heritage properties and to contribute to the implementation of the World Heritage Centre’s World Heritage and Sustainable Tourism Programme;</span><br data-dcnode-id="2779"><span data-dcnode-id="2778" instrument_node="">6. </span><u data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Reiterating its utmost concern</span></u><span data-dcnode-id="2775" instrument_node=""> about the continued impacts on World Heritage properties due to the rising pressure from poaching, particularly of elephant, rhinoceros, and valuable timber species, linked to a growing illicit trade, and the increasing involvement of organized crime in this lucrative business, </span><u data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">reiterates its request</span></u><span data-dcnode-id="2772" instrument_node=""> to the World Heritage Centre and IUCN to strengthen their cooperation with the Secretariat of the </span><em data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Convention</span></em><span data-dcnode-id="2769" instrument_node=""> on International Trade in Endangered Species (CITES) to assist States Parties to implement the measures taken by the 16th Conference of the Parties of the CITES, and </span><u data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">urges</span></u><span data-dcnode-id="2766" instrument_node=""> States Parties to ensure strong international collaboration and coordination to control the illicit trade in flora and fauna and their products;</span><br data-dcnode-id="2765"><span data-dcnode-id="2764" instrument_node="">7. </span><u data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Takes note with concern</span></u><span data-dcnode-id="2761" instrument_node=""> of the continuing threat posed to World Heritage properties by disasters and conflicts, of the widespread lack of adequate preparedness, and of the need to integrate a concern for heritage within international policies and programmes for disaster risk reduction, and </span><u data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">calls</span></u><span data-dcnode-id="2758" instrument_node=""> on States Parties to ensure that their delegations to the 3rd World Conference on Disaster Risk Reduction (WCDRR), due to take place in March 2015 in Sendai (Japan), are sensitized to this question and promote heritage as an essential consideration in disaster risk reduction;</span><br data-dcnode-id="2757"><span data-dcnode-id="2756" instrument_node="">8. </span><u data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">Also requests</span></u><span data-dcnode-id="2753" instrument_node=""> that States Parties with an interest in the promotion of capacity building on the issues of management, impact assessments, disaster risk management, sustainable tourism management, and poaching and wildlife crimes to liaise with the Advisory Bodies, World Heritage Centre, and UNESCO Category 2 Centres, and support regional or international courses, workshops, and other capacity building activities to improve the capacity of States Parties and site managers to develop and implement these important planning instruments;
</span><p data-dcnode-id="2750"><strong data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">Updates on previously reported issues</span></strong></p><span data-dcnode-id="2749" instrument_node="">
9. </span><span data-dcnode-id="2747" style="text-decoration: underline;"><span data-dcnode-id="2748" instrument_node="">Welcomes </span></span><span data-dcnode-id="2746" instrument_node="">the commitment made by TOTAL in June 2013 not to explore or exploit oil or gas inside sites inscribed on the World Heritage List as well as the new policy on World Heritage Sites adopted by the investment bank HSBC not to knowingly provide financial services to support projects which threaten the special characteristics of World Heritage properties and, </span><u data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">also taking note</span></u><span data-dcnode-id="2743" instrument_node=""> of the discussions held between the World Heritage Centre, IUCN and International Petroleum Industry Environmental Conservation Association (IPIECA), </span><u data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">calls</span></u><span data-dcnode-id="2740" instrument_node=""> on other companies in extractive industries and investment banks to follow these examples to further extend the “No go” commitment;</span><br data-dcnode-id="2739"><span data-dcnode-id="2738" instrument_node="">10. </span><u data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Also welcomes</span></u><span data-dcnode-id="2735" instrument_node=""> the progress in the dialogue between the World Heritage Centre, the Advisory Bodies and the International Olympic Committee (IOC) and </span><u data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">encourages</span></u><span data-dcnode-id="2732" instrument_node=""> the development of a mechanism that would allow to identify potential impacts of future Olympic Games on World Heritage properties early on in the process of attributing the Games in order to ensure that these impacts can be avoided or adequately mitigated by the organizing country;
</span><p data-dcnode-id="2729"><strong data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">Strategic issues related to the state of conservation of World Heritage properties</span></strong></p><span data-dcnode-id="2728" instrument_node="">
11. </span><span data-dcnode-id="2726" style="text-decoration: underline;"><span data-dcnode-id="2727" instrument_node="">Also</span></span><u data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node=""> recalling</span></u><span data-dcnode-id="2723" instrument_node=""> that States Parties concerned shall submit by </span><strong data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">1 February</span></strong><span data-dcnode-id="2720" instrument_node=""> to the Committee through the Secretariat, their reports on the state of conservation of specific properties (Paragraph 169 of the </span><em data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Operational Guidelines </span></em><span data-dcnode-id="2717" instrument_node="">),</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">12. </span><u data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">Acknowledging</span></u><span data-dcnode-id="2712" instrument_node=""> that the established minimum two-year cycle for the examination of state of conservation reports for individual properties (except for cases of utmost urgency and for properties inscribed on the List of World Heritage in Danger), associated to a postponed deadline for the submission of the States Parties’ reports would provide an opportunity for improved dialogue between the States Parties, the World Heritage Centre and the Advisory Bodies, </span><u data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">decides</span></u><span data-dcnode-id="2709" instrument_node=""> that States Parties concerned shall submit their state of conservation reports to the World Heritage Centre by </span><strong data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">1 December</span></strong><span data-dcnode-id="2706" instrument_node=""> of the year preceding the examination of the property by the World Heritage Committee, with immediate effect, except for properties inscribed on the List of World Heritage in Danger and for cases of utmost urgency, and </span><u data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">further requests</span></u><span data-dcnode-id="2703" instrument_node=""> the World Heritage Centre and the Advisory Bodies to draft a proposal in view of including this new statutory deadline in the </span><em data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Operational Guidelines </span></em><span data-dcnode-id="2700" instrument_node="">, for examination by the World Heritage Committee at its 39th session, in 2015;</span><br data-dcnode-id="2699"><span data-dcnode-id="2698" instrument_node="">13. </span><u data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Reminds</span></u><span data-dcnode-id="2695" instrument_node=""> States Parties of the importance of submitting their state of conservation reports to the World Heritage Centre in one of the working languages of the </span><em data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="2692" instrument_node="">, English or French;</span><br data-dcnode-id="2691"><span data-dcnode-id="2690" instrument_node="">14. </span><u data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Notes with appreciation</span></u><span data-dcnode-id="2687" instrument_node=""> the high number of States Parties which have authorized the public upload of their state of conservation reports, facilitating their consultation by all stakeholders of the </span><em data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Convention</span></em><span data-dcnode-id="2684" instrument_node=""> and contributing to an improved transparency of the reactive monitoring process, and </span><u data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">reiterates its encouragement</span></u><span data-dcnode-id="2681" instrument_node=""> to all States Parties to continue do so in the future.</span><p data-dcnode-id="2680"></p><span data-dcnode-id="2679" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/5948"><span data-dcnode-id="2678" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="2676" instrument_node="">

</span><p data-dcnode-id="2642"></p><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="2639" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2638" instrument_node="">1.&nbsp; </span><span data-dcnode-id="2636" style="text-decoration: underline;"><span data-dcnode-id="2637" instrument_node=""> Having examined </span></span><span data-dcnode-id="2635" instrument_node=""> Document WHC-13/37.COM/7A.Add,</span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2632" instrument_node="">2.&nbsp; </span><span data-dcnode-id="2630" style="text-decoration: underline;"><span data-dcnode-id="2631" instrument_node=""> Recalling </span></span><span data-dcnode-id="2629" instrument_node=""> Decision </span><strong data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node=""> 35 COM 7C </span></strong><span data-dcnode-id="2626" instrument_node=""> , adopted at its 35th&nbsp;session (UNESCO, 2011),</span></p><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2623" instrument_node="">3.&nbsp; </span><span data-dcnode-id="2621" style="text-decoration: underline;"><span data-dcnode-id="2622" instrument_node=""> Welcomes </span></span><span data-dcnode-id="2620" instrument_node=""> the publication of the Guidance on the Desired State of conservation for the removal of a property from the List of World Heritage Danger (DSOCR);</span></p><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2617" instrument_node="">4.&nbsp; </span><span data-dcnode-id="2615" style="text-decoration: underline;"><span data-dcnode-id="2616" instrument_node=""> Requests </span></span><span data-dcnode-id="2614" instrument_node=""> the World Heritage Centre and Advisory Bodies to continue supporting States Parties in developing and submitting DSOCRs for all properties included in the List of World Heritage in Danger, by its 40th session in 2016 at the latest, and </span><span data-dcnode-id="2612" style="text-decoration: underline;"><span data-dcnode-id="2613" instrument_node=""> considers </span></span><span data-dcnode-id="2611" instrument_node=""> that properties should be retained on the List of World Heritage in Danger until the Desired state of conservation for removal is met.</span></p><p data-dcnode-id="2609"></p><span data-dcnode-id="2608" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/5017"><span data-dcnode-id="2607" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="2605" instrument_node="">

</span><div data-dcnode-id="2578"><strong data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Title:</span></strong><span data-dcnode-id="2579" instrument_node=""> Reflection on the trends of the state of conservation</span></div><span data-dcnode-id="2577" instrument_node=""> </span><div data-dcnode-id="2573"><strong data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Year:</span></strong><span data-dcnode-id="2574" instrument_node=""> 2013</span></div><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2571"></p><p class="TheWHCommittee" data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2567" instrument_node="">1.&nbsp; </span><span data-dcnode-id="2565" style="text-decoration: underline;"><span data-dcnode-id="2566" instrument_node=""> Having examined </span></span><span data-dcnode-id="2564" instrument_node=""> Document WHC-13/37.COM/7C,</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2561" instrument_node="">2.&nbsp; </span><span data-dcnode-id="2559" style="text-decoration: underline;"><span data-dcnode-id="2560" instrument_node=""> Recalling </span></span><span data-dcnode-id="2558" instrument_node=""> Decisions </span><strong data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node=""> 35 COM 7C </span></strong><span data-dcnode-id="2555" instrument_node=""> and </span><strong data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node=""> 36 COM 7C </span></strong><span data-dcnode-id="2552" instrument_node=""> , adopted at its 35th (UNESCO, 2011) and 36th (Saint-Petersburg, 2012) sessions respectively,</span></p><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2549" instrument_node="">3.&nbsp; </span><span data-dcnode-id="2547" style="text-decoration: underline;"><span data-dcnode-id="2548" instrument_node=""> Expresses its appreciation </span></span><span data-dcnode-id="2546" instrument_node=""> to the Flemish Government for its support in establishing the online “State of Conservation Information System of World Heritage properties”;</span></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2543" instrument_node="">4.&nbsp; </span><span data-dcnode-id="2541" style="text-decoration: underline;"><span data-dcnode-id="2542" instrument_node=""> Welcomes </span></span><span data-dcnode-id="2540" instrument_node=""> the contribution of the Information System to the improved transparency of World Heritage Reactive Monitoring and informed decision-making processes;&nbsp;</span></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2537" instrument_node="">5.&nbsp; </span><span data-dcnode-id="2535" style="text-decoration: underline;"><span data-dcnode-id="2536" instrument_node=""> Encourages </span></span><span data-dcnode-id="2534" instrument_node=""> States Parties to make public the reports submitted on the state of conservation of World Heritage properties in order to facilitate their consultation by all stakeholders and contribute to an improved transparency of the reactive monitoring process and, in this case, </span><span data-dcnode-id="2532" style="text-decoration: underline;"><span data-dcnode-id="2533" instrument_node=""> requests </span></span><span data-dcnode-id="2531" instrument_node=""> the World Heritage Centre to make them publicly accessible through the State of Conservation Information System;</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2528" instrument_node="">6.&nbsp; </span><span data-dcnode-id="2526" style="text-decoration: underline;"><span data-dcnode-id="2527" instrument_node=""> Also encourages </span></span><span data-dcnode-id="2525" instrument_node=""> the World Heritage Centre to continue exploring opportunities to link the Information System to other existing relevant databases as part of a wider Information and knowledge management system, in order to improve the synergies between the </span><em data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node=""> World Heritage Convention </span></em><span data-dcnode-id="2522" instrument_node=""> and other international conventions or programmes;</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2519" instrument_node="">7.&nbsp; </span><span data-dcnode-id="2517" style="text-decoration: underline;"><span data-dcnode-id="2518" instrument_node=""> Calls upon </span></span><span data-dcnode-id="2516" instrument_node=""> all States Parties to the Convention to support the activities proposed to contribute towards the improvement of the Information System and its access for the international community.&nbsp;</span></p><p data-dcnode-id="2514"></p><span data-dcnode-id="2513" instrument_node="">

</span><a aria-controls="collapsedecision4769" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="2494" data-toggle="collapse" href="#decision4769" id="ext-element-31" role="button"><span data-dcnode-id="2501" instrument_node="">

												(2012)
											
											</span><span class="material-icons-sharp" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">expand_more</span></span><span data-dcnode-id="2495" instrument_node="">
</span></a><span data-dcnode-id="2493" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="2352" id="decision4769"><span data-dcnode-id="2492" instrument_node="">
</span><div data-dcnode-id="2488"><strong data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Code:</span></strong><span data-dcnode-id="2489" instrument_node=""> 36COM 7C</span></div><span data-dcnode-id="2487" instrument_node="">
</span><div data-dcnode-id="2483"><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Title:</span></strong><span data-dcnode-id="2484" instrument_node=""> Reflection on the Trends of the State of Conservation</span></div><span data-dcnode-id="2482" instrument_node=""> </span><div data-dcnode-id="2478"><strong data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Year:</span></strong><span data-dcnode-id="2479" instrument_node=""> 2012</span></div><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2476"></p><p class="TheWHCommittee" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2472" instrument_node="">1.</span><span data-dcnode-id="2470" style="text-decoration: underline;"><span data-dcnode-id="2471" instrument_node="">Having examined</span></span><span data-dcnode-id="2469" instrument_node=""> document WHC-12/36.COM/7C,</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2466" instrument_node="">2.</span><span data-dcnode-id="2464" style="text-decoration: underline;"><span data-dcnode-id="2465" instrument_node="">Recalling</span></span><span data-dcnode-id="2463" instrument_node=""> Decisions </span><strong data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">35 COM 7C </span></strong><span data-dcnode-id="2460" instrument_node="">and </span><strong data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">35 COM 12E</span></strong><span data-dcnode-id="2457" instrument_node=""> adopted at its 35th session (UNESCO, 2011),</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2452"><strong data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Significant factors negatively impacting the Outstanding Universal Value</span></strong></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2450" instrument_node="">3.</span><span data-dcnode-id="2448" style="text-decoration: underline;"><span data-dcnode-id="2449" instrument_node="">Takes note</span></span><span data-dcnode-id="2447" instrument_node=""> of the statistical analysis and </span><span data-dcnode-id="2445" style="text-decoration: underline;"><span data-dcnode-id="2446" instrument_node="">encourages</span></span><span data-dcnode-id="2444" instrument_node=""> the World Heritage Centre to continue with the production of such informative data, including regional analyses;</span></p><span data-dcnode-id="2442" instrument_node="">
</span><p data-dcnode-id="2439"><strong data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Recurrent conservation issues</span></strong></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2437" instrument_node="">4.</span><span data-dcnode-id="2435" style="text-decoration: underline;"><span data-dcnode-id="2436" instrument_node="">Also takes note</span></span><span data-dcnode-id="2434" instrument_node=""> of the completion of the independent review process on extractive industries and World Heritage properties as a contribution to the Policy Guidelines development and </span><span data-dcnode-id="2432" style="text-decoration: underline;"><span data-dcnode-id="2433" instrument_node="">invites</span></span><span data-dcnode-id="2431" instrument_node=""> the World Heritage Centre to disseminate this review as widely as possible;</span></p><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2426"><strong data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Disaster risk reduction</span></strong></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2420"><span data-dcnode-id="2424" instrument_node="">5.</span><span data-dcnode-id="2422" style="text-decoration: underline;"><span data-dcnode-id="2423" instrument_node="">Requests</span></span><span data-dcnode-id="2421" instrument_node=""> States Parties to make every endeavor to take into consideration disaster risks, including from human-induced hazards, in the management plans and systems for the World Heritage properties located in their territories; &nbsp;</span></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2418" instrument_node="">6.</span><span data-dcnode-id="2416" style="text-decoration: underline;"><span data-dcnode-id="2417" instrument_node="">Also requests</span></span><span data-dcnode-id="2415" instrument_node=""> the World Heritage Centre, with the support of the Advisory Bodies, to continue working with global and regional institutions involved in disaster risk management, with an aim to mainstream a concern for heritage within their policies and programmes as well as in UN-led processes such as the Post-Disaster-Needs-Assessment (PDNA);</span></p><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2410"><strong data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Follow-up to decisions 35 COM 7C and 35 COM 12E</span></strong></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2408" instrument_node="">7.</span><span data-dcnode-id="2406" style="text-decoration: underline;"><span data-dcnode-id="2407" instrument_node="">Further takes note</span></span><span data-dcnode-id="2405" instrument_node=""> of the information provided regarding the recognition for the protectors of World Heritage properties in conflict and post-conflict zones, including through the use of blue/green berets or other appropriate insignia;</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2402" instrument_node="">8.</span><span data-dcnode-id="2400" style="text-decoration: underline;"><span data-dcnode-id="2401" instrument_node="">Takes note furthermore</span></span><span data-dcnode-id="2399" instrument_node=""> of the correspondence process in place to increase dialogue between the States Parties, the World Heritage Centre and the Advisory Bodies regarding conservation issues at World Heritage properties;</span></p><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2396" instrument_node="">9.</span><span data-dcnode-id="2394" style="text-decoration: underline;"><span data-dcnode-id="2395" instrument_node="">Thanks</span></span><span data-dcnode-id="2393" instrument_node=""> the Government of Flanders for its support to the establishment of a “state of conservation information system” hosted on the World Heritage Centre’s website and </span><span data-dcnode-id="2391" style="text-decoration: underline;"><span data-dcnode-id="2392" instrument_node="">further requests</span></span><span data-dcnode-id="2390" instrument_node=""> the World Heritage Centre to present a progress report on the database and its access online, during the 37th session of the World Heritage Committee in 2013;</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2385"><strong data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Other conservation issues not reported on at the 36th session under Items 7A and 7B</span></strong></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2383" instrument_node="">10. &nbsp;</span><span data-dcnode-id="2381" style="text-decoration: underline;"><span data-dcnode-id="2382" instrument_node="">Expresses its concern</span></span><span data-dcnode-id="2380" instrument_node=""> with regard to the state of conservation of World Heritage property of “Archaeological Areas of Pompei, Herculaneum and Torre Annuziata” and </span><span data-dcnode-id="2378" style="text-decoration: underline;"><span data-dcnode-id="2379" instrument_node="">urges</span></span><span data-dcnode-id="2377" instrument_node=""> the State Party of Italy to intensify its efforts towards implementing the Committee’s decision taken at its 35th session (UNESCO, 2011);</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2374" instrument_node="">11. &nbsp;</span><span data-dcnode-id="2372" style="text-decoration: underline;"><span data-dcnode-id="2373" instrument_node="">Extends its sympathy</span></span><span data-dcnode-id="2371" instrument_node=""> to the victims of the earthquake in northern Italy; </span><span data-dcnode-id="2369" style="text-decoration: underline;"><span data-dcnode-id="2370" instrument_node="">also encourages</span></span><span data-dcnode-id="2368" instrument_node=""> the State Party of Italy to continue its important efforts for the assessment of the damage occurred and for the planning and implementation of the necessary remedial measures, including with a view to strengthening the overall resilience of the three properties in the future against all possible hazards; and </span><span data-dcnode-id="2366" style="text-decoration: underline;"><span data-dcnode-id="2367" instrument_node="">requests furthermore</span></span><span data-dcnode-id="2365" instrument_node=""> the State Party of Italy to provide to the World Heritage Centre updated information on the situation and to coordinate with the World Heritage Centre and the Advisory Bodies possible initiatives for the recovery and restoration of the three affected properties;</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node="">12. &nbsp;&nbsp;</span><span data-dcnode-id="2360" style="text-decoration: underline;"><span data-dcnode-id="2361" instrument_node="">Finally requests</span></span><span data-dcnode-id="2359" instrument_node=""> the State Party of the United Kingdom of Great Britain and Northern Ireland to halt the proposed development of a golf resort at the World Heritage property “Giant’s Causeway and Causeway Coast” until its potential impact on the Outstanding Universal Value of the World Heritage property has been assessed.</span></p><p data-dcnode-id="2357"></p><span data-dcnode-id="2356" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/4769"><span data-dcnode-id="2355" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="2353" instrument_node="">

</span><span data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">35COM 7C</span></span><span data-dcnode-id="2341" instrument_node="">

												(2011)
											
											</span><span class="material-icons-sharp" data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">expand_more</span></span><span data-dcnode-id="2338" instrument_node="">
</span></a><span data-dcnode-id="2336" instrument_node="">

</span><div data-dcnode-id="2331"><strong data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Code:</span></strong><span data-dcnode-id="2332" instrument_node=""> 35COM 7C</span></div><span data-dcnode-id="2330" instrument_node="">
</span><div data-dcnode-id="2326"><strong data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Title:</span></strong><span data-dcnode-id="2327" instrument_node=""> Reflection on the trends of the state of conservation</span></div><span data-dcnode-id="2325" instrument_node=""> </span><div data-dcnode-id="2321"><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Year:</span></strong><span data-dcnode-id="2322" instrument_node=""> 2011</span></div><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2319"></p><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2315" instrument_node="">1. </span><span data-dcnode-id="2313" style="text-decoration: underline;"><span data-dcnode-id="2314" instrument_node="">Having examined</span></span><span data-dcnode-id="2312" instrument_node=""> Documents WHC-11/35.COM/7C, WHC-11/35.COM/INF.7C and WHC-11/35.COM/7B,</span></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2309" instrument_node="">2. </span><span data-dcnode-id="2307" style="text-decoration: underline;"><span data-dcnode-id="2308" instrument_node="">Recalling</span></span><span data-dcnode-id="2306" instrument_node=""> Decision </span><strong data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">34 COM 7C</span></strong><span data-dcnode-id="2303" instrument_node="">, adopted at its 34th session (Brasilia, 2010),</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">3. </span><span data-dcnode-id="2298" style="text-decoration: underline;"><span data-dcnode-id="2299" instrument_node="">Thanks</span></span><span data-dcnode-id="2297" instrument_node=""> the States Parties of Senegal and Australia for the organization of the Expert meeting on the global state of conservation challenges for World Heritage properties (Dakar, Senegal, 13-15 April 2011);</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2294" instrument_node="">4. </span><span data-dcnode-id="2292" style="text-decoration: underline;"><span data-dcnode-id="2293" instrument_node="">Endorses</span></span><span data-dcnode-id="2291" instrument_node=""> the recommendations of the Expert meeting on the global state of conservation challenges for World Heritage properties presented in Document WHC-11/35.COM/INF.7C and </span><span data-dcnode-id="2289" style="text-decoration: underline;"><span data-dcnode-id="2290" instrument_node="">invites</span></span><span data-dcnode-id="2288" instrument_node=""> States Parties to the </span><em data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Convention</span></em><span data-dcnode-id="2285" instrument_node="">, the World Heritage Centre and the Advisory Bodies to develop plans to implement them, and identify the required resources;</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2282" instrument_node="">5. </span><span data-dcnode-id="2280" style="text-decoration: underline;"><span data-dcnode-id="2281" instrument_node="">Considering</span></span><span data-dcnode-id="2279" instrument_node=""> the need for more systematic monitoring of threats, </span><span data-dcnode-id="2277" style="text-decoration: underline;"><span data-dcnode-id="2278" instrument_node="">calls upon</span></span><span data-dcnode-id="2276" instrument_node=""> the States Parties to the </span><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Convention</span></em><span data-dcnode-id="2273" instrument_node=""> to support the establishment of a comprehensive "state of conservation information system" to support analytical studies and assist all stakeholders in site-management, with the target to make this system available, on the World Heritage Centre's website, before the 37th session of the World Heritage Committee in 2013;</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2270" instrument_node="">6. </span><span data-dcnode-id="2268" style="text-decoration: underline;"><span data-dcnode-id="2269" instrument_node="">Requests</span></span><span data-dcnode-id="2267" instrument_node=""> the World Heritage Centre, in consultation with the Advisory Bodies, to prepare clear modalities and guidance for the drafting and adoption of the Desired state of conservation for the removal of properties from the List of World Heritage in Danger, for examination by the World Heritage Committee at its 36th session in 2012;</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2264" instrument_node="">7. </span><span data-dcnode-id="2262" style="text-decoration: underline;"><span data-dcnode-id="2263" instrument_node="">Decides</span></span><span data-dcnode-id="2261" instrument_node=""> to amend paragraph 183 of the </span><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="2258" instrument_node=""> to read: "When considering the inscription of a property on the List of World Heritage in Danger, the Committee shall develop, and adopt, as far as possible, in consultation with the State Party concerned, a Desired state of conservation for the removal of the property from the List of World Heritage in Danger, and a programme for corrective measures";</span></p><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2255" instrument_node="">8. </span><span data-dcnode-id="2253" style="text-decoration: underline;"><span data-dcnode-id="2254" instrument_node="">Also requests</span></span><span data-dcnode-id="2252" instrument_node=""> the World Heritage Centre and Advisory Bodies to prepare a progress report on the issues mentioned above, for examination by the World Heritage Committee at its 36th session in 2012.</span></p><p data-dcnode-id="2250"></p><span data-dcnode-id="2249" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/4334"><span data-dcnode-id="2248" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="2246" instrument_node="">

</span><a aria-controls="collapsedecision4403" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="2230" data-toggle="collapse" href="#decision4403" id="ext-element-33" role="button"><span data-dcnode-id="2237" instrument_node="">

</span><div data-dcnode-id="2219"><strong data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Title:</span></strong><span data-dcnode-id="2220" instrument_node=""> Working methods of statutory organs of the Convention</span></div><span data-dcnode-id="2218" instrument_node=""> </span><div data-dcnode-id="2214"><strong data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Year:</span></strong><span data-dcnode-id="2215" instrument_node=""> 2011</span></div><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2212"></p><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2208" instrument_node="">1. </span><span data-dcnode-id="2206" style="text-decoration: underline;"><span data-dcnode-id="2207" instrument_node="">Having examined</span></span><span data-dcnode-id="2205" instrument_node=""> Document WHC-11/35.COM/12B,</span><span data-dcnode-id="2203" style="text-decoration: underline;"><span data-dcnode-id="2204" instrument_node=""> </span></span></p><span data-dcnode-id="2201" instrument_node="">
</span><p data-dcnode-id="2184"><span data-dcnode-id="2200" instrument_node="">2. </span><span data-dcnode-id="2198" style="text-decoration: underline;"><span data-dcnode-id="2199" instrument_node="">Recalling</span></span><span data-dcnode-id="2197" instrument_node=""> Decision </span><strong data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">32 COM 10</span></strong><span data-dcnode-id="2194" instrument_node=""> adopted at its 32nd session (Quebec City, Canada, 2008), Decision </span><strong data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">33 COM 14A.2</span></strong><span data-dcnode-id="2191" instrument_node=""> adopted at its 33rd session (Seville, Spain, 2009), </span><strong data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">34 COM 12</span></strong><span data-dcnode-id="2188" instrument_node=""> adopted at its 34th session (Brasilia, Brazil, 2010) and Resolution </span><strong data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">17 GA 9</span></strong><span data-dcnode-id="2185" instrument_node=""> adopted at the 17th General Assembly of States Parties (UNESCO Headquarters, 2009);</span></p><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2182" instrument_node="">3. </span><span data-dcnode-id="2180" style="text-decoration: underline;"><span data-dcnode-id="2181" instrument_node="">Expresses its appreciation</span></span><span data-dcnode-id="2179" instrument_node=""> to the States Parties of Bahrain and Australia and the UNESCO World Heritage Centre for organizing the expert meeting on the decision-making procedures of the statutory organs of the </span><em data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="2176" instrument_node=""> (Manama, Bahrain, 15-17 December 2010), and </span><span data-dcnode-id="2174" style="text-decoration: underline;"><span data-dcnode-id="2175" instrument_node="">notes</span></span><span data-dcnode-id="2173" instrument_node=""> the report provided by the participants (Document WHC-11/35.COM/12B);&nbsp;</span></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2170"></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2166"><strong data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Amendments to Rules of Procedure</span></strong></p><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2164" instrument_node="">4. </span><span data-dcnode-id="2162" style="text-decoration: underline;"><span data-dcnode-id="2163" instrument_node="">Adopts</span></span><span data-dcnode-id="2161" instrument_node=""> the following amendments to its Rules of Procedure:</span></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2155"><strong data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Rule 8.3. </span></strong><span data-dcnode-id="2156" instrument_node="">The United Nations and organizations of the United Nations system, as well as, upon written request, at least 15 days prior to the date of the session of the Committee, other international governmental and non-governmental organizations, permanent observer missions to UNESCO and non profit-making institutions having activities in the fields covered by the Convention, [according to criteria defined by the World Heritage Committee,] may be authorized by the Committee to participate in the sessions of the Committee as observers.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2151"><strong data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Rule 14. Duties of the Chairperson, [Vice-Chairpersons and Rapporteur]</span></strong></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2146"><strong data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">14.1 </span></strong><span data-dcnode-id="2147" instrument_node="">In addition to exercising the powers which are conferred upon him elsewhere by the present Rules, the Chairperson shall open and close each plenary meeting of the Committee. He shall direct the discussions, ensure observance of these Rules, accord the right to speak, put questions to the vote and announce decisions. He shall rule on points of order and, subject to the present Rules, shall control the proceedings and the maintenance of order. He shall not vote, but he may instruct another member of his delegation to vote on his behalf. [He shall work, with the assistance of the vice-chairpersons at his discretion, to anticipate and address potentially contentious issues, including out of session.] He shall exercise all other functions given to him by the Committee.</span></p><span data-dcnode-id="2145" instrument_node="">
</span><p data-dcnode-id="2141"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">14.2 </span></strong><span data-dcnode-id="2142" instrument_node="">[Should the Chairperson be absent during a meeting, or any part thereof, he shall be replaced by a Vice-Chairperson.] A Vice-Chairperson acting as Chairperson shall have the same powers and duties as the Chairperson.</span></p><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2136"><strong data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">14.3 </span></strong><span data-dcnode-id="2137" instrument_node="">The Chairperson and Vice-Chairperson, or Vice-Chairpersons, of a subsidiary body of the Committee shall have the same duties with regard to the bodies over which they are called upon to preside as the Chairperson and the Vice-Chairpersons of the Committee.</span></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2131"><strong data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">[14.4 </span></strong><span data-dcnode-id="2132" instrument_node="">In addition to exercising the powers which are conferred upon him elsewhere by the present Rules, the Rapporteur shall certify that the Secretariat has accurately recorded the Committee's decisions. He shall work with the Secretariat to monitor and record Committee debate on amendments.]</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2127"><strong data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Rule 22. Order and time-limit of speeches</span></strong></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2122"><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">22.1 </span></strong><span data-dcnode-id="2123" instrument_node="">The Chairperson shall call upon speakers in the order in which they signify their wish to speak.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2117"><strong data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">22.2 </span></strong><span data-dcnode-id="2118" instrument_node="">The Chairperson may limit the time allowed to each speaker if the circumstances make this desirable.</span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2112"><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">[22.3 </span></strong><span data-dcnode-id="2113" instrument_node="">The Chairperson, at his discretion, shall call on speakers from the Advisory Bodies and the Secretariat prior to the Committee taking a final decision.]</span></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2107"><strong data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">22.4 </span></strong><span data-dcnode-id="2108" instrument_node="">The representatives of organizations, individuals and observers referred to in Rules 6, 7 and 8 may address the meeting with the prior consent of the Chairperson.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2102"><strong data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">[22.5 </span></strong><span data-dcnode-id="2103" instrument_node="">The Chairperson shall put Committee members' questions to a State Party once at the end of the Committee's debate on the property]</span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2097"><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">[22.6 </span></strong><span data-dcnode-id="2098" instrument_node="">Committee members shall not speak to World Heritage properties in their own territories, except at the explicit invitation of the Chairperson and in response to specific questions posed. Advocacy in favour of a particular proposal will not be entertained.]</span></p><span data-dcnode-id="2096" instrument_node="">
</span><p data-dcnode-id="2092"><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">22.7 </span></strong><span data-dcnode-id="2093" instrument_node="">Representatives of a State Party, whether or not a member of the Committee, shall not speak to advocate the inclusion in the World Heritage List of a property nominated, [the state of conservation of a property on their territory] or the approval of an assistance request submitted by that State Party, but only to deal with a point of information in answer to a question. This provision also applies to other observers mentioned in Rule 8.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2090"></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2086"><strong data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Responsibilities of Statutory Organs</span></strong></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2084" instrument_node="">5. </span><span data-dcnode-id="2082" style="text-decoration: underline;"><span data-dcnode-id="2083" instrument_node="">Requests</span></span><span data-dcnode-id="2081" instrument_node=""> the World Heritage Centre to present a study, for consideration at the 36th session of the World Heritage Committee (2012), on options for:</span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2074" style="PADDING-LEFT: 30px"><span data-dcnode-id="2078" instrument_node="">a) oversight and monitoring mechanisms for the statutory organs of the </span><em data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="2075" instrument_node=""> to ensure that actions associated with priority policy issues are implemented, and</span></p><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071" style="PADDING-LEFT: 30px"><span data-dcnode-id="2072" instrument_node="">b) enhancing the role of the Bureau in facilitating the work of the Committee (without it assuming a decision-making role);</span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2069"></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2065"><strong data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Expert meetings</span></strong></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2063" instrument_node="">6. </span><span data-dcnode-id="2061" style="text-decoration: underline;"><span data-dcnode-id="2062" instrument_node="">Also requests</span></span><span data-dcnode-id="2060" instrument_node=""> the World Heritage Centre to develop and present annually a consolidated list of all proposed meetings in order for the Committee to decide which to sanction on the basis of priorities and available resources (human and financial), and </span><span data-dcnode-id="2058" style="text-decoration: underline;"><span data-dcnode-id="2059" instrument_node="">encourages</span></span><span data-dcnode-id="2057" instrument_node=""> the option to hold virtual meetings where appropriate;</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2054" instrument_node="">7. </span><span data-dcnode-id="2052" style="text-decoration: underline;"><span data-dcnode-id="2053" instrument_node="">Requests</span></span><span data-dcnode-id="2051" instrument_node=""> the World Heritage Centre to clarify the different types and categories of expert meetings and </span><span data-dcnode-id="2049" style="text-decoration: underline;"><span data-dcnode-id="2050" instrument_node="">decides</span></span><span data-dcnode-id="2048" instrument_node=""> that all meetings attended by the Secretariat should be documented in the Report on the Secretariat's activities to the Committee;</span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2045"></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2041"><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Conduct of statutory meetings</span></strong></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2039" instrument_node="">8. </span><span data-dcnode-id="2037" style="text-decoration: underline;"><span data-dcnode-id="2038" instrument_node="">Decides</span></span><span data-dcnode-id="2036" instrument_node=""> that policy discussions in the Committee should be organised to enable participation by all States Parties through the use of Consultative Groups, or the recognition of requests for interventions from non-members of the Committee on policy agenda items, at the discretion of the Chair;</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2033" instrument_node="">9. </span><span data-dcnode-id="2031" style="text-decoration: underline;"><span data-dcnode-id="2032" instrument_node="">Decides</span></span><span data-dcnode-id="2030" instrument_node=""> that three regular (not extended) sessions of the Committee should be held each biennium as follows:</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2026" style="padding-left: 30px;"><span data-dcnode-id="2027" instrument_node="">a) Even years - host country; agenda: reports, budget, nomination and state of conservation reports,</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023" style="padding-left: 30px;"><span data-dcnode-id="2024" instrument_node="">b) Odd years - host country; agenda: reports, budget, nomination and state of conservation reports, and</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2020" style="padding-left: 30px;"><span data-dcnode-id="2021" instrument_node="">c) Odd years - UNESCO Headquarters immediately after the General Assembly, (which should be held within the period of UNESCO's General Conference ); agenda: strategic and policy issues and as necessary, reports on the state of conservation needing urgent examination;</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2018" instrument_node="">10. </span><span data-dcnode-id="2016" style="text-decoration: underline;"><span data-dcnode-id="2017" instrument_node="">Recognizes</span></span><span data-dcnode-id="2015" instrument_node=""> the need to improve processes for monitoring the state of conservation of World Heritage properties as a means of reducing workload, and </span><span data-dcnode-id="2013" style="text-decoration: underline;"><span data-dcnode-id="2014" instrument_node="">decides</span></span><span data-dcnode-id="2012" instrument_node=""> to default to a minimum two-year cycle for the examination of state of conservation reports for individual properties on the World Heritage List, and for the discussion of those inscribed on the List of World Heritage in Danger, except for cases of utmost urgency;</span></p><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2009" instrument_node="">11. </span><span data-dcnode-id="2007" style="text-decoration: underline;"><span data-dcnode-id="2008" instrument_node="">Decides</span></span><span data-dcnode-id="2006" instrument_node=""> to establish a four-year cycle for updating the </span><em data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="2003" instrument_node=""> and that the </span><em data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="2000" instrument_node=""> should be restricted to operational guidance, and that a new document, "Policy Guidelines", be developed as a means to capture the range of policies that the Committee and the General Assembly adopt;</span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1997" instrument_node="">12. </span><span data-dcnode-id="1995" style="text-decoration: underline;"><span data-dcnode-id="1996" instrument_node="">Decides</span></span><span data-dcnode-id="1994" instrument_node=""> to develop "Policy Guidelines" for the implementation of the </span><em data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="1991" instrument_node="">, drawing in part on the results of expert meetings and consultative bodies;</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1988" instrument_node="">13. </span><span data-dcnode-id="1986" style="text-decoration: underline;"><span data-dcnode-id="1987" instrument_node="">Decides</span></span><span data-dcnode-id="1985" instrument_node=""> to establish a standing consultative body for review of the Committee's biennial budget;</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1982" instrument_node="">14. </span><span data-dcnode-id="1980" style="text-decoration: underline;"><span data-dcnode-id="1981" instrument_node="">Recommends</span></span><span data-dcnode-id="1979" instrument_node=""> Committee members consider refraining from bringing forward new nominations that might be discussed during their term serving on the Committee, without prejudice to nomination files already submitted, deferred or referred during previous Committee sessions, or nominations from least represented States Parties and that this provision be implemented on an experimental basis and be reviewed at its 38th session in 2014;</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1976" instrument_node="">15. </span><span data-dcnode-id="1974" style="text-decoration: underline;"><span data-dcnode-id="1975" instrument_node="">Also recommends</span></span><span data-dcnode-id="1973" instrument_node=""> that States Parties already well represented on the World Heritage List should exercise restraint in bringing forward new nominations in order to achieve a better balance of the List;</span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1970" instrument_node="">16. </span><span data-dcnode-id="1968" style="text-decoration: underline;"><span data-dcnode-id="1969" instrument_node="">Requests</span></span><span data-dcnode-id="1967" instrument_node=""> States Parties to consider refraining from providing additional information regarding nominations and/or state of conservation issues after the deadlines indicated in the </span><em data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="1964" instrument_node="">, as this information is not able to be evaluated by the Advisory Bodies;</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1961"></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1957"><strong data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Capacity building for participation in statutory meetings</span></strong></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1955" instrument_node="">17. </span><span data-dcnode-id="1953" style="text-decoration: underline;"><span data-dcnode-id="1954" instrument_node="">Requests</span></span><span data-dcnode-id="1952" instrument_node=""> the World Heritage Centre and Advisory Bodies to:</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948" style="padding-left: 30px;"><span data-dcnode-id="1949" instrument_node="">a) Include the orientation/induction session for Committee members on the annual Committee agenda and invite the direct participation of the Chairperson and Rapporteur,</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945" style="PADDING-LEFT: 30px"><span data-dcnode-id="1946" instrument_node="">b) Cooperate to develop tools to support Committee members, including a guide to standard language adopted in decisions, an updated searchable database of decisions, simple explanations of key procedures (especially voting procedures) and a republished edition of the Basic Texts,</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1939" style="PADDING-LEFT: 30px"><span data-dcnode-id="1943" instrument_node="">c) Assess the advantages and disadvantages of merging the referral and deferral options for consideration of a nomination into a single mechanism, and give consideration to elaborating a proposal for draft amendments to paragraphs 159 and 160 of the </span><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="1940" instrument_node=""> in this regard,</span></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1936" style="PADDING-LEFT: 30px"><span data-dcnode-id="1937" instrument_node="">d) Provide a simple explanation for consideration at the 36th session of the Committee of the processes and methods used to evaluate nominations and the state of conservation of World Heritage properties,</span></p><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933" style="PADDING-LEFT: 30px"><span data-dcnode-id="1934" instrument_node="">e) Develop further capacity building activities for the Chairperson, Rapporteur and Committee members, including through the systematic explanation of documents to States Parties;</span></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1931"></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1927"><strong data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Guidance on draft decisions</span></strong></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1925" instrument_node="">18. </span><span data-dcnode-id="1923" style="text-decoration: underline;"><span data-dcnode-id="1924" instrument_node="">Also requests</span></span><span data-dcnode-id="1922" instrument_node=""> the World Heritage Centre to ensure that draft decisions:</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1915" style="PADDING-LEFT: 30px"><span data-dcnode-id="1919" instrument_node="">a) Are concise and focused on issues central to the </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Convention</span></em><span data-dcnode-id="1916" instrument_node=""> (notably on matters related to Outstanding Universal Value),</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912" style="PADDING-LEFT: 30px"><span data-dcnode-id="1913" instrument_node="">b) Be limited to consideration of priority issues, and</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1903" style="PADDING-LEFT: 30px"><span data-dcnode-id="1910" instrument_node="">c) Include, for inscription of properties on the List of World Heritage in Danger, a costed programme of operations needed, as relevant, based on the desired state of conservation for the removal of the property of the List of World Heritage in Danger, as required in article 11.4 of the </span><em data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Convention</span></em><span data-dcnode-id="1907" instrument_node=""> and </span><span data-dcnode-id="1905" style="text-decoration: underline;"><span data-dcnode-id="1906" instrument_node="">encourages</span></span><span data-dcnode-id="1904" instrument_node=""> the use of the international assistance in meeting these needs;</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">19. </span><span data-dcnode-id="1899" style="text-decoration: underline;"><span data-dcnode-id="1900" instrument_node="">Also decides</span></span><span data-dcnode-id="1898" instrument_node=""> to enhance consistency, and as a standard practice, draft decisions addressing:</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894" style="PADDING-LEFT: 30px"><span data-dcnode-id="1895" instrument_node="">a) Development threats, recommend use of Environmental Impact Assessment/Heritage Impact Assessment,</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891" style="PADDING-LEFT: 30px"><span data-dcnode-id="1892" instrument_node="">b) Lack of capacity, recommend assessments of management effectiveness,</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888" style="PADDING-LEFT: 30px"><span data-dcnode-id="1889" instrument_node="">c) Funding required for particular actions, recommend applications for International Assistance from the World Heritage Fund;</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1886" instrument_node="">20. </span><span data-dcnode-id="1884" style="text-decoration: underline;"><span data-dcnode-id="1885" instrument_node="">Requests</span></span><span data-dcnode-id="1883" instrument_node=""> the World Heritage Centre to develop standard modular costs for core activities for consideration at the 36th session of the World Heritage Committee, to enable the Committee to assess the costs and workload implications of decisions for all stakeholders (States Parties, Committee, Secretariat, Advisory Bodies) prior to adoption;</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1880"></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1876"><strong data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Transparency of documents and statutory meetings</span></strong></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1874" instrument_node="">21. </span><span data-dcnode-id="1872" style="text-decoration: underline;"><span data-dcnode-id="1873" instrument_node="">Requests</span></span><span data-dcnode-id="1871" instrument_node=""> the World Heritage Centre and Advisory Bodies to continue the reflection on the best way for the States Parties to engage in a constructive dialogue with the Advisory Bodies during the assessment of the nominations processes, and with the Advisory Bodies and the Secretariat during the reactive monitoring process;</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1868" instrument_node="">22. </span><span data-dcnode-id="1866" style="text-decoration: underline;"><span data-dcnode-id="1867" instrument_node="">Decides</span></span><span data-dcnode-id="1865" instrument_node=""> that World Heritage Committee meetings should be live-streamed over the web and </span><span data-dcnode-id="1863" style="text-decoration: underline;"><span data-dcnode-id="1864" instrument_node="">requests</span></span><span data-dcnode-id="1862" instrument_node=""> the World Heritage Centre to strengthen relations with media, including through media briefings prior to the opening of Committee sessions, capacity building for journalists on World Heritage matters, regular interface between the media and the Chairperson during Committee sessions and media training for the Chairperson and representatives of the Advisory Bodies and </span><span data-dcnode-id="1860" style="text-decoration: underline;"><span data-dcnode-id="1861" instrument_node="">decides</span></span><span data-dcnode-id="1859" instrument_node=""> to open the meetings to accredited journalists;</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">23. </span><span data-dcnode-id="1854" style="text-decoration: underline;"><span data-dcnode-id="1855" instrument_node="">Requests</span></span><span data-dcnode-id="1853" instrument_node=""> the World Heritage Centre to transmit Advisory Body evaluation reports to the relevant States Parties as soon as they are finalised, to allow time for proper dialogue and to make working documents public, at the time of their distribution to the States Parties.</span></p><p data-dcnode-id="1851"></p><span data-dcnode-id="1850" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/4403"><span data-dcnode-id="1849" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="1847" instrument_node="">
</span></div><span data-dcnode-id="1845" instrument_node="">
</span></span><span data-dcnode-id="1843" instrument_node="">
