												(2021)

</span><div data-dcnode-id="5744"><strong data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">Code:</span></strong><span data-dcnode-id="5745" instrument_node=""> 44COM 7.1</span></div><span data-dcnode-id="5743" instrument_node="">
</span><div data-dcnode-id="5739"><strong data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">Title:</span></strong><span data-dcnode-id="5740" instrument_node=""> Statutory matters related to Reactive Monitoring</span></div><span data-dcnode-id="5738" instrument_node=""> </span><div data-dcnode-id="5734"><strong data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">Year:</span></strong><span data-dcnode-id="5735" instrument_node=""> 2021</span></div><span data-dcnode-id="5733" instrument_node="">
</span><p data-dcnode-id="5732"></p><p data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="5729" instrument_node="">
</span><ol data-dcnode-id="5705"><span data-dcnode-id="5728" instrument_node="">
</span><li data-dcnode-id="5724"><u data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">Having examined</span></u><span data-dcnode-id="5725" instrument_node=""> Document WHC/21/44.COM/7, </span></li><span data-dcnode-id="5723" instrument_node="">
</span><li data-dcnode-id="5707"><u data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">Recalling</span></u><span data-dcnode-id="5720" instrument_node=""> Decisions </span><strong data-dcnode-id="5718"><span data-dcnode-id="5719" instrument_node="">40&nbsp;COM 7</span></strong><span data-dcnode-id="5717" instrument_node="">, </span><strong data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">41&nbsp;COM 7</span></strong><span data-dcnode-id="5714" instrument_node="">, </span><strong data-dcnode-id="5712"><span data-dcnode-id="5713" instrument_node="">42&nbsp;COM&nbsp;7</span></strong><span data-dcnode-id="5711" instrument_node=""> and </span><strong data-dcnode-id="5709"><span data-dcnode-id="5710" instrument_node="">43&nbsp;COM 7.1</span></strong><span data-dcnode-id="5708" instrument_node="">, adopted at its 40th (Istanbul/UNESCO, 2016), 41st (Krakow, 2017), 42nd (Manama, 2018) and 43rd (Baku, 2019) sessions respectively, </span></li><span data-dcnode-id="5706" instrument_node="">
</span></ol><span data-dcnode-id="5704" instrument_node="">
</span><p data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">Evaluation of the Reactive Monitoring process</span></p><span data-dcnode-id="5701" instrument_node="">
</span><ol data-dcnode-id="5675" start="3"><span data-dcnode-id="5700" instrument_node="">
</span><li data-dcnode-id="5690"><u data-dcnode-id="5698"><span data-dcnode-id="5699" instrument_node="">Taking note with appreciation</span></u><span data-dcnode-id="5697" instrument_node=""> of the recommendations of the evaluation of the Reactive Monitoring process, as prioritized in line with Decision </span><strong data-dcnode-id="5695"><span data-dcnode-id="5696" instrument_node="">43&nbsp;COM&nbsp;7.1</span></strong><span data-dcnode-id="5694" instrument_node="">, </span><u data-dcnode-id="5692"><span data-dcnode-id="5693" instrument_node="">requests</span></u><span data-dcnode-id="5691" instrument_node=""> all stakeholders of the Convention to implement them at their level as soon as possible;</span></li><span data-dcnode-id="5689" instrument_node="">
</span><li data-dcnode-id="5682"><u data-dcnode-id="5687"><span data-dcnode-id="5688" instrument_node="">Welcomes</span></u><span data-dcnode-id="5686" instrument_node=""> the matrix structure developed by the World Heritage Centre in consultation with the Advisory Bodies, which provides a clear framework to report back to the Committee on the implementation of the priority recommendations, and </span><u data-dcnode-id="5684"><span data-dcnode-id="5685" instrument_node="">requests</span></u><span data-dcnode-id="5683" instrument_node=""> them to prepare an Implementation Plan; </span></li><span data-dcnode-id="5681" instrument_node="">
</span><li data-dcnode-id="5677"><u data-dcnode-id="5679"><span data-dcnode-id="5680" instrument_node="">Also requests</span></u><span data-dcnode-id="5678" instrument_node=""> the World Heritage Centre, in consultation with the Advisory Bodies, and in line with Recommendation 34 of the evaluation, to present a progress report on the implementation of the recommendations, for examination at its 47th session; </span></li><span data-dcnode-id="5676" instrument_node="">
</span></ol><span data-dcnode-id="5674" instrument_node="">
</span><p data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">Issues related to the List of World Heritage in Danger</span></p><span data-dcnode-id="5671" instrument_node="">
</span><ol data-dcnode-id="5588" start="6"><span data-dcnode-id="5670" instrument_node="">
</span><li data-dcnode-id="5666"><u data-dcnode-id="5668"><span data-dcnode-id="5669" instrument_node="">Reaffirming</span></u><span data-dcnode-id="5667" instrument_node=""> the need to promote a better understanding of the provisions of the World Heritage Convention and in particular of the implications and benefits of properties being inscribed on the List of World Heritage in Danger and the need to underline that removal of a World Heritage property from the List of World Heritage in Danger is a significant ‘success story’, </span></li><span data-dcnode-id="5665" instrument_node="">
</span><li data-dcnode-id="5652"><u data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">Mindful</span></u><span data-dcnode-id="5662" instrument_node=""> of its Decision </span><strong data-dcnode-id="5660"><span data-dcnode-id="5661" instrument_node="">43 COM 8C.3</span></strong><span data-dcnode-id="5659" instrument_node="">, which recalled that the inscription of a property on the List of World Heritage in Danger aims to marshal international support to help the State Party effectively address the challenges faced by the property by engaging with the World Heritage Centre and the Advisory Bodies to develop a program of corrective measures to achieve the desired state of conservation for the property, as provided for under Paragraph 183 of the </span><em data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="5656" instrument_node="">; and </span><u data-dcnode-id="5654"><span data-dcnode-id="5655" instrument_node="">noting</span></u><span data-dcnode-id="5653" instrument_node=""> that inscription on the List of World Heritage in Danger also alerts the State Party about the international community’s concern on the state of conservation of the property, provides a timely reminder of obligations that arise under the World Heritage Convention, highlights threats to the attributes of a property which contribute to its Outstanding Universal Value (OUV), and, importantly, initiates a process and pathway to address those threats, including the availability of additional funding, </span></li><span data-dcnode-id="5651" instrument_node="">
</span><li data-dcnode-id="5647"><u data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">Also noting</span></u><span data-dcnode-id="5648" instrument_node=""> that the development of a Desired state of conservation for the removal of a property from the List of World Heritage in Danger (DSOCR) and a programme for corrective measures is a critical part of the procedure for managing and addressing threats to the OUV of properties inscribed on the List of World Heritage in Danger, </span></li><span data-dcnode-id="5646" instrument_node="">
</span><li data-dcnode-id="5639"><u data-dcnode-id="5644"><span data-dcnode-id="5645" instrument_node="">Takes note with appreciation</span></u><span data-dcnode-id="5643" instrument_node=""> of the information contained in Document WHC/21/44.COM/7 (Part I.B.) and </span><u data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">recognizes</span></u><span data-dcnode-id="5640" instrument_node=""> that the existing monitoring processes are leading over time to a significant improvement in the conservation status of properties inscribed on the List of World Heritage in Danger; </span></li><span data-dcnode-id="5638" instrument_node="">
</span><li data-dcnode-id="5619"><u data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">Also recalling</span></u><span data-dcnode-id="5635" instrument_node=""> its previous request for States Parties to develop and submit DSOCRs for all properties included in the List of World Heritage in Danger by its 40th session in 2016 at the latest, </span><u data-dcnode-id="5633"><span data-dcnode-id="5634" instrument_node="">expresses its concern</span></u><span data-dcnode-id="5632" instrument_node=""> however that less than half of the properties inscribed on the List of World Heritage in Danger have a DSOCR and therefore </span><u data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">strongly urges</span></u><span data-dcnode-id="5629" instrument_node=""> all States Parties concerned to:
</span><ol data-dcnode-id="5621"><span data-dcnode-id="5628" instrument_node="">
</span><li data-dcnode-id="5626"><span data-dcnode-id="5627" instrument_node="">Use the 2013 Guidance to develop and submit DSOCRs with quantifiable indicators to track progress for all remaining properties as soon as practicable, with a view to having them all in place by its46th session, with the support of the World Heritage Centre and Advisory Bodies;</span></li><span data-dcnode-id="5625" instrument_node="">
</span><li data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">Ensure that for any property newly inscribed on the List of World Heritage in Danger, a DSOCR is developed and submitted no later than one year following inscription;</span></li><span data-dcnode-id="5622" instrument_node="">
</span></ol><span data-dcnode-id="5620" instrument_node="">
</span></li><span data-dcnode-id="5618" instrument_node="">
</span><li data-dcnode-id="5608"><u data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node="">Acknowledging</span></u><span data-dcnode-id="5615" instrument_node=""> initial pilot activities to explore possible approaches and methodologies for costed action plans, </span><u data-dcnode-id="5613"><span data-dcnode-id="5614" instrument_node="">requests</span></u><span data-dcnode-id="5612" instrument_node=""> these efforts to continue and </span><u data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">calls upon</span></u><span data-dcnode-id="5609" instrument_node=""> all interested States Parties to support a workshop to develop a common methodology and guidelines for when and how corrective measures might be supported by costed action plans; </span></li><span data-dcnode-id="5607" instrument_node="">
</span><li data-dcnode-id="5603"><u data-dcnode-id="5605"><span data-dcnode-id="5606" instrument_node="">Also strongly urges</span></u><span data-dcnode-id="5604" instrument_node=""> States Parties, NGOs, private sector and donors to redouble efforts to prioritize attention to those World Heritage properties, which have been on the List of World Heritage in Danger for 10 years or longer; </span></li><span data-dcnode-id="5602" instrument_node="">
</span><li data-dcnode-id="5598"><u data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">Thanks</span></u><span data-dcnode-id="5599" instrument_node=""> the State Party of Romania for having hosted a multi-stakeholders international workshop in September 2019, providing a unique space for discussions and networking of professionals regarding the preservation of cultural and natural World Heritage facing dangers, including exchange of good practice, and highlighting the benefits of the List of World Heritage in Danger; </span></li><span data-dcnode-id="5597" instrument_node="">
</span><li data-dcnode-id="5590"><u data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">Expresses its gratitude</span></u><span data-dcnode-id="5594" instrument_node=""> to the State Party of Norway for its generous support for a project that aims to improve the perception of the List of World Heritage in Danger, and </span><u data-dcnode-id="5592"><span data-dcnode-id="5593" instrument_node="">also requests</span></u><span data-dcnode-id="5591" instrument_node=""> the World Heritage Centre to present a progress report on this activity to its 45th session. </span></li><span data-dcnode-id="5589" instrument_node="">
</span></ol><p data-dcnode-id="5587"></p><span data-dcnode-id="5586" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="5584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/7677"><span data-dcnode-id="5585" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="5583" instrument_node="">

</span><p data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">Emergency situations resulting from conflicts</span></p><span data-dcnode-id="5515" instrument_node="">
</span><ol data-dcnode-id="5476" start="3"><span data-dcnode-id="5514" instrument_node="">
</span><li data-dcnode-id="5507"><u data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">Deplores</span></u><span data-dcnode-id="5511" instrument_node=""> the loss of human life and the degradation of humanitarian conditions resulting from the prevailing conflict situations in several countries, and </span><u data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">continues to express its utmost concern</span></u><span data-dcnode-id="5508" instrument_node=""> at the devastating damage sustained and the continuing threats facing cultural and natural heritage in regions of armed conflict;</span></li><span data-dcnode-id="5506" instrument_node="">
</span><li data-dcnode-id="5499"><u data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">Urges again</span></u><span data-dcnode-id="5503" instrument_node=""> all parties associated with conflicts to refrain from any action that would cause further damage to cultural and natural heritage, including their use for military purposes, and </span><u data-dcnode-id="5501"><span data-dcnode-id="5502" instrument_node="">also urges</span></u><span data-dcnode-id="5500" instrument_node=""> States Parties to fulfil their obligations under international law by taking all possible measures to protect such heritage, in particular the safeguarding of World Heritage properties and sites included in Tentative Lists;</span></li><span data-dcnode-id="5498" instrument_node="">
</span><li data-dcnode-id="5491"><u data-dcnode-id="5496"><span data-dcnode-id="5497" instrument_node="">Reiterates its utmost concern</span></u><span data-dcnode-id="5495" instrument_node=""> about the continuing threats of wildlife poaching and illegal trafficking of wildlife and timber products linked to impacts of armed conflict and organized crime, which is eroding the biodiversity and Outstanding Universal Value (OUV) of many World Heritage properties around the world, and </span><u data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node="">further urges</span></u><span data-dcnode-id="5492" instrument_node=""> States Parties to take the necessary measures to curb this problem, including through the implementation of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES);</span></li><span data-dcnode-id="5490" instrument_node="">
</span><li data-dcnode-id="5483"><u data-dcnode-id="5488"><span data-dcnode-id="5489" instrument_node="">Also reiterates its utmost concern</span></u><span data-dcnode-id="5487" instrument_node=""> at the increase in illicit trafficking of cultural objects, resulting from armed conflicts, and </span><u data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">appeals</span></u><span data-dcnode-id="5484" instrument_node=""> to all States Parties to cooperate in the fight against these threats, and for cultural heritage protection in general, including through the ratification of the 1970 Convention and the 1954 Convention and its two Protocols, as well as the implementation of United Nations Security Council Resolutions 2199 (2015), 2253 (2015) and 2347 (2017);</span></li><span data-dcnode-id="5482" instrument_node="">
</span><li data-dcnode-id="5478"><u data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">Reiterates its call</span></u><span data-dcnode-id="5479" instrument_node=""> upon the international community to further support the safeguarding of the cultural and natural heritage of countries affected by conflict, through earmarked funds or through contributions to the UNESCO Heritage Emergency Fund; </span></li><span data-dcnode-id="5477" instrument_node="">
</span></ol><span data-dcnode-id="5475" instrument_node="">
</span><p data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">Recovery and Reconstruction</span></p><span data-dcnode-id="5472" instrument_node="">
</span><ol data-dcnode-id="5444" start="8"><span data-dcnode-id="5471" instrument_node="">
</span><li data-dcnode-id="5464"><u data-dcnode-id="5469"><span data-dcnode-id="5470" instrument_node="">Welcomes</span></u><span data-dcnode-id="5468" instrument_node=""> the continued reflection on recovery and reconstruction and the broad dissemination of the Warsaw Recommendation in multiple languages as a basis for further reflections and </span><u data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">also welcomes</span></u><span data-dcnode-id="5465" instrument_node=""> the dedicated webpage established by the World Heritage Centre;</span></li><span data-dcnode-id="5463" instrument_node="">
</span><li data-dcnode-id="5459"><u data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">Expresses its gratitude</span></u><span data-dcnode-id="5460" instrument_node=""> to the Polish authorities for the organization of the webinar “The invincible city: Society in cultural heritage recovery” in October 2020 and to the Arab Regional Centre for World Heritage (ARC-WH) for the “Conference on heritage reconstruction - its economic, social, and psychological aspects in the process of post-trauma recovery” (Bahrain, March 2021); </span></li><span data-dcnode-id="5458" instrument_node="">
</span><li data-dcnode-id="5454"><u data-dcnode-id="5456"><span data-dcnode-id="5457" instrument_node="">Takes note</span></u><span data-dcnode-id="5455" instrument_node=""> of the various resources already published and in the process of publication; </span></li><span data-dcnode-id="5453" instrument_node="">
</span><li data-dcnode-id="5446"><u data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">Noting</span></u><span data-dcnode-id="5450" instrument_node=""> the value of accurate pre-existing documentation in the recovery of built and other heritage following destruction, </span><u data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">strongly encourages</span></u><span data-dcnode-id="5447" instrument_node=""> the States Parties and all other stakeholders of the Convention to stimulate the documentation of heritage structures, including through cutting-edge digital technologies, to create databases of documentation for future reference; </span></li><span data-dcnode-id="5445" instrument_node="">
</span></ol><span data-dcnode-id="5443" instrument_node="">
</span><p data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">Post-2020 Global Biodiversity Framework</span></p><span data-dcnode-id="5440" instrument_node="">
</span><ol data-dcnode-id="5394" start="12"><span data-dcnode-id="5439" instrument_node="">
</span><li data-dcnode-id="5432"><u data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">Notes with utmost concern</span></u><span data-dcnode-id="5436" instrument_node=""> the results of the Intergovernmental Science-Policy Platform on Biodiversity and Ecosystem Services (IPBES) Global Assessment Report on Biodiversity and Ecosystem Services, which shows that nature is declining globally at rates unprecedented in human history and that no significant progress has been achieved on most of the 20 Aichi Biodiversity Targets, and </span><u data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">encourages</span></u><span data-dcnode-id="5433" instrument_node=""> the Parties of the Convention on Biological Diversity (CBD) to adopt an ambitious post-2020 Global Biodiversity Framework (GBF), which can bring about the transformative change needed to halt the loss in biodiversity; </span></li><span data-dcnode-id="5431" instrument_node="">
</span><li data-dcnode-id="5424"><u data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">Considers</span></u><span data-dcnode-id="5428" instrument_node=""> that the post-2020 GBF should provide a common framework for all Biodiversity-related Conventions and build on the strengths of each convention, and </span><u data-dcnode-id="5426"><span data-dcnode-id="5427" instrument_node="">strongly encourages</span></u><span data-dcnode-id="5425" instrument_node=""> the Parties of CBD to take into account the recommendations of the expert meeting “Harnessing the power of World Heritage for a better future: World Heritage and the post-2020 Global Biodiversity Framework” in the post-2020 GBF to recognize and better integrate the contribution of the World Heritage Convention to global biodiversity conservation; </span></li><span data-dcnode-id="5423" instrument_node="">
</span><li data-dcnode-id="5419"><u data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">Requests</span></u><span data-dcnode-id="5420" instrument_node=""> the World Heritage Centre and IUCN to continue to engage with the preparatory process of the post-2020 GBF, in order to advance consideration of the World Heritage Convention; </span></li><span data-dcnode-id="5418" instrument_node="">
</span><li data-dcnode-id="5414"><u data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">Also requests</span></u><span data-dcnode-id="5415" instrument_node=""> the States Parties to ensure that there is effective liaison between the respective national focal points for the CBD and the World Heritage Convention, to ensure that considerations relevant for the Convention are integrated in the GBF, and that the contributions of natural and cultural World Heritage properties, sites on national Tentative Lists, and other internationally designated sites are fully integrated and supported within National Biodiversity Strategy and Action Plans (NBSAPs);</span></li><span data-dcnode-id="5413" instrument_node="">
</span><li data-dcnode-id="5409"><u data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">Further requests</span></u><span data-dcnode-id="5410" instrument_node=""> the World Heritage Centre and IUCN to report back at its 46th session, with recommended policies and actions to support the adopted post-2020 GBF be taken into account in the processes of the World Heritage Convention;</span></li><span data-dcnode-id="5408" instrument_node="">
</span><li data-dcnode-id="5404"><u data-dcnode-id="5406"><span data-dcnode-id="5407" instrument_node="">Requests furthermore</span></u><span data-dcnode-id="5405" instrument_node=""> the World Heritage Centre and the Advisory Bodies to consider how the relevance of these proposals for mixed, cultural landscapes and other relevant cultural World Heritage properties, including those cultural properties that overlap with Key Biodiversity Areas, might contribute to the anticipated Joint Programme of Work on the Links between Biological and Cultural Diversity to ensure further integration of nature and culture in the post-2020 GBF and to help achieve its vision of living in harmony with nature by 2050, and report to its 46th session on the approved Programme and how the World Heritage Convention can contribute to its implementation; </span></li><span data-dcnode-id="5403" instrument_node="">
</span><li data-dcnode-id="5396"><u data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Takes note</span></u><span data-dcnode-id="5400" instrument_node=""> of the need for additional funding to be provided to support the achievement of biodiversity goals within World Heritage properties, in order to address their contribution to the GBF, and </span><u data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">invites</span></u><span data-dcnode-id="5397" instrument_node=""> the Conference of the Parties of the CBD, in accordance with its decision XIII/21, to take these resourcing needs into account in formulating strategic guidance for the eight replenishment of the Global Environment Facility (GEF) Trust Fund and other international finance mechanisms to support the GBF, considering all elements provided in Section II.C of Document WHC/21/44.COM/7; </span></li><span data-dcnode-id="5395" instrument_node="">
</span></ol><span data-dcnode-id="5393" instrument_node="">
</span><p data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">Buffer zones</span></p><span data-dcnode-id="5390" instrument_node="">
</span><ol data-dcnode-id="5344" start="19"><span data-dcnode-id="5389" instrument_node="">
</span><li data-dcnode-id="5382"><u data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">Noting</span></u><span data-dcnode-id="5386" instrument_node=""> that a number of World Heritage properties lack formal buffer zones, in particular those on the List of World Heritage in Danger, </span><u data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">reaffirms</span></u><span data-dcnode-id="5383" instrument_node=""> the increasing importance of effective buffer zones to support the protection and management of Outstanding Universal Value (OUV) and building greater resilience of properties to external threats,</span></li><span data-dcnode-id="5381" instrument_node="">
</span><li data-dcnode-id="5371"><u data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Recalling</span></u><span data-dcnode-id="5378" instrument_node=""> Decision </span><strong data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">32 COM 7.1 </span></strong><span data-dcnode-id="5375" instrument_node="">and the 2008 expert workshop on World Heritage and Buffer Zones with its specific recommendations to improve guidance, enhance capacity and refine the </span><em data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="5372" instrument_node=""> concerning buffer zones,</span></li><span data-dcnode-id="5370" instrument_node="">
</span><li data-dcnode-id="5351"><u data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">Urges</span></u><span data-dcnode-id="5367" instrument_node=""> States Parties, with the support of the World Heritage Centre and the Advisory Bodies, to: 
</span><ol data-dcnode-id="5353"><span data-dcnode-id="5366" instrument_node="">
</span><li data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">Incorporate well-designed buffer zones based on a holistic understanding of natural as well as human induced factors affecting the property, supported by reinforcing relevant legal, policy, awareness and incentive mechanisms, into new nominations and where appropriate into existing properties to ensure enhanced protection of World Heritage properties,</span></li><span data-dcnode-id="5363" instrument_node="">
</span><li data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">Place particular emphasis on strategic environmental assessment and impact assessments for potential projects within buffer zones to avoid, negative impacts on OUV from developments and activities in these zones,</span></li><span data-dcnode-id="5360" instrument_node="">
</span><li data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">Develop buffer zone protection and management regimes that optimize the capture and sharing of benefits to communities to support the aspirations of the 2015 Policy for the integration of a Sustainable Development Perspective into the processes of the World Heritage Convention,</span></li><span data-dcnode-id="5357" instrument_node="">
</span><li data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">Ensure buffer zones are supported by appropriate protection and management regimes in line with the property’s OUV, that build connectivity with the wider setting in cultural, environmental and landscape terms;</span></li><span data-dcnode-id="5354" instrument_node="">
</span></ol><span data-dcnode-id="5352" instrument_node="">
</span></li><span data-dcnode-id="5350" instrument_node="">
</span><li data-dcnode-id="5346"><u data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">Encourages</span></u><span data-dcnode-id="5347" instrument_node=""> the States Parties, the World Heritage Centre and the Advisory Bodies, through extra-budgetary support, to revisit and update the recommendations arising from the 2008 expert workshop to enhance capacity through the development of best practice guidelines for designing, establishing, protecting and managing World Heritage buffer zones; </span></li><span data-dcnode-id="5345" instrument_node="">
</span></ol><span data-dcnode-id="5343" instrument_node="">
</span><p data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">“No-Go” commitment</span></p><span data-dcnode-id="5340" instrument_node="">
</span><ol data-dcnode-id="5289" start="23"><span data-dcnode-id="5339" instrument_node="">
</span><li data-dcnode-id="5326"><u data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">Welcomes</span></u><span data-dcnode-id="5336" instrument_node=""> the continued efforts of the World Heritage Centre, IUCN and other partners to expand the “No-go” commitment to other extractive companies, the banking and insurance sector, the hydropower industry and other relevant companies, </span><u data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">commends</span></u><span data-dcnode-id="5333" instrument_node=""> ENGIE and bp for subscribing to the commitment, and </span><u data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">takes note</span></u><span data-dcnode-id="5330" instrument_node=""> of the initial commitment of Eni, </span><u data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">noting</span></u><span data-dcnode-id="5327" instrument_node=""> the need to strengthen it in order to meet the requests made in previous Committee decisions; </span></li><span data-dcnode-id="5325" instrument_node="">
</span><li data-dcnode-id="5318"><u data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">Reiterates its request</span></u><span data-dcnode-id="5322" instrument_node=""> to all relevant private and public sector companies to integrate into their sustainability policies, provisions for ensuring that they are not financing or implementing projects that may negatively impact World Heritage properties and that the companies they are investing in subscribe to the “No-go” commitment, and </span><u data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">invites</span></u><span data-dcnode-id="5319" instrument_node=""> these companies to lodge their adopted policies with the UNESCO World Heritage Centre;</span></li><span data-dcnode-id="5317" instrument_node="">
</span><li data-dcnode-id="5307"><u data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">Also welcomes</span></u><span data-dcnode-id="5314" instrument_node=""> the global insurance industry Statement of commitment to protect the Outstanding Universal Value of World Heritage properties, developed with the UNEP Finance Initiative Principles for Sustainable Insurance (PSI), </span><u data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">also commends</span></u><span data-dcnode-id="5311" instrument_node=""> the 17&nbsp;major insurance companies and other supporting institutions of the insurance sector that have so far adhered to the Statement and </span><u data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">invites</span></u><span data-dcnode-id="5308" instrument_node=""> other insurance companies to do so;</span></li><span data-dcnode-id="5306" instrument_node="">
</span><li data-dcnode-id="5302"><u data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">Further welcomes</span></u><span data-dcnode-id="5303" instrument_node=""> the guidance provided by the International Finance Cooperation (IFC) of the World Bank on Performance Standard 6 on Biodiversity Conservation and Sustainable Management of Living Natural Resources that investment projects in natural and mixed World Heritage properties will not be acceptable for financing, with the possible exception of projects specifically designed to contribute to the conservation of the area;</span></li><span data-dcnode-id="5301" instrument_node="">
</span><li data-dcnode-id="5291"><u data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node="">Acknowledges with appreciation</span></u><span data-dcnode-id="5298" instrument_node=""> the financial support of the Government of Flanders (Belgium) for this work and </span><u data-dcnode-id="5296"><span data-dcnode-id="5297" instrument_node="">reiterates its request</span></u><span data-dcnode-id="5295" instrument_node=""> to the World Heritage Centre, in cooperation with the Advisory Bodies, to continue the fruitful dialogue with extractive industries the hydropower industry and other industries, the banking, insurance and investment sector, in line with its Decision </span><strong data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">40&nbsp;COM&nbsp;7</span></strong><span data-dcnode-id="5292" instrument_node="">;</span></li><span data-dcnode-id="5290" instrument_node="">
</span></ol><span data-dcnode-id="5288" instrument_node="">
</span><p data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">Fire: impacts and management</span></p><span data-dcnode-id="5285" instrument_node="">
</span><ol data-dcnode-id="5252" start="28"><span data-dcnode-id="5284" instrument_node="">
</span><li data-dcnode-id="5280"><u data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">Acknowledging</span></u><span data-dcnode-id="5281" instrument_node=""> the extensive damage of fires to natural and cultural World Heritage properties since 2019, and the growing threat of forest and bushfires to certain natural properties and their cultural values, including as a result of climate change impacts,</span></li><span data-dcnode-id="5279" instrument_node="">
</span><li data-dcnode-id="5254"><u data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Requests</span></u><span data-dcnode-id="5276" instrument_node=""> States Parties to implement best practice fire management strategies to ensure the protection and management of Outstanding Universal Value (OUV) including, where appropriate, to:
</span><ol data-dcnode-id="5256"><span data-dcnode-id="5275" instrument_node="">
</span><li data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Prepare site-level fire vulnerability and risk assessments, mitigation, Risk Preparedness, response and recovery plans in the event of potential severe fire impacts on heritage values,</span></li><span data-dcnode-id="5272" instrument_node="">
</span><li data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">Incorporate fire research, monitoring of impact, emergency response and mitigation and preparedness measures into management decisions,</span></li><span data-dcnode-id="5269" instrument_node="">
</span><li data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">Work with stakeholders to raise awareness on fire risks among communities and build greater capacity to respond and recover following fires,</span></li><span data-dcnode-id="5266" instrument_node="">
</span><li data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">Consider customised approaches and strategies that reflect the characteristics and circumstances of naturally and anthropogenically generated&nbsp;fires,</span></li><span data-dcnode-id="5263" instrument_node="">
</span><li data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Explore the potential of new technologies for application in fire managing strategies, including monitoring, and firefighting systems, that will not have negative impact on OUV of the properties,</span></li><span data-dcnode-id="5260" instrument_node="">
</span><li data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">Take strong actions to address human-induced climate change in line with global United Nations Framework Convention on Climate Change (UNFCCC) commitments;</span></li><span data-dcnode-id="5257" instrument_node="">
</span></ol><span data-dcnode-id="5255" instrument_node="">
</span></li><span data-dcnode-id="5253" instrument_node="">
</span></ol><span data-dcnode-id="5251" instrument_node="">
</span><p data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">Urban pressures on cultural World Heritage properties</span></p><span data-dcnode-id="5248" instrument_node="">
</span><ol data-dcnode-id="5213" start="30"><span data-dcnode-id="5247" instrument_node="">
</span><li data-dcnode-id="5240"><u data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Notes</span></u><span data-dcnode-id="5244" instrument_node=""> that the pressures on historic urban areas arising from inappropriate or inconsistent development controls, rapid, uncontrolled and planned development, including large development projects, additions that are incompatible in their volume, mass tourism, as well as the accumulated impact of incremental changes have continued within numerous World Heritage properties and in their buffer zones and settings, and </span><u data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">considers</span></u><span data-dcnode-id="5241" instrument_node=""> that these present potential and actual major threats to the Outstanding Universal Value (OUV) of properties, including their integrity and authenticity, as well as increasing their vulnerability to disasters, including those resulting from climate change; </span></li><span data-dcnode-id="5239" instrument_node="">
</span><li data-dcnode-id="5235"><u data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">Also notes</span></u><span data-dcnode-id="5236" instrument_node=""> the unrelenting pressures of urbanization and urban development in recent years, the essential contribution of local communities, and the consequent need to support sustainable, compatible, and inclusive livelihoods for local communities and embed stakeholder engagement in management systems and processes, with a view to seeking solutions to protecting heritage in the framework of sustainable urban development to counter and manage the impacts of this ever-present threat; </span></li><span data-dcnode-id="5234" instrument_node="">
</span><li data-dcnode-id="5230"><u data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">Notes with appreciation</span></u><span data-dcnode-id="5231" instrument_node=""> the outcomes of the International Workshop on Historic Urban Contexts in Fukuoka, Japan, in January 2020 (Fukuoka Outcomes) as well as the World Heritage City Lab in June 2020 that proposed several useful recommendations;</span></li><span data-dcnode-id="5229" instrument_node="">
</span><li data-dcnode-id="5225"><u data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">Calls on</span></u><span data-dcnode-id="5226" instrument_node=""> States Parties to implement the 2011 UNESCO Recommendation on the Historic Urban Landscape (HUL) in World Heritage properties with urban characteristics, in particular, following the methodology and recommendations of the Fukuoka Outcomes and the World Heritage City Lab, and use the opportunity of the 10th anniversary of the HUL Recommendation in 2021 to support key actions to implement the HUL Recommendation also in line with the 2030 Agenda and the New Urban Agenda; </span></li><span data-dcnode-id="5224" instrument_node="">
</span><li data-dcnode-id="5220"><u data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">Stresses</span></u><span data-dcnode-id="5221" instrument_node=""> the importance of carrying out Heritage Impact Assessments to evaluate and thereby avoid or manage potential threats to the OUV of the property arising from new urban development projects; </span></li><span data-dcnode-id="5219" instrument_node="">
</span><li data-dcnode-id="5215"><u data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">Also emphasizes</span></u><span data-dcnode-id="5216" instrument_node=""> the need to enhance resilience and recovery of World Heritage properties in urban areas vulnerable to climate change related impacts, in line with the HUL Recommendation and the World Heritage City Lab outcomes, while also enhancing the livability of the properties and their surrounding for their inhabitants; </span></li><span data-dcnode-id="5214" instrument_node="">
</span></ol><span data-dcnode-id="5212" instrument_node="">
</span><p data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">Heritage Impact Assessments / Environmental Impact Assessments</span></p><span data-dcnode-id="5209" instrument_node="">
</span><ol data-dcnode-id="5189" start="36"><span data-dcnode-id="5208" instrument_node="">
</span><li data-dcnode-id="5201"><u data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">Welcomes</span></u><span data-dcnode-id="5205" instrument_node=""> the new Guidance and Toolkit for Impact Assessment in a World Heritage context through collaboration between the Advisory Bodies and the World Heritage Centre, and </span><u data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">thanks</span></u><span data-dcnode-id="5202" instrument_node=""> the State Party of Norway for supporting this work through the ICCROM-IUCN World Heritage Leadership Programme; </span></li><span data-dcnode-id="5200" instrument_node="">
</span><li data-dcnode-id="5196"><u data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">Requests</span></u><span data-dcnode-id="5197" instrument_node=""> States Parties to carry out subsequent Environmental Impact Assessment/Heritage Impact Assessment in line with the new guidance; </span></li><span data-dcnode-id="5195" instrument_node="">
</span><li data-dcnode-id="5191"><u data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">Calls upon</span></u><span data-dcnode-id="5192" instrument_node=""> States Parties and organizations to provide additional funding and support for compiling the guidance on Strategic Environmental Assessment and support other capacity building activities on impact assessments; </span></li><span data-dcnode-id="5190" instrument_node="">
</span></ol><span data-dcnode-id="5188" instrument_node="">
</span><p data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">Conservation of fabric, skills and traditional and contemporary technologies</span></p><span data-dcnode-id="5185" instrument_node="">
</span><ol data-dcnode-id="5156" start="39"><span data-dcnode-id="5184" instrument_node="">
</span><li data-dcnode-id="5180"><u data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">Recognizes</span></u><span data-dcnode-id="5181" instrument_node=""> that repair after disasters as well as continued maintenance over time of the integrity and authenticity of the fabric that contributes to the Outstanding Universal Value (OUV) of cultural and mixed World Heritage properties require specific and specialist skills-sets and crafts, knowledge sets and systems often based in cultural-specific technologies developed over many generations;</span></li><span data-dcnode-id="5179" instrument_node="">
</span><li data-dcnode-id="5175"><u data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">Notes</span></u><span data-dcnode-id="5176" instrument_node=""> that the challenges encountered in the maintenance and restoration of the physical fabric of cultural and mixed World Heritage properties often arise from the lack of appropriate knowledge and skills among craftspeople, as well as a lack of appropriate historically developed and utilised materials;</span></li><span data-dcnode-id="5174" instrument_node="">
</span><li data-dcnode-id="5158"><u data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">Encourages</span></u><span data-dcnode-id="5171" instrument_node=""> the States Parties and all other stakeholders of the Convention to:
</span><ol data-dcnode-id="5160"><span data-dcnode-id="5170" instrument_node="">
</span><li data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">Stimulate existing (and develop new) research programmes on traditional methods, technologies and materials, and encourage (and, where necessary support) the intergenerational transmission of traditional and contemporary restoration and maintenance skills, and also embed these in management systems, thereby supporting viable professions for the maintenance of physical human-made attributes that contribute to the OUV of cultural and mixed World Heritage properties,</span></li><span data-dcnode-id="5167" instrument_node="">
</span><li data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">Facilitate the development of innovative bespoke technical approaches that enable the long-term sustainable physical conservation of significant fabric, where traditional practices can no longer address changing circumstance,</span></li><span data-dcnode-id="5164" instrument_node="">
</span><li data-dcnode-id="5162"><span data-dcnode-id="5163" instrument_node="">Assist in the global dissemination of traditional knowledge, skills and methods for restoration and maintenance of physical fabric through exchanges, publications, digital and other media to benefit the maintenance and restoration of the physical fabric of cultural and mixed World Heritage properties;</span></li><span data-dcnode-id="5161" instrument_node="">
</span></ol><span data-dcnode-id="5159" instrument_node="">
</span></li><span data-dcnode-id="5157" instrument_node="">
</span></ol><span data-dcnode-id="5155" instrument_node="">
</span><p data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">Earth observation for World Heritage conservation</span></p><span data-dcnode-id="5152" instrument_node="">
</span><ol data-dcnode-id="5127" start="42"><span data-dcnode-id="5151" instrument_node="">
</span><li data-dcnode-id="5147"><u data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">Recalling</span></u><span data-dcnode-id="5148" instrument_node=""> that Earth observation satellite technologies, spatial data and analysis tools have tremendously improved over the past decade and that they provide powerful additional means for decision-makers and stakeholders of the Convention to find comprehensive solutions to today’s global challenges for World Heritage properties,</span></li><span data-dcnode-id="5146" instrument_node="">
</span><li data-dcnode-id="5139"><u data-dcnode-id="5144"><span data-dcnode-id="5145" instrument_node="">Takes note with satisfaction</span></u><span data-dcnode-id="5143" instrument_node=""> that the World Heritage Centre, in collaboration with the Group on Earth Observation (GEO) Secretariat and GEO Greek Office, has recently launched the Urban Heritage Climate Observatory (UHCO) as a GEO Community Activity that applies earth observation tools to understand and document the impacts of climate change on World Heritage cities and </span><u data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">invites</span></u><span data-dcnode-id="5140" instrument_node=""> States Parties to contribute to the UHCO with data, expertise, networks, and financial resources; </span></li><span data-dcnode-id="5138" instrument_node="">
</span><li data-dcnode-id="5134"><u data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">Requests</span></u><span data-dcnode-id="5135" instrument_node=""> States Parties, the World Heritage Centre, the Advisory Bodies, UNESCO Category&nbsp;2 Centres and other relevant institutions to continue exploring collaborative partnerships, which apply innovative technological advances in remote sensing to the improved monitoring and protection of World Heritage properties;</span></li><span data-dcnode-id="5133" instrument_node="">
</span><li data-dcnode-id="5129"><u data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">Reiterates its encouragements</span></u><span data-dcnode-id="5130" instrument_node=""> to States Parties to invest in the necessary institutional and individual capacity needed to make full use of such Earth observation technologies for the early detection of activities potentially harmful to the Outstanding Universal Value of World Heritage properties and to better understand trends and respond appropriately.</span></li><span data-dcnode-id="5128" instrument_node="">
</span></ol><p data-dcnode-id="5126"></p><span data-dcnode-id="5125" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/7678"><span data-dcnode-id="5124" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="5122" instrument_node="">
</span></div><span data-dcnode-id="5120" instrument_node="">

</span></div><span data-dcnode-id="5116" instrument_node="">

</span><a aria-controls="collapsedecision7917" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="5106" data-toggle="collapse" href="#decision7917" id="ext-element-18" role="button"><span data-dcnode-id="5113" instrument_node="">
</span><span data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">44COM 7C</span></span><span data-dcnode-id="5110" instrument_node="">
											Draft Updated Policy Document On The Impacts Of Climate Change On World Heritage Properties 
												(2021)
											
											</span><span class="material-icons-sharp" data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">expand_more</span></span><span data-dcnode-id="5107" instrument_node="">
</span></a><span data-dcnode-id="5105" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="4941" id="decision7917"><span data-dcnode-id="5104" instrument_node="">
</span><div data-dcnode-id="5100"><strong data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">Code:</span></strong><span data-dcnode-id="5101" instrument_node=""> 44COM 7C</span></div><span data-dcnode-id="5099" instrument_node="">
</span><div data-dcnode-id="5095"><strong data-dcnode-id="5097"><span data-dcnode-id="5098" instrument_node="">Title:</span></strong><span data-dcnode-id="5096" instrument_node=""> Draft Updated Policy Document On The Impacts Of Climate Change On World Heritage Properties</span></div><span data-dcnode-id="5094" instrument_node=""> </span><div data-dcnode-id="5090"><strong data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">Year:</span></strong><span data-dcnode-id="5091" instrument_node=""> 2021</span></div><span data-dcnode-id="5089" instrument_node="">
</span><p data-dcnode-id="5088"></p><p data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="5085" instrument_node="">
</span><ol data-dcnode-id="4947"><span data-dcnode-id="5084" instrument_node="">
</span><li data-dcnode-id="5080"><u data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">Having examined</span></u><span data-dcnode-id="5081" instrument_node=""> Document WHC/21/44.COM/7C,</span></li><span data-dcnode-id="5079" instrument_node="">
</span><li data-dcnode-id="5063"><u data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">Recalling</span></u><span data-dcnode-id="5076" instrument_node=""> Decisions </span><strong data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">40 COM 7</span></strong><span data-dcnode-id="5073" instrument_node="">, </span><strong data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">41 COM 7</span></strong><span data-dcnode-id="5070" instrument_node="">, </span><strong data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">42 COM 7</span></strong><span data-dcnode-id="5067" instrument_node=""> and </span><strong data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">43 COM 7.2</span></strong><span data-dcnode-id="5064" instrument_node="">, adopted at its 40th (Istanbul/UNESCO, 2016), 41st (Krakow, 2017), 42nd (Manama, 2018) and 43rd (Baku, 2019) sessions respectively,</span></li><span data-dcnode-id="5062" instrument_node="">
</span><li data-dcnode-id="5058"><u data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">Takes note with satisfaction</span></u><span data-dcnode-id="5059" instrument_node=""> of the wide range of climate change-related activities undertaken by the World Heritage Centre, in collaboration with the Advisory Bodies;</span></li><span data-dcnode-id="5057" instrument_node="">
</span><li data-dcnode-id="5050"><u data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">Thanks</span></u><span data-dcnode-id="5054" instrument_node=""> the State Party of the Netherlands for having funded the project to update the 2007 Policy Document on the impacts of Climate Change on World Heritage properties, and </span><u data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">expresses its gratitude</span></u><span data-dcnode-id="5051" instrument_node=""> to all the experts and representatives of States Parties, of the World Heritage Centre and of the Advisory Bodies who contributed to the meetings of the Technical Advisory Group; </span></li><span data-dcnode-id="5049" instrument_node="">
</span><li data-dcnode-id="5045"><u data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">Takes note with appreciation</span></u><span data-dcnode-id="5046" instrument_node=""> that a wide diversity of stakeholders of the World Heritage Convention (States Parties, site managers, Advisory Bodies, World Heritage Centre and representatives of local communities, indigenous peoples, academics, NGOs and civil society) were able to contribute to the updating process through the online consultation launched by the World Heritage Centre;</span></li><span data-dcnode-id="5044" instrument_node="">
</span><li data-dcnode-id="5040"><u data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">Takes note</span></u><span data-dcnode-id="5041" instrument_node=""> of the new title proposed for the updated Policy Document to become “Policy Document for Climate Action for World Heritage”; </span></li><span data-dcnode-id="5039" instrument_node="">
</span><li data-dcnode-id="5020"><u data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">Endorses</span></u><span data-dcnode-id="5036" instrument_node=""> the draft "Policy Document on Climate Action for World Heritage”, as presented in Annex 1 of Document WHC/21/44.COM/7C, and </span><u data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">requests</span></u><span data-dcnode-id="5033" instrument_node=""> the World Heritage Centre, in consultation with the Advisory Bodies, to revise it by incorporating views expressed and amendments submitted during the extended 44th session and, as appropriate, to consult Committee members, especially concerning the following points:
</span><ol data-dcnode-id="5022"><span data-dcnode-id="5032" instrument_node="">
</span><li data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">the fundamental principle of common but differentiated responsibilities and respective capabilities (CBDR-RC), which is one of the basic pillars of United Nations Framework Convention on Climate Change (UNFCCC),</span></li><span data-dcnode-id="5029" instrument_node="">
</span><li data-dcnode-id="5027"><span data-dcnode-id="5028" instrument_node="">the alignment of climate change mitigation actions with the CBDR-RC and the Nationally Determined Contributions accepted under the UNFCCC and the Paris Agreement, except on an entirely voluntary basis,</span></li><span data-dcnode-id="5026" instrument_node="">
</span><li data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">the need for support and capacity-building assistance, as well as the encouragement of technology transfer and financing from developed to developing countries;</span></li><span data-dcnode-id="5023" instrument_node="">
</span></ol><span data-dcnode-id="5021" instrument_node="">
</span></li><span data-dcnode-id="5019" instrument_node="">
</span><li data-dcnode-id="5006"><u data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Recalls</span></u><span data-dcnode-id="5016" instrument_node=""> Decision </span><strong data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">41 COM 7</span></strong><span data-dcnode-id="5013" instrument_node=""> and </span><u data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">reiterates</span></u><span data-dcnode-id="5010" instrument_node=""> the importance of States Parties undertaking the most ambitious implementation of the Paris Agreement of the UNFCCC, and </span><u data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">strongly invites</span></u><span data-dcnode-id="5007" instrument_node=""> all States Parties to ratify the Paris Agreement at the earliest possible opportunity and to undertake actions to address Climate Change under the Paris Agreement consistent with their common but differentiated responsibilities and respective capabilities, in light of different national circumstances, that are fully consistent with their obligations within the World Heritage Convention to protect the Outstanding Universal Value (OUV) of all World Heritage properties;</span></li><span data-dcnode-id="5005" instrument_node="">
</span><li data-dcnode-id="5001"><u data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">Decides</span></u><span data-dcnode-id="5002" instrument_node=""> to transmit the draft "Policy Document on Climate Action for World Heritage”, following final revisions, for review and adoption at the 23rd session of the General Assembly of States Parties to the Convention in 2021; </span></li><span data-dcnode-id="5000" instrument_node="">
</span><li data-dcnode-id="4990"><u data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">Also requests</span></u><span data-dcnode-id="4997" instrument_node=""> the World Heritage Centre, jointly with the Advisory Bodies, once the "Policy Document on Climate Action for World Heritage” is adopted by the General Assembly of the States Parties and within the available resources, to elaborate proposals for specific changes to the </span><em data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="4994" instrument_node=""> that would be required to translate the principles of this Policy Document into actual operational procedures, and to develop education and capacity-building initiatives that would be needed to enable wide implementation of this Policy Document, and </span><u data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">calls on</span></u><span data-dcnode-id="4991" instrument_node=""> States Parties to contribute financially to this end; </span></li><span data-dcnode-id="4989" instrument_node="">
</span><li data-dcnode-id="4982"><u data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">Further requests</span></u><span data-dcnode-id="4986" instrument_node=""> the World Heritage Centre, in parallel with the processes outlined in Paragraph 10, to convene a panel of experts drawn from the ad-hoc Working Group, World Heritage Centre, the Advisory Bodies and other qualified experts in the field of climate science and heritage to meet by March 2022 and </span><u data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">also calls on</span></u><span data-dcnode-id="4983" instrument_node=""> State Parties to contribute financially to this end;</span></li><span data-dcnode-id="4981" instrument_node="">
</span><li data-dcnode-id="4974"><u data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">Requests furthermore</span></u><span data-dcnode-id="4978" instrument_node=""> the World Heritage Centre, jointly with the Advisory Bodies, and subject to available resources, to consider preparing a Guidance Document to facilitate effective implementation of, and support for, the actions, goals and targets of this Policy Document, which could include indicators and benchmarking tools for measuring and reporting progress towards achieving the World Heritage Climate Action Goals, and </span><u data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">further calls on</span></u><span data-dcnode-id="4975" instrument_node=""> States Parties to support this activity through extrabudgetary funding; </span></li><span data-dcnode-id="4973" instrument_node="">
</span><li data-dcnode-id="4969"><u data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">Encourages</span></u><span data-dcnode-id="4970" instrument_node=""> the States Parties, the World Heritage Centre and the Advisory Bodies to disseminate widely the "Policy Document on Climate Action for World Heritage”, once adopted, through appropriate means to the World Heritage community and the broader public, including in local languages, and to promote its implementation; </span></li><span data-dcnode-id="4968" instrument_node="">
</span><li data-dcnode-id="4964"><u data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">Recommends</span></u><span data-dcnode-id="4965" instrument_node=""> that the "Policy Document on Climate Action for World Heritage” be interpreted in the context of the UNFCCC, the Paris Agreement (2015) and the United Nations 2030 Agenda for sustainable development, and in conjunction with the Policy Document for the integration of a sustainable development perspective into the processes of the World Heritage Convention (2015); </span></li><span data-dcnode-id="4963" instrument_node="">
</span><li data-dcnode-id="4959"><u data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">Urges</span></u><span data-dcnode-id="4960" instrument_node=""> States Parties and all stakeholders of the Convention to urgently integrate climate change mitigation and adaptation actions in risk preparedness policies and action plans, in order to protect the OUV of all World Heritage properties, in line with the "Policy Document on Climate Action for World Heritage”; </span></li><span data-dcnode-id="4958" instrument_node="">
</span><li data-dcnode-id="4954"><u data-dcnode-id="4956"><span data-dcnode-id="4957" instrument_node="">Further recommends</span></u><span data-dcnode-id="4955" instrument_node=""> that World Heritage-related Category 2 Centres and UNESCO Chairs prioritize issues related to the implementation of the "Policy Document on Climate Action for World Heritage” within their capacity-building and research initiatives; </span></li><span data-dcnode-id="4953" instrument_node="">
</span><li data-dcnode-id="4949"><u data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">Finally requests</span></u><span data-dcnode-id="4950" instrument_node=""> the World Heritage Centre, in consultation with the Advisory Bodies, to present a progress report on the implementation status of the "Policy Document on Climate Action for World Heritage” at its 48th session, after four years of implementation.</span></li><span data-dcnode-id="4948" instrument_node="">
</span></ol><p data-dcnode-id="4946"></p><span data-dcnode-id="4945" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/7917"><span data-dcnode-id="4944" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="4942" instrument_node="">
</span></div><span data-dcnode-id="4940" instrument_node="">
</span></span><span data-dcnode-id="4938" instrument_node="">
</span></div><span data-dcnode-id="4936" instrument_node="">

</span><a aria-controls="collapsedecision7376" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="4926" data-toggle="collapse" href="#decision7376" id="ext-element-19" role="button"><span data-dcnode-id="4933" instrument_node="">

</span><div data-dcnode-id="4915"><strong data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">Title:</span></strong><span data-dcnode-id="4916" instrument_node=""> Update of the List of World Heritage in Danger (Removed Properties)</span></div><span data-dcnode-id="4914" instrument_node=""> </span><div data-dcnode-id="4910"><strong data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">Year:</span></strong><span data-dcnode-id="4911" instrument_node=""> 2019</span></div><span data-dcnode-id="4909" instrument_node="">
</span><p data-dcnode-id="4908"></p><p data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="4905" instrument_node="">
</span><ol data-dcnode-id="4867"><span data-dcnode-id="4904" instrument_node="">
</span><li data-dcnode-id="4900"><span data-dcnode-id="4902" style="text-decoration: underline;"><span data-dcnode-id="4903" instrument_node="">Having examined</span></span><span data-dcnode-id="4901" instrument_node=""> the state of conservation reports of properties inscribed on the List of World Heritage in Danger (WHC/19/43.COM/7A, WHC/19/43.COM/7A.Add, WHC/19/43.COM/7A.Add.2, WHC/19/43.COM/7A.Add.3 and WHC/19/43.COM/7A.Add.3.Corr),</span></li><span data-dcnode-id="4899" instrument_node="">
</span><li data-dcnode-id="4877"><span data-dcnode-id="4897" style="text-decoration: underline;"><span data-dcnode-id="4898" instrument_node="">Decides</span></span><span data-dcnode-id="4896" instrument_node=""> to </span><strong data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">remove</span></strong><span data-dcnode-id="4893" instrument_node=""> the following properties from the List of World Heritage in Danger:
</span><ul data-dcnode-id="4879"><span data-dcnode-id="4892" instrument_node="">
</span><li data-dcnode-id="4887"><span data-dcnode-id="4891" instrument_node="">Chile, Humberstone and Santa Laura Saltpeter Works (Decision </span><strong data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">43 COM 7A.49</span></strong><span data-dcnode-id="4888" instrument_node="">)</span></li><span data-dcnode-id="4886" instrument_node="">
</span><li data-dcnode-id="4881"><span data-dcnode-id="4885" instrument_node="">Palestine, Birthplace of Jesus: Church of the Nativity and the Pilgrimage Route, Bethlehem (Decision </span><strong data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">43 COM 7A.28</span></strong><span data-dcnode-id="4882" instrument_node="">)</span></li><span data-dcnode-id="4880" instrument_node="">
</span></ul><span data-dcnode-id="4878" instrument_node="">
</span></li><span data-dcnode-id="4876" instrument_node="">
</span><li data-dcnode-id="4869"><span data-dcnode-id="4874" style="text-decoration: underline;"><span data-dcnode-id="4875" instrument_node="">Recalls&nbsp;</span></span><span data-dcnode-id="4873" instrument_node="">that the inscription of a property on the List of World Heritage in Danger, aims to marshal international support to help the State Party effectively address the challenges faced by the property by engaging with the World Heritage Centre and the Advisory Bodies to develop a program of corrective measures to achieve the Desired state of conservation for the property as provided for under Paragraph 183 of the </span><em data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="4870" instrument_node="">.</span></li><span data-dcnode-id="4868" instrument_node="">
</span></ol><p data-dcnode-id="4866"></p><span data-dcnode-id="4865" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/7376"><span data-dcnode-id="4864" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="4862" instrument_node="">
