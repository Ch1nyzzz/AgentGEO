</span><a aria-controls="collapsedecision4406" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="1831" data-toggle="collapse" href="#decision4406" id="ext-element-34" role="button"><span data-dcnode-id="1838" instrument_node="">
</span><span data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">35COM 12E</span></span><span data-dcnode-id="1835" instrument_node="">
											Global state of conservation challenges of World Heritage properties 
												(2011)
											
											</span><span class="material-icons-sharp" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">expand_more</span></span><span data-dcnode-id="1832" instrument_node="">
</span></a><span data-dcnode-id="1830" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="1647" id="decision4406"><span data-dcnode-id="1829" instrument_node="">
</span><div data-dcnode-id="1825"><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Code:</span></strong><span data-dcnode-id="1826" instrument_node=""> 35COM 12E</span></div><span data-dcnode-id="1824" instrument_node="">
</span><div data-dcnode-id="1820"><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Title:</span></strong><span data-dcnode-id="1821" instrument_node=""> Global state of conservation challenges of World Heritage properties</span></div><span data-dcnode-id="1819" instrument_node=""> </span><div data-dcnode-id="1815"><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Year:</span></strong><span data-dcnode-id="1816" instrument_node=""> 2011</span></div><span data-dcnode-id="1814" instrument_node="">
</span><p data-dcnode-id="1813"></p><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1809" instrument_node="">1. </span><span data-dcnode-id="1807" style="text-decoration: underline;"><span data-dcnode-id="1808" instrument_node="">Having examined</span></span><span data-dcnode-id="1806" instrument_node=""> Document WHC-11/35.COM/INF.7C,</span><span data-dcnode-id="1804" style="text-decoration: underline;"><span data-dcnode-id="1805" instrument_node=""> </span></span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1801" instrument_node="">2. </span><span data-dcnode-id="1799" style="text-decoration: underline;"><span data-dcnode-id="1800" instrument_node="">Recalling</span></span><span data-dcnode-id="1798" instrument_node=""> Decision </span><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">32 COM 10</span></strong><span data-dcnode-id="1795" instrument_node=""> adopted at its 32nd session (Quebec City, 2008), Decision </span><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">33 COM 14A.2</span></strong><span data-dcnode-id="1792" instrument_node=""> adopted at its 33rd session (Seville, 2009), </span><strong data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">34 COM 12</span></strong><span data-dcnode-id="1789" instrument_node=""> adopted at its 34th session (Brasilia, 2010) and Resolution </span><strong data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">17 GA 9</span></strong><span data-dcnode-id="1786" instrument_node=""> adopted at the 17th General Assembly of States Parties (UNESCO Headquarters, 2009),</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1783" instrument_node="">3. </span><span data-dcnode-id="1781" style="text-decoration: underline;"><span data-dcnode-id="1782" instrument_node="">Expresses its appreciation</span></span><span data-dcnode-id="1780" instrument_node=""> to the States Parties of Australia and Senegal and the UNESCO World Heritage Centre for organising the expert meeting on global state of conservation challenges of World Heritage properties (Dakar, Senegal, 13-15 April 2011);</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1777" instrument_node="">4. </span><span data-dcnode-id="1775" style="text-decoration: underline;"><span data-dcnode-id="1776" instrument_node="">Notes</span></span><span data-dcnode-id="1774" instrument_node=""> the report provided by the participants at the above-mentioned expert meeting;</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1771" instrument_node="">5. </span><span data-dcnode-id="1769" style="text-decoration: underline;"><span data-dcnode-id="1770" instrument_node="">Invites</span></span><span data-dcnode-id="1768" instrument_node=""> contributions of relevant expertise and financial resources to assist States Parties implement decisions on the state of conservation of World Heritage properties;</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1765" instrument_node="">6. </span><span data-dcnode-id="1763" style="text-decoration: underline;"><span data-dcnode-id="1764" instrument_node="">Reiterates</span></span><span data-dcnode-id="1762" instrument_node=""> that nominations of properties for inscription on the World Heritage List must demonstrate Outstanding Universal Value in line with the criteria for inscription and comply with integrity/authenticity, protection and management requirements, as set out in the </span><em data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="1759" instrument_node="">;</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node="">7. </span><span data-dcnode-id="1754" style="text-decoration: underline;"><span data-dcnode-id="1755" instrument_node="">Requests</span></span><span data-dcnode-id="1753" instrument_node=""> the World Heritage Centre and the Advisory Bodies to develop guidance, for consideration at the 36th session of the World Heritage Committee, to clarify:</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749" style="padding-left: 30px;"><span data-dcnode-id="1750" instrument_node="">a)&nbsp;The uses, limits and documentation requirements for traditional management (paragraphs 108 and following),</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746" style="padding-left: 30px;"><span data-dcnode-id="1747" instrument_node="">b)&nbsp;The need for Environmental Impact Assessments/Heritage Impact Assessments of potential developments' impact on Outstanding Universal Value, the range of proposed activities with a likely impact on Outstanding Universal Value to be reported on and the documentation required by the World Heritage Centre (Paragraph 172), and</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743" style="padding-left: 30px;"><span data-dcnode-id="1744" instrument_node="">c)&nbsp;Buffer zones or other protection mechanisms, noting the recommendations contained in document WHC-08/32.COM/7.1;</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1741" instrument_node="">8.&nbsp;</span><span data-dcnode-id="1739" style="text-decoration: underline;"><span data-dcnode-id="1740" instrument_node="">Requests</span></span><span data-dcnode-id="1738" instrument_node=""> that aspects concerning partnerships should be dealt with after the report of the external auditor on PACT at the 18th General Assembly of States Parties;</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1735" instrument_node="">9.&nbsp;</span><span data-dcnode-id="1733" style="text-decoration: underline;"><span data-dcnode-id="1734" instrument_node="">Requests</span></span><span data-dcnode-id="1732" instrument_node=""> the World Heritage Centre and the Advisory Bodies to develop options to strengthen and improve the state of conservation reporting process, in particular&nbsp; to increase dialogue with States Parties about World Heritage properties facing challenges;</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1729" instrument_node="">10.&nbsp;</span><span data-dcnode-id="1727" style="text-decoration: underline;"><span data-dcnode-id="1728" instrument_node="">Also requests</span></span><span data-dcnode-id="1726" instrument_node=""> the World Heritage Centre to formally notify States Parties of the state of conservation reports on World Heritage properties on their territory which will be the subject of examination by the Committee at the session indicated;</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1723" instrument_node="">11.&nbsp;</span><span data-dcnode-id="1721" style="text-decoration: underline;"><span data-dcnode-id="1722" instrument_node="">Also requests</span></span><span data-dcnode-id="1720" instrument_node=""> the World Heritage Centre to report at the 36th session of the World Heritage Committee on possible ways to encourage United Nations recognition for the protectors of World Heritage properties in conflict and post conflict zones, including through the use of blue/green berets or other appropriate insignia, and </span><span data-dcnode-id="1718" style="text-decoration: underline;"><span data-dcnode-id="1719" instrument_node="">reminds</span></span><span data-dcnode-id="1717" instrument_node=""> States Parties to include details of Disaster Risk Reduction/Emergency Planning arrangements in their nomination dossiers and management plans;</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node="">12.&nbsp;</span><span data-dcnode-id="1712" style="text-decoration: underline;"><span data-dcnode-id="1713" instrument_node="">Further requests</span></span><span data-dcnode-id="1711" instrument_node=""> the World Heritage Centre, in collaboration with the Advisory Bodies, in addition to the presentation of state of conservation reports on individual properties, to prepare a thematic report on significant global and regional factors negatively impacting the Outstanding Universal Value of the properties, grouped according to the five categories of factors affecting the Outstanding Universal Value identified in the Periodic Report questionnaire, Section II, to ensure a greater coherence in the decision making on individual sites;</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">13.&nbsp;</span><span data-dcnode-id="1706" style="text-decoration: underline;"><span data-dcnode-id="1707" instrument_node="">Requests</span></span><span data-dcnode-id="1705" instrument_node=""> the World Heritage Centre and the Advisory Bodies to provide, in the state of conservation reports on individual properties, a link to an integrated online database compiling all relevant background information concerning the property (previous state of conservation reports and Committee decisions, desired state of conservation, corrective measures, International Assistance requests, etc.) necessary for well-informed decision-making, to be hosted on the World Heritage Centre's website;</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1702" instrument_node="">14.&nbsp;</span><span data-dcnode-id="1700" style="text-decoration: underline;"><span data-dcnode-id="1701" instrument_node="">Also requests</span></span><span data-dcnode-id="1699" instrument_node=""> the Advisory Bodies to develop a database of existing guidance on key factors negatively impacting on the Outstanding Universal Value of World Heritage properties and tools for best management practice;</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1696" instrument_node="">15.&nbsp;</span><span data-dcnode-id="1694" style="text-decoration: underline;"><span data-dcnode-id="1695" instrument_node="">Recalling</span></span><span data-dcnode-id="1693" instrument_node=""> that being a signatory to the </span><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="1690" instrument_node=""> entails certain responsibilities, including a requirement to follow the </span><em data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="1687" instrument_node="">, management of World Heritage properties according to the highest international standards, promotion of good governance and allocation of adequate funding for the protection of World Heritage properties, </span><span data-dcnode-id="1685" style="text-decoration: underline;"><span data-dcnode-id="1686" instrument_node="">encourages</span></span><span data-dcnode-id="1684" instrument_node=""> States Parties to:</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1677" style="padding-left: 30px;"><span data-dcnode-id="1681" instrument_node="">a) Develop adequate legislative frameworks to ensure compliance with the </span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="1678" instrument_node=""> and set up a collaborative framework between agencies for the conservation of properties, including agencies in charge of the follow up of other conventions and international agreements,</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674" style="padding-left: 30px;"><span data-dcnode-id="1675" instrument_node="">b) Source assistance and support beyond what is available under the UNESCO World Heritage Fund, noting that tools, methodology and guidance are available both internationally and nationally from the Advisory Bodies and the World Heritage Centre and additional support should be sought from other donors, NGOs and international organizations,</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671" style="padding-left: 30px;"><span data-dcnode-id="1672" instrument_node="">c) Be proactive in relation to development and conservation of World Heritage properties by conducting a Strategic Environmental Assessment (SEA) at the time of nomination to anticipate the impact of any potential development on the Outstanding Universal Value,</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668" style="padding-left: 30px;"><span data-dcnode-id="1669" instrument_node="">d) Ensure that EIA/HIA are conducted for development projects which could affect properties and that these specifically assess the impact on the Outstanding Universal Value of properties,</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665" style="padding-left: 30px;"><span data-dcnode-id="1666" instrument_node="">e) Involve indigenous peoples and local communities in decision making, monitoring and evaluation of the state of conservation of the properties and their Outstanding Universal Value and link the direct community benefits to protection outcomes,</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662" style="padding-left: 30px;"><span data-dcnode-id="1663" instrument_node="">f) Respect the rights of indigenous peoples when nominating, managing and reporting on World Heritage sites in indigenous peoples' territories;</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659" style="padding-left: 30px;"><span data-dcnode-id="1660" instrument_node="">g) Establish and promote horizontal cooperation and understanding among various institutions that have an impact on cultural and natural heritage, also including governmental institutions responsible for UNESCO programmes implementation on national level, economy, finance, regional development/ planning, tourism, social welfare as well as local authorities,</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1653" style="padding-left: 30px;"><span data-dcnode-id="1657" instrument_node="">h) Follow the Recommendation concerning the Protection, at National Level, of the Cultural and Natural Heritage, adopted simultaneously with the </span><em data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="1654" instrument_node="">, by the General Conference of UNESCO on 16 November 1972.</span></p><p data-dcnode-id="1652"></p><span data-dcnode-id="1651" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/4406"><span data-dcnode-id="1650" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="1648" instrument_node="">
</span></div><span data-dcnode-id="1646" instrument_node="">
</span></span><span data-dcnode-id="1644" instrument_node="">
</span></div><span data-dcnode-id="1642" instrument_node="">
</span><div class="list-counter mb-1" data-dcnode-id="1500" id="list-4239" style=""><span data-dcnode-id="1641" instrument_node="">
</span><span data-dcnode-id="1502"><span data-dcnode-id="1640" instrument_node="">
</span><a aria-controls="collapsedecision4239" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="1632" data-toggle="collapse" href="#decision4239" id="ext-element-35" role="button"><span data-dcnode-id="1639" instrument_node="">
</span><span data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">34COM 7C</span></span><span data-dcnode-id="1636" instrument_node="">
											Reflection on the trends of the state of conservation 
												(2010)
											
											</span><span class="material-icons-sharp" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">expand_more</span></span><span data-dcnode-id="1633" instrument_node="">
</span></a><span data-dcnode-id="1631" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="1504" id="decision4239"><span data-dcnode-id="1630" instrument_node="">
</span><div data-dcnode-id="1626"><strong data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Code:</span></strong><span data-dcnode-id="1627" instrument_node=""> 34COM 7C</span></div><span data-dcnode-id="1625" instrument_node="">
</span><div data-dcnode-id="1621"><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Title:</span></strong><span data-dcnode-id="1622" instrument_node=""> Reflection on the trends of the state of conservation</span></div><span data-dcnode-id="1620" instrument_node=""> </span><div data-dcnode-id="1616"><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Year:</span></strong><span data-dcnode-id="1617" instrument_node=""> 2010</span></div><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1614"></p><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">1. </span><span data-dcnode-id="1608" style="text-decoration: underline;"><span data-dcnode-id="1609" instrument_node="">Having examined</span></span><span data-dcnode-id="1607" instrument_node=""> Document WHC-10/34.COM/7C,</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1604" instrument_node="">2. </span><span data-dcnode-id="1602" style="text-decoration: underline;"><span data-dcnode-id="1603" instrument_node="">Recalling</span></span><span data-dcnode-id="1601" instrument_node=""> Decisions </span><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">32 COM 7B.129</span></strong><span data-dcnode-id="1598" instrument_node=""> and </span><strong data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">33 COM 7C</span></strong><span data-dcnode-id="1595" instrument_node="">, adopted at its 32nd (Quebec City, 2008) and 33rd (Seville, 2009) sessions respectively,</span></p><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1592" instrument_node="">3. </span><span data-dcnode-id="1590" style="text-decoration: underline;"><span data-dcnode-id="1591" instrument_node="">Welcomes</span></span><span data-dcnode-id="1589" instrument_node=""> the analytical summary of the perceived trends, changes and threats to the state of conservation of World Heritage properties over the past five years (2005-2009), as the basis for further reflection and more extensive analysis of this information;</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">4. </span><span data-dcnode-id="1584" style="text-decoration: underline;"><span data-dcnode-id="1585" instrument_node="">Considers</span></span><span data-dcnode-id="1583" instrument_node=""> that this work highlights the need for more systematic monitoring of threats and of how to identify and react to emerging trends;</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node="">5. </span><span data-dcnode-id="1578" style="text-decoration: underline;"><span data-dcnode-id="1579" instrument_node="">Suggests</span></span><span data-dcnode-id="1577" instrument_node=""> that data on the emergence of trends and on the underlying reasons for the emergence of trends could be helpful to States Parties, to the World Heritage Centre and to the Advisory Bodies;</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1574" instrument_node="">6. </span><span data-dcnode-id="1572" style="text-decoration: underline;"><span data-dcnode-id="1573" instrument_node="">Notes</span></span><span data-dcnode-id="1571" instrument_node=""> that the availability and application of satellite imagery and other remote sensing techniques are continually improving, and also </span><span data-dcnode-id="1569" style="text-decoration: underline;"><span data-dcnode-id="1570" instrument_node="">notes</span></span><span data-dcnode-id="1568" instrument_node=""> that such techniques can provide evidence over time to determine whether some impacts on World Heritage values continue to occur or are being addressed;</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1565" instrument_node="">7. </span><span data-dcnode-id="1563" style="text-decoration: underline;"><span data-dcnode-id="1564" instrument_node="">Requests</span></span><span data-dcnode-id="1562" instrument_node=""> that the Advisory Bodies, and in particular IUCN, work with the World Heritage Centre, the UNESCO Science Sector, and relevant remote sensing agencies, to examine the feasibility of using remote sensing to help assess the potential contribution that it could make to the monitoring of certain threats to the Outstanding Universal Value of properties;</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node="">8. Given the percentage of threats related to development and infrastructure projects and to high-rise buildings, </span><span data-dcnode-id="1557" style="text-decoration: underline;"><span data-dcnode-id="1558" instrument_node="">stresses</span></span><span data-dcnode-id="1556" instrument_node=""> the need for structured heritage impact assessments of major projects to be carried out at the earliest opportunity in order to assess the impact of potential projects on the Outstanding Universal Value of World Heritage properties;</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1553" instrument_node="">9. </span><span data-dcnode-id="1551" style="text-decoration: underline;"><span data-dcnode-id="1552" instrument_node="">Recalls</span></span><span data-dcnode-id="1550" instrument_node=""> the provisions of Paragraph 172 of the </span><em data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="1547" instrument_node=""> and that prompt information on potential development projects and their review for impact on Outstanding Universal Value is a key tool for ensuring the effective conservation of World Heritage properties and the credibility of the </span><em data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Convention</span></em><span data-dcnode-id="1544" instrument_node="">;</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1541" instrument_node="">10. </span><span data-dcnode-id="1539" style="text-decoration: underline;"><span data-dcnode-id="1540" instrument_node="">Taking into account</span></span><span data-dcnode-id="1538" instrument_node=""> the information provided in the introduction of Document WHC-10/34.COM/7B and specifically the impact of natural disasters affecting World Heritage properties, </span><span data-dcnode-id="1536" style="text-decoration: underline;"><span data-dcnode-id="1537" instrument_node="">notes</span></span><span data-dcnode-id="1535" instrument_node=""> the progress made in the implementation of the Strategy for Disaster Risk Reduction at World Heritage properties as indicated in Document WHC-10/34.COM/7.3, as well as the newly published Resource Manual on this subject;</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1532" instrument_node="">11. </span><span data-dcnode-id="1530" style="text-decoration: underline;"><span data-dcnode-id="1531" instrument_node="">Also notes</span></span><span data-dcnode-id="1529" instrument_node=""> that the World Heritage Centre and the Advisory Bodies have considered the approaches for the selection of properties for state of conservation reports and processes for preparing Desired State of Conservation Statements for the removal of properties from the List of World Heritage in Danger and </span><span data-dcnode-id="1527" style="text-decoration: underline;"><span data-dcnode-id="1528" instrument_node="">further notes</span></span><span data-dcnode-id="1526" instrument_node=""> that these will be subject to a further review at the next World Heritage Centre/Advisory Bodies meeting in September 2010;</span></p><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1523" instrument_node="">12. </span><span data-dcnode-id="1521" style="text-decoration: underline;"><span data-dcnode-id="1522" instrument_node="">Acknowledges</span></span><span data-dcnode-id="1520" instrument_node=""> the inclusion of links to illustrative material in the state of conservation reports which provide information on potential visual impact on the Outstanding Universal Value of a property and </span><span data-dcnode-id="1518" style="text-decoration: underline;"><span data-dcnode-id="1519" instrument_node="">encourages</span></span><span data-dcnode-id="1517" instrument_node=""> the States Parties to share their experiences concerning visual impact studies and simulations by providing to the Word Heritage Centre links to relevant information to be made available through the web-page;</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1514" instrument_node="">13. </span><span data-dcnode-id="1512" style="text-decoration: underline;"><span data-dcnode-id="1513" instrument_node="">Requests</span></span><span data-dcnode-id="1511" instrument_node=""> the World Heritage Centre and the Advisory Bodies to report back on criteria, thresholds and processes relevant to the initiation of state of conservation reports, the feasibility of improved utilization of remote sensing, and the preparation and review of Desired State of Conservation Statements for the removal of properties from the List of World Heritage in Danger, for examination by the World Heritage Committee at its 35th session in 2011.</span></p><p data-dcnode-id="1509"></p><span data-dcnode-id="1508" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/4239"><span data-dcnode-id="1507" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="1505" instrument_node="">
</span></div><span data-dcnode-id="1503" instrument_node="">
</span></span><span data-dcnode-id="1501" instrument_node="">
</span></div><span data-dcnode-id="1499" instrument_node="">
</span><div class="list-counter mb-1" data-dcnode-id="1297" id="list-1941" style=""><span data-dcnode-id="1498" instrument_node="">
</span><span data-dcnode-id="1299"><span data-dcnode-id="1497" instrument_node="">
</span><a aria-controls="collapsedecision1941" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="1489" data-toggle="collapse" href="#decision1941" id="ext-element-36" role="button"><span data-dcnode-id="1496" instrument_node="">
</span><span data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">33COM 7C</span></span><span data-dcnode-id="1493" instrument_node="">
											General Decision on the State of Conservation of World Heritage properties 
												(2009)
											
											</span><span class="material-icons-sharp" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">expand_more</span></span><span data-dcnode-id="1490" instrument_node="">
</span></a><span data-dcnode-id="1488" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="1301" id="decision1941"><span data-dcnode-id="1487" instrument_node="">
</span><div data-dcnode-id="1483"><strong data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Code:</span></strong><span data-dcnode-id="1484" instrument_node=""> 33COM 7C</span></div><span data-dcnode-id="1482" instrument_node="">
</span><div data-dcnode-id="1478"><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Title:</span></strong><span data-dcnode-id="1479" instrument_node=""> General Decision on the State of Conservation of World Heritage properties</span></div><span data-dcnode-id="1477" instrument_node=""> </span><div data-dcnode-id="1473"><strong data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Year:</span></strong><span data-dcnode-id="1474" instrument_node=""> 2009</span></div><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1471"></p><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1467" instrument_node="">1. </span><span data-dcnode-id="1465" style="text-decoration: underline;"><span data-dcnode-id="1466" instrument_node="">Having examined</span></span><span data-dcnode-id="1464" instrument_node=""> Documents </span><em data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">WHC-09/33.COM/7B </span></em><span data-dcnode-id="1461" instrument_node="">and </span><em data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">WHC-09/33.COM/7B.Add</span></em><span data-dcnode-id="1458" instrument_node="">,</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1455" instrument_node="">2. </span><span data-dcnode-id="1453" style="text-decoration: underline;"><span data-dcnode-id="1454" instrument_node="">Recalling</span></span><span data-dcnode-id="1452" instrument_node=""> Decision </span><strong data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">32 COM 7B.129</span></strong><span data-dcnode-id="1449" instrument_node="">, adopted at its 32nd session (Quebec City, 2008),</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1446" instrument_node="">3. </span><span data-dcnode-id="1444" style="text-decoration: underline;"><span data-dcnode-id="1445" instrument_node="">Takes note</span></span><span data-dcnode-id="1443" instrument_node=""> of the process being followed to consult State Parties to ensure the accuracy of the state of conservation reports during their preparation, as presented in the introduction of Document </span><em data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">WHC-09/33.COM/7B </span></em><span data-dcnode-id="1440" instrument_node="">and </span><span data-dcnode-id="1438" style="text-decoration: underline;"><span data-dcnode-id="1439" instrument_node="">requests</span></span><span data-dcnode-id="1437" instrument_node=""> the World Heritage Centre to make every effort to ensure that States Parties' input is included in these reports before they are distributed;</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1434" instrument_node="">4. </span><span data-dcnode-id="1432" style="text-decoration: underline;"><span data-dcnode-id="1433" instrument_node="">Recognizes</span></span><span data-dcnode-id="1431" instrument_node=""> the efforts on the inclusion of references in the Working Documents on State of Conservation to the image gallery of the web-pages of the World Heritage Centre and </span><span data-dcnode-id="1429" style="text-decoration: underline;"><span data-dcnode-id="1430" instrument_node="">encourages</span></span><span data-dcnode-id="1428" instrument_node=""> States Parties to provide the World Heritage Centre, whenever possible, with verified electronic illustrative material;</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1425" instrument_node="">5. </span><span data-dcnode-id="1423" style="text-decoration: underline;"><span data-dcnode-id="1424" instrument_node="">Considers</span></span><span data-dcnode-id="1422" instrument_node=""> that its request, in Decision </span><strong data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">32 COM 7B.129</span></strong><span data-dcnode-id="1419" instrument_node="">, to add a link to illustrative material also aimed at providing background information on cases indicating the potential of visual impact on the Outstanding Universal Value of a property and to make visual impact simulations provided by States Parties available to Members of the Word Heritage Committee;</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">6. </span><span data-dcnode-id="1414" style="text-decoration: underline;"><span data-dcnode-id="1415" instrument_node="">Encourages</span></span><span data-dcnode-id="1413" instrument_node=""> States Parties to provide electronic illustrations of proposed projects in their State of Conservation Reports and to make these available to the Members of the World Heritage Committee;</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1410" instrument_node="">7. </span><span data-dcnode-id="1408" style="text-decoration: underline;"><span data-dcnode-id="1409" instrument_node="">Acknowledging</span></span><span data-dcnode-id="1407" instrument_node=""> the increasing number of State of Conservation reports and that reviewing these is a key tool for ensuring the effective conservation and credibility of World Heritage properties,</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">8. </span><span data-dcnode-id="1402" style="text-decoration: underline;"><span data-dcnode-id="1403" instrument_node="">Noting</span></span><span data-dcnode-id="1401" instrument_node=""> the results of the analytical document on trends provided with Circular Letter CL/WHC-09/03 and the in-depth discussion that took place at the 32nd session of the World Heritage Committee,</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1398" instrument_node="">9. </span><span data-dcnode-id="1396" style="text-decoration: underline;"><span data-dcnode-id="1397" instrument_node="">Also noting</span></span><span data-dcnode-id="1395" instrument_node=""> the increasing number of natural disasters affecting World Heritage properties, </span><span data-dcnode-id="1393" style="text-decoration: underline;"><span data-dcnode-id="1394" instrument_node="">requests</span></span><span data-dcnode-id="1392" instrument_node=""> the World Heritage Centre and the Advisory Bodies to prepare a report on the progress made in the implementation of the Strategy for Disaster Risk Reduction at World Heritage properties and submit it for the examination by the Committee at its 34th session in 2010,</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1389" instrument_node="">10. </span><span data-dcnode-id="1387" style="text-decoration: underline;"><span data-dcnode-id="1388" instrument_node="">Also considers</span></span><span data-dcnode-id="1386" instrument_node=""> it desirable to receive from the World Heritage Centre a methodological framework for the processes of:</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382" style="padding-left: 30px;"><span data-dcnode-id="1383" instrument_node="">a) Initiating the consideration of a property in the State of Conservation reports,</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379" style="padding-left: 30px;"><span data-dcnode-id="1380" instrument_node="">b) Requesting a State Party progress or state of conservation report within a defined timeframe, and</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376" style="padding-left: 30px;"><span data-dcnode-id="1377" instrument_node="">c) Evaluating desired State of Conservation Statements submitted by State Parties;</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1374" instrument_node="">11. </span><span data-dcnode-id="1372" style="text-decoration: underline;"><span data-dcnode-id="1373" instrument_node="">Requests</span></span><span data-dcnode-id="1371" instrument_node=""> the World Heritage Centre to:</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367" style="padding-left: 30px;"><span data-dcnode-id="1368" instrument_node="">a) Prepare, in cooperation with the Advisory Bodies, information on criteria, thresholds and processes applied for the initiation of State of Conservation reports and review of Desired State of Conservation statements for discussion at the 34th session of the World Heritage Committee in 2010;</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364" style="padding-left: 30px;"><span data-dcnode-id="1365" instrument_node="">b) Also prepare, in consultation with the Chairperson of the World Heritage Committee, a summary of the trends, changes and threats based on an analytical summary of the state of conservation of World Heritage properties over 5 years for discussion at the 34th session of the World Heritage Committee in 2010, with a view to make recommendations for prioritizing management efforts in the context of the Global Strategy;</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1362" instrument_node="">12. </span><span data-dcnode-id="1360" style="text-decoration: underline;"><span data-dcnode-id="1361" instrument_node="">Further requests</span></span><span data-dcnode-id="1359" instrument_node=""> the World Heritage Centre and the Advisory Bodies, when preparing state of conservation reports, to distinguish between issues that impact or have the potential to impact on a site's Outstanding Universal Value from issues that may impact values that are not recognized as being of Outstanding Universal Value;</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1356" instrument_node="">13. </span><span data-dcnode-id="1354" style="text-decoration: underline;"><span data-dcnode-id="1355" instrument_node="">Notes</span></span><span data-dcnode-id="1353" instrument_node=""> that all reactive monitoring missions proposed in the draft decisions on State of Conservation of properties on the World Heritage List and the List of World Heritage in Danger are currently suggested to be joint missions of the World Heritage Centre and at least one Advisory Body, and </span><span data-dcnode-id="1351" style="text-decoration: underline;"><span data-dcnode-id="1352" instrument_node="">considers</span></span><span data-dcnode-id="1350" instrument_node=""> that this has the potential to increase the overall budgetary requirements for missions and human resources;</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1347" instrument_node="">14. </span><span data-dcnode-id="1345" style="text-decoration: underline;"><span data-dcnode-id="1346" instrument_node="">Requests</span></span><span data-dcnode-id="1344" instrument_node=""> the World Heritage Centre to introduce a section on proposed missions to the relevant State of Conservation reports which outlines the objectives of a proposed mission as well as the specific roles and tasks of all bodies involved;</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1341" instrument_node="">15. </span><span data-dcnode-id="1339" style="text-decoration: underline;"><span data-dcnode-id="1340" instrument_node="">Also notes</span></span><span data-dcnode-id="1338" instrument_node=""> the petition on the Role of Black Carbon in the endangering of World Heritage properties and </span><span data-dcnode-id="1336" style="text-decoration: underline;"><span data-dcnode-id="1337" instrument_node="">encourages</span></span><span data-dcnode-id="1335" instrument_node=""> all States Parties to exchange information on existing national policies, regulations and opportunities for immediate voluntary action to control the generation of black carbon that can affect World Heritage properties;</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1332" instrument_node="">16. </span><span data-dcnode-id="1330" style="text-decoration: underline;"><span data-dcnode-id="1331" instrument_node="">Also requests</span></span><span data-dcnode-id="1329" instrument_node=""> the World Heritage Centre and Advisory Bodies to adopt a consistent approach to reporting on the impact of climate change on World Heritage properties and to ensure that future decisions in this respect are based on the Committee's Strategy to assist States Parties to implement appropriate management responses to climate change;</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1326" instrument_node="">17. </span><span data-dcnode-id="1324" style="text-decoration: underline;"><span data-dcnode-id="1325" instrument_node="">Further noting</span></span><span data-dcnode-id="1323" instrument_node=""> the profusion of terms used to describe the spatial and functional relationships among World Heritage properties, their buffer zones and the areas around these properties, </span><span data-dcnode-id="1321" style="text-decoration: underline;"><span data-dcnode-id="1322" instrument_node="">requests</span></span><span data-dcnode-id="1320" instrument_node=""> the World Heritage Centre and the Advisory Bodies to develop a glossary of terms in this respect, as well as proposed revisions to the </span><em data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Operational Guidelines </span></em><span data-dcnode-id="1317" instrument_node="">regarding buffer zones, taking into account the results of the Expert Meeting on this issue for consideration by the World Heritage Committee at its 34th session in 2010;</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1314" instrument_node="">18. </span><span data-dcnode-id="1312" style="text-decoration: underline;"><span data-dcnode-id="1313" instrument_node="">Also encourages</span></span><span data-dcnode-id="1311" instrument_node=""> all States Parties to fully implement paragraph 172 of the </span><em data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Operational Guidelines </span></em><span data-dcnode-id="1308" instrument_node="">by informing the World Heritage Centre of restorations, constructions and other projects that may affect the Outstanding Universal Value of a property in their territory.</span></p><p data-dcnode-id="1306"></p><span data-dcnode-id="1305" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/1941"><span data-dcnode-id="1304" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="1302" instrument_node="">
</span></div><span data-dcnode-id="1300" instrument_node="">
</span></span><span data-dcnode-id="1298" instrument_node="">
</span></div><span data-dcnode-id="1296" instrument_node="">
</span><div class="list-counter mb-1" data-dcnode-id="1205" id="list-1736" style=""><span data-dcnode-id="1295" instrument_node="">
</span><span data-dcnode-id="1207"><span data-dcnode-id="1294" instrument_node="">
</span><a aria-controls="collapsedecision1736" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="1286" data-toggle="collapse" href="#decision1736" id="ext-element-37" role="button"><span data-dcnode-id="1293" instrument_node="">
</span><span data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">32COM 7B.129</span></span><span data-dcnode-id="1290" instrument_node="">

												(2008)
											
											</span><span class="material-icons-sharp" data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">expand_more</span></span><span data-dcnode-id="1287" instrument_node="">
</span></a><span data-dcnode-id="1285" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="1209" id="decision1736"><span data-dcnode-id="1284" instrument_node="">
</span><div data-dcnode-id="1280"><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Code:</span></strong><span data-dcnode-id="1281" instrument_node=""> 32COM 7B.129</span></div><span data-dcnode-id="1279" instrument_node="">
</span><div data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Title:</span></strong><span data-dcnode-id="1276" instrument_node=""> Trends in the State of Conservation of World Heritage Sites</span></div><span data-dcnode-id="1274" instrument_node=""> </span><div data-dcnode-id="1270"><strong data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Year:</span></strong><span data-dcnode-id="1271" instrument_node=""> 2008</span></div><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1268"></p><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1264" instrument_node="">1. </span><span data-dcnode-id="1262" style="text-decoration: underline;"><span data-dcnode-id="1263" instrument_node="">Having examined</span></span><span data-dcnode-id="1261" instrument_node=""> documents </span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">WHC-08/32.COM/7B, WHC-08/32.COM7B.Add </span></em><span data-dcnode-id="1258" instrument_node="">and </span><em data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">WHC-08/32.COM7B.Add2</span></em><span data-dcnode-id="1255" instrument_node="">,</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">2. </span><span data-dcnode-id="1250" style="text-decoration: underline;"><span data-dcnode-id="1251" instrument_node="">Recognizing</span></span><span data-dcnode-id="1249" instrument_node=""> that the state of conservation reports are an important tool for sustaining the World Heritage properties; and</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1246" instrument_node="">3. </span><span data-dcnode-id="1244" style="text-decoration: underline;"><span data-dcnode-id="1245" instrument_node="">Noting</span></span><span data-dcnode-id="1243" instrument_node=""> the discussion that took place at the 32nd session of the World Heritage Committee;</span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">4. </span><span data-dcnode-id="1238" style="text-decoration: underline;"><span data-dcnode-id="1239" instrument_node="">Requests</span></span><span data-dcnode-id="1237" instrument_node=""> the World Heritage Centre to:</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233" style="padding-left: 30px;"><span data-dcnode-id="1234" instrument_node="">a) prepare, after consultation with the Chairperson of the World Heritage Committee, an analytical summary of the state of conservation of the World Heritage discussed at the 32nd session (Québec City, 2008) identifying trends, by 1st November 2008, for distribution to the Committee members and discussion at the 33rd session in 2009;</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230" style="padding-left: 30px;"><span data-dcnode-id="1231" instrument_node="">b) identify issues emanating from the analytical summary, in consultation with the Advisory Bodies, to be discussed on relevant agenda items of the Committee, including the Reinforced Monitoring mechanism;</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227" style="padding-left: 30px;"><span data-dcnode-id="1228" instrument_node="">c) prepare a lexicon of terms and recommendations for their consistent application in state of conservation reports;</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224" style="padding-left: 30px;"><span data-dcnode-id="1225" instrument_node="">d) provide, where available, a printed Statement of Outstanding Universal Value, for properties on the List of World Heritage in Danger and those discussed for in-Danger listing;</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221" style="padding-left: 30px;"><span data-dcnode-id="1222" instrument_node="">e) add a link to illustrative material and relevant statements of Outstanding Universal Value, and attribute information to source and date;</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">5. </span><span data-dcnode-id="1217" style="text-decoration: underline;"><span data-dcnode-id="1218" instrument_node="">Also requests</span></span><span data-dcnode-id="1216" instrument_node=""> the World Heritage Centre to identify a mechanism for consultation with States Parties during the development of the State of Conservation reports to ensure their accuracy.</span></p><p data-dcnode-id="1214"></p><span data-dcnode-id="1213" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/1736"><span data-dcnode-id="1212" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="1210" instrument_node="">
</span></div><span data-dcnode-id="1208" instrument_node="">
</span></span><span data-dcnode-id="1206" instrument_node="">
</span></div><span data-dcnode-id="1204" instrument_node="">

</span><a aria-controls="collapsedecision5299" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="1194" data-toggle="collapse" href="#decision5299" id="ext-element-38" role="button"><span data-dcnode-id="1201" instrument_node="">

											FORMAT FOR THE SUBMISSION OF STATE OF CONSERVATION REPORTS BY THE STATES PARTIES 
												(2007)

</span><p data-dcnode-id="962"></p><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">The World Heritage Committee,</span></p><p data-dcnode-id="954"><span data-dcnode-id="959" instrument_node="">1. Having examined Document </span><strong data-dcnode-id="956"><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">WHC-05/29.COM/7B.Rev</span></em></strong><span data-dcnode-id="955" instrument_node="">,</span></p><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">2. Recalling Decision </span><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">7 EXT.COM 4B.1</span></strong><span data-dcnode-id="950" instrument_node="">, adopted at its 7th extraordinary session (UNESCO, 2004), which invited the Director of the World Heritage Centre, in consultation with the Advisory Bodies, to submit at its 29th session proposals on ways and means of optimizing the interrelation between the results of the periodic reporting cycles and the conclusions derived from the state of conservation reports – in particular in order to ensure consistency and a better conservation of the properties,</span></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">3. Noting that discussions have taken place in this regard at a meeting of the Advisory Bodies and the World Heritage Centre (February, 2005) and at a Workshop on “Management Effectiveness, Monitoring for World Heritage Value and Statutory Reporting” (May, 2005),</span></p><p data-dcnode-id="940"><span data-dcnode-id="946" instrument_node="">4. Highlights that there are fundamental differences between the two processes of periodic reporting and reactive monitoring, as indicated in the </span><em data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Operational</span></em><em data-dcnode-id="942"><span data-dcnode-id="943" instrument_node=""> Guidelines;</span></em><span data-dcnode-id="941" instrument_node="">;</span></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">5. Calls for better linkages between both processes in the future, for example, through the following mechanism:</span></p><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">a) the Advisory Bodies and the World Heritage Centre should carefully consider information provided in the periodic reports corresponding to the relevant States Parties, when preparing state of conservation reports -in particular, by using the information provided on threats to the properties to focus the attention of reactive monitoring;</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">b) States Parties should take into account the content and decisions of previous state of conservation reports when preparing their propertyspecific periodic reports; and, in particular, provide an update on threats highlighted through the reactive monitoring process and on the measures taken by the State Party to mitigate these threats; and</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">c) A database currently being developed by the World Heritage Centre on World Heritage properties should allow for cross-referencing between state of conservation and periodic reports to enhance consistency in reporting mechanisms and to ensure that follow-up action is taken as necessary;</span></p><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">6. Requests the World Heritage Centre and the Advisory Bodies to take this issue up at the forthcoming meetings leading to and during the “reflection year” for the periodic reporting process.</span></p><p data-dcnode-id="929"></p><span data-dcnode-id="928" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/353"><span data-dcnode-id="927" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="925" instrument_node="">

</span><div data-dcnode-id="903"><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Code:</span></strong><span data-dcnode-id="904" instrument_node=""> 29COM 7C</span></div><span data-dcnode-id="902" instrument_node="">
</span><div data-dcnode-id="898"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Title:</span></strong><span data-dcnode-id="899" instrument_node=""> General Issues</span></div><span data-dcnode-id="897" instrument_node=""> </span><div data-dcnode-id="893"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Year:</span></strong><span data-dcnode-id="894" instrument_node=""> 2005</span></div><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="891"></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="888" instrument_node="">1. Having examined Documents </span><strong data-dcnode-id="885"><em data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">WHC-05/29.COM/7A </span></em></strong><span data-dcnode-id="884" instrument_node="">and </span><strong data-dcnode-id="881"><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">WHC-</span></em></strong><strong data-dcnode-id="878"><em data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">05/29.COM/7B.Rev</span></em></strong><span data-dcnode-id="877" instrument_node="">, </span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">2. Wishing to motivate and assist State Parties to get properties removed from the List of World Heritage in Danger,</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">3. Encouraging greater international cooperation among States Parties in order to reduce the number of properties on the List of World Heritage in Danger,</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">4. Wishing to improve the consistency and effectiveness of state of conservation reports both with respect to properties on the World Heritage List and the List of World Heritage in Danger,</span></p><p data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">5. Reiterates that reports of missions to review the state of conservation of properties on the World Heritage List, in conformity with paragraph 173 of the </span><em data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="867" instrument_node="">, must include: </span></p><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">a) an indication of threats or significant improvement in the conservation of the property since the last report to the World Heritage Committee;</span></p><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">b) any follow-up to previous decisions of the World Heritage Committee to the state of conservation of the property; and</span></p><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">c) information on any threat or damage to or loss of outstanding universal value, integrity and/or authenticity for which the property was inscribed on the World Heritage List;</span></p><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">6. Emphasizes that whenever further action is needed, clear benchmarks are set indicating the corrective measures to be taken in order to achieve significant improvement of the conservation as well as a timeframe within which the benchmarks will have to be met;</span></p><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">7. Requests the full cooperation of States Parties, Advisory Bodies and the World Heritage Centre in the state of conservation reporting process;</span></p><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">8. Further requests that in addition to information about the amounts and purposes of international assistance of the World Heritage Fund received by a property, a state of conservation report should also indicate the amount of extra budgetary funds received or needed;</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">9. Decides to discuss further at its 30th session (Vilnius, 2006) the possibility of deferring the decision to inscribe new properties on the World Heritage List of a State Party that does not submit full reports requested by the Committee for two consecutive ordinary sessions of the Committee;</span></p><p data-dcnode-id="847"><span data-dcnode-id="851" instrument_node="">10. Decides, with respect to properties on the List of World Heritage in Danger, in accordance with Section IV.B of the </span><em data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="848" instrument_node="">:</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">a) to clearly identify the threats and dangers for which a property is to be inscribed on the List of World Heritage in Danger and how serious they are,</span></p><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">b) to set at the time of inscription on the List of World Heritage in Danger clear benchmarks indicating the corrective action to be taken to address the ascertained and potential dangers;</span></p><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">c) to set a timeframe within which the benchmarks will have to be met in order for a property to be removed from the List of World Heritage in Danger;</span></p><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">d) to request the World Heritage Centre and the Advisory Bodies for properties already on the List of World Heritage in Danger, for which at the time of inscription no benchmarks were set, to include in future reports regarding those sites benchmarks indicating the corrective action to be taken to address ascertained and potential dangers as well as a timeframe;</span></p><p data-dcnode-id="834"><span data-dcnode-id="838" instrument_node="">e) to request the Advisory Bodies to evaluate upon request of the State Party or of the Committee the impact of the ascertained and potential dangers on the outstanding universal value of World Heritage properties as set out in the Statement of outstanding universal value, referred to in paragraph 155 of the </span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="835" instrument_node="">; and</span></p><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">f) to request States Parties to submit an annual report on the progress towards meeting the benchmarks within the timeframe set with respect to their properties on the List of World Heritage in Danger;</span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">11. Also decides with respect to properties on the World Heritage List to explicitly discuss all state of conservation reports indicating non-compliance with Committee decisions, non-appliance of corrective measures or otherwise a lack of cooperation on the part of a State Party, as well as reports indicating difficulties encountered by a State Party in its efforts to conserve its sites (List A).</span></p><p data-dcnode-id="829"></p><span data-dcnode-id="828" instrument_node="">
</span><a class="btn btn-outline-secondary" data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/decisions/461"><span data-dcnode-id="827" instrument_node="">Read more about the decision</span></a><span data-dcnode-id="825" instrument_node="">

</span><div data-dcnode-id="798"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Title:</span></strong><span data-dcnode-id="799" instrument_node=""> General Decisions</span></div><span data-dcnode-id="797" instrument_node=""> </span><div data-dcnode-id="793"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Year:</span></strong><span data-dcnode-id="794" instrument_node=""> 2003</span></div><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="791"></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="787" instrument_node="">1. </span><u data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Requests</span></u><span data-dcnode-id="784" instrument_node=""> the Secretariat in consultation with the Advisory Bodies, to ensure that all properties included in the future state of conservation documents, are treated in compliance with the procedures set out in the </span><em data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="781" instrument_node=""> </span><em data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">for the implementation of World Heritage Convention</span></em><span data-dcnode-id="778" instrument_node=""> for reactive monitoring (paragraph 68, July 2002);&nbsp;</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">2. </span><u data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Requests</span></u><span data-dcnode-id="772" instrument_node=""> that reports of missions to review the state of conservation of World Heritage properties include, as appropriate:</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">(a) an indication of threats or significant improvement in the conservation of the property since the last report to the World Heritage Committee,</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">(b) any follow-up to previous decisions of the World Heritage Committee on the state of conservation of the property,</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">(c) information on any threat or damage to or loss of outstanding universal value, integrity and/or authenticity for which the property was inscribed on the World Heritage List;</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">3. </span><u data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Further requests</span></u><span data-dcnode-id="757" instrument_node=""> that the reports are categorized as follows:</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">(a) reports with recommended decisions which, in the judgment of the World Heritage Centre in consultation with the Advisory Bodies, require discussion by the World Heritage Committee,</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">(b) reports which, in the judgment of the World Heritage Centre in consultation with the Advisory Bodies, can be noted without discussion,</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Reports in category (b) will not be discussed unless a request is made to the Chairperson of the World Heritage Committee in advance of the discussion of this agenda item;</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">4. </span><u data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Invites</span></u><span data-dcnode-id="742" instrument_node=""> the World Heritage Centre to present all information on the state of conservation of properties inscribed on the World Heritage List in the following manner:</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">(a) the report on each property should start on a new page,</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">(b) the identification number of the property allocated at the time of its nomination should be used in the document,</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">(c) an index of all properties should also be included,</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">(d) the decisions should have a standard layout, draft recommendation, and should be concise and operational;</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">5. </span><u data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Reaffirms</span></u><span data-dcnode-id="724" instrument_node=""> that the deadline to receive reports by the World Heritage Centre from States Parties is 1 February of each year.</span></p><p data-dcnode-id="722"></p><span data-dcnode-id="721" instrument_node="">
