</span><span data-dcnode-id="3438"><span data-dcnode-id="3838" instrument_node="">
</span><a aria-controls="collapsedecision6940" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="3830" data-toggle="collapse" href="#decision6940" id="ext-element-24" role="button"><span data-dcnode-id="3837" instrument_node="">
</span><span data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">41COM 7</span></span><span data-dcnode-id="3834" instrument_node="">
											State of Conservation of the Properties Inscribed on the World Heritage List 
												(2017)
											
											</span><span class="material-icons-sharp" data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">expand_more</span></span><span data-dcnode-id="3831" instrument_node="">
</span></a><span data-dcnode-id="3829" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="3440" id="decision6940"><span data-dcnode-id="3828" instrument_node="">
</span><div data-dcnode-id="3824"><strong data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Code:</span></strong><span data-dcnode-id="3825" instrument_node=""> 41COM 7</span></div><span data-dcnode-id="3823" instrument_node="">
</span><div data-dcnode-id="3819"><strong data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Title:</span></strong><span data-dcnode-id="3820" instrument_node=""> State of Conservation of the Properties Inscribed on the World Heritage List</span></div><span data-dcnode-id="3818" instrument_node=""> </span><div data-dcnode-id="3814"><strong data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">Year:</span></strong><span data-dcnode-id="3815" instrument_node=""> 2017</span></div><span data-dcnode-id="3813" instrument_node="">
</span><p data-dcnode-id="3812"></p><p data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="3809" instrument_node="">
</span><ol data-dcnode-id="3446"><span data-dcnode-id="3808" instrument_node="">
</span><li data-dcnode-id="3804"><u data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">Having examined</span></u><span data-dcnode-id="3805" instrument_node=""> Documents WHC/17/41.COM/7, WHC/17/41.COM/7A, WHC/17/41.COM/7A.Add, WHC/17/41.COM/7A.Add.2, WHC/17/41.COM/7B and WHC/17/41.COM/7B.Add and WHC/17/41.COM/7B.Add.2,</span></li><span data-dcnode-id="3803" instrument_node="">
</span><li data-dcnode-id="3796"><u data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">Recalling</span></u><span data-dcnode-id="3800" instrument_node=""> Decision </span><strong data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">40 COM 7</span></strong><span data-dcnode-id="3797" instrument_node="">, adopted at its 40th session (Istanbul/UNESCO, 2016),</span></li><span data-dcnode-id="3795" instrument_node="">
</span><li data-dcnode-id="3781"><u data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">Thanks</span></u><span data-dcnode-id="3792" instrument_node=""> the State Party of Poland, Host Country of the 41st session of the World Heritage Committee (Krakow, 2017), for having organized the first World Heritage Site Managers Forum, as a capacity-building exercise aiming at increasing the understanding of the World Heritage decision-making process among site managers, in order to achieve a more effective protection of the Outstanding Universal Value (OUV), </span><u data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">takes note with appreciation</span></u><span data-dcnode-id="3789" instrument_node=""> of the World Heritage Site Managers’ Forum Statement and </span><u data-dcnode-id="3787"><span data-dcnode-id="3788" instrument_node="">encourages</span></u><span data-dcnode-id="3786" instrument_node=""> the future Host Countries to continue this initiative and organize World Heritage Site Managers Forums in conjunction with the World Heritage Committee session;</span><br data-dcnode-id="3785"><br data-dcnode-id="3784"><strong data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Statutory matters related to Reactive Monitoring </span></strong></li><span data-dcnode-id="3780" instrument_node="">
</span><li data-dcnode-id="3776"><u data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Takes note</span></u><span data-dcnode-id="3777" instrument_node=""> of the practices of the Secretariat to address mass campaigns on state of conservation issues;</span></li><span data-dcnode-id="3775" instrument_node="">
</span><li data-dcnode-id="3758"><u data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">Recalling</span></u><span data-dcnode-id="3772" instrument_node=""> the importance of Paragraph 172 of the </span><em data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="3769" instrument_node=""> and its adequate implementation, </span><u data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">further recalls</span></u><span data-dcnode-id="3766" instrument_node=""> Decision </span><strong data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">40&nbsp;COM&nbsp;7</span></strong><span data-dcnode-id="3763" instrument_node="">, which requests the World Heritage Centre, in cooperation with the Advisory Bodies to evaluate the effectiveness of the Reactive Monitoring including procedures and case studies and to present a preliminary report for the consideration by the World Heritage Committee at its 42nd session in 2018, if funds are available; </span><br data-dcnode-id="3762"><br data-dcnode-id="3761"><strong data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Emergency situations resulting from conflicts </span></strong></li><span data-dcnode-id="3757" instrument_node="">
</span><li data-dcnode-id="3750"><u data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">Deplores</span></u><span data-dcnode-id="3754" instrument_node=""> the conflict situation prevailing in several countries, the loss of human life as well as the degradation of humanitarian conditions and </span><u data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">expresses its utmost concern</span></u><span data-dcnode-id="3751" instrument_node=""> at the damage sustained and the threats facing cultural and natural heritage in general;</span></li><span data-dcnode-id="3749" instrument_node="">
</span><li data-dcnode-id="3745"><u data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Urges</span></u><span data-dcnode-id="3746" instrument_node=""> all parties associated with conflicts to refrain from any action that would cause further damage to cultural and natural heritage and to fulfill their obligations under international law by taking all possible measures to protect such heritage, in particular the safeguarding of World Heritage properties and the sites included in the Tentative List;</span></li><span data-dcnode-id="3744" instrument_node="">
</span><li data-dcnode-id="3740"><u data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">Also urges</span></u><span data-dcnode-id="3741" instrument_node=""> States Parties to adopt measures against using World Heritage properties for military purposes;</span></li><span data-dcnode-id="3739" instrument_node="">
</span><li data-dcnode-id="3732"><u data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Takes note</span></u><span data-dcnode-id="3736" instrument_node=""> of the progress made by the World Heritage Centre and the Advisory Bodies to launch a reflection on a post-conflict recovery strategy, and of the support extended so far through technical assistance, capacity-building, and exchange of best practices in this regard, and </span><u data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">recommends</span></u><span data-dcnode-id="3733" instrument_node=""> that further support for threatened or damaged World Heritage properties be pursued;</span></li><span data-dcnode-id="3731" instrument_node="">
</span><li data-dcnode-id="3724"><u data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">Notes with concern</span></u><span data-dcnode-id="3728" instrument_node=""> that the conflict situation in several countries in the world has increased considerably the workload of the World Heritage Centre staff, and that an adequate implementation of the Action Plans for the Emergency Safeguarding of Cultural Heritage in Mali, Syria, Iraq, Libya and Yemen requires additional financial and human resources at the World Heritage Centre and in the UNESCO field offices; </span><u data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">also notes</span></u><span data-dcnode-id="3725" instrument_node=""> the increased demands on the resources of the Advisory Bodies;</span></li><span data-dcnode-id="3723" instrument_node="">
</span><li data-dcnode-id="3719"><u data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Calls on</span></u><span data-dcnode-id="3720" instrument_node=""> the international community to provide financial support for the implementation of the UNESCO Action Plans for the Emergency Safeguarding of Cultural Heritage in Syria, Iraq, Libya and Yemen, including for additional human resources at the World Heritage Centre and in the UNESCO field offices;</span></li><span data-dcnode-id="3718" instrument_node="">
</span><li data-dcnode-id="3714"><u data-dcnode-id="3716"><span data-dcnode-id="3717" instrument_node="">Also expresses its utmost concern</span></u><span data-dcnode-id="3715" instrument_node=""> about the impacts of conflicts causing an escalation of the already severe poaching crisis, as armed groups are financing their activities through illegal wildlife trade, which is having a severe impact on African wildlife, and uncontrolled development, threatening the very survival of species and the Outstanding Universal Value (OUV) of natural World Heritage properties;</span></li><span data-dcnode-id="3713" instrument_node="">
</span><li data-dcnode-id="3703"><u data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">Launches an appeal</span></u><span data-dcnode-id="3710" instrument_node=""> to all Member States of UNESCO to cooperate in the fight against the illicit trafficking of cultural heritage objects (UNESCO 1970 Convention) and illegal wildlife trade, including through the implementation of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES), and to pursue the implementation of the United Nations Security Council Resolutions regarding cultural heritage protection in conflict areas, especially Resolution 2199 and 2347;</span><br data-dcnode-id="3709"><br data-dcnode-id="3708"><strong data-dcnode-id="3705"><span data-dcnode-id="3707" instrument_node="">Other conservation issues</span><br data-dcnode-id="3706"></strong><span data-dcnode-id="3704" instrument_node="">Reconstruction</span></li><span data-dcnode-id="3702" instrument_node="">
</span><li data-dcnode-id="3692"><u data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">Noting</span></u><span data-dcnode-id="3699" instrument_node=""> the continued need to address the issue of reconstruction in World Heritage properties following conflicts or disasters, </span><u data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">expresses its satisfaction</span></u><span data-dcnode-id="3696" instrument_node=""> that several international meetings have taken place or are being planned on recovery at large, and reconstruction in particular, and </span><u data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">welcomes</span></u><span data-dcnode-id="3693" instrument_node=""> the offer of the Government of Poland to host an international conference on Reconstruction to provide guidelines to the World Heritage Committee to be held in Warsaw in March 2018;</span></li><span data-dcnode-id="3691" instrument_node="">
</span><li data-dcnode-id="3687"><u data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Encourages</span></u><span data-dcnode-id="3688" instrument_node=""> the World Heritage Centre and the Advisory Bodies to continue, with all relevant stakeholders, the reflection on reconstruction within World Heritage properties as a complex multi-disciplinary process, towards developing new guidance to reflect the multi-faceted challenges that reconstruction brings, its social and economic context, the short- and long-term needs of properties, and the idea of reconstruction as a process that should be undertaken within the framework of the Outstanding Universal Value (OUV) of the properties;</span></li><span data-dcnode-id="3686" instrument_node="">
</span><li data-dcnode-id="3682"><u data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">Urges</span></u><span data-dcnode-id="3683" instrument_node=""> States Parties to include risk mitigation measures in the management plans of World Heritage properties to address the potential effects of conflicts or disasters on their integrity;</span></li><span data-dcnode-id="3681" instrument_node="">
</span><li data-dcnode-id="3677"><u data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">Also encourages</span></u><span data-dcnode-id="3678" instrument_node=""> the inclusion of capacity-building initiatives in the framework of recovery plans;</span></li><span data-dcnode-id="3676" instrument_node="">
</span><li data-dcnode-id="3669"><u data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Requests</span></u><span data-dcnode-id="3673" instrument_node=""> the States Parties involved in reconstruction projects to maintain dialogue and close consultation and cooperation with the World Heritage Centre and the Advisory Bodies;</span><br data-dcnode-id="3672"><br data-dcnode-id="3671"><span data-dcnode-id="3670" instrument_node="">Climate change</span></li><span data-dcnode-id="3668" instrument_node="">
</span><li data-dcnode-id="3658"><u data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">Recalls</span></u><span data-dcnode-id="3665" instrument_node=""> its Decision </span><strong data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">40 COM 7</span></strong><span data-dcnode-id="3662" instrument_node=""> in relation to Climate Change, and </span><u data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">requests</span></u><span data-dcnode-id="3659" instrument_node=""> the World Heritage Centre and the Advisory Bodies to pursue the implementation of this Decision as a priority, within available resources;</span></li><span data-dcnode-id="3657" instrument_node="">
</span><li data-dcnode-id="3653"><u data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Expresses its utmost concern</span></u><span data-dcnode-id="3654" instrument_node=""> regarding the reported serious impacts from coral bleaching that have affected World Heritage properties in 2016-17 and that the majority of World Heritage Coral Reefs are expected to be seriously impacted by Climate Change;</span></li><span data-dcnode-id="3652" instrument_node="">
</span><li data-dcnode-id="3642"><u data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">Noting</span></u><span data-dcnode-id="3649" instrument_node=""> that the World Heritage Centre, in consultation with IUCN, has initiated a scientific assessment by independent experts to better understand the impacts of Climate Change on coral reef World Heritage properties, </span><u data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">also requests</span></u><span data-dcnode-id="3646" instrument_node=""> the World Heritage Centre and IUCN, as resources allow, to complete this assessment as soon as possible, and to ensure its findings are communicated effectively, and </span><u data-dcnode-id="3644"><span data-dcnode-id="3645" instrument_node="">further requests</span></u><span data-dcnode-id="3643" instrument_node=""> the World Heritage Centre and Advisory Bodies to further study the current and potential impacts of Climate Change on the OUV of World Heritage properties;</span></li><span data-dcnode-id="3641" instrument_node="">
</span><li data-dcnode-id="3631"><u data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Reiterates</span></u><span data-dcnode-id="3638" instrument_node=""> the importance of States Parties undertaking the most ambitious implementation of the Paris Agreement of the United Nations Framework Convention on Climate Change (UNFCCC) by “holding the increase in the global average temperature to well below 2°C above pre-industrial levels and by pursuing efforts to limit the global average temperature increase to 1.5°C above pre-industrial levels, recognizing that this would significantly reduce the risks and impacts of climate change” and </span><u data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">strongly invites</span></u><span data-dcnode-id="3635" instrument_node=""> all States Parties to ratify the Paris Agreement at the earliest possible opportunity and to undertake actions to address Climate Change under the Paris Agreement consistent with their common but differentiated responsibilities and respective capabilities, in the light of different national circumstances, that are fully consistent with their obligations within the </span><em data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="3632" instrument_node=""> to protect the OUV of all World Heritage properties;</span></li><span data-dcnode-id="3630" instrument_node="">
</span><li data-dcnode-id="3623"><u data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Takes note with satisfaction</span></u><span data-dcnode-id="3627" instrument_node=""> of the updated UNESCO Strategy for Action on Climate Change, approved by the UNESCO Executive Board at its 201st session in April 2017 (201 EX/Decision 5.I.B), and </span><u data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">invites</span></u><span data-dcnode-id="3624" instrument_node=""> all States Parties to engage fully with the World Heritage Centre and the Advisory Bodies, for its effective implementation;</span></li><span data-dcnode-id="3622" instrument_node="">
</span><li data-dcnode-id="3618"><u data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">Also recalls</span></u><span data-dcnode-id="3619" instrument_node=""> the need for all States Parties to continue, and where necessary to strengthen all efforts to build resilience of World Heritage properties to Climate Change, including by further reducing to the greatest extent possible all other pressures and threats, and by developing and implementing climate adaptation strategies for properties at risk of Climate Change impacts;</span></li><span data-dcnode-id="3617" instrument_node="">
</span><li data-dcnode-id="3607"><u data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Requests furthermore</span></u><span data-dcnode-id="3614" instrument_node=""> the World Heritage Centre and the Advisory Bodies to report on progress in relation to action on World Heritage and Climate Change, and to present, subject to available time and resources, a proposed update to the “Policy Document on the Impacts of Climate Change on World Heritage Properties”, for possible consideration by the World Heritage Committee at its 42nd session in 2018, and </span><u data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">notes with appreciation</span></u><span data-dcnode-id="3611" instrument_node=""> the willingness of civil society groups to engage in this process;</span><br data-dcnode-id="3610"><br data-dcnode-id="3609"><span data-dcnode-id="3608" instrument_node="">Urban pressure</span></li><span data-dcnode-id="3606" instrument_node="">
</span><li data-dcnode-id="3602"><u data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">Noting</span></u><span data-dcnode-id="3603" instrument_node=""> that the increasing urban pressure in and around numerous World Heritage properties has become a major threat to their Outstanding Universal Value (OUV),</span></li><span data-dcnode-id="3601" instrument_node="">
</span><li data-dcnode-id="3597"><u data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Taking note</span></u><span data-dcnode-id="3598" instrument_node=""> of the outcomes of the Habitat III Conference and notably the adoption of the “New Urban Agenda”,</span></li><span data-dcnode-id="3596" instrument_node="">
</span><li data-dcnode-id="3589"><u data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">Also taking note</span></u><span data-dcnode-id="3593" instrument_node=""> of the necessity to pursue the application of the Historic Urban Landscape approach towards a more effective and durable conservation and management of the urban heritage inscribed on the World Heritage List, and </span><u data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">requests</span></u><span data-dcnode-id="3590" instrument_node=""> the States Parties to fully consider the 2011 UNESCO Recommendation on Historic Urban Landscape (HUL)&nbsp;;</span></li><span data-dcnode-id="3588" instrument_node="">
</span><li data-dcnode-id="3581"><u data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">Calls on</span></u><span data-dcnode-id="3585" instrument_node=""> States Parties to take into account the recommendations of the Global Report on Culture for Sustainable Urban Development and take the necessary measures to integrate the role of culture in sustainable urban development in order to achieve SDG&nbsp;11&nbsp;–&nbsp;Target 4;</span><br data-dcnode-id="3584"><br data-dcnode-id="3583"><span data-dcnode-id="3582" instrument_node="">Vandalism</span></li><span data-dcnode-id="3580" instrument_node="">
</span><li data-dcnode-id="3570"><u data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Notes with concern</span></u><span data-dcnode-id="3577" instrument_node=""> increasing vandalism at World Heritage properties and </span><u data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">encourages</span></u><span data-dcnode-id="3574" instrument_node=""> States Parties to improve monitoring and security measures as well as awareness raising on the detrimental effects of vandalism, and to consider introducing creative solutions to allow visitors to express themselves without leaving permanent marks or damage;</span><br data-dcnode-id="3573"><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">Disasters Risk Reduction</span></li><span data-dcnode-id="3569" instrument_node="">
</span><li data-dcnode-id="3565"><u data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">Welcomes</span></u><span data-dcnode-id="3566" instrument_node=""> the Action Plan for the implementation of the Strategy for reinforcing UNESCO’s action for the protection of culture and the promotion of cultural pluralism in the event of armed conflict (hereafter the Strategy), adopted by the UNESCO General Conference in 2015 (38 C/Res.48), whose implementation would be of great importance for the protection of World Heritage in situations of armed conflicts and disasters associated with natural and human-made hazards;</span></li><span data-dcnode-id="3564" instrument_node="">
</span><li data-dcnode-id="3557"><u data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">Encourages</span></u><span data-dcnode-id="3561" instrument_node=""> States Parties to provide support to the implementation of the Strategy and its Action Plan, including through contributions to the Heritage Emergency Fund, as well as in kind contributions and advocacy at the highest international levels for the integration of a concern for culture in key international humanitarian, development, and peacekeeping operations;</span><br data-dcnode-id="3560"><br data-dcnode-id="3559"><span data-dcnode-id="3558" instrument_node="">Invasive species</span></li><span data-dcnode-id="3556" instrument_node="">
</span><li data-dcnode-id="3549"><u data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">Recalling</span></u><span data-dcnode-id="3553" instrument_node=""> its Decision </span><strong data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">39 COM 7</span></strong><span data-dcnode-id="3550" instrument_node="">, adopted at its 39th session (Bonn, 2015),</span></li><span data-dcnode-id="3548" instrument_node="">
</span><li data-dcnode-id="3538"><u data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Noting with concern</span></u><span data-dcnode-id="3545" instrument_node=""> the continued threat posed by invasive alien species on natural World Heritage properties, </span><u data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">strongly encourages</span></u><span data-dcnode-id="3542" instrument_node=""> the States Parties to develop adequately resourced invasive alien species strategies that emphasize prevention and early warning and rapid response in World Heritage properties;</span><br data-dcnode-id="3541"><br data-dcnode-id="3540"><span data-dcnode-id="3539" instrument_node="">Illegal trade of wildlife species</span></li><span data-dcnode-id="3537" instrument_node="">
</span><li data-dcnode-id="3527"><u data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">Reiterates its utmost concern</span></u><span data-dcnode-id="3534" instrument_node=""> about the continued impacts of poaching and illegal logging on World Heritage properties driven primarily by the illegal trade of wildlife species and its products, and </span><u data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">requests</span></u><span data-dcnode-id="3531" instrument_node=""> the World Heritage Centre and IUCN to take action, as resources permit, to strengthen the collaboration between the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES) and the </span><em data-dcnode-id="3529"><span data-dcnode-id="3530" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="3528" instrument_node="">;</span></li><span data-dcnode-id="3526" instrument_node="">
</span><li data-dcnode-id="3519"><u data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">Reiterates its appeal</span></u><span data-dcnode-id="3523" instrument_node=""> to all Member States of UNESCO to cooperate in the fight against the illicit trade in wildlife and its products, including through the implementation of the CITES, and with the full engagement of transit and destination countries;</span><br data-dcnode-id="3522"><br data-dcnode-id="3521"><span data-dcnode-id="3520" instrument_node="">Integrated approaches for the conservation of natural and cultural heritage</span></li><span data-dcnode-id="3518" instrument_node="">
</span><li data-dcnode-id="3508"><u data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">Recalling</span></u><span data-dcnode-id="3515" instrument_node=""> that the </span><em data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="3512" instrument_node=""> explicitly links the concepts of cultural and natural heritage, </span><u data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">highlights</span></u><span data-dcnode-id="3509" instrument_node=""> the importance of promoting integrated approaches that strengthen holistic governance, improve conservation outcomes and contribute to sustainable development;</span></li><span data-dcnode-id="3507" instrument_node="">
</span><li data-dcnode-id="3493"><u data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">Notes with appreciation</span></u><span data-dcnode-id="3504" instrument_node=""> the growing interest and efforts by the States Parties and heritage practitioners to develop and apply integrated approaches to conservation of natural and cultural heritage, and </span><u data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">encourages</span></u><span data-dcnode-id="3501" instrument_node=""> the States Parties, the World Heritage Centre and the Advisory Bodies, in cooperation with universities and other relevant actors, to continue and expand these efforts, in accordance with the Policy Document for the integration of a Sustainable Development Perspective into the Processes of the </span><em data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Convention</span></em><span data-dcnode-id="3498" instrument_node=""> (2015);</span><br data-dcnode-id="3497"><br data-dcnode-id="3496"><strong data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">List of World Heritage in Danger</span></strong></li><span data-dcnode-id="3492" instrument_node="">
</span><li data-dcnode-id="3484"><u data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Reiterates its request</span></u><span data-dcnode-id="3489" instrument_node=""> to the World Heritage Centre, in consultation with the Advisory Bodies and States Parties, to promote better understanding of the implications and benefits of properties being inscribed on the List of World Heritage in Danger, and to develop appropriate information material in this regard with a view to overcome the negative perceptions of the List of World Heritage in Danger. The information material should highlight the importance of the protection of the Outstanding Universal Value;</span><br data-dcnode-id="3488"><br data-dcnode-id="3487"><strong data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Other issues</span></strong></li><span data-dcnode-id="3483" instrument_node="">
</span><li data-dcnode-id="3476"><u data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Takes note with appreciation</span></u><span data-dcnode-id="3480" instrument_node=""> of the Chairperson of the 41st session of the World Heritage Committee’s initiative on structured dialogue with civil society and </span><u data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">encourages</span></u><span data-dcnode-id="3477" instrument_node=""> States Parties and civil society organizations to continue exploring possibilities how civil society can further contribute to enhanced conservation of heritage on the site and national level and provide relevant input to the heritage related debate at the global level;</span></li><span data-dcnode-id="3475" instrument_node="">
</span><li data-dcnode-id="3462"><u data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Notes</span></u><span data-dcnode-id="3472" instrument_node="">, in conformity with Resolution </span><strong data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">20 GA 13</span></strong><span data-dcnode-id="3469" instrument_node=""> of the General Assembly of the </span><em data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">World Heritage Convention</span></em><span data-dcnode-id="3466" instrument_node=""> and the Decision </span><strong data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">39 COM 11</span></strong><span data-dcnode-id="3463" instrument_node=""> (Bonn, 2015) of the World Heritage Committee, the establishment of the International Indigenous Peoples Forum on World Heritage as an important reflection platform on the involvement of Indigenous Peoples in the identification, conservation and management of World Heritage properties, with a particular focus on the nomination process.</span></li><span data-dcnode-id="3461" instrument_node="">

											State of Conservation of World Heritage Properties 
												(2016)
											
											</span><span class="material-icons-sharp" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">expand_more</span></span><span data-dcnode-id="3426" instrument_node="">

</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="3151" id="decision6817"><span data-dcnode-id="3423" instrument_node="">
</span><div data-dcnode-id="3419"><strong data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">Code:</span></strong><span data-dcnode-id="3420" instrument_node=""> 40COM 7</span></div><span data-dcnode-id="3418" instrument_node="">
</span><div data-dcnode-id="3414"><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Title:</span></strong><span data-dcnode-id="3415" instrument_node=""> State of Conservation of World Heritage Properties</span></div><span data-dcnode-id="3413" instrument_node=""> </span><div data-dcnode-id="3409"><strong data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">Year:</span></strong><span data-dcnode-id="3410" instrument_node=""> 2016</span></div><span data-dcnode-id="3408" instrument_node="">
</span><p data-dcnode-id="3407"></p><p data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">The World Heritage Committee,</span></p><span data-dcnode-id="3404" instrument_node="">
</span><ol data-dcnode-id="3157"><span data-dcnode-id="3403" instrument_node="">
</span><li data-dcnode-id="3399"><u data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">Having examined</span></u><span data-dcnode-id="3400" instrument_node=""> Documents WHC/16/40.COM/7, WHC/16/40.COM/7A, WHC/16/40.COM/7A.Add, WHC/16/40.COM/7A.Add.2, WHC/16/40.COM/7B, WHC/16/40.COM/7B.Add and WHC/16/40.COM/7B.Add.2,</span></li><span data-dcnode-id="3398" instrument_node="">
</span><li data-dcnode-id="3387"><u data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Recalling</span></u><span data-dcnode-id="3395" instrument_node=""> Decision </span><strong data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">39 COM 7</span></strong><span data-dcnode-id="3392" instrument_node="">, adopted at its 39th session (Bonn, 2015),</span><br data-dcnode-id="3391"><br data-dcnode-id="3390"><strong data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">Emergency situation resulting from conflicts</span></strong></li><span data-dcnode-id="3386" instrument_node="">
</span><li data-dcnode-id="3379"><u data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Deplores</span></u><span data-dcnode-id="3383" instrument_node=""> the conflict situation prevailing in several countries, the loss of human life as well as the degradation of humanitarian conditions and </span><u data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">expresses its utmost concern</span></u><span data-dcnode-id="3380" instrument_node=""> at the damage sustained and the threats facing cultural and natural heritage in general;</span></li><span data-dcnode-id="3378" instrument_node="">
</span><li data-dcnode-id="3371"><u data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Urges</span></u><span data-dcnode-id="3375" instrument_node=""> the States Parties to ratify international instruments such as the Convention for the Protection of Cultural Property in the Event of Armed Conflict and </span><u data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">implores</span></u><span data-dcnode-id="3372" instrument_node=""> States Parties associated with conflicts to refrain from any action that would cause further damage to cultural and natural heritage and to fulfil their obligations under international law by taking all possible measures to protect such heritage, in particular the safeguarding of World Heritage properties and the sites included in the Tentative List;</span></li><span data-dcnode-id="3370" instrument_node="">
</span><li data-dcnode-id="3366"><u data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">Also urges</span></u><span data-dcnode-id="3367" instrument_node=""> the States Parties to adopt measures that oppose World Heritage properties being used for military purposes;</span></li><span data-dcnode-id="3365" instrument_node="">
</span><li data-dcnode-id="3358"><u data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Takes note</span></u><span data-dcnode-id="3362" instrument_node=""> of the progress made by the World Heritage Centre and the Advisory Bodies to launch a reflection on a post-conflict recovery strategy, and of the support extended so far through technical assistance, capacity-building, and exchange of best practices in this regard, and </span><u data-dcnode-id="3360"><span data-dcnode-id="3361" instrument_node="">recommends</span></u><span data-dcnode-id="3359" instrument_node=""> that further support for threatened or damaged World Heritage properties be pursued;</span></li><span data-dcnode-id="3357" instrument_node="">
</span><li data-dcnode-id="3350"><u data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Notes with concern</span></u><span data-dcnode-id="3354" instrument_node=""> that the conflict situation in several countries in the world has increased considerably the work load of the World Heritage Centre staff, and that an adequate implementation of the Action Plans for the Emergency Safeguarding of Cultural Heritage in Mali, Syria, Iraq, Libya and Yemen requires additional financial and human resources at the World Heritage Centre and in the UNESCO field offices; </span><u data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">also notes</span></u><span data-dcnode-id="3351" instrument_node=""> the increased demands on the resources of the Advisory Bodies;</span></li><span data-dcnode-id="3349" instrument_node="">
</span><li data-dcnode-id="3345"><u data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Calls on</span></u><span data-dcnode-id="3346" instrument_node=""> the international community to provide financial support for the implementation of the UNESCO Action Plans for the Emergency Safeguarding of Cultural Heritage in Syria, Iraq, Libya and Yemen, including for additional human resources at the World Heritage Centre and in the UNESCO field offices;</span></li><span data-dcnode-id="3344" instrument_node="">
</span><li data-dcnode-id="3340"><u data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Also expresses its utmost concern</span></u><span data-dcnode-id="3341" instrument_node=""> about the impacts of conflicts causing an escalation of the already severe poaching crisis, as armed groups are financing their activities through illegal wildlife trade, which is having a severe impact on African wildlife, threatening the very survival of species and the Outstanding Universal Value (OUV) of World Heritage properties;</span></li><span data-dcnode-id="3339" instrument_node="">
</span><li data-dcnode-id="3328"><u data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">Launches an appeal</span></u><span data-dcnode-id="3336" instrument_node=""> to all Member States of UNESCO to cooperate in the fight against the illicit trafficking of cultural heritage objects and illegal wildlife trade, including through the implementation of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES), the ratification of the 1970 Convention on the Means of Prohibiting and Preventing the Illicit Import, Export and Transfer of Ownership of Cultural Property and to pursue the implementation of the United Nations Security Council Resolution 2199 of February 2015 regarding Syria and Iraq;
</span><p data-dcnode-id="3333"><strong data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">Other conservation issues</span></strong></p><span data-dcnode-id="3332" instrument_node="">
</span><p data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Reconstruction</span></p><span data-dcnode-id="3329" instrument_node="">
</span></li><span data-dcnode-id="3327" instrument_node="">
</span><li data-dcnode-id="3320"><u data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">Noting</span></u><span data-dcnode-id="3324" instrument_node=""> that the recent and wide-ranging deliberate destruction of World Heritage properties as a result of armed conflict in Syria, Yemen, Libya, Iraq, Mali and Nigeria, and the devastating earthquakes in Nepal, have brought sharply into focus the issue of reconstruction in World Heritage properties; that several international meetings have taken place or are being planned on reconstruction; and that guidance within the </span><em data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="3321" instrument_node=""> is currently inadequate,</span></li><span data-dcnode-id="3319" instrument_node="">
</span><li data-dcnode-id="3315"><u data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">Recommends</span></u><span data-dcnode-id="3316" instrument_node=""> that more in depth reflection is needed on reconstruction within World Heritage properties as a complex multi-disciplinary process, and that consideration should be given to developing new guidance to reflect the multi-faceted challenges that reconstruction brings, its social and economic context, the short- and long-term needs of properties, and the idea of reconstruction as a process that should be undertaken within the framework of the Outstanding Universal Value (OUV) of the properties;</span></li><span data-dcnode-id="3314" instrument_node="">
</span><li data-dcnode-id="3307"><u data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">Welcomes</span></u><span data-dcnode-id="3311" instrument_node=""> the offer of the Government of Poland to host an international conference on Reconstruction to provide guidelines to the World Heritage Committee;</span><br data-dcnode-id="3310"><br data-dcnode-id="3309"><span data-dcnode-id="3308" instrument_node="">Climate Change</span></li><span data-dcnode-id="3306" instrument_node="">
</span><li data-dcnode-id="3299"><u data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Taking note</span></u><span data-dcnode-id="3303" instrument_node=""> of the agreement reached during the 21st conference (COP21) of the United Nations Framework Convention on Climate Change (UNFCCC) held in 2015, </span><u data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">requests</span></u><span data-dcnode-id="3300" instrument_node=""> the World Heritage Centre and the Advisory Bodies to assist States Parties to implement appropriate management responses to the adverse effects of Climate Change;</span></li><span data-dcnode-id="3298" instrument_node="">
</span><li data-dcnode-id="3291"><u data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Recommends</span></u><span data-dcnode-id="3295" instrument_node=""> that the World Heritage Centre strengthen its relations with other organizations working on Climate Change, particularly with the UNFCCC and the Intergovernmental Panel on Climate Change (IPCC) secretariats, and specifically with regard to the effect of Climate Change on World Heritage properties, and </span><u data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">also requests</span></u><span data-dcnode-id="3292" instrument_node=""> the States Parties, the World Heritage Centre and the Advisory Bodies to work with IPCC with the objective of including a specific chapter on natural and cultural World Heritage in future IPCC assessment reports;</span></li><span data-dcnode-id="3290" instrument_node="">
</span><li data-dcnode-id="3283"><u data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">Further requests</span></u><span data-dcnode-id="3287" instrument_node=""> the World Heritage Centre and the Advisory Bodies to periodically review and update the “Policy Document on the Impacts of Climate Change on World Heritage properties”, so as to make available the most current knowledge and technology on the subject to guide the decisions and actions of the World Heritage community;</span><br data-dcnode-id="3286"><br data-dcnode-id="3285"><span data-dcnode-id="3284" instrument_node="">Dams</span></li><span data-dcnode-id="3282" instrument_node="">
</span><li data-dcnode-id="3269"><u data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">Notes with significant concern</span></u><span data-dcnode-id="3279" instrument_node=""> that an increasing number of properties are facing potential threats from major dam projects, </span><u data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">considers</span></u><span data-dcnode-id="3276" instrument_node=""> that the construction of dams with large reservoirs within the boundaries of World Heritage properties is incompatible with their World Heritage status, and </span><u data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">urges</span></u><span data-dcnode-id="3273" instrument_node=""> States Parties to ensure that the impacts from dams that could affect properties located upstream or downstream within the same river basin are rigorously assessed in order to avoid impacts on the Outstanding Universal Value (OUV);</span><br data-dcnode-id="3272"><br data-dcnode-id="3271"><span data-dcnode-id="3270" instrument_node="">Extractive industries</span></li><span data-dcnode-id="3268" instrument_node="">
</span><li data-dcnode-id="3258"><u data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Noting with significant concern</span></u><span data-dcnode-id="3265" instrument_node=""> that World Heritage properties are increasingly threatened by extractive industries, as confirmed by the 2014 IUCN World Heritage Outlook report, by the World Heritage Centre’s analysis of issues reported in state of conservation reports also revealing the potential threat from extractive activities to cultural properties, and by the 2016 report by the World Wide Fund for Nature (WWF), </span><u data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">welcomes</span></u><span data-dcnode-id="3262" instrument_node=""> the “No-go” commitments to World Heritage properties made by Tullow Oil plc and CEMEX in November 2015 and April 2016 respectively, and </span><u data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">reiterates its call</span></u><span data-dcnode-id="3259" instrument_node=""> on other extractive industry companies and investment banks to follow these examples to further extend the “No-go” commitment;</span></li><span data-dcnode-id="3257" instrument_node="">
</span><li data-dcnode-id="3244"><u data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">Recalling</span></u><span data-dcnode-id="3254" instrument_node=""> Decision</span><strong data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node=""> 37 COM 7</span></strong><span data-dcnode-id="3251" instrument_node="">, </span><u data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">once again urges</span></u><span data-dcnode-id="3248" instrument_node=""> all States Parties to the Convention and leading industry stakeholders to respect the “No-go” commitment by not permitting extractive activities within World Heritage properties, and by making every effort to ensure that extractives companies located in their territory cause no damage to World Heritage properties, in line with Article 6 of the Convention;</span><br data-dcnode-id="3247"><br data-dcnode-id="3246"><span data-dcnode-id="3245" instrument_node="">Environmental Impact Assessments (EIAs)/Heritage Impact Assessments (HIAs)</span></li><span data-dcnode-id="3243" instrument_node="">
</span><li data-dcnode-id="3233"><u data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Notes with concern</span></u><span data-dcnode-id="3240" instrument_node=""> that a majority of properties potentially affected by proposed development projects, proposed legal instruments, and proposed management systems have not benefited from an assessment of impacts on their Outstanding Universal Value (OUV) in line with IUCN’s World Heritage Advice Note on Environmental Assessment and ICOMOS’ Guidance on Heritage Impact Assessments for Cultural World Heritage Properties, and </span><u data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">requests</span></u><span data-dcnode-id="3237" instrument_node=""> all States Parties to the Convention to ensure that potential direct, indirect and cumulative impacts on the OUV, including from projects located outside the boundaries of natural and/or cultural World Heritage properties, are specifically assessed within the framework of the EIA and HIA required by the applicable laws and regulations, and that reports of such assessments are submitted to the World Heritage Centre for review by the Advisory Bodies, in accordance with Paragraph 172 of the </span><em data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="3234" instrument_node="">;</span></li><span data-dcnode-id="3232" instrument_node="">
</span><li data-dcnode-id="3225"><u data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">Recalls</span></u><span data-dcnode-id="3229" instrument_node=""> Article 6 of the Convention according to which “Each State Party to this Convention undertakes not to take any deliberate measures which might damage directly or indirectly the cultural and natural heritage […] situated on the territory of other States Parties to this Convention”, and </span><u data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">also requests</span></u><span data-dcnode-id="3226" instrument_node=""> all States Parties to the Convention to ensure that EIAs and HIAs include an assessment of impacts on the OUV of World Heritage properties situated on the territory of other States Parties, as appropriate;</span></li><span data-dcnode-id="3224" instrument_node="">
</span><li data-dcnode-id="3217"><u data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">Further requests</span></u><span data-dcnode-id="3221" instrument_node=""> the Advisory Bodies, in consultation with the World Heritage Centre, to consider opportunities to streamline their guidance on impact assessment in order to develop one single guidance document for the assessment of impacts on both natural and cultural properties;</span><br data-dcnode-id="3220"><br data-dcnode-id="3219"><span data-dcnode-id="3218" instrument_node="">Integrated management, Decision making, Governance</span></li><span data-dcnode-id="3216" instrument_node="">
</span><li data-dcnode-id="3203"><u data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Noting with concern</span></u><span data-dcnode-id="3213" instrument_node=""> that the lack of an integrated management approach is reported to cause challenges to the coordination of management and decision making processes of properties where different authorities are involved, in particular in the cases of mixed, serial, and transboundary properties, </span><u data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">urges</span></u><span data-dcnode-id="3210" instrument_node=""> States Parties to establish appropriate mechanisms in order to facilitate a coordinated approach to the management of all properties, in line with the requirements of the </span><em data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="3207" instrument_node=""> as laid out in Paragraphs 112, 114, and 135, and </span><u data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">encourages</span></u><span data-dcnode-id="3204" instrument_node=""> States Parties with contiguous natural properties on either side of their international borders, which are not listed as transboundary properties, to establish appropriate mechanisms for cooperation between their respective management authorities and ministries;</span></li><span data-dcnode-id="3202" instrument_node="">
</span><li data-dcnode-id="3195"><u data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Also encourages</span></u><span data-dcnode-id="3199" instrument_node=""> States Parties to promote recognition and awareness across all relevant national and regional agencies of the World Heritage status of the properties on their territory, and to develop mechanisms to ensure consideration of impacts on Outstanding Universal Value (OUV) in the decision making processes of relevant ministries, before permits are issued for developments that could negatively impact the OUV;</span><br data-dcnode-id="3198"><br data-dcnode-id="3197"><span data-dcnode-id="3196" instrument_node="">Ground transport infrastructures</span></li><span data-dcnode-id="3194" instrument_node="">
</span><li data-dcnode-id="3187"><u data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Notes with concern</span></u><span data-dcnode-id="3191" instrument_node=""> that the number of cases of ground transport infrastructure having potential impact on the Outstanding Universal Value (OUV) of World Heritage properties is continuing to grow, and </span><u data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">calls upon</span></u><span data-dcnode-id="3188" instrument_node=""> States Parties to carry out Strategic Environmental Assessments (SEAs) early in the process of transportation planning to allow for potential impacts of the OUV, including those resulting from foreseeable associated future developments, to be identified prior to the development of specific projects;</span></li><span data-dcnode-id="3186" instrument_node="">
</span><li data-dcnode-id="3178"><u data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Encourages</span></u><span data-dcnode-id="3183" instrument_node=""> States Parties to carry out Environmental Impact Assessments (EIAs) and Heritage Impact Assessments (HIA) on ground transport projects, once they are designed, with multiple options to ensure that transportation needs can be met with minimal impacts on the OUV of World Heritage properties;</span><br data-dcnode-id="3182"><br data-dcnode-id="3181"><strong data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">List of World Heritage in Danger</span></strong></li><span data-dcnode-id="3177" instrument_node="">
</span><li data-dcnode-id="3166"><u data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Takes note</span></u><span data-dcnode-id="3174" instrument_node=""> of its discussions under agenda items 7A and 7B, and </span><u data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">requests</span></u><span data-dcnode-id="3171" instrument_node=""> the World Heritage Centre, in consultation with the Advisory Bodies and States Parties, to promote better understanding of the implications and benefits of properties being inscribed on the List of World Heritage in Danger, and to develop appropriate information material in this regard with a view to overcome the negative perceptions of the List of World Heritage in Danger. The information material should highlight the importance of the protection of the OUV;</span><br data-dcnode-id="3170"><br data-dcnode-id="3169"><strong data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">Reactive Monitoring</span></strong></li><span data-dcnode-id="3165" instrument_node="">
</span><li data-dcnode-id="3159"><u data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Requests</span></u><span data-dcnode-id="3162" instrument_node=""> the World Heritage Centre, in cooperation with the Advisory Bodies to evaluate the effectiveness of the Reactive Monitoring including procedures and case studies and to present a preliminary report for the consideration by the World Heritage Committee at its 42nd session in 2018, if funds are available.
</span><p data-dcnode-id="3161"></p><span data-dcnode-id="3160" instrument_node="">
</span></li><span data-dcnode-id="3158" instrument_node="">
</span></ol><p data-dcnode-id="3156"></p><span data-dcnode-id="3155" instrument_node="">

</span><div class="collapse mt-3" data-dcnode-id="568" id="collapseMoreDecision4714EE00-C6D0-2203-3FEA3FD7D86E58D6"><span data-dcnode-id="3142" instrument_node="">

</span><a aria-controls="collapsedecision6189" aria-expanded="false" class="tag tag-outline-gray" data-dcnode-id="3132" data-toggle="collapse" href="#decision6189" id="ext-element-27" role="button"><span data-dcnode-id="3139" instrument_node="">
</span><span data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">39COM 7</span></span><span data-dcnode-id="3136" instrument_node="">
											State of Conservation of World Heritage Properties 
												(2015)
											
											</span><span class="material-icons-sharp" data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">expand_more</span></span><span data-dcnode-id="3133" instrument_node="">
</span></a><span data-dcnode-id="3131" instrument_node="">
</span><div class="collapse mt-1 mb-4 bg-white p-4 rounded-sm" data-dcnode-id="2860" id="decision6189"><span data-dcnode-id="3130" instrument_node="">
</span><div data-dcnode-id="3126"><strong data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Code:</span></strong><span data-dcnode-id="3127" instrument_node=""> 39COM 7</span></div><span data-dcnode-id="3125" instrument_node="">
</span><div data-dcnode-id="3121"><strong data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Title:</span></strong><span data-dcnode-id="3122" instrument_node=""> State of Conservation of World Heritage Properties</span></div><span data-dcnode-id="3120" instrument_node=""> </span><div data-dcnode-id="3116"><strong data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">Year:</span></strong><span data-dcnode-id="3117" instrument_node=""> 2015</span></div><span data-dcnode-id="3115" instrument_node="">
</span><p data-dcnode-id="3114"></p><div data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">The World Heritage Committee,</span></div><span data-dcnode-id="3111" instrument_node="">
</span><div data-dcnode-id="3093"><span data-dcnode-id="3110" instrument_node="">
</span><ol data-dcnode-id="3095"><span data-dcnode-id="3109" instrument_node="">
</span><li data-dcnode-id="3105"><u data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">Having examined</span></u><span data-dcnode-id="3106" instrument_node=""> Document WHC-15/39.COM/7,</span></li><span data-dcnode-id="3104" instrument_node="">
</span><li data-dcnode-id="3097"><u data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Recalling</span></u><span data-dcnode-id="3101" instrument_node=""> Decision </span><strong data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">38 COM 7,</span></strong><span data-dcnode-id="3098" instrument_node=""> adopted at its 38th session (Doha, 2014), and the Bonn Declaration on World Heritage adopted on 29 June 2015,</span></li><span data-dcnode-id="3096" instrument_node="">
</span></ol><span data-dcnode-id="3094" instrument_node="">
</span></div><span data-dcnode-id="3092" instrument_node="">
</span><div data-dcnode-id="3089"><strong data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Conflict situation in the Arab States Region</span></strong></div><span data-dcnode-id="3088" instrument_node="">
</span><div data-dcnode-id="3055"><span data-dcnode-id="3087" instrument_node="">
</span><ol data-dcnode-id="3057" start="3" style="counter-reset: list 2;"><span data-dcnode-id="3086" instrument_node="">
</span><li data-dcnode-id="3079"><u data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">Deplores</span></u><span data-dcnode-id="3083" instrument_node=""> the conflict situation prevailing in Syria, Iraq, Libya and Yemen, the loss of human life as well as the degradation of humanitarian conditions and </span><u data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">expresses its utmost concern</span></u><span data-dcnode-id="3080" instrument_node=""> at the damage sustained and the threats facing these properties and cultural heritage in general;</span></li><span data-dcnode-id="3078" instrument_node="">
</span><li data-dcnode-id="3074"><u data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Urges</span></u><span data-dcnode-id="3075" instrument_node=""> all parties associated with conflicts to refrain from any action that would cause further damage to cultural heritage and to fulfil their obligations under international law by taking all possible measures to protect such heritage, in particular the safeguarding of World Heritage properties and the sites included in the Tentative List;</span></li><span data-dcnode-id="3073" instrument_node="">
</span><li data-dcnode-id="3069"><u data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Also urges</span></u><span data-dcnode-id="3070" instrument_node=""> the States Parties to adopt measures for the evacuation of World Heritage properties being used for military purposes;</span></li><span data-dcnode-id="3068" instrument_node="">
</span><li data-dcnode-id="3064"><u data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Launches an appeal</span></u><span data-dcnode-id="3065" instrument_node=""> to all Member States of UNESCO to cooperate in combatting the illicit trafficking of cultural heritage, in particular coming from Syria and Iraq as per the United Nations Security Council Resolution 2199 of February 2015;</span></li><span data-dcnode-id="3063" instrument_node="">
</span><li data-dcnode-id="3059"><u data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Recommends</span></u><span data-dcnode-id="3060" instrument_node=""> that the World Heritage Centre and Advisory Bodies develop a post-conflict strategy, including means to extend support for reconstruction of damaged World Heritage properties through technical assistance, capacity-building, and exchange of best practices taking into account the conclusions made by the two seminars recently held by World Heritage Centre and ICOMOS on this subject;</span></li><span data-dcnode-id="3058" instrument_node="">
</span></ol><span data-dcnode-id="3056" instrument_node="">
</span></div><span data-dcnode-id="3054" instrument_node="">
</span><div data-dcnode-id="3051"><strong data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Emerging and recurring conservation issues</span></strong></div><span data-dcnode-id="3050" instrument_node="">
</span><div data-dcnode-id="2979"><span data-dcnode-id="3049" instrument_node="">
</span><ol data-dcnode-id="2981" start="8" style="counter-reset: list 7;"><span data-dcnode-id="3048" instrument_node="">
</span><li data-dcnode-id="3041"><u data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Takes note</span></u><span data-dcnode-id="3045" instrument_node=""> of the increasing number of State of Conservation reports due to inadequate management systems or plans and </span><u data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">urges</span></u><span data-dcnode-id="3042" instrument_node=""> States Parties to ensure that management systems and plans are in place at the time of inscription;</span></li><span data-dcnode-id="3040" instrument_node="">
</span><li data-dcnode-id="3033"><u data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Notes with utmost concern</span></u><span data-dcnode-id="3037" instrument_node="">, the continuously increasing pressure associated with and the growing impacts from poaching on the Outstanding Universal Value of many natural World Heritage properties and the increasing involvement of organized crime, and </span><u data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">reiterates</span></u><span data-dcnode-id="3034" instrument_node=""> its call for strong international collaboration and coordination inter alia with the Secretariat of the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES) and with the full engagement of transit and destination countries to control the illicit trade in wildlife and its products;</span></li><span data-dcnode-id="3032" instrument_node="">
</span><li data-dcnode-id="3022"><u data-dcnode-id="3030"><span data-dcnode-id="3031" instrument_node="">Notes with concern</span></u><span data-dcnode-id="3029" instrument_node=""> the significant threat posed by invasive species to natural World Heritage properties, </span><u data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">strongly encourages</span></u><span data-dcnode-id="3026" instrument_node=""> States Parties to develop adequately resourced strategies to eradicate invasive species in World Heritage properties and prevent their (re-)introduction and/or establishment, and </span><u data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">also calls on</span></u><span data-dcnode-id="3023" instrument_node=""> the international community to support invasive species eradication campaigns in affected properties;</span></li><span data-dcnode-id="3021" instrument_node="">
</span><li data-dcnode-id="3005"><u data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Taking note</span></u><span data-dcnode-id="3018" instrument_node=""> of the benefits to States Parties of systematically utilizing Heritage Impact Assessments (HIAs) and Environmental Impact Assessments (EIAs) in the review of development projects, </span><u data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">encourages</span></u><span data-dcnode-id="3015" instrument_node=""> States Parties to integrate the EIA/HIA processes into legislation, planning mechanisms and management plans, and </span><u data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">reiterates its recommendation</span></u><span data-dcnode-id="3012" instrument_node=""> to States Parties to use these tools in assessing projects, including assessment of cumulative impacts, as early as possible and before any final decision is taken, and, </span><u data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">taking into account</span></u><span data-dcnode-id="3009" instrument_node=""> the need for capacity-building in this regard, </span><u data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">requests</span></u><span data-dcnode-id="3006" instrument_node=""> the States Parties to contribute financially and technically towards the development of further guidance regarding EIA/HIA implementation, by the Advisory Bodies and the World Heritage Centre, based on case studies and field experience;</span></li><span data-dcnode-id="3004" instrument_node="">
</span><li data-dcnode-id="2991"><u data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Acknowledging</span></u><span data-dcnode-id="3001" instrument_node=""> that World Heritage properties are being increasingly affected by Climate Change, </span><u data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">also strongly encourages</span></u><span data-dcnode-id="2998" instrument_node=""> States Parties to participate in the 21st Conference of the Parties (COP21) to the United Nations Framework Convention on Climate Change (UNFCCC) in December 2015, with a view to achieving a universal climate agreement and mobilize global climate action on the ground, and </span><u data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">recalls</span></u><span data-dcnode-id="2995" instrument_node=""> its Decision </span><strong data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">31 COM 7.1</span></strong><span data-dcnode-id="2992" instrument_node="">, adopted at its 31st session (Christchurch, 2007) in which it adopted a carbon neutral policy, in view of its application for all future sessions, to the extent feasible;</span></li><span data-dcnode-id="2990" instrument_node="">
</span><li data-dcnode-id="2983"><u data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">Appreciates</span></u><span data-dcnode-id="2987" instrument_node=""> the constructive dialogue, which has taken place between the International Olympic Committee (IOC), the World Heritage Centre and IUCN, and </span><u data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">also requests</span></u><span data-dcnode-id="2984" instrument_node=""> that this dialogue be extended to the other Advisory Bodies to ensure that cultural aspects are also taken into account in the future;</span></li><span data-dcnode-id="2982" instrument_node="">
</span></ol><span data-dcnode-id="2980" instrument_node="">
</span></div><span data-dcnode-id="2978" instrument_node="">
</span><div data-dcnode-id="2971"><strong data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Knowledge</span></strong><span data-dcnode-id="2975" instrument_node=""> </span><strong data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">management of the state of conservation reports</span></strong><span data-dcnode-id="2972" instrument_node="">&nbsp; </span></div><span data-dcnode-id="2970" instrument_node="">
</span><div data-dcnode-id="2949"><span data-dcnode-id="2969" instrument_node="">
</span><ol data-dcnode-id="2951" start="14" style="counter-reset: list 13;"><span data-dcnode-id="2968" instrument_node="">
</span><li data-dcnode-id="2964"><u data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Urges</span></u><span data-dcnode-id="2965" instrument_node=""> States Parties to submit to the Committee through the Secretariat, by the statutory deadline set and in one of the working languages of the World Heritage Convention (English or French), their reports on the state of conservation of specific properties (Paragraph 169 of the Operational Guidelines), in order to allow for sufficient time for consultation and informed decision making at the Committee sessions;</span></li><span data-dcnode-id="2963" instrument_node="">
</span><li data-dcnode-id="2953"><u data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Adopts</span></u><span data-dcnode-id="2960" instrument_node=""> the revised format below for the submission of state of conservation reports by the States Parties, </span><u data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">decides</span></u><span data-dcnode-id="2957" instrument_node=""> that this revised format is compulsory and applies with immediate effect, and that it should be included in the Operational Guidelines, and </span><u data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">reminds</span></u><span data-dcnode-id="2954" instrument_node=""> States Parties that these reports must be submitted in one of the working languages of the Convention (English or French):</span></li><span data-dcnode-id="2952" instrument_node="">
</span></ol><span data-dcnode-id="2950" instrument_node="">
</span></div><span data-dcnode-id="2948" instrument_node="">
</span><div data-dcnode-id="2945"><strong data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Name of World Heritage property (State(s) Party(ies)) (Identification number) </span></strong></div><span data-dcnode-id="2944" instrument_node="">
</span><div data-dcnode-id="2880"><span data-dcnode-id="2943" instrument_node="">
</span><ol data-dcnode-id="2882"><span data-dcnode-id="2942" instrument_node="">
</span><li data-dcnode-id="2937"><u data-dcnode-id="2939"><span data-dcnode-id="2941" instrument_node="">Executive Summary of the report</span><br data-dcnode-id="2940"></u><span data-dcnode-id="2938" instrument_node="">[Note: each of the sections described below should be summarized. The maximum length of the executive summary is 1 page.]</span></li><span data-dcnode-id="2936" instrument_node="">
</span><li data-dcnode-id="2910"><u data-dcnode-id="2933"><span data-dcnode-id="2935" instrument_node="">Response to the Decision of the World Heritage Committee</span><br data-dcnode-id="2934"></u><span data-dcnode-id="2932" instrument_node="">[Note: State(s) Party(ies) are requested to address the most recent Decision of the World Heritage Committee for this property, paragraph by paragraph.]</span><br data-dcnode-id="2931"><u data-dcnode-id="2928"><span data-dcnode-id="2930" instrument_node="">If the property is inscribed on the List of World Heritage in&nbsp;Danger</span><br data-dcnode-id="2929"></u><span data-dcnode-id="2927" instrument_node="">Please also provide detailed information on the following:
</span><ol data-dcnode-id="2912"><span data-dcnode-id="2926" instrument_node="">
</span><li data-dcnode-id="2920"><span data-dcnode-id="2925" instrument_node="">Progress achieved in implementing the corrective measures adopted by the World Heritage Committee</span><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">[Note: please address each corrective measure individually, providing factual information, including exact dates, figures, etc.]</span><br data-dcnode-id="2922"><span data-dcnode-id="2921" instrument_node="">If needed, please describe the success factors or difficulties in implementing each of the corrective measures identified</span></li><span data-dcnode-id="2919" instrument_node="">
</span><li data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Is the timeframe for implementing the corrective measures suitable? If not, please propose an alternative timeframe and an explanation why this alternative timeframe is required.</span></li><span data-dcnode-id="2916" instrument_node="">
</span><li data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Progress achieved towards the Desired state of conservation for the removal of the property from the List of World Heritage in Danger (DSOCR)</span></li><span data-dcnode-id="2913" instrument_node="">
</span></ol><span data-dcnode-id="2911" instrument_node="">
</span></li><span data-dcnode-id="2909" instrument_node="">
</span><li data-dcnode-id="2904"><u data-dcnode-id="2906"><span data-dcnode-id="2908" instrument_node="">Other current conservation issues identified by the State(s) Party(ies) which may have an impact on the property’s Outstanding Universal Value</span><br data-dcnode-id="2907"></u><span data-dcnode-id="2905" instrument_node="">[Note: this includes conservation issues which are not mentioned in the Decision of the World Heritage Committee or in any information request from the World Heritage Centre]</span></li><span data-dcnode-id="2903" instrument_node="">
</span><li data-dcnode-id="2897"><u data-dcnode-id="2898"><span data-dcnode-id="2902" instrument_node="">In conformity with Paragraph 172 of the </span><em data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Operational Guidelines</span></em><span data-dcnode-id="2899" instrument_node="">, describe any potential major restorations, alterations and/or new construction(s) intended within the property, the buffer zone(s) and/or corridors or other areas, where such developments may affect the Outstanding Universal Value of the property, including authenticity and integrity.</span></u></li><span data-dcnode-id="2896" instrument_node="">
</span><li data-dcnode-id="2888"><u data-dcnode-id="2893"><span data-dcnode-id="2895" instrument_node="">Public access to the state of conservation report</span><br data-dcnode-id="2894"></u><span data-dcnode-id="2892" instrument_node="">[Note: this report will be uploaded for public access on the World Heritage Centre’s State of conservation Information System (</span><a data-dcnode-id="2890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whc.unesco.org/en/soc"><span data-dcnode-id="2891" instrument_node="">https://whc.unesco.org/en/soc</span></a><span data-dcnode-id="2889" instrument_node="">). Should your State Party request that the full report should not be uploaded, only the 1-page executive summary provided in point (1.) above will be uploaded for public access].</span></li><span data-dcnode-id="2887" instrument_node="">
</span><li data-dcnode-id="2884"><u data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Signature of the Authority</span></u></li><span data-dcnode-id="2883" instrument_node="">
</span></ol><span data-dcnode-id="2881" instrument_node="">
</span></div><span data-dcnode-id="2879" instrument_node="">
</span><ol data-dcnode-id="2866" start="16" style="counter-reset: list 15;"><span data-dcnode-id="2878" instrument_node="">
</span><li data-dcnode-id="2868"><span data-dcnode-id="2877" instrument_node="">
</span><div data-dcnode-id="2870"><u data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Notes with appreciation</span></u><span data-dcnode-id="2874" instrument_node=""> the high number of States Parties which have authorized the public upload of their state of conservation reports, facilitating their consultation by all stakeholders of the Convention and contributing to an improved transparency of the reactive monitoring process, and </span><u data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">reiterates its encouragement</span></u><span data-dcnode-id="2871" instrument_node=""> to all States Parties to continue do so in the future.</span></div><span data-dcnode-id="2869" instrument_node="">
</span></li><span data-dcnode-id="2867" instrument_node="">
</span></ol><p data-dcnode-id="2865"></p><span data-dcnode-id="2864" instrument_node="">
