</span><ins class="adsbygoogle" data-ad-client="ca-pub-8040656654961143" data-ad-slot="6415560745" data-dcnode-id="819" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="818" instrument_node="">
</span><span data-dcnode-id="815" instrument_node="">
</span></div><span data-dcnode-id="813" instrument_node="">&nbsp;</span><img align="right" alt="Traditional Dress of Karnataka" data-dcnode-id="812" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/photos_gallery/157/01_Kanchipuram_Silk_Saree.jpg&amp;raw" style="margin-left:7px"><span data-dcnode-id="811" instrument_node="">The Traditional Dress of </span><a class="fntlink" data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/3/karnataka.htm" title="Karnataka"><span data-dcnode-id="810" instrument_node="">Karnataka</span></a><span data-dcnode-id="808" instrument_node=""> present the harmony of tradition and modernity of the state. The contemporary society is reflected by the dressing sense of the people of Karnataka. Sarees are the traditional dress of Karnataka women. There is not much variation in men's attire in Karnataka but a strict dressing code is followed keeping the traditions of the state in mind.

</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">
</span></p><span data-dcnode-id="805" instrument_node="">
</span><b data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Women's Traditional Dress of Karnataka</span></b><span data-dcnode-id="802" instrument_node="">
</span><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">

Saree is usually worn by the females of Karnataka. It consists of regal silk sarees, which happen to be the traditional dress of this place. Karnataka is the silk hub of the country and the silk has a wide spectrum. It has abundant variety, namely, smooth silks, sleek chiffons, and gorgeous brocades. These sarees not only decorate women in the state, but also establish its sway in other parts of the country and in foreign nations. Indeed, </span><a class="fntlink" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/3/bangalore.htm" title="Bengaluru"><span data-dcnode-id="799" instrument_node="">Bengaluru</span></a><span data-dcnode-id="797" instrument_node=""> and </span><a class="fntlink" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/3/mysore.htm" title="Mysore"><span data-dcnode-id="796" instrument_node="">Mysore</span></a><span data-dcnode-id="794" instrument_node=""> are the epicenters of silk-industries in South India. The quality thread and the interweaving of gold threads in exclusive creations, attribute to the profound popularity of the sari as the favourite costume.

</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">
</span></p><span data-dcnode-id="791" instrument_node="">
The Kanjeevaram or Kanchipurram silks, of </span><a class="fntlink" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/14/kanchipuram_silk_city.htm" title="Kanchipuram"><span data-dcnode-id="790" instrument_node="">Kanchipuram</span></a><span data-dcnode-id="788" instrument_node=""> in Karnataka, are one of the most popular types of sarees with its rich texture, vibrant colours and fabulous designs. The Kanchipuram Silk Saree is a hand-woven creation. The silk yarn is dyed to bring the desired colour and afterwards Jari is interleaved into the yarn. Pure Jari is a silk thread, intertwined with a thin silver wire and then gilded with pure gold. The Jari adds the element of shimmer in the yarn. The technique of making Kanchipuram is called the conjunction of three threads. This gives the sari a durable quality. Hence, the Kanchipuram sarees usually turn out to be the bridal costume of Karnataka.

</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">
</span></p><span data-dcnode-id="785" instrument_node="">
</span><img align="left" alt="Traditional Dress of Karnataka" data-dcnode-id="784" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/photos_gallery/157/02_Traditional_Attire_of_men_in_Karnataka.jpg&amp;raw" style="margin-right:7px"><span data-dcnode-id="783" instrument_node="">Among the other popular items, </span><a class="fntlink" data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/42/mysore_silk_sarees.htm" title="Mysore Silk Sarees"><span data-dcnode-id="782" instrument_node="">Mysore silk</span></a><span data-dcnode-id="780" instrument_node=""> with its zari and rich </span><a class="fntlink" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/24/silk_indian_fibre.htm" title="Silk"><span data-dcnode-id="779" instrument_node="">silk</span></a><span data-dcnode-id="777" instrument_node="">, deserve mention. Arani Silks, Valkalams, Kora Silks, Patola Sarees, Crepe Silk Sarees, </span><a class="fntlink" data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/42/chiffon_sarees.htm" title="Chiffon Sarees"><span data-dcnode-id="776" instrument_node="">Chiffon Sarees</span></a><span data-dcnode-id="774" instrument_node=""> and Raw Silk sarees are the other varieties of women attire in Karnataka. Kornadu sarees are a fusion-display of cotton and silk. The saris are woven in a blue cotton yarn together with a silk yarn in other multiple shades. The motifs in the sarees are varied and the body of the sari is either bestowed with checks or stripes. These sarees are used as daily comfort wear.

</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">
</span></p><span data-dcnode-id="771" instrument_node="">
The Mysore crepe silk is worn mainly for office or workplace, more because of its light-weight, and easier maintenance. It is supple opaque crepe silk complemented with Jari margins. These saris are dyed in bright colours after the completion of the weaving. The </span><a class="fntlink" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/11/ilkal.htm" title="Ilkal"><span data-dcnode-id="770" instrument_node="">Ilkal</span></a><span data-dcnode-id="768" instrument_node=""> and the Mokalmuru </span><a class="fntlink" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/37/indian_sarees.htm" title="Indian Sarees"><span data-dcnode-id="767" instrument_node="">sarees</span></a><span data-dcnode-id="765" instrument_node=""> stand as the ethnic motif of Karnataka. It is used for both regular and occasional purpose. In modern days, Mysore crepe salwars and Karnataka handloom's cotton also forms part of women’s attire of Karnataka.

</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">
</span></p><span data-dcnode-id="762" instrument_node="">
</span><b data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Men's Traditional Dress of Karnataka</span></b><span data-dcnode-id="759" instrument_node="">
</span><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">

The main Traditional Dress  of the men of Karnataka is 'Panche' which is worn below the waist beneath a shirt. It is also known as </span><a class="fntlink" data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/9/lungi.htm" title="Lungi"><span data-dcnode-id="756" instrument_node="">Lungi</span></a><span data-dcnode-id="754" instrument_node="">, </span><a class="fntlink" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/42/dhoti_indian_men.htm" title="Dhoti"><span data-dcnode-id="753" instrument_node="">Dhoti</span></a><span data-dcnode-id="751" instrument_node=""> or Veshti etc. An 'angavastram', a silk or </span><a class="fntlink" data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/24/cotton_indian_fibre.htm" title="Cotton"><span data-dcnode-id="750" instrument_node="">cotton</span></a><span data-dcnode-id="748" instrument_node=""> muffler is placed on the neck covering the shoulder. In recent times, only the rustic men of Karnataka stick to Panche, as their everyday costume. Mysore Peta is the traditional headdress of Karnataka for men. Most of Karnataka men use modern wear for daily purpose.


</span><br data-dcnode-id="747"><span data-dcnode-id="746" instrument_node="">
</span><br data-dcnode-id="745"></div><span data-dcnode-id="743" instrument_node="">
