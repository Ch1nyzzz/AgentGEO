</span><div class="site-inner" data-dcnode-id="477"><div class="content-sidebar-wrap" data-dcnode-id="478"><main class="content" data-dcnode-id="816"><span data-dcnode-id="1646" instrument_node=""> </span><div class="breadcrumb" data-dcnode-id="1633"><span data-dcnode-id="1645" instrument_node="">
</span><span data-dcnode-id="1634"><span data-dcnode-id="1635"><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnataka.com/"><span data-dcnode-id="1644" instrument_node="">Home</span></a><span data-dcnode-id="1642" instrument_node=""> » </span><span data-dcnode-id="1636"><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnataka.com/profile/"><span data-dcnode-id="1641" instrument_node="">Profile</span></a><span data-dcnode-id="1639" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Traditional Games of Karnataka</span></span></span></span></span></div><span data-dcnode-id="1632" instrument_node=""> </span><article aria-label="Traditional Games of Karnataka" class="post-372 post type-post status-publish format-standard has-post-thumbnail category-profile tag-games tag-hand-wrestling tag-kabaddi tag-kambala tag-traditional-games-of-karnataka entry" data-dcnode-id="817"><header class="entry-header" data-dcnode-id="1619"><h1 class="entry-title" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Traditional Games of Karnataka</span></h1><span data-dcnode-id="1629" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="1620"><time class="entry-time" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">May 1, 2016</span></time><span data-dcnode-id="1626" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="1622"><a class="entry-author-link" data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnataka.com/author/raggi/" rel="author"><span class="entry-author-name" data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Raggi Mudde</span></span></a></span><span data-dcnode-id="1621" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="863"><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Traditional games have always been a part of Karnataka’s rich culture. There are a variety of indoor, outdoor and board games that were popular in Karnataka. Many of these interesting games were played by both the young and the old.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><div class="code-block code-block-11" data-dcnode-id="1612" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1615" instrument_node="">
</span><span data-dcnode-id="1613" instrument_node="">
</span></div><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">But with the advent of computers, mobile phones and play stations the concept of playing games have drastically changed in the state along with the rest of the country. Though a few of the traditional games are still played in Karnataka, people dwelling in the cities have lost touch with most of the traditional games.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Let us take a look at some of the traditional games that were once enthusiastically played across Karnataka.</span></p><div class="code-block code-block-3" data-dcnode-id="1596" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1605" instrument_node="">
</span><div data-dcnode-id="1601" id="div-gpt-ad-1641798205821-0"><span data-dcnode-id="1604" instrument_node="">
</span><span data-dcnode-id="1602" instrument_node="">
</span></div><span data-dcnode-id="1600" instrument_node="">
</span><amp-auto-ads data-ad-client="ca-pub-0453400831391596" data-dcnode-id="1598" type="adsense"><span data-dcnode-id="1599" instrument_node="">
</span></amp-auto-ads><span data-dcnode-id="1597" instrument_node="">
</span></div><span data-dcnode-id="1595" instrument_node="">
</span><h3 data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Chinni Dandu (Gilli Danda)</span></h3><span data-dcnode-id="1592" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1580" id="attachment_17962" style="width: 718px"><img alt="Gilli Danda. Image source somewherelost.com " aria-describedby="caption-attachment-17962" class="size-full wp-image-17962" data-attachment-id="17962" data-comments-opened="0" data-dcnode-id="1591" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Gilli Danda. Image source somewherelost.com http:\/\/www.somewherelost.com\/5-indian-sporting-activities-that-you-cannot-enjoy-anywhere-else\/&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Gilli Danda. Image source somewherelost.com" data-large-file="https://www.karnataka.com/wp-content/uploads/2016/05/Gilli-Danda.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2016/05/Gilli-Danda-300x200.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2016/05/Gilli-Danda.jpg" data-orig-size="708,472" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/gilli-danda/" height="472" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2016/05/Gilli-Danda.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2016/05/Gilli-Danda.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2016/05/Gilli-Danda-300x200.jpg 300w" title="Gilli Danda. Image source somewherelost.com" width="708"><div class="code-block code-block-12" data-dcnode-id="1586" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1590" instrument_node="">
</span><span data-dcnode-id="1588" instrument_node="">
</span></div><span data-dcnode-id="1585" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="1581" id="caption-attachment-17962"><span data-dcnode-id="1584" instrument_node="">Gilli Danda. Image source </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.somewherelost.com/5-indian-sporting-activities-that-you-cannot-enjoy-anywhere-else/"><span data-dcnode-id="1583" instrument_node="">somewherelost.com</span></a></p></div><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Gilli danda is one of the most popular outdoor games played all over India and even in South Asia. It is called Chinni Dandu in Kannada. This game is believed to be the origin of many European and American games such as Cricket, Baseball and Softball. The game is played with a peg (gilli) and a stick (danda), both of which are made of wood. The stick is used to strike the peg. It is a team game that requires hand eye co-ordination and concentration of the player.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><h3 data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Buguri (Spinning the top)</span></h3><span data-dcnode-id="1573" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1561" id="attachment_17969" style="width: 610px"><img alt="Spinning Top." aria-describedby="caption-attachment-17969" class="size-full wp-image-17969" data-attachment-id="17969" data-comments-opened="0" data-dcnode-id="1572" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Spinning Top. Photographer Karnataka.com&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;Spinning Top. Photographer Karnataka.com&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Spinning Top." data-large-file="https://www.karnataka.com/wp-content/uploads/2016/05/spinning-top-buguri.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2016/05/spinning-top-buguri-288x300.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2016/05/spinning-top-buguri.jpg" data-orig-size="600,624" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/spinning-top-photographer-karnataka-com/" height="624" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2016/05/spinning-top-buguri.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2016/05/spinning-top-buguri.jpg 600w, https://karnataka.b-cdn.net/wp-content/uploads/2016/05/spinning-top-buguri-288x300.jpg 288w" title="Spinning Top." width="600"><p class="wp-caption-text" data-dcnode-id="1570" id="caption-attachment-17969"><span data-dcnode-id="1571" instrument_node="">Spinning Top. Photographer Karnataka.com</span></p><div class="code-block code-block-1" data-dcnode-id="1563" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1569" instrument_node="">
</span><div data-dcnode-id="1565" id="div-gpt-ad-1641798243894-0" style="min-width: 300px; min-height: 250px;"><span data-dcnode-id="1568" instrument_node="">
</span><span data-dcnode-id="1566" instrument_node="">
</span></div><span data-dcnode-id="1564" instrument_node="">
</span></div><span data-dcnode-id="1562" instrument_node="">
</span></div><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Spinning the top or Lattu is a fun game played across many parts of India and Pakistan. It is known as Buguri in Kannada. It is an interesting traditional game where a wooden top is made to spin. There are grooves in the lower half of the top and a nail at the bottom to spin on. A string is wrapped around the grooves to deploy the top and make it spin.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><h3 data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Goti (Marbles)</span></h3><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><img alt="Marbles Game" class="aligncenter size-full wp-image-17971" data-attachment-id="17971" data-comments-opened="0" data-dcnode-id="1553" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Marbles Game" data-large-file="https://www.karnataka.com/wp-content/uploads/2016/05/marbles-game.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2016/05/marbles-game-300x225.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2016/05/marbles-game.jpg" data-orig-size="708,531" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/marbles-game/" height="531" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2016/05/marbles-game.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2016/05/marbles-game.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2016/05/marbles-game-300x225.jpg 300w" title="Marbles Game" width="708"></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Popularly known as marbles, kancha or goli, it is a much loved gully sport in the country. It is called Goti in Kannada. This classic game requires the player to hit the selected target ‘marble’ using his/her own marble ball. The winner of the game walks away with all the marbles of the other players. This game requires aiming and concentration skills on part of the player.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><h3 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Kabaddi</span></h3><span data-dcnode-id="1545" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1531" id="attachment_17944" style="width: 718px"><img alt="Kabbadi in Mysore. Photographer Reuben Strayer " aria-describedby="caption-attachment-17944" class="size-full wp-image-17944" data-attachment-id="17944" data-comments-opened="0" data-dcnode-id="1544" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Kabbadi in Mysore. Photographer Reuben Strayer https:\/\/commons.wikimedia.org\/wiki\/File:Kabaddi_in_Mysore,_Karnataka.jpg&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Kabbadi in Mysore. Photographer Reuben Strayer" data-large-file="https://www.karnataka.com/wp-content/uploads/2007/07/kabaddi-in-mysore-wiki.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2007/07/kabaddi-in-mysore-wiki-300x190.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2007/07/kabaddi-in-mysore-wiki.jpg" data-orig-size="708,448" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/kabaddi-in-mysore-wiki/" height="448" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2007/07/kabaddi-in-mysore-wiki.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2007/07/kabaddi-in-mysore-wiki.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2007/07/kabaddi-in-mysore-wiki-300x190.jpg 300w" title="Kabbadi in Mysore. Photographer Reuben Strayer" width="708"><p class="wp-caption-text" data-dcnode-id="1540" id="caption-attachment-17944"><span data-dcnode-id="1543" instrument_node="">Kabbadi in Mysore. Photographer </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AKabaddi_in_Mysore%2C_Karnataka.jpg"><span data-dcnode-id="1542" instrument_node="">Reuben Strayer</span></a></p><div class="code-block code-block-5" data-dcnode-id="1533" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1539" instrument_node="">

</span><span data-dcnode-id="1536" instrument_node="">
</span></div><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1532" instrument_node="">
</span></div><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Kabbadi is a team sport that originated in ancient India. Two teams occupy opposite halves of an enclosure and each team sends in a raider to the other side in turns. The raider has to tackle members of the opposite team while chanting kabaddi during the raid before he returns to his side of the enclosure. It is a very popular sport that is played not only across India but also in countries like Bangladesh and Maldives.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><h3 data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Kallu Gundu Ettuvudu (Stone Balls)</span></h3><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Kallu Gundu Ettuvudu or Kallata is an outdoor sport of rural Karnataka. It requires the participants to lift round stone balls (called kallu gundu in Kannada) of various sizes and weights. The sport demands that the players be physically strong enough to lift heavy stones.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><h3 data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Pagade</span></h3><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1517" instrument_node="">Pagade is a cross and circle board game that is very similar to the ancient game of Pachisi or Chaupad. This game requires 2 or 4 players to race their respective pawns to reach the innermost square. The origin of the game can be traced to 4</span><sup data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">th</span></sup><span data-dcnode-id="1514" instrument_node=""> century AD and it has remained popular throughout history.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><h3 data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Chowka Bara (Chakaara)</span></h3><span data-dcnode-id="1509" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1505" id="attachment_17958" style="width: 594px"><img alt="Chowka Bara" aria-describedby="caption-attachment-17958" class="size-full wp-image-17958" data-attachment-id="17958" data-comments-opened="0" data-dcnode-id="1508" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Chowka Bara" data-large-file="https://www.karnataka.com/wp-content/uploads/2007/07/Chowka-Bara-wiki.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2007/07/Chowka-Bara-wiki-292x300.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2007/07/Chowka-Bara-wiki.jpg" data-orig-size="584,600" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/chowka-bara-wiki/" height="600" loading="lazy" sizes="(max-width: 584px) 100vw, 584px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2007/07/Chowka-Bara-wiki.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2007/07/Chowka-Bara-wiki.jpg 584w, https://karnataka.b-cdn.net/wp-content/uploads/2007/07/Chowka-Bara-wiki-292x300.jpg 292w" title="Chowka Bara" width="584"><p class="wp-caption-text" data-dcnode-id="1506" id="caption-attachment-17958"><span data-dcnode-id="1507" instrument_node="">Chowka Bara</span></p></div><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Chauka Bara is one of the oldest board games of India that is still played in some parts of the country. It is known as Chowka Bara in Mysuru and as Chakaara or Chakka in north Karnataka. This game is similar to ludo and can be played by 4 players. It is a game of chance that is played with cowry shells (called kavade in Kannada). The players attempt to race their pawns from the starting point to the safety of home. The game improves eye-to-eye coordination and teaches to make strategies.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><h3 data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Ashtapada</span></h3><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Ashtapada is an Indian board game that originated before chess. The game is played on a board having eight-by-eight grid of squares of same colour and the board has special markings known as “castles”. Each player has an even number of game pieces and the objective is to move a game piece around the board in clockwise direction, enter the castle, and regain the castle back in a counter-clockwise direction so as to make the game piece reach the center. It can be played by 2 or 4 players.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><h3 data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Paramapada (Snakes &amp; Ladders)</span></h3><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Snakes &amp; Ladders is a classic board game that originated in ancient India. It is known as Paramapada in Kannada. The game can be played by two or more players on a game-board that has numbered, gridded squares. The board has several ladders and snakes drawn on it. Players have to navigate their game piece from the start to the finish based on die rolls. The ladders help the game piece to progress while the snakes hinder their movement.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><h3 data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Ali Guli Mane</span></h3><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Ali Guli Mane or Channe Mane is a traditional indoor board game of Karnataka. The game is generally played by two players on a wooden board that has 14 pits. The pits are used to store 70 tamarind seeds or cowry shells that act as counters in the game. It is an engaging game that helps to develop logic, hand-eye coordination and concentration.</span></p><span data-dcnode-id="1483" instrument_node="">

</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">A stack of stones, a ball and a focused eye is all you need to play the game of lagori in an open courtyard. This game is quite popular in the North and Eastern states of India and is fondly called pittu, lingochi or palli patti by many. However, it is becoming increasingly popular in Mangalore and a common outdoor norm amongst the youth. The game involves a pile of flat stones and two opposing teams. A player from one team throws the ball at the pile to disrupt it, and runs. The players of the opposite team reach for the ball and run to hit the players of the ball-throwing team who re-make the stack in the meantime without getting hit. It barely makes use of any expensive tools or equipment and is really easy to follow. No wonder it has been gaining heat lately.</span></p><span data-dcnode-id="954" instrument_node="">
</span><h3 data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Adu Huli Aata (Tiger &amp; Goat)</span></h3><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Tiger and goat is a hunt game that is known as Adu Huli Aata in Kannada. The game is played between 2 players where one player gets 3 tigers and the other player has 15 goats. The game is about the tigers trying to kill the goats while the goats look for ways to immobilize the tigers. This game requires planning and concentration on part of both the players.</span></p><span data-dcnode-id="948" instrument_node="">
</span><h3 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Saalu Mane Ata (Nine Men’s Morris)</span></h3><span data-dcnode-id="945" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="941" id="attachment_17967" style="width: 718px"><img alt="Nine Men's Morris. Image Source Berkely.edu " aria-describedby="caption-attachment-17967" class="size-full wp-image-17967" data-attachment-id="17967" data-comments-opened="0" data-dcnode-id="944" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Nine Men's Morris. Image Source Berkely.edu http:\/\/gamescrafters.berkeley.edu\/games.php?game=ninemensmorris&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Nine Men’s Morris. Image Source Berkely.edu" data-large-file="https://www.karnataka.com/wp-content/uploads/2016/05/Saalu-Mane-Ata-nine-mens-morris-board-game.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2016/05/Saalu-Mane-Ata-nine-mens-morris-board-game-300x200.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2016/05/Saalu-Mane-Ata-nine-mens-morris-board-game.jpg" data-orig-size="708,471" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/saalu-mane-ata-nine-mens-morris-board-game/" height="471" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2016/05/Saalu-Mane-Ata-nine-mens-morris-board-game.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2016/05/Saalu-Mane-Ata-nine-mens-morris-board-game.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2016/05/Saalu-Mane-Ata-nine-mens-morris-board-game-300x200.jpg 300w" title="Nine Men's Morris. Image Source Berkely.edu" width="708"><p class="wp-caption-text" data-dcnode-id="942" id="caption-attachment-17967"><span data-dcnode-id="943" instrument_node="">Nine Men’s Morris. Image Source Berkely.edu</span></p></div><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Nine Men’s Morris is a traditional board game that originated in the western world. It is known as Saalu Mane Ata or Jodpi Ata or Char-Par in Kannada and is popular as Navakankari in various parts of India. This alignment game requires 2 players. Each player is given 9 coins and they try to achieve as many points as possible by getting 3 coins in a row on the game board. It is a complex game that requires strategic thinking.</span></p><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Kunte Bille (Hopscotch)</span></h3><span data-dcnode-id="934" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="928" id="attachment_17960" style="width: 718px"><img alt="Kunte Bille. Photographer Rukmini Mala " aria-describedby="caption-attachment-17960" class="size-full wp-image-17960" data-attachment-id="17960" data-comments-opened="0" data-dcnode-id="933" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Kunte Bille. Photographer Rukmini Mala https:\/\/rukminimala.wordpress.com\/2014\/08\/01\/1953\/&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Kunte Bille. Photographer Rukmini Mala" data-large-file="https://www.karnataka.com/wp-content/uploads/2007/07/kunte-bille.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2007/07/kunte-bille-300x210.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2007/07/kunte-bille.jpg" data-orig-size="708,496" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/kunte-bille/" height="496" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2007/07/kunte-bille.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2007/07/kunte-bille.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2007/07/kunte-bille-300x210.jpg 300w" title="Kunte Bille. Photographer Rukmini Mala" width="708"><p class="wp-caption-text" data-dcnode-id="929" id="caption-attachment-17960"><span data-dcnode-id="932" instrument_node="">Kunte Bille. Photographer </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rukminimala.wordpress.com/2014/08/01/1953/"><span data-dcnode-id="931" instrument_node="">Rukmini Mala</span></a></p></div><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Hopscotch is a traditional children’s game that is known as Kunte Bille in Kannada. The game can be played alone or with several players. It involves drawing a court on the ground and then tossing a small object into the numbered rectangles of the court. The player then needs to hop or jump through the spaces in order to retrieve the object.</span></p><span data-dcnode-id="924" instrument_node="">
</span><h3 data-dcnode-id="920"><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.karnataka.com/festivals/kambala/"><span data-dcnode-id="923" instrument_node="">Kambala</span></a><span data-dcnode-id="921" instrument_node=""> (Buffalo Race)</span></h3><span data-dcnode-id="919" instrument_node="">

</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Kambala or Buffalo Race is a rural sport of Karnataka. This traditional sport involves farmers racing the buffaloes through tracks are ploughed into a muddy field that is made slushy with water. The sport is a source of much enjoyment for the rural folks of the state.</span></p><span data-dcnode-id="911" instrument_node="">
</span><h3 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Hagga Jaggata (Tug of War)</span></h3><span data-dcnode-id="908" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="902" id="attachment_17965" style="width: 646px"><img alt="Tug of War. Image source NammaBhoomi " aria-describedby="caption-attachment-17965" class="size-full wp-image-17965" data-attachment-id="17965" data-comments-opened="0" data-dcnode-id="907" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Tug of War. Image source NammaBhoomi http:\/\/www.nammabhoomi.com\/hagga-jaggata\/&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;Tug of War. Image source NammaBhoomi http:\/\/www.nammabhoomi.com\/hagga-jaggata\/&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Tug of War. Image source NammaBhoomi" data-large-file="https://www.karnataka.com/wp-content/uploads/2016/05/hagga-jaggata.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2016/05/hagga-jaggata-300x177.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2016/05/hagga-jaggata.jpg" data-orig-size="636,375" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/tug-of-war-image-source-nammabhoomi-httpwww-nammabhoomi-comhagga-jaggata/" height="375" loading="lazy" sizes="(max-width: 636px) 100vw, 636px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2016/05/hagga-jaggata.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2016/05/hagga-jaggata.jpg 636w, https://karnataka.b-cdn.net/wp-content/uploads/2016/05/hagga-jaggata-300x177.jpg 300w" title="Tug of War. Image source NammaBhoomi" width="636"><p class="wp-caption-text" data-dcnode-id="903" id="caption-attachment-17965"><span data-dcnode-id="906" instrument_node="">Tug of War. Image source </span><a class="broken_link" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nammabhoomi.com/hagga-jaggata/"><span data-dcnode-id="905" instrument_node="">NammaBhoomi</span></a></p></div><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Tug of war or rope pulling is an age-old sport that is known as Hagga Jaggata in Kannada. The sport involves two teams who pull on opposite ends of a rope in a test of strength. The objective is to pull the rope by both teams at opposite ends until one team drags the other over a central line.</span></p><span data-dcnode-id="898" instrument_node="">
</span><h3 data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Naaku Kallu Aata (Four Stone)</span></h3><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Four stone is an ancient traditional game that is known as Naaku Kallu Aata in Karnataka. It requires four independent boxes to be drawn on the ground. One player each stands in the four boxes and tries to take the four stones placed at the centre without being caught by the chaser in the game.</span></p><span data-dcnode-id="892" instrument_node="">
</span><h3 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Hand Wrestling</span></h3><span data-dcnode-id="889" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="885" id="attachment_17956" style="width: 718px"><img alt="Arm Wrestling" aria-describedby="caption-attachment-17956" class="size-full wp-image-17956" data-attachment-id="17956" data-comments-opened="0" data-dcnode-id="888" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;Arm Wrestling&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;Arm Wrestling&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Arm Wrestling" data-large-file="https://www.karnataka.com/wp-content/uploads/2007/07/arm-wrestling.jpg" data-medium-file="https://www.karnataka.com/wp-content/uploads/2007/07/arm-wrestling-300x200.jpg" data-orig-file="https://www.karnataka.com/wp-content/uploads/2007/07/arm-wrestling.jpg" data-orig-size="708,472" data-permalink="https://www.karnataka.com/profile/traditional-games/attachment/arm-wrestling/" height="472" loading="lazy" sizes="(max-width: 708px) 100vw, 708px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.b-cdn.net/wp-content/uploads/2007/07/arm-wrestling.jpg&amp;raw" srcset="https://karnataka.b-cdn.net/wp-content/uploads/2007/07/arm-wrestling.jpg 708w, https://karnataka.b-cdn.net/wp-content/uploads/2007/07/arm-wrestling-300x200.jpg 300w" title="Arm Wrestling" width="708"><p class="wp-caption-text" data-dcnode-id="886" id="caption-attachment-17956"><span data-dcnode-id="887" instrument_node="">Arm Wrestling</span></p></div><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Hand wrestling is enthusiastically played by the folks of rural Karnataka. The game is played with hands where one player has to hold with both hand and fingers his opponent’s hand under the wrist joint very tightly. The objective of the game is to prevent the opponent from freeing his hand from the player’s clutches. Then the player must free his own hand from the opponent’s clutch when his turn comes.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">These are just a few of the exciting traditional games that were once an integral part of Karnataka’s heritage. There are several other games that have been a part of Karnataka’s rich culture. But most of these games are on the verge of being erased from people’s memory these days. These traditional games can be enjoyed even today. Several of these games are quite interesting to play and can help to keep children away from the clutches of electronic games they constantly play on computers and mobiles.</span></p><span data-dcnode-id="878" instrument_node="">
