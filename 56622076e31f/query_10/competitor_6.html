</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="594" width="100%"><tbody data-dcnode-id="596"><tr data-dcnode-id="597"><td align="left" class="navigationurl" data-dcnode-id="598" style="text-align:justify;color: #000000; font-family: calibri,candara,segoe,seoge ui,oprtima,arial,sans-sarif;font-size: 14px; text-decoration: none;" width="100%"><div data-dcnode-id="600"><span data-dcnode-id="640" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-8040656654961143" data-ad-slot="6415560745" data-dcnode-id="632" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="631" instrument_node="">
</span><span data-dcnode-id="628" instrument_node="">
</span></div><span data-dcnode-id="626" instrument_node="">&nbsp;</span><img align="right" alt="Huthri, Traditional Festival, Karnataka." data-dcnode-id="625" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/photos_gallery/63/Huthri_Traditional_Festival_Karnataka.jpg&amp;raw" style="margin-left:7px"><span data-dcnode-id="624" instrument_node="">Huthri is a traditional harvest festival of Karnataka widely known for the variety of dances and folk songs, which are performed on the day of the festival. This harvest festival is celebrated in different parts of the state during the months of November-December. 
</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">
There is a trend among the Indian farmers to celebrate the harvest seasons by worshiping God. The tradition prevails among the Indian farmers because they are more religious and always seek the favor of God. Huthri of Karnataka is a harvest festival celebrated in areas around Coorg in Karnataka. 
</span><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
</span><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node="">
During the months of November-December the paddy fields of Karnataka become prepared to be harvested. This is undoubtedly a very happy moment for the farmers. The paddy becomes ready to cut. The Huthri festival of Karnataka is celebrated at that time. Harvesting begins when the head of the family formally cuts a handful of paddy on a full moon night. 
</span><br data-dcnode-id="615"><span data-dcnode-id="614" instrument_node="">
</span><br data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">
The peasants who come to celebrate this festival take a bunch of crop each and preserve them at home as a sign of good luck and prosperity. The cutting of new crop on a full moon night is hailed by the chants as Poli. The motive of celebrating Huthri is to get the blessings of the God, which will increase the amount of crop year after year. 
</span><br data-dcnode-id="611"><span data-dcnode-id="610" instrument_node="">
</span><br data-dcnode-id="609"><span data-dcnode-id="608" instrument_node="">
This celebration is followed by a cultural activity. Each village represents its own cultural activities. The Huthri festival witnesses a large variety of dances and other folk and cultural activities by the peasants of Karnataka. 
</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">
Even a shot is fired to admire Lord Iguthappa, the God of the Kadova people. 
</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">
</span><br data-dcnode-id="601"></div><span data-dcnode-id="599" instrument_node="">
