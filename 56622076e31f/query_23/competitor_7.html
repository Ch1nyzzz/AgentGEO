</span><span class="what-you-can-do__item-text" data-dcnode-id="1338"><p data-dcnode-id="1340"><span data-dcnode-id="1350" instrument_node="">Join our global community of changemakers by following us on </span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/AnimalsAustralia"><span data-dcnode-id="1349" instrument_node="">Facebook</span></a><span data-dcnode-id="1347" instrument_node="">, </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/animalsaustralia/"><span data-dcnode-id="1346" instrument_node="">Instagram</span></a><span data-dcnode-id="1344" instrument_node=""> or </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/AnimalsAus"><span data-dcnode-id="1343" instrument_node="">Twitter</span></a><span data-dcnode-id="1341" instrument_node="">.</span></p><span data-dcnode-id="1339" instrument_node="">
</span></span><span data-dcnode-id="1337" instrument_node="">

</span><article class="article-detail__body" data-dcnode-id="862"><span data-dcnode-id="1326" instrument_node="">
</span><div class="text-content text-content--single" data-dcnode-id="1292"><span data-dcnode-id="1325" instrument_node="">
</span><div class="container container--8-col" data-dcnode-id="1294"><span data-dcnode-id="1324" instrument_node="">
</span><div class="text-content__grid" data-dcnode-id="1296"><span data-dcnode-id="1323" instrument_node="">
</span><div class="text-content__col" data-dcnode-id="1298"><span data-dcnode-id="1322" instrument_node="">
</span><div class="wysiwyg" data-dcnode-id="1300"><p class="lead" data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">That laws protect the vulnerable is one of the most basic tenets of society. So, many people are shocked to learn that this isn’t the case for some of the most vulnerable and defenceless members of our community.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">The stark reality is that — under Australian law —&nbsp;</span><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">not all animals are protected</span></strong><span data-dcnode-id="1315" instrument_node="">. In fact, the law ‘protects’ or ‘exempts’ animals not by their capacity to suffer, but by their ‘value’ or ‘use’ to humans.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1312" instrument_node="">This means that an animal — whether a dog, a chicken, a pig, a rabbit, a sheep, and so on — is fully protected if they are valued as a ‘pet’ or ‘companion’. However, if you take that&nbsp;</span><em data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">very same animal</span></em><span data-dcnode-id="1309" instrument_node="">&nbsp;out of the domestic environment and place them for use in a farm or breeding facility (or even a research lab), then&nbsp;</span><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">they lose important protections under animal cruelty laws</span></strong><span data-dcnode-id="1306" instrument_node="">.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Why? Because the law would no longer regard them as domestic pets or companions. Instead, they are defined as ‘production animals’ which allows decisions around their wellbeing to be balanced with industry interests.</span></p><span data-dcnode-id="1301" instrument_node="">
</span></div><span data-dcnode-id="1299" instrument_node="">
</span></div><span data-dcnode-id="1297" instrument_node="">
</span></div><span data-dcnode-id="1295" instrument_node="">
</span></div><span data-dcnode-id="1293" instrument_node="">
</span></div><span data-dcnode-id="1291" instrument_node="">

</span><figcaption class="image__caption" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">
											While many jurisdictions around the world are phasing out barren battery cages, in Australia it remains legal to keep hens in cages for their entire productive lives. Hens experience chronic frustration in battery cages, unable to express important natural behaviours. 
					
									</span></figcaption><span data-dcnode-id="1252" instrument_node="">

</span><div class="text-content__grid" data-dcnode-id="1196"><span data-dcnode-id="1243" instrument_node="">
</span><div class="text-content__col" data-dcnode-id="1198"><span data-dcnode-id="1242" instrument_node="">
</span><div class="wysiwyg" data-dcnode-id="1200"><h4 data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">What are animal cruelty laws and how are farmed animals excluded?</span></h4><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1238" instrument_node="">Each State in Australia has its own animal welfare legislation. For example, in NSW it’s called the&nbsp;</span><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/html/inforce/current/act-1979-200" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1237" instrument_node="">Prevention of Cruelty to Animals Act 1979</span></a><span data-dcnode-id="1235" instrument_node="">&nbsp;and in South Australia it’s called the&nbsp;</span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.sa.gov.au/lz/c/a/animal%2520welfare%2520act%25201985.aspx" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1234" instrument_node="">Animal Welfare Act 1985</span></a><span data-dcnode-id="1232" instrument_node="">.&nbsp;</span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.qld.gov.au/view/pdf/2016-07-01/act-2001-064" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1231" instrument_node="">Queensland</span></a><span data-dcnode-id="1229" instrument_node="">,&nbsp;</span><a data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.vic.gov.au/in-force/acts/prevention-cruelty-animals-act-1986/095" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1228" instrument_node="">Victoria</span></a><span data-dcnode-id="1226" instrument_node="">,&nbsp;</span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.tas.gov.au/view/html/inforce/current/act-1993-063" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1225" instrument_node="">Tasmania</span></a><span data-dcnode-id="1223" instrument_node="">,&nbsp;</span><a data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.wa.gov.au/legislation/statutes.nsf/main_mrtitle_50_homepage.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1222" instrument_node="">Western Australia</span></a><span data-dcnode-id="1220" instrument_node="">, the&nbsp;</span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.act.gov.au/a/1992-45/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1219" instrument_node="">ACT</span></a><span data-dcnode-id="1217" instrument_node="">&nbsp;and the&nbsp;</span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//legislation.nt.gov.au/Legislation/ANIMAL-WELFARE-ACT-1999" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1216" instrument_node="">Northern Territory</span></a><span data-dcnode-id="1214" instrument_node="">&nbsp;each also have their own version of an ‘Animal Welfare Act’.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Each Act prohibits cruelty to animals. However, in each of these Acts there are ‘carve out’ clauses that exclude certain animals from the anti-cruelty protections if they are defined as ‘stock’ or farm animals, or animals used in research.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1208" instrument_node="">These ‘excluded’ animals are pulled out from the protection of the Acts and placed under industry&nbsp;</span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publish.csiro.au/books/series/11" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1207" instrument_node="">Codes of Practice</span></a><a data-dcnode-id="1204" rel="nofollow"><span data-dcnode-id="1205" instrument_node="">[1]</span></a><span data-dcnode-id="1203" instrument_node="">. These Codes of Practice operate to exclude hundreds of millions of animals from anti-cruelty protections, most of them in factory farms.</span></p><span data-dcnode-id="1201" instrument_node="">
</span></div><span data-dcnode-id="1199" instrument_node="">
</span></div><span data-dcnode-id="1197" instrument_node="">
</span></div><span data-dcnode-id="1195" instrument_node="">
</span></div><span data-dcnode-id="1193" instrument_node="">
</span></div><span data-dcnode-id="1191" instrument_node="">
</span><figure :class="{ 'image--censored': active }" class="image image--full-meta" data-dcnode-id="1149" x-data="{ active: false }"><span data-dcnode-id="1190" instrument_node="">
</span><div class="container" data-dcnode-id="1157"><span data-dcnode-id="1189" instrument_node="">

</span><button @click="active = false" class="button button--light-inverted button--thin" data-dcnode-id="1171"><span class="button__text" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Show image</span></span></button><span data-dcnode-id="1170" instrument_node="">

</span><div class="lazyload-asset lazyload-asset--loaded" data-dcnode-id="1163"><img alt="A broiler chicken farm" class="lazyload-asset__media lazyloaded" data-dcnode-id="1164" data-src="https://cdn.animalsaustralia.org/wp-content/uploads/2021/11/25115228/Broilers-900x450.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.animalsaustralia.org/wp-content/uploads/2021/11/25115228/Broilers-900x450.jpg&amp;raw"></div><span data-dcnode-id="1162" instrument_node="">
</span></div><span data-dcnode-id="1160" instrument_node="">
</span></div><span data-dcnode-id="1158" instrument_node="">
</span></div><span data-dcnode-id="1156" instrument_node="">
</span><div class="image__meta caption container" data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">
</span><figcaption class="image__caption" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">
											Chickens raised for meat are crammed into sheds by the tens of thousands for their entire six-week lives. During this time sheds are not cleaned and are left to accumulate with pungent faeces which can burn the skin and lungs of the chicks inside.
					
									</span></figcaption><span data-dcnode-id="1152" instrument_node="">
</span></div><span data-dcnode-id="1150" instrument_node="">
</span></figure><span data-dcnode-id="1148" instrument_node="">
</span><div class="spacer--sm" data-dcnode-id="1147"></div><span data-dcnode-id="1146" instrument_node="">
</span><div class="text-content text-content--single" data-dcnode-id="1088"><span data-dcnode-id="1145" instrument_node="">
</span><div class="container container--8-col" data-dcnode-id="1090"><span data-dcnode-id="1144" instrument_node="">
</span><div class="text-content__grid" data-dcnode-id="1092"><span data-dcnode-id="1143" instrument_node="">
</span><div class="text-content__col" data-dcnode-id="1094"><span data-dcnode-id="1142" instrument_node="">
</span><div class="wysiwyg" data-dcnode-id="1096"><p data-dcnode-id="1125"><span data-dcnode-id="1141" instrument_node="">It is these Codes of Practice (adopted by each State) that allow sensitive and intelligent&nbsp;</span><strong data-dcnode-id="1137"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publish.csiro.au/ebook/download/pdf/5698" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1140" instrument_node="">mother pigs</span></a><span data-dcnode-id="1138" instrument_node="">&nbsp;to be locked up in crates barely bigger than their bodies</span></strong><span data-dcnode-id="1136" instrument_node="">;&nbsp;</span><strong data-dcnode-id="1132"><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publish.csiro.au/ebook/download/pdf/5698" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1135" instrument_node="">piglets</span></a><span data-dcnode-id="1133" instrument_node="">&nbsp;to have their tails sliced off and teeth cut without any form of pain relief</span></strong><span data-dcnode-id="1131" instrument_node="">; and egg&nbsp;</span><strong data-dcnode-id="1127"><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publish.csiro.au/ebook/download/pdf/3451" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1130" instrument_node="">laying hens</span></a><span data-dcnode-id="1128" instrument_node="">&nbsp;to suffer their entire lives in battery cages</span></strong><span data-dcnode-id="1126" instrument_node="">&nbsp;where they can’t even stretch their wings.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1123" instrument_node="">Thanks to Codes of Practice, it is not only legal but ‘business-as-usual’ for&nbsp;</span><strong data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">millions of&nbsp;</span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.publish.csiro.au/ebook/download/pdf/3451" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1121" instrument_node="">‘meat chickens’</span></a><span data-dcnode-id="1119" instrument_node="">&nbsp;to suffer and die every year</span></strong><span data-dcnode-id="1117" instrument_node="">&nbsp;because they’ve been bred to grow so unnaturally fast that their hearts and bodies can give out at just a few weeks old.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">These animals experience pain and suffering in the same ways as our beloved pets. Just like cats and dogs, they can have rich social and emotional lives, form strong bonds and seek out affection. Yet&nbsp;</span><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">the Australian legal system actively and deliberately excludes these ‘farmed’ animals from protection against cruel treatment</span></strong><span data-dcnode-id="1111" instrument_node="">&nbsp;and denies them any quality of life.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1108" instrument_node="">How can this be when Australians love animals? We give our pets the best life we can, we fiercely oppose whaling, and are horrified by the killing of seals for&nbsp;</span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsaustralia.org/take_action/pledge/fur/" rel="noopener" target="_blank"><span data-dcnode-id="1107" instrument_node="">fur</span></a><span data-dcnode-id="1105" instrument_node="">. As a nation we abhor cruelty to animals, but&nbsp;</span><strong data-dcnode-id="1100"><span data-dcnode-id="1104" instrument_node="">few of us realise that legally sanctioned acts of cruelty to animals happen&nbsp;</span><em data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">every day</span></em><span data-dcnode-id="1101" instrument_node="">&nbsp;in Australia</span></strong><span data-dcnode-id="1099" instrument_node="">.</span></p><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1095" instrument_node="">
</span></div><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1091" instrument_node="">
</span></div><span data-dcnode-id="1089" instrument_node="">
</span></div><span data-dcnode-id="1087" instrument_node="">
</span><div class="text-content text-content--single" data-dcnode-id="1045"><span data-dcnode-id="1086" instrument_node="">
</span><div class="container container--8-col" data-dcnode-id="1047"><span data-dcnode-id="1085" instrument_node="">
</span><div class="text-content__grid" data-dcnode-id="1049"><span data-dcnode-id="1084" instrument_node="">
</span><div class="text-content__col" data-dcnode-id="1051"><span data-dcnode-id="1083" instrument_node="">
</span><div class="wysiwyg" data-dcnode-id="1053"><h4 data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Who set these Codes of Practice? How could this happen?</span></h4><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Early in the 20th century, the States began exempting particular types of farming practices from the anti-cruelty legislation (for example, castration and dehorning of cattle). By the 1970s and 1980s, these exemptions became so widely accepted across general farming practices that industry and government moved to ‘codify’ them as ‘model blanket exemptions’.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">At that time, animal welfare advocates did not have a seat at the table when it came to government regulation and policy-setting. The government department responsible for setting and regulating animal welfare was — and continues to be — the Department of Agriculture in each State. There is an inherent&nbsp;</span><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">conflict of interest</span></em><span data-dcnode-id="1073" instrument_node="">&nbsp;that exists here because the Department of Agriculture wears two hats: promoting and expanding the interests of industry; and animal welfare regulation.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1070" instrument_node="">Many&nbsp;</span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//classic.austlii.edu.au/au/journals/FedLawRw/2007/14.html%23Heading26" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1069" instrument_node="">legal</span></a><span data-dcnode-id="1067" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digital.library.adelaide.edu.au/dspace/bitstream/2440/127174/1/Russell2018_PhD.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1066" instrument_node="">academic scholars</span></a><span data-dcnode-id="1064" instrument_node="">&nbsp;have written extensively on this conflict of interest and resultant ‘legalised cruelty’ that persists. With some&nbsp;</span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bawp.org.au/wp-content/uploads/2013/07/3-14.-The-fox-is-in-charge-of-the-chickens-30.03.07.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1063" instrument_node="">describing</span></a><span data-dcnode-id="1061" instrument_node="">&nbsp;this system as the ‘fox being in charge of the hen-house’.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1055"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">The primary reason for setting these Codes of Practice has been to ensure that animal industries remain as profitable as possible — no matter what the cost in terrible, and avoidable, animal suffering.</span></strong><span data-dcnode-id="1056" instrument_node="">&nbsp;The economic efficiency term for this is known as “economies of scale”. That is, increasing profits by lowering costs. This has led to the intensification — or ‘factory farming’ — of more than 500 million animals a year in Australia.</span></p><span data-dcnode-id="1054" instrument_node="">
</span></div><span data-dcnode-id="1052" instrument_node="">
</span></div><span data-dcnode-id="1050" instrument_node="">

</span><div class="lazyload-asset lazyload-asset--loaded" data-dcnode-id="1016"><img alt="A mother pig with her piglets looking out from sow stall" class="lazyload-asset__media lazyloaded" data-dcnode-id="1017" data-src="https://cdn.animalsaustralia.org/wp-content/uploads/2021/12/10180810/Pig_Still_2-900x450.png?theia_smart_thumbnails_file_version=2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.animalsaustralia.org/wp-content/uploads/2021/12/10180810/Pig_Still_2-900x450.png%3Ftheia_smart_thumbnails_file_version%3D2&amp;raw"></div><span data-dcnode-id="1015" instrument_node="">

</span><figcaption class="image__caption" data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">
											The confinement of mother pigs in 'farrowing' crates is perhaps one of the cruelest practices that has been entrenched by our laws. These crates are barely bigger than the pig herself and deny her the ability to interact naturally with her piglets.
					
											</span><span class="image__credit" data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">

</span><div class="text-content text-content--single" data-dcnode-id="937"><span data-dcnode-id="992" instrument_node="">
</span><div class="container container--8-col" data-dcnode-id="939"><span data-dcnode-id="991" instrument_node="">
</span><div class="text-content__grid" data-dcnode-id="941"><span data-dcnode-id="990" instrument_node="">
</span><div class="text-content__col" data-dcnode-id="943"><span data-dcnode-id="989" instrument_node="">
</span><div class="wysiwyg" data-dcnode-id="945"><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Lowering costs to increase profits means:</span></p><span data-dcnode-id="986" instrument_node="">
</span><ul data-dcnode-id="972"><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">more animals packed and confined in less space;</span></li><span data-dcnode-id="982" instrument_node="">
</span><li data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">more antibiotic use due to increased illness and injury from the stresses of close confinement and over-crowding of animals;</span></li><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">cruel, unnecessary procedures such as beak and teeth cutting and tail docking — performed to reduce injuries caused if confined animals take out their frustrations on each other; and</span></li><span data-dcnode-id="976" instrument_node="">
</span><li data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">no provision of pain relief for these procedures, or others routinely carried out such as castration.</span></li><span data-dcnode-id="973" instrument_node="">
</span></ul><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">Some of the Codes of Practice have over the past decade been updated as&nbsp;</span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.animalwelfarestandards.net.au/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="969" instrument_node="">‘Standards and Guidelines’</span></a><span data-dcnode-id="967" instrument_node="">, but continue to permit cruel and outdated practices.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="962"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Put simply, these Codes of Practice and recently released ‘Standards’ are frameworks for legalised animal cruelty.</span></strong></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="960" instrument_node="">Codes of Practice also cover animals used in&nbsp;</span><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsaustralia.org/issues/rodeos.php" rel="noopener" target="_blank"><span data-dcnode-id="959" instrument_node="">rodeos</span></a><span data-dcnode-id="957" instrument_node="">,&nbsp;</span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsaustralia.org/issues/circuses.php" rel="noopener" target="_blank"><span data-dcnode-id="956" instrument_node="">circuses</span></a><span data-dcnode-id="954" instrument_node="">, theme parks or those&nbsp;</span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsaustralia.org/issues/duck_shooting.php"><span data-dcnode-id="953" instrument_node="">hunted for ‘sport’</span></a><span data-dcnode-id="951" instrument_node="">&nbsp;— allowing them to be treated in a way that would be illegal if those responsible were accountable to&nbsp;</span><em data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">actual</span></em><span data-dcnode-id="948" instrument_node="">&nbsp;animal cruelty laws.</span></p><span data-dcnode-id="946" instrument_node="">
</span></div><span data-dcnode-id="944" instrument_node="">
</span></div><span data-dcnode-id="942" instrument_node="">
</span></div><span data-dcnode-id="940" instrument_node="">
</span></div><span data-dcnode-id="938" instrument_node="">
</span></div><span data-dcnode-id="936" instrument_node="">
</span><div class="text-content text-content--single" data-dcnode-id="893"><span data-dcnode-id="935" instrument_node="">
</span><div class="container" data-dcnode-id="928"><span data-dcnode-id="934" instrument_node="">
</span><h2 class="text-content__heading" data-dcnode-id="930"><span data-dcnode-id="933" instrument_node="">Help shape a </span><mark data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">kinder world</span></mark></h2><span data-dcnode-id="929" instrument_node="">
</span></div><span data-dcnode-id="927" instrument_node="">
</span><div class="container container--8-col" data-dcnode-id="895"><span data-dcnode-id="926" instrument_node="">
</span><div class="text-content__grid" data-dcnode-id="897"><span data-dcnode-id="925" instrument_node="">
</span><div class="text-content__col" data-dcnode-id="899"><span data-dcnode-id="924" instrument_node="">
</span><div class="wysiwyg" data-dcnode-id="905"><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">For decades, animal protection groups have sought to change these outdated laws and practices only to come up against an invisible, impenetrable barrier… an inherited belief system — enshrined in law — that deems animals raised for food less worthy of kindness and protection.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">As demand for animal products has grown, farms have become factories and our laws have forgotten that there are living, feeling beings inside them.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">We may have inherited these systems, but we don’t have to keep them. We can be the generation that ends factory farming, that draws a line in the sand and declares that all animals deserve kindness and a life worth living.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="914" instrument_node="">As author and sustainable food advocate Anna Lappe once wrote,&nbsp;</span><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">“Every time you spend money, you’re casting a vote for the kind of world you want”</span></em><span data-dcnode-id="911" instrument_node="">. Every time you&nbsp;</span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animalsaustralia.org/take-action/plant-based-living/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="910" instrument_node="">choose a plant-based meal</span></a><span data-dcnode-id="908" instrument_node="">&nbsp;over an animal-based one you’re helping to reduce the demand that has led to animals being treated so cruelly. You’re casting a vote for a kinder world for all.</span></p><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span><a class="button--wrap button link-reset" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animalsaustralia.org/take-action/campaigns-and-investigations/join-the-evolution/" target=""><span class="button__text" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">GET YOUR FREE KIND LIVING GUIDE</span></span></a><span data-dcnode-id="900" instrument_node="">
</span></div><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span></div><span data-dcnode-id="894" instrument_node="">
</span></div><span data-dcnode-id="892" instrument_node="">
</span><hr data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">
</span><div class="text-content text-content--single" data-dcnode-id="864"><span data-dcnode-id="889" instrument_node="">
</span><div class="container container--8-col" data-dcnode-id="866"><span data-dcnode-id="888" instrument_node="">
</span><div class="text-content__grid" data-dcnode-id="868"><span data-dcnode-id="887" instrument_node="">
</span><div class="text-content__col" data-dcnode-id="870"><span data-dcnode-id="886" instrument_node="">
</span><div class="wysiwyg" data-dcnode-id="872"><p class="borderTop subtitle" data-dcnode-id="883" id="references"><span class="sml_bodytext" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">References</span></span></p><span data-dcnode-id="882" instrument_node="">
</span><p class="caption" data-dcnode-id="874" id="ref1"><span data-dcnode-id="881" instrument_node="">[1] There is an&nbsp;</span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agriculture.gov.au/animal/welfare/standards-guidelines" rel="nofollow noopener" target="_blank"><span data-dcnode-id="880" instrument_node="">Australia-wide strategy</span></a><span data-dcnode-id="878" instrument_node="">&nbsp;to review the Codes of Practice and instead implement nationally consistent&nbsp;</span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.agriculture.gov.au/animal/welfare/standards-guidelines" rel="nofollow noopener" target="_blank"><span data-dcnode-id="877" instrument_node="">Standards and Guidelines</span></a><span data-dcnode-id="875" instrument_node="">. This work is currently underway; however it simply pulls the State-based Codes into a national framework. The end result is that ‘production’ and ‘stock’ animals are still exempted under animal cruelty laws.</span></p><span data-dcnode-id="873" instrument_node="">
</span></div><span data-dcnode-id="871" instrument_node="">
</span></div><span data-dcnode-id="869" instrument_node="">

</span><h3 class="article__title h4" data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">

</span></h3><span data-dcnode-id="821" instrument_node="">
</span><p class="article__description" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Shocking footage has revealed the routine, painful mutilations that animals are enduring on Australian cattle stations. </span></p><span data-dcnode-id="818" instrument_node="">

</span><a class="article__category link-reset" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//animalsaustralia.org/our-work/farmed-animals/"><span data-dcnode-id="796" instrument_node="">Farmed animals</span></a><span data-dcnode-id="794" instrument_node="">
</span><h3 class="article__title h4" data-dcnode-id="789"><span data-dcnode-id="793" instrument_node="">
