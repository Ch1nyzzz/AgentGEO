</span><h1 class="entry-title" data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">HISTORY OF ANIMAL&nbsp;CRUELTY</span></h1><span data-dcnode-id="2897" instrument_node="">
</span></header><span data-dcnode-id="2895" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1832"><span data-dcnode-id="2894" instrument_node="">
</span><h3 data-dcnode-id="2892" style="color:rgb(3,29,3);"><span data-dcnode-id="2893" instrument_node="">Animal Cruelty:</span></h3><span data-dcnode-id="2891" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2889"><img alt="" class="wp-image-358" data-attachment-id="358" data-comments-opened="0" data-dcnode-id="2890" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="1-1" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/1-1.jpg?w=750" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/1-1.jpg?w=300" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/1-1.jpg" data-orig-size="1024,675" data-permalink="https://humanityfornature.wordpress.com/1-1/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/1-1.jpg%3Fw%3D1024&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/1-1.jpg 1024w, https://humanityfornature.files.wordpress.com/2020/06/1-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/1-1.jpg?w=300 300w, https://humanityfornature.files.wordpress.com/2020/06/1-1.jpg?w=768 768w"></figure><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2850" style="color:green;"><span data-dcnode-id="2887" instrument_node="">Cruelty and neglect cross all social and economic boundaries and media</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">reports suggest that animal abuse is common in both rural and urban areas</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">Most common victims</span><br data-dcnode-id="2882"><span data-dcnode-id="2881" instrument_node="">The animals whose abuse is most often reported are dogs cats horses and</span><br data-dcnode-id="2880"><span data-dcnode-id="2879" instrument_node="">livestock Undercover investigations have revealed that animal abuse</span><br data-dcnode-id="2878"><span data-dcnode-id="2877" instrument_node="">abounds in the factory farm industry But because of the weak protections</span><br data-dcnode-id="2876"><span data-dcnode-id="2875" instrument_node="">afforded to livestock under state cruelty laws only the most shocking cases</span><br data-dcnode-id="2874"><span data-dcnode-id="2873" instrument_node="">are reported and few are ever prosecuted</span><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">Organized cruelty</span><br data-dcnode-id="2870"><span data-dcnode-id="2869" instrument_node="">Intentional cruelty to animals is strongly correlated with other crimes</span><br data-dcnode-id="2868"><span data-dcnode-id="2867" instrument_node="">including violence against people</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">Hoarding behavior often victimizes animals Sufferers of a hoarding</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node="">disorder may impose severe neglect on animals by housing far more than</span><br data-dcnode-id="2862"><span data-dcnode-id="2861" instrument_node="">they are able to adequately take care of Serious animal neglect such as</span><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">hoarding is often an indicator of people in need of social or mental</span><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node="">health services</span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node="">Surveys suggest that those who intentionally abuse animals are</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">predominantly men under while those involved in animal hoarding are</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">more likely to be women over 60.</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2837" style="color:green;"><span data-dcnode-id="2848" instrument_node="">The shocking number of animal cruelty cases reported every day is just the</span><br data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">tip of the icebergmost cases are never reported Unlike violent crimes</span><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">against people cases of animal abuse are not compiled by state or federal</span><br data-dcnode-id="2843"><span data-dcnode-id="2842" instrument_node="">agencies making it dicult to calculate just how common they are</span><br data-dcnode-id="2841"><span data-dcnode-id="2840" instrument_node="">However we can use the information that is available to try to understand</span><br data-dcnode-id="2839"><span data-dcnode-id="2838" instrument_node="">and prevent cases of abuse</span></p><span data-dcnode-id="2836" instrument_node="">
</span><h3 data-dcnode-id="2834" style="color:rgb(3,29,3);"><span data-dcnode-id="2835" instrument_node="">History of Animal Cruelty:</span></h3><span data-dcnode-id="2833" instrument_node="">
</span><p data-dcnode-id="2827" style="color:green;"><span data-dcnode-id="2832" instrument_node="">Throughout history our livelihood has been interwoven with animals. People have harnessed animal muscle power and used</span><br data-dcnode-id="2831"><span data-dcnode-id="2830" instrument_node="">animals’ bodies for fuel, skins, food, and countless products allowing people to thrive. Linda Kalof’s shares some fascinating,</span><br data-dcnode-id="2829"><span data-dcnode-id="2828" instrument_node="">but also gruesome, history in her book Looking at Animals in Human History (2007).</span></p><span data-dcnode-id="2826" instrument_node="">
</span><p data-dcnode-id="2820" style="color:green;"><span data-dcnode-id="2825" instrument_node="">Animals in Antiquity</span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">In early history, 5000 BC – 500 AD, animals were used intensively for their muscle power, as draught animals to pull plows or sleds</span><br data-dcnode-id="2822"><span data-dcnode-id="2821" instrument_node="">with blocks of limestone for construction.</span></p><span data-dcnode-id="2819" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2816"><figure class="aligncenter size-large" data-dcnode-id="2817"><img alt="" class="wp-image-359" data-attachment-id="359" data-comments-opened="0" data-dcnode-id="2818" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="2-1" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/2-1.jpg?w=750" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/2-1.jpg?w=300" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/2-1.jpg" data-orig-size="1000,649" data-permalink="https://humanityfornature.wordpress.com/2-1/" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/2-1.jpg%3Fw%3D1000&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/2-1.jpg 1000w, https://humanityfornature.files.wordpress.com/2020/06/2-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/2-1.jpg?w=300 300w, https://humanityfornature.files.wordpress.com/2020/06/2-1.jpg?w=768 768w"></figure></div><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2805" style="color:green;"><span data-dcnode-id="2814" instrument_node="">Animal muscle power was also needed in times of war. Horses carried soldiers and pulled chariots in battle and animals were sometimes</span><br data-dcnode-id="2813"><span data-dcnode-id="2812" instrument_node="">used as weapons of war. The ancient warrior Hannibal tied sticks to the horns of cattle and set them ablaze to create diversion</span><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">his invasions. Elephants were also drawn into military conflicts though less successfully.</span><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node="">And animals in ancient Rome were often used for entertainment in the Colosseum. Animals were kept below the arena floor and hoisted up</span><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node="">for slaughter, or starved and goaded into attacking criminals or Christians in the Colosseum to amuse the crowds.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2796" style="color:green;"><span data-dcnode-id="2803" instrument_node="">Animals in the Middle Ages</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">During the Middle Ages (500-1400) life was filled with fear of violence, pestilence and disease. Animals were often blamed for human</span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">illness. Dogs and cats running free in the villages were apt to be scapegoated for spreading the plague so were frequently hunted or</span><br data-dcnode-id="2798"><span data-dcnode-id="2797" instrument_node="">burned.</span></p><span data-dcnode-id="2795" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2792"><figure class="aligncenter size-large" data-dcnode-id="2793"><img alt="" class="wp-image-360" data-attachment-id="360" data-comments-opened="0" data-dcnode-id="2794" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="3-2" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/3-2.jpg?w=407" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/3-2.jpg?w=300" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/3-2.jpg" data-orig-size="407,349" data-permalink="https://humanityfornature.wordpress.com/3-2/" sizes="(max-width: 407px) 100vw, 407px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/3-2.jpg%3Fw%3D407&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/3-2.jpg 407w, https://humanityfornature.files.wordpress.com/2020/06/3-2.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/3-2.jpg?w=300 300w"></figure></div><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2785" style="color:green;"><span data-dcnode-id="2790" instrument_node="">Medieval villages often used animal baiting for entertainment of the public at festivals and holidays. Baiting involved securing an</span><br data-dcnode-id="2789"><span data-dcnode-id="2788" instrument_node="">unfortunate animal, usually a bear, horse or bull, to a stake to prevent escape and then subjecting it to attack by a pack of trained</span><br data-dcnode-id="2787"><span data-dcnode-id="2786" instrument_node="">dogs.</span></p><span data-dcnode-id="2784" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2781"><figure class="aligncenter size-large" data-dcnode-id="2782"><img alt="" class="wp-image-361" data-attachment-id="361" data-comments-opened="0" data-dcnode-id="2783" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="4-3" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/4-3.jpg?w=230" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/4-3.jpg?w=230" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/4-3.jpg" data-orig-size="230,252" data-permalink="https://humanityfornature.wordpress.com/4-3/" sizes="(max-width: 230px) 100vw, 230px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/4-3.jpg%3Fw%3D230&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/4-3.jpg 230w, https://humanityfornature.files.wordpress.com/2020/06/4-3.jpg?w=137 137w"></figure></div><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2774" style="color:green;"><span data-dcnode-id="2779" instrument_node="">Public executions of people were also popular at the time. Animals, too, were also sometimes accused and convicted of crimes and</span><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node="">sentenced to public hanging or worse. Pigs were often the focus of these executions. Because swine in this era were not harnessed or</span><br data-dcnode-id="2776"><span data-dcnode-id="2775" instrument_node="">controlled like other farm animals, free roaming pigs sometimes attacked children in Medieval villages.</span></p><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2765" style="color:green;"><span data-dcnode-id="2772" instrument_node="">Animals in the Renaissance</span><br data-dcnode-id="2771"><span data-dcnode-id="2770" instrument_node="">During the Renaissance (1400-1600) people became more curious about how nature and biology worked. Farmers learned more ways to breed</span><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node="">and raise domestic stock animals which led to a sharp rise in the consumption of meat during the fourteenth and fifteenth centuries.</span><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">In addition to consumption, animals were used as a way of conferring status.</span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2758" style="color:green;"><span data-dcnode-id="2763" instrument_node="">Trophy hunting was a popular way to display the power and status of men, but much of it had to be done under artificial conditions,</span><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node="">using game animals who were enclosed in parks or herded into nets due to fewer wild animals available to hunt. People continued to</span><br data-dcnode-id="2760"><span data-dcnode-id="2759" instrument_node="">fear the plague and often persecuted free roaming dogs or cats suspecting them of disease.</span></p><span data-dcnode-id="2757" instrument_node="">
</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="2727" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="2728" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="2738" id="swiper-wrapper-81c7ff9d672aa6fa" style="width: 4500px; transform: translate3d(-750px, 0px, 0px); height: 455px; transition-duration: 0ms;"><li aria-hidden="true" aria-label="1 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev" data-dcnode-id="2754" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2755"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-370" data-dcnode-id="2756" data-id="370" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/13.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/13.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/13.jpg?w=150 150w"></figure></li><li aria-hidden="false" aria-label="2 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-active" data-dcnode-id="2751" data-swiper-slide-index="0" role="group" style="width: 750px;" tabindex="-1"><figure data-dcnode-id="2752"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-367" data-dcnode-id="2753" data-id="367" sizes="(max-width: 286px) 100vw, 286px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/8-1.jpg%3Fw%3D286&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/8-1.jpg 286w, https://humanityfornature.files.wordpress.com/2020/06/8-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="3 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-next" data-dcnode-id="2748" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2749"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-368" data-dcnode-id="2750" data-id="368" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/9-1.jpg%3Fw%3D1024&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/9-1.jpg 1024w, https://humanityfornature.files.wordpress.com/2020/06/9-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/9-1.jpg?w=300 300w, https://humanityfornature.files.wordpress.com/2020/06/9-1.jpg?w=768 768w"></figure></li><li aria-hidden="true" aria-label="4 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide" data-dcnode-id="2745" data-swiper-slide-index="2" role="group" style="width: 750px;"><figure data-dcnode-id="2746"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-369" data-dcnode-id="2747" data-id="369" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/10-1.jpg%3Fw%3D1024&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/10-1.jpg?w=1024 1024w, https://humanityfornature.files.wordpress.com/2020/06/10-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/10-1.jpg?w=300 300w, https://humanityfornature.files.wordpress.com/2020/06/10-1.jpg?w=768 768w, https://humanityfornature.files.wordpress.com/2020/06/10-1.jpg 1140w"></figure></li><li aria-hidden="true" aria-label="5 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate-prev" data-dcnode-id="2742" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2743"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-370" data-dcnode-id="2744" data-id="370" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/13.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/13.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/13.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="6 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="2739" data-swiper-slide-index="0" role="group" style="width: 750px;"><figure data-dcnode-id="2740"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-367" data-dcnode-id="2741" data-id="367" sizes="(max-width: 286px) 100vw, 286px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/8-1.jpg%3Fw%3D286&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/8-1.jpg 286w, https://humanityfornature.files.wordpress.com/2020/06/8-1.jpg?w=150 150w"></figure></li></ul><a aria-controls="swiper-wrapper-81c7ff9d672aa6fa" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="2737" role="button" style="top: 227px;" tabindex="0"></a><a aria-controls="swiper-wrapper-81c7ff9d672aa6fa" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="2736" role="button" style="top: 227px;" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="2735" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="2730"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="2734" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="2733" role="button" tabindex="0"></button><button aria-label="Go to slide 3" class="swiper-pagination-bullet" data-dcnode-id="2732" role="button" tabindex="0"></button><button aria-label="Go to slide 4" class="swiper-pagination-bullet" data-dcnode-id="2731" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="2729"></span></div></div><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2722" style="color:green;"><span data-dcnode-id="2725" instrument_node="">Karlof reports one horrendous event in May of 1636 when 3720 dogs were killed in one city alone. Many dogs and cats were sacrificed</span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">because people didn’t realize that the more serious culprit in the spread of disease was the fleas carried by village rats.</span></p><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2715" style="color:green;"><span data-dcnode-id="2720" instrument_node="">The fascination with animal baiting continued, with lame horses, lions, badgers and bulls being tied to a stakes and tormented by</span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node="">trained dogs for the pleasure of onlookers. Kalof writes that bears were often blinded by the dogs and would be flogged by humans as</span><br data-dcnode-id="2717"><span data-dcnode-id="2716" instrument_node="">yet another form of entertainment.</span></p><span data-dcnode-id="2714" instrument_node="">
</span><p data-dcnode-id="2708" style="color:green;"><span data-dcnode-id="2713" instrument_node="">Changing views on Animals in the Enlightenment</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node="">The Enlightenment (1600 -1800), brought some awareness of animal cruelty to light. Michel de Montaigne made an eloquent case of animal</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node="">welfare sharing his belief that animals had cross-species communication and were capable of acts of kindness and reciprocity.</span></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2701" style="color:green;"><span data-dcnode-id="2706" instrument_node="">Unfortunately, Rene Descartes also famously argued at the time, that animals were neither rational nor moral and were, in fact,</span><br data-dcnode-id="2705"><span data-dcnode-id="2704" instrument_node="">not even conscious! Tragically for the animals, he asserted that they could not even feel pain. Armed with this new “mechanistic view”</span><br data-dcnode-id="2703"><span data-dcnode-id="2702" instrument_node="">of animals as machines, vivisection became a popular practice for early scientists and was often done in public view.</span></p><span data-dcnode-id="2700" instrument_node="">
</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="2670" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="2671" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="2681" id="swiper-wrapper-e56e4d6a991dd01f" style="width: 4500px; transform: translate3d(-750px, 0px, 0px); height: 455px; transition-duration: 0ms;"><li aria-hidden="true" aria-label="1 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev" data-dcnode-id="2697" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2698"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-374" data-dcnode-id="2699" data-id="374" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/15-1.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/15-1.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/15-1.jpg?w=150 150w"></figure></li><li aria-hidden="false" aria-label="2 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-active" data-dcnode-id="2694" data-swiper-slide-index="0" role="group" style="width: 750px;" tabindex="-1"><figure data-dcnode-id="2695"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-371" data-dcnode-id="2696" data-id="371" sizes="(max-width: 273px) 100vw, 273px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/11-1.jpg%3Fw%3D273&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/11-1.jpg 273w, https://humanityfornature.files.wordpress.com/2020/06/11-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="3 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-next" data-dcnode-id="2691" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2692"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-372" data-dcnode-id="2693" data-id="372" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/12.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/12.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/12.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="4 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide" data-dcnode-id="2688" data-swiper-slide-index="2" role="group" style="width: 750px;"><figure data-dcnode-id="2689"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-373" data-dcnode-id="2690" data-id="373" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/14.jpg%3Fw%3D300&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/14.jpg 300w, https://humanityfornature.files.wordpress.com/2020/06/14.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="5 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate-prev" data-dcnode-id="2685" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2686"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-374" data-dcnode-id="2687" data-id="374" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/15-1.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/15-1.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/15-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="6 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="2682" data-swiper-slide-index="0" role="group" style="width: 750px;"><figure data-dcnode-id="2683"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-371" data-dcnode-id="2684" data-id="371" sizes="(max-width: 273px) 100vw, 273px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/11-1.jpg%3Fw%3D273&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/11-1.jpg 273w, https://humanityfornature.files.wordpress.com/2020/06/11-1.jpg?w=150 150w"></figure></li></ul><a aria-controls="swiper-wrapper-e56e4d6a991dd01f" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="2680" role="button" style="top: 227px;" tabindex="0"></a><a aria-controls="swiper-wrapper-e56e4d6a991dd01f" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="2679" role="button" style="top: 227px;" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="2678" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="2673"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="2677" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="2676" role="button" tabindex="0"></button><button aria-label="Go to slide 3" class="swiper-pagination-bullet" data-dcnode-id="2675" role="button" tabindex="0"></button><button aria-label="Go to slide 4" class="swiper-pagination-bullet" data-dcnode-id="2674" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="2672"></span></div></div><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2663" style="color:green;"><span data-dcnode-id="2668" instrument_node="">Animal blood sports such as staged fights between bears and mastiffs or between bulls and lions were staged for entertainment. This era</span><br data-dcnode-id="2667"><span data-dcnode-id="2666" instrument_node="">also saw a rise in some of the street performance of trained animals. A traveling show might bring dancing bears to the village or monkeys</span><br data-dcnode-id="2665"><span data-dcnode-id="2664" instrument_node="">dressed in human clothing. Sadly this still continues today in many parts of the world.</span></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2656" style="color:green;"><span data-dcnode-id="2661" instrument_node="">The views of animals were often reflected in portraiture of the time. Karlof notes the frequent paintings of dead animals in butcher shop</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">scenes, or hunting scenes may have reflected anxiety and a preoccupation with thoughts of death that was prevalent at the time. These image</span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">s also displayed the prowess and power of the hunter. Many pedigreed livestock were also painted to enhance the status of their owners.</span></p><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2635" style="color:green;"><span data-dcnode-id="2654" instrument_node="">Animals in the Modern Era</span><br data-dcnode-id="2653"><span data-dcnode-id="2652" instrument_node="">In the Modern era (1800-2000’s) people began to develop more concern for animal welfare in the U.S. and Europe. In 1822, an animal</span><br data-dcnode-id="2651"><span data-dcnode-id="2650" instrument_node="">protection act was passed which prohibited the mistreatment of horses, asses, mules, cattle, oxen, sheep and related animals used in</span><br data-dcnode-id="2649"><span data-dcnode-id="2648" instrument_node="">farming and transport. The Society for the Prevention of Cruelty to Animals was founded in 1824 and a decade later laws prohibited animal</span><br data-dcnode-id="2647"><span data-dcnode-id="2646" instrument_node="">baitingBut society continued to rely on animals for food and as sources of power to pull wagons, and farm implements, or to drag carts of</span><br data-dcnode-id="2645"><span data-dcnode-id="2644" instrument_node="">coal or minerals in the mines. Many animals continued to suffer torment by abusive drovers enduring long periods of hunger and thirst</span><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">before a painful death at the slaughter house.</span><br data-dcnode-id="2641"><span data-dcnode-id="2640" instrument_node="">In his book, Some We Love, Some We Hate, Some We Eat: Why It’s so Hard to Think Straight About Animals, Hal Herzog notes that our views about</span><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">eating animals are strongly shaped by our culture. Americans are typically outraged by the idea of consuming dog meat since dogs are popular pets.</span><br data-dcnode-id="2637"><span data-dcnode-id="2636" instrument_node="">But dogs have been on the menu for thousands of years in different places around the world and continue to be so in many places in Asia.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2631"><figure class="aligncenter size-large" data-dcnode-id="2632"><img alt="" class="wp-image-363" data-attachment-id="363" data-comments-opened="0" data-dcnode-id="2633" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="5-1" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/5-1.jpg?w=512" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/5-1.jpg?w=300" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/5-1.jpg" data-orig-size="512,384" data-permalink="https://humanityfornature.wordpress.com/5-1/" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/5-1.jpg%3Fw%3D512&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/5-1.jpg 512w, https://humanityfornature.files.wordpress.com/2020/06/5-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/5-1.jpg?w=300 300w"></figure></div><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2616" style="color:green;"><span data-dcnode-id="2629" instrument_node="">Modern Animal Abuses</span><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">And in this modern era animals continue to be source of entertainment in zoos and marine parks. The blood sport of animal fighting, now illegal, is</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">mostly disappearing into the shadows, but it still exists even right here in Chicago.A more current example of using animals for entertainment might</span><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">be Sea World, which opened in 1964. Sea World promoted its performing whale shows framed in a narrative that expressed reverence and concern for nature.</span><br data-dcnode-id="2622"><span data-dcnode-id="2621" instrument_node="">However documentaries such as “Black Fish” and organizations such as the Animal Welfare Institute have publicized the forms of exploitation and suffering</span><br data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node="">that exist in these modern theme parks and through keeping fish in captivity. People in the modern era are becoming more sensitized to the plight of</span><br data-dcnode-id="2618"><span data-dcnode-id="2617" instrument_node="">animals who are exploited for our food and entertainment.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2612"><figure class="aligncenter size-large" data-dcnode-id="2613"><img alt="" class="wp-image-364" data-attachment-id="364" data-comments-opened="0" data-dcnode-id="2614" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="6-1" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/6-1.jpg?w=750" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/6-1.jpg?w=300" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/6-1.jpg" data-orig-size="1024,685" data-permalink="https://humanityfornature.wordpress.com/6-1/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/6-1.jpg%3Fw%3D1024&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/6-1.jpg 1024w, https://humanityfornature.files.wordpress.com/2020/06/6-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/6-1.jpg?w=300 300w, https://humanityfornature.files.wordpress.com/2020/06/6-1.jpg?w=768 768w"></figure></div><span data-dcnode-id="2611" instrument_node="">
</span><p data-dcnode-id="2603" style="color:green;"><span data-dcnode-id="2610" instrument_node="">Are we too late?</span><br data-dcnode-id="2609"><span data-dcnode-id="2608" instrument_node="">In recent years, more and more people are becoming aware of the exploitation of animals on industrialized farms, reducing meat intake or</span><br data-dcnode-id="2607"><span data-dcnode-id="2606" instrument_node="">becoming vegetarian. Even Burger King has started offering a vegetarian burger option. Ironically, much of our growing concern about</span><br data-dcnode-id="2605"><span data-dcnode-id="2604" instrument_node="">animal exploitation may be coming too late.</span></p><span data-dcnode-id="2602" instrument_node="">
</span><p data-dcnode-id="2596" style="color:green;"><span data-dcnode-id="2601" instrument_node="">A recent 2019 UN report notes that one million species are now on the brink of extinction due to climate change, over-hunting, pollution</span><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">and habitat destruction. In the growing shadow of factory farms, traditional family farmers with humane practices are struggling to</span><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">survive.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2592"><figure class="aligncenter size-large" data-dcnode-id="2593"><img alt="" class="wp-image-365" data-attachment-id="365" data-comments-opened="0" data-dcnode-id="2594" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="7-1" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/7-1.jpg?w=681" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/7-1.jpg?w=200" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/7-1.jpg" data-orig-size="681,1024" data-permalink="https://humanityfornature.wordpress.com/7-1/" sizes="(max-width: 681px) 100vw, 681px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/7-1.jpg%3Fw%3D681&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/7-1.jpg 681w, https://humanityfornature.files.wordpress.com/2020/06/7-1.jpg?w=100 100w, https://humanityfornature.files.wordpress.com/2020/06/7-1.jpg?w=200 200w"></figure></div><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2574" style="color:green;"><span data-dcnode-id="2590" instrument_node="">Relation Between Domestic Violence And Animal Cruelty</span><br data-dcnode-id="2589"><span data-dcnode-id="2588" instrument_node="">According to a Humane Society of the United States (HSUS) report</span><br data-dcnode-id="2587"><span data-dcnode-id="2586" instrument_node="">(</span><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humanesociety.org/issues/abuse_neglect/facts/animal_cruelty_facts_statistics.html%3Freferrer%3Dhttps%3A//www.google.co.in/" rel="nofollow"><span data-dcnode-id="2585" instrument_node="">http://www.humanesociety.org/issues/abuse_neglect/facts/animal_cruelty_facts_statistics.html?referrer=https://www.google.co.in/</span></a><span data-dcnode-id="2583" instrument_node="">),</span><br data-dcnode-id="2582"><span data-dcnode-id="2581" instrument_node="">approximately 1 million animals every year are killed or abused in connection with domestic violence. 71% of domestic violence victims report</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">that the abuser also targeted their animal.</span><br data-dcnode-id="2578"><span data-dcnode-id="2577" instrument_node="">In the year 2007, 7% of media-reported cases of animal cruelty either occurred in the context of a domestic violence or involved a person with</span><br data-dcnode-id="2576"><span data-dcnode-id="2575" instrument_node="">a history of domestic violence.</span></p><span data-dcnode-id="2573" instrument_node="">
</span><h3 data-dcnode-id="2570" style="color:rgb(3,29,3);"><strong data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">General&nbsp;Animal Abuse Facts and Statistics:</span></strong></h3><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2567" style="color:rgb(3,29,3);"><span data-dcnode-id="2568" instrument_node="">1. Every 60 seconds, one animal suffers abuse.</span></p><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2564" style="color:green;"><span data-dcnode-id="2565" instrument_node="">Even though today’s society is modern and advanced, people turn a blind eye when it comes to animal and pet abuse, and in some cases they condone it. The abuse comes in many forms, but the effect it leaves on animals is always the same: fear, pain, and desperation.&nbsp;</span></p><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561" style="color:rgb(3,29,3);"><span data-dcnode-id="2562" instrument_node="">2. Close to 65% of all abused animals are dogs.</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2555" style="color:green;"><span data-dcnode-id="2559" instrument_node="">The&nbsp;animal cruelty facts&nbsp;report that the most common victims of this cruelty are dogs. Moreover, this doesn’t refer to dogs in general, but specific breeds. Statistics show that one in every four abused dogs is a Pit Bull. Some countries, like the UK, have banned this&nbsp;</span><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petpedia.co/most-popular-dog-breeds/"><span data-dcnode-id="2558" instrument_node="">breed</span></a><span data-dcnode-id="2556" instrument_node="">&nbsp;to prevent animal cruelty. As a note, they’ve also banned this breed with the thought of preventing Pit Bull attacks on people.</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2552" style="color:rgb(3,29,3);"><span data-dcnode-id="2553" instrument_node="">3. There are two types of animal abuse: passive and active cruelty.</span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2549" style="color:green;"><span data-dcnode-id="2550" instrument_node="">Passive cruelty mostly includes cases of animal neglect like improper shelter, dehydration, starvation, and so on. On the other hand, active cruelty involves intentionally harming the animal. This includes the beating, whipping, and branding of animals, which can often result in their death.</span></p><span data-dcnode-id="2548" instrument_node="">
</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="2518" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="2519" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="2529" id="swiper-wrapper-5581fd458a3bb8ed" style="width: 4500px; transform: translate3d(-750px, 0px, 0px); height: 455px; transition-duration: 0ms;"><li aria-hidden="true" aria-label="1 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev" data-dcnode-id="2545" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2546"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-379" data-dcnode-id="2547" data-id="379" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/19.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/19.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/19.jpg?w=150 150w"></figure></li><li aria-hidden="false" aria-label="2 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-active" data-dcnode-id="2542" data-swiper-slide-index="0" role="group" style="width: 750px;" tabindex="-1"><figure data-dcnode-id="2543"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-376" data-dcnode-id="2544" data-id="376" sizes="(max-width: 173px) 100vw, 173px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/16.jpg%3Fw%3D173&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/16.jpg 173w, https://humanityfornature.files.wordpress.com/2020/06/16.jpg?w=89 89w"></figure></li><li aria-hidden="true" aria-label="3 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-next" data-dcnode-id="2539" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2540"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-377" data-dcnode-id="2541" data-id="377" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/17.jpg%3Fw%3D300&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/17.jpg 300w, https://humanityfornature.files.wordpress.com/2020/06/17.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="4 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide" data-dcnode-id="2536" data-swiper-slide-index="2" role="group" style="width: 750px;"><figure data-dcnode-id="2537"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-378" data-dcnode-id="2538" data-id="378" sizes="(max-width: 225px) 100vw, 225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/18-1.jpg%3Fw%3D225&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/18-1.jpg 225w, https://humanityfornature.files.wordpress.com/2020/06/18-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="5 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate-prev" data-dcnode-id="2533" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2534"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-379" data-dcnode-id="2535" data-id="379" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/19.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/19.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/19.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="6 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="2530" data-swiper-slide-index="0" role="group" style="width: 750px;"><figure data-dcnode-id="2531"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-376" data-dcnode-id="2532" data-id="376" sizes="(max-width: 173px) 100vw, 173px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/16.jpg%3Fw%3D173&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/16.jpg 173w, https://humanityfornature.files.wordpress.com/2020/06/16.jpg?w=89 89w"></figure></li></ul><a aria-controls="swiper-wrapper-5581fd458a3bb8ed" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="2528" role="button" style="top: 227px;" tabindex="0"></a><a aria-controls="swiper-wrapper-5581fd458a3bb8ed" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="2527" role="button" style="top: 227px;" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="2526" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="2521"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="2525" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="2524" role="button" tabindex="0"></button><button aria-label="Go to slide 3" class="swiper-pagination-bullet" data-dcnode-id="2523" role="button" tabindex="0"></button><button aria-label="Go to slide 4" class="swiper-pagination-bullet" data-dcnode-id="2522" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="2520"></span></div></div><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515" style="color:rgb(3,29,3);"><span data-dcnode-id="2516" instrument_node="">4. Approximately 71% of people who are reported for domestic violence also abuse their pets.</span></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2512" style="color:green;"><span data-dcnode-id="2513" instrument_node="">The&nbsp;animal abuse and domestic violence statistics&nbsp;show a clear correlation between domestic violence and animal abuse. Victims of domestic violence have reported that in the great majority of cases their abuser has also maltreated their pet.</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509" style="color:rgb(3,29,3);"><span data-dcnode-id="2510" instrument_node="">5. Around 88% of the families under investigation for child abuse are also reported for animal cruelty.</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506" style="color:green;"><span data-dcnode-id="2507" instrument_node="">Animal abuse is very common in families with child abuse. Unfortunately, abuse leads to more abuse, so statistics show that 26% of the&nbsp;people who abuse animals&nbsp;were abused in their childhood. Children who witness domestic violence are three times more likely to abuse animals.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503" style="color:rgb(3,29,3);"><span data-dcnode-id="2504" instrument_node="">6. Children who are sexually abused are 5 times more likely to become animal abusers.</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500" style="color:green;"><span data-dcnode-id="2501" instrument_node="">In addition to this, children 10 years and older who abuse animals intentionally are two to three times more likely to have been abused. Animal abuse is also characteristic of the development of adult violent offenders. Up to two in three adults who are violent offenders have an animal abuse history.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497" style="color:rgb(3,29,3);"><span data-dcnode-id="2498" instrument_node="">7. It’s estimated that the lifetime prevalence of animal abuse in US adults is 1.8%.</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2494" style="color:green;"><span data-dcnode-id="2495" instrument_node="">Research has shown that men are the most likely to abuse animals. African Americans, Native Americans, Asians, people with low income and education levels, and adults who live in the west US regions are more likely to be reported for abusing animals.</span></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491" style="color:rgb(3,29,3);"><span data-dcnode-id="2492" instrument_node="">8. Every year, more than 10 million animals die from abuse in the US alone.</span></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488" style="color:green;"><span data-dcnode-id="2489" instrument_node="">However, as the&nbsp;animal abuse facts&nbsp;from&nbsp;2018&nbsp;reveal, every year only 1,920 cases of animal abuse are presented by the media. Unfortunately, animal abuse still isn’t recognized as a serious issue in the United States, remaining an unpopular topic.</span></p><span data-dcnode-id="2487" instrument_node="">
</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="2457" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="2458" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="2468" id="swiper-wrapper-fe955da6095e4937" style="width: 4500px; transform: translate3d(-750px, 0px, 0px); height: 455px; transition-duration: 0ms;"><li aria-hidden="true" aria-label="1 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev" data-dcnode-id="2484" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2485"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-383" data-dcnode-id="2486" data-id="383" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/23-2.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/23-2.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/23-2.jpg?w=150 150w"></figure></li><li aria-hidden="false" aria-label="2 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-active" data-dcnode-id="2481" data-swiper-slide-index="0" role="group" style="width: 750px;" tabindex="-1"><figure data-dcnode-id="2482"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-380" data-dcnode-id="2483" data-id="380" sizes="(max-width: 194px) 100vw, 194px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/20.jpg%3Fw%3D194&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/20.jpg 194w, https://humanityfornature.files.wordpress.com/2020/06/20.jpg?w=112 112w"></figure></li><li aria-hidden="true" aria-label="3 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-next" data-dcnode-id="2478" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2479"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-381" data-dcnode-id="2480" data-id="381" sizes="(max-width: 379px) 100vw, 379px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/21-1.jpg%3Fw%3D379&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/21-1.jpg 379w, https://humanityfornature.files.wordpress.com/2020/06/21-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/21-1.jpg?w=300 300w"></figure></li><li aria-hidden="true" aria-label="4 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide" data-dcnode-id="2475" data-swiper-slide-index="2" role="group" style="width: 750px;"><figure data-dcnode-id="2476"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-382" data-dcnode-id="2477" data-id="382" sizes="(max-width: 318px) 100vw, 318px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/22-1.jpg%3Fw%3D318&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/22-1.jpg 318w, https://humanityfornature.files.wordpress.com/2020/06/22-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/22-1.jpg?w=300 300w"></figure></li><li aria-hidden="true" aria-label="5 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate-prev" data-dcnode-id="2472" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2473"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-383" data-dcnode-id="2474" data-id="383" sizes="(max-width: 275px) 100vw, 275px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/23-2.jpg%3Fw%3D275&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/23-2.jpg 275w, https://humanityfornature.files.wordpress.com/2020/06/23-2.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="6 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="2469" data-swiper-slide-index="0" role="group" style="width: 750px;"><figure data-dcnode-id="2470"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-380" data-dcnode-id="2471" data-id="380" sizes="(max-width: 194px) 100vw, 194px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/20.jpg%3Fw%3D194&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/20.jpg 194w, https://humanityfornature.files.wordpress.com/2020/06/20.jpg?w=112 112w"></figure></li></ul><a aria-controls="swiper-wrapper-fe955da6095e4937" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="2467" role="button" style="top: 227px;" tabindex="0"></a><a aria-controls="swiper-wrapper-fe955da6095e4937" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="2466" role="button" style="top: 227px;" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="2465" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="2460"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="2464" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="2463" role="button" tabindex="0"></button><button aria-label="Go to slide 3" class="swiper-pagination-bullet" data-dcnode-id="2462" role="button" tabindex="0"></button><button aria-label="Go to slide 4" class="swiper-pagination-bullet" data-dcnode-id="2461" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="2459"></span></div></div><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454" style="color:rgb(3,29,3);"><span data-dcnode-id="2455" instrument_node="">9. Every year, more than 6.5 million animals enter animal shelters.</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2448" style="color:green;"><span data-dcnode-id="2452" instrument_node="">Every year,&nbsp;</span><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petpedia.co/animal-shelter-statistics/"><span data-dcnode-id="2451" instrument_node="">shelters in the United States</span></a><span data-dcnode-id="2449" instrument_node="">&nbsp;accept around 3.3 million dogs and 3.2 million cats. According to the &nbsp;animal abuse statistics &nbsp;from the &nbsp;ASPCA, only 3.2 million shelter animals are adopted. Half of them are cats, and the other half are dogs. However, most of those that don’t get adopted, around 1.5 million, are euthanized.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2445" style="color:rgb(3,29,3);"><span data-dcnode-id="2446" instrument_node="">10. More than 50% of the fur in the United States comes from China.</span></p><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442" style="color:green;"><span data-dcnode-id="2443" instrument_node="">In fact, millions of cats and dogs in China are bled to death or skinned alive for their fur.&nbsp;Furthermore, some of the&nbsp;animal abuse statistics in America&nbsp;show that the fur coming from China is mislabeled, so there’s no sure way to know what creature’s skin you’ve chosen to wear.</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439" style="color:rgb(3,29,3);"><span data-dcnode-id="2440" instrument_node="">11. From 2008 to 2015, more than 80,000 Greyhounds have become part of the racing industry.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436" style="color:green;"><span data-dcnode-id="2437" instrument_node="">Horrifying numbers show that there have also been 909 reported deaths—although it’s safe to assume that the number of Greyhound deaths is underreported. Moreover, the&nbsp;animal abuse statistics&nbsp;from&nbsp;2015&nbsp;also reveal that 16 racing Greyhounds were positive for cocaine. In addition, there were 27 reported cases of cruelty and neglect and 11,722 injuries.</span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2433" style="color:rgb(3,29,3);"><span data-dcnode-id="2434" instrument_node="">12. In 2006, 3 slaughterhouses in the US killed and processed over 104,000 horses for human consumption.</span></p><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2430" style="color:green;"><span data-dcnode-id="2431" instrument_node="">Fortunately, these slaughterhouses have since been shut down, but murdering horses for consumption is still happening. From 2012 to 2016, approximately 137,000 horses were trucked to Mexico and Canada to be killed and processed for consumption. According to the&nbsp;animal abuse statistics&nbsp;from&nbsp;2017, this number fell to 80,000 in 2017, but it still represents a major issue.</span></p><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2427" style="color:rgb(3,29,3);"><span data-dcnode-id="2428" instrument_node="">13. On average, 250,000 animals every year are victims of animal hoarding.</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424" style="color:green;"><span data-dcnode-id="2425" instrument_node="">The most outrageous form of animal abuse is animal hoarding. Hoarders usually have hundreds of cats and dogs. These creatures are malnourished, have serious medical issues, dental and eye illnesses, and psychological distress.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2421" style="color:rgb(3,29,3);"><span data-dcnode-id="2422" instrument_node="">14.&nbsp;Statistics on animal abuse&nbsp;reveal that there are over 10,000 puppy mills in the United States.</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418" style="color:green;"><span data-dcnode-id="2419" instrument_node="">Every year, these mills breed more than 2 million dogs for profit. The problem with puppy mills is that they often exist in horrible conditions. The puppies are not kept safe from cold, heat, or bad weather, and they spend their lives in wire cages stacked on top of each other.</span></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2415" style="color:rgb(3,29,3);"><span data-dcnode-id="2416" instrument_node="">15. Approximately 75,000 dogs are tortured in US labs every year.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412" style="color:green;"><span data-dcnode-id="2413" instrument_node="">Animal abuse statistics&nbsp;from&nbsp;2018&nbsp;show that some universities go so far as to take dogs from shelters to use them in their experiments. They are most often used in toxicology studies, which involve the use of harmful pesticides, chemicals, and pharmaceutical medications.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="2381" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="2382" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="2392" id="swiper-wrapper-7f2712db3262182a" style="width: 4500px; transform: translate3d(-750px, 0px, 0px); height: 436px; transition-duration: 0ms;"><li aria-hidden="true" aria-label="1 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev" data-dcnode-id="2408" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2409"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-392" data-dcnode-id="2410" data-id="392" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/31-1.jpg%3Fw%3D300&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/31-1.jpg 300w, https://humanityfornature.files.wordpress.com/2020/06/31-1.jpg?w=150 150w"></figure></li><li aria-hidden="false" aria-label="2 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-active" data-dcnode-id="2405" data-swiper-slide-index="0" role="group" style="width: 750px;" tabindex="-1"><figure data-dcnode-id="2406"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-389" data-dcnode-id="2407" data-id="389" sizes="(max-width: 294px) 100vw, 294px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/28.png%3Fw%3D294&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/28.png 294w, https://humanityfornature.files.wordpress.com/2020/06/28.png?w=150 150w"></figure></li><li aria-hidden="true" aria-label="3 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-next" data-dcnode-id="2402" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2403"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-390" data-dcnode-id="2404" data-id="390" sizes="(max-width: 279px) 100vw, 279px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/29-1.jpg%3Fw%3D279&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/29-1.jpg 279w, https://humanityfornature.files.wordpress.com/2020/06/29-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="4 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide" data-dcnode-id="2399" data-swiper-slide-index="2" role="group" style="width: 750px;"><figure data-dcnode-id="2400"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-391" data-dcnode-id="2401" data-id="391" sizes="(max-width: 266px) 100vw, 266px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/30-1.jpg%3Fw%3D266&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/30-1.jpg 266w, https://humanityfornature.files.wordpress.com/2020/06/30-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="5 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate-prev" data-dcnode-id="2396" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2397"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-392" data-dcnode-id="2398" data-id="392" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/31-1.jpg%3Fw%3D300&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/31-1.jpg 300w, https://humanityfornature.files.wordpress.com/2020/06/31-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="6 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="2393" data-swiper-slide-index="0" role="group" style="width: 750px;"><figure data-dcnode-id="2394"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-389" data-dcnode-id="2395" data-id="389" sizes="(max-width: 294px) 100vw, 294px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/28.png%3Fw%3D294&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/28.png 294w, https://humanityfornature.files.wordpress.com/2020/06/28.png?w=150 150w"></figure></li></ul><a aria-controls="swiper-wrapper-7f2712db3262182a" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="2391" role="button" style="top: 218px;" tabindex="0"></a><a aria-controls="swiper-wrapper-7f2712db3262182a" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="2390" role="button" style="top: 218px;" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="2389" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="2384"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="2388" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="2387" role="button" tabindex="0"></button><button aria-label="Go to slide 3" class="swiper-pagination-bullet" data-dcnode-id="2386" role="button" tabindex="0"></button><button aria-label="Go to slide 4" class="swiper-pagination-bullet" data-dcnode-id="2385" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="2383"></span></div></div><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378" style="color:rgb(3,29,3);"><span data-dcnode-id="2379" instrument_node="">16. Every year, US labs abuse more than 19,000 cats.</span></p><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2372" style="color:green;"><span data-dcnode-id="2376" instrument_node="">In addition to this, thousands of cats are sold to schools for dissections and various projects. These cats are most often homeless or&nbsp;</span><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//petpedia.co/pet-adoption-statistics/"><span data-dcnode-id="2375" instrument_node="">adopted from shelters</span></a><span data-dcnode-id="2373" instrument_node="">, just like in the case with dogs.</span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2369" style="color:rgb(3,29,3);"><span data-dcnode-id="2370" instrument_node="">17. Between 5,000 and 6,000 tigers in China currently live in captivity because of the traditional medicine industry.</span></p><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2366" style="color:green;"><span data-dcnode-id="2367" instrument_node="">The majority of Asian medicine doesn’t require wild animal products, but there are subindustries that create a horrible demand for big cat farming. Lions and tigers are farmed and poached for their body parts and bones, which are used for making traditional remedies. These animals are kept in tiny enclosures, and the&nbsp;animal abuse statistics&nbsp;from&nbsp;2019&nbsp;show that this hurts not only their bodies, but their psyches, as well.</span></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2363" style="color:rgb(3,29,3);"><span data-dcnode-id="2364" instrument_node="">18. The UK’s RSPCA gets a call about animal abuse every 27 seconds.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2357" style="color:green;"><span data-dcnode-id="2361" instrument_node="">The number of animal cruelty cases investigated by the&nbsp;</span><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rspca.org.uk/"><span data-dcnode-id="2360" instrument_node="">RSPCA</span></a><span data-dcnode-id="2358" instrument_node="">&nbsp;rose by 5% in only one year, and now the organization gets more than 400 calls a day. Its cruelty hotline operates 24/7, and according to the&nbsp;animal abuse statistics&nbsp;from&nbsp;2016, it investigated more than 150,000 reported cases in that year alone.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2354" style="color:rgb(3,29,3);"><span data-dcnode-id="2355" instrument_node="">19. One third of parrot species are in danger of being extinct because of the exotic bird trade.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351" style="color:green;"><span data-dcnode-id="2352" instrument_node="">Millions of birds are illegally smuggled, traded, or sold on the black market to collectors or for illegal fighting. The global trade of birds has had a major negative impact, especially on parrots. Due to the loss of their habitat, a great number of parrot species are on the verge of extinction according to the&nbsp;domestic animal abuse statistics.</span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2348" style="color:rgb(3,29,3);"><span data-dcnode-id="2349" instrument_node="">20. Every year, more than 115 million animals in the world are used for laboratory experiments.</span></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2345" style="color:green;"><span data-dcnode-id="2346" instrument_node="">However, it’s estimated that this number is much higher since most countries don’t collect or publish data about animal use for testing and research. In the US, 90% of lab animals like mice, rats, birds, fish, reptiles, amphibians, and invertebrates aren’t included in official statements. The European Union uses more than 12 million animals, and the UK, France, and Germany are the top countries using these creatures.</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342" style="color:rgb(3,29,3);"><span data-dcnode-id="2343" instrument_node="">21. About 97% of all the animals that are tortured and killed every year are farm animals.</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2339" style="color:green;"><span data-dcnode-id="2340" instrument_node="">These animals aren’t seen as living beings—they’re mass produced for the product they become: eggs, milk, meat, and leather. These animals are drugged and confined only to produce more milk and eggs, breed more offspring, and die. Factory farming is a business, and farmers need to cut all costs to maximize their profit.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336" style="color:rgb(3,29,3);"><span data-dcnode-id="2337" instrument_node="">22.&nbsp;Farm animal abuse stats&nbsp;report that over 9 billion chickens are killed every year.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333" style="color:green;"><span data-dcnode-id="2334" instrument_node="">US slaughterhouses breed and kill 10 times more birds than any other animal. Additionally, 300 million chickens are used for their eggs. Moreover, no birds—chickens, hens, ducks, turkeys, geese, etc.—are protected by federal animal protection laws.</span></p><span data-dcnode-id="2332" instrument_node="">
