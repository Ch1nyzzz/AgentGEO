</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="2310" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="2311" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="2319" id="swiper-wrapper-3fc274388765ef5e" style="width: 3000px; transform: translate3d(-750px, 0px, 0px); height: 455px; transition-duration: 0ms;"><li aria-hidden="true" aria-label="1 / 4" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev swiper-slide-duplicate-next" data-dcnode-id="2329" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2330"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-394" data-dcnode-id="2331" data-id="394" sizes="(max-width: 310px) 100vw, 310px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/34-1.jpg%3Fw%3D310&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/34-1.jpg 310w, https://humanityfornature.files.wordpress.com/2020/06/34-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/34-1.jpg?w=300 300w"></figure></li><li aria-hidden="false" aria-label="2 / 4" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-active" data-dcnode-id="2326" data-swiper-slide-index="0" role="group" style="width: 750px;" tabindex="-1"><figure data-dcnode-id="2327"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-393" data-dcnode-id="2328" data-id="393" sizes="(max-width: 259px) 100vw, 259px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/33-1.jpg%3Fw%3D259&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/33-1.jpg 259w, https://humanityfornature.files.wordpress.com/2020/06/33-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="3 / 4" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-next swiper-slide-duplicate-prev" data-dcnode-id="2323" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2324"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-394" data-dcnode-id="2325" data-id="394" sizes="(max-width: 310px) 100vw, 310px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/34-1.jpg%3Fw%3D310&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/34-1.jpg 310w, https://humanityfornature.files.wordpress.com/2020/06/34-1.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/34-1.jpg?w=300 300w"></figure></li><li aria-hidden="true" aria-label="4 / 4" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="2320" data-swiper-slide-index="0" role="group" style="width: 750px;"><figure data-dcnode-id="2321"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-393" data-dcnode-id="2322" data-id="393" sizes="(max-width: 259px) 100vw, 259px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/33-1.jpg%3Fw%3D259&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/33-1.jpg 259w, https://humanityfornature.files.wordpress.com/2020/06/33-1.jpg?w=150 150w"></figure></li></ul><a aria-controls="swiper-wrapper-3fc274388765ef5e" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="2318" role="button" style="top: 227px;" tabindex="0"></a><a aria-controls="swiper-wrapper-3fc274388765ef5e" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="2317" role="button" style="top: 227px;" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="2316" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="2313"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="2315" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="2314" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="2312"></span></div></div><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2307" style="color:rgb(3,29,3);"><span data-dcnode-id="2308" instrument_node="">23. An estimated 95% of pigs get raised in factory farms that don’t allow them to live in a natural manner.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2304" style="color:green;"><span data-dcnode-id="2305" instrument_node="">Additional&nbsp;farm animal abuse statistics&nbsp;show that three in every four mother pigs are confined in cages during their pregnancy. These cages are the size of an average refrigerator and are so small they can’t even turn. Factory farming is the biggest source of animal cruelty in the world.</span></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2301" style="color:rgb(3,29,3);"><span data-dcnode-id="2302" instrument_node="">24. Around 50% of all consumed fish are raised in artificial environments.</span></p><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2298" style="color:green;"><span data-dcnode-id="2299" instrument_node="">More often than not, fish are bred artificially, instead of being caught in the wilderness. People believe that fish can’t feel pain, but it’s been proven that along with pain, they also feel fear and suffering. Further&nbsp;animal abuse statistics&nbsp;show that fish farming, or aquaculture, is one of the fastest-growing food production industries.&nbsp;</span></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2295" style="color:rgb(3,29,3);"><span data-dcnode-id="2296" instrument_node="">25. Dairy cows must give 10 times more milk than they would in nature.</span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292" style="color:green;"><span data-dcnode-id="2293" instrument_node="">Milking machines often cut the cows or cause them other injuries. Some even give them electric shocks, resulting in their death. Usually, cows in nature live 20–25 years, but on farms, they’re killed after 3–5 years and used for meat.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2289"><img alt="" class="wp-image-395" data-attachment-id="395" data-comments-opened="0" data-dcnode-id="2290" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="32-2" data-large-file="https://humanityfornature.files.wordpress.com/2020/06/32-2.jpg?w=750" data-medium-file="https://humanityfornature.files.wordpress.com/2020/06/32-2.jpg?w=300" data-orig-file="https://humanityfornature.files.wordpress.com/2020/06/32-2.jpg" data-orig-size="800,531" data-permalink="https://humanityfornature.wordpress.com/32-2/" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/32-2.jpg%3Fw%3D800&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/32-2.jpg 800w, https://humanityfornature.files.wordpress.com/2020/06/32-2.jpg?w=150 150w, https://humanityfornature.files.wordpress.com/2020/06/32-2.jpg?w=300 300w, https://humanityfornature.files.wordpress.com/2020/06/32-2.jpg?w=768 768w"></figure><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2286" style="color:rgb(3,29,3);"><span data-dcnode-id="2287" instrument_node="">26. The majority of the sloths used for entertainment and tourism die within 6 months of their capture.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2280" style="color:green;"><span data-dcnode-id="2284" instrument_node="">In their natural habitat, sloths live a quiet, sleepy life, undisturbed by the global craze for “</span><a data-dcnode-id="2282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldanimalprotection.org/wildlife-selfie-code"><span data-dcnode-id="2283" instrument_node="">wildlife selfies</span></a><span data-dcnode-id="2281" instrument_node="">.” Unfortunately, sloths are the most commonly abused wild animals as a result of people seeking out “cute” photo opportunities. When they’re captured for this, they’re constantly surrounded by people and are therefore placed under high levels of stress.</span></p><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2277" style="color:rgb(3,29,3);"><span data-dcnode-id="2278" instrument_node="">27. Between 35,000 and 50,000 elephants are poached every year according to the&nbsp;animal cruelty statistics.</span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274" style="color:green;"><span data-dcnode-id="2275" instrument_node="">The elephant poaching crisis is currently at its peak. What’s even scarier, some elephant populations may very soon become extinct as a direct result. At this moment, more elephants are being killed for ivory than are being born.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2271" style="color:rgb(3,29,3);"><span data-dcnode-id="2272" instrument_node="">28. Over 100 million sharks are killed every year illegally, primarily to make shark’s fin soup.</span></p><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268" style="color:green;"><span data-dcnode-id="2269" instrument_node="">Furthermore, over 85% of the fisheries in the world have reached their maximum, or surpassed it. In addition to this, the&nbsp;animal abuse facts and information&nbsp;indicate that more than 650,000 marine mammals in the world are seriously injured or killed every year because they get accidentally caught in fishing gear.</span></p><span data-dcnode-id="2267" instrument_node="">
</span><div class="wp-block-jetpack-slideshow aligncenter" data-dcnode-id="2237" data-effect="slide" data-jetpack-block-initialized="true"><div class="wp-block-jetpack-slideshow_container swiper-container swiper-container-initialized swiper-container-horizontal swiper-container-pointer-events wp-swiper-initialized" data-dcnode-id="2238" style="cursor: grab;"><ul aria-live="polite" class="wp-block-jetpack-slideshow_swiper-wrapper swiper-wrapper" data-dcnode-id="2248" id="swiper-wrapper-45d6555f5823c2a4" style="width: 4500px; transform: translate3d(-750px, 0px, 0px); height: 455px; transition-duration: 0ms;"><li aria-hidden="true" aria-label="1 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-prev" data-dcnode-id="2264" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2265"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-387" data-dcnode-id="2266" data-id="387" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/27-1.jpg%3Fw%3D300&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/27-1.jpg 300w, https://humanityfornature.files.wordpress.com/2020/06/27-1.jpg?w=150 150w"></figure></li><li aria-hidden="false" aria-label="2 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-active" data-dcnode-id="2261" data-swiper-slide-index="0" role="group" style="width: 750px;" tabindex="-1"><figure data-dcnode-id="2262"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-384" data-dcnode-id="2263" data-id="384" sizes="(max-width: 226px) 100vw, 226px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/24-1.jpg%3Fw%3D226&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/24-1.jpg 226w, https://humanityfornature.files.wordpress.com/2020/06/24-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="3 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-next" data-dcnode-id="2258" data-swiper-slide-index="1" role="group" style="width: 750px;"><figure data-dcnode-id="2259"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-385" data-dcnode-id="2260" data-id="385" sizes="(max-width: 294px) 100vw, 294px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/25-1.jpg%3Fw%3D294&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/25-1.jpg 294w, https://humanityfornature.files.wordpress.com/2020/06/25-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="4 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide" data-dcnode-id="2255" data-swiper-slide-index="2" role="group" style="width: 750px;"><figure data-dcnode-id="2256"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-386" data-dcnode-id="2257" data-id="386" sizes="(max-width: 274px) 100vw, 274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/26-1.jpg%3Fw%3D274&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/26-1.jpg 274w, https://humanityfornature.files.wordpress.com/2020/06/26-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="5 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate-prev" data-dcnode-id="2252" data-swiper-slide-index="3" role="group" style="width: 750px;"><figure data-dcnode-id="2253"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-387" data-dcnode-id="2254" data-id="387" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/27-1.jpg%3Fw%3D300&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/27-1.jpg 300w, https://humanityfornature.files.wordpress.com/2020/06/27-1.jpg?w=150 150w"></figure></li><li aria-hidden="true" aria-label="6 / 6" class="wp-block-jetpack-slideshow_slide swiper-slide swiper-slide-duplicate swiper-slide-duplicate-active" data-dcnode-id="2249" data-swiper-slide-index="0" role="group" style="width: 750px;"><figure data-dcnode-id="2250"><img alt="" class="wp-block-jetpack-slideshow_image wp-image-384" data-dcnode-id="2251" data-id="384" sizes="(max-width: 226px) 100vw, 226px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityfornature.files.wordpress.com/2020/06/24-1.jpg%3Fw%3D226&amp;raw" srcset="https://humanityfornature.files.wordpress.com/2020/06/24-1.jpg 226w, https://humanityfornature.files.wordpress.com/2020/06/24-1.jpg?w=150 150w"></figure></li></ul><a aria-controls="swiper-wrapper-45d6555f5823c2a4" aria-label="Previous slide" class="wp-block-jetpack-slideshow_button-prev swiper-button-prev swiper-button-white" data-dcnode-id="2247" role="button" style="top: 227px;" tabindex="0"></a><a aria-controls="swiper-wrapper-45d6555f5823c2a4" aria-label="Next slide" class="wp-block-jetpack-slideshow_button-next swiper-button-next swiper-button-white" data-dcnode-id="2246" role="button" style="top: 227px;" tabindex="0"></a><a aria-label="Pause Slideshow" class="wp-block-jetpack-slideshow_button-pause" data-dcnode-id="2245" role="button"></a><div class="wp-block-jetpack-slideshow_pagination swiper-pagination swiper-pagination-white swiper-pagination-clickable swiper-pagination-bullets" data-dcnode-id="2240"><button aria-label="Go to slide 1" class="swiper-pagination-bullet swiper-pagination-bullet-active" data-dcnode-id="2244" role="button" tabindex="0"></button><button aria-label="Go to slide 2" class="swiper-pagination-bullet" data-dcnode-id="2243" role="button" tabindex="0"></button><button aria-label="Go to slide 3" class="swiper-pagination-bullet" data-dcnode-id="2242" role="button" tabindex="0"></button><button aria-label="Go to slide 4" class="swiper-pagination-bullet" data-dcnode-id="2241" role="button" tabindex="0"></button></div><span aria-atomic="true" aria-live="assertive" class="swiper-notification" data-dcnode-id="2239"></span></div></div><span data-dcnode-id="2236" instrument_node="">
</span><p data-dcnode-id="2234" style="color:rgb(3,29,3);"><span data-dcnode-id="2235" instrument_node="">29. Approximately 75% of pet lizards, snakes, turtles, and tortoises die within the first year of becoming someone’s pet.</span></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231" style="color:green;"><span data-dcnode-id="2232" instrument_node="">Wild animals that are kept as pets suffer because nothing can replace their natural habitat. No matter whether they’re obtained legally or not, keeping wild animals as pets supports cruelty toward animals.</span></p><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2228" style="color:rgb(3,29,3);"><span data-dcnode-id="2229" instrument_node="">30. Lions and tigers have 18,000 times less space in zoos than they would in nature.</span></p><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225" style="color:green;"><span data-dcnode-id="2226" instrument_node="">It’s a fact that animals in zoos suffer immensely simply because a zoo can’t provide as much space as they’d have in their natural habitat. In fact, lions spend 48% of their time pacing in their enclosure, which is a sign of a behavioral problem.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222" style="color:rgb(3,29,3);"><span data-dcnode-id="2223" instrument_node="">31. Around 75% of zoos and aquariums break the basic mistreatment rules.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2216" style="color:green;"><span data-dcnode-id="2220" instrument_node="">In the case of&nbsp;animal abuse in zoos, statistics&nbsp;reveal that most of the world’s zoos and aquariums offer visitors some sort of interaction with animals. This includes areas where people can pet and touch them, or they train them for different shows, thus breaking the basic rules created by the&nbsp;</span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.waza.org/"><span data-dcnode-id="2219" instrument_node="">World Association of Zoos and Aquariums</span></a><span data-dcnode-id="2217" instrument_node="">&nbsp;(WAZA).</span></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2213" style="color:rgb(3,29,3);"><span data-dcnode-id="2214" instrument_node="">32. Circus animals spend 96% of their lives in cages.</span></p><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210" style="color:green;"><span data-dcnode-id="2211" instrument_node="">Most of these animals spend almost their whole lives in cages, transported from one city to another. These animals are forced into submission, whipped, chained, and denied socialization with their own species.&nbsp;Animal abuse in circuses&nbsp;is a major problem as these animals are constantly exploited and left in terrible conditions.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207" style="color:rgb(3,29,3);"><span data-dcnode-id="2208" instrument_node="">33. Since the year 2000, there have been 35 documented dangerous incidents that involved circus elephants.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204" style="color:green;"><span data-dcnode-id="2205" instrument_node="">These animals spend 11 months a year traveling in small cages, often eating, sleeping, and urinating in the same place. Trainers usually use electric prods, bullhooks, and other painful methods to force the animals to perform. This results in elephants bolting from circuses. Some of the&nbsp;circus animal abuse statistics&nbsp;show that in these accidents, elephants have run through streets, attacked people, crashed into buildings, and injured or killed handlers.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201" style="color:rgb(3,29,3);"><span data-dcnode-id="2202" instrument_node="">34. Since 1990, 126 big cats have died in US circuses because of their confinement.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2198" style="color:green;"><span data-dcnode-id="2199" instrument_node="">Additionally, more than 255 people have been injured and 26 have died in accidents with big cats from circuses. Circus training sessions aren’t monitored by the government, but undercover footage has shown that big cats are often hit with sticks and dragged by chains around their necks.</span></p><span data-dcnode-id="2197" instrument_node="">
