</span></div><span data-dcnode-id="1248" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1141"><span data-dcnode-id="1247" instrument_node="">
</span><div class="card-header" data-dcnode-id="1242" id="headingNine"><span data-dcnode-id="1246" instrument_node="">
</span><h3 aria-controls="collapseNine" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1244" data-target="#collapseNine" data-toggle="collapse"><span data-dcnode-id="1245" instrument_node="">
                      Marine Animals
                    </span></h3><span data-dcnode-id="1243" instrument_node="">
</span></div><span data-dcnode-id="1241" instrument_node="">
</span><div aria-labelledby="headingNine" class="collapse" data-dcnode-id="1143" data-parent="#accordionExample" id="collapseNine"><span data-dcnode-id="1240" instrument_node="">
</span><div class="card-body" data-dcnode-id="1145"><span data-dcnode-id="1239" instrument_node="">
</span><ul data-dcnode-id="1166"><span data-dcnode-id="1238" instrument_node="">
</span><li data-dcnode-id="1233"><span data-dcnode-id="1237" instrument_node="">Worldwide – Marine themed entertainment parks like SeaWorld, purport to be places of research and education, yet they are no better than zoos.  Part of a multibillion-dollar industry, these theme parks and aquariums force intelligent marine animals to perform and spend their lives in captivity.
                        (Read more here: </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/zoos-pseudo-sanctuaries/aquariums-marine-parks/"><span data-dcnode-id="1236" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/zoos-pseudo-sanctuaries/aquariums-marine-parks/</span></a><span data-dcnode-id="1234" instrument_node="">)</span></li><span data-dcnode-id="1232" instrument_node="">
</span><li data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">Worldwide – Marine animals share strong social bonds within families, just like humans.  Marine themed entertainment parks and aquariums destroy familiar bonds, ripping dolphins and orcas – who would normally stay with their family groups for life – away from the normal social networks, forcing them to live solitary lives of confinement.
                        (Read more here: </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/issues/entertainment/marine-parks/"><span data-dcnode-id="1230" instrument_node="">https://www.petaasia.com/issues/entertainment/marine-parks/</span></a><span data-dcnode-id="1228" instrument_node="">)</span></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1225" instrument_node="">Philippines – Ocean litter has caused the death of yet another enormous marine animal, with a juvenile whale found dead on the shores of the Philippines having ingested more 40 kilograms of plastic rubbish and other waste.
                        (Read more here: </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/news/whale-dies-from-ingesting-plastic-bags-philippines"><span data-dcnode-id="1224" instrument_node="">https://www.petaasia.com/news/whale-dies-from-ingesting-plastic-bags-philippines</span></a><span data-dcnode-id="1222" instrument_node="">)</span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">Choshi, Japan – A dolphin, 46 penguins, and other marine animals and fish have been abandoned following the closure of a marine-themed aquarium in Choshi, Japan.  The marine animals were abandoned after the park was closed, with no arrangements made for their safe transfer to a marine animal sanctuary.
                        (Read more here: </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.petaasia.com/page/29765/action/1"><span data-dcnode-id="1218" instrument_node="">https://secure.petaasia.com/page/29765/action/1</span></a><span data-dcnode-id="1216" instrument_node="">)</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">Canada – Every year sees Canada play host to a shameful practice, the annual bludgeoning of baby harp seals, most under three months of age.  By repeatedly shooting and clubbing baby seals, hunters kill thousands of babies every year in a practice that not only condoned but celebrated by the Canadian government.
                        (Read more here: </span><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/news/5-easy-ways-help-animals-world-oceans-day/"><span data-dcnode-id="1212" instrument_node="">https://www.petaasia.com/news/5-easy-ways-help-animals-world-oceans-day/</span></a><span data-dcnode-id="1210" instrument_node="">)</span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1204"><span data-dcnode-id="1207" instrument_node="">Worldwide – If asked to guess which creature is the most dangerous predator in the world, most people would point the finger squarely at sharks.  However, humans far outweigh sharks or any other creature when it comes to massacres and meat consumption.  To compare, note that humans kill at least 100 billion sharks every year, in addition to the billions of other sea creatures and land animals.  Meanwhile, sharks kill on average 10 humans every year.  Who's the biggest predator now?
                        (Read more here: </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/features/sharks"></a><span data-dcnode-id="1205" instrument_node="">https://www.peta.org/features/sharks)
                        </span></li><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node="">Worldwide – Shark fin soup is considered a delicious meal for some, but it means painful suffocation and eventual death for millions of sharks around the world every year.  Sharks are caught and dragged to the surface of the water, where their fins are brutally cut off.  Since the rest of the shark's body is not wanted, they are tossed back into the water to die a slow and painful death, usually from suffocation.
                        (Read more here: </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/blog/shark-fishing-banned-bahamas/"><span data-dcnode-id="1201" instrument_node="">https://www.peta.org/blog/shark-fishing-banned-bahamas/</span></a><span data-dcnode-id="1199" instrument_node="">)</span></li><span data-dcnode-id="1197" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1196" instrument_node="">United States – SeaWorld is known for inflicting pain and suffering on its captive marine wildlife, but perhaps not so bad as its treatment of penguins.  Endlessly paraded around as props and entertainment, penguins know no safety at SeaWorld.  Repeatedly having to undergo surgery to have rubbish removed from their stomachs from the inhumane and dirty enclosure they swim in, penguins live lives of misery from the moment are stolen from her mothers to their eventual deaths in captivity.
                        (Read more here: </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seaworldofhurt.com/world-penguin-day-wont-believe-seaworld-treated-penguins"><span data-dcnode-id="1195" instrument_node="">https://www.seaworldofhurt.com/world-penguin-day-wont-believe-seaworld-treated-penguins</span></a><span data-dcnode-id="1193" instrument_node="">)</span></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">Iceland – Despite international pressure and low demand, an Icelandic company Hvalur hf (Whale Inc.) continues to slaughter fin whales.  Even though these whales are an endangered species, the CEO of the company describes them as an "abundant marine resource" and "just another fish for me".  Enormously large, fin whales are killed by being impaled with a harpoon fired from a cannon.
                        (Read more here: </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/blog/iceland-hvalur-fin-whale-hunt/"><span data-dcnode-id="1189" instrument_node="">https://www.peta.org/blog/iceland-hvalur-fin-whale-hunt/</span></a><span data-dcnode-id="1187" instrument_node="">)</span></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">Indonesia – A sperm whale has washed up on Indonesian shores having ingested 13 pounds of plastic streaming and plastic rubbish, including cups, bottles, bags, and even shoes.
                        (Read more here: </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/blog/dead-whale-ingested-plastic-bags-bottles-cups/"><span data-dcnode-id="1183" instrument_node="">https://www.peta.org/blog/dead-whale-ingested-plastic-bags-bottles-cups/</span></a><span data-dcnode-id="1181" instrument_node="">)</span></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">Canada – Despite international pressure and many countries banning the importation of seal fur, the Canadian government continues to support and condone annual baby seal clubbing.  Many Canadians no longer wish this practice to continue, yet the Canadian government has yet to ban the cruel and unnecessary practice.
                        (Read more here: </span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.peta.org/page/1144/action/1%3Flocale%3Den-US"><span data-dcnode-id="1177" instrument_node="">https://support.peta.org/page/1144/action/1?locale=en-US</span></a><span data-dcnode-id="1175" instrument_node="">)</span></li><span data-dcnode-id="1173" instrument_node="">
</span><li data-dcnode-id="1168"><span data-dcnode-id="1172" instrument_node="">Namibia – Starting on 1 July every year, an estimated 85,000 fur seal pups are murdered by brutal beatings and stabbing for their pelts, while another 6,000 male adult seal will be killed for their genitals to be harvested to make aphrodisiac for sale throughout Asia.
                        (Read more here: </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/news/stop-the-slaughter-of-the-seals-of-nam"><span data-dcnode-id="1171" instrument_node="">https://www.petaasia.com/news/stop-the-slaughter-of-the-seals-of-nam</span></a><span data-dcnode-id="1169" instrument_node="">)</span></li><span data-dcnode-id="1167" instrument_node="">
</span></ul><span data-dcnode-id="1165" instrument_node="">
</span><h2 data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1162" instrument_node="">
</span><ul data-dcnode-id="1157"><span data-dcnode-id="1161" instrument_node="">
</span><li data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">The first thing that must be done to help marine animals is to stop the multibillion-dollar marine themed entertainment industry.  By boycotting aquariums and theme parks like SeaWorld, and educating others to do the same, you can vote with your feet and your wallet and tell these giant corporations that they can no longer profit from abusing marine animals.  More generally, promise to never visit or support any organization that makes money from live animals.  Rethink everything you thought you knew about humans' "need" to eat fish to survive.  All nutrients found in fish can be easily sourced from plant-based products.  By choosing a vegan lifestyle, you can reduce international fishing and save the lives of countless fish and other marine animals around the world.</span></li><span data-dcnode-id="1158" instrument_node="">
</span></ul><span data-dcnode-id="1156" instrument_node="">
</span><h2 data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Read more about how you can help:</span></h2><span data-dcnode-id="1153" instrument_node="">
</span><ul data-dcnode-id="1147"><span data-dcnode-id="1152" instrument_node="">
</span><li data-dcnode-id="1149"><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/news/5-easy-ways-help-animals-world-oceans-day/"><span data-dcnode-id="1151" instrument_node="">https://www.petaasia.com/news/5-easy-ways-help-animals-world-oceans-day/</span></a></li><span data-dcnode-id="1148" instrument_node="">
</span></ul><span data-dcnode-id="1146" instrument_node="">
</span></div><span data-dcnode-id="1144" instrument_node="">
</span></div><span data-dcnode-id="1142" instrument_node="">
</span></div><span data-dcnode-id="1140" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1062"><span data-dcnode-id="1139" instrument_node="">
</span><div class="card-header" data-dcnode-id="1134" id="headingTen"><span data-dcnode-id="1138" instrument_node="">
</span><h3 aria-controls="collapseTen" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1136" data-target="#collapseTen" data-toggle="collapse"><span data-dcnode-id="1137" instrument_node="">
                      Land Mammals
                    </span></h3><span data-dcnode-id="1135" instrument_node="">
</span></div><span data-dcnode-id="1133" instrument_node="">
</span><div aria-labelledby="headingTen" class="collapse" data-dcnode-id="1064" data-parent="#accordionExample" id="collapseTen"><span data-dcnode-id="1132" instrument_node="">
</span><div class="card-body" data-dcnode-id="1066"><span data-dcnode-id="1131" instrument_node="">
</span><ul data-dcnode-id="1099"><span data-dcnode-id="1130" instrument_node="">
</span><li data-dcnode-id="1125"><span data-dcnode-id="1129" instrument_node="">Canada - 627,303 deer, elk, bison, wild boars, and rabbits were slaughtered by the canadian meat industry in 2017
                        (Read more here: </span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animaljustice.ca/blog/over-819-million-land-animals-slaughtered-by-canadian-meat-industry-in-2018"><span data-dcnode-id="1128" instrument_node="">https://www.animaljustice.ca/blog/over-819-million-land-animals-slaughtered-by-canadian-meat-industry-in-2018</span></a><span data-dcnode-id="1126" instrument_node="">)</span></li><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">China – Traditional Chinese medicine sees bear bile as a valuable resource.  It is this belief that has countless bears imprisoned in tiny cages, constantly having bile extracted from their gallbladders.  Imprisoned for their entire lives, bears often self-harm or go insane from their lives of cruelty.  When they are no longer able to produce bile, they are left to starve.
                        (Read more here: </span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsasia.org/au/facts-about-cruelty-to-animals-in-asia.html"><span data-dcnode-id="1122" instrument_node="">https://www.animalsasia.org/au/facts-about-cruelty-to-animals-in-asia.html</span></a><span data-dcnode-id="1120" instrument_node="">)</span></li><span data-dcnode-id="1118" instrument_node="">
</span><li data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">Germany – A German laboratory has come under investigation following reports and footage showing macaque monkeys being violently handled, beaten, grabbed with metal tongs, and restrained with braces during medical testing
                        (Read more here: </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/environment/2019/oct/15/barbaric-tests-on-monkeys-lead-to-calls-for-closure-of-german-lab"><span data-dcnode-id="1116" instrument_node="">https://www.theguardian.com/environment/2019/oct/15/barbaric-tests-on-monkeys-lead-to-calls-for-closure-of-german-lab</span></a><span data-dcnode-id="1114" instrument_node="">)</span></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">Worldwide - Hunting is considered a sport and fun pastime for people around the world, but at what cost? It is estimated that half of all animals shot with a crossbow are injured but do not die, causing these animals to live lives of pain and suffering, many of whom go on to die of starvation, too weak to find their own food.
                        (Read more here: </span><a data-dcnode-id="1109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/cruel-sports/hunting/"><span data-dcnode-id="1110" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/cruel-sports/hunting</span></a><span data-dcnode-id="1108" instrument_node="">)</span></li><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">United States – Canned hunting, where animals are kept on private reserves and rich hunters pay tens of thousands of dollars for the "thrill" of hunting their own animal and keeping its head as a trophy, is rife throughout the United States as it is in other parts of the world.  Ted Turner owns more 2 million acres of land throughout the United States and accepts tens of thousands of dollars from hunters to kill turkeys, antelopes, deer, and bison on his private land.  With a policy of "no kill, no pay", you can be sure that each hunter gets what they came for when they visit a canned hunting ranch.
                        (Read more here: </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/cruel-sports/hunting/canned-hunting/"><span data-dcnode-id="1104" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/cruel-sports/hunting/canned-hunting/</span></a><span data-dcnode-id="1102" instrument_node="">)</span></li><span data-dcnode-id="1100" instrument_node="">
</span></ul><span data-dcnode-id="1098" instrument_node="">
</span><h2 data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1095" instrument_node="">
</span><ul data-dcnode-id="1090"><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">It's time to stop thinking of hunting as a sport and start recognizing it for what it is: a killing spree disguised as an acceptable pastime.  How can hunting be considered a sport, when sports include a referee or judge, consenting parties, and never end with a deliberate death.  Show your disdain for the cruelty of hunting by never liking or sharing a photo of hunting, and educating others about the realities of this cruel practice. </span></li><span data-dcnode-id="1091" instrument_node="">
</span></ul><span data-dcnode-id="1089" instrument_node="">

</span><h1 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Leaders of Animal Protection Efforts Around The World</span></h1><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">PETA (People for the Ethical Treatment of Animals)</span></h2><span data-dcnode-id="454" instrument_node="">
</span><ul data-dcnode-id="444"><span data-dcnode-id="453" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Headquartered in the United States but with offices in countries all over the world, PETA is the world's largest animal rights organization. With more than 6.5 million supporters around the globe, PETA plays an enormous role in animal advocacy, education, protests, campaigning for legislative reform, and on-the-ground rescues.</span></li><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="449" instrument_node="">There are numerous ways – both financial and non-financial – to support PETA's efforts. Find out more here. </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/donate/ways-to-support-peta/"><span data-dcnode-id="448" instrument_node="">https://www.peta.org/donate/ways-to-support-peta/</span></a></li><span data-dcnode-id="445" instrument_node="">
</span></ul><span data-dcnode-id="443" instrument_node="">
</span><h2 data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">The Humane Society</span></h2><span data-dcnode-id="440" instrument_node="">
</span><ul data-dcnode-id="433"><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="435"><span data-dcnode-id="438" instrument_node="">Based in the United States, the Humane Society aims to put an end to animal cruelty in all its forms. There are many ways to support the Humane Society, including financially, by volunteering, by helping with advocacy, or even by donating unwanted vehicles. Find out more here. </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanesociety.org/how-you-can-help"><span data-dcnode-id="437" instrument_node="">https://www.humanesociety.org/how-you-can-help</span></a></li><span data-dcnode-id="434" instrument_node="">
</span></ul><span data-dcnode-id="432" instrument_node="">
</span><h2 data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">FARM (Farm Animal Rights Movement)</span></h2><span data-dcnode-id="429" instrument_node="">
</span><ul data-dcnode-id="419"><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">With a specific focus on farm animals and founded back in 1981, FARM was the first-ever United States base animal-rights organization. With a strong push towards paganism and the end of animal farming, FARM runs public awareness campaigns and aims to train the next generation of activists while working to end animal farming forever.</span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="421"><span data-dcnode-id="424" instrument_node="">Donate to FARM or shop at their online store here. </span><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//farmusa.org/whyyou"><span data-dcnode-id="423" instrument_node="">https://farmusa.org/whyyou</span></a></li><span data-dcnode-id="420" instrument_node="">
</span></ul><span data-dcnode-id="418" instrument_node="">
</span><h2 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Farm Sanctuary</span></h2><span data-dcnode-id="415" instrument_node="">
</span><ul data-dcnode-id="405"><span data-dcnode-id="414" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">This United States-based animal welfare organization creates and runs physical sanctuaries to rescue and care for factory farm animals, while also advocating for law and policy reform and educating people on the plight of animals forced to live short, painful lives on factory farms. Farm Sanctuary accepts financial support and also runs a sponsorship program for rescued farm animals living in one of their sanctuaries.</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="407"><span data-dcnode-id="410" instrument_node="">Find out the various ways you can help here. </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.farmsanctuary.org/giving/more-opportunities/"><span data-dcnode-id="409" instrument_node="">https://www.farmsanctuary.org/giving/more-opportunities/</span></a></li><span data-dcnode-id="406" instrument_node="">
</span></ul><span data-dcnode-id="404" instrument_node="">
</span><h2 data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Vegan Outreach</span></h2><span data-dcnode-id="401" instrument_node="">
</span><ul data-dcnode-id="391"><span data-dcnode-id="400" instrument_node="">
</span><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Base in the United States but with several international offices – most notably one in India – Vegan Outreach is a vegan advocacy organization that hosts challenges and guided plans to help everyday people transition to a plant-based diet.</span></li><span data-dcnode-id="397" instrument_node="">
</span><li data-dcnode-id="393"><span data-dcnode-id="396" instrument_node="">Donate to Vegan Outreach here. </span><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//veganoutreach.org/donate/"><span data-dcnode-id="395" instrument_node="">https://veganoutreach.org/donate/</span></a></li><span data-dcnode-id="392" instrument_node="">
</span></ul><span data-dcnode-id="390" instrument_node="">
</span><h2 data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">WSPA (World Society for the Protection of Animals)</span></h2><span data-dcnode-id="387" instrument_node="">
</span><ul data-dcnode-id="377"><span data-dcnode-id="386" instrument_node="">
</span><li data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Headquartered in Canada, WSPA provides advocacy and education services on animal protection and shines a light on animal cruelty in zoos, farms, aquariums, and factory farming. With a strong emphasis on advocating for legislative reform, WSPA tackles some of the biggest animal-rights issues throughout Canada.</span></li><span data-dcnode-id="383" instrument_node="">
</span><li data-dcnode-id="379"><span data-dcnode-id="382" instrument_node="">Find out all the ways you can support WSPA here. </span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldanimalprotection.ca/ways-give"><span data-dcnode-id="381" instrument_node="">https://www.worldanimalprotection.ca/ways-give</span></a></li><span data-dcnode-id="378" instrument_node="">
</span></ul><span data-dcnode-id="376" instrument_node="">
</span><h2 data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">ASPCA (American Society for the Prevention of Cruelty to Animals)</span></h2><span data-dcnode-id="373" instrument_node="">
</span><ul data-dcnode-id="363"><span data-dcnode-id="372" instrument_node="">
</span><li data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">ASPCA was the first animal-rights organization founded in the United States and remains one of the world's largest. With more than 2 million members and supporters throughout the United States, ASPCA focuses its efforts on legislative reform and campaigning for anti-cruelty measures to be inserted into existing laws and policies. The organization also has a strong presence in animal rescue and placement efforts.</span></li><span data-dcnode-id="369" instrument_node="">
</span><li data-dcnode-id="365"><span data-dcnode-id="368" instrument_node="">Donate to the ASPCA here. </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.aspca.org/donate/donate"><span data-dcnode-id="367" instrument_node="">https://secure.aspca.org/donate/donate</span></a></li><span data-dcnode-id="364" instrument_node="">
</span></ul><span data-dcnode-id="362" instrument_node="">
</span><h2 data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Animal Welfare Institute</span></h2><span data-dcnode-id="359" instrument_node="">
</span><ul data-dcnode-id="349"><span data-dcnode-id="358" instrument_node="">
</span><li data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Founded in the United States back in 1951, the Animal Welfare Institute has a particular focus on animals used in laboratories for testing and experiments. With a separate division that deals with legislative reform, the Animal Welfare Institute continues to advocate for product and medical testing that does not involve the use of animals.</span></li><span data-dcnode-id="355" instrument_node="">
</span><li data-dcnode-id="351"><span data-dcnode-id="354" instrument_node="">ind out how to donate to the Animal Welfare Institute here. </span><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//awionline.org/content/make-donation-awi"><span data-dcnode-id="353" instrument_node="">https://awionline.org/content/make-donation-awi</span></a></li><span data-dcnode-id="350" instrument_node="">
</span></ul><span data-dcnode-id="348" instrument_node="">
</span><h2 data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Best Friends Animal Society</span></h2><span data-dcnode-id="345" instrument_node="">
</span><ul data-dcnode-id="335"><span data-dcnode-id="344" instrument_node="">
</span><li data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Headquartered in Utah in the United States, the Best Friends Animal Society largely focuses its education and advocacy efforts on pet rescue and adoption, with a push to spay and neuter all domestic animals. Its bimonthly magazine has more than 200,000 subscribers, bolstered by the organization's presence following Hurricane Katrina and its unrelenting efforts to provide animal rescue services in affected areas.</span></li><span data-dcnode-id="341" instrument_node="">
</span><li data-dcnode-id="337"><span data-dcnode-id="340" instrument_node="">Find out the various ways you can support the Best Friends Animal Society here, including with financial donations or animal adoption. </span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bestfriends.org/donate"><span data-dcnode-id="339" instrument_node="">https://bestfriends.org/donate</span></a></li><span data-dcnode-id="336" instrument_node="">
</span></ul><span data-dcnode-id="334" instrument_node="">
</span><h2 data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">D.E.L.T.A. Rescue</span></h2><span data-dcnode-id="331" instrument_node="">
</span><ul data-dcnode-id="321"><span data-dcnode-id="330" instrument_node="">
</span><li data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Based in California in the United States, D.E.L.T.A. Rescue was the first and remains one of the only organizations to rescue animals that have been abandoned or born in the wilderness. D.E.L.T.A. Rescue has two hospitals and sanctuaries spanning more than 150 acres, making it one of the largest no-kill sanctuaries that promise to care for its rescued animals for the remainder of their lives. D.E.L.T.A. Rescue remains committed to the longevity and safety of its rescued animals and does not offer animal adoption. However, financial supporters can come on a tour of one of the sanctuaries to see the organization's efforts firsthand.</span></li><span data-dcnode-id="327" instrument_node="">
</span><li data-dcnode-id="323"><span data-dcnode-id="326" instrument_node="">Find out how to support D.E.L.T.A. Rescue here. </span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.deltarescue.org/make-donation-help-animals/"><span data-dcnode-id="325" instrument_node="">https://www.deltarescue.org/make-donation-help-animals/</span></a></li><span data-dcnode-id="322" instrument_node="">
</span></ul><span data-dcnode-id="320" instrument_node="">
</span><h2 data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">The Dian Fossey Gorilla Fund International</span></h2><span data-dcnode-id="317" instrument_node="">
</span><ul data-dcnode-id="307"><span data-dcnode-id="316" instrument_node="">
</span><li data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Headquartered in the United States but with teams on the ground in the Congo and Rwanda, the Dian Fossey Gorilla Fund International is solely focused on the study and protection of gorillas and gorilla habitats in Africa, with particular emphasis on Rwanda. The organization employs trackers to continuously monitor and protect gorillas in their natural habitat as part of their Karisoke Research Center, while advocates and supporters bravely destroy poachers' traps and continue to advocate for the rights of gorillas and to stop poaching forever.</span></li><span data-dcnode-id="313" instrument_node="">
</span><li data-dcnode-id="309"><span data-dcnode-id="312" instrument_node="">There are various ways to support the Dian Fossey Gorilla Fund International, including financial donations and symbolic gorilla adoption. Find out more here. </span><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gorillafund.org/get-involved/"><span data-dcnode-id="311" instrument_node="">https://gorillafund.org/get-involved/</span></a></li><span data-dcnode-id="308" instrument_node="">
</span></ul><span data-dcnode-id="306" instrument_node="">
</span><h2 data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">PAWS (Performing Animal Welfare Society)</span></h2><span data-dcnode-id="303" instrument_node="">
</span><ul data-dcnode-id="293"><span data-dcnode-id="302" instrument_node="">
</span><li data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">PAWS operates wildlife sanctuaries to care for abused, abandoned, or retired performing animals in the United States. When a wild animal has been cruelly imprisoned and forced to entertain for years or even decades, they deserve to live out the rest of their years in a peaceful natural habitat where they are not being controlled or forced to perform in any way. PAWS provides such sanctuaries for former performing animals and also rescues animals from the exotic animal trade.</span></li><span data-dcnode-id="299" instrument_node="">
</span><li data-dcnode-id="295"><span data-dcnode-id="298" instrument_node="">Find out how to support PAWS here. </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pawsweb.org/support_paws_home_page.html"><span data-dcnode-id="297" instrument_node="">https://www.pawsweb.org/support_paws_home_page.html</span></a></li><span data-dcnode-id="294" instrument_node="">
</span></ul><span data-dcnode-id="292" instrument_node="">
</span><h2 data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Animals Australia</span></h2><span data-dcnode-id="289" instrument_node="">
</span><ul data-dcnode-id="279"><span data-dcnode-id="288" instrument_node="">
</span><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">One of the largest and most prolific animal-rights organizations in Australia, Animals Australia promotes and supports veganism, the end of live animal export, and animal protection and anti-cruelty efforts across the country. In recent years, Animals Australia has been focused on undertaking risky undercover investigations and exposing widespread animal cruelty through television exposes and advertisements.</span></li><span data-dcnode-id="285" instrument_node="">
</span><li data-dcnode-id="281"><span data-dcnode-id="284" instrument_node="">There are various ways to support Animals Australia, including becoming a financial member, joining in their advocacy efforts, or shopping in their cruelty-free online store. </span><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.animalsaustralia.org/donate/"><span data-dcnode-id="283" instrument_node="">https://secure.animalsaustralia.org/donate/</span></a></li><span data-dcnode-id="280" instrument_node="">
</span></ul><span data-dcnode-id="278" instrument_node="">

</span><div class="chat-box" data-dcnode-id="222" id="animated" style="display: none;"><h3 class="fade-one" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Click On The Map Pins To Learn More!</span></h3></div><span data-dcnode-id="221" instrument_node="">
</span><div class="about" data-dcnode-id="178"><span data-dcnode-id="220" instrument_node="">
</span><h2 data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">About this project</span></h2><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Animals around the world need our help.</span></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Dogs, cats, bears, elephants, marine wildlife. The tiniest creatures to the world's giants.</span></p><span data-dcnode-id="211" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">The problem seems insurmountable.</span></p><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">As an animal lover, what can you do? Signing a petition, adopting a rescue animal, donating money to an animal sanctuary: these efforts can seem tiny when compared to the sheer vastness of the issue.</span></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Sure, by rescuing a dog rather than buying a puppy, you've saved one adult dog from being killed in an overgrown shelter. You've given her a cozy, warm, protected home to live out her final years. You've shown her love and peace and safety after a life of cruelty and neglect.</span></p><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">But what about the billions of other animals in the world that need your help too?</span></p><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="198" instrument_node="">You are just one person, and you can only do what you can do. At first, this sentiment may feel disempowering, but its intent is quite the opposite. You are one person, and you have done as much as you can do with what you have. </span><b data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">If everyone in the world followed in your footsteps, global animal cruelty issues would no longer exist.</span></b></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">That's why we put together this information. We aimed to spread awareness of global animal rights issues, to shine a light on the plights of some of the world's most vulnerable and abused inhabitants. For those who were unaware of the true extent of animal abuse around the world, we aimed to put this issue in sharp focus. For those who were well aware of the problems faced by animals of every size and in every country, we aimed to provide easy ways for you to help and support the organizations that share the same values as you do.</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">This infographic is the result of months of in-depth research into numerous publications. We compiled as much data as we could find, from local animal rights issues in various countries and continents of the world to issues that affect animals globally. We chose the globe model to visually represent the types of animal abuse issues that are prevalent in various parts of the world. We hope that the globe model is coherent and helps to present the data in a way that is accessible and understandable.</span></p><span data-dcnode-id="188" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Now that you have a much better understanding of issues affecting animals across the globe, what can you do? This next part is up to you. Perhaps you'd like to focus your efforts in your local area. Our infographic and list of resources will help you to find local animal rescue organizations to support.</span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Alternatively, you may feel drawn to support a particular animal rights issue, even if it is not one local to you. You may not live in Africa or Asia, but the plight of elephants used as machines and for entertainment may be the most important issue to you.</span></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">If the data we have compiled, the resources we have listed, and the resulting infographic inspires just one person to take action against just one type of animal cruelty, we will consider our efforts to have been entirely worth it.</span></p><span data-dcnode-id="179" instrument_node="">
