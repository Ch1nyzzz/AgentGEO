</span><h1 data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Animal Cruelty Around The World</span></h1><span data-dcnode-id="1920" instrument_node="">
</span><span data-dcnode-id="1918" instrument_node="">
</span><div class="custom-accordian" data-dcnode-id="1058"><span data-dcnode-id="1917" instrument_node="">
</span><div class="accordion" data-dcnode-id="1060" id="accordionExample"><span data-dcnode-id="1916" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1871"><span data-dcnode-id="1915" instrument_node="">
</span><div class="card-header" data-dcnode-id="1910" id="headingOne"><span data-dcnode-id="1914" instrument_node="">
</span><h3 aria-controls="collapseOne" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1912" data-target="#collapseOne" data-toggle="collapse"><span data-dcnode-id="1913" instrument_node="">
                       Worldwide
                    </span></h3><span data-dcnode-id="1911" instrument_node="">
</span></div><span data-dcnode-id="1909" instrument_node="">
</span><div aria-labelledby="headingOne" class="collapse" data-dcnode-id="1873" data-parent="#accordionExample" id="collapseOne"><span data-dcnode-id="1908" instrument_node="">
</span><div class="card-body" data-dcnode-id="1875"><span data-dcnode-id="1907" instrument_node="">
</span><ul data-dcnode-id="1877"><span data-dcnode-id="1906" instrument_node="">
</span><li data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">96% of a circus animal's life is spent in a cage</span></li><span data-dcnode-id="1903" instrument_node="">
</span><li data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">150 million land animals killed for food every day (56 Billion a year in the US alone.)</span></li><span data-dcnode-id="1900" instrument_node="">
</span><li data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">11,417 sharks killed per hour due to unsustainable “finning”</span></li><span data-dcnode-id="1897" instrument_node="">
</span><li data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">10 million wild animals are trapped and killed exclusively for their fur each year</span></li><span data-dcnode-id="1894" instrument_node="">
</span><li data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">1 billion rabbits and 50 million other animals like foxes, seals, mink, and raccoon dogs are raised on fur farms or trapped in the wild and killed for their pelts every year</span></li><span data-dcnode-id="1891" instrument_node="">
</span><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">15 million warm-blooded animals tortured daily in laboratories</span></li><span data-dcnode-id="1888" instrument_node="">
</span><li data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">100 million sharks, fish, aquatic animals injured by fishing trolleys</span></li><span data-dcnode-id="1885" instrument_node="">
</span><li data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">65 billion animals killed annually for food. That’s 9 animals for every living human, every year</span></li><span data-dcnode-id="1882" instrument_node="">
</span><li data-dcnode-id="1879"><i data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Help us keep this list up-to-date, let us know about changes we missed, or that we should add on social media!</span></i></li><span data-dcnode-id="1878" instrument_node="">
</span></ul><span data-dcnode-id="1876" instrument_node="">
</span></div><span data-dcnode-id="1874" instrument_node="">
</span></div><span data-dcnode-id="1872" instrument_node="">
</span></div><span data-dcnode-id="1870" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1743"><span data-dcnode-id="1869" instrument_node="">
</span><div class="card-header" data-dcnode-id="1864" id="headingTwo"><span data-dcnode-id="1868" instrument_node="">
</span><h3 aria-controls="collapseTwo" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1866" data-target="#collapseTwo" data-toggle="collapse"><span data-dcnode-id="1867" instrument_node="">
                      Dogs
                    </span></h3><span data-dcnode-id="1865" instrument_node="">
</span></div><span data-dcnode-id="1863" instrument_node="">
</span><div aria-labelledby="headingTwo" class="collapse" data-dcnode-id="1745" data-parent="#accordionExample" id="collapseTwo"><span data-dcnode-id="1862" instrument_node="">
</span><div class="card-body" data-dcnode-id="1747"><span data-dcnode-id="1861" instrument_node="">
</span><ul data-dcnode-id="1796"><span data-dcnode-id="1860" instrument_node="">
</span><li class="asia location" data-dcnode-id="1855"><span data-dcnode-id="1859" instrument_node="">Asia - Dog fighting is present in various locations around Asia. Dogs are pitted against each other until one of them is declared the winner, many times the winner is declared when one of the dogs dies. Notably, China and Japan have not outlawed the practice, and despite being banned under the Taliban, dog fighting has seen a resurgence in Afghanistan. Dog fighting is particularly prominent in China and Pakistan.
                        (Read more here: </span><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dog_fighting%23Asia"><span data-dcnode-id="1858" instrument_node="">https://en.wikipedia.org/wiki/Dog_fighting#Asia</span></a><span data-dcnode-id="1856" instrument_node="">)</span></li><span data-dcnode-id="1854" instrument_node="">
</span><li data-dcnode-id="1849"><span data-dcnode-id="1853" instrument_node="">Europe - Although animal cruelty laws have been passed in some parts of Russia, dog fighting is still widely practiced in areas where it remains legal. Dog fights are still prevalent in Albania, it has been legal for over 25 years.
                        (Read more here: </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dog_fighting%23Europe"><span data-dcnode-id="1852" instrument_node="">https://en.wikipedia.org/wiki/Dog_fighting#Europe</span></a><span data-dcnode-id="1850" instrument_node="">)</span></li><span data-dcnode-id="1848" instrument_node="">
</span><li data-dcnode-id="1840"><span data-dcnode-id="1847" instrument_node="">Quebec, Canada - The proliferation of puppy mills in Quebec has resulted in an estimated 1500 and 1800 plants now in operation. These inhumane facilities produce the birth of approximately 400,000 puppies every year. It is unknown how many puppy mills are currently operating in Canada since these farms tend to be located in sparsely inhabited areas, and operate covertly - requiring some investigation to be uncovered.  
                        (Read more here: </span><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spacanada.org/en/campaigns/puppy-mills.html"><span data-dcnode-id="1846" instrument_node="">https://www.spacanada.org/en/campaigns/puppy-mills.html</span></a><span data-dcnode-id="1844" instrument_node=""> and </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/pet-trade/puppy-mills"><span data-dcnode-id="1843" instrument_node="">https://www.peta.org/issues/animal-companion-issues/pet-trade/puppy-mills</span></a><span data-dcnode-id="1841" instrument_node="">)</span></li><span data-dcnode-id="1839" instrument_node="">
</span><li class="united-states location" data-dcnode-id="1834"><span data-dcnode-id="1838" instrument_node="">United States - There are an estimated 10,000 puppy mills, licensed and unlicensed, currently operating in the United States. More than 2 million puppies are bred in these mills annually.
                        (Read more here: </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thepuppymillproject.org/about-puppy-mills"><span data-dcnode-id="1837" instrument_node="">https://www.thepuppymillproject.org/about-puppy-mills</span></a><span data-dcnode-id="1835" instrument_node="">)</span></li><span data-dcnode-id="1833" instrument_node="">
</span><li class="china location" data-dcnode-id="1828"><span data-dcnode-id="1832" instrument_node="">China - 10 million dogs are killed for their meat each year in China alone. When the dogs arrive at the dog meat markets, dehydrated, exhausted, and injured, they are often forced to watch other dogs being slaughtered.
                        (Read more here: </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsasia.org/us/our-work/cat-and-dog-welfare/facts-about-dog-meat-trade.html"><span data-dcnode-id="1831" instrument_node="">https://www.animalsasia.org/us/our-work/cat-and-dog-welfare/facts-about-dog-meat-trade.html</span></a><span data-dcnode-id="1829" instrument_node="">)</span></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1822"><span data-dcnode-id="1826" instrument_node="">China – Breeding dogs spend their entire lives in cages, some so small they can't even turn around.  Those that can move are seen spinning in circles and pacing, having gone insane from the cruelty they're subjected to.  Breeding dogs in puppy mills have never known love, affection, or even what it's like to walk on the grass.
                        (Read more here: </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/features/chinese-puppy-mills"><span data-dcnode-id="1825" instrument_node="">https://www.petaasia.com/features/chinese-puppy-mills</span></a><span data-dcnode-id="1823" instrument_node="">)</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1816"><span data-dcnode-id="1820" instrument_node="">United States – Dog owners who haven't properly trained their dogs and don't know how to control their dog's barking are resorting to "debarking" surgery.  Making it physically impossible for a dog to bark, debarking surgery is needlessly cruel and strips a dog of its natural means of communication.
                        (Read more here: </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/cruel-practices/debarking"><span data-dcnode-id="1819" instrument_node="">https://www.peta.org/issues/animal-companion-issues/cruel-practices/debarking</span></a><span data-dcnode-id="1817" instrument_node="">)</span></li><span data-dcnode-id="1815" instrument_node="">
</span><li data-dcnode-id="1810"><span data-dcnode-id="1814" instrument_node="">United States – Greyhound dogs condemned to a life of racing spend as much as 23 hours every day locked in a tiny cage.  Injuries are rife on the racetrack, and most greyhounds don't live to see their "retirement age" of four or five years.  Many dogs who do reach retirement are euthanized.
                        (Read more here: </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/cruel-sports/greyhound-racing"><span data-dcnode-id="1813" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/cruel-sports/greyhound-racing</span></a><span data-dcnode-id="1811" instrument_node="">)</span></li><span data-dcnode-id="1809" instrument_node="">
</span><li data-dcnode-id="1804"><span data-dcnode-id="1808" instrument_node="">California, United States – Greyhounds no longer useful in the racing industry are continuously bled to provide dog blood to veterinary clinics across the United States and Asia.  Dogs were not permitted to socialize and spent up to 23 hours a day in tiny cages.
                        (Read more here: </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//investigations.peta.org/hemopet-greyhounds-expose"><span data-dcnode-id="1807" instrument_node="">https://investigations.peta.org/hemopet-greyhounds-expose</span></a><span data-dcnode-id="1805" instrument_node="">)</span></li><span data-dcnode-id="1803" instrument_node="">
</span><li data-dcnode-id="1798"><span data-dcnode-id="1802" instrument_node="">United States – Companion animals often suffer at the hands of domestic violence abusers.  As many as 1 million pets per year are hurt, abused, or killed as a result of domestic violence, with more than 70 percent of women with pets who enter a domestic violence shelter reporting that their abuser had hurt or even killed a family pet.
                        (Read more here: </span><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brandongaille.com/23-fascinating-dog-abuse-facts-and-statistics"><span data-dcnode-id="1801" instrument_node="">https://brandongaille.com/23-fascinating-dog-abuse-facts-and-statistics</span></a><span data-dcnode-id="1799" instrument_node="">)</span></li><span data-dcnode-id="1797" instrument_node="">
</span></ul><span data-dcnode-id="1795" instrument_node="">
</span><h2 data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1792" instrument_node="">
</span><ul data-dcnode-id="1787"><span data-dcnode-id="1791" instrument_node="">
</span><li data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">The only way to help dogs being abused is to be proactive.  If you know of a dog being kept in cruel conditions or suspect a dog is being abused, it's time to take action.  If it is safe to do so, take videos or photos of the situation and then call your local animal protection organization.  To help out with larger issues, start by educating family and friends about the issue.  Most people are unaware of the torturous lives greyhounds live, for example, and education is the first step towards changing people's attitudes towards the greyhound industry.</span></li><span data-dcnode-id="1788" instrument_node="">
</span></ul><span data-dcnode-id="1786" instrument_node="">
</span><h2 data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Read more about what can be done about this cruelty, and how you can help through these links:</span></h2><span data-dcnode-id="1783" instrument_node="">
</span><ul data-dcnode-id="1749"><span data-dcnode-id="1782" instrument_node="">
</span><li data-dcnode-id="1779"><a data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse"><span data-dcnode-id="1781" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse</span></a></li><span data-dcnode-id="1778" instrument_node="">

</span><li data-dcnode-id="1763"><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/pets/news-features/animal-cruelty-in-china-what-can-be-done-about-it/"><span data-dcnode-id="1765" instrument_node="">https://www.telegraph.co.uk/pets/news-features/animal-cruelty-in-china-what-can-be-done-about-it</span></a></li><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1759"><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsi.org/news-media/saving-dogs-from-chinas-dog-meat-trade/"><span data-dcnode-id="1761" instrument_node="">https://www.hsi.org/news-media/saving-dogs-from-chinas-dog-meat-trade/</span></a></li><span data-dcnode-id="1758" instrument_node="">

</span><li data-dcnode-id="1751"><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sentientmedia.org/animal-cruelty/"><span data-dcnode-id="1753" instrument_node="">https://sentientmedia.org/animal-cruelty</span></a></li><span data-dcnode-id="1750" instrument_node="">

</span><div class="card mb-4" data-dcnode-id="1678"><span data-dcnode-id="1741" instrument_node="">
</span><div class="card-header" data-dcnode-id="1736" id="headingThree"><span data-dcnode-id="1740" instrument_node="">
</span><h3 aria-controls="collapseThree" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1738" data-target="#collapseThree" data-toggle="collapse"><span data-dcnode-id="1739" instrument_node="">
                      Cats
                    </span></h3><span data-dcnode-id="1737" instrument_node="">
</span></div><span data-dcnode-id="1735" instrument_node="">
</span><div aria-labelledby="headingThree" class="collapse" data-dcnode-id="1680" data-parent="#accordionExample" id="collapseThree"><span data-dcnode-id="1734" instrument_node="">
</span><div class="card-body" data-dcnode-id="1682"><span data-dcnode-id="1733" instrument_node="">
</span><ul data-dcnode-id="1707"><span data-dcnode-id="1732" instrument_node="">
</span><li data-dcnode-id="1727"><span data-dcnode-id="1731" instrument_node="">China - 4 million cats are killed for their meat each year in China alone. Many of these cats are still wearing their collars when they are snatched from the streets and thrown into tiny cages. Both the tortuous transportation and inhumane slaughter methods in China are some of the most shocking cases of animal abuse in the world.
                          (Read more here: </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsasia.org/au/facts-about-cruelty-to-animals-in-asia.html"><span data-dcnode-id="1730" instrument_node="">https://www.animalsasia.org/au/facts-about-cruelty-to-animals-in-asia.html</span></a><span data-dcnode-id="1728" instrument_node="">)</span></li><span data-dcnode-id="1726" instrument_node="">
</span><li data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node="">Vietnam - Cat meat can be found on various menus in Vietnam, even though it is technically illegal. The cat meat market in the country is wrapped in superstition. At the start of every month, the meat is consumed to boost libido, protect against misfortune, and even increase their agility to that of a cat. The butchers want tougher meat, so they terrorize the cats before slaughtering them.
                          (Read more here: [CAUTION: DISTURBING IMAGERY] </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesun.co.uk/news/5818658/video-vietnam-cat-meat-market-pets-butchered/"><span data-dcnode-id="1724" instrument_node="">https://www.thesun.co.uk/news/5818658/video-vietnam-cat-meat-market-pets-butchered/</span></a><span data-dcnode-id="1722" instrument_node="">)</span></li><span data-dcnode-id="1720" instrument_node="">
</span><li data-dcnode-id="1715"><span data-dcnode-id="1719" instrument_node="">United States - Approximately 3.4 million cats enter animal shelters every year. Among those cats, 37% are adopted and 41% are euthanized. Out of the 3 million cats and dogs euthanized in shelters annually, 80% (2.4 million) are healthy enough to be adopted.
                          (Read more here: </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kittencoalition.org/news-events/statistics"><span data-dcnode-id="1718" instrument_node="">https://kittencoalition.org/news-events/statistics</span></a><span data-dcnode-id="1716" instrument_node="">)</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1709"><span data-dcnode-id="1713" instrument_node="">United States - Over 19,000 cats are abused in laboratories each year with painful, invasive, and many times deadly experiments.
                          (Read more here: </span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-used-for-experimentation/cats-laboratories/"><span data-dcnode-id="1712" instrument_node="">https://www.peta.org/issues/animals-used-for-experimentation/cats-laboratories/</span></a><span data-dcnode-id="1710" instrument_node="">)</span></li><span data-dcnode-id="1708" instrument_node="">
</span></ul><span data-dcnode-id="1706" instrument_node="">
</span><h2 data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1703" instrument_node="">
</span><ul data-dcnode-id="1698"><span data-dcnode-id="1702" instrument_node="">
</span><li data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">The best way to help cats is to firstly spay or neuter your own pet cats, and then consider adopting a cat from a shelter rather than buying a kitten from a breeder.  When it comes to the larger issue of cat meat in China and Vietnam, education and awareness is the first step towards change.  Most people don't know that these issues are occurring, and spreading the word and raising awareness can promote a flow-on effect of advocacy and education.</span></li><span data-dcnode-id="1699" instrument_node="">
</span></ul><span data-dcnode-id="1697" instrument_node="">
</span><h2 data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Read more about how you can help here:</span></h2><span data-dcnode-id="1694" instrument_node="">
</span><ul data-dcnode-id="1684"><span data-dcnode-id="1693" instrument_node="">
</span><li data-dcnode-id="1690"><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse/"><span data-dcnode-id="1692" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse/</span></a></li><span data-dcnode-id="1689" instrument_node="">
</span><li data-dcnode-id="1686"><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse/"><span data-dcnode-id="1688" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse/</span></a></li><span data-dcnode-id="1685" instrument_node="">
</span></ul><span data-dcnode-id="1683" instrument_node="">
</span></div><span data-dcnode-id="1681" instrument_node="">
</span></div><span data-dcnode-id="1679" instrument_node="">
</span></div><span data-dcnode-id="1677" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1607"><span data-dcnode-id="1676" instrument_node="">
</span><div class="card-header" data-dcnode-id="1671" id="headingFour"><span data-dcnode-id="1675" instrument_node="">
</span><h3 aria-controls="collapseFour" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1673" data-target="#collapseFour" data-toggle="collapse"><span data-dcnode-id="1674" instrument_node="">
                      Cattle
                    </span></h3><span data-dcnode-id="1672" instrument_node="">
</span></div><span data-dcnode-id="1670" instrument_node="">
</span><div aria-labelledby="headingFour" class="collapse" data-dcnode-id="1609" data-parent="#accordionExample" id="collapseFour"><span data-dcnode-id="1669" instrument_node="">
</span><div class="card-body" data-dcnode-id="1611"><span data-dcnode-id="1668" instrument_node="">
</span><ul data-dcnode-id="1640"><span data-dcnode-id="1667" instrument_node="">
</span><li data-dcnode-id="1663"><span data-dcnode-id="1666" instrument_node="">United States – Cattle destined for the beef industry live a life of pain and suffering from the moment they're born.  Cattle branding involves third-degree burns on a cow's body, while horns of beef cows are burned or cut off.  Inadequately protected from the weather, many cows suffer or die in extreme summer or winter conditions.
                          (Read more here: </span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-used-for-food/factory-farming/cows/beef-industry/"></a><span data-dcnode-id="1664" instrument_node="">https://www.peta.org/issues/animals-used-for-food/factory-farming/cows/beef-industry/)</span></li><span data-dcnode-id="1662" instrument_node="">
</span><li data-dcnode-id="1657"><span data-dcnode-id="1661" instrument_node="">European Union – Cows and other farm animals are repeatedly subjected to cruel living conditions before finally being slaughtered.  In France, cattle raised for beef are inhumanely killed by deadly force to the back of the neck, so that abattoirs can sell cow brains without bone splinters.
                          (Read more here: </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/environment/2018/nov/14/farm-animal-abuses-widespread-across-europe-warn-auditors"><span data-dcnode-id="1660" instrument_node="">https://www.theguardian.com/environment/2018/nov/14/farm-animal-abuses-widespread-across-europe-warn-auditors</span></a><span data-dcnode-id="1658" instrument_node="">)</span></li><span data-dcnode-id="1656" instrument_node="">
</span><li data-dcnode-id="1651"><span data-dcnode-id="1655" instrument_node="">South America – Despite being denounced years ago, many South American beef abattoirs still slaughter cows by the "shackle and hoist" method, which sees cows hung upside down by hooks through the nostrils before being killed.
                          (Read more here: </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jpost.com/Israel-News/Undercover-footage-reveals-abuse-at-South-American-slaughterhouses-that-exports-to-Israel-471503"><span data-dcnode-id="1654" instrument_node="">https://www.jpost.com/Israel-News/Undercover-footage-reveals-abuse-at-South-American-slaughterhouses-that-exports-to-Israel-471503</span></a><span data-dcnode-id="1652" instrument_node="">)</span></li><span data-dcnode-id="1650" instrument_node="">
</span><li data-dcnode-id="1642"><span data-dcnode-id="1649" instrument_node="">New South Wales, Australia – Shocking cruelty was uncovered on a farm that supplies dairy products throughout Australia and to Vietnam.  Pregnant cows are restrained as their calves are violently pulled from their wombs before being killed or immediately taken away, while cows and calves were killed by multiple blows with a hammer or multiple bullets to the head. 
                          (Read more here:
                          </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/news/cattle-killed-with-sledgehammers-vietnam/"><span data-dcnode-id="1648" instrument_node="">https://www.petaasia.com/news/cattle-killed-with-sledgehammers-vietnam/</span></a><span data-dcnode-id="1646" instrument_node=""> and </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/action/calves-killed-with-hammers-cows-dragged-on-australian-dairy-farm/"><span data-dcnode-id="1645" instrument_node="">https://www.petaasia.com/action/calves-killed-with-hammers-cows-dragged-on-australian-dairy-farm/</span></a><span data-dcnode-id="1643" instrument_node="">)</span></li><span data-dcnode-id="1641" instrument_node="">
</span></ul><span data-dcnode-id="1639" instrument_node="">
</span><h2 data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1636" instrument_node="">
</span><ul data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">
</span><li data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">There is simply no humane way of extracting cow's milk.  All dairy farms cause unnecessary ongoing suffering to cows and calves.  The only way to help dairy cows and their calves is to raise awareness of the issues rife in the dairy industry and to adopt a vegan lifestyle.</span></li><span data-dcnode-id="1632" instrument_node="">
</span></ul><span data-dcnode-id="1630" instrument_node="">
</span><h2 data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Read more about how you can help here:</span></h2><span data-dcnode-id="1627" instrument_node="">
</span><ul data-dcnode-id="1613"><span data-dcnode-id="1626" instrument_node="">
</span><li data-dcnode-id="1623"><a data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse"><span data-dcnode-id="1625" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse</span></a></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1619"><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanecanada.ca/how_to_help"><span data-dcnode-id="1621" instrument_node="">https://www.humanecanada.ca/how_to_help
                          </span></a></li><span data-dcnode-id="1618" instrument_node="">
</span><li data-dcnode-id="1615"><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsaustralia.org/issues/stop-cattle-cruelty.php"><span data-dcnode-id="1617" instrument_node="">https://www.animalsaustralia.org/issues/stop-cattle-cruelty.php</span></a></li><span data-dcnode-id="1614" instrument_node="">
</span></ul><span data-dcnode-id="1612" instrument_node="">
</span></div><span data-dcnode-id="1610" instrument_node="">
</span></div><span data-dcnode-id="1608" instrument_node="">
</span></div><span data-dcnode-id="1606" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1525"><span data-dcnode-id="1605" instrument_node="">
</span><div class="card-header" data-dcnode-id="1600" id="headingFive"><span data-dcnode-id="1604" instrument_node="">
</span><h3 aria-controls="collapseFive" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1602" data-target="#collapseFive" data-toggle="collapse"><span data-dcnode-id="1603" instrument_node="">
                      Chickens
                    </span></h3><span data-dcnode-id="1601" instrument_node="">
</span></div><span data-dcnode-id="1599" instrument_node="">
</span><div aria-labelledby="headingFive" class="collapse" data-dcnode-id="1527" data-parent="#accordionExample" id="collapseFive"><span data-dcnode-id="1598" instrument_node="">
</span><div class="card-body" data-dcnode-id="1529"><span data-dcnode-id="1597" instrument_node="">
</span><ul data-dcnode-id="1562"><span data-dcnode-id="1596" instrument_node="">
</span><li data-dcnode-id="1591"><span data-dcnode-id="1595" instrument_node="">Canada - 729,971,245 chickens were slaughtered for meat in 2018. Chickens make up roughly 90% of land mammal slaughters in Canada.
                          (read more here: </span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animaljustice.ca/blog/over-819-million-land-animals-slaughtered-by-canadian-meat-industry-in-2018"><span data-dcnode-id="1594" instrument_node="">https://www.animaljustice.ca/blog/over-819-million-land-animals-slaughtered-by-canadian-meat-industry-in-2018</span></a><span data-dcnode-id="1592" instrument_node="">)</span></li><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1582"><span data-dcnode-id="1589" instrument_node="">Worldwide – Chickens, whether bred for food or for eggs, live lives of misery from the moment they hatched.  After hatching, chicks are separated by sex.  Male chicks are left to suffocate in plastic bags or are ground up alive, while females have their beaks cut off with a hot blade.
                          (Read more here: </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/features/egg-industry-cruelty/"><span data-dcnode-id="1588" instrument_node="">https://www.peta.org/features/egg-industry-cruelty/</span></a><span data-dcnode-id="1586" instrument_node=""> and </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-used-for-food/factory-farming/chickens/"><span data-dcnode-id="1585" instrument_node="">https://www.peta.org/issues/animals-used-for-food/factory-farming/chickens/</span></a><span data-dcnode-id="1583" instrument_node="">)</span></li><span data-dcnode-id="1581" instrument_node="">
</span><li data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node="">Worldwide – Broilers (chickens raised for meat) live in ridiculously cramped and filthy cages with thousands of other chickens.  Fed hormones and other drugs to promote unnaturally fast growth, many chickens die from disease or skeletal problems as their bodies struggle to keep up with their unnatural rate of growth.
                          (Read more here: </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/issues/food/chickens/"><span data-dcnode-id="1579" instrument_node="">https://www.petaasia.com/issues/food/chickens/</span></a><span data-dcnode-id="1577" instrument_node="">)</span></li><span data-dcnode-id="1575" instrument_node="">
</span><li data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node="">United States – Chickens grown for their meat are killed at just six weeks of age.  Slaughter begins by hanging the chickens upside down before running them through electrified water.  However, chickens can still feel the pain when their throats are slashed.  Some chickens remain alive after the throat-slashing until being submerged in boiling hot water. 
                          (Read more here: </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.veganpeace.com/animal_cruelty/chicken.htm"><span data-dcnode-id="1573" instrument_node="">http://www.veganpeace.com/animal_cruelty/chicken.htm</span></a><span data-dcnode-id="1571" instrument_node="">)</span></li><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1564"><span data-dcnode-id="1568" instrument_node="">Canada – If you've ever bought eggs or chicken meat labeled "cage-free", "free run", or "free-range" and thought that you were supporting a cruelty-free industry, think again.  In Canada, no chickens are kept in cages, which legally allows producers to use these deceptive terms.  However, chickens are still kept indoors in filthy and highly cramped conditions – no better than if they were in cages
                          (Read more here: </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spca.bc.ca/news/free-run-chicken-myth/%3Futm_referrer%3Dhttps%253A%252F%252Fwww.google.com%252F"><span data-dcnode-id="1567" instrument_node="">https://spca.bc.ca/news/free-run-chicken-myth/?utm_referrer=https%3A%2F%2Fwww.google.com%2F</span></a><span data-dcnode-id="1565" instrument_node="">)</span></li><span data-dcnode-id="1563" instrument_node="">
</span></ul><span data-dcnode-id="1561" instrument_node="">
</span><h2 data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1558" instrument_node="">
</span><ul data-dcnode-id="1553"><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">With arrays for eggs or meat, chickens are widely thought to be the world's most abused animals.  Society is turning away from red meat, causing demand for white chicken meat to continually increase.  To play your part in helping shut down the inhumane egg and chicken industry forever, choose a vegan lifestyle.</span></li><span data-dcnode-id="1554" instrument_node="">
</span></ul><span data-dcnode-id="1552" instrument_node="">
</span><h2 data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Read more about how you can help:</span></h2><span data-dcnode-id="1549" instrument_node="">
</span><ul data-dcnode-id="1531"><span data-dcnode-id="1548" instrument_node="">
</span><li data-dcnode-id="1545"><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse"><span data-dcnode-id="1547" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse</span></a></li><span data-dcnode-id="1544" instrument_node="">
</span><li data-dcnode-id="1541"><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanecanada.ca/how_to_help"><span data-dcnode-id="1543" instrument_node="">https://www.humanecanada.ca/how_to_help</span></a></li><span data-dcnode-id="1540" instrument_node="">
</span><li data-dcnode-id="1537"><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.change.org/p/stop-the-cruelty-towards-chickens"><span data-dcnode-id="1539" instrument_node="">https://www.change.org/p/stop-the-cruelty-towards-chickens</span></a></li><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1533"><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/the-big-idea/2017/6/19/15827828/factory-farming-switchetarian-beef-chicken"><span data-dcnode-id="1535" instrument_node="">https://www.vox.com/the-big-idea/2017/6/19/15827828/factory-farming-switchetarian-beef-chicken</span></a></li><span data-dcnode-id="1532" instrument_node="">
</span></ul><span data-dcnode-id="1530" instrument_node="">
</span></div><span data-dcnode-id="1528" instrument_node="">
</span></div><span data-dcnode-id="1526" instrument_node="">
</span></div><span data-dcnode-id="1524" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1423"><span data-dcnode-id="1523" instrument_node="">
</span><div class="card-header" data-dcnode-id="1518" id="headingSix"><span data-dcnode-id="1522" instrument_node="">
</span><h3 aria-controls="collapseSix" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1520" data-target="#collapseSix" data-toggle="collapse"><span data-dcnode-id="1521" instrument_node="">
                      Elephants
                    </span></h3><span data-dcnode-id="1519" instrument_node="">
</span></div><span data-dcnode-id="1517" instrument_node="">
</span><div aria-labelledby="headingSix" class="collapse" data-dcnode-id="1425" data-parent="#accordionExample" id="collapseSix"><span data-dcnode-id="1516" instrument_node="">
</span><div class="card-body" data-dcnode-id="1427"><span data-dcnode-id="1515" instrument_node="">
</span><ul data-dcnode-id="1462"><span data-dcnode-id="1514" instrument_node="">
</span><li data-dcnode-id="1509"><span data-dcnode-id="1513" instrument_node="">Asia – Elephants are often kept as attractions in small zoos or even as pets, in inappropriate environments with nowhere near enough room to move around.  Naturally sociable animals, elephants kept in captivity in Asia are housed alone.
                        (Read more here: </span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsasia.org/au/facts-about-cruelty-to-animals-in-asia.html"><span data-dcnode-id="1512" instrument_node="">https://www.animalsasia.org/au/facts-about-cruelty-to-animals-in-asia.html</span></a><span data-dcnode-id="1510" instrument_node="">)</span></li><span data-dcnode-id="1508" instrument_node="">
</span><li data-dcnode-id="1500"><span data-dcnode-id="1507" instrument_node="">United States – Despite public pressure, some circuses still use elephants as part of their act.  "Broken" from a very young age, elephants are whipped, shocked, beaten, and forced to stay standing for hours at a time so they can learn "tricks" to please the audience.
                        (Read more here: </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/features/ringling-bros-elephant-cruelty/"><span data-dcnode-id="1506" instrument_node="">https://www.peta.org/features/ringling-bros-elephant-cruelty/</span></a><span data-dcnode-id="1504" instrument_node=""> and </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/action/can-help-stop-elephant-abuse"><span data-dcnode-id="1503" instrument_node="">https://www.peta.org/action/can-help-stop-elephant-abuse</span></a><span data-dcnode-id="1501" instrument_node="">)</span></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1494"><span data-dcnode-id="1498" instrument_node="">Thailand – as many as 4,000 wild elephants are still being kept as captive slaves in Thailand.  Forced to entertain, give rides, haul heavy loads, or even beg in the streets, Thailand's elephants have been captured from the wild and had their spirits broken through violence and fear.
                        (Read more here: </span><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/issues/entertainment/elephants/"><span data-dcnode-id="1497" instrument_node="">https://www.petaasia.com/issues/entertainment/elephants/</span></a><span data-dcnode-id="1495" instrument_node="">)</span></li><span data-dcnode-id="1493" instrument_node="">
</span><li data-dcnode-id="1488"><span data-dcnode-id="1492" instrument_node="">Asia – Of the almost 3000 elephants kept in captivity throughout Asia to entertain tourists and provide rides, more than three-quarters of them live in appallingly cool conditions.  When not performing, elephants are often trained up on concrete floors with less than three meters to move.
                        (Read more here: </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldanimalprotection.org/news/taken-ride-thousands-elephants-exploited-tourism-are-held-cruel-conditions"><span data-dcnode-id="1491" instrument_node="">https://www.worldanimalprotection.org/news/taken-ride-thousands-elephants-exploited-tourism-are-held-cruel-conditions</span></a><span data-dcnode-id="1489" instrument_node="">)</span></li><span data-dcnode-id="1487" instrument_node="">
</span><li data-dcnode-id="1482"><span data-dcnode-id="1486" instrument_node="">Southeast Asia – Despite what tourist attractions will tell you, elephants used for rides and entertainment in Southeast Asia have not been rescued and do not live peaceful lives.  Breeding in captivity is extraordinarily difficult, with no captive element being bred in Vietnam in the last four decades.  Elephants used in Southeast Asia have been stolen directly from the wild.
                        (Read more here: </span><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalsasia.org/us/media/news/news-archive/the-truth-about-elephant-riding.html"><span data-dcnode-id="1485" instrument_node="">https://www.animalsasia.org/us/media/news/news-archive/the-truth-about-elephant-riding.html</span></a><span data-dcnode-id="1483" instrument_node="">)</span></li><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">Sri Lanka – A 70-year-old elephant called Tikiri was dressed in a costume to hide her skeletal body, still forced to perform and walk in endless parades.  Her eventual death was the only source of relief this elderly elephant had ever known in her life.
                        (Read more here: </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/news/captive-elephant-incidents/"><span data-dcnode-id="1479" instrument_node="">https://www.petaasia.com/news/captive-elephant-incidents/</span></a><span data-dcnode-id="1477" instrument_node="">)</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1470"><span data-dcnode-id="1474" instrument_node="">Nepal – Elephants are routinely beaten, stabbed with hooks, and have their ears violently pulled to force them to pretend to "play games" for the amusement of tourists and festival onlookers. 
                        (Read more here: </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.petaasia.com/page/43135/action/1"><span data-dcnode-id="1473" instrument_node="">https://secure.petaasia.com/page/43135/action/1</span></a><span data-dcnode-id="1471" instrument_node="">)</span></li><span data-dcnode-id="1469" instrument_node="">
</span><li data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">Botswana – Heavily armed elephant poachers are slaughtering elephants en masse following the dismantling of the anti-poaching unit in Botswana.
                        (Read more here: </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petaasia.com/media/90-elephants-gunned-down-botswana-urged-to-restore-anti-poaching-efforts/"><span data-dcnode-id="1467" instrument_node="">https://www.petaasia.com/media/90-elephants-gunned-down-botswana-urged-to-restore-anti-poaching-efforts/</span></a><span data-dcnode-id="1465" instrument_node="">)</span></li><span data-dcnode-id="1463" instrument_node="">
</span></ul><span data-dcnode-id="1461" instrument_node="">
</span><h2 data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1458" instrument_node="">
</span><ul data-dcnode-id="1429"><span data-dcnode-id="1457" instrument_node="">
</span><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Under no circumstances should elephants be used to entertain, carry loads, or provide rides.  While most circuses have succumbed to pressure and no longer use elephants, there are still some that do.  If you hear of a circus coming to town with elephants, contact your nearest animal protection organization.  When overseas, never visit an attraction or participate in elephant rides or entertainment, and never like or share photos of others who do so.
                        </span></li><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1451"><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/action/can-help-stop-elephant-abuse"><span data-dcnode-id="1453" instrument_node="">https://www.peta.org/action/can-help-stop-elephant-abuse</span></a></li><span data-dcnode-id="1450" instrument_node="">
</span><li data-dcnode-id="1447"><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse"><span data-dcnode-id="1449" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse</span></a></li><span data-dcnode-id="1446" instrument_node="">
</span><li data-dcnode-id="1443"><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanecanada.ca/how_to_help"><span data-dcnode-id="1445" instrument_node="">https://www.humanecanada.ca/how_to_help</span></a></li><span data-dcnode-id="1442" instrument_node="">
</span><li data-dcnode-id="1439"><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.change.org/p/tourism-authority-of-thailand-stop-elephant-abuse-through-elephant-riding-attractions"><span data-dcnode-id="1441" instrument_node="">https://www.change.org/p/tourism-authority-of-thailand-stop-elephant-abuse-through-elephant-riding-attractions</span></a></li><span data-dcnode-id="1438" instrument_node="">
</span><li data-dcnode-id="1435"><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stopcircussuffering.com/"><span data-dcnode-id="1437" instrument_node="">https://www.stopcircussuffering.com</span></a></li><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1431"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onegreenplanet.org/animalsandnature/5-ways-you-can-help-end-the-use-of-animals-in-circuses"><span data-dcnode-id="1433" instrument_node="">https://www.onegreenplanet.org/animalsandnature/5-ways-you-can-help-end-the-use-of-animals-in-circuses</span></a></li><span data-dcnode-id="1430" instrument_node="">
</span></ul><span data-dcnode-id="1428" instrument_node="">
</span></div><span data-dcnode-id="1426" instrument_node="">
</span></div><span data-dcnode-id="1424" instrument_node="">
</span></div><span data-dcnode-id="1422" instrument_node="">
</span><div class="card mb-4" data-dcnode-id="1331"><span data-dcnode-id="1421" instrument_node="">
</span><div class="card-header" data-dcnode-id="1416" id="headingSeven"><span data-dcnode-id="1420" instrument_node="">
</span><h3 aria-controls="collapseSeven" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1418" data-target="#collapseSeven" data-toggle="collapse"><span data-dcnode-id="1419" instrument_node="">
                      Horses
                    </span></h3><span data-dcnode-id="1417" instrument_node="">
</span></div><span data-dcnode-id="1415" instrument_node="">
</span><div aria-labelledby="headingSeven" class="collapse" data-dcnode-id="1333" data-parent="#accordionExample" id="collapseSeven"><span data-dcnode-id="1414" instrument_node="">
</span><div class="card-body" data-dcnode-id="1335"><span data-dcnode-id="1413" instrument_node="">
</span><ul data-dcnode-id="1372"><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1411" instrument_node="">United States - Many Horses still suffer from “soring” in the walking horse industry.
                          (Learn about “soring” here: </span><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanesociety.org/resources/what-soring"><span data-dcnode-id="1410" instrument_node="">https://www.humanesociety.org/resources/what-soring</span></a><span data-dcnode-id="1408" instrument_node="">)
                          (Learn about The PAST Act here: </span><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanesociety.org/resources/past-act-end-horse-soring"><span data-dcnode-id="1407" instrument_node="">https://www.humanesociety.org/resources/past-act-end-horse-soring</span></a><span data-dcnode-id="1405" instrument_node="">)</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1398"><span data-dcnode-id="1402" instrument_node="">United States - Horse racing causes 24 fatal “breakdowns” every week. Between 2009-2011, around 3,600 horses died during races.
                          (These stats don’t include horses killed before they make it to races. Read more here: </span><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/horse-racing-2/"><span data-dcnode-id="1401" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/horse-racing-2/</span></a><span data-dcnode-id="1399" instrument_node="">)</span></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1392"><span data-dcnode-id="1396" instrument_node="">United States - “The Thoroughbred-racing industry sends an estimated 10,000 horses to slaughter annually... half of the 20,000 new foals born each year will eventually be killed for their flesh.
                          (Read more here: </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/horse-racing-2/horse-racing-industry-cruelty/overbreeding-and-slaughter"><span data-dcnode-id="1395" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/horse-racing-2/horse-racing-industry-cruelty/overbreeding-and-slaughter</span></a><span data-dcnode-id="1393" instrument_node="">)</span></li><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1386"><span data-dcnode-id="1390" instrument_node="">Worldwide - Horse races occur all over the world. Some of the most popular horse races are hosted in  Australia, the US, England, United Arab Emirates, France, and Japan.
                          (You can find a list of horse events around the world here: </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_horse_races"><span data-dcnode-id="1389" instrument_node="">https://en.wikipedia.org/wiki/List_of_horse_races</span></a><span data-dcnode-id="1387" instrument_node="">)</span></li><span data-dcnode-id="1385" instrument_node="">
</span><li data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">Worldwide - Both legal and illegal performance-enhancing drugs are used to mask pain, allowing horses to race and train with injuries that would otherwise be too painful to run on. The widespread use of non-therapeutic drugs is a leading cause of injury and fatal breakdown on racetracks.
                          (Read more about drug use in horse racing here: </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/horse-racing-2/horse-racing-industry-cruelty/drugs/"><span data-dcnode-id="1383" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/horse-racing-2/horse-racing-industry-cruelty/drugs/</span></a><span data-dcnode-id="1381" instrument_node="">)</span></li><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">Canada and Mexico - In 2015, a stunning 130,000 American horses were slaughtered in Canada and Mexico. Breeders, along with racing, show, and rodeo industries continue to churn out hundreds of thousands of horses each year.
                          (Read more here: </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animals-in-entertainment/horse-racing-2/horse-racing-industry-cruelty/overbreeding-and-slaughter/"><span data-dcnode-id="1377" instrument_node="">https://www.peta.org/issues/animals-in-entertainment/horse-racing-2/horse-racing-industry-cruelty/overbreeding-and-slaughter/</span></a><span data-dcnode-id="1375" instrument_node="">)
                        </span></li><span data-dcnode-id="1373" instrument_node="">
</span></ul><span data-dcnode-id="1371" instrument_node="">
</span><h2 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1368" instrument_node="">
</span><ul data-dcnode-id="1363"><span data-dcnode-id="1367" instrument_node="">
</span><li data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">If you know of or see cruelty to horses in any way, be proactive and stand up for animals who don't have a voice of their own.  Take videos and photos if safe to do so, and immediately contact your local animal protection organization.  Choose to boycott horse race events, and share information to educate others about the cruelty involved in the horseracing industry.</span></li><span data-dcnode-id="1364" instrument_node="">
</span></ul><span data-dcnode-id="1362" instrument_node="">
</span><h2 data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Read more about how you can help:</span></h2><span data-dcnode-id="1359" instrument_node="">
</span><ul data-dcnode-id="1337"><span data-dcnode-id="1358" instrument_node="">
</span><li data-dcnode-id="1355"><a data-dcnode-id="1356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cowgirlmagazine.com/stop-horse-abuse"><span data-dcnode-id="1357" instrument_node="">https://cowgirlmagazine.com/stop-horse-abuse</span></a></li><span data-dcnode-id="1354" instrument_node="">
</span><li data-dcnode-id="1351"><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//horserescueutah.org/how-to-spot-and-prevent-horse-abuse"><span data-dcnode-id="1353" instrument_node="">http://horserescueutah.org/how-to-spot-and-prevent-horse-abuse</span></a></li><span data-dcnode-id="1350" instrument_node="">
</span><li data-dcnode-id="1347"><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse"><span data-dcnode-id="1349" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse</span></a></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1343"><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanecanada.ca/how_to_help"><span data-dcnode-id="1345" instrument_node="">https://www.humanecanada.ca/how_to_help</span></a></li><span data-dcnode-id="1342" instrument_node="">
</span><li data-dcnode-id="1339"><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.change.org/p/stop-horse-abuse"><span data-dcnode-id="1341" instrument_node="">https://www.change.org/p/stop-horse-abuse</span></a></li><span data-dcnode-id="1338" instrument_node="">

</span><div class="card-header" data-dcnode-id="1324" id="headingEight"><span data-dcnode-id="1328" instrument_node="">
</span><h3 aria-controls="collapseEight" aria-expanded="false" class="mb-0 mt-0" data-dcnode-id="1326" data-target="#collapseEight" data-toggle="collapse"><span data-dcnode-id="1327" instrument_node="">
                      Big Cats
                    </span></h3><span data-dcnode-id="1325" instrument_node="">
</span></div><span data-dcnode-id="1323" instrument_node="">
</span><div aria-labelledby="headingEight" class="collapse" data-dcnode-id="1251" data-parent="#accordionExample" id="collapseEight"><span data-dcnode-id="1322" instrument_node="">
</span><div class="card-body" data-dcnode-id="1253"><span data-dcnode-id="1321" instrument_node="">
</span><ul data-dcnode-id="1286"><span data-dcnode-id="1320" instrument_node="">
</span><li data-dcnode-id="1315"><span data-dcnode-id="1319" instrument_node="">China and South Africa – "Canned hunting" is a highly secretive and hidden – yet very lucrative – industry.  Big cats, particularly lions, are kept in small enclosures where they can be "hunted" by wealthy hunters who pay tens of thousands of dollars for the experience.  The animal's head is kept by the hunter as a trophy, while the rest of the body is sold to practitioners of Chinese medicine.
                          (Read more here: </span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.express.co.uk/news/world/1151196/lions-tigers-chinese-medicine-animal-cruelty"><span data-dcnode-id="1318" instrument_node="">https://www.express.co.uk/news/world/1151196/lions-tigers-chinese-medicine-animal-cruelty</span></a><span data-dcnode-id="1316" instrument_node="">)</span></li><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">United States – Many circuses still feature big cats, forcing these wild, nocturnal, solitary, and water-loving animals to live in cramped quarters with other animals, never having access to a watering hole.  Mothers and cubs are routinely separated long before the maternal bond would have been broken in the wild.
                          (Read more here: </span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/features/big-cats-lions-tigers-circus/"><span data-dcnode-id="1312" instrument_node="">https://www.peta.org/features/big-cats-lions-tigers-circus/</span></a><span data-dcnode-id="1310" instrument_node="">)</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node="">South Africa – 27 lions kept at a lion breeding facility in South Africa have been diagnosed with mange, with their cases being so severe that the Lions had lost their fur.
                          (Read more here: </span><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgeographic.com/animals/2019/05/sick-neglected-lions-found-at-captive-breeding-facility-in-south-africa"><span data-dcnode-id="1306" instrument_node="">https://www.nationalgeographic.com/animals/2019/05/sick-neglected-lions-found-at-captive-breeding-facility-in-south-africa</span></a><span data-dcnode-id="1304" instrument_node="">)</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node="">Thailand – A new tiger entertainment has recently opened, despite ongoing pressure for Thailand to reduce its reliance on tiger entertainment venues.  Thailand's wild tiger population has dropped to around 250, with four times this amount still being camped captive in entertainment venues.
                          (Read more here: </span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldanimalprotection.ca/news/outrage-thailands-cruel-tiger-entertainment-industry-continues-grow"><span data-dcnode-id="1300" instrument_node="">https://www.worldanimalprotection.ca/news/outrage-thailands-cruel-tiger-entertainment-industry-continues-grow</span></a><span data-dcnode-id="1298" instrument_node="">)</span></li><span data-dcnode-id="1296" instrument_node="">
</span><li data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Worldwide – Tigers are inherently afraid of fire, yet tigers in captivity are frequently forced to jump through metal hoops alight with fire.  In order to push past their instinctive terror of fire, tigers are punished for non-compliance to the point where it is preferable for them to face fire than to endure further punishment.
                          (Read more here: https://www.peta.org/features/big-cats-lions-tigers-circus/)</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1288"><span data-dcnode-id="1292" instrument_node="">Worldwide – Animal agriculture is a greater contributor to global warming than all worldwide transportation systems put together.  When fish are killed for food, enormous ships are at sea for six months at a time, resulting in the elimination of 90% of fish populations, with many other marine animals and birds killed or injured as a result. 
                          (Read more here: </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/features/starving-polar-bears-going-pescatarian-not-enough/"><span data-dcnode-id="1291" instrument_node="">https://www.peta.org/features/starving-polar-bears-going-pescatarian-not-enough/</span></a><span data-dcnode-id="1289" instrument_node="">)</span></li><span data-dcnode-id="1287" instrument_node="">
</span></ul><span data-dcnode-id="1285" instrument_node="">
</span><h2 data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">How To Help:</span></h2><span data-dcnode-id="1282" instrument_node="">
</span><ul data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">If you hear of a circus coming to town that features big cats, contact an animal protection organization and boycott the show, encouraging others to do so as well.  Never support anyone who hunts big cats or who displays hands or skins as trophies.  When traveling, avoid tourist attractions that feature wild animals.  Remember that these animals have been forced into submission through fear and violence.</span></li><span data-dcnode-id="1278" instrument_node="">
</span></ul><span data-dcnode-id="1276" instrument_node="">
</span><h2 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Read more about how you can help:</span></h2><span data-dcnode-id="1273" instrument_node="">
</span><ul data-dcnode-id="1255"><span data-dcnode-id="1272" instrument_node="">
</span><li data-dcnode-id="1269"><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onegreenplanet.org/animalsandnature/5-ways-you-can-help-end-the-use-of-animals-in-circuses"><span data-dcnode-id="1271" instrument_node="">https://www.onegreenplanet.org/animalsandnature/5-ways-you-can-help-end-the-use-of-animals-in-circuses</span></a></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1265"><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stopcircussuffering.com/"><span data-dcnode-id="1267" instrument_node="">https://www.stopcircussuffering.com/</span></a></li><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1261"><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse"><span data-dcnode-id="1263" instrument_node="">https://www.peta.org/issues/animal-companion-issues/animal-companion-factsheets/spot-animal-abuse</span></a></li><span data-dcnode-id="1260" instrument_node="">
</span><li data-dcnode-id="1257"><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanecanada.ca/how_to_help"><span data-dcnode-id="1259" instrument_node="">https://www.humanecanada.ca/how_to_help</span></a></li><span data-dcnode-id="1256" instrument_node="">
</span></ul><span data-dcnode-id="1254" instrument_node="">
