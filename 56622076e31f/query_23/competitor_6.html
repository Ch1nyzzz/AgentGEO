d="311"><h1 class="ptSerifBold articleHeading color28" data-dcnode-id="1309" id="ContentPlaceHolder1_articleTitle"><span data-dcnode-id="1310" instrument_node="">98 Important Facts about Animal Cruelty</span></h1><div class="divUserBioContainer" data-dcnode-id="1272"><div class="divUserBio noLeftPadding pull-left" data-dcnode-id="1292" style="display: inline-flex;"><div class="divUserImgContainer pull-left" data-dcnode-id="1307"><img class="writerImage" data-dcnode-id="1308" id="ContentPlaceHolder1_userImage" onerror="this.src='https://d3jkudlc7u70kh.cloudfront.net/content/user/e6d0bbb6-a350-41f8-ba59-e51b5b026889.png';this.onerror=null;" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/content/user/e6d0bbb6-a350-41f8-ba59-e51b5b026889.svg&amp;raw"></div><div class="divUserInfo pull-left" data-dcnode-id="1293"><div data-dcnode-id="1299"><span data-dcnode-id="1306" instrument_node="">By </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/karin-lehnardt" id="ContentPlaceHolder1_an_writer"><span class="openSansBold color28" data-dcnode-id="1304" id="ContentPlaceHolder1_writerName"><span data-dcnode-id="1305" instrument_node="">Karin Lehnardt</span></span></a><span data-dcnode-id="1302" instrument_node="">, </span><span data-dcnode-id="1300" id="ContentPlaceHolder1_writerType"><span data-dcnode-id="1301" instrument_node="">Senior Writer</span></span></div><div class="divArticleDateStamp" data-dcnode-id="1294"><span data-dcnode-id="1297" id="ContentPlaceHolder1_lblPublishDate"><span data-dcnode-id="1298" instrument_node="">Published February 20, 2017</span></span><span class="updatedOn" data-dcnode-id="1295" id="ContentPlaceHolder1_lblUpdateDate"><span data-dcnode-id="1296" instrument_node="">Updated September 5, 2019</span></span></div></div></div><div class="divWriterSocialMediaIcons pull-left" data-dcnode-id="1273"><div class="" data-dcnode-id="1274" id="articleSocialShare"><div class="article_Social_Sharing" data-dcnode-id="1275"><a class="facebook click-shareup" data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.factretriever.com%252Fanimal-cruelty-facts%26t%3D98%2520Important%2520Animal%2520Cruelty%2520Facts%2520%257C%2520FactRetriever.com" title="Share With Facebook"><i class="fa fa-facebook" data-dcnode-id="1291"></i></a><a class="twitter click-shareup" data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D98%2520Important%2520Animal%2520Cruelty%2520Facts%2520%257C%2520FactRetriever.com%26url%3Dhttps%253A%252F%252Fwww.factretriever.com%252Fanimal-cruelty-facts" title="Share With Twitter"><i class="fa fa-twitter" data-dcnode-id="1289"></i></a><a class="pinterest click-shareup" data-dcnode-id="1286" href="javascript:void((function()%7B%20var%20e=document.createElement('script');e.setAttribute('type','text/javascript');e.setAttribute('charset','UTF-8');e.setAttribute('src','https://assets.pinterest.com/js/pinmarklet.js?r='+Math.random()*99999999);document.body.appendChild(e)%7D)());" title="Share With Pinterest"><i class="fa fa-pinterest-p" data-dcnode-id="1287"></i></a><a class="mobile noclick-shareup" data-dcnode-id="1284" href="sms:?body=98%20Important%20Animal%20Cruelty%20Facts%20%7C%20FactRetriever.com%20https%3A%2F%2Fwww.factretriever.com%2Fanimal-cruelty-facts" title="Share With Mobile"><i class="fa fa-mobile" data-dcnode-id="1285"></i></a><a class="whatsapp noclick-shareup" data-dcnode-id="1282" href="whatsapp://send/?text=https%3A%2F%2Fwww.factretriever.com%2Fanimal-cruelty-facts" title="Share With Whatsapp"><i class="fa fa-whatsapp" data-dcnode-id="1283"></i></a><a class="redditalien click-shareup" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/submit%3Furl%3Dhttps%253A%252F%252Fwww.factretriever.com%252Fanimal-cruelty-facts%26title%3D98%2520Important%2520Animal%2520Cruelty%2520Facts%2520%257C%2520FactRetriever.com" title="Share With Reddit"><i class="fa fa-reddit-alien" data-dcnode-id="1281"></i></a><a class="stumbleupon click-shareup" data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stumbleupon.com/submit%3Furl%3Dhttps%253A%252F%252Fwww.factretriever.com%252Fanimal-cruelty-facts%26title%3D98%2520Important%2520Animal%2520Cruelty%2520Facts%2520%257C%2520FactRetriever.com" title="Share With StumbleUpon"><i class="fa fa-stumbleupon" data-dcnode-id="1279"></i></a><a class="envelope noclick-shareup" data-dcnode-id="1276" href="mailto:?subject=98%20Important%20Animal%20Cruelty%20Facts%20%7C%20FactRetriever.com&amp;body=https%3A%2F%2Fwww.factretriever.com%2Fanimal-cruelty-facts" title="Share With E-mail"><i class="fa fa-envelope" data-dcnode-id="1277"></i></a></div></div></div></div><div class="clearfix" data-dcnode-id="1271"></div><div class="divFactsContent" data-dcnode-id="312"><div class="divFactsList" data-dcnode-id="549" id="ContentPlaceHolder1_divFactsList"><div data-dcnode-id="570" id="ContentPlaceHolder1_divNoInterviewFact"><ul class="factsList" data-dcnode-id="574"><span class="articleAd1" data-dcnode-id="1264"><span data-dcnode-id="1269" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8131631895649727" data-ad-slot="2049564964" data-dcnode-id="1268" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="1267" instrument_node="">
</span></span><li data-dcnode-id="1254" id="12414"><span data-dcnode-id="1263" instrument_node="">To make a 40-inch fur coat it takes between 30 and 200 chinchilla or 60 mink, 50 sables, 50 muskrats, 45 </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/opossum-facts"><span data-dcnode-id="1262" instrument_node="">opossums</span></a><span data-dcnode-id="1260" instrument_node="">, 40 raccoons, 35 rabbits, 20 foxes, 20 otters, 18 lynx, 16 </span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/coyote-facts"><span data-dcnode-id="1259" instrument_node="">coyotes</span></a><span data-dcnode-id="1257" instrument_node="">, 15 beavers, or 8 seals.</span><sub data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1247" id="12415"><span data-dcnode-id="1253" instrument_node="">Many animals killed for fur come from fur farms, where animals are kept in tiny cages and are killed around 6 months old. Females might be kept longer. In nature, most animals build burros and huddle together for warmth. On fur farms, they are left exposed to the cold to encourage the thickest coats possible. If the animal freezes to </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="1252" instrument_node="">death</span></a><span data-dcnode-id="1250" instrument_node="">, its coat can still be used.</span><sub data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1240" id="12416"><span data-dcnode-id="1246" instrument_node="">Fur farmers are mainly concerned with preserving the animal’s whole coat and often choose the cheapest way to kill animals. Many ranchers use electrocution, which fries the animal inside out, similar to being cooked in a microwave. Some farmers also inject insecticides into the chests of minks. It takes several minutes for the minks to die a painful </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="1245" instrument_node="">death</span></a><span data-dcnode-id="1243" instrument_node="">.</span><sub data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1233" id="12417"><span data-dcnode-id="1239" instrument_node="">A recent trend in the fur market is astrakhan fur, also known as karakul or broadtail. Astrakhan fur is made from Astrakhan lambs that are killed at just a few days old. Some coats known as broadtail coats are made from the skin of unborn lambs. The </span><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/mother-facts"><span data-dcnode-id="1238" instrument_node="">mother</span></a><span data-dcnode-id="1236" instrument_node="">’s throat is slit and her stomach is slashed to remove the developing lamb.</span><sub data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1226" id="12418"><span data-dcnode-id="1232" instrument_node="">The number one fur producer is </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/china-facts"><span data-dcnode-id="1231" instrument_node="">China</span></a><span data-dcnode-id="1229" instrument_node="">. In undercover footage taken at fur farms there, animals are slammed against the concrete floor to stun them. They are then skinned alive. It takes some animals more than 20 minutes to die.</span><sub data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">[5]</span></sub></li><span class="articleImage openSans articleImageRight img230x360" data-dcnode-id="1220" style="width: 360px;"><img alt="Interesting Animal Processing Fact" class="lazyloaded" data-dcnode-id="1225" data-src="https://d3jkudlc7u70kh.cloudfront.net/interesting-cattle-processing-fact.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/interesting-cattle-processing-fact.jpg&amp;raw"><div class="articleImageCaption" data-dcnode-id="1221"><span data-dcnode-id="1224" instrument_node="">Over 56 billion land animals are killed globally for food each year</span><span class="imgSource" data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node=""> </span></span></div></span><li data-dcnode-id="1213" id="12482"><span data-dcnode-id="1219" instrument_node="">In 2010, there were more farm animals living in the U.S. than there were humans on </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/world-facts"><span data-dcnode-id="1218" instrument_node="">earth</span></a><span data-dcnode-id="1216" instrument_node="">.</span><sub data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">[8]</span></sub></li><li data-dcnode-id="1206" id="12419"><span data-dcnode-id="1212" instrument_node="">Sheep used for wool live mainly outdoors and are shorn at the end of </span><a data-dcnode-id="1210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/winter-facts"><span data-dcnode-id="1211" instrument_node="">winter</span></a><span data-dcnode-id="1209" instrument_node=""> when their coats are the fullest, but before they would naturally shed. Australia loses about 1,000,000 sheep per year due to exposure after shearing.</span><sub data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1202" id="12420"><span data-dcnode-id="1205" instrument_node="">In some cases, sheep are bred to have skin with many folds, which allows an animal to hold more wool. However, the folds attract maggots, especially around the anus. In a condition called flystrike, the maggots eat the sheep alive. The traditional solution is called “mulesing,” in which huge chunks of flesh are sliced from the lamb’s hindquarters so that smooth scar tissue forms.</span><sub data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1195" id="12421"><span data-dcnode-id="1201" instrument_node="">Though a </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/texas-facts"><span data-dcnode-id="1200" instrument_node="">Texas</span></a><span data-dcnode-id="1198" instrument_node=""> beef company was cited 22 times in one year for violations that included chopping hooves off live cattle, no action was taken against the company.</span><sub data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1188" id="12422"><span data-dcnode-id="1194" instrument_node="">Hogs, unlike cattle, are dunked in tanks of hot water after they have been stunned to soften their hides for skinning. Stunning is not always successful, and secret videotape from an </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/iowa-facts"><span data-dcnode-id="1193" instrument_node="">Iowa</span></a><span data-dcnode-id="1191" instrument_node=""> pork plant shows hogs squealing and kicking as they are being lowered into the water.</span><sub data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">[9]</span></sub></li><li data-dcnode-id="1181" id="12424"><span data-dcnode-id="1187" instrument_node="">Researchers note that not only are standard slaughter practices unethical, there are often reports of intentional abuse of animals by workers. For example, at the Pilgrim’s Pride slaughterhouse, which supplies KFC restaurants, a videotape shows workers kicking and stomping on chickens and smashing them against walls. Employees also ripped </span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/bird-facts"><span data-dcnode-id="1186" instrument_node="">birds</span></a><span data-dcnode-id="1184" instrument_node="">’ beaks off, twisted their heads off, and broke them in half—while the birds were still alive.</span><sub data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">[9]</span></sub></li><li data-dcnode-id="1171" id="12425"><span data-dcnode-id="1180" instrument_node="">Workers in a Butterball slaughterhouse in </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/arkansas-facts"><span data-dcnode-id="1179" instrument_node="">Arkansas</span></a><span data-dcnode-id="1177" instrument_node=""> were documented punching and stomping on live turkeys and slamming them against the walls. One Butterball employee stomped on a bird’s head, another swung a </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/turkey-facts"><span data-dcnode-id="1176" instrument_node="">turkey</span></a><span data-dcnode-id="1174" instrument_node=""> against a metal handrail, and another worker was seen inserting his finger into a turkey’s cloaca.</span><sub data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">[8]</span></sub></li><li data-dcnode-id="1164" id="12426"><span data-dcnode-id="1170" instrument_node="">A worker at the House of Raeford Farms poultry plant was seen punching turkeys suspended on the conveyer belt as they moved past him on the way to the stun bath. He was an amateur boxer and thought the </span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/bird-facts"><span data-dcnode-id="1169" instrument_node="">birds</span></a><span data-dcnode-id="1167" instrument_node=""> would make great punching practice.</span><sub data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">[8]</span></sub></li><li data-dcnode-id="1157" id="12427"><span data-dcnode-id="1163" instrument_node="">Not only are </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/bird-facts"><span data-dcnode-id="1162" instrument_node="">birds</span></a><span data-dcnode-id="1160" instrument_node=""> exempt from the Humane Slaughter Act, which dictates animals should be unconscious before the fatal blow, but all animals that are killed under religious Muslim and Jewish laws are exempt as well.</span><sub data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1153" id="12428"><span data-dcnode-id="1156" instrument_node="">In the United States, estimates range from 0.1% to 1% of the 10 billion land animals transported to slaughter each year die in transit. That translates to between 1 and 10 million animals. It is not unusual for young pigs to freeze against the walls of transport trucks; workers have to pry them off.</span><sub data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">[4]</span></sub></li><li data-dcnode-id="1146" id="12447"><span data-dcnode-id="1152" instrument_node="">A chimpanzee named Ron was used in a spinal experiment in which researchers, who were attempting to find spinal disc substitutes, removed his healthy spinal discs and replaced them with a device. The device was later removed, leaving Ron without part of his </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/spine-facts"><span data-dcnode-id="1151" instrument_node="">spine</span></a><span data-dcnode-id="1149" instrument_node="">.</span><sub data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">[5]</span></sub></li><div class="divQuoteImageBox marginTop15" data-dcnode-id="1139"><img alt="" class="imgQuoteStart svgLogo lazyloaded" data-dcnode-id="1145" data-src="https://d3jkudlc7u70kh.cloudfront.net/resources/images/blank.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/resources/images/blank.png&amp;raw"><div class="grayQuoteBox" data-dcnode-id="1141"><span data-dcnode-id="1144" instrument_node="">“Humanity's true moral test, its fundamental test…consists of its attitude towards those who are at its mercy: animals.”</span><p class="quoteBy openSansBold" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">- Milan Kundera</span></p></div><img alt="" class="imgQuoteEnd svgLogo lazyloaded" data-dcnode-id="1140" data-src="https://d3jkudlc7u70kh.cloudfront.net/resources/images/blank.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/resources/images/blank.png&amp;raw"></div><li data-dcnode-id="1135" id="12429"><span data-dcnode-id="1138" instrument_node="">“Broiler” chickens (food chickens), which make up 8.5 billion of the nearly 10 billion animals raised for food each year, are often drugged and genetically manipulated to grow very large very quickly. They often cannot support their own weight, leaving their legs malformed or broken. Many die of heart or lung failure because these organs cannot keep up with their unnaturally rapid growth.</span><sub data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">[9]</span></sub></li><li data-dcnode-id="1128" id="12430"><span data-dcnode-id="1134" instrument_node="">On foie gras (fatty liver) duck farms, metal pipes are shoved down the throats of ducks 2-3 times per day in which over a pound of cornmeal is pumped into their stomachs. While “foie gras” means fatty liver, the ducks’ livers are actually diseased and have grown 5-10 times more than their normal size. Most ducks die before they are slaughtered. One report showed that ducks were too weak to fight off rats that were eating them alive. Many female ducks end up in the garbage because females produce smaller livers. They usually suffocate to </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="1133" instrument_node="">death</span></a><span data-dcnode-id="1131" instrument_node=""> there.</span><sub data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1118" id="12431"><span data-dcnode-id="1127" instrument_node="">Traditionally, it took five years of grazing to get a steer to market size. However, now it takes 6 months of grazing and 14 months in a feedlot. This is due to enormous quantities of </span><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/corn-facts"><span data-dcnode-id="1126" instrument_node="">corn</span></a><span data-dcnode-id="1124" instrument_node=""> (not their natural food), </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/protein-facts"><span data-dcnode-id="1123" instrument_node="">protein</span></a><span data-dcnode-id="1121" instrument_node=""> supplements, and drugs, including growth hormones, that are administered to the animals.</span><sub data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">[4]</span></sub></li><li data-dcnode-id="1111" id="12432"><span data-dcnode-id="1117" instrument_node="">Commercially caught </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/fun-fish-facts"><span data-dcnode-id="1116" instrument_node="">fish</span></a><span data-dcnode-id="1114" instrument_node=""> can take hours or even days to die. Hundreds of millions of fish are caught on long lines every year. Once hooked, instead of being dragged on board, they are left alive, struggling at the end of hooks until the trip is finished and the lines are pulled aboard.</span><sub data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1098" id="12434"><span data-dcnode-id="1110" instrument_node="">Shark fin soup is around $200 per serving, and the business kills 100 million </span><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/shark-facts"><span data-dcnode-id="1109" instrument_node="">sharks</span></a><span data-dcnode-id="1107" instrument_node=""> per year. Because it is not economically viable for fisherman to keep the whole shark, they just slice the fin off and throw the shark back into the </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/ocean-facts"><span data-dcnode-id="1106" instrument_node="">ocean</span></a><span data-dcnode-id="1104" instrument_node="">. Unable to swim, the shark sinks slowly to the bottom of the sea to die a slow </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="1103" instrument_node="">death</span></a><span data-dcnode-id="1101" instrument_node="">.</span><sub data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1091" id="12435"><span data-dcnode-id="1097" instrument_node="">Approximately 30-50% of heifers suffer from mastitis, an infection of the udders that cause swelling and makes milking excruciating. Mastitis is exacerbated by the hormones given to </span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cow-facts"><span data-dcnode-id="1096" instrument_node="">cows</span></a><span data-dcnode-id="1094" instrument_node=""> to make them produce more milk. Additionally, the infection is treated with antibiotics that end up in their milk. Some udders can weigh as much as a full-grown man.</span><sub data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">[9]</span></sub></li><li data-dcnode-id="1084" id="12433"><span data-dcnode-id="1090" instrument_node="">While </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/fun-fish-facts"><span data-dcnode-id="1089" instrument_node="">fish</span></a><span data-dcnode-id="1087" instrument_node=""> farms were initially seen as a solution to overfishing, they have proven to be unhealthy. For example, salmon on farms are jammed into pens where they are dosed with antibiotics and pesticides and are given synthetic pigment to turn their flesh from gray to pink. Additionally, the Emperor penguin colonies have lost 50% of their numbers over the past half century because their main source of food, krill, have been harvested in massive amounts to be fed to farm-raised salmon.</span><sub data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">[5]</span></sub></li><span class="articleImage img230x360 marginBottom10 articleImageFullWidth" data-dcnode-id="1077"><img alt="Interesting Fish Farm Facts" class="lazyloaded" data-dcnode-id="1083" data-src="https://d3jkudlc7u70kh.cloudfront.net/interesting-fish-farm-facts.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/interesting-fish-farm-facts.jpg&amp;raw"><div class="articleImageCaption" data-dcnode-id="1079"><span data-dcnode-id="1082" instrument_node="">While fish farms were initially seen as a solution to overfishing, they have proven to be unhealthy</span><span class="imgSource" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node=""> </span></span></div><hr class="top10hr" data-dcnode-id="1078"></span><li data-dcnode-id="1070" id="12436"><span data-dcnode-id="1076" instrument_node="">Egg-laying hens are debeaked with hot knives to prevent cannibalism and fighting. A typical cage is about 12x20 inches, or the size of a single sheet of newspaper, and contains 4-8 </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/bird-facts"><span data-dcnode-id="1075" instrument_node="">birds</span></a><span data-dcnode-id="1073" instrument_node="">. The cages, called battery cages, are stacked floor to ceiling in massive sheds. Hens living on the bottom tiers are showered with excrement. Battery cages are outlawed in some European countries but are still legal in the U.S.</span><sub data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">[8]</span></sub></li><li data-dcnode-id="1063" id="12437"><span data-dcnode-id="1069" instrument_node="">Egg-laying hens live on sloped cage floors so that the eggs will roll aside. However, the sloped floor damages their feet. In some cases, toenails become permanently tangled in the wire, so the flesh grows around it. The </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/bird-facts"><span data-dcnode-id="1068" instrument_node="">birds</span></a><span data-dcnode-id="1066" instrument_node=""> are essentially soldered to their cages.</span><sub data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">[9]</span></sub></li><li data-dcnode-id="1059" id="12438"><span data-dcnode-id="1062" instrument_node="">Because the flesh of egg-laying hens is so emaciated, it is not very marketable. Because chickens are not legally protected, these hens are often disposed of in the cheapest ways possible, such as being buried alive in huge ditches. Some chickens survive the burial (or sometimes gassing) and are later seen staggering around. These are called “zombie chickens.”</span><sub data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1055" id="12439"><span data-dcnode-id="1058" instrument_node="">In 2003, a ranch owner in San Diego disposed of 30,000 nonproductive egg-laying hens by feeding them into a wood chipper—alive.</span><sub data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1051" id="12440"><span data-dcnode-id="1054" instrument_node="">Over 1 billion bees have traditionally been exterminated every year by the honey industry. At the end of the season, it is not worthwhile for the farmers to winterize the hives, so it easier to burn them and begin again next season.</span><sub data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1044" id="12441"><span data-dcnode-id="1050" instrument_node="">In a Columbia University primate lab, a video was released showing a baboon bleeding from a wound in her head where a metal pipe had been inserted in order to observe the effects of </span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/stress-facts"><span data-dcnode-id="1049" instrument_node="">stress</span></a><span data-dcnode-id="1047" instrument_node=""> on her menstrual cycle.</span><sub data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1034" id="12442"><span data-dcnode-id="1043" instrument_node="">Researchers test and kill millions of animals in attempt to find drugs that cure </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/obesity-facts"><span data-dcnode-id="1042" instrument_node="">obesity</span></a><span data-dcnode-id="1040" instrument_node="">-related ailments. Interestingly, a study of 55,000 healthy </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/women-facts"><span data-dcnode-id="1039" instrument_node="">women</span></a><span data-dcnode-id="1037" instrument_node=""> found that vegetarians and vegans had a significantly lower risk of being overweight or obese than their omnivore counterparts.</span><sub data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1030" id="12443"><span data-dcnode-id="1033" instrument_node="">A 2006 study in the U.K. revealed that the number of animals used in military experiments, including biological and chemical warfare tests, had doubled in the last five years.</span><sub data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">[13]</span></sub></li><li data-dcnode-id="1023" id="12449"><span data-dcnode-id="1029" instrument_node="">The following are reasons people justify animal cruelty and deny animal rights: 1) animals do not have souls; 2) </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/god-facts"><span data-dcnode-id="1028" instrument_node="">God</span></a><span data-dcnode-id="1026" instrument_node=""> gave humans dominion over animals; 3) humans are intellectually superior to animals; 4) animals do not reason, think, or feel pain like humans do; 5) animals are a natural resource to be used as humans see fit; and 6) animals kill each other.f</span><sub data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">[6]</span></sub></li><span class="articleImage img230x360 marginBottom10 articleImageFullWidth" data-dcnode-id="1016"><img alt="Animal Cruelty Facts" class="lazyloaded" data-dcnode-id="1022" data-src="https://d3jkudlc7u70kh.cloudfront.net/tragic-animal-cruelty-fact.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/tragic-animal-cruelty-fact.jpg&amp;raw"><div class="articleImageCaption" data-dcnode-id="1018"><span data-dcnode-id="1021" instrument_node="">Debates about animal rights are ancient and enduring</span><span class="imgSource" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node=""> </span></span></div><hr class="top10hr" data-dcnode-id="1017"></span><li data-dcnode-id="1009" id="12445"><span data-dcnode-id="1015" instrument_node="">A young medic described his training for his pre-</span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/iraq-facts"><span data-dcnode-id="1014" instrument_node="">Iraq</span></a><span data-dcnode-id="1012" instrument_node=""> duty. He was assigned to keep a pig alive. His pig was shot twice in the face with a 9mm pistol, shot six times with an AK-47, and then twice with a 12-gauge shotgun. Then he was set on fire. The medic was able to keep him alive for 15 hours.</span><sub data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">[13]</span></sub></li><li data-dcnode-id="1005" id="12444"><span data-dcnode-id="1008" instrument_node="">A video from the Department of Defense showed that fully conscious pigs were used to test the effectiveness of various Taser devices. On the tapes, pigs collapsed and convulsed or tried to run. Their mouths are wide open, shrieking. Though none of the pigs died during the experiment, they were all euthanized after.</span><sub data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">[5]</span></sub></li><li data-dcnode-id="1001" id="12446"><span data-dcnode-id="1004" instrument_node="">To test skin care cosmetics in the U.S., animals are often immobilized, shaved, and doused with products to see how much it takes to burn and blister their skin. The European Union has banned such cosmetic tests.</span><sub data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">[5]</span></sub></li><li data-dcnode-id="994" id="12448"><span data-dcnode-id="1000" instrument_node="">Pig farms produce millions of tons of waste per year. The waste is toxic because pigs are given high doses of antibiotics and insecticide to keep them alive on the pig farms. Nearly 25.8 million gallons of toxic hog waste was dumped in the headwaters of the New River in </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/north-carolina-facts"><span data-dcnode-id="999" instrument_node="">North Carolina</span></a><span data-dcnode-id="997" instrument_node="">. Every single creature in the river was killed.</span><sub data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">[5]</span></sub></li><li data-dcnode-id="984" id="12450"><span data-dcnode-id="993" instrument_node="">During the Roman Empire, the massive Coliseum of </span><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/rome-facts"><span data-dcnode-id="992" instrument_node="">Rome</span></a><span data-dcnode-id="990" instrument_node=""> featured events in which animals fought to the </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="989" instrument_node="">death</span></a><span data-dcnode-id="987" instrument_node=""> with each other and with people. Often, the animals were chained together or tormented with burning irons and darts to make fighting fiercer.</span><sub data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">[12]</span></sub></li><li data-dcnode-id="974" id="12451"><span data-dcnode-id="983" instrument_node="">The domestication of livestock such as pigs, </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cow-facts"><span data-dcnode-id="982" instrument_node="">cows</span></a><span data-dcnode-id="980" instrument_node="">, sheep, </span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/horse-facts"><span data-dcnode-id="979" instrument_node="">horses</span></a><span data-dcnode-id="977" instrument_node="">, and goats is thought to have occurred between 9000 and 5000 B.C. as agriculture became more important. History shows that the most suitable animals for domestication were those that naturally live in groups with a hierarchical social order that allowed humans to assume the dominant position.</span><sub data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">[12]</span></sub></li><li data-dcnode-id="967" id="12452"><span data-dcnode-id="973" instrument_node="">During the Middle Ages, </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cat-facts"><span data-dcnode-id="972" instrument_node="">cats</span></a><span data-dcnode-id="970" instrument_node=""> were associated with the devil and were burned at the stake. By the beginning of the 14th century, Europe’s cat population had been severely depleted. Some scholars note that the depletion of cats allowed the bubonic plague to spread by fleas on rodents, which had surged out of control due to centuries of cat slaughter.</span><sub data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">[12]</span></sub></li><li data-dcnode-id="963" id="12453"><span data-dcnode-id="966" instrument_node="">Because the Catholic church had forbid human autopsies for centuries, animal experimentation would become a major research tool of modern medicine during the Enlightenment. Belgian physician Andreas Vesalius (1514-1564) argued that animal vivisection was essential to the study of anatomy. Descartes argued that animals were mechanical things like clocks and could not feel pain. These arguments helped make animal vivisection more socially acceptable.</span><sub data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">[12]</span></sub></li><li data-dcnode-id="956" id="12454"><span data-dcnode-id="962" instrument_node="">During the Middle Ages, people believed that an animal that was whipped before slaughter would provide more tender meat. Whippings eventually evolved into letting </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="961" instrument_node="">dogs</span></a><span data-dcnode-id="959" instrument_node=""> loose on an animal to bite and tear at its flesh.</span><sub data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">[12]</span></sub></li><li data-dcnode-id="952" id="12455"><span data-dcnode-id="955" instrument_node="">In 1641, the Massachusetts Bay Colony enacted a Body of Liberties that described the fundamental rights of colonists. Included in these rights was Article 92, which created the first modern law against animal cruelty. It stated that “No man shall exercise any Tirranny or Crueltie towards any Bruite creature which are usuallie kept for man’s use.”</span><sub data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">[12]</span></sub></li><li data-dcnode-id="948" id="12456"><span data-dcnode-id="951" instrument_node="">Philosophers who argued for compassion toward animals include John Locke (1632-1704), David Hume (1711-1776), and Jeremy Bentham (1748-1832), who claimed that “The question is not, Can they reason? Nor Can they talk? But can they suffer?”</span><sub data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">[12]</span></sub></li><span class="articleImage openSans articleImageRight img230x360" data-dcnode-id="942" style="width: 230px;"><img alt="Sad Animal Cruelty Facts" class="lazyloaded" data-dcnode-id="947" data-src="https://d3jkudlc7u70kh.cloudfront.net/interesting-history-of-animal-cruelty-facts.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/interesting-history-of-animal-cruelty-facts.jpg&amp;raw"><div class="articleImageCaption" data-dcnode-id="943"><span data-dcnode-id="946" instrument_node="">Politicians differ on what constitutes animal cruelty</span><span class="imgSource" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node=""> </span></span></div></span><li data-dcnode-id="935" id="12461"><span data-dcnode-id="941" instrument_node="">In a 2010 Gallup poll, Republicans were more likely to state that the buying and wearing of animal fur and conducting medical tests on animals were morally acceptable than Independents or </span><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/democrat-facts"><span data-dcnode-id="940" instrument_node="">Democrats</span></a><span data-dcnode-id="938" instrument_node="">. Republicans were least likely to agree that animal cloning was morally acceptable.</span><sub data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">[8]</span></sub></li><li data-dcnode-id="931" id="12457"><span data-dcnode-id="934" instrument_node="">In 1871, Harvard established one of the first vivisection laboratories in the country.</span><sub data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">[12]</span></sub></li><li data-dcnode-id="927" id="12458"><span data-dcnode-id="930" instrument_node="">In 1938, the Food, Drug, and Cosmetics Act was passed, requiring animal testing of certain drugs and chemicals to make sure they were safe for humans. Following WWII (1939-1945), the use of medical and scientific research on animals exploded.</span><sub data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">[12]</span></sub></li><li data-dcnode-id="920" id="12459"><span data-dcnode-id="926" instrument_node="">In 2010, a bill called the Animal Crush Video Prohibition Act passed, banning the “the creation, sale, and distribution of obscene videos that show the intentional crushing, burning, drowning, suffocating or impaling of live animals—often by </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/women-facts"><span data-dcnode-id="925" instrument_node="">women</span></a><span data-dcnode-id="923" instrument_node=""> in stiletto heels—for the sexual gratification of viewers.”</span><sub data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">[8]</span></sub></li><li data-dcnode-id="910" id="12460"><span data-dcnode-id="919" instrument_node="">A 2010 Gallup poll showed significant differences between </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/men-facts"><span data-dcnode-id="918" instrument_node="">men</span></a><span data-dcnode-id="916" instrument_node=""> and </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/women-facts"><span data-dcnode-id="915" instrument_node="">women</span></a><span data-dcnode-id="913" instrument_node=""> on all animal morality issues. Men were far more accepting than women of buying and wearing animal fur (73% vs. 48%), conducting medical testing on animals (69% vs. 49%), and cloning animals (43% vs. 19%).</span><sub data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">[8]</span></sub></li><li data-dcnode-id="903" id="12462"><span data-dcnode-id="909" instrument_node="">The first patent ever issued to an animal was in 1988 when researchers at Harvard University obtained a patent for OncoMouse, a mouse that had been genetically engineered to be susceptible to </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cancer-facts"><span data-dcnode-id="908" instrument_node="">cancer</span></a><span data-dcnode-id="906" instrument_node="">. Since that time other animals have been patented, such as pigs, sheep, goats, and cattle.</span><sub data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">[8]</span></sub></li><li data-dcnode-id="899" id="12463"><span data-dcnode-id="902" instrument_node="">In the U.S., over 9 billion farm animals were slaughtered in 2009. The largest number by far were chickens, at nearly 8.7 billion, followed by 245.8 million turkeys, 33.5 million adult cattle, 22.8 million ducks, 2.6 million sheep and lambs, and 980,000 calves. Worldwide, over 50 billion chickens are slaughtered each year.</span><sub data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">[8]</span></sub></li><li data-dcnode-id="895" id="12464"><span data-dcnode-id="898" instrument_node="">In 1960, 55 billion pounds of cattle, hogs, broilers (food chickens), and turkeys were produced. In 2009 there were nearly 125 billion pounds produced. The 1960 value of these animals was around $16 billion. In 2009, it was $70 billion.</span><sub data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">[8]</span></sub></li><li data-dcnode-id="888" id="12465"><span data-dcnode-id="894" instrument_node="">Castration, dehorning, branding, ear notching, tail clipping, and beak trimming are widely conducted in the U.S. without the use of anesthetics or pain medication. In </span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/canada-facts"><span data-dcnode-id="893" instrument_node="">Canada</span></a><span data-dcnode-id="891" instrument_node="">, local anesthetic is recommended. It is required by law in most cases in the U.K.</span><sub data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">[8]</span></sub></li><li data-dcnode-id="884" id="12467"><span data-dcnode-id="887" instrument_node="">The number of pounds of beef produced in the U.S. in 2009 was 27.8 billion pounds. The estimated per capita consumption of beef in 2009 was 90.4 pounds.</span><sub data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">[8]</span></sub></li><li data-dcnode-id="874" id="12468"><span data-dcnode-id="883" instrument_node="">In 2009, there were around 9 million dairy </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cow-facts"><span data-dcnode-id="882" instrument_node="">cows</span></a><span data-dcnode-id="880" instrument_node=""> in the U.S. Each cow produced more than 20,000 pounds of milk. The combination of factory </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/farming-facts"><span data-dcnode-id="879" instrument_node="">farming</span></a><span data-dcnode-id="877" instrument_node="">, high-tech breeding, and modern medicine has led to an increase of milk per cow over time.</span><sub data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">[8]</span></sub></li><li data-dcnode-id="864" id="12469"><span data-dcnode-id="873" instrument_node="">One criticism of dairy </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/farming-facts"><span data-dcnode-id="872" instrument_node="">farming</span></a><span data-dcnode-id="870" instrument_node=""> is that </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cow-facts"><span data-dcnode-id="869" instrument_node="">cows</span></a><span data-dcnode-id="867" instrument_node=""> spend long periods standing on hard surfaces, such as concrete, metal gratings, and dirt-packed dry lots. This often contributes to lameness, which is the major reason cows are culled (killed) during the raising process.</span><sub data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">[8]</span></sub></li><li data-dcnode-id="860" id="12470"><span data-dcnode-id="863" instrument_node="">To produce veal (meat from young calves) calves are separated from their mothers and kept under extremely confined conditions. They are not allowed to exercise, to keep them from building muscle. They are fed diets low in iron to prevent the flesh from darkening, which results in anemic calves. An estimated 146 million pounds of veal were produced in the U.S. in 2009.</span><sub data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">[8]</span></sub></li><li data-dcnode-id="853" id="12423"><span data-dcnode-id="859" instrument_node="">Turkeys and chickens are exempt from federal humane slaughter laws, but they make up more than 90% of animals slaughtered each year in America. Because they are exempt, it is not required to stun them before they are shackled on a moving rail to have their throats slit. Some are still alive when they are submerged in the scalding tank. Those that are still alive are called “redskins.” Over 180 million chickens each year suffer through a botched </span><a data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="858" instrument_node="">death</span></a><span data-dcnode-id="856" instrument_node=""> in the slaughterhouse.</span><sub data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">[8]</span></sub></li><span class="articleImage img230x360 marginBottom10 articleImageFullWidth" data-dcnode-id="846"><img alt="Sad Animal Abuse Fact" class="lazyloaded" data-dcnode-id="852" data-src="https://d3jkudlc7u70kh.cloudfront.net/sad-animal-cruelty-fact.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/sad-animal-cruelty-fact.jpg&amp;raw"><div class="articleImageCaption" data-dcnode-id="848"><span data-dcnode-id="851" instrument_node="">Poultry is exempt from federal humane slaughter laws</span><span class="imgSource" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node=""> </span></span></div><hr class="top10hr" data-dcnode-id="847"></span><li data-dcnode-id="842" id="12471"><span data-dcnode-id="845" instrument_node="">At the slaughterhouse, cattle are stunned by a stun bolt into their forehead to render them unconscious. They are unconscious rather than killed, so that their heart will help pump the blood out of the body. The animal is then hoisted up by one rear leg to hang from a bleed rail. Its throat is then cut so that all of its blood can drain out. Following the bloodletting, the animal's carcass moves down the line to a number of process stations where the tail and hocks are cut off, the belly is cut open, and the hide is removed.</span><sub data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">[4]</span></sub></li><li data-dcnode-id="838" id="12472"><span data-dcnode-id="841" instrument_node="">Laying-hen chicks are sorted by gender when they are one day old. Only females are kept. The males are killed because they have not been bred for meat production and will not grow up to be “meaty” enough for humans. Millions of male chicks are either thrown into garbage bags where they suffocate or macerated (instantaneous killed in a high-speed grinder).</span><sub data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">[8]</span></sub></li><li data-dcnode-id="834" id="12473"><span data-dcnode-id="837" instrument_node="">It takes about 90 seconds for a chicken to die after its throat is slit in a slaughterhouse.</span><sub data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">[8]</span></sub></li><li data-dcnode-id="830" id="12474"><span data-dcnode-id="833" instrument_node="">Hogs are kept on short tethers or confined in cages and pens to keep them from exercising, which might build muscle instead of fat and toughen the meat. Antibiotics, hormones, and other drugs are routinely given to hogs to speed growth and prevent deadly diseases.</span><sub data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">[4]</span></sub></li><li data-dcnode-id="823" id="12475"><span data-dcnode-id="829" instrument_node="">Sows are kept in what are called “gestation crates” that are around 7 feet by 2 feet, just enough for the sow to lie down but not turn around. A sow eats, urinates, and defecates where she stands. The UK and </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/sweden-facts"><span data-dcnode-id="828" instrument_node="">Sweden</span></a><span data-dcnode-id="826" instrument_node=""> have banned gestation crates. Spent breeding sows are usually slaughtered at around 2-3 years old.</span><sub data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">[4]</span></sub></li><li data-dcnode-id="816" id="12476"><span data-dcnode-id="822" instrument_node="">Factory-farmed hogs not only suffer from excesses crowding, </span><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/stress-facts"><span data-dcnode-id="821" instrument_node="">stress</span></a><span data-dcnode-id="819" instrument_node="">, and boredom but also experience breathing disorders because of high concentrations of ammonia from their waste materials. Hogs also experience feet and leg deformities from standing on floors made of improper materials.</span><sub data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">[8]</span></sub></li><li data-dcnode-id="812" id="12477"><span data-dcnode-id="815" instrument_node="">Videos from hog farms reveal numerous problems, such as breeding sows with injuries and sores. Investigators also claim that prematurely born piglets fell through the slats of their holding pens into the manure pits below.</span><sub data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">[5]</span></sub></li><li data-dcnode-id="805" id="12478"><span data-dcnode-id="811" instrument_node="">Animal rights activists are critical of the fur industry because the industry over breeds the animals to produce desirable coat colors, which often leads to painful deformities in animals. The USDA does not regulate the </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/farming-facts"><span data-dcnode-id="810" instrument_node="">farming</span></a><span data-dcnode-id="808" instrument_node=""> and slaughter of fur animals.</span><sub data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">[8]</span></sub></li><li data-dcnode-id="801" id="12479"><span data-dcnode-id="804" instrument_node="">A 2010 Gallup poll found that 60% of those asked said buying and wearing fur is morally acceptable. Nearly 35% said it is morally wrong. This breakdown has changed little since the question was first polled in 2001.</span><sub data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">[8]</span></sub></li><li data-dcnode-id="797" id="12480"><span data-dcnode-id="800" instrument_node="">While exact numbers are difficulty to obtain, it is estimated that millions of animals are used in research, testing, and medical and veterinary training programs in the U.S. each year. One source estimates that the number of mice that are used in U.S. laboratories range from 17 million to “well over 100 million.”</span><sub data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">[8]</span></sub></li><li data-dcnode-id="793" id="12481"><span data-dcnode-id="796" instrument_node="">A 2010 Gallup poll reveals that 59% of those asked said “medical testing” on animals is morally acceptable. Thirty-four percent said it was morally wrong. Another 4% said it depends on the situation.</span><sub data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">[8]</span></sub></li><li data-dcnode-id="789" id="12483" style="padding-top: 10px;"><span data-dcnode-id="792" instrument_node="">Vivisection on animals dates back to at least the ancient Greeks and Romans.</span><sub data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">[12]</span></sub></li><span class="articleImage openSans articleImageRight img230x360" data-dcnode-id="783" style="width: 300px;"><img alt="Little Known Animal Abuse Facts" class="lazyloaded" data-dcnode-id="788" data-src="https://d3jkudlc7u70kh.cloudfront.net/little-known-animal-cruelty-facts.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3jkudlc7u70kh.cloudfront.net/little-known-animal-cruelty-facts.jpg&amp;raw"><div class="articleImageCaption" data-dcnode-id="784"><span data-dcnode-id="787" instrument_node="">Slaughterhouses have also been called "dis-assembly lines"</span><span class="imgSource" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node=""> </span></span></div></span><li data-dcnode-id="776" id="12466"><span data-dcnode-id="782" instrument_node="">Factory </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/farming-facts"><span data-dcnode-id="781" instrument_node="">farming</span></a><span data-dcnode-id="779" instrument_node=""> emphasizes speed and technology. Female animals are artificially inseminated rather than mated, and pregnancies are spaced closer together to increase production. Mothers and offspring are separated quickly to keep the process moving. Antibiotics, hormones, and growth-enhancing drugs are administered to ensure rapid growth and to prevent deadly diseases. Slaughterhouses are run like assembly lines with an emphasis on speed and quantity.</span><sub data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">[4]</span></sub></li><li data-dcnode-id="772" id="12484"><span data-dcnode-id="775" instrument_node="">Mark Twain wrote a short story title “A Dog’s Tale” in 1903 to protest cruelty to animals and their use in research. It is told from the viewpoint of a dog that lives with the family of scientists and saves the family’s baby from a nursery fire. Later, however, the dog sees her own puppy blinded and killed during an experiment that was performed by the scientist to impress his friends.</span><sub data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">[8]</span></sub></li><li data-dcnode-id="768" id="12485"><span data-dcnode-id="771" instrument_node="">Researchers are experimenting with genetic engineering on pigs so that they can grow organs that will not be rejected by human bodies. Scientists believe that harvesting organs from transgenic pigs could one day save millions of human lives. While some people consider this medical progress, others see it as animal cruelty.</span><sub data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">[8]</span></sub></li><li data-dcnode-id="764" id="12486"><span data-dcnode-id="767" instrument_node="">A 2010 Gallup poll found that 31% of those asked said the cloning of animals is morally acceptable. Another 63% said it is morally wrong.</span><sub data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">[8]</span></sub></li><li data-dcnode-id="757" id="12487"><span data-dcnode-id="763" instrument_node="">Approximately 5,000 Thoroughbred racehorses died between 2003 and 2008. Most of the </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/horse-facts"><span data-dcnode-id="762" instrument_node="">horses</span></a><span data-dcnode-id="760" instrument_node=""> were euthanized after suffering serious injuries on the racetrack. Countless other deaths went unreported because of lax record keeping.</span><sub data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">[8]</span></sub></li><li data-dcnode-id="753" id="12488"><span data-dcnode-id="756" instrument_node="">The Greyhound Protection League estimates that more than 1 million unwanted racing greyhounds have been culled (killed) by the industry since the 1930s.</span><sub data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">[8]</span></sub></li><li data-dcnode-id="740" id="12489"><span data-dcnode-id="752" instrument_node="">In the United States, dogfighting is an illegal, multimillion-dollar gambling industry that is often associated with guns, auto theft, arms, smuggling, </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/money-facts"><span data-dcnode-id="751" instrument_node="">money</span></a><span data-dcnode-id="749" instrument_node=""> laundering, and drug trafficking. </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="748" instrument_node="">Dogs</span></a><span data-dcnode-id="746" instrument_node=""> most often used are pit bulls. Fights go on for hours, sometimes to the </span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="745" instrument_node="">death</span></a><span data-dcnode-id="743" instrument_node="">. Dogs that survive the fights frequently die hours or days later from shock, blood loss, or infection.</span><sub data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">[8]</span></sub></li><li data-dcnode-id="733" id="12490"><span data-dcnode-id="739" instrument_node="">Fighting </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="738" instrument_node="">dogs</span></a><span data-dcnode-id="736" instrument_node=""> are often trained on what are called “catmills.” A catmill holds an animal such as a small dog, cat, rabbit, or pit bulls that show no inclination for fighting just out of the reach of the training dog while it runs. These bait dogs are often animals stolen from the neighborhoods and are usually killed during the training.</span><sub data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">[8]</span></sub></li><li data-dcnode-id="720" id="12491"><span data-dcnode-id="732" instrument_node="">In 2007, Atlanta Falcons quarterback Michael Vick (1980- ) was arrested for </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/running-facts"><span data-dcnode-id="731" instrument_node="">running</span></a><span data-dcnode-id="729" instrument_node=""> a dogfighting operation on his property in Virginia. He and his partners killed poor-fighting </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="728" instrument_node="">dogs</span></a><span data-dcnode-id="726" instrument_node=""> by electrocuting, hanging, drowning, or beating the dogs to </span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/death-facts"><span data-dcnode-id="725" instrument_node="">death</span></a><span data-dcnode-id="723" instrument_node="">. He lost his multi-million contract with the Atlanta Falcons and millions more in endorsements.</span><sub data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">[8]</span></sub></li><li data-dcnode-id="713" id="12492"><span data-dcnode-id="719" instrument_node="">During the filming of a 1939 movie titled </span><span data-dcnode-id="717" style="font-style: italic;"><span data-dcnode-id="718" instrument_node="">Jesse James</span></span><span data-dcnode-id="716" instrument_node="">, a horse was killed when it was forced to jump off a cliff for a scene. Public complaints led to the formation of the film-monitoring unit of the American Humane Association.</span><sub data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">[7]</span></sub></li><li data-dcnode-id="709" id="12494"><span data-dcnode-id="712" instrument_node="">The first captive orca was collected for Marineland Pacific in 1961. The animal lived for only day. She repeatedly smashed herself against the walls of her tank until she died.</span><sub data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">[8]</span></sub></li><li data-dcnode-id="699" id="12495"><span data-dcnode-id="708" instrument_node="">Most of the 6 million </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/horse-facts"><span data-dcnode-id="707" instrument_node="">horses</span></a><span data-dcnode-id="705" instrument_node=""> that served in the </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/us-military-facts"><span data-dcnode-id="704" instrument_node="">U.S. military</span></a><span data-dcnode-id="702" instrument_node=""> during WWI were killed. The deaths of millions of other horses in military service to other countries severely depleted the world’s horse population. Animal rights activists and welfarists argue that animals involved in warfare did not know what they were fighting for or against and had poor chances of survival.</span><sub data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">[2]</span></sub></li><span class="articleImage openSans articleImageRight img230x360" data-dcnode-id="693" style="width: 300px;"><img alt="Interesting Pig Tail Fact" class="lazyload" data-dcnode-id="698" data-src="https://d3jkudlc7u70kh.cloudfront.net/interesting-pig-processing-fact.jpg"><div class="articleImageCaption" data-dcnode-id="694"><span data-dcnode-id="697" instrument_node="">Because stressed pigs will bite each others’ tails, farmers cut the tails off</span><span class="imgSource" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node=""> </span></span></div></span><li data-dcnode-id="686" id="12493"><span data-dcnode-id="692" instrument_node="">To prevent stressed pigs from biting off each others’ tails—a </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/stress-facts"><span data-dcnode-id="691" instrument_node="">stress</span></a><span data-dcnode-id="689" instrument_node="">-induced behavior—farmers simply cut off the pigs’ tails.</span><sub data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">[5]</span></sub></li><li data-dcnode-id="680" id="12496"><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="685" instrument_node="">Dogs</span></a><span data-dcnode-id="683" instrument_node=""> used in wars after WWII typically were not returned to their owners because the military was afraid the animals would attack someone in civilian life. They were either euthanized or left behind on the battlefield. However, in 2000 President Clinton signed a bill that allowed military dogs to be adopted if their owners did not hold the U.S. government liable for any injuries or damages by former military dogs.</span><sub data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">[2]</span></sub></li><li data-dcnode-id="664" id="12497"><span data-dcnode-id="679" instrument_node="">Hundreds of animals were used by the </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/us-military-facts"><span data-dcnode-id="678" instrument_node="">U.S. military</span></a><span data-dcnode-id="676" instrument_node=""> during the 2003 invasion of </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/iraq-facts"><span data-dcnode-id="675" instrument_node="">Iraq</span></a><span data-dcnode-id="673" instrument_node="">, including chickens, </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="672" instrument_node="">dogs</span></a><span data-dcnode-id="670" instrument_node="">, </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dolphin-facts"><span data-dcnode-id="669" instrument_node="">dolphins</span></a><span data-dcnode-id="667" instrument_node="">, and pigeons. Activists argued that the military wasted animals needlessly when sophisticated technology could have been used instead.</span><sub data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">[2]</span></sub></li><li data-dcnode-id="654" id="12498"><span data-dcnode-id="663" instrument_node="">The Human Society of the United States reports that U.S. shelters receive 6-8 million </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cat-facts"><span data-dcnode-id="662" instrument_node="">cats</span></a><span data-dcnode-id="660" instrument_node=""> and </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="659" instrument_node="">dogs</span></a><span data-dcnode-id="657" instrument_node=""> each year. Approximately half of these are euthanized. The remainder are adopted or reclaimed.</span><sub data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">[8]</span></sub></li><li data-dcnode-id="644" id="12499"><span data-dcnode-id="653" instrument_node="">In general, shelters located in the Northeast have the lowest euthanization rates. Shelters in the Southeast have the highest. This is due to several factors including weather, the availability of low-cost spay-neuter programs, and animal control policies. Additionally, the cold winters in the Northeast lower the fertility rates of </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/cat-facts"><span data-dcnode-id="652" instrument_node="">cats</span></a><span data-dcnode-id="650" instrument_node=""> and </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/dog-facts"><span data-dcnode-id="649" instrument_node="">dogs</span></a><span data-dcnode-id="647" instrument_node=""> and claim the lives of stray animals. Animal welfare organizations are also more popular in the Northeast.</span><sub data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">[8]</span></sub></li><li data-dcnode-id="640" id="12500"><span data-dcnode-id="643" instrument_node="">Puppy mills are facilities that breed puppies in inferior conditions and sell them in commercial markets. It is believed that over 5,000 puppy mills exist in U.S.</span><sub data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">[8]</span></sub></li><li data-dcnode-id="636" id="12501"><span data-dcnode-id="639" instrument_node="">Almost half of all antibiotics in the U.S. end up in animal feed. Milk-fed veal contains as much as 500 times the legal tolerance levels of antibiotics.</span><sub data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">[8]</span></sub></li><li data-dcnode-id="632" id="12502"><span data-dcnode-id="635" instrument_node="">To improve the yolk color of commercial eggs, the feed of commercial egg-laying hens contains artificial color to enrich the pale color of their egg yolks. Eggs from healthy hens have dark yellow yolks.</span><sub data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">[8]</span></sub></li><li data-dcnode-id="628" id="12503"><span data-dcnode-id="631" instrument_node="">According to USDA inspectors, chickens that pass inspection for human consumption include those stained with feces, those visibly dripping with pus, and those that contain precancerous tumors. Government inspectors have less than 2 seconds to examine each chicken on the production line.</span><sub data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">[8]</span></sub></li><li data-dcnode-id="621" id="12504"><span data-dcnode-id="627" instrument_node="">Over 95% of the animals deliberately killed each year in the U.S. are killed for food. If everyone in the U.S. were </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/vegetarian-facts"><span data-dcnode-id="626" instrument_node="">vegetarian</span></a><span data-dcnode-id="624" instrument_node="">, it would save around 6 billion animals every year.</span><sub data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">[8]</span></sub></li><li data-dcnode-id="617" id="12505"><span data-dcnode-id="620" instrument_node="">There are two general approaches to animal rights. The first is the animal welfare position, which holds that there is nothing wrong with using animals for human purposes as long as it does not cause unnecessary pain or suffering for the animal. Animal right activists take a stronger stance and argue that animals should not be viewed as property or as commodities.</span><sub data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">[6]</span></sub></li><li data-dcnode-id="613" id="12506"><span data-dcnode-id="616" instrument_node="">Animal cruelty can either be active (commission) or passive (omission). Passive cruelty is characterized by neglect, such as starvation, parasite infestation, poor shelter in extreme weather, and lack of veterinary care. Active abuse is intentional abuse.</span><sub data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">[6]</span></sub></li><span class="articleImage openSans articleImageRight img230x360" data-dcnode-id="607" style="width: 230px;"><img alt="Interesting Dahmer Fact" class="lazyload" data-dcnode-id="612" data-src="https://d3jkudlc7u70kh.cloudfront.net/interesting-fact-about-animal-cruelty.jpg"><div class="articleImageCaption" data-dcnode-id="608"><span data-dcnode-id="611" instrument_node="">Serial killers often start out by killing and torturing animals as children</span><span class="imgSource" data-dcnode-id="609"><span data-dcnode-id="610" instrument_node=""> </span></span></div></span><li data-dcnode-id="600" id="12508"><span data-dcnode-id="606" instrument_node="">According to the FBI, cruelty to animals is a common trait of serial rapists and murderers. </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/serial-killer-facts"><span data-dcnode-id="605" instrument_node="">Serial killers</span></a><span data-dcnode-id="603" instrument_node=""> often start out by killing and torturing animals as children.</span><sub data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">[10]</span></sub></li><li data-dcnode-id="593" id="12507"><span data-dcnode-id="599" instrument_node="">Over 71% of </span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/women-facts"><span data-dcnode-id="598" instrument_node="">women</span></a><span data-dcnode-id="596" instrument_node=""> seeking shelter at safe house have reported that their partners have threatened or killed their pet.</span><sub data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">[1]</span></sub></li><li data-dcnode-id="586" id="12509"><span data-dcnode-id="592" instrument_node="">Michael Cimino was criticized for killing and brutalizing several animals during the 1980 movie </span><span data-dcnode-id="590" style="font-style: italic;"><span data-dcnode-id="591" instrument_node="">Heaven’s Gate</span></span><span data-dcnode-id="589" instrument_node="">. He even blew up a horse with dynamite, a scene that made it into the movie.</span><sub data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">[7]</span></sub></li><li data-dcnode-id="582" id="12510"><span data-dcnode-id="585" instrument_node="">Several thousands of videos of actual, live animal cruelty can be found on YouTube. While many of the videos have been flagged as inappropriate, YouTube generally does not remove them.</span><sub data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">[3]</span></sub></li><li data-dcnode-id="575" id="12511"><span data-dcnode-id="581" instrument_node="">In </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factretriever.com/spain-facts"><span data-dcnode-id="580" instrument_node="">Spain</span></a><span data-dcnode-id="578" instrument_node="">, during the festive “Toro Jubilo,” gobs of pitch are placed on a bull’s horn and then lit on fire. The bull is let loose in the streets, where it runs frantically in pain as the fire burns the bull’s horns, eyes, and body while the spectators cheer. The bull can be on fire for hours.</span><sub data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">[11]</span></sub></li></ul><div class="readmorediv ob-readmore-readmorediv" data-dcnode-id="571"><a class="readmore ob-reamore-button" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">READ MORE</span></a></div></div><div class="divSocialMediaIconsButtom" data-dcnode-id="551"><div class="" data-dcnode-id="552" id="articleSocialShare"><div class="article_Social_Sharing" data-dcnode-id="553"><a class="facebook click-shareup" data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.
