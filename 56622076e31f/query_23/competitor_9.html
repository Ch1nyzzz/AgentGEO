How would the ethical issues surrounding Harlow's experiment be changed if it were conducted on lesser species, such as rats</span><br data-dcnode-id="6077"><span data-dcnode-id="6076" instrument_node="">
</span><br data-dcnode-id="6075"><span data-dcnode-id="6074" instrument_node="">
If Harlow conducted his experiments on lesser species that results would have varied dramatically. lthough Harlow proved that animals can learn and think at a complex level, the cognitive attributes of those animals must be taken into account. In addition, rats particularly the popular experimental white rat, have differing habits as it relates to child rearing. Rats do not typically nurture their young as to monkeys. In addition, rats do not have the cognitive capacity as many more mature monkeys have.</span><br data-dcnode-id="6073"><span data-dcnode-id="6072" instrument_node="">
</span><br data-dcnode-id="6071"><span data-dcnode-id="6070" instrument_node="">
In regards to ethics, popular opinion would therefore be swayed towards the diffence of monkeys rather than rats. Rats, in many instances are considered dispensible, and inconvieniences of life. Monkeys, as it relates to public perception are often considered close relatives to the human specices. It is…</span></p><span data-dcnode-id="6068" instrument_node="">
</span><p data-dcnode-id="6058"><span data-dcnode-id="6067" instrument_node="">A relatively controversial research experiment with primates occurred with the Silver Spring Monkeys between from 1981 until 1991. This experiment, arguable more than Harlow's created horrific living conditions for the primates. This experiment also subjected them to what many believe torture and inhumane activities. The benefits derived from the experiment however, have had implications for human society in multiple facets.</span><br data-dcnode-id="6066"><span data-dcnode-id="6065" instrument_node="">
</span><br data-dcnode-id="6064"><span data-dcnode-id="6063" instrument_node="">
In summary, 17 monkeys had been used as research subjects by the world renowned scientist Edward Taub. Taub, to initiate the experiment cut the afferent ganglia that supplied sensation to the brain from their arms. The afferent ganglia is located in the spinal cord. By removing it and he hoped to train the animals to use the arm that they could not feel. In May 1981, Alex Pacheco of the animal-rights group People for the Ethical Treatment of Animals (PETA) began working undercover in the lab, and alerted police to what PETA viewed as unacceptable living conditions for the monkeys.</span><br data-dcnode-id="6062"><span data-dcnode-id="6061" instrument_node="">
</span><br data-dcnode-id="6060"><span data-dcnode-id="6059" instrument_node="">
Police raided the lab and found many ethical aspects within it. For one, the living condictions for the animals were deplorable. Feces appeared throughout the cages; so much so that the animals had to dig through it to find food. Because they had no feeling in their arms, the monkeys would chew and rip the skin from the arms and hands, exposing the bone. These wounds were not properly treated according to authorities. The monkeys were subjected to horrific and often painful experiments through the day. Authorities also cited the fact that the monkeys lived in 15 x 15 cages, in a room with no windows for years at a time. Due to these ethical considerations and more Taub was charged with 17 counts of animal cruelty and failing to provide adequate veterinary care. He was convicted on six counts; five were overturned during a second trial, and the final conviction was overturned on appeal in 1983, when the court ruled that Maryland's animal cruelty legislation did not apply to federally funded laboratories</span></p><span data-dcnode-id="6057" instrument_node="">

</span><br data-dcnode-id="6005"><span data-dcnode-id="6004" instrument_node="">
Animal cruelty includes an assortment of different behaviors harmful to animals, from neglect to more serious malicious action, and even various forms of brutal killing. Studies indicate that animal cruelty may also be followed by more serious forms of crime, such as drug use, inappropriate violent outbursts, and even in some cases homicide. Many studies in psychology, sociology, and criminology have addressed the issues involving animal cruelty and human violence and have demonstrated that violent offenders frequently have childhood and adolescent histories of serious and repeated incidents of animal cruelty (Henderson, Hensley and Tallichet). Violence directed at animals by young people is a sign that something is erroneous in their behavioral patterns, and often acts as a predictor of future violence, even homicides against other humans.</span><br data-dcnode-id="6003"><span data-dcnode-id="6002" instrument_node="">
</span><br data-dcnode-id="6001"><span data-dcnode-id="6000" instrument_node="">

</span><p data-dcnode-id="5925"><span data-dcnode-id="5930" instrument_node="">If anything else, most animals on this planet have evolved thousands or millions of years before human beings. They are the inheritors of this planet as much as any human being. The principle of Ethology and anthropology have shown us that animals act in many ways just like humans, they protect their young, operate within groups and show the structure and the formalities just as complex as human society. Therefore, it is wrong for philosophers to assert their inhumaneness as a qualifier for their abuse. It is evident from modern understanding that animals are just as sophisticated and entitled to their existence as humanity.</span><br data-dcnode-id="5929"><span data-dcnode-id="5928" instrument_node="">

</span><br data-dcnode-id="5789"><span data-dcnode-id="5788" instrument_node="">
Halfbreed by Maria Campbell is an autobiography where Campbell describes the struggles of her life. Campbell's struggles center around her being a halfbreed, a half-Indian and half-white person, rejected by both the Indian and the white people. Cruelty and kindness are important themes of Campbell's story. Firstly, there is the human cruelty of discrimination, represented by the acts of the people. Secondly, there is the cruelty of society, where society oppresses people. Finally, it is a belief in human kindness that allows Campbell to overcome the struggles, with the writing of the autobiography an act of reaching out to the people who have discriminated against her and offering them the opportunity to understand the cruelty of their ways and choose to change these ways.</span><br data-dcnode-id="5787"><span data-dcnode-id="5786" instrument_node="">

</span><br data-dcnode-id="5726"><span data-dcnode-id="5725" instrument_node="">
Animals think. Animals feel emotion. Animals experience pain. Yet there are members of our human society that find these facts irrelevant. In fact there are many people that have no problem disregarding these facts entirely as long as they are able to reap some type of personal reward or benefit from an animal. hether that benefit is in the form of food, clothing, or testing the latest new lipstick, it is always at the expense of the animal's well-being. In this paper I argue that the abuse of animals is morally wrong and therefore animals ought to be afforded rights which place the same consideration on their sentience as is placed on human beings.</span><br data-dcnode-id="5724"><span data-dcnode-id="5723" instrument_node="">

Shelley Rabinovitch has asserted that modern iccans see themselves as part of a world that includes all living beings in Nature (69), which generally prevents exploitative 'use.' This is not universal, but animal abuse would probably exclude a practitioner from the group "iccans." This has not been the case throughout history, and some modern Neo-Pagans include use of animals in ritual they claim falls within the harmonious balance of a non-dualistic participation in Nature (below). The result is a change in modern iccan relationship to animals compared to historical relationships as far as the available evidence shows. This requires defining the group "iccans," and also 'use' and 'animals,' because some groups typically classified alongside icca under the class "Neo-Pagans" are beginning to differentiate themselves through ritual animal use in ways iccans may perhaps want to dissociate themselves from.</span><br data-dcnode-id="5575"><span data-dcnode-id="5574" instrument_node="">

Over time, vegetarians have presented a wide range of reasons as to why eating meat and/or any other product derived from animals is wrong. In seeking to support their position, most vegetarians cite the need to uphold animal rights. In the recent past, the number of people turning to vegetarian diet has been increasing steadily. However, regardless of this, it is important to note that a careful review of literature clearly demonstrates that the consumption of meat and/or other products derived from animals is not necessarily a bad thing.</span><br data-dcnode-id="5497"><span data-dcnode-id="5496" instrument_node="">
</span><br data-dcnode-id="5495"><span data-dcnode-id="5494" instrument_node="">
In Zacharia's (2012) opinion, "the market for vegan food is booming." This effectively means that the number of those joining the vegetarian bandwagon is steadily increasing. However, a vast majority of the population still believes that there is nothing wrong with eating meat or any animal produce. It could be right.</span><br data-dcnode-id="5493"><span data-dcnode-id="5492" instrument_node="">

A careful reading of David Livingston Smith's seminal treatise on the science of dehumanization, Less Than Human, reveals there is a fundamental relationship between the phenomena of dehumanization and that of genocide. There are countless examples which underpin this reality. Several genocides were accompanied by both thoughts and actions in which the perpetrators of these crimes against humanity seemed to consider their victims less than human. Livingston largely seizes upon this point in assembling what is his stance on the exact nature of the relationship between these two phenomenons. His central premise regarding that relationship is that on a basic level, dehumanization is almost a prerequisite for genocide -- and certainly is a causal agent in the carrying out of attempts to completely eradicate a certain group of people. Livingston argues dehumanization is a pivotal part of most attempts at genocide.</span><br data-dcnode-id="5288"><span data-dcnode-id="5287" instrument_node="">

It is a vivid fact that the feelings of cruelty, discrimination and racial distribution are embedded well in to human nature since its very inception. This world depicts several cases where humans treat other humans like animals and ignore their right of living peacefully and according to their own will. This article highlights the work of several writers who have depicted the different ways in which humans have been treated brutally by other humans. Majority of the cases deal with racial discrimination and poverty-based cruelty issues encountered by humans. The article presents an in depth analysis of the works of seven different writers and how their works represent the ill treatment encountered by the human race.</span><br data-dcnode-id="5033"><span data-dcnode-id="5032" instrument_node="">

</span><p data-dcnode-id="4826"><span data-dcnode-id="4831" instrument_node="">Capturing Cruelty in the Opening Scene of John Steinbeck's Of Mice And Men</span><br data-dcnode-id="4830"><span data-dcnode-id="4829" instrument_node="">
</span><br data-dcnode-id="4828"><span data-dcnode-id="4827" instrument_node="">
The English author and historian Edward Gibbon once wrote that, "The works of man are impotent to the assaults of nature." Nowhere is this philosophical perspective better captured than in the John Steinbeck's Of Mice and Men. The novel tells the story of two migrant agricultural workers, George Milton and Lennie Small, during the Great Depression in 1930's California. A central theme in the novel is man's cruelty to one another and how it drives them to hurt other human beings as in the case of Curley's viscous attack on the mentally-handicapped Lennie. In the opening scene of John Steinbeck's Of Mice and Men, the author establishes a contrast between innocence and cruelty through the use of expansive descriptions of nature, symbolism and characterization. This opening dichotomy is vital to an understanding of the theme of cruelty…</span></p><span data-dcnode-id="4825" instrument_node="">

</span><br data-dcnode-id="4776"><span data-dcnode-id="4775" instrument_node="">
The interaction of human beings and the natural world has always been one of conflict because of the inhumane way that people can behave. Animal have been used by human beings as pets, as entertainment, and in the course of scientific research. Fictional depictions of this interaction have reflected the nature of this relationship between man and animal. Some people value animal research as a means of curing human ailments and others decry it as animal cruelty. This is not a clear cut issue, but rather one of many different viewpoints. This document will show various attitudes toward these interactions; the positive aspects of animal testing, the negative attitudes towards testing, and finally how both these attitudes are fitted into the context of the film Rise of the Planet of the Apes, a film which shows exactly how society feels about this complicated…</span></p><span data-dcnode-id="4773" instrument_node="">

</span><br data-dcnode-id="4543"><span data-dcnode-id="4542" instrument_node="">
Contrary to the beliefs of the radical fringe of the animal rights movement, that moral burden does not require that we all become vegetarians to avoid eating other animals. It simply means that we have an objective ethical obligation to take reasonable steps to avoid causing the species we choose to consume any more trauma and physical pain than absolutely necessary. This principle actually predates modern society as it is evident in the laws practiced by Jews, for one example, since before the Common Era.</span><br data-dcnode-id="4541"><span data-dcnode-id="4540" instrument_node="">

There are many people and/or groups who claim responsibility for the Earth Liberation Front's (ELF) development. The group is comprised of loosely affiliated or autonomous cells that are only bound by the idea that they can move beyond civil disobedience and accept more contentious tactics for the defense of their environmental causes. This group was one of the groups that helped coined the label of an "eco-terrorist" which later became mainstream label of such types of offenders. The ELF group was considered one of the first eco-terrorist groups and was at one time labeled by the Federal Bureau of Investigation (FBI) as the most dangerous domestic terror group in the United States.</span><br data-dcnode-id="4307"><span data-dcnode-id="4306" instrument_node="">

There are many different perceptions that people have towards their food. On one end of the spectrum "people live to eat" and they place a high value on the quality, taste, presentation, and the environmental factors that enhance or detract from their experience of their favorite meals. However, people on the other side of the spectrum, take more of an "eat to live" approach to their personal nutrition. People in this camp are focused more on the quantity, convenience, and potentially some of the health consequences of their meals. In my opinion, these two perspectives represent the poles of the spectrum in which there may be a variety of points that exist in between these two extremes. One article written by David Sedaris, "Tasteless," exemplifies something I believe is close to one end of the spectrum while another article written by Anthony Bourdain, "Food is Good," is in…</span></p><span data-dcnode-id="4136" instrument_node="">

eautiful Joe: An Autobiography (1893) encircles human-creature connections inside the defensive circle of middle class family life and depicts childrearing and pet-care as commonly constitutive. Saunders' canine life account relates the experiences of its eponymous creator, a manhandled puppy who is protected from a brutal milkman and embraced by the cherishing Morris family of Fairport, Maine (Walker). The Morrises' style of parenting epitomizes the coercive nurturance encapsulated in Richard rodhead's understood idea of disciplinary closeness. Strongly reproachful of beating, Mrs. Morris controls the ethical still, small voices of her kids through a relentless eating regimen of "good nursing, great sustenance, and kind words" (Saunders 34). Pet-keeping coordinates flawlessly into Mrs. Morris' logic of childrearing, which she alludes to as "heart training." In a discussion with a family companion, Mrs. Morris…</span></p><span data-dcnode-id="3993" instrument_node="">

</span><p data-dcnode-id="3380"><span data-dcnode-id="3389" instrument_node="">2011, the state of California has been in a drought condition. ecently, the media has been abuzz due to the governor's legislation to curtail domestic water use. The effort to curtail water use is a noble one. However, the governor needs to focus more on the real culprit: agribusiness. Because the state is the nation's largest agriculture producer by far, the governor of California has not imposed any restrictions on agriculture. Yet something needs to be done to change the methods by which the United States supplies itself with food. Because meat is linked to serious health problems, ethical issues, and environmental problems, a new policy should curtail factory farming.</span><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">

</span><p data-dcnode-id="3304"><span data-dcnode-id="3309" instrument_node="">In this film, we are introduced to a very unlikely cadre of friends and acquaintances who represent, again, caricatures of particular parts of ourselves. There is a juxtaposition of complex and surreal events, kidnappings, death threats, drugged drinks and hallucinatory dreams, porn-stars and pedophiles, the rich and poor, the violent and the meek, and it all combines to make a truly engaging mosaic -- just as all of the other films here have done. As Dude interacts with his world, just as Marge, H.I. And Everett do, he does so with a purpose that is reflective of his personal nature -- he is a semi-competent actor in his own life but is highly successful at surviving whatever is thrown at or to him.</span><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">

The vivisection debate is an old one. As early as 1928, the scientist J.B.S. Haldane rigorously defended the practice of vivisection against its earliest detractors, arguing that even moderate government regulation of scientific behavior to protect animal rights was hypocritical, given the way that animals were treated in other spheres of human life. In contrast, David Suzuki's 1989 essay "The pain of animals" highlights the central paradox of animal experimentation. On one hand, animal experiments are only useful because of our biological similarities to animals. On the other hand, we assert our right to exploit animals based upon our inherent differences from them. The intelligence of animals such as the chimpanzee is analogous to a two-year-old child and yet through logical sleight of hand we justify using chimps in the laboratory by calling them…</span></p><span data-dcnode-id="3243" instrument_node="">

</span><br data-dcnode-id="3171"><span data-dcnode-id="3170" instrument_node="">

</span><p data-dcnode-id="2567"><span data-dcnode-id="2576" instrument_node="">production of food products has changed dramatically over the past several years. Technological changes in machinery, increased use of better and more expedient forms of transportation, and improved fertilizers have all contributed to a more efficient food production process. This more efficient process, however, has not come with some requisite problems.</span><br data-dcnode-id="2575"><span data-dcnode-id="2574" instrument_node="">
</span><br data-dcnode-id="2573"><span data-dcnode-id="2572" instrument_node="">
The existing system of delivering food products in the United States is a major contributor to the world's global warming problem. The largest contributor to global warming is the use of fossil fuels. One study released in 2000 estimated that nearly ten percent of all the energy used in the United States was consumed by the food industry. (Heller, 2000).</span><br data-dcnode-id="2571"><span data-dcnode-id="2570" instrument_node="">

</span><p data-dcnode-id="2190"><span data-dcnode-id="2195" instrument_node="">Cumberland County Society for the Prevention of Cruelty to Animals (SPCA) faces a great challenge in attempting to increase its visibility in the county. Currently, the SPCA does not have a viable or strong public presence. Linda Catalano, the Executive Director of the Cumberland County SPCA feels that the Society is "invisible," and that many residents are unaware of the work of the SPCA.</span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">
</span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="163" tabindex="0"><span data-dcnode-id="343" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="342"></div><span data-dcnode-id="341" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="165" role="dialog"><span data-dcnode-id="340" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="336" role="button" tabindex="0"><span data-dcnode-id="339" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="338"></i><span data-dcnode-id="337" instrument_node=""> </span></span><span data-dcnode-id="335" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="167"><span data-dcnode-id="334" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="169"><strong class="acsb-title-main" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Compliance status</span></strong><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="314" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="308" instrument_node="">
</span><ol data-dcnode-id="282"><span data-dcnode-id="307" instrument_node="">
</span><li data-dcnode-id="295"><strong class="acsb-title" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="304" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="303"><br data-dcnode-id="302"><span data-dcnode-id="301" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="300"><br data-dcnode-id="299"><span data-dcnode-id="298" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="297"><br data-dcnode-id="296"></li><span data-dcnode-id="294" instrument_node="">
</span><li data-dcnode-id="284"><strong class="acsb-title" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="291" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="290"><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="287"><br data-dcnode-id="286"><span data-dcnode-id="285" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="283" instrument_node="">
</span></ol><span data-dcnode-id="281" instrument_node="">
</span><strong data-dcnode-id="278" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="279" lang="EN-US"><span data-dcnode-id="280" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="277" instrument_node="">
</span><ul data-dcnode-id="245"><span data-dcnode-id="276" instrument_node="">
</span><li data-dcnode-id="272"><strong class="acsb-title" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="273" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="267"><strong class="acsb-title" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="268" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="266" instrument_node="">
</span><li data-dcnode-id="262"><strong class="acsb-title" data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="263" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="261" instrument_node="">
</span><li data-dcnode-id="257"><strong class="acsb-title" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="258" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="256" instrument_node="">
</span><li data-dcnode-id="252"><strong class="acsb-title" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="253" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="251" instrument_node="">
</span><li data-dcnode-id="247"><strong class="acsb-title" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="248" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="246" instrument_node="">
</span></ul><span data-dcnode-id="244" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="241"><span data-dcnode-id="242" lang="EN-US"><span data-dcnode-id="243" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="240" instrument_node="">
</span><ol data-dcnode-id="182"><span data-dcnode-id="239" instrument_node="">
</span><li data-dcnode-id="232"><strong class="acsb-title" data-dcnode-id="235"><span data-dcnode-id="237" lang="EN-US"><span data-dcnode-id="238" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="236" instrument_node="">–</span></strong><span data-dcnode-id="233" lang="EN-US"><span data-dcnode-id="234" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="231" instrument_node="">
</span><li data-dcnode-id="224"><span data-dcnode-id="227" lang="EN-US"><strong class="acsb-title" data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="228" instrument_node="">&nbsp;</span></span><span data-dcnode-id="225" lang="EN-US"><span data-dcnode-id="226" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="223" instrument_node="">
</span><li data-dcnode-id="217"><span data-dcnode-id="219" lang="EN-US"><strong class="acsb-title" data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Animations –</span></strong><span data-dcnode-id="220" instrument_node="">&nbsp;</span></span><span data-dcnode-id="218" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="209"><span data-dcnode-id="212" lang="EN-US"><strong class="acsb-title" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="213" instrument_node="">&nbsp;</span></span><span data-dcnode-id="210" lang="EN-US"><span data-dcnode-id="211" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="208" instrument_node="">
</span><li data-dcnode-id="201"><span data-dcnode-id="204" lang="EN-US"><strong class="acsb-title" data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="205" instrument_node="">&nbsp;</span></span><span data-dcnode-id="202" lang="EN-US"><span data-dcnode-id="203" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="200" instrument_node="">
</span><li data-dcnode-id="193"><span data-dcnode-id="196" lang="EN-US"><strong class="acsb-title" data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="197" instrument_node="">&nbsp;</span></span><span data-dcnode-id="194" lang="EN-US"><span data-dcnode-id="195" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="192" instrument_node="">
</span><li data-dcnode-id="184"><strong class="acsb-title" data-dcnode-id="189"><span data-dcnode-id="190" lang="EN-US"><span data-dcnode-id="191" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="185" lang="EN-US"><strong class="acsb-title" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">–</span></strong><span data-dcnode-id="186" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="183" instrument_node="">
</span></ol><span data-dcnode-id="181" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="175" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="172" instrument_node="">
</span><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="168" instrument_node=""> </span></div><span data-dcnode-id="166" instrument_node=""> </span></div><span data-dcnode-id="164" instrument_node="">
