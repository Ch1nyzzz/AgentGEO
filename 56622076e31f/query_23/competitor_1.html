de-id="7407" style="flex-basis:0px;flex-grow:2"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-1-above" data-dcnode-id="7408"><div class="nova-legacy-c-card__header nova-legacy-c-card__header--show-divider nova-legacy-c-card__header--spacing-inherit" data-dcnode-id="7412"><h2 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-700" data-dcnode-id="7413"><span data-dcnode-id="7414" instrument_node="">Abstract</span></h2></div><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="7409"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-800 research-detail-middle-section__abstract" data-dcnode-id="7410" itemprop="description"><span data-dcnode-id="7411" instrument_node="">Animal Cruelty cases make headlines around the world every day, whether it's the person who kills the neighbour's cat, the hoarder of sick and dying animals or the family whose freezing, starving dog is tied up outside in the middle of the winter. Animal Cruelty has several types which may be one of Simple Neglect, Gross Neglect, Intentional Abuse, Animal Hoarding, Organized Abuse, Ritualistic Abuse or Animal Sexual Assault. These cases of Cruelty cannot be overlooked as it has proven to have severe implications ranging from the fact that it is linked to other crimes, to the factual truth that these practises inflict great pain on these animals that have nobody to speak for them. Combating this menace of Animal Cruelty is a Journey that must be undertaken and everybody including the Government, NGOs and even Culture has a major role to play in this. This review looks at Animal Cruelty in the world while paying a little more attention to Nigeria. 1.0 Intoduction 1.1. Definitions: An animal activist's definition of animal cruelty may be very different from that of a hunter or a farmer. There is also a legal definition of Animal Cruelty (Duel, 2000). These varied definitions of animal cruelty have created a dilemma which has existed since the very beginning of the animal-protection movement. While much progress has been made for animals in our society, particularly during the past 50 years, the continuing absence of a widely accepted definition of cruelty to animals remains an enormous obstacle. Every activity that threatens the well being of animals – and that has not already been remedied through legislation – must be challenged and overcome on a largely individual basis. 1.1.1 Animal Cruelty – The Common Understanding Animal cruelty cases make headlines around the world every day, whether it's the person who kills the neighbour's cat, the hoarder of sick and dying animals, the family whose freezing, starving dog is tied up outside in the middle of winter. These acts would likely constitute animal cruelty under any state's animal cruelty statute, and would also fit with the public's common understanding of the term (Duel, 2000). However, when it comes to animals other than cats and dogs, peoples' concept of the term Animal Cruelty varies greatly. Most animal activists would say that traditional agricultural practices such as de-beaking, tail docking, castration and confinement on factory farms are animal cruelty. Most people would probably agree, but factory farmers and most states Animal Cruelty laws would disagree (Randour, 2004). While some might base their definition of Animal Cruelty on how much the animal suffers or feels pain during death, the amount of suffering is not relevant for animal rights activists because the animals are deprived of their right to live and exist free of human use and abuse. Some may also base their definition on which type of animal is involved or how intelligent they perceive that animal to be. The slaughter of dogs, horses or whales for meat may be the epitome of Animal cruelty to some, while the killing of cows, pigs and chickens is acceptable to those same individuals (Randour and Davidson, 2008). Similarly, to some, the killing of animals for fur or cosmetics testing may constitute unacceptable animal cruelty while the killing of animals for food is acceptable. Among the general public, the more culturally beloved the animal is and the more unusual the harm is, the more likely they are to be outraged and label the harm to that animal as Animal Cruelty. To animal activists, a much wider range of harms is referred to as Cruelty. Animal rights activists would argue that cruelty is cruelty, regardless of how common or legal the harm is. 1.1.2 Animal Cruelty -The Legal Definition The California Penal Code defines animal cruelty as the malicious or intentional maiming, mutilation, torture or wounding of a living animal, and states that any person who overworks, tortures, torments, deprives of necessary food, drink or shelter, cruelly beats, mutilates or cruelly kills an animal is guilty of a misdemeanour or felony. Any person, who owns, possesses keeps or trains a dog with the intent to engage the animal in exhibition fighting, as well as any person who is knowingly present as a spectator at an exhibition of fighting of dogs, is guilty of a misdemeanour. In addition, any person who wilfully abandons any animal is guilty of a misdemeanour (Lockwood, 2006). The Nigeria constitution holds that any person who: 1.</span></div></div></div></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item" data-dcnode-id="7388" style="flex-basis:0px;flex-grow:1"><div class="lite-page-promo research-detail-signup-promo" data-dcnode-id="7389"><picture class="lite-page-promo__brand research-detail-signup-promo__brand" data-dcnode-id="7403" height="14" width="100"><source data-dcnode-id="7406" data-srcset="images/icons/svgicons/researchgate-logo-white.svg" type="image "nova-legacy-c-tooltip__body" data-dcnode-id="1872"><div class="nova-legacy-c-tooltip__body-content" data-dcnode-id="1875"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1876"><div class="nova-legacy-o-stack__item" data-dcnode-id="1877"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1878"><div class="nova-legacy-o-stack__item" data-dcnode-id="1895"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1896"><div class="nova-legacy-o-stack__item" data-dcnode-id="1897"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node="">... Animal cruelty refers to any morally or legally unacceptable behaviour which causes animals to experience physiological, psychological, and/or behavioural discomfort [7,8]. Animal welfare concerns are reported in different forms and in different species, and dogs are one of the most commonly reported victims </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">[9]</span></mark><span data-dcnode-id="1899" instrument_node="">. Concerns may involve violence [10,11], injuries caused by their involvement in the sporting industry [12,13], abandonment [14,15], inappropriate surgical procedures [16], and neglecting care of the dog [9,17].  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1887"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1888"><div class="nova-legacy-o-stack__item" data-dcnode-id="1889"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1890"><span data-dcnode-id="1894" instrument_node="">... Animal welfare concerns are reported in different forms and in different species, and dogs are one of the most commonly reported victims [9]. Concerns may involve violence [10,11], injuries caused by their involvement in the sporting industry [12,13], abandonment [14,15], inappropriate surgical procedures [16], and neglecting care of the dog </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">[9,</span></mark><span data-dcnode-id="1891" instrument_node="">17]. Not only do these issues compromise the welfare of dogs, some of these welfare concerns (e.g., intentional abuse and dog fighting) have been recognised as sentinels of other social issues [6,9], in particular domestic violence [18][19][20] and sexual assaults [21].  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1879"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1880"><div class="nova-legacy-o-stack__item" data-dcnode-id="1881"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1882"><span data-dcnode-id="1886" instrument_node="">... Concerns may involve violence [10,11], injuries caused by their involvement in the sporting industry [12,13], abandonment [14,15], inappropriate surgical procedures [16], and neglecting care of the dog [9,17]. Not only do these issues compromise the welfare of dogs, some of these welfare concerns (e.g., intentional abuse and dog fighting) have been recognised as sentinels of other social issues [6,</span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">9]</span></mark><span data-dcnode-id="1883" instrument_node="">, in particular domestic violence [18][19][20] and sexual assaults [21]. Some have also been reported to be a precursor of antisocial behaviours among young people [7,22,23].  ...</span></div></div></div></div></div></div></div></div><div class="nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body" data-dcnode-id="1873"><div class="nova-legacy-c-tooltip__arrow-tip" data-dcnode-id="1874"></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1801"><div class="nova-legacy-v-citation-item__context-source" data-dcnode-id="1802"><div class="nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item" data-dcnode-id="1803"><div class="nova-legacy-v-publication-item__body" data-dcnode-id="1818"><div class="nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m" data-dcnode-id="1819"><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1866"><div class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title" data-dcnode-id="1867"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1868" href= live J C Phillips" class="lite-image" data-dcnode-id="1842" data-src="https://i1.rgstatic.net/ii/profile.image/276933209280520-1443037430639_Q64/Clive-Phillips.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Clive J C Phillips</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1826"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Mandy-Paterson"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1828"><span class="lite-person-inline-item__image" data-dcnode-id="1831"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1832"><span data-dcnode-id="1834" instrument_node=""> </span><img alt="Mandy Paterson" class="lite-image" data-dcnode-id="1833" data-src="https://i1.rgstatic.net/ii/profile.image/280438313635892-1443873112719_Q64/Mandy-Paterson.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Mandy Paterson</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1820"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1821"><span class="js-target-abstract-6265d8a4ece98 lite-page-hidden" data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Human–dog relationships are an important contributor to the welfare of dogs, but little is known about the importance of socioeconomic status of the dogs’ owners. We conducted a retrospective study of canine welfare complaints, using Australian government statistics on the socioeconomic status of the inhabitants at the location of the alleged welfare issue. The socioeconomic score of inhabitants at the relevant postcode was assumed to be that of the plaintiff. Our dataset included 107,597 complaints that had been received by RSPCA Queensland between July 2008 and June 2018, each with the following information: the number of dogs involved, dog(s) age, breed(s), suburb, postcode, date received, and complaint code(s) (describing the type of complaint). The median index score for relative social advantage of the locations where the alleged welfare concern occurred was less than the median score for the population of Queensland, suggesting that welfare concerns in dogs were more commonly reported in areas with inhabitants of low socioeconomic status. It was also less if the dog being reported was not of a recognised breed, compared to dogs of recognised breeds. Dogs reported to be in the gundog breed group were in the most socioeconomically advantaged postcodes, followed by toy, hound, non-sporting, working dog, terrier, and utility breed groups. Reports of alleged cruelty, insufficient food and/or water, a dog being not exercised or being confined/tethered, failure to provide shelter or treatment, overcrowding, a dog being in poor condition or living in poor conditions were most likely to be made in relation to dogs in low socioeconomic postcodes. Reports of dogs being left in a hot vehicle unattended were more likely to be made in relation to dogs in high socioeconomic postcodes. It is concluded that both canine welfare complaints and dogs in specific breed groups appear to be related to the owner’s socioeconomic status. This study may be used to improve public awareness and to tailor educational campaigns toward different populations.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1804"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1805"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1806"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1807"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1808"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1814"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/335989118_Socioeconomic_Influences_on_Reports_of_Canine_Welfare_Concerns_to_the_Royal_Society_for_the_Prevention_of_Cruelty_to_Animals_RSPCA_in_Queensland_Australia"><span class="nova-legacy-c-button__label" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1809"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1810" type="button"><span class="nova-legacy-c-button__label" data-dcn -o-stack__item" data-dcnode-id="1792"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1793"><span data-dcnode-id="1797" instrument_node="">... Animal cruelty involves all human behaviours towards animals that are morally and/or legally unacceptable, causing them to be inflicted with unnecessary and unjustifiable physiological, psychological, and behavioural discomfort or pain [1,</span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">2]</span></mark><span data-dcnode-id="1794" instrument_node="">. It is a complex issue implicating animal welfare, moral concerns, criminal activity, and violence [2][3][4].  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1782"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1783"><div class="nova-legacy-o-stack__item" data-dcnode-id="1784"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1785"><span data-dcnode-id="1789" instrument_node="">... Animal cruelty involves all human behaviours towards animals that are morally and/or legally unacceptable, causing them to be inflicted with unnecessary and unjustifiable physiological, psychological, and behavioural discomfort or pain [1,2]. It is a complex issue implicating animal welfare, moral concerns, criminal activity, and violence </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">[2]</span></mark><span data-dcnode-id="1786" instrument_node="">[3][4]. It is regulated by state and territory law in Australia; for example, in Queensland by the Animal Care and Protection Act 2001 (ACPA [1]).  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1774"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1775"><div class="nova-legacy-o-stack__item" data-dcnode-id="1776"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1777"><span data-dcnode-id="1781" instrument_node="">... Literature dealing with the milder but more common forms of animal welfare concerns is limited. One report considers neglect, such as exposing dogs to poor nutrition, keeping dogs in a backyard for hours without a shelter, and failing to meet exercise needs </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">[2]</span></mark><span data-dcnode-id="1778" instrument_node="">. Most studies [20,22,23] stress the moral, legal, and social aspects of animal cruelty, and few explore the epidemiological dimension of this topic.  ...</span></div></div></div></div></div></div></div></div><div class="nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body" data-dcnode-id="1768"><div class="nova-legacy-c-tooltip__arrow-tip" data-dcnode-id="1769"></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1696"><div class="nova-legacy-v-citation-item__context-source" data-dcnode-id="1697"><div class="nova-legacy-v-publication-item nova-legacy-v-publication-item--size <a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Mandy-Paterson"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1732"><span class="lite-person-inline-item__image" data-dcnode-id="1735"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1736"><span data-dcnode-id="1738" instrument_node=""> </span><img alt="Mandy Paterson" class="lite-image" data-dcnode-id="1737" data-src="https://i1.rgstatic.net/ii/profile.image/280438313635892-1443873112719_Q64/Mandy-Paterson.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Mandy Paterson</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1721"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Clive-Phillips"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1723"><span class="lite-person-inline-item__image" data-dcnode-id="1726"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1727"><span data-dcnode-id="1729" instrument_node=""> </span><img alt="Clive J C Phillips" class="lite-image" data-dcnode-id="1728" data-src="https://i1.rgstatic.net/ii/profile.image/276933209280520-1443037430639_Q64/Clive-Phillips.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Clive J C Phillips</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1715"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1716"><span class="js-target-abstract-6265d8a4ed15d lite-page-hidden" data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Animal neglect and cruelty are important welfare and social issues. We conducted an epidemiological study of dog welfare complaints and identified risk factors. The retrospective study included 107,597 dog welfare complaints received by RSPCA Queensland from July 2008 to June 2018. The risk factors considered were the age of dogs and the year of being reported. The number of complaints received each year increased by 6.2% per year. The most common complaints were poor dog body conformation, insufficient food and/or water, dogs receiving inadequate exercise, and dogs being confined or tethered. Increasing numbers were most evident for poor living conditions and leaving dogs in a hot vehicle unattended, both of which may have resulted from increasing public awareness. The majority of complaints were neglect-related rather than related to deliberate cruelty. Compared with puppies, adult dogs were more likely to be reported to have been poisoned, left unattended in a hot car or abandoned, as well as to have had inadequate exercise and shelter. Reported puppies were more likely to be alleged to have experienced cruelty, lack of veterinary support, overcrowding, poor living and health conditions, and inappropriate surgery. In conclusion, animal neglect was the most commonly reported welfare concern in dogs. Due to an assumed increasing public awareness of some types of cruelty, the trends of reported concerns differed. Adult dogs and puppies were reported to be involved in different types of welfare concerns. Strategies to address cruelty to dogs can be informed by an understanding of risk factors and trends in types of cruelty.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1699"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1700"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1701"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1702"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1703"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1709"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/333406821_A_Retrospective_Analysis_of_Complaints_to_RSPCA_Queensland_Australia_about_Dog_Welfare"><span class="nova-legacy-c-button__label" data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1704"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1705 terinary practice, and are committed to ethical decision-making. As an example, considering animal cruelty, it has several types which may be one of simple neglect, gross neglect, intentional abuse, animal hoarding, organized abuse, ritualistic abuse or animal sexual assault </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">(Mogbo et al. 2013)</span></mark><span data-dcnode-id="1609" instrument_node="">. The definition of animal cruelty may also vary from that of an animal activist to a hunter or a farmer.  ...</span></div></div></div></div></div></div></div></div><div class="nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body" data-dcnode-id="1599"><div class="nova-legacy-c-tooltip__arrow-tip" data-dcnode-id="1600"></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1541"><div class="nova-legacy-v-citation-item__context-source" data-dcnode-id="1542"><div class="nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item" data-dcnode-id="1543"><div class="nova-legacy-v-publication-item__body" data-dcnode-id="1558"><div class="nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m" data-dcnode-id="1559"><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1592"><div class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title" data-dcnode-id="1593"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/331291002_An_Overview_on_Ethics_and_Ethical_Decision-Making_Process_in_Veterina .eu/?index=cw22&amp;url=https%3A//www.researchgate.net/journal/Journal-of-Agricultural-and-Environmental-Ethics-1573-322X"><span data-dcnode-id="1582" instrument_node="">J AGR ENVIRON ETHIC</span></a></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1564"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="1565"><li class="nova-legacy-e-list__item" data-dcnode-id="1566"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Binoy-Vettical"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1568"><span class="lite-person-inline-item__image" data-dcnode-id="1571"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1572"><span data-dcnode-id="1574" instrument_node=""> </span><img alt="Binoy S. Vettical" class="lite-image" data-dcnode-id="1573" data-src="https://i1.rgstatic.net/ii/profile.image/795730054770690-1566728237828_Q64/Binoy-Vettical.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Binoy S. Vettical</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1560"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1561"><span class="js-target-abstract-6265d8a4ed275 lite-page-hidden" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Veterinary ethics is a coordination of ethical principles that apply morals, values and judgements to the practice of veterinary profession. Veterinary ethics cover its practical application in veterinary practices as well as on its history, philosophy, theology, and sociology. Veterinary ethics combine veterinary professional ethics and the focus of animal ethics. It can be inferred as a critical manifestation on the provision of veterinary services in hold of the profession’s responsibilities to animal kind and mankind. Many ethical issues arise in a business unit in veterinary practice. Whenever such issues arise, it may lead to dilemmas, then proper and well-thought out ethical decision is to be made. Ethical decision making process in a business unit in veterinary practice is the use of ethical theories, principles, and rules by veterinary professionals and paraprofessionals in resolving ethical dilemmas in the veterinary practice. In order to resolve ethical dilemmas, being aware of and revelation to ethical theories is essential. Thoughtfulness of animal welfare and ethical issues is an essential component of a good ethical veterinary practice. This article reviews and discusses the ethics and major steps engaged in the ethical decision-making process in a business unit in veterinary practice. Strong commitment to the role, organization’s commitment to ethics and staff support could lower the levels of moral stress while facing ethical dilemma in a veterinary practice. Though using the ethical frameworks portrayed may not change the actual decisions finally reached by veterinary professionals, a good knowledge of ethical issues is imperative for client communication, better job satisfaction and preserving a positive public outline for both the individual and the veterinary practice.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id= e-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1518"><span data-dcnode-id="1520" instrument_node=""> </span><img alt="Ayşegül Sürücü" class="lite-image" data-dcnode-id="1519" data-src="https://i1.rgstatic.net/ii/profile.image/963535374917639-1606736143683_Q64/Ayseguel-Sueruecue.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Ayşegül Sürücü</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1506"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1507"><span class="js-target-abstract-6265d8a4ecdba lite-page-hidden" data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">The aim of the study is to explore the ethical perspective of the animal cruelty in video games. Although there are many studies considering violence on animals in non-interactive mediums, and many other studies considering violence on humans in video games, there seems to be a lack of studies considering animal-human interaction in interactive mediums such as video games where the players not only make the choice of using violence, but they also sometimes actively engage in it. The literature will be reviewed in order to create an ethical discussion on killing non-humanoid animal characters with analyzing indie survival realistic game: The Long Dark.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1490"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1491"><div class="nova-legacy-o-pack nova-legacy-o- ss="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1464"><span data-dcnode-id="1466" instrument_node=""> </span><img alt="Hao-Yu Shih" class="lite-image" data-dcnode-id="1465" data-src="https://i1.rgstatic.net/ii/profile.image/602119736414208-1520567940373_Q64/Hao-Yu-Shih.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Hao-Yu Shih</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1449"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Mandy-Paterson"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1451"><span class="lite-person-inline-item__image" data-dcnode-id="1454"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1455"><span data-dcnode-id="1457" instrument_node=""> </span><img alt="Mandy Paterson" class="lite-image" data-dcnode-id="1456" data-src="https://i1.rgstatic.net/ii/profile.image/280438313635892-1443873112719_Q64/Mandy-Paterson.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Mandy Paterson</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1440"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Clive-Phillips"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1442"><span class="lite-person-inline-item__image" data-dcnode-id="1445"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1446"><span data-dcnode-id="1448" instrument_node=""> </span><img alt="Clive J C Phillips" class="lite-image" data-dcnode-id="1447" data-src="https://i1.rgstatic.net/ii/profile.image/276933209280520-1443037430639_Q64/Clive-Phillips.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Clive J C Phillips</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1434"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1435"><span class="js-target-abstract-6265d8a4ed007 lite-page-hidden" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Cruelty- and neglect-related canine welfare concerns are important welfare and social issues. Dog breed has been identified as a risk factor for bad welfare, and yet its role in different types of canine welfare concerns has not been fully investigated. We conducted a retrospective study of 107,597 dog welfare complaints received by RSPCA Queensland from July 2008 to June 2018. The breed of the dog involved in the incident was either recorded as stated by the complainant or by the inspector attending the case. Dog breed was divided into groups following the Australian National Kennel Club nomenclature. Dogs of a non-recognised breed were more likely to be reported in welfare complaints than recognised breed dogs. Recognised breed dogs had a greater risk of being reported with poisoning, lack of veterinary support, abuse and being left unattended in a hot vehicle; while non-recognised breed dogs had greater risk of being reported with insufficient shelter, exercise and food/water, as well as overcrowding and abandonment. Utility breeds, terriers and working dogs were most likely to be reported, while toy, non-sporting breeds and gundogs were least likely to be reported. Common complaint types for utility dogs were: insufficient food/water, shelter and exercise, and poor living conditions; for terriers: abandonment, intentional abuses and killing or injuring another animal; for working dogs: insufficient food/water, shelter and exercise; for toy dogs: lack of veterinary care, overcrowding and staying in a hot vehicle alone; for non-sporting dogs: lack of veterinary care, being left in a hot vehicle unattended and poor body conditions; and for hounds: killing or injuring another animal, intentional abuses and poor body conditions. Breed groups rather than breeds may be the best method of breed identification in a public reporting system as they group similar breeds together, and as our research shows, they relate to types of animal welfare complaints. Understanding the relationship between breed group and canine welfare complaints may help authorities improve public education programs and inform decision-making around which breed a new owner should choose.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1418"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1419"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1420"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1421"><div class="nova-legacy-c-button-group nova-legacy-c-butto an></div><div class="nova-legacy-v-publication-item__meta-left" data-dcnode-id="1402"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-medium nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-ghost nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__fulltext" data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Full-text available</span></span></div><div class="nova-legacy-v-publication-item__meta-right" data-dcnode-id="1397"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data" data-dcnode-id="1398"><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="1399"><span class="" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Apr 2015</span></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1384"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="1385"><li class="nova-legacy-e-list__item" data-dcnode-id="1386"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Barry-Tolchard"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1388"><span class="lite-person-inline-item__image" data-dcnode-id="1391"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1392"><span data-dcnode-id="1394" instrument_node=""> </span><img alt="Barry Tolchard" class="lite-image" data-dcnode-id="1393" data-src="https://i1.rgstatic.net/ii/profile.image/669566468374528-1536648494021_Q64/Barry-Tolchard.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Barry Tolchard</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1380"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1381"><span class="js-target-abstract-6265d8a4ed396 lite-page-hidden" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Gambling has become a popular activity in both urban and rural settings. Although the
prevalence and participation of gambling is well known, little has been reported
regarding the impacts of gambling on rural communities. Therefore, a narrative
literature review approach was adopted to examine what is known regarding gambling
in rural communities. This article describes the prevalence and types of gambling that
are popular in rural communities around the world. It identifies the benefits and
highlights the potential harm caused by a person’s gambling and the impact this has on
families and the wider rural community. There are both benefits and risks associated
with increased availability of gambling opportunities. Specific vulnerable groups within
rural populations are identified within this context and how different countries respond
to rural gambling is explored. A number of strategies based on a public health approach
are recommended to ensure that gambling remains as harmless an activity as possible
in rural communities.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1364"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1365"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1366"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1367"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1368"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1374"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/279532917_The_impact_of_gambling_on_rural_communities_worldwide_A_narrative_literature_review"><span class="nova-legacy-c-button__label" data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1369"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1370" type="button"><span class="nova-legacy-c-button__label" data-dcnode-id="1371"><span class="js-lite-click" data-dcnode-id="1372" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-abstract-6265d8a4ed396&quot;,&quot;a  R. Felthous</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1252"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1253"><span class="js-target-abstract-6265d8a4ed7f7 lite-page-hidden" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">This paper examines the relationship between childhood cruelty toward animals and aggressive behavior among criminals and noncriminals in adulthood.
Data were derived from personal interviews with 152 criminals and noncriminals in Kansas and Connecticut. A standardized, closed, and open-ended interview, requiring approximately 1-2 hours to complete, was administered to all subjects. Aggressiveness was defined by behavioral criteria rather than by reason for incarceration.
Childhood cruelty toward animals occurred to a significantly greater degree among aggressive criminals than among nonaggressive criminals or noncriminals. Additionally, the occurrence of more than 40 cases of extreme animal crielty facilitated the development of a preliminary classification of nine distinct motivations for animal cruelty. Finally, family violence, particularly paternal abuse and alcoholism, were significantly more common among aggressive criminals with a history of childhood cruelty toward animals.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1236"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1237"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1238"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1239"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1240"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1246"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/247716442_Childhood_Cruelty_toward_Animals_among_Criminals_and_Noncriminals"><span class="nova-legacy-c-button__label" data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1241"><button class="nova-legacy-c-button no "" data-dcnode-id="1214"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/journal/Family-Relations-1741-3729"><span data-dcnode-id="1216" instrument_node="">FAM RELAT</span></a></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1198"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="1199"><li class="nova-legacy-e-list__item" data-dcnode-id="1200"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Clifton-Flynn"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1202"><span class="lite-person-inline-item__image" data-dcnode-id="1205"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1206"><span data-dcnode-id="1208" instrument_node=""> </span><img alt="Clifton P. Flynn" class="lite-image" data-dcnode-id="1207" data-src="https://i1.rgstatic.net/ii/profile.image/277213103575046-1443104162611_Q64/Clifton-Flynn.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Clifton P. Flynn</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1194"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1195"><span class="js-target-abstract-6265d8a4edb62 lite-page-hidden" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">The issue of violence to animals has been virtually ignored by family scholars and other family professionals. After looking at why animal abuse has not received attention, it is argued that those who study and work with families need to attend to animal abuse for seven reasons: (a) animal abuse is a serious antisocial behavior by children and adolescents; (b) it is a relatively common childhood occurrence; (c) it has potential negative developmental consequences; (d) violence toward animals is related to interpersonal violence; (e) it is connected to and may be a marker of family violence; (f) the well-being of companion animals is being neglected; and (g) it will help achieve a less violent society. The implications for research, policy, counseling and human services, and family life education are discussed.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1178"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1179"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1180"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1181"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1182"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1188"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legac data-dcnode-id="1095"><span class="js-target-abstract-6265d8a4edb0d lite-page-hidden" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">The maltreatment of animals, usually companion animals, may occur in homes where there is domestic violence, yet we have limited information about the prevalence of such maltreatment. We surveyed the largest shelters for women who are battered in 49 states and the District of Columbia. Shelters were selected if they provided overnight facilities and programs or services for children. Ninety-six percent of the shelters responded. Analysis revealed that it is common for shelters to serve women and children who talk about companion animal abuse. However, only a minority of respondents indicated that they systematically ask about companion animal maltreatment in their intake interview. We discuss the implications of these results for domestic violence programs, animal welfare organizations, and programs serving children of women who are battered by their partners.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1078"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1079"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1080"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1081"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1082"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1088"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-butto ennifer A Manganello" class="lite-image" data-dcnode-id="1047" data-src="https://i1.rgstatic.net/ii/profile.image/363408558968835-1463654760759_Q64/Jennifer-Manganello.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Jennifer A Manganello</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1031"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Victoria-Frye"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1033"><span class="lite-person-inline-item__image" data-dcnode-id="1036"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1037"><span data-dcnode-id="1039" instrument_node=""> </span><img alt="Victoria Frye" class="lite-image" data-dcnode-id="1038" data-src="https://i1.rgstatic.net/ii/profile.image/829881034211330-1574870465676_Q64/Victoria-Frye.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Victoria Frye</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1026"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Jacquelyn-C-Campbell-38701073"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1028"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Jacquelyn C. Campbell</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1020"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1021"><span class="js-target-abstract-6265d8a4edd88 lite-page-hidden" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">The objective of this study was to identify risk factors for abuse and IPV related injury among an urban population. This study reports an additional analysis of a case-control study conducted from 1994 to 2000 in 11 USA metropolitan cities where of 4746 women, 3637 (76.6%) agreed to participate. Control group women (N = 845) were identified through random digit dialing. Significant risk factors for abuse included women's young age (adjusted odds ratio (AOR) 2.05 p = .011), being in fair or poor mental health (AOR 2.65 p &lt; .001), and former partner (AOR 3.33 p &lt; .001). Risk factors for partners perpetrating IPV included not being a high school graduate (AOR 2.06 p = .014), being in fair or poor mental health (AOR 6.61 p &lt; .001), having a problem with drug (AOR 1.94 p = .020) or alcohol use (AOR 2.77 p = .001), or pet abuse (AOR 7.59 p = .011). College completion was observed to be protective (AOR 0.60, p &lt; .001). Significant risk factors for injury included partner's fair or poor mental health (AOR 2.13, p = .008), suicidality (AOR 2.11, p =.020), controlling behavior (AOR 4.31, p &lt; .001), prior domestic violence arrest (AOR 2.66, p = .004), and relationship with victim of more than 1 year (AOR 2.30, p = .026). Through integration of partner related risk factors into routine and/or targeted screening protocols, we may identify more abus ze-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="603"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/8142224_Man_and_his_fellow-creatures_under_ethical_aspects"><span data-dcnode-id="605" instrument_node="">[Man and his fellow-creatures under ethical aspects]</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="597"><span data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">February 2004</span></span><span data-dcnode-id="600" instrument_node=""> · </span><span data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">ALTEX</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="591"><li class="nova-legacy-e-list__item" data-dcnode-id="592"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="593"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="594"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Gotthart-M-Teutsch-29775286"><span data-dcnode-id="596" instrument_node="">Gotthart M Teutsch</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="585"><span data-dcnode-id="590" instrument_node="">The repeated attempts to tighten up the literary report are finally showing effects. This not only as a result of shorter reports but also because of the fact that less is being written and published regarding our topic. The discussion seems exhausted which, for years, dealt with the controversial moral status of animals and the--finally--constitutionally sanctioned status of animal protection in </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="588" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-6265d8a4ee144&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="589" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-6265d8a4ee144" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node=""> Germany. The problem of animals in ethics is becoming a rarity. Correspondingly, bio-ethics is oriented towards human problems and related borderline cases in a rather one-sided manner. This radically altered situation corresponds to an equally profound shift in the direction of our thinking. In the 1970's it was the shock in reaction to brutality towards T.V.-reports. But soon questions asking about the guilty were being posed. To direct the question from a guilt-related "who" to the "what" of the underlying reasons was a more difficult task. Just like social ethics developed out of social criticism, modern animal ethics developed out of the criticism of cruelty to animals. And, to the degree that this criticism became a common public concern, it lost its importance in comparison to the ethical questions now moving into the centre of the interest. In view of book-production this means that animal protection-related literature appears in three major groups: Husbandry, Use and Abuse, Animal Protection Law, Animal (Protection) Ethics. To collect these three groups simultaneously is becoming increasingly difficult. The concentration on, and supposedly a limitation to the sectors morals and ethics of the man-animal relationship cannot be avoided in the literary report. Morals is stressed here in particular in order to limit the excessive dominance of theoretical ethics and to preserve the priority of action-guiding morals.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/8142224_Man_and_his_fellow-creatures_under_ethical_aspects"><span data-dcnode-id="584" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="548"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="549"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="550"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="551"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="575"><div class="nova-legacy-l-flex__item" data-dcnode-id="576"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="577" legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Gotthard-M-Teutsch-2030120073"><span data-dcnode-id="503" instrument_node="">Gotthard M Teutsch</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="492"><span data-dcnode-id="497" instrument_node="">It may not be spectacular, but the compilation of a new comment on the German Animal Protection Law before the background of the new constitution is the most important medium and long-term event since the inclusion of animal protection into the constitution in Germany. The comment was also occasion to mark the ethically motivated change in the awareness of society, which has strengthened </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="495" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-6265d8a4ee7fe&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="496" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-6265d8a4ee7fe" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node=""> continuously since the eighties, not only entering the law as the "responsibility of mankind for animals as fellow creatures" but also posing a question to the ethicists, who have since been searching for answers. Eisenhart von Loeper who wrote the "Introduction to the law on the relationship between man and animal" and the comment on the first principle paragraph followed these endeavours of theology and philosophy. Under point 6.3 of this report on the literature some important results are summarised under the keywords "species-spanning humanity", "fellow creaturism", "anthropocentrism-criticism", "principle of equality" and "equity and rights of animals". Significant differences are evident in the comparison of the different concepts that have been developed in animal ethics, also regarding the expanse of the demands made for the benefit of the animals. The general opinion in philosophy that animal ethics and animal protection can only apply to the higher developed animals points towards a tendency to consider only a kind of "animal elite" morally relevant and worthy of protection and to exclude the mass of others as soulless automats by keeping the status quo and exposing them to indiscriminate use by humans. Species-spanning equality must be decidedly demanded.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/7424979_Man_and_his_fellow-creatures_under_ethical_aspects"><span data-dcnode-id="491" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="455"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="456"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="457"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="458"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justi blished, and this would equal an ethical minimum.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/296616733_A_minimum_of_absolute_protection_-_One_of_the_effects_of_the_German_national_objective_Ethischer_Tierschutz_on_the_legislature"><span data-dcnode-id="460" instrument_node="">Read more</span></a></div></div></div></div></div></div></div></div></div></div><div class="lite-page-ad lite-page-ad--has-label lite-page-ad--empty" data-dcnode-id="420" id="lite-ad-tifbgcqltug"><div class="lite-page-ad__inner" data-dcnode-id="421"><div class="lite-page-ad__close" data-dcnode-id="443"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-full nova-legacy-c-button--size-xs nova-legacy-c-button--color-grey nova-legacy-c-button--theme-solid nova-legacy-c-button--width-square" data-dcnode-id="444" id="lite-ad-tifbgcqltug-close" type="button"><svg aria-hidden="true" class="nova-legacy-e-icon nova-legacy-e-icon--size-s nova-legacy-e-icon--theme-bare nova-legacy-e-icon--color-inherit nova-legacy-e-icon--luminosity-medium nova-legacy-c-button__icon" data-dcnode-id="445"><use data-dcnode-id="446" xlink:href="/m/4210735495654424/images/icons/nova/icon-stack-s.svg#close-s"><svg data-dcnode-id="447" id="close-s" viewBox="0 0 16 16" xml:space="preserve" xmlns="http://www.w3.org/2000/svg"><path class="bqst0" d="M13.7 3.7l-1.4-1.4L8 6.6 3.7 2.3 2.3 3.7 6.6 8l-4.3 4.3 1.4 1.4L8 9.4l4.3 4.3 1.4-1.4L9.4 8z" data-dcnode-id="448"></path></svg></use></svg></button></div><div data-dcnode-id="422" id="tifbgcqltug"><rg-ad ad-location="Right" ad-unit="LoggedOut_PublicationWithFulltext_Right" ad-unit-path="/83500759/LoggedOut_PublicationWithFulltext_Right" ad-unit-sizes="[[336
