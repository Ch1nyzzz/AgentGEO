de-id="2079"><span data-dcnode-id="2080" instrument_node="">Search inside document </span></span><div class="input_wrapper" data-dcnode-id="2076"><span aria-hidden="true" class="icon-ic_search search_icon" data-dcnode-id="2078" role="presentation"></span><input class="document_search" data-dcnode-id="2077" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="2068"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="2069" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="2070"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="2071"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="1949"><h1 data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">INTRODUCTION</span></h1><p data-dcnode-id="2060"><span data-dcnode-id="2063" instrument_node="">An animal activist's definition of animal cruelty may be very different from that of a hunter or a farmer.</span><br data-dcnode-id="2062"><span data-dcnode-id="2061" instrument_node="">There is also a legal definition of Animal Cruelty (Duel, 2000).</span></p><p data-dcnode-id="2050"><span data-dcnode-id="2059" instrument_node="">PAWS (Philippine Animal Welfare Society) is working to pass legislation against animal abuse, and some</span><br data-dcnode-id="2058"><span data-dcnode-id="2057" instrument_node="">celebrities are supporting their cause. The Animal Welfare Act, which imposes a sentence of just six</span><br data-dcnode-id="2056"><span data-dcnode-id="2055" instrument_node="">months to two years in prison or a fine of one thousand - or up to five thousand pesos, is insufficient,</span><br data-dcnode-id="2054"><span data-dcnode-id="2053" instrument_node="">according to PAWS. its appeal to the Senate for a sentence of six years and one day to twelve years in</span><br data-dcnode-id="2052"><span data-dcnode-id="2051" instrument_node="">jail, as well as a fine of at least one hundred thousand dollars.</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2049" instrument_node="">However, when it comes to animals other than cats and dogs, peoples' concept of the term Animal</span><br data-dcnode-id="2048"><span data-dcnode-id="2047" instrument_node="">Cruelty varies greatly. Most animal activists would say that traditional agricultural practices such as</span><br data-dcnode-id="2046"><span data-dcnode-id="2045" instrument_node="">debeaking, tail docking, castration, and confinement on factory farms are animal cruelty. Most people</span><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node="">would probably agree, but factory farmers and most states Animal Cruelty laws would disagree</span><br data-dcnode-id="2042"><span data-dcnode-id="2041" instrument_node="">(Randour, 2004).</span></p><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">PURPOSE</span></p><p data-dcnode-id="2030"><span data-dcnode-id="2037" instrument_node="">We, as humans, are oblivious to animal abuse and choose to ignore it. Whether it's via apathy or the</span><br data-dcnode-id="2036"><span data-dcnode-id="2035" instrument_node="">law. Animal cruelty can manifest itself in a variety of ways, but the result is always the same. Pain, fear,</span><br data-dcnode-id="2034"><span data-dcnode-id="2033" instrument_node="">and despair are all experienced by a rational animal capable of loving and forming social bonds. And it</span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node="">must come to an end.</span></p><p data-dcnode-id="2022"><span data-dcnode-id="2029" instrument_node="">You must have a clear aim in mind in order to be successful. The purpose of Republic Act No. 8485, also</span><br data-dcnode-id="2028"><span data-dcnode-id="2027" instrument_node="">known as "THE ANIMAL WELFARE ACT OF 1998," is to oversee and control any facilities used for</span><br data-dcnode-id="2026"><span data-dcnode-id="2025" instrument_node="">breeding, maintaining, retaining, treating, or training any animals as objects of trade or as family pets.</span><br data-dcnode-id="2024"><span data-dcnode-id="2023" instrument_node="">This is also time-consuming because we require time to locate important information.</span></p><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">DESCRIPTION</span></p><p data-dcnode-id="2010"><span data-dcnode-id="2019" instrument_node="">Animal cruelty as highlighted in this review is an issue that demands urgent attention. Proper studies,</span><br data-dcnode-id="2018"><span data-dcnode-id="2017" instrument_node="">investigation, and prosecution of animal cruelty cases will go a long way in securing our society today. It</span><br data-dcnode-id="2016"><span data-dcnode-id="2015" instrument_node="">is therefore recommended that proper studies should be carried out on Animal cruelty cases around us,</span><br data-dcnode-id="2014"><span data-dcnode-id="2013" instrument_node="">and governments of developing countries like Nigeria should review their animal cruelty laws and see to</span><br data-dcnode-id="2012"><span data-dcnode-id="2011" instrument_node="">their proper implementation.</span></p><p data-dcnode-id="2000"><span data-dcnode-id="2009" instrument_node="">Most of the time, the individual who conducts animal cruelty does not consider it to be unethical. He or</span><br data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node="">she can rationalize his or her actions in a variety of ways. Let's take a look at some of the most prevalent</span><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node="">reasons. Animal cruelty occurs when humans see animals in the same manner. An animal is only a tool</span><br data-dcnode-id="2004"><span data-dcnode-id="2003" instrument_node="">or a gadget. People that abuse animals are able to detach themselves from the beings they harm,</span><br data-dcnode-id="2002"><span data-dcnode-id="2001" instrument_node="">making them feel as though they aren't doing anything wrong.</span></p><p data-dcnode-id="1986"><span data-dcnode-id="1999" instrument_node="">In Congress, the Philippines' Senate and House of Representatives created ten divisions, each with its</span><br data-dcnode-id="1998"><span data-dcnode-id="1997" instrument_node="">own mission. No person, partnership, company, cooperative, or government agency or instrumentality,</span><br data-dcnode-id="1996"><span data-dcnode-id="1995" instrument_node="">including a slaughterhouse, shall create, manage, or operate any pet store, corral, stud farm, or stock</span><br data-dcnode-id="1994"><span data-dcnode-id="1993" instrument_node="">ffarm without first obtaining a certificate of registration from the Bureau of Animal Industry. The</span><br data-dcnode-id="1992"><span data-dcnode-id="1991" instrument_node="">certificate will be given if documentation is provided that such enterprises' animal facilities are</span><br data-dcnode-id="1990"><span data-dcnode-id="1989" instrument_node="">appropriate, clean, and hygienic and that they will not be utilized for, nor will they cause pain or</span><br data-dcnode-id="1988"><span data-dcnode-id="1987" instrument_node="">suffering to the animals.</span></p><p data-dcnode-id="1980"><span data-dcnode-id="1985" instrument_node="">According to the United States Census of Agriculture, 98,989,244 cattle and calves were used in</span><br data-dcnode-id="1984"><span data-dcnode-id="1983" instrument_node="">agriculture in 1997, along with 61,206,236 hogs and pigs, 7,821,885 sheep and lambs, and nearly 7</span><br data-dcnode-id="1982"><span data-dcnode-id="1981" instrument_node="">billion birds utilized for egg and meat production.</span></p><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">SUPPORT</span></p><p data-dcnode-id="1966"><span data-dcnode-id="1977" instrument_node="">Cruelty, abuse, or neglect of animals should be reported. If you encounter animal mistreatment, report</span><br data-dcnode-id="1976"><span data-dcnode-id="1975" instrument_node="">it to the police or other authorities. Act quickly to prevent further atrocities. Legislation pertaining to</span><br data-dcnode-id="1974"><span data-dcnode-id="1973" instrument_node="">animal protection must be improved. Animal cruelty will be reduced as a result of stronger animal</span><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node="">welfare legislation and harsher penalties. Teach your children to be respectful of animals. Treat animals</span><br data-dcnode-id="1970"><span data-dcnode-id="1969" instrument_node="">with respect and set a good example. Demonstrate how to love and care for animals to children. Assist</span><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node="">them in becoming the next generation of animal rights advocates.</span></p><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">CONTACT INFORMATON</span></p><p data-dcnode-id="1950"><span data-dcnode-id="1963" instrument_node="">If you wish to report an emergency, this may not be the best way to ask for assistance because our</span><br data-dcnode-id="1962"><span data-dcnode-id="1961" instrument_node="">response times are slow. You are their best chance for survival. Please try to get the animal out of</span><br data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node="">harm’s way immediately.</span><br data-dcnode-id="1958"><span data-dcnode-id="1957" instrument_node="">If you’re unable to do so, please ask the barangay or other concerned citizens for help. You may also try</span><br data-dcnode-id="1956"><span data-dcnode-id="1955" instrument_node="">calling our landline at 02-475-1688; however, we can’t guarantee that a volunteer is available to help.</span><br data-dcnode-id="1954"><span data-dcnode-id="1953" instrument_node="">We also can’t guarantee that there is space at the shelter to admit another animal, unless you are willing</span><br data-dcnode-id="1952"><span data-dcnode-id="1951" instrument_node="">to foster. https://paws.org.ph/contact/</span></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="1929"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="1930"><h2 class="title" data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="1931"><li class="link_wrapper" data-dcnode-id="1944"><a class="interest_link link" data-category_id="33979" data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Cruelty-To-Animals/explore"><span data-dcnode-id="1946" instrument_node="">Cruelty To Animals</span></a></li><li class="link_wrapper" data-dcnode-id="1941"><a class="interest_link link" data-category_id="33042" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Animal-Welfare/explore"><span data-dcnode-id="1943" instrument_node="">Animal Welfare</span></a></li><li class="link_wrapper" data-dcnode-id="1938"><a class="interest_link link" data-category_id="39011" data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Animal-Rights/explore"><span data-dcnode-id="1940" instrument_node="">Animal Rights</span></a></li><li class="link_wrapper" data-dcnode-id="1935"><a class="interest_link link" data-category_id="55538" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Animals-And-Humans/explore"><span data-dcnode-id="1937" instrument_
