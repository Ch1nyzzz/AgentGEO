</span></p><span data-dcnode-id="3514" instrument_node="">
</span><p class="card-text" data-dcnode-id="3510"><span data-dcnode-id="3513" instrument_node=""> Pattadakal is a tiny village, also known as Raktapura or Pattadakallu, houses a series of ten magnificent stone temples which date back to the 7th and 8th century. Out of these ten, nine are Hindu temples and one is a Jain temple. Lying close to the Badami and Aihole centres of Chalukya monuments, it is a protected site, managed by ASI (Archaeological Survey of India). </span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">These grand, imposing structures were inscribed as UNESCO World Heritage Site in 1987. All ten temples are majestic in their sheer size and detailed architecture, reflective of a blend of North Indian Nagara and South Indian Dravidian construction styles. Lying alongside the Malaprabha river, they have aptly earned the epithet “cradle of Indian temple architecture”. The friezes on temple walls depict stories from various Hindu scriptures and tales, such as Mahabharata, Ramayana, Bhagavata Purana, Panchatantra, and Kir't'rjun'ya. </span></p><span data-dcnode-id="3509" instrument_node="">
