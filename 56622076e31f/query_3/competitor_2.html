</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="5045" id="firstHeading"><span data-dcnode-id="5046" instrument_node="">Cultural heritage</span></h1><span data-dcnode-id="5044" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="711" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="720"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="5026" style="display:none"><span data-dcnode-id="5027" instrument_node="">Physical artifact or intangible attribute of a society inherited from past generations</span></div><span data-dcnode-id="5025" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4999"><div class="thumbinner" data-dcnode-id="5000" style="width:302px;"><a class="image" data-dcnode-id="5023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGiovanni_Paolo_Pannini_002.jpg"><img alt="" class="thumbimage" data-dcnode-id="5024" data-file-height="599" data-file-width="820" decoding="async" height="219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Giovanni_Paolo_Pannini_002.jpg/300px-Giovanni_Paolo_Pannini_002.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Giovanni_Paolo_Pannini_002.jpg/450px-Giovanni_Paolo_Pannini_002.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Giovanni_Paolo_Pannini_002.jpg/600px-Giovanni_Paolo_Pannini_002.jpg 2x" width="300"></a><span data-dcnode-id="5022" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5001"><div class="magnify" data-dcnode-id="5020"><a class="internal" data-dcnode-id="5021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGiovanni_Paolo_Pannini_002.jpg" title="Enlarge"></a></div><i data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">Roman ruins with a prophet</span></i><span data-dcnode-id="5017" instrument_node="">, by </span><a class="mw-redirect" data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Pannini" title="Giovanni Pannini"><span data-dcnode-id="5016" instrument_node="">Giovanni Pannini</span></a><span data-dcnode-id="5014" instrument_node="">, 1751. The artistic cultural heritage of the </span><a data-dcnode-id="5012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Empire" title="Roman Empire"><span data-dcnode-id="5013" instrument_node="">Roman Empire</span></a><span data-dcnode-id="5011" instrument_node=""> served as a foundation for later </span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_culture" title="Western culture"><span data-dcnode-id="5010" instrument_node="">Western culture</span></a><span data-dcnode-id="5008" instrument_node="">, particularly via the </span><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renaissance" title="Renaissance"><span data-dcnode-id="5007" instrument_node="">Renaissance</span></a><span data-dcnode-id="5005" instrument_node=""> and </span><a data-dcnode-id="5003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoclassicism" title="Neoclassicism"><span data-dcnode-id="5004" instrument_node="">Neoclassicism</span></a><span data-dcnode-id="5002" instrument_node=""> (as exemplified here).</span></div></div></div><span data-dcnode-id="4998" instrument_node="">
</span><p data-dcnode-id="4984"><b data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">Cultural heritage</span></b><span data-dcnode-id="4995" instrument_node=""> is the heritage of tangible and intangible </span><a data-dcnode-id="4993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heritage_asset" title="Heritage asset"><span data-dcnode-id="4994" instrument_node="">heritage assets</span></a><span data-dcnode-id="4992" instrument_node=""> of a group or </span><a data-dcnode-id="4990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Society" title="Society"><span data-dcnode-id="4991" instrument_node="">society</span></a><span data-dcnode-id="4989" instrument_node=""> that is inherited from past generations. Not all heritages of past generations are "heritage"; rather, heritage is a product of selection by society.</span><sup class="reference" data-dcnode-id="4986" id="cite_ref-Logan_1-0"><a data-dcnode-id="4987" href="#cite_note-Logan-1"><span data-dcnode-id="4988" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4985" instrument_node="">
</span></p><p data-dcnode-id="4956"><span data-dcnode-id="4983" instrument_node="">Cultural heritage includes </span><a data-dcnode-id="4981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_property" title="Cultural property"><span data-dcnode-id="4982" instrument_node="">tangible culture</span></a><span data-dcnode-id="4980" instrument_node=""> (such as buildings, </span><a class="mw-redirect" data-dcnode-id="4978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monuments" title="Monuments"><span data-dcnode-id="4979" instrument_node="">monuments</span></a><span data-dcnode-id="4977" instrument_node="">, landscapes, books, works of art, and artifacts), </span><a class="mw-redirect" data-dcnode-id="4975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intangible_heritage" title="Intangible heritage"><span data-dcnode-id="4976" instrument_node="">intangible culture</span></a><span data-dcnode-id="4974" instrument_node=""> (such as folklore, traditions, language, and knowledge), and </span><a data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_heritage" title="Natural heritage"><span data-dcnode-id="4973" instrument_node="">natural heritage</span></a><span data-dcnode-id="4971" instrument_node=""> (including culturally significant landscapes, and </span><a data-dcnode-id="4969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biodiversity" title="Biodiversity"><span data-dcnode-id="4970" instrument_node="">biodiversity</span></a><span data-dcnode-id="4968" instrument_node="">).</span><sup class="reference" data-dcnode-id="4965" id="cite_ref-repository.jmls.edu_2-0"><a data-dcnode-id="4966" href="#cite_note-repository.jmls.edu-2"><span data-dcnode-id="4967" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4964" instrument_node=""> The term is often used in connection with issues relating to the protection of </span><a data-dcnode-id="4962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigenous_intellectual_property" title="Indigenous intellectual property"><span data-dcnode-id="4963" instrument_node="">Indigenous intellectual property</span></a><span data-dcnode-id="4961" instrument_node="">.</span><sup class="reference" data-dcnode-id="4958" id="cite_ref-artslawinfo_3-0"><a data-dcnode-id="4959" href="#cite_note-artslawinfo-3"><span data-dcnode-id="4960" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4957" instrument_node="">
</span></p><p data-dcnode-id="4932"><span data-dcnode-id="4955" instrument_node="">The deliberate act of keeping cultural heritage from the present for the future is known as </span><a class="mw-redirect" data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservation_%28cultural_heritage%29" title="Conservation (cultural heritage)"><span data-dcnode-id="4954" instrument_node="">preservation</span></a><span data-dcnode-id="4952" instrument_node=""> (American English) or </span><a class="mw-redirect" data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservation_%28cultural_heritage%29" title="Conservation (cultural heritage)"><span data-dcnode-id="4951" instrument_node="">conservation</span></a><span data-dcnode-id="4949" instrument_node=""> (British English), which cultural and historical ethnic </span><a data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Museum" title="Museum"><span data-dcnode-id="4948" instrument_node="">museums</span></a><span data-dcnode-id="4946" instrument_node=""> and </span><a data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_center" title="Cultural center"><span data-dcnode-id="4945" instrument_node="">cultural centers</span></a><span data-dcnode-id="4943" instrument_node=""> promote, though these terms may have more specific or technical meanings in the same contexts in the other dialect. Preserved heritage has become an anchor of the global </span><a class="mw-redirect" data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tourism_industry" title="Tourism industry"><span data-dcnode-id="4942" instrument_node="">tourism industry</span></a><span data-dcnode-id="4940" instrument_node="">, a major contributor of </span><a class="mw-redirect" data-dcnode-id="4938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_value" title="Economic value"><span data-dcnode-id="4939" instrument_node="">economic value</span></a><span data-dcnode-id="4937" instrument_node=""> to local communities.</span><sup class="reference" data-dcnode-id="4934" id="cite_ref-Logan_1-1"><a data-dcnode-id="4935" href="#cite_note-Logan-1"><span data-dcnode-id="4936" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4933" instrument_node="">
</span></p><p data-dcnode-id="4899"><span data-dcnode-id="4931" instrument_node="">Legal protection of cultural property comprises a number of international agreements and national laws.
</span><a data-dcnode-id="4929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="4930" instrument_node="">United Nations</span></a><span data-dcnode-id="4928" instrument_node="">, </span><a data-dcnode-id="4926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="4927" instrument_node="">UNESCO</span></a><span data-dcnode-id="4925" instrument_node=""> and </span><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_Shield_International" title="Blue Shield International"><span data-dcnode-id="4924" instrument_node="">Blue Shield International</span></a><span data-dcnode-id="4922" instrument_node=""> deal with the protection of cultural heritage. This also applies to the integration of </span><a data-dcnode-id="4920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_peacekeeping" title="United Nations peacekeeping"><span data-dcnode-id="4921" instrument_node="">United Nations peacekeeping</span></a><span data-dcnode-id="4919" instrument_node="">.</span><sup class="reference" data-dcnode-id="4916" id="cite_ref-4"><a data-dcnode-id="4917" href="#cite_note-4"><span data-dcnode-id="4918" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4913" id="cite_ref-5"><a data-dcnode-id="4914" href="#cite_note-5"><span data-dcnode-id="4915" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="4910" id="cite_ref-6"><a data-dcnode-id="4911" href="#cite_note-6"><span data-dcnode-id="4912" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="4907" id="cite_ref-7"><a data-dcnode-id="4908" href="#cite_note-7"><span data-dcnode-id="4909" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="4904" id="cite_ref-8"><a data-dcnode-id="4905" href="#cite_note-8"><span data-dcnode-id="4906" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="4901" id="cite_ref-unifil.unmissions.org_9-0"><a data-dcnode-id="4902" href="#cite_note-unifil.unmissions.org-9"><span data-dcnode-id="4903" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4900" instrument_node="">

</span><h3 data-dcnode-id="4710"><span class="mw-headline" data-dcnode-id="4718" id="Cultural_property"><span data-dcnode-id="4719" instrument_node="">Cultural property</span></span><span class="mw-editsection" data-dcnode-id="4711"><span class="mw-editsection-bracket" data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">[</span></span><a data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D2" title="Edit section: Cultural property"><span data-dcnode-id="4715" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4709" instrument_node="">
</span><link data-dcnode-id="4708" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4704" role="note"><span data-dcnode-id="4707" instrument_node="">See also: </span><a data-dcnode-id="4705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Material_culture" title="Material culture"><span data-dcnode-id="4706" instrument_node="">Material culture</span></a></div><span data-dcnode-id="4703" instrument_node="">
</span><p data-dcnode-id="4692"><a data-dcnode-id="4701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_property" title="Cultural property"><span data-dcnode-id="4702" instrument_node="">Cultural property</span></a><span data-dcnode-id="4700" instrument_node=""> includes the physical, or "tangible" cultural heritage, such as artworks. These are generally split into two groups of movable and immovable heritage. Immovable heritage includes buildings (which themselves may include installed art such as organs, stained glass windows, and frescos), large industrial installations, residential projects or other historic places and </span><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monument" title="Monument"><span data-dcnode-id="4699" instrument_node="">monuments</span></a><span data-dcnode-id="4697" instrument_node="">. Moveable heritage includes books, documents, moveable artworks, machines, clothing, and other artifacts, that are considered worthy of preservation for the future. These include objects significant to the archaeology, architecture, science or technology of a specified culture.</span><sup class="reference" data-dcnode-id="4694" id="cite_ref-repository.jmls.edu_2-1"><a data-dcnode-id="4695" href="#cite_note-repository.jmls.edu-2"><span data-dcnode-id="4696" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4693" instrument_node="">

</span><li data-dcnode-id="4653"><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_preservation" title="Digital preservation"><span data-dcnode-id="4655" instrument_node="">Digital preservation</span></a></li></ul><span data-dcnode-id="4651" instrument_node="">
</span><h3 data-dcnode-id="4641"><span class="mw-headline" data-dcnode-id="4649" id="Intangible_culture"><span data-dcnode-id="4650" instrument_node="">Intangible culture</span></span><span class="mw-editsection" data-dcnode-id="4642"><span class="mw-editsection-bracket" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">[</span></span><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D3" title="Edit section: Intangible culture"><span data-dcnode-id="4646" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4640" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4626"><div class="thumbinner" data-dcnode-id="4627" style="width:222px;"><a class="image" data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnker_Grossvater_erz%25C3%25A4hlt_eine_Geschichte_1884.jpg"><img alt="" class="thumbimage" data-dcnode-id="4639" data-file-height="1105" data-file-width="1579" decoding="async" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/de/Anker_Grossvater_erz%25C3%25A4hlt_eine_Geschichte_1884.jpg/220px-Anker_Grossvater_erz%25C3%25A4hlt_eine_Geschichte_1884.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/de/Anker_Grossvater_erz%C3%A4hlt_eine_Geschichte_1884.jpg/330px-Anker_Grossvater_erz%C3%A4hlt_eine_Geschichte_1884.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/de/Anker_Grossvater_erz%C3%A4hlt_eine_Geschichte_1884.jpg/440px-Anker_Grossvater_erz%C3%A4hlt_eine_Geschichte_1884.jpg 2x" width="220"></a><span data-dcnode-id="4637" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4628"><div class="magnify" data-dcnode-id="4635"><a class="internal" data-dcnode-id="4636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnker_Grossvater_erz%25C3%25A4hlt_eine_Geschichte_1884.jpg" title="Enlarge"></a></div><i data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">The Grandfather tells a story</span></i><span data-dcnode-id="4632" instrument_node="">, by </span><a data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_Anker" title="Albert Anker"><span data-dcnode-id="4631" instrument_node="">Albert Anker</span></a><span data-dcnode-id="4629" instrument_node="">, ca. 1884.</span></div></div></div><span data-dcnode-id="4625" instrument_node="">
</span><link data-dcnode-id="4624" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4620" role="note"><span data-dcnode-id="4623" instrument_node="">Main article: </span><a data-dcnode-id="4621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intangible_cultural_heritage" title="Intangible cultural heritage"><span data-dcnode-id="4622" instrument_node="">Intangible cultural heritage</span></a></div><span data-dcnode-id="4619" instrument_node="">
</span><p data-dcnode-id="4591"><span data-dcnode-id="4618" instrument_node="">"Intangible cultural heritage" consists of non-physical aspects of a particular culture, more often maintained by social customs during a specific period in history. The concept includes the ways and means of behavior in a society, and the often formal rules for operating in a particular cultural climate. These include social values and </span><a data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tradition" title="Tradition"><span data-dcnode-id="4617" instrument_node="">traditions</span></a><span data-dcnode-id="4615" instrument_node="">, </span><a data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_%28norm%29" title="Convention (norm)"><span data-dcnode-id="4614" instrument_node="">customs</span></a><span data-dcnode-id="4612" instrument_node=""> and practices, </span><a class="mw-redirect" data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aesthetic" title="Aesthetic"><span data-dcnode-id="4611" instrument_node="">aesthetic</span></a><span data-dcnode-id="4609" instrument_node=""> and </span><a data-dcnode-id="4607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spirituality" title="Spirituality"><span data-dcnode-id="4608" instrument_node="">spiritual</span></a><span data-dcnode-id="4606" instrument_node=""> beliefs, </span><a class="mw-redirect" data-dcnode-id="4604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artistic_expression" title="Artistic expression"><span data-dcnode-id="4605" instrument_node="">artistic expression</span></a><span data-dcnode-id="4603" instrument_node="">, </span><a data-dcnode-id="4601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Language" title="Language"><span data-dcnode-id="4602" instrument_node="">language</span></a><span data-dcnode-id="4600" instrument_node=""> and other aspects of human activity. The significance of physical artifacts can be interpreted as an act against the backdrop of socioeconomic, political, ethnic, religious and philosophical values of a particular group of people. Naturally, intangible cultural heritage is more difficult to preserve than physical objects.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4593" style="white-space:nowrap;"><span data-dcnode-id="4599" instrument_node="">[</span><i data-dcnode-id="4595"><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4597" title="This claim needs references to reliable sources. (October 2014)"><span data-dcnode-id="4598" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4594" instrument_node="">]</span></sup><span data-dcnode-id="4592" instrument_node="">
</span></p><p data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">Aspects of the preservation and conservation of cultural intangibles include:
</span></p><span data-dcnode-id="4588" instrument_node="">
</span><ul data-dcnode-id="4576"><li data-dcnode-id="4585"><a data-dcnode-id="4586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folklore" title="Folklore"><span data-dcnode-id="4587" instrument_node="">folklore</span></a></li><span data-dcnode-id="4584" instrument_node="">
</span><li data-dcnode-id="4581"><a data-dcnode-id="4582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oral_history" title="Oral history"><span data-dcnode-id="4583" instrument_node="">oral history</span></a></li><span data-dcnode-id="4580" instrument_node="">
</span><li data-dcnode-id="4577"><a data-dcnode-id="4578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Language_preservation" title="Language preservation"><span data-dcnode-id="4579" instrument_node="">language preservation</span></a></li></ul><span data-dcnode-id="4575" instrument_node="">
</span><h3 data-dcnode-id="4565"><span class="mw-headline" data-dcnode-id="4573" id="Natural_heritage"><span data-dcnode-id="4574" instrument_node="">Natural heritage</span></span><span class="mw-editsection" data-dcnode-id="4566"><span class="mw-editsection-bracket" data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">[</span></span><a data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D4" title="Edit section: Natural heritage"><span data-dcnode-id="4570" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4567"><span data-dcnode-id="4568" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4564" instrument_node="">
</span><link data-dcnode-id="4563" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4559" role="note"><span data-dcnode-id="4562" instrument_node="">See also: </span><a data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservation_movement" title="Conservation movement"><span data-dcnode-id="4561" instrument_node="">Conservation movement</span></a></div><span data-dcnode-id="4558" instrument_node="">
</span><p data-dcnode-id="4535"><span data-dcnode-id="4557" instrument_node="">"</span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_heritage" title="Natural heritage"><span data-dcnode-id="4556" instrument_node="">Natural heritage</span></a><span data-dcnode-id="4554" instrument_node="">" is also an important part of a society's heritage, encompassing the </span><a class="mw-redirect" data-dcnode-id="4552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Countryside" title="Countryside"><span data-dcnode-id="4553" instrument_node="">countryside</span></a><span data-dcnode-id="4551" instrument_node=""> and natural environment, including </span><a class="mw-redirect" data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flora_%28plants%29" title="Flora (plants)"><span data-dcnode-id="4550" instrument_node="">flora</span></a><span data-dcnode-id="4548" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fauna_%28animals%29" title="Fauna (animals)"><span data-dcnode-id="4547" instrument_node="">fauna</span></a><span data-dcnode-id="4545" instrument_node="">, scientifically known as </span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biodiversity" title="Biodiversity"><span data-dcnode-id="4544" instrument_node="">biodiversity</span></a><span data-dcnode-id="4542" instrument_node="">, as well as geological elements (including mineralogical, geomorphological, paleontological, etc.), scientifically known as </span><a data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geodiversity" title="Geodiversity"><span data-dcnode-id="4541" instrument_node="">geodiversity</span></a><span data-dcnode-id="4539" instrument_node="">. These kind of heritage sites often serve as an important component in a country's </span><a class="mw-redirect" data-dcnode-id="4537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tourist_industry" title="Tourist industry"><span data-dcnode-id="4538" instrument_node="">tourist industry</span></a><span data-dcnode-id="4536" instrument_node="">, attracting many visitors from abroad as well as locally. Heritage can also include cultural landscapes (natural features that may have cultural attributes).
</span></p><p data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">Aspects of the preservation and conservation of natural heritage include:
</span></p><span data-dcnode-id="4532" instrument_node="">
</span><ul data-dcnode-id="4524"><li data-dcnode-id="4529"><a class="mw-redirect" data-dcnode-id="4530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rare_breed_%28agriculture%29" title="Rare breed (agriculture)"><span data-dcnode-id="4531" instrument_node="">Rare breeds conservation</span></a></li><span data-dcnode-id="4528" instrument_node="">
</span><li data-dcnode-id="4525"><a data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heirloom_plant" title="Heirloom plant"><span data-dcnode-id="4527" instrument_node="">Heirloom plants</span></a></li></ul><span data-dcnode-id="4523" instrument_node="">
</span><h2 data-dcnode-id="4513"><span class="mw-headline" data-dcnode-id="4521" id="Protection_of_cultural_heritage"><span data-dcnode-id="4522" instrument_node="">Protection of cultural heritage</span></span><span class="mw-editsection" data-dcnode-id="4514"><span class="mw-editsection-bracket" data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">[</span></span><a data-dcnode-id="4517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D5" title="Edit section: Protection of cultural heritage"><span data-dcnode-id="4518" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4512" instrument_node="">
</span><h3 data-dcnode-id="4502"><span class="mw-headline" data-dcnode-id="4510" id="History"><span data-dcnode-id="4511" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="4503"><span class="mw-editsection-bracket" data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">[</span></span><a data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D6" title="Edit section: History"><span data-dcnode-id="4507" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4501" instrument_node="">
</span><p data-dcnode-id="4473"><span data-dcnode-id="4500" instrument_node="">There have been examples of respect for the cultural assets of enemies since ancient times. The roots of today's legal situation for the precise protection of cultural heritage also lie in some of Austria's ruler </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maria_Theresa" title="Maria Theresa"><span data-dcnode-id="4499" instrument_node="">Maria Theresa</span></a><span data-dcnode-id="4497" instrument_node=""> (1717 - 1780) decided Regulations and the demands of the </span><a data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congress_of_Vienna" title="Congress of Vienna"><span data-dcnode-id="4496" instrument_node="">Congress of Vienna</span></a><span data-dcnode-id="4494" instrument_node=""> (1814/15) not to remove works of art from their place of origin in the war.</span><sup class="reference" data-dcnode-id="4491" id="cite_ref-10"><a data-dcnode-id="4492" href="#cite_note-10"><span data-dcnode-id="4493" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4490" instrument_node=""> The process continued at the end of the 19th century when, in 1874 (in Brussels), at least a draft international agreement on the laws and customs of war was agreed. 25 years later, in 1899, an international peace conference was held in the Netherlands on the initiative of Tsar </span><a data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicholas_II_of_Russia" title="Nicholas II of Russia"><span data-dcnode-id="4489" instrument_node="">Nicholas II of Russia</span></a><span data-dcnode-id="4487" instrument_node="">, with the aim of revising the declaration (which was never ratified) and adopting a convention. The </span><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hague_Conventions_of_1899_and_1907" title="Hague Conventions of 1899 and 1907"><span data-dcnode-id="4486" instrument_node="">Hague Conventions of 1899 and 1907</span></a><span data-dcnode-id="4484" instrument_node=""> also significantly advanced international law and laid down the principle of the immunity of cultural property. Three decades later, in 1935, the preamble to the Treaty on the Protection of Artistic and Scientific Institutions (</span><a data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roerich_Pact" title="Roerich Pact"><span data-dcnode-id="4483" instrument_node="">Roerich Pact</span></a><span data-dcnode-id="4481" instrument_node="">) was formulated. On the initiative of UNESCO, the </span><a data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hague_Convention_for_the_Protection_of_Cultural_Property_in_the_Event_of_Armed_Conflict" title="Hague Convention for the Protection of Cultural Property in the Event of Armed Conflict"><span data-dcnode-id="4480" instrument_node="">Hague Convention for the Protection of Cultural Property in the Event of Armed Conflict</span></a><span data-dcnode-id="4478" instrument_node=""> was signed in 1954.</span><sup class="reference" data-dcnode-id="4475" id="cite_ref-11"><a data-dcnode-id="4476" href="#cite_note-11"><span data-dcnode-id="4477" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4474" instrument_node="">
</span></p><p data-dcnode-id="4455"><span data-dcnode-id="4472" instrument_node="">Protection of cultural heritage or protection of cultural goods means all measures to protect cultural property against damage, destruction, theft, embezzlement or other loss. The term “monument protection” is also used for immovable cultural property. This relates in particular to the prevention of robbery digs at archaeological sites, the looting or destruction of cultural sites and the theft of works of art from churches and museums all over the world and basically measures regarding the conservation and general access to our common cultural heritage. Legal protection of cultural heritage comprises a number of international agreements and national laws, and these must also be implemented.</span><sup class="reference" data-dcnode-id="4469" id="cite_ref-12"><a data-dcnode-id="4470" href="#cite_note-12"><span data-dcnode-id="4471" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="4466" id="cite_ref-13"><a data-dcnode-id="4467" href="#cite_note-13"><span data-dcnode-id="4468" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4463" id="cite_ref-14"><a data-dcnode-id="4464" href="#cite_note-14"><span data-dcnode-id="4465" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="4460" id="cite_ref-15"><a data-dcnode-id="4461" href="#cite_note-15"><span data-dcnode-id="4462" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="4457" id="cite_ref-16"><a data-dcnode-id="4458" href="#cite_note-16"><span data-dcnode-id="4459" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4456" instrument_node="">
</span></p><p data-dcnode-id="4431"><span data-dcnode-id="4454" instrument_node="">There is a close partnership between the </span><a class="mw-redirect" data-dcnode-id="4452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN" title="UN"><span data-dcnode-id="4453" instrument_node="">UN</span></a><span data-dcnode-id="4451" instrument_node="">, </span><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_peacekeeping" title="United Nations peacekeeping"><span data-dcnode-id="4450" instrument_node="">United Nations peacekeeping</span></a><span data-dcnode-id="4448" instrument_node="">, </span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="4447" instrument_node="">UNESCO</span></a><span data-dcnode-id="4445" instrument_node="">, the </span><a data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Committee_of_the_Red_Cross" title="International Committee of the Red Cross"><span data-dcnode-id="4444" instrument_node="">International Committee of the Red Cross</span></a><span data-dcnode-id="4442" instrument_node=""> and </span><a data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_Shield_International" title="Blue Shield International"><span data-dcnode-id="4441" instrument_node="">Blue Shield International</span></a><span data-dcnode-id="4439" instrument_node="">.</span><sup class="reference" data-dcnode-id="4436" id="cite_ref-unifil.unmissions.org_9-1"><a data-dcnode-id="4437" href="#cite_note-unifil.unmissions.org-9"><span data-dcnode-id="4438" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="4433" id="cite_ref-17"><a data-dcnode-id="4434" href="#cite_note-17"><span data-dcnode-id="4435" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4432" instrument_node="">
</span></p><span data-dcnode-id="4430" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4416"><div class="thumbinner" data-dcnode-id="4417" style="width:222px;"><a class="image" data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlue_Shield_Fact_Finding_Mission_Libyen.jpg"><img alt="" class="thumbimage" data-dcnode-id="4429" data-file-height="2592" data-file-width="3456" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Blue_Shield_Fact_Finding_Mission_Libyen.jpg/220px-Blue_Shield_Fact_Finding_Mission_Libyen.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Blue_Shield_Fact_Finding_Mission_Libyen.jpg/330px-Blue_Shield_Fact_Finding_Mission_Libyen.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Blue_Shield_Fact_Finding_Mission_Libyen.jpg/440px-Blue_Shield_Fact_Finding_Mission_Libyen.jpg 2x" width="220"></a><span data-dcnode-id="4427" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4418"><div class="magnify" data-dcnode-id="4425"><a class="internal" data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABlue_Shield_Fact_Finding_Mission_Libyen.jpg" title="Enlarge"></a></div><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_von_Habsburg" title="Karl von Habsburg"><span data-dcnode-id="4424" instrument_node="">Karl von Habsburg</span></a><span data-dcnode-id="4422" instrument_node="">, on a </span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_Shield_International" title="Blue Shield International"><span data-dcnode-id="4421" instrument_node="">Blue Shield International</span></a><span data-dcnode-id="4419" instrument_node=""> fact-finding mission in Libya</span></div></div></div><span data-dcnode-id="4415" instrument_node="">
</span><p data-dcnode-id="4397"><span data-dcnode-id="4414" instrument_node="">The protection of the cultural heritage should also preserve the particularly sensitive cultural memory, the growing cultural diversity and the economic basis of a state, a municipality or a region. Whereby there is also a connection between cultural user disruption or cultural heritage and the cause of flight. But only through the fundamental cooperation, including the military units and the planning staff, with the locals can the protection of world heritage sites, archaeological finds, exhibits and archaeological sites from destruction, looting and robbery be implemented sustainably. The founding president of Blue Shield International </span><a data-dcnode-id="4412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_von_Habsburg" title="Karl von Habsburg"><span data-dcnode-id="4413" instrument_node="">Karl von Habsburg</span></a><span data-dcnode-id="4411" instrument_node=""> summed it up with the words: “Without the local community and without the local participants, that would be completely impossible”.</span><sup class="reference" data-dcnode-id="4408" id="cite_ref-18"><a data-dcnode-id="4409" href="#cite_note-18"><span data-dcnode-id="4410" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="4405" id="cite_ref-19"><a data-dcnode-id="4406" href="#cite_note-19"><span data-dcnode-id="4407" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="4402" id="cite_ref-20"><a data-dcnode-id="4403" href="#cite_note-20"><span data-dcnode-id="4404" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="4399" id="cite_ref-21"><a data-dcnode-id="4400" href="#cite_note-21"><span data-dcnode-id="4401" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4398" instrument_node="">
</span></p><span data-dcnode-id="4396" instrument_node="">
</span><h2 data-dcnode-id="4386"><span class="mw-headline" data-dcnode-id="4394" id="The_ethics_and_rationale_of_cultural_preservation"><span data-dcnode-id="4395" instrument_node="">The ethics and rationale of cultural preservation</span></span><span class="mw-editsection" data-dcnode-id="4387"><span class="mw-editsection-bracket" data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">[</span></span><a data-dcnode-id="4390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D7" title="Edit section: The ethics and rationale of cultural preservation"><span data-dcnode-id="4391" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4385" instrument_node="">
</span><p data-dcnode-id="4359"><span data-dcnode-id="4384" instrument_node="">Objects are a part of the study of human history because they provide a concrete basis for ideas, and can validate them. Their preservation demonstrates a recognition of the necessity of the past and of the things that tell its story.</span><sup class="reference" data-dcnode-id="4381" id="cite_ref-22"><a data-dcnode-id="4382" href="#cite_note-22"><span data-dcnode-id="4383" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4380" instrument_node=""> In </span><i data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">The Past is a Foreign Country</span></i><span data-dcnode-id="4377" instrument_node="">, </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Lowenthal" title="David Lowenthal"><span data-dcnode-id="4376" instrument_node="">David Lowenthal</span></a><span data-dcnode-id="4374" instrument_node=""> observes that preserved objects also validate </span><a data-dcnode-id="4372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Memory" title="Memory"><span data-dcnode-id="4373" instrument_node="">memories</span></a><span data-dcnode-id="4371" instrument_node="">. While </span><a class="mw-redirect" data-dcnode-id="4369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/3D_scanner" title="3D scanner"><span data-dcnode-id="4370" instrument_node="">digital acquisition techniques</span></a><span data-dcnode-id="4368" instrument_node=""> can provide a technological solution that is able to acquire the shape and the appearance of artifacts with an unprecedented precision</span><sup class="reference" data-dcnode-id="4365" id="cite_ref-23"><a data-dcnode-id="4366" href="#cite_note-23"><span data-dcnode-id="4367" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4364" instrument_node=""> in human history, the actuality of the object, as opposed to a reproduction, draws people in and gives them a literal way of touching the past. This, unfortunately, poses a danger as places and things are damaged by the hands of tourists, the light required to display them, and other risks of making an object known and available. The reality of this risk reinforces the fact that all artifacts are in a constant state of chemical transformation, so that what is considered to be preserved is actually changing – it is never as it once was.</span><sup class="reference" data-dcnode-id="4361" id="cite_ref-24"><a data-dcnode-id="4362" href="#cite_note-24"><span data-dcnode-id="4363" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4360" instrument_node=""> Similarly changing is the value each generation may place on the past and on the artifacts that link it to the past.
</span></p><span data-dcnode-id="4358" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4339"><div class="thumbinner" data-dcnode-id="4340" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="4354"><video class="thumbimage" data-dcnode-id="4357" data-durationhint="828" data-mwprovider="wikimediacommons" data-mwtitle="Responsible_development.webm" disabled="disabled" height="123" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Responsible_development.webm/220px--Responsible_development.webm.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AResponsible_development.webm" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="4356"></span></a></span><span data-dcnode-id="4353" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4341"><div class="magnify" data-dcnode-id="4351"><a class="internal" data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AResponsible_development.webm" title="Enlarge"></a></div><span data-dcnode-id="4350" instrument_node="">Kautilya Society in </span><a data-dcnode-id="4348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Varanasi" title="Varanasi"><span data-dcnode-id="4349" instrument_node="">Varanasi</span></a><span data-dcnode-id="4347" instrument_node=""> - When heritage protection becomes a fight for legality and participation </span><a class="image" data-dcnode-id="4345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFilm-Camera.png"><img alt="Film-Camera.png" data-dcnode-id="4346" data-file-height="392" data-file-width="646" decoding="async" height="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Film-Camera.png/17px-Film-Camera.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Film-Camera.png/26px-Film-Camera.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Film-Camera.png/34px-Film-Camera.png 2x" width="17"></a><span data-dcnode-id="4344" instrument_node=""> → </span><a class="external text" data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/playlist%3Flist%3DPL1EB2F3C06819828F" rel="nofollow"><span data-dcnode-id="4343" instrument_node="">"They harass me because I demand civil society participation to public policies and I contrast the misuse of privileges"</span></a></div></div></div><span data-dcnode-id="4338" instrument_node="">
</span><p data-dcnode-id="4325"><span data-dcnode-id="4337" instrument_node="">Classical civilizations, especially Indian, have attributed supreme importance to the preservation of tradition. Its central idea was that social institutions, scientific knowledge and technological applications need to use a "heritage" as a "resource".</span><sup class="reference" data-dcnode-id="4334" id="cite_ref-25"><a data-dcnode-id="4335" href="#cite_note-25"><span data-dcnode-id="4336" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4333" instrument_node=""> Using contemporary language, we could say that ancient Indians considered, as social resources, both economic assets (like natural resources and their exploitation structure) and factors promoting social integration (like institutions for the preservation of knowledge and for the maintenance of civil order).</span><sup class="reference" data-dcnode-id="4330" id="cite_ref-26"><a data-dcnode-id="4331" href="#cite_note-26"><span data-dcnode-id="4332" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4329" instrument_node=""> Ethics considered that what had been inherited should not be consumed, but should be handed over, possibly enriched, to successive generations. This was a moral imperative for all, except in the final life stage of </span><a data-dcnode-id="4327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sannyasa" title="Sannyasa"><span data-dcnode-id="4328" instrument_node="">sannyasa</span></a><span data-dcnode-id="4326" instrument_node="">.
</span></p><p data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">What one generation considers "cultural heritage" may be rejected by the next generation, only to be revived by a subsequent generation.
</span></p><span data-dcnode-id="4322" instrument_node="">
</span><h2 data-dcnode-id="4312"><span class="mw-headline" data-dcnode-id="4320" id="World_heritage_movement"><span data-dcnode-id="4321" instrument_node="">World heritage movement</span></span><span class="mw-editsection" data-dcnode-id="4313"><span class="mw-editsection-bracket" data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">[</span></span><a data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D8" title="Edit section: World heritage movement"><span data-dcnode-id="4317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4311" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4299"><div class="thumbinner" data-dcnode-id="4300" style="width:177px;"><a class="image" data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APlaque_Carthage_Unesco.JPG"><img alt="" class="thumbimage" data-dcnode-id="4310" data-file-height="1024" data-file-width="768" decoding="async" height="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Plaque_Carthage_Unesco.JPG/175px-Plaque_Carthage_Unesco.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Plaque_Carthage_Unesco.JPG/263px-Plaque_Carthage_Unesco.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Plaque_Carthage_Unesco.JPG/350px-Plaque_Carthage_Unesco.JPG 2x" width="175"></a><span data-dcnode-id="4308" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4301"><div class="magnify" data-dcnode-id="4306"><a class="internal" data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APlaque_Carthage_Unesco.JPG" title="Enlarge"></a></div><span data-dcnode-id="4305" instrument_node="">Plaque stating the designation of </span><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carthage" title="Carthage"><span data-dcnode-id="4304" instrument_node="">Carthage</span></a><span data-dcnode-id="4302" instrument_node=""> as a World Heritage Site.</span></div></div></div><span data-dcnode-id="4298" instrument_node="">
</span><p data-dcnode-id="4290"><span data-dcnode-id="4297" instrument_node="">Significant was the Convention Concerning the Protection of World Cultural and Natural Heritage that was adopted by the General Conference of </span><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="4296" instrument_node="">UNESCO</span></a><span data-dcnode-id="4294" instrument_node=""> in 1972. As of 2011, there are 936 </span><a class="mw-redirect" data-dcnode-id="4292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Heritage_Sites" title="World Heritage Sites"><span data-dcnode-id="4293" instrument_node="">World Heritage Sites</span></a><span data-dcnode-id="4291" instrument_node="">: 725 cultural, 183 natural, and 28 mixed properties, in 153 countries. Each of these sites is considered important to the international community.
</span></p><p data-dcnode-id="4278"><span data-dcnode-id="4289" instrument_node="">The underwater cultural heritage is protected by the </span><a data-dcnode-id="4287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO_Convention_on_the_Protection_of_the_Underwater_Cultural_Heritage" title="UNESCO Convention on the Protection of the Underwater Cultural Heritage"><span data-dcnode-id="4288" instrument_node="">UNESCO Convention on the Protection of the Underwater Cultural Heritage</span></a><span data-dcnode-id="4286" instrument_node="">. This convention is a legal instrument helping states parties to improve the protection of their underwater cultural heritage.</span><sup class="reference" data-dcnode-id="4283" id="cite_ref-27"><a data-dcnode-id="4284" href="#cite_note-27"><span data-dcnode-id="4285" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="4280" id="cite_ref-28"><a data-dcnode-id="4281" href="#cite_note-28"><span data-dcnode-id="4282" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4279" instrument_node="">
</span></p><p data-dcnode-id="4267"><span data-dcnode-id="4277" instrument_node="">In addition, UNESCO has begun designating </span><a data-dcnode-id="4275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Masterpieces_of_the_Oral_and_Intangible_Heritage_of_Humanity" title="Masterpieces of the Oral and Intangible Heritage of Humanity"><span data-dcnode-id="4276" instrument_node="">masterpieces of the Oral and Intangible Heritage of Humanity</span></a><span data-dcnode-id="4274" instrument_node="">. The </span><a data-dcnode-id="4272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committee_on_Economic%2C_Social_and_Cultural_Rights" title="Committee on Economic, Social and Cultural Rights"><span data-dcnode-id="4273" instrument_node="">Committee on Economic, Social and Cultural Rights</span></a><span data-dcnode-id="4271" instrument_node=""> sitting as part of the </span><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Economic_and_Social_Council" title="United Nations Economic and Social Council"><span data-dcnode-id="4270" instrument_node="">United Nations Economic and Social Council</span></a><span data-dcnode-id="4268" instrument_node=""> with article 15 of its Covenant had sought to instill the principles under which cultural heritage is protected as part of a basic human right.
</span></p><p data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">Key international documents and bodies include:
</span></p><span data-dcnode-id="4264" instrument_node="">
</span><ul data-dcnode-id="4223"><li data-dcnode-id="4260"><a class="mw-redirect" data-dcnode-id="4262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athens_Charter_%28Preservation%29" title="Athens Charter (Preservation)"><span data-dcnode-id="4263" instrument_node="">Athens Charter</span></a><span data-dcnode-id="4261" instrument_node="">, 1931</span></li><span data-dcnode-id="4259" instrument_node="">
</span><li data-dcnode-id="4255"><a data-dcnode-id="4257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roerich_Pact" title="Roerich Pact"><span data-dcnode-id="4258" instrument_node="">Roerich Pact</span></a><span data-dcnode-id="4256" instrument_node="">, 1935</span></li><span data-dcnode-id="4254" instrument_node="">
</span><li data-dcnode-id="4250"><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hague_Convention_for_the_Protection_of_Cultural_Property_in_the_Event_of_Armed_Conflict" title="Hague Convention for the Protection of Cultural Property in the Event of Armed Conflict"><span data-dcnode-id="4253" instrument_node="">Hague Convention for the Protection of Cultural Property in the Event of Armed Conflict</span></a><span data-dcnode-id="4251" instrument_node="">, 1954, (with a definition of cultural heritage item adopted by some national law)</span></li><span data-dcnode-id="4249" instrument_node="">
</span><li data-dcnode-id="4245"><a data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venice_Charter" title="Venice Charter"><span data-dcnode-id="4248" instrument_node="">Venice Charter</span></a><span data-dcnode-id="4246" instrument_node="">, 1964</span></li><span data-dcnode-id="4244" instrument_node="">
</span><li data-dcnode-id="4240"><a data-dcnode-id="4242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barcelona_Charter" title="Barcelona Charter"><span data-dcnode-id="4243" instrument_node="">Barcelona Charter</span></a><span data-dcnode-id="4241" instrument_node="">, 2002 (regarding maritime vessel preservation)</span></li><span data-dcnode-id="4239" instrument_node="">
</span><li data-dcnode-id="4236"><a class="mw-redirect" data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ICOMOS" title="ICOMOS"><span data-dcnode-id="4238" instrument_node="">ICOMOS</span></a></li><span data-dcnode-id="4235" instrument_node="">
</span><li data-dcnode-id="4228"><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_Shield_International" title="Blue Shield International"><span data-dcnode-id="4234" instrument_node="">The Blue Shield</span></a><span data-dcnode-id="4232" instrument_node="">, a network of committees of dedicated individuals across the world that is “</span><i data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">committed to the protection of the world’s cultural property, and is concerned with the protection of cultural and natural heritage, tangible and intangible, in the event of armed conflict, natural- or human-made disaster</span></i><span data-dcnode-id="4229" instrument_node="">.”</span></li><span data-dcnode-id="4227" instrument_node="">
</span><li data-dcnode-id="4224"><a data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Institute_for_Conservation" title="International Institute for Conservation"><span data-dcnode-id="4226" instrument_node="">International Institute for Conservation</span></a></li></ul><span data-dcnode-id="4222" instrument_node="">
</span><p data-dcnode-id="4216"><span data-dcnode-id="4221" instrument_node="">The U.S. Government Accountability Office issued a report describing some of the United States’ cultural property protection efforts.</span><sup class="reference" data-dcnode-id="4218" id="cite_ref-29"><a data-dcnode-id="4219" href="#cite_note-29"><span data-dcnode-id="4220" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4217" instrument_node="">

</span><h2 data-dcnode-id="3706"><span class="mw-headline" data-dcnode-id="3714" id="Cultural_heritage_digital_preservation"><span data-dcnode-id="3715" instrument_node="">Cultural heritage digital preservation</span></span><span class="mw-editsection" data-dcnode-id="3707"><span class="mw-editsection-bracket" data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">[</span></span><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_heritage%26action%3Dedit%26section%3D12" title="Edit section: Cultural heritage digital preservation"><span data-dcnode-id="3711" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3705" instrument_node="">
</span><p data-dcnode-id="3694"><span data-dcnode-id="3704" instrument_node="">Ancient archaeological artefacts and archaeological sites are naturally prone to damage due to their age and environmental conditions. Also, there have been tragic occurrences of unexpected man-made disasters, sych as in the cases of a fire that took place in the 200 years old </span><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Museum_of_Brazil" title="National Museum of Brazil"><span data-dcnode-id="3703" instrument_node="">National Museum of Brazil</span></a><span data-dcnode-id="3701" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO_world_heritage" title="UNESCO world heritage"><span data-dcnode-id="3700" instrument_node="">UNESCO World Heritage</span></a><span data-dcnode-id="3698" instrument_node=""> Site of the </span><a class="mw-redirect" data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Notre_Dame_cathedral" title="Notre Dame cathedral"><span data-dcnode-id="3697" instrument_node="">Notre Dame Cathedral</span></a><span data-dcnode-id="3695" instrument_node=""> in France.
</span></p><p data-dcnode-id="3672"><span data-dcnode-id="3693" instrument_node="">Therefore, there is a growing need to digitize cultural heritage in order to preserve them in the face of potential calamities such as climate change, natural disaster, poor policy or inadequate infrastructure. For example, the </span><a data-dcnode-id="3691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Library_of_Congress" title="Library of Congress"><span data-dcnode-id="3692" instrument_node="">Library of Congress</span></a><span data-dcnode-id="3690" instrument_node=""> has started to digitize its collections in a special program called the </span><a data-dcnode-id="3688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Digital_Library_Program" title="National Digital Library Program"><span data-dcnode-id="3689" instrument_node="">National Digital Library Program</span></a><span data-dcnode-id="3687" instrument_node="">.</span><sup class="reference" data-dcnode-id="3684" id="cite_ref-32"><a data-dcnode-id="3685" href="#cite_note-32"><span data-dcnode-id="3686" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3683" instrument_node=""> The </span><a data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smithsonian_Institution" title="Smithsonian Institution"><span data-dcnode-id="3682" instrument_node="">Smithsonian</span></a><span data-dcnode-id="3680" instrument_node=""> has also been actively digitizing its collection with the release of the “Smithsonian X 3D Explorer,” allowing anyone to engage with the digitized versions of the museum’s millions of artifacts, of which only two percent are on display.</span><sup class="reference" data-dcnode-id="3677" id="cite_ref-33"><a data-dcnode-id="3678" href="#cite_note-33"><span data-dcnode-id="3679" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="3674" id="cite_ref-34"><a data-dcnode-id="3675" href="#cite_note-34"><span data-dcnode-id="3676" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3673" instrument_node="">
</span></p><p data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">3D Scanning devices have become a practical reality in the field of heritage preservation. 3D scanners can produce a high-precision digital reference model that not only digitizes condition but also provides a 3D virtual model for replication. The high cost and relative complexity of 3D scanning technologies have made it quite impractical for many heritage institutions in the past, but this is changing, as technology advances and its relative costs are decreasing to reach a level where even mobile based scanning applications can be used to create a virtual museum.
</span></p><span data-dcnode-id="3669" instrument_node="">
