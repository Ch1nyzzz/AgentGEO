</span><article class="post-116769 post type-post status-publish format-standard has-post-thumbnail hentry category-lifestyle tag-warwickboar tag-boar tag-boar-lifestyle tag-boarlifestyle tag-clothes tag-cultural-appropriation tag-cultural-appropriation-in-fashion tag-culture tag-fashion tag-fashion-and-culture tag-garments tag-history tag-japan tag-japanese tag-japanese-culture tag-japanese-history tag-kardashian tag-kardashian-west tag-kim tag-kim-kardashian tag-kim-kardashian-west tag-kimono tag-kimono-intimates tag-life tag-life-at-university tag-lifestyle-at-university tag-student tag-student-life tag-student-lifestyle tag-students tag-students-life tag-students-lifestyle tag-the-boar tag-the-boar-lifestyle tag-uni-students tag-university tag-university-life tag-university-lifestyle tag-university-of-warwick tag-university-students tag-warwick tag-warwick-boar tag-warwick-lifestyle tag-warwick-uni-lifestyle tag-warwick-university tag-warwick-university-lifestyle" data-dcnode-id="154" id="post-116769"><span data-dcnode-id="427" instrument_node="">
</span><span data-dcnode-id="425" instrument_node="">
</span><h1 data-dcnode-id="420"><span data-dcnode-id="424" instrument_node="">
</span><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theboar.org/2019/07/cultural-significance-kimono/" title="The cultural significance of the kimono"><span data-dcnode-id="423" instrument_node="">The cultural significance of the kimono</span></a><span data-dcnode-id="421" instrument_node="">
</span></h1><span data-dcnode-id="419" instrument_node="">
</span><span data-dcnode-id="417" instrument_node="">
</span><div class="row" data-dcnode-id="157"><span data-dcnode-id="416" instrument_node="">
</span><div class="two columns boar-single-meta" data-dcnode-id="392"><span data-dcnode-id="415" instrument_node="">
</span><span data-dcnode-id="413" instrument_node="">
</span><div class="author" data-dcnode-id="408"><span data-dcnode-id="412" instrument_node="">By </span><strong data-dcnode-id="409"><a class="text-lifestyle" data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theboar.org/author/lucy-martin/"><span data-dcnode-id="411" instrument_node="">Lucy Martin</span></a></strong></div><strong data-dcnode-id="393"><a class="text-lifestyle" data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theboar.org/author/lucy-martin/"><span data-dcnode-id="407" instrument_node="">
</span><div class="time" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Jul. 9, 2019</span></div></a><div class="cats text-lifestyle" data-dcnode-id="399"><a class="text-lifestyle" data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theboar.org/author/lucy-martin/"><span data-dcnode-id="403" instrument_node="">Posted in </span></a><a alt="View all posts in Lifestyle" data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theboar.org/lifestyle/"><span data-dcnode-id="401" instrument_node="">Lifestyle</span></a></div><span data-dcnode-id="398" instrument_node="">
</span><div class="" data-dcnode-id="397"></div><span data-dcnode-id="396" instrument_node="">
</span><span data-dcnode-id="394" instrument_node="">
</span></strong></div><strong data-dcnode-id="158"><span data-dcnode-id="391" instrument_node="">
</span><div class="eight columns" data-dcnode-id="162"><span data-dcnode-id="390" instrument_node="">
</span><div class="boar-single-content" data-dcnode-id="221"><p data-dcnode-id="382"><span data-dcnode-id="387" style="color: #ff00ff;"><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">I</span></strong></span><span data-dcnode-id="386" instrument_node="">n an age of heightened cultural awareness and diversity, celebrities and </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theboar.org/2019/02/is-the-fashion-industry-racist/"><span data-dcnode-id="385" instrument_node="">fashion brands</span></a><span data-dcnode-id="383" instrument_node=""> are frequently called out for their seeming ignorance regarding other cultures’ history. This is not the first time Kim Kardashian West has been criticised for cultural appropriation.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="380" instrument_node="">Kardashian West has most recently come under fire for naming her new shapewear brand&nbsp;</span><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-asia-48767678"><span data-dcnode-id="379" instrument_node="">‘Kimono Intimates.’</span></a><span data-dcnode-id="377" instrument_node=""> In particular, criticism has come from Japan. Kim’s product, in the eyes of some, strips the cultural history from the traditional Japanese garment. It is clear that Kim’s shapewear looks nothing like the traditional kimono.</span></p><span data-dcnode-id="375" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="370" id="attachment_116757" style="width: 260px"><img alt="Kimono/ Image: Wikimedia Commons" aria-describedby="caption-attachment-116757" class="wp-image-116757 size-medium" data-dcnode-id="374" height="316" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theboar.org/wp-content/uploads/2019/07/Kimono-3-3-min-compressor-250x316.jpg&amp;raw" srcset="https://theboar.org/wp-content/uploads/2019/07/Kimono-3-3-min-compressor-250x316.jpg 250w, https://theboar.org/wp-content/uploads/2019/07/Kimono-3-3-min-compressor-120x152.jpg 120w, https://theboar.org/wp-content/uploads/2019/07/Kimono-3-3-min-compressor.jpg 499w" width="250"><p class="wp-caption-text" data-dcnode-id="371" id="caption-attachment-116757"><strong data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Image: Wikimedia Commons</span></strong></p></div><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="361" style="text-align: left;"><span data-dcnode-id="368" instrument_node="">Kardashian West has </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/lifeandstyle/2019/jul/01/our-traditional-garment-is-not-spandex-kim-kardashian-west-renames-brand-amid-outcry"><span data-dcnode-id="367" instrument_node="">since announced</span></a><span data-dcnode-id="365" instrument_node=""> that she will be renaming her product, but the debate brought to light an understanding of the rich history of the kimono that should not be forgotten. Yuko Kata of the BBC </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-asia-48767678"><span data-dcnode-id="364" instrument_node="">argues</span></a><span data-dcnode-id="362" instrument_node=""> that for many Japanese people, wearing a kimono is a way of maintaining connections with history, culture and Japanese identity when so many aspects of lifestyle in Japan have become westernised.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358" style="text-align: left;"><span data-dcnode-id="359" instrument_node="">Fashion has a powerful way of reflecting a culture and history. Exploring the history of the kimono provides a window into the history of Japan.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355" style="text-align: left;"><span data-dcnode-id="356" instrument_node="">Researching the way that the kimono has been worn throughout the ages has given me a fascinating insight into how Japanese society has changed and how its traditional dress has reflected this.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="342" style="text-align: left;"><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vam.ac.uk/articles/kimono"><span data-dcnode-id="353" instrument_node="">The Victoria and Albert Museum explains</span></a><span data-dcnode-id="351" instrument_node=""> how the term ‘kimono’, meaning ‘the thing worn’, was first adopted in the mid-19</span><sup data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">th</span></sup><span data-dcnode-id="348" instrument_node=""> century, but the garment was the “principal item of dress” in Japan as early as the 16</span><sup data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">th</span></sup><span data-dcnode-id="345" instrument_node=""> century. And clothing that is similar in style to the kimono has been </span><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theculturetrip.com/asia/japan/articles/a-brief-history-of-the-japanese-kimono/"><span data-dcnode-id="344" instrument_node="">worn in Japan since the Heian Period (794-1185).</span></a></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339" style="text-align: left;"><span data-dcnode-id="340" instrument_node="">It was traditionally worn by commoners or as an undergarment of the aristocracy. The kimono is a powerful symbol of Japanese heritage, but it is a simple garment in terms of its structure. It is worn wrapped left side over right and secured with a sash called an ‘obi.’ The wrap style allows for easy movement which is important in a culture where many activities are performed seated on the floor.</span></p><span data-dcnode-id="338" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="333" id="attachment_116764" style="width: 379px"><img alt="Kimono/ Image: Wikimedia Commons" aria-describedby="caption-attachment-116764" class="wp-image-116764" data-dcnode-id="337" height="242" sizes="(max-width: 369px) 100vw, 369px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theboar.org/wp-content/uploads/2019/07/Kimono-on-floor-min-compressor-250x164.jpg&amp;raw" srcset="https://theboar.org/wp-content/uploads/2019/07/Kimono-on-floor-min-compressor-250x164.jpg 250w, https://theboar.org/wp-content/uploads/2019/07/Kimono-on-floor-min-compressor-768x502.jpg 768w, https://theboar.org/wp-content/uploads/2019/07/Kimono-on-floor-min-compressor-700x458.jpg 700w, https://theboar.org/wp-content/uploads/2019/07/Kimono-on-floor-min-compressor-120x79.jpg 120w, https://theboar.org/wp-content/uploads/2019/07/Kimono-on-floor-min-compressor.jpg 1400w" width="369"><p class="wp-caption-text" data-dcnode-id="334" id="caption-attachment-116764"><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Image: Wikimedia Commons</span></strong></p></div><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="327" style="text-align: left;"><span data-dcnode-id="331" instrument_node="">The pattern on the surface of the garment is significant. Social status and personal identity are expressed through colour and decoration. Kimonos worn by younger women, which were the most richly decorated, are the ones that </span><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vam.ac.uk/page/k/kimono/%3Ffbclid%3DIwAR1R0acZrMEWnP_4zUm1ZjYpGjFbwuBuz9sOTrJiXgAhgqTPKv6L2YA2eCo"><span data-dcnode-id="330" instrument_node="">survive in collections</span></a><span data-dcnode-id="328" instrument_node="">. The images depicted on the materials have complex meanings. One popular image is that of a crane, which is a symbol of longevity and good fortune. Colours also have metaphorical meanings, and dyes embody the spirit of the plants from which they are extracted. The most popular colour is red, which signifies youthful glamour and allure.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="318" style="text-align: left;"><span data-dcnode-id="325" instrument_node="">During the Edo period of Japanese history from the 17</span><sup data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">th</span></sup><span data-dcnode-id="322" instrument_node="">-19</span><sup data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">th</span></sup><span data-dcnode-id="319" instrument_node=""> centuries, which saw political stability and economic growth, the kimono developed as a way of expressing wealth. There were fashion contests between the wives of wealthy merchants.</span></p><span data-dcnode-id="317" instrument_node="">
</span><div class="blockquote-container" data-dcnode-id="311"><div class="blockquote-bg" data-dcnode-id="316"></div><blockquote data-dcnode-id="312"><p data-dcnode-id="313"><span data-dcnode-id="314" style="color: #ff00ff;"><span data-dcnode-id="315" instrument_node="">The history of the kimono is clearly as vibrant and fascinating as the designs on the traditional garment</span></span></p></blockquote></div><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308" style="text-align: left;"><span data-dcnode-id="309" instrument_node="">The Meji period, just before the First World War, saw Japan’s military government undertaking a process of Westernisation. The Japanese elite adopted western dress, which was seen as the most ‘civilised’, and kimonos were exported to Europe, where there was a craze with everything Japanese.</span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="302" style="text-align: left;"><span data-dcnode-id="306" instrument_node="">The interwar Taisho period saw industrial development and the popularity of Western clothing. And with this, kimono styles became more </span><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vam.ac.uk/content/articles/h/a-history-of-the-kimono/"><span data-dcnode-id="305" instrument_node="">vibrant</span></a><span data-dcnode-id="303" instrument_node="">.</span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299" style="text-align: left;"><span data-dcnode-id="300" instrument_node="">In the 1930s, graphic imagery began to be used on garments to represent nationalism and modernity. According to the V&amp;A, young boys’ kimonos often featured planes, trains and cars, symbolic of Japanese modernity. This is illustrated within the below image of a boy’s kimono from 1933, which has strong nationalist symbolism:</span></p><span data-dcnode-id="298" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="293" id="attachment_116765" style="width: 260px"><img alt="Kimono/ Image: Wikimedia Commons" aria-describedby="caption-attachment-116765" class="wp-image-116765 size-medium" data-dcnode-id="297" height="309" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theboar.org/wp-content/uploads/2019/07/Kimono-4-min-compressor-250x309.jpg&amp;raw" srcset="https://theboar.org/wp-content/uploads/2019/07/Kimono-4-min-compressor-250x309.jpg 250w, https://theboar.org/wp-content/uploads/2019/07/Kimono-4-min-compressor-120x148.jpg 120w, https://theboar.org/wp-content/uploads/2019/07/Kimono-4-min-compressor.jpg 634w" width="250"><p class="wp-caption-text" data-dcnode-id="294" id="caption-attachment-116765"><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Image: Wikimedia Commons</span></strong></p></div><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290" style="text-align: left;"><span data-dcnode-id="291" instrument_node="">Today, the older generation continue to wear the kimono, as do those working in traditional restaurants. Mostly, kimonos are saved for special occasions. As a result of this, the kimono’s symbolic significance has strengthened.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="287" style="text-align: left;"><span data-dcnode-id="288" instrument_node="">After the Second World War, the kimono was less popular as it became entwined with Japan’s feudal past and a symbol of women’s oppression, but there has been a resurgence in its popularity wordwide.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284" style="text-align: left;"><span data-dcnode-id="285" instrument_node="">Second-hand kimonos are becoming popular with young people across the world. The kimono inspires fashion on websites such as Boohoo.com and PrettyLittleThing.</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="278" style="text-align: left;"><span data-dcnode-id="282" instrument_node="">Kardashian West said in a statement to the New York Times that the name was a </span><a data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/06/27/fashion/kim-kardashian-west-kimono-cultural-appropriation.html"><span data-dcnode-id="281" instrument_node="">“nod to the beauty and the detail”</span></a><span data-dcnode-id="279" instrument_node=""> that goes into making kimono. She said that the brand has inclusivity and diversity at its core. People were not convinced – #KimOhNo was trending on Twitter.</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275" style="text-align: left;"><span data-dcnode-id="276" instrument_node="">The history of the kimono is clearly as vibrant and fascinating as the designs on the traditional garment. It is important that celebrities are aware of their cultural impact and inspirations and Kardashian West has undoubtedly done this by ignoring the history and significance of the kimono in choosing the name for her brand.</span></p><span data-dcnode-id="274" instrument_node="">
</span><div class="rpbt_shortcode" data-dcnode-id="222"><span data-dcnode-id="273" instrument_node="">
