</span><section class="scene" data-dcnode-id="503" data-scene-id="place0" id="0" title="Introduction"><span data-dcnode-id="551" instrument_node="">
</span><div class="title title-photo" data-dcnode-id="521" style="background-image: linear-gradient(0deg, rgba(70, 70, 70, 0.6), rgba(70, 70, 70, 0.425)), url(img/figure18.jpg);"><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Siddi Life and Their Sense of Belonging in Karnataka, India</span></h2><span data-dcnode-id="547" instrument_node="">
</span><div class="container-fluid" data-dcnode-id="528"><span data-dcnode-id="546" instrument_node="">
</span><div class="author row" data-dcnode-id="530"><span data-dcnode-id="545" instrument_node="">
</span><div class="col-lg-3 col-md-3 col-sm-4 col-xs-5" data-dcnode-id="541"><span data-dcnode-id="544" instrument_node="">
</span><img class="author-photo" data-dcnode-id="543" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.focusongeography.org/publications/articles/siddi/img/sreddy.jpg&amp;raw"><span data-dcnode-id="542" instrument_node="">
</span></div><span data-dcnode-id="540" instrument_node="">
</span><div class="col-lg-9 col-md-9 col-sm-8 col-xs-7 author-info" data-dcnode-id="532"><span data-dcnode-id="539" instrument_node="">
</span><span class="name" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Sumanth Reddy</span></span><span data-dcnode-id="536" instrument_node="">, </span><span class="organization" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Department of
                                    History &amp; Government, Bowie State University </span></span><span data-dcnode-id="533" instrument_node="">
</span></div><span data-dcnode-id="531" instrument_node="">
</span></div><span data-dcnode-id="529" instrument_node="">
</span></div><span data-dcnode-id="527" instrument_node="">
</span><div class="citation author-info" data-dcnode-id="523"><span class="citation-label" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">DOI:</span></span><span data-dcnode-id="524" instrument_node=""> 10.21690/foge/2016.64.1f
                    </span></div><span data-dcnode-id="522" instrument_node="">
</span></div><span data-dcnode-id="520" instrument_node="">
</span><h3 data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Introduction</span></h3><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="516" instrument_node="">When Indians think about Africans in India, most likely will think of African students who are
                    pursuing college degrees in the country, or the African actors/dancers who regularly play small
                    roles in Bollywood, India’s Hindi-language film industry. The majority of people likely will not
                    think of the Siddis, who are Indians of African descent who have lived in India for several
                    centuries. The Siddis are descendants of the Bantu populations of East and Central Africa and are
                    also sometimes referred to as Habshis or Abyssinians. It is thought that they were transported to
                    India in several waves starting as early as the 7th century, first by the Arab merchants/traders,
                    and later by the Portuguese and British, starting in the 16th century. Many Siddis likely were
                    brought to India as slaves, but some were also taken as servants, blacksmiths, carpenters, and
                    masons. Some probably arrived as independent merchants/traders, or soldiers in Arab armies. A few
                    Siddis even held high-ranking positions as kings, military commanders, foot soldiers, and
                    administrators in small regions of India between the 14th and 16th centuries. However, most
                    contemporary Siddis likely are the descendants of slaves or domestic servants. Between 40,000 and
                    50,000 Siddis currently live in India. The population resides primarily in five states (Goa,
                    Gujarat, Karnataka, Maharashtra, and Telangana), but the majority (90%) reside in </span><a aria-describedby="tooltip155196" class="location" data-dcnode-id="513" data-layer-id="state-gujarat" data-original-title="" title=""><span data-dcnode-id="515" instrument_node="">Gujarat</span><span class="fa fa-hand-pointer-o helper-icon element-animation1" data-dcnode-id="514"></span></a><span data-dcnode-id="512" instrument_node=""> or
                    </span><a class="location" data-dcnode-id="510" data-layer-id="state-karnataka"><span data-dcnode-id="511" instrument_node="">Karnataka</span></a><span data-dcnode-id="509" instrument_node="">.
                </span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Historically, circumstances and discrimination led many Siddis to practice social and self-exclusion
                    by remaining in the forests that they escaped to after they were freed from bondage. Today, some
                    Siddis still live in physical isolation in forests while other Siddis have physically integrated in
                    towns and villages. However, they have all attained socio-cultural integration within the larger
                    Indian society, despite maintaining their physical African traits. In a society where people from
                    lower-caste populations or who have darker complexions are commonly discriminated against, Siddis
                    face significant challenges. They belong to a lower caste, have a darker skin color and have
                    different physical traits. Supported by a small research grant from my university, I embarked on a
                    one-month summer fieldwork trip to the state of Karnataka to better understand Siddi life and to
                    examine the concept of place attachment as described by the Siddi people. During my fieldwork, I was
                    able to stay with several Siddi families and observe their daily lives, which provided valuable
                    insight into the economic and socio-cultural landscapes. In addition, I was able to see the impact
                    geographical distance played in creating these landscapes.
                </span></p><span data-dcnode-id="504" instrument_node="">
</span></section><span data-dcnode-id="502" instrument_node="">
</span><section class="scene" data-dcnode-id="476" data-scene-id="place1" id="1" title="Murudeshwar"><span data-dcnode-id="501" instrument_node="">
</span><div class="figure figure-wide" data-dcnode-id="496" style="background-image:url(img/figure1.jpg);"><div class="helper" data-dcnode-id="497"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="500"></span><span class="helper-text" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="495" instrument_node="">
</span><div class="caption" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Figure 1: The coastal town of Murudeshwar, which overlooks the Arabian Sea on one
                    side and the mountainous Western Ghats on the other.
                </span></div><span data-dcnode-id="492" instrument_node="">
</span><div class="figure" data-dcnode-id="487" style="background-image:url(img/figure2.jpg);"><div class="helper" data-dcnode-id="488"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="491"></span><span class="helper-text" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="486" instrument_node="">
</span><div class="caption" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Figure 2: The Murudeshwar Temple complex includes an imposing 10-story Lord Shiva
                    Statue and 20-story gopura (temple entrance).
                </span></div><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="482" instrument_node="">The British outlawed slavery in the early to mid-1800s, coinciding with the end of the Goa
                    Inquisition. Fearing recapture, many of the Siddis who were residing in port towns along the Western
                    coast of India escaped deep into the forests of the Uttara Kannada District in the state of
                    Karnataka. The coastal </span><a class="location" data-dcnode-id="480" data-layer-id="feature-0"><span data-dcnode-id="481" instrument_node="">town of Murudeshwar</span></a><span data-dcnode-id="479" instrument_node="">, which overlooks the Arabian Sea
                    on one side and the mountainous Western Ghats on the other, was one such gateway into the dense
                    forests of Uttara Kannada District. Today, Murudeshwar primarily depends on fishing and tourism to
                    support its economy. The Murudeshwar Temple complex includes an imposing 10-story Lord Shiva Statue
                    and 20-story gopura (temple entrance) and is the most popular attraction in town.
                </span></p><span data-dcnode-id="477" instrument_node="">
</span></section><span data-dcnode-id="475" instrument_node="">
</span><section class="scene" data-dcnode-id="459" data-scene-id="place2" id="2" title="Murudeshwar"><span data-dcnode-id="474" instrument_node="">
</span><div class="center" data-dcnode-id="467"><span data-dcnode-id="473" instrument_node="">
</span><video class="figure-video" controls="" data-dcnode-id="469"><span data-dcnode-id="472" instrument_node="">
</span><source data-dcnode-id="471" src="http://www.focusongeography.org/publications/articles/siddi/img/figure3.mp4" type="video/mp4"><span data-dcnode-id="470" instrument_node="">
                        Your browser does not support the video tag.
                    </span></video><span data-dcnode-id="468" instrument_node="">
</span></div><span data-dcnode-id="466" instrument_node="">
</span><div class="caption" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Figure 3: Time-lapse video that shows blind curves on wet roads in Uttar Kannada
                    District.
                </span></div><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Traveling during the Monsoon season in Uttar Kannada District via public
                    transportation, from the coast into the forests over the Western Ghats Mountains, can be a
                    hair-raising experience. This time-lapse video shows blind curves on wet roads, and the
                    overtaking of vehicles traveling in the opposite direction. Most Siddis live in the Uttar Kannada
                    District, which is part of the Malnad region. Malnad or Malenadu means land of hills and/or land of
                    rain as the area contains the hilly Western Ghats and also receives some of the highest rates of
                    annual rainfall in India. </span></p><span data-dcnode-id="460" instrument_node="">
</span></section><span data-dcnode-id="458" instrument_node="">
</span><section class="scene" data-dcnode-id="441" data-scene-id="place3" id="3" title="Yellapur"><span data-dcnode-id="457" instrument_node="">
</span><div class="figure" data-dcnode-id="452" style="background-image:url(img/figure4.jpg);"><div class="helper" data-dcnode-id="453"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="456"></span><span class="helper-text" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="451" instrument_node="">
</span><div class="caption" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Figure 4: Mother and daughter at the weekly market in town of Yellapur.
                </span></div><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">My first encounter with the Siddis after my guide picked me up in the </span><a class="location" data-dcnode-id="445" data-layer-id="feature-2"><span data-dcnode-id="446" instrument_node="">town of Yellapur</span></a><span data-dcnode-id="444" instrument_node=""> was with a mother and daughter who had come into town to shop for vegetables and other
                    household goods at the weekly market. They were dressed in traditional Indian clothes, and I was
                    surprised by how easily and naturally they mingled with other locals. Although Siddis primarily
                    speak Konkani (local dialect), they spoke Kannada—the official language of the state—fluently. They
                    were surprised to learn that I could also converse in Kannada, after my guide introduced me as a
                    researcher from the United States who had come to Karnataka to learn about the Siddis. Although many
                    Indians might view the Siddi people as being out of place because of their physical African
                    characteristics, I realized at that moment that I might have looked out of place to them. Only a few
                    Siddi families live within and on the outskirts of Yellapur. Most families live in small villages,
                    isolated groups, or individual households in the forests farther away and must travel to the larger
                    towns once a week on specific market days to purchase groceries. </span></p><span data-dcnode-id="442" instrument_node="">
</span></section><span data-dcnode-id="440" instrument_node="">
</span><section class="scene" data-dcnode-id="381" data-scene-id="place4" id="4" title="Hullaramane"><span data-dcnode-id="439" instrument_node="">
</span><div class="figure" data-dcnode-id="434" style="background-image:url(img/figure5.jpg);"><div class="helper" data-dcnode-id="435"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="438"></span><span class="helper-text" data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="433" instrument_node="">
</span><div class="caption" data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">Figure 5: </span><a class="location" data-dcnode-id="430" data-layer-id="feature-3"><span data-dcnode-id="431" instrument_node="">Rice paddy fields in Hullaramane</span></a><span data-dcnode-id="429" instrument_node="">
</span></div><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">The majority of Siddi men work as farmers or day laborers. Here, men in a Hindu Siddi family are seen
                    tending to their rice paddy fields in Hullaramane. They explained to me
                    that two of the men were brothers, and that they worked these fields together with their sons. They
                    believed that their ancestors had been on the land for approximately 120 years. The family owned the
                    land and were proud of their self-reliance. The family elder spoke fondly of his grandparents and
                    parents who regularly conveyed to him the importance of owning their land and being self-sufficient.
                    Siddi farmers who are Hindu often own their land. Their ancestors may have settled on unoccupied
                    land, or the land may have been acquired from the property owners (usually upper-caste Brahmins) in
                    return for cultivating it. Many Hindu Siddis depend on farming as their primary economic activity
                    and owing farmland is not uncommon. By comparison, the Christian and Muslim Siddis in Karnataka do
                    not own agricultural land to the same extent.</span></p><span data-dcnode-id="424" instrument_node="">
</span><div class="figure" data-dcnode-id="419" style="background-image:url(img/figure6.jpg);"><div class="helper" data-dcnode-id="420"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="423"></span><span class="helper-text" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="418" instrument_node="">
</span><div class="caption" data-dcnode-id="413"><span data-dcnode-id="417" instrument_node="">Figure 6: </span><a class="location" data-dcnode-id="415" data-layer-id="feature-4"><span data-dcnode-id="416" instrument_node="">Palm trees near Hullaramane</span></a><span data-dcnode-id="414" instrument_node="">
</span></div><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Areca nuts, also known as betel nuts, are a profitable crop that many Siddi farmers grow in addition
                    to rice. These thin, tall, palm trees near Hullaramane bear berries that
                    encapsulate the nuts, which are harvested and used in many Indian traditions. Areca /betel nuts
                    wrapped in a betel leaf are known to be a low-level psychoactive drug that plays an important role
                    in various South and Southeast Asian cultures. It is a common practice in rural communities to chew
                    on the nut-leaf blend, especially among older people. The blend is also a traditional after-meal
                    mouth refresher known as paan that is widely used across India. India is the world’s largest
                    producer of Areca nuts and the state of Karnataka produces two-thirds of it. The Uttar Kannada
                    District is the most productive area in the state, and so cultivation of the Areca nut is a central
                    aspect of Siddi life.
                </span></p><span data-dcnode-id="409" instrument_node="">
</span><div class="figure" data-dcnode-id="404" style="background-image:url(img/figure7.jpg);"><div class="helper" data-dcnode-id="405"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="408"></span><span class="helper-text" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="403" instrument_node="">
</span><div class="caption" data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">Figure 7: </span><a class="location" data-dcnode-id="400" data-layer-id="feature-5"><span data-dcnode-id="401" instrument_node="">Small temple near Hullaramane</span></a><span data-dcnode-id="399" instrument_node="">
</span></div><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">The Siddis in Karnataka identify as Hindus (40%), Christians (30%), or Muslims (30%). Religious
                    affiliation can often be traced back to the specific experience encountered by each group after
                    escaping from the western port towns and cities. Religion is important to Siddis, but it has never
                    been a source of division among the people. Siddis believe that they are all descendants of the same
                    ancestors, regardless of their religion, and many Siddis are related to each other within a few
                    generations of lineage. Consequently, Siddis from different religions practice mutual respect,
                    maintain a strong sense of community, and shared identity. This unity has become especially
                    important over the last decade in the wake of the ascension to political power of the Hindu
                    nationalist Bharatiya Janata Party (BJP) and the religion-based, divisive politics of Prime Minister
                    Narendra Modi. Here, a saffron-colored BJP flag is flown on a small temple near Hullaramane to show support for the BJP government. These flags are ubiquitous in
                    India and represent an ‘in-your-face’ approach to the nationalist Hindu sentiment. Although these
                    flags instill a sense of pride in many Hindus, they could be antagonizing to other religious groups.
                </span></p><span data-dcnode-id="394" instrument_node="">
</span><div class="figure" data-dcnode-id="389" style="background-image:url(img/figure8.jpg);"><div class="helper" data-dcnode-id="390"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="393"></span><span class="helper-text" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="388" instrument_node="">
</span><div class="caption" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Figure 8: A Siddi family
                </span></div><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Not all Siddi families own large plots of land. This family owned a small plot of land, but they
                    worked for a Brahmin/upper-caste family as their main source of income. Most of the Siddis who
                    adopted Hinduism did so as a result of their indenturement to Brahmin and upper-caste Hindu
                    families. As the Siddis worked, they voluntarily or were forced to adopt the religion of the
                    property owners as their own. Adopting the religion of their property owners, however, did not
                    prevent the Siddis from being discriminated against. Several Hindu Siddi families recalled how,
                    after finishing a meal provided by the upper-caste Hindu family, they had to clean the area that
                    they had sat on while eating. They had to wash the areas with cow dung and water, which is
                    considered to be a cleansing agent in Hindu society. The Siddis considered this practice to be
                    demeaning and believed that it meant that the upper-caste Hindus did not look at them as equals.
                    Although this practice is less common today due the rights that they have attained over the past
                    decade, it was common until recently.</span></p><span data-dcnode-id="382" instrument_node="">
</span></section><span data-dcnode-id="380" instrument_node="">
</span><section class="scene" data-dcnode-id="337" data-scene-id="place5" id="5" title="Tavarkatta"><span data-dcnode-id="379" instrument_node="">
</span><div class="figure" data-dcnode-id="374" style="background-image:url(img/figure9.jpg);"><div class="helper" data-dcnode-id="375"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="378"></span><span class="helper-text" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="373" instrument_node="">
</span><div class="caption" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Figure 9: A Siddi family near the village of Tavarkatta.
                </span></div><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="369" instrument_node="">The Siddis struggled and fought to attain Scheduled Tribe status, which was granted to them in 2003
                    by the Indian government. This change in status meant that many Siddis were eligible to receive
                    certain government benefits that helped to empower and uplift the communities. The last Siddi
                    communities to be granted Scheduled Tribe status obtained that status only recently, in 2019.
                    However, although Siddis have access to more benefits today than in the past, widespread poverty
                    persists. This family near the </span><a class="location" data-dcnode-id="367" data-layer-id="feature-6"><span data-dcnode-id="368" instrument_node="">village of Tavarkatta</span></a><span data-dcnode-id="366" instrument_node=""> owns some land
                    around their home that is used for subsistence farming. To make ends meet, some Siddis who work on
                    small patches of land that they do not necessarily own legally also work as day laborers in the
                    surrounding area. Some also travel to larger towns to become seasonal migrant workers.</span></p><span data-dcnode-id="364" instrument_node="">
</span><div class="figure" data-dcnode-id="359" style="background-image:url(img/figure10.jpg);"><div class="helper" data-dcnode-id="360"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="363"></span><span class="helper-text" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="358" instrument_node="">
</span><div class="caption" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Figure 10: Youngsters try to catch catfish near the village of Tavarkatta.</span></div><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Incessant rain is common during the monsoons. A local pond in the area overflowed after a night
                    of
                    torrential rain, allowing the fish in the pond to swim across the flooded area. Here, youngsters
                    from a Siddi family near the village of Tavarkatta try to catch
                    catfish
                    to supplement their farming activities. In addition, Siddis collect wild berries and mushrooms,
                    and/or hunt small deer, rabbits, and wild boars.</span></p><span data-dcnode-id="352" instrument_node="">
</span><div class="center" data-dcnode-id="345"><span data-dcnode-id="351" instrument_node="">
</span><video class="figure-video" controls="" data-dcnode-id="347"><span data-dcnode-id="350" instrument_node="">
</span><source data-dcnode-id="349" src="http://www.focusongeography.org/publications/articles/siddi/img/figure11.mp4" type="video/mp4"><span data-dcnode-id="348" instrument_node="">
                        Your browser does not support the video tag.
                    </span></video><span data-dcnode-id="346" instrument_node="">
</span></div><span data-dcnode-id="344" instrument_node="">
</span><div class="caption" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Figure 11: This video shows the father of a Siddi family near the
                    village of Tavarkatta gathering the catch to sell, exchange, or
                    consume as food.
                </span></div><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">This catfish is known as Chigur in the local dialect, and it is an important source of protein
                    for many people in the area during the monsoon season. </span></p><span data-dcnode-id="338" instrument_node="">
</span></section><span data-dcnode-id="336" instrument_node="">
</span><section class="scene" data-dcnode-id="295" data-scene-id="place6" id="6" title="Isolated communities"><span data-dcnode-id="335" instrument_node="">
</span><div class="figure" data-dcnode-id="330" style="background-image:url(img/figure12.png);"><div class="helper" data-dcnode-id="331"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="334"></span><span class="helper-text" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="329" instrument_node="">
</span><div class="caption" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Figure 12: Rough paths through the forest that connect small, isolated communities.
                </span></div><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Because many Siddi farmers live in small, isolated communities, they must often walk for an hour
                    or more to catch a bus into town. Many families described the challenges associated with sending
                    their children to school in town, which involve long walks on rough paths through the forest.
                    These paths were forged over generations by Siddi families that lived in isolation but remained
                    in intermittent contact with the outside world. My guide told me that some Siddi families still
                    lived in isolation, deep in the forest. The Uttar Kannada District (14.6°N 74.7°E), where most
                    of the Siddis live, is located along the Western Ghats Mountains in the Malnad (land of rain)
                    region. The monsoon rains in this region can make the smaller roads and forest paths difficult
                    to traverse. Commonly, the forest paths become impassable and, as a result, self-sufficient
                    Siddi families often remain in the forests to wait out the monsoons.</span></p><span data-dcnode-id="323" instrument_node="">
</span><div class="figure figure-wide" data-dcnode-id="318" style="background-image:url(img/figure13.jpg);"><div class="helper" data-dcnode-id="319"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="322"></span><span class="helper-text" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="317" instrument_node="">
</span><div class="caption" data-dcnode-id="312"><span data-dcnode-id="316" instrument_node="">Figure 13: </span><a class="location" data-dcnode-id="314" data-layer-id="feature-7"><span data-dcnode-id="315" instrument_node="">The Magod waterfall</span></a><span data-dcnode-id="313" instrument_node=""> is a pristine and
                    jaw-dropping sight.</span></div><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">During the monsoon season, the rain inundates the River Bedti in the mountainous Western Ghats, which
                    drops more than 600 feet into the gorge below and eventually empties into the Arabian Sea. The
                    Uttara Kannada District has many beautiful waterfalls due to its topography and the heavy rainfall
                    it receives. </span></p><span data-dcnode-id="308" instrument_node="">
</span><div class="figure" data-dcnode-id="303" style="background-image:url(img/figure14.jpg);"><div class="helper" data-dcnode-id="304"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="307"></span><span class="helper-text" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="302" instrument_node="">
</span><div class="caption" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Figure 14: The monsoon rains provide a muddy pool for
                    water buffalo to relax and cool off in the afternoon heat. </span></div><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node=""> Some Siddi families depend on cows and buffaloes for their milk. These animals are an important part of
                rural life in India.</span></p><span data-dcnode-id="296" instrument_node="">
</span></section><span data-dcnode-id="294" instrument_node="">
</span><section class="scene" data-dcnode-id="263" data-scene-id="place7" id="7" title="Isolated communities (2)"><span data-dcnode-id="293" instrument_node="">
</span><div class="center" data-dcnode-id="286"><span data-dcnode-id="292" instrument_node="">
</span><video class="figure-video" controls="" data-dcnode-id="288"><span data-dcnode-id="291" instrument_node="">
</span><source data-dcnode-id="290" src="http://www.focusongeography.org/publications/articles/siddi/img/figure15.mp4" type="video/mp4"><span data-dcnode-id="289" instrument_node="">
                        Your browser does not support the video tag.
                    </span></video><span data-dcnode-id="287" instrument_node="">
</span></div><span data-dcnode-id="285" instrument_node="">
</span><div class="caption" data-dcnode-id="280"><span data-dcnode-id="284" instrument_node="">Figure 15: This hyper-lapse video shows cows returning to </span><a class="location" data-dcnode-id="282" data-layer-id="feature-8"><span data-dcnode-id="283" instrument_node="">Tattigere
                    village</span></a><span data-dcnode-id="281" instrument_node=""> in the evening after a day of grazing in the surrounding
                    grasslands.</span></div><span data-dcnode-id="279" instrument_node="">
</span><div class="figure" data-dcnode-id="274" style="background-image:url(img/figure16.jpg);"><div class="helper" data-dcnode-id="275"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="278"></span><span class="helper-text" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="273" instrument_node="">
</span><div class="caption" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Figure 16: Young adults in this small Muslim Siddi settlement near Halligadde
                    village</span></div><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="269" instrument_node="">Because most Siddis live in isolation, many Siddi children must travel a long distance every day to
                    attend school. Even if a Siddi village has a school, it is commonly just for younger children. Older
                    Siddi children often end up going to boarding schools in larger towns if they can get assistance
                    from the government. Even if an opportunity exists for Siddi children who live near larger towns to
                    go to school, many face racial and caste discrimination from non-Siddi students and the teachers. As
                    a result, the dropout rates for Siddi children are high. Unfortunately, many Siddi children do not
                    have the resources to continue their education beyond primary or elementary school. These children
                    end up working on family farms or taking low-paying jobs to support their families. Young adults in
                    this small Muslim Siddi settlement near </span><a class="location" data-dcnode-id="267" data-layer-id="feature-9"><span data-dcnode-id="268" instrument_node="">Halligadde village</span></a><span data-dcnode-id="266" instrument_node=""> work in menial
                    jobs in the surrounding area because they see no other prospect for the future.</span></p><span data-dcnode-id="264" instrument_node="">
</span></section><span data-dcnode-id="262" instrument_node="">
</span><section class="scene" data-dcnode-id="245" data-scene-id="place8" id="8" title="Gadagera"><span data-dcnode-id="261" instrument_node="">
</span><div class="figure figure-wide" data-dcnode-id="256" style="background-image:url(img/figure17.jpg);"><div class="helper" data-dcnode-id="257"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="260"></span><span class="helper-text" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="255" instrument_node="">
</span><div class="caption" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Figure 17: Boarding school near Gadagera village</span></div><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="251" instrument_node="">Non-governmental organizations (NGOs) and charitable individuals have assisted the Siddis somewhat in
                    obtaining a formal education. An Austrian couple funds this boarding school near </span><a class="location" data-dcnode-id="249" data-layer-id="feature-10"><span data-dcnode-id="250" instrument_node="">Gadagera village</span></a><span data-dcnode-id="248" instrument_node=""> for children between grades 1 and 4. The couple has set up a charitable
                    fund so that the money raised goes directly to the school, without passing through an intermediary.
                    The 85 children who live and attend school here come from the surrounding villages and are fortunate
                    to have access to an all-expenses-paid primary school education.</span></p><span data-dcnode-id="246" instrument_node="">
</span></section><span data-dcnode-id="244" instrument_node="">
</span><section class="scene" data-dcnode-id="215" data-scene-id="place8a" id="8a" title="Yellapur"><span data-dcnode-id="243" instrument_node="">
</span><div class="figure" data-dcnode-id="238" style="background-image:url(img/figure18.jpg);"><div class="helper" data-dcnode-id="239"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="242"></span><span class="helper-text" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="237" instrument_node="">
</span><div class="caption" data-dcnode-id="232"><span data-dcnode-id="236" instrument_node="">Figure 18: A Siddi couple on the outskirts of </span><a class="location" data-dcnode-id="234" data-layer-id="feature-2"><span data-dcnode-id="235" instrument_node="">Yellapur town</span></a><span data-dcnode-id="233" instrument_node=""> sit in front of their small roadside shop, where they sell coffee/tea, snacks, fruit,
                    and other essentials to travelers. This couple stated that they did not own land and that the shop
                    was their only means of income.</span></div><span data-dcnode-id="231" instrument_node="">
</span><div class="figure" data-dcnode-id="226" style="background-image:url(img/figure19.jpg);"><div class="helper" data-dcnode-id="227"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="230"></span><span class="helper-text" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="225" instrument_node="">
</span><div class="caption" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Figure 19: Work in relentless rain</span></div><span data-dcnode-id="222" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="221" instrument_node="">Many Siddi men who do not own or work on farmland generally work as day laborers in labor-intensive
                    jobs. As we were driving through the </span><a class="location" data-dcnode-id="219" data-layer-id="feature-11"><span data-dcnode-id="220" instrument_node="">village of Idgundi</span></a><span data-dcnode-id="218" instrument_node="">, we came across
                    these men who were busy filling in a gully with mud to stop rainwater from overflowing into the
                    road. The relentless rain, common in this region, did not pose a deterrent to them as they toiled.
                    Most Siddis do not stray far from the homes or villages that they are familiar with. Due to their
                    history, Siddis feel a strong connection to the forests and places they were raised in. The few who
                    venture beyond their homeland in search of jobs face discrimination and struggle. Many Siddis told
                    me during my fieldwork that they felt most comfortable staying within a 50- to 100-km radius of
                    their homes, because the Siddis and non-Siddis in these areas tend to be familiar with one another.
                    However, if a Siddi ventures beyond that radius in search of work in a larger town and city, he/she
                    is often considered to be an outsider or foreigner. Most non-Siddi Indians who live further than 50-
                    to 100-km from the Siddi homelands are not familiar with Siddis or their history. These Indians
                    automatically assume that any person with Black African physical traits is a recent African
                    immigrant. It has been well documented that African immigrants, primarily students who have come to
                    India to pursue college education, face extreme discrimination. African immigrants in India are
                    commonly stereotyped as drug dealers, gang members, commercial sex workers, or members of other
                    nefarious trades. Thus, societal challenges prevent most Siddis from comfortably venturing beyond a
                    certain distance from their homeland. </span></p><span data-dcnode-id="216" instrument_node="">
</span></section><span data-dcnode-id="214" instrument_node="">
</span><section class="scene" data-dcnode-id="182" data-scene-id="place9" id="9" title="Wada and Mainalli"><span data-dcnode-id="213" instrument_node="">
</span><div class="figure figure-large" data-dcnode-id="208" style="background-image:url(img/figure20.jpg);"><div class="helper" data-dcnode-id="209"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="212"></span><span class="helper-text" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="207" instrument_node="">
</span><div class="caption" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Figure 20: Siddi boy on top of a water tank in an attempt to receive better
                    cell phone reception</span></div><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="199"><span data-dcnode-id="203" instrument_node="">Although most Siddis live in isolated areas, small villages, or at the edge of larger towns, modern
                    technologies, specifically smartphones, have a universal presence. My guide explained to me that it
                    was common for teenage Siddi boys to climb on top of a water tank in an attempt to receive better
                    cell phone reception. This is a common social activity in the evenings for many teenagers. Here, a
                    teenager is enjoying better cell phone reception on top of a water tank located at the edge of the
                    village of </span><a class="location" data-dcnode-id="201" data-layer-id="feature-12"><span data-dcnode-id="202" instrument_node="">Wada</span></a><span data-dcnode-id="200" instrument_node="">.</span></p><span data-dcnode-id="198" instrument_node="">
</span><div class="figure" data-dcnode-id="193" style="background-image:url(img/figure21.jpg);"><div class="helper" data-dcnode-id="194"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="197"></span><span class="helper-text" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="192" instrument_node="">
</span><div class="caption" data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Figure 21: Several teenagers in village of Mainalli</span></div><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="188" instrument_node="">Siddis initially received some national attention in the 1980s for their athletic abilities. The
                    Sports Authority of India thought that their African genetic heritage and natural athletic abilities
                    might mean more medals won for India at international sporting events. Siddi children were selected
                    for this purpose and trained for participation in world competitions. The few Siddis that succeeded
                    in sports at the national level also attained well-paying, stable, government jobs. However, the
                    program was cut after a few years and attempts to revive it have been unsuccessful. In the </span><a class="location" data-dcnode-id="186" data-layer-id="feature-13"><span data-dcnode-id="187" instrument_node="">village
                    of Mainalli</span></a><span data-dcnode-id="185" instrument_node="">, made up of mostly Christian Siddis, several teenagers shared
                    with me that they aspired to play sports or act in Bollywood movies, which they viewed as their
                    ‘ticket to success.’
                </span></p><span data-dcnode-id="183" instrument_node="">
</span></section><span data-dcnode-id="181" instrument_node="">
</span><section class="scene" data-dcnode-id="105" data-scene-id="place10" id="10" title="Religion"><span data-dcnode-id="180" instrument_node="">
</span><div class="figure" data-dcnode-id="175" style="background-image:url(img/figure22.jpg);"><div class="helper" data-dcnode-id="176"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="179"></span><span class="helper-text" data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="174" instrument_node="">
</span><div class="caption" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Figure 22: Christian church in Gadagera village</span></div><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="166"><span data-dcnode-id="170" instrument_node="">It is rare to find Hindu, Christian, and Muslim Siddis living in the same village or area. Generally,
                    Hindus tend to live in more dispersed and isolated areas because they own farmland. By contrast,
                    Christians and Muslims live in compact Siddi villages, or in larger villages that are also home to
                    non-Siddi Hindu populations. </span><a class="location" data-dcnode-id="168" data-layer-id="feature-10"><span data-dcnode-id="169" instrument_node="">Gadagera</span></a><span data-dcnode-id="167" instrument_node=""> is a small, Christian Siddi village
                    that has its own church and a weekly Sunday service. Most Christian Siddis are Catholic and were
                    probably converted/baptized to Christianity after being brought to India by the Portuguese. The
                    greater Catholic Church sends non-Siddi priests into the smaller villages to conduct Sunday
                    services. Christian Siddi communities often have better educational outcomes due to the involvement
                    and financial support of church groups, which have set up schools and other facilities. </span></p><span data-dcnode-id="165" instrument_node="">
</span><div class="figure" data-dcnode-id="160" style="background-image:url(img/figure23.jpg);"><div class="helper" data-dcnode-id="161"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="164"></span><span class="helper-text" data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="159" instrument_node="">
</span><div class="caption" data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Figure 23: Muslim family in Bhurunaki village</span></div><span data-dcnode-id="156" instrument_node="">
</span><p data-dcnode-id="151"><span data-dcnode-id="155" instrument_node="">Hindu and Christian Siddi people occasionally practice intermarriage with each other, but rarely
                    practice interracial marriage with non-Siddis. However, Muslim Siddis commonly marry non-Siddi
                    Muslims. Muslim Siddis are conversant in Kannada and Konkani (the two most common languages for
                    Siddis). However, they primarily speak Urdu, which is the language spoken by most Muslims in India.
                    </span><a class="location" data-dcnode-id="153" data-layer-id="feature-14"><span data-dcnode-id="154" instrument_node="">The village of Bhurunaki</span></a><span data-dcnode-id="152" instrument_node=""> is predominantly a Hindu village but it has a
                    small population of Muslim Siddis. Here, a non-Siddi Muslim man has two wives—one of which is Siddi
                    and the other is not. Unlike Hindu or Christian Siddi families, who tend to live in their own
                    communities, Muslim Siddi families live in larger, predominantly Hindu villages. Discrimination
                    against Muslim Siddis is common when the group is small in proportion compared to the overall
                    population of the Hindu village.</span></p><span data-dcnode-id="150" instrument_node="">
</span><div class="figure" data-dcnode-id="145" style="background-image:url(img/figure24.jpg);"><div class="helper" data-dcnode-id="146"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="149"></span><span class="helper-text" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="144" instrument_node="">
</span><div class="caption" data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">Figure 24: Muslim family in Tattigere village</span></div><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="137"><a class="location" data-dcnode-id="139" data-layer-id="feature-8"><span data-dcnode-id="140" instrument_node="">Tattigere village</span></a><span data-dcnode-id="138" instrument_node=""> is a larger Hindu village that is home to a significant
                    Muslim community. Several Siddis have interracial marriages in this community, and harmonious
                    relationships with their Hindu neighbors. They were quite happy with life in general. It appears
                    that if the Muslim Siddi community in a Hindu village is populous enough, they have no major
                    problems due to their strength in numbers. However, the smaller Muslim Siddi communities in Hindu
                    villages seem to have more communal issues, which could be partly explained by their smaller
                    population size.</span></p><span data-dcnode-id="136" instrument_node="">
</span><div class="figure" data-dcnode-id="131" style="background-image:url(img/figure25.jpg);"><div class="helper" data-dcnode-id="132"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="135"></span><span class="helper-text" data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="130" instrument_node="">
</span><div class="caption" data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Figure 25: A Hindu non-Siddi woman married into a Christian Siddi family in
                    Hunsittekoppa</span></div><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="122"><span data-dcnode-id="126" instrument_node="">Although Muslim Siddis marry non-Siddi Muslims, they rarely marry Hindu or Christian Siddis. However,
                    Hindu and Christian Siddis marry both inter-religiously and inter-racially. A Hindu non-Siddi woman
                    married into a Christian Siddi family in </span><a class="location" data-dcnode-id="124" data-layer-id="feature-15"><span data-dcnode-id="125" instrument_node="">Hunsittekoppa</span></a><span data-dcnode-id="123" instrument_node="">. The Hindu woman
                    fell in love with the Christian Siddi man and was able to convince her family to approve the
                    relationship despite their reservations. Today, both families regularly socialize with each other.
                    These families have broken down their personal barriers to inter-caste, inter-racial, and
                    inter-religious marriage, but this is generally rare in Indian society. </span></p><span data-dcnode-id="121" instrument_node="">
</span><div class="figure figure-large" data-dcnode-id="116" style="background-image:url(img/figure26.jpg);"><div class="helper" data-dcnode-id="117"><span class="fa fa-hand-pointer-o helper-icon element-animation" data-dcnode-id="120"></span><span class="helper-text" data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Hover to view larger</span></span></div></div><span data-dcnode-id="115" instrument_node="">
</span><div class="caption" data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">Figure 26: Siddi elders congregate</span></div><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="107"><span data-dcnode-id="111" instrument_node="">Here, Siddi elders congregate for a quick chat as they cross paths in the forest on the way home from
                    their jobs near </span><a class="location" data-dcnode-id="109" data-layer-id="feature-16"><span data-dcnode-id="110" instrument_node="">Jaddigadde</span></a><span data-dcnode-id="108" instrument_node="">. These paths and forests are an omnipresent
                    part of Siddi life. Many of the Siddi elders that I interviewed fondly shared their connection with
                    the forests and surrounding areas. Despite the struggles and challenges they encountered in life,
                    this was home to them. </span></p><span data-dcnode-id="106" instrument_node="">
</span></section><span data-dcnode-id="104" instrument_node="">
</span><section class="scene" data-dcnode-id="60" data-scene-id="place11" id="11" title="Conclusion"><span data-dcnode-id="103" instrument_node="">
</span><h3 data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">Conclusion</span></h3><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">Siddis have lived in India for centuries, but very few Indians likely know about them. Siddis face
                    many of the challenges that other rural communities do, including lack of access to education,
                    healthcare, adequate housing, and finance. The status of Siddis within Indian communities may have
                    improved slightly since being recognized as a Scheduled Tribe, which allows access to certain
                    government benefits and protection under discrimination laws. However, Siddis still regularly
                    encounter caste-, religion-, and race-based discrimination, especially in areas farther from their
                    homeland. For this reason, many Siddis have a strong sense of place and an attachment to their
                    homeland. They have lived on these lands for decades, if not centuries, and identify as Indian.
                    Except for retaining some of the physical features of their African ancestors, the Siddis have
                    little-to-no cultural connection to Africa. Every Siddi that I spoke to said that they considered
                    themselves Indian because of how well they have integrated into the surrounding socio-cultural
                    landscape. They speak the same languages, dress the same way, eat the same food, and practice the
                    same religions as any other Indians in the area. To the Siddis, they are the same as anyone else
                    there, and their place attachment to the surrounding forests and landscapes is profound. </span></p><span data-dcnode-id="97" instrument_node="">
