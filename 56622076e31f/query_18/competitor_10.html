</span><div class="wp-block-group" data-dcnode-id="1184"><div class="wp-block-group__inner-container" data-dcnode-id="1185"><span data-dcnode-id="1237" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="1232" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="1236" id="Straightening_a_Curly_Hair"></span><span data-dcnode-id="1234" style="text-decoration: underline;"><span data-dcnode-id="1235" instrument_node="">Straightening a Curly Hair</span></span><span class="ez-toc-section-end" data-dcnode-id="1233"></span></h3><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1227"><em data-dcnode-id="1228"><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">This folk tale from India reminds everyone to think hard before wishing for something. Be careful of what you wish for. Finally, some problems require out-of-the-box thinking.</span></strong></em></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The landlord in this story – wished for a servant who would do all the tasks without any payment in return. He got a Brahmarakshas (giant) after months of incantation. The Brahmarakshas could do a hundred men’s work at once. However, he needed to be kept occupied all the time. Otherwise, if no work, the Brahmarakshas would eat the landlord himself. There was just not enough work to give. Finally, the intelligence of the landlord’s wife saved the day.</span></p><span data-dcnode-id="1223" instrument_node="">

</span></div><span data-dcnode-id="1216" instrument_node="">
</span><p class="has-text-align-right has-vivid-red-color has-text-color" data-dcnode-id="1210"><strong data-dcnode-id="1211"><em data-dcnode-id="1212"><span data-dcnode-id="1213" style="text-decoration: underline;"><a class="rank-math-link" data-dcnode-id="1214" href="#index"><span data-dcnode-id="1215" instrument_node="">Back to Index</span></a></span></em></strong></p><span data-dcnode-id="1209" instrument_node="">

</span><h3 class="has-text-color" data-dcnode-id="1200" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="1204" id="Robin_Hood_story"></span><span data-dcnode-id="1202" style="text-decoration: underline;"><span data-dcnode-id="1203" instrument_node="">Robin Hood story</span></span><span class="ez-toc-section-end" data-dcnode-id="1201"></span></h3><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Robin hood is an outlaw from the original English folk tales. As per the legend – when greedy Prince John became the King of England, he started taxing the people of Nottingham heavily. Poor subjects became even poorer. </span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Robin hood took up arms, started looting the Sherriff and other tax collectors. He would take back the tax money and other valuables collected by the Sherriff and distribute his loot to the poor. People started recognizing and respecting him for his good deed and helpful nature. He was also said to be an excellent archer and swordsman. </span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1187"><em data-dcnode-id="1189"><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">The Robin hood story teaches that the core of moral value is – empathy and compassion for others</span></strong><span data-dcnode-id="1190" instrument_node="">.</span></em><span data-dcnode-id="1188" instrument_node=""> For that reason, even an outlaw is remembered as one of the most moral characters of folk tales.</span></p><span data-dcnode-id="1186" instrument_node="">

</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">A tramp was looking for food. But the lady of the house refused to give him any, stating she has none to offer. The tramp then came up with a quick solution of stone soup which interested the lady. Read here to know how the stone soup is made.</span></p><span data-dcnode-id="1149" instrument_node="">

</span><h3 class="has-text-color" data-dcnode-id="1130" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="1134" id="The_Fisherman_and_His_Wife"></span><span data-dcnode-id="1132" style="text-decoration: underline;"><span data-dcnode-id="1133" instrument_node="">The Fisherman and His Wife</span></span><span class="ez-toc-section-end" data-dcnode-id="1131"></span></h3><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1125"><strong data-dcnode-id="1126"><em data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">This famous folk tale originated in Germany and is retold and narrated in many languages around the world. The Moral of the story is – greed has no end and ultimately becomes the cause of destruction.</span></em></strong></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">A fisherman caught a talking fish once, who claimed to be an enchanted prince. The fisherman let the fish go back to the water. However, the fisherman’s wife kept sending the fisherman back to the sea repeatedly, asking for one thing or other from the talking fish. She needed more and more, every time she got something. She finally got a fitting reply for her never-ending greed.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="1110"><span data-dcnode-id="1120" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="1117"><a class="wp-block-button__link has-text-color has-background" data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pitt.edu/~dash/type0555.html%23runge" rel="noreferrer noopener nofollow" style="border-radius:50px;background-color:#ac9f40;color:#fffffa" target="_blank"><span data-dcnode-id="1119" instrument_node="">Read the Story</span></a></div><span data-dcnode-id="1116" instrument_node="">

</span></div><span data-dcnode-id="1109" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="1104" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="1108" id="Little_Red_Riding_Hood"></span><span data-dcnode-id="1106" style="text-decoration: underline;"><span data-dcnode-id="1107" instrument_node="">Little Red Riding Hood</span></span><span class="ez-toc-section-end" data-dcnode-id="1105"></span></h3><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1099"><strong data-dcnode-id="1100"><em data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">This famous children’s folktale is written by the Grimm brothers and has entertained generations of children since. The moral of the story reminds us all to value traditional knowledge and respect the cautions of the elderly. It also warns us of the potential danger of an unknown road.</span></em></strong></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Originally titled Little Red Cap, this story narrates how a young girl fell prey to a wolf’s greed, after she ventured through the woods, without heeding advice from her elders. The story has a happy ending with the wolf learning a lesson.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="1084"><span data-dcnode-id="1094" instrument_node="">

</span><h3 class="has-text-color" data-dcnode-id="1078" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="1082" id="Two_Frogs"></span><span data-dcnode-id="1080" style="text-decoration: underline;"><span data-dcnode-id="1081" instrument_node="">Two Frogs</span></span><span class="ez-toc-section-end" data-dcnode-id="1079"></span></h3><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1073"><strong data-dcnode-id="1074"><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">This children’s folk tale is from Japan. It reminds us that, through our narrow minds, we end up seeing the world the way we want it to be. One needs to broaden the horizon and look around to see the real world.</span></em></strong></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Two frogs come from two very different parts of the city. They set out to explore the place beyond where they live. Their path crossed, and they devised a plan to take a peek pf the place they are planning to go. The story narrates what happens next.</span></p><span data-dcnode-id="1069" instrument_node="">

</span></div><span data-dcnode-id="1057" instrument_node="">
</span><p class="has-text-align-right has-vivid-red-color has-text-color" data-dcnode-id="1051"><strong data-dcnode-id="1052"><em data-dcnode-id="1053"><span data-dcnode-id="1054" style="text-decoration: underline;"><a class="rank-math-link" data-dcnode-id="1055" href="#index"><span data-dcnode-id="1056" instrument_node="">Back to Index</span></a></span></em></strong></p><span data-dcnode-id="1050" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="1045" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="1049" id="Jack_and_the_Beanstalk"></span><span data-dcnode-id="1047" style="text-decoration: underline;"><span data-dcnode-id="1048" instrument_node="">Jack and the Beanstalk</span></span><span class="ez-toc-section-end" data-dcnode-id="1046"></span></h3><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1040"><strong data-dcnode-id="1041"><em data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">One of the most popular folktales – Jack and the Beanstalk, encourages all to have inquisitive minds. Also, to climb up when the opportunity arises. For success comes to only those who try hard.</span></em></strong></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">A poor boy Jack got five Beanstalks from a stranger on the way, in exchange, for his cow. He believed in the magical power of the beanstalk. When the time came, he climbed up the vine till he reached a palace. There, his actions helped him get many valuables. He and his mother became wealthy beyond imagination.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="1025"><span data-dcnode-id="1035" instrument_node="">

</span><h3 class="has-text-color" data-dcnode-id="1019" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="1023" id="The_Stonecutter"></span><span data-dcnode-id="1021" style="text-decoration: underline;"><span data-dcnode-id="1022" instrument_node="">The Stonecutter</span></span><span class="ez-toc-section-end" data-dcnode-id="1020"></span></h3><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1014"><strong data-dcnode-id="1015"><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">This folktale teaches kids that – they should always appreciate what they have. The other side might look greener, but it may always not be so.</span></em></strong></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">The stonecutter in this story wished to be a rich man, and his wish was granted. Once a prince, he realized that the sun is mightier, so he longed to be the sun. However, he was still not happy, as the clouds made the sun disappear. So he became the cloud. And so on it went. Finally, he realized the importance of being a stonecutter and came back to his true self.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="999"><span data-dcnode-id="1009" instrument_node="">

</span><h3 class="has-text-color" data-dcnode-id="989" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="993" id="The_Ugly_Duckling"></span><span data-dcnode-id="991" style="text-decoration: underline;"><span data-dcnode-id="992" instrument_node="">The Ugly Duckling</span></span><span class="ez-toc-section-end" data-dcnode-id="990"></span></h3><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="984"><strong data-dcnode-id="985"><em data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">The Ugly duckling, written by Hans Christian Anderson, has been part of popular children’s folktales for generations. The moral of the story tells us that we all are different and beautiful in our own way. It is futile to try to fit in with the herd. Everyone has their place on earth.</span></em></strong></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">A duck hatched a batch of eggs, amongst which was a swan egg. All the other ducklings came out looking normal. The swan baby came out looking different and ugly. The ugly swan baby tried to fit in with different groups, but no one understood its worth. Until one day, when it was time for the swan to develop fully to its potential.</span></p><span data-dcnode-id="980" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="969"><span data-dcnode-id="979" instrument_node="">

</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">This folk tale from the Philippines narrates the story of why sea water is salty.</span></p><span data-dcnode-id="959" instrument_node="">

</span><h2 data-dcnode-id="935"><span class="ez-toc-section" data-dcnode-id="938" id="Indian_Folk_tales_with_Morals_for_Kids"></span><span data-dcnode-id="937" instrument_node="">Indian Folk tales with Morals for Kids</span><span class="ez-toc-section-end" data-dcnode-id="936"></span></h2><span data-dcnode-id="934" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="929" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="933" id="Tenali_Rama_Folk_tales"></span><span data-dcnode-id="931" style="text-decoration: underline;"><span data-dcnode-id="932" instrument_node="">Tenali Rama Folk tales</span></span><span class="ez-toc-section-end" data-dcnode-id="930"></span></h3><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Tenali Rama was an Indian scholar, advisor in the court of King Krishnadevaraya. He was a Telugu poet, known for his wittiness. Tenali Rama stories are part of popular folk tales in India. The stories are funny and always have a moral at the end. </span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="921"><strong data-dcnode-id="922"><em data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The Tenali Rama stories teach readers that one can use wit and humor to come out of any tricky situation.</span></em></strong></p><span data-dcnode-id="920" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="914"><span data-dcnode-id="919" instrument_node="">

</span></div><span data-dcnode-id="913" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="908" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="912" id="Akbar_Birbal_Folk_tales"></span><span data-dcnode-id="910" style="text-decoration: underline;"><span data-dcnode-id="911" instrument_node="">Akbar Birbal Folk tales</span></span><span class="ez-toc-section-end" data-dcnode-id="909"></span></h3><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Akbar was an emperor of Mughal-ruled India, and Birbal was part of his court. While Akbar enjoyed testing Birbal’s intelligence with tricky questions, Birbal always came out the winner with a suitable answer. </span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Here is a collection of Akbar Birbal stories. The stories are funny, thought-provoking, with a beautiful moral about right and wrong in the end. </span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="897"><strong data-dcnode-id="898"><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">The Akbar Birbal folk tales have enlightened generations of children for hundreds of years in India.</span></em></strong></p><span data-dcnode-id="896" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="890"><span data-dcnode-id="895" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="892"><a class="wp-block-button__link has-text-color has-background" data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookforbug.com/funny-akbar-birbal-stories-for-kids/" rel="noreferrer noopener" style="border-radius:50px;background-color:#ac9f40;color:#fffffa" target="_blank"><span data-dcnode-id="894" instrument_node="">Read the Story</span></a></div><span data-dcnode-id="891" instrument_node="">

</span><h3 class="has-text-color" data-dcnode-id="884" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="888" id="Vikram_Vetal_Folk_tales"></span><span data-dcnode-id="886" style="text-decoration: underline;"><span data-dcnode-id="887" instrument_node="">Vikram Vetal Folk tales</span></span><span class="ez-toc-section-end" data-dcnode-id="885"></span></h3><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">King Vikramaditya of India was asked to capture and bring the corpse of Betal. However, each time he picked up the corpse, it started telling a story with a riddle in the end. The correct answer took the corpse back to its place. The king runs after it and brings Betal down, starts walking. Betal starts telling another story. And the cycle repeats. </span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="876"><strong data-dcnode-id="877"><em data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">The Betal Vikram short stories are part of famous Indian folklores. The riddle at the end of the story, tests the moral, empathy, intelligence, etc of the listener. A good way to test the understanding of right and wrong.</span></em></strong></p><span data-dcnode-id="875" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="869"><span data-dcnode-id="874" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="871"><a class="wp-block-button__link has-text-color has-background" data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookforbug.com/vikram-and-betal-stories-for-children/" rel="noreferrer noopener" style="border-radius:50px;background-color:#ac9f40;color:#fffffa" target="_blank"><span data-dcnode-id="873" instrument_node="">Read the Story</span></a></div><span data-dcnode-id="870" instrument_node="">
</span></div><span data-dcnode-id="868" instrument_node="">

</span><h2 data-dcnode-id="855"><span class="ez-toc-section" data-dcnode-id="858" id="African_Folktales_for_Kids_with_Morals"></span><span data-dcnode-id="857" instrument_node="">African Folktales for Kids with Morals</span><span class="ez-toc-section-end" data-dcnode-id="856"></span></h2><span data-dcnode-id="854" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="849" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="853" id="Anansi_Goes_Fishing"></span><span data-dcnode-id="851" style="text-decoration: underline;"><span data-dcnode-id="852" instrument_node="">Anansi Goes Fishing</span></span><span class="ez-toc-section-end" data-dcnode-id="850"></span></h3><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">This African folktale narrates one story of Anansi. Anansi tried to make a fool of one fisherman. But the fisherman caught the wind of it and beat Anansi at his game instead. </span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="841"><strong data-dcnode-id="842"><em data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The story explains how excessive greed makes one blind.</span></em></strong></p><span data-dcnode-id="840" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="834"><span data-dcnode-id="839" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="836"><a class="wp-block-button__link has-text-color has-background" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.storyarts.org/library/nutshell/stories/anansi.html" rel="noreferrer noopener nofollow" style="border-radius:35px;background-color:#ac9f40;color:#fffffa" target="_blank"><span data-dcnode-id="838" instrument_node="">Read the Story</span></a></div><span data-dcnode-id="835" instrument_node="">
</span></div><span data-dcnode-id="833" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="828" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="832" id="Why_Turtles_Live_In_Water"></span><span data-dcnode-id="830" style="text-decoration: underline;"><span data-dcnode-id="831" instrument_node="">Why Turtles Live In Water</span></span><span class="ez-toc-section-end" data-dcnode-id="829"></span></h3><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">This popular folklore from West Africa tells why turtles started living in the water. Once a clever turtle was caught by hunters. However, the turtle tricked the group of men to release it into the water. Thus the intelligent turtle saved its own life.</span></p><span data-dcnode-id="824" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="818"><span data-dcnode-id="823" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="820"><a class="wp-block-button__link has-text-color has-background" data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.storyarts.org/library/nutshell/stories/whyturtles.html" rel="noreferrer noopener nofollow" style="border-radius:50px;background-color:#ac9f40;color:#fffffa" target="_blank"><span data-dcnode-id="822" instrument_node="">Read the Story</span></a></div><span data-dcnode-id="819" instrument_node="">
</span></div><span data-dcnode-id="817" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="812" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="816" id="The_Gift_of_a_Cow_Tail_Switch"></span><span data-dcnode-id="814" style="text-decoration: underline;"><span data-dcnode-id="815" instrument_node="">The Gift of a Cow Tail Switch</span></span><span class="ez-toc-section-end" data-dcnode-id="813"></span></h3><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">A moral lesson on human value retold in this folktale from West Africa. When a warrior died, everyone in his family gave up on him and accepted his death, except his youngest son. The son kept asking for his father, which eventually brought the dead back. </span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="804"><strong data-dcnode-id="805"><em data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">The moral of the story, as narrated is – a person lives through other people’s memories.</span></em></strong></p><span data-dcnode-id="803" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="797"><span data-dcnode-id="802" instrument_node="">

</span></div><span data-dcnode-id="796" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="791" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="795" id="One_Good_Meal_Deserves_Another"></span><span data-dcnode-id="793" style="text-decoration: underline;"><span data-dcnode-id="794" instrument_node="">One Good Meal Deserves Another</span></span><span class="ez-toc-section-end" data-dcnode-id="792"></span></h3><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">In this folktale, a turtle teaches a lesson to a Spider, who would not share.</span></p><span data-dcnode-id="787" instrument_node="">

</span><p class="has-text-align-right has-vivid-red-color has-text-color" data-dcnode-id="774"><strong data-dcnode-id="775"><em data-dcnode-id="776"><span data-dcnode-id="777" style="text-decoration: underline;"><a class="rank-math-link" data-dcnode-id="778" href="#index"><span data-dcnode-id="779" instrument_node="">Back to Index</span></a></span></em></strong></p><span data-dcnode-id="773" instrument_node="">

</span><h2 data-dcnode-id="767"><span class="ez-toc-section" data-dcnode-id="770" id="Arabian_Folktales_for_Kids_with_Morals"></span><span data-dcnode-id="769" instrument_node="">Arabian Folktales for Kids with Morals</span><span class="ez-toc-section-end" data-dcnode-id="768"></span></h2><span data-dcnode-id="766" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="761" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="765" id="Alibaba_and_Forty_Thieves"></span><span data-dcnode-id="763" style="text-decoration: underline;"><span data-dcnode-id="764" instrument_node="">Alibaba and Forty Thieves</span></span><span class="ez-toc-section-end" data-dcnode-id="762"></span></h3><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Alibaba and forty thieves story is part of popular Arabian folklore. It narrates how a poor man Alibaba discovered the hidden treasure of the bandits and became rich. When the bandits came to know about it, they tried to kill Alibaba. However, each time the intelligence of his one servant saved him. </span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="753"><strong data-dcnode-id="754"><em data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The story has many lessons woven into it. Too much greed causes one’s downfall. Honesty pays. And faithfulness and kindness is a virtue.</span></em></strong></p><span data-dcnode-id="752" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="746"><span data-dcnode-id="751" instrument_node="">
</span><div class="wp-block-button" data-dcnode-id="748"><a class="wp-block-button__link has-text-color has-background" data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pitt.edu/~dash/alibaba.html%23lang" rel="noreferrer noopener nofollow" style="border-radius:50px;background-color:#ac9f40;color:#fffffa" target="_blank"><span data-dcnode-id="750" instrument_node="">Read the Story</span></a></div><span data-dcnode-id="747" instrument_node="">
</span></div><span data-dcnode-id="745" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="740" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="744" id="Aladins_Lamp"></span><span data-dcnode-id="742" style="text-decoration: underline;"><span data-dcnode-id="743" instrument_node="">Aladin’s Lamp</span></span><span class="ez-toc-section-end" data-dcnode-id="741"></span></h3><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Aladin and his magic lamp is the story of how a poor boy Aladin’s fate changed when he got a magic lamp. The lamp had a genie inside, who would follow the orders of Aladin and get whatever Aladin wished. Aladin, on his part, never became too greedy and misused the genie.</span></p><span data-dcnode-id="736" instrument_node="">
</span><div class="wp-block-buttons is-content-justification-center" data-dcnode-id="730"><span data-dcnode-id="735" instrument_node="">

</span></div><span data-dcnode-id="729" instrument_node="">
</span><h3 class="has-text-color" data-dcnode-id="724" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="728" id="Sindbad_the_Sailor"></span><span data-dcnode-id="726" style="text-decoration: underline;"><span data-dcnode-id="727" instrument_node="">Sindbad the Sailor</span></span><span class="ez-toc-section-end" data-dcnode-id="725"></span></h3><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Sindbad the sailor, is a popular Arabian folktale character. The story narrates how Sindbad survived ship wreckage in the middle of the ocean. And finally returned home by sheer virtue of his bravery.</span></p><span data-dcnode-id="720" instrument_node="">

</span><h3 class="has-text-color" data-dcnode-id="694" style="color:#fa565d"><span class="ez-toc-section" data-dcnode-id="698" id="Nasreddin_Hodja_at_a_Bridal_Festival"></span><span data-dcnode-id="696" style="text-decoration: underline;"><span data-dcnode-id="697" instrument_node="">Nasreddin Hodja at a Bridal Festival</span></span><span class="ez-toc-section-end" data-dcnode-id="695"></span></h3><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">This funny story is from the collection of popular Turkish folklore. Nasreddin Hodja was famous for his wittiness. Once, he was invited to a bridal function. However, the function organizers did not pay him proper respect looking at his not-so-rich clothes. Nasreddin taught them a lesson in a funny way – </span><strong data-dcnode-id="689"><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">people’s worth should not be measured by the clothes they wear.</span></em></strong></p><span data-dcnode-id="687" instrument_node="">

</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">This funny story is of a foolish person, who misses counting the donkey he is riding each time. Thus, afraid that he would lose the donkey again, he stops riding the donkey, and instead covers the remaining distance on foot.</span></p><span data-dcnode-id="671" instrument_node="">

</span><h2 data-dcnode-id="595"><span class="ez-toc-section" data-dcnode-id="598" id="What_is_a_folktale"></span><span data-dcnode-id="597" instrument_node="">What is a folktale</span><span class="ez-toc-section-end" data-dcnode-id="596"></span></h2><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Folk tales are stories that are passed on orally through generations. They are part of the culture of a place. Every region has its own tales. Indian folktales, African folktales, English folktales, Arabian tales, Turkish tales are few examples of folktales originating in that respective region.</span></p><span data-dcnode-id="591" instrument_node="">
</span><hr class="wp-block-separator is-style-wide" data-dcnode-id="590" id="folktalemoral"><span data-dcnode-id="589" instrument_node="">
</span><h2 data-dcnode-id="585"><span class="ez-toc-section" data-dcnode-id="588" id="What_lessons_do_folktales_teach"></span><span data-dcnode-id="587" instrument_node="">What lessons do folktales teach?</span><span class="ez-toc-section-end" data-dcnode-id="586"></span></h2><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Folk tales almost always have a moral attached to the story. They are used to teach discipline to the children and help them understand right and wrong behavior. Folk tales are also used to pass down ancient wisdom and knowledge through generations. The story form helps thoroughly explain difficult things.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p class="has-text-align-right has-vivid-red-color has-text-color" data-dcnode-id="575"><strong data-dcnode-id="576"><em data-dcnode-id="577"><span data-dcnode-id="578" style="text-decoration: underline;"><a class="rank-math-link" data-dcnode-id="579" href="#index"><span data-dcnode-id="580" instrument_node="">Back to Index</span></a></span></em></strong></p><span data-dcnode-id="574" instrument_node="">
