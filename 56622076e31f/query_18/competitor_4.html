</span><div class="readMoreSmall font-smaller mb-3" data-dcnode-id="2870"><span data-dcnode-id="2876" instrument_node="">
    
         “The Land of Five Rivers”, Punjab is one of the most fertile regions of the Indian subcontinent. Festivals of Punjab is something that needs to be experienced at least once in a lifetime. This north-</span><span class="clickable linkColor morelinkSmall" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node=""> (Read More)</span></span><span class="moreTextHidden" data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">western state is home to the Punjabi community, known to be loud, lively and having great enthusiasm for almost everything. Being an agriculture-based region, Punjabi festivities largely revolve around agriculture. Harvest season brings happiness and excitement.
 </span></span><span data-dcnode-id="2871" instrument_node="">

</span><h2 class="font-regular w-100 recover-negative-margin" data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Here is the list of 11 Festivals of Punjab </span></h2><span data-dcnode-id="2843" instrument_node="">
</span><div class="col-12 col-md-6 pr-md-3" data-dcnode-id="2806"><span data-dcnode-id="2842" instrument_node="">
</span><div class="card content-card" data-dcnode-id="2808" data-itemid="174949"><span data-dcnode-id="2841" instrument_node="">
</span><a data-dcnode-id="2822" data-href="https://www.holidify.com/pages/baisakhi-398.html" data-position="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/pages/baisakhi-398.html"><span data-dcnode-id="2840" instrument_node="">
</span><h3 class="card-heading" data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node=""> 1. Baisakhi - Festival of Harvest </span></h3><span data-dcnode-id="2837" instrument_node="">
</span><div class="position-relative" data-dcnode-id="2824"><span data-dcnode-id="2836" instrument_node="">
</span><div class="collection-scrollable slick-initialized slick-slider slick-dotted" data-dcnode-id="2826" data-hotel-position="1"><span data-dcnode-id="2835" instrument_node="">
</span><div class="slick-list draggable" data-dcnode-id="2832"><div class="slick-track" data-dcnode-id="2833" style="opacity: 1; width: 288px; transform: translate3d(0px, 0px, 0px);"><img alt="Baisakhi - Festival of Harvest" aria-describedby="slick-slide-control00" aria-hidden="false" class="card-img-top lazy slick-slide slick-current slick-active" data-dcnode-id="2834" data-original="https://upload.wikimedia.org/wikipedia/commons/c/cf/Vaisakhi_Sikh_festival_in_Birmingham_2013.jpg" data-slick-index="0" id="slick-slide00" role="tabpanel" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw" style="width: 288px;" tabindex="0"></div></div><span data-dcnode-id="2831" instrument_node="">
</span><ul class="slick-dots" data-dcnode-id="2827" role="tablist"><li class="slick-active" data-dcnode-id="2828" role="presentation"><button aria-controls="slick-slide00" aria-label="1 of 1" aria-selected="true" data-dcnode-id="2829" id="slick-slide-control00" role="tab" tabindex="0" type="button"><span data-dcnode-id="2830" instrument_node="">1</span></button></li></ul></div><span data-dcnode-id="2825" instrument_node="">
</span></div><span data-dcnode-id="2823" instrument_node="">
</span></a><span data-dcnode-id="2821" instrument_node="">
</span><div class="card-body" data-dcnode-id="2816"><span data-dcnode-id="2820" instrument_node="">
</span><p class="card-text" data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node=""> The Sikhs celebrate Baisakhi, one of the most celebrated festivals of Punjab by bathing in the holy river and visiting the Gurudwaras, where they take part in the prayers held during the day. Baisakhi gets everyone into the festive mood, and people like to dance their heart out. Special celebrations occur at the Talwandi Sabo, where Guru Gobind Singh recompiled the sacred Granth Sahib, the Gurudwara at Anandpur Sahib, where Khalsa was born, and the Golden Temple in Amritsar. The phrase 'Jatta Aayi Baisakhi' is loudly declared across the fields by gleeful farmers as they passionately dance in celebration, an exciting way of greeting the festival. </span></p><span data-dcnode-id="2817" instrument_node="">
</span></div><span data-dcnode-id="2815" instrument_node="">
</span><div class="content-card-footer" data-dcnode-id="2810" data-href="https://www.holidify.com/pages/baisakhi-398.html" data-position="1"><span data-dcnode-id="2814" instrument_node="">

</span><a data-dcnode-id="2784" data-href="https://www.holidify.com/pages/hola-mohalla-1853.html" data-position="2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/pages/hola-mohalla-1853.html"><span data-dcnode-id="2802" instrument_node="">
</span><h3 class="card-heading" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node=""> 2. Hola Mohalla - Festival of Brotherhood and Bravery </span></h3><span data-dcnode-id="2799" instrument_node="">
</span><div class="position-relative" data-dcnode-id="2786"><span data-dcnode-id="2798" instrument_node="">
</span><div class="collection-scrollable slick-initialized slick-slider slick-dotted" data-dcnode-id="2788" data-hotel-position="2"><span data-dcnode-id="2797" instrument_node="">
</span><div class="slick-list draggable" data-dcnode-id="2794"><div class="slick-track" data-dcnode-id="2795" style="opacity: 1; width: 288px; transform: translate3d(0px, 0px, 0px);"><img alt="Hola Mohalla - Festival of Brotherhood and Bravery" aria-describedby="slick-slide-control10" aria-hidden="false" class="card-img-top lazy slick-slide slick-current slick-active" data-dcnode-id="2796" data-original="https://www.holidify.com/images/cmsuploads/compressed/Hola_Mohalla_Holi_festival_and_sports_Anandpur_Sahib_Punjab_India_20200504090319.jpg" data-slick-index="0" id="slick-slide10" role="tabpanel" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/images/cmsuploads/compressed/Hola_Mohalla_Holi_festival_and_sports_Anandpur_Sahib_Punjab_India_20200504090319.jpg&amp;raw" style="width: 288px; display: block;" tabindex="0"></div></div><span data-dcnode-id="2793" instrument_node="">
</span><ul class="slick-dots" data-dcnode-id="2789" role="tablist"><li class="slick-active" data-dcnode-id="2790" role="presentation"><button aria-controls="slick-slide10" aria-label="1 of 1" aria-selected="true" data-dcnode-id="2791" id="slick-slide-control10" role="tab" tabindex="0" type="button"><span data-dcnode-id="2792" instrument_node="">1</span></button></li></ul></div><span data-dcnode-id="2787" instrument_node="">
</span></div><span data-dcnode-id="2785" instrument_node="">
</span></a><span data-dcnode-id="2783" instrument_node="">
</span><div class="card-body" data-dcnode-id="2778"><span data-dcnode-id="2782" instrument_node="">
</span><p class="card-text" data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node=""> Hola Mohalla is a famous and colourful 3-day Sikh festival celebrated during spring. It takes place on the second day of the lunar month of Chett which is the first month of the Nanakshahi calendar used by Sikhs. Hola Mohalla procession takes place in Takht Sri Keshgarh Sahib in Anandpur, the Rupnagar district of Punjab, which is one of the 5 Sikh takhts holding special historical significance. It is home to the birth of Khalsa Panth and has real artefacts from those days. </span></p><span data-dcnode-id="2779" instrument_node="">
</span></div><span data-dcnode-id="2777" instrument_node="">
</span><div class="content-card-footer" data-dcnode-id="2772" data-href="https://www.holidify.com/pages/hola-mohalla-1853.html" data-position="2"><span data-dcnode-id="2776" instrument_node="">

</span><div class="collection-scrollable slick-initialized slick-slider slick-dotted" data-dcnode-id="2751" data-hotel-position="3"><span data-dcnode-id="2760" instrument_node="">
</span><div class="slick-list draggable" data-dcnode-id="2757"><div class="slick-track" data-dcnode-id="2758" style="opacity: 1; width: 288px; transform: translate3d(0px, 0px, 0px);"><img alt="Lohri - Famous Folk Festival of Punjab" aria-describedby="slick-slide-control20" aria-hidden="false" class="card-img-top lazy slick-slide slick-current slick-active" data-dcnode-id="2759" data-original="https://www.holidify.com/images/cmsuploads/compressed/11932931876_7d45f3b645_o_20200413112319.jpg" data-slick-index="0" id="slick-slide20" role="tabpanel" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/images/cmsuploads/compressed/11932931876_7d45f3b645_o_20200413112319.jpg&amp;raw" style="width: 288px; display: block;" tabindex="0"></div></div><span data-dcnode-id="2756" instrument_node="">
</span><ul class="slick-dots" data-dcnode-id="2752" role="tablist"><li class="slick-active" data-dcnode-id="2753" role="presentation"><button aria-controls="slick-slide20" aria-label="1 of 1" aria-selected="true" data-dcnode-id="2754" id="slick-slide-control20" role="tab" tabindex="0" type="button"><span data-dcnode-id="2755" instrument_node="">1</span></button></li></ul></div><span data-dcnode-id="2750" instrument_node="">
</span></div><span data-dcnode-id="2748" instrument_node="">
</span><div class="card-body" data-dcnode-id="2743"><span data-dcnode-id="2747" instrument_node="">
</span><p class="card-text" data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node=""> Lohri- Celebration of Lohri marks the end of the winter season. Being one of the most famous festival of Punjab, Lohri celebrated with the beating of Dhol, Nagadas, and singing of traditional Lohri songs. Children visit the neighbourhood asking for treats. The festival is full of life, and you can't afford to miss the North Indian's Lohri. Special celebrations take place in the houses of newborns and newlyweds. </span></p><span data-dcnode-id="2744" instrument_node="">
</span></div><span data-dcnode-id="2742" instrument_node="">

</span></div><span data-dcnode-id="2737" instrument_node="">

</span><h3 class="card-heading" data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node=""> 4. Karwa Chauth - Festival of Fasting  </span></h3><span data-dcnode-id="2730" instrument_node="">

</span><p class="card-text" data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node=""> Fasting is an integral part of Hindu Culture. Fasts or Vrats or Upvas are a way to represent your sincerity and resolve, or express your gratitude to the Gods and Goddesses. People throughout the country observe fasts during various religious occasions. Some people also observe fast on different days of a week in favour of a particular God or Goddess associated with that specific day. It is widely believed that by doing so, you are depriving your body of a basic necessity and thus, punishing yourself to cleanse off the sins that you have committed until the day of fast. </span></p><span data-dcnode-id="2712" instrument_node="">

</span><h3 class="card-heading" data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node=""> 5. Gurupurab - Vibrant Festival of Punjab </span></h3><span data-dcnode-id="2352" instrument_node="">

</span><div class="card-body" data-dcnode-id="2331"><span data-dcnode-id="2335" instrument_node="">
</span><p class="card-text" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node=""> Guru Nanak Jayanti, or as it is commonly called, Guru Nanak Gurpurab, is a Sikh festival which is celebrated with a lot of fervour and excitement in many parts of India by Sikh and Punjabi&nbsp;festivals&nbsp;alike. Most Sikh festivities are centred around the birth of their ten Gurus, who helped shape the religion and preach the importance of religious devotion. As the name suggests, Guru Nanak Gurpurab celebrates the birth anniversary of Guru Nanak Dev Ji, who is the first Guru of the Sikhs and the founder of Sikhism. </span></p><span data-dcnode-id="2332" instrument_node="">
</span></div><span data-dcnode-id="2330" instrument_node="">
</span><div class="content-card-footer" data-dcnode-id="2325" data-href="https://www.holidify.com/pages/guru-nanak-jayanti-1834.html" data-position="5"><span data-dcnode-id="2329" instrument_node="">

</span><h3 class="card-heading" data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node=""> 6. Basant Panchami </span></h3><span data-dcnode-id="2315" instrument_node="">
</span><div class="position-relative" data-dcnode-id="2302"><span data-dcnode-id="2314" instrument_node="">
</span><div class="collection-scrollable slick-initialized slick-slider slick-dotted" data-dcnode-id="2304" data-hotel-position="6"><span data-dcnode-id="2313" instrument_node="">
</span><div class="slick-list draggable" data-dcnode-id="2310"><div class="slick-track" data-dcnode-id="2311" style="opacity: 1; width: 288px; transform: translate3d(0px, 0px, 0px);"><img alt="Basant Panchami" aria-describedby="slick-slide-control50" aria-hidden="false" class="card-img-top lazy slick-slide slick-current slick-active" data-dcnode-id="2312" data-original="https://www.holidify.com/images/cmsuploads/compressed/1024px-Goddess_Saraswati_dressed_in_yellow_sari_for_Vasant_Panchami_Festival_Kolkata_20200504091406.jpg" data-slick-index="0" id="slick-slide50" role="tabpanel" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/images/cmsuploads/compressed/1024px-Goddess_Saraswati_dressed_in_yellow_sari_for_Vasant_Panchami_Festival_Kolkata_20200504091406.jpg&amp;raw" style="width: 288px; display: block;" tabindex="0"></div></div><span data-dcnode-id="2309" instrument_node="">
</span><ul class="slick-dots" data-dcnode-id="2305" role="tablist"><li class="slick-active" data-dcnode-id="2306" role="presentation"><button aria-controls="slick-slide50" aria-label="1 of 1" aria-selected="true" data-dcnode-id="2307" id="slick-slide-control50" role="tab" tabindex="0" type="button"><span data-dcnode-id="2308" instrument_node="">1</span></button></li></ul></div><span data-dcnode-id="2303" instrument_node="">
</span></div><span data-dcnode-id="2301" instrument_node="">
</span><div class="card-body" data-dcnode-id="2296"><span data-dcnode-id="2300" instrument_node="">
</span><p class="card-text" data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node=""> As suggested, this festival marks the beginning of Basant or spring season. It is celebrated forty days before the actual arrival of spring as it is believed that it takes at least forty days for seasons to transit and reach their full bloom. Another impressionable element of Basant Panchami is the importance of ‘Yellow’ as a colour. In Punjab, farmers who have sown mustard seeds in their farms. As spring approaches, these fields turn into a beautiful yard of million yellow blooming flowers. People wear yellow and Namdhari Sikhs distribute langars at gurudwaras to show gratitude to the Supreme, sharing their harvest with others. Not confined to any religious identity, Punjabi Muslims celebrate Basant Panchami with great gusto too, flying kites from their rooftops. Spring surely personifies the spirit of Punjabis. </span></p><span data-dcnode-id="2297" instrument_node="">
</span></div><span data-dcnode-id="2295" instrument_node="">

</span><div class="position-relative" data-dcnode-id="2257"><span data-dcnode-id="2269" instrument_node="">

</span><div class="slick-list draggable" data-dcnode-id="2265"><div class="slick-track" data-dcnode-id="2266" style="opacity: 1; width: 288px; transform: translate3d(0px, 0px, 0px);"><img alt="Teeyan" aria-describedby="slick-slide-control60" aria-hidden="false" class="card-img-top lazy slick-slide slick-current slick-active" data-dcnode-id="2267" data-original="https://www.holidify.com/images/cmsuploads/compressed/Giddha_dance_Teeyan_Punjab_Teej_India_2_20200504091506.jpg" data-slick-index="0" id="slick-slide60" role="tabpanel" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/images/cmsuploads/compressed/Giddha_dance_Teeyan_Punjab_Teej_India_2_20200504091506.jpg&amp;raw" style="width: 288px; display: block;" tabindex="0"></div></div><span data-dcnode-id="2264" instrument_node="">
</span><ul class="slick-dots" data-dcnode-id="2260" role="tablist"><li class="slick-active" data-dcnode-id="2261" role="presentation"><button aria-controls="slick-slide60" aria-label="1 of 1" aria-selected="true" data-dcnode-id="2262" id="slick-slide-control60" role="tab" tabindex="0" type="button"><span data-dcnode-id="2263" instrument_node="">1</span></button></li></ul></div><span data-dcnode-id="2258" instrument_node="">
</span></div><span data-dcnode-id="2256" instrument_node="">
</span><div class="card-body" data-dcnode-id="2251"><span data-dcnode-id="2255" instrument_node="">
</span><p class="card-text" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node=""> A cultural festival observed by and for women, Teeyan or Punjabi Teej marks the onset of the monsoon season. Known to the be one among the best festivals of Punjab, Teeyan begins on the third day of Saawan Maas and ends on Saawan Purnima, spanning a total of thirteen days. It was mandatory for every married woman to spend the entire Saawan month at her maternal home. Traditionally, Teeyan is synonymous to monsoon swings and giddha. Girls and women would tie swings on trees and collectively dance in the traditional dance form, Giddha. Over time, Teeyan has been reduced to women fasting on the Saawan full moon day and eating a well-prepared spread later. </span></p><span data-dcnode-id="2252" instrument_node="">
</span></div><span data-dcnode-id="2250" instrument_node="">
</span><div class="content-card-footer" data-dcnode-id="2248" data-href="" data-position="7"><span data-dcnode-id="2249" instrument_node="">

</span><h3 class="card-heading" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node=""> 8. Bhai Dooj </span></h3><span data-dcnode-id="2238" instrument_node="">
</span><div class="position-relative" data-dcnode-id="2225"><span data-dcnode-id="2237" instrument_node="">
</span><div class="collection-scrollable slick-initialized slick-slider slick-dotted" data-dcnode-id="2227" data-hotel-position="8"><span data-dcnode-id="2236" instrument_node="">

</span><ul class="slick-dots" data-dcnode-id="2228" role="tablist"><li class="slick-active" data-dcnode-id="2229" role="presentation"><button aria-controls="slick-slide70" aria-label="1 of 1" aria-selected="true" data-dcnode-id="2230" id="slick-slide-control70" role="tab" tabindex="0" type="button"><span data-dcnode-id="2231" instrument_node="">1</span></button></li></ul></div><span data-dcnode-id="2226" instrument_node="">
</span></div><span data-dcnode-id="2224" instrument_node="">
</span><div class="card-body" data-dcnode-id="2219"><span data-dcnode-id="2223" instrument_node="">
</span><p class="card-text" data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node=""> Having many regional names like Bhau beej, Bhai Tika and so on, Bhai Dooj is a religious festival celebrated on the second day of Shukla Paksha (Bright Fortnight) in Kartik maas (a month in Hindu Samvat calendar). The customs of this festival are similar to Raksha Bandhan. The celebration stretches across the North Indian region, including Punjab. Embracing the brother-sister relationship, Bhai Dooj is all about scrumptious sweets and family time. Ritualistically, the sister performs aarti and applies tika on the forehead of her brothers. Then the sister ties the kalawa on her brother’s wrist - recollecting promises of keeping her safe. The celebration is enhanced with special sweets and foods. Observed on the second day after Diwali, Bhai Dooj is another bead in the string of celebrations. </span></p><span data-dcnode-id="2220" instrument_node="">
</span></div><span data-dcnode-id="2218" instrument_node="">
</span><div class="content-card-footer" data-dcnode-id="2216" data-href="" data-position="8"><span data-dcnode-id="2217" instrument_node="">
</span></div><span data-dcnode-id="2215" instrument_node="">
</span></div><span data-dcnode-id="2213" instrument_node="">

</span><h3 class="card-heading" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node=""> 9. Chappar Mela </span></h3><span data-dcnode-id="2206" instrument_node="">
</span><div class="position-relative" data-dcnode-id="2193"><span data-dcnode-id="2205" instrument_node="">
</span><div class="collection-scrollable slick-initialized slick-slider slick-dotted" data-dcnode-id="2195" data-hotel-position="9"><span data-dcnode-id="2204" instrument_node="">

</span><ul class="slick-dots" data-dcnode-id="2196" role="tablist"><li class="slick-active" data-dcnode-id="2197" role="presentation"><button aria-controls="slick-slide80" aria-label="1 of 1" aria-selected="true" data-dcnode-id="2198" id="slick-slide-control80" role="tab" tabindex="0" type="button"><span data-dcnode-id="2199" instrument_node="">1</span></button></li></ul></div><span data-dcnode-id="2194" instrument_node="">
</span></div><span data-dcnode-id="2192" instrument_node="">
</span><div class="card-body" data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node="">
</span><p class="card-text" data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node=""> Chappar Mela is an annual fair organised in the village of Chappar in the Ludhiana district of Punjab. Commemorating the renowned Gugga Pir or ‘Snake God’, this mela celebrates the advent of this local folk deity. Organized on the fourth day of Bhadas maas (September), Chappar mela has been an annual occasion for the people in the Malwa belt for over 150 years. Having started as a small gathering, Chappar mela now attracts millions of people who have a firm belief in Gugga Pir. There is various folklore behind why this snake-man hybrid is worshipped. One such folklore narrates that a farmer had a son and a snake. The two were so close that they could actually feel each other’s pain. The snake died accidently and so did the boy. The boy, Gugga and the snake, Sidh were assigned a particular spot where people could come and worship them. </span></p><span data-dcnode-id="2188" instrument_node="">
</span></div><span data-dcnode-id="2186" instrument_node="">

</span><div class="position-relative" data-dcnode-id="2161"><span data-dcnode-id="2173" instrument_node="">

</span><div class="card-body" data-dcnode-id="2155"><span data-dcnode-id="2159" instrument_node="">
</span><p class="card-text" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node=""> Shaheedi Sabha locally known as Shaheedi Jor Mela is a three day long religious sabha (congregation). It is organised every year in December at Gurdwara Fatehgarh Sahib, in the Fatehgarh Sahib district of Punjab. Sikhs come together to pay homage to the martyrdom of Sahibzaade Baba Zorawar Singh and Baba Fateh Singh, the youngest sons of the tenth guru of the Sikh order, Guru Gobind Singh Ji. Both of these brave hearts along with the mother of Guru Gobind Singh, Mata Gujri were imprisoned and forced to convert to Islam, which they refused abhorrently. This incited the governor of Zirhind, Wazir Khan to entomb them alive. For the sake of their beloved community and religion, they sacrificed their lives and accepted martyrdom. The first day of the congregation evokes the religious spirit in people through prayer and kirtans. </span></p><span data-dcnode-id="2156" instrument_node="">

</span><p class="card-text" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node=""> Home to one of the quirkiest festivals you will come around anywhere in the world - Rural Olympics, Kila Raipur is an amazing village whose love for sports and recreation is unmatched anywhere else in the country. This unique Punjabi festival is held&nbsp;in the small village is located just 15 km from the city of Ludhiana in Punjab and is like any other village of the state with huge fields of wheat and mustard that stretch as far as eyes can see, and a certain calmness and peace about it, except for the three days of February when the village transforms into a hub of sports, enthusiasm and celebration. </span></p><span data-dcnode-id="2075" instrument_node="">
</span></div><span data-dcnode-id="2073" instrument_node="">

</span><a class="btn btn-read-more" data-dcnode-id="2070" onclick="openLink(&quot;https://www.holidify.com/places/ludhiana/rural-olympics-at-qila-raipur-sightseeing-2660.html&quot;)"><span data-dcnode-id="2071" instrument_node=""> Read More </span></a><span data-dcnode-id="2069" instrument_node="">

</span></div><span data-dcnode-id="2065" instrument_node="">
</span></div><span data-dcnode-id="2063" instrument_node="">
</span><p class="px-3 px-md-0 mb-2" data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node=""> Festivals of Punjab are said to be very spiritual and lively. They are largely farmers thus land and nature are indispensable elements of their lives. From Basant Panchami, marking the arrival of springs to Punjabi Teej that celebrates womanhood and monsoons. Punjabis truly rejoice in the transitions of nature. Punjabi festivals like  Bhai Dooj celebrate familial relations whereas Chappar Mela and Jor Mela express the spirit of communal harmony and togetherness. 
 </span></p><span data-dcnode-id="2060" instrument_node="">
