</span><p data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">The cultural vivacity and richness of the state of Gujarat can well be captured through the many </span><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">festivals of Gujarat</span></strong><span data-dcnode-id="1487" instrument_node="">. The beauty of the state’s age old traditions is showcased most flawlessly through the many festivals celebrated in Gujarat all year round. Almost all the festivals of Gujarat have something unique and special about them. Some of the top-notch ceremonies/rituals of Gujarat that enjoy global fame include dahi handi breaking ceremony, Dhol beating and the very authentic and shimmering garba dance performances. A festival of Gujarat is in fact incomplete without these above mentioned very traditional, signature rituals from the state of Gujarat. Some of the top festivals of Gujarat may be listed as follows-</span></p><span data-dcnode-id="1485" instrument_node="">
</span><h3 data-dcnode-id="1481"><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gujaratexpert.com/navratri-festivals-in-gujarat/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Navratri</span></strong></a></h3><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1476"><img alt="Navratri" class="alignnone size-full wp-image-620 td-animation-stack-type0-1" data-dcnode-id="1479" height="460" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Navratri.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Navratri.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Navratri-300x197.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Navratri-457x300.jpg 457w" width="700"><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">
Navratri is a renowned festival of Gujarat celebrated around the months of October/November with immense pomp and grandeur. The fest continues for nine nights and is an invocation of MA Shakti commonly referred to as Mata Rani. Dandiya nights, garba songs, folk music, competitions, exhibitions, free flow of mouthwatering foods, large crowds dressed in their best garbs and fineries and an overall spirit of carnival make Navratri a one-of-a-kind festival in Gujarat.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><h3 data-dcnode-id="1471"><strong data-dcnode-id="1472"><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gujaratexpert.com/rann-utsav/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1474" instrument_node="">Rann Utsav</span></a></strong></h3><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><img alt="Rann Utsav Festival" class="alignnone size-full wp-image-1171 td-animation-stack-type0-1" data-dcnode-id="1469" height="461" loading="lazy" sizes="(max-width: 950px) 100vw, 950px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rann-Utsav-Festival.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rann-Utsav-Festival.jpg 950w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rann-Utsav-Festival-300x146.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rann-Utsav-Festival-768x373.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rann-Utsav-Festival-696x338.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rann-Utsav-Festival-866x420.jpg 866w" width="950"></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">The Rann Utsav has the famed Rann of Kutch as its locale. The Tourism Corporation of Gujarat Limited organizes the Utsav/fest each year around the months; February-March and the purpose remains to promote tourism in Gujarat’s Kutch region. A six day fest held on the Rann makes the barren, deserted Rann come alive with all sorts of exciting sights and sounds. Craft stalls, dance performances, folk music and songs, food stalls etc dot the Utsav ground making the Rann Utsav, a great Mahotsav indeed.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><h3 data-dcnode-id="1460"><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gujaratexpert.com/bhavnath-mahadev-mela/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Bhavnath Mahadev Fair</span></strong></a></h3><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1455"><img alt="Bhavnath Mahadev Fair" class="alignnone size-full wp-image-612 td-animation-stack-type0-1" data-dcnode-id="1458" height="466" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhavnath-Mahadev-Fair.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhavnath-Mahadev-Fair.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhavnath-Mahadev-Fair-300x200.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhavnath-Mahadev-Fair-451x300.jpg 451w" width="700"><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">
On the occasion of Mahashivratri that falls in the February month, the Bhavnath Mahadev fair is held. The Bhavnath Mahadev temple standing at the base of Girnar hills in Gujarat’s Junagadh city serves as the locale for the Bhavnath Mahadev fair. The fest features numerous colorful events. One of the interesting rituals of the fair is the procession undertaken by the Nanga Sanyasis seated on elephant back and blowing conch shells plus waving flags. The procession commences on the day of Maha Shiv puja and moves towards the fair ground. As per common beliefs, lord Shiva too participates in the Bhavnath Mahadev fair in disguise.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><h3 data-dcnode-id="1450"><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gujaratexpert.com/vautha-fair-in-gujarat/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Vautha Mela Fair</span></strong></a></h3><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1445"><img alt="Vautha Mela Fair" class="alignnone size-full wp-image-619 td-animation-stack-type0-1" data-dcnode-id="1448" height="393" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Vautha-Mela-Fair.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Vautha-Mela-Fair.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Vautha-Mela-Fair-300x168.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Vautha-Mela-Fair-534x300.jpg 534w" width="700"><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">
Vautha Fair is an important festival of Gujarat celebrated each year at Vautha; the site of confluence of Rivers Vatrak and Sabarmati. The fair is believed to be one of Gujarat’s most magnificent fairs. As per mythology, Lord Kartikeya had visited this location once upon a time. The fair continues for about 2-3 days; is held in November on the occasion of Kartik Poornima. Animal trading is one of the most notable activities taking place in the fair.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><h3 data-dcnode-id="1440"><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gujaratexpert.com/modhera-dance-festival/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Modhera Dance Festival</span></strong></a></h3><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><img alt="Modhera Dance Festival" class="alignnone size-full wp-image-615 td-animation-stack-type0-1" data-dcnode-id="1438" height="448" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Modhera-Dance-Festival.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Modhera-Dance-Festival.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Modhera-Dance-Festival-300x192.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Modhera-Dance-Festival-469x300.jpg 469w" width="700"></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434" style="text-align: justify;"><span data-dcnode-id="1435" instrument_node="">Modhera Dance festival is a world famed cultural show held at the famed Modhera Sun temple in the month of January and third week of the same each year. Various Indian classical dance forms are presented most aesthetically on the occasion of this festival. The temple set up offers the most apt environ for the rendition of the classical dances.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><h3 data-dcnode-id="1429"><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gujaratexpert.com/kite-festivals-in-gujarat/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Kite Festival</span></strong></a></h3><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1424"><img alt="Kite Festival" class="alignnone size-full wp-image-613 td-animation-stack-type0-1" data-dcnode-id="1427" height="453" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kite-Festival.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kite-Festival.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kite-Festival-300x194.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kite-Festival-464x300.jpg 464w" width="700"><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">
The kite festival of Gujarat is indeed a sight to behold. Each year on the day of Makar Sankranti; i.e. around January 14th, several colorful and uniquely shaped kites challenge the gravity by soaring high up in the air and dotting the skyline. The festival is also differently referred to as Uttarayan. Kites high up on the air battle with each other and the air around resound to triumphant cries of joy. People don special traditional attires and savor special foods on this day.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h3 data-dcnode-id="1420"><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Bhadra Purnima Fair</span></strong></h3><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><img alt="Bhadra Purnima Fair" class="alignnone size-full wp-image-611 td-animation-stack-type0-1" data-dcnode-id="1418" height="502" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhadra-Purnima-Fair.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhadra-Purnima-Fair.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhadra-Purnima-Fair-300x215.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Bhadra-Purnima-Fair-418x300.jpg 418w" width="700"></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414" style="text-align: justify;"><span data-dcnode-id="1415" instrument_node="">This three-day fair of Bhadra Purnima is held in September each year. The Ambaji temple serves as the venue for this fair. On the purnima day or Bhadrapada full moon day this amazing fair of Gujarat is held.</span></p><span data-dcnode-id="1413" instrument_node="">
</span><h3 data-dcnode-id="1410"><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Madhav Rai Fair</span></strong></h3><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><img alt="Madhav Rai Fair" class="alignnone size-full wp-image-614 td-animation-stack-type0-1" data-dcnode-id="1408" height="376" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Madhav-Rai-Fair.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Madhav-Rai-Fair.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Madhav-Rai-Fair-300x161.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Madhav-Rai-Fair-559x300.jpg 559w" width="700"></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404" style="text-align: justify;"><span data-dcnode-id="1405" instrument_node="">Madhavrai fair also referred to as Madhavpur is celebrated in vicinity to Porbandar to commemorate the divine wedding of Lord Krishna and Devi Rukmini. The fest is held in the Hindu month of Chaitra; i.e. around months March-April.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><h3 data-dcnode-id="1399"><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gujaratexpert.com/tarnetar-festival/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Tarnetar Fair</span></strong></a></h3><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1394"><img alt="Tarnetar Fair" class="alignnone size-full wp-image-618 td-animation-stack-type0-1" data-dcnode-id="1397" height="466" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Tarnetar-Fair.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Tarnetar-Fair.jpg 700w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Tarnetar-Fair-300x200.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Tarnetar-Fair-451x300.jpg 451w" width="700"><br data-dcnode-id="1396"><span data-dcnode-id="1395" instrument_node="">
Tarnetar Fair is differently referred to as Trinetreshwar Mahadev Fair and calls forth a huge crowd of tribals all gathering at Tarnetar. This fair is an interesting one as match making takes place among the young boys and girls visiting the fair. Thus a tribal boy of Gujarat would visit this fair in hope of meeting his prospective bride. According to folklore Draupadi of epic Mahabharata had selected Arjuna as her husband through a Swayamvara held at this place which was known as pPanchalPradesh in the ancient era. The fairground houses more than 300 stalls selling a plethora of goods, foods etc. folk music and dance shows will make you groove to the amazing beats and rhythm. Cattle shows, embroidery exhibitions, merry-go-round rides, competitive sports are the other attractions of the Tarnetar fair.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><h3 data-dcnode-id="1390"><strong data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Shamlaji Melo</span></strong></h3><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><img alt="Shamlaji Melo" class="alignnone size-full wp-image-1169 td-animation-stack-type0-1" data-dcnode-id="1388" height="595" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Shamlaji-Melo.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Shamlaji-Melo.jpg 900w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Shamlaji-Melo-300x198.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Shamlaji-Melo-768x508.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Shamlaji-Melo-696x460.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Shamlaji-Melo-635x420.jpg 635w" width="900"></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1385" instrument_node="">The temple of Shamlaji is located on the banks of River Meshvo and is built completely of white sandstone. The annual fair takes place within the temple premises which is also one of the most sacred pilgrimage centres. The large annual fair which takes place on the eve of Kartik Sud during 15</span><sup data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">th</span></sup><span data-dcnode-id="1382" instrument_node=""> October, is a huge and magnificent sight to behold. People visit this place to bathe in the holy water and offer their prayers. There are several items which are sold during this fair like silver ware, clothes, Metalware among other household items.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><h3 data-dcnode-id="1377"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Makar Sankranti</span></strong></h3><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><img alt="Makar Sankranti Mela" class="alignnone size-full wp-image-1166 td-animation-stack-type0-1" data-dcnode-id="1375" height="550" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Makar-Sankranti-Mela.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Makar-Sankranti-Mela.jpg 900w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Makar-Sankranti-Mela-300x183.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Makar-Sankranti-Mela-768x469.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Makar-Sankranti-Mela-696x425.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Makar-Sankranti-Mela-687x420.jpg 687w" width="900"></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Commonly known as Uttarayan the colorful festival of Makar Sankranti is observed throughout the subcontinent. In the state of Gujarat this festival witnesses a spectacular display of colorful kites in the wide open skies. In the city of Ahmedabad the Patang bazaar comes to life as early as November. On the day of the festival kite flyers gather on the roof and no roof remains empty. The entire atmosphere is encapsulated in regular and pulsating cheers of the people flying these kites.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><h3 data-dcnode-id="1367"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Rath Yatra</span></strong></h3><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><img alt="Rath Yatra, Ahmadabad" class="alignnone size-full wp-image-1167 td-animation-stack-type0-1" data-dcnode-id="1365" height="550" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rath-Yatra-Ahmadabad.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rath-Yatra-Ahmadabad.jpg 900w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rath-Yatra-Ahmadabad-300x183.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rath-Yatra-Ahmadabad-768x469.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rath-Yatra-Ahmadabad-696x425.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Rath-Yatra-Ahmadabad-687x420.jpg 687w" width="900"></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">This colorful festival is one of the most awaited annual festivals in Gujarat along with the other parts of the subcontinent. it is majorly celebrated in full enthusiasm in four of the most important places including Jagannath, which is located in Ahmedabad. The main highlight of this festival is a rich cultural procession which is led by an elegant chariot. This grand procession features three separate chariots which are dedicated to Lord Krishna, Balarama and their sister Subhadra.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><h3 data-dcnode-id="1357"><strong data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Janmashtami</span></strong></h3><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><img alt="Janmashtami Jagat Mandir Light Decoration - Dwarka" class="alignnone size-full wp-image-1164 td-animation-stack-type0-1" data-dcnode-id="1355" height="550" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Janmashtami-Jagat-Mandir-Light-Decoration-Dwarka.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Janmashtami-Jagat-Mandir-Light-Decoration-Dwarka.jpg 900w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Janmashtami-Jagat-Mandir-Light-Decoration-Dwarka-300x183.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Janmashtami-Jagat-Mandir-Light-Decoration-Dwarka-768x469.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Janmashtami-Jagat-Mandir-Light-Decoration-Dwarka-696x425.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Janmashtami-Jagat-Mandir-Light-Decoration-Dwarka-687x420.jpg 687w" width="900"></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Popularly known as ‘Krishna Jayanti’ this day is celebrated as the birthday of Lord Krishna. His birth is celebrated by decorating Krishna idols and temples with great fun and vigor. People of Gujarat treat this festival as one of the grandest event where all the females treat the idol of Lord Krishna as their own child. Different sweet dishes and Prasadam are prepared with an aim of honoring the almighty lord. Women of the common household observe fasting for the entire day and eat food which has been prepared 2 days in advance.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><h3 data-dcnode-id="1347"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Chitra Vichitra Mela</span></strong></h3><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><img alt="Chitra Vichitra Mela" class="alignnone size-full wp-image-1163 td-animation-stack-type0-1" data-dcnode-id="1345" height="550" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Chitra-Vichitra-Mela.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Chitra-Vichitra-Mela.jpg 900w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Chitra-Vichitra-Mela-300x183.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Chitra-Vichitra-Mela-768x469.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Chitra-Vichitra-Mela-696x425.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Chitra-Vichitra-Mela-687x420.jpg 687w" width="900"></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">This Adivasi fair pursue to all aspects of Indian civilization and culture. This festival kick starts during the eve of new moon when the women of the city gather together by the river and mourn for their dead relatives throughout the night. The entire fair is a generous representation of eclectic colors and dazzling procedures. People douse themselves in their cultural attire complete with a saffron colored turban and Ghaghras while covering them entirely in heavy jewellery. The non stop beating of the drums and the continuous singing of folk songs fill the entire air in deep enthusiasm.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><h3 data-dcnode-id="1337"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Ravechi Fair</span></strong></h3><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><img alt="Ravechi Fair" class="alignnone size-full wp-image-1168 td-animation-stack-type0-1" data-dcnode-id="1335" height="550" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Ravechi-Fair.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Ravechi-Fair.jpg 900w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Ravechi-Fair-300x183.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Ravechi-Fair-768x469.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Ravechi-Fair-696x425.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Ravechi-Fair-687x420.jpg 687w" width="900"></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Every year, during the month of September, the stark white salt desert of Kutch comes to life with the oncoming of the famous Ravechi fair. This festival draws a large number of crowds who are on a Hindu pilgrimage and gather from different parts of the world as one. This fair involves color filled cultural dances, folk songs performances and representation of traditional life in Gujarat. Panning for duration of 2 days Ravechi fair showcases a wonderful life of Gujarati locals. There is also an art workshop and exhibition which successfully showcases the core nature of the Gujarati tradition.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><h3 data-dcnode-id="1327"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Kavant Fair</span></strong></h3><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><img alt="Kavant Fair" class="alignnone size-full wp-image-1165 td-animation-stack-type0-1" data-dcnode-id="1325" height="550" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kavant-Fair.jpg&amp;raw" srcset="https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kavant-Fair.jpg 900w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kavant-Fair-300x183.jpg 300w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kavant-Fair-768x469.jpg 768w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kavant-Fair-696x425.jpg 696w, https://www.gujaratexpert.com/blog/wp-content/uploads/2017/08/Kavant-Fair-687x420.jpg 687w" width="900"></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">This tribal festival is celebrated with great pomp and show in mostly the tribal regions of Gujarat. Conducted after the eve of Holi this is a two days event where numerous tourists from in and around the subcontinent visit Gujarat to witness it. This fair is a harvesting festival and during this time people dance in rhythm and celebrate the time with great fun. Numerous artists and musicians flock together as one to this state and showcase their talents here. The performers paint their bodies in attractive colors and unique designs which are made from ash and rice and also create a fun human pyramid.</span></p><span data-dcnode-id="1320" instrument_node="">
