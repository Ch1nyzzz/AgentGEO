</span><div class="mks_toggle_heading" data-dcnode-id="490"><span data-dcnode-id="493" instrument_node="">United States background and overview</span><i class="fa fa-plus" data-dcnode-id="492"></i><i class="fa fa-minus" data-dcnode-id="491"></i></div><span data-dcnode-id="489" instrument_node="">
</span><div class="mks_toggle_content" data-dcnode-id="484"><div class="carni-text-spacer" data-dcnode-id="488"></div><span data-dcnode-id="487" instrument_node="">
Britain's American colonies broke with the mother country in 1776 and were recognized as the new nation of the United States of America following the Treaty of Paris in 1783. During the 19th and 20th centuries, 37 new states were added to the original 13 as the nation expanded across the North American continent and acquired a number of overseas possessions. The two most traumatic experiences in the nation's history were the Civil War (1861-65), in which a northern Union of states defeated a secessionist Confederacy of 11 southern slave states, and the Great Depression of the 1930s, an economic downturn during which about a quarter of the labor force lost its jobs. Buoyed by victories in World Wars I and II and the end of the Cold War in 1991, the US remains the world's most powerful nation state. Since the end of World War II, the economy has achieved relatively steady growth, low unemployment and inflation, and rapid advances in technology.
</span><div class="carni-text-spacer" data-dcnode-id="486"></div><span data-dcnode-id="485" instrument_node="">
