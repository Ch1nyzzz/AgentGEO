</span><h2 class="clearfix" data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Folk Music Festivals in Scotland</span></h2><span data-dcnode-id="2076" instrument_node="">
</span><div class="adBox" data-dcnode-id="2069"><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2071"><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ardersierfolkclub.org.uk/Festival%2520Programme.html"><span data-dcnode-id="2074" instrument_node=""> </span><img data-dcnode-id="2073" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ukfolkfestivals.co.uk/images/ardersier-2020.jpg&amp;raw"></a></p><span data-dcnode-id="2070" instrument_node="">
</span></div><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">The music at Scotland's festivals is as good as that anywhere in the world.  The artists have a real passion for folk music. 
	For some rousing foot-tapping entertainment, Scottish festivals are the place to be.  There is often a celidh as well. They vary 
	from marque-sized events to multi-stage extraveganzas. Fiddles and bagpipes are not compulsary, although you can of course find 
	festivals where they are heavily featured.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Remember, we can't check every ticket price, unfortunately, as some are not listed until closer to the event, so we advise you to check the prices yourself.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2058"><b data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Click on a festival name and it expands to reveal the full details</span></b><span data-dcnode-id="2059" instrument_node=""> (like the first one).</span></p><span data-dcnode-id="2057" instrument_node="">
</span><p class="monthly clearfix" data-dcnode-id="2054"><a data-dcnode-id="2055" id="January"><span data-dcnode-id="2056" instrument_node="">Taking place in January</span></a></p><div class="accordionButton" data-dcnode-id="2049" id="open"><h3 data-dcnode-id="2050"><span data-dcnode-id="2053" instrument_node="">Celtic Connections </span><span data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node=""> - 20th Jan 2022 - Glasgow, Strathclyde</span></span></h3></div><div class="accordionContent" data-dcnode-id="2018"><div class="righty" data-dcnode-id="2036"><p data-dcnode-id="2037"><span data-dcnode-id="2048" instrument_node="">Massive event in Glasgow, spanning 18 days! If it has a Celtic connection, it's probably on show here. Multiple venues. There's not enough space to describe everything, just settle for knowing there are 2,100 artists, 300 events, 20 venues. - yes, you read that right!</span><br data-dcnode-id="2047"><br data-dcnode-id="2046"><span data-dcnode-id="2045" instrument_node="">This is HUGE.</span><br data-dcnode-id="2044"><br data-dcnode-id="2043"><b data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Recently</span></b><span data-dcnode-id="2040" instrument_node=""> we've noticed the site doesn't always open on our pop-up window. Try this link </span><a data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.celticconnections.com/"><span data-dcnode-id="2039" instrument_node="">Celtic Connections</span></a></p></div><div class="lefty" data-dcnode-id="2019"><p data-dcnode-id="2020"><span data-dcnode-id="2035" instrument_node="">Location: Glasgow</span><br data-dcnode-id="2034"><span data-dcnode-id="2033" instrument_node="">Date: Thursday 20th January 2022 for 18 day(s)</span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node="">Full Price: £40</span><br data-dcnode-id="2030"><span data-dcnode-id="2029" instrument_node="">Contact for info: </span><br data-dcnod .</span><br data-dcnode-id="1899"><br data-dcnode-id="1898"><span data-dcnode-id="1897" instrument_node="">Organised by SEALL, the festival hosts around 30 top quality events in music and innovative theatre, with a community-led fringe programme of house concerts, charity cafes, environmental days, food and drink, art exhibitions and ceilidhs.</span></p></div><div class="lefty" data-dcnode-id="1876"><p data-dcnode-id="1877"><span data-dcnode-id="1894" instrument_node="">Location: Skye</span><br data-dcnode-id="1893"><span data-dcnode-id="1892" instrument_node="">Date: Tuesday 22nd March 2022 for 10 day(s)</span><br data-dcnode-id="1891"><span data-dcnode-id="1890" instrument_node="">Full Price: £</span><br data-dcnode-id="1889"><span data-dcnode-id="1888" instrument_node="">Also available: Individual event tickets</span><br data-dcnode-id="1887"><span data-dcnode-id="1886" instrument_node="">Contact for info: info@seall.co.uk</span><br data-dcnode-id="1885"><span data-dcnode-id="1884" instrument_node="">Website: </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seall.co.uk/skye-fest/"><span data-dcnode-id="1883" instrument_node="">www.seall.co.uk/skye-fest/</span></a><br data-dcnode-id="1881"><span data-dcnode-id="1880" instrument_node="">County: Inner Hebrides</span><br data-dcnode-id="1879"><span data-dcnode-id="1878" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1874"><div class="accordionButton" data-dcnode-id="1869"><h3 data-dcnode-id="1870"><span data-dcnode-id="1873" instrument_node="">Hawick Reivers Festival </span><span data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node=""> - 25th Mar 2022 - Hawick, Borders</span></span></h3></div><div class="accordionContent" data-dcnode-id="1843"><div class="righty" data-dcnode-id="1863"><p data-dcnode-id="1864"><span data-dcnode-id="1868" instrument_node="">Hawick steps back in time to the 16th century and through drama, song, poetry and re-enactments invites visitors and towns-people alike to experience life in this turbulent, often violent, but very colourful period in our history.</span><br data-dcnode-id="1867"><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node="">A full programme of activities is planned many of which are free and include demonstrations of falconry, archery and horsemanship, a look at craftsmen of the times and dramatic re-enactments. There are also concerts, guided walks, historical lectures and many other activities.</span></p></div><div class="lefty" data-dcnode-id="1844"><p data-dcnode-id="1845"><span data-dcnode-id="1862" instrument_node="">Location: Hawick</span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">Date: Friday 25th March 2022 for 3 day(s)</span><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">Full Price: £</span><br data-dcnode-id="1857"><span data-dcnode-id="1856" instrument_node="">Also available: Mainly individual event tickets</span><br data-dcnode-id="1855"><span data-dcnode-id="1854" instrument_node="">Contact for info: Info@hawickreivers.com</span><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">Website: </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hawickreivers.com/"><span data-dcnode-id="1851" instrument_node="">www.hawickreivers.com/</span></a><br data-dcnode-id="1849"><span data-dcnode-id="1848" instrument_node="">County: Borders</span><br data-dcnode-id="1847"><span data-dcnode-id="1846" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1842"><p class="monthly clearfix" data-dcnode-id="1839"><a data-dcnode-id="1840" id="April"><span data-dcnode-id="1841" instrument_node="">Taking place in April</span></a></p><div class="accordionButton" data-dcnode-id="1834"><h3 data-dcnode-id="1835"><span data-dcnode-id="1 d folk arts. Features the very best traditional music from Scotland and around the world.</span><br data-dcnode-id="1615"></p></div><div class="lefty" data-dcnode-id="1594"><p data-dcnode-id="1595"><span data-dcnode-id="1612" instrument_node="">Location: Edinburgh</span><br data-dcnode-id="1611"><span data-dcnode-id="1610" instrument_node="">Date: Friday 29th April 2022 for 11 day(s)</span><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">Full Price: £</span><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">Also available: TBA - Individual event tickets</span><br data-dcnode-id="1605"><span data-dcnode-id="1604" instrument_node="">Contact for info: reception@scottishstorytellingcentre.com</span><br data-dcnode-id="1603"><span data-dcnode-id="1602" instrument_node="">Website: </span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edinburghtradfest.com/"><span data-dcnode-id="1601" instrument_node="">edinburghtradfest.com</span></a><br data-dcnode-id="1599"><span data-dcnode-id="1598" instrument_node="">County: Midlothian</span><br data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1592"><div class="accordionButton" data-dcnode-id="1587"><h3 data-dcnode-id="1588"><span data-dcnode-id="1591" instrument_node="">Highlands &amp; Islands Music and Dance Festival </span><span data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node=""> - 30th Apr 2022 - Oban, Argyll and Bute</span></span></h3></div><div class="accordionContent" data-dcnode-id="1561"><div class="righty" data-dcnode-id="1581"><p data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">The Highlands and Islands Music and Dance Festival has developed into one of Scotland's major arts festivals, and takes place annually in Oban, Scotland.</span><br data-dcnode-id="1585"><br data-dcnode-id="1584"><span y" data-dcnode-id="1545"><p data-dcnode-id="1546"><span data-dcnode-id="1551" instrument_node="">Described by The Times as One of the coolest villages in Britain.</span><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">Moniaive probably has more musical events and festivals (per head of population) than anywhere else in the country. And with a sizeable group of traditional musicians living in the village and surrounding countryside, our pub sessions are amongst the finest.</span><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">Sessions, piping competitions, workshops, and more.</span></p></div><div class="lefty" data-dcnode-id="1526"><p data-dcnode-id="1527"><span data-dcnode-id="1544" instrument_node="">Location: Moniaive</span><br data-dcnode-id="1543"><span data-dcnode-id="1542" instrument_node="">Date: Friday 6th May 2022 for 3 day(s)</span><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">Full Price: £50</span><br data-dcnode-id="1539"><span data-dcnode-id="1538" instrument_node="">Also available: Day, weekend and concert tickets from £15 - £25</span><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node="">Contact for info: info@moniaivefolkfestival.com</span><br data-dcnode-id="1535"><span data-dcnode-id="1534" instrument_node="">Website: </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.moniaivefolkfestival.com/"><span data-dcnode-id="1533" instrument_node="">www.moniaivefolkfestival.com</span></a><br data-dcnode-id="1531"><span data-dcnode-id="1530" instrument_node="">County: Dumfries and Gallowa</span><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1524"><div class="accordionButton" data-dcnode-id="1519"><h3 data-dcnode-id="1520"><span data-dcnode-id="1523" instrument_node="">Skye Live </span><span data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node=""> - 13th May 2022 - Portree, Isle Of Skye</span></span></h3></div><div class="accordionContent" data-dcnode-id="1498"><div class="righty" data-dcnode-id="1516"><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">A nice Scottish Festival, which can sell out quickly di=ue to its popularity.</span></p></div><div class="lefty" data-dcnode-id="1499"><p data-dcnode-id="1500"><span data-dcnode-id="1515" instrument_node="">Location: Portree</span><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">Date: Friday 13th May 2022 for 2 day(s)</span><br data-dcnode-id="1512"><span data-dcnode-id="1511" instrument_node="">Full Price: £89</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">Contact for info: </span><br data-dcnode-id="1508"><span data-dcnode-id="1507" instrument_node="">Website: </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.skyelive.co.uk/"><span data-dcnode-id="1506" instrument_node="">www.skyelive.co.uk/</span></a><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">County: Isle Of Skye</span><br data-dcnode-id="1502"><span data-dcnode-id="1501" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1497"><div class="accordionButton" data-dcnode-id="1492"><h3 data-dcnode-id="1493"><span data-dcnode-id="1496" instrument_node="">Knockengorroch World Ceilidh </span><span data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node=""> - 18th May 2022 - nr Dalmellington, Dumfries and Galloway</span></span></h3></div><div class="accordionContent" data-dcnode-id="1469"><div class="righty" data-dcnode-id="1489"><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">The World Ceilidh melds together the most ancient roots music with the latest cutting edge sounds. This first truly backwoods upland music fest a-dcnode-id="1422"><p data-dcnode-id="1423"><span data-dcnode-id="1430" instrument_node="">Concerts, ceilidhs, dances, clubs and sessions.</span><br data-dcnode-id="1429"><br data-dcnode-id="1428"><span data-dcnode-id="1427" instrument_node="">The Orkney Folk Festival is widely regarded as one of the most prolific and special throughout Scotland, the UK and further afield.</span><br data-dcnode-id="1426"><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">The three venues that are used the most are the Stromness Town Hall, the Stromness Academy Lecture Theatre and the Stromness Hotel's function room. Other events take place in local community centres/village halls.</span></p></div><div class="lefty" data-dcnode-id="1403"><p data-dcnode-id="1404"><span data-dcnode-id="1421" instrument_node="">Location: Stromness</span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">Date: Thursday 26th May 2022 for 4 day(s)</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">Full Price: £</span><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">Also available: Individually priced events</span><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">Contact for info: info@orkneyfolkfestival.com</span><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">Website: </span><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.orkneyfolkfestival.com/"><span data-dcnode-id="1410" instrument_node="">www.orkneyfolkfestival.com/</span></a><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">County: Orkney</span><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1401"><div class="accordionButton" data-dcnode-id="1396"><h3 data-dcnode-id="1397"><span data-dcnode-id="1400" instrument_node="">The Islay Festival of Music and Malt </span><span data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node=""> - 27th May 2022 - Isle of Islay, Southern Hebrides</span></span></h3></div><div class="accordionContent" data-dcnode-id="1367"><div class="righty" data-dcnode-id="1387"><p data-dcnode-id="1388"><span data-dcnode-id="1395" instrument_node="">A diverse programme featuring traditional music, ceilidhs, Gaelic lessons, golf, bowling and whisky tasting.</span><br data-dcnode-id="1394"><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">For the last number of years all of the Islay distilleries have held open days throughout the week of the festival, adding to the mix!</span><br data-dcnode-id="1391"><br data-dcnode-id="1390"><span data-dcnode-id="1389" instrument_node="">I've linked to the island website, so you can see how beautiful this part of Scotland is (the website developer is keen on photography). The festival link is in the menu, under Islay Festival, of course.</span></p></div><div class="lefty" data-dcnode-id="1368"><p data-dcnode-id="1369"><span data-dcnode-id="1386" instrument_node="">Location: Isle of Islay</span><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">Date: Friday 27th May 2022 for 8 day(s)</span><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">Full Price: £</span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">Also available: Individual event tickets.</span><br data-dcnode-id="1379"><span data-dcnode-id="1378" instrument_node="">Contact for info: enquiries@islayfestival.com</span><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node="">Website: </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.islayfestival.com/"><span data-dcnode-id="1375" instrument_node="">www.islayfestival.com/</span></a><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">County: Southern Hebrides</span><br data-dcnode-id="1371"><span data-dcnode-id="1370" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1366"><p class="monthly clearfix" data-dcnode-id="1363"><a data-dcnode-id="1364" id="June"><span data-dcnode-id="1365" instrument_node="">Taking place in June</span></a></p><div class="accordionButton" data-dcnode-id="1358"><h3 data-dcnode-id="1359"><span data-dcnode-id="1362" instrument_node="">HAAL Festival </span><span data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node=""> - 3rd Jun 2022 - Portsoy, Aberdeenshire</span></span></h3></div><div class="accordionContent" data-dcnode-id="1329"><div class="righty" data-dcnode-id="1349"><p data-dcnode-id="1350"><span data-dcnode-id="1357" instrument_node="">A small but popular festival.</span><br data-dcnode-id="1356"><br data-dcnode-id="1355"><span data-dcnode-id="1354" instrument_node="">Celebrating its 12th year </span><br data-dcnode-id="1353"><br data-dcnode-id="1352"><span data-dcnode-id="1351" instrument_node="">Folk at the Salmon Bothy will be celebrating our 11th Haal festival. A weekend of Sessions, Concert, Memories etc.. Great guests lined up and, hopefully, many of you, from whom we haven't heard for a while. Details on site not fully updated yet.</span></p></div><div class="lefty" data-dcnode-id="1330"><p data-dcnode-id="1331"><span data-dcnode-id="1348" instrument_node="">Location: Portsoy</span><br data-dcnode-id="1347"><span data-dcnode-id="1346" instrument_node="">Date: Friday 3rd June 2022 for 3 day(s)</span><br data-dcnode-id="1345"><span data-dcnode-id="1344" instrument_node="">Full Price: £</span><br data-dcnode-id="1343"><span data-dcnode-id="1342" instrument_node="">Also available: Individual event tickets, around £5 - £7</span><br data-dcnode-id="1341"><span data-dcnode-id="1340" instrument_node="">Contact for info: bobportsoy@gmail.com</span><br data-dcnode-id="1339"><span data-dcnode-id="1338" instrument_node="" =http%3A//www.keithfestival.com/"><span data-dcnode-id="1206" instrument_node="">www.keithfestival.com</span></a><br data-dcnode-id="1204"><span data-dcnode-id="1203" instrument_node="">County: Aberdeenshire</span><br data-dcnode-id="1202"><span data-dcnode-id="1201" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1197"><div class="accordionButton" data-dcnode-id="1192"><h3 data-dcnode-id="1193"><span data-dcnode-id="1196" instrument_node="">Scottish Traditional Boat Festival </span><span data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node=""> - 18th Jun 2022 - Portsoy, Aberdeenshire</span></span></h3></div><div class="accordionContent" data-dcnode-id="1169"><div class="righty" data-dcnode-id="1189"><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Portsoy's annual celebration of our rich maritime and cultural heritage. . . beautiful boats . . . exhilarating skiff races on the open seas . . . maritime and rural craft demonstrations . . . non-stop song and dance . . .mouth-watering food and drink and adventure at the Sports Village (not just for kids!). Not stop song and dance, with an acoustic and Scottish flavour.</span></p></div><div class="lefty" data-dcnode-id="1170"><p data-dcnode-id="1171"><span data-dcnode-id="1188" instrument_node="">Location: Portsoy</span><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">Date: Saturday 18th June 2022 for 2 day(s)</span><br data-dcnode-id="1185"><span data-dcnode-id="1184" instrument_node="">Full Price: £40</span><br data-dcnode-id="1183"><span data-dcnode-id="1182" instrument_node="">Also available: Day tickets too.</span><br data-dcnode-id="1181"><span data-dcnode-id="1180" instrument_node="">Contact for info: contact@stbfportsoy.org</span><br data-dcnode-id="1179"><span data-dcnode-id="1178" instrument_node="">Website: </span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url= _node="">Date: Friday 8th July 2022 for 3 day(s)</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">Full Price: £99</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">Contact for info: office@hebceltfest.com</span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">Website: </span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hebceltfest.com/"><span data-dcnode-id="1111" instrument_node="">www.hebceltfest.com/</span></a><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">County: Outer Hebrides</span><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1102"><div class="accordionButton" data-dcnode-id="1097"><h3 data-dcnode-id="1098"><span data-dcnode-id="1101" instrument_node="">Stonehaven Folk Festival </span><span data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node=""> - 8th Jul 2022 - Stonehaven, Aberdeenshire</span></span></h3></div><div class="accordionContent" data-dcnode-id="1071"><div class="righty" data-dcnode-id="1091"><p data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">Last year's event was virtual, so if things go wrong, they have the expertise to do it again.</span><br data-dcnode-id="1095"><br data-dcnode-id="1094"><span data-dcnode-id="1093" instrument_node="">The small NE Coastal Town of Stonehaven comes alive with a Weekend of Music and song - Concerts in the Town Hall plus workshops, Ceilidh, sessions, late-night concerts, free afternoon concerts, Family show, Aqua ceilidh, World Paper and Comb Championships, Tradition Bearers Concert and more all around the Town.</span></p></div><div class="lefty" data-dcnode-id="1072"><p data-dcnode-id="1073"><span data-dcnode-id="1090" instrument_node="">Location: Stonehaven</span><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">Date: Friday 8th July 2022 for 3 day(s)</span><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">Full Price: £0</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">Also available: TBC
Day tickets too.</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">Contact for info: admin@stonehavenfolkfestival.co.uk</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">Website: </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stonehavenfolkfestival.co.uk/"><span data-dcnode-id="1079" instrument_node="">www.stonehavenfolkfestival.co.uk</span></a><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">County: Aberdeenshire</span><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1070"><div class="accordionButton" data-dcnode-id="1065"><h3 data-dcnode-id="1066"><span data-dcnode-id="1069" instrument_node="">Tiree Music Festival </span><span data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node=""> - 8th Jul 2022 - Tiree, Inner Hebrides</span></span></h3></div><div class="accordionContent" data-dcnode-id="1041"><div class="righty" data-dcnode-id="1059"><p data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">Think picture-perfect white sands. World-famous surf. Deserted roads lined with lush greenery and wild flowers. Not forgetting more sunshine than practically anywhere else in the UK. It's little wonder that the tiny Hebridean island of Tiree is nicknamed the Hawaii of the North.</span><br data-dcnode-id="1063"><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">Add to this three separate campsites - the main campsite, family campsite and campervan area - and the now famous Community Village with its many stalls and events, and TMF guarantees you an authentic flavour of Tiree. Which, in a nutshell, is the whole idea behind the festival.</span></p></div><div class="lefty" data-dcnode-id="1042"><p data-dcnode-id="1043"><span data-dcnode-id="1058" instrument_node="">Location: Tiree</span><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">Date: Friday 8th July 2022 for 3 day(s)</span><br data-dcnode-id="1055"><span data-dcnode-id="1054" instrument_node="">Full Price: £95</span><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">Contact for info: </span><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">Website: </span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tireemusicfestival.co.uk/"><span data-dcnode-id="1049" instrument_node="">tireemusicfestival.co.uk/</span></a><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node="">County: Inner Hebrides</span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1040"><div class="accordionButton" data-dcnode-id="1035"><h3 data-dcnode-id="1036"><span data-dcnode-id="1039" instrument_node="">Newton Stewart &amp; Minnigaff Traditional Music &amp; Dance Festival </span><span data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node=""> - 9th Jul 2022 - Newton Stewart &amp; Minnigaff, Dumfries &amp; Galloway</span></span></h3></div><div class="accordionContent" data-dcnode-id="1011"><div class="righty" data-dcnode-id="1029"><p data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">A family-run festival in two towns separated by a river.</span><br data-dcnode-id="1033"><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">After last year's restrictions, we wish them luck for a great event.</span></p></div><div class="lefty" data-dcnode-id="1012"><p data-dcnode-id="1013"><span data-dcnode-id="1028" instrument_node="">Location: Newton Stewart &amp; Minnigaff</span><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node="">Date: Saturday 9th July 2022 for 3 day(s)</span><br data-dcnode-id="1025"><span data-dcnode-id="1024" instrument_node="">Full Price: £40</span><br data-dcnode-id="1023"><span data-dcnode-id="1022" instrument_node="">Contact for info: 01671 404924</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">Website: </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tradmusic.com/"><span data-dcnode-id="1019" instrument_node="">www.tradmusic.com</span></a><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">County: Dumfries &amp; Galloway</span><br data-dcnode-id="1015"><span data-dcnode-id="1014" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="1010"><div class="accordionButton" data-dcnode-id="1005"><h3 data-dcnode-id="1006"><span data-dcnode-id="1009" instrument_node="">Eilean Dorcha Festival </span><span data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node=""> - 22nd Jul 2022 - Liniclate Machair, Isle of Benbecula, Outer Hebrides</span></span></h3></div><div class="accordionContent" data-dcnode-id="981"><div class="righty" data-dcnode-id="999"><p data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">Now in its fifth year, EDF is working in conjunction with charitable and educational bodies to identify emerging talent on the island and to give them a platform to perform.  There will also be opportunities to learn about digital media, the Gaelic language and to listen to local and visiting musicians.</span><br data-dcnode-id="1003"><br data-dcnode-id="1002"><span data-dcnode-id="1001" instrument_node="">EDF is about a  lot more than just the music. We will also be showcasing "Made in the Hebrides" products.</span></p></div><div class="lefty" data-dcnode-id="982"><p data-dcnode-id="983"><span data-dcnode-id="998" instrument_node="">Location: Liniclate Machair, Isle of Benbecula</span><br data-dcnode-id="997"><span data-dcnode-id="996" instrument_node="">Date: Friday 22nd July 2022 for 3 day(s)</span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">Full Price: £95</span><br data-dcnode-id="993"><span data-dcnode-id="992" instrument_node="">Contact for info: </span><br data-dcnode-id="991"><span data-dcnode-id="990" instrument_node="">Website: </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.edffestival.com/"><span data-dcnode-id="989" instrument_node="">www.edffestival.com</span></a><br data-dcnode-id="987"><span data-dcnode-id="986" instrument_node="">County: Outer Hebrides</span><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="980"><div class="accordionButton" data-dcnode-id="975"><h3 data-dcnode-id="976"><span data-dcnode-id="979" instrument_node="">Speyfest </span><span data-dcnode-id="977"><span data-dcnode-id="978" instrument_node=""> - 22nd Jul 2022 - Fochabers, Morayshire</span></span></h3></div><div class="accordionContent" data-dcnode-id="948"><div class="righty" data-dcnode-id="966"><p data-dcnode-id="967"><span data-dcnode-id="974" instrument_node="">25th Anniversary!</span><br data-dcnode-id="973"><br data-dcnode-id="972"><span data-dcnode-id="971" instrument_node="">At the end of July, the playing fields on East Street in the Moray town of Fochabers will be home to the 23rd annual Speyfest, three days of the best in traditional and contemporary Celtic music.</span><br data-dcnode-id="970"><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">Concerts, Ceilidhs and Stomps. Free to enter Craft Fair and Festival Clubs. Some of the biggest names from the world of traditional and contemporary Celtic music.</span></p></div><div class="lefty" data-dcnode-id="949"><p data-dcnode-id="950"><span data-dcnode-id="965" instrument_node="">Location: Fochabers</span><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">Date: Friday 22nd July 2022 for 3 day(s)</span><br data-dcnode-id="962"><span data-dcnode-id="961" instrument_node="">Full Price: £70</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">Contact for info: info@speyfest.com</span><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">Website: </span><a data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.speyfest.com/"><span data-dcnode-id="956" instrument_node="">www.speyfest.com/</span></a><br data-dcnode-id="954"><span data-dcnode-id="953" instrument_node="">County: Morayshire</span><br data-dcnode-id="952"><span data-dcnode-id="951" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="947"><div class="accordionButton" data-dcnode-id="942"><h3 data-dcnode-id="943"><span data-dcnode-id="946" instrument_node="">Traditional Singing Weekend </span><span data-dcnode-id="944"><span data-dcnode-id="945" instrument_node=""> - 22nd Jul 2022 - Cullerlie, Aberdeenshire</span></span></h3></div><div class="accordionContent" data-dcnode-id="919"><div class="righty" data-dcnode-id="939"><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The Festival is a unique celebration, bringing together outstanding traditional singers from Scotland, England, and Ireland. The event is especially for those who like to hear, enjoy, and join in unaccompanied traditional singing. Essentially informal, friendly and non-competitive, it will be just the place to encourage the young and less experienced as well as the old hands. The weekend includes ceilidhs featuring the guest singers, singarounds for everyone who can join in, workshops, craft demonstrations and a talk.</span></p></div><div class="lefty" data-dcnode-id="920"><p data-dcnode-id="921"><span data-dcnode-id="938" instrument_node="">Location: Cullerlie</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">Date: Friday 22nd July 2022 for 3 day(s)</span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">Full Price: £</span><br data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">Also available: TBA</span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">Contact for info: 01224 645486</span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">Website: </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.abdn.ac.uk/elphinstone/public-engagement/cullerlie.php"><span data-dcnode-id="927" instrument_node="">www.abdn.ac.uk/elphinstone/public-engagement/cullerlie.php</span></a><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">County: Aberdeenshire</span><br data-dcnode-id="923"><span data-dcnode-id="922" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="918"><div class="accordionButton" data-dcnode-id="913"><h3 data-dcnode-id="914"><span data-dcnode-id="917" instrument_node="">Celtic Gathering Isle of Man  </span><span data-dcnode-id="915"><span data-dcnode-id="916" instrument_node=""> - 25th Jul 2022 - Peel, Isle of Man</span></span></h3></div><div class="accordionContent" data-dcnode-id="873"><div class="righty" data-dcnode-id="893"><p data-dcnode-id="894"><span data-dcnode-id="912" instrument_node="">Yn Chruinnaght Celtic Gathering.</span><br data-dcnode-id="911"><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">45th year!</span><br data-dcnode-id="908"><br data-dcnode-id="907"><span data-dcnode-id="906" instrument_node="">Based in Peel, Yn Chruinnaght Celtic Gathering is a celebration of Manx </span><br data-dcnode-id="905"><span data-dcnode-id="904" instrument_node="">culture and the relationship between the Isle of Man and the other five </span><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">Celtic countries (Scotland, Ireland, Wales, Cornwall and Brittany).</span><br data-dcnode-id="901"><br data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">Musicians, singers and dancers!! Concerts, ceilis, sessions, free events and workshops.</span><br data-dcnode-id="898"><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">As in previous years we are posting this under Scotland and Ireland due to its Celtic theme, as we don't have a separate Isle of Man page.</span><br data-dcnode-id="895"></p></div><div class="lefty" data-dcnode-id="874"><p data-dcnode-id="875"><span data-dcnode-id="892" instrument_node="">Location: Peel</span><br data-dcnode-id="891"><span data-dcnode-id="890" instrument_node="">Date: Monday 25th July 2022 for 6 day(s)</span><br data-dcnode-id="889"><span data-dcnode-id="888" instrument_node="">Full Price: £</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">Also available: Day concert tickets too</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">Contact for info: info@ynchruinnaght.com</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">Website: </span><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.celticgathering.im/"><span data-dcnode-id="881" instrument_node="">www.celticgathering.im</span></a><br data-dcnode-id="879"><span data-dcnode-id="878" instrument_node="">County: Isle of Man</span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">Country: Scotland</span></p></div></div><br class="clearfix" data-dcnode-id="872"><div class="accordionButton" data-dcnode-id="867"><h3 data-dcnode-id="868"><span data-dcnode-id="871" instrument_node="">Belladrum Tartan Heart Festival  </span><span data-dcnode-id="869"><span data-dcnode-id="870" instrument_node=""> - 28th Jul 2022 - Beauly, IV4 7BA, Invernessshire</span></span></h3></div><div class="accordionContent" data-dcnode-id="842"><div class="righty" data-dcnode-id="862"><p data-dcnode-id="863"><span data-dcn
