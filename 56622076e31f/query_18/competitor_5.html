</span><h1 data-dcnode-id="2391"><span data-dcnode-id="2395" instrument_node="">Festivals in </span><span data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Assam</span></span><span data-dcnode-id="2392" instrument_node=""> </span></h1><span data-dcnode-id="2390" instrument_node="">
</span><div class="ac show" data-dcnode-id="2346"><span data-dcnode-id="2389" instrument_node="">
</span><div class="interesting-facts gap" data-dcnode-id="2375"><span data-dcnode-id="2388" instrument_node="">
</span><div class="interesting-facts-left" data-dcnode-id="2380"><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Assam is a very colorful state in Eastern India, the localites celebrate the  fairs and festivals in Assam with true vigour, pomp and show. The grandeur and energy of the celebrations here offer a different level of enjoyment to the spectators. The major festivals and fairs in Assam can be categorized into Agricultural Festivals, Religious Festivals and Folk Festivals. Some of the major festivities in Assam include Bohag Bihu, Kati Bihu, Magh Bihu, Ambubachi, Biswakarma Puja, Doljatra, Janmastami, Rasa Puja, Barpeta, sabha, Bhel Diya Festival, Me-Dum-Me-Phi, Kamrup Bhatheli and many more. </span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Assam is such a state of the North East India where the population comprises of people belonging to different communities and tribes. People belonging to different traditions and castes equally participate in these festivals which make the occasions even more appealing. The colorful festivals of Assam reflect the rich heritage that the state holds and the lifestyle of the people living here. Among the many cultural festivals celebrated in Assam, Bihu festival is the most important of all and is celebrated with great reverence and merriment in the state. There are mainly three types of Bihu festivals that are being celebrated in a year namely, the Bhogali Bihu, Rongali Bihu and the Kongali Bihu. The Rongali Bihu is the most important of all the other types of Bihu and is held during the spring season. It is known as the agricultural festival of Assam where young boys and girls dance while the women sing songs. People dress up in new clothes, and exotic dishes are prepared during the festival. </span></p><span data-dcnode-id="2381" instrument_node="">
</span></div><span data-dcnode-id="2379" instrument_node="">
</span><div class="interesting-facts-right" data-dcnode-id="2377"><img alt="Festivals in Assam" data-dcnode-id="2378" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/states/assam/images/Fairs-%26-Festivals-in-Assam.jpg&amp;raw"></div><span data-dcnode-id="2376" instrument_node="">
</span></div><span data-dcnode-id="2374" instrument_node="">
</span><div class="interesting-facts gap" data-dcnode-id="2348"><span data-dcnode-id="2373" instrument_node="">
</span><div class="interesting-facts-left" data-dcnode-id="2362"><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">The harvesting festival is the Bhogali festival that takes place in January and is again a significant celebration of the state. The main attraction of this event is the buffalo fight. In the Kangali Bihu festival, worshiping the tulsi plant is the main ritual. </span></p><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Another biggest festival of the state is the Tea Festival which is mainly celebrated in the Jorhat City . This festival is organized in the month of November by the Tourism Corporation of the State. If you want to experience the taste of fresh Assam tea then this festival invites participation from your end. The Guwahati tea auction center is the biggest highlight of this festival. </span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">Among the religious festivals of the state, the Ambubachi Mela is the most famous one which is held in the Kamakhya Mandir of Guwahati. This fair has got a special significance as per the Hindu beliefs and traditions. Pilgrims from all over the world visit the city to take part in this mela every year during the monsoon months. The Brahmaputra Beach Festival is another occasion that is organized by the Assam Boat Racing and Rowing Association.  </span></p><span data-dcnode-id="2363" instrument_node="">
</span></div><span data-dcnode-id="2361" instrument_node="">
</span><div class="interesting-facts-right interesting-facts-left" data-dcnode-id="2350"><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node=""> Several cultural programs and adventure sports are arranged during this event that makes the occasion even more enjoyable.</span></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">Apart from these there are many other must see festivals of the state which include the Elephant festival, Dehing Patkai Festival, Rongali Utsav, Jonbeel Mela, Rajini Gabra and Harni Gabra and the Rongker and Chomangkan festivals.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node=""> All these different festivals bring out the varied colors and significance of the different communities living in the state. Do get indulged in the festive mood of the state and plan a cultural tour in Assam to experience the thrill and magic of the place. </span></p><span data-dcnode-id="2351" instrument_node="">
