rstand the definition of cultural imperialism you will understand when it started. Essentially it started when the first group of people or pre-humans, had some superior or different or alternative technology which was considered valuable by them and those around them. When those around them begin to adopt that same technology to use it, that was the beginning of cultural imperialism. In essence it is probably since the first tribe of pre-human apes picked up sticks to attack some predator or other animal. Other tribes saw what value there was in this stick technology, and begin to use it. Or it may be that they discovered some other technology such as fire or washing their food, the value of wearing a hat, or a better way of scaring animals into a trap. In any case once others begin to be influenced by this technology, that was the beginning of cultural imperialism.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="5914" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="5915" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="5916" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="5930" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="5952" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="5953" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="5963" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer ition: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="5589" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="5590" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="5591" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5612" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5613" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5614" instrument_node="">Cultural imperialism started in the Stone Age when one tribe dominated another.</span></span></p><span data-dcnode-id="5611" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5608" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5609" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5610" instrument_node="">Cultural imperialism is defined as one “culture of a large and powerful tribe, country, organization, etc. having a great influence on another less powerful tribe, country, organisation etc." The modern significance of cultural imperialism includes economic globalisation, media proliferation and instant worldwide communication becoming the norm. Cultural imperialism is perhaps more significant now than ever before.</span></span></p><span data-dcnode-id="5607" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5604" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5605" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5606" instrument_node="">Less economically prominent cultures essentially import culture from wealthier countries -- chiefly Wes</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5592" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5593" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5594" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="5595" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="5596" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="5601" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="5602" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="5603" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="5597" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="5598"><svg data-dcnode-id="5599" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="5600" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="5560" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="5561" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="5562"><span class="q-box qu-userSelect--text" data-dcnode-id="5563" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5584" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5585" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5586" instrument_node="">Cultural imperialism started in the Stone Age when one tribe dominated another.</span></span></p><span data-dcnode-id="5583" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5580" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5581" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5582" instrument_node="">Cultural imperialism is defined as one “culture of a large and powerful tribe, country, organization, etc. having a great influence on another less powerful tribe, country, organisation etc." The modern significance of cultural imperialism includes economic globalisation, media proliferation and instant worldwide communication becoming the norm. Cultural imperialism is perhaps more significant now than ever before.</span></span></p><span data-dcnode-id="5579" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5576" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5577" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5578" instrument_node="">Less economically prominent cultures essentially import culture from wealthier countries -- chiefly Western countries, which have the economic means necessary to produce a majority of the world's cultural media -- mostly via the global transmission of media. As one society exerts cultural influence over another, the latter society adopts its customs, fashions, philosophies, worldviews and general ways of life. Under the imposition of another culture, the “lesser” culture is thought to lose some of its own cultural identity in the process.</span></span></p><span data-dcnode-id="5575" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5572" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5573" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5574" instrument_node="">Herbert Schiller's book “Communication and Cultural Domination” first coined the phrase in 1976, the modern concept of cultural imperialism is often used to refer to the idea of America exerting cultural influence over the rest of the world, with a particularly powerful imposition on Third World countries. Examples of American cultural imperialism include brand name products, mass-produced food and, perhaps of primary importance, video media. While this may come with some positive effects -- showing women's rights or racial equality in a positive light, for example -- it also tends to paint America as a leader or hero, potentially exerting a negative effect on the viewer's perception of his own country or other non-American cultures.</span></span></p><span data-dcnode-id="5571" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5568" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5569" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5570" instrument_node="">Although cultural imperialism may also extend to the development of governmental and economic systems, it largely focuses on the assimilation of media, including literature, film, television, music and internet content, among other forms. This concept, known as media imperialism, refers to a situation in which a culture is chiefly exposed to the media interests of another society rather than their own. This occurs without reciprocation -- the affected country or culture's media is not exported in turn to the influencing country in any significant fashion, making media and cultural imperialism a strictly one-way street.</span></span></p><span data-dcnode-id="5567" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5564" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5565" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5566" instrument_node="">Some point out that the concept assumes that human beings lack free will, painting them as mindlessly assimilating what they absorb through media without retaining their own personal frame of reference. Other critics note that while economic aspects of cultural imperialism can be concretely measured, the cultural component is subjective and difficult or impossible to quantify.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="5497" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="5498" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="5499" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="5513" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="5535" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="5536" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="5546" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="5547" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--w box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4279" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4284" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4285" instrument_node="">(</span></span><span data-dcnode-id="4282" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4283" instrument_node="">imperialism</span></span><span data-dcnode-id="4280" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4281" instrument_node=""> is a policy of extending a country's power and influence through diplomacy or military force).</span></span></p><span data-dcnode-id="4278" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4275" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4276" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4277" instrument_node="">Cultural imperialism was around long before the United States became a world power. In its broadest strokes, imperialism describes the ways that one nation asserts its power over another. Just as imperial Britain economically ruled the American colonists, so did Britain strongly influence the culture of the colonies. The culture was still a mix of nationalities—many Dutch and Germans settled as well—but the ruling majority of ex-Britons led British culture to generally take over.</span></span></p><span data-dcnode-id="4274" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4271" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4272" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4273" instrument_node="">Today, cu</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4259" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4260" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4261" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4262" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4263" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4268" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4269" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4270" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4264" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4265"><svg data-dcnode-id="4266" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4267" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4231" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4232" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4233"><span class="q-box qu-userSelect--text" data-dcnode-id="4234" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4247" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4252" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4253" instrument_node="">(</span></span><span data-dcnode-id="4250" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4251" instrument_node="">imperialism</span></span><span data-dcnode-id="4248" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4249" instrument_node=""> is a policy of extending a country's power and influence through diplomacy or military force).</span></span></p><span data-dcnode-id="4246" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4243" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4244" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4245" instrument_node="">Cultural imperialism was around long before the United States became a world power. In its broadest strokes, imperialism describes the ways that one nation asserts its power over another. Just as imperial Britain economically ruled the American colonists, so did Britain strongly influence the culture of the colonies. The culture was still a mix of nationalities—many Dutch and Germans settled as well—but the ruling majority of ex-Britons led British culture to generally take over.</span></span></p><span data-dcnode-id="4242" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4235" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4240" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4241" instrument_node="">Today, cultural imperialism tends to describe the United States’ role as a cultural superpower throughout the world. American movie studios are generally much more successful than their foreign counterparts not only because of their business models but also because the concept of Hollywood has become one of the modern worldwide movie business’s defining traits. Multinational, nongovernmental corporations can now drive global culture. This is neither entirely good nor entirely bad. On one hand, foreign cultural institutions can adopt successful American business models, and corporations are largely willing to do whatever makes them the most money in a particular market—whether that means giving local people a shot at making movies, or making multicultural films such as 2008’s </span></span><span data-dcnode-id="4238" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4239" instrument_node="">Slumdog Millionaire</span></span><span data-dcnode-id="4236" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4237" instrument_node="">. However, cultural imperialism has potential negative effects as well. From a spread of Western ideals of beauty to the possible decline of local cultures around the world, cultural imperialism can have a quick and devastating effect.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4163" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4164" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4165" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4179" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4201" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4202" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4212" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4213" style="box-sizing: border-box; position: relative;"><button aria-label="3 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6e tom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3511" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3512" instrument_node="">So, the most politically and economically powerful country on Earth is the </span></span><span data-dcnode-id="3509" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3510" instrument_node="">United States of America</span></span><span data-dcnode-id="3507" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3508" instrument_node="">, they have encountered free trade as exemplified by their belligerence against the </span></span><span data-dcnode-id="3505" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3506" instrument_node="">Union of Soviet Socialist Republics</span></span><span data-dcnode-id="3503" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3504" instrument_node=""> throughout most of the 20th century, commerce and communism don't mix. Cultural products from the United States are everywhere and it is massively helped by the fact that the British Empire, the largest empire in history, sowed the seeds of the English language in every continent and the U.S. has further expanded it leading to English becoming the lingua franca of humanity (a position the French language used to have).</span></span></p><span data-dcnode-id="3501" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3498" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3499" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3500" instrument_node="">None of that would be possible without globalization and globalization led U.S. culture to become dominant which led to U.S. cultural imperialism; people wanting to imitate U.S. culture which includes learning English, but also adopting mannerisms and ideas from the U.S. as heard and seen on the radio, in movies, TV shows, and videogames that for decades have dominated global markets among other things in trying to imitate them.</span></span></p><span data-dcnode-id="3497" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3494" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3495" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3496" instrument_node="">However, French culture is very dominant in Africa where it does what the U.S. does everywhere. Ironically France tries its best to fight against U.S. cultural imperialism in France and Europe at large via the European Union. Other regional powers also have their cultures as dominant around them, such as mainland China in East and Southeast Asia, Mexico in Hispanic America, Australia in Oceania, etc. Globalization strengthen this, leading to a positive feeding loop keeping them on top.</span></span></p><p class="q-text qu-bold qu-pb--small" data-dcnode-id="3492" style="box-sizing: border-box; margin-top: 1em;"><span data-dcnode-id="3493" instrument_node="">Footnotes</span></p><div class="q-text qu-mb--small qu-wordBreak--break-word" data-dcnode-id="3481" id="iIZNp" style="box-sizing: border-box;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3488" href="#cite-iIZNp" style="box-sizing: border-box; border-radius: inherit;" target="_top"><span data-dcnode-id="3491" instrument_node="">[</span><span data-dcnode-id="3490" instrument_node="">1</span><span data-dcnode-id="3489" instrument_node="">] </span></a><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 K near-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3292" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3293" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3294" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3295" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3300" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3301" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3302" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3296" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3297"><svg data-dcnode-id="3298" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3299" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3236" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3237" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3238"><span class="q-box qu-userSelect--text" data-dcnode-id="3239" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3283" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3284" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3285" instrument_node="">It’s the phenomenon where a given culture overrules and becomes dominant away from the nation/region of it’s creation. Cultural Imperialism is something of a loaded term, however.</span></span></p><span data-dcnode-id="3282" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3279" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3280" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3281" instrument_node="">The classic example would be the use of French as the language of court in Europe for a very long time. If you wanted to be taken seriously, you had to be fluent in French, because all the Serious, Important, Credible people spoke it as a common tongue. France was seen as the culture hub of civilisation, and therefore if you wanted to appear as anything other than a savage, you’d want to import some French stuff to appear sophisticated.</span></span></p><span data-dcnode-id="3278" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3275" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3276" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3277" instrument_node="">The ancient Chinese did similar things, with their culture supplanting and becoming dominant over the nations of it’s neighbours. They did things in the Chinese way rather than the local way. They used Chinese letters, read chinese books, read Chinese news, sort of thing.</span></span></p><span data-dcnode-id="3274" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3271" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3272" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3273" instrument_node="">Of course these days the big Cultural Hegemon is America. We all speak English if we’re educated, listen to American music, have American companies tell us what products to buy, watch American movies. My mother gets very cross if I ever use the term ‘faucet’ rather than ‘tap’, because the former is seen as something of an American term for the same thing, and that’s cultural imperialism. I’m referring to an Australian thing by it’s American name. Like the American thing is the first, original, REAL term, and the other term’s just a local variation on the PROPER word. Historically speaking, we can see Cultural Imperialism in the adoption of Western uniforms for the armies of China and Japan. These were seen as proper, modern, sensible uniforms for armies using modern methods, rather than the quaint and primitive ways they used to before civilisation was brought to their nations. The Japanese stopped wearing their traditional kimonos, and started wearing suits. It’s a fashion, little more, but the CULTURE of Japan had in some respects, been replaced with the culture of a foreign power.</span></span></p><span data-dcnode-id="3270" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3267" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3268" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3269" instrument_node="">It often happens because a given culture conquered another one. The Ancient Romans conquered many other cultures, and soon the cultures were doing things in the Roman way. The ancient Muslims conquered many of the other Arab/Persian tribes, and soon those Arabs did things the Muslim way. In modern days, this is often a function of economic power. America makes the most popular movies and music, and everyone wishes to listen to them. These songs and movies show pictures and sounds from America, and people copy them. Sometimes Imperialism can happen because another power is influential, and you wish to impress them, or make them more willing to deal with you. Other times it’s a matter of economic power. After WW2, most of the world’s things were produced by one English speaking nation or another, and while the French and Germans and British and Dutch and Italians didn’t want to speak each other’s language, they could ALL speak English as a sort of common language for trade and diplomacy, and that was convenient because why speak Italian, when Italy isn’t very important? America was very important, and Americans speak English.</span></span></p><span data-dcnode-id="3266" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3263" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3264" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3265" instrument_node="">China is trying to do the same thing, with their Confucius Insitutes. Get people interested in Chinese things. Soft power. Cultural Imperialism. Strength through culture.</span></span></p><span data-dcnode-id="3262" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3259" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3260" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3261" instrument_node="">Of course it can backfire, or otherwise present itself in strange ways.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3255" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="3256"><div class="q-box unzoomed" data-dcnode-id="3257" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="3258" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-bbe1d464086d770360cafa01c752252c-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3252" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3253" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3254" instrument_node="">These Japanese are dressed in the fashions of 1950s America. It used to be an American thing, but not any more. It’s not an American thing, because nobody does this in America. The Japanese do, and now it’s a strange Japanese custom. Maybe America will copy the Japanese now.</span></span></p><span data-dcnode-id="3251" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3248" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3249" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3250" instrument_node="">This song is about Cultural Imperialism:</span></span></p><span data-dcnode-id="3247" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3244" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3245" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3246" instrument_node="">It’s meaning is: whatever our country was before, it is now like America.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3240" style="box-sizing: border-box;"><div class="q-relative qu-cursor--pointer" data-dcnode-id="3241" data-embed-type="youtube" style="box-sizing: border-box; position: relative; margin-bottom: 1em;" type="youtube"><div class="q-box qu-bg--gray_ultralight" data-dcnode-id="3243" style="box-sizing: border-box; background-image: url(&quot;https://img.youtube.com/vi/Rr8ljRgcJNM/0.jpg&quot;); width: 100%; box-shadow: rgba(0, 0, 0, 0.05) 0px 0px 0px 1px inset; transition-property: background-image; transition-duration: 180ms; transition-timing-function: ease-in-out; background-position: ife is followed summarily by Iqbal and Jinnah! No Indus Valley Civilizations, no Buddhism or Jainism, no advancement in technology and science or literature.</span></span></p><span data-dcnode-id="3036" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3033" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3034" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3035" instrument_node="">One more recent example is Nazi's efforts to expand Germany's influence beyond it's borders. Thanks to it, that a holy symbol like swastika, came to be villainified.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2961" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2962" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2963" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2977" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2999" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3000" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3010" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3011" style="box-sizing: border-box; position: relative;"><button aria-label="2 upvotes" class="q-click-wrapper perity. Nevermind the fact that as far as the Android vs Apple debate goes, at least in Africa, the advice of the pragmatist (favoring Andriod) would prove keenest, yet the allure of the imported Western “consumer mentality” continues to reign supreme. Let me put this another way: very limited percentage of African musicians/diverse music on ITunes, the overall rigid</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2853" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2854" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2855" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2856" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2857" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2862" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2863" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2864" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2858" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2859"><svg data-dcnode-id="2860" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2861" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2829" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2830" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2831"><span class="q-box qu-userSelect--text" data-dcnode-id="2832" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2845" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2846" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2847" instrument_node="">I'm tempted to say yes purely based on the success of Western exports across the world. If you go to any developing country today in Asia, Africa, South America etc…for instance, owning an iPhone is seen as a salient symbol of prosperity. Nevermind the fact that as far as the Android vs Apple debate goes, at least in Africa, the advice of the pragmatist (favoring Andriod) would prove keenest, yet the allure of the imported Western “consumer mentality” continues to reign supreme. Let me put this another way: very limited percentage of African musicians/diverse music on ITunes, the overall rigidity of Apple (not allowing for downloads) is not typical of most African audiences where for most of us, due to the dearth of affordable wifi/internet, we became skilled amateur pirates--- thus more conducive for the freedom offered by Android (easy downloads of songs etc).</span></span></p><span data-dcnode-id="2844" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2841" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2842" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2843" instrument_node="">Taking a stab at another angle, let's consider linguistics. Currently Mandarin is one of the fastest growing languages in the world today. Well, that's not merely a coincidence considering the rampant rise of China these past decades. In fact, if current trends hold, China is primed to overtake the USA in GDP by 2030. Chinese rise from being whipped into Communist submission by Mao's Cultural Revolution, to where it stands now is all on the behest of Deng Xiaoping's opening of Chinese automation to the world. So successful has this approach that colloquially we refer to quickly made exported products made in China as “China quality".</span></span></p><span data-dcnode-id="2840" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2837" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2838" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2839" instrument_node="">Even before the Chinese, with Old Imperialism by the Europeans of places like Africa. People often forget that the impetus wasn't to “civilize” the natives as Africans were already civilized (whatever that even means). The rationale apart from exploitation was to open up new markets for Western goods and products. Thus colonialiam was a dire prerequisite-- and coming along for the ride was Western religion and culture (linguistic and social customs etc).</span></span></p><span data-dcnode-id="2836" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2833" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2834" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2835" instrument_node="">Rambling a bit now, but hopefully you get my point. Cheers!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2761" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2762" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2763" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2777" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2799" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" d u-textAlign--start" data-dcnode-id="2664" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2665" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2666" instrument_node="">Cultural imperialism is when you adopt the mannerisms of a foreign culture due to cultural saturation. Hollywood, Nollywood and Bollywood are examples of instruments of cultural imperialism. Hollywood is backed up by aspirational consumerism - Levi Jeans, Coca-Cola, Pepsi, Gucci, Dolce Gabbana, Ray Bans - trappings of the cultural insurgency war that displace traditions, customs and values without giving anything of substance </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2652" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2653" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2654" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2655" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px  border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2645" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2646" instrument_node="">Simply put, Imperialism is when a foreign country flies their flag over your government buildings or when you are forced to do the will of another sovereign under duress.</span></span></p><span data-dcnode-id="2643" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2640" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2641" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2642" instrument_node="">Cultural imperialism is when you adopt the mannerisms of a foreign culture due to cultural saturation. Hollywood, Nollywood and Bollywood are examples of instruments of cultural imperialism. Hollywood is backed up by aspirational consumerism - Levi Jeans, Coca-Cola, Pepsi, Gucci, Dolce Gabbana, Ray Bans - trappings of the cultural insurgency war that displace traditions, customs and values without giving anything of substance in return.</span></span></p><span data-dcnode-id="2639" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2636" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2637" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2638" instrument_node="">Of the two, cultural imperialism is worse because it removes identity and social markers of certainty which perverts any cohesive and underlying social philosophy. In some instances, it can be used as a tool for good, exposing bad leadership and artificially created scarcity. However, in a democratic society exposed to cultural imperialist tools, it can be corrupting and degenerative.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2569" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2570" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2571" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2585" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2607" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2608" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2618" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2619" style="box-sizing: border-box; position: relative;"><button aria-label="Upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="2620" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;" tabindex="0"><div class="q-relative qu-di
