el="Facebook" data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.disabled-world.com%252Fentertainment%252Fgames%252Fvr.php" rel="noopener" role="button" target="_blank" title="Facebook"><svg class="midvert" data-dcnode-id="212" viewBox="0 0 48 48"><path d="M29 3a10 10 0 0 0-10 10v5h-6v8h6v19h8V26h7l1-8h-8v-4a4 4 0 0 1 4-4h4V3.322L29 3z" data-dcnode-id="213"></path></svg></a></div></nav></div><nav class="breadnav" data-dcnode-id="192"><ul class="breadcrumb" data-dcnode-id="193" itemscope="" itemtype="http://schema.org/BreadcrumbList"><li data-dcnode-id="203" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disabled-world.com/entertainment/" itemprop="item" title="Go to Recreation and Entertainment" typeof="WebPage"><span data-dcnode-id="206" itemprop="name"><span data-dcnode-id="207" instrument_node="">Recreation and Entertainment</span></span></a><meta content="1" data-dcnode-id="204" itemprop="position"></li><li data-dcnode-id="197" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a aria-current="page" data-dcnode-id="199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disabled-world.com/entertainment/games/" itemprop="item" title="Go to Accessible Games and Gaming" typeof="WebPage"><em data-dcnode-id="200"><span data-dcnode-id="201" itemprop="name"><span data-dcnode-id="202" instrument_node="">Accessible Games and Gaming</span></span></em></a><meta content="2" data-dcnode-id="198" itemprop="position"></li><li class="breadright" data-dcnode-id="194"><a data-dcnode-id="195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disabled-world.com/entertainment/games-2/"><span data-dcnode-id="196" instrument_node="">Publications</span></a></li></ul></nav><main data-dcnode-id="57"><h1 data-dcnode-id="190" id="content"><span data-dcnode-id="191" instrument_node="">Virtual Reality Code of Conduct &amp; Ethical Concerns</span></h1><p data-dcnode-id="179"><span class="ltred" data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Published:</span></span><span data-dcnode-id="187" instrument_node=""> 2016-03-04</span><br data-dcnode-id="186"><span class="ltred" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Author:</span></span><span data-dcnode-id="183" instrument_node=""> Johannes Gutenberg Universitaet Mainz | </span><span class="ltred" data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Contact:</span></span><span data-dcnode-id="180" instrument_node=""> uni-mainz.de</span></p><p data-dcnode-id="171"><svg class="info" data-dcnode-id="177" height="37" viewBox="0 0 37 37" width="38"><path d="m34 0 3 3v31c0 2-2 3-3 3H14v-1h20l2-2V3l-2-2H3L1 3v31l2 2h2v1H3c-1 0-3-1-3-3V3l3-3Zm-9 29 1 1H8v-1Zm4-5v2H8v-2Zm-8-4h1l-1 1H8v-1Zm9-5v1H8v-1Zm0-5v2H8v-2Zm-2-4v1H8V6Zm0 0" data-dcnode-id="178" style="fill:#18518b"></path></svg><span class="ltred" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Synopsis:</span></span><span data-dcnode-id="174" instrument_node=""> </span><em data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Concerns regarding consequences for psychological states and self-image of users in virtual environments. </span></em></p><p data-dcnode-id="168"><em data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Researchers from Johannes Gutenberg University Mainz (JGU) in Germany have prepared a list of ethical concerns that might arise with the use of virtual reality (VR) by researchers and the general public. Along with this list, Dr. Michael Madary and Professor Thomas Metzinger have produced concrete recommendations for minimizing the risks.</span></em></p><div class="ahr" data-dcnode-id="165"><span data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">advertisements</span></span></div><ins class="adsbygoogle" data-ad-client="ca-pub-1372083601437131" data-ad-format="auto" data-ad-slot="4831974420" data-dcnode-id="164" style="display:block"></ins><div class="adsp" data-dcnode-id="161"></div><h2 data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Main Digest</span></h2><p data-dcnode-id="158"></p><p data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Researchers from Johannes Gutenberg University Mainz (JGU) in Germany have prepared a list of ethical concerns that might arise with the use of virtual reality (VR) by researchers and the general public. Along with this list, Dr. Michael Madary and Professor Thomas Metzinger have produced concrete recommendations for minimizing the risks.</span></p><div class="reltop" data-dcnode-id="138" itemscope="" itemtype="https://schema.org/ItemList"><p class="handpoint" data-dcnode-id="152"><a data-dcnode-id="154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disabled-world.com/entertainment/games-2/"><span data-dcnode-id="155" instrument_node="">Accessible Games and Gaming Publications:</span></a><link data-dcnode-id="153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//schema.org/ItemListOrderDescending&amp;raw" itemprop="itemListOrder"></p><ul data-dcnode-id="139"><li data-dcnode-id="148" itemprop="itemListElement" itemscope="" itemtype="https://schema.org/ListItem"><meta content="1" data-dcnode-id="151" itemprop="position"><a data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disabled-world.com/entertainment/games/cribbage.php" itemprop="url"><span data-dcnode-id="150" instrument_node="">Play Master Cribbage Online Against Computer Jake</span></a></li><li data-dcnode-id="144" itemprop="itemListElement" itemscope="" itemtype="https://schema.org/ListItem"><meta content="2" data-dcnode-id="147" itemprop="position"><a data-dcnode-id="145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disabled-world.com/entertainment/games/triadcity-accessibility.php" itemprop="url"><span data-dcnode-id="146" instrument_node="">TriadCity Talking Client for Blind or Vision Impaired Players</span></a></li><li data-dcnode-id="140" itemprop="itemListElement" itemscope="" itemtype="https://schema.org/ListItem"><meta content="3" data-dcnode-id="143" itemprop="position"><a data-dcnode-id="141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.disabled-world.com/entertainment/games/bubble-shooter.php" itemprop="url"><span data-dcnode-id="142" instrument_node="">Free Bubble Shooter Game: Includes Hints and Tips for Playing</span></a></li></ul></div><p data-dcnode-id="133"><span data-dcnode-id="137" instrument_node="">According to Madary and Metzinger in their article in </span><i data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Frontiers in Robotics and AI</span></i><span data-dcnode-id="134" instrument_node="">, additional focused research is urgently needed. They are especially concerned about the possibility of unanticipated consequences for the psychological states and self-images of users who are able to inhabit a virtual environment almost as if it is the real world.</span></p><p data-dcnode-id="128"><span data-dcnode-id="132" instrument_node="">The technological capacity for generating virtual worlds from home computers will soon be widely available to the general public, as special head-mounted displays are brought to market that create the illusion of being immersed in virtual three-dimensional worlds. The opportunities for research, education, and entertainment using VR have been much discussed in the media, but Madary and Metzinger seek to raise awareness about the risks that accompany these opportunities - risks that have received far less attention so far. Both philosophers have participated over the last several years in an EU project on </span><i data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">"Virtual Embodiment and Robotic Re-Embodiment"</span></i><span data-dcnode-id="129" instrument_node=""> (VERE) with a focus on illusions of embodiment, in which one has the feeling of owning and controlling a body that is not one's own, such as an avatar in VR.</span></p><p data-dcnode-id="125"><b data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">The fact that VR can create these strong illusions serves as a main reason why VR brings new risks.</span></b></p><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Madary and Metzinger refer to recent studies showing that immersion in VR can cause behavioral changes that last after subjects leave the virtual environment.</span></p><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Importantly, VR creates a situation in which the user's bodily appearance and visual environment is determined by the host of the virtual world.</span></p><p data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">Such considerations raise the possibility that VR will create vast opportunities for psychological manipulation. "These studies suggest that VR poses risks that are novel, that go beyond the risks of traditional psychological experiments in isolated environments, and that go beyond the risks of existing media technology for the general public," the authors write. Participants in VR experiments showed strong emotional reactions in addition to behavioral changes, all of which could have an impact on their real lives.</span></p><p data-dcnode-id="116"><b data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Code of conduct for the ethical use of VR</span></b></p><p data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">Based on their analysis of the risks, both researchers from the Department of Philosophy at Mainz University offer concrete recommendations for the use of VR. For example, in experimental work developing new clinical applications, researchers should be careful not to create false hopes in patients. They should repeatedly remind them of the merely experimental nature of the research. Madary and Metzinger also note that a code of ethical conduct, however important it may be, can never function as a substitute for ethical reasoning itself on the part of researchers.</span></p><p data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Out of concern for consumers of VR, they call for long-term studies into the psychological effects of immersion. They see a special danger with particular content such as violence and adult themes, where the advanced technology increases the risk of psychological trauma.</span></p><p data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">Users should be clearly informed of these dangers, as well as risks of hallucinations, personality changes, and the powerful unconscious influence of advertising in VR. Finally, Madary and Metzinger draw attention to the need for regulations regarding ownership and individuation of avatars, regulations that should also address concerns about surveillance and data protection.</span></p><p data-dcnode-id="102"><span data-dcnode-id="109" instrument_node="">The authors sum up their article, </span><i data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">"Real Virtuality: A Code of Ethical Conduct. Recommendations for Good Scientific Practice and the Consumers of VR-Technology,"</span></i><span data-dcnode-id="106" instrument_node=""> by writing, "One of our main goals was to provide a first set of ethical recommendations as a platform for future discussions." The article appears in </span><i data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">Frontiers in Robotics and AI</span></i><span data-dcnode-id="103" instrument_node="">, a well-known Open Access platform f
