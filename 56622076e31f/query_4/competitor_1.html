</span><a class="st-ui-result" data-dcnode-id="1152" data-st-result-doc-id="6238db57196a67d61f66b1f1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Maintaining_Professional_Standards_in_Disasters_and_Conflicts%3Futm_source%3Dphysiopedia%26utm_medium%3Drelated_articles%26utm_campaign%3Dongoing_internal"><span data-dcnode-id="1159" instrument_node="">
</span><span class="st-ui-type-heading" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Maintaining Professional Standards in Disasters and Conflicts - Physiopedia</span></span><span data-dcnode-id="1156" instrument_node="">
</span><span class="st-ui-type-detail" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node=""> Introduction Rehabilitation has been increasingly recognised as a necessary aspect of the medical response and patient-centered care in emergency settings, as demonstrated initially by its inclusion in the Classification and Minimum Standards for Foreign Medical Teams in Sudden Onset Disasters,[1] and subsequently in the Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams,[2] which clearly sets out the minimum standards and recommendations for optimal care. Maintaining professional standards in disasters and conflicts is of vital importance for rehabilitation professionals. A principled rehabilitation response is comprised of both clinical and operational interventions that are guided by and adhere to core standards and a patient-centred focus on quality, safety and protection. At the same time, the response must recognise and adhere to local regulations and standards of care. Rehabilitation professionals also need to exercise special precautions to ensure they are ethical in their conduct and that their actions respect core humanitarian principles, and meet core clinical standards of care.[3] Humanitarian Principles[edit | edit source] The core humanitarian principles of humanity, impartiality, independence and neutrality, originate from the work of the International Committee of Red Cross and the National Red Cross/Red Crescent Societies. They are based on International Humanitarian Law and provide the foundation for integrated and widely accepted codes of conduct, commitments and core standards that underpin the ‘humanitarian’ response.[2] These humanitarian principles have been formally enshrined in two General Assembly resolutions. The first three principles, humanity, neutrality and impartiality, known as the humanitarian response solution, were endorsed in United Nations General Assembly Resolution 46/182 of 1991, while the fourth principle of independence was endorsed in 2004 under Resolution 58/114. These humanitarian principles provide the fundamental foundations for humanitarian action which rehabilitation professionals working as humanitarian responders should adhere to at all times. These principles are central to establishing and maintaining access to affected people, whether in a disaster or a complex emergency, such as armed conflict. They should guide you in all your decisions.[4] Table 1. Core Humanitarian Principles[4] Humanity Neutrality Impartiality Independence Human suffering must be addressed wherever it is found. The purpose of humanitarian action is to protect life and health and ensure respect for human beings. Humanitarian actors must not take sides in hostilities or engage in controversies of a political, racial, religious or ideological nature. Humanitarian action must be carried out on the basis of need alone, giving priority to the most urgent cases of distress and making no adverse distinction on the basis of nationality, race, gender, religious belief, class or political opinion. Humanitarian action must be autonomous from the political, economic, military or other objectives that any actor may hold with regard to areas where humanitarian action is being implemented. Particular attention should be paid to the most vulnerable in the population, such as children, women, older people and people with a disability. Rehabilitation must be provided without discrimination and guided solely based on needs, and priority must be given to those with the most urgent need. [5] [6] Regulation and Professional Standards[edit | edit source] Regulation of rehabilitation professionals aims to protect the public and reduces the risks posed by rehabilitation professionals to cause physical or psychological harm to patients. Regulation also reduces the risks of causing adverse consequences as a result of interacting with health services. Regulatory systems promote professionalism and harm prevention. They ensure that rehabilitation professionals have been certified at meeting and continuing to meet educational, ethical and professional practice standards, therefore, protecting the health and safety of the public.[7] Regulation of rehabilitation professionals varies significantly around the world, depending on both the country and the specific profession (i.e. physiotherapy, occupational therapy etc.).[7] If rehabilitation professionals are working in disaster and conflict settings outside of their own country of practice, they have a responsibility to register with the National Regulatory Authority, where it exists, and work within existing legislative and regulatory frameworks in that country. They must also ensure they have valid professional liability/indemnity insurance for the work they are undertaking.[7][8] If travelling as part of an emergency medical team for shorter term deployments, rehabilitation professionals may often be required to follow regulation by both their own regulatory body and that of the country they are travelling to work in, and should ensure they meet whichever regulation is tighter. Despite facing overwhelming needs within humanitarian settings, it is vital that rehabilitation professionals maintain appropriate levels of practice. All rehabilitation professionals require profession-specific clinical knowledge to assess patients who need or would benefit from rehabilitation services. All professionals share the same requirement of having the knowledge, skills and ability to implement evidence-based interventions and management programmes that are patient-centered while also monitoring, adapting, and redesigning intervention plans based on the patient’s needs and response to care. Rehabilitation professionals have a responsibility to follow the professional standards and standards of practice around competence, knowledge, skills and personal, social and methodological abilities, and the standards of professional conduct as defined by the relevant regulatory authority. This helps to ensure that clinical practice is safe and effective.[7] [9][10] Eight core professions offer rehabilitation services: audiology, occupational therapy, psychology, physical and rehabilitation medicine, physiotherapy, prosthetics and orthotics, rehabilitation nursing and speech-language pathology. Each rehabilitation profession has developed its own international and/or national frameworks to guide professional standards and standards of practice. These frameworks or guidelines communicate professional standards, support education, guide curriculum planning, guide development, and help to establish individual and service-wide development priorities.[11] Rehabilitation professionals should also include wider humanitarian-specific professional standards, such as the humanitarian principles outlined above, and the Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams[2] to ensure their practice meets the professional and ethical standards required when working in humanitarian settings. The Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams outlines the following standards and recommendations in relation to regulation and professionals standards in emergencies. Recommendations for Optimal Care; All rehabilitation professionals should comply with the same requirements for practice as in their home country (such as professional registration and licensing) and should work within their scope of practice. Those from countries in which there is no professional certification may practice under the direction and authority of their Emergency Medical Team Clinical Lead with approval of the Ministry of Health of the Host Country.[3] Scope of Practice[edit | edit source] Scope of practice pertains to the full spectrum of roles, functions, responsibilities, activities and decision-making capacity that individuals within their specific rehabilitation profession are educated, competent and authorised to perform.[12] While this can be broad for each profession, each individual will need to consider their own scope of practice - this is unique to each individual and is influenced by their career, experience and development.[13] Working in humanitarian settings such as disaster and conflict zones can be very challenging and rehabilitation professionals are often pushed towards the boundaries of their individual scope of practice. Despite these challenges, it is vital that all rehabilitation professionals remember their responsibility to work within their own individual scope of practice at all times, and should only practice within areas where they have the skills and competency to safely work. Advanced or extended scope practitioners sometimes undertake additional tasks that are outside of what would normally be considered within the scope of practice for a particular profession. Rehabilitation professionals who have an extended scope of practice or advanced practice have an obligation to only work within the scope of practice for their profession as defined by the regulatory body within the country they are working in (if there is one present). They must only participate in their advanced practice if allowed within the setting in which they are working and where their insurance provides cover. Rehabilitation professionals may also have a role to play in working with national staff to support them in developing further skills and competencies, within the scope of practice as defined by the country in which they are working.[8][9][10] The Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams outlines the following recommendations in relation to scope of practice and knowledge exchange in emergencies.[3] Recommendations for Optimal Care; Rehabilitation professionals should maximize opportunities to exchange rehabilitation knowledge and competencies with local personnel ensuring that training of local rehabilitation workers should be consistent with local practice; and acknowledge local rehabilitation standards.[3] [14] Ethical Practice[edit | edit source] Ethics in health care and rehabilitation can be defined as the moral code of conduct that defines the relationship between the rehabilitation professional and their patient, and the therapist and other healthcare professionals based on mutual respect and trust. Ethical issues emerging in disasters have been identified as tensions between the respect for local customs and values imposed by external responders; different understandings of health, illness and diseases; external factors that hinder the provision of adequate care, such as scarce resources; questions of a “moral identity” for health workers; and trust and distrust between the humanitarian workforce and local communities. Professionals’ roles and interactions are influenced by historical, political, social and commercial structures, aid agency policies and agendas that can contribute to ethically challenging situations. Ethical issues can also arise on the level of the patient-healthcare professional relationship. You can read more about Ethics and Ethics in Disasters and Conflicts. Medical Records[edit | edit source] Good clinical records are a prerequisite of delivering high-quality, evidence-based healthcare, particularly where multiple clinicians are contributing simultaneously to patient care. Where possible in humanitarian settings, a common data set should be agreed between key providers to help standardise documentation. Everyone involved in a patient’s clinical management should have access to the information they need. Otherwise, duplication of work, delays and errors are inevitable. This can often occur in disaster and conflict settings where documentation and medical records may be neglected. Ideally, rehabilitation documentation should be integrated into a patient's main medical records. However, this may not always be possible in disaster and conflict settings. Moreover, all documentation should meet the guidelines as set out by the relevant rehabilitation professional regulatory authority.[15] Regardless of the setting, all medical records and data should be stored safely, securely and separate from other types of personal data, ensuring confidentiality for the patient at all times with plans made on how they will be handled in the event of an emergency evacuation.[11][3][1][2] There is some dispute and controversy over ownership of medical records in humanitarian settings. Thus, to ensure continuity of care, the Classification and Minimum Standards for Emergency Medical Teams suggest that patients should be able to take a copy of their medical records, while also maintaining a central record. In some situations, there may also be a requirement for local medical authorities to also be provided with a duplicate record. However, in insecure and conflict environments, care should be taken to only identify patients using a numerical identifier, and where possible, only provide de-identified data to protect patients. Regardless of the setting, any data should be stored safely and securely, ensuring confidentiality.[3][1] The Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams outline the following recommendations in relation to medical records and documentation in emergencies.[3] Recommendations for Optimal Care; Notes on rehabilitation, including interventions, assessments and assistive devices, should be incorporated into the patient’s main health record, which should remain with the patient when they are referred or discharged (in accordance with the minimum standards for Emergency Medical Teams. [3][16] The Classification and Minimum Standards for Emergency Medical Teams outline the following minimum technical standards in relation to medical records and documentation in emergencies during triage, referrals and transfers and in ward management;[1] Minimum Technical Standard Triage A unique identifier system should be in place that considers patient follow-up care and protection issues. Referral and Transfer Establish a standardized form and system for patient referral and transfer including formal handover between the transferring and receiving Emergency Medical Team / Health Facility. Share information in a written document on patient's clinical condition, current treatment, intention to transfer, mode and timeline of transfer. Ward Management Provide documented discharge planning and follow-up care Hand out a discharge document/copy of patient record to the patient.[1] You can read more about Medical Records and Documentation Informed Consent and Confidentiality[edit | edit source] Informed consent refers to the patient's right to be informed about their condition, and the risks and benefits of treatment options. Informed consent is based on the moral and legal premise of patient autonomy, whereby a patient’s decision to participate in assessment, evaluation, diagnosis, prognosis, plan, treatment and re-examination, as well as in any research activity, is freely given by a competent individual. This individual should:[17] Have received the necessary information; Have adequately understood the information; And after considering the information, have arrived at a decision without having been subjected to coercion, undue influence, inducement, or intimidation.[17] The principle of confidentiality is about privacy and respecting someone’s wishes. It means that rehabilitation professionals should not share personal details about someone with others, unless that person has said they can or it is absolutely necessary. Patients/clients have the right to confidentiality. Any information related to health status, diagnosis, prognosis, interventions/treatment or any other personal information obtained from them should be kept in confidence unless explicit consent is given or the law specifically states otherwise.[18] Informed consent is an essential element of a good patient-rehabilitation professional relationship and ensures a patients' rights are respected. It requires rehabilitation professionals to include their patients in the clinical reasoning process to reach a shared decision. Communicating clinical information effectively and educating patients are correlated with compliance with treatment and cooperation.[19] Rules and regulations around informed consent and confidentiality may vary from one country to another. In some circumstances, rehabilitation professionals will find themselves challenged by the available resources, culture and the patient's capacity to make their own decisions. Despite this, humanitarian principles and the principles of informed consent and patient confidentiality are vital at all times during emergencies. The Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams for informed consent apply in emergency settings, and rehabilitation professionals should also consider the standards for informed consent as outlined by their professional regulatory authority.[1] The Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams outlines the following standards and recommendations for informed consent in emergencies.[3] Communicate benefits and risks involved prior to transfer and obtain written and informed consent from patient or relatives. You can read more about Informed Consent. Research[edit | edit source] Research and collection of data to guide future responses is vital to further improve rehabilitation preparedness and responses in humanitarian settings. Maintenance of patient confidentiality during data collection processes must always place patient care and dignity above any research purposes. Rehabilitation professionals should ensure that all research has ethics approval, and where possible this should come from a local research ethics committee or authority within the country where the research is taking place.[8][10][3][1][2] The Minimum Technical Standards and Recommendations for Rehabilitation - Emergency Medical Teams outlines the following standards and recommendations for research in emergencies.[3] Minimal Technical Standard: Ethical standards for research with human participants should be maintained in emergency response, especially in regards to permission and confidentiality.[16][20] [21] Recommendations for Optimal Care: Clinical care should take priority over research, which itself should be focused on improving the delivery and outcomes of rehabilitation. People conducting research should collaborate with local academic institutions and undertake to build national capacity. When local partners are involved, they should share the leadership of the project and ownership of the data.[3] You can read more about Qualitative Research and if you interested in learning more about completing research, you can complete the Physioplus Research Programme. Resources[edit | edit source] Regulatory Bodies[edit | edit source] National Regulatory Bodies, World Physiotherapy Reciprocity - Mutual Recognition, World Physiotherapy National Regulatory Bodies, World Federation of Occupational Therapists Professional Standards[edit | edit source] Standards of Practice, World Physiotherapy Ethical Practice[edit | edit source] Ethical Principles of Health Care in Times of Armed Conflict and Other Emergencies, World Physiotherapy Code of Ethics, World Federation of Occupational Therapists Medical Records[edit | edit source] Physical Therapy Records Management: Record Keeping, Storage, Retrieval and Disposal, World Physiotherapy Informed Consent[edit | edit source] Informed Consent, World Physiotherapy Research[edit | edit source] Research, World Physiotherapy </span></span><span data-dcnode-id="1153" instrument_node="">

</span><span class="st-ui-type-heading" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Ethical Reasoning - Physiopedia</span></span><span data-dcnode-id="1147" instrument_node="">
</span><span class="st-ui-type-detail" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node=""> Introduction The ability to effectively address ethical dilemmas - ethical reasoning - is an essential component of health care. Healthcare workers in all fields face many ethical issues in their work.[1] The types of ethical issues may change based on the context of a health worker, from geriatrics,[2] to perinatal palliative care,[3] to mental health in the digital age,[4] as well as the mode of delivery, from face-to-face consultations through to telehealth.[5] The emphasis in ethical reasoning is on a sensible progression from the facts of the situation to a morally sound decision. To help us in the ethical reasoning process, various ethical frameworks have been developed,[2] including the ethics "workup" created by Fleming.[6] These frameworks are analytical tools that help healthcare workers in complex moral decision-making situations.[2] Fleming's model[6] is appropriate for use by all health professionals at both an organisation and an individual level. Using the five principal steps of the ethics workup[6], health professionals holding a variety of philosophical and religious positions regarding ethics can share a basic framework for thinking about and discussing morally troubling cases. 1. What are the Facts[edit | edit source] It is vitally important to clarify the facts of any situation in order to anchor the decision. These facts relate to the organisational, medical, and social circumstances of the case. For example, at the bedside, both an estimate of prognosis and an understanding of the patient's wishes are relevant to an ethical decision about what is in the patient’s best interest. Resource allocation may be ethically relevant at the organisational level, but should provide a subsidiary influence at the bedside. Answering the following questions will establish the facts to consider: Who? Establish the Persons involved and/or affected. Remember, this may include family members of the patient, for instance. What? Consider: Diagnosis, prognosis, therapeutic options Personal preferences, beliefs, values Resources available Organisational mission and policy Where? Medical setting When? Chronology of events, time constraints Why? Patient’s goals of care and treatment Clear and effective communication about the facts is crucial. Physiotherapists may be instrumental in ensuring that the patient/family and other non-medical health professionals understand the medical facts while also making sure the health care team understands pertinent non-medical information about the patient and family. Administrators may be concerned for the welfare of the organisation and those it serves as well as that of an individual patient. 2. What is the Ethical Concern?[edit | edit source] Identify the specific ethical issue in the case, and there may be more than one. Ethical claims may be competing, such as the welfare of one patient versus that of many when considering resource allocation. The issue may not be ethical at all, but rather a legal issue, a placement issue, or simple miscommunication about the clinical facts. Some common ethical concerns in the clinical setting include: The patient’s right to refuse or demand treatment Questions of futility and withholding or withdrawing treatment Appropriate surrogacy and substituted judgment Organisational limitations of services Policies and practices regarding privacy and confidentiality 3. Frame the Issue[edit | edit source] Some health professionals may explore the issue using one moral approach (e.g. personal belief or faith). Others will eclectically employ a variety of approaches (good of the patient, good of society, personal belief, etc). But no matter what one's underlying moral orientation, the ethical issue at stake in a given case can be framed in terms of several broad areas of concern, representing aspects of the case which may be an ethical conflict. It is therefore useful, if somewhat artificial, to dissect the case along lines of particular interest: Identify the appropriate decision-maker(s): Patient, family, court, the health care team? Apply the criteria to be used in reaching clinical decisions. The specific biomedical good of the patient: One should ask, what will advance the biomedical good of the patient? What are the medical options and likely outcomes? What is the prognosis? The broader goods and interests of the patient: One should ask, what broader aspects of the patient's good, i.e., the patient's dignity, religious faith, other valued beliefs, relationships, and the particular good of the patient's choice, are pertinent to the decision at hand? The goods and interests of other parties: Health professionals must also be attentive to the goods and interests of others, e.g., in the distribution of resources. One should ask, what are the concerns of other parties (family, health care professionals, health care institution, law, society, etc.) and what differences do they make, morally, in the decisions that need to be made about this case? In deciding about an individual case, however, these concerns should generally not be given as much importance as that afforded the good of the individual patient whom health professionals have pledged to serve. The physician explains the medical options to the patient/surrogates and if indicated makes a recommendation. The patient/surrogate makes an uncoerced, informed decision. Limits to patient/surrogate autonomy include the bounds of rational medicine/nursing/social work, the probability of direct harm to identifiable third parties, and violation of the consciences of involved health care professionals. Deviation from the organization’s mission. Limitations based on direct harm to the organization financially and structurally. In problematic cases the interdisciplinary team may meet to ensure consistency in their recommendations to the patient/surrogate(s). Establish the health care professionals' moral/professional obligations. Each health care professional, including health care executive,&nbsp; must decide what she/he owes the patient, herself/himself, the health care team, the health care institution, and other third parties. Conflicts will often present and must be accommodated. Typically more than one option must be considered for each case. 4. Decide[edit | edit source] In clinical ethics, as well as organisational ethics, a decision must ultimately be made. There is no simple formula. The answer will require clinical or managerial judgment, practical wisdom, and moral argument. The health care professional must ask herself/himself, "What should I do? Where can I get help? How can I best serve the interests of all interested parties?" She/he must analyse the data, reflect on it morally, and draw a conclusion. She/he must be prepared to explain her decision and the moral reasons for it. Sources of justification include: The nature of the health care is patient-centred. For physicians and nurses it is in the professional-patient relationship; for the health executive it is in ethically balancing the interests of the patient with those of many patients as well as the organisation. Consider the compatibility of a recommended course of action with the aims of the profession (the internal morality of profession). Approaches to ethical inquiry: principle-based ethics, virtue-based ethics, casuistry, feminist/caring/existentialist ethics, theological ethics Ethically relevant considerations: Balancing benefits and harms in the care of patients Disclosure, informed consent, and shared decision making The norms of family life and personal belief The relationships between clinicians and patients The professional integrity of health professionals Cost-effectiveness and resource allocation Issues of cultural and religious variation Considerations of power differences and vulnerability Organisational mission, goals, and needs Research subjects Vulnerable populations-access, cultural needs Health literacy Grounding and source of ethics: philosophical (based in reason), theological (based in faith), socio-cultural (based in custom) 5. Critique[edit | edit source] It is important to be able to critique the decision that has been made by considering its major objections and then either responding adequately to them or changing one's decision. The health care professional should also seek her/his colleagues' input when time permits. Ethics committees should also do a retrospective analysis of cases, which is useful in preparing "for the next time" such a situation is encountered. </span></span><span data-dcnode-id="1144" instrument_node="">

</span><a class="st-ui-result" data-dcnode-id="1134" data-st-result-doc-id="604c6264196a67b0d71bf7e5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//physio-pedia.com/The_Role_of_the_Sports_Physiotherapist%3Futm_source%3Dphysiopedia%26utm_medium%3Drelated_articles%26utm_campaign%3Dongoing_internal"><span data-dcnode-id="1141" instrument_node="">
</span><span class="st-ui-type-heading" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">The Role of the Sports Physiotherapist - Physiopedia</span></span><span data-dcnode-id="1138" instrument_node="">
</span><span class="st-ui-type-detail" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node=""> What is a Sports and Exercise Physiotherapist? Sports and Exercise Physiotherapists are involved in the prevention and management of injuries resulting from sport and exercise participation at all ages and at all levels of ability. These specialized physiotherapists provide evidence-based advice on safe participation in sport and exercise. Furthermore, they promote an active lifestyle to aid individuals in improving and maintaining their quality of life. Sports and Exercise Physiotherapists also play a huge role in helping athletes of all ages and all levels of ability to enhance their performance.[1] What do Sports and Exercise Physiotherapists do?[edit | edit source] The New Zealand Sports Physiotherapy organisation defines a sports physiotherapist as: "A recognized professional who demonstrates advanced competencies in the promotion of safe physical activity participation, provision of advice, and adaptation of rehabilitation and training interventions, for the purposes of preventing injury, restoring optimal function, and contributing to the enhancement of sports performance, in athletes of all ages and abilities, while ensuring a high standard of professional and ethical practice."[1] Sports and exercise physiotherapists work in a wide variety of settings. Many work with active recreational athletes in private practice or clinic settings. They can also be involved in social and club level sports and attend training sessions. Sports and exercise physiotherapists often work in the elite athlete setting in competitive and professional sports, working and travelling with elite individual athletes or teams, and integrating their services with other medical professionals, coaches, strength and conditioning personnel and other support staff. Sports and exercise physiotherapists are also actively involved within various sporting organisations to coordinate physiotherapy services, injury prevention, rehabilitation and injury surveillance programs.[1] Sports and Exercise Physiotherapy Roles and Competency Areas[edit | edit source] Ashton (2015)[2]&nbsp;outlines advanced competencies of the sports physiotherapist in the promotion of safe physical activity participation, provision of advice, adaptation of rehabilitation and training interventions, for the purposes of preventing injury, restoring optimal function, and contributing to the enhancement of sports performance, in athletes of all ages and abilities, while ensuring a high standard of professional and ethical practice. What role the physiotherapist plays does vary depending on the sport they are involved in, their specific role within the team, the performance level of the sport, local level or international, amateur or professional. The International Federation of Sports Physical Therapy (IFSPT)[3] has identified 11 competencies that is required for sports and exercise physiotherapists. Along with these competencies are a set of specific skills or standards that needs to be upheld. These competencies and standards[4] are related to the various overlapping roles that the sports and exercise physiotherapist fulfill The various roles and competencies can be[4]: Manager of the client/patient[4] Injury Prevention Sports and exercise physiotherapists assess the risk of injury associated with the participation in a specific sport or physical activity. They are equipped to inform and train athletes, coaches and other members of the multidisciplinary team in such a way that there is a reduction in occurrence and recurrence of specific injuries Acute Intervention Sports and exercise physiotherapists have the skills to respond appropriately to an acute injury or illness in various contexts, such as training or competition Rehabilitation Sports and exercise physiotherapists utilize clinical reasoning and therapeutic skills to assess and diagnose sports-related injuries. Furthermore, they are skilled in designing, implementing, evaluating and modifying evidence-based interventions that aim for a safe return to the athlete's optimal level of performance in their specific sport or physical activity Performance Enhancement Sports and exercise physiotherapists contribute to the enhancement of the athlete's performance through evaluation of the athlete's physical and performance-related profile and can advise or intervene to optimize performance in a specific sport, within a multidisciplinary team approach Advisor[4] Promotion of a Safe, Active Lifestyle Sports and exercise physiotherapists are competent in working together with other professionals in the multidisciplinary team environment to promote safe participation in sports and physical activity for individuals of all abilities. It is expected of them to provide evidence-based advice regarding the optimal activity or sport for a specific individual as well as advice on the ways to minimize risk of injury and promote health. Promotion of Fair Play and Anti-Doping Practices Sports and exercise physiotherapists participate and promote safe, professional and ethical sporting practices. They strongly advocate for fair play and their duty of care for the athlete. They adhere to the International Sports Physiotherapy Code of Conduct on Doping. Professional Leader[4] Life-Long Learning Sports and exercise physiotherapists maintain and improve their clinical standards by critical, reflective and evidence-based approaches to practice. They engage in a continual process of learning and teaching throughout their career and collaborate actively with other professionals. Professionalism and Management Sports and exercise physiotherapists are competent in the management of time, resources and personnel. They achieve this in a professional, legal and ethical manner. They also promote and facilitate professional development and excellence. Innovator[4] Research Involvement Sports and exercise physiotherapists are informed and evaluate their practice in relation to new information. They identify questions for further study and are invested and involved in research that addresses these questions at various levels. Dissemination of Best Practice Sports and exercise physiotherapists disseminate new information and research to other professionals within the multidisciplinary team set-up through different media such as team communications, conferences, special interest groups, research collaborations, meetings as well as published material such as reports, journals promotional documents, newsletters and the internet. Extending Practice through Innovation Sports and exercise physiotherapists encourage and promote the application and integration of new knowledge and innovation within the multidisciplinary team practice and decision-making processes. They also influence further research and innovation directions. The full document on Sports Physiotherapy: Competencies and Standards[4] are available on the website of The International Federation of Sports Physical Therapists (IFSPT)[3]. The Role of the Sports and Exercise Physiotherapist in International/Elite Sports[edit | edit source] Physiotherapy has become an integral part of the sports medicine team. At the London 2012 Olympic Games, physiotherapists formed the largest professional group working at the Olympic Games. The essential role of the sports physiotherapist in international and elite sports (and in all other levels of sport, for that matter) remains to provide treatment and rehabilitation of injuries and to provide performance support through injury prevention, maintenance and recovery interventions.[5] The common perception of the role of the sports physiotherapist in supporting athletes during competition or major games seems to be that the physio is a "provider of treatment interventions related to specific injuries."[5] From recent studies it is evident that sports physios are also playing a much bigger role in supporting uninjured athletes.[5] During the London 2012 Olympic Games, athletes attended physiotherapy services in the absence of injuries. A reasonable assumption for this may be that the physiotherapy sessions focused on maintaining physical function as well as aiding in recovery, have a place in supporting athletic performance.[5] It was also evident that athletes required follow-up visits for the same condition/injury and that muscle injuries were the most common. Furthermore, the non-injury related physiotherapy sessions/encounters reflected the need for maintenance of the musculoskeletal system, injury prevention strategies and assistance with recovery.[5] Sports physiotherapists working with international/elite athletes also face the challenge of the ongoing management of pre-existing conditions.[5] Overuse injuries among athletes were identified as the most common reason to attend physiotherapy services (44%).[5] It is evident that the role of the physiotherapist within the sphere of international sport, is vast and that the role goes beyond the treatment of injury to a much broader role which includes providing assistance with musculoskeletal maintenance and recovery as well as injury prevention strategies. Sports physiotherapists are also in a unique position to be able to take on leadership roles. The breadth of the sports physiotherapist skill set, which includes skills such as understanding acute care management, exercise and evidence-based approaches to injury prevention and treatment, as well as general strength and conditioning concepts, enables sports physiotherapists to oversee the healthcare of athletes in various sporting codes.[6] Another benefit is the great amount of time that sports physiotherapists spend working directly with the athletes. Athlete's Perspectives on the Role of the Sports and Exercise Physiotherapist[edit | edit source] The role of the sports physiotherapist[edit | edit source] "What does a sports physiotherapist do?"[edit | edit source] Athletes have a clear, but sometimes limited, understanding of the role of the sports physiotherapist. They see the role of the sports physiotherapist as mainly injury focused. In interviews with athletes on the role of the sports physiotherapist the following four themes emerged[7]: Injury treatment Injury prevention Rehabilitation Performance enhancement "What should a sports physiotherapist not do?"[edit | edit source] Break medical confidentiality - this highlights the importance of trust between the athlete and the sports physiotherapist Become complacent about their position - athletes expect their sports physiotherapist to practice continual professional development and should be striving to better their abilities, just like athletes do. Qualities of a sports physiotherapist[edit | edit source] Athletes indicated that these qualities are important for sports physiotherapists to possess[7]: Being professional Good personal qualities Being accessible Good communication skills Have an interest in the athletes that they are working with Being open-minded with regards to athletes' ideas regarding their management and the use of other practitioners "A sports physiotherapist should be patient, persistent, have a high level of competency, know when to refer, understand the emotional and psychological demands of the sport and be a good communicator with athletes and coaching staff."[7] Qualities that athletes do not like to see in sports physiotherapists are: Bad personal qualities Being unapproachable Not being a team player Achieving sporting success[edit | edit source] "How does sports physiotherapy help you achieve your sporting goals?"[edit | edit source] When athletes were asked this question, their response again mainly reflected on injury focus i.e.[7] Help to recover from injuries Prevent injuries However, there was also a change in perspective noted. Athletes acknowledged the role of the sports physiotherapist in preventing and managing injuries but also placed emphasis on sports physiotherapists helping them to train for increased duration and intensity without becoming injured. Physiotherapy treatment techniques[edit | edit source] Athletes feel that the following treatment techniques are beneficial[7]: Mobilisation Massage Manipulation Exercise prescription Acupuncture Taping However, this is also dependent on athletes' exposure to the range of treatments. Athletes feel that the physiotherapist is the expert and they put their trust in the physiotherapist to resolve any injury issues that they athlete might have.[7] The Sports Medicine Team[edit | edit source] Now we have examined our role as a Sports Physiotherapist and the competencies required, how do we fit within the bigger Sports Medicine Team. This can vary across the type of sports environment you may be working in. In many cases working with your local sports teams, whether it is support at training or competition, you may be the lone sports medicine professional working directly with the athlete and team. In this situation you have to make decisions in relation to removal from the field, injury management and return to play independently. Working with National Teams and Professional Sports Teams can be quite different, in many cases ,you may be just one sports medicine professional in a much larger team network providing services to the team. Sports Medicine is such a wide area and this lends itself to being practiced by multidisciplinary team of professionals. Each of these professionals have a certain set of specialized skills to provide optimal care for the athlete, but also to improve the knowledge and skills of their colleagues.[8][9] The most appropriate sports medicine team depends on the setting. As mentioned working with your local sports club the sports medicine team may consist of a family physician or physiotherapist alone. In professional sport teams or at major events such as the Olympic games the sports medicine team may consist of:[9] family physician physiotherapist sports physician massage therapist athletic trainer orthopedic surgeon radiologist podiatrist psychologist dietitian/nutritionist exercise physiologist coach fitness advisor The sports medicine model[edit | edit source] The traditional medical model has a physician as the primary contact practitioner with subsequent referral to other medical and paramedical practitioners. The sports medicine model differs from this. The athlete's primary contact may be with a physician, but it can also be with the trainer, the physiotherapist or the massage therapist. Athletes prefer to see the practitioner that they have the best relationship with or the one that they are used to seeing the most. This makes it important the all members of the multidisciplinary sports medicine team are aware of their own strengths and limitations, and also be aware of the skills of the other members and refer to them in order to provide the athlete with the best possible management.[8] The coach, the athlete and the physiotherapist[edit | edit source] The sports physiotherapist needs to have a good relationship with the athlete. There needs to the feeling of mutual trust and confidence. This implies that the athlete will feel that he/she can confide in the physio and the physio will feel that the athlete will comply with advice given. The coach is responsible for the athlete's training and performance and it is vital to involve the coach in the medical decision-making process. It is, unfortunately, the case that some coaches have a distrust of healthcare professionals in sport and they sometimes have the opinion, rightly or wrongly, that the main role of the health care professional is to keep the athlete from training or competing. It is important for coaches to understand that the sports physiotherapist also aims to maximise and improve the performance and health of the athlete.[8] Getting the coach involved in the decision-making process and also explaining the rationale behind recommendations will actually also increase athlete compliance. The coach can be a valuable asset in supervising the recommended treatment or rehabilitation program, and discussions with the coach may help determine possible causes for an injury.[8] Having a good relationship between the coach and sports physiotherapist is a win-win situation for everyone. The coach will have a better and clearer understanding of what the sports physiotherapists does and this can lead to seeking help for minor problems, which in turn can lead to injury prevention.The sports physiotherapist can learn from the coach and have a better understanding of the demands of the sport and this can aid in the institution of injury prevention measures.[8] Thoughts and advice[edit | edit source] "Love thy sport"[edit | edit source] It is essential to know and love the sport that you are involved with if you want to be a successful sports physiotherapist. Furthermore, it is essential to be an advocate for physical activity. Sports physiotherapists need to understand the importance of the sport to the athlete as well as the physical (training and technique) and psychological demands of the sport. Having a good understanding of a sport and exercise provides two important advantages[8]: If a sports physiotherapist understands the demands and technical aspects of a sport, this will improve their ability to recognise possible causes of injury and facilitate the development of sports specific rehabilitation programs. The athlete will have confidence in the sports physiotherapist. One of the best ways to learn about a sport and understand it is to attend both training and competition or to even participate in the sport. Being on site during training sessions and competition, not only to aid with injuries but also to develop a good understanding of the sport will help with this. [10] [11] </span></span><span data-dcnode-id="1135" instrument_node="">

</span><span class="st-ui-type-detail" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node=""> What is a Sports and Exercise Physiotherapist? Sports and Exercise Physiotherapists are involved in the prevention and management of injuries resulting from sport and exercise participation at all ages and at all levels of ability. These specialised physiotherapists provide evidence-based advice on safe participation in sport and exercise. Furthermore, they promote an active lifestyle to aid individuals in improving and maintaining their quality of life. Sports and Exercise Physiotherapists also play a huge role in helping athletes of all ages and all levels of ability to enhance their performance.[1] Grant et al.[2] summarises the role of the sports physiotherapist as follows: "The essential role of the sports physiotherapist is to provide treatment and rehabilitation of injuries and also to provide support for performance through injury prevention, maintenance and recovery interventions." What do Sports and Exercise Physiotherapists do?[edit | edit source] The New Zealand Sports Physiotherapy organisation defines a sports physiotherapist as: "A recognized professional who demonstrates advanced competencies in the promotion of safe physical activity participation, provision of advice, and adaptation of rehabilitation and training interventions, for the purposes of preventing injury, restoring optimal function, and contributing to the enhancement of sports performance, in athletes of all ages and abilities, while ensuring a high standard of professional and ethical practice."[1] Sports and exercise physiotherapists work in a wide variety of settings. Many work with active recreational athletes in private practice or clinic settings. They can also be involved in social and club-level sports and attend training sessions. Sports and exercise physiotherapists often work in the elite athlete setting in competitive and professional sports, working and travelling with elite individual athletes or teams, and integrating their services with other medical professionals, coaches, strength and conditioning personnel and other support staff. Sports and exercise physiotherapists are also actively involved within various sporting organisations to coordinate physiotherapy services, injury prevention, rehabilitation and injury surveillance programmes.[1] [3] Sports and Exercise Physiotherapy Roles and Competency Areas[edit | edit source] Ashton[4]&nbsp;outlines advanced competencies of the sports physiotherapist in the promotion of safe physical activity participation, provision of advice, adaptation of rehabilitation and training interventions, for the purposes of preventing injury, restoring optimal function, and contributing to the enhancement of sports performance, in athletes of all ages and abilities, while ensuring a high standard of professional and ethical practice. The role of the physiotherapist does vary and can depend on: The sport they are involved in Their specific role within the team The performance level of the sport, local level or international, amateur or professional. The International Federation of Sports Physical Therapy (IFSPT)[5] states that "sports physiotherapy is a growing specialisation in cultures that strive to promote an active lifestyle and athletic excellence". The Sports Physiotherapy for All (SPA) describes "effective professional behaviour and the integration of specific knowledge, skills and attitudes for the context of practice as a sports physiotherapist."[6] As part of the Sports Physiotherapy for All project, eleven competencies have been identified that is required for sports and exercise physiotherapists. Along with these competencies are a set of specific skills or standards that needs to be upheld. These competencies and standards[7] are related to the various overlapping roles that the sports and exercise physiotherapist fulfil. The various roles and competencies can be[7]: Manager of the client/patient[7] Injury prevention Sports and exercise physiotherapists assess the risk of injury associated with participation in a specific sport or physical activity. They are equipped to inform and train athletes, coaches and other members of the multidisciplinary team in such a way that there is a reduction in occurrence and recurrence of specific injuries. Acute intervention Sports and exercise physiotherapists have the skills to respond appropriately to an acute injury or illness in various contexts, such as training or competition. Rehabilitation Sports and exercise physiotherapists utilise clinical reasoning and therapeutic skills to assess and diagnose sports-related injuries. Furthermore, they are skilled in designing, implementing, evaluating and modifying evidence-based interventions that allow for a safe return to the athlete's optimal level of performance in their specific sport or physical activity. Performance enhancement Sports and exercise physiotherapists contribute to the enhancement of the athlete's performance through evaluation of the athlete's physical and performance-related profile and can advise or intervene to optimise performance in a specific sport, within a multidisciplinary team approach. Advisor[7] Promotion of a safe, active lifestyle Sports and exercise physiotherapists are competent in working together with other professionals in the multidisciplinary team environment to promote safe participation in sports and physical activity for individuals of all abilities. It is expected that they provide evidence-based advice regarding the optimal activity or sport for a specific individual as well as advice on the ways to minimise the risk of injury and promote health. Promotion of fair play and anti-doping practices Sports and exercise physiotherapists participate and promote safe, professional and ethical sporting practices. They strongly advocate for fair play and their duty of care for the athlete. They adhere to the International Sports Physiotherapy Code of Conduct on Doping. Professional leader[7] Life-long learning Sports and exercise physiotherapists maintain and improve their clinical standards by critical, reflective and evidence-based approaches to practice. They engage in a continual process of learning and teaching throughout their career and collaborate actively with other professionals. Professionalism and management Sports and exercise physiotherapists are competent in the management of time, resources and personnel. They achieve this in a professional, legal and ethical manner. They also promote and facilitate professional development and excellence. Innovator[7] Research involvement Sports and exercise physiotherapists are informed and evaluate their practice in relation to new information. They identify questions for further study and are invested and involved in research that addresses these questions at various levels. Dissemination of best practice Sports and exercise physiotherapists disseminate new information and research to other professionals within the multidisciplinary team set-up through different media such as team communications, conferences, special interest groups, research collaborations, and meetings, as well as published material such as reports, journals promotional documents, newsletters and the internet. Extending practice through innovation Sports and exercise physiotherapists encourage and promote the application and integration of new knowledge and innovation within the multidisciplinary team practice and decision-making processes. They also influence further research and innovation directions. The full document on Sports Physiotherapy: Competencies and Standards[7] are available on the website of The International Federation of Sports Physical Therapists (IFSPT)[5]. Technical and Non-Technical Competencies[edit | edit source] Ian Gatt, a sports physiotherapist with vast experience in professional and Olympic sports, divides competencies into two categories: Technical Competencies vs Non-Technical Competencies.[8] Technical Competencies Non-Technical Competencies Hard skills required to be effective in your work environment (acute trauma management, mobilisations or manipulations, soft tissue mobilisation, acupuncture, taping, rehabilitation, etc) Soft skills required to "fit" in your environment: Personality Ethos Communication These will influence athlete interaction and multidisciplinary team interactions and considerations. Developing Sports Physiotherapy Expertise[edit | edit source] Becoming an expert in sports can be developed through specialisation in sports physiotherapy as part of lifelong learning.[9] Tawiah et al.[10] characterises specialisation as "having in-depth knowledge, skills and competencies in a specific area of practice." The International Federation of Sports Physiotherapy (IFSPT) has a specialist recognition process that involves certification by member organisations. Developing sports physiotherapy expertise is a gradual process, usually starting with formal university education in physiotherapy, then specialising through clinical experience and informal learning.[11] Phillips and Paterson[12] developed a model of how a physiotherapist advances from novice to an expert in decision-making and the development of skills. This model categorises learning into[12][13]: Technical (scientific and skill-based) Creative (adapting decision-making and techniques to clinical situations) Contextual (self-awareness and the ability to adapt behaviours within wider cultural and situational circumstances) Read more on this here: Developing Sports Physiotherapy Expertise – The Value of Informal Learning [13](See Figure 1) Growing sports physiotherapy experts takes a village—technical, creative and contextual learning doesn't happen in a vacuum[12] The Role of the Sports and Exercise Physiotherapist in International/Elite Sports[edit | edit source] Physiotherapy has become an integral part of the sports medicine team and has a crucial role in the management of injuries during major international events.[14][15] At the London 2012 Olympic Games, physiotherapists formed the largest professional group working at the Olympic Games. The essential role of the sports physiotherapist in international and elite sports (and in all other levels of sport, for that matter) remains to provide treatment and rehabilitation of injuries and to provide performance support through injury prevention, maintenance and recovery interventions.[2] The common perception of the role of the sports physiotherapist in supporting athletes during competition or major games seems to be that the physio is a "provider of treatment interventions related to specific injuries."[2] From recent studies it is evident that sports physiotherapists are also playing a much bigger role in supporting uninjured athletes.[2] During the London 2012 Olympic Games, athletes attended physiotherapy services in the absence of injuries. A reasonable assumption for this may be that the physiotherapy sessions focused on maintaining physical function, as well as aiding in recovery, have a place in supporting athletic performance.[2] It was also evident that athletes required follow-up visits for the same condition/injury and that muscle injury were the most common. Furthermore, the non-injury related physiotherapy sessions/encounters reflected the need for maintenance of the musculoskeletal system, injury prevention strategies and assistance with recovery.[2] According to Grant et al.,[2] sports physiotherapists working with international/elite athletes also face the challenge of the ongoing management of pre-existing conditions. Overuse injuries among athletes were identified as the most common reason to attend physiotherapy services (44%).[2] It is evident that the role of the physiotherapist within the sphere of international sport, is vast and that the role goes beyond the treatment of injury and rehabilitation, to a much broader role which includes providing assistance with musculoskeletal maintenance and recovery as well as injury prevention strategies and supportive rehabilitation.[14] Sports physiotherapists are also in a unique position to be able to take on leadership roles. The broadness of the sports physiotherapist skill set, which includes skills such as understanding acute care management, exercise and evidence-based approaches to injury prevention and treatment, as well as general strength and conditioning concepts, enables sports physiotherapists to oversee the healthcare of athletes in various sporting codes.[16] Another benefit is the great amount of time that sports physiotherapists spend working directly with the athletes. Athletes' Perspectives on the Role of the Sports and Exercise Physiotherapist[edit | edit source] The role of the sports physiotherapist[edit | edit source] "What does a sports physiotherapist do?"[edit | edit source] Athletes have a clear, but sometimes limited, understanding of the role of the sports physiotherapist. They see the role of the sports physiotherapist as mainly injury-focused. In interviews with athletes on the role of the sports physiotherapist, the following four themes emerged[17]: Injury treatment Injury prevention Rehabilitation Performance enhancement "What should a sports physiotherapist not do?"[edit | edit source] Break medical confidentiality - this highlights the importance of trust between the athlete and the sports physiotherapist Become complacent about their position - athletes expect their sports physiotherapist to engage in continual professional development and should be striving to better their abilities, just like athletes do. Qualities of a sports physiotherapist[edit | edit source] Athletes indicated that these qualities are important for sports physiotherapists to possess[17]: Being professional Good personal qualities Being accessible Good communication skills Have an interest in the athletes that they are working with Being open-minded with regards to athletes' ideas regarding their management and the use of other practitioners "A sports physiotherapist should be patient, persistent, have a high level of competency, know when to refer, understand the emotional and psychological demands of the sport and be a good communicator with athletes and coaching staff."[17] Qualities that athletes do not like to see in sports physiotherapists are: Bad personal qualities Being unapproachable Not being a team player Athletes' expectations about physiotherapy in sports injury rehabilitation[edit | edit source] Quartey et al.[18]conducted a cross-sectional qualitative study exploring athletes' expectations about physiotherapy in sports injury rehabilitation. It was shown that athletes have high expectations of physiotherapy for sports injury rehabilitation and that the level of competition had a significant association with athletes' expectations.[18] The different factors of athletes' expectations investigated were[18]: Acceptance Motivation Attractiveness Responsibility Directiveness Empathy Confrontation Nurturance Genuineness Openness Outcome Athletes in this study showed high expectations for all of these factors. However, the most influencing factors that affected athletes' expectations were: directiveness, nurturance and genuineness.[18] These factors are linked to accurate expectations. Athletes expect a high level of professionalism from physiotherapists and furthermore expect physiotherapists to thoroughly explain their injury and outcomes of rehabilitation. Physiotherapists should provide clear direction on rehabilitation, but be nurturing and provide support throughout the rehabilitation process and always be genuine and honest.[8] Achieving sporting success[edit | edit source] "How does sports physiotherapy help you achieve your sporting goals?"[edit | edit source] When athletes were asked this question, their response again mainly reflected on injury focus i.e.:[17] Help to ub the sports medicine team may consist of a family physician or physiotherapist alone. In professional sports teams or at major events such as the Olympic games the sports medicine team may consist of:[20] Family physician Physiotherapist Sports physician Massage therapist Athletic trainer Orthopaedic surgeon Radiologist Podiatrist Psychologist Dietitian/nutritionist Exercise physiologist Coach Fitness advisor Sports scientist Biokinetics The sports medicine model[edit | edit source] The traditional medical model has a physician as the primary contact practitioner with subsequent referral to other medical and paramedical practitioners. The sports medicine model differs from this. The athlete's primary contact may be with a physician, but it can also be with the trainer, the physiotherapist or the massage therapist. Athletes prefer to see the practitioner that they have the best relationship with or the one that they are used to seeing the most. This makes it important that all members of the multidisciplinary sports medicine team are aware of their own strengths and limitations, and also be aware of the skills of the other members and refer to them in order to provide the athlete with the best possible management.[19]Always remember that the management and rehabilitation is athlete-centred. The coach, the athlete and the physiotherapist[edit | edit source] The sports physiotherapist needs to have a good relationship with the athlete. There needs to be a feeling of mutual trust and confidence. This implies that the athlete will feel that he/she can confide in the physio and the physio will feel that the athlete will comply with the advice given. The coach is responsible for the athlete's training and performance and it is vital to involve the coach in the medical decision-making process. It is, unfortunately, the case that some coaches have a distrust of healthcare professionals in sport and they sometimes have the opinion, rightly or wrongly, that the main role of the health care professional is to keep the athlete from training or competing. It is important for coaches to understand that the sports physiotherapist also aims to maximise and improve the performance and health of the athlete.[19] Getting the coach involved in the decision-making process and also explaining the rationale behind recommendations will actually also increase athlete compliance. The coach can be a valuable asset in supervising the recommended treatment or rehabilitation program, and discussions with the coach may help determine possible causes for an injury.[19] Having a good relationship between the coach and sports physiotherapist is a win-win situation for everyone. The coach will have a better and clearer understanding of what the sports physiotherapist does and this can lead to seeking help for minor problems, which in turn can lead to injury prevention. The sports physiotherapist can learn from the coach and have a better understanding of the demands of the sport and this can aid in the institution of injury prevention measures.[19] The Fun of Working in Sports[edit | edit source] Why do sports physiotherapists enjoy working in sports? Some reasons may include[8]: Flexibility Mode: contractor/part-time/full-time Level: elite/sub-elite Olympic/professional/amateur/schools Numbers: individual athletes/teams/squads Environment: indoor/outdoor/extreme sports Types: combat/racing/ball/water/athletic/target/extreme Location: centralised vs multiple sites vs remote (satellite) Funding: remuneration/resources Collaboration: internal/external stake holders and multidisciplinary team Professional development plan: how to get there and keep on progressing Diversity The different roles a sports physiotherapist can fulfil: Pitchside assessment and management Treatment and rehabilitation Screening Objective testing e.g. isokinetic machines Success Being part of the team's or athlete's success Although being a sports physiotherapist seems glamorous, one still needs to be cautious about your goals and achievements. Also, have realistic expectations about the different environments you would need to work in, the long hours and the available facilities that you will encounter.[8] Thoughts and advice[edit | edit source] Final Thoughts[edit | edit source] Some final thoughts to bear in mind on your road to becoming a sports physiotherapist[8]: As a sports physiotherapist always consider the two elements of athlete health and performance enhancement Consider the rewards as well as the challenges of being a sports physiotherapist Keep in mind the technical and non-technical competencies required to make a difference Have a clear vision and mission on how to become a sports physiotherapist or how to become an even better one "Love thy sport"[edit | edit source] It is essential to know and love the sport that you are involved with if you want to be a successful sports physiotherapist. Furthermore, it is essential to be an advocate for physical activity. Sports physiotherapists need to understand the importance of the sport to the athlete, as well as the physical (training and technique) and psychological demands of the sport. Having a good understanding of a sport and exercise provides two important advantages[19]: If a sports physiotherapist understands the demands and technical aspects of a sport, this will improve their ability to recognise possible causes of injury and facilitate the development of sports-specific rehabilitation programmes. The athlete will have confidence in the sports physiotherapist. One of the best ways to learn about a sport and understand it is to attend both training and competition or to even participate in the sport. Being on site during training sessions and competition, not only to aid with injuries but also to develop a good understanding of the sport will help with this. [21] [22] </span></span><span data-dcnode-id="1126" instrument_node="">
