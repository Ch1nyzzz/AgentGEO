</span></div><h2 data-dcnode-id="2483"><span class="mw-headline" data-dcnode-id="2495" id="Introduction"><span data-dcnode-id="2496" instrument_node="">Introduction</span></span><span class="mw-editsection" data-dcnode-id="2484"><span class="mw-editsection-bracket" data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D1" title="Edit section: Introduction"><span data-dcnode-id="2492" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node=""> | </span></span><a data-dcnode-id="2487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D1" title="Edit section: Introduction"><span data-dcnode-id="2488" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">]</span></span></span></h2><p data-dcnode-id="2459"><span data-dcnode-id="2482" instrument_node="">In it's most simple form, </span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Ethics" title="Ethics"><span data-dcnode-id="2481" instrument_node="">ethics</span></a><span data-dcnode-id="2479" instrument_node=""> is the study of what makes a particular action in a particular situation the right thing to do.</span><sup class="reference" data-dcnode-id="2476" id="cite_ref-:0_1-0"><a data-dcnode-id="2477" href="#cite_note-:0-1"><span data-dcnode-id="2478" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2475" instrument_node=""> In the world of sports medicine there are unique challenges to the practice of ethics by health care professionals due to the unusual clinical environment of taking care of athletes in team scenarios with winning being the primary goal.</span><sup class="reference" data-dcnode-id="2472" id="cite_ref-2"><a data-dcnode-id="2473" href="#cite_note-2"><span data-dcnode-id="2474" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2471" instrument_node=""> The traditional health care professional-patient relationship is often replaced with the healthcare professional-patient-team triad and as such creates a scenario in which a team's priority can be in conflict with a health care professional's obligation to the athlete's well-being.</span><sup class="reference" data-dcnode-id="2468" id="cite_ref-3"><a data-dcnode-id="2469" href="#cite_note-3"><span data-dcnode-id="2470" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2467" instrument_node=""> As a result many of the </span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Ethics%2C_Principles_and_Values" title="Ethics, Principles and Values"><span data-dcnode-id="2466" instrument_node="">ethical norms</span></a><span data-dcnode-id="2464" instrument_node=""> that regulate clinical practice, such as autonomy and confidentiality, are not easily translated to sports medicine.</span><sup class="reference" data-dcnode-id="2461" id="cite_ref-:0_1-1"><a data-dcnode-id="2462" href="#cite_note-:0-1"><span data-dcnode-id="2463" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2460" instrument_node="">
</span></p><p data-dcnode-id="2443"><span data-dcnode-id="2458" instrument_node="">Health care professionals in sports, such as doctors, physiotherapists, psychologists are constantly under pressure to keep athletes on the field of play and to improve performance as well as allow the athlete to </span><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Return_to_Play_in_Sports" title="Return to Play in Sports"><span data-dcnode-id="2457" instrument_node="">return to play</span></a><span data-dcnode-id="2455" instrument_node=""> in the shortest possible amount of time. This pressure usually comes from team management, such as coaches, trainers, agents; the athletes themselves or even parents in the case of younger athletes. This constant pressure may compel health care professionals to rather focus on the short-term solutions to injury rather than consider the long-term effects of such solutions and decisions.</span><sup class="reference" data-dcnode-id="2452" id="cite_ref-4"><a data-dcnode-id="2453" href="#cite_note-4"><span data-dcnode-id="2454" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2451" instrument_node=""> In sports medicine a wide variety of ethical dilemmas may be found and unfortunately ,there are no unique right answers for many of these situations.</span><sup class="reference" data-dcnode-id="2448" id="cite_ref-:0_1-2"><a data-dcnode-id="2449" href="#cite_note-:0-1"><span data-dcnode-id="2450" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2447" instrument_node=""> Knowledge of the principles and exposure to the </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Ethics" title="Ethics"><span data-dcnode-id="2446" instrument_node="">practice of ethics</span></a><span data-dcnode-id="2444" instrument_node=""> are helpful in the decision-making process. 
</span></p></div><span data-dcnode-id="2441" instrument_node="">
</span><span data-dcnode-id="2440" instrument_node="">
</span><span data-dcnode-id="2439" instrument_node="">
</span><span data-dcnode-id="2438" instrument_node="">

class="col-md-3" data-dcnode-id="2416"><a class="pp_content_hidden_cta_link" data-dcnode-id="2417" href="#" id="pp_content_hidden_cta_link"><span data-dcnode-id="2418" instrument_node="">Read this article</span></a></div><div class="col-md-7" data-dcnode-id="2413"><a class="btn btn-default pp_content_hidden_cta_btn" data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//members.physio-pedia.com/membership-account/membership-checkout/%3Flevel%3D8%3Futm_source%3Dphysiopedia%26utm_medium%3DGE15b%26utm_campaign%3Dgrowth_experiments" target="_blank"><span data-dcnode-id="2415" instrument_node="">Register Now</span></a></div></div></div><div class="pp-hidden" data-dcnode-id="674" style="display: none;"><h2 data-dcnode-id="2397"><span class="mw-headline" data-dcnode-id="2409" id="Ethical_Problems_in_Sports_Medicine"><span data-dcnode-id="2410" instrument_node="">Ethical Problems in Sports Medicine</span></span><span class="mw-editsection" data-dcnode-id="2398"><span class="mw-editsection-bracket" data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D2" title="Edit section: Ethical Problems in Sports Medicine"><span data-dcnode-id="2406" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node=""> | </span></span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D2" title="Edit section: Ethical Problems in Sports Medicine"><span data-dcnode-id="2402" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">]</span></span></span></h2><p data-dcnode-id="2387"><span data-dcnode-id="2396" instrument_node="">The unique and dynamic relationship between the various stakeholders associated with sports franchises and even local clubs or school teams and athletes are one of the biggest causes of the many ethical issues that are encountered in the care of athletes.</span><sup class="reference" data-dcnode-id="2393" id="cite_ref-:1_5-0"><a data-dcnode-id="2394" href="#cite_note-:1-5"><span data-dcnode-id="2395" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2392" instrument_node=""> The stakeholders can include:</span><sup class="reference" data-dcnode-id="2389" id="cite_ref-:1_5-1"><a data-dcnode-id="2390" href="#cite_note-:1-5"><span data-dcnode-id="2391" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2388" instrument_node="">
</span></p><ul data-dcnode-id="2372"><li data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Health care professionals (doctor, physiotherapist, athletic trainer, etc)</span></li><span data-dcnode-id="2384" instrument_node="">
</span><li data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">The athletes themselves</span></li><span data-dcnode-id="2381" instrument_node="">
</span><li data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Team management (coaches, general manager)</span></li><span data-dcnode-id="2378" instrument_node="">
</span><li data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Team owner (in professional sport)</span></li><span data-dcnode-id="2375" instrument_node="">
</span><li data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Other stakeholders such as agents, family (parents), the media and the sports fans</span></li></ul><h3 data-dcnode-id="2358"><span class="mw-headline" data-dcnode-id="2370" id="Conflicts_of_Interest"><span data-dcnode-id="2371" instrument_node="">Conflicts of Interest</span></span><span class="mw-editsection" data-dcnode-id="2359"><span class="mw-editsection-bracket" data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D3" title="Edit section: Conflicts of Interest"><span data-dcnode-id="2367" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node=""> | </span></span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D3" title="Edit section: Conflicts of Interest"><span data-dcnode-id="2363" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">]</span></span></span></h3><p data-dcnode-id="2349"><span data-dcnode-id="2357" instrument_node="">With this multitude of stakeholders involved, each with their own different interests and goals, health care professionals are often conflicted about the proper course of treatment and </span><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/Rehabilitation_in_Sport" title="Rehabilitation in Sport"><span data-dcnode-id="2356" instrument_node="">rehabilitation</span></a><span data-dcnode-id="2354" instrument_node=""> for an injured athlete.</span><sup class="reference" data-dcnode-id="2351" id="cite_ref-:1_5-2"><a data-dcnode-id="2352" href="#cite_note-:1-5"><span data-dcnode-id="2353" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2350" instrument_node="">
</span></p><p data-dcnode-id="2343"><span data-dcnode-id="2348" instrument_node="">Types of ethical issues experienced by health care professionals working in sports include:</span><sup class="reference" data-dcnode-id="2345" id="cite_ref-6"><a data-dcnode-id="2346" href="#cite_note-6"><span data-dcnode-id="2347" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2344" instrument_node="">
</span></p><ul data-dcnode-id="2331"><li data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">Interdisciplinary conflicts such as miscommunication about roles</span></li><span data-dcnode-id="2340" instrument_node="">
</span><li data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Conflict of interest due to divided loyalties</span></li><span data-dcnode-id="2337" instrument_node="">
</span><li data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Conflicts in acting in the athlete's best interest</span></li><span data-dcnode-id="2334" instrument_node="">
</span><li data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Pressure to return to play from a coach, parent, athlete or administration</span></li></ul><p data-dcnode-id="2317"><span data-dcnode-id="2330" instrument_node="">In sports medicine, conflicts of interest often arise in two areas; confidentiality and clinical decision making.</span><sup class="reference" data-dcnode-id="2327" id="cite_ref-:2_7-0"><a data-dcnode-id="2328" href="#cite_note-:2-7"><span data-dcnode-id="2329" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2326" instrument_node=""> Often confidentiality is challenged by the responsibilities of the health care professional to both the athlete as well as to the team.</span><sup class="reference" data-dcnode-id="2323" id="cite_ref-:2_7-1"><a data-dcnode-id="2324" href="#cite_note-:2-7"><span data-dcnode-id="2325" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2322" instrument_node=""> Clinical decision making, normally associated with an athlete's long-term health and well-being, can be complicated by short-term interests leaning towards the pursuit of winning.</span><sup class="reference" data-dcnode-id="2319" id="cite_ref-:2_7-2"><a data-dcnode-id="2320" href="#cite_note-:2-7"><span data-dcnode-id="2321" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2318" instrument_node="">
</span></p><p data-dcnode-id="2307"><span data-dcnode-id="2316" instrument_node="">Most patients want to reduce their pain/suffering and live a health life. Athletes on the other hand also have as a priority the drive to perform at the highest level possible.</span><sup class="reference" data-dcnode-id="2313" id="cite_ref-:3_8-0"><a data-dcnode-id="2314" href="#cite_note-:3-8"><span data-dcnode-id="2315" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2312" instrument_node=""> A big role of the sports health care professional is to support this athletic achievement.</span><sup class="reference" data-dcnode-id="2309" id="cite_ref-9"><a data-dcnode-id="2310" href="#cite_note-9"><span data-dcnode-id="2311" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2308" instrument_node=""> In the world of professional sports and even in lower levels of sport these days, the dynamics of competitive sport can affect medical decision making. Most of the time these factors are not normally encountered in standard practices.
</span></p><p data-dcnode-id="2301"><span data-dcnode-id="2306" instrument_node="">Health care professionals in sport should be aware of the various potential influences that can affect ethical medical decision-making. Pressure can come from various sources that can influence the health care professional and the athlete. This pressure can come from the athlete, the coaching staff, management and even the health care professionals themselves.</span><sup class="reference" data-dcnode-id="2303" id="cite_ref-:1_5-3"><a data-dcnode-id="2304" href="#cite_note-:1-5"><span data-dcnode-id="2305" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2302" instrument_node="">
</span></p><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Some examples of sources of pressure that a team clinician may come under:
</span></p><ul data-dcnode-id="2264"><li data-dcnode-id="2265"><span data-dcnode-id="2298" instrument_node="">Allowing an athlete to return to play</span><sup class="reference" data-dcnode-id="2295" id="cite_ref-:1_5-4"><a data-dcnode-id="2296" href="#cite_note-:1-5"><span data-dcnode-id="2297" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="2292" id="cite_ref-:3_8-1"><a data-dcnode-id="2293" href="#cite_note-:3-8"><span data-dcnode-id="2294" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2291" instrument_node="">
</span><ul data-dcnode-id="2266"><li data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">pressure from the athlete is usually the greatest potential source of pressure</span></li><span data-dcnode-id="2288" instrument_node="">
</span><li data-dcnode-id="2283"><span data-dcnode-id="2287" instrument_node="">athletes are extremely motivated people and may prefer to risk their health for the sake of taking part and having success
</span><ul data-dcnode-id="2284"><li data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">this is usually motivated by factors such as pride, peer pressure, institutional pressures and financial considerations.</span></li></ul></li><span data-dcnode-id="2282" instrument_node="">
</span><li data-dcnode-id="2267"><span data-dcnode-id="2281" instrument_node="">coaches, teammates, parents, team management can put the clinician under pressure in several ways:</span><sup class="reference" data-dcnode-id="2278" id="cite_ref-:3_8-2"><a data-dcnode-id="2279" href="#cite_note-:3-8"><span data-dcnode-id="2280" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2277" instrument_node="">
</span><ul data-dcnode-id="2268"><li data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">the coach may put pressure on the athlete, who will in turn put pressure on the clinician</span></li><span data-dcnode-id="2274" instrument_node="">
</span><li data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">questioning of the clinician's decision making and sometimes even involving the media</span></li><span data-dcnode-id="2271" instrument_node="">
</span><li data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">management can threaten to replace clinician</span></li></ul></li></ul></li></ul><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Sports health care providers should be aware of these powerful motivators and bear them in mind when determining the extent of an injury and the time needed for recovery and return to play.
</span></p><ul data-dcnode-id="2224"><li data-dcnode-id="2247"><span data-dcnode-id="2261" instrument_node="">A team clinician can also fall victim to "fan syndrome". This is when the clinician's clinical judgment is influenced by his/her desire to see the team win or succeed.</span><sup class="reference" data-dcnode-id="2258" id="cite_ref-:1_5-5"><a data-dcnode-id="2259" href="#cite_note-:1-5"><span data-dcnode-id="2260" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="2255" id="cite_ref-:3_8-3"><a data-dcnode-id="2256" href="#cite_note-:3-8"><span data-dcnode-id="2257" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2254" instrument_node=""> Some ways that this can happen in are:
</span><ul data-dcnode-id="2248"><li data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">allowing a player to return to play too soon</span></li><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">team clinician wants to stay in good favour with team management - clinician provides advice that will please, instead of what is rational advice</span></li></ul></li><span data-dcnode-id="2246" instrument_node="">
</span><li data-dcnode-id="2225"><span data-dcnode-id="2245" instrument_node="">Health care professionals in professional sport do benefit from the team's success and achievements:</span><sup class="reference" data-dcnode-id="2242" id="cite_ref-:3_8-4"><a data-dcnode-id="2243" href="#cite_note-:3-8"><span data-dcnode-id="2244" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2241" instrument_node="">
</span><ul data-dcnode-id="2226"><li data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">there are financial benefits as staff earn performance bonuses</span></li><span data-dcnode-id="2238" instrument_node="">
</span><li data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">clinicians can have contract renewals for the next year</span></li><span data-dcnode-id="2235" instrument_node="">
</span><li data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">travelling with the team</span></li><span data-dcnode-id="2232" instrument_node="">
</span><li data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">increased media exposure</span></li><span data-dcnode-id="2229" instrument_node="">
</span><li data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">enhanced professional reputation</span></li></ul></li></ul><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">The accumulation of these types of pressure can create a conflict of interest and may even affect the clinician's critical thinking and judgement.
</span></p><h4 data-dcnode-id="2207"><span data-dcnode-id="2221" id="Where_lies_the_sports_clinician's_duty?"></span><span class="mw-headline" data-dcnode-id="2219" id="Where_lies_the_sports_clinician.27s_duty.3F"><span data-dcnode-id="2220" instrument_node="">Where lies the sports clinician's duty?</span></span><span class="mw-editsection" data-dcnode-id="2208"><span class="mw-editsection-bracket" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D4" title="Edit section: Where lies the sports clinician's duty?"><span data-dcnode-id="2216" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node=""> | </span></span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physio-pedia.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D4" title="Edit section: Where lies the sports clinician's duty?"><span data-dcnode-id="2212" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">]</span></span></span></h4><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Health care professionals in sport inadvertently have an inherent conflict of interest when they are employed by or under contract with a team or organisation. The question arises as to where the primary duty of the clinician lies...to the athlete or the team?
</span></p><p data-dcnode-id="2199"><span data-dcnode-id="2204" instrument_node="">In most scenarios the team interests and the interests of the athlete are the same. So whatever is the best option or course of treatment for the athlete is also best for the team. However, there are instances where the short-term benefit to the team, might be disadvantageous to the athlete. Regardless of the amount of pressure that a sports health care professional faces, their primary duty is always to the athlete. It is the responsibility of the sports clinician to always fully disclose to the athlete (and the parents, in the case of minors) the extent of the injury, the nature of the injury, the proper rehabilitation as well as the various consequences of injuries and return to play.</span><sup class="reference" data-dcnode-id="2201" id="cite_ref-:3_8-5"><a data-dcnode-id="2202" href="#cite_note-:3-8"><span data-dcnode-id="2203" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2200" instrument_node="">
</span></p><p data-dcnode-id="2189"><span data-dcnode-id="2198" instrument_node="">The well-being of the athlete is always most important, especially if there is a conflict of interest with a third party.</span><sup class="reference" data-dcnode-id="2195" id="cite_ref-:2_7-3"><a data-dcnode-id="2196" href="#cite_note-:2-7"><span data-dcnode-id="2197" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2194" instrument_node=""> One way of minimising potential conflicts between the sports medical team and coaches and management is to instate a policy that the medical team has the final say regarding an athlete's participation after injury. In situations where the sports clinician have fully disclosed everything to the athlete and the athlete (or parents of athlete) still insists on going against medical advice, it is recommended that the clinician ask the player (or parent) to sign an exculpatory waiver.</span><sup class="reference" data-dcnode-id="2191" id="cite_ref-:3_8-6"><a data-dcnode-id="2192" href="#cite_note-:3-8"><span data-dcnode-id="2193" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2190" instrument_node="">
</span></p><p data-dcnode-id="2181"><i data-dcnode-id="2186"><b data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">"Physicians and other health care professionals must always act in the best interest of the patient whether she or he is an athlete or not, regardless of setting, and irrespective of incentives."</span></b></i><sup class="reference" data-dcnode-id="2183" id="cite_ref-:1_5-6"><a data-dcnode-id="2184" href="#cite_note-:1-5"><span data-dcnode-id="2185" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2182" instrument_node="">

-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1685" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1683" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=J61coxg-gY4" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div></div></div></div><p data-dcnode-id="1656"><sup class="reference" data-dcnode-id="1658" id="cite_ref-10"><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-10"><span data-dcnode-id="1660" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1657" instrument_node="">
</span></p><h3 data-dcnode-id="1642"><span class="mw-headline" data-dcnode-id="1654" id="Informed_Consent"><span data-dcnode-id="1655" instrument_node="">Informed Consent</span></span><span class="mw-editsection" data-dcnode-id="1643"><span class="mw-editsection-bracket" data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D5" title="Edit section: Informed Consent"><span data-dcnode-id="1651" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node=""> | </span></span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D5" title="Edit section: Informed Consent"><span data-dcnode-id="1647" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">]</span></span></span></h3><p data-dcnode-id="1632"><span data-dcnode-id="1641" instrument_node="">Informed consent is the voluntary agreement by a patient to a proposed health care management approach after proper and adequate information is conveyed to the patient about the proposed management, including potential risks and benefits and alternative management options.</span><sup class="reference" data-dcnode-id="1638" id="cite_ref-11"><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-11"><span data-dcnode-id="1640" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1637" instrument_node=""> There are various challenges around informed consent in the context of athletes. Issues such as pressure from coaches, parents, or that the athlete feels forced to do "what is best for the team." Should an athlete make decisions such as seeking outside advice or refuse to play while injured, he/she is often labelled as "uncommitted." Another challenge is the huge amount of information that is freely available from various sources. Athletes need to realise that there are not always ways to separate non-scientific information from information with sound scientific evidence and that "personal testimonies" from other players should not influence the advice given by their health care professional.</span><sup class="reference" data-dcnode-id="1634" id="cite_ref-:1_5-7"><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A1-5"><span data-dcnode-id="1636" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1633" instrument_node="">
</span></p><p data-dcnode-id="1626"><span data-dcnode-id="1631" instrument_node="">Keeping record of all discussions between the athlete and the health care professional is paramount. Ideally, it would be best if athletes are provided with documentation regarding the planned course of action as well as the risks and benefits. It is also recommended that both athlete and clinician sign a document stating that the athlete has received the relevant information before making a decision and giving consent. It is always the athlete's decision on what course of treatment he would prefer. If this is different from what the clinician advised, it is essential to document that the athlete is acting against the advice of the clinician.</span><sup class="reference" data-dcnode-id="1628" id="cite_ref-:3_8-7"><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A3-8"><span data-dcnode-id="1630" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1627" instrument_node="">
</span></p><h3 data-dcnode-id="1612"><span class="mw-headline" data-dcnode-id="1624" id="Confidentiality"><span data-dcnode-id="1625" instrument_node="">Confidentiality</span></span><span class="mw-editsection" data-dcnode-id="1613"><span class="mw-editsection-bracket" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D6" title="Edit section: Confidentiality"><span data-dcnode-id="1621" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node=""> | </span></span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D6" title="Edit section: Confidentiality"><span data-dcnode-id="1617" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">]</span></span></span></h3><p data-dcnode-id="1594"><span data-dcnode-id="1611" instrument_node="">Sports health care professionals work in an area that is distinct from many other areas of medical practice.</span><sup class="reference" data-dcnode-id="1608" id="cite_ref-:4_12-0"><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1610" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1607" instrument_node=""> Maintaining confidentiality is shaped by various responsibilities or obligations, the physical environment and practice and policy contexts of sports medicine.</span><sup class="reference" data-dcnode-id="1604" id="cite_ref-:4_12-1"><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1606" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1603" instrument_node=""> As a result confidentiality has been identified as one of the most important ethical issues in sports medicine</span><sup class="reference" data-dcnode-id="1600" id="cite_ref-:6_13-0"><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A6-13"><span data-dcnode-id="1602" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1599" instrument_node=""> and is one of the most frequent ethical dilemmas experienced in sports medicine.</span><sup class="reference" data-dcnode-id="1596" id="cite_ref-14"><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-14"><span data-dcnode-id="1598" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1595" instrument_node="">
</span></p><h4 data-dcnode-id="1580"><span class="mw-headline" data-dcnode-id="1592" id="The_principles_of_confidentiality"><span data-dcnode-id="1593" instrument_node="">The principles of confidentiality</span></span><span class="mw-editsection" data-dcnode-id="1581"><span class="mw-editsection-bracket" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D7" title="Edit section: The principles of confidentiality"><span data-dcnode-id="1589" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node=""> | </span></span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D7" title="Edit section: The principles of confidentiality"><span data-dcnode-id="1585" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">]</span></span></span></h4><p data-dcnode-id="1570"><span data-dcnode-id="1579" instrument_node="">Confidentiality is the concluding item of the Hippocratic oath. The notion is that health care professionals should always exclusively act on behalf of their patients and it is therefore intricately linked to privacy, patient autonomy and informed consent.</span><sup class="reference" data-dcnode-id="1576" id="cite_ref-:4_12-2"><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1578" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1575" instrument_node=""> However, the sharing of information with other healthcare professionals directly involved with the treatment or care of the patient is ethical behaviour.</span><sup class="reference" data-dcnode-id="1572" id="cite_ref-:4_12-3"><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1574" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1571" instrument_node=""> Other mitigated circumstances that might require non-consented disclosure is:
</span></p><ul data-dcnode-id="1540"><li data-dcnode-id="1565"><span data-dcnode-id="1569" instrument_node="">incapacity of patient</span><sup class="reference" data-dcnode-id="1566" id="cite_ref-:5_15-0"><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A5-15"><span data-dcnode-id="1568" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="1564" instrument_node="">
</span><li data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">medical emergencies</span><sup class="reference" data-dcnode-id="1560" id="cite_ref-:5_15-1"><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A5-15"><span data-dcnode-id="1562" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="1558" instrument_node="">
</span><li data-dcnode-id="1553"><span data-dcnode-id="1557" instrument_node="">legal obligation to state law (but not to sport-specific regulations)</span><sup class="reference" data-dcnode-id="1554" id="cite_ref-:5_15-2"><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A5-15"><span data-dcnode-id="1556" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="1552" instrument_node="">
</span><li data-dcnode-id="1547"><span data-dcnode-id="1551" instrument_node="">protecting patient's health and well-being</span><sup class="reference" data-dcnode-id="1548" id="cite_ref-:5_15-3"><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A5-15"><span data-dcnode-id="1550" instrument_node="">[15]</span></a></sup></li><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1541"><span data-dcnode-id="1545" instrument_node="">protection of a third party from serious harm</span><sup class="reference" data-dcnode-id="1542" id="cite_ref-:5_15-4"><a data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A5-15"><span data-dcnode-id="1544" instrument_node="">[15]</span></a></sup></li></ul><p data-dcnode-id="1524"><span data-dcnode-id="1539" instrument_node="">From the available literature it is evident that there are difficulties in simply conveying medical ethical conventions into the area of sports medicine.</span><sup class="reference" data-dcnode-id="1536" id="cite_ref-16"><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-16"><span data-dcnode-id="1538" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1535" instrument_node=""> The </span><a class="external text" data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ifspt.org/" rel="nofollow" target="_blank"><span data-dcnode-id="1534" instrument_node="">International Federation of Sports Physical Therapy (IFSPT)</span></a><span data-dcnode-id="1532" instrument_node=""> clearly states in their </span><a class="external text" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ifspt.org/code-of-ethics/" rel="nofollow" target="_blank"><span data-dcnode-id="1531" instrument_node="">Code of Ethics</span></a><span data-dcnode-id="1529" instrument_node=""> that: "The physical therapist's duty to the athlete must be his/her first concern and contractual and other responsibilities are of secondary importance. A physical therapy decision must be taken honestly and conscientiously."</span><sup class="reference" data-dcnode-id="1526" id="cite_ref-:7_17-0"><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A7-17"><span data-dcnode-id="1528" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1525" instrument_node="">
</span></p><p data-dcnode-id="1502"><span data-dcnode-id="1523" instrument_node="">The sports health care professional and the athlete do have a confidential clinician-athlete relationship, but when a team clinician is employed by the team management this may change this relationship as the team clinician now have two obligations, one to the athlete and one to their employer. Testoni et al (2013)</span><sup class="reference" data-dcnode-id="1520" id="cite_ref-:6_13-1"><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A6-13"><span data-dcnode-id="1522" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1519" instrument_node=""> suggests the term "clinician covering the team" rather than "team clinician" in an attempt to clarify the obligations that the clinician's role should entail.</span><sup class="reference" data-dcnode-id="1516" id="cite_ref-:6_13-2"><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A6-13"><span data-dcnode-id="1518" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1515" instrument_node=""> British and Australian researchers and ethics codes express the view that the team clinician role is "discrete in practice." The British Olympic Association released a position statement on athlete confidentiality in 2000.</span><sup class="reference" data-dcnode-id="1512" id="cite_ref-:8_18-0"><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A8-18"><span data-dcnode-id="1514" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1511" instrument_node=""> In this statement it is argued that a coach or management can only be informed of an athlete's issues (e.g. injury or illness) if the athlete gives consent to this. In contractual scenario's, where a healthcare professional has signed a contract with a sporting governing body or team, they may very well be in breach of their professional code of conduct  should they breach  heir responsibilities of confidentiality.</span><sup class="reference" data-dcnode-id="1508" id="cite_ref-:1_5-8"><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A1-5"><span data-dcnode-id="1510" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1507" instrument_node=""> It is suggested that athletes who have signed a general consent form may still refuse consent for any specific procedure, treatment, test or for information to be shared with other parties.</span><sup class="reference" data-dcnode-id="1504" id="cite_ref-:3_8-8"><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A3-8"><span data-dcnode-id="1506" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1503" instrument_node="">
</span></p><p data-dcnode-id="1485"><span data-dcnode-id="1501" instrument_node="">In the United States the legal structure allows for management to be allowed access to athletes' medical records. This is because of the scholarships and salaries that athletes receive, either at the professional level or collegiate team level.</span><sup class="reference" data-dcnode-id="1498" id="cite_ref-:1_5-9"><a data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A1-5"><span data-dcnode-id="1500" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="1495" id="cite_ref-:4_12-4"><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1497" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1494" instrument_node=""> The Health Insurance Portability and Accountability Act suggests that the medical records of athletes can be seen as part of their employment records rather than privileged health information. Therefore it is allowable to be shared with parties within the specific sporting organisation.</span><sup class="reference" data-dcnode-id="1491" id="cite_ref-:4_12-5"><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1493" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1490" instrument_node=""> These ethical codes that operate within the legal systems are also usually state bounded. As a result ,there are variations in the maintenance of confidentiality and the idea of an universal code of ethics in sports medicine may still be only a dream.</span><sup class="reference" data-dcnode-id="1487" id="cite_ref-:4_12-6"><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1489" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1486" instrument_node="">
</span></p><p data-dcnode-id="1471"><span data-dcnode-id="1484" instrument_node="">Also, even if sports clinicians have the legal right to inform team management about relevant injuries of an athlete, there is still a grey area about what is appropriate information to be shared - some issues such as drug or alcohol abuse, or psychological issues may influence an athlete's performance, but divulging this information to management  might have a negative impact on the athlete's career.  The sports clinician has the duty to clearly state the nature of his/her relationship with the athlete prior to any examination and to clearly indicate that the clinician is not the athlete's private health care professional and that confidentiality can not always be guaranteed.</span><sup class="reference" data-dcnode-id="1481" id="cite_ref-:1_5-10"><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A1-5"><span data-dcnode-id="1483" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1480" instrument_node=""> It is strongly recommended that athletes and sports clinicians sign written agreements before the start of a season or term wherein it is made clear that the sports clinician does have the athlete's consent to share information with the coach or management team if need be and appropriate.</span><sup class="reference" data-dcnode-id="1477" id="cite_ref-:3_8-9"><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A3-8"><span data-dcnode-id="1479" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1476" instrument_node=""> Unfortunately, these results often in athletes seeking medical advice outside of the team environment.</span><sup class="reference" data-dcnode-id="1473" id="cite_ref-:4_12-7"><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1475" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1472" instrument_node="">
</span></p><h4 data-dcnode-id="1457"><span class="mw-headline" data-dcnode-id="1469" id="Factors_that_influence_confidentiality_in_sports"><span data-dcnode-id="1470" instrument_node="">Factors that influence confidentiality in sports</span></span><span class="mw-editsection" data-dcnode-id="1458"><span class="mw-editsection-bracket" data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D8" title="Edit section: Factors that influence confidentiality in sports"><span data-dcnode-id="1466" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node=""> | </span></span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D8" title="Edit section: Factors that influence confidentiality in sports"><span data-dcnode-id="1462" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">]</span></span></span></h4><p data-dcnode-id="1451"><span data-dcnode-id="1456" instrument_node="">It is relevant to understand the social constraints on the maintenance of ethical principles of patient confidentiality.  There are four main factors specifically relating to the sports medicine environment an context:</span><sup class="reference" data-dcnode-id="1453" id="cite_ref-:4_12-8"><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1455" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1452" instrument_node="">
</span></p><h5 data-dcnode-id="1437"><span class="mw-headline" data-dcnode-id="1449" id="Multiple_and_Conflicting_obligations"><span data-dcnode-id="1450" instrument_node="">Multiple and Conflicting obligations</span></span><span class="mw-editsection" data-dcnode-id="1438"><span class="mw-editsection-bracket" data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D9" title="Edit section: Multiple and Conflicting obligations"><span data-dcnode-id="1446" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node=""> | </span></span><a data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D9" title="Edit section: Multiple and Conflicting obligations"><span data-dcnode-id="1442" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">]</span></span></span></h5><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">These include:
</span></p><ul data-dcnode-id="1423"><li data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Sports healthcare professionals being employed by sports organisations</span></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Competitive nature of athletes overriding health concerns</span></li><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">Cost of injury prevention relative to short-term and long-term morbidity</span><sup class="reference" data-dcnode-id="1425" id="cite_ref-:4_12-9"><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1427" instrument_node="">[12]</span></a></sup></li></ul><h5 data-dcnode-id="1409"><span class="mw-headline" data-dcnode-id="1421" id="Physical_Environment"><span data-dcnode-id="1422" instrument_node="">Physical Environment</span></span><span class="mw-editsection" data-dcnode-id="1410"><span class="mw-editsection-bracket" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D10" title="Edit section: Physical Environment"><span data-dcnode-id="1418" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node=""> | </span></span><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D10" title="Edit section: Physical Environment"><span data-dcnode-id="1414" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">]</span></span></span></h5><p data-dcnode-id="1403"><span data-dcnode-id="1408" instrument_node="">Injury is common in sports, and it is so that some medical care is administered in front of coaches, team mates, etc. This exposes clinicians sometimes to questions from fellow team mates or demands from management. Sometimes the design of treatment facilities in sport challenges confidentiality. Furthermore, sports medicine may be practised on the playing field in front of spectators. These "easy ways" of access to information to an athletes medical information is just a few ways that constrains the clinician's maintenance of patient confidentiality.</span><sup class="reference" data-dcnode-id="1405" id="cite_ref-:4_12-10"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1407" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1404" instrument_node="">
</span></p><h5 data-dcnode-id="1389"><span class="mw-headline" data-dcnode-id="1401" id="Practice_Context"><span data-dcnode-id="1402" instrument_node="">Practice Context</span></span><span class="mw-editsection" data-dcnode-id="1390"><span class="mw-editsection-bracket" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D11" title="Edit section: Practice Context"><span data-dcnode-id="1398" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node=""> | </span></span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D11" title="Edit section: Practice Context"><span data-dcnode-id="1394" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">]</span></span></span></h5><p data-dcnode-id="1383"><span data-dcnode-id="1388" instrument_node="">Being involved in sports medicine usually means that the clinician is also part of a multidisciplinary team. This results in clinicians working in a environment "alongside colleagues whose degree of training, familiarity and concordance with medical ethical principles varies."</span><sup class="reference" data-dcnode-id="1385" id="cite_ref-:4_12-11"><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1387" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1384" instrument_node="">
</span></p><p data-dcnode-id="1377"><span data-dcnode-id="1382" instrument_node="">Performance is paramount in sports and athletes are constantly undergoing performance testing. Often the healthcare professionals are required to be involved with these performance-based activities and they may be even included in performance-based financial reward systems.</span><sup class="reference" data-dcnode-id="1379" id="cite_ref-:4_12-12"><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1381" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1378" instrument_node=""> This causes the medical and non-medical spheres in the practice context becoming blurry and this further complicates confidentiality issues with clinicians performing roles that not only cover health care but also performance.
</span></p><p data-dcnode-id="1371"><span data-dcnode-id="1376" instrument_node="">Another area where the complexities of sports medicine are evident is in the system of transferring athletes between clubs or professional teams. The speed with which transfers sometimes occur makes it difficult to get signed and informed consent from athletes to release medical information. Other questions that arise in this field is: What information is owned by the sporting body and what belongs to the athlete. Furthermore, what is the duty of the club/college that is losing an athlete to divulge the medical condition of the involved athlete?</span><sup class="reference" data-dcnode-id="1373" id="cite_ref-:4_12-13"><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1375" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1372" instrument_node="">
</span></p><h5 data-dcnode-id="1357"><span class="mw-headline" data-dcnode-id="1369" id="Policy_Context"><span data-dcnode-id="1370" instrument_node="">Policy Context</span></span><span class="mw-editsection" data-dcnode-id="1358"><span class="mw-editsection-bracket" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D12" title="Edit section: Policy Context"><span data-dcnode-id="1366" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node=""> | </span></span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D12" title="Edit section: Policy Context"><span data-dcnode-id="1362" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">]</span></span></span></h5><p data-dcnode-id="1351"><span data-dcnode-id="1356" instrument_node="">Sports healthcare professionals work within the limits of various sports-specific policies that often require disclosure of privileged information. Athletes consent to these types of disclosure, usually because their desire to participate in sport overrides everything else. Policies that are problematic in the area of confidentiality are those relating to screening and policing of athletes.</span><sup class="reference" data-dcnode-id="1353" id="cite_ref-:4_12-14"><a data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1355" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1352" instrument_node="">
</span></p><p data-dcnode-id="1345"><span data-dcnode-id="1350" instrument_node="">The testing for performance-enhancing drugs is justified on the basis that it protects individuals from harm, enforces equality and is in the economic interests of t.</span><sup class="reference" data-dcnode-id="1347" id="cite_ref-:4_12-15"><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1349" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1346" instrument_node=""> However, there are ethical challenging issues such as:
</span></p><ul data-dcnode-id="1333"><li data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">athletes needing to disclose their whereabouts to enable no-notice, out of competition testing</span></li><span data-dcnode-id="1342" instrument_node="">
</span><li data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">testing for recreational drug use with no performance-enhancing effects, but which can bring the sport into disgrace</span></li><span data-dcnode-id="1339" instrument_node="">
</span><li data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">therapeutic use exemption system - athletes must declare their use of medications that may lead to positive tests - this may potentially divulge confidential medical conditions</span><sup class="reference" data-dcnode-id="1335" id="cite_ref-:4_12-16"><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1337" instrument_node="">[12]</span></a></sup></li></ul><p data-dcnode-id="1327"><span data-dcnode-id="1332" instrument_node="">Other ethical issues relating to policies that can arise are:</span><sup class="reference" data-dcnode-id="1329" id="cite_ref-:4_12-17"><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A4-12"><span data-dcnode-id="1331" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1328" instrument_node="">
</span></p><ul data-dcnode-id="1318"><li data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Sex segregation in sport -  In the case of Caster Semenya, Olympic gold medallist in the 800m, it is shown that based on "nothing more than suspicion born of visual impression". athletes could be subjected to extensive medical and media scrutiny.</span></li><span data-dcnode-id="1324" instrument_node="">
</span><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Cardiac screening - although these policies are designed to protect athletes from harm, there is resistance to this type of screening from athletes who have been forced to withdraw from sport following these tests.</span></li><span data-dcnode-id="1321" instrument_node="">
</span><li data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">The pre-fight and post-fight assessments of boxers involves the public disclosure of privileged medical information as well as the classification of athletes with disabilities.</span></li></ul><h3 data-dcnode-id="1304"><span class="mw-headline" data-dcnode-id="1316" id="Suggestions_for_Ethical_Conduct"><span data-dcnode-id="1317" instrument_node="">Suggestions for Ethical Conduct</span></span><span class="mw-editsection" data-dcnode-id="1305"><span class="mw-editsection-bracket" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">[</span></span><a class="mw-editsection-visualeditor" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26veaction%3Dedit%26section%3D13" title="Edit section: Suggestions for Ethical Conduct"><span data-dcnode-id="1313" instrument_node="">edit</span></a><span class="mw-editsection-divider" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node=""> | </span></span><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/index.php%3Ftitle%3DEthical_Issues_in_Sports%26action%3Dedit%26section%3D13" title="Edit section: Suggestions for Ethical Conduct"><span data-dcnode-id="1309" instrument_node="">edit source</span></a><span class="mw-editsection-bracket" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">]</span></span></span></h3><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Ways to improve the ethical decision-making abilities of health care professionals involved in sports:
</span></p><ul data-dcnode-id="1284"><li data-dcnode-id="1297"><span data-dcnode-id="1301" instrument_node="">the inclusion of an ethics component in sports medicine/physiotherapy fellowship programs</span><sup class="reference" data-dcnode-id="1298" id="cite_ref-:1_5-11"><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/J61coxg-gY4%23cite_note-%3A1-5"><span data-dcnode-id="1300" instrument_node="">[5]</span></a></sup></li><span data-dcnode-id="1296" instrument_node="">

</span><span class="st-ui-type-heading" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Identifying and Analysing an Ethical Issue - Physiopedia</span></span><span data-dcnode-id="1165" instrument_node="">
</span><span class="st-ui-type-detail" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node=""> Introduction Health workers from any discipline regularly face ethical challenges.[1][2][3][4] When considering ethical issues, it is advised that you follow a stepwise approach in your decision-making process[5]: Recognize there is an issue Identify the problem and who is involved Consider the relevant facts, laws and principles Analyze and determine possible courses of action Implement the solution Evaluate and follow up A simple decision-making tool is detailed below. In this example you are required to ask yourself the following questions. What ​should we do? (What options are good or right in this context?) Why ​should we do it? (Exploring the values and reasons that support each option.) How ​should we do it? (What plan of action best aligns with these values and reasons?) Who ​should do it? (Who is responsible for making the final decision and enact and communicating it? An ethical dilemma​ describes a conflict between two morally correct courses of action. There is a conflict between values or principles. The dilemma is that you would be doing something right and wrong at the same time, and by taking one right course you will negate the other right course.[5] The Ethical Decision-Making Process[edit | edit source] The ISSUES-Concept from McMaster University, Hamilton, Canada is an example of ethical decision making framework.[6] It is applicable at personal, professional and organisational levels both between and within groups. Values permeate everything we do in healthcare and sometimes these values come into conflict. When they do, it is imperative to recognise that one is experiencing an ethical dilemma. Ethical conflicts are usually best resolved through direct engagement with the parties involved. Often there will not be an answer that pleases everyone and so it is our responsibility to ensure that our processes for decision-making are fair and legitimate. This tool is designed to help you think through difficult decisions when ethics is a factor and develop justifiable reasons for your choices in a rigorous, transparent and fair manner.[6] This process is captured in the acronym ISSUES I​dentify issue and decision-making process S​tudy the facts S​elect reasonable options U​nderstand values &amp; duties E​valuate &amp; justify options S​ustain and review the plan It may be useful to imagine that rigorous ethical decision-making is like building a house. When we encounter ethical dilemmas our first instinct may be to find a quick fix. However, our desire for resolution may cause us to misidentify the key issues or overlook important facts, values or the opinions of other stakeholders. Ethical decision making starts with a strong foundation, based on a clear understanding of the nature of the problem and all relevant facts and perspectives, before deciding on options, weighing those options, and making the decision. See figure 3 on page 11. Guidelines for Using the Ethical Framework With Groups[edit | edit source] It is important to create a forum where stakeholders have the opportunity to engage in a collaborative discussion. The environment should be both open and non-threatening. It is important to define at the outset of a meeting certain aspects of the process that increase transparency, participation and satisfaction, including: ground rules (i.e. everyone gets to speak uninterrupted, confidentiality of discussion, respectful interactions, etc.) roles for the meeting (i.e. chair, time-keeper, recorder) objectives and outcomes (i.e. the generation and analysis of reasonable options, documentation and communication plan for the decision) the decision-making process (i.e. how stakeholder feedback will be used and who is ultimately responsible for making the decision) The appropriate worksheet may be distributed to all participants to help keep the process on track. It should be worked through one section at a time, recognising that ethical decision-making is not always linear. You may have to go back and revisit earlier steps in the process as additional questions arise or facts emerge. Keep a copy of this toolkit handy, to provide a quick reference for key terms and concepts. At the end of the meeting, summarize each section of the worksheet briefly. Define a clear plan for documenting and communicating any decisions made, and assign specific individuals to accomplish next steps. As required, a follow-up meeting should be scheduled to review outcomes and address systems issues identified. Organisational Ethics ISSUES[edit | edit source] Identify​ the Ethical Issue and Decision-making Process: Engage in reflective practice and consider your "gut reaction" to the situation: What preconceptions and judgements might you bring to the situation? What are your loyalties and intuitions? Where do these come from? State the conflict or dilemma as you currently see it: Try to articulate the issue in one sentence. If you can’t, it may be better to break the problem down into two questions or issues and tackle them one at a time. Example of ethics question: “Given (state uncertainty or conflict about values), what decisions or actions are ethically justifiable?” Determine best process for decision-making: How urgent is the situation? How can stakeholders best be engaged? Who ultimately has decision-making authority? Stakeholders deserve to know and understand how and why a decision that affects them was made. It is important to remember that transparency is not just about the transmission of information; it is also about keeping people engaged constructively in the process. In the rare cases where confidentiality is ethically necessary, the process should still be made as transparent as possible while identifying the confidentiality constraints explicitly. Study ​the facts: In any complex situation, different parties will have different views of the facts of the situation. Ideally, all stakeholders should have a chance to present their views to one another in a respectful, open environment, considering both the context of the situation and the evidence. Stakeholder Perspectives: all stakeholders should have an opportunity to voice their views about the issue (staff, community, patients, partners, etc.) Evidence: include risks and benefits to the organisation and patients; impact of situation on quality or services; best practices, etc. Contextual Features: internal and external directives and partnerships (i.e. academic commitments); legal considerations (i.e. agreements, legislation, etc.); past cases; cultural or environmental issues (i.e. staff morale); public opinion Resource Implications: human and financial Select​ Reasonable Options: Always look for more than two. Try brainstorming options without evaluating at first, or start by describing your “ideal” solution and work backwards to options that are more realistic given the context. Understand ​Values &amp; Duties: Which values are in conflict? Where values may be compromised, what can you do to minimise the negative impact? Are there professional or legal obligations or standards to consider? Consider how various options reflect or support the duties, principles and values Evaluate ​&amp; Justify Options: For each option consider: What are the possible harms to various stakeholders? What are the probable benefits to various stakeholders? What will be the impact on staff, our mission and quality of care? Which duties, principles and values support this option? What if everyone in these circumstances did this? (Does this set a good example? Are we making it easier or harder for others to do the right thing?) Does it meet Organisational Justice requirements: procedural justice, distributive justice, relational justice? Does your solution answer the question you described above? Choose the option with the best consequences overall and closest alignment with key duties, principles and values Clearly state reasons for the decision. Remember that you are not aiming at “the perfect” choice, but a good and defensible choice under the circumstances. Anticipate how you might answer criticisms. Sustain ​&amp; Review the Plan: Accepting responsibility for an ethical choice means ensuring that the decision made is enacted by articulating a clear plan of action, communicating it to stakeholders appropriately and addressing systems that might have contributed to the problem. It also means accepting the possibility that you might be wrong or that you may need to revise your decision in light of new information or changing circumstances. In reviewing the plan consider: How well did the decision-making process work? Was the decision carried out? Was the result satisfactory? Does this situation point to a systems problem (e.g. policy gap)? What lessons were learned from the situation? How will the team respond to similar situations in the future? Are there opportunities to appeal or modify the decision based on new information? Have new questions emerged? (If so, do they require similar deliberation?) Is there a formal evaluation plan in place to monitor progress, good practices and opportunities for improvement? </span></span><span data-dcnode-id="1162" instrument_node="">
