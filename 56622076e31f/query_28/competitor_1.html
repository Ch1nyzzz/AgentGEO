</span><p data-dcnode-id="4112"><span data-dcnode-id="4215" instrument_node="">Cricket is very popular sport in Karnataka with </span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_cricket" title="International cricket"><span data-dcnode-id="4214" instrument_node="">International cricket</span></a><span data-dcnode-id="4212" instrument_node=""> matches attracting a sizeable number of spectators who are willing to pay more than the standard ticket price to get a chance to watch the match.</span><sup class="reference" data-dcnode-id="4209" id="cite_ref-cric_1-1"><a data-dcnode-id="4210" href="#cite_note-cric-1"><span data-dcnode-id="4211" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4208" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinnaswamy_Stadium" title="Chinnaswamy Stadium"><span data-dcnode-id="4207" instrument_node="">Chinnaswamy Stadium</span></a><span data-dcnode-id="4205" instrument_node=""> located in </span><a data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore" title="Bangalore"><span data-dcnode-id="4204" instrument_node="">Bangalore</span></a><span data-dcnode-id="4202" instrument_node=""> is the only stadium in Karnataka that has hosted International cricket matches. This stadium also hosts the </span><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Cricket_Academy" title="National Cricket Academy"><span data-dcnode-id="4201" instrument_node="">National Cricket Academy</span></a><span data-dcnode-id="4199" instrument_node=""> which was started to train youngsters who could represent India in the future.</span><sup class="reference" data-dcnode-id="4196" id="cite_ref </span><p data-dcnode-id="3709"><span data-dcnode-id="3713" instrument_node="">Popular sports in </span><a data-dcnode-id="3711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangalore" title="Mangalore"><span data-dcnode-id="3712" instrument_node="">Mangalore</span></a><span data-dcnode-id="3710" instrument_node=""> include cricket, football, badminton, basketball and surfing.
</span></p><p data-dcnode-id="3671"><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cricket" title="Cricket"><span data-dcnode-id="3708" instrument_node="">Cricket</span></a><span data-dcnode-id="3706" instrument_node=""> is popular in Mangalore.</span><sup class="reference" data-dcnode-id="3703" id="cite_ref-15"><a data-dcnode-id="3704" href="#cite_note-15"><span data-dcnode-id="3705" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3702" instrument_node=""> Local cricket stadia include  </span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangala_Stadium" title="Mangala Stadium"><span data-dcnode-id="3701" instrument_node="">Mangala Stadium</span></a><span data-dcnode-id="3699" instrument_node=""> and B.R. Ambedkar Cricket Stadium (near </span><a class="mw-redirect" data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NMPT" title="NMPT"><span data-dcnode-id="3698" instrument_node="">NMPT</span></a><span data-dcnode-id="3696" instrument_node="">).</span><sup class="reference" data-dcnode-id="3693" id="cite_ref-16"><a data-dcnode-id="3694" href="#cite_note-16"><span data-dcnode-id="3695" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="3690" id="cite_ref-17"><a data-dcnode-id="3691" href="#cite_note-17"><span data-dcnode-id="3692" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3689" instrument_node=""> The </span><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sports_Authority_of_India" title="Sports Authority of India"><span data-dcnode-id="3688" instrument_node="">Sports Authority of India</span></a><span data-dcnode-id="3686" instrument_node=""> (SAI) has a sports training centre at the stadium.</span><sup class="reference" data-dcnode-id="3683" id="cite_ref-18"><a data-dcnode-id="3684" href="#cite_note-18"><span data-dcnode-id="3685" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3682" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangalore_United" title="Mangalore United"><span data-dcnode-id="3681" instrument_node="">Mangalore United</span></a><span data-dcnode-id="3679" instrument_node=""> is a </span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka_Premier_League" title="Karnataka Premier League"><span data-dcnode-id="3678" instrument_node="">Karnataka Premier League</span></a><span data-dcnode-id="3676" instrument_node=""> (KPL) franchise owned by Fiza Developers.</span><sup class="reference" data-dcnode-id="3673" id="cite_ref-19"><a data-dcnode-id="3674" href="#cite_note-19"><span data-dcnode-id="3675" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3672" instrument_node="">
</span></p><p data-dcnode-id="3623"><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangalore_Premier_League" title="Mangalore Premier League"><span data-dcnode-id="3670" instrument_node="">Mangalore Premier League</span></a><span data-dcnode-id="3668" instrument_node=""> (MPL) is a cricket tournament organized by Karnataka Regional Cricket Academy.</span><sup class="reference" data-dcnode-id="3665" id="cite_ref-20"><a data-dcnode-id="3666" href="#cite_note-20"><span data-dcnode-id="3667" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3664" instrument_node=""> The </span><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nehru_Maidan" title="Nehru Maidan"><span data-dcnode-id="3663" instrument_node="">Nehru Maidan</span></a><span data-dcnode-id="3661" instrument_node=""> venue is an important local venue that hosts domestic, inter-school and intercollegiate tournaments.</span><sup class="reference" data-dcnode-id="3658" id="cite_ref-21"><a data-dcnode-id="3659" href="#cite_note-21"><span data-dcnode-id="3660" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3657" instrument_node=""> Mangalore Sports Club (MSC) has been elected as the institutional member for the Mangalore Zone of the </span><a data-dcnode-id="3655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka_State_Cricket_Association" title="Karnataka State Cricket Association"><span data-dcnode-id="3656" instrument_node="">Karnataka State Cricket Association</span></a><span data-dcnode-id="3654" instrument_node=""> (KSCA).</span><sup class="reference" data-dcnode-id="3651" id="cite_ref-22"><a data-dcnode-id="3652" href="#cite_note-22"><span data-dcnode-id="3653" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3648" id="cite_ref-23"><a data-dcnode-id="3649" href="#cite_note-23"><span data-dcnode-id="3650" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3647" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lokesh_Rahul" title="Lokesh Rahul"><span data-dcnode-id="3646" instrument_node="">Lokesh Rahul</span></a><span data-dcnode-id="3644" instrument_node="">, commonly known as KL Rahul and </span><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budhi_Kunderan" title="Budhi Kunderan"><span data-dcnode-id="3643" instrument_node="">Budhi Kunderan</span></a><span data-dcnode-id="3641" instrument_node="">, a former Indian wicket keeper are from Mangalore.</span><sup class="reference" data-dcnode-id="3638" id="cite_ref-24"><a data-dcnode-id="3639" href="#cite_note-24"><span data-dcnode-id="3640" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3637" instrument_node=""> </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ravi_Shastri" title="Ravi Shastri"><span data-dcnode-id="3636" instrument_node="">Ravi Shastri</span></a><span data-dcnode-id="3634" instrument_node="">, who represented India for several years in international cricket as an </span><a data-dcnode-id="3632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/All-rounder" title="All-rounder"><span data-dcnode-id="3633" instrument_node="">all-rounder</span></a><span data-dcnode-id="3631" instrument_node=""> and captained the team, is of </span><a data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangaloreans" title="Mangaloreans"><span data-dcnode-id="3630" instrument_node="">Mangalorean</span></a><span data-dcnode-id="3628" instrument_node=""> descent.</span><sup class="reference" data-dcnode-id="3625" id="cite_ref-25"><a data-dcnode-id="3626" href="#cite_note-25"><span data-dcnode-id="3627" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3624" instrument_node="">
</span></p><p data-dcnode-id="3595"><a data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Association_football" title="Association football"><span data-dcnode-id="3622" instrument_node="">Football</span></a><span data-dcnode-id="3620" instrument_node=""> is popular in the city and is usually played in the </span><i data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">maidans</span></i><span data-dcnode-id="3617" instrument_node=""> (grounds); the </span><a data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nehru_Maidan" title="Nehru Maidan"><span data-dcnode-id="3616" instrument_node="">Nehru Maidan</span></a><span data-dcnode-id="3614" instrument_node=""> is the most popular venue for domestic tournaments.</span><sup class="reference" data-dcnode-id="3611" id="cite_ref-26"><a data-dcnode-id="3612" href="#cite_note-26"><span data-dcnode-id="3613" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3610" instrument_node=""> Dakshina Kannada District Football Association (DKDFA) annually organizes the </span><i data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Independence Day Cup</span></i><span data-dcnode-id="3607" instrument_node="">, which is played on </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Independence_Day_%28India%29" title="Independence Day (India)"><span data-dcnode-id="3606" instrument_node="">Independence Day</span></a><span data-dcnode-id="3604" instrument_node=""> at district football grounds adjacent to Nehru Maidan.</span><sup class="reference" data-dcnode-id="3601" id="cite_ref-27"><a data-dcnode-id="3602" href="#cite_note-27"><span data-dcnode-id="3603" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3600" instrument_node=""> Schools and colleges from across Dakshina Kannada, Udupi and Kodagu districts participate and the matches are conducted under seven categories for children and young adults in education.</span><sup class="reference" data-dcnode-id="3597" id="cite_ref-28"><a data-dcnode-id="3598" href="#cite_note-28"><span data-dcnode-id="3599" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3596" instrument_node="">

de-id="3517" instrument_node="">
</span><p data-dcnode-id="3473"><span data-dcnode-id="3516" instrument_node="">Traditional sports like </span><i data-dcnode-id="3513"><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kambala" title="Kambala"><span data-dcnode-id="3515" instrument_node="">Kambala</span></a></i><span data-dcnode-id="3512" instrument_node="">—buffalo races contested in flooded </span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paddy_field" title="Paddy field"><span data-dcnode-id="3511" instrument_node="">paddy fields</span></a><span data-dcnode-id="3509" instrument_node="">—</span><sup class="reference" data-dcnode-id="3506" id="cite_ref-35"><a data-dcnode-id="3507" href="#cite_note-35"><span data-dcnode-id="3508" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3505" instrument_node="">  and </span><i data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">Korikatta</span></i><span data-dcnode-id="3502" instrument_node=""> (cockfighting) are very popular in the city.</span><sup class="reference" data-dcnode-id="3499" id="cite_ref-36"><a data-dcnode-id="3500" href="#cite_note-36"><span data-dcnode-id="3501" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3498" instrument_node=""> The </span><i data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">Kambala</span></i><span data-dcnode-id="3495" instrument_node=""> of </span><a data-dcnode-id="3493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadri%2C_Mangalore" title="Kadri, Mangalore"><span data-dcnode-id="3494" instrument_node="">Kadri</span></a><span data-dcnode-id="3492" instrument_node=""> is a traditional sports event organized within the city limits.</span><sup class="reference" data-dcnode-id="3489" id="cite_ref-37"><a data-dcnode-id="3490" href="#cite_note-37"><span data-dcnode-id="3491" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3488" instrument_node=""> A Mangalore suburb is named </span><i data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">Kadri Kambla</span></i><span data-dcnode-id="3485" instrument_node=""> after the cockfighting tradition.</span><sup class="reference" data-dcnode-id="3482" id="cite_ref-38"><a data-dcnode-id="3483" href="#cite_note-38"><span data-dcnode-id="3484" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3481" instrument_node=""> </span><i data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Plikula Kambala</span></i><span data-dcnode-id="3478" instrument_node=""> is another Kambala event that is organised within the city.</span><sup class="reference" data-dcnode-id="3475" id="cite_ref-39"><a data-dcnode-id="3476" href="#cite_note-39"><span data-dcnode-id="3477" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3474" instrument_node="">
</span></p><p data-dcnode-id="3452"><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chess" title="Chess"><span data-dcnode-id="3472" instrument_node="">Chess</span></a><span data-dcnode-id="3470" instrument_node=""> is a popular indoor pastime in the city.</span><sup class="reference" data-dcnode-id="3467" id="cite_ref-40"><a data-dcnode-id="3468" href="#cite_note-40"><span data-dcnode-id="3469" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3466" instrument_node=""> Mangalore is the headquarters of </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Kanara_District_Chess_Association" title="South Kanara District Chess Association"><span data-dcnode-id="3465" instrument_node="">South Kanara District Chess Association (SKDCA)</span></a><span data-dcnode-id="3463" instrument_node="">, which has hosted two All India Open Chess tournaments.</span><sup class="reference" data-dcnode-id="3460" id="cite_ref-41"><a data-dcnode-id="3461" href="#cite_note-41"><span data-dcnode-id="3462" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="3457" id="cite_ref-42"><a data-dcnode-id="3458" href="#cite_note-42"><span data-dcnode-id="3459" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="3454" id="cite_ref-43"><a data-dcnode-id="3455" href="#cite_note-43"><span data-dcnode-id="3456" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3453" instrument_node="">
</span></p><p data-dcnode-id="3444"><a data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U_S_Mallya_Indoor_Stadium" title="U S Mallya Indoor Stadium"><span data-dcnode-id="3451" instrument_node="">U S Mallya Indoor Stadium</span></a><span data-dcnode-id="3449" instrument_node=""> offers sporting facilities for badminton and basketball players.</span><sup class="reference" data-dcnode-id="3446" id="cite_ref-44"><a data-dcnode-id="3447" href="#cite_note-44"><span data-dcnode-id="3448" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3445" instrument_node="">
</span></p><p data-dcnode-id="3428"><span data-dcnode-id="3443" instrument_node="">International kite festivals are held at </span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panambur_Beach" title="Panambur Beach"><span data-dcnode-id="3442" instrument_node="">Panambur Beach</span></a><span data-dcnode-id="3440" instrument_node=""> and attract kite enthusiasts from Europe and Australia.</span><sup class="reference" data-dcnode-id="3437" id="cite_ref-45"><a data-dcnode-id="3438" href="#cite_note-45"><span data-dcnode-id="3439" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3436" instrument_node=""> The city has a group of kite enthusiasts named </span><a data-dcnode-id="3434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Team_Mangalore" title="Team Mangalore"><span data-dcnode-id="3435" instrument_node="">Team Mangalore</span></a><span data-dcnode-id="3433" instrument_node=""> that participates in the festivals.</span><sup class="reference" data-dcnode-id="3430" id="cite_ref-46"><a data-dcnode-id="3431" href="#cite_note-46"><span data-dcnode-id="3432" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3429" instrument_node="">
</span></p><p data-dcnode-id="3404"><span data-dcnode-id="3427" instrument_node="">Other sports such as tennis, squash, billiards, badminton and table tennis are played in clubs and </span><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gymkhana" title="Gymkhana"><span data-dcnode-id="3426" instrument_node="">gymkhanas</span></a><span data-dcnode-id="3424" instrument_node=""> in Mangalore.</span><sup class="reference" data-dcnode-id="3421" id="cite_ref-47"><a data-dcnode-id="3422" href="#cite_note-47"><span data-dcnode-id="3423" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3420" instrument_node=""> </span><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangalore_City_Corporation" title="Mangalore City Corporation"><span data-dcnode-id="3419" instrument_node="">MCC</span></a><span data-dcnode-id="3417" instrument_node=""> has renovated the Mangala Swimming Pool, that includes an ozonation plant.</span><sup class="reference" data-dcnode-id="3414" id="cite_ref-swimmingpool_48-0"><a data-dcnode-id="3415" href="#cite_note-swimmingpool-48"><span data-dcnode-id="3416" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3413" instrument_node=""> This swimming pool's size is 50m x 15m, having a capacity of 25 lakh litres of water.</span><sup class="reference" data-dcnode-id="3410" id="cite_ref-swimmingpool_48-1"><a data-dcnode-id="3411" href="#cite_note-swimmingpool-48"><span data-dcnode-id="3412" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3409" instrument_node=""> While it starts at a depth of 4 ft on the shallow side, the diving end is of a depth of 16 ft.</span><sup class="reference" data-dcnode-id="3406" id="cite_ref-swimmingpool_48-2"><a data-dcnode-id="3407" href="#cite_note-swimmingpool-48"><span data-dcnode-id="3408" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3405" instrument_node="">
</span></p><span data-dcnode-id="3403" instrument_node="">
