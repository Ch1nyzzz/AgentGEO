</span><h1 data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Famous Personalities from Karnataka</span></h1><span data-dcnode-id="1729" instrument_node="">
</span><p align="justify" data-dcnode-id="1294"><span data-dcnode-id="1728" instrument_node="">
Karnataka has produced many famous people who has contributed to the society in some way or the other. Basavanna, Akka Mahadevi, Sarvajna, Madhvacharya, Purandara Dasa, Kanaka Dasa, Bahubali, C. V. Raman, Sir M. Visvesvaraya, Field Marshall K.M. Cariappa, Dr. H. Narasimhaiah, Gangubai Hangal, Girish Karnad, M.S. Satyu, Puttanna Kanagal, Dr. Rajkumar, Rajnikant, Aa.Na.Kru, Kuvempu (K.V. Puttappa), R.K. Narayan, Shivarudrappa, Shivarama Karanth, Triveni, Prof. U.R. Rao, Dr. D. Veerendra Heggade, Narayana Murthy, Azim H Premji, Prakash Padukone, Anil Kumble, Rahul Dravid, Javagal Srinath, B.S.Chandrashekar, E.A.S. Prasanna, Mahesh Bhupathi, Pankaj Advani, Aiswarya Rai, Lara Dutta are Great Personalities from Karnataka.</span><br data-dcnode-id="1727"><br data-dcnode-id="1726"><span data-dcnode-id="1725" instrument_node="">
</span><b data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Basavanna</span></b><br data-dcnode-id="1722"><span data-dcnode-id="1721" instrument_node="">
Basava was an Indian philosopher, statesman and a social reformer from what is now Karnataka. Basava fought against the practice of the caste system, which discriminated against people based on their birth, and other rituals in Hinduism. He spread social awareness through his poetry, popularly known as Vachanaas. Basavanna used Ishtalinga, an image of the Siva Linga, to eradicate untouchability, to establish equality among all human beings and as a means to attain spiritual enlightenment. These were rational and progressive social thoughts in the twelfth century.</span><br data-dcnode-id="1720"><br data-dcnode-id="1719"><span data-dcnode-id="1718" instrument_node="">
Basaveshwara is undoubtedly one of the pioneer's of Indian Democracy. He created a model Parliament called the "Anubhava Mantapa," which not only gave equal proportion to men and women, but also had representatives from different socioeconomic backgrounds. The carvings of the model Parliament can be found across many temples in south India. He was a man ahead of his time, who believed that conflict should be resolved through debate and not violence. He advocated mercy towards both humans and animals.</span><br data-dcnode-id="1717"><br data-dcnode-id="1716"><span data-dcnode-id="1715" instrument_node="">
</span><img class="pix" data-dcnode-id="1714" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/statues/basavanna.jpg&amp;raw"><br data-dcnode-id="1713"><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node="">
The Basava Purana is a 13th-century Telugu epic poem. It was written by Palkuriki Somanatha. It is a sacred text of Lingayat. The epic poem narrates the life story of philosopher and social reformer Basava (1134-1196 CE), the founder of Lingayatism. He is also known by several other names such as Basavanna, Basaweshwara, Basavesha and Basavaraja. It is also an anthology of several Lingayat saints and their philosophies.</span><br data-dcnode-id="1710"><br data-dcnode-id="1709"><span data-dcnode-id="1708" instrument_node="">
</span><span class="indx ln" data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">
</span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/basavana_bagewadi.htm"><span data-dcnode-id="1706" instrument_node="">Basavana Quotes (Vachana)</span></a><span data-dcnode-id="1704" instrument_node="">
</span></span><span data-dcnode-id="1702" instrument_node="">
</span><br data-dcnode-id="1701"><br data-dcnode-id="1700"><span data-dcnode-id="1699" instrument_node="">
</span><b data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Akka Mahadevi</span></b><br data-dcnode-id="1696"><span data-dcnode-id="1695" instrument_node="">
Akka Mahadevi was a prominent figure of the Veerashaiva Bhakti movement of the 12th century Karnataka. Akkamahadevi Vachanas in kannada, a form of didactic poetry, are considered her most notable contribution to Kannada Bhakti literature. In all she wrote about 430 Vachanas which is relatively fewer than that compared to some other saints of her time. Yet the term 'Akka' (elder Sister), which is an honorific given to her by great Veerashaiva saints like Basavanna, Chenna Basavanna, Kinnari Bommayya, Siddharama, Allamaprabhu and Dasimayya, speaks volumes of her contribution to the movement that was underway. She is in hindsight seen as a great and inspirational woman for Kannada literature and the history of Karnataka. She is said to have accepted the god Shiva ('Chenna Mallikarjuna') as her husband, traditionally understood as the 'madhura bhava' or 'madhurya' form of devotion (similar to how 8th century Andal declared herself marriable only to lord Vishnu or as centuries later Meera, a 16th-century saint, considered herself married to Krishna).</span><br data-dcnode-id="1694"><br data-dcnode-id="1693"><span data-dcnode-id="1692" instrument_node="">
</span><img class="pix" data-dcnode-id="1691" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/akka_mahadevi.jpg&amp;raw"><br data-dcnode-id="1690"><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">
</span><span class="indx ln" data-dcnode-id="1677"><span data-dcnode-id="1687" instrument_node="">
</span><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/personalities_mysore.htm"><span data-dcnode-id="1686" instrument_node="">Personalities from Mysore</span></a><br data-dcnode-id="1684"><span data-dcnode-id="1683" instrument_node="">
</span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/film_stars_from_mangalore.htm"><span data-dcnode-id="1682" instrument_node="">Film Stars from Mangalore</span></a><br data-dcnode-id="1680"><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">
</span></span><span data-dcnode-id="1676" instrument_node="">
</span><b data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Sarvajna</span></b><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">
Sarvajna was a Kannada poet, pragmatist and philosopher. He is famous for his pithy three-lined poems which are called tripadis, "with three padas[disambiguation needed], three-liners", a form of Vachanas. He is also referred as Sarvagna in modern translation.</span><br data-dcnode-id="1671"><br data-dcnode-id="1670"><span data-dcnode-id="1669" instrument_node="">
</span><img class="pix" data-dcnode-id="1668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/sarvagna.jpg&amp;raw"><br data-dcnode-id="1667"><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">
</span><b data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Madhvacharya</span></b><br data-dcnode-id="1662"><span data-dcnode-id="1661" instrument_node="">
Madhvacharya also known as Purna Prajna and Ananda Tirtha, was the chief proponent of Tattvavada "philosophy of reality", popularly known as the Dvaita (dualism) school of Hindu philosophy. It is one of the three most influential Vedanta philosophies. Madhvacarya was one of the important philosophers during the Bhakti movement. He was a pioneer in many ways, going against standard conventions and norms. According to tradition, Madhvacarya is believed to be the third incarnation of Vayu (Mukhyaprana) and first two being Hanuman and Bhima.</span><br data-dcnode-id="1660"><br data-dcnode-id="1659"><span data-dcnode-id="1658" instrument_node="">
</span><img class="pix" data-dcnode-id="1657" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/madhvacharya.jpg&amp;raw"><br data-dcnode-id="1656"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">
</span><b data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Purandara Dasa</span></b><br data-dcnode-id="1651"><span data-dcnode-id="1650" instrument_node="">
Purandara Dasa is one of the most prominent composers of Carnatic music and is widely regarded as the "Grandfather of Carnatic Music". Purandara Dasa addressed social issues in addition to worship in his compositions, a practice emulated by his younger contemporary, Kanakadasa. Purandara Dasa's Carnatic music compositions are mostly in Kannada; some are in Sanskrit. He signed his compositions with the mudra (pen name), "Purandara Vittala" (Vittala is one of the incarnations of the Hindu god Vishnu).</span><br data-dcnode-id="1649"><br data-dcnode-id="1648"><span data-dcnode-id="1647" instrument_node="">
</span><img class="pix" data-dcnode-id="1646" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/purandara_dasa.jpg&amp;raw"><br data-dcnode-id="1645"><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">
</span><b data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Kanaka Dasa</span></b><br data-dcnode-id="1640"><span data-dcnode-id="1639" instrument_node="">
Kanaka Dasaru (1509-1609) was a poet, philosopher, musician and composer from modern Karnataka. He is known for his Kirtanes and Ugabhoga compositions in the Kannada language for Carnatic music. Like some other Dasas, he often used colloquial language for his compositions. He was a disciple of Vyasathirtha and a follower of Dwaita philosophy propounded by Madhvacharya.</span><br data-dcnode-id="1638"><br data-dcnode-id="1637"><span data-dcnode-id="1636" instrument_node="">
</span><img class="pix" data-dcnode-id="1635" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/kanakadasa.jpg&amp;raw"><br data-dcnode-id="1634"><br data-dcnode-id="1633"><span data-dcnode-id="1632" instrument_node="">
</span><b data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Bahubali</span></b><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">
Bahubali also called Gomateshwa was an Arihant. According to Jainism, he was the second of the hundred sons of the first Tirthankara, Rishabha and king of Podanpur. The Adipurana, a 10th-century Kannada text by poet Adikavi Pampa (fl. 941 CE), written in Champu style, a mix of prose and verse and spread over in sixteen cantos, deals with the ten lives of the first tirthankara, Rishabha and his two sons, Bharata and Bahubali. According to the Digambaras he was the first human in this half time cycle to attain liberation.</span><br data-dcnode-id="1627"><br data-dcnode-id="1626"><span data-dcnode-id="1625" instrument_node="">
</span><img class="pix" data-dcnode-id="1624" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/sravanabelgola.jpg&amp;raw"><br data-dcnode-id="1623"><br data-dcnode-id="1622"><span data-dcnode-id="1621" instrument_node="">
A monolithic statue of Bahubali referred to as "Gommateshvara" built by the Ganga dynasty minister and commander Chamundaraya is a 60 feet (18 m) monolith and is situated above a hill in Shravanabelagola, in the Hassan district of Karnataka state, India. It was built in the 10th century AD. Hundreds of thousands of pilgrims, devotees and tourists from all over the world flock to the statue once in 3 years for an event known as Mahamastakabhisheka. On August 5, 2007, the statue was voted by Indians as the first of Seven Wonders of India. 49% votes went in favor of this marvel.</span><br data-dcnode-id="1620"><br data-dcnode-id="1619"><span data-dcnode-id="1618" instrument_node="">
</span><b data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">C. V. Raman</span></b><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">
Sir Chandrasekhara Venkata Raman, (7 November 1888 - 21 November 1970) was an Indian physicist whose ground breaking work in the field of light scattering earned him the 1930 Nobel Prize for Physics. He discovered that, when light traverses a transparent material, some of the deflected light changes in wavelength. This phenomenon is now called Raman scattering and is the result of the Raman effect.[3] In 1954, he was honoured with the highest civilian award in India, the Bharat Ratna.</span><br data-dcnode-id="1613"><br data-dcnode-id="1612"><span data-dcnode-id="1611" instrument_node="">
</span><img class="pix" data-dcnode-id="1610" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/c_v_raman.jpg&amp;raw"><br data-dcnode-id="1609"><br data-dcnode-id="1608"><span data-dcnode-id="1607" instrument_node="">
</span><b data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Sir M. Visvesvaraya</span></b><br data-dcnode-id="1604"><span data-dcnode-id="1603" instrument_node="">
Sir Mokshagundam Vishveshwariah KCIE, (popularly known as Sir MV; 15 September 1860 - 14 April 1962) was a notable Indian engineer, scholar, statesman and the Diwan of Mysore during 1912 to 1918. He was a recipient of the Indian Republic's highest honour, the Bharat Ratna, in 1955. He was knighted as a Knight Commander of the Indian Empire (KCIE) by King George V for his contributions to the public good. Every year, 15 September is celebrated as Engineer's Day in India in his memory. He is held in high regard as a pre-eminent engineer of India. He was the chief designer of the flood protection system for the city of Hyderabad, now capital city of Andhra Pradesh, as well as the chief engineer responsible for the construction of the Krishna Raja Sagara dam in Mandya.</span><br data-dcnode-id="1602"><br data-dcnode-id="1601"><span data-dcnode-id="1600" instrument_node="">
</span><img class="pix" data-dcnode-id="1599" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/statues/m_visvesvaraya_puttenahalli.jpg&amp;raw"><br data-dcnode-id="1598"><br data-dcnode-id="1597"><span data-dcnode-id="1596" instrument_node="">
</span><b data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Field Marshall K.M. Cariappa</span></b><br data-dcnode-id="1593"><span data-dcnode-id="1592" instrument_node="">
Field Marshal Kodandera "Kipper" Madappa Cariappa OBE (28 January 1899 - 15 May 1993) was the first Indian Commander-in-Chief,of the Indian Army and led the Indian forces on the Western Front during the Indo-Pakistan War of 1947.</span><br data-dcnode-id="1591"><br data-dcnode-id="1590"><span data-dcnode-id="1589" instrument_node="">
</span><img class="pix" data-dcnode-id="1588" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/field_marshall_km_cariappa.jpg&amp;raw"><br data-dcnode-id="1587"><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node="">
He is among only two Indian Army officers to hold the highest rank of Field Marshal (the other being Field Marshal Sam Manekshaw). His distinguished military career spanned almost three decades, at the highest point of which, he was appointed as the Commander-in-Chief of the Indian Military in 1949.</span><br data-dcnode-id="1584"><br data-dcnode-id="1583"><span data-dcnode-id="1582" instrument_node="">
</span><b data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Dr. H. Narasimhaiah</span></b><br data-dcnode-id="1579"><span data-dcnode-id="1578" instrument_node="">
Hosur Narasimhaiah 6 June 1921 - 31 January 2005) was an Indian physicist, educator, freedom fighter and rationalist from Karnataka. He was popularly known as "HN". He was conferred Padma Bhushan by the Government of India in 1985.</span><br data-dcnode-id="1577"><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node="">
</span><img class="pix" data-dcnode-id="1574" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/dr_h_narasimhaiah.jpg&amp;raw"><br data-dcnode-id="1573"><br data-dcnode-id="1572"><span data-dcnode-id="1571" instrument_node="">
</span><b data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Gangubai Hangal</span></b><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node="">
Gangubai Hangal (5 March 1913 - 21 July 2009) was an Indian singer of the khyal genre of Hindustani classical music, who was known for her deep and powerful voice. Hangal belonged to the Kirana gharana.</span><br data-dcnode-id="1566"><br data-dcnode-id="1565"><span data-dcnode-id="1564" instrument_node="">
</span><img class="pix" data-dcnode-id="1563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/gangubai_hangal.jpg&amp;raw"><br data-dcnode-id="1562"><br data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">
Gangubai Hangal was born in Dharwad to Chikkurao Nadiger, an agriculturist and Ambabai, a vocalist of Carnatic music. Hangal received only elementary education and her family shifted to Hubli in 1928 so that Gangubai could study Hindustani music. She began to train formally aged 13 with Krishnacharya Hulgur, a kinnari (stringed instrument like a veena)player, studying Hindustani classical music. From Hulgur, Gangubai learned sixty compositions in one year before he stopped teaching her after an argument about his fees. She also learned from Dattopant Desai before studying under Sawai Gandharva, a respected guru. Hangal could only study sporadically under Gandharva when he returned to his home, but she received an intensive training of three years after he relocated permanently to Hubli.</span><br data-dcnode-id="1559"><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node="">
Gangubai Hangal received a number of awards, which include Karnataka Sangeet Nritya Academy Award (1962), Padma Bhushan (1971), Sangeet Natak Akademi Award (1973), Sangeet Natak Akademi Fellowship (1996) and Padma Vibhushan (2002). In 2008, The State Government of Karnataka decided to name the proposed Karnataka State Music University after Gangubhai Hangal. Subsequently Karnataka State Dr Gangubai Hangal Music and Performing Arts University Act, 2009 has been passed by the State Legislature. Presently the Karnataka State Gangubhai Hangal Music and Performing Arts University operates from Mysore, Karnataka</span><br data-dcnode-id="1556"><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">
Gangothri - the birth place of Gangubai Hangal - has been converted into a museum by the Government of Karnataka. Dr Gangubai Hangal Gurukul in Hubli trains artists in traditional Guru-Shishya parampara to become performing artists.</span><br data-dcnode-id="1553"><br data-dcnode-id="1552"><span data-dcnode-id="1551" instrument_node="">
</span><b data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Girish Karnad</span></b><br data-dcnode-id="1548"><span data-dcnode-id="1547" instrument_node="">
Girish Raghunath Karnad (born 19 May 1938) is a contemporary writer, playwright, screenwriter, actor and movie director in Kannada language. His rise as a playwright in 1960s, marked the coming of age of Modern Indian playwriting in Kannada, just as Badal Sarkar did in Bengali, Vijay Tendulkar in Marathi, and Mohan Rakesh in Hindi. He is a recipient of the 1998 Jnanpith Award, the highest literary honour conferred in India.</span><br data-dcnode-id="1546"><br data-dcnode-id="1545"><span data-dcnode-id="1544" instrument_node="">
</span><img class="pix" data-dcnode-id="1543" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travel2karnataka.com/images/people/girish_karnad.jpg&amp;raw"><br data-dcnode-id="1542"><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">
For four decades Karnad has been composing plays, often using history and mythology to tackle contemporary issues. He has translated his plays into English and has received acclaim. His plays have been translated into some Indian languages and directed by directors like Ebrahim Alkazi, B. V. Karanth, Alyque Padamsee, Prasanna, Arvind Gaur, Satyadev Dubey, Vijaya Mehta, Shyamanand Jalan and Amal Allana. He is active in the world of Indian cinema working as an actor, director, and screenwriter, in Hindi and Kannada flicks, earning awards along the way. He was conferred Padma Shri and Padma Bhushan by the Government of India and won four Filmfare Awards where three are Filmfare Award for Best Director - Kannada and one Filmfare Best Screenplay Award.</span><br data-dcnode-id="1539"><br data-dcnode-id="1538"><span data-dcnode-id="1537" instrument_node="">
</span><b data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">M.S. Satyu</span></b><br data-dcnode-id="1534"><span data-dcnode-id="1533" instrument_node="">
Mysore Shrinivas Sathyu (born 6 July 1930 in Mysore, Karnataka) is a leading film director, stage designer and art director from India. His film Garam Hawa is based on the partition of India. He is a recipient of the Padma Shri in 1975.</span><br data-dcnode-id="1532"><br data-dcnode-id="1531"><span data-dcnode-id="1530" instrument_node="">
</span><b data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Puttanna Kanagal</span></b><br data-dcnode-id="1527"><span data-dcnode-id="1526" instrument_node="">
Puttanna Kanagal (1 December 1933 - 5 June 1985) was one of the prominent Kannada film directors of the 1960s and the 1970s. Although the majority of his films were on offbeat or taboo subjects, he endeared himself to both the critics and ordinary film goers alike. He also directed a handful of films in Malayalam, Tamil, Telugu and Hindi. He received three National Film Awards, three Southern Filmfare Awards and numerous Karnataka State Film Awards. Karnataka state is honoring film directors and various personalities with Puttanna Kanagal Award in his memory and honor every year during the Karnataka State Awards function.</span><br data-dcnode-id="1525"><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">
</span><b data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Dr. Rajkumar</span></b><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">
Singanalluru Puttaswamayya Muthuraju (24 April 1929 - 12 April 2006), known mononymously by his screen name Rajkumar was an actor and singer in the Kannada film industry. Dr.Raj is considered a cultural icon of Kannada, where he is also known as Rajanna, Natasarvabhouma (emperor of acting), Gaana Gandharva (singer in the court of Gods), and as Annavru (beloved elder brother).</span><br data-dcnode-id="1518"><br data-dcnode-id="1517"><span data-dcnode-id="1516" instrument_node="">
A method actor, Rajkumar entered the film industry at the age of eight and got his first break as a lead in the 1954 film Bedara Kannappa and went on to work in over 220 films. At the age of 71, he was kidnapped in Gajanur (the place where he was brought up) by forest brigand Veerappan during a 108-day ordeal when he was released. He died of cardiac arrest at his residence in Bangalore on 12 April 2006.</span><br data-dcnode-id="1515"><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">
In his film career, Rajkumar received eleven Karnataka State Film Awards, ten South Filmfare Awards, two National Film Awards and a National Film Award for Best Playback Singer. He received in 2002 the NTR National Award. He was also awarded an honorary doctorate from the University of Mysore, and is a recipient of the Padma Bhushan. and the Dadasaheb Phalke Award</span><br data-dcnode-id="1512"><br data-dcnode-id="1511"><span data-dcnode-id="1510" instrument_node="">
</span><b data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Vishnuvardhan</span></b><br data-dcnode-id="1507"><span data-dcnode-id="1506" instrument_node="">
Sampath Kumar (18 September 1950 - 30 December 2009), popularly known as Dr. Vishnuvardhan, was a prominent Indian film actor. He was called "The Phoenix of Indian Cinema". He has acted in over 200 Kannada, five Hindi, five Telugu, nine Malayalam and three Tamil films. He was very instrumental in shaping the Kannada identity. He adopted the name Vishnuvardhan at the insistence of Puttanna Kanagal, who directed his maiden film, Naagarahaavu that gave him the recognition of the 'angry young man of Kannada cinema'. He proved to be extremely versatile by playing variety of roles, be it the character of an Action Star or The Romantic Hero, Comedy roles or the serious ones, name it and he has done it all. He could handle all the roles with great ease. He was a Martial Art expert and in an interview to The Hindu, he had said that it was the era of Bruce Lee and it was only Kamal Haasan and himself who had learnt Martial Arts in his generation.</span><br data-dcnode-id="1505"><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">
A poll conducted in Karnataka by the very popular English News Channel CNN-IBN in 2008 revealed that 'Dr.Vishnuvardhan was the most popular star, the Kannada Film Industry has ever seen' and this was in the 36th year of Vishnu's career in the industry which proved that he rubbed shoulders with the new generation actors and still was considered as an actor who had no competition whatsoever. The poll also revealed that Rajinikanth, Chiranjeevi and Mohanlal were the most popular stars of the Tamil, Telugu and the Malayalam film industries respectively.</span><br data-dcnode-id="1502"><br data-dcnode-id="1501"><span data-dcnode-id="1500" instrument_node="">
</span><b data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Ambareesh</span></b><br data-dcnode-id="1497"><span data-dcnode-id="1496" instrument_node="">
Malavallii Huche Gowda Amarnath (Ambareesh) or M. H. Amarnath (Ambaresh) (known as Rebel-Star and Mandyada Gandu) born 29 May 1952 at Maddur Taluk in Mandya District of Karnataka state is an Indian film actor and also a prominent politician from Karnataka state. He's currently the MLA winning the assembly election of the Mandya constituency, by a margin of 42,937 votes. He is the present Minister of Housing for the Karnataka State.</span><br data-dcnode-id="1495"><br data-dcnode-id="1494"><span data-dcnode-id="1493" instrument_node="">
</span><b data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Rajnikant</span></b><br data-dcnode-id="1490"><span data-dcnode-id="1489" instrument_node="">
Rajinikanth (born Shivaji Rao Gaikwad; 12 December 1950) is an Indian film actor, media personality, and cultural icon. He made his acting debut through the National Film Award-winning Tamil film Apoorva Raagangal (1975), directed by K. Balachander, whom the actor considers his mentor. While working in other regional film industries of India, Rajinikanth has also appeared in the cinemas of other nations, including that of the United States.</span><br data-dcnode-id="1488"><br data-dcnode-id="1487"><span data-dcnode-id="1486" instrument_node="">
Born and raised in the Indian city of Bangalore, Rajinikanth struggled with an impoverished lifestyle during his childhood. He began acting in plays while working in the Bangalore Metropolitan Transport Corporation as a bus conductor. He came to Madras in 1973 and got admitted into the Madras Film Institute to pursue a diploma in acting. After a brief phase of portraying antagonistic characters in Tamil films, Rajinikanth gradually rose to become an established actor. Since then, he continues to hold a matinee idol status in the popular culture of India. His mannerisms and stylised delivery of dialogue in films contribute to his mass popularity and appeal. After being paid INR260 million (US$4.2 million) for his role in Sivaji (2007), he became the highest paid actor in Asia after Jackie Chan.</span><br data-dcnode-id="1485"><br data-dcnode-id="1484"><span data-dcnode-id="1483" instrument_node="">
As of 2013, he has won six Tamil Nadu State Film Awards-four Best Actor Awards and two Special Awards for Best Actor-and a Filmfare Best Tamil Actor Award. He is a recipient of the Padma Bhushan, India's third highest civilian honour. In addition to acting, Rajinikanth has also worked as a producer and screenwriter. Apart from his film career, he is also a philanthropist, spiritualist and serves as an influence in the Dravidian politics. He married Latha Rangachari, whom he met in an interview in 1981 and has two children with her.</span><br data-dcnode-id="1482"><br data-dcnode-id="1481"><span data-dcnode-id="1480" instrument_node="">
</span><b data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">A. N. Krishna Rao</span></b><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node="">
Dr. A. N. Krishna Rao (Arakalagudu Narasingarao Krishna Rao) 9 May 1908 - 8 July 1971), popularly known as Anakru, was an Indian writer. He was one of the best-known writers in the Kannada language. He was popularly known as Kadambari Sarvabhouma (lit, King of Novels). The inception of the Pragatishila (progressive) movement in Kannada literature is credited to him. He received an honorary doctorate from the Mysore University and the Karnataka state Sahitya Akademi award.</span><br data-dcnode-id="1475"><br data-dcnode-id="1474"><span data-dcnode-id="1473" instrument_node="">
</span><b data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Kuvempu (K.V. Puttappa)</span></b><br data-dcnode-id="1470"><span data-dcnode-id="1469" instrument_node="">
Kuppali Venkatappa Puttappa December 29, 1904 - November 11, 1994), widely known by the pen name Kuvempu or by the abbreviation K. V. Puttappa, was a Kannada writer and poet, widely regarded as the greatest poet of 20th century Kannada literature. He is the first among eight recipients of Jnanpith Award for Kannada. Puttappa wrote all his literary works using the pen name Kuvempu.
He is the second - after M. Govinda Pai - among Kannada poets to be revered as Rashtrakavi, a national poet. His work Sri Ramayana Darshanam, the rewriting of the great ancient Indian epic Ramayana in modern Kannada, is regarded as revival of the era of Mahakavya (Epic poetry) in a contemporary form and charm. He is immortalised by some of his phrases, and in particular for his contribution to Universal Humanism or in his own words Vishwa maanavataa Vaada. He was conferred Padma Vibhushan by Government of India. He has penned the Karnataka State anthem Jaya Bharata Jananiya Tanujate.</span><br data-dcnode-id="1468"><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node="">
</span><b data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">R.K. Narayan</span></b><br data-dcnode-id="1463"><span data-dcnode-id="1462" instrument_node="">
R. K. Narayan (10 October 1906 - 13 May 2001), full name Rasipuram Krishnaswami Iyer Narayanaswami, was an Indian writer, best known for his works set in the fictional South Indian town of Malgudi. He is one of three leading figures of early Indian literature in English (alongside Mulk Raj Anand and Raja Rao), and is credited with bringing the genre to the rest of the world.</span><br data-dcnode-id="1461"><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">
Narayan broke through with the help of his mentor and friend, Graham Greene, who was instrumental in getting publishers for Narayan's first four books, including the semi-autobiographical trilogy of Swami and Friends, The Bachelor of Arts and The English Teacher. Narayan's works also include The Financial Expert, hailed as one of the most original works of 1951, and Sahitya Akademi Award winner The Guide, which was adapted for film and for Broadway.</span><br data-dcnode-id="1458"><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">
The setting for most of Narayan's stories is the fictional town of Malgudi, first introduced in Swami and Friends. His narratives highlight social context and provide a feel for his characters through everyday life. He has been compared to William Faulkner, who also created a fictional town that stood for reality, brought out the humour and energy of ordinary life, and displayed compassionate humanism in his writing. Narayan's short story writing style has been compared to that of Guy de Maupassant, as they both have an ability to compress the narrative without losing out on elements of the story. Narayan has also come in for criticism for being too simple in his prose and diction.</span><br data-dcnode-id="1455"><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">
In a writing career that spanned over sixty years, Narayan received many awards and honours. These include the AC Benson Medal from the Royal Society of Literature and the Padma Vibhushan, India's second-highest civilian award. He was also nominated to the Rajya Sabha, the upper house of India's parliament.</span><br data-dcnode-id="1452"><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">

Anil Radhakrishna Kumble (born 17 October 1970) is a former international cricketer and captain of the Indian cricket team. A right-arm leg spin (leg break googly) bowler, he took 619 wickets in Test cricket and remains the third-highest wicket taker-only behind Muttiah Muralitharan and Shane Warne-as of 2012. Unlike his contemporaries, Kumble was not a big turner of the ball, rather relied much on pace and accuracy. His ability to make the ball bounce with subtle variations in pace made him a tough bowler to face for the batsmen; thus earning him the sobriquet "Jumbo". Kumble was selected as the Indian Cricket Cricketer of the Year in 1993 and one of the Wisden Cricketers of the Year three years later.</span><br data-dcnode-id="1387"><br data-dcnode-id="1386"><span data-dcnode-id="1385" instrument_node="">
Born in Bangalore, Karnataka, Kumble developed an early interest in cricket as he grew up watching players like B. S. Chandrasekhar before becoming a full-fledged cricketer. He made his First-class debut at the age of 19 while representing Karnataka. Soon he was picked up for the Austral-Asia Cup in 1990 before making his Test debut against England later that year. Since then he has represented the Indian Test team on more than 132 Test matches and was responsible for many of India's victories. Kumble became a part of the regular ODI team during the early 1990s and held some of the best performances during this time; which included his six for 12 (six wickets for 12 runs) against the West Indies. The year 1996 proved to very successful for him as he was selected for the World Cup and emerged out as the most successful bowler of the tournament; he played seven matches and captured 15 wickets at an average of 18.73. In 1999 while playing against Pakistan, Kumble dismissed all the ten batsmen in a Test match innings. In the event he became the second player to achieve this feat after Jim Laker of England.</span><br data-dcnode-id="1384"><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
Kumble was awarded the Padma Shri, India's fourth highest civilian honour in 2005. After having played for 18 years, he announced his retirement from international cricket in November 2008. In October 2012, Kumble was appointed the chairman of International Cricket Council (ICC)'s cricket committee.</span><br data-dcnode-id="1381"><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">
In January 2013, Kumble accepted the role of Chief Mentor with the Mumbai Indians, resigning from a similar position he held in the Royal Challengers Bangalore.</span><br data-dcnode-id="1378"><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node="">
</span><b data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Rahul Dravid</span></b><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">
Rahul Dravid(born 11 January 1973) is a former Indian cricketer, who captained the national Test and One Day International (ODI) teams. Born in a Marathi family, he started playing cricket at the age of 12 and later represented the state team at the under-15, under-17 and under-19 levels. Hailed as The Wall, Dravid has been described as one of the greatest batsmen in the history of cricket. He was named one of the best five cricketers of the year by Wisden Cricketers' Almanack in 2000 and received the Player of the Year and the Test Player of the Year awards at the inaugural ICC awards ceremony in 2004. In December 2011, he became the first non-Australian cricketer to address at the Bradman Oration in Canberra.</span><br data-dcnode-id="1371"><br data-dcnode-id="1370"><span data-dcnode-id="1369" instrument_node="">
As of October 2012, Dravid is the fourth-highest run scorer in Test cricket, after Sachin Tendulkar, Ricky Ponting and Kallis, and is only the second Indian cricketer, after Tendulkar to score 10,000 runs both in Tests and in ODIs. In April 2009, he became the only player to score a century in all the ten Test-playing countries. As of October 2012, he holds the record for the most number of catches taken by a player (non-wicket-keeper) in Test cricket, with 210.</span><br data-dcnode-id="1368"><br data-dcnode-id="1367"><span data-dcnode-id="1366" instrument_node="">
In August 2011, after receiving a surprise call in the ODI series against England, Dravid declared his retirement from ODIs as well as Twenty20 International (T20I), and in March 2012, he announced his retirement from international and first-class cricket. He appeared in the 2012 Indian Premier League as captain of the Rajasthan Royals.
Rahul Dravid, along with Glenn McGrath were honoured during the seventh annual Bradman Awards function in Sydney on 1 November 2012. Dravid has also been honoured with the Padma Bhushan award, India's third highest civilian award.</span><br data-dcnode-id="1365"><br data-dcnode-id="1364"><span data-dcnode-id="1363" instrument_node="">

Pankaj Arjan Advani (born 24 July 1985 in Pune) is India's leading professional billiards and snooker player. A winner of 8 World Titles in billiards and snooker, he is considered the best all-round professional billiards and snooker player India has produced. In 2005, he set a world record by becoming the first player to complete a grand double by winning both the point and time formats in the IBSF World Billiards Championship, Malta. In recognition of his achievements, the Government of India has bestowed several awards upon Advani-Arjuna Award in 2004, Rajiv Gandhi Khel Ratna in 2006 and Padma Shri in 2009. On the 28th of October 2012, Pankaj won his 8th World Title by defeating Mike Russell 1895-1216 in the Professional World Billiards Championship. Pankaj completed a hat-trick of hat-tricks in 2012 by being the reigning World, Asian &amp; National Champion in Billiards (2005 &amp; 2008 too). He is also the only Indian to win the Men's Australian Open Billiards Championship in 2008 in Melbourne. Pankaj has won everything there is to be won in the world of Billiards, a feat achieved by no other. He became a snooker professional only in 2012 and his first season on the main tour is the 2012/2013 season.</span><br data-dcnode-id="1327"><br data-dcnode-id="1326"><span data-dcnode-id="1325" instrument_node="">

</span><table class="routes one" data-dcnode-id="1011"><tbody data-dcnode-id="1012"><tr data-dcnode-id="1147"><td data-dcnode-id="1150"></td><td data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Details</span></td></tr><tr data-dcnode-id="1138"><td data-dcnode-id="1143" style="width:30%"><span data-dcnode-id="1144" instrument_node="">Mamatha Maben</span></td><td data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Captain of Women's cricket team</span></td></tr><tr data-dcnode-id="1130"><td data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Anil Kumble</span></td><td data-dcnode-id="1132"></td></tr><tr data-dcnode-id="1122"><td data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Brijesh Patel</span></td><td data-dcnode-id="1124"></td></tr><tr data-dcnode-id="1113"><td data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">B S Chandrasekhar</span></td><td data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Bhagwat Subramanya Chandrasekhar is a former Indian cricketer who played as a leg spinner. Considered among the top echelon of leg spinners, Chandrasekhar along with E.A.S. Prasanna, Bishen Singh Bedi and Srinivasaraghavan Venkataraghavan constituted the Indian spin quartet that dominated spin bowling during the 1960s and 1970s. At a very young age, polio left his right arm withered. Chandrasekhar played 58 Test matches, capturing 242 wickets at an average of 29.74 in a career that spanned sixteen years.</span></td></tr><tr data-dcnode-id="1104"><td data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">E.A.S. Prasanna</span></td><td data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Erapalli Anantharao Srinivas Prasanna is a famous former cricket player from Bangalore. He was a spin bowler, specializing in off spin and a member of the Indian spin quartet. He is an alumunus of National Institute of Engineering, Mysore.</span></td></tr><tr data-dcnode-id="1095"><td data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">G.R. Vishwanath</span></td><td data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Gundappa Ranganath Viswanath was one of India's finest batsmen throughout the 1970s. Viswanath played Test cricket for India from 1969 to 1983 making 91 appearances and scoring over 6000 runs. He also played in One Day Internationals from 1974 to 1982 including the World Cups of 1975 and 1979.</span></td></tr><tr data-dcnode-id="1086"><td data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Javagal Srinath</span></td><td data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Javagal Srinath is an Indian former cricketer and current ICC Match Referee. He is considered among India's finest fast bowlers and remains the only Indian fast bowler to have taken more than 300 wickets in One Day Internationals. He was a frontline fast bowler for the Indian cricket team until his retirement, being the second Indian pace bowler after Kapil Dev to take 200 Test wickets.</span></td></tr><tr data-dcnode-id="1077"><td data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Rahul Dravid</span></td><td data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Rahul Dravid is a former Indian cricketer and captain, widely regarded as one of the greatest batsmen in the history of cricket. Hailed as The Wall, Dravid was named one of the best five cricketers of the year by Wisden Cricketers' Almanack in 2000 and received the Player of the Year and the Test Player of the Year awards at the inaugural ICC awards ceremony in 2004. In December 2011, he became the first non-Australian cricketer to deliver the Bradman Oration in Canberra.</span></td></tr><tr data-dcnode-id="1068"><td data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Robin Uthappa</span></td><td data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Uthappa made his One Day International debut in the seventh and final match of the English tour of India in April 2006.</span></td></tr><tr data-dcnode-id="1059"><td data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Roger Binny</span></td><td data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Roger Michael Humphrey Binny is an Indian Cricketer who was part of the 1983 Cricket World Cup winning squad.</span></td></tr><tr data-dcnode-id="1050"><td data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Shantha Rangaswamy</span></td><td data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Captain Women's Cricket Team. She played Women's Test cricket for India in 16 matches from 1976 to 1991, captaining the side in 8 matches in 1976-77 and four in 1983–84. </span></td></tr><tr data-dcnode-id="1041"><td data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Sunil Joshi</span></td><td data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">He is an all-rounder who bowls slow left arm spin and bats left-handed. Sunil Joshi was appointed as Chief Selector of the India national cricket team on 4th March 2020. </span></td></tr><tr data-dcnode-id="1032"><td data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Syed Kirmani</span></td><td data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Syed Mujtaba Hussain Kirmani played cricket for India and Karnataka as a wicket-keeper. In 2016, he was awarded the Col CK Nayudu Lifetime Achievement Award for Cricket in India.</span></td></tr><tr data-dcnode-id="1023"><td data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Venkatesh Prasad</span></td><td data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">He made his debut in 1994. Primarily a right-arm medium-fast bowler, Prasad was noted for his bowling combination with Javagal Srinath.</span></td></tr><tr data-dcnode-id="1014"><td data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Gundappa Vishwanath (GR Vishwanath)</span></td><td data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">He was one of India's finest batsmen throughout the 1970s. Viswanath played Test cricket for India from 1969 to 1983 making 91 appearances and scoring over 6000 runs.</span></td></tr></tbody></table><span data-dcnode-id="1010" instrument_node="">

</span><h2 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Women movie directors from Karnataka</span></h2><span data-dcnode-id="833" instrument_node="">
</span><p align="justify" data-dcnode-id="765"><span data-dcnode-id="832" instrument_node="">
There are a few female film directors in Kannada Films like Vijayalakshmi Singh, Sumana Kittur, J Chandrakala, Priya Belliappa and Priya Hasan. </span><br data-dcnode-id="831"><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">
</span><b data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Prema Karanth</span></b><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
The year 1983 was a memorable year for Sandalwood since a woman director entered the industry in the otherwise male-dominated field. Prema Karanth broke the monotony of the Sandalwood's film segment through the film Paniyamma and set an example for many aspiring talents. </span><br data-dcnode-id="824"><br data-dcnode-id="823"><span data-dcnode-id="822" instrument_node="">
</span><b data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Kavitha Lankesh</span></b><br data-dcnode-id="819"><span data-dcnode-id="818" instrument_node="">
Hailing from the clan of journalists and media publishers, films were an obvious part of the family and did catch the attention of Kavitha at an young age. Her debut venture in Kannada, Deeveri (1999), was well received by both the audience and critics. It also fetched her several national and global awards. Though Kavitha started her film career with a documentary on children's nature camp, it was the critically acclaimed Deveeri which saw her debut as a director and won several State, National and International awards, including International Critics Award and the National Debut Director Award. </span><br data-dcnode-id="817"><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
</span><b data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Vijaylakshmi Singh</span></b><br data-dcnode-id="812"><span data-dcnode-id="811" instrument_node="">
Though she chose to debut with a remake, Vijayalakshmi Singh who is the sister of national acclaimed director S.V.Rajendra Singh Babu, made it a perfect launch for her directorial career. Ee Bandhana which was the remake of the Bollywood superhit movie Baghban impressed the family audience to a greater extent and Vijayalakshmi Singh who was until then recognized as an actress, also started gaining attention as a director. </span><br data-dcnode-id="810"><br data-dcnode-id="809"><span data-dcnode-id="808" instrument_node="">
</span><b data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Suman Kittur</span></b><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">
When there was a time where only a set of formula type of film-making was accepted in the film industry, it was Suman Kittur who raised the interest level in the audience. She forayed into genres of films which even many of the male directors had not dared of getting into. She started making films which were real stories of underworld and also took care of picturizing them carefully. Her directorials like Aa Dinagalu and Edegaarike were based on the real story of underworld while they gained her a lot of appreciation and made her a name to be remembered. </span><br data-dcnode-id="803"><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">
</span><b data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Roopa Iyer</span></b><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
Roopa Iyer is known for her creative feat in the film industry. While she is successfully upholding the Indian dance &amp; culture around the globe, she is also involved in the film making process as an actress and as a director. Her debut film Mukha Puta-The Cover Page which was about a child suffering from HIV/AIDS won accolades for her and her next directorial Chandra which was a bilingual, not only had an ensemble star cast but also gained appreciation. In addition to the above names there are many other women directors who have thriven to be the pillar of women empowerment and few names include Priya Belliappa whose Ring Road Shubha is one of the most awaited movie of the year which has an all women crew, Priya Hassan whose Jambada Hudugi and Smuggler were appreciated and J.Chandrakala whose Kwaatle was liked by the industry.</span><br data-dcnode-id="796"><br data-dcnode-id="795"><span data-dcnode-id="794" instrument_node="">
</span><b data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Priya Belliappa</span></b><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">
Priya is the latest to join the list of Sandalwood's women directors. She directed the recently released Ring Roadwhich had an all-women crew. The movie was a perfect launchpad for Priya as it was well received by the audience. All 16 technical departments handled by an all-woman team. From the director to lyricist to the sound engineer and from the colourist to the dialogue writer, the producer and director have chosen to work with female technicians. This is perhaps the first film in India to have all the 16 departments handled by female technicians. Mitr, My Friend (2002 film) directed by Revathi had an all-woman crew, but not in as many departments. Priya Belliappa (Karnataka) Dialogues: Rekha Rani (Karnataka) Cinematography: Reshmi Sarkar (West Bengal) Music: Vani Harikrishna (Karnataka) Make-Up: Poonam Prasad (Delhi) Costume designer: Shilpa Krishna (Karnataka) Art director: Chitralekha Shetty (Karnataka ) Stills: Avisha ( Maharashtra) and Mehi Shah (Bombay) Choreography: Mayuri, Chandrika, Shakti (Gujarat) Lyrics: Vani Harikrishna, Rekha Rani, Ranjini Editor: Marian (Goa) Sound Engineer: Hema (Karnataka) Effects: Vishaka (Kerala) DTS: Rashmi (Tamil Nadu) Colourist: Zoei (Indonesia) Producer: Ranjini Ravindra Das.</span><br data-dcnode-id="789"><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">
</span><b data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Priya Hassan</span></b><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">
Another Priya in the bandwagon of women directors who is an actress too. Her films Jambada Hudugi and Smuggler too triggered the interest of the audiences. </span><br data-dcnode-id="782"><br data-dcnode-id="781"><span data-dcnode-id="780" instrument_node="">
</span><b data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">J Chandrakala</span></b><br data-dcnode-id="777"><span data-dcnode-id="776" instrument_node="">
Chandrakala has dared to be experimental in her first film Khatle. However, the film received a mixed response from critics. </span><br data-dcnode-id="775"><br data-dcnode-id="774"><span data-dcnode-id="773" instrument_node="">
</span><b data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Pushpa</span></b><br data-dcnode-id="770"><span data-dcnode-id="769" instrument_node="">
Pushpa had worked as an actress before wielding the megaphone. Navella Bharatheeyaru is her debut film as a director and it also has a socially relevant theme.</span><br data-dcnode-id="768"><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
</span></p><span data-dcnode-id="764" instrument_node="">
