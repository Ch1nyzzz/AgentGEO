</span><h2 class="content_heading" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">About Karnataka</span></h2><br data-dcnode-id="1308"><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">
Karnataka is one of the well-known states in South West India. Originally, it was known as State of Mysore but was renamed Karnataka in the year 1973.
Bangalore is the largest city, and also the capital of this state. The state is surrounded by Laccadive Sea or Lakshadweep Sea and Arabian Sea in the west, Maharashtra in the northern side, Goa in the north-west side and Andhra Pradesh and Telangana in the eastern side. It is also surrounded by Kerala in south-west and Tamil Nadu, in the south-east side. Karnataka is the 6th largest state in India by population. The state has 30 districts. Kannada is the official and extensively spoken language of this state. Other languages that are spoken in this state are Konkani, Tulu and Hindi. </span><br data-dcnode-id="1305"><br data-dcnode-id="1304"><span data-dcnode-id="1303" instrument_node="">
According to the 2018 Census, the population of the state is 6.87 Crore. It is a popular destination in the southern part of India among the tourists. The main religion in this state is Hindu. In addition, there are also other religions that constitute the population. It includes Muslims, Christians, Jains and Tibetan Buddhists. The two river systems in this state are Krishna on the north and Kaveri in the south. Several etymologies are suggested for naming this state. However, the state derives its name from the two words Karu and Naru that means 'elevated land'.</span><br data-dcnode-id="1302"><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">

</span><h2 class="content_heading" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">History </span></h2><br data-dcnode-id="1150"><br data-dcnode-id="1149"><span data-dcnode-id="1148" instrument_node="">
The history of the state dates back to the hand-axe Paleolithic culture that is proved by the discoveries of cleavers and hand axes in this region.
The evidence of Megalithic and Neolithic culture was also found in Karnataka. The gold that was found in Harappa was imported from the mines in this state. It encouraged scholars and researchers to assume contacts between Indus Valley civilization and ancient Karnataka. Before 3rd century BCE, a large part of this state was a part of Nanda Empire. After that, it became a part of the Mauryan Empire. The rule of Satavahana for 4 centuries followed that allowed them in controlling the bigger areas of this state.
After the failure of Satavahana, the growth of native kingdoms like Western Gangas and Kadambas followed that marked the emergence of the political entity of this region. Mayurasharma founded Kadamba Dynasty having the capital in Banavasi. In the year 1565, Karnataka and various parts of South India has experienced a geopolitical shift. After India attained independence, Jayachamarajendra Wodeyar, who was a Maharaja, allowed the accession of his kingdom to India. Mysore became the state of India in the year 1950. The industrial visionaries like Mokshagundam Visvesvarayya play a crucial role in the growth and development of the industrial and manufacturing base of Karnataka.
</span><a class="readmore" data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofindia.com/karnataka/geography-history/history-of-karnataka.html" target="_parent"><span data-dcnode-id="1147" instrument_node="">Read More ...</span></a><br data-dcnode-id="1145"><br data-dcnode-id="1144"><span data-dcnode-id="1143" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Geography</span></h2><br data-dcnode-id="1140"><br data-dcnode-id="1139"><span data-dcnode-id="1138" instrument_node="">
Karnataka has 3 main geographical zones. It includes the Karavali coastal region, the hilly region of Malenadu covering Western Ghats and Bayaluseeme region covering plains of the Deccan plateau. The major part of this state lies in Bayaluseeme region. The highest and peak point in this state is the Mullayanagiri hills that are located in Chickmagalur district. It has a height of 6,392 feet or 1,929 meters. The significant rivers in this state are Kaveri, Krishna, Sharavathi, Malaprabha and Tungabhadra. Karnataka comprises of 4 main kinds of geographical formations. It includes Archean complex that is made of granitic gneisses and Dharwad schists, Proterozoic sedimentary non-fossiliferous formations of Bhima and Kaladgi series, Deccan intertrappean and trappean deposits, and tertiary and alluvial deposits.
</span><a class="readmore" data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofindia.com/karnataka/geography-history/geography-of-karnataka.html" target="_parent"><span data-dcnode-id="1137" instrument_node="">Read More ...</span></a><br data-dcnode-id="1135"><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Tourism</span></h2><br data-dcnode-id="1130"><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
Due to its long history and varied geography, Karnataka is host to various places of interest that can be viewed by a tourist. You will be able to witness an extensive range of ancient and old sculptured temples, attractive hill ranges, modern cities, endless beaches and unexplored forests. In fact, the state has been considered as one of the popular destinations in India for tourism. In terms of the protected monuments on a national scale, Karnataka holds the second place in India only behind Uttar Pradesh. The various districts of Western Ghats, along with the southern regions of this state, have eco-tourism locations that are quite popular. Some of the locations are Kudremukh, Agumbe and Madikeri.</span><a class="readmore" data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofindia.com/karnataka/tourism/" target="_parent"><span data-dcnode-id="1127" instrument_node="">Read More ...</span></a><br data-dcnode-id="1125"><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Administration and Government</span></h2><br data-dcnode-id="1120"><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">
Karnataka, like the other states in India, has the parliamentary government with 2 constitutionally elected houses. One is the Legislative Council, and the other one is the Legislative Assembly. Legislative Assembly includes 224 members, and they are elected for a period of 5 years. On the other hand, the Legislative Council is considered as the permanent body with 75 members. 25 members retire after every 2 years. The Karnataka government is controlled and led by Chief Minister. The Chief Minister is selected by the governing members of the Legislative Assembly. He or she, together with the assembly of ministers, takes the initiative of the various legislative agenda. In addition, the Chief Minister also takes the main executive decisions. The Governor is the formal and the constitutional head of state. The Governor is chosen for a period of five years by the Indian President on the recommendation of the Union Government.</span><a class="readmore" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofindia.com/karnataka/government-politics/" target="_parent"><span data-dcnode-id="1117" instrument_node="">Read More ...</span></a><br data-dcnode-id="1115"><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Education</span></h2><br data-dcnode-id="1110"><br data-dcnode-id="1109"><span data-dcnode-id="1108" instrument_node="">
According to the latest census, the literacy rate of Karnataka is 75.60%. The percentages of male and female literates are 82.85% and 68.13% respectively. You will be able to get the premier research and educational institutions that are present across India like IIS, IIM, NIT Karnataka and National Law School. The number of primary schools in Karnataka is nearly 54,529. The state also has 8.495 million students and 252,875 teachers. There are 3 types of schools/colleges in Karnataka. It includes the private aided, private unaided and government-run schools. In the private aided schools, the government provides financial aid. On the other hand, financial aid is not provided in the private unaided schools.</span><a class="readmore" data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofindia.com/karnataka/education/" target="_parent"><span data-dcnode-id="1107" instrument_node="">Read More ...</span></a><br data-dcnode-id="1105"><br data-dcnode-id="1104"><span data-dcnode-id="1103" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Economy </span></h2><br data-dcnode-id="1100"><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">
In the fiscal year 2012-13, the Gross State Domestic Product (GSDP) is at about Rs12.69 trillion.</span><br data-dcnode-id="1097"><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">
Agriculture is the main occupation in Karnataka which is heavily dependent on the southwest monsoon. As per the 2001 census, it has floated 56 per cent of the workforce of Karnataka. The three main agricultural seasons such as Kharif (April to September), Rabi (October to December), and Summer (January to March). </span><a class="readmore" data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofindia.com/karnataka/economy.html" target="_parent"><span data-dcnode-id="1094" instrument_node="">Read More ...</span></a><br data-dcnode-id="1092"><br data-dcnode-id="1091"><span data-dcnode-id="1090" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Demographics</span></h2><br data-dcnode-id="1087"><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">
As per the 2011 census, the population of this state was 61,095,297. The number of male and female population is 30,966,657 and 30,128,640 respectively. It indicated an increase of around 17% as compared to the 2001 census. The density of the population is 319 per sq km. In addition, the percentage of the population that lives in the urban areas is 34%. The rate of literacy is 75.36%. The percentage of male and female literates is 82.47% and 68.08% respectively. The percentage of Hindu population is 83%. Muslim, Christian, Jains and Buddhists, are the other religions of this state. </span><br data-dcnode-id="1084"><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Culture</span></h2><br data-dcnode-id="1079"><br data-dcnode-id="1078"><span data-dcnode-id="1077" instrument_node="">
</span><div data-dcnode-id="1072" id="div-gpt-ad-1385033790590-4" style="width:300px; height:250px; float:right; padding-left:5px;"><span data-dcnode-id="1076" instrument_node="">
</span><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
You can get the diverse religious and linguistic ethnicities in this state. In addition, the long histories that are associated with this state have contributed enormously to the different cultural legacy of this state. In addition to Kannadigas, the state is also home to Kodavas, Konkanis and Tuluvas. Tibetan Buddhists, along with the tribes like Yeravas, Siddhis, Todas and Soligas constitute a small number of populations of this state. The traditional arts and folks cover the total gamut of drama, dance, music, etc. Yakshagana and coastal Karnataka are the main theatrical types of this state. The modern theatre culture of this state is vibrant.</span><a class="readmore" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofindia.com/karnataka/people-culture-and-festivals/" target="_parent"><span data-dcnode-id="1070" instrument_node="">Read More ...</span></a><br data-dcnode-id="1068"><br data-dcnode-id="1067"><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Food</span></h2><br data-dcnode-id="1062"><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">
Karnataka comprises of different regions and hence different traditions. At one hand where North Karnataka is popular for its vegetarian food, coastal region on the other hand offers some lip-smacking seafood. If you want to indulge in meat curries and Mangalorean cuisines, Kodagu region is the place to be. However here is a general list of Karnataka dishes which are a must taste; Mysore Masala Dosa, Mysore Pak, Chow Chow Bhath, Ragi Mudde and Sopinna Saru, Korri Gassi, Obbattu or Holige, Kane Rava Fry, Bisi Bele bath, Maddur Vada etc. </span><br data-dcnode-id="1059"><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Languages</span></h2><br data-dcnode-id="1054"><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">
Kannada is the official and extensively spoken language of this state. The major part of the population speaks this language, and it is also considered as a classical language in India. A vital role is played by Kannada in the foundation of Karnataka. A significant role is played by the linguistic demographics for defining the state in the year 1956. Konkani, Kodava and Tulu, are the other native languages of this state that has a history associated with it. Urdu is the widely spoken language by the Muslim population. The languages that are less spoken are Sankethi and Beary bashe. Tulu is mainly spoken in various coastal districts and regions of Dakshina Kannada and Udupi.</span><br data-dcnode-id="1051"><br data-dcnode-id="1050"><span data-dcnode-id="1049" instrument_node="">
</span><h2 class="content_heading" data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Transport </span></h2><br data-dcnode-id="1046"><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">
The air transport facility of this state is a growing sector. The various airports in this state are located in Mangalore, Bangalore, Belgaum, Hubli, Bellary, Hampi and Mysore. In addition, the international flights also operate from Mangalore and Bangalore airports. The major airlines like Kingfisher Red and King Fisher Airlines are based in the city of Bangalore. The length of the rail network of this state is 3,089 km. The South West zone was created in the year 2003, and its headquarter is located in Hubli. At present, various parts of Karnataka come under the Southern and South Western railways.</span><br data-dcnode-id="1043"><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node="">
