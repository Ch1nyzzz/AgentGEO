articles published under an open access Creative Common CC BY license, any part of the article may be reused without

</span><p data-dcnode-id="8702"><span data-dcnode-id="8703" instrument_node="">

prior to publication.
</span></p><span data-dcnode-id="8701" instrument_node="">
</span><p data-dcnode-id="8699"><span data-dcnode-id="8700" instrument_node="">

several techniques or approaches, or a comprehensive review paper with concise and precise updates on the latest
progress in the field that systematically reviews the most exciting advances in scientific literature. This type of
paper provides an outlook on future directions of research or possible applications.
</span></p><span data-dcnode-id="8698" instrument_node="">

</span><p data-dcnode-id="5750" style="margin-bottom: 5px;"><span data-dcnode-id="5751" instrument_node="">Please:</span></p><span data-dcnode-id="5749" instrument_node="">
</span><ol data-dcnode-id="5699"><span data-dcnode-id="5748" instrument_node="">
</span><li data-dcnode-id="5743"><span data-dcnode-id="5747" instrument_node="">read the </span><a data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/journal/sports/about"><span data-dcnode-id="5746" instrument_node="">Aims &amp; Scope</span></a><span data-dcnode-id="5744" instrument_node=""> to gain an overview and assess if your manuscript is suitable for this journal;</span></li><span data-dcnode-id="5742" instrument_node="">
</span><li data-dcnode-id="5734"><span data-dcnode-id="5741" instrument_node="">use the </span><a data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/files/word-templates/sports-template.dot"><span data-dcnode-id="5740" instrument_node="">Microsoft Word template</span></a><span data-dcnode-id="5738" instrument_node=""> or </span><a data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/latex"><span data-dcnode-id="5737" instrument_node="">LaTeX template</span></a><span data-dcnode-id="5735" instrument_node=""> to prepare your manuscript;</span></li><span data-dcnode-id="5733" instrument_node="">
</span><li data-dcnode-id="5710"><span data-dcnode-id="5732" instrument_node="">make sure that issues about </span><a data-dcnode-id="5730" href="#ethics"><span data-dcnode-id="5731" instrument_node="">publication ethics</span></a><span data-dcnode-id="5729" instrument_node="">, </span><a data-dcnode-id="5727" href="#rethics"><span data-dcnode-id="5728" instrument_node="">research ethics</span></a><span data-dcnode-id="5726" instrument_node="">, </span><a data-dcnode-id="5724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/rights"><span data-dcnode-id="5725" instrument_node="">copyright</span></a><span data-dcnode-id="5723" instrument_node="">, </span><a data-dcnode-id="5721" href="#authorship"><span data-dcnode-id="5722" instrument_node="">authorship</span></a><span data-dcnode-id="5720" instrument_node="">, </span><a data-dcnode-id="5718" href="#figures"><span data-dcnode-id="5719" instrument_node="">figure formats</span></a><span data-dcnode-id="5717" instrument_node="">, </span><a data-dcnode-id="5715" href="#suppmaterials"><span data-dcnode-id="5716" instrument_node="">data</span></a><span data-dcnode-id="5714" instrument_node=""> and </span><a data-dcnode-id="5712" href="#references"><span data-dcnode-id="5713" instrument_node="">references format</span></a><span data-dcnode-id="5711" instrument_node=""> have been appropriately considered;</span></li><span data-dcnode-id="5709" instrument_node="">
</span><li data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">Ensure that all authors have approved the content of the submitted manuscript.</span></li><span data-dcnode-id="5706" instrument_node="">
</span><li data-dcnode-id="5701"><span data-dcnode-id="5705" instrument_node="">Authors are encouraged to add a </span><a data-dcnode-id="5703" href="#biography"><span data-dcnode-id="5704" instrument_node="">biography</span></a><span data-dcnode-id="5702" instrument_node=""> (optional) to the submission and publish it.</span></li><span data-dcnode-id="5700" instrument_node="">
</span></ol><span data-dcnode-id="5698" instrument_node="">
</span><h2 data-dcnode-id="5695"><a data-dcnode-id="5697" name="submission"></a><span data-dcnode-id="5696" instrument_node="">Manuscript Submission Overview</span></h2><span data-dcnode-id="5694" instrument_node="">
</span><p data-dcnode-id="5693"></p><h3 data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">Types of Publications</span></h3><span data-dcnode-id="5690" instrument_node="">
</span><p data-dcnode-id="5679"><span data-dcnode-id="5689" instrument_node=""> </span><em data-dcnode-id="5687"><span data-dcnode-id="5688" instrument_node="">Sports</span></em><span data-dcnode-id="5686" instrument_node=""> has no restrictions on the length of manuscripts, provided that the text is concise and comprehensive. Full experimental details must be provided so that the results can be reproduced. </span><em data-dcnode-id="5684"><span data-dcnode-id="5685" instrument_node="">Sports</span></em><span data-dcnode-id="5683" instrument_node=""> requires that authors publish all experimental controls and make full datasets available where possible (see the guidelines on </span><a data-dcnode-id="5681" href="#suppmaterials"><span data-dcnode-id="5682" instrument_node="">Supplementary Materials</span></a><span data-dcnode-id="5680" instrument_node=""> and references to unpublished data).</span></p><span data-dcnode-id="5678" instrument_node="">
</span><p data-dcnode-id="5673"><span data-dcnode-id="5677" instrument_node="">Manuscripts submitted to </span><em data-dcnode-id="5675"><span data-dcnode-id="5676" instrument_node="">Sports</span></em><span data-dcnode-id="5674" instrument_node=""> should neither be published previously nor be under consideration for publication in another journal. The main article types are as follows:</span></p><span data-dcnode-id="5672" instrument_node="">
</span><ul data-dcnode-id="5649"><span data-dcnode-id="5671" instrument_node="">
</span><li data-dcnode-id="5664"><em data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">Articles:</span></em><span data-dcnode-id="5668" instrument_node=""> Original research manuscripts. The journal considers all original research manuscripts provided that the work reports scientifically sound experiments and provides a substantial amount of new information.
Authors should not unnecessarily divide their work into several related manuscripts, although short </span><em data-dcnode-id="5666"><span data-dcnode-id="5667" instrument_node="">Communications</span></em><span data-dcnode-id="5665" instrument_node=""> of preliminary, but significant, results will be considered. The quality and impact of the study will be considered during peer review. </span></li><span data-dcnode-id="5663" instrument_node="">
</span><li data-dcnode-id="5656"><em data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">Reviews:</span></em><span data-dcnode-id="5660" instrument_node=""> These provide concise and precise updates on the latest progress made in a given area of research. Systematic reviews should follow the PRISMA </span><a data-dcnode-id="5658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/editorial_process%23standards" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5659" instrument_node="">guidelines.</span></a><span data-dcnode-id="5657" instrument_node="">
</span></li><span data-dcnode-id="5655" instrument_node="">
</span><li data-dcnode-id="5651"><em data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">Case reports:</span></em><span data-dcnode-id="5652" instrument_node=""> Case reports present detailed information on the symptoms, signs, diagnosis, treatment (including all types of interventions), and outcomes of an individual patient. Case reports usually describe new or uncommon conditions that serve to enhance medical care or highlight diagnostic approaches.</span></li><span data-dcnode-id="5650" instrument_node="">
</span></ul><span data-dcnode-id="5648" instrument_node="">
</span><h3 data-dcnode-id="5646"><span data-dcnode-id="5647" instrument_node="">Submission Process</span></h3><span data-dcnode-id="5645" instrument_node="">
</span><p data-dcnode-id="5626"><span data-dcnode-id="5644" instrument_node="">Manuscripts for </span><em data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">Sports</span></em><span data-dcnode-id="5641" instrument_node=""> should be submitted online at </span><a data-dcnode-id="5639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//susy.mdpi.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5640" instrument_node="">susy.mdpi.com</span></a><span data-dcnode-id="5638" instrument_node="">. The submitting author, who is generally the corresponding author, is responsible for the manuscript during the submission and peer-review process. The submitting author must ensure that all eligible co-authors have been included in the author list (read the </span><a data-dcnode-id="5636" href="#authorship"><span data-dcnode-id="5637" instrument_node="">criteria to qualify for authorship</span></a><span data-dcnode-id="5635" instrument_node="">) and that they have all read and approved the submitted version of the manuscript. To submit your manuscript, register and log in to the </span><a data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//susy.mdpi.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5634" instrument_node="">submission website</span></a><span data-dcnode-id="5632" instrument_node="">. Once you have registered, </span><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/user/manuscripts/upload/%3Fjournal%3Dsports"><span data-dcnode-id="5631" instrument_node="">click here to go to the submission form for </span><em data-dcnode-id="5629"><span data-dcnode-id="5630" instrument_node="">Sports</span></em></a><span data-dcnode-id="5627" instrument_node="">. All co-authors can see the manuscript details in the submission system, if they register and log in using the e-mail address provided during manuscript submission.</span></p><span data-dcnode-id="5625" instrument_node="">
</span><h3 data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">Accepted File Formats</span></h3><span data-dcnode-id="5622" instrument_node="">
</span><p data-dcnode-id="5611"><span data-dcnode-id="5621" instrument_node="">Authors are encouraged to use the </span><a data-dcnode-id="5619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/files/word-templates/sports-template.dot"><span data-dcnode-id="5620" instrument_node="">Microsoft Word template</span></a><span data-dcnode-id="5618" instrument_node=""> or </span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/latex"><span data-dcnode-id="5617" instrument_node="">LaTeX template</span></a><span data-dcnode-id="5615" instrument_node=""> to prepare their manuscript. Using the template file will substantially shorten the time to complete copy-editing and publication of accepted manuscripts. The total amount of data for all files must not exceed 120 MB. If this is a problem, please contact the Editorial Office </span><a data-dcnode-id="5613" href="mailto:sports@mdpi.com"><span data-dcnode-id="5614" instrument_node="">sports@mdpi.com</span></a><span data-dcnode-id="5612" instrument_node="">. Accepted file formats are:</span></p><span data-dcnode-id="5610" instrument_node="">
</span><ul data-dcnode-id="5568"><span data-dcnode-id="5609" instrument_node="">
</span><li data-dcnode-id="5597"><em data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">Microsoft Word:</span></em><span data-dcnode-id="5606" instrument_node=""> Manuscripts prepared in Microsoft Word must be converted into a single file before submission. When preparing manuscripts in Microsoft Word, we encourage you to use the </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/files/word-templates/sports-template.dot"><em data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">Sports</span></em><span data-dcnode-id="5603" instrument_node=""> Microsoft Word template file</span></a><span data-dcnode-id="5601" instrument_node="">. Please insert your graphics (schemes, figures, </span><em data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">etc.</span></em><span data-dcnode-id="5598" instrument_node="">) in the main text after the paragraph of its first citation. </span></li><span data-dcnode-id="5596" instrument_node="">
</span><li data-dcnode-id="5578"><em data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">LaTeX:</span></em><span data-dcnode-id="5593" instrument_node=""> Manuscripts prepared in LaTeX must be collated into one ZIP folder (including all source files and images, so that the Editorial Office can recompile the submitted PDF). When preparing manuscripts in LaTeX, we encourage you to use the </span><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/latex"><em data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">Sports</span></em><span data-dcnode-id="5590" instrument_node=""> LaTeX template files</span></a><span data-dcnode-id="5588" instrument_node="">. You can now also use the online application </span><a data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writelatex.com/" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5587" instrument_node="">writeLaTeX</span></a><span data-dcnode-id="5585" instrument_node=""> to submit articles directly to </span><em data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">Sports</span></em><span data-dcnode-id="5582" instrument_node="">. The MDPI LaTeX template file should be selected from the </span><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writelatex.com/templates/mdpi-article-template/fvjngfxymnbr" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5581" instrument_node="">writeLaTeX template gallery</span></a><span data-dcnode-id="5579" instrument_node="">.</span></li><span data-dcnode-id="5577" instrument_node="">
</span><li data-dcnode-id="5570"><em data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">Supplementary files:</span></em><span data-dcnode-id="5574" instrument_node=""> May be any format, but it is recommended that you use common, non-proprietary formats where possible (see </span><a data-dcnode-id="5572" href="#suppmaterials"><span data-dcnode-id="5573" instrument_node="">below</span></a><span data-dcnode-id="5571" instrument_node=""> for further details).</span></li><span data-dcnode-id="5569" instrument_node="">
</span></ul><span data-dcnode-id="5567" instrument_node="">
</span><p data-dcnode-id="5564"><strong data-dcnode-id="5565"><span data-dcnode-id="5566" instrument_node="">Disclaimer: Usage of these templates is exclusively intended for submission to the journal for peer-review, and strictly limited to this purpose and it cannot be used for posting online on preprint servers or other websites.</span></strong></p><span data-dcnode-id="5563" instrument_node="">
</span><h3 data-dcnode-id="5560"><a data-dcnode-id="5562" name="freeformatsub"></a><span data-dcnode-id="5561" instrument_node="">Free Format Submission</span></h3><span data-dcnode-id="5559" instrument_node="">
</span><p data-dcnode-id="5555"><em data-dcnode-id="5557"><span data-dcnode-id="5558" instrument_node="">Sports</span></em><span data-dcnode-id="5556" instrument_node=""> now accepts free format submission:</span></p><span data-dcnode-id="5554" instrument_node="">
</span><ul data-dcnode-id="5526"><span data-dcnode-id="5553" instrument_node="">
</span><li data-dcnode-id="5547"><span data-dcnode-id="5552" instrument_node="">We do not have strict formatting requirements, but all manuscripts must contain the required sections: Author Information, Abstract, Keywords, Introduction, Materials &amp; Methods, Results, Conclusions, Figures and Tables with Captions, Funding Information, Author Contributions, Conflict of Interest and other Ethics Statements. Check the Journal </span><em data-dcnode-id="5549"><a data-dcnode-id="5550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/journal/sports/instructions"><span data-dcnode-id="5551" instrument_node="">Instructions for Authors</span></a></em><span data-dcnode-id="5548" instrument_node=""> for more details.</span></li><span data-dcnode-id="5546" instrument_node="">
</span><li data-dcnode-id="5531"><span data-dcnode-id="5545" instrument_node="">Your references may be in any style, provided that you use the consistent formatting throughout. It is essential to include author(s) name(s), journal or book title, article or chapter title (where required), year of publication, volume and issue (where appropriate) and pagination. DOI numbers (Digital Object Identifier) are not mandatory but highly encouraged. The bibliography software package </span><em data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">EndNote</span></em><span data-dcnode-id="5542" instrument_node="">, </span><em data-dcnode-id="5539"><a data-dcnode-id="5540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zotero.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5541" instrument_node="">Zotero</span></a></em><span data-dcnode-id="5538" instrument_node="">, </span><em data-dcnode-id="5536"><span data-dcnode-id="5537" instrument_node="">Mendeley</span></em><span data-dcnode-id="5535" instrument_node="">, </span><em data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">Reference Manager</span></em><span data-dcnode-id="5532" instrument_node=""> are recommended.</span></li><span data-dcnode-id="5530" instrument_node="">
</span><li data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">When your manuscript reaches the revision stage, you will be requested to format the manuscript according to the journal guidelines.</span></li><span data-dcnode-id="5527" instrument_node="">
</span></ul><span data-dcnode-id="5525" instrument_node="">
</span><h3 data-dcnode-id="5522"><a data-dcnode-id="5524" name="coverletter"></a><span data-dcnode-id="5523" instrument_node="">Cover Letter</span></h3><span data-dcnode-id="5521" instrument_node="">
</span><p data-dcnode-id="5519"><span data-dcnode-id="5520" instrument_node="">A cover letter must be included with each manuscript submission. It should be concise and explain why the content of the paper is significant, placing the findings in the context of existing work. It should explain why the manuscript fits the scope of the journal.</span></p><span data-dcnode-id="5518" instrument_node="">
</span><p data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">Any prior submissions of the manuscript to MDPI journals must be acknowledged. If this is the case, it is strongly recommended that the previous manuscript ID is provided in the submission system, which will ease your current submission process. The names of proposed and excluded reviewers should be provided in the submission system, not in the cover letter.</span></p><span data-dcnode-id="5515" instrument_node="">
</span><p data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">All cover letters are required to include the statements:</span></p><span data-dcnode-id="5512" instrument_node="">
</span><ul data-dcnode-id="5504"><span data-dcnode-id="5511" instrument_node="">
</span><li data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">We confirm that neither the manuscript nor any parts of its content are currently under consideration or published in another journal.</span></li><span data-dcnode-id="5508" instrument_node="">
</span><li data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">All authors have approved the manuscript and agree with its submission to (journal name).</span></li><span data-dcnode-id="5505" instrument_node="">
</span></ul><span data-dcnode-id="5503" instrument_node="">
</span><h3 data-dcnode-id="5501" id="biography"><span data-dcnode-id="5502" instrument_node="">Author Biography</span></h3><span data-dcnode-id="5500" instrument_node="">
</span><p data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">Authors are encouraged to add a biography (maximum 150 words) to the submission and publish it. This should be a single paragraph and should contain the following points:
</span></p><ol data-dcnode-id="5482"><span data-dcnode-id="5497" instrument_node="">
</span><li data-dcnode-id="5495"><span data-dcnode-id="5496" instrument_node="">Authors’ full names followed by current positions;</span></li><span data-dcnode-id="5494" instrument_node="">
</span><li data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">Education background including institution information and year of graduation (type and level of degree received);</span></li><span data-dcnode-id="5491" instrument_node="">
</span><li data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">Work experience;</span></li><span data-dcnode-id="5488" instrument_node="">
</span><li data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">Current and previous research interests;</span></li><span data-dcnode-id="5485" instrument_node="">
</span><li data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">Memberships of professional societies and awards received.</span></li></ol><span data-dcnode-id="5481" instrument_node="">
</span><h3 data-dcnode-id="5479"><span data-dcnode-id="5480" instrument_node="">Note for Authors Funded by the National Institutes of Health (NIH)</span></h3><span data-dcnode-id="5478" instrument_node="">
</span><p data-dcnode-id="5473"><span data-dcnode-id="5477" instrument_node="">This journal automatically deposits papers to PubMed Central after publication of an issue. Authors do not need to separately submit their papers through the NIH Manuscript Submission System (NIHMS, </span><a data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nihms.nih.gov/" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5476" instrument_node="">http://nihms.nih.gov/</span></a><span data-dcnode-id="5474" instrument_node="">).</span></p><span data-dcnode-id="5472" instrument_node="">
</span><p data-dcnode-id="5469"><a data-dcnode-id="5470" href="#top"><span data-dcnode-id="5471" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="5468" instrument_node="">
</span><h2 data-dcnode-id="5465"><a data-dcnode-id="5467" name="preparation"></a><span data-dcnode-id="5466" instrument_node="">Manuscript Preparation</span></h2><span data-dcnode-id="5464" instrument_node="">
</span><p data-dcnode-id="5463"></p><h3 data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">General Considerations</span></h3><span data-dcnode-id="5460" instrument_node="">
</span><ul data-dcnode-id="5357"><span data-dcnode-id="5459" instrument_node="">
</span><li data-dcnode-id="5455"><strong data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">Research manuscripts </span></strong><span data-dcnode-id="5456" instrument_node=""> should comprise:
</span></li><span data-dcnode-id="5454" instrument_node="">
</span><ul data-dcnode-id="5436"><li data-dcnode-id="5450"><a data-dcnode-id="5452" href="#front"><span data-dcnode-id="5453" instrument_node="">Front matter</span></a><span data-dcnode-id="5451" instrument_node="">: Title, Author list, Affiliations, Abstract, Keywords </span></li><span data-dcnode-id="5449" instrument_node="">
</span><li data-dcnode-id="5445"><a data-dcnode-id="5447" href="#manuscript"><span data-dcnode-id="5448" instrument_node="">Research manuscript sections</span></a><span data-dcnode-id="5446" instrument_node="">: Introduction, Materials and Methods,
Results, Discussion, Conclusions (optional).</span></li><span data-dcnode-id="5444" instrument_node="">
</span><li data-dcnode-id="5437"><a data-dcnode-id="5442" href="#back"><span data-dcnode-id="5443" instrument_node="">Back matter</span></a><span data-dcnode-id="5441" instrument_node="">: Supplementary Materials, Acknowledgments, Author Contributions, Conflicts of Interest, </span><a data-dcnode-id="5439" href="#references"><span data-dcnode-id="5440" instrument_node="">References</span></a><span data-dcnode-id="5438" instrument_node="">.</span></li></ul><span data-dcnode-id="5435" instrument_node="">
</span><li data-dcnode-id="5422"><strong data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">Review manuscripts</span></strong><span data-dcnode-id="5432" instrument_node=""> should comprise the </span><a data-dcnode-id="5430" href="#front"><span data-dcnode-id="5431" instrument_node="">front matter</span></a><span data-dcnode-id="5429" instrument_node="">, literature review sections and the </span><a data-dcnode-id="5427" href="#back"><span data-dcnode-id="5428" instrument_node="">back matter</span></a><span data-dcnode-id="5426" instrument_node="">. The template file can also be used to prepare the front and back matter of your review manuscript. It is not necessary to follow the remaining structure. Structured reviews and meta-analyses should use the same structure as research articles and ensure they conform to the </span><a data-dcnode-id="5424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/editorial_process" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5425" instrument_node="">PRISMA</span></a><span data-dcnode-id="5423" instrument_node=""> guidelines.</span></li><span data-dcnode-id="5421" instrument_node="">
</span><li data-dcnode-id="5417"><strong data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">Case reports</span></strong><span data-dcnode-id="5418" instrument_node=""> should include a succinct introduction about the general medical condition or relevant symptoms that will be discussed in the case report; the case presentation including all of the relevant de-identified demographic and descriptive information about the patient(s), and a description of the symptoms, diagnosis, treatment, and outcome; a discussion providing context and any necessary explanation of specific treatment decisions; a conclusion briefly outlining the take-home message and the lessons learned.
</span></li><span data-dcnode-id="5416" instrument_node="">
</span><li data-dcnode-id="5403"><strong data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node="">Graphical Abstract:</span></strong><span data-dcnode-id="5413" instrument_node=""> </span><p data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">A graphical abstract (GA) is an image that appears alongside the text abstract in the Table of Contents. In addition to summarizing the content, it should represent the topic of the article in an attention-grabbing way. Moreover, it should not be exactly the same as the Figure in the paper or just a simple superposition of several subfigures. Note that the GA must be original and unpublished artwork. Any postage stamps, currency from any country, or trademarked items should not be included in it.</span></p><span data-dcnode-id="5410" instrument_node="">
</span><p data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">The GA should be a high-quality illustration or diagram in any of the following formats: PNG, JPEG, TIFF, or SVG. Written text in a GA should be clear and easy to read, using one of the following fonts: Times, Arial, Courier, Helvetica, Ubuntu or Calibri. </span></p><span data-dcnode-id="5407" instrument_node="">
</span><p data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">The minimum required size for the GA is 560 × 1100 pixels (height × width). The size should be of high quality in order to reproduce well.</span></p><span data-dcnode-id="5404" instrument_node="">
</span></li><span data-dcnode-id="5402" instrument_node="">
</span><li data-dcnode-id="5398"><strong data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">Acronyms/Abbreviations/Initialisms</span></strong><span data-dcnode-id="5399" instrument_node=""> should be defined the first time they appear in each of three sections: the abstract; the main text; the first figure or table. When defined for the first time, the acronym/abbreviation/initialism should be added in parentheses after the written-out form.</span></li><span data-dcnode-id="5397" instrument_node="">
</span><li data-dcnode-id="5393"><strong data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">SI Units</span></strong><span data-dcnode-id="5394" instrument_node=""> (International System of Units) should be used. Imperial, US customary and other units should be converted to SI units whenever possible.</span></li><span data-dcnode-id="5392" instrument_node="">
</span><li data-dcnode-id="5385"><strong data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">Accession numbers</span></strong><span data-dcnode-id="5389" instrument_node=""> of RNA, DNA and protein sequences used in the manuscript should be provided in the Materials and Methods section. Also see the section on </span><a data-dcnode-id="5387" href="#sequence"><span data-dcnode-id="5388" instrument_node="">Deposition of Sequences and of Expression Data</span></a><span data-dcnode-id="5386" instrument_node="">.
</span></li><span data-dcnode-id="5384" instrument_node="">
</span><li data-dcnode-id="5380"><strong data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">Equations:</span></strong><span data-dcnode-id="5381" instrument_node=""> If you are using Word, please use either the Microsoft Equation Editor or the MathType add-on. Equations should be editable by the editorial office and not appear in a picture format.</span></li><span data-dcnode-id="5379" instrument_node="">
</span><li data-dcnode-id="5372"><strong data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">Research Data and supplementary materials:</span></strong><span data-dcnode-id="5376" instrument_node=""> Note that publication of your manuscript implies that you must make all materials, data, and protocols associated with the publication available to readers. Disclose at the submission stage any restrictions on the availability of materials or information. Read the information about </span><a data-dcnode-id="5374" href="#suppmaterials"><span data-dcnode-id="5375" instrument_node="">Supplementary Materials</span></a><span data-dcnode-id="5373" instrument_node=""> and Data Deposit for additional guidelines.</span></li><span data-dcnode-id="5371" instrument_node="">
</span><li data-dcnode-id="5367"><strong data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">Preregistration:</span></strong><span data-dcnode-id="5368" instrument_node=""> Where authors have preregistered studies or analysis plans, links to the preregistration must be provided in the manuscript.</span></li><span data-dcnode-id="5366" instrument_node="">
</span><li data-dcnode-id="5359"><strong data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">Guidelines and standards:</span></strong><span data-dcnode-id="5363" instrument_node=""> MDPI follows standards and guidelines for certain types of research. See </span><a data-dcnode-id="5361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/editorial_process%23standards"><span data-dcnode-id="5362" instrument_node="">https://www.mdpi.com/editorial_process</span></a><span data-dcnode-id="5360" instrument_node=""> for further information.</span></li><span data-dcnode-id="5358" instrument_node="">
</span></ul><span data-dcnode-id="5356" instrument_node="">
</span><p data-dcnode-id="5353"><a data-dcnode-id="5354" href="#top"><span data-dcnode-id="5355" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="5352" instrument_node="">
</span><p data-dcnode-id="5351"></p><h3 data-dcnode-id="5348"><a data-dcnode-id="5350" name="front"></a><span data-dcnode-id="5349" instrument_node="">Front Matter</span></h3><span data-dcnode-id="5347" instrument_node="">
</span><p data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">These sections should appear in all manuscript types
</span></p><ul data-dcnode-id="5321"><span data-dcnode-id="5344" instrument_node="">
</span><li data-dcnode-id="5340"><strong data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">Title:</span></strong><span data-dcnode-id="5341" instrument_node="">
The title of your manuscript should be concise, specific and relevant. It should identify if the study reports (human or animal) trial data, or is a systematic review, meta-analysis or replication study.
When gene or protein names are included, the abbreviated name rather than full name should be used. Please do not include abbreviated or short forms of the title, such as a running title or head. These will be removed by our Editorial Office.</span></li><span data-dcnode-id="5339" instrument_node="">
</span><li data-dcnode-id="5332"><strong data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">Author List and Affiliations:</span></strong><span data-dcnode-id="5336" instrument_node=""> Authors' full first and last names must be provided. The initials of any middle names can be added. The PubMed/MEDLINE standard format is used for affiliations: complete address information including city, zip code, state/province, and country. At least one author should be designated as corresponding author, and his or her email address and other details should be included at the end of the affiliation section. Please read the </span><a data-dcnode-id="5334" href="#authorship"><span data-dcnode-id="5335" instrument_node="">criteria to qualify for authorship</span></a><span data-dcnode-id="5333" instrument_node="">.</span></li><span data-dcnode-id="5331" instrument_node="">
</span><li data-dcnode-id="5327"><strong data-dcnode-id="5329"><span data-dcnode-id="5330" instrument_node="">Abstract:</span></strong><span data-dcnode-id="5328" instrument_node="">
The abstract should be a total of about 200 words maximum. The abstract should be a single paragraph and should follow the style of structured abstracts, but without headings: 1) Background: Place the question addressed in a broad context and highlight the purpose of the study; 2) Methods: Describe briefly the main methods or treatments applied. Include any relevant preregistration numbers, and species and strains of any animals used.
3) Results: Summarize the article's main findings; and 4) Conclusion: Indicate the main conclusions or interpretations. The abstract should be an objective representation of the article: it must not contain results which are not presented and substantiated in the main text and should not exaggerate the main conclusions.</span></li><li data-dcnode-id="5323"><strong data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Keywords:</span></strong><span data-dcnode-id="5324" instrument_node=""> Three to ten pertinent keywords need to be added after the abstract. We recommend that the keywords are specific to the article, yet reasonably common within the subject discipline.</span></li><span data-dcnode-id="5322" instrument_node="">
</span></ul><span data-dcnode-id="5320" instrument_node="">
</span><h3 data-dcnode-id="5317"><a data-dcnode-id="5319" name="manuscript"></a><span data-dcnode-id="5318" instrument_node="">Research Manuscript Sections</span></h3><span data-dcnode-id="5316" instrument_node="">
</span><p data-dcnode-id="5315"></p><ul data-dcnode-id="5281"><span data-dcnode-id="5314" instrument_node="">
</span><li data-dcnode-id="5310"><strong data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">Introduction:</span></strong><span data-dcnode-id="5311" instrument_node=""> The introduction should briefly place the study in a broad
context and highlight why it is important. It should define the purpose of the work and its significance, including specific hypotheses being tested. The current state of the research field should be reviewed carefully and key publications cited. Please highlight controversial and diverging hypotheses when necessary. Finally, briefly mention the main aim of the work and highlight the main conclusions. Keep the introduction comprehensible to scientists working outside the topic of the paper.</span></li><span data-dcnode-id="5309" instrument_node="">
</span><li data-dcnode-id="5303"><strong data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">Materials and Methods:</span></strong><span data-dcnode-id="5306" instrument_node=""> They should be described with sufficient detail to allow others to replicate and build on published results. New methods and protocols should be described in detail while well-established methods can be briefly described and appropriately cited. Give the name and version of any software used and make clear whether computer code used is available. Include any pre-registration codes.</span><br data-dcnode-id="5305"><span data-dcnode-id="5304" instrument_node="">
</span></li><span data-dcnode-id="5302" instrument_node="">
</span><li data-dcnode-id="5298"><strong data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">Results:</span></strong><span data-dcnode-id="5299" instrument_node="">
Provide a concise and precise description of the experimental results, their interpretation as well as the experimental conclusions that can be drawn. </span></li><span data-dcnode-id="5297" instrument_node="">
</span><li data-dcnode-id="5293"><strong data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Discussion: </span></strong><span data-dcnode-id="5294" instrument_node="">Authors should discuss the results and how they can be interpreted in perspective of previous studies and of the working hypotheses. The findings and their implications should be discussed in the broadest context possible and limitations of the work highlighted. Future research directions may also be mentioned. This section may be combined with Results.</span></li><span data-dcnode-id="5292" instrument_node="">
</span><li data-dcnode-id="5288"><strong data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">Conclusions:</span></strong><span data-dcnode-id="5289" instrument_node=""> This section is not mandatory but can be added to the manuscript if the discussion is unusually long or complex.</span></li><span data-dcnode-id="5287" instrument_node="">
</span><li data-dcnode-id="5283"><strong data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">Patents:</span></strong><span data-dcnode-id="5284" instrument_node=""> This section is not mandatory but may be added if there are patents resulting from the work reported in this manuscript.</span></li><span data-dcnode-id="5282" instrument_node="">
</span></ul><span data-dcnode-id="5280" instrument_node="">
</span><p data-dcnode-id="5277"><a data-dcnode-id="5278" href="#top"><span data-dcnode-id="5279" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="5276" instrument_node="">
</span><h3 data-dcnode-id="5273"><a data-dcnode-id="5275" name="back"></a><span data-dcnode-id="5274" instrument_node="">Back Matter</span></h3><span data-dcnode-id="5272" instrument_node="">
</span><p data-dcnode-id="5271"></p><ul data-dcnode-id="5183"><span data-dcnode-id="5270" instrument_node="">
</span><li data-dcnode-id="5266"><strong data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">Supplementary Materials:</span></strong><span data-dcnode-id="5267" instrument_node=""> Describe any supplementary material published online alongside the manuscript (figure, tables, video, spreadsheets, etc.). Please indicate the name and title of each element as follows Figure S1: title, Table S1: title, etc. </span></li><span data-dcnode-id="5265" instrument_node="">
</span><li data-dcnode-id="5259"><strong data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">Funding:</span></strong><span data-dcnode-id="5262" instrument_node=""> All sources of funding of the study should be disclosed. Clearly indicate grants that you have received in support of your research work and if you received funds to cover publication costs. Note that some funders will not refund article processing charges (APC) if the funder and grant number are not clearly and correctly identified in the paper. Funding information can be entered separately into the submission system by the authors during submission of their manuscript. Such funding information, if available, will be deposited to FundRef if the manuscript is finally published.</span><br data-dcnode-id="5261"><span data-dcnode-id="5260" instrument_node="">
Please add: “This research received no external funding” or “This research was funded by [name of funder] grant number [xxx]” and “The APC was funded by [XXX]” in this section. Check carefully that the details given are accurate and use the standard spelling of funding agency names at https://search.crossref.org/funding, any errors may affect your future funding.</span></li><span data-dcnode-id="5258" instrument_node="">
</span><li data-dcnode-id="5254"><strong data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">Acknowledgments:</span></strong><span data-dcnode-id="5255" instrument_node=""> In this section you can acknowledge any support given which is not covered by the author contribution or funding sections. This may include administrative and technical support, or donations in kind (e.g., materials used for experiments).</span></li><span data-dcnode-id="5253" instrument_node="">
</span><li data-dcnode-id="5235"><strong data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">Author Contributions:</span></strong><span data-dcnode-id="5250" instrument_node=""> Each author is expected to have made substantial contributions to the conception or design of the work; or the acquisition, analysis, or interpretation of data; or the creation of new software used in the work; or have drafted the work or substantively revised it; AND has approved the submitted version (and version substantially edited by journal staff that involves the author’s contribution to the study); AND agrees to be personally accountable for the author’s own contributions and for ensuring that questions related to the accuracy or integrity of any part of the work, even ones in which the author was not personally involved, are appropriately investigated, resolved, and documented in the literature.</span><br data-dcnode-id="5249"><span data-dcnode-id="5248" instrument_node="">
For research articles with several authors, a short paragraph specifying their individual contributions must be provided. The following statements should be used "Conceptualization, X.X. and Y.Y.; Methodology, X.X.; Software, X.X.; Validation, X.X., Y.Y. and Z.Z.; Formal Analysis, X.X.; Investigation, X.X.; Resources, X.X.; Data Curation, X.X.; Writing – Original Draft Preparation, X.X.; Writing – Review &amp; Editing, X.X.; Visualization, X.X.; Supervision, X.X.; Project Administration, X.X.; Funding Acquisition, Y.Y.”, please turn to the </span><a data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/data/contributor-role-instruction.pdf"><span data-dcnode-id="5247" instrument_node="">CRediT taxonomy</span></a><span data-dcnode-id="5245" instrument_node=""> for the term explanation. For more background on CRediT, see </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//credit.niso.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5244" instrument_node="">here</span></a><span data-dcnode-id="5242" instrument_node="">. "</span><strong data-dcnode-id="5237"><span data-dcnode-id="5241" instrument_node="">Authorship must include and be limited to those who have contributed substantially to the work. Please read the section concerning the </span><a data-dcnode-id="5239" href="#authorship"><span data-dcnode-id="5240" instrument_node="">criteria to qualify for authorship</span></a><span data-dcnode-id="5238" instrument_node=""> carefully</span></strong><span data-dcnode-id="5236" instrument_node="">".</span></li><span data-dcnode-id="5234" instrument_node="">
</span><li data-dcnode-id="5230"><strong data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">Institutional Review Board Statement:</span></strong><span data-dcnode-id="5231" instrument_node=""> In this section, please add the Institutional Review Board Statement and approval number for studies involving humans or animals. Please note that the Editorial Office might ask you for further information. Please add “The study was conducted according to the guidelines of the Declaration of Helsinki, and approved by the Institutional Review Board (or Ethics Committee) of NAME OF INSTITUTE (protocol code XXX and date of approval).” OR “Ethical review and approval were waived for this study, due to REASON (please provide a detailed justification).” OR “Not applicable” for studies not involving humans or animals. You might also choose to exclude this statement if the study did not involve humans or animals.</span></li><span data-dcnode-id="5229" instrument_node="">
</span><li data-dcnode-id="5223"><strong data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">Informed Consent Statement:</span></strong><span data-dcnode-id="5226" instrument_node=""> Any research article describing a study involving humans should contain this statement. Please add “Informed consent was obtained from all subjects involved in the study.” OR “Patient consent was waived due to REASON (please provide a detailed justification).” OR “Not applicable” for studies not involving humans. You might also choose to exclude this statement if the study did not involve humans.
</span><br data-dcnode-id="5225"><span data-dcnode-id="5224" instrument_node="">Written informed consent for publication must be obtained from participating patients who can be identified (including by the patients themselves). Please state “Written informed consent has been obtained from the patient(s) to publish this paper” if applicable.</span></li><span data-dcnode-id="5222" instrument_node="">
</span><li data-dcnode-id="5215"><strong data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">Data Availability Statement:</span></strong><span data-dcnode-id="5219" instrument_node=""> In this section, please provide details regarding where data supporting reported results can be found, including links to publicly archived datasets analyzed or generated during the study. Please refer to suggested Data Availability Statements in section “</span><a data-dcnode-id="5217" href="#suppmaterials"><span data-dcnode-id="5218" instrument_node="">MDPI Research Data Policies</span></a><span data-dcnode-id="5216" instrument_node="">”. You might choose to exclude this statement if the study did not report any data.</span></li><span data-dcnode-id="5214" instrument_node="">
</span><li data-dcnode-id="5204"><strong data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">Conflicts of Interest:</span></strong><span data-dcnode-id="5211" instrument_node=""> Authors must identify and declare any personal circumstances or interest that may be perceived as influencing the representation or interpretation of reported research results. If there is no conflict of interest, please state "The authors declare no conflict of interest." Any role of the funding sponsors in the choice of research project; design of the study; in the collection, analyses or interpretation of data; in the writing of the manuscript; or in the decision to publish the results must be declared in this section. </span><em data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">Sports</span></em><span data-dcnode-id="5208" instrument_node=""> does not publish studies funded partially or fully by the tobacco industry. Any projects funded by industry must pay special attention to the full declaration of funder involvement. If there is no role, please state “The sponsors had no role in the design, execution, interpretation, or writing of the study”. For more details please see </span><a data-dcnode-id="5206" href="#conflict"><span data-dcnode-id="5207" instrument_node="">Conflict of Interest</span></a><span data-dcnode-id="5205" instrument_node="">.</span></li><span data-dcnode-id="5203" instrument_node="">
</span><li data-dcnode-id="5188"><span data-dcnode-id="5202" instrument_node="">
</span><a data-dcnode-id="5201" name="references"></a><strong data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">References:</span></strong><span data-dcnode-id="5198" instrument_node=""> References must be numbered in order of appearance in the text (including table captions and figure legends) and listed individually at the end of the manuscript. We recommend preparing the references with a bibliography software package, such as </span><a data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//endnote.com/" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5197" instrument_node="">EndNote</span></a><span data-dcnode-id="5195" instrument_node="">, </span><a data-dcnode-id="5193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.refman.com/" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5194" instrument_node="">ReferenceManager</span></a><span data-dcnode-id="5192" instrument_node=""> or </span><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zotero.org/" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5191" instrument_node="">Zotero</span></a><span data-dcnode-id="5189" instrument_node=""> to avoid typing mistakes and duplicated references. We encourage citations to data, computer code and other citable research material. If available online, you may use reference style 9. below. </span></li><span data-dcnode-id="5187" instrument_node="">
</span><li data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">
Citations and References in Supplementary files are permitted provided that they also appear in the main text and in the reference list.
</span></li><span data-dcnode-id="5184" instrument_node="">
</span></ul><span data-dcnode-id="5182" instrument_node="">
</span><p data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">In the text, reference numbers should be placed in square brackets [ ], and placed before the punctuation; for example [1], [1–3] or [1,3]. For embedded citations in the text with pagination, use both parentheses and brackets to indicate the reference number and page numbers; for example [5] (p. 10). or [6] (pp. 101–105).</span></p><span data-dcnode-id="5179" instrument_node="">
</span><p data-dcnode-id="5171"><span data-dcnode-id="5178" instrument_node="">The reference list should include the full title, as recommended by the ACS style guide. Style files for </span><a data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//endnote.com/downloads/style/mdpi" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5177" instrument_node="">Endnote</span></a><span data-dcnode-id="5175" instrument_node=""> and </span><a data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zotero.org/styles/%3Fq%3Did%253Amultidisciplinary-digital-publishing-institute" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5174" instrument_node="">Zotero</span></a><span data-dcnode-id="5172" instrument_node=""> are available.</span></p><span data-dcnode-id="5170" instrument_node="">
</span><p data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">References should be described as follows, depending on the type of work:</span></p><span data-dcnode-id="5167" instrument_node="">
</span><li data-dcnode-id="5154"><span data-dcnode-id="5166" instrument_node="">Journal Articles:</span><br data-dcnode-id="5165"><span data-dcnode-id="5164" instrument_node=""> 1. Author 1, A.B.; Author 2, C.D. Title of the article. </span><em data-dcnode-id="5162"><span data-dcnode-id="5163" instrument_node="">Abbreviated Journal Name</span></em><span data-dcnode-id="5161" instrument_node=""> </span><strong data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">Year</span></strong><span data-dcnode-id="5158" instrument_node="">, </span><em data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">Volume</span></em><span data-dcnode-id="5155" instrument_node="">, page range.</span></li><span data-dcnode-id="5153" instrument_node="">
</span><li data-dcnode-id="5141"><span data-dcnode-id="5152" instrument_node="">Books and Book Chapters:</span><br data-dcnode-id="5151"><span data-dcnode-id="5150" instrument_node=""> 2. Author 1, A.; Author 2, B. </span><em data-dcnode-id="5148"><span data-dcnode-id="5149" instrument_node="">Book Title</span></em><span data-dcnode-id="5147" instrument_node="">, 3rd ed.; Publisher: Publisher Location, Country, Year; pp. 154–196.</span><br data-dcnode-id="5146"><span data-dcnode-id="5145" instrument_node=""> 3. Author 1, A.; Author 2, B. Title of the chapter. In </span><em data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">Book Title</span></em><span data-dcnode-id="5142" instrument_node="">, 2nd ed.; Editor 1, A., Editor 2, B., Eds.; Publisher: Publisher Location, Country, Year; Volume 3, pp. 154–196.</span></li><span data-dcnode-id="5140" instrument_node="">
</span><li data-dcnode-id="5110"><span data-dcnode-id="5139" instrument_node="">Unpublished materials intended for publication:</span><br data-dcnode-id="5138"><span data-dcnode-id="5137" instrument_node=""> 4. Author 1, A.B.; Author 2, C. Title of Unpublished Work (optional). Correspondence Affiliation, City, State, Country. year, </span><em data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">status</span></em><span data-dcnode-id="5134" instrument_node=""> (</span><em data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">manuscript in preparation</span></em><span data-dcnode-id="5131" instrument_node="">; </span><em data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">to be submitted</span></em><span data-dcnode-id="5128" instrument_node="">).</span><br data-dcnode-id="5127"><span data-dcnode-id="5126" instrument_node=""> 5. Author 1, A.B.; Author 2, C. Title of Unpublished Work. </span><em data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">Abbreviated Journal Name</span></em><span data-dcnode-id="5123" instrument_node=""> year, </span><em data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">phrase indicating stage of publication</span></em><span data-dcnode-id="5120" instrument_node=""> (</span><em data-dcnode-id="5118"><span data-dcnode-id="5119" instrument_node="">submitted</span></em><span data-dcnode-id="5117" instrument_node="">; </span><em data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">accepted</span></em><span data-dcnode-id="5114" instrument_node="">; </span><em data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">in press</span></em><span data-dcnode-id="5111" instrument_node="">).</span></li><span data-dcnode-id="5109" instrument_node="">
</span><li data-dcnode-id="5105"><span data-dcnode-id="5108" instrument_node="">Unpublished materials not intended for publication:</span><br data-dcnode-id="5107"><span data-dcnode-id="5106" instrument_node="">6. Author 1, A.B. (Affiliation, City, State, Country); Author 2, C. (Affiliation, City, State, Country). Phase describing the material, year. (phase: Personal communication; Private communication; Unpublished work; etc.)</span></li><span data-dcnode-id="5104" instrument_node="">
</span><li data-dcnode-id="5097"><span data-dcnode-id="5103" instrument_node="">Conference Proceedings:</span><br data-dcnode-id="5102"><span data-dcnode-id="5101" instrument_node=""> 7. Author 1, A.B.; Author 2, C.D.; Author 3, E.F. Title of Presentation. In </span><em data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">Title of the Collected Work</span></em><span data-dcnode-id="5098" instrument_node=""> (if available), Proceedings of the Name of the Conference, Location of Conference, Country, Date of Conference; Editor 1, Editor 2, Eds. (if available); Publisher: City, Country, Year (if available); Abstract Number (optional), Pagination (optional).</span></li><span data-dcnode-id="5096" instrument_node="">
</span><li data-dcnode-id="5092"><span data-dcnode-id="5095" instrument_node="">Thesis:</span><br data-dcnode-id="5094"><span data-dcnode-id="5093" instrument_node=""> 8. Author 1, A.B. Title of Thesis. Level of Thesis, Degree-Granting University, Location of University, Date of Completion.</span></li><span data-dcnode-id="5091" instrument_node="">
</span><li data-dcnode-id="5080"><span data-dcnode-id="5090" instrument_node="">Websites:</span><br data-dcnode-id="5089"><span data-dcnode-id="5088" instrument_node=""> 9. Title of Site. Available online: URL (accessed on Day Month Year).</span><br data-dcnode-id="5087"><span data-dcnode-id="5086" instrument_node=""> Unlike published works, websites may change over time or disappear, so we encourage you create an archive of the cited website using a service such as </span><a data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webcitation.org/archive" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="5085" instrument_node="">WebCite</span></a><span data-dcnode-id="5083" instrument_node="">. Archived websites should be cited using the link provided as follows:</span><br data-dcnode-id="5082"><span data-dcnode-id="5081" instrument_node=""> 10. Title of Site. URL (archived on Day Month Year).</span></li><span data-dcnode-id="5079" instrument_node="">
</span><br data-dcnode-id="5078"><span data-dcnode-id="5077" instrument_node="">
See the </span><a data-dcnode-id="5075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/references"><span data-dcnode-id="5076" instrument_node="">Reference List and Citations Guide</span></a><span data-dcnode-id="5074" instrument_node=""> for more detailed information.
</span><p data-dcnode-id="5071"><a data-dcnode-id="5072" href="#top"><span data-dcnode-id="5073" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="5070" instrument_node="">
</span><h2 data-dcnode-id="5067"><a data-dcnode-id="5069" name="figures"></a><span data-dcnode-id="5068" instrument_node="">Preparing Figures, Schemes and Tables</span></h2><span data-dcnode-id="5066" instrument_node="">
</span><p data-dcnode-id="5065"></p><ul data-dcnode-id="5040"><span data-dcnode-id="5064" instrument_node="">
</span><li data-dcnode-id="5062"><span data-dcnode-id="5063" instrument_node="">File for Figures and Schemes must be provided during submission in a single zip archive and at a sufficiently high resolution (minimum 1000 pixels width/height, or a resolution of 300 dpi or higher). Common formats are accepted, however, TIFF, JPEG, EPS and PDF are preferred.</span></li><span data-dcnode-id="5061" instrument_node="">
</span><li data-dcnode-id="5057"><em data-dcnode-id="5059"><span data-dcnode-id="5060" instrument_node="">Sports</span></em><span data-dcnode-id="5058" instrument_node=""> can publish multimedia files in articles or as supplementary materials. Please contact the editorial office for further information.</span></li><span data-dcnode-id="5056" instrument_node="">
</span><li data-dcnode-id="5051"><span data-dcnode-id="5055" instrument_node="">All Figures, Schemes and Tables should be inserted into the main text close to their first citation and must be numbered following their number of appearance (Figure 1, Scheme I, Figure 2, Scheme II, Table 1, </span><em data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">etc.</span></em><span data-dcnode-id="5052" instrument_node="">).</span></li><span data-dcnode-id="5050" instrument_node="">
</span><li data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">All Figures, Schemes and Tables should have a short explanatory title and caption.</span></li><span data-dcnode-id="5047" instrument_node="">
</span><li data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">All table columns should have an explanatory heading. To facilitate the copy-editing of larger tables, smaller fonts may be used, but no less than 8 pt. in size. Authors should use the Table option of Microsoft Word to create tables.</span></li><span data-dcnode-id="5044" instrument_node="">
</span><li data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">Authors are encouraged to prepare figures and schemes in color (RGB at 8-bit per channel). There is no additional cost for publishing full color graphics.</span></li><span data-dcnode-id="5041" instrument_node="">
</span></ul><span data-dcnode-id="5039" instrument_node="">
</span><p data-dcnode-id="5036"><a data-dcnode-id="5037" href="#top"><span data-dcnode-id="5038" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="5035" instrument_node="">
</span><p data-dcnode-id="5034"></p><h2 data-dcnode-id="5031"><a data-dcnode-id="5033" name="oriimages"></a><span data-dcnode-id="5032" instrument_node="">Original Images for Blots and Gels Requirements</span></h2><span data-dcnode-id="5030" instrument_node="">
</span><p data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">For the main text, please ensure that:</span></p><span data-dcnode-id="5027" instrument_node="">
</span><ul data-dcnode-id="5013"><span data-dcnode-id="5026" instrument_node="">
</span><li data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">All experimental samples and controls used for one comparative analysis are run on the same blot/gel.</span></li><span data-dcnode-id="5023" instrument_node="">
</span><li data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Image processing methods, such as adjusting the brightness or contrast, do not alter or distort the information in the figure and are applied to every pixel. High-contrast blots/gels are discouraged.</span></li><span data-dcnode-id="5020" instrument_node="">
</span><li data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">Cropped blots/gels present in the main text retain all important information and bands.</span></li><span data-dcnode-id="5017" instrument_node="">
</span><li data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">You have checked figures for duplications and ensured the figure legends are clear and accurate. Please include all relevant information in the figure legends and clearly indicate any re-arrangement of lanes.</span></li><span data-dcnode-id="5014" instrument_node="">
</span></ul><span data-dcnode-id="5012" instrument_node="">
</span><p data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">In order to ensure the integrity and scientific validity of blots (including, but not limited to, Western blots) and the reporting of gel data, original, uncropped and unadjusted images should be uploaded as Supporting Information files at the time of initial submission. </span></p><span data-dcnode-id="5009" instrument_node="">
</span><p data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">A single PDF file or a zip folder including all the original images reported in the main figure and supplemental figures should be prepared. Authors should annotate each original image, corresponding to the figure in the main article or supplementary materials, and label each lane or loading order. All experimental samples and controls used for one comparative analysis should be run on the same blot/gel image. For quantitative analyses, please provide the blots/gels for each independent biological replicate used in the analysis. </span></p><span data-dcnode-id="5006" instrument_node="">
</span><p data-dcnode-id="5003"><a data-dcnode-id="5004" href="#top"><span data-dcnode-id="5005" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="5002" instrument_node="">
</span><h2 data-dcnode-id="4999"><a data-dcnode-id="5001" name="suppmaterials"></a><span data-dcnode-id="5000" instrument_node="">Supplementary Materials, Data Deposit and Software Source Code</span></h2><span data-dcnode-id="4998" instrument_node="">
</span><p data-dcnode-id="4997"></p><p data-dcnode-id="4993"><a data-dcnode-id="4996" name="data"></a><em data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">MDPI Research Data Policies</span></em></p><span data-dcnode-id="4992" instrument_node="">
</span><p data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">MDPI is committed to supporting open scientific exchange and enabling our authors to achieve best practices in sharing and archiving research data. We encourage all authors of articles published in MDPI journals to share their research data. Individual journal guidelines can be found at the journal ‘Instructions for Authors’ page. Data sharing policies concern the minimal dataset that supports the central findings of a published study. Generated data should be publicly available and cited in accordance with journal guidelines.</span></p><span data-dcnode-id="4989" instrument_node="">
</span><p data-dcnode-id="4981"><span data-dcnode-id="4988" instrument_node="">MDPI data policies are informed by </span><a data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cos.io/initiatives/top-guidelines" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4987" instrument_node="">TOP Guidelines</span></a><span data-dcnode-id="4985" instrument_node=""> and </span><a data-dcnode-id="4983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.go-fair.org/fair-principles/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4984" instrument_node="">FAIR Principles</span></a><span data-dcnode-id="4982" instrument_node="">. </span></p><span data-dcnode-id="4980" instrument_node="">
</span><p data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">Where ethical, legal or privacy issues are present, data should not be shared. The authors should make any limitations clear in the Data Availability Statement upon submission. Authors should ensure that data shared are in accordance with consent provided by participants on the use of confidential data.</span></p><span data-dcnode-id="4977" instrument_node="">
</span><p data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">Data Availability Statements provide details regarding where data supporting reported results can be found, including links to publicly archived datasets analyzed or generated during the study.</span></p><span data-dcnode-id="4974" instrument_node="">
</span><p data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">Below are suggested Data Availability Statements:</span></p><span data-dcnode-id="4971" instrument_node="">
</span><ul data-dcnode-id="4936"><span data-dcnode-id="4970" instrument_node="">
</span><li data-dcnode-id="4963"><span data-dcnode-id="4969" instrument_node="">Data available in a publicly accessible repository </span><br data-dcnode-id="4968"><span data-dcnode-id="4967" instrument_node="">
The data presented in this study are openly available in [repository name e.g., FigShare] at [</span><a data-dcnode-id="4965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.doi.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4966" instrument_node="">doi</span></a><span data-dcnode-id="4964" instrument_node="">], reference number [reference number].</span></li><span data-dcnode-id="4962" instrument_node="">
</span><li data-dcnode-id="4958"><span data-dcnode-id="4961" instrument_node="">Data available in a publicly accessible repository that does not issue DOIs</span><br data-dcnode-id="4960"><span data-dcnode-id="4959" instrument_node="">
Publicly available datasets were analyzed in this study. This data can be found here: [link/accession number]</span></li><span data-dcnode-id="4957" instrument_node="">
</span><li data-dcnode-id="4953"><span data-dcnode-id="4956" instrument_node="">Data available on request due to restrictions eg privacy or ethical </span><br data-dcnode-id="4955"><span data-dcnode-id="4954" instrument_node="">
The data presented in this study are available on request from the corresponding author. The data are not publicly available due to [insert reason here]</span></li><span data-dcnode-id="4952" instrument_node="">
</span><li data-dcnode-id="4948"><span data-dcnode-id="4951" instrument_node="">3rd Party Data </span><br data-dcnode-id="4950"><span data-dcnode-id="4949" instrument_node="">
Restrictions apply to the availability of these data. Data was obtained from [third party] and are available [from the authors / at URL] with the permission of [third party].</span></li><span data-dcnode-id="4947" instrument_node="">
</span><li data-dcnode-id="4943"><span data-dcnode-id="4946" instrument_node="">Data sharing not applicable </span><br data-dcnode-id="4945"><span data-dcnode-id="4944" instrument_node="">
No new data were created or analyzed in this study. Data sharing is not applicable to this article.</span></li><span data-dcnode-id="4942" instrument_node="">
</span><li data-dcnode-id="4938"><span data-dcnode-id="4941" instrument_node="">Data is contained within the article or supplementary material </span><br data-dcnode-id="4940"><span data-dcnode-id="4939" instrument_node="">
The data presented in this study are available in [insert article or supplementary material here]</span></li><span data-dcnode-id="4937" instrument_node="">
</span></ul><span data-dcnode-id="4935" instrument_node="">
</span><p data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">Data citation:</span></p><span data-dcnode-id="4932" instrument_node="">
</span><ul data-dcnode-id="4928" style="list-style:none"><span data-dcnode-id="4931" instrument_node="">
</span><li data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">[dataset] Authors. Year. Dataset title; Data repository or archive; Version (if any); Persistent identifier (e.g., DOI).
</span></li></ul><span data-dcnode-id="4927" instrument_node="">
</span><p data-dcnode-id="4923"><a data-dcnode-id="4926" name="computer"></a><em data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">Computer Code and Software</span></em></p><span data-dcnode-id="4922" instrument_node="">
</span><p data-dcnode-id="4917"><span data-dcnode-id="4921" instrument_node="">For work where novel computer code was developed, authors should release the code either by depositing in a recognized, public repository such as </span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4920" instrument_node="">GitHub</span></a><span data-dcnode-id="4918" instrument_node=""> or uploading as supplementary information to the publication. The name, version, corporation and location information for all software used should be clearly indicated. Please include all the parameters used to run software/programs analyses.</span></p><span data-dcnode-id="4916" instrument_node="">
</span><p data-dcnode-id="4912"><a data-dcnode-id="4915" name="suppmaterial"></a><em data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">Supplementary Material</span></em></p><span data-dcnode-id="4911" instrument_node="">
</span><p data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">Additional data and files can be uploaded as "Supplementary Files" during the manuscript submission process. The supplementary files will also be available to the referees as part of the peer-review process. Any file format is acceptable; however, we recommend that common, non-proprietary formats are used where possible.</span></p><span data-dcnode-id="4908" instrument_node="">
</span><p data-dcnode-id="4904"><a data-dcnode-id="4907" name="references"></a><em data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">References in Supplementary Files</span></em></p><span data-dcnode-id="4903" instrument_node="">
</span><p data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">Citations and References in Supplementary files are permitted provided that they also appear in the reference list of the main text.</span></p><span data-dcnode-id="4900" instrument_node="">
</span><p data-dcnode-id="4896"><a data-dcnode-id="4899" name="unpulisheddata"></a><em data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">Unpublished Data</span></em></p><span data-dcnode-id="4895" instrument_node="">
</span><p data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">Restrictions on data availability should be noted during submission and in the manuscript. "Data not shown" should be avoided: authors are encouraged to publish all observations related to the submitted manuscript as Supplementary Material. "Unpublished data" intended for publication in a manuscript that is either planned, "in preparation" or "submitted" but not yet accepted, should be cited in the text and a reference should be added in the References section. "Personal Communication" should also be cited in the text and reference added in the References section. (see also the MDPI reference list and citations style guide).</span></p><span data-dcnode-id="4892" instrument_node="">
</span><p data-dcnode-id="4888"><a data-dcnode-id="4891" name="remotehosting"></a><em data-dcnode-id="4889"><span data-dcnode-id="4890" instrument_node="">Remote Hosting and Large Data Sets</span></em></p><span data-dcnode-id="4887" instrument_node="">
</span><p data-dcnode-id="4876"><span data-dcnode-id="4886" instrument_node="">Data may be deposited with specialized service providers or institutional/subject repositories, preferably those that use the DataCite mechanism. Large data sets and files greater than 60 MB must be deposited in this way. For a list of other repositories specialized in scientific and experimental data, please consult </span><a data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//databib.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4885" instrument_node="">databib.org</span></a><span data-dcnode-id="4883" instrument_node=""> or </span><a data-dcnode-id="4881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.re3data.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4882" instrument_node="">re3data.org</span></a><span data-dcnode-id="4880" instrument_node="">. The data repository name, link to the data set (URL) and accession number, doi or handle number of the data set must be provided in the paper. The journal </span><a data-dcnode-id="4878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/journal/data"><span data-dcnode-id="4879" instrument_node="">Data</span></a><span data-dcnode-id="4877" instrument_node=""> also accepts submissions of data set papers.</span></p><span data-dcnode-id="4875" instrument_node="">
</span><p data-dcnode-id="4871"><em data-dcnode-id="4872"><a data-dcnode-id="4874" name="sequence"></a><span data-dcnode-id="4873" instrument_node="">Deposition of Sequences and of Expression Data</span></em></p><span data-dcnode-id="4870" instrument_node="">
</span><p data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">New sequence information must be deposited to the appropriate database prior to submission of the manuscript. Accession numbers provided by the database should be included in the submitted manuscript. Manuscripts will not be published until the accession number is provided. </span></p><span data-dcnode-id="4867" instrument_node="">
</span><ul data-dcnode-id="4819"><span data-dcnode-id="4866" instrument_node="">
</span><li data-dcnode-id="4853"><i data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">New nucleic acid sequences</span></i><span data-dcnode-id="4863" instrument_node=""> must be deposited in one of the following databases: </span><a data-dcnode-id="4861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/genbank/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4862" instrument_node="">GenBank</span></a><span data-dcnode-id="4860" instrument_node="">, </span><a data-dcnode-id="4858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ebi.ac.uk/submission/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4859" instrument_node="">EMBL</span></a><span data-dcnode-id="4857" instrument_node="">, or </span><a data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ddbj.nig.ac.jp/ddbj/index-e.html" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4856" instrument_node="">DDBJ</span></a><span data-dcnode-id="4854" instrument_node="">. Sequences should be submitted to only one database.</span></li><span data-dcnode-id="4852" instrument_node="">
</span><li data-dcnode-id="4842"><i data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">New high throughput sequencing (HTS) datasets</span></i><span data-dcnode-id="4849" instrument_node=""> (RNA-seq, ChIP-Seq, degradome analysis, …) must be deposited either in the </span><a data-dcnode-id="4847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/gds" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4848" instrument_node="">GEO database</span></a><span data-dcnode-id="4846" instrument_node=""> or in the NCBI’s </span><a data-dcnode-id="4844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/sra" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4845" instrument_node="">Sequence Read Archive (SRA)</span></a><span data-dcnode-id="4843" instrument_node="">.</span></li><span data-dcnode-id="4841" instrument_node="">
