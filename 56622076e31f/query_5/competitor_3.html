</span><li data-dcnode-id="4831"><i data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">New microarray data</span></i><span data-dcnode-id="4838" instrument_node=""> must be deposited either in the </span><a data-dcnode-id="4836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/geo/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4837" instrument_node="">GEO</span></a><span data-dcnode-id="4835" instrument_node=""> or the </span><a data-dcnode-id="4833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ebi.ac.uk/arrayexpress/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4834" instrument_node="">ArrayExpress</span></a><span data-dcnode-id="4832" instrument_node=""> databases.The "Minimal Information About a Microarray Experiment" (MIAME) guidelines published by the Microarray Gene Expression Data Society must be followed.</span></li><span data-dcnode-id="4830" instrument_node="">
</span><li data-dcnode-id="4820"><i data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">New protein sequences</span></i><span data-dcnode-id="4827" instrument_node=""> obtained by protein sequencing must be submitted to UniProt (submission tool </span><a data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ebi.ac.uk/swissprot/Submissions/spin/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4826" instrument_node="">SPIN</span></a><span data-dcnode-id="4824" instrument_node="">). Annotated protein structure and its reference sequence must be submitted to </span><a data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rcsb.org/%23Category-welcome" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4823" instrument_node="">RCSB of Protein Data Bank</span></a><span data-dcnode-id="4821" instrument_node="">.</span></li></ul><span data-dcnode-id="4818" instrument_node="">
</span><p data-dcnode-id="4816"><span data-dcnode-id="4817" instrument_node="">All sequence names and the accession numbers provided by the databases must be provided in the Materials and Methods section of the article.</span></p><span data-dcnode-id="4815" instrument_node="">
</span><p data-dcnode-id="4811"><em data-dcnode-id="4812"><a data-dcnode-id="4814" name="sequence"></a><span data-dcnode-id="4813" instrument_node="">Deposition of Proteomics Data</span></em></p><span data-dcnode-id="4810" instrument_node="">
</span><p data-dcnode-id="4796"><span data-dcnode-id="4809" instrument_node="">Methods used to generate the proteomics data should be described in detail and we encourage authors to adhere to the "</span><a data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.psidev.info/miape" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4808" instrument_node="">Minimum Information About a Proteomics Experiment</span></a><span data-dcnode-id="4806" instrument_node="">". All generated mass spectrometry raw data must be deposited in the appropriate public database such as </span><a data-dcnode-id="4804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//massive.ucsd.edu/ProteoSAFe/static/massive.jsp" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4805" instrument_node="">ProteomeXchange</span></a><span data-dcnode-id="4803" instrument_node="">, </span><a data-dcnode-id="4801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ebi.ac.uk/pride/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4802" instrument_node="">PRIDE</span></a><span data-dcnode-id="4800" instrument_node=""> or </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jpostdb.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4799" instrument_node="">jPOST</span></a><span data-dcnode-id="4797" instrument_node="">. At the time of submission, please include all relevant information in the materials and methods section, such as repository where the data was submitted and link, data set identifier, username and password needed to access the data. </span></p><span data-dcnode-id="4795" instrument_node="">
</span><p data-dcnode-id="4792"><a data-dcnode-id="4793" href="#top"><span data-dcnode-id="4794" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4791" instrument_node="">
</span><h2 data-dcnode-id="4788"><a data-dcnode-id="4790" name="ethics"></a><span data-dcnode-id="4789" instrument_node="">Research and Publication Ethics</span></h2><span data-dcnode-id="4787" instrument_node="">
</span><p data-dcnode-id="4785"><a data-dcnode-id="4786" name="rethics"></a></p><h3 data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node="">Research Ethics</span></h3><span data-dcnode-id="4782" instrument_node="">
</span><h3 data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">Research Involving Human Subjects</span></h3><span data-dcnode-id="4779" instrument_node="">
</span><p data-dcnode-id="4774"><span data-dcnode-id="4778" instrument_node="">When reporting on research that involves human subjects, human material, human tissues, or human data, authors must declare that the investigations were carried out following the rules of the Declaration of Helsinki of 1975 (</span><a data-dcnode-id="4776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wma.net/what-we-do/medical-ethics/declaration-of-helsinki//" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4777" instrument_node="">https://www.wma.net/what-we-do/medical-ethics/declaration-of-helsinki/</span></a><span data-dcnode-id="4775" instrument_node="">), revised in 2013. According to point 23 of this declaration, an approval from the local institutional review board (IRB) or other appropriate ethics committee must be obtained before undertaking the research to confirm the study meets national and international guidelines. As a minimum, a statement including the project identification code, date of approval, and name of the ethics committee or institutional review board must be stated in Section ‘Institutional Review Board Statement’ of the article.</span></p><span data-dcnode-id="4773" instrument_node="">
</span><p data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">Example of an ethical statement: "All subjects gave their informed consent for inclusion before they participated in the study. The study was conducted in accordance with the Declaration of Helsinki, and the protocol was approved by the Ethics Committee of XXX (Project identification code)."</span></p><span data-dcnode-id="4770" instrument_node="">
</span><p data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">For non-interventional studies (e.g. surveys, questionnaires, social media research), all participants must be fully informed if the anonymity is assured, why the research is being conducted, how their data will be used and if there are any risks associated. As with all research involving humans, ethical approval from an appropriate ethics committee must be obtained prior to conducting the study. If ethical approval is not required, authors must either provide an exemption from the ethics committee or are encouraged to cite the local or national legislation that indicates ethics approval is not required for this type of study. Where a study has been granted exemption, the name of the ethics committee which provided this should be stated in Section ‘Institutional Review Board Statement’ with a full explanation regarding why ethical approval was not required. </span></p><span data-dcnode-id="4767" instrument_node="">
</span><p data-dcnode-id="4762"><span data-dcnode-id="4766" instrument_node="">A written informed consent for publication must be obtained from participating patients. Data relating to individual participants must be described in detail, but private information identifying participants need not be included unless the identifiable materials are of relevance to the research (for example, photographs of participants’ faces that show a particular symptom). Patients’ initials or other personal identifiers must not appear in any images. For manuscripts that include any case details, personal information, and/or images of patients, authors must obtain signed informed consent for publication from patients (or their relatives/guardians) before submitting to an MDPI journal. Patient details must be anonymized as far as possible, e.g., do not mention specific age, ethnicity, or occupation where they are not relevant to the conclusions. A </span><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//res.mdpi.com/data/mdpi_patient_consent_form-2021.docx"><span data-dcnode-id="4765" instrument_node="">template permission form</span></a><span data-dcnode-id="4763" instrument_node=""> is available to download. A blank version of the form used to obtain permission (without the patient names or signature) must be uploaded with your submission. Editors reserve the right to reject any submission that does not meet these requirements.</span></p><span data-dcnode-id="4761" instrument_node="">
</span><p data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">You may refer to our sample form and provide an appropriate form after consulting with your affiliated institution. For the purposes of publishing in MDPI journals, a consent, permission, or release form should include unlimited permission for publication in all formats (including print, electronic, and online), in sublicensed and reprinted versions (including translations and derived works), and in other works and products under open access license. To respect patients’ and any other individual’s privacy, please do not send signed forms. The journal reserves the right to ask authors to provide signed forms if necessary.</span></p><span data-dcnode-id="4758" instrument_node="">
</span><p data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">If the study reports research involving vulnerable groups, an additional check may be performed. The submitted manuscript will be scrutinized by the editorial office and upon request, documentary evidence (blank consent forms and any related discussion documents from the ethics board) must be supplied. Additionally, when studies describe groups by race, ethnicity, gender, disability, disease, etc., explanation regarding why such categorization was needed must be clearly stated in the article.</span></p><span data-dcnode-id="4755" instrument_node="">
</span><p data-dcnode-id="4754"></p><h3 data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">Ethical Guidelines for the Use of Animals in Research</span></h3><span data-dcnode-id="4751" instrument_node="">
</span><p data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">The editors will require that the benefits potentially derived from any research causing harm to animals are significant in relation to any cost endured by animals, and that procedures followed are unlikely to cause offense to the majority of readers. Authors should particularly ensure that their research complies with the commonly-accepted '3Rs [1]':</span></p><span data-dcnode-id="4748" instrument_node="">
</span><ul data-dcnode-id="4737"><span data-dcnode-id="4747" instrument_node="">
</span><li data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">Replacement of animals by alternatives wherever possible,</span></li><span data-dcnode-id="4744" instrument_node="">
</span><li data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Reduction in number of animals used, and</span></li><span data-dcnode-id="4741" instrument_node="">
</span><li data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">Refinement of experimental conditions and procedures to minimize the harm to animals.</span></li><span data-dcnode-id="4738" instrument_node="">
</span></ul><span data-dcnode-id="4736" instrument_node="">
</span><p data-dcnode-id="4734"><span data-dcnode-id="4735" instrument_node="">Authors must include details on housing, husbandry and pain management in their manuscript.</span></p><span data-dcnode-id="4733" instrument_node="">
</span><p data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">For further guidance authors should refer to the Code of Practice for the Housing and Care of Animals Used in Scientific Procedures [2], American Association for Laboratory Animal Science [3] or European Animal Research Association [4].</span></p><span data-dcnode-id="4730" instrument_node="">
</span><p data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">If national legislation requires it, studies involving vertebrates or higher invertebrates must only be carried out after obtaining approval from the appropriate ethics committee. As a minimum, the project identification code, date of approval and name of the ethics committee or institutional review board should be stated in Section ‘Institutional Review Board Statement’. Research procedures must be carried out in accordance with national and institutional regulations. Statements on animal welfare should confirm that the study complied with all relevant legislation. Clinical studies involving animals and interventions outside of routine care require ethics committee oversight as per the American Veterinary Medical Association. If the study involved client-owned animals, informed client consent must be obtained and certified in the manuscript report of the research. Owners must be fully informed if there are any risks associated with the procedures and that the research will be published. If available, a high standard of veterinary care must be provided. Authors are responsible for correctness of the statements provided in the manuscript.</span></p><span data-dcnode-id="4727" instrument_node="">
</span><p data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">If ethical approval is not required by national laws, authors must provide an exemption from the ethics committee, if one is available. Where a study has been granted exemption, the name of the ethics committee that provided this should be stated in Section ‘Institutional Review Board Statement’ with a full explanation on why the ethical approval was not required.</span></p><span data-dcnode-id="4724" instrument_node="">
</span><p data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">If no animal ethics committee is available to review applications, authors should be aware that the ethics of their research will be evaluated by reviewers and editors. Authors should provide a statement justifying the work from an ethical perspective, using the same utilitarian framework that is used by ethics committees. Authors may be asked to provide this even if they have received ethical approval.</span></p><span data-dcnode-id="4721" instrument_node="">
</span><p data-dcnode-id="4713"><span data-dcnode-id="4720" instrument_node="">MDPI endorses the ARRIVE guidelines (</span><a data-dcnode-id="4718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arriveguidelines.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4719" instrument_node="">arriveguidelines.org/</span></a><span data-dcnode-id="4717" instrument_node="">) for reporting experiments using live animals. Authors and reviewers must use the ARRIVE guidelines as a checklist, which can be found at </span><a data-dcnode-id="4715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arriveguidelines.org/sites/arrive/files/documents/ARRIVE%2520Compliance%2520Questionnaire.pdf" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4716" instrument_node="">https://arriveguidelines.org/sites/arrive/files/documents/ARRIVE%20Compliance%20Questionnaire.pdf</span></a><span data-dcnode-id="4714" instrument_node="">. Editors reserve the right to ask for the checklist and to reject submissions that do not adhere to these guidelines, to reject submissions based on ethical or animal welfare concerns or if the procedure described does not appear to be justified by the value of the work presented.</span></p><span data-dcnode-id="4712" instrument_node="">
</span><ol data-dcnode-id="4690"><span data-dcnode-id="4711" instrument_node="">
</span><li data-dcnode-id="4707"><span data-dcnode-id="4710" instrument_node="">NSW Department of Primary Industries and Animal Research Review Panel. Three Rs. Available online: </span><a data-dcnode-id="4708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.animalethics.org.au/three-rs" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4709" instrument_node="">https://www.animalethics.org.au/three-rs</span></a></li><span data-dcnode-id="4706" instrument_node="">
</span><li data-dcnode-id="4702"><span data-dcnode-id="4705" instrument_node="">Home Office. Animals (Scientific Procedures) Act 1986. Code of Practice for the Housing and Care of Animals Bred, Supplied or Used for Scientific Purposes. Available online: </span><a data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/388535/CoPanimalsWeb.pdf" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4704" instrument_node="">https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/388535/CoPanimalsWeb.pdf</span></a></li><span data-dcnode-id="4701" instrument_node="">
</span><li data-dcnode-id="4697"><span data-dcnode-id="4700" instrument_node="">American Association for Laboratory Animal Science. The Scientific Basis for Regulation of Animal Care and Use. Available online: </span><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aalas.org/about-aalas/position-papers/scientific-basis-for-regulation-of-animal-care-and-use" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4699" instrument_node="">https://www.aalas.org/about-aalas/position-papers/scientific-basis-for-regulation-of-animal-care-and-use</span></a></li><span data-dcnode-id="4696" instrument_node="">
</span><li data-dcnode-id="4692"><span data-dcnode-id="4695" instrument_node="">European Animal Research Association. EU regulations on animal research. Available online: </span><a data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eara.eu/animal-research-law" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4694" instrument_node="">https://www.eara.eu/animal-research-law</span></a></li><span data-dcnode-id="4691" instrument_node="">
</span></ol><span data-dcnode-id="4689" instrument_node="">
</span><p data-dcnode-id="4688"></p><h3 data-dcnode-id="4686"><span data-dcnode-id="4687" instrument_node="">Research Involving Cell Lines</span></h3><span data-dcnode-id="4685" instrument_node="">
</span><p data-dcnode-id="4680"><span data-dcnode-id="4684" instrument_node="">Methods sections for submissions reporting on research with cell lines should state the origin of any cell lines. For established cell lines the provenance should be stated and references must also be given to either a published paper or to a commercial source. If previously unpublished </span><em data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">de novo</span></em><span data-dcnode-id="4681" instrument_node=""> cell lines were used, including those gifted from another laboratory, details of institutional review board or ethics committee approval must be given, and confirmation of written informed consent must be provided if the line is of human origin.</span></p><span data-dcnode-id="4679" instrument_node="">
</span><p data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">An example of Ethical Statements:</span></p><span data-dcnode-id="4676" instrument_node="">
</span><p data-dcnode-id="4671"><span data-dcnode-id="4675" instrument_node="">The HCT116 cell line was obtained from XXXX. The MLH1</span><sup data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">+</span></sup><span data-dcnode-id="4672" instrument_node=""> cell line was provided by XXXXX, Ltd. The DLD-1 cell line was obtained from Dr. XXXX. The DR-GFP and SA-GFP reporter plasmids were obtained from Dr. XXX and the Rad51K133A expression vector was obtained from Dr. XXXX.</span></p><span data-dcnode-id="4670" instrument_node="">
</span><p data-dcnode-id="4669"></p><h3 data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">Research Involving Plants</span></h3><span data-dcnode-id="4666" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4665" instrument_node="">Experimental research on plants (either cultivated or wild) including collection of plant material, must comply with institutional, national, or international guidelines. We recommend that authors comply with the </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cbd.int/convention/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4664" instrument_node="">Convention on Biological Diversity</span></a><span data-dcnode-id="4662" instrument_node=""> and the </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cites.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4661" instrument_node="">Convention on the Trade in Endangered Species of Wild Fauna and Flora</span></a><span data-dcnode-id="4659" instrument_node="">.</span></p><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4652"><span data-dcnode-id="4656" instrument_node="">For each submitted manuscript supporting genetic information and origin must be provided. For research manuscripts involving rare and non-model plants (other than, e.g., </span><em data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">Arabidopsis thaliana, Nicotiana benthamiana, Oryza sativa</span></em><span data-dcnode-id="4653" instrument_node="">, or many other typical model plants), voucher specimens must be deposited in an accessible herbarium or museum. Vouchers may be requested for review by future investigators to verify the identity of the material used in the study (especially if taxonomic rearrangements occur in the future). They should include details of the populations sampled on the site of collection (GPS coordinates), date of collection, and document the part(s) used in the study where appropriate. For rare, threatened or endangered species this can be waived but it is necessary for the author to describe this in the cover letter.</span></p><span data-dcnode-id="4651" instrument_node="">
</span><p data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node="">Editors reserve the rights to reject any submission that does not meet these requirements.</span></p><span data-dcnode-id="4648" instrument_node="">
</span><p data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">An example of Ethical Statements:</span></p><span data-dcnode-id="4645" instrument_node="">
</span><p data-dcnode-id="4641"><em data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">Torenia fournieri</span></em><span data-dcnode-id="4642" instrument_node=""> plants were used in this study. White-flowered Crown White (CrW) and violet-flowered Crown Violet (CrV) cultivars selected from ‘Crown Mix’ (XXX Company, City, Country) were kindly provided by Dr. XXX (XXX Institute, City, Country).</span></p><span data-dcnode-id="4640" instrument_node="">
</span><p data-dcnode-id="4636"><em data-dcnode-id="4638"><span data-dcnode-id="4639" instrument_node="">Arabidopis</span></em><span data-dcnode-id="4637" instrument_node=""> mutant lines (SALKxxxx, SAILxxxx,…) were kindly provided by Dr. XXX , institute, city, country).</span></p><span data-dcnode-id="4635" instrument_node="">
</span><p data-dcnode-id="4634"></p><h3 data-dcnode-id="4631"><a data-dcnode-id="4633" name="trials"></a><span data-dcnode-id="4632" instrument_node="">Clinical Trials Registration</span></h3><span data-dcnode-id="4630" instrument_node="">
</span><p data-dcnode-id="4627"><em data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">Registration</span></em></p><span data-dcnode-id="4626" instrument_node="">
</span><p data-dcnode-id="4621"><span data-dcnode-id="4625" instrument_node="">MDPI follows the International Committee of Medical Journal Editors (ICMJE) </span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icmje.org/recommendations/browse/publishing-and-editorial-issues/clinical-trial-registration.html" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4624" instrument_node="">guidelines</span></a><span data-dcnode-id="4622" instrument_node=""> which require and recommend registration of clinical trials in a public trials registry at or before the time of first patient enrollment as a condition of consideration for publication.</span></p><span data-dcnode-id="4620" instrument_node="">
</span><p data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">Purely observational studies do not require registration. A clinical trial not only refers to studies that take place in a hospital or involve pharmaceuticals, but also refer to all studies which involve participant randomization and group classification in the context of the intervention under assessment.</span></p><span data-dcnode-id="4617" instrument_node="">
</span><p data-dcnode-id="4606"><span data-dcnode-id="4616" instrument_node="">Authors are strongly encouraged to pre-register clinical trials with an international clinical trials register and cite a reference to the registration in the Methods section. Suitable databases include </span><a data-dcnode-id="4614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clinicaltrials.gov/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4615" instrument_node="">clinicaltrials.gov</span></a><span data-dcnode-id="4613" instrument_node="">, </span><a data-dcnode-id="4611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clinicaltrialsregister.eu/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4612" instrument_node="">the EU Clinical Trials Register</span></a><span data-dcnode-id="4610" instrument_node=""> and those listed by the World Health Organisation </span><a data-dcnode-id="4608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.who.int/clinical-trials-registry-platform" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4609" instrument_node="">International Clinical Trials Registry Platform</span></a><span data-dcnode-id="4607" instrument_node="">.</span></p><span data-dcnode-id="4605" instrument_node="">
</span><p data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">Approval to conduct a study from an independent local, regional, or national review body is not equivalent to prospective clinical trial registration. MDPI reserves the right to decline any paper without trial registration for further peer-review. However, if the study protocol has been published before the enrolment, the registration can be waived with correct citation of the published protocol.</span></p><span data-dcnode-id="4602" instrument_node="">
</span><p data-dcnode-id="4599"><em data-dcnode-id="4600"><span data-dcnode-id="4601" instrument_node="">CONSORT Statement</span></em></p><span data-dcnode-id="4598" instrument_node="">
</span><p data-dcnode-id="4587"><span data-dcnode-id="4597" instrument_node="">MDPI requires a completed CONSORT 2010 </span><a class="external" data-dcnode-id="4595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/data/consort-2010-checklist.doc"><span data-dcnode-id="4596" instrument_node="">checklist</span></a><span data-dcnode-id="4594" instrument_node=""> and </span><a class="external" data-dcnode-id="4592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/data/consort-2010-flow-diagram.doc"><span data-dcnode-id="4593" instrument_node="">flow diagram </span></a><span data-dcnode-id="4591" instrument_node=""> as a condition of submission when reporting the results of a randomized trial. Templates for these can be found here or on the CONSORT website (</span><a class="external" data-dcnode-id="4589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.consort-statement.org/" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4590" instrument_node="">http://www.consort-statement.org</span></a><span data-dcnode-id="4588" instrument_node="">) which also describes several CONSORT checklist extensions for different designs and types of data beyond two group parallel trials. At minimum, your article should report the content addressed by each item of the checklist.</span></p><span data-dcnode-id="4586" instrument_node="">
</span><p data-dcnode-id="4583"><a data-dcnode-id="4584" href="#top"><span data-dcnode-id="4585" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4582" instrument_node="">
</span><p data-dcnode-id="4581"></p><h3 data-dcnode-id="4578"><a data-dcnode-id="4580" name="trials"></a><span data-dcnode-id="4579" instrument_node="">Sex and Gender in Research</span></h3><span data-dcnode-id="4577" instrument_node="">
</span><p data-dcnode-id="4569"><span data-dcnode-id="4576" instrument_node="">We encourage our authors to follow the </span><a data-dcnode-id="4574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//researchintegrityjournal.biomedcentral.com/articles/10.1186/s41073-016-0007-6" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4575" instrument_node="">‘Sex and Gender Equity in Research – SAGER – guidelines’</span></a><span data-dcnode-id="4573" instrument_node=""> and to include sex and gender considerations where relevant. Authors should use the terms sex (biological attribute) and gender (shaped by social and cultural circumstances) carefully in order to avoid confusing both terms. Article titles and/or abstracts should indicate clearly what sex(es) the study applies to. Authors should also describe in the background, whether sex and/or gender differences may be expected; report how sex and/or gender were accounted for in the design of the study; provide disaggregated data by sex and/or gender, where appropriate; and discuss respective results. If a sex and/or gender analysis was not conducted, the rationale should be given in the Discussion. We suggest that our authors consult the full </span><a data-dcnode-id="4571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//researchintegrityjournal.biomedcentral.com/articles/10.1186/s41073-016-0007-6" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4572" instrument_node="">guidelines</span></a><span data-dcnode-id="4570" instrument_node=""> before submission.</span></p><span data-dcnode-id="4568" instrument_node="">
</span><p data-dcnode-id="4565"><a data-dcnode-id="4566" href="#top"><span data-dcnode-id="4567" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4564" instrument_node="">
</span><a data-dcnode-id="4563" name="ethics"></a><p data-dcnode-id="4562"></p><h3 data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">Borders and Territories</span></h3><span data-dcnode-id="4559" instrument_node="">
</span><p data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">Potential disputes over borders and territories may have particular relevance for authors in describing their research or in an author or editor correspondence address, and should be respected. Content decisions are an editorial matter and where there is a potential or perceived dispute or complaint, the editorial team will attempt to find a resolution that satisfies parties involved.</span></p><span data-dcnode-id="4556" instrument_node="">
</span><p data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">MDPI stays neutral with regard to jurisdictional claims in published maps and institutional affiliations.
</span></p><span data-dcnode-id="4553" instrument_node="">
</span><h3 data-dcnode-id="4550"><a data-dcnode-id="4552" name="ethics"></a><span data-dcnode-id="4551" instrument_node="">Publication Ethics Statement</span></h3><span data-dcnode-id="4549" instrument_node="">
</span><p data-dcnode-id="4536"><em data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">Sports</span></em><span data-dcnode-id="4546" instrument_node=""> is a member of the Committee on Publication Ethics (</span><a data-dcnode-id="4544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//publicationethics.org/" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4545" instrument_node="">COPE</span></a><span data-dcnode-id="4543" instrument_node="">). We fully adhere to its </span><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//publicationethics.org/resources/code-conduct" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4542" instrument_node="">Code of Conduct</span></a><span data-dcnode-id="4540" instrument_node=""> and to its </span><a data-dcnode-id="4538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//publicationethics.org/resources/guidelines" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4539" instrument_node="">Best Practice Guidelines</span></a><span data-dcnode-id="4537" instrument_node="">.</span></p><span data-dcnode-id="4535" instrument_node="">
</span><p data-dcnode-id="4530"><span data-dcnode-id="4534" instrument_node="">The editors of this journal enforce a rigorous peer-review process together with strict ethical policies and standards to ensure to add high quality scientific works to the field of scholarly publication. Unfortunately, cases of plagiarism, data falsification, image manipulation, inappropriate authorship credit, and the like, do arise. The editors of </span><em data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">Sports</span></em><span data-dcnode-id="4531" instrument_node=""> take such publishing ethics issues very seriously and are trained to proceed in such cases with a zero tolerance policy.</span></p><span data-dcnode-id="4529" instrument_node="">
</span><p data-dcnode-id="4524"><span data-dcnode-id="4528" instrument_node="">Authors wishing to publish their papers in </span><em data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Sports</span></em><span data-dcnode-id="4525" instrument_node=""> must abide to the following:</span></p><span data-dcnode-id="4523" instrument_node="">
</span><ul data-dcnode-id="4454"><span data-dcnode-id="4522" instrument_node="">
</span><li data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">Any facts that might be perceived as a possible conflict of interest of the author(s) must be disclosed in the paper prior to submission.</span></li><span data-dcnode-id="4519" instrument_node="">
</span><li data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">Authors should accurately present their research findings and include an objective discussion of the significance of their findings.</span></li><span data-dcnode-id="4516" instrument_node="">
</span><li data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">Data and methods used in the research need to be presented in sufficient detail in the paper, so that other researchers can replicate the work.</span></li><span data-dcnode-id="4513" instrument_node="">
</span><li data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">Raw data should preferably be publicly deposited by the authors before submission of their manuscript. Authors need to at least have the raw data readily available for presentation to the referees and the editors of the journal, if requested. Authors need to ensure appropriate measures are taken so that raw data is retained in full for a reasonable time after publication.</span></li><span data-dcnode-id="4510" instrument_node="">
</span><li data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">Simultaneous submission of manuscripts to more than one journal is not tolerated.</span></li><span data-dcnode-id="4507" instrument_node="">
</span><li data-dcnode-id="4502"><span data-dcnode-id="4506" instrument_node="">The journal accepts exact translations of previously published work. All submissions of translations must conform with our </span><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/ethics%2310"><span data-dcnode-id="4505" instrument_node="">policies on translations</span></a><span data-dcnode-id="4503" instrument_node="">.</span></li><span data-dcnode-id="4501" instrument_node="">
</span><li data-dcnode-id="4496"><span data-dcnode-id="4500" instrument_node="">If errors and inaccuracies are found by the authors after publication of their paper, they need to be promptly communicated to the editors of this journal so that appropriate actions can be taken. Please refer to
our </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/ethics%2316"><span data-dcnode-id="4499" instrument_node="">policy regarding Updating Published Papers</span></a><span data-dcnode-id="4497" instrument_node="">.</span></li><span data-dcnode-id="4495" instrument_node="">
</span><li data-dcnode-id="4490"><span data-dcnode-id="4494" instrument_node="">Your manuscript should not contain any information that has already been published. If you include already published figures or images, please obtain the necessary permission from the copyright holder to publish under the CC-BY license. For further information, see the </span><a data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/rights"><span data-dcnode-id="4493" instrument_node="">Rights and Permissions</span></a><span data-dcnode-id="4491" instrument_node=""> page.</span></li><span data-dcnode-id="4489" instrument_node="">
</span><li data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">Plagiarism, data fabrication and image manipulation are not tolerated. </span></li><span data-dcnode-id="4486" instrument_node="">
</span><ul data-dcnode-id="4458"><li data-dcnode-id="4470"><b data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">Plagiarism is not acceptable</span></b><span data-dcnode-id="4483" instrument_node=""> in </span><em data-dcnode-id="4481"><span data-dcnode-id="4482" instrument_node="">Sports</span></em><span data-dcnode-id="4480" instrument_node=""> submissions.
</span><p data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">Plagiarism includes copying text, ideas, images, or data from another source, even from your own publications, without giving any credit to the original source.</span></p><span data-dcnode-id="4477" instrument_node="">
</span><p data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">Reuse of text that is copied from another source must be between quotes and the original source must be cited. If a study's design or the manuscript's structure or language has been inspired by previous works, these works must be explicitly cited.</span></p><span data-dcnode-id="4474" instrument_node="">
</span><p data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">All MDPI submissions are checked for plagiarism using the industry standard software iThenticate. If plagiarism is detected during the peer review process, the manuscript may be rejected. If plagiarism is detected after publication, an investigation will take place and action taken in accordance with our policies.</span></p><span data-dcnode-id="4471" instrument_node="">
</span></li><li data-dcnode-id="4459"><b data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">Image files must not be manipulated or adjusted in any way</span></b><span data-dcnode-id="4467" instrument_node=""> that could lead to misinterpretation of the information provided by the original image.
</span><br data-dcnode-id="4466"><span data-dcnode-id="4465" instrument_node="">
</span><p data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">Irregular manipulation includes: 1) introduction, enhancement, moving, or removing features from the original image; 2) grouping of images that should obviously be presented separately (e.g., from different parts of the same gel, or from different gels); or 3) modifying the contrast, brightness or color balance to obscure, eliminate or enhance some information.</span></p><span data-dcnode-id="4462" instrument_node="">
</span><p data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">If irregular image manipulation is identified and confirmed during the peer review process, we may reject the manuscript. If irregular image manipulation is identified and confirmed after publication, we may correct or retract the paper.</span></p></li></ul><span data-dcnode-id="4457" instrument_node="">
</span><p data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">Our in-house editors will investigate any allegations of publication misconduct and may contact the authors' institutions or funders if necessary. If evidence of misconduct is found, appropriate action will be taken to correct or retract the publication. Authors are expected to comply with the best ethical publication practices when publishing with MDPI.</span></p></ul><span data-dcnode-id="4453" instrument_node="">
</span><h3 data-dcnode-id="4451"><span data-dcnode-id="4452" instrument_node="">Citation Policy</span></h3><span data-dcnode-id="4450" instrument_node="">
</span><p data-dcnode-id="4448"><span data-dcnode-id="4449" instrument_node="">Authors should ensure that where material is taken from other sources (including their own published writing) the source is clearly cited and that where appropriate permission is obtained. </span></p><span data-dcnode-id="4447" instrument_node="">
</span><p data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">Authors should not engage in excessive self-citation of their own work.</span></p><span data-dcnode-id="4444" instrument_node="">
</span><p data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">Authors should not copy references from other publications if they have not read the cited work.</span></p><span data-dcnode-id="4441" instrument_node="">
</span><p data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">Authors should not preferentially cite their own or their friends’, peers’, or institution’s publications.</span></p><span data-dcnode-id="4438" instrument_node="">
</span><p data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">Authors should not cite advertisements or advertorial material.</span></p><span data-dcnode-id="4435" instrument_node="">
</span><p data-dcnode-id="4430"><span data-dcnode-id="4434" instrument_node="">In accordance with COPE guidelines, we expect that “original wording taken directly from publications by other researchers should appear in quotation marks with the appropriate citations.” This condition also applies to an author’s own work. COPE have produced a discussion document on </span><a data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publicationethics.org/files/COPE_DD_A4_Citation_Manipulation_Jul19_SCREEN_AW2.pdf" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4433" instrument_node="">citation manipulation</span></a><span data-dcnode-id="4431" instrument_node=""> with recommendations for best practice.</span></p><p data-dcnode-id="4427"><a data-dcnode-id="4428" href="#top"><span data-dcnode-id="4429" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4426" instrument_node="">
</span><h2 data-dcnode-id="4423"><a data-dcnode-id="4425" name="referees"></a><span data-dcnode-id="4424" instrument_node="">Reviewer Suggestions</span></h2><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">
</span></p><p data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">During the submission process, please suggest three potential reviewers with the appropriate expertise to review the manuscript. The editors will not necessarily approach these referees. Please provide detailed contact information (address, homepage, phone, e-mail address). The proposed referees should neither be current collaborators of the co-authors nor have published with any of the co-authors of the manuscript within the last five years. Proposed reviewers should be from different institutions to the authors.
You may identify appropriate Editorial Board members of the journal as potential reviewers. You may suggest reviewers from among the authors that you frequently cite in your paper.</span></p><span data-dcnode-id="4417" instrument_node="">
</span><p data-dcnode-id="4414"><a data-dcnode-id="4415" href="#top"><span data-dcnode-id="4416" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4413" instrument_node="">
</span><h2 data-dcnode-id="4410"><a data-dcnode-id="4412" name="english"></a><span data-dcnode-id="4411" instrument_node="">English Corrections</span></h2><span data-dcnode-id="4409" instrument_node="">
</span><p data-dcnode-id="4408"></p><p data-dcnode-id="4403"><span data-dcnode-id="4407" instrument_node="">To facilitate proper peer-reviewing of your manuscript, it is essential that it is submitted in grammatically correct English. Advice on some specific language points can be found </span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/english-editing"><span data-dcnode-id="4406" instrument_node="">here</span></a><span data-dcnode-id="4404" instrument_node="">.</span></p><span data-dcnode-id="4402" instrument_node="">
</span><p data-dcnode-id="4391"><span data-dcnode-id="4401" instrument_node="">If you are not a native English speaker, we recommend that you have your manuscript professionally edited before submission or read by a native English-speaking colleague. This can be carried out by MDPI's </span><a data-dcnode-id="4399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/english"><span data-dcnode-id="4400" instrument_node="">English editing service</span></a><span data-dcnode-id="4398" instrument_node="">. Professional editing will enable reviewers and future readers to more easily read and assess the content of submitted manuscripts. All accepted manuscripts undergo language editing, however </span><strong data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">an additional fee will be charged</span></strong><span data-dcnode-id="4395" instrument_node=""> to authors if very extensive English corrections must be made by the Editorial Office: pricing is according to the service </span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/authors/english"><span data-dcnode-id="4394" instrument_node="">here</span></a><span data-dcnode-id="4392" instrument_node="">.</span></p><span data-dcnode-id="4390" instrument_node="">
</span><p data-dcnode-id="4387"><a data-dcnode-id="4388" href="#top"><span data-dcnode-id="4389" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4386" instrument_node="">
</span><h2 data-dcnode-id="4383"><a data-dcnode-id="4385" name="preprints"></a><span data-dcnode-id="4384" instrument_node=""> Preprints and Conference Papers</span></h2><span data-dcnode-id="4382" instrument_node="">
</span><p data-dcnode-id="4381"></p><p data-dcnode-id="4377"><em data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">Sports</span></em><span data-dcnode-id="4378" instrument_node=""> accepts submissions that have previously been made available as preprints provided
that they have not undergone peer review. A preprint is a draft version of a paper made available online before submission to a journal.</span></p><span data-dcnode-id="4376" instrument_node="">
</span><p data-dcnode-id="4361"><span data-dcnode-id="4375" instrument_node="">MDPI operates </span><a data-dcnode-id="4372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.preprints.org/" rels="noopener noreferrer" target="_blank"><em data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">Preprints</span></em></a><span data-dcnode-id="4371" instrument_node="">, a preprint server to which submitted papers can be uploaded directly after completing journal submission. Note that </span><em data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">Preprints</span></em><span data-dcnode-id="4368" instrument_node=""> operates independently of the journal and posting a preprint does not affect the peer review process. Check the </span><em data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">Preprints</span></em><span data-dcnode-id="4365" instrument_node=""> </span><a data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.preprints.org/instructions_for_authors" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4364" instrument_node="">instructions for authors</span></a><span data-dcnode-id="4362" instrument_node=""> for further information.</span></p><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4355"><span data-dcnode-id="4359" instrument_node="">Expanded and high-quality conference papers can be considered as articles if they fulfill the following requirements: (1) the paper should be expanded to the size of a research article; (2) the conference paper should be cited and noted on the first page of the paper; (3) if the authors do not hold the copyright of the published conference paper, authors should seek the appropriate permission from the copyright holder; (4) authors are asked to disclose that it is conference paper in their cover letter and include a statement on what has been changed compared to the original conference paper. </span><em data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">Sports</span></em><span data-dcnode-id="4356" instrument_node=""> does not publish pilot studies or studies with inadequate statistical power.</span></p><span data-dcnode-id="4354" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4353" instrument_node="">
Unpublished conference papers that do not meet the above conditions are recommended to be submitted to the </span><a data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/about/proceedings"><span data-dcnode-id="4352" instrument_node="">Proceedings Series journals</span></a><span data-dcnode-id="4350" instrument_node="">.</span></p><span data-dcnode-id="4348" instrument_node="">
</span><p data-dcnode-id="4345"><a data-dcnode-id="4346" href="#top"><span data-dcnode-id="4347" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4344" instrument_node="">
</span><h2 data-dcnode-id="4341"><a data-dcnode-id="4343" name="authorship"></a><span data-dcnode-id="4342" instrument_node="">Authorship</span></h2><span data-dcnode-id="4340" instrument_node="">
</span><p data-dcnode-id="4339"></p><p data-dcnode-id="4334"><span data-dcnode-id="4338" instrument_node="">MDPI follows the International Committee of Medical Journal Editors (</span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icmje.org/recommendations/browse/roles-and-responsibilities/defining-the-role-of-authors-and-contributors.html" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4337" instrument_node="">ICMJE</span></a><span data-dcnode-id="4335" instrument_node="">) guidelines which state that, in order to qualify for authorship of a manuscript, the following criteria should be observed:</span></p><span data-dcnode-id="4333" instrument_node="">
</span><ul data-dcnode-id="4319"><span data-dcnode-id="4332" instrument_node="">
</span><li data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">Substantial contributions to the conception or design of the work; or the acquisition, analysis, or interpretation of data for the work; AND</span></li><span data-dcnode-id="4329" instrument_node="">
</span><li data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">Drafting the work or revising it critically for important intellectual content; AND</span></li><span data-dcnode-id="4326" instrument_node="">
</span><li data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">Final approval of the version to be published; AND</span></li><span data-dcnode-id="4323" instrument_node="">
</span><li data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">Agreement to be accountable for all aspects of the work in ensuring that questions related to the accuracy or integrity of any part of the work are appropriately investigated and resolved.</span></li><span data-dcnode-id="4320" instrument_node="">
</span></ul><span data-dcnode-id="4318" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4317" instrument_node="">Those who contributed to the work but do not qualify for authorship should be listed in the acknowledgments. More detailed guidance on authorship is given by the </span><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.icmje.org/recommendations/browse/roles-and-responsibilities/defining-the-role-of-authors-and-contributors.html" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4316" instrument_node="">International Council of Medical Journal Editors (ICMJE)</span></a><span data-dcnode-id="4314" instrument_node="">.</span></p><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Any change to the author list should be approved by all authors including any who have been removed from the list. The corresponding author should act as a point of contact between the editor and the other authors and should keep co-authors informed and involve them in major decisions about the publication. We reserve the right to request confirmation that all authors meet the authorship conditions.</span></p><span data-dcnode-id="4309" instrument_node="">
</span><p data-dcnode-id="4304"><span data-dcnode-id="4308" instrument_node="">For more details about authorship please check </span><a data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/ethics%231"><span data-dcnode-id="4307" instrument_node="">MDPI ethics website</span></a><span data-dcnode-id="4305" instrument_node="">.</span></p><span data-dcnode-id="4303" instrument_node="">
</span><h2 data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">Reviewers Recommendation</span></h2><span data-dcnode-id="4300" instrument_node="">
</span><p data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">Authors can recommend potential reviewers. Journal editors will check to make sure there are no conflicts of interest before contacting those reviewers, and will not consider those with competing interests. Reviewers are asked to declare any conflicts of interest. Authors can also enter the names of potential peer reviewers they wish to exclude from consideration in the peer review of their manuscript, during the initial submission progress. The editorial team will respect these requests so long as this does not interfere with the objective and thorough assessment of the submission.</span></p><span data-dcnode-id="4297" instrument_node="">
</span><h2 data-dcnode-id="4294"><a data-dcnode-id="4296" name="independence"></a><span data-dcnode-id="4295" instrument_node="">Editorial Independence</span></h2><span data-dcnode-id="4293" instrument_node="">
</span><h3 data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">Lack of Interference With Editorial Decisions</span></h3><span data-dcnode-id="4290" instrument_node="">
</span><p data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">Editorial independence is of utmost importance and MDPI does not interfere with editorial decisions. All articles published by MDPI are peer reviewed and assessed by our independent editorial boards, and MDPI staff are not involved in decisions to accept manuscripts. When making an editorial decision, we expect the academic editor to make their decision based only upon:
</span></p><ul data-dcnode-id="4277"><span data-dcnode-id="4287" instrument_node="">
</span><li data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">The suitability of selected reviewers;</span></li><span data-dcnode-id="4284" instrument_node="">
</span><li data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">Adequacy of reviewer comments and author response;</span></li><span data-dcnode-id="4281" instrument_node="">
</span><li data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">Overall scientific quality of the paper.</span></li><span data-dcnode-id="4278" instrument_node="">
</span></ul><span data-dcnode-id="4276" instrument_node="">
</span><p data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node="">In all of our journals, in every aspect of operation, MDPI policies are informed by the mission to make science and research findings open and accessible as widely and rapidly as possible.</span></p><span data-dcnode-id="4273" instrument_node="">
</span><h3 data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Editors and Editorial Staff as Authors</span></h3><span data-dcnode-id="4270" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">Editorial staff or editors shall not be involved in processing their own academic work. Submissions authored by editorial staff/editors will be assigned to at least two independent outside reviewers. Decisions will be made by other Editorial Board Members who do not have a conflict of interest with the author.
Journal staff are not involved in the processing of their own work submitted to any MDPI journals.</span></p><span data-dcnode-id="4267" instrument_node="">
</span><h2 data-dcnode-id="4264"><a data-dcnode-id="4266" name="conflict"></a><span data-dcnode-id="4265" instrument_node="">Conflict of Interests</span></h2><span data-dcnode-id="4263" instrument_node="">
</span><p data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">According to The International Committee of Medical Journal Editors, “Authors should avoid entering into agreements with study sponsors, both for-profit and non-profit, that interfere with authors’ access to all of the study’s data or that interfere with their ability to analyze and interpret the data and to prepare and publish manuscripts independently when and where they choose.” </span></p><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">All authors must disclose all relationships or interests that could inappropriately influence or bias their work. Examples of potential conflicts of interest include but are not limited to financial interests (such as membership, employment, consultancies, stocks/shares ownership, honoraria, grants or other funding, paid expert testimonies and patent-licensing arrangements) and non-financial interests (such as personal or professional relationships, affiliations, personal beliefs). </span></p><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4252"><span data-dcnode-id="4256" instrument_node="">Authors can disclose potential conflicts of interest via the online submission system during the submission process. Declarations regarding conflicts of interest can also be collected via the </span><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mdpi-res.com/data/mdpi-disclosure-form.pdf"><span data-dcnode-id="4255" instrument_node="">MDPI disclosure form</span></a><span data-dcnode-id="4253" instrument_node="">. The corresponding author must include a summary statement in the manuscript in a separate section “Conflicts of Interest” placed just before the reference list. The statement should reflect all the collected potential conflict of interest disclosures in the form. </span></p><span data-dcnode-id="4251" instrument_node="">
</span><p data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">See below for examples of disclosures:</span></p><span data-dcnode-id="4248" instrument_node="">
</span><p data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">Conflicts of Interest: Author A has received research grants from Company A. Author B has received a speaker honorarium from Company X and owns stocks in Company Y. Author C has been involved as a consultant and expert witness in Company Z. Author D is the inventor of patent X.</span></p><span data-dcnode-id="4245" instrument_node="">
</span><p data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">If no conflicts exist, the authors should state:</span></p><span data-dcnode-id="4242" instrument_node="">
</span><p data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">Conflicts of Interest: The authors declare no conflicts of interest.</span></p><span data-dcnode-id="4239" instrument_node="">
</span><p data-dcnode-id="4236"><a data-dcnode-id="4237" href="#top"><span data-dcnode-id="4238" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4235" instrument_node="">
</span><h2 data-dcnode-id="4232"><a data-dcnode-id="4234" name="editorial_procedure"></a><span data-dcnode-id="4233" instrument_node="">Editorial Procedures and Peer-Review</span></h2><span data-dcnode-id="4231" instrument_node="">
</span><p data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">
</span></p><p data-dcnode-id="4225"><a data-dcnode-id="4228" name="initial"></a><em data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Initial Checks</span></em></p><span data-dcnode-id="4224" instrument_node="">
</span><p data-dcnode-id="4207"><span data-dcnode-id="4223" instrument_node="">All submitted manuscripts received by the Editorial Office will be checked by a professional in-house </span><em data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">Managing Editor</span></em><span data-dcnode-id="4220" instrument_node=""> to determine whether they are properly prepared and whether they follow the ethical policies of the journal. Manuscripts that do not fit the journal's ethics policy or do not meet the standards of the journal will be rejected before peer-review. Manuscripts that are not properly prepared will be returned to the authors for revision and resubmission. After these checks, the </span><em data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">Managing Editor</span></em><span data-dcnode-id="4217" instrument_node=""> will consult the journals’ </span><em data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">Editor-in-Chief</span></em><span data-dcnode-id="4214" instrument_node=""> or </span><em data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Associate Editors</span></em><span data-dcnode-id="4211" instrument_node=""> to determine whether the manuscript fits the scope of the journal and whether it is scientifically sound. No judgment on the potential impact of the work will be made at this stage. Reject decisions at this stage will be verified by the </span><em data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">Editor-in-Chief</span></em><span data-dcnode-id="4208" instrument_node="">. </span></p><span data-dcnode-id="4206" instrument_node="">
</span><p data-dcnode-id="4202"><a data-dcnode-id="4205" name="peer"></a><em data-dcnode-id="4203"><span data-dcnode-id="4204" instrument_node="">Peer-Review</span></em></p><span data-dcnode-id="4201" instrument_node="">
</span><p data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">Once a manuscript passes the initial checks, it will be assigned to at least two independent experts for peer-review. A single-blind review is applied, where authors' identities are known to reviewers. Peer review comments are confidential and will only be disclosed with the express agreement of the reviewer.</span></p><span data-dcnode-id="4198" instrument_node="">
</span><p data-dcnode-id="4193"><span data-dcnode-id="4197" instrument_node="">In the case of regular submissions, in-house assistant editors will invite experts, including recommendations by an academic editor. These experts may also include </span><em data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Editorial Board Members</span></em><span data-dcnode-id="4194" instrument_node=""> and Guest Editors of the journal. Potential reviewers suggested by the authors may also be considered. Reviewers should not have published with any of the co-authors during the past five years and should not currently work or collaborate with any of the institutions of the co-authors of the submitted manuscript.</span></p><span data-dcnode-id="4192" instrument_node="">
</span><p data-dcnode-id="4188"><a data-dcnode-id="4191" name="optional"></a><em data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Optional Open Peer-Review</span></em></p><span data-dcnode-id="4187" instrument_node="">
</span><p data-dcnode-id="4176"><span data-dcnode-id="4186" instrument_node="">The journal operates optional open peer-review: </span><em data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">Authors are given the option for all review reports and editorial decisions to be published alongside their manuscript. In addition, reviewers can sign their review, i.e., identify themselves in the published review reports.</span></em><span data-dcnode-id="4183" instrument_node=""> Authors can alter their choice for open review at any time before publication, but once the paper has been published changes will only be made at the discretion of the </span><em data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Publisher</span></em><span data-dcnode-id="4180" instrument_node=""> and </span><em data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">Editor-in-Chief</span></em><span data-dcnode-id="4177" instrument_node="">. We encourage authors to take advantage of this opportunity as proof of the rigorous process employed in publishing their research. To guarantee impartial refereeing, the names of referees will be revealed only if the referees agree to do so, and after a paper has been accepted for publication.</span></p><span data-dcnode-id="4175" instrument_node="">
</span><p data-dcnode-id="4171"><a data-dcnode-id="4174" name="editorial"></a><em data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Editorial Decision and Revision</span></em></p><span data-dcnode-id="4170" instrument_node="">
</span><p data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">All the articles, reviews and communications published in MDPI journals go through the peer-review process and receive at least two reviews. The in-house editor will communicate the decision of the academic editor, which will be one of the following:
</span></p><ul data-dcnode-id="4140"><span data-dcnode-id="4167" instrument_node="">
</span><li data-dcnode-id="4161"><i data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Accept after Minor Revisions</span></i><span data-dcnode-id="4164" instrument_node="">: </span><br data-dcnode-id="4163"><span data-dcnode-id="4162" instrument_node="">The paper is in principle accepted after revision based on the reviewer’s comments. Authors are given five days for minor revisions.</span></li><span data-dcnode-id="4160" instrument_node="">
</span><li data-dcnode-id="4154"><i data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">Reconsider after Major Revisions</span></i><span data-dcnode-id="4157" instrument_node="">: </span><br data-dcnode-id="4156"><span data-dcnode-id="4155" instrument_node="">The acceptance of the manuscript would depend on the revisions. The author needs to provide a point by point response or provide a rebuttal if some of the reviewer’s comments cannot be revised. Usually, only one round of major revisions is allowed. Authors will be asked to resubmit the revised paper within a suitable time frame, and the revised version will be returned to the reviewer for further comments. </span></li><li data-dcnode-id="4148"><i data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">Reject and Encourage Resubmission</span></i><span data-dcnode-id="4151" instrument_node="">: </span><br data-dcnode-id="4150"><span data-dcnode-id="4149" instrument_node="">If additional experiments are needed to support the conclusions, the manuscript will be rejected and the authors will be encouraged to re-submit the paper once further experiments have been conducted.</span></li><span data-dcnode-id="4147" instrument_node="">
</span><li data-dcnode-id="4141"><i data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">Reject</span></i><span data-dcnode-id="4144" instrument_node="">: </span><br data-dcnode-id="4143"><span data-dcnode-id="4142" instrument_node="">The article has serious flaws, and/or makes no original significant contribution. No offer of resubmission to the journal is provided.</span></li></ul><span data-dcnode-id="4139" instrument_node="">
</span><p data-dcnode-id="4138"></p><span data-dcnode-id="4137" instrument_node="">
</span><p data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">All reviewer comments should be responded to in a point-by-point fashion. Where the authors disagree with a reviewer, they must provide a clear response. </span></p><span data-dcnode-id="4134" instrument_node="">
</span><p data-dcnode-id="4130"><a data-dcnode-id="4133" name="author"></a><em data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Author Appeals</span></em></p><span data-dcnode-id="4129" instrument_node="">
</span><p data-dcnode-id="4124"><span data-dcnode-id="4128" instrument_node="">Authors may appeal a rejection by sending an e-mail to the Editorial Office of the journal. The appeal must provide a detailed justification, including point-by-point responses to the reviewers' and/or Editor's comments. The </span><em data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Managing Editor</span></em><span data-dcnode-id="4125" instrument_node=""> of the journal will forward the manuscript and related information (including the identities of the referees) to the Editor-in-Chief, Associate Editor, or Editorial Board member. The academic Editor being consulted will be asked to give an advisory recommendation on the manuscript and may recommend acceptance, further peer-review, or uphold the original rejection decision. A reject decision at this stage is final and cannot be reversed.</span></p><span data-dcnode-id="4123" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4122" instrument_node="">In the case of a special issue, the </span><em data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Managing Editor</span></em><span data-dcnode-id="4119" instrument_node=""> of the journal will forward the manuscript and related information (including the identities of the referees) to the </span><em data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">Editor-in-Chief</span></em><span data-dcnode-id="4116" instrument_node=""> who will be asked to give an advisory recommendation on the manuscript and may recommend acceptance, further peer-review, or uphold the original rejection decision. A reject decision at this stage will be final and cannot be reversed.
</span></p><p data-dcnode-id="4111"><a data-dcnode-id="4114" name="production"></a><em data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Production and Publication</span></em></p><span data-dcnode-id="4110" instrument_node="">
</span><p data-dcnode-id="4105"><span data-dcnode-id="4109" instrument_node="">Once accepted, the manuscript will undergo professional copy-editing, English editing, proofreading by the authors, final corrections, pagination, and, publication on the </span><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/"><span data-dcnode-id="4108" instrument_node="">www.mdpi.com</span></a><span data-dcnode-id="4106" instrument_node=""> website.</span></p><span data-dcnode-id="4104" instrument_node="">
</span><p data-dcnode-id="4101"><a data-dcnode-id="4102" href="#top"><span data-dcnode-id="4103" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4100" instrument_node="">
</span><h2 data-dcnode-id="4097"><a data-dcnode-id="4099" name="equity_diversity_indlusion"></a><span data-dcnode-id="4098" instrument_node="">Promoting Equity, Diversity and Inclusiveness Within MDPI Journals</span></h2><span data-dcnode-id="4096" instrument_node="">
</span><p data-dcnode-id="4095"></p><p data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Our Managing Editors encourage the Editors-in-Chief and Associate Editors to appoint diverse expert Editorial Boards. This is also reflective in our multi-national and inclusive workplace. We are proud to create equal opportunities without regard to gender, ethnicity, sexual orientation, age, religion, or socio-economic status. There is no place for discrimination in our workplace and editors of MDPI journals are to uphold these principles in high regard.</span></p><span data-dcnode-id="4092" instrument_node="">
</span><p data-dcnode-id="4089"><a data-dcnode-id="4090" href="#top"><span data-dcnode-id="4091" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4088" instrument_node="">
</span><p data-dcnode-id="4087"></p><h2 data-dcnode-id="4084"><a data-dcnode-id="4086" name="rii"></a><span data-dcnode-id="4085" instrument_node="">Resource Identification Initiative</span></h2><span data-dcnode-id="4083" instrument_node="">
</span><p data-dcnode-id="4078"><span data-dcnode-id="4082" instrument_node="">To improve the reproducibility of scientific research, the </span><a data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.force11.org/group/resource-identification-initiative" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4081" instrument_node="">Resource Identification Initiative</span></a><span data-dcnode-id="4079" instrument_node=""> aims to provide unique persistent identifiers for key biological resources, including antibodies, cell lines, model organisms and tools.</span></p><span data-dcnode-id="4077" instrument_node="">
</span><p data-dcnode-id="4072"><span data-dcnode-id="4076" instrument_node="">We encourage authors to include unique identifiers - RRIDs- provided by the </span><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scicrunch.org/resources" rel="noopener noreferrer" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4075" instrument_node="">Resource Identification Portal</span></a><span data-dcnode-id="4073" instrument_node=""> in the dedicated section of the manuscript.</span></p><span data-dcnode-id="4071" instrument_node="">
</span><p data-dcnode-id="4066"><span data-dcnode-id="4070" instrument_node="">To help authors quickly find the correct identifiers for their materials, there is a single </span><a class="external" data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scicrunch.org/resources" rels="noopener noreferrer" target="_blank"><span data-dcnode-id="4069" instrument_node="">website</span></a><span data-dcnode-id="4067" instrument_node=""> where all resource types can be found and a ‘cite this’ button next to each resource, that contains a proper citation text that should be included in the methods section of the manuscript.</span></p><span data-dcnode-id="4065" instrument_node="">
</span><p data-dcnode-id="4062"><a data-dcnode-id="4063" href="#top"><span data-dcnode-id="4064" instrument_node="">[Return to top]</span></a></p><span data-dcnode-id="4061" instrument_node="">
