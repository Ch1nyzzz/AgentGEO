</span><h2 data-dcnode-id="5328"><span class="mw-headline" data-dcnode-id="5336" id="Methods"><span data-dcnode-id="5337" instrument_node="">Methods</span></span><span class="mw-editsection" data-dcnode-id="5329"><span class="mw-editsection-bracket" data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">[</span></span><a data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D16" title="Edit section: Methods"><span data-dcnode-id="5333" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5327" instrument_node="">
</span><p data-dcnode-id="5313"><span data-dcnode-id="5326" instrument_node="">Modern cultural anthropology has its origins in, and developed in reaction to, 19th century </span><a data-dcnode-id="5324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnology" title="Ethnology"><span data-dcnode-id="5325" instrument_node="">ethnology</span></a><span data-dcnode-id="5323" instrument_node="">, which involves the organized comparison of human societies. Scholars like </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burnett_Tylor" title="Edward Burnett Tylor"><span data-dcnode-id="5322" instrument_node="">E.B. Tylor</span></a><span data-dcnode-id="5320" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Frazer" title="James Frazer"><span data-dcnode-id="5319" instrument_node="">J.G. Frazer</span></a><span data-dcnode-id="5317" instrument_node=""> in </span><a data-dcnode-id="5315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/England" title="England"><span data-dcnode-id="5316" instrument_node="">England</span></a><span data-dcnode-id="5314" instrument_node=""> worked mostly with materials collected by others—usually missionaries, traders, explorers, or colonial officials—earning them the moniker of "arm-chair anthropologists".
</span></p><span data-dcnode-id="5312" instrument_node="">
</span><h3 data-dcnode-id="5302"><span class="mw-headline" data-dcnode-id="5310" id="Participant_observation"><span data-dcnode-id="5311" instrument_node="">Participant observation</span></span><span class="mw-editsection" data-dcnode-id="5303"><span class="mw-editsection-bracket" data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">[</span></span><a data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D17" title="Edit section: Participant observation"><span data-dcnode-id="5307" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5301" instrument_node="">
</span><link data-dcnode-id="5300" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5296" role="note"><span data-dcnode-id="5299" instrument_node="">Main article: </span><a data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Participant_observation" title="Participant observation"><span data-dcnode-id="5298" instrument_node="">Participant observation</span></a></div><span data-dcnode-id="5295" instrument_node="">
</span><p data-dcnode-id="5266"><span data-dcnode-id="5294" instrument_node="">Participant observation is one of the principal research methods of cultural anthropology. It relies on the assumption that the best way to understand a group of people is to interact with them closely over a long period of time.</span><sup class="reference" data-dcnode-id="5291" id="cite_ref-:4_26-0"><a data-dcnode-id="5292" href="#cite_note-:4-26"><span data-dcnode-id="5293" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5290" instrument_node=""> The method originated in the </span><a class="mw-redirect" data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Field_work" title="Field work"><span data-dcnode-id="5289" instrument_node="">field research</span></a><span data-dcnode-id="5287" instrument_node=""> of social anthropologists, especially Bronislaw Malinowski in Britain, the students of </span><a data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Boas" title="Franz Boas"><span data-dcnode-id="5286" instrument_node="">Franz Boas</span></a><span data-dcnode-id="5284" instrument_node=""> in the United States, and in the later urban research of the </span><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago_school_%28sociology%29" title="Chicago school (sociology)"><span data-dcnode-id="5283" instrument_node="">Chicago School of Sociology</span></a><span data-dcnode-id="5281" instrument_node="">. Historically, the group of people being studied was a small, non-Western society. However, today it may be a specific corporation, a church group, a sports team, or a small town.</span><sup class="reference" data-dcnode-id="5278" id="cite_ref-:4_26-1"><a data-dcnode-id="5279" href="#cite_note-:4-26"><span data-dcnode-id="5280" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5277" instrument_node=""> There are no restrictions as to what the subject of participant observation can be, as long as the group of people is studied intimately by the observing anthropologist over a long period of time. This allows the anthropologist to develop trusting relationships with the subjects of study and receive an inside perspective on the culture, which helps him or her to give a richer description when writing about the culture later. Observable details (like daily time allotment) and more hidden details (like </span><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taboo" title="Taboo"><span data-dcnode-id="5276" instrument_node="">taboo</span></a><span data-dcnode-id="5274" instrument_node=""> behavior) are more easily observed and interpreted over a longer period of time, and researchers can discover discrepancies between what participants say—and often believe—should happen (the </span><a data-dcnode-id="5272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Formal_system" title="Formal system"><span data-dcnode-id="5273" instrument_node="">formal system</span></a><span data-dcnode-id="5271" instrument_node="">) and what actually does happen, or between different aspects of the formal system; in contrast, a one-time survey of people's answers to a set of questions might be quite consistent, but is less likely to show conflicts between different aspects of the social system or between conscious representations and behavior.</span><sup class="reference" data-dcnode-id="5268" id="cite_ref-DeWalt_27-0"><a data-dcnode-id="5269" href="#cite_note-DeWalt-27"><span data-dcnode-id="5270" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5267" instrument_node="">
</span></p><p data-dcnode-id="5249"><span data-dcnode-id="5265" instrument_node="">Interactions between an </span><a data-dcnode-id="5263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnography" title="Ethnography"><span data-dcnode-id="5264" instrument_node="">ethnographer</span></a><span data-dcnode-id="5262" instrument_node=""> and a cultural informant must go both ways.</span><sup class="reference" data-dcnode-id="5259" id="cite_ref-28"><a data-dcnode-id="5260" href="#cite_note-28"><span data-dcnode-id="5261" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5258" instrument_node=""> Just as an ethnographer may be naive or curious about a culture, the members of that culture may be curious about the ethnographer. To establish connections that will eventually lead to a better understanding of the cultural context of a situation, an anthropologist must be open to becoming part of the group, and willing to develop meaningful relationships with its members.</span><sup class="reference" data-dcnode-id="5255" id="cite_ref-:4_26-2"><a data-dcnode-id="5256" href="#cite_note-:4-26"><span data-dcnode-id="5257" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5254" instrument_node=""> One way to do this is to find a small area of common experience between an anthropologist and his or her subjects, and then to expand from this common ground into the larger area of difference.</span><sup class="reference" data-dcnode-id="5251" id="cite_ref-29"><a data-dcnode-id="5252" href="#cite_note-29"><span data-dcnode-id="5253" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5250" instrument_node=""> Once a single connection has been established, it becomes easier to integrate into the community, and more likely that accurate and complete information is being shared with the anthropologist.
</span></p><p data-dcnode-id="5239"><span data-dcnode-id="5248" instrument_node="">Before participant observation can begin, an anthropologist must choose both a location and a focus of study.</span><sup class="reference" data-dcnode-id="5245" id="cite_ref-:4_26-3"><a data-dcnode-id="5246" href="#cite_note-:4-26"><span data-dcnode-id="5247" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5244" instrument_node=""> This focus may change once the anthropologist is actively observing the chosen group of people, but having an idea of what one wants to study before beginning fieldwork allows an anthropologist to spend time researching background information on their topic. It can also be helpful to know what previous research has been conducted in one's chosen location or on similar topics, and if the participant observation takes place in a location where the spoken language is not one the anthropologist is familiar with, he or she will usually also learn that language. This allows the anthropologist to become better established in the community. The lack of need for a translator makes communication more direct, and allows the anthropologist to give a richer, more contextualized representation of what they witness. In addition, participant observation often requires permits from governments and research institutions in the area of study, and always needs some form of funding.</span><sup class="reference" data-dcnode-id="5241" id="cite_ref-:4_26-4"><a data-dcnode-id="5242" href="#cite_note-:4-26"><span data-dcnode-id="5243" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5240" instrument_node="">
</span></p><p data-dcnode-id="5225"><span data-dcnode-id="5238" instrument_node="">The majority of participant observation is based on conversation. This can take the form of casual, friendly dialogue, or can also be a series of more structured interviews. A combination of the two is often used, sometimes along with photography, mapping, artifact collection, and various other methods.</span><sup class="reference" data-dcnode-id="5235" id="cite_ref-:4_26-5"><a data-dcnode-id="5236" href="#cite_note-:4-26"><span data-dcnode-id="5237" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5234" instrument_node=""> In some cases, ethnographers also turn to structured observation, in which an anthropologist's observations are directed by a specific set of questions he or she is trying to answer.</span><sup class="reference" data-dcnode-id="5231" id="cite_ref-:5_30-0"><a data-dcnode-id="5232" href="#cite_note-:5-30"><span data-dcnode-id="5233" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5230" instrument_node=""> In the case of structured observation, an observer might be required to record the order of a series of events, or describe a certain part of the surrounding environment.</span><sup class="reference" data-dcnode-id="5227" id="cite_ref-:5_30-1"><a data-dcnode-id="5228" href="#cite_note-:5-30"><span data-dcnode-id="5229" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5226" instrument_node=""> While the anthropologist still makes an effort to become integrated into the group they are studying, and still participates in the events as they observe, structured observation is more directed and specific than participant observation in general. This helps to standardize the method of study when ethnographic data is being compared across several groups or is needed to fulfill a specific purpose, such as research for a governmental policy decision.
</span></p><p data-dcnode-id="5207"><span data-dcnode-id="5224" instrument_node="">One common criticism of participant observation is its lack of objectivity.</span><sup class="reference" data-dcnode-id="5221" id="cite_ref-:4_26-6"><a data-dcnode-id="5222" href="#cite_note-:4-26"><span data-dcnode-id="5223" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5220" instrument_node=""> Because each anthropologist has his or her own background and set of experiences, each individual is likely to interpret the same culture in a different way. Who the ethnographer is has a lot to do with what he or she will eventually write about a culture, because each researcher is influenced by his or her own perspective.</span><sup class="reference" data-dcnode-id="5217" id="cite_ref-31"><a data-dcnode-id="5218" href="#cite_note-31"><span data-dcnode-id="5219" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5216" instrument_node=""> This is considered a problem especially when anthropologists write in the ethnographic present, a present tense which makes a culture seem stuck in time, and ignores the fact that it may have interacted with other cultures or gradually evolved since the anthropologist made observations.</span><sup class="reference" data-dcnode-id="5213" id="cite_ref-:4_26-7"><a data-dcnode-id="5214" href="#cite_note-:4-26"><span data-dcnode-id="5215" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5212" instrument_node=""> To avoid this, past ethnographers have advocated for strict training, or for anthropologists working in teams. However, these approaches have not generally been successful, and modern ethnographers often choose to include their personal experiences and possible biases in their writing instead.</span><sup class="reference" data-dcnode-id="5209" id="cite_ref-:4_26-8"><a data-dcnode-id="5210" href="#cite_note-:4-26"><span data-dcnode-id="5211" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5208" instrument_node="">
</span></p><p data-dcnode-id="5197"><span data-dcnode-id="5206" instrument_node="">Participant observation has also raised ethical questions, since an anthropologist is in control of what he or she reports about a culture. In terms of representation, an anthropologist has greater power than his or her subjects of study, and this has drawn criticism of participant observation in general.</span><sup class="reference" data-dcnode-id="5203" id="cite_ref-:4_26-9"><a data-dcnode-id="5204" href="#cite_note-:4-26"><span data-dcnode-id="5205" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5202" instrument_node=""> Additionally, anthropologists have struggled with the effect their presence has on a culture. Simply by being present, a researcher causes changes in a culture, and anthropologists continue to question whether or not it is appropriate to influence the cultures they study, or possible to avoid having influence.</span><sup class="reference" data-dcnode-id="5199" id="cite_ref-:4_26-10"><a data-dcnode-id="5200" href="#cite_note-:4-26"><span data-dcnode-id="5201" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5198" instrument_node="">
</span></p><span data-dcnode-id="5196" instrument_node="">
</span><h3 data-dcnode-id="5186"><span class="mw-headline" data-dcnode-id="5194" id="Ethnography"><span data-dcnode-id="5195" instrument_node="">Ethnography</span></span><span class="mw-editsection" data-dcnode-id="5187"><span class="mw-editsection-bracket" data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">[</span></span><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D18" title="Edit section: Ethnography"><span data-dcnode-id="5191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5185" instrument_node="">
</span><link data-dcnode-id="5184" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5180" role="note"><span data-dcnode-id="5183" instrument_node="">Main article: </span><a data-dcnode-id="5181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnography" title="Ethnography"><span data-dcnode-id="5182" instrument_node="">Ethnography</span></a></div><span data-dcnode-id="5179" instrument_node="">
</span><p data-dcnode-id="5171"><span data-dcnode-id="5178" instrument_node="">In the 20th century, most cultural and social anthropologists turned to the crafting of </span><a data-dcnode-id="5176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnography" title="Ethnography"><span data-dcnode-id="5177" instrument_node="">ethnographies</span></a><span data-dcnode-id="5175" instrument_node="">. An ethnography is a piece of writing about a people, at a particular place and time. Typically, the anthropologist lives among people in another society for a period of time, simultaneously </span><a data-dcnode-id="5173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Participant_observation" title="Participant observation"><span data-dcnode-id="5174" instrument_node="">participating in and observing</span></a><span data-dcnode-id="5172" instrument_node=""> the social and cultural life of the group.
</span></p><p data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">Numerous other ethnographic techniques have resulted in ethnographic writing or details being preserved, as cultural anthropologists also curate materials, spend long hours in libraries, churches and schools poring over records, investigate graveyards, and decipher ancient scripts. A typical ethnography will also include information about physical geography, climate and habitat. It is meant to be a holistic piece of writing about the people in question, and today often includes the longest possible timeline of past events that the ethnographer can obtain through primary and secondary research.
</span></p><p data-dcnode-id="5141"><a data-dcnode-id="5167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bronis%25C5%2582aw_Malinowski" title="Bronisław Malinowski"><span data-dcnode-id="5168" instrument_node="">Bronisław Malinowski</span></a><span data-dcnode-id="5166" instrument_node=""> developed the ethnographic method, and </span><a data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Boas" title="Franz Boas"><span data-dcnode-id="5165" instrument_node="">Franz Boas</span></a><span data-dcnode-id="5163" instrument_node=""> taught it in the </span><a data-dcnode-id="5161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="5162" instrument_node="">United States</span></a><span data-dcnode-id="5160" instrument_node="">. Boas' students such as </span><a class="mw-redirect" data-dcnode-id="5158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_L._Kroeber" title="Alfred L. Kroeber"><span data-dcnode-id="5159" instrument_node="">Alfred L. Kroeber</span></a><span data-dcnode-id="5157" instrument_node="">, </span><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_Benedict" title="Ruth Benedict"><span data-dcnode-id="5156" instrument_node="">Ruth Benedict</span></a><span data-dcnode-id="5154" instrument_node=""> and </span><a data-dcnode-id="5152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Mead" title="Margaret Mead"><span data-dcnode-id="5153" instrument_node="">Margaret Mead</span></a><span data-dcnode-id="5151" instrument_node=""> drew on his conception of culture and </span><a data-dcnode-id="5149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_relativism" title="Cultural relativism"><span data-dcnode-id="5150" instrument_node="">cultural relativism</span></a><span data-dcnode-id="5148" instrument_node=""> to develop cultural anthropology in the United States. Simultaneously, Malinowski and </span><a data-dcnode-id="5146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Radcliffe-Brown" title="Alfred Radcliffe-Brown"><span data-dcnode-id="5147" instrument_node="">A.R. Radcliffe Brown</span></a><span data-dcnode-id="5145" instrument_node="">'s students were developing </span><a data-dcnode-id="5143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_anthropology" title="Social anthropology"><span data-dcnode-id="5144" instrument_node="">social anthropology</span></a><span data-dcnode-id="5142" instrument_node=""> in the United Kingdom. Whereas cultural anthropology focused on symbols and values, social anthropology focused on social groups and institutions. Today socio-cultural anthropologists attend to all these elements.
</span></p><p data-dcnode-id="5118"><span data-dcnode-id="5140" instrument_node="">In the early 20th century, socio-cultural anthropology developed in different forms in </span><a data-dcnode-id="5138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="5139" instrument_node="">Europe</span></a><span data-dcnode-id="5137" instrument_node=""> and in the United States. European "social anthropologists" focused on observed social behaviors and on "social structure", that is, on </span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interpersonal_relationship" title="Interpersonal relationship"><span data-dcnode-id="5136" instrument_node="">relationships</span></a><span data-dcnode-id="5134" instrument_node=""> among social </span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Role" title="Role"><span data-dcnode-id="5133" instrument_node="">roles</span></a><span data-dcnode-id="5131" instrument_node=""> (for example, husband and wife, or parent and child) and social </span><a data-dcnode-id="5129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Institution" title="Institution"><span data-dcnode-id="5130" instrument_node="">institutions</span></a><span data-dcnode-id="5128" instrument_node=""> (for example, </span><a data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthropology_of_religion" title="Anthropology of religion"><span data-dcnode-id="5127" instrument_node="">religion</span></a><span data-dcnode-id="5125" instrument_node="">, </span><a data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_anthropology" title="Economic anthropology"><span data-dcnode-id="5124" instrument_node="">economy</span></a><span data-dcnode-id="5122" instrument_node="">, and </span><a data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_anthropology" title="Political anthropology"><span data-dcnode-id="5121" instrument_node="">politics</span></a><span data-dcnode-id="5119" instrument_node="">).
</span></p><p data-dcnode-id="5101"><span data-dcnode-id="5117" instrument_node="">American "cultural anthropologists" focused on the ways people expressed their view of themselves and their world, especially in </span><a data-dcnode-id="5115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Symbol" title="Symbol"><span data-dcnode-id="5116" instrument_node="">symbolic</span></a><span data-dcnode-id="5114" instrument_node=""> forms, such as </span><a data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art" title="Art"><span data-dcnode-id="5113" instrument_node="">art</span></a><span data-dcnode-id="5111" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mythology" title="Mythology"><span data-dcnode-id="5110" instrument_node="">myths</span></a><span data-dcnode-id="5108" instrument_node="">. These two approaches frequently converged and generally complemented one another. For example, </span><a data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kinship" title="Kinship"><span data-dcnode-id="5107" instrument_node="">kinship</span></a><span data-dcnode-id="5105" instrument_node=""> and </span><a data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leadership" title="Leadership"><span data-dcnode-id="5104" instrument_node="">leadership</span></a><span data-dcnode-id="5102" instrument_node=""> function both as symbolic systems and as social institutions. Today almost all socio-cultural anthropologists refer to the work of both sets of predecessors, and have an equal interest in what people do and in what people say.
</span></p><span data-dcnode-id="5100" instrument_node="">
</span><h3 data-dcnode-id="5090"><span class="mw-headline" data-dcnode-id="5098" id="Cross-cultural_comparison"><span data-dcnode-id="5099" instrument_node="">Cross-cultural comparison</span></span><span class="mw-editsection" data-dcnode-id="5091"><span class="mw-editsection-bracket" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">[</span></span><a data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D19" title="Edit section: Cross-cultural comparison"><span data-dcnode-id="5095" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5089" instrument_node="">
</span><p data-dcnode-id="5066"><span data-dcnode-id="5088" instrument_node="">One means by which anthropologists combat ethnocentrism is to engage in the process of cross-cultural comparison. It is important to test so-called "human universals" against the ethnographic record. Monogamy, for example, is frequently touted as a universal human trait, yet comparative study shows that it is not.
The </span><a data-dcnode-id="5086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Relations_Area_Files" title="Human Relations Area Files"><span data-dcnode-id="5087" instrument_node="">Human Relations Area Files</span></a><span data-dcnode-id="5085" instrument_node="">, Inc. (HRAF) is a research agency based at </span><a data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yale_University" title="Yale University"><span data-dcnode-id="5084" instrument_node="">Yale University</span></a><span data-dcnode-id="5082" instrument_node="">. Since 1949, its mission has been to encourage and facilitate worldwide </span><a data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cross-cultural_studies" title="Cross-cultural studies"><span data-dcnode-id="5081" instrument_node="">comparative studies</span></a><span data-dcnode-id="5079" instrument_node=""> of human culture, society, and behavior in the past and present. The name came from the Institute of Human Relations, an interdisciplinary program/building at Yale at the time. The Institute of Human Relations had sponsored HRAF's precursor, the </span><i data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">Cross-Cultural Survey</span></i><span data-dcnode-id="5076" instrument_node=""> (see </span><a class="mw-redirect" data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Peter_Murdock" title="George Peter Murdock"><span data-dcnode-id="5075" instrument_node="">George Peter Murdock</span></a><span data-dcnode-id="5073" instrument_node="">), as part of an effort to develop an integrated science of human behavior and culture. The two eHRAF databases on the Web are expanded and updated annually. </span><i data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">eHRAF World Cultures</span></i><span data-dcnode-id="5070" instrument_node=""> includes materials on cultures, past and present, and covers nearly 400 cultures.  The second database, </span><i data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">eHRAF Archaeology</span></i><span data-dcnode-id="5067" instrument_node="">, covers major archaeological traditions and many more sub-traditions and sites around the world.
</span></p><p data-dcnode-id="5061"><span data-dcnode-id="5065" instrument_node="">Comparison across cultures includies the industrialized (or de-industrialized) West. Cultures in the more traditional </span><a class="mw-redirect" data-dcnode-id="5063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_cross-cultural_sample" title="Standard cross-cultural sample"><span data-dcnode-id="5064" instrument_node="">standard cross-cultural sample</span></a><span data-dcnode-id="5062" instrument_node=""> of small scale societies are:

</span><h3 data-dcnode-id="4228"><span class="mw-headline" data-dcnode-id="4236" id="Multi-sited_ethnography"><span data-dcnode-id="4237" instrument_node="">Multi-sited ethnography</span></span><span class="mw-editsection" data-dcnode-id="4229"><span class="mw-editsection-bracket" data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">[</span></span><a data-dcnode-id="4232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D20" title="Edit section: Multi-sited ethnography"><span data-dcnode-id="4233" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4227" instrument_node="">
</span><p data-dcnode-id="4201"><span data-dcnode-id="4226" instrument_node="">Ethnography dominates socio-cultural anthropology. Nevertheless, many contemporary socio-cultural anthropologists have rejected earlier models of ethnography as treating local cultures as bounded and isolated. These anthropologists continue to concern themselves with the distinct ways people in different locales experience and understand their </span><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_condition" title="Human condition"><span data-dcnode-id="4225" instrument_node="">lives</span></a><span data-dcnode-id="4223" instrument_node="">, but they often argue that one cannot understand these particular ways of life solely from a local perspective; they instead combine a focus on the local with an effort to grasp larger political, economic, and cultural frameworks that impact local lived realities. Notable proponents of this approach include </span><a data-dcnode-id="4221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arjun_Appadurai" title="Arjun Appadurai"><span data-dcnode-id="4222" instrument_node="">Arjun Appadurai</span></a><span data-dcnode-id="4220" instrument_node="">, </span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Clifford_%28historian%29" title="James Clifford (historian)"><span data-dcnode-id="4219" instrument_node="">James Clifford</span></a><span data-dcnode-id="4217" instrument_node="">, </span><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_E._Marcus" title="George E. Marcus"><span data-dcnode-id="4216" instrument_node="">George Marcus</span></a><span data-dcnode-id="4214" instrument_node="">, </span><a data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidney_Mintz" title="Sidney Mintz"><span data-dcnode-id="4213" instrument_node="">Sidney Mintz</span></a><span data-dcnode-id="4211" instrument_node="">, </span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michael_Taussig" title="Michael Taussig"><span data-dcnode-id="4210" instrument_node="">Michael Taussig</span></a><span data-dcnode-id="4208" instrument_node="">, </span><a data-dcnode-id="4206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_Wolf" title="Eric Wolf"><span data-dcnode-id="4207" instrument_node="">Eric Wolf</span></a><span data-dcnode-id="4205" instrument_node=""> and </span><a data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Daus" title="Ronald Daus"><span data-dcnode-id="4204" instrument_node="">Ronald Daus</span></a><span data-dcnode-id="4202" instrument_node="">.
</span></p><p data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">A growing trend in anthropological research and analysis is the use of multi-sited ethnography, discussed in George Marcus' article, "Ethnography In/Of the World System: the Emergence of Multi-Sited Ethnography". Looking at culture as embedded in macro-constructions of a global social order, multi-sited ethnography uses traditional methodology in various locations both spatially and temporally. Through this methodology, greater insight can be gained when examining the impact of world-systems on local and global communities.
</span></p><p data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">Also emerging in multi-sited ethnography are greater interdisciplinary approaches to fieldwork, bringing in methods from cultural studies, media studies, science and technology studies, and others. In multi-sited ethnography, research tracks a subject across spatial and temporal boundaries. For example, a multi-sited ethnography may follow a "thing", such as a particular commodity, as it is transported through the networks of global capitalism.
</span></p><p data-dcnode-id="4189"><span data-dcnode-id="4196" instrument_node="">Multi-sited ethnography may also follow ethnic groups in </span><a data-dcnode-id="4194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diaspora" title="Diaspora"><span data-dcnode-id="4195" instrument_node="">diaspora</span></a><span data-dcnode-id="4193" instrument_node="">, stories or rumours that appear in multiple locations and in multiple time periods, metaphors that appear in multiple ethnographic locations, or the biographies of individual people or groups as they move through space and time. It may also follow conflicts that transcend boundaries. An example of multi-sited ethnography is </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nancy_Scheper-Hughes" title="Nancy Scheper-Hughes"><span data-dcnode-id="4192" instrument_node="">Nancy Scheper-Hughes</span></a><span data-dcnode-id="4190" instrument_node="">' work on the international black market for the trade of human organs. In this research, she follows organs as they are transferred through various legal and illegal networks of capitalism, as well as the rumours and urban legends that circulate in impoverished communities about child kidnapping and organ theft.
</span></p><p data-dcnode-id="4165"><span data-dcnode-id="4188" instrument_node="">Sociocultural anthropologists have increasingly turned their investigative eye on to </span><a data-dcnode-id="4186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_culture" title="Western culture"><span data-dcnode-id="4187" instrument_node="">"Western" culture</span></a><span data-dcnode-id="4185" instrument_node="">. For example, </span><a data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippe_Bourgois" title="Philippe Bourgois"><span data-dcnode-id="4184" instrument_node="">Philippe Bourgois</span></a><span data-dcnode-id="4182" instrument_node=""> won the </span><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Mead_Award" title="Margaret Mead Award"><span data-dcnode-id="4181" instrument_node="">Margaret Mead Award</span></a><span data-dcnode-id="4179" instrument_node=""> in 1997 for </span><i data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">In Search of Respect</span></i><span data-dcnode-id="4176" instrument_node="">, a study of the entrepreneurs in a Harlem crack-den. Also growing more popular are ethnographies of professional communities, such as laboratory researchers, </span><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wall_Street" title="Wall Street"><span data-dcnode-id="4175" instrument_node="">Wall Street</span></a><span data-dcnode-id="4173" instrument_node=""> investors, law firms, or </span><a data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_technology" title="Information technology"><span data-dcnode-id="4172" instrument_node="">information technology</span></a><span data-dcnode-id="4170" instrument_node=""> (IT) computer employees.</span><sup class="reference" data-dcnode-id="4167" id="cite_ref-32"><a data-dcnode-id="4168" href="#cite_note-32"><span data-dcnode-id="4169" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4166" instrument_node="">
</span></p><span data-dcnode-id="4164" instrument_node="">
</span><h2 data-dcnode-id="4154"><span class="mw-headline" data-dcnode-id="4162" id="Topics_in_cultural_anthropology"><span data-dcnode-id="4163" instrument_node="">Topics in cultural anthropology</span></span><span class="mw-editsection" data-dcnode-id="4155"><span class="mw-editsection-bracket" data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">[</span></span><a data-dcnode-id="4158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D21" title="Edit section: Topics in cultural anthropology"><span data-dcnode-id="4159" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4153" instrument_node="">
</span><h3 data-dcnode-id="4143"><span class="mw-headline" data-dcnode-id="4151" id="Kinship_and_family"><span data-dcnode-id="4152" instrument_node="">Kinship and family</span></span><span class="mw-editsection" data-dcnode-id="4144"><span class="mw-editsection-bracket" data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">[</span></span><a data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D22" title="Edit section: Kinship and family"><span data-dcnode-id="4148" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4142" instrument_node="">
</span><link data-dcnode-id="4141" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4137" role="note"><span data-dcnode-id="4140" instrument_node="">Main article: </span><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kinship" title="Kinship"><span data-dcnode-id="4139" instrument_node="">Kinship</span></a></div><span data-dcnode-id="4136" instrument_node="">
</span><p data-dcnode-id="4130"><span data-dcnode-id="4135" instrument_node="">Kinship refers to the anthropological study of the ways in which humans form and maintain relationships with one another, and further, how those relationships operate within and define social organization.</span><sup class="reference" data-dcnode-id="4132" id="cite_ref-:0_33-0"><a data-dcnode-id="4133" href="#cite_note-:0-33"><span data-dcnode-id="4134" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4131" instrument_node="">
</span></p><p data-dcnode-id="4119"><span data-dcnode-id="4129" instrument_node="">
Research in kinship studies often crosses over into different anthropological subfields including </span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medical_anthropology" title="Medical anthropology"><span data-dcnode-id="4128" instrument_node="">medical</span></a><span data-dcnode-id="4126" instrument_node="">, </span><a data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feminist_anthropology" title="Feminist anthropology"><span data-dcnode-id="4125" instrument_node="">feminist</span></a><span data-dcnode-id="4123" instrument_node="">, and </span><a data-dcnode-id="4121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_anthropology" title="Public anthropology"><span data-dcnode-id="4122" instrument_node="">public anthropology</span></a><span data-dcnode-id="4120" instrument_node="">. This is likely due to its fundamental concepts, as articulated by linguistic anthropologist Patrick McConvell: </span></p><blockquote data-dcnode-id="4113"><p data-dcnode-id="4114"><span data-dcnode-id="4118" instrument_node="">Kinship is the bedrock of all human societies that we know. All humans recognize fathers and mothers, sons and daughters, brothers and sisters, uncles and aunts, husbands and wives, grandparents, cousins, and often many more complex types of relationships in the terminologies that they use. That is the matrix into which human children are born in the great majority of cases, and their first words are often kinship terms.</span><sup class="reference" data-dcnode-id="4115" id="cite_ref-34"><a data-dcnode-id="4116" href="#cite_note-34"><span data-dcnode-id="4117" instrument_node="">[34]</span></a></sup></p></blockquote><p data-dcnode-id="4091"><span data-dcnode-id="4112" instrument_node="">Throughout history, kinship studies have primarily focused on the topics of marriage, descent, and procreation.</span><sup class="reference" data-dcnode-id="4109" id="cite_ref-:1_35-0"><a data-dcnode-id="4110" href="#cite_note-:1-35"><span data-dcnode-id="4111" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4108" instrument_node=""> Anthropologists have written extensively on the variations within marriage across cultures and its legitimacy as a human institution. There are stark differences between communities in terms of marital practice and value, leaving much room for anthropological fieldwork. For instance, the </span><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuer_people" title="Nuer people"><span data-dcnode-id="4107" instrument_node="">Nuer</span></a><span data-dcnode-id="4105" instrument_node=""> of Sudan and the Brahmans of Nepal practice </span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polygyny" title="Polygyny"><span data-dcnode-id="4104" instrument_node="">polygyny</span></a><span data-dcnode-id="4102" instrument_node="">, where one man has several marriages to two or more women. The Nyar of India and Nyimba of Tibet and Nepal practice </span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyandry" title="Polyandry"><span data-dcnode-id="4101" instrument_node="">polyandry</span></a><span data-dcnode-id="4099" instrument_node="">, where one woman is often married to two or more men. The marital practice found in most cultures, however, is </span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monogamy" title="Monogamy"><span data-dcnode-id="4098" instrument_node="">monogamy</span></a><span data-dcnode-id="4096" instrument_node="">, where one woman is married to one man. Anthropologists also study different marital taboos across cultures, most commonly the incest taboo of marriage within sibling and parent-child relationships. It has been found that all cultures have an incest taboo to some degree, but the taboo shifts between cultures when the marriage extends beyond the nuclear family unit.</span><sup class="reference" data-dcnode-id="4093" id="cite_ref-:0_33-1"><a data-dcnode-id="4094" href="#cite_note-:0-33"><span data-dcnode-id="4095" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4092" instrument_node="">
</span></p><p data-dcnode-id="4076"><span data-dcnode-id="4090" instrument_node="">There are similar foundational differences where the act of procreation is concerned. Although anthropologists have found that biology is acknowledged in every cultural relationship to procreation, there are differences in the ways in which cultures assess the constructs of parenthood. For example, in the </span><a data-dcnode-id="4088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuyoo_Mixtec" title="Nuyoo Mixtec"><span data-dcnode-id="4089" instrument_node="">Nuyoo</span></a><span data-dcnode-id="4087" instrument_node=""> municipality of </span><a data-dcnode-id="4085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oaxaca" title="Oaxaca"><span data-dcnode-id="4086" instrument_node="">Oaxaca</span></a><span data-dcnode-id="4084" instrument_node="">, </span><a data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico" title="Mexico"><span data-dcnode-id="4083" instrument_node="">Mexico</span></a><span data-dcnode-id="4081" instrument_node="">, it is believed that a child can have partible maternity and partible paternity. In this case, a child would have multiple biological mothers in the case that it is born of one woman and then breastfed by another. A child would have multiple biological fathers in the case that the mother had sex with multiple men, following the commonplace belief in Nuyoo culture that pregnancy must be preceded by sex with multiple men in order have the necessary accumulation of semen.</span><sup class="reference" data-dcnode-id="4078" id="cite_ref-36"><a data-dcnode-id="4079" href="#cite_note-36"><span data-dcnode-id="4080" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4077" instrument_node="">
</span></p><span data-dcnode-id="4075" instrument_node="">
</span><h4 data-dcnode-id="4065"><span class="mw-headline" data-dcnode-id="4073" id="Late_twentieth-century_shifts_in_interest"><span data-dcnode-id="4074" instrument_node="">Late twentieth-century shifts in interest</span></span><span class="mw-editsection" data-dcnode-id="4066"><span class="mw-editsection-bracket" data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">[</span></span><a data-dcnode-id="4069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D23" title="Edit section: Late twentieth-century shifts in interest"><span data-dcnode-id="4070" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4064" instrument_node="">
</span><p data-dcnode-id="4041"><span data-dcnode-id="4063" instrument_node="">In the twenty-first century, Western ideas of kinship have evolved beyond the traditional assumptions of the nuclear family, raising anthropological questions of consanguinity, lineage, and normative marital expectation. The shift can be traced back to the 1960s, with the reassessment of kinship's basic principles offered by </span><a data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmund_Leach" title="Edmund Leach"><span data-dcnode-id="4062" instrument_node="">Edmund Leach</span></a><span data-dcnode-id="4060" instrument_node="">, </span><a data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodney_Needham" title="Rodney Needham"><span data-dcnode-id="4059" instrument_node="">Rodney Neeham</span></a><span data-dcnode-id="4057" instrument_node="">, </span><a data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_M._Schneider" title="David M. Schneider"><span data-dcnode-id="4056" instrument_node="">David Schneider</span></a><span data-dcnode-id="4054" instrument_node="">, and others.</span><sup class="reference" data-dcnode-id="4051" id="cite_ref-:1_35-1"><a data-dcnode-id="4052" href="#cite_note-:1-35"><span data-dcnode-id="4053" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4050" instrument_node=""> Instead of relying on narrow ideas of Western normalcy, kinship studies increasingly catered to "more ethnographic voices, human agency, intersecting power structures, and historical contex".</span><sup class="reference" data-dcnode-id="4047" id="cite_ref-:2_37-0"><a data-dcnode-id="4048" href="#cite_note-:2-37"><span data-dcnode-id="4049" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4046" instrument_node=""> The study of kinship evolved to accommodate for the fact that it cannot be separated from its institutional roots and must pay respect to the society in which it lives, including that society's contradictions, hierarchies, and individual experiences of those within it. This shift was progressed further by the emergence of second-wave feminism in the early 1970s, which introduced ideas of marital oppression, sexual autonomy, and domestic subordination. Other themes that emerged during this time included the frequent comparisons between Eastern and Western kinship systems and the increasing amount of attention paid to anthropologists' own societies, a swift turn from the focus that had traditionally been paid to largely "foreign", non-Western communities.</span><sup class="reference" data-dcnode-id="4043" id="cite_ref-:1_35-2"><a data-dcnode-id="4044" href="#cite_note-:1-35"><span data-dcnode-id="4045" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4042" instrument_node="">
</span></p><p data-dcnode-id="4032"><span data-dcnode-id="4040" instrument_node="">Kinship studies began to gain mainstream recognition in the late 1990s with the surging popularity of feminist anthropology, particularly with its work related to biological anthropology and the intersectional critique of gender relations. At this time, there was the arrival of "</span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postcolonial_feminism" title="Postcolonial feminism"><span data-dcnode-id="4039" instrument_node="">Third World feminism</span></a><span data-dcnode-id="4037" instrument_node="">", a movement that argued kinship studies could not examine the gender relations of developing countries in isolation, and must pay respect to racial and economic nuance as well. This critique became relevant, for instance, in the anthropological study of Jamaica: race and class were seen as the primary obstacles to Jamaican liberation from economic imperialism, and gender as an identity was largely ignored. Third World feminism aimed to combat this in the early twenty-first century by promoting these categories as coexisting factors. In Jamaica, marriage as an institution is often substituted for a series of partners, as poor women cannot rely on regular financial contributions in a climate of economic instability. In addition, there is a common practice of Jamaican women artificially lightening their skin tones in order to secure economic survival. These anthropological findings, according to Third World feminism, cannot see gender, racial, or class differences as separate entities, and instead must acknowledge that they interact together to produce unique individual experiences.</span><sup class="reference" data-dcnode-id="4034" id="cite_ref-:2_37-1"><a data-dcnode-id="4035" href="#cite_note-:2-37"><span data-dcnode-id="4036" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4033" instrument_node="">
</span></p><span data-dcnode-id="4031" instrument_node="">
</span><h4 data-dcnode-id="4021"><span class="mw-headline" data-dcnode-id="4029" id="Rise_of_reproductive_anthropology"><span data-dcnode-id="4030" instrument_node="">Rise of reproductive anthropology</span></span><span class="mw-editsection" data-dcnode-id="4022"><span class="mw-editsection-bracket" data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">[</span></span><a data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D24" title="Edit section: Rise of reproductive anthropology"><span data-dcnode-id="4026" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4020" instrument_node="">
</span><p data-dcnode-id="3993"><span data-dcnode-id="4019" instrument_node="">Kinship studies have also experienced a rise in the interest of reproductive anthropology with the advancement of </span><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assisted_reproductive_technology" title="Assisted reproductive technology"><span data-dcnode-id="4018" instrument_node="">assisted reproductive technologies</span></a><span data-dcnode-id="4016" instrument_node=""> (ARTs), including </span><a data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_vitro_fertilisation" title="In vitro fertilisation"><span data-dcnode-id="4015" instrument_node="">in vitro fertilization</span></a><span data-dcnode-id="4013" instrument_node=""> (IVF). These advancements have led to new dimensions of anthropological research, as they challenge the Western standard of biogenetically based kinship, relatedness, and parenthood. According to anthropologists </span><a data-dcnode-id="4011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marcia_C._Inhorn" title="Marcia C. Inhorn"><span data-dcnode-id="4012" instrument_node="">Maria C. Inhorn</span></a><span data-dcnode-id="4010" instrument_node=""> and Daphna Birenbaum-Carmeli, "ARTs have pluralized notions of relatedness and led to a more dynamic notion of "kinning" namely, kinship as a process, as something under construction, rather than a natural given".</span><sup class="reference" data-dcnode-id="4007" id="cite_ref-:3_38-0"><a data-dcnode-id="4008" href="#cite_note-:3-38"><span data-dcnode-id="4009" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4006" instrument_node=""> With this technology, questions of kinship have emerged over the difference between biological and genetic relatedness, as gestational surrogates can provide a biological environment for the embryo while the genetic ties remain with a third party.</span><sup class="reference" data-dcnode-id="4003" id="cite_ref-39"><a data-dcnode-id="4004" href="#cite_note-39"><span data-dcnode-id="4005" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4002" instrument_node=""> If genetic, surrogate, and adoptive maternities are involved, anthropologists have acknowledged that there can be the possibility for three "biological" mothers to a single child.</span><sup class="reference" data-dcnode-id="3999" id="cite_ref-:3_38-1"><a data-dcnode-id="4000" href="#cite_note-:3-38"><span data-dcnode-id="4001" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3998" instrument_node=""> With ARTs, there are also anthropological questions concerning the intersections between wealth and fertility: ARTs are generally only available to those in the highest income bracket, meaning the infertile poor are inherently devalued in the system. There have also been issues of reproductive tourism and bodily commodification, as individuals seek economic security through hormonal stimulation and egg harvesting, which are potentially harmful procedures. With IVF, specifically, there have been many questions of embryotic value and the status of life, particularly as it relates to the manufacturing of stem cells, testing, and research.</span><sup class="reference" data-dcnode-id="3995" id="cite_ref-:3_38-2"><a data-dcnode-id="3996" href="#cite_note-:3-38"><span data-dcnode-id="3997" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3994" instrument_node="">
</span></p><p data-dcnode-id="3983"><span data-dcnode-id="3992" instrument_node="">Current issues in kinship studies, such as adoption, have revealed and challenged the Western cultural disposition towards the genetic, "blood" tie.</span><sup class="reference" data-dcnode-id="3989" id="cite_ref-40"><a data-dcnode-id="3990" href="#cite_note-40"><span data-dcnode-id="3991" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3988" instrument_node=""> Western biases against single parent homes have also been explored through similar anthropological research, uncovering that a household with a single parent experiences "greater levels of scrutiny and [is] routinely seen as the 'other' of the nuclear, patriarchal family".</span><sup class="reference" data-dcnode-id="3985" id="cite_ref-41"><a data-dcnode-id="3986" href="#cite_note-41"><span data-dcnode-id="3987" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3984" instrument_node=""> The power dynamics in reproduction, when explored through a comparative analysis of "conventional" and "unconventional" families, have been used to dissect the Western assumptions of child bearing and child rearing in contemporary kinship studies.
</span></p><span data-dcnode-id="3982" instrument_node="">
</span><h4 data-dcnode-id="3972"><span class="mw-headline" data-dcnode-id="3980" id="Critiques_of_kinship_studies"><span data-dcnode-id="3981" instrument_node="">Critiques of kinship studies</span></span><span class="mw-editsection" data-dcnode-id="3973"><span class="mw-editsection-bracket" data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">[</span></span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D25" title="Edit section: Critiques of kinship studies"><span data-dcnode-id="3977" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3948"><span data-dcnode-id="3970" instrument_node="">Kinship, as an anthropological field of inquiry, has been heavily criticized across the discipline. One critique is that, as its inception, the framework of kinship studies was far too structured and formulaic, relying on dense language and stringent rules.</span><sup class="reference" data-dcnode-id="3967" id="cite_ref-:2_37-2"><a data-dcnode-id="3968" href="#cite_note-:2-37"><span data-dcnode-id="3969" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3966" instrument_node=""> Another critique, explored at length by American anthropologist David Schneider, argues that kinship has been limited by its inherent Western </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnocentrism" title="Ethnocentrism"><span data-dcnode-id="3965" instrument_node="">ethnocentrism</span></a><span data-dcnode-id="3963" instrument_node="">. Schneider proposes that kinship is not a field that can be applied cross-culturally, as the theory itself relies on European assumptions of normalcy. He states in the widely circulated 1984 book </span><i data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">A critique of the study of kinship</span></i><span data-dcnode-id="3960" instrument_node=""> that "[K]inship has been defined by European social scientists, and European social scientists use their own folk culture as the source of many, if not all of their ways of formulating and understanding the world about them".</span><sup class="reference" data-dcnode-id="3957" id="cite_ref-42"><a data-dcnode-id="3958" href="#cite_note-42"><span data-dcnode-id="3959" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3956" instrument_node=""> However, this critique has been challenged by the argument that it is linguistics, not cultural divergence, that has allowed for a European bias, and that the bias can be lifted by centering the methodology on fundamental human concepts. Polish anthropologist </span><a data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anna_Wierzbicka" title="Anna Wierzbicka"><span data-dcnode-id="3955" instrument_node="">Anna Wierzbicka</span></a><span data-dcnode-id="3953" instrument_node=""> argues that "mother" and "father" are examples of such fundamental human concepts, and can only be Westernized when conflated with English concepts such as "parent" and "sibling".</span><sup class="reference" data-dcnode-id="3950" id="cite_ref-43"><a data-dcnode-id="3951" href="#cite_note-43"><span data-dcnode-id="3952" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3949" instrument_node="">
</span></p><p data-dcnode-id="3939"><span data-dcnode-id="3947" instrument_node="">A more recent critique of kinship studies is its solipsistic focus on privileged, Western human relations and its promotion of normative ideals of human exceptionalism. In </span><i data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Critical Kinship Studies</span></i><span data-dcnode-id="3944" instrument_node="">, social psychologists Elizabeth Peel and Damien Riggs argue for a move beyond this human-centered framework, opting instead to explore kinship through a "posthumanist" vantage point where anthropologists focus on the intersecting relationships of human animals, non-human animals, technologies and practices.</span><sup class="reference" data-dcnode-id="3941" id="cite_ref-44"><a data-dcnode-id="3942" href="#cite_note-44"><span data-dcnode-id="3943" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3940" instrument_node="">
</span></p><span data-dcnode-id="3938" instrument_node="">
</span><h3 data-dcnode-id="3928"><span class="mw-headline" data-dcnode-id="3936" id="Institutional_anthropology"><span data-dcnode-id="3937" instrument_node="">Institutional anthropology</span></span><span class="mw-editsection" data-dcnode-id="3929"><span class="mw-editsection-bracket" data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">[</span></span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D26" title="Edit section: Institutional anthropology"><span data-dcnode-id="3933" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3927" instrument_node="">
</span><p data-dcnode-id="3909"><span data-dcnode-id="3926" instrument_node="">The role of anthropology in institutions has expanded significantly since the end of the 20th century.</span><sup class="reference" data-dcnode-id="3923" id="cite_ref-:02_45-0"><a data-dcnode-id="3924" href="#cite_note-:02-45"><span data-dcnode-id="3925" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3922" instrument_node=""> Much of this development can be attributed to the rise in anthropologists working outside of academia and the increasing importance of globalization in both institutions and the field of anthropology.</span><sup class="reference" data-dcnode-id="3919" id="cite_ref-:02_45-1"><a data-dcnode-id="3920" href="#cite_note-:02-45"><span data-dcnode-id="3921" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3918" instrument_node=""> Anthropologists can be employed by institutions such as for-profit business, nonprofit organizations, and governments.</span><sup class="reference" data-dcnode-id="3915" id="cite_ref-:02_45-2"><a data-dcnode-id="3916" href="#cite_note-:02-45"><span data-dcnode-id="3917" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3914" instrument_node=""> For instance, cultural anthropologists are commonly employed by the United States federal government.</span><sup class="reference" data-dcnode-id="3911" id="cite_ref-:02_45-3"><a data-dcnode-id="3912" href="#cite_note-:02-45"><span data-dcnode-id="3913" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3910" instrument_node="">
</span></p><p data-dcnode-id="3868"><span data-dcnode-id="3908" instrument_node="">The two types of institutions defined in the field of anthropology are total institutions and social institutions.</span><sup class="reference" data-dcnode-id="3905" id="cite_ref-:12_46-0"><a data-dcnode-id="3906" href="#cite_note-:12-46"><span data-dcnode-id="3907" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3904" instrument_node=""> Total institutions are places that comprehensively coordinate the actions of people within them, and examples of total institutions include prisons, convents, and hospitals.</span><sup class="reference" data-dcnode-id="3901" id="cite_ref-:12_46-1"><a data-dcnode-id="3902" href="#cite_note-:12-46"><span data-dcnode-id="3903" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3900" instrument_node=""> Social institutions, on the other hand, are constructs that regulate individuals' day-to-day lives, such as kinship, religion, and economics.</span><sup class="reference" data-dcnode-id="3897" id="cite_ref-:12_46-2"><a data-dcnode-id="3898" href="#cite_note-:12-46"><span data-dcnode-id="3899" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3896" instrument_node=""> Anthropology of institutions may analyze labor unions, businesses ranging from small enterprises to corporations, government, medical organizations,</span><sup class="reference" data-dcnode-id="3893" id="cite_ref-:02_45-4"><a data-dcnode-id="3894" href="#cite_note-:02-45"><span data-dcnode-id="3895" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3892" instrument_node=""> education,</span><sup class="reference" data-dcnode-id="3889" id="cite_ref-Magolda_24–46_6-1"><a data-dcnode-id="3890" href="#cite_note-Magolda_24%E2%80%9346-6"><span data-dcnode-id="3891" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3888" instrument_node=""> prisons,</span><sup class="reference" data-dcnode-id="3885" id="cite_ref-Cunha_2014_217–233_2-1"><a data-dcnode-id="3886" href="#cite_note-Cunha_2014_217%E2%80%93233-2"><span data-dcnode-id="3887" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="3882" id="cite_ref-Rhodes_2001_4-1"><a data-dcnode-id="3883" href="#cite_note-Rhodes_2001-4"><span data-dcnode-id="3884" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3881" instrument_node=""> and financial institutions.</span><sup class="reference" data-dcnode-id="3878" id="cite_ref-Ho_2009_739–747_13-1"><a data-dcnode-id="3879" href="#cite_note-Ho_2009_739%E2%80%93747-13"><span data-dcnode-id="3880" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3877" instrument_node=""> Nongovernmental organizations have garnered particular interest in the field of institutional anthropology because they are capable of fulfilling roles previously ignored by governments,</span><sup class="reference" data-dcnode-id="3874" id="cite_ref-47"><a data-dcnode-id="3875" href="#cite_note-47"><span data-dcnode-id="3876" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3873" instrument_node=""> or previously realized by families or local groups, in an attempt to mitigate social problems.</span><sup class="reference" data-dcnode-id="3870" id="cite_ref-:02_45-5"><a data-dcnode-id="3871" href="#cite_note-:02-45"><span data-dcnode-id="3872" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3869" instrument_node="">
</span></p><p data-dcnode-id="3846"><span data-dcnode-id="3867" instrument_node="">The types and methods of scholarship performed in the anthropology of institutions can take a number of forms. Institutional anthropologists may study the relationship between organizations or between an organization and other parts of society.</span><sup class="reference" data-dcnode-id="3864" id="cite_ref-:02_45-6"><a data-dcnode-id="3865" href="#cite_note-:02-45"><span data-dcnode-id="3866" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3863" instrument_node=""> Institutional anthropology may also focus on the inner workings of an institution, such as the relationships, hierarchies and cultures formed,</span><sup class="reference" data-dcnode-id="3860" id="cite_ref-:02_45-7"><a data-dcnode-id="3861" href="#cite_note-:02-45"><span data-dcnode-id="3862" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3859" instrument_node=""> and the ways that these elements are transmitted and maintained, transformed, or abandoned over time.</span><sup class="reference" data-dcnode-id="3856" id="cite_ref-:22_48-0"><a data-dcnode-id="3857" href="#cite_note-:22-48"><span data-dcnode-id="3858" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3855" instrument_node=""> Additionally, some anthropology of institutions examines the specific design of institutions and their corresponding strength.</span><sup class="reference" data-dcnode-id="3852" id="cite_ref-Levitsky_2009_115–133_9-1"><a data-dcnode-id="3853" href="#cite_note-Levitsky_2009_115%E2%80%93133-9"><span data-dcnode-id="3854" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3851" instrument_node=""> More specifically, anthropologists may analyze specific events within an institution, perform semiotic investigations, or analyze the mechanisms by which knowledge and culture are organized and dispersed.</span><sup class="reference" data-dcnode-id="3848" id="cite_ref-:02_45-8"><a data-dcnode-id="3849" href="#cite_note-:02-45"><span data-dcnode-id="3850" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3847" instrument_node="">
</span></p><p data-dcnode-id="3836"><span data-dcnode-id="3845" instrument_node="">In all manifestations of institutional anthropology, participant observation is critical to understanding the intricacies of the way an institution works and the consequences of actions taken by individuals within it.</span><sup class="reference" data-dcnode-id="3842" id="cite_ref-:32_49-0"><a data-dcnode-id="3843" href="#cite_note-:32-49"><span data-dcnode-id="3844" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3841" instrument_node=""> Simultaneously, anthropology of institutions extends beyond examination of the commonplace involvement of individuals in institutions to discover how and why the organizational principles evolved in the manner that they did.</span><sup class="reference" data-dcnode-id="3838" id="cite_ref-:22_48-1"><a data-dcnode-id="3839" href="#cite_note-:22-48"><span data-dcnode-id="3840" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3837" instrument_node="">
</span></p><p data-dcnode-id="3822"><span data-dcnode-id="3835" instrument_node="">Common considerations taken by anthropologists in studying institutions include the physical location at which a researcher places themselves, as important interactions often take place in private, and the fact that the members of an institution are often being examined in their workplace and may not have much idle time to discuss the details of their everyday endeavors.</span><sup class="reference" data-dcnode-id="3832" id="cite_ref-:42_50-0"><a data-dcnode-id="3833" href="#cite_note-:42-50"><span data-dcnode-id="3834" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3831" instrument_node=""> The ability of individuals to present the workings of an institution in a particular light or frame must additionally be taken into account when using interviews and document analysis to understand an institution,</span><sup class="reference" data-dcnode-id="3828" id="cite_ref-:32_49-1"><a data-dcnode-id="3829" href="#cite_note-:32-49"><span data-dcnode-id="3830" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3827" instrument_node=""> as the involvement of an anthropologist may be met with distrust when information being released to the public is not directly controlled by the institution and could potentially be damaging.</span><sup class="reference" data-dcnode-id="3824" id="cite_ref-:42_50-1"><a data-dcnode-id="3825" href="#cite_note-:42-50"><span data-dcnode-id="3826" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3823" instrument_node="">
</span></p><span data-dcnode-id="3821" instrument_node="">
