</span></div><span data-dcnode-id="5957" instrument_node="">
</span><h3 data-dcnode-id="5947"><span class="mw-headline" data-dcnode-id="5955" id="Comparison_with_social_anthropology"><span data-dcnode-id="5956" instrument_node="">Comparison with social anthropology</span></span><span class="mw-editsection" data-dcnode-id="5948"><span class="mw-editsection-bracket" data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">[</span></span><a data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D7" title="Edit section: Comparison with social anthropology"><span data-dcnode-id="5952" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5946" instrument_node="">
</span><p data-dcnode-id="5928"><span data-dcnode-id="5945" instrument_node="">The rubric </span><i data-dcnode-id="5943"><span data-dcnode-id="5944" instrument_node="">cultural</span></i><span data-dcnode-id="5942" instrument_node=""> anthropology is generally applied to </span><a class="mw-redirect" data-dcnode-id="5940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnographic" title="Ethnographic"><span data-dcnode-id="5941" instrument_node="">ethnographic</span></a><span data-dcnode-id="5939" instrument_node=""> works that are holistic in approach, are oriented to the ways in which </span><a data-dcnode-id="5937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture" title="Culture"><span data-dcnode-id="5938" instrument_node="">culture</span></a><span data-dcnode-id="5936" instrument_node=""> affects individual experience, or aim to provide a rounded view of the knowledge, customs, and institutions of a people. </span><i data-dcnode-id="5934"><span data-dcnode-id="5935" instrument_node="">Social</span></i><span data-dcnode-id="5933" instrument_node=""> anthropology is a term applied to ethnographic works that attempt to isolate a particular system of social relations such as those that comprise domestic life, economy, law, politics, or religion, give analytical priority to the organizational bases of social life, and attend to cultural phenomena as somewhat secondary to the main issues of social scientific inquiry.</span><sup class="reference" data-dcnode-id="5930" id="cite_ref-12"><a data-dcnode-id="5931" href="#cite_note-12"><span data-dcnode-id="5932" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5929" instrument_node="">
</span></p><p data-dcnode-id="5922"><span data-dcnode-id="5927" instrument_node="">Parallel with the rise of cultural anthropology in the United States, social anthropology developed as an academic discipline in Britain and in France.</span><sup class="reference" data-dcnode-id="5924" id="cite_ref-Ho_2009_739–747_13-0"><a data-dcnode-id="5925" href="#cite_note-Ho_2009_739%E2%80%93747-13"><span data-dcnode-id="5926" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5923" instrument_node="">
</span></p><span data-dcnode-id="5921" instrument_node="">
</span><h2 data-dcnode-id="5911"><span class="mw-headline" data-dcnode-id="5919" id="Foundational_thinkers"><span data-dcnode-id="5920" instrument_node="">Foundational thinkers</span></span><span class="mw-editsection" data-dcnode-id="5912"><span class="mw-editsection-bracket" data-dcnode-id="5917"><span data-dcnode-id="5918" instrument_node="">[</span></span><a data-dcnode-id="5915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D8" title="Edit section: Foundational thinkers"><span data-dcnode-id="5916" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5910" instrument_node="">
</span><h3 data-dcnode-id="5900"><span class="mw-headline" data-dcnode-id="5908" id="Lewis_Henry_Morgan"><span data-dcnode-id="5909" instrument_node="">Lewis Henry Morgan</span></span><span class="mw-editsection" data-dcnode-id="5901"><span class="mw-editsection-bracket" data-dcnode-id="5906"><span data-dcnode-id="5907" instrument_node="">[</span></span><a data-dcnode-id="5904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D9" title="Edit section: Lewis Henry Morgan"><span data-dcnode-id="5905" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5899" instrument_node="">
</span><p data-dcnode-id="5874"><a class="mw-redirect" data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Henry_Morgan" title="Lewis Henry Morgan"><span data-dcnode-id="5898" instrument_node="">Lewis Henry Morgan</span></a><span data-dcnode-id="5896" instrument_node=""> (1818–1881), a lawyer from </span><a data-dcnode-id="5894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rochester%2C_New_York" title="Rochester, New York"><span data-dcnode-id="5895" instrument_node="">Rochester</span></a><span data-dcnode-id="5893" instrument_node="">, </span><a data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_%28state%29" title="New York (state)"><span data-dcnode-id="5892" instrument_node="">New York</span></a><span data-dcnode-id="5890" instrument_node="">, became an advocate for and ethnological scholar of the </span><a data-dcnode-id="5888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iroquois" title="Iroquois"><span data-dcnode-id="5889" instrument_node="">Iroquois</span></a><span data-dcnode-id="5887" instrument_node="">. His comparative analyses of religion, government, material culture, and especially kinship patterns proved to be influential contributions to the field of anthropology. Like other scholars of his day (such as </span><a class="mw-redirect" data-dcnode-id="5885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Tylor" title="Edward Tylor"><span data-dcnode-id="5886" instrument_node="">Edward Tylor</span></a><span data-dcnode-id="5884" instrument_node="">), Morgan argued that human societies could be classified into categories of cultural evolution on a scale of progression that ranged from </span><i data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">savagery</span></i><span data-dcnode-id="5881" instrument_node="">, to </span><i data-dcnode-id="5879"><span data-dcnode-id="5880" instrument_node="">barbarism</span></i><span data-dcnode-id="5878" instrument_node="">, to </span><i data-dcnode-id="5876"><span data-dcnode-id="5877" instrument_node="">civilization</span></i><span data-dcnode-id="5875" instrument_node="">. Generally, Morgan used technology (such as bowmaking or pottery) as an indicator of position on this scale.
</span></p><span data-dcnode-id="5873" instrument_node="">
</span><h3 data-dcnode-id="5862"><span data-dcnode-id="5872" id="Franz_Boas.2C_founder_of_the_modern_discipline"></span><span class="mw-headline" data-dcnode-id="5870" id="Franz_Boas,_founder_of_the_modern_discipline"><span data-dcnode-id="5871" instrument_node="">Franz Boas, founder of the modern discipline</span></span><span class="mw-editsection" data-dcnode-id="5863"><span class="mw-editsection-bracket" data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">[</span></span><a data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D10" title="Edit section: Franz Boas, founder of the modern discipline"><span data-dcnode-id="5867" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5861" instrument_node="">
</span><link data-dcnode-id="5860" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5856" role="note"><span data-dcnode-id="5859" instrument_node="">Main article: </span><a data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boasian_anthropology" title="Boasian anthropology"><span data-dcnode-id="5858" instrument_node="">Boasian anthropology</span></a></div><span data-dcnode-id="5855" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5844"><div class="thumbinner" data-dcnode-id="5845" style="width:222px;"><a class="image" data-dcnode-id="5853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFranzBoas.jpg"><img alt="" class="thumbimage" data-dcnode-id="5854" data-file-height="554" data-file-width="442" decoding="async" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/62/FranzBoas.jpg/220px-FranzBoas.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/62/FranzBoas.jpg/330px-FranzBoas.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/62/FranzBoas.jpg/440px-FranzBoas.jpg 2x" width="220"></a><span data-dcnode-id="5852" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5846"><div class="magnify" data-dcnode-id="5850"><a class="internal" data-dcnode-id="5851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFranzBoas.jpg" title="Enlarge"></a></div><a data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Boas" title="Franz Boas"><span data-dcnode-id="5849" instrument_node="">Franz Boas</span></a><span data-dcnode-id="5847" instrument_node=""> (1858–1942), one of the pioneers of modern anthropology, often called the "Father of American Anthropology"</span></div></div></div><span data-dcnode-id="5843" instrument_node="">
</span><p data-dcnode-id="5839"><a data-dcnode-id="5841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Boas" title="Franz Boas"><span data-dcnode-id="5842" instrument_node="">Franz Boas</span></a><span data-dcnode-id="5840" instrument_node=""> (1858–1942) established academic anthropology in the United States in opposition to Morgan's evolutionary perspective. His approach was empirical, skeptical of overgeneralizations, and eschewed attempts to establish universal laws. For example, Boas studied immigrant children to demonstrate that biological race was not immutable, and that human conduct and behavior resulted from nurture, rather than nature.
</span></p><p data-dcnode-id="5831"><span data-dcnode-id="5838" instrument_node="">Influenced by the German tradition, Boas argued that the world was full of distinct </span><i data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">cultures,</span></i><span data-dcnode-id="5835" instrument_node=""> rather than societies whose evolution could be measured by how much or how little "civilization" they had. He believed that each culture has to be studied in its particularity, and argued that cross-cultural generalizations, like those made in the </span><a data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_science" title="Natural science"><span data-dcnode-id="5834" instrument_node="">natural sciences</span></a><span data-dcnode-id="5832" instrument_node="">, were not possible.
</span></p><p data-dcnode-id="5825"><span data-dcnode-id="5830" instrument_node="">In doing so, he fought discrimination against immigrants, blacks, and indigenous peoples of the Americas.</span><sup class="reference" data-dcnode-id="5827" id="cite_ref-14"><a data-dcnode-id="5828" href="#cite_note-14"><span data-dcnode-id="5829" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5826" instrument_node=""> Many American anthropologists adopted his agenda for social reform, and theories of race continue to be popular subjects for anthropologists today. The so-called "Four Field Approach" has its origins in Boasian Anthropology, dividing the discipline in the four crucial and interrelated fields of sociocultural, biological, linguistic, and archaic anthropology (e.g. archaeology). Anthropology in the United States continues to be deeply influenced by the Boasian tradition, especially its emphasis on culture.
</span></p><span data-dcnode-id="5824" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5813"><div class="thumbinner" data-dcnode-id="5814" style="width:222px;"><a class="image" data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMargaret_Mead_%281901-1978%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5823" data-file-height="1756" data-file-width="1419" decoding="async" height="272" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/99/Margaret_Mead_%25281901-1978%2529.jpg/220px-Margaret_Mead_%25281901-1978%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/99/Margaret_Mead_%281901-1978%29.jpg/330px-Margaret_Mead_%281901-1978%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/99/Margaret_Mead_%281901-1978%29.jpg/440px-Margaret_Mead_%281901-1978%29.jpg 2x" width="220"></a><span data-dcnode-id="5821" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5815"><div class="magnify" data-dcnode-id="5819"><a class="internal" data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMargaret_Mead_%281901-1978%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Mead" title="Margaret Mead"><span data-dcnode-id="5818" instrument_node="">Margaret Mead</span></a><span data-dcnode-id="5816" instrument_node=""> (1901–1978)</span></div></div></div><span data-dcnode-id="5812" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5801"><div class="thumbinner" data-dcnode-id="5802" style="width:222px;"><a class="image" data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARuth_Benedict.jpg"><img alt="" class="thumbimage" data-dcnode-id="5811" data-file-height="2636" data-file-width="2108" decoding="async" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Ruth_Benedict.jpg/220px-Ruth_Benedict.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Ruth_Benedict.jpg/330px-Ruth_Benedict.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/93/Ruth_Benedict.jpg/440px-Ruth_Benedict.jpg 2x" width="220"></a><span data-dcnode-id="5809" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5803"><div class="magnify" data-dcnode-id="5807"><a class="internal" data-dcnode-id="5808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARuth_Benedict.jpg" title="Enlarge"></a></div><a data-dcnode-id="5805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_Benedict" title="Ruth Benedict"><span data-dcnode-id="5806" instrument_node="">Ruth Benedict</span></a><span data-dcnode-id="5804" instrument_node=""> in 1937</span></div></div></div><span data-dcnode-id="5800" instrument_node="">
</span><h3 data-dcnode-id="5789"><span data-dcnode-id="5799" id="Kroeber.2C_Mead.2C_and_Benedict"></span><span class="mw-headline" data-dcnode-id="5797" id="Kroeber,_Mead,_and_Benedict"><span data-dcnode-id="5798" instrument_node="">Kroeber, Mead, and Benedict</span></span><span class="mw-editsection" data-dcnode-id="5790"><span class="mw-editsection-bracket" data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">[</span></span><a data-dcnode-id="5793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D11" title="Edit section: Kroeber, Mead, and Benedict"><span data-dcnode-id="5794" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5791"><span data-dcnode-id="5792" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5788" instrument_node="">
</span><p data-dcnode-id="5762"><span data-dcnode-id="5787" instrument_node="">Boas used his positions at </span><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbia_University" title="Columbia University"><span data-dcnode-id="5786" instrument_node="">Columbia University</span></a><span data-dcnode-id="5784" instrument_node=""> and the </span><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Museum_of_Natural_History" title="American Museum of Natural History"><span data-dcnode-id="5783" instrument_node="">American Museum of Natural History</span></a><span data-dcnode-id="5781" instrument_node=""> (AMNH) to train and develop multiple generations of students. His first generation of students included </span><a data-dcnode-id="5779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Kroeber" title="Alfred Kroeber"><span data-dcnode-id="5780" instrument_node="">Alfred Kroeber</span></a><span data-dcnode-id="5778" instrument_node="">, </span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Lowie" title="Robert Lowie"><span data-dcnode-id="5777" instrument_node="">Robert Lowie</span></a><span data-dcnode-id="5775" instrument_node="">, </span><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Sapir" title="Edward Sapir"><span data-dcnode-id="5774" instrument_node="">Edward Sapir</span></a><span data-dcnode-id="5772" instrument_node="">, and </span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_Benedict" title="Ruth Benedict"><span data-dcnode-id="5771" instrument_node="">Ruth Benedict</span></a><span data-dcnode-id="5769" instrument_node="">, who each produced richly detailed studies of indigenous North American cultures. They provided a wealth of details used to attack the theory of a single evolutionary process. Kroeber and Sapir's focus on Native American languages helped establish </span><a data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linguistics" title="Linguistics"><span data-dcnode-id="5768" instrument_node="">linguistics</span></a><span data-dcnode-id="5766" instrument_node=""> as a truly general science and free it from its historical focus on </span><a data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-European_languages" title="Indo-European languages"><span data-dcnode-id="5765" instrument_node="">Indo-European languages</span></a><span data-dcnode-id="5763" instrument_node="">.
</span></p><p data-dcnode-id="5742"><span data-dcnode-id="5761" instrument_node="">The publication of </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Kroeber" title="Alfred Kroeber"><span data-dcnode-id="5760" instrument_node="">Alfred Kroeber</span></a><span data-dcnode-id="5758" instrument_node="">'s textbook </span><i data-dcnode-id="5756"><span data-dcnode-id="5757" instrument_node="">Anthropology</span></i><span data-dcnode-id="5755" instrument_node=""> (1923) marked a turning point in American anthropology. After three decades of amassing material, Boasians felt a growing urge to generalize. This was most obvious in the 'Culture and Personality' studies carried out by younger Boasians such as </span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Mead" title="Margaret Mead"><span data-dcnode-id="5754" instrument_node="">Margaret Mead</span></a><span data-dcnode-id="5752" instrument_node=""> and </span><a data-dcnode-id="5750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_Benedict" title="Ruth Benedict"><span data-dcnode-id="5751" instrument_node="">Ruth Benedict</span></a><span data-dcnode-id="5749" instrument_node="">. Influenced by psychoanalytic psychologists including </span><a data-dcnode-id="5747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sigmund_Freud" title="Sigmund Freud"><span data-dcnode-id="5748" instrument_node="">Sigmund Freud</span></a><span data-dcnode-id="5746" instrument_node=""> and </span><a data-dcnode-id="5744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Jung" title="Carl Jung"><span data-dcnode-id="5745" instrument_node="">Carl Jung</span></a><span data-dcnode-id="5743" instrument_node="">, these authors sought to understand the way that individual personalities were shaped by the wider cultural and social forces in which they grew up.
</span></p><p data-dcnode-id="5721"><span data-dcnode-id="5741" instrument_node="">Though such works as Mead's </span><i data-dcnode-id="5738"><a data-dcnode-id="5739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coming_of_Age_in_Samoa" title="Coming of Age in Samoa"><span data-dcnode-id="5740" instrument_node="">Coming of Age in Samoa</span></a></i><span data-dcnode-id="5737" instrument_node=""> (1928) and Benedict's </span><i data-dcnode-id="5734"><a data-dcnode-id="5735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Chrysanthemum_and_the_Sword" title="The Chrysanthemum and the Sword"><span data-dcnode-id="5736" instrument_node="">The Chrysanthemum and the Sword</span></a></i><span data-dcnode-id="5733" instrument_node=""> (1946) remain popular with the American public, Mead and Benedict never had the impact on the discipline of anthropology that some expected. Boas had planned for Ruth Benedict to succeed him as chair of Columbia's anthropology department, but she was sidelined in favor of </span><a data-dcnode-id="5731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Linton" title="Ralph Linton"><span data-dcnode-id="5732" instrument_node="">Ralph Linton</span></a><span data-dcnode-id="5730" instrument_node="">,</span><sup class="reference" data-dcnode-id="5727" id="cite_ref-15"><a data-dcnode-id="5728" href="#cite_note-15"><span data-dcnode-id="5729" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5726" instrument_node=""> and Mead was limited to her offices at the AMNH.</span><sup class="reference" data-dcnode-id="5723" id="cite_ref-16"><a data-dcnode-id="5724" href="#cite_note-16"><span data-dcnode-id="5725" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5722" instrument_node="">
</span></p><span data-dcnode-id="5720" instrument_node="">
</span><h3 data-dcnode-id="5709"><span data-dcnode-id="5719" id="Wolf.2C_Sahlins.2C_Mintz.2C_and_political_economy"></span><span class="mw-headline" data-dcnode-id="5717" id="Wolf,_Sahlins,_Mintz,_and_political_economy"><span data-dcnode-id="5718" instrument_node="">Wolf, Sahlins, Mintz, and political economy</span></span><span class="mw-editsection" data-dcnode-id="5710"><span class="mw-editsection-bracket" data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">[</span></span><a data-dcnode-id="5713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D12" title="Edit section: Wolf, Sahlins, Mintz, and political economy"><span data-dcnode-id="5714" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5708" instrument_node="">
</span><link data-dcnode-id="5707" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5694" role="note"><span data-dcnode-id="5706" instrument_node="">Main articles: </span><a data-dcnode-id="5704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_economy_in_anthropology" title="Political economy in anthropology"><span data-dcnode-id="5705" instrument_node="">Political economy in anthropology</span></a><span data-dcnode-id="5703" instrument_node="">, </span><a data-dcnode-id="5701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_Wolf" title="Eric Wolf"><span data-dcnode-id="5702" instrument_node="">Eric Wolf</span></a><span data-dcnode-id="5700" instrument_node="">, </span><a data-dcnode-id="5698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Sahlins" title="Marshall Sahlins"><span data-dcnode-id="5699" instrument_node="">Marshall Sahlins</span></a><span data-dcnode-id="5697" instrument_node="">, and </span><a data-dcnode-id="5695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidney_Mintz" title="Sidney Mintz"><span data-dcnode-id="5696" instrument_node="">Sidney Mintz</span></a></div><span data-dcnode-id="5693" instrument_node="">
</span><p data-dcnode-id="5673"><span data-dcnode-id="5692" instrument_node="">In the 1950s and mid-1960s anthropology tended increasingly to model itself after the </span><a data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_science" title="Natural science"><span data-dcnode-id="5691" instrument_node="">natural sciences</span></a><span data-dcnode-id="5689" instrument_node="">. Some anthropologists, such as </span><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lloyd_Fallers" title="Lloyd Fallers"><span data-dcnode-id="5688" instrument_node="">Lloyd Fallers</span></a><span data-dcnode-id="5686" instrument_node=""> and </span><a data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clifford_Geertz" title="Clifford Geertz"><span data-dcnode-id="5685" instrument_node="">Clifford Geertz</span></a><span data-dcnode-id="5683" instrument_node="">, focused on processes of modernization by which newly independent states could develop. Others, such as </span><a data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julian_Steward" title="Julian Steward"><span data-dcnode-id="5682" instrument_node="">Julian Steward</span></a><span data-dcnode-id="5680" instrument_node=""> and </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leslie_White" title="Leslie White"><span data-dcnode-id="5679" instrument_node="">Leslie White</span></a><span data-dcnode-id="5677" instrument_node="">, focused on how societies evolve and fit their ecological niche—an approach popularized by </span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marvin_Harris" title="Marvin Harris"><span data-dcnode-id="5676" instrument_node="">Marvin Harris</span></a><span data-dcnode-id="5674" instrument_node="">.
</span></p><p data-dcnode-id="5645"><a data-dcnode-id="5671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_anthropology" title="Economic anthropology"><span data-dcnode-id="5672" instrument_node="">Economic anthropology</span></a><span data-dcnode-id="5670" instrument_node=""> as influenced by </span><a data-dcnode-id="5668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Polanyi" title="Karl Polanyi"><span data-dcnode-id="5669" instrument_node="">Karl Polanyi</span></a><span data-dcnode-id="5667" instrument_node=""> and practiced by </span><a data-dcnode-id="5665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Sahlins" title="Marshall Sahlins"><span data-dcnode-id="5666" instrument_node="">Marshall Sahlins</span></a><span data-dcnode-id="5664" instrument_node=""> and George Dalton challenged standard </span><a data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoclassical_economics" title="Neoclassical economics"><span data-dcnode-id="5663" instrument_node="">neoclassical economics</span></a><span data-dcnode-id="5661" instrument_node=""> to take account of cultural and social factors, and employed Marxian analysis into anthropological study. In England, British Social Anthropology's paradigm began to fragment as </span><a data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Gluckman" title="Max Gluckman"><span data-dcnode-id="5660" instrument_node="">Max Gluckman</span></a><span data-dcnode-id="5658" instrument_node=""> and </span><a data-dcnode-id="5656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Worsley" title="Peter Worsley"><span data-dcnode-id="5657" instrument_node="">Peter Worsley</span></a><span data-dcnode-id="5655" instrument_node=""> experimented with Marxism and authors such as </span><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodney_Needham" title="Rodney Needham"><span data-dcnode-id="5654" instrument_node="">Rodney Needham</span></a><span data-dcnode-id="5652" instrument_node=""> and </span><a data-dcnode-id="5650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmund_Leach" title="Edmund Leach"><span data-dcnode-id="5651" instrument_node="">Edmund Leach</span></a><span data-dcnode-id="5649" instrument_node=""> incorporated Lévi-Strauss's structuralism into their work. Structuralism also influenced a number of developments in the 1960s and 1970s, including </span><a data-dcnode-id="5647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychological_anthropology%23Cognitive_Anthropology" title="Psychological anthropology"><span data-dcnode-id="5648" instrument_node="">cognitive anthropology</span></a><span data-dcnode-id="5646" instrument_node=""> and componential analysis.
</span></p><p data-dcnode-id="5623"><span data-dcnode-id="5644" instrument_node="">In keeping with the times, much of anthropology became politicized through the </span><a class="mw-redirect" data-dcnode-id="5642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Algerian_War_of_Independence" title="Algerian War of Independence"><span data-dcnode-id="5643" instrument_node="">Algerian War of Independence</span></a><span data-dcnode-id="5641" instrument_node=""> and opposition to the </span><a data-dcnode-id="5639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="5640" instrument_node="">Vietnam War</span></a><span data-dcnode-id="5638" instrument_node="">;</span><sup class="reference" data-dcnode-id="5635" id="cite_ref-17"><a data-dcnode-id="5636" href="#cite_note-17"><span data-dcnode-id="5637" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5634" instrument_node=""> </span><a data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism" title="Marxism"><span data-dcnode-id="5633" instrument_node="">Marxism</span></a><span data-dcnode-id="5631" instrument_node=""> became an increasingly popular theoretical approach in the discipline.</span><sup class="reference" data-dcnode-id="5628" id="cite_ref-18"><a data-dcnode-id="5629" href="#cite_note-18"><span data-dcnode-id="5630" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5627" instrument_node=""> By the 1970s the authors of volumes such as </span><i data-dcnode-id="5625"><span data-dcnode-id="5626" instrument_node="">Reinventing Anthropology</span></i><span data-dcnode-id="5624" instrument_node=""> worried about anthropology's relevance.
</span></p><p data-dcnode-id="5568"><span data-dcnode-id="5622" instrument_node="">Since the 1980s issues of power, such as those examined in </span><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_Wolf" title="Eric Wolf"><span data-dcnode-id="5621" instrument_node="">Eric Wolf</span></a><span data-dcnode-id="5619" instrument_node="">'s </span><i data-dcnode-id="5616"><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe_and_the_People_Without_History" title="Europe and the People Without History"><span data-dcnode-id="5618" instrument_node="">Europe and the People Without History</span></a></i><span data-dcnode-id="5615" instrument_node="">, have been central to the discipline. In the 1980s books like </span><i data-dcnode-id="5613"><span data-dcnode-id="5614" instrument_node="">Anthropology and the Colonial Encounter</span></i><span data-dcnode-id="5612" instrument_node=""> pondered anthropology's ties to colonial inequality, while the immense popularity of theorists such as </span><a data-dcnode-id="5610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antonio_Gramsci" title="Antonio Gramsci"><span data-dcnode-id="5611" instrument_node="">Antonio Gramsci</span></a><span data-dcnode-id="5609" instrument_node=""> and </span><a data-dcnode-id="5607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michel_Foucault" title="Michel Foucault"><span data-dcnode-id="5608" instrument_node="">Michel Foucault</span></a><span data-dcnode-id="5606" instrument_node=""> moved issues of power and </span><a data-dcnode-id="5604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hegemony" title="Hegemony"><span data-dcnode-id="5605" instrument_node="">hegemony</span></a><span data-dcnode-id="5603" instrument_node=""> into the spotlight. Gender and sexuality became popular topics, as did the relationship between history and anthropology, influenced by </span><a data-dcnode-id="5601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Sahlins" title="Marshall Sahlins"><span data-dcnode-id="5602" instrument_node="">Marshall Sahlins</span></a><span data-dcnode-id="5600" instrument_node="">, who drew on </span><a data-dcnode-id="5598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_L%25C3%25A9vi-Strauss" title="Claude Lévi-Strauss"><span data-dcnode-id="5599" instrument_node="">Lévi-Strauss</span></a><span data-dcnode-id="5597" instrument_node=""> and </span><a data-dcnode-id="5595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fernand_Braudel" title="Fernand Braudel"><span data-dcnode-id="5596" instrument_node="">Fernand Braudel</span></a><span data-dcnode-id="5594" instrument_node=""> to examine the relationship between symbolic meaning, sociocultural structure, and individual agency in the processes of historical transformation. </span><a data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Comaroff" title="Jean Comaroff"><span data-dcnode-id="5593" instrument_node="">Jean</span></a><span data-dcnode-id="5591" instrument_node=""> and </span><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Comaroff" title="John Comaroff"><span data-dcnode-id="5590" instrument_node="">John Comaroff</span></a><span data-dcnode-id="5588" instrument_node=""> produced a whole generation of anthropologists at the University of Chicago that focused on these themes. Also influential in these issues were </span><a class="mw-redirect" data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nietzsche" title="Nietzsche"><span data-dcnode-id="5587" instrument_node="">Nietzsche</span></a><span data-dcnode-id="5585" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heidegger" title="Heidegger"><span data-dcnode-id="5584" instrument_node="">Heidegger</span></a><span data-dcnode-id="5582" instrument_node="">, the critical theory of the </span><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frankfurt_School" title="Frankfurt School"><span data-dcnode-id="5581" instrument_node="">Frankfurt School</span></a><span data-dcnode-id="5579" instrument_node="">, </span><a data-dcnode-id="5577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Derrida" title="Derrida"><span data-dcnode-id="5578" instrument_node="">Derrida</span></a><span data-dcnode-id="5576" instrument_node=""> and </span><a data-dcnode-id="5574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Lacan" title="Jacques Lacan"><span data-dcnode-id="5575" instrument_node="">Lacan</span></a><span data-dcnode-id="5573" instrument_node="">.</span><sup class="reference" data-dcnode-id="5570" id="cite_ref-Lewis_19-0"><a data-dcnode-id="5571" href="#cite_note-Lewis-19"><span data-dcnode-id="5572" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5569" instrument_node="">
</span></p><span data-dcnode-id="5567" instrument_node="">
</span><h3 data-dcnode-id="5556"><span data-dcnode-id="5566" id="Geertz.2C_Schneider.2C_and_interpretive_anthropology"></span><span class="mw-headline" data-dcnode-id="5564" id="Geertz,_Schneider,_and_interpretive_anthropology"><span data-dcnode-id="5565" instrument_node="">Geertz, Schneider, and interpretive anthropology</span></span><span class="mw-editsection" data-dcnode-id="5557"><span class="mw-editsection-bracket" data-dcnode-id="5562"><span data-dcnode-id="5563" instrument_node="">[</span></span><a data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D13" title="Edit section: Geertz, Schneider, and interpretive anthropology"><span data-dcnode-id="5561" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5555" instrument_node="">
</span><link data-dcnode-id="5554" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5547" role="note"><span data-dcnode-id="5553" instrument_node="">Main articles: </span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clifford_Geertz" title="Clifford Geertz"><span data-dcnode-id="5552" instrument_node="">Clifford Geertz</span></a><span data-dcnode-id="5550" instrument_node=""> and </span><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_M._Schneider" title="David M. Schneider"><span data-dcnode-id="5549" instrument_node="">David M. Schneider</span></a></div><span data-dcnode-id="5546" instrument_node="">
</span><p data-dcnode-id="5535"><span data-dcnode-id="5545" instrument_node="">Many anthropologists reacted against the renewed emphasis on materialism and scientific modelling derived from Marx by emphasizing the importance of the concept of culture. Authors such as </span><a class="mw-redirect" data-dcnode-id="5543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Schneider_%28anthropologist%29" title="David Schneider (anthropologist)"><span data-dcnode-id="5544" instrument_node="">David Schneider</span></a><span data-dcnode-id="5542" instrument_node="">, </span><a data-dcnode-id="5540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clifford_Geertz" title="Clifford Geertz"><span data-dcnode-id="5541" instrument_node="">Clifford Geertz</span></a><span data-dcnode-id="5539" instrument_node="">, and </span><a data-dcnode-id="5537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Sahlins" title="Marshall Sahlins"><span data-dcnode-id="5538" instrument_node="">Marshall Sahlins</span></a><span data-dcnode-id="5536" instrument_node=""> developed a more fleshed-out concept of culture as a web of meaning or signification, which proved very popular within and beyond the discipline. Geertz was to state:
</span></p><span data-dcnode-id="5534" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="5522"><p data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node=""> "Believing, with Max Weber, that man is an animal suspended in webs of significance he himself has spun, I take culture to be those webs, and the analysis of it to be therefore not an experimental science in search of law but an interpretive one in search of meaning."</span></p><div class="templatequotecite" data-dcnode-id="5523"><span data-dcnode-id="5529" instrument_node="">— </span><cite data-dcnode-id="5524"><span data-dcnode-id="5528" instrument_node="">Clifford Geertz (1973)</span><sup class="reference" data-dcnode-id="5525" id="cite_ref-20"><a data-dcnode-id="5526" href="#cite_note-20"><span data-dcnode-id="5527" instrument_node="">[20]</span></a></sup></cite></div></blockquote><span data-dcnode-id="5521" instrument_node="">
</span><p data-dcnode-id="5505"><span data-dcnode-id="5520" instrument_node="">Geertz's interpretive method involved what he called "</span><a data-dcnode-id="5518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thick_description" title="Thick description"><span data-dcnode-id="5519" instrument_node="">thick description</span></a><span data-dcnode-id="5517" instrument_node="">". The cultural symbols of rituals, political and economic action, and of kinship, are "read" by the anthropologist as if they are a document in a foreign language. The interpretation of those symbols must be re-framed for their anthropological audience, i.e. transformed from the "experience-near" but foreign concepts of the other culture, into the "experience-distant" theoretical concepts of the anthropologist. These interpretations must then be reflected back to its originators, and its adequacy as a translation fine-tuned in a repeated way, a process called the </span><a data-dcnode-id="5515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hermeneutics" title="Hermeneutics"><span data-dcnode-id="5516" instrument_node="">hermeneutic circle</span></a><span data-dcnode-id="5514" instrument_node="">. Geertz applied his method in a number of areas, creating programs of study that were very productive. His analysis of "religion as a cultural system" was particularly influential outside of anthropology. David Schnieder's cultural analysis of American kinship has proven equally influential.</span><sup class="reference" data-dcnode-id="5511" id="cite_ref-21"><a data-dcnode-id="5512" href="#cite_note-21"><span data-dcnode-id="5513" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5510" instrument_node="">  Schneider demonstrated that the American folk-cultural emphasis on "blood connections" had an undue influence on anthropological kinship theories, and that kinship is not a biological characteristic but a cultural relationship established on very different terms in different societies.</span><sup class="reference" data-dcnode-id="5507" id="cite_ref-22"><a data-dcnode-id="5508" href="#cite_note-22"><span data-dcnode-id="5509" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5506" instrument_node="">
</span></p><p data-dcnode-id="5497"><span data-dcnode-id="5504" instrument_node="">Prominent British symbolic anthropologists include </span><a data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Turner" title="Victor Turner"><span data-dcnode-id="5503" instrument_node="">Victor Turner</span></a><span data-dcnode-id="5501" instrument_node=""> and </span><a data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mary_Douglas" title="Mary Douglas"><span data-dcnode-id="5500" instrument_node="">Mary Douglas</span></a><span data-dcnode-id="5498" instrument_node="">.
</span></p><span data-dcnode-id="5496" instrument_node="">
</span><h3 data-dcnode-id="5486"><span class="mw-headline" data-dcnode-id="5494" id="The_post-modern_turn"><span data-dcnode-id="5495" instrument_node="">The post-modern turn</span></span><span class="mw-editsection" data-dcnode-id="5487"><span class="mw-editsection-bracket" data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">[</span></span><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D14" title="Edit section: The post-modern turn"><span data-dcnode-id="5491" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5488"><span data-dcnode-id="5489" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5485" instrument_node="">
</span><p data-dcnode-id="5444"><span data-dcnode-id="5484" instrument_node="">In the late 1980s and 1990s authors such as </span><a data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Clifford_%28historian%29" title="James Clifford (historian)"><span data-dcnode-id="5483" instrument_node="">James Clifford</span></a><span data-dcnode-id="5481" instrument_node=""> pondered ethnographic authority, in particular how and why anthropological knowledge was possible and authoritative. They were reflecting trends in research and discourse initiated by feminists in the academy, although they excused themselves from commenting specifically on those pioneering critics.</span><sup class="reference" data-dcnode-id="5478" id="cite_ref-23"><a data-dcnode-id="5479" href="#cite_note-23"><span data-dcnode-id="5480" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5477" instrument_node=""> Nevertheless, key aspects of feminist theory and methods became </span><i data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">de rigueur</span></i><span data-dcnode-id="5474" instrument_node=""> as part of the 'post-modern moment' in anthropology: Ethnographies became more interpretative and reflexive,</span><sup class="reference" data-dcnode-id="5471" id="cite_ref-Janiewski2005p200_24-0"><a data-dcnode-id="5472" href="#cite_note-Janiewski2005p200-24"><span data-dcnode-id="5473" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5470" instrument_node=""> explicitly addressing the author's methodology; cultural, gendered, and racial positioning; and their influence on his or her ethnographic analysis. This was part of a more general trend of </span><a data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postmodernism" title="Postmodernism"><span data-dcnode-id="5469" instrument_node="">postmodernism</span></a><span data-dcnode-id="5467" instrument_node=""> that was popular contemporaneously.</span><sup class="reference" data-dcnode-id="5464" id="cite_ref-25"><a data-dcnode-id="5465" href="#cite_note-25"><span data-dcnode-id="5466" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5463" instrument_node=""> Currently anthropologists pay attention to a wide variety of issues pertaining to the contemporary world, including </span><a data-dcnode-id="5461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="5462" instrument_node="">globalization</span></a><span data-dcnode-id="5460" instrument_node="">, </span><a data-dcnode-id="5458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medicine" title="Medicine"><span data-dcnode-id="5459" instrument_node="">medicine</span></a><span data-dcnode-id="5457" instrument_node=""> and </span><a data-dcnode-id="5455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biotechnology" title="Biotechnology"><span data-dcnode-id="5456" instrument_node="">biotechnology</span></a><span data-dcnode-id="5454" instrument_node="">, </span><a data-dcnode-id="5452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indigenous_rights" title="Indigenous rights"><span data-dcnode-id="5453" instrument_node="">indigenous rights</span></a><span data-dcnode-id="5451" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virtual_communities" title="Virtual communities"><span data-dcnode-id="5450" instrument_node="">virtual communities</span></a><span data-dcnode-id="5448" instrument_node="">, and the anthropology of </span><a data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_society" title="Industrial society"><span data-dcnode-id="5447" instrument_node="">industrialized societies</span></a><span data-dcnode-id="5445" instrument_node="">.
</span></p><span data-dcnode-id="5443" instrument_node="">
</span><h3 data-dcnode-id="5433"><span class="mw-headline" data-dcnode-id="5441" id="Socio-cultural_anthropology_subfields"><span data-dcnode-id="5442" instrument_node="">Socio-cultural anthropology subfields</span></span><span class="mw-editsection" data-dcnode-id="5434"><span class="mw-editsection-bracket" data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">[</span></span><a data-dcnode-id="5437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D15" title="Edit section: Socio-cultural anthropology subfields"><span data-dcnode-id="5438" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5435"><span data-dcnode-id="5436" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5432" instrument_node="">
</span><link data-dcnode-id="5431" href="mw-data:TemplateStyles:r998391716" rel="mw-deduplicated-inline-style"><div class="div-col" data-dcnode-id="5339" style="column-width: 22em;"><span data-dcnode-id="5430" instrument_node="">
