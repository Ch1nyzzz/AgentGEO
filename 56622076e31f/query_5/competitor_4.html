</span><p data-dcnode-id="6614"><b data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">Cultural anthropology</span></b><span data-dcnode-id="6631" instrument_node=""> is a branch of </span><a data-dcnode-id="6629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthropology" title="Anthropology"><span data-dcnode-id="6630" instrument_node="">anthropology</span></a><span data-dcnode-id="6628" instrument_node=""> focused on the study of </span><a data-dcnode-id="6626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_variation" title="Cultural variation"><span data-dcnode-id="6627" instrument_node="">cultural variation</span></a><span data-dcnode-id="6625" instrument_node=""> among humans. It is in contrast to </span><a data-dcnode-id="6623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_anthropology" title="Social anthropology"><span data-dcnode-id="6624" instrument_node="">social anthropology</span></a><span data-dcnode-id="6622" instrument_node="">, which perceives cultural variation as a subset of a posited anthropological constant. The portmanteau term </span><a data-dcnode-id="6620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sociocultural_anthropology" title="Sociocultural anthropology"><span data-dcnode-id="6621" instrument_node="">sociocultural anthropology</span></a><span data-dcnode-id="6619" instrument_node=""> includes both cultural and social anthropology traditions.</span><sup class="reference" data-dcnode-id="6616" id="cite_ref-1"><a data-dcnode-id="6617" href="#cite_note-1"><span data-dcnode-id="6618" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6615" instrument_node="">
</span></p><span data-dcnode-id="6613" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6602"><div class="thumbinner" data-dcnode-id="6603" style="width:222px;"><a class="image" data-dcnode-id="6611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEdward_Burnett_Tylor.jpg"><img alt="" class="thumbimage" data-dcnode-id="6612" data-file-height="396" data-file-width="292" decoding="async" height="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Edward_Burnett_Tylor.jpg/220px-Edward_Burnett_Tylor.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/1/12/Edward_Burnett_Tylor.jpg 1.5x" width="220"></a><span data-dcnode-id="6610" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6604"><div class="magnify" data-dcnode-id="6608"><a class="internal" data-dcnode-id="6609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEdward_Burnett_Tylor.jpg" title="Enlarge"></a></div><a data-dcnode-id="6606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burnett_Tylor" title="Edward Burnett Tylor"><span data-dcnode-id="6607" instrument_node="">Edward Burnett Tylor</span></a><span data-dcnode-id="6605" instrument_node="">, founder of cultural anthropology</span></div></div></div><span data-dcnode-id="6601" instrument_node="">
</span><p data-dcnode-id="6595"><span data-dcnode-id="6600" instrument_node="">Anthropologists have pointed out that through culture people can adapt to their environment in non-genetic ways, so people living in different environments will often have different cultures. Much of anthropological theory has originated in an appreciation of and interest in the tension between the local (particular cultures) and the global (a universal human nature, or the web of connections between people in distinct places/circumstances).</span><sup class="reference" data-dcnode-id="6597" id="cite_ref-Cunha_2014_217–233_2-0"><a data-dcnode-id="6598" href="#cite_note-Cunha_2014_217%E2%80%93233-2"><span data-dcnode-id="6599" instrument_node="">[2]</span></a></sup><span data-dcnode-id="6596" instrument_node="">
</span></p><p data-dcnode-id="6574"><span data-dcnode-id="6594" instrument_node="">Cultural anthropology has a rich </span><a data-dcnode-id="6592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Methodology" title="Methodology"><span data-dcnode-id="6593" instrument_node="">methodology</span></a><span data-dcnode-id="6591" instrument_node="">, including </span><a data-dcnode-id="6589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Participant_observation" title="Participant observation"><span data-dcnode-id="6590" instrument_node="">participant observation</span></a><span data-dcnode-id="6588" instrument_node=""> (often called </span><a class="mw-redirect" data-dcnode-id="6586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fieldwork" title="Fieldwork"><span data-dcnode-id="6587" instrument_node="">fieldwork</span></a><span data-dcnode-id="6585" instrument_node=""> because it requires the anthropologist spending an extended period of time at the research location), </span><a class="mw-redirect" data-dcnode-id="6583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interviews" title="Interviews"><span data-dcnode-id="6584" instrument_node="">interviews</span></a><span data-dcnode-id="6582" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="6580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statistical_survey" title="Statistical survey"><span data-dcnode-id="6581" instrument_node="">surveys</span></a><span data-dcnode-id="6579" instrument_node="">.</span><sup class="reference" data-dcnode-id="6576" id="cite_ref-3"><a data-dcnode-id="6577" href="#cite_note-3"><span data-dcnode-id="6578" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6575" instrument_node="">
</span></p><span data-dcnode-id="6573" instrument_node="">

</span><table class="box-Cleanup plainlinks metadata ambox ambox-style ambox-Cleanup" data-dcnode-id="6260" role="presentation"><tbody data-dcnode-id="6261"><tr data-dcnode-id="6262"><td class="mbox-image" data-dcnode-id="6295"><div data-dcnode-id="6296" style="width:52px"><img alt="" data-dcnode-id="6297" data-file-height="48" data-file-width="48" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/40px-Edit-clear.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/60px-Edit-clear.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/f/f2/Edit-clear.svg/80px-Edit-clear.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="6263"><div class="mbox-text-span" data-dcnode-id="6264"><span data-dcnode-id="6294" instrument_node="">This section may </span><b data-dcnode-id="6290"><span data-dcnode-id="6293" instrument_node="">require </span><a data-dcnode-id="6291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACleanup" title="Wikipedia:Cleanup"><span data-dcnode-id="6292" instrument_node="">cleanup</span></a></b><span data-dcnode-id="6289" instrument_node=""> to meet Wikipedia's </span><a data-dcnode-id="6287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style" title="Wikipedia:Manual of Style"><span data-dcnode-id="6288" instrument_node="">quality standards</span></a><span data-dcnode-id="6286" instrument_node="">. The specific problem is: </span><b data-dcnode-id="6284"><span data-dcnode-id="6285" instrument_node="">this currently is not a history of cultural anthropology, but of specific terms. It also does not explain the outdated terminology used.</span></b><span class="hide-when-compact" data-dcnode-id="6279"><span data-dcnode-id="6283" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="6281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit"><span data-dcnode-id="6282" instrument_node="">improve this section</span></a><span data-dcnode-id="6280" instrument_node=""> if you can.</span></span><span data-dcnode-id="6278" instrument_node=""> </span><span class="date-container" data-dcnode-id="6272"><i data-dcnode-id="6273"><span data-dcnode-id="6277" instrument_node="">(</span><span class="date" data-dcnode-id="6275"><span data-dcnode-id="6276" instrument_node="">August 2020</span></span><span data-dcnode-id="6274" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="6265"><i data-dcnode-id="6266"><span data-dcnode-id="6271" instrument_node=""> (</span><small data-dcnode-id="6268"><a data-dcnode-id="6269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="6270" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="6267" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="6259" instrument_node="">
</span><p data-dcnode-id="6247"><span data-dcnode-id="6258" instrument_node="">The rise of cultural anthropology took place within the context of the late 19th century, when questions regarding which cultures were "primitive" and which were "civilized" occupied the mind of not only </span><a data-dcnode-id="6256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sigmund_Freud" title="Sigmund Freud"><span data-dcnode-id="6257" instrument_node="">Freud</span></a><span data-dcnode-id="6255" instrument_node="">, but many others. </span><a data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colonialism" title="Colonialism"><span data-dcnode-id="6254" instrument_node="">Colonialism</span></a><span data-dcnode-id="6252" instrument_node=""> and its processes increasingly brought European thinkers into direct or indirect contact with "primitive others".</span><sup class="reference" data-dcnode-id="6249" id="cite_ref-Rhodes_2001_4-0"><a data-dcnode-id="6250" href="#cite_note-Rhodes_2001-4"><span data-dcnode-id="6251" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6248" instrument_node=""> The relative status of various humans, some of whom had modern advanced technologies that included engines and telegraphs, while others lacked anything but face-to-face communication techniques and still lived a Paleolithic lifestyle, was of interest to the first generation of cultural anthropologists.
</span></p><span data-dcnode-id="6246" instrument_node="">
</span><h2 data-dcnode-id="6236"><span class="mw-headline" data-dcnode-id="6244" id="Theoretical_foundations"><span data-dcnode-id="6245" instrument_node="">Theoretical foundations</span></span><span class="mw-editsection" data-dcnode-id="6237"><span class="mw-editsection-bracket" data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">[</span></span><a data-dcnode-id="6240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D2" title="Edit section: Theoretical foundations"><span data-dcnode-id="6241" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6235" instrument_node="">
</span><h3 data-dcnode-id="6225"><span class="mw-headline" data-dcnode-id="6233" id="The_concept_of_culture"><span data-dcnode-id="6234" instrument_node="">The concept of culture</span></span><span class="mw-editsection" data-dcnode-id="6226"><span class="mw-editsection-bracket" data-dcnode-id="6231"><span data-dcnode-id="6232" instrument_node="">[</span></span><a data-dcnode-id="6229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D3" title="Edit section: The concept of culture"><span data-dcnode-id="6230" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6227"><span data-dcnode-id="6228" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6224" instrument_node="">
</span><p data-dcnode-id="6205"><span data-dcnode-id="6223" instrument_node="">One of the earliest articulations of the anthropological meaning of the term "</span><a data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture" title="Culture"><span data-dcnode-id="6222" instrument_node="">culture</span></a><span data-dcnode-id="6220" instrument_node="">" came from Sir </span><a data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Burnett_Tylor" title="Edward Burnett Tylor"><span data-dcnode-id="6219" instrument_node="">Edward Tylor</span></a><span data-dcnode-id="6217" instrument_node=""> who writes on the first page of his 1871 book: "Culture, or civilization, taken in its broad, ethnographic sense, is that complex whole which includes knowledge, belief, art, morals, law, custom, and any other capabilities and habits acquired by man as a member of society."</span><sup class="reference" data-dcnode-id="6214" id="cite_ref-5"><a data-dcnode-id="6215" href="#cite_note-5"><span data-dcnode-id="6216" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6213" instrument_node=""> The term "civilization" later gave way to definitions given by </span><a data-dcnode-id="6211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/V._Gordon_Childe" title="V. Gordon Childe"><span data-dcnode-id="6212" instrument_node="">V. Gordon Childe</span></a><span data-dcnode-id="6210" instrument_node="">, with culture forming an umbrella term and civilization becoming a particular kind of culture.</span><sup class="reference" data-dcnode-id="6207" id="cite_ref-Magolda_24–46_6-0"><a data-dcnode-id="6208" href="#cite_note-Magolda_24%E2%80%9346-6"><span data-dcnode-id="6209" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6206" instrument_node="">
</span></p><p data-dcnode-id="6199"><span data-dcnode-id="6204" instrument_node="">According to Kay Milton, former director of anthropology research at Queens University Belfast, culture can be general or specific. This means culture can be something applied to all human beings or it can be specific to a certain group of people such as African American culture or Irish American culture. Specific cultures are structured systems which means they are organized very specifically and adding or taking away any element from that system may disrupt it.</span><sup class="reference" data-dcnode-id="6201" id="cite_ref-7"><a data-dcnode-id="6202" href="#cite_note-7"><span data-dcnode-id="6203" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6200" instrument_node="">
</span></p><span data-dcnode-id="6198" instrument_node="">
</span><h3 data-dcnode-id="6188"><span class="mw-headline" data-dcnode-id="6196" id="The_critique_of_evolutionism"><span data-dcnode-id="6197" instrument_node="">The critique of evolutionism</span></span><span class="mw-editsection" data-dcnode-id="6189"><span class="mw-editsection-bracket" data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">[</span></span><a data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D4" title="Edit section: The critique of evolutionism"><span data-dcnode-id="6193" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6190"><span data-dcnode-id="6191" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6187" instrument_node="">
</span><p data-dcnode-id="6173"><span data-dcnode-id="6186" instrument_node="">Anthropology is concerned with the lives of people in different parts of the world, particularly in relation to the discourse of </span><a data-dcnode-id="6184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belief" title="Belief"><span data-dcnode-id="6185" instrument_node="">beliefs</span></a><span data-dcnode-id="6183" instrument_node=""> and practices. In addressing this question, </span><a data-dcnode-id="6181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnology" title="Ethnology"><span data-dcnode-id="6182" instrument_node="">ethnologists</span></a><span data-dcnode-id="6180" instrument_node=""> in the 19th century divided into two schools of thought. Some, like </span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grafton_Elliot_Smith" title="Grafton Elliot Smith"><span data-dcnode-id="6179" instrument_node="">Grafton Elliot Smith</span></a><span data-dcnode-id="6177" instrument_node="">, argued that different groups must have learned from one another somehow, however indirectly; in other words, they argued that cultural traits spread from one place to another, or "</span><a class="mw-redirect" data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffusion_%28anthropology%29" title="Diffusion (anthropology)"><span data-dcnode-id="6176" instrument_node="">diffused</span></a><span data-dcnode-id="6174" instrument_node="">".
</span></p><span data-dcnode-id="6172" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6157"><div class="thumbinner" data-dcnode-id="6158" style="width:302px;"><a class="image" data-dcnode-id="6170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACultural_evolution.PNG"><img alt="" class="thumbimage" data-dcnode-id="6171" data-file-height="282" data-file-width="400" decoding="async" height="212" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/82/Cultural_evolution.PNG/300px-Cultural_evolution.PNG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/8/82/Cultural_evolution.PNG 1.5x" width="300"></a><span data-dcnode-id="6169" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6159"><div class="magnify" data-dcnode-id="6167"><a class="internal" data-dcnode-id="6168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACultural_evolution.PNG" title="Enlarge"></a></div><span data-dcnode-id="6166" instrument_node="">In the </span><a data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unilineal_evolution" title="Unilineal evolution"><span data-dcnode-id="6165" instrument_node="">unilineal evolution</span></a><span data-dcnode-id="6163" instrument_node=""> model at left, all cultures progress through set stages, while in the </span><a data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multilineal_evolution" title="Multilineal evolution"><span data-dcnode-id="6162" instrument_node="">multilineal evolution</span></a><span data-dcnode-id="6160" instrument_node=""> model at right, distinctive culture histories are emphasized.</span></div></div></div><span data-dcnode-id="6156" instrument_node="">
</span><p data-dcnode-id="6145"><span data-dcnode-id="6155" instrument_node="">Other ethnologists argued that different groups had the capability of creating similar beliefs and practices independently. Some of those who advocated "independent invention", like </span><a class="mw-redirect" data-dcnode-id="6153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lewis_Henry_Morgan" title="Lewis Henry Morgan"><span data-dcnode-id="6154" instrument_node="">Lewis Henry Morgan</span></a><span data-dcnode-id="6152" instrument_node="">, additionally supposed that similarities meant that different groups had passed through the same stages of </span><a data-dcnode-id="6150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_evolution" title="Cultural evolution"><span data-dcnode-id="6151" instrument_node="">cultural evolution</span></a><span data-dcnode-id="6149" instrument_node=""> (See also </span><a class="mw-redirect" data-dcnode-id="6147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Classical_social_evolutionism" title="Classical social evolutionism"><span data-dcnode-id="6148" instrument_node="">classical social evolutionism</span></a><span data-dcnode-id="6146" instrument_node="">). Morgan, in particular, acknowledged that certain forms of society and culture could not possibly have arisen before others. For example, industrial farming could not have been invented before simple farming, and metallurgy could not have developed without previous non-smelting processes involving metals (such as simple ground collection or mining). Morgan, like other 19th century social evolutionists, believed there was a more or less orderly progression from the primitive to the civilized.
</span></p><p data-dcnode-id="6131"><span data-dcnode-id="6144" instrument_node="">20th-century anthropologists largely reject the notion that all human societies must pass through the same stages in the same order, on the grounds that such a notion does not fit the empirical facts. Some 20th-century ethnologists, like </span><a data-dcnode-id="6142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julian_Steward" title="Julian Steward"><span data-dcnode-id="6143" instrument_node="">Julian Steward</span></a><span data-dcnode-id="6141" instrument_node="">, have instead argued that such similarities reflected similar adaptations to similar environments. Although 19th-century ethnologists saw "diffusion" and "independent invention" as mutually exclusive and competing theories, most </span><a data-dcnode-id="6139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnography" title="Ethnography"><span data-dcnode-id="6140" instrument_node="">ethnographers</span></a><span data-dcnode-id="6138" instrument_node=""> quickly reached a consensus that both processes occur, and that both can plausibly account for cross-cultural similarities. But these ethnographers also pointed out the superficiality of many such similarities. They noted that even traits that spread through diffusion often were given different meanings and function from one society to another. Analyses of large human concentrations in big cities, in multidisciplinary studies by </span><a data-dcnode-id="6136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Daus" title="Ronald Daus"><span data-dcnode-id="6137" instrument_node="">Ronald Daus</span></a><span data-dcnode-id="6135" instrument_node="">, show how new methods may be applied to the understanding of man living in a global world and how it was caused by the action of extra-European nations,  so highlighting the role of </span><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethics" title="Ethics"><span data-dcnode-id="6134" instrument_node="">Ethics</span></a><span data-dcnode-id="6132" instrument_node=""> in modern anthropology.
</span></p><p data-dcnode-id="6126"><span data-dcnode-id="6130" instrument_node="">Accordingly, most of these anthropologists showed less interest in comparing cultures, generalizing about human nature, or discovering universal laws of cultural development, than in understanding particular cultures in those cultures' own terms. Such ethnographers and their students promoted the idea of "</span><a data-dcnode-id="6128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_relativism" title="Cultural relativism"><span data-dcnode-id="6129" instrument_node="">cultural relativism</span></a><span data-dcnode-id="6127" instrument_node="">", the view that one can only understand another person's beliefs and behaviors in the context of the culture in which he or she lived or lives.
</span></p><p data-dcnode-id="6105"><span data-dcnode-id="6125" instrument_node="">Others, such as </span><a data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_L%25C3%25A9vi-Strauss" title="Claude Lévi-Strauss"><span data-dcnode-id="6124" instrument_node="">Claude Lévi-Strauss</span></a><span data-dcnode-id="6122" instrument_node=""> (who was influenced both by American cultural anthropology and by French </span><a data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Durkheim" title="Émile Durkheim"><span data-dcnode-id="6121" instrument_node="">Durkheimian</span></a><span data-dcnode-id="6119" instrument_node=""> </span><a data-dcnode-id="6117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sociology" title="Sociology"><span data-dcnode-id="6118" instrument_node="">sociology</span></a><span data-dcnode-id="6116" instrument_node="">), have argued that apparently similar patterns of development reflect fundamental similarities in the structure of human thought (see </span><a data-dcnode-id="6114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Structuralism" title="Structuralism"><span data-dcnode-id="6115" instrument_node="">structuralism</span></a><span data-dcnode-id="6113" instrument_node="">). By the mid-20th century, the number of examples of people skipping stages, such as going from </span><a class="mw-redirect" data-dcnode-id="6111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hunter-gatherers" title="Hunter-gatherers"><span data-dcnode-id="6112" instrument_node="">hunter-gatherers</span></a><span data-dcnode-id="6110" instrument_node=""> to post-industrial service occupations in one generation, were so numerous that 19th-century evolutionism was effectively disproved.</span><sup class="reference" data-dcnode-id="6107" id="cite_ref-8"><a data-dcnode-id="6108" href="#cite_note-8"><span data-dcnode-id="6109" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6106" instrument_node="">
</span></p><span data-dcnode-id="6104" instrument_node="">
</span><h3 data-dcnode-id="6094"><span class="mw-headline" data-dcnode-id="6102" id="Cultural_relativism"><span data-dcnode-id="6103" instrument_node="">Cultural relativism</span></span><span class="mw-editsection" data-dcnode-id="6095"><span class="mw-editsection-bracket" data-dcnode-id="6100"><span data-dcnode-id="6101" instrument_node="">[</span></span><a data-dcnode-id="6098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D5" title="Edit section: Cultural relativism"><span data-dcnode-id="6099" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6096"><span data-dcnode-id="6097" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6093" instrument_node="">
</span><link data-dcnode-id="6092" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6088" role="note"><span data-dcnode-id="6091" instrument_node="">Main article: </span><a data-dcnode-id="6089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_relativism" title="Cultural relativism"><span data-dcnode-id="6090" instrument_node="">Cultural relativism</span></a></div><span data-dcnode-id="6087" instrument_node="">
</span><p data-dcnode-id="6056"><span data-dcnode-id="6086" instrument_node="">Cultural relativism is a principle that was established as </span><a data-dcnode-id="6084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axiom" title="Axiom"><span data-dcnode-id="6085" instrument_node="">axiomatic</span></a><span data-dcnode-id="6083" instrument_node=""> in </span><a data-dcnode-id="6081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthropology" title="Anthropology"><span data-dcnode-id="6082" instrument_node="">anthropological</span></a><span data-dcnode-id="6080" instrument_node=""> research by </span><a data-dcnode-id="6078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Boas" title="Franz Boas"><span data-dcnode-id="6079" instrument_node="">Franz Boas</span></a><span data-dcnode-id="6077" instrument_node=""> and later popularized by his students.  Boas first articulated the idea in 1887: "...civilization is not something absolute, but ... is relative, and ... our ideas and conceptions are true only so far as our civilization goes."</span><sup class="reference" data-dcnode-id="6074" id="cite_ref-Levitsky_2009_115–133_9-0"><a data-dcnode-id="6075" href="#cite_note-Levitsky_2009_115%E2%80%93133-9"><span data-dcnode-id="6076" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6073" instrument_node=""> Although Boas did not coin the term, it became common among anthropologists after Boas' death in 1942, to express their synthesis of a number of ideas Boas had developed. Boas believed that the sweep of cultures, to be found in connection with any sub-species, is so vast and pervasive that there cannot be a relationship between culture and </span><a class="mw-redirect" data-dcnode-id="6071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Race_%28classification_of_humans%29" title="Race (classification of humans)"><span data-dcnode-id="6072" instrument_node="">race</span></a><span data-dcnode-id="6070" instrument_node="">.</span><sup class="reference" data-dcnode-id="6067" id="cite_ref-10"><a data-dcnode-id="6068" href="#cite_note-10"><span data-dcnode-id="6069" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6066" instrument_node=""> Cultural relativism involves specific </span><a data-dcnode-id="6064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epistemology" title="Epistemology"><span data-dcnode-id="6065" instrument_node="">epistemological</span></a><span data-dcnode-id="6063" instrument_node=""> and methodological claims.  Whether or not these claims require a specific </span><a data-dcnode-id="6061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethics" title="Ethics"><span data-dcnode-id="6062" instrument_node="">ethical</span></a><span data-dcnode-id="6060" instrument_node=""> stance is a matter of debate. This principle should not be confused with </span><a data-dcnode-id="6058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moral_relativism" title="Moral relativism"><span data-dcnode-id="6059" instrument_node="">moral relativism</span></a><span data-dcnode-id="6057" instrument_node="">.
</span></p><p data-dcnode-id="6028"><span data-dcnode-id="6055" instrument_node="">Cultural relativism was in part a response to Western </span><a data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnocentrism" title="Ethnocentrism"><span data-dcnode-id="6054" instrument_node="">ethnocentrism</span></a><span data-dcnode-id="6052" instrument_node="">. Ethnocentrism may take obvious forms, in which one consciously believes that one's people's arts are the most beautiful, values the most virtuous, and beliefs the most truthful. Boas, originally trained in </span><a data-dcnode-id="6050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physics" title="Physics"><span data-dcnode-id="6051" instrument_node="">physics</span></a><span data-dcnode-id="6049" instrument_node=""> and </span><a data-dcnode-id="6047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geography" title="Geography"><span data-dcnode-id="6048" instrument_node="">geography</span></a><span data-dcnode-id="6046" instrument_node="">, and heavily influenced by the thought of </span><a data-dcnode-id="6044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immanuel_Kant" title="Immanuel Kant"><span data-dcnode-id="6045" instrument_node="">Kant</span></a><span data-dcnode-id="6043" instrument_node="">, </span><a data-dcnode-id="6041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Gottfried_Herder" title="Johann Gottfried Herder"><span data-dcnode-id="6042" instrument_node="">Herder</span></a><span data-dcnode-id="6040" instrument_node="">, and </span><a data-dcnode-id="6038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_von_Humboldt" title="Alexander von Humboldt"><span data-dcnode-id="6039" instrument_node="">von Humboldt</span></a><span data-dcnode-id="6037" instrument_node="">, argued that one's culture may mediate and thus limit one's perceptions in less obvious ways. This understanding of culture confronts anthropologists with two problems: first, how to escape the unconscious bonds of one's own culture, which inevitably bias our perceptions of and reactions to the world, and second, how to make sense of an unfamiliar culture.  The principle of cultural relativism thus forced anthropologists to develop innovative methods and heuristic strategies.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6030" style="white-space:nowrap;"><span data-dcnode-id="6036" instrument_node="">[</span><i data-dcnode-id="6032"><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6034" title="This claim needs references to reliable sources. (August 2020)"><span data-dcnode-id="6035" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6031" instrument_node="">]</span></sup><span data-dcnode-id="6029" instrument_node="">
</span></p><p data-dcnode-id="6019"><span data-dcnode-id="6027" instrument_node="">Boas and his students realized that if they were to conduct scientific research in other cultures, they would need to employ methods that would help them escape the limits of their own ethnocentrism.  One such method is that of </span><a data-dcnode-id="6025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnography" title="Ethnography"><span data-dcnode-id="6026" instrument_node="">ethnography</span></a><span data-dcnode-id="6024" instrument_node="">: basically, they advocated living with people of another culture for an extended period of time, so that they could learn the local language and be enculturated, at least partially, into that culture. In this context, cultural relativism is of fundamental methodological importance, because it calls attention to the importance of the local context in understanding the meaning of particular human beliefs and activities.  Thus, in 1948 Virginia Heyer wrote, "Cultural relativity, to phrase it in starkest abstraction, states the relativity of the part to the whole.  The part gains its cultural significance by its place in the whole, and cannot retain its integrity in a different situation."</span><sup class="reference" data-dcnode-id="6021" id="cite_ref-11"><a data-dcnode-id="6022" href="#cite_note-11"><span data-dcnode-id="6023" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6020" instrument_node="">
</span></p><span data-dcnode-id="6018" instrument_node="">
</span><h3 data-dcnode-id="6008"><span class="mw-headline" data-dcnode-id="6016" id="Theoretical_approaches"><span data-dcnode-id="6017" instrument_node="">Theoretical approaches</span></span><span class="mw-editsection" data-dcnode-id="6009"><span class="mw-editsection-bracket" data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">[</span></span><a data-dcnode-id="6012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCultural_anthropology%26action%3Dedit%26section%3D6" title="Edit section: Theoretical approaches"><span data-dcnode-id="6013" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6007" instrument_node="">
</span><div class="div-col" data-dcnode-id="5958" style="column-width: 22em;"><span data-dcnode-id="6004" instrument_node="">
