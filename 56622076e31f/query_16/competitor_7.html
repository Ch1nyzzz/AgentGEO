</span><meta content="The recent technological development has opened up innovative scenarios in the field of intangible cultural heritage (ICH) education and preservation. Main aim of this paper is to present a study, whose objective was to investigate whether and to what extent technologies can play a role in the ICH preservation and education. The study was conducted in the context of i-Treasures, a project funded by the European Community. During the project, a platform has been created, which provides different types of services that can meet the demands of different types of users in the ICH education domain. In the paper, the process followed for the implementation of such platform is described, starting from the analysis of the user needs, down to the development of the various innovative features. These encompass not only informative functionalities but—even more importantly—features allowing sensorimotor learning experiences for the user, who—by wearing innovative sensors—can practice rare forms of dancing or singing and get feedback about the correctness of the performance. The paper presents the methodology and findings of the user evaluation and then points out the main strong points and weaknesses of using innovative technologies in the ICH preservation and education." data-dcnode-id="2708" name="dc.description"><span data-dcnode-id="2707" instrument_node="">

</span><meta content="Innovative technologies for intangible cultural heritage education and preservation: the case of i-Treasures - Personal and Ubiquitous Computing" data-dcnode-id="2538" property="og:title"><span data-dcnode-id="2537" instrument_node="">
</span><meta content="The recent technological development has opened up innovative scenarios in the field of intangible cultural heritage (ICH) education and preservation. Main aim of this paper is to present a study, whose objective was to investigate whether and to what extent technologies can play a role in the ICH preservation and education. The study was conducted in the context of i-Treasures, a project funded by the European Community. During the project, a platform has been created, which provides different types of services that can meet the demands of different types of users in the ICH education domain. In the paper, the process followed for the implementation of such platform is described, starting from the analysis of the user needs, down to the development of the various innovative features. These encompass not only informative functionalities but—even more importantly—features allowing sensorimotor learning experiences for the user, who—by wearing innovative sensors—can practice rare forms of dancing or singing and get feedback about the correctness of the performance. The paper presents the methodology and findings of the user evaluation and then points out the main strong points and weaknesses of using innovative technologies in the ICH preservation and education." data-dcnode-id="2536" property="og:description"><span data-dcnode-id="2535" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="2063" data-gtm-vis-first-on-screen-50443292_562="1490" data-gtm-vis-first-on-screen-50443292_563="1491" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1490" data-gtm-vis-recent-on-screen-50443292_563="1491" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2064" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2068" id="Abs1"><span data-dcnode-id="2069" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2065" id="Abs1-content"><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">The recent technological development has opened up innovative scenarios in the field of intangible cultural heritage (ICH) education and preservation. Main aim of this paper is to present a study, whose objective was to investigate whether and to what extent technologies can play a role in the ICH preservation and education. The study was conducted in the context of i-Treasures, a project funded by the European Community. During the project, a platform has been created, which provides different types of services that can meet the demands of different types of users in the ICH education domain. In the paper, the process followed for the implementation of such platform is described, starting from the analysis of the user needs, down to the development of the various innovative features. These encompass not only informative functionalities but—even more importantly—features allowing sensorimotor learning experiences for the user, who—by wearing innovative sensors—can practice rare forms of dancing or singing and get feedback about the correctness of the performance. The paper presents the methodology and findings of the user evaluation and then points out the main strong points and weaknesses of using innovative technologies in the ICH preservation and education.</span></p></div></div></section><span data-dcnode-id="2062" instrument_node="">
</span><section data-dcnode-id="2022" data-gtm-vis-first-on-screen-50443292_562="1491" data-gtm-vis-first-on-screen-50443292_563="1492" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1491" data-gtm-vis-recent-on-screen-50443292_563="1492" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2023" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2060" id="Sec1"><span data-dcnode-id="2061" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2024" id="Sec1-content"><p data-dcnode-id="2052"><span data-dcnode-id="2059" instrument_node="">This paper addresses a peculiar area of the cultural heritage, namely the intangible cultural heritage domain. The concept of “intangible cultural heritage” (from now, on ICH) “includes traditions or living expressions inherited from our ancestors and passed on to our descendants, such as oral traditions, performing arts, social practices, rituals, festive events, knowledge and practices concerning nature and the universe or the knowledge and skills to produce traditional crafts”.</span><sup data-dcnode-id="2054"><a data-dcnode-id="2055" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Footnote </span></span><span data-dcnode-id="2056" instrument_node="">1</span></a></sup><span data-dcnode-id="2053" instrument_node="">
</span></p><p data-dcnode-id="2044"><span data-dcnode-id="2051" instrument_node="">In 2003, the United Nations Educational, Scientific and Cultural Organization (UNESCO) issued the Convention for the Safeguarding of the intangible cultural heritage</span><sup data-dcnode-id="2046"><a data-dcnode-id="2047" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Footnote </span></span><span data-dcnode-id="2048" instrument_node="">2</span></a></sup><span data-dcnode-id="2045" instrument_node=""> to protect “the practices, representations, expressions, knowledge, skills—as well as the instruments, objects, artifacts and cultural spaces associated therewith—that communities, groups and, in some cases, individuals recognize as part of their cultural heritage” (art. 2, Convention).</span></p><p data-dcnode-id="2039"><span data-dcnode-id="2043" instrument_node="">In doing so, UNESCO recognized that ICH needs a different granting approach from the one adopted to maintain and preserve tangible ones (like monuments, sites) that is usually based on a state-center approach; indeed, in the case of ICH, it is necessary primary to involve the performers’ communities in the protection of their traditions [</span><a aria-label="Reference 1" data-dcnode-id="2041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d248110881e406" title="Severo M, Venturini T (2015) Intangible cultural heritage webs: comparing national networks with digital methods. New Media Soc 18(8):1–20"><span data-dcnode-id="2042" instrument_node="">1</span></a><span data-dcnode-id="2040" instrument_node="">].</span></p><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Recently, the rapid and progressive improvement of technologies has opened new ways to go in the preservation of ICH, as they potentially allow new kinds of user interactions, potentially going beyond the encyclopedic approach that has characterized so far most of the ongoing projects aimed at ICH safeguarding.</span></p><p data-dcnode-id="2029"><span data-dcnode-id="2036" instrument_node="">While in the tangible cultural heritage domain, a number of studies have already pointed out the potential of technology to create innovative learning environments [</span><a aria-label="Reference 2" data-dcnode-id="2034" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d248110881e416" title="Chianese A, Piccialli F, Valente I (2015) Smart environments and cultural heritage: a novel approach to create intelligent cultural spaces. J Locat Based Serv 9(3):209–234"><span data-dcnode-id="2035" instrument_node="">2</span></a><span data-dcnode-id="2033" instrument_node="">–</span><a aria-label="Reference 4" data-dcnode-id="2031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d248110881e419" title="Mortara M, Catalano CE, Bellotti F, Fiucci G, Houry-Panchetti M, Petridis P (2014) Learning cultural heritage by serious games. J Cult Herit 15(3):318–325"><span data-dcnode-id="2032" instrument_node="">4</span></a><span data-dcnode-id="2030" instrument_node="">], in the ICH sector, the number of studies related to the potential of technologies for teaching and learning is very limited.</span></p><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">To fill in this gap, the authors have devoted their attention to study whether and to what extent technology can play a role in ICH preservation and education. The results of this research are presented in this paper, which describes in particular the experience carried out within i-Treasures, a European project started in 2013. The project aimed to design and develop an online platform, to preserve and pass down some intangible and rare arts. As it will be described in the following, the platform provides different types of functionalities devoted to various types of users of the ICH domains. It is important to note that—differently from other existing projects—i-Treasures does not address one single artistic expression, but rather deals with four different areas of ICH, namely: rare traditional singing, rare dance interactions, traditional craftsmanship and contemporary music composition. Thus an important added value of i-Treasures is that the main results of the project have got not only an impact at the level of one ICH, but have potentially a wider impact on several ICH domains and have got great potential for transferability. Another added value of the project, in line with what was suggested in the 2003 Convention, is its ability to involve in the overall design process the communities of experts and performers of the ICHs at hand.</span></p><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">In the following, the paper presents a section about the existing work and literature in the field, followed by a section that presents the context of the i-Treasures project: Here a classification of the users and their needs is also introduced, and the process followed during the project to build the platform for the ICH transmission and preservation is illustrated. The subsequent section describes the i-Treasures platform, and then data are presented deriving from the user evaluation of the platform. The paper ends with a discussion of the data that shed light on the strong points and weaknesses of the platform itself, as well as on the process that led to its development. This way, in the conclusive section, we will reflect on the main lessons learnt from this experience and identify threads for future work in this emerging research line.</span></p></div></div></section><section data-dcnode-id="1977" data-gtm-vis-first-on-screen-50443292_562="1491" data-gtm-vis-first-on-screen-50443292_563="1492" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1491" data-gtm-vis-recent-on-screen-50443292_563="1492" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Background and related work"><div class="c-article-section" data-dcnode-id="1978" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2020" id="Sec2"><span data-dcnode-id="2021" instrument_node="">Background and related work</span></h2><div class="c-article-section__content" data-dcnode-id="1979" id="Sec2-content"><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">UNESCO can be considered the main guardian of the world cultural heritage. As already mentioned, in terms of ICH, the 2003 Convention is the main normative document regarding the protection of these traditional artistic expressions. It defines the main intellectual and operational steps to be followed by national governments and at international level, to protect intangible heritage.</span></p><p data-dcnode-id="2013"><span data-dcnode-id="2017" instrument_node="">In the last two decades, UNESCO has supported several projects in order to preserve ICH. However, most of these projects had as ultimate goal to build repositories of information expressed in an encyclopedic way, rather than to foster the actual passing on and learning of intangible traditions. This can be related to the fact that the 2003 Convention recognizes registers and inventories as a first step for safeguarding intangible heritage. In these projects, even when technologies are adopted, these have merely an archival purpose [</span><a aria-label="Reference 1" data-dcnode-id="2015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d248110881e439" title="Severo M, Venturini T (2015) Intangible cultural heritage webs: comparing national networks with digital methods. New Media Soc 18(8):1–20"><span data-dcnode-id="2016" instrument_node="">1</span></a><span data-dcnode-id="2014" instrument_node="">].</span></p><p data-dcnode-id="1996"><span data-dcnode-id="2012" instrument_node="">In other very few cases, technologies have started been adopted for supporting teaching and learning of less rare cultural expressions (like modern dancing or playing musical instruments) [</span><a aria-label="Reference 5" data-dcnode-id="2010" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d248110881e445" title="Aspasia D, Hatziharistos D, Koutsouba M, Tyrovola V (2011) The use of technology in movement and dance education: recent practices and future perspectives. Proc Soc Behav Sci 15:3355–3361"><span data-dcnode-id="2011" instrument_node="">5</span></a><span data-dcnode-id="2009" instrument_node="">–</span><a aria-label="Reference 8" data-dcnode-id="2007" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d248110881e448" title="Ho Wai-Chung (2004) Use of information technology and music learning in the search for quality education. Br J Educ Technol 35(1):57–67"><span data-dcnode-id="2008" instrument_node="">8</span></a><span data-dcnode-id="2006" instrument_node="">]. Even in these contexts, though, technologies mainly take the form of learning management systems where multimedia materials are stored for study; in some cases, communication tools are also made available to allow discussion among learners and with teachers. Recordings of performances and annotated video tools are occasionally integrated to support teaching/learning activities [</span><a aria-label="Reference 5" data-dcnode-id="2004" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d248110881e451" title="Aspasia D, Hatziharistos D, Koutsouba M, Tyrovola V (2011) The use of technology in movement and dance education: recent practices and future perspectives. Proc Soc Behav Sci 15:3355–3361"><span data-dcnode-id="2005" instrument_node="">5</span></a><span data-dcnode-id="2003" instrument_node="">–</span><a aria-label="Reference 8" data-dcnode-id="2001" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d248110881e454" title="Ho Wai-Chung (2004) Use of information technology and music learning in the search for quality education. Br J Educ Technol 35(1):57–67"><span data-dcnode-id="2002" instrument_node="">8</span></a><span data-dcnode-id="2000" instrument_node="">]. To the best of our knowledge, though, none of these studies envisage the direct involvement of learners in practicing one artistic expression [</span><a aria-label="Reference 5" data-dcnode-id="1998" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d248110881e457" title="Aspasia D, Hatziharistos D, Koutsouba M, Tyrovola V (2011) The use of technology in movement and dance education: recent practices and future perspectives. Proc Soc Behav Sci 15:3355–3361"><span data-dcnode-id="1999" instrument_node="">5</span></a><span data-dcnode-id="1997" instrument_node="">].</span></p><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">With the recent improvement of available technologies (such as sensors), though, it is becoming clear that technologies can in principle play a completely different role and open up innovative educational scenarios; for example, the user could wear sensors and his/her performance can be “captured” in such a way that s/he gets feedback about the correctness of the movements. This is what happens; for example, in some of the most popular games available on the market, where the user—by wearing motion sensors—can experience sport playing, action gaming, dancing, etc. Usually in these contexts, the main goal is fostering users’ leisure and engagement, rather than teaching and learning.</span></p><p data-dcnode-id="1980"><span data-dcnode-id="1993" instrument_node="">The case of i-Treasures represents a novelty because the motor sensors are used to capture, analyze and model the complexity of rare intangible performances with educational purposes [</span><a aria-label="Reference 9" data-dcnode-id="1991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d248110881e467" title="Pozzi F, Alivizatou M, Dagnino FM, Ott M (2015) Going beyond preservation: how to support technology-enhanced learning in ICH education. Int J Herit Digit Era 4:21–40. doi:
                    10.1260/2047-4970.4.1.21
                    
                  
                        "><span data-dcnode-id="1992" instrument_node="">9</span></a><span data-dcnode-id="1990" instrument_node="">]. A similar approach was adopted in 2008 in the context of the i-Maestro project,</span><sup data-dcnode-id="1985"><a data-dcnode-id="1986" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Footnote </span></span><span data-dcnode-id="1987" instrument_node="">3</span></a></sup><span data-dcnode-id="1984" instrument_node=""> where sensors were used to teach and learn musical skills [</span><a aria-label="Reference 10" data-dcnode-id="1982" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d248110881e483" title="Glushkova A, Katsouli E, Kourvoulis G, Manitsaris A, Volioti C (2015) A hybrid content-learning management system for education and access to intangible cultural heritage. In: Proceeding of the 17th international conference on computer supported education (CSEDU 2015)"><span data-dcnode-id="1983" instrument_node="">10</span></a><span data-dcnode-id="1981" instrument_node="">]. In i-Treasures, this is done in different ICH domains and—for some of the ICHs considered—given that no sensors were available on the market, and the project has developed ad hoc sensors and has used them to support learning of these expressions.</span></p></div></div></section><section data-dcnode-id="1787" data-gtm-vis-first-on-screen-50443292_562="1491" data-gtm-vis-first-on-screen-50443292_563="1492" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1491" data-gtm-vis-recent-on-screen-50443292_563="1492" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The context and the user needs analysis"><div class="c-article-section" data-dcnode-id="1788" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1975" id="Sec3"><span data-dcnode-id="1976" instrument_node="">The context and the user needs analysis</span></h2><div class="c-article-section__content" data-dcnode-id="1789" id="Sec3-content"><p data-dcnode-id="1964"><span data-dcnode-id="1974" instrument_node="">
As already mentioned, i-Treasures</span><sup data-dcnode-id="1969"><a data-dcnode-id="1970" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Footnote </span></span><span data-dcnode-id="1971" instrument_node="">4</span></a></sup><span data-dcnode-id="1968" instrument_node=""> is a project funded by the European Community, making an extensive use of cutting edge ICT and sensor technologies, with the aim of developing “an open and extendable platform providing access to ICH resources, enabling knowledge exchange between researchers and contributing to the transmission of rare know-how from living human treasures to apprentices” [</span><a aria-label="Reference 11" data-dcnode-id="1966" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d248110881e507" title="Pozzi F, Antonaci A, Dagnino FM, Ott M, Tavella M (2014) A participatory approach to define user requirements of a platform for intangible cultural heritage education. In: Proceeding of the 9th international conference on computer vision theory and applications (VISAPP2014), vol 2, pp 782–788"><span data-dcnode-id="1967" instrument_node="">11</span></a><span data-dcnode-id="1965" instrument_node="">].</span></p><p data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">Thus, the main aim of i-Treasures is to provide new methods, and employ and create innovative tools, to pass on rare ICH knowledge to new generations. To do so, in the project we first “captured” the key aspects of the different ICHs by tracking expert performers wearing sensors. Then we applied modern techniques of semantic multimedia analysis and built “models of performances”, thus providing the widest range of information ever had at least for some of the intangible expressions considered. This wealth of information can respond to various scopes and educational needs and could be used to propose different learning and teaching paths. This can take the learners beyond the concept of “learning ICH by imitation”, giving the possibility to have multimodal and multisensory learning experiences, carrying out individual trials and receiving appropriate feedback. In this way, the learner can improve his/her level of competence in an easier, more direct, quicker and effective way [</span><a aria-label="Reference 12" data-dcnode-id="1961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d248110881e513" title="Dias BD, Diniz JA, Hadjileontiadis LJ (2014) Towards an intelligent learning management system under blended learning. Springer, Berlin, p 235"><span data-dcnode-id="1962" instrument_node="">12</span></a><span data-dcnode-id="1960" instrument_node="">].</span></p><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">As already mentioned, i-Treasures tackles four different areas of ICH:</span></p><ul class="u-list-style-bullet" data-dcnode-id="1931"><span data-dcnode-id="1956" instrument_node="">
</span><li data-dcnode-id="1951"><span data-dcnode-id="1955" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Rare traditional singing;</span></p><span data-dcnode-id="1952" instrument_node="">
</span></li><span data-dcnode-id="1950" instrument_node="">
</span><li data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Rare dancing interactions;</span></p><span data-dcnode-id="1946" instrument_node="">
</span></li><span data-dcnode-id="1944" instrument_node="">
</span><li data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Traditional craftsmanship;</span></p><span data-dcnode-id="1940" instrument_node="">
</span></li><span data-dcnode-id="1938" instrument_node="">
</span><li data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Contemporary music composition.</span></p><span data-dcnode-id="1934" instrument_node="">
</span></li><span data-dcnode-id="1932" instrument_node="">
</span></ul><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1929" instrument_node="">Each of the previous ICH domains was instantiated in different examples, as it is shown in Table&nbsp;</span><a data-dcnode-id="1927" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1928" instrument_node="">1</span></a><span data-dcnode-id="1926" instrument_node="">. In the table, the first column contains the main areas of intangible cultural heritage; the second column shows the list of examples of ICH considered by the project; the third one contains the original country of the ICH.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1910" data-test="inline-table" id="table-1"><figure data-dcnode-id="1911"><figcaption class="c-article-table__figcaption" data-dcnode-id="1922"><b data-dcnode-id="1923" data-test="table-caption" id="Tab1"><span data-dcnode-id="1924" instrument_node="">Table&nbsp;1 ICH examples in i-Treasures’ platform</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1912"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1913" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/tables/1" rel="nofollow"><span data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1914" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1915" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1916" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1919" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1918" fill-rule="evenodd"></path><span data-dcnode-id="1917" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">In order to design and develop the i-Treasures platform, the project started from a user need analysis. Potential use cases for the platform might range from providing “low level” information for the generic user, who simply wants to know more about one (or more) ICH, to offering complete educational paths for another user, who is deeply interested in learning how to perform one artistic expression.</span></p><p data-dcnode-id="1902"><span data-dcnode-id="1906" instrument_node="">In particular, depending on the kind of information, a user might expect to find on the i-Treasures platform, and it is possible to divide users into four different categories (see Table&nbsp;</span><a data-dcnode-id="1904" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1905" instrument_node="">2</span></a><span data-dcnode-id="1903" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1887" data-test="inline-table" id="table-2"><figure data-dcnode-id="1888"><figcaption class="c-article-table__figcaption" data-dcnode-id="1899"><b data-dcnode-id="1900" data-test="table-caption" id="Tab2"><span data-dcnode-id="1901" instrument_node="">Table&nbsp;2 Classification of users and users’ needs</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1889"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="1890" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/tables/2" rel="nofollow"><span data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1891" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1892" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1893" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1896" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1895" fill-rule="evenodd"></path><span data-dcnode-id="1894" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1886" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1885" instrument_node="">As it is shown in Table&nbsp;</span><a data-dcnode-id="1883" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1884" instrument_node="">2</span></a><span data-dcnode-id="1882" instrument_node="">, a basic user from the public may have got a generic interest in one or more ICH: S/he needs to find “basic” information about the cultural expression and possibly to be adequately supported in searching this information. Data about the ICH origins, its current geographical location, its basic features, etc., are examples of data a basic user may want to look for and find on the i-Treasures platform. These kinds of needs are labeled </span><i data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">informative</span></i><span data-dcnode-id="1879" instrument_node="">.</span></p><p data-dcnode-id="1873"><span data-dcnode-id="1877" instrument_node="">A scholar, an expert or a teacher of one ICH, will also need to find information, but he will need data and contents of a different kind, able to support research and deep study of one specific phenomenon. Recorded data of performances and raw data tracked by various sensors are examples of data an expert may be interested in. These kinds of needs are labeled as </span><i data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">research/enquiry needs</span></i><span data-dcnode-id="1874" instrument_node="">.</span></p><p data-dcnode-id="1865"><span data-dcnode-id="1872" instrument_node="">As far as the learner is concerned, it is possible to distinguish between a learner who needs to know more about one specific cultural expression at a theoretical level (</span><i data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">cognitive learning needs</span></i><span data-dcnode-id="1869" instrument_node="">) and an apprentice, i.e., a learner, who wants to acquire/improve her performing skills (</span><i data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">motor learning needs</span></i><span data-dcnode-id="1866" instrument_node="">).</span></p><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">While the former type of learner will need information and data about the ICH, structured in such a way to support an effective learning process, the latter one will also need the platform to support a motor learning experience through other kinds of features, such as the possibility to observe and perform the ICH, be recorded, and possibly get feedback regarding the correctness of the performance.</span></p><p data-dcnode-id="1846"><span data-dcnode-id="1862" instrument_node="">In line with the most common guidelines for designing a software product, the process of definition of the platform user requirements started from the four types of needs identified above [</span><a aria-label="Reference 13" data-dcnode-id="1860" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d248110881e908" title="Pozzi F, Cozzani G, Dagnino FM, Ott M, Tavella M (2015) Deliverable no: D2.3 second report on user requirements identification and analysis. 
                    http://www.i-treasures.eu/filedepot?fid=1048
                    
                  . Accessed 28 July 2016"><span data-dcnode-id="1861" instrument_node="">13</span></a><span data-dcnode-id="1859" instrument_node="">] and then involved a number of stakeholders to understand their needs and to decide with them which functionalities the system should be able to offer [</span><a aria-label="Reference 14" data-dcnode-id="1857" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d248110881e911" title="Wiegers KE (1996) Creating a software engineering culture. Dorset House Publishing, NewYork"><span data-dcnode-id="1858" instrument_node="">14</span></a><span data-dcnode-id="1856" instrument_node="">]. Thus in the project, we took a </span><i data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">participatory approach</span></i><span data-dcnode-id="1853" instrument_node=""> that was based on a close collaboration with and among all the stakeholders [</span><a aria-label="Reference 11" data-dcnode-id="1851" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d248110881e917" title="Pozzi F, Antonaci A, Dagnino FM, Ott M, Tavella M (2014) A participatory approach to define user requirements of a platform for intangible cultural heritage education. In: Proceeding of the 9th international conference on computer vision theory and applications (VISAPP2014), vol 2, pp 782–788"><span data-dcnode-id="1852" instrument_node="">11</span></a><span data-dcnode-id="1850" instrument_node="">]. In order to collect data and information from the users, we organized focus groups and workshops and used interviews and questionnaires, thus following more ethnographic approaches based on the direct observation of the users’ actions/needs [</span><a aria-label="Reference 15" data-dcnode-id="1848" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d248110881e920" title="Pozzi F, Alivizatou M, Antonaci A, Dagnino FM, Ott M (2013)i-Treasures project—deliverable no: D2.1 First report on user requirements identification and analysis. 
                    http://www.i-treasures.eu/filedepot?fid=214
                    
                  . Accessed 28 July 2016"><span data-dcnode-id="1849" instrument_node="">15</span></a><span data-dcnode-id="1847" instrument_node="">].</span></p><p data-dcnode-id="1835"><span data-dcnode-id="1845" instrument_node="">Basing on this huge corpus of data, we defined the preliminary list of requirements, that was subdivided in five different functionality areas (Information, education and research; Educational process; ICH capture and analysis; Data fusion and semantic analysis; 3D visualization for sensorimotor learning), responding to the categories of user’s needs identified above (see Fig.&nbsp;</span><a data-dcnode-id="1843" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1844" instrument_node="">1</span></a><span data-dcnode-id="1842" instrument_node="">). In particular, the informative and enquiry/research needs are addressed by the functionality called </span><i data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Information</span></i><span data-dcnode-id="1839" instrument_node="">, </span><i data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">education and research</span></i><span data-dcnode-id="1836" instrument_node="">, through which the system allows the user to access generic and basic information about the various ICHs (for the general public) and raw data and scientific materials (for scholars and researchers).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1811" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="1812"><figcaption data-dcnode-id="1832"><b class="c-article-section__figure-caption" data-dcnode-id="1833" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1834" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1823"><div class="c-article-section__figure-item" data-dcnode-id="1827"><a class="c-article-section__figure-link" data-dcnode-id="1828" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/1" rel="nofollow"><picture data-dcnode-id="1829"><source data-dcnode-id="1831" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1830" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1824" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Requirements’ classification and user needs</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1813"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1814" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/1" rel="nofollow"><span data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1815" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1816" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1817" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1820" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1819" fill-rule="evenodd"></path><span data-dcnode-id="1818" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">To address the cognitive learning needs, the system has been featured with a functionality called “Educational process”, through which the user is purposed structured learning paths through a learning management system, enriched with ad hoc learning materials and specific educational activities for each ICH.</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Lastly, in order to allow motor learning, the system is featured with three distinct functionalities: “ICH capture and analysis” (to capture the user’s performance); “Data fusion and semantic analysis” (to analyze and fuse the captured data); “3D visualization for sensorimotor learning” to give feedback to the user about his/her performance.</span></p><p data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">In Fig.&nbsp;</span><a data-dcnode-id="1803" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1804" instrument_node="">1</span></a><span data-dcnode-id="1802" instrument_node="">, a synthetically map is provided, representing the relationships between system functionalities and users’ needs.</span></p><p data-dcnode-id="1790"><span data-dcnode-id="1800" instrument_node="">The requirements definition process was iterative and encompassed a later stage of requirements revision, based on the evaluation of the first prototype of the platform [</span><a aria-label="Reference 16" data-dcnode-id="1798" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d248110881e968" title="Manitsaris A, Katsouli E, Katos A, Hadjileontiadis L, Charisis V, Hadjidimitriou S (2015), i-Treasures project—deliverable no: D7.2 first evaluation report. 
                    http://www.i-treasures.eu/filedepot?fid=963
                    
                  . Accessed 28 July 2016"><span data-dcnode-id="1799" instrument_node="">16</span></a><span data-dcnode-id="1797" instrument_node="">]. During that stage, in line with the approach already taken to define the original requirements, we again followed a systemic and participatory approach. The process encompassed the analysis of the current level of accomplishment of the original requirements and their check against the users’ perceptions/opinions. The results of this phase were the definition of a new list of revised and updated requirements [</span><a aria-label="Reference 13" data-dcnode-id="1795" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d248110881e971" title="Pozzi F, Cozzani G, Dagnino FM, Ott M, Tavella M (2015) Deliverable no: D2.3 second report on user requirements identification and analysis. 
                    http://www.i-treasures.eu/filedepot?fid=1048
                    
                  . Accessed 28 July 2016"><span data-dcnode-id="1796" instrument_node="">13</span></a><span data-dcnode-id="1794" instrument_node="">] which were then used to develop the final version of the platform presented in the following section [</span><a aria-label="Reference 17" data-dcnode-id="1792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d248110881e974" title="Manitsaris A, Kourvoulis G, Nikolopoulos S, Chantas G, Grammalidis N, Yilmaz E, Pozzi F, Dagnino FM, Cotescu M (2015) i-Treasures project—deliverable no: D5.4 first version of the integrated platform. 
                    http://www.i-treasures.eu/filedepot?cid=61&amp;fid=959
                    
                  . Accessed 27 Sept 2016"><span data-dcnode-id="1793" instrument_node="">17</span></a><span data-dcnode-id="1791" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="1544" data-title="The i-Treasures platform"><div class="c-article-section" data-dcnode-id="1545" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1785" id="Sec4"><span data-dcnode-id="1786" instrument_node="">The i-Treasures platform</span></h2><div class="c-article-section__content" data-dcnode-id="1546" id="Sec4-content"><p data-dcnode-id="1780"><span data-dcnode-id="1784" instrument_node="">The following schema (Fig.&nbsp;</span><a data-dcnode-id="1782" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1783" instrument_node="">2</span></a><span data-dcnode-id="1781" instrument_node="">) illustrates the i-Treasures platform architecture.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1756" data-test="figure" data-title="Fig.&nbsp;2" id="figure-2"><figure data-dcnode-id="1757"><figcaption data-dcnode-id="1777"><b class="c-article-section__figure-caption" data-dcnode-id="1778" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="1779" instrument_node="">Fig.&nbsp;2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1768"><div class="c-article-section__figure-item" data-dcnode-id="1772"><a class="c-article-section__figure-link" data-dcnode-id="1773" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/2" rel="nofollow"><picture data-dcnode-id="1774"><source data-dcnode-id="1776" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="1775" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1769" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">i-Treasures’ platform: system architecture</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1758"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="1759" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/2" rel="nofollow"><span data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1760" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1761" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1762" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1765" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1764" fill-rule="evenodd"></path><span data-dcnode-id="1763" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1755" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1754" instrument_node="">In synthesis, the system incorporates a distributed approach, meaning that not all the data generated by the capturing and processing modules are stored centrally in one large database. Indeed the i-Treasures platform comprehends two different repositories that are developed with different aims: In particular, there is a local repository (that is the Web sites of users or content providers) where the raw recordings and low level features are stored and a central repository (that is the main i-Treasures’ Web site that lies on a relational database) that contains the medium-level features that are then processed in order to extract high-level features and metadata allowing the repository not only to be more lightweight and efficient, but also to remove the need for transferring large data sets over the network, significantly reducing the associated infrastructure, storage and bandwidth requirements [</span><a aria-label="Reference 17" data-dcnode-id="1752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d248110881e1009" title="Manitsaris A, Kourvoulis G, Nikolopoulos S, Chantas G, Grammalidis N, Yilmaz E, Pozzi F, Dagnino FM, Cotescu M (2015) i-Treasures project—deliverable no: D5.4 first version of the integrated platform. 
                    http://www.i-treasures.eu/filedepot?cid=61&amp;fid=959
                    
                  . Accessed 27 Sept 2016"><span data-dcnode-id="1753" instrument_node="">17</span></a><span data-dcnode-id="1751" instrument_node="">].</span></p><p data-dcnode-id="1745"><span data-dcnode-id="1749" instrument_node="">In line with the requirements defined as illustrated above, the i-Treasures platform was realized with the aim to satisfy all the different categories of user’s needs [</span><a aria-label="Reference 18" data-dcnode-id="1747" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d248110881e1015" title="Dagnino FM, Hadjileontiadis L, Ott M, Pozzi F (2014) An integrated platform for intangible cultural heritage education: discussing around the definition of requirements and evaluation criteria. J Comput Inf Technol (CIT) 22(4):277–292"><span data-dcnode-id="1748" instrument_node="">18</span></a><span data-dcnode-id="1746" instrument_node="">].</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node="">For example, in order to respond to the informative needs, the system is able to give access to general information and materials to users. For each domain and for each ICH, the system provides a list of informative pages, where the user can find a number of encyclopedic and theoretical information, regarding, for example, historical or geographical aspects. A collection of the pages that contain those kinds of information is shown in Fig.&nbsp;</span><a data-dcnode-id="1742" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1743" instrument_node="">3</span></a><span data-dcnode-id="1741" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1716" data-test="figure" data-title="Fig.&nbsp;3" id="figure-3"><figure data-dcnode-id="1717"><figcaption data-dcnode-id="1737"><b class="c-article-section__figure-caption" data-dcnode-id="1738" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1739" instrument_node="">Fig.&nbsp;3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1728"><div class="c-article-section__figure-item" data-dcnode-id="1732"><a class="c-article-section__figure-link" data-dcnode-id="1733" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/3" rel="nofollow"><picture data-dcnode-id="1734"><source data-dcnode-id="1736" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig3_HTML.gif?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1735" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig3_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1729" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">i-Treasures’ platform and informative needs</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1718"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1719" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/3" rel="nofollow"><span data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1720" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1721" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1722" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1725" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1724" fill-rule="evenodd"></path><span data-dcnode-id="1723" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node="">In order to satisfy the enquiry/research needs, the platform is able to provide selected access to raw data and scientific materials to users. Thus, the platform provides a list of multimedia files for each ICH, where the user can navigate using also a precise metadata search and can get detailed information regarding the “correct” performance of one intangible heritage. In Fig.&nbsp;</span><a data-dcnode-id="1712" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="1713" instrument_node="">4</span></a><span data-dcnode-id="1711" instrument_node="">, there are some illustrative pages about the Tsamiko Dance.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1686" data-test="figure" data-title="Fig.&nbsp;4" id="figure-4"><figure data-dcnode-id="1687"><figcaption data-dcnode-id="1707"><b class="c-article-section__figure-caption" data-dcnode-id="1708" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="1709" instrument_node="">Fig.&nbsp;4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1698"><div class="c-article-section__figure-item" data-dcnode-id="1702"><a class="c-article-section__figure-link" data-dcnode-id="1703" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/4" rel="nofollow"><picture data-dcnode-id="1704"><source data-dcnode-id="1706" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig4_HTML.gif?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="1705" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig4_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1699" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">i-Treasures’ platform and enquiry/research needs</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1688"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="1689" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/4" rel="nofollow"><span data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1690" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1691" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1692" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1695" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1694" fill-rule="evenodd"></path><span data-dcnode-id="1693" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1684" instrument_node="">As far as the learning needs at cognitive level are concerned, the system is able to propose structured learning paths to the user according to his/her needs. Indeed, i-Treasures platform offers a learning management system where the user can follow a complete course about the chosen intangible tradition and can navigate through different lessons composed by combinations of textual, audio and video resources and learning activities and structured according to increasing levels of complexity. In Fig.&nbsp;</span><a data-dcnode-id="1682" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="1683" instrument_node="">5</span></a><span data-dcnode-id="1681" instrument_node="">, an example of some lessons contained in the course of Canto a Tenore is proposed.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1656" data-test="figure" data-title="Fig.&nbsp;5" id="figure-5"><figure data-dcnode-id="1657"><figcaption data-dcnode-id="1677"><b class="c-article-section__figure-caption" data-dcnode-id="1678" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="1679" instrument_node="">Fig.&nbsp;5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1668"><div class="c-article-section__figure-item" data-dcnode-id="1672"><a class="c-article-section__figure-link" data-dcnode-id="1673" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/5" rel="nofollow"><picture data-dcnode-id="1674"><source data-dcnode-id="1676" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig5_HTML.gif?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="1675" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig5_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1669" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">i-Treasures’ platform and learning needs at a cognitive level</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1658"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="1659" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/5" rel="nofollow"><span data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1660" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1661" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1662" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1665" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1664" fill-rule="evenodd"></path><span data-dcnode-id="1663" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">In the end, as far as learning needs at motor level, the system is able to capture the user’s performance—provided that the user is wearing the appropriate sensors; then the system can fuse the captured data to make the semantic analysis and give a feedback to the user regarding the quality of his/her performance. This is what happens in the 3D visualization functionality for sensorimotor learning, where the user can make direct and immersive experience of the intangible culture. In particular, through such functionality, the user is proposed two different learning modes: the “Observe” mode and the “Practice” mode. In the Observe mode, the user can observe the performance of an expert, while in the Practice one, s/he can reproduce the expert’s performance, getting appropriate feedback from the system about the level of correctness of her/his execution. As an example, in Fig.&nbsp;</span><a data-dcnode-id="1652" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="1653" instrument_node="">6</span></a><span data-dcnode-id="1651" instrument_node=""> you can see the interface of the </span><i data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Observe</span></i><span data-dcnode-id="1648" instrument_node=""> mode in the Tsamiko dance 3D functionality. Here the user can observe the 3D avatar of the expert in action in the main window, while the three little windows on the right side contain a video clip of the real performance of the expert and two focusing on the legs of the avatar of the expert: The first one is proposed by a backwards prospective, while in the second, the prospective is given by a front camera.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1623" data-test="figure" data-title="Fig.&nbsp;6" id="figure-6"><figure data-dcnode-id="1624"><figcaption data-dcnode-id="1644"><b class="c-article-section__figure-caption" data-dcnode-id="1645" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="1646" instrument_node="">Fig.&nbsp;6</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1635"><div class="c-article-section__figure-item" data-dcnode-id="1639"><a class="c-article-section__figure-link" data-dcnode-id="1640" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/6" rel="nofollow"><picture data-dcnode-id="1641"><source data-dcnode-id="1643" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig6_HTML.gif?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="1642" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig6_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1636" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Interface of the observe mode in the Tsamiko dance 3D functionality</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1625"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="1626" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/6" rel="nofollow"><span data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1627" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1628" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1629" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1632" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1631" fill-rule="evenodd"></path><span data-dcnode-id="1630" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1621" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="1619" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="1620" instrument_node="">7</span></a><span data-dcnode-id="1618" instrument_node=""> presents the </span><i data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Practice</span></i><span data-dcnode-id="1615" instrument_node=""> mode of the same functionality for the Tsamiko dance: Here the main window keeps showing the 3D avatar of the expert, and in the top window of the right column, there is a video clip of showing the real performance of the expert. In the middle window in the right side, there is the avatar of the user, while in the bottom window there is a backwards prospective of the legs of the avatar of the expert [</span><a aria-label="Reference 19" data-dcnode-id="1613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d248110881e1127" title="Kitsikidis A, Dimitropoulos K, Uğurca D, Bayçay C, Yilmaz E, Tsalakanidou F, Douka S, Grammalidis N (2015) A game-like application for dance learning using a natural human computer interface. In: Proceedings of the HCI international 2015. Los Angeles, pp 2–7"><span data-dcnode-id="1614" instrument_node="">19</span></a><span data-dcnode-id="1612" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1587" data-test="figure" data-title="Fig.&nbsp;7" id="figure-7"><figure data-dcnode-id="1588"><figcaption data-dcnode-id="1608"><b class="c-article-section__figure-caption" data-dcnode-id="1609" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="1610" instrument_node="">Fig.&nbsp;7</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1599"><div class="c-article-section__figure-item" data-dcnode-id="1603"><a class="c-article-section__figure-link" data-dcnode-id="1604" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/7" rel="nofollow"><picture data-dcnode-id="1605"><source data-dcnode-id="1607" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig7_HTML.gif?as=webp" type="image/webp"><img alt="figure 7" aria-describedby="Fig7" data-dcnode-id="1606" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig7_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1600" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Interface of the Observe mode in the Tsamiko dance 3D functionality</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1589"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="1590" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/7" rel="nofollow"><span data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1591" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1592" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1593" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1596" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1595" fill-rule="evenodd"></path><span data-dcnode-id="1594" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1585" instrument_node="">To give another example of this functionality of the i-Treasures platform, which is the most innovative one, in the following, we also present the 3D environment for the singing traditions. In Fig.&nbsp;</span><a data-dcnode-id="1583" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig8"><span data-dcnode-id="1584" instrument_node="">8</span></a><span data-dcnode-id="1582" instrument_node="">, for example, we can see a user wearing the sensors specifically developed by the project (called hyper-helmet) to record the singer’s performance and interacting with the 3D functionality of the platform [</span><a aria-label="Reference 20" data-dcnode-id="1580" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d248110881e1154" title="Al Kork SK, Denby B, Roussel P, Chawah P, Buchman L, Adda-Decker M, Xu K, Tsalakanidou F, Kitsikidis A, Dagnino FM, Ott M, Pozzi F, Stone M, Yilmaz E, Uğurca D, Şahin C (2015) A novel human interaction game-like application to learn, perform and evaluate modern contemporary singing: “human beat box”. In: Proceedings of the 10th international conference on computer vision theory and applications (VISAPP2015)"><span data-dcnode-id="1581" instrument_node="">20</span></a><span data-dcnode-id="1579" instrument_node="">]. In this case, the data acquisition system is able to synchronously record ultrasonic and video data at sufficiently high frame rates to correctly characterize the movements of the tongue and lips, as well as the acoustic speech signals, the electroglottograph, the accelerometer and the respiratory waveforms [</span><a aria-label="Reference 21" data-dcnode-id="1577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d248110881e1157" title="Al Kork SK, Jaumard-Hakoun A, Adda-Decker M, Amelot A, Buchman L, Chawah P, Dreyfus G, Fux T, Pillot-Loiseau C, Roussel P, Stone M, Xu K, Denby B (2014) A multi-sensor helmet to capture rare singing, an intangible cultural heritage study. In: 10th international seminar on speech production (ISSP 2014), vol 1, pp 5–8"><span data-dcnode-id="1578" instrument_node="">21</span></a><span data-dcnode-id="1576" instrument_node="">]. Thus, this functionality of the platform allows the user wearing the hyper-helmet, to try to sing following the expert’s sample—and getting appropriate feedback through a score determined by the accuracy of her/his performance.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1548" data-test="figure" data-title="Fig.&nbsp;8" id="figure-8"><figure data-dcnode-id="1549"><figcaption data-dcnode-id="1572"><b class="c-article-section__figure-caption" data-dcnode-id="1573" data-test="figure-caption-text" id="Fig8"><span data-dcnode-id="1574" instrument_node="">Fig.&nbsp;8</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1560"><div class="c-article-section__figure-item" data-dcnode-id="1567"><a class="c-article-section__figure-link" data-dcnode-id="1568" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/8" rel="nofollow"><picture data-dcnode-id="1569"><source data-dcnode-id="1571" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig8_HTML.jpg?as=webp" type="image/webp"><img alt="figure 8" aria-describedby="Fig8" data-dcnode-id="1570" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig8_HTML.jpg&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1561" data-test="bottom-caption" id="figure-8-desc"><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">Example of interaction with human beat </span><i data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">box’</span></i><span data-dcnode-id="1563" instrument_node=""> functionality wearing hyper-helmet sensor</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1550"><a aria-label="Full size image figure 8" class="c-article__pill-button" data-dcnode-id="1551" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure8 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/8" rel="nofollow"><span data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1552" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1553" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1554" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1557" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1556" fill-rule="evenodd"></path><span data-dcnode-id="1555" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1547" instrument_node="">
