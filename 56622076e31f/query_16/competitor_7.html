</span></div></div></section><section data-dcnode-id="1324" data-title="Platform evaluation"><div class="c-article-section" data-dcnode-id="1325" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1542" id="Sec5"><span data-dcnode-id="1543" instrument_node="">Platform evaluation</span></h2><div class="c-article-section__content" data-dcnode-id="1326" id="Sec5-content"><p data-dcnode-id="1531"><span data-dcnode-id="1541" instrument_node="">The i-Treasures platform has been evaluated by hypothesizing the ICH operational model presented in Fig.&nbsp;</span><a data-dcnode-id="1539" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="1540" instrument_node="">9</span></a><span data-dcnode-id="1538" instrument_node="">, indicating that “design”, “learning management system” and “platform characteristics” serially mediate the relationship between “information” and “performance”. Each “box” in this model refers to a general construct, which is constituted by “dots” referring to sub-constructs. The relationships that may exist between constructs are presented by “arrows”. Constructs, sub-constructs and relationships have been proposed by experts, thus, verifying content validity. Considering that the model refers to perceived constructs, it is further assumed that controls (e.g., users’ gender, age, level of education, and familiarity with computers) may influence the information—performance relationship [</span><a aria-label="Reference 10" data-dcnode-id="1536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d248110881e1193" title="Glushkova A, Katsouli E, Kourvoulis G, Manitsaris A, Volioti C (2015) A hybrid content-learning management system for education and access to intangible cultural heritage. In: Proceeding of the 17th international conference on computer supported education (CSEDU 2015)"><span data-dcnode-id="1537" instrument_node="">10</span></a><span data-dcnode-id="1535" instrument_node="">, </span><a aria-label="Reference 16" data-dcnode-id="1533" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d248110881e1196" title="Manitsaris A, Katsouli E, Katos A, Hadjileontiadis L, Charisis V, Hadjidimitriou S (2015), i-Treasures project—deliverable no: D7.2 first evaluation report. 
                    http://www.i-treasures.eu/filedepot?fid=963
                    
                  . Accessed 28 July 2016"><span data-dcnode-id="1534" instrument_node="">16</span></a><span data-dcnode-id="1532" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1507" data-test="figure" data-title="Fig.&nbsp;9" id="figure-9"><figure data-dcnode-id="1508"><figcaption data-dcnode-id="1528"><b class="c-article-section__figure-caption" data-dcnode-id="1529" data-test="figure-caption-text" id="Fig9"><span data-dcnode-id="1530" instrument_node="">Fig.&nbsp;9</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1519"><div class="c-article-section__figure-item" data-dcnode-id="1523"><a class="c-article-section__figure-link" data-dcnode-id="1524" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/9" rel="nofollow"><picture data-dcnode-id="1525"><source data-dcnode-id="1527" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig9_HTML.gif?as=webp" type="image/webp"><img alt="figure 9" aria-describedby="Fig9" data-dcnode-id="1526" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig9_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1520" data-test="bottom-caption" id="figure-9-desc"><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Operational model for evaluating the i-Treasures platform</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1509"><a aria-label="Full size image figure 9" class="c-article__pill-button" data-dcnode-id="1510" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure9 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/9" rel="nofollow"><span data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1511" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1512" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1513" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1516" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1515" fill-rule="evenodd"></path><span data-dcnode-id="1514" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">For testing the operational model and accordingly evaluating the platform, data were collected in March 2015, with the help of 43 individuals responding to a questionnaire, following a specific protocol (e.g., establishing meaningful relations with local communities; creating accounts for all users involved; workshops including demonstration, use of platform according to instructions, explanation and completion of questionnaires). All items were measured on a scale ranging from 1&nbsp;=&nbsp;not at all/very bad to 5&nbsp;=&nbsp;very much/very good. Examples of the items included: purpose, “How clearly the scope of the website is stated?”; navigation, “How possible is to know where on the web platform are you at each time?”; searching within LMS, “How easy it is to search for information in a course of a thematic module in LMS?”; complexity, “How complex do you consider the web platform to be, in helping you to understand the issues it is presenting?”; effectiveness, “Does the website meet its objectives?”; and efficiency, “Does the website use the fewest possible resources to meet its objectives?”</span></p><p data-dcnode-id="1487"><span data-dcnode-id="1503" instrument_node="">Before estimation of the operational model the survey instrument was examined with respect to construct internal consistency, construct validity, construct composite reliability, construct discriminant validity and common method bias [</span><a aria-label="Reference 22" data-dcnode-id="1501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d248110881e1223" title="Hair F, Anderson R, Tatham R, Black W (2008) Multivariate data analysis with readings. Prentice-Hall, London"><span data-dcnode-id="1502" instrument_node="">22</span></a><span data-dcnode-id="1500" instrument_node="">]. To test the proposed framework, the methodology of structural equations models, or latent variable models [</span><a aria-label="Reference 23" data-dcnode-id="1498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d248110881e1226" title="Byrne BM (2010) Structural equation modeling with AMOS: basic concepts, applications, and programming, 2nd edn. Routledge, London"><span data-dcnode-id="1499" instrument_node="">23</span></a><span data-dcnode-id="1497" instrument_node="">], was used via the statistical package of SPSS–AMOS. The estimated path diagram for the proposed framework is presented in Fig.&nbsp;</span><a data-dcnode-id="1495" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="1496" instrument_node="">10</span></a><span data-dcnode-id="1494" instrument_node="">. The circles represent the related latent variables, and the bold arrows indicate the structural relationships between the corresponding variables. The numbers that are assigned to each arrow show the estimated standardized coefficients. The goodness-of-fit indexes confirmed the validity of the operational model (</span><i data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">p</span></i><span data-dcnode-id="1491" instrument_node=""> value of Chi-square =0.014, normed Chi-square =1.278, root-mean-squared error approximation&nbsp;=&nbsp;RMSEA&nbsp;=&nbsp;0.081, normed fit index&nbsp;=&nbsp;NFI&nbsp;=&nbsp;0.719, comparative fit index&nbsp;=&nbsp;CFI&nbsp;=&nbsp;0.917, goodness of fit index&nbsp;=&nbsp;GFI&nbsp;=&nbsp;0.728) [</span><a aria-label="Reference 24" data-dcnode-id="1489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d248110881e1235" title="Bollen KA (1989) Structural equations with latent variables. Wiley, New York"><span data-dcnode-id="1490" instrument_node="">24</span></a><span data-dcnode-id="1488" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1463" data-test="figure" data-title="Fig.&nbsp;10" id="figure-10"><figure data-dcnode-id="1464"><figcaption data-dcnode-id="1484"><b class="c-article-section__figure-caption" data-dcnode-id="1485" data-test="figure-caption-text" id="Fig10"><span data-dcnode-id="1486" instrument_node="">Fig.&nbsp;10</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1475"><div class="c-article-section__figure-item" data-dcnode-id="1479"><a class="c-article-section__figure-link" data-dcnode-id="1480" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/10" rel="nofollow"><picture data-dcnode-id="1481"><source data-dcnode-id="1483" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig10_HTML.gif?as=webp" type="image/webp"><img alt="figure 10" aria-describedby="Fig10" data-dcnode-id="1482" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig10_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1476" data-test="bottom-caption" id="figure-10-desc"><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Operational model for evaluating the i-Treasures platform</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1465"><a aria-label="Full size image figure 10" class="c-article__pill-button" data-dcnode-id="1466" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure10 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/10" rel="nofollow"><span data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1467" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1468" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1469" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1472" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1471" fill-rule="evenodd"></path><span data-dcnode-id="1470" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Taking into consideration the limitation of the small sample size, the results highlight that:</span></p><ul class="u-list-style-bullet" data-dcnode-id="1395"><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">The model rather acceptably predicts performance (all standardized coefficients are significant and have the appropriate signs, and the fit indices are in large acceptable).</span></p><span data-dcnode-id="1455" instrument_node="">
</span></li><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1448"><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Design and LMS fully mediate the relationship between information and performance.</span></p><span data-dcnode-id="1449" instrument_node="">
</span></li><span data-dcnode-id="1447" instrument_node="">
</span><li data-dcnode-id="1442"><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Design partially mediates the relationship between information and LMS.</span></p><span data-dcnode-id="1443" instrument_node="">
</span></li><span data-dcnode-id="1441" instrument_node="">
</span><li data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">The “difficulty of the informational content” and the “complexity of the platform”, have a negative influence on “performance”.</span></p><span data-dcnode-id="1437" instrument_node="">
</span></li><span data-dcnode-id="1435" instrument_node="">
</span><li data-dcnode-id="1430"><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">“Content” and “organization” are the most important informational factors that predict performance.</span></p><span data-dcnode-id="1431" instrument_node="">
</span></li><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">“Navigation” is the most important design factor that predicts performance.</span></p><span data-dcnode-id="1425" instrument_node="">
</span></li><span data-dcnode-id="1423" instrument_node="">
</span><li data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">The three LMS factors (i.e., searching within LMS, courses quality, searching functionalities) are equally important in influencing performance.</span></p><span data-dcnode-id="1419" instrument_node="">
</span></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">“Complexity” and “usability” are two characteristics of the platform that the first negatively and the second positively influence performance.</span></p><span data-dcnode-id="1413" instrument_node="">
</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1406"><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">“Effectiveness” and “preservation and transmission of ICH” are the most important factors in determining performance.</span></p><span data-dcnode-id="1407" instrument_node="">
</span></li><span data-dcnode-id="1405" instrument_node="">
</span><li data-dcnode-id="1397"><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1403" instrument_node="">Performance is influenced by the demographic characteristics of the users such as age and gender. This means that the platform belongs to the so-called “Contingency Systems”, which support the view that the system maximizes its performance according to the specific context within which it is operating [</span><a aria-label="Reference 25" data-dcnode-id="1401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d248110881e1321" title="Delery J, Doty DH (1996) Modes of theorizing in strategic human resource management: test of universalistic, contingency and configurational performance predictions. Acad Manag J 39:802–835"><span data-dcnode-id="1402" instrument_node="">25</span></a><span data-dcnode-id="1400" instrument_node="">].</span></p><span data-dcnode-id="1398" instrument_node="">
</span></li><span data-dcnode-id="1396" instrument_node="">
</span></ul><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1393" instrument_node="">Having established that the results presented in Fig.&nbsp;</span><a data-dcnode-id="1391" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="1392" instrument_node="">10</span></a><span data-dcnode-id="1390" instrument_node=""> were acceptable, they were used in estimating the standardized total (direct and indirect) effect of each component of the platform on performance [</span><a aria-label="Reference 26" data-dcnode-id="1388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d248110881e1334" title="Kline RB (1998) Principles and practice of structural equation modeling. Guilford Press, New York"><span data-dcnode-id="1389" instrument_node="">26</span></a><span data-dcnode-id="1387" instrument_node="">]. A summary of this contribution is presented in Fig.&nbsp;</span><a data-dcnode-id="1385" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="1386" instrument_node="">11</span></a><span data-dcnode-id="1384" instrument_node="">, where the left part presents a “diamond type figure”, where the outer (blue) polygon reports the means of each component (at a five-level scale), and the inner (brown) polygon reports the loading of each component in contributing to performance; the central part refers to the level of the prediction accuracy of the relationship between the components of the platform and the dimensions constituting the performance of the platform; and the third part presents a “histogram type figure”, where the lower (blue) part reports the means of each dimension of the platform performance, and the upper (brown) part reports the loading of each dimension in contributing to the overall platform performance.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1359" data-test="figure" data-title="Fig.&nbsp;11" id="figure-11"><figure data-dcnode-id="1360"><figcaption data-dcnode-id="1380"><b class="c-article-section__figure-caption" data-dcnode-id="1381" data-test="figure-caption-text" id="Fig11"><span data-dcnode-id="1382" instrument_node="">Fig.&nbsp;11</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1371"><div class="c-article-section__figure-item" data-dcnode-id="1375"><a class="c-article-section__figure-link" data-dcnode-id="1376" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/11" rel="nofollow"><picture data-dcnode-id="1377"><source data-dcnode-id="1379" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs00779-016-0991-z/MediaObjects/779_2016_991_Fig11_HTML.gif?as=webp" type="image/webp"><img alt="figure 11" aria-describedby="Fig11" data-dcnode-id="1378" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s00779-016-0991-z/MediaObjects/779_2016_991_Fig11_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1372" data-test="bottom-caption" id="figure-11-desc"><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Relationship between components of platform and its performance</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1361"><a aria-label="Full size image figure 11" class="c-article__pill-button" data-dcnode-id="1362" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure11 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00779-016-0991-z/figures/11" rel="nofollow"><span data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1363" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1364" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1365" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1368" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1367" fill-rule="evenodd"></path><span data-dcnode-id="1366" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1357" instrument_node="">According to the results presented in Fig.&nbsp;</span><a data-dcnode-id="1355" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="1356" instrument_node="">11</span></a><span data-dcnode-id="1354" instrument_node="">, the major conclusions with respect to the platform are now summarized:</span></p><ul class="u-list-style-bullet" data-dcnode-id="1339"><span data-dcnode-id="1352" instrument_node="">
</span><li data-dcnode-id="1347"><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">The components of the platform predict performance with very high accuracy (91.9%).</span></p><span data-dcnode-id="1348" instrument_node="">
</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">The perception of the dimensions of the platform performance ranges between 3.42 and 3.56 (at the five-level scale), indicating that performance of platform is above average.</span></p><span data-dcnode-id="1342" instrument_node="">
</span></li><span data-dcnode-id="1340" instrument_node="">
</span></ul><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1337" instrument_node="">Additionally, considering the values in Fig.&nbsp;</span><a data-dcnode-id="1335" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="1336" instrument_node="">11</span></a><span data-dcnode-id="1334" instrument_node="">, where a low mean of a variable means that there is “room” for the corresponding component to be improved, and a high loading (contribution) of a variable means that the corresponding component is important in determining performance, and the General rule, or “component ranking index”, indicating that </span><i data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">“</span></i><span data-dcnode-id="1331" instrument_node="">the lower the ratio of the mean of a component by its loading is, the higher the priority for changes/amendments for this component”, the results presented in Fig.&nbsp;</span><a data-dcnode-id="1329" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="1330" instrument_node="">11</span></a><span data-dcnode-id="1328" instrument_node=""> guided the designers of the platform to put effort in further improving the various entities of the system in order to get better results, as perceived by the users of the system. According to the component ranking index, the priority for improvement of the components of the platform in a descending order found to be as follows: complexity, usability, design, learning management system and information. However, any amendment should take into consideration the cost-benefit analysis of each change.</span></p></div></div></section><section data-dcnode-id="1280" data-title="Discussion"><div class="c-article-section" data-dcnode-id="1281" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1322" id="Sec6"><span data-dcnode-id="1323" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="1282" id="Sec6-content"><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">In the paper, we have investigated the potential of technologies in the process of ICH preservation. We have explained that the state of the art in this research topic is very poor and is mainly constituted by systems that provide repositories or collections of information. Then we have presented the i-Treasures project and its platform that are one of the first attempts to go beyond the encyclopedic approach that has so far dominated the ICH preservation field.</span></p><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">As already pointed out, the project has also the added valued of addressing several different ICH areas at a time, thus covering a broad variety of cultural expressions, instead of focusing on one single tradition. In the paper, we have described the way the platform has been designed through a participatory approach. The process has been highly collaborative and interdisciplinary, with a strong effort devoted to involve all the main stakeholders, including not only the various partners with their variety of competences, but also the communities around the single ICHs considered by the project.</span></p><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The effort, oriented to define the main user needs to be satisfied by the platform, has given very good results, in terms of ICH analysis and knowledge domain definition, which have then nurtured the process of requirements’ definition. From this perspective, the process of knowledge domain definition with the direct involvement of the experts/performers can be considered an outcome of the project in itself.</span></p><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">As far as the resulting platform, to the best of our knowledge, this is the first example of a “complete” system aimed to document and preserve ICH, where “complete” refers to its ability to meet different user needs, ranging from informative, enquiry/research and learning needs (both at cognitive and motor levels). This is very important because in evaluating the platform we saw that the platform performance is not only influenced by the structure of the various components of the system, but it is further influenced by the demographic characteristics of the users, thus, treating the platform as a contingency system, which maximizes its performance according to the specific context within which it is operating.</span></p><p data-dcnode-id="1303"><span data-dcnode-id="1313" instrument_node="">In particular, as far as the informative area of the platform is concerned, at the moment the i-Treasures platform is able to provide basic information about the ICHs addressed by the project. This is verified by the results presented in Fig.&nbsp;</span><a data-dcnode-id="1311" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="1312" instrument_node="">10</span></a><span data-dcnode-id="1310" instrument_node="">, where content and organization are the most important informational factors that predict performance. From the point of view of innovation, this is the least innovative feature of the platform, as other informative repositories already exist, but these are often oriented to one single artistic expression. From this point of view, the i-Treasures platform acts as a hub or unique access point to other existing ICH resources. In fact, considering further the results in Figs.&nbsp;</span><a data-dcnode-id="1308" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="1309" instrument_node="">10</span></a><span data-dcnode-id="1307" instrument_node=""> and&nbsp;</span><a data-dcnode-id="1305" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="1306" instrument_node="">11</span></a><span data-dcnode-id="1304" instrument_node="">, it is clear that the platform performance dimensions of efficiency and the i-Treasures platform as a means for promoting and preserving ICH expressions got the highest scores.</span></p><p data-dcnode-id="1292"><span data-dcnode-id="1302" instrument_node="">As far as the enquiry/research area, the platform offers a certain amount of data to researchers and experts in the various ICH fields. These are based on the numerous recordings of experts’ performances that occurred during the project that are now available for anyone who wants to have a deep insight into one (or more) of the ICH. To be noted, that while for the dances, we captured basically the performers’ motions, as far as the singing is concerned, also internal organs have been captured (e.g., vocal tract, nasal cavity) and this constitutes (at least for some of the ICH) the first time data of these kinds are collected and analyzed. State-space methods of analysis have been used in analyzing parts of these data [</span><a aria-label="Reference 27" data-dcnode-id="1300" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d248110881e1425" title="Volioti C, Manitsaris S, Katsoul E, Manitsaris A (2016) x2 Gesture: how the machine learns the expressive gesture variations of expert musicians. In: Proceedings of the new interfaces for musical expression NIME2016, Brisbane, pp 11–15"><span data-dcnode-id="1301" instrument_node="">27</span></a><span data-dcnode-id="1299" instrument_node="">]. All these data have been stored into the i-Treasures repository, which is public and open. The i-Treasures repository is built in line with the EUROPEANA metadata schema,</span><sup data-dcnode-id="1294"><a data-dcnode-id="1295" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Footnote </span></span><span data-dcnode-id="1296" instrument_node="">5</span></a></sup><span data-dcnode-id="1293" instrument_node=""> as this is the most well-known portal for cultural heritage; unfortunately, EUROPEANA proposes limited functions concerning intangible cultural heritage, so further work needs to be done to improve these aspects of the platform.</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1291" instrument_node="">As far as the educational functionalities of the platform are concerned, here is where most of the effort has been done during the project and where the most innovative outcomes have emerged. In particular, the learning paths designed and tested during the project are certainly one of the most important legacy of i-Treasures, especially because they are able to cover both cognitive and motor learning. To be noted that again in this case, for some of the ICH considered, this is the first time formalized learning paths are proposed, as in most cases no schools or teachers exist and the passing down of these expressions is often implicit and based on initiation. In our platform, instead, it is possible to make a direct experience of Tsamiko dancing or Human Beat Box singing and get feedback about the correctness of the performance, by also getting information about what should be changed or improved. This is depicted in Fig.&nbsp;</span><a data-dcnode-id="1289" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="1290" instrument_node="">10</span></a><span data-dcnode-id="1288" instrument_node=""> of the estimation results, where the learning management system is directly influencing performance with a high standardized coefficient equal to 0.85.</span></p><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Of course there are still limitations in the functionalities offered by the platform; for example, when one comes to the polyphonic singing (i.e., Canto in Paghjella or Canto a Tenore), building the 3D environment is particularly challenging and the complexity of the Canto is so high that managing and visualizing the data is still an issue.</span></p><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Finally, as far as the overall evaluation of the platform is concerned this research offers an innovative and dynamic evaluation method, where evaluation is not restricted on the static elements of the data collected by questionnaires, but goes beyond and proposes a structural equation methodology, where the performance of the platform is evaluated by the components that constitute the platform and by the relationships that exist between these components. Additionally, to the best of our knowledge, this paper proposes for the first time the “component ranking index” seen above, which by simultaneously using the results of the descriptive data of the questionnaires and the dynamic relationships between the latent variables estimated by structural equation modeling it offers a methodology that can be followed by designers in improving components of the platform.</span></p></div></div></section><section data-dcnode-id="1266" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="1267" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1278" id="Sec7"><span data-dcnode-id="1279" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="1268" id="Sec7-content"><p data-dcnode-id="1273"><span data-dcnode-id="1277" instrument_node="">Presently the final version of the i-Treasures platform has just been released and further in-field experiments and trials with actual users and within several communities are still underway. Nonetheless, considering the evaluation carried out so far, we have already preliminary positive feedback about the effectiveness and usability of the platform [</span><a aria-label="Reference 16" data-dcnode-id="1275" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d248110881e1461" title="Manitsaris A, Katsouli E, Katos A, Hadjileontiadis L, Charisis V, Hadjidimitriou S (2015), i-Treasures project—deliverable no: D7.2 first evaluation report. 
                    http://www.i-treasures.eu/filedepot?fid=963
                    
                  . Accessed 28 July 2016"><span data-dcnode-id="1276" instrument_node="">16</span></a><span data-dcnode-id="1274" instrument_node="">]. The results of the data point out that the platform is generally welcome and appreciated, even if some of the functionalities still need to be improved or enriched. Furthermore, the proposed evaluation methodology offers paths for updating, through the component ranking index, entities of the platform at “macro-level” (i.e., specific components in the platform), “meso-level” (i.e., specific dimensions in each component in the platform) and “micro-level” (i.e., specific items in each dimension in the platform). So, even if there is still a lot of work to do in the field of ICH preservation and education, for sure i-Treasures has paved the way to innovation in the field, by proving that technologies can play a crucial role, especially in terms of teaching and learning processes, rather than as mere repositories.</span></p><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">As we have discussed in this paper, the project has also explored the possibility to capture the artists’ movements and performances using ad hoc sensors. In these particular cases, of course there is still room for further research, especially to improve usability and exportability of these sensors, but at least at prototypal level—i-Treasures has proved the feasibility of using these kinds of technologies to support teaching and learning processes in the field of ICH.</span></p><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Overall, the evaluation exercise of the platform indicates that i-Treasures is providing a valuable contribution in the preservation and transmission of intangible cultural heritage and is innovative and it is a useful tool to be adopted by organizations/schools/institutions to help them promote endangered ICH expressions.</span></p></div></div></section><span data-dcnode-id="1265" instrument_node="">
