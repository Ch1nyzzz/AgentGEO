</span><div class="post_body has_post_banner" data-dcnode-id="501"><span data-dcnode-id="712" instrument_node="">

</span><p data-dcnode-id="687"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">IN THIS POST</span></strong><br data-dcnode-id="707"><span data-dcnode-id="706" instrument_node="">– </span><a data-dcnode-id="704" href="#Kabaddi"><span data-dcnode-id="705" instrument_node="">Kabaddi</span></a><br data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">– </span><a data-dcnode-id="700" href="#Malakhra"><span data-dcnode-id="701" instrument_node="">Malakhra</span></a><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">– </span><a data-dcnode-id="696" href="#Mukha"><span data-dcnode-id="697" instrument_node="">Mukha</span></a><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">– </span><a data-dcnode-id="692" href="#Tent-Pegging"><span data-dcnode-id="693" instrument_node="">Tent Pegging</span></a><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">– </span><a data-dcnode-id="688" href="#Yak"><span data-dcnode-id="689" instrument_node="">Yak Racing</span></a></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Cricket may be the most popular sport in Pakistan, but each region of the country has its own traditional games and activities that do not only keep the locals physically healthy and fit but also hold a historical and cultural significance. These traditional sports in Pakistan are not only played for entertainment or the sake of tradition, as some of them are extremely popular. Grand festivals are organized for these outdoor games in Pakistan, drawing spectators from all over the world.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">The players of these traditional sports in Pakistan also compete in national and international competitions, highlighting the rich and exotic culture of their respective regions. However, since a lot of people don’t know much about traditional sports played in Pakistan, we have put together a list that will help you learn more about these outdoor activities.</span></p><span data-dcnode-id="680" instrument_node="">
</span><h2 data-dcnode-id="677"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Famous Traditional Sports in Pakistan</span></strong></h2><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="672"><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zameen.com/blog/field-hockey-pakistan-national-sport.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="675" instrument_node="">Field hockey may be the national sport of Pakistan</span></a><span data-dcnode-id="673" instrument_node="">, but these age-old outdoor games are loved just as much in their respective regions.&nbsp;</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Here are some of the most celebrated traditional sports played in Pakistan.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h3 data-dcnode-id="665" id="Kabaddi"><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Kabaddi&nbsp;</span></strong></h3><span data-dcnode-id="664" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="660"><img alt="Kabaddi in Pakistan" class="wp-image-99309" data-dcnode-id="663" height="640" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-E-16-09-1024x640.jpg&amp;raw" srcset="https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-E-16-09-1024x640.jpg 1024w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-E-16-09-300x188.jpg 300w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-E-16-09-768x480.jpg 768w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-E-16-09-640x400.jpg 640w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-E-16-09-368x230.jpg 368w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-E-16-09.jpg 1440w" width="1024"><figcaption data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Kabaddi is a popular traditional sport in South Asia</span></figcaption></figure><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="658" instrument_node="">Kabaddi is probably one of the most popular traditional sports in South Asia. This unique contact sport is played in several countries, though Pakistan has certainly established its presence in this game by not only hosting the </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zameen.com/blog/kabaddi-world-cup-2020-pakistan.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="657" instrument_node="">Kabaddi World Cup 2020 (Circle Style)</span></a><span data-dcnode-id="655" instrument_node=""> but also winning the coveted championship.&nbsp;</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">The game may look quite similar to traditional wrestling, but it is quite different. It requires two teams of twelve players each. However, only seven players for each side are allowed to play on the field. This traditional sport is played without any special equipment or accessories, making it a game that anyone can play without any hassle.</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The overall objective of Kabaddi is to score more points than the other team within the given time limit. Each team gets a chance to attack and defend, taking one half of the playing field. To score a point, the attacking team has to send a raider to the opposition’s camp to touch at least one of their players. During the raid, it is mandatory for the raider to repetitively chant “kabaddi” without even taking a break to breathe. If the raider breaks the chant, the score is awarded to the defending team. The defending team will also score a point if its members manage to capture the raider by wrestling them to the ground and prevent them from returning to their own team until their breath is up and they can’t chant anymore.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">It is one of the several traditional sports in Pakistan that is usually played on a muddy ground separated into two halves by a white line, with each team occupying one half. However, international kabaddi matches are held in arenas or sports grounds.</span></p><span data-dcnode-id="644" instrument_node="">
</span><h3 data-dcnode-id="641" id="Malakhra"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Malakhra&nbsp;</span></strong></h3><span data-dcnode-id="640" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="636"><img alt="traditional sports played in Pakistan" class="wp-image-99306" data-dcnode-id="639" height="640" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-F-16-09-1024x640.jpg&amp;raw" srcset="https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-F-16-09-1024x640.jpg 1024w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-F-16-09-300x188.jpg 300w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-F-16-09-768x480.jpg 768w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-F-16-09-640x400.jpg 640w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-F-16-09-368x230.jpg 368w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-F-16-09.jpg 1440w" width="1024"><figcaption data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Malakhra is a form of wrestling that is extremely popular in Sindh</span></figcaption></figure><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">This contact sport is an ancient form of wrestling that is played predominantly in Sindh, Pakistan and Gujrat, India. Called Malakhra or Malakhro, this traditional sport requires two players who try to throw the other to the ground using the waistcloth tied around their bodies. The match starts with the contestants holding onto the opponent’s waistcloth and ends with one of them being thrown to the ground.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Malakhra is the provincial sport of Sindh. It draws a large number of fans, who come from all over the region to watch famous wrestlers, or malhoos, compete with each other in muddy ground. Owing to their popularity, the matches for one of the most well-known traditional sports in Pakistan are held on Fridays or public holidays. This allows a larger audience to attend the game. Malakhra is also the main attraction at regional festivals and fairs. The traditional wrestlers who partake in these matches go through rigorous training routines and diet regimens for several years as this sport requires a lot of physical strength along with strategizing abilities.&nbsp;</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">In 2009, the Institute of Sindhology at the University of Sindh in Jamshoro made headlines for establishing a Malakhro corner at its museum. The institute, as the name suggests, focuses on the preservation and promotion of Sindh’s unique culture, literature and history.&nbsp;</span></p><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="623" id="Mukha"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Mukha</span></strong></h3><span data-dcnode-id="622" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="618"><img alt="sports facilities in Pakistan" class="wp-image-99305" data-dcnode-id="621" height="640" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-C-16-09-1024x640.jpg&amp;raw" srcset="https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-C-16-09-1024x640.jpg 1024w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-C-16-09-300x188.jpg 300w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-C-16-09-768x480.jpg 768w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-C-16-09-640x400.jpg 640w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-C-16-09-368x230.jpg 368w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-C-16-09.jpg 1440w" width="1024"><figcaption data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Mukha is a variant of traditional archery </span></figcaption></figure><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Mukha can be described as a distant cousin of archery. This 150-year-old traditional sport is very popular in Khyber-Pakhtunkhwa, particularly in Mardan and Swabi districts. The locals in these areas organize summer festivals where they gather in droves to see the Mukha matches between these districts.&nbsp;</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">At first glance, this sport may look exactly like archery. However, Mukha is played with long rods made of stag horns called ‘ghashay’ and large bows known as ‘leenda’. The rods, which are essentially used as arrows, have metallic saucer-shaped tips that help them hit the targets set around 35 feet away at a height of about 12 feet.&nbsp;</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">The targets are usually made of white wood and are referred to as ‘takai.’ They are surrounded by a circular ring called ‘kwaara’ and placed in fresh clay.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">If the player manages to strike the targets they score a point. A successful attempt is usually celebrated by beating loud drums. On the other hand, if the player misses the target, the opposing team would celebrate instead.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Each team competing in Mukha requires 10 players in total. The team is led by a captain who is called ‘mashar’ and a vice-captain known as ‘wazir’. The rest of the players are referred to as ‘mukhwals’.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Much like other outdoor games in Pakistan, Mukha also requires a lot of strength, patience and precision.&nbsp;&nbsp;</span></p><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="596" id="Tent-Pegging"><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Tent Pegging&nbsp;</span></strong></h3><span data-dcnode-id="595" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="591"><img alt="tent pegging in Pakistan" class="wp-image-99304" data-dcnode-id="594" height="640" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-A-16-09-1024x640.jpg&amp;raw" srcset="https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-A-16-09-1024x640.jpg 1024w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-A-16-09-300x188.jpg 300w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-A-16-09-768x480.jpg 768w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-A-16-09-640x400.jpg 640w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-A-16-09-368x230.jpg 368w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-A-16-09.jpg 1440w" width="1024"><figcaption data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Tent pegging or neza bazi is one of the oldest traditional sports played in this region </span></figcaption></figure><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Considered the ultimate adventure sport, tent pegging or neza bazi is a cavalry sport that enjoys extreme popularity in all four provinces of Pakistan. It is believed to have originated in South Asia during the middle ages before reaching the Asian and European empires, who played a major role in spreading tent pegging to other parts of the world. Played on horsebacks, tent pegging is one of the few horse-riding sports officially recognized by the International Equestrian Federation. It is also recognized as an official sport by the Olympic Council of Asia, the governing body of sports in the continent.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">The game involves horse-mounted riders in traditional waistcoats and vibrant turbans driving their lances or swords in the wooden pegs half-buried in the dry ground. They have to pick up the wooden pegs at a full gallop, collecting as many as they can. Since the matches take place in regular grounds, the dust kicked up the horses prove to be the main obstruction in finding the small targets.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Neza Bazi is an important part of cultural celebrations and festivals in most parts of Pakistan. This ancient sport attracts a number of local as well as international spectators. A large number of sports clubs arrange tent pegging competitions, with every club boasting its own unique style of waistcoat and turban. The horses are also decorated accordingly for these outdoor games in Pakistan.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Although several tent pegging matches are organized in Pakistan throughout the year, the National Horse and Cattle Show held in Lahore is easily the most famous of them all. This annual event is held at the Fortress Stadium and includes different exhibitions, livestock and sports competitions.&nbsp;</span></p><span data-dcnode-id="578" instrument_node="">
</span><h3 data-dcnode-id="575" id="Yak"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Yak Racing and Polo</span></strong></h3><span data-dcnode-id="574" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="570"><img alt="Yak racing in Pakistan" class="wp-image-99303" data-dcnode-id="573" height="640" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-B-16-09-1024x640.jpg&amp;raw" srcset="https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-B-16-09-1024x640.jpg 1024w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-B-16-09-300x188.jpg 300w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-B-16-09-768x480.jpg 768w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-B-16-09-640x400.jpg 640w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-B-16-09-368x230.jpg 368w, https://zameenblog.s3.amazonaws.com/blog/wp-content/uploads/2020/09/Traditional-Sports-in-Pakistan-B-16-09.jpg 1440w" width="1024"><figcaption data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Yak racing and polo are the highlight of Broghil Festival </span></figcaption></figure><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Yak racing and yak polo are two of the most unique traditional sports played in Pakistan. Both of these sports are considered a Mongolian variant of the horserace and polo, native to the Gilgit-Baltistan region.&nbsp;</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">These activities are the highlight of the Broghil Festival. It is held at the beautiful </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zameen.com/blog/broghil-valley-pakistan-tourist-guide.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="564" instrument_node="">Broghil National Park</span></a><span data-dcnode-id="562" instrument_node=""> in Upper Chitral District at an altitude of 13,000 feet. Although it’s not as big or popular as the Shandur Polo Festival held on Shandur Pass, the Broghil Festival has also started attracting a large number of tourists from all parts of the world.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Whether it’s yak race or yak polo, these sports involve the same degree of risks as horse racing and polo. The rules of the games are also the same.&nbsp;</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Over the past years, these traditional sports in Pakistan have begun to gain popularity across the world.&nbsp;</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="553" instrument_node="">Meanwhile, if you are interested in learning more about winter sports activities, take a look at our guides on the </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zameen.com/blog/ski-resorts-pakistan.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="552" instrument_node="">best ski resorts in Pakistan</span></a><span data-dcnode-id="550" instrument_node=""> as well as the </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zameen.com/blog/winter-sports-malam-jabba.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="549" instrument_node="">winter sports at Malam Jabba</span></a><span data-dcnode-id="547" instrument_node="">. You can also check out the list of </span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zameen.com/blog/10-best-cricket-stadiums-pakistan.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="546" instrument_node="">top stadiums in Pakistan</span></a><span data-dcnode-id="544" instrument_node="">&nbsp;</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="541" instrument_node="">To learn more about different sports facilities in Pakistan, stay connected to </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zameen.com/blog/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="540" instrument_node="">Zameen Blog</span></a><span data-dcnode-id="538" instrument_node="">. Don’t forget to share your thoughts and comments with us sending an email at </span><a data-dcnode-id="536" href="mailto:blog@zameen.com" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="537" instrument_node="">blog@zameen.com</span></a><span data-dcnode-id="535" instrument_node="">. Moreover, please subscribe to the Zameen Newsletter and </span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/ZameenPK" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="534" instrument_node="">Facebook page</span></a><span data-dcnode-id="532" instrument_node=""> for more information about the latest construction and property trends in Pakistan.&nbsp;</span></p><span data-dcnode-id="530" instrument_node="">
