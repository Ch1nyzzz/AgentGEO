</span><p data-dcnode-id="1705"><i data-dcnode-id="1726"><b data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Kannada Rajyotsava</span></b></i><span data-dcnode-id="1725" instrument_node="">, also known as </span><b data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Karnataka Formation Day or Karnataka Day</span></b><span data-dcnode-id="1722" instrument_node="">, is celebrated on 1 November of every year. This was the day in 1956 when all the </span><a data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada" title="Kannada"><span data-dcnode-id="1721" instrument_node="">Kannada</span></a><span data-dcnode-id="1719" instrument_node=""> language-speaking regions of south western </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="1718" instrument_node="">India</span></a><span data-dcnode-id="1716" instrument_node=""> were </span><a class="mw-redirect" data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/States_Reorganisation_Act" title="States Reorganisation Act"><span data-dcnode-id="1715" instrument_node="">merged</span></a><span data-dcnode-id="1713" instrument_node=""> to form the state of </span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="1712" instrument_node="">Karnataka</span></a><span data-dcnode-id="1710" instrument_node="">.</span><sup class="reference" data-dcnode-id="1707" id="cite_ref-3"><a data-dcnode-id="1708" href="#cite_note-3"><span data-dcnode-id="1709" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1706" instrument_node="">
</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1704" instrument_node="">The Rajyotsava day is listed as a </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_holiday" title="Public holiday"><span data-dcnode-id="1703" instrument_node="">government holiday</span></a><span data-dcnode-id="1701" instrument_node=""> in the state of Karnataka</span><sup class="reference" data-dcnode-id="1698" id="cite_ref-fesindia_4-0"><a data-dcnode-id="1699" href="#cite_note-fesindia-4"><span data-dcnode-id="1700" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1697" instrument_node=""> and is celebrated by </span><a class="mw-redirect" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannadiga" title="Kannadiga"><span data-dcnode-id="1696" instrument_node="">Kannadigas</span></a><span data-dcnode-id="1694" instrument_node=""> across the world.</span><sup class="reference" data-dcnode-id="1691" id="cite_ref-daiji_1-1"><a data-dcnode-id="1692" href="#cite_note-daiji-1"><span data-dcnode-id="1693" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1690" instrument_node=""> It is marked by the announcement and presentation of the honours list for </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rajyotsava_Prashasti" title="Rajyotsava Prashasti"><span data-dcnode-id="1689" instrument_node="">Rajyotsava Awards</span></a><span data-dcnode-id="1687" instrument_node=""> by the </span><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Karnataka" title="Government of Karnataka"><span data-dcnode-id="1686" instrument_node="">Government of Karnataka</span></a><span data-dcnode-id="1684" instrument_node="">, hoisting of the official </span><a class="mw-redirect" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_flag" title="Kannada flag"><span data-dcnode-id="1683" instrument_node="">Karnataka flag</span></a><span data-dcnode-id="1681" instrument_node=""> with an address from the </span><a class="mw-redirect" data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chief_Minister_of_Karnataka" title="Chief Minister of Karnataka"><span data-dcnode-id="1680" instrument_node="">Chief Minister</span></a><span data-dcnode-id="1678" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Governor_of_Karnataka" title="Governor of Karnataka"><span data-dcnode-id="1677" instrument_node="">Governor</span></a><sup class="reference" data-dcnode-id="1673" id="cite_ref-govern_5-0"><a data-dcnode-id="1674" href="#cite_note-govern-5"><span data-dcnode-id="1675" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1672" instrument_node=""> of the state along with community festivals, orchestra, </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada" title="Kannada"><span data-dcnode-id="1671" instrument_node="">Kannada</span></a><span data-dcnode-id="1669" instrument_node=""> book releases and concerts.</span><sup class="reference" data-dcnode-id="1666" id="cite_ref-6"><a data-dcnode-id="1667" href="#cite_note-6"><span data-dcnode-id="1668" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1665" instrument_node="">

</span><h2 data-dcnode-id="1581"><span class="mw-headline" data-dcnode-id="1589" id="History"><span data-dcnode-id="1590" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="1582"><span class="mw-editsection-bracket" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">[</span></span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKarnataka_Rajyotsava%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="1586" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1580" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1574" role="note"><span data-dcnode-id="1577" instrument_node="">Main article: </span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unification_of_Karnataka" title="Unification of Karnataka"><span data-dcnode-id="1576" instrument_node="">Unification of Karnataka</span></a></div><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1525"><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aluru_Venkata_Rao" title="Aluru Venkata Rao"><span data-dcnode-id="1572" instrument_node="">Aluru Venkata Rao</span></a><span data-dcnode-id="1570" instrument_node=""> was the first person who dreamt of unifying the State as early as 1905 with the </span><a data-dcnode-id="1567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unification_of_Karnataka" title="Unification of Karnataka"><i data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Karnataka Ekikarana</span></i></a><span data-dcnode-id="1566" instrument_node=""> movement.</span><sup class="reference" data-dcnode-id="1563" id="cite_ref-govern_5-1"><a data-dcnode-id="1564" href="#cite_note-govern-5"><span data-dcnode-id="1565" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1562" instrument_node=""> In 1950 </span><a class="mw-redirect" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Republic_of_India" title="History of the Republic of India"><span data-dcnode-id="1561" instrument_node="">India became republic</span></a><span data-dcnode-id="1559" instrument_node=""> and different provinces were formed in the country on basis of language spoken in the particular region and this gave birth to the state of Mysore including various places in south India, which were earlier ruled by the kings.</span><sup class="reference" data-dcnode-id="1556" id="cite_ref-fesindia_4-1"><a data-dcnode-id="1557" href="#cite_note-fesindia-4"><span data-dcnode-id="1558" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1555" instrument_node=""> On 1 November 1956, </span><a class="mw-redirect" data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore_state" title="Mysore state"><span data-dcnode-id="1554" instrument_node="">Mysore state</span></a><span data-dcnode-id="1552" instrument_node="">, comprising most of the area of the erstwhile </span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Mysore" title="Kingdom of Mysore"><span data-dcnode-id="1551" instrument_node="">princely state of Mysore</span></a><span data-dcnode-id="1549" instrument_node="">, was merged with the Kannada-speaking areas of the Bombay and Madras presidencies, as also of the principality of </span><a class="mw-redirect" data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyderabad_state" title="Hyderabad state"><span data-dcnode-id="1548" instrument_node="">Hyderabad</span></a><span data-dcnode-id="1546" instrument_node="">, to create a unified Kannada-speaking sub-national entity. </span><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Karnataka" title="North Karnataka"><span data-dcnode-id="1545" instrument_node="">North Karnataka</span></a><span data-dcnode-id="1543" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malnad" title="Malnad"><span data-dcnode-id="1542" instrument_node="">Malnad</span></a><span data-dcnode-id="1540" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kanara" title="Kanara"><span data-dcnode-id="1539" instrument_node="">Canara</span></a><span data-dcnode-id="1537" instrument_node="">) and </span><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore_%28region%29" title="Mysore (region)"><span data-dcnode-id="1536" instrument_node="">old Mysore</span></a><span data-dcnode-id="1534" instrument_node=""> were thus the three regions of the newly formed Mysore state.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1527" style="white-space:nowrap;"><span data-dcnode-id="1533" instrument_node="">[</span><i data-dcnode-id="1529"><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1531" title="This claim needs references to reliable sources. (October 2020)"><span data-dcnode-id="1532" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1528" instrument_node="">]</span></sup><span data-dcnode-id="1526" instrument_node="">
</span></p><p data-dcnode-id="1490"><span data-dcnode-id="1524" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore_state" title="Mysore state"><span data-dcnode-id="1523" instrument_node="">newly unified state</span></a><span data-dcnode-id="1521" instrument_node=""> initially retained the name "Mysore", which was that of the erstwhile princely state which formed the core of the new entity.</span><sup class="reference" data-dcnode-id="1518" id="cite_ref-7"><a data-dcnode-id="1519" href="#cite_note-7"><span data-dcnode-id="1520" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1517" instrument_node=""> But the people of North Karnataka did not favour the retention of the name Mysore, as it was closely associated with the erstwhile principality and the southern areas of the new state. In deference to this logic, the name of the state was changed to "Karnataka" on 1 November 1973. </span><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D._Devaraj_Urs" title="D. Devaraj Urs"><span data-dcnode-id="1516" instrument_node="">Devaraj Arasu</span></a><span data-dcnode-id="1514" instrument_node=""> was the Chief Minister of the state when this landmark decision was taken.</span><sup class="reference" data-dcnode-id="1511" id="cite_ref-8"><a data-dcnode-id="1512" href="#cite_note-8"><span data-dcnode-id="1513" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1510" instrument_node=""> Other people credited for the unification of Karnataka include littérateurs like </span><a class="mw-redirect" data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K._Shivaram_Karanth" title="K. Shivaram Karanth"><span data-dcnode-id="1509" instrument_node="">K. Shivaram Karanth</span></a><span data-dcnode-id="1507" instrument_node="">, </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuvempu" title="Kuvempu"><span data-dcnode-id="1506" instrument_node="">Kuvempu</span></a><span data-dcnode-id="1504" instrument_node="">, </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Masti_Venkatesha_Iyengar" title="Masti Venkatesha Iyengar"><span data-dcnode-id="1503" instrument_node="">Masti Venkatesha Iyengar</span></a><span data-dcnode-id="1501" instrument_node="">, </span><a data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A._N._Krishna_Rao" title="A. N. Krishna Rao"><span data-dcnode-id="1500" instrument_node="">A. N. Krishna Rao</span></a><span data-dcnode-id="1498" instrument_node=""> and </span><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/B._M._Srikantaiah" title="B. M. Srikantaiah"><span data-dcnode-id="1497" instrument_node="">B. M. Srikantaiah</span></a><span data-dcnode-id="1495" instrument_node="">.</span><sup class="reference" data-dcnode-id="1492" id="cite_ref-govern_5-2"><a data-dcnode-id="1493" href="#cite_note-govern-5"><span data-dcnode-id="1494" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1491" instrument_node="">
</span></p><span data-dcnode-id="1489" instrument_node="">
</span><h2 data-dcnode-id="1479"><span class="mw-headline" data-dcnode-id="1487" id="Celebrations_of_Karnataka_Rajyotsava"><span data-dcnode-id="1488" instrument_node="">Celebrations of Karnataka Rajyotsava</span></span><span class="mw-editsection" data-dcnode-id="1480"><span class="mw-editsection-bracket" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">[</span></span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKarnataka_Rajyotsava%26action%3Dedit%26section%3D2" title="Edit section: Celebrations of Karnataka Rajyotsava"><span data-dcnode-id="1484" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1478" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="1466"><div class="thumbinner" data-dcnode-id="1467" style="width:142px;"><a class="image" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFlag_of_Karnataka.svg"><img alt="" class="thumbimage" data-dcnode-id="1477" data-file-height="300" data-file-width="450" decoding="async" height="93" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Karnataka.svg/140px-Flag_of_Karnataka.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Karnataka.svg/210px-Flag_of_Karnataka.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Karnataka.svg/280px-Flag_of_Karnataka.svg.png 2x" width="140"></a><span data-dcnode-id="1475" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1468"><div class="magnify" data-dcnode-id="1473"><a class="internal" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFlag_of_Karnataka.svg" title="Enlarge"></a></div><span data-dcnode-id="1472" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_flag" title="Kannada flag"><span data-dcnode-id="1471" instrument_node="">Kannada flag</span></a><span data-dcnode-id="1469" instrument_node="">, used as an emblem of Kannada culture</span></div></div></div><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1464" instrument_node="">Rajyotsava day is celebrated with great joy and vigour all over the state of Karnataka. The entire state wears a festive look on this day as the red and yellow </span><a class="mw-redirect" data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_flag" title="Kannada flag"><span data-dcnode-id="1463" instrument_node="">Kannada flags</span></a><span data-dcnode-id="1461" instrument_node=""> are hoisted at different strategic locations across the state and the Kannada anthem ("</span><i data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Jaya Bharatha Jananiya Tanujate</span></i><span data-dcnode-id="1458" instrument_node="">") is chanted.</span><sup class="reference" data-dcnode-id="1455" id="cite_ref-9"><a data-dcnode-id="1456" href="#cite_note-9"><span data-dcnode-id="1457" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1454" instrument_node=""> The flag is hoisted at political party offices and several localities even as youth in many areas take out processions on their vehicles.</span><sup class="reference" data-dcnode-id="1451" id="cite_ref-hinducult_10-0"><a data-dcnode-id="1452" href="#cite_note-hinducult-10"><span data-dcnode-id="1453" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1450" instrument_node=""> Religion not being a factor, the Rajyotsava is celebrated by </span><a class="mw-redirect" data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu" title="Hindu"><span data-dcnode-id="1449" instrument_node="">Hindus</span></a><span data-dcnode-id="1447" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim" title="Muslim"><span data-dcnode-id="1446" instrument_node="">Muslims</span></a><sup class="reference" data-dcnode-id="1442" id="cite_ref-11"><a data-dcnode-id="1443" href="#cite_note-11"><span data-dcnode-id="1444" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1441" instrument_node=""> and Christians as well.</span><sup class="reference" data-dcnode-id="1438" id="cite_ref-12"><a data-dcnode-id="1439" href="#cite_note-12"><span data-dcnode-id="1440" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="1435" id="cite_ref-13"><a data-dcnode-id="1436" href="#cite_note-13"><span data-dcnode-id="1437" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1434" instrument_node="">
</span></p><span data-dcnode-id="1432" instrument_node="">
</span><h3 data-dcnode-id="1422"><span class="mw-headline" data-dcnode-id="1430" id="Government_procession"><span data-dcnode-id="1431" instrument_node="">Government procession</span></span><span class="mw-editsection" data-dcnode-id="1423"><span class="mw-editsection-bracket" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">[</span></span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKarnataka_Rajyotsava%26action%3Dedit%26section%3D3" title="Edit section: Government procession"><span data-dcnode-id="1427" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1420" instrument_node="">The </span><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Karnataka" title="Government of Karnataka"><span data-dcnode-id="1419" instrument_node="">state government</span></a><span data-dcnode-id="1417" instrument_node=""> asserts </span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rajyotsava_Prashasti" title="Rajyotsava Prashasti"><span data-dcnode-id="1416" instrument_node="">Rajyotsava awards</span></a><span data-dcnode-id="1414" instrument_node=""> on this day, which are awarded to people responsible for great contributions in the development of Karnataka.</span><sup class="reference" data-dcnode-id="1411" id="cite_ref-fesindia_4-2"><a data-dcnode-id="1412" href="#cite_note-fesindia-4"><span data-dcnode-id="1413" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1410" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chief_Minister_of_Karnataka" title="Chief Minister of Karnataka"><span data-dcnode-id="1409" instrument_node="">Chief Minister of the State</span></a><span data-dcnode-id="1407" instrument_node=""> inaugurates the cultural show which is normally held at Kanteerava Stadium, Bangalore.</span><sup class="reference" data-dcnode-id="1404" id="cite_ref-hinducult_10-1"><a data-dcnode-id="1405" href="#cite_note-hinducult-10"><span data-dcnode-id="1406" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1403" instrument_node=""> Awards are presented to students who have won medals in various national games.</span><sup class="reference" data-dcnode-id="1400" id="cite_ref-14"><a data-dcnode-id="1401" href="#cite_note-14"><span data-dcnode-id="1402" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1399" instrument_node="">
</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1397" instrument_node="">The celebrations are marked by multicoloured tableaux carrying the picture of the </span><a class="mw-redirect" data-dcnode-id="1395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhuvaneshwari" title="Bhuvaneshwari"><span data-dcnode-id="1396" instrument_node="">Goddess Bhuvaneshwari</span></a><span data-dcnode-id="1394" instrument_node=""> mounted on a decorated vehicle.</span><sup class="reference" data-dcnode-id="1391" id="cite_ref-15"><a data-dcnode-id="1392" href="#cite_note-15"><span data-dcnode-id="1393" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1390" instrument_node=""> The colourful procession is also accompanied by performances of the folk artists in the fields of drama (</span><a class="mw-redirect" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bayalata" title="Bayalata"><span data-dcnode-id="1389" instrument_node="">Bayalata</span></a><span data-dcnode-id="1387" instrument_node="">), traditional dance (</span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dollu_Kunitha" title="Dollu Kunitha"><span data-dcnode-id="1386" instrument_node="">Dollu Kunitha</span></a><span data-dcnode-id="1384" instrument_node="">, </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamsale" title="Kamsale"><span data-dcnode-id="1383" instrument_node="">Kamsale</span></a><span data-dcnode-id="1381" instrument_node="">, </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veeragase" title="Veeragase"><span data-dcnode-id="1380" instrument_node="">Veeragase</span></a><span data-dcnode-id="1378" instrument_node="">, </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kolata" title="Kolata"><span data-dcnode-id="1377" instrument_node="">Kolata</span></a><span data-dcnode-id="1375" instrument_node="">) and classical </span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carnatic_music" title="Carnatic music"><span data-dcnode-id="1374" instrument_node="">carnatic music</span></a><span data-dcnode-id="1372" instrument_node="">.</span><sup class="reference" data-dcnode-id="1369" id="cite_ref-fesindia_4-3"><a data-dcnode-id="1370" href="#cite_note-fesindia-4"><span data-dcnode-id="1371" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1368" instrument_node="">
</span></p><span data-dcnode-id="1366" instrument_node="">
</span><h3 data-dcnode-id="1356"><span class="mw-headline" data-dcnode-id="1364" id="Private_establishments"><span data-dcnode-id="1365" instrument_node="">Private establishments</span></span><span class="mw-editsection" data-dcnode-id="1357"><span class="mw-editsection-bracket" data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">[</span></span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKarnataka_Rajyotsava%26action%3Dedit%26section%3D4" title="Edit section: Private establishments"><span data-dcnode-id="1361" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1355" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="1344"><div class="thumbinner" data-dcnode-id="1345" style="width:222px;"><a class="image" data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKannada_Flag_Auto.jpg"><img alt="" class="thumbimage" data-dcnode-id="1354" data-file-height="526" data-file-width="800" decoding="async" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kannada_Flag_Auto.jpg/220px-Kannada_Flag_Auto.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kannada_Flag_Auto.jpg/330px-Kannada_Flag_Auto.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kannada_Flag_Auto.jpg/440px-Kannada_Flag_Auto.jpg 2x" width="220"></a><span data-dcnode-id="1352" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1346"><div class="magnify" data-dcnode-id="1350"><a class="internal" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKannada_Flag_Auto.jpg" title="Enlarge"></a></div><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auto_rickshaw" title="Auto rickshaw"><span data-dcnode-id="1349" instrument_node="">Auto rickshaws</span></a><span data-dcnode-id="1347" instrument_node=""> and other vehicles are decorated with yellow and red themes signifying the Kannada flag</span></div></div></div><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1342" instrument_node="">Since 1 November is a public holiday, it is celebrated at commercial establishments in the following days of the week. Kannada flags are prominently hoisted and displayed at almost all office and business establishments across the city of </span><a data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore" title="Bangalore"><span data-dcnode-id="1341" instrument_node="">Bengaluru</span></a><span data-dcnode-id="1339" instrument_node="">.</span><sup class="reference" data-dcnode-id="1336" id="cite_ref-hinducult_10-2"><a data-dcnode-id="1337" href="#cite_note-hinducult-10"><span data-dcnode-id="1338" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1335" instrument_node=""> Being a hub of several </span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Software_industry" title="Software industry"><span data-dcnode-id="1334" instrument_node="">IT companies</span></a><span data-dcnode-id="1332" instrument_node="">,</span><sup class="reference" data-dcnode-id="1329" id="cite_ref-16"><a data-dcnode-id="1330" href="#cite_note-16"><span data-dcnode-id="1331" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1328" instrument_node=""> Bengaluru's major firms like </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tata_Consultancy_Services" title="Tata Consultancy Services"><span data-dcnode-id="1327" instrument_node="">TCS</span></a><span data-dcnode-id="1325" instrument_node="">, </span><a data-dcnode-id="1323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IBM" title="IBM"><span data-dcnode-id="1324" instrument_node="">IBM</span></a><span data-dcnode-id="1322" instrument_node="">, </span><a data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomson_Reuters" title="Thomson Reuters"><span data-dcnode-id="1321" instrument_node="">Thomson Reuters</span></a><span data-dcnode-id="1319" instrument_node="">, </span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wipro" title="Wipro"><span data-dcnode-id="1318" instrument_node="">Wipro</span></a><span data-dcnode-id="1316" instrument_node="">, </span><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Bosch" title="Robert Bosch"><span data-dcnode-id="1315" instrument_node="">Robert Bosch</span></a><span data-dcnode-id="1313" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SAP_Labs%23Organization" title="SAP Labs"><span data-dcnode-id="1312" instrument_node="">SAP Labs</span></a><span data-dcnode-id="1310" instrument_node="">,</span><sup class="reference" data-dcnode-id="1307" id="cite_ref-17"><a data-dcnode-id="1308" href="#cite_note-17"><span data-dcnode-id="1309" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1306" instrument_node=""> </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accenture" title="Accenture"><span data-dcnode-id="1305" instrument_node="">Accenture</span></a><span data-dcnode-id="1303" instrument_node="">, </span><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alcatel-Lucent" title="Alcatel-Lucent"><span data-dcnode-id="1302" instrument_node="">Alcatel-Lucent</span></a><sup class="reference" data-dcnode-id="1298" id="cite_ref-18"><a data-dcnode-id="1299" href="#cite_note-18"><span data-dcnode-id="1300" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1297" instrument_node=""> and </span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infosys" title="Infosys"><span data-dcnode-id="1296" instrument_node="">Infosys</span></a><sup class="reference" data-dcnode-id="1292" id="cite_ref-19"><a data-dcnode-id="1293" href="#cite_note-19"><span data-dcnode-id="1294" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1291" instrument_node=""> encourage employees to showcase the local favour by holding cultural events. The IT crowd show their support by wearing Kannada-themed T-shirts to workplaces.</span><sup class="reference" data-dcnode-id="1288" id="cite_ref-20"><a data-dcnode-id="1289" href="#cite_note-20"><span data-dcnode-id="1290" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1287" instrument_node=""> Educational institutions also hold such events at schools along with flag-hoisting and the rendering of </span><i data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">naadageethe</span></i><span data-dcnode-id="1284" instrument_node="">.</span><sup class="reference" data-dcnode-id="1281" id="cite_ref-21"><a data-dcnode-id="1282" href="#cite_note-21"><span data-dcnode-id="1283" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="1278" id="cite_ref-22"><a data-dcnode-id="1279" href="#cite_note-22"><span data-dcnode-id="1280" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1277" instrument_node="">
</span></p><span data-dcnode-id="1275" instrument_node="">
</span><h3 data-dcnode-id="1265"><span class="mw-headline" data-dcnode-id="1273" id="Non-resident_Kannadigas"><span data-dcnode-id="1274" instrument_node="">Non-resident Kannadigas</span></span><span class="mw-editsection" data-dcnode-id="1266"><span class="mw-editsection-bracket" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">[</span></span><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKarnataka_Rajyotsava%26action%3Dedit%26section%3D5" title="Edit section: Non-resident Kannadigas"><span data-dcnode-id="1270" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1263" instrument_node="">Apart from celebrations in Karnataka, it is also observed in other regions of India with significant Kannadiga population like </span><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mumbai" title="Mumbai"><span data-dcnode-id="1262" instrument_node="">Mumbai</span></a><span data-dcnode-id="1260" instrument_node="">, New Delhi,</span><sup class="reference" data-dcnode-id="1257" id="cite_ref-23"><a data-dcnode-id="1258" href="#cite_note-23"><span data-dcnode-id="1259" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1256" instrument_node=""> </span><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gurgaon" title="Gurgaon"><span data-dcnode-id="1255" instrument_node="">Gurgaon</span></a><sup class="reference" data-dcnode-id="1251" id="cite_ref-24"><a data-dcnode-id="1252" href="#cite_note-24"><span data-dcnode-id="1253" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1250" instrument_node=""> and </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chennai" title="Chennai"><span data-dcnode-id="1249" instrument_node="">Chennai</span></a><span data-dcnode-id="1247" instrument_node="">.</span><sup class="reference" data-dcnode-id="1244" id="cite_ref-25"><a data-dcnode-id="1245" href="#cite_note-25"><span data-dcnode-id="1246" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1243" instrument_node=""> Overseas Kannada organisations also take part in the festivities by arranging cultural events in countries like the United States,</span><sup class="reference" data-dcnode-id="1240" id="cite_ref-26"><a data-dcnode-id="1241" href="#cite_note-26"><span data-dcnode-id="1242" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1239" instrument_node=""> the United Kingdom, Singapore,</span><sup class="reference" data-dcnode-id="1236" id="cite_ref-27"><a data-dcnode-id="1237" href="#cite_note-27"><span data-dcnode-id="1238" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1235" instrument_node=""> </span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dubai" title="Dubai"><span data-dcnode-id="1234" instrument_node="">Dubai</span></a><span data-dcnode-id="1232" instrument_node="">,</span><sup class="reference" data-dcnode-id="1229" id="cite_ref-28"><a data-dcnode-id="1230" href="#cite_note-28"><span data-dcnode-id="1231" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1228" instrument_node=""> Qatar,</span><sup class="reference" data-dcnode-id="1225" id="cite_ref-29"><a data-dcnode-id="1226" href="#cite_note-29"><span data-dcnode-id="1227" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1224" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muscat%2C_Oman" title="Muscat, Oman"><span data-dcnode-id="1223" instrument_node="">Muscat</span></a><span data-dcnode-id="1221" instrument_node="">,</span><sup class="reference" data-dcnode-id="1218" id="cite_ref-30"><a data-dcnode-id="1219" href="#cite_note-30"><span data-dcnode-id="1220" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1217" instrument_node=""> South Korea,</span><sup class="reference" data-dcnode-id="1214" id="cite_ref-31"><a data-dcnode-id="1215" href="#cite_note-31"><span data-dcnode-id="1216" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1213" instrument_node=""> Australia,</span><sup class="reference" data-dcnode-id="1210" id="cite_ref-32"><a data-dcnode-id="1211" href="#cite_note-32"><span data-dcnode-id="1212" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1209" instrument_node=""> New Zealand,</span><sup class="reference" data-dcnode-id="1206" id="cite_ref-33"><a data-dcnode-id="1207" href="#cite_note-33"><span data-dcnode-id="1208" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1205" instrument_node=""> Scotland,</span><sup class="reference" data-dcnode-id="1202" id="cite_ref-34"><a data-dcnode-id="1203" href="#cite_note-34"><span data-dcnode-id="1204" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1201" instrument_node=""> Ireland,</span><sup class="reference" data-dcnode-id="1198" id="cite_ref-35"><a data-dcnode-id="1199" href="#cite_note-35"><span data-dcnode-id="1200" instrument_node="">[35]</span></a></sup><span data-dcnode-id="1197" instrument_node=""> The Netherlands</span><sup class="reference" data-dcnode-id="1194" id="cite_ref-36"><a data-dcnode-id="1195" href="#cite_note-36"><span data-dcnode-id="1196" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1193" instrument_node=""> and Germany.
