</span><p data-dcnode-id="9719"><a data-dcnode-id="9749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="9750" instrument_node="">Karnataka</span></a><span data-dcnode-id="9748" instrument_node="">, the sixth largest state in </span><a data-dcnode-id="9746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="9747" instrument_node="">India</span></a><span data-dcnode-id="9745" instrument_node="">, has been ranked as the third most popular state in the country for tourism in 2014.</span><sup class="reference" data-dcnode-id="9742" id="cite_ref-1"><a data-dcnode-id="9743" href="#cite_note-1"><span data-dcnode-id="9744" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="9739" id="cite_ref-2"><a data-dcnode-id="9740" href="#cite_note-2"><span data-dcnode-id="9741" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9738" instrument_node="">
</span><sup class="reference" data-dcnode-id="9735" id="cite_ref-3"><a data-dcnode-id="9736" href="#cite_note-3"><span data-dcnode-id="9737" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9734" instrument_node=""> It is home to 507 of the 3600 centrally protected monuments in India, the largest number after Uttar Pradesh.</span><sup class="reference" data-dcnode-id="9731" id="cite_ref-protect_4-0"><a data-dcnode-id="9732" href="#cite_note-protect-4"><span data-dcnode-id="9733" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9730" instrument_node=""> The State Directorate of Archaeology and Museums protects an additional 752 monuments and another 25,000 monuments are yet to receive protection.</span><sup class="reference" data-dcnode-id="9727" id="cite_ref-protected_monuments_5-0"><a data-dcnode-id="9728" href="#cite_note-protected_monuments-5"><span data-dcnode-id="9729" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9726" instrument_node=""> Tourism centres on the ancient sculptured temples, modern cities, the hill ranges, forests and beaches. Broadly, </span><i data-dcnode-id="9724"><span data-dcnode-id="9725" instrument_node="">tourism in Karnataka</span></i><span data-dcnode-id="9723" instrument_node=""> can be divided into four geographical regions: </span><a data-dcnode-id="9721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Karnataka" title="North Karnataka"><span data-dcnode-id="9722" instrument_node="">North Karnataka</span></a><span data-dcnode-id="9720" instrument_node="">, the Hill Stations, Coastal Karnataka and South Karnataka.
</span></p><p data-dcnode-id="9711"><span data-dcnode-id="9718" instrument_node="">The Karnataka government has recently introduced </span><a class="mw-redirect" data-dcnode-id="9716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Golden_Chariot" title="The Golden Chariot"><span data-dcnode-id="9717" instrument_node="">The Golden Chariot</span></a><span data-dcnode-id="9715" instrument_node=""> – a train which connects popular </span><a class="mw-redirect" data-dcnode-id="9713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tourist_destination" title="Tourist destination"><span data-dcnode-id="9714" instrument_node="">tourist destinations</span></a><span data-dcnode-id="9712" instrument_node=""> in the state and Goa.

</span><ul data-dcnode-id="8625"><li data-dcnode-id="8648"><a data-dcnode-id="8689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampi" title="Hampi"><span data-dcnode-id="8690" instrument_node="">Hampi</span></a><span data-dcnode-id="8688" instrument_node="">, </span><a data-dcnode-id="8686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bellary_district" title="Bellary district"><span data-dcnode-id="8687" instrument_node="">Bellary district</span></a><span data-dcnode-id="8685" instrument_node="">:</span><sup class="reference" data-dcnode-id="8682" id="cite_ref-Hampi_UNESCO_9-0"><a data-dcnode-id="8683" href="#cite_note-Hampi_UNESCO-9"><span data-dcnode-id="8684" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8681" instrument_node=""> The site of the capital of </span><a data-dcnode-id="8679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara" title="Vijayanagara"><span data-dcnode-id="8680" instrument_node="">Vijayanagara</span></a><span data-dcnode-id="8678" instrument_node=""> (1336) and formerly the seat of the </span><a class="mw-redirect" data-dcnode-id="8676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagar_Empire" title="Vijayanagar Empire"><span data-dcnode-id="8677" instrument_node="">Vijayanagar Empire</span></a><span data-dcnode-id="8675" instrument_node="">. Foreign visitors in the 15th and 16th centuries described Hampi as being bigger than Rome. The city was destroyed and deserted in 1565 by marauding Moghul invaders and its ruins now lie scattered over a 26&nbsp;sq.&nbsp;km area south of the river </span><a class="mw-redirect" data-dcnode-id="8673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tungabhadra" title="Tungabhadra"><span data-dcnode-id="8674" instrument_node="">Tungabhadra</span></a><span data-dcnode-id="8672" instrument_node="">. The rocky area near </span><a data-dcnode-id="8670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anegundi" title="Anegundi"><span data-dcnode-id="8671" instrument_node="">Anegundi</span></a><span data-dcnode-id="8669" instrument_node=""> to the north of the river has been identified as </span><a data-dcnode-id="8667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kishkindha" title="Kishkindha"><span data-dcnode-id="8668" instrument_node="">Kishkindha</span></a><span data-dcnode-id="8666" instrument_node=""> of </span><a data-dcnode-id="8664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramayana" title="Ramayana"><span data-dcnode-id="8665" instrument_node="">Ramayana</span></a><span data-dcnode-id="8663" instrument_node=""> times.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8656" style="white-space:nowrap;"><span data-dcnode-id="8662" instrument_node="">[</span><i data-dcnode-id="8658"><a data-dcnode-id="8659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8660" title="This claim needs references to reliable sources. (March 2009)"><span data-dcnode-id="8661" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8657" instrument_node="">]</span></sup><span data-dcnode-id="8655" instrument_node=""> Hampi is home to a 29-foot-tall (8.8&nbsp;m) monolithic </span><a data-dcnode-id="8653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Narasimha" title="Narasimha"><span data-dcnode-id="8654" instrument_node="">Narasimha</span></a><span data-dcnode-id="8652" instrument_node="">, which was installed by </span><a data-dcnode-id="8650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Krishnadevaraya" title="Krishnadevaraya"><span data-dcnode-id="8651" instrument_node="">Krishnadevaraya</span></a><span data-dcnode-id="8649" instrument_node=""> in 1529. The remains of palaces and gateways can be seen.</span></li><span data-dcnode-id="8647" instrument_node="">
</span><li data-dcnode-id="8626"><span data-dcnode-id="8646" instrument_node="">Group of 8th-century CE monuments, </span><a data-dcnode-id="8644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattadakal" title="Pattadakal"><span data-dcnode-id="8645" instrument_node="">Pattadakal</span></a><span data-dcnode-id="8643" instrument_node="">:</span><sup class="reference" data-dcnode-id="8640" id="cite_ref-10"><a data-dcnode-id="8641" href="#cite_note-10"><span data-dcnode-id="8642" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8639" instrument_node=""> Located on the banks of the </span><a data-dcnode-id="8637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaprabha_River" title="Malaprabha River"><span data-dcnode-id="8638" instrument_node="">river Malaprabha</span></a><span data-dcnode-id="8636" instrument_node="">, Pattadakal was the second capital of the </span><a class="mw-redirect" data-dcnode-id="8634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya" title="Chalukya"><span data-dcnode-id="8635" instrument_node="">Chalukyas</span></a><span data-dcnode-id="8633" instrument_node=""> and contains examples of 7th- and 8th-century temple architecture. Four temples are in the south Indian </span><a data-dcnode-id="8631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dravidian_architecture" title="Dravidian architecture"><span data-dcnode-id="8632" instrument_node="">Dravidian</span></a><span data-dcnode-id="8630" instrument_node=""> style, four in the North Indian </span><i data-dcnode-id="8628"><span data-dcnode-id="8629" instrument_node="">Nagara</span></i><span data-dcnode-id="8627" instrument_node=""> style and the last one, the Papanatha temple represents a hybrid of the two styles. The oldest temples are the Sangameshwara, Mallikarjuna and Virupaksha Temples.</span></li></ul><span data-dcnode-id="8624" instrument_node="">

ex=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Karnataka" title="North Karnataka"><span data-dcnode-id="8508" instrument_node="">North Karnataka</span></a></div></div></div><span data-dcnode-id="8503" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8493"><div class="thumbinner" data-dcnode-id="8494" style="width:222px;"><a class="image" data-dcnode-id="8501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APanchakuta_Basadi_%2810th_century_AD%29_at_Kambadahalli.JPG"><img alt="" class="thumbimage" data-dcnode-id="8502" data-file-height="1944" data-file-width="2592" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Panchakuta_Basadi_%252810th_century_AD%2529_at_Kambadahalli.JPG/220px-Panchakuta_Basadi_%252810th_century_AD%2529_at_Kambadahalli.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Panchakuta_Basadi_%2810th_century_AD%29_at_Kambadahalli.JPG/330px-Panchakuta_Basadi_%2810th_century_AD%29_at_Kambadahalli.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/29/Panchakuta_Basadi_%2810th_century_AD%29_at_Kambadahalli.JPG/440px-Panchakuta_Basadi_%2810th_century_AD%29_at_Kambadahalli.JPG 2x" width="220"></a><span data-dcnode-id="8500" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8495"><div class="magnify" data-dcnode-id="8498"><a class="internal" data-dcnode-id="8499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APanchakuta_Basadi_%2810th_century_AD%29_at_Kambadahalli.JPG" title="Enlarge"></a></div><a data-dcnode-id="8496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panchakuta_Basadi%2C_Kambadahalli" title="Panchakuta Basadi, Kambadahalli"><span data-dcnode-id="8497" instrument_node="">Panchakuta Basadi</span></a></div></div></div><span data-dcnode-id="8492" instrument_node="">
</span><ul data-dcnode-id="8477"><li data-dcnode-id="8478"><a data-dcnode-id="8490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aihole" title="Aihole"><span data-dcnode-id="8491" instrument_node="">Aihole</span></a><span data-dcnode-id="8489" instrument_node="">:</span><sup class="reference" data-dcnode-id="8486" id="cite_ref-11"><a data-dcnode-id="8487" href="#cite_note-11"><span data-dcnode-id="8488" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8485" instrument_node=""> a former Chalukya trading city. There are around 140 temples including examples of early </span><a class="mw-redirect" data-dcnode-id="8483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya" title="Chalukya"><span data-dcnode-id="8484" instrument_node="">Chalukya</span></a><span data-dcnode-id="8482" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashtrakuta" title="Rashtrakuta"><span data-dcnode-id="8481" instrument_node="">Rashtrakuta</span></a><span data-dcnode-id="8479" instrument_node=""> and later Chalukya dynasties from the 6th to 12th centuries. It has a Jain and Vedic rock-cut shrine, both of about the 6th century. It has Tirthankara images and a Durga temple. The meguti on a hill is a jaina basti which has an Aihole inscription of Pulakeshin 2 and also a Buddhist two-storied rock -cut shrine below it. All the other Jain and Buddhist temples are built of stone and resemble Hindu temples. The temples were built during the Middle Ages before any style was established and hence there is a mixture of styles.</span></li></ul><span data-dcnode-id="8476" instrument_node="">
</span><ul data-dcnode-id="8464"><li data-dcnode-id="8465"><a data-dcnode-id="8474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badami" title="Badami"><span data-dcnode-id="8475" instrument_node="">Badami</span></a><span data-dcnode-id="8473" instrument_node="">:</span><sup class="reference" data-dcnode-id="8470" id="cite_ref-12"><a data-dcnode-id="8471" href="#cite_note-12"><span data-dcnode-id="8472" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="8467" id="cite_ref-13"><a data-dcnode-id="8468" href="#cite_note-13"><span data-dcnode-id="8469" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8466" instrument_node=""> the capital of the early Chalukyas in the 6th century, is at the mouth of a ravine between two rocky hills. The town is known for its cave temples (all carved out of sandstone hills). Badami have four caves, the cave temple dedicated to Vishnu is the largest. In front of the cave temple, there is a reservoir called Aghastya Teertha dotted with temples on its bank. Among them, two are dedicated to Vishnu, one to Shiva and the fourth is a Jain Temple. Carvings in the cave temples display the Hindu gods, Narashima and Hari Hara. The temples also have paintings on the ceiling and bracket figures on the piers.</span></li></ul><span data-dcnode-id="8463" instrument_node="">
</span><ul data-dcnode-id="8431"><li data-dcnode-id="8456"><a data-dcnode-id="8461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basavana_Bagewadi" title="Basavana Bagewadi"><span data-dcnode-id="8462" instrument_node="">Basavana Bagewadi</span></a><span data-dcnode-id="8460" instrument_node="">: It is 43 east of Bijapur. In the 12th century, Saint </span><a class="mw-redirect" data-dcnode-id="8458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basavanna" title="Basavanna"><span data-dcnode-id="8459" instrument_node="">Basaveshwara</span></a><span data-dcnode-id="8457" instrument_node=""> was born here. It was an agrahara. The main temple here is in the Chalukya style and it was called as Sangamantha in records. The Samadhis of Siddharameshwara and Gurupadeshwara of the Inchageri school of spiritual pursuit are seen here.</span></li><span data-dcnode-id="8455" instrument_node="">
</span><li data-dcnode-id="8432"><a class="mw-redirect" data-dcnode-id="8453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basavakalyana" title="Basavakalyana"><span data-dcnode-id="8454" instrument_node="">Basavakalyana</span></a><span data-dcnode-id="8452" instrument_node="">,</span><sup class="reference" data-dcnode-id="8449" id="cite_ref-14"><a data-dcnode-id="8450" href="#cite_note-14"><span data-dcnode-id="8451" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8448" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="8446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidar_District" title="Bidar District"><span data-dcnode-id="8447" instrument_node="">Bidar District</span></a><span data-dcnode-id="8445" instrument_node="">: former capital of the Later </span><a class="mw-redirect" data-dcnode-id="8443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukyas" title="Chalukyas"><span data-dcnode-id="8444" instrument_node="">Chalukyas</span></a><span data-dcnode-id="8442" instrument_node="">. It has an old fort renovated by the </span><a class="mw-redirect" data-dcnode-id="8440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahamani" title="Bahamani"><span data-dcnode-id="8441" instrument_node="">Bahamani</span></a><span data-dcnode-id="8439" instrument_node=""> containing an Archaeological Museum. Few </span><a class="mw-redirect" data-dcnode-id="8437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya" title="Chalukya"><span data-dcnode-id="8438" instrument_node="">Chalukya</span></a><span data-dcnode-id="8436" instrument_node=""> or Kalachuri remains exist except the Chalukya Narayanapur temple in the outskirts of the town. There is a modern Basaveshwara temple, Prabhudevara Gadduge, Jurist of the </span><a class="mw-redirect" data-dcnode-id="8434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalyani_Chalukyas" title="Kalyani Chalukyas"><span data-dcnode-id="8435" instrument_node="">Kalyani Chalukyas</span></a><span data-dcnode-id="8433" instrument_node=""> period. Vijnaneshwara's Cave, Madivala Machiah's Pond, Akka Nagamma's Cave, fully renovated Siddheshwara temple and a new structure called Anubhava Mantapa, the Qaji's mosque and Raja Bagh Sawar Dargah.</span></li></ul><span data-dcnode-id="8430" instrument_node="">
</span><ul data-dcnode-id="8368"><li data-dcnode-id="8417"><a data-dcnode-id="8428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annigeri" title="Annigeri"><span data-dcnode-id="8429" instrument_node="">Annigeri</span></a><span data-dcnode-id="8427" instrument_node=""> (30&nbsp;km from </span><a data-dcnode-id="8425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubli" title="Hubli"><span data-dcnode-id="8426" instrument_node="">Hubli</span></a><span data-dcnode-id="8424" instrument_node="">): It has an Amriteshwara temple of the time of the </span><a class="mw-redirect" data-dcnode-id="8422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalyani_Chalukyas" title="Kalyani Chalukyas"><span data-dcnode-id="8423" instrument_node="">Kalyani Chalukyas</span></a><span data-dcnode-id="8421" instrument_node="">. It was the birthplace of great Kannada Poet Pampa and there is a Jain basadi of Parshwanatha. It was once a headquarters of Belvola-300. It was the capital of </span><a class="mw-redirect" data-dcnode-id="8419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya" title="Chalukya"><span data-dcnode-id="8420" instrument_node="">Chalukya</span></a><span data-dcnode-id="8418" instrument_node=""> Someshwara 4. In addition to Veerashaiva Mathas; there is a ruined Banashankari Temple and seven mosques and also an ancient Veerabhadra temple.</span></li><span data-dcnode-id="8416" instrument_node="">
</span><li data-dcnode-id="8409"><a data-dcnode-id="8414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bankapura" title="Bankapura"><span data-dcnode-id="8415" instrument_node="">Bankapura</span></a><span data-dcnode-id="8413" instrument_node=""> (80&nbsp;km from </span><a data-dcnode-id="8411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharwad" title="Dharwad"><span data-dcnode-id="8412" instrument_node="">Dharwad</span></a><span data-dcnode-id="8410" instrument_node="">): Under Chalukya many temples were raised in the city including the Nagareshwara temple in the fort and another chalukya temple called Siddheshwara. Ali Adilshahi destroyed many temples in about 1567. There is a mosque in the fort.</span></li><span data-dcnode-id="8408" instrument_node="">
</span><li data-dcnode-id="8398"><a data-dcnode-id="8406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dambal" title="Dambal"><span data-dcnode-id="8407" instrument_node="">Dambal</span></a><span data-dcnode-id="8405" instrument_node=""> (21&nbsp;km from </span><a class="mw-redirect" data-dcnode-id="8403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gadag" title="Gadag"><span data-dcnode-id="8404" instrument_node="">Gadag</span></a><span data-dcnode-id="8402" instrument_node="">): It was a Buddhist centre. There are two notable chalukya temples called </span><a data-dcnode-id="8400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doddabasappa_Temple" title="Doddabasappa Temple"><span data-dcnode-id="8401" instrument_node="">Doddabasappa Temple</span></a><span data-dcnode-id="8399" instrument_node=""> and Somewshwara Temple. Doddabassapa as polygonal star shaped temple garbhagriha and fine sculptural representations and huge nandi Temple. Someshwara could have been an old basati. The temple has a 400-year-old vast tank. There is an old Ganapathi image in old ruined fort. And we can also find a huge Ganapathi image in a small shrine.</span></li><span data-dcnode-id="8397" instrument_node="">
</span><li data-dcnode-id="8390"><a data-dcnode-id="8395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haveri" title="Haveri"><span data-dcnode-id="8396" instrument_node="">Haveri</span></a><span data-dcnode-id="8394" instrument_node="">: This town has </span><a data-dcnode-id="8392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siddhesvara_Temple" title="Siddhesvara Temple"><span data-dcnode-id="8393" instrument_node="">Siddheshvara Temple</span></a><span data-dcnode-id="8391" instrument_node=""> that was built in the 12th century. Siddeshvara Temple situated in the heart of the city of Haveri, inside the well-maintained garden.</span></li><span data-dcnode-id="8389" instrument_node="">

</span><p data-dcnode-id="8166"><span data-dcnode-id="8173" instrument_node="">The place is in Background of Western Ghats in lush, green atmosphere. It was the second capital of the </span><a class="mw-redirect" data-dcnode-id="8171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadambas" title="Kadambas"><span data-dcnode-id="8172" instrument_node="">Kadambas</span></a><span data-dcnode-id="8170" instrument_node=""> of </span><a data-dcnode-id="8168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banavasi" title="Banavasi"><span data-dcnode-id="8169" instrument_node="">Banavasi</span></a><span data-dcnode-id="8167" instrument_node="">. The huge Bhuvaraha Narasimha temple has tall images of Varaha, Narasimha, Narayana and Surya. Halasi has a fort and temples of Gokarneshswara, Kapileshwara, Swarneshwara and Hatakeshwara.
</span></p><span data-dcnode-id="8165" instrument_node="">
</span><ul data-dcnode-id="8161"><li data-dcnode-id="8162"><a data-dcnode-id="8163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hangal" title="Hangal"><span data-dcnode-id="8164" instrument_node="">Hangal</span></a></li></ul><span data-dcnode-id="8160" instrument_node="">
</span><p data-dcnode-id="8146"><span data-dcnode-id="8159" instrument_node="">Hanagal was the capital of Hangal </span><a class="mw-redirect" data-dcnode-id="8157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadambas" title="Kadambas"><span data-dcnode-id="8158" instrument_node="">Kadambas</span></a><span data-dcnode-id="8156" instrument_node="">, feudatories of </span><a class="mw-redirect" data-dcnode-id="8154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalyani_Chalukyas" title="Kalyani Chalukyas"><span data-dcnode-id="8155" instrument_node="">Kalyani Chalukyas</span></a><span data-dcnode-id="8153" instrument_node="">. It was mentioned as Panungal in records and identified by tradition with Viratanagara of </span><a class="mw-redirect" data-dcnode-id="8151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahabharatha" title="Mahabharatha"><span data-dcnode-id="8152" instrument_node="">Mahabharatha</span></a><span data-dcnode-id="8150" instrument_node=""> days. It is on the left bank of the Dharma River. The </span><i data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">Tarakeshwara temple</span></i><span data-dcnode-id="8147" instrument_node=""> here is a huge structure with series of images and polished tall Chalukya pillars. The other temples are Virabhadra, Billeshwara and Ramalinga etc. There is a Veerashaiva Kumaraswamy Matha here.
</span></p><span data-dcnode-id="8145" instrument_node="">
</span><ul data-dcnode-id="8141"><li data-dcnode-id="8142"><a data-dcnode-id="8143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banavasi" title="Banavasi"><span data-dcnode-id="8144" instrument_node="">Banavasi</span></a></li></ul><span data-dcnode-id="8140" instrument_node="">
</span><p data-dcnode-id="8123"><span data-dcnode-id="8139" instrument_node="">Banavasi was the capital of </span><a class="mw-redirect" data-dcnode-id="8137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadambas" title="Kadambas"><span data-dcnode-id="8138" instrument_node="">Kadambas</span></a><span data-dcnode-id="8136" instrument_node="">. The place is on the bank of the Varada river and its laterite fort is surrounded by the river at its three sides. </span><a data-dcnode-id="8134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ashoka" title="Ashoka"><span data-dcnode-id="8135" instrument_node="">Ashoka</span></a><span data-dcnode-id="8133" instrument_node=""> is said to have sent his missionaries to 'Vanavasa'. Banavasi also contains </span><a class="mw-redirect" data-dcnode-id="8131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhist" title="Buddhist"><span data-dcnode-id="8132" instrument_node="">Buddhist</span></a><span data-dcnode-id="8130" instrument_node=""> brick monuments. Chutu prince Nagashri built a Buddhist Vihara, a tank and installed a Naga image at the place according to a Prakrit record at the place. There is also a monument at Banavasi, Mudhukeshvara temple and also Kadamba Nagara Shikhara is seen on the garbhagriha of this temple. Records here indicate that </span><a data-dcnode-id="8128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buddhism" title="Buddhism"><span data-dcnode-id="8129" instrument_node="">Buddhism</span></a><span data-dcnode-id="8127" instrument_node=""> and </span><a data-dcnode-id="8125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jainism" title="Jainism"><span data-dcnode-id="8126" instrument_node="">Jainism</span></a><span data-dcnode-id="8124" instrument_node=""> were popular.
</span></p><span data-dcnode-id="8122" instrument_node="">
</span><h4 data-dcnode-id="8112"><span class="mw-headline" data-dcnode-id="8120" id="Deccan_Sultanates"><span data-dcnode-id="8121" instrument_node="">Deccan Sultanates</span></span><span class="mw-editsection" data-dcnode-id="8113"><span class="mw-editsection-bracket" data-dcnode-id="8118"><span data-dcnode-id="8119" instrument_node="">[</span></span><a data-dcnode-id="8116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D7" title="Edit section: Deccan Sultanates"><span data-dcnode-id="8117" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8114"><span data-dcnode-id="8115" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8111" instrument_node="">

</span><ul data-dcnode-id="8053"><li data-dcnode-id="8082"><a class="mw-redirect" data-dcnode-id="8094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bijapur%2C_Karnataka" title="Bijapur, Karnataka"><span data-dcnode-id="8095" instrument_node="">Bijapur</span></a><span data-dcnode-id="8093" instrument_node="">:</span><sup class="reference" data-dcnode-id="8090" id="cite_ref-17"><a data-dcnode-id="8091" href="#cite_note-17"><span data-dcnode-id="8092" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8089" instrument_node=""> The former capital of the Adil Shahi Kings (1489–1686). </span><a data-dcnode-id="8087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gol_Gumbaz" title="Gol Gumbaz"><span data-dcnode-id="8088" instrument_node="">Gol Gumbaz</span></a><sup class="reference" data-dcnode-id="8084" id="cite_ref-18"><a data-dcnode-id="8085" href="#cite_note-18"><span data-dcnode-id="8086" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8083" instrument_node=""> is the mausoleum of Muhammed Adil Shah and was built in 1659. It houses the world's second largest dome, unsupported by pillars. Malik-e-Maidan is a 55-ton cannon perched on a platform. The head of the cannon is fashioned into the shape of a lion whose jaws are trying to devour an elephant.</span></li><span data-dcnode-id="8081" instrument_node="">
</span><li data-dcnode-id="8070"><a data-dcnode-id="8079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidar" title="Bidar"><span data-dcnode-id="8080" instrument_node="">Bidar</span></a><span data-dcnode-id="8078" instrument_node="">:</span><sup class="reference" data-dcnode-id="8075" id="cite_ref-19"><a data-dcnode-id="8076" href="#cite_note-19"><span data-dcnode-id="8077" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8074" instrument_node=""> a centre for </span><a data-dcnode-id="8072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidriware" title="Bidriware"><span data-dcnode-id="8073" instrument_node="">Bidriware</span></a><span data-dcnode-id="8071" instrument_node="">. It is the location of the tombs of 30 rulers including the Chaukhandi of Hazrat Khalil-Ullah Shah and Sultan Ahmed Shah Al Wali Bahamani from the Bahamani dynasty.</span></li><span data-dcnode-id="8069" instrument_node="">
</span><li data-dcnode-id="8066"><a class="mw-redirect" data-dcnode-id="8067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulbarga" title="Gulbarga"><span data-dcnode-id="8068" instrument_node="">Gulbarga</span></a></li><span data-dcnode-id="8065" instrument_node="">
</span><li data-dcnode-id="8062"><a data-dcnode-id="8063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raichur" title="Raichur"><span data-dcnode-id="8064" instrument_node="">Raichur</span></a></li><span data-dcnode-id="8061" instrument_node="">
</span><li data-dcnode-id="8054"><a class="mw-redirect" data-dcnode-id="8059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakshmeshwar" title="Lakshmeshwar"><span data-dcnode-id="8060" instrument_node="">Lakshmeshwar</span></a><span data-dcnode-id="8058" instrument_node="">: The Jumma Masjid, built during the rule of </span><a class="mw-redirect" data-dcnode-id="8056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adilshahi" title="Adilshahi"><span data-dcnode-id="8057" instrument_node="">Adilshahi</span></a><span data-dcnode-id="8055" instrument_node="">, has a large crowning onion dome and Koranic scripture written in gold.</span></li></ul><span data-dcnode-id="8052" instrument_node="">
</span><h4 data-dcnode-id="8042"><span class="mw-headline" data-dcnode-id="8050" id="Rattas"><span data-dcnode-id="8051" instrument_node="">Rattas</span></span><span class="mw-editsection" data-dcnode-id="8043"><span class="mw-editsection-bracket" data-dcnode-id="8048"><span data-dcnode-id="8049" instrument_node="">[</span></span><a data-dcnode-id="8046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D8" title="Edit section: Rattas"><span data-dcnode-id="8047" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8044"><span data-dcnode-id="8045" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8041" instrument_node="">
</span><ul data-dcnode-id="8018"><li data-dcnode-id="8019"><a data-dcnode-id="8039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saundatti" title="Saundatti"><span data-dcnode-id="8040" instrument_node="">Saundatti</span></a><span data-dcnode-id="8038" instrument_node="">: The town proper has a fort on the hill built during the 17th century, by Sirasangi Desai, with eight bastions. It was the </span><i data-dcnode-id="8036"><span data-dcnode-id="8037" instrument_node="">capital of Rattas</span></i><span data-dcnode-id="8035" instrument_node=""> who later shifted their headquarters to Belgaum. There are two temples of Ankeshwara, Puradeshwara, Mallikarjuna, Venkateshwara and the Veerabhadra. The Renukasagar waters touch the outskirts of Saundatti. Tourist attractions of this region are </span><a data-dcnode-id="8033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hooli" title="Hooli"><span data-dcnode-id="8034" instrument_node="">Hooli</span></a><span data-dcnode-id="8032" instrument_node=""> Panchalingeshwara temple, </span><a data-dcnode-id="8030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renuka" title="Renuka"><span data-dcnode-id="8031" instrument_node="">Renuka</span></a><span data-dcnode-id="8029" instrument_node=""> (Yallamma) temple, </span><a data-dcnode-id="8027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saundatti" title="Saundatti"><span data-dcnode-id="8028" instrument_node="">Saundatti</span></a><span data-dcnode-id="8026" instrument_node=""> Fort, </span><a data-dcnode-id="8024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parasgad_Fort" title="Parasgad Fort"><span data-dcnode-id="8025" instrument_node="">Parasgad Fort</span></a><span data-dcnode-id="8023" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navilateertha" title="Navilateertha"><span data-dcnode-id="8022" instrument_node="">Navilateertha</span></a><span data-dcnode-id="8020" instrument_node="">.</span></li></ul><span data-dcnode-id="8017" instrument_node="">
</span><h3 data-dcnode-id="8007"><span class="mw-headline" data-dcnode-id="8015" id="Places_of_worship"><span data-dcnode-id="8016" instrument_node="">Places of worship</span></span><span class="mw-editsection" data-dcnode-id="8008"><span class="mw-editsection-bracket" data-dcnode-id="8013"><span data-dcnode-id="8014" instrument_node="">[</span></span><a data-dcnode-id="8011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D9" title="Edit section: Places of worship"><span data-dcnode-id="8012" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8009"><span data-dcnode-id="8010" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8006" instrument_node="">
</span><ul data-dcnode-id="7994"><li data-dcnode-id="7995"><span data-dcnode-id="8005" instrument_node="">Devala </span><a data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ganagapura" title="Ganagapura"><span data-dcnode-id="8004" instrument_node="">Ganagapura</span></a><span data-dcnode-id="8002" instrument_node="">, It is the second incarnation of Lord Dattatreya away from Afzalpur taluk around 25&nbsp;km, </span><a data-dcnode-id="8000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalaburagi_district" title="Kalaburagi district"><span data-dcnode-id="8001" instrument_node="">Kalaburagi district</span></a><span data-dcnode-id="7999" instrument_node="">: It is 651&nbsp;km from Bangalore. Sri Narasimha Saraswati stayed here for a long time and was granted a jagir by the Bahmani Sultan. The sultan believed that the saint had cured him of a large boil. The saint is treated by his followers as an incarnation of Dattatreya. The Saint has cured the Sultan of a serious boil. The Saint is treated as an incarnation of </span><a data-dcnode-id="7997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dattatreya" title="Dattatreya"><span data-dcnode-id="7998" instrument_node="">Dattatreya</span></a><span data-dcnode-id="7996" instrument_node=""> and devotees from Maharashtra and Karnataka. It is a very holy place.</span></li></ul><span data-dcnode-id="7993" instrument_node="">

ancient centre Tavanidi near </span><a class="mw-redirect" data-dcnode-id="7949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nippani" title="Nippani"><span data-dcnode-id="7950" instrument_node="">Nippani</span></a><span data-dcnode-id="7948" instrument_node=""> and newly created centre at Shedbal, where 24 </span><a class="mw-redirect" data-dcnode-id="7946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tirthankaras" title="Tirthankaras"><span data-dcnode-id="7947" instrument_node="">Tirthankaras</span></a><span data-dcnode-id="7945" instrument_node=""> in white marble have been installed in a cluster.

</span></p><p data-dcnode-id="7914"><a data-dcnode-id="7925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakkundi" title="Lakkundi"><span data-dcnode-id="7926" instrument_node="">Lakkundi</span></a><span data-dcnode-id="7924" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="7922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gadag_District" title="Gadag District"><span data-dcnode-id="7923" instrument_node="">Gadag District</span></a><span data-dcnode-id="7921" instrument_node=""> has a large Brahma Jinalaya of </span><i data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">Chalukya</span></i><span data-dcnode-id="7918" instrument_node=""> style, built by a noble lady, </span><a data-dcnode-id="7916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attimabbe" title="Attimabbe"><span data-dcnode-id="7917" instrument_node="">Attimabbe</span></a><span data-dcnode-id="7915" instrument_node="">.
</span></p><p data-dcnode-id="7907"><a data-dcnode-id="7912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navagraha_Jain_Temple" title="Navagraha Jain Temple"><span data-dcnode-id="7913" instrument_node="">Navagraha Jain Temple</span></a><span data-dcnode-id="7911" instrument_node=""> at Varur near </span><a data-dcnode-id="7909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubli" title="Hubli"><span data-dcnode-id="7910" instrument_node="">Hubli</span></a><span data-dcnode-id="7908" instrument_node=""> is one of the major pilgrimage. The temple features a 61 feet (18.6 m) tall monolithic idol of the Shri 1008 Bhagavan Parshvanatha and the smaller statues of the other 8 Jain teerthankaras.

</span><h4 data-dcnode-id="7830"><span class="mw-headline" data-dcnode-id="7838" id="Shiva_temples"><span data-dcnode-id="7839" instrument_node="">Shiva temples</span></span><span class="mw-editsection" data-dcnode-id="7831"><span class="mw-editsection-bracket" data-dcnode-id="7836"><span data-dcnode-id="7837" instrument_node="">[</span></span><a data-dcnode-id="7834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D12" title="Edit section: Shiva temples"><span data-dcnode-id="7835" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7832"><span data-dcnode-id="7833" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7829" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7816"><div class="thumbinner" data-dcnode-id="7817" style="width:222px;"><a class="image" data-dcnode-id="7827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKudala_Sangama.jpg"><img alt="" class="thumbimage" data-dcnode-id="7828" data-file-height="1200" data-file-width="1600" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Kudala_Sangama.jpg/220px-Kudala_Sangama.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Kudala_Sangama.jpg/330px-Kudala_Sangama.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Kudala_Sangama.jpg/440px-Kudala_Sangama.jpg 2x" width="220"></a><span data-dcnode-id="7826" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7818"><div class="magnify" data-dcnode-id="7824"><a class="internal" data-dcnode-id="7825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKudala_Sangama.jpg" title="Enlarge"></a></div><a data-dcnode-id="7822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kudalasangama" title="Kudalasangama"><span data-dcnode-id="7823" instrument_node="">Kudalasangama</span></a><span data-dcnode-id="7821" instrument_node=""> in </span><a data-dcnode-id="7819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bagalkot_district" title="Bagalkot district"><span data-dcnode-id="7820" instrument_node="">Bagalkot district</span></a></div></div></div><span data-dcnode-id="7815" instrument_node="">
</span><p data-dcnode-id="7802"><a class="mw-redirect" data-dcnode-id="7813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gokarna%2C_India" title="Gokarna, India"><span data-dcnode-id="7814" instrument_node="">Gokarna</span></a><span data-dcnode-id="7812" instrument_node=""> is a great all-India centre where the Atmalinga (Mahabaleshwara) of Shiva, brought by Ravana is believed to have been installed. Nearby is </span><a data-dcnode-id="7810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murdeshwar" title="Murdeshwar"><span data-dcnode-id="7811" instrument_node="">Murdeshwar</span></a><span data-dcnode-id="7809" instrument_node=""> where a huge modern Shiva temple in Dravidian Style has been raised, renovating an ancient shrine. Both the places are on the sea-shore in </span><a data-dcnode-id="7807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uttara_Kannada" title="Uttara Kannada"><span data-dcnode-id="7808" instrument_node="">Uttara Kannada</span></a><span data-dcnode-id="7806" instrument_node="">. At </span><a data-dcnode-id="7804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampi" title="Hampi"><span data-dcnode-id="7805" instrument_node="">Hampi</span></a><span data-dcnode-id="7803" instrument_node=""> is the Virupaksha Temple, venerated by generations of poets, scholars, kings and commoners.
</span></p><p data-dcnode-id="7788"><span data-dcnode-id="7801" instrument_node="">The Shiva temple at </span><a data-dcnode-id="7799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kudalasangama" title="Kudalasangama"><span data-dcnode-id="7800" instrument_node="">Kudalasangama</span></a><span data-dcnode-id="7798" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="7796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bagalkot_District" title="Bagalkot District"><span data-dcnode-id="7797" instrument_node="">Bagalkot District</span></a><span data-dcnode-id="7795" instrument_node=""> is associated with Saint </span><a class="mw-redirect" data-dcnode-id="7793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basaveshwara" title="Basaveshwara"><span data-dcnode-id="7794" instrument_node="">Basaveshwara</span></a><span data-dcnode-id="7792" instrument_node="">. Equally remarkable pieces of art are the Virupaksha and the Mallikarjuna at </span><a data-dcnode-id="7790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattadakal" title="Pattadakal"><span data-dcnode-id="7791" instrument_node="">Pattadakal</span></a><span data-dcnode-id="7789" instrument_node=""> in Bagalkote dt.
</span></p><p data-dcnode-id="7765"><span data-dcnode-id="7787" instrument_node="">The Veerashaivas have many venerated places, either associated with Basaveshwara or his contemporaries. </span><a data-dcnode-id="7785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basavana_Bagewadi" title="Basavana Bagewadi"><span data-dcnode-id="7786" instrument_node="">Basavana Bagewadi</span></a><span data-dcnode-id="7784" instrument_node=""> was his place of birth and Kudala Sangama the place of his spiritual practices, are in Bijapur and Bagalkot dts. The latter is at the confluence of the river Krishna and the Malaprabha. </span><a class="mw-redirect" data-dcnode-id="7782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basava_Kalyana" title="Basava Kalyana"><span data-dcnode-id="7783" instrument_node="">Basava Kalyana</span></a><span data-dcnode-id="7781" instrument_node=""> (Kalyani), the ancient Chalukya capital in </span><a class="mw-redirect" data-dcnode-id="7779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidar_District" title="Bidar District"><span data-dcnode-id="7780" instrument_node="">Bidar District</span></a><span data-dcnode-id="7778" instrument_node=""> was the place where he conducted his socio-religious movement. </span><a data-dcnode-id="7776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ulavi" title="Ulavi"><span data-dcnode-id="7777" instrument_node="">Ulavi</span></a><span data-dcnode-id="7775" instrument_node=""> in </span><a data-dcnode-id="7773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uttara_Kannada" title="Uttara Kannada"><span data-dcnode-id="7774" instrument_node="">Uttara Kannada</span></a><span data-dcnode-id="7772" instrument_node="">, a quiet place amidst forests, has the samadhi of Chennabasavanna, Basaveshwara's nephew. Belgami (</span><a data-dcnode-id="7770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balligavi" title="Balligavi"><span data-dcnode-id="7771" instrument_node="">Balligavi</span></a><span data-dcnode-id="7769" instrument_node="">), the Chalukya art centre in Shimoga dt. is identified as the birthplace of Allama Prabhu and Uduthadi near it, is the native place of Akka Mahadevi.
Later Veerashaiva saints are associated with many places. Kodekal (Gulbarga dt.) Basavanna temple, Kadakola Madivallajja Matha, Sharana Basaveshwara temple and Dasoha Math at </span><a class="mw-redirect" data-dcnode-id="7767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulbarga" title="Gulbarga"><span data-dcnode-id="7768" instrument_node="">Gulbarga</span></a><span data-dcnode-id="7766" instrument_node=""> are few more places of worship.
</span></p><p data-dcnode-id="7763"><span data-dcnode-id="7764" instrument_node="">Athani has the samadhi of the Veerashaiva Saint Shivayogi. Some of the outstanding Veerashaiva Mathas are seen at Naganur near Bailhongal and Kalmatha in Belgaum, Durudundeshwara Matha at Arabhavi and Mahantaswamy Matha
at Murgod are in Belgaum dt. Murugha Matha (Dharwad), Annadaneshwara Matha (Mundargi), Tontadarya Matha at Gadag and Dambal, Moorusavira Matha at Hubli, Murugha Matha and Hukkeri Matha (Haveri), Taralabalu Matha at Sirigere, Murugharajendra Matha at Chitradurga, Banthanala Shivajogi Matha at Chadachan and Mahantaswamy Matha (Ilkal) are equally notable. The samadhi of Sharanabasappa Appa at Gulbarga.
</span></p><span data-dcnode-id="7762" instrument_node="">
