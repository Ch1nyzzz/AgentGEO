</span><p data-dcnode-id="7540"><span data-dcnode-id="7586" instrument_node="">Coastal Karnataka is the stronghold of Hindu and Jain pilgrimage spots with </span><a data-dcnode-id="7584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Udupi" title="Udupi"><span data-dcnode-id="7585" instrument_node="">Udupi</span></a><span data-dcnode-id="7583" instrument_node=""> and its many temples being the centre of </span><a class="mw-redirect" data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dvaita" title="Dvaita"><span data-dcnode-id="7582" instrument_node="">Dvaita</span></a><span data-dcnode-id="7580" instrument_node=""> philosophy, </span><a class="mw-redirect" data-dcnode-id="7578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gokarna%2C_India" title="Gokarna, India"><span data-dcnode-id="7579" instrument_node="">Gokarna</span></a><span data-dcnode-id="7577" instrument_node=""> is known for </span><a class="mw-redirect" data-dcnode-id="7575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vedic_civilization" title="Vedic civilization"><span data-dcnode-id="7576" instrument_node="">Vedic</span></a><span data-dcnode-id="7574" instrument_node=""> studies, </span><a data-dcnode-id="7572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sringeri" title="Sringeri"><span data-dcnode-id="7573" instrument_node="">Sringeri</span></a><span data-dcnode-id="7571" instrument_node=""> has the first of the </span><a data-dcnode-id="7569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shankaracharya" title="Shankaracharya"><span data-dcnode-id="7570" instrument_node="">Shankaracharya</span></a><span data-dcnode-id="7568" instrument_node=""> </span><a data-dcnode-id="7566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matha" title="Matha"><span data-dcnode-id="7567" instrument_node="">mathas</span></a><span data-dcnode-id="7565" instrument_node=""> and is important for its </span><a class="mw-redirect" data-dcnode-id="7563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Advaita" title="Advaita"><span data-dcnode-id="7564" instrument_node="">Advaita</span></a><span data-dcnode-id="7562" instrument_node=""> philosophy, </span><a data-dcnode-id="7560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karkala" title="Karkala"><span data-dcnode-id="7561" instrument_node="">Karkala</span></a><span data-dcnode-id="7559" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mudabidri" title="Mudabidri"><span data-dcnode-id="7558" instrument_node="">Mudabidri</span></a><span data-dcnode-id="7556" instrument_node=""> are well known places of Jain worship and Vaishnava rituals. Exquisite Vijayanagar temples built in </span><a class="mw-redirect" data-dcnode-id="7554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya" title="Chalukya"><span data-dcnode-id="7555" instrument_node="">Chalukya</span></a><span data-dcnode-id="7553" instrument_node=""> – </span><a class="mw-redirect" data-dcnode-id="7551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malabar_region" title="Malabar region"><span data-dcnode-id="7552" instrument_node="">Malabar region</span></a><span data-dcnode-id="7550" instrument_node=""> combinational style are seen in </span><a data-dcnode-id="7548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhatkal" title="Bhatkal"><span data-dcnode-id="7549" instrument_node="">Bhatkal</span></a><span data-dcnode-id="7547" instrument_node="">, </span><a data-dcnode-id="7545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kumta" title="Kumta"><span data-dcnode-id="7546" instrument_node="">Kumta</span></a><span data-dcnode-id="7544" instrument_node="">, </span><a data-dcnode-id="7542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shirali" title="Shirali"><span data-dcnode-id="7543" instrument_node="">Shirali</span></a><span data-dcnode-id="7541" instrument_node=""> etc. The warm beaches of Karnataka are mostly unspoiled.
</span></p><p data-dcnode-id="7533"><a data-dcnode-id="7538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jamboti" title="Jamboti"><span data-dcnode-id="7539" instrument_node="">Jamboti</span></a><span data-dcnode-id="7537" instrument_node="">, 20&nbsp;km south-west of </span><a data-dcnode-id="7535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgaum" title="Belgaum"><span data-dcnode-id="7536" instrument_node="">Belgaum</span></a><span data-dcnode-id="7534" instrument_node="">, has popular evergreen hilltop forests.
</span></p><p data-dcnode-id="7525"><span data-dcnode-id="7532" instrument_node="">Karnataka is blessed with over 300&nbsp;km of pristine coastal stretch. </span><a data-dcnode-id="7530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netrani_Island" title="Netrani Island"><span data-dcnode-id="7531" instrument_node="">Netrani Island</span></a><span data-dcnode-id="7529" instrument_node=""> of Uttara Kannada is known for coral reefs. St. Mary's Island, a few kilometres from Udupi has basalt rock formations. Sunny beaches at places like </span><a data-dcnode-id="7527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malpe" title="Malpe"><span data-dcnode-id="7528" instrument_node="">Malpe</span></a><span data-dcnode-id="7526" instrument_node="">, Murdeshwar, Maravanthe,
Gokarna, Kumta have spectacular mountains to the east. Agumbe, Kodachadri hills, Kemmangundi, are just a few of many hill stations that straddle the coast providing tourists sun and greenery. Unlike many crowded hill stations in South India, the hill stations of Karnataka are still mostly undiscovered and pristine.
</span></p><span data-dcnode-id="7524" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7510"><div class="thumbinner" data-dcnode-id="7511" style="width:222px;"><a class="image" data-dcnode-id="7522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOm_Beach_Gokarna_India.jpg"><img alt="" class="thumbimage" data-dcnode-id="7523" data-file-height="510" data-file-width="680" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/a/af/Om_Beach_Gokarna_India.jpg/220px-Om_Beach_Gokarna_India.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/a/af/Om_Beach_Gokarna_India.jpg/330px-Om_Beach_Gokarna_India.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/a/af/Om_Beach_Gokarna_India.jpg/440px-Om_Beach_Gokarna_India.jpg 2x" width="220"></a><span data-dcnode-id="7521" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7512"><div class="magnify" data-dcnode-id="7519"><a class="internal" data-dcnode-id="7520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOm_Beach_Gokarna_India.jpg" title="Enlarge"></a></div><span data-dcnode-id="7518" instrument_node="">Om beach, near </span><a class="mw-redirect" data-dcnode-id="7516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gokarna%2C_Uttara_Kannada" title="Gokarna, Uttara Kannada"><span data-dcnode-id="7517" instrument_node="">Gokarna</span></a><span data-dcnode-id="7515" instrument_node="">, </span><a data-dcnode-id="7513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Karnataka" title="North Karnataka"><span data-dcnode-id="7514" instrument_node="">North Karnataka</span></a></div></div></div><span data-dcnode-id="7509" instrument_node="">
</span><ul data-dcnode-id="7487"><li data-dcnode-id="7499"><a class="mw-redirect" data-dcnode-id="7507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gokarna%2C_India" title="Gokarna, India"><span data-dcnode-id="7508" instrument_node="">Gokarna</span></a><span data-dcnode-id="7506" instrument_node="">: The Coastal town of Gokarna is a pilgrimage centre as well as a centre of Sanskrit learning, 56&nbsp;km from Karwar. It has the Mahabaleswar Temple with the 'Atmalinga' dedicated to </span><a data-dcnode-id="7504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiva" title="Shiva"><span data-dcnode-id="7505" instrument_node="">Shiva</span></a><span data-dcnode-id="7503" instrument_node="">. There is an enormous chariot, which is taken out in a procession on Shiva's birthday in February. The Tambraparni Teertha here is considered sacred to perform obsequies of the dead. There is a beach called </span><i data-dcnode-id="7501"><span data-dcnode-id="7502" instrument_node="">Om Beach</span></i><span data-dcnode-id="7500" instrument_node="">.</span></li><span data-dcnode-id="7498" instrument_node="">
</span><li data-dcnode-id="7491"><a data-dcnode-id="7496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Udupi" title="Udupi"><span data-dcnode-id="7497" instrument_node="">Udupi</span></a><span data-dcnode-id="7495" instrument_node="">: One of the holy place and it is 58&nbsp;km from </span><a data-dcnode-id="7493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangalore" title="Mangalore"><span data-dcnode-id="7494" instrument_node="">Mangalore</span></a><span data-dcnode-id="7492" instrument_node="">. The Krishna temple here is founded by Acharya Madhwa during the 14th century. He founded eight mathas to conduct the services of Lord Krishna in turns. Paryaya festival is held once in two years in January. The place has Kadiyali Durga temple, Ambalapadi Shakti temple, Raghavendra Matha and the Venkataraman swamy temple. Malpe is the port near here. It has a beach and the Vadabhandeshwara temple of Balarama.</span></li><span data-dcnode-id="7490" instrument_node="">
</span><li data-dcnode-id="7488"><span data-dcnode-id="7489" instrument_node="">Thantrady&nbsp;: One of the holy place and it is 22&nbsp;km from Udupi. The brammasthana temple here founded by sri Ramanna bairy. It was an astabanda bramha. The main archaka of this temple is Nagaraj bairy.</span></li></ul><span data-dcnode-id="7486" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7473"><div class="thumbinner" data-dcnode-id="7474" style="width:222px;"><a class="image" data-dcnode-id="7484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChaturmukha_Basadi.jpg"><img alt="" class="thumbimage" data-dcnode-id="7485" data-file-height="2529" data-file-width="2526" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Chaturmukha_Basadi.jpg/220px-Chaturmukha_Basadi.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Chaturmukha_Basadi.jpg/330px-Chaturmukha_Basadi.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/43/Chaturmukha_Basadi.jpg/440px-Chaturmukha_Basadi.jpg 2x" width="220"></a><span data-dcnode-id="7483" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7475"><div class="magnify" data-dcnode-id="7481"><a class="internal" data-dcnode-id="7482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChaturmukha_Basadi.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="7479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaturmukha_Basadi" title="Chaturmukha Basadi"><span data-dcnode-id="7480" instrument_node="">Chaturmukha Basadi</span></a><span data-dcnode-id="7478" instrument_node="">, </span><a data-dcnode-id="7476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karkala" title="Karkala"><span data-dcnode-id="7477" instrument_node="">Karkala</span></a></div></div></div><span data-dcnode-id="7472" instrument_node="">
</span><ul data-dcnode-id="7434"><li data-dcnode-id="7462"><a data-dcnode-id="7470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karkala" title="Karkala"><span data-dcnode-id="7471" instrument_node="">Karkala</span></a><span data-dcnode-id="7469" instrument_node="">: 50&nbsp;km from Mangalore and 20&nbsp;km from North of Moodabidire, is Karkala, an important centre of Jainism. There are several temples and a 17&nbsp;metres high statue of Bahubali (</span><a class="mw-redirect" data-dcnode-id="7467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gomateshwara" title="Gomateshwara"><span data-dcnode-id="7468" instrument_node="">Gomateshwara</span></a><span data-dcnode-id="7466" instrument_node="">), situated on a small hill. The statue is a naked figure reached by a flight of rock-cut steps. Some of the temples are Chaturmukha Basti (1587), Neminatha Basti, Ananthapadmanabha Temple (1567) dedicated to Vishnu, and Venkataramana temple (</span><a data-dcnode-id="7464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Padutirupathi" title="Padutirupathi"><span data-dcnode-id="7465" instrument_node="">Padutirupathi</span></a><span data-dcnode-id="7463" instrument_node="">).</span></li><span data-dcnode-id="7461" instrument_node="">
</span><li data-dcnode-id="7454"><a data-dcnode-id="7459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venur" title="Venur"><span data-dcnode-id="7460" instrument_node="">Venur</span></a><span data-dcnode-id="7458" instrument_node="">: Situated 50&nbsp;km NE of Mangalore, has eight Bastis and ruins of a Mahadeva temple. The largest of them is the 17C Kalli Basti, dedicated to Shantinatha. There is a </span><a class="mw-redirect" data-dcnode-id="7456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gommateshwara" title="Gommateshwara"><span data-dcnode-id="7457" instrument_node="">Gommateshwara</span></a><span data-dcnode-id="7455" instrument_node=""> Monolith, 11metres high dating back to 1604 in Venur.</span></li><span data-dcnode-id="7453" instrument_node="">
</span><li data-dcnode-id="7445"><a class="mw-redirect" data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malpe_Beach" title="Malpe Beach"><span data-dcnode-id="7452" instrument_node="">Malpe Beach</span></a><span data-dcnode-id="7450" instrument_node="">: Situated 66&nbsp;km north of Mangalore, near Manipal.</span><sup class="reference" data-dcnode-id="7447" id="cite_ref-20"><a data-dcnode-id="7448" href="#cite_note-20"><span data-dcnode-id="7449" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7446" instrument_node=""> It has a tourist beach. The uninhibited St. Mary's Island, accessible by boat, has a beach and an impressive geological formation of basalt rock pillars into the sea.</span></li><span data-dcnode-id="7444" instrument_node="">
</span><li data-dcnode-id="7440"><a class="mw-redirect" data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dharmastala" title="Dharmastala"><span data-dcnode-id="7443" instrument_node="">Dharmastala</span></a><span data-dcnode-id="7441" instrument_node="">: Situated 75&nbsp;km from Mangalore, Dharmastala is an attractive site surrounded by forested hills, rice fields and by the river Netravati on all sides. The Manjunatha temple here is a pilgrim centre. A Monolithic statue of Bahubali 14metres high was erected here in 1973. Visitors are provided with free boarding and lodging by the temple authorities. There is a small museum, Manjusha Museum located opposite to the temple. There are two temple chariots covered in wooden figures and all types of religious objects including carved and painted panels, bronze sculptures and bells.</span></li><span data-dcnode-id="7439" instrument_node="">
</span><li data-dcnode-id="7435"><a data-dcnode-id="7437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kollur%2C_Udupi_district" title="Kollur, Udupi district"><span data-dcnode-id="7438" instrument_node="">Kollur</span></a><span data-dcnode-id="7436" instrument_node="">, 147&nbsp;km from Mangalore: The temple of goddess Mookambika is located here on top of Kodachadri hill, at the foot of the Western Ghats. The goddess takes the form of a 'Jyotirlinga' incorporating aspects of Shiva and Shakti. It is a pilgrimage centre attracting lot of devotees.</span></li></ul><span data-dcnode-id="7433" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7420"><div class="thumbinner" data-dcnode-id="7421" style="width:222px;"><a class="image" data-dcnode-id="7431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG"><img alt="" class="thumbimage" data-dcnode-id="7432" data-file-height="3000" data-file-width="4000" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/33/1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG/220px-1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/33/1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG/330px-1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/33/1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG/440px-1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG 2x" width="220"></a><span data-dcnode-id="7430" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7422"><div class="magnify" data-dcnode-id="7428"><a class="internal" data-dcnode-id="7429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1000-Pillar-Temple-Moodbidri-Left-Side-View.JPG" title="Enlarge"></a></div><a data-dcnode-id="7426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saavira_Kambada_Basadi" title="Saavira Kambada Basadi"><span data-dcnode-id="7427" instrument_node="">Saavira Kambada Basadi</span></a><span data-dcnode-id="7425" instrument_node="">, </span><a data-dcnode-id="7423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moodabidri" title="Moodabidri"><span data-dcnode-id="7424" instrument_node="">Moodabidri</span></a></div></div></div><span data-dcnode-id="7419" instrument_node="">
</span><ul data-dcnode-id="7396"><li data-dcnode-id="7415"><a class="mw-redirect" data-dcnode-id="7417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moodabidre" title="Moodabidre"><span data-dcnode-id="7418" instrument_node="">Moodabidre</span></a><span data-dcnode-id="7416" instrument_node="">: Situated 35&nbsp;km from Mangalore, Moodabidire has Jain temples known as Basti's. There are 18 Bastis, the oldest and the largest is the Chandranatha Basti (1429) with its 1000 pillared hall. 'The Jain Matha' near the entrance has an important collection of manuscripts. Other shrines worthy of mention are Shantinatha, Settara, Derama Setti Basti, Guru Basti, Kote and Vikrama Setti Basti.</span></li><span data-dcnode-id="7414" instrument_node="">
</span><li data-dcnode-id="7410"><a data-dcnode-id="7412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhatkal" title="Bhatkal"><span data-dcnode-id="7413" instrument_node="">Bhatkal</span></a><span data-dcnode-id="7411" instrument_node="">: located 135&nbsp;km from Karwar was the main port of Vijayanagar empire in the 16th century. The ancient town has temples of Vijayanagar style and many Jain monuments. The 17th-century Hindu temple here in Vijayanagar style has animal carvings. 16&nbsp;km away is the shore temple of Shri Murdeshwar. The temple attracts a lot of devotees and tourists.</span></li><span data-dcnode-id="7409" instrument_node="">
</span><li data-dcnode-id="7405"><a data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honnavar" title="Honnavar"><span data-dcnode-id="7408" instrument_node="">Honnavar</span></a><span data-dcnode-id="7406" instrument_node="">: situated 90&nbsp;km from Karwar, has a Portuguese fort. There is also a fort in Basavaraja Durga Island, amidst the sea which can be reached by a sail upstream on river Sharavathi.</span></li><span data-dcnode-id="7404" instrument_node="">
</span><li data-dcnode-id="7397"><a data-dcnode-id="7402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ankola" title="Ankola"><span data-dcnode-id="7403" instrument_node="">Ankola</span></a><span data-dcnode-id="7401" instrument_node="">: Located 37&nbsp;km south of Karwar, is a small town with 15th-century ruined walls of King Sarpamalika's fort and the ancient Shri Venketaraman Temple. Near the temple there are two giant wooden chariots carved with scenes from the </span><i data-dcnode-id="7399"><span data-dcnode-id="7400" instrument_node="">Ramayana</span></i><span data-dcnode-id="7398" instrument_node="">.</span></li></ul><span data-dcnode-id="7395" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7381"><div class="thumbinner" data-dcnode-id="7382" style="width:222px;"><a class="image" data-dcnode-id="7393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShiva_Statue_Murdeshwara_Temple.jpg"><img alt="" class="thumbimage" data-dcnode-id="7394" data-file-height="900" data-file-width="699" decoding="async" height="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Shiva_Statue_Murdeshwara_Temple.jpg/220px-Shiva_Statue_Murdeshwara_Temple.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Shiva_Statue_Murdeshwara_Temple.jpg/330px-Shiva_Statue_Murdeshwara_Temple.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Shiva_Statue_Murdeshwara_Temple.jpg/440px-Shiva_Statue_Murdeshwara_Temple.jpg 2x" width="220"></a><span data-dcnode-id="7392" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7383"><div class="magnify" data-dcnode-id="7390"><a class="internal" data-dcnode-id="7391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShiva_Statue_Murdeshwara_Temple.jpg" title="Enlarge"></a></div><span data-dcnode-id="7389" instrument_node="">Giant </span><a data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiva" title="Shiva"><span data-dcnode-id="7388" instrument_node="">Shiva</span></a><span data-dcnode-id="7386" instrument_node=""> statue at </span><a data-dcnode-id="7384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murdeshwar" title="Murdeshwar"><span data-dcnode-id="7385" instrument_node="">Murdeshwar</span></a></div></div></div><span data-dcnode-id="7380" instrument_node="">
</span><ul data-dcnode-id="7372"><li data-dcnode-id="7373"><a data-dcnode-id="7378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murdeshwar" title="Murdeshwar"><span data-dcnode-id="7379" instrument_node="">Murdeshwar</span></a><span data-dcnode-id="7377" instrument_node="">: The </span><a data-dcnode-id="7375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murdeshwar" title="Murdeshwar"><span data-dcnode-id="7376" instrument_node="">Murdeshwar</span></a><span data-dcnode-id="7374" instrument_node=""> Temple in Uttara Kannada District of Karnataka now possesses at 249-feet Raja Gopura. The Murdeswar temple complex is renowned for the tallest idol of Lord Shiva in the world, which is 123&nbsp;feet. The latest addition to the temple, thanks to Mr. RN Shetty an entrepreneur and philanthropist, is the Rajagopuram, which was opened on 12 April 2008. And is it the tallest Hindu Temple Gopuram in the World. If Gopuram can be considered as a unique ornate structure associated with Hindu Temples, then the Gopura of Murdeshwar Temple in Karnataka should be the tallest in the world.</span></li></ul><span data-dcnode-id="7371" instrument_node="">
</span><dl data-dcnode-id="7368"><dd data-dcnode-id="7369"><span data-dcnode-id="7370" instrument_node="">The Rajagopuram of Murdeswar Temple has 21 floors, including the ground floor. The base measures 105&nbsp;feet in length and 51&nbsp;feet breadth. The gopura also possess a lift and visitors can go to the top and have an aerial view of the Arabian Sea and the statue of Lord Shiva. Another highlight is the life-size statues of two elephants at the base of the gopura.</span></dd></dl><span data-dcnode-id="7367" instrument_node="">
</span><dl data-dcnode-id="7349"><dd data-dcnode-id="7350"><span data-dcnode-id="7366" instrument_node="">World's tallest Siva idol: The highlights of Murdeshwar lie beyond its beach and rural flair.</span><sup class="noprint Inline-Template" data-dcnode-id="7359" style="white-space:nowrap;"><span data-dcnode-id="7365" instrument_node="">[</span><i data-dcnode-id="7361"><a data-dcnode-id="7362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWriting_better_articles%23Tone" title="Wikipedia:Writing better articles"><span data-dcnode-id="7363" title="The tone or style of material in the vicinity of this tag may not be appropriate for Wikipedia. (December 2017)"><span data-dcnode-id="7364" instrument_node="">tone</span></span></a></i><span data-dcnode-id="7360" instrument_node="">]</span></sup><span data-dcnode-id="7358" instrument_node=""> On a little green hill, a 37 m (or 123&nbsp;feet) Lord Shiva idol sits enthroned, surrounded by smaller statues illustrating moments of the Hindu mythology</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7351" style="white-space:nowrap;"><span data-dcnode-id="7357" instrument_node="">[</span><i data-dcnode-id="7353"><a data-dcnode-id="7354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7355" title="This claim needs references to reliable sources. (December 2017)"><span data-dcnode-id="7356" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7352" instrument_node="">]</span></sup></dd></dl><span data-dcnode-id="7348" instrument_node="">
</span><h3 data-dcnode-id="7338"><span class="mw-headline" data-dcnode-id="7346" id="Beaches"><span data-dcnode-id="7347" instrument_node="">Beaches</span></span><span class="mw-editsection" data-dcnode-id="7339"><span class="mw-editsection-bracket" data-dcnode-id="7344"><span data-dcnode-id="7345" instrument_node="">[</span></span><a data-dcnode-id="7342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D16" title="Edit section: Beaches"><span data-dcnode-id="7343" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7337" instrument_node="">
</span><p data-dcnode-id="7321"><a data-dcnode-id="7335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karwar" title="Karwar"><span data-dcnode-id="7336" instrument_node="">Karwar</span></a><span data-dcnode-id="7334" instrument_node=""> has a number of beaches like Blue Lagoon Beach, Ladies Beach around it and </span><a data-dcnode-id="7332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabindranath_Tagore" title="Rabindranath Tagore"><span data-dcnode-id="7333" instrument_node="">Rabindranath Tagore</span></a><span data-dcnode-id="7331" instrument_node=""> described his experiences at Karwar beach in his poetry. Om beach, </span><a data-dcnode-id="7329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murdeshwar" title="Murdeshwar"><span data-dcnode-id="7330" instrument_node="">Murdeshwar</span></a><span data-dcnode-id="7328" instrument_node=""> are other beaches of </span><a data-dcnode-id="7326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uttara_Kannada" title="Uttara Kannada"><span data-dcnode-id="7327" instrument_node="">Uttara Kannada</span></a><span data-dcnode-id="7325" instrument_node=""> Dist. The Nethrani Island near </span><a data-dcnode-id="7323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murdeshwar" title="Murdeshwar"><span data-dcnode-id="7324" instrument_node="">Murdeshwar</span></a><span data-dcnode-id="7322" instrument_node="">. Basavaraja Durga near Honavar is an island fort raised by the Keladi Rulers during 16th and 17th centuries. It is surrounded by a strong fortification raised by gigantic laterite blocks and the hill has a flat top. Devagad and Kurmagad are two islands near Karwar.
{Nirvana beach} at Kagal village of Kumta is a 5&nbsp;km long beach in one stretch with white sand and transparent water in the month of December till March. The entire beach coastline is covered by Casuarina and coconut trees, unparallel to any beach of India, and has the big potential to develop beach tourism like the Baga-Calangute-Candolim beach of Goa. Government of Karnataka and tourism department has failed in tapping this potential, whereas Goa has left Karnataka much behind in beach tourism. There is an urgent need to do something in this direction to allow beach tourism on the same model of Goa in the months of September to may.
</span></p><span data-dcnode-id="7320" instrument_node="">
</span><h3 data-dcnode-id="7310"><span class="mw-headline" data-dcnode-id="7318" id="Planetarium"><span data-dcnode-id="7319" instrument_node="">Planetarium</span></span><span class="mw-editsection" data-dcnode-id="7311"><span class="mw-editsection-bracket" data-dcnode-id="7316"><span data-dcnode-id="7317" instrument_node="">[</span></span><a data-dcnode-id="7314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D17" title="Edit section: Planetarium"><span data-dcnode-id="7315" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7312"><span data-dcnode-id="7313" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7309" instrument_node="">
</span><ul data-dcnode-id="7282"><li data-dcnode-id="7305"><b data-dcnode-id="7307"><span data-dcnode-id="7308" instrument_node="">Jawahar Lal Nehru Planetarium</span></b><span data-dcnode-id="7306" instrument_node="">: Situated near Cubbon park, Bangalore. It organizes the shows in English and Kannada. Moreover, it has science center for educational activities.</span></li><span data-dcnode-id="7304" instrument_node="">
</span><li data-dcnode-id="7283"><b data-dcnode-id="7300"><a data-dcnode-id="7302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swami_Vivekananda_Planetarium" title="Swami Vivekananda Planetarium"><span data-dcnode-id="7303" instrument_node="">Swami Vivekananda Planetarium</span></a><span data-dcnode-id="7301" instrument_node="">:</span></b><span data-dcnode-id="7299" instrument_node=""> Situated at </span><a class="mw-redirect" data-dcnode-id="7297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pilikula" title="Pilikula"><span data-dcnode-id="7298" instrument_node="">Pilikula</span></a><span data-dcnode-id="7296" instrument_node=""> in </span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangalore" title="Mangalore"><span data-dcnode-id="7295" instrument_node="">Mangalore</span></a><span data-dcnode-id="7293" instrument_node="">, it is the 1st </span><a data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_shutter_3D_system" title="Active shutter 3D system"><span data-dcnode-id="7292" instrument_node="">3D</span></a><span data-dcnode-id="7290" instrument_node=""> </span><a data-dcnode-id="7288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetarium" title="Planetarium"><span data-dcnode-id="7289" instrument_node="">Planetarium</span></a><span data-dcnode-id="7287" instrument_node=""> in India.</span><sup class="reference" data-dcnode-id="7284" id="cite_ref-21"><a data-dcnode-id="7285" href="#cite_note-21"><span data-dcnode-id="7286" instrument_node="">[21]</span></a></sup></li></ul><span data-dcnode-id="7281" instrument_node="">
</span><h2 data-dcnode-id="7271"><span class="mw-headline" data-dcnode-id="7279" id="South_Karnataka"><span data-dcnode-id="7280" instrument_node="">South Karnataka</span></span><span class="mw-editsection" data-dcnode-id="7272"><span class="mw-editsection-bracket" data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node="">[</span></span><a data-dcnode-id="7275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D18" title="Edit section: South Karnataka"><span data-dcnode-id="7276" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7273"><span data-dcnode-id="7274" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7270" instrument_node="">

</span><ul data-dcnode-id="7116"><li data-dcnode-id="7122"><a data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mandya" title="Mandya"><span data-dcnode-id="7128" instrument_node="">Mandya</span></a><span data-dcnode-id="7126" instrument_node="">: is a city, Sugar factories contribute majorly to the economy of the city. The Mandir of Shri Shirdi Sai Baba popular amongst local Sai Devotees as Mandyada Shri Shiradi Sai Baba Mandir is situated at B.Gowdagere, Gejjalagere village amidsts picturesque natural surrounding in Mandya District of Karnataka. The Mandir is situated at a distance of about 9.3 kilometers from Maddur town and about 12 kilometers from Mandya Town on Bangalore-Mysore State Highway. All the buses playing on Bangalore-Mysore route stops at B.Gowdagere Sai Baba Mandir Entrance situated on the highway. The temple is situated at a distance of just 1 kilometre from the main road. The Mandir is lovingly addressed by everyone as </span><b data-dcnode-id="7124"><span data-dcnode-id="7125" instrument_node="">"Namma Tatathana Mane"</span></b><span data-dcnode-id="7123" instrument_node=""> (Our Grand Father's Home).</span></li><span data-dcnode-id="7121" instrument_node="">

</span><ul data-dcnode-id="7038"><li data-dcnode-id="7068"><a data-dcnode-id="7085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halebidu" title="Halebidu"><span data-dcnode-id="7086" instrument_node="">Halebidu</span></a><span data-dcnode-id="7084" instrument_node="">: It is 27&nbsp;km from Hassan, was capital of Hoysala and it was formerly called as Dwarasamudra. It has one of the finest Hoysala temples said to have been started by Ketamalla, a commander of Vishnuvardhana in 1121. The twin Shiva Temples, </span><a data-dcnode-id="7082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoysaleswara_Temple" title="Hoysaleswara Temple"><span data-dcnode-id="7083" instrument_node="">Hoysaleswara Temple</span></a><span data-dcnode-id="7081" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kedareshwara_Temple" title="Kedareshwara Temple"><span data-dcnode-id="7080" instrument_node="">Kedareshwara Temple</span></a><span data-dcnode-id="7078" instrument_node=""> with a common platform and two garbhagrihas, one houses for Vishnuvardhana Hoysaleshwara Linga and the other for Shanthaleshwara Linga. In front of Hoysaleshwara is the Nandimantapa and behind that is shrine of Surya with a two-meter-tall image. Outer walls have rows of intricate figures narrating episodes from epics like Ramyana, Mahabartha, and Bhagavata. There are also three </span><a data-dcnode-id="7076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jain_temples%2C_Halebidu" title="Jain temples, Halebidu"><span data-dcnode-id="7077" instrument_node="">Jain basadis</span></a><span data-dcnode-id="7075" instrument_node=""> equally rich in architecture. The temples are proposed to be listed under </span><a class="mw-redirect" data-dcnode-id="7073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO_World_Heritage_Sites" title="UNESCO World Heritage Sites"><span data-dcnode-id="7074" instrument_node="">UNESCO World Heritage Sites</span></a><span data-dcnode-id="7072" instrument_node="">.</span><sup class="reference" data-dcnode-id="7069" id="cite_ref-22"><a data-dcnode-id="7070" href="#cite_note-22"><span data-dcnode-id="7071" instrument_node="">[22]</span></a></sup></li><span data-dcnode-id="7067" instrument_node="">
</span><li data-dcnode-id="7063"><a class="mw-redirect" data-dcnode-id="7065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arasikere" title="Arasikere"><span data-dcnode-id="7066" instrument_node="">Arasikere</span></a><span data-dcnode-id="7064" instrument_node="">: It is 41&nbsp;km from Hassan and 176&nbsp;km from Bangalore. It has coconut gardens. There is a Kattameshwara temple here which is also called Chandramoulishwara and referred to as Kalmeshwara in the records. It is a fine Hoysala monument with a rare polygonal frontal Mantapa with special design. There is a fine Haluvokkalu Temple and also a Sahasrakuta Jinalaya. Malekal Tirupathi near Arasikere has a venkataramana temple visited by many devotees.</span></li><span data-dcnode-id="7062" instrument_node="">
</span><li data-dcnode-id="7055"><a class="mw-redirect" data-dcnode-id="7060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aralaguppe" title="Aralaguppe"><span data-dcnode-id="7061" instrument_node="">Aralaguppe</span></a><span data-dcnode-id="7059" instrument_node="">: There is a Kalleshwara temple in the </span><a class="mw-redirect" data-dcnode-id="7057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gangas" title="Gangas"><span data-dcnode-id="7058" instrument_node="">Ganga</span></a><span data-dcnode-id="7056" instrument_node="">-Nalamba style of the 9th century. Its ceiling has a dancing Shiva sculpture with musical accompanists and eight Dikpalas surrounding him with all their paraphernalia. There is a Chennakeshava temple of the Hoysala style. An image of Vishnu lies in the garbhagriha. There are four Ganga temples.</span></li><span data-dcnode-id="7054" instrument_node="">
</span><li data-dcnode-id="7050"><a data-dcnode-id="7052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madhugiri" title="Madhugiri"><span data-dcnode-id="7053" instrument_node="">Madhugiri</span></a><span data-dcnode-id="7051" instrument_node="">: It is 43&nbsp;km from Tumkur and has a large hill fort. The ancient name of the place is Maddagiri. It has the temples of Venkataramana and Malleshwara built by Vijayanagara feudatories. There is also a Mallinatha basadi. The fort has gateways called Antaralada Bagilu, Diddibagilu, Mysore Gate etc. 19&nbsp;km from here is another hill fort called Midigeshi.</span></li><span data-dcnode-id="7049" instrument_node="">
</span><li data-dcnode-id="7039"><a data-dcnode-id="7047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madikeri" title="Madikeri"><span data-dcnode-id="7048" instrument_node="">Madikeri</span></a><span data-dcnode-id="7046" instrument_node=""> or Mercara: Known as Scotland of India, Mercara known for its climate. It has many places of attraction such as Tala Cauvery, Nagarahole National Park, Abbe Water Falls, </span><a data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Mark%2527s_Church%2C_Mercara" title="St. Mark's Church, Mercara"><span data-dcnode-id="7045" instrument_node="">St. Mark's Church</span></a><span data-dcnode-id="7043" instrument_node="">, Bagamandala, Cauvery Nisargadhama, Belegiri Hills, Thadiyanda Murali Kund, </span><a data-dcnode-id="7041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Igguthappa" title="Igguthappa"><span data-dcnode-id="7042" instrument_node="">Igguthappa</span></a><span data-dcnode-id="7040" instrument_node=""> Temple, Irupu Falls And Coffee &amp; Tea Estates.</span></li></ul><span data-dcnode-id="7037" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7027"><div class="thumbinner" data-dcnode-id="7028" style="width:222px;"><a class="image" data-dcnode-id="7035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATippu_Mausoleum.jpg"><img alt="" class="thumbimage" data-dcnode-id="7036" data-file-height="2304" data-file-width="3072" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Tippu_Mausoleum.jpg/220px-Tippu_Mausoleum.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Tippu_Mausoleum.jpg/330px-Tippu_Mausoleum.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Tippu_Mausoleum.jpg/440px-Tippu_Mausoleum.jpg 2x" width="220"></a><span data-dcnode-id="7034" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7029"><div class="magnify" data-dcnode-id="7032"><a class="internal" data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATippu_Mausoleum.jpg" title="Enlarge"></a></div><a data-dcnode-id="7030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gumbaz%2C_Srirangapatna" title="Gumbaz, Srirangapatna"><span data-dcnode-id="7031" instrument_node="">Gumbaz, Srirangapatna</span></a></div></div></div><span data-dcnode-id="7026" instrument_node="">
</span><ul data-dcnode-id="7003"><li data-dcnode-id="7019"><a class="mw-redirect" data-dcnode-id="7024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Srirangapattana" title="Srirangapattana"><span data-dcnode-id="7025" instrument_node="">Srirangapattana</span></a><span data-dcnode-id="7023" instrument_node="">: It is 14&nbsp;km from Mysore &amp; it is an island in between two branches of the Cauvery. It was also the capital of the Mysore rulers. There is a Ranganath temple here. The fort here was built in 1454. The Mysore rules made it their capital in 1610 in the days of Raja Wodeyar, who took it from the Vijayanagara Governor. The Ranganatha temple is called Adi Ranga. Ganjam has Dariya Daulat palace of Tipu and </span><a class="mw-redirect" data-dcnode-id="7021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gumbaz%2C_Seringapatam" title="Gumbaz, Seringapatam"><span data-dcnode-id="7022" instrument_node="">Gumbaz</span></a><span data-dcnode-id="7020" instrument_node="">, the mausoleum of Haider and Tipu. Both are impressive structures of Indo-Saracenic style. The palace has paintings, fine woodwork and it houses a museum.</span></li><span data-dcnode-id="7018" instrument_node="">
</span><li data-dcnode-id="7014"><a data-dcnode-id="7016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melukote" title="Melukote"><span data-dcnode-id="7017" instrument_node="">Melukote</span></a><span data-dcnode-id="7015" instrument_node="">: It is a religious centre which attracts lakhs of people during its annual feast Vairamudi. The temple was reconstructed in the Hoysala style by Visnuvardhana with the guidance of Ramanujacharya, a Visistadvaitist, in the 11th century. There are Cheluvanarayanaswamy temple, Kalyani, Hill shrine of Lord Narasimha, Thottilamadu, Dhanuskoti, Academy of Sanskrit Research and many more to visit. The nearest tourist places are Thondanur, Srirangapatna, Karigatta, Nagamangala etc.,</span></li><span data-dcnode-id="7013" instrument_node="">
</span><li data-dcnode-id="7009"><a data-dcnode-id="7011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Male_Mahadeshwara_Hills" title="Male Mahadeshwara Hills"><span data-dcnode-id="7012" instrument_node="">Mahadeshwara Betta</span></a><span data-dcnode-id="7010" instrument_node="">: It is 220&nbsp;km from Bangalore and 142&nbsp;km from Mysore. It is very close to eastern Ghats. It is said that a saint called Mahadeshwara, who could ride a tiger, lived and had his gadduge here during the 14th and 15th centuries. The hill is full of thick forests and thousands of pilgrims visit the place.</span></li><span data-dcnode-id="7008" instrument_node="">
</span><li data-dcnode-id="7004"><a data-dcnode-id="7006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talakadu" title="Talakadu"><span data-dcnode-id="7007" instrument_node="">Talakadu</span></a><span data-dcnode-id="7005" instrument_node="">: A Holy place on the banks of the Cauvery. It is full of sands, carried by the wind from the dried bed of the river. It was the second capital of the Gangas. They built the Pataleshwara and the Maruleshwara templeshere. Hoysala Vishnuvardhana built Kirti Narayana temple.</span></li></ul><span data-dcnode-id="7002" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6991"><div class="thumbinner" data-dcnode-id="6992" style="width:222px;"><a class="image" data-dcnode-id="7000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChandragiri_hill_temple_complex_at_Shravanabelagola.jpg"><img alt="" class="thumbimage" data-dcnode-id="7001" data-file-height="1172" data-file-width="1772" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Chandragiri_hill_temple_complex_at_Shravanabelagola.jpg/220px-Chandragiri_hill_temple_complex_at_Shravanabelagola.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Chandragiri_hill_temple_complex_at_Shravanabelagola.jpg/330px-Chandragiri_hill_temple_complex_at_Shravanabelagola.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Chandragiri_hill_temple_complex_at_Shravanabelagola.jpg/440px-Chandragiri_hill_temple_complex_at_Shravanabelagola.jpg 2x" width="220"></a><span data-dcnode-id="6999" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6993"><div class="magnify" data-dcnode-id="6997"><a class="internal" data-dcnode-id="6998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChandragiri_hill_temple_complex_at_Shravanabelagola.jpg" title="Enlarge"></a></div><span data-dcnode-id="6996" instrument_node="">Temple complex on Chandragiri hill, </span><a data-dcnode-id="6994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shravanabelagola" title="Shravanabelagola"><span data-dcnode-id="6995" instrument_node="">Shravanabelagola</span></a></div></div></div><span data-dcnode-id="6990" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6980"><div class="thumbinner" data-dcnode-id="6981" style="width:222px;"><a class="image" data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AView_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg"><img alt="" class="thumbimage" data-dcnode-id="6989" data-file-height="1080" data-file-width="1920" decoding="async" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/19/View_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg/220px-View_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/19/View_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg/330px-View_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/19/View_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg/440px-View_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg 2x" width="220"></a><span data-dcnode-id="6987" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6982"><div class="magnify" data-dcnode-id="6985"><a class="internal" data-dcnode-id="6986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AView_of_Akkana_Basadi_from_northeastern_side_at_Shravanabelagola.jpg" title="Enlarge"></a></div><a data-dcnode-id="6983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Akkana_Basadi" title="Akkana Basadi"><span data-dcnode-id="6984" instrument_node="">Akkana Basadi</span></a></div></div></div><span data-dcnode-id="6979" instrument_node="">
</span><ul data-dcnode-id="6956"><li data-dcnode-id="6975"><a class="mw-redirect" data-dcnode-id="6977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhadravathi%2C_Karnataka" title="Bhadravathi, Karnataka"><span data-dcnode-id="6978" instrument_node="">Bhadravathi</span></a><span data-dcnode-id="6976" instrument_node="">: It is an industrial town in Shimoga district 256&nbsp;km away from Bangalore, which was earlier known as "Benkipura". There is a 13th-century Lakshminarayan Temple in Hoysala style. An iron and steel works, a cement factory and a paper factory are located on the banks of Bhadra river.</span></li><span data-dcnode-id="6974" instrument_node="">
</span><li data-dcnode-id="6967"><a data-dcnode-id="6972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ikkeri" title="Ikkeri"><span data-dcnode-id="6973" instrument_node="">Ikkeri</span></a><span data-dcnode-id="6971" instrument_node="">: It was a capital town of the Keladi Nayakas from 1512, and a place is 2&nbsp;km from </span><a class="mw-redirect" data-dcnode-id="6969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagar%2C_Karnataka" title="Sagar, Karnataka"><span data-dcnode-id="6970" instrument_node="">Sagara City</span></a><span data-dcnode-id="6968" instrument_node="">. The Aghoreshwara temple is a 16th-century monument of great attraction. There is also a Paravathi temple nearby. Keladi is another place nearby, the original capital. It has the Rameshwara and Veerabhadra temples. There is also a museum.</span></li><span data-dcnode-id="6966" instrument_node="">
</span><li data-dcnode-id="6962"><a class="mw-redirect" data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sravanabelgola" title="Sravanabelgola"><span data-dcnode-id="6965" instrument_node="">Sravanabelgola</span></a><span data-dcnode-id="6963" instrument_node="">: It has a statue of Lord Bahubali. The place is an important Jain pilgrimage center and has a long history. The 17&nbsp;meter high statue of Bahubali is said to be the tallest monolithic structure in the world. It overlooks the small town of Shravanbelgola from the top of the rocky hill known as Indragiri. One can reach this hill after ascending 614 rock-cut steps.</span></li><span data-dcnode-id="6961" instrument_node="">
</span><li data-dcnode-id="6957"><a class="mw-redirect" data-dcnode-id="6959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Somnathpura" title="Somnathpura"><span data-dcnode-id="6960" instrument_node="">Somnathpura</span></a><span data-dcnode-id="6958" instrument_node="">: It is the home to one of the best examples of Hoysala temple architecture, the Kesava Temple.</span></li></ul><span data-dcnode-id="6955" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6944"><div class="thumbinner" data-dcnode-id="6945" style="width:222px;"><a class="image" data-dcnode-id="6953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARear_View_of_Keshava_Temple_at_Somanathapura.jpg"><img alt="" class="thumbimage" data-dcnode-id="6954" data-file-height="1184" data-file-width="1768" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Rear_View_of_Keshava_Temple_at_Somanathapura.jpg/220px-Rear_View_of_Keshava_Temple_at_Somanathapura.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Rear_View_of_Keshava_Temple_at_Somanathapura.jpg/330px-Rear_View_of_Keshava_Temple_at_Somanathapura.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/52/Rear_View_of_Keshava_Temple_at_Somanathapura.jpg/440px-Rear_View_of_Keshava_Temple_at_Somanathapura.jpg 2x" width="220"></a><span data-dcnode-id="6952" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6946"><div class="magnify" data-dcnode-id="6950"><a class="internal" data-dcnode-id="6951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARear_View_of_Keshava_Temple_at_Somanathapura.jpg" title="Enlarge"></a></div><span data-dcnode-id="6949" instrument_node="">Chennakesava Temple (Rear view), </span><a data-dcnode-id="6947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Somanathapura" title="Somanathapura"><span data-dcnode-id="6948" instrument_node="">Somanathapura</span></a></div></div></div><span data-dcnode-id="6943" instrument_node="">
</span><ul data-dcnode-id="6902"><li data-dcnode-id="6936"><a data-dcnode-id="6941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jog_Falls" title="Jog Falls"><span data-dcnode-id="6942" instrument_node="">Jog Falls</span></a><span data-dcnode-id="6940" instrument_node="">: the highest waterfalls in India, is located about 30&nbsp;km from </span><a class="mw-redirect" data-dcnode-id="6938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagar%2C_Karnataka" title="Sagar, Karnataka"><span data-dcnode-id="6939" instrument_node="">Sagara City, Karnataka</span></a><span data-dcnode-id="6937" instrument_node="">. The Sharavati river drops 253&nbsp;metres in 4 separate falls known as Rani-the Rocket and Raja-the Roarer. The highest is the Raja with the fall of 253&nbsp;metres and a pool below 40metres deep. The best time to visit is Late November to early January. The 50&nbsp;km long Hirebhasgar Reservoir and the Linganamkki dam regulates the flow of the Sharavati river to generate the hydro electricity.</span></li><span data-dcnode-id="6935" instrument_node="">
</span><li data-dcnode-id="6931"><a data-dcnode-id="6933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mekedatu" title="Mekedatu"><span data-dcnode-id="6934" instrument_node="">Mekedatu</span></a><span data-dcnode-id="6932" instrument_node="">: It is a picnic spot by the river Cauvery. It tumbles down through a deep ravine, on top of which is a chasm around 5&nbsp;meters wide. Mekedatu is on Kanakapura Road.</span></li><span data-dcnode-id="6930" instrument_node="">
</span><li data-dcnode-id="6926"><a class="mw-redirect" data-dcnode-id="6928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hesaraghatta" title="Hesaraghatta"><span data-dcnode-id="6929" instrument_node="">Hesaraghatta</span></a><span data-dcnode-id="6927" instrument_node="">: Hesaraghatta has an artificial lake, a dairy and a horticulture farm. Boating and windsurfing are the other attractions. Also here is the Nrityagrama where young dancers are trained in all disciplines of traditional dance.</span></li><span data-dcnode-id="6925" instrument_node="">
</span><li data-dcnode-id="6921"><a data-dcnode-id="6923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shivagange" title="Shivagange"><span data-dcnode-id="6924" instrument_node="">Shivagange</span></a><span data-dcnode-id="6922" instrument_node="">: A hill with four faces, rising to a height of 4599&nbsp;ft looks like a Nandi from the East, Ganesh from the West, A Linga from the South and Cobra with it hood spread from the North side. It is accessible by road.</span></li><span data-dcnode-id="6920" instrument_node="">
</span><li data-dcnode-id="6913"><a class="mw-redirect" data-dcnode-id="6918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shivanasamudram" title="Shivanasamudram"><span data-dcnode-id="6919" instrument_node="">Shivanasamudram</span></a><span data-dcnode-id="6917" instrument_node="">: The waterfalls, the Ganganchukki and the </span><a class="mw-redirect" data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bharachukki" title="Bharachukki"><span data-dcnode-id="6916" instrument_node="">Bharachukki</span></a><span data-dcnode-id="6914" instrument_node="">, cascade down 90&nbsp;meters. These falls are the source of Asia's first Hydro Electric Power Station called "Shimsa". The falls are in full splendour during July–August. The falls are 122&nbsp;km from Bangalore.</span></li><span data-dcnode-id="6912" instrument_node="">
</span><li data-dcnode-id="6908"><a data-dcnode-id="6910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hogenakkal_Falls" title="Hogenakkal Falls"><span data-dcnode-id="6911" instrument_node="">Hogenakkal Falls</span></a><span data-dcnode-id="6909" instrument_node="">: These are also known as the 'smoking rocks' because of the mist. At the bottom of the 90&nbsp;ft water falls, one can ride in a coracle.</span></li><span data-dcnode-id="6907" instrument_node="">
</span><li data-dcnode-id="6903"><a data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Devarayanadurga" title="Devarayanadurga"><span data-dcnode-id="6906" instrument_node="">Devarayanadurga</span></a><span data-dcnode-id="6904" instrument_node="">: This is a hill station of Tumkur road perched at a height of 3940&nbsp;feet. A few kilometres from foot of the hills is a natural spring called Namada Chilume.</span></li></ul><span data-dcnode-id="6901" instrument_node="">
