</span><p data-dcnode-id="5951"><span data-dcnode-id="6027" instrument_node="">Karnataka in all has 21 wildlife sanctuaries and </span><a class="mw-redirect" data-dcnode-id="6025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_parks_in_Karnataka" title="National parks in Karnataka"><span data-dcnode-id="6026" instrument_node="">5 National parks</span></a><span data-dcnode-id="6024" instrument_node="">. Well known among them are </span><a data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bandipur_National_Park" title="Bandipur National Park"><span data-dcnode-id="6023" instrument_node="">Bandipur National Park</span></a><span data-dcnode-id="6021" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="6019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chamarajanagara" title="Chamarajanagara"><span data-dcnode-id="6020" instrument_node="">chamarajanagara</span></a><span data-dcnode-id="6018" instrument_node=""> District, </span><a data-dcnode-id="6016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bannerghatta_National_Park" title="Bannerghatta National Park"><span data-dcnode-id="6017" instrument_node="">Bannerghatta National Park</span></a><span data-dcnode-id="6015" instrument_node=""> in </span><a data-dcnode-id="6013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore" title="Bangalore"><span data-dcnode-id="6014" instrument_node="">Bangalore</span></a><span data-dcnode-id="6012" instrument_node=""> district, </span><a data-dcnode-id="6010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nagarhole_National_Park" title="Nagarhole National Park"><span data-dcnode-id="6011" instrument_node="">Nagarhole National Park</span></a><span data-dcnode-id="6009" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore_District" title="Mysore District"><span data-dcnode-id="6008" instrument_node="">Mysore District</span></a><span data-dcnode-id="6006" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kodagu" title="Kodagu"><span data-dcnode-id="6005" instrument_node="">Kodagu</span></a><span data-dcnode-id="6003" instrument_node=""> district, </span><a class="mw-redirect" data-dcnode-id="6001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kudremukh_National_Park" title="Kudremukh National Park"><span data-dcnode-id="6002" instrument_node="">Kudremukh National Park</span></a><span data-dcnode-id="6000" instrument_node=""> in </span><a data-dcnode-id="5998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dakshina_Kannada" title="Dakshina Kannada"><span data-dcnode-id="5999" instrument_node="">Dakshina Kannada</span></a><span data-dcnode-id="5997" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chickmagalur" title="Chickmagalur"><span data-dcnode-id="5996" instrument_node="">Chickmagalur</span></a><span data-dcnode-id="5994" instrument_node=""> district, </span><a data-dcnode-id="5992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dandeli" title="Dandeli"><span data-dcnode-id="5993" instrument_node="">Dandeli</span></a><span data-dcnode-id="5991" instrument_node=""> &amp; </span><a class="mw-redirect" data-dcnode-id="5989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anshi_National_Park" title="Anshi National Park"><span data-dcnode-id="5990" instrument_node="">Anshi National Park</span></a><span data-dcnode-id="5988" instrument_node=""> in </span><a data-dcnode-id="5986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uttara_Kannada" title="Uttara Kannada"><span data-dcnode-id="5987" instrument_node="">Uttara Kannada</span></a><span data-dcnode-id="5985" instrument_node=""> district, </span><a class="mw-redirect" data-dcnode-id="5983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gudavi" title="Gudavi"><span data-dcnode-id="5984" instrument_node="">Gudavi</span></a><span data-dcnode-id="5982" instrument_node=""> and Mandegadde bird sanctuaries and </span><a data-dcnode-id="5980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sharavati" title="Sharavati"><span data-dcnode-id="5981" instrument_node="">Sharavati</span></a><span data-dcnode-id="5979" instrument_node=""> WLS in </span><a class="mw-redirect" data-dcnode-id="5977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagar%2C_Karnataka" title="Sagar, Karnataka"><span data-dcnode-id="5978" instrument_node="">Sagara Taluk</span></a><span data-dcnode-id="5976" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shimoga_District" title="Shimoga District"><span data-dcnode-id="5975" instrument_node="">Shimoga District</span></a><span data-dcnode-id="5973" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biligirirangan_Hills" title="Biligirirangan Hills"><span data-dcnode-id="5972" instrument_node="">Biligirirangan Hills</span></a><span data-dcnode-id="5970" instrument_node=""> WLS in </span><a data-dcnode-id="5968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chamarajanagar" title="Chamarajanagar"><span data-dcnode-id="5969" instrument_node="">Chamarajanagar</span></a><span data-dcnode-id="5967" instrument_node=""> district, </span><a data-dcnode-id="5965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ranganathittu_Bird_Sanctuary" title="Ranganathittu Bird Sanctuary"><span data-dcnode-id="5966" instrument_node="">Ranganathittu Bird Sanctuary</span></a><span data-dcnode-id="5964" instrument_node=""> in </span><a data-dcnode-id="5962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mandya" title="Mandya"><span data-dcnode-id="5963" instrument_node="">Mandya</span></a><span data-dcnode-id="5961" instrument_node=""> district, </span><a class="mw-redirect" data-dcnode-id="5959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brahmagiri_%28hill%29" title="Brahmagiri (hill)"><span data-dcnode-id="5960" instrument_node="">Brahmagiri</span></a><span data-dcnode-id="5958" instrument_node=""> wildlife sanctuary and </span><a data-dcnode-id="5956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pushpagiri_Wildlife_Sanctuary" title="Pushpagiri Wildlife Sanctuary"><span data-dcnode-id="5957" instrument_node="">Pushpagiri Wildlife Sanctuary</span></a><span data-dcnode-id="5955" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="5953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kodagu" title="Kodagu"><span data-dcnode-id="5954" instrument_node="">Kodagu</span></a><span data-dcnode-id="5952" instrument_node=""> district. Interior dry areas have their own unique wildlife.
</span></p><p data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">There are twenty-one wildlife sanctuaries and five national parks in all.
</span></p><p data-dcnode-id="5926"><span data-dcnode-id="5948" instrument_node="">Recently, the government of India has proposed to the UNESCO to include important ecosystems in the </span><a data-dcnode-id="5946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ghats" title="Western Ghats"><span data-dcnode-id="5947" instrument_node="">Western Ghats</span></a><span data-dcnode-id="5945" instrument_node=""> as a </span><a data-dcnode-id="5943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Heritage_Site" title="World Heritage Site"><span data-dcnode-id="5944" instrument_node="">World Heritage Site</span></a><span data-dcnode-id="5942" instrument_node="">. Two subclusters of natural areas occurring in the list are entirely in the Karnataka region covering several wildlife sanctuaries and some reserve forests. Fragile and exotic ecosystems like </span><a data-dcnode-id="5940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kudremukh" title="Kudremukh"><span data-dcnode-id="5941" instrument_node="">Kudremukh</span></a><span data-dcnode-id="5939" instrument_node=""> NP, </span><a class="mw-redirect" data-dcnode-id="5937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brahmagiri_%28hill%29" title="Brahmagiri (hill)"><span data-dcnode-id="5938" instrument_node="">Brahmagiri</span></a><span data-dcnode-id="5936" instrument_node=""> WLS, </span><a class="mw-redirect" data-dcnode-id="5934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pushpagiri%2C_Karnataka" title="Pushpagiri, Karnataka"><span data-dcnode-id="5935" instrument_node="">Pushpagiri</span></a><span data-dcnode-id="5933" instrument_node=""> WLS, </span><a data-dcnode-id="5931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agumbe" title="Agumbe"><span data-dcnode-id="5932" instrument_node="">Agumbe</span></a><span data-dcnode-id="5930" instrument_node="">, </span><a data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talakaveri" title="Talakaveri"><span data-dcnode-id="5929" instrument_node="">Talakaveri</span></a><span data-dcnode-id="5927" instrument_node=""> WLS, Someshvara WLS figure in this list. As such, the Western Ghats that run south–north through the Karnataka is considered as one among the twenty-five bio-diversity hotspots of the world.
</span></p><p data-dcnode-id="5912"><span data-dcnode-id="5925" instrument_node="">The Niligiri Biosphere Reserve (also a designated </span><a data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNESCO" title="UNESCO"><span data-dcnode-id="5924" instrument_node="">UNESCO</span></a><span data-dcnode-id="5922" instrument_node=""> Biosphere reserve) is located at the junction of Karnataka, Tamil Nadu and Kerela. </span><a class="mw-redirect" data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nagarahole_National_Park" title="Nagarahole National Park"><span data-dcnode-id="5921" instrument_node="">Nagarahole National Park</span></a><span data-dcnode-id="5919" instrument_node=""> WLS and </span><a data-dcnode-id="5917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bandipur_National_Park" title="Bandipur National Park"><span data-dcnode-id="5918" instrument_node="">Bandipur National Park</span></a><span data-dcnode-id="5916" instrument_node=""> and Nugu WLS in Karnataka are included in this </span><a class="mw-redirect" data-dcnode-id="5914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biosphere_reserve" title="Biosphere reserve"><span data-dcnode-id="5915" instrument_node="">biosphere reserve</span></a><span data-dcnode-id="5913" instrument_node="">.
</span></p><p data-dcnode-id="5901"><span data-dcnode-id="5911" instrument_node="">The state is home to the largest concentration of Asian Elephants along Kabini River in Nagarahole and Bandipur parks. These two parks also hold among the most viable population of the highly endangered Indian Tiger. Ranebennur Blackbuck sanctuary in </span><a data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haveri_district" title="Haveri district"><span data-dcnode-id="5910" instrument_node="">Haveri district</span></a><span data-dcnode-id="5908" instrument_node=""> is home to one of the largest populations of blackbuck anywhere in India. The Doraji wildlife sanctuary and areas in Karnataka like </span><a data-dcnode-id="5906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bellary_district" title="Bellary district"><span data-dcnode-id="5907" instrument_node="">Bellary district</span></a><span data-dcnode-id="5905" instrument_node="">, </span><a data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chitradurga" title="Chitradurga"><span data-dcnode-id="5904" instrument_node="">Chitradurga</span></a><span data-dcnode-id="5902" instrument_node=""> are strongholds of the sloth bear.
</span></p><p data-dcnode-id="5895"><span data-dcnode-id="5900" instrument_node="">Karnataka is home to more than 500 species of birds.</span><sup class="reference" data-dcnode-id="5897" id="cite_ref-birds_24-0"><a data-dcnode-id="5898" href="#cite_note-birds-24"><span data-dcnode-id="5899" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5896" instrument_node="">
</span></p><span data-dcnode-id="5894" instrument_node="">
</span><h3 data-dcnode-id="5884"><span class="mw-headline" data-dcnode-id="5892" id="Wildlife_sanctuaries"><span data-dcnode-id="5893" instrument_node="">Wildlife sanctuaries</span></span><span class="mw-editsection" data-dcnode-id="5885"><span class="mw-editsection-bracket" data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">[</span></span><a data-dcnode-id="5888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D24" title="Edit section: Wildlife sanctuaries"><span data-dcnode-id="5889" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5883" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5874"><div class="thumbinner" data-dcnode-id="5875" style="width:222px;"><a class="image" data-dcnode-id="5881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADandeli_river_rafting.jpg"><img alt="" class="thumbimage" data-dcnode-id="5882" data-file-height="2224" data-file-width="3264" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Dandeli_river_rafting.jpg/220px-Dandeli_river_rafting.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Dandeli_river_rafting.jpg/330px-Dandeli_river_rafting.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Dandeli_river_rafting.jpg/440px-Dandeli_river_rafting.jpg 2x" width="220"></a><span data-dcnode-id="5880" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5876"><div class="magnify" data-dcnode-id="5878"><a class="internal" data-dcnode-id="5879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADandeli_river_rafting.jpg" title="Enlarge"></a></div><span data-dcnode-id="5877" instrument_node="">White water rafting near Dandeli</span></div></div></div><span data-dcnode-id="5873" instrument_node="">
</span><ul data-dcnode-id="5646"><li data-dcnode-id="5857"><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dandeli" title="Dandeli"><span data-dcnode-id="5872" instrument_node="">Dandeli</span></a><span data-dcnode-id="5870" instrument_node=""> Wildlife Sanctuary, near to </span><a class="mw-redirect" data-dcnode-id="5868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubli-Dharwad" title="Hubli-Dharwad"><span data-dcnode-id="5869" instrument_node="">Hubli-Dharwad</span></a><span data-dcnode-id="5867" instrument_node=""> (70&nbsp;km), </span><a data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uttara_Kannada" title="Uttara Kannada"><span data-dcnode-id="5866" instrument_node="">Uttara Kannada</span></a><span data-dcnode-id="5864" instrument_node="">: spread over 834.16&nbsp;km</span><sup data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">2</span></sup><span data-dcnode-id="5861" instrument_node="">, it is the second largest wildlife sanctuary in Karnataka and is contiguous with the Mahaveer sanctuary in </span><a data-dcnode-id="5859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goa" title="Goa"><span data-dcnode-id="5860" instrument_node="">Goa</span></a><span data-dcnode-id="5858" instrument_node="">.</span></li><span data-dcnode-id="5856" instrument_node="">
</span><li data-dcnode-id="5851"><span data-dcnode-id="5855" instrument_node="">Ghataprabha Bird Sanctuary: small bird sanctuary incorporating the wetland along the river. It was established in 1974 and encompasses an area of 29&nbsp;km</span><sup data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">2</span></sup><span data-dcnode-id="5852" instrument_node="">.</span></li><span data-dcnode-id="5850" instrument_node="">
</span><li data-dcnode-id="5842"><span data-dcnode-id="5849" instrument_node="">Daroji Bear Sanctuary, 15&nbsp;kilometers from </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampi" title="Hampi"><span data-dcnode-id="5848" instrument_node="">Hampi</span></a><span data-dcnode-id="5846" instrument_node="">.</span><sup class="reference" data-dcnode-id="5843" id="cite_ref-25"><a data-dcnode-id="5844" href="#cite_note-25"><span data-dcnode-id="5845" instrument_node="">[25]</span></a></sup></li><span data-dcnode-id="5841" instrument_node="">
</span><li data-dcnode-id="5836"><span data-dcnode-id="5840" instrument_node="">Peacock sanctuary in </span><a data-dcnode-id="5838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bankapura" title="Bankapura"><span data-dcnode-id="5839" instrument_node="">Bankapura</span></a><span data-dcnode-id="5837" instrument_node="">, Shiggon taluk: Bankpur Fort is the second sanctuary in India exclusively engaged in the conservation and breeding of peacocks. It is also home to a variety of other birds.</span></li><span data-dcnode-id="5835" instrument_node="">
</span><li data-dcnode-id="5825"><a class="mw-redirect" data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ranebennur" title="Ranebennur"><span data-dcnode-id="5834" instrument_node="">Ranebennur</span></a><span data-dcnode-id="5832" instrument_node=""> </span><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blackbuck" title="Blackbuck"><span data-dcnode-id="5831" instrument_node="">blackbuck</span></a><span data-dcnode-id="5829" instrument_node=""> sanctuary, </span><a data-dcnode-id="5827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haveri" title="Haveri"><span data-dcnode-id="5828" instrument_node="">Haveri</span></a><span data-dcnode-id="5826" instrument_node=""> district: declared a wildlife sanctuary on 17 June 1974, with a core area of 14.87&nbsp;km and a buffer zone of 104.13&nbsp;km for tourists. It is divided into three blocks namely Hulathi, Hunasikatti and Alageri for administrative purposes. The vegetation comprises mainly scrub forests and eucalyptus plantations. Other resident fauna include wild pigs, foxes, jackals and wolves.</span></li><span data-dcnode-id="5824" instrument_node="">

</span><li data-dcnode-id="5089"><a class="mw-redirect" data-dcnode-id="5097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Varapoha_Falls" title="Varapoha Falls"><span data-dcnode-id="5098" instrument_node="">Varapoha Falls</span></a><span data-dcnode-id="5096" instrument_node="">, </span><a class="new" data-dcnode-id="5094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMahadayi_River%26action%3Dedit%26redlink%3D1" title="Mahadayi River (page does not exist)"><span data-dcnode-id="5095" instrument_node="">Mahadayi River</span></a><span data-dcnode-id="5093" instrument_node="">, in the </span><a data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jamboti" title="Jamboti"><span data-dcnode-id="5092" instrument_node="">Jamboti</span></a><span data-dcnode-id="5090" instrument_node=""> forest</span></li></ul><span data-dcnode-id="5087" instrument_node="">
</span><h2 data-dcnode-id="5077"><span class="mw-headline" data-dcnode-id="5085" id="Eco-tourism"><span data-dcnode-id="5086" instrument_node="">Eco-tourism</span></span><span class="mw-editsection" data-dcnode-id="5078"><span class="mw-editsection-bracket" data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">[</span></span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D28" title="Edit section: Eco-tourism"><span data-dcnode-id="5082" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5076" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5064"><div class="thumbinner" data-dcnode-id="5065" style="width:222px;"><a class="image" data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKarnataka_topo_deu.png"><img alt="" class="thumbimage" data-dcnode-id="5075" data-file-height="765" data-file-width="637" decoding="async" height="264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Karnataka_topo_deu.png/220px-Karnataka_topo_deu.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Karnataka_topo_deu.png/330px-Karnataka_topo_deu.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Karnataka_topo_deu.png/440px-Karnataka_topo_deu.png 2x" width="220"></a><span data-dcnode-id="5073" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5066"><div class="magnify" data-dcnode-id="5071"><a class="internal" data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKarnataka_topo_deu.png" title="Enlarge"></a></div><span data-dcnode-id="5070" instrument_node="">Topographic map of Karnataka. </span><a data-dcnode-id="5068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ghats" title="Western Ghats"><span data-dcnode-id="5069" instrument_node="">Western Ghats</span></a><span data-dcnode-id="5067" instrument_node=""> is rich in wildlife.</span></div></div></div><span data-dcnode-id="5063" instrument_node="">
</span><p data-dcnode-id="5045"><span data-dcnode-id="5062" instrument_node="">The districts of the </span><a data-dcnode-id="5060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ghats" title="Western Ghats"><span data-dcnode-id="5061" instrument_node="">Western Ghats</span></a><span data-dcnode-id="5059" instrument_node=""> and the southern districts have popular eco tourism locations.</span><sup class="reference" data-dcnode-id="5056" id="cite_ref-30"><a data-dcnode-id="5057" href="#cite_note-30"><span data-dcnode-id="5058" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5055" instrument_node=""> Some of the popular locations include </span><a data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kudremukh" title="Kudremukh"><span data-dcnode-id="5054" instrument_node="">Kudremukh</span></a><span data-dcnode-id="5052" instrument_node="">, </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madikeri" title="Madikeri"><span data-dcnode-id="5051" instrument_node="">Madikeri</span></a><span data-dcnode-id="5049" instrument_node=""> and </span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agumbe" title="Agumbe"><span data-dcnode-id="5048" instrument_node="">Agumbe</span></a><span data-dcnode-id="5046" instrument_node="">. Karnataka boasts of the highest elephant Gaur bison and tiger population (greater than 6000, 8000 and 400 respectively) in India. Its forests hold some of the largest remaining populations of the endangered tiger and leopard.
Eco-tourism is a very popular activity in the state. Karnataka leads other states in eco-tourism. Jungle Lodges &amp; Resorts, a state-run organisation has camping and safari facilities in several wildlife sanctuaries. Private safari providers have sprung up in several places along the western ghats.
</span></p><p data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">Nirvana beach is one of the finest beaches near Kumta and has a 5&nbsp;km coastline with white sand and palm trees covering the entire coast, could be developed for eco beach tourism on the adjoining land falling in CRZ II category falling within 200&nbsp;meters from HTL. Farmers and fishermen were allowed to run beach cottages and beach shacks by government of Goa, tourism department to attract tourists from around the world as well as domestic tourists, in the months of September till may every season.
</span></p><p data-dcnode-id="5041"><span data-dcnode-id="5042" instrument_node="">Several NGO's (youth groups) are actively involved in birding and other conservation activities.
</span></p><span data-dcnode-id="5040" instrument_node="">
</span><h2 data-dcnode-id="5030"><span class="mw-headline" data-dcnode-id="5038" id="Adventure_and_outdoor_activities"><span data-dcnode-id="5039" instrument_node="">Adventure and outdoor activities</span></span><span class="mw-editsection" data-dcnode-id="5031"><span class="mw-editsection-bracket" data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">[</span></span><a data-dcnode-id="5034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D29" title="Edit section: Adventure and outdoor activities"><span data-dcnode-id="5035" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5029" instrument_node="">
</span><p data-dcnode-id="5000"><span data-dcnode-id="5028" instrument_node="">Adventure tourism has been growing at a pace of around 24% in Karnataka. The presence of </span><a class="mw-redirect" data-dcnode-id="5026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nilgiris" title="Nilgiris"><span data-dcnode-id="5027" instrument_node="">Nilgiris</span></a><span data-dcnode-id="5025" instrument_node="">, Western Ghats, rocky regions, waterfalls and lots of lakes and rivers make it an attractive destination. Certain activities at some regions namely Rock climbing at </span><a data-dcnode-id="5023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampi" title="Hampi"><span data-dcnode-id="5024" instrument_node="">Hampi</span></a><span data-dcnode-id="5022" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramnagaram" title="Ramnagaram"><span data-dcnode-id="5021" instrument_node="">Ramnagaram</span></a><span data-dcnode-id="5019" instrument_node="">; Mountain biking at </span><a class="mw-redirect" data-dcnode-id="5017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nilgiris" title="Nilgiris"><span data-dcnode-id="5018" instrument_node="">Nilgiris</span></a><span data-dcnode-id="5016" instrument_node="">; </span><a data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rafting" title="Rafting"><span data-dcnode-id="5015" instrument_node="">Rafting</span></a><span data-dcnode-id="5013" instrument_node=""> at </span><a data-dcnode-id="5011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Honnemaradu" title="Honnemaradu"><span data-dcnode-id="5012" instrument_node="">Honnemaradu</span></a><span data-dcnode-id="5010" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="5008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sagar%2C_Karnataka" title="Sagar, Karnataka"><span data-dcnode-id="5009" instrument_node="">Sagara</span></a><span data-dcnode-id="5007" instrument_node="">, Bheemeshwari, </span><a data-dcnode-id="5005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dandeli" title="Dandeli"><span data-dcnode-id="5006" instrument_node="">Dandeli</span></a><span data-dcnode-id="5004" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coorg" title="Coorg"><span data-dcnode-id="5003" instrument_node="">Coorg</span></a><span data-dcnode-id="5001" instrument_node=""> are famous.
</span></p><p data-dcnode-id="4985"><span data-dcnode-id="4999" instrument_node="">Besides this Sawandurga, Manchinbele (Feverpitch basecamp), Bheemeshwari Antharagange are also famous for rappelling, river crossing, caving and kayaking.</span><sup class="reference" data-dcnode-id="4996" id="cite_ref-31"><a data-dcnode-id="4997" href="#cite_note-31"><span data-dcnode-id="4998" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4995" instrument_node=""> There have been more than 100 places for trekking in Karnataka and many of them are organised by </span><a data-dcnode-id="4993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Karnataka" title="Government of Karnataka"><span data-dcnode-id="4994" instrument_node="">Government of Karnataka</span></a><span data-dcnode-id="4992" instrument_node=""> or government approved local vendors. Seasonal surfing is available in </span><a class="mw-redirect" data-dcnode-id="4990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gokarna%2C_Uttara_Kannada" title="Gokarna, Uttara Kannada"><span data-dcnode-id="4991" instrument_node="">Gokarna</span></a><span data-dcnode-id="4989" instrument_node=""> and </span><a data-dcnode-id="4987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kapu%2C_Karnataka" title="Kapu, Karnataka"><span data-dcnode-id="4988" instrument_node="">Kaup</span></a><span data-dcnode-id="4986" instrument_node="">. Fever pitch base camp has been developed by tourism industry professionals which is located 40&nbsp;km from Bangalore near Magadi.
</span></p><p data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">Bisle Ghat which is stretch of Western ghats from Kerala to Gujarat is also famous for trekking and adventurous activities. Farmers son Adventurous sports camp near Palya Town on the way to Sakleshpur Bisle ghat is also a must place to be visited by any foreign tourists. Farmers son Paintball arena and other ATV &amp; Dirtbike sports are some of the interesting things to do at Hassan.
</span></p><p data-dcnode-id="4974"><span data-dcnode-id="4982" instrument_node="">Karnataka tourism started promoting Motorcycle tourism and tied up with </span><a class="new" data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWicked_Ride_Motorcycle_Rentals%26action%3Dedit%26redlink%3D1" title="Wicked Ride Motorcycle Rentals (page does not exist)"><span data-dcnode-id="4981" instrument_node="">Wicked Ride</span></a><span data-dcnode-id="4979" instrument_node=""> a Bengaluru-based motorcycle rental company to promote adventure and motorcycle tourism as a policy, they are working to set up camping sites across the state to provide safe and clean camping sites for backpackers and motorcyclists to explore the state.</span><sup class="reference" data-dcnode-id="4976" id="cite_ref-32"><a data-dcnode-id="4977" href="#cite_note-32"><span data-dcnode-id="4978" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4975" instrument_node="">
</span></p><span data-dcnode-id="4973" instrument_node="">

</span><h2 data-dcnode-id="4858"><span class="mw-headline" data-dcnode-id="4866" id="Healthcare_tourism"><span data-dcnode-id="4867" instrument_node="">Healthcare tourism</span></span><span class="mw-editsection" data-dcnode-id="4859"><span class="mw-editsection-bracket" data-dcnode-id="4864"><span data-dcnode-id="4865" instrument_node="">[</span></span><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D30" title="Edit section: Healthcare tourism"><span data-dcnode-id="4863" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4857" instrument_node="">
</span><p data-dcnode-id="4851"><span data-dcnode-id="4856" instrument_node="">In the last couple of years Karnataka has emerged as a hot spot for health care tourism in India attracting health tourists from all over the world. Karnataka has highest number of approved health systems and alternative therapies. Along with some ISO certified government owned hospitals, private institutions which provide international quality services have caused health care industry to grow up to 30% during 2004–05. Hospitals in Karnataka treat around 8,000 and more health tourists every year.</span><sup class="reference" data-dcnode-id="4853" id="cite_ref-healthcare_33-0"><a data-dcnode-id="4854" href="#cite_note-healthcare-33"><span data-dcnode-id="4855" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4852" instrument_node="">
</span></p><span data-dcnode-id="4850" instrument_node="">
</span><h2 data-dcnode-id="4840"><span class="mw-headline" data-dcnode-id="4848" id="The_Golden_Chariot"><span data-dcnode-id="4849" instrument_node="">The Golden Chariot</span></span><span class="mw-editsection" data-dcnode-id="4841"><span class="mw-editsection-bracket" data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">[</span></span><a data-dcnode-id="4844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTourism_in_Karnataka%26action%3Dedit%26section%3D31" title="Edit section: The Golden Chariot"><span data-dcnode-id="4845" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4839" instrument_node="">
</span><p data-dcnode-id="4793"><a class="mw-redirect" data-dcnode-id="4837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Golden_Chariot" title="The Golden Chariot"><span data-dcnode-id="4838" instrument_node="">The Golden Chariot</span></a><span data-dcnode-id="4836" instrument_node=""> is a luxury tourist train of </span><a data-dcnode-id="4834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="4835" instrument_node="">Karnataka</span></a><span data-dcnode-id="4833" instrument_node=""> operated by </span><a data-dcnode-id="4831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Railways" title="Indian Railways"><span data-dcnode-id="4832" instrument_node="">Indian Railways</span></a><span data-dcnode-id="4830" instrument_node="">
and KSTDC (</span><a data-dcnode-id="4828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka_State_Tourism_Development_Corporation" title="Karnataka State Tourism Development Corporation"><span data-dcnode-id="4829" instrument_node="">Karnataka State Tourism Development Corporation</span></a><span data-dcnode-id="4827" instrument_node="">). Initially train was introduced exclusively for Karnataka, but recently it is expanded to whole south India. The train travels to the Karnataka's tourist destinations like </span><a data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore" title="Bangalore"><span data-dcnode-id="4826" instrument_node="">Bangalore</span></a><span data-dcnode-id="4824" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kabini" title="Kabini"><span data-dcnode-id="4823" instrument_node="">Kabini</span></a><span data-dcnode-id="4821" instrument_node="">, </span><a data-dcnode-id="4819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore" title="Mysore"><span data-dcnode-id="4820" instrument_node="">Mysore</span></a><span data-dcnode-id="4818" instrument_node="">, </span><a data-dcnode-id="4816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belur%2C_Karnataka" title="Belur, Karnataka"><span data-dcnode-id="4817" instrument_node="">Beluru</span></a><span data-dcnode-id="4815" instrument_node="">, </span><a data-dcnode-id="4813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halebidu" title="Halebidu"><span data-dcnode-id="4814" instrument_node="">Halebidu</span></a><span data-dcnode-id="4812" instrument_node="">, </span><a data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shravanabelagola" title="Shravanabelagola"><span data-dcnode-id="4811" instrument_node="">Shravanabelagola</span></a><span data-dcnode-id="4809" instrument_node="">, </span><a data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampi" title="Hampi"><span data-dcnode-id="4808" instrument_node="">Hampi</span></a><span data-dcnode-id="4806" instrument_node="">, </span><a data-dcnode-id="4804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badami" title="Badami"><span data-dcnode-id="4805" instrument_node="">Badami</span></a><span data-dcnode-id="4803" instrument_node="">, </span><a data-dcnode-id="4801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pattadakal" title="Pattadakal"><span data-dcnode-id="4802" instrument_node="">Pattadakal</span></a><span data-dcnode-id="4800" instrument_node="">, </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aihole" title="Aihole"><span data-dcnode-id="4799" instrument_node="">Aihole</span></a><span data-dcnode-id="4797" instrument_node=""> and </span><a data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goa" title="Goa"><span data-dcnode-id="4796" instrument_node="">Goa</span></a><span data-dcnode-id="4794" instrument_node="">.
</span></p><p data-dcnode-id="4758"><span data-dcnode-id="4792" instrument_node="">Train coaches are named after the Karnataka dynasties like </span><a class="mw-redirect" data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadamba_Dynasty" title="Kadamba Dynasty"><span data-dcnode-id="4791" instrument_node="">Kadamba</span></a><span data-dcnode-id="4789" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoysala" title="Hoysala"><span data-dcnode-id="4788" instrument_node="">Hoysala</span></a><span data-dcnode-id="4786" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashtrakuta" title="Rashtrakuta"><span data-dcnode-id="4785" instrument_node="">Rashtrakuta</span></a><span data-dcnode-id="4783" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gangas" title="Gangas"><span data-dcnode-id="4782" instrument_node="">Ganga</span></a><span data-dcnode-id="4780" instrument_node="">,

</span><p data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">Karnataka Tourism is the popular name of the Department of Tourism, Government of Karnataka (website: karnatakatourism.org).
</span></p><p data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Karnataka Tourism is responsible for the sustainable development of tourism in Karnataka along with marketing of the destination worldwide. Karnataka's destination branding and marketing is done by India's leading tourism marketing organisation, Stark Communications. Stark is part of The Stark Group under whose umbrella are companies such as Stark Communications, Stark Expo, Starkworld Publishing, Stark Expo, starkwebworks, Stark Tourism Forum.
</span></p><p data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">Karnataka Tourism develops hospitality infrastructure through two government-owned companies, Jungle Lodges &amp; Resorts and Karnataka State Tourism Development Corporation.
</span></p><span data-dcnode-id="4739" instrument_node="">
