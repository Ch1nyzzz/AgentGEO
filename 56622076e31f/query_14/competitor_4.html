04=""><span data-dcnode-id="1178" instrument_node="">sheltering</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1173" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1174" scxw217288104=""><span data-dcnode-id="1175" instrument_node="">?</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1171" scxw217288104=""><span data-dcnode-id="1172" instrument_node="">&nbsp;</span></span></a></h2></div><div bcx0="" data-dcnode-id="1137" ltr="" scxw217288104"=""><p data-dcnode-id="1138" paraeid="{de53340a-9648-4fab-9923-0fae34aa27c3}{254}" paraid="790397227" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1165" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1166" scxw217288104=""><span data-dcnode-id="1167" instrument_node="">The world of animal sheltering is complex and sometimes controversial, with different and emotional views about what is “best practice”. RSPCA Victoria&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1162" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1163" scxw217288104=""><span data-dcnode-id="1164" instrument_node="">is one of&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1159" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1160" scxw217288104=""><span data-dcnode-id="1161" instrument_node="">a growing number of organisations&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1156" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1157" scxw217288104=""><span data-dcnode-id="1158" instrument_node="">joining</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1153" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1154" scxw217288104=""><span data-dcnode-id="1155" instrument_node="">&nbsp;the</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1150" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1151" scxw217288104=""><span data-dcnode-id="1152" instrument_node="">&nbsp;socially conscious sheltering movement, and we believe it represents the&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1147" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1148" scxw217288104=""><span data-dcnode-id="1149" instrument_node="">current&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1144" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1145" scxw217288104=""><span data-dcnode-id="1146" instrument_node="">best practice approach to animal sheltering</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1141" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1142" scxw217288104=""><span data-dcnode-id="1143" instrument_node="">.</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1139" scxw217288104=""><span data-dcnode-id="1140" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="1132" ltr="" scxw217288104"=""><p data-dcnode-id="1133" paraeid="{7560ddb3-abe6-48de-b10e-9c85c0173030}{62}" paraid="109975796" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1134" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1135" scxw217288104=""><span data-dcnode-id="1136" instrument_node="">As a socially conscious shelter, RSPCA Victoria believes we have a responsibility to create the best outcomes for animals in our care and the community. We treat animals respectfully, we are ethical and transparent, we accept every animal into our care, and we rehome every healthy and safe animal.</span></span></span></p></div><div bcx0="" data-dcnode-id="1125" ltr="" scxw217288104"=""><p data-dcnode-id="1126" paraeid="{7560ddb3-abe6-48de-b10e-9c85c0173030}{72}" paraid="1785879193" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1129" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1130" scxw217288104=""><span data-dcnode-id="1131" instrument_node="">There are eight fundamental tenets of socially conscious sheltering – we list them below, and how RSPCA Victoria addresses each one:</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1127" scxw217288104=""><span data-dcnode-id="1128" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="1104" ltr="" scxw217288104"=""><h4 data-dcnode-id="1110" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1121" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1122" scxw217288104=""><strong data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">TENET 1&nbsp;</span></strong></span></span><strong data-dcnode-id="1111"><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1118" scxw217288104=""><span data-dcnode-id="1120" instrument_node="">&nbsp;</span><br data-dcnode-id="1119"></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1115" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1116" scxw217288104=""><span data-dcnode-id="1117" instrument_node="">Ensure every unwanted or homeless animal has a safe place to go for shelter and care.</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1112" scxw217288104=""><span data-dcnode-id="1114" instrument_node="">&nbsp;</span><br data-dcnode-id="1113"></span></strong></h4><p data-dcnode-id="1105" scxw217288104=""><span bcx0"="" data-dcnode-id="1108" scxw217288104=""><span data-dcnode-id="1109" instrument_node="">RSPCA Victoria accepts any animal offered into its care.</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1106" scxw217288104="" style="color: rgb(0, 0, 0);"><span data-dcnode-id="1107" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="1088" ltr="" scxw217288104"=""><h4 data-dcnode-id="1091" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1100" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1101" scxw217288104=""><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">TENET 2</span></strong></span></span><strong data-dcnode-id="1092"><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1097" scxw217288104=""><span data-dcnode-id="1099" instrument_node="">&nbsp;</span><br data-dcnode-id="1098"></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1093" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1094" scxw217288104=""><span data-dcnode-id="1096" instrument_node="">Make every healthy and safe animal available for adoption.</span><br data-dcnode-id="1095"></span></span></strong></h4><p data-dcnode-id="1089" scxw217288104=""><span data-dcnode-id="1090" instrument_node="">RSPCA Victoria only offers for adoption animals that are healthy and safe and will not offer for adoption any animal that is irremediably suffering or dangerous to the community.</span></p></div><div bcx0="" data-dcnode-id="1080" ltr="" scxw217288104"=""><span data-dcnode-id="1087" instrument_node="">
</span><h4 data-dcnode-id="1083"><span data-dcnode-id="1086" instrument_node="">TENET 3</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">Assess the medical and behavioural needs of homeless animals and ensure those needs are thoughtfully addressed.</span></h4><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">RSPCA Victoria, through its medical team and its animal behaviour team, provides a holistic approach to ensuring each animal's needs are met.</span></p></div><div bcx0="" data-dcnode-id="1072" ltr="" scxw217288104"=""><span data-dcnode-id="1079" instrument_node="">
</span><h4 data-dcnode-id="1075"><span data-dcnode-id="1078" instrument_node="">TENET 4</span><br data-dcnode-id="1077"><span data-dcnode-id="1076" instrument_node="">Align policy with the needs of the community.</span></h4><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">RSPCA Victoria recognises its responsibility to the public and ensures its programs and policies reflect and support this obligation.</span></p></div><div bcx0="" data-dcnode-id="1067" ltr="" scxw217288104"=""><h4 data-dcnode-id="1068"><span data-dcnode-id="1071" instrument_node="">TENET 5</span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">Alleviate suffering and making appropriate euthanasia decisions.</span></h4></div><div bcx0="" data-dcnode-id="1047" ltr="" scxw217288104"=""><p data-dcnode-id="1048" paraeid="{7560ddb3-abe6-48de-b10e-9c85c0173030}{194}" paraid="2000061147" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1064" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" commentstart="" data-dcnode-id="1065" scxw217288104=""><span data-dcnode-id="1066" instrument_node="">RSPCA Victoria&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1061" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1062" scxw217288104=""><span data-dcnode-id="1063" instrument_node="">accepts</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1058" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1059" scxw217288104=""><span data-dcnode-id="1060" instrument_node="">&nbsp;that sometimes</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1055" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1056" scxw217288104=""><span data-dcnode-id="1057" instrument_node="">&nbsp;animals</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1052" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1053" scxw217288104=""><span data-dcnode-id="1054" instrument_node="">&nbsp;are irremediably suffering and cannot live without experiencing severe, unremitting pain or other serious health and behavioural challenges</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1049" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1050" scxw217288104=""><span data-dcnode-id="1051" instrument_node="">. In these situations, it is most humane to relieve an animal's suffering with compassionate euthanasia.</span></span></span></p></div><div bcx0="" data-dcnode-id="1036" ltr="" scxw217288104"=""><h4 data-dcnode-id="1037" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1042" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1043" scxw217288104=""><strong data-dcnode-id="1044"><span data-dcnode-id="1046" instrument_node="">TENET 6</span><br data-dcnode-id="1045"></strong></span></span><strong data-dcnode-id="1038"><span bcx0"="" data-contrast="auto" data-dcnode-id="1039" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1040" scxw217288104=""><span data-dcnode-id="1041" instrument_node="">Consider the health and wellness of animals for each community when transferring animals.</span></span></span></strong></h4></div><div bcx0="" data-dcnode-id="993" ltr="" scxw217288104"=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1033" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1034" scxw217288104=""><span data-dcnode-id="1035" instrument_node="">RSPCA Victoria transfers animals&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1030" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1031" scxw217288104=""><span data-dcnode-id="1032" instrument_node="">within its own shelter network and to&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1027" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1028" scxw217288104=""><span data-dcnode-id="1029" instrument_node="">other&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1024" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" commentstart="" data-dcnode-id="1025" scxw217288104=""><span data-dcnode-id="1026" instrument_node="">animal</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1021" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1022" scxw217288104=""><span data-dcnode-id="1023" instrument_node="">&nbsp;welfare&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1018" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1019" scxw217288104=""><span data-dcnode-id="1020" instrument_node="">shelters or rescue</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1015" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1016" scxw217288104=""><span data-dcnode-id="1017" instrument_node="">&nbsp;groups</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1012" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1013" scxw217288104=""><span data-dcnode-id="1014" instrument_node="">&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1009" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1010" scxw217288104=""><span data-dcnode-id="1011" instrument_node="">in</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1006" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1007" scxw217288104=""><span data-dcnode-id="1008" instrument_node="">&nbsp;areas of Victoria&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1003" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" commentstart="" data-dcnode-id="1004" scxw217288104=""><span data-dcnode-id="1005" instrument_node="">that are experiencing a shortage of shelter animals</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="1000" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1001" scxw217288104=""><span data-dcnode-id="1002" instrument_node="">. RSPCA Victoria ensures that animals transported through these programs do not suffer from physical or behavioural problems that could endanger animals or people in their new communities.</span></span></span><br data-dcnode-id="999"><h4 data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">TENET 7</span><br data-dcnode-id="997"><span bcx0"="" data-dcnode-id="995" scxw217288104=""><span data-dcnode-id="996" instrument_node="">Enhance the human-animal bond through thoughtful placements and post-adoption support.</span></span></h4></div><div bcx0="" data-dcnode-id="988" ltr="" scxw217288104"=""><p data-dcnode-id="989" paraeid="{624738a7-e72c-46e8-bc27-47bcdc9985be}{31}" paraid="613913795" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="990" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="991" scxw217288104=""><span data-dcnode-id="992" instrument_node="">RSPCA Victoria works with potential adopters to make sure animals they select are suitable matches for their lifestyles, the adopter can properly care for and handle the animal and considers other relevant factors to make certain the placement is successful. RSPCA Victoria provides post-adoption support to adopters to ensure the placement thrives.</span></span></span></p></div><div bcx0="" data-dcnode-id="971" ltr="" scxw217288104"=""><h4 data-dcnode-id="976" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="984" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="985" scxw217288104=""><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">TENET 8</span></strong></span></span><strong data-dcnode-id="977"><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="981" scxw217288104=""><span data-dcnode-id="983" instrument_node="">&nbsp;</span><br data-dcnode-id="982"></span><span bcx0"="" data-contrast="auto" data-dcnode-id="978" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="979" scxw217288104=""><span data-dcnode-id="980" instrument_node="">Foster a culture of transparency, ethical decision-making, mutual respect, continual learning and collaboration.</span></span></span></strong></h4><p data-dcnode-id="972"><span bcx0"="" data-contrast="auto" data-dcnode-id="973" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="974" scxw217288104=""><span data-dcnode-id="975" instrument_node="">RSPCA Victoria is committed to upholding the highest ethical standards and transparency in meeting its goal. We work respectfully with stakeholders including other animal welfare shelters and rescue groups, we are guided by clear, evidence-based policies that prioritise animal welfare, we adhere to relevant codes and legislation and we publish statistics and information about our shelter operations and the animals in our care every year.</span></span></span></p></div><div bcx0="" data-dcnode-id="966" ltr="" scxw217288104"=""><p data-dcnode-id="967" paraeid="{624738a7-e72c-46e8-bc27-47bcdc9985be}{65}" paraid="1435613368" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="968" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="969" scxw217288104=""><span data-dcnode-id="970" instrument_node="">RSPCA Victoria seeks to continuously improve its operations while increasing community understanding of best practice animal sheltering.</span></span></span></p></div><div bcx0="" data-dcnode-id="949" ltr="" scxw217288104"=""><p data-dcnode-id="950" paraeid="{624738a7-e72c-46e8-bc27-47bcdc9985be}{77}" paraid="347286184" scxw217288104=""><span bcx0"="" data-contrast="auto" data-dcnode-id="963" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="964" scxw217288104=""><span data-dcnode-id="965" instrument_node="">To find out more about the socially conscious sheltering movement visit&nbsp;</span></span></span><a bcx0"="" data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scssheltering.org/" rel="noreferrer noopener" scxw217288104="" target="_blank"><span bcx0"="" data-contrast="none" data-dcnode-id="960" lang="EN-AU" scxw217288104="" underlined="" xml:lang="EN-AU"><span bcx0"="" data-ccp-charstyle="Hyperlink" data-dcnode-id="961" scxw217288104=""><span data-dcnode-id="962" instrument_node="">www.scssheltering.org</span></span></span></a><span bcx0"="" data-contrast="auto" data-dcnode-id="956" lang="EN-AU" scxw217288104="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="957" scxw217288104=""><span data-dcnode-id="958" instrument_node="">&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="951" scxw217288104=""><span data-dcnode-id="955" instrument_node="">&nbsp;</span><br data-dcnode-id="954"><br data-dcnode-id="953"><br data-dcnode-id="952"></span></p></div><h2 data-dcnode-id="946"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_3c"><span data-dcnode-id="948" instrument_node="">Discover ducks!&nbsp;</span></a></h2><p data-dcnode-id="931"><span data-dcnode-id="945" instrument_node="">Discover ducks! is a new campaign that will bring our native waterbirds to the public’s attention and highlight their uniqueness and beauty. RSPCA Victoria commissioned research by independent agency Colmar Brunton to determine Victorians’ attitudes towards ducks.&nbsp; This research found that just over 60% of Victorians have positive attitudes towards ducks and believe that their welfare is important. However, 37% of respondents were neutral towards ducks and 27% believe that duck welfare is neither important nor unimportant.&nbsp; &nbsp;</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">&nbsp;</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">We think more Victorians would love ducks and care about their welfare if they knew more about them. Discover ducks! aims to motivate Victorians to learn about our native waterbirds, then explore their local parks or regional wetlands to enjoy the sight of ducks in nature.&nbsp; This will hopefully inspire Victorians to protect our native ducks and the wetlands where they live.&nbsp;</span><br data-dcnode-id="940"><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">Discover ducks! aims to build a community of native duck lovers who are motivated to visit wetlands and build ecotourism in regional areas. In our own research, 37% of Victorians told us that they were likely to visit wetlands to find native ducks. With tourism to regional Victoria more important than ever following the summer bushfires and the impacts of COVID-19, we’d like to see a more Victorians visit regional wetlands to </span><em data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">’discover ducks’</span></em><span data-dcnode-id="935" instrument_node=""> once Victoria’s restrictions are lifted.</span><br data-dcnode-id="934"><br data-dcnode-id="933"><br data-dcnode-id="932"></p><h2 data-dcnode-id="928"><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_3d"><span data-dcnode-id="930" instrument_node="">Ecosystem decline in Victoria&nbsp;</span></a></h2><p data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">While species extinction, wildlife conservation and animal welfare are often framed as, and responded to as, separate issues, they all involve caring for and ensuring the wellbeing of animals as individuals and as species. The UK Farm Animal Welfare Council’s five freedoms of animal welfare - freedom from hunger and thirst, freedom from discomfort, freedom for pain injury and disease, freedom to express normal behaviours and freedom from fear and distress - are all compromised if the habitats of animals continue to decline.&nbsp;</span><br data-dcnode-id="926"><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">In August, RSPCA Victoria made a submission to the Victorian Government’s Inquiry into ecosystem decline in Victoria. In our view, ecosystem decline in Victoria is having a considerable impact on the welfare of animals, both native and introduced. In the submission we outlined several concerns for the welfare of animals due to ecosystem decline, including habitat loss, destruction, encroachment, hunting activities and the impact of feral species. In particular, we spoke about:&nbsp;</span></p><ul data-dcnode-id="906"><li data-dcnode-id="919"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Wetlands and native waterbirds, </span></strong><span data-dcnode-id="920" instrument_node="">citing evidence of the impact of prolonged dry conditions and the impact of the annual duck shooting season on the welfare of native waterbirds</span></li><li data-dcnode-id="915"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Kangaroos,</span></strong><span data-dcnode-id="916" instrument_node=""> and the impact of urban growth on their welfare along with concerns about Victoria’s Kangaroo Harvest Program</span></li><li data-dcnode-id="911"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Native wildlife in the Victorian alpine regions,</span></strong><span data-dcnode-id="912" instrument_node=""> and the impact of introduced species on the welfare of native animals and their habitats.</span></li><li data-dcnode-id="907"><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The importance of proactively managing wild animal populations,</span></strong><span data-dcnode-id="908" instrument_node=""> including feral horses, deer and cats, to help prevent ecosystem decline while doing so in the most humane way possible.&nbsp;</span></li></ul><span data-dcnode-id="905" instrument_node="">For each of the issues above, RSPCA Victoria is engaged in ongoing dialogue and advocacy to try to improve animal welfare outcomes and prevent further ecosystem decline. This includes:&nbsp;</span><br data-dcnode-id="904"><ul data-dcnode-id="895"><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Advocating to the Victorian Government for an end to duck shooting in Victoria</span></li><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Making recommendations to the Victorian Government to ensure any kangaroo harvesting is strictly regulated and only permitted when evidence shows it is humane, justified and effective</span></li><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Advising Parks Victoria on the proactive, humane management of introduced species within national parks to prevent further ecosystem decline&nbsp;</span></li><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Advocating for the proactive management of wild animal populations to prevent suffering and help preserve sustainable ecosystems.</span></li></ul><span data-dcnode-id="894" instrument_node="">&nbsp;&nbsp;</span><p data-dcnode-id="890"><span data-dcnode-id="891" style="color: rgb(0, 153, 204);"><br data-dcnode-id="893"><span data-dcnode-id="892" instrument_node="">Newsletter #2 July 2nd</span></span></p><h2 data-dcnode-id="887"><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rspcavic.org/about-us" id="anchor_6"><span data-dcnode-id="889" instrument_node="">Controlling feral horses helps all creatures</span></a></h2><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Recent lengthy court cases and heated debate have delayed Parks Victoria’s plan to cull feral horses in the Alpine National Park. It’s an emotive issue for many – whether to allow feral horses to roam free in national parks, or employ the most humane method available to manage the population and protect the native species and habitats they are currently threatening.</span></p><h3 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Why are feral horses a problem?</span></h3><p data-dcnode-id="878"><span data-dcnode-id="882" instrument_node="">Feral horses – known colloquially as brumbies – live in Victoria’s Alpine National Park and Barmah National Park. Feral horses, along with feral deer, goats and pigs, are not a natural part of the Australian ecosystem and can cause severe damage to alpine and sub-alpine environments, including the destruction of habitat critical to many native wildlife and plant species. This damage negatively impacts the welfare of native animals and their environments – the Mountain Pygmy Possum, Northern Corroboree Frog, Smoky Mouse and Broad-Toothed Rat are just some of the native species currently subjected to welfare impacts due to feral horses destroying their habitat, leaving them vulnerable to predation and impacting their food availability.</span><br data-dcnode-id="881"><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">A comprehensive aerial survey across the Australian Alps in late 2019 found a significant increase in feral horse numbers, with estimates of those in Victoria rising from around 2,300 to 5,000 over the five years since the previous survey. Compounding this is the damage from the 2019-20 bushfires, which caused major losses of high country native wildlife, native plants and habitats. For this reason, Parks Victoria wants to act now to reduce the impacts introduced animals are having on native ecosystems within the Alpine National Park</span></p><h3 data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Proactive, humane management</span></h3><p data-dcnode-id="862"><span data-dcnode-id="875" instrument_node="">It is because of our passion for all sentient creatures that RSPCA Victoria believes it is necessary to manage populations of wild animals when they impact the welfare of other species. This is a very tough ethical equation – allow feral horses to drive native species to extinction while impacting their welfare by disrupting the ecosystem, or employ the most humane method available to manage the population to a less damaging level to support the welfare of all species, including horses, in that environment.&nbsp;</span><br data-dcnode-id="874"><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">In our view, introduced species that negatively impact the welfare of native animals and their environments should be proactively managed in the most humane, effective and target-specific way available. To ensure the welfare of all animals, this should only be done under appropriate government-supervised management programs.&nbsp;</span><br data-dcnode-id="871"><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">Importantly, all introduced species should be treated equally and no single species should be exempted from humane control, as has been the case with feral horses up until now.&nbsp;</span><br data-dcnode-id="868"><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">The mountain pygmy possum, northern corroboree frog, smoky mouse and broad-toothed rat are just some of the native species whose habitats are being destroyed or threatened by feral horses, leaving them vulnerable to predation and impacting their food supply.&nbsp;</span><br data-dcnode-id="865"><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">The broad-toothed rat - which has lived in the Alps for thousands of years - is now listed as a vulnerable species. There are currently only 2,000 mountain pygmy possums left in the wild. In contrast, feral horses are not native, endangered or at risk of extinction. They also suffer from poor welfare when they compete for resources due to their large population numbers. Because of these animal welfare impacts, RSPCA Victoria recognises the difficult but sometimes necessary case for controlling numbers of a particular species – in this case, feral horses.</span></p><h3 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Why can’t they rehome all the horses?</span></h3><p data-dcnode-id="849"><span data-dcnode-id="859" instrument_node="">RSPCA Victoria supports rehoming of feral horses and passive trapping where there is demand for horses from appropriate horse rescue groups or homes that have the expertise and ability to provide for their long-term care. The evidence suggests that there are simply not enough places like these.&nbsp;</span><br data-dcnode-id="858"><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">Media coverage in 2019 clearly illustrated the market for horses in Victoria is currently saturated, with hundreds of unwanted horses being sent to abattoirs and knackeries. This is further illustrated as Parks Victoria has only received three expressions of interest to rehome feral horses.&nbsp;</span><br data-dcnode-id="855"><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">Therefore, we can’t see how rehoming could be the principal control method for feral horses, rather, it should be utilised in conjunction with other control methods, such as humane shooting according to best practice standards and exclosure fencing.&nbsp; We encourage anyone with experience in homing horses and an interest in rehoming feral horses to contact Parks Victoria.&nbsp;</span><br data-dcnode-id="852"><br data-dcnode-id="851"><br data-dcnode-id="850"></p><h2 data-dcnode-id="846"><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rspcavic.org/about-us" id="anchor_7"><span data-dcnode-id="848" instrument_node="">Roo for improvement: kangaroo harvesting in Victoria&nbsp;</span></a></h2><p data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">Kangaroo harvesting for commercial purposes needs to be very carefully regulated. The RSPCA believes harvesting should only be permitted as part of a wild animal management program supported by clear evidence that kangaroos are having an adverse impact on the environment, agriculture, tourism or transport. Currently, that is not the case in Victoria.</span><br data-dcnode-id="844"><br data-dcnode-id="843"><span data-dcnode-id="842" instrument_node="">In our view the current Victorian Kangaroo Harvest Management Plan doesn’t adequately protect animal welfare. RSPCA Victoria would like to see more rigorous requirements along with greater monitoring and compliance enforcement. We shared these views with the Government during a recent consultation process on commercial kangaroo harvesting.&nbsp;</span></p><h3 data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">How does kangaroo harvesting work?</span></h3><p data-dcnode-id="834"><span data-dcnode-id="838" instrument_node="">Kangaroos are harvested for pet food and other commercial uses and there is a market for exporting kangaroo products overseas. In 2019 the Victorian Government introduced a kangaroo harvesting program following a trial that ran over several years. The Victorian Kangaroo Harvest Management Plan 2020 (“the Plan”) permits accredited shooters to harvest a quota (set by Department of Environment, Land, Water and Planning - DELWP) of kangaroos and sell them to the domestic pet food industry. Shooters are required to shoot with high accuracy and aim for the head to prevent suffering.</span><br data-dcnode-id="837"><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">In addition, the Australian Government recently consulted on the Draft developmental wildlife trade operation for the sustainable harvest and commercial export of Eastern and Western Grey Kangaroo products in Victoria. This would see Victorian kangaroos harvested as per the guidelines in the Plan for overseas export in addition to the domestic pet food market.</span></p><h3 data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Why are we concerned?</span></h3><p data-dcnode-id="824"><span data-dcnode-id="831" instrument_node="">In most States or Territories, quotas are set for the commercial harvesting of kangaroos which no longer relate population reduction directly to damage mitigation. Kangaroo management plans treat kangaroos as a sustainable resource available for commercial use, rather than making a decision for control as a result of examining of their impact on the environment. Given the effects of drought and climate change, there is debate about the effect of the sustainable use approach on future populations of commercially exploited species.</span><br data-dcnode-id="830"><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">We believe that the issue of whether kangaroos and wallabies should continue to be killed under a sustainable use policy should be reviewed by both federal and state governments. Continuing research is needed to determine the impact of current culling practices on kangaroo populations and their environment.&nbsp;</span><br data-dcnode-id="827"><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">Additionally, we are concerned that the Victorian Plan is not sufficient to protect the welfare of animals harvested for either domestic or export purposes.</span></p><h3 data-dcnode-id="820"><span data-dcnode-id="823" instrument_node="">Adaptive management and research to improve welfare</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">To improve animal welfare, we are encouraging the Victorian Government to facilitate adaptive management and research. </span></h3><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">There are several areas where further research is required to improve welfare outcomes for kangaroos under the Plan including:</span></p><ul data-dcnode-id="809"><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Developing more effective and humane methods for killing orphaned joeys</span></li><li data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Assessing potential welfare impacts of disrupting mobs following harvesting</span></li><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Assessing feasibility and benefits of developing a quality assurance program for any person conducting kangaroo management activities (e.g. body cameras worn by shooters)</span></li><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Collecting data to determine if and how commercial harvesting reduces the number of kangaroos who suffer during drought.</span></li></ul><h3 data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Better auditing and compliance measures</span></h3><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Additionally, we’d like Victoria’s Plan to incorporate more rigorous auditing and compliance enforcement measures such as:</span></p><ul data-dcnode-id="788"><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Twice yearly auditing of all accredited shooters to ensure accuracy and humaneness of shooting;&nbsp;</span></li><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">In-field auditing of shooters every three years to ensure accurate brain shots;</span></li><li data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Assessment of shots during kangaroo processing to ensure head rather than neck shots;</span></li><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Site inspections of carcasses left in the field to assess shooting accuracy;</span></li><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Field assessment to ensure orphaned joeys are treated humanely;</span></li><li data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Regular population audits to ensure ecological sustainability of quotas set for shooters;</span></li><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Requirements for harvesters to demonstrate understanding of the National Code of Practice for the Humane Shooting of Kangaroos and Wallabies for Commercial Purposes (the Code);</span></li><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Investigation and follow up for 100% of reports of non-compliance.</span></li></ul><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">RSPCA Victoria will continue to advocate to the Victorian Government to make changes to the commercial system to increase protections for the welfare of kangaroos.</span><br data-dcnode-id="786"><br data-dcnode-id="785"><br data-dcnode-id="784"></p><h2 data-dcnode-id="779"><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rspcavic.org/about-us" id="anchor_8"><span data-dcnode-id="782" instrument_node="">Improving transparency and confidence in agriculture</span></a><span data-dcnode-id="780" instrument_node=""> </span></h2><p data-dcnode-id="771"><span data-dcnode-id="778" instrument_node="">Community attitudes to animal welfare in farming
are changing, and so too are expectations regarding appropriate standards. In
2019, tension between animal activists and the agriculture industry prompted
the Victorian Government to hold an Inquiry into the impact of animal rights
activism on agriculture. This month the Government released its response to the
Inquiry recommendations and it was pleasing to see a commitment to some
positive changes. </span><br data-dcnode-id="777"><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">RSPCA Victoria does not support any kind of
illegal activity in the pursuit of animal welfare objectives. We believe that
animal welfare improvements can be achieved through productive engagement with
key stakeholders and democratic processes rather than through illegal
activities. We made our views clear during the Inquiry and are looking forward
to seeing some good outcomes. </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/downloads/submissions/2019-submissions/"><span data-dcnode-id="774" instrument_node="">Read our submission here</span></a><span data-dcnode-id="772" instrument_node="">. &nbsp; </span></p><h3 data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Transparency improves animal welfare </span></h3><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">The RSPCA encourages transparency throughout the
supply chain to enable consumers to make informed choices about animal
products. Transparency and communication of agricultural practices at all
stages of the food production process can be an effective way of increasing
consumer confidence and understanding. Therefore, RSPCA Victoria is pleased to
see that the report is highlighting the need for greater transparency around
farm practices to better inform the community. </span><br data-dcnode-id="767"><br data-dcnode-id="766"><span data-dcnode-id="765" instrument_node="">Moving forward, we will work with industry groups
and farmers to assist them to proactively engage with the community to address
concerns about farm animal welfare and build community trust. </span></p><h3 data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Independent oversight is important </span></h3><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">RSPCA Victoria welcomes the recommendation to
improve independent federal oversight of development of Australian Animal
Welfare Standards and Guidelines by creating an Australian Commission for
Animal Welfare. We’re concerned that the current development process has
resulted in the production of inadequate standards that are not sufficiently
supported by science and do not meet community expectations. The Standards and
Guidelines produced to-date fail to raise the bar on animal welfare standards
and simply reflect current industry practice.</span></p><h3 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Use of closed-circuit television </span></h3><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">RSPCA Victoria welcomes the recommendation to
implement closed circuit television (CCTV) cameras in Victorian abattoirs. At
abattoirs, saleyards, and other commercial facilities where large numbers of
animals are handled on a daily basis, there is the potential for the welfare of
the animals to be at risk. Implementation of CCTV would ensure evidence that
animal welfare standards are maintained and never compromised. Facility
management must ensure that animal welfare is seen as a priority and that there
is a zero-tolerance policy towards animal abuse. CCTV is now used in many
workplaces and public spaces, and the use of CCTV in commercial animal facilities
sends a strong signal to those people working with animals that animal welfare
is of the highest priority and that cruelty will not be tolerated. &nbsp; </span></p><h3 data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Modernising Victoria’s animal welfare legislation
 </span></h3><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">RSPCA Victoria is looking forward to working with
the Victorian Government on the modernisation of the Prevention of Cruelty
to Animals Act 1986 (POCTAA) to ensure that animal welfare is better
protected. As POCTAA covers all animals, this is an important piece of work
that is independent of the national animal welfare standards setting process
for livestock. We agree that reviewing and strengthening codes of practice for
animal welfare and making them mandatory is vital for ensuring the protection
of animals.  &nbsp; </span></p><h3 data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Humane treatment of all farm animals </span></h3><p data-dcnode-id="737"><span data-dcnode-id="749" instrument_node="">RSPCA Victoria does not promote an end to animal
use or consumption by people. Instead our philosophy is that all animals should
live a good life and die a humane death. The RSPCA advocates for the humane treatment of
all farm animals. We believe it is important to work with the farming community
and other stakeholders to affect positive change and improve animal welfare
throughout the lives of the animals. </span><br data-dcnode-id="748"><br data-dcnode-id="747"><span data-dcnode-id="746" instrument_node="">Attitudes and expectations of ordinary
Australians are evolving and if industry practices do not keep pace to meet
these expectations, it will result in eroding levels of trust in animal
agriculture and increasing challenges to its social licence. </span><br data-dcnode-id="745"><br data-dcnode-id="744"><span data-dcnode-id="743" instrument_node="">You can read more about the RSPCA’s policies on
agriculture here at our national&nbsp;</span><span data-dcnode-id="738" style="mso-ascii-font-family:Calibri;mso-fareast-font-family:Calibri;
mso-hansi-font-family:Calibri;mso-bidi-font-family:Calibri;color:#0563C1"><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/article-categories/policies-farm-animals/"><span data-dcnode-id="742" instrument_node="">Knowledgebase.</span></a><br data-dcnode-id="740"><br data-dcnode-id="739"></span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Newsletter #1 April 16th</span></h4><b data-dcnode-id="729"><h2 data-dcnode-id="730"><a data-dcnode-id="731" id="anchor_1"><span data-dcnode-id="732" instrument_node="">Out for a duck – no shooting under current restrictions, but what about a permanent ban?</span></a></h2></b><span data-dcnode-id="728" instrument_node="">The circumstances around COVID-19 have been challenging for many Australians, but the announcement that duck shooting is not permitted during the COVID-19 lockdown will be welcome news to many who value the welfare of our native waterbirds and are concerned about sustainability. Duck shooting season was due to commence in May, despite strong recommendations from RSPCA Victoria that it be cancelled due to the unnecessary injury, pain, suffering and distress caused to our native ducks as well as the unprecedented environmental conditions. Hundreds of thousands of ducks are killed or wounded each season. Not every bird is killed outright and data from last year’s season indicates around 24,000 ducks were wounded and left to suffer. Although this year’s duck shooting season had been shortened and modified, we have consistently recommended that the 2020 season shouldn’t proceed at all and that duck hunting should be banned. Our recommendations for cancellation of the 2020 season were also based on long-term dry climatic conditions, along with drought conditions in NSW and Queensland and lack of available water, which have reduced available habitat for waterbirds and impacted their breeding and sustainability. &nbsp;Latest data from the annual Aerial Survey of Wetland Birds in Eastern Australia – which has been running for more than 30 years - reflects the dire conditions wetland birds are facing and presents compelling evidence of long-term declines in game bird abundance. Furthermore, the full impact on wildlife of the devastating summer bushfires is not yet fully understood but has the potential to be significant.
Prior to the COVID-19 restrictions, the decision to allow a duck shooting season this year was especially disappointing given public concern for protecting wildlife has increased significantly since the bushfires. A recent Public Attitudes to Bushfire Fundraising report revealed strong public concern for native animals, and a desire to rescue, treat and protect those animals. This was illustrated by the fact that animal charities and causes received the largest proportion of bushfire donations.   A recent survey showed that 61% of Victorians are opposed to duck shooting. While it has been banned for years in nearly all states and territories, duck shooting continues in Victoria and South Australia. As a state that prides itself on progressive values, it’s time for Victoria to follow other states and territories and ban duck shooting.

</span><h2 data-dcnode-id="725"><a data-dcnode-id="726" id="anchor_2"><span data-dcnode-id="727" instrument_node="">The long run – improving the welfare of racing animals</span></a></h2><span data-dcnode-id="724" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">RSPCA Victoria has long been concerned with animal welfare issues across all three of Victoria’s racing codes – flat racing (thoroughbreds), harness racing (standardbreds) and greyhound racing. We’ve been advocating behind the scenes for a long time – including directly with the peak racing bodies – and this year we’re focusing our efforts to advocate for specific improvements in all three codes.
</span></p><span data-dcnode-id="721" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="713" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="716" style="line-height: 107%;"><span data-dcnode-id="720" instrument_node="">The 7.30 Report story shone a much-needed spotlight on horse oversupply and “wastage” – literally those horses that are no longer racing that become by-products of the racing industry. Overbreeding is a fundamental problem – we simply don’t know how many horses are being bred. However, at RSPCA Victoria we believe this is just one of many </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/knowledge-base/what-are-the-animal-welfare-issues-with-thoroughbred-horse-racing/"><span data-dcnode-id="719" instrument_node="">serious animal welfare problems within the horseracing industry</span></a><span data-dcnode-id="717" instrument_node="">. Others include a lack of transparency, risk of injury, use of painful devices such as whips, use of banned substances, racing immature horses, jumps racing and inadequate regulation of the industry overall.</span></span><span data-dcnode-id="714" style="line-height: 107%;"><o:p data-dcnode-id="715"></o:p></span></p><span data-dcnode-id="712" instrument_node="">
</span><p class="MsoNormal" data-dcnode-id="700" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="701" style="line-height: 107%;"><span data-dcnode-id="711" instrument_node="">This year our top priority is to see the introduction of a national horse register. Many are surprised to know that there is currently no registration system for horses in Australia. Introducing a national horse register would help to track all horses and their ownership throughout their entire lifecycle. Lifetime traceability would be very useful for tracking and monitoring the welfare of racehorses, rather just tracking them to their first post-racing home.  Horses can live for thirty years and may change hands multiple times throughout their lifetime, so lifetime traceability is vital for understanding how many horses are bred and where they end up. </span><br data-dcnode-id="710"><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node="">
</span><span data-dcnode-id="706" style="line-height: 107%;"><span data-dcnode-id="707" instrument_node="">Our goal is to see significant improvements in animal welfare across the racing codes and this year we plan to do this by:</span></span><span data-dcnode-id="703" style="line-height: 107%;"><span data-dcnode-id="704" style="font-variant-numeric: normal; font-variant-east-asian: normal; font-stretch: normal; line-height: normal;"><span data-dcnode-id="705" instrument_node="">&nbsp;</span></span></span><br data-dcnode-id="702"></span></p><ul data-dcnode-id="687"><li class="MsoNormal" data-dcnode-id="696" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="698" style="line-height: 107%;"><span data-dcnode-id="699" style="font-variant-numeric: normal; font-variant-east-asian: normal; font-stretch: normal; line-height: normal;"></span></span><span data-dcnode-id="697" instrument_node="">Continuing to advocate for Government
commitment to a national horse traceability register&nbsp;</span></li><li class="MsoNormal" data-dcnode-id="694" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="695" instrument_node="">Encouraging the Victorian Government
to commit to developing a mandatory code of practice for horse racing </span></li><li class="MsoNormal" data-dcnode-id="692" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="693" instrument_node="">Influencing the peak racing
bodies to develop robust equine welfare strategies</span></li><li class="MsoNormal" data-dcnode-id="690" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="691" instrument_node="">Continuing to advocate for an
end to the use&nbsp;of whips in racing</span></li><li class="MsoNormal" data-dcnode-id="688" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"><span data-dcnode-id="689" instrument_node="">Continuing to advocate for ongoing
improvements to greyhound welfare.</span></li></ul><span data-dcnode-id="686" instrument_node="">
</span><span data-dcnode-id="680" style="line-height: 107%;"><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/article-categories/policies-animals-in-sport-entertainment-performance-recreation-and-work/" style="color: rgb(0, 112, 192);"><span data-dcnode-id="685" instrument_node="">Read more about animal welfare issues in racing
on RSPCA’s Knowledgebase.</span><br data-dcnode-id="684"><br data-dcnode-id="683"><br data-dcnode-id="682"></a></span><h2 data-dcnode-id="675"><span data-dcnode-id="679" instrument_node=""> </span><o:p data-dcnode-id="678"></o:p><a data-dcnode-id="676" id="anchor_3"><span data-dcnode-id="677" instrument_node="">Justified,
effective and humane - management of wild animals</span></a></h2><span data-dcnode-id="674" instrument_node="">If you’re an animal in Victoria, the way you are treated can vary vastly depending on how you are classified under the law. Wild animals can be classified in several ways, while we often think of protected native wildlife but there are also countless species classified as pests, unprotected or game. Whatever category an animal falls into, at RSPCA Victoria we believe that any management of wild animals should be justified, effective and humane.   Overabundance of certain species is a problem that we believe needs to be proactively managed. Overabundance of certain species can negatively affect ecosystems, natural habitats and can result in the suffering of animals. For example, we are increasingly seeing hungry deer encroaching on Melbourne’s urban fringes searching for food and kangaroos being hit by cars more frequently as the urban fringe expands further north. 

 Unfortunately, many of the methods used to control animal populations are only implemented when a population has reached crisis point and control methods can vary in their humaneness. RSPCA Victoria supports proactive population management for animal welfare reasons. It is crucial that management plans are developed early on and that any control methods are adequately considered and justified, appropriate targets are put in place and that there is ongoing evaluation to ensure that the impacts of the animals being controlled are effective. This year we’ll be advocating for more humane management of wildlife and pest animals and we’ve identified a few specific opportunities already:</span><ul data-dcnode-id="650"><li class="MsoNormal" data-dcnode-id="667"><span class="eop" data-dcnode-id="672"><span data-dcnode-id="673" style="line-height: 107%;"></span></span><span class="normaltextrun" data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">We’ll advocate for key changes to the Victorian
Government’s Kangaroo Harvest Management Plan&nbsp;</span></span><span class="eop" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">&nbsp;</span></span></li><li class="MsoNormal" data-dcnode-id="661"><span class="eop" data-dcnode-id="666"></span><span class="normaltextrun" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">We’ll advocate for a robust, proactive and
humane Victorian Deer Management Strategy</span></span><span class="eop" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">&nbsp;</span></span></li><li class="MsoNormal" data-dcnode-id="655"><span class="eop" data-dcnode-id="660"></span><span class="normaltextrun" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">We’ll advocate for development of feral cat management
code of practice&nbsp;</span></span><span class="eop" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">&nbsp;</span></span></li><li class="MsoNormal" data-dcnode-id="651"><span class="eop" data-dcnode-id="654"></span><span class="normaltextrun" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">We’ll work to ensure that a clear feral cat
definition is included in the Code of Practice for the Management of Dogs and
Cats in Shelters and Pounds.&nbsp;</span></span></li></ul><span class="eop" data-dcnode-id="642"><span data-dcnode-id="643" style="font-size: 11pt; line-height: 107%; font-family: Calibri, sans-serif;"><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/knowledge-base/rspca-policy-e02-management-of-wild-animals/"><span data-dcnode-id="648" style="color: rgb(0, 112, 192); font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="649" instrument_node="">Read more about RSPCA’s policies on humanepopulation control here</span></span></a><span data-dcnode-id="645" style="color: rgb(0, 112, 192); font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="646" instrument_node="">.&nbsp;&nbsp;</span></span><br data-dcnode-id="644"></span></span><br data-dcnode-id="641"><h2 data-dcnode-id="638"><a data-dcnode-id="639" id="anchor_4"><span data-dcnode-id="640" instrument_node="">A good life
and a humane death - improving the lives of Australia’s 500 million farm
animals</span></a></h2><b data-dcnode-id="635"><span data-dcnode-id="636" style="font-size: 12pt; background-color: white;"><o:p data-dcnode-id="637"></o:p></span></b><h3 data-dcnode-id="632" style="margin-top:0cm;margin-right:0cm;margin-bottom:12.0pt;margin-left:
0cm;vertical-align:baseline"><span class="normaltextrun" data-dcnode-id="633"><span data-dcnode-id="634" style="background-image: initial; background-position: initial; background-size: initial; background-repeat: initial; background-attachment: initial; background-origin: initial; background-clip: initial;"></span></span></h3><span data-dcnode-id="631" instrument_node="">At RSPCA Victoria we believe that engaging directly and building constructive relationships with farm animal enterprise is vital to ensure incremental improvements are made to farm animal welfare.  </span><br data-dcnode-id="630"><br data-dcnode-id="629"><span data-dcnode-id="628" instrument_node="">We work with a range of stakeholders in the livestock sector to improve the standards and conditions for farm animal welfare. Around Australia, RSPCA’s work with farmers includes supporting research and development, engaging with producers through the RSPCA Approved Farming Scheme (run by RSPCA Australia), and actively contributing to the development of Standards and Guidelines for different livestock industries.</span><br data-dcnode-id="627"><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">There are some current issues that present real opportunities to improve the welfare of farm animals. These include the ongoing review of the national poultry standards, recent exposés on treatment of animals at knackeries and abattoirs and the recently released recommendations from the Inquiry into the Impact of Animal Rights Activism on Victorian Agriculture. They all provide valuable opportunities to liaise with decision makers and industry groups to advocate for improvements to farming standards and to improve transparency around farm practices. We believe that increasing transparency around farm practices is vital for building public confidence and accountability within the sector. 

</span><br data-dcnode-id="624"><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">This year we’ll be specifically
focused on:</span><span data-dcnode-id="620" style="font-variant-numeric: normal; font-variant-east-asian: normal; font-stretch: normal; line-height: normal;"><span data-dcnode-id="621" instrument_node="">&nbsp;</span></span><ul data-dcnode-id="600"><li data-dcnode-id="616"><span data-dcnode-id="619" style="font-variant-numeric: normal; font-variant-east-asian: normal; font-stretch: normal; line-height: normal;"></span><span class="normaltextrun" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Encouraging farmers to provide increased
transparency regarding their farming practices</span></span></li><li data-dcnode-id="610"><span class="normaltextrun" data-dcnode-id="615"></span><span class="normaltextrun" data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Continuing to advocate for the Victorian Government
to commit to a phase out of conventional (battery) cages</span></span><span class="eop" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">&nbsp;</span></span></li><li data-dcnode-id="604"><span class="eop" data-dcnode-id="609"></span><span class="normaltextrun" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Advocating for improved animal welfare at
both domestic and export abattoirs</span></span><span class="eop" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">&nbsp;</span></span></li><li data-dcnode-id="601"><span class="eop" data-dcnode-id="603"></span><span data-dcnode-id="602" instrument_node="">Continuing to develop constructive working
relationships with key industry bodies.</span></li></ul><p data-dcnode-id="594"><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/article-categories/policies-farm-animals/"><span data-dcnode-id="598" style="color: rgb(0, 112, 192);"><span data-dcnode-id="599" instrument_node="">Read more about RSPCA’s work to improve the welfare of farm animals here</span></span></a><span data-dcnode-id="595" style="color: rgb(0, 112, 192);"><span data-dcnode-id="596" instrument_node="">.&nbsp;</span></span></p><b data-dcnode-id="588"><br data-dcnode-id="593"><h2 data-dcnode-id="589"><a data-dcnode-id="591" id="anchor_5"><span data-dcnode-id="592" instrument_node="">1986 was a great year…but it’s time to update
our animal welfare legislation</span></a><o:p data-dcnode-id="590"></o:p></h2></b><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Excitingly, the Victorian Government is currently undertaking an animal welfare legislation reform project as part of a promise made at the last state election. This involves updating Victoria’s animal welfare legislation to ensure that it is contemporary and in line with current scientific evidence of what is good animal welfare. 

</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">We are pleased to be able to provide valuable input into this prodigious government initiative to ensure new legislation incorporates key changes that RSPCA Victoria would like to see for better protections for all animals in Victoria. </span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">RSPCA Victoria has nearly 35 years of experience in enforcing the POCTAA and our Inspectorate receives the majority of animal cruelty complaints in the state. For this reason, we are uniquely positioned to make recommendations on what is needed in the new legislation.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">The current POCTAA presents several barriers to enforcement including lack of early intervention tools available for Inspectors, the use of non-enforceable Codes of Practice and the ability to prosecute only once a breach has been made. The current Act also includes little reference to promoting positive experiences for animals and does not explicitly acknowledge that animals are sentient.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">This year we’ll be working to ensure new legislation addresses these limitations and reflects contemporary understanding of animal welfare by incorporating concepts such as sentience and duty of care. </span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Sentience is most commonly defined as the ability to feel, perceive or experience subjectively. Importantly, this includes not only negative feelings such as pain or distress, but also positive emotions such as comfort and happiness. A significant body of research from a range of scientific disciplines supports that all vertebrates, including fish, and certain classes of invertebrates, namely cephalopods (i.e. squid and octopi) and decapods (i.e. crabs and lobsters), are sentient. Contemporary legislation should reflect this scientific evidence. </span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">We’d also like to see duty of care incorporated into the new legislation. Duty of care is the legal obligation of any person in charge of an animal to provide the prescribed level of care in a way that is reasonable and appropriate. Failure to provide this care is in itself would be an offence and could be investigated before harm has been caused. This would allow RSPCA Victoria Inspectors and other authorised officers to take a more preventative approach to animal welfare. </span></p><span data-dcnode-id="567" instrument_node="">
