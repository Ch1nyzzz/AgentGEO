We believe these are the current “big ticket” items for animals in this state. We chose these goals based on the scale and scope of each issue as well as the potential to achieve change for the animals affected. By setting ourselves six focused goals we hope to achieve some real wins for animals. We’ll advocate in our usual RSPCA Victoria way – using an evidence-based, ethical approach and ensuring we build direct relationships with policy decision-makers, industry and those who influence animal welfare policy and management. </span><br data-dcnode-id="3636"><br data-dcnode-id="3635"><h4 data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Newsletter #8 March 15th 2022</span></h4><h2 data-dcnode-id="3630"><a data-dcnode-id="3631" id="anchor_8a"><span data-dcnode-id="3632" instrument_node="">The most important participant: A framework for thoroughbred welfare&nbsp;</span></a></h2><p data-dcnode-id="3616"><span class="TextRun SCXW19523757 BCX0" data-contrast="auto" data-dcnode-id="3628" lang="EN-AU" style="color: windowtext; white-space: pre-wrap; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 17.2667px; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span data-dcnode-id="3629" instrument_node="">The Thoroughbred Aftercare Welfare Working Group</span></span><span class="TextRun SCXW19523757 BCX0" data-contrast="none" data-dcnode-id="3626" lang="EN-AU" style="white-space: pre-wrap; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(58, 58, 58); line-height: 17.2667px; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span data-dcnode-id="3627" instrument_node=""> </span></span><span class="TextRun SCXW19523757 BCX0" data-contrast="auto" data-dcnode-id="3619" lang="EN-AU" style="color: windowtext; white-space: pre-wrap; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: </span></span></p></div><h2 data-dcnode-id="3559"><a data-dcnode-id="3560" id="anchor_8b"><span data-dcnode-id="3561" instrument_node="">Taskforce on Rehoming Pets&nbsp;</span></a></h2><div class="OutlineElement Ltr SCXW74292725 BCX0" data-dcnode-id="3553" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; font-family: &quot;Segoe UI&quot;, &quot;Segoe UI Web&quot;, Arial, Verdana, sans-serif; font-size: 12px; background-color: rgb(255, 255, 255);"><p class="Paragraph SCXW74292725 BCX0" data-dcnode-id="3554" paraeid="{90f2b1c8-475a-46b9-a42b-c53a4f4aaab0}{255}" paraid="945572639" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; white-space: pre-wrap; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span class="TextRun SCXW74292725 BCX0" data-contrast="auto" data-dcnode-id="3557" lang="EN-US" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 13px; line-height: 17.1333px; font-family: &quot;Trebuchet MS&quot;; font-variant-ligatures: none !important;" xml:lang="EN-US"><span data-dcnode-id="3558" instrument_node="">In January, the Taskforce on Rehoming Pets released their final report on how to improve and better support rehoming pathways for dogs and cats in Victoria. The recommendations are the result of an extensive consultation process. The Taskforce heard from a wide range of industry and community stakeholders – including RSPCA Victoria – to develop this report, which has been welcomed by the Minister for Agriculture, Mary-Anne Thomas.</span></span><span class="EOP SCXW74292725 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:257}" data-dcnode-id="3555" style="margin: 0px ial_MSFontService, sans-serif;"><span data-dcnode-id="3550" instrument_node="">&nbsp;</span></span></p></div><div class="OutlineElement Ltr SCXW74292725 BCX0" data-dcnode-id="3539" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; font-family: &quot;Segoe UI&quot;, &quot;Segoe UI Web&quot;, Arial, Verdana, sans-serif; font-size: 12px; background-color: rgb(255, 255, 255);"><p class="Paragraph SCXW74292725 BCX0" data-dcnode-id="3540" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{10}" paraid="50706092" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; white-space: pre-wrap; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span class="TextRun SCXW74292725 BCX0" data-contrast="auto" data-dcnode-id="3545" lang="EN-US" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 13px; line-height: 17.2667px; font-family: &quot;Trebuchet MS&quot;; font-variant-ligatures: none !important;" xml:lang="EN-US"><span data-dcnode-id="3546" instrument_node="">This final report makes 17 recommendations to support the welfare of dogs and cats requiring rehoming, including improvements to the regulatory framework for rehoming pets. The report recommends increased transparency in the movement of animals, better reporting of data and further grants to support the pet rehoming sector.</span></span><span class="TextRun SCXW74292725 BCX0" data-contrast="auto" data-dcnode-id="3543" lang="EN-GB" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 13px; line-height: 17.2667px; font-family: &quot;Trebuchet MS&quot;; font-variant-ligatures: none !import : &quot;Trebuchet MS&quot;; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 13px;"><span data-dcnode-id="3490" instrument_node="">We’re happy to share that the government will now consider the Taskforce’s recommendations to inform future reforms as part of its animal care and protection agenda</span></span><span class="NormalTextRun SCXW74292725 BCX0" data-dcnode-id="3487" style="font-family: &quot;Trebuchet MS&quot;; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 13px;"><span data-dcnode-id="3488" instrument_node=""> and we look forward to working with the government on the report’s recommendations</span></span><span data-dcnode-id="3486" instrument_node="">. You can read the full report </span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//agriculture.vic.gov.au/__data/assets/pdf_file/0003/834105/Taskforce-on-Rehoming-Pets-Final-Report-December-2021.pdf" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="3485" instrument_node="">here</span></a><span data-dcnode-id="3483" instrument_node="">.

</span><br data-dcnode-id="3482"><br data-dcnode-id="3481"><h2 data-dcnode-id="3468"><span class="TextRun SCXW69100351 BCX0" data-contrast="auto" data-dcnode-id="3477" lang="EN-US" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre-wrap; background-color: rgb(255, 255, 255); font-size: 20px; line-height: 17.2667px; font-variant-ligatures: none !important;" xml:lang="EN-US"><span class="NormalTextRun SCXW69100351 BCX0" data-dcnode-id="3478" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><a data-dcnode-id="3479" name="anchor_8c"><span data-dcnode-id="3480" instrument_node="">Duck</span></a></span></span><a data-dcnode-id="3469" name="anchor_8c"><span class="TextRun SCXW69100351 BCX0" data-contrast="auto" data-dcnode-id="3472" lang="EN-US" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre-wrap; background-color: rgb(255, 255, 255); font-size: 20px; line-height: 17.2667px; font-variant-ligatures: none !important;" xml:lang="EN-US"><span class="NormalTextRun SCXW69100351 BCX0" data-dcnode-id="3475" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3476" instrument_node="">s will unnecessarily suffer as hunting season proceeds</span></span><span class="NormalTextRun SCXW69100351 BCX0" data-dcnode-id="3473" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3474" instrument_node="">&nbsp;</span></span></span><span class="EOP SCXW69100351 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3470" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre-wrap; background-color: rgb(255, 255, 255); font-size: 20px; line-height: 17.2667px;"><span data-dcnode-id="3471" instrument_node="">&nbsp;</span></span></a></h2><span data-dcnode-id="3467" instrument_node="">
</span></div><div class="OutlineElement Ltr SCXW256281709 BCX0" data-dcnode-id="3463" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; font-family: &quot;Segoe UI&quot;, &quot;Segoe UI Web&quot;, Arial, Verdana, sans-serif; font-size: 12px; background-color: rgb(255, 255, 255);"><p aria-level="1" class="Paragraph SCXW256281709 BCX0" data-dcnode-id="3464" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{122}" paraid="242946433" role="heading" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; white-space: pre-wrap; vertical-align: baseline; font-kerning: none; background-color: transparent; color: rgb(47, 84, 150);"><span class="TextRun SCXW256281709 BCX0" data-contrast="none" data-dcnode-id="3465" lang="EN-US" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(0, 0, 0); font-size: 13px; line-height: 20.5042px; font-family: &quot;Trebuchet MS&quot;; font-variant-ligatures: none !important;" xml:lang="EN-US"></span></p></div><div bcx0"="" data-dcnode-id="3457" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3458" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{122}" paraid="242946433" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3461" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3462" instrument_node="">RSPCA Victoria was dismayed by the announcement that the 2022 duck hunting season will proceed this month, causing injury, pain and suffering to thousands of native ducks. The announcement of a full-length season and a bag limit allowing hunters to shoot four birds per day will further impact declining waterbird populations.&nbsp;</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3459" scxw256281709=""><span data-dcnode-id="3460" instrument_node="">&nbsp;
</span></span></p></div><div bcx0"="" data-dcnode-id="3453" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3454" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{130}" paraid="278196576" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3455" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3456" instrument_node="">We were disappointed in the Victorian Government’s decision to allow the 2022 duck hunting season to take place, despite animal welfare concerns, declining waterbird abundance and lack of support within the community for duck hunting and are urging a review of the decision.</span></span></p></div><div bcx0"="" data-dcnode-id="3447" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3448" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{138}" paraid="2052753238" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3451" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3452" instrument_node="">RSPCA is opposed to the recreational hunting of any animal for sport due to the inherent and unnecessary injury, pain, suffering, distress or death caused to the animals involved.</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3449" scxw256281709=""><span data-dcnode-id="3450" instrument_node="">&nbsp;

</span></span></p></div><div bcx0"="" data-dcnode-id="3441" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3442" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{144}" paraid="245689109" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3445" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3446" instrument_node="">Duck hunting results in distress, fear, pain and suffering of tens of thousands of birds each year. Using a shotgun result in a substantial number of ducks being wounded, with some individuals surviving, while others will suffer before eventually dying.</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3443" scxw256281709=""><span data-dcnode-id="3444" instrument_node="">&nbsp;</span></span></p></div><div bcx0"="" data-dcnode-id="3435" ltr="" scxw256281709=""><p bcx0"="" data-dcnode-id="3436" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{154}" paraid="1427404538" scxw256281709=""><span bcx0"="" data-contrast="auto" data-dcnode-id="3439" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3440" instrument_node="">Evidence of the inevitable pain and suffering of tens of thousands of ducks during a duck hunting season is indisputable.</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3437" scxw256281709=""><span data-dcnode-id="3438" instrument_node="">&nbsp;

</span></span></p></div><div bcx0"="" data-dcnode-id="3429" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3430" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{160}" paraid="1986335162" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3433" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3434" instrument_node="">Our submission to the Game Management Authority (GMA) called for a cancellation of the 2022 duck hunting season based on animal welfare concerns and consistent evidence that waterbird numbers are in decline.</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3431" scxw256281709=""><span data-dcnode-id="3432" instrument_node="">&nbsp;</span></span></p></div><div bcx0"="" data-dcnode-id="3418" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3419" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{166}" paraid="1618984877" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3422" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span bcx0"="" data-ccp-parastyle="heading 1" data-dcnode-id="3427" scxw256281709=""><span data-dcnode-id="3428" instrument_node="">There is also community concern about duck hunting. Recent research conducted by market research firm Kantar showed that 68% of Victorians agree that duck hunting should be banned, clearly illustrating that </span></span><span advancedproofingissuev2="" bcx0"="" data-ccp-parastyle="heading 1" data-dcnode-id="3425" scxw256281709=""><span data-dcnode-id="3426" instrument_node="">the majority of</span></span><span bcx0"="" data-ccp-parastyle="heading 1" data-dcnode-id="3423" scxw256281709=""><span data-dcnode-id="3424" instrument_node=""> the Victorian community is not supportive of hunting ducks for sport.
&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3420" scxw256281709=""><span data-dcnode-id="3421" instrument_node="">&nbsp;</span></span></p></div><div bcx0"="" data-dcnode-id="3412" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3413" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{172}" paraid="1073509475" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3416" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3417" instrument_node="">RSPCA Victoria strongly recommended cancelling the 2022 duck hunting season due to:</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3414" scxw256281709=""><span data-dcnode-id="3415" instrument_node="">&nbsp;</span></span></p></div><div bcx0"="" data-dcnode-id="3406" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3407" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{178}" paraid="1242180827" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3410" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3411" instrument_node="">1.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; inevitable suffering of native ducks.</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3408" scxw256281709=""><span data-dcnode-id="3409" instrument_node="">&nbsp;</span></span></p></div><div bcx0"="" data-dcnode-id="3400" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3401" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{184}" paraid="11040260" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3404" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3405" instrument_node="">2.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; long-term declines in game bird species abundance having not recovered</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3402" scxw256281709=""><span data-dcnode-id="3403" instrument_node="">&nbsp;</span></span></p></div><div bcx0"="" data-dcnode-id="3394" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3395" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{190}" paraid="860537709" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3398" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3399" instrument_node="">3.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; climate outlook data and predicted rainfall unlikely to relieve long-term deficits</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3396" scxw256281709=""><span data-dcnode-id="3397" instrument_node="">&nbsp;</span></span></p></div><div bcx0"="" data-dcnode-id="3386" ltr="" scxw256281709=""><p aria-level="1" bcx0"="" data-dcnode-id="3387" paraeid="{15b39850-ecd9-480a-afa0-b12c87960ee1}{196}" paraid="1561300708" role="heading" scxw256281709=""><span bcx0"="" data-contrast="none" data-dcnode-id="3392" lang="EN-US" scxw256281709="" xml:lang="EN-US"><span data-dcnode-id="3393" instrument_node="">4.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; community concern for the welfare of native ducks.</span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3388" scxw256281709=""><span data-dcnode-id="3391" instrument_node="">&nbsp;</span><br data-dcnode-id="3390"><br data-dcnode-id="3389"></span></p></div><div class="OutlineElement Ltr SCXW256281709 BCX0" data-dcnode-id /span></span><span class="NormalTextRun SCXW205895522 BCX0" data-dcnode-id="3319" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3320" instrument_node="">work together</span></span><span class="NormalTextRun SCXW205895522 BCX0" data-dcnode-id="3317" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3318" instrument_node=""> to improve the </span></span></span></span></span><span class="TextRun SCXW205895522 BCX0" data-contrast="none" data-dcnode-id="3309" lang="EN-AU" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 13px; line-height: 17.2667px; font-family: &quot;Trebuchet MS&quot;; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW205895522 BCX0" data-dcnode-id="3312" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3313" instrument_node="">welfare of carriage horses</span></span><span class="NormalTextRun SCXW205895522 BCX0" data-dcnode-id="3310" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3311" instrument_node="">.</span></span></span><span class="EOP SCXW205895522 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="3307" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 13px; line-height: 17.2667px; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="3308" instrument_node="">&nbsp;</span></span></p></div><div class="OutlineElement Ltr SCXW205895522 BCX0" data-dcnode-id="3287" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; font-size: 12px; background-color: rgb(255, 255, 255);"><span class="TextRun SCXW205895522 BCX0" data-contrast="none" data-dcnode-id="3300" lang="EN-AU" style="font-family: &quot;Trebuchet MS&quot;; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(0, 0, 0); font-size: 13px; line-height: 17.2667px; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW205895522 BCX0" data-ccp-parastyle="heading 1" data-dcnode-id="3303" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3304" instrument_node="">V</span></span><span class="NormalTextRun SCXW205895522 BCX0" data-ccp-parastyle="heading 1" data-dcnode-id="3301" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3302" instrument_node="">iew RSPCA’s Policy on working animals on </span></span></span><a class="Hyperlink SCXW205895522 BCX0" data-dcnode-id="3296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/knowledge-base/rspca-policy-c03-working-animals/" rel="noreferrer noopener" style="font-family: &quot;Segoe UI&quot;, &quot;Segoe UI Web&quot;, Arial, Verdana, sans-serif; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: inherit;" target="_blank"><span class="TextRun Underlined SCXW205895522 BCX0" data-contrast="none" data-dcnode-id="3297" lang="EN-AU" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(5, 99, 193); font-size: 13px; text-decoration-line: underline; line-height: 17.2667px; font-family: &quot;Trebuchet MS&quot;; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW205895522 BCX0" data-ccp-charstyle="Hyperlink" data-dcnode-id="3298" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"><span data-dcnode-id="3299" instrument_node="">RSPCA Knowledge Base</span></span></span></a><span class="TextRun SCXW205895522 BCX0" data-contrast="none" data-dcnode-id="3294" lang="EN-AU" style="font-family: &quot;Trebuchet MS&quot;; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(0, 0, 0); font-size: 13px; line-height: 17.2667px; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span data-dcnode-id="3295" instrument_node="">.</span></span><span data-dcnode-id="3293" instrument_node="">&nbsp;</span><br data-dcnode-id="3292"><br data-dcnode-id="3291"><br data-dcnode-id="3290"><br data-dcnode-id="3289"><h2 data-dcnode-id="3288"></h2></div></div><h4 data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">Newsletter #7 October 28th 2021</span></h4><h2 data-dcnode-id="3281"><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_7a"><span data-dcnode-id="3283" instrument_node="">MORE HAPPY REUNIONS</span></a></h2><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Under section 84D of the Domestic Animals Act 1994, currently veterinary practices and other animal shelters cannot lawfully reunite stray pets with their owners unless they have established an 84Y agreement with the local council.&nbsp;</span></p><span data-dcnode-id="3278" instrument_node="">Proposed changes to the legislation mean that all vets and shelters will be able to immediately contact an owner about their lost pet, avoiding the need to send the animal to the local council pound.&nbsp;</span><br data-dcnode-id="3277"><span data-dcnode-id="3276" instrument_node="">RSPCA Victoria has significant experience operating pounds and shelters and reuniting pets with their owners and supports reunification pathways that see dogs and cats returned to owners directly. RSPCA Victoria currently has 84Y agreements in place with local councils across Victoria to enable it to directly reunite owners and lost pets.&nbsp;</span><br data-dcnode-id="3275"><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">Prior to the 2018 state election, RSPCA Victoria advocated for lost pets to be directly reunited with their owners and in August 2020, provided feedback on the Reuniting Lost Pets review.&nbsp;&nbsp;</span><br data-dcnode-id="3272"><br data-dcnode-id="3271"><span data-dcnode-id="3270" instrument_node="">The Victorian Government acknowledged that the Bill’s reforms are important for Victorians, as we have a high rate of pet ownership; an average of 665,000 dogs and 215,000 cats are registered with councils each year.&nbsp;</span><br data-dcnode-id="3269"><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">Currently more than 53,000 stray animals are impounded in Victoria each year. Of these, approximately 21,600 are reclaimed (17,885 dogs and 3,734 cats). Assuming that the proportion of reclaimed animals that are registered is similar to the overall rate of registration within the community (approximately 68% of dogs and 21% of cats), we can conclude that as many as 12,174 registered dogs and 791 registered cats are being needlessly impounded each year.&nbsp;&nbsp;</span><br data-dcnode-id="3266"><br data-dcnode-id="3265"><span data-dcnode-id="3264" instrument_node="">We believe this change in legislation is a great outcome for pet owners in Victoria that will have a positive welfare impact for animals found wandering, while also lowering operational costs for local councils.&nbsp;</span><br data-dcnode-id="3263"><br data-dcnode-id="3262"><span data-dcnode-id="3261" instrument_node="">We encourage all pet owners to ensure their pets are microchipped to help lost pets find their way home quickly and safely.&nbsp;</span><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="3256"><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_7b"><span data-dcnode-id="3258" instrument_node="">HOW CLIMATE CHANGE IMPACTS ANIMAL WELFARE </span></a></h2><span data-dcnode-id="3255" instrument_node="">We believe that action is urgently needed to address the impacts of climate change on animals in Australia. Companion animals, animals in sport, farm animals and wildlife are at risk of being directly and indirectly affected by climate change across both land and water environments. Many animals have and will continue to suffer and die from the effects of climate change.&nbsp;</span><br data-dcnode-id="3254"><br data-dcnode-id="3253"><span data-dcnode-id="3252" instrument_node="">Our Climate Change Policy is:&nbsp;</span><br data-dcnode-id="3251"><ul data-dcnode-id="3241"><span data-dcnode-id="3250" instrument_node="">
</span><li data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">RSPCA Australia recognises the significant impact that climate change is having on the welfare of animals, whether living in the wild or in the care of humans.&nbsp;</span></li><br data-dcnode-id="3247"><li data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">RSPCA Australia considers that action is urgently needed to address the impacts of climate change in Australia to reduce the impacts on animals.&nbsp;</span></li><br data-dcnode-id="3244"><li data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">RSPCA Australia advocates for the consideration of animal welfare in the formation and adoption of national, state and industry climate policy and policies related to drought, fire, flood and other extreme weather events.&nbsp;</span></li></ul><span data-dcnode-id="3240" instrument_node="">&nbsp;</span><br data-dcnode-id="3239"><span data-dcnode-id="3238" instrument_node="">At RSPCA Victoria, we recently provided two submissions to the Victorian Government on the Natural Environment Climate Change Adaptation Action Plan 2022-2026 and the Primary Production Climate Change Adaptation Action Plan 2022-2026. </span><br data-dcnode-id="3237"><span data-dcnode-id="3236" instrument_node="">Our Natural Environment Climate Change Adaptation Action Plan 2022-2026 submission advocated for consideration to be given to animal welfare in the formation and adoption of state climate change planning and policy. Our recommendations were:&nbsp;</span><ol data-dcnode-id="3214"><br data-dcnode-id="3235"><li data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">The plan prioritises the impact of climate change on the welfare of Victorian wildlife species.&nbsp;&nbsp;</span></li><br data-dcnode-id="3232"><li data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">The plan includes management plans to conserve Indigenous Victorian wildlife species that will be impacted by climate change.&nbsp;&nbsp;</span></li><br data-dcnode-id="3229"><li data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">Ban recreational duck shooting to maximise ecosystem resilience and remove additional pressure on valuable wetland ecosystems and native waterbird populations.&nbsp;&nbsp;</span></li><br data-dcnode-id="3226"><li data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">The plan includes invasive pest species management programs that are aimed at reducing adverse impacts rather than simply reducing the number of animals.&nbsp;&nbsp;</span></li><br data-dcnode-id="3223"><li data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">The plan focuses on the research and development of more humane pest control methods to ensure good animal welfare for both target and non-target species.&nbsp;&nbsp;</span></li><br data-dcnode-id="3220"><li data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">The plan incorporates more information on the animal welfare impact of disease caused by climate change.&nbsp;&nbsp;</span></li><br data-dcnode-id="3217"><li data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">The plan considers the risks for animal welfare associated with bushfires and other natural disasters and incorporates preparedness strategies.&nbsp;</span></li></ol><span data-dcnode-id="3213" instrument_node="">In the Primary Production Climate Change Adaptation Action Plan 2022-2026 submission we outlined some of the ways in which climate change will continue to affect the welfare of farm animals and proposed some recommendations on how the Plan can better incorporate animal welfare considerations. These included:&nbsp;</span><ul data-dcnode-id="3206"><li data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">ensuring the plan includes information about adaptation of farm environments and operations to mitigate climate change impacts for animals</span></li><li data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">focusing on researching humane pest control methods to ensure good animal welfare for species being controlled&nbsp;</span></li><li data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">considering the risks for animal welfare associated with bushfires and other natural disasters and incorporates preparedness strategies.&nbsp;</span></li></ul><span data-dcnode-id="3205" instrument_node="">We know that climate change has serious implications for the welfare of all animals – and we’re seeing an increase in concerns from the community about the impact of climate change on animals in Australia.&nbsp;</span><br data-dcnode-id="3204"><br data-dcnode-id="3203"><span data-dcnode-id="3202" instrument_node="">Our aim is to increase awareness and drive action on climate change as an animal welfare issue. We can play a vital role in addressing animal welfare concerns relating to climate change by integrating these concerns into policy, operations, advocacy, communications and research.&nbsp;</span><p class="" data-dcnode-id="3194"><strong data-dcnode-id="3199"><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kb.rspca.org.au/knowledge-base/rspca-policy-gp6-climate-change/"><span data-dcnode-id="3201" instrument_node="">Read our policy and research report here</span></a></strong><span data-dcnode-id="3198" instrument_node="">.&nbsp;</span><br data-dcnode-id="3197"><br data-dcnode-id="3196"><br data-dcnode-id="3195"></p><h2 data-dcnode-id="3191"><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_7c"><span data-dcnode-id="3193" instrument_node="">PROTECTING PETS FROM FAMILY VIOLENCE </span></a></h2><span data-dcnode-id="3190" instrument_node="">Sadly, in many cases, our Inspectors are called to investigate animal cruelty where family violence is present. And we know that perpetrators of family violence use overt threats and actual harm against pets to control members of their family. </span><strong data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Family violence to be a significant animal welfare concern</span></strong><span data-dcnode-id="3187" instrument_node="">. The Victorian Government is set to review the Family Violence Protection Act 2008 (FVP Act), and we were grateful for the opportunity to submit nine recommendations to strengthen these protections to ensure all pets are better protected in situations of family violence.&nbsp;</span><br data-dcnode-id="3186"><br data-dcnode-id="3185"><span data-dcnode-id="3184" instrument_node="">In our recent submission to the Victoria Government, we made several recommendations about how the Victorian Government’s FVP Act could be strengthened. These included:&nbsp; &nbsp;</span><br data-dcnode-id="3183"><ul data-dcnode-id="3174"><li data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">clarifying how pets are affected by family violence in the Act&nbsp;</span></li><br data-dcnode-id="3180"><li data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">clarifying how pets are used to perpetrate family violence in the Act&nbsp;</span></li><br data-dcnode-id="3177"><li data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">enhancing formal training to authorised officers so more animals can be seized from family violence situations&nbsp;</span></li></ul><br data-dcnode-id="3173"><span data-dcnode-id="3172" instrument_node="">RSPCA Victoria also believes that ongoing, sustainable government funding for animal welfare organisations is essential so they can continue to support people and pets impacted by family violence. Funding and support for family violence organisations is also needed so they can provide refuge, housing and care to enable pets to remain with their owner when they have fled family violence.&nbsp;</span><br data-dcnode-id="3171"><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node="">We welcome the Victorian Government’s commitment to this work. Family violence is a serious animal welfare concern and the proposed reforms to the FVP Act will explicitly recognise how pets are impacted by family violence to ensure pets are better protected.&nbsp;</span><br data-dcnode-id="3168"><br data-dcnode-id="3167"><br data-dcnode-id="3166"><h2 data-dcnode-id="3163"><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_7d"><span data-dcnode-id="3165" instrument_node="">OUR PUSH FOR WELFARE GROOMING </span></a></h2><span data-dcnode-id="3162" style="background-color: white;"></span><span data-dcnode-id="3161" instrument_node="">Unlike humans, if animals can't get a haircut in lockdown, it can have serious welfare implications. As Melbourne extended its lockdown mid-2021, RSPCA Victoria – in partnership with the Australian Veterinary Association (Victorian division), Lort Smith Animal Hospital and Greencross – highlighted the animal welfare impacts of grooming services being closed due to COVID restrictions. Because for some breeds, grooming is an essential service.&nbsp;&nbsp;</span><br data-dcnode-id="3160"><br data-dcnode-id="3159"><span data-dcnode-id="3158" instrument_node="">With our partners, RSPCA Victoria provided a joint report on the animal welfare impacts of closing grooming services during lockdown. For many of our furry friends, there are vital health benefits to grooming, such as:&nbsp;&nbsp;</span><br data-dcnode-id="3157"><ul data-dcnode-id="3133"><li data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">preventing the formation of hairballs, which can cause intestinal blockages (cats and rabbits)&nbsp;</span></li><br data-dcnode-id="3154"><li data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">promoting a healthy, shiny coat&nbsp;</span></li><br data-dcnode-id="3151"><li data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">providing the opportunity to check for fleas, skin problems or lumps&nbsp;</span></li><br data-dcnode-id="3148"><li data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">preventing the formation of fur matts&nbsp;</span></li><br data-dcnode-id="3145"><li data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">enabling the removal of debris, burrs, twigs, leaves etc&nbsp;</span></li><br data-dcnode-id="3142"><li data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">preventing flystrike (rabbits)&nbsp;</span></li><br data-dcnode-id="3139"><li data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">mitigating the risks of overheating and dehydration&nbsp;</span></li><br data-dcnode-id="3136"><li data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">helping promote good skin health.&nbsp;</span></li></ul><span data-dcnode-id="3132" instrument_node="">As Melbourne entered lockdown in spring, we were concerned about the problems many animals would experience if animal grooming remained closed. For example, data from Greencross vets revealed an increase of 10% in skin-related conditions over a two-month period during lockdown this year compared with the same period last year.&nbsp;&nbsp;</span><br data-dcnode-id="3131"><br data-dcnode-id="3130"><span data-dcnode-id="3129" instrument_node="">Thankfully, welfare grooming was introduced in September! Together with our partners, we developed Welfare Grooming Guidelines to help pet owners and groomers make decisions on when a welfare groom is required. This change in COVID restrictions recognised that welfare grooming is a necessity for some domestic pets due to their coat or condition and that failure to groom these dogs can result in serious welfare and health problems.&nbsp;</span><br data-dcnode-id="3128"><br data-dcnode-id="3127"><span data-dcnode-id="3126" instrument_node="">Our hope is that once Victoria reaches the 80% vaccinated target, pet grooming will reopen as usual – and we’re sure there are many pups out there ready to get the pampering and grooming they deserve!</span><div data-dcnode-id="3125"></div><br data-dcnode-id="3124"><p data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">&nbsp;</span></p><h1 class="null" data-dcnode-id="3120" style="margin-top: 0px; margin-bottom: 0px; padding: 0px; color: rgb(0, 147, 208); font-family: &quot;Trebuchet MS&quot;, &quot;Lucida Grande&quot;, &quot;Lucida Sans Unicode&quot;, &quot;Lucida Sans&quot;, Tahoma, sans-serif; font-size: 24px; line-height: 24px; background-color: rgb(255, 255, 255);"><span data-dcnode-id="3121" instrument_node="">Online forum – Shaping Victoria’s new animal welfare legislation</span></h1><span data-dcnode-id="2591" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2592" style="font-size: 13px;"><span data-dcnode-id="3119" instrument_node="">On Thursday 30 July 2021, we held a webinar where our CEO and Head of Prevention&nbsp;discuss&nbsp;</span><span data-dcnode-id="3117" style="color: rgb(3, 3, 3); font-family: &quot;Trebuchet MS&quot;; font-size: 13px; letter-spacing: 0.2px; white-space: pre-wrap; background-color: rgb(249, 249, 249);"><span data-dcnode-id="3118" instrument_node="">our six new advocacy goals, our latest community pet program in Mildura and a do deep dive into the biggest animal welfare issues in Victoria during this live Q&amp;A session.</span></span><span data-dcnode-id="3116" instrument_node="">. This event was recorded and you can view it via the window below...</span><br data-dcnode-id="3115"><br data-dcnode-id="3114"><br data-dcnode-id="3113"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="2594" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=h
