href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2618" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="2616" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="2611"><use class="ytp-svg-shadow" data-dcnode-id="2613" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2614" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="2612" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=15QeVS2nU5M" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><br data-dcnode-id="2593"></span></span><span data-dcnode-id="2590" style="color: rgb(32, 32, 32); font-family: &quot;Trebuchet MS&quot;; font-size: 16px; background-color: rgb(255, 255, 255);"></span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="2587"></h4><h4 data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Newsletter #6 July 16th 2021</span></h4><h2 data-dcnode-id="2582"><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_6a"><span data-dcnode-id="2584" instrument_node="">Advocacy: our goals this year</span></a></h2><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">RSPCA Victoria’s advocacy goals for 2021-22 aim to improve the welfare of wildlife, domestic and farmed animals. Here’s what they are:</span></p><h3 data-dcnode-id="2575"><span data-dcnode-id="2579" instrument_node="">1.</span><span data-dcnode-id="2577" style="white-space:pre"><span data-dcnode-id="2578" instrument_node=""> </span></span><span data-dcnode-id="2576" instrument_node="">End duck shooting in Victoria</span></h3><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Recreational duck shooting continues to be legal in Victoria, despite being banned in most Australian states and territories. An open season usually occurs between March and June each year – this year Victoria had a season of around 20 days, despite our recommendation that it be cancelled outright due to the unnecessary fear, pain, suffering injury and death hunting inflicts on thousands of native waterbirds each year. We’ve long been opposed to duck shooting and we’re disappointed that it continues in Victoria. While there have been some positive indications that change may be coming, we’d like to see a definite move to ban duck shooting this year.&nbsp;&nbsp;</span></p><h3 data-dcnode-id="2568"><span data-dcnode-id="2572" instrument_node="">2.</span><span data-dcnode-id="2570" style="white-space:pre"><span data-dcnode-id="2571" instrument_node=""> </span></span><span data-dcnode-id="2569" instrument_node="">Ban battery cages in Victoria</span></h3><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">In Australia more than 10 million egg laying hens are confined to barren battery cages, despite being banned in many countries including the UK. At RSPCA we believe battery cages are one of the biggest animal welfare problems in Australia right now because the evidence shows hens suffer from poor welfare throughout their lives in these housing systems. We are strongly opposed to battery cages and believe their use must be phased out. They must be replaced by housing that better meets the behavioural and social needs of hens and improves their welfare. This year – together with our RSPCA colleagues around the country – we will be focusing our efforts on advocating for an end to battery cages in the egg industry, once and for all.&nbsp;</span></p><h3 data-dcnode-id="2561"><span data-dcnode-id="2565" instrument_node="">3.</span><span data-dcnode-id="2563" style="white-space:pre"><span data-dcnode-id="2564" instrument_node=""> </span></span><span data-dcnode-id="2562" instrument_node="">Significant welfare improvements across the three racing codes</span></h3><p data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">There are inherent welfare issues in horse and greyhound racing. To ensure the welfare of racing animals continues to improve, we have worked hard to develop constructive relationships with the peak bodies for the three racing codes in Victoria. We continue to be concerned by the ongoing use of whips in horse racing, wastage, injuries, fatalities and outcomes for animals after their racing career has ended. We’re advocating for further reform, accountability and transparency to support better welfare for all racing animals.&nbsp;</span></p><h3 data-dcnode-id="2554"><span data-dcnode-id="2558" instrument_node="">4.</span><span data-dcnode-id="2556" style="white-space:pre"><span data-dcnode-id="2557" instrument_node=""> </span></span><span data-dcnode-id="2555" instrument_node="">All owned and semi-owned domestic cats in Victoria are desexed</span></h3><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">There are an estimated 3.3 million cats in Australia; cats are the second most popular pet and 29% of households have one. Unfortunately, at least 30% of owned cats are not desexed before six months of age, resulting in unplanned litters from young, sexually mature female cats prior to desexing. Unplanned litters contribute to the cat overpopulation problem, which leads to significant welfare issues for cats. Unplanned litters also impact Victoria’s pound and shelter system, the broader community and the environment. Desexing is key to reducing our overpopulation of cats and improving cat welfare. This year, we’ve set ourselves the ambitious goal of desexing all owned and semi-owned cats in Victoria. We’ll advocate for this, and we’ll also support this goal in practice by providing low cost desexing clinics.</span></p><h3 data-dcnode-id="2547"><span data-dcnode-id="2551" instrument_node="">5.</span><span data-dcnode-id="2549" style="white-space:pre"><span data-dcnode-id="2550" instrument_node=""> </span></span><span data-dcnode-id="2548" instrument_node="">Wildlife legislation reform in Victoria</span></h3><p data-dcnode-id="2542"><span data-dcnode-id="2546" instrument_node="">The Wildlife Act 1975 sets the rules around how people interact with wildlife in Victoria. It hasn’t been reviewed since it became law more than 45 years ago. Since then, community values and expectations around wildlife have changed significantly. In May 2020, the Minister for Energy, Environment and Climate Change announced a comprehensive review of the Act. We’re </span><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//https//rspcavic.org/documents/Advocacy/RSPCA%2520Victoria%2520Wildlife%2520Act%2520Submission.pdf"><span data-dcnode-id="2545" instrument_node="">recommending significant changes</span></a><span data-dcnode-id="2543" instrument_node=""> to see better protections for wildlife under the Act.&nbsp;</span></p><h3 data-dcnode-id="2537"><span data-dcnode-id="2541" instrument_node="">6.</span><span data-dcnode-id="2539" style="white-space:pre"><span data-dcnode-id="2540" instrument_node=""> </span></span><span data-dcnode-id="2538" instrument_node="">Animal Welfare Legislation Reform in Victoria</span></h3><p data-dcnode-id="2533"><span data-dcnode-id="2536" instrument_node="">Animal welfare legislation in Victoria no longer meets scientific understandings of good animal welfare nor community expectations. The state government is currently undertaking an animal welfare reform project in Victoria as part of an election promise and its Animal Welfare Action Plan. This will result in draft contemporary animal welfare legislation to replace the Prevention of Cruelty to Animals Act 1986 (POCTA Act). RSPCA Victoria has provided input about the key changes that we would like to see to ensure better protections for all animals in Victoria.</span><br data-dcnode-id="2535"><br data-dcnode-id="2534"></p><h2 data-dcnode-id="2530"><a data-dcnode-id="2531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_6b"><span data-dcnode-id="2532" instrument_node="">Time to end battery cages</span></a></h2><span data-dcnode-id="2528" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2529" instrument_node="">Around half of the layer hens in Australia are confined to battery cages – small, barren wire cages about 40cm tall that typically house four to seven hens. The evidence is clear that battery cages result in poor welfare – hens are constantly standing on a wire floor, their movement is restricted, they have no perches, and they can’t exercise or express normal behaviour such as stretching or flapping their wings. As a result, hens suffer from high rates of disuse osteoporosis, fatty liver disease and bone breakage, along with chronic stress and frustration.</span></span><p class="" data-dcnode-id="2525"><span data-dcnode-id="2526" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2527" instrument_node="">The mental and physical problems experienced by hens in battery cages are caused by the cage itself and cannot be improved by good management practices. Put simply, good welfare is not possible for hens in battery cages.</span></span></p><span data-dcnode-id="2524" instrument_node=""> </span><p class="" data-dcnode-id="2521"><span data-dcnode-id="2522" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2523" instrument_node="">For this reason, battery cages have been banned for many years in the UK and are now banned in New Zealand. Unfortunately, they are still being used in Australia - but this year presents a chance for positive change. Australia’s Animal Welfare Standards and Guidelines for Poultry are under review and RSPCA Victoria – together with RSPCA colleagues around the country – is advocating for a phase-out of battery cages to be included in the new standards.</span></span></p><span data-dcnode-id="2520" instrument_node=""> </span><p class="" data-dcnode-id="2517"><span data-dcnode-id="2518" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2519" instrument_node="">It may be surprising to hear that around half of Australia’s eggs come from hens in battery cages. While most Australian consumers now buy cage-free carton eggs from supermarket shelves, the cage eggs tend to go into food services (cafes and restaurants) or are used as ingredients in packaged and processed foods.</span></span></p><span data-dcnode-id="2516" instrument_node=""> </span><p class="" data-dcnode-id="2513"><span data-dcnode-id="2514" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2515" instrument_node="">Nationally, the RSPCA has been advocating for an end to battery cages for 40 years. We’re excited that the moment has now arrived where positive change may occur. It’s a chance for Australia to come in line with other progressive nations and ensure millions of layer hens have better lives.</span></span></p><span data-dcnode-id="2512" instrument_node=""> </span><p class="" data-dcnode-id="2502"><span data-dcnode-id="2510" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2511" instrument_node="">In Victoria we are advocating directly to the Minister for Agriculture to try to ensure a phase out of battery cages in the new poultry standards. Nationally, the RSPCA is running a digital advertising campaign to let Australians know that 2021 is a big opportunity for change. Victorians who want to support our advocacy efforts can find out more </span></span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rspca.org.au/take-action/layer-hens"><span data-dcnode-id="2508" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2509" instrument_node="">here</span></span></a><span data-dcnode-id="2503" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2506" instrument_node="">. </span><br data-dcnode-id="2505"><br data-dcnode-id="2504"></span></p><h2 data-dcnode-id="2499"><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_6c"><span data-dcnode-id="2501" instrument_node="">Taskforce on rehoming pets </span></a></h2><span data-dcnode-id="2497" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2498" instrument_node="">The creation of the Taskforce is a welcome step toward improving rehoming outcomes for dogs and cats in Victoria. The Taskforce comprises three MPs and is chaired by the Member for Western Victoria, Andy Meddick of the Animal Justice Party. The members are currently consulting with groups across Victoria to consider:</span></span><ul data-dcnode-id="2484" style="list-style-type: disc;"><li data-dcnode-id="2494"><span data-dcnode-id="2495" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2496" instrument_node="">Ways to improve the welfare and survival rates of cats and dogs requiring rehoming while ensuring community safety.</span></span></li><li data-dcnode-id="2491"><span data-dcnode-id="2492" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2493" instrument_node="">A regulatory framework for rehoming pets in Victoria.</span></span></li><li data-dcnode-id="2488"><span data-dcnode-id="2489" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2490" instrument_node="">Ways to improve transparency around the movement of animals between shelters pounds, rescue groups and community foster networks.</span></span></li><li data-dcnode-id="2485"><span data-dcnode-id="2486" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2487" instrument_node="">Ways to improve information, advice and further develop ways for scientific organisations and animal ethics committees to support the rehoming of cats and dogs used in research and teaching.</span></span></li></ul><span data-dcnode-id="2483" instrument_node=""> </span><p class="" data-dcnode-id="2473"><span data-dcnode-id="2481" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2482" instrument_node="">Members of the Taskforce visited RSPCA Victoria’s Burwood East headquarters in June to consult with us. RSPCA Victoria has also made a </span></span><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rspcavic.org/documents/Advocacy/RSPCA%2520Victoria%2520submission%2520Taskforce%2520of%2520Rehoming%2520Pets%2520Safely.pdf"><span data-dcnode-id="2479" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2480" instrument_node="">written submission</span></span></a><span data-dcnode-id="2474" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2477" instrument_node=""> to the Taskforce – some of our recommendations are to</span><span data-dcnode-id="2475" style="color: black;"><span data-dcnode-id="2476" instrument_node="">:</span></span></span></p><span data-dcnode-id="2472" instrument_node=""> </span><ul data-dcnode-id="2444" style="list-style-type: disc;"><li data-dcnode-id="2469"><span data-dcnode-id="2470" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2471" instrument_node="">Introduce mandatory standards and regulations for all organisations that operate rescue and rehoming activities. Currently shelters and pounds are regulated in Victoria – we’d like to see this extended to animal rescue groups and community foster organisations to ensure consistent, quality care across the network.</span></span></li><li data-dcnode-id="2466"><span data-dcnode-id="2467" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2468" instrument_node="">Require community foster carer networks and rescue groups to be registered, whether as a domestic animal business or under a licensing scheme.</span></span></li><li data-dcnode-id="2463"><span data-dcnode-id="2464" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2465" instrument_node="">Make it mandatory for all organisations that rescue and rehome companion animals to publish reports on animal intake, animals rehomed, animals transferred to other rehoming organisations and animals euthanased.</span></span></li><li data-dcnode-id="2457"><span data-dcnode-id="2458" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2462" instrument_node="">Consider an entire review of the </span><i data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Code of Practice for the Management of Dogs and Cats in Shelters and Pounds</span></i><span data-dcnode-id="2459" instrument_node=""> (the Code) to reflect contemporary standards, best practice animal welfare and to include community foster carer networks and rescue groups.</span></span></li><li data-dcnode-id="2454"><span data-dcnode-id="2455" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2456" instrument_node="">Amend Section 2.4 of the Code to reduce the current eight-day quarantine period to three days.</span></span></li><li data-dcnode-id="2451"><span data-dcnode-id="2452" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2453" instrument_node="">Promote and support pre-pubertal desexing for cats to reduce numbers of unwanted litters.</span></span></li><li data-dcnode-id="2448"><span data-dcnode-id="2449" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2450" instrument_node="">Offer subsidised cat desexing programs to assist in reducing Victoria’s cat overpopulation.</span></span></li><li data-dcnode-id="2445"><span data-dcnode-id="2446" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2447" instrument_node="">Promote and support cat containment to owners’ properties at all times to reduce roaming cats and keep cats safe.</span></span></li></ul><span data-dcnode-id="2443" instrument_node=""> </span><p class="" data-dcnode-id="2436"><span data-dcnode-id="2441" style="color: black; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2442" instrument_node="">We look fo</span></span><span data-dcnode-id="2437" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2440" instrument_node="">rward to seeing what the Taskforce recommends to support better welfare for many cats and dogs in Victoria.</span><br data-dcnode-id="2439"><br data-dcnode-id="2438"></span></p><h2 data-dcnode-id="2433"><a data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_6d"><span data-dcnode-id="2435" instrument_node="">Wildlife Act review in full swing</span></a></h2><span data-dcnode-id="2431" style="background-color: white; font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="2432" instrument_node="">The&nbsp;</span></span><span data-dcnode-id="2426" style="font-size: 13px;"><i data-dcnode-id="2429" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2430" instrument_node="">Wildlife Act 1975&nbsp;</span></i><span data-dcnode-id="2427" style="background-color: white; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2428" instrument_node="">sets the rules around how people interact with wildlife in Victoria. It hasn’t been reviewed since it became law more than 45 years ago. Since then, community values and expectations around wildlife have changed significantly. It’s time for Victoria to enact more modern legislation to better protect our wildlife and promote their welfare.</span></span></span><p class="" data-dcnode-id="2417"><span data-dcnode-id="2419" style="font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rspcavic.org/documents/Advocacy/RSPCA%2520Victoria%2520Wildlife%2520Act%2520Submission.pdf"><span data-dcnode-id="2424" style="color: windowtext; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2425" instrument_node="">RSPCA Victoria </span></span><span data-dcnode-id="2422" style="background: white; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2423" instrument_node="">made a total of 16 recommendations</span></span></a><span data-dcnode-id="2420" instrument_node=""> to the Independent Expert Advisory Panel. Our recommendations are underpinned by our core belief that wherever human activities have the potential to negatively impact wild animals – whether directly or indirectly – we have a duty to ensure those activities cause as little injury, suffering or distress to animals as possible.</span></span><span data-dcnode-id="2418" style="background: white; font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"></span></p><span data-dcnode-id="2416" instrument_node=""> </span><p class="" data-dcnode-id="2413"><span data-dcnode-id="2414" style="font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="2415" instrument_node="">Some of our 16 recommendations included:</span></span></p><span data-dcnode-id="2412" instrument_node=""> </span><ul data-dcnode-id="2396" style="list-style-type: disc;"><li data-dcnode-id="2409"><span data-dcnode-id="2410" style="font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="2411" instrument_node="">Animal sentience should be recognised in the Wildlife Act, to determine appropriate use and management of wildlife and what should be prohibited</span></span></li><li data-dcnode-id="2406"><span data-dcnode-id="2407" style="font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="2408" instrument_node="">All sentient vertebrates and invertebrates indigenous to Victoria should be included taxa under the Wildlife Act</span></span></li><li data-dcnode-id="2403"><span data-dcnode-id="2404" style="font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="2405" instrument_node="">Indigenous animals should not be hunted and their protections should not be removed from the Wildlife Act</span></span></li><li data-dcnode-id="2400"><span data-dcnode-id="2401" style="font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="2402" instrument_node="">A scientific advisory committee should be formalised in the Act</span></span></li><li data-dcnode-id="2397"><span data-dcnode-id="2398" style="font-family: &quot;Trebuchet MS&quot;; font-size: 13px;"><span data-dcnode-id="2399" instrument_node="">Sentencing guidelines are needed to provide guidance on appropriate sentencing and ensure consistency of sentencing.</span></span></li></ul><span data-dcnode-id="2395" instrument_node=""> </span><span data-dcnode-id="2389" style="font-size: 13px; font-family: &quot;Trebuchet MS&quot;;"><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rspcavic.org/documents/Advocacy/RSPCA%2520Victoria%2520Wildlife%2520Act%2520Submission.pdf"><span data-dcnode-id="2393" style="color: black; background: white; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2394" instrument_node="">Read our </span></span><span data-dcnode-id="2391" style="background: white; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2392" instrument_node="">full submission</span></span></a></span><span data-dcnode-id="2386" style="background: white; font-size: 13px; font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2388" instrument_node=""> to see all 16 recommendations we made. We look forward to the opportunity to present to the expert panel and to hearing the thoughts of all those committed to the welfare of our wildlife.</span><br data-dcnode-id="2387"></span><br data-dcnode-id="2385"><h2 data-dcnode-id="2382"><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_6e"><span data-dcnode-id="2384" instrument_node="">150 years of the RSPCA in Australia</span></a></h2><span data-dcnode-id="2380" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2381" instrument_node="">In 1871 a group of citizens was very concerned about the welfare of horses in Melbourne. At the time horses were worked very hard. A meeting was called – it was held at the Mechanics Institute in Collins Street, which is the site of the present-day Athenaeum Theatre. At the meeting the Victorian Society for the Prevention of Cruelty to Animals was officially formed. This was the birth of the RSPCA and the animal welfare movement in Australia.</span></span><p class="" data-dcnode-id="2377"><span data-dcnode-id="2378" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2379" instrument_node="">A few decades earlier, in 1824, the English RSPCA had been formed. This came after the landmark Martin’s Act passed in 1822 – the first ever animal welfare legislation, which forbade the cruel and improper treatment of cattle. People were becoming aware that animals had the capacity to suffer and that wherever humans were interacting with or using animals they were responsible for their welfare.</span></span></p><span data-dcnode-id="2376" instrument_node=""> </span><p class="" data-dcnode-id="2373"><span data-dcnode-id="2374" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2375" instrument_node="">When the first Australian society formed in Victoria it hired two Inspectors, starting the long and proud tradition of RSPCA Victoria’s Inspectorate, which now comprises Inspectors working across the state to enforce animal welfare legislation. In 1875 the society extended its work beyond horses and began caring for and protecting other animals such as geese, sheep and goats. Royal patronage was granted in 1956 and the society officially became the RSPCA that we know today.</span></span></p><span data-dcnode-id="2372" instrument_node=""> </span><p class="" data-dcnode-id="2366"><span data-dcnode-id="2367" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2371" instrument_node="">Today RSPCA Victoria is a modern organisation focused on its vision to </span><i data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">end cruelty to all animals. </span></i><span data-dcnode-id="2368" instrument_node="">This is done by working with the community through education, advocacy, animal care and protection. Today, RSPCA Victoria:</span></span></p><span data-dcnode-id="2365" instrument_node=""> </span><ul data-dcnode-id="2349" style="list-style-type: disc;"><li data-dcnode-id="2362"><span data-dcnode-id="2363" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2364" instrument_node="">Cares for around 20,000 animals that come through its shelters every year</span></span></li><li data-dcnode-id="2359"><span data-dcnode-id="2360" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2361" instrument_node="">Responds to more than 10,000 animal cruelty reports each year</span></span></li><li data-dcnode-id="2356"><span data-dcnode-id="2357" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2358" instrument_node="">Educates thousands of school children and adults each year</span></span></li><li data-dcnode-id="2353"><span data-dcnode-id="2354" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2355" instrument_node="">Partners with around 30 animal rescue groups across the state to rehome vulnerable animals</span></span></li><li data-dcnode-id="2350"><span data-dcnode-id="2351" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2352" instrument_node="">Prosecutes more than half of the animal cruelty cases in Victoria each year.</span></span></li></ul><span data-dcnode-id="2348" instrument_node=""> </span><p class="" data-dcnode-id="2345"><span data-dcnode-id="2346" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2347" instrument_node="">RSPCA Victoria has a long, proud history of advocating for change. There have been many highlights over the years, including:</span></span></p><span data-dcnode-id="2344" instrument_node=""> </span><ul data-dcnode-id="2329" style="list-style-type: disc;"><li data-dcnode-id="2341"><span data-dcnode-id="2342" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2343" instrument_node="">Successfully ending puppy tail docking</span></span></li><li data-dcnode-id="2336"><span data-dcnode-id="2337" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2340" instrument_node="">Helping to end cruel puppy and kitten factories in Victoria by advocating for changes to Victoria’s </span><i data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Domestic Animals Act</span></i></span></li><li data-dcnode-id="2333"><span data-dcnode-id="2334" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2335" instrument_node="">Advocating to allow renters to keep their pets with them in rental properties</span></span></li><li data-dcnode-id="2330"><span data-dcnode-id="2331" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2332" instrument_node="">Working directly with governments to influence and amend countless pieces of legislation, including the new Animal Welfare Act that is currently being developed.</span></span></li></ul><span data-dcnode-id="2328" instrument_node=""> </span><p class="" data-dcnode-id="2322"><span data-dcnode-id="2323" style="font-family: &quot;Trebuchet MS&quot;;"><span data-dcnode-id="2327" instrument_node="">We know that we still have a lot of work to do to end animal cruelty – our 150</span><sup data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">th</span></sup><span data-dcnode-id="2324" instrument_node=""> anniversary is a chance to reflect on how far we’ve come and look to the future with renewed resolve. We want to thank all the people who have been part of our history and the Victorian community for continuing to support our work. We won’t stop working until we have ended animal cruelty.</span></span></p><br data-dcnode-id="2321"><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node="">Newsletter #5 April 16th 2021</span><h2 data-dcnode-id="2316"><a data-dcnode-id="2317" id="anchor_5a"><span data-dcnode-id="2318" instrument_node="">Pets and family violence</span></a></h2><span data-dcnode-id="2315" instrument_node="">The link between family violence and animal abuse is well-documented, both in research&nbsp;and in the experience of RSPCA Victoria’s Inspectors. Numerous studies have shown there&nbsp;is a high probability of animal abuse in households experiencing domestic violence.&nbsp;One Victorian study reported that 53% of women entering a refuge to escape domestic&nbsp;violence and abuse reported that their pets had been harmed (Volant et al. 2008).Animal abuse in domestic violence situations not only leads to animal suffering, but can&nbsp;also impact significantly on family members witnessing the abuse, particularly children.&nbsp;</span><br data-dcnode-id="2314"><br data-dcnode-id="2313"><span data-dcnode-id="2312" instrument_node="">However, it is often difficult for those leaving violent situations to keep their animals with&nbsp;them. As a result, individuals and families will often delay fleeing a violent situation due to&nbsp;concerns regarding the safety of their companion animal, with one study reporting that&nbsp;35% of women delayed seeking refuge for this reason (Fawcett et al. 2002).</span><br data-dcnode-id="2311"><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">The Animal Justice Party’s motion called on the Victorian Government to review the </span><em data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Family Violence Protection Act 2008</span></em><span data-dcnode-id="2306" instrument_node=""> to recognise that companion animals are affected by family violence. The motion also called for more funding to support victim survivors of family violence, including for the care of animals, and removing barriers for victims who are trying to escape abusive households but don’t want to leave their pet behind. </span><br data-dcnode-id="2305"><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">RSPCA Victoria applauded the motion and is supportive of any improvements to legislation to better protect both people and animals in these situations. RSPCA Victoria’s Inspectors investigate thousands of animal cruelty reports every year and often see that where animal abuse exists, so does family violence. Inspectors are trained to identify signs of abuse and work closely to refer these cases to relevant social services, Victoria Police and family violence agencies. </span><br data-dcnode-id="2302"><br data-dcnode-id="2301"><span data-dcnode-id="2300" instrument_node="">RSPCA Victoria currently offers support to people experiencing domestic and family violence in the form of emergency pet boarding. Changing the legislation will increase the support available across the board and encourage further cross-agency collaboration to identify signs of animal abuse before it is reported. </span><br data-dcnode-id="2299"><br data-dcnode-id="2298"><span data-dcnode-id="2297" instrument_node="">With respect to pets and domestic violence RSPCA Victoria believes: </span><br data-dcnode-id="2296"><br data-dcnode-id="2295"><span data-dcnode-id="2294" instrument_node="">•&nbsp;veterinarians, community service workers and other frontline staff should be trained and supported to identify and report suspected cases of animal cruelty; </span><br data-dcnode-id="2293"><span data-dcnode-id="2292" instrument_node="">•&nbsp;key agencies need to be empowered to create more opportunities for companion animals to be accommodated at refuge centres and other emergency housing facilities; and </span><br data-dcnode-id="2291"><span data-dcnode-id="2290" instrument_node="">•&nbsp;relevant state and territory legislation should allow for the inclusion of companion animals in violence intervention/restraining orders.</span><br data-dcnode-id="2289"><br data-dcnode-id="2288"><h2 data-dcnode-id="2285"><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_5b"><span data-dcnode-id="2287" instrument_node="">Wildlife Act review gets underway</span></a></h2><span data-dcnode-id="2284" instrument_node="">Victoria’s </span><em data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Wildlilfe Act 1975</span></em><span data-dcnode-id="2281" instrument_node=""> sets out how people can interact with wildlife in Victoria. As&nbsp;the name suggests, it was enacted in 1975, and over the past 45 years community&nbsp;attitudes and expectations have certainly changed. So, the Minister for Environment’s&nbsp;decision to announce a review of the Act is great news and very timely.</span><br data-dcnode-id="2280"><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">The review will be conducted by an expert advisory panel appointed by the Victorian&nbsp;Government. Organisations and individuals can have their say on:</span><br data-dcnode-id="2277"><br data-dcnode-id="2276"><span data-dcnode-id="2275" instrument_node="">•&nbsp;contemporary values and expectations around wildlife </span><br data-dcnode-id="2274"><span data-dcnode-id="2273" instrument_node="">•&nbsp;the need to protect and conserve wildlife and to prevent wildlife from becoming extinct </span><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node="">•&nbsp;interests in sustainable use of, and access to, wildlife </span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">•&nbsp;the role of wildlife in the cultural practices and beliefs of Traditional Owners and Aboriginal Victorians </span><br data-dcnode-id="2268"><span data-dcnode-id="2267" instrument_node="">•&nbsp;the impact of wildlife on agriculture and other activities </span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">•&nbsp;the impact of eco-tourism and other activities on wildlife </span><br data-dcnode-id="2264"><span data-dcnode-id="2263" instrument_node="">•&nbsp;the benefits of activities which foster an appreciation of wildlife </span><br data-dcnode-id="2262"><span data-dcnode-id="2261" instrument_node="">•&nbsp;emerging issues affecting wildlife protection and conservation, sustainable use and access </span><br data-dcnode-id="2260"><span data-dcnode-id="2259" instrument_node="">•&nbsp;any gaps or inconsistencies resulting from changes to other legal frameworks or policy settings </span><br data-dcnode-id="2258"><span data-dcnode-id="2257" instrument_node="">•&nbsp;insights from reviews of similar legislation </span><br data-dcnode-id="2256"><span data-dcnode-id="2255" instrument_node="">•&nbsp;the most appropriate and effective ways to encourage compliance with the Act and punish wildlife crime. </span><br data-dcnode-id="2254"><br data-dcnode-id="2253"><span data-dcnode-id="2252" instrument_node="">Submissions open on Engage Victoria this month so take the opportunity to have your say. RSPCA Victoria will be making a submission focused on wildlife welfare – we look forward to lots of positive change and progress coming out of this review.</span><br data-dcnode-id="2251"><br data-dcnode-id="2250"><h2 data-dcnode-id="2247"><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_5c"><span data-dcnode-id="2249" instrument_node="">Country Mile race series trials limited whip use</span></a></h2><span data-dcnode-id="2246" instrument_node="">We recently welcomed Racing Victoria’s call to reduce the use of the whip and believe&nbsp;whip reform is a necessary and positive change. The whip can no longer be defended as a&nbsp;tool for performance enhancement and we encourage the Australian racing industry to&nbsp;follow other countries around the world and introduce hands-and-heels racing.&nbsp;</span><br data-dcnode-id="2245"><br data-dcnode-id="2244"><span data-dcnode-id="2243" instrument_node="">During the recent Country Mile series, Racing Victoria trialed limited whip use. During five&nbsp;heats and a final held throughout February and March, riders were forbidden from using&nbsp;their whips more than five times during a race. The trial was a significant reduction&nbsp;compared with the current Australian Rules of Racing, which permit the use of the whip a&nbsp;maximum of five times in non-consecutive strides prior to the 100m mark and at the&nbsp;rider’s discretion in the final 100m of a race where its use in consecutive strides is&nbsp;permitted.</span><br data-dcnode-id="2242"><br data-dcnode-id="2241"><span data-dcnode-id="2240" instrument_node="">Numerous whip use breaches occurred during the Country Mile series, but it was&nbsp;promising to see Racing Victoria handing out appropriate suspensions and penalties. The&nbsp;RSPCA believes penalties are important for deterring riders from using whips&nbsp;unnecessarily as this establishes expectations about the industry’s standards and sets&nbsp;clear consequences for breaches of the rules. Having these penalties is essential for driving behaviour change within the horse racing industry. </span><br data-dcnode-id="2239"><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">A </span><a data-dcnode-id="2235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/2076-2615/10/11/1985"><span data-dcnode-id="2236" instrument_node="">study</span></a><span data-dcnode-id="2234" instrument_node=""> released late last year effectively debunked traditional arguments that the whip is needed for performance enhancement and to maintain racing integrity. Therefore, hands-and-heels races could be added to race programs in Australia right now, with no change to race outcomes. </span><br data-dcnode-id="2233"><br data-dcnode-id="2232"><span data-dcnode-id="2231" instrument_node="">Norway has observed a ban on the use of whips in racing since 1986 – jockeys are allowed to carry whips but can only use them if their safety is jeopardised. Whereas countries such as the United Kingdom, Ireland and Germany have placed limitations on whip use in races and introduced stronger penalties for riders who breach these rules. In the interim, we support more whip-free races being held across Victoria, but believe the focus must be on banning the use of the whip in the thoroughbred racing industry.</span><br data-dcnode-id="2230"><br data-dcnode-id="2229"><h2 data-dcnode-id="2226"><a data-dcnode-id="2227" id="anchor_5d"><span data-dcnode-id="2228" instrument_node="">Managing feral horses in the Alps</span></a></h2><span data-dcnode-id="2225" instrument_node="">It’s an emotive issue, but RSPCA Victoria acknowledges that in some circumstances it is&nbsp;necessary to manage populations of wild animals when they impact other species. We&nbsp;always emphasise that any management measures undertaken must recognise that&nbsp;whether an animal is native, introduced or viewed as a ‘pest’ does not affect its capacity&nbsp;to experience pain, suffering or distress.</span><br data-dcnode-id="2224"><br data-dcnode-id="2223"><span data-dcnode-id="2222" instrument_node="">In our view, all introduced species that negatively impact native animals and their&nbsp;environments should be managed in the most humane, effective and target-specific way&nbsp;available under appropriate proactive government supervised management programs. All&nbsp;introduced species should be treated equally and no single species should be exempted&nbsp;from control, as has been the case with feral horses.</span><br data-dcnode-id="2221"><br data-dcnode-id="2220"><span data-dcnode-id="2219" instrument_node="">Native Australian species that are being threatened by the impacts of feral horses include&nbsp;the Smoky Mouse (Pseudomys fumeus) and Tooarrana (Mastocomys fuscus), Alpine Tree&nbsp;Frog (Litoria verreauxii alpina), Alpine Water Skink (Eulamprus kosciuskoi) and Guthega&nbsp;Skink (Liopholis guthega) and Alpine Spiny Crayfish (Euastacus crassu).</span><br data-dcnode-id="2218"><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">The 2019-20 bushfires caused major losses of high-country native wildlife, native plants&nbsp;and habitats which is why management of the impacts introduced animals are having on&nbsp;these ecosystems is now critical.</span><br data-dcnode-id="2215"><h3 data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">How do feral horses cause damage?</span></h3><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">Feral horses are not a natural part of the Australian ecosystem and can cause severe damage to alpine and sub-alpine environments, including the destruction of habitat critical to many native wildlife and plant species. This damage caused to habitat can have significant impacts on the individual welfare of native wildlife. Feral horses cause damage to Victoria’s natural environment by: </span><br data-dcnode-id="2210"><br data-dcnode-id="2209"><span data-dcnode-id="2208" instrument_node="">•&nbsp;Grazing and browsing – they consume native plants and destroy the habitat of native wildlife. </span><br data-dcnode-id="2207"><span data-dcnode-id="2206" instrument_node="">•&nbsp;Pugging and streambank collapse – they compact soil, increase erosion, cause wet areas to dry out and degrade waterways. </span><br data-dcnode-id="2205"><span data-dcnode-id="2204" instrument_node="">•&nbsp;Impacting water quality – they remove vegetation, reduce water filtering, cause muddier water and harm native aquatic species. </span><br data-dcnode-id="2203"><span data-dcnode-id="2202" instrument_node="">•&nbsp;Trampling and opening of bare ground – they harm soil and plant growth. </span><br data-dcnode-id="2201"><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">Habitat destruction can limit some species access to shelter placing them at greater risk of predation. For example, grazing and trampling horses affect the habitats of several nationally listed threatened species of amphibians. Access to food can also be compromised, with species such as the Broader-toothed Rat, who require specific plant availability to survive, competing with horses for food. Together, these factors can see the welfare of some of Victoria’s most critically threatened species compromised. </span><br data-dcnode-id="2198"><br data-dcnode-id="2197"><span data-dcnode-id="2196" instrument_node="">If you would like to complete the feedback survey and have your say you can do so here: </span><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.vic.gov.au/alpine-feral-horse-action-plan"><span data-dcnode-id="2195" instrument_node="">https://engage.vic.gov.au/alpine-feral-horse-action-plan</span></a><br data-dcnode-id="2193"><br data-dcnode-id="2192"><h2 data-dcnode-id="2189"><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_5e"><span data-dcnode-id="2191" instrument_node="">Ecosystem decline in Victoria</span></a></h2><span data-dcnode-id="2188" instrument_node="">The Parliamentary Inquiry into Ecosystem Decline in Victoria gave organisations and&nbsp;individuals the chance to voice their concerns and recommendations to help address this&nbsp;problem. RSPCA Victoria’s submission&nbsp;focused on the welfare of both native and&nbsp;introduced species. You can </span><a data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.parliament.vic.gov.au/images/stories/committees/SCEP/Ecosystem_Decline/submissions/S735_-_RSPCA_Victoria_Redacted.pdf"><span data-dcnode-id="2187" instrument_node="">read our full submission&nbsp;here</span></a><span data-dcnode-id="2185" instrument_node="">.</span><br data-dcnode-id="2184"><br data-dcnode-id="2183"><span data-dcnode-id="2182" instrument_node="">At a public hearing at Parliament House in March, RSPCA Victoria presented its key&nbsp;</span><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">concerns including:</span><br data-dcnode-id="2179"><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">•&nbsp;the need for Victoria to end duck shooting to protect the welfare and sustainability of our native waterbirds; </span><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">•&nbsp;the need to promote wetland ecotourism to positively engage Victorians with our precious native waterbirds and wildlife; </span><br data-dcnode-id="2174"><span data-dcnode-id="2173" instrument_node="">•&nbsp;the need for further research into humane solutions for pest species management; and </span><br data-dcnode-id="2172"><span data-dcnode-id="2171" instrument_node="">•&nbsp;a coordinated approach to the management of domestic and feral cats in Victoria. </span><br data-dcnode-id="2170"><br data-dcnode-id="2169"><span data-dcnode-id="2168" instrument_node="">The Inquiry held several days of hearings from December 2020 to March 2021, which included presentations from environmental groups, wildlife groups, hunting bodies, climate and environmental researchers, as well as several government agencies. We look forward to seeing the Committee’s final report in September 2021 and their recommendations to stop ecosystem decline and the impact this has on animal welfare.</span><br data-dcnode-id="2167"><br data-dcnode-id="2166"><br data-dcnode-id="2165"><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">Newsletter #4 January 21st 2021</span></h4><div bcx0="" data-dcnode-id="2152" ltr="" scxw242350293"=""><h2 data-dcnode-id="2153" scxw242350293=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2157" lang="EN-AU" scxw242350293="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2158" scxw242350293=""><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_4a"><span data-dcnode-id="2160" instrument_node="">Victoria’s animal-friendly budget </span></a></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2154" scxw242350293=""><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_3a"><span data-dcnode-id="2156" instrument_node="">&nbsp;</span></a></span></h2></div><div bcx0="" data-dcnode-id="2148" ltr="" scxw242350293"=""><p data-dcnode-id="2149" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span class="TextRun SCXW171394112 BCX0" data-contrast="auto" data-dcnode-id="2150" lang="EN-AU" style="color: windowtext; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 12pt; line-height: 20.5042px; font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW171394112 BCX0" data-dcnode-id="2151" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"></span></span></p></div><div bcx0="" data-dcnode-id="2144" ltr="" scxw242350293"=""><p data-dcnode-id="2145" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span class="TextRun SCXW171394112 BCX0" data-contrast="auto" data-dcnode-id="2146" lang="EN-AU" style="color: windowtext; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 12pt; line-height: 20.5042px; font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW171394112 BCX0" data-dcnode-id="2147" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"></span></span></p></div><div bcx0="" data-dcnode-id="2137" ltr="" scxw242350293"=""><p data-dcnode-id="2138" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2141" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2142" scxw171394112=""><span data-dcnode-id="2143" instrument_node="">A total of $19.1 million is allocated in the Victorian Budget 2020-2021 to support pets and animal welfare over the next four years, in addition to funding for wildlife, biodiversity and agriculture. The funds are earmarked for a range of measures including grants for organisations undertaking pet re-homing activities and those providing free or low-cost de-sexing of cats and dogs for vulnerable and disadvantaged Victorians.&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2139" scxw171394112=""><span data-dcnode-id="2140" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="2130" ltr="" scxw171394112"=""><p data-dcnode-id="2131" paraeid="{1904a0b7-e17f-44a4-87b7-a3864fd9cb7d}{237}" paraid="1067431645" scxw171394112=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2134" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2135" scxw171394112=""><span data-dcnode-id="2136" instrument_node="">Funding pets and animal welfare is compassionate as well as smart. Not only do these programs directly help animals by reducing neglect, but they also support people at a time when such support has never been needed more.&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2132" scxw171394112=""><span data-dcnode-id="2133" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="2114" ltr="" scxw171394112"=""><p data-dcnode-id="2115" paraeid="{1904a0b7-e17f-44a4-87b7-a3864fd9cb7d}{247}" paraid="1832321527" scxw171394112=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2127" lang="EN-US" scxw171394112="" xml:lang="EN-US"><span bcx0"="" data-dcnode-id="2128" scxw171394112=""><span data-dcnode-id="2129" instrument_node="">In 2019/20,&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2124" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2125" scxw171394112=""><span data-dcnode-id="2126" instrument_node="">10,600&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2121" lang="EN-US" scxw171394112="" xml:lang="EN-US"><span bcx0"="" data-dcnode-id="2122" scxw171394112=""><span data-dcnode-id="2123" instrument_node="">Victorians benefited from adopting companion animals from RSPCA Victoria alone. For some, their animal was their only companion during the pandemic. Longitudinal research has found a correlation between human physical health and pet ownership. Pet ownership has been linked to everything from reduced headaches and sleep disturbances to fewer annual doctor visits, lower rates of smoking and lower body mass index scores.</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2118" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2119" scxw171394112=""><span data-dcnode-id="2120" instrument_node="">&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2116" scxw171394112=""><span data-dcnode-id="2117" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="2089" ltr="" scxw171394112"=""><p data-dcnode-id="2090" paraeid="{7f0ee9d8-7c52-4dd3-82f2-7c6b770b4136}{8}" paraid="1918066197" scxw171394112=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2111" lang="EN-US" scxw171394112="" xml:lang="EN-US"><span bcx0"="" data-dcnode-id="2112" scxw171394112=""><span data-dcnode-id="2113" instrument_node="">Pet ownership also has a strong association with improved mental health and social connectedness – vitally important as we navigate a pandemic. For example,&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2108" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2109" scxw171394112=""><span data-dcnode-id="2110" instrument_node="">teenagers who own pets have a more positive outlook on life and report less loneliness, restlessness,&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2105" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2106" scxw171394112=""><span data-dcnode-id="2107" instrument_node="">despair</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2102" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2103" scxw171394112=""><span data-dcnode-id="2104" instrument_node="">&nbsp;and boredom. Research has also shown that pet owners report less depression and appear to cope with grief,&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2099" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2100" scxw171394112=""><span data-dcnode-id="2101" instrument_node="">stress</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2096" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2097" scxw171394112=""><span data-dcnode-id="2098" instrument_node="">&nbsp;and loss better than non-pet owners.&nbsp;</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2093" lang="EN-US" scxw171394112="" xml:lang="EN-US"><span bcx0"="" data-dcnode-id="2094" scxw171394112=""><span data-dcnode-id="2095" instrument_node="">Moreover, there is a strong body of literature supporting the importance of animals to vulnerable members of society such as people experiencing homelessness, the elderly and people with a disability.&nbsp;&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2091" scxw171394112=""><span data-dcnode-id="2092" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="2076" ltr="" scxw171394112"=""><p data-dcnode-id="2077" paraeid="{7f0ee9d8-7c52-4dd3-82f2-7c6b770b4136}{30}" paraid="55396221" scxw171394112=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2086" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2087" scxw171394112=""><span data-dcnode-id="2088" instrument_node="">The funding will also support horse rehabilitation programs and provid</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2083" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2084" scxw171394112=""><span data-dcnode-id="2085" instrument_node="">e</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2080" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2081" scxw171394112=""><span data-dcnode-id="2082" instrument_node="">&nbsp;funding to rehoming organisations for equipment upgrades and service expansions. Animal welfare compliance and enforcement will be supported by funding for Victoria’s Pet Exchange Register, the work of the RSPCA Victoria Inspectorate and Animal Welfare Victoria. A new taskforce will be set up to look at best practice models for Victoria’s pet foster care, as well as opportunities to rehome animals utilised in medical research.</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2078" scxw171394112=""><span data-dcnode-id="2079" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="2064" ltr="" scxw171394112"=""><p data-dcnode-id="2065" paraeid="{7f0ee9d8-7c52-4dd3-82f2-7c6b770b4136}{44}" paraid="1186743200" scxw171394112=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2073" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2074" scxw171394112=""><span data-dcnode-id="2075" instrument_node="">I</span></span></span><span bcx0"="" data-contrast="auto" data-dcnode-id="2070" lang="EN-AU" scxw171394112="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2071" scxw171394112=""><span data-dcnode-id="2072" instrument_node="">ncreased funding for pets and animal welfare is great news for all Victorians. When we take care of animals and promote the human-animal bond, the evidence shows that everybody wins.&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2066" scxw171394112=""><span data-dcnode-id="2069" instrument_node="">&nbsp;</span><br data-dcnode-id="2068"><br data-dcnode-id="2067"></span></p></div><div bcx0="" data-dcnode-id="2049" ltr="" scxw242350293"=""><div bcx0="" data-dcnode-id="2050" ltr="" scxw42781363"=""><div bcx0="" data-dcnode-id="2055" ltr="" scxw242350293"=""><h2 data-dcnode-id="2056" scxw242350293=""><span bcx0"="" data-contrast="auto" data-dcnode-id="2060" lang="EN-AU" scxw242350293="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="2061" scxw242350293=""><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_4b"><span data-dcnode-id="2063" instrument_node="">Victoria poised for new animal welfare legislation </span></a></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="2057" scxw242350293=""><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_3a"><span data-dcnode-id="2059" instrument_node="">&nbsp;</span></a></span></h2></div><div bcx0="" data-dcnode-id="2051" ltr="" scxw242350293"=""><p data-dcnode-id="2052" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span class="TextRun SCXW13003437 BCX0" data-contrast="auto" data-dcnode-id="2053" lang="EN-AU" style="color: windowtext; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 12pt; line-height: 20.5042px; font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW13003437 BCX0" data-dcnode-id="2054" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"></span></span></p></div></div></div><span data-dcnode-id="2048" instrument_node="">Victoria’s Prevention of Cruelty to Animals Act 1986 (POCTAA) has served our state well, but over the last three decades much progress has been made in animal welfare. Scientific understanding and evidence of what represents good welfare has expanded, and community attitudes have also changed. It’s time to update Victoria’s animal welfare legislation to reflect the latest knowledge and attitudes.&nbsp;&nbsp;</span><br data-dcnode-id="2047"><br data-dcnode-id="2046"><span data-dcnode-id="2045" instrument_node="">The </span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.vic.gov.au/new-animal-welfare-act-victoria"><span data-dcnode-id="2044" instrument_node="">Victorian Government consultation</span></a><span data-dcnode-id="2042" instrument_node=""> period finished on 14 December 2020. To aid consultation, the </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.ap-southeast-2.amazonaws.com/hdp.au.prod.app.vic-engage.files/4616/0275/7674/AW_Directions_Paper.pdf"><span data-dcnode-id="2041" instrument_node="">Directions Paper</span></a><span data-dcnode-id="2039" instrument_node=""> identified twelve potential areas for improvement compared to current POCTAA legislation under the broad themes of:&nbsp;&nbsp;</span><br data-dcnode-id="2038"><br data-dcnode-id="2037"><span data-dcnode-id="2036" instrument_node="">• Safeguarding animal welfare by recognising animal sentience, introducing a requirement for people to provide minimum standards of care to animals, better defining cruelty offences and providing a framework to regulate painful husbandry practices.&nbsp;&nbsp;</span><br data-dcnode-id="2035"><br data-dcnode-id="2034"><span data-dcnode-id="2033" instrument_node="">•&nbsp;A simplified and flexible legislative framework to increase consistency and clarity when applying the law, adopt national welfare guidelines and ensure laws are applicable across state jurisdictions, recognise the role of non-government bodies in animal welfare regulation and consider animal welfare science in legislative responses.&nbsp;</span><br data-dcnode-id="2032"><br data-dcnode-id="2031"><span data-dcnode-id="2030" instrument_node="">•&nbsp;A better compliance and enforcement model to give law enforcement agencies greater powers to monitor animal cruelty offenders, streamline legislation in relating to permit based activities using animals and set out clear alternatives to manage seized animals.&nbsp;&nbsp;</span><br data-dcnode-id="2029"><span data-dcnode-id="2028" instrument_node="">&nbsp;</span><br data-dcnode-id="2027"><span data-dcnode-id="2026" instrument_node="">All these proposals have clear implications for RSPCA Victoria, particularly our Inspectorate. We are pleased to see many of our suggestions taken on board to contemporise animal welfare legislation and broaden the definition of what constitutes ‘cruelty’.&nbsp;&nbsp;</span><br data-dcnode-id="2025"><br data-dcnode-id="2024"><span data-dcnode-id="2023" instrument_node="">Last week we submitted our recommendations, recommending key areas that should be addressed for effective animal welfare legislation:&nbsp;</span><br data-dcnode-id="2022"><br data-dcnode-id="2021"><span data-dcnode-id="2020" instrument_node="">1. Clear recognition of animals as sentient beings and protection for all animals that have been demonstrated to be sentient;&nbsp;</span><br data-dcnode-id="2019"><br data-dcnode-id="2018"><span data-dcnode-id="2017" instrument_node="">2. Promotion of animal welfare through the imposition of ’duty of care’, including promotion of positive experiences;&nbsp;</span><br data-dcnode-id="2016"><br data-dcnode-id="2015"><span data-dcnode-id="2014" instrument_node="">3. Escalating offence categories supported by sentencing guidelines;&nbsp;</span><br data-dcnode-id="2013"><br data-dcnode-id="2012"><span data-dcnode-id="2011" instrument_node="">4. Removal of broad exemptions currently allowed under POCTAA&nbsp;</span><br data-dcnode-id="2010"><br data-dcnode-id="2009"><span data-dcnode-id="2008" instrument_node="">5. Introduction of a comprehensive set of regulations supported by best practice guidelines;&nbsp;</span><br data-dcnode-id="2007"><br data-dcnode-id="2006"><span data-dcnode-id="2005" instrument_node="">6. A model for enforcement that allows for more tools for Inspectors to intervene earlier, including use of infringement notices, enforceable undertakings, banning orders as a mandatory part of cruelty sentencing and emergency entry powers for Inspectors;&nbsp;</span><br data-dcnode-id="2004"><br data-dcnode-id="2003"><span data-dcnode-id="2002" instrument_node="">7. Better management of seized animals to allow them to be adopted, sold or euthanased (as required) rather than being held for the duration of a court case;&nbsp;&nbsp;</span><br data-dcnode-id="2001"><br data-dcnode-id="2000"><span data-dcnode-id="1999" instrument_node="">8. Formalisation of Victoria’s Animal Welfare Advisory Committee as well as including guidance in the Act on how science and expert opinion should be used to inform decisions and develop regulations&nbsp;&nbsp;</span><br data-dcnode-id="1998"><br data-dcnode-id="1997"><span data-dcnode-id="1996" instrument_node="">RSPCA Victoria is looking forward to continuing to collaborate with Animal Welfare Victoria and the Agriculture Minister to ensure that we have robust contemporary animal welfare legislation in Victoria. We are excited to see the draft Bill during the next consultation in 2021.&nbsp;&nbsp;</span><div class="OutlineElement Ltr BCX0 SCXW13003437" data-dcnode-id="1993" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; font-family: &quot;Segoe UI&quot;, &quot;Segoe UI Web&quot;, Arial, Verdana, sans-serif; font-size: 12px; background-color: rgb(255, 255, 255);"><p class="Paragraph SCXW13003437 BCX0" data-dcnode-id="1994" paraeid="{a67ba1b9-d3da-4c11-bb43-e73adfb28179}{86}" paraid="1187014191" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow-wrap: break-word; vertical-align: baseline; font-kerning: none; background-color: transparent; color: windowtext;"><span class="EOP SCXW13003437 BCX0" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1995" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 12pt; line-height: 20.5042px; font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif;"></span></p></div><br data-dcnode-id="1992"><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">&nbsp;</span></p><div bcx0="" data-dcnode-id="1981" ltr="" scxw242350293"=""><h2 data-dcnode-id="1982" scxw242350293=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1986" lang="EN-AU" scxw242350293="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1987" scxw242350293=""><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_4c"><span data-dcnode-id="1989" instrument_node="">Welfare issues in racing – deaths, injuries and the issue of whips </span></a></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559740&quot;:259}" data-dcnode-id="1983" scxw242350293=""><a data-dcnode-id="1984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_3a"><span data-dcnode-id="1985" instrument_node="">&nbsp;</span></a></span></h2></div><div bcx0="" data-dcnode-id="1977" ltr="" scxw242350293"=""><p data-dcnode-id="1978" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span class="TextRun SCXW171394112 BCX0" data-contrast="auto" data-dcnode-id="1979" lang="EN-AU" style="color: windowtext; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 12pt; line-height: 20.5042px; font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW171394112 BCX0" data-dcnode-id="1980" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"></span></span></p></div><div bcx0="" data-dcnode-id="1973" ltr="" scxw242350293"=""><p data-dcnode-id="1974" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span class="TextRun SCXW171394112 BCX0" data-contrast="auto" data-dcnode-id="1975" lang="EN-AU" style="color: windowtext; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 12pt; line-height: 20.5042px; font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif; font-variant-ligatures: none !important;" xml:lang="EN-AU"><span class="NormalTextRun SCXW171394112 BCX0" data-dcnode-id="1976" style="margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;"></span></span></p></div><div bcx0="" data-dcnode-id="1970" ltr="" scxw242350293"=""><p data-dcnode-id="1971" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span data-dcnode-id="1972" instrument_node="">The RSPCA believes there are inherent animal welfare issues in horseracing. Whenever there is an adverse outcome for an animal, our expectation is that the industry will do a comprehensive review to identify ways to improve, in an effort to avoid unnecessary injury or trauma in the future.&nbsp;&nbsp;</span></p></div><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Whips need to go&nbsp;</span></strong><br data-dcnode-id="1967"><br data-dcnode-id="1966"><span data-dcnode-id="1965" instrument_node="">RSPCA Victoria welcomed the increased penalties for whip rule breaches handed down at this year’s Melbourne Cup. However, we maintain that more needs to be done to phase out the use of whips entirely.&nbsp;</span><br data-dcnode-id="1964"><br data-dcnode-id="1963"><span data-dcnode-id="1962" instrument_node="">A state-wide survey conducted in July – August 2020 showed that seven in 10 (69%) Victorians feel horses should not be hit with a whip in the normal course of a race, illustrating that most Victorians do not believe the use of whips in horseracing is necessary or reflective of community sentiment.&nbsp;</span><br data-dcnode-id="1961"><br data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node="">The research was conducted with a representative sample of the Victorian community by data insights and consulting firm, Kantar. Key findings include:&nbsp;</span><br data-dcnode-id="1958"><br data-dcnode-id="1957"><span data-dcnode-id="1956" instrument_node="">•&nbsp;69% of Victorians feel horses should not be hit with a whip in the normal course of a race;&nbsp;</span><br data-dcnode-id="1955"><br data-dcnode-id="1954"><span data-dcnode-id="1953" instrument_node="">•&nbsp;61% of punters and racing attendees feel that horses should not be hit with a whip;&nbsp;</span><br data-dcnode-id="1952"><br data-dcnode-id="1951"><span data-dcnode-id="1950" instrument_node="">•&nbsp;71% of Victorians who attend or bet on horse races would be undeterred if whips were banned and would continue to participate in horse racing events and activities;&nbsp;</span><br data-dcnode-id="1949"><br data-dcnode-id="1948"><span data-dcnode-id="1947" instrument_node="">• The majority feel that whipping horses causes pain, is inhumane and is unnecessary.&nbsp;&nbsp;</span><br data-dcnode-id="1946"><br data-dcnode-id="1945"><span data-dcnode-id="1944" instrument_node="">Additionally, another study released late last year showed that whipping horses does not make them run faster, effectively debunking traditional arguments that the whip is needed for performance enhancement and to maintain racing integrity.&nbsp; Therefore, hands-and-heels races could be added to race programs in Australia right now, with no change to race outcomes.&nbsp;</span><br data-dcnode-id="1943"><br data-dcnode-id="1942"><span data-dcnode-id="1941" instrument_node="">We recently welcomed Racing Victoria’s call to reduce the use of the whip and believe whip reform is a necessary and positive change.&nbsp; The whip can no longer be defended as a tool for performance enhancement and we encourage the Australian racing industry to follow other countries around the world and introduce hands-and-heels racing.</span><br data-dcnode-id="1940"><br data-dcnode-id="1939"><div bcx0="" data-dcnode-id="1933" ltr="" scxw242350293"=""><h2 data-dcnode-id="1934" scxw242350293=""><span bcx0"="" data-contrast="auto" data-dcnode-id="1935" lang="EN-AU" scxw242350293="" xml:lang="EN-AU"><span bcx0"="" data-dcnode-id="1936" scxw242350293=""><a data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rspcavic.org/about-us" id="anchor_4d"><span data-dcnode-id="1938" instrument_node="">2021 Duck hunting season considerations</span></a></span></span></h2></div><div bcx0="" data-dcnode-id="1929" ltr="" scxw242350293"=""><p data-dcnode-id="1930" paraeid="{3afc5cc8-d380-4dfc-bda2-6084d38d45d7}{136}" paraid="2061662031" scxw242350293=""><span class="TextRun SCXW171394112 BCX0" data-contrast="auto" data-dcnode-id="1931" lang="EN-AU" style="color: windowtext; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 12pt; line-height: 20.5042px; font-family: Calibri, Calibri_EmbeddedFont, Calibri_MSFontService, sans-serif; font-variant-ligatures: none !important;" xml:lang="EN-AU"><spa node-id="1276" instrument_node="">&nbsp;to roam can lead to several welfare problems including greater risk of injury, disease and misadventure/accident, and if a cat is not desexed, a greater likelihood of unwanted kittens. This is in addition to the welfare risks cats pose to wildlife.&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:240,&quot;335559740&quot;:240}" data-dcnode-id="1272" scxw42781363=""><span data-dcnode-id="1273" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="1257" ltr="" scxw42781363"=""><p data-dcnode-id="1258" paraeid="{de53340a-9648-4fab-9923-0fae34aa27c3}{157}" paraid="904058765" scxw42781363=""><span bcx0"="" data-contrast="none" data-dcnode-id="1267" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1268" scxw42781363=""><span data-dcnode-id="1269" instrument_node="">Amending the Act to require cats to be contained on their owner’s property would have many welfare benefits. Not only would widespread cat containment reduce the risks listed above, but it could also change community perceptions about wandering cats and prompt people to be more concerned&nbsp;</span></span></span><span bcx0"="" data-contrast="none" data-dcnode-id="1264" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1265" scxw42781363=""><span data-dcnode-id="1266" instrument_node="">or</span></span></span><span bcx0"="" data-contrast="none" data-dcnode-id="1261" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1262" scxw42781363=""><span data-dcnode-id="1263" instrument_node="">&nbsp;intervene if they see cats wandering in their neighbourhood.&nbsp;</span></span></span><span bcx0"="" data-ccp-props="{&quot;201341983&quot;:0,&quot;335559738&quot;:240,&quot;335559739&quot;:240,&quot;335559740&quot;:240}" data-dcnode-id="1259" scxw42781363=""><span data-dcnode-id="1260" instrument_node="">&nbsp;</span></span></p></div><div bcx0="" data-dcnode-id="1238" ltr="" scxw42781363"=""><p data-dcnode-id="1239" paraeid="{de53340a-9648-4fab-9923-0fae34aa27c3}{167}" paraid="571897061" scxw42781363=""><span bcx0"="" data-contrast="none" data-dcnode-id="1254" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1255" scxw42781363=""><span data-dcnode-id="1256" instrument_node="">We d</span></span></span><span bcx0"="" data-contrast="none" data-dcnode-id="1251" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1252" scxw42781363=""><span data-dcnode-id="1253" instrument_node="">id</span></span></span><span bcx0"="" data-contrast="none" data-dcnode-id="1248" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1249" scxw42781363=""><span data-dcnode-id="1250" instrument_node="">, however, emphasise that</span></span></span><span bcx0"="" data-contrast="none" data-dcnode-id="1245" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1246" scxw42781363=""><span data-dcnode-id="1247" instrument_node="">&nbsp;any legislative change to require cat containment must include a comprehensive and integrated support and compliance scheme, which provides education and support for cat owners about ways to transition cats indoors and provide them with enrichment to ensure their welfare is not compromised.</span></span></span><span bcx0"="" data-contrast="none" data-dcnode-id="1242" lang="EN-AU" scxw42781363="" xml:lang="EN-AU"><span bcx0"="" commentstart="" data-ccp-parastyle="RSPCA Body Copy" data-dcnode-id="1243" scxw42781363=""><span data-dcnode-id="1244" instrument_node="">&nbsp;</span></span></span><span bcx0"="" data-ccp
