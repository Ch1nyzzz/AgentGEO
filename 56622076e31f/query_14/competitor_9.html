We currently offer projects in the laboratory (wet or animal) or field, projects that involve data analysis, literature research, educational research, science communication research and market research. Students may work individually or in groups addressing similar questions, but must write up individually. The findings of the research will be written up and presented orally. The conduct and performance of the student as a research apprentice will be assessed.</span></p></div><div aria-labelledby="v-pills-222024-25-tab" class="tab-pane fade" data-dcnode-id="3055" id="v-pills-222024-25" role="tabpanel"><h4 data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Behavioural ecology examines the way in which behavioural repertoires contribute to survival and ultimately reproductive success. The module will focus on key topics including: Optimality Theory, Sexual Selection, Communication and Sensory Ecology, Altruism and Cooperation, Arms Races, Fighting and Assessment, Navigation and Migration, and Human Behaviour.</span></p></div><div aria-labelledby="v-pills-232024-25-tab" class="tab-pane fade" data-dcnode-id="3050" id="v-pills-232024-25" role="tabpanel"><h4 data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">The module aims to provide an understanding of the control of infectious disease in companion and animals, livestock species and wildlife. The module will explore practical control measures for diseases of animals, building explicitly on the knowledge and understanding gained in other modules. Particular areas of study will include:

- Nature and examples of important infectious pathogens
- Host Responses to Infectious Pathogens
- Control of disease at the level of the individual and population
- Manipulation of transmission dynamics
- Biosecurity and husbandry
- Treatment of disease
- Breeding or engineering genetically resistant animals
- Vaccination and design of novel vaccines.

These topics will be addressed in a holistic way that encourages students to be able to design and implement control strategies for known and emerging diseases. This ability will be explicitly tested in coursework and an oral examination.</span></p></div><div aria-labelledby="v-pills-242024-25-tab" class="tab-pane fade" data-dcnode-id="3045" id="v-pills-242024-25" role="tabpanel"><h4 data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">This module provides students with the opportunity to investigate biological phenomena in the field at an overseas location. Students work in groups, guided by staff, to develop and test hypotheses allowing them to understand more about biological processes operating within the study area. They are encouraged to view the ecosystem within the wider context of the anthropogenic impacts being imposed on it.  This module is optional and courses run subject to sufficient student demand. Students who opt to undertake a field trip overseas will be expected to cover transport costs (including flight costs). These costs will vary depending on the location of the field trip. Accommodation and meals at the field sites are fully funded by the University. Students may be required to pay for overnight stays, local travel, and food close to the destination if their flights arrive the day before the team are scheduled to meet. Students may bring personal items of clothing and travel equipment, some of which may be specialised for the environment they are travelling to, and recommended medicines and travel toiletries such as anti-malaria medication, vaccinations, insect repellent, and sunscreen. These costs will depend on what students choose to bring.</span></p></div><div aria-labelledby="v-pills-252024-25-tab" class="tab-pane fade" data-dcnode-id="3040" id="v-pills-252024-25" role="tabpanel"><h4 data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">In this module students can gain an understanding of, and an appreciation for, the interactions between plants and animals that have been the driving force for the evolution of the world as we know it. Interactions between the flowering plants and vertebrate and invertebrate animals have led to the huge diversity of flowering plants that maintain the essential life support systems of the planet and are the basis of all current agricultural systems. Despite the huge economic costs of agricultural pests that damage plants, the evolutionary arms race between plants and their herbivores has driven the evolution of many of the important plant secondary compounds we use today as stimulants (e.g. caffeine) or drugs (e.g. salicylic acid = aspirin). Other economically, evolutionarily, or ecologically important plant-animal interactions include pollination and seed dispersal. Students can examine the economic, evolutionary, and ecological consequences of plant-animal interactions at scales from ecosystems to molecules. They will have the opportunity to develop their own perspective on this important topic, and will be asked to review and interpret and evaluate the evidence available in the primary literature.</span></p></div><div aria-labelledby="v-pills-262024-25-tab" class="tab-pane fade" data-dcnode-id="3035" id="v-pills-262024-25" role="tabpanel"><h4 data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Conservation of plants and animals usually involves interactions between multiple stakeholders including scientists, landowners, communities, government, and NGOs. A range of practical and transferable skills are therefore beneficial for employment in both conservation research and conservation practice. This module will refine certain such skills that students have acquired through their degree, and help them understand how to apply them in a conservation biology setting. Its focus is to provide opportunities for real world and experiential learning, and to progress relevant employability skills.</span></p></div><div aria-labelledby="v-pills-272024-25-tab" class="tab-pane fade" data-dcnode-id="3030" id="v-pills-272024-25" role="tabpanel"><h4 data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">The impact of parasites to the health, welfare, and productivity of animals remains one of the most important issues in veterinary biology. A detailed understanding of the biology and epidemiology of parasites and the association they have with their hosts is vital in protecting and improving animals health and welfare. This module aims to provide a theoretical background for understanding the specialised features that parasites have developed to adapt to their host and transmit between hosts, the diseases which result, and advances in treatment and prevention of infection. Students can also learn analytical laboratory methods for the identification of different types of ecto- and endoparasites. Case studies will be used to illustrate how the current advances in research are applied to understand and inform the epidemiology, control, and prevention of parasite mediated disease in animals and monitor emergent diseases globally and within the UK.</span></p></div></div></div></div></div></div><div class="col-12 nd_2022-23" data-dcnode-id="3022"><p class="my-3" data-dcnode-id="3023" id="modulesUgDisclaimer" style="color:#666; font-size:0.8em"><span data-dcnode-id="3024" instrument_node="">† Some courses may offer optional modules. The availability of optional modules may vary from year to year and will be subject to minimum student numbers being achieved. This means that the availability of specific optional modules cannot be guaranteed. Optional module selection may also be affected by staff availability.</span></p></div></div></div></div></div></div><modules class="nd_2022-23 current-year-module-set" data-dcnode-id="2654" style="display: none !important;"><module apiid="5849463" data-dcnode-id="3004"><title data-dcnode-id="3015">Animal Management 2022-23</title><code data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">BIO1221M</span></code><level data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">2022-23</span></academicyear><marketingsynopsis data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Animal Management will cover the contributions of animal scientists, welfare bodies, legislators, producers and consumers to the housing and management of captive animals. There will be a focus on the animals biological requirements in captivity and the application of good husbandry practice to farm, laboratory, zoo and companion animals of a wide range of taxonomic groups.</span></marketingsynopsis><coreoptional data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">Core</span></coreoptional></module><module apiid="5849490" data-dcnode-id="2991"><title data-dcnode-id="3002">Comparative Anatomy and Physiology of Animals 2022-23</title><code data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">ZOO1001M</span></code><level data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">2022-23</span></academicyear><marketingsynopsis data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Comparative Anatomy and Physiology of Animals is concerned with the principles of the diversity of anatomical form and function in animals using a comparative approach. Anatomical adaptations will be explored across taxa within the animal kingdom in order to show how different types of organisms use their anatomy to solve the similar physiological problems. Through this, an understanding will be developed of how organisms from different taxa address physiological aspects of their life histories.</span></marketingsynopsis><coreoptional data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Core</span></coreoptional></module><module apiid="5849519" data-dcnode-id="2978"><title data-dcnode-id="2989">Ecology 2022-23</title><code data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">BGY1010M</span></code><level data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">2022-23</span></academicyear><marketingsynopsis data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Ecology is the scientific study of the interactions between organisms and their environment. These interactions can be studied across different levels of biological organisation including individuals, populations, communities and ecosystems. This module will examine how these different levels of organisation are interconnected and how the study of ecology allows us to better understand patterns in the natural world</span></marketingsynopsis><coreoptional data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Core</span></coreoptional></module><module apiid="5849545" data-dcnode-id="2965"><title data-dcnode-id="2976">Introduction to Animal Behaviour and Welfare 2022-23</title><code data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">BIO1040M</span></code><level data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">2022-23</span></academicyear><marketingsynopsis data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">This module aims to introduce the principles underlying animal behaviour and the welfare of animals in our care. It will adopt approaches derived from Tinbergens levels of explanation of behaviour, such as control, lifetime development and adaptive value of behaviour. Students will have the opportunity to be taught how to observe and record the behaviour of animals from a range of taxonomic groups. The module will introduce approaches to animal welfare assessment and their application.</span></marketingsynopsis><coreoptional data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Core</span></coreoptional></module><module apiid="5849561" data-dcnode-id="2952"><title data-dcnode-id="2963">Introduction to Life Sciences 2022-23</title><code data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">BIO1043M</span></code><level data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">2022-23</span></academicyear><marketingsynopsis data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">Introduction to the Life Sciences is designed to provide a foundation for students to develop their knowledge and understanding of fundamental cell biology, biochemistry and genetics in the context of life sciences.</span></marketingsynopsis><coreoptional data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Core</span></coreoptional></module><module apiid="5849591" data-dcnode-id="2939"><title data-dcnode-id="2950">Research Methods for the Life Sciences 2022-23</title><code data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">BGY1012M</span></code><level data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">2022-23</span></academicyear><marketingsynopsis data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Research methods for the Life Sciences aims to introduce the skills and knowledge necessary for students to assimilate and judge scientific knowledge. Students will be introduced to the tools required to search and evaluate the scientific literature relevant to their studies, and some of the key philosophical constructs around which scientific knowledge is based. They will be taught about hypothesis testing, experimental design, data collection, basic mathematical and statistical concepts, and data presentation, and gain hands-on experience of their application.</span></marketingsynopsis><coreoptional data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Core</span></coreoptional></module><module apiid="6049704" data-dcnode-id="2926"><title data-dcnode-id="2937">Animal Behaviour 2023-24</title><code data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">BIO2033M</span></code><level data-dcnode-id="2933"><span data-dcnode-id="2934" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">This module is based on the four ethological levels of explanation for animal behaviour as introduced by Nikolaas Tinbergen, one of the fathers of ethology, in the 1960's: mechanism, development, function and evolution. It will deal primarily with the ethological concepts underlying the study of animal behaviour supported by classic experimental studies of domestic and wild animals from a wide range of taxonomic groups. The module will also cover the design, data collection, analyses and interpretation of behavioural studies in a variety of species both in the laboratory and in zoo</span></marketingsynopsis><coreoptional data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Core</span></coreoptional></module><module apiid="6114329" data-dcnode-id="2913"><title data-dcnode-id="2924">Animal Health and Disease 2023-24</title><code data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">BVS2003M</span></code><level data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">This module covers some aspects about animal health and disease. In particular, diseases of a wide variety of different animals, and the impacts which they pose to the animals, and humans. This will also include some levels of disease treatments, and control, and discuss different methods of these. Functional animal nutrition of various species to prevent disease and maintain optimal health, as well as how diseases can affect behaviour will also be included.</span></marketingsynopsis><coreoptional data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Core</span></coreoptional></module><module apiid="6117217" data-dcnode-id="2900"><title data-dcnode-id="2911">Animal Protection 2023-24</title><code data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">BIO2037M</span></code><level data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">This module explores the regulation and enforcement of animal protection including the background and need for legislation relating to animals, the scientific, political and legal procedures involved in forming legislation and how citizens may become involved in that process. Students develop critical analytical skills through the interpretation and application of legal frameworks as well as the evaluation of the research background underpinning the law. Students also learn to develop and present arguments used in decisions regarding animal protection</span></marketingsynopsis><coreoptional data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Core</span></coreoptional></module><module apiid="6049682" data-dcnode-id="2887"><title data-dcnode-id="2898">Conservation Biology 2023-24</title><code data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">BIO2107M</span></code><level data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">This module provides a critical insight into the application of the principles of conservation biology. It will give an overview of the nature, value and complex threats to biodiversity and will detail the biological problems faced by small populations of animals, in particular. The module will also deal with the practice of population conservation and management, including methods to assess population size, survival rates and how to use this information to assess the viability of populations.</span></marketingsynopsis><coreoptional data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">Core</span></coreoptional></module><module apiid="6049748" data-dcnode-id="2874"><title data-dcnode-id="2885">Data Skills for the Life Sciences 2023-24</title><code data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">BGY2011M</span></code><level data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Data-centric skills are crucial for any life scientist undertaking any form of data collection, management, visualisation, and/or analysis. This module introduces students to skills in data storage, handling, and manipulation; understanding different data types; visualising data; fitting statistical and analytical models; interpreting and reporting statistical and analytical results; and using these skills in experimental designs. In the age of information, computational skills are becoming ever more relevant, and this module will hone different computational skills. All these skills can aid students in undertaking future research projects, including the third-year honours project.</span></marketingsynopsis><coreoptional data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Core</span></coreoptional></module><module apiid="6049693" data-dcnode-id="2861"><title data-dcnode-id="2872">Evolution 2023-24</title><code data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">BGY2009M</span></code><level data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">The Evolution module aims to introduce the fundamental concepts and theories that explain and predict how biodiversity evolves as a result of multiple factors emerging from both ecological and sexual interactions. The integrative nature of this module guarantees that a broad diversity of the central topics in the field of evolution is covered.</span></marketingsynopsis><coreoptional data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Optional</span></coreoptional></module><module apiid="5849438" data-dcnode-id="2848"><title data-dcnode-id="2859">Immunology 2023-24</title><code data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">BGY2002M</span></code><level data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">This module provides an overview of the cellular and molecular basis of the immune response in health and human diseases. The structure, function and complex mechanisms of host defence by B- and T-Cells will be discussed. Students will evaluate the role of inflammatory mediators, soluble effectors and cellular cytotoxicity in inflammation and immunity.</span></marketingsynopsis><coreoptional data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Optional</span></coreoptional></module><module apiid="6049724" data-dcnode-id="2835"><title data-dcnode-id="2846">Invertebrate and Vertebrate Zoology 2023-24</title><code data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">ZOO2002M</span></code><level data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">This module is an introduction to the key major taxonomic groups of invertebrates and vertebrates. Major invertebrate groups will include inter alia: sponges, cnidarians, flatworms, nematodes, annelids, molluscs, arthropods, echinoderms, and cephalochordates. All major vertebrate classes will be considered in detail.</span></marketingsynopsis><coreoptional data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Optional</span></coreoptional></module><module apiid="6049672" data-dcnode-id="2822"><title data-dcnode-id="2833">Managing Ecosystems 2023-24</title><code data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">ECL2002M</span></code><level data-dcnode-id="2829"><span data-dcnode-id="2830" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">This module deals with managing ecosystems in a range of contexts, and includes assessing and addressing the impacts of human activity on ecological systems. It also examines the suitability of different management strategies to deal with a range of environmental problems.</span></marketingsynopsis><coreoptional data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Optional</span></coreoptional></module><module apiid="6114310" data-dcnode-id="2809"><title data-dcnode-id="2820">Reproduction and Development 2023-24</title><code data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">BIO2040M</span></code><level data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">This module focuses on reproduction and development in a range of invertebrates and vertebrates. There will be a comparative analysis of anatomy, physiology, behaviour and evolution of reproductive patterns, including the main anatomical features of male and female reproductive tracts. There will be descriptions of the processes of gamete production in males and females. The underlying principles of ontogeny from fertilisation to birth will be described in a variety of taxa with an emphasis on the factors controlling developmental processes. Additional content will focus on factors, e.g. environmental pollution, that affect reproduction and development in animals</span></marketingsynopsis><coreoptional data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Optional</span></coreoptional></module><module apiid="6029300" data-dcnode-id="2796"><title data-dcnode-id="2807">School of Pharmacy Study Abroad 2023-24</title><code data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">PHA2006M</span></code><level data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">The School believes that an option to study overseas is a valuable educational opportunity for our students. Provision of this option supports the educational aims of the School of Pharmacy and enhances the distinctiveness of its degrees at Lincoln. The optional year is intended to:



- enable students to benefit from studying within a cross cultural environment;

- expose students to a wider academic and cultural experience;

- enhance their future employment opportunities;

- by increasing their cultural and professional mobility.



This module is optional for students within the School. Study Abroad

is a year long module which enables students to spend a year studying abroad at one of the Universitys approved partner institutions. Eligible students must have completed their second year

of study to a satisfactory standard and successfully completed the application process for the year abroad.



During the year spent abroad, students share classes with local students and study on a suite of locally-delivered taught modules which have been approved in advance by the University. Upon their

return, as part of the assessment for this modules, students are required to critically reflect upon their experience of living and studying in a different cultural environment and the skills acquired.</span></marketingsynopsis><coreoptional data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Optional</span></coreoptional></module><module apiid="6049736" data-dcnode-id="2783"><title data-dcnode-id="2794">UK Field Course 2023-24</title><code data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">ECL2003M</span></code><level data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">This module aims to help students understand theory, develop skills, build tacit knowledge and importantly, integrate and apply know-how and skills acquired from prior learning to novel situations. The module is built around the principle of scientific enquiry and the ownership of that process by students in order to develop cognitive, affective and psychomotor skills. Student ownership will be developed throughout the module, culminating in an independent, residential in-situ field study in which they design a study, collect &amp; analyse data and present their findings.</span></marketingsynopsis><coreoptional data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Optional</span></coreoptional></module><module apiid="6049761" data-dcnode-id="2772"><title data-dcnode-id="2781">Work Experience 2023-24</title><code data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">BMS2014X</span></code><level data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">2023-24</span></academicyear><coreoptional data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">Optional</span></coreoptional></module><module apiid="6114384" data-dcnode-id="2759"><title data-dcnode-id="2770">Animal Cognition and Welfare 2024-25</title><code data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">BIO3204M</span></code><level data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">This module explores the scientific study of animal cognition and welfare, with particular attention focused on experimental design, methodological considerations, and interpretation. It will cover the objective assessment of animal cognition and welfare with research examples from both wild and captive animals.</span></marketingsynopsis><coreoptional data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Core</span></coreoptional></module><module apiid="7574535" data-dcnode-id="2746"><title data-dcnode-id="2757">Applied Animal Behaviour 2024-25</title><code data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">BIO3207M</span></code><level data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">This module applies the principles underpinning the management of animal behaviour to a range of real world situations including management of companion animals, farm animals, animals involved in research, and animals held in zoological collections. Particular emphasis is given to understanding the impact of alternative approaches to achieving desirable management outcomes and promoting animal welfare, involving a range of environmental and behavioural interventions. The module aims to equip students with knowledge and skills that will be valuable in postgraduate employment in animal-based industries as well as apply knowledge accrued during degree to current issues in animal-based industries.</span></marketingsynopsis><coreoptional data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Core</span></coreoptional></module><module apiid="6049610" data-dcnode-id="2733"><title data-dcnode-id="2744">Life Sciences Research Project 2024-25</title><code data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">BGY3003M</span></code><level data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">In this module, students undertake an independent programme of research under supervision from a member of staff. It provides students with an opportunity to demonstrate original and critical thought, as well as to build discipline-specific research and project-management skills. 

A wide range of subject expertise exists within the School, and students are expected to work on a project that is relevant to their programme of study. Under the guidance of a supervisor, students will review the literature, identify a research question/aim and objectives, and design a programme of research respectively. Students will be expected to manage the project and work in a safe and ethical manner, which will include undergoing training in and engaging with obtaining relevant ethical approval and risk assessment. Students will collect and analyse data, record their activities and research methodology and results in a lab book/ equivalent robust means of recording. 

We currently offer projects in the laboratory (wet or animal) or field, projects that involve data analysis, literature research, educational research, science communication research and market research. Students may work individually or in groups addressing similar questions, but must write up individually. The findings of the research will be written up and presented orally. The conduct and performance of the student as a research apprentice will be assessed.</span></marketingsynopsis><coreoptional data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">Core</span></coreoptional></module><module apiid="6049595" data-dcnode-id="2720"><title data-dcnode-id="2731">Behavioural Ecology 2024-25</title><code data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">BIO3026M</span></code><level data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Behavioural ecology examines the way in which behavioural repertoires contribute to survival and ultimately reproductive success. The module will focus on key topics including: Optimality Theory, Sexual Selection, Communication and Sensory Ecology, Altruism and Cooperation, Arms Races, Fighting and Assessment, Navigation and Migration, and Human Behaviour.</span></marketingsynopsis><coreoptional data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Optional</span></coreoptional></module><module apiid="6117206" data-dcnode-id="2707"><title data-dcnode-id="2718">Control of Animal Disease 2024-25</title><code data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">BVS3006M</span></code><level data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">The module aims to provide an understanding of the control of infectious disease in companion and animals, livestock species and wildlife. The module will explore practical control measures for diseases of animals, building explicitly on the knowledge and understanding gained in other modules. Particular areas of study will include:

- Nature and examples of important infectious pathogens
- Host Responses to Infectious Pathogens
- Control of disease at the level of the individual and population
- Manipulation of transmission dynamics
- Biosecurity and husbandry
- Treatment of disease
- Breeding or engineering genetically resistant animals
- Vaccination and design of novel vaccines.

These topics will be addressed in a holistic way that encourages students to be able to design and implement control strategies for known and emerging diseases. This ability will be explicitly tested in coursework and an oral examination.</span></marketingsynopsis><coreoptional data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Optional</span></coreoptional></module><module apiid="6049602" data-dcnode-id="2694"><title data-dcnode-id="2705">Overseas Field Course 2024-25</title><code data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">BIO3031M</span></code><level data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">This module provides students with the opportunity to investigate biological phenomena in the field at an overseas location. Students work in groups, guided by staff, to develop and test hypotheses allowing them to understand more about biological processes operating within the study area. They are encouraged to view the ecosystem within the wider context of the anthropogenic impacts being imposed on it.  This module is optional and courses run subject to sufficient student demand. Students who opt to undertake a field trip overseas will be expected to cover transport costs (including flight costs). These costs will vary depending on the location of the field trip. Accommodation and meals at the field sites are fully funded by the University. Students may be required to pay for overnight stays, local travel, and food close to the destination if their flights arrive the day before the team are scheduled to meet. Students may bring personal items of clothing and travel equipment, some of which may be specialised for the environment they are travelling to, and recommended medicines and travel toiletries such as anti-malaria medication, vaccinations, insect repellent, and sunscreen. These costs will depend on what students choose to bring.</span></marketingsynopsis><coreoptional data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Optional</span></coreoptional></module><module apiid="6049629" data-dcnode-id="2681"><title data-dcnode-id="2692">Plant and Animal Interactions 2024-25</title><code data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">BGY3011M</span></code><level data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">In this module students can gain an understanding of, and an appreciation for, the interactions between plants and animals that have been the driving force for the evolution of the world as we know it. Interactions between the flowering plants and vertebrate and invertebrate animals have led to the huge diversity of flowering plants that maintain the essential life support systems of the planet and are the basis of all current agricultural systems. Despite the huge economic costs of agricultural pests that damage plants, the evolutionary arms race between plants and their herbivores has driven the evolution of many of the important plant secondary compounds we use today as stimulants (e.g. caffeine) or drugs (e.g. salicylic acid = aspirin). Other economically, evolutionarily, or ecologically important plant-animal interactions include pollination and seed dispersal. Students can examine the economic, evolutionary, and ecological consequences of plant-animal interactions at scales from ecosystems to molecules. They will have the opportunity to develop their own perspective on this important topic, and will be asked to review and interpret and evaluate the evidence available in the primary literature.</span></marketingsynopsis><coreoptional data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Optional</span></coreoptional></module><module apiid="6049621" data-dcnode-id="2668"><title data-dcnode-id="2679">Practical Skills in Conservation 2024-25</title><code data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">ECL3002M</span></code><level data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Conservation of plants and animals usually involves interactions between multiple stakeholders including scientists, landowners, communities, government, and NGOs. A range of practical and transferable skills are therefore beneficial for employment in both conservation research and conservation practice. This module will refine certain such skills that students have acquired through their degree, and help them understand how to apply them in a conservation biology setting. Its focus is to provide opportunities for real world and experiential learning, and to progress relevant employability skills.</span></marketingsynopsis><coreoptional data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Optional</span></coreoptional></module><module apiid="6114362" data-dcnode-id="2655"><title data-dcnode-id="2666">Veterinary Parasitology 2024-25</title><code data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">BVS3005M</span></code><level data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">The impact of parasites to the health, welfare, and productivity of animals remains one of the most important issues in veterinary biology. A detailed understanding of the biology and epidemiology of parasites and the association they have with their hosts is vital in protecting and improving animals health and welfare. This module aims to provide a theoretical background for understanding the specialised features that parasites have developed to adapt to their host and transmit between hosts, the diseases which result, and advances in treatment and prevention of infection. Students can also learn analytical laboratory methods for the identification of different types of ecto- and endoparasites. Case studies will be used to illustrate how the current advances in research are applied to understand and inform the epidemiology, control, and prevention of parasite mediated disease in animals and monitor emergent diseases globally and within the UK.</span></marketingsynopsis><coreoptional data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Optional</span></coreoptional></module></modules><span data-dcnode-id="2653" instrument_node="">

</span><div class="col-12 mb-4 mb-md-0" data-dcnode-id="2613"><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">Students can participate in two residential fully-funded field trips in the UK, enabling them to study animals and plants in the wild. There is also an overseas field trip in the third year. Destinations may vary, but have previously included the cloud forests of Ecuador, the Mankwe Wildlife Reserve in South Africa, and Peniche in Portugal.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">This optional module in the third year provides the opportunity to do research in a novel environment and to study local plants and animals. Destinations may vary, but have previously included the cloud forests of Ecuador, the Mankwe Wildlife Reserve in South Africa, and Peniche in Portugal.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Students who opt to undertake a field trip overseas will be expected to cover transport costs (including flight costs). These costs will vary depending on the location of the field trip. Accommodation and meals at the field sites are fully funded by the University.</span></p><span data-dcnode-id="2616" instrument_node="">

</span><h2 class="h3 mb-4 text-primary" data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Informed by Research</span></h2><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">This course is informed by academics who are considered to be at the forefront of their respective fields in welfare assessment, animal management, evolutionary biology, and animal cognition. These include Professor Daniel Mills, Professor Anna Wilkinson, Professor Oliver Burman, and Dr Jonathan Cooper.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node="">Our research work is read widely by the scientific community as well as informing the Government, animal welfare sector, and animal industry regarding animal protection. Research projects have included leading work with cats, dogs, rabbits, horses, reptiles, and parrots, both at the University of Lincoln and working with research partners. Students at Lincoln have conducted project work on a wide range of zoo based species in partnership with local zoos, including polar bears, hunting dogs, tigers, meerkats, and primates. </span><br data-dcnode-id="2060"><br data-dcnode-id="2059"><span data-dcnode-id="2058" instrument_node="">As well as informing teaching by providing deeper understanding of how animals see the world, our engagement with animal welfare research and legislation provides insights into how to bring about meaningful, scientifically valid improvements in animal protection and the practical and effective management of animals in our care.</span></p><span data-dcnode-id="2056" instrument_node="">
</span></div><span data-dcnode-id="2054" instrument_node="">
</span><div class="col-12 col-md-6 text-center" data-dcnode-id="2050"><span data-dcnode-id="2053" instrument_node="">
</span><img alt="Daniel Mills and dog" class="img-fluid" data-dcnode-id="2052" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/media/responsive2017/images/course/studentworkshowcase/Informed%2Cby%2CResearch%2CDaniel%2CMills.jpg&amp;raw"><span data-dcnode-id="2051" instrument_node="">

</span><h2 class="h3 mb-4 text-primary" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Optional Placement Year</span></h2><span data-dcnode-id="2037" instrument_node="">
</span></div><span data-dcnode-id="2035" instrument_node="">
</span><div class="col-12 mb-4 mb-md-0" data-dcnode-id="2032"><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">All full-time Animal Behaviour and Welfare students may take an optional placement year between the second and third year of the programme. These placements are student-led though students will be continuously supported by academic staff throughout.&nbsp;Placements provide the opportunity to gain workplace experience and a chance to hone students' skills in a professional environment.&nbsp;When students are on an optional placement in the UK, they will be required to cover their own transport, accommodation, and meals costs.</span></p></div><span data-dcnode-id="2031" instrument_node="">
</span></div><span data-dcnode-id="2029" instrument_node="">
</span></div><span data-dcnode-id="2027" instrument_node="">
</span></div><span data-dcnode-id="2025" instrument_node="">
</span><div class="course-entry-requirements py-4" data-dcnode-id="1895" id="CourseEntryRequirements" style="background-color: #e1f2f6;"><div class="container" data-dcnode-id="1896"><div class="row" data-dcnode-id="1898"><div class="col-12" data-dcnode-id="1962" id="CourseEntryRequirementsApms"><div class="nd_2023-24" data-dcnode-id="1963"><h2 class="h3 mb-4 text-primary col-12" data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Entry Requirements 2023-24</span></h2><div class="card-deck col-12" data-dcnode-id="1979"><div class="card shadow border-0 rounded-lg" data-dcnode-id="2000"><div class="card-body" data-dcnode-id="2001"><h5 class="card-title text-primary" data-dcnode-id="2021" style="display:block;"><span data-dcnode-id="2022" instrument_node="">United Kingdom</span></h5><p class="linkify" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">A Level: BBB, to include a grade B in Biology or Psychology (120 UCAS Tariff points from a minimum of 3 A levels or equivalent qualifications).</span></p><p class="linkify" data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">International Baccalaureate: 30 points overall to include Higher Level grade 5 in Biology or Psychology.</span></p><p class="linkify" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">BTEC Extended Diploma in Animal Management/Applied Science*: Distinction, Distinction, Merit  or equivalent.</span></p><p class="linkify" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">*not all modules are accepted. Please contact our Admissions team for further information (admissions@lincoln.ac.uk). </span></p><p class="linkify" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">BTEC Diploma Applied Science acceptable with other qualifications. Please contact our Admissions team for further information (admissions@lincoln.ac.uk).</span></p><p class="linkify" data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Access to Higher Education Diploma: 45 Level 3 credits with a minimum of 120 UCAS Tariff points, including 40 points from 15 credits in Biology or Psychology.</span></p><p class="linkify" data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">A combination of qualifications which may include A Levels, BTEC, EPQ, etc.</span></p><p class="linkify" data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Applicants will also need at least three GCSEs at grade 4 (C) or above, which must include English, Maths, and Science.  Equivalent Level 2 qualifications may also be considered.</span></p><p class="linkify" data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">The University accepts a wide range of qualifications as the basis for entry.  We will also consider applicants with extensive and relevant work experience and will give special individual consideration to those who do not meet the standard entry qualifications.</span></p><p class="linkify" data-dcnode-id="2002"></p></div></div><div class="card shadow border-0 rounded-lg" data-dcnode-id="1980"><div class="card-body" data-dcnode-id="1981"><h5 class="card-title text-primary" data-dcnode-id="1998" style="display:block;"><span data-dcnode-id="1999" instrument_node="">International</span></h5><p class="linkify" data-dcnode-id="1997"></p><p class="linkify" data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Non UK Qualifications:</span></p><p class="linkify" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">If you have studied outside of the UK, and are unsure whether your qualification meets the above requirements, please visit our country pages for information on equivalent qualifications. </span></p><p class="linkify" data-dcnode-id="1990"><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lincoln.ac.uk/home/studywithus/internationalstudents/entryrequirementsandyourcountry/"><span data-dcnode-id="1992" instrument_node="">https://www.lincoln.ac.uk/home/studywithus/internationalstudents/entryrequirementsandyourcountry/</span></a></p><p class="linkify" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">EU and Overseas students will be required to demonstrate English language proficiency equivalent to IELTS 6.0 overall, with a minimum of 5.5 in each element. For information regarding other English language qualifications we accept, please visit the English Requirements page.</span></p><p class="linkify" data-dcnode-id="1985"><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lincoln.ac.uk/home/studywithus/internationalstudents/englishlanguagerequirementsandsupport/englishlanguagerequirements/"><span data-dcnode-id="1987" instrument_node="">https://www.lincoln.ac.uk/home/studywithus/internationalstudents/englishlanguagerequirementsandsupport/englishlanguagerequirements/</span></a></p><p class="linkify" data-dcnode-id="1982"><span data-dcnode-id="1984" instrument_node="">If you do not meet the above IELTS requirements, you may be able to take part in one of our Pre-sessional English and Academic Study Skills courses.</span><br data-dcnode-id="1983"></p></div></div></div><div class="mt-2 col-12" data-dcnode-id="1971"><p class="linkify" data-dcnode-id="1978"></p><p class="linkify" data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">For applicants who do not meet our standard entry requirements, our Science Foundation Year can provide an alternative route of entry onto our full degree programmes:</span></p><p class="linkify" data-dcnode-id="1972"><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lincoln.ac.uk/home/course/sfysfyub/lifesciences/"><span data-dcnode-id="1975" instrument_node="">https://www.lincoln.ac.uk/home/course/sfysfyub/lifesciences/</span></a><br data-dcnode-id="1973"></p></div><div class="mt-2 col-12" data-dcnode-id="1966"><p class="linkify" data-dcnode-id="1970"></p><p class="linkify" data-dcnode-id="1967"><span data-dcnode-id="1969" instrument_node="">If you would like further information about entry requirements, or would like to discuss whether the qualifications you are currently studying are acceptable, please contact the Admissions team on 01522 886097, or email admissions@lincoln.ac.uk</span><br data-dcnode-id="1968"></p></div><div class="mt-2 col-12" data-dcnode-id="1964"><p class="linkify" data-dcnode-id="1965"></p></div></div></div><span data-dcnode-id="1961" instrument_node="">
</span><div class="nd_2022-23" data-dcnode-id="1899"><h2 class="h3 mb-4 text-primary col-12" data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Entry Requirements 2022-23</span></h2><div class="card-deck col-12" data-dcnode-id="1915"><div class="card shadow border-0 rounded-lg" data-dcnode-id="1936"><div class="card-body" data-dcnode-id="1937"><h5 class="card-title text-primary" data-dcnode-id="1957" style="display:block;"><span data-dcnode-id="1958" instrument_node="">United Kingdom</span></h5><p class="linkify" data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">A Level: BBB, to include a grade B in Biology or Psychology (120 UCAS Tariff points from a minimum of 3 A levels or equivalent qualifications).</span></p><p class="linkify" data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">International Baccalaureate: 30 points overall to include Higher Level grade 5 in Biology or Psychology.</span></p><p class="linkify" data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">BTEC Extended Diploma in Animal Management/Applied Science*: Distinction, Distinction, Merit  or equivalent.</span></p><p class="linkify" data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">*not all modules are accepted. Please contact our Admissions team for further information (admissions@lincoln.ac.uk). </span></p><p class="linkify" data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">BTEC Diploma Applied Science acceptable with other qualifications. Please contact our Admissions team for further information (admissions@lincoln.ac.uk).</span></p><p class="linkify" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Access to Higher Education Diploma: 45 Level 3 credits with a minimum of 120 UCAS Tariff points, including 40 points from 15 credits in Biology or Psychology.</span></p><p class="linkify" data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">A combination of qualifications which may include A Levels, BTEC, EPQ, etc.</span></p><p class="linkify" data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Applicants will also need at least three GCSEs at grade 4 (C) or above, which must include English, Maths, and Science.  Equivalent Level 2 qualifications may also be considered.</span></p><p class="linkify" data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">The University accepts a wide range of qualifications as the basis for entry.  We will also consider applicants with extensive and relevant work experience and will give special individual consideration to those who do not meet the standard entry qualifications.</span></p><p class="linkify" data-dcnode-id="1938"></p></div></div><div class="card shadow border-0 rounded-lg" data-dcnode-id="1916"><div class="card-body" data-dcnode-id="1917"><h5 class="card-title text-primary" data-dcnode-id="1934" style="display:block;"><span data-dcnode-id="1935" instrument_node="">International</span></h5><p class="linkify" data-dcnode-id="1933"></p><p class="linkify" data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Non UK Qualifications:</span></p><p class="linkify" data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">If you have studied outside of the UK, and are unsure whether your qualification meets the above requirements, please visit our country pages for information on equivalent qualifications. </span></p><p class="linkify" data-dcnode-id="1926"><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lincoln.ac.uk/home/studywithus/internationalstudents/entryrequirementsandyourcountry/"><span data-dcnode-id="1928" instrument_node="">https://www.lincoln.ac.uk/home/studywithus/internationalstudents/entryrequirementsandyourcountry/</span></a></p><p class="linkify" data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">EU and Overseas students will be required to demonstrate English language proficiency equivalent to IELTS 6.0 overall, with a minimum of 5.5 in each element. For information regarding other English language qualifications we accept, please visit the English Requirements page.</span></p><p class="linkify" data-dcnode-id="1921"><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lincoln.ac.uk/home/studywithus/internationalstudents/englishlanguagerequirementsandsupport/englishlanguagerequirements/"><span data-dcnode-id="1923" instrument_node="">https://www.lincoln.ac.uk/home/studywithus/internationalstudents/englishlanguagerequirementsandsupport/englishlanguagerequirements/</span></a></p><p class="linkify" data-dcnode-id="1918"><span data-dcnode-id="1920" instrument_node="">If you do not meet the above IELTS requirements, you may be able to take part in one of our Pre-sessional English and Academic Study Skills courses.</span><br data-dcnode-id="1919"></p></div></div></div><div class="mt-2 col-12" data-dcnode-id="1907"><p class="linkify" data-dcnode-id="1914"></p><p class="linkify" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">For applicants who do not meet our standard entry requirements, our Science Foundation Year can provide an alternative route of entry onto our full degree programmes:</span></p><p class="linkify" data-dcnode-id="1908"><a data-dcnode-id="1910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lincoln.ac.uk/home/course/sfysfyub/lifesciences/"><span data-dcnode-id="1911" instrument_node="">https://www.lincoln.ac.uk/home/course/sfysfyub/lifesciences/</span></a><br data-dcnode-id="1909"></p></div><div class="mt-2 col-12" data-dcnode-id="1902"><p class="linkify" data-dcnode-id="1906"></p><p class="linkify" data-dcnode-id="1903"><span data-dcnode-id="1905" instrument_node="">If you would like further information about entry requirements, or would like to discuss whether the qualifications you are currently studying are acceptable, please contact the Admissions team on 01522 886097, or email admissions@lincoln.ac.uk</span><br data-dcnode-id="1904"></p></div><div class="mt-2 col-12" data-dcnode-id="1900"><p class="linkify" data-dcnode-id="1901"></p></div></div></div><span data-dcnode-id="1897" instrument_node="">
