</span><p class="h5 mb-3" data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">Dr Jonathan Cooper - Programme Leader</span></p><span data-dcnode-id="4573" instrument_node="">
</span><p data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">Jonathan Cooper has been a leading academic in animal welfare research for over 30 years. His early research involved understanding the causes and effects of stereotypic behaviour in captive animals, the welfare of caged hens, and the welfare of fur-farmed mink. More recently, he has investigated the use of electronic aids in dogs and the housing of captive carnivores in zoos, and this work has contributed to changing practise in dog training and zoo animal management.</span></p><span data-dcnode-id="4570" instrument_node="">
</span><a class="btn btn-primary d-inline-block" data-dcnode-id="4568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lincoln.ac.uk/lifesciences/staffcontactlist/"><span data-dcnode-id="4569" instrument_node="">Academic Staff List</span></a><span data-dcnode-id="4567" instrument_node="">
</span></div><span data-dcnode-id="4565" instrument_node="">
</span></div><span data-dcnode-id="4563" instrument_node="">
</span></div><span data-dcnode-id="4561" instrument_node="">
</span></div><div class="course-row py-4" data-dcnode-id="4523" id="CourseDescriptionApms"><div aria-label="Course introduction for BSc (Hons) Animal Behaviour and Welfare (2023-24)" class="nd_2023-24 course-general-study-information" data-dcnode-id="4543"><div class="container" data-dcnode-id="4544"><div class="row" data-dcnode-id="4545"><div class="col-12" data-dcnode-id="4557"><h2 class="h3 mb-4" data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">Welcome to BSc (Hons) Animal Behaviour and Welfare</span></h2></div><div class="col-12 mb-4 mb-md-0" data-dcnode-id="4546"><p class="linkify" data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">The scientific study of animal behaviour and welfare furthers our understanding of why animals behave in the way that they do, and helps us learn how best to respond to the challenges that animals face when living in captive and wild environments.</span></p><p class="linkify" data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">This degree employs a multi-disciplinary, research-driven approach to the study of animal behaviour and welfare. The course aims to help students develop the knowledge and skills needed to understand animal behaviour and welfare, working, for example, with insects, reptiles, birds, and mammals.</span></p><p class="linkify" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">It is informed by academics who are considered to be at the forefront of their respective fields in welfare assessment, animal management, evolutionary biology, and animal cognition. This includes leading experts Professor Daniel Mills, who specialises in clinical animal behaviour; Professor Anna Wilkinson, who specialises in animal cognition; and Professor Oliver Burman, who specialises in assessment of animal welfare.</span></p><p class="linkify" data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">There are two residential field trips in the UK, enabling students to study animals in their natural habitats and develop their academic and professional skills in the field. For UK based field trips, the University will cover costs of transport, accommodation, and meals at the field site. </span></p><p class="linkify" data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">There is also an overseas field trip available in the third year as part of the optional 'Overseas Field Course' module.</span></p></div></div></div></div><span data-dcnode-id="4542" instrument_node="">
</span><div aria-label="Course introduction for BSc (Hons) Animal Behaviour and Welfare (2022-23)" class="nd_2022-23 course-general-study-information" data-dcnode-id="4525"><div class="container" data-dcnode-id="4526"><div class="row" data-dcnode-id="4527"><div class="col-12" data-dcnode-id="4539"><h2 class="h3 mb-4" data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">Welcome to BSc (Hons) Animal Behaviour and Welfare</span></h2></div><div class="col-12 mb-4 mb-md-0" data-dcnode-id="4528"><p class="linkify" data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">The scientific study of animal behaviour and welfare furthers our understanding of why animals behave in the way that they do, and helps us learn how best to respond to the challenges that animals face when living in captive and wild environments.</span></p><p class="linkify" data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">This degree employs a multi-disciplinary, research-driven approach to the study of animal behaviour and welfare. The course aims to help students develop the knowledge and skills needed to understand animal behaviour and welfare, working, for example, with insects, reptiles, birds, and mammals.</span></p><p class="linkify" data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">It is informed by academics who are considered to be at the forefront of their respective fields in welfare assessment, animal management, evolutionary biology, and animal cognition. This includes leading experts Professor Daniel Mills, who specialises in clinical animal behaviour; Professor Anna Wilkinson, who specialises in animal cognition; and Professor Oliver Burman, who specialises in assessment of animal welfare.</span></p><p class="linkify" data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">There are two residential field trips in the UK, enabling students to study animals in their natural habitats and develop their academic and professional skills in the field. For UK based field trips, the University will cover costs of transport, accommodation, and meals at the field site. </span></p><p class="linkify" data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">There is also an overseas field trip available in your third year as part of the optional 'Overseas Field Course' module.</span></p></div></div></div></div><span data-dcnode-id="4524" instrument_node="">
</span></div><span data-dcnode-id="4522" instrument_node="">
</span><div aria-label="Biology Information Banner - Field Trip " class="d-flex flex-column uol-course-full-width-banner mb-4" data-dcnode-id="4514" style="background-color: #047e8b;"><div class="container overlay-image" data-dcnode-id="4515"><div class="row justify-content-sm-center text-white py-3 my-lg-2 my-xl-3 uol-banner-content" data-dcnode-id="4516"><div class="col-lg-6 text-center" data-dcnode-id="4517"><h2 data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">Did You Know?</span></h2><p class="cta-intro" data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">There is an optional overseas field trip in the third year where previous students have visited the cloud forests of Ecuador, the Mankwe Wildlife Reserve in South Africa, and Peniche in Portugal.</span></p></div></div></div></div><span data-dcnode-id="4513" instrument_node="">

3-24" data-dcnode-id="3717" id="v-pills-tabContent"></div></div></div></div></div><div class="col-12 nd_2023-24" data-dcnode-id="3710"><p class="my-3" data-dcnode-id="3711" id="modulesUgDisclaimer" style="color:#666; font-size:0.8em"><span data-dcnode-id="3712" instrument_node="">† Some courses may offer optional modules. The availability of optional modules may vary from year to year and will be subject to minimum student numbers being achieved. This means that the availability of specific optional modules cannot be guaranteed. Optional module selection may also be affected by staff availability.</span></p></div></div></div></div></div></div><modules class="nd_2023-24" data-dcnode-id="3342" style="display: none !important;"><module apiid="6916634" data-dcnode-id="3692"><title data-dcnode-id="3703">Animal Management 2023-24</title><code data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">BIO1221M</span></code><level data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Animal Management will cover the contributions of animal scientists, welfare bodies, legislators, producers and consumers to the housing and management of captive animals. There will be a focus on the animals biological requirements in captivity and the application of good husbandry practice to farm, laboratory, zoo and companion animals of a wide range of taxonomic groups.</span></marketingsynopsis><coreoptional data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">Core</span></coreoptional></module><module apiid="6916670" data-dcnode-id="3679"><title data-dcnode-id="3690">Comparative Anatomy and Physiology of Animals 2023-24</title><code data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">ZOO1001M</span></code><level data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Comparative Anatomy and Physiology of Animals is concerned with the principles of the diversity of anatomical form and function in animals using a comparative approach. Anatomical adaptations will be explored across taxa within the animal kingdom in order to show how different types of organisms use their anatomy to solve the similar physiological problems. Through this, an understanding will be developed of how organisms from different taxa address physiological aspects of their life histories.</span></marketingsynopsis><coreoptional data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Core</span></coreoptional></module><module apiid="6916643" data-dcnode-id="3666"><title data-dcnode-id="3677">Ecology 2023-24</title><code data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">BGY1010M</span></code><level data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Ecology is the scientific study of the interactions between organisms and their environment. These interactions can be studied across different levels of biological organisation including individuals, populations, communities and ecosystems. This module will examine how these different levels of organisation are interconnected and how the study of ecology allows us to better understand patterns in the natural world</span></marketingsynopsis><coreoptional data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">Core</span></coreoptional></module><module apiid="6916625" data-dcnode-id="3653"><title data-dcnode-id="3664">Introduction to Animal Behaviour and Welfare 2023-24</title><code data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">BIO1040M</span></code><level data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">This module aims to introduce the principles underlying animal behaviour and the welfare of animals in our care. It will adopt approaches derived from Tinbergens levels of explanation of behaviour, such as control, lifetime development and adaptive value of behaviour. Students will have the opportunity to be taught how to observe and record the behaviour of animals from a range of taxonomic groups. The module will introduce approaches to animal welfare assessment and their application.</span></marketingsynopsis><coreoptional data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">Core</span></coreoptional></module><module apiid="6916657" data-dcnode-id="3640"><title data-dcnode-id="3651">Introduction to Life Sciences 2023-24</title><code data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">BIO1043M</span></code><level data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Introduction to the Life Sciences is designed to provide a foundation for students to develop their knowledge and understanding of fundamental cell biology, biochemistry and genetics in the context of life sciences.</span></marketingsynopsis><coreoptional data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Core</span></coreoptional></module><module apiid="6916613" data-dcnode-id="3627"><title data-dcnode-id="3638">Research Methods for the Life Sciences 2023-24</title><code data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">BGY1012M</span></code><level data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">Level 4</span></level><academicyear data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">2023-24</span></academicyear><marketingsynopsis data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Research methods for the Life Sciences aims to introduce the skills and knowledge necessary for students to assimilate and judge scientific knowledge. Students will be introduced to the tools required to search and evaluate the scientific literature relevant to their studies, and some of the key philosophical constructs around which scientific knowledge is based. They will be taught about hypothesis testing, experimental design, data collection, basic mathematical and statistical concepts, and data presentation, and gain hands-on experience of their application.</span></marketingsynopsis><coreoptional data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Core</span></coreoptional></module><module apiid="6916745" data-dcnode-id="3614"><title data-dcnode-id="3625">Animal Behaviour 2024-25</title><code data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">BIO2033M</span></code><level data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">This module is based on the four ethological levels of explanation for animal behaviour as introduced by Nikolaas Tinbergen, one of the fathers of ethology, in the 1960's: mechanism, development, function and evolution. It will deal primarily with the ethological concepts underlying the study of animal behaviour supported by classic experimental studies of domestic and wild animals from a wide range of taxonomic groups. The module will also cover the design, data collection, analyses and interpretation of behavioural studies in a variety of species both in the laboratory and in zoo</span></marketingsynopsis><coreoptional data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Core</span></coreoptional></module><module apiid="6916784" data-dcnode-id="3601"><title data-dcnode-id="3612">Animal Health and Disease 2024-25</title><code data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">BVS2003M</span></code><level data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3606"><span data-dcnode-id="3607" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">This module covers some aspects about animal health and disease. In particular, diseases of a wide variety of different animals, and the impacts which they pose to the animals, and humans. This will also include some levels of disease treatments, and control, and discuss different methods of these. Functional animal nutrition of various species to prevent disease and maintain optimal health, as well as how diseases can affect behaviour will also be included.</span></marketingsynopsis><coreoptional data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">Core</span></coreoptional></module><module apiid="6916725" data-dcnode-id="3588"><title data-dcnode-id="3599">Animal Protection 2024-25</title><code data-dcnode-id="3597"><span data-dcnode-id="3598" instrument_node="">BIO2037M</span></code><level data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">This module explores the regulation and enforcement of animal protection including the background and need for legislation relating to animals, the scientific, political and legal procedures involved in forming legislation and how citizens may become involved in that process. Students develop critical analytical skills through the interpretation and application of legal frameworks as well as the evaluation of the research background underpinning the law. Students also learn to develop and present arguments used in decisions regarding animal protection</span></marketingsynopsis><coreoptional data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Core</span></coreoptional></module><module apiid="6916734" data-dcnode-id="3575"><title data-dcnode-id="3586">Conservation Biology 2024-25</title><code data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">BIO2107M</span></code><level data-dcnode-id="3582"><span data-dcnode-id="3583" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">This module provides a critical insight into the application of the principles of conservation biology. It will give an overview of the nature, value and complex threats to biodiversity and will detail the biological problems faced by small populations of animals, in particular. The module will also deal with the practice of population conservation and management, including methods to assess population size, survival rates and how to use this information to assess the viability of populations.</span></marketingsynopsis><coreoptional data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Core</span></coreoptional></module><module apiid="6916769" data-dcnode-id="3562"><title data-dcnode-id="3573">Data Skills for the Life Sciences 2024-25</title><code data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">BGY2011M</span></code><level data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3567"><span data-dcnode-id="3568" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Data-centric skills are crucial for any life scientist undertaking any form of data collection, management, visualisation, and/or analysis. This module introduces students to skills in data storage, handling, and manipulation; understanding different data types; visualising data; fitting statistical and analytical models; interpreting and reporting statistical and analytical results; and using these skills in experimental designs. In the age of information, computational skills are becoming ever more relevant, and this module will hone different computational skills. All these skills can aid students in undertaking future research projects, including the third-year honours project.</span></marketingsynopsis><coreoptional data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Core</span></coreoptional></module><module apiid="6916714" data-dcnode-id="3549"><title data-dcnode-id="3560">Evolution 2024-25</title><code data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">BGY2009M</span></code><level data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">The Evolution module aims to introduce the fundamental concepts and theories that explain and predict how biodiversity evolves as a result of multiple factors emerging from both ecological and sexual interactions. The integrative nature of this module guarantees that a broad diversity of the central topics in the field of evolution is covered.</span></marketingsynopsis><coreoptional data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">Optional</span></coreoptional></module><module apiid="6916703" data-dcnode-id="3536"><title data-dcnode-id="3547">Immunology 2024-25</title><code data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">BGY2002M</span></code><level data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">This module provides an overview of the cellular and molecular basis of the immune response in health and human diseases. The structure, function and complex mechanisms of host defence by B- and T-Cells will be discussed. Students will evaluate the role of inflammatory mediators, soluble effectors and cellular cytotoxicity in inflammation and immunity.</span></marketingsynopsis><coreoptional data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Optional</span></coreoptional></module><module apiid="6916796" data-dcnode-id="3523"><title data-dcnode-id="3534">Invertebrate and Vertebrate Zoology 2024-25</title><code data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">ZOO2002M</span></code><level data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">This module is an introduction to the key major taxonomic groups of invertebrates and vertebrates. Major invertebrate groups will include inter alia: sponges, cnidarians, flatworms, nematodes, annelids, molluscs, arthropods, echinoderms, and cephalochordates. All major vertebrate classes will be considered in detail.</span></marketingsynopsis><coreoptional data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">Optional</span></coreoptional></module><module apiid="6916808" data-dcnode-id="3510"><title data-dcnode-id="3521">Managing Ecosystems 2024-25</title><code data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">ECL2002M</span></code><level data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">This module deals with managing ecosystems in a range of contexts, and includes assessing and addressing the impacts of human activity on ecological systems. It also examines the suitability of different management strategies to deal with a range of environmental problems.</span></marketingsynopsis><coreoptional data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">Optional</span></coreoptional></module><module apiid="6916693" data-dcnode-id="3497"><title data-dcnode-id="3508">Reproduction and Development 2024-25</title><code data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">BIO2040M</span></code><level data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">This module focuses on reproduction and development in a range of invertebrates and vertebrates. There will be a comparative analysis of anatomy, physiology, behaviour and evolution of reproductive patterns, including the main anatomical features of male and female reproductive tracts. There will be descriptions of the processes of gamete production in males and females. The underlying principles of ontogeny from fertilisation to birth will be described in a variety of taxa with an emphasis on the factors controlling developmental processes. Additional content will focus on factors, e.g. environmental pollution, that affect reproduction and development in animals</span></marketingsynopsis><coreoptional data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">Optional</span></coreoptional></module><module apiid="6916682" data-dcnode-id="3484"><title data-dcnode-id="3495">School of Pharmacy Study Abroad 2024-25</title><code data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">PHA2006M</span></code><level data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">The School believes that an option to study overseas is a valuable educational opportunity for our students. Provision of this option supports the educational aims of the School of Pharmacy and enhances the distinctiveness of its degrees at Lincoln. The optional year is intended to:

- enable students to benefit from studying within a cross cultural environment;

- expose students to a wider academic and cultural experience;

- enhance their future employment opportunities;

- by increasing their cultural and professional mobility.

This module is optional for students within the School. 

Study Abroad is a year long module which enables students to spend a year studying abroad at one of the Universitys approved partner institutions. Eligible students must have completed their second year of study to a satisfactory standard and successfully completed the application process for the year abroad.

During the year spent abroad, students share classes with local students and study on a suite of locally-delivered taught modules which have been approved in advance by the University. Upon their return, as part of the assessment for this modules, students are required to critically reflect upon their experience of living and studying in a different cultural environment and the skills acquired.</span></marketingsynopsis><coreoptional data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">Optional</span></coreoptional></module><module apiid="6916820" data-dcnode-id="3471"><title data-dcnode-id="3482">UK Field Course 2024-25</title><code data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">ECL2003M</span></code><level data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">2024-25</span></academicyear><marketingsynopsis data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">This module aims to help students understand theory, develop skills, build tacit knowledge and importantly, integrate and apply know-how and skills acquired from prior learning to novel situations. The module is built around the principle of scientific enquiry and the ownership of that process by students in order to develop cognitive, affective and psychomotor skills. Student ownership will be developed throughout the module, culminating in an independent, residential in-situ field study in which they design a study, collect &amp; analyse data and present their findings.</span></marketingsynopsis><coreoptional data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Optional</span></coreoptional></module><module apiid="6916755" data-dcnode-id="3460"><title data-dcnode-id="3469">Work Experience 2024-25</title><code data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">BMS2014X</span></code><level data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">Level 5</span></level><academicyear data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">2024-25</span></academicyear><coreoptional data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">Optional</span></coreoptional></module><module apiid="6916878" data-dcnode-id="3447"><title data-dcnode-id="3458">Animal Cognition and Welfare 2025-26</title><code data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">BIO3204M</span></code><level data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">This module explores the scientific study of animal cognition and welfare, with particular attention focused on experimental design, methodological considerations, and interpretation. It will cover the objective assessment of animal cognition and welfare with research examples from both wild and captive animals.</span></marketingsynopsis><coreoptional data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">Core</span></coreoptional></module><module apiid="7574651" data-dcnode-id="3434"><title data-dcnode-id="3445">Applied Animal Behaviour 2025-26</title><code data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">BIO3207M</span></code><level data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">This module applies the principles underpinning the management of animal behaviour to a range of real world situations including management of companion animals, farm animals, animals involved in research, and animals held in zoological collections. Particular emphasis is given to understanding the impact of alternative approaches to achieving desirable management outcomes and promoting animal welfare, involving a range of environmental and behavioural interventions. The module aims to equip students with knowledge and skills that will be valuable in postgraduate employment in animal-based industries as well as apply knowledge accrued during degree to current issues in animal-based industries.</span></marketingsynopsis><coreoptional data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Core</span></coreoptional></module><module apiid="6916847" data-dcnode-id="3421"><title data-dcnode-id="3432">Life Sciences Research Project 2025-26</title><code data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">BGY3003M</span></code><level data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">In this module, students undertake an independent programme of research under supervision from a member of staff. It provides students with an opportunity to demonstrate original and critical thought, as well as to build discipline-specific research and project-management skills. 

A wide range of subject expertise exists within the School, and students are expected to work on a project that is relevant to their programme of study. Under the guidance of a supervisor, students will review the literature, identify a research question/aim and objectives, and design a programme of research respectively. Students will be expected to manage the project and work in a safe and ethical manner, which will include undergoing training in and engaging with obtaining relevant ethical approval and risk assessment. Students will collect and analyse data, record their activities and research methodology and results in a lab book/ equivalent robust means of recording. 

We currently offer projects in the laboratory (wet or animal) or field, projects that involve data analysis, literature research, educational research, science communication research and market research. Students may work individually or in groups addressing similar questions, but must write up individually. The findings of the research will be written up and presented orally. The conduct and performance of the student as a research apprentice will be assessed.</span></marketingsynopsis><coreoptional data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Core</span></coreoptional></module><module apiid="6916840" data-dcnode-id="3408"><title data-dcnode-id="3419">Behavioural Ecology 2025-26</title><code data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">BIO3026M</span></code><level data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3411"><span data-dcnode-id="3412" instrument_node="">Behavioural ecology examines the way in which behavioural repertoires contribute to survival and ultimately reproductive success. The module will focus on key topics including: Optimality Theory, Sexual Selection, Communication and Sensory Ecology, Altruism and Cooperation, Arms Races, Fighting and Assessment, Navigation and Migration, and Human Behaviour.</span></marketingsynopsis><coreoptional data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Optional</span></coreoptional></module><module apiid="6916890" data-dcnode-id="3395"><title data-dcnode-id="3406">Control of Animal Disease 2025-26</title><code data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">BVS3006M</span></code><level data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3400"><span data-dcnode-id="3401" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">The module aims to provide an understanding of the control of infectious disease in companion and animals, livestock species and wildlife. The module will explore practical control measures for diseases of animals, building explicitly on the knowledge and understanding gained in other modules. Particular areas of study will include:

- Nature and examples of important infectious pathogens
- Host Responses to Infectious Pathogens
- Control of disease at the level of the individual and population
- Manipulation of transmission dynamics
- Biosecurity and husbandry
- Treatment of disease
- Breeding or engineering genetically resistant animals
- Vaccination and design of novel vaccines.

These topics will be addressed in a holistic way that encourages students to be able to design and implement control strategies for known and emerging diseases. This ability will be explicitly tested in coursework and an oral examination.</span></marketingsynopsis><coreoptional data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Optional</span></coreoptional></module><module apiid="6916832" data-dcnode-id="3382"><title data-dcnode-id="3393">Overseas Field Course 2025-26</title><code data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">BIO3031M</span></code><level data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">This module provides students with the opportunity to investigate biological phenomena in the field at an overseas location. Students work in groups, guided by staff, to develop and test hypotheses allowing them to understand more about biological processes operating within the study area. They are encouraged to view the ecosystem within the wider context of the anthropogenic impacts being imposed on it.  This module is optional and courses run subject to sufficient student demand. Students who opt to undertake a field trip overseas will be expected to cover transport costs (including flight costs). These costs will vary depending on the location of the field trip. Accommodation and meals at the field sites are fully funded by the University. Students may be required to pay for overnight stays, local travel, and food close to the destination if their flights arrive the day before the team are scheduled to meet. Students may bring personal items of clothing and travel equipment, some of which may be specialised for the environment they are travelling to, and recommended medicines and travel toiletries such as anti-malaria medication, vaccinations, insect repellent, and sunscreen. These costs will depend on what students choose to bring.</span></marketingsynopsis><coreoptional data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">Optional</span></coreoptional></module><module apiid="6916901" data-dcnode-id="3369"><title data-dcnode-id="3380">Plant and Animal Interactions 2025-26</title><code data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">BGY3011M</span></code><level data-dcnode-id="3376"><span data-dcnode-id="3377" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">In this module students can gain an understanding of, and an appreciation for, the interactions between plants and animals that have been the driving force for the evolution of the world as we know it. Interactions between the flowering plants and vertebrate and invertebrate animals have led to the huge diversity of flowering plants that maintain the essential life support systems of the planet and are the basis of all current agricultural systems. Despite the huge economic costs of agricultural pests that damage plants, the evolutionary arms race between plants and their herbivores has driven the evolution of many of the important plant secondary compounds we use today as stimulants (e.g. caffeine) or drugs (e.g. salicylic acid = aspirin). Other economically, evolutionarily, or ecologically important plant-animal interactions include pollination and seed dispersal. Students can examine the economic, evolutionary, and ecological consequences of plant-animal interactions at scales from ecosystems to molecules. They will have the opportunity to develop their own perspective on this important topic, and will be asked to review and interpret and evaluate the evidence available in the primary literature.</span></marketingsynopsis><coreoptional data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">Optional</span></coreoptional></module><module apiid="6916911" data-dcnode-id="3356"><title data-dcnode-id="3367">Practical Skills in Conservation 2025-26</title><code data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">ECL3002M</span></code><level data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Conservation of plants and animals usually involves interactions between multiple stakeholders including scientists, landowners, communities, government, and NGOs. A range of practical and transferable skills are therefore beneficial for employment in both conservation research and conservation practice. This module will refine certain such skills that students have acquired through their degree, and help them understand how to apply them in a conservation biology setting. Its focus is to provide opportunities for real world and experiential learning, and to progress relevant employability skills.</span></marketingsynopsis><coreoptional data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Optional</span></coreoptional></module><module apiid="6916858" data-dcnode-id="3343"><title data-dcnode-id="3354">Veterinary Parasitology 2025-26</title><code data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">BVS3005M</span></code><level data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Level 6</span></level><academicyear data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">2025-26</span></academicyear><marketingsynopsis data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">The impact of parasites to the health, welfare, and productivity of animals remains one of the most important issues in veterinary biology. A detailed understanding of the biology and epidemiology of parasites and the association they have with their hosts is vital in protecting and improving animals health and welfare. This module aims to provide a theoretical background for understanding the specialised features that parasites have developed to adapt to their host and transmit between hosts, the diseases which result, and advances in treatment and prevention of infection. Students can also learn analytical laboratory methods for the identification of different types of ecto- and endoparasites. Case studies will be used to illustrate how the current advances in research are applied to understand and inform the epidemiology, control, and prevention of parasite mediated disease in animals and monitor emergent diseases globally and within the UK.</span></marketingsynopsis><coreoptional data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">Optional</span></coreoptional></module></modules><span data-dcnode-id="3341" instrument_node="">
</span><div class="nd_2022-23" data-dcnode-id="3017"><div class="container" data-dcnode-id="3018" id="CourseModulesApmsInner"><h2 class="h3 mb-4 text-primary col-12" data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">An Introduction to Your Modules</span></h2><div class="card-deck col-12" data-dcnode-id="3019"><div class="card shadow border-0 rounded-lg" data-dcnode-id="3020"><div class="card-body" data-dcnode-id="3021"><ul class="nav nav-tabs" data-dcnode-id="3326" id="myTab" role="tablist"><li class="nav-item levelFoundationTabButton" data-dcnode-id="3338" style="display:none;"></li><li class="nav-item levelFourTabButton" data-dcnode-id="3335" style=""><a aria-controls="levelFour" aria-selected="true" class="nav-link text-capitalize active" data-dcnode-id="3336" data-toggle="tab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23levelFour2022-23" id="levelFour-tab" role="tab"><span data-dcnode-id="3337" instrument_node="">First Year</span></a></li><li class="nav-item levelFiveTabButton" data-dcnode-id="3332" style=""><a aria-controls="levelFive" aria-selected="false" class="nav-link text-capitalize" data-dcnode-id="3333" data-toggle="tab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23levelFive2022-23" id="levelFive-tab" role="tab"><span data-dcnode-id="3334" instrument_node="">Second Year</span></a></li><li class="nav-item levelSixTabButton" data-dcnode-id="3329" style=""><a aria-controls="levelSix" aria-selected="false" class="nav-link text-capitalize" data-dcnode-id="3330" data-toggle="tab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23levelSix2022-23" id="levelSix-tab" role="tab"><span data-dcnode-id="3331" instrument_node="">Third Year</span></a></li><li class="nav-item levelSevenTabButton" data-dcnode-id="3328" style="display:none;"></li><li class="nav-item levelEightTabButton" data-dcnode-id="3327" style="display:none;"></li></ul><div class="tab-content mt-4 nd_2022-23" data-dcnode-id="3025" id="course-module-content"><div aria-labelledby="levelFour-tab" class="tab-pane levelFour-tab fade active show" data-dcnode-id="3266" id="levelFour2022-23" role="tabpanel"><div class="row" data-dcnode-id="3267"><div class="col-12 col-lg-3 module-pill-wrapper" data-dcnode-id="3300"><div aria-orientation="vertical" class="nav flex-column nav-pills nd_2022-23" data-dcnode-id="3301" id="v-pills-tab" role="tablist"><a aria-controls="v-pills-12022-23" aria-selected="true" class="nav-link active" data-dcnode-id="3322" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-12022-23" id="v-pills-12022-23-tab" role="tab"><span data-dcnode-id="3325" instrument_node="">Animal Management   </span><em data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-22022-23" aria-selected="true" class="nav-link" data-dcnode-id="3318" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-22022-23" id="v-pills-22022-23-tab" role="tab"><span data-dcnode-id="3321" instrument_node="">Comparative Anatomy and Physiology of Animals   </span><em data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-32022-23" aria-selected="true" class="nav-link" data-dcnode-id="3314" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-32022-23" id="v-pills-32022-23-tab" role="tab"><span data-dcnode-id="3317" instrument_node="">Ecology   </span><em data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-42022-23" aria-selected="true" class="nav-link" data-dcnode-id="3310" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-42022-23" id="v-pills-42022-23-tab" role="tab"><span data-dcnode-id="3313" instrument_node="">Introduction to Animal Behaviour and Welfare   </span><em data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-52022-23" aria-selected="true" class="nav-link" data-dcnode-id="3306" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-52022-23" id="v-pills-52022-23-tab" role="tab"><span data-dcnode-id="3309" instrument_node="">Introduction to Life Sciences   </span><em data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-62022-23" aria-selected="true" class="nav-link" data-dcnode-id="3302" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-62022-23" id="v-pills-62022-23-tab" role="tab"><span data-dcnode-id="3305" instrument_node="">Research Methods for the Life Sciences   </span><em data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">(Core)</span></em></a></div></div><div class="col-12 col-lg-9 module-content-container" data-dcnode-id="3268"><div class="tab-content p-4 nd_2022-23" data-dcnode-id="3269" id="v-pills-tabContent"><div aria-labelledby="v-pills-12022-23-tab" class="tab-pane fade active show" data-dcnode-id="3295" id="v-pills-12022-23" role="tabpanel"><h4 data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Animal Management will cover the contributions of animal scientists, welfare bodies, legislators, producers and consumers to the housing and management of captive animals. There will be a focus on the animals biological requirements in captivity and the application of good husbandry practice to farm, laboratory, zoo and companion animals of a wide range of taxonomic groups.</span></p></div><div aria-labelledby="v-pills-22022-23-tab" class="tab-pane fade" data-dcnode-id="3290" id="v-pills-22022-23" role="tabpanel"><h4 data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Comparative Anatomy and Physiology of Animals is concerned with the principles of the diversity of anatomical form and function in animals using a comparative approach. Anatomical adaptations will be explored across taxa within the animal kingdom in order to show how different types of organisms use their anatomy to solve the similar physiological problems. Through this, an understanding will be developed of how organisms from different taxa address physiological aspects of their life histories.</span></p></div><div aria-labelledby="v-pills-32022-23-tab" class="tab-pane fade" data-dcnode-id="3285" id="v-pills-32022-23" role="tabpanel"><h4 data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">Ecology is the scientific study of the interactions between organisms and their environment. These interactions can be studied across different levels of biological organisation including individuals, populations, communities and ecosystems. This module will examine how these different levels of organisation are interconnected and how the study of ecology allows us to better understand patterns in the natural world</span></p></div><div aria-labelledby="v-pills-42022-23-tab" class="tab-pane fade" data-dcnode-id="3280" id="v-pills-42022-23" role="tabpanel"><h4 data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">This module aims to introduce the principles underlying animal behaviour and the welfare of animals in our care. It will adopt approaches derived from Tinbergens levels of explanation of behaviour, such as control, lifetime development and adaptive value of behaviour. Students will have the opportunity to be taught how to observe and record the behaviour of animals from a range of taxonomic groups. The module will introduce approaches to animal welfare assessment and their application.</span></p></div><div aria-labelledby="v-pills-52022-23-tab" class="tab-pane fade" data-dcnode-id="3275" id="v-pills-52022-23" role="tabpanel"><h4 data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">Introduction to the Life Sciences is designed to provide a foundation for students to develop their knowledge and understanding of fundamental cell biology, biochemistry and genetics in the context of life sciences.</span></p></div><div aria-labelledby="v-pills-62022-23-tab" class="tab-pane fade" data-dcnode-id="3270" id="v-pills-62022-23" role="tabpanel"><h4 data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Research methods for the Life Sciences aims to introduce the skills and knowledge necessary for students to assimilate and judge scientific knowledge. Students will be introduced to the tools required to search and evaluate the scientific literature relevant to their studies, and some of the key philosophical constructs around which scientific knowledge is based. They will be taught about hypothesis testing, experimental design, data collection, basic mathematical and statistical concepts, and data presentation, and gain hands-on experience of their application.</span></p></div></div></div></div></div><div aria-labelledby="levelFive-tab" class="tab-pane levelFive-tab fade" data-dcnode-id="3131" id="levelFive2022-23" role="tabpanel"><div class="row" data-dcnode-id="3132"><div class="col-12 col-lg-3 module-pill-wrapper" data-dcnode-id="3195"><div aria-orientation="vertical" class="nav flex-column nav-pills nd_2022-23" data-dcnode-id="3196" id="v-pills-tab" role="tablist"><a aria-controls="v-pills-72023-24" aria-selected="true" class="nav-link active" data-dcnode-id="3262" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-72023-24" id="v-pills-72023-24-tab" role="tab"><span data-dcnode-id="3265" instrument_node="">Animal Behaviour   </span><em data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-82023-24" aria-selected="true" class="nav-link" data-dcnode-id="3258" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-82023-24" id="v-pills-82023-24-tab" role="tab"><span data-dcnode-id="3261" instrument_node="">Animal Health and Disease   </span><em data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-92023-24" aria-selected="true" class="nav-link" data-dcnode-id="3254" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-92023-24" id="v-pills-92023-24-tab" role="tab"><span data-dcnode-id="3257" instrument_node="">Animal Protection   </span><em data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-102023-24" aria-selected="true" class="nav-link" data-dcnode-id="3250" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-102023-24" id="v-pills-102023-24-tab" role="tab"><span data-dcnode-id="3253" instrument_node="">Conservation Biology   </span><em data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-112023-24" aria-selected="true" class="nav-link" data-dcnode-id="3246" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-112023-24" id="v-pills-112023-24-tab" role="tab"><span data-dcnode-id="3249" instrument_node="">Data Skills for the Life Sciences   </span><em data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-122023-24" aria-selected="true" class="nav-link" data-dcnode-id="3239" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-122023-24" id="v-pills-122023-24-tab" role="tab"><span data-dcnode-id="3245" instrument_node="">Evolution   </span><em data-dcnode-id="3240"><i data-dcnode-id="3241"><span data-dcnode-id="3244" instrument_node="">(Option)</span><span data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-132023-24" aria-selected="true" class="nav-link" data-dcnode-id="3232" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-132023-24" id="v-pills-132023-24-tab" role="tab"><span data-dcnode-id="3238" instrument_node="">Immunology   </span><em data-dcnode-id="3233"><i data-dcnode-id="3234"><span data-dcnode-id="3237" instrument_node="">(Option)</span><span data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-142023-24" aria-selected="true" class="nav-link" data-dcnode-id="3225" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-142023-24" id="v-pills-142023-24-tab" role="tab"><span data-dcnode-id="3231" instrument_node="">Invertebrate and Vertebrate Zoology   </span><em data-dcnode-id="3226"><i data-dcnode-id="3227"><span data-dcnode-id="3230" instrument_node="">(Option)</span><span data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-152023-24" aria-selected="true" class="nav-link" data-dcnode-id="3218" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-152023-24" id="v-pills-152023-24-tab" role="tab"><span data-dcnode-id="3224" instrument_node="">Managing Ecosystems   </span><em data-dcnode-id="3219"><i data-dcnode-id="3220"><span data-dcnode-id="3223" instrument_node="">(Option)</span><span data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-162023-24" aria-selected="true" class="nav-link" data-dcnode-id="3211" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-162023-24" id="v-pills-162023-24-tab" role="tab"><span data-dcnode-id="3217" instrument_node="">Reproduction and Development   </span><em data-dcnode-id="3212"><i data-dcnode-id="3213"><span data-dcnode-id="3216" instrument_node="">(Option)</span><span data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-172023-24" aria-selected="true" class="nav-link" data-dcnode-id="3204" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-172023-24" id="v-pills-172023-24-tab" role="tab"><span data-dcnode-id="3210" instrument_node="">School of Pharmacy Study Abroad   </span><em data-dcnode-id="3205"><i data-dcnode-id="3206"><span data-dcnode-id="3209" instrument_node="">(Option)</span><span data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-182023-24" aria-selected="true" class="nav-link" data-dcnode-id="3197" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-182023-24" id="v-pills-182023-24-tab" role="tab"><span data-dcnode-id="3203" instrument_node="">UK Field Course   </span><em data-dcnode-id="3198"><i data-dcnode-id="3199"><span data-dcnode-id="3202" instrument_node="">(Option)</span><span data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">†</span></span></i></em></a></div></div><div class="col-12 col-lg-9 module-content-container" data-dcnode-id="3133"><div class="tab-content p-4 nd_2022-23" data-dcnode-id="3134" id="v-pills-tabContent"><div aria-labelledby="v-pills-72023-24-tab" class="tab-pane fade show active" data-dcnode-id="3190" id="v-pills-72023-24" role="tabpanel"><h4 data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">This module is based on the four ethological levels of explanation for animal behaviour as introduced by Nikolaas Tinbergen, one of the fathers of ethology, in the 1960's: mechanism, development, function and evolution. It will deal primarily with the ethological concepts underlying the study of animal behaviour supported by classic experimental studies of domestic and wild animals from a wide range of taxonomic groups. The module will also cover the design, data collection, analyses and interpretation of behavioural studies in a variety of species both in the laboratory and in zoo</span></p></div><div aria-labelledby="v-pills-82023-24-tab" class="tab-pane fade" data-dcnode-id="3185" id="v-pills-82023-24" role="tabpanel"><h4 data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">This module covers some aspects about animal health and disease. In particular, diseases of a wide variety of different animals, and the impacts which they pose to the animals, and humans. This will also include some levels of disease treatments, and control, and discuss different methods of these. Functional animal nutrition of various species to prevent disease and maintain optimal health, as well as how diseases can affect behaviour will also be included.</span></p></div><div aria-labelledby="v-pills-92023-24-tab" class="tab-pane fade" data-dcnode-id="3180" id="v-pills-92023-24" role="tabpanel"><h4 data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">This module explores the regulation and enforcement of animal protection including the background and need for legislation relating to animals, the scientific, political and legal procedures involved in forming legislation and how citizens may become involved in that process. Students develop critical analytical skills through the interpretation and application of legal frameworks as well as the evaluation of the research background underpinning the law. Students also learn to develop and present arguments used in decisions regarding animal protection</span></p></div><div aria-labelledby="v-pills-102023-24-tab" class="tab-pane fade" data-dcnode-id="3175" id="v-pills-102023-24" role="tabpanel"><h4 data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">This module provides a critical insight into the application of the principles of conservation biology. It will give an overview of the nature, value and complex threats to biodiversity and will detail the biological problems faced by small populations of animals, in particular. The module will also deal with the practice of population conservation and management, including methods to assess population size, survival rates and how to use this information to assess the viability of populations.</span></p></div><div aria-labelledby="v-pills-112023-24-tab" class="tab-pane fade" data-dcnode-id="3170" id="v-pills-112023-24" role="tabpanel"><h4 data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Data-centric skills are crucial for any life scientist undertaking any form of data collection, management, visualisation, and/or analysis. This module introduces students to skills in data storage, handling, and manipulation; understanding different data types; visualising data; fitting statistical and analytical models; interpreting and reporting statistical and analytical results; and using these skills in experimental designs. In the age of information, computational skills are becoming ever more relevant, and this module will hone different computational skills. All these skills can aid students in undertaking future research projects, including the third-year honours project.</span></p></div><div aria-labelledby="v-pills-122023-24-tab" class="tab-pane fade" data-dcnode-id="3165" id="v-pills-122023-24" role="tabpanel"><h4 data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">The Evolution module aims to introduce the fundamental concepts and theories that explain and predict how biodiversity evolves as a result of multiple factors emerging from both ecological and sexual interactions. The integrative nature of this module guarantees that a broad diversity of the central topics in the field of evolution is covered.</span></p></div><div aria-labelledby="v-pills-132023-24-tab" class="tab-pane fade" data-dcnode-id="3160" id="v-pills-132023-24" role="tabpanel"><h4 data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">This module provides an overview of the cellular and molecular basis of the immune response in health and human diseases. The structure, function and complex mechanisms of host defence by B- and T-Cells will be discussed. Students will evaluate the role of inflammatory mediators, soluble effectors and cellular cytotoxicity in inflammation and immunity.</span></p></div><div aria-labelledby="v-pills-142023-24-tab" class="tab-pane fade" data-dcnode-id="3155" id="v-pills-142023-24" role="tabpanel"><h4 data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">This module is an introduction to the key major taxonomic groups of invertebrates and vertebrates. Major invertebrate groups will include inter alia: sponges, cnidarians, flatworms, nematodes, annelids, molluscs, arthropods, echinoderms, and cephalochordates. All major vertebrate classes will be considered in detail.</span></p></div><div aria-labelledby="v-pills-152023-24-tab" class="tab-pane fade" data-dcnode-id="3150" id="v-pills-152023-24" role="tabpanel"><h4 data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">This module deals with managing ecosystems in a range of contexts, and includes assessing and addressing the impacts of human activity on ecological systems. It also examines the suitability of different management strategies to deal with a range of environmental problems.</span></p></div><div aria-labelledby="v-pills-162023-24-tab" class="tab-pane fade" data-dcnode-id="3145" id="v-pills-162023-24" role="tabpanel"><h4 data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">This module focuses on reproduction and development in a range of invertebrates and vertebrates. There will be a comparative analysis of anatomy, physiology, behaviour and evolution of reproductive patterns, including the main anatomical features of male and female reproductive tracts. There will be descriptions of the processes of gamete production in males and females. The underlying principles of ontogeny from fertilisation to birth will be described in a variety of taxa with an emphasis on the factors controlling developmental processes. Additional content will focus on factors, e.g. environmental pollution, that affect reproduction and development in animals</span></p></div><div aria-labelledby="v-pills-172023-24-tab" class="tab-pane fade" data-dcnode-id="3140" id="v-pills-172023-24" role="tabpanel"><h4 data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">The School believes that an option to study overseas is a valuable educational opportunity for our students. Provision of this option supports the educational aims of the School of Pharmacy and enhances the distinctiveness of its degrees at Lincoln. The optional year is intended to:



- enable students to benefit from studying within a cross cultural environment;

- expose students to a wider academic and cultural experience;

- enhance their future employment opportunities;

- by increasing their cultural and professional mobility.



This module is optional for students within the School. Study Abroad

is a year long module which enables students to spend a year studying abroad at one of the Universitys approved partner institutions. Eligible students must have completed their second year

of study to a satisfactory standard and successfully completed the application process for the year abroad.



During the year spent abroad, students share classes with local students and study on a suite of locally-delivered taught modules which have been approved in advance by the University. Upon their

return, as part of the assessment for this modules, students are required to critically reflect upon their experience of living and studying in a different cultural environment and the skills acquired.</span></p></div><div aria-labelledby="v-pills-182023-24-tab" class="tab-pane fade" data-dcnode-id="3135" id="v-pills-182023-24" role="tabpanel"><h4 data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">This module aims to help students understand theory, develop skills, build tacit knowledge and importantly, integrate and apply know-how and skills acquired from prior learning to novel situations. The module is built around the principle of scientific enquiry and the ownership of that process by students in order to develop cognitive, affective and psychomotor skills. Student ownership will be developed throughout the module, culminating in an independent, residential in-situ field study in which they design a study, collect &amp; analyse data and present their findings.</span></p></div></div></div></div></div><div aria-labelledby="levelSix-tab" class="tab-pane levelSix-tab fade" data-dcnode-id="3026" id="levelSix2022-23" role="tabpanel"><div class="row" data-dcnode-id="3027"><div class="col-12 col-lg-3 module-pill-wrapper" data-dcnode-id="3075"><div aria-orientation="vertical" class="nav flex-column nav-pills nd_2022-23" data-dcnode-id="3076" id="v-pills-tab" role="tablist"><a aria-controls="v-pills-192024-25" aria-selected="true" class="nav-link active" data-dcnode-id="3127" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-192024-25" id="v-pills-192024-25-tab" role="tab"><span data-dcnode-id="3130" instrument_node="">Animal Cognition and Welfare   </span><em data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-202024-25" aria-selected="true" class="nav-link" data-dcnode-id="3123" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-202024-25" id="v-pills-202024-25-tab" role="tab"><span data-dcnode-id="3126" instrument_node="">Applied Animal Behaviour   </span><em data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-212024-25" aria-selected="true" class="nav-link" data-dcnode-id="3119" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-212024-25" id="v-pills-212024-25-tab" role="tab"><span data-dcnode-id="3122" instrument_node="">Life Sciences Research Project   </span><em data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">(Core)</span></em></a><a aria-controls="v-pills-222024-25" aria-selected="true" class="nav-link" data-dcnode-id="3112" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-222024-25" id="v-pills-222024-25-tab" role="tab"><span data-dcnode-id="3118" instrument_node="">Behavioural Ecology   </span><em data-dcnode-id="3113"><i data-dcnode-id="3114"><span data-dcnode-id="3117" instrument_node="">(Option)</span><span data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-232024-25" aria-selected="true" class="nav-link" data-dcnode-id="3105" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-232024-25" id="v-pills-232024-25-tab" role="tab"><span data-dcnode-id="3111" instrument_node="">Control of Animal Disease   </span><em data-dcnode-id="3106"><i data-dcnode-id="3107"><span data-dcnode-id="3110" instrument_node="">(Option)</span><span data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-242024-25" aria-selected="true" class="nav-link" data-dcnode-id="3098" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-242024-25" id="v-pills-242024-25-tab" role="tab"><span data-dcnode-id="3104" instrument_node="">Overseas Field Course   </span><em data-dcnode-id="3099"><i data-dcnode-id="3100"><span data-dcnode-id="3103" instrument_node="">(Option)</span><span data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-252024-25" aria-selected="true" class="nav-link" data-dcnode-id="3091" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-252024-25" id="v-pills-252024-25-tab" role="tab"><span data-dcnode-id="3097" instrument_node="">Plant and Animal Interactions   </span><em data-dcnode-id="3092"><i data-dcnode-id="3093"><span data-dcnode-id="3096" instrument_node="">(Option)</span><span data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-262024-25" aria-selected="true" class="nav-link" data-dcnode-id="3084" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-262024-25" id="v-pills-262024-25-tab" role="tab"><span data-dcnode-id="3090" instrument_node="">Practical Skills in Conservation   </span><em data-dcnode-id="3085"><i data-dcnode-id="3086"><span data-dcnode-id="3089" instrument_node="">(Option)</span><span data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">†</span></span></i></em></a><a aria-controls="v-pills-272024-25" aria-selected="true" class="nav-link" data-dcnode-id="3077" data-toggle="pill" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sYoXAwnTlfo%3Frel%3D0%23v-pills-272024-25" id="v-pills-272024-25-tab" role="tab"><span data-dcnode-id="3083" instrument_node="">Veterinary Parasitology   </span><em data-dcnode-id="3078"><i data-dcnode-id="3079"><span data-dcnode-id="3082" instrument_node="">(Option)</span><span data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">†</span></span></i></em></a></div></div><div class="col-12 col-lg-9 module-content-container" data-dcnode-id="3028"><div class="tab-content p-4 nd_2022-23" data-dcnode-id="3029" id="v-pills-tabContent"><div aria-labelledby="v-pills-192024-25-tab" class="tab-pane fade show active" data-dcnode-id="3070" id="v-pills-192024-25" role="tabpanel"><h4 data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">This module explores the scientific study of animal cognition and welfare, with particular attention focused on experimental design, methodological considerations, and interpretation. It will cover the objective assessment of animal cognition and welfare with research examples from both wild and captive animals.</span></p></div><div aria-labelledby="v-pills-202024-25-tab" class="tab-pane fade" data-dcnode-id="3065" id="v-pills-202024-25" role="tabpanel"><h4 data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">This module applies the principles underpinning the management of animal behaviour to a range of real world situations including management of companion animals, farm animals, animals involved in research, and animals held in zoological collections. Particular emphasis is given to understanding the impact of alternative approaches to achieving desirable management outcomes and promoting animal welfare, involving a range of environmental and behavioural interventions. The module aims to equip students with knowledge and skills that will be valuable in postgraduate employment in animal-based industries as well as apply knowledge accrued during degree to current issues in animal-based industries.</span></p></div><div aria-labelledby="v-pills-212024-25-tab" class="tab-pane fade" data-dcnode-id="3060" id="v-pills-212024-25" role="tabpanel"><h4 data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Module Overview</span></h4><p data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">In this module, students undertake an independent programme of research under supervision from a member of staff. It provides students with an opportunity to demonstrate original and critical thought, as well as to build discipline-specific research and project-management skills. 

A wide range of subject expertise exists within the School, and students are expected to work on a project that is relevant to their programme of study. Under the guidance of a supervisor, students will review the literature, identify a research question/aim and objectives, and design a programme of research respectively. Students will be expected to manage the project and work in a safe and ethical manner, which will include undergoing training in and engaging with obtaining relevant ethical approval and risk assessment. Students will collect and analyse data, record their activities and research methodology and results in a lab book/ equivalent robust means of recording.
