</span><p data-dcnode-id="3621"><span data-dcnode-id="3625" instrument_node="">The ACAW has developed the following suggested resource list for individuals interested in developing a deeper understanding of animal welfare. The intent of the list is to help the applicant view the breadth and scope of animal welfare, including controversial issues, and to augment current knowledge in preparation for the examination. It should not be construed as a commitment regarding specific examination material nor does it reflect endorsement of a particular viewpoint expressed by any author. For ease of use, the list is divided by tasks listed on the Role Delineation Document (RDD), then alphabetically by author/editor, although many references contain information that would apply to more than one task and are not listed more than once. For the purposes of studying for the ACAW examination, it is suggested that an applicant review texts pertaining to general principles of animal welfare (</span><strong data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">marked with an asterisk *</span></strong><span data-dcnode-id="3622" instrument_node="">) as well as web links and species specific material as needed, then use other resources within each RDD category to augment knowledge. More timely material, available in periodicals listed at the end should be consulted as well.</span></p><span data-dcnode-id="3620" instrument_node="">
