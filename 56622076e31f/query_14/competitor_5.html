</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>A sound understanding of laboratory animal welfare should be grounded in a general knowledge of some of the major events, organizations, and philosophies that have shaped how animals are used and cared for since the industrial revolution. This overview includes the evolution of animal protection and advocacy movements, the development of professional animal science associations, and the creation of laws and regulations governing the use of animals in research. Throughout this period the dominant philosophy has been a form of utilitarianism. However, deontology, animal rights, and ethics of care have also been influential. Scientific inquiry has evolved to increasingly engage with topics such as animal distress and welfare, although the questions of how to best assess the subjective elements of well-being and balance the various measurable parameters remain. There is a general pattern of expanding regulation and increasing public discourse, and a need for harmonization, collaboration, and high standards of care in support of ongoing animal-based activities.</p></div></div></div>" data-dcnode-id="1426" lang="en" name="citation_abstract"><span data-dcnode-id="1425" instrument_node="">

d-by-66" data-dcnode-id="1132" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="1133" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="1119" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/B978-0-12-385103-1.00001-4" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="1123" instrument_node="">https://doi.org/10.1016/B978-0-12-385103-1.00001-4</span></a><a class="rights-and-content" data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DB9780123851031000014%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1121" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="1118"></section><section class="ReferencedArticles" data-dcnode-id="1117"></section><div class="PageDivider" data-dcnode-id="1116"></div><div class="Abstracts u-font-serif" data-dcnode-id="1109" id="abstracts"><div class="abstract author" data-dcnode-id="1110" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Abstract</span></h2><div data-dcnode-id="1111" id="abssec0010"><p data-dcnode-id="1112" id="abspara0010"><span data-dcnode-id="1113" instrument_node="">A sound understanding of laboratory animal welfare should be grounded in a general knowledge of some of the major events, organizations, and philosophies that have shaped how animals are used and cared for since the industrial revolution. This overview includes the evolution of animal protection and advocacy movements, the development of professional animal science associations, and the creation of laws and regulations governing the use of animals in research. Throughout this period the dominant philosophy has been a form of utilitarianism. However, deontology, animal rights, and ethics of care have also been influential. Scientific inquiry has evolved to increasingly engage with topics such as animal distress and welfare, although the questions of how to best assess the subjective elements of well-being and balance the various measurable parameters remain. There is a general pattern of expanding regulation and increasing public discourse, and a need for harmonization, collaboration, and high standards of care in support of ongoing animal-based activities.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="1086" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="1098"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780123851031010022"><svg class="icon icon-navigate-left" data-dcnode-id="1107" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="1108"></path></svg><span class="button-alternative-text" data-dcnode-id="1100"><strong data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node=""> in book</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="1087"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780123851031000026"><span class="button-alternative-text" data-dcnode-id="1091"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node=""> in book</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="1089" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="1090"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="1061"><div class="keywords-section" data-dcnode-id="1062" id="aep-keywords-id1"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="1081"><span data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Animal rights</span></span></div><div class="keyword" data-dcnode-id="1078"><span data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Animal welfare</span></span></div><div class="keyword" data-dcnode-id="1075"><span data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Animal Welfare Act</span></span></div><div class="keyword" data-dcnode-id="1072"><span data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">History</span></span></div><div class="keyword" data-dcnode-id="1069"><span data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Philosophy</span></span></div><div class="keyword" data-dcnode-id="1066"><span data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Regulation</span></span></div><div class="keyword" data-dcnode-id="1063"><span data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Utilitarianism</span></span></div></div></div><span data-dcnode-id="1060" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="894" id="body"><div data-dcnode-id="895"><p data-dcnode-id="1058" id="p0010"><span data-dcnode-id="1059" instrument_node="">Concerns about how animals should be treated are pervasive throughout all cultures and periods in history. However, the modern “animal welfare” movement, which most often attempts to respond to questions about how animals are doing both physically and mentally, dates to more recent events occurring in Europe and, specifically, the United Kingdom. Activities in the United Kingdom have been echoed in the United States (and many other nations), at first with considerable delay, but as technological advances in communications developed, with increasing alacrity. By the 1980s, similar activity took place almost simultaneously on both sides of the Atlantic and within most first-world nations. Animal welfare is now debated in a global context, with local considerations and applications understood against a shared concept of animal welfare as a legitimate subject of ethical concern and scientific investigation.</span></p><p data-dcnode-id="1056" id="p0015"><span data-dcnode-id="1057" instrument_node="">Standards of care for treating animals humanely are correspondingly complex, involving overlapping laws, regulations, guidelines, and professional codes influenced by a diverse body of philosophy, science, ethics, and law. Global trade and collaborations, and international acceptance of safety data, have required attention to harmonization, but awareness of local history and cultural influences remains crucial to successfully addressing laboratory animal welfare concerns now and into the future. Public consensus about matters as fundamental as whether and which animals have moral standing can and has changed. And, while most regulations share a similar basis in law, utilitarian ethics, and community standards, even these basic pillars are under constant challenge and review.</span></p><p data-dcnode-id="1054" id="p0020"><span data-dcnode-id="1055" instrument_node="">This introduction first provides a brief history of some major events shaping the animal welfare movement, then discusses the emergence of some philosophies, and, finally, provides background on the concepts that contribute to the current framework for animal welfare–related activity as it applies to animals used in the laboratory. As such it illustrates some of the complex forces that must be married to create a valid mandate for researchers to operate and a standard of care for the animals they use.</span></p><section data-dcnode-id="985" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1052" id="cesectitle0020"><span data-dcnode-id="1053" instrument_node="">Events</span></h2><p data-dcnode-id="1050" id="p0025"><span data-dcnode-id="1051" instrument_node="">During the industrial revolutions (1800–1850, 1870–1914) the populations of parts of Europe and the United States (as well as other developing nations) began to move from rural to urban areas. Movement away from agricultural lifestyles prompted a shift in attitudes toward animals. Animals began to be appreciated more as companions, and their use in urban settings (e.g. draft horses, animals used in research) came under increasing scrutiny and criticism.</span></p><p data-dcnode-id="1048" id="p0030"><span data-dcnode-id="1049" instrument_node="">The first organized and mainstream activities to promote the humane treatment of animals began to emerge, generally with a focus on the treatment of horses, as reflected by the founding of the British Society for the Protection of Animals (1824) and its American equivalent (1866). Subsequently the American Humane Association (1874) and many other humane societies were also created.</span></p><p data-dcnode-id="1041" id="p0035"><span data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">During this period approaches to animal use became more “industrialized” in both urban and rural settings, resulting in advances in nutrition, efficiencies of food and fiber production, and research breakthroughs—but also increasing ethical concerns. The practice of </span><a class="topic-link" data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/vivisection" title="Learn more about vivisection from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1046" instrument_node="">vivisection</span></a><span data-dcnode-id="1044" instrument_node="">, whereby animals were restrained and operated upon while conscious, became a flashpoint for debate and protest. This led to the formation of antivivisection societies focused specifically on ending inhumane teaching and research practices (UK: 1875; US: 1883).</span></span><span data-dcnode-id="1042" id="pg2"></span></p><p data-dcnode-id="1039" id="p0040"><span data-dcnode-id="1040" instrument_node="">These groups and their supporters took part in public demonstrations, which sometimes devolved into riots, reflecting how questions about vivisection exposed deep divisions within Victorian-era society. Efforts to reduce animal suffering aligned with other emerging movements supporting the rights of women, children, and slaves. A Royal Commission in Great Britain investigating vivisection led to the passing of the Cruelty to Animals Act 1876, which licensed researchers using animals and specified that painful research should be carried out only when necessary for instruction or research to benefit human health, and that anesthesia should be used whenever permitted by the scientific goals of the work.</span></p><p data-dcnode-id="1037" id="p0045"><span data-dcnode-id="1038" instrument_node="">This did little to allay public concern, and protests continued to occur. One of the most persistent and disruptive was known as the Brown Dog Affair. It was predicated upon the erection of a statue in 1906 to commemorate a particular dog that had been used in research—the statue was intended to represent other animals that were used in painful research. The brown dog in question had been used in a demonstration for students by William Bayliss, a faculty member in the Department of Physiology at University College London and a pioneer in the study of hormones. There was vehement debate over whether effective anesthetics were used during the demonstration. “Anti-doggers” and students clashed sporadically at and around the site of the statue until 1910, when it was removed. (It should be noted that during the Victorian era riots in London were not particularly uncommon, motivated by issues such as Sunday trading, unemployment, and voting rights. A new brown dog statue was placed in the Old English Gardens of Battersea Park in 1985, and has its own small legacy of controversy.)</span></p><p data-dcnode-id="1032" id="p0050"><span data-dcnode-id="1036" instrument_node="">As a result of the open conflict, many of those who used animals in the laboratory had a heightened appreciation of the need to address public concerns in order to continue using animals in research. Prominent figures from within and outside the scientific community (such as Charles Darwin) became involved in a movement to curb cruel practices in research, an activity that remained arguably self-regulated under relatively permissive oversight. (The Cruelty to Animals Act 1876, which remained unchanged for 110 years, was the basis of only three prosecutions and one conviction; </span><a class="workspace-trigger" data-dcnode-id="1034" href="#bib3" name="bbib3"><span data-dcnode-id="1035" instrument_node="">Dolan, 2008</span></a><span data-dcnode-id="1033" instrument_node="">.)</span></p><p data-dcnode-id="1030" id="p0055"><span data-dcnode-id="1031" instrument_node="">Around this same time the first major shelters for stray animals were established (UK: 1860; US: 1866) as a humane alternative to the often brutal practices of city “poundmasters” who collected and killed stray dogs by methods such as mass drowning. The use of animals from shelters in research began to attract criticism because of concerns about the potential for stray or stolen pets to end up in laboratories. These concerns endured well into the twentieth century and contributed to the development of the U.S. Animal Welfare Act in 1966. By 1874 shelters began to be directly operated by humane associations, and this became the norm in the United States and the United Kingdom toward the middle of the twentieth century.</span></p><p data-dcnode-id="1025" id="p0060"><span data-dcnode-id="1029" instrument_node="">The next major period of change occurred after World War II. Several new societies arose with joint interests in animal welfare and the animal sciences (PRIMR [Public Responsibility in Medicine and Research], 1974; NABR [National Association for Biomedical Research], 1979). The founder of one of these, Charles Hume of the Universities Federation for Animal Welfare (1926), initiated the creation of the first systematic approach toward promoting the welfare of animals in the laboratory. The “Three Rs” (</span><a class="workspace-trigger" data-dcnode-id="1027" href="#bib8" name="bbib8"><span data-dcnode-id="1028" instrument_node="">Russell and Burch, 1959</span></a><span data-dcnode-id="1026" instrument_node="">) proposed that wherever possible the use of animals should be replaced, refined, and reduced. The Three Rs made little impact at the time, but have gradually grown to become an international core doctrine in protecting animals' welfare as it applies to animals in the laboratory.</span></p><p data-dcnode-id="1023" id="p0065"><span data-dcnode-id="1024" instrument_node="">Approaches to laboratory animal husbandry and laboratory animal medicine also became progressively more professional. The American Association for Laboratory Animal Science was founded in 1950, and laboratory animal medicine was recognized as a specialty of veterinary medicine with the founding of the American College of Laboratory Animal Medicine (1958). That veterinary specialty college was followed over the next several decades by the establishment of others around the world (e.g. ECLAM [European College of Laboratory Animal Medicine], 2000). Professional desire for better conditions for laboratory animals and interest in public assurance led to the establishment of the Association for Assessment and Accreditation of Laboratory Animal Care (AAALAC) by a group of veterinarians and researchers in 1965. In the years that followed, the AAALAC accredited hundreds of facilities across the United States, raising the benchmark for laboratory animal care. Eventually, existing groups were expanded (e.g. AAALAC International, 1996) and new groups emerged to cover the industry globally. Also, parallel to the creation of new expectations for animal care, attention was increasingly focused on formal qualifications and continuing education for attending veterinarians, researchers, and technicians (e.g. IAT [Institute of Animal Technology], 1949; LASA [Laboratory Animal Science Association], 1963; Scand-LAS [Scandinavian Society for Laboratory Animal Science], 1970; FELASA [Federation for Laboratory Animal Science Associations], 1978).</span></p><p data-dcnode-id="1010" id="p0070"><span data-dcnode-id="1022" instrument_node="">Attention to animal welfare continued to increase in connection with both humane and scientific concerns throughout the 1960s. Public concern expanded appreciably to include postindustrial farming techniques, as prompted (and reflected) by books such as </span><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Animal Machines</span></em><span data-dcnode-id="1019" instrument_node=""> by </span><a class="workspace-trigger" data-dcnode-id="1017" href="#bib5" name="bbib5"><span data-dcnode-id="1018" instrument_node="">Ruth Harrison (1964)</span></a><span data-dcnode-id="1016" instrument_node="">. The pivotal Brambell Report (</span><a class="workspace-trigger" data-dcnode-id="1014" href="#fur1" name="bfur1"><span data-dcnode-id="1015" instrument_node="">Brambell, 1965</span></a><span data-dcnode-id="1013" instrument_node="">) led to the development of another set of guiding principles that later became known as the Five Freedoms; these became a core doctrine for those working for the benefit of animals used in agriculture. Around this time connections also developed</span><span data-dcnode-id="1012" id="pg3"></span><span data-dcnode-id="1011" instrument_node=""> among individuals and organizations expressing animal welfare and environmental concerns.</span></p><p data-dcnode-id="1008" id="p0075"><span data-dcnode-id="1009" instrument_node="">It was also during the 1960s that laboratory animal welfare standards became increasingly objective and legally enforced in the United States. Notable events of that period were the release of the Guide for the Care and Use of Laboratory Animals (1963) and the passage of the federal Animal Welfare Act (1966). The former (often referred to as the “Guide”) was created by a group of veterinarians known as the Animal Care Panel, and subsequent editions of the Guide were supported by the National Institutes of Health and published by the Institute for Laboratory Animal Research of the National Academy of Sciences. The Animal Welfare Act brought laboratory animals under the purview of the United States Department of Agriculture. By 1979 all institutions using covered species in research were required to have an ethics review committee, now called an Institutional Animal Care and Use Committee or IACUC. The Animal Welfare Act underwent a series of amendments in 1970, 1976, 1985, 1990, 2002, 2007, and 2008, increasing its scope and specificity, although many species (including those most commonly used, such as rats and mice) and applications remain excluded. Some of these excluded species and applications, however, are covered in other ways.</span></p><p data-dcnode-id="1003" id="p0080"><span data-dcnode-id="1007" instrument_node="">At the same time that the use of animals in science became more regulated, some protestors began to apply unlawful tactics in conveying their ongoing concern. In 1977 the Animal Liberation Front (ALF) became active in the United States, only one year after being founded in the United Kingdom. The ALF is not a highly organized group, but instead consists of scattered individuals and small groups using the same title. It appears to have developed out of groups that sabotaged fox hunts in the United Kingdom. The ALF has been connected with attacks on biomedical research and animal science facilities that include removal or release of animals, </span><a class="topic-link" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/arson" title="Learn more about arson from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="1006" instrument_node="">arson</span></a><span data-dcnode-id="1004" instrument_node="">, destruction of equipment, personal attacks, threats and molestations, and pipe bombings. They have also targeted fur farms. A sister movement called the Earth Liberation Front (UK: 1992; Canada: 1995; US: 1996) focuses on targets they perceive to be unfriendly to the environment; these often also have a connection to animal use, such as hunting lodges and McDonald's restaurants.</span></p><p data-dcnode-id="995" id="p0085"><span data-dcnode-id="1002" instrument_node="">Not comfortable with such radical actions, but still needing to raise public awareness and investment into their cause, more moderate groups adopted the tactic of the public expose, first through photography and later videos (now often released online). The first example of the effectiveness of this approach was investigative journalism that exposed how pets could be acquired by Class B dealers (a category of activity covered under the Animal Welfare Act) and the conditions under which some of those animals were kept by some of those dealers (</span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Sports Illustrated</span></em><span data-dcnode-id="999" instrument_node="">, 1965; </span><em data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Life Magazine</span></em><span data-dcnode-id="996" instrument_node="">, 1966). This approach only became routine during the 1980s and later as technological developments made amateur and surreptitious photography and videography easier to perform.</span></p><p data-dcnode-id="990" id="p0090"><span data-dcnode-id="994" instrument_node="">People for the Ethical Treatment of Animals (PETA), founded in 1980, rose to prominence a year later in a campaign that drew attention to how monkeys were being used in research at the Institute of Behavioral Research in Silver Spring, Maryland. Photographs taken at night documented the poor conditions under which these monkeys were being kept. In 1983 another PETA campaign against brain injury research performed on baboons at the University of Pennsylvania's </span><a class="topic-link" data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/closed-head-injury" title="Learn more about Head Injury from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="993" instrument_node="">Head Injury</span></a><span data-dcnode-id="991" instrument_node=""> Clinic in Philadelphia included graphic video footage that suggested clear noncompliance with the Guide. This led to widespread outrage and ultimately closure of the laboratory.</span></p><p data-dcnode-id="988" id="p0095"><span data-dcnode-id="989" instrument_node="">The Humane Society of the United States (HSUS) was cofounded as the National Humane Society in the 1950s by former journalist and American Humane Association (AHA) employee Fred Myers, as a result of a dispute within the AHA over its perceived failure to adequately address the legally required surrender of animals from shelters and pounds for use in biomedical research (pound seizure), among other issues. While publicly stating that it was not against vivisection, the HSUS supported increased regulation of animal research; its efforts were directed toward investigation (including the placement of undercover investigators into laboratories), public education, and the passage of legislation. Over time, the HSUS adopted more aggressive tactics in its campaigns, including the increased use of undercover photography and video. Similar video tactics were adopted by other emerging groups, such as Mercy for Animals (1999) and Compassion Over Killing (1995), although the primary focus for the latter groups (and more recently for the HSUS) has been food animal production and slaughter. Images in their stealth recordings have suggested noncompliance with voluntary and legal standards and have led to actions such as the largest meat recall in the United States after a plant was found to be slaughtering nonambulatory cattle, which may place humans at increased risk of diseases, such as bovine spongiform encephalopathy (2008).</span></p><p data-dcnode-id="986" id="p0100"><span data-dcnode-id="987" instrument_node="">Other organizations have been formed specifically to promote animal-based research (Americans for Medical Progress, 1992) or critique groups such as the HSUS (HumaneWatch, 2010), leading to increasingly high profile debates over how the use of animals in research, agriculture, and other areas should be understood, opposed or endorsed, or regulated.</span></p></section><section data-dcnode-id="950" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="983" id="cesectitle0025"><span data-dcnode-id="984" instrument_node="">Philosophies</span></h2><p data-dcnode-id="979" id="p0105"><span data-dcnode-id="982" instrument_node="">Parallel to these events was the development of influential philosophies that helped shape academic and regulatory discussions about animal care and protection. While it might seem natural to assume that a person's</span><span data-dcnode-id="981" id="pg4"></span><span data-dcnode-id="980" instrument_node=""> philosophy drives their behavior, it could equally be argued that philosophies were developed to formalize movements in contemporary culture—first to guide decisions about how animals can be used, then to express resistance to this approach, and finally to acknowledge the role of the human–animal bond.</span></p><p data-dcnode-id="977" id="p0110"><span data-dcnode-id="978" instrument_node="">The dominant approach in the mainstream throughout this period has been a form of utilitarianism. This is a philosophy that seeks to take actions that minimize total suffering and maximize total enjoyment (of humans and animals). In its least controversial form, this means that animals should not be caused to suffer unnecessarily and should be used in ways that produce significant and tangible benefits. Animals are given moral weight in these assessments as historically justified by their sentience, interpreted as the ability to experience suffering. As expressed by Jeremy Bentham in 1789, “The day may come when the rest of the animal creation may acquire those rights which never could have been witholden from them but by the hand of tyranny … The question is not, Can they reason? nor, Can they talk? but, Can they suffer?”</span></p><p data-dcnode-id="972" id="p0115"><span data-dcnode-id="976" instrument_node="">Humans, however, are generally considered to have greater moral significance than animals when making utilitarian calculations, such as an IACUC assessment of an experimental protocol. A prominent exception to this bias is the thoughts of philosopher Peter Singer, who popularized the notion of “speciesism” (</span><a class="workspace-trigger" data-dcnode-id="974" href="#bib9" name="bbib9"><span data-dcnode-id="975" instrument_node="">Ryder, 1975</span></a><span data-dcnode-id="973" instrument_node="">) and argued that the suffering of individuals should be counted equally regardless of species (Animal Liberation, 1975, 1990). The ways in which humans should use and treat animals remain subject to considerable debate (as well as the roles of other stakeholders and considerations about the environment).</span></p><p data-dcnode-id="967" id="p0120"><span data-dcnode-id="971" instrument_node="">In discussing animals such as pets and higher primates, even utilitarian discourse often takes on deontological qualities—arguments usually referred to as “animal rights”. These animals are often given special status that may significantly raise the bar for proposals to use these animals (e.g. </span><a class="workspace-trigger" data-dcnode-id="969" href="#bib2" name="bbib2"><span data-dcnode-id="970" instrument_node="">Committee on the Use of Chimpanzees in Biomedical and Behavioral Research, 2011</span></a><span data-dcnode-id="968" instrument_node="">).</span></p><p data-dcnode-id="956" id="p0125"><span data-dcnode-id="966" instrument_node="">Animal rights is a philosophy that suggests that one individual should not be exploited by another. That is, because animals are “subjects of a life” we may not make use of them to their detriment. This position was first laid out in 1894 by Henry Stephens Salt in a book called </span><em data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Animals' Rights: Considered in Relation to Social Progress</span></em><span data-dcnode-id="963" instrument_node=""> but is now better known as espoused by </span><a class="workspace-trigger" data-dcnode-id="961" href="#bib7" name="bbib7"><span data-dcnode-id="962" instrument_node="">Tom Regan (1985)</span></a><span data-dcnode-id="960" instrument_node="">. While Regan tended to limit his concern to mammals with more advanced cognitive abilities, others such as Francione take a more absolute (abolitionist) position that every form of sentient animal life should be counted equally—and also that animal welfare goals should never be counted as intermediate steps toward fulfilling animal rights goals (</span><a class="workspace-trigger" data-dcnode-id="958" href="#bib4" name="bbib4"><span data-dcnode-id="959" instrument_node="">Francione, 1996</span></a><span data-dcnode-id="957" instrument_node="">).</span></p><p data-dcnode-id="951" id="p0130"><span data-dcnode-id="955" instrument_node="">More recently, a third philosophy has begun to influence debate: the ethics of care. Ethics of care philosophers argue that it is natural and ethical to protect the interests of those with whom we have embodied, caring relationships (especially as parents, guardians, or caretakers). This approach is offered in contrast to the previous assumptions that to be ethical we must act impartially toward all beings within a given rational category, or that suffering matters in a way that is distinct from the particular body/individual who is suffering and his/her relationships. An ethic of care promotes attachment and acknowledges conflicts and partiality as an inevitable consequence (</span><a class="workspace-trigger" data-dcnode-id="953" href="#bib6" name="bbib6"><span data-dcnode-id="954" instrument_node="">Herzog, 2010</span></a><span data-dcnode-id="952" instrument_node="">). An ethic of care honors the human–animal bond as a morally significant and ethically acceptable attachment that creates a duty to care for and protect a specific animal regardless of the objective status of the animal and without generalizing to other animals of the same type.</span></p></section><section data-dcnode-id="907" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="948" id="cesectitle0030"><span data-dcnode-id="949" instrument_node="">Concepts</span></h2><p data-dcnode-id="946" id="p0135"><span data-dcnode-id="947" instrument_node="">Scientific data and academic theories can help to provide the necessary information and a bridge between popular (sometimes implicit) philosophies and regulatory policies or general community standards. These concepts shape the empirical data that all or most parties agree to be factual. This in turn influences which actions are widely agreed within the animal-based professions to be ethical, productive, and hence desirable, versus those branded as incompetent or unethical and undesirable.</span></p><p data-dcnode-id="944" id="p0140"><span data-dcnode-id="945" instrument_node="">Before the formalization of the various scientific disciplines' conceptions of animal care, guidance came predominantly from popular and religious sources. For example, the level of care shown by a shepherd was widely enough recognized to be adopted in the Biblical parable of the good shepherd. Historically animal welfare–like issues were approached by specifying how the animal caretaker should perform their duties (standards of care), rather than addressing the state of the animal directly. Thus when the state of the animal was considered, it was mainly in terms of production and performance measures. There was an understanding that an animal should be cared for in a manner that allows it to remain fit for human purposes (and was not seen as wantonly cruel).</span></p><p data-dcnode-id="933" id="p0145"><span data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">Formal professional standards based predominantly on the well-being of the animal per se can be seen as arising out of the study of </span><a class="topic-link" data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/medicine-and-dentistry/physiological-stress" title="Learn more about physiological stress from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="942" instrument_node="">physiological stress</span></a><span data-dcnode-id="940" instrument_node="">, as first evaluated in the rat. From this research, there developed an appreciation of psychological stress (“dystress”) as a literal rather than purely subjective state of humans and other animals (</span></span><a class="workspace-trigger" data-dcnode-id="937" href="#bib10" name="bbib10"><span data-dcnode-id="938" instrument_node="">Selye, 1956</span></a><span data-dcnode-id="936" instrument_node="">). Thus, the avoidance, not just of pain, but of general distress was incorporated as a goal of humane animal management—and also human</span><span data-dcnode-id="935" id="pg5"></span><span data-dcnode-id="934" instrument_node=""> lifestyles, housing, and workplace designs. Integration of these concerns into laboratory animal science is apparent with the gradual adoption of the Three Rs as formal goals, embraced explicitly in regulatory policy and law internationally. This fundamentally utilitarian approach pushed for those engaged in research to cause a minimum of any kind of suffering—a goal explicitly motivated by a desire to minimize any form of distress experienced by animals in the laboratory, including pain, fear, discomfort, and other adverse states (e.g. frustration, boredom).</span></p><p data-dcnode-id="931" id="p0150"><span data-dcnode-id="932" instrument_node="">The 1980s were a pivotal time with the emergence of the concept of environmental enrichment into the animal welfare domain. Enrichment is an approach to improving what were, at that time, barren habitats for animals in the laboratory, as well as zoos and many other settings. This concept was formalized by a number of researchers (including Viktor Reinhardt, Georgia Mason, and Ruth Newberry), but unmistakably had its impetus from caretaking staff, predominantly laboratory technicians and zookeepers. The enrichment movement drew attention to the welfare of animals as affected by their experiences, including those kept as breeding stock and other “off experiment” animals, not just those subjected to specific experimental procedures.</span></p><p data-dcnode-id="929" id="p0155"><span data-dcnode-id="930" instrument_node="">Concurrent to this development were several attempts to deal with the private nature of psychological suffering (i.e. an animal's mental state), and the imperfect correlation between poor environments, physiological stress, and behavioral indicators of psychological distress—as well as the inability to satisfactorily scientifically (a.k.a. with high agreement of observers) measure emotional distress and other subjectively experienced negative states (e.g. depression, frustration, boredom, discomfort).</span></p><p data-dcnode-id="922" id="p0160"><a class="workspace-trigger" data-dcnode-id="927" href="#bib1" name="bbib1"><span data-dcnode-id="928" instrument_node="">Broom (1988)</span></a><span data-dcnode-id="926" instrument_node=""> offered the idea that animals should not be pressed beyond their ability to cope with their environment. And that coping could be measured without being limited to purely production or performance measures or resorting to consideration of hypothetical emotional states. As an alternative, Marian Dawkins opined that animal welfare is fundamentally about the animal's “point of view” and how the animal feels, with an emphasis on negative feelings. The publication in 1980 of her book </span><em data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Animal Suffering</span></em><span data-dcnode-id="923" instrument_node=""> marked the first widespread, mainstream acceptance of affective states as central to animal welfare science. More recently, Dawkins has provided two criteria for good welfare: “Is the animal healthy?” and “Does it have what it wants?”</span></p><p data-dcnode-id="917" id="p0165"><span data-dcnode-id="921" instrument_node="">Meanwhile, </span><a class="workspace-trigger" data-dcnode-id="919" href="#bib11" name="bbib11"><span data-dcnode-id="920" instrument_node="">Francoise Wemelsfelder (1997)</span></a><span data-dcnode-id="918" instrument_node=""> and others demonstrated that humans show high inter-rater reliability when judging the emotional states of animals from species with which they are somewhat familiar. This opened the door to a “science of the subjective”, which demonstrates that holistic or even unconscious processes of understanding can have objectively measurable levels of accuracy (for example, by accurately identifying animals in fear-provoking conditions, when blinded to which animals were filmed under those conditions).</span></p><p data-dcnode-id="912" id="p0170"><span data-dcnode-id="916" instrument_node="">In 1997 another influential idea arose that recognized that animal welfare exists as both an ethical concern and a scientific discipline, and so cannot be given an objectively precise definition. </span><a class="workspace-trigger" data-dcnode-id="914" href="#fur3" name="bfur3"><span data-dcnode-id="915" instrument_node="">Ian Duncan and David Fraser (1997)</span></a><span data-dcnode-id="913" instrument_node=""> outlined three domains that are important to welfare: natural living, subjective experiences, and biological function. These represent the predominant issues that most people believe are intuitively important to welfare, and that can be—to some extent—scientifically studied and considered before reaching a judgment about a particular animal or groups of animals.</span></p><p data-dcnode-id="910" id="p0175"><span data-dcnode-id="911" instrument_node="">Others have considered control over one's environment, the presence of positive subjective states, preference and motivation, and death itself (not just any attendant suffering) to be relevant to a core understanding of animals' welfare.</span></p><p data-dcnode-id="908" id="p0180"><span data-dcnode-id="909" instrument_node="">Definitions of welfare underlying regulatory codes and law often draw on a combination of the aforementioned concepts. For example, at the international level the current World Organisation for Animal Health definition of animal welfare makes reference to standards of care, minimizing negative subjective states, coping, health, and innate (a.k.a. natural) behavior. The Animal Welfare Act incorporates standards of care, the Three Rs, and minimizing negative subjective states and environmental enrichment in relation to primates. The ILAR (Institute for Laboratory Animal Research) Guide references standards of care, the Three Rs and minimizing negative subjective states. As such, while codes may not be perfectly aligned, they rest on a shared philosophical and conceptual basis that makes harmonization feasible.</span></p></section><section data-dcnode-id="896" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="905" id="cesectitle0035"><span data-dcnode-id="906" instrument_node="">Conclusion</span></h2><p data-dcnode-id="903" id="p0185"><span data-dcnode-id="904" instrument_node="">At present, important regulatory and advisory standards are provided by federal and state agencies, nongovernmental organizations, inspecting regulatory agencies, funding agencies, journal requirements for publication, and others. Those using animals for research will typically need to comply with multiple overlapping compulsory and voluntary guidelines, and also take into account the perspectives and expectations of their local community. There is a general pattern of increasing regulation, a high level of public discourse and lobbying, and a need for wide harmonization and collaboration and high standards of care in support of ongoing animal-based activities.</span></p><p data-dcnode-id="899" id="p0190"><span data-dcnode-id="902" instrument_node="">Each of the issues and events touched upon in this introduction, and many more, will be more fully considered in the following chapters of this book. It is important to always remember that everything we do is embedded in history and in the cultures, traditions, and habits of</span><span data-dcnode-id="901" id="pg6"></span><span data-dcnode-id="900" instrument_node=""> mind that history has delivered into our hands. Animal-based research, testing, and teaching is an endeavor that rests on deep, but shifting foundations. As we construct ever more exacting rules and guidelines that protect the efficacy and ethics of science, we must be mindful of what is going on inside and outside of our laboratories' walls. Even as we improve our ability to make sound recommendations about the finer details of practice, the question of how animals should be used and treated remains subject to societal preferences, and those preferences have the potential to change community mandates in profound and overarching ways.</span></p><p data-dcnode-id="897" id="p0195"><span data-dcnode-id="898" instrument_node="">Researchers, technicians and veterinarians, by entering their chosen professions, agree to certain training and compliance with all relevant codes of practice. But further, they enter into contracts with their animals, with their community, and with their own conscience. These contracts must be well based in science, ethics, and logic—and yet be constantly open to doubt and the potential for change upon which all endeavors of science ultimately rest. A structure retains its integrity as much from flexibility as from strength.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="890"><button class="button button-anchor" data-dcnode-id="891" type="button"><span class="button-text" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="278"><section class="bibliography u-font-serif text-s" data-dcnode-id="279" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="280" id="cebibsec0010"><dl class="references" data-dcnode-id="281" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="885"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="886" href="#bfur1" id="ref-id-fur1"><span data-dcnode-id="887" instrument_node="">Brambell, 1965</span></a></dt><dd class="reference" data-dcnode-id="879" id="ceotherref0015"><span data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Brambell, R., 1965. Report of the Technical Committee to Enquire into the Welfare of Animals Kept under Intensive Livestock Husbandry Systems. Her Majesty's Stationery Office, London, p. 85.</span></span><div class="ReferenceLinks u-font-sans" data-dcnode-id="880"><a class="link" data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DBrambell%2C%2520R.%2C%25201965.%2520Report%2520of%2520the%2520Technical%2520Committee%2520to%2520Enquire%2520into%2520the%2520Welfare%2520of%2520Animals%2520Kept%2520under%2520Intensive%2520Livestock%2520Husbandry%2520Systems.%2520Her%2520Majestys%2520Stationery%2520Office%2C%2520London%2C%2520p.%252085." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="882" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="876"><a data-aa-butto -id="270" instrument_node="">2015, Laboratory Animal Medicine: Third Edition</span></div></div><div class="buttons" data-dcnode-id="262"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="263" type="button"><span class="button-link-text" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="264" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="265"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="257"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="258" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="259"><p data-dcnode-id="260" id="sp0035"><span data-dcnode-id="261" instrument_node="">The term ‘animal welfare,’ in both the lay and scientific community, is often used to refer to a concept. In this context, positive animal welfare may be substituted with the term ‘well-being.’ Animal welfare serves as a cornerstone, or foundation, for laboratory animal medicine and the use of animals in research. ‘Animal welfare’ also refers to a measurable state in an animal which may be related to the adequacy of an animal’s ability to cope with its environment. Animal welfare is a branch of science which looks at these measurable states in almost all areas of our interaction with animals – agriculture, entertainment, companionship, research, and others. This chapter will highlight the significant emphasis on animal welfare in the field of laboratory animal science and medicine, beginning with some of the history, philosophies, ethics, and events which have shaped the impact of animal welfare on the use of animals in research. Laws and regulations will only be briefly mentioned as they are covered elsewhere in this book; however, guidelines and principles, such as the 3Rs, will be covered in more detail. Using examples of reduction and refinement, strategies for optimizing laboratory animal welfare in general and in several specific areas of research will be discussed. Animal welfare as a science, measuring the animal’s perception of their state of well-being and going beyond just physiologic measurement of health and production, will be discussed, with particular focus on the use of behavioral monitoring to measure welfare.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="245"><div class="sub-heading" data-dcnode-id="250"><a data-dcnode-id="253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1254/fpj.151.69" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="254" id="citing-articles-article1-title"><span data-dcnode-id="255" instrument_node="">Animal welfare and corporate welfare in pharmaceutical R&amp;amp;D ― The future of third-party assessment</span></h3></a><div class="article-source ellipsis" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">2018, Folia Pharmacologica Japonica</span></div></div><div class="buttons" data-dcnode-id="249"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="246"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="247" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="248"></div></div></div></li></ul><span data-dcnode-id="243" instrument_node=""></span></div></div></section></div><div class="Copyright" data-dcnode-id="236"><span class="copyright-line" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Copyright © 2013 Elsevier Inc. All rights reserved.</span></span></div></article
