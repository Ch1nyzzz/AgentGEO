</span><h3 data-dcnode-id="2472"><span class="mw-headline" data-dcnode-id="2480" id="Kunitha:_a_ritual_dance"><span data-dcnode-id="2481" instrument_node="">Kunitha: a ritual dance</span></span><span class="mw-editsection" data-dcnode-id="2473"><span class="mw-editsection-bracket" data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">[</span></span><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D2" title="Edit section: Kunitha: a ritual dance"><span data-dcnode-id="2477" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2470" instrument_node="">The ritual dances of Karnataka are known as </span><i data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Kunitha</span></i><span data-dcnode-id="2467" instrument_node="">. One such dance is the </span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dollu_Kunitha" title="Dollu Kunitha"><span data-dcnode-id="2466" instrument_node="">Dollu Kunitha</span></a><span data-dcnode-id="2464" instrument_node="">, a popular dance form accompanied by singing and the beats of decorated drums. This dance is primarily performed by men from the shepherd or </span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuruba" title="Kuruba"><span data-dcnode-id="2463" instrument_node="">Kuruba</span></a><span data-dcnode-id="2461" instrument_node=""> caste. The Dollu Kunitha is characterized by vigorous drum beats, quick movements and synchronized group formations.
</span></p><span data-dcnode-id="2459" instrument_node="">
</span><h3 data-dcnode-id="2448"><span class="mw-headline" data-dcnode-id="2456" id="Dollu_Kunitha"><span class="anchor" data-dcnode-id="2458" id="Dollu_Kunitha_or_Dollu_Dance"></span><span data-dcnode-id="2457" instrument_node="">Dollu Kunitha</span></span><span class="mw-editsection" data-dcnode-id="2449"><span class="mw-editsection-bracket" data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">[</span></span><a data-dcnode-id="2452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D3" title="Edit section: Dollu Kunitha"><span data-dcnode-id="2453" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2447" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2441" role="note"><span data-dcnode-id="2444" instrument_node="">Main article: </span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dollu_Kunitha" title="Dollu Kunitha"><span data-dcnode-id="2443" instrument_node="">Dollu Kunitha</span></a></div><span data-dcnode-id="2440" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2431"><div class="thumbinner" data-dcnode-id="2432" style="width:172px;"><a class="image" data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChandeboy.jpg"><img alt="" class="thumbimage" data-dcnode-id="2439" data-file-height="3264" data-file-width="2448" decoding="async" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Chandeboy.jpg/170px-Chandeboy.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Chandeboy.jpg/255px-Chandeboy.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Chandeboy.jpg/340px-Chandeboy.jpg 2x" width="170"></a><span data-dcnode-id="2437" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2433"><div class="magnify" data-dcnode-id="2435"><a class="internal" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChandeboy.jpg" title="Enlarge"></a></div><span data-dcnode-id="2434" instrument_node="">Various styles of traditional drums are used in folk music, dance and theater of Karnataka</span></div></div></div><span data-dcnode-id="2430" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2419"><div class="thumbinner" data-dcnode-id="2420" style="width:172px;"><a class="image" data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMahila_Dollu_Kunita.jpg"><img alt="Colourfully-dressed women dancing" class="thumbimage" data-dcnode-id="2429" data-file-height="1024" data-file-width="682" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Mahila_Dollu_Kunita.jpg/170px-Mahila_Dollu_Kunita.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Mahila_Dollu_Kunita.jpg/255px-Mahila_Dollu_Kunita.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/74/Mahila_Dollu_Kunita.jpg/340px-Mahila_Dollu_Kunita.jpg 2x" width="170"></a><span data-dcnode-id="2427" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2421"><div class="magnify" data-dcnode-id="2425"><a class="internal" data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMahila_Dollu_Kunita.jpg" title="Enlarge"></a></div><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dollu_Kunitha" title="Dollu Kunitha"><span data-dcnode-id="2424" instrument_node="">Dollu Kunitha</span></a><span data-dcnode-id="2422" instrument_node=""> is also danced by women.</span></div></div></div><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2417" instrument_node="">This is a group dance named after the </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dollu" title="Dollu"><span data-dcnode-id="2416" instrument_node="">dollu</span></a><span data-dcnode-id="2414" instrument_node=""> used in its performance, and performed by the men of the </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuruba" title="Kuruba"><span data-dcnode-id="2413" instrument_node="">Kuruba</span></a><span data-dcnode-id="2411" instrument_node=""> community. The group consists of 16 dancers, each wearing a drum and playing different rhythms while dancing. The beat is directed by a leader with cymbals in the center. Slow and fast rhythms alternate, and the group weaves a varied pattern. Costumes are simple; the upper part of the body is usually left bare, while a black sheet is tied on the lower body over the </span><a data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dhoti" title="Dhoti"><span data-dcnode-id="2410" instrument_node="">dhoti</span></a><span data-dcnode-id="2408" instrument_node="">. A troupe led by K. S. Haridas Bhat toured the USSR in 1987, performing in </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="2407" instrument_node="">Moscow</span></a><span data-dcnode-id="2405" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leningrad" title="Leningrad"><span data-dcnode-id="2404" instrument_node="">Leningrad</span></a><span data-dcnode-id="2402" instrument_node="">, </span><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vyborg" title="Vyborg"><span data-dcnode-id="2401" instrument_node="">Vyborg</span></a><span data-dcnode-id="2399" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Archangelsk" title="Archangelsk"><span data-dcnode-id="2398" instrument_node="">Archangelsk</span></a><span data-dcnode-id="2396" instrument_node="">, Pskov, Murmansk, Tashkent and Novograd.
</span></p><span data-dcnode-id="2394" instrument_node="">
</span><h3 data-dcnode-id="2383"><span class="mw-headline" data-dcnode-id="2391" id="Beesu_kamsale_and_kamsale_nritya"><span class="anchor" data-dcnode-id="2393" id="Beesu_kamsaLe_or_kamsaLe_nritya(dance)"></span><span data-dcnode-id="2392" instrument_node="">Beesu kamsale and kamsale nritya</span></span><span class="mw-editsection" data-dcnode-id="2384"><span class="mw-editsection-bracket" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">[</span></span><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D4" title="Edit section: Beesu kamsale and kamsale nritya"><span data-dcnode-id="2388" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2382" instrument_node="">
</span><link data-dcnode-id="2381" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2377" role="note"><span data-dcnode-id="2380" instrument_node="">Main article: </span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamsale" title="Kamsale"><span data-dcnode-id="2379" instrument_node="">Kamsale</span></a></div><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2375" instrument_node="">This is a group dance performed by village men in the </span><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore" title="Mysore"><span data-dcnode-id="2374" instrument_node="">Mysore</span></a><span data-dcnode-id="2372" instrument_node="">, Nanjanagudu, Kollegala and </span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore" title="Bangalore"><span data-dcnode-id="2371" instrument_node="">Bangalore</span></a><span data-dcnode-id="2369" instrument_node=""> regions. It is named after the kamsale, which is played and as a prop by the dancers. The kamsale is a cymbal in one hand and a bronze disc in the other, producing a rhythmic clang.
</span></p><p data-dcnode-id="2347"><span data-dcnode-id="2367" instrument_node="">The kamsale nritya is connected to a tradition of worship of </span><i data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Male Mahadeshwara</span></i><span data-dcnode-id="2364" instrument_node=""> (</span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shiva" title="Shiva"><span data-dcnode-id="2363" instrument_node="">Shiva</span></a><span data-dcnode-id="2361" instrument_node="">) by the </span><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuruba" title="Kuruba"><span data-dcnode-id="2360" instrument_node="">Kuruba</span></a><span data-dcnode-id="2358" instrument_node=""> community, from which most of the dancers are drawn. The dance is performed to rhythmic, melodious music sung in praise of Shiva. It is part of a </span><i data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">diiksha</span></i><span data-dcnode-id="2355" instrument_node="">(oath), and is taught by a spiritual leader. This dance was showcased in Kannada films such as </span><i data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Janumadha Jodi</span></i><span data-dcnode-id="2352" instrument_node=""> and </span><i data-dcnode-id="2349"><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jogi_%28film%29" title="Jogi (film)"><span data-dcnode-id="2351" instrument_node="">Jogi</span></a></i><span data-dcnode-id="2348" instrument_node="">, in which the protagonist is a kamsale dancer.
</span></p><span data-dcnode-id="2346" instrument_node="">
</span><h3 data-dcnode-id="2336"><span class="mw-headline" data-dcnode-id="2344" id="Somana_Kunita"><span data-dcnode-id="2345" instrument_node="">Somana Kunita</span></span><span class="mw-editsection" data-dcnode-id="2337"><span class="mw-editsection-bracket" data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">[</span></span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D5" title="Edit section: Somana Kunita"><span data-dcnode-id="2341" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2325"><i data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Somana Kunita</span></i><span data-dcnode-id="2332" instrument_node=""> (the Mask Dance) is a celebratory form of guardian spirit worship popular in southern Karnataka, performed primarily in village shrines dedicated to the </span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mother_goddess%23Hinduism" title="Mother goddess"><span data-dcnode-id="2331" instrument_node="">Mother Goddess</span></a><span data-dcnode-id="2329" instrument_node=""> by the Gangemata community. The dance is characterised by elaborate masks (</span><i data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">somas</span></i><span data-dcnode-id="2326" instrument_node="">) painted in a variety of colours, with each mask's colour indicating the god's nature. A benevolent deity is represented by a red mask, while a yellow or black mask suggests the opposite. There are many types of masks, differing from region to region.
</span></p><p data-dcnode-id="2311"><span data-dcnode-id="2324" instrument_node="">Somana Kunitha is a ritualistic dance associated with worship of the </span><i data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Grama Devate</span></i><span data-dcnode-id="2321" instrument_node=""> [village deity], and is primarily celebrated after </span><a data-dcnode-id="2319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ugadi" title="Ugadi"><span data-dcnode-id="2320" instrument_node="">Ugadi</span></a><span data-dcnode-id="2318" instrument_node=""> and before the onset of the </span><a data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monsoon" title="Monsoon"><span data-dcnode-id="2317" instrument_node="">monsoon</span></a><span data-dcnode-id="2315" instrument_node=""> at </span><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maha_Shivaratri" title="Maha Shivaratri"><span data-dcnode-id="2314" instrument_node="">Maha Shivaratri</span></a><span data-dcnode-id="2312" instrument_node="">. It is most popular in the old Mysore region, in districts such as Hassan, Tumkur, Bangalore, Mandya and Chitradurga.
</span></p><p data-dcnode-id="2291"><span data-dcnode-id="2310" instrument_node="">On the ceremonial day, offerings are made to the spirits. The masks are made from the </span><a data-dcnode-id="2308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pterocarpus_santalinus" title="Pterocarpus santalinus"><span data-dcnode-id="2309" instrument_node="">red sandalwood</span></a><span data-dcnode-id="2307" instrument_node=""> tree. Other props include a cane (or stick) and peacock feathers. A small hat with colourful flowers, </span><a data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azadirachta_indica" title="Azadirachta indica"><span data-dcnode-id="2306" instrument_node="">neem</span></a><span data-dcnode-id="2304" instrument_node=""> leaves and colourful strips of cloth is also worn. Music is provided by the </span><i data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">doonu</span></i><span data-dcnode-id="2301" instrument_node="">(percussion), </span><i data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">mouri</span></i><span data-dcnode-id="2298" instrument_node="">(pipe) and </span><i data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">sadde</span></i><span data-dcnode-id="2295" instrument_node="">(a pipe for the </span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C5%259Aruti" title="Śruti"><span data-dcnode-id="2294" instrument_node="">Śruti</span></a><span data-dcnode-id="2292" instrument_node="">). The dancer begins in the temple of the goddess, singing praise of the guardian spirit in a trance-like state. An offering of the blood of a fowl is sometimes made to the goddess.
</span></p><span data-dcnode-id="2290" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2281"><div class="thumbinner" data-dcnode-id="2282" style="width:222px;"><a class="image" data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFolk_dance_of_Karnataka2.jpg"><img alt="" class="thumbimage" data-dcnode-id="2289" data-file-height="3072" data-file-width="4608" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/10/Folk_dance_of_Karnataka2.jpg/220px-Folk_dance_of_Karnataka2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/10/Folk_dance_of_Karnataka2.jpg/330px-Folk_dance_of_Karnataka2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/10/Folk_dance_of_Karnataka2.jpg/440px-Folk_dance_of_Karnataka2.jpg 2x" width="220"></a><span data-dcnode-id="2287" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2283"><div class="magnify" data-dcnode-id="2285"><a class="internal" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFolk_dance_of_Karnataka2.jpg" title="Enlarge"></a></div><span data-dcnode-id="2284" instrument_node="">Folk dance of Karnataka</span></div></div></div><span data-dcnode-id="2280" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2271"><div class="thumbinner" data-dcnode-id="2272" style="width:222px;"><a class="image" data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASuggi_Kunitha_Karnatala.jpg"><img alt="" class="thumbimage" data-dcnode-id="2279" data-file-height="533" data-file-width="800" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Suggi_Kunitha_Karnatala.jpg/220px-Suggi_Kunitha_Karnatala.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Suggi_Kunitha_Karnatala.jpg/330px-Suggi_Kunitha_Karnatala.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Suggi_Kunitha_Karnatala.jpg/440px-Suggi_Kunitha_Karnatala.jpg 2x" width="220"></a><span data-dcnode-id="2277" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2273"><div class="magnify" data-dcnode-id="2275"><a class="internal" data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASuggi_Kunitha_Karnatala.jpg" title="Enlarge"></a></div><span data-dcnode-id="2274" instrument_node="">Suggi Kunitha</span></div></div></div><span data-dcnode-id="2270" instrument_node="">
</span><h3 data-dcnode-id="2260"><span class="mw-headline" data-dcnode-id="2268" id="Suggi_Kunita"><span data-dcnode-id="2269" instrument_node="">Suggi Kunita</span></span><span class="mw-editsection" data-dcnode-id="2261"><span class="mw-editsection-bracket" data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">[</span></span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D6" title="Edit section: Suggi Kunita"><span data-dcnode-id="2265" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2251"><i data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Suggi Kunita</span></i><span data-dcnode-id="2256" instrument_node=""> (the Harvest Dance) is performed during the harvest time mostly by the farming community. Artists in beautiful costumes and wooden headgear adorned with carved birds and flowers dance to the tune of drums with sticks and peacock feathers. They enhance the dance sometimes, by their own signing.</span><sup class="reference" data-dcnode-id="2253" id="cite_ref-Karnataka_Folk_art_1-0"><a data-dcnode-id="2254" href="#cite_note-Karnataka_Folk_art-1"><span data-dcnode-id="2255" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2252" instrument_node="">
</span></p><span data-dcnode-id="2250" instrument_node="">
</span><h2 data-dcnode-id="2239"><span class="mw-headline" data-dcnode-id="2247" id="North_Karnataka"><span class="anchor" data-dcnode-id="2249" id="Arts_of_North_Karnataka"></span><span data-dcnode-id="2248" instrument_node="">North Karnataka</span></span><span class="mw-editsection" data-dcnode-id="2240"><span class="mw-editsection-bracket" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">[</span></span><a data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D7" title="Edit section: North Karnataka"><span data-dcnode-id="2244" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2238" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2229"><div class="thumbinner" data-dcnode-id="2230" style="width:202px;"><a class="image" data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APuupets_used_in_puppet_shows.jpg"><img alt="" class="thumbimage" data-dcnode-id="2237" data-file-height="2592" data-file-width="3456" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/67/Puupets_used_in_puppet_shows.jpg/200px-Puupets_used_in_puppet_shows.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/67/Puupets_used_in_puppet_shows.jpg/300px-Puupets_used_in_puppet_shows.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/67/Puupets_used_in_puppet_shows.jpg/400px-Puupets_used_in_puppet_shows.jpg 2x" width="200"></a><span data-dcnode-id="2235" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2231"><div class="magnify" data-dcnode-id="2233"><a class="internal" data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APuupets_used_in_puppet_shows.jpg" title="Enlarge"></a></div><span data-dcnode-id="2232" instrument_node="">Traditional wooden Puppetry of Karnataka.</span></div></div></div><span data-dcnode-id="2228" instrument_node="">
</span><h3 data-dcnode-id="2218"><span class="mw-headline" data-dcnode-id="2226" id="Jaggahalige_Kunita"><span data-dcnode-id="2227" instrument_node="">Jaggahalige Kunita</span></span><span class="mw-editsection" data-dcnode-id="2219"><span class="mw-editsection-bracket" data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">[</span></span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D8" title="Edit section: Jaggahalige Kunita"><span data-dcnode-id="2223" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2216" instrument_node="">This is a folk art of the Hubballi Dharwad region (particularly the village of Byahatti), which is performed on occasions such as </span><a data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ugadi" title="Ugadi"><span data-dcnode-id="2215" instrument_node="">Ugadi</span></a><span data-dcnode-id="2213" instrument_node=""> and </span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holi" title="Holi"><span data-dcnode-id="2212" instrument_node="">Holi</span></a><span data-dcnode-id="2210" instrument_node="">. The </span><i data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">jagghalige</span></i><span data-dcnode-id="2207" instrument_node=""> is a percussion instrument made from a </span><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullock_cart" title="Bullock cart"><span data-dcnode-id="2206" instrument_node="">bullock cart</span></a><span data-dcnode-id="2204" instrument_node=""> wheel wrapped in buffalo hide. The villagers roll out the large instruments and march in procession. The performance is directed by a choreographer playing a much-smaller percussion instrument called the </span><i data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">kanihaligi</span></i><span data-dcnode-id="2201" instrument_node="">, made of clay and covered with calf hide. The performance usually involves about 15 people.
</span></p><span data-dcnode-id="2199" instrument_node="">
</span><h3 data-dcnode-id="2189"><span class="mw-headline" data-dcnode-id="2197" id="Karadi_majalu"><span data-dcnode-id="2198" instrument_node="">Karadi majalu</span></span><span class="mw-editsection" data-dcnode-id="2190"><span class="mw-editsection-bracket" data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">[</span></span><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D9" title="Edit section: Karadi majalu"><span data-dcnode-id="2194" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2187" instrument_node="">This is popular group folk music in north Karnataka, performed during occasions and in processions. The </span><i data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">karadi</span></i><span data-dcnode-id="2184" instrument_node=""> or </span><i data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">karade</span></i><span data-dcnode-id="2181" instrument_node=""> is the percussion instrument used by the group. It is a palm-sized cymbal producing metallic sounds, and the </span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shehnai" title="Shehnai"><span data-dcnode-id="2180" instrument_node="">shehnai</span></a><span data-dcnode-id="2178" instrument_node=""> produces the melody.
</span></p><span data-dcnode-id="2176" instrument_node="">
</span><h3 data-dcnode-id="2166"><span class="mw-headline" data-dcnode-id="2174" id="Krishna_Parijatha"><span data-dcnode-id="2175" instrument_node="">Krishna Parijatha</span></span><span class="mw-editsection" data-dcnode-id="2167"><span class="mw-editsection-bracket" data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">[</span></span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D10" title="Edit section: Krishna Parijatha"><span data-dcnode-id="2171" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2164" instrument_node="">Krishna Parijatha is theatre popular in North Karnataka. It is a combination of </span><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yakshagana" title="Yakshagana"><span data-dcnode-id="2163" instrument_node="">Yakshagana</span></a><span data-dcnode-id="2161" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bayalatada" title="Bayalatada"><span data-dcnode-id="2160" instrument_node="">Bayalata</span></a><span data-dcnode-id="2158" instrument_node="">, portraying stories or scenes from the </span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahabharata" title="Mahabharata"><span data-dcnode-id="2157" instrument_node="">Mahabharata</span></a><span data-dcnode-id="2155" instrument_node="">
</span></p><span data-dcnode-id="2153" instrument_node="">
</span><h3 data-dcnode-id="2143"><span class="mw-headline" data-dcnode-id="2151" id="Lavani"><span data-dcnode-id="2152" instrument_node="">Lavani</span></span><span class="mw-editsection" data-dcnode-id="2144"><span class="mw-editsection-bracket" data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">[</span></span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D11" title="Edit section: Lavani"><span data-dcnode-id="2148" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">This folk dance of </span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maharashtra" title="Maharashtra"><span data-dcnode-id="2140" instrument_node="">Maharashtra</span></a><span data-dcnode-id="2138" instrument_node=""> is also present in some parts karnataka
</span></p><span data-dcnode-id="2136" instrument_node="">
</span><h2 data-dcnode-id="2125"><span class="mw-headline" data-dcnode-id="2133" id="Dakshina_Kannada"><span class="anchor" data-dcnode-id="2135" id="Arts_of_''DakshinaKannada''"></span><span data-dcnode-id="2134" instrument_node="">Dakshina Kannada</span></span><span class="mw-editsection" data-dcnode-id="2126"><span class="mw-editsection-bracket" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">[</span></span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D12" title="Edit section: Dakshina Kannada"><span data-dcnode-id="2130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2124" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2110"><div class="thumbinner" data-dcnode-id="2111" style="width:182px;"><a class="image" data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJambavanta.JPG"><img alt="" class="thumbimage" data-dcnode-id="2123" data-file-height="1600" data-file-width="1200" decoding="async" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/c/cf/Jambavanta.JPG/180px-Jambavanta.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/c/cf/Jambavanta.JPG/270px-Jambavanta.JPG 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/c/cf/Jambavanta.JPG/360px-Jambavanta.JPG 2x" width="180"></a><span data-dcnode-id="2121" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2112"><div class="magnify" data-dcnode-id="2119"><a class="internal" data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJambavanta.JPG" title="Enlarge"></a></div><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jambavan" title="Jambavan"><span data-dcnode-id="2118" instrument_node="">Jambavanta</span></a><span data-dcnode-id="2116" instrument_node=""> as depicted in </span><a data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yakshagana" title="Yakshagana"><span data-dcnode-id="2115" instrument_node="">Yakshagana</span></a><span data-dcnode-id="2113" instrument_node="">.</span></div></div></div><span data-dcnode-id="2109" instrument_node="">
</span><h3 data-dcnode-id="2099"><span class="mw-headline" data-dcnode-id="2107" id="Bhootha_Aradhane"><span data-dcnode-id="2108" instrument_node="">Bhootha Aradhane</span></span><span class="mw-editsection" data-dcnode-id="2100"><span class="mw-editsection-bracket" data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">[</span></span><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D13" title="Edit section: Bhootha Aradhane"><span data-dcnode-id="2104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2098" instrument_node="">
</span><link data-dcnode-id="2097" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2093" role="note"><span data-dcnode-id="2096" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhuta_Kola" title="Bhuta Kola"><span data-dcnode-id="2095" instrument_node="">Bhuta Kola</span></a></div><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2091" instrument_node="">This dance form is widely performed in coastal regions. The </span><i data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Bhootha Aradhane</span></i><span data-dcnode-id="2088" instrument_node=""> (</span><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gana" title="Gana"><span data-dcnode-id="2087" instrument_node="">Gana</span></a><span data-dcnode-id="2085" instrument_node="">) worship includes a procession of idols and is characterized by drums and firecrackers. At the end of the procession, the idols are placed on a </span><a class="mw-redirect" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plinth" title="Plinth"><span data-dcnode-id="2084" instrument_node="">plinth</span></a><span data-dcnode-id="2082" instrument_node="">. A dancer, personifying a </span><i data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">bhoota</span></i><span data-dcnode-id="2079" instrument_node=""> (holy spirit), dances around the plinth with sword and jingling bells. The dancer dances quickly and then slows, signifying that he is now divine.
</span></p><span data-dcnode-id="2077" instrument_node="">
</span><h3 data-dcnode-id="2067"><span class="mw-headline" data-dcnode-id="2075" id="Yakshagana"><span data-dcnode-id="2076" instrument_node="">Yakshagana</span></span><span class="mw-editsection" data-dcnode-id="2068"><span class="mw-editsection-bracket" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">[</span></span><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D14" title="Edit section: Yakshagana"><span data-dcnode-id="2072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2066" instrument_node="">
</span><link data-dcnode-id="2065" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2061" role="note"><span data-dcnode-id="2064" instrument_node="">Main article: </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yakshagana" title="Yakshagana"><span data-dcnode-id="2063" instrument_node="">Yakshagana</span></a></div><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Yakshagana is not folk art but a popular traditional theatre of India performed in coastal and malenadu regions which is a blend of dance, music, songs, scholarly dialogue and colourful costumes. The word means "celestial music", and the dance drama is performed during the night (usually after the winter crop has been harvested).
</span></p><span data-dcnode-id="2057" instrument_node="">
</span><h2 data-dcnode-id="2043"><span class="mw-headline" data-dcnode-id="2051" id="Kodagu"><span class="anchor" data-dcnode-id="2056" id="Bolak-aat"></span><span class="anchor" data-dcnode-id="2055" id="Ummatt-aat"></span><span class="anchor" data-dcnode-id="2054" id="Komb-aat"></span><span class="anchor" data-dcnode-id="2053" id="Folk_arts_of_Kodagu"></span><span data-dcnode-id="2052" instrument_node="">Kodagu</span></span><span class="mw-editsection" data-dcnode-id="2044"><span class="mw-editsection-bracket" data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">[</span></span><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D15" title="Edit section: Kodagu"><span data-dcnode-id="2048" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2041" instrument_node="">The Huttari Dance and 'Contemporary theatre culture in Karnataka is one of the most vibrant in India with organizations like Ninasam, Ranga Shankara and Rangayana active
on foundations laid down by the Gubbi Veeranna Nataka Company
</span><i data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Bolak-aata</span></i><span data-dcnode-id="2038" instrument_node=""> are dance forms in </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kodagu_district" title="Kodagu district"><span data-dcnode-id="2037" instrument_node="">Kodagu</span></a><span data-dcnode-id="2035" instrument_node="">. The </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kodava_people" title="Kodava people"><span data-dcnode-id="2034" instrument_node="">Kodavas</span></a><span data-dcnode-id="2032" instrument_node=""> are a unique group who differ in customs, traditions and religion from the surrounding populace, and have an annual harvest dance. The men, dressed in traditional Kodava costumes with decorative knives, perform this slow dance to background music. The dance has different varieties:
</span></p><span data-dcnode-id="2030" instrument_node="">
</span><dl data-dcnode-id="2025"><dt data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Bolak-aat</span></dt><span data-dcnode-id="2027" instrument_node="">
</span><dd data-dcnode-id="2026"></dd></dl><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2023" instrument_node="">Performed by Kodava men in back of an oil lamp in an open field. The men hold </span><i data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">chavari</span></i><span data-dcnode-id="2020" instrument_node="">(yak fur) in one hand and the Kodava short sword (</span><i data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">odi-kathi</span></i><span data-dcnode-id="2017" instrument_node="">) in the other while performing this dance. Regional varieties of this dance exist in which performers dance with the </span><i data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">chavari</span></i><span data-dcnode-id="2014" instrument_node=""> and not the short sword. When the </span><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">odi-kathi</span></i><span data-dcnode-id="2011" instrument_node=""> is also used, the dance is known as </span><i data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">kattiyaata</span></i><span data-dcnode-id="2008" instrument_node="">. The </span><i data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">dudi</span></i><span data-dcnode-id="2005" instrument_node="">, an hourglass-shaped drum, provides the rhythm.
</span></p><span data-dcnode-id="2003" instrument_node="">
</span><dl data-dcnode-id="1998"><dt data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Ummatt-aat</span></dt><span data-dcnode-id="2000" instrument_node="">
</span><dd data-dcnode-id="1999"></dd></dl><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1996" instrument_node="">Performed by Kodava women, who wear traditional Kodava dress with jewelry, adorn their foreheads with </span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kumkuma" title="Kumkuma"><span data-dcnode-id="1995" instrument_node="">kumkuma</span></a><span data-dcnode-id="1993" instrument_node=""> and dance in a circle to a swinging rhythm, brass cymbals in hand. A woman stands at the center holding a pot full of water to represent </span><i data-dcnode-id="1989"><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaveri" title="Kaveri"><span data-dcnode-id="1992" instrument_node="">Kaveri</span></a><span data-dcnode-id="1990" instrument_node=""> Taayi</span></i><span data-dcnode-id="1988" instrument_node=""> (Mother Kaveri), whom the Kodavas worship.
</span></p><span data-dcnode-id="1986" instrument_node="">
</span><dl data-dcnode-id="1981"><dt data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Komb-aat</span></dt><span data-dcnode-id="1983" instrument_node="">
</span><dd data-dcnode-id="1982"></dd></dl><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1979" instrument_node="">While the </span><i data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Bolaak-aat</span></i><span data-dcnode-id="1976" instrument_node=""> and the </span><i data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Ummatt-aat</span></i><span data-dcnode-id="1973" instrument_node=""> are celebratory and festive, the </span><i data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Komb-aat</span></i><span data-dcnode-id="1970" instrument_node=""> is a religious dance. It is traditionally performed in temples, but may also be performed in other places. Performed by Kodava men, deer horns represent the horns of the </span><i data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">krishnamruga</span></i><span data-dcnode-id="1967" instrument_node=""> (a spotted deer in Kodava legend). The dance is performed to rhythmic tunes played on wind instruments and percussion, and includes martial movements representing techniques used by the Kodavas in warfare.
</span></p><span data-dcnode-id="1965" instrument_node="">
</span><h2 data-dcnode-id="1955"><span class="mw-headline" data-dcnode-id="1963" id="Arts_common_to_most_regions"><span data-dcnode-id="1964" instrument_node="">Arts common to most regions</span></span><span class="mw-editsection" data-dcnode-id="1956"><span class="mw-editsection-bracket" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">[</span></span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D16" title="Edit section: Arts common to most regions"><span data-dcnode-id="1960" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1954" instrument_node="">
</span><h3 data-dcnode-id="1942"><span class="mw-headline" data-dcnode-id="1950" id="Hagalu_veshagaararu"><span class="anchor" data-dcnode-id="1953" id="Hagalu_Veeshagaararu_(Day_Actor's)"></span><i data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Hagalu veshagaararu</span></i></span><span class="mw-editsection" data-dcnode-id="1943"><span class="mw-editsection-bracket" data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">[</span></span><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D17" title="Edit section: Hagalu veshagaararu"><span data-dcnode-id="1947" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1941" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1932"><div class="thumbinner" data-dcnode-id="1933" style="width:182px;"><a class="image" data-dcnode-id="1939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHanumantha_in_the_making.jpg"><img alt="" class="thumbimage" data-dcnode-id="1940" data-file-height="1600" data-file-width="1200" decoding="async" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/15/Hanumantha_in_the_making.jpg/180px-Hanumantha_in_the_making.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/15/Hanumantha_in_the_making.jpg/270px-Hanumantha_in_the_making.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/15/Hanumantha_in_the_making.jpg/360px-Hanumantha_in_the_making.jpg 2x" width="180"></a><span data-dcnode-id="1938" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1934"><div class="magnify" data-dcnode-id="1936"><a class="internal" data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHanumantha_in_the_making.jpg" title="Enlarge"></a></div><span data-dcnode-id="1935" instrument_node="">Folk artist applying character makeup.</span></div></div></div><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1930" instrument_node="">This is a group of itinerant actors in Karnataka who specialise in unscripted miming; no stage or facility is used. The artists move from place to place, pitching tents and offering to perform. They play a variety of mythological, legendary and real characters. Performances draw from daily life, and sometimes full-length plays are staged. They perform </span><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vachana_sahitya" title="Vachana sahitya"><span data-dcnode-id="1929" instrument_node="">vachana sahityas</span></a><span data-dcnode-id="1927" instrument_node=""> by Sarvagna, Basavanna and others.
</span></p><p data-dcnode-id="1909"><span data-dcnode-id="1925" instrument_node="">The harmonium, the tabla-dagga and a pair of cymbals provide melody and rhythm. For their performances, staged in village squares and fairs, the actors receive food collected in a bag by an assistant accompanying the troupe.  Most </span><i data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">hagalu veshagaararus</span></i><span data-dcnode-id="1922" instrument_node=""> belong to the </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veerashaiva" title="Veerashaiva"><span data-dcnode-id="1921" instrument_node="">Veerashaiva</span></a><span data-dcnode-id="1919" instrument_node=""> tradition, while some are Muslims. Sometimes they are addressed as </span><i data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">jyaatigaararu</span></i><span data-dcnode-id="1916" instrument_node=""> ("belonging to the Muslim community"). They are also known as </span><i data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">suDugaaDu siddha</span></i><span data-dcnode-id="1913" instrument_node=""> ("monks of the cemetery") or </span><i data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">bahuroopi</span></i><span data-dcnode-id="1910" instrument_node=""> ("having many disguises").
</span></p><p data-dcnode-id="1901"><span data-dcnode-id="1908" instrument_node="">As their name suggests, they perform primarily during the day (</span><i data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">hagalu</span></i><span data-dcnode-id="1905" instrument_node="">) and only men take part (including female roles). While entertainment is the main objective, the </span><i data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">hagalu veshagararu</span></i><span data-dcnode-id="1902" instrument_node=""> also educate villagers about mythology and social issues with their performances.
</span></p><span data-dcnode-id="1900" instrument_node="">
</span><h3 data-dcnode-id="1890"><span class="mw-headline" data-dcnode-id="1898" id="Goravara_kunita"><span data-dcnode-id="1899" instrument_node="">Goravara kunita</span></span><span class="mw-editsection" data-dcnode-id="1891"><span class="mw-editsection-bracket" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">[</span></span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D18" title="Edit section: Goravara kunita"><span data-dcnode-id="1895" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1860"><i data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Goravara kunita</span></i><span data-dcnode-id="1886" instrument_node=""> is a dance worshipping Shiva which is popular in the Mysore and North Karnataka regions. In North Karnataka the </span><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuruba" title="Kuruba"><span data-dcnode-id="1885" instrument_node="">Goravas</span></a><span data-dcnode-id="1883" instrument_node=""> worship </span><i data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Mylaralinga</span></i><span data-dcnode-id="1880" instrument_node="">. In South Karnataka the Goravas wear black-and-white woollen garments and a black-bear-fur cap (of black bear), and play the </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Damaru" title="Damaru"><span data-dcnode-id="1879" instrument_node="">damaru</span></a><span data-dcnode-id="1877" instrument_node=""> and the </span><i data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">pillangoovi</span></i><span data-dcnode-id="1874" instrument_node=""> (flute). In North Karnataka the Goravas wear black woollen garments and a leather shoulder bag; some wear a black coat and white dhoti. The dancers rub crimson powder and </span><i data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">vibhooti</span></i><span data-dcnode-id="1871" instrument_node=""> (sacred ash) on their foreheads. Traditional Gorava devotees dance in a trance, sometimes barking like dogs. The dancers move in a clockwise zigzag, with no fixed choreography. The North Karnataka Goravas wear yellow powder on their foreheads and give </span><i data-dcnode-id="1868"><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prasada" title="Prasada"><span data-dcnode-id="1870" instrument_node="">Prasada</span></a></i><span data-dcnode-id="1867" instrument_node=""> to devotees. Damaru, </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venu" title="Venu"><span data-dcnode-id="1866" instrument_node="">venu</span></a><span data-dcnode-id="1864" instrument_node="">, small bronze bells and cowbells (</span><i data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">paarigante</span></i><span data-dcnode-id="1861" instrument_node="">) are played.
The dance consists of trance-like movements with no fixed choreography.
</span></p><span data-dcnode-id="1859" instrument_node="">
</span><h3 data-dcnode-id="1849"><span class="mw-headline" data-dcnode-id="1857" id="Nagamandala"><span data-dcnode-id="1858" instrument_node="">Nagamandala</span></span><span class="mw-editsection" data-dcnode-id="1850"><span class="mw-editsection-bracket" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">[</span></span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D19" title="Edit section: Nagamandala"><span data-dcnode-id="1854" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1848" instrument_node="">
</span><link data-dcnode-id="1847" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1843" role="note"><span data-dcnode-id="1846" instrument_node="">Main article: </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nagaradhane" title="Nagaradhane"><span data-dcnode-id="1845" instrument_node="">Nagaradhane</span></a></div><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1841" instrument_node="">This ritual dance is performed in south Karnataka to tranquilize the serpent spirit, and is an extravagant night-long affair. The dancers (</span><i data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Vaidyas</span></i><span data-dcnode-id="1838" instrument_node="">) dance all night around a huge figure, drawn on the ground in natural colors, in a </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pandal" title="Pandal"><span data-dcnode-id="1837" instrument_node="">pandal</span></a><span data-dcnode-id="1835" instrument_node=""> in front of the shrine. The dance is generally performed between December and April.
</span></p><span data-dcnode-id="1833" instrument_node="">
</span><h3 data-dcnode-id="1822"><span class="mw-headline" data-dcnode-id="1830" id="Karaga"><span class="anchor" data-dcnode-id="1832" id="Bangalore_Karaga"></span><span data-dcnode-id="1831" instrument_node="">Karaga</span></span><span class="mw-editsection" data-dcnode-id="1823"><span class="mw-editsection-bracket" data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">[</span></span><a data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D20" title="Edit section: Karaga"><span data-dcnode-id="1827" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1820" instrument_node="">The karaga, in a dance performed by the </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thigala" title="Thigala"><span data-dcnode-id="1819" instrument_node="">Thigalas</span></a><span data-dcnode-id="1817" instrument_node="">, is a metal pot on which stands a tall, floral </span><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyramid" title="Pyramid"><span data-dcnode-id="1816" instrument_node="">pyramid</span></a><span data-dcnode-id="1814" instrument_node=""> and which is balanced on the carrier's head. The contents of the pot are secret. The carrier's arrival is heralded by hundreds of bare-chested, dhoti-clad, turbaned Veerakumaras with unsheathed swords.
</span></p><span data-dcnode-id="1812" instrument_node="">
</span><h3 data-dcnode-id="1802"><span class="mw-headline" data-dcnode-id="1810" id="Gaarudi_Gombe"><span data-dcnode-id="1811" instrument_node="">Gaarudi Gombe</span></span><span class="mw-editsection" data-dcnode-id="1803"><span class="mw-editsection-bracket" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">[</span></span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D21" title="Edit section: Gaarudi Gombe"><span data-dcnode-id="1807" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1801" instrument_node="">
</span><link data-dcnode-id="1800" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1796" role="note"><span data-dcnode-id="1799" instrument_node="">Main article: </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaarudi_Gombe" title="Gaarudi Gombe"><span data-dcnode-id="1798" instrument_node="">Gaarudi Gombe</span></a></div><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1766"><i data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Gaarudi Gombe</span></i><span data-dcnode-id="1792" instrument_node=""> is a </span><a data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folk_dance" title="Folk dance"><span data-dcnode-id="1791" instrument_node="">folk dance</span></a><span data-dcnode-id="1789" instrument_node=""> in which dancers dress in suits made of </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bamboo" title="Bamboo"><span data-dcnode-id="1788" instrument_node="">bamboo</span></a><span data-dcnode-id="1786" instrument_node=""> sticks. </span><i data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Gaarudi-Gombe</span></i><span data-dcnode-id="1783" instrument_node=""> means "magical puppet" in </span><a class="mw-redirect" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_language" title="Kannada language"><span data-dcnode-id="1782" instrument_node="">Kannada</span></a><span data-dcnode-id="1780" instrument_node="">. The dance is performed during major festivals and in the procession held during the </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore_Dasara" title="Mysore Dasara"><span data-dcnode-id="1779" instrument_node="">Mysore Dasara</span></a><span data-dcnode-id="1777" instrument_node="">, and is known as </span><i data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Tattiraya</span></i><span data-dcnode-id="1774" instrument_node=""> in the coastal regions. </span><i data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Tattiraya</span></i><span data-dcnode-id="1771" instrument_node=""> means "someone carrying a doll made of bamboo sticks".</span><sup class="reference" data-dcnode-id="1768" id="cite_ref-up_2-0"><a data-dcnode-id="1769" href="#cite_note-up-2"><span data-dcnode-id="1770" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1767" instrument_node="">
</span></p><p data-dcnode-id="1749"><span data-dcnode-id="1765" instrument_node="">The dance features masks, puppets and colourful regional costumes. The puppets are made from bamboo and </span><a class="mw-redirect" data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Papier_m%25C3%25A2ch%25C3%25A9" title="Papier mâché"><span data-dcnode-id="1764" instrument_node="">papier mâché</span></a><span data-dcnode-id="1762" instrument_node="">, painted with suitable makeup. During the fair and festival procession to the temple, the giant dolls are the central attraction to spectators. The dolls are hollow and permit a person to get inside, carry the structure on his shoulders and dance, while being able to see. The dolls are used for fun and to ward off evil spirits, depicting characters from Indian mythology and folklore. The dance is performed to the </span><i data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">tamate</span></i><span data-dcnode-id="1759" instrument_node=""> and </span><i data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">dholu</span></i><span data-dcnode-id="1756" instrument_node=""> (a percussion instrument). Each doll weighs 10 to 12 kilograms (22 to 26 pounds), and stand 10 to 12 feet (3.0 to 3.7 metres) tall. During the procession, some performers wear character masks and interact with the dolls. Itinerant performers dressed as a tiger (</span><i data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">hulivesha</span></i><span data-dcnode-id="1753" instrument_node="">) or bear (</span><i data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">karadi-vesha</span></i><span data-dcnode-id="1750" instrument_node="">) with dancing monkeys are common in South India.
</span></p><span data-dcnode-id="1748" instrument_node="">
</span><h3 data-dcnode-id="1738"><span class="mw-headline" data-dcnode-id="1746" id="Joodu_Haligi"><span data-dcnode-id="1747" instrument_node="">Joodu Haligi</span></span><span class="mw-editsection" data-dcnode-id="1739"><span class="mw-editsection-bracket" data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">[</span></span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D22" title="Edit section: Joodu Haligi"><span data-dcnode-id="1743" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">The Joodu Haligi is performed with two percussion instruments. The Haligi is round, made of buffalo hide and played with a short stick. The dance is characterised by high energy and exaggerated expressions by two or three performers.
</span></p><span data-dcnode-id="1734" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1723"><div class="thumbinner" data-dcnode-id="1724" style="width:222px;"><a class="image" data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHanuman_and_Ravana_in_Tholu_Bommalata%2C_the_shadow_puppet_tradition_of_Andhra_Pradesh%2C_India.JPG"><img alt="" class="thumbimage" data-dcnode-id="1733" data-file-height="3102" data-file-width="4801" decoding="async" height="142" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Hanuman_and_Ravana_in_Tholu_Bommalata%252C_the_shadow_puppet_tradition_of_Andhra_Pradesh%252C_India.JPG/220px-Hanuman_and_Ravana_in_Tholu_Bommalata%252C_the_shadow_puppet_tradition_of_Andhra_Pradesh%252C_India.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Hanuman_and_Ravana_in_Tholu_Bommalata%2C_the_shadow_puppet_tradition_of_Andhra_Pradesh%2C_India.JPG/330px-Hanuman_and_Ravana_in_Tholu_Bommalata%2C_the_shadow_puppet_tradition_of_Andhra_Pradesh%2C_India.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/83/Hanuman_and_Ravana_in_Tholu_Bommalata%2C_the_shadow_puppet_tradition_of_Andhra_Pradesh%2C_India.JPG/440px-Hanuman_and_Ravana_in_Tholu_Bommalata%2C_the_shadow_puppet_tradition_of_Andhra_Pradesh%2C_India.JPG 2x" width="220"></a><span data-dcnode-id="1731" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1725"><div class="magnify" data-dcnode-id="1729"><a class="internal" data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHanuman_and_Ravana_in_Tholu_Bommalata%2C_the_shadow_puppet_tradition_of_Andhra_Pradesh%2C_India.JPG" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Togalu_Gombeyaata" title="Togalu Gombeyaata"><span data-dcnode-id="1728" instrument_node="">Togalu Gombeyaata</span></a><span data-dcnode-id="1726" instrument_node="">, is a traditional form of shadow puppetry from Karnataka.</span></div></div></div><span data-dcnode-id="1722" instrument_node="">
</span><h3 data-dcnode-id="1711"><span class="mw-headline" data-dcnode-id="1719" id="Puppetry"><span class="anchor" data-dcnode-id="1721" id="Puppetry_–_String_Puppets_Play_Of_North_Karnataka"></span><span data-dcnode-id="1720" instrument_node="">Puppetry</span></span><span class="mw-editsection" data-dcnode-id="1712"><span class="mw-editsection-bracket" data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">[</span></span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D23" title="Edit section: Puppetry"><span data-dcnode-id="1716" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1710" instrument_node="">
</span><link data-dcnode-id="1709" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1705" role="note"><span data-dcnode-id="1708" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Togalu_Gombeyaata" title="Togalu Gombeyaata"><span data-dcnode-id="1707" instrument_node="">Togalu Gombeyaata</span></a></div><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1690"><i data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Togalu Gombeyaata</span></i><span data-dcnode-id="1701" instrument_node=""> is a type of </span><a class="mw-redirect" data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shadow_puppetry" title="Shadow puppetry"><span data-dcnode-id="1700" instrument_node="">shadow puppetry</span></a><span data-dcnode-id="1698" instrument_node=""> which is unique to Karnataka. The name meaning "a play with leather dolls" in Kannada.</span><sup class="reference" data-dcnode-id="1695" id="cite_ref-Toga_3-0"><a data-dcnode-id="1696" href="#cite_note-Toga-3"><span data-dcnode-id="1697" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1694" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka_Chitrakala_Parishat" title="Karnataka Chitrakala Parishat"><span data-dcnode-id="1693" instrument_node="">Karnataka Chitrakala Parishat</span></a><span data-dcnode-id="1691" instrument_node=""> has researched this art form, and has an extensive collection of leather puppets.
</span></p><span data-dcnode-id="1689" instrument_node="">
</span><h3 data-dcnode-id="1679"><span class="mw-headline" data-dcnode-id="1687" id="Veeragaase_dance"><span data-dcnode-id="1688" instrument_node="">Veeragaase dance</span></span><span class="mw-editsection" data-dcnode-id="1680"><span class="mw-editsection-bracket" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">[</span></span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFolk_arts_of_Karnataka%26action%3Dedit%26section%3D24" title="Edit section: Veeragaase dance"><span data-dcnode-id="1684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1678" instrument_node="">
</span><link data-dcnode-id="1677" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1673" role="note"><span data-dcnode-id="1676" instrument_node="">Main article: </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veeragase" title="Veeragase"><span data-dcnode-id="1675" instrument_node="">Veeragase</span></a></div><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1662"><i data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Veeragase</span></i><span data-dcnode-id="1669" instrument_node="">, a vigorous dance based on </span><a data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu_mythology" title="Hindu mythology"><span data-dcnode-id="1668" instrument_node="">Hindu mythology</span></a><span data-dcnode-id="1666" instrument_node="">, is one of the dances performed at the Mysore Dasara. It is primarily performed during the </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu_calendar" title="Hindu calendar"><span data-dcnode-id="1665" instrument_node="">Hindu months</span></a><span data-dcnode-id="1663" instrument_node=""> of Shravana and Karthika.
