</span><p data-dcnode-id="4529"><span data-dcnode-id="4536" instrument_node="">

The </span><b data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">history of Karnataka</span></b><span data-dcnode-id="4533" instrument_node=""> goes back more than two thousand years ago. Several great empires and dynasties have ruled over Karnataka and have contributed greatly to the history, culture and development of </span><a data-dcnode-id="4531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="4532" instrument_node="">Karnataka</span></a><span data-dcnode-id="4530" instrument_node="">
</span></p><p data-dcnode-id="4508"><span data-dcnode-id="4528" instrument_node="">The impact of kingdoms of Karnataka origin have been felt over other parts of India also. The Chindaka Nagas of central India Gangas, </span><sup class="reference" data-dcnode-id="4525" id="cite_ref-1"><a data-dcnode-id="4526" href="#cite_note-1"><span data-dcnode-id="4527" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4524" instrument_node="">  Rashtrakutas of </span><a class="mw-redirect" data-dcnode-id="4522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manyakheta" title="Manyakheta"><span data-dcnode-id="4523" instrument_node="">Manyakheta</span></a><span data-dcnode-id="4521" instrument_node="">,</span><sup class="reference" data-dcnode-id="4518" id="cite_ref-2"><a data-dcnode-id="4519" href="#cite_note-2"><span data-dcnode-id="4520" instrument_node="">[note 1]</span></a></sup><span data-dcnode-id="4517" instrument_node=""> Chalukyas of Vengi,</span><sup class="reference" data-dcnode-id="4514" id="cite_ref-3"><a data-dcnode-id="4515" href="#cite_note-3"><span data-dcnode-id="4516" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4513" instrument_node=""> Yadava Dynasty of Devagiri were all of Kannada origin</span><sup class="reference" data-dcnode-id="4510" id="cite_ref-4"><a data-dcnode-id="4511" href="#cite_note-4"><span data-dcnode-id="4512" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4509" instrument_node=""> who later took to encouraging local languages.
</span></p><p data-dcnode-id="4497"><span data-dcnode-id="4507" instrument_node="">In the medieval and early modern periods, the </span><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara_Empire" title="Vijayanagara Empire"><span data-dcnode-id="4506" instrument_node="">Vijayanagara Empire</span></a><span data-dcnode-id="4504" instrument_node=""> and the </span><a data-dcnode-id="4502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahmani_Sultanate" title="Bahmani Sultanate"><span data-dcnode-id="4503" instrument_node="">Bahmani Sultanate</span></a><span data-dcnode-id="4501" instrument_node=""> became the major powers in Karnataka. The latter disintegrated to form five </span><a data-dcnode-id="4499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deccan_sultanates" title="Deccan sultanates"><span data-dcnode-id="4500" instrument_node="">Deccan Sultanates</span></a><span data-dcnode-id="4498" instrument_node="">. The Deccan Sultanates defeated the Vijayanagara Empire in 1565.
</span></p><p data-dcnode-id="4489"><span data-dcnode-id="4496" instrument_node="">After the </span><a data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Mysore_Wars" title="Anglo-Mysore Wars"><span data-dcnode-id="4495" instrument_node="">Anglo-Mysore Wars</span></a><span data-dcnode-id="4493" instrument_node="">, where the East India Company defeated the forces of </span><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tipu_Sultan" title="Tipu Sultan"><span data-dcnode-id="4492" instrument_node="">Tipu Sultan</span></a><span data-dcnode-id="4490" instrument_node="">, Company Rule began in India. Karnataka was divided between Bombay State, Mysore State and Hyderabad State. Formal rule under the British Crown began in 1858. During this time, railways and airways, as well as modern universities were introduced in Karnataka.
</span></p><p data-dcnode-id="4478"><span data-dcnode-id="4488" instrument_node="">India  became Independent in 1947, and according to the </span><a data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/States_Reorganisation_Act%2C_1956" title="States Reorganisation Act, 1956"><span data-dcnode-id="4487" instrument_node="">States Reorganization Act, 1956</span></a><span data-dcnode-id="4485" instrument_node="">, the </span><a data-dcnode-id="4483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada" title="Kannada"><span data-dcnode-id="4484" instrument_node="">Kannada</span></a><span data-dcnode-id="4482" instrument_node="">-speaking areas of Hyderabad State, Madras State were unified with </span><a data-dcnode-id="4480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Mysore" title="Kingdom of Mysore"><span data-dcnode-id="4481" instrument_node="">Mysore State</span></a><span data-dcnode-id="4479" instrument_node="">. The state was renamed Karnataka in 1973.
</span></p><span data-dcnode-id="4477" instrument_node="">

</span><h2 data-dcnode-id="4215"><span class="mw-headline" data-dcnode-id="4223" id="Prehistory"><span data-dcnode-id="4224" instrument_node="">Prehistory</span></span><span class="mw-editsection" data-dcnode-id="4216"><span class="mw-editsection-bracket" data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">[</span></span><a data-dcnode-id="4219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D1" title="Edit section: Prehistory"><span data-dcnode-id="4220" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4214" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4199" role="note"><span data-dcnode-id="4211" instrument_node="">Main articles: </span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_history_of_medieval_Karnataka" title="Political history of medieval Karnataka"><span data-dcnode-id="4210" instrument_node="">Political history of medieval Karnataka</span></a><span data-dcnode-id="4208" instrument_node="">, </span><a data-dcnode-id="4206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Etymology_of_Karnataka" title="Etymology of Karnataka"><span data-dcnode-id="4207" instrument_node="">Etymology of Karnataka</span></a><span data-dcnode-id="4205" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka_History_Timeline" title="Karnataka History Timeline"><span data-dcnode-id="4204" instrument_node="">Karnataka History Timeline</span></a><span data-dcnode-id="4202" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chronology_of_Karnataka" title="Chronology of Karnataka"><span data-dcnode-id="4201" instrument_node="">Chronology of Karnataka</span></a></div><span data-dcnode-id="4198" instrument_node="">
</span><p data-dcnode-id="4136"><span data-dcnode-id="4197" instrument_node="">The credit for doing early extensive study of prehistoric Karnataka goes to Robert Bruce-Foote and this work was later continued by many other scholars.</span><sup class="reference" data-dcnode-id="4194" id="cite_ref-other_5-0"><a data-dcnode-id="4195" href="#cite_note-other-5"><span data-dcnode-id="4196" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4193" instrument_node=""> The pre-historic culture of Karnataka (and South India in general) is called the hand-axe culture, as opposed to the Sohan culture of North India. Paleolithic hand axes and cleavers in the shape of pebbles made with quartz and quartzite which have been found in places such as </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lingadahalli" title="Lingadahalli"><span data-dcnode-id="4192" instrument_node="">Lingadahalli</span></a><span data-dcnode-id="4190" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chikkamagaluru_district" title="Chikkamagaluru district"><span data-dcnode-id="4189" instrument_node="">Chikkamagaluru district</span></a><span data-dcnode-id="4187" instrument_node=""> and </span><a data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hunasagi" title="Hunasagi"><span data-dcnode-id="4186" instrument_node="">Hunasagi</span></a><span data-dcnode-id="4184" instrument_node=""> in </span><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yadgir_district" title="Yadgir district"><span data-dcnode-id="4183" instrument_node="">Yadgir district</span></a><span data-dcnode-id="4181" instrument_node="">, and a wooden spike at </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kibbanahalli" title="Kibbanahalli"><span data-dcnode-id="4180" instrument_node="">Kibbanahalli</span></a><span data-dcnode-id="4178" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="4176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tumkur_district" title="Tumkur district"><span data-dcnode-id="4177" instrument_node="">Tumkur district</span></a><span data-dcnode-id="4175" instrument_node=""> are examples of old Stone Age implements.</span><sup class="reference" data-dcnode-id="4172" id="cite_ref-other1_6-0"><a data-dcnode-id="4173" href="#cite_note-other1-6"><span data-dcnode-id="4174" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4171" instrument_node=""> There are reports that a polished </span><a class="mw-redirect" data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stone_axe" title="Stone axe"><span data-dcnode-id="4170" instrument_node="">stone axe</span></a><span data-dcnode-id="4168" instrument_node=""> was discovered at </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lingasugur" title="Lingasugur"><span data-dcnode-id="4167" instrument_node="">Lingasugur</span></a><span data-dcnode-id="4165" instrument_node=""> in the </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raichur_district" title="Raichur district"><span data-dcnode-id="4164" instrument_node="">Raichur district</span></a><sup class="reference" data-dcnode-id="4160" id="cite_ref-prim_7-0"><a data-dcnode-id="4161" href="#cite_note-prim-7"><span data-dcnode-id="4162" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="4157" id="cite_ref-8"><a data-dcnode-id="4158" href="#cite_note-8"><span data-dcnode-id="4159" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4156" instrument_node=""> Neolithic sites (new Stone Age) of importance are </span><a data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maski" title="Maski"><span data-dcnode-id="4155" instrument_node="">Maski</span></a><span data-dcnode-id="4153" instrument_node=""> in </span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raichur_district" title="Raichur district"><span data-dcnode-id="4152" instrument_node="">Raichur district</span></a><span data-dcnode-id="4150" instrument_node="">, </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brahmagiri_archaeological_site" title="Brahmagiri archaeological site"><span data-dcnode-id="4149" instrument_node="">Brahmagiri</span></a><span data-dcnode-id="4147" instrument_node=""> in </span><a data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chitradurga_district" title="Chitradurga district"><span data-dcnode-id="4146" instrument_node="">Chitradurga district</span></a><span data-dcnode-id="4144" instrument_node=""> etc., with abundance of evidence that man begun to domesticate animals such as cows, dogs and sheep, use copper and bronze weapons, wear bangles, rings, necklaces of beads and ear-rings and have burial chambers. To the end of the Neolithic era, during the </span><a class="mw-redirect" data-dcnode-id="4142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Megalithic" title="Megalithic"><span data-dcnode-id="4143" instrument_node="">Megalithic</span></a><span data-dcnode-id="4141" instrument_node=""> age, people in Karnataka began to use long swords, sickles, axes, hammers, spikes, chisels and arrows, all made of iron.</span><sup class="reference" data-dcnode-id="4138" id="cite_ref-chamber_9-0"><a data-dcnode-id="4139" href="#cite_note-chamber-9"><span data-dcnode-id="4140" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4137" instrument_node="">
</span></p><p data-dcnode-id="4115"><span data-dcnode-id="4135" instrument_node="">Scholarly hypothesis postulates contacts between the </span><a class="mw-redirect" data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indus_Valley_Civilization" title="Indus Valley Civilization"><span data-dcnode-id="4134" instrument_node="">Indus Valley</span></a><span data-dcnode-id="4132" instrument_node=""> (3300 BCE - 1300 BCE) cities of </span><a data-dcnode-id="4130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harappa" title="Harappa"><span data-dcnode-id="4131" instrument_node="">Harappa</span></a><span data-dcnode-id="4129" instrument_node=""> and </span><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lothal" title="Lothal"><span data-dcnode-id="4128" instrument_node="">Lothal</span></a><span data-dcnode-id="4126" instrument_node="">, citing the discovery of gold found in the Harappan sites that was imported from mines in Karnataka.</span><sup class="reference" data-dcnode-id="4123" id="cite_ref-10"><a data-dcnode-id="4124" href="#cite_note-10"><span data-dcnode-id="4125" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="4120" id="cite_ref-11"><a data-dcnode-id="4121" href="#cite_note-11"><span data-dcnode-id="4122" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="4117" id="cite_ref-12"><a data-dcnode-id="4118" href="#cite_note-12"><span data-dcnode-id="4119" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4116" instrument_node="">
</span></p><p data-dcnode-id="4062"><span data-dcnode-id="4114" instrument_node="">Evidence of </span><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neolithic" title="Neolithic"><span data-dcnode-id="4113" instrument_node="">Neolithic</span></a><span data-dcnode-id="4111" instrument_node=""> habitation of areas in modern Karnataka and </span><a data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Celt_%28tool%29" title="Celt (tool)"><span data-dcnode-id="4110" instrument_node="">celts</span></a><span data-dcnode-id="4108" instrument_node=""> dating back to the 2nd century </span><a class="mw-redirect" data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Before_Common_Era" title="Before Common Era"><span data-dcnode-id="4107" instrument_node="">BCE</span></a><span data-dcnode-id="4105" instrument_node=""> were first discovered in 1872. There are reports that a polished </span><a class="mw-redirect" data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stone_axe" title="Stone axe"><span data-dcnode-id="4104" instrument_node="">stone axe</span></a><span data-dcnode-id="4102" instrument_node=""> was discovered at Lingsugur in the </span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raichur_district" title="Raichur district"><span data-dcnode-id="4101" instrument_node="">Raichur district</span></a><span data-dcnode-id="4099" instrument_node="">; however the authenticity of these reports remains unverifiable.</span><sup class="reference" data-dcnode-id="4096" id="cite_ref-Hindu.com_2005011001090500_13-0"><a data-dcnode-id="4097" href="#cite_note-Hindu.com_2005011001090500-13"><span data-dcnode-id="4098" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4095" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Megalithic" title="Megalithic"><span data-dcnode-id="4094" instrument_node="">Megalithic</span></a><span data-dcnode-id="4092" instrument_node=""> structures and burial grounds were discovered in 1862 in the regions of </span><a class="mw-redirect" data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kodagu" title="Kodagu"><span data-dcnode-id="4091" instrument_node="">Kodagu</span></a><span data-dcnode-id="4089" instrument_node=""> and Moorey Betta hills, while </span><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neolithic" title="Neolithic"><span data-dcnode-id="4088" instrument_node="">Neolithic</span></a><span data-dcnode-id="4086" instrument_node=""> sites were discovered in north Karnataka.</span><sup class="reference" data-dcnode-id="4083" id="cite_ref-Hindu.com_2005011001090500_13-1"><a data-dcnode-id="4084" href="#cite_note-Hindu.com_2005011001090500-13"><span data-dcnode-id="4085" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4082" instrument_node=""> Scholarly hypothesis postulates of contacts between the </span><a class="mw-redirect" data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indus_Valley_Civilization" title="Indus Valley Civilization"><span data-dcnode-id="4081" instrument_node="">Indus Valley</span></a><span data-dcnode-id="4079" instrument_node=""> city of </span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harappa" title="Harappa"><span data-dcnode-id="4078" instrument_node="">Harappa</span></a><span data-dcnode-id="4076" instrument_node=""> in 3000 BCE, citing the discovery of gold found in the Harappan sites that was imported from mines in Karnataka.</span><sup class="reference" data-dcnode-id="4073" id="cite_ref-14"><a data-dcnode-id="4074" href="#cite_note-14"><span data-dcnode-id="4075" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4070" id="cite_ref-15"><a data-dcnode-id="4071" href="#cite_note-15"><span data-dcnode-id="4072" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="4067" id="cite_ref-16"><a data-dcnode-id="4068" href="#cite_note-16"><span data-dcnode-id="4069" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="4064" id="cite_ref-17"><a data-dcnode-id="4065" href="#cite_note-17"><span data-dcnode-id="4066" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4063" instrument_node="">
</span></p><span data-dcnode-id="4061" instrument_node="">
</span><h2 data-dcnode-id="4051"><span class="mw-headline" data-dcnode-id="4059" id="Early_history"><span data-dcnode-id="4060" instrument_node="">Early history</span></span><span class="mw-editsection" data-dcnode-id="4052"><span class="mw-editsection-bracket" data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">[</span></span><a data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D2" title="Edit section: Early history"><span data-dcnode-id="4056" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4050" instrument_node="">
</span><link data-dcnode-id="4049" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4042" role="note"><span data-dcnode-id="4048" instrument_node="">Main articles: </span><a class="mw-redirect" data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satavahanas" title="Satavahanas"><span data-dcnode-id="4047" instrument_node="">Satavahanas</span></a><span data-dcnode-id="4045" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadambas" title="Kadambas"><span data-dcnode-id="4044" instrument_node="">Kadambas</span></a></div><p data-dcnode-id="4024"><span data-dcnode-id="4041" instrument_node="">Karnataka was the part of the </span><a data-dcnode-id="4039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurya_Empire" title="Maurya Empire"><span data-dcnode-id="4040" instrument_node="">Maurya Empire</span></a><span data-dcnode-id="4038" instrument_node="">, the first Mauryan Emperor </span><a data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chandragupta_Maurya" title="Chandragupta Maurya"><span data-dcnode-id="4037" instrument_node="">Chandragupta Maurya</span></a><span data-dcnode-id="4035" instrument_node=""> died in </span><a class="mw-redirect" data-dcnode-id="4033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shravanbelgola" title="Shravanbelgola"><span data-dcnode-id="4034" instrument_node="">Shravanbelgola</span></a><span data-dcnode-id="4032" instrument_node=""> in </span><a class="mw-redirect" data-dcnode-id="4030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hassan_District" title="Hassan District"><span data-dcnode-id="4031" instrument_node="">Hassan District</span></a><span data-dcnode-id="4029" instrument_node=""> around 298 BCE where he spent last days of his life as Jain ascetic.</span><sup class="reference" data-dcnode-id="4026" id="cite_ref-18"><a data-dcnode-id="4027" href="#cite_note-18"><span data-dcnode-id="4028" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4025" instrument_node="">
</span></p><p data-dcnode-id="3940"><span data-dcnode-id="4023" instrument_node="">Around 239 BCE, the </span><a class="mw-redirect" data-dcnode-id="4021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satavahana" title="Satavahana"><span data-dcnode-id="4022" instrument_node="">Satavahana</span></a><span data-dcnode-id="4020" instrument_node=""> dynasty came to power and its rule lasted nearly four centuries, until the early 3rd century CE. The disintegration of the Satavahana dynasty led to the ascent of the earliest native kingdoms, the </span><a class="mw-redirect" data-dcnode-id="4018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadamba_Dynasty" title="Kadamba Dynasty"><span data-dcnode-id="4019" instrument_node="">Kadamba Dynasty</span></a><span data-dcnode-id="4017" instrument_node=""> of </span><a data-dcnode-id="4015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banavasi" title="Banavasi"><span data-dcnode-id="4016" instrument_node="">Banavasi</span></a><span data-dcnode-id="4014" instrument_node=""> in modern </span><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uttara_Kannada" title="Uttara Kannada"><span data-dcnode-id="4013" instrument_node="">Uttara Kannada</span></a><span data-dcnode-id="4011" instrument_node=""> district with </span><a class="mw-redirect" data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mayuravarma" title="Mayuravarma"><span data-dcnode-id="4010" instrument_node="">Mayuravarma</span></a><span data-dcnode-id="4008" instrument_node="">, a native of </span><a data-dcnode-id="4006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talagunda" title="Talagunda"><span data-dcnode-id="4007" instrument_node="">Talagunda</span></a><span data-dcnode-id="4005" instrument_node=""> in modern </span><a class="mw-redirect" data-dcnode-id="4003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shivamogga_district" title="Shivamogga district"><span data-dcnode-id="4004" instrument_node="">Shivamogga district</span></a><span data-dcnode-id="4002" instrument_node=""> as the founding king,</span><sup class="reference" data-dcnode-id="3999" id="cite_ref-origin_19-0"><a data-dcnode-id="4000" href="#cite_note-origin-19"><span data-dcnode-id="4001" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="3996" id="cite_ref-origin1_20-0"><a data-dcnode-id="3997" href="#cite_note-origin1-20"><span data-dcnode-id="3998" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="3993" id="cite_ref-grass_21-0"><a data-dcnode-id="3994" href="#cite_note-grass-21"><span data-dcnode-id="3995" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="3990" id="cite_ref-grass1_22-0"><a data-dcnode-id="3991" href="#cite_note-grass1-22"><span data-dcnode-id="3992" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="3987" id="cite_ref-origin2_23-0"><a data-dcnode-id="3988" href="#cite_note-origin2-23"><span data-dcnode-id="3989" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3984" id="cite_ref-origin3_24-0"><a data-dcnode-id="3985" href="#cite_note-origin3-24"><span data-dcnode-id="3986" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3983" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ganga_Dynasty" title="Western Ganga Dynasty"><span data-dcnode-id="3982" instrument_node="">Western Ganga Dynasty</span></a><span data-dcnode-id="3980" instrument_node=""> in southern Karnataka,</span><sup class="reference" data-dcnode-id="3977" id="cite_ref-argue_25-0"><a data-dcnode-id="3978" href="#cite_note-argue-25"><span data-dcnode-id="3979" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="3974" id="cite_ref-argue1_26-0"><a data-dcnode-id="3975" href="#cite_note-argue1-26"><span data-dcnode-id="3976" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3973" instrument_node=""> marking the birth of the region as an independent political entity. These were the first kingdoms to give administrative status to </span><a class="mw-redirect" data-dcnode-id="3971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_language" title="Kannada language"><span data-dcnode-id="3972" instrument_node="">Kannada language</span></a><span data-dcnode-id="3970" instrument_node=""> as evidenced by the </span><a data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halmidi_inscription" title="Halmidi inscription"><span data-dcnode-id="3969" instrument_node="">Halmidi inscription</span></a><span data-dcnode-id="3967" instrument_node=""> of 450, attributed to King </span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kakusthavarma" title="Kakusthavarma"><span data-dcnode-id="3966" instrument_node="">Kakusthavarma</span></a><span data-dcnode-id="3964" instrument_node=""> of the </span><a class="mw-redirect" data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadamba_Dynasty" title="Kadamba Dynasty"><span data-dcnode-id="3963" instrument_node="">Kadamba Dynasty</span></a><span data-dcnode-id="3961" instrument_node="">.</span><sup class="reference" data-dcnode-id="3958" id="cite_ref-first_27-0"><a data-dcnode-id="3959" href="#cite_note-first-27"><span data-dcnode-id="3960" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="3955" id="cite_ref-hal_28-0"><a data-dcnode-id="3956" href="#cite_note-hal-28"><span data-dcnode-id="3957" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3954" instrument_node=""> Also, recent discovery of a 5th-century copper coin in </span><a data-dcnode-id="3952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banavasi" title="Banavasi"><span data-dcnode-id="3953" instrument_node="">Banavasi</span></a><span data-dcnode-id="3951" instrument_node="">, ancient capital of the </span><a class="mw-redirect" data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadambas" title="Kadambas"><span data-dcnode-id="3950" instrument_node="">Kadambas</span></a><span data-dcnode-id="3948" instrument_node="">, with </span><a data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_script" title="Kannada script"><span data-dcnode-id="3947" instrument_node="">Kannada script</span></a><span data-dcnode-id="3945" instrument_node=""> inscription on it, further proves the usage of Kannada at an official level.</span><sup class="reference" data-dcnode-id="3942" id="cite_ref-29"><a data-dcnode-id="3943" href="#cite_note-29"><span data-dcnode-id="3944" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3941" instrument_node="">
</span></p><span data-dcnode-id="3939" instrument_node="">
</span><h2 data-dcnode-id="3928"><span data-dcnode-id="3938" id="Middle_Kingdoms_.28230_BCE_.E2.80.93_1206_CE.29"></span><span class="mw-headline" data-dcnode-id="3936" id="Middle_Kingdoms_(230_BCE_–_1206_CE)"><span data-dcnode-id="3937" instrument_node="">Middle Kingdoms (230 BCE – 1206 CE)</span></span><span class="mw-editsection" data-dcnode-id="3929"><span class="mw-editsection-bracket" data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">[</span></span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D3" title="Edit section: Middle Kingdoms (230 BCE – 1206 CE)"><span data-dcnode-id="3933" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3927" instrument_node="">

</span><p data-dcnode-id="3879"><span data-dcnode-id="3911" instrument_node="">They were followed by large imperial empires, the </span><a class="mw-redirect" data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badami_Chalukyas" title="Badami Chalukyas"><span data-dcnode-id="3910" instrument_node="">Badami Chalukyas</span></a><span data-dcnode-id="3908" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashtrakuta_Dynasty" title="Rashtrakuta Dynasty"><span data-dcnode-id="3907" instrument_node="">Rashtrakuta Dynasty</span></a><span data-dcnode-id="3905" instrument_node=""> and </span><a data-dcnode-id="3903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Chalukya_Empire" title="Western Chalukya Empire"><span data-dcnode-id="3904" instrument_node="">Western Chalukya Empire</span></a><span data-dcnode-id="3902" instrument_node="">, who had their regal capitals in modern Karnataka region and patronized Kannada language and literature.</span><sup class="reference" data-dcnode-id="3899" id="cite_ref-ex_30-0"><a data-dcnode-id="3900" href="#cite_note-ex-30"><span data-dcnode-id="3901" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="3896" id="cite_ref-natural_31-0"><a data-dcnode-id="3897" href="#cite_note-natural-31"><span data-dcnode-id="3898" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="3893" id="cite_ref-earlylit1_32-0"><a data-dcnode-id="3894" href="#cite_note-earlylit1-32"><span data-dcnode-id="3895" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="3890" id="cite_ref-early2_33-0"><a data-dcnode-id="3891" href="#cite_note-early2-33"><span data-dcnode-id="3892" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="3887" id="cite_ref-patron_34-0"><a data-dcnode-id="3888" href="#cite_note-patron-34"><span data-dcnode-id="3889" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="3884" id="cite_ref-eralylit2_35-0"><a data-dcnode-id="3885" href="#cite_note-eralylit2-35"><span data-dcnode-id="3886" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3881" id="cite_ref-administrator_36-0"><a data-dcnode-id="3882" href="#cite_note-administrator-36"><span data-dcnode-id="3883" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3880" instrument_node="">
</span></p><span data-dcnode-id="3878" instrument_node="">
</span><h3 data-dcnode-id="3868"><span class="mw-headline" data-dcnode-id="3876" id="Badami_Chalukyas"><span data-dcnode-id="3877" instrument_node="">Badami Chalukyas</span></span><span class="mw-editsection" data-dcnode-id="3869"><span class="mw-editsection-bracket" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">[</span></span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D4" title="Edit section: Badami Chalukyas"><span data-dcnode-id="3873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3867" instrument_node="">
</span><link data-dcnode-id="3866" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3862" role="note"><span data-dcnode-id="3865" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Badami_Chalukyas" title="Badami Chalukyas"><span data-dcnode-id="3864" instrument_node="">Badami Chalukyas</span></a></div><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3852"><span data-dcnode-id="3860" instrument_node="">The </span><a data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya_dynasty" title="Chalukya dynasty"><span data-dcnode-id="3859" instrument_node="">Badami Chalukyas</span></a><span data-dcnode-id="3857" instrument_node=""> ruled between the 6th and the 8th centuries.</span><sup class="reference" data-dcnode-id="3854" id="cite_ref-Pattadakal_37-0"><a data-dcnode-id="3855" href="#cite_note-Pattadakal-37"><span data-dcnode-id="3856" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3853" instrument_node="">
</span></p><span data-dcnode-id="3851" instrument_node="">
</span><h3 data-dcnode-id="3841"><span class="mw-headline" data-dcnode-id="3849" id="Rashtrakutas"><span data-dcnode-id="3850" instrument_node="">Rashtrakutas</span></span><span class="mw-editsection" data-dcnode-id="3842"><span class="mw-editsection-bracket" data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">[</span></span><a data-dcnode-id="3845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D5" title="Edit section: Rashtrakutas"><span data-dcnode-id="3846" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3840" instrument_node="">
</span><link data-dcnode-id="3839" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3835" role="note"><span data-dcnode-id="3838" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashtrakuta_Empire" title="Rashtrakuta Empire"><span data-dcnode-id="3837" instrument_node="">Rashtrakuta Empire</span></a></div><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3823"><span data-dcnode-id="3833" instrument_node="">The Rashtrakutas were originally vassals of the Badami Chalukyas. </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dantidurga" title="Dantidurga"><span data-dcnode-id="3832" instrument_node="">Dantidurga</span></a><span data-dcnode-id="3830" instrument_node=""> overthrew the Chalukya ruler </span><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kirtivarman_II" title="Kirtivarman II"><span data-dcnode-id="3829" instrument_node="">Kirtivarman II</span></a><span data-dcnode-id="3827" instrument_node=""> in 735 CE, and established the rule of the </span><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashtrakuta_dynasty" title="Rashtrakuta dynasty"><span data-dcnode-id="3826" instrument_node="">Rashtrakuta dynasty</span></a><span data-dcnode-id="3824" instrument_node="">.
</span></p><p data-dcnode-id="3808"><span data-dcnode-id="3822" instrument_node="">During this period, important contributions were made in the field of literature, arts, and mathematics. </span><a class="mw-redirect" data-dcnode-id="3820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amoghavarsha_I" title="Amoghavarsha I"><span data-dcnode-id="3821" instrument_node="">Amoghavarsha I</span></a><span data-dcnode-id="3819" instrument_node="">, the most famous king of this dynasty wrote </span><i data-dcnode-id="3816"><a data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kavirajamarga" title="Kavirajamarga"><span data-dcnode-id="3818" instrument_node="">Kavirajamarga</span></a></i><span data-dcnode-id="3815" instrument_node="">, a landmark literary work in the </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada" title="Kannada"><span data-dcnode-id="3814" instrument_node="">Kannada</span></a><span data-dcnode-id="3812" instrument_node=""> language. Important mathematical theories and axioms were postulated by </span><a class="mw-redirect" data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahavira_%28mathematician%29" title="Mahavira (mathematician)"><span data-dcnode-id="3811" instrument_node="">Mahaviracharya</span></a><span data-dcnode-id="3809" instrument_node="">.
</span></p><span data-dcnode-id="3807" instrument_node="">
</span><h3 data-dcnode-id="3797"><span class="mw-headline" data-dcnode-id="3805" id="Western_Chalukyas"><span data-dcnode-id="3806" instrument_node="">Western Chalukyas</span></span><span class="mw-editsection" data-dcnode-id="3798"><span class="mw-editsection-bracket" data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">[</span></span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D6" title="Edit section: Western Chalukyas"><span data-dcnode-id="3802" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3796" instrument_node="">
</span><link data-dcnode-id="3795" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3791" role="note"><span data-dcnode-id="3794" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Chalukyas" title="Western Chalukyas"><span data-dcnode-id="3793" instrument_node="">Western Chalukyas</span></a></div><span data-dcnode-id="3790" instrument_node="">
</span><p data-dcnode-id="3785"><span data-dcnode-id="3789" instrument_node="">The </span><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Chalukya_Empire" title="Western Chalukya Empire"><span data-dcnode-id="3788" instrument_node="">Western Chalukyas</span></a><span data-dcnode-id="3786" instrument_node=""> ruled between 973 and 1189 CE.
</span></p><span data-dcnode-id="3784" instrument_node="">
</span><h3 data-dcnode-id="3774"><span class="mw-headline" data-dcnode-id="3782" id="Western_Gangas"><span data-dcnode-id="3783" instrument_node="">Western Gangas</span></span><span class="mw-editsection" data-dcnode-id="3775"><span class="mw-editsection-bracket" data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">[</span></span><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D7" title="Edit section: Western Gangas"><span data-dcnode-id="3779" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3776"><span data-dcnode-id="3777" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3773" instrument_node="">
</span><link data-dcnode-id="3772" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3768" role="note"><span data-dcnode-id="3771" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="3769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ganga_Kingdom" title="Western Ganga Kingdom"><span data-dcnode-id="3770" instrument_node="">Western Ganga Kingdom</span></a></div><span data-dcnode-id="3767" instrument_node="">
</span><p data-dcnode-id="3750"><span data-dcnode-id="3766" instrument_node="">The </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ganga_dynasty" title="Western Ganga dynasty"><span data-dcnode-id="3765" instrument_node="">Western Ganga</span></a><span data-dcnode-id="3763" instrument_node=""> dynasty was founded around 350 CE, ruling southern Karnataka. Their sovereignty lasted from about 350 to 550 CE, after which they ruled as vassals of the </span><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chalukya_dynasty" title="Chalukya dynasty"><span data-dcnode-id="3762" instrument_node="">Badami Chalukyas</span></a><span data-dcnode-id="3760" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rashtrakuta_Dynasty" title="Rashtrakuta Dynasty"><span data-dcnode-id="3759" instrument_node="">Rashtrakutas</span></a><span data-dcnode-id="3757" instrument_node="">, and </span><a data-dcnode-id="3755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Chalukya_Empire" title="Western Chalukya Empire"><span data-dcnode-id="3756" instrument_node="">Western Chalukyas</span></a><span data-dcnode-id="3754" instrument_node="">. Their rule came to an end after the disintegration of the </span><a data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Chalukya_Empire" title="Western Chalukya Empire"><span data-dcnode-id="3753" instrument_node="">Western Chalukyas</span></a><span data-dcnode-id="3751" instrument_node=""> in 1000 CE.
</span></p><span data-dcnode-id="3749" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3731"><div class="thumbinner" data-dcnode-id="3732" style="width:182px;"><a class="image" data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShravanabelagola_Bahubali_wideframe.jpg"><img alt="" class="thumbimage" data-dcnode-id="3748" data-file-height="3376" data-file-width="4503" decoding="async" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Shravanabelagola_Bahubali_wideframe.jpg/180px-Shravanabelagola_Bahubali_wideframe.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Shravanabelagola_Bahubali_wideframe.jpg/270px-Shravanabelagola_Bahubali_wideframe.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Shravanabelagola_Bahubali_wideframe.jpg/360px-Shravanabelagola_Bahubali_wideframe.jpg 2x" width="180"></a><span data-dcnode-id="3746" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3733"><div class="magnify" data-dcnode-id="3744"><a class="internal" data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShravanabelagola_Bahubali_wideframe.jpg" title="Enlarge"></a></div><span data-dcnode-id="3743" instrument_node="">The </span><a data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gommateshwara_statue" title="Gommateshwara statue"><span data-dcnode-id="3742" instrument_node="">Gommateshwara statue</span></a><span data-dcnode-id="3740" instrument_node=""> at </span><a class="mw-redirect" data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shravanbelagola" title="Shravanbelagola"><span data-dcnode-id="3739" instrument_node="">Shravanbelagola</span></a><span data-dcnode-id="3737" instrument_node=""> was built during the 10th century CE by the </span><a data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Ganga_dynasty" title="Western Ganga dynasty"><span data-dcnode-id="3736" instrument_node="">Western Ganga Kingdom</span></a><span data-dcnode-id="3734" instrument_node="">.</span></div></div></div><span data-dcnode-id="3730" instrument_node="">
</span><p data-dcnode-id="3710"><span data-dcnode-id="3729" instrument_node="">Though a small kingdom, the Western Ganga contribution to </span><a data-dcnode-id="3727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polity" title="Polity"><span data-dcnode-id="3728" instrument_node="">polity</span></a><span data-dcnode-id="3726" instrument_node="">, culture and literature of the modern south Karnataka region is considered important. The Western Ganga kings showed benevolent tolerance to all faiths but are most famous for their patronage toward </span><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jainism" title="Jainism"><span data-dcnode-id="3725" instrument_node="">Jainism</span></a><span data-dcnode-id="3723" instrument_node=""> resulting in the construction of monuments in places such as </span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shravanabelagola" title="Shravanabelagola"><span data-dcnode-id="3722" instrument_node="">Shravanabelagola</span></a><span data-dcnode-id="3720" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kambadahalli" title="Kambadahalli"><span data-dcnode-id="3719" instrument_node="">Kambadahalli</span></a><span data-dcnode-id="3717" instrument_node="">. The kings of this dynasty encouraged the fine arts due to which literature in </span><a data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada" title="Kannada"><span data-dcnode-id="3716" instrument_node="">Kannada</span></a><span data-dcnode-id="3714" instrument_node=""> and </span><a data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanskrit" title="Sanskrit"><span data-dcnode-id="3713" instrument_node="">Sanskrit</span></a><span data-dcnode-id="3711" instrument_node=""> flourished.
</span></p><span data-dcnode-id="3709" instrument_node="">
</span><h3 data-dcnode-id="3699"><span class="mw-headline" data-dcnode-id="3707" id="Hoysala_Empire"><span data-dcnode-id="3708" instrument_node="">Hoysala Empire</span></span><span class="mw-editsection" data-dcnode-id="3700"><span class="mw-editsection-bracket" data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">[</span></span><a data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D8" title="Edit section: Hoysala Empire"><span data-dcnode-id="3704" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3698" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3680"><div class="thumbinner" data-dcnode-id="3681" style="width:202px;"><a class="image" data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarved_Outer_walls%2C_Hoysaleswara_Temple_Halebid.jpg"><img alt="" class="thumbimage" data-dcnode-id="3697" data-file-height="4000" data-file-width="6000" decoding="async" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/82/Carved_Outer_walls%252C_Hoysaleswara_Temple_Halebid.jpg/200px-Carved_Outer_walls%252C_Hoysaleswara_Temple_Halebid.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/82/Carved_Outer_walls%2C_Hoysaleswara_Temple_Halebid.jpg/300px-Carved_Outer_walls%2C_Hoysaleswara_Temple_Halebid.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/82/Carved_Outer_walls%2C_Hoysaleswara_Temple_Halebid.jpg/400px-Carved_Outer_walls%2C_Hoysaleswara_Temple_Halebid.jpg 2x" width="200"></a><span data-dcnode-id="3695" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3682"><div class="magnify" data-dcnode-id="3693"><a class="internal" data-dcnode-id="3694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarved_Outer_walls%2C_Hoysaleswara_Temple_Halebid.jpg" title="Enlarge"></a></div><span data-dcnode-id="3692" instrument_node="">Elaborately carved outer walls at the </span><a data-dcnode-id="3690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoysaleswara_Temple" title="Hoysaleswara Temple"><span data-dcnode-id="3691" instrument_node="">Hoysaleswara Temple</span></a><span data-dcnode-id="3689" instrument_node=""> built in the 12th century by the </span><a data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoysala_Empire" title="Hoysala Empire"><span data-dcnode-id="3688" instrument_node="">Hoysala Empire</span></a><span data-dcnode-id="3686" instrument_node="">.</span><sup class="reference" data-dcnode-id="3683" id="cite_ref-38"><a data-dcnode-id="3684" href="#cite_note-38"><span data-dcnode-id="3685" instrument_node="">[37]</span></a></sup></div></div></div><span data-dcnode-id="3679" instrument_node="">
</span><link data-dcnode-id="3678" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3674" role="note"><span data-dcnode-id="3677" instrument_node="">Main article: </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoysala_Empire" title="Hoysala Empire"><span data-dcnode-id="3676" instrument_node="">Hoysala Empire</span></a></div><span data-dcnode-id="3673" instrument_node="">
</span><p data-dcnode-id="3633"><span data-dcnode-id="3672" instrument_node="">Natives of the </span><a class="mw-redirect" data-dcnode-id="3670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malnad" title="Malnad"><span data-dcnode-id="3671" instrument_node="">malnad</span></a><span data-dcnode-id="3669" instrument_node=""> Karnataka, the Hoysalas established the </span><a data-dcnode-id="3667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hoysala_Empire" title="Hoysala Empire"><span data-dcnode-id="3668" instrument_node="">Hoysala Empire</span></a><span data-dcnode-id="3666" instrument_node=""> at the turn of the first millennium. Art and architecture flourished in the region during this time resulting in distinctive Kannada literary metres and the construction of temples and sculptures adhering to the </span><i data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">Vesara</span></i><span data-dcnode-id="3663" instrument_node=""> style of architecture.</span><sup class="reference" data-dcnode-id="3660" id="cite_ref-patron_34-1"><a data-dcnode-id="3661" href="#cite_note-patron-34"><span data-dcnode-id="3662" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="3657" id="cite_ref-sang1_39-0"><a data-dcnode-id="3658" href="#cite_note-sang1-39"><span data-dcnode-id="3659" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="3654" id="cite_ref-sang_40-0"><a data-dcnode-id="3655" href="#cite_note-sang-40"><span data-dcnode-id="3656" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="3651" id="cite_ref-chenna_41-0"><a data-dcnode-id="3652" href="#cite_note-chenna-41"><span data-dcnode-id="3653" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="3648" id="cite_ref-chenna1_42-0"><a data-dcnode-id="3649" href="#cite_note-chenna1-42"><span data-dcnode-id="3650" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3647" instrument_node="">  The expansion of the Hoysala Empire brought large parts of modern Andhra Pradesh and Tamil Nadu under their rule.</span><sup class="reference" data-dcnode-id="3644" id="cite_ref-arbiters_43-0"><a data-dcnode-id="3645" href="#cite_note-arbiters-43"><span data-dcnode-id="3646" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="3641" id="cite_ref-kuppam1_44-0"><a data-dcnode-id="3642" href="#cite_note-kuppam1-44"><span data-dcnode-id="3643" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="3638" id="cite_ref-spread_45-0"><a data-dcnode-id="3639" href="#cite_note-spread-45"><span data-dcnode-id="3640" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="3635" id="cite_ref-lead_46-0"><a data-dcnode-id="3636" href="#cite_note-lead-46"><span data-dcnode-id="3637" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3634" instrument_node="">
</span></p><span data-dcnode-id="3632" instrument_node="">
</span><h3 data-dcnode-id="3622"><span class="mw-headline" data-dcnode-id="3630" id="Other_Kingdoms"><span data-dcnode-id="3631" instrument_node="">Other Kingdoms</span></span><span class="mw-editsection" data-dcnode-id="3623"><span class="mw-editsection-bracket" data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">[</span></span><a data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D9" title="Edit section: Other Kingdoms"><span data-dcnode-id="3627" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3606"><span data-dcnode-id="3620" instrument_node="">The </span><a data-dcnode-id="3618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seuna_%28Yadava%29_dynasty" title="Seuna (Yadava) dynasty"><span data-dcnode-id="3619" instrument_node="">Seuna dynasty</span></a><span data-dcnode-id="3617" instrument_node="">, </span><a data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kadamba_dynasty" title="Kadamba dynasty"><span data-dcnode-id="3616" instrument_node="">Kadamba dynasty</span></a><span data-dcnode-id="3614" instrument_node="">, and </span><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chola_dynasty" title="Chola dynasty"><span data-dcnode-id="3613" instrument_node="">Chola Empire</span></a><span data-dcnode-id="3611" instrument_node=""> ruled parts of Karnataka.</span><sup class="reference" data-dcnode-id="3608" id="cite_ref-47"><a data-dcnode-id="3609" href="#cite_note-47"><span data-dcnode-id="3610" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3607" instrument_node="">
</span></p><span data-dcnode-id="3605" instrument_node="">
</span><h2 data-dcnode-id="3594"><span data-dcnode-id="3604" id="Late_Medieval_and_Early_Modern_period_.281206.E2.80.931799_CE.29"></span><span class="mw-headline" data-dcnode-id="3602" id="Late_Medieval_and_Early_Modern_period_(1206–1799_CE)"><span data-dcnode-id="3603" instrument_node="">Late Medieval and Early Modern period (1206–1799 CE)</span></span><span class="mw-editsection" data-dcnode-id="3595"><span class="mw-editsection-bracket" data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">[</span></span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D10" title="Edit section: Late Medieval and Early Modern period (1206–1799 CE)"><span data-dcnode-id="3599" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3593" instrument_node="">
</span><h3 data-dcnode-id="3583"><span class="mw-headline" data-dcnode-id="3591" id="Vijayanagara_Empire"><span data-dcnode-id="3592" instrument_node="">Vijayanagara Empire</span></span><span class="mw-editsection" data-dcnode-id="3584"><span class="mw-editsection-bracket" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">[</span></span><a data-dcnode-id="3587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D11" title="Edit section: Vijayanagara Empire"><span data-dcnode-id="3588" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3585"><span data-dcnode-id="3586" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3582" instrument_node="">
</span><link data-dcnode-id="3581" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3577" role="note"><span data-dcnode-id="3580" instrument_node="">Main article: </span><a data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara_Empire" title="Vijayanagara Empire"><span data-dcnode-id="3579" instrument_node="">Vijayanagara Empire</span></a></div><span data-dcnode-id="3576" instrument_node="">
</span><div class="thumb tmulti tright" data-dcnode-id="3526"><div class="thumbinner" data-dcnode-id="3527" style="width:342px;max-width:342px"><div class="trow" data-dcnode-id="3560"><div class="tsingle" data-dcnode-id="3568" style="width:183px;max-width:183px"><div class="thumbimage" data-dcnode-id="3571" style="height:114px;overflow:hidden"><a class="image" data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKrishna_Pushkarani_-_Hampi_Ruins.jpg"><img alt="" data-dcnode-id="3573" data-file-height="2661" data-file-width="4201" decoding="async" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Krishna_Pushkarani_-_Hampi_Ruins.jpg/181px-Krishna_Pushkarani_-_Hampi_Ruins.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Krishna_Pushkarani_-_Hampi_Ruins.jpg/272px-Krishna_Pushkarani_-_Hampi_Ruins.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Krishna_Pushkarani_-_Hampi_Ruins.jpg/362px-Krishna_Pushkarani_-_Hampi_Ruins.jpg 2x" width="181"></a></div><div class="thumbcaption text-align-center" data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Tank of the Krishna Temple</span></div></div><div class="tsingle" data-dcnode-id="3561" style="width:155px;max-width:155px"><div class="thumbimage" data-dcnode-id="3565" style="height:114px;overflow:hidden"><a class="image" data-dcnode-id="3566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATemple_of_Virupaksha.jpeg"><img alt="" data-dcnode-id="3567" data-file-height="540" data-file-width="720" decoding="async" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Temple_of_Virupaksha.jpeg/153px-Temple_of_Virupaksha.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/00/Temple_of_Virupaksha.jpeg/230px-Temple_of_Virupaksha.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/00/Temple_of_Virupaksha.jpeg/306px-Temple_of_Virupaksha.jpeg 2x" width="153"></a></div><div class="thumbcaption text-align-center" data-dcnode-id="3562"><a class="mw-redirect" data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virupaksha_Temple" title="Virupaksha Temple"><span data-dcnode-id="3564" instrument_node="">Virupaksha Temple</span></a></div></div></div><div class="trow" data-dcnode-id="3545"><div class="tsingle" data-dcnode-id="3552" style="width:179px;max-width:179px"><div class="thumbimage" data-dcnode-id="3557" style="height:117px;overflow:hidden"><a class="image" data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVittala_Temple_-_Hampi_-_Karnataka.jpg"><img alt="" data-dcnode-id="3559" data-file-height="4000" data-file-width="6000" decoding="async" height="118" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Vittala_Temple_-_Hampi_-_Karnataka.jpg/177px-Vittala_Temple_-_Hampi_-_Karnataka.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/04/Vittala_Temple_-_Hampi_-_Karnataka.jpg/266px-Vittala_Temple_-_Hampi_-_Karnataka.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/04/Vittala_Temple_-_Hampi_-_Karnataka.jpg/354px-Vittala_Temple_-_Hampi_-_Karnataka.jpg 2x" width="177"></a></div><div class="thumbcaption text-align-center" data-dcnode-id="3553"><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garuda" title="Garuda"><span data-dcnode-id="3556" instrument_node="">Garuda</span></a><span data-dcnode-id="3554" instrument_node=""> Shrine in the form of a stone chariot.</span></div></div><div class="tsingle" data-dcnode-id="3546" style="width:159px;max-width:159px"><div class="thumbimage" data-dcnode-id="3549" style="height:117px;overflow:hidden"><a class="image" data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AElephant%2527s_Stable_Hampi.jpg"><img alt="" data-dcnode-id="3551" data-file-height="3120" data-file-width="4160" decoding="async" height="118" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Elephant%2527s_Stable_Hampi.jpg/157px-Elephant%2527s_Stable_Hampi.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Elephant%27s_Stable_Hampi.jpg/236px-Elephant%27s_Stable_Hampi.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Elephant%27s_Stable_Hampi.jpg/314px-Elephant%27s_Stable_Hampi.jpg 2x" width="157"></a></div><div class="thumbcaption text-align-center" data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">Elephant Stables</span></div></div></div><div class="trow" data-dcnode-id="3528" style="display:flow-root"><div class="thumbcaption" data-dcnode-id="3529" style="text-align:center"><a data-dcnode-id="3543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampi" title="Hampi"><span data-dcnode-id="3544" instrument_node="">Hampi</span></a><span data-dcnode-id="3542" instrument_node="">, the capital of the </span><a data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara_Empire" title="Vijayanagara Empire"><span data-dcnode-id="3541" instrument_node="">Vijayanagara Empire</span></a><span data-dcnode-id="3539" instrument_node=""> was one of the world's largest cities during the medieval period. The city was destroyed by the combined army of five </span><a class="mw-redirect" data-dcnode-id="3537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deccan_Sultanates" title="Deccan Sultanates"><span data-dcnode-id="3538" instrument_node="">Deccan Sultanates</span></a><span data-dcnode-id="3536" instrument_node=""> during the </span><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Talikota" title="Battle of Talikota"><span data-dcnode-id="3535" instrument_node="">Battle of Talikota</span></a><span data-dcnode-id="3533" instrument_node=""> in 1565.</span><sup class="reference" data-dcnode-id="3530" id="cite_ref-Hampi_48-0"><a data-dcnode-id="3531" href="#cite_note-Hampi-48"><span data-dcnode-id="3532" instrument_node="">[47]</span></a></sup></div></div></div></div><span data-dcnode-id="3525" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3524" instrument_node="">In the early 14th century, the </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara_Empire" title="Vijayanagara Empire"><span data-dcnode-id="3523" instrument_node="">Vijayanagara Empire</span></a><span data-dcnode-id="3521" instrument_node=""> with its capital at Hosapattana (later to be called </span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara" title="Vijayanagara"><span data-dcnode-id="3520" instrument_node="">Vijayanagara</span></a><span data-dcnode-id="3518" instrument_node="">) rose to successfully challenge the Muslim invasions into the South. This empire was established by </span><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harihara_I" title="Harihara I"><span data-dcnode-id="3517" instrument_node="">Harihara I</span></a><span data-dcnode-id="3515" instrument_node=""> and Bukka Raya who many historians claim were commanders of the last Hoysala King </span><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veera_Ballala_III" title="Veera Ballala III"><span data-dcnode-id="3514" instrument_node="">Veera Ballala III</span></a><span data-dcnode-id="3512" instrument_node=""> and the empire prospered for over two centuries.</span><sup class="reference" data-dcnode-id="3509" id="cite_ref-Kannadaempire_49-0"><a data-dcnode-id="3510" href="#cite_note-Kannadaempire-49"><span data-dcnode-id="3511" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="3506" id="cite_ref-karmar_50-0"><a data-dcnode-id="3507" href="#cite_note-karmar-50"><span data-dcnode-id="3508" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3505" instrument_node="">
</span></p><p data-dcnode-id="3492"><span data-dcnode-id="3503" instrument_node="">The Vijayanagara rulers patronized culture, and a distinct form of </span><a data-dcnode-id="3501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara_literature" title="Vijayanagara literature"><span data-dcnode-id="3502" instrument_node="">literature</span></a><span data-dcnode-id="3500" instrument_node=""> and </span><a data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vijayanagara_architecture" title="Vijayanagara architecture"><span data-dcnode-id="3499" instrument_node="">architecture</span></a><span data-dcnode-id="3497" instrument_node=""> evolved during this period. The best example of Vijayanagara architecture is seen in the ruined city of Hampi.</span><sup class="reference" data-dcnode-id="3494" id="cite_ref-Hampi_48-1"><a data-dcnode-id="3495" href="#cite_note-Hampi-48"><span data-dcnode-id="3496" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3493" instrument_node="">
</span></p><span data-dcnode-id="3491" instrument_node="">
</span><h4 data-dcnode-id="3481"><span class="mw-headline" data-dcnode-id="3489" id="Battle_of_Talikota"><span data-dcnode-id="3490" instrument_node="">Battle of Talikota</span></span><span class="mw-editsection" data-dcnode-id="3482"><span class="mw-editsection-bracket" data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">[</span></span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D12" title="Edit section: Battle of Talikota"><span data-dcnode-id="3486" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3480" instrument_node="">
</span><link data-dcnode-id="3479" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3475" role="note"><span data-dcnode-id="3478" instrument_node="">Main article: </span><a data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Talikota" title="Battle of Talikota"><span data-dcnode-id="3477" instrument_node="">Battle of Talikota</span></a></div><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3473" instrument_node="">The main rivals of the Vijayanagara empire were the five </span><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deccan_sultanates" title="Deccan sultanates"><span data-dcnode-id="3472" instrument_node="">Deccan Sultanates</span></a><span data-dcnode-id="3470" instrument_node="">, who defeated the empire in 1565 at the </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Talikota" title="Battle of Talikota"><span data-dcnode-id="3469" instrument_node="">Battle of Talikota</span></a><span data-dcnode-id="3467" instrument_node="">.
</span></p><p data-dcnode-id="3451"><span data-dcnode-id="3465" instrument_node="">Two generals of the Vijayanagara army switched sides and turned their loyalty to the united Sultanates. They captured </span><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aliya_Rama_Raya" title="Aliya Rama Raya"><span data-dcnode-id="3464" instrument_node="">Aliya Rama Raya</span></a><span data-dcnode-id="3462" instrument_node=""> and beheaded him on the spot. The beheading of </span><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aliya_Rama_Raya" title="Aliya Rama Raya"><span data-dcnode-id="3461" instrument_node="">Rama Raya</span></a><span data-dcnode-id="3459" instrument_node=""> created confusion and havoc and in the still loyal portions of the Vijayanagara army, which were then completely routed. The Sultanates' army plundered </span><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampi" title="Hampi"><span data-dcnode-id="3458" instrument_node="">Hampi</span></a><span data-dcnode-id="3456" instrument_node=""> and reduced it into ruins.</span><sup class="reference" data-dcnode-id="3453" id="cite_ref-Hampi_48-2"><a data-dcnode-id="3454" href="#cite_note-Hampi-48"><span data-dcnode-id="3455" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3452" instrument_node="">
</span></p><span data-dcnode-id="3450" instrument_node="">
</span><h3 data-dcnode-id="3440"><span class="mw-headline" data-dcnode-id="3448" id="Bahmani_and_Deccan_Sultanates"><span data-dcnode-id="3449" instrument_node="">Bahmani and Deccan Sultanates</span></span><span class="mw-editsection" data-dcnode-id="3441"><span class="mw-editsection-bracket" data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">[</span></span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D13" title="Edit section: Bahmani and Deccan Sultanates"><span data-dcnode-id="3445" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3439" instrument_node="">
</span><link data-dcnode-id="3438" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3431" role="note"><span data-dcnode-id="3437" instrument_node="">Main articles: </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahmani_Sultanate" title="Bahmani Sultanate"><span data-dcnode-id="3436" instrument_node="">Bahmani Sultanate</span></a><span data-dcnode-id="3434" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deccan_Sultanates" title="Deccan Sultanates"><span data-dcnode-id="3433" instrument_node="">Deccan Sultanates</span></a></div><span data-dcnode-id="3430" instrument_node="">
