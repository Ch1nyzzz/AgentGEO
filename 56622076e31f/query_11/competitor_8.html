</span><div class="thumb tleft" data-dcnode-id="3414"><div class="thumbinner" data-dcnode-id="3415" style="width:222px;"><a class="image" data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGol_Gumbaz.jpg"><img alt="" class="thumbimage" data-dcnode-id="3429" data-file-height="1200" data-file-width="1600" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Gol_Gumbaz.jpg/220px-Gol_Gumbaz.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Gol_Gumbaz.jpg/330px-Gol_Gumbaz.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Gol_Gumbaz.jpg/440px-Gol_Gumbaz.jpg 2x" width="220"></a><span data-dcnode-id="3427" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3416"><div class="magnify" data-dcnode-id="3425"><a class="internal" data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGol_Gumbaz.jpg" title="Enlarge"></a></div><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gol_Gumbaz" title="Gol Gumbaz"><span data-dcnode-id="3424" instrument_node="">Gol Gumbaz</span></a><span data-dcnode-id="3422" instrument_node="">, tomb of </span><a data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohammed_Adil_Shah%2C_Sultan_of_Bijapur" title="Mohammed Adil Shah, Sultan of Bijapur"><span data-dcnode-id="3421" instrument_node="">Mohammed Adil Shah</span></a><span data-dcnode-id="3419" instrument_node="">, seventh </span><a data-dcnode-id="3417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adil_Shahi_dynasty" title="Adil Shahi dynasty"><span data-dcnode-id="3418" instrument_node="">Sultan of Bijapur</span></a></div></div></div><span data-dcnode-id="3413" instrument_node="">
</span><p data-dcnode-id="3391"><span data-dcnode-id="3412" instrument_node="">The </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahmani_Sultanate" title="Bahmani Sultanate"><span data-dcnode-id="3411" instrument_node="">Bahmani sultans</span></a><span data-dcnode-id="3409" instrument_node=""> of </span><a data-dcnode-id="3407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidar" title="Bidar"><span data-dcnode-id="3408" instrument_node="">Bidar</span></a><span data-dcnode-id="3406" instrument_node=""> were the main competitors to the Vijayanagara empire for hegemony over the Deccan</span><sup class="reference" data-dcnode-id="3403" id="cite_ref-bin_51-0"><a data-dcnode-id="3404" href="#cite_note-bin-51"><span data-dcnode-id="3405" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3402" instrument_node=""> and after their fall, the </span><a class="mw-redirect" data-dcnode-id="3400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bijapur_Sultanate" title="Bijapur Sultanate"><span data-dcnode-id="3401" instrument_node="">Bijapur Sultanate</span></a><span data-dcnode-id="3399" instrument_node=""> and </span><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidar_Sultanate" title="Bidar Sultanate"><span data-dcnode-id="3398" instrument_node="">Bidar Sultanate</span></a><span data-dcnode-id="3396" instrument_node=""> took their place in the dynastic struggle for control of the southern India.</span><sup class="reference" data-dcnode-id="3393" id="cite_ref-bija_52-0"><a data-dcnode-id="3394" href="#cite_note-bija-52"><span data-dcnode-id="3395" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3392" instrument_node="">
</span></p><span data-dcnode-id="3390" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3375"><div class="thumbinner" data-dcnode-id="3376" style="width:222px;"><a class="image" data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWater-Pipe_Base_LACMA_M.2001.101.jpg"><img alt="" class="thumbimage" data-dcnode-id="3389" data-file-height="1953" data-file-width="2100" decoding="async" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Water-Pipe_Base_LACMA_M.2001.101.jpg/220px-Water-Pipe_Base_LACMA_M.2001.101.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Water-Pipe_Base_LACMA_M.2001.101.jpg/330px-Water-Pipe_Base_LACMA_M.2001.101.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Water-Pipe_Base_LACMA_M.2001.101.jpg/440px-Water-Pipe_Base_LACMA_M.2001.101.jpg 2x" width="220"></a><span data-dcnode-id="3387" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3377"><div class="magnify" data-dcnode-id="3385"><a class="internal" data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWater-Pipe_Base_LACMA_M.2001.101.jpg" title="Enlarge"></a></div><span data-dcnode-id="3384" instrument_node="">A </span><a data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidriware" title="Bidriware"><span data-dcnode-id="3383" instrument_node="">Bidriware</span></a><span data-dcnode-id="3381" instrument_node=""> water-pipe. Bidriware was developed in Bidar in the 14th century C.E. during the rule of the </span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bahmani_Sultanate" title="Bahmani Sultanate"><span data-dcnode-id="3380" instrument_node="">Bahmani Sultanate</span></a><span data-dcnode-id="3378" instrument_node="">.</span></div></div></div><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3373" instrument_node="">After the defeat and disintegration of the Vijayanagara Empire in battle at Talikota in 1565 to a confederacy of Sultanates, the Bijapur Sultanate rose as the main power in the Deccan before their defeat to the </span><a class="mw-redirect" data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mogul_Empire" title="Mogul Empire"><span data-dcnode-id="3372" instrument_node="">Mughal Empire</span></a><span data-dcnode-id="3370" instrument_node=""> in late 17th century.</span><sup class="reference" data-dcnode-id="3367" id="cite_ref-conf_53-0"><a data-dcnode-id="3368" href="#cite_note-conf-53"><span data-dcnode-id="3369" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="3364" id="cite_ref-erst_54-0"><a data-dcnode-id="3365" href="#cite_note-erst-54"><span data-dcnode-id="3366" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3363" instrument_node=""> Mughal Emperor </span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aurangzeb" title="Aurangzeb"><span data-dcnode-id="3362" instrument_node="">Aurangzeb</span></a><span data-dcnode-id="3360" instrument_node=""> gave the order to </span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siege_of_Bijapur" title="Siege of Bijapur"><span data-dcnode-id="3359" instrument_node="">besiege Bijapur</span></a><span data-dcnode-id="3357" instrument_node=""> and after a 15-month-long siege, the Mughal army emerged victorious and the </span><a data-dcnode-id="3355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adil_Shahi_dynasty" title="Adil Shahi dynasty"><span data-dcnode-id="3356" instrument_node="">Adil Shahi dynasty</span></a><span data-dcnode-id="3354" instrument_node=""> came to an end.
</span></p><p data-dcnode-id="3325"><span data-dcnode-id="3352" instrument_node="">The Bahmani and Bijapur rulers encouraged </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urdu" title="Urdu"><span data-dcnode-id="3351" instrument_node="">Urdu</span></a><span data-dcnode-id="3349" instrument_node=""> and Persian literature and </span><a data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-Islamic_architecture" title="Indo-Islamic architecture"><span data-dcnode-id="3348" instrument_node="">Indo Islamic</span></a><span data-dcnode-id="3346" instrument_node=""> architecture, the </span><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gol_Gumbaz" title="Gol Gumbaz"><span data-dcnode-id="3345" instrument_node="">Gol Gumbaz</span></a><span data-dcnode-id="3343" instrument_node=""> being one of the high points of this contribution.</span><sup class="reference" data-dcnode-id="3340" id="cite_ref-gol_55-0"><a data-dcnode-id="3341" href="#cite_note-gol-55"><span data-dcnode-id="3342" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3339" instrument_node=""> </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bidriware" title="Bidriware"><span data-dcnode-id="3338" instrument_node="">Bidriware</span></a><span data-dcnode-id="3336" instrument_node=""> and </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deccan_painting" title="Deccan painting"><span data-dcnode-id="3335" instrument_node="">Deccan painting</span></a><span data-dcnode-id="3333" instrument_node=""> developed during this period. The </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahmud_Gawan_Madrasa" title="Mahmud Gawan Madrasa"><span data-dcnode-id="3332" instrument_node="">Madrasa Mahmud Gawan</span></a><span data-dcnode-id="3330" instrument_node=""> was a university built during the reign of the Bahmani Sultanate, one of the few centers of higher learning in medieval India.</span><sup class="reference" data-dcnode-id="3327" id="cite_ref-FOOTNOTEYazdani,_199591–93_56-0"><a data-dcnode-id="3328" href="#cite_note-FOOTNOTEYazdani,_199591%E2%80%9393-56"><span data-dcnode-id="3329" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3326" instrument_node="">
</span></p><p data-dcnode-id="3311"><span data-dcnode-id="3324" instrument_node="">Parts of </span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka" title="Karnataka"><span data-dcnode-id="3323" instrument_node="">Karnataka</span></a><span data-dcnode-id="3321" instrument_node=""> were conquered by </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maratha_Empire" title="Maratha Empire"><span data-dcnode-id="3320" instrument_node="">Marathas</span></a><span data-dcnode-id="3318" instrument_node="">, earlier under </span><a class="mw-redirect" data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chhatrapati_Shivaji" title="Chhatrapati Shivaji"><span data-dcnode-id="3317" instrument_node="">Chhatrapati Shivaji</span></a><span data-dcnode-id="3315" instrument_node=""> and later on after the </span><a class="mw-redirect" data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_27_years" title="War of 27 years"><span data-dcnode-id="3314" instrument_node="">War of 27 years</span></a><span data-dcnode-id="3312" instrument_node="">.
</span></p><span data-dcnode-id="3310" instrument_node="">
</span><h3 data-dcnode-id="3300"><span class="mw-headline" data-dcnode-id="3308" id="Anglo-Mysore_Wars"><span data-dcnode-id="3309" instrument_node="">Anglo-Mysore Wars</span></span><span class="mw-editsection" data-dcnode-id="3301"><span class="mw-editsection-bracket" data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">[</span></span><a data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D14" title="Edit section: Anglo-Mysore Wars"><span data-dcnode-id="3305" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3299" instrument_node="">
</span><link data-dcnode-id="3298" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3291" role="note"><span data-dcnode-id="3297" instrument_node="">Main articles: </span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Mysore_Wars" title="Anglo-Mysore Wars"><span data-dcnode-id="3296" instrument_node="">Anglo-Mysore Wars</span></a><span data-dcnode-id="3294" instrument_node=""> and </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tipu_Sultan" title="Tipu Sultan"><span data-dcnode-id="3293" instrument_node="">Tipu Sultan</span></a></div><span data-dcnode-id="3290" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3269"><div class="thumbinner" data-dcnode-id="3270" style="width:222px;"><a class="image" data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASurrender_of_Tipu_Sultan.jpg"><img alt="" class="thumbimage" data-dcnode-id="3289" data-file-height="725" data-file-width="1000" decoding="async" height="160" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/24/Surrender_of_Tipu_Sultan.jpg/220px-Surrender_of_Tipu_Sultan.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/24/Surrender_of_Tipu_Sultan.jpg/330px-Surrender_of_Tipu_Sultan.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/24/Surrender_of_Tipu_Sultan.jpg/440px-Surrender_of_Tipu_Sultan.jpg 2x" width="220"></a><span data-dcnode-id="3287" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3271"><div class="magnify" data-dcnode-id="3285"><a class="internal" data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASurrender_of_Tipu_Sultan.jpg" title="Enlarge"></a></div><span data-dcnode-id="3284" instrument_node="">General </span><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Cornwallis%2C_1st_Marquess_Cornwallis" title="Charles Cornwallis, 1st Marquess Cornwallis"><span data-dcnode-id="3283" instrument_node="">Lord Cornwallis</span></a><span data-dcnode-id="3281" instrument_node=""> receiving </span><a data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tipu_Sultan" title="Tipu Sultan"><span data-dcnode-id="3280" instrument_node="">Tipu Sultan</span></a><span data-dcnode-id="3278" instrument_node="">'s sons as hostages after the </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Anglo-Mysore_War" title="Third Anglo-Mysore War"><span data-dcnode-id="3277" instrument_node="">third Anglo-Mysore War</span></a><span data-dcnode-id="3275" instrument_node="">, by </span><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Home" title="Robert Home"><span data-dcnode-id="3274" instrument_node="">Robert Home</span></a><span data-dcnode-id="3272" instrument_node="">, c. 1793 CE</span></div></div></div><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3267" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="3265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wodeyar" title="Wodeyar"><span data-dcnode-id="3266" instrument_node="">Wodeyars</span></a><span data-dcnode-id="3264" instrument_node=""> of Mysore, former vassals of the Vijayanagara Empire, leased the state from the Mughal king </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aurangzeb" title="Aurangzeb"><span data-dcnode-id="3263" instrument_node="">Aurangzeb</span></a><span data-dcnode-id="3261" instrument_node=""> in the 17th century. With the death of </span><a class="mw-redirect" data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Krishnaraja_Wodeyar_II" title="Krishnaraja Wodeyar II"><span data-dcnode-id="3260" instrument_node="">Krishnaraja Wodeyar II</span></a><span data-dcnode-id="3258" instrument_node="">, </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyder_Ali" title="Hyder Ali"><span data-dcnode-id="3257" instrument_node="">Haider Ali</span></a><span data-dcnode-id="3255" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commander-in-Chief" title="Commander-in-Chief"><span data-dcnode-id="3254" instrument_node="">Commander-in-Chief</span></a><span data-dcnode-id="3252" instrument_node=""> of the Mysore Army, assumed control over the region, until the rule of the kingdom was passed to </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tipu_Sultan" title="Tipu Sultan"><span data-dcnode-id="3251" instrument_node="">Tipu Sultan</span></a><span data-dcnode-id="3249" instrument_node="">, after Haider Ali's death. In attempting to contain European expansion in South India, Tipu Sultan, known as the </span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Tiger of Mysore</span></i><span data-dcnode-id="3246" instrument_node=""> fought four significant </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Mysore_Wars" title="Anglo-Mysore Wars"><span data-dcnode-id="3245" instrument_node="">Anglo-Mysore Wars</span></a><span data-dcnode-id="3243" instrument_node="">, the last of which resulted in his death and the incorporation of Mysore into the </span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Raj" title="British Raj"><span data-dcnode-id="3242" instrument_node="">British Raj</span></a><span data-dcnode-id="3240" instrument_node="">.
</span></p><span data-dcnode-id="3238" instrument_node="">
</span><h3 data-dcnode-id="3228"><span class="mw-headline" data-dcnode-id="3236" id="Company_rule"><span data-dcnode-id="3237" instrument_node="">Company rule</span></span><span class="mw-editsection" data-dcnode-id="3229"><span class="mw-editsection-bracket" data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">[</span></span><a data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D15" title="Edit section: Company rule"><span data-dcnode-id="3233" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3216"><span data-dcnode-id="3226" instrument_node="">Following Tipu's fall, a part of the kingdom of Mysore was annexed and divided between the Madras Presidency and the Nizam. The remaining territory was transformed into a Princely State; the five-year-old scion of the Wodeyar family, </span><a class="mw-redirect" data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Krishnaraja_Wodeyar_III" title="Krishnaraja Wodeyar III"><span data-dcnode-id="3225" instrument_node="">Krishnaraja III</span></a><span data-dcnode-id="3223" instrument_node="">, was installed on the throne with chief minister (</span><i data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Diwan</span></i><span data-dcnode-id="3220" instrument_node="">) </span><a data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purnaiah" title="Purnaiah"><span data-dcnode-id="3219" instrument_node="">Purnaiah</span></a><span data-dcnode-id="3217" instrument_node="">.
</span></p><p data-dcnode-id="3205"><span data-dcnode-id="3215" instrument_node="">The </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Mysore" title="Kingdom of Mysore"><span data-dcnode-id="3214" instrument_node="">Mysore State</span></a><span data-dcnode-id="3212" instrument_node=""> and </span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyderabad_State" title="Hyderabad State"><span data-dcnode-id="3211" instrument_node="">Hyderabad State</span></a><span data-dcnode-id="3209" instrument_node="">, which ruled most of Karnataka, were allied with the British during the </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Rebellion_of_1857" title="Indian Rebellion of 1857"><span data-dcnode-id="3208" instrument_node="">Indian Rebellion of 1857</span></a><span data-dcnode-id="3206" instrument_node="">.
</span></p><span data-dcnode-id="3204" instrument_node="">
</span><h2 data-dcnode-id="3193"><span data-dcnode-id="3203" id="British_Colonial_period_.281799.E2.80.931947.29"></span><span class="mw-headline" data-dcnode-id="3201" id="British_Colonial_period_(1799–1947)"><span data-dcnode-id="3202" instrument_node="">British Colonial period (1799–1947)</span></span><span class="mw-editsection" data-dcnode-id="3194"><span class="mw-editsection-bracket" data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">[</span></span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D16" title="Edit section: British Colonial period (1799–1947)"><span data-dcnode-id="3198" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3192" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3176"><div class="thumbinner" data-dcnode-id="3177" style="width:222px;"><a class="image" data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFamine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg"><img alt="" class="thumbimage" data-dcnode-id="3191" data-file-height="2931" data-file-width="2483" decoding="async" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Famine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg/220px-Famine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Famine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg/330px-Famine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Famine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg/440px-Famine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg 2x" width="220"></a><span data-dcnode-id="3189" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3178"><div class="magnify" data-dcnode-id="3187"><a class="internal" data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFamine_in_India_Natives_Waiting_for_Relief_in_Bangalore.jpg" title="Enlarge"></a></div><span data-dcnode-id="3186" instrument_node="">People waiting for famine relief in </span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bangalore" title="Bangalore"><span data-dcnode-id="3185" instrument_node="">Bangalore</span></a><span data-dcnode-id="3183" instrument_node="">. From the </span><i data-dcnode-id="3180"><a class="mw-redirect" data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Illustrated_London_News" title="Illustrated London News"><span data-dcnode-id="3182" instrument_node="">Illustrated London News</span></a></i><span data-dcnode-id="3179" instrument_node="">. (20 October 1877)</span></div></div></div><span data-dcnode-id="3175" instrument_node="">
</span><h3 data-dcnode-id="3165"><span class="mw-headline" data-dcnode-id="3173" id="Mysore_State"><span data-dcnode-id="3174" instrument_node="">Mysore State</span></span><span class="mw-editsection" data-dcnode-id="3166"><span class="mw-editsection-bracket" data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">[</span></span><a data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D17" title="Edit section: Mysore State"><span data-dcnode-id="3170" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3167"><span data-dcnode-id="3168" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3164" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3147"><div class="thumbinner" data-dcnode-id="3148" style="width:252px;"><a class="image" data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMysorepalace.jpg"><img alt="" class="thumbimage" data-dcnode-id="3163" data-file-height="577" data-file-width="1024" decoding="async" height="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Mysorepalace.jpg/250px-Mysorepalace.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/83/Mysorepalace.jpg/375px-Mysorepalace.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/83/Mysorepalace.jpg/500px-Mysorepalace.jpg 2x" width="250"></a><span data-dcnode-id="3161" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3149"><div class="magnify" data-dcnode-id="3159"><a class="internal" data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMysorepalace.jpg" title="Enlarge"></a></div><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore_Palace" title="Mysore Palace"><span data-dcnode-id="3158" instrument_node="">Mysore Palace</span></a><span data-dcnode-id="3156" instrument_node="">, completed in 1912, was the residence of the </span><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wadiyar_dynasty" title="Wadiyar dynasty"><span data-dcnode-id="3155" instrument_node="">Wadiyar dynasty</span></a><span data-dcnode-id="3153" instrument_node=""> which ruled the </span><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Mysore" title="Kingdom of Mysore"><span data-dcnode-id="3152" instrument_node="">Kingdom of Mysore</span></a><span data-dcnode-id="3150" instrument_node="">.</span></div></div></div><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3145" instrument_node="">During this time, railways and airways, as well as modern universities were introduced in Karnataka. The </span><a data-dcnode-id="3143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Institute_of_Science" title="Indian Institute of Science"><span data-dcnode-id="3144" instrument_node="">Indian Institute of Science</span></a><span data-dcnode-id="3142" instrument_node=""> (1909) and </span><a data-dcnode-id="3140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Mysore" title="University of Mysore"><span data-dcnode-id="3141" instrument_node="">University of Mysore</span></a><span data-dcnode-id="3139" instrument_node=""> (1916) were the first educational institutions established in Karnataka.
</span></p><span data-dcnode-id="3137" instrument_node="">
</span><h3 data-dcnode-id="3127"><span class="mw-headline" data-dcnode-id="3135" id="Independence_movement"><span data-dcnode-id="3136" instrument_node="">Independence movement</span></span><span class="mw-editsection" data-dcnode-id="3128"><span class="mw-editsection-bracket" data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">[</span></span><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D18" title="Edit section: Independence movement"><span data-dcnode-id="3132" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3125" instrument_node="">However, the British period was also a time of racial discrimination, economic exploitation and </span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_major_famines_in_India_during_British_rule" title="Timeline of major famines in India during British rule"><span data-dcnode-id="3124" instrument_node="">numerous preventable famines</span></a><span data-dcnode-id="3122" instrument_node="">.
</span></p><p data-dcnode-id="3107"><span data-dcnode-id="3120" instrument_node="">By the late 19th century, the independence movement had gained momentum; </span><a class="mw-redirect" data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aluru_Venkata_Raya" title="Aluru Venkata Raya"><span data-dcnode-id="3119" instrument_node="">Aluru Venkata Raya</span></a><span data-dcnode-id="3117" instrument_node="">, </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S._Nijalingappa" title="S. Nijalingappa"><span data-dcnode-id="3116" instrument_node="">S. Nijalingappa</span></a><span data-dcnode-id="3114" instrument_node="">, </span><a data-dcnode-id="3112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kengal_Hanumanthaiah" title="Kengal Hanumanthaiah"><span data-dcnode-id="3113" instrument_node="">Kengal Hanumanthaiah</span></a><span data-dcnode-id="3111" instrument_node="">, </span><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nittoor_Srinivasa_Rau" title="Nittoor Srinivasa Rau"><span data-dcnode-id="3110" instrument_node="">Nittoor Srinivasa Rau</span></a><span data-dcnode-id="3108" instrument_node=""> and others carried on the struggle into the early 20th century.
</span></p><span data-dcnode-id="3106" instrument_node="">
</span><h2 data-dcnode-id="3095"><span data-dcnode-id="3105" id="Post-independence_.281947.E2.80.93present.29"></span><span class="mw-headline" data-dcnode-id="3103" id="Post-independence_(1947–present)"><span data-dcnode-id="3104" instrument_node="">Post-independence (1947–present)</span></span><span class="mw-editsection" data-dcnode-id="3096"><span class="mw-editsection-bracket" data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">[</span></span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D19" title="Edit section: Post-independence (1947–present)"><span data-dcnode-id="3100" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3094" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3085"><div class="thumbinner" data-dcnode-id="3086" style="width:222px;"><a class="image" data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKarnataka_1956_Reorg.svg"><img alt="" class="thumbimage" data-dcnode-id="3093" data-file-height="748" data-file-width="693" decoding="async" height="237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Karnataka_1956_Reorg.svg/220px-Karnataka_1956_Reorg.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Karnataka_1956_Reorg.svg/330px-Karnataka_1956_Reorg.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Karnataka_1956_Reorg.svg/440px-Karnataka_1956_Reorg.svg.png 2x" width="220"></a><span data-dcnode-id="3091" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3087"><div class="magnify" data-dcnode-id="3089"><a class="internal" data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKarnataka_1956_Reorg.svg" title="Enlarge"></a></div><span data-dcnode-id="3088" instrument_node="">Territories before unification</span></div></div></div><span data-dcnode-id="3084" instrument_node="">
</span><h3 data-dcnode-id="3074"><span class="mw-headline" data-dcnode-id="3082" id="Unification_of_Karnataka"><span data-dcnode-id="3083" instrument_node="">Unification of Karnataka</span></span><span class="mw-editsection" data-dcnode-id="3075"><span class="mw-editsection-bracket" data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">[</span></span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D20" title="Edit section: Unification of Karnataka"><span data-dcnode-id="3079" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3073" instrument_node="">
</span><link data-dcnode-id="3072" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3068" role="note"><span data-dcnode-id="3071" instrument_node="">Main article: </span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unification_of_Karnataka" title="Unification of Karnataka"><span data-dcnode-id="3070" instrument_node="">Unification of Karnataka</span></a></div><span data-dcnode-id="3067" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3053"><div class="thumbinner" data-dcnode-id="3054" style="width:172px;"><a class="image" data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJayachandra-maharaja-wadiyar.jpg"><img alt="" class="thumbimage" data-dcnode-id="3066" data-file-height="886" data-file-width="600" decoding="async" height="251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Jayachandra-maharaja-wadiyar.jpg/170px-Jayachandra-maharaja-wadiyar.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/35/Jayachandra-maharaja-wadiyar.jpg/255px-Jayachandra-maharaja-wadiyar.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/35/Jayachandra-maharaja-wadiyar.jpg/340px-Jayachandra-maharaja-wadiyar.jpg 2x" width="170"></a><span data-dcnode-id="3064" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3055"><div class="magnify" data-dcnode-id="3062"><a class="internal" data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJayachandra-maharaja-wadiyar.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jayachamaraja_Wodeyar" title="Jayachamaraja Wodeyar"><span data-dcnode-id="3061" instrument_node="">Jayachamaraja Wodeyar</span></a><span data-dcnode-id="3059" instrument_node="">, the last ruling </span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maharaja_of_Mysore" title="Maharaja of Mysore"><span data-dcnode-id="3058" instrument_node="">Maharaja of Mysore</span></a><span data-dcnode-id="3056" instrument_node="">.</span></div></div></div><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3051" instrument_node="">After Indian independence, the </span><a class="mw-redirect" data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wodeyar" title="Wodeyar"><span data-dcnode-id="3050" instrument_node="">Wodeyar</span></a><span data-dcnode-id="3048" instrument_node=""> Maharaja acceded to India. In 1950, </span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Mysore" title="Kingdom of Mysore"><span data-dcnode-id="3047" instrument_node="">Mysore</span></a><span data-dcnode-id="3045" instrument_node=""> became an Indian state, and the former Maharaja became its </span><i data-dcnode-id="3042"><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rajpramukh" title="Rajpramukh"><span data-dcnode-id="3044" instrument_node="">rajpramukh</span></a></i><span data-dcnode-id="3041" instrument_node="">, or governor, until 1975. The </span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unification_of_Karnataka" title="Unification of Karnataka"><i data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Ekikarana</span></i><span data-dcnode-id="3038" instrument_node=""> movement</span></a><span data-dcnode-id="3036" instrument_node=""> which started in the later half of the 20th century, culminated in the </span><i data-dcnode-id="3033"><a class="mw-redirect" data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/States_Reorganisation_Act" title="States Reorganisation Act"><span data-dcnode-id="3035" instrument_node="">States Reorganisation Act</span></a></i><span data-dcnode-id="3032" instrument_node=""> of 1956 which provided for parts of </span><a class="mw-redirect" data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coorg" title="Coorg"><span data-dcnode-id="3031" instrument_node="">Coorg</span></a><span data-dcnode-id="3029" instrument_node="">, </span><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madras_State" title="Madras State"><span data-dcnode-id="3028" instrument_node="">Madras</span></a><span data-dcnode-id="3026" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyderabad_state" title="Hyderabad state"><span data-dcnode-id="3025" instrument_node="">Hyderabad</span></a><span data-dcnode-id="3023" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bombay_state" title="Bombay state"><span data-dcnode-id="3022" instrument_node="">Bombay states</span></a><span data-dcnode-id="3020" instrument_node=""> to be incorporated into the </span><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mysore_State" title="Mysore State"><span data-dcnode-id="3019" instrument_node="">state of Mysore</span></a><span data-dcnode-id="3017" instrument_node="">. Mysore state was renamed </span><i data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">Karnataka</span></i><span data-dcnode-id="3014" instrument_node=""> in 1973.  The state of Mysore was formed on 1 November 1956 and since then 1 November of every year is celebrated as </span><a class="mw-redirect" data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kannada_Rajyotsava" title="Kannada Rajyotsava"><span data-dcnode-id="3013" instrument_node="">Kannada Rajyotsava</span></a><span data-dcnode-id="3011" instrument_node=""> / </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karnataka_Rajyotsava" title="Karnataka Rajyotsava"><span data-dcnode-id="3010" instrument_node="">Karnataka Rajyotsava</span></a><span data-dcnode-id="3008" instrument_node="">.
</span></p><span data-dcnode-id="3006" instrument_node="">
</span><h3 data-dcnode-id="2996"><span class="mw-headline" data-dcnode-id="3004" id="Post-unification"><span data-dcnode-id="3005" instrument_node="">Post-unification</span></span><span class="mw-editsection" data-dcnode-id="2997"><span class="mw-editsection-bracket" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">[</span></span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_Karnataka%26action%3Dedit%26section%3D21" title="Edit section: Post-unification"><span data-dcnode-id="3001" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2998"><span data-dcnode-id="2999" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2984"><span data-dcnode-id="2994" instrument_node="">The </span><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1957_Mysore_Legislative_Assembly_election" title="1957 Mysore Legislative Assembly election"><span data-dcnode-id="2993" instrument_node="">1957 elections</span></a><span data-dcnode-id="2991" instrument_node=""> saw the </span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_National_Congress" title="Indian National Congress"><span data-dcnode-id="2990" instrument_node="">Indian National Congress</span></a><span data-dcnode-id="2988" instrument_node=""> win 150 seats out of 208, and </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S._Nijalingappa" title="S. Nijalingappa"><span data-dcnode-id="2987" instrument_node="">S. Nijalingappa</span></a><span data-dcnode-id="2985" instrument_node=""> was retained as Chief Minister. 
</span></p><p data-dcnode-id="2976"><span data-dcnode-id="2983" instrument_node="">The Congress retained its power in Karnataka till 1983, when the </span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Janata_Party" title="Janata Party"><span data-dcnode-id="2982" instrument_node="">Janata Party</span></a><span data-dcnode-id="2980" instrument_node=""> formed the first non-Congress government in Karnataka with the support of other smaller parties. Subsequent elections have seen power switch between the Congress, </span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bharatiya_Janata_Party" title="Bharatiya Janata Party"><span data-dcnode-id="2979" instrument_node="">Bharatiya Janata Party</span></a><span data-dcnode-id="2977" instrument_node="">, and other parties.
