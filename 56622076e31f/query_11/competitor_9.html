</span><table border="0" cellpadding="0" cellspacing="0" data-dcnode-id="504" width="100%"><tbody data-dcnode-id="506"><tr data-dcnode-id="507"><td align="left" class="navigationurl" data-dcnode-id="508" style="text-align:justify;color: #000000; font-family: calibri,candara,segoe,seoge ui,oprtima,arial,sans-sarif;font-size: 14px; text-decoration: none;" width="100%"><div data-dcnode-id="510"><span data-dcnode-id="600" instrument_node="">

</span><span data-dcnode-id="595" instrument_node="">
</span><span data-dcnode-id="593" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-8040656654961143" data-ad-slot="6415560745" data-dcnode-id="592" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="591" instrument_node="">
</span><span data-dcnode-id="588" instrument_node="">
</span></div><span data-dcnode-id="586" instrument_node="">&nbsp;</span><img align="right" alt="Bhootha Aradhane, Folk Art, Karnataka" data-dcnode-id="585" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/photos_gallery/79/Bhootha_Aradhane%2520Folk_Art_Karnataka.jpg&amp;raw" style="margin-left:7px"><span data-dcnode-id="584" instrument_node="">Bhootha Aradhane or Bhuta Kola is a ritualistic </span><a class="fntlink" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/1/indian_folk_dances.htm" title="Indian Folk Dances"><span data-dcnode-id="583" instrument_node="">folk dance</span></a><span data-dcnode-id="581" instrument_node=""> popular in the </span><a class="fntlink" data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/3/karnataka.htm" title="Karnataka"><span data-dcnode-id="580" instrument_node="">Karnataka</span></a><span data-dcnode-id="578" instrument_node=""> state of India. A procession is an important part of this dance form. The procession exhibits various idols representing 'bhoothas' meaning ghosts. The sound of </span><a class="fntlink" data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/44/drums.htm" title="Drums"><span data-dcnode-id="577" instrument_node="">drums</span></a><span data-dcnode-id="575" instrument_node=""> and bursting of firecrackers accompanies the procession. Every year, this dance form attracts huge number of tourists to the state.

</span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node="">
</span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">
</span><b data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Origin of Bhootha Aradhane</span></b><span data-dcnode-id="568" instrument_node="">
</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">

Bhootha Aradhane has originated from the coastal parts of Karnataka and </span><a class="fntlink" data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/2/kerala.htm" title="Kerala"><span data-dcnode-id="565" instrument_node="">Kerala</span></a><span data-dcnode-id="563" instrument_node=""> as a way of Tulu worship. Tulu is a regional language in Karnataka. This form of dance is rarely seen. Bhootha means ghost and the reference to these creatures' dates back to myths. In </span><a class="fntlink" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/4/indian_mythology.htm" title="Indian Mythology"><span data-dcnode-id="562" instrument_node="">mythology</span></a><span data-dcnode-id="560" instrument_node="">, </span><a class="fntlink" data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/2/lord_shiva.htm" title="Lord Shiva"><span data-dcnode-id="559" instrument_node="">Lord Shiva</span></a><span data-dcnode-id="557" instrument_node="">'s attendants are referred to as Bhuta Ganas. Their chief responsibilities were to serve the Lord and protect Dharma.

</span><br data-dcnode-id="556"><span data-dcnode-id="555" instrument_node="">
</span><br data-dcnode-id="554"><span data-dcnode-id="553" instrument_node="">
</span><b data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Forms of Bhootha Aradhane</span></b><span data-dcnode-id="550" instrument_node="">
</span><br data-dcnode-id="549"><span data-dcnode-id="548" instrument_node="">

This dance has different forms. Several kinds of ghosts are represented through this folk dance. Kallurti, Koraga Taniya, Shiradi Bhoota, Koratti, Punjurli, Kuppe Punjurli, Kalkuda, Ali Bhoota, and many others are revered in places like </span><a class="fntlink" data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/67/bantwal.htm" title="Bantwal"><span data-dcnode-id="547" instrument_node="">Bantwal</span></a><span data-dcnode-id="545" instrument_node="">, Puttur, Uppinangadi and </span><a class="fntlink" data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/23/mangalore_capital_dakshina_kannada.htm" title="Mangalore"><span data-dcnode-id="544" instrument_node="">Mangalore</span></a><span data-dcnode-id="542" instrument_node="">. Rajya daiva, Kuntikana Dhoomavathi, KinniMani, Guliga, Koraga, Poomani Ullakalu and Raktheswari are the </span><a class="fntlink" data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/29/bhutas_evil_spirits.htm" title="Bhutas"><span data-dcnode-id="541" instrument_node="">bhootas</span></a><span data-dcnode-id="539" instrument_node=""> worshipped in </span><a class="fntlink" data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indianetzone.com/1/india_temples.htm" title="Indian Temples"><span data-dcnode-id="538" instrument_node="">temples</span></a><span data-dcnode-id="536" instrument_node="">.

</span><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">
</span><br data-dcnode-id="533"><span data-dcnode-id="532" instrument_node="">
</span><b data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Performance of Bhootha Aradhane </span></b><span data-dcnode-id="529" instrument_node="">
</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">

Bhootha Aradhane is performed in a group. The performer will dance on a special music. The main idea behind this folk dance is to appease the devil and protect the environment. A procession with idols of 'bhoothas' is taken out. Drums and firecrackers accompany the procession. At the end of the procession the idol is kept on a pedestal and the dancer begins his performance. He dances with swords and bells whirling round like a bhootha. He acts as if he is possessed and pretends like a prophet.

</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
</span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
</span><b data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Costumes of Bhootha Aradhane</span></b><span data-dcnode-id="520" instrument_node="">
</span><br data-dcnode-id="519"><span data-dcnode-id="518" instrument_node="">

The costume plays a crucial role in the performance of Bhootha Aradhane. During the performance of this form of dance the dancer is required to make up his or her face in a specific way and wear certain costumes and jewelleries. The dancers decorate themselves to resemble ghosts.

</span><br data-dcnode-id="517"><span data-dcnode-id="516" instrument_node="">
</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">

Both as a tourist and as an art enthusiast, one will love Bhootha Aradhane. The dance is performed twice in year, once in the month of January and again after the annual festival.


</span><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">
