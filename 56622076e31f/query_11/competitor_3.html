</span><ins class="adsbygoogle responsive-L" data-ad-client="ca-pub-2465595584516265" data-ad-format="link" data-ad-slot="7548612024" data-dcnode-id="617" style="display:block"></ins><span data-dcnode-id="616" instrument_node="">

Professional religious singers sing&nbsp;only those songs 
        which concern their chosen gods, pilgrim centres and temples. Their main 
        purpose is to propagate the supremacy and philosophy of their particular 
        religion to inculcate values and norms in the community. Professional 
        singers are characterised by traditional colourful costumes and conspicuous 
        musical instruments. They command great respect&nbsp; and take active 
        participation in all the religious celebrations of their community.&nbsp;</span><p data-dcnode-id="599"></p><span data-dcnode-id="598" instrument_node="">
</span></td></tr><tr data-dcnode-id="525"><td colspan="2" data-dcnode-id="527" width="100%"><span data-dcnode-id="592" instrument_node="">
</span><p align="justify" data-dcnode-id="587"><br data-dcnode-id="591"><a data-dcnode-id="590" name="kam"></a><b data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">(1) Kamsale</span></b></p><span data-dcnode-id="586" instrument_node="">
</span><p align="justify" data-dcnode-id="583"><img align="right" alt="Kamsale" border="1" data-dcnode-id="585" height="109" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.webindia123.com/news/images/kamsale%2520kunitha.jpg&amp;raw" width="172"><span data-dcnode-id="584" instrument_node="">'
        
        Kamsale' popularly known as 'Devadraguddas' are the disciples of Lord 
        Madayya. 'Kamsale&nbsp;Mela' is a popular folk song which deals with the 
        history of 'Mahadeshwara' (worshipping deity) of Mahadeshwara hills,&nbsp;a 
        renowned pilgrim&nbsp;centre, situated in Mysore district.&nbsp;</span></p><span data-dcnode-id="582" instrument_node="">
</span><p align="justify" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">The
name 'Kamsale' is derived from the traditional musical instrument. It is a
unique musical instrument consisting of two bronze plates. The bronze cymbal is
in the form of a cup with a broad base. The other plate is a flat structure with
a tassel tied in the centre. The cup is held in the left hand and with the help
of the tassel the flat plate is held in the right hand and the singer clashes
both of them rhythmically during the performances.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p align="justify" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">'Kamsale' singers sing either individually or in a group. when 
        in group, this form becomes a mela and consists of three members. The 
        main performer plays the 'Kamsale' instrument, supported by two artistes 
        in the background playing an instrument-the 'Dammadi' and the 'Yekatari'-single-stringed 
        musical instrument. The performance consists of narration by the chief 
        singer, who pauses in between to interpret the story. The Kamsale artists 
        do not wear any traditional costumes. Their dressing is simple, they wear 
        'Rudraksha' beads; their religious emblem and carry a&nbsp; satchel. They 
        are illiterates and have no printed literature. They learn those songs 
        orally. They participate in fairs, which are held in Mahadeshwara hills 
        during 'Diwali', 'Shivaratri' and 'Ugadi' festivals and are found extensively 
        in Mysore, Mandya and Bangalore districts of the state.</span></p><p data-dcnode-id="564"><span data-dcnode-id="574" instrument_node="">
</span><span data-dcnode-id="572" instrument_node="">
</span><span data-dcnode-id="570" instrument_node="">
</span><ins class="adsbygoogle classifieds-responsive-1" data-ad-client="ca-pub-2465595584516265" data-ad-slot="4946657982" data-dcnode-id="569" style="display:inline-block"></ins><span data-dcnode-id="568" instrument_node="">
</span><span data-dcnode-id="565" instrument_node="">
</span></p><span data-dcnode-id="563" instrument_node="">
</span><p align="right" data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.webindia123.com/news/include/scroll_externalHome.htm%23top"><b data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Top</span></b></a></p><span data-dcnode-id="558" instrument_node="">
</span><p align="justify" data-dcnode-id="554"><a data-dcnode-id="557" name="nee"></a><b data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">(2) Neelagarus</span></b></p><span data-dcnode-id="553" instrument_node="">
</span><p align="justify" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">'Neelagarus'
popularly known as 'Manteswamys' belong to a religious sect called 'Manteswamy' and they sing praises of the virtues and supernatural powers
of their deity. 'Manteswamy' or Siddappaji was a renowned religious
personality endowed with supernatural powers with an objective of spreading the
'Bhakti' cult and incubate moral&nbsp; virtues among the people.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p align="justify" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">'Neelagarus'
play an impressive folk instrument known as 'Tamburi' which is a long
four-stringed instrument with lion or snake face made of wood. The song mela
usually comprises of four to five members. The main performer plays the 'Tamburi'
whereas the other artistes sing in the background and play instruments
like a small kettle drum called the 'Dakke' and small cymbals.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="545" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2465595584516265" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="4364045487" data-dcnode-id="544" style="display:block; text-align:center;"></ins><span data-dcnode-id="543" instrument_node="">
</span></p><span data-dcnode-id="539" instrument_node="">
</span><p align="justify" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">The
costume&nbsp; of these artists consists of a head gear, a coloured dhoti and a 'Jubba'
and they apply sandal paste and sacred ash on their foreheads. Only those who
undergo the consecration ceremony in the religious mutts are qualified to practice
such religious singing as a profession. They wear 'Rudrakshi' beads and carry a
satchel. These artistes participate during fairs
held annually in places like Chikkalur, Kapadi&nbsp; and Bophanagowdanapura in
Mandya district. They are found in Kanakapura, Malavalli, Ramanagaram,
Channapatna, Maddur, Mandya,&nbsp;</span></p><span data-dcnode-id="536" instrument_node="">
</span><p align="justify" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node=""> T. Narasipura, Pandavapura, Heggadadevanakote, Mysore and 
        Hunsur.&nbsp;</span></p><span data-dcnode-id="533" instrument_node="">
