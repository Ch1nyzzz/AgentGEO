instrument_node="">Past Interview Transcripts</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-141" data-dcnode-id="1093" id="menu-item-141"><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.pscnotes.com/interactive-interview-program/"><span data-dcnode-id="1095" instrument_node="">Interactive Interview Program</span></a></li></ul></li><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-161" data-dcnode-id="1088" id="menu-item-161"><a data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pscnotes.com/State-PCS-Exams/KPSC-Exam"><span data-dcnode-id="1090" instrument_node="">Get PDF’s</span></a></li><li class="slideout-toggle menu-item-align-right" data-dcnode-id="1086"><a data-dcnode-id="1087" href="#"></a></li><li data-dcnode-id="1083"><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.pscnotes.com/wp-login.php%3Fredirect_to%3Dindex.php" rel="nofollow"><span data-dcnode-id="1085" instrument_node="">Log in</span></a></li><li data-dcnode-id="1080"><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.pscnotes.com/karnataka-history/folk-songs-of-karnataka/checkout/purchase-history/"><span data-dcnode-id="1082" instrument_node="">Account</span></a></li></ul></div></div></nav><div class="site grid-container container hfeed grid-parent" data-dcnode-id="321" id="page"><div class="site-content" data-dcnode-id="322" id="content"><div class="content-area grid-parent mobile-grid-100 grid-75 tablet-grid-75" data-dcnode-id="933" id="primary"><main class="site-main" data-dcnode-id="934" id="main"><article class="post-5782 post type-post status-publish format-standard hentry category-karnataka-history tag-day-activities tag-folk-songs tag-karnataka tag-narrative-verse tag-pure-love-songs tag-rs" data-dcnode-id="935" id="post-5782" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="936"><header aria-label="Content" class="entry-header" data-dcnode-id="1062"><h1 class="entry-title" data-dcnode-id="1074" itemprop="headline"><span data-dcnode-id="1075" instrument_node="">Folk Songs of Karnataka</span></h1><div class="entry-meta" data-dcnode-id="1063"><span data-dcnode-id="1073" instrument_node=""> </span><span class="posted-on" data-dcnode-id="1070"><time class="updated" data-dcnode-id="1072" datetime="" itemprop="dateModified"></time><time class="entry-date published" data-dcnode-id="1071" datetime="" itemprop="datePublished"></time></span><span data-dcnode-id="1069" instrument_node=""> </span><span class="byline" data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">by </span><span class="author vcard" data-dcnode-id="1065" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.pscnotes.com/author/rawan239/" itemprop="url" rel="author" title="View all posts by "><span class="author-name" data-dcnode-id="1067" itemprop="name"></span></a></span></span></div></header><div class="entry-content" data-dcnode-id="977" itemprop="text"><p data-dcnode-id="1056"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></strong><strong data-dcnode-id="1057"><u data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Folk Songs of Karnataka</span></u></strong></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">A song originating among the people of a country or area, passed by oral tradition from one singer or generation to the next, often existing in several versions, and marked generally by simple, modal melody and stanzaic, narrative verse.</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Folk songs in Kannada or Janapada geethe can be classified as follow;</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">&nbsp;</span></p><ol data-dcnode-id="1045"><li data-dcnode-id="1046"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Small songs</span></strong><span data-dcnode-id="1047" instrument_node="">which are sung on occasions such as marriage, festivals, traveling and even while doing every day activities from cooking to the harvesting of crops. There are songs which are sung even while cleaning the house, washing clothes, flooring the corn and weaving basket or cloth. They are sung either to relieve the tedium and the monotony of work or purely for the sake of entertainment. The subject could be parental love for their children, the sorrows of a childless woman, the suffering of a married woman under her mother in law, a young man forbidding his mother after being married, pure love songs, the agony of separation; there are endless subjects on which we find a folk song for each occasion.</span></li></ol><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">&nbsp;</span></p><ol data-dcnode-id="1038" start="2"><li data-dcnode-id="1039"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Ballads</span></strong><span data-dcnode-id="1040" instrument_node="">sung in commemoration of some heroic deeds by the legendary men and women; these are basically narrative in their form. Very often these songs are related to deities or mythological figures. Particular communities such as Goravas, Gollas Koravanjis have accustomed their own different styles of folk songs. There are songs of sacrifices made by the common people or even heroes to protect and safeguard the community from natural calamities, wild animals or even some evil forces.</span></li></ol><p data-dcnode-id="1036"><img alt=" Folk Songs of Karnataka" class="alignright wp-image-5783 size-medium" data-dcnode-id="1037" height="180" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//karnataka.pscnotes.com/wp-content/uploads/2017/10/PWDMwFaL80LeZg1sF6kU6CJnG0Gl6GSw0ZwayCkTrB4xQH7waxUEvfaZ4wYV8KKndQh900-300x180.png&amp;raw" srcset="https://karnataka.pscnotes.com/wp-content/uploads/2017/10/PWDMwFaL80LeZg1sF6kU6CJnG0Gl6GSw0ZwayCkTrB4xQH7waxUEvfaZ4wYV8KKndQh900-300x180.png 300w, https://karnataka.pscnotes.com/wp-content/uploads/2017/10/PWDMwFaL80LeZg1sF6kU6CJnG0Gl6GSw0ZwayCkTrB4xQH7waxUEvfaZ4wYV8KKndQh900-768x461.png 768w, https://karnataka.pscnotes.com/wp-content/uploads/2017/10/PWDMwFaL80LeZg1sF6kU6CJnG0Gl6GSw0ZwayCkTrB4xQH7waxUEvfaZ4wYV8KKndQh900-360x216.png 360w, https://karnataka.pscnotes.com/wp-content/uploads/2017/10/PWDMwFaL80LeZg1sF6kU6CJnG0Gl6GSw0ZwayCkTrB4xQH7waxUEvfaZ4wYV8KKndQh900.png 800w" width="300"></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">It can be further classified into 12 tradition, namely-</span></p><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">1.devara guddas, 2.neelagaras, 3.ganeplayers, 4.gorvas, 5.choudikeyavaru &nbsp;&nbsp;6.aradigalu 7.karapaladavaru, 8.tamburiyavaru 9.kinnara jogigalu 10. Dombidasaru 11.helavaru 12.telugu jangamaru</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Some of the popular Ballads are:</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Gunasagari, &nbsp;sarajappa nayakana kathe, madakari nayaka, kiththuru chennamma, sangoli rayana, balanagamma, Malaya madeswra kavya, manteswami kavya, yallammana kavya, mailaralingana kavya.</span></p><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">&nbsp;</span></p><ol data-dcnode-id="1019" start="3"><li data-dcnode-id="1020"><strong data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Religious and philosophical songs</span></strong><span data-dcnode-id="1021" instrument_node="">such as the songs of Dasa sahithya popularized by Purandaradasa, Kanakadasa and Tatvapadas of Santa Shishunala Sharifa are both religious and have philosophical message for life. Though the originators in this case are &nbsp;well known the literature has managed to flow through the ages.</span></li></ol><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">&nbsp;</span></p><ol data-dcnode-id="1012" start="4"><li data-dcnode-id="1013"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Lullabies</span></strong><span data-dcnode-id="1014" instrument_node="">are the expressions of parental love and care for their young ones. They are sung to make a crying or an adamant baby to fall asleep soon.</span></li></ol><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Now a day, the tender and supple folk song culture is being suppressed under the heaviness of modern music and culture.</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">In Karnataka real attempt to collect folk-songs was made by the end of the 19 th century. In recent years, scholars such as&nbsp;</span><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">L.R.Hegde, M.M.Kalburgi, Aravinda Malagathi, Karim Khan</span></strong><span data-dcnode-id="1004" instrument_node="">&nbsp;and&nbsp;</span><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">H.L.Nagegowda</span></strong><span data-dcnode-id="1001" instrument_node="">&nbsp;have made considerable research work in the field of folk literature.</span></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">&nbsp;</span></p><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">&nbsp;</span></p><span data-dcnode-id="995" instrument_node=""> KPSC Notes brings Prelims and Mains programs for KPSC Prelims and KPSC Mains Exam preparation. Various Programs initiated by KPSC Notes are as follows:-</span><ul data-dcnode-id="982"><li data-dcnode-id="992"><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pscnotes.com/State-PCS-Exams/KPSC-Exam/KPSC-Mains-Tests-and-Notes-Program"><span data-dcnode-id="994" instrument_node="">KPSC Mains Tests and Notes Program 2022</span></a></li><li data-dcnode-id="989"><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pscnotes.com/KPSC-Exam/KPSC-Prelims-test-series-and-Notes-Program-2020-Updated-Notes-and-Tests"><span data-dcnode-id="991" instrument_node="">KPSC Prelims Exam 2022- Test Series and Notes Program 2022</span></a></li><li data-dcnode-id="986"><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pscnotes.com/State-PCS-Exams/KPSC-Exam/Kpsc-Prelims-and-Mains-Tests-Series-and-Notes-Program"><span data-dcnode-id="988" instrument_node="">KPSC Prelims and Mains Tests Series and Notes Program 2022</span></a></li><li data-dcnode-id="983"><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pscnotes.com/State-PCS-Exams/KPSC-Exam/Kpsc-Detailed-Complete-Prelims-Notes"><span data-dcnode-id="985" instrument_node="">KPSC Detailed Complete Prelims Notes 2022</span></a></li></ul><span data-dcnode-id="981" instrument_node=""> For any doubt, Just leave us a Chat or&nbsp;</span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pscnotes.com/index.php%3Froute%3Dinformation/con
