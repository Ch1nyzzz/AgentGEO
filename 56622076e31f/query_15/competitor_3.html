</span><h1 class="entry-title" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Karnataka Culture, Tradition, Festivals &amp; Arts of Karnataka</span></h1><span data-dcnode-id="1075" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1061"><span class="meta-date" data-dcnode-id="1071"><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/karnataka-culture-tradition-festivals/" rel="bookmark" title="1:35 pm"><time class="entry-date published updated" data-dcnode-id="1073" datetime="2021-06-21T13:35:24+05:30"><span data-dcnode-id="1074" instrument_node="">June 21, 2021</span></time></a></span><span class="meta-author" data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1067"><a class="url fn n" data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/author/gangavarapuswetha3gmail-com/" rel="author" title="View all posts by Swetha Prasanna Gangavarapu"><span data-dcnode-id="1069" instrument_node="">Swetha Prasanna Gangavarapu</span></a></span></span><span class="meta-category" data-dcnode-id="1062"><span data-dcnode-id="1065" instrument_node=""> </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/category/states-in-india/karnataka/" rel="category tag"><span data-dcnode-id="1064" instrument_node="">Karnataka</span></a></span></div><span data-dcnode-id="1060" instrument_node="">

</span></div><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">Karnataka is one of the </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_India" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1043" instrument_node="">South Indian</span></a><span data-dcnode-id="1041" instrument_node=""> states and a powerhouse of Indian culture. Be it in the field of Information Technology or the cultural landscape, the state scores high. Bengaluru, the capital city of Karnataka, is noted for housing software giants. The city also showcases the effervescent art and culture of the state in its picturesque representation.&nbsp;</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Karnataka is home to more than 50 Indian tribes such as Kannadigas, Tuluvas, Kodavas, Konkanis, Tibetans, and Buddhists. Each of these tribes has its art and cultural forms. The cross-cultural tradition of all the tribes enhances the beauty of Karnataka culture.&nbsp;</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Let us go on a spree to explore and enjoy the various vibrant aspects of Karnataka culture, tradition, festivals, and art forms.&nbsp;</span></p><span data-dcnode-id="1033" instrument_node="">

taka"><span data-dcnode-id="958" instrument_node="">Literature &amp; Culture of Karnataka</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="953"><a class="ez-toc-link ez-toc-heading-23" data-dcnode-id="954" href="#Paintings" title="Paintings"><span data-dcnode-id="955" instrument_node="">Paintings</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="950"><a class="ez-toc-link ez-toc-heading-24" data-dcnode-id="951" href="#Karnataka_or_Mysore_Silk_Sarees" title="Karnataka or Mysore Silk Sarees"><span data-dcnode-id="952" instrument_node="">Karnataka or Mysore Silk Sarees</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="947"><a class="ez-toc-link ez-toc-heading-25" data-dcnode-id="948" href="#Conclusion" title="Conclusion"><span data-dcnode-id="949" instrument_node="">Conclusion</span></a></li></ul></nav></div><span data-dcnode-id="943" instrument_node="">
</span><h2 data-dcnode-id="939"><span class="ez-toc-section" data-dcnode-id="942" id="Karnataka_Rajyotsava_Day"></span><span data-dcnode-id="941" instrument_node="">Karnataka Rajyotsava Day&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="940"></span></h2><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Karnataka Rajyotsava is celebrated all over Karnataka with lots of pomp and show. The main attraction of this Utsav is the Rajyotsava Awards distribution honoring the prominent figures who have contributed to the development of Karnataka State.&nbsp;</span></p><span data-dcnode-id="935" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="928"><figure class="aligncenter size-large" data-dcnode-id="929"><img alt="Karnataka State Flag" class="wp-image-3750 lazyloaded" data-dcnode-id="934" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag.png" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag.png 680w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-300x200.png 300w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-120x80.png 120w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-360x240.png 360w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-600x400.png 600w" height="454" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag.png&amp;raw" srcset="https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag.png 680w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-300x200.png 300w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-120x80.png 120w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-360x240.png 360w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-600x400.png 600w" width="680"><noscript data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">&lt;img width="680" height="454" src="https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag.png" alt="Karnataka State Flag" class="wp-image-3750" srcset="https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag.png 680w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-300x200.png 300w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-120x80.png 120w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-360x240.png 360w, https://avanigo.com/wp-content/uploads/2021/06/Karnataka-Flag-600x400.png 600w" sizes="(max-width: 680px) 100vw, 680px" /&gt;</span></noscript><figcaption data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Karnataka State Flag</span></figcaption></figure></div><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">The Karnataka Rajya Utsav Day is celebrated on November 1 every year. This day marks the Karnataka state formation day when various Kannada-speaking regions merged to form the state. It was the day in 1956 when the state Karnataka came into existence. This day is observed as a state govt. holiday by hoisting the Kannada flag in many places across Karnataka and singing the Kannada Anthem.&nbsp;</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Tourists can witness Karnataka culture at its best on this day.&nbsp;The celebrations begin with a prayer to Goddess Bhubaneswari, followed by cultural art, drama, dance, drama, and Carnatic Music. It becomes a memory for all whether Kannads or non-Kannada. The specially organized colorful dance forms, drama, theatre groups, music, traditional festivals typical to Karnataka state, wood and ivory carvings, and the sumptuous cuisines of Karnataka offer a vivid view of Karnata culture.&nbsp;</span></p><span data-dcnode-id="921" instrument_node="">
</span><h2 data-dcnode-id="917"><span class="ez-toc-section" data-dcnode-id="920" id="Carnatic_Music"></span><span data-dcnode-id="919" instrument_node="">Carnatic Music</span><span class="ez-toc-section-end" data-dcnode-id="918"></span></h2><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Carnatic Music is a distinct aspect that imparts richness to Karnataka culture. It has its roots in ancient Vedic times. Over time, it has improved and mostly is in the form of song composition. It reflects the cross-tradition and 108 complex taals (system of rhythm) of the world.&nbsp;</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Carnatic classical music is unique on its own and has its origins in gamakas. At present, there are 15 different types of gamakas. The lyrics of the songs are based on devotion which carries a deep sense of spirituality.&nbsp;</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Carnatic Music is performed by a band of Musicians consisting of one principal performer(vocalist), a melodic accompaniment (Violin), and a rhythmic partner (Mridangam). Carnatic Music uses few instruments for music and it is noted for the unique hand gestures, footwork, and facial expressions.</span></p><span data-dcnode-id="907" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="900"><figure class="aligncenter size-large" data-dcnode-id="901"><img alt="Legendary Carnatic Musician Mangalampalli Bala Murali Krishna" class="wp-image-3751 lazyloaded" data-dcnode-id="906" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna.jpg 1024w, https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna-300x225.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna-768x576.jpg 768w" height="768" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna.jpg&amp;raw" srcset="https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna.jpg 1024w, https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna-300x225.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna-768x576.jpg 768w" width="1024"><noscript data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">&lt;img width="1024" height="768" src="https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna.jpg" alt="Legendary Carnatic Musician Mangalampalli Bala Murali Krishna" class="wp-image-3751" srcset="https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna.jpg 1024w, https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna-300x225.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Legendary-Carnatic-Musician-Mangalampalli-Bala-Murali-Krishna-768x576.jpg 768w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Legendary Carnatic Musician Mangalampalli Bala Murali Krishna</span></figcaption></figure></div><span data-dcnode-id="899" instrument_node="">
</span><h2 data-dcnode-id="895"><span class="ez-toc-section" data-dcnode-id="898" id="Hindustani_Music"></span><span data-dcnode-id="897" instrument_node="">Hindustani Music</span><span class="ez-toc-section-end" data-dcnode-id="896"></span></h2><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Both Carnatic Music and Hindustani Music are different from each other. But in Karnataka, both forms of music have made a place and are highly appreciated. Karnataka has respected Hindustani Music along with Carnatic Music. Hindustani Music in Karnataka has earned many awards for Karnataka musicians. Kalidas Sanman, Padma Bhushan, and Padma Vibhushan Awards are few among those. It is primarily vocal-centric.</span></p><span data-dcnode-id="891" instrument_node="">
</span><h2 data-dcnode-id="887"><span class="ez-toc-section" data-dcnode-id="890" id="Karnataka_Dance_forms"></span><span data-dcnode-id="889" instrument_node="">Karnataka Dance forms</span><span class="ez-toc-section-end" data-dcnode-id="888"></span></h2><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">India is a home for many classical dances. The share of Karnataka culture in this is prominent.</span></p><span data-dcnode-id="883" instrument_node="">
</span><h3 data-dcnode-id="879"><span class="ez-toc-section" data-dcnode-id="882" id="Yakshagana_dance_form"></span><span data-dcnode-id="881" instrument_node="">Yakshagana dance form</span><span class="ez-toc-section-end" data-dcnode-id="880"></span></h3><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="874"><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/all-that-you-need-to-know-about-kuchipudi-and-bharatanatyam/"><span data-dcnode-id="877" instrument_node="">Kuchipudi</span></a><span data-dcnode-id="875" instrument_node=""> is one of the classical dance forms of India. It had its origin in the state of Andhra Pradesh and is widely appreciated in Karnataka. Besides, Kuchipudi people here also prefer the other popular dance forms of southern India like Bharatnatyam. Folk Dances are the favorite among the natives. They are a beautiful depiction of music, dance, and drama and can captivate the audience. One such famous folk-dance form of Karnataka is Yakshagana. It is a lovely narration of holy mythological text forms in the form of dance drama.&nbsp;</span></p><span data-dcnode-id="873" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="866"><figure class="aligncenter size-large" data-dcnode-id="867"><img alt="Yakshagana Dance Form of Karnataka" class="wp-image-3753 lazyloaded" data-dcnode-id="872" data-sizes="(max-width: 640px) 100vw, 640px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka.jpg 640w, https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka-300x225.jpg 300w" height="480" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka.jpg&amp;raw" srcset="https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka.jpg 640w, https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka-300x225.jpg 300w" width="640"><noscript data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">&lt;img width="640" height="480" src="https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka.jpg" alt="Yakshagana Dance Form of Karnataka" class="wp-image-3753" srcset="https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka.jpg 640w, https://avanigo.com/wp-content/uploads/2021/06/Yakshagana-Dance-Form-of-Karnataka-300x225.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" /&gt;</span></noscript><figcaption data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Yakshagana Dance Form of Karnataka</span></figcaption></figure></div><span data-dcnode-id="865" instrument_node="">
</span><h3 data-dcnode-id="860"><span class="ez-toc-section" data-dcnode-id="864" id="Dollu_Kunitha_Dance_form_in_Progression"></span><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Dollu Kunitha Dance form in Progression</span></strong><span class="ez-toc-section-end" data-dcnode-id="861"></span></h3><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Dollu Kunitha – a traditional dance form with music and the charm of this dance form is the coordination and sequence of dancers matching their dance with the drumbeat and Kamsale is one vibrant dance form of Karnataka. This dance form is based on the rituals of praying to lord Shiva. They have a unique way of portrayal that relies on the skillful use of hands.&nbsp;</span></p><span data-dcnode-id="856" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="849"><figure class="aligncenter size-large" data-dcnode-id="850"><img alt="Dollu Kunitha" class="wp-image-3756 lazyloaded" data-dcnode-id="855" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-300x200.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-768x512.jpg 768w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-120x80.jpg 120w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-360x240.jpg 360w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-600x400.jpg 600w" height="533" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha.jpg&amp;raw" srcset="https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-300x200.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-768x512.jpg 768w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-120x80.jpg 120w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-360x240.jpg 360w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-600x400.jpg 600w" width="800"><noscript data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">&lt;img width="800" height="533" src="https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha.jpg" alt="Dollu Kunitha" class="wp-image-3756" srcset="https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-300x200.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-768x512.jpg 768w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-120x80.jpg 120w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-360x240.jpg 360w, https://avanigo.com/wp-content/uploads/2021/06/Dollu-Kunitha-600x400.jpg 600w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Dollu Kunitha</span></figcaption></figure></div><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">There are other popular folk dances of Karnataka like Gaarudi Gambe, Nagamandala, Togalu Bombaata.&nbsp;</span></p><span data-dcnode-id="845" instrument_node="">
</span><ul data-dcnode-id="842"><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">In Gaarudi Gombe, the attraction lies in the fact the dancers wear a dress made out of bamboo sticks. Nagamandala dance form is a religious dance form to control the serpent in an individual and is a night-long affair.&nbsp;</span></li></ul><span data-dcnode-id="841" instrument_node="">
</span><ul data-dcnode-id="838"><li data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Togalu Bombaata is a puppetry dance form using shadows. Besides these, there are other folk dance forms in Karnataka like Goravara Kunita, Joodu Haligi, Krishna Parijatha, veeragase, Veerabhadra Khunita, Komb-aat, Pata Kunitha, Bolak-aat Dance Unmat-aat, Somana Kunitha, Puja Kunitha, Kangadilo Kunitha, Bhuta Kola, Aati Kalanja, Bhootha Aradhana.&nbsp;</span></li></ul><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">These folk dances have their origin in religious beliefs and are performed with great fervor during fairs and festivals across various places in Karnataka.</span></p><span data-dcnode-id="834" instrument_node="">
</span><h2 data-dcnode-id="830"><span class="ez-toc-section" data-dcnode-id="833" id="Wood_carvings"></span><span data-dcnode-id="832" instrument_node="">Wood carvings</span><span class="ez-toc-section-end" data-dcnode-id="831"></span></h2><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Mallikarjuna Group of Temples in Badami, Karnataka with its exquisite wooden carving</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Wood carving is a traditional art form of Karnataka culture. The most famous among all is the sandalwood carving of Mysore. This art form shows the exquisite skills of the craftsmen in bringing out the best of a masterpiece carved out of a single log of wood. The wood carving art form of Karnataka had its beginning in the temple areas for making chariots, pillar works, and other requisites.&nbsp;</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">At present, this wood carving industry is a full-fledged one, catering to interior décor, temples, and many others. Nowadays, metal images are used in wood carving to depict the main deity. Udupi – a place in Karnataka, is the main center of origin of wood carving and engraving.</span></p><span data-dcnode-id="820" instrument_node="">
</span><h2 data-dcnode-id="816"><span class="ez-toc-section" data-dcnode-id="819" id="Wooden_Toys"></span><span data-dcnode-id="818" instrument_node="">Wooden Toys</span><span class="ez-toc-section-end" data-dcnode-id="817"></span></h2><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Wood carving in the form of wooden toys is the most famous wooden artifact of Karnataka culture. Channapatna Toys are an exclusive kind of wooden toys or dolls unique to the state of Karnataka. These wooden toys making craftwork are safeguarded as GI (Geographical Indications) under World Trade Organizations by the Karnataka state government.&nbsp;</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Channapatna town in Ramanagara district is famously known as Land of Toys. Wooden toys of Kinhal, a small town in the Raichur district of Karnataka, and wooden toys of Gokak – a small town in Belgaum district are also famous destinations for purchasing wooden toys.&nbsp;</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Wooden toys of Kinhal are unique due to the exquisite carvings on the wood and toys of birds, animals, and figures whereas Gokak wooden toys are famous for the representation of fruits and vegetables on wood. With their various unique combinations of colors, the toys appear lively and appealing and hence are world-famous.</span></p><span data-dcnode-id="806" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="799"><figure class="aligncenter size-large" data-dcnode-id="800"><img alt="Channapatna toys" class="wp-image-3760 lazyload" data-dcnode-id="805" data-sizes="(max-width: 401px) 100vw, 401px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Channapatna-toys.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Channapatna-toys.jpg 401w, https://avanigo.com/wp-content/uploads/2021/06/Channapatna-toys-201x300.jpg 201w" height="599" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="401"><noscript data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">&lt;img width="401" height="599" src="https://avanigo.com/wp-content/uploads/2021/06/Channapatna-toys.jpg" alt="Channapatna toys" class="wp-image-3760" srcset="https://avanigo.com/wp-content/uploads/2021/06/Channapatna-toys.jpg 401w, https://avanigo.com/wp-content/uploads/2021/06/Channapatna-toys-201x300.jpg 201w" sizes="(max-width: 401px) 100vw, 401px" /&gt;</span></noscript><figcaption data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Channapatna toys</span></figcaption></figure></div><span data-dcnode-id="798" instrument_node="">
</span><h2 data-dcnode-id="794"><span class="ez-toc-section" data-dcnode-id="797" id="Ivory_Carving"></span><span data-dcnode-id="796" instrument_node="">Ivory Carving</span><span class="ez-toc-section-end" data-dcnode-id="795"></span></h2><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Karnataka is one of the states of South India where elephants thrive in large numbers. The state is also known as the “Land of Elephants”. Thus, ivory carvings are one of the distinct features of Karnataka culture. So, with the availability of tuskers, ivory as a raw material is easily accessible.&nbsp;</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Ivory Carving is the traditional art form of Karnataka practiced since time immemorial. This art form is one of its kind and unique to the state and scores over all other art forms of India. The craftspersons are so proficient in their craft that they always can be seen prepared with their chisel, knives, and files to shape out such lively pieces of ivory craft. Its artistic beauty brings the world to witness the rich art form of India and Karnataka in specific.</span></p><span data-dcnode-id="787" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="780"><figure class="aligncenter size-large" data-dcnode-id="781"><img alt="Dashavatar Carving on Ivory" class="wp-image-3761 lazyload" data-dcnode-id="786" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-300x200.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-768x512.jpg 768w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-120x80.jpg 120w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-360x240.jpg 360w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-600x400.jpg 600w" height="533" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="800"><noscript data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">&lt;img width="800" height="533" src="https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory.jpg" alt="Dashavatar Carving on Ivory" class="wp-image-3761" srcset="https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-300x200.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-768x512.jpg 768w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-120x80.jpg 120w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-360x240.jpg 360w, https://avanigo.com/wp-content/uploads/2021/06/Dashavatar-Carving-on-Ivory-600x400.jpg 600w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Dashavatar Carving on Ivory</span></figcaption></figure></div><span data-dcnode-id="779" instrument_node="">
</span><h2 data-dcnode-id="775"><span class="ez-toc-section" data-dcnode-id="778" id="Karnataka_Theatre_culture"></span><span data-dcnode-id="777" instrument_node="">Karnataka Theatre culture</span><span class="ez-toc-section-end" data-dcnode-id="776"></span></h2><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The theatre is a traditional aspect of Karnataka culture and is practiced mostly by Kannadigas – the natives of Karnataka speaking the Kannada language. Rangabhoomi is a name attributed to the Carnatic Theatre. Natakas are performed depicting verses from mythology, Puranas, and Holy Literatures. During festive occasions of Dussehra, Maha Shivratri, experts narrate mythic incidents as a song for the devotees and the public.</span></p><span data-dcnode-id="771" instrument_node="">
</span><h2 data-dcnode-id="767"><span class="ez-toc-section" data-dcnode-id="770" id="Puppet-Theatre_Tradition"></span><span data-dcnode-id="769" instrument_node="">Puppet-Theatre Tradition</span><span class="ez-toc-section-end" data-dcnode-id="768"></span></h2><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">The puppet show was once a great entertainer for Indians. In Karnataka culture, Puppet -Theatre can be traced back from 12-16 Century A.D.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">In earlier days, there were 4 kinds of Puppets: String, Rod, Glove, and Leather Puppet. Karnataka has all four kinds. The string puppet show with its unique costumes, dancing style, and background music has a clear resemblance with the Yakshagana dance form.</span></p><span data-dcnode-id="760" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="753"><figure class="aligncenter size-large" data-dcnode-id="754"><img alt="Shadow puppets of Karnataka" class="wp-image-3763 lazyload" data-dcnode-id="759" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka.jpg 600w, https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka-300x300.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka-150x150.jpg 150w" height="600" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="600"><noscript data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">&lt;img width="600" height="600" src="https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka.jpg" alt="Shadow puppets of Karnataka" class="wp-image-3763" srcset="https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka.jpg 600w, https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka-300x300.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Shadow-puppets-of-Karnataka-150x150.jpg 150w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><figcaption data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Shadow puppets of Karnataka</span></figcaption></figure></div><span data-dcnode-id="752" instrument_node="">
</span><h2 data-dcnode-id="747"><span class="ez-toc-section" data-dcnode-id="751" id="Ugadi_Celebrations"></span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//avanigo.com/the-science-and-story-behind-why-we-celebrate-ugadi/"><span data-dcnode-id="750" instrument_node="">Ugadi&nbsp;Celebrations</span></a><span class="ez-toc-section-end" data-dcnode-id="748"></span></h2><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">The word Yugadi is derived from Sanskrit words “Yug” &amp; “Adi”. Yug refers to the era and Adi means the beginning. Yugadi is celebrated in high spirit in the southern states of India that comprise Tamil Nadu, Kerala, Karnataka, Andhra Pradesh, Telangana, and Puducherry.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Ugadi festival is celebrated to mark the beginning of the new year. And Karnataka new year falls on the first day of Hindu Chaitra Month. Ugadi Pachadi is the main dish prepared and served on Ugadi. Yugadi Krit or creator of Yugadi has been conferred on Lord Vishnu as mentioned in the Sahasranama Stotram and is believed to be the reason behind the Yugadi celebration.&nbsp;</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Kannada people decorate their house with Mango leaves known as Torana or Toranalu and draw colorful designs known as rangoli or muggulu in front of their entrance. “Panchangam” is read out by the eldest member of the family or the village priest on this day.</span></p><span data-dcnode-id="737" instrument_node="">
</span><h2 data-dcnode-id="733"><span class="ez-toc-section" data-dcnode-id="736" id="Coorg_Festival"></span><span data-dcnode-id="735" instrument_node="">Coorg Festival</span><span class="ez-toc-section-end" data-dcnode-id="734"></span></h2><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Coorg is one of the prominent districts of the state of Karnataka. In recent days, it has gained popularity as a hill station and is one of the hot tourist attractions.&nbsp;</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Before the Indian Independence, the Britishers found the culture of Coorg very enticing. After Coorg was a separate Dominion of India, it came to be known as Kodagu. People of Coorg mostly live in villages. Families are an important and integral part of their existence. Their cultural life is a bit different from other Kannadas and is very unique. Their style of wearing saree – Kodagu saree style is also one of the famous saree styles of India.&nbsp;</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Because of its uniqueness, Britishers fondly nicknamed Kodagu as “Scotland of India”. Later it was merged with Mysore Province and eventually became a part of Karnataka state. People of Coorg celebrate various Hindu festivals. But some are the specialty of Coorg that show the rich culture of one of the tribes of Kannad people.The main festivals of Coorg are Kaveri Sankaramana, Kailpodh and Puttari.&nbsp;</span></p><span data-dcnode-id="723" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="716"><figure class="aligncenter size-large" data-dcnode-id="717"><img alt="Coorg Tea Estates" class="wp-image-3765 lazyload" data-dcnode-id="722" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates-300x169.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates-768x432.jpg 768w" height="450" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="800"><noscript data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">&lt;img width="800" height="450" src="https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates.jpg" alt="Coorg Tea Estates" class="wp-image-3765" srcset="https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates-300x169.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Coorg-Tea-Estates-768x432.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Coorg Tea Estates</span></figcaption></figure></div><span data-dcnode-id="715" instrument_node="">
</span><h2 data-dcnode-id="711"><span class="ez-toc-section" data-dcnode-id="714" id="Kaveri_Sankramana"></span><span data-dcnode-id="713" instrument_node="">Kaveri Sankramana&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="712"></span></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Kaveri Sankramana is a festival celebrated with a feast. People believe that every year Kaveri water rises during this time of year. People celebrate Kaveri Sankramana with great fervor to rejoice at the renewal of the river water of Kaveri. Interestingly, it is the only festival where only veg cuisines are prepared and served.</span></p><span data-dcnode-id="707" instrument_node="">
</span><h2 data-dcnode-id="703"><span class="ez-toc-section" data-dcnode-id="706" id="Kailpodh"></span><span data-dcnode-id="705" instrument_node="">Kailpodh&nbsp;</span><span class="ez-toc-section-end" data-dcnode-id="704"></span></h2><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Kailpodh is a festival celebrated to mark the closing of agricultural work for the year. People eat, sing and dance together at this celebration. They even play games and indulge in various kinds of sports especially and enjoy the festival.</span></p><span data-dcnode-id="699" instrument_node="">
</span><h2 data-dcnode-id="695"><span class="ez-toc-section" data-dcnode-id="698" id="Pudhari"></span><span data-dcnode-id="697" instrument_node="">Pudhari</span><span class="ez-toc-section-end" data-dcnode-id="696"></span></h2><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">The harvesting festival of Coorg is celebrated as Pudhari. This is a way to appease the deity and show their gratitude. People thank God for the plentiful harvest for the year and seek blessings for the coming year.</span></p><span data-dcnode-id="691" instrument_node="">
</span><h2 data-dcnode-id="687"><span class="ez-toc-section" data-dcnode-id="690" id="Kambala_or_Buffalo_race"></span><span data-dcnode-id="689" instrument_node="">Kambala or Buffalo race</span><span class="ez-toc-section-end" data-dcnode-id="688"></span></h2><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Kambala or Buffalo race is an age-old tradition of Karnataka culture followed for the last 400 years in various parts of coastal Karnataka. In this race, decorated buffaloes are made to race on the wet paddy field guided by a competitive farmer who keeps balancing on the top of a wooden plank. This race sets a spectacular countryside atmosphere which astounds the onlookers and is quite a tourist attraction. The farmers of Kambala feed their buffaloes well, train, and prepare them for the race. This race is held to mark the beginning of harvest season and is a way to thank GOD for protecting their crops throughout the season from the animals.</span></p><span data-dcnode-id="683" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="676"><figure class="aligncenter size-large" data-dcnode-id="677"><img alt="Buffalo Race" class="wp-image-3767 lazyload" data-dcnode-id="682" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race-300x225.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race-768x576.jpg 768w" height="600" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="800"><noscript data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">&lt;img width="800" height="600" src="https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race.jpg" alt="Buffalo Race" class="wp-image-3767" srcset="https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race-300x225.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Buffalo-Race-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Buffalo Race</span></figcaption></figure></div><span data-dcnode-id="675" instrument_node="">
</span><h2 data-dcnode-id="671"><span class="ez-toc-section" data-dcnode-id="674" id="Hoysala_Mahotsava"></span><span data-dcnode-id="673" instrument_node="">Hoysala Mahotsava</span><span class="ez-toc-section-end" data-dcnode-id="672"></span></h2><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Another major attraction of Karnataka culture is Hoysala Maha Utsav organized in Halebidu and Belur of Karnataka. People from all over the world come to see this Maha Utsav. It is celebrated in a royal manner reflecting the rich Indian culture and tradition. Hoysala Mahotsav is held every year in March/April with grandeur combinations of Dance, Music, and Art.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Hoysala Mahotsava marks the beginning of the new season. This festival is held to celebrate the military achievement of the Hoysala King.</span></p><span data-dcnode-id="664" instrument_node="">
</span><h2 data-dcnode-id="660"><span class="ez-toc-section" data-dcnode-id="663" id="Hampi_Festival"></span><span data-dcnode-id="662" instrument_node="">Hampi Festival</span><span class="ez-toc-section-end" data-dcnode-id="661"></span></h2><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Hampi is a historic place in east Karnataka. It holds special significance in Karnataka culture. It has earned a place among the world heritage sites and is one of the greatest international tourist attractions of Karnataka.&nbsp;</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Hampi Festival is a 3-day grandeur celebrated with high festive fervor at Virupaksha Temple. Music, Dance, Puppet, firework are some of the elements of the exquisite festivities.&nbsp;</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Hampi Utsav is also known as Vijaya Utsav and is celebrated from the time when Hampi used to be Vijayanagar. The Karnataka government has reclaimed it as “Nada Utsava”. It showcases the rich and cultural heritage of the state.</span></p><span data-dcnode-id="650" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="643"><figure class="aligncenter size-large" data-dcnode-id="644"><img alt="Hampi Festival" class="wp-image-3774 lazyload" data-dcnode-id="649" data-sizes="(max-width: 975px) 100vw, 975px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival.jpg 975w, https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival-300x181.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival-768x462.jpg 768w" height="587" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="975"><noscript data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">&lt;img width="975" height="587" src="https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival.jpg" alt="Hampi Festival" class="wp-image-3774" srcset="https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival.jpg 975w, https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival-300x181.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Hampi-Festival-768x462.jpg 768w" sizes="(max-width: 975px) 100vw, 975px" /&gt;</span></noscript><figcaption data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Hampi Festival</span></figcaption></figure></div><span data-dcnode-id="642" instrument_node="">
</span><h2 data-dcnode-id="638"><span class="ez-toc-section" data-dcnode-id="641" id="Vairamudi_Festival"></span><span data-dcnode-id="640" instrument_node="">Vairamudi Festival</span><span class="ez-toc-section-end" data-dcnode-id="639"></span></h2><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Vairamudi implies the diamond-studded crown is the main attraction during the Vairamudi Festival. It is celebrated on the fourth day of Brahmotsav in the temple of Cheluvanarayana of Melkote. Melkote is a holy town some 4000 years old and has many ancient temples especially that of the Vaishnava sect. The procession of Lord Cheluvanarayana through the lanes of Melkote is the main ritual followed religiously every year.</span></p><span data-dcnode-id="634" instrument_node="">
</span><h2 data-dcnode-id="630"><span class="ez-toc-section" data-dcnode-id="633" id="Cuisines_of_Karnataka"></span><span data-dcnode-id="632" instrument_node="">Cuisines of Karnataka</span><span class="ez-toc-section-end" data-dcnode-id="631"></span></h2><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Karnataka state has a variety of cuisines and street food. Right from Mysore Masala Dosa which can be a wholesome meal to sweet dish Mysore Park, food is an integral part of Karnataka culture.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">The world-famous signature beverage of Karnataka is Filter Coffee. Chow-chow Bath is again a unique combination to satisfy both the spicy and sweet tooth of a person. Bisi-bele-bath is one staple food of Karnataka which is simple yet nutritious. Most of the South Indian dishes are incomplete without serving Rasam. Udupi‘s Tomato Rasam has quite a tangy taste and serves as a great appetizer. There are even more special dishes of Karnataka which are spicy, tasty, and can satiate your appetite.</span></p><span data-dcnode-id="623" instrument_node="">
</span><h2 data-dcnode-id="619"><span class="ez-toc-section" data-dcnode-id="622" id="Literature_Culture_of_Karnataka"></span><span data-dcnode-id="621" instrument_node="">Literature &amp; Culture of Karnataka</span><span class="ez-toc-section-end" data-dcnode-id="620"></span></h2><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Dharwad is considered the cultural capital of Karnataka. Temples, Mutts, and Agraharas are the main contributors to the growth of education in Karnataka. They are the birthplaces of Karnataka culture and led to the development of Karnataka literature and folk art.&nbsp;</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Dharwad is the place in Karnataka which has grown as the major center of Hindustani Music. Through literature and theatre artwork Kannada people grew stronger as a community. Being influenced by Sanskrit during its origin, the Kannada language is now known as the cultural language of India besides being one of the official languages of India.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h2 data-dcnode-id="608"><span class="ez-toc-section" data-dcnode-id="611" id="Paintings"></span><span data-dcnode-id="610" instrument_node="">Paintings</span><span class="ez-toc-section-end" data-dcnode-id="609"></span></h2><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">The paintings of Karnataka have witnessed developments across many years. It is famous for its intricate designs and fine work. They hold special significance in Karnataka culture and have been acclaimed over the decades.&nbsp;</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The Mural Art form of Karnataka is world-renowned. We can witness these Karnataka paintings in the Ellora caves and Lepakshi Temple built during Vijayanagara days in Karnataka. Chitrakathi Paintings are another form of Karnataka paintings. They are known for the boldness they depict in the black background. One such famous painting of Karnataka is the Mysore Painting developed by Mysore rulers, depicting Hindu God and Goddess in multicolor and sophisticated imprints.</span></p><span data-dcnode-id="601" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="594"><figure class="aligncenter size-large" data-dcnode-id="595"><img alt="Mural art of Karnataka" class="wp-image-3770 lazyload" data-dcnode-id="600" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka.jpg" data-srcset="https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-300x200.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-768x512.jpg 768w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-120x80.jpg 120w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-360x240.jpg 360w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-600x400.jpg 600w" height="533" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="800"><noscript data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">&lt;img width="800" height="533" src="https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka.jpg" alt="Mural art of Karnataka" class="wp-image-3770" srcset="https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka.jpg 800w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-300x200.jpg 300w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-768x512.jpg 768w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-120x80.jpg 120w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-360x240.jpg 360w, https://avanigo.com/wp-content/uploads/2021/06/Mural-art-of-Karnataka-600x400.jpg 600w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><figcaption data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Mural art of Karnataka</span></figcaption></figure></div><span data-dcnode-id="593" instrument_node="">
</span><h2 data-dcnode-id="589"><span class="ez-toc-section" data-dcnode-id="592" id="Karnataka_or_Mysore_Silk_Sarees"></span><span data-dcnode-id="591" instrument_node="">Karnataka or Mysore Silk Sarees</span><span class="ez-toc-section-end" data-dcnode-id="590"></span></h2><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Mysore is sometimes known as the Land of silk and sandalwood. Karnataka is the largest producer of Mulberry in India and has earned a name in the Handloom Industry. Mysore Silk sarees are so famous the world over. They use pure 100% genuine silk and gold Zari and 65% of Silver and 0.65% of original Gold. The specialty of Mysore silk saree is that they are extremely lightweight. The golden Zari border enhances the look of the saree and adorns the wearer.</span></p><span data-dcnode-id="585" instrument_node="">
</span><h2 data-dcnode-id="581"><span class="ez-toc-section" data-dcnode-id="584" id="Conclusion"></span><span data-dcnode-id="583" instrument_node="">Conclusion</span><span class="ez-toc-section-end" data-dcnode-id="582"></span></h2><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Karnataka culture is thus a vibrant one comprising many beautiful aspects. The state contributes in a rich way in enhancing the diversity of the Indian culture.</span></p><span data-dcnode-id="577" instrument_node="">
