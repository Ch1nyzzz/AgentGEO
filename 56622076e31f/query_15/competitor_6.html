</span><h1 class="w-100 mb-20" data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node=""> 14 Festivals of Karnataka That You Must Plan Your Trip Around! </span></h1><span data-dcnode-id="2890" instrument_node="">
</span><img alt="" class="cover-image-raw lazy" data-dcnode-id="2889" data-original="https://www.holidify.com/blog/wp-content/uploads/2016/06/6714670609_1f7dd6463a_b.jpg" height="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw"><span data-dcnode-id="2888" instrument_node="">
</span><div class="article mb-30" data-dcnode-id="2185" id="lightgalleryFlexpage"><span data-dcnode-id="2887" instrument_node="">
                Karnataka has many places that make their way to the heritage of India according to UNESCO why not see some of its unique festivals as well? Here are 6 of our favourite </span><strong data-dcnode-id="2883"><span data-dcnode-id="2886" instrument_node="">festivals of </span><a data-dcnode-id="2884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/state/karnataka/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2885" instrument_node="">Karnataka</span></a></strong><span data-dcnode-id="2882" instrument_node="">, that you can plan your visit around!
</span><h2 data-dcnode-id="2880" style="text-align: justify;"><span data-dcnode-id="2881" instrument_node="">1. Ganesha Chaturthi - One of the Main Festivals of Karnataka</span></h2><span data-dcnode-id="2879" instrument_node="">
</span><p data-dcnode-id="2868" style="text-align: justify;"><span data-dcnode-id="2878" instrument_node="">This is one festival all of us know about. It is the day that we celebrate in devotion to</span><strong data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node=""> Lord Ganesha</span></strong><span data-dcnode-id="2875" instrument_node="">, son of Lord Shiva and Parvati. All of us know the story of how Lord Ganesha was created. The festival is celebrated over a period of 10 days, it begins on the 4th day of the waxing moon period(</span><strong data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Shukla Chaturthi</span></strong><span data-dcnode-id="2872" instrument_node="">) and ends on the 14th day of the waxing moon period(</span><strong data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">Anant Chaturdashi</span></strong><span data-dcnode-id="2869" instrument_node="">) in the month of August or September.</span></p><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2859" style="text-align: justify;"><span data-dcnode-id="2866" instrument_node="">In public places, clay idols of Lord Ganesha are placed in all the holy shrines and prayed upon while in the houses a small area of the house is cleaned and the idol is placed and prayed upon. The main sweet dish of this festival is the</span><strong data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node=""> Modak</span></strong><span data-dcnode-id="2863" instrument_node=""> which is a dumpling that is made from rice/wheat flour and stuffed with coconut, jaggery, dried fruits etc. Another sweet dish is </span><strong data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Karanji</span></strong><span data-dcnode-id="2860" instrument_node=""> which is also similar to the modak.</span></p><span data-dcnode-id="2858" instrument_node="">
</span><div data-dcnode-id="2856"><img alt="Modak_ Festivals of Karnataka" class="lazy" data-dcnode-id="2857" height="480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/02/2824955094_a021660168_z.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2855" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2850" style="text-align: center;"><span data-dcnode-id="2854" instrument_node="">Modak (</span><a data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/food-n-more/2824955094/in/photolist-5hY6vq-5hTJtM-NkQcE-qdgNwC-5iCCJj-8DmwCd-8DmwAd-8Diqzk-8Dmwvq-NkQcu-NB9c6-NkQcG-5iCzpw-4Bt4uB-YmJ8a-5hY7aS-NB9bP-93QMdz-fLPnwP-fUUPTD-fLPp32-fM6YhN-fLPnMX-fM6WSh-fM6WyU-fM6Wr7-fM6Wg9-fM6W7o-fLPmy8-fM6VSf-3fuCi4-5ETVBv-Afax2Q-5ETW18-77FwC-aVH8at-aVH7Rn-aVH4kP-9sBNqV-77FwE-5EuWyj-5EqDx8" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2853" instrument_node="">Source</span></a><span data-dcnode-id="2851" instrument_node="">)</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847" style="text-align: justify;"><span data-dcnode-id="2848" instrument_node="">This festival is very sacred to the Hindus. On this festival four main rituals are performed which are as follows:</span></p><span data-dcnode-id="2846" instrument_node="">
</span><p data-dcnode-id="2844" style="text-align: justify;"><span data-dcnode-id="2845" instrument_node="">Prana Pratishtha: It is when Lord Ganesha is asked to come inside the Murthi or idol</span></p><span data-dcnode-id="2843" instrument_node="">
</span><p data-dcnode-id="2839" style="text-align: justify;"><strong data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">Shodashopachara</span></strong><span data-dcnode-id="2840" instrument_node="">: It is the 16 ways to pay tribute to Lord Ganesha</span></p><span data-dcnode-id="2838" instrument_node="">
</span><p data-dcnode-id="2834" style="text-align: justify;"><strong data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Uttar Puja</span></strong><span data-dcnode-id="2835" instrument_node="">: It is the puja after which Lord Ganesha has entered the Murthi and can now be shifted</span></p><span data-dcnode-id="2833" instrument_node="">
</span><div data-dcnode-id="2831"><img alt="Ganpati Sthapana_Festivals of Karnataka" class="lazy" data-dcnode-id="2832" height="480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/01/hqdefault.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2830" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2825" style="text-align: center;"><span data-dcnode-id="2829" instrument_node="">The murthi of Ganesha is shifted in the houses and offered fruits and other sweets. (</span><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/zQ-Aw5MlehA/hqdefault.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2828" instrument_node="">Source</span></a><span data-dcnode-id="2826" instrument_node="">)</span></p><span data-dcnode-id="2824" instrument_node="">
</span><p data-dcnode-id="2820" style="text-align: justify;"><strong data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">Ganpati Visarjan</span></strong><span data-dcnode-id="2821" instrument_node=""> : This is when the murthi or idol of Lord Ganesha is immersed into the river body be it a lake, pond or the sea.</span></p><span data-dcnode-id="2819" instrument_node="">
</span><div data-dcnode-id="2817"><img alt="Ganpati Visarjan _Festivals of Karnataka" class="lazy" data-dcnode-id="2818" height="456" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/01/Ganesh-chaturthi-l.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2816" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2811" style="text-align: center;"><span data-dcnode-id="2815" instrument_node="">The statue is taken to the water body for Visarjan. (</span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/6/66/Ganesh-chaturthi-l.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2814" instrument_node="">Source</span></a><span data-dcnode-id="2812" instrument_node="">)</span></p><span data-dcnode-id="2810" instrument_node="">
</span><h2 data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">2.&nbsp;Ugadi</span></h2><span data-dcnode-id="2807" instrument_node="">
It is a popular festival in the Karnataka, Andhra, and Telangana regions which is celebrated with a lot of joy and fervour. According to the locals, this period is believed to be very auspicious especially for the ones making new beginnings. Ugadi is a portmanteau of the words - ‘Yuga’ (which means period or generation) and ‘Adi’ (which means beginnings) since it is believed that Lord Brahma created the universe on this day.</span><br data-dcnode-id="2806"><br data-dcnode-id="2805"><div data-dcnode-id="2507" id="packagesSection"><div data-dcnode-id="2508" id="packagesEnd"><span data-dcnode-id="2804" instrument_node="">

Families get together on this day to pray to the deities and have a feast. The houses are decorated with lots of flowers and fresh mango leaves. A significant event in temples and homes during the celebrations is the reading of Panchangam or the Hindu calendar bearing the list of events for the year. The speciality dishes prepared on this day include Bevu Bella, Holige, Hesaru Bele Payasa, and Mavinakayi Chitranna.</span><br data-dcnode-id="2494"><span data-dcnode-id="2493" instrument_node="">
</span><h2 data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">3. Hampi Festival</span></h2><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2477" style="text-align: justify;"><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/places/hampi/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2489" instrument_node="">Hampi</span></a><span data-dcnode-id="2487" instrument_node=""> festival which is also known as </span><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Vijaya Utsav</span></strong><span data-dcnode-id="2484" instrument_node=""> is a famous festival to celebrate</span><span data-dcnode-id="2479" style="color: #434343;"><span data-dcnode-id="2483" instrument_node="">&nbsp;the birthday of the ancient poet </span><strong data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Purandaradasa</span></strong><span data-dcnode-id="2480" instrument_node=""> who lived in Hampi and is normally celebrated in the month of either October or November over a period of 3 days. This festival&nbsp;</span></span><span data-dcnode-id="2478" instrument_node="">attracts people from all over the world.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><div data-dcnode-id="2474"><img alt="Hampi Festival_Festivals of Karnataka" class="lazy" data-dcnode-id="2475" height="290" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/02/Hampi-festival-2016.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2473" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2470" style="text-align: center;"><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//discoveringindia.net/hampi-festival-2016/" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2472" instrument_node="">Source</span></a></p><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2461" style="text-align: justify;"><span data-dcnode-id="2468" instrument_node="">In this festival, the </span><strong data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Kannadigas</span></strong><span data-dcnode-id="2465" instrument_node=""> show their talent in dance, art and music. There are also other activities like fireworks and puppet which is an eye-catcher for tourists everywhere. Not only that Hampi is a rich cultural place that is named as one of the heritage of India according to </span><strong data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">UNESCO</span></strong><span data-dcnode-id="2462" instrument_node=""> which gives it all the more tourism.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2458" style="text-align: justify;"><span data-dcnode-id="2459" instrument_node="">The Karnataka government celebrates this festival on a large scale due to its fame. Young local boys dress up as military from the golden era and line up in the lanes of Hampi.</span></p><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2452" style="text-align: justify;"><span data-dcnode-id="2456" instrument_node="">There is a concert of folk songs called</span><strong data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node=""> ‘Janapada Kala Vahini’</span></strong><span data-dcnode-id="2453" instrument_node=""> which is a very big attraction</span></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2447" style="text-align: justify;"><span data-dcnode-id="2450" instrument_node="">There is an elephant marth across the ruins of Hampi which is almost 15 km known as</span><strong data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node=""> ‘Jumbo Savari’.</span></strong></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444" style="text-align: justify;"><span data-dcnode-id="2445" instrument_node="">The monuments in the whole 15 km of the ruins of Hampi is lit up with lights giving it a mesmerising look that is truly a beauty in itself.</span></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441" style="color: #222222; text-align: justify;"><span data-dcnode-id="2442" instrument_node="">There are performances by both national and international stars. 2015 seen performances from Himesh Reshammiya, Mika Singh etc. Other than all these cultural activities there are water sports and games for kids and family, exhibitions, painting competitions etc.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><div data-dcnode-id="2438"><img alt="The beautiful Hampi Festival _Festivals of Karnataka" class="lazy" data-dcnode-id="2439" height="427" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/01/2prs4dk02iia.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2437" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2432" style="text-align: center;"><span data-dcnode-id="2436" instrument_node="">The beautiful Hampi Festival. (</span><a data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//townista.com/static/files/item/2prs4dk02iia.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2435" instrument_node="">Source</span></a><span data-dcnode-id="2433" instrument_node="">)</span></p><span data-dcnode-id="2431" instrument_node="">
</span><div data-dcnode-id="2429"><div class="article-adunit" data-dcnode-id="2430" id="dynamic-adunit-pos-0"></div></div><span data-dcnode-id="2428" instrument_node="">
</span><h2 data-dcnode-id="2426" style="text-align: justify;"><span data-dcnode-id="2427" instrument_node="">4. Gowri Festival</span></h2><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2421" style="text-align: justify;"><strong data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">This is a festival celebrated one day before Ganesh Chaturthi as a day to pay tribute to goddess Gowri, mother of Lord Ganesha. It is a day celebrated not only in Karnataka but throughout India</span></strong><span data-dcnode-id="2422" instrument_node=""> to praise the Goddess for her power to bestow strength and courage on the people. It is said that on this day the Goddess Gowri like any other wife comes to her parents home and the next day Lord Ganesha comes to take her back home.</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418" style="text-align: justify;"><span data-dcnode-id="2419" instrument_node="">On this day the ladies and females of the house have a clean bath and dress up in new clothes and do Sthapana of the Jalgauri which is the statue of Goddess Gowri in turmeric.The goddess is mounted on a plate and a puja is done which is supposed to be done with suchi (cleanliness) and devotion.</span></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">A bagina is prepared consisting of turmeric, kum kum, black bead and bangles, comb, small mirror, Bangalurucoconut, rice, dal etc. One bagina is offered to the Goddess Gauri.</span></p><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412" style="color: #252525; text-align: justify;"><span data-dcnode-id="2413" instrument_node="">The married woman’s family sends her a Gauri Habadda or a gift on this day it can even be money.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><div data-dcnode-id="2409"><img alt="Gowri Festival _Festivals of Karnataka" class="lazy" data-dcnode-id="2410" height="480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/02/41387288_512eeb6bcf_b.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2408" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2406" style="text-align: center;"><span data-dcnode-id="2407" instrument_node="">The installation of the idol of Goddess Parvati or Gowri.</span></p><span data-dcnode-id="2405" instrument_node="">
</span><h2 data-dcnode-id="2403" style="text-align: justify;"><span data-dcnode-id="2404" instrument_node="">5. Karaga</span></h2><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2394" style="text-align: justify;"><span data-dcnode-id="2401" instrument_node="">Performed on a full moon day the </span><strong data-dcnode-id="2396"><span data-dcnode-id="2400" instrument_node="">Karaga is a folk dance performed as a ritual dedicated to Draupadi. It is one of the oldest festivals performed in the </span><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/places/bangalore/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2399" instrument_node="">Bengaluru</span></a><span data-dcnode-id="2397" instrument_node="">.</span></strong><span data-dcnode-id="2395" instrument_node=""> It is led by the men because in the last part of Mahabharatha the demon Tripurasura was still alive and Draupadi took the form of a shakti goddess and created soldiers called Veerakumaras. After the war, the soldiers asked her to stay but she couldn’t, so she promised to come to visit them on the first full moon of the Hindu Calendar.</span></p><span data-dcnode-id="2393" instrument_node="">
</span><p data-dcnode-id="2388" style="text-align: justify;"><span data-dcnode-id="2392" instrument_node="">There is a Karaga carrier, dressed up as a woman carries the Karaga which is a pyramid covered in flowers and visits all the Veerakumaras in his temporary Devi State. </span><strong data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Nobody knows what is inside the Karaga, the carrier balances it very well</span></strong><span data-dcnode-id="2389" instrument_node=""> on his and is not to drop it or else will die as is believed. The Karaga returns to the temple the next day by dawn.</span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385" style="text-align: justify;"><span data-dcnode-id="2386" instrument_node="">The Karaga festival is a beautiful festival which sees the respect and loves the people have for Draupadi, the Shakti Devi.</span></p><span data-dcnode-id="2384" instrument_node="">
</span><div data-dcnode-id="2382"><img alt="Karaga Festival_Festivals of Karnataka" class="lazy" data-dcnode-id="2383" height="479" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/02/317px-Huvina_Karaga.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="317"></div><span data-dcnode-id="2381" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2376" style="text-align: center;"><span data-dcnode-id="2380" instrument_node="">The Karaga Carrier in the form of a woman (Draupadi). (</span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Huvina_Karaga.jpg/317px-Huvina_Karaga.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2379" instrument_node="">Source</span></a><span data-dcnode-id="2377" instrument_node="">)</span></p><span data-dcnode-id="2375" instrument_node="">
</span><h2 data-dcnode-id="2373" style="text-align: justify;"><span data-dcnode-id="2374" instrument_node="">6. Pattadakal Dance Festival</span></h2><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2368" style="text-align: justify;"><span data-dcnode-id="2371" instrument_node="">The </span><strong data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Pattadakal dance festival is&nbsp;organised every year on a very large scale by the Karnataka Government in the month of January to honour and celebration of all its famous temples.</span></strong></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2359" style="text-align: justify;"><span data-dcnode-id="2366" instrument_node="">The P</span><strong data-dcnode-id="2361"><span data-dcnode-id="2365" instrument_node="">attadakal village is situated 20 km from </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/places/badami/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2364" instrument_node="">Badami</span></a><span data-dcnode-id="2362" instrument_node=""> in Karnataka.</span></strong><span data-dcnode-id="2360" instrument_node=""> It is a world heritage centre and famously known for its many well-constructed temples as it was the second capital of the chalukya kings.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356" style="text-align: justify;"><span data-dcnode-id="2357" instrument_node="">Most of these temples at the Pattadakal village are devoted to Lord Shiva with beautiful structure and carvings on them. The largest of all the temples are Virupaksha and Mallikarjuna.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353" style="text-align: justify;"><span data-dcnode-id="2354" instrument_node="">This festival sees many different and beautiful dancers from not only Karnataka but the whole country. Another major attraction of the Pattadakal festival is the craft mela that is organised here like nowhere else.</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2347" style="text-align: justify;"><strong data-dcnode-id="2348"><span data-dcnode-id="2351" instrument_node="">Another famous dance festival of Karnataka is the ‘</span><span data-dcnode-id="2349" style="color: #000000;"><span data-dcnode-id="2350" instrument_node="">Hoysala Mahotsava’ in Belur-Halebid.</span></span></strong></p><span data-dcnode-id="2346" instrument_node="">
</span><div data-dcnode-id="2344"><img alt="Hoysala Mahotsava _Festivals of Karnataka" class="lazy" data-dcnode-id="2345" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/01/Koodiyattam_Framed_0012.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2343" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2341"><span data-dcnode-id="2342" instrument_node="">The Pattadakal dance festival sees dancers from all over the country. The above-shown dance is the Koodiyattam.</span></p><span data-dcnode-id="2340" instrument_node="">
</span><h2 data-dcnode-id="2338" style="text-align: justify;"><span data-dcnode-id="2339" instrument_node="">7. Mahamastakabhisheka (Shravanabelagola)</span></h2><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2333" style="text-align: justify;"><span data-dcnode-id="2336" instrument_node="">A very important Jain festival that is held every once in 12 years in the town of Shravanabelagola in Karnataka, India. The festival sees the anointing the&nbsp;</span><span data-dcnode-id="2334" style="color: #252525;"><span data-dcnode-id="2335" instrument_node="">17.3736 metres tall statue of Siddha Bahubali.</span></span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330" style="text-align: justify;"><span data-dcnode-id="2331" instrument_node="">As this festival begins, the devotees sprinkle blessed holy water on the people come to participate in the festival. Then, the statue is anointed or bathed with liquids such as milk, sugarcane juice, saffron paste, and powder of sandalwood, turmeric and vermilion.&nbsp;The Jain nuns climb up the Vindhyagiri hills to reach the enormous statue.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327" style="text-align: justify;"><span data-dcnode-id="2328" instrument_node="">Offerings made to the statue are petals, gold and silver coins, precious stones. In 2006, the ceremony ended with the shower of flowers from a helicopter onto the statue and people jumped up to catch those flowers as a blessing.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2323" style="text-align: justify;"><span data-dcnode-id="2324" style="color: #252525;"><span data-dcnode-id="2325" instrument_node="">This festival was last celebrated in 2006 and will next be celebrated in 2018.</span></span></p><span data-dcnode-id="2322" instrument_node="">
</span><div data-dcnode-id="2320"><img alt="Mahamastakabhisheka (Shravanabelagola) _Festivals of Karnataka" class="lazy" data-dcnode-id="2321" height="480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/02/Shravanbelgola_Gomateshvara_head_white.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2319" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2314" style="text-align: center;"><span data-dcnode-id="2318" instrument_node="">Siddha Bahubali’s Statue being anointed with milk. (</span><a data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/7/73/Shravanbelgola_Gomateshvara_head_white.jpg" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2317" instrument_node="">Source</span></a><span data-dcnode-id="2315" instrument_node="">)</span></p><span data-dcnode-id="2313" instrument_node="">
</span><div data-dcnode-id="2311"><div class="article-adunit" data-dcnode-id="2312" id="dynamic-adunit-pos-1"></div></div><span data-dcnode-id="2310" instrument_node="">
</span><h2 data-dcnode-id="2308" style="text-align: justify;"><span data-dcnode-id="2309" instrument_node="">8. Kambala Festival</span></h2><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2306" instrument_node="">Kambala festival is a traditional buffalo race organised annually in </span><em data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Dakshin Kannada</span></em><span data-dcnode-id="2303" instrument_node=""> and </span><em data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Udipi districts</span></em><span data-dcnode-id="2300" instrument_node=""> of Karnataka by the farming communities. It is held between November and March. A pair of buffaloes is tied to a plough and is made to run through a field of slush, anchored by a farmer. The origin of this festival can be traced back to over 1000 years when the festival was celebrated to appease gods for a good harvest.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><div data-dcnode-id="2296"><img alt="Kambala Festival_Festivals of Karnataka" class="lazy" data-dcnode-id="2297" height="423" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/blog/wp-content/uploads/2016/06/6714670609_1f7dd6463a_b.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto;" width="640"></div><span data-dcnode-id="2295" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="2292" style="text-align: center;"><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/nehasingh7/6714670609/sizes/l" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2294" instrument_node="">Source</span></a></p><span data-dcnode-id="2291" instrument_node="">
</span><h2 data-dcnode-id="2286"><span data-dcnode-id="2289" instrument_node=""> </span><span data-dcnode-id="2287" instrument_node="">9.&nbsp;Mysore Dasara</span></h2><span data-dcnode-id="2285" instrument_node="">
Dasara or Navratri is a widely celebrated 10-day-long festival in India but the Mysore Dasara celebrations definitely step it up a notch. Chamundeshwari, an incarnation of goddess Parvati killed the demon Mahishasura during this period to mark the triumph of the good over evil.</span><br data-dcnode-id="2284"><span data-dcnode-id="2283" instrument_node="">
</span><figure class="image align-center" data-dcnode-id="2274"><img alt="" class="lazyMiddle" data-dcnode-id="2282" data-original="https://www.holidify.com/images/cmsuploads/compressed/Dasara_Navaratri_Festival_Lights_Mysore_Palace_India_20200323084418.jpg" height="323" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw" width="640"><span data-dcnode-id="2281" instrument_node="">
</span><figcaption data-dcnode-id="2276"><span data-dcnode-id="2280" instrument_node="">Mysore Palace during Dasara (</span><a data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/9/9d/Dasara_Navaratri_Festival_Lights_Mysore_Palace_India.jpg" rel="nofollow" target="_blank"><span data-dcnode-id="2279" instrument_node="">Source</span></a><span data-dcnode-id="2277" instrument_node="">)</span></figcaption><span data-dcnode-id="2275" instrument_node="">
</span></figure><span data-dcnode-id="2273" instrument_node="">
In 15th Century, the kings of the Vijayanagara empire started the practice of celebrating it with a lot of show and pomp. This tradition has continued till this day and Mysore Dasara became the state festival of Karnataka. The Mysore Palace is lit up during this period with a hundred thousand bulbs and there is a carnival-like atmosphere across the city. The highlight is the ninth day of the festival (called Mahanavami) when a massive procession with elephants and dancers is taken out in the streets of the city. There is also an exhibition organised by the state with joy rides, clothes/handicraft stalls and food counters.</span><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node="">
</span><h2 data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">10.&nbsp;Karnataka Rajyotsava</span></h2><span data-dcnode-id="2268" instrument_node="">
The state of Karnataka was born on the 1st of November in the year 1956. On this day (a declared state-holiday), the Karnataka state flag is hoisted by the Chief Minister of the state and the governor addresses the people of the state. It is a common sight to see the official yellow and red state flag flying on various government and private establishments.&nbsp;</span><br data-dcnode-id="2267"><span data-dcnode-id="2266" instrument_node="">
</span><figure class="image align-center" data-dcnode-id="2257"><img alt="" class="lazyMiddle" data-dcnode-id="2265" data-original="https://www.holidify.com/images/cmsuploads/compressed/1024px-Flag_of_Karnataka.svg_20200323084650.png" height="333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw" width="500"><span data-dcnode-id="2264" instrument_node="">
</span><figcaption data-dcnode-id="2259"><span data-dcnode-id="2263" instrument_node="">Karnataka Flag (</span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flag_of_Karnataka%23/media/File%3AFlag_of_Karnataka.svg" rel="nofollow" target="_blank"><span data-dcnode-id="2262" instrument_node="">Source</span></a><span data-dcnode-id="2260" instrument_node="">)</span></figcaption><span data-dcnode-id="2258" instrument_node="">
</span></figure><span data-dcnode-id="2256" instrument_node="">
Typically, a cultural gala is organised in a large stadium and many awards are handed out to individuals who were exemplary in their respective fields. The highest state honour is the Rajyotsava award which is handed out by the Chief Minister.&nbsp;</span><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node="">
</span><h2 data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">11.&nbsp;Makara Sankranti</span></h2><span data-dcnode-id="2251" instrument_node="">
It is a 3-day long festival and marks the arrival of the harvest season. The first day is known as Boghi which is the last day of the Margashirsha month during which all the old articles and clothing of the households are burnt. The houses are decorated with rangoli and a new vessel to prepare traditional sweets is introduced to the house to welcome the arrival of the new month.</span><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">
</span><figure class="image align-center" data-dcnode-id="2242"><img alt="" class="lazyMiddle" data-dcnode-id="2248" data-original="https://www.holidify.com/images/cmsuploads/compressed/rangoli-231339_1920_20200226173011.jpg" height="383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw" width="640"><span data-dcnode-id="2247" instrument_node="">
</span><figcaption data-dcnode-id="2244"><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pixabay.com/photos/rangoli-colorful-indian-festival-231339/" rel="nofollow" target="_blank"><span data-dcnode-id="2246" instrument_node="">Source</span></a></figcaption><span data-dcnode-id="2243" instrument_node="">
</span></figure><span data-dcnode-id="2241" instrument_node="">
On the day of Sankranti, people make their offerings to the deities, wear new clothes and enjoy dishes such as Sweet Pongal, Sankranti Yellu, Payasa, Vade, etc. The final day of the festival includes rituals to thank and offer prayers to the cattle known as Kanu Pongal.</span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node="">
</span><div data-dcnode-id="2237"><div class="article-adunit" data-dcnode-id="2238" id="dynamic-adunit-pos-2"></div></div><span data-dcnode-id="2236" instrument_node="">
</span><h2 data-dcnode-id="2232"><span data-dcnode-id="2235" instrument_node="">12.&nbsp;Vairamudi Festival</span><br data-dcnode-id="2234"><br data-dcnode-id="2233"></h2><span data-dcnode-id="2231" instrument_node="">
</span><figure class="image align-center" data-dcnode-id="2224"><img alt="Vairamudi Festival" class="lazyMiddle" data-dcnode-id="2230" data-original="https://www.holidify.com/images/cmsuploads/compressed/vairamudi_20200323160805.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw" width="700"><span data-dcnode-id="2229" instrument_node="">
</span><figcaption data-dcnode-id="2226"><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/melukotemelkote/photos/a.725138287603471/2247211045396180/%3Ftype%3D3%26theater" rel="nofollow noopener noreferrer" target="_blank" title="Source"><span data-dcnode-id="2228" instrument_node="">Source</span></a></figcaption><span data-dcnode-id="2225" instrument_node="">
</span></figure><span data-dcnode-id="2223" instrument_node="">
Held annually in the town of Melukote in Mandya district, this festival is dedicated to Lord Cheluvu Narayana. A special attraction of the festival is the Vairamudi (diamond crown) worn by the deity. The crown holds a special significance and is not supposed to be exposed to daylight. It is preserved carefully and the head priest of the temple places the crown on the deity’s head in the evening upon which a grand procession is taken out. This procession goes on until wee hours.</span><br data-dcnode-id="2222"><br data-dcnode-id="2221"><span data-dcnode-id="2220" instrument_node="">The festival goes on for 13-days and the preparations begin a month before that. It is an important festival for Vaishnavites or the followers of Lord Vishnu. The grand affair is held in the month of March-April and the entire event is sponsored by the district administration. Close to 400,000 devotees witness this event every year.</span><br data-dcnode-id="2219"><span data-dcnode-id="2218" instrument_node="">
</span><h2 data-dcnode-id="2214"><span data-dcnode-id="2217" instrument_node="">13. Tula Sankramana</span><br data-dcnode-id="2216"><br data-dcnode-id="2215"></h2><span data-dcnode-id="2213" instrument_node="">
</span><figure class="image align-center" data-dcnode-id="2206"><img alt="Tulu Sankramana" class="lazyMiddle" data-dcnode-id="2212" data-original="https://www.holidify.com/images/cmsuploads/compressed/TulaSankramana_20200323161055.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw" width="700"><span data-dcnode-id="2211" instrument_node="">
</span><figcaption data-dcnode-id="2208"><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ABirth_place_of_river_Kaveri%2C_a_long_shot.jpg" rel="nofollow noopener noreferrer" target="_blank" title="Source"><span data-dcnode-id="2210" instrument_node="">Source</span></a></figcaption><span data-dcnode-id="2207" instrument_node="">
</span></figure><span data-dcnode-id="2205" instrument_node="">
The Tula Sankramana is the first day of the Kodava community’s Toleyar month. River Cauvery holds a special significance and is revered by the Kannadiga population. It is believed that the goddess Cauvery rises from the water on this day to bless her devotees. On this day, thousands of people throng near the Talacauvery river to witness the water levels rise. Following this, they take a dip in the holy river as it is considered auspicious.</span><br data-dcnode-id="2204"><br data-dcnode-id="2203"><span data-dcnode-id="2202" instrument_node="">It is usually held on the 17th day of October and around 100,000 devotees from various parts of Karnataka gather in the Kodagu district to participate in the festivities.
</span><h2 data-dcnode-id="2198"><span data-dcnode-id="2201" instrument_node="">14. Sri Vithappa Fair</span><br data-dcnode-id="2200"><br data-dcnode-id="2199"></h2><span data-dcnode-id="2197" instrument_node="">
</span><figure class="image align-center" data-dcnode-id="2190"><img alt="Sri Vithappa Fair" class="lazyMiddle" data-dcnode-id="2196" data-original="https://www.holidify.com/images/cmsuploads/compressed/Vithappafestival_20200323161904.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holidify.com/res/images/patt.png&amp;raw" width="700"><span data-dcnode-id="2195" instrument_node="">
</span><figcaption data-dcnode-id="2192"><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADollu-kunitha.jpg" rel="nofollow noopener noreferrer" target="_blank" title="Source"><span data-dcnode-id="2194" instrument_node="">Source</span></a></figcaption><span data-dcnode-id="2191" instrument_node="">
</span></figure><span data-dcnode-id="2189" instrument_node="">
Held in the town of Vithappa, the fair is a yearly tradition for over 200 years now. It is a 3-day long celebration in honour of Lord Vithappa wherein a grand procession with a palanquin carrying the god’s idol and drummers is carried out. The people from nearby towns also join the fair and an animal is sacrificed in front of the god.</span><br data-dcnode-id="2188"><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node="">Karnataka truly is One State, Many Worlds. Which of these festivals have you witnessed? Let us know in the comments below?
