nload-button" type="button"><span class="label" data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Download now</span></span></button></div></div><div class="center_tools" data-dcnode-id="2264"><div class="toolbar_pager" data-dcnode-id="2265"><div class="wrapper__text_input input_row page_number tel" data-dcnode-id="2271"><label data-dcnode-id="2272" for="jump_page"><span class="label_text visually_hidden" data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Jump to Page </span></span><div class="input_wrapper" data-dcnode-id="2273"><input class="page_number" data-dcnode-id="2274" id="jump_page" name="page_number" type="tel" value="1"></div></label></div><span aria-atomic="true" aria-live="polite" data-dcnode-id="2266"><span class="visually_hidden" data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">You are on page 1</span></span><span class="page_of" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">of 4</span></span></span></div></div><div class="right_tools" data-dcnode-id="2250"><div class="wrapper__doc_page_App_Page_Body_DocumentSearch" data-dcnode-id="2255"><div class="search_wrapper" data-dcnode-id="2256"><div class="wrapper__text_input input_row document_search text" data-dcnode-id="2257"><label data-dcnode-id="2258" for="document_search"><span class="label_text visually_hidden" data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Search inside document </span></span><div class="input_wrapper" data-dcnode-id="2259"><span aria-hidden="true" class="icon-ic_search search_icon" data-dcnode-id="2261" role="presentation"></span><input class="document_search" data-dcnode-id="2260" id="document_search" name="document_search" placeholder="Search document" type="text" value=""></div></label></div></div></div><div class="wrapper__doc_page_webpack_doc_page_shared_tooltips_tooltip tooltip_component" data-dcnode-id="2251"><button aria-label="Fullscreen" class="wrapper__text_button fullscreen_button" data-dcnode-id="2252" data-e2e="text-button" type="button"><span class="font_icon_container" data-dcnode-id="2253"><span aria-hidden="true" class="icon icon-ic_fullscreen_window" data-dcnode-id="2254"></span></span></button></div></div></div><div class="document_container is_bot blurred_page" data-dcnode-id="2212"><h1 data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Vernacular Architecture of KarnatakaVernacular Architecture of Karnataka - Informative &amp; researched article on Vernacular Architecture of Karnataka Indian Monuments in ForumArticles</span></h1><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Art &amp; Culture|Entertainment|Health|Reference|Sports|Society|TravelFo rum | Free E-magazine Indian Monuments : Indian Monuments l Palaces of India l Indian Buddhist Sites l Arts in India l Historical Buildings in Rajasthan l Indian Historical Monuments l World Heritage Monuments in India l Indian Religious Monuments l Indian Regional Monuments l Indian Monasteries Home &gt; Art &amp; Culture &gt; Indian Monuments &gt; Arts in India &gt; Indian Architecture &gt; Architecture In South India &gt; Architecture Of Karnataka &gt; Vernacular Architecture of Karnataka</span></p><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Vernacular Architecture of Karnataka Vernacular architecture of Karnataka forms the most notable development in the recent years. The forms are not stagnant, they grow continuously, albeit slowly, in response to literary and technological changes.</span></p><p data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Features of Vernacular Architecture of Karnataka Vernacular architecture of Karnataka symbolises houses designed and built by people for their own use. It is the form that a neighbourhood or community has arrived at, through a system of development, in a precise cultural, climatic and technological context. The architectural scene after independence presents some overwhelming changes, most significant being the influence of the western culture. The most notable development in the recent years has been the idea of vernacular architecture, which is unique form of design. The architecture in India is constantly changing and the prospect of the modern and the vernacular coming together points towards an exciting period of new creativity in our architecture. Significance of the Term-Vernacular Architecture Probably the term `vernacular architecture` was initially used</span></p><p data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">fonly on a negative sense by that it is not designed by architects. Later people came to understand that vernacular architecture is predominantly the architecture of houses designed and built by people for their own use. It is the form that a society has arrived at, through a process of growth and expansion, in a particular tradition, climatic and industrial milieu. The forms are not stagnant, they grow continuously, albeit slowly, in response to literary and technological changes. In view of the progressive nature of this method, it is often possible to claim that the vernacular achieves total rapport between lifestyle and built-form. The built-form only provides an unobtrusive backdrop for the myriad varieties of activity that constitute home-life. It is so much part of life, merging and almost participating in the lifestyle. Architecture is valued not because of its canonical/stylized excellence, but due to its ability to provide an atmosphere, an intangible quality that converts a mere building into a home. This architecture is to be lived-in and experienced and is not to be merely looked-at and admired.</span></p><p data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">The house provides a canvas for the individual to express his artistic leanings. A piece of `rangoli` here, a carving on the doorjamb there, or the ornate design around the `niche` for an icon are all situations that lead to decorative folk art. It is significant that there is a very high degree of participation by the owner in the act of embellishing his house. The house becomes an intimate part of his life in the process. It is probably useful to examine the mechanism by which such a total rapport between lifestyle and built from is achieved in vernacular architecture. The very word `vernacular` conjures up images of a folk idiom and a language spoken intimately in a family. It is possible that a well-knit community arrives at patterns of built-form which acquire symbolic meaning due to years of usage, in a specific cultural context. Maybe it is the way in which the entrance to the house is organized, or maybe it is the manner in which the windows and doors are arranged; the patterns start conveying messages and speaking the language of vernacular architecture, as it were. Here then are the elements of folk architecture, which the house owner and the local artisan pick up and use as the building blocks of a subconscious but evolutionary, local building style. There are some further features of the vernacular style which need to be emphasized. The above argument on the process of development of this architecture clearly indicates the possibility of generating an immense variety of forms. In</span></p><p data-dcnode-id="2236"></p><h2 data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">fspite of the undercurrent neighbouring however, are</span></h2><p data-dcnode-id="2233"></p><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">possibility of great variety, there is also an of unity in the various forms. No two houses of a village look alike. The houses, members of the same vernacular family.</span></p><p data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">The vernacular forms are subject to the dynamics of change, which is inevitable in any society which is open to external influence. The built-form which was accepted and adapted in the earlier decades may no longer be the idiom of choice today. There are inexorable changes wrought by changes in technology, life-style and the economics of a society. The vernacular forms also change and acquire a contemporary flavour in response to these inputs. (Last Updated on : 13/12/2011)</span></p><p data-dcnode-id="2228"></p><h2 data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">More Articles in Architecture Of Karnataka Architecture Of Aihole Karnataka Vernacular Architecture of</span></h2><p data-dcnode-id="2225"></p><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Recently Updated Articles in Indian Monuments Allahabad Fort Allahabad Fort is located on the banks of the Triveni Sangam. This Fort was built by Akbar in 1583. Currently the fort is occupied by the Indian Army. Jama Masjid The Jama Masjid is Delhi`s famous mosque depicting beautiful Islamic style of architecture. Modern Indian Art Modern Indian Art consists of various form of art, and ever since independence it has come a long way. Kittur Chennamma Fort Kittur Chennamma Fort of Karnataka lies on the Pune Bangalore Highway in a small town of Kittur. Madras School of Arts Madras school of arts was set up in the year 1850 by the British Empire. It believes in creating new ideas.</span></p><p data-dcnode-id="2222"></p><h2 data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">fE-mail this Article | Post a Comment</span></h2><p data-dcnode-id="2219"></p><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">RSS Feeds</span></p><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Forum Forum on Indian Monuments Discuss Now Free E-magazine Subscribe to Free E-Magazine on Indian Crafts</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Vernacular Architecture of Karnataka - Informative &amp; researched article on Vernacular Architecture
