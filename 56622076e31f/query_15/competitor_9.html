</span><div class="Breadcrum" data-dcnode-id="983"><span data-dcnode-id="996" instrument_node=""> </span><ul data-dcnode-id="984"><li data-dcnode-id="993"><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/"><span data-dcnode-id="995" instrument_node="">Home</span></a></li><span data-dcnode-id="992" instrument_node=""> </span><li data-dcnode-id="989"><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/states/karnataka/"><span data-dcnode-id="991" instrument_node="">Karnataka Tourism</span></a></li><span data-dcnode-id="988" instrument_node="">

</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node=""> </span></p><span data-dcnode-id="979" instrument_node="">
</span><h1 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Fairs &amp; Festivals in Karnataka   </span></h1><span data-dcnode-id="976" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span><div class="container" data-dcnode-id="376"><span data-dcnode-id="973" instrument_node="">
</span><div class="row stickem-container" data-dcnode-id="378"><span data-dcnode-id="972" instrument_node="">
</span><article class="left-part" data-dcnode-id="586"><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Karnataka is the land of fiestas and festivals. Numerous art and culture festivals are hosted throughout the year, which gives one glimpses about Karnataka tradition. From the stunning extravagance of Dussehra in Mysore to the Makar Sankranti in Kununurra, every place across the state has its own festival. Having a history as long as many ancient civilizations, positioned in the crossroad of the South and the West, and being a multicultural society, Karnataka celebrates a wide variety of festivals, ceremonies and events.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Fun, frolic and lots of dances - festivals in Karnataka is something one absolutely cannot miss. Whether it's the crack of the whip at the Kambala Buffalo Race or the reverberating dancing steps of folk dancers during the Hampi Festival, Karnataka has everything that keeps one hooked. In a state where one can see a rich plethora of culture and tradition, every festival celebration in Karnataka is a sight to behold. Be a part of the vibrant and colorful Karnataka. See below for the festival and fair that are commemorate in Karnataka is full zeal, enthusiasm, and vigor.</span></p><span data-dcnode-id="965" instrument_node="">
</span><h3 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Hampi Festival </span></h3><img alt="Hampi Festival" class="img" data-dcnode-id="962" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/hampi-festival.jpg&amp;raw" width="300"><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">It is during the month of January that Hampi architectural ruins spring back to life and bring people together to celebrate the grand extravaganza, Hampi Festival.  Hampi, a spectacular town was once the capital of the glorious Vijayanagar Empire. "Vijay Utsav" alias the Hampi festival is commemorated from the times of Vijayanagar reign. The festival is organized and hosted with enthusiasm and zeal by the Karnataka tourism. Main attraction of the festival is Kannadigas dance, drama, fireworks, puppet shows, spectacular parades, and musical instruments like drums and pipes, the same way it used to be in the colonial era. Through dance, music, drama and processions, organizers try to bring back the charm of the bygone era. Hampi festival is commemorated for three days. In the initial two days, dance and musical events take place. The third day of the festival is dedicated to a spectacular Jumbo Savari or an elephant march. During the third day, one can see elephants carrying howdahs, passing through the main streets of Hampi. Designed puppet shows and firework display are the other things that are put together for the festival.</span></p><span data-dcnode-id="958" instrument_node="">
</span><img alt="hampi-festival" class="img" data-dcnode-id="957" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/hampi-festival2.jpg&amp;raw" width="300"><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Noted celebrities and artist from every corner of the world are invited to grace the festival with their talent. With things like decorated elephants, embellished architectures and classical dance and music exponents, the festival reminds one about the lavish lifestyle of the colonial era people. The air widespread with the sound of the drums and pipes handcrafted by the descendants of the Vijaynagar craftsmen. People can also purchase from handicrafts and traditional commodities. If not a history and cultural event buff, then tourists can indulge in some pumping activities likes rock climbing, water sports, and traditional sports While in Hampi, it is a good idea to witness the crumbles of Hampi which despite being so old have retained its charm.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="934"><b data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">When:</span></b><span data-dcnode-id="950" instrument_node=""> January</span><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">
</span><b data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Where:</span></b><span data-dcnode-id="945" instrument_node=""> Hampi Village, Vijayanagara, Karnataka</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
</span><b data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Duration of Festival:</span></b><span data-dcnode-id="940" instrument_node=""> 3 days </span><br data-dcnode-id="939"><span data-dcnode-id="938" instrument_node="">
</span><b data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Special Attractions:</span></b><span data-dcnode-id="935" instrument_node=""> Dance and Cultural Festival  </span></p><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Kambala Festival </span></h3><img alt="Kambala Festival" class="img" data-dcnode-id="930" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/kambala-festival.jpg&amp;raw" width="300"><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Kambala festival brings the season of splash, speed, and power. More than 150 pairs of buffaloes are groomed specially for the festival, and are pegged against each other for the prize money. On the first day, a parade of participating farmers and buffaloes is organized and soon after the race begins. There are different beliefs related to the origin of the festival. Some believe that the festival is dedicated to Lord Kadri Manjunatha, an incarnation of Lord Shiva and to make him happy for a good harvest. Other believes that the festival was initiated by the farmer community of Karnataka. The festival also has a historical connect, as per the facts racing tradition was started by Hoysala Kings to see if buffaloes can be trained or used in wars. </span></p><span data-dcnode-id="926" instrument_node="">
</span><img alt="Kambala Festival" class="img" data-dcnode-id="925" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/kambala-festival2.jpg&amp;raw" width="300"><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">During Kambala Festival, the buffalo race takes place in four different categories-Negilu, Hagga, Hagga, Kene Halage.  Buffaloes with less than six teeth competed in the junior category of the competition. Categories of festival are:</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><b data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Negilu:</span></b><span data-dcnode-id="918" instrument_node=""> This category is for buffalos that don't have any prior experience of racing. Farmer controls the pair of buffaloes with the help of the plough. There are junior and senior rounds in this category.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="912"><b data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Hagga:</span></b><span data-dcnode-id="913" instrument_node="">  Only buffaloes that have an experience in racing can take part in Hagga category. During the race, both the buffaloes has a rope tied directly to them. There are junior and senior rounds in this category.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="907"><b data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Adda Halage:</span></b><span data-dcnode-id="908" instrument_node=""> In this category of competition, farmers stand of the wooden plank places on the buffaloes. Buffalos should have prior experience of racing. </span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="902"><b data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Kene Halage:</span></b><span data-dcnode-id="903" instrument_node=""> This is one of the toughest racing categories. In this race, a round shape wooden block is attached to the buffalo. There are two holes in the wooden block through which water gushes out while running.  </span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="882"><b data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">When:</span></b><span data-dcnode-id="898" instrument_node="">  Kambala festival take place from November to March as the competition takes place in different parts of the state. It is advisable to contact organizing committee before planning a visit to the see the festival.</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
</span><b data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Where:</span></b><span data-dcnode-id="893" instrument_node=""> Baradi Beedu, Bolantur, Kolatta, Majalu, Puttur, Kamalakettu and Uppinagadi.</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
</span><b data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Duration of Festival:</span></b><span data-dcnode-id="888" instrument_node=""> 2 days </span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">
</span><b data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Special attractions:</span></b><span data-dcnode-id="883" instrument_node=""> Buffalo Race</span></p><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Pattadakal Dance Festival/ Chalukya Dance Festival</span></h3><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The first thing that comes to mind when one mentioned the word "Pattadakkal" is the group of temples which deemed as the world heritage sites. The world heritage site, Pattadakal looks its very best during the grand music and dance gala, Pattadakkal Dance Festival. Constructed between 7th and 8th century, the Pattadakkal group of temples provides the perfect venue for the dance festival. The festival is organized by the Karnataka tourism with a purpose to bring together local artist and celebrate their art on international stage. "The Patadakkal Dance Festival" is also known as the "Chalukya Dance Festival" because Patadakkal was once the capital of Chalukyan king.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Extravagant dance places take place against the backdrop of 10 beautifully carved Pattadakkal group of temples. The festival is a treat not only for the dance lovers also for artisans and craftsmen. Artisans from different corners of India gather and display their best specimens in the exhibition. </span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="866"><b data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">When: </span></b><span data-dcnode-id="869" instrument_node="">January </span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">
</span></p><p data-dcnode-id="860"><b data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Where:</span></b><span data-dcnode-id="863" instrument_node=""> Pattadakal</span><br data-dcnode-id="862"><span data-dcnode-id="861" instrument_node="">
</span></p><p data-dcnode-id="854"><b data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Duration of Festival:</span></b><span data-dcnode-id="857" instrument_node=""> 3 days </span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">
</span></p><p data-dcnode-id="850"><b data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Special attractions:</span></b><span data-dcnode-id="851" instrument_node=""> Dance Festival </span></p><span data-dcnode-id="849" instrument_node="">
</span><h3 data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Ugadi</span></h3><img alt="Ugadi Festival" class="img" data-dcnode-id="846" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/ugadi-festival.jpg&amp;raw" width="300"><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Ugadi symbolizes the New Year in Karnataka. The term "Ugadi" has its origin from two Sanskrit words- uga (age) and ādi (beginning): "the beginning of a new age." People wear new clothes, decorate houses, dance to the rhythm of folk music and commemorate the beginning a new year. Poetic recitation competition, chanting mantras in the temple, listening to the future predictions and a classical music concert is a part of the Ugadi celebration. If one wants to see the full glory of the festival Ugadi, one should visit the hamlets and villages of Karnataka.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="836"><b data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">When:</span></b><span data-dcnode-id="839" instrument_node=""> Between March and April. It all depends upon the position of moon. </span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">
</span></p><p data-dcnode-id="830"><b data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Where:</span></b><span data-dcnode-id="833" instrument_node=""> All over Karnataka </span><br data-dcnode-id="832"><span data-dcnode-id="831" instrument_node="">
</span></p><p data-dcnode-id="824"><b data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Duration of Festival: </span></b><span data-dcnode-id="827" instrument_node="">1 day</span><br data-dcnode-id="826"><span data-dcnode-id="825" instrument_node="">
</span></p><p data-dcnode-id="820"><b data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Special Attractions:</span></b><span data-dcnode-id="821" instrument_node=""> New Year Celebration </span></p><span data-dcnode-id="819" instrument_node="">
</span><h3 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Pongal</span></h3><img alt="Pongal Festival" class="img" data-dcnode-id="816" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/pongal-festival1.jpg&amp;raw" width="300"><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">In Karnataka, Pongal is also known as 'Sankranti'. During the festival, people decorate their cattle and feed them 'Pongal,' a dish made of rice. A special dish called Ellu of coconut, sesame seeds, and sugar is made ready for the day. Cattle, decked up in colourful costume and their horns painted in bright colours, were taken out in a procession. A bonfire is also organized and decorated cattle are made to jump the fire as part of Pongal celebrations in Karnataka.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="793"><b data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">When: </span></b><span data-dcnode-id="809" instrument_node="">January </span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span><b data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Where:</span></b><span data-dcnode-id="804" instrument_node=""> All Over Karnataka</span><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">
</span><b data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Duration of Festival:</span></b><span data-dcnode-id="799" instrument_node="">  1 day </span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
</span><b data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Special Attractions:</span></b><span data-dcnode-id="794" instrument_node=""> Feasting, Cattle Procession </span></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Makar Sankranti</span></h3><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">There are many faces of Makar Sakranti festival. It is the harvest festival and a day to embrace all the living things on the earth-cow, neighbours, servant's helpers and other creature. It is a four-day long festival, which includes the following celebration:</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="782"><b data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Bhogi Festival:</span></b><span data-dcnode-id="783" instrument_node=""> On this day all the old clothes from the household are burned in the bonfire. People wear new clothes and decorate their house. </span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="777"><b data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Kanu Festival:</span></b><span data-dcnode-id="778" instrument_node=""> People offer prayers to cows, bulls, buffaloes and other farm animals. Cattle are adorned with accessories and a procession through the streets takes place. </span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="772"><b data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Kaanum Pongal:</span></b><span data-dcnode-id="773" instrument_node=""> On this day, people go out, visit their relatives and share greetings with each other. </span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="765"><b data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">When:</span></b><span data-dcnode-id="768" instrument_node=""> January</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">
</span></p><p data-dcnode-id="759"><b data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Where:</span></b><span data-dcnode-id="762" instrument_node=""> All around Karnataka </span><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">
</span></p><p data-dcnode-id="753"><b data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Duration:</span></b><span data-dcnode-id="756" instrument_node="">  1 day </span><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">
</span></p><p data-dcnode-id="749"><b data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Special attractions:</span></b><span data-dcnode-id="750" instrument_node=""> Colourful processions</span></p><span data-dcnode-id="748" instrument_node="">
</span><h3 data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Vairamudi Festival </span></h3><img alt="Vairamudi Festival" class="img" data-dcnode-id="745" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/vairamudi.jpg&amp;raw" width="300"><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Vairamundi festival takes place on the third day of the Brahmotsavam at the temple of Cheluvanarayana in Melkote. During the festival, Lord Cheluvarayaswami's statue is adorned with a diamond-studded crown that once belonged to Mysore's former maharajas. Every year, the festival is witnessed by more than 400,000 people. Along with the consorts and companions, the idol is taken out in a colorful procession throughout the city.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="722"><b data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">When:</span></b><span data-dcnode-id="738" instrument_node=""> March to April, fourth day of the Brahmotsavam</span><br data-dcnode-id="737"><span data-dcnode-id="736" instrument_node="">
</span><b data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Where:</span></b><span data-dcnode-id="733" instrument_node=""> Cheluva Narayana Swamy Temple at Melukote</span><br data-dcnode-id="732"><span data-dcnode-id="731" instrument_node="">
</span><b data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Duration of Festival:</span></b><span data-dcnode-id="728" instrument_node=""> 1 day </span><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
</span><b data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Special Attractions:</span></b><span data-dcnode-id="723" instrument_node=""> Colourful procession </span></p><span data-dcnode-id="721" instrument_node="">
</span><h3 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Rajyotsava Day</span></h3><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Rajyotsava day alias the birthday of Karnataka is celebrated on the 1st November, every year. The State Govt announces Rajyotsava awards every year, which is given to people who have contributed to the Karnataka state.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="701"><b data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">When:</span></b><span data-dcnode-id="712" instrument_node=""> 1st November</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
</span><b data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Where:</span></b><span data-dcnode-id="707" instrument_node=""> All over Karnataka </span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">
</span><b data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Duration of Festival:</span></b><span data-dcnode-id="702" instrument_node=""> 1 day </span></p><span data-dcnode-id="700" instrument_node="">
</span><h3 data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Dussehra</span></h3><img alt="Mysore Dussehra Festival" class="img" data-dcnode-id="697" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/mysore-dussehra2.jpg&amp;raw" width="300"><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Dussehra is a 10-day cultural extravaganza for which Mysore in India. The festival starts with a procession of decorated elephants led by the Maharaja of Mysore – a grand spectacle. Every evening, Mysore Palace lit up and the streets of the town transform into a gigantic fairground, with concerts, dance performances, sporting demonstrations and cultural events. The festival is observed to honor the Goddess Chamundeswari who killed the demon, Mahishasur.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Dussehra celebration tradition was begun by the Wodeyar King, Raja Wodeyar I (1578-1617 CE) in the year 1610. Further in the year 1805, Krishnaraja Wodeyar III commenced the tradition of having a special Durbar in the Mysore Palace during the festival, which was attended by members of the royal family, special invitees, officials and public. On Vijayadashami, procession called Jamboo Savari is planned in the streets of Mysore. The highlight of the process is the idol of Goddess Chamundeshwari, carried in a golden howdah on the top of the decorated elephant. Dance groups, music bands, armed forces and colorful tableaux become a part of the procession that starts from Mysore Palace and culminates at a place called Bannimantap, worshiping place of Banni tree. As per the Legends, Banni tree was the place where Pandavas suppressed their arms during their one-year period of Agnatavasa. People even say that the kings traditionally worshipped this tree to help them emerge victorious in the war. Another attraction of the festival is the exhibition that takes place at Doddakere Maidan, a garden right opposite the Mysore Palace. Tourists can also take part in kite flying competition, which has become extremely popular over the years</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="671"><b data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">When:</span></b><span data-dcnode-id="687" instrument_node=""> October &amp; November </span><br data-dcnode-id="686"><span data-dcnode-id="685" instrument_node="">
</span><b data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Where:</span></b><span data-dcnode-id="682" instrument_node=""> All over Mysore- Palace, Maharaja's College ground, and Chamundi Hill </span><br data-dcnode-id="681"><span data-dcnode-id="680" instrument_node="">
</span><b data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Duration of Festival:</span></b><span data-dcnode-id="677" instrument_node=""> 10 days </span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">
</span><b data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Special Attractions:</span></b><span data-dcnode-id="672" instrument_node=""> Colourful process, dance performances </span></p><span data-dcnode-id="670" instrument_node="">
</span><h3 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Sri Vithappa Fair</span></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">On the 14th or 15th day of the month Aswija, a tiny hamlet called Vithappa springs back to life and hosts the grand Sri Vithappa Fair. During the festival, a tableau of deity decorated with cloth, banana leave and flowers is carried through the streets of the village. A contingent of 60 drummers, assembled from other parts of the state, accompany this procession. The number of devotees is increasing tremendously over many years.  Most interesting part of the festival is seeing many urban people following ages old traditions. Several rituals are associated with the fair. Some devotees carry milk as an offering to the idol and believe it to be turned into curd spontaneously once the offering is made. Animal sacrifice is also a part of the festival, which is sold to devotees for a price by the priest of the temple.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="650"><b data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">When: </span></b><span data-dcnode-id="661" instrument_node="">September-October</span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
</span><b data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Where: </span></b><span data-dcnode-id="656" instrument_node="">Vithappa, Karnataka</span><br data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">
</span><b data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Special Attractions:</span></b><span data-dcnode-id="651" instrument_node=""> Colourful Procession </span></p><span data-dcnode-id="649" instrument_node="">
</span><h3 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Tula Sankramana/ Kaveri Sankramana</span></h3><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Tula Sankramana is celebrated with great pomp and show in the coorg district of Karnataka. At Talakaveri, the point of origin of the Cauvery or Kaveri river, people get together to have a dip in the holy water of Tala Kavery. A Fountain from a small tank springs up and fills another larger tank whenever the sun rises and faces the Tula Rasi. As per the devotees, a small quantity of this water, when fed to the dying members at home, will cut them from the cycles of births and deaths. Goddess Parvati, who took the form of river Cauvery, is worshiped by placing betel leaves and areca (palm) nuts, bangles, sandalwood paste, vermillion, and turmeric.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="634"><b data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">When:</span></b><span data-dcnode-id="640" instrument_node=""> Mid-October </span><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">
</span><b data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Where:</span></b><span data-dcnode-id="635" instrument_node=""> Talakaveri, Coorg district </span></p><span data-dcnode-id="633" instrument_node="">
</span><h3 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Mahamastakabhisheka</span></h3><img alt="Mahamastakabhisheka Festival" class="img" data-dcnode-id="630" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tourmyindia.com/images/mahamastakabhisheka-festival.jpg&amp;raw" width="300"><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Every 12 years, millions of pilgrimages make their way to Gomateshwara temple for Mahamastakabhisheka. It is an important Jain festival, where the grand statue of Gomateshwara is bathed and anointed with milk, saffron paste and dusted with powders of turmeric, sandalwood, and vermilion. Each and every ingredient poured on the statue has a significance- water to cleanse the statue, sandalwood to spread the fragrance of Bahubali's virtues,  kashkachoorna to beautify and cane juice to relieve hunger. The next Mahamastakabhisheka of Gomateshwara will begin in the first week of February 2018.</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="612"><b data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">When:</span></b><span data-dcnode-id="623" instrument_node=""> Celebrated in every 12 years </span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">
</span><b data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Where:</span></b><span data-dcnode-id="618" instrument_node=""> Shravanabelagola</span><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node="">
</span><b data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Duration:</span></b><span data-dcnode-id="613" instrument_node=""> 10 days</span></p><span data-dcnode-id="611" instrument_node="">
</span><h3 data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Godachi Fair</span></h3><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Godachi Fair is a noteworthy festival that takes place in the first month of Kartik in the small village of Ramdurg Taluk of Belgaum district. The feast is commemorated in the honour of Shri Veerbhadra, the chief god in the Veerbhadra temple and an imperative attendant spirits of Lord Shiva. A fair is organized every year by Karnataka Tourism featuring food stalls, rides, games, traditional celebrations, etc.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="591"><b data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">When:</span></b><span data-dcnode-id="602" instrument_node=""> Month of Kartik, November or December</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">
</span><b data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Where:</span></b><span data-dcnode-id="597" instrument_node=""> Belgaum</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
</span><b data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Special Attraction:</span></b><span data-dcnode-id="592" instrument_node=""> Fair </span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Tourists should plan their next holiday to Karnataka somewhere around these fairs and festivals. From dates to highlights, one will find everything here.</span></p><span data-dcnode-id="587" instrument_node="">
