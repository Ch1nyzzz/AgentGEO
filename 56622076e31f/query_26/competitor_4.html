</span><div class="post_box top post-222 post type-post status-publish format-standard hentry category-animal-abuse category-featured" data-dcnode-id="418" id="post-222"><span data-dcnode-id="557" instrument_node="">
</span><div class="headline_area" data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">10 Most Cruel Sports Involving Animals</span></h1><span data-dcnode-id="553" instrument_node="">
</span></div><span data-dcnode-id="551" instrument_node="">
</span><div class="format_text entry-content" data-dcnode-id="420"><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">The definition of sport, among other things, is some sort of amusement or a diversion. It is appalling that civilized societies the world over get their kicks by brutalizing animals in so many different ways – all for their own amusement and entertainment? Over time, man has devised many different ways to use animals for his ‘time pass’; we look at some of the most egregious of them:</span></p><span data-dcnode-id="547" instrument_node="">
</span><h2 data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">1. Bullfighting</span></h2><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="541"><img alt="bull-fighting" class="aligncenter size-full wp-image-262" data-dcnode-id="543" height="410" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/bull-fighting.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/bull-fighting.jpg 550w, https://www.vegansouls.com/wp-content/uploads/bull-fighting-300x223.jpg 300w" width="550"><span data-dcnode-id="542" instrument_node="">This blood sport has probably been the subject matter of more protests from animal rights groups than any other. Thankfully, however the protests have had their effect and we are seeing less and less of this needlessly cruel activity is.</span></p><span data-dcnode-id="540" instrument_node="">
</span><h2 data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">2. Cockfighting</span></h2><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="534"><img alt="cock-fight" class="aligncenter size-full wp-image-264" data-dcnode-id="536" height="358" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/cock-fight.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/cock-fight.jpg 550w, https://www.vegansouls.com/wp-content/uploads/cock-fight-300x195.jpg 300w" width="550"><span data-dcnode-id="535" instrument_node="">Still very much prevalent in many parts of the world, the cocks are bred in dreadful conditions and mistreated to make them bad tempered. They are also starved to make them even meaner before a fight.</span></p><span data-dcnode-id="533" instrument_node="">
</span><h2 data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">3. Dog Fighting</span></h2><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="527"><img alt="dog-fight" class="aligncenter size-full wp-image-266" data-dcnode-id="529" height="353" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/dog-fight.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/dog-fight.jpg 550w, https://www.vegansouls.com/wp-content/uploads/dog-fight-300x192.jpg 300w" width="550"><span data-dcnode-id="528" instrument_node="">Similar to cock-fighting, here as well, the animals are mistreated to the extent that even a gentle natured animal turns mean and ferocious.</span></p><span data-dcnode-id="526" instrument_node="">
</span><h2 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">4. Circus</span></h2><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="520"><img alt="circus-elephant" class="aligncenter size-full wp-image-267" data-dcnode-id="522" height="342" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/circus-elephant.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/circus-elephant.jpg 550w, https://www.vegansouls.com/wp-content/uploads/circus-elephant-300x186.jpg 300w" width="550"><span data-dcnode-id="521" instrument_node="">Circuses create unnatural captive environments for animals that are then made to perform strange acts contrary to their own volition. Whips, rods, hooks and even electric prods are used in the process of training.</span></p><span data-dcnode-id="519" instrument_node="">
</span><h2 data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">5. Hare Coursing</span></h2><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="513"><img alt="hare-coursing" class="aligncenter size-full wp-image-269" data-dcnode-id="515" height="330" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/hare-coursing.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/hare-coursing.jpg 550w, https://www.vegansouls.com/wp-content/uploads/hare-coursing-300x180.jpg 300w" width="550"><span data-dcnode-id="514" instrument_node="">Thankfully this ‘sport’ is almost completely outlawed. It involves dogs chasing hares. Surely if one enjoys watching animals chasing one another, they can watch the Discovery Channel!</span></p><span data-dcnode-id="512" instrument_node="">
</span><h2 data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">6. Fox Hunting</span></h2><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="506"><img alt="fox-hunting" class="aligncenter size-full wp-image-270" data-dcnode-id="508" height="385" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/fox-hunting.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/fox-hunting.jpg 550w, https://www.vegansouls.com/wp-content/uploads/fox-hunting-300x209.jpg 300w" width="550"><span data-dcnode-id="507" instrument_node="">In England this consists of chasing down and actually killing the hapless fox, and elsewhere, it merely drives the terrified animal underground to its hole. The ‘pleasure’ is apparently in the chase.</span></p><span data-dcnode-id="505" instrument_node="">
</span><h2 data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">7. Bear Shows</span></h2><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="499"><img alt="bear-show" class="aligncenter size-full wp-image-272" data-dcnode-id="501" height="455" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/bear-show.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/bear-show.jpg 550w, https://www.vegansouls.com/wp-content/uploads/bear-show-300x248.jpg 300w" width="550"><span data-dcnode-id="500" instrument_node="">Bears in captivity were trained to fight, dance; ride bicycles and put on other types of entertainment for people. Then there is Bear Baiting or Bear Baying (trained dogs are released on a chained bear) another ingenious form of animal torture.</span></p><span data-dcnode-id="498" instrument_node="">
</span><h2 data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">8. Animal Racing</span></h2><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="492"><img alt="horse-racing" class="aligncenter size-full wp-image-271" data-dcnode-id="494" height="389" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/horse-racing.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/horse-racing.jpg 550w, https://www.vegansouls.com/wp-content/uploads/horse-racing-300x212.jpg 300w" width="550"><span data-dcnode-id="493" instrument_node="">One could argue that racing is not cruel and the animals are kept in relative comfort. However, greyhounds and race horses who outlive their utility may be destined for some very grim fate: killed, sold to a slaughter house or donated for animal experiments.</span></p><span data-dcnode-id="491" instrument_node="">
</span><h2 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">9. Rodeo Riding</span></h2><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="485"><img alt="rodeo-riding" class="aligncenter size-full wp-image-273" data-dcnode-id="487" height="377" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/rodeo-riding.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/rodeo-riding.jpg 550w, https://www.vegansouls.com/wp-content/uploads/rodeo-riding-300x205.jpg 300w" width="550"><span data-dcnode-id="486" instrument_node="">This is still prevalent though several regulations in the interests of preventing animal cruelty are now in place.</span></p><span data-dcnode-id="484" instrument_node="">
</span><h2 data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">10. Orangutan Boxing</span></h2><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="478"><img alt="orangutan-boxing" class="aligncenter size-full wp-image-274" data-dcnode-id="480" height="422" loading="lazy" sizes="(max-width: 550px) 100vw, 550px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/orangutan-boxing.jpg&amp;raw" srcset="https://www.vegansouls.com/wp-content/uploads/orangutan-boxing.jpg 550w, https://www.vegansouls.com/wp-content/uploads/orangutan-boxing-300x230.jpg 300w" width="550"><span data-dcnode-id="479" instrument_node="">This bizarre form of entertainment is prevalent in Thailand, which actually puts the apes in a boxing ring with gloves on.</span></p><span data-dcnode-id="477" instrument_node="">
</span><div class="wp_rp_wrap wp_rp_vertical_m" data-dcnode-id="422" id="wp_rp_first"><div class="wp_rp_content" data-dcnode-id="423"><h3 class="related_post_title" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Related Posts</span></h3><ul class="related_post wp_rp" data-dcnode-id="424"><li data-dcnode-id="470" data-poid="in-455" data-position="0" data-post-type="none"><a class="wp_rp_thumbnail" data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/cattle-dehorning"><img alt="The Cruel Act of Cattle Dehorning" data-dcnode-id="474" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/cattle-dehorning-150x150.jpg&amp;raw" width="150"></a><a class="wp_rp_title" data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/cattle-dehorning"><span data-dcnode-id="472" instrument_node="">The Cruel Act of Cattle Dehorning</span></a></li><li data-dcnode-id="465" data-poid="in-431" data-position="1" data-post-type="none"><a class="wp_rp_thumbnail" data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/how-to-go-vegan"><img alt="How to Go Vegan Safely and Easily: 10 Tips to Get You Started" data-dcnode-id="469" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/wp-content/uploads/hens-for-meat-150x150.jpg&amp;raw" width="150"></a><a class="wp_rp_title" data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vegansouls.com/how-to-go-vegan"><span data-dcnode-id="467" instrument_node="">How to Go Vegan Safely and Easily: 10 Tips to Get You Started</span></a></li><li data-dcnode-id="460" data-poid="in-77" data-position="2" data-post-type="none"><a class="wp_rp_thumbnail" data-dcnode-id="463" href="https://chatnoir-
