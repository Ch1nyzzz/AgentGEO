</span></div><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Nike Air Force 1s just got a sustainable makeover. The footwear giant’s Happy Pineapple collection is made from pineapple leather and cork.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Nike teamed up with London-based startup Ananas Anam to create the kicks. The company makes Piñatex, an innovative vegan leather material, from sustainably sourced pineapple leaves. LIVEKINDLY has reached out to the company to confirm whether or not the collection is vegan.</span></p><div class="code-block code-block-43" data-dcnode-id="2105" style="min-height: 280px; "><span data-dcnode-id="2115" instrument_node="">
</span><div class="pubg-ad" data-dcnode-id="2114" data-pubg-id="pubg-8oq-1tb"></div><span data-dcnode-id="2113" instrument_node="">
</span><span data-dcnode-id="2110" instrument_node="">
</span><div class="pubg-ad" data-dcnode-id="2109" data-pubg-id="pubg-yca-auf"></div><span data-dcnode-id="2108" instrument_node="">
</span></div><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2095"><em data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">“We are thrilled to announce our collaboration with Nike on their Happy Pineapple collection,” </span></em><span data-dcnode-id="2101" instrument_node="">the company revealed on </span><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/feed/update/urn%3Ali%3Aactivity%3A6810568507156119552/" rel="noreferrer" target="_blank"><span data-dcnode-id="2100" instrument_node="">LinkedIn</span></a><span data-dcnode-id="2098" instrument_node="">. </span><em data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">“Nike merges their innovative silhouettes with juicy hues and clever details paying homage to a summertime staple— the pineapple.”</span></em></p><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Ananas Anam’s signature Piñatex material is used in several key parts of the shoe, along with other sustainable materials, like upcycled cork.&nbsp;</span></p><div class="code-block code-block-21" data-dcnode-id="2090" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2091" instrument_node="">
</span></div><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">The Happy Pineapple Collection features seven sneaker editions across five styles: the Free Run Trail Premium, Air Force 1, Air Max 90, Air Max 95, and Air Zoom Type.</span></p><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">The kicks feature tropical hues and a pineapple motif replaces the standard Nike logo on the top of the shoes’ tongue.</span></p><span data-dcnode-id="2083" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2077"><img alt="Nike's Happy Pineapple Collection Features 5 Styles Made With Vegan Leather" class="wp-image-139650 lazyloaded" data-dcnode-id="2082" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://cdn.livekindly.co/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png" data-srcset="https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-300x200.png?lossy=1&amp;strip=1&amp;webp=1 300w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?size=600x400&amp;lossy=1&amp;strip=1&amp;webp=1 600w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-768x512.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?size=900x599&amp;lossy=1&amp;strip=1&amp;webp=1 900w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?lossy=1&amp;strip=1&amp;webp=1 1024w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1536x1024.png?lossy=1&amp;strip=1&amp;webp=1 1536w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2.png?lossy=1&amp;strip=1&amp;webp=1 2000w" height="682" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.livekindly.co/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png&amp;raw" srcset="https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-300x200.png?lossy=1&amp;strip=1&amp;webp=1 300w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?size=600x400&amp;lossy=1&amp;strip=1&amp;webp=1 600w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-768x512.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?size=900x599&amp;lossy=1&amp;strip=1&amp;webp=1 900w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?lossy=1&amp;strip=1&amp;webp=1 1024w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1536x1024.png?lossy=1&amp;strip=1&amp;webp=1 1536w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2.png?lossy=1&amp;strip=1&amp;webp=1 2000w" width="1024"><noscript data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">&lt;img width="1024" height="682" src="https://cdn.livekindly.co/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png" alt="Nike's Happy Pineapple Collection Features 5 Styles Made With Vegan Leather" class="wp-image-139650" srcset="https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-300x200.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 300w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?size=600x400&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 600w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-768x512.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?size=900x599&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 900w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1024x682.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1024w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2-1536x1024.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1536w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/nike-happy-pineapple-2.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 2000w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">The sustainable kicks are made with pineapple and cork. | Photo illustration by Eileen W. Cho for LIVEKINDLY</span></figcaption></figure><span data-dcnode-id="2076" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="2074" id="h-nike-happy-pineapple-collection"><span data-dcnode-id="2075" instrument_node="">Nike Happy Pineapple Collection</span></h2><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">The Air Force 1 is one of Nike’s best-selling sneakers.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">In 2019, the low version—which Nike first released back in 1983—was the second top-selling sneaker in the U.S.&nbsp;</span></p><div class="code-block code-block-21" data-dcnode-id="2066" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2067" instrument_node="">
</span></div><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2064" instrument_node="">The original Air Force 1s featured leather uppers. Aside from contributing to the animal cruelty inherent in the </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livekindly.co/demand-for-cruelty-free-sustainable-materials-pushes-leather-industry-to-all-time-low/"><span data-dcnode-id="2063" instrument_node="">cattle industry</span></a><span data-dcnode-id="2061" instrument_node="">, the production of leather is also bad for the environment. The process of tanning leather involves the use of hundreds of toxic chemicals and heavy metals, such as cyanide and lead.&nbsp;As a result, a number of shoe companies, such as </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livekindly.co/gucci-vegan-leather-sneakers/"><span data-dcnode-id="2060" instrument_node="">Gucci</span></a><span data-dcnode-id="2058" instrument_node=""> and Adidas, are now opting to adopt vegan leather.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2055" instrument_node="">Ananas Anam’s Piñatex is a more sustainable option because it makes use of pineapple leaf waste. A byproduct of the fruit industry, the pineapple waste is normally either burned or goes to the </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livekindly.co/everything-you-need-know-about-food-waste/"><span data-dcnode-id="2054" instrument_node="">landfill</span></a><span data-dcnode-id="2052" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">The production of Piñatex also supports local communities. According to the company, it has created a new income stream for farming communities in the Philippines who otherwise depend on seasonal harvests.</span></p><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">The pineapple leather collection is Nike’s latest move in its endeavor to be kinder to the planet. In 2020, it launched its </span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nike.com/sustainability" rel="noreferrer" target="_blank"><span data-dcnode-id="2045" instrument_node="">Move to Zero</span></a><span data-dcnode-id="2043" instrument_node=""> campaign, which shifted to more circular models in an effort to achieve zero carbon and zero waste.</span></p><div class="code-block code-block-21" data-dcnode-id="2040" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2041" instrument_node="">
</span></div><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2032"><em data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">“One of Nike’s mottos is that there is no finish line. I think that’s especially true in sustainability. You’re never going to reach perfection, or even zero,”</span></em><span data-dcnode-id="2036" instrument_node=""> Noel Kinder, Nike’s chief sustainability officer, </span><a data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.highsnobiety.com/p/nike-move-to-zero-interview/%23%3A~%3Atext%3DNike%252C%2520with%2520its%2520Move%2520to%2Cto%2520reduce%2520its%2520carbon%2520footprint.%26text%3DNike%27s%2520Move%2520to%2520Zero%2520is%2Cgoals%2520to%2520reduce%2520its%2520waste." rel="noreferrer" target="_blank"><span data-dcnode-id="2035" instrument_node="">said</span></a><span data-dcnode-id="2033" instrument_node=""> following a Move to Zero panel talk in 2020.&nbsp;</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2025"><em data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">“So why start a race that you know you’ll never finish, let alone win? Because manufacturing and consumption aren’t going to stop,” </span></em><span data-dcnode-id="2028" instrument_node="">Kinder continued. </span><em data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">“So the progress you make along the way by offering consumers better alternatives is our most realistic way forward.”</span></em></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">Want to snag a pair? Nike’s Happy Pineapple collection launches June 17. Trainers are available in Nike’s SNKRS app.</span></p><span data-dcnode-id="2021" instrument_node="">

</span><figcaption class="color-light font-small padding-left-lg padding-xs" data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Integrate sun care with your skincare routine with these SPF products. | Polly Haas for LIVEKINDLY</span></figcaption><span data-dcnode-id="1478" instrument_node="">
</span></figure><span data-dcnode-id="1476" instrument_node="">
</span><div class="article__meta font-heading font-medium font-small text-stretched text-uppercase spacing-xs margin-top-sm" data-dcnode-id="1465"><span data-dcnode-id="1475" instrument_node="">
</span><span data-dcnode-id="1467"><span data-dcnode-id="1474" instrument_node="">
    By    </span><a class="arrow-link font-heading font-medium" data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livekindly.co/author/charlottepointing/" title="More posts from Charlotte Pointing"><span data-dcnode-id="1473" instrument_node="">
</span><span class="arrow-link__text" data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Charlotte Pointing</span></span><span data-dcnode-id="1470" instrument_node="">
</span></a><span data-dcnode-id="1468" instrument_node="">
</span></span><span data-dcnode-id="1466" instrument_node=""> </span></div><span data-dcnode-id="1464" instrument_node="">
</span></div><span data-dcnode-id="1462" instrument_node="">
</span><div class="article__content" data-dcnode-id="736"><span data-dcnode-id="1461" instrument_node="">
</span><div class="ugc spacing-lg" data-dcnode-id="807"><span data-dcnode-id="1460" instrument_node="">
</span><span data-dcnode-id="1457" instrument_node="">
</span><div class="code-block code-block-23" data-dcnode-id="1455" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1456" instrument_node="">
</span></div><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1453" instrument_node="">You know it. We know it. Baz Luhrmann knows it. Sunscreen is one of the most important steps in our skincare routine. Not only does it protect us from painful burns, but it also helps to keep skin tone even, prevents the early onset of wrinkles, and crucially, reduces the risk of developing life-threatening melanoma. While they’re not a replacement for good old-fashioned </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livekindly.co/vegan-sunscreen-every-skin-type/"><span data-dcnode-id="1452" instrument_node="">sunscreen</span></a><span data-dcnode-id="1450" instrument_node=""> (especially if you’re heading out to the </span><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livekindly.co/beach-beauty-cruelty-free/"><span data-dcnode-id="1449" instrument_node="">beach</span></a><span data-dcnode-id="1447" instrument_node="">), beauty products with SPF can help to integrate your sun care regimen with your skincare or makeup routine, giving you that little bit of extra protection.</span><br data-dcnode-id="1446"><br data-dcnode-id="1445"><span data-dcnode-id="1444" instrument_node="">They’re also great for winter when you don’t want to lather yourself in sunscreen, but you do want to keep your skin safe. Because yes, you should be wearing SPF in the winter. And when you’re inside too. (Really!) Here’s why — plus some of our favorite cruelty-free SPF skincare product picks.&nbsp;</span></p><span data-dcnode-id="1442" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1439" id="h-is-spf-necessary-in-winter"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Is SPF Necessary in Winter?</span></strong></h2><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1437" instrument_node="">UV rays retreat in the winter, but they are still present. They are particularly harmful when there is ice or snow, which reflects around 80 percent of UV light. If you’re heading to the slopes, be extra careful: the higher the altitude, the stronger and more harmful the UV rays. But even on a regular, or even a cloudy day, it won’t do any harm to apply SPF. (According to the </span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cancer.org/cancer/cancer-causes/radiation-exposure/uv-radiation.html"><span data-dcnode-id="1436" instrument_node="">American Cancer Society</span></a><span data-dcnode-id="1434" instrument_node="">, the amount of UV that clouds can filter out varies. This means you’re at risk of sun damage even when it’s overcast.)</span></p><div class="code-block code-block-43" data-dcnode-id="1422" style="min-height: 280px; "><span data-dcnode-id="1432" instrument_node="">
</span><div class="pubg-ad" data-dcnode-id="1431" data-pubg-id="pubg-8oq-1tb"></div><span data-dcnode-id="1430" instrument_node="">
</span><span data-dcnode-id="1427" instrument_node="">
</span><div class="pubg-ad" data-dcnode-id="1426" data-pubg-id="pubg-yca-auf"></div><span data-dcnode-id="1425" instrument_node="">
</span></div><span data-dcnode-id="1421" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1418" id="h-why-wear-spf-indoors"><strong data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Why Wear SPF Indoors?</span></strong></h2><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Yep, UV rays aren’t just harmful when you’re out and about. They can also pass through glass windows, which means that while you’re in the car or gazing out the window at home, you’re at risk of sun damage. You won’t burn, because UVB rays (the rays responsible for sunburn) can’t pass through the glass, but UVA rays (responsible for premature aging and skin cancer) can.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1411" id="h-from-your-face-to-your-hands-7-cruelty-free-spf-skincare-products"><strong data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">From Your Face to Your Hands: 7 Cruelty-Free SPF Skincare Products</span></strong></h2><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">So with all this information in mind, it’s a good idea to consistently apply SPF to your face and your hands as part of your everyday skincare routine. Then it’s done, dusted, and you can get on with your day. Here are our top 7 cruelty-free picks.</span></p><div class="code-block code-block-21" data-dcnode-id="1406" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1407" instrument_node="">
</span></div><span data-dcnode-id="1405" instrument_node="">

p=1&amp;amp;webp=1 900w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/spf-skincare-2-1024x682.jpeg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1024w, https://805019.smushcdn.com/1588826/wp-content/uploads/2021/06/spf-skincare-2.jpeg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1181w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">SPF 30 and synthetic “snake venom” feature in this hand cream. | UltraLuxe Skincare</span></figcaption></figure><span data-dcnode-id="1398" instrument_node="">
</span><h3 data-dcnode-id="1395" id="h-ultraluxe-microvenom-hand-cream"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Ultraluxe MicroVenom Hand Cream</span></strong></h3><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1393" instrument_node="">It’s </span><em data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">really </span></em><span data-dcnode-id="1390" instrument_node="">important that we take care of our hands, because, as one of the most exposed parts of our bodies, they are incredibly vulnerable to sun damage. This isn’t helped by the fact that we constantly wash them throughout the day, removing SPF in the process. (Pro tip: keep a tube of sunscreen or SPF-infused hand cream by your sink or in your bag and consistently reapply.)</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">This hand cream by Ultraluxe contains SPF 30, as well as synthetic “snake venom.” The latter is a peptide designed to relax muscles (just like snake venom does) and smooth out wrinkles. The hydrating cream also features green tea extract, lavender oil, and Apple Stem Cell technology. Obtained from Swiss apples, the plant-based cell-protecting tech helps to smooth and firm fine lines on the skin.</span></p><span data-dcnode-id="1385" instrument_node="">

</span><h3 data-dcnode-id="1146" id="h-the-ordinary-mineral-uv-filters-spf-30-with-antioxidants"><br data-dcnode-id="1149"><strong data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">The Ordinary Mineral UV Filters SPF 30 With Antioxidants</span></strong></h3><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1144" instrument_node="">This cream by </span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livekindly.co/vegan-skincare-products-the-ordinary/"><span data-dcnode-id="1143" instrument_node="">The Ordinary</span></a><span data-dcnode-id="1141" instrument_node=""> is a little sun warrior in a bottle. Designed for use on your face, the SPF 30 formula contains zinc oxide. The compound works to protect you from the sun by sitting on the top layer of your skin and absorbing harmful UV radiation. (While it was previously thought that zinc oxide reflected and scattered the sun’s rays, that is actually </span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/26431814/%23%3A~%3Atext%3DConclusion%253A%2520Titanium%2520dioxide%2520and%2520zinc%2Cthrough%2520significant%2520reflection%2520or%2520scattering."><span data-dcnode-id="1140" instrument_node="">not the case</span></a><span data-dcnode-id="1138" instrument_node="">.)</span><br data-dcnode-id="1137"><br data-dcnode-id="1136"><span data-dcnode-id="1135" instrument_node="">The lightweight formula, which should be applied about 20 minutes before you head out into the sun, also contains antioxidants. These clever little compounds help to repair cell damage caused by harmful free radicals. Too many free radicals, which UV damage can lead your body to produce, may lead to the </span><a data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artofdermatology.com/can-antioxidants-help-prevent-uv-induced-free-radical-damage/"><span data-dcnode-id="1134" instrument_node="">development of diseases</span></a><span data-dcnode-id="1132" instrument_node="">, including cancer.</span></p><div class="code-block code-block-21" data-dcnode-id="1129" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1130" instrument_node="">
