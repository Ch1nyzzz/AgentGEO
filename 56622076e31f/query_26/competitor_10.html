</span><h1 data-dcnode-id="430" id="wb-cont" property="name"><span data-dcnode-id="431" instrument_node="">Bestiality and animal fighting (Bill C-84)</span></h1><span data-dcnode-id="429" instrument_node="">
</span><section class="alert alert-warning wb-inview wb-init wb-inview-inited" data-dcnode-id="421" data-inview="archived-bnr" data-inviewstate="all" id="archived"><span data-dcnode-id="428" instrument_node="">
</span><h2 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Archived information</span></h2><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Bill C-84 received Royal Assent on June 21, 2019</span></p><span data-dcnode-id="422" instrument_node="">
</span></section><span data-dcnode-id="420" instrument_node="">
</span><section aria-hidden="true" class="wb-overlay modal-content overlay-def wb-bar-t wb-init wb-overlay-inited outside-off" data-dcnode-id="404" id="archived-bnr"><span data-dcnode-id="419" instrument_node="">
</span><header data-dcnode-id="414"><span data-dcnode-id="418" instrument_node="">
</span><h2 class="wb-inv" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Archived</span></h2><span data-dcnode-id="415" instrument_node="">
</span></header><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="410"><a data-dcnode-id="411" href="#archived"><span data-dcnode-id="412" instrument_node="">This page has been archived on the Web.</span></a></p><span data-dcnode-id="409" instrument_node="">
</span><button class="mfp-close overlay-close" data-dcnode-id="405" title="Close overlay" type="button"><span data-dcnode-id="408" instrument_node="">×</span><span class="wb-inv" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node=""> Close overlay</span></span></button></section><span data-dcnode-id="403" instrument_node="">
</span><div class="col-md-5 pull-right" data-dcnode-id="386"><span data-dcnode-id="402" instrument_node="">
</span><div class="panel panel-info" data-dcnode-id="387"><span data-dcnode-id="401" instrument_node="">
</span><header class="panel-heading" data-dcnode-id="398"><h2 class="wb-inv" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Related link</span></h2></header><span data-dcnode-id="397" instrument_node="">
</span><div class="panel-body" data-dcnode-id="388"><span data-dcnode-id="396" instrument_node="">
</span><ul data-dcnode-id="390"><span data-dcnode-id="395" instrument_node="">
</span><li data-dcnode-id="392"><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/department-justice/news/2018/10/government-of-canada-announces-measures-to-strengthen-legal-protections-for-children-vulnerable-individuals-and-animals.html"><span data-dcnode-id="394" instrument_node="">Government of Canada announces measures to strengthen legal protections for children, vulnerable individuals, and animals</span></a></li><span data-dcnode-id="391" instrument_node="">
</span></ul><span data-dcnode-id="389" instrument_node="">
</span></div></div></div><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">On October 18, 2018, the Minister of Justice and Attorney General of Canada introduced legislation to amend sections of the Criminal Code in order to address gaps in the criminal law regarding bestiality and strengthen laws around animal fighting. </span></p><span data-dcnode-id="382" instrument_node="">
</span><h2 data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Proposed changes to the Criminal Code</span></h2><span data-dcnode-id="379" instrument_node="">
</span><h3 data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Section 160 (Bestiality)</span></h3><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="375" instrument_node="">The Criminal Code prohibits, but does not define, bestiality. In 2016, the Supreme Court of Canada held in </span><em data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">R v DLW</span></em><span data-dcnode-id="372" instrument_node=""> that Canada's bestiality offences did not prohibit non-penetrative sex acts with animals. The proposed amendments would add a definition of bestiality to clarify that it involves </span><strong data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">any contact</span></strong><span data-dcnode-id="369" instrument_node=""> for a sexual purpose between a person and an animal. Bestiality offences and their associated penalties, would not change.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">These amendments will increase protections for children and other vulnerable individuals who may be compelled by another person to commit or witness sexual acts with animals. They will also better protect animals from violence and cruelty.</span></p><span data-dcnode-id="364" instrument_node="">
</span><h3 data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Section 445.1(1)(b) and 447 (Cruelty to Animals)</span></h3><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">The Criminal Code includes a number of offences to address animal cruelty, particularly in the context of animal fighting. The proposed amendments will expand the existing provisions in order to protect all animals and capture all activities related to animal fighting. The changes will also prohibit:</span></p><span data-dcnode-id="358" instrument_node="">
</span><ul data-dcnode-id="347"><span data-dcnode-id="357" instrument_node="">
</span><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">promoting, arranging, assisting, taking part in, or receiving money for the fighting or baiting of animals</span></li><span data-dcnode-id="354" instrument_node="">
</span><li data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">breeding, training or transporting an animal to fight another animal</span></li><span data-dcnode-id="351" instrument_node="">
</span><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">building or maintaining any arena for animal fighting, as current prohibitions are limited to building or maintaining a cockpit, which is a place used for cockfighting</span></li><span data-dcnode-id="348" instrument_node="">
</span></ul><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Bill C-84 represents a common ground approach to ensuring the protection of children and animals from cruelty and abuse, while ensuring the law does not interfere with legitimate and traditional farming, hunting, and trapping practices, including Indigenous harvesting rights.</span></p><span data-dcnode-id="343" instrument_node="">
