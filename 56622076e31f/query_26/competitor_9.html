</span><div class="page-section-container page-section-container-1 page-section-container-active" data-dcnode-id="1515" data-section-index="1"><h2 class="page-section-header page-section-header-1 page-section-header-auto" data-dcnode-id="1793" data-heading-index="1" id="section-1"><span data-dcnode-id="1794" instrument_node="">Overview</span></h2><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">The Southern Highlands has a rich history which began with the traditional owners of the land, the Gundungurra and D’harawal people, and later European settlers who first explored the area in 1798.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><div class="oc-wysiwyg-container" data-dcnode-id="1523" data-title-level="2" data-type="0"><span data-dcnode-id="1789" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1785"><span data-dcnode-id="1788" instrument_node="">

</span><span data-dcnode-id="1782" instrument_node="">
</span><span data-dcnode-id="1781" instrument_node="">
</span></div><span data-dcnode-id="1779" instrument_node="">

</span><span data-dcnode-id="1766" instrument_node="">
</span></div><span data-dcnode-id="1764" instrument_node="">
</span><div class="accordion-list-container" data-dcnode-id="1524"><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1732"><div class="accordion-item-header" data-dcnode-id="1755"><a aria-controls="multiAccordionBody1" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody1" data-accordion-use-cookie="true" data-dcnode-id="1756" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1763"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Recent History</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1733" id="multiAccordionBody1" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1734"><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" style="font-size: 1em;"><span data-dcnode-id="1753" instrument_node="">The region is today recognised for its impressive 19th and 20th century buildings and streetscapes as well as for its natural and farming landscapes. European settlement commenced in the area around 1820.</span></span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Properties such as Throsby Park, Oldbury, Vine Lodge and Wingecarribbee have buildings dating back to the early to mid 19th Century which survive today.</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">The first settlement, Bong Bong settlement, located on the Moss Vale Road between Moss Vale and Burradoo adjoining the Wingecarribee River, is marked by an obelisk and sits within the greenbelt between Moss Vale and Burradoo as part of the Burradoo Landscape Conservation Area.</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Berrima, the second settlement to be established in the district, dates back to the 1830s and survives today as the last remaining, largely intact, Georgian-period town on mainland Australia.</span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">The 1860s saw rapid development through the advent of the Main Southern Railway Line. Mittagong, Bowral and Moss Vale grew quickly. A number of settlements across the Shire sprung up in the late 19th century and early 20th century including Bundanoon, Exeter and Burrawang. Joadja, located west of Mittagong, was a mining town of significance between the 1880s and 1920s. While significant parts of this State Heritage Listed and Nationally significant "ghost town" are still in existence, recent conservation work undertaken with the assistance of Council and a grant from the Federal Government has slowed and reversed the deterioration of its remaining buildings and structures.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">The countryside has played an important part in the development of the area for farming as well as quarrying. Cooler climates, reliable rainfalls and good soils attracted many farmers who cleared a large part of the Shire’s remnant vegetation, resulting in today’s landscape mix of open paddocks and bushland areas.&nbsp;</span></p><span data-dcnode-id="1735" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1696"><div class="accordion-item-header" data-dcnode-id="1723"><a aria-controls="multiAccordionBody2" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody2" data-accordion-use-cookie="true" data-dcnode-id="1724" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1731"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Heritage Listings</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1697" id="multiAccordionBody2" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1698"><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" style="font-size: 1em;"><span data-dcnode-id="1721" instrument_node="">Local government is the principal manager of heritage in NSW, mainly through local environmental plans (LEPs).</span></span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">These plans contain schedules or lists of properties, buildings, places etc considered to be of local significance. The lists or schedules are statutory lists meaning that the provisions or clauses in the plan relating to these lists can be legally enforced.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">The aim of having such lists is to ensure the conservation of buildings, places etc, which are considered to be significant to the local community, although the relative level of significance of each item may differ considerably.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1711" instrument_node="">The local heritage of the Wingecarribee Shire is managed through the&nbsp;</span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-ajax="false" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/html/inforce/current/epi-2010-0245" rel="external" target="_blank"><span data-dcnode-id="1710" instrument_node="">Wingecarribee Local Environmental Plan (WLEP) 2010</span></a><span data-dcnode-id="1708" instrument_node="">. Clause 5.10 contains the planning controls for heritage places and Schedule 5 lists the statutory heritage items in the Wingecarribee Shire.&nbsp;</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704" sizcache04625467739531571="25" sizcache07550740549129221="36" sizcache08814094332385706="20" sizset="116"><span data-dcnode-id="1705" instrument_node="">For more information about heritage items and heritage conservation areas visit the link below:</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1700" sizcache04625467739531571="25" sizcache07550740549129221="36" sizcache08814094332385706="20" sizset="116"><a aria-describedby="new-window-0" class="opens-in-new-tab" data-ajax="false" data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/heritage/heritage-items-and-conservation-areas" rel="external" target="_blank"><span data-dcnode-id="1702" instrument_node="">Heritage Items and Conservation Areas</span></a></p><span data-dcnode-id="1699" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1670"><div class="accordion-item-header" data-dcnode-id="1687"><a aria-controls="multiAccordionBody3" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody3" data-accordion-use-cookie="true" data-dcnode-id="1688" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1695"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Confirming Heritage &amp; Other Planning Information</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1671" id="multiAccordionBody3" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1672"><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1677" sizcache04625467739531571="25" sizcache07550740549129221="36" sizcache08814094332385706="20" sizset="116"><span data-dcnode-id="1678" style="font-size: 1em;"><span data-dcnode-id="1685" instrument_node="">A </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/Development/Applications-Permits-and-Certificates/Section-10.7-Planning-Certificate-Application" target="_blank"><span data-dcnode-id="1684" instrument_node="">planning certificate</span></a><span data-dcnode-id="1682" instrument_node=""> under section 10.7 (previously section 149) of the </span><em data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Environment Planning and Assessment Act 1979</span></em><span data-dcnode-id="1679" instrument_node=""> should be obtained to confirm the planning details (including zoning and heritage) applying to your property.</span></span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">A planning certificate will state whether your property is a heritage item or within a conservation area. There are two types of certificates: s.10.7(2) and s.10.7(2) &amp; (5), the latter providing additional information. (Note that the 10.7(5) certificate does not provide additional heritage information.)</span></p><span data-dcnode-id="1673" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1609"><div class="accordion-item-header" data-dcnode-id="1661"><a aria-controls="multiAccordionBody4" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody4" data-accordion-use-cookie="true" data-dcnode-id="1662" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1669"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">The Benefits of Owning a Property Listed as an Item of Environmental Heritage</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1610" id="multiAccordionBody4" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1611"><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" style="font-size: 1em;"><span data-dcnode-id="1659" instrument_node="">The advantages of heritage listing a property are as follows:</span></span></p><span data-dcnode-id="1656" instrument_node="">
</span><ul data-dcnode-id="1624"><span data-dcnode-id="1655" instrument_node="">
</span><li data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">It provides certainty for owners, neighbours and intending purchasers. This is important when people are looking for a particular environment in which to live and work. It explains why certain suburbs, towns, villages and rural properties are sought after as places in which to live and work. This is an important issue in Wingecarribee and many of our towns and villages contain heritage items and heritage conservation areas.</span></li><span data-dcnode-id="1652" instrument_node="">
</span><li data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Protection of an item also requires Council to consider the effect of any proposed development in the area surrounding heritage items on that item.</span></li><span data-dcnode-id="1649" instrument_node="">
</span><li data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">It confirms a heritage status that many people are proud of and is useful for many commercial operators for use in advertising e.g. bed and breakfast places. Listing often provides information on the history and style of the item not known to the owner.</span></li><span data-dcnode-id="1646" instrument_node="">
</span><li data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Through flexibility clauses (such as clause 5.10(10) of the Wingecarribee Local Environmental Plan 2010) owners of heritage items can apply for otherwise non-conforming or prohibited uses where conservation of the heritage item can be demonstrated.</span></li><span data-dcnode-id="1643" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">It enables free access to Council’s heritage advisory service.</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1632"><span data-dcnode-id="1639" instrument_node="">It enables potential savings through special heritage valuations. If a property is listed on Council’s Local Environmental Plan, a property owner can request a heritage valuation for land tax purposes through the </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.valuergeneral.nsw.gov.au/land_values/how_do_we_value_land/valuation_assumptions_and_considerations" target="_blank"><span data-dcnode-id="1638" instrument_node="">Valuer General NSW</span></a><span data-dcnode-id="1636" instrument_node="">. This can result in a reduction in land tax. It also means properties are given a discounted property value by the the Valuer General NSW for rating purposes, thereby reducing Council rates. For more information visit the&nbsp;</span><a data-ajax="false" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.valuergeneral.nsw.gov.au/land_values/how_do_we_value_land/valuation_assumptions_and_considerations" rel="external"><span data-dcnode-id="1635" instrument_node="">website of the Valuer General NSW</span></a><span data-dcnode-id="1633" instrument_node="">.</span></li><span data-dcnode-id="1631" instrument_node="">
</span><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">It enables priority access to heritage grants through both the NSW Office of Environment and Heritage (OEH) and from Council. Listing is a requirement for all OEH funding.</span></li><span data-dcnode-id="1628" instrument_node="">
</span><li data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Real estate advertising suggests that heritage properties are considered a plus and that they command a premium price in many markets including the residential market, country towns, villages and farms.</span></li><span data-dcnode-id="1625" instrument_node="">
</span></ul><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1622" instrument_node="">Further information on&nbsp;what a heritage listing means to&nbsp;a property owner&nbsp;is available from&nbsp;the publication&nbsp;</span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-ajax="false" data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.environment.nsw.gov.au/resources/heritagebranch/heritage/HeritageListing2010final.pdf" rel="external" target="_blank"><span data-dcnode-id="1621" instrument_node="">Heritage Listing Explained - what it means for you</span></a><em data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">&nbsp;</span></em><span data-dcnode-id="1617" instrument_node="">published by </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heritage.nsw.gov.au/" target="_blank"><span data-dcnode-id="1616" instrument_node="">Heritage NSW</span></a><span data-dcnode-id="1614" instrument_node="">.</span></p><span data-dcnode-id="1612" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1525"><div class="accordion-item-header" data-dcnode-id="1600"><a aria-controls="multiAccordionBody5" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody5" data-accordion-use-cookie="true" data-dcnode-id="1601" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1608"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Implications of Heritage Listing on Future Development</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1526" id="multiAccordionBody5" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1527"><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" style="font-size: 1em;"><span data-dcnode-id="1598" instrument_node="">The following is a summary of the types of development affected by a heritage listing and the implications of such a listing:</span></span></p><span data-dcnode-id="1595" instrument_node="">
</span><h5 data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Demolition</span></h5><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">All demolition for any building (whether heritage listed or not) requires the approval of Council.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">There is nothing in the Local Environmental Plan which states that a heritage item can not be demolished. However, where, upon assessment, a building or structure is found to have significance, and does not have structural problems or any other cost associated with it which would make it unreasonable to retain, then under these circumstances, Council may refuse to grant approval for demolition of an item.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">In some instances the retention of items may be potentially harmful to the community, or, would entail such an unreasonable cost that restoration or maintenance of the property or building is insupportable. Under these circumstances Council may consider approving demolition.</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">It may be the case though that it would be of value to the community to have some kind of record of the building or structure’s existence. It is for this reason that a listing in the Local Environmental Plan can be important, so as to prevent the loss of knowledge or history associated with the Shire. As a condition of approval for demolition, Council will usually require that photographs and details of the site, its operation, owners etc. be supplied to Council. In this way knowledge about a certain item can be retained without the need to retain the item itself.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><h5 data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Extensions &amp; Alterations</span></h5><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1576" instrument_node="">Except for certain types of 'Exempt Development' (under&nbsp;</span><a data-ajax="false" data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/%23/view/EPI/2008/572" rel="external"><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">State&nbsp;</span></em></a><a aria-describedby="new-window-0" class="opens-in-new-tab" data-ajax="false" data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/html/inforce/current/epi-2008-0572" rel="external" target="_blank"><em data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Environmental Planning Policy&nbsp;(Exempt and Complying Development Codes) 2008</span></em></a><span data-dcnode-id="1569" instrument_node="">) alterations and additions to heritage items and within heritage conservation areas require consent.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">One of the main considerations in assessing an application for an extension or alteration is to ensure that the significance of the building or property is not diminished by the proposed works. This can depend on a number of factors including:</span></p><span data-dcnode-id="1564" instrument_node="">
</span><ul data-dcnode-id="1547"><span data-dcnode-id="1563" instrument_node="">
</span><li data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Size and scale of the proposed extension;</span></li><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Location of the extension;</span></li><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Materials and finishes;</span></li><span data-dcnode-id="1554" instrument_node="">
</span><li data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Style; and</span></li><span data-dcnode-id="1551" instrument_node="">
</span><li data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Impact upon the streetscape; etc.</span></li><span data-dcnode-id="1548" instrument_node="">
</span></ul><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">This does not mean that extensions have to replicate the style and proportions of the same era as the building. What it does mean is that any works should be compatible with the building and not detract from it nor diminish its significance.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><h5 data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Maintenance and Minor Works</span></h5><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Whilst you do not need to put in a development application for maintenance or minor works, you do need to inform Council in writing of what you intend to do and you must await a response from Council before work commences.&nbsp; Maintenance is defined in the WLEP 2010 in relation to a heritage item, Aboriginal object or&nbsp;Aboriginal place of heritage significance, or a building, work, archaeological site, tree or place within a heritage conservation area, as "ongoing protective care, but does not include the removal or disturbance of existing fabric, alterations (such as carrying out extensions or additions) or the introduction of new materials or technology".&nbsp; Repainting of existing painted surfaces can be included as maintenance and minor works can include minor repairs to building (for example, replacement of fascias, and can even include replacement of roofs) where like materials as the ones being replaced are used.&nbsp;Routine maintenance which does not involve a change to the building or site (such as lawn mowing, cleaning, inspection of gutters) does not require reference to Council nor development consent.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Where an item such as a garden has been listed, the ordinary day to day maintenance and replanting of garden beds would not require approval. The removal of significant mature trees, however, or changing the form of a garden designed in a certain style, would require consent.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1533" instrument_node="">Other than normal property maintenance, it is not expected that owners are required to take any special care of the property. Only properties listed on the State Heritage Register (as distinct from Council's Local Environmental Plan) are required to meet minimum standards of maintenance and repair. More information on State Heritage Register listings is available from the&nbsp;</span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-ajax="false" data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heritage.nsw.gov.au/" rel="external" target="_blank"><span data-dcnode-id="1532" instrument_node="">Heritage NSW website</span></a><span data-dcnode-id="1530" instrument_node="">.</span></p><span data-dcnode-id="1528" instrument_node="">
</span></div></div></div></div></div><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1516" instrument_node="">
</span></div><div class="page-section-container page-section-container-2 rs_skip" data-dcnode-id="1246" data-section-index="2"><h2 class="page-section-header page-section-header-2" data-dcnode-id="1513" data-heading-index="2" id="section-2"><span data-dcnode-id="1514" instrument_node="">Heritage Items and Conservation Areas</span></h2><span data-dcnode-id="1512" instrument_node="">
</span><h5 data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">What is a Heritage Item?</span></h5><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">A heritage item is something which has been assessed as having at least local significance using the heritage assessment criteria in the NSW Heritage Manual.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">An item will be considered to be of State (or local) heritage significance if it meets one or more of the following criteria:</span></p><span data-dcnode-id="1503" instrument_node="">
</span><div class="oc-wysiwyg-container" data-dcnode-id="1353" data-title-level="2" data-type="0"><span data-dcnode-id="1502" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1498"><span data-dcnode-id="1501" instrument_node="">
</span><span data-dcnode-id="1500" instrument_node="">
</span><span data-dcnode-id="1499" instrument_node="">
</span></div><span data-dcnode-id="1497" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1493"><span data-dcnode-id="1496" instrument_node="">
</span><span data-dcnode-id="1495" instrument_node="">
</span><span data-dcnode-id="1494" instrument_node="">
</span></div><span data-dcnode-id="1492" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1488"><span data-dcnode-id="1491" instrument_node="">
</span><span data-dcnode-id="1490" instrument_node="">
</span><span data-dcnode-id="1489" instrument_node="">
</span></div><span data-dcnode-id="1487" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1483"><span data-dcnode-id="1486" instrument_node="">
</span><span data-dcnode-id="1485" instrument_node="">
</span><span data-dcnode-id="1484" instrument_node="">
</span></div><span data-dcnode-id="1482" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1478"><span data-dcnode-id="1481" instrument_node="">
</span><span data-dcnode-id="1480" instrument_node="">
</span><span data-dcnode-id="1479" instrument_node="">
</span></div><span data-dcnode-id="1477" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1473"><span data-dcnode-id="1476" instrument_node="">
</span><span data-dcnode-id="1475" instrument_node="">
</span><span data-dcnode-id="1474" instrument_node="">
</span></div><span data-dcnode-id="1472" instrument_node="">
</span><div class="oc-wysiwyg-container-panel" data-dcnode-id="1468"><span data-dcnode-id="1471" instrument_node="">
</span><span data-dcnode-id="1470" instrument_node="">
</span><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span><div class="accordion-list-container" data-dcnode-id="1354"><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1451"><div class="accordion-item-header" data-dcnode-id="1458"><a aria-controls="multiAccordionBody6" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody6" data-accordion-use-cookie="true" data-dcnode-id="1459" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1466"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Criterion (a): Historical</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1452" id="multiAccordionBody6" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1453"><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">An item is important in the course, or pattern, of NSW's cultural or natural history (or the cultural or natural history of the local area) .</span></p><span data-dcnode-id="1454" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1435"><div class="accordion-item-header" data-dcnode-id="1442"><a aria-controls="multiAccordionBody7" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody7" data-accordion-use-cookie="true" data-dcnode-id="1443" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1450"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Criterion (b): Associational</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1436" id="multiAccordionBody7" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1437"><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">An item has a strong or special association with the life or works of a person, or group of persons, of importance in NSW's cultural or natural history (or the cultural or natural history of the local area).</span></p><span data-dcnode-id="1438" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1419"><div class="accordion-item-header" data-dcnode-id="1426"><a aria-controls="multiAccordionBody8" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody8" data-accordion-use-cookie="true" data-dcnode-id="1427" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1434"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Criterion (c): Aesthetic</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1420" id="multiAccordionBody8" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1421"><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">An item is important in demonstrating aesthetic characteristics and/or a high degree of creative or technical achievement in NSW (or the local area).</span></p><span data-dcnode-id="1422" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1403"><div class="accordion-item-header" data-dcnode-id="1410"><a aria-controls="multiAccordionBody9" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody9" data-accordion-use-cookie="true" data-dcnode-id="1411" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1418"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Criterion (d): Social</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1404" id="multiAccordionBody9" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">An item has strong or special association with a particular community or cultural group in NSW (or the local area) for social, cultural or spiritual reasons.</span></p><span data-dcnode-id="1406" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1387"><div class="accordion-item-header" data-dcnode-id="1394"><a aria-controls="multiAccordionBody10" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody10" data-accordion-use-cookie="true" data-dcnode-id="1395" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1402"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Criterion (e): Research</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1388" id="multiAccordionBody10" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1389"><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">An item has the potential to yield information that will contribute to an understanding of NSW's cultural or natural history (or the cultural or natural history of the local area).</span></p><span data-dcnode-id="1390" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1371"><div class="accordion-item-header" data-dcnode-id="1378"><a aria-controls="multiAccordionBody11" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody11" data-accordion-use-cookie="true" data-dcnode-id="1379" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1386"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Criterion (f): Rarity</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1372" id="multiAccordionBody11" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1373"><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">An item possesses uncommon, rare or endangered aspects of NSW's cultural or natural history (or the cultural or natural history of the local area).</span></p><span data-dcnode-id="1374" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="1355"><div class="accordion-item-header" data-dcnode-id="1362"><a aria-controls="multiAccordionBody12" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody12" data-accordion-use-cookie="true" data-dcnode-id="1363" data-open="false" role="button" tabindex="0"><i data-dcnode-id="1370"></i><span class="visuallyhidden rs_skip" data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Criterion (g): Representativeness</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="1356" id="multiAccordionBody12" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="1357"><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">An item is important in demonstrating the principal characteristics of a class of NSW's (or the local area's) cultural or natural places or environments.</span></p><span data-dcnode-id="1358" instrument_node="">
</span></div></div></div></div></div><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">Every potential heritage item must be assessed against all criteria, but rarely will items be significant under all criteria. Once the heritage significance of an item is established, Council must undertake the statutory process (including public exhibition and consultation) of amending its Local Environmental Plan (LEP) in order to add the item to the heritage schedule.&nbsp; This process is called the Planning Proposal process.&nbsp; More information on the Planning Proposal process can be accessed </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/Development/Local-Environmental-Plan" target="_blank"><span data-dcnode-id="1347" instrument_node="">here</span></a><span data-dcnode-id="1345" instrument_node="">.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1342" instrument_node="">There are currently more than 330 heritage items within the Wingecarribee Shire and these are listed within Schedule 5 of the WLEP 2010. These items are also shown on the Heritage Maps associated with WLEP 2010 (available for viewing only on the </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/html/inforce/current/epi-2010-0245" target="_blank"><span data-dcnode-id="1341" instrument_node="">NSW Legislation website</span></a><span data-dcnode-id="1339" instrument_node=""> and clicking on the </span><strong data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">maps</span></strong><span data-dcnode-id="1336" instrument_node=""> link).</span></p><span data-dcnode-id="1334" instrument_node="">
</span><h5 data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">What is a Heritage Conservation Area?</span></h5><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">A heritage conservation area (HCA) is an area that displays unifying attributes or elements of heritage significance and can include whole sections of towns and villages.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">There are 17 HCAs within the Wingecarribee Shire, as listed under Part 2 of Schedule 5 of the WLEP 2010, as follows:</span></p><span data-dcnode-id="1325" instrument_node="">
</span><ol data-dcnode-id="1272"><span data-dcnode-id="1324" instrument_node="">
</span><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Berrima Conservation Area</span></li><span data-dcnode-id="1321" instrument_node="">
</span><li data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Berrima Landscape Conservation Area</span></li><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Bowral Conservation Area</span></li><span data-dcnode-id="1315" instrument_node="">
</span><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Bundanoon Conservation Area</span></li><span data-dcnode-id="1312" instrument_node="">
</span><li data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Anglewood Conservation Area (Burradoo)</span></li><span data-dcnode-id="1309" instrument_node="">
</span><li data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Burradoo Landscape Conservation Area</span></li><span data-dcnode-id="1306" instrument_node="">
</span><li data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Burrawang Conservation Area</span></li><span data-dcnode-id="1303" instrument_node="">
</span><li data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Joadja Conservation Area</span></li><span data-dcnode-id="1300" instrument_node="">
</span><li data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Mittagong Conservation Area</span></li><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">The Maltings Conservation Area (Mittagong)</span></li><span data-dcnode-id="1294" instrument_node="">
</span><li data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Argyle Street North Conservation Area (Moss Vale)</span></li><span data-dcnode-id="1291" instrument_node="">
</span><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Argyle and Browley Streets Conservation Area (Moss Vale)</span></li><span data-dcnode-id="1288" instrument_node="">
</span><li data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">East Street Conservation Area (Moss Vale)</span></li><span data-dcnode-id="1285" instrument_node="">
</span><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Throsby and Arthur Streets Conservation Area (Moss Vale)</span></li><span data-dcnode-id="1282" instrument_node="">
</span><li data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Throsby Park Conservation Area (Moss Vale)</span></li><span data-dcnode-id="1279" instrument_node="">
</span><li data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Valetta Street Conservation Area (Moss Vale)</span></li><span data-dcnode-id="1276" instrument_node="">
</span><li data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Aitken Road Conservation Area (Bowral)</span></li><span data-dcnode-id="1273" instrument_node="">
</span></ol><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1270" instrument_node="">The HCAs are shown on the Heritage Maps associated with WLEP 2010 available for viewing only on the </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/html/inforce/current/epi-2010-0245" target="_blank"><span data-dcnode-id="1269" instrument_node="">NSW Legislation website</span></a><span data-dcnode-id="1267" instrument_node=""> and clicking on the </span><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">maps</span></strong><span data-dcnode-id="1264" instrument_node=""> link.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><h5 data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">What is the State Heritage Register?</span></h5><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Established in 1999, the State Heritage Register is a list of places that have particular importance to the people of NSW.&nbsp; The list includes places that have been assessed as having importance to NSW as a whole and these places can be in either public or private ownership.&nbsp; Items for the Register are assessed by the NSW Heritage Council and administered by the Heritage Division of the NSW Office of Environment and Heritage.&nbsp;</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">There are currently 40 places within the Wingecarribee Shire that are on the State Heritage Register ranging from Throsby Park in Moss Vale to the Berrima Internment Group in Berrima to the Mount Gibraltar Quarries Complex in Bowral.&nbsp;</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">Further information about the State Heritage Register can be obtained from the </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heritage.nsw.gov.au/protecting-our-heritage/" target="_blank"><span data-dcnode-id="1251" instrument_node="">Heritage NSW website</span></a><span data-dcnode-id="1249" instrument_node="">.</span></p><span data-dcnode-id="1247" instrument_node="">
</span></div><div class="page-section-container page-section-container-3 rs_skip" data-dcnode-id="1219" data-section-index="3"><h2 class="page-section-header page-section-header-3" data-dcnode-id="1243" data-heading-index="3" id="section-3"><strong data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Interim Heritage Orders</span></strong></h2><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1241" instrument_node="">Wingecarribee Shire Council has been given delegation from the Minister to issue Interim Heritage Orders (IHOs) to provide protection under the NSW Heritage Act 1977 for “a place, building, work, relic, moveable object or precinct in the council’s area that the council considers may, on further inquiry or investigation, be found to be of local heritage significance, and that the council considers is being or is likely to be harmed” (section 25 of the Heritage Act).</span><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">
</span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">
Council has recently issued two Interim Heritage Orders for properties in Myrtle Street, Bowral, and Elizabeth Street, Moss Vale. Both IHOs were published in the NSW Government Gazette on 19 November 2021, and they are in force from that date. These IHOs are valid until 19 May 2021 unless Council makes a resolution before that date to include them in the heritage schedule (Schedule 5) of the Wingecarribee Local Environmental Plan 2010 (through the preparation of a Planning Proposal), in which case, the protection of these items under the Heritage Act extends for a further six months, for a total of 12 months. The properties affected by each of these IHOs are listed below.</span><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">
</span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">
Interim Heritage Order No. 12 – 2 &amp; 4 Myrtle Street, Bowral (Lot 1 DP 840484; Lot 1 DP 741837)</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Interim Heritage Order No. 13 – ‘Karingal’, 26 Elizabeth Street, Moss Vale (Lot 1 DP 986025 and Lot 110 DP 877316)</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">The Interim Heritage Orders can be viewed in the NSW Government Gazette of 19 November 2021:&nbsp;</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1221"><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gazette.legislation.nsw.gov.au/so/download.w3p%3Fid%3DGazette_2021_2021-598.pdf" target="_blank"><span data-dcnode-id="1224" instrument_node="">https://gazette.legislation.nsw.gov.au/so/download.w3p?id=Gazette_2021_2021-598.pdf</span></a><span data-dcnode-id="1222" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1220" instrument_node="">
</span></div><div class="page-section-container page-section-container-4 rs_skip" data-dcnode-id="1124" data-section-index="4"><h2 class="page-section-header page-section-header-4" data-dcnode-id="1217" data-heading-index="4" id="section-4"><span data-dcnode-id="1218" instrument_node="">Heritage Studies and Plans</span></h2><span data-dcnode-id="1216" instrument_node="">
</span><h5 data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">The Wingecarribee Heritage Study 1991</span></h5><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">The original study for the Wingecarribee Shire was commissioned in 1990 by the Heritage Council of NSW, the Department of Planning and Wingecarribee Shire Council and was undertaken by JRC Planning Services. This study examined the heritage of the Wingecarribee Shire, provided recommendations about the conservation and management of heritage and recommended a list of heritage items, which were subsequently listed in the Local Environmental Plan (LEP) of the day: the Wingecarribee LEP 1989.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Volume 1 (comprising Introduction, Historical Context, Overview of Heritage Resources and Assessment of Significance, and Heritage Conservation Strategy) of the study can be accessed from the links below. It has been broken into 4 parts for ease of downloading.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1201"><a aria-describedby="new-window-0" class="document ext-pdf opens-in-new-tab" data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/wingecarribee-heritage-study-1991-vol.-1-part-1-of-4.pdf" target="_blank" title="Wingecarribee Heritage Study 1991 - Vol. 1 - Part 1 of 4"><i data-dcnode-id="1206"></i><span data-dcnode-id="1205" instrument_node="">Wingecarribee Heritage Study 1991 - Vol. 1 - Part 1 of 4</span><span class="file-info" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">(PDF,&nbsp;4MB)</span></span></a></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1194"><a class="document ext-pdf" data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/wingecarribee_heritage_study_1991_web_part2of4.pdf" target="_self" title="Wingecarribee Heritage Study 1991 - Vol. 1 - Part 2 of 4"><i data-dcnode-id="1199"></i><span data-dcnode-id="1198" instrument_node="">Wingecarribee Heritage Study 1991 - Vol. 1 - Part 2 of 4</span><span class="file-info" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">(PDF,&nbsp;4MB)</span></span></a></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1187"><a class="document ext-pdf" data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/wingecarribee_heritage_study_1991_web_part3of4_1.pdf" target="_self" title="Wingecarribee Heritage Study 1991 - Vol. 1 - Part 3 of 4"><i data-dcnode-id="1192"></i><span data-dcnode-id="1191" instrument_node="">Wingecarribee Heritage Study 1991 - Vol. 1 - Part 3 of 4</span><span class="file-info" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">(PDF,&nbsp;4MB)</span></span></a></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1180"><a class="document ext-pdf" data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/wingecarribee_heritage_study_1991_web_part4of4.pdf" target="_self" title="wingecarribee_heritage_study_1991_web_part4of4.pdf"><i data-dcnode-id="1185"></i><span data-dcnode-id="1184" instrument_node="">Wingecarribee Heritage Study 1991 - Vol. 1 - Part 4 of 4</span><span class="file-info" data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">(PDF,&nbsp;2MB)</span></span></a></p><span data-dcnode-id="1179" instrument_node="">
</span><h5 data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">The Wingecarribee Heritage Survey</span></h5><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">In early 2008, Council embarked on a project to investigate the heritage significance of approximately 700 new buildings and places within the Wingecarribee Shire as potential new heritage items.</span></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">These sites had been identified for further investigation through earlier heritage studies and reports, through Land Use Applications received by Council, by Council’s Heritage Advisor and planners, and nomination by members of the local community.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Council engaged heritage consultants to research each identified site and to evaluate its heritage significance. The consultants have recommended that nearly 400 of the investigated properties be made heritage items under the Wingecarribee Local Environmental Plan (WLEP) 2010.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Council resolved on 8 February 2012 to notify the owners of these identified properties to inform them of the consultants’ findings and to provide an opportunity for them to discuss the implications of heritage listing with Council officers. These notifications and consultations commenced in February 2012.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">In July 2012 Council, at its Ordinary Meeting of 11 July 2012, resolved to defer a decision on this report pending further consultation with owners.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1160" instrument_node="">Further consultations and requests for feedback were undertaken with property owners and these were reported to Council on 28 November 2012. Council resolved to heritage list Council owned and controlled properties and those whose owners support heritage listing and this was effected through </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/pdf/asmade/epi-2017-74" target="_blank"><span data-dcnode-id="1159" instrument_node="">Amendment No. 40</span></a><span data-dcnode-id="1157" instrument_node=""> to the </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/html/inforce/current/epi-2010-0245" target="_blank"><span data-dcnode-id="1156" instrument_node="">Wingecarribee Local Environmental Plan 2010</span></a><span data-dcnode-id="1154" instrument_node="">. The other properties have been deferred pending the preparation of a comprehensive Heritage Assistance and Education Programme for the Shire.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h5 data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">The Heritage Items Planning Proposal (2015) - Wingecarribee Local Environmental Plan 2010 (Amendment No. 40)</span></h5><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1148" instrument_node="">In 2014, a Planning Proposal was prepared to add the new heritage items to the list of existing heritage items in Schedule 5 of the WLEP 2010. On 10 March 2017 Amendment No. 40 to Wingecarribee Local Environmental Plan 2010 commenced which added over 80 new heritage items. A copy of the Amendment can be accessed&nbsp;</span><a aria-describedby="new-window-0" class="document ext-pdf opens-in-new-tab" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/amendment-40.pdf" target="_blank" title="amendment-40.pdf"><i data-dcnode-id="1147"></i><span data-dcnode-id="1146" instrument_node="">here</span><span class="file-info" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">(PDF,&nbsp;145KB)</span></span></a><span data-dcnode-id="1142" instrument_node="">&nbsp;, and the updated version of the Wingecarribee Local Environmental Plan 2010 can be accessed from the </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legislation.nsw.gov.au/view/html/inforce/current/epi-2010-0245" target="_blank"><span data-dcnode-id="1141" instrument_node="">Legislation NSW website</span></a><span data-dcnode-id="1139" instrument_node="">.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><h5 data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Heritage Strategy 2019-21</span></h5><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1133" instrument_node="">As part of Council's acceptance of State Government funding under the Local Government Heritage Management Program, Council has prepared and adopted a 3-year heritage strategy. The&nbsp;</span><a aria-describedby="new-window-0" class="document ext-pdf opens-in-new-tab" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/wingecarribee-shire-heritage-strategy-2019-21.pdf" target="_blank" title="Wingecarribee Shire Heritage Strategy 2019-21 "><i data-dcnode-id="1132"></i><span data-dcnode-id="1131" instrument_node="">Wingecarribee Shire Heritage Strategy 2019-21</span><span class="file-info" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">(PDF,&nbsp;108KB)</span></span></a><span data-dcnode-id="1127" instrument_node="">&nbsp;was adopted by Council on 24 July 2019.</span></p><span data-dcnode-id="1125" instrument_node="">
</span></div><div class="page-section-container page-section-container-5 rs_skip" data-dcnode-id="979" data-section-index="5"><h2 class="page-section-header page-section-header-5" data-dcnode-id="1122" data-heading-index="5" id="section-5"><span data-dcnode-id="1123" instrument_node="">Heritage Assistance Grants</span></h2><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1120" instrument_node="">Applications for the 2021/22 round of the Wingecarribee Heritage Grants are now closed. The next round of funding will be offered in mid - 2022 for the 2022/23 round of grants.</span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">
</span><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">
To manage an application in progress, go to&nbsp;</span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wingecarribee.smartygrants.com.au/" target="_blank"><span data-dcnode-id="1115" instrument_node="">https://wingecarribee.smartygrants.com.au/</span></a><span data-dcnode-id="1113" instrument_node="">&nbsp;and use your SmartyGrant credentials to login to your account.</span><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">
</span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">
The Wingecarribee Heritage Assistance Grants scheme is run annually and is proudly funded by Wingecarribee Shire Council with funding from the NSW Government. This scheme offers small grants to owners of recognised heritage properties to undertake minor repairs, maintenance work and works to meet Building Code of Australia upgrades.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The grants, which are awarded on a dollar-for-dollar basis, are offered to non-government owners of:</span></p><span data-dcnode-id="1104" instrument_node="">
</span><ul data-dcnode-id="1090"><span data-dcnode-id="1103" instrument_node="">
</span><li data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Heritage listed properties</span></li><span data-dcnode-id="1100" instrument_node="">
</span><li data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Properties within heritage conservation areas</span></li><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Properties identified as draft heritage items or within a draft heritage conservation area</span></li><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Properties identified as potential heritage items or that have been assessed as having heritage significance.</span></li><span data-dcnode-id="1091" instrument_node="">
</span></ul><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&nbsp;Priority for the allocation of funding assistance is generally given to:</span></p><span data-dcnode-id="1086" instrument_node="">
</span><ul data-dcnode-id="1054"><span data-dcnode-id="1085" instrument_node="">
</span><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Heritage places requiring urgent maintenance;&nbsp;</span></li><span data-dcnode-id="1082" instrument_node="">
</span><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Heritage buildings in conservation areas;&nbsp;</span></li><span data-dcnode-id="1079" instrument_node="">
</span><li data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Heritage places with public access and visibility;&nbsp;</span></li><span data-dcnode-id="1076" instrument_node="">
</span><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Projects where owners are experiencing difficulties in funding works to a heritage standard;&nbsp;</span></li><span data-dcnode-id="1073" instrument_node="">
</span><li data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Projects for fire, access and services upgrades;&nbsp;</span></li><span data-dcnode-id="1070" instrument_node="">
</span><li data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Projects involving part of a heritage group or precinct;&nbsp;</span></li><span data-dcnode-id="1067" instrument_node="">
</span><li data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Aspects of heritage that have received little or no funding;&nbsp;</span></li><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Projects that set an example and encourage conservation of other heritage items;&nbsp;</span></li><span data-dcnode-id="1061" instrument_node="">
</span><li data-dcnode-id="1056"><span data-dcnode-id="1060" instrument_node="">Projects that have not received recent funding support from Council.</span><br data-dcnode-id="1059"><span data-dcnode-id="1058" instrument_node="">
</span><br data-dcnode-id="1057"></li><span data-dcnode-id="1055" instrument_node="">
</span></ul><span data-dcnode-id="1053" instrument_node="">
</span><h5 data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Grant Application and Guidelines</span></h5><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1049" instrument_node="">Each Heritage Assistance Grants round correspond with each financial year. The 2021/22 grant round is now closed, but the guidelines (which are similar year to year) are available to download below.</span><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">
</span><br data-dcnode-id="1046"><span data-dcnode-id="1045" instrument_node="">
All applications for Wingecarribee Heritage Assistance Grants are made and submitted using an online portal called SmartyGrants. You will require a login to use this system. If you have used the SmartyGrants portal for an application previously (even if it was with a different organisation), the same login can be used. If you are using this portal for the first time you will need to create a login. For help using the SmartyGrants portal, consult the SmartyGrants Help Guide for Applicants available at </span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//applicanthelp.smartygrants.com.au/help-guide-for-applicants" target="_blank"><span data-dcnode-id="1044" instrument_node="">https://applicanthelp.smartygrants.com.au/help-guide-for-applicants</span></a><span data-dcnode-id="1042" instrument_node="">/.</span><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">
Once you’ve created an application, you use the same login to manage the grant process, submit progress reports and, once the works are finished, acquit the grant. A link to the SmartyGrants portal is provided below.</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
</span><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">
The Heritage Assistance Grants Guidelines provide prospective applicants information about the scope, eligibility, priorities and selection criteria of the Heritage Assistance Grants scheme. The guidelines for the 2021/22 grant round are available for download below along with a preview of the application form which shows the information required for an application.</span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">
</span><br data-dcnode-id="1031"></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1023"><a aria-describedby="new-window-0" class="document ext-pdf opens-in-new-tab" data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/guidelines-wingecarribee-heritage-assistance-grants-2021-22.pdf" target="_blank" title="Guidelines-Wingecarribee-Heritage-Assistance-Grants-2021-22"><i data-dcnode-id="1028"></i><span data-dcnode-id="1027" instrument_node="">Guidelines for the Wingecarribee Heritage Assistance Grants 2021-2022</span><span class="file-info" data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">(PDF,&nbsp;253KB)</span></span></a></p><span data-dcnode-id="1022" instrument_node="">

</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">As part of the Australian Heritage Festival, Council biennially runs the Wingecarribee Heritage Awards with the assistance of the Wingecarribee Heritage Advisory Committee. The 2020 Awards have been expanded to include an urban design category and, therefore, they have been renamed the Heritage &amp; Urban Design Awards.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="969"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Please note that the 2020 Award nominations have now closed.&nbsp;</span></strong></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">The winners will be announced at a presentation at a future date to be announced (postponed from 30 April 2020).</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">The Heritage &amp; Urban Design Awards program aims to recognise and celebrate projects, events and people who contribute positively to our understanding and appreciation of the heritage, history and urban design of the Southern Highlands. The Awards also serve to promote excellence in the design of new elements in a heritage or urban context, to encourage maintenance of heritage assets and heritage areas, and to recognise traditional craftsmanship.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Projects, properties and people can be nominated for a Heritage &amp; Urban Design Award in one of 10 categories:</span></p><span data-dcnode-id="959" instrument_node="">
</span><ol data-dcnode-id="927"><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Conservation of a Heritage Place (under $300,000 and over $300,000 sub-categories)</span></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Sympathetic Addition to a Heritage Place (under $300,000 and over $300,000 sub-categories)</span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Creative Adaptation of a Heritage Place (under $300,000 and over $300,000 sub-categories)</span></li><span data-dcnode-id="949" instrument_node="">
</span><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Excellent Urban Design</span></li><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Maintenance of a Heritage Place or Precinct</span></li><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Heritage Work by a Local or State Institution</span></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Heritage Trade</span></li><span data-dcnode-id="937" instrument_node="">
</span><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Heritage Tourism Project or Initiative</span></li><span data-dcnode-id="934" instrument_node="">
</span><li data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Achievement in Heritage by an Individual or Organisation.</span></li><span data-dcnode-id="931" instrument_node="">
</span><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Contribution to an Understanding of Heritage in the Wingecarribee Shire.&nbsp;</span></li><span data-dcnode-id="928" instrument_node="">
</span></ol><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Guidelines for the 2020 Awards may be downloaded below:</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="917"><a aria-describedby="new-window-0" class="document ext-pdf opens-in-new-tab" data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/files/assets/public/development/heritage/heritage-awards/heritage-awards-guidelines-brochure-2020-trifold.pdf" target="_blank" title="heritage-awards-guidelines-brochure-2020-trifold.pdf"><i data-dcnode-id="922"></i><span data-dcnode-id="921" instrument_node="">Heritage &amp; Urban Design Awards 2020 Guidelines</span><span class="file-info" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">(PDF,&nbsp;329KB)</span></span></a></p><span data-dcnode-id="916" instrument_node="">

</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">The Acre in Bowral (a new building in a historic urban context) was awarded an Excellence in Urban Design award at the 2018 Heritage Awards.</span></p><span data-dcnode-id="907" instrument_node="">

</span><h5 data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Interim Heritage Orders</span></h5><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="882" instrument_node="">An interim heritage order (IHO) is a mechanism under the </span><em data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">NSW Heritage Act 1977</span></em><span data-dcnode-id="879" instrument_node=""> which provides immediate protection over “a place, building, work, relic, moveable object or precinct in the council’s area that the council considers may, on further inquiry or investigation, be found to be of local heritage significance, and that the council considers is being or is likely to be harmed” (section 25 of the </span><em data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Heritage Act 1977</span></em><span data-dcnode-id="876" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Council has been given delegation from the Minister to issue its own Interim Heritage Orders and IHOs are valid for six (6) months while Council undertakes an assessment of the heritage significance of the place. If Council should decide to proceed to listing the place as a heritage item, the protection under an IHO will be extended for a further six (6) months.</span></p><span data-dcnode-id="871" instrument_node="">

</span><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">IHO No. 9 - published 18 January 2019. Council resolved on 10 July 2019 to heritage list 25-27, 33-37 and 39-41 Aitken Road as a heritage item (Aitken Road Interwar Housing Group) and create a new heritage conservation area comprising 12-30 and 25-43 Aitken Road and 56, 58 and 60 Kangaloon Road, Bowral. The Aitken Road Bowral Planning Proposal was adopted by Council on 24 June 2020 and has been submitted to the Department of Planning, Industry and Environment for making. For further information, refer to:&nbsp;</span><a aria-describedby="new-window-0" class="opens-in-new-tab" data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsc.nsw.gov.au/Development/Local-Environmental-Plan" target="_blank"><span data-dcnode-id="629" instrument_node="">Local Environmental Plan</span></a><span data-dcnode-id="627" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">www.wsc.nsw.gov.au/planning-proposal-aitken-road-heritage-bowral.</span></p><span data-dcnode-id="622" instrument_node="">
</span></div></div></div><div class="accordion-list-item-container multi-accrodion" data-dcnode-id="603"><div class="accordion-item-header" data-dcnode-id="610"><a aria-controls="multiAccordionBody23" aria-expanded="false" class="accordion-trigger contains-heading accordion-closed" data-accordion-all-device="true" data-accordion-body="#multiAccordionBody23" data-accordion-use-cookie="true" data-dcnode-id="611" data-open="false" role="button" tabindex="0"><i data-dcnode-id="618"></i><span class="visuallyhidden rs_skip" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">(show below)</span></span><h2 class="item-text" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">IHO # 10: 'Rochester Park', 102-104 Old Wingello Road, Bundanoon</span></h2><span class="visuallyhidden rs_skip" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">(show below)</span></span></a></div><div class="accordion-item-body multi-accordion-body clearfix rs_skip" data-dcnode-id="604" id="multiAccordionBody23" style="display: none;"><div class="oc-wysiwyg-container-panel-content" data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">IHO No. 10 - published 22 February 2019. Council considered the matter on 14 August 2019 (item 12.5, from page 146 of the Agenda) and Council adopted the officer's recommendation to support heritage listing of ''Rochester Park' house and garden' and increase the minimum lot size of the site from 700m2 to 1 hectare (1ha). The Interim Heritage Order has now expired but the Planning Proposal has been prepared and submitted to the Department of Planning, Industry and Environment for a Gateway Determination which, once issued, will allow the Planning Proposal to be put on public exhibition and submissions from the community invited.</span></p><span data-dcnode-id="606" instrument_node="">
</span></div></div></div></div></div><span data-dcnode-id="600" instrument_node="">
