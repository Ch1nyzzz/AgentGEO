ww.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%253A%252F%252Fwww.electrical4u.com%252Fshunt-resistors%252F" rel="noopener nofollow" target="_blank"><div class="box-s" data-dcnode-id="608"><span data-dcnode-id="611" instrument_node=""> </span><svg class="icon" data-dcnode-id="609" id="lkn" viewBox="0 0 512 512"><path d="M186.4 142.4c0 19-15.3 34.5-34.2 34.5 -18.9 0-34.2-15.4-34.2-34.5 0-19 15.3-34.5 34.2-34.5C171.1 107.9 186.4 123.4 186.4 142.4zM181.4 201.3h-57.8V388.1h57.8V201.3zM273.8 201.3h-55.4V388.1h55.4c0 0 0-69.3 0-98 0-26.3 12.1-41.9 35.2-41.9 21.3 0 31.5 15 31.5 41.9 0 26.9 0 98 0 98h57.5c0 0 0-68.2 0-118.3 0-50-28.3-74.2-68-74.2 -39.6 0-56.3 30.9-56.3 30.9v-25.2H273.8z" data-dcnode-id="610"></path></svg></div><span data-dcnode-id="607" instrument_node=""> </span></a></div></div></div><div class="entry-content" data-dcnode-id="250" itemprop="text"><div class="ez-toc-v2_0_17 counter-hierarchy ez-toc-grey" data-dcnode-id="575" id="ez-toc-container"><div class="ez-toc-title-container" data-dcnode-id="596"><p class="ez-toc-title" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Contents</span></p><span data-dcnode-id="600" instrument_node=""> </span><span class="ez-toc-title-toggle" data-dcnode-id="597"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="598" style="display: inline;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="599"></i></a></span></div><nav data-dcnode-id="576"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="577" style="display: none;"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="593"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="594" href="#What-is-a-Shunt-Resistor" title="What is a Shunt Resistor?"><span data-dcnode-id="595" instrument_node="">What is a Shunt Resistor?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="590"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="591" href="#How-Does-a-Shunt-Resistor-Work" title="How Does a Shunt Resistor Work?"><span data-dcnode-id="592" instrument_node="">How Does a Shunt Resistor Work?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="587"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="588" href="#Using-a-Shunt-Resistor-to-Measure-Current" title="Using a Shunt Resistor to Measure Current"><span data-dcnode-id="589" instrument_node="">Using a Shunt Resistor to Measure Current</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="584"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="585" href="#How-to-Build-a-Shunt-Resistor" title="How to Build a Shunt Resistor"><span data-dcnode-id="586" instrument_node="">How to Build a Shunt Resistor</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="581"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="582" href="#What-Is-the-Purpose-of-Shunt-Resistor-Applications" title="What Is the Purpose of Shunt Resistor (Applications)?"><span data-dcnode-id="583" instrument_node="">What Is the Purpose of Shunt Resistor (Applications)?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="578"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="579" href="#How-to-Size-a-Shunt-Resistor" title="How to Size a Shunt Resistor"><span data-dcnode-id="580" instrument_node="">How to Size a Shunt Resistor</span></a></li></ul></nav></div><h2 data-dcnode-id="571"><span class="ez-toc-section" data-dcnode-id="574" id="What-is-a-Shunt-Resistor"></span><span data-dcnode-id="573" instrument_node="">What is a Shunt Resistor?</span><span class="ez-toc-section-end" data-dcnode-id="572"></span></h2><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">A shunt resistor (or shunt) is defined as a device that creates a low resistance path to force most of the </span><a data-dcnode-id="568" data-id="15072312" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/electric-current-and-theory-of-electricity/"><span data-dcnode-id="569" instrument_node="">electric current</span></a><span data-dcnode-id="567" instrument_node=""> through the circuit to flow through this path. In most cases, a shunt resistor is made up of a material having a low-temperature coefficient of resistance, giving it a very low resistance over a wide temperature range.</span></p><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Shunt resistors are commonly used in current measuring devices called “ammeters”. In an ammeter, the shunt resistance is connected in parallel. An ammeter is connected in series with a device or circuit.</span></p><h2 data-dcnode-id="560"><span class="ez-toc-section" data-dcnode-id="563" id="How-Does-a-Shunt-Resistor-Work"></span><span data-dcnode-id="562" instrument_node="">How Does a Shunt Resistor Work?</span><span class="ez-toc-section-end" data-dcnode-id="561"></span></h2><div class="elect-content_7" data-dcnode-id="550" id="elect-441596577"><span data-dcnode-id="559" instrument_node="">
</span><div data-dcnode-id="552" id="ezoic-pub-ad-placeholder-104"><span data-dcnode-id="557" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5673960089696942" data-ad-format="auto" data-ad-slot="2520639174" data-dcnode-id="556" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="555" instrument_node="">
</span></div><span data-dcnode-id="551" instrument_node="">
</span></div><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">A shunt resistor has a low resistance. It provides a low resistance path to current, and it is connected in parallel with a current measuring device.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">The shunt resistor uses ohm’s law to measure the current. The resistance of the shunt resistor is known. And it is connected in parallel with the ammeter. So, the voltage is the same.</span></p><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Hence, if we measure the voltage across a shunt resistance, we can measure the current passing through the device by the equation below of ohm’s law.</span></p><p data-dcnode-id="543"></p><p class="ql-center-displayed-equation" data-dcnode-id="537" style="line-height: 37px;"><span class="ql-right-eqno" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="539"><span data-dcnode-id="540" instrument_node=""> &nbsp; </span></span><img alt="\[ I = \frac{V}{R} \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="538" height="37" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-6807702a6f44a34353ac6912dc89a40e_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="50"></p><p data-dcnode-id="536"></p><h2 data-dcnode-id="532"><span class="ez-toc-section" data-dcnode-id="535" id="Using-a-Shunt-Resistor-to-Measure-Current"></span><span data-dcnode-id="534" instrument_node="">Using a Shunt Resistor to Measure Current</span><span class="ez-toc-section-end" data-dcnode-id="533"></span></h2><div class="elect-content" data-dcnode-id="522" id="elect-730733590"><span data-dcnode-id="531" instrument_node="">
</span><div data-dcnode-id="524" id="ezoic-pub-ad-placeholder-105"><span data-dcnode-id="529" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5673960089696942" data-ad-format="auto" data-ad-slot="2190899906" data-dcnode-id="528" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="527" instrument_node="">
</span></div><span data-dcnode-id="523" instrument_node="">
</span></div><p data-dcnode-id="508"><span data-dcnode-id="521" instrument_node="">Consider an ammeter that has resistance R</span><sub data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">a</span></sub><span data-dcnode-id="518" instrument_node=""> and measures a very small current I</span><sub data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">a</span></sub><span data-dcnode-id="515" instrument_node="">. For exceeding the range of an ammeter, a shunt resistor R</span><sub data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">s</span></sub><span data-dcnode-id="512" instrument_node=""> is placed parallel with R</span><sub data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">m</span></sub><span data-dcnode-id="509" instrument_node="">.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The circuit diagram of these connections is shown in the figure below.</span></p><div class="wp-block-image" data-dcnode-id="503"><figure class="aligncenter size-large" data-dcnode-id="504"><img alt="shunt resistor" class="wp-image-15073692" data-dcnode-id="505" height="321" loading="lazy" sizes="(max-width: 602px) 100vw, 602px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/uploads/Shunt-Resistor.png&amp;raw" srcset="https://www.electrical4u.com/wp-content/uploads/Shunt-Resistor.png 602w, https://www.electrical4u.com/wp-content/uploads/Shunt-Resistor-300x160.png 300w" width="602"></figure></div><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">The total current supplied by the source is I. It is divided into two paths.</span></p><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">According to Kirchhoff’s current law (KCL),</span></p><p data-dcnode-id="498"></p><p class="ql-center-displayed-equation" data-dcnode-id="492" style="line-height: 14px;"><span class="ql-right-eqno" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node=""> &nbsp; </span></span><img alt="\[ I = I_s + I_a \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="493" height="14" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-e018cbb6cd6b53d322a7e67fdfc307b1_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="85"></p><p data-dcnode-id="491"></p><div class="elect-content_5" data-dcnode-id="481" id="elect-409608141" style="margin-left: auto; margin-right: auto; text-align: center; "><span data-dcnode-id="490" instrument_node="">
</span><div data-dcnode-id="483" id="ezoic-pub-ad-placeholder-109"><span data-dcnode-id="488" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5673960089696942" data-ad-slot="5972154820" data-dcnode-id="487" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="486" instrument_node="">
</span></div><span data-dcnode-id="482" instrument_node="">
</span></div><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Where,</span></p><p data-dcnode-id="471"><span data-dcnode-id="478" instrument_node="">I</span><sub data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">s</span></sub><span data-dcnode-id="475" instrument_node=""> = current passes through resistance R</span><sub data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">s</span></sub><span data-dcnode-id="472" instrument_node=""> (shunt current)</span></p><p data-dcnode-id="464"><span data-dcnode-id="470" instrument_node="">I</span><sub data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">a</span></sub><span data-dcnode-id="467" instrument_node=""> = current passes through resistance R</span><sub data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">a</span></sub></p><p data-dcnode-id="463"></p><p class="ql-center-displayed-equation" data-dcnode-id="457" style="line-height: 14px;"><span class="ql-right-eqno" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="459"><span data-dcnode-id="460" instrument_node=""> &nbsp; </span></span><img alt="\[ I_s = I - I_a \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="458" height="14" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-8e0635acf2f3b5aa54f481cc5f737c33_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="85"></p><p data-dcnode-id="456"></p><p data-dcnode-id="448"><span data-dcnode-id="455" instrument_node="">The shunt resister R</span><sub data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">s</span></sub><span data-dcnode-id="452" instrument_node=""> is connected parallel with resistor R</span><sub data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">a</span></sub><span data-dcnode-id="449" instrument_node="">. Hence the voltage drop across both resisters are equal.</span></p><p data-dcnode-id="447"></p><p class="ql-center-displayed-equation" data-dcnode-id="441" style="line-height: 14px;"><span class="ql-right-eqno" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node=""> &nbsp; </span></span><img alt="\[ V_s = V_a \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="442" height="14" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-99c7a36badcab57be48adc6ba776ee26_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="58"></p><p data-dcnode-id="440"></p><p data-dcnode-id="439"></p><p class="ql-center-displayed-equation" data-dcnode-id="433" style="line-height: 14px;"><span class="ql-right-eqno" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node=""> &nbsp; </span></span><img alt="\[ I_s R_s = I_a R_a \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="434" height="14" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-963f8d792fa3b44dd5a12c55fb805fea_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="96"></p><p data-dcnode-id="432"></p><p data-dcnode-id="431"></p><p class="ql-center-displayed-equation" data-dcnode-id="425" style="line-height: 19px;"><span class="ql-right-eqno" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node=""> &nbsp; </span></span><img alt="\[ (I - I_a) R_s = I_a R_a \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="426" height="19" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-33009b9abb6e9df5b6931ea2cbee6ab2_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="139"></p><p data-dcnode-id="424"></p><p data-dcnode-id="423"></p><p class="ql-center-displayed-equation" data-dcnode-id="417" style="line-height: 14px;"><span class="ql-right-eqno" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node=""> &nbsp; </span></span><img alt="\[ IR_s - I_a R_s = I_a R_a \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="418" height="14" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-6d7151ee6fe71cd105ba288b9e08c295_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="148"></p><p data-dcnode-id="416"></p><p data-dcnode-id="415"></p><p class="ql-center-displayed-equation" data-dcnode-id="409" style="line-height: 14px;"><span class="ql-right-eqno" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node=""> &nbsp; </span></span><img alt="\[ IR_s = I_a R_a + I_a R_s \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="410" height="14" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-5849fad65187bea575523f79b6b01e1f_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="148"></p><p data-dcnode-id="408"></p><p data-dcnode-id="407"></p><p class="ql-center-displayed-equation" data-dcnode-id="401" style="line-height: 19px;"><span class="ql-right-eqno" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node=""> &nbsp; </span></span><img alt="\[ IR_s = I_a (R_a + R_s) \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="402" height="19" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-655932bf3c35b58ba60e620276d40fc6_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="146"></p><p data-dcnode-id="400"></p><p data-dcnode-id="399"></p><p class="ql-center-displayed-equation" data-dcnode-id="393" style="line-height: 39px;"><span class="ql-right-eqno" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node=""> &nbsp; </span></span><img alt="\[ \frac{I}{I_a} = \frac{ R_a + R_s }{R_s} \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="394" height="39" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-837c471a2f4b1b6a3e7a5177ccea8155_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="108"></p><p data-dcnode-id="392"></p><p data-dcnode-id="391"></p><p class="ql-center-displayed-equation" data-dcnode-id="385" style="line-height: 39px;"><span class="ql-right-eqno" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node=""> &nbsp; </span></span><img alt="\[ N = 1 + \frac{R_a}{R_s} \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="386" height="39" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-78d8a2fdc57eb150abb3d9babde6349e_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="94"></p><p data-dcnode-id="384"></p><div class="elect-content_2" data-dcnode-id="374" id="elect-1553099668"><span data-dcnode-id="383" instrument_node="">
</span><div data-dcnode-id="376" id="ezoic-pub-ad-placeholder-107"><span data-dcnode-id="381" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5673960089696942" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="4402130278" data-dcnode-id="380" style="display:block; text-align:center;"></ins><span data-dcnode-id="379" instrument_node="">
</span></div><span data-dcnode-id="375" instrument_node="">
</span></div><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Where N is a multiplying power of shunt.</span></p><h2 data-dcnode-id="368"><span class="ez-toc-section" data-dcnode-id="371" id="How-to-Build-a-Shunt-Resistor"></span><span data-dcnode-id="370" instrument_node="">How to Build a Shunt Resistor</span><span class="ez-toc-section-end" data-dcnode-id="369"></span></h2><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">The shunt resister can be built with very thin copper wires. The length and size of the shunt resister depend on the resistance you require.</span></p><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">The resistance of the shunt resistor will decide the range of the ammeter.</span></p><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">If you use 10 AWG (2.59 mm diameter) copper wire, the resistance of this wire is 0.9989 ohms per 1000 feet. This resistance may vary according to the quality of a wire.</span></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Hence, make sure of the resistance before using it. To calculate the required length of wire for a particular value of shunt resistor, use the below equation.</span></p><p data-dcnode-id="359"></p><p class="ql-center-displayed-equation" data-dcnode-id="353" style="line-height: 42px;"><span class="ql-right-eqno" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node=""> &nbsp; </span></span><img alt="\[ Length \, of \, wire = \frac{Required \, shunt \, resistance \, (m \Omega)}{Resistance \, per \, 1000 \, feet }  \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="354" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-d306320faf66be80bb6903a59fd655cb_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="395"></p><p data-dcnode-id="352"></p><div class="elect-content_3" data-dcnode-id="342" id="elect-1090593599"><span data-dcnode-id="351" instrument_node="">
</span><div data-dcnode-id="344" id="ezoic-pub-ad-placeholder-106"><span data-dcnode-id="349" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5673960089696942" data-ad-format="auto" data-ad-slot="8533781122" data-dcnode-id="348" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="347" instrument_node="">
</span></div><span data-dcnode-id="343" instrument_node="">
</span></div><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">For example, if you require a shunt of 0.5 mΩ and use 10 AWG wire, put the above values in this equation.</span></p><p data-dcnode-id="339"></p><p class="ql-center-displayed-equation" data-dcnode-id="333" style="line-height: 37px;"><span class="ql-right-eqno" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node=""> &nbsp; </span></span><img alt="\[ Length \, of \, wire = \frac{0.5}{0.9989} \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="334" height="37" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-26d165dc3fca4d956a7021e9354dcdad_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="193"></p><p data-dcnode-id="332"></p><p data-dcnode-id="331"></p><p class="ql-center-displayed-equation" data-dcnode-id="325" style="line-height: 17px;"><span class="ql-right-eqno" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node=""> &nbsp; </span></span><img alt="\[ Length \, of \, wire \approx 0.5 feet \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="326" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-84a275a2268028c2b4a491b1f9037fea_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="197"></p><p data-dcnode-id="324"></p><h2 data-dcnode-id="320"><span class="ez-toc-section" data-dcnode-id="323" id="What-Is-the-Purpose-of-Shunt-Resistor-Applications"></span><span data-dcnode-id="322" instrument_node="">What Is the Purpose of Shunt Resistor (Applications)?</span><span class="ez-toc-section-end" data-dcnode-id="321"></span></h2><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">The application of shunt resister is as listed below.</span></p><ul data-dcnode-id="307"><li data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">A shunt resistor is used in an electrical circuit to protect against overvoltage.</span></li><li data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">It is used in a current measuring device.</span></li><li data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">It is used to bypass defective devices. (When a number of components are connected in series, one component is failed to operate, it will break the entire circuit. In this condition, the shunt resistor bypasses the fail component and continues the circuit path.)</span></li><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">A shunt resistor with a capacitor is used in a circuit to avoid the problem of high-frequency noise.</span></li><li data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">It is used in overload protection control circuits, including power supplies.</span></li></ul><h2 data-dcnode-id="303"><span class="ez-toc-section" data-dcnode-id="306" id="How-to-Size-a-Shunt-Resistor"></span><span data-dcnode-id="305" instrument_node="">How to Size a Shunt Resistor</span><span class="ez-toc-section-end" data-dcnode-id="304"></span></h2><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Generally, a shunt resistor is used in the current measuring device. The size of the shunt resister will decide the range of the ammeter.</span></p><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">The size of the shunt resister depends on the maximum current rating. It is calculated by the voltage drop at the maximum current rating.</span></p><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Let say a shunt resistor is designed for maximum current 100 A and voltage drop 50 mV. Typically, the voltage drop at maximum current is 50 mV, 75 mV, or 100 mV.</span></p><div class="elect-content_4" data-dcnode-id="287" id="elect-1151603400"><span data-dcnode-id="296" instrument_node="">
</span><div data-dcnode-id="289" id="ezoic-pub-ad-placeholder-108"><span data-dcnode-id="294" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5673960089696942" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8508239700" data-dcnode-id="293" style="display:block; text-align:center;"></ins><span data-dcnode-id="292" instrument_node="">
</span></div><span data-dcnode-id="288" instrument_node="">
</span></div><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">In this example, we can calculate the resistance of shunt resister by ohm’s law.</span></p><p data-dcnode-id="284"></p><p class="ql-center-displayed-equation" data-dcnode-id="278" style="line-height: 12px;"><span class="ql-right-eqno" data-dcnode-id="282"><span data-dcnode-id="283" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node=""> &nbsp; </span></span><img alt="\[ V = I R \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="279" height="12" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-599377829c9187053d8374a1a5be963b_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="62"></p><p data-dcnode-id="277"></p><p data-dcnode-id="276"></p><p class="ql-center-displayed-equation" data-dcnode-id="270" style="line-height: 17px;"><span class="ql-right-eqno" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node=""> &nbsp; </span></span><img alt="\[ 50 \times 10^{-3} = 100 R \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="271" height="17" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-0aed2fca4928587fcdc9122cc9a5f868_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="140"></p><p data-dcnode-id="269"></p><p data-dcnode-id="268"></p><p class="ql-center-displayed-equation" data-dcnode-id="262" style="line-height: 13px;"><span class="ql-right-eqno" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node=""> &nbsp; </span></span><span class="ql-left-eqno" data-dcnode-id="264"><span data-dcnode-id="265" instrument_node=""> &nbsp; </span></span><img alt="\[ R = 0.5 m \Omega \]" class="ql-img-displayed-equation quicklatex-auto-format" data-dcnode-id="263" height="13" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electrical4u.com/wp-content/ql-cache/quicklatex.com-c483c3fa57c7892a8d03930c205d9268_l3.svg&amp;raw" title="Rendered by QuickLaTeX.com" width="88"></p><p data-dcnode-id="261"></p><div class="elect-after-content" data-dcnode-id="251" id="elect-1022789989" style="margin-left: auto; margin-right: auto; text-align: center; "><span data-dcnode-id="260" instrument_node="">
