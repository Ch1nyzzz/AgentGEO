</span><h2 data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">What is a process design kit?&nbsp;</span></h2><span data-dcnode-id="830" instrument_node="">
</span></div><span data-dcnode-id="828" instrument_node="">

</span><section class="component-column row" data-dcnode-id="722"><span data-dcnode-id="817" instrument_node="">
</span><div class="col-xs-12 col-sm-9" data-dcnode-id="743"><span data-dcnode-id="816" instrument_node="">
</span><div class="aem-Grid aem-Grid--12 aem-Grid--default--12" data-dcnode-id="745"><span data-dcnode-id="815" instrument_node="">
</span><div class="richTextEditor aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="785"><span data-dcnode-id="814" instrument_node="">
</span><div class="background-component vert-pad-top-sm" data-dcnode-id="787"><span data-dcnode-id="813" instrument_node="">
</span><div class="container" data-dcnode-id="789"><span data-dcnode-id="812" instrument_node="">
</span><section class="component-rtecomp" data-dcnode-id="791"><span data-dcnode-id="811" instrument_node="">
</span><div class="component-rte" data-dcnode-id="793"><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">A&nbsp;Process Design Kit&nbsp;(PDK)&nbsp;is a library of basic photonic components generated by the foundry to give open access to their generic process for fabrication.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="805" style="font-family: inherit;"><span data-dcnode-id="806" instrument_node="">Designers can design a wide variety of photonic integrated circuits (PICs) using the photonic components of the foundry, which are technically and geometrically represented in their Process Design Kits.&nbsp;</span></span><br data-dcnode-id="804"><span data-dcnode-id="803" instrument_node="">
</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">A PDK can be compared to a set of building blocks, where each photonic component in the library is a separate block. A designer can use these blocks to build many types of photonic circuits for various applications. A generic technology is useful for reducing costs when the designer is using predefined, tested photonic components on the material platform of their choice.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" style="font-family: inherit;"><span data-dcnode-id="797" instrument_node="">A designer can also create his or her own building blocks, but the designer must follow the fabrication rules of the foundry to be able to use a custom component from a particular foundry.&nbsp; Among others, the rules usually include:</span></span></p><span data-dcnode-id="794" instrument_node="">
</span></div><span data-dcnode-id="792" instrument_node="">
</span></section><span data-dcnode-id="790" instrument_node="">
</span></div><span data-dcnode-id="788" instrument_node="">
</span></div><span data-dcnode-id="786" instrument_node="">
</span></div><span data-dcnode-id="784" instrument_node="">
</span><div class="text aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="747"><span data-dcnode-id="783" instrument_node="">
</span><div class="background-component vert-pad-bottom-sm" data-dcnode-id="749"><span data-dcnode-id="782" instrument_node="">
</span><div class="container" data-dcnode-id="751"><span data-dcnode-id="781" instrument_node="">
</span><section class="component-textcomp text-align-left" data-dcnode-id="753"><span data-dcnode-id="780" instrument_node="">
</span><div class="component-text" data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
</span><div class="component-text" data-dcnode-id="755"><span data-dcnode-id="776" instrument_node="">
</span><ul data-dcnode-id="757"><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="774" instrument_node="">Material stack (types of layers and thickness)</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
</span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Minimum distance between optical components (like gaps between waveguides)</span></li><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Maximum etching depths</span></li><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Metallization and electrical probes (how to place the metal, metal layers allowed)</span></li><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Feature size (size of waveguides, holes, active areas, etc.)</span></li><span data-dcnode-id="758" instrument_node="">
</span></ul><span data-dcnode-id="756" instrument_node="">

</span><section class="component-textcomp text-align-left" data-dcnode-id="684"><span data-dcnode-id="700" instrument_node="">
</span><div class="component-text" data-dcnode-id="692"><span data-dcnode-id="699" instrument_node="">
</span><h2 class="title" data-dcnode-id="694"><span data-dcnode-id="698" instrument_node="">
</span><span class="text-size-normal" data-dcnode-id="696" style="color: #5A2A82;"><span data-dcnode-id="697" instrument_node="">How does a process design kit work, and why is it so important? </span></span><span data-dcnode-id="695" instrument_node="">
</span></h2><span data-dcnode-id="693" instrument_node="">
</span></div><span data-dcnode-id="691" instrument_node="">
</span><div class="component-text" data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">In photonics, the basic building blocks in a PDK are waveguides, phase shifters, active sections (semiconductor optical amplifiers or SOAs and lasers), and rotators (polarizers). These resemble the basic components in electronics, which are wires/resistors, inductors, capacitors, and transistors, shown in the following figure.</span></p><span data-dcnode-id="687" instrument_node="">
</span></div><span data-dcnode-id="685" instrument_node="">
</span></section><span data-dcnode-id="683" instrument_node="">
</span></div><span data-dcnode-id="681" instrument_node="">
</span></div><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span><div class="image aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="665"><span data-dcnode-id="676" instrument_node="">
</span><div class="container" data-dcnode-id="667"><span data-dcnode-id="675" instrument_node="">
</span><div class="component-image" data-dcnode-id="669"><span data-dcnode-id="674" instrument_node="">
</span><img alt="Electronic integrated circuits vs. Photonic integrated circuits | Synopsys" class="img-responsive" data-dcnode-id="673" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.synopsys.com/content/dam/synopsys/optical-solutions/images/glossary-osg-pdk-ic-comparison.jpg.imgw.850.x.jpg&amp;raw"><span data-dcnode-id="672" instrument_node="">
</span><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span><div class="text aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="609"><span data-dcnode-id="663" instrument_node="">
</span><div class="container" data-dcnode-id="611"><span data-dcnode-id="662" instrument_node="">
</span><section class="component-textcomp" data-dcnode-id="613"><span data-dcnode-id="661" instrument_node="">
</span><div class="component-text" data-dcnode-id="654"><span data-dcnode-id="660" instrument_node="">
</span><h2 class="title" data-dcnode-id="656"><span data-dcnode-id="659" instrument_node="">
</span><span data-dcnode-id="658" style="color: ;"></span><span data-dcnode-id="657" instrument_node="">
</span></h2><span data-dcnode-id="655" instrument_node="">
</span></div><span data-dcnode-id="653" instrument_node="">
</span><div class="component-text" data-dcnode-id="615"><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">To model a photonic component, you need to consider material and optical properties. At the device level, these properties are usually:</span></p><span data-dcnode-id="649" instrument_node="">
</span><ul data-dcnode-id="638"><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The refractive index of the material stack versus the wavelength, represented by the real and imaginary part of it (also known as optical performance)</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Values of pre-characterized components or validated components&nbsp;</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Analytical models to predict the performance (when real data are not available)</span></li><span data-dcnode-id="639" instrument_node="">
</span></ul><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">The material and optical properties for the photonic component can be represented as a building block by the S-matrix; the S-matrix describes the signal transfer between the ports of the component from the device level to the circuit/layout level to simulate the PIC.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="633" instrument_node="">These building blocks are represented as white and black boxes. The </span><i data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">black box </span></i><span data-dcnode-id="630" instrument_node="">is represented by a geometric shape, usually a rectangle with input and output ports, and it contains linear and non-linear models (or values from pre-characterized components) that represent the performance of the component; they are called black boxes because the designer can see only the input and output ports, while the foundry owns the relevant information of the component for fabrication. This information is loaded into the </span><i data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">white box</span></i><span data-dcnode-id="627" instrument_node=""> component when the foundry is assembling the mask (putting together all the </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.synopsys.com/glossary/what-is-a-photonic-integrated-circuit.html"><span data-dcnode-id="626" instrument_node="">photonic integrated circuit</span></a><span data-dcnode-id="624" instrument_node=""> layout designs in the wafer) for fabrication. White and black boxes protect the foundry’s intellectual property because its process flow (masks, layers, and materials) cannot be seen by the designer.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Foundries use different material platforms, such as silicon photonics, InP, LiNbO3, polymer, and glass. Each material platform and foundry has (up to now) its own process flow or fabrication process which, based on the material and optical properties, determines the performance of the PICs at the physical level.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Designing a photonic integrated circuit (PIC) is not straight forward; its performance is linked to material and optical properties, which in turn are linked to geometrical shapes (light travels more or less efficiently in different geometries). The ability to design an efficient PIC comes with experience. There is a vast library of examples and papers that describe performance and design properties to help improve PIC designs.&nbsp;The following figure shows how a designer can create a very complex integrated circuit with hundreds of components from the basic and composite building blocks of a PDK. The layout shown on the right is a MDM (Mode Division Multiplexer).</span></p><span data-dcnode-id="616" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
</span></section><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span></div><span data-dcnode-id="608" instrument_node="">
</span><div class="image aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="596"><span data-dcnode-id="607" instrument_node="">
</span><div class="container" data-dcnode-id="598"><span data-dcnode-id="606" instrument_node="">
</span><div class="component-image" data-dcnode-id="600"><span data-dcnode-id="605" instrument_node="">
</span><img alt="Photonic PDK and Mode Division Multiplexer layout | Synopsys" class="img-responsive" data-dcnode-id="604" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.synopsys.com/content/dam/synopsys/optical-solutions/images/glossary-osg-pdk-photonic-pdk-diagram.jpg.imgw.850.x.jpg&amp;raw"><span data-dcnode-id="603" instrument_node="">
</span><span data-dcnode-id="601" instrument_node="">
</span></div><span data-dcnode-id="599" instrument_node="">
</span></div><span data-dcnode-id="597" instrument_node="">
</span></div><span data-dcnode-id="595" instrument_node="">
</span><div class="text aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="563"><span data-dcnode-id="594" instrument_node="">
</span><div class="background-component vert-pad-top-md vert-pad-bottom-sm" data-dcnode-id="565"><span data-dcnode-id="593" instrument_node="">
</span><div class="container" data-dcnode-id="567"><span data-dcnode-id="592" instrument_node="">
</span><section class="component-textcomp text-align-left" data-dcnode-id="569"><span data-dcnode-id="591" instrument_node="">
</span><div class="component-text" data-dcnode-id="583"><span data-dcnode-id="590" instrument_node="">
</span><h2 class="title" data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">
</span><span class="text-size-normal" data-dcnode-id="587" style="color: #5A2A82;"><span data-dcnode-id="588" instrument_node="">Where do process design kits fit in the design process? </span></span><span data-dcnode-id="586" instrument_node="">
</span></h2><span data-dcnode-id="584" instrument_node="">
</span></div><span data-dcnode-id="582" instrument_node="">
</span><div class="component-text" data-dcnode-id="571"><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="580" instrument_node="">Process design kits need to be integrated into the design flow when designing PICs. Synopsys’&nbsp;</span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.synopsys.com/photonic-solutions/pic-design-suite.html"><span data-dcnode-id="579" instrument_node="">PIC Design Suite</span></a><span data-dcnode-id="577" instrument_node="">&nbsp;from the&nbsp;</span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.synopsys.com/photonic-solutions.html"><span data-dcnode-id="576" instrument_node="">Photonic Solutions</span></a><span data-dcnode-id="574" instrument_node="">&nbsp;portfolio&nbsp;enables both PDK-driven and custom&nbsp;design, and&nbsp;it&nbsp;supports the widest portfolio of foundries offering&nbsp;Multi Project&nbsp;Wafer&nbsp;(MPW)&nbsp;Run&nbsp;access.&nbsp;&nbsp;</span></p><span data-dcnode-id="572" instrument_node="">
</span></div><span data-dcnode-id="570" instrument_node="">
</span></section><span data-dcnode-id="568" instrument_node="">
</span></div><span data-dcnode-id="566" instrument_node="">
</span></div><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span><div class="image aem-GridColumn aem-GridColumn--default--12" data-dcnode-id="550"><span data-dcnode-id="561" instrument_node="">
