</span><p class="font_8" data-dcnode-id="1554" style="font-size:20px; line-height:normal;"><span data-dcnode-id="1555" style="letter-spacing:normal;"><span data-dcnode-id="1556" style="color:#000000;"><span data-dcnode-id="1557" style="font-size:20px;"><span data-dcnode-id="1558" style="font-family:droid-naskh,serif;"><span data-dcnode-id="1559" style="font-weight:bold;"><span data-dcnode-id="1560" instrument_node="">By maintaining the dew point within the chamber and continuously drawing in moisture laden ambient air, Skywater® machines are an energy efficient source of fresh, clean drinking water even in places where no other apparent source of water exists.</span></span></span></span></span></span></p><span data-dcnode-id="1553" instrument_node="">
