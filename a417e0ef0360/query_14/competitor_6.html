</span><p data-dcnode-id="1488"><span data-dcnode-id="1493" instrument_node="">The Airowater is a humidity and temperature driven machine which creates water from the air, </span><br data-dcnode-id="1492"><span data-dcnode-id="1491" instrument_node="">using a proprietary process. These machines serve two purposes: creating water and conditioning outside </span><br data-dcnode-id="1490"><span data-dcnode-id="1489" instrument_node="">air simultaneously, making it the most unique energy efficient water generator available today!</span></p><span data-dcnode-id="1487" instrument_node="">

</span><div class="blurb_lt f-left" data-dcnode-id="1473"><span data-dcnode-id="1480" instrument_node="">
</span><h2 data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The Airowater Working Principle</span></h2><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">The Airowater utilizes the moisture content in the air to create the purest form of drinking water through a patented 4-step filtration process. The machine’s optimum performance ideally requires a minimum humidity level of approximately 50%. However, the Airowater is designed to produce sufficient amounts of water in conditions of lower humidity as well. Not just that, it also performs well in an air-conditioned environment, acting as an effective dehumidifier.</span></p><span data-dcnode-id="1474" instrument_node="">

</span><h2 data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">The Airowater Process </span></h2><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Once the air is filtered through a patented air filter process, a condensation unit receives the humid airflow from the evaporator. The condensation unit then converts the water vapour into water. This process is known as Atmospheric Condensation. Once the water is generated through this process, it is then purified via a 4 step filtration process.</span></p><span data-dcnode-id="951" instrument_node="">
