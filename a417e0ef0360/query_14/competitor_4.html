cal" data-dcnode-id="763" style="max-width: 290px;"><div class="media-hero-wrap" data-dcnode-id="772"><picture data-dcnode-id="775"><source "="" data-dcnode-id="778" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL2F0bW9zcGhlcmljLXdhdGVyLWdlbmVyYXRvci0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MjkwfSwidG9Gb3JtYXQiOiJhdmlmIn19" type="image/avif"><source "="" data-dcnode-id="777" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL2F0bW9zcGhlcmljLXdhdGVyLWdlbmVyYXRvci0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MjkwfX19"><img alt="Water tanks like these will hold the purified, reclaimed water." border="0" class="" data-dcnode-id="776" height="193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL2F0bW9zcGhlcmljLXdhdGVyLWdlbmVyYXRvci0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MjkwfX19&amp;raw" width="290"></picture><noscript data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">
			"&lt;img src="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL2F0bW9zcGhlcmljLXdhdGVyLWdlbmVyYXRvci0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MjkwfX19" width="290" alt="Water&amp;#x20;tanks&amp;#x20;like&amp;#x20;these&amp;#x20;will&amp;#x20;hold&amp;#x20;the&amp;#x20;purified,&amp;#x20;reclaimed&amp;#x20;water." border="0"&gt;"
		</span></noscript></div><div class="media-body-wrap bg-tan p-4 w-max-full text-sm text-left" data-dcnode-id="764"><div class="media-title" data-dcnode-id="771"></div><div class="media-body" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">
				Water tanks like these will hold the purified, reclaimed water.
			</span></div><div class="media-sub uppercase text-brown" data-dcnode-id="765"><span data-dcnode-id="768" instrument_node="">
				iStockphoto/</span><a class="ext-link" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thinkstock.com/"><span data-dcnode-id="767" instrument_node="">Thinkstock</span></a></div></div></div></div><p data-dcnode-id="754"><span data-dcnode-id="761" instrument_node="">All air contains at least a little </span><a data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.howstuffworks.com/environmental/earth/geophysics/h2o.htm"><span data-dcnode-id="760" instrument_node="">water</span></a><span data-dcnode-id="758" instrument_node="">. On hot, muggy days, the air feels thick and uncomfortable because it's saturated with moisture. Water generators, also known as water makers, harvest the moisture suspended in humid air. They use one of two basic methods. The most common employs technology similar to another appliance in your home, your </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.howstuffworks.com/ac.htm"><span data-dcnode-id="757" instrument_node="">air conditioner</span></a><span data-dcnode-id="755" instrument_node="">. Warm air passes over a set of coils that are chilled using refrigerant. Because cool air can't hold as much water vapor as warm air, the cold air leaves behind condensation that's routed to a drain or pan for disposal. In a water generator, the goal isn't to cool the air to make interior rooms more comfortable. The goal is to reclaim that condensation, filter it, and then store it in a carafe or other holding tank. The reclaimed water is filtered a number of times to take out airborne particles and bacteria as part of the process. If the water sits in the reservoir for longer than a day or so, it's filtered again to keep it fresh and clean.</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">This type of water generator is the most popular for domestic use. The technology is well known and understood. Air conditioners, refrigerators and dehumidifiers all use it to one degree or another. It can be an energy hog, though. Cooling-style water generators rely on compressed refrigerant cycling through the system with the help of a compressor, condenser, a pump and a fan. Some domestic water generator manufacturers claim the energy consumption is similar to running a desktop computer or small space heater in your home.</span></p><div class="sticky-container ad-container print:hidden md:hidden h-min-400 mb-6" data-dcnode-id="746"><div class="sticky top-99" data-dcnode-id="747"><p class="ad-disclaimer clear-both text-xs text-center mb-1 md:hidden" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Advertisement</span></p><div class="print:hidden md:hidden ad-inline ad-mobinline bg-gray w-max-full h-min-250" data-dcnode-id="748" id="ad-wrap-mobinline1"><div class="ad-tag h-max-250" data-dcnode-id="749" id="ad-div-mobinline1"></div></div></div></div><div class="hidden md:block print:hidden mb-6 text-center w-full clear-both" data-dcnode-id="743" id="brid-wrap" style="height: 403px;"><div class="mx-auto w-min" data-dcnode-id="744"><div class="brid" data-dcnode-id="745" id="Brid_28636134" style="width: 717px; height: 403px;"></div></div></div><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Another option, and one sometimes used in large scale applications like military or industrial use, employs a water extraction method that relies on chemistry. It uses a cocktail of chemical salts to pull water out of the air. Salt is a natural desiccant, which means that it draws and holds moisture. In desiccant based water generators, humid air passes over a salt mixture. The wet salt is then heated to the boiling point. The steam is condensed and routed to filters for processing. To save on energy, a vacuum is employed to lower the boiling point of water. One big advantage to desiccant-based atmospheric water generation is that it's more energy efficient than the other practical options currently available.</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Atmospheric water generators extract water from the surrounding air and filter it to remove particulates and bacteria. The resulting water is clean and free of chemicals and other hazards. In areas where water is scarce or polluted, atmospheric water generators are reliable sources of clean, safe water. For domestic applications, they can reduce or eliminate the need for bottled drinking water.</span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Atmospheric water generators don't work everywhere. To work effectively, a few conditions must be met: The temperature of the ambient air has to be at least a few degrees above freezing. The humidity should be above a certain concentration, too. The figure varies depending on the manufacturer and method of extraction, but 32 to 40 percent humidity is in the ball park. High altitude can also interfere with the process.</span></p><div class="sidebar-section lazyload bg-tan p-6 mb-6 loaded" data-dcnode-id="730" id="sidebar-page0-el6"><div class="text-3xl lg:text-4xl mb-2 text-royal-blue" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Green Atmospheric Water Generators</span></div><p class="text-base" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Electricity and fossil fuels aren't the only ways to power atmospheric water generators. Solar power is an energy efficient option, too. Actually, a form of passive water generation existed centuries ago: the air well (or dew harvester). It's widely believed that air wells designed to promote condensation were used by the ancient Greeks to provide water to entire communities. Technologically advanced versions of the air well are being developed today for use in areas where there is a shortage of safe drinking water.</span></p></div><div cla
