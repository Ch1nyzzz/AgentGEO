ame></div><span data-dcnode-id="1200" instrument_node="">

</span><h1 class="photo-title-main" data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">At Tsunami Products, we design and build machines that extract water from humidity in the&nbsp;air&nbsp;— efficiently and economically.</span></h1><span data-dcnode-id="1195" instrument_node="">
</span></div><span data-dcnode-id="1193" instrument_node="">
</span></div><span data-dcnode-id="1191" instrument_node="">

</span><div class="center-title" data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">
</span><h1 class="section-title" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Inside atmospheric water generator</span></h1><span data-dcnode-id="1182" instrument_node="">
</span></div><span data-dcnode-id="1180" instrument_node="">
</span><div class="w3-row-padding" data-dcnode-id="1113"><span data-dcnode-id="1179" instrument_node="">
</span><div class="w3-third-left" data-dcnode-id="1162"><span data-dcnode-id="1178" instrument_node="">
</span><p class="inside-number" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">1.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><h2 class="inside-title" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Air Intake</span></h2><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1171" instrument_node="">Atmospheric Water Generators (AWGs) extract water from humidity in the&nbsp;air. Moist ambient air is pulled into the Tsunami</span><sup data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">®</span></sup><span data-dcnode-id="1168" instrument_node=""> unit by fans. A multi-layer </span><strong class="highlight" data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">air&nbsp;filter removes dust</span></strong><span data-dcnode-id="1165" instrument_node="">, pollen, and other airborne particles.</span></p><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span><div class="w3-third" data-dcnode-id="1130"><span data-dcnode-id="1160" instrument_node="">
</span><p class="inside-number" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">2.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><h2 class="inside-title" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Water Extraction</span></h2><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1153" instrument_node="">Next, the air is drawn through a&nbsp;series of condensing coils, where water vapor is cooled down sufficiently to reach the&nbsp;dew point. This </span><strong class="highlight" data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">converts water vapor into droplets</span></strong><span data-dcnode-id="1150" instrument_node="">. Additionally, all Tsunami</span><sup data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">®</span></sup><span data-dcnode-id="1147" instrument_node=""> units use Tsunami Core Technology™&nbsp;— a&nbsp;special patented extraction chamber with a&nbsp;range of features that force water condensation&nbsp;— resulting in greater output.</span><span data-dcnode-id="1145" instrument_node=""> Water is then extracted and collected into a&nbsp;storage tank.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1142" instrument_node="">Tsunami Core Technology™ and other </span><strong class="highlight" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">proprietary improvements</span></strong><span data-dcnode-id="1139" instrument_node=""> dramatically </span><strong class="highlight" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">enhance the&nbsp;process of water extraction</span></strong><span data-dcnode-id="1136" instrument_node="">, allowing Tsunami</span><sup data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">®</span></sup><span data-dcnode-id="1133" instrument_node=""> units to achieve great energy efficiency.</span></p><span data-dcnode-id="1131" instrument_node="">
</span></div><span data-dcnode-id="1129" instrument_node="">
</span><div class="w3-third-right" data-dcnode-id="1115"><span data-dcnode-id="1128" instrument_node="">
</span><p class="inside-number" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">3.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><h2 class="inside-title" data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Water Filtration</span></h2><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">The collected water is purified through a&nbsp;multi-stage filtration system, where all the&nbsp;possible impurities and pathogens are removed. At this point, </span><strong class="highlight" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">water is completely pure</span></strong><span data-dcnode-id="1118" instrument_node=""> and safe to drink. What’s more: unlike tap water, it’s chemical-free.</span></p><span data-dcnode-id="1116" instrument_node="">
</span></div><span data-dcnode-id="1114" instrument_node="">
</span></div><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><img alt="Inside atmospheric water generator" class="inside-AWG" data-dcnode-id="1111" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/images/Inside-atmospheric-water-generator.png&amp;raw"></p><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">
</span></div><span data-dcnode-id="1105" instrument_node="">

</span><div class="fade-in-text-Q" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Will the atmosphere run out of water if&nbsp;we&nbsp;keep extracting&nbsp;it?</span></div><span data-dcnode-id="914" instrument_node="">
</span><div class="fade-in-text-A" data-dcnode-id="897"><span data-dcnode-id="913" instrument_node="">
</span><p class="answer" data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">At any moment, the&nbsp;Earth's atmosphere contains an&nbsp;astounding </span><strong class="highlight" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">37,500,000,000,000,000 gallons of water</span></strong><span data-dcnode-id="909" instrument_node="">, in the&nbsp;invisible vapor&nbsp;state.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p class="answer" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Even with the&nbsp;entire world population consuming water from atmospheric water generators, it&nbsp;would use only 0.002% of the&nbsp;water vapor… only to&nbsp;have nature replace it over and over again through a&nbsp;constant hydrological&nbsp;cycle.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p class="answer" data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">That's why atmospheric water generators provide </span><strong class="highlight" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">an&nbsp;abundant and&nbsp;renewable source</span></strong><span data-dcnode-id="900" instrument_node=""> of&nbsp;drinking&nbsp;water.</span></p><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span></div><span data-dcnode-id="894" instrument_node="">
</span><div class="less-than-1440" data-dcnode-id="871"><span data-dcnode-id="893" instrument_node="">
</span><div class="w3-half-text" data-dcnode-id="873"><span data-dcnode-id="892" instrument_node="">
</span><div class="fade-in-text-Q" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Any dehumidifier produces water as&nbsp;a&nbsp;by‑product. So,&nbsp;why&nbsp;not use&nbsp;it&nbsp;instead?</span></div><span data-dcnode-id="889" instrument_node="">
</span><div class="fade-in-text-A" data-dcnode-id="875"><span data-dcnode-id="888" instrument_node="">
</span><p class="answer" data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">While dehumidifiers, as well as air conditioners, do&nbsp;produce certain amounts of&nbsp;water, </span><strong class="highlight" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">they are inefficient&nbsp;at&nbsp;it</span></strong><span data-dcnode-id="884" instrument_node="">. Additionally, they&nbsp;are set&nbsp;up indoors, constantly recycling the&nbsp;same&nbsp;air, and so produce less and&nbsp;less&nbsp;water.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p class="answer" data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">What's important, water produced by a&nbsp;humidifier is</span><strong class="highlight" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node=""> NOT&nbsp;suitable for&nbsp;drinking!</span></strong><span data-dcnode-id="878" instrument_node=""> The&nbsp;components and materials used are NOT&nbsp;food‑grade, besides the&nbsp;water doesn’t&nbsp;go through proper filtration. Some coils are coated with special bactericides and mold reducing compounds which are highly toxic if&nbsp;ingested.</span></p><span data-dcnode-id="876" instrument_node="">
