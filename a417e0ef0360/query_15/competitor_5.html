</span><p data-dcnode-id="3516"><a data-dcnode-id="3527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.3m.com/"><span data-dcnode-id="3528" instrument_node="">3M Co.</span></a><span data-dcnode-id="3526" instrument_node=""> (</span><a data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Dmmm"><span data-dcnode-id="3525" instrument_node="">NYSE:MMM</span></a><span data-dcnode-id="3523" instrument_node="">) is fundamentally a science-based company. We produce thousands of imaginative products, and we're a leader in scores of markets - from health care and highway safety to office products and abrasives and adhesives. Our success begins with our ability to apply our technologies - often in combination - to an endless array of real-world customer needs. Of course, all of this is made possible by the people of 3M and their singular commitment to make life easier and better for people around the world. We leverage these competencies to create innovative solutions for our customers and to also provide investors with attractive long-term returns. </span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//solutions.3m.com/wps/portal/3M/en_US/3M-Purification-Inc/3MPI-US/Our-Brands/3M-Water/"><strong data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">3M Water</span></strong></a><strong data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">:</span></strong><span data-dcnode-id="3517" instrument_node=""> Water Softeners, Water Treatment, Drinking Water Systems, Filtration, Filters.</span></p><span data-dcnode-id="3515" instrument_node="">
</span><p data-dcnode-id="3508"><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aosmith.com/default.aspx%3Fid%3D42"><span data-dcnode-id="3514" instrument_node="">A.O. Smith Corporation</span></a><span data-dcnode-id="3512" instrument_node=""> (</span><a data-dcnode-id="3510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DAOS"><span data-dcnode-id="3511" instrument_node="">NYSE:AOS</span></a><span data-dcnode-id="3509" instrument_node="">) is a global leader applying innovative technology and energy-efficient solutions to products manufactured and marketed worldwide. The company is one of the world's leading manufacturers of residential and commercial water heating equipment, as well as a manufacturer of water treatment products.</span></p><span data-dcnode-id="3507" instrument_node="">
</span><p data-dcnode-id="3500"><a data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aalberts.nl/en"><span data-dcnode-id="3506" instrument_node="">Aalberts Industries N.V.</span></a><span data-dcnode-id="3504" instrument_node=""> (</span><a data-dcnode-id="3502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//de.finance.yahoo.com/q%3Fs%3Daalb.as"><span data-dcnode-id="3503" instrument_node="">Amsterdam:AALB.AS</span></a><span data-dcnode-id="3501" instrument_node="">) is a leading manufacturer and innovator of niche products and systems for the water &amp;amp; gas supply and irrigation markets. We offer smart connection technology, water and gas meter connection kits, prefabricated gas pipeline systems and solutions for construction or renovation with a strong focus on increasing the ease of installation and lowering the total cost of ownership. Our innovative portfolio for municipal water &amp; gas distribution, industrial fluids and waste water finds its way to network operators, infrastructure contractors, wholesalers and installers worldwide.</span></p><span data-dcnode-id="3499" instrument_node="">
</span><p data-dcnode-id="3492"><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.abtechindustries.com/"><span data-dcnode-id="3498" instrument_node="">AbTech Holdings, Inc</span></a><span data-dcnode-id="3496" instrument_node=""> (</span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DABHD"><span data-dcnode-id="3495" instrument_node="">OTC:ABHD</span></a><span data-dcnode-id="3493" instrument_node="">) AbTech Industries, Inc. (a subsidiary of Abtech Holdings, Inc.) is a full-service environmental technologies and engineering firm dedicated to providing innovative solutions to communities, industry and governments addressing issues of water pollution and contamination. Its products are based on polymer technologies capable of removing hydrocarbons, sediment and other foreign elements in stormwater runoff (ponds, lakes and marinas), flowing water (curbside drains, pipe outflows, rivers and oceans), and industrial process and wastewater. AbTech's offerings include the ground-breaking new antimicrobial technology called Smart Sponge® Plus. This technology is effective in reducing coliform bacteria found in stormwater, industrial wastewater, and municipal wastewater. Smart Sponge® Plus is registered with the Environmental Protection Agency (Registration #86256-1). AbTech's teams of water treatment technology experts, civil and environmental engineers, and field operations specialists develop solutions to improve the quality of our limited water resources. AEWS Engineering (a subsidiary of Abtech Holdings, Inc.), is an independent civil and environmental engineering firm partnered with top research and engineering universities. By focusing on bringing new engineering and technology innovation to the water infrastructure sector, AEWS is positioned to be at the forefront of stormwater Best Management Practices development and to deliver the latest in design excellence to its customers.</span></p><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3484"><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aceaspa.it/Home.aspx%3Flang%3Den"><span data-dcnode-id="3490" instrument_node="">ACEA SpA</span></a><span data-dcnode-id="3488" instrument_node=""> (</span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//it.finance.yahoo.com/q%3Fs%3Dace%26m%3DMI%26d%3D"><span data-dcnode-id="3487" instrument_node="">Milan:ACE.MI</span></a><span data-dcnode-id="3485" instrument_node="">) is an industrial Group which focuses on the consolidation and creation of value from its two main activities, energy and water. Stock market listed since 1999, it deals with the management of energy, environmental and water services: the production, sale and distribution of energy, the development of renewable sources, the disposal and creation of energy from waste, the public and artistic lighting, and an integrated water service (aqueducts, sewerage and purification). Acea has always taken seriously its corporate social responsibility, and pays particular attention to all stakeholders, profitability, service quality and sustainable development.</span></p><span data-dcnode-id="3483" instrument_node="">
</span><p data-dcnode-id="3476"><a data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ads-pipe.com/"><span data-dcnode-id="3482" instrument_node="">ADVANCED DRAINAGE SYSTEMS</span></a><span data-dcnode-id="3480" instrument_node=""> (</span><a data-dcnode-id="3478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finance.yahoo.com/quote/WMS%3Fp%3DWMS%26.tsrc%3Dfin-srch"><span data-dcnode-id="3479" instrument_node="">NYSE:WMS</span></a><span data-dcnode-id="3477" instrument_node="">) is the leading manufacturer of high performance thermoplastic corrugated pipe, providing a comprehensive suite of water management products and superior drainage solutions for use in the construction and infrastructure marketplace. Its innovative products are used across a broad range of end markets and applications, including non-residential, residential, agriculture and infrastructure applications. The Company has established a leading position in many of these end markets by leveraging its national sales and distribution platform, overall product breadth and scale and manufacturing excellence. Founded in 1966, the Company operates a global network of approximately 55 manufacturing plants and over 30 distribution centers.</span></p><span data-dcnode-id="3475" instrument_node="">
</span><p data-dcnode-id="3468"><a data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aecom.com/"><span data-dcnode-id="3474" instrument_node="">AECOM Technology Corporation</span></a><span data-dcnode-id="3472" instrument_node=""> (</span><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Dacm"><span data-dcnode-id="3471" instrument_node="">NYSE:ACM</span></a><span data-dcnode-id="3469" instrument_node="">) is a premier, fully integrated professional and technical services firm positioned to design, build, finance and operate infrastructure assets around the world for public- and private-sector clients. With nearly 100,000 employees — including architects, engineers, designers, planners, scientists and management and construction services professionals — serving clients in over 150 countries around the world,&nbsp;AECOM&nbsp;is ranked as the #1 engineering design firm by revenue in Engineering News-Record magazine's annual industry rankings, and has been recognized by&nbsp;Fortune&nbsp;magazine as a World's Most Admired Company. The firm is a leader in all of the key markets that it serves, including transportation, facilities, environmental, energy, oil and gas, water, high-rise buildings and government. AECOM&nbsp;provides a blend of global reach, local knowledge, innovation and technical excellence in delivering customized and creative solutions that meet the needs of clients' projects.</span></p><span data-dcnode-id="3467" instrument_node="">
</span><p data-dcnode-id="3454"><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.home.agilent.com/agilent/home.jspx%3Fcc%3DUS%26lc%3Deng%26cmpid%3D4533"><span data-dcnode-id="3466" instrument_node="">Agilent Technologies Inc</span></a><span data-dcnode-id="3464" instrument_node="">. (</span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DA%26.yficrumb%3DcynNqj1q4C3"><span data-dcnode-id="3463" instrument_node="">NYSE:A</span></a><span data-dcnode-id="3461" instrument_node="">) is the world's premier measurement company and a technology leader in chemical analysis, life sciences, electronics and communications. The company serves customers in more than 100 countries. </span><a data-dcnode-id="3458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.agilent.com/en-us/solutions/environmental/water-analysis"><strong data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">WATER ANALYSIS</span></strong></a><strong data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">: </span></strong><span data-dcnode-id="3455" instrument_node="">Agilent has developed a range of advanced applications for its portfolio of high-productivity instruments that deliver the sensitivity needed across a wide dynamic range. Our water analysis solutions enable precise, high-throughput analysis of trace metals in water at very low concentrations, even in the presence of matrix interference.</span></p><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3444"><a data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.awi.co.jp/english/index.html"><span data-dcnode-id="3452" instrument_node="">AIR WATER INC</span></a><span data-dcnode-id="3450" instrument_node="">.(</span><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//stocks.finance.yahoo.co.jp/stocks/detail/%3Fcode%3D4088.T"><span data-dcnode-id="3449" instrument_node="">Tokyo:4088.T</span></a><span data-dcnode-id="3447" instrument_node="">) whose operations are based on gas for industrial and medical applications, has, since its establishment in 1929, expanded its business to a great variety of fields, including chemicals, medical treatment, energy, agriculture, food products, salt, magnesia, logistics, aerosols, and mineral water. </span><a data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.awi.co.jp/english/business/new/awwater/"><span data-dcnode-id="3446" instrument_node="">Water Business</span></a></p><span data-dcnode-id="3443" instrument_node="">
</span><p data-dcnode-id="3436"><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lucas.com.au/Home.htm"><span data-dcnode-id="3442" instrument_node="">AJ Lucas Group Limited</span></a><span data-dcnode-id="3440" instrument_node=""> (</span><a data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//au.finance.yahoo.com/q%3Fs%3DAJL.AX%26x%3D22%26y%3D7"><span data-dcnode-id="3439" instrument_node="">ASX:AJL.AX</span></a><span data-dcnode-id="3437" instrument_node="">) is a specialist service provider to the energy, mining and infrastructure sectors. Lucas' experience in the water sector includes the design, supply and construction of water and sewerage treatment plants, terrestrial and marine pipelines, water storage facilities and on-farm irrigation systems as well as sewer mains and reticulation networks using HDD and trenchless drilling technology. Recent projects include the South Perth Desalination Plant in Western Australia and the Robertson Re-Use and Sewer Reticulation Project in New South Wales</span></p><span data-dcnode-id="3435" instrument_node="">

ment_node="">Industrial water &amp; waste treatment</span></a><span data-dcnode-id="3423" instrument_node="">, </span><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alfalaval.com/industries/water-waste-treatment/Fresh-water/"><span data-dcnode-id="3422" instrument_node="">Fresh Water</span></a></p><span data-dcnode-id="3419" instrument_node="">

="3365" instrument_node="">

y" in 2010-2013. BEWG is the flagship of Beijing Enterprises Holdings Limited ("BEHL) in the water service market. Backed by the People's Government of Beijing Municipal, BEHL's focusing its core businesses on urban natural gas distribution and infrastructure facilities. BEHL, a diversified utility conglomerate, is ranked No.1 in "Top 500 Public Utilities and Facilities Enterprises in China".</span></p><span data-dcnode-id="3192" instrument_node="">

ed under a license to Clarion Water, Inc. BioLargo's subsidiary Odor-No-More Inc., features award-winning products serving the pet, equine, military supply and consumer markets, including the Nature's Best Solution® and Deodorall® brands (</span><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.odornomore.com/"><span data-dcnode-id="3171" instrument_node="">www.OdorNoMore.com</span></a><span data-dcnode-id="3169" instrument_node="">). BioLargo's subsidiary Clyra Medical Technologies, Inc. (</span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clyramedical.com/"><span data-dcnode-id="3168" instrument_node="">www.ClyraMedical.com</span></a><span data-dcnode-id="3166" instrument_node="">) focuses on advanced wound care management.</span></p><span data-dcnode-id="3164" instrument_node="">

let devices</span></p><span data-dcnode-id="3108" instrument_node="">

</span><p data-dcnode-id="3069"><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//canadianzeolite.com/"><span data-dcnode-id="3075" instrument_node="">Canadian Zeolite Corp</span></a><span data-dcnode-id="3073" instrument_node="">. (</span><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ca.finance.yahoo.com/quote/CNZ.V/%3Fp%3DCNZ.V"><span data-dcnode-id="3072" instrument_node="">TSX:CNZ.V</span></a><span data-dcnode-id="3070" instrument_node="">) is an environmentally friendly Green Tech business well suited to today's economic environment. We are operating and have a competitive advantage in the world of zeolites given our product has been tested, applied and meets and exceeds the standards of specific markets. We are working with dedicated global advisers recognized as leaders in zeolite use. Zeolite is a naturally occurring mineral found in volcanic ash. What makes zeolites notable is their crystalline structure perforated by microscopic pores. These pores allow zeolites to act as natural filters. Zeolite can be used in raw unprocessed form or processed into specific sizes ranging from granular to powder form depending on the application. Uses include agriculture, industry, aquaculture and water treatment.</span></p><span data-dcnode-id="3068" instrument_node="">

</span><p data-dcnode-id="3050"><a data-dcnode-id="3058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cantelmedical.com/"><span data-dcnode-id="3059" instrument_node="">Cantel Medical Corp</span></a><span data-dcnode-id="3057" instrument_node=""> (</span><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DCMN"><span data-dcnode-id="3056" instrument_node="">NYSE:CMN</span></a><span data-dcnode-id="3054" instrument_node="">) is a leading global company dedicated to delivering innovative infection prevention and control products and services for patients, caregivers, and other healthcare providers which improve outcomes, enhance safety and help save lives. Our products include specialized medical device reprocessing systems for endoscopy and renal dialysis, </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cantelmedical.com/water.html"><span data-dcnode-id="3053" instrument_node="">advanced water purification equipment</span></a><span data-dcnode-id="3051" instrument_node="">, sterilants, disinfectants and cleaners, sterility assurance monitoring products for hospitals and dental clinics, disposable infection control products primarily for dental and GI endoscopy markets, dialysate concentrates, hollow fiber membrane filtration and separation products. Additionally, we provide technical service for our products.&nbsp;</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3039"><a data-dcnode-id="3047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.carnegiewave.com/"><span data-dcnode-id="3048" instrument_node="">Carnegie Wave Energy Limited</span></a><span data-dcnode-id="3046" instrument_node=""> (</span><a data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//au.finance.yahoo.com/q%3Fs%3DCWE.AX"><span data-dcnode-id="3045" instrument_node="">ASX:CWE.AX</span></a><span data-dcnode-id="3043" instrument_node="">) is the ASX-listed inventor, owner and developer of the patented CETO </span><strong data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">wave energy technology</span></strong><span data-dcnode-id="3040" instrument_node=""> that converts ocean swell into zero-emission renewable power and desalinated freshwater. Carnegie has raised over $80m to fund the development of the CETO technology and employs unique rapid prototyping utilising computational simulation, wave tank testing, scaled in-ocean testing at its private Wave Energy Research Facility and onshore/offshore test site and commercial scale in-ocean testing at Garden Island, Western Australia. CETO is designed to be the simplest and most robust wave technology globally and, after 10 years of continuous development, testing and refinement, is currently being demonstrated at commercial scale off HMAS Stirling, Australia's largest navy base, at Garden Island in Western Australia. CETO is the only ocean-tested wave energy technology globally that is both fully submerged and generates power and or desalinated water onshore. The CETO technology has been independently verified by EDF - Energies Nouvelles (EDF EN) and the French naval contractor DCNS.</span></p><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3031"><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ctinanotech.com/"><span data-dcnode-id="3037" instrument_node="">Cavitation Technologies, Inc</span></a><span data-dcnode-id="3035" instrument_node="">. (</span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Dcvat%26ql%3D1"><span data-dcnode-id="3034" instrument_node="">OTC:CVAT</span></a><span data-dcnode-id="3032" instrument_node="">) is an innovative leader in processing liquids, fluidic mixtures, emulsions and suspended solids. The Company focuses on the practical implementation of in-house innovations and breakthroughs and sees its main mission as addressing the current and future needs of major industries. Founded in 2007, CTi designs and manufactures state-of-the-art, flow-through, robust, hydrodynamic cavitation-based devices and systems; the Company develops high-efficiency processing technologies for use in edible oil refining, algal oil extraction and renewable fuel production, alcoholic beverage enhancement, water treatment and expeditious petroleum upgrading. The Company is committed to operating in a responsible manner that ameliorates its environmental impact and pioneers technologies that save and protect natural resources. The Company has commercialized its patent-pending CTi Nano Neutralization® process, offering the refiners of edible oils and fats significant yield improvements, substantial cost savings and environmental benefits. As an add-on to existing neutralization systems, the Company's patented Nano Reactor® allows refiners to significantly reduce the processing costs, increase the yield and perfect the oil's quality. The Desmet Ballestra Group, the leading global solutions provider for the edible oil and fats and biodiesel industries, has partnered with CTi to market this breakthrough technology worldwide to large-scale facilities.</span></p><span data-dcnode-id="3030" instrument_node="">

</span><p data-dcnode-id="3001"><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cbi.com/"><span data-dcnode-id="3010" instrument_node="">Chicago Bridge &amp; Iron</span></a><span data-dcnode-id="3008" instrument_node=""> (</span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Dcbi"><span data-dcnode-id="3007" instrument_node="">NYSE:CBI</span></a><span data-dcnode-id="3005" instrument_node="">) is the most complete energy infrastructure focused company in the world. With 125 years of experience and the expertise of approximately 54,000 employees, CB&amp;I provides reliable solutions while maintaining a relentless focus on safety and an uncompromising standard of quality. CB&amp;I has provided superior value and reliability to the </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cbi.com/markets/water-wastewater"><span data-dcnode-id="3004" instrument_node="">water and wastewater</span></a><span data-dcnode-id="3002" instrument_node=""> industry for more than a century. We built our first elevated water storage tank in 1894, pioneered the transition to welded steel tanks in the 1930s, and developed the original Watersphere®, Waterspheroid® and Hydropillar® storage tanks.</span></p><span data-dcnode-id="3000" instrument_node="">

ment costs of your system, and significant cost savings while reducing environmental footprints. Applying Soft Wave technology in industrial cooling tower operations reduces water evaporation, eliminates the need for chemical cleaning and will normally lead to increased cycles. These factors combine to decrease the required makeup water, and decrease the blow down water, thus saving millions of gallons of water and reducing the reliance on chemical treatment to prevent scaling, and reduce production downtime. This means potential large scale industrial cost savings through reduced wear and tear on components, reduced liability, reduced overhead, and increases in efficiency. Potential customers are numerous, from power plants, to refineries, steel factories, agricultural operations, food production plants, city water systems, and residential homes.</span></p><span data-dcnode-id="1616" instrument_node="">

</span><p data-dcnode-id="1209"><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.abtechindustries.com/"><span data-dcnode-id="1215" instrument_node="">AbTech Holdings, Inc</span></a><span data-dcnode-id="1213" instrument_node=""> (</span><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DABHD"><span data-dcnode-id="1212" instrument_node="">OTC:ABHD</span></a><span data-dcnode-id="1210" instrument_node="">) AbTech Industries, Inc. (a subsidiary of Abtech Holdings, Inc.) is a full-service environmental technologies and engineering firm dedicated to providing innovative solutions to communities, industry and governments addressing issues of water pollution and contamination. Its products are based on polymer technologies capable of removing hydrocarbons, sediment and other foreign elements in stormwater runoff (ponds, lakes and marinas), flowing water (curbside drains, pipe outflows, rivers and oceans), and industrial process and wastewater. AbTech's offerings include the ground-breaking new antimicrobial technology called Smart Sponge® Plus. This technology is effective in reducing coliform bacteria found in stormwater, industrial wastewater, and municipal wastewater. Smart Sponge® Plus is registered with the Environmental Protection Agency (Registration #86256-1). AbTech's teams of water treatment technology experts, civil and environmental engineers, and field operations specialists develop solutions to improve the quality of our limited water resources. AEWS Engineering (a subsidiary of Abtech Holdings, Inc.), is an independent civil and environmental engineering firm partnered with top research and engineering universities. By focusing on bringing new engineering and technology innovation to the water infrastructure sector, AEWS is positioned to be at the forefront of stormwater Best Management Practices development and to deliver the latest in design excellence to its customers.</span></p><span data-dcnode-id="1208" instrument_node="">

 and our most valuable natural resource, water.</span></p><span data-dcnode-id="1197" instrument_node="">

ed under a license to Clarion Water, Inc. BioLargo's subsidiary Odor-No-More Inc., features award-winning products serving the pet, equine, military supply and consumer markets, including the Nature's Best Solution® and Deodorall® brands (</span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.odornomore.com/"><span data-dcnode-id="1184" instrument_node="">www.OdorNoMore.com</span></a><span data-dcnode-id="1182" instrument_node="">). BioLargo's subsidiary Clyra Medical Technologies, Inc. (</span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.clyramedical.com/"><span data-dcnode-id="1181" instrument_node="">www.ClyraMedical.com</span></a><span data-dcnode-id="1179" instrument_node="">) focuses on advanced wound care management.</span></p><span data-dcnode-id="1177" instrument_node="">

</span><p data-dcnode-id="1162"><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.corre.com/"><span data-dcnode-id="1168" instrument_node="">Canadian Oil Recovery and Remediation Enterprises Ltd.</span></a><span data-dcnode-id="1166" instrument_node=""> (</span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ca.finance.yahoo.com/q%3Fs%3Dcvr.v%26ql%3D1"><span data-dcnode-id="1165" instrument_node="">TSX:CVR.V</span></a><span data-dcnode-id="1163" instrument_node="">) is a Canadian-based oil services company. CORRE provides full cycle oil waste management solutions to the petroleum industry. CORRE's customers are primarily in the upstream petroleum sector (oil production and drilling companies) and downstream petroleum sector (oil refinery, transportation and distribution companies). CORRE's operating lines include remediating oil-contaminated soil; treating sludge, oil based muds and drilling waste, oil recovery; automated oil storage tank cleaning, oil and gas engineering, and project management. CORRE provides its advanced environmental solutions through strategic operating partnerships with some of the most distinguished companies throughout the world.</span></p><span data-dcnode-id="1161" instrument_node="">

</span><p data-dcnode-id="1130"><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ecostim-es.com/index.php/en/"><span data-dcnode-id="1136" instrument_node="">Eco-Stim Energy Solutions, Inc</span></a><span data-dcnode-id="1134" instrument_node="">. (</span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DESES"><span data-dcnode-id="1133" instrument_node="">NasdaqCM:ESES</span></a><span data-dcnode-id="1131" instrument_node="">) is an environmentally focused oilfield service and technology company providing proprietary field management technologies and well stimulation and completion services to oil and gas producers drilling in the rapidly expanding international unconventional shale market. EcoStim's proprietary methodology and technology offers the potential to decrease the number of stages stimulated in shale plays through a unique process that predicts high probability production zones while confirming those production zones using the latest generation down-hole diagnostic tools. In addition, EcoStim offers its clients completion techniques that can dramatically reduce horsepower requirements, emissions, surface footprint and water usage. EcoStim seeks to deliver well completion services with better technology, better ecology and significantly improved economics for unconventional oil and gas producers worldwide.</span></p><span data-dcnode-id="1129" instrument_node="">

</span><p data-dcnode-id="1114"><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.enservco.com/"><span data-dcnode-id="1120" instrument_node="">Enservco Corporation</span></a><span data-dcnode-id="1118" instrument_node=""> (</span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Densv%26ql%3D1"><span data-dcnode-id="1117" instrument_node="">NYSE MKT:ENSV</span></a><span data-dcnode-id="1115" instrument_node="">) Through its various operating subsidiaries, ENSERVCO has emerged as one of the energy service industry's leading providers of hot oiling, acidizing, frac water heating and fluid management services in seven major domestic oil and gas fields, serving customers in Colorado, Kansas, Montana, New Mexico, North Dakota, Oklahoma, Pennsylvania, Ohio, Texas, Wyoming and West Virginia</span></p><span data-dcnode-id="1113" instrument_node="">

r the upstream, midstream, and downstream sectors of the energy industry comprising new construction, modifications to operational support for onshore and offshore production, gathering, refining facilities, and pipelines.</span></p><span data-dcnode-id="1097" instrument_node="">

</span><p data-dcnode-id="1080"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.frontierosi.com/"><span data-dcnode-id="1086" instrument_node="">Frontier Oilfield Services, Inc.</span></a><span data-dcnode-id="1084" instrument_node=""> (</span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DFOSI%26ql%3D1"><span data-dcnode-id="1083" instrument_node="">OTC:FOSI</span></a><span data-dcnode-id="1081" instrument_node="">) engages in the transportation and disposal of saltwater and other oilfield fluids in Texas. The company owns and operates 11 disposal wells in Texas. It serves national, integrated, and independent oil and gas exploration companies.</span></p><span data-dcnode-id="1079" instrument_node="">

</span><p data-dcnode-id="1064"><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.genoil.ca/"><span data-dcnode-id="1070" instrument_node="">Genoil Inc</span></a><span data-dcnode-id="1068" instrument_node=""> (</span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Dgnolf%26ql%3D1"><span data-dcnode-id="1067" instrument_node="">OTC:GNOLF</span></a><span data-dcnode-id="1065" instrument_node="">) is a publicly traded Canadian engineering technology development company headquartered in Edmonton Alberta, with offices in Calgary, Sherwood Park, New York City, Constanta Romania, and Dubai &amp; Abu Dhabi. Genoil offers an array of clean tech petroleum technologies. Committed to sustainability, Genoil operates two major research facilities located Canada and Romania. &nbsp;It owns and operates a world class 10 bpd hydroconversion upgrader (GHU) complete with independent water electrolysis unit for high purity hydrogen supply, hydrogen compressor, electrical substation, fired heater, low-pressure separator for vapor-liquid separation, and a PLC for automated operational control in Two Hills, Canada. Genoil's research and development (R&amp;D) personnel develop cutting edge methods and new breakthrough patents to find solutions to the world's complex energy problems. Genoil also owns several patents related the the GHU, it's water purification, well testing, sand cleaning technologies, and environmental remediation technologies. Genoil has been successful in patenting these new technologies and with a most recent patent on its sand cleaning technology. With new corporate structure, Genoil looks to make the most of the recovering world market. Through numerous technologies and market applications Genoil tracks several components and indicators to lead the way forward.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1056"><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gibsons.com/Home-Page.aspx"><span data-dcnode-id="1062" instrument_node="">Gibson Energy Inc.</span></a><span data-dcnode-id="1060" instrument_node=""> (</span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ca.finance.yahoo.com/q%3Fs%3DGEI.TO%26ql%3D0"><span data-dcnode-id="1059" instrument_node="">TSX:GEI.TO</span></a><span data-dcnode-id="1057" instrument_node="">) is a large independent integrated service provider to the oil and gas industry with operations across major producing regions throughout North America. Gibsons is engaged in the movement, storage, blending, processing, marketing and distribution of crude oil, condensate, natural gas liquids, water, oilfield waste, and refined products. The Company transports energy products by utilizing its integrated network of terminals, pipelines, storage tanks, and trucks located throughout western Canada and through its significant truck transportation and injection station network in the United States. The Company also provides emulsion treating, water disposal and oilfield waste management services through its network of processing, recovery and disposal facilities in Canada and the United States and is the second largest industrial propane distribution company in Canada. The Company's integrated operations allow it to participate across the full midstream energy value chain, from the hydrocarbon producing regions in Canada and the United States, through the Company's strategically located terminals in Hardisty and Edmonton, Alberta, and injection stations and terminals in the United States, to the end user or refineries of North America.</span></p><span data-dcnode-id="1055" instrument_node="">

l, condensate, and NGLs) in the Appalachian region, leveraging off of our existing asset base and infrastructure, which includes up to six different barge terminal locations, presently owned or leased by GreenHunter Resources.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1037"><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//interceptenergy.ca/"><span data-dcnode-id="1046" instrument_node="">Intercept Energy Services Inc.</span></a><span data-dcnode-id="1044" instrument_node=""> (</span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Diescf%26ql%3D1"><span data-dcnode-id="1043" instrument_node="">OTC: IESCF</span></a><span data-dcnode-id="1041" instrument_node="">; </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ca.finance.yahoo.com/q%3Fs%3Dies.v%26ql%3D1"><span data-dcnode-id="1040" instrument_node="">TSX: IES.V</span></a><span data-dcnode-id="1038" instrument_node="">) employs innovative and proprietary technology to provide the highest efficiency heated water, used by oil and gas exploration and production companies; in the fracturing process in Canada and the United States. Through the utilization of HE Heaters(TM), IES is able to reduce fuel consumption and emissions, enhances safety and productivity, enable extreme cold weather operations with significantly lower operating costs that result in a direct competitive advantage for its customers.</span></p><span data-dcnode-id="1036" instrument_node="">

</span><p data-dcnode-id="1005"><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nuverra.com/"><span data-dcnode-id="1011" instrument_node="">Nuverra Environmental Solutions</span></a><span data-dcnode-id="1009" instrument_node=""> (</span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Dnes%26ql%3D1"><span data-dcnode-id="1008" instrument_node="">NYSE: NES</span></a><span data-dcnode-id="1006" instrument_node="">) is among the largest companies in the United States dedicated to providing comprehensive and full-cycle environmental solutions to customers in the energy market. Nuverra focuses on the delivery, collection, treatment, recycling, and disposal of restricted solids, water, wastewater, waste fluids and hydrocarbons. The Company continues to expand its suite of environmentally compliant and sustainable solutions to customers who demand stricter environmental compliance and accountability from their service providers.</span></p><span data-dcnode-id="1004" instrument_node="">

</span><p data-dcnode-id="975"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.republicservices.com/"><span data-dcnode-id="981" instrument_node="">Republic Services, Inc.</span></a><span data-dcnode-id="979" instrument_node=""> (</span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3Drsg"><span data-dcnode-id="978" instrument_node="">NYSE:RSG</span></a><span data-dcnode-id="976" instrument_node="">) is an industry leader in U.S. recycling and non-hazardous solid waste. Through its subsidiaries, Republic's collection companies, recycling centers, transfer stations and landfills focus on providing effective solutions to make proper waste disposal effortless for their commercial, industrial, municipal, residential and oilfield customers. We'll handle it from here™, the brand's tagline, lets customers know they can count on Republic to provide a superior experience while fostering a sustainable Blue Planet™ for future generations to enjoy a cleaner, safer and healthier world.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="967"><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.robixfuels.com/"><span data-dcnode-id="973" instrument_node="">Robix Environmental Technologies Inc</span></a><span data-dcnode-id="971" instrument_node="">. (</span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thecse.com/en/listings/cleantech/robix-environmental-technologies-inc"><span data-dcnode-id="970" instrument_node="">CSE:RZX</span></a><span data-dcnode-id="968" instrument_node="">; Frankfurt: ROX) is an "industrial products/technology" company, offering to investors a unique opportunity to participate in a leading company in the business of ownership of patents, and their development from commercialization to worldwide expansion through various business arrangements. Robix owns a Clean Ocean Vessel ("COV") patent, which is an oil spill recovery vessel design with the capability to recover oil in rough and debris laden sea conditions. Robix has recognized a worldwide market opportunity for effective containment, recovery and disposal equipment, particularly in the oil spill protection industry, and it proposes to develop a business model as a service provider, and/or equipment provider under licensing agreements with other industry participants, wherein Robix will use its COV patented design solution.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="959"><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seair.ca/"><span data-dcnode-id="965" instrument_node="">Seair Inc.</span></a><span data-dcnode-id="963" instrument_node=""> (</span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ca.finance.yahoo.com/q%3Fs%3DSDS.V"><span data-dcnode-id="962" instrument_node="">TSX:SDS.V</span></a><span data-dcnode-id="960" instrument_node="">) is a water technology corporation active at the heart of water-energy nexus that provides proprietary diffusion technology with global applications in several industry sectors such as oil &amp; gas, mining, municipal and industrial wastewater. The Company's proprietary commercialized technology solves critical oil-water separation (de-oiling) challenges cost-effectively by diffusing gases such as oxygen, ozone, nitrogen and carbon dioxide into liquids more effectively and by reducing energy consumption. Seair has been working with customers in the oil and gas industry for over five years. Seair's applications include oil sands SAGD water solutions, frac and produced water treatment, industrial ponds treatment, mine dewatering/treatment, end-to-end sewage treatment for permanent residential communities and remote work camps, golf course irrigation and pond treatment and industrial emissions treatment.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="951"><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sionix.com/"><span data-dcnode-id="957" instrument_node="">Sionix Corporation</span></a><span data-dcnode-id="955" instrument_node=""> (</span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//finance.yahoo.com/q%3Fs%3DSINX"><span data-dcnode-id="954" instrument_node="">OTC:SINX</span></a><span data-dcnode-id="952" instrument_node="">) designs innovative and advanced mobile water treatment systems (MWTS) with our patented and proprietary DAF technology as the heart of our systems. Our systems are designed for use in energy, government facilities, healthcare facilities, emergency water supplies during natural disasters, housing development projects, as pre-treatment for desalination and other membrane filtration applications, and various industrial processes including subterranean fracturing used in oil and gas drilling.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="943"><a data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thermaxindia.com/"><span data-dcnode-id="949" instrument_node="">Thermax</span></a><span data-dcnode-id="947" instrument_node=""> (</span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//in.finance.yahoo.com/q%3Fs%3DTHERMAX.BO%26ql%3D1"><span data-dcnode-id="946" instrument_node="">BSE: THERMAX.BO</span></a><span data-dcnode-id="944" instrument_node="">) provides engineering solutions to the energy and environment sectors in India and internationally. It operates in two segments, Energy and Environment. The company offers air pollution control products, including bag filters, wet scrubbers, and electrostatic precipitators; absorption systems comprising absorption chillers, heat pumps, solar-based cooling products, and air cooled heat exchangers; boilers, such as waste heat recovery and solar-based heating systems, municipal waste and large industrial boilers, hot water generators, and packaged boilers; and fired and thermal oil heaters. It also provides water treatment, sugar and paper industry, oilfield, green, construction, and fireside chemicals, as well as ion exchange resins and fuel additives; EPC power plants; solar thermal and photovoltaic solutions; and water and waste management systems and solutions, such as water treatment, effluent and sewage treatment and recycling, and incineration systems and solutions. In addition, the company offers steam accessories, including condensate recovery systems, steam traps, pre-fabricated modules, pressure reducing stations, pressure reducing and desuper heating systems, valves, steam line mountings, boiler house products and monitoring equipment, and specialty products. Further, it provides energy, retrofit and revamp, waste water treatment, turnkey project execution, large boiler, customer training, and specialized services and solutions; packaged boilers and peripherals, and power plants operation and maintenance services; and spares. The company serves oil and gas, steel, automobile, food, cement, chemical, refinery and petrochemical, power generation, textile, pharmaceutical, paper and pulp, tank farm heating, space heating, sugar, paint, rubber, and edible oil industries; hotels and commercial complexes; EPC majors and consultants; distilleries; and municipalities.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="935"><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.titaniumcorporation.com/"><span data-dcnode-id="941" instrument_node="">Titanium Corporation Inc.</span></a><span data-dcnode-id="939" instrument_node=""> (</span><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ca.finance.yahoo.com/q%3Fs%3Dtic.v"><span data-dcnode-id="938" instrument_node="">TSX:TIC.V</span></a><span data-dcnode-id="936" instrument_node="">) CVW™ technology provides sustainable solutions to reduce the environmental footprint of the oil sands industry. Our technology reduces the environmental impact of oil sands tailings while economically recovering valuable products that would otherwise be lost. CVW™ recovers bitumen, solvents and minerals from tailings, preventing these commodities from entering tailings ponds and the atmosphere: volatile organic compound and greenhouse gas emissions are materially reduced; hot tailings water is improved in quality for recycling; and residual tailings can be thickened more readily.</span></p><span data-dcnode-id="934" instrument_node="">

d line of topical and ingestible products. These products are made with lab-tested full-spectrum hemp and include salves, balms, lotions, essential oils, bath-salts, CBD infused drinks, beverage shots, tinctures, capsules, gummies, and powder packs.</span></p><span data-dcnode-id="758" instrument_node="">

bution system.</span></p><span data-dcnode-id="742" instrument_node="">

f over 2,100 routes. Cott operates manufacturing and distribution facilities in the United States, Canada, the United Kingdom and Mexico. Cott also develops and manufactures beverage concentrates, which it exports to countries around the world.</span></p><span data-dcnode-id="662" instrument_node="">
