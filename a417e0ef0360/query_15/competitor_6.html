B.1       Problem Solving
Most of the problems in this text can be completed without reference to additional material
than is in the text. In some cases, new information is introduced in the problem statement to
extend the readers knowledge.
    In some cases data files may be needed. These are available on the web site of the Wind
Energy Center at the University of Massachusetts (http://www.umass.edu/windenergy/).
This site also contains the Wind Engineering MiniCodes that have been developed at the
University of Massachusetts at Amherst. A number of these codes may be useful in solving
problems and, in some cases, may be needed to solve problems. The Wind Engineering
MiniCodes are a set of short computer codes for examining wind energy related issues,
especially in the context of an academic setting.
    A number of files are used in the problems. In addition, a number of the problems have
solutions which are illustrated in spreadsheet files. Lists of these files are provided at the
end of this document.
    It has been discovered that some problems have errors in the problem statements. This
obviously makes it difficult to solve the problem. A full list of errata and corrected problem
statements can also be found at the same web site mentioned above
(http://www.umass.edu/windenergy).         The problem statements included with these
solutions have already been corrected.

3.13 Assume a VAWT operates with an axial unduction factor of 0.3 and with a tip speed
ratio of 12. Equations 3.147 and 3.149 can be used to determine the ratio of Urel to U and
the angle of attack. Equations 3.148 and 3.150 can be used estimate those same quantities
for high tip speed ratios. What is the maximum percentage deviation of the estimates of
these quanties from the exact values as the blade of the VAWT makes one full rotation? If
the blades are replaced and now the turbine operates at a tip speed ratio of 20 and the same
axial induction factor?

SOLUTION

solution can be found in VAWT_High Tipspeed Approximations_Solution.xls.

5.10 The parameters of an induction machine can be estimated from test data taken under a
few specified conditions. The two key tests are the no-load test and blocked-rotor test.
Under the no-load test, the rated voltage is applied to the machine and it is allowed to run at
no-load (i.e. with nothing connected to the shaft). In the blocked-rotor test the rotor is
prevented from turning and a reduced voltage is applied to the terminals of the machine. In
both cases the voltage, current and power are measured. . Under the no-load test, the slip is
essentially equal to 0, and the loop with the rotor parameters may be ignored. The
magnetizing reactance accounts for most of the impedance and can be found from the test
data. Under blocked-rotor conditions, slip is equal to 1.0 so the magnetizing reactance can
be ignored, and the impedance of the leakage parameters can be found. A third test can be
used to estimate the windage and friction losses. In this test the machine being tested is
driven by a second machine but it is not connected to the power system. The power of the
f84                                                                                 Wind Energy Explained


second machine is measured, and from that value is subtracted the latter's no-load power.
The difference is approximately equal to the test machine's windage and friction.
    In a simplified version of the analysis, all of the leakage terms may be assumed to be on
the same side of the mutual inductance, as shown in Figure B.5. In addition, the resistance

8.1 Wind power has been used for centuries for productive purposes. One early yaw
control system for windmills, invented by Meikle about 1750, used a fan tail and gear
system to turn the rotor into the wind. The windmill turret supported the rotor that faced
into the wind. The fan tail rotor, oriented at right angles to the power producing rotor, was
used to turn the whole turret and rotor (see Figure B.8). The gear ratio between the fan tail
rotor shaft rotation and the turret rotation was about 3000:1. Explain the operation of the
yaw orientation system, including the feedback path that oriented the rotor into the wind.



                   Fan tail rotor
                                                                   Main rotor




                                            Power shaft


Figure B.8 Meikle yaw control
fProblems                                                                                     121


SOLUTION

The torque from the rotor drove the mill and resulted in a net torque on the power shaft.
That torque would drive the turret, including the fan tail rotor out of the wind. As the yaw
error increased, the aerodynamic torque on the fan tail rotor would produce a counter
torque, to stabilize the yaw position. The system would operate with a yaw error that
depended on the design and wind speed. The yaw error sensor (the fan tail) produced a
torque that increased as the yaw error increased from the desired set point (no yaw error).
The 3000:1 gear reduction provided the force amplification to turn the turret.

8.2 A supervisory control system, as part of its tasks, is to monitor gearbox operation and
the need for gearbox maintenance or repairs. What information should be collected by the
supervisory controller and what information should be reported to the system operators?

SOLUTION

Numerous variations on input information and reporting might be acceptable, but important
input sensor information should include operating temperatures (bearing or lubricant
temperatures), gearbox vibration, lubricant level, and measures of lubricant circulation
system operation (flow, pressure, or power, etc.). Operators should be appraised of total
operating hours on the gearbox and lubrication systems, peak vibration and temperature
levels, low lubricant levels, and hours since the last regular maintenance work. Additional
information might include files of sensor data collected at frequent intervals, long term
temperature trends, and correlations between other operating measures and gearbox
operation (gearbox temperatures as a function of power, etc.).

8.3 A variable speed wind turbine control system uses blade pitch and speed variations to
provide constant power to the grid. What are the tradeoffs between fluctuations in rotor
speed and the time response of the pitch control system?

SOLUTION

In a variable speed wind turbine, the converter is set to provide constant power or torque as
wind speed fluctuations cause rotor speed changes. The blade pitch is used to smooth out
the rotor speed fluctuations. A slower time response of the pitch control system would
allow the rotor speed to increase or decrease more than with a faster pitch control system.
This has the advantage of possibly reducing pitch system loading and wear, but may result
in undesirable excursions in rotor speed. Faster pitch system response increases pitch
motor power requirements and loads in the pitch system and blades.

8.4 An accelerometer on an experimental wind turbine is used to measure tower vibration.
Measurements indicate that the sensor is very sensitive to temperature variations. To
complete a series of tests in cold weather the test engineers rig up a quick electrical heating
element and controller to keep the sensor's temperature constant. The system includes 1) a
small electronic chip that provides a millivolt output that varies with temperature, 2) an
electronic circuit, 3) a transistor, 4) a resistance heater, and 5) a housing to encase the chip,
f122                                                                     Wind Energy Explained


the heater, and the accelerometer. The electronic circuit provides a voltage output related to
the difference between the voltages at the two inputs. A small current (milliamps) flows
into the transistor that is a function of the circuit output voltage. The transistor uses that
current to provide up to two amps of current to the heater. The heater maintains the
temperature in the enclosure at 70 F.

    a) What is the process that is being influenced by the control system?
    b) What elements play the roles of the sensor(s), the controller, the power amplifier, and
the actuator?
    c) What if any are the disturbances in the system?

SOLUTION

a) The process that is being influenced by the control system is the energy balance between
the accelerometer and components inside the enclosure and the environment on the outside
of the enclosure. The introduction of the heating element and the controller adds a heat
source inside the enclosure, increasing the temperature inside the enclosure and increasing
the heat transfer from the enclosure.
    b) The chip is the sensor that responds to temperature changes and the electronic circuit
is the controller that responds to differences between the enclosure temperature and the
desired enclosure temperature. The transistor is the power amplifier. It takes the small
current from the circuit and controls a much larger current that is capable of providing heat.
The actuator is the resistance heating element.
    c) The heat transfer from the outside of the enclosure is a disturbance to the system.
This is mainly a function of ambient temperature, but also of wind speed and possibly the
presence of snow, ice, rain, or dirt.

8.7 A wind turbine manufacturer wants to design a yaw drive control system. To minimize
wear on the drive gears the yaw is to be locked with a yaw brake until the 10 minute time-
averaged yaw error is more than some specified amount (the "yaw error limit"). At that
point the yaw drive would move the turbine to face the previously determined 10 minute
time-averaged wind direction.
   a) What consequences does the choice of yaw error limit and averaging time have on
machine operation?
   b) What approach would you take to determining the quantitative tradeoffs between
yaw error limit and other factors?

SOLUTION

a) Decreased averaging time and decreased yaw error limits would increase the actions of
the yaw drive. A larger yaw error limit or a longer averaging time would reduce the
operating hours of the yaw drive but increased time at higher yaw errors. High yaw error
operation decreases energy capture and may increase machine loads and, consequently,
component fatigue. High yaw error operation might also increase electrical power
fluctuations, depending on the generator system, and tower torsional fatigue, depending on
the yaw system design. Thus, tradeoffs exist between the operating hours of the yaw drive
and energy capture and machine life.
    b) Two approaches can be used to analyze the consequences of different yaw error
limits: time series simulations and statistical approaches.
    The first issue to recognize is that the time between yaw orientation corrections may be
very site dependent. In turbulent conditions or as weather fronts pass, more yaw
corrections may be required because the wind direction is changing rapidly or frequently.
In flat sites with constant prevailing winds, few corrections may be required. On the other
hand, at sites with diurnal sea and land breezes the turbine may have to rotate at least once
a day. This rotation might happen in few or in many steps.
    Thus, an analysis might start with a representative time series of wind direction data.
From this one could develop 1) a file of running averages, based on the running averaging
time to be investigated for use in the controller, and 2) a histogram of averaged yaw errors
that would occur between yaw motions. These histograms could be used with turbine
fProblems                                                                                   129


models to determine loads, electrical power, and energy capture for different yaw errors
and to develop overall estimates of component fatigue, yaw system operating hours, and
energy capture.

8.11 If it is required that a digital control system determine the system behavior at
frequencies of at least 10 Hz, a) what is the minimum sampling frequency that can be used
and b) what cut-off frequency should be used to filter the input data?

SOLUTION

frequency. Filtering frequencies above 10 Hz is required to make sure that higher
frequency components do not affect the signal.

    a) The maximum renewable energy that can possibly be used in an ideal system.
    b) The maximum renewables contribution without storage, and the maximum with
storage.
    c) The maximum fuel savings that can be achieved.
    d) The minimum diesel fuel use that can be achieved with intelligent use of storage and

SOLUTION

The hybrid system design rules are:

Rule 1: The maximum renewable energy that can be used is limited by the load.
Rule 2: The use of renewable energy will be further limited by temporal mismatch
        between the load and the renewables.
Rule 3: The maximum possible benefit with improved controls or operating strategies is a
        system approaching the fuel use of the ideal diesel generator - fuel use
        proportional to the diesel-served load.
Rule 4: The maximum fuel savings arising from the use of renewables in an optimised
        system is never greater than the fuel savings of an ideal generator supplying the
        proportional reduction in load resulting from use of renewables.

    a) Based on rule number 1, the maximum renewables contribution with any system
cannot be larger than the load. Thus the maximum renewables contribution over the day
would be 1338 kWh, the total daily energy need.
    b) Based on the rules 1 and 2, the maximum renewables contribution in any hour
without storage is the same as the load, if it is smaller than the available wind power, or the
available wind power. An examination of the data shows that the maximum renewables
contribution without storage would be 819 kWh. The maximum with storage would be the
total daily load if it were less than the total available wind power, or the total available
wind power. The total daily load is 1338 kWh; the total available wind power over the day
is 913 kWh. Thus the maximum renewables contribution with storage is 913 kWh.
    c) The total fuel use of the original system is 1338(1/4)+ 24(3) = 406.5 liters/day. The
maximum fuel savings occurs with optimum use of storage, controls and renewables.
Under these conditions, the diesel load with would be 1338 – 913 = 425 kWh. The fuel use
of an optimised system would be ¼ l/kWh or 106.25 l/day, a savings of 300.25 l/day.

use of storage and controls (and without renewables) is that part of the fuel use that is not
proportional to the load: 24 hrs of 3 l/hr = 72 l/day.

11.8 A proposed wind farm installation is based on the use of thirty 2 MW wind turbines.
The installed capital cost is estimated at $1000/kW and the annual operation and
maintenance costs are estimated to be 3% of the original capital cost. Financing for the
project is to come from two sources: 1) A 20 year loan at 7% (75%), and 2) an equity
investment that has a return of 15% (25%). The average capacity factor of the wind farm is
estimated to be 0.35. Determine the estimated cost of energy ($/kWh) from this proposed
wind farm.

SOLUTION

The solution to this problem will be based on the use of Equation 11.20 thus we need to
calculate all the annual costs plus the annual electrical production.

For the loan ($45 x 106) the annual payment is found using Equation 11.12 and is equal to
$4.25 x106/yr.

The return on the equity ($15 x 106) is equal to 15 x 106 x 0.15 = $2.25 x 106/yr

Annual O&amp;M costs are equal to 0.03 x $60 x 106 = $1.8 x 106

Thus, the total annual costs are $(4.25 + 2.25 + 1.8) x 106 = $8.3 x 106.

The annual energy production is equal to: 30 x 2 x 1000 x 8760 x 0.35 kWh/yr =1.84 x 108
kWh/yr, so the cost of energy is calculated as $8.3 x 106/ 1.84 x 108 = $0.045/ kWh
