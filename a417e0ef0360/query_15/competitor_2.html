</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3945" id="Sec4"><span data-dcnode-id="3946" instrument_node="">Synergistic bioenergy harvesting</span></h3><p data-dcnode-id="3925"><span data-dcnode-id="3944" instrument_node="">To demonstrate the synergistic effect of between TEG modules and BFC modules, a typical activity session has been simulated by applying constant 1 Hz–1.5 Hz sliding motions and spiking of 10–15 mM lactate fuel. Using this setting, three scenarios have been simulated: (i) movement starts followed by the start of perspiration; (ii) movements and perspiration taking place simultaneously; and (iii) movements stop but the perspiration continues. In the 4-min simulations, two TEG modules rectified by a bridge rectifier and one BFC module modulated by a DC voltage booster were used to charge one SC module (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3942" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3943" instrument_node="">21</span></a><span data-dcnode-id="3941" instrument_node="">). Each scenario was tested with only the TEG (blue curve), only the BFC (green curve), and both modules operating together (red curve). As shown in Fig.&nbsp;</span><a data-dcnode-id="3939" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3940" instrument_node="">5a</span></a><span data-dcnode-id="3938" instrument_node="">, during the starting phase, the TEG module was able to charge the SC module immediately after starting the movement, whereas the BFC module was not able to provide power due to the lack of lactate. When lactate was spiked, the BFC started to respond to the fuel addition to provide power to the SC. The additive effect of integrating two complementary energy harvesters can be observed throughout the rest of the simulation, where their charging speed surpasses the individually operating harvesters. Such additive effect continued throughout the scenario (ii) and the first half of the scenario (iii). As soon as the sliding motion stopped, the TEG module stopped its operation instantaneously. In contrast, the BFC module continued to operate due to the presence of the lactate fuel to charge the SC module without interruption. Beyond the additive effects of two energy harvesters, the advantage of integrating the complementary TEG and BFC modules was demonstrated: at the start of the movement, the fast-booting TEG module can compensate for the slow-booting of the BFC; in return, the transiently harvesting TEG module was compensated by the extended-operating BFC module after the movement stops, as illustrated in Fig.&nbsp;</span><a data-dcnode-id="3936" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3937" instrument_node="">1b</span></a><span data-dcnode-id="3935" instrument_node="">. This synergistic behavior, not offered by any previous studies, is highly desirable for the reliable and sustainable operation of a self-powered wearable system. As expected, the charging speed of the 1 Hz sliding, 10 mM lactate simulation condition (Fig.&nbsp;</span><a data-dcnode-id="3933" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3934" instrument_node="">5a(i)-(iii)</span></a><span data-dcnode-id="3932" instrument_node="">) was the slowest amongst all three, followed by the 1.5 Hz sliding, 10 mM lactate condition (Fig.&nbsp;</span><a data-dcnode-id="3930" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3931" instrument_node="">5a(iv)-(vi)</span></a><span data-dcnode-id="3929" instrument_node="">), with the 1.5 Hz sliding, 15 mM lactate condition charging the capacitor fastest (Fig.&nbsp;</span><a data-dcnode-id="3927" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3928" instrument_node="">5a(vii)-(ix)</span></a><span data-dcnode-id="3926" instrument_node="">). In all three situations, the synergistic additive effect was observed in all 3 phases of the condition, and the complementary fast-boosting and extended-harvesting effects were observed for the starting and ending phases of all 3 conditions, correspondingly.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3890" data-test="figure" data-title="In-vitro and on-body charging performance of the wearable bioenergy microgrid system." id="figure-5"><figure data-dcnode-id="3891"><figcaption data-dcnode-id="3922"><b class="c-article-section__figure-caption" data-dcnode-id="3923" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="3924" instrument_node="">Fig. 5: In-vitro and on-body charging performance of the wearable bioenergy microgrid system.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3902"><div class="c-article-section__figure-item" data-dcnode-id="3917"><a class="c-article-section__figure-link" data-dcnode-id="3918" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/5" rel="nofollow"><picture data-dcnode-id="3919"><source data-dcnode-id="3921" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-021-21701-7/MediaObjects/41467_2021_21701_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="3920" height="1260" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-021-21701-7/MediaObjects/41467_2021_21701_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3903" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="3904"><b data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">a</span></b><span data-dcnode-id="3914" instrument_node=""> In-vitro charging curves of the individual and integrated harvester with (i)-(iii) 1 Hz frequency and 10 mM lactate; (iv)-(vi) 1.5 Hz frequency and 10 mM lactate; and (vii)-(ix) 1.5 Hz and 15 mM lactate for the TEG modules and the BFC modules, which simulate three representative phases: starting ((i), (iv), and (vii)), exercising((ii), (v), and (viii)) and ending((iii), (vi), and (ix)) of an activity session. </span><b data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">b</span></b><span data-dcnode-id="3911" instrument_node=""> Photo illustration of the on-body testing arrangement. </span><b data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">c</span></b><span data-dcnode-id="3908" instrument_node=""> On-body charging of a 150 μF SC using the individual BFC or TEG module alone, and with both modules combined, in a 10-min exercise session followed by a 20-min resting. </span><b data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">d</span></b><span data-dcnode-id="3905" instrument_node=""> On-body charging of capacitors from SCs with (i) 75 μF, (ii) 150 μF, and (iii) 300 μF from 0 V in a 30-min exercise session to represent the charging of the system including the cold-starting phase of the voltage-booster. During the 30-min period, movement stops once the SC if fully charged to 5.1 V.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3892"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="3893" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/5" rel="nofollow"><span data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3894" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3895" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3896" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3899" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3898" fill-rule="evenodd"></path><span data-dcnode-id="3897" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3870"><span data-dcnode-id="3889" instrument_node="">The synergistic effect of the integrated energy harvesting was further characterized with on-body tests to gauge the optimal capacitance that can mostly reflect such complementary fast-booting and extended-harvesting effects. Two TEGs, two BFCs and the corresponding SC modules were printed on the left and right sides of the waist, below the collar and in front of a shirt, respectively, as shown in Fig.&nbsp;</span><a data-dcnode-id="3887" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3888" instrument_node="">1c</span></a><span data-dcnode-id="3886" instrument_node="">, and were connected via printed silver traces and enameled wires with proper insulations. A PVA-based PBS hydrogel was applied onto the BFC module for sweat capturing. A 10-min exercise session was carried out on a cycling machine, as illustrated in Fig.&nbsp;</span><a data-dcnode-id="3884" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3885" instrument_node="">5b</span></a><span data-dcnode-id="3883" instrument_node="">, where the arm-swinging frequency was kept near 1.5 Hz, followed by 20 min of resting. Similar to the in-vitro simulation, the integrated on-body system was tested with only TEG, only BFC and with all harvesters operating together. Figure&nbsp;</span><a data-dcnode-id="3881" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3882" instrument_node="">5c</span></a><span data-dcnode-id="3880" instrument_node=""> demonstrates the on-body energy harvesting performance of the integrated system. For the system operating solely on TEG modules, the energy harvesting started immediately after the arm-swinging started and charged the SC module continuously throughout the 10-min exercise session. As soon as the movement stopped, the TEG stopped supplying power, and the SC module slowly self-discharged. For the system operated solely on the BFC module, the system suffered from slow booting with a 6-min delay. However, the BFC was able to supply power to the SC module quickly after sweating started, and fully charged the SC within 17 min Upon stopping the exercise, the BFC module was able to continuously supply power to the SC module over a 30-min period, reflecting the continuous presence of sweat. Lastly, the integrated system was able to compensate for both the slow booting and the transient harvesting, quickly fully charging the SC module in 7 min, maintaining maximum voltage over a 30-min period. In addition to the data presented in Fig.&nbsp;</span><a data-dcnode-id="3878" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3879" instrument_node="">5c</span></a><span data-dcnode-id="3877" instrument_node="">, the on-body operation of the system was also tested with SC modules configurated with the capacitance of 75 μF, 150 μF, and 300 μF (Fig.&nbsp;</span><a data-dcnode-id="3875" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="3876" instrument_node="">5d</span></a><span data-dcnode-id="3874" instrument_node="">). The charging is started at 0 V instead of 2 V to demonstrate the booting of the voltage booster in the start of the operation. The SC modules were fully discharged to 0V and their potential monitored during charging, and the exercise sessions were only stopped when the SC is fully charged to 5.1 V or the limit of 30 min was reached. As shown in the figure, the time taken to fully charge the SC module increased as the capacitance increased for both the individual harvesters and the integrated microgrid harvesters. The synergistic and complementary behavior can still be observed in the booting phase of the charging, where the integrated harvesting system can fully charge the SC module faster than the individual harvesters, starting from the 4 min for 75 μF capacitor, to the 8 min for 150 μF capacitor and 12 min for the 300 μF capacitor. These results have thus validated the in-vitro simulation, fully illustrating the complementary and synergistic behaviors of the wearable microgrid system which offers fast-booting and extended-harvesting for energy harvesting in an activity session. Additional experimental details, data and discussion regarding the in-vitro and on-body tests can be found in Supplementary Note&nbsp;</span><a data-dcnode-id="3872" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3873" instrument_node="">4</span></a><span data-dcnode-id="3871" instrument_node="">.</span></p><p data-dcnode-id="3856"><span data-dcnode-id="3869" instrument_node="">Two wearable applications were selected as examples of two operating modes for demonstrating the potential and advantages of the wearable microgrid system (Fig.&nbsp;</span><a data-dcnode-id="3867" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3868" instrument_node="">6a</span></a><span data-dcnode-id="3866" instrument_node="">). The SC is an attractive energy storage module owing to its flexible discharge rates that allow powering of either low-power application continuously or of high-power application in a brief, pulsed fashion without damaging the module. For efficiently use the limited energy stored in the SC modules, the power consumption of the applications was characterized, and the SC modules were configured with minimum but sufficient capacitance for rapid booting while ensuring successful operation. Detailed fabrication and characterization procedures, additional data and further discussions can be found in&nbsp;Supplementary Notes&nbsp;</span><a data-dcnode-id="3864" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3865" instrument_node="">5</span></a><span data-dcnode-id="3863" instrument_node=""> and Supplementary Figs.&nbsp;</span><a data-dcnode-id="3861" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3862" instrument_node="">22</span></a><span data-dcnode-id="3860" instrument_node="">–</span><a data-dcnode-id="3858" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3859" instrument_node="">31</span></a><span data-dcnode-id="3857" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3803" data-test="figure" data-title="Wearable bioenergy microgrid system with different applications." id="figure-6"><figure data-dcnode-id="3804"><figcaption data-dcnode-id="3853"><b class="c-article-section__figure-caption" data-dcnode-id="3854" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="3855" instrument_node="">Fig. 6: Wearable bioenergy microgrid system with different applications.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3815"><div class="c-article-section__figure-item" data-dcnode-id="3848"><a class="c-article-section__figure-link" data-dcnode-id="3849" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/6" rel="nofollow"><picture data-dcnode-id="3850"><source data-dcnode-id="3852" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-021-21701-7/MediaObjects/41467_2021_21701_Fig6_HTML.png?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="3851" height="574" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-021-21701-7/MediaObjects/41467_2021_21701_Fig6_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3816" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="3817"><b data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">a</span></b><span data-dcnode-id="3845" instrument_node=""> Image of the LCD wristwatch and the ECD for the Na</span><sup data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">+</span></sup><span data-dcnode-id="3842" instrument_node=""> potentiometric sensor. Scale bar, 1 cm. </span><b data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">b</span></b><span data-dcnode-id="3839" instrument_node=""> Images of the LCD screen with different input voltages. </span><b data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">c</span></b><span data-dcnode-id="3836" instrument_node=""> The display of the ECD with different sensor voltage input. </span><b data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">d</span></b><span data-dcnode-id="3833" instrument_node=""> The photo image of the all-printed flexible potentiometric sensor (top) and the calibration curve of the Na</span><sup data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">+</span></sup><span data-dcnode-id="3830" instrument_node=""> sensor (bottom). Scale bar, 2 mm. </span><b data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">e-f</span></b><span data-dcnode-id="3827" instrument_node=""> Voltage vs. time curves of the wearable microgrid system powering the Na</span><sup data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">+</span></sup><span data-dcnode-id="3824" instrument_node=""> sensor-ECD system in pulsed mode during a 10-min running session followed by 20 min of rest, with only the BFC module operating, only the TEG module operating, and both harvesters operating together (</span><b data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">e</span></b><span data-dcnode-id="3821" instrument_node="">); and the LCD wristwatch continuously during a 7-min running session followed by 23 min of rest (</span><b data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">f</span></b><span data-dcnode-id="3818" instrument_node="">).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3805"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="3806" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/6" rel="nofollow"><span data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3807" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3808" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3809" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3812" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3811" fill-rule="evenodd"></path><span data-dcnode-id="3810" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3780"><span data-dcnode-id="3802" instrument_node="">A textile-based sodium ion (Na</span><sup data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">+</span></sup><span data-dcnode-id="3799" instrument_node="">) sensor integrated with a wearable, flexible ECD pixeled display was developed as an example for applications with higher power demand operating in pulsed mode. The developed potentiometric Na</span><sup data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">+</span></sup><span data-dcnode-id="3796" instrument_node=""> sensor exhibited a near-Nernstian response to the concentration of the Na</span><sup data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">+</span></sup><span data-dcnode-id="3793" instrument_node=""> target, with a potential change of 57.19 mV per decade of concentration change (Fig.&nbsp;</span><a data-dcnode-id="3791" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3792" instrument_node="">6d</span></a><span data-dcnode-id="3790" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="3788" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3789" instrument_node="">23</span></a><span data-dcnode-id="3787" instrument_node="">). The sensor output can be instantly read by the pre-programmed integrated circuit and reported by changing the color of individually controlled ECD pixels, as illustrated in Fig.&nbsp;</span><a data-dcnode-id="3785" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3786" instrument_node="">6c</span></a><span data-dcnode-id="3784" instrument_node=""> and Supplementary Movie&nbsp;</span><a data-dcnode-id="3782" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM4"><span data-dcnode-id="3783" instrument_node="">2</span></a><span data-dcnode-id="3781" instrument_node="">. The operation of the ECD pixels follows the simple reversible redox reaction of the PEDOT:PSS,</span></p><div class="c-article-equation" data-dcnode-id="3774" id="Equ5"><div class="c-article-equation__content" data-dcnode-id="3777"><span class="mathjax-tex" data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">$$PEDOT^+PSS^-+Na^++{\boldsymbol{e}}^- \leftrightarrow PEDOT^0+Na^+PSS^-$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">
                    (5)
                </span></div></div><p data-dcnode-id="3766"><span data-dcnode-id="3773" instrument_node="">that takes place when a voltage above +1 V is applied to the back-panel electrodes, and the reduction reaction take place on the front panel and turn its color from light blue to dark blue (Supplementary Movie&nbsp;</span><a data-dcnode-id="3771" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM3"><span data-dcnode-id="3772" instrument_node="">1</span></a><span data-dcnode-id="3770" instrument_node="">). A low-power microcontroller unit (MCU) was selected for reading the input from the Na</span><sup data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">+</span></sup><span data-dcnode-id="3767" instrument_node=""> sensor and controlling the on/off of the individual ECD pixels. The ECD is able to refresh rapidly and maintain the display without a continuous supply of power.</span></p><p data-dcnode-id="3758"><span data-dcnode-id="3765" instrument_node="">The set-up of the microcontroller is illustrated in Supplementary Fig.&nbsp;</span><a data-dcnode-id="3763" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3764" instrument_node="">28</span></a><span data-dcnode-id="3762" instrument_node="">. The controller was pre-programmed to display potential up to 0.32 V, with each ECD pixel corresponding to one 0.04 V increment of the sensor output. The power consumption of the microcontroller connected to the sensor-ECD system was measured similarly using the potentiostat set at different voltage, as demonstrated in Supplementary Fig.&nbsp;</span><a data-dcnode-id="3760" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3761" instrument_node="">29</span></a><span data-dcnode-id="3759" instrument_node="">. As shown, the power consumption of the microcontroller exceeded the wristwatch by 3 orders of magnitude, ranging from 4 mW at 2 V to 30 mW at 5 V. Yet, the microcontroller was able to boot quickly within the first 50 ms, take readings and apply signals to the ECD pixels within the first 200 ms, which allow this system to be powered transiently from the discharge of one charged capacitor. The energy consumed by one discharge session can be estimated by the equation:</span></p><div class="c-article-equation" data-dcnode-id="3752" id="Equ6"><div class="c-article-equation__content" data-dcnode-id="3755"><span class="mathjax-tex" data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">$$E=P\times t$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">
                    (6)
                </span></div></div><p data-dcnode-id="3732"><span data-dcnode-id="3751" instrument_node="">where </span><i data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">E</span></i><span data-dcnode-id="3748" instrument_node=""> is the energy in J, </span><i data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">P</span></i><span data-dcnode-id="3745" instrument_node=""> is the power in W, and </span><i data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">t</span></i><span data-dcnode-id="3742" instrument_node=""> is the time in s. To supply 200 ms of operation assuming the lowest power of ca. 4–5 mW, the energy required was thus estimated to be ca. 0.8–1 mJ. Capacitors ranging from 100 μF to 470 μF were able to supply sufficient energy to the microcontroller in one continuous discharge session with the larger capacitors had shown no substantial extended operation time (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3740" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3741" instrument_node="">29b</span></a><span data-dcnode-id="3739" instrument_node="">). The capacitors were discharged with 200 ms pulsed discharge, where more differences were more pronounced. The higher capacitance capacitors were able to sustain multiple refresh sessions, and the number of sessions decreases with the capacitance, as to 1 successful discharge session from the 100 μF with a slightly excess amount of energy, and 1 discharge from the 47 μF capacitor which did not last throughout the entire 200 ms session (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3737" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3738" instrument_node="">29c</span></a><span data-dcnode-id="3736" instrument_node="">). It is thus determined that the 75 μF SC modules should retain enough energy to sustain one complete refresh session. The required state of charge of the SC was then characterized by charging the 75 μF SC module to different potentials, and use the SC to power one refresh session, while the color on the ECD recorded to determine the minimum state of charge required for the 75 μF SC module to induce color change with sufficient contrast (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3734" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3735" instrument_node="">30</span></a><span data-dcnode-id="3733" instrument_node="">). It can be observed that the contrast of the on and off pixels gradually decreased with the initial state of charge of the SC modules, with the difference barely recognizable below 3.5 V. The minimum potential of 4 V before initiating a refresh session was thus decided. To confirm with the calculation above on the energy required for one operation session, the energy stored in the capacitor was calculated using equation:</span></p><div class="c-article-equation" data-dcnode-id="3726" id="Equ7"><div class="c-article-equation__content" data-dcnode-id="3729"><span class="mathjax-tex" data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">$$E_{SC}=\frac12 C\left(V_i^2-V_f^2\right)$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">
                    (7)
                </span></div></div><p data-dcnode-id="3694"><span data-dcnode-id="3725" instrument_node="">where </span><i data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">E</span></i><sub data-dcnode-id="3720"><i data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">SC</span></i></sub><span data-dcnode-id="3719" instrument_node=""> is the energy discharged from the SC in J, </span><i data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">C</span></i><span data-dcnode-id="3716" instrument_node=""> is the capacitance of the SC in F, </span><i data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">V</span></i><sub data-dcnode-id="3711"><i data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">i</span></i></sub><sup data-dcnode-id="3708"><i data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">2</span></i></sup><span data-dcnode-id="3707" instrument_node=""> is the potential of the SC before the discharge in V, and </span><i data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">V</span></i><sub data-dcnode-id="3702"><i data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">f</span></i></sub><sup data-dcnode-id="3699"><i data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">2</span></i></sup><span data-dcnode-id="3698" instrument_node=""> is the potential of the SC after the discharge in V. For a 75 μF SC to discharge from 4 V to 1.25 V, the energy released from the discharge is thus calculated to be 0.88 mJ, which agreed with the previous calculation based on Eq. (</span><a data-dcnode-id="3696" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ6"><span data-dcnode-id="3697" instrument_node="">6</span></a><span data-dcnode-id="3695" instrument_node="">). The 75 μF SC modules with a threshold voltage of 4 V was thus selected to allow fast booting while providing sufficient energy for a successful sense-refresh session.</span></p><p data-dcnode-id="3689"><span data-dcnode-id="3693" instrument_node="">The integrated wearable sensor-ECD application was integrated into the microgrid and tested on the body in a 10-min exercise session. As shown in Fig.&nbsp;</span><a data-dcnode-id="3691" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3692" instrument_node="">6e</span></a><span data-dcnode-id="3690" instrument_node="">, the SC module was charged up to 4 V and discharged to refresh the sensor-ECD system. The fully integrated microgrid system was able to boot quickly within 3 min and intermittently refresh the results during the 30-min operation. In comparison, the BFC module suffered from slow booting due to delayed perspiration while the TEG modules were not able to sustain the operation after stopping the movement. It is worth noting that the faster boosting speed for the TEG-only scenario is due to the lack of need to supply a small amount of energy to boost the voltage booster. In both applications with different modes of operation, the wearable microgrid system—with its complementary and synergistic BFC-TEG harvesting and commensurate SC pairing—was able to deliver both fast-booting and extended-harvesting to ensure the autonomous and sustainable operation of the wearable platforms.</span></p><p data-dcnode-id="3678"><span data-dcnode-id="3688" instrument_node="">A low-power wristwatch with a LCD was chosen as a representative application that is continuously powered by the wearable microgrid system. The voltage of 2.5 V is determined as the turn-on threshold voltage, corresponding to the minimum voltage for the LCD to display with sufficient contrast (Fig.&nbsp;</span><a data-dcnode-id="3686" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3687" instrument_node="">6b</span></a><span data-dcnode-id="3685" instrument_node="">). The power consumption of the watch was rated below 10 μW which has low requirement in storage unit (Supplementary Fig.&nbsp;</span><a data-dcnode-id="3683" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3684" instrument_node="">27</span></a><span data-dcnode-id="3682" instrument_node="">). Two SC modules connected in-series with the capacity of 75 μF were selected to offer fast booting while maintaining extended operation when the microgrid harvests from human activities. Short, 8-min exercise sessions were carried out, with the potential of the SC recorded continuously. As illustrated in Fig.&nbsp;</span><a data-dcnode-id="3680" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="3681" instrument_node="">6f</span></a><span data-dcnode-id="3679" instrument_node="">, the simultaneous BFC-TEG energy harvesting was able to quickly boot the wristwatch within 2 min and maintain its continuous operation for over 30 min In contrast, the BFC-only system suffered from slow booting while the TEG-only system can only maintain the operation for a short time period before the SC module voltage dropped to below 2.5 V.</span></p></div></div></section><section data-dcnode-id="3668" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3669" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3673" id="Sec5"><span data-dcnode-id="3674" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3670" id="Sec5-content"><p data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">In summary, we have demonstrated the concept of wearable bioenergy microgrid via a textile-based multi-module system for sequentially harvesting biomechanical and biochemical energy via the TEG and BFC modules. The microgrid can store and regulate the harvested energy via efficiently paired SC modules to efficiently power wearable applications such as an LCD wristwatch and a sensor-ECD system. Implementing the “compatible, complementary, and commensurate” design principles, all modules were carefully characterized and efficiently integrated to rapidly, autonomously and sustainably deliver power using the limited amount of harvested energy. All printed modules, printed with polymer-based composite inks, are flexible, durable, and ready for seamless integration on textile platforms. Compared to previous integration of wearable energy harvesting and storage devices, this work focuses on the complementary relationship between two bioenergy harvesters that perform synergistically to scavenge energy from human motion, and their pairing with storage modules with commensurate capacity for maximized efficiency and performance. With the optimized pairing of components, such wearable microgrid can quickly boot selected applications while sustaining their operation substantially longer than the exercise sessions, hence ensuring the reliability and practicality of the wearable system. To further improve such E-textile microgrid system, more modular design concepts, such as fabricating patch-like detachable and swappable harvesters, storage devices, and sensors, can be adapted to extend the usage and applicable scenario of the E-textile system. While serving here as an example, such microgrid strategy inspires future miniaturized integrated systems that harvest thermal, chemical or mechanical energies to select complementary, synergistic, commensurate and compatible components for their designated use case. The configuration of the harvesters connection can also be further explored: instead of parallelly operating harvesters, serial connections between harvesters of the same type or different types can be considered to increase the output voltage and minimize or eliminate the need for voltage regulation. Future work in developing energy harvesting devices that rely on the harvesting from passive activities will broaden the applicable scenarios and enhance the practicality of the microgrid system. Expanding the microgrid concept from on-body to in-body applications, and utilizing the abundant amount of biofuel and biomechanical movements within the body can also allow integrated harvesting system for self-powered implantable or ingestible sensing that are no longer limited by external environment or the need for exercise. Upon improving the power density of various harvesters, high capacity energy storage options with commensurate rating can also be considered for powering of a wider range of electronics for advanced functionalities. The concept of wearable microgrids and their design principles are thus expected to promote system-level considerations for integrating various new-form-factor modules towards truly self-powered, autonomous, and sustainable systems.</span></p></div></div></section><section data-dcnode-id="3536" data-title="Methods"><div class="c-article-section" data-dcnode-id="3537" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3666" id="Sec6"><span data-dcnode-id="3667" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="3538" id="Sec6-content"><h3 class="c-article__sub-heading" data-dcnode-id="3664" id="Sec7"><span data-dcnode-id="3665" instrument_node="">Chemicals and reagents</span></h3><p data-dcnode-id="3653"><span data-dcnode-id="3663" instrument_node="">1,4‐NQ, bovine serum albumin (BSA), PPIX (≥95%), glutaraldehyde, L(+)-lactic acid, acetic acid, sulfuric acid, chitosan (from shrimp shells, &gt;200 cP, 1 wt. % in 1% acetic acid), silver flakes&nbsp; (10 μm), PTFE powder (powder, free-flowing, 1 μm particle size), toluene, methanol, ethanol, PVA (MW = 89,000 – 98,000, 99+ % Hydrolyzed), polyvinyl butyral (PVB) (powder, &gt;100 cps), polyvinyl chloride (PVC), 4-methyl-2-pentanone (MIBK), 1,1,1,2,3,4,4,5,5,5-decafluoropentane (DFP), Poly(sodium 4-styrene sulfonate) (MW ~ 70,000), sodium tetrakis[3,5-bis(trifluoromethyl)phenyl]borate (Na-TFPB), D-sorbitol, dioctyl sebacate (DOS) and glycerol were purchased from Sigma-Aldrich (St. Louis, MO, USA). L-lactate oxidase (LOx) (80 U mg</span><sup data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">−1</span></sup><span data-dcnode-id="3660" instrument_node="">) was purchased from Toyobo (Japan). BOx (&gt;1.2 U mg</span><sup data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">−1</span></sup><span data-dcnode-id="3657" instrument_node="">) was obtained from Amano Enzyme. Carboxyl-functionalized multi-walled carbon nanotubes (MWCNT‐COOH, Ø = 10-20 nm, 10-30 µm length, &gt;95% purity) were purchased from Cheap Tubes Inc. Water-based polyurethane resin Dispercoll U-42 was purchased from Covestro (Germany). Tetrahydrofuran (THF) was purchased from EMD Millipore. Ethylcellulose (EC) (Standard 4), polyurethane (PU) (Tecoflex SG-80A) were obtained from Lubrizol Life Sciences. SEBS (G1654) was obtained from Kraton (TX, USA). Fluorinated binder (T-70, a terpolymer of vinylidene fluoride, tetrafluoroethylene and hexafluoropropylene) was obtained from Frechem (Jiangsu, China). Super-P carbon black was purchased from MTI Corporation (Richmond, CA, USA). Graphite powder was purchased from Acros Organics (USA). Stretchable textile Lycra Shiny Milliskin Nylon Spandex Fabric was purchased from Spandex World. Inc (USA). The Capstone</span><sup data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">TM</span></sup><span data-dcnode-id="3654" instrument_node=""> fluorosurfactant FS-65 is purchased from DuPont (USA). The graphite carbon paste was purchased from Ercon Inc. (Wareham, MA, USA). The screen printable PEDOT:PSS ink (C2100629D1) was purchased from Sun Chemical Ltd. (Bath, UK). All metal stencils were designed via Autodesk AutoCAD (CA, USA) and are ordered from Metal Etch Services (San Marcos, CA, USA). The voltage booster (Texas Instruments bq25505) and the microcontroller (Atmel AtTiny441) were purchased from Digi-Key Electronics (MN, USA). The wristwatch (Casio, A178WA-1A) was purchased from Amazon.com (WA, USA).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3651" id="Sec8"><span data-dcnode-id="3652" instrument_node="">Formulation of flexible polymer composite Ink</span></h3><p data-dcnode-id="3636"><span data-dcnode-id="3650" instrument_node="">The SEBS resin was prepared by dissolving 4 g of SEBS polymer in 10 mL toluene. The silver ink was made through a method similar to our previous protocol</span><sup data-dcnode-id="3644"><a aria-label="Reference 48" data-dcnode-id="3648" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d315374591e1915" title="Yin, L. et al. Highly stable battery pack via insulated, reinforced, buckling-enabled interconnect array. Small 14, 1800938 (2018)."><span data-dcnode-id="3649" instrument_node="">48</span></a><span data-dcnode-id="3647" instrument_node="">,</span><a aria-label="Reference 55" data-dcnode-id="3645" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d315374591e1918" title="Yin, L. et al. From all-printed 2D patterns to free-standing 3D structures: controlled buckling and selective bonding. Adv. Mater. Technol. 3, 1800013 (2018)."><span data-dcnode-id="3646" instrument_node="">55</span></a></sup><span data-dcnode-id="3643" instrument_node="">. Briefly, flexible silver composite ink was formulated by mixing silver flakes with the SEBS resin (weight ratio = 2: 1) by a dual asymmetric centrifugal mixer (Flacktek Speedmixer, DAC 150.1 KV-K) for 5 min with a speed of 1800 rotations per minute (RPM). The flexible carbon composite ink is formulated by mixing super-P powder, graphite powder, SEBS resin, and toluene (weight ratio = 1: 6: 8.4: 2.1) in the mixer for 5 min at 2150 RPM. The PTFE ink was formulated by mixing the PTFE powder, T-70, DFP and MIBK (weight ratio = 9: 6: 2: 5) in the mixer for 10 min at 1800 RPM. The EC-PU ink was formulated by mixing EC powder, PU and THF (weight ratio = 1: 1: 14) in the mixer for 5 min at 2000 RPM. The CNT-PEDOT:PSS ink for the SC modules was formulated by mixing the MWCNT-COOH, PEDOT:PSS paste and fluorosurfactant (weight ratio = 5: 95: 0.5) in the mixer for 5 min at 2500 RPM. The PVA-acid electrolyte gel was formulated following our previous work by dissolving 1 g of PVA into 10 mL of water, adding 10 g of 1.8 M sulfuric acid and heating with rigorous stirring with a magnetic stir bar on a hot plate at 100 °C until 50 % of the water has evaporated. The ink formulations for the electrodes and electrolyte used in the ECD are discussed in detail in Supplementary Note&nbsp;</span><a data-dcnode-id="3641" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3642" instrument_node="">5</span></a><span data-dcnode-id="3640" instrument_node="">.</span><a data-dcnode-id="3638" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3639" instrument_node="">2</span></a><span data-dcnode-id="3637" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3634" id="Sec9"><span data-dcnode-id="3635" instrument_node="">Fabrication of flexible TEG modules</span></h3><p data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">The whole layers of flexible TEG modules were mainly made into a 100 μm-thick metal stencil for printing. The stator of the TEG module is fabricated by firstly casting a layer of SEBS lining with the SEBS resin onto the textile substrate using an adjustable doctor blade with a thickness of 200 μm and cured in an oven at 65 °C for 10 min Then, the interdigitated silver current collector layer was printed using the flexible silver composite ink and the designed metal stencil and cured at 60 °C for 20 min After that, a positively charged layer based on EC-PU ink was printed using the doctor blade with a thickness of 50 μm and cured at 60 °C for 10 min For mover of the TEG, the EC-PU layer was first printed on the surface of the textile using a doctor blade with 100 μm thick and cured at 60 °C for 10 min as lining. And then, interdigitated, negatively charged layer was printed using the PTFE ink with the metal stencil and cured at 70 °C for 20 min</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3630" id="Sec10"><span data-dcnode-id="3631" instrument_node="">Fabrication and assembly of BFC modules</span></h3><p data-dcnode-id="3624"><span data-dcnode-id="3629" instrument_node="">The CNT pellets for the electrode were prepared by formulating a paste that was molded with a thick PTFE stencil. The formulation is modified based on an early publication</span><sup data-dcnode-id="3626"><a aria-label="Reference 11" data-dcnode-id="3627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d315374591e1944" title="Bandodkar, A. J. et al. Soft, stretchable, high power density electronic skin-based biofuel cells for scavenging energy from human sweat. Energy Environ. Sci. 10, 1581–1589 (2017)."><span data-dcnode-id="3628" instrument_node="">11</span></a></sup><span data-dcnode-id="3625" instrument_node="">. The anode paste was formulated by blending 7 mg MWCNT-COOH, 2 mg NQ, 11 μL GA (1% in ethanol) and 56 mg chitosan solution (3 wt% in 0.1 M acetic acid) with mortar and pestle. The cathode past was formulated by blending 8 mg MWCNT-COOH, 11 μL glutaraldehyde (1 % in water) and 56 mg chitosan solution (3 wt% in 0.1 M acetic acid) with mortar and pestle. The paste was then molded using a PTFE stencil and dried in the oven at 80 °C for 20 min to form pellets.</span></p><p data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">The design of the BFC current collector array was made into a 100 μm-thick metal stencil for printing. To fabricate the current collector, a layer of SEBS resin was firstly cast onto the textile substrate using an adjustable doctor blade with a thickness of 200 μm and cured in an oven at 80 °C for 10 min The interconnects are then printed using the flexible silver composite ink and cured at 80 °C for 10 min The flexible carbon composite ink was then printed as the cathode and anode current collectors and cured at 80 °C for 10 min The anode and cathode pellets were bonded on the carbon current collectors by printing a layer of commercial carbon paste use the metal stencil, mounting the anode and cathode pellets accordingly, and curing the paste at 60 °C for 20 min To solidify the adhesion between the pellets and current collectors, the water-based PU was coated on the conjunctions and dried at 60 °C for 20 min</span></p><p data-dcnode-id="3605"><span data-dcnode-id="3621" instrument_node="">The anode was functionalized by drop-casting 5 μL of LOx (20 mg mL</span><sup data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">−1</span></sup><span data-dcnode-id="3618" instrument_node=""> in 10 mg mL</span><sup data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">−1</span></sup><span data-dcnode-id="3615" instrument_node=""> BSA), 5 μL of GA solution (1 % in ethanol) and 5 μL of chitosan (1 wt% in 0.1 M acetic acid) on each pellet. The functionalization of the cathode is similar to that of the anode by drop-casting 5 μL of PPIX (40 mM in 9:1 vol/vol ethanol/acetone), 5 μL BOx (40 mg mL</span><sup data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">−1</span></sup><span data-dcnode-id="3612" instrument_node=""> in 10 mg mL</span><sup data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">−1</span></sup><span data-dcnode-id="3609" instrument_node=""> BSA) and 2.5 μL Nafion (1 wt% in ethanol) on each pellet. Each step of drop-casting was separated by 5 min to allow the solvents to evaporate, with chitosan and Nafion used for confining the LOx and BOx, respectively. Lastly, the modified BFC module was left in the refrigerator at 4 °C overnight before use. More details on the fabrication of the BFC modules are discussed in detail in Supplementary Note&nbsp;</span><a data-dcnode-id="3607" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3608" instrument_node="">2</span></a><span data-dcnode-id="3606" instrument_node="">.</span></p><p data-dcnode-id="3599"><span data-dcnode-id="3604" instrument_node="">The fabrication of the PVA hydrogel for the BFC on-body tests were adapted from a previous work</span><sup data-dcnode-id="3601"><a aria-label="Reference 49" data-dcnode-id="3602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d315374591e1968" title="Chen, X. et al. Stretchable and flexible buckypaper‐based lactate biofuel cell for wearable electronics. Adv. Funct. Mater. 29, 1905785 (2019)."><span data-dcnode-id="3603" instrument_node="">49</span></a></sup><span data-dcnode-id="3600" instrument_node="">. Shortly, a 20 wt% PVA solution was prepared by dissolving the PVA in water in an 80 °C water bath, and a 10 wt% KOH aqueous solution was prepared and added to the PVA solution at 1:1 ratio by weight to form a hydrogel precursor. The precursor was left in desiccator under vacuum for 1 day until crosslinked, and then taken out to then be washed in DI water to remove excess KOH. The washed hydrogel was soaked in 0.5 M (pH 7.4) PBS for later use. The formed hydrogel was measured to be ~0.5 mm thick and was cut into 2 cm by 4 cm pieces to be used for each BFC module.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3597" id="Sec11"><span data-dcnode-id="3598" instrument_node="">Fabrication of flexible SC modules</span></h3><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">The design of the SC modules was made into a 150 μm-thick metal stencil for printing. First, a layer of SEBS resin was cast onto the textile substrate using an adjustable doctor blade with a thickness of 200 μm and cured in an oven at 80 °C for 10 min The CNT-PEDOT:PSS ink was printed on the stretchable textile as the electrodes and is dried at 60 °C for 10 min and 80 °C for 10 min The flexible silver composite ink was then printed onto the electrodes as current collectors to connect electrodes in series and cured at 80 °C for 10 min The PVA-acid gel was printed onto the electrodes as the electrolyte and left to dry in a well-ventilated place under room temperature overnight. A layer of SEBS resin, which forms a dense, hydrophobic, water-proof layer upon drying, was printed onto the SC after drying to seal and protect the solidified gel electrolyte from leaching.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3590" id="Sec12"><span data-dcnode-id="3594" instrument_node="">Fabrication of flexible Na</span><sup data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">+</span></sup><span data-dcnode-id="3591" instrument_node=""> sensors and electrochromic display</span></h3><p data-dcnode-id="3573"><span data-dcnode-id="3589" instrument_node="">The details of the fabrication and characterization of the flexible sodium sensor and the ECD are discussed in&nbsp;Supplementary Notes&nbsp;</span><a data-dcnode-id="3587" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3588" instrument_node="">5</span></a><span data-dcnode-id="3586" instrument_node="">.</span><a data-dcnode-id="3584" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3585" instrument_node="">1</span></a><span data-dcnode-id="3583" instrument_node="">-</span><a data-dcnode-id="3581" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3582" instrument_node="">5.2</span></a><span data-dcnode-id="3580" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="3578" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3579" instrument_node="">22</span></a><span data-dcnode-id="3577" instrument_node="">-</span><a data-dcnode-id="3575" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3576" instrument_node="">26</span></a><span data-dcnode-id="3574" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3571" id="Sec13"><span data-dcnode-id="3572" instrument_node="">Design and fabrication of the energy regulation and sensing-display circuits</span></h3><p data-dcnode-id="3551"><span data-dcnode-id="3570" instrument_node="">The ultra-low-power boost charger circuit was developed based on the bq25505 chip (Texas Instruments). The circuit was configurated to discharge the connected BFC at 0.5 V and charge the connected SC modules up to 5.1 V. The sensing-display circuit was developed based on the energy-efficient AtTiny441 microcontroller (Microchip Technology). The on-chip 10-bit A/D converter provides the capability of potential reading. Ten digital I/Os was configured for the ECD control. The design schematics and circuit connections were discussed in&nbsp;Supplementary Notes&nbsp;</span><a data-dcnode-id="3568" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3569" instrument_node="">4.3</span></a><span data-dcnode-id="3567" instrument_node=""> and </span><a data-dcnode-id="3565" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3566" instrument_node="">5.4</span></a><span data-dcnode-id="3564" instrument_node=""> and illustrated in Supplementary Fig.&nbsp;</span><a data-dcnode-id="3562" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3563" instrument_node="">20</span></a><span data-dcnode-id="3561" instrument_node="">, </span><a data-dcnode-id="3559" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3560" instrument_node="">21</span></a><span data-dcnode-id="3558" instrument_node="">, </span><a data-dcnode-id="3556" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3557" instrument_node="">28</span></a><span data-dcnode-id="3555" instrument_node=""> and </span><a data-dcnode-id="3553" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3554" instrument_node="">31</span></a><span data-dcnode-id="3552" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3549" id="Sec14"><span data-dcnode-id="3550" instrument_node="">Characterization of the integrated devices</span></h3><p data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">An MSO-X-3014A oscilloscope (Agilent Technologies) and the designed OP-Amp circuit operated by a power supply (−10 V ~ 10 V) were used to measure the output voltage and currents of the TEG modules under various frequency from 0.88 ~ 3 Hz. Commercial electrolytic capacitors (1 μF ~ 1 mF) were used to characterize the average power, current of TEG. An Autolab PGSTAT204 potentiostat/galvanostat and an Interface 1010E potentiostat (Gamry Instruments, PA, USA) were used to analyze the electrochemical performance of the BFC, SC, sodium sensor and the ECD modules.</span></p><p data-dcnode-id="3539"><span data-dcnode-id="3546" instrument_node="">The on-body test was performed by printing/glueing the individual modules onto a long-sleeve polyester shirt (Starter Dri-Star) and connected by printed, stretchable silver traces and enameled copper wire (36 AWG). The printed traces and the contact points of the enameled wires were further insulated with SEBS to avoid short-circuiting from sweat. The human subject volunteers were informed of the on-body experiment details and asked to sign the consent. The whole process has strictly followed the guidelines of Institutional Review Boards (IRB) and approved by Human Research Protections Program at University of California, San Diego. Further On-body testing setup information can be found in Supplementary Note&nbsp;</span><a data-dcnode-id="3544" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3545" instrument_node="">4.3</span></a><span data-dcnode-id="3543" instrument_node=""> and </span><a data-dcnode-id="3541" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3542" instrument_node="">5.4</span></a><span data-dcnode-id="3540" instrument_node="">.</span></p></div></div></section><span data-dcnode-id="3535" instrument_node="">
