</span><meta content="Despite the fast development of various energy harvesting and storage devices, their judicious integration into efficient, autonomous, and sustainable wearable systems has not been widely explored. Here, we introduce the concept and design principles of e-textile microgrids by demonstrating a multi-module bioenergy microgrid system. Unlike earlier hybrid wearable systems, the presented e-textile microgrid relies solely on human activity to work synergistically, harvesting biochemical and biomechanical energy using sweat-based biofuel cells and triboelectric generators, and regulating the harvested energy via supercapacitors for high-power output. Through energy budgeting, the e-textile system can efficiently power liquid crystal displays continuously or a sweat sensor-electrochromic display system in pulsed sessions, with half the booting time and triple the runtime in a 10-min exercise session. Implementing “compatible form factors, commensurate performance, and complementary functionality” design principles, the flexible, textile-based bioenergy microgrid offers attractive prospects for the design and operation of efficient, sustainable, and autonomous wearable systems. Though energy-harvesting wearable systems have been reported in the literature, their system design imposes limitations that hinder their overall performance. Here, the authors report a system-level wearable e-textile microgrid system that relies solely on human activity for energy harvesting." data-dcnode-id="5776" name="dc.description"><span data-dcnode-id="5775" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4686" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4687" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4691" id="Abs1"><span data-dcnode-id="4692" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4688" id="Abs1-content"><p data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">Despite the fast development of various energy harvesting and storage devices, their judicious integration into efficient, autonomous, and sustainable wearable systems has not been widely explored. Here, we introduce the concept and design principles of e-textile microgrids by demonstrating a multi-module bioenergy microgrid system. Unlike earlier hybrid wearable systems, the presented e-textile microgrid relies solely on human activity to work synergistically, harvesting biochemical and biomechanical energy using sweat-based biofuel cells and triboelectric generators, and regulating the harvested energy via supercapacitors for high-power output. Through energy budgeting, the e-textile system can efficiently power liquid crystal displays continuously or a sweat sensor-electrochromic display system in pulsed sessions, with half the booting time and triple the runtime in a 10-min exercise session. Implementing “compatible form factors, commensurate performance, and complementary functionality” design principles, the flexible, textile-based bioenergy microgrid offers attractive prospects for the design and operation of efficient, sustainable, and autonomous wearable systems.</span></p></div></div></section><span data-dcnode-id="4685" instrument_node="">

</span><section data-dcnode-id="4467" data-title="Introduction"><div class="c-article-section" data-dcnode-id="4468" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4680" id="Sec1"><span data-dcnode-id="4681" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="4469" id="Sec1-content"><p data-dcnode-id="4571"><span data-dcnode-id="4679" instrument_node="">The rapid rise of flexible electronics brings forth a myriad of sensors, circuits and energy storage devices in various wearable form factors</span><sup data-dcnode-id="4652"><a data-dcnode-id="4677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d315374591e442" title="Kim, J., Campbell, A. S., de Ávila, B. E. F. &amp; Wang, J. Wearable biosensors for healthcare monitoring. Nat. Biotechnol. 37, 389–406 (2019)."><span data-dcnode-id="4678" instrument_node="">1</span></a><span data-dcnode-id="4676" instrument_node="">,</span><a data-dcnode-id="4674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d315374591e442_1" title="Gao, W. et al. Fully integrated wearable sensor arrays for multiplexed in situ perspiration analysis. Nature 529, 509–514 (2016)."><span data-dcnode-id="4675" instrument_node="">2</span></a><span data-dcnode-id="4673" instrument_node="">,</span><a data-dcnode-id="4671" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d315374591e442_2" title="Gong, S. &amp; Cheng, W. Toward soft skin-like wearable and implantable energy devices. Adv. Energy Mater. 7, 1700648 (2017)."><span data-dcnode-id="4672" instrument_node="">3</span></a><span data-dcnode-id="4670" instrument_node="">,</span><a data-dcnode-id="4668" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d315374591e442_3" title="Gong, S. et al. A wearable and highly sensitive pressure sensor with ultrathin gold nanowires. Nat. Commun. 5, 3132 (2014)."><span data-dcnode-id="4669" instrument_node="">4</span></a><span data-dcnode-id="4667" instrument_node="">,</span><a data-dcnode-id="4665" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d315374591e442_4" title="Wang, C. et al. Monitoring of the central blood pressure waveform via a conformal ultrasonic device. Nat. Biomed. Eng. 2, 687–695 (2018)."><span data-dcnode-id="4666" instrument_node="">5</span></a><span data-dcnode-id="4664" instrument_node="">,</span><a data-dcnode-id="4662" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d315374591e442_5" title="Lee, H. et al. A graphene-based electrochemical device with thermoresponsive microneedles for diabetes monitoring and therapy. Nat. Nanotechnol. 11, 566–572 (2016)."><span data-dcnode-id="4663" instrument_node="">6</span></a><span data-dcnode-id="4661" instrument_node="">,</span><a data-dcnode-id="4659" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d315374591e442_6" title="Wang, L. et al. Weaving sensing fibers into electrochemical fabric for real-time health monitoring. Adv. Funct. Mater. 28, 1804456 (2018)."><span data-dcnode-id="4660" instrument_node="">7</span></a><span data-dcnode-id="4658" instrument_node="">,</span><a data-dcnode-id="4656" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d315374591e442_7" title="Xu, S. et al. Stretchable batteries with self-similar serpentine interconnects and integrated wireless recharging systems. Nat. Commun. 4, 1543 (2013)."><span data-dcnode-id="4657" instrument_node="">8</span></a><span data-dcnode-id="4655" instrument_node="">,</span><a aria-label="Reference 9" data-dcnode-id="4653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d315374591e445" title="Kumar, R. et al. All-printed, stretchable Zn-Ag2O rechargeable battery via hyperelastic binder for self-powering wearable electronics. Adv. Energy Mater. 7, 1602096 (2017)."><span data-dcnode-id="4654" instrument_node="">9</span></a></sup><span data-dcnode-id="4651" instrument_node="">. In order to meet the growing power demands of wearable electronics and eliminate the need for frequent, interrupting recharges and cumbersome wired power transmission, wearable systems have integrated energy harvesters such as solar cells, triboelectric generators (TEGs), and enzymatic or microbial biofuel cells (BFCs) to enable their self-sustainable operation</span><sup data-dcnode-id="4630"><a data-dcnode-id="4649" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d315374591e449" title="Fan, F. R., Tian, Z. Q. &amp; Lin Wang, Z. Flexible triboelectric generator. Nano Energy 1, 328–334 (2012)."><span data-dcnode-id="4650" instrument_node="">10</span></a><span data-dcnode-id="4648" instrument_node="">,</span><a data-dcnode-id="4646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d315374591e449_1" title="Bandodkar, A. J. et al. Soft, stretchable, high power density electronic skin-based biofuel cells for scavenging energy from human sweat. Energy Environ. Sci. 10, 1581–1589 (2017)."><span data-dcnode-id="4647" instrument_node="">11</span></a><span data-dcnode-id="4645" instrument_node="">,</span><a data-dcnode-id="4643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d315374591e449_2" title="Hashemi, S. A., Ramakrishna, S. &amp; Aberle, A. Recent Progress in Flexible-Wearable Solar Cells for Self-Powered Electronic Devices. Energy Environ. Sci. 13, 685–743 (2020)."><span data-dcnode-id="4644" instrument_node="">12</span></a><span data-dcnode-id="4642" instrument_node="">,</span><a data-dcnode-id="4640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d315374591e449_3" title="Dong, K., Peng, X. &amp; Wang, Z. L. Fiber/fabric‐based piezoelectric and triboelectric nanogenerators for flexible/stretchable and wearable electronics and artificial intelligence. Adv. Mater. 32, 1902549."><span data-dcnode-id="4641" instrument_node="">13</span></a><span data-dcnode-id="4639" instrument_node="">,</span><a data-dcnode-id="4637" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d315374591e449_4" title="Kim, B. J. et al. Highly efficient and bending durable perovskite solar cells: Toward a wearable power source. Energy Environ. Sci. 8, 916–921 (2015)."><span data-dcnode-id="4638" instrument_node="">14</span></a><span data-dcnode-id="4636" instrument_node="">,</span><a data-dcnode-id="4634" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d315374591e449_5" title="Xiong, J. et al. Skin-touch-actuated textile-based triboelectric nanogenerator with black phosphorus for durable biomechanical energy harvesting. Nat. Commun. 9, 1–9 (2018)."><span data-dcnode-id="4635" instrument_node="">15</span></a><span data-dcnode-id="4633" instrument_node="">,</span><a aria-label="Reference 16" data-dcnode-id="4631" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d315374591e452" title="Yu, Y. et al. Biofuel-powered soft electronic skin with multiplexed and wireless sensing for human-machine interfaces. Sci. Robot. 5, 7946 (2020)."><span data-dcnode-id="4632" instrument_node="">16</span></a></sup><span data-dcnode-id="4629" instrument_node="">. Different wearable devices have recently adapted this strategy to collect energy from human or the environment followed by regulating and storing the scavenged energy in storage modules such as batteries or supercapacitors (SCs)</span><sup data-dcnode-id="4608"><a data-dcnode-id="4627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d315374591e456" title="Lv, J. et al. Sweat-based wearable energy harvesting-storage hybrid textile devices. Energy Environ. Sci. 11, 3431–3442 (2018)."><span data-dcnode-id="4628" instrument_node="">17</span></a><span data-dcnode-id="4626" instrument_node="">,</span><a data-dcnode-id="4624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d315374591e456_1" title="Xu, C., Pan, C., Liu, Y. &amp; Wang, Z. L. Hybrid cells for simultaneously harvesting multi-type energies for self-powered micro/nanosystems. Nano Energy 1, 259–272 (2012)."><span data-dcnode-id="4625" instrument_node="">18</span></a><span data-dcnode-id="4623" instrument_node="">,</span><a data-dcnode-id="4621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d315374591e456_2" title="Vosgueritchian, M., Lipomi, D. J. &amp; Bao, Z. Highly conductive and transparent PEDOT:PSS films with a fluorosurfactant for stretchable and flexible transparent electrodes. Adv. Funct. Mater. 22, 421–428 (2012)."><span data-dcnode-id="4622" instrument_node="">19</span></a><span data-dcnode-id="4620" instrument_node="">,</span><a data-dcnode-id="4618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d315374591e456_3" title="Lee, Y.-H. et al. Wearable textile battery rechargeable by solar energy. Nano Lett. 13, 5753–5761 (2013)."><span data-dcnode-id="4619" instrument_node="">20</span></a><span data-dcnode-id="4617" instrument_node="">,</span><a data-dcnode-id="4615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d315374591e456_4" title="Shi, B. et al. Body-integrated self-powered system for wearable and implantable applications. ACS Nano 13, 6017–6024 (2019)."><span data-dcnode-id="4616" instrument_node="">21</span></a><span data-dcnode-id="4614" instrument_node="">,</span><a data-dcnode-id="4612" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d315374591e456_5" title="Jung, S. et al. Wearable fall detector using integrated sensors and energy devices. Sci. Rep. 5, 1–9 (2015)."><span data-dcnode-id="4613" instrument_node="">22</span></a><span data-dcnode-id="4611" instrument_node="">,</span><a aria-label="Reference 23" data-dcnode-id="4609" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d315374591e459" title="Li, C. et al. Flexible perovskite solar cell-driven photo-rechargeable lithium-ion capacitor for self-powered wearable strain sensors. Nano Energy 60, 247–256 (2019)."><span data-dcnode-id="4610" instrument_node="">23</span></a></sup><span data-dcnode-id="4607" instrument_node="">. However, the operation of these systems has relied on either a monolithic input source which shares the same limitation in energy availability (e.g., the lack of motion, biofuel, sunlight), or upon multiple harvesters that operate in parallel but are not synergistic in realistic scenarios, and introduce additional limitations instead of compensating existing ones</span><sup data-dcnode-id="4589"><a data-dcnode-id="4605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d315374591e463" title="Chen, J. et al. Micro-cable structured textile for simultaneously harvesting solar and mechanical energy. Nat. Energy 1, 16138 (2016)."><span data-dcnode-id="4606" instrument_node="">24</span></a><span data-dcnode-id="4604" instrument_node="">,</span><a data-dcnode-id="4602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d315374591e463_1" title="Wen, Z. et al. Self-powered textile for wearable electronics by hybridizing fiber-shaped nanogenerators, solar cells, and supercapacitors. Sci. Adv. 2, e1600097 (2016)."><span data-dcnode-id="4603" instrument_node="">25</span></a><span data-dcnode-id="4601" instrument_node="">,</span><a data-dcnode-id="4599" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d315374591e463_2" title="Chen, T. et al. An integrated “Energy Wire” for both photoelectric conversion and energy storage. Angew. Chem. Int. Ed. 51, 11977–11980 (2012)."><span data-dcnode-id="4600" instrument_node="">26</span></a><span data-dcnode-id="4598" instrument_node="">,</span><a data-dcnode-id="4596" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d315374591e463_3" title="Zhang, Z. et al. Integrated polymer solar cell and electrochemical supercapacitor in a flexible and stable fiber format. Adv. Mater. 26, 466–470 (2014)."><span data-dcnode-id="4597" instrument_node="">27</span></a><span data-dcnode-id="4595" instrument_node="">,</span><a data-dcnode-id="4593" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d315374591e463_4" title="Yang, Y. &amp; Wang, Z. L. Hybrid energy cells for simultaneously harvesting multi-types of energies. Nano Energy 14, 245–256 (2014)."><span data-dcnode-id="4594" instrument_node="">28</span></a><span data-dcnode-id="4592" instrument_node="">,</span><a aria-label="Reference 29" data-dcnode-id="4590" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d315374591e466" title="Pu, X. et al. Wearable power-textiles by integrating fabric triboelectric nanogenerators and fiber-shaped dye-sensitized solar cells. Adv. Energy Mater. 6, 1601048 (2016)."><span data-dcnode-id="4591" instrument_node="">29</span></a></sup><span data-dcnode-id="4588" instrument_node="">. Moreover, the early multi-input hybrid harvesting systems, such as the integration of solar cells with SCs and batteries, relied partially on energy inputs from the external environment (e.g., thermoelectric, pyroelectric, photovoltaic) which are often uncontrollable</span><sup data-dcnode-id="4573"><a data-dcnode-id="4586" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d315374591e470" title="Chen, J. et al. Micro-cable structured textile for simultaneously harvesting solar and mechanical energy. Nat. Energy 1, 16138 (2016)."><span data-dcnode-id="4587" instrument_node="">24</span></a><span data-dcnode-id="4585" instrument_node="">,</span><a data-dcnode-id="4583" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d315374591e470_1" title="Wen, Z. et al. Self-powered textile for wearable electronics by hybridizing fiber-shaped nanogenerators, solar cells, and supercapacitors. Sci. Adv. 2, e1600097 (2016)."><span data-dcnode-id="4584" instrument_node="">25</span></a><span data-dcnode-id="4582" instrument_node="">,</span><a data-dcnode-id="4580" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d315374591e470_2" title="Chen, T. et al. An integrated “Energy Wire” for both photoelectric conversion and energy storage. Angew. Chem. Int. Ed. 51, 11977–11980 (2012)."><span data-dcnode-id="4581" instrument_node="">26</span></a><span data-dcnode-id="4579" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="4577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d315374591e473" title="Zhang, Z. et al. Integrated polymer solar cell and electrochemical supercapacitor in a flexible and stable fiber format. Adv. Mater. 26, 466–470 (2014)."><span data-dcnode-id="4578" instrument_node="">27</span></a><span data-dcnode-id="4576" instrument_node="">,</span><a aria-label="Reference 30" data-dcnode-id="4574" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d315374591e476" title="Zhang, Q. et al. Green hybrid power system based on triboelectric nanogenerator for wearable/portable electronics. Nano Energy 55, 151–163 (2019)."><span data-dcnode-id="4575" instrument_node="">30</span></a></sup><span data-dcnode-id="4572" instrument_node="">. To scavenge energy efficiently and reliably solely from human activities, system-level considerations are urgently needed to guide the judicious selection of components with complementary characteristics and commensurate performance.</span></p><p data-dcnode-id="4539"><span data-dcnode-id="4570" instrument_node="">In this regard, wearable energy systems can seek inspiration in the design and deployment of microgrids operating in “island mode”</span><sup data-dcnode-id="4561"><a data-dcnode-id="4568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d315374591e483" title="Issa, W. R., Khateb, A. H. E., Abusara, M. A. &amp; Mallick, T. K. Control strategy for uninterrupted microgrid mode transfer during unintentional islanding scenarios. IEEE Trans. Ind. Electron. 65, 4831–4839 (2018)."><span data-dcnode-id="4569" instrument_node="">31</span></a><span data-dcnode-id="4567" instrument_node="">,</span><a data-dcnode-id="4565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d315374591e483_1" title="Khan, F. Resilience in numbers. Nat. Energy 3, 1020 (2018)."><span data-dcnode-id="4566" instrument_node="">32</span></a><span data-dcnode-id="4564" instrument_node="">,</span><a aria-label="Reference 33" data-dcnode-id="4562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d315374591e486" title="Tanrioven, M. Reliability and cost-benefits of adding alternate power sources to an independent micro-grid community. J. Power Sources 150, 136–149 (2005)."><span data-dcnode-id="4563" instrument_node="">33</span></a></sup><span data-dcnode-id="4560" instrument_node="">. Microgrid, namely, a micro-scale power grid with components including energy generation, energy storage, various utilities, and management functionality for regulating the flow of energy, can be made self-sustainable and independent from the main power grid by the inclusion of various renewable energy harvesters and appropriate energy storage units. Such self-sustainable microgrids can operate independently from the main grid by harvesting energy from localized sources and regulating and storing the scavenged energy in various energy storage modules. The reliability of renewable sources is fortified by coupling with other generation sources (e.g., fuel-based generators) to ensure a timely energy supply</span><sup data-dcnode-id="4545"><a data-dcnode-id="4558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d315374591e490" title="Tanrioven, M. Reliability and cost-benefits of adding alternate power sources to an independent micro-grid community. J. Power Sources 150, 136–149 (2005)."><span data-dcnode-id="4559" instrument_node="">33</span></a><span data-dcnode-id="4557" instrument_node="">,</span><a data-dcnode-id="4555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d315374591e490_1" title="He, G., Chen, Q., Moutis, P., Kar, S. &amp; Whitacre, J. F. An intertemporal decision framework for electrochemical energy storage management. Nat. Energy 3, 404–412 (2018)."><span data-dcnode-id="4556" instrument_node="">34</span></a><span data-dcnode-id="4554" instrument_node="">,</span><a data-dcnode-id="4552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d315374591e490_2" title="Cader, C., Bertheau, P., Blechinger, P., Huyskens, H. &amp; Breyer, C. Global cost advantages of autonomous solar-battery-diesel systems compared to diesel-only systems. Energy Sustain. Dev. 31, 14–23 (2016)."><span data-dcnode-id="4553" instrument_node="">35</span></a><span data-dcnode-id="4551" instrument_node="">,</span><a data-dcnode-id="4549" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d315374591e490_3" title="Szabó, S., Bódis, K., Huld, T. &amp; Moner-Girona, M. Energy solutions in rural Africa: Mapping electrification costs of distributed solar and diesel generation versus grid extension. Environ. Res. Lett. 6, 034002 (2011)."><span data-dcnode-id="4550" instrument_node="">36</span></a><span data-dcnode-id="4548" instrument_node="">,</span><a aria-label="Reference 37" data-dcnode-id="4546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d315374591e493" title="Ou, T. C. &amp; Hong, C. M. Dynamic operation and control of microgrid hybrid power systems. Energy 66, 314–323 (2014)."><span data-dcnode-id="4547" instrument_node="">37</span></a></sup><span data-dcnode-id="4544" instrument_node="">. Furthermore, these localized sources are paired with storage modules with optimal capacities based on the load energy demands</span><sup data-dcnode-id="4541"><a aria-label="Reference 38" data-dcnode-id="4542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d315374591e497" title="Alsaidan, I., Khodaei, A. &amp; Gao, W. A comprehensive battery energy storage optimal sizing model for microgrid applications. IEEE Trans. Power Syst. 33, 3968–3980 (2018)."><span data-dcnode-id="4543" instrument_node="">38</span></a></sup><span data-dcnode-id="4540" instrument_node="">. Beyond the simple addition of harvesting and storage modules, design of the microgrid relies on the careful selection of components with compatible performance and complementary characteristics.</span></p><p data-dcnode-id="4505"><span data-dcnode-id="4538" instrument_node="">Inspired by this notion, we herein propose and demonstrate the concept of a wearable e-textile microgrid system: a multi-module, textile-base system with applications powered by complementary and synergistic energy harvesters and commensurate energy storage modules. To demonstrate this concept, we describe in the following section an integrated e-textile microgrid system that unite BFCs and TEGs, two harvesters with distinct and complementary energy conversion mechanisms based on human activities, along with SC modules for regulating the powering of wearable applications with both low and high power demand (Fig.&nbsp;</span><a data-dcnode-id="4536" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4537" instrument_node="">1a</span></a><span data-dcnode-id="4535" instrument_node="">). Among many proposed integrated harvesters, the pairing of the biomechanical and biochemical harvesters is desirable as they rely solely on human activities. Previous studies demonstrated only such combination working in proof-of-concept in-vitro settings, hence are challenging to be employed for real-life scenarios</span><sup data-dcnode-id="4526"><a data-dcnode-id="4533" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d315374591e507" title="Pan, C., Li, Z., Guo, W., Zhu, J. &amp; Wang, Z. L. Fiber-based hybrid nanogenerators for/as self-powered systems in biological liquid. Angew. Chem. Int. Ed. 50, 11192–11196 (2011)."><span data-dcnode-id="4534" instrument_node="">39</span></a><span data-dcnode-id="4532" instrument_node="">,</span><a data-dcnode-id="4530" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d315374591e507_1" title="Hansen, B. J., Liu, Y., Yang, R. &amp; Wang, Z. L. Hybrid nanogenerator for concurrently harvesting biomechanical and biochemical energy. ACS Nano 4, 3647–3652 (2010)."><span data-dcnode-id="4531" instrument_node="">40</span></a><span data-dcnode-id="4529" instrument_node="">,</span><a aria-label="Reference 41" data-dcnode-id="4527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d315374591e510" title="Li, H. et al. A hybrid biofuel and triboelectric nanogenerator for bioenergy harvesting. Nano-Micro Lett. 12, 1–12 (2020)."><span data-dcnode-id="4528" instrument_node="">41</span></a></sup><span data-dcnode-id="4525" instrument_node="">. Adapting the microgrid design concept, this work seamlessly integrates biomechanical and biochemical harvesters along with energy storage devices, with carefully budgeted energy rating, into one e-textile platform. When this microgrid harvests energy during human movements, the TEG storage modules are firstly activated from the instant motion-induced charge generation to harvest biomechanical energy to rapidly boot the system, while the subsequently activated BFCs harvest biochemical energy from electroenzymatic reactions of sweat metabolites for prolonged power delivery (Fig.&nbsp;</span><a data-dcnode-id="4523" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4524" instrument_node="">1b</span></a><span data-dcnode-id="4522" instrument_node="">). The complementary relationship between the two bioenergy harvesters thus compensates for the limitations of the BFCs due to delayed perspiration and of the TEGs due to the lack of motion. The SC modules regulate low-current, high voltage inputs from the TEG modules and high-current, low-voltage inputs from the BFC modules, with optimal capacity to delivery sufficient power for designated applications while maintaining fast booting. The optimized system can thus boot quickly within 3 min to continuously power a microwatt-rated wristwatch with liquid crystal display (LCD), or a milliwatt-rated sensor-electrochromic display (ECD) system operating in pulsed sessions, and extend their operation to over 30 min in connection to a 10-min movement session (Fig.&nbsp;</span><a data-dcnode-id="4520" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4521" instrument_node="">1c</span></a><span data-dcnode-id="4519" instrument_node="">). Compared to the early integrated wearable energy systems, the present system relies solely on energy inputs from human activities and hence is not dependent on the external environment</span><sup data-dcnode-id="4510"><a aria-label="Reference 24" data-dcnode-id="4517" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d315374591e520" title="Chen, J. et al. Micro-cable structured textile for simultaneously harvesting solar and mechanical energy. Nat. Energy 1, 16138 (2016)."><span data-dcnode-id="4518" instrument_node="">24</span></a><span data-dcnode-id="4516" instrument_node="">,</span><a aria-label="Reference 28" data-dcnode-id="4514" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d315374591e523" title="Yang, Y. &amp; Wang, Z. L. Hybrid energy cells for simultaneously harvesting multi-types of energies. Nano Energy 14, 245–256 (2014)."><span data-dcnode-id="4515" instrument_node="">28</span></a><span data-dcnode-id="4513" instrument_node="">,</span><a aria-label="Reference 29" data-dcnode-id="4511" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d315374591e526" title="Pu, X. et al. Wearable power-textiles by integrating fabric triboelectric nanogenerators and fiber-shaped dye-sensitized solar cells. Adv. Energy Mater. 6, 1601048 (2016)."><span data-dcnode-id="4512" instrument_node="">29</span></a></sup><span data-dcnode-id="4509" instrument_node="">. The performance of the individual modules was characterized, and the energy carefully budgeted to ensure that the limited amount of harvested energy was efficiently utilized. For compatibility with the wearable form factor, all modules are printed, textile-based, durable and flexible, and can be readily integrated onto a shirt to harvest energy from the sliding motion between the forearms and the torso by TEGs and the sweat generated above the chest by the BFCs (Fig.&nbsp;</span><a data-dcnode-id="4507" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4508" instrument_node="">1d</span></a><span data-dcnode-id="4506" instrument_node="">). These modules are connected with flexible printed silver interconnections that are secured and insulated by a hydrophobic, water-proof polystyrene-polyethylene-polybutylene-polystyrene (SEBS) block copolymer. The placement of the modules ensures the optimal collection of biomechanical energy via the TEG module from the arm movements, along with an intimate contact of BFCs to the skin for sweat collection. The placement of BFCs and SCs on the chest also minimizes the possible bending and wrinkling deformation which may affect their energy harvesting and collection efficiency. Implementing the “complementary, commensurate, compatible” design principles, the microgrid e-textile system serves as an attractive example for future integrated on-body systems that are autonomous, reliable, synergistic, sustainable and energy-efficient. While the microgrid concept is introduced here to the field of wearable electronics using complementary BFC and TEG bioenergy harvesters paired with SC storage modules, it can be applied for guiding the development of future miniaturized energy systems based on a judicious selection and integration of different modules toward a variety of self-powered electronics applications.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4470" data-test="figure" data-title="Design and concept of the multi-modular energy microgrid system." id="figure-1"><figure data-dcnode-id="4471"><figcaption data-dcnode-id="4502"><b class="c-article-section__figure-caption" data-dcnode-id="4503" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4504" instrument_node="">Fig. 1: Design and concept of the multi-modular energy microgrid system.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4482"><div class="c-article-section__figure-item" data-dcnode-id="4497"><a class="c-article-section__figure-link" data-dcnode-id="4498" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/1" rel="nofollow"><picture data-dcnode-id="4499"><source data-dcnode-id="4501" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-021-21701-7/MediaObjects/41467_2021_21701_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4500" height="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-021-21701-7/MediaObjects/41467_2021_21701_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4483" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4484"><b data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">a</span></b><span data-dcnode-id="4494" instrument_node=""> System diagram of the energy microgrid system, consisting of the TEG, BFC, SC modules and wearable applications. </span><b data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">b</span></b><span data-dcnode-id="4491" instrument_node=""> Graphic illustration of the synergistic effect of integrating the complementary BFC and TEG energy harvesters. </span><b data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">c</span></b><span data-dcnode-id="4488" instrument_node=""> System diagram of the integrated E-textile microgrid powering an LCD or an ECD-sensor system. </span><b data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">d</span></b><span data-dcnode-id="4485" instrument_node=""> Photo images illustrating the arrangement of the individual modules of the wearable microgrid system on a shirt worn on-body, including the TEG modules on the side of the torso, the SC modules on the chest, the BFC modules and potentiometric sensor inside the shirt for direct sweat contact, and wearable electronics that are powered by the microgrid. All components were connected by printed stretchable silver traces insulated with SEBS.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4472"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4473" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/1" rel="nofollow"><span data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4474" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4475" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4476" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4479" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4478" fill-rule="evenodd"></path><span data-dcnode-id="4477" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="3675" data-title="Results"><div class="c-article-section" data-dcnode-id="3676" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4465" id="Sec2"><span data-dcnode-id="4466" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3677" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="4463" id="Sec3"><span data-dcnode-id="4464" instrument_node="">Characterization of the microgrid modules</span></h3><p data-dcnode-id="4423"><span data-dcnode-id="4462" instrument_node="">TEGs have been selected as the biomechanical energy harvesters in this wearable microgrid system due to their instant response to motions to generate energy. Since their inception in 2012, TEGs have become the most studied wearable mechanical energy harvesters due to its simple generation mechanism and the abundant selection of materials</span><sup data-dcnode-id="4456"><a aria-label="Reference 10" data-dcnode-id="4460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d315374591e577" title="Fan, F. R., Tian, Z. Q. &amp; Lin Wang, Z. Flexible triboelectric generator. Nano Energy 1, 328–334 (2012)."><span data-dcnode-id="4461" instrument_node="">10</span></a><span data-dcnode-id="4459" instrument_node="">,</span><a aria-label="Reference 42" data-dcnode-id="4457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d315374591e580" title="Zou, H. et al. Quantifying the triboelectric series. Nat. Commun. 10, 1–9 (2019)."><span data-dcnode-id="4458" instrument_node="">42</span></a></sup><span data-dcnode-id="4455" instrument_node="">. The present TEG module is composed of a polytetrafluoroethylene (PTFE)-based negative mover and an ethylcellulose-polyurethane (EC-PU)-based positive stator in interdigitated patterns (Fig.&nbsp;</span><a data-dcnode-id="4453" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4454" instrument_node="">2a</span></a><span data-dcnode-id="4452" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="4450" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4451" instrument_node="">1</span></a><span data-dcnode-id="4449" instrument_node="">), and is designed to harvest energy from sliding motions as illustrated in Fig.&nbsp;</span><a data-dcnode-id="4447" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4448" instrument_node="">2b</span></a><sup data-dcnode-id="4438"><a data-dcnode-id="4445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d315374591e592" title="Xie, Y. et al. Grating-structured freestanding triboelectric-layer nanogenerator for harvesting mechanical energy at 85% total conversion efficiency. Adv. Mater. 26, 6599–6607 (2014)."><span data-dcnode-id="4446" instrument_node="">43</span></a><span data-dcnode-id="4444" instrument_node="">,</span><a data-dcnode-id="4442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d315374591e592_1" title="Lin, L. et al. Segmentally structured disk triboelectric nanogenerator for harvesting rotational mechanical energy. Nano Lett. 13, 2916–2923 (2013)."><span data-dcnode-id="4443" instrument_node="">44</span></a><span data-dcnode-id="4441" instrument_node="">,</span><a aria-label="Reference 45" data-dcnode-id="4439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d315374591e595" title="Guo, H. et al. A water-proof triboelectric-electromagnetic hybrid generator for energy harvesting in harsh environments. Adv. Energy Mater. 6, 1501593 (2016)."><span data-dcnode-id="4440" instrument_node="">45</span></a></sup><span data-dcnode-id="4437" instrument_node="">. To ensure the compatibility of the fabrication of the TEG elements to the e-textile platform with abundant flexibility and durability, each individual layer in the TEG was formulated into a screen-printable ink with elastomeric binder that is water-proof and resistant to abrasion. The TEG modules were characterized at low sliding frequencies ranging from 0.833 Hz to 3 Hz, simulating the realistic swinging speed of human arms from during walking (below 1 Hz) to running (1.5–3 Hz). As shown in Fig.&nbsp;</span><a data-dcnode-id="4435" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4436" instrument_node="">2c–d</span></a><span data-dcnode-id="4434" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="4432" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4433" instrument_node="">6</span></a><span data-dcnode-id="4431" instrument_node="">, the maximum peak voltage, independent from the frequency, was measured to be ca. 160 V. In contrast, the peak current grows nearly linearly with the frequency, from 45 μA at 0.833 Hz to 130 μA at 3 Hz, reflecting the linearly shortened time of transferring the same amount of charge between the mover and the stator</span><sup data-dcnode-id="4428"><a aria-label="Reference 46" data-dcnode-id="4429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d315374591e606" title="Zhu, G. et al. Linear-grating triboelectric generator based on sliding electrification. Nano Lett. 13, 2282–2289 (2013)."><span data-dcnode-id="4430" instrument_node="">46</span></a></sup><span data-dcnode-id="4427" instrument_node="">. To ensure that the TEG module is paired with commensurate storage rating, commercial electrolytic capacitors, with known capacitance ranging from 1 μF to 1 mF were used initially for the characterization, which were charged by a rectified TEG module in 60 s, 1.5 Hz sliding sessions while recording the capacitor voltage (Fig.&nbsp;</span><a data-dcnode-id="4425" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4426" instrument_node="">2e</span></a><span data-dcnode-id="4424" instrument_node="">). To extrapolate the applicable performance data from the charging curves, the total harvested energy within the period and the harvested energy were calculated with the equation:</span></p><div class="c-article-equation" data-dcnode-id="4417" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="4420"><span class="mathjax-tex" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">$$E = \frac{1}{2}CV^2$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="4403"><span data-dcnode-id="4416" instrument_node="">where </span><i data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">E</span></i><span data-dcnode-id="4413" instrument_node=""> is the stored energy in the capacitor in J, </span><i data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">C</span></i><span data-dcnode-id="4410" instrument_node=""> is a capacitance of the capacitor in F, and </span><i data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">V</span></i><span data-dcnode-id="4407" instrument_node=""> is the voltage of the charged capacitor in </span><i data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">V</span></i><span data-dcnode-id="4404" instrument_node="">; and the average current was calculated with the equation:</span></p><div class="c-article-equation" data-dcnode-id="4397" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="4400"><span class="mathjax-tex" data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">$$I = C\frac{{dV}}{{dt}}$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">
                    (2)
                </span></div></div><p data-dcnode-id="4341"><span data-dcnode-id="4396" instrument_node="">where </span><i data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">I</span></i><span data-dcnode-id="4393" instrument_node=""> is the average current from the TEG module in A, </span><i data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">C</span></i><span data-dcnode-id="4390" instrument_node=""> is a capacitance of the capacitor in F, and </span><span class="mathjax-tex" data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">\(\frac{{dV}}{{dt}}\)</span></span><span data-dcnode-id="4387" instrument_node=""> is the rate of voltage change in V s</span><sup data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">−1</span></sup><span data-dcnode-id="4384" instrument_node="">. Using the above equations, the total amount of stored energy and the average current was calculated and summarized in Fig.&nbsp;</span><a data-dcnode-id="4382" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4383" instrument_node="">2f</span></a><span data-dcnode-id="4381" instrument_node="">. The average current remained mostly unchanged at 5.8 μA against different capacitors, while the energy stored maximized at 0.49 mJ near the load of 100 μF. The charging characteristics of the TEG modules at different frequencies were also tested and plotted in Fig.&nbsp;</span><a data-dcnode-id="4379" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4380" instrument_node="">2g–h</span></a><span data-dcnode-id="4378" instrument_node="">. These data show a near-linear growth in stored energy and average current with the sliding frequency, which corroborated with the behavior observed in Fig.&nbsp;</span><a data-dcnode-id="4376" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4377" instrument_node="">2d</span></a><span data-dcnode-id="4375" instrument_node="">. The mechanical durability of the TEG modules was also evaluated through repeated folding, crumpling and extended abrasion (Fig.&nbsp;</span><a data-dcnode-id="4373" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4374" instrument_node="">2i</span></a><span data-dcnode-id="4372" instrument_node="">). The TEG modules were repeatedly folded with the radius below 1 mm for 100 cycles, and their open-circuit voltage (V</span><sub data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">OC</span></sub><span data-dcnode-id="4369" instrument_node="">) during 1.5 Hz sliding motion was monitored, which has shown no discernible change (Fig.&nbsp;</span><a data-dcnode-id="4367" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4368" instrument_node="">2j</span></a><span data-dcnode-id="4366" instrument_node="">). The TEG modules were also crumpled randomly and flattened repeatedly for 100 times, with their V</span><sub data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">OC</span></sub><span data-dcnode-id="4363" instrument_node=""> when sliding monitored. The crumpling deformation had also shown no change in performance (Fig.&nbsp;</span><a data-dcnode-id="4361" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4362" instrument_node="">2k</span></a><span data-dcnode-id="4360" instrument_node="">). The durability of the module against constant friction and washing was also tested, where the TEG module underwent constant sliding motion for over 2000 cycles and 20-min washing, where no visible drop in V</span><sub data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">OC</span></sub><span data-dcnode-id="4357" instrument_node=""> was observed (Fig.&nbsp;</span><a data-dcnode-id="4355" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4356" instrument_node="">2l</span></a><span data-dcnode-id="4354" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="4352" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4353" instrument_node="">21</span></a><span data-dcnode-id="4351" instrument_node="">). The TEG modules could thus be considered a flexible and durable biomechanical energy harvest and were ready for integration. See Supplementary Note&nbsp;</span><a data-dcnode-id="4349" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4350" instrument_node="">1</span></a><span data-dcnode-id="4348" instrument_node=""> and Supplementary Figs.&nbsp;</span><a data-dcnode-id="4346" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4347" instrument_node="">2</span></a><span data-dcnode-id="4345" instrument_node="">–</span><a data-dcnode-id="4343" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4344" instrument_node="">5</span></a><span data-dcnode-id="4342" instrument_node=""> for the detailed device optimization, method of characterization, and performance calculation of the TEG.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4282" data-test="figure" data-title="Characterization of the performance of the TEG module." id="figure-2"><figure data-dcnode-id="4283"><figcaption data-dcnode-id="4338"><b class="c-article-section__figure-caption" data-dcnode-id="4339" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="4340" instrument_node="">Fig. 2: Characterization of the performance of the TEG module.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4294"><div class="c-article-section__figure-item" data-dcnode-id="4333"><a class="c-article-section__figure-link" data-dcnode-id="4334" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/2" rel="nofollow"><picture data-dcnode-id="4335"><source data-dcnode-id="4337" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-021-21701-7/MediaObjects/41467_2021_21701_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="4336" height="461" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-021-21701-7/MediaObjects/41467_2021_21701_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4295" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="4296"><b data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">a</span></b><span data-dcnode-id="4330" instrument_node=""> Schematic image of the layer-by-layer composition of the textile-based TEG module composed of a PTFE-based mover (top) and an EC-PU-based stator (bottom). </span><b data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">b</span></b><span data-dcnode-id="4327" instrument_node=""> The charge generation mechanism of the TEG module under in-plane friction between the mover and the stator. The unrectified output peak voltages (</span><b data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">c</span></b><span data-dcnode-id="4324" instrument_node="">) and peak currents (</span><b data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">d</span></b><span data-dcnode-id="4321" instrument_node="">) of the TEG at different sliding frequencies. The charging of commercial capacitors with difference capacitance at 1.5 Hz in a 60-s period (</span><b data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">e</span></b><span data-dcnode-id="4318" instrument_node="">) and the corresponding stored energies and equivalent average DC currents (</span><b data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">f</span></b><span data-dcnode-id="4315" instrument_node="">). The charging of 100 μF capacitor at different frequencies in a 60-s period (</span><b data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">g</span></b><span data-dcnode-id="4312" instrument_node="">) and the corresponding stored energies and equivalent average DC currents (</span><b data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">h</span></b><span data-dcnode-id="4309" instrument_node="">). </span><b data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">i</span></b><span data-dcnode-id="4306" instrument_node=""> Images of folded and crumpled TEG stator. Scale bar, 1 cm. The unrectified output peak voltages before and after 100 cycles of folding (</span><b data-dcnode-id="4304"><span data-dcnode-id="4305" instrument_node="">j</span></b><span data-dcnode-id="4303" instrument_node="">) and crumpling (</span><b data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">k</span></b><span data-dcnode-id="4300" instrument_node="">). </span><b data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">l</span></b><span data-dcnode-id="4297" instrument_node=""> The long-term electrical signal from the TEG module under continuous sliding motions with the frequency of 1.5 Hz.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4284"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="4285" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/2" rel="nofollow"><span data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4286" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4287" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4288" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4291" instrument_node="">
