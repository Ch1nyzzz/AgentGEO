</span></a></div></figure></div><p data-dcnode-id="4189"><span data-dcnode-id="4281" instrument_node="">In the wearable microgrid system, BFCs offer the feature of harvesting biochemical energy continuously from metabolites present in biofluids via electroenzymatic reactions. Due to the high lactate concentrations in human sweat, a variety of sweat-based BFCs have been developed as wearable energy harvesters</span><sup data-dcnode-id="4266"><a data-dcnode-id="4279" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d315374591e856" title="Sakharov, D. A. et al. Relationship between lactate concentrations in active muscle sweat and whole blood. Bull. Exp. Biol. Med. 150, 83–85 (2010)."><span data-dcnode-id="4280" instrument_node="">47</span></a><span data-dcnode-id="4278" instrument_node="">,</span><a data-dcnode-id="4276" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d315374591e856_1" title="Yin, L. et al. Highly stable battery pack via insulated, reinforced, buckling-enabled interconnect array. Small 14, 1800938 (2018)."><span data-dcnode-id="4277" instrument_node="">48</span></a><span data-dcnode-id="4275" instrument_node="">,</span><a data-dcnode-id="4273" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d315374591e856_2" title="Chen, X. et al. Stretchable and flexible buckypaper‐based lactate biofuel cell for wearable electronics. Adv. Funct. Mater. 29, 1905785 (2019)."><span data-dcnode-id="4274" instrument_node="">49</span></a><span data-dcnode-id="4272" instrument_node="">,</span><a data-dcnode-id="4270" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d315374591e856_3" title="Jeerapan, I., Sempionatto, J. R., Pavinatto, A., You, J.-M. &amp; Wang, J. Stretchable biofuel cells as wearable textile-based self-powered sensors. J. Mater. Chem. A 4, 18342–18353 (2016)."><span data-dcnode-id="4271" instrument_node="">50</span></a><span data-dcnode-id="4269" instrument_node="">,</span><a aria-label="Reference 51" data-dcnode-id="4267" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d315374591e859" title="Harvey, C. J., LeBouf, R. F. &amp; Stefaniak, A. B. Formulation and stability of a novel artificial human sweat under conditions of storage and use. Toxicol. Vitr. 24, 1790–1796 (2010)."><span data-dcnode-id="4268" instrument_node="">51</span></a></sup><span data-dcnode-id="4265" instrument_node="">. The wearable BFC modules were also screen-printed using various ink composites onto textile substrates. Carbon nanotubes (CNT)-based pellets were attached to interdigitated “island-bridge” interconnections (Fig.&nbsp;</span><a data-dcnode-id="4263" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4264" instrument_node="">3a-b</span></a><span data-dcnode-id="4262" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="4260" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4261" instrument_node="">8</span></a><span data-dcnode-id="4259" instrument_node="">) composed of flexible carbon composite as currents collectors and flexible silver composite as conductive interconnections. As illustrated in Fig.&nbsp;</span><a data-dcnode-id="4257" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4258" instrument_node="">3c</span></a><span data-dcnode-id="4256" instrument_node="">, such bioenergy harvesting relies on the oxidation of lactate catalyzed by the lactate oxidase (LOx) immobilized on the bioanode, and on the oxygen reduction reaction facilitated by bilirubin oxidase (BOx) on the cathode. For efficient sweat bioenergy harvesting, the anode CNT pellets were preloaded with the 1,4-naphthoquinone (NQ) mediator while confining LOx with the glutaraldehyde (GA) cross-linker and chitosan; the CNT-based cathode pellets were decorated with protoporphyrin IX (PPIX) as the electron transfer promoter</span><sup data-dcnode-id="4253"><a aria-label="Reference 52" data-dcnode-id="4254" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d315374591e872" title="Lalaoui, N., LeGoff, A., Holzinger, M. &amp; Cosnier, S. Fully oriented bilirubin oxidase on porphyrin-functionalized carbon nanotube electrodes for electrocatalytic oxygen reduction. Chem. - A Eur. J. 21, 16868–16873 (2015)."><span data-dcnode-id="4255" instrument_node="">52</span></a></sup><span data-dcnode-id="4252" instrument_node="">, while immobilizing the BOx with Nafion. The detailed fabrication and composition of the anode and cathode pellets are described in the “Methods” section and Supplementary Notes&nbsp;</span><a data-dcnode-id="4250" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4251" instrument_node="">2</span></a><span data-dcnode-id="4249" instrument_node="">. All in-vitro tests for characterization of the BFC were carried out in 0.5 M phosphate buffer solution (PBS) with pH of 7.4. Traditionally, wearable BFC devices are characterized with LSV, with scan rate near 5 mV s</span><sup data-dcnode-id="4233"><span data-dcnode-id="4248" instrument_node="">−1,</span><a aria-label="Reference 11" data-dcnode-id="4246" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d315374591e881" title="Bandodkar, A. J. et al. Soft, stretchable, high power density electronic skin-based biofuel cells for scavenging energy from human sweat. Energy Environ. Sci. 10, 1581–1589 (2017)."><span data-dcnode-id="4247" instrument_node="">11</span></a><span data-dcnode-id="4245" instrument_node="">,</span><a aria-label="Reference 16" data-dcnode-id="4243" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d315374591e884" title="Yu, Y. et al. Biofuel-powered soft electronic skin with multiplexed and wireless sensing for human-machine interfaces. Sci. Robot. 5, 7946 (2020)."><span data-dcnode-id="4244" instrument_node="">16</span></a><span data-dcnode-id="4242" instrument_node="">,</span><a aria-label="Reference 49" data-dcnode-id="4240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d315374591e887" title="Chen, X. et al. Stretchable and flexible buckypaper‐based lactate biofuel cell for wearable electronics. Adv. Funct. Mater. 29, 1905785 (2019)."><span data-dcnode-id="4241" instrument_node="">49</span></a><span data-dcnode-id="4239" instrument_node="">,</span><a aria-label="Reference 52" data-dcnode-id="4237" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d315374591e890" title="Lalaoui, N., LeGoff, A., Holzinger, M. &amp; Cosnier, S. Fully oriented bilirubin oxidase on porphyrin-functionalized carbon nanotube electrodes for electrocatalytic oxygen reduction. Chem. - A Eur. J. 21, 16868–16873 (2015)."><span data-dcnode-id="4238" instrument_node="">52</span></a><span data-dcnode-id="4236" instrument_node="">,</span><a aria-label="Reference 53" data-dcnode-id="4234" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d315374591e893" title="Bandodkar, A. J., Jeerapan, I., You, J. M., Nuñez-Flores, R. &amp; Wang, J. Highly stretchable fully-printed CNT-based electrochemical sensors and biofuel cells: combining intrinsic and design-induced stretchability. Nano Lett. 16, 721–727 (2016)."><span data-dcnode-id="4235" instrument_node="">53</span></a></sup><span data-dcnode-id="4232" instrument_node="">. However, for high-surface-area electrodes like the CNT pellets such high-speed LSV will result in an unrealistically high power due to the capacitive currents (Supplementary Fig.&nbsp;</span><a data-dcnode-id="4230" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4231" instrument_node="">11</span></a><span data-dcnode-id="4229" instrument_node="">). Therefore, the fabricated BFC modules were characterized using chronoamperometry (CA) at different potentials in the presence of 15 mM lactate to reflect the realistic power output of the BFC in extended discharge sessions. The testing of the BFC modules resulted in a maximum power of 21.5 μW per module when discharging the BFC at 0.5 V (Fig.&nbsp;</span><a data-dcnode-id="4227" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4228" instrument_node="">3d–e</span></a><span data-dcnode-id="4226" instrument_node="">). The response of the BFC to different lactate concentrations has been evaluated using CA, as shown in Fig.&nbsp;</span><a data-dcnode-id="4224" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4225" instrument_node="">3f</span></a><span data-dcnode-id="4223" instrument_node="">, Supplementary Figs.&nbsp;</span><a data-dcnode-id="4221" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4222" instrument_node="">12</span></a><span data-dcnode-id="4220" instrument_node=""> and </span><a data-dcnode-id="4218" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4219" instrument_node="">13</span></a><span data-dcnode-id="4217" instrument_node="">, where the power per module increases from 9.7 μW at 5 mM lactate to 25.3 μW at 25 mM lactate. The mechanical durability and the stability of the BFC were also tested using CA. The module was bent 1000 times to 180° inward then outward with the radius of 1.3 cm (Fig.&nbsp;</span><a data-dcnode-id="4215" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4216" instrument_node="">3g</span></a><span data-dcnode-id="4214" instrument_node="">), with the current at 0.5 V before and after bending in 10 mM lactate environment measured. As shown in Fig.&nbsp;</span><a data-dcnode-id="4212" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4213" instrument_node="">3h</span></a><span data-dcnode-id="4211" instrument_node="">, the power of the BFC did not show any noticeable change before and after the bending. Such resiliency is attributed primarily to the “island-bridge” structure where the non-flexible, functional electrode pellets as the islands are connected by flexible, conductive silver interconnections. The stability of the BFC was tested also throughout the week (as shown in Supplementary Fig.&nbsp;</span><a data-dcnode-id="4209" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4210" instrument_node="">14</span></a><span data-dcnode-id="4208" instrument_node="">). The BFC under test was stored in refrigerator under 4 °C and was taken out for testing every 24 h in a 10 mM lactate environment. The results of the individual CA measurements are summarized in Fig.&nbsp;</span><a data-dcnode-id="4206" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4207" instrument_node="">3i</span></a><span data-dcnode-id="4205" instrument_node="">. Additional details of the fabrication and characterization of the BFC module, including its washability and stability in simulated sweat conditions, can be found in Supplementary Note&nbsp;</span><a data-dcnode-id="4203" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4204" instrument_node="">2</span></a><span data-dcnode-id="4202" instrument_node=""> and Supplementary Figs.&nbsp;</span><a data-dcnode-id="4200" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4201" instrument_node="">7</span></a><span data-dcnode-id="4199" instrument_node="">-</span><a data-dcnode-id="4197" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4198" instrument_node="">11</span></a><span data-dcnode-id="4196" instrument_node="">, </span><a data-dcnode-id="4194" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4195" instrument_node="">15</span></a><span data-dcnode-id="4193" instrument_node="">, and </span><a data-dcnode-id="4191" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4192" instrument_node="">21</span></a><span data-dcnode-id="4190" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4139" data-test="figure" data-title="Characterization of the performance of the BFC module." id="figure-3"><figure data-dcnode-id="4140"><figcaption data-dcnode-id="4186"><b class="c-article-section__figure-caption" data-dcnode-id="4187" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="4188" instrument_node="">Fig. 3: Characterization of the performance of the BFC module.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4151"><div class="c-article-section__figure-item" data-dcnode-id="4181"><a class="c-article-section__figure-link" data-dcnode-id="4182" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/3" rel="nofollow"><picture data-dcnode-id="4183"><source data-dcnode-id="4185" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-021-21701-7/MediaObjects/41467_2021_21701_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="4184" height="570" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-021-21701-7/MediaObjects/41467_2021_21701_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4152" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="4153"><b data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">a</span></b><span data-dcnode-id="4178" instrument_node=""> Schematic image of the textile-based BFC module composed of eight BOx-based cathodes and two LOx-based anodes connected by printed flexible interconnections. </span><b data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">b</span></b><span data-dcnode-id="4175" instrument_node=""> A zoomed-in photo image of the fabricated BFC module. Scale bar, 5 mm. </span><b data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">c</span></b><span data-dcnode-id="4172" instrument_node=""> The charge generation mechanism of the BFC from lactate and oxygen in sweats. </span><b data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">d</span></b><span data-dcnode-id="4169" instrument_node=""> The output power of the BFC module at different discharge potentials with 15 mM lactate concentration. </span><b data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">e</span></b><span data-dcnode-id="4166" instrument_node=""> The equivalent polarization curve derived from (d). </span><b data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">f</span></b><span data-dcnode-id="4163" instrument_node=""> The output power of the BFC module discharged at 0.5 V under various lactate concentrations. </span><b data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">g</span></b><span data-dcnode-id="4160" instrument_node=""> Image of the BFC module under 180° outward bending. Scale bar, 1 cm. </span><b data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">h</span></b><span data-dcnode-id="4157" instrument_node=""> The power of the BFC module before and after the 1000 bending cycles. </span><b data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">i</span></b><span data-dcnode-id="4154" instrument_node=""> The output power of the BFC module with 10 mM lactate concentration everyday within a week.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4141"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="4142" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/3" rel="nofollow"><span data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4143" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4144" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4145" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4148" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4147" fill-rule="evenodd"></path><span data-dcnode-id="4146" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4115"><span data-dcnode-id="4138" instrument_node="">Flexible, printed SCs are selected for its ability to charge and discharge repeatedly and rapidly to deliver a flexible range of powers—a feature highly desirable for fast booting and pulsed high-power applications. A CNT and poly(3,4-ethylene dioxythiophene) polystyrene sulfonate (PEDOT:PSS) hybrid capacitor, offering screen-printability and high flexibility, has been adopted as symmetrical interdigitated electrodes that are connected by flexible silver current collectors (Fig.&nbsp;</span><a data-dcnode-id="4136" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4137" instrument_node="">4a</span></a><span data-dcnode-id="4135" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="4133" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4134" instrument_node="">15</span></a><span data-dcnode-id="4132" instrument_node="">)</span><sup data-dcnode-id="4129"><a aria-label="Reference 54" data-dcnode-id="4130" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d315374591e997" title="Tehrani, F. et al. Laser‐induced graphene composites for printed, stretchable, and wearable electronics. Adv. Mater. Technol. 4, 1900162 (2019)."><span data-dcnode-id="4131" instrument_node="">54</span></a></sup><span data-dcnode-id="4128" instrument_node="">. Each SC module consists of 5 SC units connected in series to reach the desired 5 V voltage range for directly powering electronics, with each SC unit featuring four interdigitated CNT-PEDOT:PSS electrode segments covered by a solidified, transparent, flexible, sulfuric acid-crosslinked polyvinyl alcohol (PVA) electrolyte (Fig.&nbsp;</span><a data-dcnode-id="4126" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4127" instrument_node="">4b</span></a><span data-dcnode-id="4125" instrument_node=""> and Supplementary Fig.&nbsp;</span><a data-dcnode-id="4123" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4124" instrument_node="">16</span></a><span data-dcnode-id="4122" instrument_node="">). The hybrid capacitor stores electric energy via both double-layer capacitance endowed by the high specific surface area CNTs and pseudocapacitance from the PEDOT:PSS, as illustrated in Fig.&nbsp;</span><a data-dcnode-id="4120" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4121" instrument_node="">4c</span></a><span data-dcnode-id="4119" instrument_node="">. The areal capacitance of the printed SC material was characterized via both cyclic voltammetry (CV) at different scan rates and galvanostatic charge-discharge (GCD) with different currents. The GCD was conducted at charge/discharge between 0 V and 1 V with currents at 25, 50, 100, 250, and 500 μA (Fig.&nbsp;</span><a data-dcnode-id="4117" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4118" instrument_node="">4d</span></a><span data-dcnode-id="4116" instrument_node="">). The capacitance at discharge is used to gauge the capacitance of the SC unit, which is calculated using the equation:</span></p><div class="c-article-equation" data-dcnode-id="4109" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="4112"><span class="mathjax-tex" data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">$$C = \frac{{I\Delta t}}{{A( {E_f - E_i} )}}$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="4074"><span data-dcnode-id="4108" instrument_node="">where </span><i data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">C</span></i><span data-dcnode-id="4105" instrument_node=""> is the areal capacitance in F cm</span><sup data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">−2</span></sup><span data-dcnode-id="4102" instrument_node="">, </span><i data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">I</span></i><span data-dcnode-id="4099" instrument_node=""> is the current in A, </span><i data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Δt</span></i><span data-dcnode-id="4096" instrument_node=""> is the time taken for the discharge, </span><i data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">A</span></i><span data-dcnode-id="4093" instrument_node=""> is the geometric area of electrodes, </span><i data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">E</span></i><sub data-dcnode-id="4088"><i data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">f</span></i></sub><span data-dcnode-id="4087" instrument_node=""> is the charged potential in V, and </span><i data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">E</span></i><sub data-dcnode-id="4082"><i data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">i</span></i></sub><span data-dcnode-id="4081" instrument_node=""> is the discharged potential in V. CV was carried out with the scan rates of 5, 10, 25, 50, 100 mV s</span><sup data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">−1</span></sup><span data-dcnode-id="4078" instrument_node=""> between the window of 0 V and 1 V (Fig.&nbsp;</span><a data-dcnode-id="4076" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4077" instrument_node="">4e</span></a><span data-dcnode-id="4075" instrument_node="">). The areal capacitance is calculated using the formula:</span></p><div class="c-article-equation" data-dcnode-id="4068" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="4071"><span class="mathjax-tex" data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">$$C = \frac{1}{{2{\it{\upnu }}{A}(E_f -E_i)}}\int_{{E}_i}^{{E}_f} {{I}\;{dV}}$$</span></span></div><div class="c-article-equation__number" data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">
                    (4)
                </span></div></div><p data-dcnode-id="4000"><span data-dcnode-id="4067" instrument_node="">where </span><i data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">C</span></i><span data-dcnode-id="4064" instrument_node=""> is the areal capacitance in F cm</span><sup data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">−2</span></sup><span data-dcnode-id="4061" instrument_node="">, </span><i data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">ν</span></i><span data-dcnode-id="4058" instrument_node=""> is the scan rate in V s</span><sup data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">−1</span></sup><span data-dcnode-id="4055" instrument_node="">, </span><i data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">A</span></i><span data-dcnode-id="4052" instrument_node=""> is the geometric area of electrodes in cm</span><sup data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">2</span></sup><span data-dcnode-id="4049" instrument_node="">, </span><i data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">E</span></i><sub data-dcnode-id="4044"><i data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">f</span></i></sub><span data-dcnode-id="4043" instrument_node=""> is the higher vertex potential in V, </span><i data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">E</span></i><sub data-dcnode-id="4038"><i data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">i</span></i></sub><span data-dcnode-id="4037" instrument_node=""> is the lower vertex potential in V, and the </span><i data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">I</span></i><span data-dcnode-id="4034" instrument_node=""> is the current in A. As agreed by both characterization methods, the capacitance of the printed SC was determined to be ca. 10 mF cm</span><sup data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">−2</span></sup><span data-dcnode-id="4031" instrument_node=""> (Supplementary Fig.&nbsp;</span><a data-dcnode-id="4029" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4030" instrument_node="">17</span></a><span data-dcnode-id="4028" instrument_node="">). Several SC modules can be connected in series or in parallel to adjust the overall capacitance to fit for harvesters and applications to obtain optimal charging speed and deliver sufficient energy (Fig.&nbsp;</span><a data-dcnode-id="4026" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4027" instrument_node="">4f</span></a><span data-dcnode-id="4025" instrument_node="">). The stability of the module is analyzed by performing GCD cycles on the SC module. The mechanical stability of the module was evaluated by applying 1000 cycles of repeated inward-outward bending cycles at 180° with a bending radius of 0.5 cm (Fig.&nbsp;</span><a data-dcnode-id="4023" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4024" instrument_node="">4g</span></a><span data-dcnode-id="4022" instrument_node="">). As shown in Fig.&nbsp;</span><a data-dcnode-id="4020" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4021" instrument_node="">4h</span></a><span data-dcnode-id="4019" instrument_node="">, the charge-discharge behavior of the SC does not show any noticeable change before and after the 1000 cycles of bending deformation, suggesting the robust flexibility of the SC module for wearable applications. To prevent the leaching of the acidic electrolyte, the device is sealed by an additional layer of printed SEBS. The device can thus withstand extended wetting and washing without electrolyte leaching or observable degradation in its performance (Supplementary Fig.&nbsp;</span><a data-dcnode-id="4017" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4018" instrument_node="">21</span></a><span data-dcnode-id="4016" instrument_node="">). The electrochemical stability of the SC module was studied by 1000 cycles of GCD between 0 V and 5 V with a current of 50 μA. As demonstrated in Fig.&nbsp;</span><a data-dcnode-id="4014" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4015" instrument_node="">4i</span></a><span data-dcnode-id="4013" instrument_node="">, the areal capacitance of the SC shows a slight drop of areal capacitance after 1000 cycles to ca. 9 mF cm</span><sup data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">−2</span></sup><span data-dcnode-id="4010" instrument_node="">, while the coulombic efficiency gradually increases to 95%. The electrochemical performance of the SC is thus acceptable within the use-case of the microgrid, where roughly a few hundreds of charge-discharge cycles are expected. Detailed characterization and calculation of the SC performance are described in Supplementary Note&nbsp;</span><a data-dcnode-id="4008" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4009" instrument_node="">3</span></a><span data-dcnode-id="4007" instrument_node=""> and Supplementary Figs.&nbsp;</span><a data-dcnode-id="4005" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4006" instrument_node="">18</span></a><span data-dcnode-id="4004" instrument_node="">-</span><a data-dcnode-id="4002" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4003" instrument_node="">19</span></a><span data-dcnode-id="4001" instrument_node="">. Overall, each SC module was rated with the capacitance of ca. 150 μF.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3947" data-test="figure" data-title="Characterization of the performance of the SC modules." id="figure-4"><figure data-dcnode-id="3948"><figcaption data-dcnode-id="3997"><b class="c-article-section__figure-caption" data-dcnode-id="3998" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="3999" instrument_node="">Fig. 4: Characterization of the performance of the SC modules.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3959"><div class="c-article-section__figure-item" data-dcnode-id="3992"><a class="c-article-section__figure-link" data-dcnode-id="3993" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/4" rel="nofollow"><picture data-dcnode-id="3994"><source data-dcnode-id="3996" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-021-21701-7/MediaObjects/41467_2021_21701_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="3995" height="554" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-021-21701-7/MediaObjects/41467_2021_21701_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3960" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3961"><b data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">a</span></b><span data-dcnode-id="3989" instrument_node=""> Schematic image of the textile-based SC energy storage module consisting of current collectors, CNT-PEDOT:PSS-based electrodes and PVA-based solid gel electrolyte. Each module is composed of five SC units connected in series. </span><b data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">b</span></b><span data-dcnode-id="3986" instrument_node=""> The photo image of the printed SC module. Scale bar, 5 mm. </span><b data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">c</span></b><span data-dcnode-id="3983" instrument_node=""> The charge storage mechanism of the hybrid SC unit based on both the double-layer capacitance and pseudocapacitance. </span><b data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">d</span></b><span data-dcnode-id="3980" instrument_node=""> GCD with currents of 25, 50, 100, 250, and 500 μA of a SC unit from 0 V to 1 V. </span><b data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">e</span></b><span data-dcnode-id="3977" instrument_node=""> CV with scan rates of 5, 10, 25, 50, 100 mV s</span><sup data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">−1</span></sup><span data-dcnode-id="3974" instrument_node=""> from 0 V and 1 V of a SC unit. </span><b data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">f</span></b><span data-dcnode-id="3971" instrument_node=""> GCD of the energy storage modules with different configurations, with (i) two storage modules in series; (ii) one storage module; and (iii) two storage modules in parallel. </span><b data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">g</span></b><span data-dcnode-id="3968" instrument_node=""> Images of the inward and outward bending of the SC module. Scale bar, 1 cm. </span><b data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">h</span></b><span data-dcnode-id="3965" instrument_node=""> 5 μA GCD of the SC module before and after 1000 cycles of 180º bending deformation. </span><b data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">i</span></b><span data-dcnode-id="3962" instrument_node=""> The areal capacitance and coulombic efficiency of a SC unit in 1000 charge-discharge cycles.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3949"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3950" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-021-21701-7/figures/4" rel="nofollow"><span data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3951" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3952" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3953" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3956" instrument_node="">
