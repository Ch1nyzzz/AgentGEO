</span><p data-dcnode-id="580"><span data-dcnode-id="583" instrument_node="">See also </span><a data-dcnode-id="581" href="#" onclick="showcontent('contentFaq');return false;"><span data-dcnode-id="582" instrument_node="">Our Big PPG FAQ</span></a></p><span data-dcnode-id="579" instrument_node="">
</span><div class="question" data-dcnode-id="577" onclick="with(document.getElementById('answer0').style) {display = display!='block' ? 'block' : 'none';}"><span data-dcnode-id="578" instrument_node="">What are passphrases?</span></div><div class="answer" data-dcnode-id="575" id="answer0"><span data-dcnode-id="576" instrument_node="">Passphrases are combinations of a few common words. They attempt to provide credentials that are more secure, yet easier to remember.</span></div><span data-dcnode-id="574" instrument_node="">
</span><div class="question" data-dcnode-id="572" onclick="with(document.getElementById('answer1').style) {display = display!='block' ? 'block' : 'none';}"><span data-dcnode-id="573" instrument_node="">What does a passphrase look like?</span></div><div class="answer" data-dcnode-id="564" id="answer1"><span data-dcnode-id="571" instrument_node="">We may refer to our divine inspirator </span><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//xkcd.com/936/" target="_blank"><span data-dcnode-id="570" instrument_node="">xkcd</span></a><span data-dcnode-id="568" instrument_node="">: </span><i data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">correct horse battery staple</span></i><span data-dcnode-id="565" instrument_node=""> is a perfect example for a passphrase.</span></div><span data-dcnode-id="563" instrument_node="">
</span><div class="question" data-dcnode-id="561" onclick="with(document.getElementById('answer2').style) {display = display!='block' ? 'block' : 'none';}"><span data-dcnode-id="562" instrument_node="">What is the difference between passwords and passphrases?</span></div><div class="answer" data-dcnode-id="556" id="answer2"><span data-dcnode-id="560" instrument_node="">They use different approaches to create a short text block which should be hard to find out. Passwords use multiple elements (the characters) out of a small set (a-zA-Z0-9 plus maybe &amp;%$= special characters). Passphrases combine few elements (the words) of a much bigger set (2048 in the </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//xkcd.com/936/" target="_blank"><span data-dcnode-id="559" instrument_node="">xkcd</span></a><span data-dcnode-id="557" instrument_node=""> example).</span></div><span data-dcnode-id="555" instrument_node="">
</span><div class="question" data-dcnode-id="553" onclick="with(document.getElementById('answer3').style) {display = display!='block' ? 'block' : 'none';}"><span data-dcnode-id="554" instrument_node="">Do you store?</span></div><div class="answer" data-dcnode-id="551" id="answer3"><span data-dcnode-id="552" instrument_node="">We do not store anything, neither on server nor on client. Simply close the browser window and everything that happened is gone.</span></div><span data-dcnode-id="550" instrument_node="">
</span><div class="question" data-dcnode-id="548" onclick="with(document.getElementById('answer4').style) {display = display!='block' ? 'block' : 'none';}"><span data-dcnode-id="549" instrument_node="">Legal implications?</span></div><div class="answer" data-dcnode-id="546" id="answer4"><span data-dcnode-id="547" instrument_node="">We provide passphrases on an as-is basis. We take no responsibilty for any further use of a passphrase, especially, but not limited to, not for its suitability for any intent. Any copyright infringements by passphrase content are purely unintentional and not reproducible.</span></div><span data-dcnode-id="545" instrument_node="">

</span><div class="contentHeadline" data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">
				Frequently asked questions
			</span></div><span data-dcnode-id="166" instrument_node="">
</span></div><span data-dcnode-id="164" instrument_node="">
</span><div class="contentElement" data-dcnode-id="74" id="contentTutorial"><span data-dcnode-id="163" instrument_node="">
</span><div class="contentHeadline" data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">
				How to use passphrasegenerator.com
			</span></div><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="150"><span class="contentSubtitle" data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">If you only want to generate a passphrase</span></span><span data-dcnode-id="157" instrument_node="">
			then you are almost there. The default settings provide sensible parameters. Click on </span><em data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">generate</span></em><span data-dcnode-id="154" instrument_node=""> to create a new passphrase or use the </span><em data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">get new</span></em><span data-dcnode-id="151" instrument_node=""> buttons to alternate single words. Modify your passphrase until you got something that makes sense only to you und is easy to remember. Click on the passphrase, if it is not already selected, and copy it to your clipboard with Ctrl-C.</span></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="145"><span class="contentSubtitle" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Get more possibilities</span></span><span data-dcnode-id="146" instrument_node="">
				 by changing the options. Select between various dictionaries [soon to come], vary the allowed length range of the words. Altering the number of words has an heavy impact on security. Passphrases that consist of more words are harder to guess, but may be less easy to remember.
			</span></p><span data-dcnode-id="144" instrument_node="">
</span><p data-dcnode-id="137"><span class="contentSubtitle" data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">The wordlist that your phrase is derived from</span></span><span data-dcnode-id="141" instrument_node="">
				can be customized, if you use a local dictionary. After activating the </span><em data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Local dictionary</span></em><span data-dcnode-id="138" instrument_node=""> checkbox, the currently used dictionary is downloaded and displayed in a box. You can modify it, extend it or replace it with your own wordlist. Think of wordlists consisting of fish or flower names. Or special wordlists for children. You could even use Shakespeare's complete works as a dictionary—repeated words will be ignored and too short words will be filtered out. Not every device may be capable of processing the amount of data, though.
			</span></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="131"><span data-dcnode-id="135" instrument_node="">
</span><span class="contentSubtitle" data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">Using a custom wordlist</span></span><span data-dcnode-id="132" instrument_node=""> will make your passphrases even more secure, as the attacker can not use a known dictionary.
			</span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">
				A few rules apply:
				</span></p><ul data-dcnode-id="111"><span data-dcnode-id="127" instrument_node="">
</span><li data-dcnode-id="122"><span data-dcnode-id="126" instrument_node="">The wordlist must contain at least 2048 </span><em data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">unique</span></em><span data-dcnode-id="123" instrument_node=""> words.</span></li><span data-dcnode-id="121" instrument_node="">
</span><li data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">Use only standard A-Z letters. [Will change with the dawn of I18n on the project.]</span></li><span data-dcnode-id="118" instrument_node="">
</span><li data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">No hyphenization. Not even hyphens. Follows, no hyphen-joined words.</span></li><span data-dcnode-id="115" instrument_node="">
</span><li data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">Please separate the words with whitespace, that is, newlines and/or blanks.</span></li><span data-dcnode-id="112" instrument_node="">
</span></ul><span data-dcnode-id="110" instrument_node="">
				These wordlists are kept local on your device, and are never transferred to the server or anywhere else. They are also not stored locally. That means, if you close or reload the browser window, changes will be lost. You have to </span><em data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">keep a copy of your dictionary</span></em><span data-dcnode-id="107" instrument_node=""> in some editor, if changes are important.
			</span><p data-dcnode-id="106"></p><span data-dcnode-id="105" instrument_node="">
</span><div class="contentHeadline" data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">
				A little Easter Egg
			</span></div><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="97"><span data-dcnode-id="101" instrument_node="">
				We have incorporated a small example model into the generator, to make explaining easier. Just use the words </span><em data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">correct horse battery staple</span></em><span data-dcnode-id="98" instrument_node=""> as your wordlist.
			</span></p><span data-dcnode-id="96" instrument_node="">
</span><p data-dcnode-id="85"><span data-dcnode-id="95" instrument_node="">
				What? It did not work? How embarassing. In fact there is a good chance you let the horse get away. Most people do. You do if you see </span><em data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">3 of 4 words selected</span></em><span data-dcnode-id="92" instrument_node=""> over the </span><em data-dcnode-id="90"><span data-dcnode-id="91" instrument_node="">generate</span></em><span data-dcnode-id="89" instrument_node=""> button. Which means, the minimum word length is at the standard setting of 6 (or even higher), and does not include the five-letter-word </span><em data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">horse</span></em><span data-dcnode-id="86" instrument_node="">. Once you fixed that, it works. Or, most times it does.
			</span></p><span data-dcnode-id="84" instrument_node="">
</span><p data-dcnode-id="79"><span data-dcnode-id="83" instrument_node="">
				In </span><em data-dcnode-id="81"><span data-dcnode-id="82" instrument_node="">slotmachine mode</span></em><span data-dcnode-id="80" instrument_node="">, many phrases contain the same word more than once. Let us show why this is important. If a word may appear once, three choices are available for the second word, then two for the third, and the last one pays the bill. Giving only 4 x 3 x 2 x 1 = 24 combinations. If every word is allowed to appear in every place, there are 4 x 4 x 4 x 4 = 256 possible combinations.
			</span></p><span data-dcnode-id="78" instrument_node="">
</span><p data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">
				So, if you cut out duplicates, you reduce the number of possible choices and therefore security. Of course, with a minimum size directory of 2048 words, duplicates are much much much less frequent. But this fact allows us to let the processes to select each word independently from each other. [is this of any relevance?]
				[2bc]
			</span></p><span data-dcnode-id="75" instrument_node="">
</span></div><span data-dcnode-id="73" instrument_node="">

</span><div class="contentElement" data-dcnode-id="35" id="contentAbout"><span data-dcnode-id="48" instrument_node="">
</span><div class="contentHeadline" data-dcnode-id="46"><span data-dcnode-id="47" instrument_node="">
				About the project
			</span></div><span data-dcnode-id="45" instrument_node="">
</span><p data-dcnode-id="43"><span data-dcnode-id="44" instrument_node="">Our goal with this site is to gain focus on security in a playful, creative way.</span></p><span data-dcnode-id="42" instrument_node="">
</span><p data-dcnode-id="37"><span data-dcnode-id="41" instrument_node="">First was the idea that a passphrase generator could be a nice little project to play around with. Next we found out that the domain passphrase-generator.com was still unregistered. And that was it. Brainstorm, stuff ideas into the wiki, let it ripen some weeks. Let it gather momentum. And then start to code. Materialize our ideas. Code, code. This is the </span><em data-dcnode-id="39"><span data-dcnode-id="40" instrument_node="">hot fingers</span></em><span data-dcnode-id="38" instrument_node=""> phase. Functionality and design condense into a product, while losing the beauty of simplicity. Now the site creates work by itself. Content has to be filled in, various ends are to be joined. Another problem solved. Working towards a proof of concept. Then...</span></p><span data-dcnode-id="36" instrument_node="">
