					</span></h4><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The E-Z Base and E-Z Spike products should not be used for solid fences in excess of 4' in height or that are unprotected from wind forces. These products are not rated for uplift loads, and should not be used with posts for overhead structures or any other structure that requires resistance to wind uplift loads. Notwithstanding the terms of the Limited Warranty, Simpson Strong-Tie does not guarantee, represent or warrant that this product will prevent or reduce damage caused by corrosion, or any seismic, wind, atmospheric, or other load-producing event.</span></p></div><span data-dcnode-id="1440" instrument_node="">
