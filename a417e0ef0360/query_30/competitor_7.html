face is 100 times bigger in the sky. Saturn reflects the light 3 times better than the Moon (based on what is called the </span><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bond_albedo"><span data-dcnode-id="2480" instrument_node="">Bond albedo</span></a><span data-dcnode-id="2478" instrument_node="">), and after that Titan lets only through 1/10 of the light it gets compared to the Earth. So we have for a full Saturn in Titan's sky: 1/100 *100*3*1/10 = 0.3 times the brightness of a full Moon in the Earth sky, roughly.</span></li></ul></li></ul></li></ul></div></div></div><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">&nbsp;</span></p><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">&nbsp;</span></p></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2455" instrument_node="">
</span></div></div></div><span data-dcnode-id="2451" instrument_node="">
</span></div></li><li class="slide s-section-10" data-dcnode-id="2394" id="section-f_e8651f3e-7bc9-46e0-9ff1-10dfc00a6285"><div class="waypoint" data-dcnode-id="2448"></div><a class="section-anchor" data-dcnode-id="2447"></a><div data-dcnode-id="2395"><span data-dcnode-id="2446" instrument_node="">
</span><div class="lazyload s-new-media-section s-section s-media-section background-image" data-dcnode-id="2397" data-react-style="{}"><div class="container" data-dcnode-id="2398"><div class="columns sixteen" data-dcnode-id="2430"><div class="s-title-group" data-dcnode-id="2431"><div class="s-title has-fresh-line" data-dcnode-id="2439"><div class="s-component s-text" data-dcnode-id="2440"><h2 class="" data-dcnode-id="2441"><div class="s-component-content s-font-title" data-dcnode-id="2442"><h2 data-dcnode-id="2443"><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Titan, the best place where to fly in our Solar System</span></p></h2></div></h2></div></div><div class="s-subtitle" data-dcnode-id="2432"><div class="s-component s-text" data-dcnode-id="2433"><h4 class="" data-dcnode-id="2434"><div class="s-component-content s-font-heading" data-dcnode-id="2435"><h4 data-dcnode-id="2436"><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Here below is what happens when an aircraft is launched above the surface of the 32 largest Solar System bodies !</span></p></h4></div></h4></div></div></div></div><span data-dcnode-id="2429" instrument_node="">
</span><div class="s-mh s-layout-normal s-repeatable" data-dcnode-id="2400"><div data-dcnode-id="2401"><div class="s-repeatable-item" data-dcnode-id="2402" data-sorting-index="0"><div class="clearfix" data-dcnode-id="2403"><div data-dcnode-id="2404"><div class="s-item-media-wrapper s-mhi" data-dcnode-id="2419"><div class="s-item-media-group" data-dcnode-id="2420"><div class="s-component s-media" data-dcnode-id="2421"><div data-dcnode-id="2422"><div class="s-component-content" data-dcnode-id="2423"><div class="s-img-wrapper" data-dcnode-id="2424"><div class="s-ratio-box" data-dcnode-id="2425" style="max-width:399px;max-height:805px"><div class="s-ratio-fill" data-dcnode-id="2428" style="padding-bottom:201.75%"></div><div class="s-img-wrapper" data-dcnode-id="2426"><img alt="" class="lazyload crop-default" data-dcnode-id="2427" data-description="" data-src="//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit,fl_lossy,h_9000,w_1200,f_auto,q_auto/980393/744728_429670.png" height="805" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit%2Cfl_lossy%2Ch_9000%2Cw_1200%2Cf_auto%2Cq_1/980393/744728_429670.png&amp;raw" title="" width="399"></div></div></div></div></div></div></div></div><div class="" data-dcnode-id="2405"><div class="s-item-text-group" data-dcnode-id="2406"><div class="s-item-text" data-dcnode-id="2407"><div class="s-component s-text" data-dcnode-id="2408"><div class="" data-dcnode-id="2409"><div class="s-component-content s-font-body" data-dcnode-id="2410"><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">"When it comes to flying, Titan might be better than Earth. Its atmosphere is thick but its gravity is light, giving it a surface pressure only 50% higher than Earth’s with air four times as dense. Its gravity—lower than that of the Moon—means that flying is easy. Our Cessna could get into the air under pedal power.</span></p><p data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">In fact, humans on Titan could fly by muscle power. A human in a hang glider could comfortably take off and cruise around powered by oversized swim-flipper boots—or even take off by flapping artificial wings. The power requirements are minimal—it would probably take no more effort than walking."</span></p><p data-dcnode-id="2411"><span data-dcnode-id="2414" instrument_node="">Source : </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//what-if.xkcd.com/30/" target="_blank"><span data-dcnode-id="2413" instrument_node="">Interplanetary Cessna, from what-if.xkcd.com</span></a></p></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2399" instrument_node="">
</span></div></div><span data-dcnode-id="2396" instrument_node="">
</span></div></li><li class="slide s-section-11" data-dcnode-id="2343" id="section-f_8420879d-193e-4bfb-8660-190868b7308e"><div class="waypoint" data-dcnode-id="2393"></div><a class="section-anchor" data-dcnode-id="2392"></a><div data-dcnode-id="2344"><span data-dcnode-id="2391" instrument_node="">
</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="2346" data-react-style="{}"><div class="container" data-dcnode-id="2347"><div class="clearfix" data-dcnode-id="2389"><div class="columns sixteen" data-dcnode-id="2390"></div></div><div class="" data-dcnode-id="2348"><span data-dcnode-id="2388" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="2350"><div data-dcnode-id="2351"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="2352" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="2353"><div class="s-item-text-group" data-dcnode-id="2354"><div class="s-item-title" data-dcnode-id="2382"><div class="s-component s-text" data-dcnode-id="2383"><h3 class="" data-dcnode-id="2384"><div class="s-component-content s-font-heading" data-dcnode-id="2385"><h3 data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node=""> Why Titan and not Mars ? </span></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="2355"><div class="s-component s-text" data-dcnode-id="2356"><div class="" data-dcnode-id="2357"><div class="s-component-content s-font-body" data-dcnode-id="2358"><div class="s-item-text" data-dcnode-id="2359"><div class="s-component s-text" data-dcnode-id="2360"><div class="s-component-content s-font-body" data-dcnode-id="2361"><ul data-dcnode-id="2362"><li data-dcnode-id="2367"><p data-dcnode-id="2377"><span data-dcnode-id="2381" instrument_node="">We believe that </span><strong data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">we shouldn't send Humans to Mars as</span></strong><span data-dcnode-id="2378" instrument_node=""> :</span></p><ul data-dcnode-id="2368"><li data-dcnode-id="2373"><span data-dcnode-id="2376" instrument_node="">It would </span><strong data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">increase dramatically the risk of forward contamination of the Mars surface with our earthly microbes, which would ruin our unique chance to study a pristine Mars</span></strong></li><li data-dcnode-id="2369"><strong data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">All the reasons advanced to vindicate the act of Humans traveling to Mars are either wrong or can be addressed in a way that spares Mars</span></strong><span data-dcnode-id="2370" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2363"><span data-dcnode-id="2366" instrument_node="">The above claims sound controversial, but we've detailed them with many sources to back them up in that op-ed published on the space news site of reference in Asia-Pacific, SpaceTechAsia.com : </span><a data-dcnode-id="2364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spacetechasia.com/shouldnt-send-humans-mars/"><span data-dcnode-id="2365" instrument_node="">Why we shouldn’t send humans to Mars</span></a></li></ul></div></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2349" instrument_node="">
</span></div></div></div><span data-dcnode-id="2345" instrument_node="">
</span></div></li><li class="slide s-section-12" data-dcnode-id="2021" id="section-f_90b1a1d3-5ef2-4766-a960-3e7676084dd9"><div class="waypoint" data-dcnode-id="2342"></div><a class="section-anchor" data-dcnode-id="2341"></a><div data-dcnode-id="2022"><span data-dcnode-id="2340" instrument_node="">
</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="2024" data-react-style="{}"><div class="container" data-dcnode-id="2025"><div class="clearfix" data-dcnode-id="2338"><div class="columns sixteen" data-dcnode-id="2339"></div></div><div class="" data-dcnode-id="2026"><span data-dcnode-id="2337" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="2028"><div data-dcnode-id="2029"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="2030" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="2031"><div class="s-item-text-group" data-dcnode-id="2032"><div class="s-item-title" data-dcnode-id="2331"><div class="s-component s-text" data-dcnode-id="2332"><h3 class="" data-dcnode-id="2333"><div class="s-component-content s-font-heading" data-dcnode-id="2334"><h3 data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node=""> The 8 Main objections to choosing Titan as our second home and their answers </span></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="2033"><div class="s-component s-text" data-dcnode-id="2034"><div class="" data-dcnode-id="2035"><div class="s-component-content s-font-body" data-dcnode-id="2036"><div class="s-item-text" data-dcnode-id="2041"><div class="s-component s-text" data-dcnode-id="2042"><div class="s-component-content s-font-body" data-dcnode-id="2043"><ul data-dcnode-id="2226"><li data-dcnode-id="2310"><strong data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">1. It's far,</span></strong><span data-dcnode-id="2328" instrument_node=""> it took 7 years for Cassini-Huygens to reach Titan</span><ul data-dcnode-id="2311"><li data-dcnode-id="2320"><span data-dcnode-id="2327" instrument_node="">Yes, but with faster propulsion, in particular Nuclear Electric Propulsion (see further down below on that web page),</span><strong data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node=""> it will be possible to shorten the trip to 3 years, according to Robert Zubrin</span></strong><span data-dcnode-id="2324" instrument_node="">, </span><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Case-Space-Revolution-Spaceflight-Possibility/dp/1633885348" target="_blank"><span data-dcnode-id="2323" instrument_node="">in The Case for Space</span></a><span data-dcnode-id="2321" instrument_node="">, assuming 40% of the ship's initial mass in Earth orbit is payload, 36% is propellant (for one-way travel; the ships refuel with local hydrogen at the outer planet), and 24% is engine.</span></li><li data-dcnode-id="2317"><strong data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">With fusion reactors, with the same assumptions as above, Robert Zubrin calculates it would only take 18 months</span></strong></li><li data-dcnode-id="2312"><span data-dcnode-id="2316" instrument_node="">Also the thick atmosphere helps again here, as it allows the spacecraft to perform an aerocapture of Titan, which requires only one pass through the atmosphere to reduce its velocity and enter orbit (a process that last hours to days).</span><ul data-dcnode-id="2313"><li data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">As Mars atmosphere is too thin, such a manoeuver isn't possible, meaning only aerobraking is possible there, which takes on the order of 100 to 400 passes, taking weeks to months, to achieve the desired velocity reduction using only that technique (of course with chemical retropropulsion it can be fastened, but requires more fuel).</span></li></ul></li></ul></li><li data-dcnode-id="2300"><strong data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">2. It's dark</span></strong><ul data-dcnode-id="2301"><li data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Yes, but not too dark, like a few minutes after sunset on Earth. And it's possible to concentrate sunlight using thin film mirrors, which are low mass so can be transported out there. Anyway, better to be able to live and walk on the surface of Titan with such levels of light, protected from the radiations by the thick atmosphere, rather than living underground or mostly indoor on Mars which has a very thin atmosphere letting the Galactic Cosmic Rays and solar energetic particles reach the surface.</span></li><li data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Anyone living on Titan would probably need to live in conditions of permanent artificial lighting, would be like living in Alaska in winter all year round.</span></li><li data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Interestingly, there's enough light that reaches Saturn’s moon Titan to make Earth-type photosynthesis possible in theory says astrobiologist Dirk Schulze-Makuch</span></li></ul></li><li data-dcnode-id="2284"><strong data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">3. Gravity is too low</span></strong><ul data-dcnode-id="2285"><li data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Yes, but as it's similar to our Moon's gravity, by studying its effect on the Moon we'll learn how to best cope with low gravity. And in any case, we can think of building habitats or sleeping quarters in large enough centrifuge machines so as to recreate Earth gravity.</span></li><li data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">Such machines won’t have to be that big as the human body seems to be able to stand quite high numbers of rotations per minute : </span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/2Lz5UeROyXM" target="_blank"><span data-dcnode-id="2294" instrument_node="">watch this video</span></a><span data-dcnode-id="2292" instrument_node=""> of astronaut Tim Peak aboard the ISS spinning at about 60 rotations per minute (rpm), enough to have full gravity at his feet and head, for a couple of minutes, without any sign of nausea, only momentary dizziness when he stops.</span></li><li data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">60 rpm is probably a stretch, but research seems to show that "rotation rates of up to 4 rpm, corresponding to a [rotating spacecraft or centrifuge of] 56 m radius, should be acceptable, although visitors may require some training and perhaps a day or so of adaptation for those particularly susceptible to motion sickness". See </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.nss.org/media/Space-Settlement-Population-Rotation-Tolerance-Globus.pdf" target="_blank"><span data-dcnode-id="2289" instrument_node="">Space Settlement Population Rotation Tolerance, Al Globus, June 2015</span></a><span data-dcnode-id="2287" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2227"><strong data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">4. Energy is scarce</span></strong><ul data-dcnode-id="2228"><li data-dcnode-id="2242"><span data-dcnode-id="2281" instrument_node="">Not really, we could use for instance :</span><ul data-dcnode-id="2243"><li data-dcnode-id="2274"><strong data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">the equivalent of hydropower</span></strong><span data-dcnode-id="2278" instrument_node="">, leveraging the elevated bodies of liquid methane</span><ul data-dcnode-id="2275"><li data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">"Dams or waterwheels could generate power from hydrocarbons made liquid by Titan’s extremely low temperatures, but it could be difficult to get the liquid flowing as the largest lakes and seas are lower than surrounding terrain. The topography doesn’t make it impossible, it just makes it a very big engineering project to carve out a river that flows downhill out of the sea." says Dr Hendrix</span></li></ul></li><li data-dcnode-id="2265"><strong data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">tidal power</span></strong><ul data-dcnode-id="2266"><li data-dcnode-id="2267"><span data-dcnode-id="2271" instrument_node="">A better option than traditional hydropower could be to</span><strong data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node=""> put turbines in the seas because Saturn creates strong tides on Titan</span></strong><span data-dcnode-id="2268" instrument_node="">. Its largest sea, Kraken Mare, experiences up to a metre of tidal change each day. Those tides all flow through a narrow constriction separating the northern and southern parts of the sea, Seldon Fretum, or as it is nicknamed, the Throat of the Kraken.</span></li></ul></li><li data-dcnode-id="2252"><strong data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">chemical energy</span></strong><span data-dcnode-id="2262" instrument_node=""> (hydrogen and acetylene can be extracted from Titan's atmosphere and react together to produce energy)</span><ul data-dcnode-id="2253"><li data-dcnode-id="2254"><span data-dcnode-id="2261" instrument_node="">According to Cassini data from 2008,</span><strong data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node=""> Titan has hundreds of times more liquid hydrocarbons than all the known oil and natural gas reserves on Earth.</span></strong><span data-dcnode-id="2258" instrument_node=""> These hydrocarbons rain from the sky and collect in vast deposits that form lakes and dunes. </span><strong data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Though, as there isn't easily accessible oxygen to combust these hydrocarbons, they can't be used to produce energy.</span></strong><span data-dcnode-id="2255" instrument_node=""> Oxygen could be extracted from water ice Titan crust is made of, but it wouldn't make economic sense as that process itself would require energy !</span></li></ul></li><li data-dcnode-id="2248"><strong data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">solar power</span></strong><span data-dcnode-id="2249" instrument_node=""> (it's been estimated that supporting 300 million people would require a solar farm covering 10 percent of Titan)</span></li><li data-dcnode-id="2244"><strong data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">wind power </span></strong><span data-dcnode-id="2245" instrument_node="">(as surface winds are slow we could use tethered blimp or balloon mounted windmills at a height of 3 km where the speed is 2 meters per second (4.4 miles per hour) or even better at 40 km where the wind speeds are 20 meters per second (44 miles per hour). These could generate hundreds of terrawatts). Wind turbines suspended in the atmosphere would be far easier on Titan than on Earth in the low gravity !</span></li></ul></li><li data-dcnode-id="2237"><span data-dcnode-id="2241" instrument_node="">See </span><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/ftp/arxiv/papers/1707/1707.00365.pdf"><span data-dcnode-id="2240" instrument_node="">Energy Options for Future Humans on Titan</span></a><span data-dcnode-id="2238" instrument_node="">, june 2017</span></li><li data-dcnode-id="2229"><span data-dcnode-id="2236" instrument_node="">As Robert Zubrin is saying in </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Case-Space-Revolution-Spaceflight-Possibility/dp/1633885348" target="_blank"><span data-dcnode-id="2235" instrument_node="">The Case For Space</span></a><span data-dcnode-id="2233" instrument_node=""> (published in May 2019)</span><ul data-dcnode-id="2230"><li data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">"Electricity could be produced in great abundance, as the 100-K heat sink available in Titan's atmosphere would allow for easy conversion of thermal energy from nuclear fission or fusion reactors to electricity at efficiencies of better than 80 percent."</span></li></ul></li></ul></li></ul><div data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="2044"><li data-dcnode-id="2161"><strong data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">5. It's cold, at -180°C (-291°F) </span></strong><span data-dcnode-id="2221" instrument_node="">on average at the surface</span><ul data-dcnode-id="2162"><li data-dcnode-id="2216"><span data-dcnode-id="2220" instrument_node="">Yes, but a </span><strong data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">thick enough suit would be enough to protect ourselves from the cold. Such a suit could be donned in minutes as opposed to hours for a spacesuit on Mars</span></strong><span data-dcnode-id="2217" instrument_node="">, because on Titan there wouldn't be any need to pressurize the suit, contrary to Mars. Such a suit would also be much cheaper to use and would last much longer (existing spacesuits cost around 2 million USD each, and were predicted to be used for up to 25 spacewalks or EVA, Extra Vehicular Activity)</span></li><li data-dcnode-id="2201"><span data-dcnode-id="2215" instrument_node="">"Titan’s surface temperature is -179°C, so it will be essential to keep both Titannauts and equipment warm</span><br data-dcnode-id="2214"><span data-dcnode-id="2213" instrument_node="">inside a cocoon of insulation. Nevertheless, the temperature difference between the skin and the environment</span><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">is only about twice that seen in the coldest terrestrial environments and, on what is currently known and inferred, there is little wind on Titan.</span><strong data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node=""> Furthermore, gas conductivity falls sharply with temperature, so that simple trapped-gas insulation will work better than on Earth. With a surface area of 2 m2 and insulation 7.5 cm thick, heat loss should be about 150 W, which can be generated by light activity.</span></strong><span data-dcnode-id="2208" instrument_node=""> Batteries to heat a visor and gloves would weigh little on Titan." (source Titan: </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Julian_Nott/publication/26883114_Titan_A_Distant_But_Enticing_Destination_for_Human_Visitors/links/5474d4690cf2778985ac233d.pdf"><span data-dcnode-id="2207" instrument_node="">A Distant But Enticing Destination for Human Visitors</span></a><span data-dcnode-id="2205" instrument_node="">, </span><strong data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">by Julian Nott, University of California, Santa Barbara</span></strong><span data-dcnode-id="2202" instrument_node="">)</span></li><li data-dcnode-id="2190"><span data-dcnode-id="2200" instrument_node="">Robert Zubrin in </span><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Case-Space-Revolution-Spaceflight-Possibility/dp/1633885348" target="_blank"><span data-dcnode-id="2199" instrument_node="">The Case For Space</span></a><span data-dcnode-id="2197" instrument_node=""> (may 2019):</span><ul data-dcnode-id="2191"><li data-dcnode-id="2192"><span data-dcnode-id="2196" instrument_node="">"In the almost Earth-normal atmospheric pressure of Titan, you would not need a pressure suit, just a dry suit to keep out the cold. On your back, you could carry a tank of liquid oxygen, which would need no refrigeration in Titan's environment, would weigh almost nothing, and which could supply your breathing needs for a weeklong trip outside of the settlement. </span><strong data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">A small bleed valve off the tank would allow a trickle of oxygen to burn against the methane atmosphere, heating your breathing air and suit to desirable temperatures.</span></strong><span data-dcnode-id="2193" instrument_node="">"</span></li></ul></li><li data-dcnode-id="2176"><span data-dcnode-id="2189" instrument_node="">What about using aerogel to insulate ourselves on Titan ? It's the lightest solid material ever made by man, 99.98% air by volume. A new type of aerogel could be revolutionary thanks to its uncanny ability to reduce heat transfer</span><ul data-dcnode-id="2177"><li data-dcnode-id="2185"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/WqB6JsZguRo%3Ft%3D64"><span data-dcnode-id="2188" instrument_node="">See this video</span></a><span data-dcnode-id="2186" instrument_node=""> where inside a jacket temp. is 89°F (30°C) and outside temp. is -321°F (-196°C), so even colder than on Titan! That's because of the materials porous, gelly nature. The pores are in the nanometer range, making them expert insulators. The pores are so small that gas phase heat conduction through the air is extremely difficult, so even though 99.98% of the material is air, none of that air can travel through space, keeping temperatures locked on either side of the structure</span></li><li data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Silica aerogels are common features of passively heated buildings, for example, and thin layers of the stuff helped keep NASA's Spirit and Opportunity Mars rovers warm during frigid Red Planet nights.</span></li><li data-dcnode-id="2178"><span data-dcnode-id="2182" instrument_node="">Though, for the designers of the "Mars helicopter", a carbon dioxyde gas cap, at the price of a small energy penalty works better than aerogel, as it's lighter and works almost as well (</span><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/tEY4ThEwd9c%3Ft%3D569"><span data-dcnode-id="2181" instrument_node="">video stopped at the right second</span></a><span data-dcnode-id="2179" instrument_node="">)</span></li></ul></li><li data-dcnode-id="2168"><span data-dcnode-id="2175" instrument_node="">And here is another step towards insulating us from the cold on Titan : </span><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//futurism.com/artificial-blubber-navy-seals/"><span data-dcnode-id="2174" instrument_node="">MIT Creates “Artificial Blubber” to Keep Navy SEALs Warm</span></a><span data-dcnode-id="2172" instrument_node=""> (</span><strong data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">June, 2018</span></strong><span data-dcnode-id="2169" instrument_node="">)</span></li><li data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node="">An for the distant future (say, the 23rd century), here is an idea about how to "terraform" Titan, by Robert Zubrin :</span><ul data-dcnode-id="2164"><li data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">"A solar sail mirror fifteen thousand kilometers in radius (190 million tons of 0.1 micron aluminum) positioned with Titan at its focal point would increase Titan's solar flux to Mars-like levels, which, together with the strong greenhouse effects produced by Titan's methane atmospheric fraction, should be enough to raise the planet to Earth-like temperatures. Thus, the ability to manufacture large, thin solar sails in space, a central skill for engineering both Type II-civilization interplanetary transportation and emergent Type III-civilization interstellar spaceship propulsion, is also a key technology for terraforming Titan."</span></li></ul></li></ul></li><li data-dcnode-id="2152"><strong data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">6. It lacks metals for construction and manufacturing</span></strong><ul data-dcnode-id="2153"><li data-dcnode-id="2154"><span data-dcnode-id="2158" instrument_node="">"It would have iron in its core of course but not accessible for settlers. So indeed, it might have less accessible metals than most places. But to start with, there is much less need for metals there, because we don't need to build pressure vessels for the habitats. We can do a lot with plastic. " says </span><a data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.science20.com/profile/robert_walker"><span data-dcnode-id="2157" instrument_node="">Robert Walker</span></a><span data-dcnode-id="2155" instrument_node="">. So it's certainly not a show-stopper, whatever little metals are needed can be imported from the Asteroid Belt thanks to ion thrusters (they move slowly but expends little propellant, so are much cheaper to operate)</span></li></ul></li><li data-dcnode-id="2145"><strong data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">7. The water ice crust will make it impossible to build habitats : since they would be heated, they would make the surface crust melt</span></strong><ul data-dcnode-id="2146"><li data-dcnode-id="2147"><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">It's not an issue in Antarctica. Or indeed if anyone has been camping in winter. Or Eskimoes in igloos. And titan is far colder. Canada also has many buildings built over permafrost.</span></p></li></ul></li><li data-dcnode-id="2045"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">8. It will be hard for a rocket using retropropulsion to land on a body whose crust is made of water ice</span></strong><ul data-dcnode-id="2046"><li data-dcnode-id="2139"><strong data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Issue</span></strong><span data-dcnode-id="2140" instrument_node="">: If Titan's surface is made of water ice and hydrocarbon dust, were a big rocket to land using retropropulsion, wouldn't the ice melt due to the heat of the exhaust gases and make it really tricky for the rocket to stabilise on the surface ? And let's assume the rocket does land. Then the water that would have melted would solidify again as ice around the rockets legs and imprison them ? That would make it way harder for the rocket to take off again, wouldn't it ?</span></li><li data-dcnode-id="2135"><strong data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">"Ice does have a pretty high heat capacity. And it is a very low temperature on Titan so you have to raise it a lot more than on Earth" </span></strong><span data-dcnode-id="2136" instrument_node="">says Robert Walker</span></li><li data-dcnode-id="2128"><span data-dcnode-id="2134" instrument_node="">I asked the question on space.stackexchange.com and </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.stackexchange.com/questions/27035/can-a-spaceship-land-on-an-icy-body-using-retropropulsion-wouldnt-the-ice-melt"><span data-dcnode-id="2133" instrument_node="">here are the responses</span></a><span data-dcnode-id="2131" instrument_node="">, </span><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">it's an issue, but not a total show stopper</span></strong></li><li data-dcnode-id="2118"><p data-dcnode-id="2119"><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">"Fairly little of the surface will be disturbed to begin with. </span></strong><span data-dcnode-id="2125" instrument_node="">The gas expansion which occurs in a vacuum optimized rocket nozzle cools the exhaust substantially; while temperatures may exceed 3000 K in the chamber, the exhaust may be well below 1000K at the nozzle exit plane.</span><strong data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node=""> The exhaust gas will be relatively tenuous for the same reason, and it will disperse rapidly in vacuum, so it will only transfer a small amount of heat to the surface in the few seconds of landing."</span></strong><span data-dcnode-id="2122" instrument_node=""> says </span><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.stackexchange.com/users/195/russell-borogove"><span data-dcnode-id="2121" instrument_node="">Russell Borogove</span></a></p></li><li data-dcnode-id="2089"><p data-dcnode-id="2090"><span data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">"</span></span><span data-dcnode-id="2105"><span data-dcnode-id="2115" instrument_node="">At Titan the surface temperature is ~95 K (-180 C), and at the tropopause is ~77 K—really cold! And the surface atmospheric pressure is nearly 1.5 bars, for a mass density ~4 times that of Earth's. The gravitational acceleration is only ~1/7 of Earth's. </span><strong data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">I doubt that they would try to land on Titan with a BFR spaceship as currently envisioned.</span></strong><span data-dcnode-id="2112" instrument_node=""> </span><strong data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">The cold, dense atmosphere makes for a tremendous convective cooling rate, so without prodigious heating many spacecraft parts would go below their allowable minimum temperatures, especially any exposed electronics and parts with lubricants.</span></strong><span data-dcnode-id="2109" instrument_node=""> </span><strong data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Handling the environment at Titan would require an extensive redesign. </span></strong><span data-dcnode-id="2106" instrument_node="">Titan's low gravity leads to a very large atmospheric scale height, the vertical distance over which the pressure changes by a factor of </span></span><em data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">e</span></em><span data-dcnode-id="2095"><span data-dcnode-id="2102" instrument_node="">. Couple that to the high surface pressure and you get</span><strong data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node=""> an atmosphere that produces measurable aerodynamic drag nearly 1000 km above the surface (!)</span></strong><span data-dcnode-id="2099" instrument_node="">, as Cassini and Huygens verified. When the hypersonic/supersonic deceleration phase is finished, there's still a long way to go to the surface, and that takes time. The Huygens probe took 2-1/2 hours to get down after opening its parachute, even with a change to a smaller 'chute on the way down. </span><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">During that time the craft is exposed to even more intense convective cooling</span></strong><span data-dcnode-id="2096" instrument_node="">." </span></span><span data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">says </span></span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.stackexchange.com/questions/27035/can-a-spaceship-land-on-an-icy-body-using-retropropulsion-wouldnt-the-ice-melt"><span data-dcnode-id="2092" instrument_node="">Tom Spilker</span></a></p></li><li data-dcnode-id="2078"><p data-dcnode-id="2079"><span data-dcnode-id="2080"><span data-dcnode-id="2088" instrument_node="">That said, </span><strong data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Titan's atmosphere and low gravity make aeronautics easy. It lets you glide most of the way down rather than having to burn precious propellants.</span></strong><span data-dcnode-id="2085" instrument_node=""> As mentioned above, </span><u data-dcnode-id="2082"><strong data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">the duration of the part of the landing burn with the plumes impinging on the surface would be short enough that the amount of melting would be small</span></strong></u><span data-dcnode-id="2081" instrument_node="">. </span></span></p></li><li data-dcnode-id="2072"><p data-dcnode-id="2073"><span data-dcnode-id="2074"><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">If the landing legs did indeed stick to the mostly-ice surface material, a quick blast of electrical or chemical heating on the pads would release them.</span></strong><span data-dcnode-id="2075" instrument_node=""> </span></span></p></li><li data-dcnode-id="2064"><p data-dcnode-id="2065"><span data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">There are all kinds of other options and issues to consider, such as: use of parachutes or a parafoil on the way down; use of a (really large!) balloon for the initial departure ascent so aerodynamic drag doesn't cost so much in ∆v; and use of rocket propulsion, or aerodynamics to land." </span></span><span data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">says </span></span><a data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.stackexchange.com/questions/27035/can-a-spaceship-land-on-an-icy-body-using-retropropulsion-wouldnt-the-ice-melt"><span data-dcnode-id="2067" instrument_node="">Tom Spilker</span></a></p></li><li data-dcnode-id="2055"><p data-dcnode-id="2056"><span data-dcnode-id="2063" instrument_node="">Planetary scientist </span><strong data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Dr. Ralph Lorenz</span></strong><span data-dcnode-id="2060" instrument_node=""> of the Applied Physics Lab at Johns Hopkins University, on the issue of thermal transfer on Titan between the Huygens lander and the thick and cold atmosphere: "Same problem Huygens confronted. At these low temperatures, radiation basically doesn't transfer any heat at all. The atmosphere is sufficiently thick and cold that all of the outer surfaces of Huygens were quenched at about 94°K, or maybe 96°K, relatively quickly. Huygens had a 5 cm thick layer of foam insulation that basically limits the heat transfer. the interior was benign, room temperature freezing point, something like that, and outside was 94°K. So it was loosing 350W of heat to maintain that differential. Any long term system at Titan has to buffer that loss, and that's why the radio isotope systems are so important because they have that waste heat available. The engineering solution is that you insulate." (</span><a data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/fUE1_Gwhm3s%3Ft%3D3676"><span data-dcnode-id="2059" instrument_node="">from that conference on Youtube</span></a><span data-dcnode-id="2057" instrument_node="">, set at the exact time)</span></p></li><li data-dcnode-id="2051"><span data-dcnode-id="2054" instrument_node="">What about landing elsewhere than on ice ? "So far we've seen no evidence for anything other than water and organics on Titan's surface. When it formed, the silicates and metals (heavy stuff) sank to form the core, and it looks like no strong convection (cryovolcanism) has brought any of that up onto the ice crust. The organics are the result of sun-driven photochemistry of the methane (and a few other very minor species) in the upper atmosphere raining down onto the surface, "tholins" as Carl Sagan called them. At warmer temperatures most would be gas, liquid, or something akin to grease, not any better than ice to land on." says </span><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.stackexchange.com/questions/27035/can-a-spaceship-land-on-an-icy-body-using-retropropulsion-wouldnt-the-ice-melt"><span data-dcnode-id="2053" instrument_node="">Tom Spilker</span></a></li><li data-dcnode-id="2047"><span data-dcnode-id="2050" instrument_node="">"Finding the equivalent of a car parking lot to set down on. Titan would probably be the least risky in that regard, but you can't just set down anywhere. There are rugged mountain ranges, lakes and seas, river channels, etc. The only location where we know we could find a suitable landing spot is near the Huygens landing site." says </span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.stackexchange.com/questions/27035/can-a-spaceship-land-on-an-icy-body-using-retropropulsion-wouldnt-the-ice-melt"><span data-dcnode-id="2049" instrument_node="">Tom Spilker</span></a></li></ul></li></ul></div></div></div><p data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">&nbsp;</span></p><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">&nbsp;</span></p></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2027" instrument_node="">
</span></div></div></div><span data-dcnode-id="2023" instrument_node="">
</span></div></li><li class="slide s-section-13" data-dcnode-id="1580" id="section-f_9fb2b0dd-0e97-4abc-ae78-b3d8c7271b94"><div class="waypoint" data-dcnode-id="2020"></div><a class="section-anchor" data-dcnode-id="2019"></a><div data-dcnode-id="1581"><span data-dcnode-id="2018" instrument_node="">
</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="1583" data-react-style="{}"><div class="container" data-dcnode-id="1584"><div class="clearfix" data-dcnode-id="2016"><div class="columns sixteen" data-dcnode-id="2017"></div></div><div class="" data-dcnode-id="1585"><span data-dcnode-id="2015" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="1587"><div data-dcnode-id="1588"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="1589" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="1590"><div class="s-item-text-group" data-dcnode-id="1591"><div class="s-item-title" data-dcnode-id="2009"><div class="s-component s-text" data-dcnode-id="2010"><h3 class="" data-dcnode-id="2011"><div class="s-component-content s-font-heading" data-dcnode-id="2012"><h3 data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node=""> How you can help </span></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="1592"><div class="s-component s-text" data-dcnode-id="1593"><div class="" data-dcnode-id="1594"><div class="s-component-content s-font-body" data-dcnode-id="1595"><div class="s-item-text" data-dcnode-id="1596"><div class="s-component s-text" data-dcnode-id="1597"><div class="s-component-content s-font-body" data-dcnode-id="1598"><ul data-dcnode-id="2006"><li data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Share this website with friends and invite them to follow these steps !</span></li></ul><div data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1996"><li data-dcnode-id="1997"><strong data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Subscribe to this site's newsletter</span></strong><span data-dcnode-id="2001" instrument_node=""> to keep up with Titan news, </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.humans-to-titan.org/%23subscribe"><span data-dcnode-id="2000" instrument_node="">click here !</span></a><ul data-dcnode-id="1998"></ul></li></ul><div data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1949"><li data-dcnode-id="1950"><strong data-dcnode-id="1990"><span data-dcnode-id="1993" instrument_node="">Follow </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dragonfly.jhuapl.edu/"><span data-dcnode-id="1992" instrument_node="">Dragonfly project</span></a></strong><span data-dcnode-id="1989" instrument_node="">, the chosen NASA's New Frontiers program (</span><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dmk1zVxwq7O4"><span data-dcnode-id="1988" instrument_node="">watch the 15 min video</span></a><span data-dcnode-id="1986" instrument_node="">)</span><ul data-dcnode-id="1951"><li data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Named for its insect shape, Dragonfly is a drone-like rotorcraft specifically designed to sample Titan’s atmosphere and surface. If selected by the NASA, it will launch by 2025 and arrive there in the 2030s</span></li><li data-dcnode-id="1980"><span data-dcnode-id="1983" instrument_node="">See NASA's</span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/press-release/nasas-dragonfly-will-fly-around-titan-looking-for-origins-signs-of-life/" target="_blank"><span data-dcnode-id="1982" instrument_node=""> announcement here</span></a></li><li data-dcnode-id="1976"><span data-dcnode-id="1979" instrument_node="">Watch the 45-sec simulation on </span><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DIdYeWN9ZivE" target="_blank"><span data-dcnode-id="1978" instrument_node="">Youtube here</span></a></li><li data-dcnode-id="1952"><span data-dcnode-id="1975" instrument_node="">Read as well :</span><ul data-dcnode-id="1953"><li data-dcnode-id="1968"><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uidaho.edu/sci/news/features/2018/dragonfly"><span data-dcnode-id="1974" instrument_node="">Physicist Hopes to Lead Drone Mission to Titan</span></a><span data-dcnode-id="1972" instrument_node=""> (march 2018, with </span><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DmzyfFr4zdiY"><span data-dcnode-id="1971" instrument_node="">related 2-min video</span></a><span data-dcnode-id="1969" instrument_node="">)</span></li><li data-dcnode-id="1954"><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thespacereview.com/article/3574/1"><span data-dcnode-id="1967" instrument_node="">A comet or Titan: The next New Frontiers mission </span></a><span data-dcnode-id="1965" instrument_node="">(sept 2018, thespacereview.com)</span><ul data-dcnode-id="1955"><li data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">"the mission will seek to answer these questions: What processes have reshaped the surface, erasing, except in a few terrains, the many craters that should have accumulated? Why hasn’t the rain of hydrocarbons buried the surface over the age of the solar system, and where does new methane come from to replace that lost to the formation of the hydrocarbons? Are there cryovolcanoes that bring liquid water to the surface? What types of pre-biotic chemistries occur on a world rich in hydrocarbons? And is there evidence of life, either that formed on the surface from the interaction of water and the hydrocarbons or carried up from the deep subsurface global ocean? Or is there life based on non-water chemistries?"</span></li><li data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">"Fortunately, this moon’s thick atmosphere and low gravity make this the easiest world in the solar system for flight."</span></li><li data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">"In an hour or so of flying, the craft might travel further than the Opportunity rover has crawled across the surface of Mars in 14 years. "</span></li><li data-dcnode-id="1956"><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">"The mission’s star instrument, however, would be its mass spectrometer. This instrument, derived from similar instruments for the Mars Curiosity and the European ExoMars rovers, would be able to detect the presence of different ices and hydrocarbons at minute levels. By measuring the precise chemistry of ices from different locations, scientists can understand the processes that created them. This instrument’s sensitivity would make Dragonfly an exciting astrobiology mission."</span></p></li></ul></li></ul></li></ul></li></ul><div data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1783"><li data-dcnode-id="1784"><span data-dcnode-id="1946" instrument_node="">Support </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_electric_rocket"><span data-dcnode-id="1945" instrument_node="">Nuclear Electric Rockets</span></a><span data-dcnode-id="1943" instrument_node=""> that are required for any sustainable manned exploration of the Outer Solar System. It means having </span><strong data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">high eletric power in space</span></strong><span data-dcnode-id="1940" instrument_node=""> AND </span><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">fast propulsion</span></strong><span data-dcnode-id="1937" instrument_node="">. The best combination seems to be Nuclear Electric power AND Plasma propulsion</span><ul data-dcnode-id="1785"><li data-dcnode-id="1890"><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">About plasma propulsion</span></strong><span data-dcnode-id="1934" instrument_node=""> : in particular the </span><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.adastrarocket.com/aarc/VASIMR"><span data-dcnode-id="1933" instrument_node="">VASIMR</span></a><span data-dcnode-id="1931" instrument_node=""> engine by the Ad Astra Rocket company, the most advanced form of plasma propulsion nearing completion, you can </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/AdAstraRocket"><span data-dcnode-id="1930" instrument_node="">follow their Twitter account</span></a><span data-dcnode-id="1928" instrument_node=""> and </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/AdAstraRocketCompany"><span data-dcnode-id="1927" instrument_node="">Facebook account</span></a><span data-dcnode-id="1925" instrument_node=""> as a sign of support ! I highly recommend :</span><ul data-dcnode-id="1891"><li data-dcnode-id="1921"><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D5ZcVGpyvLZ8"><span data-dcnode-id="1924" instrument_node="">watching this cool 20-min intro video</span></a><span data-dcnode-id="1922" instrument_node=""> by Ad Astra, the company behind VASIMR engine on their endeavour to create the engine that will open the Outer Solar System to Humans</span></li><li data-dcnode-id="1917"><a data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.texasmonthly.com/articles/the-astronaut-who-might-actually-get-us-to-mars/%25C2%25A0"><span data-dcnode-id="1920" instrument_node="">reading that great article</span></a><span data-dcnode-id="1918" instrument_node=""> about the man behind VASIMR, Dr Chang Diaz, 7-time space shuttle astronaut, who's been working on that technology for 40 years</span></li><li data-dcnode-id="1912"><span data-dcnode-id="1916" instrument_node="">Interestingly, Dr Chang Diaz chose to </span><strong data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">incorporate its company Ad Astra on the very day Huygens landed on Titan !</span></strong><span data-dcnode-id="1913" instrument_node=""> Coincidence ? Maybe he's got some nice lans in mind ! :)</span></li><li data-dcnode-id="1897"><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Dr Chang Diaz designed </span></strong><span data-dcnode-id="1909" instrument_node="">a conceptual nuclear-electric human interplanetary transport ship with VASIMR engines as primary propulsion :</span><ul data-dcnode-id="1898"><li data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">"The liquid hydrogen propellant is stored in a toroidal cluster of tanks to provide radiation shielding to a cylindrical crew module located on the axis.</span></li><li data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">A high magnetic field superconducting radiation shield, nested inside the propellant tank cluster, provides additional shielding against galactic cosmic radiation (GCR) and secondary particles.</span></li><li data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">The 4 nuclear reactors with magneto-hydrodynamic power conversion provide primary power to the engines and the rest of the ship and are located on radial booms.</span></li><li data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">The reactor cores sit on top of “dish-like” high-density gamma shields and are surrounded by thermal radiating surfaces to dissipate the excess heat.</span></li><li data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">High power nuclear-electric engines such as those on this ship will be fully tested at Ad Astra’s future lunar test facility on the surface of the Moon."</span></li></ul></li><li data-dcnode-id="1892"><span data-dcnode-id="1896" instrument_node="">In 2013, the VASIMR ® team published a short study for fast and operationally robust human missions to Mars, based on high power NEP. The system considered an advanced, high temperature, gas cooled, nuclear magneto hydrodynamic (MHD) power plant, as proposed by </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ntrs.nasa.gov/archive/nasa/casi.ntrs.nasa.gov/20110009914.pdf"><span data-dcnode-id="1895" instrument_node="">Litchford and Harada in 2011</span></a><span data-dcnode-id="1893" instrument_node="">, combined with high power VASIMR plasma propulsion. The general architecture of such a system featured a multi-megawatt closed cycle MHD nuclear plant, using non-equilibrium He/Xe frozen inert plasma (FIP) working fluid. The fission reactor mass estimate was based on the NERVA design for a 350 MW nuclear reactor with a mass of 1785 kg, increased to 3000 kg to account for containment and shielding margin.</span></li></ul></li><li data-dcnode-id="1808"><strong data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">About nuclear electric power in space as a power source to feed the propulsion system</span></strong><ul data-dcnode-id="1809"><li data-dcnode-id="1828"><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">the most recent project that needs support is the Kilopower project,</span></strong><span data-dcnode-id="1885" instrument_node=""> read in particular </span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/39433-kilopower-reactor-for-deep-space-missions.html"><span data-dcnode-id="1884" instrument_node="">"Kilopower Project: NASA Pushes Nuclear Power for Deep-Space Missions"</span></a><span data-dcnode-id="1882" instrument_node=""> (Space.com, jan 2018)</span><ul data-dcnode-id="1829"><li data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">"A successful Kilopower test will be a great leap forward for space nuclear power. However, there is much more work to do to engineer and qualify a real flight system." said Steve Jurczyk, associate administrator of NASA's Space Technology Mission Directorate</span></li><li data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">"The pioneering Kilopower reactor represents a small and simple approach for long-duration, sun-independent electric power for space or extraterrestrial surfaces."</span></li><li data-dcnode-id="1874"><span data-dcnode-id="1877" instrument_node="">"This new technology could provide kilowatts and can eventually be evolved to provide hundreds of kilowatts, or even megawatts of power." </span><strong data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">(the VASIMR engine's designers say that they would need a power source of 200MW for a ship able to take Humans fast enough to Mars and beyond)</span></strong></li><li data-dcnode-id="1868"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/directorates/spacetech/feature/Powering_Up_NASA_Human_Reach_for_the_Red_Planet"><span data-dcnode-id="1873" instrument_node="">Read about it on the NASA websit</span></a><span data-dcnode-id="1871" instrument_node="">e and watch the </span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DDcdfMcjUy_U"><span data-dcnode-id="1870" instrument_node="">3-min intro youtube video</span></a></li><li data-dcnode-id="1858"><span data-dcnode-id="1867" instrument_node="">And here is the scientific paper : </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ntrs.nasa.gov/archive/nasa/casi.ntrs.nasa.gov/20170002010.pdf"><span data-dcnode-id="1866" instrument_node="">NASA’s Kilopower Reactor Development and the Path to</span></a><span data-dcnode-id="1864" instrument_node=""> </span><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ntrs.nasa.gov/archive/nasa/casi.ntrs.nasa.gov/20170002010.pdf"><span data-dcnode-id="1863" instrument_node="">Higher Power Missions</span></a><span data-dcnode-id="1861" instrument_node=""> </span><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">(Mar 2017)</span></strong></li><li data-dcnode-id="1848"><strong data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Update from May 2018 on NASA website : </span></strong><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/press-release/demonstration-proves-nuclear-fission-system-can-provide-space-exploration-power" target="_blank"><span data-dcnode-id="1855" instrument_node="">Demonstration Proves Nuclear Fission System Can Provide Space Exploration Power</span></a><ul data-dcnode-id="1849"><li data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">"Kilopower is a small, lightweight fission power system capable of providing up to 10 kilowatts of electrical power - enough to run several average households - continuously for at least 10 years. Four Kilopower units would provide enough power to establish an outpost."</span></li><li data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">"“We threw everything we could at this reactor, in terms of nominal and off-normal operating scenarios and KRUSTY passed with flying colors,” said Poston."</span></li></ul></li><li data-dcnode-id="1842"><strong data-dcnode-id="1844"><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D0TL7eUh4yuI%26feature%3Dyoutu.be" target="_blank"><span data-dcnode-id="1847" instrument_node="">Watch this 7-min video</span></a><span data-dcnode-id="1845" instrument_node=""> "</span></strong><span data-dcnode-id="1843" instrument_node="">NASA's New Space Engine Is Powered by Nuclear Fission" featuring Marc Gibson, the Lead Engineer on the Kilopower project at NASA Glenn Research Center</span></li><li data-dcnode-id="1830"><a data-dcnode-id="1840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DKobRfGqlpGc%26feature%3Dyoutu.be"><span data-dcnode-id="1841" instrument_node="">Watch this 4-min video</span></a><span data-dcnode-id="1839" instrument_node=""> that explains clearly </span><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">a concept of Small Reactor for Deep Space Exploration being investigated by the Los Alamos National Lab</span></strong><span data-dcnode-id="1836" instrument_node=""> </span><strong data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">(2012)</span></strong><ul data-dcnode-id="1831"><li data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">"This is the first demonstration of a space nuclear reactor system to produce electricity in the United States since 1965, and an experiment demonstrated the first use of a heat pipe to cool a small nuclear reactor and then harvest the heat to power a Stirling engine at the Nevada National Security Site's Device Assembly Facility confirms basic nuclear reactor physics and heat transfer for a simple, reliable space power system."</span></li></ul></li></ul></li><li data-dcnode-id="1810"><strong data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Is it dangerous to send fissile material in space ?</span></strong><ul data-dcnode-id="1811"><li data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Fissile material is what is used in a Nuclear Fission Reactor</span></li><li data-dcnode-id="1817"><span data-dcnode-id="1823" instrument_node="">"It presents </span><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//space.stackexchange.com/a/16609/4660"><span data-dcnode-id="1822" instrument_node="">absolutely no radiation risk</span></a><span data-dcnode-id="1820" instrument_node="">. The fuel is not more radioactive than rocks until you start to burn it, and since it is only for use in space, you simply don't turn the engines on until you are safely away from Earth. If this was commonly understood half a century ago, we'd be living in a completely different world." says Kim Holder from </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moonwards.com/machinesTransport.html%23nuclearShuttles"><span data-dcnode-id="1819" instrument_node="">Moonwards</span></a></li><li data-dcnode-id="1812"><span data-dcnode-id="1816" instrument_node="">"You don't really need to worry about unused fission fuel. The usual ceramic form of the fuel could be used for a dinner plate. The "unused" is important. Once you start up a fission reactor, the fission products are highly radioactive. So don't ever start up a space fission reactor until it's well out in space and not coming back." (</span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//space.stackexchange.com/questions/16608/how-does-the-launch-risk-for-a-plutonium-rtg-and-a-uranium-fission-reactor-compa/16609%2316609"><span data-dcnode-id="1815" instrument_node="">source</span></a><span data-dcnode-id="1813" instrument_node="">)</span></li></ul></li></ul></li><li data-dcnode-id="1786"><span data-dcnode-id="1807" instrument_node="">A</span><strong data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node=""> recent proposal for an efficient nuclear space power plant by</span></strong><span data-dcnode-id="1804" instrument_node=""> </span><a data-dcnode-id="1802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ntrs.nasa.gov/archive/nasa/casi.ntrs.nasa.gov/20110009914.pdf"><span data-dcnode-id="1803" instrument_node="">Litchford and Harada in 2011</span></a><span data-dcnode-id="1801" instrument_node=""> (extracts)</span><ul data-dcnode-id="1787"><li data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Magnetohydrodynamic (MHD) electrical power generators are devices in which, according to the magnetohydrodynamics laws, a conversion of the energy of working fluid into electrical energy takes place. The principle of operation of MHD generators as well as conventional electrical generators is based on Faraday's induction law. In an electrically conducting fluid, moving at velocity in a magnetic field , an electromotive force is induced</span></li><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">"For larger missions over 1 MWe, gas-cooled NFR and vapor core reactors with CCMHD energy conversion have also been considered and studied"</span></li><li data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">"For many science-based robotic missions and surface power applications, power plant outputs of 100-120 kWe are considered readily achievable with currently available nuclear technologies, and various Advanced Radioisotope (AR) or Nuclear Fission Reactor (NFR) electric power generation systems could be engineered and developed with minimal R&amp;D needs. For missions with larger electric power requirements, however, innovative low specific mass Nuclear Fission Reactor (NFR) systems with efficient electric power conversion are clearly needed. Here, we propose consideration of nuclear closed-cycle MHD (CCMHD)"</span></li><li data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node="">"In contrast to turbo-generator systems, MHD generators extract energy at temperatures beyond solid material limits and provide high-temperature heat rejection. This advantage translates into weight savings via reduction in space radiator size and weight. </span><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">If these potential specific power gains can be realized, it would open up entirely new vistas for rapid deep-space transport</span></strong><span data-dcnode-id="1791" instrument_node="">."</span></li><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">"The principle technical obstacle to deep-space utilization of high-power nuclear electric propulsion (NEP) is the need for end-to-end system specific mass approaching 1 kg/kW. One of the few potentially feasible approaches for achieving the requisite power-to-weight performance are closed-cycle nuclear space power plants utilizing a High Temperature Gas Reactor (HTGR) coupled with a magnetohydrodynamic (MHD) generator, a concept readily scalable for application to multi-MW-class NEP systems."</span></li></ul></li></ul></li></ul><div data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1721"><li data-dcnode-id="1722"><ul data-dcnode-id="1723"><li data-dcnode-id="1724"><strong data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Molten Salt Reactors (MSRs) are particularly promising</span></strong><ul data-dcnode-id="1725"><li data-dcnode-id="1763"><span data-dcnode-id="1778" instrument_node="">We invite you to read :</span><ul data-dcnode-id="1764"><li data-dcnode-id="1774"><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zmescience.com/ecology/what-is-molten-salt-reactor-424343/"><span data-dcnode-id="1777" instrument_node="">How Molten Salt Reactors Might Spell a Nuclear Energy Revolution</span></a><span data-dcnode-id="1775" instrument_node=""> (march 2017)</span></li><li data-dcnode-id="1765"><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatisnuclear.com/msr.html"><span data-dcnode-id="1773" instrument_node="">Molten Salt Reactors, by Nick Touran, Ph.D</span></a><span data-dcnode-id="1771" instrument_node="">.</span><ul data-dcnode-id="1766"><li data-dcnode-id="1767"><span data-dcnode-id="1770" instrument_node="">Including this section </span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatisnuclear.com/msr.html%23problems"><span data-dcnode-id="1769" instrument_node="">Problems with Molten Salt Reactors</span></a></li></ul></li></ul></li><li data-dcnode-id="1740"><span data-dcnode-id="1762" instrument_node="">Since former NASA engineer Kirk Sorensen revived forgotten MSR technology in the 2000s, interest in MSR technology has been growing quickly. Since 2011, four separate companies in North America have announced plans for MSRs:</span><ul data-dcnode-id="1741"><li data-dcnode-id="1758"><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//flibe-energy.com/" target="_blank"><span data-dcnode-id="1761" instrument_node="">Flibe Energy</span></a><span data-dcnode-id="1759" instrument_node=""> (started by Sorenson himself),</span></li><li data-dcnode-id="1754"><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//transatomicpower.com/" target="_blank"><span data-dcnode-id="1757" instrument_node="">Transatomic Power</span></a><span data-dcnode-id="1755" instrument_node=""> (started by two recent MIT graduates),</span></li><li data-dcnode-id="1747"><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//terrestrialenergy.com/" target="_blank"><span data-dcnode-id="1753" instrument_node="">Terrestrial Energy</span></a><span data-dcnode-id="1751" instrument_node=""> (based in Canada, which recently </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.marketwired.com/press-release/-1981123.htm" target="_blank"><span data-dcnode-id="1750" instrument_node="">partnered</span></a><span data-dcnode-id="1748" instrument_node=""> with Department of Energy’s Oak Ridge National Laboratory),</span></li><li data-dcnode-id="1742"><span data-dcnode-id="1746" instrument_node="">Martingale, Inc., which recently made public its design for its </span><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thorconpower.com/" target="_blank"><span data-dcnode-id="1745" instrument_node="">ThorCon</span></a><span data-dcnode-id="1743" instrument_node=""> MSR.</span></li></ul></li><li data-dcnode-id="1726"><strong data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">MSRs are meant to be much more compact, cheaper to build and operate and much safer.</span></strong><ul data-dcnode-id="1727"><li data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">A molten salt reactor (MSR) is a type of nuclear reactor that uses liquid fuel instead of the solid fuel rods used in conventional nuclear reactors. Using liquid fuel provides many advantages in safety and simplicity of design.</span></li><li data-dcnode-id="1728"><span data-dcnode-id="1735" instrument_node="">MSRs where first developed in the U.S. in the 1950s for use in a nuclear-powered aircraft bomber (the idea being that the bomber could remain in the air indefinitely). Though a small experimental reactor ran successfully, the program was canceled when it became clear that in-air refueling of bombers was viable.</span><ul data-dcnode-id="1729"><li data-dcnode-id="1730"><span data-dcnode-id="1734" instrument_node="">The </span><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convair_NB-36H"><span data-dcnode-id="1733" instrument_node="">NB-36 bomber plane</span></a><span data-dcnode-id="1731" instrument_node=""> completed 47 test flights and 215 hours of flight time (during 89 of which the reactor was operated). The crew worked from a lead-shielded cockpit. The 3MW air-cooled reactor in the NB-36H did not power any of the aircraft's systems, nor did it provide propulsion, but was placed on the NB-36H to measure the effectiveness of the shielding.</span></li></ul></li></ul></li></ul></li></ul></li></ul><div data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1622"><li data-dcnode-id="1623"><b data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Nuclear Thermal Rockets (NTR) are also of interest</span></b><ul data-dcnode-id="1624"><li data-dcnode-id="1652"><span data-dcnode-id="1716" instrument_node="">Below, the best part of that article : </span><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/news/2017-08-nasa-reignites-nuclear-thermal-rockets.html"><span data-dcnode-id="1715" instrument_node="">NASA Reignites Program for Nuclear Thermal Rockets</span></a><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node=""> (aug 2017)</span></strong><ul data-dcnode-id="1653"><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">In an NTP rocket, uranium or deuterium reactions are used to heat liquid hydrogen inside a reactor, turning it into ionized hydrogen gas (plasma), which is then channeled through a rocket nozzle to generate thrust.</span></li><li data-dcnode-id="1704"><p data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node="">One advantage over chemical rockets is the virtually unlimited energy density it offers compared to chemical rocket fuel. This would cut the total amount of propellant needed, thus cutting launch weight and the cost of individual missions. A more powerful nuclear engine would mean reduced trip times.</span><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node=""> Already, NASA has estimated that an NTP system could make the voyage to Mars to four months instead of six</span></strong><span data-dcnode-id="1706" instrument_node="">, which would reduce the amount of radiation the astronauts would be exposed to in the course of their journey.</span></p></li><li data-dcnode-id="1693"><p data-dcnode-id="1694"><span data-dcnode-id="1703" instrument_node="">Researchers at NASA's Marshall Space Flight Center are </span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">once again looking to develop nuclear rockets</span></strong><span data-dcnode-id="1700" instrument_node="">. As part of</span><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node=""> NASA's Game Changing Development Program</span></strong><span data-dcnode-id="1697" instrument_node="">, </span><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">the Nuclear Thermal Propulsion (NTP) project would see the creation of high-efficiency spacecraft that would be capable of using less fuel to deliver heavy payloads to distant planets, and in a relatively short amount of time.</span></strong></p></li><li data-dcnode-id="1685"><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">As Sonny Mitchell, the project of the NTP project at NASA's Marshall Space Flight Center, said in a recent NASA press statement:</span></p><ul data-dcnode-id="1686"><li data-dcnode-id="1687"><p data-dcnode-id="1688"><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">"As we push out into the solar system, nuclear propulsion may offer the only truly viable technology option to extend human reach to the surface of Mars and to worlds beyond. We're excited to be working on technologies that could open up deep space for human exploration."</span></strong></p></li></ul></li><li data-dcnode-id="1674"><p data-dcnode-id="1675"><span data-dcnode-id="1684" instrument_node="">To see this through, </span><strong data-dcnode-id="1679"><span data-dcnode-id="1683" instrument_node="">NASA has entered into a partnership with </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bwxt.com/news/featured/mission-to-mars"><span data-dcnode-id="1682" instrument_node="">BWX Technologies</span></a><span data-dcnode-id="1680" instrument_node=""> (BWXT)</span></strong><span data-dcnode-id="1678" instrument_node="">, a Virginia-based energy and technology company that is a leading supplier of nuclear components and fuel to the U.S. government.</span><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node=""> To assist NASA in developing the necessary reactors that would support possible future crewed missions to Mars, the company's subsidiary (BWXT Nuclear Energy, Inc.) was awarded a three-year contract worth $18.8 million.</span></strong></p></li><li data-dcnode-id="1669"><p data-dcnode-id="1670"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">During this three years in which they will be working with NASA, BWXT will provide the technical and programmatic data needed to implement NTP technology. This will consist of them manufacturing and testing prototype fuel elements</span></strong><span data-dcnode-id="1671" instrument_node="">. BWXT will also aid NASA planners in addressing the issues of feasibility and affordably with their NTP program.</span></p></li><li data-dcnode-id="1663"><p data-dcnode-id="1664"><span data-dcnode-id="1668" instrument_node="">The concept of using nuclear rockets to explore the Universe is </span><strong data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">not new</span></strong><span data-dcnode-id="1665" instrument_node="">. In fact, NASA has explored the possibility of nuclear propulsion extensively under the Space Nuclear Propulsion Office (SNPO ), which between 1959 and 1972 conducted 23 reactor tests</span></p></li><li data-dcnode-id="1654"><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">In 1963, the SNPO also created the Nuclear Engine for Rocket Vehicle Applications (NERVA) program to develop nuclear-thermal propulsion for long-range crewed mission to the moon and interplanetary space. This led to the creation of the NRX/XE, a nuclear-thermal engine which the SNPO certified as having met the requir
