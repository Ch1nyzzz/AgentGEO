ements for a crewed mission to Mars.</span></p><ul data-dcnode-id="1655"><li data-dcnode-id="1656"><p data-dcnode-id="1657"><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Db18HtG0DOCM"><span data-dcnode-id="1660" instrument_node="">Here is a 1968 22-min NASA video</span></a><span data-dcnode-id="1658" instrument_node=""> that describes the NERVA program of nuclear powered rockets that NASA planned to use for its manned missions to Mars it had planned to send in 1978. Although it met its program goals, its massive expense caused it to be canceled in favor of the space shuttle in 1972.</span></p></li></ul></li></ul></li><li data-dcnode-id="1625"><span data-dcnode-id="1651" instrument_node="">See as well :</span><ul data-dcnode-id="1626"><li data-dcnode-id="1636"><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popularmechanics.com/space/moon-mars/a18345717/nasa-ntp-nuclear-engines-mars/"><span data-dcnode-id="1650" instrument_node="">Nuclear thermal propulsion, which was studied in the Cold War for space travel, could make a comeback to fly humans to Mars</span></a><span data-dcnode-id="1648" instrument_node="">.</span><strong data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">(feb 2018, PopularMechanics.com</span></strong><span data-dcnode-id="1645" instrument_node="">)</span><ul data-dcnode-id="1637"><li data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node="">"To begin work on a new NTP rocket engine, NASA </span><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/centers/marshall/news/news/releases/2017/nasa-contracts-with-bwxt-nuclear-energy-to-advance-nuclear-thermal-propulsion-technology.html" target="_blank"><span data-dcnode-id="1643" instrument_node="">awarded an $18.8 million contract to BWXT Nuclear Energy</span></a><span data-dcnode-id="1641" instrument_node=""> in August 2017. BWXT, which has a long history of making nuclear fuel for the U.S. Navy, will design a nuclear reactor that uses low-enriched uranium nuclear fuel in the form of "Cermet" (ceramic metallic) rods. NASA has also partnered with Aerojet Rocketdyne to design an engine that could be mated to the reactor to produce thrust, and NASA will study cryogenic storage options for carrying liquid hydrogen propellant. Finally, NASA and BWXT will work to develop an exhaust capture system that would be used for future ground testing of the NTP engine."</span></li><li data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">"Building an NTP engine is just part of the equation. You'd also need to estimate just how hard (and costly) it would be to build an interplanetary spacecraft powered by nuclear thermal propulsion. Sheehy figures the cost at a few billions of dollars, though the full cost analysis will not be available for another year or so."</span></li></ul></li><li data-dcnode-id="1627"><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ntrs.nasa.gov/archive/nasa/casi.ntrs.nasa.gov/20170003378.pdf"><span data-dcnode-id="1635" instrument_node="">NASA's Nuclear Thermal Propulsion (NTP) Project</span></a><span data-dcnode-id="1633" instrument_node=""> </span><strong data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">(pdf, Nasa.gov, 2017)</span></strong><ul data-dcnode-id="1628"><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">NTP is initial step towards advanced space nuclear power and propulsion, which could eventually help enable exploration and development of the solar system</span></li></ul></li></ul></li></ul></li></ul><div data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1599"><li data-dcnode-id="1600"><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Support a base on the Moon</span></strong><span data-dcnode-id="1617" instrument_node=""> as it will let us</span><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node=""> study the effects of low gravity</span></strong><span data-dcnode-id="1614" instrument_node=""> and will be </span><strong data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">a source of "affordable" water ice that may be needed to shield manned spaceships from harmful radiations</span></strong><ul data-dcnode-id="1601"><li data-dcnode-id="1602" style="text-align: justify;"><span data-dcnode-id="1611" instrument_node="">Read in particular this article </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//spacenews.com/op-ed-moon-direct-how-to-build-a-moonbase-in-four-years/"><span data-dcnode-id="1610" instrument_node="">"Op-ed | Moon Direct: How to build a moonbase in four years"</span></a><span data-dcnode-id="1608" instrument_node=""> by Robert Zubrin (march 2018) :</span><ul data-dcnode-id="1603"><li data-dcnode-id="1606" style="text-align: justify;"><span data-dcnode-id="1607" instrument_node="">Would need only 3 $100-million Falcon Heavy and 1 $60-million Falcon 9</span></li><li data-dcnode-id="1604" style="text-align: justify;"><span data-dcnode-id="1605" instrument_node="">"Assuming that cost of the mission hardware will roughly equal the cost to launch it, we should be able to create and sustain a permanently occupied lunar base at an ongoing yearly cost of less than $700 million. This is less than 4% of NASA’s current budget" (NASA budget itself was of $18.4 billion in 2011, that's 0.5% of the US federal budget)</span></li></ul></li></ul></li></ul></div></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="1586" instrument_node="">
</span></div></div></div><span data-dcnode-id="1582" instrument_node="">
</span></div></li><li class="slide s-section-14" data-dcnode-id="1397" id="section-f_a046528b-5d61-4577-82fc-867957395df0"><div class="waypoint" data-dcnode-id="1579"></div><a class="section-anchor" data-dcnode-id="1578"></a><div data-dcnode-id="1398"><span data-dcnode-id="1577" instrument_node="">
</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="1400" data-react-style="{}"><div class="container" data-dcnode-id="1401"><div class="clearfix" data-dcnode-id="1575"><div class="columns sixteen" data-dcnode-id="1576"></div></div><div class="" data-dcnode-id="1402"><span data-dcnode-id="1574" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="1404"><div data-dcnode-id="1405"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="1406" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="1407"><div class="s-item-text-group" data-dcnode-id="1408"><div class="s-item-title" data-dcnode-id="1568"><div class="s-component s-text" data-dcnode-id="1569"><h3 class="" data-dcnode-id="1570"><div class="s-component-content s-font-heading" data-dcnode-id="1571"><h3 data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node=""> Main challenges to overcome to get to Titan </span></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="1409"><div class="s-component s-text" data-dcnode-id="1410"><div class="" data-dcnode-id="1411"><div class="s-component-content s-font-body" data-dcnode-id="1412"><div class="s-item-text" data-dcnode-id="1417"><div class="s-component s-text" data-dcnode-id="1418"><div class="s-component-content s-font-body" data-dcnode-id="1419"><ul data-dcnode-id="1420"><li data-dcnode-id="1564"><strong data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Better knowledge of Titan</span></strong><span data-dcnode-id="1565" instrument_node=""> (for this, let's support the Dragonfly project, see above)</span></li><li data-dcnode-id="1560"><strong data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Faster propulsion</span></strong><span data-dcnode-id="1561" instrument_node=""> (high power electric propulsion and VASIMR is the most likely solution)</span></li><li data-dcnode-id="1556"><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Nuclear electric power in space</span></strong><span data-dcnode-id="1557" instrument_node=""> (to power the electric engine)</span></li><li data-dcnode-id="1552"><strong data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Artificial gravity</span></strong><span data-dcnode-id="1553" instrument_node=""> (needed to recreated gravity in the spaceship, could be obtained by rotating the ship)</span></li><li data-dcnode-id="1539"><strong data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">A base on the Moon </span></strong><span data-dcnode-id="1549" instrument_node="">so as to :</span><ul data-dcnode-id="1540"><li data-dcnode-id="1545"><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">study the effect of low gravity on the human body</span></strong><span data-dcnode-id="1546" instrument_node=""> (Titan and our Moon have similar gravity levels)</span></li><li data-dcnode-id="1541"><strong data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">mine water ice</span></strong><span data-dcnode-id="1542" instrument_node=""> that will be eventually cheaper to send to space than from Earth, as it will be needed for protect space travelers from radiation</span></li></ul></li><li data-dcnode-id="1512"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Protection against solar storms and Galactic Cosmic Rays during the trip</span></strong><ul data-dcnode-id="1513"><li data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">2 meter-thick of water ice around the ship would do</span></li><li data-dcnode-id="1528"><span data-dcnode-id="1534" instrument_node="">unless we opt for a </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/directorates/spacetech/niac/2018_Phase_I_Phase_II/Spacecraft_Scale_Magnetospheric_Protection_from_Galactic_Cosmic_Radiation"><span data-dcnode-id="1533" instrument_node="">"Spacecraft Scale Magnetospheric Protection"</span></a><span data-dcnode-id="1531" instrument_node="">, one of the </span><a data-dcnode-id="1529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/40180-titan-shapeshifter-robot-wild-nasa-tech-ideas.html"><span data-dcnode-id="1530" instrument_node="">25 NASA's Innovative Advanced Concepts disclosed in March 2018</span></a></li><li data-dcnode-id="1514"><span data-dcnode-id="1527" instrument_node="">As Erik Seedhouse and Dr Chang Diaz (the astronaut and engineer working on VASIMR) are writing in their book </span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/3319229176/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Dhumanstotian-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3D3319229176%26linkId%3D414c6a2453f0645adb886ff4d2543045"><span data-dcnode-id="1526" instrument_node="">To Mars and Beyond, Fast!: How Plasma Propulsion Will Revolutionize Space Exploration</span></a><span data-dcnode-id="1524" instrument_node=""> : "Radiation exposure can be mitigated during flight by utilizing material shielding rich in hydrogen (such as water </span><strong data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">and a number of plastics</span></strong><span data-dcnode-id="1521" instrument_node="">). </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24146746"><span data-dcnode-id="1520" instrument_node="">It has been calculated</span></a><span data-dcnode-id="1518" instrument_node=""> that about 100 centimeters of water or polyethylene shielding might be sufficient to stop most of these radiations. In the VASIMR ship, the bulk of the proton radiation from the Sun could be effectively shielded by the liquid hydrogen making up the propellant. This propellant could be strategically located in cryogenic storage tanks surrounding the crew module. In addition, the liquid hydrogen could enable the installation of a nested toroidal superconducting magnetic shield, which will further increase the radiation protection.</span><ul data-dcnode-id="1515"><li data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">just FYI, water ice density is 0.92 g/cm3 while polyethylene density is 0.97 g/cm3, so won't be lighter to use polyethylene for shielding</span></li></ul></li></ul></li><li data-dcnode-id="1498"><strong data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">These 3 life-support closed-system</span></strong><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node=""> technologies for long duration manned space trip </span></strong><span data-dcnode-id="1507" instrument_node="">: </span><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">food generation, air recycling and water recycling</span></strong><ul data-dcnode-id="1499"><li data-dcnode-id="1500"><span data-dcnode-id="1504" instrument_node="">As </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.science20.com/profile/robert_walker"><span data-dcnode-id="1503" instrument_node="">Robert Walker</span></a><span data-dcnode-id="1501" instrument_node=""> says "We already have that with BIOS-3 - not tested in space but tested for several growing cycles (growing cycle of a month) in Russia."</span></li></ul></li><li data-dcnode-id="1421"><strong data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">The Human factor :</span></strong><span data-dcnode-id="1495" instrument_node=""> can a team of people cooperate in confined habitats for extended periods of time ?</span><ul data-dcnode-id="1422"><li data-dcnode-id="1423"><span data-dcnode-id="1494" instrument_node="">This is being investigated, see in patricular :</span><ul data-dcnode-id="1424"><li data-dcnode-id="1485"><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MARS-500"><span data-dcnode-id="1493" instrument_node="">MARS-500</span></a><span data-dcnode-id="1491" instrument_node=""> :</span><ul data-dcnode-id="1486"><li data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">The Mars-500 mission was a psychosocial isolation experiment conducted between 2007 and 2011 by Russia, the European Space Agency and China, in preparation for an unspecified future manned spaceflight to the planet Mars</span></li><li data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">3 different crews of volunteers lived and worked in a mock-up spacecraft at IBMP. The final stage of the experiment, which was intended to simulate a 520-day manned mission, was conducted by an all-male crew consisting of 6 people. The mock-up facility simulated an Earth-Mars shuttle spacecraft, an ascent-descent craft, and the Martian surface. The volunteers who participated in the three stages included professionals with experience in engineering, medicine, biology, and human spaceflight. The experiment yielded important data on the physiological, social and psychological effects of long-term close-quarters isolation</span></li></ul></li><li data-dcnode-id="1463"><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HI-SEAS"><span data-dcnode-id="1484" instrument_node="">HI-SEAS</span></a><ul data-dcnode-id="1464"><li data-dcnode-id="1480"><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">HI-SEAS (Hawaii Space Exploration Analog and Simulation) is an analog habitat for human spaceflight to Mars. HI-SEAS is located in an isolated position on the slopes of the Mauna Loa volcano on the island of Hawaii. The area has Mars-like features and an elevation of approximately 8,200 feet (2,500 m) above sea level. The first HI-SEAS study was in 2013 and NASA's Human Research Program continues to fund and sponsor follow-up studies. The missions are of extended duration from four months to a year.</span></p></li><li data-dcnode-id="1477"><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">One thing under study by NASA is trying to understand crew dynamics such as morale, stress management, and how they solve problems as group.</span></p></li><li data-dcnode-id="1473"><p data-dcnode-id="1474"><span data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">The purpose of the detailed research studies is to determine what is required to keep a space flight crew happy and healthy during an extended mission to Mars and while living on Mars. </span></span></p></li><li data-dcnode-id="1469"><p data-dcnode-id="1470"><span data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Research into food, crew dynamics, behaviors, roles and performance, and other aspects of space flight and a mission on Mars itself is the primary focus. </span></span></p></li><li data-dcnode-id="1465"><p data-dcnode-id="1466"><span data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The HI-SEAS researchers also carry out studies on a variety of other topics as part of their daily activities.</span></span></p></li></ul></li><li data-dcnode-id="1425"><strong data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Biosphere 2</span></strong><ul data-dcnode-id="1426"><li data-dcnode-id="1458"><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Biosphere 2 is an American Earth system science research facility located in Oracle, Arizona. It has been owned by the University of Arizona since 2011. Its mission is to serve as a center for research, outreach, teaching, and lifelong learning about Earth, its living systems, and its place in the universe. It is a 3.14-acre (1.27-hectare) structure originally built to be an artificial, materially closed ecological system, or vivarium. It remains the largest closed system ever created.</span></p></li><li data-dcnode-id="1455"><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Biosphere 2 was originally meant to demonstrate the viability of closed ecological systems to support and maintain human life in outer space.[3] It was designed to explore the web of interactions within life systems in a structure with different areas based on various biological biomes.</span></p></li><li data-dcnode-id="1427"><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">See :</span></p><ul data-dcnode-id="1428"><li data-dcnode-id="1449"><p data-dcnode-id="1450"><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biosphere_2"><span data-dcnode-id="1452" instrument_node="">Wikipedia page</span></a></p></li><li data-dcnode-id="1442"><p data-dcnode-id="1443"><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//motherboard.vice.com/en_us/article/mbjz43/setting-the-record-straight-about-the-biosphere-2"><span data-dcnode-id="1448" instrument_node="">Setting the Record Straight About the Biosphere 2</span></a><span data-dcnode-id="1446" instrument_node=""> </span><strong data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">(Motherboard, 2017)</span></strong></p></li><li data-dcnode-id="1434"><p data-dcnode-id="1435"><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.armaghplanet.com/blog/whatever-happened-to-biosphere-2.html"><span data-dcnode-id="1441" instrument_node="">Whatever Happened to Biosphere 2?</span></a><span data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node=""> </span></span><strong data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">(2013)</span></strong></p></li><li data-dcnode-id="1429"><p data-dcnode-id="1430"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Da7B39MLVeIc"><span data-dcnode-id="1433" instrument_node="">TED talk by Jane Poynter: Life in Biosphere</span></a><span data-dcnode-id="1431" instrument_node=""> 2 (15 min)</span></p></li></ul></li></ul></li></ul></li></ul></li></ul></div></div></div><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">&nbsp;</span></p><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">&nbsp;</span></p></div></div></div></div></div></div></div></div></div><span data-dcnode-id="1403" instrument_node="">

ght to power US-sized colony</span></a><span data-dcnode-id="1376" instrument_node=""> </span><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">(NewScientist.com, july 2017)</span></strong></li><li data-dcnode-id="1367"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.scientificamerican.com/guest-blog/lets-colonize-titan/"><span data-dcnode-id="1372" instrument_node="">Let's Colonize Titan - Saturn's largest moon might be the only place beyond Earth where humans could live</span></a><span data-dcnode-id="1370" instrument_node=""> (Charles Wohlforth &amp; Amanda R. Hendrix, </span><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">ScientificAmerican.com, november 2016)</span></strong></li><li data-dcnode-id="1363"><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_%28moon%29"><span data-dcnode-id="1366" instrument_node="">Titan</span></a><span data-dcnode-id="1364" instrument_node=""> (Wikipedia)</span></li><li data-dcnode-id="1359"><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colonization_of_Titan" title="Colonization of Titan"><span data-dcnode-id="1362" instrument_node="">Colonization of Titan</span></a><span data-dcnode-id="1360" instrument_node=""> (Wikipedia)</span></li><li data-dcnode-id="1355"><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lakes_of_Titan" title="Lakes of Titan"><span data-dcnode-id="1358" instrument_node="">Lakes of Titan</span></a><span data-dcnode-id="1356" instrument_node=""> (Wikipedia)</span></li><li data-dcnode-id="1351"><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_on_Titan" title="Life on Titan"><span data-dcnode-id="1354" instrument_node="">Life on Titan</span></a><span data-dcnode-id="1352" instrument_node=""> (Wikipedia)</span></li><li data-dcnode-id="1347"><a data-dcnode-id="1349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_in_fiction" title="Titan in fiction"><span data-dcnode-id="1350" instrument_node="">Titan in fiction</span></a><span data-dcnode-id="1348" instrument_node=""> (Wikipedia)</span></li></ul></div></div></div><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">&nbsp;</span></p></div></div></div></div></div></div></div></div></div><span data-dcnode-id="1331" instrument_node="">

</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="1121" data-react-style="{}"><div class="container" data-dcnode-id="1122"><div class="clearfix" data-dcnode-id="1320"><div class="columns sixteen" data-dcnode-id="1321"></div></div><div class="" data-dcnode-id="1123"><span data-dcnode-id="1319" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="1125"><div data-dcnode-id="1126"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="1127" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="1128"><div class="s-item-text-group" data-dcnode-id="1129"><div class="s-item-title" data-dcnode-id="1312"><div class="s-component s-text" data-dcnode-id="1313"><h3 class="" data-dcnode-id="1314"><div class="s-component-content s-font-heading" data-dcnode-id="1315"><h3 data-dcnode-id="1316"><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Recommended videos and documentaries</span></p></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="1130"><div class="s-component s-text" data-dcnode-id="1131"><div class="" data-dcnode-id="1132"><div class="s-component-content s-font-body" data-dcnode-id="1133"><ul data-dcnode-id="1290"><li data-dcnode-id="1291"><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DuE5POhMnN78"><span data-dcnode-id="1311" instrument_node="">Destination: Titan</span></a><span data-dcnode-id="1309" instrument_node=""> </span><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">(BBC, 2011, 58 min, Youtube link)</span></strong><ul data-dcnode-id="1292"><li data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">It's a very interesting BBC documentary centered on the Cassini-Huygens mission and in particular on the British team that worked on the surface instruments of the lander Huygens. First 15 minutes are a recap of the history of humans in space with cool footage of Yuri Gargarin visiting England, following 30 minutes are about the years of work leading to the launch of the rocket, last 15 minutes are about the arrival of&nbsp;Cassini-Huygens at the Saturn system, the successful landing of Huygens on Titan as the furthest landing of a man-made machine in history, and about what we learnt there !</span></li><li data-dcnode-id="1298"><span data-dcnode-id="1304" instrument_node="">It features scientists J</span><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Zarnecki"><span data-dcnode-id="1303" instrument_node="">ohn Zarnecki</span></a><span data-dcnode-id="1301" instrument_node=""> and </span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secwww.jhuapl.edu/SpaceScience/staff/ProfileView/51"><span data-dcnode-id="1300" instrument_node="">Ralf Lorenz</span></a></li><li data-dcnode-id="1293"><span data-dcnode-id="1297" instrument_node="">As described on </span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/programmes/b0109ccd"><span data-dcnode-id="1296" instrument_node="">the BBC dedicated page</span></a><span data-dcnode-id="1294" instrument_node=""> : "It's a voyage of exploration like no other - to Titan, Saturn's largest moon and thought to resemble our own early Earth. For a small team of British scientists this would be the culmination of a lifetime's endeavour - the flight alone, some 2 billion miles, would take a full seven years. This is the story of the space probe they built, the sacrifices they made and their hopes for the landing. Would their ambitions survive the descent into the unknown on Titan's surface?"</span></li></ul></li></ul><div data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1265"><li data-dcnode-id="1272"><a data-dcnode-id="1286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DqJwwlLuTnic"><span data-dcnode-id="1287" instrument_node="">Colonizing Titan</span></a><span data-dcnode-id="1285" instrument_node=""> </span><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">(Youtube, mar 2017, first 35 min)</span></strong><ul data-dcnode-id="1273"><li data-dcnode-id="1274"><span data-dcnode-id="1282" instrument_node="">It's an interview of&nbsp;</span><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Charles Wohlforth &amp; Amanda R. Hendrix</span></strong><span data-dcnode-id="1279" instrument_node=""> about their book </span><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0804172420/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D0804172420%26linkCode%3Das2%26tag%3Dhumanstotian-20%26linkId%3D77a8fd9499acdd2de2f349c5ca765bb9"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">"Beyond Earth: Our Path to a New Home in the Planets"</span></strong></a><span data-dcnode-id="1275" instrument_node=""> which is mostly about why Titan is the best place for Humans in space after the Earth</span></li></ul></li><li data-dcnode-id="1266"><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DbbkTJeHoOKY"><span data-dcnode-id="1271" instrument_node="">Saturns Moon Titan: A World with Rivers,Lakes, and Possibly Even Life, by famous astrobiologist&nbsp;Dr. Chris McKay (NASA Ames Research Center)</span></a><span data-dcnode-id="1269" instrument_node=""> </span><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">(Youtube, 2011, 1h23min)</span></strong></li></ul><div data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1236"><li data-dcnode-id="1237"><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dl7nANi6WK2k%26feature%3Dyoutu.be"><span data-dcnode-id="1262" instrument_node="">Ralph Lorenz | Sailing the Seas of Titan</span></a><span data-dcnode-id="1260" instrument_node="">&nbsp;</span><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">(Youtube, oct 2014, 56 min)</span></strong><ul data-dcnode-id="1238"><li data-dcnode-id="1251"><a data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.lpl.arizona.edu/~rlorenz/"><span data-dcnode-id="1257" instrument_node="">Dr. Ralph Lorenz</span></a><span data-dcnode-id="1255" instrument_node=""> is a planetary scientist on the Principal Professional Staff of the Johns Hopkins University Applied Physics Laboratory (APL) in Laurel, MD, USA. He is a </span><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">member of the Cassini Radar team, and helped to develop the Huygens Surface Science Package</span></strong><span data-dcnode-id="1252" instrument_node="">. He is involved in formulating mission and instrument concepts at Titan, Europa, Venus and Mars, and served as the Project Scientist for the Titan Mare Explorer (TiME) Discovery Phase A study, a proposal to sail a capsule on Titan's seas. He has played a major role in the definition of a range of US and European Titan mission concepts, from airships and hot-air balloons, through airplanes, landers and even a submarine.</span></li><li data-dcnode-id="1246"><span data-dcnode-id="1250" instrument_node="">Oceanography is no longer just an Earth Science. The NASA/ESA Cassini mission - was still making exciting discoveries 10 years after its arrival in the rich Saturnian system - found that </span><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">3 seas of liquid hydrocarbons adorn Saturn’s giant, frigid moon Titan</span></strong><span data-dcnode-id="1247" instrument_node="">. Titan was already exotic, having a thick, organic-rich atmosphere, and a diverse landscape with mountains, craters, river channels and vast fields of sand dunes, but these seas, and hundreds of lakes, present a new environment (low gravity, dense atmosphere, hydrocarbon liquid) in which to explore familiar and important physical processes such as air, sea heat and moisture exchange, wind-driven currents and waves, etc.&nbsp;</span></li><li data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">Moreover, </span><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Titan’s seas (notably the two largest ones, Kraken Mare and Ligiea Mare, about 1000km and 400km across, respectively) offer an appealing and accessible target for future Titan exploration</span></strong><span data-dcnode-id="1242" instrument_node="">.</span></li><li data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Thomson--Reuters Sciencewatch in 2011 named Ralph Lorenz as one of the world's top planetary scientists by impact, ranking him #3 by publications and #10 by citations. He holds 5 NASA Group Achievement awards.</span></li></ul></li></ul><div data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1222"><li data-dcnode-id="1223"><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DjRkXXY0CyyI"><span data-dcnode-id="1233" instrument_node="">Titan's Chemical Cocktail</span></a><span data-dcnode-id="1231" instrument_node=""> </span><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">(Youtube, oct 2013, 3 min)&nbsp;</span></strong><ul data-dcnode-id="1224"><li data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">It has nice animations of chemical reactions on Titan, very clear stuff</span></li><li data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">A video from the Goddard Space Flight Center, narrated by a NASA scientist</span></li></ul></li></ul><div data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1210"><li data-dcnode-id="1211"><strong data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Must watch </span></strong><span data-dcnode-id="1217" instrument_node="">:&nbsp;</span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DHtYDPj6eFLc%26t%3D128s"><span data-dcnode-id="1216" instrument_node="">Huygens: Titan Descent Movie on 2005.01.14</span></a><span data-dcnode-id="1214" instrument_node=""> </span><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">(Youtube, 4 min)</span></strong></li></ul><div data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1191"><li data-dcnode-id="1192"><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Drzg78ySwIn4%26t%3D4s"><span data-dcnode-id="1207" instrument_node="">What About a Mission to Titan? It's Time to Explore Saturn's Largest Moon</span></a><span data-dcnode-id="1205" instrument_node=""> </span><strong data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">(Youtube, mar 2017, 9 min)</span></strong><ul data-dcnode-id="1193"><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">"Europa is fine and all, but where we really need to go is Saturn's moon Titan. Let's look at some cool ideas for probes to fully explore this world."</span></li><li data-dcnode-id="1194"><span data-dcnode-id="1200" instrument_node="">By </span><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Fraser Cain</span></strong><span data-dcnode-id="1197" instrument_node="">, Publisher at </span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.universetoday.com/"><span data-dcnode-id="1196" instrument_node="">Universe Today</span></a></li></ul></li></ul><div data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1180"><li data-dcnode-id="1181"><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DSusUPkGTFQo"><span data-dcnode-id="1188" instrument_node="">Titan: The Mystery of the Missing Waves </span></a><strong data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">(Youtube, Space Rip channel, jul 2013, 4 min)</span></strong><ul data-dcnode-id="1182"><li data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">&nbsp;Titan is the only natural satellite known to have a dense atmosphere and the only object, other than Earth, for which clear evidence of stable bodies of surface liquid has been found. &nbsp;However, these bodies of liquid are incredibly still, with no sign of wave activity. &nbsp;What is causing this incredible phenomenon?</span></li></ul></li></ul><div data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1165"><li data-dcnode-id="1166"><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Must watch :&nbsp;</span></strong><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DiWbqJ003XlM"><span data-dcnode-id="1175" instrument_node="">SATURN - A Travelers Guide to the Planets | Full Documentary </span></a><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">(Youtube, 2017, 49 min)</span></strong><ul data-dcnode-id="1167"><li data-dcnode-id="1168"><span data-dcnode-id="1171" instrument_node="">And in particular </span><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DjiD-NMq0pRE"><span data-dcnode-id="1170" instrument_node="">that 13 min section dedicated to Titan</span></a></li></ul></li></ul><div data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1134"><li data-dcnode-id="1139"><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Must watch :</span></strong><span data-dcnode-id="1160" instrument_node="">&nbsp;</span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DvJ3BCkLe14Q%26feature%3Dyoutu.be"><span data-dcnode-id="1159" instrument_node="">Saturn's Moon Titan: A Future Abode for Life</span></a><span data-dcnode-id="1157" instrument_node=""> </span><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">(Youtube, 2014, 1 hour)</span></strong><ul data-dcnode-id="1140"><li data-dcnode-id="1148"><span data-dcnode-id="1154" instrument_node="">Passionate talk by&nbsp;</span><strong data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Carrie Anderson</span></strong><ul data-dcnode-id="1149"><li data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Carrie is the associate chief at the Goddard Planetary Systems Laboratory of NASA's Goddard Space Flight Center in Greenbelt, Md. She has worked extensively on the Cassini spacecraf​t</span></li></ul></li><li data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">Main learning and question&nbsp;: when our sun warms up, hundreds of millions of years from now, there will be a time window of 100 millions years during which Titan will be in the Habitable Zone (HZ) and hence have liquid water. As it has plenty of organics already, will life arise ?</span><ul data-dcnode-id="1144"><li data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Personal note : one can assume that by then Humans would have visited Titan many times and hence Earth life would have been seeded intently or not, which would make it way harder if not impossible for water-based life to emerge on its own</span></li></ul></li><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Another detail : the energetic particles received by Titan (and that contributes to the chemical reactions in its atmosphere outputting hydrocarbons) mostly come from Saturn's magnetic field, not the Sun (which provides the UV)</span></li></ul></li><li data-dcnode-id="1135"><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D0PBoLogmaDE%26feature%3Dyoutu.be" target="_blank"><span data-dcnode-id="1138" instrument_node="">NASA’s Nuclear Drone Will Search for Life on Titan</span></a><span data-dcnode-id="1136" instrument_node=""> (Youtube, Aug 2019, 4min30sec)</span></li></ul></div></div></div></div></div></div></div></div></div><span data-dcnode-id="1124" instrument_node="">
</span></div></div></div><span data-dcnode-id="1120" instrument_node="">
</span></div></li><li class="slide s-section-17" data-dcnode-id="970" id="section-f_4a58202a-acd4-47df-9c13-d906dc32c7fc"><div class="waypoint" data-dcnode-id="1117"></div><a class="section-anchor" data-dcnode-id="1116"></a><div data-dcnode-id="971"><span data-dcnode-id="1115" instrument_node="">
</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="973" data-react-style="{}"><div class="container" data-dcnode-id="974"><div class="clearfix" data-dcnode-id="1113"><div class="columns sixteen" data-dcnode-id="1114"></div></div><div class="" data-dcnode-id="975"><span data-dcnode-id="1112" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="977"><div data-dcnode-id="978"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="979" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="980"><div class="s-item-text-group" data-dcnode-id="981"><div class="s-item-title" data-dcnode-id="1105"><div class="s-component s-text" data-dcnode-id="1106"><h3 class="" data-dcnode-id="1107"><div class="s-component-content s-font-heading" data-dcnode-id="1108"><h3 data-dcnode-id="1109"><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Recommended books about Titan</span></p></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="982"><div class="s-component s-text" data-dcnode-id="983"><div class="" data-dcnode-id="984"><div class="s-component-content s-font-body" data-dcnode-id="985"><ul data-dcnode-id="1088"><li data-dcnode-id="1089"><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0804172420/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D0804172420%26linkCode%3Das2%26tag%3Dhumanstotian-20%26linkId%3D77a8fd9499acdd2de2f349c5ca765bb9"><span data-dcnode-id="1104" instrument_node="">Beyond Earth: Our Path to a New Home in the Planets</span></a><span data-dcnode-id="1102" instrument_node="">, by&nbsp;</span><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Charles Wohlforth &amp; Amanda R. Hendrix</span></strong><span data-dcnode-id="1099" instrument_node="">&nbsp;(320 pages, nov 2016)</span><ul data-dcnode-id="1090"><li data-dcnode-id="1095"><span data-dcnode-id="1098" instrument_node="">"From a leading planetary scientist and an award-winning science writer, a propulsive account of the developments and initiatives that have transformed the dream of space colonization into something that may well be achievable. In Beyond Earth, Charles Wohlforth and Amanda R.Hendrix offer groundbreaking research and </span><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">argue persuasively that not Mars, but Titan—a moon of Saturn with a nitrogen atmosphere, a weather cycle, and an inexhaustible supply of cheap energy, where we will even be able to fly like birds in the minimal gravitational field—offers the most realistic and thrill­ing prospect of life without support from Earth.</span></strong></li><li data-dcnode-id="1091"><span data-dcnode-id="1094" instrument_node="">Though, the book has its own limitations, </span><a data-dcnode-id="1092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/customer-reviews/R3HPB110TMTUKO/ref%3Dcm_cr_dp_d_rvw_ttl%3Fie%3DUTF8%26ASIN%3D0804197970"><span data-dcnode-id="1093" instrument_node="">this Amazon review and it comments are&nbsp;a must read</span></a></li></ul></li></ul><div data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1069"><li data-dcnode-id="1070"><cite data-dcnode-id="1083"><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/3319229176/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Dhumanstotian-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3D3319229176%26linkId%3D9b5f74f180e8c458151051be999cea6b"><span data-dcnode-id="1085" instrument_node="">To Mars and Beyond, Fast!: How Plasma Propulsion Will Revolutionize Space Exploration</span></a></cite><ul data-dcnode-id="1071"><li data-dcnode-id="1079"><span data-dcnode-id="1082" instrument_node="">by Franklin Chang Díaz, Erik Seedhouse, </span><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">200 pages, june 2017</span></strong></li><li data-dcnode-id="1076"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">The VASIMR® engine is the most advanced high-power plasma propulsion system operating in the world today and it may place long, fast interplanetary journeys withinour reach in the near future.&nbsp;</span></strong></li><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Franklin Chang Díaz is a 7-tim Space Shuttle astronaut, he arrived in America from Costa-Rica in 1968 with $50 dollars in his pocket and speaking no English. He's been working on the VASIMR engine for 40 years almost.</span></li><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">As advanced in-space propulsion moves from science fiction to reality, the Variable Specific Impulse Magnetoplasma Rocket, or VASIMR® engine, is a leading contender for making 'Mars in a month' a possibility (as well as making the Outer Solwar System accessible to Humans). A paradigm shift in space transportation, this book is an in-depth and compelling story co-written by its inventor. It traces the riveting history of the development of the VASIMR® engine. This landmark technology is grounded in concepts of advanced plasma physics. It cross-pollinates ideas and disciplines to offer a new, practical, and sustainable solution for in-space transportation beyond low Earth orbit in the decades to come. Invented by the co-holder of the world’s spaceflight record, astronaut Franklin Chang Díaz, the VASIMR® &nbsp;engine is developed by Ad Astra Rocket Company in its Texas facilities with NASA as part of the NextSTEP VASIMR® partnership. With adequate funding, the first spaceflight of the VASIMR® engine is imminent. Plasma rockets feature exhaust velocities far above those achievable by conventional chemical rockets.&nbsp;</span></li></ul></li></ul><div data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1043"><li data-dcnode-id="1044"><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0691146330/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Dhumanstotian-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3D0691146330%26linkId%3D5698aa5c07d62fb533c5c23d566ff8f6"><span data-dcnode-id="1066" instrument_node="">Titan Unveiled: Saturn's Mysterious Moon Explored​</span></a><ul data-dcnode-id="1045"><li data-dcnode-id="1062"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">(haven't read it yet)</span></strong></li><li data-dcnode-id="1059"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">First published in 2008, republished with a new afterword in 2010,&nbsp;by Ralph Lorenz &amp;‎ Jacqueline Mitton, 275 pages</span></strong></li><li data-dcnode-id="1046"><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Amazon blurb :</span></p><ul data-dcnode-id="1047"><li data-dcnode-id="1054"><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">"Ralph Lorenz and Jacqueline Mitton take readers behind the scenes of the Cassini-Huygens mission. Launched in 1997, Cassini entered orbit around Saturn in summer 2004. Its formidable payload included the Huygens probe, which successfully parachuted down through Titan's atmosphere in early 2005, all the while transmitting images and data--and scientists were startled by what they saw. One of those researchers was Lorenz, who gives an insider's account of the scientific community's first close encounter with an alien landscape of liquid methane seas and turbulent orange skies. Amid the challenges and frayed nerves, new discoveries are made, including methane monsoons, equatorial sand seas, and Titan's polar hood. Lorenz and Mitton describe Titan as a world strikingly like Earth and tell how Titan may hold clues to the origins of life on our own planet and possibly to its presence on others."</span></p></li><li data-dcnode-id="1048"><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">"Generously illustrated with many stunning images, </span><i data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Titan Unveiled</span></i><span data-dcnode-id="1050" instrument_node=""> is essential reading for anyone interested in space exploration, planetary science, or astronomy."</span></p></li></ul></li></ul></li></ul><div data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="1009"><li data-dcnode-id="1029"><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B019ND30YM/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Dhumanstotian-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3DB019ND30YM%26linkId%3D718fccaa9dcbd92fdbf096d52d0513a4"><span data-dcnode-id="1040" instrument_node="">Lifting Titan's Veil: Exploring the Giant Moon of Saturn</span></a><ul data-dcnode-id="1030"><li data-dcnode-id="1036"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">(haven't read it yet)</span></strong></li><li data-dcnode-id="1033"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">2002,&nbsp;by Ralph Lorenz &amp;‎ Jacqueline Mitton, 268 pages</span></strong></li><li data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">"A revealing account of the second largest moon in our solar system."</span></li></ul></li><li data-dcnode-id="1010"><cite data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Coustenis, Athéna; Taylor, F. W. (</span></cite><cite data-dcnode-id="1011"><span data-dcnode-id="1026" instrument_node="">412 pages, 2008).&nbsp;</span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/9812705015/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Dhumanstotian-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3D9812705015%26linkId%3De5b2d971351557da35c2d782e7085cea"><i data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Titan: Exploring an Earthlike World</span></i></a><span data-dcnode-id="1022" instrument_node="">. World Scientific.&nbsp;</span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Standard_Book_Number" title="International Standard Book Number"><span data-dcnode-id="1021" instrument_node="">ISBN</span></a><span data-dcnode-id="1019" instrument_node="">&nbsp;</span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/978-981-270-501-3" title="Special:BookSources/978-981-270-501-3"><span data-dcnode-id="1018" instrument_node="">978-981-270-501-3</span></a><span data-dcnode-id="1016" instrument_node="">. </span><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">(we haven't read it yet though) </span></strong><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Exploring-Earthlike-Atmospheric-Oceanic-Planetary/dp/9812705015"><span data-dcnode-id="1013" instrument_node="">(Amazon link)</span></a></cite></li></ul><div data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">&nbsp;</span></div><ul data-dcnode-id="986"><li data-dcnode-id="987"><span data-dcnode-id="1006" instrument_node="">A novel recommened by Ralph Lorenz :&nbsp;</span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Titan-Stephen-Baxter-ebook/dp/B00BS06UVE/ref%3Dsr_1_1%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1523330306%26sr%3D1-1%26keywords%3Dtitan%2Bbaxter"><span data-dcnode-id="1005" instrument_node="">Titan</span></a><ul data-dcnode-id="988"><li data-dcnode-id="1001"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">2013, by Stephen Baxter,&nbsp;692 pages</span></strong></li><li data-dcnode-id="989"><span data-dcnode-id="1000" instrument_node="">Amazon blurb</span><ul data-dcnode-id="990"><li data-dcnode-id="997"><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Signs of life have been found on Titan, Saturn’s largest moon.</span></p></li><li data-dcnode-id="994"><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">A group of visionaries led by NASA’s Paula Benacerraf plan a daring one-way mission that will cost them everything. Taking nearly a decade, the billion-mile voyage includes a ‘slingshot’ transit of Venus, a catastrophic solar storm, and a constant struggle to keep the ship and crew functioning.</span></p></li><li data-dcnode-id="991"><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">But it is on the icy surface of Titan itself that the true adventure begins. In the orange methane slush the astronauts will discover the secrets of life’s origins and reach for a human destiny beyond their wildest dreams.</span></p></li></ul></li></ul></li></ul></div></div></div></div></div></div></div></div></div><span data-dcnode-id="976" instrument_node="">

</span><div class="s-mh s-repeatable" data-dcnode-id="671"><div data-dcnode-id="672"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="673" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="674"><div class="s-item-text-group" data-dcnode-id="675"><div class="s-item-title" data-dcnode-id="849"><div class="s-component s-text" data-dcnode-id="850"><h3 class="" data-dcnode-id="851"><div class="s-component-content s-font-heading" data-dcnode-id="852"><h3 data-dcnode-id="853"><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Other interesting Titan exploration concepts</span></p></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="676"><div class="s-component s-text" data-dcnode-id="677"><div class="" data-dcnode-id="678"><div class="s-component-content s-font-body" data-dcnode-id="679"><ul data-dcnode-id="680"><li data-dcnode-id="799"><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Titan Saturn System Mission (TSSM)</span></strong><ul data-dcnode-id="800"><li data-dcnode-id="834"><span data-dcnode-id="846" instrument_node="">The TSSM mission consists of an </span><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">orbiter </span></strong><span data-dcnode-id="843" instrument_node="">and </span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">2 Titan exploration probes</span></strong><span data-dcnode-id="840" instrument_node="">:&nbsp;</span><ul data-dcnode-id="835"><li data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">a hot air balloon ("Montgolfier" type) that will float in Titan's clouds</span></li><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">a lander, the Titan Mare Explorer (or TiME) that will splash down on one of its methane seas.</span></li></ul></li><li data-dcnode-id="829"><u data-dcnode-id="831"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Status </span></strong></u><span data-dcnode-id="830" instrument_node="">: cancelled, as in 2009, a mission to Jupiter and its moons was given priority over Titan Saturn System Mission.</span></li><li data-dcnode-id="824"><span data-dcnode-id="828" instrument_node="">Watch </span><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DpL4LTFBO10Q"><span data-dcnode-id="827" instrument_node="">this nice 3 min video</span></a><span data-dcnode-id="825" instrument_node=""> about the mission, with cool animations</span></li><li data-dcnode-id="801"><span data-dcnode-id="823" instrument_node="">About </span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">TiME – The Titan Mare Explorer</span></strong><ul data-dcnode-id="802"><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Titan Mare Explorer (TiME) is a proposed design for a lander for Saturn's moon Titan.&nbsp;</span></li><li data-dcnode-id="815"><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">TiME is a relatively low-cost, outer-planet mission designed to measure the organic constituents on Titan and would have performed the first nautical exploration of an extraterrestrial sea</span></strong><span data-dcnode-id="816" instrument_node="">, analyze its nature and, possibly, observe its shoreline. As a Discovery-class mission it was designed to be cost-capped at US$425 million, not counting launch vehicle funding.&nbsp;It was proposed to NASA in 2009 by Proxemy Research as a scout-like pioneering mission, originally as part of NASA's Discovery Program.&nbsp;The TiME mission design reached the finalist stage during that Discovery mission selection, but was not selected, and despite attempts in the U.S. Senate failed to get earmark funding in 2013</span></li><li data-dcnode-id="809"><span class="s-text-color-black" data-dcnode-id="811"><u data-dcnode-id="812"><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Status </span></strong></u></span><span data-dcnode-id="810" instrument_node="">: cancelled</span></li><li data-dcnode-id="806"><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_Mare_Explorer"><span data-dcnode-id="808" instrument_node="">See dedicated page on Wikipedia</span></a></li><li data-dcnode-id="803"><a data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.astro.cornell.edu/academics/courses/astro2202/TiME_06497165.pdf"><span data-dcnode-id="805" instrument_node="">See the scientific pdf paper introducing the concept</span></a></li></ul></li></ul></li><li data-dcnode-id="784"><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Titan Lake In-situ Sampling Propelled Explorer (TALISE)</span></strong><span data-dcnode-id="796" instrument_node="">, an idea floated in 2012 by a spanish team</span><ul data-dcnode-id="785"><li data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">Read </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/97611/paddleboat-mission-to-titan-proposed/"><span data-dcnode-id="794" instrument_node="">Paddleboat Mission to Titan Proposed</span></a><span data-dcnode-id="792" instrument_node=""> (Sept 2012, universetoday.com)</span></li><li data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">Read as well the technical paper : T</span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/258731905_TALISE_Titan_Lake_In-situ_Sampling_Propelled_Explorer"><span data-dcnode-id="789" instrument_node="">ALISE: Titan Lake In-situ Sampling Propelled Explorer</span></a><span data-dcnode-id="787" instrument_node=""> (sept 2012, researchgate.net)</span></li></ul></li><li data-dcnode-id="761"><strong data-dcnode-id="780"><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AVIATR"><span data-dcnode-id="783" instrument_node="">AVIATR</span></a><span data-dcnode-id="781" instrument_node=""> (Aerial Vehicle for In situ and Airborne Titan Reconnaissance)</span></strong><ul data-dcnode-id="762"><li data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">A proposed airplane mission concept to Titan, a moon of Saturn. The concept was developed in 2011 by a team of scientists led by Jason W. Barnes at the University of Idaho. "As far as its scientific interest, Titan is the most interesting target in the Solar System,” Dr. Jason W. Barnes of the University of Idaho (read&nbsp; A</span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/92286/aviatr-an-airplane-mission-for-titan/"><span data-dcnode-id="778" instrument_node="">VIATR: An Airplane Mission for Titan</span></a><span data-dcnode-id="776" instrument_node="">, Jan 2012)</span></li><li data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">The design called for a 120 kg&nbsp;airplane powered by </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Advanced_Stirling_radioisotope_generator"><span data-dcnode-id="773" instrument_node="">an advanced Stirling radioisotope generator</span></a><span data-dcnode-id="771" instrument_node="">&nbsp;that would have allowed it to fly uninterrupted for about one year.</span></li><li data-dcnode-id="763"><u data-dcnode-id="767"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Status</span></strong></u><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">&nbsp;:&nbsp;</span></strong><span data-dcnode-id="764" instrument_node="">the National Research Council's "Decadal Survey" did not prioritize the moon Titan for exploration, and the development of the advanced Stirling radioisotope generator was suspended indefinitely.</span></li></ul></li><li data-dcnode-id="681"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Titan Submarine: Exploring the Depths of Kraken (1 main design and 2 variants)</span></strong><ul data-dcnode-id="682"><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">This mission would be a logical follow-on to a Titan surface mission such as TiME (Titan Mare Explorer)&nbsp;</span></li><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Titan Submarine, or Titan Sub for short, will be a fully autonomous, highly capable science craft that will allow a complete exploration of what exists beneath the waves on another world.&nbsp;</span></li><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">A 90-day, 1,250-mile voyage exploring Kraken Mare, a sea comparable in size to the Great Lakes, is proposed.&nbsp;</span></li><li data-dcnode-id="750"><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">“The mission concept will investigate a full spectrum of oceanographic phenomena: chemical composition of the liquid, surface and subsurface currents, mixing and layering in the “water” column, tides, wind and waves, bathymetry, and bottom features and composition,” explains Oleson. “Measurements of all these aspects of Titan’s hydrocarbon ocean environment can only be made through focused exploration with a well-instrumented craft.”</span></p></li><li data-dcnode-id="747"><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">"Communicating with Earth would not be possible when the vehicle is submerged, so it would need to make regular trips to the surface to transmit science data. Due to the length of time needed to develop the hardware, travel time and the fact that seasons last seven years on Titan, Oleson and his team propose a launch in the 2040s, one of the summer periods."</span></p></li><li data-dcnode-id="723"><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">2 different designs are under study :</span></p><ul data-dcnode-id="724"><li data-dcnode-id="742"><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">One is a narrow robot submarine around 20 feet (6 m) long that would surface to send data directly back to Earth (cheaper than initial design).</span></p></li><li data-dcnode-id="725"><p data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">The other is the </span><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Titan Turtle</span></strong><span data-dcnode-id="738" instrument_node="">, a round-shelled, autonomous bot that would communicate with Earth through an orbiting spacecraft. The Turtle and orbiter design would be less risky than initial design, and would have more bandwidth for sending data back to Earth, Hartwig said.</span></p><ul data-dcnode-id="726"><li data-dcnode-id="733"><p data-dcnode-id="734"><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DK1hZ3kXRxLA"><span data-dcnode-id="736" instrument_node="">Watch the 3 min Youtube intro video</span></a></p></li><li data-dcnode-id="727"><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">Watch</span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DpL4LTFBO10Q"><span data-dcnode-id="731" instrument_node=""> that other cool 1 min video</span></a><span data-dcnode-id="729" instrument_node=""> with animations of the spacecraft carrying the submarine arrive at Titan, land and glide on one of its 3 seas, and then eject the submarine, really awesome stuff!</span></p></li></ul></li></ul></li><li data-dcnode-id="713"><p data-dcnode-id="718"><u data-dcnode-id="720"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Status (as of Feb 2018)</span></strong></u><span data-dcnode-id="719" instrument_node="">: "The project recently moved from the first phase of experimental funding under the NASA Innovative Advanced Concepts (NIAC) program. It's now moving toward the technology-development stage, with initial tests of some systems planned for late 2018 or early 2019, Hartwig said."</span></p><ul data-dcnode-id="714"><li data-dcnode-id="715"><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">"If the mission is approved, the probe could be launched in the mid-2030s and arrive at the Saturn system in the late 2030s or early 2040s, one of the project leaders at NASA's Glenn Research Center, aerospace engineer Jason Hartwig, told Live Science."</span></p></li></ul></li><li data-dcnode-id="708"><p data-dcnode-id="709"><span data-dcnode-id="712" instrument_node="">See</span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/content/titan-submarine-exploring-the-depths-of-kraken"><span data-dcnode-id="711" instrument_node=""> source on NASA website</span></a></p></li><li data-dcnode-id="703"><p data-dcnode-id="704"><span data-dcnode-id="707" instrument_node="">Watch the </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DNnKxbdpLP5E"><span data-dcnode-id="706" instrument_node="">1min 40 sec animation on Youtube Titan Submarine: Exploring the Depths of Kraken Mare</span></a></p></li><li data-dcnode-id="696"><p data-dcnode-id="697"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//futurism.com/nasa-space-submarine-titans-seas/"><span data-dcnode-id="702" instrument_node="">Read NASA’s Testing a Space Submarine to Use in Titan’s Seas</span></a><span data-dcnode-id="700" instrument_node="">. </span><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">(Futurism.com, feb 2018)</span></strong></p></li><li data-dcnode-id="690"><p data-dcnode-id="691"><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.popsci.com/seafaring-robots-life-ocean-worlds"><span data-dcnode-id="695" instrument_node="">Read These seafaring robots will search for life across the solar system</span></a><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node=""> (popsci.com, april 2018)</span></strong></p></li><li data-dcnode-id="683"><p data-dcnode-id="684"><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/storyline/the-big-questions/here-s-why-nasa-wants-send-submarine-titan-n720176"><span data-dcnode-id="689" instrument_node="">Read Why NASA Wants to Send a Submarine to Titan</span></a><span data-dcnode-id="687" instrument_node=""> </span><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">(nbcnews.com, feb 2017)</span></strong></p></li></ul></li></ul></div></div></div></div></div></div></div></div></div><span data-dcnode-id="670" instrument_node="">
</span></div></div></div><span data-dcnode-id="666" instrument_node="">
</span></div></li><li class="slide s-section-21" data-dcnode-id="143" id="section-f_e09f9e82-f1d1-4ac8-a95c-9882bec6b4ed"><div class="waypoint" data-dcnode-id="663"></div><a class="section-anchor" data-dcnode-id="662"></a><div class="lazyload s-gallery-section s-section background-image" data-dcnode-id="144" data-react-style="{}"><div class="container" data-dcnode-id="145"><div class="columns sixteen" data-dcnode-id="654"><div class="s-title-group" data-dcnode-id="655"><div class="s-item-title" data-dcnode-id="656"><div class="s-component s-text" data-dcnode-id="657"><h3 class="" data-dcnode-id="658"><div class="s-component-content s-font-heading" data-dcnode-id="659"><h2 class="s-title s-font-title" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Gallery</span></h2></div></h3></div></div></div></div><div class="columns sixteen" data-dcnode-id="146" style="transition:none"><div class="s-gallery s-gallery-columns-1" data-dcnode-id="147"><div data-dcnode-id="148"><div data-dcnode-id="153"><div class="s-component s-gallery-item" data-dcnode-id="644" data-sorting-index="0"><div data-dcnode-id="645"><div class="s-component-content" data-dcnode-id="646"><div class="image-wrapper" data-dcnode-id="647"><a class="item" data-dcnode-id="648" data-description="" data-type="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit%2Cfl_lossy%2Ch_9000%2Cw_1920%2Cf_auto%2Cq_auto/980393/A_composite_image_of_Saturn_s_moon_Titan_taken_by_the_Cassini_spacecraft._ldd8th.jpg"><div class="s-img-wrapper" data-dcnode-id="649"><div class="s-ratio-box" data-dcnode-id="650" style="max-width:500px;max-height:500px"><div class="s-ratio-fill" data-dcnode-id="653" style="padding-bottom:100.00%"></div><div class="s-img-wrapper" data-dcnode-id="651"><img alt="" class="lazyload crop-default" data-dcnode-id="652" data-description="" data-src="//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_fill,fl_lossy,h_200,w_200,f_auto,g_faces:auto,q_auto/980393/A_composite_image_of_Saturn_s_moon_Titan_taken_by_the_Cassini_spacecraft._ldd8th.jpg" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_fill%2Cfl_lossy%2Ch_200%2Cw_200%2Cf_auto%2Cg_faces%3Aauto%2Cq_1/980393/A_composite_image_of_Saturn_s_moon_Titan_taken_by_the_Cassini_spacecraft._ldd8th.jpg&amp;raw" title="" width="500"></div></div></div></a></div></div></div></div><div class="s-component s-gallery-item" data-dcnode-id="634" data-sorting-index="1"><div data-dcnode-id="635"><div class="s-component-content" data-dcnode-id="636"><div class="image-wrapper" data-dcnode-id="637"><a class="item" data-dcnode-id="638" data-description="" data-type="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit%2Cfl_lossy%2Ch_9000%2Cw_1920%2Cf_auto%2Cq_auto/980393/Chemistry_in_Titan_s_atmosphere_node_full_image_2_Graphic_depicting_some_of_the_chemical_reactions_taking_place_in_Titan_s_atmosphere_that_lead_to_the_generation_of_organic_haze_particles._Credit_ESA_s7oafh.jpg"><div class="s-img-wrapper" data-dcnode-id="639"><div class="s-ratio-box" data-dcnode-id="640" style="max-width:500px;max-height:500px"><div class="s-ratio-fill" data-dcnode-id="643" style="padding-bottom:100.00%"></div><div class="s-img-wrapper" data-dcnode-id="641"><img alt="" class="lazyload crop-default" data-dcnode-id="642" data-description="" data-src="//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_fill,fl_lossy,h_200,w_200,f_auto,g_faces:auto,q_auto/980393/Chemistry_in_Titan_s_atmosphere_node_full_image_2_Graphic_depicting_some_of_the_chemical_reactions_taking_place_in_Titan_s_atmosphere_that_lead_to_the_generation_of_organic_haze_particles._Credit_ESA_s7oafh.jpg" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw2
