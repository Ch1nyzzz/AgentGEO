3369"><em data-dcnode-id="3370"><span data-dcnode-id="3371" instrument_node="">Titan's water subsurface liquid ocean is considered to be the most likely habitable environment. This hidden ocean may be 60 to 120 miles (100 to 200 km) thick, below the surface ice crust 30 to 90 miles (50 to 150 km) thick.</span></em></p><p data-dcnode-id="3366"><em data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">But how would organic materials from the atmosphere make their way to the surface ?</span></em></p></div></div></div></div></div></div></div></div></div><div class="s-repeatable-item" data-dcnode-id="3333" data-sorting-index="2"><div class="clearfix" data-dcnode-id="3334"><div data-dcnode-id="3335"><div class="s-item-media-wrapper s-mhi" data-dcnode-id="3347"><div class="s-item-media-group" data-dcnode-id="3348"><div class="s-component s-media" data-dcnode-id="3349"><div data-dcnode-id="3350"><div class="s-component-content" data-dcnode-id="3351"><div class="s-img-wrapper" data-dcnode-id="3352"><div class="s-ratio-box" data-dcnode-id="3353" style="max-width:1200px;max-height:675px"><div class="s-ratio-fill" data-dcnode-id="3356" style="padding-bottom:56.25%"></div><div class="s-img-wrapper" data-dcnode-id="3354"><img alt="" class="crop-default lazyloaded" data-dcnode-id="3355" data-description="" data-src="//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit,fl_lossy,h_9000,w_1200,f_auto,q_auto/980393/530734_136193.jpeg" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit%2Cfl_lossy%2Ch_9000%2Cw_1200%2Cf_auto%2Cq_auto/980393/530734_136193.jpeg&amp;raw" title="" width="1200"></div></div></div></div></div></div></div></div><div class="" data-dcnode-id="3336"><div class="s-item-text-group" data-dcnode-id="3337"><div class="s-item-text" data-dcnode-id="3338"><div class="s-component s-text" data-dcnode-id="3339"><div class="" data-dcnode-id="3340"><div class="s-component-content s-font-body" data-dcnode-id="3341"><p data-dcnode-id="3342"><em data-dcnode-id="3343"><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/SpaceX/status/1178131551596343297" target="_blank"><span data-dcnode-id="3346" instrument_node="">SpaceX says</span></a><span data-dcnode-id="3344" instrument_node=""> that ultimately its Starship will carry as many as 100 people on long-duration, interplanetary flights (though artificial gravity would probably be a requirement to go to Titan)</span></em></p></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="3330" instrument_node="">
</span></div></div><span data-dcnode-id="3327" instrument_node="">
</span></div></li><li class="slide s-section-5" data-dcnode-id="3315" id="section-f_a159934c-dae2-4b41-b9fd-4708e0580317"><div class="waypoint" data-dcnode-id="3324"></div><a class="section-anchor" data-dcnode-id="3323"></a><div class="s-no-bg s-bg-white s-html-section s-section background-image lazyloaded" data-dcnode-id="3316" data-react-style="{}"><div class="container" data-dcnode-id="3317"><div class="columns sixteen" data-dcnode-id="3318"><div class="s-component s-html-component" data-dcnode-id="3319"><div class="s-component-content-wrapper" data-dcnode-id="3320"><div class="s-component-content s-font-body" data-dcnode-id="3321"><div data-dcnode-id="3322"></div></div></div></div></div></div></div></li><li class="slide s-section-6" data-dcnode-id="3051" id="section-f_28a17616-f0c9-45e7-b29e-fc8ef29ce33b"><div class="waypoint" data-dcnode-id="3314"></div><a class="section-anchor" data-dcnode-id="3313"></a><div data-dcnode-id="3052"><span data-dcnode-id="3312" instrument_node="">
</span><div class="s-no-bg s-new-text-section s-section s-text-section background-image lazyloaded" data-dcnode-id="3054" data-react-style="{}"><div class="container" data-dcnode-id="3055"><div class="clearfix" data-dcnode-id="3310"><div class="columns sixteen" data-dcnode-id="3311"></div></div><div class="" data-dcnode-id="3056"><span data-dcnode-id="3309" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="3058"><div data-dcnode-id="3059"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="3060" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="3061"><div class="s-item-text-group" data-dcnode-id="3062"><div class="s-item-title" data-dcnode-id="3302"><div class="s-component s-text" data-dcnode-id="3303"><h3 class="" data-dcnode-id="3304"><div class="s-component-content s-font-heading" data-dcnode-id="3305"><h3 data-dcnode-id="3306"><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">Latest articles</span></p></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="3063"><div class="s-component s-text" data-dcnode-id="3064"><div class="" data-dcnode-id="3065"><div class="s-component-content s-font-body" data-dcnode-id="3066"><ul data-dcnode-id="3067"><li data-dcnode-id="3287"><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2021/08/210810143051.htm" target="_blank"><span data-dcnode-id="3301" instrument_node="">Dragonfly mission to Titan announces big science goals</span></a><span data-dcnode-id="3299" instrument_node=""> </span><strong data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">(ScienceDaily, Aug 2021)</span></strong><ul data-dcnode-id="3288"><li data-dcnode-id="3293"><strong data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">The goals for Dragonfly</span></strong><span data-dcnode-id="3294" instrument_node=""> include searching for chemical biosignatures; investigating the moon's active methane cycle; and exploring the prebiotic chemistry currently taking place in Titan's atmosphere and on its surface.</span></li><li data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Dragonfly will spend a full Titan day (equivalent to 16 Earth days) in one location conducting science experiments and observations, and then fly to a new location.</span></li><li data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Dragonfly's search for chemical biosignatures will also be wide-ranging. In addition to examining Titan's habitability in general, they'll be investigating potential chemical biosignatures, past or present, from both water-based life to that which might use liquid hydrocarbons as a solvent, such as within its lakes, seas or aquifers.</span></li></ul></li><li data-dcnode-id="3249"><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/jamiecartereurope/2021/07/29/inside-nasas-jaw-dropping-plans-to-fly-to-titan-then-burn-its-lakes-to-bring-home-an-organic-sample" target="_blank"><span data-dcnode-id="3286" instrument_node="">Inside NASA’s Jaw-Dropping Plans To Fly To Titan, Burn Its Lakes And Bring Home The ‘Origin Of Life’</span></a><span data-dcnode-id="3284" instrument_node=""> </span><strong data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">(Forbes, Jul 2021)</span></strong><ul data-dcnode-id="3250"><li data-dcnode-id="3274"><span data-dcnode-id="3281" instrument_node="">NASA’s Steve Oleson and Geoff Landis are working on the </span><em data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Titan Sample Return Using In-Situ Propellants</span></em><span data-dcnode-id="3278" instrument_node=""> project at the space mission-designing Compass Lab at NASA Glenn Research Center in Cleveland, Ohio. Part of the </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/content/niac-overview" target="_blank" title="https://www.nasa.gov/content/niac-overview"><span data-dcnode-id="3277" instrument_node="">NASA Innovative Advanced Concepts</span></a><span data-dcnode-id="3275" instrument_node="">&nbsp;(NIAC) program, this project is being studied as a possible successor to an already planned mission to the bizarre Saturnian moon.&nbsp;</span></li><li data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">Tholins are the complicated organic molecules that result from that process—and we know almost nothing about them. “There’s a lot of thinking that these sort of molecules are the building blocks from which life started because they must have been present in the early Solar System,” said Landis.&nbsp;</span></li><li data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Tholins don't exist any closer than the outer Solar System—that’s at Saturn and further out—but they may have been present on the early Earth. “If tholins are the basis for the formation of life, we want to go to Titan essentially to find out where we come from,” said Landis.&nbsp;</span></li><li data-dcnode-id="3267"><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">“Dragonfly is our scout,” said Oleson. “Detailed images from Dragonfly will tell us everything we need to get ready.” Their sample return mission would require a rover or a Dragonfly-like drone to identify compounds to bring home, but by then that would all be using existing tried-and-tested technology.</span></p></li><li data-dcnode-id="3264"><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">“Once Dragonfly has demonstrated mobility on Titan we’ll have a vehicle that can fly around finding samples,” said Landis. “The next step is to use a Dragonfly-like vehicle to pick up samples and bring them to our our sample return vehicle.”</span></p></li><li data-dcnode-id="3261"><p data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">The really clever part of the concept is the production of fuel on Titan itself, allowing a sample-return platform to be just a fifth of the mass compared to one that had to take its own fuel along.</span></p></li><li data-dcnode-id="3258"><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Luckily, Titan is the perfect place to source and process propellant without complicated chemical processing. After all, there are lakes full of liquid methane and ethane. “We could use a hose and pump up the liquid from a lake,” said Oleson. Easy!</span></p></li><li data-dcnode-id="3255"><p data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Meanwhile, liquid oxygen—which would be needed for the fuel to burn—could be produced by melting the hard frozen pieces of water-ice on Titan’s surface, as seen by the Cassini-Huygens probe back in 2005. “A reactor on the surface could grab that and heat it up and use electrolysis to make liquid oxygen and hydrogen,” said Oleson. Storage wouldn’t be a problem, either. “On Titan it’s only a few degrees above liquid nitrogen temperatures, so very easy to keep that cold.”</span></p></li><li data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Oleson and Landis reckon that the small amount of technology development required—chiefly the electrolysis part—could be completed within a decade.</span></li><li data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">This mission would last about 14 years. It would take roughly seven years to get there, and then the same to get back,&nbsp;though well-timed gravity-assists either on the way there or back could reduce the total flight time to just 10 years.</span></li></ul></li><li data-dcnode-id="3237"><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//agupubs.onlinelibrary.wiley.com/doi/epdf/10.1029/2020JE006558" target="_blank"><span data-dcnode-id="3248" instrument_node="">New analysis of Cassini data</span></a><span data-dcnode-id="3246" instrument_node=""> shows Kraken Mare, the largest of Titan's methane lakes (</span><em data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">5 times larger</span></em><span data-dcnode-id="3243" instrument_node=""> than Lake Superior by area), is </span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.syfy.com/syfywire/release-the-kraken-huge-methane-lakes-on-saturns-moon-titan-run-deep" target="_blank"><span data-dcnode-id="3242" instrument_node="">at least 100 meters deep, and possibly much more</span></a><span data-dcnode-id="3240" instrument_node="">.&nbsp;</span><strong data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node=""> (Dec 2020)</span></strong></li><li data-dcnode-id="3230"><a data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/148393/impatient-a-spacecraft-could-get-to-titan-in-only-2-years-using-a-direct-fusion-drive/" target="_blank"><span data-dcnode-id="3236" instrument_node="">Impatient? A Spacecraft Could Get to Titan in Only 2 Years Using a Direct Fusion Drive</span></a><span data-dcnode-id="3234" instrument_node=""> (</span><strong data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Oct 2020</span></strong><span data-dcnode-id="3231" instrument_node="">)</span></li><li data-dcnode-id="3217"><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aviationweek.com/aerospace/podcast-tech-talk-nasas-dragonfly-mission-titan" target="_blank"><span data-dcnode-id="3229" instrument_node="">Podcast: Tech Talk On NASA’s Dragonfly Mission To Titan</span></a><span data-dcnode-id="3227" instrument_node=""> (</span><strong data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Oct 2020</span></strong><span data-dcnode-id="3224" instrument_node="">) (audio and trasncript)</span><ul data-dcnode-id="3218"><li data-dcnode-id="3219"><span data-dcnode-id="3223" instrument_node="">We speak to </span><strong data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Elizabeth Turtle, the principal investigator of NASA’s upcoming Dragonfly mission</span></strong><span data-dcnode-id="3220" instrument_node="">, which seeks to explore the surface of Titan with a rotorcraft.</span></li></ul></li><li data-dcnode-id="3210"><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airspacemag.com/daily-planet/saturns-moon-titan-living-cells-may-be-very-different-ours-180974104/" target="_blank"><span data-dcnode-id="3216" instrument_node="">On Saturn’s Moon Titan, Living Cells May Be Very Different From Ours</span></a><span data-dcnode-id="3214" instrument_node=""> (</span><strong data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">Jan 2020</span></strong><span data-dcnode-id="3211" instrument_node="">)</span></li><li data-dcnode-id="3206"><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-space-titan/possibility-of-life-scientists-map-saturns-exotic-moon-titan-idUSKBN1XS2H2" target="_blank"><span data-dcnode-id="3209" instrument_node="">'Possibility of life': scientists map Saturn's exotic moon Titan</span></a><span data-dcnode-id="3207" instrument_node=""> (Nov 2019)</span></li><li data-dcnode-id="3201"><p data-dcnode-id="3202"><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newscientist.com/article/2219926-strange-sand-dunes-on-titan-could-be-made-by-cosmic-rays-hitting-ice/%23ixzz62fhi7nEb" target="_blank"><span data-dcnode-id="3205" instrument_node="">Strange sand dunes on Titan could be made by cosmic rays hitting ice</span></a><span data-dcnode-id="3203" instrument_node=""> (Oct 2019)</span></p></li><li data-dcnode-id="3196"><span data-dcnode-id="3200" instrument_node="">Could be useful to send humans to Titan ultimately : </span><a data-dcnode-id="3198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//futurism.com/the-byte/navy-scientist-ufo-tech-fusion" target="_blank"><span data-dcnode-id="3199" instrument_node="">A U.S. Navy researcher just patented a compact nuclear fusion reactor that could allegedly fit inside of a vehicle</span></a><span data-dcnode-id="3197" instrument_node=""> (Oct 2019)</span></li><li data-dcnode-id="3188"><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jpl.nasa.gov/news/news.php%3Ffeature%3D7505" target="_blank"><span data-dcnode-id="3195" instrument_node="">NASA Designing Shapeshifting Robots for Saturn's Moon Titan that can roll, fly, float and swim</span></a><span data-dcnode-id="3193" instrument_node=""> (www.jpl.nasa.gov, September 2019)</span><ul data-dcnode-id="3189"><li data-dcnode-id="3190"><a data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DDZ6PLllJFzI" target="_blank"><span data-dcnode-id="3192" instrument_node="">Watch the great video from NASA</span></a></li></ul></li><li data-dcnode-id="3184"><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2019/09/17/760649353/meet-the-nuclear-powered-self-driving-drone-nasa-is-sending-to-a-moon-of-saturn" target="_blank"><span data-dcnode-id="3187" instrument_node="">Meet The Nuclear-Powered Self-Driving Drone NASA Is Sending To A Moon Of Saturn</span></a><span data-dcnode-id="3185" instrument_node=""> (npr.org, September 2019)</span></li><li data-dcnode-id="3180"><a data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/saturn-moon-titan-lakes-explosion-craters.html" target="_blank"><span data-dcnode-id="3183" instrument_node="">Some of Saturn Moon Titan's Methane Lakes May Sit in 'Explosion Craters'</span></a><span data-dcnode-id="3181" instrument_node=""> (space.com, September 2019)</span></li><li data-dcnode-id="3175"><span data-dcnode-id="3179" instrument_node="">[FRENCH] </span><a data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.letemps.ch/pierre-brisson/2019/07/27/le-reve-de-titan" target="_blank"><span data-dcnode-id="3178" instrument_node="">Le rêve de Titan</span></a><span data-dcnode-id="3176" instrument_node=""> (blogs.letemps.ch/pierre-brisson, Pierre Brisson, July 2019)</span></li><li data-dcnode-id="3171"><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inquirer.com/education/penn-state-star-trek-titan-saturn-20190718.html" target="_blank"><span data-dcnode-id="3174" instrument_node="">Penn State has major role in Saturn moon mission: ‘This is straight out of Star Trek’</span></a><span data-dcnode-id="3172" instrument_node=""> (inquirer.com, July 2019)</span></li><li data-dcnode-id="3167"><a data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sci.esa.int/cassini-huygens/61465-cassini-explores-ring-like-formations-around-titan-lakes/" target="_blank"><span data-dcnode-id="3170" instrument_node="">Cassini explores ring-like formations around Titan's lakes</span></a><span data-dcnode-id="3168" instrument_node=""> (ESA, July 2019)</span></li><li data-dcnode-id="3160"><a data-dcnode-id="3165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astrobio.net/news-exclusive/the-habitability-of-titan-and-its-ocean/" target="_blank"><span data-dcnode-id="3166" instrument_node="">The Habitability of Titan and its Ocean</span></a><span data-dcnode-id="3164" instrument_node=""> (Astrobiology Magazine, www.astrobio.net, July 2019) (with great illustrations of the crust and subsurface ocean) ("</span><em data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">However, one terrestrial organism that the team are considering as a suitable example is Pelobacter acetylenicus, which can survive on acetylene as its only source of metabolic energy and carbon</span></em><span data-dcnode-id="3161" instrument_node="">")</span></li><li data-dcnode-id="3156"><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gizmodo.com/will-nasa-find-life-on-titan-1835956477" target="_blank"><span data-dcnode-id="3159" instrument_node="">Great illustration on the theme "Will NASA Find Life on Titan?"</span></a><span data-dcnode-id="3157" instrument_node="">, by JoAnna Wendel for Gizmodo (June 2019)</span></li><li data-dcnode-id="3152"><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edition.cnn.com/2019/06/27/world/nasa-dragonfly-titan-mission-scn-trnd/index.html" target="_blank"><span data-dcnode-id="3155" instrument_node="">NASA's new mission, Dragonfly, will explore Saturn's moon Titan</span></a><span data-dcnode-id="3153" instrument_node=""> (June 2019, CNN)</span></li><li data-dcnode-id="3148"><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//astrobiology.com/2019/05/the-habitability-of-titan-and-its-ocean.html" target="_blank"><span data-dcnode-id="3151" instrument_node="">The Habitability of Titan and its Ocean</span></a><span data-dcnode-id="3149" instrument_node=""> (May 2019, Astrobiology.com)</span></li><li data-dcnode-id="3144"><a data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnet.com/news/nasa-engineer-looks-to-saturn-moon-titan-for-human-colony/" target="_blank"><span data-dcnode-id="3147" instrument_node="">NASA engineer looks to Saturn moon Titan for human colony</span></a><span data-dcnode-id="3145" instrument_node=""> (March 2019, cnet.com)</span></li><li data-dcnode-id="3140"><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.scientificamerican.com/observations/could-a-space-helicopter-find-life-on-saturns-moon-titan/" target="_blank"><span data-dcnode-id="3143" instrument_node="">Could a Space Helicopter Find Life on Saturn's Moon Titan?</span></a><span data-dcnode-id="3141" instrument_node=""> (Feb 2019, scientificamerican.com)</span></li><li data-dcnode-id="3136"><a data-dcnode-id="3138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomynow.com/2018/09/24/cassini-data-show-dust-storms-blowing-across-titan/"><span data-dcnode-id="3139" instrument_node="">Cassini data show dust storms blowing across Titan</span></a><span data-dcnode-id="3137" instrument_node=""> (Sept 2018, astronomynow.com, featuring a cool gif of the storm)</span></li><li data-dcnode-id="3132"><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.astronomy.com/news/magazine/2018/09/voyage-to-the-bottome-of-an-alien-sea"><span data-dcnode-id="3135" instrument_node="">Voyage to the bottom of an alien sea</span></a><span data-dcnode-id="3133" instrument_node=""> (Sept 2018, by &nbsp;Michael Carroll, featuring many cool quotes about Titan by Johns Hopkins University Applied Physics Laboratory’s Ralph Lorenz)</span></li><li data-dcnode-id="3128"><a data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spacetechasia.com/why-titan-is-the-best-place-for-humans-in-the-solar-system-beyond-earth/2/"><span data-dcnode-id="3131" instrument_node="">Why Titan is the best place for Humans in the Solar System beyond Earth</span></a><span data-dcnode-id="3129" instrument_node=""> (Aug 2018, SpaceTechAsia.com)</span></li><li data-dcnode-id="3121"><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//earthsky.org/space/craters-cryovolcanoes-best-for-life-search-on-titan"><span data-dcnode-id="3127" instrument_node="">Where to look for life on Titan</span></a><span data-dcnode-id="3125" instrument_node=""> (</span><strong data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Aug 2018</span></strong><span data-dcnode-id="3122" instrument_node="">, earthsky.org) - With one cool pic of a crater on Titan. "the best locations to look for life on Titan would not be the lakes or seas. Instead, the new work shows a better place to look would be within impact craters and cryovolcanoes on Titan."</span></li><li data-dcnode-id="3116"><p data-dcnode-id="3117"><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airspacemag.com/daily-planet/where-look-life-titan-180969409/%23F7VZr2FPjtxRI0r1.99"><span data-dcnode-id="3120" instrument_node="">Where to Look for Life on Titan : Would fresh impact craters or cryovolcanoes make better targets for astrobiologists?</span></a><span data-dcnode-id="3118" instrument_node=""> (June 2018, Airspacemag.com, by Dirk Schulze-Makuch)</span></p></li><li data-dcnode-id="3108"><span data-dcnode-id="3115" instrument_node="">N</span><a data-dcnode-id="3113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/news/2018-05-geological-titan-dunes.html"><span data-dcnode-id="3114" instrument_node="">ew study details geological process behind Titan's dunes</span></a><span data-dcnode-id="3112" instrument_node=""> (</span><strong data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">May 2018</span></strong><span data-dcnode-id="3109" instrument_node="">, Phys.org)</span></li><li data-dcnode-id="3097"><span data-dcnode-id="3107" instrument_node="">Nathalie Cabrol (Carl Sagan Center)&nbsp;on the Space Show </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thespaceshow.com/show/07-may-2018/broadcast-3110-dr.-nathalie-cabrol"><span data-dcnode-id="3106" instrument_node="">"Titan as a destination isn't a fantasy"</span></a><span data-dcnode-id="3104" instrument_node=""> </span><strong data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">(May 2018</span></strong><span data-dcnode-id="3101" instrument_node="">, Space Show, listen all Nathalie said about Titan from 48:59 to 55:55&nbsp;</span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thespaceshow.com/show/07-may-2018/broadcast-3110-dr.-nathalie-cabrol"><span data-dcnode-id="3100" instrument_node="">here</span></a><span data-dcnode-id="3098" instrument_node="">)&nbsp;</span></li><li data-dcnode-id="3090"><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nai.nasa.gov/teams/can-8/jpl-titan/"><span data-dcnode-id="3096" instrument_node="">Habitability of Hydrocarbon Worlds: Titan and Beyond&nbsp;05/2018 - 04/202</span></a><span data-dcnode-id="3094" instrument_node="">3 (</span><strong data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">May 2018, NASA website</span></strong><span data-dcnode-id="3091" instrument_node="">)</span></li><li data-dcnode-id="3084"><a data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.wsu.edu/2018/02/07/wsu-builds-nasa-alien-ocean/"><span data-dcnode-id="3089" instrument_node="">WSU researchers build -300ºF alien ocean to test NASA outer space submarine</span></a><span data-dcnode-id="3087" instrument_node=""> </span><strong data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">(Feb 2018, news.wsu.edu)</span></strong></li><li data-dcnode-id="3080"><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.techradar.com/news/the-tech-we-need-to-build-a-colony-on-titan" target="_blank"><span data-dcnode-id="3083" instrument_node="">The tech we need to build a colony on Titan</span></a><span data-dcnode-id="3081" instrument_node=""> (Aug 2017, Techradar.com)</span></li><li data-dcnode-id="3076"><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/136640/nasa-detects-chemicals-titan-essential-life/"><span data-dcnode-id="3079" instrument_node="">NASA Detects More Chemicals on Titan that are Essential to Life</span></a><span data-dcnode-id="3077" instrument_node=""> (July 2017, universetoday.com) (excerpt : "they calculated that within every cubic centimeter (cm³) of its volume, Ligeia Mare could form as many as 10,000,000 azotosomes. That roughly ten times the amount of bacteria that exists in the waters along Earth’s coastal regions")</span></li><li data-dcnode-id="3072"><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/134140/exploring-titan-balloons-landers/"><span data-dcnode-id="3075" instrument_node="">Exploring Titan with Balloons and Landers</span></a><span data-dcnode-id="3073" instrument_node=""> (March 2017, universetoday.com)</span></li><li data-dcnode-id="3068"><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/news/2017-03-mission-titan.html"><span data-dcnode-id="3071" instrument_node="">What about a mission to Titan?</span></a><span data-dcnode-id="3069" instrument_node=""> (March 2017, phys.org)</span></li></ul></div></div></div></div></div></div></div></div></div><span data-dcnode-id="3057" instrument_node="">

</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="2740" data-react-style="{}"><div class="container" data-dcnode-id="2741"><div class="clearfix" data-dcnode-id="3008"><div class="columns sixteen" data-dcnode-id="3009"></div></div><div class="" data-dcnode-id="2742"><span data-dcnode-id="3007" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="2744"><div data-dcnode-id="2745"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="2746" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="2747"><div class="s-item-text-group" data-dcnode-id="2748"><div class="s-item-title" data-dcnode-id="3001"><div class="s-component s-text" data-dcnode-id="3002"><h3 class="" data-dcnode-id="3003"><div class="s-component-content s-font-heading" data-dcnode-id="3004"><h3 data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node=""> First, some cool facts about Titan! </span></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="2749"><div class="s-component s-text" data-dcnode-id="2750"><div class="" data-dcnode-id="2751"><div class="s-component-content s-font-body" data-dcnode-id="2752"><div class="s-item-text" data-dcnode-id="2755"><div class="s-component s-text" data-dcnode-id="2756"><div class="s-component-content s-font-body" data-dcnode-id="2757"><ul data-dcnode-id="2758"><li data-dcnode-id="2998"><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Titan was discovered in 1655 by the Dutch astronomer Christiaan Huygens. It was the 6th moon to be discovered, after Earth's Moon and the Galilean moons of Jupiter.</span></p></li><li data-dcnode-id="2995"><p data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Huygens named his discovery Saturni Luna (or Luna Saturni, Latin for "Saturn's moon").</span></p></li><li data-dcnode-id="2977"><p data-dcnode-id="2978"><span data-dcnode-id="2994" instrument_node="">The name </span><i data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Titan</span></i><span data-dcnode-id="2991" instrument_node="">, and the names of all 7 satellites of Saturn then known (62 known moons now), came from </span><a data-dcnode-id="2989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Herschel" title="John Herschel"><span data-dcnode-id="2990" instrument_node="">John Herschel</span></a><span data-dcnode-id="2988" instrument_node=""> in 1847. He suggested the names of the mythological </span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_%28mythology%29" title="Titan (mythology)"><span data-dcnode-id="2987" instrument_node="">Titans</span></a><span data-dcnode-id="2985" instrument_node="">, brothers and sisters of </span><a data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cronus" title="Cronus"><span data-dcnode-id="2984" instrument_node="">Cronus</span></a><span data-dcnode-id="2982" instrument_node="">, the Greek Saturn. In Greek mythology, the Titans were a race of powerful deities, descendants of Gaia and Uranus, that ruled during the legendary </span><a data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_Age" title="Golden Age"><span data-dcnode-id="2981" instrument_node="">Golden Age</span></a><span data-dcnode-id="2979" instrument_node="">.</span></p></li><li data-dcnode-id="2958"><span data-dcnode-id="2976" instrument_node="">Titan is </span><strong data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">the largest moon of Saturn </span></strong><span data-dcnode-id="2973" instrument_node="">with a </span><strong data-dcnode-id="2971"><span data-dcnode-id="2972" instrument_node="">diameter of 5151 km</span></strong><span data-dcnode-id="2970" instrument_node="">. By comparison, here is the diameter of :</span><ul data-dcnode-id="2959"><li data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Moon : 3474 km</span></li><li data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Mercury : 4879 km (yep, Titan is bigger than one of our planets !)</span></li><li data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Ganymede : 5268 km (it's a moon of Jupiter and the largest moon in the Solar System, Titan is second)</span></li><li data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Mars : 6779 km (so, not much smaller than Mars!!)</span></li><li data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">Earth : 12742 km</span></li></ul></li><li data-dcnode-id="2954"><span data-dcnode-id="2957" instrument_node="">It is </span><strong data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">the only moon in the Solar System known to have a dense atmosphere, 4.5 denser than the Earth atmosphere</span></strong></li><li data-dcnode-id="2934"><strong data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Its atmospheric pressure is the 2nd highest for a body with a surface in the Solar System (excluding the 4 gas giants), after Venus and before Earth.</span></strong><span data-dcnode-id="2951" instrument_node=""> Next in line is Mars with an atmospheric pressure of a mere 0.6% of Earth one ! (compared to 145% for Titan and 9200% for Venus)</span><ul data-dcnode-id="2935"><li data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">On Titan, you'd feel the same pressure on your skin as when at the bottom of a pool on Earth, below 5 meters of water</span></li><li data-dcnode-id="2936"><span data-dcnode-id="2948" instrument_node="">Warning : one should not confuse </span><strong data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">density of the air </span></strong><span data-dcnode-id="2945" instrument_node="">(calculated in kg of matter per cubic meter of air) and </span><strong data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">atmospheric pressure </span></strong><span data-dcnode-id="2942" instrument_node="">(calculated in Newton per square meter, as the weight of a column of air exerted on a given surface, at sea level for instance)</span><ul data-dcnode-id="2937"><li data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">Basically Titan air has much more matter per unit of volume than Earth (4.5 times roughly).</span></li><li data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">As for the atmospheric pressure, that is, the weight of a column of air on a surface, while Titan's air is denser, gravity is also weaker, 14% of that on Earth, so overall atmospheric pressure at ground level is "only" 1.45 times that of Earth at sea level</span></li></ul></li></ul></li><li data-dcnode-id="2930"><span data-dcnode-id="2933" instrument_node="">It is </span><strong data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">the only object in space other than Earth where clear evidence of stable bodies of surface liquid has been found.</span></strong></li><li data-dcnode-id="2922"><p data-dcnode-id="2923"><span data-dcnode-id="2929" instrument_node="">Titan orbits at 1.2 million km from Saturn, Saturn orbiting itself at </span><strong data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">1,5 billion km from the Sun</span></strong><span data-dcnode-id="2926" instrument_node="">. By comparison </span><strong data-dcnode-id="2924"><span data-dcnode-id="2925" instrument_node="">Earth and Mars orbits respectively at 150 million km and 225 million km from the Sun</span></strong></p></li><li data-dcnode-id="2917"><p data-dcnode-id="2918"><span data-dcnode-id="2921" instrument_node="">Saturn (and Titan) takes 30 years to orbit the Sun. </span><strong data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">So a year on Titan lasts 30 Earth years</span></strong></p></li><li data-dcnode-id="2913"><p data-dcnode-id="2914"><strong data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">A Titan day lasts 16 Earth days</span></strong></p></li><li data-dcnode-id="2908"><p data-dcnode-id="2909"><strong data-dcnode-id="2911"><span data-dcnode-id="2912" instrument_node="">Average temperature at the surface : −179.5 °C </span></strong><span data-dcnode-id="2910" instrument_node="">(yes it's cold, but it's not a show-stopper, see further below)</span></p></li><li data-dcnode-id="2893"><p data-dcnode-id="2904"><strong data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Atmospheric composition (troposphere ) : </span></strong><span data-dcnode-id="2905" instrument_node="">95% N2 (Nitrogen), 4.9% CH4 (Methane) and traces of H2 (Di-Hydrogen)</span></p><ul data-dcnode-id="2894"><li data-dcnode-id="2901"><p data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">On Earth : 78% nitrogen (N2), 20.95% oxygen (O2), 0.930% argon, 0.0402% carbon dioxide (CO2), and ~ 1% water vapor (climate-variable)</span></p></li><li data-dcnode-id="2895"><p data-dcnode-id="2896"><span data-dcnode-id="2900" instrument_node="">“If you press forward in time, and if the methane doesn't kept replenished, all of it will be transformed by photolysis and Titan will have a blue sky and a nitrogen atmosphere with sand dunes of hydrocarbons,” </span><a data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newscientist.com/article/dn19874-giant-ice-volcano-may-have-been-found-on-titan/"><span data-dcnode-id="2899" instrument_node="">said</span></a><span data-dcnode-id="2897" instrument_node=""> Jeffrey Moore from NASA’s Ames Research Center</span></p></li></ul></li><li data-dcnode-id="2889"><strong data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Titan's gravity is 14% of Earth gravity</span></strong><span data-dcnode-id="2890" instrument_node=""> (Moon is 16.5% and Mars 37.6%), meaning someone weighing 100 kg will feel on Titan what someone hypothetically weighing 14kg would feel on Earth.</span></li><li data-dcnode-id="2878"><strong data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">Titan has seasons due to its "obliquity" of 26.7°</span></strong><span data-dcnode-id="2886" instrument_node="">.</span><ul data-dcnode-id="2879"><li data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Planets and moons of the Saturn system orbit the Sun on the same plane because during the Solar System's formation, the planets formed out of a disk of dust which surrounded the Sun. Because that disk of dust was a disk, all in a plane, all of the planets formed in a plane as well.</span></li><li data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">The obliquity (or axial tilt) is the angle between an object's rotational axis and an imaginary axis that is perpendicular to the plane mentionned above.</span></li><li data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">The more tilted a celestial body is, the more variations there will be in the amount of sunlight received at its surface between different areas : at certain times some areas will receive more light than others (what we call summer!)</span></li></ul></li><li data-dcnode-id="2870"><span data-dcnode-id="2877" instrument_node="">Thanks to its atmosphere, </span><strong data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">Titan has weather</span></strong><span data-dcnode-id="2874" instrument_node=""> with a methane cycle of evaporation and condensation, leading to clouds, rains, rivers and seas ! Titan has </span><strong data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">long droughts and big storms </span></strong><span data-dcnode-id="2871" instrument_node="">!</span></li><li data-dcnode-id="2768"><strong data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Surface features </span></strong><span data-dcnode-id="2867" instrument_node="">:</span><ul data-dcnode-id="2769"><li data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">Please bear in mind that the smallest details we have of Titan's surface are hundreds of meters across, courtesy of the Cassini-Huygens mission</span></li><li data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">The crust is made of water ice as hard as rocks. Impacts though would melt the ice, mixing the hydrocarbons with liquid H2O for as long as tens of thousands of years. Where liquid water and the organic material on the surface mixed, complex pre-biotic chemistry likely occurred, making Titan a natural laboratory to explore the possible origins of life.</span></li><li data-dcnode-id="2848"><strong data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">At the equator, gigantic dunes sit atop the ice</span></strong><span data-dcnode-id="2860" instrument_node="">. Instead of being made of sand, the dunes are likely piles of complex organic compounds called hydrocarbons, more viscous than sand.</span><ul data-dcnode-id="2849"><li data-dcnode-id="2850"><strong data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Dunes cover 20% of Titan. Dunes can be hundreds of km long, 1-2 km wide, and 150 m high </span></strong><span data-dcnode-id="2857" instrument_node="">(read </span><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phys.org/news/2018-05-geological-titan-dunes.html"><span data-dcnode-id="2856" instrument_node="">New study details geological process behind Titan's dunes</span></a><span data-dcnode-id="2854" instrument_node="">, </span><strong data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Phys.org, May 2018</span></strong><span data-dcnode-id="2851" instrument_node="">)</span></li></ul></li><li data-dcnode-id="2834"><span data-dcnode-id="2847" instrument_node="">In the northern polar regions, </span><strong data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">there are 3 seas of methane-ethane</span></strong><span data-dcnode-id="2844" instrument_node=""> (exact split not well known) :</span><ul data-dcnode-id="2835"><li data-dcnode-id="2840"><strong data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Kraken Mare, 1,170 km long, </span></strong><span data-dcnode-id="2841" instrument_node="">with depths estimated at 300 m (named after The Kraken, Norse sea monster)</span></li><li data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Ligeia Mare, 500 km long, 160 m deep (named afterLigeia, one of the Sirens, Greek monsters)</span></li><li data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Punga Mare, 380 km long (named after Punga, Māori ancestor of sharks and lizards)</span></li></ul></li><li data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Dried sea beds. "The evaporation of the seas could have concentrated chemical reactions, and the present dry-to-moist surface would preserve the resulting material for Dragonfly’s instruments to sample. Several areas near the equator have been identified as possible dry sea beds."</span></li><li data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Hundreds of lakes</span></li><li data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Rivers</span></li><li data-dcnode-id="2811"><strong data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">Mountains </span></strong><span data-dcnode-id="2825" instrument_node="">:</span><ul data-dcnode-id="2812"><li data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">A mountain range measuring 150 kilometers (93 mi) long, 30 kilometers (19 mi) wide and 1.5 kilometers (0.93 mi) high was also discovered by Cassini in 2006. This range lies in the southern hemisphere and is thought to be composed of icy material and covered in methane snow</span></li><li data-dcnode-id="2819"><span data-dcnode-id="2822" instrument_node="">Most of Titan's highest peaks occur near its equator in so-called "ridge belts".</span><strong data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node=""> In 2016, the Cassini team announced what they believe to be the tallest mountain on Titan : located in the Mithrim Montes range, it is 3,337 m tall. </span></strong></li><li data-dcnode-id="2815"><span data-dcnode-id="2818" instrument_node="">Though "because Titan's icy mantle is less viscous than Earth's magma mantle, and because its icy bedrock is softer than Earth's granite bedrock, mountains are unlikely to reach heights as great as those on Earth" says </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_%28moon%29%23Cryovolcanism_and_mountains"><span data-dcnode-id="2817" instrument_node="">Wikipedia</span></a></li><li data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">According to JPL, "By convention, mountains on Titan are named for mountains from Middle-earth, the fictional setting in fantasy novels by J.R.R. Tolkien." Colles (collections of hills) are named for characters from the same Tolkien works.</span></li></ul></li><li data-dcnode-id="2770"><strong data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">Maybe cryvolcanoes</span></strong><span data-dcnode-id="2808" instrument_node=""> (</span><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_%28moon%29%23Cryovolcanism_and_mountains"><span data-dcnode-id="2807" instrument_node="">wikipedia</span></a><span data-dcnode-id="2805" instrument_node="">)</span><ul data-dcnode-id="2771"><li data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Though no volcanic features had been unambiguously identified on Titan so far.</span></li><li data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">If volcanism on Titan really exists, the hypothesis is that it is driven by energy released from the decay of radioactive elements within the mantle, as it is on Earth. Magma on Earth is made of liquid rock, which is less dense than the solid rocky crust through which it erupts. Because ice is less dense than water, Titan's watery magma would be denser than its solid icy crust. This means that cryovolcanism on Titan would require a large amount of additional energy to operate, possibly via tidal flexing from nearby Saturn.</span></li><li data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">The low-pressure ice, overlaying a liquid layer of ammonium sulfate, ascends buoyantly, and the unstable system can produce dramatic plume events. Titan is resurfaced through the process by grain-sized ice and ammonium sulfate ash, which helps produce a wind-shaped landscape and sand dune features.</span></li><li data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">In March 2009, structures resembling lava flows were announced in a region of Titan called Hotei Arcus, which appears to fluctuate in brightness over several months. Though many phenomena were suggested to explain this fluctuation, the lava flows were found to rise 200 meters (660 ft) above Titan's surface, consistent with it having been erupted from beneath the surface</span></li><li data-dcnode-id="2793"><a data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/jiD-NMq0pRE%3Ft%3D498"><span data-dcnode-id="2796" instrument_node="">Make sure to watch a few minutes of that video stopped at the right time</span></a><span data-dcnode-id="2794" instrument_node=""> to see what cryolava believed to be made of ammonia and water could look like</span></li><li data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Cryovolcanism on Titan could cause planetary protection issues if the lava were made of liquid water (mixed with other elements to keep it liquid), but at a probable -150°C, "it's well below the minimum temperature for Earth life. So it should be okay for forward contamination. There is some evidence that life can reproduce very slowly below -20 C. There is no sharp cut off, the colder it gets the longer the generation time until eventually it's millenia for the lifetime of a single microbe.. But at -150 C, no way." says Robert Walker</span></li><li data-dcnode-id="2772"><span data-dcnode-id="2790" instrument_node="">Read as well these articles from 2010 :</span><ul data-dcnode-id="2773"><li data-dcnode-id="2783"><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newscientist.com/article/dn19874-giant-ice-volcano-may-have-been-found-on-titan/"><span data-dcnode-id="2789" instrument_node="">Giant ice volcano may have been found on Titan</span></a><span data-dcnode-id="2787" instrument_node=""> (</span><strong data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">Newscientist.com</span></strong><span data-dcnode-id="2784" instrument_node="">)</span></li><li data-dcnode-id="2774"><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scientificamerican.com/article/titan-spews-discovery/"><span data-dcnode-id="2782" instrument_node="">Titan Spews: Discovery of Cold Volcanoes on Saturnian Moon May Solve Methane Mystery</span><br data-dcnode-id="2781"><span data-dcnode-id="2780" instrument_node="">Video taken by the Saturn-orbiting Cassini spacecraft reveals evidence of three volcanoes that appear to be gushing liquid water through the moon's icy surface. The activity could be a source replenishing the methane in Titan's atmosphere, which is broken down by sunlight</span></a><span data-dcnode-id="2778" instrument_node=""> (</span><strong data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Scientificamerican.com</span></strong><span data-dcnode-id="2775" instrument_node="">)</span></li></ul></li></ul></li></ul></li><li data-dcnode-id="2759"><span data-dcnode-id="2767" instrument_node="">Titan is even believed to have</span><b data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node=""> a global subsurface liquid water ocean</span></b><ul data-dcnode-id="2760"><li data-dcnode-id="2761"><span data-dcnode-id="2764" instrument_node="">The hidden ocean may be 60 to 120 miles (100 to 200 km) thick to be found below the surface ice crust estimated to be 30 to 90 miles (50 to 150 km) thick, Lorenz said. Beneath that may be a few hundred miles of a heavier form of ice "that you get at higher pressures," he explained, on top of a rocky core roughly 1,800 to 2,100 miles (3,000 km to 3,400 km) wide. </span><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/5151-evidence-ocean-saturn-moon-titan.html"><span data-dcnode-id="2763" instrument_node="">says Ralph Lorenz</span></a></li></ul></li></ul></div></div></div><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">&nbsp;</span></p></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2743" instrument_node="">
</span></div></div></div><span data-dcnode-id="2739" instrument_node="">
</span></div></li><li class="slide s-section-9" data-dcnode-id="2449" id="section-f_6454ced8-8d8e-4f66-b3ed-76635115a0cb"><div class="waypoint" data-dcnode-id="2736"></div><a class="section-anchor" data-dcnode-id="2735"></a><div data-dcnode-id="2450"><span data-dcnode-id="2734" instrument_node="">
</span><div class="lazyload s-no-bg s-new-text-section s-section s-text-section background-image" data-dcnode-id="2452" data-react-style="{}"><div class="container" data-dcnode-id="2453"><div class="clearfix" data-dcnode-id="2732"><div class="columns sixteen" data-dcnode-id="2733"></div></div><div class="" data-dcnode-id="2454"><span data-dcnode-id="2731" instrument_node="">
</span><div class="s-mh s-repeatable" data-dcnode-id="2456"><div data-dcnode-id="2457"><div class="sixteen columns no-float s-repeatable-item" data-dcnode-id="2458" data-sorting-index="0"><div class="s-mhi" data-dcnode-id="2459"><div class="s-item-text-group" data-dcnode-id="2460"><div class="s-item-title" data-dcnode-id="2725"><div class="s-component s-text" data-dcnode-id="2726"><h3 class="" data-dcnode-id="2727"><div class="s-component-content s-font-heading" data-dcnode-id="2728"><h3 data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node=""> The 15 reasons to colonize Titan </span></h3></div></h3></div></div><div class="s-item-text" data-dcnode-id="2461"><div class="s-component s-text" data-dcnode-id="2462"><div class="" data-dcnode-id="2463"><div class="s-component-content s-font-body" data-dcnode-id="2464"><div class="s-item-text" data-dcnode-id="2469"><div class="s-component s-text" data-dcnode-id="2470"><div class="s-component-content s-font-body" data-dcnode-id="2471"><div data-dcnode-id="2718"><span data-dcnode-id="2724" instrument_node="">As Robert Zubrin says in </span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Case-Space-Revolution-Spaceflight-Possibility/dp/1633885348" target="_blank"><span data-dcnode-id="2723" instrument_node="">The Case for Space</span></a><span data-dcnode-id="2721" instrument_node=""> : "</span><b data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">In certain ways, Titan is the most hospitable extraterrestrial world within our solar system for human colonization." </span></b></div><div data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">&nbsp;</span></div><div data-dcnode-id="2713"><b data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">Here below the top 15 reasons to settle Titan I could gather.</span></b></div><ul data-dcnode-id="2472"><li data-dcnode-id="2709"><strong data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">1. Titan surface is protected from harmful solar radiation and galactic cosmic rays thanks to its thick atmosphere </span></strong><span data-dcnode-id="2710" instrument_node="">(unlike Mars, meaning we can live on the surface, not buried underground, and can go out and walk on the surface much more often and for much longer than on Mars, which should help at the psychological level)</span></li><li data-dcnode-id="2702"><strong data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">2. </span></strong><span data-dcnode-id="2706" instrument_node="">Titan thick atmosphere (in the sense of more atoms of gas per cubic meter) also helps</span><strong data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node=""> protect from micrometeorites, </span></strong><span data-dcnode-id="2703" instrument_node="">even against large meteorites up to several meters across similarly to Earth's atmosphere (unlike on Mars where micrometeorites reach the ground and can damage habitats)</span></li><li data-dcnode-id="2698"><strong data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">3. Surface atmospheric pressure is 1.45 of Earth's, meaning we won't need to pressurize space suits nor habitats</span></strong><span data-dcnode-id="2699" instrument_node=""> (making building habitats and walking on the surface much more affordable and simple than on Mars)</span></li><li data-dcnode-id="2694"><strong data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">4. There is plenty of water available</span></strong><span data-dcnode-id="2695" instrument_node=""> (as land is actually made of water ice, not even counting the subsurface water ocean)</span></li><li data-dcnode-id="2684"><strong data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">5. There are many ways to get energy : </span></strong><span data-dcnode-id="2691" instrument_node="">wind, hydropower, solar, chemical (see </span><a data-dcnode-id="2689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/ftp/arxiv/papers/1707/1707.00365.pdf"><span data-dcnode-id="2690" instrument_node="">Energy Options for Future Humans on Titan</span></a><span data-dcnode-id="2688" instrument_node="">, june 2017, </span><strong data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">more details in next section</span></strong><span data-dcnode-id="2685" instrument_node="">)</span></li><li data-dcnode-id="2681"><strong data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">6. Oxygen can be made using water and energy</span></strong></li><li data-dcnode-id="2678"><strong data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">7. The water ice surface is covered with organic dust that can be used with energy to create plastic and build plenty of habitats. Low gravity is of further help here!</span></strong></li><li data-dcnode-id="2661"><strong data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">8. It's ideal for flight, including human powered flight </span></strong><span data-dcnode-id="2675" instrument_node="">(due to low gravity and thick atmosphere)</span><ul data-dcnode-id="2662"><li data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">That will make exploration of Titan way easier than on other bodies</span></li><li data-dcnode-id="2669"><span data-dcnode-id="2672" instrument_node="">"</span><strong data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Because of Titan's low gravity (it's about 14 percent of Earth normal) and dense atmosphere, you could jump off a high spot and use your coat to glide down. "Hang gliding would take on a whole new meaning," astrobiologist Chris McKay said</span></strong></li><li data-dcnode-id="2663"><span data-dcnode-id="2668" instrument_node="">See cartoon below</span><strong data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node=""> : </span></strong><a data-dcnode-id="2664" href="#titan-the-best-place-where-to-fly" target="_blank"><span data-dcnode-id="2665" instrument_node="">Titan, the best place where to fly in our Solar System</span></a></li></ul></li><li data-dcnode-id="2656"><span data-dcnode-id="2660" instrument_node="">9. Out of the 10 largest bodies with a surface in our Solar System, it's the easiest one where to land thanks to its low gravity and thick atmosphere. Conversely, Mars is the worst body where to land in the Solar System due to its rather high gravity and almost absent atmosphere, which got the Curiosity Rover landing nicknamed "The 7 Minutes of Terror" (</span><a data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DKi_Af_o9Q9s"><span data-dcnode-id="2659" instrument_node="">watch it here</span></a><span data-dcnode-id="2657" instrument_node="">)</span></li><li data-dcnode-id="2652"><strong data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">10. Nearby resources</span></strong><span data-dcnode-id="2653" instrument_node=""> (thanks to the many Saturnian moons)</span></li><li data-dcnode-id="2635"><strong data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">11. Billions of tons of easily accessible carbon, hydrogen, nitrogen, and oxygen</span></strong><span data-dcnode-id="2649" instrument_node="">.</span><ul data-dcnode-id="2636"><li data-dcnode-id="2641"><span data-dcnode-id="2648" instrument_node="">"By utilizing these elements together with heat and light from large-scale nuclear fusion reactors, adding seeds and some breeding pairs of livestock from Earth, </span><strong data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">a sizable agricultural base could be created within a protected biosphere on Titan</span></strong><span data-dcnode-id="2645" instrument_node="">." (Robert Zubrin, </span><a data-dcnode-id="2643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Case-Space-Revolution-Spaceflight-Possibility/dp/1633885348" target="_blank"><span data-dcnode-id="2644" instrument_node="">The Case For Space</span></a><span data-dcnode-id="2642" instrument_node="">, May 2019)</span></li><li data-dcnode-id="2637"><strong data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">"Saturn's largest moon possesses an abundance of all the elements necessary to support life."</span></strong><span data-dcnode-id="2638" instrument_node=""> says Robert Zubrin</span></li></ul></li><li data-dcnode-id="2561"><strong data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">12. Possibility to study potential Titan life</span></strong><span data-dcnode-id="2632" instrument_node=""> (without risk of harming it as it would be very different from Earth life, unlike with Mars)</span><ul data-dcnode-id="2562"><li data-dcnode-id="2624"><span data-dcnode-id="2631" instrument_node="">It has been suggested that life could exist in the lakes of liquid methane on Titan, just as organisms on Earth live in water. </span><strong data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Such organisms would inhale H2 in place of O2, metabolize it with acetylene (C2H2) instead of glucose (C6H12O6), and exhale methane (CH4) instead of carbon dioxide (CO2). A process called called hydrogenation</span></strong><span data-dcnode-id="2628" instrument_node="">.</span><ul data-dcnode-id="2625"><li data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Acetylene (C2H2) is a hydrocarbon, colorless gas is widely used as a fuel and a chemical building block. It is unstable in its pure form and thus is usually handled as a solution Pure acetylene is odorless.</span></li></ul></li><li data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">In 2005, astrobiologist Chris McKay argued that if methanogenic life did exist on the surface of Titan, it would likely have a measurable effect on the mixing ratio in the Titan troposphere: levels of hydrogen and acetylene would be measurably lower than otherwise expected</span></li><li data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">In 2010, Darrell Strobel, from Johns Hopkins University, identified a greater abundance of molecular hydrogen in the upper atmospheric layers of Titan compared to the lower layers, arguing for a downward flow at a rate of roughly 1028 molecules per second and disappearance of hydrogen near Titan's surface; as Strobel noted, his findings were in line with the effects McKay had predicted if methanogenic life-forms were present. The same year, another study showed low levels of acetylene on Titan's surface, which were interpreted by McKay as consistent with the hypothesis of organisms consuming hydrocarbons.</span></li><li data-dcnode-id="2609"><span data-dcnode-id="2619" instrument_node="">NASA researchers have</span><strong data-dcnode-id="2614"><span data-dcnode-id="2618" instrument_node=""> confirmed the existence in Titan’s atmosphere of vinyl cyanide, also known as </span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acrylonitrile"><span data-dcnode-id="2617" instrument_node="">acrylonitrile</span></a><span data-dcnode-id="2615" instrument_node="">. </span></strong><span data-dcnode-id="2613" instrument_node="">It's is an organic compound with the formula CH2CHCN</span><strong data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node=""> that could potentially provide the cellular membranes for microbial life to form in Titan’s vast methane oceans</span></strong><span data-dcnode-id="2610" instrument_node="">. If true, it could prove to us that life can flourish without the ubiquitous H2O.</span></li><li data-dcnode-id="2584"><span data-dcnode-id="2608" instrument_node="">Another key ingredient for life confirmed on Titan : long chains of carbon atoms that may be “universal drivers” for the chemistry that precedes life called </span><strong data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">a carbon chain anion. </span></strong><span data-dcnode-id="2605" instrument_node="">It appears to be a catalyst for complicated chemical reactions. (from </span><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/speaking-of-science/wp/2017/08/08/this-weird-moon-of-saturn-has-some-essential-ingredients-for-life/%3Futm_term%3D.4d0bce0561c8"><span data-dcnode-id="2604" instrument_node="">This weird moon of Saturn has some essential ingredients for life</span></a><span data-dcnode-id="2602" instrument_node="">, </span><strong data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Aug 2017, Washington Post</span></strong><span data-dcnode-id="2599" instrument_node="">)</span><ul data-dcnode-id="2585"><li data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Much the way lemon juice reacts with baking soda to make a cake rise, this anion, or negatively charged molecule, may trigger reactions that produce bigger organic molecules.</span></li><li data-dcnode-id="2592"><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">These molecules are associated with the creation of organic compounds in interstellar dust clouds and with the amino acids and other biological building blocks that have been detected on meteorites and comets.</span></p><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">The fact that similar chemistry occurs in Titan's clouds suggests that the creation of life's building blocks could be a “universal process,” Desai said, “with universal drivers behind it.”</span></p></li><li data-dcnode-id="2586"><p data-dcnode-id="2587"><span data-dcnode-id="2591" instrument_node="">Desai, a physicist at University College London, emphasized that you'd need several steps to get from carbon chain anions to actual living beings. In an absolute best-case scenario, these molecules would trigger the reaction of bigger organic compounds, which are then combined into amino acids, which build proteins, which are an essential ingredient for cells. Scientists don't yet have proof that all those steps are happening on Saturn's moon. But they do know that Titan's atmosphere contains a wealth of large organic compounds — rings and chains of hydrogen, carbon and nitrogen, some of them hundreds of atoms long, that emerge as you drift down toward the surface. And Hörst has </span><a data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3444770/"><span data-dcnode-id="2590" instrument_node="">performed experiments in her lab here on Earth</span></a><span data-dcnode-id="2588" instrument_node=""> showing that amino acids and nucleotides (the basic units of DNA) can be concocted from the chemical broth of the moon's haze.</span></p></li></ul></li><li data-dcnode-id="2574"><span data-dcnode-id="2583" instrument_node="">The chance to discover a form of life with a different chemical basis than life on Earth has led </span><strong data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">some researchers to consider Titan the most important world on which to search for extraterrestrial life</span></strong><span data-dcnode-id="2580" instrument_node="">. </span><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19355818"><span data-dcnode-id="2579" instrument_node="">In a paper</span></a><span data-dcnode-id="2577" instrument_node=""> in the journal Astrobiology, Robert Shapiro, a professor of chemistry at New York University, and Dirk Shulze-Makuch of Washington State University</span><strong data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node=""> rated Titan a higher-priority target for investigation than even Mars.</span></strong></li><li data-dcnode-id="2568"><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nap.edu/catalog.php%3Frecord_id%3D11919" target="_blank"><span data-dcnode-id="2573" instrument_node="">A National Academy of Sciences study panel</span></a><span data-dcnode-id="2571" instrument_node=""> concluded that “the environment of Titan meets the absolute requirements for life, which include thermodynamic disequilibrium, abundant carbon-containing molecules and heteroatoms (atoms other than carbon and hydrogen), and a fluid environment…” The panel report further stated that “this makes inescapable the conclusion that </span><strong data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">if life is an intrinsic property of chemical reactivity, life should exist on Titan.”</span></strong></li><li data-dcnode-id="2563"><span data-dcnode-id="2567" instrument_node="">Here is NASA's 5-year plan to study </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nai.nasa.gov/teams/can-8/jpl-titan/"><span data-dcnode-id="2566" instrument_node="">Habitability of Hydrocarbon Worlds: Titan and Beyond 05/2018 - 04/202</span></a><span data-dcnode-id="2564" instrument_node=""> (Make sure to click to see the great illustration of Titan's different crust layers)</span></li></ul></li><li data-dcnode-id="2550"><strong data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">13. It's arguably the cheapest place beyond Earth where to go and build a settlement (</span></strong><span data-dcnode-id="2558" instrument_node="">once you include cost of building habitats, as this will be cheaper than anywhere else thanks to the thick atmosphere and not having to pressurize habitats, same for suits to wear to go outside)</span><ul data-dcnode-id="2551"><li data-dcnode-id="2552"><p data-dcnode-id="2553"><span data-dcnode-id="2557" instrument_node="">"We would build large enclosed habitats - and there are no strong winds on the surface at all, only a light breeze, the winds are higher up, and stable geologically - so in the low gravity and with equal pressure inside and out you could paraterraform areas of Titan more easily than anywhere else in the solar system and with all that wind power you have plenty of power for the lighting and to keep it warm. </span><strong data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">It would be easier to enclose large areas than it is to do that on Earth." </span></strong><span data-dcnode-id="2554" instrument_node="">says Robert Walker</span></p></li></ul></li><li data-dcnode-id="2488"><strong data-dcnode-id="2545"><span data-dcnode-id="2549" instrument_node="">14. Titan would be a great base "to support the Saturnian He3 acquisition operations." (quoting Robert Zubrin's fascinating</span><a data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Case-Space-Revolution-Spaceflight-Possibility/dp/1633885348" target="_blank"><span data-dcnode-id="2548" instrument_node=""> Case for Space</span></a><span data-dcnode-id="2546" instrument_node=""> below)</span></strong><ul data-dcnode-id="2489"><li data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">"Aside from antimatter, which doesn't exist naturally in the habitable portions of the universe, Deuterium-Helium 3 (D-He3) fuel has the highest energy/mass ratio </span><em data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">(what we call enthalpy)</span></em><span data-dcnode-id="2541" instrument_node=""> of any substance known and, further, in space the vacuum that the reaction needs to run in can be had for free in any size desired."</span></li><li data-dcnode-id="2535"><span data-dcnode-id="2539" instrument_node="">"If used as a the fuel for a fusion rocket, the D-He3 reaction could produce exhaust velocities as high as 5% of the speed of light. </span><em data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">(the exhaust velocity is the velocity, relative to a rocket, at which exhaust gases leave the nozzle of the rocket's engine</span></em><span data-dcnode-id="2536" instrument_node="">). Since rockets can generally be designed to achieve speeds ot twice their exhaust velocities, this means that a D-He3 rocket could reach 10% of the speed of light speed, making travel to nearby stars possible on timesecales of four to six decades."</span></li><li data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">"Although the thrust level of such a pure D-He3 rocket would be too low for in-system travel, the terrific exhaust velocity would make possible voyages to nearby stars with trip times of less than a century."</span></li><li data-dcnode-id="2524"><span data-dcnode-id="2532" instrument_node="">Humans consumed energy at a power of 15 Terawatts in 2000. Assuming a yearly growth of our energy consumption of 2,6%, if we tally up the energy consumed after 2000:</span><ul data-dcnode-id="2525"><li data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">by 2050 we'd have consumed 1,500 TW-years,</span></li><li data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">by 2100, we'd have consumed 7,000 TW-years</span></li><li data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">by 2200, we'd have consumed close to 100,000 TW-years.</span></li></ul></li><li data-dcnode-id="2516"><span data-dcnode-id="2523" instrument_node="">To get an idea, </span><strong data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">known and estimated unknown terrestrial fossil fuels amount to 10,000 TW-years</span></strong><span data-dcnode-id="2520" instrument_node="">, while </span><strong data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">resources for nuclear fission (with or without breeder reactors) amount to 22,300 TW-years</span></strong><span data-dcnode-id="2517" instrument_node="">.</span></li><li data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Fusion energy using all lunar He3 would amount to 10,000 TW-years</span></li><li data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Fusion energy using all Jupiter He3 (down to a depth where the pressure is ten times that of the Earth's at sea level) would yield 5,600,000,000 TW-years</span></li><li data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Fusion energy using all Saturn He3 (same assumption as above) would yield 3,040,000,000 TW-years</span></li><li data-dcnode-id="2503"><span data-dcnode-id="2509" instrument_node="">But </span><strong data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Jupiter's enormous gravitational field makes extracting its atmospheric helium-3 supplies extremely difficult. Another problem facing the development of Jupiter is its extremely powerful radiation belts, within which many of its moons orbit. </span></strong><span data-dcnode-id="2506" instrument_node="">On Europa and all moons further in, fatal doses would be administered to unshielded humans within a single day.</span><strong data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node=""> </span></strong></li><li data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">"As Saturn is the closest of the outer planets whose He3 supplies are accessible to extraction, it will most likely be the first of the outer planets to be developed."</span></li><li data-dcnode-id="2490"><span data-dcnode-id="2500" instrument_node="">To see in details how we would extract He3 from Sarturn's atmosphere using what Robert Zubrin calls Nuclear Indigenous Fueled Transatmospheric vehicles, or NIFT, please read his book </span><em data-dcnode-id="2497"><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Case-Space-Revolution-Spaceflight-Possibility/dp/1633885348" target="_blank"><span data-dcnode-id="2499" instrument_node="">The Case for Space : How the Revolution in Spaceflight Opens Up a Future of Limitless Possibility</span></a></em><span data-dcnode-id="2496" instrument_node="">, in particular the parts "</span><strong data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">The Persian Gulf of the Solar System", "The Sources of power", "Titan" and "Colonizing the Jovian Moons" </span></strong><span data-dcnode-id="2493" instrument_node="">from chapter 6 </span><strong data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">"The Outer Worlds"</span></strong></li></ul></li><li data-dcnode-id="2473"><strong data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">15. As a bonus, for the view of Saturn in Titan sky</span></strong><span data-dcnode-id="2485" instrument_node="">, which will look on average approximately 10 times bigger than the Moon for us from Earth</span><ul data-dcnode-id="2474"><li data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Please note that Titan is tidally locked to Saturn, so it always shows the same face to Saturn. So Saturn won't be seen from all over Titan, and from the places where it can be seen, it will always appear in the same place in the sky.</span></li><li data-dcnode-id="2475"><span data-dcnode-id="2482" instrument_node="">A full Saturn, seen at night from Titan equator, is estimated to be 3 times less bright than a full Moon seen from the Earth</span><ul data-dcnode-id="2476"><li data-dcnode-id="2477"><span data-dcnode-id="2481" instrument_node="">The calculation : Saturn gets 1/100 of the light the Moon gets from the Sun (because it's 10 times further from the Sun (and light received decrease with square of distance), but Saturn has an apparent radius in the sky from Titan that is 10 times larger than for the Moon from Earth, meaning the apparent sur
