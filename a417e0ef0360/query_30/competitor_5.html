</span><h3 data-dcnode-id="10641" style="font-family: &quot;Myriad Pro&quot;, Helvetica, Arial, sans-serif; color: rgb(51, 51, 51);"><span data-dcnode-id="10642" instrument_node="">
	Admission requirements</span></h3><span data-dcnode-id="10640" instrument_node="">
</span><p data-dcnode-id="10635"><span data-dcnode-id="10639" instrument_node="">
</span><span data-dcnode-id="10636" style="color:#800080;"><strong data-dcnode-id="10637"><span data-dcnode-id="10638" instrument_node="">Please note that the below admission requirements are subject to change pending selection and possible faculty-specific requirements.</span></strong></span></p><span data-dcnode-id="10634" instrument_node="">
</span><p data-dcnode-id="10629"><span data-dcnode-id="10633" instrument_node="">
	Study information is subject to change and is a summary of the general fields of study. This information was compiled for introduction and orientation purposes and the North-West University accepts no liability for inaccuracies that may occur in this guide. The official yearbook of the University must in all cases be consulted during the process of compiling a programme for a specific field of study. The appropriate yearbook is available on request at: </span><a data-dcnode-id="10631" href="mailto:studies@mynwu.info"><span data-dcnode-id="10632" instrument_node="">studies@mynwu.info</span></a><span data-dcnode-id="10630" instrument_node=""> / 018 285 4320.</span></p><span data-dcnode-id="10628" instrument_node="">
</span><p data-dcnode-id="10626"><span data-dcnode-id="10627" instrument_node="">
	Please note that, owing to specific capacity constraints, the University reserves the right to select candidates for admission to certain fields of study. This means that prospective students who comply with the minimum requirements will not automatically be admitted to the courses in question. Because of the capacity limitations and the high demand from students for admission to particular fields of study, students will be selected on the basis of their Grade 12 results for admission to these fields.</span></p><span data-dcnode-id="10625" instrument_node="">
</span><p data-dcnode-id="10623"><span data-dcnode-id="10624" instrument_node="">
</span></p><div class="jquery-ui-filter jquery-ui-filter-accordion jquery-ui-filter-accordion-collapsed jquery-ui-filter-accordion-processed ui-accordion ui-widget ui-helper-reset" data-dcnode-id="175" id="jquery-ui-filter" role="tablist"><p data-dcnode-id="10622"></p><span data-dcnode-id="10621" instrument_node="">

</span><p data-dcnode-id="6736" style="margin-left:11.35pt;"><span data-dcnode-id="6740" instrument_node="">
</span><strong data-dcnode-id="6738"><span data-dcnode-id="6739" instrument_node="">Chemical Engineers </span></strong><span data-dcnode-id="6737" instrument_node="">are involved in the research, design, development and management of industrial processes where raw materials are converted to products with higher economic value. For instance, turn corn to cornflakes, hops to beer, coal to petrol and algae to electricity.&nbsp; The chemical industry is one of the greatest gross domestic product contributors in South Africa. Chemical engineering is one of the top 10 scarce skills in South Africa.</span></p><span data-dcnode-id="6735" instrument_node="">
</span><p data-dcnode-id="6728" style="margin-left:11.35pt;"><span data-dcnode-id="6734" instrument_node="">
</span><strong data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">Electrical and Electronic Engineers </span></strong><span data-dcnode-id="6731" instrument_node="">enable the modern world by moving electrical energy from the source to the point of application. They do this as efficiently as possible, by applying their knowledge of power systems, power conversion, power conditioning, and electrical machines. Training provided by leading experts in power quality, power electronics and electrical machines, sets NWU Electrical and Electronic Engineers apart in industry. Our engineers thrive in power utilities and electrical consulting industries and relate well to the challenges of utilizing renewable energy sources as part of the energy solution of the future. </span><strong data-dcnode-id="6729"><span data-dcnode-id="6730" instrument_node="">Electrical and Electronic engineering is the number one scarce skill in South Africa.</span></strong></p><span data-dcnode-id="6727" instrument_node="">
</span><p data-dcnode-id="6725" style="margin-left:11.35pt;"><span data-dcnode-id="6726" instrument_node="">

</span><li data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">

</span></ul><p data-dcnode-id="6689" style="margin-left:11.35pt;"><span data-dcnode-id="6695" instrument_node="">
</span><strong data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">Computer and electronic engineers </span></strong><span data-dcnode-id="6692" instrument_node="">make the world a more efficient place by connecting humans and the world we live in, to the digital world of computer systems and the internet. They do this by using electronics, embedded computers and the skill of programming to control mechatronic systems and to build the internet. </span><strong data-dcnode-id="6690"><span data-dcnode-id="6691" instrument_node="">Computer and electronic engineering is the number one scarce skill in South Africa.</span></strong></p><span data-dcnode-id="6688" instrument_node="">
</span><p data-dcnode-id="6686" style="margin-left:11.35pt;"><span data-dcnode-id="6687" instrument_node="">

</span><strong data-dcnode-id="6654"><span data-dcnode-id="6655" instrument_node="">Electromechanical engineers </span></strong><span data-dcnode-id="6653" instrument_node="">ensure the safe and efficient operations of plants and factories by combining elements of electrical and mechanical engineering. Their knowledge of electrical machines, power electronics, strength of materials and heating, ventilation and air-conditioning systems, together with legal knowledge with respect to occupational health and safety make them invaluable to industry. </span><strong data-dcnode-id="6651"><span data-dcnode-id="6652" instrument_node="">Electromechanical engineering is under the top 10 scarce skills in South Africa.</span></strong></p><span data-dcnode-id="6649" instrument_node="">
</span><p data-dcnode-id="6647" style="margin-left:11.35pt;"><span data-dcnode-id="6648" instrument_node="">
					Any mine or manufacturer in South Africa and abroad will greatly benefit from your skills.</span></p><span data-dcnode-id="6646" instrument_node="">
</span><p data-dcnode-id="6639" style="margin-left:11.35pt;"><span data-dcnode-id="6645" instrument_node="">
</span><strong data-dcnode-id="6643"><span data-dcnode-id="6644" instrument_node="">Mechanical Engineers </span></strong><span data-dcnode-id="6642" instrument_node="">are involved with the development, manufacturing, management and maintenance of transport, energy conversion, manufacturing, generator, weapon and cooling and heating systems, as well as industry installations, process equipment, manufacturing machinery and mining equipment. </span><strong data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node="">(Nuclear Engineers (post grad studies) design systems that utilizes nuclear processes for energy.) Mechanical and nuclear engineering is under the top 3 scarce skills in South Africa.</span></strong></p><span data-dcnode-id="6638" instrument_node="">
</span><p data-dcnode-id="6636" style="margin-left:11.35pt;"><span data-dcnode-id="6637" instrument_node="">
					As a mechanical engineer you will work in South Africa or abroad in the following industries:</span></p><span data-dcnode-id="6635" instrument_node="">

</span><strong data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">Industrial Engineers </span></strong><span data-dcnode-id="6606" instrument_node="">enable people, technology, information, materials, methods and money to work together productively and effectively. Industrial Engineering originated more than a century ago from the industrial revolution when industries started to search for the best, cheapest and fastest way to manufacture products. However, today it is imperative to employ Industrial Engineers in various industries due to advancements in technology and the current demand of the market place.</span><strong data-dcnode-id="6604"><span data-dcnode-id="6605" instrument_node=""> Industrial engineering is under the top 10 scarce skills in South Africa.</span></strong></p><span data-dcnode-id="6602" instrument_node="">
</span><p data-dcnode-id="6600" style="margin-left:11.35pt;"><span data-dcnode-id="6601" instrument_node="">

</span><strong data-dcnode-id="6568"><span data-dcnode-id="6569" instrument_node="">Mechatronic Engineers</span></strong><span data-dcnode-id="6567" instrument_node=""> develop and support the advanced industrial automation systems of the future that make use of the internet of things. They accomplish this by combining knowledge of electronics, measurement and actuation, embedded systems and control theory to control mechanical structures and mechanisms. Their knowledge of computer programming and data analytics allow them to develop intelligent and effective mechatronic systems.</span></p><span data-dcnode-id="6565" instrument_node="">

</span><strong data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">HEQSF alignment</span></strong></p><span data-dcnode-id="165" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">
	All universities in South Africa&nbsp;were obligated by law&nbsp;to&nbsp;take part in&nbsp;a National Project driven by the regulatory bodies (Department of Higher Education and Training (DHET), the Council on Higher Education (CHE) and the South African Qualifications Authority (SAQA), to align all qualifications with the Higher Education Qualification Sub Framework (HEQSF). The NWU is thus currently in an ongoing process of aligning&nbsp;our qualification and programme offering with&nbsp;the&nbsp;requirements&nbsp;of&nbsp;the HEQSF.</span></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="156"><span data-dcnode-id="161" instrument_node="">
</span><br data-dcnode-id="160"><span data-dcnode-id="159" instrument_node="">
	Prospective&nbsp;students must take notice&nbsp;of the fact that NWU qualification names, programme names as well as the composition of curricula&nbsp;may change due to the&nbsp;HEQSF Project,&nbsp;prior to registration for the 2022 academic year.&nbsp;</span><br data-dcnode-id="158"><span data-dcnode-id="157" instrument_node="">
	Successful candidates&nbsp;are advised to contact the relevant faculty&nbsp;to ensure that they register for the correct qualification, programme and /or curriculum.</span></p><span data-dcnode-id="155" instrument_node="">
