</span><article class="post-150172 post type-post status-publish format-standard has-post-thumbnail hentry category-om category-international category-fuel category-plant-design category-news tag-regulations tag-code tag-standards tag-diesel-fuel tag-storage-tanks tag-above-ground-tank publications-features publications-power wpautop" data-dcnode-id="1147" data-title="Understanding Diesel Fuel Storage Requirements" data-url="https://www.powermag.com/understanding-diesel-fuel-storage-requirements/" id="post-15017224-26"><span data-dcnode-id="1485" instrument_node="">

</span><header class="entry-header" data-dcnode-id="1474"><span data-dcnode-id="1481" instrument_node="">
</span><a class="entry-header__category" data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powermag.com/category/om/"><span data-dcnode-id="1480" instrument_node="">O&amp;M</span></a><span data-dcnode-id="1478" instrument_node="">
</span><h1 class="text-left" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Understanding Diesel Fuel Storage Requirements</span></h1><span data-dcnode-id="1475" instrument_node="">
</span></header><span data-dcnode-id="1472" instrument_node="">
</span></div><span data-dcnode-id="1470" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1223" style=""><span data-dcnode-id="1469" instrument_node="">
</span><div class="wrap" data-dcnode-id="1226"><span data-dcnode-id="1468" instrument_node="">
</span><div class="main-content" data-dcnode-id="1229"><span data-dcnode-id="1467" instrument_node="">
</span><div class="article-main" data-dcnode-id="1231"><span data-dcnode-id="1466" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="1465" data-url="https://www.powermag.com/understanding-diesel-fuel-storage-requirements/"></div><p data-dcnode-id="1461"><em data-dcnode-id="1462"><strong data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Liquid fuel storage requirements are based on fuel type, usage, and whether the fuel is “combustible” or “flammable” as assessed by the fuel flash point. This article presents information on applicable design standards for diesel storage tanks, including sizing and installation best practices. In addition, it explains how diesel fuel blending affects its classification and tank vent design.</span></strong></em></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Diesel-fueled generators (gensets) are used for primary power at many electricity generating stations. Furthermore, emergency and standby diesel units are relied upon at many more sites, including coal and nuclear power plants, as well as industrial, commercial, medical, and educational facilities (Figure 1). This means that diesel fuel is stored almost everywhere power is generated.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><span data-dcnode-id="1456" instrument_node="">
</span><span data-dcnode-id="1455" instrument_node="">
</span><span data-dcnode-id="1454" instrument_node="">
</span><span data-dcnode-id="1451" instrument_node="">
</span><span data-dcnode-id="1449" instrument_node="">
</span><span data-dcnode-id="1448" instrument_node="">
</span><span data-dcnode-id="1441" instrument_node="">
</span><span data-dcnode-id="1439" instrument_node="">
</span><span data-dcnode-id="1437" instrument_node="">
</span><table data-dcnode-id="1436"><tbody data-dcnode-id="1438"><tr data-dcnode-id="1450"><td data-dcnode-id="1452"><img alt="" class="alignnone size-full wp-image-150265" data-dcnode-id="1453" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powermag.com/wp-content/uploads/2020/04/fig1-diesel-gen-set.jpg&amp;raw" srcset="https://www.powermag.com/wp-content/uploads/2020/04/fig1-diesel-gen-set.jpg 600w, https://www.powermag.com/wp-content/uploads/2020/04/fig1-diesel-gen-set-300x225.jpg 300w" width="600"></td></tr><tr data-dcnode-id="1440"><td data-dcnode-id="1442"><span data-dcnode-id="1447" instrument_node="">
</span><p class="p1" data-dcnode-id="1444"><i data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">1. Diesel-fueled generators are regularly used to supply emergency power for commercial, industrial, medical, and educational facilities. They are also used at power plants to provide standby power and black-start capability. Courtesy: TAI Engineering</span></i></p><span data-dcnode-id="1443" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1434" instrument_node="">While it may seem simple to fill a tank with diesel fuel, there are detailed storage requirements outlined in several codes and standards, including the National Fire Protection Association’s NFPA 30 </span><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D30" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Flammable and Combustible Liquids Code</span></em></a><span data-dcnode-id="1430" instrument_node=""> and NFPA 110 </span><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nfpa.org/codes-and-standards/all-codes-and-standards/list-of-codes-and-standards/detail%3Fcode%3D110" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Standard for Emergency and Standby Power Systems</span></em></a><span data-dcnode-id="1426" instrument_node="">. There are also a number of best practices for designing safe and reliable diesel fuel storage systems.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><h2 data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Diesel Generator Sets</span></h2><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">A basic diesel-fueled genset includes a diesel engine and an electric generator. The mechanical energy provided by the diesel engine turns the generator rotor to produce power in the generator stator windings. The diesel engine itself is an internal combustion engine with various subsystems such as the cooling system, starting system, speed control system, lubrication system, and the fuel system.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">The genset typically has a control panel, which is fitted with switches and gauges to operate the generator, such as the start-shutdown controls. In addition, it provides a set of displays for various parameters such as voltage, current, and frequency. The control panel can also include functions to monitor engine parameters such as temperature, speed, oil pressure, and more. The microprocessor within the control panel can be programmed to sense the engine parameters and take corrective action, including engine shutdown.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><div class="" data-dcnode-id="1411" id="dfp-nativeunit3" style="margin-top: 2.5em; margin-bottom: 2.5em; width: 100%;"><span data-dcnode-id="1414" instrument_node="">
</span><span data-dcnode-id="1412" instrument_node="">
</span></div><span data-dcnode-id="1410" instrument_node="">
</span><span data-dcnode-id="1407" instrument_node="">
</span><h2 data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Diesel Fuel System</span></h2><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">In many diesel gensets, an engine-driven fuel pump provides fuel to the fuel injectors via a fuel filter for combustion in the cylinder. The fuel injector is a precision component and has the capability of pumping, metering, and injecting the correct amount of fuel in the combustion chamber. Fuel continually flows in the supply line to the injectors and the excess fuel is returned to the fuel tank through a pressure regulator. The pressure regulator ensures that correct fuel pressure is maintained at the inlet to the injectors.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Another fuel system design utilizes a slightly different arrangement, with the fuel injection pressure being created external to the unit injectors by means of a high-pressure fuel pump. In this arrangement, fuel is not continually circulated through the supply line. Instead, a small amount of fuel is bypassed during fuel injection and this bypassed fuel is returned to the fuel tank. Due to high pressure in the fuel supply, the fuel temperature increases, and the bypassed amount is therefore passed through a cooler before it is returned to the fuel tank.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Diesel fuel temperature must be controlled to a maximum of 66C (150.8F) to ensure that injectors do not plug due to coking and to maintain the fuel viscosity within prescribed limits. Similarly, for cold-weather applications, fuel heaters are required to maintain fuel viscosity and prevent injector plugging due to wax formation.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><h2 data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Diesel Fuel Storage and Supply</span></h2><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">According to NFPA 30, storage requirements are based on whether the liquid fuel is “combustible” or “flammable” as assessed by the fuel flash point. The fuel flash point is the lowest temperature at which the fuel will ignite in the presence of an ignition source. NFPA 30 defines combustible liquids as having a flash point equal to or greater than 100F (37.8C) and flammable liquids as having a flash point less than 100F (37.8C).</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">The flash point of conventional diesel fuel typically ranges between 126F and 204F (52.2C and 95.5C). Therefore, diesel fuel is considered a combustible liquid. It is further classified as Class II if the flash point is less than 140F or Class III if flash point is greater than 140F, depending on the specific fuel.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">However, it is important to note that when diesel fuel is blended with ethanol (E-diesel) to reduce emissions, the blended diesel fuel has a low flash point of about 68F (20C). The blended fuel is therefore considered a flammable liquid, requiring management of associated fire and explosion hazards. For simplicity, this article considers only conventional diesel fuel.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><span data-dcnode-id="1382" instrument_node="">
</span><span data-dcnode-id="1381" instrument_node="">
</span><span data-dcnode-id="1380" instrument_node="">
</span><span data-dcnode-id="1347" instrument_node="">
</span><span data-dcnode-id="1345" instrument_node="">
</span><span data-dcnode-id="1343" instrument_node="">
</span><table data-dcnode-id="1342" style="background-color: #d3d2c4;"><tbody data-dcnode-id="1344"><tr data-dcnode-id="1346"><td data-dcnode-id="1348"><span data-dcnode-id="1379" instrument_node="">
</span><p class="p1" data-dcnode-id="1375"><span class="s1" data-dcnode-id="1376"><b data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Biodiesel Clarification</span></b></span></p><span data-dcnode-id="1374" instrument_node="">
</span><p class="p1" data-dcnode-id="1366"><span data-dcnode-id="1373" instrument_node="">In the original article published in the April 2020 issue of </span><i data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">POWER</span></i><span data-dcnode-id="1370" instrument_node="">, diesel fuel blended with ethanol was incorrectly referred to as “biodiesel.” Whereas, the conventional name for ethanol-blended diesel fuel is “E-diesel.” The wording was changed in this online version of the article on April 2, 2020. The following clarification was also published in the June 2020 issue of </span><i data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">POWER</span></i><span data-dcnode-id="1367" instrument_node=""> magazine.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p class="p2" data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">According to a spokesperson for the National Biodiesel Board, “blending ethanol into diesel fuel creates an off-spec fuel according to the ASTM D975 specifications for diesel fuel.” The spokesperson said biodiesel is “a clean-burning alternative to diesel fuel” produced from a broad range of renewable resources including soybean oil, animal fats, and recycled cooking oil. Biodiesel can be used alone or blended with petroleum diesel.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p class="p2" data-dcnode-id="1359"><span class="s1" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">“Fuel-grade biodiesel must be produced to strict industry specifications in order to ensure proper performance. Biodiesel blends meet specifications for legal diesel motor fuel (ASTM D7467). Also, B100 (100 percent biodiesel blend) must meet the ASTM definition for biodiesel itself (ASTM D6751),” the spokesperson said.</span></span></p><span data-dcnode-id="1358" instrument_node="">
</span><p class="p2" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Biodiesel’s flash point is greater than 200F, well above petroleum-based diesel fuel’s flash point of about 125F. “Testing has shown the flash point of biodiesel blends increases as the percentage of biodiesel increases. Therefore, biodiesel and blends of biodiesel with petroleum diesel are safer to store, handle, and use than conventional diesel fuel,” the spokesperson added.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p class="p2" data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node="">However, John Fischer, an engine consultant from Palatine, Illinois, in an email to </span><i data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">POWER</span></i><span data-dcnode-id="1351" instrument_node=""> wrote, “One would be cautioned against the use of biodiesel for the type of application (prime or emergency/standby power) addressed in the article. Because the significant quantity of fuel onsite is seldom consumed quickly and having a ‘food’ sort of aspect—biodiesel will deteriorate more quickly than standard (100%) petroleum diesel. And there is enough to worry about in keeping ‘standard’ diesel clean and water-free.”</span></p><span data-dcnode-id="1349" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1337"><strong data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Sizing the Bulk Diesel Storage Tank</span></strong><span data-dcnode-id="1338" instrument_node="">. The size of a bulk diesel storage tank can depend on a number of factors, including the classification of the emergency power supply system (EPSS) in some applications. The classification is defined in NFPA 110 as the “minimum time in hours, for which the EPSS is designed to operate at its rated load without being refueled or recharged.” For example, a Class 48 EPSS is expected to operate at its rated load for at least 48 hours without refilling the bulk tank. If the rated load consumes 450 liters per hour, the bulk tank should be able to provide 48 hours x 450 liters per hour = 21,600 liters of fuel.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Additionally, NFPA 110 requires the actual size of the bulk tank to be at least 133% of the quantity established by the EPSS class (or the corresponding low-fuel sensor quantity). In addition, the bulk tank should have 5% spare volume above the maximum liquid level, if it is to comply with EN 12285—the European standard.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">The bulk fuel storage capacity of 133% provides the ability to test run the emergency diesel for maintenance purposes several times before the tank requires refilling. The tank refilling cycle should be such that the fuel inventory does not drop below the minimum level based on the EPSS classification per NFPA 110.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1326"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Bulk Diesel Storage Tank Installation.</span></strong><span data-dcnode-id="1327" instrument_node=""> Bulk tanks can be installed above ground, within a storage tank vault, underground (direct buried), or within a storage tank building.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Above-ground tanks (Figure 2) must be provided with emergency relief venting that will release internal pressure, if the tank is exposed to fire. Means for spill control shall also be provided for above-ground tanks.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><span data-dcnode-id="1321" instrument_node="">
</span><span data-dcnode-id="1320" instrument_node="">
</span><span data-dcnode-id="1319" instrument_node="">
</span><span data-dcnode-id="1316" instrument_node="">
</span><span data-dcnode-id="1314" instrument_node="">
</span><span data-dcnode-id="1313" instrument_node="">
</span><span data-dcnode-id="1306" instrument_node="">
</span><span data-dcnode-id="1304" instrument_node="">
</span><span data-dcnode-id="1302" instrument_node="">
</span><table data-dcnode-id="1301"><tbody data-dcnode-id="1303"><tr data-dcnode-id="1315"><td data-dcnode-id="1317"><img alt="" class="alignnone size-full wp-image-150267" data-dcnode-id="1318" height="450" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.powermag.com/wp-content/uploads/2020/04/fig2-diesel-fuel-storage-tank.jpg&amp;raw" srcset="https://www.powermag.com/wp-content/uploads/2020/04/fig2-diesel-fuel-storage-tank.jpg 600w, https://www.powermag.com/wp-content/uploads/2020/04/fig2-diesel-fuel-storage-tank-300x225.jpg 300w" width="600"></td></tr><tr data-dcnode-id="1305"><td data-dcnode-id="1307"><span data-dcnode-id="1312" instrument_node="">
</span><p class="p1" data-dcnode-id="1309"><i data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">2. An above-ground, secondary containment-type, double-wall tank for spill control is shown here located away from property lines. Courtesy: Pxfuel</span></i></p><span data-dcnode-id="1308" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Tanks listed as “above-ground tanks” can be installed within a vault, and the vault can be either above or below grade. Backfill is not permitted around the tank in a vault and sufficient clearance is required around the tank for inspection and maintenance purposes. Vaults should be provided with a means to admit a fire suppression agent, recover liquid spills from vaults, and sound an alarm in case of vapor/liquid release detection.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Underground tanks and piping require external corrosion protection by means of cathodic protection or use of corrosion-resistant material. The base and fill shall be clean, non-corrosive, compacted sand or compacted gravel.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Storage tank buildings are subject to minimum separation distances from property lines, public ways, and important buildings on the same property. Storage tank buildings and structures shall have at least a two-hour fire resistance rating and be equipped with manual/fixed fire control equipment. Discharge of liquid shall be prevented from public waterways/sewers or adjoining property, and all vents shall terminate outside the building.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1280"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Design Standards for Bulk Diesel Storage Tanks.</span></strong><span data-dcnode-id="1288" instrument_node=""> For diesel gen-sets, the bulk storage tank is generally an atmospheric tank designed and constructed per the American Petroleum Institute (API) Standard 650 </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.api.org/~/media/Files/Publications/Whats%2520New/650%2520e12%2520PA.pdf" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Welded Tanks for Oil Storage</span></em></a><span data-dcnode-id="1284" instrument_node="">. Such tanks are permitted to operate from atmospheric pressure to a gauge pressure of 1.0 psi (6.9 kPa) but must be vented to prevent vacuum. Other design standards may be used but the pressure limits should be checked to avoid distortion of the tank shell during service. The bulk storage tank can also be designed as a low-pressure tank per API 620 </span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Design and Construction of Large, Welded, Low-Pressure Storage Tanks</span></em><span data-dcnode-id="1281" instrument_node=""> or as a pressure vessel per the American Society of Mechanical Engineers (ASME) Boiler and Pressure Vessel Code Section VIII.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1275"><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Venting of Bulk Diesel Storage Tanks.</span></strong><span data-dcnode-id="1276" instrument_node=""> Bulk diesel storage tanks should be equipped with a vent line to prevent vacuum formation or overpressure in the tank during drawdown or tank filling, or due to atmospheric temperature changes. The vent pipe shall discharge to a safe space at least five feet away from building openings and at least 15 feet away from powered ventilation air intake devices.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1273" instrument_node="">The vent pipe should be sized per API Standard 2000 </span><em data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Venting Atmospheric and Low-Pressure Storage Tanks</span></em><span data-dcnode-id="1270" instrument_node="">, but in no case should it be less than 1.25 inches inside diameter. Also, see Table 23.6.2 in NFPA 30 for vent line sizes as a function of vent pipe length and liquid flow. The vent pipe can be fitted with a U-bend and/or a screen to prevent entry of foreign material. However, these devices create flow restrictions, which are aggravated by blockage due to dirt or insect nests. The flow restrictions should be considered in the pressure drop calculations when estimating tank overpressure/vacuum conditions during operation that could otherwise damage the tank shell.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Storage tanks used for ethanol-blended diesel fuel need to be fitted with a flame arrester at the vent pipe outlet. This is because ethanol-blended diesel fuel is a flammable liquid with a low flash point.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1261"><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Day Tank.</span></strong><span data-dcnode-id="1262" instrument_node=""> The day tank is located between the bulk storage tank and the diesel engine. The fuel is delivered from the bulk storage to the day tank by means of the bulk storage deliver pump. The fuel from the day tank is transferred to the diesel engine by the engine-driven fuel transfer pump, which is mounted on the engine assembly.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">The day tank is required when the engine-driven fuel pump is unable to draw fuel from the bulk fuel tank due to distance or elevation issues. The day tank is also used to ensure efficient fuel flow to the engine by eliminating any externally induced pressure head generated by the location of the bulk tank or from the bulk storage delivery pump. The day tank also serves as a heat sink to collect the hot, unused fuel returned from the engine via a cooler.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1253"><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Use of Gear Pumps for Bulk Fuel Transfer to Day Tank.</span></strong><span data-dcnode-id="1254" instrument_node=""> The fuel transfer pump from the bulk tank to the day tank is generally a positive displacement gear pump located above the bulk tank. When the pump is started, the air in the suction line is removed and a vacuum is created, which provides the lift for the liquid in the tank to rise in the suction pipe. The total suction lift plus the friction head in the suction line should not exceed 15 inches of mercury (inHg, 7.4 psi) for non-volatile liquids. This value progressively reduces further to 10 inHg (5.0 psi) and below for volatile liquids, due to their higher vapor pressure. A foot valve in the suction line is provided to keep the pump primed and ready for service, precluding the need to evacuate air from the suction line when the pump is started. ■</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p class="p1" data-dcnode-id="1241"><i data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">—</span></i><b data-dcnode-id="1247"><i data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">S. Zaheer Akhtar, PE</span></i></b><i data-dcnode-id="1242"><span data-dcnode-id="1246" instrument_node=""> is a senior process engineer with </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taiengineering.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1245" instrument_node="">TAI Engineering</span></a><span data-dcnode-id="1243" instrument_node=""> based in Owings Mills, Maryland.</span></i></p><span data-dcnode-id="1240" instrument_node="">

						</span></h2><span data-dcnode-id="1067" instrument_node="">
