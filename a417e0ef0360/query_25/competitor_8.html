</span><meta content="Clean water shortage has long been a challenge in remote and landlocked communities especially for the impoverished. Atmospheric water is now consider…" data-dcnode-id="969" property="og:description"><span data-dcnode-id="968" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Clean water shortage has long been a challenge in remote and landlocked communities especially for the impoverished. Atmospheric water is now considered as an unconventional but accessible fresh water source and sorption-based atmospheric water generator (AWG) has been successfully demonstrated a reliable way of harvesting atmospheric water. The water vapor sorbents with high water uptake capacity and especially fast vapor sorption/desorption kinetics have become the bottleneck to a desirable clean water productivity in AWG. In this work, we developed a new nano vapor sorbent composed of a nano carbon hollow capsule with LiCl inside the void core. The sorbent can capture water vapor from ambient air as much as 100% of its own weight under RH 60% within 3 h and quickly release the sorbed water within just half hour under 1 kW/m<sup>2</sup> sunlight irradiation. A batch-mode AWG device was able to conduct 3 sorption/desorption cycles within 10 h during one day test in the outdoor condition and produced 1.6 kg<sub>water</sub>/kg<sub>sorbent</sub>. A prototype of continuous AWG device was designed, fabricated, and successfully demonstrated, hinting a possible way of large-scale deployment of AWG for practical purposes.</p></div></div></div>" data-dcnode-id="967" lang="en" name="citation_abstract"><span data-dcnode-id="966" instrument_node="">

="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="522" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.nanoen.2019.104255" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="526" instrument_node="">https://doi.org/10.1016/j.nanoen.2019.104255</span></a><a class="rights-and-content" data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS2211285519309620%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="524" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="521"></section><section class="ReferencedArticles" data-dcnode-id="520"></section><div class="PageDivider" data-dcnode-id="519"></div><div class="Abstracts u-font-serif" data-dcnode-id="447" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="490" id="abs0020" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Highlights</span></h2><div data-dcnode-id="491" id="abssec0020"><p data-dcnode-id="492" id="abspara0020"></p><dl class="list" data-dcnode-id="493"><dt class="list-label" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="512"><p data-dcnode-id="513" id="p0010"><span data-dcnode-id="514" instrument_node="">Photothermal nano sorbents with high adsorption/desorption kinetics for atmospheric water harvesting.</span></p></dd><dt class="list-label" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="504"><p data-dcnode-id="505" id="p0015"><span data-dcnode-id="509" instrument_node="">Nanosized carbon shell providing improved light-trapping and </span><em data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">in situ</span></em><span data-dcnode-id="506" instrument_node=""> heat generation for fast heating of the sorbent.</span></p></dd><dt class="list-label" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="499"><p data-dcnode-id="500" id="p0020"><span data-dcnode-id="501" instrument_node="">Multiple water vapor harvesting/water production cycles within one day due to the fast kinetics.</span></p></dd><dt class="list-label" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="494"><p data-dcnode-id="495" id="p0025"><span data-dcnode-id="496" instrument_node="">Continuous atmospheric water generator design for potential large and automated plant-scale deployment.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="471" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Abstract</span></h2><div data-dcnode-id="472" id="abssec0010"><p data-dcnode-id="473" id="abspara0010"><span data-dcnode-id="483"><span data-dcnode-id="487" instrument_node="">Clean water shortage has long been a challenge in remote and landlocked communities especially for the impoverished. Atmospheric water is now considered as an unconventional but accessible fresh water source and sorption-based atmospheric water generator (AWG) has been successfully demonstrated a reliable way of harvesting atmospheric water. The water vapor </span><a class="topic-link" data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/materials-science/sorbent" title="Learn more about sorbents from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="486" instrument_node="">sorbents</span></a><span data-dcnode-id="484" instrument_node=""> with high water uptake capacity and especially fast vapor sorption/desorption kinetics have become the bottleneck to a desirable clean water productivity in AWG. In this work, we developed a new nano vapor sorbent composed of a nano carbon hollow capsule with LiCl inside the void core. The sorbent can capture water vapor from ambient air as much as 100% of its own weight under RH 60% within 3 h and quickly release the sorbed water within just half hour under 1 kW/m</span></span><sup data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">2</span></sup><span data-dcnode-id="480" instrument_node=""> sunlight irradiation. A batch-mode AWG device was able to conduct 3 sorption/desorption cycles within 10 h during one day test in the outdoor condition and produced 1.6 kg</span><sub data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">water</span></sub><span data-dcnode-id="477" instrument_node="">/kg</span><sub data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">sorbent</span></sub><span data-dcnode-id="474" instrument_node="">. A prototype of continuous AWG device was designed, fabricated, and successfully demonstrated, hinting a possible way of large-scale deployment of AWG for practical purposes.</span></p></div></div><div class="abstract graphical" data-dcnode-id="448" id="abs0015"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Graphical abstract</span></h2><div data-dcnode-id="449" id="abssec0015"><p data-dcnode-id="450" id="abspara0015"><span class="display" data-dcnode-id="451"></span></p><figure class="figure text-xs" data-dcnode-id="452" id="undfig1"><span data-dcnode-id="453"><img alt="Image 1" data-d keyword" data-dcnode-id="413" id="kwrd0020"><span data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Vapor sorbent</span></span></div><div class="keyword" data-dcnode-id="410" id="kwrd0025"><span data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Photothermal material</span></span></div></div></div><span data-dcnode-id="407" instrument_node=""></span><div class="related-content-links u-hide-from-md" data-dcnode-id="403"><button class="button button-anchor" data-dcnode-id="404" type="button"><span class="button-text" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="402"></div><div data-dcnode-id="243" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="244"><div class="PageDivider" data-dcnode-id="401"></div><header data-dcnode-id="398" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Cited by (67)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="245"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="246"><ul data-dcnode-id="252"><li class="ListArticleItem" data-dcnode-id="374"><div class="sub-heading" data-dcnode-id="392"><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048969722010580" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="396" id="citing-articles-article0-title"><span data-dcnode-id="397" instrument_node="">Seasonal atmospheric water harvesting yield and water quality using electric-powered desiccant and compressor dehumidifiers</span></h3></a><div class="article-source ellipsis" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">2022, Science of the Total Environment</span></div></div><div class="buttons" data-dcnode-id="386"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="387" type="button"><span class="button-link-text" data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="388" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="389"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="375"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="376" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="377"><p data-dcnode-id="378" id="sp0045"><span data-dcnode-id="385" instrument_node="">Atmospheric water harvesting (AWH) is an emerging technology for decentralized water supply and is proving to be viable for use in emergencies, military deployment, and sustainable industries. The atmosphere is a freshwater reservoir that contains 12,900 km</span><sup data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">3</span></sup><span data-dcnode-id="382" instrument_node=""> of water, 6-fold more than the volume of global rivers. Dehumidification water harvesting technologies can be powered by solar, wind, or electric sources. Compressor/refrigerant-based dehumidifiers operate via dew point condensation and provide a cold surface upon which water vapor can condense. Conversely, desiccant-based technologies saturate water vapor using a sorbent that is then heated, and the supersaturated water vapor condenses on a surface when interacting with cooler ambient process air. This work compares productivity, energy consumption, efficiency, cost and quality of water produced of two water-harvesting mechanisms. Electric-powered compressor and desiccant dehumidifiers were operated outdoors for more than one year in the arid southwestern USA, where temperatures ranged from 3.1 to 43.7 °C and relative humidity (RH) ranged from 6 to 85%. The compressor system harvested &gt;2-fold more water than the desiccant system when average RH during the run cycle was &gt;30%, average temperature was &gt;20 °C, and average dew point temperature was &gt;5 °C. Desiccant systems performed more favorably when average RH during the run cycle was &lt;30%, average temperature was &lt;20 °C, and average dew point temperature was &lt;5 °C. Water collected by compressor-based technologies had conductivity up to 180 </span><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">μ</span></em><span data-dcnode-id="379" instrument_node="">S/cm, turbidity up to 190 NTU, and aluminum, iron and manganese near or above the US EPA secondary drinking water standard. Dissolved organic carbon (DOC) averaged &lt;2 mg C/L but ranged up to 12 mg C/L. Water collected by desiccant-based technologies had significantly lower conductivity, metals, and turbidity, and DOC was always &lt;6 mg/L. Aldehydes such as formaldehyde and acetaldehyde and carboxylic acids such as formic acid and acetic acid were primary contributors to DOC. The differences in harvested water quality were attributed to differences in the condensation method between compressor and desiccant AWH technologies. Multiple strategies could be employed to prevent these volatile organic compounds (VOCs) from contributing to DOC in harvested water, such as pretreating air to remove VOCs or post-treating DOC in harvested liquid water.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="356"><div class="sub-heading" data-dcnode-id="368"><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032122002398" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="372" id="citing-articles-article1-title"><span data-dcnode-id="373" instrument_node="">Progress in atmospheric water generation systems: A review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">2022, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="362"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="363" type="button"><span class="button-link-text" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="364" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="365"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="357"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="358" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="359"><p data-dcnode-id="360" id="abspara0010"><span data-dcnode-id="361" instrument_node="">In recent years, freshwater reserves have been severely depleted. Demand is outpacing supply, and supply is being impacted in terms of both quantity and quality. Therefore, freshwater scarcity is regarded as one of the greatest challenges of our time. During recent decades, the concept of generating fresh water from atmospheric air has been emerging as a promising solution to overcome the global water crisis. The present review attempts to provide a novel and comprehensive classification of various AWG technologies and materials. Each technology has been summarized and discussed. Solar assisted AWG systems with a reliable and cheap energy source are thoroughly explained. Over the last few years, most AWG studies have been shifted towards hybrid/integrated systems which utilize several cooling approaches in order to increase water productivity. The present paper is primarily focused on reviewing hybrid systems with portable and round-the-clock (RTC) application capability. Performance indicators of each system; including water production and energy consumption, thermal efficiency, and coefficient of performance were evaluated and compared. Finally, possible future perspective of implementing atmospheric water generating technologies is proposed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="332"><div class="sub-heading" data-dcnode-id="350"><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0735193322000835" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="354" id="citing-articles-article2-title"><span data-dcnode-id="355" instrument_node="">Adsorption-based atmospheric water harvesting: A review of adsorbents and systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">2022, International Communications in Heat and Mass Transfer</span></div></div><div class="buttons" data-dcnode-id="344"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="345" type="button"><span class="button-link-text" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="346" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="347"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="333"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="334" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="335"><p data-dcnode-id="336" id="sp0165"><span data-dcnode-id="343" instrument_node="">Atmospheric water harvesting (AWH) has been an appealing prospect for decades to overcome water scarcity in remote areas. Adsorption-based AWH technologies have gained popularity due to their adaptability, and applicability using low-grade heat sources. This study presents up-to-date and future possibilities of adsorbents and systems for adsorption-based AWH. In this review, in-depth advancements in adsorbent materials are compartmentalized into adsorption equilibrium/isotherms, adsorption kinetics, and thermal conductivity. Various systems designs and modifications have been reviewed and classified accordingly. Liquid desiccants i.e., CaCl</span><sub data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2</span></sub><span data-dcnode-id="340" instrument_node=""> and LiCl-based AWH systems produced in between 0.63 to 1.0 kg/m/d of water. Recently, metal-organic frameworks (MOFs) are realized as effective adsorbents for AWH. Their excellent hydrophilicity, structural integrity, and tailorable structures can provide water in high and low relative humidity (RH) areas. MOF-841 and MOF-801 yielded maximum adsorption uptakes at 25 °C i.e., 0.5 and 0.3 g/g, respectively. MOF-801 showed an excellent water production of 0.2-0.3 L/kg/d at 5%-40% RH and 20-40°C. MOF-303 delivered ~0.7 L/kg/d at 10% RH and 27</span><sup data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">o</span></sup><span data-dcnode-id="337" instrument_node="">C. Cr-soc-MOF-1 and MIL-101(Cr) resulted in maximum adsorption uptakes i.e., 1.9 g/g and 1.4 g/g, respectively. Future possibilities regarding these captivating and emerging adsorption technologies are discussed as concluding remarks.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="314"><div class="sub-heading" data-dcnode-id="326"><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0957582022000714" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="330" id="citing-articles-article3-title"><span data-dcnode-id="331" instrument_node="">Adsorption-based atmospheric water harvesting powered by solar energy: Comprehensive review on desiccant materials and systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">2022, Process Safety and Environmental Protection</span></div></div><div class="buttons" data-dcnode-id="320"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="321" type="button"><span class="button-link-text" data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="322" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="323"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="315"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="316" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="317"><p data-dcnode-id="318" id="sp0135"><span data-dcnode-id="319" instrument_node="">Atmospheric water harvesting has been inexorably proliferated as a potential source of freshwater, notably for remote areas that lack access to water and electricity. This technology could be significantly operated with renewable energy sources. The current study comprehensively reviews the state-of-the-art atmospheric water harvesters and their desiccant materials. Firstly, a detailed survey on desiccant materials, silica gel, Metal-organic frameworks (MOFs), hydrogels, zeolite, hygroscopic salts and composite desiccant materials is illustrated. The review particularly focuses on the materials adsorption capability, kinetics, proper matching with climate conditions. Moreover, the most suitable adsorbents are thoroughly surveyed for a wide range of climate conditions, especially for water scarcity regions (i.e., arid zones) that are characterized by low relative pressures. Moreover, various designs of solar-powered atmospheric water harvesters are comparatively summarized, including fixed and portable installations. It can be concluded that MOF-801, MOF-808, MOF-841, HKUST-1, and CPO-27(Ni) have a superior potential for water harvesting in arid areas. Additionally, MIL-101(Cr) has superior water uptake and kinetic at high relative pressure (i.e., humid areas), and it is irrelevant for water harvesting at dry zones. It is found that the cost of the collected water from atmospheric water harvesting technology is about 0.062–0.86 $/kg of adsorbent. This work provides beneficial perspectives for selecting the most relevant desiccant materials beside the appropriate solar system for water harvesting applications.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="308"><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0043135421012239" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="312" id="citing-articles-article4-title"><span data-dcnode-id="313" instrument_node="">Viability of a practical multicyclic sorption-based water harvester with improved water yield</span></h3></a><div class="article-source ellipsis" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">2022, Water Research</span></div></div><div class="buttons" data-dcnode-id="302"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="303" type="button"><span class="button-link-text" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="304" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="305"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="275" id="spara018"><span data-dcnode-id="301" instrument_node="">Sorption-based atmospheric water harvesting (SAWH) has emerged as an attractive way to relieve water scarcity. However, the daily water yield of currently reported SAWH devices remains low to satisfy the rising demand for drinking water. The sorption and desorption kinetics, long-term stability and especially facile scaling-fabrication of adsorbents and scaled-up device implementation have become the bottleneck to such large-scale SAWH application. To overcome these challenges, an air-cooled SAWH device was fabricated to investigate its atmospheric water harvesting (AWH) performance under real island climate and its feasibility of multicyclic operation. Under monocyclic operation, the device demonstrated the superior water productivity as much as 3.9&nbsp;kg day</span><sup data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">−1</span></sup><span data-dcnode-id="298" instrument_node="">, or 0.39&nbsp;kg</span><sub data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">water</span></sub><span data-dcnode-id="295" instrument_node=""> kg</span><sub data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">adsorbent</span></sub><sup data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">−1</span></sup><span data-dcnode-id="290" instrument_node=""> day</span><sup data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">−1</span></sup><span data-dcnode-id="287" instrument_node="">, at 31&nbsp;°C and 70% RH, with a thermal efficiency of 25.4% (desorption at 94&nbsp;°C). The SAWH device demonstrated successful water production through 2 adsorption-desorption cycles within one day, with increased thermal efficiency to as high as 32.2% and increased water harvesting performance up to 0.42&nbsp;kg</span><sub data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">water</span></sub><span data-dcnode-id="284" instrument_node=""> kg</span><sub data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">adsorbent</span></sub><sup data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">−1</span></sup><span data-dcnode-id="279" instrument_node=""> day</span><sup data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">−1</span></sup><span data-dcnode-id="276" instrument_node=""> by 20–90%. This is the first demonstration in multicyclic SAWH at large scales, holding the promise of large-scale and practical water supply in island areas while opening up new applications such as indoor dehumidification.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1385894721046623" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article5-title"><span data-dcnode-id="270" instrument_node="">Carbon nanotubes decorated hollow metal–organic frameworks for efficient solar-driven atmospheric water harvesting</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2022, Chemical Engineering Journal</span></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="sp0010"><span data-dcnode-id="258" instrument_node="">High equilibrium uptake capacity and rapid adsorption/desorption kinetics are essential to achieve efficient atmospheric water harvesting. In this work, carbon nanotubes decorated hollow MIL-101(Cr) particles (HMC-2) are prepared and utilized for solar-driven atmospheric water harvesting with nice water adsorption capacity and fast kinetics. The hierarchical porous hollow MIL-101(Cr) particles formed by post-etching show highly active defect sites and low mass transfer resistance, which promotes the adsorption and diffusion of water molecules. The resulted HMC-2 demonstrates a maximum water uptake of 1.074&nbsp;g/g at 25&nbsp;°C, 90% RH. Notably, the water adsorption capacity of HMC-2 in low humidity (40% RH) are increased by 113% and 202.6% compared to pure MIL-101(Cr) and carbon nanotubes decorated MIL-101(Cr). Due to the synergistic effect of CNTs and hollow MIL-101(Cr), the HMC-2 composites generate sufficient solar thermal heat and improve the desorption kinetics. The maximum adsorbed water of HMC-2 can be completely desorbed within 90&nbsp;min under one sunlight. A single cycle of sorption–desorption of HMC-2 can be achieved within 210&nbsp;min. This means that if the water harvesting cycle is performed three times daily, it is possible to harvest 3.22&nbsp;L of water per kilogram of adsorbent at the area with high humidity. The water uptake and release rates of HMC-2 are competitive with even superior to most those reported. This may demonstrate a promising potential for atmospheric water generators.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85075385978%26md5%3D1988a7fe7e8618c1a6bd565d9fc13a54" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a aria-disabled="false" class="anchor full-text-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2211285519309620" tabindex="0"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View full text</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2019 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="141"><div data-dcnode-id="155" id="recommended-articles"><ul data-dcnode-id="156"><li class="SidePanelItem" data-dcnode-id="205"><div class="sub-heading" data-dcnode-id="221"><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S036054421831870X"><h3 class="article-title ellipsis text-s" data-dcnode-id="226" id="recommended-articles-article0-title"><span data-
