</span><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">You can use traditional AA batteries or keep the built-in NiMH battery pack charged up. There’s a 5V AC/DC input with a wall power adapter, but the adapter is sold separately. There’s also a sizable solar panel on the rear and a hand crank on the side. Needless to say, the radio has all of your bases covered.</span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">If that wasn’t enough, this unit is built tough, too. It’s made of impact-resistant ABS plastic. The material is thick and helps absorb shock. It also happens to be water-resistant for good measure. This is an area where we’d give this product the edge in the popular “Sangean MMR-88 vs Kaito KA500” debate.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">In terms of performance, this radio has all the features you need. There’s a quick dial to tune in to one of seven NOAA weather bands. You can also turn the system on to receive NOAA weather alerts in the event of severe emergencies (PEAS – Public Emergency Alert System).</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Thanks to the telescopic antenna, the radio is very sensitive. It can pick up distant radio signals to ensure that you’re always in the know.</span></p><span data-dcnode-id="1602" instrument_node="">

</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">The radio can also provide visual alerts. In the event of an emergency broadcast, the device will flash to warn you.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">If you need some extra features, this radio has you covered. It features a powerful LED flashlight. There’s also an emergency buzzer that produces an audio signal for rescuers.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">All of the features on the radio stay powered thanks to the multiple energy sources of this unit! On top, you’ll see an integrated solar panel. Just put the radio in the sunlight for a few minutes to get plenty of power for the radio broadcast.</span></p><span data-dcnode-id="1469" instrument_node="">

</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">As a multi-functional radio, this unit has plenty of additional features you should have. There’s a bright flashlight on one end. It uses CREE LEDs, but it can produce enough lumens to illuminate the area. Plus, it can flash to call for help.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">As for power, this radio has several sources. A rechargeable battery is the heart of the system. You can use it to charge external devices. To keep the internal battery charged, there’s a hand crank and a solar panel as well.</span></p><span data-dcnode-id="1194" instrument_node="">

</span></div><span data-dcnode-id="693" instrument_node="">
</span><h2 data-dcnode-id="691" id="the-importance-of-having-a-survival-radio"><span data-dcnode-id="692" instrument_node="">The Importance Of Having A Survival Radio</span></h2><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Imagine being in a survival situation with none of the conveniences of modern life. That may be tough as you browse through this article on your smartphone or laptop. But those situations aren’t as rare as you might think!</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Many parts of the world regularly experience extreme weather and natural disasters. Coastlines are at risk for hurricanes, mountainous regions experience hurricanes, and Midwest plains have tornado touchdowns. That’s without even mentioning the worldwide risk of severe thunderstorms and flooding.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">An emergency radio is one of the best ways to stay informed in these types of emergency scenarios. They can connect to emergency broadcasts which will provide you with valuable information you need to survive. Those radio channels can tell you about what’s going on, what to expect, and where to go. Without an emergency radio, you’re in the dark.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">But why not just rely on your smartphone?</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">While smartphones are great for staying in touch with others in an emergency situation, they’re only temporary solutions. Those built-in batteries don’t last forever. Plus, they rely on nearby cell towers to operate. What if those are down, too?</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Chances are, the heavy storms and severe weather will knock down power lines. This renders your trusty outlets useless. It’s best to save your smartphone battery as much as possible. You’ll need it at some point.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Eventually, the batteries on your smartphones, tablets, and computers are going to run out.</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">That’s when your emergency radio is going to come in. These devices bridge the gap and provide you with the long-lasting power you need to stay safe. Most radios use only a fraction of the power that your smart device does. Not only that, but they usually have multiple energy backups to stay powered for as long as you need.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">You might not use radios in your everyday life, but an emergency radio is a must-have. These gadgets deserve a permanent spot in your emergency kit. They can mean the difference between staying informed and making bad choices that could get you hurt or worse!</span></p><span data-dcnode-id="663" instrument_node="">
</span><h2 data-dcnode-id="661" id="features-to-look-for-when-shopping-for-an-emergency-radio"><span data-dcnode-id="662" instrument_node="">Features to Look for When Shopping for an Emergency Radio</span></h2><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">A typical AM/FM radio offers the same emergency-broadcasting capabilities as a survival radio. But they don’t have all of the additional features you need to stay prepared.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">The best survival radios are distinct products that are purpose-built to have your back in an emergency. Here are some essential features to look for when choosing a radio to add to your survival kit.</span></p><span data-dcnode-id="654" instrument_node="">
</span><h3 data-dcnode-id="652" id="power-source-options"><span data-dcnode-id="653" instrument_node="">Power Source Options</span></h3><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Survival radios can get their power from several different sources. The most common is through replaceable batteries.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Replaceable alkaline batteries are easy enough to manage. As long as you keep some spare batteries in your kit along with the radio, you should have plenty of power to get you through a temporary emergency.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Another option is a rechargeable lithium-ion battery. Usually proprietary by nature, these can’t be removed. So, they rely on a charge port. You might see a USB port on the radio.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">USB charging systems are pretty versatile. We all have multiple USB-powered gadgets. If you have a portable battery bank on hand, recharging the device is easy.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Next up, there’s solar power. Some radios have built-in solar panels like survival watches or calculators. Others might have a standalone panel that you connect to the radio. Either way, having solar power can be a lifesaver.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">You have a virtually endless power supply! But solar power won’t address your needs during a severe storm, at night, or when it’s too dangerous to go to a nearby window.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">In those cases, you can rely on the final power source option: a hand crank! Hand-crank operated radios are one of the most reliable on the market. They can provide you with power whenever you need it.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">These radios usually have a battery that’s connected to the crank device. When you turn the crank, you’re taking advantage of an electromagnetic field. A conductive wire passes through a magnetic field to generate a current, which then goes to charge the battery.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">When the radio dies, all you have to do is give it a few minutes of rigorous cranking. You don’t have to rely on replaceable batteries, battery banks, or even solar energy!</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Additional power sources are available as well. You might see some models with optional wall outlets. However, these four power sources are the most common.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Beyond the main power source, it’s always a good idea to have a backup. A backup will cover your hide in the event that the primary energy source dies.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Hand cranks are the best kind of backup to have. But you can also find units with all four, or more, power options in tow!</span></p><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="613" id="access-to-weather-bands-and-alerts"><span data-dcnode-id="614" instrument_node="">Access to Weather Bands and Alerts</span></h3><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Emergency radios are great for connecting to your local radio station. But do you really want to wait for commercials to get the information you’re after?</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">You need more than just simple AM/FM capabilities. Survival radios must also have the ability to connect to NOAA weather bands. NOAA stands for National Oceanic and Atmospheric Administration. These specialty radio bands broadcast weather information around the clock.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">As of 2020, there are 1,032 stations across all states and territories. It’s estimated that the stations cover roughly 95 percent of the United States.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Not all radios are capable of accessing these stations. Make sure that your survival radio does!</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">It’s also a good idea to get a radio that can receive NOAA alerts. These are a bit different from the standard broadcast. The alerts will notify you of severe weather and civil emergencies.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">These alerts will let you know about emergencies in real time no matter what time it is. Disaster can strike at any time, so having the ability to receive those alerts is essential.</span></p><span data-dcnode-id="594" instrument_node="">
</span><h3 data-dcnode-id="592" id="additional-functions-and-tools"><span data-dcnode-id="593" instrument_node="">Additional Functions and Tools</span></h3><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Packing more than one feature into a single device is always welcome. It cuts back on the things you have to pack and provides additional backup measures.</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">You can easily find survival radios with a multi-functional design. While the radio broadcast may be the main feature, some models have things like flashlights and chargers built in.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">An integrated flashlight can keep you safe when your standalone torches aren’t working anymore. Many radios also have a strobe mode, which can assist you when you’re trying to signal for help.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Another common add-on feature for survival radios is a USB charger. A built-in USB port will keep your devices juiced up so that you’re always prepared.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">For any of these additional features, make sure that the radio has a hand crank! It’s not very effective to have power-hungry features without one. The last thing you want to do is take away your information line because you wanted to charge a smartphone!</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">With a hand crank, you’ll always have the power you need to power all of the radio’s functions.</span></p><span data-dcnode-id="573" instrument_node="">
</span><h3 data-dcnode-id="571" id="durability"><span data-dcnode-id="572" instrument_node="">Durability</span></h3><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">It should go without saying, but durability is a must! Hopefully, you’ll never be in a situation where you have to leave your home in search of safety. But if that time ever comes, you’ll be thankful to have a rugged radio that can survive the trip.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Who knows when you’ll need to access those important broadcast signals. If you’re trekking on foot, your radio will likely experience some accidental bumps and tumbles.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">A rugged body, a thick plastic material, and some protective shielding will keep all of the components inside the radio safe from harm.</span></p><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="559" id="water-resistance"><span data-dcnode-id="560" instrument_node="">Water Resistance</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Some level of water resistance is important, too. You never know what kind of condition your home or neighborhood will be in.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">You might experience weather that’s so severe that your house starts flooding. Or maybe you’re forced to retreat to your home in the rain.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">A water-resistant design ensures that your radio can serve you well in practically all weather conditions. Look out for a solid seal on the housing and extra protection around the speakers.</span></p><span data-dcnode-id="549" instrument_node="">
</span><h2 data-dcnode-id="547" id="pick-one-up-and-prepare-yourself"><span data-dcnode-id="548" instrument_node="">Pick One up and Prepare Yourself</span></h2><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">You should put the best survival radios high on your list when it comes to stocking up on gear and supplies. They offer so many benefits that can save your life in an emergency that there’s no excuse to delay the purchase.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Trust us, all the experienced preppers and survivalists we know have one (if not more) of these handy devices. You’ll thank us and yourself later.</span></p><span data-dcnode-id="540" instrument_node="">
</span></div><span data-dcnode-id="538" instrument_node="">
