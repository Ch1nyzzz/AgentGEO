stributed random variable, the basic empirical rules from statistics</span><sup data-dcnode-id="2282"><a data-dcnode-id="2283" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">Footnote </span></span><span data-dcnode-id="2284" instrument_node="">8</span></a></sup><span data-dcnode-id="2281" instrument_node=""> can be applied to estimate one-sided confidence levels.</span></p><p data-dcnode-id="2263"><span data-dcnode-id="2279" instrument_node="">According to the empirical rule, approximately 83.7% and 97.5% of the values would fall above the one and two standard deviations of the mean in a normal distribution. Thus, the two lower bounds of </span><span class="mathjax-tex" data-dcnode-id="2274"><span class="MathJax_Preview" data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">\sigma</span></span></span><span data-dcnode-id="2273" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2268"><span class="MathJax_Preview" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">2\sigma</span></span></span><span data-dcnode-id="2267" instrument_node=""> from the mean provide 83.7% and 97.5% probability, respectively. Equation&nbsp;</span><a data-dcnode-id="2265" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ8"><span data-dcnode-id="2266" instrument_node="">8</span></a><span data-dcnode-id="2264" instrument_node=""> illustrates the statistical logic for one-sigma and two-sigma bounds:</span></p><div class="c-article-equation" data-dcnode-id="2254" id="Equ8"><div class="c-article-equation__content" data-dcnode-id="2257"><span class="mathjax-tex" data-dcnode-id="2258"><span class="MathJax_Preview" data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">\begin{aligned} {\left\{ \begin{array}{ll} P(\mu - \sigma \leqslant X ) \approx 83.7\% \\ P(\mu - 2\sigma \leqslant X ) \approx 97.5\% \end{array}\right. } \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">
                    (8)
                </span></div></div><p data-dcnode-id="2228"><span data-dcnode-id="2253" instrument_node="">The lower confidence levels of </span><span class="mathjax-tex" data-dcnode-id="2248"><span class="MathJax_Preview" data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">\mu</span></span></span><span data-dcnode-id="2247" instrument_node="">-</span><span class="mathjax-tex" data-dcnode-id="2242"><span class="MathJax_Preview" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">\sigma</span></span></span><span data-dcnode-id="2241" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2236"><span class="MathJax_Preview" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">\mu</span></span></span><span data-dcnode-id="2235" instrument_node="">-</span><span class="mathjax-tex" data-dcnode-id="2230"><span class="MathJax_Preview" data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">2\sigma</span></span></span><span data-dcnode-id="2229" instrument_node=""> are determined for each city. Cities with a greater value of confidence level would be a more reliable destination for the application AWG. Higher values of regional confidence levels would illustrate a more reliable performance and a lower risk associated with AWG’s production.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2226" id="Sec16"><span data-dcnode-id="2227" instrument_node="">Financial loss risk</span></h4><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Excluding the initial sunk purchase price of AWG, users still have to pay for the electricity consumption and the maintenance costs associated with AWG. If temperature and humidity conditions turn out to be unfavorable, the value of the produced water might become smaller than the marginal operating costs of AWG. The likelihood of a “no-feasible-production” event depends on a set of factors including environmental factors, the regional value of water, and the regional energy prices.</span></p><p data-dcnode-id="2219"><span data-dcnode-id="2223" instrument_node="">We determine the probability of having a negative cash flow day at each city as an indicator of the daily financial loss risk. A lower probability value demonstrates lower risk levels (i.e., a better case). The daily negative cash flow indicator is calculated for each city using Eq.&nbsp;</span><a data-dcnode-id="2221" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ9"><span data-dcnode-id="2222" instrument_node="">9</span></a><span data-dcnode-id="2220" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="2210" id="Equ9"><div class="c-article-equation__content" data-dcnode-id="2213"><span class="mathjax-tex" data-dcnode-id="2214"><span class="MathJax_Preview" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">\begin{aligned} \begin{aligned} L_{i} = \frac{\text {Number of days with a negative cash flow}}{\text {Total number of days}} \end{aligned} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">
                    (9)
                </span></div></div><p data-dcnode-id="2193"><span data-dcnode-id="2209" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2204"><span class="MathJax_Preview" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">L_{i}</span></span></span><span data-dcnode-id="2203" instrument_node=""> is the probability of regional daily negative cash flow occurrence in city </span><i data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">i</span></i><span data-dcnode-id="2200" instrument_node="">. The smaller </span><span class="mathjax-tex" data-dcnode-id="2195"><span class="MathJax_Preview" data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">L_{i}</span></span></span><span data-dcnode-id="2194" instrument_node=""> is, the more reliable will be the performance of AWG.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2191" id="Sec17"><span data-dcnode-id="2192" instrument_node="">AWG as an alternative to tap drinking water</span></h3><p data-dcnode-id="2178"><span data-dcnode-id="2190" instrument_node="">The previous segments worked to analyze the economic/market potential of AWG as an alternative to bottled water. Bottled water provides a decent benchmark for analyzing AWG as bottled water is generally an agreed upon source of clean drinking water that is universally used. Not to mention that the bottled water market is growing with fast pace given the increasing living standards and the aging water infrastructure. That said, to broaden our understanding of AWG’s economic prospect, in this segment, we seek to evaluate AWG as an alternative to clean tap drinking water as well. It is important to note our tap water benchmark should be clean and potable since utilizing AWG for other appliances of non-potable water (waste water, bathing, dish washing, etc.) is not really reasonable considering the abundance of sources for the mentioned appliances and AWG’s current cost efficiency. We should also note that evaluating AWG as an alternative to tap water in different locations can prove difficult as the tap water quality varies considerably from location to location, some of which are not even safe to drink. Moreover, tap water pricing is generally kept artificially low with state and government backed subsidies for both the water and the infrastructure transporting it to consumers. Hence, pricing the real value of tap water can be a project of its own. Here, we assume the value of tap water is at the announced residential rates. Also, We chose to examine only one location to avoid redundancy since the main factor that would change in our model here would be the assumed value of the produced water by AWG. Plus, cross location analyses could prove difficult for this specific task as unlike bottled water, tap water varies considerably in quality, safety, taste, smell, subsidies, etc., in different locations. So, we would suffice to examine AWG as an alternative to tap water, only in the city of Austin. Austin is generally known to have clean tap water, even though complaints have been made with regard to the bad smell or taste of the water on occurrences. We would do this by following the same method stated in "</span><a data-dcnode-id="2188" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec13"><span data-dcnode-id="2189" instrument_node="">Economic analysis</span></a><span data-dcnode-id="2187" instrument_node="">" and "</span><a data-dcnode-id="2185" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec14"><span data-dcnode-id="2186" instrument_node="">Risk analysis</span></a><span data-dcnode-id="2184" instrument_node="">" sections with the only difference that the regional price of tap water would replace the regional bottled water prices as the input to the model. As for the tap water rates in Austin, the average residential tap water rate is $0.00654 per liter.</span><sup data-dcnode-id="2179"><a data-dcnode-id="2180" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Footnote </span></span><span data-dcnode-id="2181" instrument_node="">9</span></a></sup></p></div></div></section><section data-dcnode-id="1754" data-title="Results"><div class="c-article-section" data-dcnode-id="1755" id="Sec18-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2173" id="Sec18"><span data-dcnode-id="2174" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="1756" id="Sec18-content"><h3 class="c-article__sub-heading" data-dcnode-id="2171" id="Sec19"><span data-dcnode-id="2172" instrument_node="">Production model</span></h3><p data-dcnode-id="2154"><span data-dcnode-id="2170" instrument_node="">We estimate Eq.&nbsp;</span><a data-dcnode-id="2168" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ3"><span data-dcnode-id="2169" instrument_node="">3</span></a><span data-dcnode-id="2167" instrument_node=""> using the dataset in Table </span><a data-dcnode-id="2165" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2166" instrument_node="">1</span></a><span data-dcnode-id="2164" instrument_node="">. The estimation result provides a satisfactory representation of the input data with an </span><span class="mathjax-tex" data-dcnode-id="2159"><span class="MathJax_Preview" data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">R^2=96.3\%</span></span></span><span data-dcnode-id="2158" instrument_node="">. The estimated model can be seen in Eq.&nbsp;</span><a data-dcnode-id="2156" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ10"><span data-dcnode-id="2157" instrument_node="">10</span></a><span data-dcnode-id="2155" instrument_node="">:</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2139" data-test="inline-table" id="table-4"><figure data-dcnode-id="2140"><figcaption class="c-article-table__figcaption" data-dcnode-id="2151"><b data-dcnode-id="2152" data-test="table-caption" id="Tab4"><span data-dcnode-id="2153" instrument_node="">Table 4 Estimation results</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2141"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="2142" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/tables/4" rel="nofollow"><span data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2143" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2144" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2145" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2148" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2147" fill-rule="evenodd"></path><span data-dcnode-id="2146" instrument_node="">
</span></a></div></figure></div><div class="c-article-equation" data-dcnode-id="2130" id="Equ10"><div class="c-article-equation__content" data-dcnode-id="2133"><span class="mathjax-tex" data-dcnode-id="2134"><span class="MathJax_Preview" data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">\begin{aligned} W = 45.93 -0.36 H - 1.20 T + 0.007 T^{2} + 0.007 H \times T \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">
                    (10)
                </span></div></div><p data-dcnode-id="2113"><span data-dcnode-id="2129" instrument_node="">Assuming average values, </span><span class="mathjax-tex" data-dcnode-id="2124"><span class="MathJax_Preview" data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">{\overline{H}} = 60</span></span></span><span data-dcnode-id="2123" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2118"><span class="MathJax_Preview" data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">{\overline{T}} = 77</span></span></span><span data-dcnode-id="2117" instrument_node="">, based on Eq.&nbsp;</span><a data-dcnode-id="2115" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ4"><span data-dcnode-id="2116" instrument_node="">4</span></a><span data-dcnode-id="2114" instrument_node="">, we arrive at:</span></p><div class="c-article-equation" data-dcnode-id="2104" id="Equ11"><div class="c-article-equation__content" data-dcnode-id="2107"><span class="mathjax-tex" data-dcnode-id="2108"><span class="MathJax_Preview" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">\begin{aligned} {\left\{ \begin{array}{ll} \frac{\partial W}{\partial H}({\overline{H}},{\overline{T}}) = -0.36 + 0.007 * 77 = 0.179&gt; 0 \\ \frac{\partial W}{\partial T}({\overline{H}},{\overline{T}}) = -1.20 + 0.014*77 + 0.007 * 60 = 29.8 &gt; 0 \end{array}\right. } \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">
                    (11)
                </span></div></div><p data-dcnode-id="2096"><span data-dcnode-id="2103" instrument_node="">Based on the results of Eq.&nbsp;</span><a data-dcnode-id="2101" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ11"><span data-dcnode-id="2102" instrument_node="">11</span></a><span data-dcnode-id="2100" instrument_node="">, both humidity and temperature have a positive effect on water production. The marginal effect of temperature on production seems to be stronger than humidity (Table </span><a data-dcnode-id="2098" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="2099" instrument_node="">4</span></a><span data-dcnode-id="2097" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2094" id="Sec20"><span data-dcnode-id="2095" instrument_node="">Performance in ten cities</span></h3><span data-dcnode-id="2093" instrument_node="">
</span><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2069" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="2070"><figcaption data-dcnode-id="2090"><b class="c-article-section__figure-caption" data-dcnode-id="2091" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="2092" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2081"><div class="c-article-section__figure-item" data-dcnode-id="2085"><a class="c-article-section__figure-link" data-dcnode-id="2086" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/3" rel="nofollow"><picture data-dcnode-id="2087"><source data-dcnode-id="2089" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10098-020-02015-6/MediaObjects/10098_2020_2015_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="2088" height="271" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10098-020-02015-6/MediaObjects/10098_2020_2015_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2082" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">The sample daily water production estimated by the model for Austin, TX</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2071"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="2072" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/3" rel="nofollow"><span data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2073" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2074" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2075" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2078" instrument_node="">

</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Through the calibrated production model, the representative AWG machine’s performance is evaluated in ten different cities. For this purpose, AWG’s daily water production is simulated for a 4-year period in each city using historical daily temperature and humidity data in each location.</span></p><p data-dcnode-id="2052"><span data-dcnode-id="2065" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="2063" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2064" instrument_node="">3</span></a><span data-dcnode-id="2062" instrument_node=""> provides a sample series of charts that demonstrate the water production in Austin (TX) for the span of four years (see Figs.&nbsp;</span><a data-dcnode-id="2060" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="2061" instrument_node="">9</span></a><span data-dcnode-id="2059" instrument_node=""> and </span><a data-dcnode-id="2057" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="2058" instrument_node="">10</span></a><span data-dcnode-id="2056" instrument_node=""> for the full set of cities). Moreover, Fig.&nbsp;</span><a data-dcnode-id="2054" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2055" instrument_node="">4</span></a><span data-dcnode-id="2053" instrument_node=""> shows the average daily production in each city using the 4-year sample.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2028" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="2029"><figcaption data-dcnode-id="2049"><b class="c-article-section__figure-caption" data-dcnode-id="2050" data-test="figure-caption-text" id="Fig4" ght="16" role="img" width="16"><use data-dcnode-id="2033" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2034" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2037" instrument_node="">

Preview" data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">R^2=78\%</span></span></span><span data-dcnode-id="1998" instrument_node="">, which is acceptable for the purposes of this study considering the limited data availability.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1973" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="1974"><figcaption data-dcnode-id="1994"><b class="c-article-section__figure-caption" data-dcnode-id="1995" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="1996" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1985"><div class="c-article-section__figure-item" data-dcnode-id="1989"><a class="c-article-section__figure-link" data-dcnode-id="1990" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/5" rel="nofollow"><picture data-dcnode-id="1991"><source data-dcnode-id="1993" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10098-020-02015-6/MediaObjects/10098_2020_2015_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="1992" height="483" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10098-020-02015-6/MediaObjects/10098_2020_2015_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1986" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Energy consumption (kWh) by water production level (L/day)</span></p></div></div><div class="u-t                     (12)
                </span></div></div><p data-dcnode-id="1935"><span data-dcnode-id="1948" instrument_node="">Carbon footprint Eq.&nbsp;</span><a data-dcnode-id="1946" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ12"><span data-dcnode-id="1947" instrument_node="">12</span></a><span data-dcnode-id="1945" instrument_node=""> suggests a liter of water produced by the AWG machine approximately requires 0.5 kWh of energy input. This is consistent with informal estimates that can be found in the industry reports.</span><sup data-dcnode-id="1940"><a data-dcnode-id="1941" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Footnote </span></span><span data-dcnode-id="1942" instrument_node="">11</span></a></sup><span data-dcnode-id="1939" instrument_node=""> The environmental footprint of the water production depends on the footprint of the energy source in each region, ranging from a low 10 g/kWh (for wind and nuclear) to a high 900 g/kWh (for coal). The average emission factors are approximately 700 g/kWh and 550 g/kWh for the USA and the Middle East, respectively. Thus, as a rule of thumb, a liter of water produced by the AWG machine has a footprint of 250–350 g of CO2. A more detailed calculation of environmental footprints in each region can be a topic for future research (Table </span><a data-dcnode-id="1937" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="1938" instrument_node="">5</span></a><span data-dcnode-id="1936" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1933" id="Sec22"><span data-dcnode-id="1934" instrument_node="">Economic analysis at each location</span></h3><p data-dcnode-id="1928"><span data-dcnode-id="1932" instrument_node="">NPV and IRR for each city are calculated and presented in Table </span><a data-dcnode-id="1930" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab6"><span data-dcnode-id="1931" instrument_node="">6</span></a><span data-dcnode-id="1929" instrument_node="">. The numbers show the economic penitential of AWG in each region during the 4-year period.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1913" data-test="inline-table" id="table-6"><figure data-dcnode-id="1914"><figcaption class="c-article-table__figcaption" data-dcnode-id="1925"><b data-dcnode-id="1926" data-test="table-caption" id="Tab6"><span data-dcnode-id="1927" instrument_node="">Table 6 NPV and IRR for investing in AWG</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1915"><a aria-label="Full size table 6" class="c-article__pill-button" data-dcnode-id="1916" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/tables/6" rel="nofollow"><span data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1917" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1918" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1919" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1922" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1911" id="Sec23"><span data-dcnode-id="1912" instrument_node="">Risk at each location</span></h3><p data-dcnode-id="1900"><span data-dcnode-id="1910" instrument_node="">Mean, standard deviation, confident production levels, and negative daily cash flow probabilities are presented in Table </span><a data-dcnode-id="1908" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab7"><span data-dcnode-id="1909" instrument_node="">7</span></a><span data-dcnode-id="1907" instrument_node=""> for each city. This table serves to examine some of the regional risks associated with the application of AWG. To better visualize the distribution of water production, Fig.&nbsp;</span><a data-dcnode-id="1905" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="1906" instrument_node="">6</span></a><span data-dcnode-id="1904" instrument_node=""> demonstrates the kernel estimated using the empirical distribution of water production in Aruba. Similar plots for other locations can be found in Appendix&nbsp;</span><a data-dcnode-id="1902" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec37"><span data-dcnode-id="1903" instrument_node="">E</span></a><span data-dcnode-id="1901" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1861" data-test="inline-table" id="table-7"><figure data-dcnode-id="1862"><figcaption class="c-article-table__figcaption" data-dcnode-id="1873"><b data-dcnode-id="1874" data-test="table-caption" id="Tab7"><span data-dcnode-id="1899" instrument_node="">Table 7 Mean (</span><span class="mathjax-tex" data-dcnode-id="1894"><span class="MathJax_Preview" data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">\mu</span></span></span><span data-dcnode-id="1893" instrument_node="">) and standard deviation (</span><span class="mathjax-tex" data-dcnode-id="1888"><span class="MathJax_Preview" data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">\sigma</span></span></span><span data-dcnode-id="1887" instrument_node="">) value for each city followed by production level at </span><span class="mathjax-tex" data-dcnode-id="1882"><span class="MathJax_Preview" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">\mu -\sigma</span></span></span><span data-dcnode-id="1881" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="1876"><span class="MathJax_Preview" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">\mu -2\sigma</span></span></span><span data-dcnode-id="1875" instrument_node=""> (negative values were rounded to zero)</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1863"><a aria-label="Full size table 7" class="c-article__pill-button" data-dcnode-id="1864" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/tables/7" rel="nofollow"><span data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1865" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1866" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1867" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1870" instrument_node="">

om/lw685/springer-static/image/art%253A10.1007/s10098-020-02015-6/MediaObjects/10098_2020_2015_Fig7_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1804" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="1805"><span data-dcnode-id="1812" instrument_node="">Kernel estimation of daily cash flow for Aruba. The red vertical line shows the mean, and the dashed green line identifies the </span><span class="mathjax-tex" data-dcnode-id="1807"><span class="MathJax_Preview" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">2.5\%</span></span></span><span data-dcnode-id="1806" instrument_node=""> cumulative distribution (CDF) point. The theoretical normal distribution, with similar mean and variance, is also plotted for the comparison with the distribution of the empirical data</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1793"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="1794" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/7" rel="nofollow"><span data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1795" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1796" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1797" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1800" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1789" id="Sec24"><span data-dcnode-id="1790" instrument_node="">AWG as a tap water substitute</span></h3><p data-dcnode-id="1778"><span data-dcnode-id="1788" instrument_node="">Table&nbsp;</span><a data-dcnode-id="1786" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab8"><span data-dcnode-id="1787" instrument_node="">8</span></a><span data-dcnode-id="1785" instrument_node=""> illustrates the NPV and risk indicators for applying AWG as an alternative to tap and bottled water in the city of Austin. Obviously, the production confidence levels are the same as the AWG’s production has not changed here. However, we could see that the NPV estimation illustrate that applying AWG as an alternative to tap water is in no way feasible with an NPV value of $ -3740 for the 4-year period. We could also observe that </span><span class="mathjax-tex" data-dcnode-id="1780"><span class="MathJax_Preview" data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">L_{i}</span></span></span><span data-dcnode-id="1779" instrument_node=""> is 1. In other words, the AWG investment would most likely have a negative cash flow every day of the 4-year investment period.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1757" data-test="inline-table" id="table-8"><figure data-dcnode-id="1758"><figcaption class="c-article-table__figcaption" data-dcnode-id="1769"><b data-dcnode-id="1770" data-test="table-caption" id="Tab8"><span data-dcnode-id="1777" instrument_node="">Table 8 The NVP and </span><span class="mathjax-tex" data-dcnode-id="1772"><span class="MathJax_Preview" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">\text {P(cashflow} \le 0)</span></span></span><span data-dcnode-id="1771" instrument_node=""> for applying AWG as an alternative to tap or bottled water in Austin for a 4-year period</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1759"><a aria-label="Full size table 8" class="c-article__pill-button" data-dcnode-id="1760" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/tables/8" rel="nofollow"><span data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1761" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1762" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1763" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1766" instrument_node="">

</span></a></div></figure></div></div></div></section><section data-dcnode-id="1683" data-title="Discussion of results"><div class="c-article-section" data-dcnode-id="1684" id="Sec25-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1752" id="Sec25"><span data-dcnode-id="1753" instrument_node="">Discussion of results</span></h2><div class="c-article-section__content" data-dcnode-id="1685" id="Sec25-content"><h3 class="c-article__sub-heading" data-dcnode-id="1750" id="Sec26"><span data-dcnode-id="1751" instrument_node="">Performance analysis</span></h3><p data-dcnode-id="1742"><span data-dcnode-id="1749" instrument_node="">The test results in ten cities with a variety of different environmental conditions provide a reasonably rich sample to understand the perspective on AWG’s performance. The set of results provided in Figs.&nbsp;</span><a data-dcnode-id="1747" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="1748" instrument_node="">9</span></a><span data-dcnode-id="1746" instrument_node=""> and </span><a data-dcnode-id="1744" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="1745" instrument_node="">10</span></a><span data-dcnode-id="1743" instrument_node=""> suggest a recurring pattern in production level shifts in different seasons.</span></p><p data-dcnode-id="1738"><i data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Effect of season</span></i><span data-dcnode-id="1739" instrument_node=""> AWG performance peaks in warm seasons; it also has a considerably lower production level in cold seasons. The movements of the daily water production follow a fairly similar pattern in different seasons, regardless of the location. Each summer would have the highest level on the production chart. Then, the production level would drop over Autumn to reach its lowest level in winter, and finally, the production would increase during spring to reach its highest level in the summer. This pattern repeats every year in every city. This is consistent with prior literature citing warm and humid weathers as the most productive environmental conditions for using AWG. Thus, AWG has the downside of having a seasonal production function. These results demonstrate that a diversification strategy of pairing AWG with other alternatives water in sources which are more abundant during cold seasons may be the solution to creating a consistent and efficient water source. This finding has implications for future technology research in this area as it could guide researchers toward mitigating for AWG’s production risk. For instance, rainfalls are generally more common and more abundant during cold seasons. Thus, exploring a hybrid system consisting of both AWG and rain harvesting systems can be quite interesting.</span></p><p data-dcnode-id="1731"><i data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Effect of location</span></i><span data-dcnode-id="1735" instrument_node=""> Figure&nbsp;</span><a data-dcnode-id="1733" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="1734" instrument_node="">4</span></a><span data-dcnode-id="1732" instrument_node=""> suggests that Aruba island has the best performance among the ten regions by a large margin. An AWG machine located in Aruba Island would produce an approximate 16 L of water every day. In addition, Austin and San Diego show the highest production capacities among US cities. Moreover, we can see that cold and rainy cities like New York and Seattle do not promise as the most efficient destinations for the application of AWG. As for the Persian Gulf region, all the cities except for Kuwait City show a fairly high production results. Bandar Abbas (Iran), and Doha (Qatar) have the best daily average with 9.18 L and 6.85 L, respectively. These results are consistent with the general perception that AWG does best in environments with warm and humid weather conditions.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1729" id="Sec27"><span data-dcnode-id="1730" instrument_node="">Economic analysis of AWG</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1727" id="Sec28"><span data-dcnode-id="1728" instrument_node="">Bottled water</span></h4><p data-dcnode-id="1722"><span data-dcnode-id="1726" instrument_node="">The NPV results, reported in Table&nbsp;</span><a data-dcnode-id="1724" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab6"><span data-dcnode-id="1725" instrument_node="">6</span></a><span data-dcnode-id="1723" instrument_node="">, show the added value created by an AWG system in each city if the AWG is used as an alternative to bottled drinking water. The IRR values indicate the IRR for investing in a single AWG system as a 4-year project. The results support the idea that AWG may indeed be economically attractive in various regions to compete in the bottled water market. We can see that Aruba Island shows the most financial promise with a notably attractive NPV value of $6270. Austin and San Diego are the most economically attractive among the US cities with NPV values of $3450 and $665, respectively.</span></p><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">As for the cities located in the Middles East, we can see that the financial promise is not as great as the performance outcomes would suggest. Dubai shows the highest potential with an NPV value of $140; however, Kuwait City, Doha, and Bandar Abbas are areas that result in a negative NPV from investing in AWG. Interestingly, Doha, Dubai, and Bandar Abbas produce more water than the likes of Austin and San Diego, yet they do not confer the same level of financial promise. Government subsidies for water, along with a generally lower labor cost compared to the US, will result in cheaper regional bottled waters prices. Thus, the relative added value generated by utilizing AWG in these regions would be lower.</span></p><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">The results indicate that several locations (e.g., Aruba, Austin, San Diego, and Dubai) may indeed be profitable markets to establish AWG as an alternative to bottled water.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1716" id="Sec29"><span data-dcnode-id="1717" instrument_node="">Tap water</span></h4><p data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">Table&nbsp;</span><a data-dcnode-id="1713" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab8"><span data-dcnode-id="1714" instrument_node="">8</span></a><span data-dcnode-id="1712" instrument_node=""> illustrates that AWG is in no way an economically viable replacement for tap water. The considerable negative NPV of $-3740 tells us that AWG cannot market itself as a financially viable replacement for tap water. From a micro prospective, this finding indicates that as of now, AWG can only operate in the premium water markets(consumer bottled water, science labs, etc.). This means that local tap water quality, and regional bottled water consumption could potentially help decision makers identify suitable markets for AWG. Moreover, factors like water quality (taste, smell, PH and KH levels) and supply chain efficiency could play an important role in determining the success or failure of AWG products in the marketplace. From a macro-prospective, this result indicates that potential contributions of AWG toward solving the global water crisis would be very limited, at least in the near future. That said, there are a few ongoing trends that could favor AWG’s fortune in the near future: (1) The global water crisis along with the increase in population (demand) will most likely cause the water prices to increase even more. This would favor more expensive alternatives such as AWG. (2) One of the main reasons that tap water prices are generally low is the government subsidies dedicated to installing and maintaining the required water infrastructure. AWG may appear as an attractive option if it could save millions of dollars for a city that is looking to maintain its old water infrastructure or build a new one. Parallel examination of implementing decentralized large-scale AWG with respect to water infrastructure installation in future literature could be an interesting subject to pursue. (3) Technological progress specially in terms of improving the energy efficiency in AWG could considerably help AWG’s prospect. We should note that AWG is still a fairly young industry with limited resources dedicated to research and development.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1709" id="Sec30"><span data-dcnode-id="1710" instrument_node="">Risk analysis of AWG</span></h3><p data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">The results in Table&nbsp;</span><a data-dcnode-id="1706" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab7"><span data-dcnode-id="1707" instrument_node="">7</span></a><span data-dcnode-id="1705" instrument_node=""> provide a look from two perspectives on the risks associated with AWG. The last column shows the probability of having days where using AWG is nonprofitable in each city. In those days, the costs endured for electricity and maintenance are more than the value of the produced water (with accordance to regional bottled water prices). The highest risk, according to this indicator, belongs to New York City. AWG operating in New York would endure loss on 13% of the days. Hence, AWG is not an all-year-long solution if utilized in New York. Further analysis to identify the negative cash flow days in advance would enhance the financial outlook of AWG, especially in cities like New York with great risks from this aspect. This risk indicator is relatively minimal in cities like Aruba, Austin, and San Diego. However, if AWG is chosen to be utilized in San Diego or Austin on a large scale, reducing the 4.5% percent risk factor can increase the profit margin. Thus, further analysis to predict the regional negative cash flow days could prove to be quite beneficial.</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1703" instrument_node="">The other risk indicator examined in this study addresses the regional volatility of AWG’s production. The intermittent seasonal performance of AWG, discussed in "</span><a data-dcnode-id="1701" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec26"><span data-dcnode-id="1702" instrument_node="">Performance analysis</span></a><span data-dcnode-id="1700" instrument_node="">" section, is represented by the large standard deviation values in Table&nbsp;</span><a data-dcnode-id="1698" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab7"><span data-dcnode-id="1699" instrument_node="">7</span></a><span data-dcnode-id="1697" instrument_node="">. Hence, the 97.5% percentile confidence level, i.e., the 2</span><span class="mathjax-tex" data-dcnode-id="1692"><span class="MathJax_Preview" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">\sigma</span></span></span><span data-dcnode-id="1691" instrument_node=""> level, is fairly low for most locations. In other words, the majority of locations face a non-trivial risk of not producing sufficient water.</span></p><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">However, some of the 83.7% confidence levels appear to be more satisfying for some of our more favorable locations like San Diego and Doha. Moreover, Aruba island shows a prominent production level confidence by producing more than 9.55 L per day 97.5% of the times. Aruba Island is again showing to be an attractive destination for AWG implementation, this time from a risk prospective.</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Another notable point is the relative consistency of the AWG performance in Seattle. Although AWG’s production and financial projection in Seattle are not the most promising ones, the machine has steady performance. Hence, it would most likely be easier to plan for the implementation of AWG in Seattle. In summary, performance consistency and production confidence levels are essential parameters to be considered for the application of the AWG. Subsequently, cities with higher volatility require more complex planning and deeper analysis.</span></p></div></div></section><section data-dcnode-id="1632" data-title="Caveats and limitations"><div class="c-article-section" data-dcnode-id="1633" id="Sec31-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1681" id="Sec31"><span data-dcnode-id="1682" instrument_node="">Caveats and limitations</span></h2><div class="c-article-section__content" data-dcnode-id="1634" id="Sec31-content"><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">We conclude our study by discussing some of the caveats, simplifying assumptions, and the limitations of this study. The goal is to highlight the boundaries within which the results of this paper should be interpreted.</span></p><p data-dcnode-id="1670"><i data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Focus mainly on bottled drinking water</span></i><span data-dcnode-id="1676" instrument_node=""> We mostly examine AWG as an alternative to bottled drinking water. Thus, we abstract from the potential applications of AWG for nondrinking purposes, including advanced and precision agriculture in urban environments, personal hygiene, and health care. Moreover, we did not explore other outside options beyond the bottled water and a single region potable tap water examination.</span><sup data-dcnode-id="1671"><a data-dcnode-id="1672" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Footnote </span></span><span data-dcnode-id="1673" instrument_node="">12</span></a></sup></p><p data-dcnode-id="1666"><i data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Cogeneration of water and cool air</span></i><span data-dcnode-id="1667" instrument_node=""> We only focused on the water output of an AWG machine. More sophisticated models of the AWG system can simultaneously produce water and cool air. The double-dividend nature of the cogeneration will increase the attractiveness of the technology.</span></p><p data-dcnode-id="1662"><i data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Water and energy prices</span></i><span data-dcnode-id="1663" instrument_node=""> The bottled water prices, potable tap water rates and energy rates have been assumed as constant values during the 4-year period. Hence, the fluctuation of these prices is not taken into account. Taking into account the energy rate trends and water price shifts can contribute to uncovering a more comprehensive economic analysis in the future.</span></p><p data-dcnode-id="1658"><i data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Model calibration</span></i><span data-dcnode-id="1659" instrument_node=""> The data used for developing the performance and energy model are based on a specific AWG product. It is assumed that other AWG products with the same scale would have similar performances.</span></p><p data-dcnode-id="1654"><i data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Data frequency</span></i><span data-dcnode-id="1655" instrument_node=""> The temperature and humidity used to develop and test the models are daily averages. Thus, they smooth out any intra-day variation of the performance. It is assumed that these factors are constant during the daily 24 hour period.</span></p><p data-dcnode-id="1650"><i data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">Minimum performance</span></i><span data-dcnode-id="1651" instrument_node=""> It is assumed that the consumer will not face water scarcity on bad performance days of AWG. This would be due to either the storage from previous days or using an alternative in case of water shortage. However, since the economic analysis is based on the bottled water as the comparing alternative, this assumption would not impact the relative estimations derived or the financial promise of AWG.</span></p><p data-dcnode-id="1646"><i data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Return to scale</span></i><span data-dcnode-id="1647" instrument_node=""> Our study assumes the user invests in a single machine. It is also assumed there is a constant return to scale, meaning that buying more machines or machines with larger capacity will not change the marginal cost of producing water. The constant return-to-scale assumption seems reasonable for small-scale production plans. However, if the production takes place at the industrial scale, the costs may be smaller than what is estimated in this paper.</span></p><p data-dcnode-id="1642"><i data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Indoor humidity</span></i><span data-dcnode-id="1643" instrument_node=""> It is assumed that the AWG would be placed in a free airflow environment. In other words, all the data used in this study are based on that assumption; meaning that AWG’s performance in a closed environment would be different.</span></p><p data-dcnode-id="1635"><i data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Risk modeling</span></i><span data-dcnode-id="1639" instrument_node=""> We approximate the performance of the machine over the 4-year period by a normal distribution. This allows us to generate explicit rules for the critical threshold. However, if the empirical distribution in a location is significantly different than normal, one should use alternative parametric assumptions. Plots in&nbsp;Appendix </span><a data-dcnode-id="1637" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec37"><span data-dcnode-id="1638" instrument_node="">E</span></a><span data-dcnode-id="1636" instrument_node=""> suggest that a more sophisticated and detailed risk modeling can be the topic for a future research paper.</span></p></div></div></section><section data-dcnode-id="1596" data-title="Conclusion and future work"><div class="c-article-section" data-dcnode-id="1597" id="Sec32-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1630" id="Sec32"><span data-dcnode-id="1631" instrument_node="">Conclusion and future work</span></h2><div class="c-article-section__content" data-dcnode-id="1598" id="Sec32-content"><p data-dcnode-id="1609"><span data-dcnode-id="1629" instrument_node="">The economics of the drinking water industry is worth careful attention from the environmental and resource policy community. Water prices in 30 major cities of the USA have increased more than 50% since 2010, a considerable change.</span><sup data-dcnode-id="1624"><a data-dcnode-id="1625" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Footnote </span></span><span data-dcnode-id="1626" instrument_node="">13</span></a></sup><sup data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">,</span></sup><span data-dcnode-id="1621" instrument_node=""> </span><sup data-dcnode-id="1616"><a data-dcnode-id="1617" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Footnote </span></span><span data-dcnode-id="1618" instrument_node="">14</span></a></sup><span data-dcnode-id="1615" instrument_node=""> The bottled water industry, the largest soft drink product in terms of volume, is valued over $200 billion. The industry is estimated to grow approximately 10% a year, and this would put its value around $350 billion by 2021.</span><sup data-dcnode-id="1610"><a data-dcnode-id="1611" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Footnote </span></span><span data-dcnode-id="1612" instrument_node="">15</span></a></sup></p><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Although AWG is not a new technology, the academic literature on assessing its economic/financial performance is limited. The existing scholarly work is mainly focused on technical aspects. Thus, there is a need for further insights on the economic and policy dimensions. Our paper takes one of the first steps toward assessing whether AWG can be an economically viable component of the global water solutions portfolio. We present a calibrated bottom-up model and apply it to a diverse set of geographical regions. The economic analysis provides estimates of AWG’s investment risk and returns.</span></p><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Our results suggest that AWG technology has the potential to be a drinking water product as an alternative to bottled water in areas, with favorable climate and energy prices. However, the results also suggest that as of now, AWG can probably only operate in the premium water market (bottled water, lab water, etc.) due to its relatively expensive pricing. AWG would have to become considerably more cost efficient to compete in the clean tap water or the nondrinking water market. Hence, in the large scheme of things, AWG’s role as a globally contributing source of water , would most likely be fairly limited in the near future. That said, various regions do not have access to clean tap water and the government subsidies that support reliable water infrastructure. Moreover, the mentioned premium water market like bottled water is continuously growing as the population grows and water infrastructure ages. So, AWG’s role as part of the global water solutions portfolio although very limited, has the potential to become larger than it is today.</span></p><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">The results show that AWG achieves its best performance in regions that have constant warm and humid weathers. As an example, Aruba Island demonstrates the most attractive performance among the set of regions studied in this paper. Regions that have large bottled water consumer base and unfavorable tap water sources would be an attractive starting market for AWG. To add on, higher prices of bottled water and cheaper energy rates contribute to AWG’s profit margin at each city. The framework provided in this paper can be utilized by future researchers as a benchmark tool to examine AWG under heterogeneous environmental and economic conditions. Our findings can also provide quantitative reference points for AWG as an alternative water harvesting method in future policy, environmental and economic debates seeking to address the global water problem.</span></p><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">In addition to topics proposed in previous sections, the current study can be extended in multiple other directions. First, a richer set of data could be collected to further improve the precision and flexibility of the performance prediction model. Examining a potential hybrid system consisting of rain harvesting systems and AWG can be interesting as well. Also, comparing the environmental impacts of AWG and bottled water like plastic waste or carbon footprints in each of the alternatives is an issue worth addressing in the future. Moreover, conducting a parallel examination of large-scale AWG with respect to installing new water infrastructure or maintaining old ones can be a major step in understanding AWG’s potential from a macro-prospective.</span></p><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Finally, our study abstracted from various policy aspects. Future work can consider the optimal taxation/subsidy schemes to support the efficient use of AWG systems at household and commercial applications.</span></p></div></div></section><span data-dcnode-id="1595" instrument_node="">
</span><section data-dcnode-id="1494" data-title="Notes"><div class="c-article-section" data-dcnode-id="1495" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1593" id="notes"><span data-dcnode-id="1594" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1496" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1497"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1586" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1587"><p data-dcnode-id="1588"><span data-dcnode-id="1592" instrument_node="">An extensive search in the major environmental and resource economics and policy journals did not produce any results on AWG or related topics. Wahlgren (</span><a aria-label="Reference 2018" data-dcnode-id="1590" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280367303e489" title="Wahlgren RV (2018) Water-from-air quick guide. CreateSpace Independent Publishing Platform, Scotts Valley"><span data-dcnode-id="1591" instrument_node="">2018</span></a><span data-dcnode-id="1589" instrument_node="">) is close to our work in some aspects but it is written mainly for a practitioner audience.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1573" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1574"><p data-dcnode-id="1575"><span data-dcnode-id="1585" instrument_node="">“Radiative passive collectors exploit the physical processes responsible for dew formation to collect dew water without using any external energy input. Previous studies indicate that a 1</span><span class="mathjax-tex" data-dcnode-id="1580"><span class="MathJax_Preview" data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">m^2</span></span></span><span data-dcnode-id="1579" instrument_node=""> radiative condenser yields between 0.3 and 0.6 L/day of dew water in arid and semiarid regions” (Khalil et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="1577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d280367303e548" title="Khalil B, Adamowski J, Shabbir A, Jang C, Rojas M, Reilly K, Ozga-Zielinski B (2016) A review: dew water collection from radiative passive collectors to recent developments of active collectors. Sustain Water Resour Manag 2(1):71–86"><span data-dcnode-id="1578" instrument_node="">2016</span></a><span data-dcnode-id="1576" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="1566" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="1567"><p data-dcnode-id="1568"><span data-dcnode-id="1572" instrument_node="">Regions that experience stress with regard to drinking water also suffer from other issues such as low per capita income and poor access to energy poverty (Van&nbsp;Houtven et&nbsp;al. </span><a aria-label="Reference 2017" data-dcnode-id="1570" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280367303e573" title="Van Houtven GL, Pattanayak SK, Usmani F, Yang JC (2017) What are households willing to pay for improved water access? Results from a meta-analysis. Ecol Econ 136:126–135"><span data-dcnode-id="1571" instrument_node="">2017</span></a><span data-dcnode-id="1569" instrument_node="">). That makes AWG a less desirable solution for such regions.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="1562" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="1563"><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">The elevation heterogeneity of regions considered in this study is small.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="1556" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="1557"><p data-dcnode-id="1558"><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.atmosphericwatersolutions.com/aquaboy-pro-ii"><span data-dcnode-id="1561" instrument_node="">https://www.atmosphericwatersolutions.com/aquaboy-pro-ii</span></a><span data-dcnode-id="1559" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="1550" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="1551"><p data-dcnode-id="1552"><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bwnews.pr/2GiGfQ6"><span data-dcnode-id="1555" instrument_node="">https://bwnews.pr/2GiGfQ6</span></a><span data-dcnode-id="1553" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="1540" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="1541"><p data-dcnode-id="1542"><span data-dcnode-id="1549" instrument_node="">See these links: </span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wunderground.com/"><span data-dcnode-id="1548" instrument_node="">https://www.wunderground.com</span></a><span data-dcnode-id="1546" instrument_node="">, and, </span><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weather.com/"><span data-dcnode-id="1545" instrument_node="">https://www.weather.com</span></a><span data-dcnode-id="1543" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="1534" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="1535"><p data-dcnode-id="1536"><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/e/empirical-rule.asp"><span data-dcnode-id="1539" instrument_node="">https://www.investopedia.com/terms/e/empirical-rule.asp</span></a><span data-dcnode-id="1537" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="1528" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="1529"><p data-dcnode-id="1530"><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tcwcid19.org/rates-and-fees"><span data-dcnode-id="1533" instrument_node="">https://tcwcid19.org/rates-and-fees</span></a><span data-dcnode-id="1531" instrument_node="">- Travis County Water Control and Improvement District No. 19.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="1524" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="1525"><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">The model is independent of the level of temperature and humidity. Our knowledge of the literature does not suggest that those factors are key determinants of energy use. Hence, we employ our experimental data to predict energy use in other locations.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="1518" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="1519"><p data-dcnode-id="1520"><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecoloblueblog.com/tag/power-consumption/"><span data-dcnode-id="1523" instrument_node="">https://www.ecoloblueblog.com/tag/power-consumption/</span></a><span data-dcnode-id="1521" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="12." data-dcnode-id="1514" id="Fn12"><div class="c-article-footnote--listed__content" data-dcnode-id="1515"><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">In arid regions, such as the Persian Gulf cities, bottled water is indeed the major source of potable water.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="13." data-dcnode-id="1508" id="Fn13"><div class="c-article-footnote--listed__content" data-dcnode-id="1509"><p data-dcnode-id="1510"><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.circleofblue.org/waterpricing/"><span data-dcnode-id="1513" instrument_node="">https://www.circleofblue.org/waterpricing/</span></a><span data-dcnode-id="1511" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="14." data-dcnode-id="1504" id="Fn14"><div class="c-article-footnote--listed__content" data-dcnode-id="1505"><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Note that, except a few regions, the USA as a whole is not subject to major water scarcity. Thus, the observed numbers could have been higher should the USA was a more water-stressed country.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="15." data-dcnode-id="1498" id="Fn15"><div class="c-article-footnote--listed__content" data-dcnode-id="1499"><p data-dcnode-id="1500"><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.marketresearch.com/the-global-bottled-water-market-expert-insights-statistics"><span data-dcnode-id="1503" instrument_node="">https://blog.marketresearch.com/the-global-bottled-water-market-expert-insights-statistics</span></a><span data-dcnode-id="1501" instrument_node="">.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1254" id="MagazineFull ref-CR3" id="ref-link-section-d280367303e5492" title="Almusaied Z, Asiabanpour B (2017) Atmospheric water generation: Technologies and influential factors. In: IIE Annual conference proceedings, pp 1448–1453, copyright—Copyright Institute of Industrial and Systems Engineers (IISE) 2017; Last updated 2018-02-01"><span data-dcnode-id="1125" instrument_node="">2017</span></a><span data-dcnode-id="1123" instrument_node="">). Vaporized </span><span class="mathjax-tex" data-dcnode-id="1118"><span class="MathJax_Preview" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">\hbox {H}_{{2}}</span></span></span><span data-dcnode-id="1117" instrument_node="">O in the air is absorbed and condensed below its dew point to generate liquid water. The AWG system used in this study is commercially available and produces and filters water, so that clean, potable water is available where the AWG system is located. The system includes a fan, condenser coil, pump, and multiple stages of filters. The fan pulls the air into the system and across condenser coils that have been cooled using a compressor and coolant. This water then drips into a tank where it is treated with ultraviolet (UV) light and is then pumped to an upper tank through many more filters prior to dispensing. This system also offers hot and cold water options and has a screen that displays current temperature and humidity as well as the available amount of water. A simple diagram of the system is shown in Fig.&nbsp;</span><a data-dcnode-id="1115" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig8"><span data-dcnode-id="1116" instrument_node="">8</span></a><span data-dcnode-id="1114" instrument_node="">. Due to the objectives of this paper, the technical aspect of AWG will not be subject to further discussion.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1089" data-test="figure" data-title="Fig. 8" id="figure-8"><figure data-dcnode-id="1090"><figcaption data-dcnode-id="1110"><b class="c-article-section__figure-caption" data-dcnode-id="1111" data-test="figure-caption-text" id="Fig8"><span data-dcnode-id="1112" instrument_node="">Fig. 8</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1101"><div class="c-article-section__figure-item" data-dcnode-id="1105"><a class="c-article-section__figure-link" data-dcnode-id="1106" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/8" rel="nofollow"><picture data-dcnode-id="1107"><source data-dcnode-id="1109" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10098-020-02015-6/MediaObjects/10098_2020_2015_Fig8_HTML.png?as=webp" type="image/webp"><img alt="figure 8" aria-describedby="Fig8" data-dcnode-id="1108" height="511" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10098-020-02015-6/MediaObjects/10098_2020_2015_Fig8_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1102" data-test="bottom-caption" id="figure-8-desc"><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">AWG breakdown</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1091"><a aria-label="Full size image figure 8" class="c-article__pill-button" data-dcnode-id="1092" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure8 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/8" rel="nofollow"><span data-dcn
