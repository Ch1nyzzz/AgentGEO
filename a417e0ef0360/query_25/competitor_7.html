</span><meta content="The increasing pressure on freshwater resources motivates the need for exploring new water harvesting methods, critical for global sustainable development. Atmospheric water generator (AWG), or air to water, is a potential under-explored component of the water solutions portfolio. This paper offers the first bottom-up model of AWG in the environmental economics and policy literature to assess the economic potential and riskiness of a representative AWG system. The model is used to estimate the performance of a typical AWG machine in ten locations with heterogeneous climate and economic conditions. Using a 4-year time series, estimates of the value at risk for water production are provided as well. Assuming a perfect substitution between AWG machines and bottled water, the financial performance of the AWG machines demonstrates an attractive substitute product in the majority of locations. However, the results also indicate that the current state of AWG does not provide economically viable alternatives for potable tap water or nondrinking water sources. This paper provides a quantitative foundation to evaluate the AWG technology as a business practice. Our work can inform water supply debates in both developed and developing countries." data-dcnode-id="3508" name="dc.description"><span data-dcnode-id="3507" instrument_node="">

</span><meta content="Is atmospheric water generation an economically viable solution? - Clean Technologies and Environmental Policy" data-dcnode-id="3336" property="og:title"><span data-dcnode-id="3335" instrument_node="">
</span><meta content="Abstract The increasing pressure on freshwater resources motivates the need for exploring new water harvesting methods, critical for global sustainable development. Atmospheric water generator (AWG), or air to water, is a potential under-explored component of the water solutions portfolio. This paper offers the first bottom-up model of AWG in the environmental economics and policy literature to assess the economic potential and riskiness of a representative AWG system. The model is used to estimate the performance of a typical AWG machine in ten locations with heterogeneous climate and economic conditions. Using a 4-year time series, estimates of the value at risk for water production are provided as well. Assuming a perfect substitution between AWG machines and bottled water, the financial performance of the AWG machines demonstrates an attractive substitute product in the majority of locations. However, the results also indicate that the current state of AWG does not provide economically viable alternatives for potable tap water or nondrinking water sources. This paper provides a quantitative foundation to evaluate the AWG technology as a business practice. Our work can inform water supply debates in both developed and developing countries. Graphic Abstract" data-dcnode-id="3334" property="og:description"><span data-dcnode-id="3333" instrument_node="">

</span><section data-dcnode-id="2855" data-gtm-vis-first-on-screen-50443292_562="1497" data-gtm-vis-first-on-screen-50443292_563="1510" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1497" data-gtm-vis-recent-on-screen-50443292_563="1510" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" lang="en"><div class="c-article-section" data-dcnode-id="2856" id="Abs1-section"><div class="c-article-section__content" data-dcnode-id="2857" id="Abs1-content"><h3 class="c-article__sub-heading" data-dcnode-id="2871" data-test="abstract-sub-heading"><span data-dcnode-id="2872" instrument_node="">Abstract</span></h3><p data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">The increasing pressure on freshwater resources motivates the need for exploring new water harvesting methods, critical for global sustainable development. Atmospheric water generator (AWG), or air to water, is a potential under-explored component of the water solutions portfolio. This paper offers the first bottom-up model of AWG in the environmental economics and policy literature to assess the economic potential and riskiness of a representative AWG system. The model is used to estimate the performance of a typical AWG machine in ten locations with heterogeneous climate and economic conditions. Using a 4-year time series, estimates of the value at risk for water production are provided as well. Assuming a perfect substitution between AWG machines and bottled water, the financial performance of the AWG machines demonstrates an attractive substitute product in the majority of locations. However, the results also indicate that the current state of AWG does not provide economically viable alternatives for potable tap water or nondrinking water sources. This paper provides a quantitative foundation to evaluate the AWG technology as a business practice. Our work can inform water supply debates in both developed and developing countries.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2867" data-test="abstract-sub-heading"><span data-dcnode-id="2868" instrument_node="">Graphic Abstract</span></h3><span data-dcnode-id="2866" instrument_node="">
</span><figure data-dcnode-id="2859"><div class="c-article-section__figure" data-container-section="figure" data-dcnode-id="2860" data-gtm-vis-first-on-screen-50443292_561="1497" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="1497" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure"><div class="c-article-section__figure-content" data-dcnode-id="2861"><div class="c-article-section__figure-item" data-dcnode-id="2862"><picture data-dcnode-id="2863"><source data-dcnode-id="2865" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10098-020-02015-6/MediaObjects/10098_2020_2015_Figa_HTML.png?as=webp" type="image/webp"><img alt="" data-dcnode-id="2864" height="385" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10098-020-02015-6/MediaObjects/10098_2020_2015_Figa_HTML.png&amp;raw" width="685"></picture></div></div></div></figure><span data-dcnode-id="2858" instrument_node="">
</span></div></div></section><span data-dcnode-id="2854" instrument_node="">
</span><section data-dcnode-id="2747" data-gtm-vis-first-on-screen-50443292_562="1498" data-gtm-vis-first-on-screen-50443292_563="1510" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1498" data-gtm-vis-recent-on-screen-50443292_563="1510" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2748" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2852" id="Sec1"><span data-dcnode-id="2853" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2749" id="Sec1-content"><p data-dcnode-id="2847"><span data-dcnode-id="2851" instrument_node="">The UN World Water Development Report states that more than 2 billion people currently lack access to safe drinking water. The global demand for water has been increasing by approximately 1% per year, as a result of factors such as the population growth, economic development, and changing consumption patterns. The demand for freshwater will continue to grow by nearly one-third by the year 2050 (Houngbo </span><a aria-label="Reference 2018" data-dcnode-id="2849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d280367303e467" title="Houngbo GF (2018) The United Nations world water development report 2018: nature-based solutions for water. 
                  https://www.unwater.org/publications/world-water-development-report-2018/
                  
                "><span data-dcnode-id="2850" instrument_node="">2018</span></a><span data-dcnode-id="2848" instrument_node="">). The temporal and spatial distribution of freshwater supply is also reshuffled due to climate change.</span></p><p data-dcnode-id="2839"><span data-dcnode-id="2846" instrument_node="">As a result of several forces, many places in the globe face water shortage for domestic use as well as for food production. The same UN report states that an estimated 3.6 billion people—nearly half the global population—reside in areas that are potentially water scarce at least one month per year. Water scarcity not only creates major threats for food security but also is hindering economic growth (Distefano and Kelly </span><a aria-label="Reference 2017" data-dcnode-id="2844" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d280367303e473" title="Distefano T, Kelly S (2017) Are we in deep water? Water scarcity and its limits to economic growth. Ecol Econ 142:130–147"><span data-dcnode-id="2845" instrument_node="">2017</span></a><span data-dcnode-id="2843" instrument_node="">) and causing sociopolitical tensions (Molden et&nbsp;al. </span><a aria-label="Reference 2007" data-dcnode-id="2841" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d280367303e476" title="Molden D, de Fraiture C, Rijsberman F (2007) Water scarcity: the food factor. Issues Sci Technol 23(4):39–48"><span data-dcnode-id="2842" instrument_node="">2007</span></a><span data-dcnode-id="2840" instrument_node="">). Thus, exploring new methods of water harvesting, supplying, and storage is critical to be able to overcome expected challenges. Hence, a variety of technological and organizational solutions—ranging from waste management to the bottled water industry—are emerging.</span></p><p data-dcnode-id="2829"><span data-dcnode-id="2838" instrument_node="">In this paper, we provide a bottom-up economic analysis of atmospheric water generator (AWG), an untapped source of providing clean water (Milani et&nbsp;al. </span><a aria-label="Reference 2010" data-dcnode-id="2836" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d280367303e482" title="Milani D, Abbas A, Al Bakri D (2010) Sustainable solutions to our water crisis: generating freshwater from thin air. Water infrastructure for sustainable communities. China and the World IWA Publishing, London, pp 127–140"><span data-dcnode-id="2837" instrument_node="">2010</span></a><span data-dcnode-id="2835" instrument_node="">). We seek to understand AWG as a business practice and provide some insights with regard to the possible contributions it can have to help with the ongoing global water crisis. A key challenge in making a data-driven analysis of the technology is the limited amount of performance data and models. One of the objectives of this paper is to introduce a model that can represent the performance of an AWG machine in different climates. Despite a sizable technical literature on the topic, to the best of our knowledge, this paper is the first academic accounts of the topic.</span><sup data-dcnode-id="2830"><a data-dcnode-id="2831" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Footnote </span></span><span data-dcnode-id="2832" instrument_node="">1</span></a></sup></p><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">We combine experimental and published performance data to calibrate water production and energy use models. The calibrated models are then utilized to simulate the performance of AWG in ten different cities with diverse climatic features. The simulation is conducted using 4-year historical daily temperature and humidity observations in each location. The simulated performance and energy use are finally used to estimate the economic performance and the risks of the system.</span></p><p data-dcnode-id="2801"><span data-dcnode-id="2826" instrument_node="">AWG systems generate clean water from vaporized </span><span class="mathjax-tex" data-dcnode-id="2821"><span class="MathJax_Preview" data-dcnode-id="2824"><span data-dcnode-id="2825" instrument_node="">\hbox {H}_{{2}}</span></span></span><span data-dcnode-id="2820" instrument_node="">O in the atmosphere. As opposed to the older radiative passive collectors technology, AWG systems generate water using additional energy inputs.</span><sup data-dcnode-id="2815"><a data-dcnode-id="2816" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">Footnote </span></span><span data-dcnode-id="2817" instrument_node="">2</span></a></sup><span data-dcnode-id="2814" instrument_node=""> The declining quality of tap water (Tratras&nbsp;Contis </span><a aria-label="Reference 2016" data-dcnode-id="2812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d280367303e553" title="Tratras&nbsp;Contis E (2016) Water: global issues, local solutions. In: Chemistry without borders: careers, research, and entrepreneurship. American Chemical Society, pp 57–76"><span data-dcnode-id="2813" instrument_node="">2016</span></a><span data-dcnode-id="2811" instrument_node="">) and the increasing demand for bottled water (Brei </span><a aria-label="Reference 2018" data-dcnode-id="2809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d280367303e556" title="Brei VA (2018) How is a bottled water market created? Wiley Interdiscip Rev Water 5(1):e1220"><span data-dcnode-id="2810" instrument_node="">2018</span></a><span data-dcnode-id="2808" instrument_node="">) motivates the search for new solutions for obtaining drinking water. As an off-grid and stand-alone technology, AWG can produce water in the place of installment (as opposed to transporting it from another location). The system is also used for emergency water supply in the time of natural disasters, the alternative to urban water in the case of perceived health risks, and for supplying water to law enforcement and military troops (Wahlgren </span><a aria-label="Reference 2018" data-dcnode-id="2806" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280367303e559" title="Wahlgren RV (2018) Water-from-air quick guide. CreateSpace Independent Publishing Platform, Scotts Valley"><span data-dcnode-id="2807" instrument_node="">2018</span></a><span data-dcnode-id="2805" instrument_node="">). For a brief technical description of a representative AWG system, see </span><a data-dcnode-id="2803" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec33"><span data-dcnode-id="2804" instrument_node="">A</span></a><span data-dcnode-id="2802" instrument_node="">.</span></p><p data-dcnode-id="2794"><span data-dcnode-id="2800" instrument_node="">AWG offers multiple ecological, health, and economic advantages. It allows water to be produced in various locations. Its performance is independent of regional stationary water resources. Due to its decentralized production method, diseases borne by existing water sources will not spread. There is no need to transport and store water as the water is produced when and where it is needed. Moreover, unlike desalination technology, AWG does not generate major harmful waste (e.g., saline water). Since the atmospheric humidity is freely available, the input to the machine will renew constantly. The economic benefit can also be enhanced by using the cold air generated in the condensation process for the air-conditioning of buildings (i.e., a double-dividend strategy). As a caution, given that AWG is an energy-intensive technology, the production can only be considered as fully sustainable if the user has access to a low-cost and clean source of energy such as solar and wind. The cleaner the source of energy is, the closer is the AWG system to a sustainable source of water.</span><sup data-dcnode-id="2795"><a data-dcnode-id="2796" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Footnote </span></span><span data-dcnode-id="2797" instrument_node="">3</span></a></sup></p><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Despite its potentials, the dissemination of the AWG technology in the drinking water (also in the agriculture) sectors has been slow. AWG, as a whole, is an emerging industry. The core technology of AWG is relatively simple and has been known for a long time. However, the economic evaluation, the risk analysis, and policy decisions on this technology are all new topics for environmental and water resource economics debates.</span></p><p data-dcnode-id="2781"><span data-dcnode-id="2791" instrument_node="">The efficiency of AWG varies in a wide range depending on factors such as humidity, temperature, and the technology used in the membrane system (Almusaied and Asiabanpour </span><a aria-label="Reference 2017" data-dcnode-id="2789" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d280367303e583" title="Almusaied Z, Asiabanpour B (2017) Atmospheric water generation: Technologies and influential factors. In: IIE Annual conference proceedings, pp 1448–1453, copyright—Copyright Institute of Industrial and Systems Engineers (IISE) 2017; Last updated 2018-02-01"><span data-dcnode-id="2790" instrument_node="">2017</span></a><span data-dcnode-id="2788" instrument_node="">; Moghimi et&nbsp;al. </span><a aria-label="Reference 2019" data-dcnode-id="2786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d280367303e586" title="Moghimi F, Ghoddusi H, Asiabanpour B, Behroozikhah M (2019) Atmospheric water generation (awg): performance model and economic analysis. In: IFIP international conference on advances in production management systems, Springer, pp 151–158"><span data-dcnode-id="2787" instrument_node="">2019</span></a><span data-dcnode-id="2785" instrument_node="">). Thus, to find the set of feasible locations for using AWG, several parameters should be taken into account (Asiabanpour et&nbsp;al. </span><a aria-label="Reference 2019" data-dcnode-id="2783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d280367303e589" title="Asiabanpour B, Ownby N, Summers M, Moghimi F (2019) Atmospheric water generation and energy consumption: an empirical analysis. In: 2019 IEEE Texas power and energy conference (TPEC), pp 1–6. IEEE"><span data-dcnode-id="2784" instrument_node="">2019</span></a><span data-dcnode-id="2782" instrument_node="">). A small-size AWG which produces an average of 14 L/day in a particular region may only produce 2 L/day at the same location in the case of adverse realizations of environmental factors. Such variation in the output performance motivates our effort to build a stylized model to quantify the impact of various environmental factors on the performance of AWG systems.</span></p><p data-dcnode-id="2776"><span data-dcnode-id="2780" instrument_node="">We also consider the volatility in the performance of AWG systems, an absent aspect in the previous literature. AWG systems face a set of random inputs (e.g., temperature and humidity), random productions costs (e.g., electricity prices), and random outside options (e.g., water prices). Such randomness not only requires a risk analysis but also motivates considering AWG as </span><i data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">real options </span></i><span data-dcnode-id="2777" instrument_node="">. We only focus on the risk analysis in this paper and propose a real-options valuation as a topic for future research.</span></p><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">From a policy perspective, the optimal support for the penetration of AWG systems demonstrates interesting trade-offs, similar to ones observed in intermittent renewable energy sources. On the one hand, a subsidy on purchasing AWG or on the electricity prices may bring about social benefits such as reduced investment on water infrastructure, less harm to the environment, and the lowered health risk. On the other hand, high penetration of AWG may increase the aggregate energy use, reduce the economy of scope/scale for alternative water resources, and impose fiscal burdens.</span></p><p data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">To summarize, (1) we model the production and the energy consumption of AWG for different environmental conditions and production levels. (2) We utilize the developed model to simulate the performance of AWG in ten distinct geographic locations. (3) The economic prospect of AWG is then examined in each location as an alternative to bottled water. (4) A regional AWG risk indicator is designed and utilized to provide insight to the risks of implementing AWG systems in different locations. (5) We then examine AWG as an alternative to tap water. (6) Finally, we use the results from each step to provide insights and form a deeper understanding of AWG as an industry and a business practice. Insights can be used to help business decisions and policy discussion revolving the water harvesting practice .</span></p><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Our paper offers several novel contributions to the literature on water resources and ecological economics. First, we provide one of the first academic paper on the economic analysis of AWG systems under different conditions using a quantified model. Second, the paper offers a risk-based view of AWG’s physical and economic performance, which has not been noted or analyzed before. Third, our paper covers a large set of regions with diverse features. We characterize the regions of feasible and unfeasible investment on AWG as a function of key parameters. Finally, our paper offers a policy/economics view to the problem, which distinguishes it from more engineering/technical papers in the literature.</span></p><p data-dcnode-id="2750"><span data-dcnode-id="2769" instrument_node="">The rest of this paper is organized as follows: "</span><a data-dcnode-id="2767" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="2768" instrument_node="">Literature review</span></a><span data-dcnode-id="2766" instrument_node="">" section provides a brief review of the prior literature. We introduce the models and methods in "</span><a data-dcnode-id="2764" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec3"><span data-dcnode-id="2765" instrument_node="">Methods and data</span></a><span data-dcnode-id="2763" instrument_node="">" section.&nbsp;"</span><a data-dcnode-id="2761" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec18"><span data-dcnode-id="2762" instrument_node="">Results</span></a><span data-dcnode-id="2760" instrument_node="">" section presents the results, and the analysis of results is reported in "</span><a data-dcnode-id="2758" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec25"><span data-dcnode-id="2759" instrument_node="">Discussion of results</span></a><span data-dcnode-id="2757" instrument_node="">" section.&nbsp;"</span><a data-dcnode-id="2755" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec31"><span data-dcnode-id="2756" instrument_node="">Caveats and limitations</span></a><span data-dcnode-id="2754" instrument_node="">" section explains the limitations and caveats of this research. Finally, we summarize the conclusions and propose topics for future research in "</span><a data-dcnode-id="2752" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec32"><span data-dcnode-id="2753" instrument_node="">Conclusion and future work</span></a><span data-dcnode-id="2751" instrument_node="">" section.</span></p></div></div></section><section data-dcnode-id="2670" data-gtm-vis-first-on-screen-50443292_562="1498" data-gtm-vis-first-on-screen-50443292_563="1510" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1498" data-gtm-vis-recent-on-screen-50443292_563="1510" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Literature review"><div class="c-article-section" data-dcnode-id="2671" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2745" id="Sec2"><span data-dcnode-id="2746" instrument_node="">Literature review</span></h2><div class="c-article-section__content" data-dcnode-id="2672" id="Sec2-content"><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Our paper is related to multiple strands of the literature on the nexus of water and energy as well as on the economics of potable water supply.</span></p><p data-dcnode-id="2726"><span data-dcnode-id="2742" instrument_node="">First of all, our paper contributes to the literature that focuses on the functionality of AWG systems and the impact of environmental factors on their performance (Hellström </span><a aria-label="Reference 1969" data-dcnode-id="2740" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d280367303e641" title="Hellström B (1969) Potable water extracted from the air report on laboratory experiments. J Hydrol 9(1):1–19"><span data-dcnode-id="2741" instrument_node="">1969</span></a><span data-dcnode-id="2739" instrument_node="">; Milani et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="2737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d280367303e644" title="Milani D, Qadir A, Vassallo A, Chiesa M, Abbas A (2014) Experimentally validated model for atmospheric water generation using a solar assisted desiccant dehumidification system. Energy Build 77:236–246"><span data-dcnode-id="2738" instrument_node="">2014</span></a><span data-dcnode-id="2736" instrument_node="">). Gido et&nbsp;al. (</span><a aria-label="Reference 2016" data-dcnode-id="2734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d280367303e647" title="Gido B, Friedler E, Broday DM (2016) Assessment of atmospheric moisture harvesting by direct cooling. Atmos Res 182:156–162"><span data-dcnode-id="2735" instrument_node="">2016</span></a><span data-dcnode-id="2733" instrument_node="">) developed models to predict the performance of the machine by introducing Moisture Harvesting Index (MHI) based on the environmental factors in their experiments. Tu et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d280367303e650" title="Tu Y, Wang R, Zhang Y, Wang J (2018) Progress and expectation of atmospheric water harvesting. Joule 2(8):1452–1475"><span data-dcnode-id="2732" instrument_node="">2018</span></a><span data-dcnode-id="2730" instrument_node="">) provides a recent review of the performance of various AWG technologies. Bagheri (</span><a aria-label="Reference 2018" data-dcnode-id="2728" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d280367303e653" title="Bagheri F (2018) Performance investigation of atmospheric water harvesting systems. Water Resour Ind 20:23–28"><span data-dcnode-id="2729" instrument_node="">2018</span></a><span data-dcnode-id="2727" instrument_node="">) reports the results of experiments to estimate the performance of AWG systems.</span></p><p data-dcnode-id="2712"><span data-dcnode-id="2725" instrument_node="">Several papers focus on design features that improve the performance of AWG systems. Bergmair et&nbsp;al. (</span><a aria-label="Reference 2014" data-dcnode-id="2723" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d280367303e659" title="Bergmair D, Metz S, de Lange H, van Steenhoven A (2014) System analysis of membrane facilitated water generation from air humidity. Desalination 339:26–33. 
                  https://doi.org/10.1016/j.desal.2014.02.007
                  
                , 
                  http://www.sciencedirect.com/science/article/pii/S0011916414000708
                  
                "><span data-dcnode-id="2724" instrument_node="">2014</span></a><span data-dcnode-id="2722" instrument_node="">) has reduced energy consumption through the use of membranes. Shourideh et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d280367303e662" title="Shourideh AH, Ajram WB, Lami JA, Haggag S, Mansouri A (2018) A comprehensive study of an atmospheric water generator using peltier effect. Therm Sci Eng Prog 6:14–26. 
                  https://doi.org/10.1016/j.tsep.2018.02.015
                  
                , 
                  http://www.sciencedirect.com/science/article/pii/S2451904917303098
                  
                "><span data-dcnode-id="2721" instrument_node="">2018</span></a><span data-dcnode-id="2719" instrument_node="">) has designed and sized different AWG system by considering the Peltier effect. Salek et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2717" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d280367303e665" title="Salek F, Moghaddam AN, Naserian MM (2018) Thermodynamic analysis and improvement of a novel solar driven atmospheric water generator. Energy Convers Manag 161:104–111. 
                  https://doi.org/10.1016/j.enconman.2018.01.066
                  
                , 
                  http://www.sciencedirect.com/science/article/pii/S0196890418300797
                  
                "><span data-dcnode-id="2718" instrument_node="">2018</span></a><span data-dcnode-id="2716" instrument_node="">), among others, aim to combine AWG with solar energy by the usage of solar-driven ammonia absorption refrigeration cycle. Magrini et&nbsp;al. (</span><a aria-label="Reference 2017" data-dcnode-id="2714" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d280367303e668" title="Magrini A, Cattani L, Cartesegna M, Magnani L (2017) Water production from air conditioning systems: some evaluations about a sustainable use of resources. Sustainability 9(8):1309"><span data-dcnode-id="2715" instrument_node="">2017</span></a><span data-dcnode-id="2713" instrument_node="">) suggest an optimization model for combining water production and air-conditioning.</span></p><p data-dcnode-id="2704"><span data-dcnode-id="2711" instrument_node="">Bagheri (</span><a aria-label="Reference 2018" data-dcnode-id="2709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d280367303e674" title="Bagheri F (2018) Performance investigation of atmospheric water harvesting systems. Water Resour Ind 20:23–28"><span data-dcnode-id="2710" instrument_node="">2018</span></a><span data-dcnode-id="2708" instrument_node="">) examines the performance of a residential AWG by implementing multiple experiments in a controlled environment. He categorizes the different environmental conditions to warm humid, cold humid, etc. The lab tests indicate that AWG performs best in warm, humid climates and performs worst in cold–dry conditions. Based on these observations, some primary indications are made on a few possible regions for potentially efficient AWG production based on monthly average weather conditions. Our study provides a comprehensive and detailed model with a thorough test in ten major cities, which mostly support Bagheri (</span><a aria-label="Reference 2018" data-dcnode-id="2706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d280367303e677" title="Bagheri F (2018) Performance investigation of atmospheric water harvesting systems. Water Resour Ind 20:23–28"><span data-dcnode-id="2707" instrument_node="">2018</span></a><span data-dcnode-id="2705" instrument_node="">) initial conclusion.</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2703" instrument_node="">Though the technical literature on this topic is relatively mature, the economics of the AWG system has rarely been examined by the previous literature. Exceptions are a few papers that determine possible break-even points for the particular use of AWG. For example, Emec et&nbsp;al. (</span><a aria-label="Reference 2015" data-dcnode-id="2701" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d280367303e684" title="Emec S, Bilge P, Seliger G (2015) Design of production systems with hybrid energy and water generation for sustainable value creation. Clean Technol Environ Policy 17(7):1807–1829"><span data-dcnode-id="2702" instrument_node="">2015</span></a><span data-dcnode-id="2700" instrument_node="">) and US Kim et&nbsp;al. (</span><a aria-label="Reference 2018" data-dcnode-id="2698" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d280367303e687" title="Kim H, Rao SR, Kapustin EA, Zhao L, Yang S, Yaghi OM, Wang EN (2018) Adsorption-based atmospheric water harvesting device for arid climates. Nat Commun 9(1):1191. 
                  https://doi.org/10.1038/s41467-018-03162-7
                  
                , 
                  http://www.nature.com/articles/s41467-018-03162-7
                  
                "><span data-dcnode-id="2699" instrument_node="">2018</span></a><span data-dcnode-id="2697" instrument_node="">) survey the future benefits of AWG in Cyprus and Arizona. Asiabanpour et&nbsp;al. (</span><a aria-label="Reference 2019" data-dcnode-id="2695" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d280367303e690" title="Asiabanpour B, Ownby N, Summers M, Moghimi F (2019) Atmospheric water generation and energy consumption: an empirical analysis. In: 2019 IEEE Texas power and energy conference (TPEC), pp 1–6. IEEE"><span data-dcnode-id="2696" instrument_node="">2019</span></a><span data-dcnode-id="2694" instrument_node="">) utilizes experiment data from Texas to examine energy consumption in AWG and provide some toward its use and a drinking water source. Moghimi et&nbsp;al. (</span><a aria-label="Reference 2019" data-dcnode-id="2692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d280367303e693" title="Moghimi F, Ghoddusi H, Asiabanpour B, Behroozikhah M (2019) Atmospheric water generation (awg): performance model and economic analysis. In: IFIP international conference on advances in production management systems, Springer, pp 151–158"><span data-dcnode-id="2693" instrument_node="">2019</span></a><span data-dcnode-id="2691" instrument_node="">) provides the first location-based production model of AWG based on regional environmental condition. We improve the mentioned location-based production model and build on that foundation to conduct a more comprehensive study of AWG from an economic point of view.</span></p><p data-dcnode-id="2673"><span data-dcnode-id="2689" instrument_node="">By providing estimates of the return on investment in AWG systems, our paper is also related to the large literature on the willingness to pay for water access [c.f., Genius et&nbsp;al. (</span><a aria-label="Reference 2008" data-dcnode-id="2687" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d280367303e699" title="Genius M, Hatzaki E, Kouromichelaki E, Kouvakis G, Nikiforaki S, Tsagarakis KP (2008) Evaluating consumers’ willingness to pay for improved potable water quality and quantity. Water Resour Manag 22(12):1825–1834"><span data-dcnode-id="2688" instrument_node="">2008</span></a><span data-dcnode-id="2686" instrument_node="">), Abrahams et&nbsp;al. (</span><a aria-label="Reference 2000" data-dcnode-id="2684" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d280367303e702" title="Abrahams NA, Hubbell BJ, Jordan JL (2000) Joint production and averting expenditure measures of willingness to pay: do water expenditures really measure avoidance costs? Am J Agric Econ 82(2):427–437"><span data-dcnode-id="2685" instrument_node="">2000</span></a><span data-dcnode-id="2683" instrument_node="">), and Vásquez et&nbsp;al. (</span><a aria-label="Reference 2009" data-dcnode-id="2681" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d280367303e705" title="Vásquez WF, Mozumder P, Hernandez-Arce J, Berrens RP (2009) Willingness to pay for safe drinking water: evidence from Parral, Mexico. J Environ Manag 90(11):3391–3400"><span data-dcnode-id="2682" instrument_node="">2009</span></a><span data-dcnode-id="2680" instrument_node="">)]. Alcubilla and Lund (</span><a aria-label="Reference 2006" data-dcnode-id="2678" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d280367303e708" title="Alcubilla RG, Lund JR (2006) Derived willingness-to-pay for household water use with price and probabilistic supply. J Water Resour Plan Manag 132(6):424–433"><span data-dcnode-id="2679" instrument_node="">2006</span></a><span data-dcnode-id="2677" instrument_node="">) provide a framework for estimating the willingness to pay for reducing randomness in the water supply. For a meta-analysis on this topic, see Van&nbsp;Houtven et&nbsp;al. (</span><a aria-label="Reference 2017" data-dcnode-id="2675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d280367303e711" title="Van Houtven GL, Pattanayak SK, Usmani F, Yang JC (2017) What are households willing to pay for improved water access? Results from a meta-analysis. Ecol Econ 136:126–135"><span data-dcnode-id="2676" instrument_node="">2017</span></a><span data-dcnode-id="2674" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="2175" data-title="Methods and data"><div class="c-article-section" data-dcnode-id="2176" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2668" id="Sec3"><span data-dcnode-id="2669" instrument_node="">Methods and data</span></h2><div class="c-article-section__content" data-dcnode-id="2177" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="2666" id="Sec4"><span data-dcnode-id="2667" instrument_node="">Economic performance</span></h3><p data-dcnode-id="2661"><span data-dcnode-id="2665" instrument_node="">The economic performance of a typical AWG machine depends on several factors: (1) how much water per day it produces as a function of temperature and humidity; (2) how much energy it uses for the production of a unit of water; (3) the price of competing options (e.g., the drinking bottle water, tap water); and (4) the initial and ongoing costs of obtaining and running the machine (including the energy costs). The economic performance of the AWG machine is summarized in Eq.&nbsp;</span><a data-dcnode-id="2663" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="2664" instrument_node="">1</span></a><span data-dcnode-id="2662" instrument_node="">. We elaborate on each factor in the following subsections:</span></p><div class="c-article-equation" data-dcnode-id="2652" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="2655"><span class="mathjax-tex" data-dcnode-id="2656"><span class="MathJax_Preview" data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">\begin{aligned} \text {Economic performance}&amp;= f(\text {Water output},\text {Energy price},\nonumber \\&amp;\quad \text {Water price},\text {Investment costs},\nonumber \\ &amp;\quad\text {Maintenance costs}) \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">
                    (1)
                </span></div></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2650" id="Sec5"><span data-dcnode-id="2651" instrument_node="">Physical performance</span></h4><p data-dcnode-id="2645"><span data-dcnode-id="2649" instrument_node="">The physical performance (i.e., water output) of the AWG machine can be described as the following general function (Gido et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="2647" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d280367303e836" title="Gido B, Friedler E, Broday DM (2016) Assessment of atmospheric moisture harvesting by direct cooling. Atmos Res 182:156–162"><span data-dcnode-id="2648" instrument_node="">2016</span></a><span data-dcnode-id="2646" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="2636" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="2639"><span class="mathjax-tex" data-dcnode-id="2640"><span class="MathJax_Preview" data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">\begin{aligned} \text {Water output} = g(\text {Temperature},\text {Humidity},\text {Energy use}) \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">
                    (2)
                </span></div></div><p data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">This section aims to generate a stylized model capable of determining the relationship of humidity and temperature with the AWG performance. Based on the published literature and the empirical data selection, the following functional form has been selected:</span></p><div class="c-article-equation" data-dcnode-id="2625" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="2628"><span class="mathjax-tex" data-dcnode-id="2629"><span class="MathJax_Preview" data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">\begin{aligned} W= \alpha _0 + \alpha _1H + \alpha _2T+ + \alpha _{3} T^{2} + \alpha _4 H \times T +\epsilon _{W} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="2603"><span data-dcnode-id="2624" instrument_node="">where </span><i data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">W</span></i><span data-dcnode-id="2621" instrument_node="">, </span><i data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">H</span></i><span data-dcnode-id="2618" instrument_node=""> and </span><i data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">T</span></i><span data-dcnode-id="2615" instrument_node=""> stand for water output, humidity, and temperature, respectively. Moreover, the error term, </span><span class="mathjax-tex" data-dcnode-id="2610"><span class="MathJax_Preview" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">\epsilon _{W}</span></span></span><span data-dcnode-id="2609" instrument_node="">, represents all other factors that we do not capture in the model, including the elevation above sea level.</span><sup data-dcnode-id="2604"><a data-dcnode-id="2605" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Footnote </span></span><span data-dcnode-id="2606" instrument_node="">4</span></a></sup></p><p data-dcnode-id="2577"><span data-dcnode-id="2602" instrument_node="">The goal of the model is to extrapolate AWG’s water production at given humidity and temperature levels. The model contains linear and quadratic effects </span><i data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">T</span></i><span data-dcnode-id="2599" instrument_node="">, linear effect of </span><i data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">H</span></i><span data-dcnode-id="2596" instrument_node=""> and , and their interaction. The inclusion of the interaction term helps reducing model’s error in the outlier temperature and humidity conditions. However, by just looking at the coefficients of </span><i data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">H</span></i><span data-dcnode-id="2593" instrument_node=""> and </span><i data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">T</span></i><span data-dcnode-id="2590" instrument_node="">, one cannot determine the net effect of each factor on water production. Calculating the average effect requires taking the partial derivative of the production function with respect to each variable and then evaluating the derivative at the mean level of each. Considering </span><span class="mathjax-tex" data-dcnode-id="2585"><span class="MathJax_Preview" data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">{\overline{H}}</span></span></span><span data-dcnode-id="2584" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="2579"><span class="MathJax_Preview" data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">{\overline{T}}</span></span></span><span data-dcnode-id="2578" instrument_node=""> as representatives for average values of humidity and temperature, respectively, we obtain the following equation:</span></p><div class="c-article-equation" data-dcnode-id="2568" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="2571"><span class="mathjax-tex" data-dcnode-id="2572"><span class="MathJax_Preview" data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">\begin{aligned} {\left\{ \begin{array}{ll} \frac{\partial W}{\partial H}({\overline{H}},{\overline{T}}) = \alpha _1 + \alpha _4 {\overline{T}}\\ \frac{\partial W}{\partial T}({\overline{H}},{\overline{T}}) = \alpha _2 + 2 \alpha _{3} T + \alpha _4 {\overline{H}} \end{array}\right. } \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">
                    (4)
                </span></div></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2566" id="Sec6"><span data-dcnode-id="2567" instrument_node="">Representative machine</span></h4><p data-dcnode-id="2552"><span data-dcnode-id="2565" instrument_node="">To run the experiments, we use a commercial machine called AquaBoy 2 as the evaluation benchmark.</span><sup data-dcnode-id="2560"><a data-dcnode-id="2561" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Footnote </span></span><span data-dcnode-id="2562" instrument_node="">5</span></a></sup><span data-dcnode-id="2559" instrument_node=""> It is a popular brand with high user evaluation rating on the sale portals. The initial cost of obtaining the machine is approximately $1700. The machine is able to produce 8–20 L of water per day, depending on environmental conditions. Assuming an average drinking water standard of 2 L/Day per person, the machine has the capacity to support a family of four or a small office. A review of the price/capacity multiple for other machines suggests that the cost–capacity relation for AWG systems scales up linearly [see </span><a data-dcnode-id="2557" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec34"><span data-dcnode-id="2558" instrument_node="">B</span></a><span data-dcnode-id="2556" instrument_node=""> and Wahlgren (</span><a aria-label="Reference 2018" data-dcnode-id="2554" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d280367303e1331" title="Wahlgren RV (2018) Water-from-air quick guide. CreateSpace Independent Publishing Platform, Scotts Valley"><span data-dcnode-id="2555" instrument_node="">2018</span></a><span data-dcnode-id="2553" instrument_node="">)]. Thus, though our study is based on a single brand, the overall message of the paper can be considered as general because the selected machine is a reasonable representation of the high-quality small-size AWG systems.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2550" id="Sec7"><span data-dcnode-id="2551" instrument_node="">Production data sample</span></h4><p data-dcnode-id="2545"><span data-dcnode-id="2549" instrument_node="">According to AWG manufacturers and the published literature, humidity and temperature are the main environmental factors influencing AWG’s performance (Bagheri </span><a aria-label="Reference 2018" data-dcnode-id="2547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d280367303e1342" title="Bagheri F (2018) Performance investigation of atmospheric water harvesting systems. Water Resour Ind 20:23–28"><span data-dcnode-id="2548" instrument_node="">2018</span></a><span data-dcnode-id="2546" instrument_node="">).</span></p><p data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">We adopt two stages to build the model. First, a performance forecasting report published by the manufacturer of the machine has been utilized. As displayed in Table&nbsp;</span><a data-dcnode-id="2542" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2543" instrument_node="">1</span></a><span data-dcnode-id="2541" instrument_node="">, these data show the daily production of the system in specific environmental conditions.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2525" data-test="inline-table" id="table-1"><figure data-dcnode-id="2526"><figcaption class="c-article-table__figcaption" data-dcnode-id="2537"><b data-dcnode-id="2538" data-test="table-caption" id="Tab1"><span data-dcnode-id="2539" instrument_node="">Table 1 Performance prediction released by the manufacturer for estimating the water production (liters per day) in specific humidity and temperature data points</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2527"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2528" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/tables/1" rel="nofollow"><span data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2529" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2530" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2531" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2534" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2533" fill-rule="evenodd"></path><span data-dcnode-id="2532" instrument_node="">
</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2523" id="Sec8"><span data-dcnode-id="2524" instrument_node="">Energy consumption</span></h4><p data-dcnode-id="2515"><span data-dcnode-id="2522" instrument_node="">To estimate the economic attractiveness of investing in AWG, one should know the energy input requirements of the machine. Since, to the best of our knowledge, such data are not available in the literature, we estimate a simple model to relate the energy consumption to the water production. To calibrate this model, a set of experimental data have been utilized. The experiment, conducted by Asiabanpour et&nbsp;al. (</span><a aria-label="Reference 2019" data-dcnode-id="2520" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d280367303e1661" title="Asiabanpour B, Ownby N, Summers M, Moghimi F (2019) Atmospheric water generation and energy consumption: an empirical analysis. In: 2019 IEEE Texas power and energy conference (TPEC), pp 1–6. IEEE"><span data-dcnode-id="2521" instrument_node="">2019</span></a><span data-dcnode-id="2519" instrument_node="">), provides us with the daily production and energy consumption records of an AWG system in San Marcos and Texas for a duration of ten days in summer and ten days in winter. Appendix&nbsp;</span><a data-dcnode-id="2517" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec35"><span data-dcnode-id="2518" instrument_node="">C</span></a><span data-dcnode-id="2516" instrument_node=""> shows the 20-day raw data illustrating the energy consumption and water production level on each day.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2513" id="Sec9"><span data-dcnode-id="2514" instrument_node="">Regions</span></h3><p data-dcnode-id="2506"><span data-dcnode-id="2512" instrument_node="">The AWG market was valued around $918.9 million in 2015, and it is estimated to have a Capital Annual Growth Rate (CAGR) of 20% by the year 2023. Asia Pacific, North America, Europe, and the Middle East are the biggest consumers of AWG systems, respectively. However, the Middle East is expected to have the biggest incremental growth in the coming years.</span><sup data-dcnode-id="2507"><a data-dcnode-id="2508" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Footnote </span></span><span data-dcnode-id="2509" instrument_node="">6</span></a></sup></p><p data-dcnode-id="2498"><span data-dcnode-id="2505" instrument_node="">Ten different cities from all around the world are selected to provide a comprehensive look at AWG performance in a variety of conditions. Moreover, sets of 4-year daily weather data from 2014 to 2018 are obtained for each city.</span><sup data-dcnode-id="2500"><a data-dcnode-id="2501" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Footnote </span></span><span data-dcnode-id="2502" instrument_node="">7</span></a></sup><span data-dcnode-id="2499" instrument_node=""> Then, using the developed models, daily water production, and daily energy consumption for each city are estimated over the 4-year period. The cities are selected from three main regions. A short description for each region along with the reasons that they were chosen is given in the following subsections.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2496" id="Sec10"><span data-dcnode-id="2497" instrument_node="">USA</span></h4><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">USA is one of the largest consumers of the bottled water industry. Moreover, the water infrastructure across the country is relatively old. As a result, financing the maintenance and renovation of the aging water infrastructures is an ongoing issue in numerous cities. Therefore, it is relevant to examine AWG’s performance in different areas of the USA as there is great potential in the market. Furthermore, AWG could potentially provide an alternative potable water source with hopes of helping the astronomical infrastructure costs.</span></p><p data-dcnode-id="2489"><span data-dcnode-id="2493" instrument_node="">Five major US cities are selected from all around the country. The locations were selected in a manner to provide a comprehensive look at AWG’s function in a variety of weather conditions. The cities investigated in the USA are Austin, San Diego, New York, Seattle, and Flint (Fig.&nbsp;</span><a data-dcnode-id="2491" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2492" instrument_node="">1</span></a><span data-dcnode-id="2490" instrument_node="">).This list covers a wide set of environments ranging from the relatively consistent year round warm and humid weathers in San Diego and Austin to the more seasonal and less humid weather conditions in flint and Seattle.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2487" id="Sec11"><span data-dcnode-id="2488" instrument_node="">Aruba Island</span></h4><p data-dcnode-id="2482"><span data-dcnode-id="2486" instrument_node="">Aruba is a tropical island located in the southern Caribbean Sea (Fig.&nbsp;</span><a data-dcnode-id="2484" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2485" instrument_node="">1</span></a><span data-dcnode-id="2483" instrument_node="">). Aruba is relatively warm and humid all year long. Moreover, Aruba is an attractive travel destination for tourists all year.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2458" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2459"><figcaption data-dcnode-id="2479"><b class="c-article-section__figure-caption" data-dcnode-id="2480" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2481" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2470"><div class="c-article-section__figure-item" data-dcnode-id="2474"><a class="c-article-section__figure-link" data-dcnode-id="2475" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/1" rel="nofollow"><picture data-dcnode-id="2476"><source data-dcnode-id="2478" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10098-020-02015-6/MediaObjects/10098_2020_2015_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2477" height="726" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10098-020-02015-6/MediaObjects/10098_2020_2015_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2471" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">Five cities are selected from all across the USA. Aruba island is also selected from Central America region. This makes it possible to examine diverse environmental conditions</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2460"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2461" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/1" rel="nofollow"><span data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2462" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2463" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2464" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2467" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2466" fill-rule="evenodd"></path><span data-dcnode-id="2465" instrument_node="">
</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2456" id="Sec12"><span data-dcnode-id="2457" instrument_node="">Persian Gulf region</span></h4><p data-dcnode-id="2451"><span data-dcnode-id="2455" instrument_node="">The Persian Gulf is a Mediterranean sea located in the Middle East. Eight countries are connected to the Persian Gulf. The majority of countries located around the Persian Gulf are rich in Oil and Natural gas; the surrounding areas are also typically arid with limited freshwater resources. Several cities in this region (e.g., Dubai and Doha) are major business and tourist destinations. Thus, the Persian Gulf region represents a particular type of target area with (1) abundant energy resources (and low energy prices), (2) limited freshwater resources, (3) high temperature and humidity levels, and (4) strong demand for drinking water. The cities investigated in this region are as follows: Bandar Abbas (Iran), Dubai (UAE), Doha (Qatar), and Kuwait City (Kuwait) (Fig.&nbsp;</span><a data-dcnode-id="2453" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2454" instrument_node="">2</span></a><span data-dcnode-id="2452" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2427" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="2428"><figcaption data-dcnode-id="2448"><b class="c-article-section__figure-caption" data-dcnode-id="2449" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2450" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2439"><div class="c-article-section__figure-item" data-dcnode-id="2443"><a class="c-article-section__figure-link" data-dcnode-id="2444" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/2" rel="nofollow"><picture data-dcnode-id="2445"><source data-dcnode-id="2447" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10098-020-02015-6/MediaObjects/10098_2020_2015_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2446" height="601" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10098-020-02015-6/MediaObjects/10098_2020_2015_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2440" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Four cities in four different countries are selected from the Persian Gulf region. This makes it possible to examine the possible potential of the AWG in the region as a whole</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2429"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2430" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/figures/2" rel="nofollow"><span data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2431" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2432" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2433" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2436" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2435" fill-rule="evenodd"></path><span data-dcnode-id="2434" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2425" id="Sec13"><span data-dcnode-id="2426" instrument_node="">Economic analysis</span></h3><p data-dcnode-id="2420"><span data-dcnode-id="2424" instrument_node="">Having the AWG’s daily performance in each city, financial prospects of the system during a 4-year period can be analyzed as an investment feasibility problem. AWG’s financial promise is examined as an alternative to bottled drinking water. Hence, a variety of parameters from each city are taken into account to determine the economic prospect of AWG in each city. The main assumption here is that the value of the produced water by AWG is equal to the cheapest local bottled water prices at each city, which is the price of the large bottled water packages. The other costs related to acquiring these water packages are mileage or online delivery fees that are taken into account as well. Hence, the value of water per liter can be measured at costumer’s door in each city. The estimated local value of drinking water per liter in each city can be seen in Table </span><a data-dcnode-id="2422" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2423" instrument_node="">2</span></a><span data-dcnode-id="2421" instrument_node="">. Then, by using the estimated daily water production and the regional value of water at each location, the value of the produced water on each day is calculated. This daily value of the produced water during the 4-year period provides the positive cash flow of this economic analysis.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2405" data-test="inline-table" id="table-2"><figure data-dcnode-id="2406"><figcaption class="c-article-table__figcaption" data-dcnode-id="2417"><b data-dcnode-id="2418" data-test="table-caption" id="Tab2"><span data-dcnode-id="2419" instrument_node="">Table 2 Price of bottled water and energy for ten cities</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2407"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2408" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/tables/2" rel="nofollow"><span data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2409" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2410" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2411" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2414" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2413" fill-rule="evenodd"></path><span data-dcnode-id="2412" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2400"><span data-dcnode-id="2404" instrument_node="">The daily energy consumption of the AWG can be calculated by utilizing the model discussed in "</span><a data-dcnode-id="2402" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="2403" instrument_node="">Energy consumption</span></a><span data-dcnode-id="2401" instrument_node="">" section. Having both the estimated daily energy consumption and the local energy prices, we would be able to calculate the daily cost of energy in each city. Then, by adding the AWG’s maintenance cost plus the initial purchase price of an AGW machine to the daily energy costs, we would have the negative cash flows affiliated with the use of AWG.</span></p><p data-dcnode-id="2377"><span data-dcnode-id="2399" instrument_node="">An economic feasibility analysis is carried out for the 4-year project of implementing AWG in each city with a 5% discount rate. Net present value (NPV) and internal rate of return (IRR) are calculated using the 4-year historical time series of AWG at each location. The NPV and IRR illustrate the financial gains or losses of an individual who has chosen to use an AWG system instead of purchasing bottled water. The formulas for NPV and IRR are presented here where </span><span class="mathjax-tex" data-dcnode-id="2394"><span class="MathJax_Preview" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">C_0</span></span></span><span data-dcnode-id="2393" instrument_node=""> is the initial cost of an AWG purchase, </span><i data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">t</span></i><span data-dcnode-id="2390" instrument_node=""> represents the time periods which are days in this case, </span><span class="mathjax-tex" data-dcnode-id="2385"><span class="MathJax_Preview" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">C_t</span></span></span><span data-dcnode-id="2384" instrument_node=""> represents the net cash flow of using AWG production on day </span><i data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">t</span></i><span data-dcnode-id="2381" instrument_node="">, and </span><i data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">r</span></i><span data-dcnode-id="2378" instrument_node=""> is the discount rate:</span></p><div class="c-article-equation" data-dcnode-id="2368" id="Equ5"><div class="c-article-equation__content" data-dcnode-id="2371"><span class="mathjax-tex" data-dcnode-id="2372"><span class="MathJax_Preview" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">\begin{aligned} \text {NPV}=\sum _{t=1}^{t} \frac{C_t}{(1+r)^t}-C_0 \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">
                    (5)
                </span></div></div><p data-dcnode-id="2363"><span data-dcnode-id="2367" instrument_node="">To calculate the IRR, a similar equation should be solved for </span><i data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">IRR</span></i><span data-dcnode-id="2364" instrument_node=""> such that:</span></p><div class="c-article-equation" data-dcnode-id="2354" id="Equ6"><div class="c-article-equation__content" data-dcnode-id="2357"><span class="mathjax-tex" data-dcnode-id="2358"><span class="MathJax_Preview" data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">\begin{aligned} \text {NPV}=\sum _{t=1}^{t} \frac{C_t}{(1+IRR)^t} - C_0=0 \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">
                    (6)
                </span></div></div><p data-dcnode-id="2349"><span data-dcnode-id="2353" instrument_node="">The main assumptions of the modeling exercise are listed in Table </span><a data-dcnode-id="2351" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2352" instrument_node="">3</span></a><span data-dcnode-id="2350" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2334" data-test="inline-table" id="table-3"><figure data-dcnode-id="2335"><figcaption class="c-article-table__figcaption" data-dcnode-id="2346"><b data-dcnode-id="2347" data-test="table-caption" id="Tab3"><span data-dcnode-id="2348" instrument_node="">Table 3 Assumptions of the economic analysis</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2336"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="2337" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10098-020-02015-6/tables/3" rel="nofollow"><span data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2338" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2339" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2340" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2343" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2342" fill-rule="evenodd"></path><span data-dcnode-id="2341" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2332" id="Sec14"><span data-dcnode-id="2333" instrument_node="">Risk analysis</span></h3><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">AWG’s performance can experience significant volatility. One may speculate that AWG’s intermittent performance in different environmental conditions is one of the chief concerns regarding the commercial application of this technology. We estimate the risks associated with relying on an AWG system.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2328" id="Sec15"><span data-dcnode-id="2329" instrument_node="">The volatile production risk: value at risk (VaR)</span></h4><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">The concept of value at risk refers to the threshold such that the probability density of outcome worse than the threshold is smaller than a certain risk tolerance level. For an AWG machine, the VaR metrics can be formally defined as:</span></p><div class="c-article-equation" data-dcnode-id="2317" id="Equ7"><div class="c-article-equation__content" data-dcnode-id="2320"><span class="mathjax-tex" data-dcnode-id="2321"><span class="MathJax_Preview" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">\begin{aligned} P (W_{t}&lt; {\overline{W}}) &lt; \phi \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">
                    (7)
                </span></div></div><p data-dcnode-id="2294"><span data-dcnode-id="2316" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2311"><span class="MathJax_Preview" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">W_{t}</span></span></span><span data-dcnode-id="2310" instrument_node=""> is the volume of water produced in day </span><i data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">t</span></i><span data-dcnode-id="2307" instrument_node="">, </span><span class="mathjax-tex" data-dcnode-id="2302"><span class="MathJax_Preview" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">{\overline{W}}</span></span></span><span data-dcnode-id="2301" instrument_node=""> the critical threshold (i.e., minimum acceptable performance), and </span><span class="mathjax-tex" data-dcnode-id="2296"><span class="MathJax_Preview" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">\phi</span></span></span><span data-dcnode-id="2295" instrument_node=""> is the probability level. For a small probability level, e.g., 2.5%, the critical threshold provides the minimum quantity of water that the user can be confident receiving from the AWG machine.</span></p><p data-dcnode-id="2280"><span data-dcnode-id="2293" instrument_node="">To estimate the critical threshold, we calculate the mean and standard deviation of daily water production in each city. High mean values and low standard deviations would indicate more attractive performance. If the distribution of water production is approximated by a normal distribution, the bundle of mean and variance allows one to calculate the lower performance bound (</span><span class="mathjax-tex" data-dcnode-id="2288"><span class="MathJax_Preview" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">{\overline{W}}</span></span></span><span data-dcnode-id="2287" instrument_node="">) for AWG’s daily production in each city. For a normally di
