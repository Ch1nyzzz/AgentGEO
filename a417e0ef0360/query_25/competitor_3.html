  Atmospheric Water Generation Research

</span><div class="js-toggle-admin-content" data-dcnode-id="417"><span data-dcnode-id="420" instrument_node="">

</span><h3 data-dcnode-id="387"><em data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Evaluating technologies that produce potable water from the air</span></em></h3><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Atmospheric water generation (AWG) uses technology to produce potable water from surrounding air. This provides the potential to expand water availability during shortages, contamination events, and other issues that can interrupt drinking water services. Natural disasters, such as hurricanes, and public water infrastructure failures, such as pipe corrosion resulting in contamination issues, have increased the interest in AWG technology as both emergency and long-term supply solutions.</span></p><span data-dcnode-id="383" instrument_node="">
</span><h4 class="highlight" data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Atmospheric Water Generators</span></h4><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">AWG generators range from home-based units that can produce 1 to 20 liters of water per day to commercial-scale units capable of 1,000 to over 10,000 liters per day. Water production rates are highly dependent upon the air temperature and the amount of water vapor (i.e., humidity) in the air. The most commonly used AWG systems employ condenser and cooling coil technology to pull moisture from the air in the same way a household dehumidifier does. Although significant quantities of energy can be required to operate these condenser and fan systems, recent technological advancements have substantially improved the energy-water ratio—increasing the feasibility of using these systems to help augment the Nation’s drinking water resources.</span></p><span data-dcnode-id="377" instrument_node="">
</span><h4 class="highlight" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Cooperative Research Partnership</span></h4><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="373" instrument_node="">In September 2017, EPA’s Office of Research and Development announced a new Cooperative Research and Development Agreement (CRADA) to further advance the science of AWG and assess its potential as a water production and supply solution. Specifically, EPA signed a CRADA with Watergen to evaluate their GEN-350 system. Watergen is a corporation developing cutting-edge AWG technology. The GEN-350 can generate nearly 600 liters of water per day in optimal temperature and humidity conditions. (</span><a data-dcnode-id="371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.watergen.com/"><span data-dcnode-id="372" instrument_node="">Infomation about Watergen</span></a><span data-dcnode-id="370" instrument_node="">)</span></p><span data-dcnode-id="368" instrument_node="">
</span><h4 class="highlight" data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Research and Evaluation</span></h4><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">
</span></p><figure class="figure figure--image figure--medium u-align-right" data-dcnode-id="352"><span data-dcnode-id="362" instrument_node="">

</span><img alt="Scientist evaluating the microbial quality of untreated condensate from a commercial atmospheric water generator during a three-month study. " data-dcnode-id="360" height="304" loading="lazy" sizes="(max-width: 640px) calc(100vw - 4rem), 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/sites/default/files/styles/medium/public/2019-11/awg_tecnology_testing.png%3Fitok%3DGXU2JZpi&amp;raw" srcset="/sites/default/files/styles/small/public/2019-11/awg_tecnology_testing.png?itok=BQgE5I09 320w, /sites/default/files/styles/medium/public/2019-11/awg_tecnology_testing.png?itok=GXU2JZpi 640w, /sites/default/files/styles/large/public/2019-11/awg_tecnology_testing.png?itok=Qw4Fr4pk 960w, /sites/default/files/styles/huge/public/2019-11/awg_tecnology_testing.png?itok=AXeEl6PQ 1104w" width="640"><span data-dcnode-id="359" instrument_node="">
</span></a></div><span data-dcnode-id="356" instrument_node="">
</span><figcaption class="figure__caption" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Scientist evaluating the microbial quality of untreated condensate from a commercial atmospheric water generator during a three-month study.&nbsp;</span></figcaption><span data-dcnode-id="353" instrument_node="">
</span></figure><span data-dcnode-id="351" instrument_node="">


A Watergen AWG&nbsp;test unit was evaluated at one of EPA’s laboratry facilities for collaborative research purposes. Although high quality water is anticipated from SWG units, volatile organic compounds in the air can dissolve in the condensate, providing a food source for microbial growth in plumbing and stored water. An initial review of water quality data provided by Watergen confirmed both the generally high quality of produced water (e.g., no elemental analyses above current EPA drinking water standards), and an elevated level of overall microbial numbers, as defined by heterotrophic plate counts (HPC). The HPC method provides an overall estimate of colony forming heterotrophic bacteria in water. Indicators of fecal contamination, such as fecal coliforms and </span><em data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Escherichia coli</span></em><span data-dcnode-id="348" instrument_node="">, were not detected.</span><p data-dcnode-id="347"></p><span data-dcnode-id="346" instrument_node="">
</span><h5 data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Research Goal</span></h5><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="342" instrument_node="">The goal of the research study under the CRADA was to evaluate the microbial quality of untreated condensate and produced treated water from a Watergen GEN-350 unit during three months of continuous operation. In the absence of disinfection substances/system there can be microorganisms as determined by HPC. These microorganisms may not represent a direct human health risk, but positive HPC results suggest favorable conditions for microbial growth. The primary microorganisms of human health concern are opportunistic pathogens that can grow in drinking water infrastructure, such as</span><em data-dcnode-id="340"><span data-dcnode-id="341" instrument_node=""> Legionella spp</span></em><span data-dcnode-id="339" instrument_node="">. and </span><em data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Mycobacterium spp</span></em><span data-dcnode-id="336" instrument_node="">.</span></p><span data-dcnode-id="334" instrument_node="">
</span><h5 data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Research Results and Conclusions To-Date</span></h5><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="330" instrument_node="">Neither</span><em data-dcnode-id="328"><span data-dcnode-id="329" instrument_node=""> Legionella</span></em><span data-dcnode-id="327" instrument_node=""> nor </span><em data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Mycobacteria</span></em><span data-dcnode-id="324" instrument_node=""> were detected in weekly samples. However, EPA testing confirmed high HPC results in both treated and untreated waters. All test results indicated that the water produced by Watergen’s GEN-350 is microbiologically safe for human consumption. Watergen has acknowledged the need for further disinfection to reduce the risk of microbial growth. They offer a disinfection process unit as part of an overall solution for the GEN-350 treatment train. The unit is intended for long–term water preservation.</span></p><span data-dcnode-id="322" instrument_node="">
</span><h5 data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Future Research</span></h5><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">EPA&nbsp;is interested in evaluating&nbsp;AWG units from other vendors.</span></p><span data-dcnode-id="316" instrument_node="">
