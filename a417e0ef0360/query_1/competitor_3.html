</span><h1 class="panel-title" data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Peer Comparison Graphs</span></h1><span data-dcnode-id="1717" instrument_node="">
</span></div><span data-dcnode-id="1715" instrument_node="">
</span><span data-dcnode-id="1713" instrument_node="">
</span><div class="panel-content" data-dcnode-id="1699"><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">The peer comparison graphs are published in line with BSCP533. Following the end of a Performance Assurance Reporting and Monitoring (PARMS) Period (a calendar month), PARMS submissions must be received within 20 Working Days (WDs). Following this submission deadline, there is a 5WD period for parties to query the submitted data.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">The Peer Comparison graphs are then produced and provided to Suppliers. If no queries to these graphs are received within 5WDs from receipt of the graphs, they will then be published below. They will be updated monthly with data for the next reporting period.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1705" instrument_node="">We have retired SP11, HM12 and NM12 reports under P429 arrangements as of 24 February 2022. Please note, should </span><a data-dcnode-id="1703" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elexon.co.uk/mod-proposal/p427/"><span data-dcnode-id="1704" instrument_node="">BSC Modification P427</span></a><span data-dcnode-id="1702" instrument_node=""> be approved by the BSC Panel as and when risk/performance data and peer comparison is approved for publication by the BSC Panel under the provisions introduced by that Modification, they will be published here.</span></p><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span><span data-dcnode-id="1696" instrument_node="">

</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">If you would like any Peer Comparison Graphs that are older than six months, please email Analysis and Insight team.&nbsp;</span></p><span data-dcnode-id="1658" instrument_node="">
</span><h2 data-dcnode-id="1656" id="sp08a-and-sp08b"><span data-dcnode-id="1657" instrument_node="">SP08a and SP08b</span></h2><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">The Standards for Serials SP08a do not take into account the size of the Supplier ID within that GSP Group. This means that small and large Suppliers have to achieve the same Standard.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Therefore, when viewing the graphs it is worth noting that a Supplier ID may have a low performance but it may only have a low number of Metering Systems, and therefore a smaller impact on the potential settlement error.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">The performance displayed by these graphs is related to settlement only, and does not reflect on the Supplier’s ability to produce accurate billing.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">The graphs display Supplier IDs. A Supplier ID is a four character reference used in Supplier Volume Allocation activities.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1642" instrument_node="">A&nbsp;</span><a data-dcnode-id="1640" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elexon.co.uk/bsc-and-codes/bsc-signatories-qualified-persons/"><span data-dcnode-id="1641" instrument_node="">Qualified Persons Workbook</span></a><span data-dcnode-id="1639" instrument_node=""> is available for reference and shows which Supplier organisation is associated with each Supplier ID.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><h3 data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">SP08a</span></h3><span data-dcnode-id="1634" instrument_node="">

</span></ul><h4 data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">About SP08a&nbsp;</span></h4><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">A column graph shows the performance of each Supplier ID based on its percentage of Non Half Hourly Energy that is settled on Annualised Advances at RF. This data represents an average of performance across all RF Settlement Runs conducted by the Supplier Volume Allocation Agent during a calendar month, and is reported per GSP Group. The required BSC Standard is that a Supplier should settle 97% of its Non Half Hourly Energy on Annualised Advances by RF. The graphs show the reporting period and the range of Settlement dates covered (in the accompanying text), and Supplier IDs are shown alphabetically on the x-axis.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Each graph for Supplier Serial SP08a displays each Supplier ID that operates in that particular GSP Group for the current reporting period. These are ordered alphabetically.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">The percentage (y-axis) scale is set to display the most information possible for all Supplier IDs.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">There are two horizontal lines labelled for reference. The red line represents the Industry Standard of 97%, the black line represents the GSP Group average performance for the reporting period.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><h3 data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">SP08b&nbsp;</span></h3><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">These graphs detail the percentage of Half Hourly Energy settled on actual Meter readings at the Initial Volume Allocation Run (SF).</span></p><span data-dcnode-id="1342" instrument_node="">

</span></ul><h4 data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">About SP08b</span></h4><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">A column graph shows the performance of each Supplier ID based on its percentage of Half Hourly Energy that is settled on actual Meter readings at SF. This data represents an average of performance across all SF Settlement Runs conducted by the Supplier Volume Allocation Agent during a calendar month, and is reported per GSP Group. The required BSC Standard is that a Supplier should settle 99% of its Half Hourly Energy on actual Meter readings by SF. The graphs show the reporting period and the range of Settlement dates covered (in the accompanying text), and Supplier IDs are shown alphabetically on the x-axis.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Each graph for Supplier Serial SP08b displays each Supplier ID that operates in that particular GSP Group for the current reporting period. These are ordered alphabetically.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">The percentage (y-axis) scale is set to display the most information possible for all Supplier IDs.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">There are two, horizontal lines, labelled for reference. The red line represents the Industry Standard of 99%, the black line represents the GSP Group average performance for the reporting period.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><h2 data-dcnode-id="1053" id="sp09"><span data-dcnode-id="1054" instrument_node="">SP09</span></h2><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">These graphs detail the percentage of Non Half Hourly Metering Systems settled on default Estimated Annual Consumption at Third Reconciliation (R3).</span></p><span data-dcnode-id="1049" instrument_node="">

</span></ul><h4 data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">About SP09</span></h4><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">A column graph shows the percentage of the number of its Non Half Hourly Metering Systems that are settling on default Estimated Annual Consumptions at R3. This data represents an average of performance across all R3 settlement runs conducted by the Supplier Volume Allocation Agent during a calendar month, and is reported per GSP Group for all Supplier IDs with greater than 1,000 Metering Systems. The required BSC Standard is that no more than 0.1% of Metering Systems should be settled on default Estimated Annual Consumptions at R3.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The graphs show the reporting period and the range of settlement dates covered, and Supplier IDs are shown alphabetically on the x-axis.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The percentage (y-axis) scale is set to display the most information possible for all Supplier IDs.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">There is a red horizontal line for reference which represents the Industry Standard of 0.1%.</span></p><span data-dcnode-id="762" instrument_node="">
