</span><h4 class="elementor-heading-title elementor-size-default" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Derating Factors:</span></h4><span data-dcnode-id="1684" instrument_node=""> </span></div><span data-dcnode-id="1682" instrument_node="">
</span></div><span data-dcnode-id="1680" instrument_node="">
</span><div class="elementor-element elementor-element-20bcc094 elementor-widget elementor-widget-heading" data-dcnode-id="1669" data-element_type="widget" data-id="20bcc094" data-widget_type="heading.default"><span data-dcnode-id="1679" instrument_node="">
</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1671"><span data-dcnode-id="1678" instrument_node="">
</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1673"><span data-dcnode-id="1677" instrument_node="">Wires can carry a certain amount of current continuously and no more; more current means the wire will overheat (and melt) as it cannot dissipate the heat that is generated by too much current flow. That characteristic is called AMPACITY </span><i data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">(maximum current that a wire can carry continuously without exceeding its temperature rating)</span></i><span data-dcnode-id="1674" instrument_node="">. Certain factors reduce the ampacity rating of wires and the voltage drop as well:</span></p><span data-dcnode-id="1672" instrument_node=""> </span></div><span data-dcnode-id="1670" instrument_node="">
</span></div><span data-dcnode-id="1668" instrument_node="">
</span></div><span data-dcnode-id="1666" instrument_node="">

</span><div class="elementor-column elementor-col-33 elementor-inner-column elementor-element elementor-element-4d6384ee" data-dcnode-id="1622" data-element_type="column" data-id="4d6384ee"><span data-dcnode-id="1652" instrument_node="">

</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1644"><span data-dcnode-id="1648" instrument_node="">
</span><h5 class="elementor-heading-title elementor-size-default" data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Ambient temperature of 50°C (122F) or more</span></h5><span data-dcnode-id="1645" instrument_node=""> </span></div><span data-dcnode-id="1643" instrument_node="">
</span></div><span data-dcnode-id="1641" instrument_node="">
</span><div class="elementor-element elementor-element-39c639af elementor-widget elementor-widget-heading" data-dcnode-id="1628" data-element_type="widget" data-id="39c639af" data-widget_type="heading.default"><span data-dcnode-id="1640" instrument_node="">
</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1630"><span data-dcnode-id="1639" instrument_node="">
</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1632"><b data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">A wire located in ambient temperature of 50°C (122F) or more loses its ability to dissipate heat, and, therefore, its ampacity is reduced by 15%</span></b><span data-dcnode-id="1636" instrument_node="">. </span><i data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">(note: this is per ABYC standards "In Engine Room")</span></i><span data-dcnode-id="1633" instrument_node="">. This is most likely the case for a wire running in the wall/ceiling of a van because temperature in there is much higher than in the living space (that's especially true for darker color vans).</span></p><span data-dcnode-id="1631" instrument_node=""> </span></div><span data-dcnode-id="1629" instrument_node="">
</span></div><span data-dcnode-id="1627" instrument_node="">
</span></div><span data-dcnode-id="1625" instrument_node="">
</span></div><span data-dcnode-id="1623" instrument_node="">
</span></div><span data-dcnode-id="1621" instrument_node="">
</span><div class="elementor-column elementor-col-33 elementor-inner-column elementor-element elementor-element-6f8e539f" data-dcnode-id="1590" data-element_type="column" data-id="6f8e539f"><span data-dcnode-id="1620" instrument_node="">
</span><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="1592"><span data-dcnode-id="1619" instrument_node="">
</span><div class="elementor-widget-wrap" data-dcnode-id="1594"><span data-dcnode-id="1618" instrument_node="">
</span><div class="elementor-element elementor-element-325c8438 elementor-widget elementor-widget-heading" data-dcnode-id="1610" data-element_type="widget" data-id="325c8438" data-widget_type="heading.default"><span data-dcnode-id="1617" instrument_node="">
</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1612"><span data-dcnode-id="1616" instrument_node="">
</span><h5 class="elementor-heading-title elementor-size-default" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Load runs continuously for 20 minutes or more</span></h5><span data-dcnode-id="1613" instrument_node=""> </span></div><span data-dcnode-id="1611" instrument_node="">
</span></div><span data-dcnode-id="1609" instrument_node="">
</span><div class="elementor-element elementor-element-51f91fc6 elementor-widget elementor-widget-heading" data-dcnode-id="1596" data-element_type="widget" data-id="51f91fc6" data-widget_type="heading.default"><span data-dcnode-id="1608" instrument_node="">
</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1598"><span data-dcnode-id="1607" instrument_node="">
</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1600"><span data-dcnode-id="1606" instrument_node="">A wire that carries a current flow for a long duration (~20 minutes) builds up more heat. As the temperature of a wire increases, so does the resistance to current flow = more voltage drop. </span><b data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">To mitigate this factor, the load current is increased by 25% for the voltage drop calculation </span></b><span data-dcnode-id="1603" instrument_node="">(but not for the fuse/breaker size calculation). </span><i data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">This is not an ABYC requirement at the moment; however, it is generally accepted by marine product manufacturers (such as Blue Sea).</span></i></p><span data-dcnode-id="1599" instrument_node=""> </span></div><span data-dcnode-id="1597" instrument_node="">
</span></div><span data-dcnode-id="1595" instrument_node="">

</span></div><span data-dcnode-id="1589" instrument_node="">

</span><h5 class="elementor-heading-title elementor-size-default" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Wire in conduit, insulation, or bundled with 2 (or more) wires</span></h5><span data-dcnode-id="1581" instrument_node=""> </span></div><span data-dcnode-id="1579" instrument_node="">

</span><div class="elementor-element elementor-element-207c0a85 elementor-widget elementor-widget-heading" data-dcnode-id="1565" data-element_type="widget" data-id="207c0a85" data-widget_type="heading.default"><span data-dcnode-id="1576" instrument_node="">
</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1567"><span data-dcnode-id="1575" instrument_node="">
</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1569"><b data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">A wire located in a conduit, sheath, running through insulation, or bundled with 2 (or more) wires loses its ability to dissipate heat, and therefore, its ampacity is reduced by 30%</span></b><span data-dcnode-id="1572" instrument_node="">. </span><i data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">This is not an ABYC requirement at the moment; however, it is generally accepted by marine product manufacturers (such as Blue Sea).</span></i></p><span data-dcnode-id="1568" instrument_node=""> </span></div><span data-dcnode-id="1566" instrument_node="">

</span><div class="elementor-element elementor-element-b30b9ec elementor-widget elementor-widget-heading" data-dcnode-id="1311" data-element_type="widget" data-id="b30b9ec" data-widget_type="heading.default"><span data-dcnode-id="1327" instrument_node="">
</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1313"><span data-dcnode-id="1326" instrument_node="">
</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1315"><span data-dcnode-id="1325" instrument_node="">Always use the </span><span data-dcnode-id="1323" style="font-weight: 700;"><span data-dcnode-id="1324" instrument_node="">maximum current</span></span><span data-dcnode-id="1322" instrument_node=""> that the load is expected to draw. The Maxxfan can draw up to 2.8A at the highest speed in steady state </span><i data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">(according to our Simarine Pico Monitor)</span></i><span data-dcnode-id="1319" instrument_node="">. However, any load with a motor draws more current during startup for a very short period of time, so we'll go ahead and add about 50% buffer to account for startup. If you have no clue what current to use as an input, it's OK to use the </span><b data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">FUSE SIZE</span></b><span data-dcnode-id="1316" instrument_node=""> that the manufacturer recommends. As a result, you'll get slightly oversized wires (which is quite good for safety, performance, and durability).</span></p><span data-dcnode-id="1314" instrument_node=""> </span></div><span data-dcnode-id="1312" instrument_node="">
</span></div><span data-dcnode-id="1310" instrument_node="">
</span><div class="elementor-element elementor-element-62635efe elementor-widget elementor-widget-heading" data-dcnode-id="1301" data-element_type="widget" data-id="62635efe" data-widget_type="heading.default"><span data-dcnode-id="1309" instrument_node="">

</span></div><span data-dcnode-id="1300" instrument_node="">
</span></div><span data-dcnode-id="1298" instrument_node="">

</span></div><span data-dcnode-id="1282" instrument_node="">
</span><div class="elementor-element elementor-element-42d330b6 elementor-widget elementor-widget-heading" data-dcnode-id="1271" data-element_type="widget" data-id="42d330b6" data-widget_type="heading.default"><span data-dcnode-id="1281" instrument_node="">
</span><div class="elementor-widget-container optml-bg-lazyloaded" data-dcnode-id="1273"><span data-dcnode-id="1280" instrument_node="">
</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1275"><span data-dcnode-id="1279" instrument_node="">The wire length input is always the round-trip length. </span><b data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The round-trip length is the sum of the positive and the negative wires</span></b><span data-dcnode-id="1276" instrument_node="">. Remember that a duplex wire packs the positive and the negative into a single wire, so the round-trip length is equal to twice the duplex length.</span></p><span data-dcnode-id="1274" instrument_node=""> </span></div><span data-dcnode-id="1272" instrument_node="">
</span></div><span data-dcnode-id="1270" instrument_node="">

</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1220"><span data-dcnode-id="1239" instrument_node="">There is a loss of energy </span><i data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">(voltage drop)</span></i><span data-dcnode-id="1236" instrument_node=""> as current moves through passive elements </span><i data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">(terminal, fuse, wire, etc.)</span></i><span data-dcnode-id="1233" instrument_node="">; </span><b data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">a smaller wire means more voltage drop</span></b><span data-dcnode-id="1230" instrument_node="">. For example, if we size the wire for 3% voltage drop </span><i data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">(bigger wire)</span></i><span data-dcnode-id="1227" instrument_node="">, the voltage will go from 12V at the fuse block down to 11.64V </span><i data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">at the Maxxfan</span></i><span data-dcnode-id="1224" instrument_node="">. If we size it for 10% voltage drop (smaller wire), the voltage at the Maxxfan will be 10.8V</span><i data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">; this can become a problem as the battery voltage goes down (low SOC).</span></i><span data-dcnode-id="1221" instrument_node=""> For best performance, we recommend 3% (5% would be OK as well).</span></p><span data-dcnode-id="1219" instrument_node=""> </span></div><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">

</span><p class="elementor-heading-title elementor-size-default" data-dcnode-id="1177"><span data-dcnode-id="1184" instrument_node="">Overcurrent protection devices (fuse/breaker) protect the wire (not the load) from being used over its ampacity; it's the weakest link! Therefore, a fuse/breaker should be smaller than the ampacity of the wire but big enough so that it doesn't blow during normal operation of the load. </span><b data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">The easiest way to determine the fuse size is to follow the manufacturer recommendations</span></b><span data-dcnode-id="1181" instrument_node="">! So check the owner's manual or specifications sheet. Can't find it? OK then. </span><b data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">As a general rule, the fuse size can be determined as follows: LOAD CURRENT x 1.4 and then round up to the next available fuse</span></b><span data-dcnode-id="1178" instrument_node="">. In the Maxxfan scenario: 4A x 1.4 = 5.6A = 7.5A fuse. However, it looks like the manufacturer recommends a 10A, fuse so we'll stick to that.</span></p><span data-dcnode-id="1176" instrument_node=""> </span></div><span data-dcnode-id="1174" instrument_node="">
