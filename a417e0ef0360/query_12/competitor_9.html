</span><br data-dcnode-id="5663"><div class="product__desc" data-dcnode-id="5659"><p data-dcnode-id="5661"><span data-dcnode-id="5662" instrument_node="">Leviton is proud to bring the Load Center into the 21st century with a focus on improved safety and ease of installation. Thanks to its revolutionary design, all hot and neutral wires terminate at custom lugs in the panel, rather than at the circuit breaker*, which allows the entire panel to be wired at rough-in. Branch circuit breakers are simply plugged-in at final installation, increasing jobsite efficiency. Leviton offers a full line of accessories to meet every need when installing the Leviton Load Center. Locking devices, lugs, ground and neutral bar kits, conduit hubs, sealing rings and more are all available to ensure an accurate and quick installation.</span></p><span data-dcnode-id="5660" instrument_node="">

</span><h3 data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">Leviton Load Center Frequently Asked Questions</span></h3><span data-dcnode-id="5226" instrument_node="">
</span><h2 data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">What is the Leviton Load Center?</span></h2><span data-dcnode-id="5223" instrument_node="">
</span><p data-dcnode-id="5222"></p><p data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">The Leviton Load Center is an innovative residential electrical circuit breaker panel that offers contractors and homeowners an easy to install, safe and approachable solution to home energy management. Its award-winning installation design, safety features that exceed the UL standard and optional internet connectivity have made it&nbsp;the industry’s most advanced load center&nbsp;to date.</span></p><span data-dcnode-id="5219" instrument_node="">
</span><p data-dcnode-id="5218"></p><span data-dcnode-id="5217" instrument_node="">
</span><h2 data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">How is the Leviton Load Center installed?</span></h2><span data-dcnode-id="5214" instrument_node="">
</span><p data-dcnode-id="5213"></p><p data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">Leviton offers the fastest installing circuit breakers available on the market today, saving builders and contractors on installation time and increasing jobsite efficiency. Trim-out is also the fastest on the market - circuit breakers up to 60A feature a no-pigtail, fully plug-on design, so the entire panel, up to 60A using copper wire, can be wired at rough-in. At trim-out, simply plug on the breaker to complete the circuit.</span></p><span data-dcnode-id="5210" instrument_node="">
</span><p data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">Smart circuit breakers install the same as our standard circuit breakers along with our single data hub installed at the panel. The system automatically discovers and connects each of the smart circuit breakers through the My Leviton app. Wi-Fi® or Ethernet (hardwire) connectivity set up is simple and straightforward.</span></p><span data-dcnode-id="5207" instrument_node="">
</span><p data-dcnode-id="5206"></p><span data-dcnode-id="5205" instrument_node="">
</span><h2 data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">What types of circuit breakers does Leviton offer?</span></h2><span data-dcnode-id="5202" instrument_node="">
</span><p data-dcnode-id="5201"></p><p data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">Leviton offers&nbsp;several types of circuit breakers to ensure the right fit for your project’s application. Each variety of circuit breaker is available in a range of amperage ratings and protection types: Standard, AFCI, GFCI, AFCI/GFCI and GFPE.</span></p><span data-dcnode-id="5198" instrument_node="">
</span><ul data-dcnode-id="5178"><span data-dcnode-id="5197" instrument_node="">
</span><li data-dcnode-id="5193"><strong data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">Thermal Magnetic circuit breakers</span></strong><span data-dcnode-id="5194" instrument_node="">&nbsp;are best suited for traditional indoor installations</span></li><span data-dcnode-id="5192" instrument_node="">
</span><li data-dcnode-id="5188"><strong data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node="">Hydraulic Magnetic circuit breakers</span></strong><span data-dcnode-id="5189" instrument_node="">&nbsp;are ideal for harsh climates, where temperatures</span></li><span data-dcnode-id="5187" instrument_node="">
</span><li data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">may be extreme, and operate from -40°C to 85°C (-40°F to 185°F)</span></li><span data-dcnode-id="5184" instrument_node="">
</span><li data-dcnode-id="5180"><strong data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">Smart circuit breakers</span></strong><span data-dcnode-id="5181" instrument_node="">&nbsp;are internet connected and feature hydraulic magnetic&nbsp;technology, making them suitable for harsh climates</span></li><span data-dcnode-id="5179" instrument_node="">
</span></ul><span data-dcnode-id="5177" instrument_node="">
</span><p data-dcnode-id="5176"></p><span data-dcnode-id="5175" instrument_node="">
</span><h2 data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">Why do Leviton hydraulic magnetic circuit breakers sometimes feel warm to the touch?</span></h2><span data-dcnode-id="5172" instrument_node="">
</span><p data-dcnode-id="5171"></p><p data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">Due to the construction of Leviton’s hydraulic magnetic branch circuit breaker, current flows nearer to the face of the breaker than some competitive breakers.</span></p><span data-dcnode-id="5168" instrument_node="">
</span><p data-dcnode-id="5167"></p><span data-dcnode-id="5166" instrument_node="">
</span><h2 data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">How does construction and current flow affect temperature?</span></h2><span data-dcnode-id="5163" instrument_node="">
</span><p data-dcnode-id="5162"></p><p data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">Electrical currents generate heat and Leviton hydraulic magnetic breakers’ internal current carrying components reside near the face of the circuit breaker. Temperatures up to 40°C (104°F) can be measured at the face of the breaker near the handle, which is far below UL temperature limit of 60°C (140°F). In some competitive circuit breakers, the current path is located more toward the back plane. Due to this, these breakers will feel cooler toward the front. Based onLeviton’s testing, overall internal temperatures are very similar.</span></p><span data-dcnode-id="5159" instrument_node="">
</span><p data-dcnode-id="5158"></p><span data-dcnode-id="5157" instrument_node="">
</span><h2 data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">Does this affect performance?</span></h2><span data-dcnode-id="5154" instrument_node="">
</span><p data-dcnode-id="5153"></p><p data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">This doesn’t affect performance at all. As defined by UL in the UL489 standard dated June 2011, the following applies:</span></p><span data-dcnode-id="5150" instrument_node="">
</span><ul data-dcnode-id="5145"><span data-dcnode-id="5149" instrument_node="">
</span><li data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">Handles, knobs and other user surfaces: UL489, paragraph 7.1.4.1.6 states that the maximum temperature on handles, knobs, and other surfaces subject to user contact during normal operation shall not exceed 60°C (140°F) on metallic and 85°C (185°F) on nonmetallic surfaces.</span></li><span data-dcnode-id="5146" instrument_node="">
</span></ul><span data-dcnode-id="5144" instrument_node="">

</span><p data-dcnode-id="5016"></p><span data-dcnode-id="5015" instrument_node="">
</span><h2 data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">When would you use a 2-pole AFCI breaker?</span></h2><span data-dcnode-id="5012" instrument_node="">
</span><p data-dcnode-id="5011"></p><p data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">2-pole AFCI breakers are needed for multi-wire branch circuits, also known as “shared neutrals” or “Edison circuits”. The definition of a multi-wire branch circuit provided by NEC 210.4 is circuits that&nbsp;“consist of two or more ungrounded conductors that have voltage between them, and agrounded conductor that has equal voltage between it and each ungrounded conductor of the circuit, and that is connected to the neutral or grounded&nbsp;conductor of the system”. Another important point from this section of Code, is that all conductors for a multi-wire branch circuit must originate from the same panel. The NEC made a change in 2011, in section 200.4, that&nbsp;“prohibits installation of ungrounded conductors on the same phase, to share a neutral”, essentially ending this practice.</span></p><span data-dcnode-id="5008" instrument_node="">
</span><p data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">Shared neutrals were quite common in the past so when upgrading a panel or replacing breakers you may see shared neutrals. To meet the latest version of the NEC, if AFCI protection is required on the shared neutral circuits being wired, you will be unable to use a 1-pole AFCI breaker, because in order for the 1-pole AFCI to function properly, you need a dedicated conductor for the line and neutral.</span></p><span data-dcnode-id="5005" instrument_node="">
</span><p data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">When wiring a dedicated circuit with AFCI protection, the line conductor is wired from the&nbsp;‘A’ phase lug of the breaker that feeds a dedicated load device and the neutral return is wired back to the neutral lug for that same breaker. For a multi-wire branch circuit with a shared neutral, the difference is two-line conductors are used. Line conductors will be wired from phase&nbsp;‘A’&nbsp;and&nbsp;‘B’ lugs of the breaker that feeds load devices and the neutral return will be shared with one&nbsp;conductor landing on the neutral lug&nbsp;‘C’&nbsp;for the same breaker. 2-pole AFCIs are NOT 240V rated. See Figure below.</span></p><span data-dcnode-id="5002" instrument_node="">
</span><p data-dcnode-id="4998"><span data-dcnode-id="5001" instrument_node="">
</span><img alt="" data-dcnode-id="5000" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leviton.com/en/images/lc/Load-Center-FAQs-Page-3-Figure-1.jpg&amp;raw" title=""><span data-dcnode-id="4999" instrument_node="">
</span></p><span data-dcnode-id="4997" instrument_node="">
</span><p data-dcnode-id="4996"></p><span data-dcnode-id="4995" instrument_node="">
</span><h2 data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">How can I troubleshoot a Leviton 2-Pole AFCI circuit breaker?</span></h2><span data-dcnode-id="4992" instrument_node="">
</span><p data-dcnode-id="4991"></p><p data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">Leviton’s 2-pole AFCI circuit breaker is intended to be used on a multi-wire circuit (shared&nbsp;neutral) applications. Each Phase is rated at 120V with a common trip. The 2-pole AFCI breaker will monitor and protect two separate circuits that share a neutral. The breaker’s rocker handleand LEDs indicate the status per the matrix below:</span></p><span data-dcnode-id="4988" instrument_node="">

</span></p><span data-dcnode-id="4983" instrument_node="">
</span><p data-dcnode-id="4982"></p><span data-dcnode-id="4981" instrument_node="">
</span><h2 data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">How do circuit breakers reset after a trip?</span></h2><span data-dcnode-id="4978" instrument_node="">
</span><p data-dcnode-id="4977"></p><p data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">To reset a Leviton circuit breaker, you must turn the breaker OFF, and then back ON.</span></p><span data-dcnode-id="4974" instrument_node="">
</span><p data-dcnode-id="4973"></p><span data-dcnode-id="4972" instrument_node="">
</span><h2 data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">What safety features does the Leviton Load Center offer?</span></h2><span data-dcnode-id="4969" instrument_node="">
</span><p data-dcnode-id="4968"></p><p data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">Leviton continuously builds upon its legacy as an industry leader in safety innovation. Beyond its optional smart functionality, the Leviton Load Center offers the only circuit breakers on the market with Leviton’s groundbreaking GFCI technology that exceeds existing UL 943 requirements. No other circuit breaker on the market provides this level of end-of-life protection.</span></p><span data-dcnode-id="4965" instrument_node="">
</span><p data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">Apart from exceeding UL requirements, Hydraulic magnetic circuit breakers feature precision trip technology, helping to ensure breakers operate as intended from -40°C to 85°C (-40°F to 185°F) without re-rating.</span></p><span data-dcnode-id="4962" instrument_node="">
</span><p data-dcnode-id="4961"></p><span data-dcnode-id="4960" instrument_node="">
</span><h2 data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">What are some of the benefits of choosing Leviton smart circuit breakers?</span></h2><span data-dcnode-id="4957" instrument_node="">
</span><p data-dcnode-id="4956"></p><p data-dcnode-id="4952"><span data-dcnode-id="4955" instrument_node="">Users can choose optional internet-connected circuit breakers to enjoy remote energy management options such as real time monitoring and tracking, remote tripping and system updates and alerts sent to their smartphones, tablets or desktops via the My Leviton app.</span><br data-dcnode-id="4954"><span data-dcnode-id="4953" instrument_node="">
Using a central data collection hub, the system’s status is securely sent to the My Leviton app. This communication capability helps give homeowners peace of mind that their electrical system is functioning properly no matter where they are in the world. In addition, access to the My Leviton app helps contractors securely troubleshoot issues without being in front of the unit itself.</span></p><span data-dcnode-id="4951" instrument_node="">
</span><p data-dcnode-id="4950"></p><span data-dcnode-id="4949" instrument_node="">
</span><h2 data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">I already have a Leviton Load Center. How do I make it smart?</span></h2><span data-dcnode-id="4946" instrument_node="">
</span><p data-dcnode-id="4945"></p><p data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">You can easily upgrade a Leviton Load Center by purchasing the Data Hub kit and replacing your standard breakers with smart circuit breakers. This should be done by a licensed electrician. The enclosure itself does not change. Then, simply download the free My Leviton app on Google Playor the Apple Store and you’ll be walked through the easy pairing process.</span></p><span data-dcnode-id="4942" instrument_node="">
</span><p data-dcnode-id="4941"></p><span data-dcnode-id="4940" instrument_node="">
</span><h2 data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">Do I need Wi-Fi to make my panel a smart panel?</span></h2><span data-dcnode-id="4937" instrument_node="">
</span><p data-dcnode-id="4936"></p><p data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">The Data Hub is equipped with Wi-Fi or ethernet capabilities. In addition, if an internet connection is not available at the time of installation the panel can be still be configured and paired to a My Leviton app account later.</span></p><span data-dcnode-id="4933" instrument_node="">
</span><p data-dcnode-id="4932"></p><span data-dcnode-id="4931" instrument_node="">
</span><h2 data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">What is the name of the app and where can I find it?</span></h2><span data-dcnode-id="4928" instrument_node="">
</span><p data-dcnode-id="4927"></p><p data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">The name of the app is My Leviton. It is available as a free download on Google Play and the Apple Store. You can also use the My Leviton app to&nbsp;control the Decora SmartTM with Wi-Fi® product line.</span></p><span data-dcnode-id="4924" instrument_node="">
</span><p data-dcnode-id="4923"></p><span data-dcnode-id="4922" instrument_node="">
</span><h2 data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">How do users manage their smart circuit breakers through the My Leviton app?</span></h2><span data-dcnode-id="4919" instrument_node="">
</span><p data-dcnode-id="4918"></p><p data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">The My Leviton app gives homeowners the ability to manage their home’s energy usage and monitor their smart circuit breakers through their smartphones, tablets or desktops. Within the My Leviton app, homeowners can:</span></p><span data-dcnode-id="4915" instrument_node="">
</span><ul data-dcnode-id="4901"><span data-dcnode-id="4914" instrument_node="">
</span><li data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">Monitor electricity usage per branch circuit breaker</span></li><span data-dcnode-id="4911" instrument_node="">
</span><li data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">Review their home dashboard to see system status</span></li><span data-dcnode-id="4908" instrument_node="">
</span><li data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">Analyze graphs around ‘cost’ and ‘energy consumption’ to better monitor their energy&nbsp;use for each circuit and track their electricity bill</span></li><span data-dcnode-id="4905" instrument_node="">
</span><li data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">Receive alerts if a critical circuit has tripped, or if a particular appliance has been left ON&nbsp;(like an oven) or, conversely, is not drawing power (like a refrigerator)</span></li><span data-dcnode-id="4902" instrument_node="">
</span></ul><span data-dcnode-id="4900" instrument_node="">
</span><p data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">The My&nbsp;Leviton app also helps ensure that the Leviton Load Center’s smart circuit breakers are always functioning with the latest firmware.</span></p><span data-dcnode-id="4897" instrument_node="">
</span><p data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">Additionally, the My Leviton app platform offers users the ability to add Leviton Decora Smart Wi-Fi wiring devices once installed in the home&nbsp;–&nbsp;allowing them to set schedules, create activities and take advantage of voice control through our Amazon Alexa and Google Assistant partners for these devices.</span></p><span data-dcnode-id="4894" instrument_node="">
</span><p data-dcnode-id="4893"></p><span data-dcnode-id="4892" instrument_node="">
</span><h2 data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">Can contractors be added as notification recipients?</span></h2><span data-dcnode-id="4889" instrument_node="">
</span><p data-dcnode-id="4888"></p><p data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">Yes, contractors may be invited as a User to your Residence via the My Leviton app and they can then set up notifications.</span></p><span data-dcnode-id="4885" instrument_node="">
</span><p data-dcnode-id="4884"></p><span data-dcnode-id="4883" instrument_node="">
</span><h2 data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">How accurately can the circuit breakers measure energy consumption?</span></h2><span data-dcnode-id="4880" instrument_node="">
</span><p data-dcnode-id="4879"></p><p data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">The Leviton Smart Circuit Breakers can measure consumption at ± 3% accuracy.</span></p><span data-dcnode-id="4876" instrument_node="">
</span><p data-dcnode-id="4875"></p><span data-dcnode-id="4874" instrument_node="">
</span><h2 data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">How do you remotely update firmware with Leviton’s smart circuit breakers?</span></h2><span data-dcnode-id="4871" instrument_node="">
</span><p data-dcnode-id="4870"></p><p data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">Firmware is software that is utilized by small microcontrollers or processors inside of hardware devices and is usually designed for specific purposes. In the case of a circuit breaker with electronics (AFCI, GFCI, AFCI/GFCI), firmware is embedded to sense electrical signals and act if a potentially unsafe situation—like a ground fault or arc fault—is detected.</span></p><span data-dcnode-id="4867" instrument_node="">
</span><p data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">With Leviton smart circuit breakers, additional firmware is embedded to enable metering and communication capabilities. From time to time, Leviton may push firmware updates to the breaker to improve communication functionality or fix minor bugs, similar to how a smart phone operates. These kinds of updates do not require user intervention.</span></p><span data-dcnode-id="4864" instrument_node="">
</span><p data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">In addition, Leviton’s smart AFCI and AFCI/GFCI circuit breakers have the capability to capture an arc’s “signature” (waveform) during an arc fault trip event.&nbsp;This signature can be transmitted to the Leviton cloud, so we can analyze the arc for future improvements.</span></p><span data-dcnode-id="4861" instrument_node="">
</span><p data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">In one example, a homeowner reports an AFCI trip to their local electrician. The electrician should then contact Leviton Tech Support to work through all arc fault troubleshooting procedures. If it is&nbsp;determined that the arc is being generated by a known source producing a safe arc, like an oldmiter saw, Leviton engineers can update the circuit breaker’s firmware to “mask” that arc.&nbsp;After it has been confirmed the new firmware meets UL requirements, Leviton can then push an update to that particular AFCI breaker. The user must turn OFF the breaker, enable the update, and turn the breaker back ON.&nbsp;The AFCI’s firmware has now been updated.</span></p><span data-dcnode-id="4858" instrument_node="">
</span><p data-dcnode-id="4857"></p><span data-dcnode-id="4856" instrument_node="">
</span><h2 data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">Can circuit breakers be remotely turned back ON once tripped remotely?</span></h2><span data-dcnode-id="4853" instrument_node="">
</span><p data-dcnode-id="4852"></p><p data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">No. Circuit breakers must be manually turned on after being remotely turned off.</span></p><span data-dcnode-id="4849" instrument_node="">
</span><p data-dcnode-id="4848"></p><span data-dcnode-id="4847" instrument_node="">
</span><h2 data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">Does the Data Hub, LDATA, require its own breaker?</span></h2><span data-dcnode-id="4844" instrument_node="">
</span><p data-dcnode-id="4843"></p><p data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">The Data Hub requires a powering breaker to operate; however, it does not have to be dedicated. You can tap off any 15A or 20A single pole circuit breaker&nbsp;as the lugs are rated for multiple conductors.</span></p><span data-dcnode-id="4840" instrument_node="">
</span><p data-dcnode-id="4839"></p><span data-dcnode-id="4838" instrument_node="">
</span><h2 data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Can someone hack into my system and turn off my circuit breakers or access my data?</span></h2><span data-dcnode-id="4835" instrument_node="">
</span><p data-dcnode-id="4834"></p><p data-dcnode-id="4832"><span data-dcnode-id="4833" instrument_node="">Leviton respects and values our users’ privacy and security. All communications from devices that connect to the My Leviton app, as well as the My Leviton app communication to the cloud, are encrypted using industry standards. Leviton’s internal security teams perform frequent reviews and updates and are regularly audited by external third parties.</span></p><span data-dcnode-id="4831" instrument_node="">
</span><p data-dcnode-id="4830"></p><span data-dcnode-id="4829" instrument_node="">
</span><h2 data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">How do Leviton’s smart circuit breakers compare to other circuit monitoring solutions?</span></h2><span data-dcnode-id="4826" instrument_node="">
</span><p data-dcnode-id="4825"></p><p data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">Leviton smart circuit breakers have integrated energy management control that monitors energy consumption and circuit breaker status in real time. Other circuit monitoring solutions make it possible to do this in less integrated ways by using CTs that are either connected to the main breaker loads or to individual branch loads.</span></p><span data-dcnode-id="4822" instrument_node="">

</span><h2 data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">What is the Leviton Load Center?</span></h2><span data-dcnode-id="4546" instrument_node="">
</span><p data-dcnode-id="4545"></p><p data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">The Leviton Load Center is an innovative residential electrical circuit breaker panel that offers contractors and homeowners an easy to install, safe and approachable solution to home energy management. Its award-winning installation design, safety features that exceed the UL standard and optional internet connectivity have made it&nbsp;the industry’s most advanced load center&nbsp;to date.</span></p><span data-dcnode-id="4542" instrument_node="">
</span><p data-dcnode-id="4541"></p><span data-dcnode-id="4540" instrument_node="">
</span><h2 data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">How is the Leviton Load Center installed?</span></h2><span data-dcnode-id="4537" instrument_node="">
</span><p data-dcnode-id="4536"></p><p data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">Leviton offers the fastest installing circuit breakers available on the market today, saving builders and contractors on installation time and increasing jobsite efficiency. Trim-out is also the fastest on the market - circuit breakers up to 60A feature a no-pigtail, fully plug-on design, so the entire panel, up to 60A using copper wire, can be wired at rough-in. At trim-out, simply plug on the breaker to complete the circuit.</span></p><span data-dcnode-id="4533" instrument_node="">
</span><p data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">Smart circuit breakers install the same as our standard circuit breakers along with our single data hub installed at the panel. The system automatically discovers and connects each of the smart circuit breakers through the My Leviton app. Wi-Fi® or Ethernet (hardwire) connectivity set up is simple and straightforward.</span></p><span data-dcnode-id="4530" instrument_node="">
</span><p data-dcnode-id="4529"></p><span data-dcnode-id="4528" instrument_node="">
</span><h2 data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">What types of circuit breakers does Leviton offer?</span></h2><span data-dcnode-id="4525" instrument_node="">
</span><p data-dcnode-id="4524"></p><p data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">Leviton offers&nbsp;several types of circuit breakers to ensure the right fit for your project’s application. Each variety of circuit breaker is available in a range of amperage ratings and protection types: Standard, AFCI, GFCI, AFCI/GFCI and GFPE.</span></p><span data-dcnode-id="4521" instrument_node="">
</span><ul data-dcnode-id="4501"><span data-dcnode-id="4520" instrument_node="">
</span><li data-dcnode-id="4516"><strong data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">Thermal Magnetic circuit breakers</span></strong><span data-dcnode-id="4517" instrument_node="">&nbsp;are best suited for traditional indoor installations</span></li><span data-dcnode-id="4515" instrument_node="">
</span><li data-dcnode-id="4511"><strong data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">Hydraulic Magnetic circuit breakers</span></strong><span data-dcnode-id="4512" instrument_node="">&nbsp;are ideal for harsh climates, where temperatures</span></li><span data-dcnode-id="4510" instrument_node="">
</span><li data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">may be extreme, and operate from -40°C to 85°C (-40°F to 185°F)</span></li><span data-dcnode-id="4507" instrument_node="">
</span><li data-dcnode-id="4503"><strong data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Smart circuit breakers</span></strong><span data-dcnode-id="4504" instrument_node="">&nbsp;are internet connected and feature hydraulic magnetic&nbsp;technology, making them suitable for harsh climates</span></li><span data-dcnode-id="4502" instrument_node="">
</span></ul><span data-dcnode-id="4500" instrument_node="">
</span><p data-dcnode-id="4499"></p><span data-dcnode-id="4498" instrument_node="">
</span><h2 data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">Why do Leviton hydraulic magnetic circuit breakers sometimes feel warm to the touch?</span></h2><span data-dcnode-id="4495" instrument_node="">
</span><p data-dcnode-id="4494"></p><p data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">Due to the construction of Leviton’s hydraulic magnetic branch circuit breaker, current flows nearer to the face of the breaker than some competitive breakers.</span></p><span data-dcnode-id="4491" instrument_node="">
</span><p data-dcnode-id="4490"></p><span data-dcnode-id="4489" instrument_node="">
</span><h2 data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">How does construction and current flow affect temperature?</span></h2><span data-dcnode-id="4486" instrument_node="">
</span><p data-dcnode-id="4485"></p><p data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">Electrical currents generate heat and Leviton hydraulic magnetic breakers’ internal current carrying components reside near the face of the circuit breaker. Temperatures up to 40°C (104°F) can be measured at the face of the breaker near the handle, which is far below UL temperature limit of 60°C (140°F). In some competitive circuit breakers, the current path is located more toward the back plane. Due to this, these breakers will feel cooler toward the front. Based onLeviton’s testing, overall internal temperatures are very similar.</span></p><span data-dcnode-id="4482" instrument_node="">
</span><p data-dcnode-id="4481"></p><span data-dcnode-id="4480" instrument_node="">
</span><h2 data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">Does this affect performance?</span></h2><span data-dcnode-id="4477" instrument_node="">
</span><p data-dcnode-id="4476"></p><p data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">This doesn’t affect performance at all. As defined by UL in the UL489 standard dated June 2011, the following applies:</span></p><span data-dcnode-id="4473" instrument_node="">
</span><ul data-dcnode-id="4468"><span data-dcnode-id="4472" instrument_node="">
</span><li data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">Handles, knobs and other user surfaces: UL489, paragraph 7.1.4.1.6 states that the maximum temperature on handles, knobs, and other surfaces subject to user contact during normal operation shall not exceed 60°C (140°F) on metallic and 85°C (185°F) on nonmetallic surfaces.</span></li><span data-dcnode-id="4469" instrument_node="">
</span></ul><span data-dcnode-id="4467" instrument_node="">

</span><p data-dcnode-id="4339"></p><span data-dcnode-id="4338" instrument_node="">
</span><h2 data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">When would you use a 2-pole AFCI breaker?</span></h2><span data-dcnode-id="4335" instrument_node="">
</span><p data-dcnode-id="4334"></p><p data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">2-pole AFCI breakers are needed for multi-wire branch circuits, also known as “shared neutrals” or “Edison circuits”. The definition of a multi-wire branch circuit provided by NEC 210.4 is circuits that&nbsp;“consist of two or more ungrounded conductors that have voltage between them, and agrounded conductor that has equal voltage between it and each ungrounded conductor of the circuit, and that is connected to the neutral or grounded&nbsp;conductor of the system”. Another important point from this section of Code, is that all conductors for a multi-wire branch circuit must originate from the same panel. The NEC made a change in 2011, in section 200.4, that&nbsp;“prohibits installation of ungrounded conductors on the same phase, to share a neutral”, essentially ending this practice.</span></p><span data-dcnode-id="4331" instrument_node="">
</span><p data-dcnode-id="4329"><span data-dcnode-id="4330" instrument_node="">Shared neutrals were quite common in the past so when upgrading a panel or replacing breakers you may see shared neutrals. To meet the latest version of the NEC, if AFCI protection is required on the shared neutral circuits being wired, you will be unable to use a 1-pole AFCI breaker, because in order for the 1-pole AFCI to function properly, you need a dedicated conductor for the line and neutral.</span></p><span data-dcnode-id="4328" instrument_node="">
</span><p data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">When wiring a dedicated circuit with AFCI protection, the line conductor is wired from the&nbsp;‘A’ phase lug of the breaker that feeds a dedicated load device and the neutral return is wired back to the neutral lug for that same breaker. For a multi-wire branch circuit with a shared neutral, the difference is two-line conductors are used. Line conductors will be wired from phase&nbsp;‘A’&nbsp;and&nbsp;‘B’ lugs of the breaker that feeds load devices and the neutral return will be shared with one&nbsp;conductor landing on the neutral lug&nbsp;‘C’&nbsp;for the same breaker. 2-pole AFCIs are NOT 240V rated. See Figure below.</span></p><span data-dcnode-id="4325" instrument_node="">
</span><p data-dcnode-id="4321"><span data-dcnode-id="4324" instrument_node="">
</span><img alt="" data-dcnode-id="4323" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leviton.com/en/images/lc/Load-Center-FAQs-Page-3-Figure-1.jpg&amp;raw" title=""><span data-dcnode-id="4322" instrument_node="">
</span></p><span data-dcnode-id="4320" instrument_node="">
</span><p data-dcnode-id="4319"></p><span data-dcnode-id="4318" instrument_node="">
</span><h2 data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">How can I troubleshoot a Leviton 2-Pole AFCI circuit breaker?</span></h2><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4314"></p><p data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Leviton’s 2-pole AFCI circuit breaker is intended to be used on a multi-wire circuit (shared&nbsp;neutral) applications. Each Phase is rated at 120V with a common trip. The 2-pole AFCI breaker will monitor and protect two separate circuits that share a neutral. The breaker’s rocker handleand LEDs indicate the status per the matrix below:</span></p><span data-dcnode-id="4311" instrument_node="">
</span><p data-dcnode-id="4307"><span data-dcnode-id="4310" instrument_node="">
</span><img alt="" data-dcnode-id="4309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leviton.com/en/images/lc/Load-Center-FAQs-Page-3-Figure-2.jpg&amp;raw" title=""><span data-dcnode-id="4308" instrument_node="">
</span></p><span data-dcnode-id="4306" instrument_node="">
</span><p data-dcnode-id="4305"></p><span data-dcnode-id="4304" instrument_node="">
</span><h2 data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">How do circuit breakers reset after a trip?</span></h2><span data-dcnode-id="4301" instrument_node="">
</span><p data-dcnode-id="4300"></p><p data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">To reset a Leviton circuit breaker, you must turn the breaker OFF, and then back ON.</span></p><span data-dcnode-id="4297" instrument_node="">
</span><p data-dcnode-id="4296"></p><span data-dcnode-id="4295" instrument_node="">
</span><h2 data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">What safety features does the Leviton Load Center offer?</span></h2><span data-dcnode-id="4292" instrument_node="">
</span><p data-dcnode-id="4291"></p><p data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">Leviton continuously builds upon its legacy as an industry leader in safety innovation. Beyond its optional smart functionality, the Leviton Load Center offers the only circuit breakers on the market with Leviton’s groundbreaking GFCI technology that exceeds existing UL 943 requirements. No other circuit breaker on the market provides this level of end-of-life protection.</span></p><span data-dcnode-id="4288" instrument_node="">
</span><p data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">Apart from exceeding UL requirements, Hydraulic magnetic circuit breakers feature precision trip technology, helping to ensure breakers operate as intended from -40°C to 85°C (-40°F to 185°F) without re-rating.</span></p><span data-dcnode-id="4285" instrument_node="">
</span><p data-dcnode-id="4284"></p><span data-dcnode-id="4283" instrument_node="">
</span><h2 data-dcnode-id="4281"><span data-dcnode-id="4282" instrument_node="">What are some of the benefits of choosing Leviton smart circuit breakers?</span></h2><span data-dcnode-id="4280" instrument_node="">
</span><p data-dcnode-id="4279"></p><p data-dcnode-id="4275"><span data-dcnode-id="4278" instrument_node="">Users can choose optional internet-connected circuit breakers to enjoy remote energy management options such as real time monitoring and tracking, remote tripping and system updates and alerts sent to their smartphones, tablets or desktops via the My Leviton app.</span><br data-dcnode-id="4277"><span data-dcnode-id="4276" instrument_node="">
Using a central data collection hub, the system’s status is securely sent to the My Leviton app. This communication capability helps give homeowners peace of mind that their electrical system is functioning properly no matter where they are in the world. In addition, access to the My Leviton app helps contractors securely troubleshoot issues without being in front of the unit itself.</span></p><span data-dcnode-id="4274" instrument_node="">
</span><p data-dcnode-id="4273"></p><span data-dcnode-id="4272" instrument_node="">
</span><h2 data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">I already have a Leviton Load Center. How do I make it smart?</span></h2><span data-dcnode-id="4269" instrument_node="">
</span><p data-dcnode-id="4268"></p><p data-dcnode-id="4266"><span data-dcnode-id="4267" instrument_node="">You can easily upgrade a Leviton Load Center by purchasing the Data Hub kit and replacing your standard breakers with smart circuit breakers. This should be done by a licensed electrician. The enclosure itself does not change. Then, simply download the free My Leviton app on Google Playor the Apple Store and you’ll be walked through the easy pairing process.</span></p><span data-dcnode-id="4265" instrument_node="">
</span><p data-dcnode-id="4264"></p><span data-dcnode-id="4263" instrument_node="">
</span><h2 data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Do I need Wi-Fi to make my panel a smart panel?</span></h2><span data-dcnode-id="4260" instrument_node="">
</span><p data-dcnode-id="4259"></p><p data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">The Data Hub is equipped with Wi-Fi or ethernet capabilities. In addition, if an internet connection is not available at the time of installation the panel can be still be configured and paired to a My Leviton app account later.</span></p><span data-dcnode-id="4256" instrument_node="">
</span><p data-dcnode-id="4255"></p><span data-dcnode-id="4254" instrument_node="">
</span><h2 data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">What is the name of the app and where can I find it?</span></h2><span data-dcnode-id="4251" instrument_node="">
</span><p data-dcnode-id="4250"></p><p data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">The name of the app is My Leviton. It is available as a free download on Google Play and the Apple Store. You can also use the My Leviton app to&nbsp;control the Decora SmartTM with Wi-Fi® product line.</span></p><span data-dcnode-id="4247" instrument_node="">
</span><p data-dcnode-id="4246"></p><span data-dcnode-id="4245" instrument_node="">
</span><h2 data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">How do users manage their smart circuit breakers through the My Leviton app?</span></h2><span data-dcnode-id="4242" instrument_node="">
</span><p data-dcnode-id="4241"></p><p data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">The My Leviton app gives homeowners the ability to manage their home’s energy usage and monitor their smart circuit breakers through their smartphones, tablets or desktops. Within the My Leviton app, homeowners can:</span></p><span data-dcnode-id="4238" instrument_node="">
</span><ul data-dcnode-id="4224"><span data-dcnode-id="4237" instrument_node="">
</span><li data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">Monitor electricity usage per branch circuit breaker</span></li><span data-dcnode-id="4234" instrument_node="">
</span><li data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">Review their home dashboard to see system status</span></li><span data-dcnode-id="4231" instrument_node="">
</span><li data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">Analyze graphs around ‘cost’ and ‘energy consumption’ to better monitor their energy&nbsp;use for each circuit and track their electricity bill</span></li><span data-dcnode-id="4228" instrument_node="">
</span><li data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Receive alerts if a critical circuit has tripped, or if a particular appliance has been left ON&nbsp;(like an oven) or, conversely, is not drawing power (like a refrigerator)</span></li><span data-dcnode-id="4225" instrument_node="">
</span></ul><span data-dcnode-id="4223" instrument_node="">
</span><p data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">The My&nbsp;Leviton app also helps ensure that the Leviton Load Center’s smart circuit breakers are always functioning with the latest firmware.</span></p><span data-dcnode-id="4220" instrument_node="">
</span><p data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">Additionally, the My Leviton app platform offers users the ability to add Leviton Decora Smart Wi-Fi wiring devices once installed in the home&nbsp;–&nbsp;allowing them to set schedules, create activities and take advantage of voice control through our Amazon Alexa and Google Assistant partners for these devices.</span></p><span data-dcnode-id="4217" instrument_node="">
</span><p data-dcnode-id="4216"></p><span data-dcnode-id="4215" instrument_node="">
</span><h2 data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Can contractors be added as notification recipients?</span></h2><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4211"></p><p data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">Yes, contractors may be invited as a User to your Residence via the My Leviton app and they can then set up notifications.</span></p><span data-dcnode-id="4208" instrument_node="">
</span><p data-dcnode-id="4207"></p><span data-dcnode-id="4206" instrument_node="">
</span><h2 data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">How accurately can the circuit breakers measure energy consumption?</span></h2><span data-dcnode-id="4203" instrument_node="">
</span><p data-dcnode-id="4202"></p><p data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">The Leviton Smart Circuit Breakers can measure consumption at ± 3% accuracy.</span></p><span data-dcnode-id="4199" instrument_node="">
</span><p data-dcnode-id="4198"></p><span data-dcnode-id="4197" instrument_node="">
</span><h2 data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">How do you remotely update firmware with Leviton’s smart circuit breakers?</span></h2><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4193"></p><p data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Firmware is software that is utilized by small microcontrollers or processors inside of hardware devices and is usually designed for specific purposes. In the case of a circuit breaker with electronics (AFCI, GFCI, AFCI/GFCI), firmware is embedded to sense electrical signals and act if a potentially unsafe situation—like a ground fault or arc fault—is detected.</span></p><span data-dcnode-id="4190" instrument_node="">
</span><p data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">With Leviton smart circuit breakers, additional firmware is embedded to enable metering and communication capabilities. From time to time, Leviton may push firmware updates to the breaker to improve communication functionality or fix minor bugs, similar to how a smart phone operates. These kinds of updates do not require user intervention.</span></p><span data-dcnode-id="4187" instrument_node="">
</span><p data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">In addition, Leviton’s smart AFCI and AFCI/GFCI circuit breakers have the capability to capture an arc’s “signature” (waveform) during an arc fault trip event.&nbsp;This signature can be transmitted to the Leviton cloud, so we can analyze the arc for future improvements.</span></p><span data-dcnode-id="4184" instrument_node="">
</span><p data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">In one example, a homeowner reports an AFCI trip to their local electrician. The electrician should then contact Leviton Tech Support to work through all arc fault troubleshooting procedures. If it is&nbsp;determined that the arc is being generated by a known source producing a safe arc, like an oldmiter saw, Leviton engineers can update the circuit breaker’s firmware to “mask” that arc.&nbsp;After it has been confirmed the new firmware meets UL requirements, Leviton can then push an update to that particular AFCI breaker. The user must turn OFF the breaker, enable the update, and turn the breaker back ON.&nbsp;The AFCI’s firmware has now been updated.</span></p><span data-dcnode-id="4181" instrument_node="">
</span><p data-dcnode-id="4180"></p><span data-dcnode-id="4179" instrument_node="">
</span><h2 data-dcnode-id="4177"><span data-dcnode-id="4178" instrument_node="">Can circuit breakers be remotely turned back ON once tripped remotely?</span></h2><span data-dcnode-id="4176" instrument_node="">
</span><p data-dcnode-id="4175"></p><p data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">No. Circuit breakers must be manually turned on after being remotely turned off.</span></p><span data-dcnode-id="4172" instrument_node="">
</span><p data-dcnode-id="4171"></p><span data-dcnode-id="4170" instrument_node="">
</span><h2 data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Does the Data Hub, LDATA, require its own breaker?</span></h2><span data-dcnode-id="4167" instrument_node="">
</span><p data-dcnode-id="4166"></p><p data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">The Data Hub requires a powering breaker to operate; however, it does not have to be dedicated. You can tap off any 15A or 20A single pole circuit breaker&nbsp;as the lugs are rated for multiple conductors.</span></p><span data-dcnode-id="4163" instrument_node="">
</span><p data-dcnode-id="4162"></p><span data-dcnode-id="4161" instrument_node="">
</span><h2 data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Can someone hack into my system and turn off my circuit breakers or access my data?</span></h2><span data-dcnode-id="4158" instrument_node="">
</span><p data-dcnode-id="4157"></p><p data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">Leviton respects and values our users’ privacy and security. All communications from devices that connect to the My Leviton app, as well as the My Leviton app communication to the cloud, are encrypted using industry standards. Leviton’s internal security teams perform frequent reviews and updates and are regularly audited by external third parties.</span></p><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4153"></p><span data-dcnode-id="4152" instrument_node="">
</span><h2 data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">How do Leviton’s smart circuit breakers compare to other circuit monitoring solutions?</span></h2><span data-dcnode-id="4149" instrument_node="">
</span><p data-dcnode-id="4148"></p><p data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">Leviton smart circuit breakers have integrated energy management control that monitors energy consumption and circuit breaker status in real time. Other circuit monitoring solutions make it possible to do this in less integrated ways by using CTs that are either connected to the main breaker loads or to individual branch loads.</span></p><span data-dcnode-id="4145" instrument_node="">
</span><p data-dcnode-id="4144"></p><span data-dcnode-id="4143" instrument_node="">
