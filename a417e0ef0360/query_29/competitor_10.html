</span><meta content="The degree of air pollution in an area depends on the initial parameters of pollutant emissions, meteorological conditions, and the state of the ground surface. Meteorology and potential surface conditions determine the rate of dissolution and diffusion, as well as the pathways for the migration and transformation of pollutants in the atmosphere. In this work, the researchers created a Lagrangian smoke diffusion model based on pollution levels, meteorological conditions, and initial parameters of the lower surface of the near-surface layer. The calculation uses the method of superposition of the diffusion concentration of the ground source and the ground source, and the Lagrangian coordinate system is determined by the cumulative map of the wind rose. When calculating the long-term average atmospheric concentration, a correction factor is introduced to correct for the effects of near-surface and underlying ground conditions. With the rapid development of China’s economy, communication between people anytime and anywhere has become very important, and people’s demand for and reliance on mobile communication is also increasing. The constant changes in social life mean that urban planning changes every day, and the solutions and facilities introduced by the existing mobile companies cannot meet the needs of mobile phone users. With the continuous emergence of a large number of blind spots and new problems, we find new practical solutions for mobile communications to adapt to new needs. According to the actual situation of mobile communication, combined with the theory of wireless signal propagation, this article discusses the project of in-depth optimization of the mobile coverage area, discusses according to the characteristics of the communication project and the actual situation of different regions, and finally realizes the project plan of optimized coverage in practice." data-dcnode-id="3017" name="dc.description"><span data-dcnode-id="3016" </span><meta content="The degree of air pollution in an area depends on the initial parameters of pollutant emissions, meteorological conditions, and the state of the ground surface. Meteorology and potential surface conditions determine the rate of dissolution and diffusion, as well as the pathways for the migration and transformation of pollutants in the atmosphere. In this work, the researchers created a Lagrangian smoke diffusion model based on pollution levels, meteorological conditions, and initial parameters of the lower surface of the near-surface layer. The calculation uses the method of superposition of the diffusion concentration of the ground source and the ground source, and the Lagrangian coordinate system is determined by the cumulative map of the wind rose. When calculating the long-term average atmospheric concentration, a correction factor is introduced to correct for the effects of near-surface and underlying ground conditions. With the rapid development of China’s economy, communication between people anytime and anywhere has become very important, and people’s demand for and reliance on mobile communication is also increasing. The constant changes in social life mean that urban planning changes every day, and the solutions and facilities introduced by the existing mobile companies cannot meet the needs of mobile phone users. With the continuous emergence of a large number of blind spots and new problems, we find new practical solutions for mobile communications to adapt to new needs. According to the actual situation of mobile communication, combined with the theory of wireless signal propagation, this article discusses the project of in-depth optimization of the mobile coverage area, discusses according to the characteristics of the communication project and the actual situation of different regions, and finally realizes the project plan of optimized coverage in practice." data-dcnode-id="2873" property="og:description"><span data-dcnode-id="2872" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="2349" data-gtm-vis-first-on-screen-50443292_562="1733" data-gtm-vis-first-on-screen-50443292_563="1734" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1733" data-gtm-vis-recent-on-screen-50443292_563="1734" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2350" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2354" id="Abs1"><span data-dcnode-id="2355" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2351" id="Abs1-content"><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">The degree of air pollution in an area depends on the initial parameters of pollutant emissions, meteorological conditions, and the state of the ground surface. Meteorology and potential surface conditions determine the rate of dissolution and diffusion, as well as the pathways for the migration and transformation of pollutants in the atmosphere. In this work, the researchers created a Lagrangian smoke diffusion model based on pollution levels, meteorological conditions, and initial parameters of the lower surface of the near-surface layer. The calculation uses the method of superposition of the diffusion concentration of the ground source and the ground source, and the Lagrangian coordinate system is determined by the cumulative map of the wind rose. When calculating the long-term average atmospheric concentration, a correction factor is introduced to correct for the effects of near-surface and underlying ground conditions. With the rapid development of China’s economy, communication between people anytime and anywhere has become very important, and people’s demand for and reliance on mobile communication is also increasing. The constant changes in social life mean that urban planning changes every day, and the solutions and facilities introduced by the existing mobile companies cannot meet the needs of mobile phone users. With the continuous emergence of a large number of blind spots and new problems, we find new practical solutions for mobile communications to adapt to new needs. According to the actual situation of mobile communication, combined with the theory of wireless signal propagation, this article discusses the project of in-depth optimization of the mobile coverage area, discusses according to the characteristics of the communication project and the actual situation of different regions, and finally realizes the project plan of optimized coverage in practice.</span></p></div></div></section><span data-dcnode-id="2348" instrument_node="">
</span><section data-dcnode-id="2278" data-gtm-vis-first-on-screen-50443292_562="1734" data-gtm-vis-first-on-screen-50443292_563="1735" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1734" data-gtm-vis-recent-on-screen-50443292_563="1734" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2279" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2346" id="Sec1"><span data-dcnode-id="2347" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2280" id="Sec1-content"><p data-dcnode-id="2335"><span data-dcnode-id="2345" instrument_node="">Due to the rapid development of China’s economy, rapid urbanization and increasing energy consumption, many large cities in China are now facing increasingly serious and complex air pollution problems (Bi </span><a aria-label="Reference 1979" data-dcnode-id="2343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d99884861e462" title="Bi ZW (1979) Discussion on the relationship between earthquake and landslide and earthquake landslide prediction. People's Railway Press, Beijing, pp 127–132"><span data-dcnode-id="2344" instrument_node="">1979</span></a><span data-dcnode-id="2342" instrument_node="">). As one of the centers of scientific research, the entire community, including the scientific community, is now paying more and more attention to air quality issues. Ground-level ozone research is more important (Cardarilli et al. </span><a aria-label="Reference 2019" data-dcnode-id="2340" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d99884861e465" title="Cardarilli M, Lombardi M, Corazza A (2019) Landslide risk management through spatial analysis and stochastic prediction for territorial resilience evaluation. Int J Saf Secur Eng 9(2):109–120"><span data-dcnode-id="2341" instrument_node="">2019</span></a><span data-dcnode-id="2339" instrument_node="">). Ground-level ozone is more susceptible to emissions, because the ozone precursors emitted by natural and anthropogenic substances vary greatly from region to region. Many countries have eliminated ground-level ozone and related anthropogenic emissions (Chen and Chen </span><a aria-label="Reference 2004" data-dcnode-id="2337" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d99884861e468" title="Chen LL, Chen MZ (2004) Graduate School of Chinese Academy of Sciences. Grad School Chin Acad Sci 25(11):11786–11790"><span data-dcnode-id="2338" instrument_node="">2004</span></a><span data-dcnode-id="2336" instrument_node="">).</span></p><p data-dcnode-id="2315"><span data-dcnode-id="2334" instrument_node="">Many countries developed air quality standards for gaseous ozone pollutants to protect public health and plant growth and air quality standards for gaseous ozone pollutants to protect public health and plant growth (Du et al. </span><a aria-label="Reference 2001" data-dcnode-id="2332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d99884861e474" title="Du JC, Huang DS, Hu D (2001) Three-dimensional method of limiting equilibrium for stability analysis of slope. J Sichuan Univ Eng Sci Ed 33(4):9–12"><span data-dcnode-id="2333" instrument_node="">2001</span></a><span data-dcnode-id="2331" instrument_node="">). It was not until the USA passed the Air Pollution Control Act in 1955 that air pollution was considered a national pollution problem (Gao et al. </span><a aria-label="Reference 2019" data-dcnode-id="2329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d99884861e477" title="Gao CJ, Qiao D, Zhang XF, Liu SY, Zhou YF (2019) Analysis of seepage influence on high slopes based on multi-dimensional measured data. Instrum Mesure Métrol 18(6):603–613"><span data-dcnode-id="2330" instrument_node="">2019</span></a><span data-dcnode-id="2328" instrument_node="">). The Air Pollution Control Act of the USA is an environmental protection law that has been gradually revised and improved for more than a century. The Chinese government passed the Air Pollution Prevention and Control Law in 1987. In many large cities, especially in large cities in China or elsewhere, serious ozone pollution from the emission of ozone precursor pollutants has aroused policy concern. In the economically developed areas of China, especially the Yangtze River Delta, the Pearl River Delta, and the Bohai Bay area in the Beijing–Tianjin–Hebei region, more attention is paid to the control of ozone and other types of air pollution (Keefer </span><a aria-label="Reference 1984" data-dcnode-id="2326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d99884861e480" title="Keefer DK (1984) Landslides caused by earthquakes. Geol Soc Am Bull 95(4):406–421"><span data-dcnode-id="2327" instrument_node="">1984</span></a><span data-dcnode-id="2325" instrument_node="">) ( Li and Cai </span><a aria-label="Reference 2020" data-dcnode-id="2323" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d99884861e483" title="Li C, Cai Y (2020) Effect of soil strength degradation on slope stability. Int J Des Nat Ecodyn 15(4):483–489"><span data-dcnode-id="2324" instrument_node="">2020</span></a><span data-dcnode-id="2322" instrument_node="">). With the continuous advancement of reform and opening up, society, economy, and culture have also been developed, and the rapid economic development has led to the rapid development of the communications industry. Among various telecommunication services, mobile communication has gradually developed from a new service at the end of the last century to a major part of the modern communication market, and its development speed is also much higher than that of fixed and long-term traditional services (Liu et al. </span><a aria-label="Reference 2004" data-dcnode-id="2320" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d99884861e486" title="Liu HS, Bo JS, Geng DQ, Wu ZY (2004) Rock landslide stability analysis by finite element method. Rock Soil Mech 25:1786–1790"><span data-dcnode-id="2321" instrument_node="">2004</span></a><span data-dcnode-id="2319" instrument_node="">). Since the mobile communication produced by long-distance communication has become a key pillar of the communication industry, in the long run, it has become an emerging trend that mobile communication is replacing traditional fixed telephone communication, and fixed telephone has become a sunset industry. Just like replacing BP with mobile devices, replacing landlines with mobile phones may last for several years, unless regulations are restricted (Luo et al. </span><a aria-label="Reference 2020" data-dcnode-id="2317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d99884861e490" title="Luo JH, Mi DC, Huang HF, Zhang T, Sun GH, Chen DQ (2020) Intelligent monitoring, stability evaluation, and landslide treatment of a carbonaceous mudstone and shale slope in Guangxi, China. Int J Saf Sec Eng 10(3):373–379"><span data-dcnode-id="2318" instrument_node="">2020</span></a><span data-dcnode-id="2316" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2313" id="Sec2"><span data-dcnode-id="2314" instrument_node="">Current research status of atmospheric environment in coastal areas</span></h3><p data-dcnode-id="2302"><span data-dcnode-id="2312" instrument_node="">In 1915, Taylor first proposed boundary-layer turbulence, and people began to understand that turbulence is an inherent property of the atmosphere and even all earth fluids. Since then, turbulence theory has entered a stage of rapid development and has become an important theoretical basis for studying boundary-layer meteorology (Miles and Ho </span><a aria-label="Reference 1999" data-dcnode-id="2310" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d99884861e500" title="Miles SB, Ho CL (1999) Rigorous landslide hazard zonation using Newmark’s method and stochastic ground motion simulation. Soil Dyn Earthq Eng 18(4):305–323"><span data-dcnode-id="2311" instrument_node="">1999</span></a><span data-dcnode-id="2309" instrument_node="">). In 1925, Pandit simulated the free path of molecules and introduced the theory of mixing length turbulence. In 1935, Taylor proposed a unified isotropic turbulence theory and applied it to three-dimensional turbulence problems (Nai </span><a aria-label="Reference 2010" data-dcnode-id="2307" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d99884861e503" title="Nai L (2010) Slope engineering. The Science Publishing Company, Beijing"><span data-dcnode-id="2308" instrument_node="">2010</span></a><span data-dcnode-id="2306" instrument_node="">). In this way, he laid the foundation for the development of turbulence statistics theory. In 1941, the former Soviet Union scientist Kolmogorov creatively proposed a size analysis method and applied it to turbulence research and obtained the famous structure function law “Law-2/3.” The introduction of the turbulent microstructure law is an important milestone in theoretical research (Onyango and Zhang </span><a aria-label="Reference 2019" data-dcnode-id="2304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d99884861e506" title="Onyango JA, Zhang CY (2019) Numerical analysis of slope stability by strength reduction in finite elements using ANSYS a case study of Qinglong-Xingyi expressway contract section T1(K11 + 790 ~ K11 + 875). Environ Earth Sci Res J 6(2):89–96"><span data-dcnode-id="2305" instrument_node="">2019</span></a><span data-dcnode-id="2303" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2300" id="Sec3"><span data-dcnode-id="2301" instrument_node="">Radio wave propagation mode</span></h3><p data-dcnode-id="2292"><span data-dcnode-id="2299" instrument_node="">In mobile communication, two or at least one of them is moving, and communication between moving objects can only be based on radio transmission. Among the various types of radio wave propagation, the type of radio wave propagation in free space is the most basic and simple. The wireless propagation environment is very complex, with various propagation methods, including almost all radio propagation processes (Penumadu and Zhao </span><a aria-label="Reference 1999" data-dcnode-id="2297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d99884861e517" title="Penumadu D, Zhao R (1999) Triaxial compression behavior of sand and gravel using artificial neural networks (ANN). Comput Geotech 24(3):207–230"><span data-dcnode-id="2298" instrument_node="">1999</span></a><span data-dcnode-id="2296" instrument_node="">). When the propagation path between the transmitter and receiver is blocked by sharp edges, it is propagation. Because the MS antenna is relatively low and constantly moving, changes in the environment will cause different changes in signal levels. There are two main reasons for discussing radio propagation: first, it provides the tools needed to calculate the field strengths covering different cells. In most cases, the coverage ranges from a few hundred meters to tens of kilometers. In this case, line-of-sight propagation can be used. Second, adjacent channels and intra-channel interference can be calculated (Qi </span><a aria-label="Reference 2006" data-dcnode-id="2294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d99884861e520" title="Qi SW (2006) Analysis and application of slope dynamic response. Graduate School of Chinese Academy of Sciences, Beijing"><span data-dcnode-id="2295" instrument_node="">2006</span></a><span data-dcnode-id="2293" instrument_node="">).</span></p><p data-dcnode-id="2281"><span data-dcnode-id="2291" instrument_node="">According to Maxwell’s equation, if alternating current passes through a wire, electromagnetic waves are generated, and the radiated power depends on the length and shape of the wire. The current in the wire is very large, and it is easy to absorb and generate stronger radiation (Qi et al. </span><a aria-label="Reference 2004" data-dcnode-id="2289" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d99884861e526" title="Qi SW, Wu FQ, Liu CL, Ding YH (2004) Engineering geology analysis on stability of slope under earthquake. Chin J Rock Mech Eng 23(16):2792–2797"><span data-dcnode-id="2290" instrument_node="">2004</span></a><span data-dcnode-id="2288" instrument_node="">). The straight wire that can generate a lot of radiation is called a vibrator. In addition, there is a symmetrical half-wave oscillator with a special shape, which folds the symmetrical full-wave generator into a narrow rectangular frame and adds two ends of the symmetrical full-wave generator (Qiu et al. </span><a aria-label="Reference 2018" data-dcnode-id="2286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d99884861e529" title="Qiu CJ, Wang S, Liu H, Huang J (2018) In-situ pull-out tests on soil-reinforcement interface properties of reinforced soil slopes. Ann Chim Sci Mater 42(1):41–56"><span data-dcnode-id="2287" instrument_node="">2018</span></a><span data-dcnode-id="2285" instrument_node="">). This narrow rectangular generator frame is called a shock absorber, and the length of the shock absorber is also half the wavelength, so it is called a half-wave vibrator (Raza et al. </span><a aria-label="Reference 2020" data-dcnode-id="2283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d99884861e532" title="Raza M, Khan F, Khan MY, Riaz MT, Khan U (2020) Reservoir characterization of the B-interval of lower goru formation, miano 9 and 10, miano area, Lower Indus Basin, Pakistan. Environ Earth Sci Res J 7(1):18–32"><span data-dcnode-id="2284" instrument_node="">2020</span></a><span data-dcnode-id="2282" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="2094" data-gtm-vis-first-on-screen-50443292_562="1734" data-gtm-vis-first-on-screen-50443292_563="1735" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1734" data-gtm-vis-recent-on-screen-50443292_563="1735" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Materials and methods"><div class="c-article-section" data-dcnode-id="2095" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2276" id="Sec4"><span data-dcnode-id="2277" instrument_node="">Materials and methods</span></h2><div class="c-article-section__content" data-dcnode-id="2096" id="Sec4-content"><h3 class="c-article__sub-heading" data-dcnode-id="2274" id="Sec5"><span data-dcnode-id="2275" instrument_node="">Offshore platform tower base</span></h3><p data-dcnode-id="2269"><span data-dcnode-id="2273" instrument_node="">The turbulence data in this article is derived from a combination of near-surface meteorological towers to near-surface observation stations and a boundary-layer observation system network. The experimental data provided by the observation system can be used for multi-stage studies of ocean, land, and air interactions. Reveal the structural characteristics of the tropical ocean-atmosphere boundary layer, and further understand the temporal and spatial characteristics of the earth’s monsoon evolution. Entering the South China Sea, the occurrence and development mechanism of its disastrous weather has important research value (Rodrıguez et al. </span><a aria-label="Reference 1999" data-dcnode-id="2271" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d99884861e548" title="Rodrıguez CE, Bommer JJ, Chandler RJ (1999) Earthquake-induced landslides: 1980–1997. Soil Dyn Earthq Eng 18(5):325–346"><span data-dcnode-id="2272" instrument_node="">1999</span></a><span data-dcnode-id="2270" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2267" id="Sec6"><span data-dcnode-id="2268" instrument_node="">Data preprocessing and quality control</span></h3><p data-dcnode-id="2262"><span data-dcnode-id="2266" instrument_node="">The vortex correlation system uses fast sensors to obtain the pulsation of the physical quantity produced by atmospheric turbulence and calculates the covariance of the wind speed pulsation and the pulsation of other physical quantities to obtain the corresponding energy or mass turbulence. This method is not based on the similarity theory, and the calculation process does not depend on the expression of empirical relationships. In order to facilitate comparison and analysis with other studies, the next statistical analysis of turbulence usually requires 30 min as an average time (Rui and Zhang </span><a aria-label="Reference 1999" data-dcnode-id="2264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d99884861e559" title="Rui YQ, Zhang YD (1999) Dynamic control technology of creep slope deformation and failure in open pit coal mine. China Min 8(4):34–38"><span data-dcnode-id="2265" instrument_node="">1999</span></a><span data-dcnode-id="2263" instrument_node="">).</span></p><p data-dcnode-id="2257"><span data-dcnode-id="2261" instrument_node="">Under the conditions of the land surface below, the transverse tension of the wind speed is approximately zero. Therefore, the method of rotating the three coordinate axes is widely used in practical applications. At the sea surface, the shear stress is usually not close to zero, which is inconsistent with the assumption that the cubic axis is rotating. Therefore, this article uses the quadratic rotation method to correct the wind speed (Shuren et al. </span><a aria-label="Reference 1999" data-dcnode-id="2259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d99884861e565" title="Shuren FENG, Dingxiang F, Xiurun G, Xianrong G (1999) 3D limit equilibrium method for slope stability and its application. Chin J Geotech Eng-Chin Ed 21(6):657–661"><span data-dcnode-id="2260" instrument_node="">1999</span></a><span data-dcnode-id="2258" instrument_node="">).</span></p><p data-dcnode-id="2249"><span data-dcnode-id="2256" instrument_node="">Figure </span><a data-dcnode-id="2254" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2255" instrument_node="">1</span></a><span data-dcnode-id="2253" instrument_node=""> shows the change sequence of the average vertical wind speed within 30 min of the observation period. The average vertical wind speed is mainly concentrated in the range of ± 0.2 m/s, which is higher than the theoretical value of vertical speed (10–2), and at certain times, there is a general deviation in the segment (Sun </span><a aria-label="Reference 1999" data-dcnode-id="2251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d99884861e574" title="Sun YK (1999) Study on slope stability of open pit mines in China. Press of University of Science and Technology of China, Beijing"><span data-dcnode-id="2252" instrument_node="">1999</span></a><span data-dcnode-id="2250" instrument_node="">).

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2165" id="Sec7"><span data-dcnode-id="2166" instrument_node="">Average meteorological field and turbulence statistics method</span></h3><p data-dcnode-id="2160"><span data-dcnode-id="2164" instrument_node="">The stability of atmospheric stratification is an important physical quantity that characterizes the average state of the atmosphere. That is to say, the stability parameter of atmospheric stratification is determined by the following Formula (</span><a data-dcnode-id="2162" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="2163" instrument_node="">1</span></a><span data-dcnode-id="2161" instrument_node="">):
</span></p><div class="c-article-equation" data-dcnode-id="2151" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="2154"><span class="mathjax-tex" data-dcnode-id="2155"><span class="MathJax_Preview" data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node=""> L=\frac{-\overline{\theta}{u}_v^3}{k\mathrm{g}\overline{w}{\overline{\theta}}_v} </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">Usually, the standard deviation of the horizontal wind speed is used to measure the intensity of the pulsation, which is called turbulence. The calculation formula is Formula (</span><a data-dcnode-id="2148" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ2"><span data-dcnode-id="2149" instrument_node="">2</span></a><span data-dcnode-id="2147" instrument_node="">):
</span></p><div class="c-article-equation" data-dcnode-id="2137" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="2140"><span class="mathjax-tex" data-dcnode-id="2141"><span class="MathJax_Preview" data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node=""> {I}_j={\sigma}_j/\overline{U}\left(j=u,v,w\right) </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">
                    (2)
                </span></div></div><p data-dcnode-id="2132"><span data-dcnode-id="2136" instrument_node="">According to the similarity of Mourning–Obukhov, the dispersion of the turbulent velocity component can be expressed by the general function z/L dimensionless, as in Formula (</span><a data-dcnode-id="2134" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ3"><span data-dcnode-id="2135" instrument_node="">3</span></a><span data-dcnode-id="2133" instrument_node="">):
</span></p><div class="c-article-equation" data-dcnode-id="2123" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="2126"><span class="mathjax-tex" data-dcnode-id="2127"><span class="MathJax_Preview" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node=""> {\sigma}_a/{a}_{\varnothing }={\varnothing}_a\left(z/L\right) </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="2115"><span data-dcnode-id="2122" instrument_node="">The research in this paper shows that under unstable and stable conditions, the dimensionless dispersion of wind speed all obeys the 1/3 power similarity law. The similarities of the adjusted wind speed deviation are shown in Formulas (</span><a data-dcnode-id="2120" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ4"><span data-dcnode-id="2121" instrument_node="">4</span></a><span data-dcnode-id="2119" instrument_node="">) and (</span><a data-dcnode-id="2117" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ5"><span data-dcnode-id="2118" instrument_node="">5</span></a><span data-dcnode-id="2116" instrument_node="">):
</span></p><div class="c-article-equation" data-dcnode-id="2106" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="2109"><span class="mathjax-tex" data-dcnode-id="2110"><span class="MathJax_Preview" data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node=""> \left\{\begin{array}{l}{\sigma}_u/{u}_a=2.2811{\left(1-0.7914/L\right)}^{1/3}\\ {}{\sigma}_{\mathrm{v}}/{u}_a=2.1065{\left(1-1.314z/L\right)}^{1/3}z/L\le -0.001\\ {}{\sigma}_w/{u}_a=1.1205{\left(1-2.6026z/L\right)}^{1/3}\end{array}\right. </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">
                    (4)
                </span></div></div><div class="c-article-equation" data-dcnode-id="2097" id="Equ5"><div class="c-article-equation__content" data-dcnode-id="2100"><span class="mathjax-tex" data-dcnode-id="2101"><span class="MathJax_Preview" data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node=""> \left\{\begin{array}{l}{\sigma}_u/{u}_a=2.5651{\left(1+2.9542\mathrm{z}/L\right)}^{1/3}\\ {}{\sigma}_{\mathrm{v}}/{u}_a=2.3801{\left(1+2.0324z/L\right)}^{1/3}z/L\ge 0.001\\ {}{\sigma}_w/{u}_a=1.1546{\left(1+1.8492z/L\right)}^{1/3}\end{array}\right. </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">
                    (5)
                </span></div></div></div></div></section><section data-dcnode-id="1558" data-title="Results"><div class="c-article-section" data-dcnode-id="1559" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2092" id="Sec8"><span data-dcnode-id="2093" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="1560" id="Sec8-content"><h3 class="c-article__sub-heading" data-dcnode-id="2090" id="Sec9"><span data-dcnode-id="2091" instrument_node="">Model configuration and verification results of atmospheric environment in coastal areas</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2088" id="Sec10"><span data-dcnode-id="2089" instrument_node="">Mode configuration</span></h4><p data-dcnode-id="2077"><span data-dcnode-id="2087" instrument_node="">The terrain data uses GEBCO underwater terrain data with a resolution of 1 provided by the International Hydrographic Organization and the Intergovernmental Oceanographic Commission. The data was released in 2015 and updated in 2020. The advantage of this is that the calculation time step can be increased accordingly without losing stability, thereby saving calculations and improving the efficiency of the model. Figure </span><a data-dcnode-id="2085" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2086" instrument_node="">4</span></a><span data-dcnode-id="2084" instrument_node=""> is an enlarged view of the details of the Yellow Sea (Tan </span><a aria-label="Reference 1998" data-dcnode-id="2082" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d99884861e1292" title="Tan WH (1998) Discussion on slope stability analysis method. Open Pit Min Technol 2:21–23"><span data-dcnode-id="2083" instrument_node="">1998</span></a><span data-dcnode-id="2081" instrument_node="">)(Tang and Shao </span><a aria-label="Reference 2004" data-dcnode-id="2079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d99884861e1295" title="Tang HX, Shao LT (2004) Finite element analysis on slope stability of earth-rock dam under earthquake. Chin J Rock Mech Eng 23(8):1318–1324"><span data-dcnode-id="2080" instrument_node="">2004</span></a><span data-dcnode-id="2078" instrument_node="">).
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2053" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="2054"><figcaption data-dcnode-id="2074"><b class="c-article-section__figure-caption" data-dcnode-id="2075" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2076" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2065"><div class="c-article-section__figure-item" data-dcnode-id="2069"><a class="c-article-section__figure-link" data-dcnode-id="2070" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12517-021-07206-z/figures/4" rel="nofollow"><picture data-dcnode-id="2071"><source data-dcnode-id="2073" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12517-021-07206-z/MediaObjects/12517_2021_7206_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2072" height="661" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12517-021-07206-z/MediaObjects/12517_2021_7206_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2066" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">The bottom of the Yellow Sea is larger</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2055"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2056" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-t </span></a></div></figure></div><p data-dcnode-id="2042"><span data-dcnode-id="2052" instrument_node="">The average wind speed of the meteorological field jumped during the day, and the size of the observation period changed significantly and reached the maximum value of 22.18 m/s on September 15th. During the entire measurement period, the average level was 6.26 m/s, and there was no obvious systemic change in 5–6 days, which was related to the fluctuation of the weather scale, as shown in Fig. </span><a data-dcnode-id="2050" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2051" instrument_node="">5a</span></a><span data-dcnode-id="2049" instrument_node="">. As far as the frequency distribution of wind speed is concerned, as shown in Fig. </span><a data-dcnode-id="2047" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2048" instrument_node="">5b</span></a><span data-dcnode-id="2046" instrument_node="">, the distribution range of wind speed is wide, and the frequency of occurrence is higher, in the range of 2–9 m/s, where the wind speed is 4–5 m/s. During the observation period, moderate wind speeds are most often observed. During the observation period, the northerly wind was the most common, followed by the easterly wind, and the lowest frequency was southerly wind and westerly wind, as shown in Fig. </span><a data-dcnode-id="2044" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2045" instrument_node="">5c</span></a><span data-dcnode-id="2043" instrument_node="">.

</span></a></div></figure></div><p data-dcnode-id="1867"><span data-dcnode-id="1871" instrument_node="">During the period shown in Table </span><a data-dcnode-id="1869" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1870" instrument_node="">1</span></a><span data-dcnode-id="1868" instrument_node="">, it is proved that the friction speed and sea wind speed are very consistent. The horizontal direction tends to increase; the vertical direction weakens slightly and then increases; the sensible heat flux generally decreases and becomes negative.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1865" id="Sec11"><span data-dcnode-id="1866" instrument_node="">Model verification results</span></h4><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">The starting point of the mode calculation is set at 00:00 on January 1st, starting from the initial field controlled by the force surface field and the boundary field. For the external mode, the calculated time step is 4 s, and the internal mode is the oblique printing 120 s. After 3 years of calculation, the model has reached a stable state.&nbsp;The average temperature and salinity field of the river and some key areas from December of the third year to February of the second year, such as the northern end of the Strait A, the eastern waterway of B, the PN section, the Tuga Strait, and the Tsushima Strait, were tested. The cross-section and velocity of the hot salt water flow in the Marstraat were tested to verify the reliability of the model results.</span></p><p data-dcnode-id="1852"><span data-dcnode-id="1862" instrument_node="">Figures </span><a data-dcnode-id="1860" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="1861" instrument_node="">9</span></a><span data-dcnode-id="1859" instrument_node=""> and </span><a data-dcnode-id="1857" dat </span></a></div></figure></div><p data-dcnode-id="1799"><span data-dcnode-id="1803" instrument_node="">On the west coast of mainland China, the formation of water belts is mainly due to the diffusion of fresh water in the Yangtze River. In winter, under the influence of the monsoon, the thin water of the Yangtze River flows into the sea and then turns right along the coast. It forms a low-salinity area south of the Yangtze River estuary and a low-salinity area north of the Yangtze River. Due to the salty Kuroshio in the south, the total salt content is slightly higher than that in the north. In the middle of the Yellow Sea, the saline water seeps northward, as shown in Fig. </span><a data-dcnode-id="1801" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="1802" instrument_node="">10</span></a><span data-dcnode-id="1800" instrument_node="">.</span></p><p data-dcnode-id="1794"><span data-dcnode-id="1798" instrument_node="">The northern tributary of Area A merges with the northern ocean current of the Strait A and turns into a warm current of Land A in winter. The other branch turns north and then northeast to become a warm Tsushima ocean current. The warm Tsushima Current separates the south side of Island B from the northwest tributary. This tributary brings the high-temperature and high-salinity Kuroshio water into the Yellow Sea and becomes part of the Yellow Sea Warm Current. A geothermal current is also divided into two branches: one flows northward along the coast of mainland China and penetrates into the Yangtze River, and the other flows northeast along the edge of the continental shelf and merges with the warm Tsushima Strait, a tributary of the Kuroshio (Fig. </span><a data-dcnode-id="1796" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="1797" instrument_node="">11</span></a><span data-dcnode-id="1795" instrument_node="">).
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1770" data-test="figure" data-title="Fig. 11" id="figure-11"><figure data-dcnode-id="1771"><figcaption data-dcnode-id="1791"><b class="c-article-section__figure-caption" data-dcnode-id="1792" data-test="figure-caption-text" id="Fig11"><span data-dcnode-id="1793" instrument_node="">Fig. 11</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1782"><div class="c-article-section__figure-item" data-dcnode-id="1786"><a class="c-article-section__figure-link" data-dcnode-id="1787" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12517-021-07206-z/figures/11" rel="nofollow"><picture data-dcnode-id="1788"><source data-dcnode-id="1790" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12517-021-07206-z/MediaObjects/12517_2021_7206_Fig11_HTML.png?as=webp" type="image/webp"><img alt="figure 11" aria-describedby="Fig11" data-dcnode-id="1789" height="622" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12517-021-07206-z/MediaObjects/12517_2021_7206_Fig11_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1783" data-test="bottom-caption" id="figure-11-desc"><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Horizontal distribution of SSH fields in winter</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1772"><a aria-label="Full size image figure 11" class="c-article__pill-button" data-dcnode-id="1773" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure11 Fu </span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1741" data-test="figure" data-title="Fig. 12" id="figure-12"><figure data-dcnode-id="1742"><figcaption data-dcnode-id="1762"><b class="c-article-section__figure-caption" data-dcnode-id="1763" data-test="figure-caption-text" id="Fig12"><span data-dcnode-id="1764" instrument_node="">Fig. 12</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1753"><div class="c-article-section__figure-item" data-dcnode-id="1757"><a class="c-article-section__figure-link" data-dcnode-id="1758" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12517-021-07206-z/figures/12" rel="nofollow"><picture data-dcnode-id="1759"><source data-dcnode-id="1761" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12517-021-07206-z/MediaObjects/12517_2021_7206_Fig12_HTML.png?as=webp" type="image/webp"><img alt="figure 12" aria-describedby="Fig12" data-dcnode-id="1760" height="651" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12517-021-07206-z/MediaObjects/12517_2021_7206_Fig12_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1754" data-test="bottom-caption" id="figure-12-desc"><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Salinity distribution in the 5-m layer of the Yellow Sea and Bohai Sea</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1743"><a aria-label="Full size image figure 12" class="c-article__pill-button" data-dcnode-id="1744" data-test="article-link" data-track="click" data-track-action="view figure" data-track </span></a></div></figure></div><p data-dcnode-id="1736"><span data-dcnode-id="1740" instrument_node="">From the enlarged map of the salinity distribution in the Bohai Sea and the Yellow Sea, it is obvious that the tongue of salt water penetrates the Yellow Sea from the south of Jeju Island in the northwest, while the southern part of the salt water has a lower salinity area. The salinity difference between them is 4 to 8, and the iso-salt line is almost parallel in the northwest-south-south-east-south-south direction, which may be the frontal salt zone. The horizontal temperature distribution shows that the high-temperature water tongue penetrates from the south to the northwest of Island B to the central part of the South Yellow Sea and divides into two branches. One branch extends to the south of Peninsula E and extends to the northwest, east of Haizhou Bay, and the other one branch goes north into the North Yellow Sea. In the southern part of the Yellow Sea, the isotherm is basically S-shaped. Some scholars believe that this is the result of transportation from the coast of F to the southeast coast, as shown in Fig. </span><a data-dcnode-id="1738" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig13"><span data-dcnode-id="1739" instrument_node="">13</span></a><span data-dcnode-id="1737" instrument_node="">.
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1712" data-test="figure" data-title="Fig. 13" id="figure-13"><figure data-dcnode-id="1713"><figcaption data-dcnode-id="1733"><b class="c-article-section__figure-caption" data-dcnode-id="1734" data-test="figure-caption-text" id="Fig13"><span data-dcnode-id="1735" instrument_node="">Fig. 13</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1724"><div class="c-article-section__figure-item" data-dcnode-id="1728"><a class="c-article-section__figure-link" data-dcnode-id="1729" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12517-021-07206-z/figures/13" rel="nofollow"><picture data-dcnode-id="1730"><source data-dcnode-id="1732" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12517-021-07206-z/MediaObjects/12517_2021_7206_Fig13_HTML.png?as=webp" type="image/webp"><img alt="figure 13" aria-describedby="Fig13" data-dcnode-id="1731" height="649" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12517-021-07206-z/MediaObjects/12517_2021_7206_Fig13_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1725" data-test="bottom-caption" id="figure-13-desc"><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">The temperature level distribution in the 5-m layer of the Yellow Sea and Bohai Sea</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1714"><a aria-label="Full size image figure 13" class="c-article__pill-button" data-dcnode-id="1715" data-test="article-link" data-track="click" data-track-action="view figur </span></a></div></figure></div><p data-dcnode-id="1592"><span data-dcnode-id="1599" instrument_node="">The difference shown in Fig. </span><a data-dcnode-id="1597" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig15"><span data-dcnode-id="1598" instrument_node="">15</span></a><span data-dcnode-id="1596" instrument_node=""> should be attributed to the fact that the model does not add tides to improve calculation efficiency. In shallow water areas and areas with relatively steep bottom shapes, tidal mixtures and tidal fronts have a definite influence on temperature and salinity distribution. In the deep water area, the impact is relatively small, as shown in Fig. </span><a data-dcnode-id="1594" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig16"><span data-dcnode-id="1595" instrument_node="">16</span></a><span data-dcnode-id="1593" instrument_node="">.</span></p><p data-dcnode-id="1587"><span data-dcnode-id="1591" instrument_node="">The winter value is higher than the average, and the winter salinity field and the horizontal distribution of the flow field are in good agreement with the above observation and modeling results, which confirms the accuracy of the model results, as shown in Fig. </span><a data-dcnode-id="1589" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig17"><span data-dcnode-id="1590" instrument_node="">17</span></a><span data-dcnode-id="1588" instrument_node="">.</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">We also calculated the average winter flow of Strait A, the eastern Taiwan waterway, the PN section, the Tugai Strait, and the Tsushima Strait. The results are shown in Table </span><a data-dcnode-id="1584" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1585" instrument_node="">2</span></a><span data-dcnode-id="1583" instrument_node="">. These results are consistent with earlier observations and model results and also confirm the accuracy of the flux field simulation.

</span></a></div></figure></div><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">This article first analyzes the 3D wind speed and then uses wavelet analysis to identify and extract its consistent pattern. The selected analysis data is the 30-min wind pulsation data from 6:00 pm to 6:30 pm on September 3, 2016. During this period, the weather conditions were stable, and the southeast wind was practically unaffected by the land.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1563" id="Sec12"><span data-dcnode-id="1564" instrument_node="">Wavelet coefficient spectrum analysis</span></h4><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">The Fourier transform of the wavelet coefficients on each scale can be used to obtain the wavelet energy distribution corresponding to different scales in the frequency domain, so as to study the relationship between the scale of the coherent structure and the generation period and additionally describe the time series of the coherent structure the law of change.</span></p></div></div></section><section data-dcnode-id="1364" data-title="Discussion"><div class="c-article-section" data-dcnode-id="1365" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1556" id="Sec13"><span data-dcnode-id="1557" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="1366" id="Sec13-content"><h3 class="c-article__sub-heading" data-dcnode-id="1554" id="Sec14"><span data-dcnode-id="1555" instrument_node="">Classification and principles of antennas</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1552" id="Sec15"><span data-dcnode-id="1553" instrument_node="">Basic knowledge of plate antenna</span></h4><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">The advantages of this antenna are small backlobe, convenient vertical beam control, reliable sealing, and long service life. Panel antennas are also often used as custom antennas for repeaters, and a suitable antenna model should be selected according to the size of the work area.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1548" id="Sec16"><span data-dcnode-id="1549" instrument_node="">High-gain grid parabolic antenna</span></h4><p data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node="">In terms of cost, people often choose parabolic array antennas as transponder donor antennas. Since the parabola has a good focusing effect, the parabola antenna has high pick-up and launch capabilities. The parabolic array antenna with a diameter of 1.5 m can provide a gain of </span><i data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">G</span></i><span data-dcnode-id="1544" instrument_node=""> = 20 dB in the 900 MHz frequency band. It is especially suitable for point-to-point communication. The parabola adopts a lattice structure, one is used to reduce the weight of the antenna, and the other is used to reduce wind resistance. Generally, the front-to-rear ratio of a parabolic antenna is at least 30 dB.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1541" id="Sec17"><span data-dcnode-id="1542" instrument_node="">Yagi directional antenna</span></h4><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">The more elements in a directional Yagi antenna, the higher its gain, usually with 6–12 elements, their amplification rate can reach 10 to 15dB.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1537" id="Sec18"><span data-dcnode-id="1538" instrument_node="">Indoor Ceiling Antenna</span></h4><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Although the internal structure of the ceiling antenna is very small, because it is based on the theory of broadband antennas, it has the functions of computer-aided design and debugging with a network analyzer, so it can well meet the requirements of wide working bandwidth.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1533" id="Sec19"><span data-dcnode-id="1534" instrument_node="">Indoor wall antenna</span></h4><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">The internal structure of the wall antenna is an aviation dielectric microstrip antenna. Through the support structure of expanding the antenna bandwidth, computer-aided design, and debugging with a network analyzer, it can better meet the broadband requirements of normal operation.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1529" id="Sec20"><span data-dcnode-id="1530" instrument_node="">Working principle and classification of repeaters</span></h4><p data-dcnode-id="1524"><span data-dcnode-id="1528" instrument_node="">In order to maximize the saving of various resources, we need to consider the proportional relationship between input and output. Telecom operators usually increase profitability by increasing equipment utilization. Of course, this must be based on strong hardware support and some investment to expand coverage to maximize traffic and improve economic efficiency. Because the actual propagation environment of radio waves is extremely complicated, elevators and some small restaurants in cities are highly shielded by signals. In the suburbs, hills and forests become obstacles, and the spaces in tunnels and basements are usually blind spots. The difference in the above environment is that the scale is small and the number of users is sometimes small, so the cost of using a new base station is too high, as shown in Fig. </span><a data-dcnode-id="1526" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig18"><span data-dcnode-id="1527" instrument_node="">18</span></a><span data-dcnode-id="1525" instrument_node="">.
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1500" data-test="figure" data-title="Fig. 18" id="figure-18"><figure data-dcnode-id="1501"><figcaption data-dcnode-id="1521"><b class="c-article-section__figure-caption" data-dcnode-id="1522" data-test="figure-caption-text" id="Fig18"><span data-dcnode-id="1523" instrument_node="">Fig. 18</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1512"><div class="c-article-section__figure-item" data-dcnode-id="1516"><a class="c-article-section__figure-link" data-dcnode-id="1517" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12517-021-07206-z/figures/18" rel="nofollow"><picture data-dcnode-id="1518"><source data-dcnode-id="1520" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12517-021-07206-z/MediaObjects/12517_2021_7206_Fig18_HTML.png?as=webp" type="image/webp"><img alt="figure 18" aria-describedby="Fig18" data-dcnode-id="1519" height="221" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12517-021-07206-z/MediaObjects/12517_2021_7206_Fig18_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1513" data-test="bottom-caption" id="figure-18-desc"><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Schematic diagram showing a GSM mobile communication repeater</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1502"><a aria-label="Full size image figure 18" class="c-article__pill-button" data-dcnode-id="1503" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="li
