</span></a></div></figure></div><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">In order to meet various environmental and technical requirements, GSM repeaters can be divided into:
</span></p><ul class="u-list-style-dash" data-dcnode-id="1472"><span data-dcnode-id="1497" instrument_node="">
</span><li data-dcnode-id="1492"><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">GSM cellular repeater for conventional wireless communication</span></p><span data-dcnode-id="1493" instrument_node="">
</span></li><span data-dcnode-id="1491" instrument_node="">
</span><li data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Fiber-optic repeater for GSM mobile communication</span></p><span data-dcnode-id="1487" instrument_node="">
</span></li><span data-dcnode-id="1485" instrument_node="">
</span><li data-dcnode-id="1474"><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Frequency switching amplifier for GSM mobile signal</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">Among them, the use of fiber-optic repeaters is relatively large, mainly composed of near-end optical equipment, optical fiber, and optical remote equipment. Both the near-end optical engine and the remote optical engine include high-frequency units and optical units, and the basic block diagram of the optical fiber repeater is shown in Fig. </span><a data-dcnode-id="1478" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig19"><span data-dcnode-id="1479" instrument_node="">19</span></a><span data-dcnode-id="1477" instrument_node="">.</span></p><span data-dcnode-id="1475" instrument_node="">
</span></li><span data-dcnode-id="1473" instrument_node="">
</span></ul><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1448" data-test="figure" data-title="Fig. 19" id="figure-19"><figure data-dcnode-id="1449"><figcaption data-dcnode-id="1469"><b class="c-article-section__figure-caption" data-dcnode-id="1470" data-test="figure-caption-text" id="Fig19"><span data-dcnode-id="1471" instrument_node="">Fig. 19</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1460"><div class="c-article-section__figure-item" data-dcnode-id="1464"><a class="c-article-section__figure-link" data-dcnode-id="1465" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12517-021-07206-z/figures/19" rel="nofollow"><picture data-dcnode-id="1466"><source data-dcnode-id="1468" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs12517-021-07206-z/MediaObjects/12517_2021_7206_Fig19_HTML.png?as=webp" type="image/webp"><img alt="figure 19" aria-describedby="Fig19" data-dcnode-id="1467" height="441" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s12517-021-07206-z/MediaObjects/12517_2021_7206_Fig19_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1461" data-test="bottom-caption" id="figure-19-desc"><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">The main structure block diagram of the optical fiber transponder</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1450"><a aria-label="Full size image figure 19" class="c-article__pill-button" data-dcnode-id="1451" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure19 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12517-021-07206-z/figures/19" rel="nofollow"><span data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1452" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1453" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1454" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1457" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1456" fill-rule="evenodd"></path><span data-dcnode-id="1455" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">According to the composition of the mobile radio repeater, the repeater differs in the following categories mainly according to the type:
</span></p><ul class="u-list-style-bullet" data-dcnode-id="1414"><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1440"><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The first is a repeater. The downlink receives a signal from the base station and then amplifies it to cover the direction of the user. The uplink receives the signal from the user and sends it to the base station after amplifying it, adding a band-pass filter to limit the bandwidth.</span></p><span data-dcnode-id="1441" instrument_node="">
</span></li><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">The second type is a frequency selective repeater. In order to select a frequency, the uplink and downlink frequencies are down-converted to intermediate frequencies, and after performing frequency selection and band limitation processing, the uplink and downlink are restored through up-conversion: road frequency.</span></p><span data-dcnode-id="1435" instrument_node="">
</span></li><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">The third type is optical fiber repeater, which converts the received signal into optical signal through photoelectric conversion and then restores the electrical signal after transmission through electrical–optical conversion.</span></p><span data-dcnode-id="1429" instrument_node="">
</span></li><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1422"><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The fourth is a frequency shift repeater. After microwave transmission, the received frequency is up-converted, down-converted to the original received frequency, amplified, and transmitted.</span></p><span data-dcnode-id="1423" instrument_node="">
</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1416"><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">The fifth type is a household repeater. The internal repeater is a simple device whose requirements are usually different from those of the external type.</span></p><span data-dcnode-id="1417" instrument_node="">
</span></li><span data-dcnode-id="1415" instrument_node="">
</span></ul><h3 class="c-article__sub-heading" data-dcnode-id="1412" id="Sec21"><span data-dcnode-id="1413" instrument_node="">Communication signal processing optimization strategy</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1410" id="Sec22"><span data-dcnode-id="1411" instrument_node="">Antenna selection and planning strategy</span></h4><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">In mobile networks, antenna planning and selection are an important part. Antennas should be selected according to actual conditions, such as network coverage requirements, traffic, interference, and network service quality. Choosing the right antenna can increase coverage, reduce interference, and improve service quality. Since the choice of antenna is closely related to the requirements of the coverage area, according to environmental conditions, the choice of antenna type and power can be divided into indoor and outdoor.</span></p><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">In cities such as this, large hotels, etc., the requirements for signal coverage are increasing. In order to meet the needs of users in this communication area, indoor micro-cell distribution systems or indoor macro-cell distribution systems use low-gain distributed antennas so that in-band signal interference does not affect communication quality. In order to prevent the signal from reaching the main traffic arteries after completing the indoor coverage of a large building, indoor directional antennas at the edge of the building can be used. Outside the urban area, depending on the environment, the height of the antenna should not be too high. If the building is above average, it is usually sufficient. Usually, choose a built-in directional antenna with dual polarization.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1404" id="Sec23"><span data-dcnode-id="1405" instrument_node="">Planning strategy of repeater</span></h4><span data-dcnode-id="1403" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="1401" id="FPar1"><span data-dcnode-id="1402" instrument_node="">Site selection</span></h3><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">The fiber-optic repeater does not have high requirements on the location. When choosing the location of the wireless repeater, please pay attention to the following matters. If the relay station can have multiple base stations as the source base station, the base station with a longer distance should be selected as the source base station. Avoid aiming the donor repeater antenna at the urban area, and it is recommended not to use the repeater in the urban area. The position of the transponder should be selected between the donor base station and the blind spot, and the coverage should be within sight. The selected position should be suitable for the received signal level required by the transponder, usually 50–80 dBm. If the antenna is a directional antenna, it is best to choose the position of the repeater outside the blind zone at the edge of the blind zone. If you are in the blind zone, you will not be able to get the best coverage. Transponders are not only used in blind spots at crossroads between urban and rural areas and remote areas, but also in dense residential areas in the suburbs of cities. At this stage, avoid picking up points on the front of the building group and cover them on the sides.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="1395" id="FPar2"><span data-dcnode-id="1396" instrument_node="">Antenna selection</span></h3><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">When choosing a repeater antenna, please follow the requirements and precautions below. Since the wireless repeater is a same-frequency relay system, it is not recommended to use an omnidirectional antenna; otherwise, the system is easy to self-excite. The donor antenna should be a high-gain, narrow horizontal beam antenna, such as a corner reflector antenna or a periodic logarithmic conversion antenna to reduce noise. The choice of transponder antenna mainly depends on the coverage area, such as large and high areas, which can be conventional directional antennas. Indoors, it is usually necessary to use indoor antennas specially designed for indoor use. Carefully monitor the transmit direction of the transponder antenna to ensure that the retransmitted signal does not hit the donor antenna. The ratio of the front and rear antennas should be as high as possible, preferably greater than 30 dB, to ensure good isolation between the antenna, the donor antenna, and the transponder antenna.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="1389" id="FPar3"><span data-dcnode-id="1390" instrument_node="">Antenna isolation requirements</span></h3><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Transceiver isolation is the airway attenuation of the GSM signal from the direct output port of the repeater to the direct input port, and its magnitude directly affects the gain configuration of the repeater.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="1383" id="FPar4"><span data-dcnode-id="1384" instrument_node="">Uplink and downlink balance calculation</span></h3><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">When a GSM transponder is used, the channel balance consists of the uplink between the donor base station and the transponder and the uplink between the transponder and the mobile station.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="1377" id="FPar5"><span data-dcnode-id="1378" instrument_node="">Repeater output power control</span></h3><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">When using wireless repeaters, please pay attention to the impact of intermodulation products on system performance. The intermodulation products in the repeater mainly depend on the number of carriers to be amplified, the power output of each carrier, and the linearity of the amplifier. In addition, the transponder gain must meet the following conditions: transponder gain + protection of the transponder isolation at the edge.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="1371" id="FPar6"><span data-dcnode-id="1372" instrument_node="">Impact of repeater processing delay on planning</span></h3><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Sometimes, a single repeater cannot fully realize the area that needs to be covered. In this case, repeater cascading can be used to complete coverage planning. Since the repeater amplifies at the same frequency, and the repeater has time to process the signal, there is a time delay between each signal segment. If the time delay exceeds the time range that the GSM system can recognize, the same-frequency interference will be form. Since the transmission delay is limited, this effect increases the time dispersion, thereby shortening the coverage area.</span></p><span data-dcnode-id="1367" instrument_node="">
</span></div></div></section><section data-dcnode-id="1357" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1358" id="Sec24-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1362" id="Sec24"><span data-dcnode-id="1363" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1359" id="Sec24-content"><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">This article will detail how to implement projects to optimize mobile coverage, from theoretical calculations to actual technical experience. According to the characteristics of the deep coverage communication project and the actual situation of Jilin Province, the coverage optimization project was formulated, and the plan was formulated for different regions. The research discussed in more detail theoretical analysis, historical data, statistical data, existing construction experience, etc., and based on the actual situation of the mobile communication industry in Jilin Province, in recent years, appropriate promotion plans have been formulated and used in various cities in China. The designer model should be aware that environmental factors must be considered when applying these models. When the environment is very different, such as in the mountainous area of Dalang, the coverage scheme given in this article cannot be used. In addition, due to the limitation of GSM transmission delay, the maximum signal transmission distance in the optical fiber is only 23 km. If one of the three synchronous cells uses a fiber-optic repeater, the TA of the two cells will be different due to different transmission paths and rates, so handover errors may occur, and asynchronous handover must be used to reacquire a new cell and TA value switch. Try to avoid sending a signal from the main CS in the coverage area of the repeater as the signal source. If possible, choose the second best signal in the coverage area of the repeater. At the same time, the analytical ideas outlined in this article can also be used as reference materials for other mobile communications projects. Using the coverage optimization project model obtained in this article, the coverage rate of the mobile optimization coverage rate project can be calculated more scientifically, and the main equipment types that can play a specific reference role in the project feasibility study can be determined, thereby effectively avoiding blind investment decisions and lead project development, network optimization and in-depth coverage of standardization, and scientific development. Based on the observations of tropospheric ozone and atmospheric tracer gases in Hong Kong and the mid-low latitudes of the Pacific Ocean, this paper will apply the separation scale filtration technology, Lagrangian particle emission model, monsoon, ENSO index, etc. to study the long-term nature of tropospheric ozone in the southern coastal areas of China. Changes and their impact on the interannual variability of atmospheric circulation, combined with the atmospheric circulation of temperature and global atmospheric chemical migration patterns, the annual transmission patterns of surface ozone and pollutant precursors in South China and the Western Pacific are analyzed.</span></p></div></div></section><span data-dcnode-id="1356" instrument_node="">
