</span><p data-dcnode-id="911"><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Water scarcity is a looming global crisis. Kris Holla, Group Vice President, Channel Sales, Nortek Air Solutions, and Michael Lesniak, AVP Global Corporate Accounts, Global Data Center Solutions at Nalco Water, discuss how data centers can conserve the planet’s diminishing fresh water supply and practice water stewardship.&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</span></em></p><span data-dcnode-id="910" instrument_node="">

w, 200px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="896" id="caption-attachment-33283"><em data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Michael Lesniak, AVP Global Corporate Accounts, Global Data Center Solutions at Nalco Water, an Ecolab Co.</span></em></p></div><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892" style="text-align: left;"><span data-dcnode-id="893" instrument_node="">The scarcity of water is quickly becoming this century’s existential threat to the globe and its inhabitants. However, the data center industry has the potential to help abate this oncoming crisis.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889" style="text-align: left;"><span data-dcnode-id="890" instrument_node="">How valuable is water becoming?</span></p><span data-dcnode-id="888" instrument_node="">
</span><ul data-dcnode-id="862"><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">Water began trading on Wall Street under Nasdaq’s </span><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">NQH2O</span></em><span data-dcnode-id="883" instrument_node=""> ticker last December, which allows investors to trade it like gold, wheat, oil and other commodities;</span></li><span data-dcnode-id="881" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">If the world continues on its current path, the United Nations predicts a </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wri.org/publication/achieving-abundance" rel="noopener" target="_blank"><span data-dcnode-id="879" instrument_node="">56-percent gap</span></a><span data-dcnode-id="877" instrument_node=""> in freshwater supply and demand by 2030;</span></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">More than </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unwater.org/publication_categories/sdg-6-synthesis-report-2018-on-water-and-sanitation/" rel="noopener" target="_blank"><span data-dcnode-id="873" instrument_node="">2 billion people</span></a><span data-dcnode-id="871" instrument_node=""> live in areas of severe water stress;</span></li><span data-dcnode-id="869" instrument_node="">
</span><li data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">About </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//advances.sciencemag.org/content/2/2/e1500323/tab-figures-data" rel="noopener" target="_blank"><span data-dcnode-id="867" instrument_node="">4 billion people</span></a><span data-dcnode-id="865" instrument_node="">, representing nearly two-thirds of the world’s population, experience severe water scarcity at least one month per year.</span></li><span data-dcnode-id="863" instrument_node="">
</span></ul><span data-dcnode-id="861" instrument_node="">
</span><h3 data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Will the Data Center Industry Help or Hinder?</span></h3><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Consequently, the data center industry is on the cusp of either exacerbating the planet’s predicted water shortage or helping conserve water for human use.&nbsp; Given the industry’s future quest for unprecedented gigawatts of capacity and the seemingly insatiable cooling requirements that accompany it, data centers could very well add to the coming water challenge crisis.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Fortunately, there are solutions available through newly-developed, sustainable evaporative cooling equipment methodologies that offer the potential to take the data center industry toward water stewardship, zero carbon and no waste. That technology, combined with a whole new world of water management tools, is now available to data centers that want to reduce water use, especially those with established environmental stewardship goals.</span></p><span data-dcnode-id="852" instrument_node="">
</span><h3 data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">New Evaporative Cooling Concepts that Use Less Water</span></h3><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Conversions from older chiller/cooling tower and conventional direct evaporative cooling technologies to indirect evaporative liquid cooling is one method that’s helping data centers reduce water intensity. &nbsp;One of these free cooling solutions uses a liquid-to-air membrane exchanger strategy that has been recently commercialized in the HVAC industry. Many hyperscale and colocation operators are moving toward this type of indirect evaporative cooling, because conventional liquid cooling using wetted media, direct spray and other traditional evaporative cooling methods consume huge amounts of water.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Consequently, this microporous membrane heat exchanger strategy is capable of partial power usage effectiveness (pPUE) of 1.05 to 1.06.&nbsp; If fan coil wall energy is subtracted, the pPUE alone can drop to an unprecedented 1.025 or 1.03, depending on the climate, operating conditions and equipment. Water usage effectiveness (WUE) (L/kWh) has been recorded as low as 0.09 and water reductions can approach up to 90-percent.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">This heat exchange process is very unique. Water flows down vertical membrane-sealed plates. Outdoor ambient air is drawn across the outside surface of the membrane sheets to cool both water and airflow. The exchanger performs cooling when the warm water flows through the channels, and exchanges heat and vapor to the airstream. Some portion of the water evaporates through the membrane to produce latent cooling. Heat is also transferred sensibly through the membrane. The result is a significant amount of cooling from heat transfer that is generated from a relatively small exchanger footprint (See Illustration A).</span></p><span data-dcnode-id="840" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="833" id="attachment_33219" style="width: 452px"><img alt="" aria-describedby="caption-attachment-33219" class="wp-image-33219 lazyloaded" data-dcnode-id="839" data-src="https://datacenterfrontier.com/wp-content/uploads/2021/04/Image-2-300x172.png" height="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/wp-content/uploads/2021/04/Image-2-300x172.png&amp;raw" width="442"><noscript data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">&lt;img aria-describedby="caption-attachment-33219" class=" wp-image-33219" src="https://datacenterfrontier.com/wp-content/uploads/2021/04/Image-2-300x172.png" alt="" width="442" height="241" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="834" id="caption-attachment-33219"><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Illustration A: Many hyperscale and colocation operators are using microporous membranes to separate water from air during thermal exchanges to reduce water consumption. (Source: Nortek Data Center Cooling)</span></em></p></div><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">From a water perspective, a membrane exchanger also solves a number of problems for the industry. It eliminates the direct contact of water with the air, which potentially pollutes the water with dust, dirt, pollen and other contaminants that result in a biological sludge. The separation from the water prevents the air from picking up droplet and aerosol carryover from the water side, which leads to excessive water consumption in conventional chiller/cooling tower designs and the biohazard potential of </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/legionella-is-the-covid-19-of-the-data-center-industry/" rel="noopener" target="_blank"><span data-dcnode-id="830" instrument_node="">Legionella</span></a><span data-dcnode-id="828" instrument_node=""> development and transfer.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="825" instrument_node="">Besides low WUE, another advantage of an indirect evaporative system using membrane heat exchangers is the ability to reclaim and re-use water. Reclaiming water helps save fresh water for potable applications. Data centers in </span><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.datacenterknowledge.com/archives/2013/09/09/ragingwire-ashburn-hooking-up-to-reclaimed-water-loop" rel="noopener" target="_blank"><span data-dcnode-id="824" instrument_node="">Ashburn, Va</span></a><span data-dcnode-id="822" instrument_node="">. and a Google facility in Atlanta are&nbsp; just two sites currently using recycled waste water. Microsoft has been even more ambitious. They helped retool the city water treatment infrastructure in Quincy, Wash., to provide recycled water for data center use.</span></p><span data-dcnode-id="820" instrument_node="">
</span><h3 data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">New Water Analysis and Management Tools that Conserve Water</span></h3><span data-dcnode-id="817" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="810" id="attachment_33223" style="width: 310px"><img alt="" aria-describedby="caption-attachment-33223" class="size-medium wp-image-33223 lazyloaded" data-dcnode-id="816" data-sizes="(max-width: 300px) 100vw, 300px" data-src="https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-300x160.jpg" data-srcset="https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-300x160.jpg 300w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-1024x546.jpg 1024w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-768x409.jpg 768w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1.jpg 1359w" height="160" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-300x160.jpg&amp;raw" srcset="https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-300x160.jpg 300w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-1024x546.jpg 1024w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-768x409.jpg 768w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1.jpg 1359w" width="300"><noscript data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">&lt;img aria-describedby="caption-attachment-33223" class="size-medium wp-image-33223" src="https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-300x160.jpg" alt="" width="300" height="160" srcset="https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-300x160.jpg 300w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-1024x546.jpg 1024w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1-768x409.jpg 768w, https://datacenterfrontier.com/wp-content/uploads/2021/04/Picture-3-1.jpg 1359w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="811" id="caption-attachment-33223"><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Smart Water Navigator is an example of&nbsp; a water management tool data center operators can use (Photo Credit: Nalco Water, an EcoLab Company)</span></em></p></div><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="808" instrument_node="">In order to properly manage water, data center operators need to know each of their location’s (both existing and proposed new construction sites) current water availability, quality, quantity and predictable future water status. Fortunately, the water management industry now provides sophisticated tools for this type of analysis. For example, data centers are now using site selection tools to determine potential surface water, ground water, and alternate water sources anywhere on the globe.&nbsp; The analysis can also be used for better water negotiations during government and community agreements including transfers, price, quantity and quality. One particular tool is the newly enhanced Ecolab </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecolab.com/nalco-water/news/2021/03/ecolab-releases-enhanced-smart-water-navigator" rel="noopener" target="_blank"><span data-dcnode-id="807" instrument_node="">Smart Water Navigator</span></a><span data-dcnode-id="805" instrument_node="">, launched last month on World Water Day.</span></p><span data-dcnode-id="803" instrument_node="">
</span><h3 data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">The Future is Now for Water Conservation</span></h3><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">While all this technology and water management may appear as lofty goals, some companies are already implementing them. For example, Digital Realty, one of the world’s largest data center operators, is already applying some of the aforementioned water management tools. A new 430,000-square-foot, 48MW </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/digital-realty-plans-new-data-center-project-in-santa-clara/" rel="noopener" target="_blank"><span data-dcnode-id="798" instrument_node="">facility</span></a><span data-dcnode-id="796" instrument_node=""> on its Santa Clara, Calif. campus will reduce its potable water usages by using up to 10 million-gallons of reclaimed water.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Europe’s climate neutral goal by 2050 is being facilitated by the European Green Deal, which commits data center operators and trade associations to a host of sustainability measures. By next year, data center operators will set an annual target for WUE or another water conservation metric, which will be met by new facilities by 2025 and by existing data centers by 2030.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Whether data centers operators endorse it or not, water conservation is the wave of the future. The best preparation is to now use the lowest WUE indirect evaporative cooling technology available and employ water management tools.&nbsp; The global partnership of Nortek as the best equipment manufacturer along with Nalco with the excellent water conservation tools helps the planet to conserve more water.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="779"><em data-dcnode-id="780"><span data-dcnode-id="787" instrument_node="">Kris Holla is Group Vice President, Channel Sales, </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nortekdatacenter.com/" rel="noopener" target="_blank"><span data-dcnode-id="786" instrument_node="">Nortek Air Solutions</span></a><span data-dcnode-id="784" instrument_node="">. Learn more about Nortek’s </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nortekdatacenter.com/statepoint/" rel="noopener" target="_blank"><span data-dcnode-id="783" instrument_node="">StatePoint Liquid Cooling</span></a><span data-dcnode-id="781" instrument_node=""> system.&nbsp;</span></em></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="769"><em data-dcnode-id="770"><span data-dcnode-id="777" instrument_node="">Michael Lesniak is AVP Global Corporate Accounts, Global Data Center Solutions at </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecolab.com/nalco-water" rel="noopener" target="_blank"><span data-dcnode-id="776" instrument_node="">Nalco Water, an Ecolab Company</span></a><span data-dcnode-id="774" instrument_node="">. Nalco Water’s&nbsp;</span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ecolab.com/sustainability/water-stewardship/smart-water-navigator" rel="noopener" target="_blank"><span data-dcnode-id="773" instrument_node="">Smart Water Navigator</span></a><span data-dcnode-id="771" instrument_node=""> is a free online tool (see Illustration B) that helps businesses in any industry understand the value of water in their operations and take action to achieve corporate water goals.&nbsp;</span></em></p><span data-dcnode-id="768" instrument_node="">
</span><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="739"><div class="mashsb-box" data-dcnode-id="742"><div class="mashsb-buttons" data-dcnode-id="744"><a class="mashicon-linkedin mash-medium mash-center mashsb-noshadow" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Ftrk%3DWater%2BScarcity%253A%2BHow%2BData%2BCenters%2BCan%2BHelp%26url%3Dhttps%253A%252F%252Fdatacenterfrontier.com%252Fwater-scarcity-how-data-centers-can-help-1%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="767"></span><span class="text" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Linkedin</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DLearn%2520how%2520data%2520centers%2520can%2520help%2520abate%2520water%2520scarcity%2520issues%2520in%2520this%2520new%2520post%2520from%2520Nortek%2527s%2520Kris%2520Holla%2520and%2520Michael%2520Lesniak%2520of%2520%2540Nalco_News.%2520%2523cooling%2520%2523nortekairsolutions%2520%2523nalcowater%2520%2540ecolab%26url%3Dhttps%3A//datacenterfrontier.com/water-scarcity-how-data-centers-can-help-1/%26via%3Ddcfrontier" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="763"></span><span class="text" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Twitter</span></span></a><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fdatacenterfrontier.com%252Fwater-scarcity-how-data-centers-can-help-1%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="759"></span><span class="text" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="" </span><h4 data-dcnode-id="561"><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/how-data-center-management-solutions-drive-sustainability/" title="How Data Center Management Solutions Drive Sustainability and Help Ensure a Climate-Secure World"><span data-dcnode-id="563" instrument_node="">How Data Center Management Solutions Drive Sustainability and Help Ensure a Climate-Secure World</span></a></h4><span data-dcnode-id="560" instrument_node="">
</span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/how-data-center-management-solutions-drive-sustainability/" title="How Data Center Management Solutions Drive Sustainability and Help Ensure a Climate-Secure World"><img alt="How Data Center Management Solutions Drive Sustainability and Help Ensure a Climate-Secure World" class="wp-post-image lazyloaded" data-dcnode-id="559" data-src="https://datacenterfrontier.com/wp-content/uploads/2021/10/eric-Xie.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/wp-content/uploads/2021/10/eric-Xie.jpg&amp;raw" style="float:left; margin-right:15px; border:none;" title="How Data Center Management Solutions Drive Sustainability and Help Ensure a Climate-Secure World" width="100"><noscript data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">&lt;img title="How Data Center Management Solutions Drive Sustainability and Help Ensure a Climate-Secure World" src="https://datacenterfrontier.com/wp-content/uploads/2021/10/eric-Xie.jpg" alt="How Data Center Management Solutions Drive Sustainability and Help Ensure a Climate-Secure World" class="wp-post-image" width="100" style="float:left; margin-right:15px; border:none;" /&gt;</span></noscript></a><span data-dcnode-id="555" instrument_node="">
		The data center industry, which gave wings and provided thrust to the digital transformation of business and society during a time of tumultuous change, has another urgent, mission-critical responsibility—to our environment. Eric Xie, Software Application Engineer for Intel Data Center Management Solutions, explores the journey to data center sustainability and net zero carbon emissions, including the role that data management solutions will play.
		</span><div data-dcnode-id="554" style="clear:both;"></div><span data-dcnode-id="553" instrument_node="">

</span><div class="textwidget" data-dcnode-id="225"><img align="left" border="1" class="lazyloaded" data-dcnode-id="233" data-src="/wp-content/uploads/2015/06/Rich-100.jpg" height="111" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/wp-content/uploads/2015/06/Rich-100.jpg&amp;raw" style="padding:8px" width="101"><noscript data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">&lt;img src="/wp-content/uploads/2015/06/Rich-100.jpg" width="101" height="111" border="1" align="left" style="padding:8px"&gt;</span></noscript><span data-dcnode-id="230" instrument_node="">Data Center Frontier is edited by Rich Miller, the data center industry’s most experienced journalist. For more than 20 years, Rich has profiled the key role played by data centers in the Internet revolution.  </span><strong data-dcnode-id="227"><a data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/meet-our-team/"><span data-dcnode-id="229" instrument_node="">Meet the DCF team</span></a></strong><span data-dcnode-id="226" instrument_node="">.</span></div><span data-dcnode-id="224" instrument_node="">
</span></div></section><span data-dcnode-id="221" instrument_node="">
</span></div><div class="widget-area footer-widgets-3 footer-widget-area" data-dcnode-id="60"><section class="widget-odd widget-last widget-first widget-1 widget widget_categories" data-dcnode-id="62" id="categories-5"><div class="widget-wrap" data-dcnode-id="63"><h4 class="widget-title widgettitle" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">TOPICS</span></h4><span data-dcnode-id="217" instrument_node="">
</span><ul data-dcnode-id="65"><span data-dcnode-id="216" instrument_node="">
</span><li class="cat-item cat-item-11100" data-dcnode-id="212"><a data-dcnode-id="214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/5g-wireless/"><span data-dcnode-id="215" instrument_node="">5G Wireless</span></a><span data-dcnode-id="213" instrument_node="">
</span></li><span data-dcnode-id="211" instrument_node="">
</span><li class="cat-item cat-item-76" data-dcnode-id="207"><a data-dcnode-id="209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/cloudcomputing/"><span data-dcnode-id="210" instrument_node="">Cloud</span></a><span data-dcnode-id="208" instrument_node="">
</span></li><span data-dcnode-id="206" instrument_node="">
</span><li class="cat-item cat-item-75" data-dcnode-id="202"><a data-dcnode-id="204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/colocation/" title="Customers can buy data center space in a number of ways. One of the most popular is colocation, tenants buy space by the rack, cabinet or cage. Larger requirements typically use the wholesale data center model, in which a tenant leases a finished suite of “turn-key” raised-floor space. The dividing lines between the two have blurred in recent years, which wholesale providers pursuing smaller deals while colo specialists add suites to their offerings. Both retail colocation providers and companies selling wholesale data center space are pushing into new markets, extending these IT outsourcing services to new audiences.  "><span data-dcnode-id="205" instrument_node="">Colo</span></a><span data-dcnode-id="203" instrument_node="">
</span></li><span data-dcnode-id="201" instrument_node="">
</span><li class="cat-item cat-item-8786" data-dcnode-id="197"><a data-dcnode-id="199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/connected-cars/"><span data-dcnode-id="200" instrument_node="">Connected Cars</span></a><span data-dcnode-id="198" instrument_node="">
</span></li><span data-dcnode-id="196" instrument_node="">
</span><li class="cat-item cat-item-26" data-dcnode-id="192"><a data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/data-center-cooling/" title="Cooling is one of the primary purposes of data centers. Data center cooling has been the focus of extraordinary progress, as innovations and the application of best practices have brought dramatic gains in energy efficiency. Chief among these improvements has been the use of free cooling, most notably air-side economization. Other techniques gaining traction include water-side economization, direct and indirect evaporative cooling. 

At Data Center Frontier, we're also tracking innovations in liquid cooling to handle high-density workloads in high performance computing (HPC) and supercomputing. These include the use of warm water cooling, immersion cooling, phase change cooling technologies. Liquid cooling has been adopted at the row, rack and chip in different implementations. "><span data-dcnode-id="195" instrument_node="">Cooling</span></a><span data-dcnode-id="193" instrument_node="">
</span></li><span data-dcnode-id="191" instrument_node="">
</span><li class="cat-item cat-item-26462" data-dcnode-id="187"><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/cornerstone/"><span data-dcnode-id="190" instrument_node="">Cornerstone</span></a><span data-dcnode-id="188" instrument_node="">
</span></li><span data-dcnode-id="186" instrument_node="">

</span></li><span data-dcnode-id="181" instrument_node="">
</span><li class="cat-item cat-item-9" data-dcnode-id="177"><a data-dcnode-id="179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/data-center-design/" title="The latest developments in data center design, providing updates on the innovations and best practices for creating energy efficient and sustainable data centers. Our stories provide insights into the role of modular and pre-fabricated data center designs, the impact of the Open Compute Project and open hardware movement, and new approaches to creating data center racks and servers. "><span data-dcnode-id="180" instrument_node="">Design</span></a><span data-dcnode-id="178" instrument_node="">
</span></li><span data-dcnode-id="176" instrument_node="">
</span><li class="cat-item cat-item-30994" data-dcnode-id="172"><a data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/edge-computing/" title="Data is everywhere. As a digital transformation sweeps across our society and economy, Internet infrastructure must follow the data. Enter edge computing, which extends data processing and storage closer to the growing universe of devices and sensors at the edge of the network.
The goal of edge computing is to process data and services as close to the end user as possible. It’s an architecture that allows the compute and content delivery process to happen within 10 milliseconds or less of the user. The trend driving the edge computing model is the increased use of consumer mobile devices, especially consumption of video and virtual reality content and the growth of sensors as part of the Internet of Things."><span data-dcnode-id="175" instrument_node="">Edge Computing</span></a><span data-dcnode-id="173" instrument_node="">
</span></li><span data-dcnode-id="171" instrument_node="">
</span><li class="cat-item cat-item-10" data-dcnode-id="167"><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenterfrontier.com/category/data-center-energy/" title="Electricity is the lifeblood of every data center. At Data Center Frontier, we're exploring new frontiers in data center energy as we see data centers in new places. Some of these new facilities will seek new sources of energy, especially renewable technologies such as wind and solar, as well as landfills and other sources of biogas. Other technologies, such as Bloom Energy fuel cells, may prompt consolidated approaches to power architecture.

We're interested in how modular data centers and other design innovations allow new methods of deploying Internet infrastructure, creating opportunities to make use of solar arrays, wind turbines, fuel cells, combined heat &amp; power (CHP), microgrids, and the recycling of server exhaust heat to warm buildings through district heating. 


"><span data-dcnode-id="170" instrument_node="">Energy</span></a><span data-dcnode-id="168" instrument_node="">
