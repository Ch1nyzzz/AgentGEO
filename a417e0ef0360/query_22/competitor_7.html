</span><main class="content units av-content-small alpha av-blog-meta-author-disabled av-blog-meta-comments-disabled av-blog-meta-category-disabled av-blog-meta-tag-disabled" data-dcnode-id="320" itemscope="itemscope" itemtype="https://schema.org/Blog" role="main"><span data-dcnode-id="504" instrument_node="">
</span><article class="post-entry post-entry-type-standard post-entry-333182 post-loop-1 post-parity-odd post-entry-last single-big post-333182 post type-post status-publish format-standard hentry category-global-poverty category-technology category-water category-water-conservation category-water-quality category-water-sanitation tag-desalination tag-desolenator tag-janicki-omni-processor tag-top-four-technologies tag-urban-drinking-water-challenge" data-dcnode-id="328" itemprop="blogPost" itemscope="itemscope" itemtype="https://schema.org/BlogPosting"><div class="blog-meta" data-dcnode-id="503"></div><div class="entry-content-wrapper clearfix standard-content" data-dcnode-id="365"><header class="entry-content-header" data-dcnode-id="480"><div class="av-heading-wrapper" data-dcnode-id="481"><span class="blog-categories minor-meta" data-dcnode-id="485"><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/global-poverty/" rel="tag"><span data-dcnode-id="502" instrument_node="">Global Poverty</span></a><span data-dcnode-id="500" instrument_node="">, </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/technology/" rel="tag"><span data-dcnode-id="499" instrument_node="">Technology</span></a><span data-dcnode-id="497" instrument_node="">, </span><a data-dcnode-id="495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/water/" rel="tag"><span data-dcnode-id="496" instrument_node="">Water</span></a><span data-dcnode-id="494" instrument_node="">, </span><a data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/water-conservation/" rel="tag"><span data-dcnode-id="493" instrument_node="">Water Conservation</span></a><span data-dcnode-id="491" instrument_node="">, </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/water-quality/" rel="tag"><span data-dcnode-id="490" instrument_node="">Water Quality</span></a><span data-dcnode-id="488" instrument_node="">, </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/water-sanitation/" rel="tag"><span data-dcnode-id="487" instrument_node="">Water Sanitation</span></a></span><h1 class="post-title entry-title" data-dcnode-id="482" itemprop="headline"><span data-dcnode-id="484" instrument_node="">Top 4 Technologies Solving Water Scarcity</span><span class="post-format-icon minor-meta" data-dcnode-id="483"></span></h1></div></header><span class="av-vertical-delimiter" data-dcnode-id="479"></span><div class="entry-content" data-dcnode-id="412" itemprop="text"><p data-dcnode-id="475"><img alt="Top Four Technologies Solving Water Scarcity" class="alignnone wp-image-333425" data-dcnode-id="478" height="427" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity-1030x686.jpg&amp;raw" srcset="https://borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity-1030x686.jpg 1030w, https://borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity-300x200.jpg 300w, https://borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity-768x512.jpg 768w, https://borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity-1536x1024.jpg 1536w, https://borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity-1500x1000.jpg 1500w, https://borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity-705x470.jpg 705w, https://borgenproject.org/wp-content/uploads/Top-Four-Technologies-Solving-Water-Scarcity.jpg 2048w" width="640"><br data-dcnode-id="477"><span data-dcnode-id="476" instrument_node="">
Access to healthy drinking water is a basic human right and billions of people are suffering from water scarcity. The world has more salt water than fresh water, which makes it hard to find drinking water. Some have created technologies for this reason. Here are the top four technologies solving water scarcity all over the world.</span></p><span data-dcnode-id="474" instrument_node="">
</span><h4 data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Top 4 Technologies Solving Water Scarcity</span></h4><span data-dcnode-id="471" instrument_node="">
</span><ol data-dcnode-id="434"><span data-dcnode-id="470" instrument_node="">
</span><li data-dcnode-id="463"><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node=""> The WaterSeer:</span></strong><span data-dcnode-id="467" instrument_node=""> Among these top four technologies to solve water scarcity is a machine that VICI Labs developed </span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tech.co/news/technologies-solve-global-water-crisis-2018-02" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="466" instrument_node="">called the WaterSeer</span></a><span data-dcnode-id="464" instrument_node="">. It can pull moisture from the air and produce up to 11 gallons of clean drinking water. It blows wind into an underground chamber that condenses and forms water. There have not been many field tests yet which has caused critics to raise an eyebrow. Hopefully, the machine does its job and can help produce clean drinking water for countries that have limited access to it.</span></li><span data-dcnode-id="462" instrument_node="">
</span><li data-dcnode-id="455"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">The Desolenator: </span></strong><span data-dcnode-id="459" instrument_node="">Creating safe drinking water is very important but a machine needs to be sustainable enough to continue to give that resource. This is why this next technology ranks as one of the top five technologies solving water scarcity. The Desolenator is a </span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.desolenator.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="458" instrument_node="">solar desalination tool</span></a><span data-dcnode-id="456" instrument_node=""> that removes 99 percent of contaminants from water. It is portable and can produce about 15 liters of fresh water a day. The company says that it has a 20-year life span making it an efficient and sustainable device for solving water scarcity. The reason for this device lies behind the Desolenator company’s philosophy on the importance of clean drinking water. The company’s philosophy is based on, “A desire to provide assured access to clean water in the toughest situations, whilst protecting the planet we depend on.” The Desolenator company aims to design a better water future for people and the planet.</span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="447"><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Janicki Omni Processor: </span></strong><span data-dcnode-id="451" instrument_node="">The </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sedron.com/janicki-omni-processor/how-it-works/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="450" instrument_node="">Janicki Omni Processor</span></a><span data-dcnode-id="448" instrument_node=""> is another of the top four technologies trying to solve water scarcity. It was originally going to be a machine to clean waste in cities but it can produce clean drinking water from human feces as well. The way it works is a three-step process to create accessible drinking water. These steps include solid fuel combustion, steam power generation and water treatment. At the end of all these steps, water is then ready for human consumption.</span></li><span data-dcnode-id="446" instrument_node="">
</span><li data-dcnode-id="436"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Desalination: </span></strong><span data-dcnode-id="443" instrument_node="">Converting salt water into fresh water, is another way people can solve water scarcity. The process is called desalination, and it is a huge step towards </span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drop4drop.org/new-innovations-future-water/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="442" instrument_node="">ending water scarcity</span></a><span data-dcnode-id="440" instrument_node="">. The process may take a lot of energy to conduct but there are affordable ways to do so. Graphene filters are a way to waste less energy in the process of desalination. These filters could reduce the cost of the energy that desalination requires. The Lockheed Martin company has </span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/global-development-professionals-network/2017/feb/13/global-water-crisis-innovation-solution" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="439" instrument_node="">developed a filter</span></a><span data-dcnode-id="437" instrument_node=""> that will take into account the amount of energy this process uses in the hopes of providing clean drinking water while also saving energy.</span></li><span data-dcnode-id="435" instrument_node="">
</span></ol><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">While these four technologies are working to solve water scarcity, there was also the Urban Drinking Water Challenge of 2018 working to eliminate water scarcity through innovations. This was a global innovation competition to identify and deploy drinking water solutions. The challenge provided </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/imagineh2o/solving-water-scarcity-through-innovation-6714f905761a" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="431" instrument_node="">$250,000 in awards</span></a><span data-dcnode-id="429" instrument_node=""> to promising water technology startups. Those who participated in the challenge had to follow three themes that included alternative supply, distributed access and delivery and ecosystem health. This challenge presented opportunities for solutions that encompass the benefits of economies in urban settings to ensure affordability, reach and sustainability of drinking water services.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Water scarcity is a huge crisis, but with advanced technologies paving the way for change, there may be a solution.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="423" instrument_node="">– </span><em data-dcnode-id="419"><span data-dcnode-id="422" instrument_node="">Jessica Jones</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">
