</span><h1 class="entry-title rt-supports-deeplink" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Water Scarcity: Causes, Effects and Solutions</span></h1><span data-dcnode-id="1229" instrument_node=""> </span><div class="post-meta-wrapper" data-dcnode-id="1205"><span data-dcnode-id="1228" instrument_node="">
</span><div class="post-meta-inner" data-dcnode-id="1207" data-meta-divider="slash" data-position="First"><span data-dcnode-id="1227" instrument_node="">
</span><span class="posted-by author vcard meta-common" data-dcnode-id="1218" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1226" instrument_node="">
</span><img alt="" class="avatar avatar-32 photo" data-dcnode-id="1225" height="32" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a046b010da4944b9d0794741c8ffe6da%3Fs%3D32%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a046b010da4944b9d0794741c8ffe6da?s=64&amp;d=mm&amp;r=g 2x" width="32"><span data-dcnode-id="1224" instrument_node="">By</span><span class="author vcard" data-dcnode-id="1220"><a class="url fn n" data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthandhuman.org/author/nina/" itemprop="url"><span data-dcnode-id="1222" itemprop="name"><span data-dcnode-id="1223" instrument_node="">Nina Howell</span></span></a></span><span data-dcnode-id="1219" instrument_node=""> </span></span><span data-dcnode-id="1217" instrument_node="">

</span><div class="post-inner-wrap" data-dcnode-id="496"><span data-dcnode-id="1199" instrument_node="">
</span><div class="entry-content" data-dcnode-id="498" itemprop="text"><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Water scarcity is a situation in which the supply of water is limited in comparison to the demand in a particular region. It is a growing problem all around the globe.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">A lack of water can have devastating consequences on the population. Clean drinking water is essential for maintaining sanitation, cleanliness, farming, and of course to sustain life itself.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">This is why it is important to educate ourselves about the various causes, effects, and solutions of water scarcity. In this way, we can be better prepared to prevent this problem.</span></p><span data-dcnode-id="1189" instrument_node="">

ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="687" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="682"><use class="ytp-svg-shadow" data-dcnode-id="684" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="685" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="683" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=06XmOTrNjM0" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">There can be a variety of factors contributing to water scarcity. The following are some of the major causes of water scarcity around the world:</span></p><span data-dcnode-id="660" instrument_node="">
</span><h3 data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Pollution</span></h3><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">One of the major causes of water scarcity is rampant water pollution. The contamination of water bodies such as lakes, rivers, oceans, and groundwater, due to human interference is known as water pollution. The main contributors to this pollution are the mismanaged sewage, oil spills, agricultural runoffs, landfill leakages, and large-scale marine dumpings.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="653" instrument_node="">A 2017 report by UNESCO shows that over </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.unesco.org/new/en/natural-sciences/environment/water/wwap/wwdr/2017-wastewater-the-untapped-resource/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="652" instrument_node="">80%</span></a><span data-dcnode-id="650" instrument_node="">&nbsp;of the world’s wastewater is returned to the environment without any treatment. Similarly, nearly </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldoceanreview.com/en/wor-3/oil-and-gas/oiling-the-oceans/%3Fivt%253D1%2523ivt-101" rel="nofollow external noopener noreferrer" target="_blank"><span data-dcnode-id="649" instrument_node="">1 million tons</span></a><span data-dcnode-id="647" instrument_node=""> of the total oil spilling into our ocean comes from the oil drip from our cars, buses, and trucks. Large amounts of plastic wastes along with fecal matter also greatly contribute to water pollution.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">This pollution has dangerous effects on marine life. The rising overpopulation has contributed to many of the top rivers in the world becoming so toxic that the water cannot even be utilized for agriculture.</span></p><span data-dcnode-id="642" instrument_node="">
</span><h3 data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Population and Water Wastage</span></h3><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">The human population has been growing at an exponential rate. It has nearly doubled in the last 50 years. This large population demands a large water supply despite the fact that most of it is either overused or wasted. We have a limited amount of freshwater and with the growing pollution, the numbers are ever declining.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Despite this, we continue to see water wastage on a large scale. This wastage contributes to the loss of water and aids in bringing about scarcity in water. The wastage of this water can be a result of leaving the tap on when not in use to excessive toilet flushing. Similarly, running unnecessary cycles of washing machines, dishwashers, etc can also add to this wastage.</span></p><span data-dcnode-id="633" instrument_node="">
</span><h3 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Drought</span></h3><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">As a direct consequence of global warming, weather patterns are affected. This can cause certain places to experience enough rainfall to incur flooding whereas others experience droughts. Droughts usually last for an extended period of time. Even existing </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthandhuman.org/sources-of-water-with-pictures/"><span data-dcnode-id="628" instrument_node="">sources of water</span></a><span data-dcnode-id="626" instrument_node=""> such as streams, ponds, lakes, and so on are prone to drying up. This situation can result in a water scarcity that impacts every life in the surrounding area.</span></p><span data-dcnode-id="624" instrument_node="">
</span><h3 data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Destruction of Water Accumulation Areas</span></h3><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">As urbanization spreads into forest areas, a large amount of this land is wiped out. Forests are essential in maintaining the temperature of any place as well as regulating rainfall. Thus, wiping out large forests can cause an imbalance in the ecosystem and cause water scarcity.</span></p><span data-dcnode-id="618" instrument_node="">
</span><h2 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Effects of Water Scarcity</span></h2><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><img alt="" class="alignnone size-full wp-image-3687" data-dcnode-id="614" height="513" loading="lazy" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthandhuman.org/wp-content/uploads/2020/05/Water-Scarcity.jpg&amp;raw" srcset="https://earthandhuman.org/wp-content/uploads/2020/05/Water-Scarcity.jpg 770w, https://earthandhuman.org/wp-content/uploads/2020/05/Water-Scarcity-300x200.jpg 300w, https://earthandhuman.org/wp-content/uploads/2020/05/Water-Scarcity-768x512.jpg 768w, https://earthandhuman.org/wp-content/uploads/2020/05/Water-Scarcity-90x60.jpg 90w" width="770"></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Water is the most vital part of our survival. Naturally, a shortage of water would have vast implications. Some of the major effects of water scarcity can be understood as follows:</span></p><span data-dcnode-id="609" instrument_node="">
</span><h3 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Shortage of Drinking Water</span></h3><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Clean drinking water is not just a privilege but a necessity. A shortage of clean drinking water can be devastating for the population. People might have to resort to drinking low-quality water which can be detrimental to their health.</span></p><span data-dcnode-id="603" instrument_node="">
</span><h3 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Lack of Food</span></h3><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Water is irreplaceable for agriculture and farming. The current estimation shows that nearly 70% of fresh water is being used for agriculture. Food supply is greatly affected by water shortage. It is also important for livestock. When both these activities are affected, you can only expect a shortage in the food supply. A direct consequence of water scarcity is, therefore, hunger, thirst, and poverty.</span></p><span data-dcnode-id="597" instrument_node="">
</span><h3 data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Spread of Diseases</span></h3><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Water is important for cleanliness. From bathing to simply washing hands, these activities keep us safe from the widespread of many diseases. However, a lack of water can induce a sharp rise in the spread of communicable diseases.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Especially in developing countries, a shortage of water can make people resort to using water that isn’t up to the cleanliness standards. This can cause an increase in water-borne diseases such as cholera, dysentery, and typhoid. Water shortage will eventually lead to people compromising the water quality they use in restaurants or other businesses which can directly impact the health of the general public.</span></p><span data-dcnode-id="588" instrument_node="">
</span><h3 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Sanitation Problems</span></h3><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Lack of clean water can cause a big hassle in terms of sanitation. There isn’t enough water for proper waste disposal which can cause a rise in harmful pathogens. Similarly, cleaning dishes, clothes, and other items becomes impossible due to the limited amount of water available. This can be severely unhygienic for the health of the population.</span></p><span data-dcnode-id="582" instrument_node="">
</span><h2 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Solutions for Water Scarcity</span></h2><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><img alt="" class="alignnone size-full wp-image-3559" data-dcnode-id="578" height="513" loading="lazy" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthandhuman.org/wp-content/uploads/2020/05/Rain-Water.jpg&amp;raw" srcset="https://earthandhuman.org/wp-content/uploads/2020/05/Rain-Water.jpg 770w, https://earthandhuman.org/wp-content/uploads/2020/05/Rain-Water-300x200.jpg 300w, https://earthandhuman.org/wp-content/uploads/2020/05/Rain-Water-768x512.jpg 768w, https://earthandhuman.org/wp-content/uploads/2020/05/Rain-Water-90x60.jpg 90w" width="770"></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">We’ve understood the problem and we’ve learned about the consequences. What can we do to solve this problem? The following are some probable solutions to combat water scarcity:</span></p><span data-dcnode-id="573" instrument_node="">
</span><h3 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Utilizing Greywater</span></h3><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Greywater essentially refers to domestic water free of organic contaminants. This water includes water that has been used in your shower, laundry, dishwashing, and so on. There is a lot of potentials for this water to be reused as it will only need some treatment. This water can then be used for toilets, for cleaning pavements, irrigation, and so on. This can help preserve the freshwater while also encouraging the reuse of water and limiting wastage.</span></p><span data-dcnode-id="567" instrument_node="">
</span><h3 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Preventing Pollution</span></h3><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">As people become aware of the astounding scale of global water pollution, they realize the importance of taking action to prevent it. Whether it is careless urban dumping or agricultural runoff, these are limiting our freshwater supply. We can take steps to ensure that fewer amounts of such toxic chemicals are used in agricultural practices. Similarly, by limiting our plastic usage and raising collective efforts against mismanaged wastes, we can try to limit water scarcity issues.</span></p><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Desalination</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">Desalination is the process in which salt is extracted from seawater to give out freshwater. Since nearly 70% of the Earth is covered with water, one-quarter of total water available is seawater. There have already been huge leaps taken to </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//earthandhuman.org/can-you-make-seawater-drinkable/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="556" instrument_node="">make seawater drinkable</span></a><span data-dcnode-id="554" instrument_node="">. However, we are still bound by the large costs to implement this on a large-scale basis.</span></p><span data-dcnode-id="552" instrument_node="">
</span><h3 data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Recharging Groundwater</span></h3><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">One of our primary sources of clean water is groundwater. This source is generally naturally replenished by the water cycle. However, we can aid this process to recharge aquifers. This process works by the infiltrating and injecting excess surface water back into these aquifers. It can be effective in restoring watersheds and wetlands.</span></p><span data-dcnode-id="546" instrument_node="">
</span><h3 data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Conserving Water</span></h3><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Overuse and wastage of water are both contributors to the problem of water scarcity. Conservation of water has thus become essential. This is one method that we can all support by doing our part. Limiting our water usage to only what is necessary. The government will need to have proper policies in place to make sure only a necessary amount of supply-demand chain is maintained.</span></p><span data-dcnode-id="540" instrument_node="">
</span><h2 data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">In Conclusion,</span></h2><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Water scarcity is not a problem that is limited to an area or a country. This is a global problem as are the causes. Pollution, water wastage, and the growing population continue to be the prime causes of water scarcity. The effects of which will eventually affect us all. We must, thus, make sure that we try to implement the solutions provided above to the best of our ability.</span></p><span data-dcnode-id="534" instrument_node="">
