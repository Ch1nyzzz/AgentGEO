n></div></div></div><div class="m-share m-share--hidden" data-dcnode-id="931" data-description="Faced with a global water crisis, several organizations are deploying artificial intelligence systems in order to improve resource management." data-title="How to solve water scarcity with AI technology?" data-url="https://tomorrow.city/a/water-crisis-ai-technology" id="m-share"><div class="m-share__container" data-dcnode-id="932"><div class="m-share__content" data-dcnode-id="934"><div class="m-share__title" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Share</span></div><div class="m-share__itemTitle" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">How to solve water scarcity with AI technology?</span></div><div class="m-share__body" data-dcnode-id="935"><div class="m-share__iconContainer" data-dcnode-id="940" id="twitter"><img data-dcnode-id="941" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/tomorrow-city/assets/img/share/twitter.png&amp;raw" title="Twitter"></div><div class="m-share__iconContainer" data-dcnode-id="938" id="facebook"><img data-dcnode-id="939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/tomorrow-city/assets/img/share/facebook.png&amp;raw" title="Facebook"></div><div class="m-share__iconContainer" data-dcnode-id="936" id="whatsapp"><img data-dcnode-id="937" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/tomorrow-city/assets/img/share/whatsapp.png&amp;raw" title="Whatsapp"></div></div></div><div class="m-share__buttonClose" data-dcnode-id="933" id="btnShareClose"></div></div></div><div class="p-article__body u-readableText u-readableText--" data-dcnode-id="839"><p data-dcnode-id="918"><small data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Author | Arantxa Herranz</span></small><span data-dcnode-id="928" instrument_node="">It is estimated that around </span><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">785 million people in the world lack even a basic drinking-water service</span></strong><span data-dcnode-id="925" instrument_node=""> and at least 2 billion people use a </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tomorrow.city/a/the-water-challenge-how-to-provide-water-for-the-worlds-population-in-a-sustainable-manner" target="_blank"><span data-dcnode-id="924" instrument_node="">drinking water</span></a><span data-dcnode-id="922" instrument_node=""> source contaminated with faeces, transmitting diseases such as diarrhoea, cholera, dysentery, typhoid, and polio. The </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.who.int/news-room/fact-sheets/detail/drinking-water" target="_blank"><span data-dcnode-id="921" instrument_node="">World Health Organisation figures</span></a><span data-dcnode-id="919" instrument_node=""> also estimate that, by 2025, half of the world’s population will be living in water-stressed areas.The lack of health standards, together with future restrictions, could be a lethal cocktail in many regions of the world. In fact, in some areas of the planet, the limit at which water services can be provided in a sustainable manner is rapidly being reached, particularly in arid areas.</span></p><h2 data-dcnode-id="915"><b data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">How can AI be used to solve the water crisis?</span></b></h2><img alt="smartcovers" class="aligncenter wp-image-9097 size-full" data-dcnode-id="914" height="1265" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/tomorrow-city/assets/migration/2020/03/grifo.jpg&amp;raw" width="1920"><span data-dcnode-id="913" instrument_node="">In order to try to tackle this water scarcity, many organisations have started using </span><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">artificial intelligence to control water </span></strong><span data-dcnode-id="910" instrument_node="">in numerous aspects such as preventing water wastage or obtaining more knowledge about how this resource is used. The aim is to try to improve the global water crisis and the good news is that some projects are already proving to be effective.</span><h3 data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Prevent conflicts</span></h3><span data-dcnode-id="907" instrument_node="">The </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.un-ihe.org/" target="_blank"><span data-dcnode-id="906" instrument_node="">Water, Peace and Security</span></a><span data-dcnode-id="904" instrument_node=""> partnership is designing innovative tools and services that can </span><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">identify the development of water?related security risks.</span></strong><span data-dcnode-id="901" instrument_node=""> These innovative tools and services are able to show short term water shortage changes and impacts, and link them to social, political, economic, and hydrological factors.Experts from this organisation have used artificial intelligence to predict (up to one year in advance) </span><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">where global water-related conflicts will occur.</span></strong><span data-dcnode-id="898" instrument_node=""> According to their forecasts, the alert systems will also be able to be used to inspect the causes of these water conflicts and direct the help specifically to these areas that need it most. The experimental stage has already been successful, since the tool </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aidaily.co.uk/articles/ai-and-the-global-water-crisis" target="_blank"><span data-dcnode-id="897" instrument_node="">was able to predict</span></a><span data-dcnode-id="895" instrument_node=""> more than 75% of Mali's Inner Niger Delta water-related conflicts.</span><h3 data-dcnode-id="893"><img alt="smartcovers" class="aligncenter wp-image-9101 size-full" data-dcnode-id="894" height="1280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/tomorrow-city/assets/migration/2020/03/embalse.jpg&amp;raw" width="1920"></h3><h3 data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Locating reservoirs and dams</span></h3><span data-dcnode-id="890" instrument_node="">Meanwhile, a team of researchers at Stanford University is combining remote-sensing data with machine learning to detect smaller dams and reservoirs. These structures deliver drinking water and generate hydropower, but they can also risk threatening ecosystems if not built and managed carefully.</span><h3 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Water in mega-cities</span></h3><span data-dcnode-id="887" instrument_node="">Industrial and employment dynamics show a clear </span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tomorrow.city/a/urban-overcrowding-and-rural-depopulation-are-there-any-solutions-to-these-problems" target="_blank"><span data-dcnode-id="886" instrument_node="">trend towards the construction of megacities</span></a><span data-dcnode-id="884" instrument_node="">, where, </span><strong data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">despite the efficiencies of their higher density, more water is consumed at a localised level</span></strong><span data-dcnode-id="881" instrument_node="">. In cities with populations exceeding 10 million, there is a risk of experiencing water scarcity and unequal access to this resource.Artificial Intelligence is also </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tomorrow.city/a/what-are-hyperconnected-cities" target="_blank"><span data-dcnode-id="880" instrument_node="">helping to solve these problems</span></a><span data-dcnode-id="878" instrument_node="">. In India, Dr Yogesh Simmhan is using the Internet of Things (IoT) to help ensure people have access to an affordable and safe water supply. By analysing the data, the aim is to </span><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">understand the causes of variations in access to water for individual neighbourhoods;</span></strong><span data-dcnode-id="875" instrument_node=""> AI can be used to better manage supplies, such as improved water scheduling or detecting leaks.By grouping data together about areas such as the flow of reservoirs, seasonal climate and residential use, the team can predict the maximum demand and identify deficiencies.</span><h3 data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">And the water that is not visible</span></h3><span data-dcnode-id="872" instrument_node="">In cities, a large amount of that water runs through an underground infrastructure that cannot be seen, but it is vital to maintain it in good condition in order to extend its service life. If data is available about the condition of these pipes, public services can compare the existing performance with expectations, and </span><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">predict when and how problems may arise.</span></strong><span data-dcnode-id="869" instrument_node=""> Sensors (small, resistant and low-voltage) can send these data and information to be processed with Artificial Intelligence and those systems we cannot see can be monitored in real time.</span><img alt="smartcovers" class="aligncenter wp-image-9099 size-full" data-dcnode-id="868" height="1280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//storage.googleapis.com/tomorrow-city/assets/migration/2020/03/tuberia.jpg&amp;raw" width="1920"><span data-dcnode-id="867" instrument_node="">Information that can also be combined with other data such as climate and tides, in order to make more appropriate decisions. </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smartcoversystems.com/" target="_blank"><span data-dcnode-id="866" instrument_node="">SmartCover Systems</span></a><span data-dcnode-id="864" instrument_node=""> is one of the companies working on these systems, particularly on wastewater systems. The strategically placed SmartCover remote field units </span><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">enable blockages to be identified before they overflow onto the street, </span></strong><span data-dcnode-id="861" instrument_node="">among other options.The company says 200 million hours of sewer and stormwater monitoring data have been collected. The application of artificial intelligence (AI) patterns is enabling </span><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">common problems with the wastewater collection system to be identified.</span></strong><h2 data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">AI to the rescue of the water problem</span></h2><span data-dcnode-id="856" instrument_node="">The water crisis is facing two challenges: finding new sources of water and managing the existing reserves and water systems in a sustainable manner. AI can work continuously with large series of data. Technology also learns on-the-go. Researchers are testing algorithms that enable water plants to be built to provide updated statistics about the current state of the resource and help build models for the future.With the help of sensors and neural networks, AI can generate strategies or design prediction models for the future to improve consumption and localisation of this basic asset. What it cannot do is </span><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">design policies that govern its correct use.</span></strong><small data-dcnode-id="841"><span data-dcnode-id="853" instrument_node="">Images | </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/es-es/%40fabiano-rodrigues-794857%3Futm_content%3DattributionCopyText%26utm_medium%3Dreferral%26utm_source%3Dpexels" target="_blank"><span data-dcnode-id="852" instrument_node="">Fabiano Rodrigues</span></a><span data-dcnode-id="850" instrument_node="">, </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/es-es/%40belart84" target="_blank"><span data-dcnode-id="849" instrument_node="">Artem</span></a><span data-dcnode-id="847" instrument_node="">, </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/es-es/%40alexbracken" target="_blank"><span data-dcnode-id="846" instrument_node="">Alex Brackem</span></a><span data-dcnode-id="844" instrument_node="">, </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/es-es/%40skitterphoto" target="_blank"><span data-dcnode-id="843" instrument_node="">Skitterphoto</span></a></small><p data-dcnode-id="840"></p></div></div></div></section><section class="p-article__section p-article__section--tags u-aCollectionSection u-aCollectionSection--size-none u-aCollectionSection--none" data-dcnode-id="814"><div class="a-title a-title--none a-title--size-article" data-dcnode-id="831"><div class="a-title__container" data-dcnode-id="832"><div class="a-title__text" data-dcnode-id="833"><h1 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Tags</span></h1></div></div></div><div class="o-tags o-tags--none o-tags--size-none" data-dcnode-id="815"><nav class="o-tags_
