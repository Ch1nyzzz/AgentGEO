</span><h2 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">What Scripture Has to Say About Water</span></h2><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1290" instrument_node="">It is intriguing, in light of the fact that 71 percent of our Earth is covered by water, that Scripture has a great deal to say on the topic. One commentator suggests that water is mentioned 722 times in the Bible. This total is less than the mentions of God, Jesus, heaven or love, but more than faith, hope, prayer or worship. In Genesis it says: </span><em data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">“A river watering the garden flowed from Eden; from there it was separated into four headwaters The name of the first is Pishon … The name of the second river is the Gihon … The name of the third river is the Tigris … And the fourth river is the Euphrates.” </span></em></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">For those of us with a Sunday School background, the stories dealing with water are memorable: Moses parting the Red Sea as the children of Israel fled the pursuing chariots of the Egyptians. Moses striking the rock at Horeb so that water flowed in the wilderness to satisfy the thirst of the people and of their flocks.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><img alt="A Picture of the Global Water Crisis where refugees who experience water scarcity are waiting to get clean water and satisfy their thirst in a camp in Dadaab, Somalia." data-dcnode-id="1282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/refugees-getting-water.jpg&amp;raw"><span data-dcnode-id="1281" instrument_node="">
</span><p class="caption" data-dcnode-id="1276"><span data-dcnode-id="1280" instrument_node="">Refugees waiting to get water and satisfy their thirst in a camp in Dadaab, Somalia.</span><br data-dcnode-id="1279"><span class="attribution" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">By hikrcn/Shutterstock.com</span></span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1274" instrument_node="">Wells are central stages for story-telling dramas: Abraham’s servant finds a bride for Isaac after praying near a well, </span><em data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">“Oh, Lord God of my master, Abraham, give me success today and show kindness to my master.”</span></em><span data-dcnode-id="1271" instrument_node=""> Jesus declares His spiritual authority to a Samaritan woman by a well. </span><em data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">“Will you give me a drink?”</span></em><span data-dcnode-id="1268" instrument_node=""> He asks, to begin a dialogue with her, and then eventually He declares, </span><em data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">“But whoever drinks the water I give him will never thirst. Indeed, the water I give him will become in him a spring of water welling up to eternal life”</span></em><span data-dcnode-id="1265" instrument_node=""> (John 4:14, </span><span class="smallcaps" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">NIV</span></span><span data-dcnode-id="1262" instrument_node="">).</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1259" instrument_node="">Rivers are forded, oases with pools satisfy weary nomads and their families, and always, over and over, water is used as an example of God’s blessing. </span><em data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">“And the LORD will continually guide you, and satisfy your desire in scorched places, and give strength to your bones. And you will be like a watered garden, and like a spring of water whose waters do not fail”</span></em><span data-dcnode-id="1256" instrument_node=""> (Isaiah 58:11, </span><span class="smallcaps" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">NASB</span></span><span data-dcnode-id="1253" instrument_node="">).   </span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1250" instrument_node="">Water is used as an example of the sacramental, where the holy mixes mysteriously with the physical. People flock to John the Baptist in the wilderness to be baptized for the forgiveness of their sins: </span><em data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">“I baptize you with water for repentance. But after me comes one who is more powerful than I, whose sandals I am not worthy to carry. He will baptize you with the Holy Spirit and fire”</span></em><span data-dcnode-id="1247" instrument_node=""> (Matthew 3:11, </span><span class="smallcaps" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">NIV</span></span><span data-dcnode-id="1244" instrument_node="">). </span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1241" instrument_node="">The heavens open after Jesus is baptized, the Spirit descends in the bodily form of a dove, and a voice is heard declaring, </span><em data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">“You are My beloved Son; in you I am well-pleased”</span></em><span data-dcnode-id="1238" instrument_node=""> (Luke 3:22, </span><span class="smallcaps" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">NKJV</span></span><span data-dcnode-id="1235" instrument_node="">). </span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1232" instrument_node="">Water is a symbol of cleansing, not only in a physical sense but in a spiritual sense. Jesus walks on the water. He teaches by the shores of the seas. Some of His disciples are fishermen who gained their livelihood from waters’ depths. In the last chapters of Revelation, which many theologians feel is a prophetic picture of Eden being restored again, these words bring the water theme to a close. Revelation 22, the last chapter of the Bible, the first verse: </span><em data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">“And he showed me a pure river of water of life, clear as crystal, proceeding from the throne of God and of the Lamb.”</span></em></p><span data-dcnode-id="1228" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="1216"><span data-dcnode-id="1227" instrument_node="">
</span><img alt="Water Drop city" class="drop-image faded" data-dcnode-id="1226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop1-city.png&amp;raw"><span data-dcnode-id="1225" instrument_node="">
</span><img alt="Water Drop usa" class="drop-image faded" data-dcnode-id="1224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop2-usa.png&amp;raw"><span data-dcnode-id="1223" instrument_node="">
</span><img alt="Water Drop ground" class="drop-image faded" data-dcnode-id="1222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop3-ground.png&amp;raw"><span data-dcnode-id="1221" instrument_node="">
</span><img alt="Water Drop ocean" class="drop-image faded" data-dcnode-id="1220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop4-ocean.png&amp;raw"><span data-dcnode-id="1219" instrument_node="">
</span><img alt="Water Drop bubbles" class="drop-image" data-dcnode-id="1218" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop5-bubbles.png&amp;raw"><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span><h2 data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">A Christ-like Response to the Global Water Crisis</span></h2><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1211" instrument_node="">It is a comfort, to know the fragility of our water sources around the globe is taken into account. Because of community involvement and the compassion of pastors from Believers Eastern Church and other affiliate organizations, Dr. K.P. Yohannan spearheaded the </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gfa.org/water" target="_blank"><span data-dcnode-id="1210" instrument_node="">“Jesus Well” project</span></a><span data-dcnode-id="1208" instrument_node=""> among some of the neediest regions in India, even small villages across Asia, spanning multiple Asian nations. In 2016 alone, Gospel for Asia was able to help provide </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gfa.org/special-report/2016/%23communities" target="_blank"><span data-dcnode-id="1207" instrument_node="">6,822 wells</span></a><span data-dcnode-id="1205" instrument_node="">. That is 6,822 sources of clean, fresh drinking water. GFA supporters around the world have allowed the rate of installation of Jesus Wells to continue and to remain consistent, with tens of thousands of wells drilled and constructed in the past several years. Now, the Jesus Well project is one of the largest clean water initiatives in the world.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><div class="offset-image left" data-dcnode-id="1196"><span data-dcnode-id="1202" instrument_node="">
</span><img alt="A Jesus Well is being drilled next to a church building. This is the first well dug in the village" data-dcnode-id="1201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/well-digging.jpg&amp;raw"><span data-dcnode-id="1200" instrument_node="">
</span><p class="caption" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">A Jesus Well is being drilled next to a church building. This is the first well dug in the village.</span></p><span data-dcnode-id="1197" instrument_node="">
</span></div><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Here, there are no broken wells laying waste and abandoned because well-meaning but neglectful charities dug wells that villagers could not maintain or repair. Jesus Wells are maintained in good repair by GFA-supported local pastors. In fact, wherever possible, the wells are dug near local churches, not simply so that they will be maintained, but so that the beneficiaries will recognize that our love for them is genuine, because everyone is able to drink freely—no matter their income or social background. </span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Digging a Jesus Well supports the local economy, because local labor and materials are used to drill the wells. This keeps costs low, often even seven times lower than wells installed by other organizations.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Jesus Wells are drilled up to 650 feet deep to ensure a continuous supply of clean water. They can last for 20 years and provide clean water for an average of 300 people every day. Some wells serve even more.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1183"><a data-dcnode-id="1184" data-target="#timeLapseVideo" data-toggle="modal"><span data-dcnode-id="1185" instrument_node="">Watch a time-lapse video of an Asian village using a Jesus Well »</span></a></p><span data-dcnode-id="1182" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="1175"><span data-dcnode-id="1181" instrument_node="">
</span><img alt="Women get clean water from a BioSand water filter" data-dcnode-id="1180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/biosand2.jpg&amp;raw"><span data-dcnode-id="1179" instrument_node="">
</span><p class="caption" data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Though simple in construction, BioSand water filters are easy to use and provide water that is 98 percent pure.</span></p><span data-dcnode-id="1176" instrument_node="">
</span></div><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">In regions where water might be available, but it’s just not safe to drink, GFA-supported workers provide </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gfa.org/water/biosand/" target="_blank"><span data-dcnode-id="1172" instrument_node="">BioSand water filters</span></a><span data-dcnode-id="1170" instrument_node="">. These simple structures—locally built from concrete, sand and rocks—filter the water to remove impurities, providing water for drinking and cooking that is 98 percent pure. In 2016, GFA provided 14,886 BioSand water filters for families and individuals.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">Gospel for Asia </span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gfa.org/news/articles/four-new-wells-bring-clean-water-to-5300-people/" target="_blank"><span data-dcnode-id="1166" instrument_node="">published a story</span></a><span data-dcnode-id="1164" instrument_node=""> in 2016 that shared the paradox faced by four villages in one region of South Asia. These communities faced severe water shortage during the hot, summer months, but in the rainy monsoon season their water sources were contaminated by chemicals. Their situation was an echo back to Samuel Taylor Coleridge’s poem: “Not a drop to drink.” Local congregations in the region were concerned about the people and their need for clean water, and in 2014, GFA helped drill four Jesus Wells to provide safe, pure water for these villages. By God’s grace, there are now more than 5,000 people who benefit from these wells!</span></p><span data-dcnode-id="1162" instrument_node="">
</span></div><span data-dcnode-id="1159" instrument_node="">
</span></div><span data-dcnode-id="1156" instrument_node="">
</span></div><span data-dcnode-id="1153" instrument_node="">

</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="245"><span data-dcnode-id="1148" instrument_node="">
</span><h3 data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">A Jesus Well Transformed Salil’s Family</span></h3><span data-dcnode-id="1145" instrument_node="">
</span><div class="offset-image right medium" data-dcnode-id="1138"><span data-dcnode-id="1144" instrument_node="">
</span><img alt="Salil and his family" class="circle" data-dcnode-id="1143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/salil-family1.jpg&amp;raw"><span data-dcnode-id="1142" instrument_node="">
</span><p class="caption" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Salil (pictured) lives in a northeastern region of Asia with his wife and three children.</span></p><span data-dcnode-id="1139" instrument_node="">
</span></div><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">The staggering weight of the global clean water problems is beyond the ability of most of us to wrap our minds around. Still, more than 150 million people in South Asia alone have either no immediate access to clean water or drink from polluted sources. </span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node="">But the clean water problem can be devastating for a single family. We see this illustrated in the </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gfa.org/news/articles/a-jesus-well-transforms-salils-family/" target="_blank"><span data-dcnode-id="1132" instrument_node="">story of a gentleman named Salil, his wife and his children</span></a><span data-dcnode-id="1130" instrument_node="">. Until a Jesus Well was installed in their village, all the water for the community came from a nearby contaminated pond. Salil’s family and the other villagers were sick with a plethora of illnesses and diseases. They suffered because of the very water they depended on for life. </span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">The situation drove them even deeper into poverty as their illnesses kept them from work, and their meager income was not adequate to provide for the medicines they needed—let alone their other essential needs. Salil did everything he could think of to provide for his family, but nothing he did was adequate.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">When a local pastor requested and received a Jesus Well for the community, everything changed. A thankful Salil said, “Our family is blessed both physically and spiritually. We are free from problems and sickness.”</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1121" instrument_node="">How appropriate: </span><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">“And if anyone gives even a cup of cold water to one of these little ones who is my disciple, truly I tell you, that person will certainly not lose their reward”</span></em><span data-dcnode-id="1118" instrument_node=""> (Matthew 10:42, </span><span class="smallcaps" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">NIV</span></span><span data-dcnode-id="1115" instrument_node="">). Those who receive are blessed, and those who give are blessed. The accompanying video will give you a feel for just what that means.</span></p><span data-dcnode-id="1113" instrument_node="">

</span><p class="append-top" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">So, our Blue Planet spins in space, obedient to its determined orbit. Its surface is covered by 71 percent water. So far, there has been no verification of liquid water existing on any other planet in our solar system. As yet, not a single drop of water has been detected anywhere in interstellar space, and scientists have determined that only a planet of the right mass, the right chemical composition and the right location can support liquid water. Let us remember that it is good. It is very good.</span></p><span data-dcnode-id="591" instrument_node="">

</span><div data-dcnode-id="105" id="disqus_thread"><iframe allowtransparency="true" data-dcnode-id="106" frameborder="0" horizontalscrolling="no" id="dsq-app6335" name="dsq-app6335" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//disqus.com/embed/comments/%3Fbase%3Ddefault%26f%3Dgfahome%26t_u%3Dhttps%253A%252F%252Fgfa.org%252Fspecial-report%252Fglobal-clean-water-crisis%252F%26t_d%3DGlobal%2520Water%2520Crisis%253A%2520Water%2520Shortage%2520%2526%2520Water%2520Scarcity%2520Solutions%2520-%2520Gospel%2520for%2520Asia%26t_t%3DGlobal%2520Water%2520Crisis%253A%2520Water%2520Shortage%2520%2526%2520Water%2520Scarcity%2520Solutions%2520-%2520Gospel%2520for%2520Asia%26s_o%3Ddefault%23version%3D48980166e0153f33375a5a0d60b5e441&amp;raw" style="width: 1px !important; min-width: 100% !important; border: none !important; overflow: hidden !important; height: 0px !important;" tabindex="0" title="Disqus" verticalscrolling="no" width="100%"><html class="not-supported type-" data-dcnode-id="108" dir="ltr" lang="en"><head data-dcnode-id="198"><meta charset="utf-8"><span data-dcnode-id="212" instrument_node="">

</span><div class="alert--error" data-dcnode-id="188" id="error"><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="190"><span data-dcnode-id="194" instrument_node="">We were unable to load Disqus. If you are a moderator please see our </span><a data-dcnode-id="192" href="https://docs.disqus.com/help/83/"><span data-dcnode-id="193" instrument_node=""> troubleshooting guide</span></a><span data-dcnode-id="191" instrument_node="">. </span></p><span data-dcnode-id="189" instrument_node="">
</span></div><span data-dcnode-id="187" instrument_node="">
</span><span data-dcnode-id="184" instrument_node="">
</span><div data-dcnode-id="113" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="172"><div class="comment__name clearfix" data-dcnode-id="178"><img class="comment__avatar" data-dcnode-id="183" height="32" src="https://c.disquscdn.com/uploads/users/34201/4813/avatar92.jpg?1648033797" width="32"/><strong data-dcnode-id="180"><a data-dcnode-id="181" href=""><span data-dcnode-id="182" instrument_node="">Suzanne Sholer</span></a></strong><span data-dcnode-id="179" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="173"><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">One of the biggest problems with dug wells is that they can become easily contaminated.  We encountered this problem while living in a village in Ontario Canada. The community I am now living in has a municipal water supply that is contaminated.</span></p><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">I prayed that Our Father would provide a way that "even where it is dry, people will be able to harvest water from the sky" A young woman who is a student at Trent University in Peterborough, Ontario, Canada has discovered a way to do just this -harvest water from the sky in one of the driest countries in Africa! Please contact Trent University to get help with this very important project.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="154"><div class="comment__name clearfix" data-dcnode-id="166"><img class="comment__avatar" data-dcnode-id="171" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="168"><a data-dcnode-id="169" href=""><span data-dcnode-id="170" instrument_node="">michaellivall</span></a></strong><span data-dcnode-id="167" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="155"><p data-dcnode-id="156"><span data-dcnode-id="165" instrument_node="">For me the key points were three, all from Scripture, and all glossed over in the article.</span><br data-dcnode-id="164"/><span data-dcnode-id="163" instrument_node="">First water is a sign of God's blessing, she says, and then lists the place suffering water shortages and they are all 'demonic' - don't forget God curses as well as blesses!</span><br data-dcnode-id="162"/><span data-dcnode-id="161" instrument_node="">Second, she quotes 'anyone who gives a cup of water to one of these because he is My disciple' - yes, but a lot of them aren't His disciples!</span><br data-dcnode-id="160"/><span data-dcnode-id="159" instrument_node="">Third and most importantly, she quotes what Jesus said that anyone who drinks water from a well will thirst again, but those who drink His living water will never thirst - so why are we concentrating more and more on giving them 'temporary' water instead of focussing everything on the water of eternal life?</span><br data-dcnode-id="158"/><span data-dcnode-id="157" instrument_node="">The Bible doesn't say we should dig wells, start schools, open hospitals, etc. in order to preach the gospel - it says speak God's word and confirm it by healings and casting out demons, and this isn't happening!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="144"><div class="comment__name clearfix" data-dcnode-id="148"><img class="comment__avatar" data-dcnode-id="153" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="150"><a data-dcnode-id="151" href=""><span data-dcnode-id="152" instrument_node="">E Swihart</span></a></strong><span data-dcnode-id="149" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="145"><p data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">VERY GOOD ARTICLE. Professionally done. Filled with information and staggering statistics. God,  please bless the Jesus Wells ministry 1,000 fold!!!  Move in hearts to give so that other may LIVE.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="134"><div class="comment__name clearfix" data-dcnode-id="138"><img class="comment__avatar" data-dcnode-id="143" height="32" src="https://c.disquscdn.com/uploads/users/28067/8690/avatar92.jpg?1558730267" width="32"/><strong data-dcnode-id="140"><a data-dcnode-id="141" href=""><span data-dcnode-id="142" instrument_node="">Iris Cust</span></a></strong><span data-dcnode-id="139" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="135"><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">This is a very well-thought through and informative article.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="124"><div class="comment__name clearfix" data-dcnode-id="128"><img class="comment__avatar" data-dcnode-id="133" height="32" src="https://c.disquscdn.com/uploads/users/5207/8330/avatar92.jpg?1558103619" width="32"/><strong data-dcnode-id="130"><a data-dcnode-id="131" href=""><span data-dcnode-id="132" instrument_node="">Grace</span></a></strong><span data-dcnode-id="129" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="125"><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">Wow! I learned so much in a mere 30-minute-read article! How sad for the people living in the midst of a water crisis :( But I am so so so happy that there are many organizations helping in big and small ways! Praise God for Bro. KP Yohannan having the determination to grow the "Jesus Well" project into the HUGE outreach it is today, by God's grace!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="114"><div class="comment__name clearfix" data-dcnode-id="118"><img class="comment__avatar" data-dcnode-id="123" height="32" src="https://c.disquscdn.com/uploads/users/26799/1445/avatar92.jpg?1521583954" width="32"/><strong data-dcnode-id="120"><a data-dcnode-id="121" href=""><span data-dcnode-id="122" instrument_node="">Cynthia Deere</span></a></strong><span data-dcnode-id="119" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="115"><p data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">This is a very well written and thorough article. SO grateful solutions are offered and the reader is given direction on how to be part of the solution to our global, humanitarian crisis.</span></p></div></div></div><span data-dcnode-id="112" instrument_node="">
