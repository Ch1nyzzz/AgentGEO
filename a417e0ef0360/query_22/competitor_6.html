</span><h1 data-dcnode-id="2796"><span data-dcnode-id="2799" instrument_node="">Don’t Drink the Water!</span><span class="subhead" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">(Unless You Know What’s in It)</span></span></h1><span data-dcnode-id="2795" instrument_node="">
</span></div><span data-dcnode-id="2793" instrument_node="">
</span></div><span data-dcnode-id="2791" instrument_node="">
</span></div><span data-dcnode-id="2789" instrument_node="">
</span></div><span data-dcnode-id="2787" instrument_node="">
</span></div><span data-dcnode-id="2785" instrument_node="">
</span><article data-dcnode-id="221"><span data-dcnode-id="2784" instrument_node="">
</span><div class="container" data-dcnode-id="2711"><span data-dcnode-id="2783" instrument_node="">
</span><div class="row" data-dcnode-id="2714"><span data-dcnode-id="2782" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="2717"><span data-dcnode-id="2781" instrument_node="">
</span><img alt="Karen Burton Mains, author" class="circle small-author-image" data-dcnode-id="2780" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/karenmains-100.jpg&amp;raw"><span data-dcnode-id="2779" instrument_node="">
</span><p class="article-meta first-line" data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Written By Karen Burton Mains</span></p><span data-dcnode-id="2776" instrument_node="">
</span><p class="article-meta second-line" data-dcnode-id="2771"><span data-dcnode-id="2775" instrument_node="">12 minute read </span><span class="bullet" data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">•</span></span><span data-dcnode-id="2772" instrument_node=""> July 7, 2020</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2763"><span data-dcnode-id="2769" instrument_node="">In my original special report for Gospel for Asia titled </span><em data-dcnode-id="2765"><a data-dcnode-id="2767" href="#solutions-safe-water"><span data-dcnode-id="2768" instrument_node="">The Global Water Crisis</span></a><span data-dcnode-id="2766" instrument_node="">,</span></em><span data-dcnode-id="2764" instrument_node=""> I explored worldwide solutions to humanity’s need for pure, safe water. This update explores tap water safety concerns in the United States and what to do about those, plus clean water solutions in Asia and practical ways you can help.</span></p><span data-dcnode-id="2762" instrument_node="">
</span><div class="offset-image right hidden-xs" data-dcnode-id="2755" style="width:350px;"><span data-dcnode-id="2761" instrument_node="">
</span><img alt="Photo of Orchids" class="lazy" data-dcnode-id="2760" data-src="https://cc.gfamedia.org/special-report/water/blue-marble.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/orchids.jpg&amp;raw" style="border-radius:5px;"><span data-dcnode-id="2759" instrument_node="">
</span><p class="caption" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Like my orchids, people around the globe are affected adversely by the water they consume.</span></p><span data-dcnode-id="2756" instrument_node="">
</span></div><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">“The orchids are really doing well this year,” commented my husband, David, who usually doesn’t notice these sorts of things. Every year, I yield to temptation and purchase a few orchids in November around Thanksgiving time, hoping they will last through the Christmas season, maybe even longer. Greenhouses, I am told, cultivate orchids all year round.</span></p><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">Generally, I choose orchids with the most buds on them, calculating that there is some energy for growth hiding in these promises of future blooms. My scheme, however, generally degenerates in a wilting kind of reality. The bulbs dry up, turn to tissue-like paper and fall into the potting soil.</span></p><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">This year, however, I affirmed my husband’s comments with some surprise. Even in January, the orchids seemed still to be doing really well. The butterfly-like blooms were all strong, white and crisp. There was no browning around the edges nor had any died. I’d trimmed back some dried-up roots, but that wasn’t too different from previous years. What seemed to be making the difference was that I had changed the water I used to keep the plants fresh.</span></p><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">I had stopped using tap water and used bottles of distilled water instead. This idea was stimulated when I observed an older gentleman loading up the trunk of his car with at least 20 to 30 gallon-size bottles of water.</span></p><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">“You’re going to do more than just drink the water, I hope?” I said as I moved past him toward the grocery store.</span></p><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">“Yes, ma’am,” he replied. “My wife is having trouble growing orchids, so we’re going to try distilled water for a while.”</span></p><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">“I have trouble growing orchids,” I called back. “Maybe I’ll pick up some bottles.”</span></p><span data-dcnode-id="2733" instrument_node="">
</span><blockquote data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Like my orchids, people around the globe are affected adversely by the water they consume. On one continent, dirty water pollutes whole communities. On another, tap water contaminates our kitchens.</span></blockquote><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Which, indeed, I did and have been using that to water my plants every week since, with the results that even my husband noticed and commented on how well the orchids were doing.</span></p><span data-dcnode-id="2727" instrument_node="">
</span><p data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Distilled water, for those who don’t know, has been boiled in a vat, leaving impurities behind. This process removes harmful microbes (and also beneficial minerals such as calcium and magnesium). The steam eventually re-condenses, leaving a liquid behind that apparently helps my orchids thrive.</span></p><span data-dcnode-id="2724" instrument_node="">
</span><p data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">Most people will not deny this truism: Certain kinds of life thrive with certain kinds of water. Of course, this applies to human well-being as well as to plant health.</span></p><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Like my orchids, people around the globe are affected adversely by the water they consume. On one continent, dirty water pollutes whole communities. On another, tap water contaminates our kitchens.</span></p><span data-dcnode-id="2718" instrument_node="">
</span></div><span data-dcnode-id="2715" instrument_node="">
</span></div><span data-dcnode-id="2712" instrument_node="">
</span></div><span data-dcnode-id="2709" instrument_node="">
</span><img alt="People collect water from wells and rivers" class="full-horizontal-image section-image" data-dcnode-id="2708" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/collage4.jpg&amp;raw"><span data-dcnode-id="2707" instrument_node="">
</span><div class="container" data-dcnode-id="2581"><span data-dcnode-id="2706" instrument_node="">
</span><div class="row" data-dcnode-id="2584"><span data-dcnode-id="2705" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="2587"><span data-dcnode-id="2704" instrument_node="">

</span><h3 data-dcnode-id="2682" id="america-lead-water"><span data-dcnode-id="2685" instrument_node="">Despite the Safe Drinking Water Act, </span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">3,000 Areas in the U.S. Have Lead-Contaminated Water</span></h3><span data-dcnode-id="2681" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="2669"><span data-dcnode-id="2680" instrument_node="">
</span><img alt="President Clinton signs the amendments to the Safe Drinking Water Act as children and others watch." data-dcnode-id="2679" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/bill-clinton-safe-drinking-water-act.jpg&amp;raw"><span data-dcnode-id="2678" instrument_node="">
</span><p class="caption" data-dcnode-id="2671"><span data-dcnode-id="2677" instrument_node="">On August 6, 1996, President Clinton signed amendments to the Safe Drinking Water Act to implement comprehensive public health protection from the source to the tap. </span><br data-dcnode-id="2676"><span class="attribution" data-dcnode-id="2672"><span data-dcnode-id="2675" instrument_node="">Photo by </span><a data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/usepagov/15011059880/in/photolist-oStB8f-ECKXFp-Povg8y-DAPMCy-aSNdYR-EYTHj3-QvCFhs-KP2jcy-DVcC2x-FuBK1m-LgsgNR-PyLEzV-2ipMPhk-KkboS9-Nct6fT-2irqELv-2j4Sr86-FAk2H-oAqeS-hy7bQ-DcS3W-8EPV1M-8EbqXr-E8qx1-BbiHR-pFnNE-ENJE5h-L56HCA-PQ8TBd-2iCdgG4-bFCSNc-QXDBrp-2hJA9Eq-2ikMcm1-2i1HUyc-5oZqVC-EVvMds-LLnLPq-MG2Grz-2jcKBfx-Bie6zy-t6V8D6-ufDWPQ-2iuTs8d-LMgAhE-JtPbx2-PBrbLr-LLNUcQ-2eswLgA-EThTae" target="_blank"><span data-dcnode-id="2674" instrument_node="">US Environmental Protection Agency</span></a></span></p><span data-dcnode-id="2670" instrument_node="">
</span></div><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2667" instrument_node="">To ensure water safety, the Safe Drinking Water Act (SDWA) was originally passed by the U.S. Congress in 1974 to protect public health by establishing regulations about drinking water. According to a paper issued by the Environmental Protection Agency, “The law was amended in 1986 and 1996 and requires many actions to protect drinking water and its sources—rivers, lakes, reservoirs, springs, and ground water wells. … SDWA authorizes the United States Environmental Protection Agency (US EPA) to set national health-based standards for drinking water to protect against both naturally occurring and man-made contaminants that may be found in drinking water.”</span><sup data-dcnode-id="2664" id="fnref:1"><a data-dcnode-id="2665" href="#fn:1" rel="footnote"><span data-dcnode-id="2666" instrument_node="">1</span></a></sup></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2661" instrument_node="">Unfortunately, today, much of the water supply in the United States, despite the SDWA, is at risk. The Environmental Protection Agency urges that drinking water safety cannot be taken for granted: “There are a number of threats to drinking water: improperly disposed of chemicals, animal wastes, pesticides, human threats, wastes injected underground, and naturally occurring substances can all contaminate drinking water. Likewise, drinking water that is not properly treated or disinfected, or which travels through an improperly maintained distribution system, may also pose a health risk.”</span><sup data-dcnode-id="2658" id="fnref:2"><a data-dcnode-id="2659" href="#fn:2" rel="footnote"><span data-dcnode-id="2660" instrument_node="">2</span></a></sup></p><span data-dcnode-id="2656" instrument_node="">
</span><blockquote data-dcnode-id="2650"><span data-dcnode-id="2655" instrument_node="">Some 3,000 areas of the United States recently recorded </span><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">lead-poisoning rates at least double to those in Flint </span><br data-dcnode-id="2652"><span data-dcnode-id="2651" instrument_node="">during the peak of that city’s contamination crisis.</span></blockquote><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2648" instrument_node="">The most notable example of U.S. water source contamination, which captured the attention of much of the nation, was from Flint, Michigan, where analysis revealed that the town’s drinking water was lead-contaminated and was poisoning much of the citizenry of that community. However, even more shocking was the discovery that Reuters, the international news agency, reported: “Nearly 3,000 areas [of the country had] recently recorded lead-poisoning rates at least double those in Flint during the peak of that city’s contamination crisis. And more than 1,100 of these communities had a rate of elevated blood tests at least four times higher.”</span><sup data-dcnode-id="2645" id="fnref:3"><a data-dcnode-id="2646" href="#fn:3" rel="footnote"><span data-dcnode-id="2647" instrument_node="">3</span></a></sup></p><span data-dcnode-id="2643" instrument_node="">
</span><img alt="Different kinds of iron corrosion and rust in Flint's drinking water pipes." class="append-top2" data-dcnode-id="2642" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/inside-flint-pipes-min-tang-kelsey-pieper.jpg&amp;raw"><span data-dcnode-id="2641" instrument_node="">
</span><p class="caption" data-dcnode-id="2634"><span data-dcnode-id="2640" instrument_node="">Insightful pictures examining Flint's drinking water pipes, showing different kinds of iron corrosion and rust. </span><br data-dcnode-id="2639"><span class="attribution" data-dcnode-id="2635"><span data-dcnode-id="2638" instrument_node="">Photo by </span><a data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//flintwaterstudy.org/2015/08/the-unintended-consequences-of-migrating-to-flint-river-water/" target="_blank"><span data-dcnode-id="2637" instrument_node="">Min Tang and Kelsey Pieper</span></a></span></p><span data-dcnode-id="2633" instrument_node="">
</span><h3 data-dcnode-id="2631" id="lead-poisoning"><span data-dcnode-id="2632" instrument_node="">How Lead Poisoning Affects the Human Body</span></h3><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2629" instrument_node="">How does lead poison the human body? The World Health Organization (WHO) released a paper titled “Lead poisoning and health,” which listed the key facts:</span><sup data-dcnode-id="2626" id="fnref:4"><a data-dcnode-id="2627" href="#fn:4" rel="footnote"><span data-dcnode-id="2628" instrument_node="">4</span></a></sup></p><span data-dcnode-id="2624" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="2613"><span data-dcnode-id="2623" instrument_node="">
</span><img alt="Hilary Godwin" data-dcnode-id="2622" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/hilary-godwin-with-test-tube.jpg&amp;raw"><span data-dcnode-id="2621" instrument_node="">
</span><p class="caption" data-dcnode-id="2615"><span data-dcnode-id="2620" instrument_node="">Hilary Godwin, a chemist at Northwestern University near Chicago, studies the chemistry of lead poisoning on the human body. </span><span class="attribution" data-dcnode-id="2616"><span data-dcnode-id="2619" instrument_node="">Photo by </span><a data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AHilary_Godwin_with_test_tube_01.png" target="_blank"><span data-dcnode-id="2618" instrument_node="">National Institute of General Medical Sciences</span></a></span></p><span data-dcnode-id="2614" instrument_node="">
</span></div><span data-dcnode-id="2612" instrument_node="">
</span><ul data-dcnode-id="2595"><span data-dcnode-id="2611" instrument_node="">
</span><li data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Lead is a cumulative toxicant that affects multiple body systems and is particularly harmful to young children.</span></li><span data-dcnode-id="2608" instrument_node="">
</span><li data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Lead in the body is distributed to the brain, liver, kidney and bones. It is stored in the teeth and bones, where it accumulates over time. Human exposure is usually assessed through the measurement of lead in blood.</span></li><span data-dcnode-id="2605" instrument_node="">
</span><li data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Lead in bone is released into blood during pregnancy and becomes a source of exposure to the developing fetus.</span></li><span data-dcnode-id="2602" instrument_node="">
</span><li data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">There is no level of exposure to lead that is known to be without harmful effects.</span></li><span data-dcnode-id="2599" instrument_node="">
</span><li data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Lead exposure is preventable.</span></li><span data-dcnode-id="2596" instrument_node="">
</span></ul><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">The symptoms of lead poisoning are varied and alarming as WHO warns. These include behavioral changes because brain development is affected: reduced attention span, increased antisocial incidents and failing educational achievement. Anemia, hyperactivity, toxicity to the reproductive organs, blood-pressure-level impacts and renal impairment are some of the signs of lead exposure. Experts believe neurological and behavioral effects are irreversible.</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Consequently, not only is the former statement a truism—certain kinds of life thrive with certain kinds of water—but we can logically agree with the experts that polluted water is not the optimum nutrient for mankind. Poisoned water creates life-diminishing conditions for most and particularly for the developing brains and neurological systems of the young.</span></p><span data-dcnode-id="2588" instrument_node="">
</span></div><span data-dcnode-id="2585" instrument_node="">
</span></div><span data-dcnode-id="2582" instrument_node="">
</span></div><span data-dcnode-id="2579" instrument_node="">
</span><img alt="Group of women drawing clean water from Jesus Well." class="full-horizontal-image section-image" data-dcnode-id="2578" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/jesus-well-group-women-drawing-water-1.jpg&amp;raw"><span data-dcnode-id="2577" instrument_node="">
</span><div class="container" data-dcnode-id="2460"><span data-dcnode-id="2576" instrument_node="">
</span><div class="row" data-dcnode-id="2517"><span data-dcnode-id="2575" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="2519"><span data-dcnode-id="2574" instrument_node="">
</span><p class="caption" data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">A Jesus Well installed in South Asia has become a blessing for the local residents. Not many clean water wells are available in rural villages and people typically have to fetch water from sources far away or consume muddy water nearby.</span></p><span data-dcnode-id="2571" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="2557"><span data-dcnode-id="2570" instrument_node="">

</span><img alt="Water Drop 3" class="gray-drop" data-dcnode-id="2565" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2564" instrument_node="">

</span><img alt="Water Drop 6" class="gray-drop" data-dcnode-id="2559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2558" instrument_node="">
</span></div><span data-dcnode-id="2556" instrument_node="">
</span><h3 data-dcnode-id="2554" id="unsafe-water-supplies"><span data-dcnode-id="2555" instrument_node="">Reasons for Unsafe Water Supplies in the United States</span></h3><span data-dcnode-id="2553" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="2541"><span data-dcnode-id="2552" instrument_node="">
</span><img alt="Workers laying new water pipes" data-dcnode-id="2551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/pipe-laying.jpg&amp;raw"><span data-dcnode-id="2550" instrument_node="">
</span><p class="caption" data-dcnode-id="2543"><span data-dcnode-id="2549" instrument_node="">Effective lead‐and‐copper sampling plans allow water utilities to make critical corrosion‐control and water quality improvement decisions to protect public health. </span><br data-dcnode-id="2548"><span class="attribution" data-dcnode-id="2544"><span data-dcnode-id="2547" instrument_node="">Photo by </span><a data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.awwa.org/Resources-Tools/Resource-Topics/Inorganic-Contaminants/Lead%239738369-policy--advocacy" target="_blank"><span data-dcnode-id="2546" instrument_node="">American Water Works Association</span></a></span></p><span data-dcnode-id="2542" instrument_node="">
</span></div><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2539" instrument_node="">If there is no acceptable level of lead in drinking water, the question must be posed: </span><em data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Why are so many municipalities, homeowners and schools still finding lead in their systems today?</span></em></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2534" instrument_node="">An article by Rachel Layne in </span><em data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">MoneyWatch</span></em><span data-dcnode-id="2531" instrument_node=""> concludes: “One reason may be aging infrastructure and the cost to replace old water pipes and lead solder used in household plumbing. Drinking water is delivered via 1 million miles of pipes across the U.S., much of them laid in the early- to mid-20th century with a lifespan of 75 to 100 years.”</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">The American Society of Civil Engineers estimates that those pipes are being replaced at an average rate of 0.5 percent a year.</span></p><span data-dcnode-id="2526" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2525" instrument_node="">“At that pace,” Layne notes, “it would take roughly two centuries to renew the whole system at a cost of around $1 trillion, according to one estimate by the American Water Works Association.”</span><sup data-dcnode-id="2522" id="fnref:5"><a data-dcnode-id="2523" href="#fn:5" rel="footnote"><span data-dcnode-id="2524" instrument_node="">5</span></a></sup></p><span data-dcnode-id="2520" instrument_node="">
</span></div><span data-dcnode-id="2518" instrument_node="">
</span></div><span data-dcnode-id="2516" instrument_node="">
</span><div class="row big-quote-row" data-dcnode-id="2503"><span data-dcnode-id="2515" instrument_node="">
</span><div class="col-sm-3" data-dcnode-id="2511"><span data-dcnode-id="2514" instrument_node="">
</span><img alt="As many as 63 million people—nearly one-fifth of the United States—were exposed to potentially unsafe water more than once during the past decade" data-dcnode-id="2513" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/usa-one-fifth.jpg&amp;raw"><span data-dcnode-id="2512" instrument_node="">
</span></div><span data-dcnode-id="2510" instrument_node="">
</span><div class="col-sm-9" data-dcnode-id="2505"><span data-dcnode-id="2509" instrument_node="">
</span><p class="big-quote" data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">In fact, as many as 63 million people—nearly one-fifth of the United States—were exposed to potentially unsafe water more than once during the past decade, according to a News21 investigation of 680,000 water-quality and monitoring violations as reported by the EPA.</span></p><span data-dcnode-id="2506" instrument_node="">
</span></div><span data-dcnode-id="2504" instrument_node="">
</span></div><span data-dcnode-id="2502" instrument_node="">
</span><div class="row" data-dcnode-id="2463"><span data-dcnode-id="2501" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="2466"><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2499" instrument_node="">That finding highlights “how six decades of industrial dumping, farming pollution and water plant and distribution pipe deterioration have taken a toll on local water systems.” According to this report, many local water-treatment plants are not equipped or can’t afford to strain out contaminants. In addition, much of the corroding water-distribution systems are susceptible to lead contamination, leaks in the lines, and consequent bacterial growth due to the instability of this aging infrastructure.</span><sup data-dcnode-id="2496" id="fnref:6"><a data-dcnode-id="2497" href="#fn:6" rel="footnote"><span data-dcnode-id="2498" instrument_node="">6</span></a></sup></p><span data-dcnode-id="2494" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="2480"><span data-dcnode-id="2493" instrument_node="">
</span><img alt="Water Drop 1" class="drop-image faded" data-dcnode-id="2492" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop1-dirty-water.png&amp;raw"><span data-dcnode-id="2491" instrument_node="">
</span><img alt="Water Drop 2" class="drop-image faded" data-dcnode-id="2490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop2-valve.png&amp;raw"><span data-dcnode-id="2489" instrument_node="">
</span><img alt="Water Drop 3" class="drop-image" data-dcnode-id="2488" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop3-people-flag.png&amp;raw"><span data-dcnode-id="2487" instrument_node="">
</span><img alt="Water Drop 4" class="gray-drop" data-dcnode-id="2486" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2485" instrument_node="">
</span><img alt="Water Drop 5" class="gray-drop" data-dcnode-id="2484" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2483" instrument_node="">
</span><img alt="Water Drop 6" class="gray-drop" data-dcnode-id="2482" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2481" instrument_node="">
</span></div><span data-dcnode-id="2479" instrument_node="">
</span><h3 data-dcnode-id="2477" id="concerned-citizen"><span data-dcnode-id="2478" instrument_node="">What Can One Concerned Citizen Do?</span></h3><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">So, what is to be done? At this point, it behooves a water-drinking citizenry to act responsibly.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">My husband and I live in an unincorporated area of a western Chicago suburb, and we have lived here for more than 40 years. Our water is pumped from our own well, which I have assumed to be “safe” water. However, after research conducted for this article, I realized I was relying too much on what might turn out to be unfounded assumptions, so I ordered a complete water-testing kit. When the kit comes, we can test our own water from the tap to determine what minerals exist in this liquid and whether or not there are contaminants. Then we will make plans—perhaps to install filters on certain faucets. If needed, that will require additional Internet research.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">A citizen, concerned about his or her municipality’s water supply, can look up reports online as to the status of local sources. The mayor’s office of our little town of 27,000 has published a comprehensive “state of the water” report, which was mailed to all the addresses in our community; that report is also published on the Internet and identifies any possible trouble spots or any deep water reservoirs that may be problematic. If there are problems with our local water supply, then I have at least informed myself as to their existence. Our mayor also invites citizens who have questions, concerns or suggestions to meet with him once a month; questions about the safety of water supplies can be brought up in such a forum.</span></p><span data-dcnode-id="2467" instrument_node="">
</span></div><span data-dcnode-id="2464" instrument_node="">
</span></div><span data-dcnode-id="2461" instrument_node="">
</span></div><span data-dcnode-id="2458" instrument_node="">
</span><div class="graphic-background" data-dcnode-id="2416"><span data-dcnode-id="2457" instrument_node="">
</span><div class="container" data-dcnode-id="2419"><span data-dcnode-id="2456" instrument_node="">
</span><div class="row" data-dcnode-id="2422"><span data-dcnode-id="2455" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="2425"><span data-dcnode-id="2454" instrument_node="">
</span><h4 data-dcnode-id="2452" style="text-align:center"><span data-dcnode-id="2453" instrument_node="">The point of this is:</span></h4><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2449" style="text-align:center"><span data-dcnode-id="2450" instrument_node="">Do not remain ignorant about your community’s water supplies, which most of us drink so casually without considering the quality of its content. (Remember my orchids.)</span></p><span data-dcnode-id="2448" instrument_node="">
</span><p data-dcnode-id="2445" style="text-align:center"><em data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">The following instances should give us all a heads-up warning:</span></em></p><span data-dcnode-id="2444" instrument_node="">
</span><ul data-dcnode-id="2430"><span data-dcnode-id="2443" instrument_node="">
</span><li data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">In Waukesha, Wisconsin, 18 miles west of Milwaukee, decades of radium contamination from the city’s underground aquifer prompted officials to draft a proposal to draw water from Lake Michigan for its 71,000 residents. The Great Water Alliance, a $200-million project, is expected to be completed by 2023.</span></li><span data-dcnode-id="2440" instrument_node="">
</span><li data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Thousands of rural towns have the most problems because communities often lack the expertise and resources to provide safe drinking water.</span></li><span data-dcnode-id="2437" instrument_node="">
</span><li data-dcnode-id="2432"><span data-dcnode-id="2436" instrument_node="">In several Southwestern states, 2 million people received groundwater tainted with arsenic, radium or fluoride from their local water systems, with many exposed to these chemicals for years before hundreds of small, low-income communities could afford to filter them out. Some still haven’t cleaned up their water.</span><sup data-dcnode-id="2433" id="fnref:7"><a data-dcnode-id="2434" href="#fn:7" rel="footnote"><span data-dcnode-id="2435" instrument_node="">7</span></a></sup></li><span data-dcnode-id="2431" instrument_node="">
</span></ul><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Ever wondered what’s causing those puzzling health problems—headaches, stomach troubles, your kids’ irascibility and/or inability to pay attention in class? Maybe there’s something in the water. Check it out.</span></p><span data-dcnode-id="2426" instrument_node="">
</span></div><span data-dcnode-id="2423" instrument_node="">
</span></div><span data-dcnode-id="2420" instrument_node="">
</span></div><span data-dcnode-id="2417" instrument_node="">
</span></div><span data-dcnode-id="2415" instrument_node="">
</span><div class="container" data-dcnode-id="2240"><span data-dcnode-id="2414" instrument_node="">
</span><div class="row" data-dcnode-id="2243"><span data-dcnode-id="2413" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2 append-top" data-dcnode-id="2246"><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Healthy water—clear, clean and pure—is one of the great gifts of the Creator to the inhabitants of earth. However, as part of our God-given mandate as caretakers of this remarkable planet, we need to be responsible to guard our water sources, its supply and delivery systems, and to not take for granted what pumps from our wells or flows from our kitchen taps. We have all too often—I certainly am a guilty party—been sloppy stewards of our creation.</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2408" instrument_node="">Despite the safe water, we assume, we are drinking, we need to be responsible and check out municipal reports or order water-testing kits to make sure. The Environmental Protection Agency has a paper online titled “Ground Water Rule: A Quick Reference Guide” (it’s a dense and comprehensive two pages of analytics, but helpful).</span><sup data-dcnode-id="2405" id="fnref:8"><a data-dcnode-id="2406" href="#fn:8" rel="footnote"><span data-dcnode-id="2407" instrument_node="">8</span></a></sup><span data-dcnode-id="2404" instrument_node=""> If you feel better after changing the water you’ve been drinking, then drink more of the new supply. Health gurus insist that hydrating our bodies is a key principle to achieving better health and more productive daily function.</span></p><span data-dcnode-id="2402" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="2388"><span data-dcnode-id="2401" instrument_node="">
</span><img alt="Water Drop 1" class="drop-image faded" data-dcnode-id="2400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop1-dirty-water.png&amp;raw"><span data-dcnode-id="2399" instrument_node="">
</span><img alt="Water Drop 2" class="drop-image faded" data-dcnode-id="2398" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop2-valve.png&amp;raw"><span data-dcnode-id="2397" instrument_node="">
</span><img alt="Water Drop 3" class="drop-image faded" data-dcnode-id="2396" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop3-people-flag.png&amp;raw"><span data-dcnode-id="2395" instrument_node="">
</span><img alt="Water Drop 4" class="drop-image" data-dcnode-id="2394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop3-ground.png&amp;raw"><span data-dcnode-id="2393" instrument_node="">
</span><img alt="Water Drop 5" class="gray-drop" data-dcnode-id="2392" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2391" instrument_node="">
</span><img alt="Water Drop 6" class="gray-drop" data-dcnode-id="2390" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2389" instrument_node="">
</span></div><span data-dcnode-id="2387" instrument_node="">
</span><h3 data-dcnode-id="2381" id="america-access-clean-water"><span data-dcnode-id="2386" instrument_node="">While the U.S. Struggles with Contaminated Tap Water, </span><br data-dcnode-id="2385"><span data-dcnode-id="2384" instrument_node="">Millions in Asia Remain Without Access to Any Clean, </span><br data-dcnode-id="2383"><span data-dcnode-id="2382" instrument_node="">Safe Drinking Water</span></h3><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">In Asia, when water is scarce and miles must be traversed in order to attain it, then carry or haul it, pure and clean community wells become nearly miraculous when they are engineered and maintained.</span></p><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">One organization helping with this situation is Gospel for Asia, which has installed more than 30,000 clean water borehole wells in villages across South Asia, including 4,856 in 2019 alone. Gospel for Asia estimates that its clean water projects, consisting of wells in communities and BioSand water filters for families, are providing clean water to more than 37.5 million people to date. Yet the need is so great, much more has to be done.</span></p><span data-dcnode-id="2374" instrument_node="">
</span><img alt="Mother carrying water home with her children." data-dcnode-id="2373" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/mother-children-carrying-water.jpg&amp;raw"><span data-dcnode-id="2372" instrument_node="">
</span><p class="caption" data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">This mother in South Asia needed almost ten pots of water each day for domestic purposes, so she walked a two-mile round trip several times a day to fetch water from the only well close to this village. After school, her sons helped her fetch water too. This well was the only source of water for the entire village of more than 200 people, until a Jesus Well was built within their town.</span></p><span data-dcnode-id="2369" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="2355"><span data-dcnode-id="2368" instrument_node="">
</span><img alt="Water Drop 1" class="drop-image faded" data-dcnode-id="2367" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop1-dirty-water.png&amp;raw"><span data-dcnode-id="2366" instrument_node="">
</span><img alt="Water Drop 2" class="drop-image faded" data-dcnode-id="2365" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop2-valve.png&amp;raw"><span data-dcnode-id="2364" instrument_node="">
</span><img alt="Water Drop 3" class="drop-image faded" data-dcnode-id="2363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop3-people-flag.png&amp;raw"><span data-dcnode-id="2362" instrument_node="">
</span><img alt="Water Drop 4" class="drop-image faded" data-dcnode-id="2361" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop3-ground.png&amp;raw"><span data-dcnode-id="2360" instrument_node="">
</span><img alt="Water Drop 5" class="drop-image" data-dcnode-id="2359" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop4-ocean.png&amp;raw"><span data-dcnode-id="2358" instrument_node="">
</span><img alt="Water Drop 6" class="gray-drop" data-dcnode-id="2357" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="2356" instrument_node="">
</span></div><span data-dcnode-id="2354" instrument_node="">
</span><h3 data-dcnode-id="2352" id="jesus-well-impact"><span data-dcnode-id="2353" instrument_node="">The Impact of a “Jesus Well” on One Community</span></h3><span data-dcnode-id="2351" instrument_node="">
</span><div class="offset-image right medium" data-dcnode-id="2344"><span data-dcnode-id="2350" instrument_node="">
</span><img alt="Women drawing clean water from Jesus Well" class="circle" data-dcnode-id="2349" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/jesus-well-women-drawing-water-1.jpg&amp;raw"><span data-dcnode-id="2348" instrument_node="">
</span><p class="caption" data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">This Jesus Well is in constant use, serving up to 300 people a day!</span></p><span data-dcnode-id="2345" instrument_node="">
</span></div><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2342" instrument_node="">I love the story from the Gospel for Asia archives about the life-changing impact of the “Jesus Wells” they help provide.</span><sup data-dcnode-id="2339" id="fnref:9"><a data-dcnode-id="2340" href="#fn:9" rel="footnote"><span data-dcnode-id="2341" instrument_node="">9</span></a></sup><span data-dcnode-id="2338" instrument_node=""> Jesus Wells are most often sponsored by donors and installed in communities where access to clean water is difficult or non-existent.</span></p><span data-dcnode-id="2336" instrument_node="">
</span><div class="excerpt-blue" data-dcnode-id="2328"><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">A group of villagers huddled around a large hole, peering into the darkness. Feathers. Again. They let out a groan—not in grief over the dead chicken, although it was a loss for someone’s flock, but because it meant their well was contaminated. They gathered buckets and emptied the well late into the night. All that precious water wasted because of one little hen.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">This well and a small pond had the job of providing water for this village, but they frequently failed their task. In summertime, the well and pond dried up and had to be dug deeper. When the heavy rains came, water filled the pond again, but it was accompanied by leaves, garbage and cow manure. The families in this community needed water, but using dirty water exposed them to bouts of typhoid, diarrhea and other dangerous waterborne illnesses. Something had to change—but none of them could fix their deadly problem.</span></p><span data-dcnode-id="2329" instrument_node="">
</span></div><span data-dcnode-id="2327" instrument_node="">
</span><blockquote data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">In Asia, when water is scarce, and miles must be traversed in order to attain it, then carry or haul it, pure and clean community wells become nearly miraculous when they are engineered and maintained.</span></blockquote><span data-dcnode-id="2324" instrument_node="">
</span><div class="excerpt-blue" data-dcnode-id="2302"><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">The community’s water crisis began changing when Aarnav, one of the young men in the village, met a GFA-supported pastor, Saadhik, serving in a nearby area. Aarnav built a strong relationship with Pastor Saadhik and joined his congregation regularly to worship the Lord. Pastor Saadhik visited Aarnav’s family frequently to encourage them in the Lord. During one of those visits, the pastor learned of the village’s extreme need for water.</span></p><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">Although countless other communities in Aarnav’s nation face water shortages every year, Pastor Saadhik felt a special burden for Aarnav’s village. His compassion grew into a commitment to pray for the community’s need—for several years.</span></p><span data-dcnode-id="2317" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="2310"><span data-dcnode-id="2316" instrument_node="">
</span><img alt="Little girls taking a bath using clean water from Jesus Wells." data-dcnode-id="2315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/jesus-well-little-girls-bath-1.jpg&amp;raw"><span data-dcnode-id="2314" instrument_node="">
</span><p class="caption" data-dcnode-id="2312" style="color: #777777 !important"><span data-dcnode-id="2313" instrument_node="">Seeing the need for safe, clean water, GFA installed three Jesus Wells to supply this village in Asia with pure water for drinking, cleaning and washing their hands.</span></p><span data-dcnode-id="2311" instrument_node="">
</span></div><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">After four years of faithful intercession, Pastor Saadhik’s prayers were answered. Thanks to the generosity of people around the world, GFA-supported workers arranged for Aarnav’s village to receive a Jesus Well at no cost to the community. Sitting atop enclosed pipes that dive deep into the low water table, the bore well now gushes clean water all year long.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">Aarnav’s community finally has the change they needed! Overjoyed, around 100 people fetch their water from the Jesus Well instead of the compromised pond or open well. It doesn’t matter how many chickens or cows gather around the Jesus Well; nothing can contaminate their water anymore.</span></p><span data-dcnode-id="2303" instrument_node="">
</span></div><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Let’s support organizations like Gospel for Asia that are bringing thousands of bore wells that supply life-giving water to people—water that is available in little villages and crowded slum communities and not miles down some dusty or muddy road. What a gift clean water is, and what a gift to make it available to thirsty people worldwide.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><div class="wide-donate-box" data-dcnode-id="2251"><span data-dcnode-id="2297" instrument_node="">

</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Provide life-saving water through Jesus Wells and BioSand water filters, and help support ongoing maintenance of these clean water projects.</span></p><span data-dcnode-id="2289" instrument_node="">

</span><img alt="Woman drawing clean water from Jesus Well." class="full-horizontal-image section-image" data-dcnode-id="2237" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/jesus-well-woman-drawing-water.jpg&amp;raw"><span data-dcnode-id="2236" instrument_node="">
</span><div class="container" data-dcnode-id="2079"><span data-dcnode-id="2235" instrument_node="">
</span><div class="row" data-dcnode-id="2157"><span data-dcnode-id="2234" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="2160"><span data-dcnode-id="2233" instrument_node="">
</span><p class="caption" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Until a Jesus Well was installed in her village, this woman in South Asia often struggled to find safe, pure drinking water. Previously, she had to walk two kilometers round trip to the river near her village, to get unsafe, dirty water.</span></p><span data-dcnode-id="2230" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="2216"><span data-dcnode-id="2229" instrument_node="">
</span><img alt="Water Drop 1" class="drop-image faded" data-dcnode-id="2228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop1-dirty-water.png&amp;raw"><span data-dcnode-id="2227" instrument_node="">
</span><img alt="Water Drop 2" class="drop-image faded" data-dcnode-id="2226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop2-valve.png&amp;raw"><span data-dcnode-id="2225" instrument_node="">
</span><img alt="Water Drop 3" class="drop-image faded" data-dcnode-id="2224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/waterdrop3-people-flag.png&amp;raw"><span data-dcnode-id="2223" instrument_node="">
</span><img alt="Water Drop 4" class="drop-image faded" data-dcnode-id="2222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop3-ground.png&amp;raw"><span data-dcnode-id="2221" instrument_node="">

</span><img alt="Water Drop 6" class="drop-image" data-dcnode-id="2218" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop5-bubbles.png&amp;raw"><span data-dcnode-id="2217" instrument_node="">
</span></div><span data-dcnode-id="2215" instrument_node="">
</span><h3 data-dcnode-id="2213" id="jesus-fountains-of-water"><span data-dcnode-id="2214" instrument_node="">Jesus Compares Himself to Fountains of Water</span></h3><span data-dcnode-id="2212" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Perhaps, even more remarkable, Christ used water (let us assume it was pure, clean and healthy water) as a metaphor for His own life-giving capability.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">“Jesus answered and said to her: ‘Whoever drinks of this water will thirst again, but whoever drinks of the water that I shall give him will never thirst. But the water that I shall give him will become in him a fountain of water springing up into everlasting life’” (John 4:13–14).</span></p><span data-dcnode-id="2206" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="2199" style="width:350px;"><span data-dcnode-id="2205" instrument_node="">
</span><img alt="Little girl drinking clean water from Jesus Well" data-dcnode-id="2204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/jesus-well-little-girl.jpg&amp;raw"><span data-dcnode-id="2203" instrument_node="">
</span><p class="caption" data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Even young children were happy to have a Jesus Well installed to get clean, safe water in their own village. Now they don’t have to walk to the distant well several times a day carrying heavy water pots.</span></p><span data-dcnode-id="2200" instrument_node="">
</span></div><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Several summers back, my family attended the Iowa State Fair with my brother and his wife (who live in Des Moines). I’ve rarely bought tickets to popular music concerts—David and I are more the Chicago Symphony Orchestra types—but this summer, we did sit in the grandstands to hear a live concert featuring Carrie Underwood. Carrie, an avowed Christian, basically gave a gospel-music concert, with most of the people in the audience singing along to the lyrics they obviously knew by heart.</span></p><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">One of her songs that has stuck with me since that summer was “Something in the Water,” with water baptism being the theme:</span></p><span data-dcnode-id="2192" instrument_node="">
</span><div class="excerpt" data-dcnode-id="2171"><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2190" instrument_node="">No way out, no one to come and save me</span><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node="">
        Wasting a life that the Good Lord gave me</span><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node="">
        Then somebody said what I’m saying to you […]</span><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node="">
        They said, “Just a little faith, it’ll all get better”</span><br data-dcnode-id="2183"><span data-dcnode-id="2182" instrument_node="">
        So I followed that preacher man down to the river</span><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">
        And now I’m changed</span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">
        And now I’m stronger</span><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">
        There must’ve been something in the water</span><br data-dcnode-id="2175"><span data-dcnode-id="2174" instrument_node="">
        Oh, there must’ve been something in the water</span></p><span data-dcnode-id="2172" instrument_node="">
</span></div><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Yep, even the orchids know what kind of water they need and flourish when it is supplied. Humans are the same.</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">How wonderful that local churches all across Asia use clean water to meet physical need and employ the powerful life-giving metaphor for the One who supplies those He loves with everything they need spiritually. “Whoever drinks of the water that I shall give will never thirst . . .” Believe me, there are no toxins or poisons, no arsenic or radium in this spiritual gift.&nbsp;</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162" style="color: #0A7491;"><span data-dcnode-id="2163" instrument_node="">There is no lead in this Living Water. This, indeed, is the water we all need to thrive.</span></p><span data-dcnode-id="2161" instrument_node="">
</span></div><span data-dcnode-id="2158" instrument_node="">

</span><h1 data-dcnode-id="2068"><span data-dcnode-id="2071" instrument_node="">The Global Clean Water Crisis</span><span class="subhead subhead-1" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Finding Solutions to Humanity's Need for Pure, Safe Water</span></span></h1><span data-dcnode-id="2067" instrument_node="">
</span></div><span data-dcnode-id="2065" instrument_node="">
