</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="2012"><span data-dcnode-id="2054" instrument_node="">
</span><img alt="Karen Burton Mains, author" class="circle small-author-image" data-dcnode-id="2053" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/karenmains-100.jpg&amp;raw"><span data-dcnode-id="2052" instrument_node="">
</span><p class="article-meta first-line" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Written By Karen Burton Mains</span></p><span data-dcnode-id="2049" instrument_node="">
</span><p class="article-meta second-line" data-dcnode-id="2044"><span data-dcnode-id="2048" instrument_node="">35 minute read </span><span class="bullet" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">•</span></span><span data-dcnode-id="2045" instrument_node=""> March 20, 2018</span></p><span data-dcnode-id="2043" instrument_node="">
</span><div class="offset-image right hidden-xs" data-dcnode-id="2034" style="width:350px;"><span data-dcnode-id="2042" instrument_node="">
</span><img alt="The Blue Marble photo of earth from Apollo 17" class="lazy" data-dcnode-id="2041" data-src="https://cc.gfamedia.org/special-report/water/blue-marble.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/blue-marble.jpg&amp;raw" style="border-radius:5px;"><span data-dcnode-id="2040" instrument_node="">
</span><p class="caption" data-dcnode-id="2036"><span data-dcnode-id="2039" instrument_node="">The "Blue Marble" photo of Earth, taken on the Apollo 17 mission in 1972. </span><span class="attribution" data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">(Public domain)</span></span></p><span data-dcnode-id="2035" instrument_node="">
</span></div><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">The “Blue Marble” photo of Earth shot from Apollo 17, the last of NASA’s Apollo missions as the rocket ship was hurtling toward the moon, wasn’t the first satellite image of our planet, but it was the first full image—stunning in color—taken from some 18,000 miles in space, with the sun fully illuminating Earth. The south polar ice cap, despite heavy cloud cover, was clearly captured, and the photo showed almost the entire coastline of Africa, extending from Antarctica to the Mediterranean Sea. Most of us who saw it at that time were stunned with how much water covered our planet.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><img alt="The Blue Marble photo of earth from Apollo 17" class="visible-xs append-bottom" data-dcnode-id="2029" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/blue-marble.jpg&amp;raw" style="border-radius:5px;"><span data-dcnode-id="2028" instrument_node="">
</span><p class="caption visible-xs" data-dcnode-id="2024"><span data-dcnode-id="2027" instrument_node="">The "Blue Marble" photo of Earth, taken on the Apollo 17 mission in 1972. </span><span class="attribution" data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">(Public domain)</span></span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2022" instrument_node="">This one single dramatic image eventually gave the name “Blue Planet” to our Earth</span><sup data-dcnode-id="2019" id="fnref:10"><a data-dcnode-id="2020" href="#fn:10" rel="footnote"><span data-dcnode-id="2021" instrument_node="">10</span></a></sup><span data-dcnode-id="2018" instrument_node="">, due obviously to the abundant water sources we could see on its surface. The photo was taken on December 17, 1972 and for all of us at that time, caught up in the exploits of the space discovery, it forever altered the comprehension of our planet. Now, when I think of Earth, and when hundreds of millions of others think of Earth, this is the iconic image that comes to mind.</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">This is an article about clean water, about water from a tap or from a glass, hopefully free of pathogens that bring disease. This is an article about clay pots and large plantain leaves and cupped dried gourds that hold rainfall hopefully untainted by acid effluviums. This is an article about pole wells drilled beneath polluted soil, and the unintended arsenic poisoning of villagers. This is an article about drying water reservoirs, about waste and sewage and chemicals polluting streams and rivers and major waterways. It is about encroaching urban development laying acres of implacable concrete and miles of roadways over land where rains can now no longer replenish water tables. It is an article about taking responsibility for that Blue Planet spinning alone, and as far as science now knows, unparalleled in our universe. No liquid water has been confirmed as existing on any other planet in our solar system. As yet, not a single drop of water has been detected anywhere in interstellar space. Scientists have determined that only a planet of the right mass, the right chemical composition and the right location can support liquid water; in other words, a planet like ours, the Blue Planet, this Earth.</span></p><span data-dcnode-id="2013" instrument_node="">
</span></div><span data-dcnode-id="2010" instrument_node="">
</span></div><span data-dcnode-id="2007" instrument_node="">
</span></div><span data-dcnode-id="2004" instrument_node="">
</span><img alt="People collect water from wells and rivers" class="full-horizontal-image section-image" data-dcnode-id="2003" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/collage2.jpg&amp;raw"><span data-dcnode-id="2002" instrument_node="">
</span><div class="container" data-dcnode-id="1934"><span data-dcnode-id="2001" instrument_node="">
</span><div class="row" data-dcnode-id="1937"><span data-dcnode-id="2000" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="1940"><span data-dcnode-id="1999" instrument_node="">
</span><p class="caption" data-dcnode-id="1990"><span data-dcnode-id="1998" instrument_node="">663 million people around the world do not have access to safe drinking water as of 2015</span><sup data-dcnode-id="1995" id="fnref:C1"><a data-dcnode-id="1996" href="#fn:C1" rel="footnote"><span data-dcnode-id="1997" instrument_node="">C1</span></a></sup><span data-dcnode-id="1994" instrument_node="">. This is the first time the number has fallen below 700 million.</span><br data-dcnode-id="1993"><span class="attribution" data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Right image by giulio napolitano/Shutterstock.com</span></span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1988" instrument_node="">That information alone should evoke awe when we look again at the ubiquitous reproductions of the Apollo 17 photo (identified by NASA as AS17-148-22727.) This image is perhaps best described in the spare language of Genesis 1. </span><em data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">“In the beginning God created the heavens and the earth. The earth was without form and void, and darkness was upon the face of the deep; and the Spirit of God was moving over the waters ... And God said, 'Let there be a firmament in the midst of the waters, and let it separate the waters from the waters.' And God made the firmament and separated the waters which were under the firmament from the waters which were above the firmament. And it was so.”</span></em><span data-dcnode-id="1985" instrument_node=""> The Creation account then proceeds with the regular, rhythmical and dynamic pronouncement of the Creator, </span><em data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">“And it is good. And it is very good.”</span></em></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1980" instrument_node="">Just imagine: God looking at the actuality of what that splendid photo AS17-148-22727 replicates. Who can refuse to admit to experiencing a similar and deep soul sigh, </span><em data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">it is good. It is very good . . .</span></em><span data-dcnode-id="1977" instrument_node="">? According to United States Geological Survey (USGS), “The Earth is a watery place. But just how much water exists on, in, and above our planet? About 71 percent of the Earth’s surface is water-covered, and the oceans hold about 96.5 percent of all Earth’s water. Water also exists in the air as water vapor, in rivers and lakes, in icecaps and glaciers, in the ground as soil moisture and in aquifers, and even in you and your dog.”</span><sup data-dcnode-id="1974" id="fnref:11"><a data-dcnode-id="1975" href="#fn:11" rel="footnote"><span data-dcnode-id="1976" instrument_node="">11</span></a></sup><span data-dcnode-id="1973" instrument_node="">  I’m not sure about water content in the animal species, but data informs me that adult males are about 60 percent water and adult females are about 55 percent water. </span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Samuel Taylor Coleridge’s poem “The Rime of the Ancient Mariner” captures the analysis of contemporary oceanographers, “Water, water everywhere.” And unfortunately, due to the stresses of climate change, rising seas, urban sprawl, lack of urban planning, spoiled springs and creeks and raging rivers overwhelming their banks and flooding, the rest of that poetic lament is becoming all too real, “And not a drop to drink.”</span></p><span data-dcnode-id="1968" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="1956"><span data-dcnode-id="1967" instrument_node="">
</span><img alt="Water Drop 1" class="drop-image" data-dcnode-id="1966" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop1-city.png&amp;raw"><span data-dcnode-id="1965" instrument_node="">
</span><img alt="Water Drop 2" class="gray-drop" data-dcnode-id="1964" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="1963" instrument_node="">
</span><img alt="Water Drop 3" class="gray-drop" data-dcnode-id="1962" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="1961" instrument_node="">
</span><img alt="Water Drop 4" class="gray-drop" data-dcnode-id="1960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="1959" instrument_node="">
</span><img alt="Water Drop 5" class="gray-drop" data-dcnode-id="1958" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="1957" instrument_node="">
</span></div><span data-dcnode-id="1955" instrument_node="">
</span><h2 data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">A Quarter of Earth’s Major Cities Face a Water Crisis</span></h2><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1951" instrument_node="">At the time of this writing, the world is watching the water distress in Cape Town, South Africa</span><sup data-dcnode-id="1948" id="fnref:12"><a data-dcnode-id="1949" href="#fn:12" rel="footnote"><span data-dcnode-id="1950" instrument_node="">12</span></a></sup><span data-dcnode-id="1947" instrument_node="">, where the taps are scheduled to run dry due to extended drought that has emptied the water reservoirs. In fact, experts tell us that this coastal paradise city is not alone in its water depletion extremity. Literally millions of people around the world live without sufficient access to water; over 1 billion people lack water supplies, and another 2.7 billion find it scarce for at least one month of the year. A 2014 survey of the world’s 500 largest cities estimates that one in four are in “water stress.” In fact, right now, there are 11 major cities on the Blue Planet that are most likely to run out of drinking water</span><sup data-dcnode-id="1944" id="fnref:13"><a data-dcnode-id="1945" href="#fn:13" rel="footnote"><span data-dcnode-id="1946" instrument_node="">13</span></a></sup><span data-dcnode-id="1943" instrument_node="">—exactly like Cape Town. Those cities are: </span></p><span data-dcnode-id="1941" instrument_node="">
</span></div><span data-dcnode-id="1938" instrument_node="">
</span></div><span data-dcnode-id="1935" instrument_node="">
</span></div><span data-dcnode-id="1932" instrument_node="">
</span><div class="city-background" data-dcnode-id="1860"><span data-dcnode-id="1931" instrument_node="">
</span><div class="container" data-dcnode-id="1863"><span data-dcnode-id="1930" instrument_node="">
</span><div class="row" data-dcnode-id="1866"><span data-dcnode-id="1929" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="1869"><span data-dcnode-id="1928" instrument_node="">
</span><ol data-dcnode-id="1871"><span data-dcnode-id="1927" instrument_node="">
</span><li data-dcnode-id="1923"><strong data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">São Paulo</span></strong><span data-dcnode-id="1924" instrument_node="">, Brazil’s financial capital.</span></li><span data-dcnode-id="1922" instrument_node="">
</span><li data-dcnode-id="1918"><strong data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Bangalore</span></strong><span data-dcnode-id="1919" instrument_node="">, India, where rapid growth as a technological hub outstrips advancements to the city’s plumbing, resulting in half its drinking water lost to waste.</span></li><span data-dcnode-id="1917" instrument_node="">
</span><li data-dcnode-id="1913"><strong data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Beijing</span></strong><span data-dcnode-id="1914" instrument_node="">, China; the country is home to some 20 percent of the world’s population but whose continent has only 7 percent of the world’s fresh water.</span></li><span data-dcnode-id="1912" instrument_node="">
</span><li data-dcnode-id="1908"><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Cairo</span></strong><span data-dcnode-id="1909" instrument_node="">, Egypt, where the major water source, the River Nile, is the increasing destination of untreated agricultural pollutants and residential waste.</span></li><span data-dcnode-id="1907" instrument_node="">
</span><li data-dcnode-id="1903"><strong data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Jakarta</span></strong><span data-dcnode-id="1904" instrument_node="">, Indonesia, where rising sea levels with saline water have resulted in 40 percent of Jakarta to be below sea level. </span></li><span data-dcnode-id="1902" instrument_node="">
</span><li data-dcnode-id="1898"><strong data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Moscow</span></strong><span data-dcnode-id="1899" instrument_node="">, Russia, where 70 percent of the water supply is dependent upon surface water, but pollution, a leftover from the USSR industrial legacy, has contributed to the fact that 35 percent to 60 percent of total drinking water reserves do not meet sanitary standards.</span></li><span data-dcnode-id="1897" instrument_node="">
</span><li data-dcnode-id="1893"><strong data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Istanbul</span></strong><span data-dcnode-id="1894" instrument_node="">, Turkey, which is now technically in water stress. Experts have warned that, if not checked, the situation could worsen to water scarcity by 2030. The city’s reservoir levels declined to less than 30 percent of capacity in 2014.</span></li><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1888"><strong data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Mexico City</span></strong><span data-dcnode-id="1889" instrument_node="">, Mexico, where 1 in 5 residents have tap water only a few hours a week, and another 20 percent have running water just part of the day. </span></li><span data-dcnode-id="1887" instrument_node="">
</span><li data-dcnode-id="1883"><strong data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">London</span></strong><span data-dcnode-id="1884" instrument_node="">, England, where the city draws 80 percent of its water from the Thames and the Lea rivers, has a waste rate of 25 percent, and consequently is predicted to have serious shortages by 2040.</span></li><span data-dcnode-id="1882" instrument_node="">
</span><li data-dcnode-id="1878"><strong data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Tokyo</span></strong><span data-dcnode-id="1879" instrument_node="">, Japan, which is now initiating plans to collect rainwater due to its high precipitation—some 750 private and public buildings in the city have water collection and utilization systems.</span></li><span data-dcnode-id="1877" instrument_node="">
</span><li data-dcnode-id="1873"><strong data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Miami</span></strong><span data-dcnode-id="1874" instrument_node="">, Florida, is suffering from an earlier project to drain its swamps, causing the unforeseen problem of the Atlantic Ocean rising as water warms and now contaminating the Biscayne Aquifer—the city’s main source of fresh water—and causing closure of nearby outlying wells due to saline infusion. </span></li><span data-dcnode-id="1872" instrument_node="">
</span></ol><span data-dcnode-id="1870" instrument_node="">
</span></div><span data-dcnode-id="1867" instrument_node="">
</span></div><span data-dcnode-id="1864" instrument_node="">
</span></div><span data-dcnode-id="1861" instrument_node="">
</span></div><span data-dcnode-id="1859" instrument_node="">
</span><div class="container" data-dcnode-id="1729"><span data-dcnode-id="1858" instrument_node="">
</span><div class="row" data-dcnode-id="1732"><span data-dcnode-id="1857" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="1735"><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Studying this list makes one point crystal clear: Even if I (or you) may not be personally affected by water emergencies in the areas where we individually live, modern urbanized cities across the entire Blue Planet are now under water duress. They serve as the early warning systems that demand global attention! Attention! Attention! In addition, problems that were ignored 20 years ago are in need of urgent correction now, as are other situations that now need corrections in order to prevent water disasters in the near future. </span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1852" instrument_node="">The World Health Organization has made clean water a priority. According to the WHO Drinking Water Fact Sheet</span><sup data-dcnode-id="1849" id="fnref:14"><a data-dcnode-id="1850" href="#fn:14" rel="footnote"><span data-dcnode-id="1851" instrument_node="">14</span></a></sup><span data-dcnode-id="1848" instrument_node="">, “In 2010, The UN General Assembly explicitly recognized the human right to water and sanitation. Everyone has the right to sufficient, continuous, safe, acceptable, physically accessible, and affordable water for personal and domestic use.”</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1845" instrument_node="">The American Society of Civil Engineers (ASCE) releases a yearly grade for infrastructure for the United States as well as a grade for each state. They gave the United States a grade of D+ for the year 2017. According to their report</span><sup data-dcnode-id="1842" id="fnref:15"><a data-dcnode-id="1843" href="#fn:15" rel="footnote"><span data-dcnode-id="1844" instrument_node="">15</span></a></sup><span data-dcnode-id="1841" instrument_node="">, this assessment for roads, bridges, airports, water systems, etc. is determined by measures like capacity, funding, operation and maintenance, and public safety. </span><a class="read-more-link" data-dcnode-id="1838" data-toggle="collapse" href="#asce-details"><span data-dcnode-id="1840" instrument_node="">Read More </span><i class="fa fa-caret-down" data-dcnode-id="1839"></i></a></p><span data-dcnode-id="1836" instrument_node="">
</span><div class="collapse slide-out" data-dcnode-id="1807" id="asce-details"><span data-dcnode-id="1835" instrument_node="">
</span><ul data-dcnode-id="1809"><span data-dcnode-id="1834" instrument_node="">
</span><li data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Capacity: Does the infrastructure’s capacity meet current and future demands?</span></li><span data-dcnode-id="1831" instrument_node="">
</span><li data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Condition: What is the infrastructure’s existing and near-future physical condition?</span></li><span data-dcnode-id="1828" instrument_node="">
</span><li data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Funding: What is the current level of funding from all levels of government for the infrastructure category as compared to the estimated funding need?</span></li><span data-dcnode-id="1825" instrument_node="">
</span><li data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Future Need: What is the cost to improve the infrastructure? Will future funding prospects address the need?</span></li><span data-dcnode-id="1822" instrument_node="">
</span><li data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Operation and Maintenance: What is the owners’ ability to operate and maintain the infrastructure properly? Is the infrastructure in compliance with government regulations?</span></li><span data-dcnode-id="1819" instrument_node="">
</span><li data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Public Safety: To what extent is the public’s safety jeopardized by the condition of the infrastructure, and what could be the consequences of failure?</span></li><span data-dcnode-id="1816" instrument_node="">
</span><li data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Resilience: What is the infrastructure system’s capability to prevent or protect against significant multi-hazard threats and incidents? How able is it to quickly recover and  reconstitute critical services with minimum consequences for public safety, health, the economy, and national security?</span></li><span data-dcnode-id="1813" instrument_node="">
</span><li data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Innovation: What new and innovative techniques, materials, technologies, and delivery methods are being implemented to improve the infrastructure?</span></li><span data-dcnode-id="1810" instrument_node="">
</span></ul><span data-dcnode-id="1808" instrument_node="">
</span></div><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">These are the analytics that need to be explained in any discussions of America’s infrastructure hazards, and they are the modes for diagnosing our failing and crumbling public systems, upon which we are all dependent. Consequently, because of its looming water emergency, the thriving city of Cape Town has become the poster city for what, if the necessary correctives are not applied, will be water-scarcity crises duplicated in other large cities worldwide. Even now, that crisis is a reality for millions living in a world where the alarming estimate is that by 2025 half the world’s populations will be living in water-stressed areas.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><blockquote data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">
        “We are now limited to using 13 gallons of water per person per day. That’s enough for a 90-second shower, a half-gallon of drinking water, a sink full to hand-wash dishes or laundry, one cooked meal, two hand washings, two teeth brushings and one toilet flush.”
      </span></blockquote><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1796"><em data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">TIME Magazine’s</span></em><span data-dcnode-id="1797" instrument_node=""> reportage as to the causes of Cape Town’s severe water depletion point to several realities, which are also relevant to other urban centers. Climatologists at the University of Cape Town recognize that man-made climate change is a contributing factor in continuing drought patterns and warn that a drier future with increasingly unpredictable rain supplies is likely. It is generally agreed that the current water problems is a result of what writers Mikhael Subotzky and Johnny Miller report is “a combination of poor planning, three years of drought and spectacularly bad crisis management. The city’s outdated infrastructure has long struggled to keep up with the burgeoning population. As dam levels began to decline amid the first two years of drought, the default response by city leadership was a series of vague exhortations to be ‘water aware.’” </span></p><span data-dcnode-id="1795" instrument_node="">
</span><img alt="An aerial view of Cape Town, South Africa, where acute an acute water shortage has required water crisis solutions." data-dcnode-id="1794" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/cape-town.jpg&amp;raw"><span data-dcnode-id="1793" instrument_node="">
</span><p class="caption" data-dcnode-id="1788"><span data-dcnode-id="1792" instrument_node="">Cape Town, South Africa (population 433,688), where the taps are scheduled to run dry due to extended drought that has emptied the water reservoirs.</span><br data-dcnode-id="1791"><span class="attribution" data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">By Alexcpt_photography/Shutterstock.com</span></span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node="">In February 2018, Cape Town’s mayor’s office announced more stringent water restrictions: “We are now limited to using 13 gallons of water per person per day. That’s enough for a 90-second shower, a half-gallon of drinking water, a sink full to hand-wash dishes or laundry, one cooked meal, two hand washings, two teeth brushings and one toilet flush.” The warning in the </span><em data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">TIME</span></em><span data-dcnode-id="1783" instrument_node=""> article is this: “What is happening to us in Cape Town might not be an outlier. It could happen to you too.”</span></p><span data-dcnode-id="1781" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="1769"><span data-dcnode-id="1780" instrument_node="">
</span><img alt="Water Drop City" class="drop-image faded" data-dcnode-id="1779" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop1-city.png&amp;raw"><span data-dcnode-id="1778" instrument_node="">
</span><img alt="Water Drop USA" class="drop-image" data-dcnode-id="1777" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop2-usa.png&amp;raw"><span data-dcnode-id="1776" instrument_node="">

</span><img alt="Water Drop gray" class="gray-drop" data-dcnode-id="1773" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="1772" instrument_node="">

</span></div><span data-dcnode-id="1768" instrument_node="">
</span><h2 data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">The Water Crisis Exists in America, Too</span></h2><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1764" instrument_node="">In her master work titled </span><em data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Dirty, Sacred Rivers: Confronting South Asia’s Water Crisis</span></em><sup data-dcnode-id="1759" id="fnref:16"><a data-dcnode-id="1760" href="#fn:16" rel="footnote"><span data-dcnode-id="1761" instrument_node="">16</span></a></sup><span data-dcnode-id="1758" instrument_node="">, Cheryl Colopy, a prize-winning environmental reporter specializing in water systems and clean water restoration, makes a wry observation about the Western form of household waste management:</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1753"><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">“But the system I have known and used, quite unconsciously ever since I was potty trained, is nuts. In a world where the supply of clean drinking water is becoming an almost universal worry, why would anyone put clean water into a toilet? For South Asia, flushed toilets and the treatment systems they require have become untenable long before they have become universal. For the Western world, the system as it is currently practiced will surely become untenable before too many more years have passed.”</span></em></p><span data-dcnode-id="1752" instrument_node="">
</span><h3 data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Water Shortage Solutions in Orange County, California</span></h3><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Any discussion of clean water inevitably introduces the twin dilemma on the matter of how the world handles human waste. Author Colopy’s point is even now an issue with the state of California, which has concluded that intermittent periods of drought may be the predicted future for its residents. Recycled and purified toilet water (and other grey water from washing machines, dishwashers, showers and sinks, gutters and sidewalks) is the basis for the Orange County Water District pioneering wastewater treatment facility that basically recycles sewage and returns it directly to the drinking supply. Soon, some 100 million gallons per day will meet the water needs of some 850,000 people. When mixed with the groundwater supply, this treatment reaches more than 70 percent of Orange County residents.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1745" instrument_node="">Admittedly, the concept of “from toilet to tap,” as the phrase goes, has met with determined resistance, but due to a three-year water shortage crisis and to determined public education, negative reaction seems to be lessening. A public campaign</span><sup data-dcnode-id="1742" id="fnref:17"><a data-dcnode-id="1743" href="#fn:17" rel="footnote"><span data-dcnode-id="1744" instrument_node="">17</span></a></sup><span data-dcnode-id="1741" instrument_node=""> has carefully explained the three steps of the water reclamation project.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">“The first is a micro-filtration of the treated waste water to remove solids, oils and bacteria, before the resulting liquid goes through reverse osmosis.” Phase Two means everything is pushed “through a fine plastic membrane that filters out viruses and pharmaceuticals.” Phase Three: “The water is then treated with UV light to remove any remaining organic compounds, before joining the main groundwater supply, which must pass strict quality controls to meet legal standards and distribution to households.” Mike Marcus, the general manager of the Orange County Water District (OCWD) explains that once wastewater goes through this three-step process, “we basically have distilled water.”</span></p><span data-dcnode-id="1736" instrument_node="">
</span></div><span data-dcnode-id="1733" instrument_node="">
</span></div><span data-dcnode-id="1730" instrument_node="">
</span></div><span data-dcnode-id="1727" instrument_node="">
</span><div class="bubbles-background" data-dcnode-id="1683"><span data-dcnode-id="1726" instrument_node="">
</span><div class="container" data-dcnode-id="1685"><span data-dcnode-id="1725" instrument_node="">
</span><div class="row" data-dcnode-id="1717"><span data-dcnode-id="1724" instrument_node="">
</span><div class="col-sm-12" data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">
</span><h2 data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Water Reclamation Process</span></h2><span data-dcnode-id="1720" instrument_node="">
</span></div><span data-dcnode-id="1718" instrument_node="">
</span></div><span data-dcnode-id="1716" instrument_node="">
</span><div class="row" data-dcnode-id="1687"><span data-dcnode-id="1715" instrument_node="">
</span><div class="col-sm-4" data-dcnode-id="1707"><span data-dcnode-id="1714" instrument_node="">
</span><h3 data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Phase 1</span></h3><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Micro-filtration removes solids, oils and bacteria, all before the water goes through reverse osmosis.</span></p><span data-dcnode-id="1708" instrument_node="">
</span></div><span data-dcnode-id="1706" instrument_node="">
</span><div class="col-sm-4" data-dcnode-id="1698"><span data-dcnode-id="1705" instrument_node="">
</span><h3 data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Phase 2</span></h3><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Everything is pushed through a fine plastic membrane that filters our viruses and pharmaceuticals.</span></p><span data-dcnode-id="1699" instrument_node="">
</span></div><span data-dcnode-id="1697" instrument_node="">
</span><div class="col-sm-4" data-dcnode-id="1689"><span data-dcnode-id="1696" instrument_node="">
</span><h3 data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Phase 3</span></h3><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">The water is treated with UV light to remove any other organic compounds.</span></p><span data-dcnode-id="1690" instrument_node="">
</span></div><span data-dcnode-id="1688" instrument_node="">
</span></div><span data-dcnode-id="1686" instrument_node="">
</span></div><span data-dcnode-id="1684" instrument_node="">
</span></div><span data-dcnode-id="1682" instrument_node="">
</span><div class="container" data-dcnode-id="1578"><span data-dcnode-id="1681" instrument_node="">
</span><div class="row" data-dcnode-id="1581"><span data-dcnode-id="1680" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="1584"><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The OCWD assures the end-user that the re-treated water exceeds all state and federal drinking standards. As the technology is adapted to other places in the world, water-insecure Singapore, for instance, in addition to new state-side additions launched in Los Angeles, San Francisco and San Diego, the president of the World Water Council, Benedito Braga, reports, “The quality [of effluent water from a sewage treatment plant] is very good, as good or better than the tap water in any city in the developed world.” Thomas Quinn, the head of the Association of California Water Agencies insists this process is a central strategy to drought-proofing modern urban economies.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1675" instrument_node="">For those who shudder at the possibility of drinking recycled toilet water, sometimes it is all a matter of what’s in a name. An interview over National Public Radio</span><sup data-dcnode-id="1672" id="fnref:18"><a data-dcnode-id="1673" href="#fn:18" rel="footnote"><span data-dcnode-id="1674" instrument_node="">18</span></a></sup><span data-dcnode-id="1671" instrument_node=""> acknowledged the “yuck” factor many in the public might naturally feel at the thought of recycling water from the toilet to the tap, and that resistance might be helped by a newer nomenclature such as the “the potable reuse project.” The Orange County Water District is being far more upfront in their public campaign by using the hashtag #GetOverIt. NPR Reporter, Nathan Rott, insists that recycled water is and will remain California’s single largest source of new water supplies as the state moves forward into the 21st century. </span></p><span data-dcnode-id="1669" instrument_node="">
</span><blockquote data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">
        “The quality [of effluent water from a sewage treatment plant] is very good, as good or better than the tap water in any city in the developed world.” 
      </span></blockquote><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">Then before we turn to the water dilemmas of the two-thirds world and point a finger and tsk-tsk over spoiled rivers and sewage-polluted streams, perhaps we should look hard at the infrastructure inadequacies of our own nation. The news cycles in the States and the headline-oriented emphasis of major networks and cable outreaches leaves little time for in-depth reporting. We have heard, for many years, much discussion regarding the national need for infrastructure renovation—Roads are in disrepair, bridges are crumbling, airports all need upgrading. Rarely—rarely—do we hear that our </span><em data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">water infrastructure</span></em><span data-dcnode-id="1662" instrument_node=""> systems are also in red flag conditions.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><h3 data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">Water Crisis Solutions in Flint, Michigan</span></h3><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1656" instrument_node="">The sad result of what is essentially a violation of public trust can be encapsulated by the Flint, Michigan, water saga that happened in April 2014</span><sup data-dcnode-id="1653" id="fnref:19"><a data-dcnode-id="1654" href="#fn:19" rel="footnote"><span data-dcnode-id="1655" instrument_node="">19</span></a></sup><span data-dcnode-id="1652" instrument_node="">. The drinking source for this city was diverted from the treated Detroit Water and Sewerage Department to the Flint River. This change was influenced by the fact that an estimated $5,000,000 in savings was projected over the next two years. In August and September of 2014, city officials detected levels of coliform bacteria, and a bulletin was issued for Flint citizens to boil their water. In October 2014, General Motors complained about the corrosivity of the water, explaining that car parts were actually corroding. The request was made that GM be able to switch back to the Detroit water source. (It turns out, that corrosive capability of the Flint River water would be determined to also corrode upon lead pipes, leaching lead levels into the water supply of individual homes. An early investigation by one “whistle-blowing” worker determined that, despite standard practice, officials failed to apply corrosion inhibitors to the Flint River water.) In January 2015, in a public meeting, citizens complained about bad water—murky tap water; there was a bad smell and taste as well as the questionable appearance. These complaints appeared to have gone on over an 18-month period before a local physician, taking it upon himself, found highly elevated blood lead levels in the children of Flint.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><div class="big-stat" data-dcnode-id="1642" style="margin-bottom:20px"><span data-dcnode-id="1649" instrument_node="">
</span><p class="stats-number" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">880×</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p class="stats-text" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Some homes in Flint, Michigan had lead levels 880 times higher than the federal allotted level.</span></p><span data-dcnode-id="1643" instrument_node="">
</span></div><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Eventually, with city officials dodging complaints, issuing false reports to state regulators indicating that “tests at Flint’s water treatment plant had detected no lead and testing in homes had registered lead at acceptable levels,” and with Michigan’s Department of Environmental Quality eventually being pegged as the major player in denying the problem and refusing to take action, major players, too numerous to mention, finally stepped in. Scientists and physicians and medical schools and environmental organizations, both private and governmental, determined that the proportion of infants and children with elevated levels of lead in their blood had nearly doubled since the switch to the Flint River. </span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">In September 2015, Dr. Marc Edwards, notified by a Flint resident whose alarms had been ignored by city officials, began testing Flint water with a team from Virginia Tech to perform lead level testing. Working with a grant from the National Science Foundation, he and his student team reported that at least a quarter of Flint households had levels of lead above the federal allotted level of 15 parts per billion (ppb) and that in some homes, lead levels were at 13,200 ppb. Edwards summarized the Flint Water Crisis by stating: “It was the injustice of it all and that the very agencies that are paid to protect these residents from lead in water, knew or should have known after June at the very latest of this year, that federal law was not being followed in Flint, and that these children and residents were not being protected. And the extent to which they went to cover this up exposes a new level of arrogance and uncaring that I have never encountered.”</span></p><span data-dcnode-id="1635" instrument_node="">
</span><div class="offset-image left" data-dcnode-id="1625"><span data-dcnode-id="1634" instrument_node="">
</span><img alt="The National Guard delivers bottled water to Flint, MI" data-dcnode-id="1633" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/flint-michigan-water.jpg&amp;raw"><span data-dcnode-id="1632" instrument_node="">
</span><p class="caption" data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">The National Guard delivers bottled water to residents of Flint, MI.</span><br data-dcnode-id="1630"><span class="attribution" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">By Linda Parton/Shutterstock.com</span></span></p><span data-dcnode-id="1626" instrument_node="">
</span></div><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">This all, of course, has resulted in countless hearings, investigations, and continued studies on the local, statewide and national levels. Emergency centers for distributing water and home filters, then replacement cartridges, have been established. Testing water and lead levels in the blood of children continue. The water supply was diverted back to the Detroit Water and Sewerage Department. Numerous Class action suits have been filed against Michigan Governor Rick Snyder and 13 other state officials, including former Flint mayor Dayne Walling. The complaints allege that the officials acted recklessly and negligently, leading to serious injuries from lead poisoning.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Needless to say, major funding has been found and pledged for comprehensive water infrastructure improvement, all to be carried out over the next few years. But what is immeasurable is the damage done to the brains of small children, most of which cannot now be determined but which bodes ill for the future of these kids. Senators Debbie Stabenow and Gary Peters along with Representative Dan Kildee called upon the state of Michigan to “make a sustained financial commitment by establishing a Future Fund to meet the cognitive, behavioral and health challenges of children affected by lead poisoning.” All fear that those challenges will be real and life-lasting.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><div class="drops-divider" data-dcnode-id="1606"><span data-dcnode-id="1617" instrument_node="">
</span><img alt="Water Drop gray" class="drop-image faded" data-dcnode-id="1616" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop1-city.png&amp;raw"><span data-dcnode-id="1615" instrument_node="">
</span><img alt="Water Drop gray" class="drop-image faded" data-dcnode-id="1614" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop2-usa.png&amp;raw"><span data-dcnode-id="1613" instrument_node="">
</span><img alt="Water Drop gray" class="drop-image" data-dcnode-id="1612" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop3-ground.png&amp;raw"><span data-dcnode-id="1611" instrument_node="">
</span><img alt="Water Drop gray" class="gray-drop" data-dcnode-id="1610" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="1609" instrument_node="">
</span><img alt="Water Drop gray" class="gray-drop" data-dcnode-id="1608" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/drop-gray.svg&amp;raw"><span data-dcnode-id="1607" instrument_node="">

</span><h2 data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">World Water Crisis Facts: Problems Around the Globe</span></h2><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1601" instrument_node="">So let us take a deep breath. Let us think a moment about that peaceful and stunning NASA photo: AS17-148-22727. Let us remind ourselves that of all the spinning planets in our solar system, it alone has been created uniquely to sustain water, and that not one other drop has been discovered anywhere else in interstellar space. Let us remember that 75 percent of our planet is covered with water, some 96.5 percent of that in its oceans. Then let us say a prayer for its water resource preservation and purification, and let us remember that some religious systems view water to be holy. Only then, let us absorb the fact that an investigative report</span><sup data-dcnode-id="1598" id="fnref:20"><a data-dcnode-id="1599" href="#fn:20" rel="footnote"><span data-dcnode-id="1600" instrument_node="">20</span></a></sup><span data-dcnode-id="1597" instrument_node=""> by Reuters released December 19, 2016, found nearly 3,000 areas in the United States with lead poisoning rates at least double those in Flint. </span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1594" instrument_node="">This headline tagged a report</span><sup data-dcnode-id="1591" id="fnref:21"><a data-dcnode-id="1592" href="#fn:21" rel="footnote"><span data-dcnode-id="1593" instrument_node="">21</span></a></sup><span data-dcnode-id="1590" instrument_node=""> released by the Associated General Contractors (AGC): “Both Public and Private Studies Find Astounding Gaps Between Current Spending and Projected Needs.” The analysis determined: “Modernizing and replacing aging water infrastructure may be the single largest public works endeavor in our nation’s history. The U.S. Environmental Protection Agency’s Clean Water and Drinking Water Infrastructure Gap analysis found a $540 billion gap between current spending and projected needs for water and wastewater infrastructure (combined) over 20 years. Other public studies conducted by the Government Accountability Office (GAO) and the Congressional Budget Office (CBO), and a private study produced by AGC partner, the Water Infrastructure Network, have similarly estimated the nation’s water infrastructure needs to range between $400 and $600 billion over a 20-year period.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">The 2014–2017 Flint, Michigan lead-poisoned water problems highlights possible impacts on communities if warnings are ignored and if appropriate budget planning is not prioritized. (“What is happening to us in Cape Town may not be an outlier. It could happen to you too.”) We need to understand that water degradation and evaporation and infrastructure decline is happening to us now.</span></p><span data-dcnode-id="1585" instrument_node="">
</span></div><span data-dcnode-id="1582" instrument_node="">
</span></div><span data-dcnode-id="1579" instrument_node="">
</span></div><span data-dcnode-id="1576" instrument_node="">
</span><img alt="In Gayo village, Ethiopia, a group of women and young girls collect water from a rain water pool. They use tablets to purify the water before they drink it. When there is water scarcity or a water shortage, mostly women and children bear the burden of collecting clean water for their families." class="full-horizontal-image" data-dcnode-id="1575" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/collage3.jpg&amp;raw"><span data-dcnode-id="1574" instrument_node="">
</span><div class="container" data-dcnode-id="1433"><span data-dcnode-id="1573" instrument_node="">
</span><div class="row" data-dcnode-id="1553"><span data-dcnode-id="1572" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="1555"><span data-dcnode-id="1571" instrument_node="">
</span><p class="caption" data-dcnode-id="1566"><span data-dcnode-id="1570" instrument_node="">In Gayo Village, Ethiopia, a group of women and young girls collect water from a rain water pool. They use tablets to purify the water before they drink it. Around the world, mostly women and children bear the burden of collecting water for their families.</span><br data-dcnode-id="1569"><span class="attribution" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">By Martchan/Shutterstock.com</span></span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1557"><strong data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">So what is the status of clean water worldwide?</span></strong><span data-dcnode-id="1562" instrument_node=""> According to the World Health Organization</span><sup data-dcnode-id="1559" id="fnref:22"><a data-dcnode-id="1560" href="#fn:22" rel="footnote"><span data-dcnode-id="1561" instrument_node="">22</span></a></sup><span data-dcnode-id="1558" instrument_node="">, some of the global facts regarding safe water usage are these:</span></p><span data-dcnode-id="1556" instrument_node="">
</span></div><span data-dcnode-id="1554" instrument_node="">
</span></div><span data-dcnode-id="1552" instrument_node="">
</span><div class="row stats-row" data-dcnode-id="1532"><span data-dcnode-id="1551" instrument_node="">
</span><div class="col-sm-5 col-sm-offset-1" data-dcnode-id="1543"><span data-dcnode-id="1550" instrument_node="">
</span><p class="stats-number" data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">
        71%
      </span></p><span data-dcnode-id="1547" instrument_node="">
</span><p class="stats-text" data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">
      of the global population in 2015 (5.2 billion people) used a safely managed drinking-water service—that is, one located on premises, available when needed, and free from contamination.
      </span></p><span data-dcnode-id="1544" instrument_node="">
</span></div><span data-dcnode-id="1542" instrument_node="">
</span><div class="col-sm-5 col-sm-offset-1" data-dcnode-id="1534"><span data-dcnode-id="1541" instrument_node="">
</span><p class="stats-number" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">
        89%
      </span></p><span data-dcnode-id="1538" instrument_node="">
</span><p class="stats-text" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">
      of the global population in 2015 (6.5 billion people) used at least a basic service. A basic service is an improved drinking-water source within a round trip of 30 minutes to collect water.
      </span></p><span data-dcnode-id="1535" instrument_node="">
</span></div><span data-dcnode-id="1533" instrument_node="">
</span></div><span data-dcnode-id="1531" instrument_node="">
</span><div class="row" data-dcnode-id="1511"><span data-dcnode-id="1530" instrument_node="">
</span><div class="col-sm-5 col-sm-offset-1" data-dcnode-id="1522"><span data-dcnode-id="1529" instrument_node="">
</span><p class="stats-number" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">
        840 million
      </span></p><span data-dcnode-id="1526" instrument_node="">
</span><p class="stats-text" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">
      people lack even a basic drinking-water service, including 159 million people who are dependent on surface water (water from rivers and ponds).
      </span></p><span data-dcnode-id="1523" instrument_node="">
</span></div><span data-dcnode-id="1521" instrument_node="">
</span><div class="col-sm-5 col-sm-offset-1" data-dcnode-id="1513"><span data-dcnode-id="1520" instrument_node="">
</span><p class="stats-number" data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">
        2 billion
      </span></p><span data-dcnode-id="1517" instrument_node="">
</span><p class="stats-text" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">
        people globally use a drinking water source contaminated with feces.
      </span></p><span data-dcnode-id="1514" instrument_node="">
</span></div><span data-dcnode-id="1512" instrument_node="">
</span></div><span data-dcnode-id="1510" instrument_node="">
</span><div class="row append-bottom" data-dcnode-id="1490"><span data-dcnode-id="1509" instrument_node="">
</span><div class="col-sm-5 col-sm-offset-1" data-dcnode-id="1501"><span data-dcnode-id="1508" instrument_node="">
</span><p class="stats-number" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">
        502,000
      </span></p><span data-dcnode-id="1505" instrument_node="">
</span><p class="stats-text" data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">
      deaths every year are caused by diseases transmitted by contaminated water such as diarrhea, cholera, dysentery, typhoid and polio.
      </span></p><span data-dcnode-id="1502" instrument_node="">
</span></div><span data-dcnode-id="1500" instrument_node="">
</span><div class="col-sm-5 col-sm-offset-1" data-dcnode-id="1492"><span data-dcnode-id="1499" instrument_node="">
</span><p class="stats-number" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">
        38%
      </span></p><span data-dcnode-id="1496" instrument_node="">
</span><p class="stats-text" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">
        of health care facilities lack an improved water source in low- and middle-income countries. 19 percent do not have improved sanitation, and 35 percent lack water and soap for handwashing.
      </span></p><span data-dcnode-id="1493" instrument_node="">
</span></div><span data-dcnode-id="1491" instrument_node="">
</span></div><span data-dcnode-id="1489" instrument_node="">
</span><div class="row" data-dcnode-id="1436"><span data-dcnode-id="1488" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="1439"><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">In addition to these above statistics, WHO also notes that “Yet diarrhea is largely preventable, and the deaths of 361,000 children aged under five years could be avoided each year if these risk factors were addressed. Where water is not readily available, people may decide handwashing is not a priority, thereby adding to the likelihood of diarrhea and other diseases.”</span></p><span data-dcnode-id="1484" instrument_node="">
</span><h3 data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Is Anyone Doing Anything?</span></h3><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1477"><em data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Certainly, organizations somehow, somewhere, are doing something about this? Right?</span></em><span data-dcnode-id="1478" instrument_node=""> This is the natural response of those of us who unthinkingly use clean water to flush our toilets and allow grey water to be piped into the sewer systems of our communities.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Actually, that thought many of us have when we read about water-distressed systems worldwide is right. Well-meaning help of all kinds, from missionary groups to hundreds if not thousands of non-government organizations to the World Bank and the United Nations to the World Health Organization to inter-agency coordinated efforts to private foundations with substantial granting means to individual governments to the largess of western countries—all of them are players in attempting to solve the water problems of the world.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="1463" style="width:350px;"><span data-dcnode-id="1472" instrument_node="">
</span><img alt="50,000 wells drilled in Africa now lie broken" data-dcnode-id="1471" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/dry-well.jpg&amp;raw"><span data-dcnode-id="1470" instrument_node="">
</span><p class="caption" data-dcnode-id="1465"><span data-dcnode-id="1469" instrument_node="">Many wells drilled by well-meaning organizations now lie broken or in disrepair.</span><br data-dcnode-id="1468"><span class="attribution" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">By astudio/Shutterstock.com</span></span></p><span data-dcnode-id="1464" instrument_node="">
</span></div><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1461" instrument_node="">However, even the best laid plans of sophisticated systems often go awry. Evidence of this is the estimated 50,000 wells in Africa dug by well-meaning organizations that now lie broken, abandoned and non-functional; a dismal testament to good intentions gone bad. Really bad. Jamie Skinner of the London-based International Institute for Environment and Development reported at the 2009 World Water Forum</span><sup data-dcnode-id="1458" id="fnref:23"><a data-dcnode-id="1459" href="#fn:23" rel="footnote"><span data-dcnode-id="1460" instrument_node="">23</span></a></sup><span data-dcnode-id="1457" instrument_node="">, a triennial summit, on the state of wells in Africa. He is a water development specialist with particular emphasis on West Africa. His report on “water points” included some of these disturbing facts:</span></p><span data-dcnode-id="1455" instrument_node="">
</span><ul data-dcnode-id="1444"><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">The equivalent of up to $360 million USD has been wasted on building borehole wells that break because they are not maintained or repaired.</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Only one third of water points built by NGOs in Senegal’s Kaolack region are working, and 58 percent in northern Ghana are in disrepair.</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Disrepair occurs because NGOs often do not fully consult with local people before beginning a water project to determine what it will cost to clean and maintain the well.</span></li><span data-dcnode-id="1445" instrument_node="">
</span></ul><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Some naysayers have deemed this come-do-your-thing-and-go approach as “non-government organizational malfeasance.” Skinner gives the example of a badly constructed and poorly maintained shallow well, dug by a charity in Katine sub county in north-east Uganda, that was full of soil and animal feces and was making the local population sick. The African Medical and Research Foundation’s strategy to solve this well deficiency was to set up a local committee responsible to operate and maintain a new borehole with trained hand-pump repairmen available in case of breakdown. “There is no point in an external agency coming in, putting in a drill-hole and then passing it over to the local community if they can’t afford to maintain it over the next 10 or 20 years,” concludes Skinner. </span></p><span data-dcnode-id="1440" instrument_node="">
</span></div><span data-dcnode-id="1437" instrument_node="">
</span></div><span data-dcnode-id="1434" instrument_node="">
</span></div><span data-dcnode-id="1431" instrument_node="">
</span><img alt="People washing clothes at the Ganges River. A water crisis in India, and a clean water shortage has created the need for water scarcity solutions." class="full-horizontal-image section-image" data-dcnode-id="1430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/ganges-river.jpg&amp;raw"><span data-dcnode-id="1429" instrument_node="">
</span><div class="container" data-dcnode-id="1155"><span data-dcnode-id="1428" instrument_node="">
</span><div class="row" data-dcnode-id="1158"><span data-dcnode-id="1427" instrument_node="">
</span><div class="col-sm-8 col-sm-offset-2" data-dcnode-id="1161"><span data-dcnode-id="1426" instrument_node="">
</span><h3 data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The Need for Clean Water in Asia</span></h3><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">In her book </span><em data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Dirty, Sacred Rivers: Confronting South Asia’s Water Crisis</span></em><span data-dcnode-id="1419" instrument_node="">, Cheryl Colopy takes us on nearly every footstep of her arduous investigation starting in the headwaters high in the Himalayas. </span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">“This book chronicles my travels in Nepal, India, and Bangladesh, countries that are knit together by the Ganga and her various tributaries. I explain what I learned about glaciers melting in the mountains, sewage gluts and water shortages in the vast cities, and plans for engineering rivers that will have unknown consequences and perhaps limited benefits,” she writes in her introduction. </span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Interviewing hundreds of Asian water conservation experts who are concerned about their countries’ water shortages and misuse, we have a chance to listen over her shoulder to their love for their land and their attempts to solve water distress issues. Clean water, indeed, is the goal, but working through past mistakes, the consequences of climate change and its unknown future, population explosions, and unintended engineering mishaps gives the reader an extraordinary feeling of being party to all the discussions. As the flap copy explains, “Many are reviving ingenious methods of water management that thrived for centuries in South Asia and may point the way to water sustainability and healthy rivers.” </span></p><span data-dcnode-id="1411" instrument_node="">
</span><blockquote data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">
        Simple is often best. Ancient civilizations solved their water needs in ways that speak to us today.
      </span></blockquote><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Here too, as with Jamie Skinner’s reporting on Africa’s abandoned wells, a theme emerges, one the author confesses she discovered during her essentially seven-year journey. “There is no way that I—a former medieval scholar turned environment reporter rather later in life—can claim to have answers to South Asia’s water difficulties, if there are right answers. So I give you many highly intelligent, trained, sane, and committed water experts from that region. These authorities more often argue for the lighter hand, the softer path; not no engineering at all, but less invasive engineering, and techniques that are localized, decentralized, and draw on traditional methods along with the almost-lost wisdom of local people.”</span></p><span data-dcnode-id="1405" instrument_node="">
</span><img alt="A child of the Himba tribe carries a bucket of water in Kamanjab, Kunene, Namibia" data-dcnode-id="1404" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/child-carrying-water.jpg&amp;raw"><span data-dcnode-id="1403" instrument_node="">
</span><p class="caption" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">A child of the Himba tribe carries a bucket of water in Kamanjab, Kunene, Namibia.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">The themes of the book are: Simple is often best. Ancient civilizations solved their water needs in ways that speak to us today. The people who are most affected by water stresses are most often the ones who can solve the problem.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Indeed, the problems are real. </span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1390"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Sewage in the rivers</span></strong><span data-dcnode-id="1391" instrument_node="">: “Estimates of the amount of untreated raw sewage that enters the Ganga every day are hard to grasp: apparently something in the neighborhood of a billion liters. Much of it comes from homes that do have toilets, where relatively clean water is being flushed away and turned into sewage, which then turns rivers into sewers, a further loss of clean water.”</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1385"><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Climate change</span></strong><span data-dcnode-id="1386" instrument_node="">: “This lack of snowfall is the chief problem Dobhal (a glacier specialist) has seen in the high mountains in recent years. As a consequence, the glaciers are depleting, not developing. With good winter snowfall, they stay in balance, and the melting rate is not cause for alarm. Melting glacier ice accounts for 30 percent of the water in the rivers. The rest is from snow and from the monsoon. Now that there is less snow, the spring flow in the rivers comes directly from the older ice. When glaciers lose their volume, the rate of melting increases. It’s the difference between a melting block of ice and a melting ice cube. Big glaciers create their own climate. They make cold weather. Big glaciers can be more powerful than the sunlight that reaches them. But as glaciers shrink, the power of the sun to melt them grows.” Unpredictable behavior is ahead from flooding due to increased glacier melt to drought to drying rivers. One expert sums up the uncertainty, saying, “Climate change will manifest itself through water. It will affect every sector of life through precipitation, snow, rain, whatever. Livestock, forestry, soil, sanitation, disease, everything. But we have no idea how it’s going to happen.”</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1383"></p><h1 class="subhead" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Agricultural water scarcity</span></h1><span data-dcnode-id="1380" instrument_node="">
      The global water scarcity problem is not limited to providing potable drinking water for humans, although without it we would not exist. Water is necessary for agriculture, for both crops and animal husbandry.</span><p data-dcnode-id="1379"></p><span data-dcnode-id="1378" instrument_node="">
</span><div class="offset-image right" data-dcnode-id="1368"><span data-dcnode-id="1377" instrument_node="">
</span><img alt="An uncanny sight in a first-world country: Lines of people waiting to collect natural spring water during the drought in Cape Town, South Africa" data-dcnode-id="1376" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cc.gfamedia.org/special-report/water/water-line-south-africa.jpg&amp;raw"><span data-dcnode-id="1375" instrument_node="">
</span><p class="caption" data-dcnode-id="1370"><span data-dcnode-id="1374" instrument_node="">An uncanny sight in a first-world country: Lines of people waiting to collect natural spring water during the drought in Cape Town, South Africa.</span><br data-dcnode-id="1373"><span class="attribution" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">By Mark Fisher/Shutterstock.com</span></span></p><span data-dcnode-id="1369" instrument_node="">
</span></div><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1366" instrument_node="">In water-starved South Africa, the first restrictions on water usage were levied upon the agricultural sector. Now, farmers are renegotiating their leases because they cannot produce enough income. Current economic forecasts anticipate that within the next five years as many as 98 percent of farms will have a negative Net Farm Income</span><sup data-dcnode-id="1363" id="fnref:24"><a data-dcnode-id="1364" href="#fn:24" rel="footnote"><span data-dcnode-id="1365" instrument_node="">24</span></a></sup><span data-dcnode-id="1362" instrument_node="">.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1359" instrument_node="">China’s Ministry of Water Resources recently declared a need “to fight for every drop of water or die.”</span><sup data-dcnode-id="1356" id="fnref:25"><a data-dcnode-id="1357" href="#fn:25" rel="footnote"><span data-dcnode-id="1358" instrument_node="">25</span></a></sup><span data-dcnode-id="1355" instrument_node="">  Twelve northern Chinese provinces suffer from water scarcity. In eight, the scarcity is considered acute. This is particularly significant because those provinces provide 38 percent of the country’s agriculture. The rapid economic expansion in China has placed so much demand on water supplies that 28,000 rivers have disappeared over the past 25 years. The flow of the Yellow River has dwindled to a tenth of what it was prior to 1950. Pollution is so rampant in China that almost 10 percent of the groundwater is not even fit for agricultural use. </span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">These countries and others are in a catch-22. Water for agriculture is limited, but it is needed to grow the crops and animals required to feed the demands of growing populations.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><blockquote data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">
        The rapid economic expansion in China has placed so much demand on water supplies that 28,000 rivers have disappeared over the past 25 years.
      </span></blockquote><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1346" instrument_node="">Recognizing the importance of water conservation, the Kerala Water Authority (KWA) in India is making a concerted effort to bring dramatic reform in their own jurisdiction. Infrastructure can cause as much as 45 percent water loss, far above the national average of 15 percent systemic water loss. As the KWA brings improvements to its clean water delivery system, the potential for positive impact is significant</span><sup data-dcnode-id="1343" id="fnref:26"><a data-dcnode-id="1344" href="#fn:26" rel="footnote"><span data-dcnode-id="1345" instrument_node="">26</span></a></sup><span data-dcnode-id="1342" instrument_node="">.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1339" instrument_node="">On the national level, Indian Prime Minister Shri Narendra Modi began promoting the implementation of a decades-old clean water initiative in 2014. One part of that project alone, linking the Ken and Betwa rivers, would make drinking water available for 1.35 million people plus provide enough to irrigate 600,000 hectares of farmable land</span><sup data-dcnode-id="1336" id="fnref:27"><a data-dcnode-id="1337" href="#fn:27" rel="footnote"><span data-dcnode-id="1338" instrument_node="">27</span></a></sup><span data-dcnode-id="1335" instrument_node="">. The project is pending approval from the environmental ministry, but nonetheless, we’re hopeful of the efforts making strides to resolve India’s water problems.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1332" instrument_node="">In 2016, 330 million Indians were affected by drought</span><sup data-dcnode-id="1329" id="fnref:28"><a data-dcnode-id="1330" href="#fn:28" rel="footnote"><span data-dcnode-id="1331" instrument_node="">28</span></a></sup><span data-dcnode-id="1328" instrument_node="">, and the government is taking action to respond. </span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1325" instrument_node="">“We are working on a big scheme to bring water to farmlands. We need to have a permanent solution to the drought,” the Prime Minister said</span><sup data-dcnode-id="1322" id="fnref:29"><a data-dcnode-id="1323" href="#fn:29" rel="footnote"><span data-dcnode-id="1324" instrument_node="">29</span></a></sup><span data-dcnode-id="1321" instrument_node="">. </span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">There is a plan underway for 25,000 villages to get clean water wells, and 5,000 wells have been started, as of April 2017.</span><sup data-dcnode-id="1315" id="fnref:30"><a data-dcnode-id="1316" href="#fn:30" rel="footnote"><span data-dcnode-id="1317" instrument_node="">30</span></a></sup></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Dr. K.P. Yohannan, founder of Gospel for Asia and Metropolitan of Believers Eastern Church, met with high officials in the government in March 2016 to discuss ways in which India’s Christian community could collaborate with the government for the good of the nation. Believers Eastern Church has since been able to work together with the Indian government to work on cleaning up some of the nation’s rivers.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">One of those voices Colopy interviewed—a highly intelligent, trained and committed expert—Sudhil Chaudhary, a professor of biology at Bhagalpur University has a plan. His is for forestry restoration, which also involves water reclamation. Sudhil would like local communities to be part of each and every decision about the plan. This is a theme that seems to be emerging all over the world. I find it stated more and more as I research world development needs and particularly, the Millennium Development Goals and its companion the Sustainable Development Goals. Things work when there is community buy-in, and often fail when there is none. </span></p><span data-dcnode-id="1307" instrument_node="">
