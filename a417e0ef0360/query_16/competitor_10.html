</span><p data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Studies have
shown that tap water is not safe for drinking. Most of the tap water contains
contaminants, chemicals and pollutants making unsuitable for human consumption.
That is why it is important for every household to install a water filter in
Australia. These machines helps to get rid of impurities that can cause
infections.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">However,
choosing the best small water filters or portable in the market is a difficult
task. If you are feeling stuck on which water filter to purchase, we have got
you covered. In this buyers guide, we have listed the best water filters in the
market. &nbsp;</span></p><span data-dcnode-id="2217" instrument_node="">
</span><h2 data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">1. Brita Marella XL Blue Jug</span></h2><span data-dcnode-id="2214" instrument_node="">

</span><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">If you are looking for a water filter that will service small family of three people, this Brita Marellafilter is a perfect choice.&nbsp; The filter is using one the powerful MAXTRA Microflow technology to remove impurities including contaminants, chemicals and other pollutants. The filter provides 2 liters of clean water but if you take out the cartridge, you can get 3.5 liters. Therefore, it’s a perfect filter for a small family and more so if you are living alone. Brita Marella XL Blue Jug water filter is selling at around $73.86 AUD on most online shops in Australia. </span></p><span data-dcnode-id="2207" instrument_node="">

</span><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">This is another water filter designed for small families. If you are living alone or you are about three to four people in the house, this Stefani filter is the perfect water filter for you. The filter provides 2extremely clean water and that’s why it has grown popular in Australia. It provides 2 liters making it perfect for a small household. You can easily change the filter if you need to make a replacement with a new one. It is also one of the cheapest water filters in the market selling at around $27.95 AUD on most of the online stores.</span></p><span data-dcnode-id="2197" instrument_node="">

</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">If you are stuck on the best small family and portable water filters to buy, these are some of the popular options to pick from. These water filters work very well for small family and adventure enthusiasts.</span></p><span data-dcnode-id="2124" instrument_node="">

</span><article class="post-164 post type-post status-publish format-standard has-post-thumbnail category-drinking-water category-general h-entry hentry h-as-article" data-dcnode-id="1900" id="post-164" itemscope="" itemtype="https://schema.org/Article"><span data-dcnode-id="2069" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2038"><span data-dcnode-id="2068" instrument_node="">
</span><a aria-hidden="true" class="post-thumbnail" data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/outsourcing-business-services/"><span data-dcnode-id="2067" instrument_node="">
</span><img alt="Time-Saving Services We Use, So We Can Focus On Water Purification" class="attachment-medium_large size-medium_large wp-post-image" data-dcnode-id="2066" height="327" itemprop="image" loading="lazy" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2021/01/outsourcing-business-services-768x402.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2021/01/outsourcing-business-services-768x402.jpg 768w, https://okeanostech.com/wp-content/uploads/2021/01/outsourcing-business-services-300x157.jpg 300w, https://okeanostech.com/wp-content/uploads/2021/01/outsourcing-business-services-1024x536.jpg 1024w, https://okeanostech.com/wp-content/uploads/2021/01/outsourcing-business-services-960x502.jpg 960w, https://okeanostech.com/wp-content/uploads/2021/01/outsourcing-business-services.jpg 1200w" width="625"><span data-dcnode-id="2065" instrument_node=""> </span></a><span data-dcnode-id="2063" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="2058" itemprop="headline"><span data-dcnode-id="2062" instrument_node="">
</span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/outsourcing-business-services/" itemprop="url" rel="bookmark"><span data-dcnode-id="2061" instrument_node="">Time-Saving Services We Use, So We Can Focus On Water Purification</span></a><span data-dcnode-id="2059" instrument_node="">
</span></h2><span data-dcnode-id="2057" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2040"><span data-dcnode-id="2056" instrument_node="">
</span><span class="byline" data-dcnode-id="2050"><span class="author vcard" data-dcnode-id="2051" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="2053" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="2042"><span class="screen-reader-text" data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Published on </span></span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/outsourcing-business-services/" rel="bookmark"><time class="entry-date published" data-dcnode-id="2046" datetime="2021-01-18T06:39:13+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="2047" instrument_node="">January 18, 2021</span></time><time class="updated" data-dcnode-id="2044" datetime="2021-01-18T06:52:18+00:00"><span data-dcnode-id="2045" instrument_node="">January 18, 2021</span></time></a></span><span data-dcnode-id="2041" instrument_node="">
</span></div><span data-dcnode-id="2039" instrument_node="">
</span></header><span data-dcnode-id="2037" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1922" itemprop="articleBody"><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">As a water purification company, our goal is to ensure our customers access to clean and safe drinking water. We want our customers to get safe and pure drinking water whenever they need it. To ensure that we are only focusing on water purification, we have outsourced some of the tedious work.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Any work that has nothing to with water purification have been outsourced. Some tasks, such as managing social media accounts, have nothing to do with purifying water. That’s why we have a company managing all our social media accounts. Here are some other tasks we have been outsourcing:</span></p><span data-dcnode-id="2030" instrument_node="">
</span><h2 data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Accounting</span></h2><span data-dcnode-id="2027" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2025"><img alt="accounting outsourcing services" class="wp-image-168" data-dcnode-id="2026" height="466" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2021/01/outsourced-accounting-services.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2021/01/outsourced-accounting-services.jpg 700w, https://okeanostech.com/wp-content/uploads/2021/01/outsourced-accounting-services-300x200.jpg 300w" width="700"></figure><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2023" instrument_node="">We understand the importance of balancing our books. We also know that without professional accounting, our business could fail. But we also understand that running a fully-fledged accounting department is expensive. That’s why we have resulted in working with </span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//infinitaccounting.com/"><span data-dcnode-id="2022" instrument_node="">Infinit Accounting services outsourcing homepage</span></a><span data-dcnode-id="2020" instrument_node=""> for accounting services. With them, we have all our accounting work being handled by a third party. With this arrangement, we are saving a lot of money instead of operating an accounting department from our offices. That’s one of the best decisions that we’ve ever made as a company.</span></p><span data-dcnode-id="2018" instrument_node="">
</span><h2 data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Cleaning Services</span></h2><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2014" instrument_node="">Have you ever thought of how much of our resources and time go into managing a cleaning department? If you go back to your books and check the cleaning department’s expenses, you will be shocked. That’s why we decided to hire professional cleaning services who help to keep our offices clean. We don’t have to buy cleaning supplies, employ cleaners or buy other things needed for cleaning. Outsourcing cleaning services have saved us not only money but also time. We can now focus on </span><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.watermove.com.au/"><span data-dcnode-id="2013" instrument_node="">water management</span></a><span data-dcnode-id="2011" instrument_node="">.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><h2 data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Managing Online Content</span></h2><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2005" instrument_node="">Website content management is another tedious task we have been outsourcing. We understand that online visibility is crucial as part of the marketing strategy. But we also understand that maintaining the website and updating with new content is a tough job. We have outsourced </span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//virtualassistantthailand.com/"><span data-dcnode-id="2004" instrument_node="">Virtual Assistant Thailand</span></a><span data-dcnode-id="2002" instrument_node=""> to manage our website content. So, we no longer have an in-house team managing our online content. The outsourced company also manages our social media profiles, newsletter and email.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1998"><img alt="A woman from an outsourced website management company" class="wp-image-169" data-dcnode-id="1999" height="474" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2021/01/outsourced-website-management-manager.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2021/01/outsourced-website-management-manager.jpg 700w, https://okeanostech.com/wp-content/uploads/2021/01/outsourced-website-management-manager-300x203.jpg 300w" width="700"></figure><span data-dcnode-id="1997" instrument_node="">
</span><h2 data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Transport Logistics</span></h2><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">One of the biggest problems with product distribution is transport. Transport logistics includes purchasing vehicles and maintaining them. It also includes hiring drivers and other personnel needed along the entire chain. Managing transport has proven to be very difficult work for most companies. But some companies have specialized in transport and distribution services. These are the companies that we have outsourced transport to in order to distribute our purified water to customers. This has made our work easier and improved our profit margins.</span></p><span data-dcnode-id="1991" instrument_node="">
</span><h2 data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Product Packaging and Logistics</span></h2><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1987" instrument_node="">Water purification will not be complete without proper packaging. But the whole process of packaging can be extremely tedious, especially when done by the same company. From buying bottles, stickers to other components, it can be a bit difficult. We therefore work with </span><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//zacpac.com.au/"><span data-dcnode-id="1986" instrument_node="">Zac Pac Packaging Solutions</span></a><span data-dcnode-id="1984" instrument_node="">, a third party, to deal with packaging. They sort out water bottles, stickers and any packaging related work. This leaves us with water purification work to concentrate on.</span></p><span data-dcnode-id="1982" instrument_node="">
</span><h2 data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Hiring Staff</span></h2><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1974"><span data-dcnode-id="1978" instrument_node="">For a long time, we had been running a human resource department for hiring staff. But the cost of hiring new staff was very high and unnecessary. We had to create time to do interviews and sort through hundreds of applications for positions. But we found that we could be more efficient if we outsource staff hiring services. Today, we have outsourced staff hiring, which has helped us streamline our services. It has saved us not only money but also time which we have now directed to innovation and water purification research. See this post for more information about </span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/water-health-benefits/"><span data-dcnode-id="1977" instrument_node="">why water is so beneficial</span></a><span data-dcnode-id="1975" instrument_node="">. </span></p><span data-dcnode-id="1973" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1971"><img alt="an online job post from an outsourced staff hiring services" class="wp-image-170" data-dcnode-id="1972" height="466" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2021/01/outsourced-staff-hiring-services.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2021/01/outsourced-staff-hiring-services.jpg 700w, https://okeanostech.com/wp-content/uploads/2021/01/outsourced-staff-hiring-services-300x200.jpg 300w" width="700"></figure><span data-dcnode-id="1970" instrument_node="">
</span><h2 data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Landscaping Services</span></h2><span data-dcnode-id="1967" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node="">Last on the services we have been outsourcing is the landscaping. We understand that the face of our company is the key to our success. But we also found that landscaping the yard ourselves is very expensive both in terms of time and money. From buying landscaping machines, tools and landscapers, this cost was unnecessarily high. That’s why we have been </span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/deeppatel/2017/07/17/the-pros-and-cons-of-outsourcing-and-the-effect-on-company-culture/%3Fsh%3D530762d0562d" rel="nofollow"><span data-dcnode-id="1965" instrument_node="">outsourcing</span></a><span data-dcnode-id="1963" instrument_node=""> all landscaping and maintenance services.</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Outsourcing tedious but essential works have had a positive impact on our company. We have managed to focus on water purification, hence resulting in higher productivity and profits. We are now more efficient than ever before.</span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1957"></p><span data-dcnode-id="1956" instrument_node="">

</span><h2 class="entry-title" data-dcnode-id="1887" itemprop="headline"><span data-dcnode-id="1891" instrument_node="">
</span><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/installing-gas-hot-water-systems/" itemprop="url" rel="bookmark"><span data-dcnode-id="1890" instrument_node="">Installing Gas Hot Water Systems</span></a><span data-dcnode-id="1888" instrument_node="">
</span></h2><span data-dcnode-id="1886" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1869"><span data-dcnode-id="1885" instrument_node="">
</span><span class="byline" data-dcnode-id="1879"><span class="author vcard" data-dcnode-id="1880" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="1882" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="1871"><span class="screen-reader-text" data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Published on </span></span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/installing-gas-hot-water-systems/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1875" datetime="2020-12-02T15:30:39+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="1876" instrument_node="">December 2, 2020</span></time><time class="updated" data-dcnode-id="1873" datetime="2020-12-02T15:46:48+00:00"><span data-dcnode-id="1874" instrument_node="">December 2, 2020</span></time></a></span><span data-dcnode-id="1870" instrument_node="">
</span></div><span data-dcnode-id="1868" instrument_node="">
</span></header><span data-dcnode-id="1866" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1754" itemprop="articleBody"><span data-dcnode-id="1865" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1862"><figure class="aligncenter size-full" data-dcnode-id="1863"><img alt="water heating installation" class="wp-image-157" data-dcnode-id="1864" height="853" loading="lazy" sizes="(max-width: 1280px) 100vw, 1280px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/12/water-heating-installation.jpeg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/12/water-heating-installation.jpeg 1280w, https://okeanostech.com/wp-content/uploads/2020/12/water-heating-installation-300x200.jpeg 300w, https://okeanostech.com/wp-content/uploads/2020/12/water-heating-installation-1024x682.jpeg 1024w, https://okeanostech.com/wp-content/uploads/2020/12/water-heating-installation-768x512.jpeg 768w, https://okeanostech.com/wp-content/uploads/2020/12/water-heating-installation-960x640.jpeg 960w" width="1280"></figure></div><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Gas hot water systems are widely used in Sydney because of the cheaper operating cost, among other benefits. But installing a gas system requires more than just buying and installing the unit. There are several crucial details that, if overlooked, you'll have problems like unstable hot water supply.&nbsp;&nbsp;</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Proper installation is crucial for an efficiently working gas hot water system. In this guide, we've rounded up crucial factors to consider when installing gas hot water systems. These are factors that will help you get the most out of your unit.&nbsp;&nbsp;</span></p><span data-dcnode-id="1855" instrument_node="">
</span><h2 data-dcnode-id="1852"><span data-dcnode-id="1854" instrument_node="">Here Are 5 Factors&nbsp;To&nbsp;Consider&nbsp;For&nbsp;A Perfect Gas Hot Water Systems Installation</span><br data-dcnode-id="1853"></h2><span data-dcnode-id="1851" instrument_node="">
</span><h3 data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">1. Avoid DIY Project&nbsp;&nbsp;</span></h3><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1847" instrument_node="">One of the biggest mistakes you can make is trying DIY hot water installations. It's not easy to pull out a successful gas hot water heater DIY installation project. The pipework is quite complicated, and a small gas leak can cause massive damages. In fact, the cost, in the long run, might be a hundred times of what you are trying to save. So, you need skills and the right tools to do a proper installation. Work with a </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.off-tapplumbing.com.au/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1846" instrument_node="">Sydney based plumbing company</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1845"></span><span class="screen-reader-text" data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1841" instrument_node=""> for the correct installation of the unit.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1836"><figure class="aligncenter size-large" data-dcnode-id="1837"><img alt="man working on a DIY house project" class="wp-image-156" data-dcnode-id="1838" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/12/man-working-on-a-DIY-house-project-1024x682.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/12/man-working-on-a-DIY-house-project-1024x682.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/12/man-working-on-a-DIY-house-project-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/12/man-working-on-a-DIY-house-project-768x512.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/12/man-working-on-a-DIY-house-project-960x640.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/12/man-working-on-a-DIY-house-project.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1835" instrument_node="">
</span><h3 data-dcnode-id="1832"><br data-dcnode-id="1834"><span data-dcnode-id="1833" instrument_node="">2. Install&nbsp;The&nbsp;Right Size&nbsp;&nbsp;</span></h3><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Installing the wrong size gas hot water system comes with several challenges. If the unit is too large, it will cost you extra money to heat the water you don't need. A small unit will run out of hot water during peak hours. Buying the wrong unit size is a common problem with DIY projects. If you work with a professional plumber, they will help you get a perfect size of the gas hot water system for your home. They will consider key factors, including the number of people in the household. That's the only way to get a constant hot water supply.&nbsp;&nbsp;</span></p><span data-dcnode-id="1828" instrument_node="">
</span><h3 data-dcnode-id="1824"><span data-dcnode-id="1827" instrument_node="">&nbsp;&nbsp;</span><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node="">3. Ensure Proper Piping&nbsp;&nbsp;</span></h3><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">One of the major hazards of gas hot water systems is gas leaks. Whether you are using LPG or natural gas, it's poisonous and thus can cause serious health issues. Similarly, if there is a gas leak, it can cause fire damages. You must have heard of house fires caused by gas leaks even here in Sydney. Gas fires are so vicious that they could wipe out your entire house. That's why the piping installation is crucial for your safety and that of the property. Work with a skilled and experienced plumber for professional gas piping installation. Working with a plumber helps to eradicate the problem of incompatible metals in the system.&nbsp;&nbsp;</span></p><span data-dcnode-id="1820" instrument_node="">
</span><h3 data-dcnode-id="1816"><span data-dcnode-id="1819" instrument_node="">&nbsp;&nbsp;</span><br data-dcnode-id="1818"><span data-dcnode-id="1817" instrument_node="">4. Install Overflow Valve&nbsp;&nbsp;</span></h3><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1814" instrument_node="">The two major concerns of hot water systems are excess pressure and temperature. When the water in the tank is heated, it creates </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.freshwatersystems.com/blogs/blog/how-to-check-your-well-tanks-pressure" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1813" instrument_node="">high pressure</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1812"></span><span class="screen-reader-text" data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1808" instrument_node=""> and heat in the tank. If not controlled, they can cause the tank to explode. This means replacing with a new unit, which can be very expensive, especially if it was new. So, install an overflow valve to release high heat and pressure inside the tank. Work with a plumber for the installation of pressure and temperature overflow valves. They will help you buy the right overflow valve for your unit.&nbsp;&nbsp;</span></p><span data-dcnode-id="1806" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1803"><figure class="aligncenter size-large" data-dcnode-id="1804"><img alt="gas pipeline setup" class="wp-image-155" data-dcnode-id="1805" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/12/gas-pipeline-setup-1024x682.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/12/gas-pipeline-setup-1024x682.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/12/gas-pipeline-setup-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/12/gas-pipeline-setup-768x512.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/12/gas-pipeline-setup-960x640.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/12/gas-pipeline-setup.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1802" instrument_node="">
</span><h3 data-dcnode-id="1798"><span data-dcnode-id="1801" instrument_node="">&nbsp;&nbsp;</span><br data-dcnode-id="1800"><span data-dcnode-id="1799" instrument_node="">5. Unit's Energy Efficiency&nbsp;&nbsp;</span></h3><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Energy efficiency is another crucial factor when installing a gas water heater. The level of efficiency determines several things, including utility cost, lifespan, among others. Invest in an energy-efficient system. All hot water system sold in Australia comes with an energy efficiency rating. So, it will be easy to choose in the market. But it's easier to use the help of a professional plumber to choose the most efficient unit for your home.&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">These are some of the most crucial factors to consider when installing gas hot water systems. We recommend working with plumbing professionals in Sydney like&nbsp;</span><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Off Tap Plumbing.&nbsp;</span></strong><span data-dcnode-id="1790" instrument_node="">They offer quality installation work at an affordable cost.&nbsp;</span></p><span data-dcnode-id="1788" instrument_node="">
</span><div class="ssba-classic-2 ssba ssbp-wrap left ssbp--theme-1" data-dcnode-id="1756"><div data-dcnode-id="1757" style="text-align:left"><span class="ssba-share-text" data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Share this...</span></span><br data-dcnode-id="1785"><a class="ssba_facebook_share" data-dcnode-id="1778" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//okeanostech.com/installing-gas-hot-water-systems/" target="_blank"><img alt="Share on Facebook" class="ssba ssba-img" data-dcnode-id="1784" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/facebook.png&amp;raw" style="width: 35px;" title="Facebook"><div class="ssbp-text" data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Facebook</span></div><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1781"></span><span class="screen-reader-text" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Opens in a new window</span></span></a><a class="ssba_twitter_share" data-dcnode-id="1774" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Furl%3Dhttps%3A//okeanostech.com/installing-gas-hot-water-systems/%26text%3DInstalling%2520Gas%2520Hot%2520Water%2520Systems%2520" target="&quot;_blank&quot;"><img alt="Tweet about this on Twitter" class="ssba ssba-img" data-dcnode-id="1777" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/twitter.png&amp;raw" style="width: 35px;" title="Twitter"><div class="ssbp-text" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Twitter</span></div></a><a class="ssba_linkedin_share ssba_share_link" data-dcnode-id="1770" data-site="linkedin" hr </span><article class="post-138 post type-post status-publish format-standard has-post-thumbnail category-technology tag-hot-water tag-solar-hot-water-system h-entry hentry h-as-article" data-dcnode-id="1534" id="post-138" itemscope="" itemtype="https://schema.org/Article"><span data-dcnode-id="1725" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1694"><span data-dcnode-id="1724" instrument_node="">
</span><a aria-hidden="true" class="post-thumbnail" data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/hot-water-system-demand/"><span data-dcnode-id="1723" instrument_node="">
</span><img alt="New Demand For Solar Powered Hot Water Systems" class="attachment-medium_large size-medium_large wp-post-image" data-dcnode-id="1722" height="327" itemprop="image" loading="lazy" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/10/new-demand-for-solar-powered-hot-water-systems-768x402.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/10/new-demand-for-solar-powered-hot-water-systems-768x402.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/10/new-demand-for-solar-powered-hot-water-systems-300x157.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/10/new-demand-for-solar-powered-hot-water-systems-1024x536.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/10/new-demand-for-solar-powered-hot-water-systems-960x502.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/10/new-demand-for-solar-powered-hot-water-systems.jpg 1200w" width="625"><span data-dcnode-id="1721" instrument_node=""> </span></a><span data-dcnode-id="1719" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1714" itemprop="headline"><span data-dcnode-id="1718" instrument_node="">
</span><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/hot-water-system-demand/" itemprop="url" rel="bookmark"><span data-dcnode-id="1717" instrument_node="">New Demand For Solar Powered Hot Water Systems</span></a><span data-dcnode-id="1715" instrument_node="">
</span></h2><span data-dcnode-id="1713" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1696"><span data-dcnode-id="1712" instrument_node="">
</span><span class="byline" data-dcnode-id="1706"><span class="author vcard" data-dcnode-id="1707" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="1709" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="1698"><span class="screen-reader-text" data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Published on </span></span><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/hot-water-system-demand/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1702" datetime="2020-11-18T16:50:00+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="1703" instrument_node="">November 18, 2020</span></time><time class="updated" data-dcnode-id="1700" datetime="2020-11-10T15:08:00+00:00"><span data-dcnode-id="1701" instrument_node="">November 10, 2020</span></time></a></span><span data-dcnode-id="1697" instrument_node="">
</span></div><span data-dcnode-id="1695" instrument_node="">
</span></header><span data-dcnode-id="1693" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1561" itemprop="articleBody"><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">You must have noticed an increased use in solar hot water systems in Indooroopilly, Kenmore, Tennyson, Chapel Hill, and others. The demand for these water heaters is growing at a fast rate compared to a few years back. So, what's causing this demand?</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Well, some reasons can explain why homeowners and commercial properties are going for solar water heater system. Experts at Hot Water Brisbane have provided us with the following factors that are creating this demand. They include:</span></p><span data-dcnode-id="1686" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1683"><figure class="aligncenter size-large is-resized" data-dcnode-id="1684"><img alt="solar hot water" class="wp-image-141" data-dcnode-id="1685" height="610" loading="lazy" sizes="(max-width: 564px) 100vw, 564px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/10/solar-hot-water-system.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/10/solar-hot-water-system.jpg 793w, https://okeanostech.com/wp-content/uploads/2020/10/solar-hot-water-system-277x300.jpg 277w, https://okeanostech.com/wp-content/uploads/2020/10/solar-hot-water-system-768x831.jpg 768w" width="564"></figure></div><span data-dcnode-id="1682" instrument_node="">
</span><h2 data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Environmental Awareness</span></h2><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1678" instrument_node="">Australians are more aware of environmental degradation today than ever before. The recent intense bush fires have shown us how bad is global warming can be. That's why people are now trying to use clean energy. The plumbing pros at Hot Water Brisbane have commented on the increased number of inquiries with regards to solar power </span><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hotwaterbrisbane.com.au/"><span data-dcnode-id="1677" instrument_node="">hot water plumber</span></a><span data-dcnode-id="1675" instrument_node=""> installations in areas such as Indooroopilly, Kenmore, Tennyson, Chapel Hill, and Kenmore Hills.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Plumbing technician Jeff suggested that the rising popularity of environmentally-friendly energy sources and campaigning in those areas have played a part in residences and commercial properties requesting for solar-powered hot water systems.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><h2 data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Availability of Solar System</span></h2><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">According to Jeff, a plumbing technician with Hot Water Brisbane, the solar hot water systems are more available than ever before. A decade ago, only a few brands were producing these types of water heaters worldwide. But with the growing demand for green energy, more manufacturers have come up.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1661"><figure class="aligncenter size-large is-resized" data-dcnode-id="1662"><img alt="woker fixing solar hot water system" class="wp-image-142" data-dcnode-id="1663" height="419" loading="lazy" sizes="(max-width: 630px) 100vw, 630px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/10/worker-fixing-solar-water-heater-on-roof.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/10/worker-fixing-solar-water-heater-on-roof.jpg 700w, https://okeanostech.com/wp-content/uploads/2020/10/worker-fixing-solar-water-heater-on-roof-300x200.jpg 300w" width="630"></figure></div><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">So, today, you enter a store in Brisbane and come out with a solar-powered water heater system. So, the ease of access to these types of hot water systems is one reason for the new demand. That never used to happen a while back. In some cases, you needed to place an order with the manufacturer for the unit to be constructed.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><h2 data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Government Incentives</span></h2><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">The Australian government is giving incentives to residents investing in clean energy. Most homeowners are applying for the STCs. It is a government scheme that provides financial incentives for people installing clean energy.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">So, you will get back some of the money you invested in a solar-powered hot water system. This is a big factor that is driving more and more Brisbane residents to install solar hot water systems. If you can get back thousands of dollars after installing this system, why not replace the old gas system with a solar-powered model?</span></p><span data-dcnode-id="1648" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1645"><figure class="aligncenter size-large is-resized" data-dcnode-id="1646"><img alt="panel cells of solar hot water system" class="wp-image-144" data-dcnode-id="1647" height="395" loading="lazy" sizes="(max-width: 653px) 100vw, 653px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/10/solar-hot-water-system-cell-panel.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/10/solar-hot-water-system-cell-panel.jpg 700w, https://okeanostech.com/wp-content/uploads/2020/10/solar-hot-water-system-cell-panel-300x182.jpg 300w" width="653"></figure></div><span data-dcnode-id="1644" instrument_node="">
</span><h2 data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Availability of Solar Energy</span></h2><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">In Brisbane, we have no shortage of solar energy. We have plenty of sunshine almost year-round, which is the energy need by these hot water systems to heat water. So, any technology that utilises solar energy will do very in this part of the country. This includes solar hot water systems.</span></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">The only time that you might need a backup is some days in winter when the sun might be weak. But for the other seasons of the years, you are guaranteed to get a constant supply of hot water from the unit. So, the availability of sunlight in Australia is one of the factors fueling demand for these water heaters.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><h2 data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Improved Efficiency</span></h2><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Unlike the first solar-powered hot water systems, today, we have some of the most efficient models. According to Jeff, solar hot water systems released a decade ago were super inefficient. They couldn't get the water hot during the fall and winter seasons. That's why the uptake by the market was not good.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">The modern solar-powered hot water systems are designed to maximise heat absorption. The new models come with high-efficiency evacuation tubes, which maximises solar heat absorption. So, they can heat water even during fall and winter. The insulated tank keeps the water hot for a long time. So, if your home water demand is not big, the tank can supply hot water for the whole night.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1623"><figure class="aligncenter size-large is-resized" data-dcnode-id="1624"><img alt="hot water powered by solar energy" class="wp-image-145" data-dcnode-id="1625" height="421" loading="lazy" sizes="(max-width: 660px) 100vw, 660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/10/faucet-with-hot-water.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/10/faucet-with-hot-water.jpg 700w, https://okeanostech.com/wp-content/uploads/2020/10/faucet-with-hot-water-300x192.jpg 300w" width="660"></figure></div><span data-dcnode-id="1622" instrument_node="">
</span><h2 data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Free Energy</span></h2><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Have you ever imagined how your energy bill would look like if you remove the water heater? Well, you can be sure that more than 30% will be slashed. That's the motivation driving Kenmore and other Brisbane suburbs to install these units.</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1612"><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgeographic.com/environment/global-warming/solar-power/" rel="nofollow"><span data-dcnode-id="1615" instrument_node="">Solar energy</span></a><span data-dcnode-id="1613" instrument_node=""> is available for free. It's a gift from nature that costs you nothing. After installation, you will enjoy a constant supply of hot water at zero heating costs. This will have a huge impact on your finance in the long run - you will be saving a lot of money.</span></p><span data-dcnode-id="1611" instrument_node="">
</span><h2 data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Low Maintenance Cost</span></h2><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">There is no doubt that a solar-powered hot water system is one of the most expensive water heaters. It might also cost you more to install compared to the electric models. That's unless you get financial incentives from the government. But Jeff mentioned that it is one of the cheapest water heaters to maintain.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1602"><figure class="aligncenter size-large is-resized" data-dcnode-id="1603"><img alt="fillng a tub with hot water powered by solar hot water system" class="wp-image-146" data-dcnode-id="1604" height="431" loading="lazy" sizes="(max-width: 648px) 100vw, 648px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/10/filling-a-bathtub-with-hot-water.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/10/filling-a-bathtub-with-hot-water.jpg 700w, https://okeanostech.com/wp-content/uploads/2020/10/filling-a-bathtub-with-hot-water-300x200.jpg 300w" width="648"></figure></div><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">One thing about these hot water systems is you don't need frequent maintenances. They do not have moving or heating parts like gas and electric models. So, their rate of wear and tear is very low. That's how the cost of maintaining these units is one of the lowest in the market.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">In conclusion, the solar-powered hot water system is the future. The fact it uses clean energy makes the planet safer. With advancing technology, we expect more improvement to make these units better. With time, they might wipe out the gas and electric hot water systems.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><div class="ssba-classic-2 ssba ssbp-wrap left ssbp--theme-1" data-dcnode-id="1563"><div data-dcnode-id="1564" style="text-align:left"><span class="ssba-share-text" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Share this...</span></span><br data-dcnode-id="1592"><a class="ssba_facebook_share" data-dcnode-id="1585" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//okeanostech.com/hot-water-system-demand/" target="_blank"><img alt="Share on Facebook" class="ssba ssba-img" data-dcnode-id="1591" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/facebook.png&amp;raw" style="width: 35px;" title="Facebook"><div class="ssbp-text" data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Facebook</span></div><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1588"></span><span class="screen-reader-text" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Opens in a new window</span></span></a><a class="ssba_twitter_share" data-dcnode-id="1581" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Furl%3Dhttps%3A//okeanostech.com/hot-water-system-demand/%26text%3DNew%2520Demand%2520For%2520Solar%2520Powered%2520Hot%2520Water%2520Systems%2520" target="&quot;_blank&quot;"><img alt="Tweet about this on Twitter" class="ssba ssba-img" data-dcnode-id="1584" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/twitter.png&amp;raw" style="width: 35px;" title="Twitter"><div class="ssbp-text" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Twitter</span></div></a><a class="ssba_linkedin_share ssba_share_link" data-dcnode-id="1577" data-site="link </span><header class="entry-header" data-dcnode-id="1501"><span data-dcnode-id="1531" instrument_node="">
</span><a aria-hidden="true" class="post-thumbnail" data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/keeping-tap-water-clean/"><span data-dcnode-id="1530" instrument_node="">
</span><img alt="How To Keep Your Tap Water Clean?" class="attachment-medium_large size-medium_large wp-post-image" data-dcnode-id="1529" height="469" itemprop="image" loading="lazy" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-768x576.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-768x576.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-300x225.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-1024x768.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-960x720.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass.jpg 1280w" width="625"><span data-dcnode-id="1528" instrument_node=""> </span></a><span data-dcnode-id="1526" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1521" itemprop="headline"><span data-dcnode-id="1525" instrument_node="">
</span><a data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/keeping-tap-water-clean/" itemprop="url" rel="bookmark"><span data-dcnode-id="1524" instrument_node="">How To Keep Your Tap Water Clean?</span></a><span data-dcnode-id="1522" instrument_node="">
</span></h2><span data-dcnode-id="1520" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1503"><span data-dcnode-id="1519" instrument_node="">
</span><span class="byline" data-dcnode-id="1513"><span class="author vcard" data-dcnode-id="1514" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="1516" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="1505"><span class="screen-reader-text" data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Published on </span></span><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/keeping-tap-water-clean/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1509" datetime="2020-07-08T06:21:01+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="1510" instrument_node="">July 8, 2020</span></time><time class="updated" data-dcnode-id="1507" datetime="2020-07-13T21:01:47+00:00"><span data-dcnode-id="1508" instrument_node="">July 13, 2020</span></time></a></span><span data-dcnode-id="1504" instrument_node="">
</span></div><span data-dcnode-id="1502" instrument_node="">
</span></header><span data-dcnode-id="1500" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1360" itemprop="articleBody"><span data-dcnode-id="1499" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1496"><figure class="aligncenter" data-dcnode-id="1497"><img alt="tap water being poured on a drinking glass" class="wp-image-131" data-dcnode-id="1498" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-1024x768.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-1024x768.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-300x225.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-768x576.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass-960x720.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/05/tap-water-being-poured-on-a-drinking-glass.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Tap water has increasingly become unsafe for drinking due to increased contamination. Although the local municipality may have treated the water, the possibility of contamination during supply is very high. That’s why households in Australia are advised to purify tap water before drinking.&nbsp;</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">The good news is that there many ways that you can keep tap water clean. Some of these ways may cost you some money, but others will cost you nothing apart from your time. In this guide, we have put together some 10 best ways of keeping tap water clean.&nbsp;</span></p><span data-dcnode-id="1489" instrument_node="">
</span><h2 data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">1. Boiling&nbsp;&nbsp;</span></h2><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">One of the easiest ways to keep tap water clean is boiling. It is one of the best homemade solutions for treating contaminated tap water. Boiling water kills all the deadly disease-causing microorganisms in the water. Studies have also shown that boiling water can also&nbsp;neutralise&nbsp;dangerous chemicals in the water. All you have to do is to put water in a pot or microwave-safe vessel and heat it to a rolling boil for at least 1 minute. Then allow it to cool before transferring it to a clean container.&nbsp;</span></p><span data-dcnode-id="1483" instrument_node="">
</span><h2 data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">2. Cleaning Kitchen Sink Drains&nbsp;</span></h2><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1479" instrument_node="">Most people don’t know that their kitchen sink drains could be contaminating their water. Clogs in the sink provide a perfect breeding ground for bacteria and other disease-causing microorganisms. Some of these bacteria and microorganism may find their way to the faucets, and that’s how they contaminate tap water. What you need is drain cleaning services to remove sink clogs. Check out&nbsp;</span><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.draincleaningbrisbane.com.au/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1478" instrument_node="">Drain Cleaning Brisbane</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1477"></span><span class="screen-reader-text" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1473" instrument_node="">&nbsp;for professional drain cleaning services. They are Brisbane plumbing specialists and will help you keep your tap water clean by cleaning your sink drains.&nbsp;</span></p><span data-dcnode-id="1471" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1468"><figure class="aligncenter" data-dcnode-id="1469"><img alt="clean kitchen sink" class="wp-image-132" data-dcnode-id="1470" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/05/clean-kitchen-sink-1024x682.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/05/clean-kitchen-sink-1024x682.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/05/clean-kitchen-sink-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/05/clean-kitchen-sink-768x512.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/05/clean-kitchen-sink-960x640.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/05/clean-kitchen-sink.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1467" instrument_node="">
</span><h2 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">3. Use Chlorine Bleach&nbsp;</span></h2><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Chlorine is one of the widely used chemicals for water purification. The chemical works by killing bacteria and other disease-causing microorganisms in the water. The chlorine bleach has a high concentration of acid. So, when added to the water, it makes raises water acidity making it impossible for the microorganisms to survive. You should use 8 drops for household bleach for 4&nbsp;litres&nbsp;of water. This will be enough to kill all the deadly bacteria and microorganisms in the water.&nbsp;</span></p><span data-dcnode-id="1461" instrument_node="">
</span><h2 data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">4. Use UV Light water Purifier&nbsp;</span></h2><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1457" instrument_node="">One of the most advanced technology in water purification is the use of&nbsp;</span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/50326-what-is-ultraviolet-light.html" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1456" instrument_node="">UV light</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1455"></span><span class="screen-reader-text" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1451" instrument_node="">. The UV light water purifiers use the ultraviolet light to kill bacterial, viruses, and protozoa in the water. All you need is a gadget that produces UV light clean tap water. Just turn the light on, drop it into the water in a container, and swish it around for a minute or as per manufacturer’s instructions. The remove it and the water will be clean and safe for drinking.&nbsp;</span></p><span data-dcnode-id="1449" instrument_node="">
</span><h2 data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">5. Use Iodine&nbsp;</span></h2><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Most of the water purification tablets are iodine. That’s something most people may not know. If you want to clean water at an affordable cost, you need to buying iodine. You can either buy iodine solution, tablets, or crystals for tap water cleaning. All you have to do is to add it into the water, shake well, and leave it for at least 5 minutes. Iodine kills bacteria, protozoans, and viruses in the water. However, it works great in warm water.&nbsp;</span></p><span data-dcnode-id="1443" instrument_node="">
</span><h2 data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">6. Use Water Filtration System&nbsp;</span></h2><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1439" instrument_node="">If you have some money to spend, then you need to consider </span><a aria-label="buying a water filter (opens in a new tab)" data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/dirty-water-purification/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1438" instrument_node="">buying a water filter</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1437"></span><span class="screen-reader-text" data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1433" instrument_node="">. There are many water filtration systems including carbon filters, reverse osmosis, and water&nbsp;ionisers&nbsp;amongst others. However, carbon filters are the most recommended because they get rid of chemicals such as lead and other disease-causing microorganisms. Water filters also remove particles in the water. In addition to that, there are some high-quality water purifiers that add minerals to the purified water.&nbsp;</span></p><span data-dcnode-id="1431" instrument_node="">
</span><h2 data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">7. Fix Leaks&nbsp;In&nbsp;Your Plumbing&nbsp;</span></h2><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">It is important that you check your plumbing system for leaks. In most cases, bacteria and other microorganisms contaminating tap water get access through cracked pipes. Therefore, you need to ensure that your plumbing system is inspected for leaks every often. However, it is important to ensure that you are dealing with a professional plumber when inspecting leaks. Look for someone who is using the latest leak detection and location technology.&nbsp;</span></p><span data-dcnode-id="1425" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1422"><figure class="aligncenter is-resized" data-dcnode-id="1423"><img alt="gold color faucets from kitchen sink" class="wp-image-133" data-dcnode-id="1424" height="573" loading="lazy" sizes="(max-width: 383px) 100vw, 383px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/05/gold-color-faucets-from-kitchen-sink-683x1024.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/05/gold-color-faucets-from-kitchen-sink-683x1024.jpg 683w, https://okeanostech.com/wp-content/uploads/2020/05/gold-color-faucets-from-kitchen-sink-200x300.jpg 200w" width="383"></figure></div><span data-dcnode-id="1421" instrument_node="">
</span><h2 data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">8. Always Clean Gasoline&nbsp;And&nbsp;Solvent Spill&nbsp;</span></h2><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1417" instrument_node="">Spills in your garage could find their way to your tap water through cross-contamination. Maybe the clean water pipe pass through the garage could get cracked hence allowing gasoline and solvent spill into your water supply. This exposes you to serious health complications since both liquids may contain lead and other harmful heavy metals. Therefore, always make sure that you have thoroughly cleaned gasoline and solvent spills. You will reduce not only diseases but also&nbsp;</span><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unenvironment.org/news-and-stories/story/conserving-our-planet-hectare-hectare" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1416" instrument_node="">environmental degradation</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1415"></span><span class="screen-reader-text" data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1411" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1409" instrument_node="">
</span><h2 data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">9. Update Your Plumbing System&nbsp;</span></h2><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">It is important that you update your plumbing system to maintain the quality of tap water. The water from the municipality could be clean but gets contaminated in your plumbing. There&nbsp;are&nbsp;old plumbing systems done using copper other metal pipes. With time, these metals start to rust hence contaminating the water with rust and harmful chemicals. Update such plumbing pipes with PVC and other modern options. You should also consider changing your faucets after using them for at least ten years.&nbsp;</span></p><span data-dcnode-id="1403" instrument_node="">
</span><h2 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">10. Water Softening&nbsp;</span></h2><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">One of the biggest problems in most households in Australia is hard water. If you are using water from your well, natural stream, and even the municipal supply, most of this water is hard. To keep your tap water clean, one of the things that you need to consider is installing a water softener at the entry point. It will significantly improve the quality of your tap water.&nbsp;</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">In conclusion, your tap water is not clean and safe for drinking. It is likely to be contaminated along with the supply or even in your home plumbing system. With these 10 tips, you will be able to improve the quality of your tap water as well as keep clean. However, some of these tips require the services of a plumbing specialist.&nbsp;</span></p><span data-dcnode-id="1394" instrument_node="">
</span><div class="ssba-classic-2 ssba ssbp-wrap left ssbp--theme-1" data-dcnode-id="1362"><div data-dcnode-id="1363" style="text-align:left"><span class="ssba-share-text" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Share this...</span></span><br data-dcnode-id="1391"><a class="ssba_facebook_share" data-dcnode-id="1384" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//okeanostech.com/keeping-tap-water-clean/" target="_blank"><img alt="Share on Facebook" class="ssba ssba-img" data-dcnode-id="1390" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/facebook.png&amp;raw" style="width: 35px;" title="Facebook"><div class="ssbp-text" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Facebook</span></div><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1387"></span><span class="screen-reader-text" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Opens in a new window</span></span></a><a class="ssba_twitter_share" data-dcnode-id="1380" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Furl%3Dhttps%3A//okeanostech.com/keeping-tap-water-clean/%26text%3DHow%2520To%2520Keep%2520Your%2520Tap%2520Water%2520Clean%253F%2520" target="&quot;_blank&quot;"><img alt="Tweet about this on Twitter" class="ssba ssba-img" data-dcnode-id="1383" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/twitter.png&amp;raw" style="width: 35px;" title="Twitter"><div class="ssbp-text" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Twitter</span></div></a><a class="ssba_linkedin_share ssba_share_link" data-dcnode-id="1376" data-site="linkedin" href="h
