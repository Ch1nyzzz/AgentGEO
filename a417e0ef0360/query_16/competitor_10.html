</span><article class="post-122 post type-post status-publish format-standard category-drinking-water category-technology tag-greywater tag-water-recycling h-entry hentry h-as-article" data-dcnode-id="1133" id="post-122" itemscope="" itemtype="https://schema.org/Article"><span data-dcnode-id="1331" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1305"><span data-dcnode-id="1330" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1325" itemprop="headline"><span data-dcnode-id="1329" instrument_node="">
</span><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/water-recycling/" itemprop="url" rel="bookmark"><span data-dcnode-id="1328" instrument_node="">How Does Water Recycling Work? What Is Grey Water Recycling System?</span></a><span data-dcnode-id="1326" instrument_node="">
</span></h2><span data-dcnode-id="1324" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1307"><span data-dcnode-id="1323" instrument_node="">
</span><span class="byline" data-dcnode-id="1317"><span class="author vcard" data-dcnode-id="1318" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="1320" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="1309"><span class="screen-reader-text" data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Published on </span></span><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/water-recycling/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1313" datetime="2020-06-06T10:48:00+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="1314" instrument_node="">June 6, 2020</span></time><time class="updated" data-dcnode-id="1311" datetime="2021-01-18T06:49:55+00:00"><span data-dcnode-id="1312" instrument_node="">January 18, 2021</span></time></a></span><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span></header><span data-dcnode-id="1304" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1163" itemprop="articleBody"><span data-dcnode-id="1303" instrument_node="">
</span><center data-dcnode-id="1301"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1302" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/uZXMOfkrZYA&amp;raw" width="560"></iframe></center><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Water is quickly becoming a scarce resource globally. The ever-increasing number of people without access to clean and safe water for drinking proves this finding. That’s why water recycling is increasingly becoming crucial in water conservation efforts.&nbsp;</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Water recycling is simply a water&nbsp;conservation method that includes&nbsp;treating wastewater with the intention to reuse it. Any wastewater from homes or industries can be collected and treated to make it safe for use. In addition, you can collect your greywater and use it directly in your yard or gardens instead of using tap water. But how does the water recycling work? Well, that’s what we are going to look into this guide.&nbsp;&nbsp;</span></p><span data-dcnode-id="1294" instrument_node="">
</span><h2 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">How Does Water Recycling Work?&nbsp;</span></h2><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">The working mechanism of water recycling is pretty simple. However, the method used for recycling depends on the kind of water that is being treated. For example, recycling wastewater that has&nbsp;faeces&nbsp;is not the same as recycling greywater. Similarly, the intended application of the recycled water is another factor that determines how you do recycling. For example, if the water is to be used for agriculture, then it needs to be thoroughly compared to yard irrigation water. In addition to that, you can have a&nbsp;customised&nbsp;solution for your wastewater.&nbsp;</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">For a standard water recycling system, it has four main stages of water recycling. They include removal of larger particles, filtration, chemical removal and lastly&nbsp;sterilisation. Here are the 4 stages explained:&nbsp;</span></p><span data-dcnode-id="1285" instrument_node="">
</span><h3 data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">1) Removal of Large Particles&nbsp;</span></h3><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">The first stage of water recycling is the removal of larger particles in the wastewater. Whether it is sewerage or industrial water, there are large particles that are easy to remove. Depending on the expected results, there are several approaches to be used. They can be mechanical sieving of the particles or machines designed for this work. Once the wastewater passes through this stage, it will come free of any large particles such as food chips and so on. However, it will still be dirty and unsafe for use.&nbsp;So,&nbsp;you need to take it to the next stage.&nbsp;&nbsp;</span></p><span data-dcnode-id="1279" instrument_node="">
</span><h3 data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">2) Filtration&nbsp;</span></h3><span data-dcnode-id="1276" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1273"><figure class="aligncenter" data-dcnode-id="1274"><img alt="clean drop of water" class="wp-image-103" data-dcnode-id="1275" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2019/10/clean-drop-of-water-1024x682.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2019/10/clean-drop-of-water-1024x682.jpg 1024w, https://okeanostech.com/wp-content/uploads/2019/10/clean-drop-of-water-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2019/10/clean-drop-of-water-768x512.jpg 768w, https://okeanostech.com/wp-content/uploads/2019/10/clean-drop-of-water-960x640.jpg 960w, https://okeanostech.com/wp-content/uploads/2019/10/clean-drop-of-water.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">After you have removed all particles in the wastewater, the next stage is filtration. The filtration system is subdivided into two stages. Although the water has large particles removed, there is the likelihood of more particles in the water. So, the first stage in the filtration process is pushing water through fine sand and gravels to remove remaining particles. The second stage is filtering the water using a 3-stage cartridge filtration system. It is a powerful filtration system that produces the required maximum particle size. While at this stage, the water is free of particles and some of the microorganisms, including some bacteria.&nbsp;</span></p><span data-dcnode-id="1269" instrument_node="">
</span><h3 data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">3) Removing Chemicals&nbsp;</span></h3><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">One of the major components in wastewater is the chemicals. Whether it’s greywater or industrial ones, you will find chemicals that make water unsafe for human use. The most common are the surfactants. These chemicals found in detergents and that’s why you can’t miss them in the wastewater. Other components common components in wastewater include calcium, manganese ions, iron, and magnesium. They are responsible for the hardening of the used water.&nbsp;&nbsp;</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">At this stage, chemicals such as phosphate are added to the water to remove water hardening components. However, it does not remove surfactants, and both are harmful to animals and plants. There are two ways that you can remove these two components from the water- chemicals that coagulate them or using bacteria to decompose them. Up to this stage, the water is safe to be used for but not human use. If the water is for cooking or doing laundry, you need to go to the fourth stage.&nbsp;</span></p><span data-dcnode-id="1260" instrument_node="">
</span><h3 data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">4)&nbsp;Sterilisation&nbsp;</span></h3><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">The fourth and last stage is&nbsp;sterilisation. Once the water is free of detergents and other chemicals free, the only thing that you need to remove to make safe for human use is eliminating diseases causing organisms, parasites, bacteria and viruses. There are many ways you can&nbsp;sterilise&nbsp;the water with chlorination being one of the most common. Chlorine is the most efficient water treatment when it comes to getting rid of microorganisms in the contaminated water. It is also one of the best options for water that is to be stored for future use.&nbsp;</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1247"><a aria-label="UV&nbsp;sterilisation (opens in a new tab)" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.h2odistributors.com/pages/info/how-ultraviolet-purification-works.asp" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1253" instrument_node="">UV&nbsp;sterilisation</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1252"></span><span class="screen-reader-text" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1248" instrument_node="">&nbsp;is growing popular with outdoor adventurers. The water treatment method uses UV rays to kill all microorganisms and parasitic pathogens in the water. The technology works by disrupting pathogens’ cellular functioning. The technique is ideal for emergency water&nbsp;sterilisation. In just a matter of seconds, UV rays will have&nbsp;sterilised&nbsp;the water.&nbsp;</span></p><span data-dcnode-id="1246" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1243"><figure class="aligncenter" data-dcnode-id="1244"><img alt="woman drinking water on a tumbler outdoors" class="wp-image-124" data-dcnode-id="1245" height="666" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/03/woman-drinking-water-on-a-tumbler-outdoors-1024x666.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/03/woman-drinking-water-on-a-tumbler-outdoors-1024x666.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/03/woman-drinking-water-on-a-tumbler-outdoors-300x195.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/03/woman-drinking-water-on-a-tumbler-outdoors-768x499.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/03/woman-drinking-water-on-a-tumbler-outdoors-960x624.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/03/woman-drinking-water-on-a-tumbler-outdoors.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1242" instrument_node="">
</span><h2 data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">What Is Grey Water Recycling System?&nbsp;</span></h2><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Unlike the typical wastewater, greywater is any water coming from all parts of your home except the toilet. Therefore, it should not come into contact with&nbsp;faeces. So, it is water from your tubs, bathroom, washing machine, shower and sink. This water contains traces of grease, dirt and food.&nbsp;</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Although it is dirty, you can use it for irrigating yards and even growing plants. In facts, this water could be more nutritious than tap water. Therefore, a greywater recycling system is a system that enables you to recycle your greywater and reuse it. There are three main greywater recycling systems you can use depending on the intended application. They include:&nbsp;</span></p><span data-dcnode-id="1233" instrument_node="">
</span><h3 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Direct use System&nbsp;</span></h3><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">This is where the greywater from the house is collected and directed to the yard or gardens. In this case, all you need is a plumbing system or a pipe to take the water to the gardens. You don’t need to do any form of treatment to reuse the water. With that, you will be able to reduce the amount of water used in your home.&nbsp;</span></p><span data-dcnode-id="1227" instrument_node="">
</span><h3 data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Biological&nbsp;System&nbsp;</span></h3><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">There several ways that biological systems work. First, you can use sand to filter the water if you don’t want food particles. All you need is to pour water in a sandbox and use gravity to remove large particles in the water. The second biological system involves treating the greywater using a septic tank.&nbsp;</span></p><span data-dcnode-id="1221" instrument_node="">
</span><h3 data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Mechanical Filters System&nbsp;</span></h3><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">This is a straightforward process of recycling greywater. What you need is to undo the U-bend under a sink and collect the used water in a bucket. Then you can manually pour the water in your toilet’s cistern. However, it can be a time-consuming and tiresome system, but it works in case of no alternative.&nbsp;</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1214" instrument_node="">In conclusion, water recycling is crucial when it comes to water conservations. It helps to reduce the amount of water usage by reusing wastewater. The water conservation method can also be on a larger scale by factories and huge companies to reduce their </span><a aria-label="water consumption (opens in a new tab)" data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1213" instrument_node="">water consumption</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1212"></span><span class="screen-reader-text" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1208" instrument_node="">. It’s a water conservation method that will not only reduce water usage but also cut on your water bills.&nbsp;</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1205"></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1198"><em data-dcnode-id="1199"><span data-dcnode-id="1203" instrument_node="">See our latest post about how we </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/outsourcing-business-services/"><span data-dcnode-id="1202" instrument_node="">outsource business tasks</span></a><span data-dcnode-id="1200" instrument_node=""> so we can focus on water research and better product development. </span></em></p><span data-dcnode-id="1197" instrument_node="">
</span><div class="ssba-classic-2 ssba ssbp-wrap left ssbp--theme-1" data-dcnode-id="1165"><div data-dcnode-id="1166" style="text-align:left"><span class="ssba-share-text" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Share this...</span></span><br data-dcnode-id="1194"><a class="ssba_facebook_share" data-dcnode-id="1187" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//okeanostech.com/water-recycling/" target="_blank"><img alt="Share on Facebook" class="ssba ssba-img" data-dcnode-id="1193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/facebook.png&amp;raw" style="width: 35px;" title="Facebook"><div class="ssbp-text" data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Facebook</span></div><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1190"></span><span class="screen-reader-text" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Opens in a new window</span></span></a><a class="ssba_twitter_share" data-dcnode-id="1183" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Furl%3Dhttps%3A//okeanostech.com/water-recycling/%26text%3DHow%2520Does%2520Water%2520Recycling%2520Work%253F%2520What%2520Is%2520Grey%2520Water%2520Recycling%2520System%253F%2520" target="&quot;_blank&quot;"><img alt="Tweet about this on Twitter" class="ssba ssba-img" data-dcnode-id="1186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/twitter.png&amp;raw" style="width: 35px;" title="Twitter"><div class="ssbp-text" data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Twitter</span></div></a><a class="ssba_linkedin_share ssba_share_link" data-dcnode- </span><header class="entry-header" data-dcnode-id="1105"><span data-dcnode-id="1130" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1125" itemprop="headline"><span data-dcnode-id="1129" instrument_node="">
</span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/lemon-water/" itemprop="url" rel="bookmark"><span data-dcnode-id="1128" instrument_node="">How To Make Warm Lemon Water</span></a><span data-dcnode-id="1126" instrument_node="">
</span></h2><span data-dcnode-id="1124" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1107"><span data-dcnode-id="1123" instrument_node="">
</span><span class="byline" data-dcnode-id="1117"><span class="author vcard" data-dcnode-id="1118" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="1120" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="1109"><span class="screen-reader-text" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Published on </span></span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/lemon-water/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1113" datetime="2020-03-03T05:18:40+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="1114" instrument_node="">March 3, 2020</span></time><time class="updated" data-dcnode-id="1111" datetime="2020-03-03T05:30:41+00:00"><span data-dcnode-id="1112" instrument_node="">March 3, 2020</span></time></a></span><span data-dcnode-id="1108" instrument_node="">
</span></div><span data-dcnode-id="1106" instrument_node="">
</span></header><span data-dcnode-id="1104" instrument_node="">
</span><div class="entry-content" data-dcnode-id="958" itemprop="articleBody"><span data-dcnode-id="1103" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1100"><figure class="aligncenter" data-dcnode-id="1101"><img alt="woman holding a glass of lemon water" class="wp-image-115" data-dcnode-id="1102" height="768" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/woman-holding-a-glass-of-lemon-water-1024x768.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/woman-holding-a-glass-of-lemon-water-1024x768.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/01/woman-holding-a-glass-of-lemon-water-300x225.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/01/woman-holding-a-glass-of-lemon-water-768x576.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/woman-holding-a-glass-of-lemon-water-960x720.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/woman-holding-a-glass-of-lemon-water.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">The numerous health benefits of drinking infused water are the reasons why health experts recommend it. These waters are rich in vitamins, which helps in boosting immunity and improve metabolism, amongst other health benefits. Warm lemon water is one of the most recommended infused water.&nbsp;</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Lemon is rich in vitamin C, B vitamins (B1, B2, B5, and B6) as well as minerals such as copper, iron, calcium, and potassium. That’s why medical experts recommend its infused water because of the many nutrients it provides to the body. However, most people have no idea how to make a perfect warm lemon. In this guide, we will show you how to make warm lemon water and also the benefits of this infused water and how to drink it for maximum benefit.&nbsp;</span></p><span data-dcnode-id="1093" instrument_node="">
</span><h2 data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">How To Make Warm Lemon&nbsp;Water&nbsp;</span></h2><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">The recipe for making warm lemon water is pretty simple. The main ingredients are the lemon and warm water - that’s all you need. However, we recommend the use of filtered water or clean and safe water for drinking. There are three main steps to make a perfect infused lemon water.&nbsp;</span></p><span data-dcnode-id="1087" instrument_node="">
</span><h3 data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Steps&nbsp;</span></h3><span data-dcnode-id="1084" instrument_node="">
</span><ol data-dcnode-id="1077"><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Slice the lemon in quarters (…wash the fruit properly). Then, squeeze the juice into a jug of water. If you have invested in a juicer reamer, then it might make things easier.&nbsp;</span></li><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Add warm in the juice. Ideal warm water should 1/3 cup of boiling water and ¼ of cold water. Warm water helps to extract Vitamin C and other nutrients.</span></li><li data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Once the juice and the warm water have properly mixed, add peels. Lemon peels are rich in various vitamins, minerals, and fiber, such as potassium, calcium, and Vitamin C.&nbsp; &nbsp; </span></li></ol><span data-dcnode-id="1076" instrument_node="">
</span><center data-dcnode-id="1074"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1075" frameborder="0" height="315" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/4B5uaY0oKSI&amp;raw" width="560"></iframe></center><span data-dcnode-id="1073" instrument_node="">
</span><h2 data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">5 Main Benefits of Warm Lemon water&nbsp;</span></h2><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">There are many health benefits associated with lemon water. With its vaster range of vitamins and minerals, drinking lemon water improves the health of your body. Here are some of the main health benefits you get from drinking warm lemon water every morning:&nbsp;</span></p><span data-dcnode-id="1067" instrument_node="">
</span><h3 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Improved Digestion&nbsp;</span></h3><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Improved digestion is one of the main benefits of drinking lemon water. Lemon helps to flush out unwanted materials and toxins in the digestive system, which are also responsible for poor digestion. In addition to that, warm lemon water has the same atomic composition as the saliva and the digestive juice in the stomach. Therefore, it stimulates the liver to produce bile hence improved digestion. Last but not least, lemon contains minerals and vitamins that help to clear the digestive tract for better digestion.&nbsp;</span></p><span data-dcnode-id="1061" instrument_node="">
</span><h3 data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Cleansing Your System&nbsp;</span></h3><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Lemon helps to flush out unwanted materials, including toxins; hence, cleansing your system. It is one of the best detox fruits. For example, warm lemon water helps to increase the rate of urination. That means more toxins and other unwanted materials will be flushed out through urine. Additionally, citric acid in lemon stimulates an enzyme that aids detoxification to enhance the cleansing of your system.&nbsp;</span></p><span data-dcnode-id="1055" instrument_node="">
</span><h3 data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Boosting Your Immunity&nbsp;</span></h3><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Lemon contains vitamins and minerals that promote body immunity. Vitamin C is best known for helping the body fight colds. It also helps in preventing and treating inflammation, asthma, and other respiratory symptoms. On the other hand, potassium helps to stimulate brain and nerve function as well as helps to control blood pressure. These are just some of the ways drinking lemon can help boost your immunity of the body.&nbsp;</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h3 data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Helps to Balance pH&nbsp;</span></h3><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1039"><a aria-label="Balancing the pH of the body is essential to your overall health (opens in a new tab)" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/ph-imbalance" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1045" instrument_node="">Balancing the pH of the body is essential to your overall health</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1044"></span><span class="screen-reader-text" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1040" instrument_node="">. Our bodies tend to get too acidic due to the kind of foods that we eat. Once the body becomes acidic, then it becomes susceptible to diseases such as cancer, amongst others. Lemon is alkaline, and thus, drinking warm lemon water helps to remove/lower acidity by making the body more alkaline. That’s how it helps to balance the pH of the body.&nbsp;</span></p><span data-dcnode-id="1038" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1035"><figure class="aligncenter" data-dcnode-id="1036"><img alt="infused lemon water" class="wp-image-116" data-dcnode-id="1037" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/infused-lemon-water-1024x682.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/infused-lemon-water-1024x682.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/01/infused-lemon-water-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/01/infused-lemon-water-768x512.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/infused-lemon-water-960x640.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/infused-lemon-water.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="1034" instrument_node="">
</span><h3 data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Promotes Hydration&nbsp;</span></h3><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1030" instrument_node="">Drinking water is crucial for a well-hydrated body. It is recommended that you drink between 8 and 12 glasses of water of 8 ounces a day. By drinking a glass of lemon water, you will be contributing to this amount.&nbsp;Drinking plain water, however, is also beneficial in promoting hydration for the body. And if you're like me who is used to drinking it cold, keeping it safe and clean is always a foremost requirement. David Wherrett from </span><a aria-label="Discount Fridge Filters (opens in a new tab)" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//discountfridgefilters.com.au/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1029" instrument_node="">Discount Fridge Filters</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="1028"></span><span class="screen-reader-text" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="1024" instrument_node=""> said that "high-quality&nbsp;refrigerator&nbsp;water&nbsp;filters do&nbsp;a good job of keeping harmful&nbsp;bacteria&nbsp;and contaminants out of the water we drink." So investing in a good fridge water filter will bring more health for you and your family. </span></p><span data-dcnode-id="1022" instrument_node="">
</span><h2 data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Best Way&nbsp;To&nbsp;Warm Lemon Drink For Maximum Benefits&nbsp;</span></h2><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">For you to get the most out of the warm lemon water, you must take into consideration several things. You need to know how to drink lemon water to get maximum nutrients out of it. There are three things that you must get right – the type of water, size of a lemon, and the right time.&nbsp;</span></p><span data-dcnode-id="1016" instrument_node="">
</span><h3 data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">1. Use Warm Water&nbsp;</span></h3><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">To extract all the nutrients from the lemon, you need to use warm water. The higher temperature in the water helps to extract crucial nutrients such as Vitamin C and polyphenols from the fruit. So, don’t use boiling as it might negate some of the benefits, while cold water may not extract essential nutrients, especially from the peel.&nbsp;</span></p><span data-dcnode-id="1010" instrument_node="">
</span><h3 data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">2. Best Time&nbsp;Of&nbsp;The Day To Drink&nbsp;</span></h3><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Timing is crucial when it comes to drinking your warm lemon water. To get the most out of this water, drink it when the body is extremely dehydrated. Our bodies are most hydrated when we wake up. So, grab your glass first thing in the morning when you wake up. The body will absorb most of the nutrients in this lemon.&nbsp;</span></p><span data-dcnode-id="1004" instrument_node="">
</span><h3 data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">3. Quantity Of lemon&nbsp;</span></h3><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The other thing you need to put into consideration is the amount of lemon to use. The most recommend number is one lemon person. However, you need to use the whole lemon for you to get maximum nutrients. After squeezing the juice, you also need to put peels in the glass. Lemon peels contain polyphenol, which helps to improve metabolism and dealing with overweight issues.&nbsp;</span></p><span data-dcnode-id="998" instrument_node="">
</span><h2 data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Conclusion&nbsp;</span></h2><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Drink warm lemon water first thing when you wake up. It will go a long way in not only hydrates your body but also improve your overall health. Lemon helps to heal inflammation, improve your immunity, and so on. However, make sure that you have used a whole lemon (plus peels), warm water, and follow the right preparation procedure. That’s how you get the most out of lemon-infused water.&nbsp;</span></p><span data-dcnode-id="992" instrument_node="">

</span><article class="post-118 post type-post status-publish format-standard category-drinking-water tag-rainwater h-entry hentry h-as-article" data-dcnode-id="766" id="post-118" itemscope="" itemtype="https://schema.org/Article"><span data-dcnode-id="929" instrument_node="">
</span><header class="entry-header" data-dcnode-id="903"><span data-dcnode-id="928" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="923" itemprop="headline"><span data-dcnode-id="927" instrument_node="">
</span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/drinking-rainwater/" itemprop="url" rel="bookmark"><span data-dcnode-id="926" instrument_node="">Is Rain Water Clean And Safe To Drink?</span></a><span data-dcnode-id="924" instrument_node="">
</span></h2><span data-dcnode-id="922" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="905"><span data-dcnode-id="921" instrument_node="">
</span><span class="byline" data-dcnode-id="915"><span class="author vcard" data-dcnode-id="916" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="918" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="907"><span class="screen-reader-text" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Published on </span></span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/drinking-rainwater/" rel="bookmark"><time class="entry-date published" data-dcnode-id="911" datetime="2020-02-28T08:35:30+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="912" instrument_node="">February 28, 2020</span></time><time class="updated" data-dcnode-id="909" datetime="2020-03-03T04:52:58+00:00"><span data-dcnode-id="910" instrument_node="">March 3, 2020</span></time></a></span><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span></header><span data-dcnode-id="902" instrument_node="">
</span><div class="entry-content" data-dcnode-id="790" itemprop="articleBody"><span data-dcnode-id="901" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="898"><figure class="aligncenter" data-dcnode-id="899"><img alt="rainfall" class="wp-image-119" data-dcnode-id="900" height="684" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/rainfall-1024x684.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/rainfall-1024x684.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/01/rainfall-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/01/rainfall-768x513.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/rainfall-960x641.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/rainfall.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">There has been a misconception that rainwater is the cleanest and safest to drink. But you will be surprised to learn that that may not be the case. According to various studies conducted on this water, it has been proven that it can be as polluted as any other water. So, it is not safe to drink rainwater directly.&nbsp;</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Unlike some decades ago, today we have one of the most polluted atmospheres. There are so many harmful and acidic gases in the air that end up contaminating rainwater. In addition, rainwater harvesting methods are also contributing to the contamination. So, is rainwater clean and safe to drink? Well, the answer is no. We have provided 7 major reasons why rainwater is not clean and safe to drink:&nbsp;</span></p><span data-dcnode-id="891" instrument_node="">
</span><h2 data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Acidic Rain&nbsp;</span></h2><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="887" instrument_node="">One of the potential contaminants of rainwater is acids. There are many acidic gases in the air, which combines with rainwater to create </span><a aria-label="acidic rain (opens in a new tab)" data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epa.gov/acidrain/effects-acid-rain" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="886" instrument_node="">acidic rain</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="885"></span><span class="screen-reader-text" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="881" instrument_node="">. Some of the common acidic gases include&nbsp;sulphur&nbsp;dioxide and nitrogen oxides. They are produced by factories and the burning of fossil fuels. So, if you are leaving near an industrial area, you might be harvesting acidic rains because of the acidic gases in your atmosphere. That makes your rainwater unsafe for drinking.&nbsp;&nbsp;</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">That simply means that you might have a clean and well-kept water harvesting system, but the collected water is acidic. In some cases, acidic rain may reach a pH of 2, although the most common is 4. Whichever the case, the water is too acidic and cause serious health complications. That is one of the reasons why rainwater may not be clean and safe for drinking.&nbsp;</span></p><span data-dcnode-id="876" instrument_node="">
</span><h2 data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Dust&nbsp;&nbsp;</span></h2><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">When dust particles are picked by wind, they become part of the atmosphere. So, when the water&nbsp;vapour&nbsp;starts condensing, or it starts raining, it collects these particles. The dust and dirt particles could be carrying anything from germs to deadly contaminants such as heavy metals to diseases causing microorganisms. Germs and bacteria are the most common microorganisms in the dust. Therefore, the water might appear clean but highly contaminated. That makes it not safe for direct human consumption. Therefore, you will need to have the water filtered or treated to remove the contaminants before drinking.&nbsp; That is why investing in a water filter is highly recommended.&nbsp;</span></p><span data-dcnode-id="870" instrument_node="">
</span><h2 data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Smoke and Pollen&nbsp;</span></h2><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="866" instrument_node="">For the water to be </span><a aria-label=" (opens in a new tab)" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/water-purification-tablets/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="865" instrument_node="">clean and safe for drinking</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="864"></span><span class="screen-reader-text" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="860" instrument_node="">, it must be free of any form of foreign particles or contaminants. But it’s very difficult to find rain that offers meets these standards. Smoke and pollen are some of the common foreign particles in rainwater. If there are areas that are producing smoke such as factories or burning forests, then these particles will be captured and brought back to the ground by rainwater. Some of the smokes could be carrying harmful gases that can harm your health. Therefore, such water should be treated before drinking. Otherwise, you might end up consuming harmful chemicals.&nbsp;</span></p><span data-dcnode-id="858" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="855"><figure class="aligncenter is-resized" data-dcnode-id="856"><img alt="woman in the rain" class="wp-image-120" data-dcnode-id="857" height="662" loading="lazy" sizes="(max-width: 497px) 100vw, 497px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/woman-in-the-rain-768x1024.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/woman-in-the-rain-768x1024.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/woman-in-the-rain-225x300.jpg 225w, https://okeanostech.com/wp-content/uploads/2020/01/woman-in-the-rain-960x1280.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/woman-in-the-rain.jpg 1280w" width="497"></figure></div><span data-dcnode-id="854" instrument_node="">
</span><h2 data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Roof Contaminants&nbsp;</span></h2><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">The condition of the roof that’s collecting rainwater is another factor to consider. When the rain washes across the roof, it collects everything including germs, dust and chemicals attached to it. That’s how the harvested rainwater becomes unsafe. Additionally, construction materials such as asbestos and asphalt, which are petroleum products, and metals such as lead and copper on the roof can also contaminate water. All these contaminants will find their way into your water storage. Unless this water is filtered before use, it is not safe for drinking. You should also consider cleaning your roof before rains start.&nbsp;</span></p><span data-dcnode-id="848" instrument_node="">
</span><h2 data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Bacteria and Virus&nbsp;In&nbsp;Rainwater&nbsp;</span></h2><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Contrary to what some people think, there could be many bacteria and viruses in the rainwater. Most of these bacteria are collected on the roof and gutters. However, there are airborne bacteria in the atmosphere which finds their back to the ground through the rain. For the roofs, most of the bacteria are in the dust particle as well as from the bird droppings. Small animals that can climb up the roof, such as cats can also spread bacteria. In addition to that, bacteria could also be coming from decomposing organic matter such as plants and dead animals in the storage. All these types of bacteria and viruses make rainwater unsafe for drinking.&nbsp;</span></p><span data-dcnode-id="842" instrument_node="">
</span><h2 data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Contaminated Storage&nbsp;</span></h2><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">One of the biggest mistakes that people make is poor storage for the harvested rainwater. If you have done everything right up to the storage, then you need to keep this water in the tank for a very short time. The longest you can have it in the tank is ten days after harvesting. If it goes beyond ten days, then you will have a problem of contamination. The most common contamination is mosquito larvae contamination. You should also install screens to prevent debris and animal contamination such as bird dropping entering the storage.&nbsp;</span></p><span data-dcnode-id="836" instrument_node="">
</span><h2 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Odours&nbsp;</span></h2><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">As the rainwater washes over the roof and gutters, it collects a lot of dust and dirt which forms sediment and slime at the bottom of the tank. If the water stays in the storage tank for long, the sediment accumulating at the bottom will start decaying. That’s when you will start experiencing some unpleasant smell and sometimes tastes coming from the water. The unpleasant&nbsp;odour&nbsp;will get stronger as the time goes as well as the water level lowers due to higher concentration. In such cases, then the water will not be safe for drinking.&nbsp;</span></p><span data-dcnode-id="830" instrument_node="">
</span><h2 data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Conclusion&nbsp;</span></h2><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Rainwater may look clean, but it can be heavily contaminated. There are a lot of contaminants in the atmosphere and throughout the rainwater collection system, which makes it unsafe for drinking. From germs, dust particles, bacteria, virus and parasitic microorganisms, there are many contaminants that can cause serious health complication. So, you need to treated or filter your rainwater before drinking to make clean and safe.&nbsp;</span></p><span data-dcnode-id="824" instrument_node="">
</span><div class="ssba-classic-2 ssba ssbp-wrap left ssbp--theme-1" data-dcnode-id="792"><div data-dcnode-id="793" style="text-align:left"><span class="ssba-share-text" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Share this...</span></span><br data-dcnode-id="821"><a class="ssba_facebook_share" data-dcnode-id="814" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//okeanostech.com/drinking-rainwater/" target="_blank"><img alt="Share on Facebook" class="ssba ssba-img" data-dcnode-id="820" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/facebook.png&amp;raw" style="width: 35px;" title="Facebook"><div class="ssbp-text" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Facebook</span></div><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="817"></span><span class="screen-reader-text" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Opens in a new window</span></span></a><a class="ssba_twitter_share" data-dcnode-id="810" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Furl%3Dhttps%3A//okeanostech.com/drinking-rainwater/%26text%3DIs%2520Rain%2520Water%2520Clean%2520And%2520Safe%2520To%2520Drink%253F%2520" target="&quot;_blank&quot;"><img alt="Tweet about this on Twitter" class="ssba ssba-img" data-dcnode-id="813" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/twitter.png&amp;raw" style="width: 35px;" title="Twitter"><div class="ssbp-text" data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Twitter</span></div></a><a class="ssba_linkedin_share ssba_share_link" data-dcnode-id="806" data-site="linkedin" href="https://chatnoir-we </span><article class="post-107 post type-post status-publish format-standard has-post-thumbnail category-drinking-water tag-water-purification-tablets h-entry hentry h-as-article" data-dcnode-id="593" id="post-107" itemscope="" itemtype="https://schema.org/Article"><span data-dcnode-id="764" instrument_node="">
</span><header class="entry-header" data-dcnode-id="733"><span data-dcnode-id="763" instrument_node="">
</span><a aria-hidden="true" class="post-thumbnail" data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/water-purification-tablets/"><span data-dcnode-id="762" instrument_node="">
</span><img alt="How Do Water Purification Tablets Work? Are They Proven Safe?" class="attachment-medium_large size-medium_large wp-post-image" data-dcnode-id="761" height="438" itemprop="image" loading="lazy" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-768x538.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-768x538.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-300x210.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-1024x718.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-960x673.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets.jpg 1280w" width="625"><span data-dcnode-id="760" instrument_node=""> </span></a><span data-dcnode-id="758" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="753" itemprop="headline"><span data-dcnode-id="757" instrument_node="">
</span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/water-purification-tablets/" itemprop="url" rel="bookmark"><span data-dcnode-id="756" instrument_node="">How Do Water Purification Tablets Work? Are They Proven Safe?</span></a><span data-dcnode-id="754" instrument_node="">
</span></h2><span data-dcnode-id="752" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="735"><span data-dcnode-id="751" instrument_node="">
</span><span class="byline" data-dcnode-id="745"><span class="author vcard" data-dcnode-id="746" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span class="screen-reader-text" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Author </span></span><a class="url fn n" data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/author/info/" itemprop="url name" rel="author"><span data-dcnode-id="748" instrument_node="">Carolyn Graves</span></a></span></span><span class="posted-on" data-dcnode-id="737"><span class="screen-reader-text" data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Published on </span></span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/water-purification-tablets/" rel="bookmark"><time class="entry-date published" data-dcnode-id="741" datetime="2020-01-17T21:48:03+00:00" itemprop="dateModified datePublished"><span data-dcnode-id="742" instrument_node="">January 17, 2020</span></time><time class="updated" data-dcnode-id="739" datetime="2020-01-17T22:13:28+00:00"><span data-dcnode-id="740" instrument_node="">January 17, 2020</span></time></a></span><span data-dcnode-id="736" instrument_node="">
</span></div><span data-dcnode-id="734" instrument_node="">
</span></header><span data-dcnode-id="732" instrument_node="">
</span><div class="entry-content" data-dcnode-id="617" itemprop="articleBody"><span data-dcnode-id="731" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="728"><figure class="aligncenter" data-dcnode-id="729"><img alt="drinking water on tablets" class="wp-image-108" data-dcnode-id="730" height="718" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-1024x718.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-1024x718.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-300x210.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-768x538.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets-960x673.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/drinking-water-on-tablets.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">If you want to purify water while on the go, then water purification tablets would be your best option. This method of water purification is commonly used by backpackers and other outdoor adventurers due to their ease of use. They are also widely used during disasters such as floods when the available water is unsafe for drinking.&nbsp;&nbsp;</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">However, the question most people ask is its effectiveness and how it really works. We are going to look at the way these tablets&nbsp;work&nbsp;in this guide. We are also going to look deeper into their safety and effectiveness.&nbsp;&nbsp;</span></p><span data-dcnode-id="721" instrument_node="">
</span><h2 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">How Water Purification Tablets Works&nbsp;</span></h2><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Just like most of the water purification methods, these tablets are typically chlorine, iodine and chlorine dioxide. When these chemicals mix with water, they create an environment which bacteria, parasitic protozoans and viruses cannot survive.&nbsp;So,&nbsp;they will kill all these diseases causing microorganisms in the water, rendering them harmless and safe for drinking.&nbsp;</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="714" instrument_node="">For the backpackers and other outdoor adventurers, there are many contaminants in the water that can cause serious </span><a aria-label="health complications (opens in a new tab)" data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.who.int/news-room/fact-sheets/detail/drinking-water" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="713" instrument_node="">health complications</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="712"></span><span class="screen-reader-text" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="708" instrument_node="">. For example, Campylobacter&nbsp;jejuni&nbsp;and&nbsp;Giardi&nbsp;Lumblia&nbsp;are some of the harmful microorganisms in the wilderness. Therefore, even the stream water is deep in the wilderness could be having deadly contaminants. That is why you should bring water purification tablets with you when venturing outdoors.&nbsp;&nbsp;</span></p><span data-dcnode-id="706" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="703"><figure class="aligncenter" data-dcnode-id="704"><img alt="group of mountaineers" class="wp-image-109" data-dcnode-id="705" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/group-of-mountaineers-1024x682.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/group-of-mountaineers-1024x682.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/01/group-of-mountaineers-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/01/group-of-mountaineers-768x512.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/group-of-mountaineers-960x640.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/group-of-mountaineers.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="702" instrument_node="">
</span><h2 data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Water Purification Steps&nbsp;</span></h2><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">For these tablets to work, there are several things you must get right. First are the steps that you need to follow to be sure that the water is safe for drinking. Second is the chemical concentration in the tablet. Note that these tablets effectiveness may vary depending on the amount of the active ingredient. Here are three main steps to follow to purify water using the water purification tablets.&nbsp;</span></p><span data-dcnode-id="696" instrument_node="">
</span><ol data-dcnode-id="689"><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">The number of tablets. The first thing that you need to get right is the number of tablets you need to purify the water. However, this goes hand in hand with the amount that each tablet can purify. Note that if you put a small amount of the chemical, you will not kill the bacteria, viruses and protozoans in the water. Similarly, too much chemical can turn your water acidic. So, get the values correct.&nbsp;</span></li><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Once you have added the tablet in the water, you need to shake the water container thoroughly. For the tablets to work, you should have them broken down completely. So, you need to shake your water container for the tablets to breakdown and until they disappear.&nbsp; </span></li><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">After the tablets have been broken down completely, you wait for several minutes for the purifier to dissolve in the water. If you drink the water immediately, the contaminants may be still alive. So, wait several minutes to be sure that all bacteria, viruses and parasitic protozoans. The most recommended time to wait is about 30 minutes. That’s when you will be almost certain that all microorganisms are&nbsp;neutralised.&nbsp; </span></li></ol><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">It is also important to note that some water purification tablets&nbsp;leave&nbsp;behind an unpleasant taste. If you are using iodine, you might also need to bring iodine&nbsp;neutraliser&nbsp;to remove the&nbsp;flavour. However, for those using chlorine, you just need to keep the container uncovered, and the chlorine component will evaporate. These are two ways to deal with the problem of unpleasant taste after purifying water.&nbsp;</span></p><span data-dcnode-id="685" instrument_node="">
</span><h2 data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Are They Proven Safe&nbsp;And&nbsp;Effective?&nbsp;</span></h2><span data-dcnode-id="682" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="679"><figure class="aligncenter" data-dcnode-id="680"><img alt="fit woman drinking water" class="wp-image-110" data-dcnode-id="681" height="682" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/uploads/2020/01/fit-woman-drinking-water-1024x682.jpg&amp;raw" srcset="https://okeanostech.com/wp-content/uploads/2020/01/fit-woman-drinking-water-1024x682.jpg 1024w, https://okeanostech.com/wp-content/uploads/2020/01/fit-woman-drinking-water-300x200.jpg 300w, https://okeanostech.com/wp-content/uploads/2020/01/fit-woman-drinking-water-768x512.jpg 768w, https://okeanostech.com/wp-content/uploads/2020/01/fit-woman-drinking-water-960x640.jpg 960w, https://okeanostech.com/wp-content/uploads/2020/01/fit-woman-drinking-water.jpg 1280w" width="1024"></figure></div><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">When it comes to the safety and effectiveness of the water purification tablets, there are several things you need to consider. First, the safety of the tablets is a guarantee, but you need to buy from a reliable company. That is to ensure that the amount of water purification chemicals in the tablets is adequate. You should also check the type of chemical used to ensure your safety. There are three main chemicals approved safe for consumption but in the right amount. They are chlorine, iodine and chlorine dioxide.&nbsp;</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">The other thing you need to consider is the type of contamination that these tablets can remove. These tablets only remove microorganisms in the water. If you want to purify water contaminated with heavy metals, chemicals, sediment, and other particles, then this is not a reliable method. So, these tablets only work for water contaminated with microorganisms such as bacteria, viruses, and parasitic microorganisms.&nbsp;&nbsp;</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">The time needed for purification is a crucial factor to consider. Unlike when using a water filter that gives instant safe water for drinking, water purification tablets take a longer time to purify the water. For example, chlorine dioxide is very effective in killing a wide range of microorganisms but requires a longer time to treat the water.&nbsp;&nbsp;</span></p><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Lastly, not everyone can use water purification tablets. If you have a thyroid condition, iodine allergies or pregnant, then iodine tablets might pose health risks to you. In addition to that, tablets that have stayed for long since manufacturing or poorly stored might be ineffective. These are some of the major concerns about water purification tablets.&nbsp;</span></p><span data-dcnode-id="666" instrument_node="">
</span><h2 data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Benefits of Water Purification tablets&nbsp;</span></h2><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="662" instrument_node="">Regardless of the few shortcomings, there are many benefits of using tablets for water purification. The biggest benefit is that you don’t need sophisticated </span><a aria-label="equipment (opens in a new tab)" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/dirty-water-purification/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="661" instrument_node="">equipment</span><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="660"></span><span class="screen-reader-text" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Opens in a new window</span></span></a><span data-dcnode-id="656" instrument_node=""> to make water safe for drinking. What you need are tables and your water container. You also don’t need electricity as it is with some water filters. Therefore, it is one of the cheapest methods of treating drinking water. The tablets are small and light, and thus, portable. That’s why they are popular with outdoor adventurers. Water treatment tablets are also an excellent backup whenever equipment fails.&nbsp;</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">In conclusion, water purification tablets are an excellent choice for water contaminated with microorganisms such as bacteria and viruses. However, you need to get the quantities of both the water and the chemical. You must also ensure that you don’t have thyroid problems, allergies or pregnant before using these tablets. That’s how you will ensure you are getting the most out of your water purification tablets.&nbsp;</span></p><span data-dcnode-id="651" instrument_node="">
</span><div class="ssba-classic-2 ssba ssbp-wrap left ssbp--theme-1" data-dcnode-id="619"><div data-dcnode-id="620" style="text-align:left"><span class="ssba-share-text" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Share this...</span></span><br data-dcnode-id="648"><a class="ssba_facebook_share" data-dcnode-id="641" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//okeanostech.com/water-purification-tablets/" target="_blank"><img alt="Share on Facebook" class="ssba ssba-img" data-dcnode-id="647" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/facebook.png&amp;raw" style="width: 35px;" title="Facebook"><div class="ssbp-text" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Facebook</span></div><span aria-hidden="true" class="icon-webfont fa-external-link" data-dcnode-id="644"></span><span class="screen-reader-text" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Opens in a new window</span></span></a><a class="ssba_twitter_share" data-dcnode-id="637" data-site="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Furl%3Dhttps%3A//okeanostech.com/water-purification-tablets/%26text%3DHow%2520Do%2520Water%2520Purification%2520Tablets%2520Work%253F%2520Are%2520They%2520Proven%2520Safe%253F%2520" target="&quot;_blank&quot;"><img alt="Tweet about this on Twitter" class="ssba ssba-img" data-dcnode-id="640" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//okeanostech.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/twitter.png&amp;raw" style="width: 35px;" title="Twitter"><div class="ssbp-text" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Twitter</span></div></a><a class="ssba_linkedin_share ssba_share_link" data-dcnode-id="
