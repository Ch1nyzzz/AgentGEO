</span><h2 data-dcnode-id="760" id="meter"><span data-dcnode-id="761" instrument_node="">What is a water meter?</span></h2><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="758" instrument_node="">A water meter is an instrument that monitors water consumption at homes and businesses. Similar to a </span><a data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/gas/gas-meters/"><span data-dcnode-id="757" instrument_node="">gas meter</span></a><span data-dcnode-id="755" instrument_node="">, water meters record a property’s water usage for billing purposes. Most residential properties will have a water meter installed that measures water usage in kilolitres (KL) or cubic metres (M</span><sup data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">3</span></sup><span data-dcnode-id="752" instrument_node="">) with 1KL and 1M</span><sup data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">3</span></sup><span data-dcnode-id="749" instrument_node=""> equal to 1,000 litres.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><img alt="Water meter diagram of residential water meters" class="wp-image-739072 aligncenter" data-dcnode-id="746" height="272" sizes="(max-width: 814px) 100vw, 814px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/wp-content/uploads/2020/08/Water-Meters-300x100.jpg&amp;raw" srcset="https://www.canstarblue.com.au/wp-content/uploads/2020/08/Water-Meters-300x100.jpg 300w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Water-Meters-1024x341.jpg 1024w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Water-Meters-560x187.jpg 560w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Water-Meters-540x180.jpg 540w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Water-Meters.jpg 1200w" width="814"></p><span data-dcnode-id="744" instrument_node="">
</span><h3 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">How does a water meter work?</span></h3><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Water meters are built to record water that flows through your property from a particular supply system. There are cogs and spindles inside your water meter that rotate when a specific volume of water has passed through the meter, which is then measured by a handful of dials with numbers on them to reflect the amount of water used.</span></p><span data-dcnode-id="738" instrument_node="">
</span><h3 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Types of water meters</span></h3><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">Like </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/solar-power/electricity-meter-types/"><span data-dcnode-id="733" instrument_node="">electricity meters</span></a><span data-dcnode-id="731" instrument_node="">, there are two types of water meters generally found on properties. The most common types are conventional meters, known as analog meters, which vary depending on the brand, model and size. On the other hand, there are more technologically advanced meters which are called digital water meters.</span></p><span data-dcnode-id="729" instrument_node="">
</span><ul data-dcnode-id="717"><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="724"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Analog water meter: </span></strong><span data-dcnode-id="725" instrument_node="">Found in most households, these water meters usually have black, white or red numbers displayed on the panel. Some common brands include Elster, GVT, Itron and RMC.</span></li><span data-dcnode-id="723" instrument_node="">
</span><li data-dcnode-id="719"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Digital water meter: </span></strong><span data-dcnode-id="720" instrument_node="">Has an attached communication device that allows readings to be recorded remotely, which is then sent directly to the water supplier for billing purposes.</span></li><span data-dcnode-id="718" instrument_node="">
</span></ul><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Some properties in certain areas may also be connected to a recycled water meter, which is measured and billed separately from a normal meter.</span></p><span data-dcnode-id="713" instrument_node="">
</span><h2 data-dcnode-id="711" id="locate"><span data-dcnode-id="712" instrument_node="">Where is my water meter located?</span></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Your water meter will usually be located at the front of your house near the nature strip or sidewalk, and will be found at ground level inside a meter box. However, some water meters may be located above ground. For those who live in apartments or townhouses, your water meter will likely be found at the front of your complex, but not all unit blocks will have individual meters for each lot.</span></p><span data-dcnode-id="707" instrument_node="">
</span><h3 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">How many water meters are at my house?</span></h3><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">The amount of water meters at your property will depend on where you live and what type of meters are available in your area. For example, if you live on a recycled water network, you may have an additional water meter that charges you separately to your regular meter. Again, it’s best to check your address with your water supplier or refer to the breakdown of charges listed on your last water bill.</span></p><span data-dcnode-id="701" instrument_node="">
</span><h2 data-dcnode-id="699" id="read"><span data-dcnode-id="700" instrument_node="">How to read your water meter</span></h2><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Depending on the type of water meter at your premises, you’ll need to open the meter box and lift the lid which shows a sequence of numbers in one colour next to numbers in another colour. If you have an RMC water meter, the numbers in the top display show kilolitres, while the round dials are litres which are read clockwise. In the example below, this Elster water meter reading is 397KL in white and 269L in red.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><img alt="Elster water meter with lid open" class="wp-image-739080 aligncenter" data-dcnode-id="694" height="469" loading="lazy" sizes="(max-width: 264px) 100vw, 264px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/wp-content/uploads/2020/08/elster-water-meter-169x300.jpg&amp;raw" srcset="https://www.canstarblue.com.au/wp-content/uploads/2020/08/elster-water-meter-169x300.jpg 169w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/elster-water-meter-576x1024.jpg 576w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/elster-water-meter-864x1536.jpg 864w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/elster-water-meter-560x996.jpg 560w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/elster-water-meter-540x960.jpg 540w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/elster-water-meter.jpg 1080w" width="264"></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">The Itron water meter below reads 477KL and 34L. As you can see, the reading looks much different to the Elster water meter, however both meters have kilolitres displayed in one colour, while the litres are shown in another colour.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><img alt="Itron water meter box with lid open" class="wp-image-739083 aligncenter" data-dcnode-id="688" height="412" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/wp-content/uploads/2020/08/Itron-water-meter-225x300.jpg&amp;raw" srcset="https://www.canstarblue.com.au/wp-content/uploads/2020/08/Itron-water-meter-225x300.jpg 225w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Itron-water-meter-768x1024.jpg 768w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Itron-water-meter-560x747.jpg 560w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Itron-water-meter-540x720.jpg 540w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/Itron-water-meter.jpg 960w" width="309"></p><span data-dcnode-id="686" instrument_node="">
</span><h3 data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Can you submit a water reading?</span></h3><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Yes, you can submit a water meter reading to your water supplier, provided you’ve given them some details, such as the date of your reading, your unique serial meter number, as well as the reading itself. Most water companies will prompt you to submit a water reading by leaving a card in your letterbox stating they could not access your meter. Water readings can normally be submitted online, over the phone or by posting the self-reading card back to your water supplier.</span></p><span data-dcnode-id="680" instrument_node="">
</span><h2 data-dcnode-id="678" id="reads"><span data-dcnode-id="679" instrument_node="">Who reads your water meter?</span></h2><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Normally, a contractor from your water supplier or retailer will read your meter on an approximate date that’s found on your bill. This usually takes place every three months or quarter, but will vary between water suppliers. Wild weather, locked gates, operational factors and dogs on properties can impact water meter readings, so billing periods may vary from time to time. For instance, one billing period may state 90 days, while another may be charged for 85 days.</span></p><span data-dcnode-id="674" instrument_node="">
</span><h3 data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Why is my water meter reading estimated?</span></h3><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Estimated water meter readings take place when a meter is inaccessible, due to a locked gate or a dog on the premises. Other reasons may be because the water meter is damaged or faulty and is unreadable, or the contractor cannot locate the water meter. Estimate readings are usually based on the property’s previous water usage, as well as the next bill’s water usage which has had an actual reading take place.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h3 data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Why is my water meter covered?</span></h3><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><img alt="residential water meter box in the ground" class="alignright wp-image-739087" data-dcnode-id="664" height="282" loading="lazy" sizes="(max-width: 211px) 100vw, 211px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/wp-content/uploads/2020/08/water-meter-box-225x300.jpg&amp;raw" srcset="https://www.canstarblue.com.au/wp-content/uploads/2020/08/water-meter-box-225x300.jpg 225w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/water-meter-box-768x1024.jpg 768w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/water-meter-box-560x747.jpg 560w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/water-meter-box-540x720.jpg 540w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/water-meter-box.jpg 960w" width="211"></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Water meters are covered to prevent them being exposed to weather and other elements. Meters are usually found in an enclosed box that’s underground which is connected to the water mains, allowing water to be supplied directly to your property. Always wear protective gloves when you open a water meter box as they are known to house spiders, snakes and other creepy crawlies.</span></p><span data-dcnode-id="659" instrument_node="">
</span><h2 data-dcnode-id="657" id="bill"><span data-dcnode-id="658" instrument_node="">Understanding your water bill</span></h2><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Whether you’re billed monthly or quarterly, your water bill statement will have quite an extensive breakdown of fees and charges for water usage and supply. Some of the key account information to look out for is:</span></p><span data-dcnode-id="653" instrument_node="">
</span><ul data-dcnode-id="591"><span data-dcnode-id="652" instrument_node="">
</span><li data-dcnode-id="648"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Account number: </span></strong><span data-dcnode-id="649" instrument_node="">An identification number for your water billing account.</span></li><span data-dcnode-id="647" instrument_node="">
</span><li data-dcnode-id="643"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Bill number or reference: </span></strong><span data-dcnode-id="644" instrument_node="">The specific reference ID of your bill.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="638"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Property address: </span></strong><span data-dcnode-id="639" instrument_node="">Your water meter’s billing address.</span></li><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="633"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Bill due date: </span></strong><span data-dcnode-id="634" instrument_node="">The payment date your issued water bill is due.</span></li><span data-dcnode-id="632" instrument_node="">
</span><li data-dcnode-id="628"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Billing period: </span></strong><span data-dcnode-id="629" instrument_node="">A monthly, quarterly or bi-annually period of your water charges.</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="623"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Approximate date of next meter reading: </span></strong><span data-dcnode-id="624" instrument_node="">The next estimated date your water supplier will read your meter.</span></li><span data-dcnode-id="622" instrument_node="">
</span><li data-dcnode-id="618"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Total amount due: </span></strong><span data-dcnode-id="619" instrument_node="">The total amount payable to your water supplier.</span></li><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="613"><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Previous bill amount: </span></strong><span data-dcnode-id="614" instrument_node="">The total amount you paid on your last bill.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="608"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Usage habits: </span></strong><span data-dcnode-id="609" instrument_node="">Historical water usage data that compares with current usage.</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Account details: </span></strong><span data-dcnode-id="604" instrument_node="">Details of your water meter/s on your property, including readings.</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="598"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Fees and charges: </span></strong><span data-dcnode-id="599" instrument_node="">A thorough list of costs for water usage and fixed supply charges.</span></li><span data-dcnode-id="597" instrument_node="">
</span><li data-dcnode-id="593"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Payment options: </span></strong><span data-dcnode-id="594" instrument_node="">All of the available ways to pay your bill.</span></li><span data-dcnode-id="592" instrument_node="">
</span></ul><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">If you’d like to get a sense of what the average water bill looks like, then read our guide </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/home-garden/average-water-bill/"><span data-dcnode-id="588" instrument_node="">here</span></a><span data-dcnode-id="586" instrument_node="">.</span></p><span data-dcnode-id="584" instrument_node="">
</span><h2 data-dcnode-id="582" id="high"><span data-dcnode-id="583" instrument_node="">Why is my water bill so high?</span></h2><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><img alt="residential water bill example" class="alignright size-medium wp-image-739092" data-dcnode-id="580" height="199" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/wp-content/uploads/2020/08/water-bill-australia-300x199.jpg&amp;raw" srcset="https://www.canstarblue.com.au/wp-content/uploads/2020/08/water-bill-australia-300x199.jpg 300w, https://www.canstarblue.com.au/wp-content/uploads/2020/08/water-bill-australia.jpg 500w" width="300"></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">There are various factors to consider if you’ve received a larger than expected water bill. Water leaks can be a common cause of high water bills, however it may be due to water rates increasing in your local area, or lifestyle factors that increase demand for water usage. If a leak is suspected, turn off all water at your premises and avoid using any water for an hour. Check the meter and take note of the dials by jotting down a reading. Come back once an hour has passed to see if the dials have moved.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Additional reading:</span></p><span data-dcnode-id="572" instrument_node="">
</span><ul data-dcnode-id="562"><span data-dcnode-id="571" instrument_node="">
</span><li data-dcnode-id="568"><a data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/home-garden/water-rates-sydney/"><span data-dcnode-id="570" instrument_node="">Water Rates in Sydney</span></a></li><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="564"><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/home-garden/water-rates-brisbane/"><span data-dcnode-id="566" instrument_node="">Water Rates in Brisbane</span></a></li><span data-dcnode-id="563" instrument_node="">
</span></ul><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">How to lower your water bill</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">So, with a bit of general knowledge on how water meters work, you could be in a better position to cut back those dreaded water costs. Being familiar with your water meter shouldn’t be a hard task, and by recognising when and where you use water the most, you may see a pleasant change in your next bill, provided your household has made the right adjustments.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">With the cost of living getting more expensive, it may be time to get proactive about your utilities and seek out ways to not only lower your water bills, but also your electricity bills. If you haven’t compared energy deals in a while, you could be missing out on some serious bargains.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="549"><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/electricity/" onmousedown="_gaq.push(['_trackEvent', 'Engagement | Energy | Native Banner', 'Comparison Tool | Banner', ' Electricity | Compare'])" rel="noopener noreferrer" target="_blank"><img class="aligncenter" data-dcnode-id="551" height="214" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canstarblue.com.au/wp-content/uploads/2018/06/Energy-Deal-Banner-v2-1024x341.jpg&amp;raw" width="643"></a></p><span data-dcnode-id="548" instrument_node="">
