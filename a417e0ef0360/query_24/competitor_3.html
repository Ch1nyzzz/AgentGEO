</span><meta content="A prototype of a small-scale atmospheric water generator (AWG) that employs the Peltier effect for cooling was designed and constructed. In this study…" data-dcnode-id="998" property="og:description"><span data-dcnode-id="997" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as010&quot;><p id=&quot;sp0010&quot;>A prototype of a small-scale atmospheric water generator (AWG) that employs the Peltier effect for cooling was designed and constructed. In this study, a systematic design approach was employed, and the AWG system was sized using the cooling capacity and coefficient of performance (COP) behaviors of the thermoelectric cooler (TEC) with respect to the current. Likewise, a mathematical model that uses the surrounding fluid temperature and relative humidity ratio as the driving force for heat and mass transfer was used to optimize and design the rectangular extended surfaces and estimate the water generation rates. The completed AWG system, housed in a 3D printed casing, was used to experimentally investigate the impact of the variation of the airflow velocity, humidity, and TEC current on the water generation rates. The experiments confirm that the inclusion of an intake fan reduces water generation in some cases. The water yield is observed to increase with relative humidity. The tests also suggest that increasing the current of the individual TECs results in an increased water generation rate; however, this increase is coupled with a higher specific energy consumption as a result of the decreased COP. Finally, a comparison between the prototype and several AWGs in literature was carried out.</p></div></div></div>" data-dcnode-id="996" lang="en" name="citation_abstract"><span data-dcnode-id="995" instrument_node="">

.1016/j.tsep.2018.02.015</span></a><a class="rights-and-content" data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS2451904917303098%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="505" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="502"></section><section class="ReferencedArticles" data-dcnode-id="501"></section><div class="PageDivider" data-dcnode-id="500"></div><div class="Abstracts u-font-serif" data-dcnode-id="453" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="460" id="ab005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Highlights</span></h2><div data-dcnode-id="461" id="as005"><p data-dcnode-id="462" id="sp0005"></p><dl class="list" data-dcnode-id="463"><dt class="list-label" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="490"><p data-dcnode-id="491" id="p0005"><span data-dcnode-id="495" instrument_node="">An atmospheric water generator that employs the </span><a class="topic-link" data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/peltier-effect" title="Learn more about Peltier effect from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="494" instrument_node="">Peltier effect</span></a><span data-dcnode-id="492" instrument_node=""> was designed.</span></p></dd><dt class="list-label" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="482"><p data-dcnode-id="483" id="p0010"><span data-dcnode-id="487" instrument_node="">The </span><a class="topic-link" data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/coefficient-of-performance" title="Learn more about COP from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="486" instrument_node="">COP</span></a><span data-dcnode-id="484" instrument_node=""> and water yield of the system were used as the main design criteria.</span></p></dd><dt class="list-label" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="477"><p data-dcnode-id="478" id="p0015"><span data-dcnode-id="479" instrument_node="">An employed wet fin model, used for the fin design, was validated experimentally.</span></p></dd><dt class="list-label" data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="472"><p data-dcnode-id="473" id="p0020"><span data-dcnode-id="474" instrument_node="">The effects of varying air velocity, relative humidity, and current were tested.</span></p></dd><dt class="list-label" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="464"><p data-dcnode-id="465" id="p0025"><span data-dcnode-id="469" instrument_node="">The prototype was compared to other </span><a class="topic-link" data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/thermoelectrics" title="Learn more about thermoelectric from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="468" instrument_node="">thermoelectric</span></a><span data-dcnode-id="466" instrument_node=""> prototypes in literature.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="454" id="ab010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Abstract</span></h2><div data-dcnode-id="455" id="as010"><p data-dcnode-id="456" id="sp0010"><span data-dcnode-id="457" instrument_node="">A prototype of a small-scale atmospheric water generator (AWG) that employs the Peltier effect for cooling was designed and constructed. In this study, a systematic design approach was employed, and the AWG system was sized using the cooling capacity and coefficient of performance (COP) behaviors of the thermoelectric cooler (TEC) with respect to the current. Likewise, a mathematical model that uses the surrounding fluid temperature and relative humidity ratio as the driving force for heat and mass transfer was used to optimize and design the rectangular extended surfaces and estimate the water generation rates. The completed AWG system, housed in a 3D printed casing, was used to experimentally investigate the impact of the variation of the airflow velocity, humidity, and TEC current on the water generation rates. The experiments confirm that the inclusion of an intake fan reduces water generation in some cases. The water yield is observed to increase with relative humidity. The tests also suggest that increasing the current of the individual TECs results in an increased water generation rate; however, this increase is coupled with a higher specific energy consumption as a result of the decreased COP. Finally, a comparison between the prototype and several AWGs in literature was carried out.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="430" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="442"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2451904917301889"><svg class="icon icon-navigate-left" data-dcnode-id="451" focusable="false" height="32" viewBox="0 0 54 128" width="32" ass="citing-articles u-margin-l-bottom" data-dcnode-id="246"><ul data-dcnode-id="252"><li class="ListArticleItem" data-dcnode-id="361"><div class="sub-heading" data-dcnode-id="373"><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352484722001780" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="377" id="citing-articles-article0-title"><span data-dcnode-id="378" instrument_node="">Energy and exergy analysis of an atmospheric water generator integrated with the compound parabolic collector with storage tank in various climates</span></h3></a><div class="article-source ellipsis" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">2022, Energy Reports</span></div></div><div class="buttons" data-dcnode-id="367"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="368" type="button"><span class="button-link-text" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="369" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="370"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="362"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="363" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="364"><p data-dcnode-id="365" id="d1e807"><span data-dcnode-id="366" instrument_node="">The drinkable water storages shortage is one of the main obstacles that many societies are envisaged with. In addition, the water content of humid air is known as the main storage of drinkable water for the future. In this paper, the energy and exergy analysis of a solar driven atmospheric water generator which contains an absorption refrigeration cycle coupled to a compound parabolic collector is performed. The mathematical model of the proposed system is developed in MATLAB software. In the solar thermal system provided in this paper, the storage tank is employed for extending the working hours of the system leading to improvement of total water generation rate. Furthermore, the performance of the system is evaluated in various climates included arid, semi-arid and Mediterranean, and for this purpose three cities of Iran named Bandar Abbas, Ramsar and Tehran were selected. Moreover, by comparing the water production in various months during the year, the highest value of water production during the year is held by Bandar Abbas city leading to owning the lowest values of specific power consumption and specific collector area. The maximum rate of water production of proposed system is approximately 400&nbsp;lit per month in tropical climates with specific energy consumption of 3&nbsp;kWh/lit. Based on the results of exergy analysis of whole system, the most exergy destruction rate belongs to compound parabolic collector component, therefore, large amount of energy is wasted through compound parabolic collector which can be recovered for generation of chilled water. Moreover, the impacts of geographical and environmental parameters on the energy and exergy efficiencies of the atmospheric water generator are also assessed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="343"><div class="sub-heading" data-dcnode-id="355"><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2213138822000522" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="359" id="citing-articles-article1-title"><span data-dcnode-id="360" instrument_node="">Research progress on recent technologies of water harvesting from atmospheric air: A detailed review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">2022, Sustainable Energy Technologies and Assessments</span></div></div><div class="buttons" data-dcnode-id="349"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="350" type="button"><span class="button-link-text" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="351" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="352"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="344"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="345" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="346"><p data-dcnode-id="347" id="sp0005"><span data-dcnode-id="348" instrument_node="">The increasing of the world population without increasing the natural resources caused water shortage in many regions around the world. Herein is a review of a new freshwater resource depending on harvesting the moisture of the atmospheric air. There are two main methods for extracting water from the ambient air: including composite materials method and cooling the air to the dew point. In the first method, the composite materials absorb the atmospheric air’s moisture and regenerate it into drinking water under certain conditions. Researchers have worked on changing the composite material type, and its additives and parameters to improve the productivity of water with acceptable cost. The second method requires just cooling of the atmospheric air until its moisture gets condensed. Power sources based on renewable energy have been developed to drive various techniques, such as vapor-compression cycles, absorption cycles, and Peltier effect-based devices. Beside reviewing different methodologies, this paper focused on the factors that affect the process of extracting water from the air. The formulas for computing the efficiency and water productivity were also mentioned. On the other hand, the research trend of the current topic was analyzed by conducting a comprehensive bibliometric analysis using VOSviewer software based on the Scopus database in the period (1988 – 2021).</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="325"><div class="sub-heading" data-dcnode-id="337"><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032122002398" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="341" id="citing-articles-article2-title"><span data-dcnode-id="342" instrument_node="">Progress in atmospheric water generation systems: A review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">2022, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="331"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="332" type="button"><span class="button-link-text" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="333" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="334"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="326"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="327" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="328"><p data-dcnode-id="329" id="abspara0010"><span data-dcnode-id="330" instrument_node="">In recent years, freshwater reserves have been severely depleted. Demand is outpacing supply, and supply is being impacted in terms of both quantity and quality. Therefore, freshwater scarcity is regarded as one of the greatest challenges of our time. During recent decades, the concept of generating fresh water from atmospheric air has been emerging as a promising solution to overcome the global water crisis. The present review attempts to provide a novel and comprehensive classification of various AWG technologies and materials. Each technology has been summarized and discussed. Solar assisted AWG systems with a reliable and cheap energy source are thoroughly explained. Over the last few years, most AWG studies have been shifted towards hybrid/integrated systems which utilize several cooling approaches in order to increase water productivity. The present paper is primarily focused on reviewing hybrid systems with portable and round-the-clock (RTC) application capability. Performance indicators of each system; including water production and energy consumption, thermal efficiency, and coefficient of performance were evaluated and compared. Finally, possible future perspective of implementing atmospheric water generating technologies is proposed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="289"><div class="sub-heading" data-dcnode-id="319"><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0968432821001761" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="323" id="citing-articles-article3-title"><span data-dcnode-id="324" instrument_node="">In situ ESEM using 3-D printed and adapted accessories to observe living plantlets and their interaction with enzyme and fungus</span></h3></a><div class="article-source ellipsis" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">2022, Micron</span></div></div><div class="buttons" data-dcnode-id="313"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="314" type="button"><span class="button-link-text" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="315" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="316"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="290"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="291" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="292"><p data-dcnode-id="293" id="spar0055"><span data-dcnode-id="312" instrument_node="">This paper describes an innovative way of using environmental scanning electron microscopy (ESEM) and the development of a suitable accessory to perform </span><em data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">in situ</span></em><span data-dcnode-id="309" instrument_node=""> observation of living seedlings in the ESEM. We provide details on fabrication of an accessory that proved to be essential for such experiments but inexpensive and easy to build in the laboratory, and present our </span><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">in situ</span></em><span data-dcnode-id="306" instrument_node=""> observations of the tissue and cell surfaces. Sample-specific configurations and optimized tuning of the ESEM were defined to maintain </span><em data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Arabidopsis</span></em><span data-dcnode-id="303" instrument_node=""> and flax seedlings viable throughout repetitive exposure to the imaging conditions in the microscope chamber. This method permitted us to identify cells and tissues of the live plantlets and characterize their surface morphology during their early stage of growth and development. We could extend the application of this technique, to visualize the response of living cells and tissues to exogenous enzymatic treatments with polygalacturonase in </span><em data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Arabidopsis</span></em><span data-dcnode-id="300" instrument_node="">, and their interaction with hyphae of the wilt fungus </span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Verticillium dahliae</span></em><span data-dcnode-id="297" instrument_node=""> during artificial infection in flax plantlets. Our results provide an incentive to the use of the ESEM for </span><em data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">in situ</span></em><span data-dcnode-id="294" instrument_node=""> studies in plant science and a guide for researchers to optimize their electron microscopy observation in the relevant fields.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="283"><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378778821007301" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="287" id="citing-articles-article4-title"><span data-dcnode-id="288" instrument_node="">Development and applications of thermoelectric based dehumidifiers</span></h3></a><div class="article-source ellipsis" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">2021, Energy and Buildings</span></div></div><div class="buttons" data-dcnode-id="277"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="278" type="button"><span class="button-link-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="279" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="280"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="275" id="sp0010"><span data-dcnode-id="276" instrument_node="">The review describes the development and advancement of thermoelectric based dehumidifier systems. Thermoelectric cooling in thermoelectric dehumidifiers has various advantages over conventional techniques, such as lightweight, compact size, noise-free (no moving part), and eco-friendly operation. The review initially describes the basic principle and different techniques used for dehumidification. Then, thermoelectric dehumidifiers are introduced and their governing parameters are discussed. Further, thermoelectric dehumidifier-based prototypes are reviewed and discussed over their design and performance. The patents and commercialized products developed on thermoelectric dehumidifiers were also briefly discussed and compared. Lastly, this review states the challenges for the more efficient and large-scale operation of thermoelectric-based dehumidifiers and simplifies ways for further improvement. Thus, the study illustrates the current status of thermoelectric dehumidifiers and provides futuristic scopes for their development.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0196890421009043" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article5-title"><span data-dcnode-id="270" instrument_node="">A multi-function desalination system based on hydrolysis reaction of hydride and fuel cell water recovery</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2021, Energy Conversion and Management</span></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="sp0015"><span data-dcnode-id="258" instrument_node="">Desalination is an important method to take full advantage of the sea water to produce fresh water. However, the systems or devices reported previously still have the limitations in the energy supply and portability when used in some specific application scenarios, such as island and remote coastal area. In this paper, a multi-function desalination system is proposed, which could provide fresh water, electrical energy, and even the cold energy based on the hydrolysis reaction of hydride and fuel cell water recovery. Besides, the system could be modified to increase the flexibility of the system operation to satisfy the various energy demands under different conditions. A lumped parameter model of the proposed system is developed to evaluate the system performance. The results show that the fuel cell helps to increase the absolute humidity of the wet air by 15.5% and to increase the water production by condensing the wet air by 1.8 times compared with simple water harvest from the ambient environment. The modified system demonstrates more stable performance of the water production than the original desalination system, which means that the modified system is less affected by the parameter variation. The maximum water production of the kW level system could achieve 11.10&nbsp;kg/h. Comparing with the previous reports, the unit power consumption of the modified system could reach the lowest level (about 880 Wh/kg), showing the promising water production performance of the system developed in this work.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85045734485%26md5%3D524524c52c4b9cfc7b7aa2205b7f9320" id
