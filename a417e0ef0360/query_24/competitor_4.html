</span><h2 data-dcnode-id="235"><img data-dcnode-id="236" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//watermakerindia.com/images/save_water_img.png&amp;raw" width="351"></h2><span data-dcnode-id="234" instrument_node="">
</span><h2 data-dcnode-id="232"><img data-dcnode-id="233" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//watermakerindia.com/images/solution_img.png&amp;raw" width="444"></h2><span data-dcnode-id="231" instrument_node="">
</span><p class="txtJustify2" data-dcnode-id="220"><span data-dcnode-id="230" instrument_node="">WaterMaker extracts pure, safe drinking water straight from the air. Our atmospheric water generators (AWGs) are perfect for water stressed or water contaminated areas. They provide a decentralized, local source of clean potable water without any connection to pipes or catch basins. All they require is electricity or an alternate source of power to extract, condense, purify and dispense crystal - clear fresh drinking water.</span><br data-dcnode-id="229"><br data-dcnode-id="228"><span data-dcnode-id="227" instrument_node="">
            
            Technology provider and social entrepreneur WaterMaker set up the world's first Air Water Station, in 2009 as a solution to safe drinking water problems at Jalimudi village in rural Andhra Pradesh, India, as part of its Corporate Social Responsibility activities. The next Air Water Station came up in Gujarat. These community installations are ideal for decentralized, stand alone solutions.</span><br data-dcnode-id="226"><br data-dcnode-id="225"><span data-dcnode-id="224" instrument_node="">
            
            WaterMakers have been installed at many locations in India including private homes, schools, ports, health and community centers, factories, work sites and more. They are also being exported to many countries today.</span><br data-dcnode-id="223"><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node=""> </span></p><span data-dcnode-id="219" instrument_node="">
</span><h2 data-dcnode-id="216"><img data-dcnode-id="218" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//watermakerindia.com/images/adv_wmi.png&amp;raw" width="202"><span data-dcnode-id="217" instrument_node=""> </span></h2><span data-dcnode-id="215" instrument_node="">
</span><h2 data-dcnode-id="211" style="font-size:14px; color:red;"><strong data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">No more plastic bottles, no storage, no transportation costs. Just safe drinking water, whenever and wherever you need it!</span></strong><span data-dcnode-id="212" instrument_node=""> </span></h2><span data-dcnode-id="210" instrument_node="">
</span><div class="homeListwrapper" data-dcnode-id="180"><span data-dcnode-id="209" instrument_node="">
</span><ul class="homeList" data-dcnode-id="182"><span data-dcnode-id="208" instrument_node="">
</span><li data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Needs no water source.</span></li><span data-dcnode-id="205" instrument_node="">
</span><li data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Water is totally free from bacteria, viruses and harmful chemicals.</span></li><span data-dcnode-id="202" instrument_node="">
</span><li data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Water quality compliant to WHO/IS 10500:2012 standards.</span></li><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Efficiently dehumidifies,  recycles and cleans the air around.</span></li><span data-dcnode-id="196" instrument_node="">
</span><li data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Environment positive – no water wastage or rejects re-contaminating ground water.</span></li><span data-dcnode-id="193" instrument_node="">
</span><li data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Secure water supply.</span></li><span data-dcnode-id="190" instrument_node="">
</span><li data-dcnode-id="184"><span data-dcnode-id="189" instrument_node="">Largest range of AWGs – from *25 to 5,000 liters per day. </span><br data-dcnode-id="188"><span data-dcnode-id="186" style="font-size:12px;"><span data-dcnode-id="187" instrument_node="">*25 litre AWGs on container load basis only. </span></span><span data-dcnode-id="185" instrument_node=""> </span></li><span data-dcnode-id="183" instrument_node="">
</span></ul><span data-dcnode-id="181" instrument_node="">
</span></div><span data-dcnode-id="179" instrument_node="">
</span><div class="homeListwrapper" data-dcnode-id="153" style="width:46%; margin: 0px 0px 0px 5px;"><span data-dcnode-id="178" instrument_node="">
</span><ul class="homeList" data-dcnode-id="155"><span data-dcnode-id="177" instrument_node="">
</span><li data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Stand alone, point of use units which are scalable.</span></li><span data-dcnode-id="174" instrument_node="">
</span><li data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Easy to set up, low on maintenance.</span></li><span data-dcnode-id="171" instrument_node="">
</span><li data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Easy filter replacement.</span></li><span data-dcnode-id="168" instrument_node="">
</span><li data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Adjustable cold water temperatures.</span></li><span data-dcnode-id="165" instrument_node="">
</span><li data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">LED function displays, automatic shut down and restart.</span></li><span data-dcnode-id="162" instrument_node="">
</span><li data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Food grade filtration piping and SS tank with submerged UV.</span></li><span data-dcnode-id="159" instrument_node="">
</span><li data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Water produced costs 50% less than bottled water. </span></li><span data-dcnode-id="156" instrument_node="">
