’s flame rated VW-1 to meet requirements for preventing the spread of flames based on a timed test with vertically suspended </span><span class="Wrd" data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">material.</span></span><span data-dcnode-id="5190" instrument_node=""> Rated for use in ISO Class 1 or ISO Class 2 clean </span><span class="Wrd" data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">rooms,</span></span><span data-dcnode-id="5187" instrument_node=""> this cable releases minimal particles into the </span><span class="Wrd" data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">air,</span></span><span data-dcnode-id="5184" instrument_node=""> helping you to maintain the cleanest possible </span><span class="Wrd" data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">environment.</span></span></p><p class="ap PrsnttnCpy" data-dcnode-id="5173"><span class="Wrd" data-dcnode-id="5177"><span data-dcnode-id="5180" instrument_node="">Use </span><span class="ad" data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">unshielded</span></span></span><span data-dcnode-id="5176" instrument_node=""> cable in applications where signal interference is not a </span><span class="Wrd" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">concern.</span></span></p><p class="ap PrsnttnCpy" data-dcnode-id="5167"><span class="ad" data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">Shielded</span></span><span data-dcnode-id="5170" instrument_node=""> cable has a layer of braid that blocks signal interference from nearby equipment and </span><span class="Wrd" data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">devices.</span></span></p><p class="ap PrsnttnCpy" data-dcnode-id="5142"><span data-dcnode-id="5166" instrument_node="">Choose cable </span><span class="ad" data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">with</span></span><span da
