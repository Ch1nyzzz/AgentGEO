</span><p data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">‘What gauge is 1 mm wire?’ is one of the most frequently asked questions about 18 gauge wire. This obviously relates to what thickness is 18 gauge wire. Its diameter is 1.024 mm; hence the 18 gauge wire is also known as the 1mm wire.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2740" id="AdThrive_Content_46_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">Based on the diameter, we can deduce that the cross-section of 18 gauge wire in mm2 is 0.823 mm2.</span></p><span data-dcnode-id="2736" instrument_node="">
</span><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">How many amps can an 18 gauge wire handle?</span></p><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">18 AWG wire can handle 14 amps. It has a rated ampacity of 14A at 75°C. That makes it very useful for a number of applications, including as:</span></p><span data-dcnode-id="2730" instrument_node="">
</span><ul data-dcnode-id="2716"><span data-dcnode-id="2729" instrument_node="">
</span><li data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">18 gauge battery wire (at 12V, it can handle 14 amps).</span></li><span data-dcnode-id="2726" instrument_node="">
</span><li data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">18 gauge automotive wire.</span></li><span data-dcnode-id="2723" instrument_node="">
</span><li data-dcnode-id="2718"><span data-dcnode-id="2722" instrument_node="">18 gauge electrical wire can also be used as an 18 gauge stranded wire; for </span><a data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//learnmetrics.com/thermostat-wiring/"><span data-dcnode-id="2721" instrument_node="">thermostats wiring</span></a><span data-dcnode-id="2719" instrument_node="">, for example.</span></li><span data-dcnode-id="2717" instrument_node="">
</span></ul><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">18 AWG wire can be made out of several materials, including copper, aluminum, stainless steel, and even silicon.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2712" id="AdThrive_Content_47_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2711" instrument_node="">
</span><p data-dcnode-id="2708"><em data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">How many watts can an 18 gauge wire handle?</span></em></p><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">At 120V, 18 gauge wire can handle 1,680 watts. At 220V, it can handle 3,080 watts.</span></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">The price of 18 gauge wire per ft is about $0.30. Here is a good one by Tyumen:</span></p><span data-dcnode-id="2701" instrument_node="">

</span><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">20 gauge wire is one of the most popular low voltage (12V, 24V) AWG wire. It has several applications that correspond to low voltage battery electronic devices. Stainless steel variety is commonly used as a 20 gauge wire for jewelry making, for example.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2522" id="AdThrive_Content_49_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2518"><em data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">How thick is a 20 gauge copper wire?</span></em></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">The diameter of a 20 gauge electric wire is 0.812 mm. It has a 0.518 mm2 cross-section.</span></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2511"><em data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">How many amps can a 2o gauge wire handle?</span></em></p><span data-dcnode-id="2510" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">20 AWG wire has an ampacity of 11 amps at 75°C. That means that it can normally conduct 11 amps of electrical current.</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">If you translate that in watts, you get the result that a 20 gauge wire handles 132 watts for batteries. If you put it on a 120V circuit, the maximum wattage is 1,320W.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2504" id="AdThrive_Content_50_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">You have many different varieties of 20 AWG wires, including:</span></p><span data-dcnode-id="2500" instrument_node="">
</span><ul data-dcnode-id="2486"><span data-dcnode-id="2499" instrument_node="">
</span><li data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">20 gauge electrical copper wires (for circuits).</span></li><span data-dcnode-id="2496" instrument_node="">
</span><li data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">20 gauge stainless steel wires (for making jewelry and so on).</span></li><span data-dcnode-id="2493" instrument_node="">
</span><li data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">20 gauge automotive wire.</span></li><span data-dcnode-id="2490" instrument_node="">
</span><li data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">20 gauge stranded wire.</span></li><span data-dcnode-id="2487" instrument_node="">
</span></ul><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Price-wise, a foot of 20 gauge electric copper wire costs less than $0.30. Here is a good example:</span></p><span data-dcnode-id="2482" instrument_node="">

; height: 24px;"><span data-dcnode-id="2419" instrument_node="">22 AWG wire </span><strong data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">amps</span></strong><span data-dcnode-id="2416" instrument_node=""> </span><em data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">(ampacity at 75°C)</span></em><span data-dcnode-id="2413" instrument_node="">:</span></td><td data-dcnode-id="2408" style="width: 50%; height: 24px;"><strong data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">7 amps</span></strong></td></tr></tbody></table><span data-dcnode-id="2401" instrument_node="">
</span></div><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">“Is 22 gauge wire thick?” Well, 22 gauge wire is thicker than 24 gauge wire and thinner than the 20 gauge wire.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2396" id="AdThrive_Content_51_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">If you express the diameter of 22 AWG wire in mm you get 0.644 mm diameter. That’s thinner than regular 12-18 AWG wires.</span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">22 gauge wire has a 0.326 mm2 cross-section. It’s very often used as an 22 gauge stranded wire.</span></p><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">This is because of the ampacity. How many amps can a 22 gauge wire handle?</span></p><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">It can handle 7 amps. That is because it has a rated ampacity of 7A at 75°C.</span></p><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Even a 22 AWG solid core wire cannot handle more than 1,000W at 120V, for example.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2380" id="AdThrive_Content_52_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Because it’s thinner than lower number AWG wires, the 22 AWG wire is often used for LED lights and even as a 22 gauge paddle wire.</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">The price of a 22 gauge wire per ft is less than $0.20. Here is a recommendation for a 22 gauge wire:</span></p><span data-dcnode-id="2373" instrument_node="">
</span><figure aria-describedby="caption-attachment-9088" class="wp-caption aligncenter" data-dcnode-id="2364" id="attachment_9088" style="width: 990px"><noscript data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">&lt;img class="size-full wp-image-9088" src="https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire.jpg" alt="22 gauge awg wire" width="1000" height="952" srcset="https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire.jpg 1000w, https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire-300x286.jpg 300w, https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire-768x731.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript><img alt="22 gauge awg wire" class="size-full wp-image-9088 lazyload" data-dcnode-id="2370" data-src="https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire.jpg" data-srcset="https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire.jpg 1000w, https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire-300x286.jpg 300w, https://learnmetrics.com/wp-content/uploads/22-gauge-awg-wire-768x731.jpg 768w" height="952" sizes="(max-width: 1000px) 100vw, 1000px" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%201000%20952%22%3E%3C%2Fsvg%3E" srcset="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%201000%20952%22%3E%3C%2Fsvg%3E 1000w" width="1000"><figcaption class="wp-caption-text" data-dcnode-id="2365" id="caption-attachment-9088"><span data-dcnode-id="2369" instrument_node="">22 gauge wire by Tyumen. You can </span><a data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3oxf8Yy" rel="nofollow"><span data-dcnode-id="2368" instrument_node="">get the 22 gauge wires here</span></a><span data-dcnode-id="2366" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="2363" instrument_node="">

</span><p data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">24 gauge wire can be used for electrical conductivity as well as for its tensile strength.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2287" id="AdThrive_Content_53_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2286" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">It has a 0.511 mm diameter; that’s why we also referred to it as a half mm AWG wire.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">24 gauge wire has a cross-section of 0.205 mm2.</span></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">How many amps can a 24 gauge electrical copper wire handle?</span></p><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">3.5 amps is the ampacity of the 24 gauge wire, measured at 75°C.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">You have different core materials and cable materials, including copper, brass, stainless steel, and silicone wires/cables.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2271" id="AdThrive_Content_54_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">The price of 24 gauge wires primarily depends on the material out of which the wire is made. Here is an example of an electrical 24 gauge wire out of copper:</span></p><span data-dcnode-id="2267" instrument_node="">

</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">When used in electrical applications, the 26 AWG copper wire can handle 2.2 amps. It can carry a low amount of wattage; less than 500 watts even at 220V.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Generally, the 26 gauge wire is quite cheap with a low per ft cost. Here is a recommendation for an electric 26 gauge wire:</span></p><span data-dcnode-id="2171" instrument_node="">

</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">This AWG wire is most often made out of copper; we talk about 28 gauge copper wires.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="2085" id="AdThrive_Content_56_desktop" style="min-height: 250px;"></div><span data-dcnode-id="2084" instrument_node="">

</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">When used in electrical applications it’s useful to know that it can handle up to 1.4 amps. It’s one of the thinnest current-carrying AWG wires in use today.</span></p><span data-dcnode-id="2078" instrument_node="">

</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Because it’s so thin, the 30 gauge wire can handle only 0.86 amps. When connected to a 12V battery, the maximum wattage of 30 gauge wire is about 10 watts.</span></p><span data-dcnode-id="1979" instrument_node="">

</span><h2 data-dcnode-id="1547"><span class="ez-toc-section" data-dcnode-id="1550" id="Amp_Wire_Sizes_Chapter_2"></span><span data-dcnode-id="1549" instrument_node="">Amp Wire Sizes (Chapter 2)</span><span class="ez-toc-section-end" data-dcnode-id="1548"></span></h2><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">When picking an AWG wire, we usually focus on ampacity; ie. how many amps can a certain AWG wire handle.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">In most cases, however, we know how many amps we require for the AWG wire to handle, and want to work out the AWG wire for that amount of amps.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1540" id="AdThrive_Content_63_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">That’s why we in this 2nd Chapter cover AWG wires by amps they can handle.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">In the subchapter below, you will find adequate wire sizes for 10 amps, 15 amps, 20 amps, 25 amps, 30 amps, 40 amps, 50 amps, 60 amps, 70 amps, 80 amps, 90 amps, 100 amps, and 200 amps.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">If you need a wire to handle a certain amount of amps you can just scroll down to the appropriate subchapter that covers the amperage you’re interested in.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">We’ll start with the 10 amp wire size and work our way to the 200 amp wire size:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1527" id="AdThrive_Content_64_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1526" instrument_node="">
</span><h3 data-dcnode-id="1522"><span class="ez-toc-section" data-dcnode-id="1525" id="10_Amps_Wire_Size_AWG_Gauge_Breaker_Suggestion_For_110V-120V_Circuit"></span><span data-dcnode-id="1524" instrument_node="">10 Amps Wire Size: AWG Gauge, Breaker, Suggestion For 110V-120V Circuit</span><span class="ez-toc-section-end" data-dcnode-id="1523"></span></h3><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">If you’re looking for wire size for a 10 amp circuit (this can be for a 10 amp 120-volt circuit, breaker, battery output), you will need an AWG with at least 10 amp rated ampacity at 75°C.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1517" instrument_node="">You can consult the wire ampacity chart from the 1st Chapter and see that the most appropriate wire size for 10 amps is </span><strong data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">20 AWG wire</span></strong><span data-dcnode-id="1514" instrument_node="">.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">20 AWG wire has a rated ampacity of 11 amps. That is a perfect wire size for a 10 amp circuit.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1509" id="AdThrive_Content_65_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">If you want to have an even safer circuit, you can use 18 AWG wire as the 10 amps wire size.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">Note: Do inform yourself about the specific characteristics of these wires before you buy one. Here are jump links to these 2 wires (just click on them and you’ll jump to the AWG wire characteristics from the 1st Chapter);</span></p><span data-dcnode-id="1502" instrument_node="">

</span><div class="comment-content" data-dcnode-id="950" itemprop="text"><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Great article and very specific and detailed for the most common amperages!  I think one key metric that you left out of this article is what the National Electric Code says about conductor sizing, specifically what the NEC says about sizing for continuously loaded conductors.  If a load is expected to ever remain on for longer than 3 hours, the conductor needs to be rated for 1.25x the load rated amps.  For instance in your 20 amps circuit, “ If you want to have an even safer circuit, you can use 12 AWG wire as the 20 amps wire size.”  Well, if the 20 amp load is ever going to be on for more than 3 hours, then the NEC requires that you use 12 awg wire and it isn’t an option.  I think it is an important distinction so that people understand that the wire be adequately sized for continuous rating and that they cannot opt for the cheaper 14 awg wire in this situation.</span></p><span data-dcnode-id="955" instrument_node="">
</span><span class="reply" data-dcnode-id="952"><a aria-label="Reply to Josh" class="comment-reply-link" data-belowelement="div-comment-5786" data-commentid="5786" data-dcnode-id="953" data-postid="8862" data-replyto="Reply to Josh" data-respondelement="respond" href="#comment-5786" rel="nofollow"><span data-dcnode-id="954" instrument_node="">Reply</span></a></span><span data-dcnode-id="951" instrument_node=""> </span></div><span data-dcnode-id="949" instrument_node="">

</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Everything you say about wire ampacity and sizing is true for a single copper conductor in open air.  You also need to pay attention to what type of wire you are using, NM-B, TW, THHN, SOOW just to name a few.  The type of wire determines how it is being used.  There are many other rules that govern the size of a wire by the NEC.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">If you are wiring to a panel, you can not use a wire smaller than 14 AWG on a 15 amp circuit, 12 AWG on a 20 amp circuit, and 10 AWG on a 30 amp circuit.</span></p><span data-dcnode-id="864" instrument_node="">
</span><span class="reply" data-dcnode-id="861"><a aria-label="Reply to Mike L" class="comment-reply-link" data-belowelement="div-comment-7053" data-commentid="7053" data-dcnode-id="862" data-postid="8862" data-replyto="Reply to Mike L" data-respondelement="respond" href="#comment-7053" rel="nofollow"><span data-dcnode-id="863" instrument_node="">Reply</span></a></span><span data-dcnode-id="860" instrument_node=""> </span></div><span data-dcnode-id="858" instrument_node="">

</span><p data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">EER = BTU</span><sub data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">cooling</span></sub><span data-dcnode-id="519" instrument_node="">/W</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="516" instrument_node="">HSPF = BTU</span><sub data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">heating</span></sub><span data-dcnode-id="513" instrument_node="">/W</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">COP = Q (useful heat)/W (input work)</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="507" instrument_node="">ACH = CFM x 60/Area x Height</span><sub data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">ceiling</span></sub></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Total Heat (BTU/hr.) = 4.5 x CFM x Δh (std. air)</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Sensible Heat (BTU/hr) = 1.1 x CFM x Δt (std. air)</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Latent Heat (BTU/hr) = 0.69 x CFM x Δgr. (std. air)</span></p><span data-dcnode-id="494" instrument_node="">
