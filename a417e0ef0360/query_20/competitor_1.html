adrail" data-dcnode-id="232"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="238"><div class="BodyWrapper-ctnerm fJTCQC body body__container article__body" data-dcnode-id="239" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="240"><p data-dcnode-id="274"><span class="lead-in-text-callout" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">The WarkaWater tower</span></span><span data-dcnode-id="278" instrument_node=""> is an unlikely structure to find jutting from the Ethiopian landscape. At 30 feet tall and 13 feet wide, it’s not half as big as its namesake tree (which can loom 75 feet tall), but it’s striking nonetheless. The spindly tower, of latticed bamboo lined with orange polyester mesh, isn’t art---though it does kind of look like it. Rather, the structure is designed to wring water out of the air, providing a sustainable source of H</span><sub data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">2</span></sub><span data-dcnode-id="275" instrument_node="">O for developing countries.</span></p><p class="paywall" data-dcnode-id="269"><span data-dcnode-id="273" instrument_node="">Created by Arturo Vittori and his team at </span><a class="external-link" data-dcnode-id="271" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.architectureandvision.com/&quot;}" data-offer-url="http://www.architectureandvision.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.architectureandvision.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="272" instrument_node="">Architecture and Vision</span></a><span data-dcnode-id="270" instrument_node="">, the towers harvest water from rain, fog and dew. This isn’t a new idea---people have been doing this for as long as they've needed water, often with air wells. Often built as high-rising stone structures, air wells gather moisture from the air and funnel it into a basin for collection. The WarkaWater functions in much the same way, using mesh netting to capture moisture and direct it into hygienic holding tank accessed via a spout.</span></p><p class="paywall" data-dcnode-id="262"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.com/2014/03/warka-water-africa/"><span data-dcnode-id="268" instrument_node="">We wrote</span></a><span data-dcnode-id="266" instrument_node=""> about the towers last year when Vittori unveiled a full-size prototype. The company has a newer version of the WarkaWater and a </span><a class="external-link" data-dcnode-id="264" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.kickstarter.com/projects/366225655/warka-water-each-drop-counts&quot;}" data-offer-url="https://www.kickstarter.com/projects/366225655/warka-water-each-drop-counts" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kickstarter.com/projects/366225655/warka-water-each-drop-counts" rel="nofollow noopener" target="_blank"><span data-dcnode-id="265" instrument_node="">Kickstarter</span></a><span data-dcnode-id="263" instrument_node=""> campaign to fund field testing in Ethiopia later this year. Based on tests performed in its Italian lab, the company claims the latest iteration can harvest 13 to 26.4 gallons of water daily. That’s less than most people flush away each day, but a significant quantity in a country where some 60 million people lack sufficient potable water.</span></p><figure class="AssetEmbedWrapper-iLfYbx iclJOW asset-embed" data-dcnode-id="252"><div class="AssetEmbedAssetContainer-fogSSF kRpSOB asset-embed__asset-container" data-dcnode-id="257"><span class="SpanWrapper-kGGzGm fCMktE responsive-asset AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset" data-dcnode-id="258"><picture class="ResponsiveImagePicture-jIKgcS fArnhQ AssetEmbedResponsiveAsset-eqsnW ehcXJi asset-embed__responsive-asset responsive-image" data-dcnode-id="259" style="height: 329px;"><noscript data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">&lt;img alt="warka6" class="ResponsiveImageContainer-dlOMGF byslZC responsive-image__image" src="https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_1600%2Cc_limit/warka6.jpg" srcSet="https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_120,c_limit/warka6.jpg 120w, https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_240,c_limit/warka6.jpg 240w, https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_320,c_limit/warka6.jpg 320w, https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_640,c_limit/warka6.jpg 640w, https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_960,c_limit/warka6.jpg 960w, https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_1280,c_limit/warka6.jpg 1280w, https://media.wired.com/photos/593295e358b0d64bb35d2cf2/master/w_1600,c_limit/warka6.jpg 1600w" sizes="100vw"/&gt;</span></noscript></picture></span></div><div class="CaptionWrapper-brisHk jBAfqK caption AssetEmbedCaption-eXYFag gEaUBR asset-embed__caption" data-dcnode-id="253" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Caption&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Caption&quot;}" data-include-experiments="true"><span data-dcnode-id="256" instrument_node=""></span><span class="BaseWrap-sc-TURhJ BaseText-fFzBQt CaptionCredit-cTdqxu eTiIvU gfhlAT iHbDSe caption__credit" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">How the system works. Illustration: WarkaWater</span></span></div></figure><p class="paywall" data-dcnode-id="247"><span data-dcnode-id="251" instrument_node="">The new prototype has some key upgrades: The exterior is of bamboo rather than juncus, the top of the tower has reflective pieces to deter birds, and the structure is larger (13 feet wide, up from 7). This doubled the surface area of its water-resistant polyester mesh netting---the orange material you see---so more water is collected as fog permeates the fine mesh. MIT has been </span><a class="external-link" data-dcnode-id="249" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://newsoffice.mit.edu/2013/how-to-get-fresh-water-out-of-thin-air-0830&quot;}" data-offer-url="http://newsoffice.mit.edu/2013/how-to-get-fresh-water-out-of-thin-air-0830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//newsoffice.mit.edu/2013/how-to-get-fresh-water-out-of-thin-air-0830" rel="nofollow noopener" target="_blank"><span data-dcnode-id="250" instrument_node="">researching</span></a><span data-dcnode-id="248" instrument_node=""> a similar fog harvesting technique that draws inspiration from the Namib beetle. The process of collecting rain is straightforward, but capturing dew is slightly more complicated. Dew forms when the surface area temperature drops relative to the surrounding air. This happens most often in the time between nightfall and sunrise. Vittori is researching materials for the funnel section of the WarkaWater (between mesh netting and the tank) that will lose heat as quickly as possible in order to optimize the small window of dew-production.</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="246" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><p class="paywall" data-dcnode-id="241"><span data-dcnode-id="245" instrument_node="">The </span><a class="external-link" data-dcnode-id="243" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.warkawater.com/&quot;}" data-offer-url="http://www.warkawater.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.warkawater.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="244" instrument_node="">WarkaWater</span></a><span data-dcnode-id="242" instrument_node=""> will cost around $1,000 to produce and requires no electricity. Vittori says it takes less than an hour to assemble the five modules into a finished tower, making it easily packed and moved as necessary. The practical goal is for the WarkaWater to become an efficient round-the-clock water production machine. But populating the landscape with alien towers is about more than just functionality, it’s about architecture. You can tell Vittori wanted to design something iconic, but beyond that is the tower’s potential to the social nexus of a village. With fabric canopies that stretch out like a peplum skirt, the towers could be a place where people gather to socialize and seek shelter from the sun, just as they would beneath a leafy Warka tree.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="233"><div class="StickyBoxWrapper-euhCxU luKJG sticky-box" data-dcnode-id="234"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="236"><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="237" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="235"></div></div></div></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ContentWrapperGrid-haXkHn diFmFK grid-layout--adrail narrow wide-adrail" data-dcnode-id="225"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="226"><div class="body body__container" data
