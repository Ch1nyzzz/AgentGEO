</span><div class="content" data-dcnode-id="1462"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1468"><div class="field-items" data-dcnode-id="1469"><div class="field-item even" data-dcnode-id="1470"><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Great article and comments everyone! One thing to remember, if you take B vitamins, your urine can be bright yellow (regardless of how much liquid you drink) so the colour of your urine may not be a good indicator. I heartily agree that eating water-rich foods is a great way to hydrate yourself but I am one of those people who doesn't get thirty very often (always been that way). I know I'm dehydrated by looking at my skin - dry and wrinkly. I've read about the water cure and it makes sense to me - the addition of proper sea salt (not the white stuff you find on most people's dinner table) to your water helps replenish what you're washing away. Remember, though, that it needs to be high quality sea salt (or I imagine Himalayan salt) - 1/4 teaspoon per litre of water and don't drink with meals - as someone mentioned - it dilutes your digestive juices. As for the amount of water, gauge how you feel since everyone is different. The people who drank gallons of water for the contest did so over a short period of time and one poor person paid the ultimate price. Trust your body's signals. Thanks for the great article!</span></p><span data-dcnode-id="1471" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="1463"><li class="comment-reply first last" data-dcnode-id="1465"><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/6294"><span data-dcnode-id="1467" instrument_node="">reply</span></a></li><span data-dcnode-id="1464" instrument_node="">

</span><div class="content" data-dcnode-id="1363"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1369"><div class="field-items" data-dcnode-id="1370"><div class="field-item even" data-dcnode-id="1371"><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">This article is amazing.  I read this article a year ago and it hit me like ton of bricks.  I always had a bottle of water on hand, I was always using the bathroom thinking if my urin was clear it was a good thing.  My left kidney started to ache sometimes but I was stupid and thought I wasn't drinking enough water.  I would literally panic if I ever felt thirsty, like I was going to die or something.  I was feeling so sick and down, and then I read this article, I had never before heard that americans were drinking too much water.  It is SOOOO TRUE!  We are water obsessed.  Needless to say, I started cutting back on water right away and it changed my health and life.  I started to have more energy.  I have not had any kidney aches since.   I am so much more free.  I drink when I am thirsty.  It makes so much sense!  Thank you Dr. Ben kim.  You are a saint for posting pure doctrine on health.</span></p><span data-dcnode-id="1372" instrument_node="">

</span><h3 class="title" data-dcnode-id="1351"><a class="permalink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/7135%23comment-7135" rel="bookmark"><span data-dcnode-id="1353" instrument_node="">I Got Really Sick</span></a></h3><span data-dcnode-id="1350" instrument_node=""> </span><div class="submitted" data-dcnode-id="1345"><span data-dcnode-id="1349" instrument_node="">Submitted by </span><a class="username" data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ewebsmith.com/info" rel="nofollow"><span data-dcnode-id="1348" instrument_node="">Web Smith</span></a><span data-dcnode-id="1346" instrument_node=""> on March 28, 2011 - 00:12</span></div><span data-dcnode-id="1344" instrument_node="">
</span><div class="content" data-dcnode-id="1332"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1338"><div class="field-items" data-dcnode-id="1339"><div class="field-item even" data-dcnode-id="1340"><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">I succumbed to bottled water company marketing and social pressure and added 64 ounces of water to my daily diet. My kidneys couldn't handle the additional fluid and I swelled up and had trouble walking short distances and breathing. After dialing 911 one evening I spent 3 weeks in the hospital hooked up to a diuretic IV. The diagnosis was congestive heart failure. I am undergoing physical therapy now to regain my sense of balance and be able to walk. I just dumped the walker for a cane. Hoping to start walking and carrying my bag on the golf course next month again.</span></p><span data-dcnode-id="1341" instrument_node="">

</span><div class="content" data-dcnode-id="1301"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1307"><div class="field-items" data-dcnode-id="1308"><div class="field-item even" data-dcnode-id="1309"><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">I have learned a lot about water in the last couple of years, how contaminated it is and the poisons that are in our water. I started drinking alkaline water about 2 years ago and water a world of difference. It seems to be overlooked here that our bodies need to be pH balanced, and that our bodies need to be hydrated. For all the pop and food that we consume our bodies are so acidic. I feel that contributes to all of the dis-eases of our bodies. We should be drinking half of our body weight in water. Our bodies are an ocean of salt water. We need a 7.365 healthy blood pH, our body weight in water is around 75 to 80%, our blood 83%, our bones 20%, our brain 80%water. We need water and we need healthy water. THat is why my combination of alkaline water, which I will drink nothing else, and Himyalan Salts, I have never felt better and my body loves it.</span></p><span data-dcnode-id="1310" instrument_node="">

</span><div class="content" data-dcnode-id="1218"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1224"><div class="field-items" data-dcnode-id="1225"><div class="field-item even" data-dcnode-id="1226"><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Hi Dr Ben Kim  </span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">I enjoy reading all your awesome articles So simple to read &amp; understand.  Thank you.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">I refer to your article on drinking water.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">I drink more than 2 litres water daily. This is spread thru out the 16 waking hours.  We work in air conditiong comfort for more than 8 hours a day which makes me very dry.  I drink almost like 1.5 litres during my day in the office. </span></p><span data-dcnode-id="1233" instrument_node="">

</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Am i drinking more that my body needs.</span></p><span data-dcnode-id="1227" instrument_node="">

I find it</span></a></h3><span data-dcnode-id="1205" instrument_node=""> </span><div class="submitted" data-dcnode-id="1200"><span data-dcnode-id="1204" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Anonymous</span></span><span data-dcnode-id="1201" instrument_node=""> on May 14, 2012 - 21:30</span></div><span data-dcnode-id="1199" instrument_node="">
</span><div class="content" data-dcnode-id="1181"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1187"><div class="field-items" data-dcnode-id="1188"><div class="field-item even" data-dcnode-id="1189"><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Absolutely not! </span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">I find it dangerous and irresponsible to tell people to drink less water. If sipped slowly, the kidneys can process about 15 litres of water a day. That's a ridiculous amount, right? So, assuming you're not engaging in any water-drinking competitions, it's very unlikely that you will ever overdose on water. </span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">There are indeed certain kidney disorders for which your doctor might tell you to decrease your water intake, but short of that drink drink drink! I see so many urinary infections (especially in women) that could have been prevented by proper hydration. Sepsis can be life threatening, even in young otherwise healthy people. And remember, one bad kidney infection can damage your kidneys forever.</span></p><span data-dcnode-id="1190" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="1182"><li class="comment-reply first last" data-dcnode-id="1184"><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/10403"><span data-dcnode-id="1186" instrument_node="">reply</span></a></li><span data-dcnode-id="1183" instrument_node="">

</span><h3 class="title" data-dcnode-id="1169"><a class="permalink" data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/6586%23comment-6586" rel="bookmark"><span data-dcnode-id="1171" instrument_node="">Drinking water</span></a></h3><span data-dcnode-id="1168" instrument_node=""> </span><div class="submitted" data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">NazKat </span></span><span data-dcnode-id="1164" instrument_node=""> on February 18, 2011 - 21:54</span></div><span data-dcnode-id="1162" instrument_node="">
</span><div class="content" data-dcnode-id="1150"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1156"><div class="field-items" data-dcnode-id="1157"><div class="field-item even" data-dcnode-id="1158"><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">I drink when thirsty, and have never been able to drink the 64 oz a day they used to advise us to do. Glad I didn't now that I know more. Also, drinking cold water from the fridge is not very good for your digestion, as I have read in many places. I usually drink my water from a room temperature bottle, or if I have juice, I let it sit for a few minutes to take the chill off. I have also discovered on my own, that drinking hot tea with my meal makes everything digest better (learned while out for a Chinese meal). Now I find out that is what is recommended. So many times our body will tell us what we need, if we only listen... heed your sense of thirst - drink a bit. Heed your appetite, but stop before you are full. I realize this may not work for those whose systems are out of whack - being overweight, dieting, ignoring thirst or appetite, etc - but in general, it seems to be a good rule to follow. Works for me!</span></p><span data-dcnode-id="1159" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="1151"><li class="comment-reply first last" data-dcnode-id="1153"><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/6586"><span data-dcnode-id="1155" instrument_node="">reply</span></a></li><span data-dcnode-id="1152" instrument_node="">

</span><h3 class="title" data-dcnode-id="1138"><a class="permalink" data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/7856%23comment-7856" rel="bookmark"><span data-dcnode-id="1140" instrument_node="">water drinking</span></a></h3><span data-dcnode-id="1137" instrument_node=""> </span><div class="submitted" data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Anonymous</span></span><span data-dcnode-id="1133" instrument_node=""> on May 5, 2011 - 16:29</span></div><span data-dcnode-id="1131" instrument_node="">
</span><div class="content" data-dcnode-id="1119"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1125"><div class="field-items" data-dcnode-id="1126"><div class="field-item even" data-dcnode-id="1127"><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">My own water drinking is an effort to cope with what seems like Myesthenia Gravis.  I take amino acids complete and know H2O is necessary for the proper formation of proteins.  They have to have a wet environment and I suspect we have a defective thirst response.  Fruit may work but we live in a world mostly above the Equatorial region that has only seasonal food.  The imports may contain only dead enzymes that are non functional.  Indeed, rancid vegetable oils (not refrigerated, kept in light, and if not fresh, weeks, they are off, rancid, and therefore rob vitamins from the blood stream.</span></p><span data-dcnode-id="1128" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="1120"><li class="comment-reply first last" data-dcnode-id="1122"><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/7856"><span data-dcnode-id="1124" instrument_node="">reply</span></a></li><span data-dcnode-id="1121" instrument_node="">

</span><div class="comment" data-dcnode-id="1068"><span data-dcnode-id="1110" instrument_node="">
</span><h3 class="title" data-dcnode-id="1107"><a class="permalink" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/8604%23comment-8604" rel="bookmark"><span data-dcnode-id="1109" instrument_node="">water and physical activity</span></a></h3><span data-dcnode-id="1106" instrument_node=""> </span><div class="submitted" data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Ben Skip</span></span><span data-dcnode-id="1102" instrument_node=""> on July 11, 2011 - 12:59</span></div><span data-dcnode-id="1100" instrument_node="">
</span><div class="content" data-dcnode-id="1073"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1079"><div class="field-items" data-dcnode-id="1080"><div class="field-item even" data-dcnode-id="1081"><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">A good article, but the connection between water and physical performance for relatively health people seems underrated/ ignored in the article. I'm 26y old, in relatively good shape (8-10% bodyfat, 6'1", 170lbs) and regularly do interval training and bodybuilding (just on a recreational level). I have a low carb, high fat, high protein diet to keep insuline levels low/steady (a big recommendation to many overweight people by the way, don't ignore your insuline levels, cut out that sugarcrap and processed foods full of high fructose corn syrup carbage). In the past, I always listened to my body, drank when thirsty or get a dry mouth etc. </span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Then I read the rule of the urine color. Only close to transparent urine (considering you haven't eaten foods with big amounts of pigments) makes for a hydrated body. 80% of the cases, my urine is clearly yellow. Apparently just listening to the body is not enough, at least not for me. Recently I started drinking about twice the amount (about 4 liters instead of 2), keeping a big bottle of water within arm's reach when possible. NOW finally my urine is quite colorless. </span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Another benefit of drinking more than the body 'asks' for, for me, is that my strength has increased 10 to 20% (!!!) in most weightlifting exercises, especially squats, deadlifts, benchpress and lunges. That's one major PRO for me.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Apart from that, actually my appetite has gone UP since I've started drinking more water. I don't know if it's a direct connection, but it must otherwise be a big coincidence. Believe it or not, for me the increased appetite is a good thing, because I'm not a big eater and the high protein diet gives me a full(filled) feeling. I have problems reaching my required calory count to gain weight for bodybuilding. Now, it's a lot easier for me. </span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Ofcourse drinking 2 galons of water in ONE HOUR or less, for some extremely stupid competition, can cause death. The same can be said for eating extraordinary amounts of any food in an extremely short amount of time. However, I now know a lot of bodybuilders around 170-200lbs that drink 2 gallons of water - SPREAD- throughout the day and they actually perform better and gain mass faster.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">I think most people are actually dehydrated and can have at least a few glasses of water a day extra. These extreme examples of death are not realistic and not applicable in any way for every day people, who do not join horrendous food competitions. Too much of anything is bad. Just want to shed another light on this.</span></p><span data-dcnode-id="1082" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="1074"><li class="comment-reply first last" data-dcnode-id="1076"><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/8604"><span data-dcnode-id="1078" instrument_node="">reply</span></a></li><span data-dcnode-id="1075" instrument_node="">

</span><div class="content" data-dcnode-id="1042"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1048"><div class="field-items" data-dcnode-id="1049"><div class="field-item even" data-dcnode-id="1050"><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">I personally believe that drinking "too much water" is a good thing. I work out twice a day an hour in the morning and a two hour session at night. I eat 6 times a day I just get a bit over 228 grams of protein a day as well. I do not monitor my water intake but I can tell you, atleast 50-80 cups a day, easily. I ALWAYS NEED TO BE HYDRATED, always. I don't know much science behind water but I can tell you I have not been sick once since I was 14 and I am now 22. Ignoring your bladder, being inactive and an idiot will lead to results like this lady. I would tell some contest to shove it up their ass, why degrade yourself this way... anyways, in the article you should make it clear that drinking too much water is bad for your health if you do not use it. As is overeating, a lot of my heavier male friends get jealous when we go out to eat because I can finish off a 24 oz steak, vege, mash, a few beers and desert. Why? I am always working out and I am healthy, thats why. Theres no mountain to tall no ocean to deep when it comes to eating. Trust your body and it's signals, eat as much as you want, just burn that energy and let the protein and vitamins make you bigger, better, faster and stronger. and feel good too :)</span></p><span data-dcnode-id="1051" instrument_node="">

</span><div class="content" data-dcnode-id="912"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="918"><div class="field-items" data-dcnode-id="919"><div class="field-item even" data-dcnode-id="920"><p data-dcnode-id="922"><span data-dcnode-id="925" instrument_node="">I completely agree with this but what about when you have to drink more like with medicine or drinking tea? I have been drinking tea for health benefits but I drink it wiithout milk and sugar and I actually do feel weird afterwards because I drink about a whole cup and it's basically just like coloured water. I am not used to drinking this much water. I think I will have to space it out throughout the day from now on instead of drinking it all at once.</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
Even when I used to take pills as medicine or supplements, I would end up drinking like a sip of water extra every time, when I wasn't even thirsty, it was so annoying. Now I just dry swallow my supplements.</span></p><span data-dcnode-id="921" instrument_node="">

</span><div class="content" data-dcnode-id="878"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="884"><div class="field-items" data-dcnode-id="885"><div class="field-item even" data-dcnode-id="886"><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">A lot of people are debating the validity of drinking a set amount of water daily and using the above article as an excuse for why one shouldn't drink a set amount. However do note that the article is describing EXCESSIVE drinking within a short time frame. Excessive water consumption in a short time frame (much like drinking too much alcohol in a short time frame) will put your body into tilt because you've created a major stress on the body. He did not say "DON'T ever drink more than x amount of water daily - because if you do you're going to kill yourself".</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">The example was a woman who attempted to win a contest by drinking 2 gallons of water in an hour and then forced herself to hold it. Most normal folks wouldn't do something this stupid. So, with a regular (and calm) drinking pattern, your body would have time to safely eliminate any excess water. If drinking a set amount of water works for you - go for it. If it doesn't - don't.</span></p><span data-dcnode-id="887" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="879"><li class="comment-reply first last" data-dcnode-id="881"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/10445"><span data-dcnode-id="883" instrument_node="">reply</span></a></li><span data-dcnode-id="880" instrument_node="">

</span><h3 class="title" data-dcnode-id="866"><a class="permalink" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/30129%23comment-30129" rel="bookmark"><span data-dcnode-id="868" instrument_node="">Water and fiber</span></a></h3><span data-dcnode-id="865" instrument_node=""> </span><div class="submitted" data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">JeDesp</span></span><span data-dcnode-id="861" instrument_node=""> on March 12, 2013 - 21:57</span></div><span data-dcnode-id="859" instrument_node="">
</span><div class="content" data-dcnode-id="844"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="850"><div class="field-items" data-dcnode-id="851"><div class="field-item even" data-dcnode-id="852"><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Yeah I think what this article is saying is that you shouldnt drink MASSIVE amounts of water (like the crazy example), but most people dont. People shouldn't use it as an excuse to not drink water, cause they dont like it or whatever. I dont even like it myself, but I do it because I know my body needs it. And I am surprised noone mentioned the link between water and fiber intake. I eat a lot of fiber (30-40g/day) and if I dont drink enough water (at least 7 or 8 cups per day) I get constipated. Thats probably cause of the fiber, because you need water in combination with fiber. But if I dont eat at least 25-30g fiber I also get constipated, so I gotta do both. I like drinking water after a workout, but all other times I just kind of make myself do it cause I know I need it. On some days I slack off on it and I dont even really feel thirsty. So I dont think that's a really good way to go by to see if you need water. As many have said, if you feel thirsty you are already dehydrated. Also when I drink at least 7 or 8 cups of water per day, my skin looks better and more hydrated.</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">On a side note, I think it would be nice if these comments or at the very least the article had a date on it. It would be nice to see if a comment was left 3 years ago or yesterday.</span></p><span data-dcnode-id="853" instrument_node="">

</span><div class="content" data-dcnode-id="699"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="705"><div class="field-items" data-dcnode-id="706"><div class="field-item even" data-dcnode-id="707"><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">"The 28-year-old runner who collapsed and died in this year's Boston Marathon was felled by a precipitous cascade of medical events brought on in part by drinking too much fluid, the state medical examiner's office concluded yesterday."  </span></p><span data-dcnode-id="711" instrument_node="">

</span><h3 class="title" data-dcnode-id="688"><a class="permalink" data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/29668%23comment-29668" rel="bookmark"><span data-dcnode-id="690" instrument_node="">Actually, a person can drink</span></a></h3><span data-dcnode-id="687" instrument_node=""> </span><div class="submitted" data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Aine</span></span><span data-dcnode-id="683" instrument_node=""> on December 4, 2012 - 10:03</span></div><span data-dcnode-id="681" instrument_node="">
</span><div class="content" data-dcnode-id="660"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="666"><div class="field-items" data-dcnode-id="667"><div class="field-item even" data-dcnode-id="668"><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Actually, a person can drink as much water as he likes, as long as he is healthy and his urinary system is working. There MUST be a balance between input and output, though. </span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Personally, I love drinking room temperature water! Its one of my quirks and a lot of people say I'm weird because of this. I bring a 1 liter bottle to school, and I probably refill it 3-5 times per day. That's a lot of water, not counting my meals and the water I drink at home. Of course, it means that I take bathroom breaks a lot, though! I'm always excusing myself from class every hour or so.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Also, it's important not to drink a lot of water in one sitting! Because this would cause system overload, spiking your blood pressure. Normally, our body has compensatory mechanisms so this wouldn't be harmful, but drinking too much fluid that the body can't handle could lead to something fatal like pulmonary edema.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Balance is the key, I suppose! In any case, I really do love drinking water.</span></p><span data-dcnode-id="669" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="661"><li class="comment-reply first last" data-dcnode-id="663"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/29668"><span data-dcnode-id="665" instrument_node="">reply</span></a></li><span data-dcnode-id="662" instrument_node="">

</span><h3 class="title" data-dcnode-id="648"><a class="permalink" data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/32465%23comment-32465" rel="bookmark"><span data-dcnode-id="650" instrument_node="">Drinking more water not always best</span></a></h3><span data-dcnode-id="647" instrument_node=""> </span><div class="submitted" data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Anonymous</span></span><span data-dcnode-id="643" instrument_node=""> on February 23, 2014 - 02:42</span></div><span data-dcnode-id="641" instrument_node="">
</span><div class="content" data-dcnode-id="611"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="617"><div class="field-items" data-dcnode-id="618"><div class="field-item even" data-dcnode-id="619"><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">I was told that I was chronically dehydrated by my physician and that the sodas I had been drinking were causing more dehydration while diminishing my thirst.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">So I decided to cut sodas and only drink water. I was surprised how quickly I felt better. I started working out, too. </span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Then I started to get thirsty more often...and CRAVED water. I thought this was finally my body telling me I was feeding it correctly. Before I realized it (within a couple of weeks), I was refilling my 32oz bottle 4 or 5 times per day. No you're reading that right. Sometimes, I'd drink over 150oz in a day. I was drinking to thirst, so I didn't think it was a bad thing. </span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Then, I started having low back pain. Within 24 hours, I was running a high fever, and feeling like crap. Went to urgent care, and they said I had a kidney infection. Well super. The cure was antibiotics and drinking MORE water.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">So I pushed more water and took antibiotics. After about 3 days, I started to bloat abdominally. I had swollen ankles and hands, felt miserable, and the bloat was so painful that I thought I might be pregnant (and I've had a partial hysterectomy!! So you see how strange that is!). Went back to the doc. Blood tests showed acute kidney failure. </span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">By changing my water intake to "normal" right off the bat, I set my body on a course to self-destruct. Now, I'm battling chronic kidney failure, IBS, and chronic dry mouth. I kind of wish I could start over.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">People need to realize that too much for your body may simply just be what is too different from what you were already giving it. Start small. Don't make sudden changes. Even when it comes to water intake.</span></p><span data-dcnode-id="620" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="612"><li class="comment-reply first last" data-dcnode-id="614"><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/32465"><span data-dcnode-id="616" instrument_node="">reply</span></a></li><span data-dcnode-id="613" instrument_node="">
</span></ul></div><span data-dcnode-id="610" instrument_node="">

</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">I, at 61, 6.1 ft, 190 lbs, am fairly healthy, but with Hypotension &amp; type II diabetics, have been drinking around three + liters of water since around two months.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">I have lost five five pounds, my diabetic scores are within limits ( of course with medicines which were generally out of range even with medicines earlier), urine is near clear levels, going to wash room frequency is more and apart from this, I have not found any other adverse effect. Dunno really about it flushing out  vitamins with the toxins, I have been taking multi vitamin &amp; vit C on regular basis, though. Moderate three meals as breakfast at 8.30 AM followed by fruit mostly Apple at 11.30 AM, lunch at 2 PM, light snack with tea 4/5 PM and dinner( mostly chicken five days in a week) at 9 PM and water in between has been the norm.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">If drinking water helps matters of health, diabetes, not sure about Hypertension though, it appears to be worth the effort of going to wash room, which at my age is more even otherwise ok due to prostrate enlargement, while hoping it does not make the kidneys over work, effect them adversely or has any other adverse implication.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Imbibing that much of water now happens automatically and I do not  have to make extra effort on my part.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">What will be the outcome, I will know the result couple of months down the line!</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Till then lot of water would have gone down the system, hopefully more cleaning toxins and less washing out vital vitamins, as these would have been absorbed by the system! </span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Life goes ON, more so in positive thinking and less expectations from anyone /anything, including water!</span></p><span data-dcnode-id="531" instrument_node="">

</span><h3 class="title" data-dcnode-id="510"><a class="permalink" data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/38265%23comment-38265" rel="bookmark"><span data-dcnode-id="512" instrument_node="">imperative instructions </span></a></h3><span data-dcnode-id="509" instrument_node=""> </span><div class="submitted" data-dcnode-id="504"><span data-dcnode-id="508" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">brian</span></span><span data-dcnode-id="505" instrument_node=""> on May 29, 2016 - 18:31</span></div><span data-dcnode-id="503" instrument_node="">
</span><div class="content" data-dcnode-id="491"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="497"><div class="field-items" data-dcnode-id="498"><div class="field-item even" data-dcnode-id="499"><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Yes drinking a massive amount of water within a short time frame can kill you. However, unless you have a medical condition you can lose weight. I've heard people say "I barely eat, and consume carrots and celery and wholesome foods"- THAT MAKES YOU RETAIN OR GAIN WEIGHT TOO " because you're starving and the body slows the metabolism out of panic and self preservation. I WAS FAT and I was educated (which is worse and hypocritical, lol) because I knew that I needed to count macronutrients and create a balance to "heal" my body (not undereat, or over eat, not deprive or sit around, not drink apple cider vinegar, not take ephedrine or take prescription drugs) you need to calculate how many fats, carbs, calories and protein you need (macronutrient calculations.) Once you've done that APPLY IT, write down results, recalculate or adjust accordingly as you hit plateaus. You will lose the weight.It doesn't have to be perfect, but get close.And please walk around the planet quickly, and drink water A LOT but space the times between consumption too. I lost seventy pounds diong this YEARS ago, but have been around the greatest athletes IN THE WORLD- olympic athletes, pro boxers- and have studied nutrition for thirty years. I've seen athletes and soccer moms, and no one fails if they apply the right strategy</span></p><span data-dcnode-id="500" instrument_node="">

</span><div class="content" data-dcnode-id="401"><div class="view view-thought-block view-id-thought_block view-display-id-block_1 view-dom-id-b73c50631a58e7ddcd70625057f853dd" data-dcnode-id="402"><span data-dcnode-id="429" instrument_node="">

</span><div class="views-row views-row-1 views-row-odd views-row-first views-row-last" data-dcnode-id="412"><span data-dcnode-id="427" instrument_node="">
</span><div class="views-field views-field-body" data-dcnode-id="414"><span data-dcnode-id="426" instrument_node=""> </span><div class="field-content" data-dcnode-id="416"><span data-dcnode-id="425" instrument_node="">There is a twilight zone in our hearts that we ourselves cannot see. Even when we know quite a lot about ourselves - our gifts and weaknesses, our ambitions and aspirations, our motives and our drives - large parts of ourselves remain in the shadow of consciousness. This is a very good thing. We will always remain partially hidden to ourselves. Other people, especially those who love us, can often see our twilight zones better than we ourselves can. The way we are seen and understood by others is different from the way we see and understand ourselves. We will never fully know the significance of our presence in the lives of our friends. That's a grace, a grace that calls us not only to humility, but to a deep trust in those who love us. It is the twilight zones of our hearts where true friendships are born.</span><br data-dcnode-id="424"><span data-dcnode-id="423" instrument_node="">
</span><br data-dcnode-id="422"><span data-dcnode-id="421" instrument_node="">
- Henri Nouwen</span><br data-dcnode-id="420"><span data-dcnode-id="419" instrument_node="">
