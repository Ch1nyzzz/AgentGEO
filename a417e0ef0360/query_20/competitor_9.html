</span><h1 class="title" data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">Why Drinking Too Much Water Can Be Harmful To Your Health</span></h1><span data-dcnode-id="5393" instrument_node="">
</span><div class="clearfix" data-dcnode-id="5391" id="tabs-wrapper"><span data-dcnode-id="5392" instrument_node="">

</span><div class="block block-system" data-dcnode-id="472" id="block-system-main"><span data-dcnode-id="5387" instrument_node="">
</span><h2 class="title" data-dcnode-id="5386"></h2><span data-dcnode-id="5385" instrument_node="">
</span><div class="content" data-dcnode-id="474"><span data-dcnode-id="5384" instrument_node="">
</span><div class="node node-blog node-promoted" data-dcnode-id="477" id="node-550"><span data-dcnode-id="5383" instrument_node="">
</span><div class="submitted" data-dcnode-id="5378"><span data-dcnode-id="5382" instrument_node="">Posted by </span><span class="username" data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">Dr. Ben Kim</span></span><span data-dcnode-id="5379" instrument_node=""> on Jun 11, 2012</span></div><span data-dcnode-id="5377" instrument_node="">
</span><div class="social-buttons" data-dcnode-id="5369"><span data-dcnode-id="5376" instrument_node="">
</span><span data-dcnode-id="5374" instrument_node="">
</span><span data-dcnode-id="5373" instrument_node="">
</span><span class="PIN_1650941019289_button_pin PIN_1650941019289_save" data-dcnode-id="5371" data-pin-href="https://www.pinterest.com/pin/create/button/" data-pin-log="button_pinit_bookmarklet"><span data-dcnode-id="5372" instrument_node="">Save</span></span><span data-dcnode-id="5370" instrument_node="">
</span></div><span data-dcnode-id="5368" instrument_node="">
</span><div class="content clearfix" data-dcnode-id="480"><span data-dcnode-id="5367" instrument_node="">
</span><span data-dcnode-id="5365" instrument_node="">
</span><div class="field field-name-taxonomy-vocabulary-1 field-type-taxonomy-term-reference field-label-hidden" data-dcnode-id="5360"><div class="field-items" data-dcnode-id="5361"><div class="field-item even" data-dcnode-id="5362"><a data-dcnode-id="5363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/health-concerns/health-warnings"><span data-dcnode-id="5364" instrument_node="">Health Warnings</span></a></div></div></div><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="5273"><div class="field-items" data-dcnode-id="5274"><div class="field-item even" data-dcnode-id="5275"><p data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">On January 12, 2007, a 28-year old Californian wife and mother of three children died from drinking too much water.  Her body was found in her home shortly after she took part in a water-drinking contest that was sponsored by a local radio show.  Entitled "Hold Your Wee For A Wii," the contest promoters promised a free Wii video game machine to the contestant who drank the most water without urinating.  </span></p><span data-dcnode-id="5357" instrument_node="">
</span><p data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">It is estimated that the woman who died drank approximately 2 gallons of water during the contest.  When she and other contestants complained of discomfort and showed visible signs of distress, they were laughed at by the promoters and even heckled.  </span></p><span data-dcnode-id="5353" instrument_node="">
</span><p data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">This tragic news story highlights the importance of understanding why drinking too much water can be dangerous to your health.</span></p><span data-dcnode-id="5350" instrument_node="">
</span><p data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">Whenever you disregard your sense of thirst and strive to ingest several glasses of water a day just because you have been told that doing so is good for your health, you actually put unnecessary strain on your body in two major ways:</span></p><span data-dcnode-id="5347" instrument_node="">
</span><ol data-dcnode-id="5327"><span data-dcnode-id="5346" instrument_node="">
</span><li data-dcnode-id="5341"><span data-dcnode-id="5345" instrument_node="">
</span><p data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">Ingesting more water than you need can increase your total blood volume.  And since your blood volume exists within a closed system (your circulatory system), needlessly increasing your blood volume on a regular basis puts unnecessary burden on your heart and blood vessels.</span></p><span data-dcnode-id="5342" instrument_node="">
</span></li><span data-dcnode-id="5340" instrument_node="">
</span><li data-dcnode-id="5329"><span data-dcnode-id="5339" instrument_node="">
</span><p data-dcnode-id="5331"><span data-dcnode-id="5338" instrument_node="">Your kidneys must work overtime to filter excess water out of your circulatory system.  Your kidneys are </span><strong data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">not</span></strong><span data-dcnode-id="5335" instrument_node=""> the equivalent of a pair of plumbing pipes whereby the more water you flush through your kidneys, the cleaner they become; rather, the filtration system that exists in your kidneys is composed in part by a series of specialized capillary beds called glomeruli.  Your glomeruli </span><strong data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">can</span></strong><span data-dcnode-id="5332" instrument_node=""> get damaged by unnecessary wear and tear over time, and drowning your system with large amounts of water is one of many potential causes of said damage.</span></p><span data-dcnode-id="5330" instrument_node="">
</span></li><span data-dcnode-id="5328" instrument_node="">
</span></ol><span data-dcnode-id="5326" instrument_node="">
</span><p data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">Putting unnecessary burden on your cardiovascular system and your kidneys by ingesting unnecessary water is a subtle process.  For the average person, it is virtually impossible to know that this burden exists, as there are usually no obvious symptoms on a moment-to-moment basis.  But make no mistake about it:  this burden is real and can hurt your health over the long term.</span></p><span data-dcnode-id="5323" instrument_node="">
</span><p data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">Forcing your body to accept a large amount of water within a short period of time - say, an hour or two - as several contestants did during the "Hold Your Wee for a Wii" contest can be fatally dangerous to your health.  Here's why:</span></p><span data-dcnode-id="5320" instrument_node="">
</span><blockquote data-dcnode-id="5311"><p data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">
If you force large amounts of water into your system over a short period of time, your kidneys will struggle to eliminate enough water from your system to keep the overall amount at a safe level.</span></p><span data-dcnode-id="5317" instrument_node="">
</span><p data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">As your circulatory system becomes diluted with excess water, the concentration of electrolytes in your blood will drop relative to the concentration of electrolytes in your cells.  In an effort to maintain an equal balance of electrolytes between your blood and your cells, water will seep into your cells from your blood, causing your cells to swell.</span></p><span data-dcnode-id="5314" instrument_node="">
</span><p data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">If this swelling occurs in your brain, you'll experience increased intracranial pressure i.e. your brain will get squeezed because the flat bones that make up your skull don't provide much give.  Depending on how much water your drink in a short period of time, you could experience a wide variety of symptoms, ranging from a mild headache to impaired breathing.  As occurred in the tragic water-drinking contest, it's quite possible to die if you drink enough water in a short period of time.
</span></p></blockquote><span data-dcnode-id="5310" instrument_node="">
</span><p data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">This information is particularly important for parents to pass on to their children.  Foolish drinking contests are not uncommon among high school and university students, especially while playing cards.    </span></p><span data-dcnode-id="5307" instrument_node="">
</span><p data-dcnode-id="5304"><strong data-dcnode-id="5305"><span data-dcnode-id="5306" instrument_node="">So how much water should you drink to best support your health?</span></strong></p><span data-dcnode-id="5303" instrument_node="">
</span><p data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">The answer depends on your unique circumstances, including your diet, exercise habits, and environment.</span></p><span data-dcnode-id="5300" instrument_node="">
</span><p data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">If you eat plenty of foods that are naturally rich in water, such as vegetables, fruits, and cooked legumes and whole grains, you may not need to drink much water at all.  If you do not use much or any salt and other seasonings, your need for drinking water goes down even further.</span></p><span data-dcnode-id="5297" instrument_node="">
</span><p data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">Conversely, if you do not eat a lot of plant foods and/or you add substantial salt and spices to your meals, you may need to drink several glasses of water every day.</span></p><span data-dcnode-id="5294" instrument_node="">
</span><p data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">Regardless of what your diet looks like, if you sweat on a regular basis because of exercise or a warm climate, you will need to supply your body with more water (through food and/or liquids) than someone who does not sweat regularly.</span></p><span data-dcnode-id="5291" instrument_node="">
</span><p data-dcnode-id="5286"><span data-dcnode-id="5290" instrument_node="">Ultimately, the best guidance I can provide on this issue is to follow your sense of thirst.  Some people believe that thirst is not a reliable indicator of how much water you need, since many people suffer with symptoms related to dehydration and don't seem to feel a need to drink water on a regular basis.  </span><strong data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">My experience has been that most people who are chronically dehydrated have learned to ignore a parched mouth.</span></strong><span data-dcnode-id="5287" instrument_node="">  If you ask such people if they are thirsty and would like a piece of fruit or a glass of water, they will almost always realize that they are indeed thirsty.</span></p><span data-dcnode-id="5285" instrument_node="">
</span><p data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Some people suggest observing the color of your urine as a way of looking out for dehydration.  The idea is that clear urine indicates that you are well hydrated, while yellow urine indicates that you need more water in your system.  While this advice is somewhat useful, it's important to remember that some food additives (including some synthetic nutrients) and heavily pigmented foods (like red beets) can add substantial color to your urine.  Thumbs down for synthetic nutrients, and thumbs up for red beets and other richly colored vegetables and fruits.  </span></p><span data-dcnode-id="5282" instrument_node="">
</span><p data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">The main idea that I want to share through this article is to beware of mindlessly drinking several glasses of water per day without considering your diet, exercise habits, climate, and sense of thirst.    And when you do find yourself in need of water, remember that you can get it from liquids and/or whole foods that are rich in water.</span></p><span data-dcnode-id="5279" instrument_node="">
</span><p data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Please share this article with family and friends, as many people are regularly misinformed on this topic by mainstream media.</span></p><span data-dcnode-id="5276" instrument_node="">

</span><h3 class="title" data-dcnode-id="4781"><a class="permalink" data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/250%23comment-250" rel="bookmark"><span data-dcnode-id="4783" instrument_node="">Water and obesity</span></a></h3><span data-dcnode-id="4780" instrument_node=""> </span><div class="submitted" data-dcnode-id="4775"><span data-dcnode-id="4779" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">Kitty</span></span><span data-dcnode-id="4776" instrument_node=""> on March 6, 2007 - 15:39</span></div><span data-dcnode-id="4774" instrument_node="">
</span><div class="content" data-dcnode-id="4759"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="4765"><div class="field-items" data-dcnode-id="4766"><div class="field-item even" data-dcnode-id="4767"><p data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">I believe you missed one point in this article that more people should realize.  </span></p><span data-dcnode-id="4771" instrument_node="">
</span><p data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">I believe it is probably very common among the obese to eat rather than drink when their mouth gets dry.  Eating will temporarily moisturize the mouth with saliva and is my personal cure of choice if I'm not thinking directly about why I am eating.  Keeping a bottle of water handy, and conciously reaching for that first when I am tempted to the cupboard or refrigerator has helped me change that and I've lost ten pounds in the last 19 days or so.  Can't say if It will make a long term change for me, but I live in hope. Kitty</span></p><span data-dcnode-id="4768" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="4760"><li class="comment-reply first last" data-dcnode-id="4762"><a data-dcnode-id="4763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/250"><span data-dcnode-id="4764" instrument_node="">reply</span></a></li><span data-dcnode-id="4761" instrument_node="">
</span></ul></div><span data-dcnode-id="4758" instrument_node="">

</span><h3 class="title" data-dcnode-id="4747"><a class="permalink" data-dcnode-id="4748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/1103%23comment-1103" rel="bookmark"><span data-dcnode-id="4749" instrument_node="">Water and Obesity</span></a></h3><span data-dcnode-id="4746" instrument_node=""> </span><div class="submitted" data-dcnode-id="4741"><span data-dcnode-id="4745" instrument_node="">Submitted by </span><a class="username" data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//drbenkim.com/drink-too-much-water-dangerous.html" rel="nofollow"><span data-dcnode-id="4744" instrument_node="">sharon nulph</span></a><span data-dcnode-id="4742" instrument_node=""> on April 28, 2008 - 01:56</span></div><span data-dcnode-id="4740" instrument_node="">
</span><div class="content" data-dcnode-id="4725"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="4731"><div class="field-items" data-dcnode-id="4732"><div class="field-item even" data-dcnode-id="4733"><p data-dcnode-id="4738"><span data-dcnode-id="4739" instrument_node="">While I agree with Kitty that many people do turn to food when they get thirsty, mistakenly viewing the nagging need for water as hunger, I think she is being quite judgmental to single out overweight people in this.  This is a common reaction in many people of differing weights and body sizes and does not in itself cause overweight.  Congratulations to her for having lost some extra pounds through substituting water for food and being more aware of her need for water, but to make the statement that obese people eat when thirsty rather than drinking is an ignorant judgment based on opinion.</span></p><span data-dcnode-id="4737" instrument_node="">
</span><p data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">Sharon</span></p><span data-dcnode-id="4734" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="4726"><li class="comment-reply first last" data-dcnode-id="4728"><a data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/1103"><span data-dcnode-id="4730" instrument_node="">reply</span></a></li><span data-dcnode-id="4727" instrument_node="">

</span><div class="content" data-dcnode-id="4694"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="4700"><div class="field-items" data-dcnode-id="4701"><div class="field-item even" data-dcnode-id="4702"><p data-dcnode-id="4704"><span data-dcnode-id="4705" instrument_node="">You should not take some people's words personally.  My point of view is that Kitty was referring to herself when she spoke of obese people.  I, too, am obese and she's right.  I am inclined to satisfy my thirst with food and when I drink water instead, I feel so much better emotionally and physically.  Sorry, Sharon.  I think Kitty was provided a much-needed service to obese or even slightly overweight people everywhere.  Thanks, Kitty.</span></p><span data-dcnode-id="4703" instrument_node="">

</span><p data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">I also have seen MANY people present with normal glucose readings when a single test is done (ie. fasting all night until an a.m. appointment at the doctors.) I have found it far more effective in detecting diabetes with a 12 hour fasting glucose test. With most insurance companies and clinics or private docs, this is often a struggle to get, but I urge you to have the test done or visit with a Integrative or Naturopathic provider that understands the importance of this test.  Beyond that, I also urge you to see Dr. Kim's comments and others who can help you to reverse diabetes (especially Type II) with proper nutrition ...</span></p><span data-dcnode-id="4563" instrument_node="">

</span><div class="content" data-dcnode-id="4291"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="4297"><div class="field-items" data-dcnode-id="4298"><div class="field-item even" data-dcnode-id="4299"><p data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">Thank you Sunshine for your post: I can relate to your condition you spoke of having. My food intake most of the time is very little. I have tried doing the breakfast, lunch and supper meals and it doesn't work for me. I just don't get hungry like most people say they do. I have at times noticed that I can sip on a big cup of coffee all day and not get hungry, but I make myself eat something either at breakfast, lunch or supper time to keep from feeling weak. I do drink water or powdered milk when I am not drinking coffee. I have to watch my sodium intake all the time. I was taking water pills years ago and having to do caths to relieve my body of all the water it stores up. I took myself off of all of it because my body suffered the side effects of all the loop diuretics and the effects bottomed out my potassium, and infection from the caths. I have had bad results from diuretics and different kinds. And having to be hospitalized many times because my body didn't get rid of the water build up fast enough ( but my kidneys by all test are working great)and to be given potassium in the veins because of all the diuretics. (I do not wish this on anyone) Doctors have been baffled by my condition specialist and all. Walking for exercise only causes my feet and legs to swell even more. I do exercises laying on the bed. I am overweight alot but only immobile when feet and legs are swollen. I have no high blood pressure, diabetes or thyroid problem or heart problems ect.. I was told from the mayo clinic that my body not only stores my water intake but also absorbs in water from my baths and showers I take so I have to limit the amount of time of each. Im sure they are others out there like us but you are the first one I have seen posted. God Bless You!</span></p><span data-dcnode-id="4300" instrument_node="">

</span><div class="content" data-dcnode-id="4257"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="4263"><div class="field-items" data-dcnode-id="4264"><div class="field-item even" data-dcnode-id="4265"><p data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">Sunshine, I am a nurse practioner working for a nephrologist and I can guarantee that nobody at the actual Mayo Clinic told you that you are absorbing water through bathing, unless you are drinking the bathwater or injecting it.  The skin is an impermeable membrane and it is impossible for water to enter your tissues across the skin. Your assertion is utterly ludicrous. </span></p><span data-dcnode-id="4269" instrument_node="">
</span><p data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">Many, many things can cause your edema, such as congestive heart failure, liver or kidney failure, hypothyroidism, histamine disorders, protein deficiencies, poor diet, allergies, lack of excercise, lymphatic disease, and more.  Your lack of appetite can have dozens of causes, some physiological, others psychiatric.  Your body has thousands of elegant feedback mechanisms, receptors, etc, and any of them may be damaged or defective.  And many of them can be rendered useless by psychiatric disorders. I suggest you get a complete physical at a reputable clinic or hospital from a medical doctor.  Ask for referrals to specialists if your initial practioner is stumped.  And do not ignore or be offended by the possibility that your problems might have a psychiatric origin.  The brain can exert powerful and unpredictable influences on almost everything the body does.  Good luck.</span></p><span data-dcnode-id="4266" instrument_node="">

</span><div class="content" data-dcnode-id="4130"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="4136"><div class="field-items" data-dcnode-id="4137"><div class="field-item even" data-dcnode-id="4138"><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">I do believe that skin is impregnable, just think about all the swimmer; - would they go into the water to take a few laps and came out with all swelled up?  Your example of the wrinkled skin proves my point, if it had taken water in, it would be swelled up instead of getting wrinkled! For your other example, dead bodies tend to swell up because cells/tissues are breaking up, producing gas! I like facts, or opinion based or supported by facts.</span></p><span data-dcnode-id="4139" instrument_node="">

</span><h3 class="title" data-dcnode-id="4119"><a class="permalink" data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/32210%23comment-32210" rel="bookmark"><span data-dcnode-id="4121" instrument_node="">What causes "wrinkles" after a long bath? </span></a></h3><span data-dcnode-id="4118" instrument_node=""> </span><div class="submitted" data-dcnode-id="4113"><span data-dcnode-id="4117" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">Anonymous</span></span><span data-dcnode-id="4114" instrument_node=""> on December 26, 2013 - 22:43</span></div><span data-dcnode-id="4112" instrument_node="">
</span><div class="content" data-dcnode-id="4062"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="4068"><div class="field-items" data-dcnode-id="4069"><div class="field-item even" data-dcnode-id="4070"><p data-dcnode-id="4108"><span data-dcnode-id="4111" instrument_node="">Why do fingers and toes wrinkle in the bathtub?</span><br data-dcnode-id="4110"><span data-dcnode-id="4109" instrument_node="">
    The outermost layer of the skin swells when it absorbs water. It is tightly attached to the skin underneath, so it compensates for the increased area by wrinkling. However, new research is investigating the role of digital vasoconstriction (narrowing of blood vessels) of water immersion wrinkling of the skin.There are various theories of why fingers and toes wrinkle in water. Most biologists suggest that the tough outer layer of skin made up of dead keratin cells is responsible. Keratin is a protein found in hair, nails, and the outermost layer of our skin. </span></p><span data-dcnode-id="4107" instrument_node="">
</span><p data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Our skin is made up of three layers: </span></p><span data-dcnode-id="4104" instrument_node="">
</span><p data-dcnode-id="4096"><span data-dcnode-id="4103" instrument_node="">•The subcutaneous tissue is the deepest layer. It contains fats and connective tissue along with large blood vessels and nerves.</span><br data-dcnode-id="4102"><span data-dcnode-id="4101" instrument_node="">
•The dermis is the middle layer. It contains the blood vessels, nerves, hair roots, and sweat glands.</span><br data-dcnode-id="4100"><span data-dcnode-id="4099" instrument_node="">
•The epidermis is the topmost layer. It helps to prevent evaporation of water from the body and to protect the internal layers from harm.</span><br data-dcnode-id="4098"><span data-dcnode-id="4097" instrument_node="">
The epidermis is made up of four layers: </span></p><span data-dcnode-id="4095" instrument_node="">
</span><p data-dcnode-id="4085"><span data-dcnode-id="4094" instrument_node="">•the stratum corneum</span><br data-dcnode-id="4093"><span data-dcnode-id="4092" instrument_node="">
•granular layer</span><br data-dcnode-id="4091"><span data-dcnode-id="4090" instrument_node="">
•squamous cell layer</span><br data-dcnode-id="4089"><span data-dcnode-id="4088" instrument_node="">
•and basal cell layer</span><br data-dcnode-id="4087"><span data-dcnode-id="4086" instrument_node="">
The stratum corneum is the outer layer of our skin - the part that we can see and feel. This is the layer with the dead keratin cells.</span></p><span data-dcnode-id="4084" instrument_node="">
</span><p data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">While a person is in the pool or a bathtub for a long time, the dead keratin cells absorb water. This absorption causes the surface area of the skin to swell, but the outer layer is tightly attached to the living tissue. So, to compensate for the increased surface area, our skin wrinkles. </span></p><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">So why does this happen to hands and feet and not to other parts of the body? Because the hands and feet have the thickest layer of dead keratin cells. Our hands and feet are subjected to a lot of wear and tear. Imagine if the palm of our hands had skin as thin as that on our backs. No fun playing basketball with skin that thin!</span></p><span data-dcnode-id="4078" instrument_node="">
</span><p data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">Scientists continue to look for the exact mechanisms of why our fingers and toes wrinkle when immersed in water (Wilder-Smith et al, Hsieh et al). One theory gaining recognition is the role of digital vasoconstriction (narrowing of blood vessels). When hands are immersed in water it seems that the nerve fibers are triggered to “shrink” and glomus bodies (body temperature regulators in the skin) in the hand lose volume, which then pulls the skin structures downwards to produce wrinkling. Studies on patients with loss of nerve function in their hands due to a disorder or replantation of amputated fingers exhibit no or slight wrinkling in the fingers when immersed in water (Hsieh et al). As the nerve functions return, so did the wrinkling.</span></p><span data-dcnode-id="4075" instrument_node="">
</span><p data-dcnode-id="4072"><a data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loc.gov/rr/scitech/mysteries/wrinkles.html"><span data-dcnode-id="4074" instrument_node="">http://www.loc.gov/rr/scitech/mysteries/wrinkles.html</span></a></p><span data-dcnode-id="4071" instrument_node="">

</span><div class="content" data-dcnode-id="3693"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="3699"><div class="field-items" data-dcnode-id="3700"><div class="field-item even" data-dcnode-id="3701"><p data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">It may be that you are not getting enough sleep, vegetables, fruit, beans, lean meat, etc. Vegetables should be number 1 followed by fruit, then meat/beans. Find the ones you like, then force yourself to like a few more if you only like 1-2 vegetables. Open yourself to heavy food, otherwise you're sunk.</span></p><span data-dcnode-id="3711" instrument_node="">
</span><p data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Cut out everything that is crap, literally crap : candy, everything processed like pizza rolls, coffee/pop/commercial teas, donuts, cookies, sweeteners, any fast-food restaurant(Subway being exception with over-roasted chicken/no added sauces, not toasted, 9-grain bread, etc. </span></p><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Make sure you are exercising. You need muscle mass by either weightlifting, or lifting objects around your house as you clean. Cardio is overdone, and does not do as much good for you as lean muscle from weightlifting/cleaning, and you cannot overpower your bad diet with exercising, period.</span></p><span data-dcnode-id="3705" instrument_node="">
</span><p data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Trust me. This is coming from someone who has yo-yo-ed 3 times, and its because I was greedy, and did not fully know that the food industry does not care if I am healthy at all. All they want is profits.</span></p><span data-dcnode-id="3702" instrument_node="">

</span><div class="content" data-dcnode-id="3583"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="3589"><div class="field-items" data-dcnode-id="3590"><div class="field-item even" data-dcnode-id="3591"><p data-dcnode-id="3596"><span data-dcnode-id="3597" instrument_node="">I am the first to admit my own problem with eating too much. So many times I have read, read, and read some more to learn how to improve my diet. And I am well versed on preaching about the rights and wrongs on eating healthy. But all the knowledge in the world won't get you there. It might make you keep trying. But the problem is that most yummy food is addictive. And if you try just one food, you end up coughing down a lot more and becoming addicted. I have lost weight and gained it so many times. I have been on a bodybuilding kick where i gained alot of muscle and became thin. But I eventually went back.</span></p><span data-dcnode-id="3595" instrument_node="">
</span><p data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">But one thing that never changes is that I love to drink water. I prefer it. There are times when I need to stand in front of the fridge and drink three or four glasses of it. But most times I drink a small glass every hour or two. And it matters where it comes from as well. That should be a focus in this topic. Not all water is equal and some of it is even dangerous anyway. Studies have found arsenic, feces, and other garbage in bottled water labeled "Spring".</span></p><span data-dcnode-id="3592" instrument_node="">

</span><h3 class="title" data-dcnode-id="3388"><a class="permalink" data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/4745%23comment-4745" rel="bookmark"><span data-dcnode-id="3390" instrument_node="">Water and Obesity</span></a></h3><span data-dcnode-id="3387" instrument_node=""> </span><div class="submitted" data-dcnode-id="3382"><span data-dcnode-id="3386" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Robert</span></span><span data-dcnode-id="3383" instrument_node=""> on August 23, 2010 - 05:26</span></div><span data-dcnode-id="3381" instrument_node="">
</span><div class="content" data-dcnode-id="3353"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="3359"><div class="field-items" data-dcnode-id="3360"><div class="field-item even" data-dcnode-id="3361"><p data-dcnode-id="3363"><span data-dcnode-id="3380" instrument_node="">First off, I would like to state that this was a great article, not many people know that excessive water consumption can be fatal.</span><br data-dcnode-id="3379"><span data-dcnode-id="3378" instrument_node="">
With that said, I will offer my own experience with water in terms of weight loss:</span><br data-dcnode-id="3377"><span data-dcnode-id="3376" instrument_node="">
I spent several years dieting and exercising and doing my best to avoid high calorie foods yet supply my body with the recommended daily vitamins, minerals, and calories.  I did very well and lost over 100 lbs just by drinking a few glasses of water a day and eating whole foods and exercising but then I hit a plateau became very discouraged and soon returned to my processed foods and diet soda after going back to college (for a second time at age 29).  My schedule and finances are a complete mess as anyone who has tried to pay their own way through college can tell you.  With my current schedule, it's hard to find time to use the bathroom let alone take proper care of myself and so I really let my physical health go.</span><br data-dcnode-id="3375"><span data-dcnode-id="3374" instrument_node="">
I hit bottom this Summer, I was drinking in upwards of 2 liters of diet soda a day, 3 cups of coffee, and eating frozen or boxed processed foods.  Throughout that process I had managed to gain back over 50 lbs and if that weren't enough, I started smoking again, about a pack every 2-3 days.  I can look back over that now and see that I was reaching for things which would provide quick energy fixes that were cheap, satisfying and accessible.  I felt miserable, just getting from A to B felt like a struggle, I felt swollen and bloated and extremely constipated and like I was winded and couldn't breathe.  I suffered from depression, didn't want to be seen, and my clothes did not fit.</span><br data-dcnode-id="3373"><span data-dcnode-id="3372" instrument_node="">
Then, I came upon a water diet news story and thought, well it doesn't cost me anything to try this, why not?</span><br data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node="">
So I began drinking about a gallon of water a day and completely did away with my diet soda habit but noticed something very strange.  I only wanted 1 cup of coffee in the morning (often times just half a cup), I started craving healthy whole foods, not greasy and salty stuff, and cigarettes tasted and smelled absolutely disgusting to me.  My intention was to simply increase my water intake to what sounded like an excessive amount but in the process I've quit smoking after only wanting 3-4 a day, and I have to force myself to eat 1,900 calories a day, I genuinely no longer feel the need to emotionally eat when stressed and feel like my memory and cognitive functioning have improved 100 fold.  My joints feel well lubricated and no longer inflamed, the psoriasis on my hands has nearly cleared, and my skin looks like it did 10 years ago.  In addition, I've lost 32 lbs. and counting in the past month alone.  Normally, I would never dream of losing this much weight this quickly but I feel 1,000 times better.  My digestive problems have cleared, no more frequent heartburn, gas, or painful bowel movements, no more dizzy spells, and I sleep very soundly, no more tossing and turning all night.  No more bouts of depression and my clothes fit again.</span><br data-dcnode-id="3369"><span data-dcnode-id="3368" instrument_node="">
So I would have to definitely weigh in in favor of drinking a gallon of water a day for a male who is 6'3" tall.  It has completely turned my life around and hasn't cost me more than a 1 gallon jug of water that I refill each morning.  I should add that I sweat a lot, always have even since a child so there could be something to that.  My brothers and everyone in my family seem to sweat a great deal as well.  I don't believe that we release the same amounts of fluid within a given day, this should be accounted for when you're trying to figure out what is best for your own personal health.  We each are really very, very different in these respects.  As a human race we have managed to thrive in just about any climate across the globe and have adapted very unique ways of coping with those challenges over hundreds of generations, our unique sets of adaptations which we have inherited will further dictate which dietary options are best for each of us.  I know that I do not do well with processed, refined, salty or sugary foods and that drinking what most would consider a very large amount of water works best for me.  People of different decent might understandably not benefit from this same diet according to the dictates of their environment from which they came.</span><br data-dcnode-id="3367"><span data-dcnode-id="3366" instrument_node="">
The responses to the article have certainly gone in some interesting directions and I have read them all.  I urge each of you to consider how different environments on planet Earth actually are (how different we all are) before you consider swearing by any one way of being healthy versus another.</span><br data-dcnode-id="3365"><span data-dcnode-id="3364" instrument_node="">
We are right to gather information and experiment with what works best for each of us but we are wrong if we insist that our experiences or the experiences of another can account for an entire group of people.  I do not think Kitty's post attempted to do this and I thank her for sharing her experience as well as everyone else who contributed to this thread.</span></p><span data-dcnode-id="3362" instrument_node="">

</span><div class="content" data-dcnode-id="3192"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="3198"><div class="field-items" data-dcnode-id="3199"><div class="field-item even" data-dcnode-id="3200"><p data-dcnode-id="3202"><span data-dcnode-id="3205" instrument_node="">I came on this site to gain knowledge about how much water is to much to drank, instead I came across post of folks bad mouthing one another.  I've been in a lot of pain sense my surgery which was over 4 months ago, I have lost 40 pounds rapidly and I'm still loosing weight.  All I drink is water, seems like the only thing that I can hold down these days. So I was really looking foward to reading something very useful about drinking water, I barely eat: I couldnt tell anyone the last time that I really eat a full meal because my meals consist on taking three to four bites of something all day and being done with it.  I'm still loosing weight and not in a healthy way at all. I'm waiting for loads of test results to come back to figure out what else is wrong with me.</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">
Nobody should judge nobody, we are all put here to help one another in some kind of way. Lifes to short to judge any one or to be hateful towards them. We are all equal and we all have our own opinions about the way that we see things regardles to if someone agrees or disagrees with us.</span></p><span data-dcnode-id="3201" instrument_node="">

</span><h3 class="title" data-dcnode-id="3180"><a class="permalink" data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/253%23comment-253" rel="bookmark"><span data-dcnode-id="3182" instrument_node="">Water intake &amp; overweight</span></a></h3><span data-dcnode-id="3179" instrument_node=""> </span><div class="submitted" data-dcnode-id="3174"><span data-dcnode-id="3178" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">SHELLY</span></span><span data-dcnode-id="3175" instrument_node=""> on March 6, 2007 - 19:28</span></div><span data-dcnode-id="3173" instrument_node="">
</span><div class="content" data-dcnode-id="3157"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="3163"><div class="field-items" data-dcnode-id="3164"><div class="field-item even" data-dcnode-id="3165"><p data-dcnode-id="3167"><span data-dcnode-id="3172" instrument_node="">I have to agree with Kitty in the previous comment. I have been attending Weight Watchers for several months and I've lost 16 lbs. One thing they've talked about is how sometimes overweight folks "confuse" the urge to eat, with an urge for water. The body is sending a signal and often by the time bubbles to the front of thought, we think of it as "Oh, I need food" and we often eat, when in fact we need hydration. I drink 6 glasses a day and I've noticed my hunger cravings have been reduced by at least 50%.</span><br data-dcnode-id="3171"><span data-dcnode-id="3170" instrument_node="">
Using the color of your urine as a guide is a good idea too. Almost clear, is well hydrated. More physical activity requires more water.</span><br data-dcnode-id="3169"><span data-dcnode-id="3168" instrument_node="">
A toast to healthy drinking! Shelly</span></p><span data-dcnode-id="3166" instrument_node="">

</span><h3 class="title" data-dcnode-id="2809"><a class="permalink" data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/1046%23comment-1046" rel="bookmark"><span data-dcnode-id="2811" instrument_node="">Too much water OR too little</span></a></h3><span data-dcnode-id="2808" instrument_node=""> </span><div class="submitted" data-dcnode-id="2803"><span data-dcnode-id="2807" instrument_node="">Submitted by </span><a class="username" data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sparkpeople.com/mypage.asp%3Fid%3DDOTSLADY" rel="nofollow"><span data-dcnode-id="2806" instrument_node="">angela</span></a><span data-dcnode-id="2804" instrument_node=""> on March 31, 2008 - 18:22</span></div><span data-dcnode-id="2802" instrument_node="">
</span><div class="content" data-dcnode-id="2790"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2796"><div class="field-items" data-dcnode-id="2797"><div class="field-item even" data-dcnode-id="2798"><p data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">I read this article with great interest.&nbsp; I'm obese and I don't reach for foods instead of water when I'm hungry.&nbsp; I'm also an osteopenic hypothyroid celiac with fibromyalgia.&nbsp; I have been gluten-free for 2 years and despite eating well, I'm not losing weight.&nbsp; For being 273 lbs at my heaviest, I rarely eat over 2,000 calories, mostly between 1,200 and 1,500.&nbsp; At one time for over 6 months I exercised daily and was sore daily (I did lose 14 lbs).&nbsp; My heart palpitated before CD dx, was worse after exercise.&nbsp; I gave up.&nbsp; I've incorporated eating more raw food, but also eat warm soups.&nbsp; Before that, the doc lowered my Synthroid dose to see if it'd help my palpitations. I'd lowered my dose before because I was absorbing better with gf diet.&nbsp; This was my third time lowering my dose and it was not the charm.&nbsp; I crashed.&nbsp; This, at a time when I experienced no power or water for a week during a winter storm.&nbsp; This, at a time when I'd just sent my husband to work out of state.&nbsp; While alone I craved yogurt and only drank coffee for fake energy.&nbsp; I did not have thirst and loved not going pee all the time, esp in the middle of the night as usual.&nbsp; This was December 2007.&nbsp; Remember the raw food I was eating?&nbsp; Well, I've always had a penchant for salty foods (probably because I was malabsorbing because of undiagnosed celiac).&nbsp; When changing to a more raw food diet, by proxy, didn't eat much sodium.&nbsp; I found myself binging on potato chips and Lipton's onion dip - very salty!Well, I've since been diagnosed with secondary hyperparathyroidism ... and within the last two months been on quite a learning curve about our kidneys/vascular system and heart health.&nbsp; I craved the sodium, but didn't drink the water to BALANCE my needs.&nbsp; Warning!&nbsp; You can't get back kidney health!&nbsp; Take care of them and you take care of your heart too!&nbsp; I am back to drinking 8-10 glasses of water a day, and I monitor my sodium intake via a free online diet site, Sparkpeople.com.&nbsp; With enough but not too much water, I have been losing weight.&nbsp; BALANCE IS KEY!&nbsp; Thanks for the article Dr. Kim.P.S.&nbsp; My fibro is about non-existent now w/gf diet!&nbsp;</span></p><span data-dcnode-id="2799" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="2791"><li class="comment-reply first last" data-dcnode-id="2793"><a data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/1046"><span data-dcnode-id="2795" instrument_node="">reply</span></a></li><span data-dcnode-id="2792" instrument_node="">

</span><div class="content" data-dcnode-id="2695"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2701"><div class="field-items" data-dcnode-id="2702"><div class="field-item even" data-dcnode-id="2703"><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">The average '8 glasses a day' idea was originally developed by an advertising agency to sell a product. Your body actually requires somewhere between 3 &amp; 4 litres in a 24hr period to keep its natural system functioning properly. As others have already stated by the time you are thirsty your body is already starting to dehydrate. You need to drink regularly to maintain hydration and remove the toxins from your system. This article really focuses on excessive drinking above the bodies ability to process but the majority of people do not drink enough water - and certainly not enough to warrant the above side effects.</span></p><span data-dcnode-id="2704" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="2696"><li class="comment-reply first last" data-dcnode-id="2698"><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/2043"><span data-dcnode-id="2700" instrument_node="">reply</span></a></li><span data-dcnode-id="2697" instrument_node="">

</span><h3 class="title" data-dcnode-id="2683"><a class="permalink" data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/3307%23comment-3307" rel="bookmark"><span data-dcnode-id="2685" instrument_node="">Very healthy with over 5 litres daily</span></a></h3><span data-dcnode-id="2682" instrument_node=""> </span><div class="submitted" data-dcnode-id="2677"><span data-dcnode-id="2681" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">Christy</span></span><span data-dcnode-id="2678" instrument_node=""> on February 9, 2010 - 01:46</span></div><span data-dcnode-id="2676" instrument_node="">
</span><div class="content" data-dcnode-id="2664"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2670"><div class="field-items" data-dcnode-id="2671"><div class="field-item even" data-dcnode-id="2672"><p data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Hi, I somewhat agree with the comment above...I believe that adults need way more than 8 glasses of water a day - for the reasons mentioned above. Water is the healthiest drink on the planet! and I think it does make you feel fuller (so of course it should help with weight loss). I am an extremely healthy person who barely EVER gets sick....I practically never get headaches, colds, or flus (or anything worse). I contribute my good health to exercise, fresh air, healthy eating, and WATER. I drink over 5 litres every day (inc a litre when I first wake up in the morning) and feel GREAT :-)</span></p><span data-dcnode-id="2673" instrument_node="">

</span><div class="content" data-dcnode-id="2627"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2633"><div class="field-items" data-dcnode-id="2634"><div class="field-item even" data-dcnode-id="2635"><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">I am overweight ( 6'2" and 270 lbs) and recently started drinking at least 5 litres of water per day. Yes I need to pee regularly, but when at work I pick a bathroom that is not on the same level as my office so I have to climb a couple of flights of stairs several times a day.</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">I am eating less and feel great. Less joint and body pain. My mind seem sharper and I feel less fatigued as I am sleeping well. I am not keeping track of weight loss yet.</span></p><span data-dcnode-id="2639" instrument_node="">

</span><div class="content" data-dcnode-id="2462"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2468"><div class="field-items" data-dcnode-id="2469"><div class="field-item even" data-dcnode-id="2470"><p data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">I had such a hard time dieting when I was trying to drink 8 glasses of water a day. I actually felt more tired and hungry, with all that water sloshing around in my system. Not to mention the fact that I was having to pee every 5 minutes. Not fun.</span></p><span data-dcnode-id="2471" instrument_node="">

</span><h3 class="title" data-dcnode-id="2450"><a class="permalink" data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/3047%23comment-3047" rel="bookmark"><span data-dcnode-id="2452" instrument_node="">Yeah, that's the same thing I</span></a></h3><span data-dcnode-id="2449" instrument_node=""> </span><div class="submitted" data-dcnode-id="2444"><span data-dcnode-id="2448" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Simone</span></span><span data-dcnode-id="2445" instrument_node=""> on December 3, 2009 - 04:14</span></div><span data-dcnode-id="2443" instrument_node="">
</span><div class="content" data-dcnode-id="2419"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2425"><div class="field-items" data-dcnode-id="2426"><div class="field-item even" data-dcnode-id="2427"><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Yeah, that's the same thing I have been experiencing. I have been drinking water like taking "medicine", drinking 8 cups evenly spaced out over my day, because I have been told to believe its doing my body good. But...</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">I feel tired all the time.</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">I have to pee just about once every hour or sometimes more often it seems. Its really unacceptable how often I have to excuse myself to go pee. Or worse, hold it and be uncomfortable.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">I feel hungrier than normal. I used to feel adequately hungry by lunch or dinner time. But now I feel like I am starving to death.</span></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">So I decided to cut back on water and try to eat an apple or orange or carrots or other watery/moisture-rich foods for snacks to make up for the moisture. The reasoning being that I would still get the requisite amount of water, but maybe with the healthy snacks... it won't go through my system so fast. I still drink water. Just not 8 cups.</span></p><span data-dcnode-id="2428" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="2420"><li class="comment-reply first last" data-dcnode-id="2422"><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/3047"><span data-dcnode-id="2424" instrument_node="">reply</span></a></li><span data-dcnode-id="2421" instrument_node="">

</span><h3 class="title" data-dcnode-id="2407"><a class="permalink" data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/8685%23comment-8685" rel="bookmark"><span data-dcnode-id="2409" instrument_node="">How long were you drinking</span></a></h3><span data-dcnode-id="2406" instrument_node=""> </span><div class="submitted" data-dcnode-id="2401"><span data-dcnode-id="2405" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Anonymous</span></span><span data-dcnode-id="2402" instrument_node=""> on July 30, 2011 - 07:47</span></div><span data-dcnode-id="2400" instrument_node="">
</span><div class="content" data-dcnode-id="2379"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2385"><div class="field-items" data-dcnode-id="2386"><div class="field-item even" data-dcnode-id="2387"><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">How long were you drinking the water for? If you start dramatically upping your water intake at first it will seem like you are lacking energy and feeling groggy maybe even sick. Water helps remove toxins from the body, and an abrupt change could result in larger quantities of toxins being released. This could account for the adverse feelings. However if you have been keeping the water levels the same for over 6 days and still are having issues than it's not a toxin issue per say because it only takes a few days to get use to the new regiment. Regardless, if you feel like you should add more water to your diet start slow and build up to it. Also it never hurts to increase fruit and vegetable intake regardless of hydration issues. Fruits and vegetables are full of micro-nutrients and are easily handled by the body, the added benefit of increased hydration is just bonus on top of all the vitamins and minerals as well as fiber to be had.</span></p><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Being healthy period is about maintaining moderation and lifestyle changes. Eating xxx number of calories is fine and dandy if it’s a well balanced meal. Our bodies need all the macro and micro nutrients available in order to work properly. It's absolutely amazing the torture we can put our bodies through. </span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">The more articles i read about health and nutrition and wellness the more i have realized that you can find an expert to back up any claim that is made regarding anything. This is healthy if you ask this guy, but it is not if you ask this guy and it is healthy only if xxxx if you ask that guy, the list goes on forever. If you never drink water and drink plenty of soda or tea or coffee just simply switching out 1 beverage a day for water would do more good than you might realize. While excessive water is not good, too little water can be much worse. I would be willing to bet the amount of people who die from dehydration is much greater that those who die from over hydration. Conversely if all you drink is water, try adding 1 other beverage in a day like milk or juice or tea. Anyways rant over, I hope everyone finds the right amount of everything in order to lead a happy full life.</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">I would site my medical credentials as well as the sources for my claims but i would rather take the stance of some internet preaching yayhoo</span></p><span data-dcnode-id="2388" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="2380"><li class="comment-reply first last" data-dcnode-id="2382"><a data-dcnode-id="2383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/8685"><span data-dcnode-id="2384" instrument_node="">reply</span></a></li><span data-dcnode-id="2381" instrument_node="">

</span><h3 class="title" data-dcnode-id="2211"><a class="permalink" data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/1973%23comment-1973" rel="bookmark"><span data-dcnode-id="2213" instrument_node="">Dieting hype</span></a></h3><span data-dcnode-id="2210" instrument_node=""> </span><div class="submitted" data-dcnode-id="2205"><span data-dcnode-id="2209" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Suzanne</span></span><span data-dcnode-id="2206" instrument_node=""> on April 11, 2009 - 19:06</span></div><span data-dcnode-id="2204" instrument_node="">
</span><div class="content" data-dcnode-id="2184"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2190"><div class="field-items" data-dcnode-id="2191"><div class="field-item even" data-dcnode-id="2192"><p data-dcnode-id="2194"><span data-dcnode-id="2203" instrument_node="">This article was good! In response to some comments, proper nutrition is so unclear to the public becuase it has become a business, disregarding acutal health care. Extremes and dieting are not the way to go. Lifestyle change and moderation are more reasonable.</span><br data-dcnode-id="2202"><span data-dcnode-id="2201" instrument_node="">
- There is definatly validity to drinking water to eat less. Water takes up space in your stomach just like food. There should be a good balance (1-2 glasses per meal).</span><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">
- Foods that have a high nutrient density and low energy density should be eaten often. Whole (not processed) fruits and vegetables are full of nutrients and typically low in energy molecules (proteins, fats and carbs). Proteins, fats and carbs are the molecules you store.</span><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node="">
- If someone starts drinking 8 glasses a day, your body isnt use to it. Most of what you drink will be filtered out. Over time, if you continue this, your body will begin to retain the water in your blood stream. This is not the same thing as water retention. You actually loose "water weight" by drinking more water because of salt/water balance. You retain water with higher salt intake, not water. For a better understanding look up info on the "renin-angiotensin system"</span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node="">
- For the woman with thyroid issues, you can get relief with thyroid hormones. That is probably the only thing (along with diet and excercise) that will help your symptoms. There are many people who are overweight and are that way because they dont take care of themselves. You cannot help your condition. Stay hopeful and positive!! Good luck!</span></p><span data-dcnode-id="2193" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="2185"><li class="comment-reply first last" data-dcnode-id="2187"><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/1973"><span data-dcnode-id="2189" instrument_node="">reply</span></a></li><span data-dcnode-id="2186" instrument_node="">

</span><h3 class="title" data-dcnode-id="2172"><a class="permalink" data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/2153%23comment-2153" rel="bookmark"><span data-dcnode-id="2174" instrument_node="">Interesting article and</span></a></h3><span data-dcnode-id="2171" instrument_node=""> </span><div class="submitted" data-dcnode-id="2166"><span data-dcnode-id="2170" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Anonymous</span></span><span data-dcnode-id="2167" instrument_node=""> on June 29, 2009 - 13:01</span></div><span data-dcnode-id="2165" instrument_node="">
</span><div class="content" data-dcnode-id="2144"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2150"><div class="field-items" data-dcnode-id="2151"><div class="field-item even" data-dcnode-id="2152"><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Interesting article and comments. I do know that for myself, I suffered from chronic constipation for most of my adult life, mainly due to bad eating habits that I obtained from many many years ago. My doctor insisted that I take over-the-counter meds for it (Metamucil, etc.) and drink as much water as I could...he recommended a minimum of 10 glasses a day. Considering my adult height (4'11") and weight (approx. 110 lbs) is under average adult size, I thought this sounded exceeedingly excessive. I wondered how that rule of thumb could apply for everyone, since sizes, shapes and general body makeup differs so greatly from person to person. [I found too, that the regular meds for constipation didn't make much difference for me, and while I upped my water intake (not as much as he recommended) it didn't help a lot.] </span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Finally discovered on my own that drinking a moderate amount of water in a day and changing my diet worked wonders. Eating quinoa mixed with ground flax, eating healthier fresh vegetables, having a cup of coffee a day, having apples, dried prunes, etc. did the trick. As for water, I do drink it regularly now, but only in moderation (around 4 cups throughout the day, warmed, not cold). I also include soy drinks (in moderation) and fruit juice, usually freshly made at home. And since my diet has changed to include mainly fresh fruits and veggies, I don't think my body's demand for fluids is quite as high, unless it is hot weather and/or I'm particularly active. </span></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Interesting thing to note: I once had a pet rabbit who became totally disabled. And for some reason that I never did discover, at the time that he became disabled, he seemed to not be able to drink water any more. He still ate his meals heartily, but refused to drink. So I began feeding his water to him in a dropper...but then I discovered that if I moistened his vegetables with water, he didn't seem to need that full intake of water any more. He survived quite well without having to drink...seems he got enough fluids from the vegetables themselves, along with the odd supplement of 'spoon-feeding' him a bit of fluid from the dropper. After observing my rabbit for over a year, that's when I began to wonder if what the doctors were saying about "8 to 10 glasses a day" of water intake for humans was accurate.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">While I admit I don't know a great deal about nutrition and the body, I do suspect that we don't need nearly as much water as we've been told in the past. If one has a healthy diet of vitamin- and water-rich foods, and learns to listen to what their bodies tell them (I too was one who would reach for foods when I was actually thirsty), then you'll probably find a good balance. Everything in moderation seems to be key.</span></p><span data-dcnode-id="2153" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="2145"><li class="comment-reply first last" data-dcnode-id="2147"><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/2153"><span data-dcnode-id="2149" instrument_node="">reply</span></a></li><span data-dcnode-id="2146" instrument_node="">
</span></ul></div><span data-dcnode-id="2143" instrument_node="">

</span><div class="comment" data-dcnode-id="2045"><span data-dcnode-id="2135" instrument_node="">
</span><h3 class="title" data-dcnode-id="2132"><a class="permalink" data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/2991%23comment-2991" rel="bookmark"><span data-dcnode-id="2134" instrument_node="">Drinking Less Water</span></a></h3><span data-dcnode-id="2131" instrument_node=""> </span><div class="submitted" data-dcnode-id="2126"><span data-dcnode-id="2130" instrument_node="">Submitted by </span><a class="username" data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nutritioncanhelp.com/" rel="nofollow"><span data-dcnode-id="2129" instrument_node="">Cured of IBD</span></a><span data-dcnode-id="2127" instrument_node=""> on November 21, 2009 - 12:48</span></div><span data-dcnode-id="2125" instrument_node="">
</span><div class="content" data-dcnode-id="2050"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="2056"><div class="field-items" data-dcnode-id="2057"><div class="field-item even" data-dcnode-id="2058"><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Howdy,</span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">I have had remarkable health improvements by drinking less water.  I've been cured of Inflammatory Bowel Disease, headaces, and chronically being fatigued.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">I became a health nut about 15 years ago.  Totally ate up whatever advice natural practitioners could offer.  One of those was to drink more water...with clear urine being a sign of proper hydration.  </span></p><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">I found it odd that the need to pee went away about three days after drinking more water.  Then the urine would turn yellow again.  Upon researching this, I found that the kidneys adjust to a higher water intake after a few days, and will start to cleanse/increase their efforts as a result of the increase water.  At this point, I was drinking 1.75 gallons a day.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">There was a time I was donating plasma...  I found it odd some people, who drank only 1/3 the amount of water I was drinking, had better hydration than myself.  So, I increase intake to 2.5 gallons a day.</span></p><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">After several years of doing this, I started experiencing fatigue, headaches, and started bleeding in the bowel.</span></p><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">Last year, my body shut down and I almost died.  Eventhough I had drank eight glasses of water during the day, the hospital found I was severely dehydrated.  My pulse was so weak that the alarm on the heart rate monitor kept sounding.  </span></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">After recovering, the "specialist" diagnosed me with Inflammatory Bowel Disease.  He told me that staying hydrated was KEY to not having a relapse.  I told him about my two gallons a day, and he said that was good...</span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">But, about four months ago, a co-worker who is taller and much stronger than I, challenged me that I was drinking too much water. He pointed out that he only drinks 32 ounces during the course of the work day.  At was totally skeptical.  So I started drinking less.</span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Within three days, the headaches, fatigue, and the majority of IBD symptoms were gone.  Within a month, I was totally free of IBD!  I wonder how many other people suffer from IBD as a result of drinking too much water.</span></p><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">I make this post simply to share the following note:</span></p><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">With IBD, there is an unusual amount of hydrogen peroxide in the gut, which creates gas.  I used to have gas.  Don't anymore.  Also, with IBD, there is a vitamin A deficiency in the lining of the bowel.  Interesting, because  vitamin A is water soluble!  Researchers openly admit they don't know "why the immune system attacks the body"...  I now maintain it is from drinking too much water.</span></p><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Here's my advice about how much water to drink:</span></p><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">First, I have found that I GET THIRSTY when I've drank too much.  In the past, I would continue drink MORE water EVEN when I was already peeing every 45 minutes......because the "doctors" said to drink if you're thirsty.  I've experimented with this for several months, and I only get thirsty if I've drank too much.</span></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Second, on that same note...I also get headaches if I start drinking too much.  For me, maybe not for you, I know I'm drinking too much if I am going pee more than once every two hours and have a headache.  Often, if I have a headache, I don't drink water for the next two hours, and the headache goes away.</span></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Third, is the sign of gas.  The main function of the large intestine is to pull water out of the stool.  The colon has an amazing ability to absorb gas also!  I NO LONGER use gas-pills or enzymes.  I simply drink less water.  By less, please understand that all of my experimenting has led me to about a gallon a day.  Non-activities are around .75 gallons.  </span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">Fourth, I've found that clear urine ALWAYS coinsides with headaches, peeing too much, and having gas.  Said another way, to drink enough water to have clear urine always puts me in that state.  I have actually found that a mild yellow keeps me out of these things.  Think about it folk: how have people survived...how have the great armies survived...without needing to carry around two gallons of water per soldier a day.</span></p><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Now, as to drinking too little.  If the urine is solid yellow, I haven't peed in 3 hours, and my head hurts, then I'm dehydrated!</span></p><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">Also, sports induced asthma (which I don't have) is caused by dehydration.</span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Also, I work at a walking job...  When dehydrated, the calf muscles start to knot and get quite tight.  When hydrated, they are limber.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Anyway, I've said enough.  Just wanted to pass on the message: drink water CREATES thirst, clear urine is TOO MUCH water, having excessive gas is TOO MUCH water, and if you or a loved one has IBD...you just might be drinking too much water.  </span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">:o)</span></p><span data-dcnode-id="2059" instrument_node="">

</span><div class="content" data-dcnode-id="1630"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1636"><div class="field-items" data-dcnode-id="1637"><div class="field-item even" data-dcnode-id="1638"><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">I think everyone's body is different. I don't agree with the statement that people who exhibit signs of dehydration will realize you are thirsty if you ask them- I have been hospitalized several times for dehydration, I just DON'T get thirsty, and I never remember to drink anything. I often go 48 hours without a drink, and only realize it when I start to get dizzy. Right now I m trying to up my water intake to 2 quarts a day but am struggling to even make it to 1. I am the type of person who always wants to eat, but never feels the need to drink.</span></p><span data-dcnode-id="1639" instrument_node="">

</span><h3 class="title" data-dcnode-id="1618"><a class="permalink" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/29709%23comment-29709" rel="bookmark"><span data-dcnode-id="1620" instrument_node="">Feeling thirsty</span></a></h3><span data-dcnode-id="1617" instrument_node=""> </span><div class="submitted" data-dcnode-id="1612"><span data-dcnode-id="1616" instrument_node="">Submitted by </span><span class="username" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Jennifer</span></span><span data-dcnode-id="1613" instrument_node=""> on December 28, 2012 - 01:27</span></div><span data-dcnode-id="1611" instrument_node="">
</span><div class="content" data-dcnode-id="1599"><div class="field field-name-comment-body field-type-text-long field-label-hidden" data-dcnode-id="1605"><div class="field-items" data-dcnode-id="1606"><div class="field-item even" data-dcnode-id="1607"><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">I have started taking a leaf out of the Australian Aboriginal practice for thirst. When they were walking the long distances while hunting in our dry country, they would choose a smooth pebble to keep in their mouth. It promotes saliva production, so less feelings of thirst, until they can find water. I substitute a stone from fruit for the pebble, and it works superbly! A prune stone, plum seed or apricot stone are great, and even a rough nectarine or peach stone are interesting textures in your mouth. I have also used few smaller seeds such as three cherry seeds or  citrus pits. They all have their own flavours, too, which increases the sensation. The flavours are subtle, but quite recognizable.</span></p><span data-dcnode-id="1608" instrument_node="">
</span></div></div></div><ul class="links inline" data-dcnode-id="1600"><li class="comment-reply first last" data-dcnode-id="1602"><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drbenkim.com/comment/reply/550/29709"><span data-dcnode-id="1604" instrument_node="">reply</span></a></li><span data-dcnode-id="1601" instrument_node="">
