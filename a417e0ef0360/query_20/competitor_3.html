</span><article class="post post-19127 type-post status-publish format-standard has-post-thumbnail hentry category-general-handyman-tips tag-general-tips tag-water tag-water-softener" data-dcnode-id="653" id="post-19127"><span data-dcnode-id="910" instrument_node="">
</span><h1 class="fusion-post-title fusion-responsive-typography-calculated" data-dcnode-id="908" data-fontsize="28" data-lineheight="31.92px" style="--fontSize:28; line-height: 1.14;"><span data-dcnode-id="909" instrument_node="">How Much Water Should Be In My Water Softener Brine Tank?</span></h1><span data-dcnode-id="907" instrument_node=""> </span><div class="post-content" data-dcnode-id="798"><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="898" style="text-align: justify;"><span data-dcnode-id="905" instrument_node="">Water softener has different uses and different advantages. Some people use water softeners for the pure water, some do it for medical purposes while we suggest that you should use the </span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//watersoftenersblog.com/best-water-softener-salts-for-sensitive-skin/"><span data-dcnode-id="904" instrument_node="">best water softener salt for sensitive skin</span></a><span data-dcnode-id="902" instrument_node="">. Isn’t it amazing that this one machine has got all the benefits! Best </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//watertechguide.com/best-water-softener-reviews/"><span data-dcnode-id="901" instrument_node="">water softeners filtration systems</span></a><span data-dcnode-id="899" instrument_node=""> offer you better water quality, removing all those minerals that hard water carries. This will help you protect your home and save money at the same time. Because we know you want all the daily benefits of soft water, we will talk about a crucial element in your water softener, your brine tank. Specifically, how much water should be in the brine tank.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><img alt="How Much Water Should Be In My Water Softener Brine Tank" class="aligncenter size-full wp-image-19128" data-dcnode-id="896" height="971" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank.jpg&amp;raw" srcset="https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-200x243.jpg 200w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-247x300.jpg 247w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-400x486.jpg 400w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-600x728.jpg 600w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-768x932.jpg 768w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank.jpg 800w" width="800"></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892" style="text-align: justify;"><span data-dcnode-id="893" instrument_node="">If you have no idea what a brine tank is, you can easily recognize it as the tank that is placed beside your water softener. Your brine tank must work properly at all times since it contains a solution that helps to replace calcium and magnesium ions for sodium ones. This ionization is what, as a result, produces soft water for your home. Knowing how vital your brine tank is, you need to know how much water should be in the brine tank as well as the amount of salt it should have.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="886" style="text-align: justify;"><span data-dcnode-id="890" instrument_node="">We spoke to a representative from 2nd City Gas Plumbing and Heating, who is a </span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2ndcitygasplumbingandheating.co.uk/"><span data-dcnode-id="889" instrument_node="">Plumber in Redditch</span></a><span data-dcnode-id="887" instrument_node="">, they said, “Having a water softener is a huge responsibility. These systems are able to eliminate limescale issues in your home when you take care of them properly. However, water softeners can be maintained easily, the maintenance procedures are straightforward and simple. You’re simply required to add a bag of salt to the brine every two to three months and clean the system as recommended by the manufacturer. The brine tank is one of the important parts of a water softener but it’s also the most likely to have issues. Therefore it’s important to quickly diagnose the issue when it’s not performing correctly.”</span></p><span data-dcnode-id="885" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="883" data-fontsize="25" data-lineheight="31.25px" style="--fontSize:25; line-height: 1.25;"><span data-dcnode-id="884" instrument_node="">How much water should be in my softener brine tank?</span></h2><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="878" style="text-align: justify;"><span data-dcnode-id="881" instrument_node="">When asking how much water should be in my brine tank, first, you need to know how water softeners work. </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//americanhomewater.com/products/water-softeners/"><span data-dcnode-id="880" instrument_node="">Read more here.</span></a></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875" style="text-align: justify;"><span data-dcnode-id="876" instrument_node="">To summarize, there are two types of brine tanks, wet or dry. The best way to find out which kind of brine tank you have at home is by calling the provider or the company you hired to install it. Once you determine your kind of brine tank, you are ready to look inside your tank and see if it has the proper water level. However, one thing you need to remind, is that it doesn’t matter what type of tank you have; it should never be full of water.</span></p><span data-dcnode-id="874" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="872" data-fontsize="25" data-lineheight="31.25px" style="--fontSize:25; line-height: 1.25;"><span data-dcnode-id="873" instrument_node="">Wet brine tank</span></h2><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869" style="text-align: justify;"><span data-dcnode-id="870" instrument_node="">These ones are usually old filtration systems. This does not mean your system won’t function properly. A wet brine tank is designed to contain water at all times. The exact amount of water depends on the size of your tank. Usually, they have around 3 to 6 gallons of water. If you are checking your wet brine tank, then the water level should be from 6 to 19 inches high.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866" style="text-align: justify;"><span data-dcnode-id="867" instrument_node="">In case you see your wet brine tank is half full of water, check out your drain is not blocked or frozen. If you discard this option and it’s still half full, then your tank might have a mechanical problem. It is also normal not to see the water level when there is plenty of salt inside your tank. Then how much water should be in my brine tank if it is dry? We will tell you all about it in the next section.</span></p><span data-dcnode-id="865" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="863" data-fontsize="25" data-lineheight="31.25px" style="--fontSize:25; line-height: 1.25;"><span data-dcnode-id="864" instrument_node="">Dry brine tank</span></h2><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860" style="text-align: justify;"><span data-dcnode-id="861" instrument_node="">The easiest way to identify a dry brine tank is to check if they have digital valves that help regulate it. This type of tank only has water a couple of hours before the process starts and during the ionization. After the regeneration is completed, your tank should be completely dry. Remember that since dry tanks belong to a modernized system and if you recently changed or purchased a brand new water softener, chances are you have a dry brine tank.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><img alt="How Much Water Should Be In My Water Softener Brine Tank - brine tank" class="aligncenter size-full wp-image-19129" data-dcnode-id="858" height="482" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-brine-tank.jpg&amp;raw" srcset="https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-brine-tank-200x121.jpg 200w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-brine-tank-300x181.jpg 300w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-brine-tank-400x241.jpg 400w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-brine-tank-600x362.jpg 600w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-brine-tank-768x463.jpg 768w, https://handymantips.org/wp-content/uploads/2020/09/How-Much-Water-Should-Be-In-My-Water-Softener-Brine-Tank-brine-tank.jpg 800w" width="800"></p><span data-dcnode-id="856" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="854" data-fontsize="25" data-lineheight="31.25px" style="--fontSize:25; line-height: 1.25;"><span data-dcnode-id="855" instrument_node="">Salt levels in your brine tank</span></h2><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851" style="text-align: justify;"><span data-dcnode-id="852" instrument_node="">Now that you have figured out how much water should be in the brine tank, the next step is learning how much salt you should put inside it. The amount of sodium inside the tank will mainly depend on three factors.</span></p><span data-dcnode-id="850" instrument_node="">
</span><ol data-dcnode-id="836"><span data-dcnode-id="849" instrument_node="">
</span><li data-dcnode-id="846"><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usgs.gov/special-topic/water-science-school/science/water-qa-how-much-water-do-i-use-home-each-day%3Fqt-science_center_objects%3D0"><span data-dcnode-id="848" instrument_node="">How much water you are consuming daily</span></a></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="841"><span data-dcnode-id="844" instrument_node="">The amount of minerals your water needs to eliminate. In other words, </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ymaws.com/www.rfmaonline.com/resource/resmgr/crfp/howtomeasurethehardnesswater.pdf"><span data-dcnode-id="843" instrument_node="">how hard is the water you are getting?</span></a></li><span data-dcnode-id="840" instrument_node="">
</span><li data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">How many people live in your house</span></li><span data-dcnode-id="837" instrument_node="">
</span></ol><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833" style="text-align: justify;"><span data-dcnode-id="834" instrument_node="">The minimum of salt you need to have in your brine tank is one-quarter full, which will translate into six inches you can measure from the top of the tank. This means when you have the right amount of water in your tank, it will rise above the salt a few inches. A common problem you might have with your tank is encrusted salts. You have two ways to solve your problem. You can either break the formation with your hands or take some hot water and pour it over. Then you can take out these crusted salts and add new.</span></p><span data-dcnode-id="832" instrument_node="">
</span><div data-dcnode-id="831" id="amzn-assoc-ad-c2d0937f-8495-4267-9a2c-e7dccce4a008"></div><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825" style="text-align: justify;"><span data-dcnode-id="826" instrument_node="">Note: There are two types of brine solutions in the market. The majority of people tend to go for sodium chloride. However, in case you have health problems such as blood pressure, you can choose a potassium one.</span></p><span data-dcnode-id="824" instrument_node="">
</span><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="822" data-fontsize="25" data-lineheight="31.25px" style="--fontSize:25; line-height: 1.25;"><span data-dcnode-id="823" instrument_node="">Recommended amount of salt</span></h2><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819" style="text-align: justify;"><span data-dcnode-id="820" instrument_node="">To find out the exact amount of salt you should be using for your brine tank, we recommend asking a professional. It could be the seller or the company which helped you install it at home. If you live in a regular household, one where there are three to four people, the amount of salt could vary between 40 and 50 pounds a month. In a week, you could be using up to 10 pounds. However, it is essential to check your water levels every month to avoid any problems.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="813" style="text-align: justify;"><span data-dcnode-id="817" instrument_node="">A great way to know if your salt is lower than it should be is by checking your softener’s amount of calcium carbonate. If it exceeds 60 mg, it could be due to low salt levels in your brine tank. Having the right amount of water and salt in your brine tank will ensure it works properly in the last phase of the ionization cycle when the tank receives </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//handymantips.org/what-is-hard-water/"><span data-dcnode-id="816" instrument_node="">hard water</span></a><span data-dcnode-id="814" instrument_node=""> and starts the regeneration process. Checking your brine tank regularly is a must to prevent any issues. Also, it is important to have an efficient brine tank to get good quality soft water.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="800" style="text-align: justify;"><span data-dcnode-id="811" instrument_node="">Learning how all the parts of your water softener function will help you understand how to take care of them. Getting familiar with this filtration system is easy and will improve your family’s health, bringing endless benefits for your everyday life.</span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1455802031944141" data-ad-format="autorelaxed" data-ad-slot="5874045316" data-dcnode-id="805" style="display: block;"></ins><br data-dcnode-id="804"><span data-dcnode-id="803" instrument_node="">
</span></p><span data-dcnode-id="799" instrument_node="">
</span></div><span data-dcnode-id="797" instrument_node="">
