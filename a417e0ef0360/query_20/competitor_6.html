</span><p data-dcnode-id="1515"><span data-dcnode-id="1522" instrument_node="">Most people know they need to </span><strong data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">drink more water</span></strong><span data-dcnode-id="1519" instrument_node="">. But they don't really grasp </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/benefits-water-morning/"><span data-dcnode-id="1518" instrument_node="">how important daily water intake can truly be</span></a><span data-dcnode-id="1516" instrument_node="">.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Water helps all of your bodily functions.&nbsp; It improves your health, fitness, weight control, mood, and even your energy levels.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1510" instrument_node="">You can rest assured that if they ever do find the “Fountain of Youth”, it will be a </span><em data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">water</span></em><span data-dcnode-id="1507" instrument_node=""> fountain.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">So how do you turn a desire to drink more water into a habit that you complete every single day?</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">This article will break this habit down into an easy-to-follow blueprint for the importance and execution of your daily water intake.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Let's get to it…</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1489" style="padding-left: 40px;"><span data-dcnode-id="1495" instrument_node="">(</span><strong data-dcnode-id="1491"><span data-dcnode-id="1494" instrument_node="">Side note: Want to focus on a great HEALTH habit that increases your energy and helps with your weight goals? </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/short-organifi" rel="noopener" target="_blank"><span data-dcnode-id="1493" instrument_node="">Then take 30-seconds each morning to prepare this drink to feel energized throughout the day</span></a></strong><span data-dcnode-id="1490" instrument_node="">).</span></p><span data-dcnode-id="1488" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="1404" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1480"><span data-dcnode-id="1487" instrument_node="">What You Will Learn</span><span data-dcnode-id="1486" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">[</span><a data-dcnode-id="1483" href="#"><span data-dcnode-id="1484" instrument_node="">show</span></a><span data-dcnode-id="1482" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1405" style="display: none;"><li data-dcnode-id="1477"><a data-dcnode-id="1478" href="#A_Lesson_From_the_Air_Force8230"><span data-dcnode-id="1479" instrument_node="">A Lesson From the Air Force…</span></a></li><li data-dcnode-id="1428"><a data-dcnode-id="1475" href="#15_Benefits_of_Proper_Hydration"><span data-dcnode-id="1476" instrument_node="">15 Benefits of Proper Hydration:</span></a><ul data-dcnode-id="1429"><li data-dcnode-id="1472"><a data-dcnode-id="1473" href="#1_Improve_Bodily_Functions"><span data-dcnode-id="1474" instrument_node="">1. Improve Bodily Functions</span></a></li><li data-dcnode-id="1469"><a data-dcnode-id="1470" href="#2_Weight_LossControl"><span data-dcnode-id="1471" instrument_node="">2. Weight Loss/Control</span></a></li><li data-dcnode-id="1466"><a data-dcnode-id="1467" href="#3_Energizes_Muscles"><span data-dcnode-id="1468" instrument_node="">3. Energizes Muscles​</span></a></li><li data-dcnode-id="1463"><a data-dcnode-id="1464" href="#4_Help_Kidney_Function"><span data-dcnode-id="1465" instrument_node="">4. Help Kidney Function</span></a></li><li data-dcnode-id="1460"><a data-dcnode-id="1461" href="#5_Create_a_Youthful_Appearance"><span data-dcnode-id="1462" instrument_node="">5. Create a Youthful Appearance</span></a></li><li data-dcnode-id="1457"><a data-dcnode-id="1458" href="#6_Regular_Bowel_Movements"><span data-dcnode-id="1459" instrument_node="">6. Regular Bowel Movements</span></a></li><li data-dcnode-id="1454"><a data-dcnode-id="1455" href="#7_Removal_of_Toxins"><span data-dcnode-id="1456" instrument_node="">7. Removal of Toxins</span></a></li><li data-dcnode-id="1451"><a data-dcnode-id="1452" href="#8_Reduce_Cancer_Risks"><span data-dcnode-id="1453" instrument_node="">8. Reduce Cancer Risks</span></a></li><li data-dcnode-id="1448"><a data-dcnode-id="1449" href="#9_Increase_Energy"><span data-dcnode-id="1450" instrument_node="">9. Increase Energy</span></a></li><li data-dcnode-id="1445"><a data-dcnode-id="1446" href="#10_Reduce_Headaches"><span data-dcnode-id="1447" instrument_node="">10. Reduce Headaches</span></a></li><li data-dcnode-id="1442"><a data-dcnode-id="1443" href="#11_Ramp_Up_Brain_Power"><span data-dcnode-id="1444" instrument_node="">11. Ramp Up Brain Power</span></a></li><li data-dcnode-id="1439"><a data-dcnode-id="1440" href="#12_Save_Money"><span data-dcnode-id="1441" instrument_node="">12. Save Money</span></a></li><li data-dcnode-id="1436"><a data-dcnode-id="1437" href="#13_Prevent_Cramping"><span data-dcnode-id="1438" instrument_node="">13. Prevent Cramping</span></a></li><li data-dcnode-id="1433"><a data-dcnode-id="1434" href="#14_Strengthen_the_Immune_System"><span data-dcnode-id="1435" instrument_node="">14. Strengthen the Immune System</span></a></li><li data-dcnode-id="1430"><a data-dcnode-id="1431" href="#15_Fluorination_in_Water"><span data-dcnode-id="1432" instrument_node="">15. Fluorination in Water</span></a></li></ul></li><li data-dcnode-id="1425"><a data-dcnode-id="1426" href="#How_Much_Water_Do_You_Need"><span data-dcnode-id="1427" instrument_node="">How Much Water Do You Need?</span></a></li><li data-dcnode-id="1409"><a data-dcnode-id="1423" href="#3_Tips_for_Developing_a_Daily_Water_Intake_Habit"><span data-dcnode-id="1424" instrument_node="">3 Tips for Developing a Daily Water Intake Habit</span></a><ul data-dcnode-id="1410"><li data-dcnode-id="1420"><a data-dcnode-id="1421" href="#Tip_1_Track_your_water_intake"><span data-dcnode-id="1422" instrument_node="">Tip #1: Track your water intake</span></a></li><li data-dcnode-id="1417"><a data-dcnode-id="1418" href="#Tip_2nbsp_Make_Water_More_Convenient"><span data-dcnode-id="1419" instrument_node="">Tip #2:&nbsp; Make Water More Convenient</span></a></li><li data-dcnode-id="1414"><a data-dcnode-id="1415" href="#Tip_3nbspMake_Daily_Water_Intake_More_Interesting"><span data-dcnode-id="1416" instrument_node="">Tip #3:&nbsp;Make Daily Water Intake More Interesting</span></a></li><li data-dcnode-id="1411"><a data-dcnode-id="1412" href="#Tip_4_Carbonate_your_water"><span data-dcnode-id="1413" instrument_node="">Tip #4: Carbonate your water</span></a></li></ul></li><li data-dcnode-id="1406"><a data-dcnode-id="1407" href="#Final_Thoughts8230"><span data-dcnode-id="1408" instrument_node="">Final Thoughts…</span></a></li></ul></div><span data-dcnode-id="1403" instrument_node="">
</span><h2 data-dcnode-id="1400" id="h-a-lesson-from-the-air-force"><span data-dcnode-id="1401" id="A_Lesson_From_the_Air_Force8230"><span data-dcnode-id="1402" instrument_node="">A Lesson From the Air Force…</span></span></h2><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1398" instrument_node="">When I first joined the Air Force, there was a doctor that my buddies and I all joked about. No matter what ailment you would bring to this guy, at least part of his cure was </span><em data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">“Drink more water.”</span></em></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1393" instrument_node="">If you had the flu… </span><em data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">“Drink more water.”</span></em></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1388" instrument_node="">A fever…. </span><em data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">“Drink more water.”</span></em></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1383" instrument_node="">Banged up your knee…. </span><em data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">“Drink more water.”</span></em></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1378" instrument_node="">Arm ripped off by a rabid gator… </span><em data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">“Drink more water.”</span></em></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">At the time I thought this was really funny. Ten years later, I realize the doctor had a great point. Most people don't drink enough water, and the positive effects of proper hydration can be startling to most people.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1368"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">So here are&nbsp;benefits of water:</span></strong></p><span data-dcnode-id="1367" instrument_node="">
</span><h2 data-dcnode-id="1363" id="h-15-benefits-of-proper-hydration"><span data-dcnode-id="1364" id="15_Benefits_of_Proper_Hydration"><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">15 Benefits of Proper Hydration:</span></strong></span></h2><span data-dcnode-id="1362" instrument_node="">
</span><h3 data-dcnode-id="1358" id="h-1-improve-bodily-functions"><span data-dcnode-id="1359" id="1_Improve_Bodily_Functions"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">1. Improve Bodily Functions</span></strong></span></h3><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1353"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">​</span></strong><span data-dcnode-id="1354" instrument_node="">Drinking sufficient water helps your body get the right balance of nutrients.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Your body is 60% water.&nbsp; Being hydrated can make a huge number of your body processes go smoothly. Water in your body transports nutrients, maintains your body temperature, assists in digestion and absorption, and is a key to good circulation.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Your body needs water for the simple fact that YOU are mostly water.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><h3 data-dcnode-id="1342" id="h-2-weight-loss-control"><span data-dcnode-id="1343" id="2_Weight_LossControl"><strong data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">2. Weight Loss/Control</span></strong></span></h3><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Every serious weight loss plan tells you to drink more water. </span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1337" instrument_node="">Look at any diet plan and you'll see they recommend a high intake of water: </span><em data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Adkins, Paleo, Southbeach, Weight Watchers, Medifast, EatingWell, Volumetrics, Sonoma, Spectrum, Nutrisystem, Jillian Michaels,</span></em><span data-dcnode-id="1334" instrument_node=""> and the </span><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Dukan Diet.&nbsp; </span></em></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1326"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">They all say you should drink more water.&nbsp;</span></strong><span data-dcnode-id="1327" instrument_node=""> The reason?&nbsp; Because more water helps with the process of losing weight.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Water helps the body efficiently process the food you eat.&nbsp; </span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">It helps to give you a “full” feeling, helping you to consume less.&nbsp; It can also contribute to a feeling of having “</span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/get-more-energy/"><span data-dcnode-id="1320" instrument_node="">increased energy</span></a><span data-dcnode-id="1318" instrument_node="">” so you can get the most from your exercise program.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><h3 data-dcnode-id="1310" id="h-3-energizes-muscles"><span data-dcnode-id="1311" id="3_Energizes_Muscles"><strong data-dcnode-id="1312"><span data-dcnode-id="1315" instrument_node="">3. Energizes Muscles</span><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">​</span></em></strong></span></h3><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1304"><strong data-dcnode-id="1306"><em data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">​</span></em></strong><span data-dcnode-id="1305" instrument_node="">When muscle cells don't have enough fluids, they won't work as well.&nbsp; This is due to muscle fatigue because you're decreasing the balance of electrolytes and fluids.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1302" instrument_node="">It is essential to consume water during exercise to replenish the fluids you're losing.&nbsp; In fact as a “rule of thumb” the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/9303999" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1301" instrument_node="">American College of Sports Medicine</span></a><span data-dcnode-id="1299" instrument_node=""> recommends 17 ounces (in addition to your normal water intake) before and during any strenuous sporting activity.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">With exercise, it's important to develop an “early and often” attitude.&nbsp; Consume water before it's needed and you'll avoid the negative effects of dehydration that occurs through sweating.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><div class="wp-block-social-warfare-click-to-tweet social-warfare-admin-block" data-dcnode-id="1285"><div class="sw-tweet-clear" data-dcnode-id="1293"></div><a class="swp_CTT style4" data-dcnode-id="1286" data-link="https://twitter.com/share?text=When+exercising+create%2C+a+%27early+and+often&amp;via=habitsguy&amp;url=https://www.developgoodhabits.com/daily-water-intake/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DWhen%2Bexercising%2Bcreate%252C%2Ba%2B%2527early%2Band%2Boften%26via%3Dhabitsguy%26url%3Dhttps%3A//www.developgoodhabits.com/daily-water-intake/" rel="nofollow noreferrer noopener" target="_blank"><span class="sw-click-to-tweet" data-dcnode-id="1287"><span class="sw-ctt-text" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">When exercising create, a 'early and often</span></span><span class="sw-ctt-btn" data-dcnode-id="1288"><span data-dcnode-id="1290" instrument_node="">Click To Tweet</span><i class="sw swp_twitter_icon" data-dcnode-id="1289"></i></span></span></a></div><span data-dcnode-id="1284" instrument_node="">
</span><h3 data-dcnode-id="1280" id="h-4-help-kidney-function"><span data-dcnode-id="1281" id="4_Help_Kidney_Function"><strong data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">4. Help Kidney Function</span></strong></span></h3><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">According to this New York Times wellness article, a moderate increase in water consumption can clear sodium, urea, and toxins from the body, decreasing the likelihood of kidney-related problems and even kidney stones.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h3 data-dcnode-id="1272" id="h-5-create-a-youthful-appearance"><span data-dcnode-id="1273" id="5_Create_a_Youthful_Appearance"><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">5. Create a Youthful Appearance</span></strong></span></h3><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1270" instrument_node="">The </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uwhealth.org/madison-plastic-surgery/the-benefits-of-drinking-water-for-your-skin/26334" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1269" instrument_node="">University of Wisconsin</span></a><span data-dcnode-id="1267" instrument_node=""> touts drinking water as a way to keep great-looking and youthful skin. However, they also recommend using water in an external moisturizer in addition to consuming the proper amounts.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><h3 data-dcnode-id="1261" id="h-6-regular-bowel-movements"><span data-dcnode-id="1262" id="6_Regular_Bowel_Movements"><strong data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">6. Regular Bowel Movements</span></strong></span></h3><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1250"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">​</span></strong><span data-dcnode-id="1257" instrument_node="">For proper bowel movements, your body needs two things: </span><em data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">fiber </span></em><span data-dcnode-id="1254" instrument_node="">and </span><em data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">water</span></em><span data-dcnode-id="1251" instrument_node="">. If your body is short on fiber, your body will pull water from stool, giving you constipation. Even if you're lack fiber, your body can&nbsp;relieve constipation if has sufficient water.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><h3 data-dcnode-id="1245" id="h-7-removal-of-toxins"><span data-dcnode-id="1246" id="7_Removal_of_Toxins"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">7. Removal of Toxins</span></strong></span></h3><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1240"><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">​</span></strong><span data-dcnode-id="1241" instrument_node="">Clean and pure water does a great job of flushing out toxins from the body through sweat, bowel movements, and urine.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><h3 data-dcnode-id="1235" id="h-8-reduce-cancer-risks"><span data-dcnode-id="1236" id="8_Reduce_Cancer_Risks"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">8. Reduce Cancer Risks</span></strong></span></h3><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1230"><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">​</span></strong><span data-dcnode-id="1231" instrument_node="">Drinking water is not a “cure” for cancer, but it can be a small part of preventing it.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><h3 data-dcnode-id="1225" id="h-9-increase-energy"><span data-dcnode-id="1226" id="9_Increase_Energy"><strong data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">9. Increase Energy</span></strong></span></h3><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1217"><strong data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">​</span></strong><span data-dcnode-id="1221" instrument_node="">A body begins to show thirst at around 1-2% dehydration. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.news-medical.net/news/20120218/Even-mild-dehydration-affects-mood-energy-level-and-ability-to-think-clearly.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1220" instrument_node="">According to studies</span></a><span data-dcnode-id="1218" instrument_node="">, even before you begin to feel thirsty, the effects of mild dehydration can decrease energy, mood, and thinking. The more dehydrated a body gets, the lower the energy levels will ebb.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><div class="wp-block-social-warfare-click-to-tweet social-warfare-admin-block" data-dcnode-id="1207"><div class="sw-tweet-clear" data-dcnode-id="1215"></div><a class="swp_CTT style4" data-dcnode-id="1208" data-link="https://twitter.com/share?text=Before+you+feel+thirsty%2C+your+body+feels+effects+of+%23dehydration%3A+low+energy%2C+mood+and+thinking.&amp;via=habitsguy&amp;url=https://www.developgoodhabits.com/daily-water-intake/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DBefore%2Byou%2Bfeel%2Bthirsty%252C%2Byour%2Bbody%2Bfeels%2Beffects%2Bof%2B%2523dehydration%253A%2Blow%2Benergy%252C%2Bmood%2Band%2Bthinking.%26via%3Dhabitsguy%26url%3Dhttps%3A//www.developgoodhabits.com/daily-water-intake/" rel="nofollow noreferrer noopener" target="_blank"><span class="sw-click-to-tweet" data-dcnode-id="1209"><span class="sw-ctt-text" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Before you feel thirsty, your body feels effects of #dehydration: low energy, mood and thinking.</span></span><span class="sw-ctt-btn" data-dcnode-id="1210"><span data-dcnode-id="1212" instrument_node="">Click To Tweet</span><i class="sw swp_twitter_icon" data-dcnode-id="1211"></i></span></span></a></div><span data-dcnode-id="1206" instrument_node="">
</span><h3 data-dcnode-id="1202" id="h-10-reduce-headaches"><span data-dcnode-id="1203" id="10_Reduce_Headaches"><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">10. Reduce Headaches</span></strong></span></h3><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1197"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">​</span></strong><span data-dcnode-id="1198" instrument_node="">Not all headaches are caused by dehydration, but mild or severe dehydration CAN cause headaches. Frequent headaches may be caused by other symptoms, but they could be caused by chronic dehydration.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><h3 data-dcnode-id="1192" id="h-11-ramp-up-brain-power"><span data-dcnode-id="1193" id="11_Ramp_Up_Brain_Power"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">11. Ramp Up Brain Power</span></strong></span></h3><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1181"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">​</span></strong><span data-dcnode-id="1188" instrument_node="">In a London study, researchers found that students who were </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uel.ac.uk/news/press-releases/2012/04/waterexams.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1187" instrument_node="">drinking water during exams</span></a><span data-dcnode-id="1185" instrument_node=""> actually scored higher on average in tests.&nbsp; While it is hard to say if this is physiological or psychological, it has been proven to work, so if you want to turn that B+ to an A, why not take a </span><a class="wpil_internal_link" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/water-bottle-working-out/" rel="noopener noreferrer" style="width: auto !important;"><span data-dcnode-id="1184" instrument_node="">bottle of water</span></a><span data-dcnode-id="1182" instrument_node=""> with you to the exam.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><h3 data-dcnode-id="1176" id="h-12-save-money"><span data-dcnode-id="1177" id="12_Save_Money"><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">12. Save Money</span></strong></span></h3><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1169"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">​</span></strong><em data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">What do soda, coffee, juice, and energy drinks all have in common?</span></em><span data-dcnode-id="1170" instrument_node=""> They all cost money.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">While you CAN buy premium water that can cost money, it is usually less than other drinks and freely available in many places. Simply saving $2 a day by having water with your meals rather than caloric drinks will fatten your wallet while shrinking your waistline.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><h3 data-dcnode-id="1161" id="h-13-prevent-cramping"><span data-dcnode-id="1162" id="13_Prevent_Cramping"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">13. Prevent Cramping</span></strong></span></h3><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1156"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">​</span></strong><span data-dcnode-id="1157" instrument_node="">In sports, cramps are caused by three things. 1. Depletion of potassium 2. Improper stretching 3. Lack of water. &nbsp;Increase your water intake and you'll avoid one of the major causes of cramping.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><h3 data-dcnode-id="1151" id="h-14-strengthen-the-immune-system"><span data-dcnode-id="1152" id="14_Strengthen_the_Immune_System"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">14. Strengthen the Immune System</span></strong></span></h3><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1143"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">​</span></strong><span data-dcnode-id="1147" instrument_node="">Water is key to health. Dehydration compromises the body’s immune system. There are quite a few </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fitday.com/fitness-articles/nutrition/healthy-eating/5-immune-system-benefits-of-drinking-water.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1146" instrument_node="">immune system benefits</span></a><span data-dcnode-id="1144" instrument_node=""> from proper hydration.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Water:</span></p><span data-dcnode-id="1139" instrument_node="">
</span><div class="wp-block-ugb-icon-list ugb-icon-list ugb-icon--icon-check ugb-71432de ugb-icon-list--v2 ugb-main-block" data-dcnode-id="1115"><div class="ugb-inner-block" data-dcnode-id="1116"><div class="ugb-block-content" data-dcnode-id="1117"><ul data-dcnode-id="1118"><li data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Oxygenates the blood</span></li><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Removes toxins from the blood</span></li><li data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Increases Lymph production</span></li><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Cleans eyes</span></li><li data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Cleans mouth</span></li><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Helps digest food</span></li><li data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Helps fight insomnia</span></li><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Lubricates joints</span></li><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Increases Serotonin Production (fights depression) </span></li></ul></div></div></div><span data-dcnode-id="1114" instrument_node="">
</span><h3 data-dcnode-id="1110" id="h-15-fluorination-in-water"><span data-dcnode-id="1111" id="15_Fluorination_in_Water"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">15. Fluorination in Water</span></strong></span></h3><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1102"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">​</span></strong><span data-dcnode-id="1106" instrument_node="">Fluoridation is another great reason to drink water.&nbsp; According to the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ada.org/fluoride.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1105" instrument_node="">American Dental Association,</span></a><span data-dcnode-id="1103" instrument_node=""> fluoridated water decreases the chances of tooth decay by 20-40%. (That is, in addition, using other sources, such as fluoridated toothpaste)</span></p><span data-dcnode-id="1101" instrument_node="">
</span><div class="wp-block-social-warfare-click-to-tweet social-warfare-admin-block" data-dcnode-id="1092"><div class="sw-tweet-clear" data-dcnode-id="1100"></div><a class="swp_CTT style4" data-dcnode-id="1093" data-link="https://twitter.com/share?text=Benefits+of+%23water%3A+increased+energy%2C+prevents+headaches%2C+removes+toxins%2C+see+more...&amp;via=habitsguy&amp;url=https://www.developgoodhabits.com/daily-water-intake/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DBenefits%2Bof%2B%2523water%253A%2Bincreased%2Benergy%252C%2Bprevents%2Bheadaches%252C%2Bremoves%2Btoxins%252C%2Bsee%2Bmore...%26via%3Dhabitsguy%26url%3Dhttps%3A//www.developgoodhabits.com/daily-water-intake/" rel="nofollow noreferrer noopener" target="_blank"><span class="sw-click-to-tweet" data-dcnode-id="1094"><span class="sw-ctt-text" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Benefits of #water: increased energy, prevents headaches, removes toxins, see more...</span></span><span class="sw-ctt-btn" data-dcnode-id="1095"><span data-dcnode-id="1097" instrument_node="">Click To Tweet</span><i class="sw swp_twitter_icon" data-dcnode-id="1096"></i></span></span></a></div><span data-dcnode-id="1091" instrument_node="">
</span><h2 data-dcnode-id="1088" id="h-how-much-water-do-you-need"><span data-dcnode-id="1089" id="How_Much_Water_Do_You_Need"><span data-dcnode-id="1090" instrument_node="">How Much Water Do You Need?</span></span></h2><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">I'm sure you've heard the advice about drinking eight * (8-ounce) glasses of water a day. (64 total ounces) </span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">This measurement is very imprecise but can be a decent guide or rule-of-thumb.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1077"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">But in a nutshell:</span></strong><span data-dcnode-id="1078" instrument_node="">&nbsp; 64 ounces is a decent baseline, but water consumption should be increased in areas with more heat/humidity, if you are more active, or if you are sick.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><div class="wp-block-social-warfare-click-to-tweet social-warfare-admin-block" data-dcnode-id="1067"><div class="sw-tweet-clear" data-dcnode-id="1075"></div><a class="swp_CTT style4" data-dcnode-id="1068" data-link="https://twitter.com/share?text=64+ounces+of+daily+%23water+is+a+baseline.+Drink+more+in+high+humidity%2C+if+active+or+sick&amp;via=habitsguy&amp;url=https://www.developgoodhabits.com/daily-water-intake/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3D64%2Bounces%2Bof%2Bdaily%2B%2523water%2Bis%2Ba%2Bbaseline.%2BDrink%2Bmore%2Bin%2Bhigh%2Bhumidity%252C%2Bif%2Bactive%2Bor%2Bsick%26via%3Dhabitsguy%26url%3Dhttps%3A//www.developgoodhabits.com/daily-water-intake/" rel="nofollow noreferrer noopener" target="_blank"><span class="sw-click-to-tweet" data-dcnode-id="1069"><span class="sw-ctt-text" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">64 ounces of daily #water is a baseline. Drink more in high humidity, if active or sick</span></span><span class="sw-ctt-btn" data-dcnode-id="1070"><span data-dcnode-id="1072" instrument_node="">Click To Tweet</span><i class="sw swp_twitter_icon" data-dcnode-id="1071"></i></span></span></a></div><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1062"><strong data-dcnode-id="1063"><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Where do I get the water I need?</span></em></strong></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Most of our water needs come from drinking water and juices. Coffee and soda DO give you some of the water you need, but they also have a mild diuretic effect in addition to the calories they pack on.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">20% of water needs come from our foods, but this can be increased if you consume more “watery” foods such as oranges, celery, broths, and soups.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">It is possible to drink “too much water.” This is called </span><a data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_intoxication"><span data-dcnode-id="1053" instrument_node="">water intoxication</span></a><span data-dcnode-id="1051" instrument_node=""> and happens when the body’s sodium and electrolyte levels get extremely low. Most frequently this happens to people participating in extreme endurance sports.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">If you drink when you are thirsty, there should be no reason to fear drinking water.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1042"><strong data-dcnode-id="1043"><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">What about energy drinks, Naked Juice and other forms of “healthy” liquids?</span></em></strong></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">These drinks DO count toward your daily water requirements, but they're often full of </span><em data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">empty calories</span></em><span data-dcnode-id="1037" instrument_node="">. The “energy” in these drinks is often sugar and caffeine, so while they have some water benefits, they add junk calories to your diet.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><div class="wp-block-social-warfare-click-to-tweet social-warfare-admin-block" data-dcnode-id="1026"><div class="sw-tweet-clear" data-dcnode-id="1034"></div><a class="swp_CTT style4" data-dcnode-id="1027" data-link="https://twitter.com/share?text=%23Energydrinks+are+full+of+empty+calories.+%23drinkmorewater+daily%21&amp;via=habitsguy&amp;url=https://www.developgoodhabits.com/daily-water-intake/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3D%2523Energydrinks%2Bare%2Bfull%2Bof%2Bempty%2Bcalories.%2B%2523drinkmorewater%2Bdaily%2521%26via%3Dhabitsguy%26url%3Dhttps%3A//www.developgoodhabits.com/daily-water-intake/" rel="nofollow noreferrer noopener" target="_blank"><span class="sw-click-to-tweet" data-dcnode-id="1028"><span class="sw-ctt-text" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">#Energydrinks are full of empty calories. #drinkmorewater daily!</span></span><span class="sw-ctt-btn" data-dcnode-id="1029"><span data-dcnode-id="1031" instrument_node="">Click To Tweet</span><i class="sw swp_twitter_icon" data-dcnode-id="1030"></i></span></span></a></div><span data-dcnode-id="1025" instrument_node="">
</span><h2 data-dcnode-id="1022" id="h-3-tips-for-developing-a-daily-water-intake-habit"><span data-dcnode-id="1023" id="3_Tips_for_Developing_a_Daily_Water_Intake_Habit"><span data-dcnode-id="1024" instrument_node="">3 Tips for Developing a Daily Water Intake Habit</span></span></h2><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">It can get boring to drink eight glasses of water every day.&nbsp; Fortunately, there are a few ways you can easily add this habit without turning it into daily grind…</span></p><span data-dcnode-id="1018" instrument_node="">
</span><h3 data-dcnode-id="1012" id="h-tip-1-track-your-water-intake"><span data-dcnode-id="1013" id="Tip_1_Track_your_water_intake"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Tip #1: </span></strong><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Track your water intake</span></strong></span></h3><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">I am a firm believer in tracking. If you don't track a habit, it's easy to backslide or forget about it. This is the difference between making a lasting change or letting things slide when you get busy.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">There are quite a few ways to track your water intake. There are mobile device apps that you can use to </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/habit-tracker-ideas/"><span data-dcnode-id="1006" instrument_node="">track daily tasks</span></a><span data-dcnode-id="1004" instrument_node="">. You can make an Excel spreadsheet and keep it updated. Or you can use an “old school” technique like the </span><em data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">water card</span></em><span data-dcnode-id="1001" instrument_node="">.</span></p><span data-dcnode-id="999" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="994"><figure class="aligncenter is-resized" data-dcnode-id="995"><img alt="daily water intake" data-dcnode-id="998" data-lazy-src="//www.developgoodhabits.com/wp-content/uploads/2013/07/Daily-Water-intake.jpg" height="178" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20384%20178'%3E%3C/svg%3E" width="384"><noscript data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">&lt;img src="//www.developgoodhabits.com/wp-content/uploads/2013/07/Daily-Water-intake.jpg" alt="daily water intake" width="384" height="178"&gt;</span></noscript></figure></div><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><strong data-dcnode-id="990"><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">How to make a water card:</span></em></strong></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Create a word processing document (or Excel) to make a 9X5 card with grids, including the days of the week and a block for each 8-ounce glass of water (or equivalent).</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Then keep this document on&nbsp;you at all times by putting it in your wallet or purse.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="981" instrument_node="">From there, you'll mark off&nbsp;a box whenever you drink eight </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/best-water-filter-pitchers/"><span data-dcnode-id="980" instrument_node="">ounces of water.</span></a></p><span data-dcnode-id="977" instrument_node="">
</span><h3 data-dcnode-id="970" id="h-tip-2-make-water-more-convenient"><span data-dcnode-id="971" id="Tip_2nbsp_Make_Water_More_Convenient"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Tip #2:</span></strong><span data-dcnode-id="974" instrument_node="">&nbsp; </span><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Make Water More Convenient</span></strong></span></h3><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">You are more likely to succeed if you turn the water habit into an easy process.&nbsp; Here are nine ways you can make water a convenient resource in your life:</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="962" style="font-size:22px"><em data-dcnode-id="963"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Carry a water bottle everywhere.</span></strong></em></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="954"><em data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">​</span></em><span data-dcnode-id="958" instrument_node="">Have a </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/steel-water-bottles/"><span data-dcnode-id="957" instrument_node="">bottle of water</span></a><span data-dcnode-id="955" instrument_node=""> everywhere you go and you'll increase the likelihood of sticking to this habit change.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="949" style="font-size:22px"><strong data-dcnode-id="950"><em data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Set reminders.</span></em></strong></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">I have a big sign on my refrigerator. DRINK MORE WATER. Every time I make lunch, breakfast or dinner, I see this reminder and remember to have a tall glass of water.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="941"><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Reminders in any shape and form can help you to get in your daily water.</span></strong><span data-dcnode-id="942" instrument_node=""> </span></p><span data-dcnode-id="940" instrument_node="">
</span><div class="wp-block-ugb-icon-list ugb-icon-list ugb-icon--icon-check ugb-ae71ef3 ugb-icon-list--v2 ugb-main-block" data-dcnode-id="918"><div class="ugb-inner-block" data-dcnode-id="919"><div class="ugb-block-content" data-dcnode-id="920"><ul data-dcnode-id="921"><li data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">Put it on “</span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/best-to-do-list-app/"><span data-dcnode-id="936" instrument_node="">to-do list</span></a><span data-dcnode-id="934" instrument_node="">.” </span></li><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Get a drink water app. </span></li><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Set audible reminders on your PC, watch or mobile device.</span></li><li data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">Use a “</span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/habit-tracking-apps/"><span data-dcnode-id="927" instrument_node="">habit app</span></a><span data-dcnode-id="925" instrument_node="">” to remind you</span></li><li data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Place yellow stickies around your desk and refrigerator to remind you </span></li></ul></div></div></div><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="914"><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Do whatever it takes to remember this new routine.</span></em></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="909" style="font-size:22px"><strong data-dcnode-id="910"><em data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Make it taste good.</span></em></strong></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="904"><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">​</span></strong><span data-dcnode-id="905" instrument_node="">Make calorie-free flavored water in advance to have on hand when you are thirsty and want something more than plain water. Add a bit of lemon/lime juice. &nbsp;Or try Crystal Light which has a variety of different flavors.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="897"><strong data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">[</span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/water-flavoring/"><span data-dcnode-id="901" instrument_node="">Check out some of the best water flavor enhancers</span></a><span data-dcnode-id="899" instrument_node="">]</span></strong></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="892" style="font-size:22px"><strong data-dcnode-id="893"><em data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Swap water with your liquid guilty pleasures.&nbsp;</span></em></strong></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="886"><strong data-dcnode-id="888"><em data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">​</span></em></strong><span data-dcnode-id="887" instrument_node="">I drink a couple of cups of tea every day, and I sometimes have a beer or two with dinner. But, I also have the habit of being a “two-fisted” drinker–one tea and a glass of water OR one beer and glass water.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">This routine serves two purposes. First, it fills me up faster and makes me drink less of the “bad” stuff.&nbsp; Second, it helps me maintain my daily hydration.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="878" style="font-size:22px"><strong data-dcnode-id="879"><em data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Drink water when dining out.</span></em></strong></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Alcoholic beverages are super expensive when you dine out. It can more than the cost of a meal for a few beers. Even soda, lemonade, and iced tea can add a nice chunk of change to your bill.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">But water is almost always free when you dine out.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">So why not skip ordering drinks when you dine out and get nice (free) water instead.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="864" style="font-size:22px"><em data-dcnode-id="865"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Make a rule.</span></strong></em></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">I like rules, they give you the framework to change your habits.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="856"><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">T</span></em><span data-dcnode-id="857" instrument_node="">his one is simple and easy to follow. &nbsp;</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">I like a good jolt of caffeine in the morning, but I make myself drink three glasses of water before indulging in caffeine. That means I start each day by consuming 1/3 of my hydration needs.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="848" style="font-size:22px"><strong data-dcnode-id="849"><em data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Carry a nice jug of water with you to work.</span></em></strong></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="840"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">​</span></strong><span data-dcnode-id="844" instrument_node="">Since you should be getting up to stretch your legs and </span><a data-dcnode-id="842" data-lasso-id="17949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/benefits-of-walking/"><span data-dcnode-id="843" instrument_node="">walk throughout the day</span></a><span data-dcnode-id="841" instrument_node=""> anyway, why not take a walk to the water fountain and fill it up.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="835" style="font-size:22px"><strong data-dcnode-id="836"><em data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Drink water at all mealtimes.</span></em></strong></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="827"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">​</span></strong><span data-dcnode-id="831" instrument_node="">Drinking water, before, during and after a meal helps you feel fuller and consume less.&nbsp; This is also a great way to get the 64+ ounces you need every day. (Here are</span><a data-dcnode-id="829" data-lasso-id="17950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/best-water-filter-pitchers/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="830" instrument_node=""> 6 of the best water filter pitchers</span></a><span data-dcnode-id="828" instrument_node=""> you can use at home.)</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="822" style="font-size:22px"><strong data-dcnode-id="823"><em data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Feel hungry?</span></em></strong></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">​</span></strong><span data-dcnode-id="818" instrument_node="">Drink some water. </span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Your body can be a bit sneaky. &nbsp;Sometimes when you need water it can feel like you are hungry. &nbsp;</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Some people grab that Mars Bar and slam down unneeded calories. &nbsp;It's far better to drink a bit of water the next time you feel hungry. </span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Then, if the hunger persists…eat (and drink water while eating).</span></p><span data-dcnode-id="807" instrument_node="">
</span><h3 data-dcnode-id="801" id="h-tip-3-make-daily-water-intake-more-interesting"><span data-dcnode-id="802" id="Tip_3nbspMake_Daily_Water_Intake_More_Interesting"><strong data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Tip #3:&nbsp;</span></strong><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Make Daily Water Intake More Interesting</span></strong></span></h3><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Convenience and tracking are great ways to get in your daily requirements of water, but you also want to make it more palatable.&nbsp; Do it this way and look forward to getting your daily fill of high-quality H2O.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">You can add a variety of ingredients to make water taste better:</span></p><span data-dcnode-id="794" instrument_node="">
</span><div class="wp-block-ugb-icon-list ugb-icon-list ugb-icon--icon-arrow ugb-83c942b ugb-icon-list--v2 ugb-main-block" data-dcnode-id="778"><div class="ugb-inner-block" data-dcnode-id="779"><div class="ugb-block-content" data-dcnode-id="780"><ul data-dcnode-id="781"><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Unsweetened tea</span></li><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Lemon/ Lime</span></li><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Other fruits:&nbsp; Oranges, grapefruit, raspberries, blackberries or strawberries&nbsp; (Cut and squeeze the juices into your water.)</span></li><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Try a zero-calorie flavor mix, like Crystal Light.</span></li><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Try Carbonated water </span></li></ul></div></div></div><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Personally, I can't stand the taste of “sugar-free” drinks, but some people find that adding them to water makes it taste a whole lot better. </span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">For those wondering: </span><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Yes, crystal light does count as water intake</span></strong><span data-dcnode-id="770" instrument_node="">, but sugar substitutes bring their own issues, so use sparingly. </span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">8-16 ounces a day of water intake with sugar substitutes are fine, but you will still want to drink the bulk of your water plain or only naturally flavored.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="762" style="font-size:22px"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">You can try this:</span></strong></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="758"><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Fill (8) * eight-ounce water-bottles every night and plop them in the freezer.&nbsp; You can add flavor, or fruit if you want. Take them out in the morning and drink them throughout the day for ice-cold water.&nbsp; Try to finish them all. </span></em></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="754"><em data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Having everything prepared beforehand is a simple way to track your water intake.&nbsp; By pre-planning your water intake, all you'll have to remember is to create the water each night and drink every bottle you fill.&nbsp; That's it!</span></em></p><span data-dcnode-id="753" instrument_node="">
</span><h3 data-dcnode-id="750" id="h-tip-4-carbonate-your-water"><span data-dcnode-id="751" id="Tip_4_Carbonate_your_water"><span data-dcnode-id="752" instrument_node="">Tip #4: Carbonate your water</span></span></h3><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">Another great option is to try </span><em data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">carbonated</span></em><span data-dcnode-id="745" instrument_node=""> water. According to the Mayo Clinic, carbonated water is every bit as healthy as tap water, with no adverse effects on the body. Sometimes that bubbly and effervescent water can hit the spot.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">In fact, in a 2014 study on water consumption found that </span><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">people who sometimes drank plain carbonated water drank 43% more water</span></strong><span data-dcnode-id="739" instrument_node=""> throughout the day. Pretty amazing numbers!</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Add this to the idea of flavoring your carbonated water and you could have a big hit that hill help keeps you hydrated. (Keep the flavoring non-sugar, non-aspartame and all-natural, of course!)</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">There are lots of good options for these carbonation machines. The one pictured here is a very good one. It carbonates 1 liter at a time, using canisters good for carbonating 60 liters of water. It comes with a one-liter BPA-free reusable carbonating bottle and a&nbsp; mini CO2 carbonator. There are fancier and bigger carbonators out there, but for the price, this water carbonator is the best rated</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="725"><strong data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">In fact, there are 60 different flavorings available for this </span><a aria-label="home seltzer water (opens in a new tab)" data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aax-us-east.amazon-adsystem.com/x/c/QpwAIwh8MdQRcXTWNGlpFQYAAAFuynSbpAEAAAFKAaSoD1Q/https%3A//assoc-redirect.amazon.com/g/r/https%3A//www.amazon.com/SodaStream-Fountain-Sparkling-Starter-Silver/dp/B00EPEALEM/ref%3Das_li_ss_tl%3FcreativeASIN%3DB00EPEALEM%26imprToken%3DJAVKfgX99nJUnJu8JSUP4w%26slotNum%3D1%26s%3Dkitchen%26ie%3DUTF8%26qid%3D1488497307%26sr%3D1-2%26keywords%3Dhome%2Bseltzer%2Bwater%2Bmaker%26linkCode%3Dw61%26tag%3Ddghblogwater-20%26linkId%3Da66ed8a86441758a8860941dd7fdc334" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="729" instrument_node="">home seltzer water</span></a><span data-dcnode-id="727" instrument_node=""> maker. </span></strong></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">There are all-natural flavorings and non-aspartame and non-high fructose corn syrup options. and even flavoring where you can make your own soda or diet soda.&nbsp; </span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Being an advocate of pure water… I would highly recommend sticking to natural flavorings only, however.</span></p><span data-dcnode-id="718" instrument_node="">
</span><h2 data-dcnode-id="715" id="h-final-thoughts"><span data-dcnode-id="716" id="Final_Thoughts8230"><span data-dcnode-id="717" instrument_node="">Final Thoughts…</span></span></h2><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">That is about it for this guide on drinking 64+ ounces of water every day.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">On DevelopGoodHabits.com, we talk a lot about different </span><a data-dcnode-id="708" data-lasso-id="17952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.developgoodhabits.com/weight-loss-healthy-living-books/" title="13 Weight-Loss and Healthy Living Books"><span data-dcnode-id="709" instrument_node="">healthy habits </span></a><span data-dcnode-id="707" instrument_node="">you can develop.&nbsp; </span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">In my opinion, increasing your water intake is one of the simplest, but most effective routines you can add to your life.&nbsp; </span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="699"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Simply follow the strategies I've outline in this post and you'll form a habit that will make you healthier, happier and more likely to form other positive, life-changing habits.</span></strong></p><span data-dcnode-id="698" instrument_node="">

</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">This is one awesome guide, Steve 🙂</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">I try to drink water every now and then – before going to sleep, after I wake up (Studies say that water can help to restart our organs), and during my meals.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Currently, I don’t track my water intake, but I am going to start doing it. Thanks for the tip! Like you mentioned, tracking is the only way we know for sure whether we have accomplished our goals.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">I do carry around my own water bottle (20 oz) 😀</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">As for making water more interesting, I usually go with iced tea 😀</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">So we are supposed to have about 60 ounces of water everyday? I don’t have a measuring cup, so I am just going to try and finish my bottle 3 times a day 😀 (that will get me close to 60 :D).</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Anyways, thank you for the comprehensive guide 😉 Water has so many benefits and yet many of us forget to drink enough of it everyday.</span></p><span data-dcnode-id="492" instrument_node="">

</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Michal,</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Glad you liked the guide!</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Let me answer your questions.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Tea: to some extent, yes you can. Tea is a mild diuretic, so it is not as good as drinking water on a 1:1 ratio, and if you add sugar, that has it’s own issues. But it does help to reach your numbers. I would recommend trying to have a fair share of your water in pure form, then get the rest as TEA or something like flavored water. (I am a fan of tea myself and often have a few big cups while I work)</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Fruits: Generally I wouldn’t “count” fruits as “water intake”. But yes, if you eat a bunch it will help you to reach your goal. It is hard to go wrong eating a lot of fruits and vegetables. Still though, I would think of most of this water from fruits as the icing on the cake, and still strive to get a share of pure water, flavored water or some other drinks (not soda or coffee) to fill your day.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Thanks for some great questions.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">SJ</span></p><span data-dcnode-id="402" instrument_node="">

</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Absolutely. Lemon flavoring not only makes it taste better but provides a few benefits of its own. The only time flavoring becomes an issue is when you add in pure sugar or artificial flavoring. In the case of both of those, moderation becomes the key. Water with sugared flavor can be just as fattening as a soda and “calorie free” flavoring have their own issues. For those cases, it is fine to do it, but I wouldn’t flavor the entire 64+ ounces with sugar or sugar substitute. </span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">A lemon per liter, however: is awesome. Keep it up!</span></p><span data-dcnode-id="290" instrument_node="">

Wishing you health and happiness. 🙂</span></p><span data-dcnode-id="216" instrument_node="">
