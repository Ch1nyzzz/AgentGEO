</span><meta content="Water is an essential resource for human existence. In fact, more than 60% of the human body is made up of water. Our bodies consume water in every cell, in the different organisms and in the tissues. Hence, water allows stabilization of the body temperature and guarantees the normal functioning of the other bodily activities. Nevertheless, in recent years, water pollution has become a serious problem affecting water quality. Therefore, to design a model that predicts water quality is nowadays very important to control water pollution, as well as to alert users in case of poor quality detection. Motivated by these reasons, in this study, we take the advantages of machine learning algorithms to develop a model that is capable of predicting the water quality index and then the water quality class. The method we propose is based on four water parameters: temperature, pH, turbidity and coliforms. The use of the multiple regression algorithms has proven to be important and effective in predicting the water quality index. In addition, the adoption of the artificial neural network provides the most highly efficient way to classify the water quality." data-dcnode-id="3135" name="dc.description"><span data-dcnode-id="3134" instrument_node="">

</span><meta content="Machine learning algorithms for efficient water quality prediction - Modeling Earth Systems and Environment" data-dcnode-id="2941" property="og:title"><span data-dcnode-id="2940" instrument_node="">
</span><meta content="Water is an essential resource for human existence. In fact, more than 60% of the human body is made up of water. Our bodies consume water in every cell, in the different organisms and in the tissues. Hence, water allows stabilization of the body temperature and guarantees the normal functioning of the other bodily activities. Nevertheless, in recent years, water pollution has become a serious problem affecting water quality. Therefore, to design a model that predicts water quality is nowadays very important to control water pollution, as well as to alert users in case of poor quality detection. Motivated by these reasons, in this study, we take the advantages of machine learning algorithms to develop a model that is capable of predicting the water quality index and then the water quality class. The method we propose is based on four water parameters: temperature, pH, turbidity and coliforms. The use of the multiple regression algorithms has proven to be important and effective in predicting the water quality index. In addition, the adoption of the artificial neural network provides the most highly efficient way to classify the water quality." data-dcnode-id="2939" property="og:description"><span data-dcnode-id="2938" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="2466" data-gtm-vis-first-on-screen-50443292_562="680" data-gtm-vis-first-on-screen-50443292_563="680" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="680" data-gtm-vis-recent-on-screen-50443292_563="680" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2467" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2471" id="Abs1"><span data-dcnode-id="2472" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2468" id="Abs1-content"><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Water is an essential resource for human existence. In fact, more than 60% of the human body is made up of water. Our bodies consume water in every cell, in the different organisms and in the tissues. Hence, water allows stabilization of the body temperature and guarantees the normal functioning of the other bodily activities. Nevertheless, in recent years, water pollution has become a serious problem affecting water quality. Therefore, to design a model that predicts water quality is nowadays very important to control water pollution, as well as to alert users in case of poor quality detection. Motivated by these reasons, in this study, we take the advantages of machine learning algorithms to develop a model that is capable of predicting the water quality index and then the water quality class. The method we propose is based on four water parameters: temperature, pH, turbidity and coliforms. The use of the multiple regression algorithms has proven to be important and effective in predicting the water quality index. In addition, the adoption of the artificial neural network provides the most highly efficient way to classify the water quality.</span></p></div></div></section><span data-dcnode-id="2465" instrument_node="">
</span><section data-dcnode-id="2411" data-gtm-vis-first-on-screen-50443292_562="680" data-gtm-vis-first-on-screen-50443292_563="680" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="680" data-gtm-vis-recent-on-screen-50443292_563="680" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2412" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2463" id="Sec1"><span data-dcnode-id="2464" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2413" id="Sec1-content"><p data-dcnode-id="2455"><span data-dcnode-id="2462" instrument_node="">Water is a principal basic element on the earth. Living organisms, namely, humans, animals, vegetables and plants require water to survive. Without water, there would be no life on the Earth (Griffiths et al. </span><a aria-label="Reference 2010" data-dcnode-id="2460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d93028592e392" title="Griffiths O, Henderson H, Simpson M (2010) Environmental Health Practitioner Manual: (Common wealth of Australia). 
                https://ww2.health.wa.gov.au/~/media/Files/Corporate/general-documents/Environmental-health/Aboriginal-environmental-health/Environmental-Health-Practitioner-Manual.pdf
                
              . Accessed 10 Aug 2021"><span data-dcnode-id="2461" instrument_node="">2010</span></a><span data-dcnode-id="2459" instrument_node="">). Indeed, water is a vital resource that satisfies the requirements of many daily activities including drinking, washing, cooking, irrigation, constructing, bathing, cleaning and so ones. Actually, water with good quality means minimizing the charges related to drinking water, industrial activities and improving the agricultural production (Westall and Brack </span><a aria-label="Reference 2018" data-dcnode-id="2457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d93028592e395" title="Westall F, Brack A (2018) The importance of water for life. Space Sci Rev 214(2):50. 
                https://doi.org/10.1007/s11214-018-0476-7
                
              "><span data-dcnode-id="2458" instrument_node="">2018</span></a><span data-dcnode-id="2456" instrument_node="">).</span></p><p data-dcnode-id="2432"><span data-dcnode-id="2454" instrument_node="">To manage water resource, various water monitoring systems have been introduced recently (Mabrouki et al. </span><a aria-label="Reference 2021a" data-dcnode-id="2452" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d93028592e401" title="Mabrouki J, Azrour M, Boubekraoui A, El Hajjaji S (2021a) Intelligent system for the protection of people. In: Intelligent systems in big data, semantic web and machine learning. Springer, pp 157–165"><span data-dcnode-id="2453" instrument_node="">2021a</span></a><span data-dcnode-id="2451" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="2449" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d93028592e404" title="Mabrouki J, Azrour M, Dhiba D, Farhaoui Y, Hajjaji SE (2021b) IoT-based data logger for weather monitoring using arduino-based wireless sensor networks with remote graphical application and alerts. Big Data Min Anal 4(1):25–32. 
                https://doi.org/10.26599/BDMA.2020.9020018
                
              "><span data-dcnode-id="2450" instrument_node="">b</span></a><span data-dcnode-id="2448" instrument_node="">, </span><a aria-label="Reference c" data-dcnode-id="2446" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d93028592e407" title="Mabrouki J, Azrour M, Fattah G, Dhiba D, Hajjaji SE (2021c) Intelligent monitoring system for biogas detection based on the Internet of Things: Mohammedia, Morocco city landfill case. Big Data Min Anal 4(1):10–17"><span data-dcnode-id="2447" instrument_node="">c</span></a><span data-dcnode-id="2445" instrument_node="">, </span><a aria-label="Reference d" data-dcnode-id="2443" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d93028592e410" title="Mabrouki J, Fattah G, Al-Jadabi N, Abrouki Y, Dhiba D, Azrour M, Hajjaji SE (2021d) Study, simulation and modulation of solar thermal domestic hot water production systems. Model Earth Syst Environ. 
                https://doi.org/10.1007/s40808-021-01200-w
                
              "><span data-dcnode-id="2444" instrument_node="">d</span></a><span data-dcnode-id="2442" instrument_node="">, </span><a aria-label="Reference e" data-dcnode-id="2440" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d93028592e413" title="Mabrouki J, Azrour M, El Hajjaji S (2021e) Use of internet of things for monitoring and evaluation water’s quality: comparative study. Int J Cloud Comput (in press)"><span data-dcnode-id="2441" instrument_node="">e</span></a><span data-dcnode-id="2439" instrument_node="">, </span><a aria-label="Reference f" data-dcnode-id="2437" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d93028592e417" title="Mabrouki J, Azrour M, Farhaoui Y, El Hajjaji S (2021f) Intelligent system for monitoring and detecting water quality. In: Farhaoui Y (ed) Big data and networks technologies, vol 81. Springer International Publishing, pp 172–182. 
                https://doi.org/10.1007/978-3-030-23672-4_13
                
              "><span data-dcnode-id="2438" instrument_node="">f</span></a><span data-dcnode-id="2436" instrument_node="">). Indeed, water quality monitoring is a fundamental task in terms of supervising the situation of water pollution. Furthermore, it contributes efficiently to the implementation of water resources protection plan envisioned for clean and pure water (Li and Liu </span><a aria-label="Reference 2019" data-dcnode-id="2434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d93028592e420" title="Li D, Liu S (2019) System and platform for water quality monitoring. Water Qual Monit Manag. 
                https://doi.org/10.1016/B978-0-12-811330-1.00003-X
                
              "><span data-dcnode-id="2435" instrument_node="">2019</span></a><span data-dcnode-id="2433" instrument_node="">). In particular, these systems include an automatic remote monitoring device for data gathering, broadcasting networks and platform for data analysis. However, the designed system and platform must meet the standards of confidentiality, reliability, security and cost reduction of water quality monitoring.</span></p><p data-dcnode-id="2418"><span data-dcnode-id="2431" instrument_node="">Water quality predicting is a key and primary task in the context of the environmental control strategy. Certainly, the accuracy of predictions will surely contribute significantly to more appropriate conservation of water resources. Until today, numerous water management organizations have set up monitoring stations to check the evolution of the water quality situation (Kumar and Samalla </span><a aria-label="Reference 2019" data-dcnode-id="2429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d93028592e426" title="Kumar MJV, Samalla K (2019) Design and development of water quality monitoring system in IOT. Int J Recent Technol Eng 7(5):7"><span data-dcnode-id="2430" instrument_node="">2019</span></a><span data-dcnode-id="2428" instrument_node="">; Miry and Aramice </span><a aria-label="Reference 2020" data-dcnode-id="2426" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d93028592e429" title="Miry AH, Aramice GA (2020) Water monitoring and analytic based thingspeak. Int J Electr Comput Eng (IJECE) 10(4):3588–3595. 
                https://doi.org/10.11591/ijece.v10i4.pp3588-3595
                
              "><span data-dcnode-id="2427" instrument_node="">2020</span></a><span data-dcnode-id="2425" instrument_node="">; Pasika and Gandla </span><a aria-label="Reference 2020" data-dcnode-id="2423" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d93028592e432" title="Pasika S, Gandla ST (2020) Smart water quality monitoring system with cost-effective using IoT. Heliyon 6(7):e04096. 
                https://doi.org/10.1016/j.heliyon.2020.e04096
                
              "><span data-dcnode-id="2424" instrument_node="">2020</span></a><span data-dcnode-id="2422" instrument_node="">). Nevertheless, these stations are not capable of predicting water quality. Despite this fact, the monitoring provided a baseline for certain types of data-driven models. Indeed, with real-time monitoring of the subsequent variations in water quality, it may be possible to reliably assess the level of contamination water resource. In addition, reliable predictions of water quality are also the best evidence that can help policy makers to make good decisions before disaster strikes (Lu and Ma </span><a aria-label="Reference 2020" data-dcnode-id="2420" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d93028592e435" title="Lu H, Ma X (2020) Hybrid decision tree-based machine learning models for short-term water quality prediction. Chemosphere 249:126169. 
                https://doi.org/10.1016/j.chemosphere.2020.126169
                
              "><span data-dcnode-id="2421" instrument_node="">2020</span></a><span data-dcnode-id="2419" instrument_node="">).</span></p><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">In this research paper, our goal is to suggest a new model for prediction water quality based on machine learning algorithms and with minimal parameters. In addition, the performance of the new model is checked and evaluated according to several evaluation metrics.</span></p><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">The remainder of this paper is organized as follows. “Literature review” presents information about related works. In “Materials and methods”, the proposed model is detailed. Sections “Results” and “Discussions” illustrate the results of the study and the ensuing discussions 4 and 5 , respectively. Finally, the paper is completed in “Conclusion”.</span></p></div></div></section><section data-dcnode-id="2298" data-gtm-vis-first-on-screen-50443292_562="680" data-gtm-vis-first-on-screen-50443292_563="680" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="680" data-gtm-vis-recent-on-screen-50443292_563="680" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Literature review"><div class="c-article-section" data-dcnode-id="2299" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2409" id="Sec2"><span data-dcnode-id="2410" instrument_node="">Literature review</span></h2><div class="c-article-section__content" data-dcnode-id="2300" id="Sec2-content"><p data-dcnode-id="2344"><span data-dcnode-id="2408" instrument_node="">Machine learning is an analytical approach of data expected to make the analysis model more automatic. This method is defined as a discipline of artificial intelligence which is based on the assumption that any system is able to learn from dataset, determine models and thereby make decisions while minimizing manual actions. In the recent decade, machine learning has been applied in various fields including environment (Bekesiene et al. </span><a aria-label="Reference 2021" data-dcnode-id="2406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d93028592e453" title="Bekesiene S, Meidute-Kavaliauskiene I, Vasiliauskiene V (2021) Accurate prediction of concentration changes in ozone as an air pollutant by multiple linear regression and artificial neural networks. Mathematics 9(4):356. 
                https://doi.org/10.3390/math9040356
                
              "><span data-dcnode-id="2407" instrument_node="">2021</span></a><span data-dcnode-id="2405" instrument_node="">; Deng et al. </span><a aria-label="Reference 2021" data-dcnode-id="2403" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d93028592e456" title="Deng T, Chau K-W, Duan H-F (2021) Machine learning based marine water quality prediction for coastal hydro-environment management. J Environ Manag 284:112051. 
                https://doi.org/10.1016/j.jenvman.2021.112051
                
              "><span data-dcnode-id="2404" instrument_node="">2021</span></a><span data-dcnode-id="2402" instrument_node="">; El Bilali and Taleb </span><a aria-label="Reference 2020" data-dcnode-id="2400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d93028592e459" title="El Bilali A, Taleb A (2020) Prediction of irrigation water quality parameters using machine learning models in a semi-arid environment. J Saudi Soc Agric Sci 19(7):439–451. 
                https://doi.org/10.1016/j.jssas.2020.08.001

                https://doi.org/10.1016/j.jece.2020.104599
                
              "><span data-dcnode-id="2353" instrument_node="">2021</span></a><span data-dcnode-id="2351" instrument_node="">; Dezfooli et al. </span><a aria-label="Reference 2018" data-dcnode-id="2349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d93028592e513" title="Dezfooli D, Hosseini-Moghari S-M, Ebrahimi K, Araghinejad S (2018) Classification of water quality status based on minimum quality parameters: application of machine learning techniques. Model Earth Syst Environ. 
                https://doi.org/10.1007/s40808-017-0406-9
                
              "><span data-dcnode-id="2350" instrument_node="">2018</span></a><span data-dcnode-id="2348" instrument_node="">; Guo et al. </span><a aria-label="Reference 2021" data-dcnode-id="2346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d93028592e516" title="Guo Q, Zhuang T, Li Z, He S (2021) Prediction of reservoir saturation field in high water cut stage by bore-ground electromagnetic method based on machine learning. J Petrol Sci Eng 204:108678. 
                https://doi.org/10.1016/j.petrol.2021.108678
                
              "><span data-dcnode-id="2347" instrument_node="">2021</span></a><span data-dcnode-id="2345" instrument_node="">). Accordingly, various models that aimed to forecast water quality are proposed in the literature. Hence, we discuss the following in some examples.</span></p><p data-dcnode-id="2336"><span data-dcnode-id="2343" instrument_node="">Haghiabi et al. (</span><a aria-label="Reference 2018" data-dcnode-id="2341" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d93028592e522" title="Haghiabi AH, Nasrolahi AH, Parsaie A (2018) Water quality prediction using machine learning methods. Water Qual Res J 53(1):3–13. 
                https://doi.org/10.2166/wqrj.2018.025
                
              "><span data-dcnode-id="2342" instrument_node="">2018</span></a><span data-dcnode-id="2340" instrument_node="">) have proposed a model based on artificial neural network (ANN) and support vector machine (SVM) for predicting water quality constituents. The proposed model was tested using the dataset that contains real measurement of Tireh River located in the southwest of Iran. Afterward, in the same country, Dezfooli et al. (</span><a aria-label="Reference 2018" data-dcnode-id="2338" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d93028592e525" title="Dezfooli D, Hosseini-Moghari S-M, Ebrahimi K, Araghinejad S (2018) Classification of water quality status based on minimum quality parameters: application of machine learning techniques. Model Earth Syst Environ. 
                https://doi.org/10.1007/s40808-017-0406-9
                
              "><span data-dcnode-id="2339" instrument_node="">2018</span></a><span data-dcnode-id="2337" instrument_node="">) proposed three models that are probabilistic neural network (PNN), K-nearest neighbor (K-NN) and SVM to classify water quality status. However, this study was applied for Karoon River. After comparing the obtained results, the authors confirm that the PNN is the best model. Subsequently, despite using only four water parameters as input, it has 88.37% accuracy and just 11.63% error rate.</span></p><p data-dcnode-id="2331"><span data-dcnode-id="2335" instrument_node="">Ahmed et al. (</span><a aria-label="Reference 2019" data-dcnode-id="2333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d93028592e531" title="Ahmed U, Mumtaz R, Anwar H et al (2019) Efficient water quality prediction using supervised machine learning. Water 11(11):2210. 
                https://doi.org/10.3390/w11112210
                
              "><span data-dcnode-id="2334" instrument_node="">2019</span></a><span data-dcnode-id="2332" instrument_node="">) employs sequences of supervised machine learning algorithms to predict the water quality index. The proposed methodology is based on four water parameters which are temperature, turbidity, pH and total dissolved solids.</span></p><p data-dcnode-id="2320"><span data-dcnode-id="2330" instrument_node="">El Bilali and Taleb (</span><a aria-label="Reference 2020" data-dcnode-id="2328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d93028592e537" title="El Bilali A, Taleb A (2020) Prediction of irrigation water quality parameters using machine learning models in a semi-arid environment. J Saudi Soc Agric Sci 19(7):439–451. 
                https://doi.org/10.1016/j.jssas.2020.08.001
                
              "><span data-dcnode-id="2329" instrument_node="">2020</span></a><span data-dcnode-id="2327" instrument_node="">) developed eight machine learning models to predict irrigation water quality in semi-arid areas. The developed models use only two water parameters (conductivity and pH) as input. Furthermore, Aldhyani et al. (</span><a aria-label="Reference 2020" data-dcnode-id="2325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d93028592e540" title="Aldhyani THH, Al-Yaari M, Alkahtani H, Maashi M (2020) Water quality prediction using artificial intelligence algorithms. Appl Bionics Biomech. 
                https://doi.org/10.1155/2020/6659314
                
              "><span data-dcnode-id="2326" instrument_node="">2020</span></a><span data-dcnode-id="2324" instrument_node="">) build three machine learning models, mainly, SVM, K-NN, and Naive Bayes to estimate water quality class. The used dataset has seven significant parameters, and the developed models were evaluated based on some statistical parameters. The obtained results demonstrate that the built models are able to predict the water quality index (WQI) efficiently, then classify the water quality. Moreover, Lu and Ma (</span><a aria-label="Reference 2020" data-dcnode-id="2322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d93028592e543" title="Lu H, Ma X (2020) Hybrid decision tree-based machine learning models for short-term water quality prediction. Chemosphere 249:126169. 
                https://doi.org/10.1016/j.chemosphere.2020.126169
                
              "><span data-dcnode-id="2323" instrument_node="">2020</span></a><span data-dcnode-id="2321" instrument_node="">) proposed two hybrid decision-based machine learning models to predict water quality in the short term. The basic models of the two hybrid models are the extreme gradient boosting and random forest.</span></p><p data-dcnode-id="2303"><span data-dcnode-id="2319" instrument_node="">Imani et al. (</span><a aria-label="Reference 2021" data-dcnode-id="2317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d93028592e550" title="Imani M, Hasan MM, Bittencourt LF, McClymont K, Kapelan Z (2021) A novel machine learning application: water quality resilience prediction Model. Sci Total Environ 768:144459. 
                https://doi.org/10.1016/j.scitotenv.2020.144459
                
              "><span data-dcnode-id="2318" instrument_node="">2021</span></a><span data-dcnode-id="2316" instrument_node="">) took the advantages of ANN to design a new application that aimed to predict water quality resilience for simplifying the suppleness assessment. Moreover, the fuzzy analytic hierarchy process technique is applied for ranking water sinks according to resilience degree and for detecting which ones need early renovation plans. Asadollah et al. (</span><a aria-label="Reference 2021" data-dcnode-id="2314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d93028592e553" title="Asadollah SBHS, Sharafati A, Motta D, Yaseen ZM (2021) River water quality index prediction and uncertainty analysis: a comparative study of machine learning models. J Environ Chem Eng 9(1):104599. 
                https://doi.org/10.1016/j.jece.2020.104599
                
              "><span data-dcnode-id="2315" instrument_node="">2021</span></a><span data-dcnode-id="2313" instrument_node="">) introduced an original machine learning model named extra tree regression (ETR) intended for forecasting WQI values of Lam Tsuen River located in Hong Kong. The performance of the proposed model is compared with that of the existing ones, namely, support vector regression and decision tree regression. In this model, various monthly water parameters are used as input, including biochemical oxygen demand (BOD), chemical oxygen demand (COD), dissolved oxygen (DO), conductivity, nitrate (NO</span><sub data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">3</span></sub><span data-dcnode-id="2310" instrument_node=""> and NO</span><sub data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">2</span></sub><span data-dcnode-id="2307" instrument_node="">), pH, water temperature and turbidity. In the same year, Singha et al. (</span><a aria-label="Reference 2021" data-dcnode-id="2305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d93028592e560" title="Singha S, Pasupuleti S, Singha SS, Singh R, Kumar S (2021) Prediction of groundwater quality using efficient machine learning technique. Chemosphere 276:130265. 
                https://doi.org/10.1016/j.chemosphere.2021.130265
                
              "><span data-dcnode-id="2306" instrument_node="">2021</span></a><span data-dcnode-id="2304" instrument_node="">), based on deep learning (DL), proposed a different model that can predict the groundwater quality. For evaluating their model, the authors compared their proposition with three machine learning models, explicitly, random forest, XGBoost and ANN.</span></p><p data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">According to the literature review, recent works have been based on machine learning to predict water quality. However, the used parameters as input are not note stable. Therefore, in this paper we proposed a specific model based on decision tree and ANN. Furthermore, we have reduced the parameter’s number.</span></p></div></div></section><section data-dcnode-id="1978" data-gtm-vis-first-on-screen-50443292_562="680" data-gtm-vis-first-on-screen-50443292_563="681" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="680" data-gtm-vis-recent-on-screen-50443292_563="681" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Materials and methods"><div class="c-article-section" data-dcnode-id="1979" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2296" id="Sec3"><span data-dcnode-id="2297" instrument_node="">Materials and methods</span></h2><div class="c-article-section__content" data-dcnode-id="1980" id="Sec3-content"><p data-dcnode-id="2291"><span data-dcnode-id="2295" instrument_node="">In this study, we have designed a new framework for environmental conservation to predict water quality. The objective is to use machine learning algorithms for water quality analysis. The case study methodology will focus on how to explore historical water measurements for predicting the actual and future variation in water quality. In case bad quality was detected, the system becomes responsible for taking the necessary intervention for protecting the environment. As shown in Fig. </span><a data-dcnode-id="2293" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2294" instrument_node="">1</span></a><span data-dcnode-id="2292" instrument_node="">, the proposed framework is made up of four main phases, including data acquisition, data preprocessing, model building and model evaluation.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2267" data-gtm-vis-first-on-screen-50443292_561="680" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="680" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2268"><figcaption data-dcnode-id="2288"><b class="c-article-section__figure-caption" data-dcnode-id="2289" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2290" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2279"><div class="c-article-section__figure-item" data-dcnode-id="2283"><a class="c-article-section__figure-link" data-dcnode-id="2284" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/figures/1" rel="nofollow"><picture data-dcnode-id="2285"><source data-dcnode-id="2287" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs40808-021-01266-6/MediaObjects/40808_2021_1266_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2286" height="255" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=htt </span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2265" id="Sec4"><span data-dcnode-id="2266" instrument_node="">Description of dataset</span></h3><p data-dcnode-id="2254"><span data-dcnode-id="2264" instrument_node="">The datasets employed in this research study contains various water level measurements collected by the California Department of Water Resource under project named "Lake Almanor 2014–2016". The dataset can be downloaded freely from the web site of the department “</span><a data-dcnode-id="2262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//water.ca.gov/Water-Basics/The-California-Water-System"><span data-dcnode-id="2263" instrument_node="">https://water.ca.gov/Water-Basics/The-California-Water-System</span></a><span data-dcnode-id="2261" instrument_node="">” (The California Water System </span><a aria-label="Reference 2021" data-dcnode-id="2259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d93028592e608" title="The California Water System (2021) 
                https://water.ca.gov/Water-Basics/The-California-Water-System
                
              . Accessed 3 June 2021"><span data-dcnode-id="2260" instrument_node="">2021</span></a><span data-dcnode-id="2258" instrument_node="">). The platform holds more than 9800 historical, chemical and physical water parameters during the period between 2014 and 2016. The water parameters that are available in the dataset are listed in Table </span><a data-dcnode-id="2256" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2257" instrument_node="">1</span></a><span data-dcnode-id="2255" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2239" data-test="inline-table" id="table-1"><figure data-dcnode-id="2240"><figcaption class="c-article-table__figcaption" data-dcnode-id="2251"><b data-dcnode-id="2252" data-test="table-caption" id="Tab1"><span data-dcnode-id="2253" instrument_node="">Table 1 The WHO acceptable limits of drinking water parameters</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2241"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2242" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/tables/1" rel="nofollow"><span data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2243" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2244" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2245" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2248" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2247" fill-rule="evenodd"></path><span data-dcnode-id="2246" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2237" id="Sec5"><span data-dcnode-id="2238" instrument_node="">Data preprocessing</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2235" id="Sec6"><span data-dcnode-id="2236" instrument_node="">Features selection</span></h4><p data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">In the process of designing a machine learning model applicable to a real-life dataset, we can notice that there are a lot of details in the dataset and some of them may not be meaningful. Indeed, taking unrequired parameters when training the model leads to a degradation of the overall accuracy, to increase the complexity, and to reduce the generalization ability of the model. The decision to select features is therefore one of the essential steps in the design of a machine learning model. Its goal is to find the best possible set of features to build a machine learning model according to the type of problem concerned. This process will remove noise in dataset and reduce the size of the input data. In our study, we have adopted the filter method to select the important features that are total dissolved solids, temperature, pH, turbidity, total phosphates, nitrates, biochemical oxygen demand, coliforms and dissolved oxygen.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2231" id="Sec7"><span data-dcnode-id="2232" instrument_node="">Computing of water quality index</span></h4><p data-dcnode-id="2208"><span data-dcnode-id="2230" instrument_node="">Water quality index (WQI) is a simple numerical result (0–100) that can be effortlessly computed and then utilized for a general classification of the water situation (Harkins </span><a aria-label="Reference 1974" data-dcnode-id="2228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d93028592e897" title="Harkins RD (1974) An objective water quality index. J (water Pollution Control Federation) 46(3):588–591"><span data-dcnode-id="2229" instrument_node="">1974</span></a><span data-dcnode-id="2227" instrument_node="">). It represents a basic and effective procedure for determining water quality by considering only one inclusive value and conforming weighbridge (Naga et al. </span><a aria-label="Reference 2018" data-dcnode-id="2225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d93028592e900" title="Naga C, Talnan Jean Honoré C, Delfin OA, Bernard YO, Guillaume ZS, Henoc Sosthène A, Mpakama Z, Issiaka S (2018) Spatio-temporal analysis and water quality indices (WQI): case of the Ébrié Lagoon, Abidjan. Côte D’ivoire Hydrology 5(3):32. 
                https://doi.org/10.3390/hydrology5030032
                
              "><span data-dcnode-id="2226" instrument_node="">2018</span></a><span data-dcnode-id="2224" instrument_node="">; Tunc Dede et al. </span><a aria-label="Reference 2013" data-dcnode-id="2222" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d93028592e903" title="Tunc Dede O, Telci IT, Aral MM (2013) The use of water quality index models for the evaluation of surface water quality: a case study for Kirmir Basin, Ankara, Turkey. Water Qual Expo Health 5(1):41–56. 
                https://doi.org/10.1007/s12403-013-0085-3
                
              "><span data-dcnode-id="2223" instrument_node="">2013</span></a><span data-dcnode-id="2221" instrument_node="">). The WQI combines a large number of water quality factors and translates water quality in a clear and simple way. For computing WQI, various methods are proposed in the literature. However, the main ones are National Sanitation Foundation Water Quality Index (NFS_WQI) (Ewaid </span><a aria-label="Reference 2017" data-dcnode-id="2219" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d93028592e906" title="Ewaid SH (2017) Water quality evaluation of Al-Gharraf river by two water quality indices. Appl Water Sci 7(7):3759–3765"><span data-dcnode-id="2220" instrument_node="">2017</span></a><span data-dcnode-id="2218" instrument_node="">), Environment Department of Oregon-WQI, Canadian Water Quality Index (CWQI) (Lumb et al. </span><a aria-label="Reference 2011" data-dcnode-id="2216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d93028592e909" title="Lumb A, Sharma TC, Bibeault J-F, Klawunn P (2011) A comparative study of USA and Canadian water quality index models. Water Qual Expo Health 3(3–4):203–216"><span data-dcnode-id="2217" instrument_node="">2011</span></a><span data-dcnode-id="2215" instrument_node="">) and Weighted Arithmetic Water Quality Index (WAWQI) (Zotou et al. </span><a aria-label="Reference 2020" data-dcnode-id="2213" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d93028592e913" title="Zotou I, Tsihrintzis VA, Gikas GD (2020) Water quality evaluation of a lacustrine water body in the Mediterranean based on different water quality index (WQI) methodologies. J Environ Sci Health Part A 55(5):537–548"><span data-dcnode-id="2214" instrument_node="">2020</span></a><span data-dcnode-id="2212" instrument_node="">). As illustrated in Table </span><a data-dcnode-id="2210" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2211" instrument_node="">2</span></a><span data-dcnode-id="2209" instrument_node=""> and according to the computed WQI, each parameter was qualitatively confidential in one class: “very good quality”, “good quality”, “medium quality”, “bad quality” and “very bad quality”.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2193" data-test="inline-table" id="table-2"><figure data-dcnode-id="2194"><figcaption class="c-article-table__figcaption" data-dcnode-id="2205"><b data-dcnode-id="2206" data-test="table-caption" id="Tab2"><span data-dcnode-id="2207" instrument_node="">Table 2 Water quality index and the corresponding classes</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2195"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2196" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/tables/2" rel="nofollow"><span data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2197" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2198" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2199" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2202" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2201" fill-rule="evenodd"></path><span data-dcnode-id="2200" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2185"><span data-dcnode-id="2192" instrument_node="">In the present research, we have adopted the NFSWQI index method for computing WQI. This method is based on nine parameters that impact the water quality including total dissolved solids, temperature, pH, turbidity, total phosphates, nitrates, biochemical oxygen demand, coliforms and dissolved oxygen. Since every one of those items has a distinct impact on water quality, a specific weighting value, as depicted in Table </span><a data-dcnode-id="2190" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2191" instrument_node="">3</span></a><span data-dcnode-id="2189" instrument_node="">, has been assigned to each of them for the purpose of computation the NSF_WQI Index. This last one is calculated based on the formula (</span><a data-dcnode-id="2187" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="2188" instrument_node="">1</span></a><span data-dcnode-id="2186" instrument_node="">)</span></p><div class="c-article-equation" data-dcnode-id="2176" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="2179"><span class="mathjax-tex" data-dcnode-id="2180"><span class="MathJax_Preview" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">{\text{NSF}}\_{\text{WQI}} = \mathop \sum \limits_{i = 1}^{n} W_{i} \times Q_{i} ,</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="2156"><span data-dcnode-id="2175" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2170"><span class="MathJax_Preview" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">W_{i}</span></span></span><span data-dcnode-id="2169" instrument_node=""> refers to the weighting value for every parameter (Table </span><a data-dcnode-id="2167" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2168" instrument_node="">3</span></a><span data-dcnode-id="2166" instrument_node="">); </span><span class="mathjax-tex" data-dcnode-id="2161"><span class="MathJax_Preview" data-dcnode-id="2164"><span data-dcnode-id="2165" instrument_node="">Q_{i}</span></span></span><span data-dcnode-id="2160" instrument_node=""> is determined by converting the real value of the parameter based on the conversion curve (Fig.&nbsp;</span><a data-dcnode-id="2158" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2159" instrument_node="">2</span></a><span data-dcnode-id="2157" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2141" data-test="inline-table" id="table-3"><figure data-dcnode-id="2142"><figcaption class="c-article-table__figcaption" data-dcnode-id="2153"><b data-dcnode-id="2154" data-test="table-caption" id="Tab3"><span data-dcnode-id="2155" instrument_node="">Table 3 Weight of each parameter</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2143"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="2144" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/tables/3" rel="nofollow"><span data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2145" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2146" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2147" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2150" instrument_node="">

rature, </span><b data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">c</span></b><span data-dcnode-id="2123" instrument_node=""> turbidity, </span><b data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">d</span></b><span data-dcnode-id="2120" instrument_node=""> coliforms</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2107"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2108" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/figures/2" rel="nofollow"><span data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2109" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2110" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2111" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2114" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2113" fill-rule="evenodd"></path><span data-dcnode-id="2112" instrument_node="">
</span></a></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2103" id="Sec8"><span data-dcnode-id="2104" instrument_node="">Q-value normalization</span></h4><p data-dcnode-id="2098"><span data-dcnode-id="2102" instrument_node="">Normalization is the process of ensuring compatibility of data between different indices. So, different information gathered can be associated appropriately. In general, normalization of values refers to the adjustment of values measured on various scales to a single nominal scale. For more advanced cases. However, normalization can refer to more sophisticated adjustments where one seeks to fully harmonize the probability distributions of the different modified values. In the literature, several methods have been proposed. Nevertheless, there is a particular approach to the normalization of probability distributions which is </span><i data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Q</span></i><span data-dcnode-id="2099" instrument_node=""> value normalization. Accordingly, it is a technique that aims at making two types of distributions to have statistically similar properties. In our study, we have applied this method for converting all water parameters to a comment scale that take values between 0 and 100. Consequently, we transformed each parameter according to a specific curve. For example, if water temperature is 0, the Qi of temperature parameter is 92.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2096" id="Sec9"><span data-dcnode-id="2097" instrument_node="">Prediction and classification models</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2094" id="Sec10"><span data-dcnode-id="2095" instrument_node="">Multiple linear regression</span></h4><p data-dcnode-id="2083"><span data-dcnode-id="2093" instrument_node="">Multiple linear regression (MLR) represents one of the best regression algorithms for simulating the correlation between a continuous dependent variable and several other independent ones. In addition, MLR is an extension of simple linear regression, as it uses a number of different predictors to predict the value of the response. Hence, in MLR, the target value (</span><i data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Y</span></i><span data-dcnode-id="2090" instrument_node="">) is a linear combination of many predictors </span><span class="mathjax-tex" data-dcnode-id="2085"><span class="MathJax_Preview" data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">x_{1} , x_{2} , x_{3} , ..., x_{n}</span></span></span><span data-dcnode-id="2084" instrument_node="">. The formula for multiple linear regression is defined as follows:</span></p><div class="c-article-equation" data-dcnode-id="2074" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="2077"><span class="mathjax-tex" data-dcnode-id="2078"><span class="MathJax_Preview" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Y = \beta_{0} + \beta_{1} X_{1} + \cdots + \beta_{n} X_{n} + \varepsilon ,</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">
                    (2)
                </span></div></div><p data-dcnode-id="2045"><span data-dcnode-id="2073" instrument_node="">where </span><i data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Y</span></i><span data-dcnode-id="2070" instrument_node=""> signifies the independent variable (output); </span><span class="mathjax-tex" data-dcnode-id="2065"><span class="MathJax_Preview" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">X_{i}</span></span></span><span data-dcnode-id="2064" instrument_node=""> denotes the dependent variable (input); </span><span class="mathjax-tex" data-dcnode-id="2059"><span class="MathJax_Preview" data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">\beta</span></span></span><span data-dcnode-id="2058" instrument_node=""> is the intercept of the relationship; </span><span class="mathjax-tex" data-dcnode-id="2053"><span class="MathJax_Preview" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">\beta_{i}</span></span></span><span data-dcnode-id="2052" instrument_node=""> is the coefficient that regulates the used weight; </span><span class="mathjax-tex" data-dcnode-id="2047"><span class="MathJax_Preview" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">\varepsilon</span></span></span><span data-dcnode-id="2046" instrument_node=""> is the error related to the observation.</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2044" instrument_node="">In our study, WQI predicting can be implemented by using MLR models. Therefore, this model describes linear correlation between some water quality parameters. Furthermore, the input variables for our adopted MLR models are reflected in Eq. (</span><a data-dcnode-id="2042" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ3"><span data-dcnode-id="2043" instrument_node="">3</span></a><span data-dcnode-id="2041" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="2031" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="2034"><span class="mathjax-tex" data-dcnode-id="2035"><span class="MathJax_Preview" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">{\text{WQI}} = \beta_{1} T + \beta_{2} {\text{PH}} + \beta_{3} {\text{Tu}} + \beta_{4} C + \varepsilon ,</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="2020"><span data-dcnode-id="2030" instrument_node="">where </span><i data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">T</span></i><span data-dcnode-id="2027" instrument_node=""> is the temperature, </span><i data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">PH</span></i><span data-dcnode-id="2024" instrument_node=""> is the pH, Tu is the turbidity, </span><i data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">C</span></i><span data-dcnode-id="2021" instrument_node=""> is the conductivity.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="2018" id="Sec11"><span data-dcnode-id="2019" instrument_node="">Artificial neural network</span></h4><p data-dcnode-id="2010"><span data-dcnode-id="2017" instrument_node="">An artificial neural network is envisioned as a humongous, decentralized, parallel data processing system that possesses distinctive operational properties that are analogous to those of the biological neurological system in the human brain (Momenzadeh et al. </span><a aria-label="Reference 2011" data-dcnode-id="2015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d93028592e1676" title="Momenzadeh L, Zomorodian A, Mowla D (2011) Experimental and theoretical investigation of shelled corn drying in a microwave-assisted fluidized bed dryer using artificial neural network. Food Bioprod Process 89(1):15–21. 
                https://doi.org/10.1016/j.fbp.2010.03.007
                
              "><span data-dcnode-id="2016" instrument_node="">2011</span></a><span data-dcnode-id="2014" instrument_node="">). It is positioned to take the position of the so-called analytical methods by giving such advantages as non-requirement of knowledge about the internal system parameters and succinct solutions to the issues having different variables (Nabavi-Pelesaraei et al. </span><a aria-label="Reference 2021" data-dcnode-id="2012" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d93028592e1679" title="Nabavi-Pelesaraei A, Rafiee S, Hosseini-Fashami F, Chau K (2021) Artificial neural networks and adaptive neuro-fuzzy inference system in energy modeling of agricultural products. In: Predictive modelling for energy management and power systems engineering. Elsevier, pp 299–334. 
                https://doi.org/10.1016/B978-0-12-817772-3.00011-2
                
              "><span data-dcnode-id="2013" instrument_node="">2021</span></a><span data-dcnode-id="2011" instrument_node="">).</span></p><p data-dcnode-id="2005"><span data-dcnode-id="2009" instrument_node="">As illustrated in Fig. </span><a data-dcnode-id="2007" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2008" instrument_node="">3</span></a><span data-dcnode-id="2006" instrument_node="">, the architecture of the proposed model constitutes on input layer, output layer and hidden layers. Thus, in the input layer, we have four neurons for inputting the values of temperature, pH, turbidity and coliforms. The number of hidden layers and values of neurons in each hidden layer are the parameters to be chosen in the model. Therefore, the total of hidden layers and the size of the neurons for each layer are the two factors to be considered for model development. Accordingly, to optimize the behavior of the proposed model-based ANN, we can add one or two hidden layers and select various values for the neurons. Finally, the output layer consists of the target of the model. At this point, hyperbolic tangent sigmoid transfer function is utilized as the transfer function.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1981" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="1982"><figcaption data-dcnode-id="2002"><b class="c-article-section__figure-caption" data-dcnode-id="2003" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="2004" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1993"><div class="c-article-section__figure-item" data-dcnode-id="1997"><a class="c-article-section__figure-link" data-dcnode-id="1998" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/figures/3" rel="nofollow"><picture data-dcnode-id="1999"><source data-dcnode-id="2001" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs40808-021-01266-6/MediaObjects/40808_2021_1266_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="2000" height="294" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s40808-021-01266-6/MediaObjects/40808_2021_1266_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1994" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">The architecture of the proposed ANN model</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1983"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1984" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/figures/3" rel="nofollow"><span data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1985" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1986" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1987" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1990" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1989" fill-rule="evenodd"></path><span data-dcnode-id="1988" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="1815" data-title="Evaluation metrics"><div class="c-article-section" data-dcnode-id="1816" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1976" id="Sec12"><span data-dcnode-id="1977" instrument_node="">Evaluation metrics</span></h2><div class="c-article-section__content" data-dcnode-id="1817" id="Sec12-content"><p data-dcnode-id="1951"><span data-dcnode-id="1975" instrument_node="">To evaluate the effectiveness of predictive models, a variety of metrics can be employed, such as: mean absolute percentage error (MAPE), symmetric mean absolute percentage error (SMAPE), mean absolute error (MAE), Nash–Sutcliffe model efficiency coefficient (NSE), correlation ratio (CR), Chi-squared test (</span><span class="mathjax-tex" data-dcnode-id="1970"><span class="MathJax_Preview" data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">{x}^{2}</span></span></span><span data-dcnode-id="1969" instrument_node="">), </span><i data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">R </span></i><span data-dcnode-id="1966" instrument_node="">square error (</span><i data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">R</span></i><sup data-dcnode-id="1961"><i data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">2</span></i></sup><span data-dcnode-id="1960" instrument_node="">) and so on. Due to the similar formulation structure of some of these indices, we have chosen mean square error (MSE), root mean square error (RMSE) and </span><i data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">R</span></i><span data-dcnode-id="1957" instrument_node=""> square error (RSE/</span><i data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">R</span></i><sup data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">2</span></sup><span data-dcnode-id="1952" instrument_node="">) to evaluate the performance of prediction in our proposed models. These indices are detailed in the following.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1949" id="Sec13"><span data-dcnode-id="1950" instrument_node="">Mean square error</span></h3><p data-dcnode-id="1944"><span data-dcnode-id="1948" instrument_node="">Mean squared error lets us to know the average of the squares of the errors. It can be defined as the sum of squared difference between the predicted and actual values divided by the number of values. We can compute MSE according to the formula (</span><a data-dcnode-id="1946" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ4"><span data-dcnode-id="1947" instrument_node="">4</span></a><span data-dcnode-id="1945" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1935" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="1938"><span class="mathjax-tex" data-dcnode-id="1939"><span class="MathJax_Preview" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">{\text{MSE}} = \frac{{\mathop \sum \nolimits_{i = 1}^{n} \left( {y_{i} - \hat{y}} \right)^{2} }}{n}.</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">
                    (4)
                </span></div></div><h3 class="c-article__sub-heading" data-dcnode-id="1933" id="Sec14"><span data-dcnode-id="1934" instrument_node="">Root mean square error (RMSE)</span></h3><p data-dcnode-id="1928"><span data-dcnode-id="1932" instrument_node="">The root mean square error is the square root of mean squared error. It is employed for measuring the variances between predicted values by the designed model and the observed values. Hence, it evaluates the quality of the correspondence between the real data and the data estimated by the model. For calculation of RMSE, one can use the Eq. (</span><a data-dcnode-id="1930" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ5"><span data-dcnode-id="1931" instrument_node="">5</span></a><span data-dcnode-id="1929" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1919" id="Equ5"><div class="c-article-equation__content" data-dcnode-id="1922"><span class="mathjax-tex" data-dcnode-id="1923"><span class="MathJax_Preview" data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">{\text{RMSE}} = \sqrt {\frac{{\mathop \sum \nolimits_{i = 1}^{n} \left( {y_{i} - \hat{y}} \right)^{2} }}{n}} .</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">
                    (5)
                </span></div></div><h3 class="c-article__sub-heading" data-dcnode-id="1911" id="Sec15"><span data-dcnode-id="1918" instrument_node="">R square error (</span><i data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">R</span></i><span data-dcnode-id="1915" instrument_node="">
</span><sup data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">2</span></sup><span data-dcnode-id="1912" instrument_node="">)</span></h3><p data-dcnode-id="1896"><span data-dcnode-id="1910" instrument_node="">R square error is called sometimes the coefficient of determination and denoted by </span><i data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">R</span></i><sup data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">2</span></sup><span data-dcnode-id="1905" instrument_node="">. In fact, it is the percentage of the variance in the dependent variables that is predictable by using the independent ones. For calculating </span><i data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">R</span></i><sup data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">2</span></sup><span data-dcnode-id="1900" instrument_node="">, we can use the formula (</span><a data-dcnode-id="1898" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ6"><span data-dcnode-id="1899" instrument_node="">6</span></a><span data-dcnode-id="1897" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1887" id="Equ6"><div class="c-article-equation__content" data-dcnode-id="1890"><span class="mathjax-tex" data-dcnode-id="1891"><span class="MathJax_Preview" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">R^{2} = 1 - \frac{{\sum \left( {y_{i} - \hat{y}} \right)^{2} }}{{\sum \left( {y_{i} - \overline{y}} \right)^{2} }}.</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">
                    (6)
                </span></div></div><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">On the other hand, we have calculated four main attributes for evaluation of the model that is responsible for classifying water quality. The computed elements are as follows.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1883" id="Sec16"><span data-dcnode-id="1884" instrument_node="">Sensitivity</span></h3><p data-dcnode-id="1878"><span data-dcnode-id="1882" instrument_node="">It refers to a particular positive class that is actually classified correctly. It can be calculated as depicted in Eq. (</span><a data-dcnode-id="1880" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ7"><span data-dcnode-id="1881" instrument_node="">7</span></a><span data-dcnode-id="1879" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1869" id="Equ7"><div class="c-article-equation__content" data-dcnode-id="1872"><span class="mathjax-tex" data-dcnode-id="1873"><span class="MathJax_Preview" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">{\text{Sensitivity}} = \frac{{\text{True positive}}}{{\left( {{\text{True positive}} + {\text{False negative}}} \right)}}.</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">
                    (7)
                </span></div></div><h3 class="c-article__sub-heading" data-dcnode-id="1867" id="Sec17"><span data-dcnode-id="1868" instrument_node="">Precision</span></h3><p data-dcnode-id="1862"><span data-dcnode-id="1866" instrument_node="">It is the portion of true categorized instances of a positive particular positive class among the total classified instances of this class. We can compute its value using Eq. (</span><a data-dcnode-id="1864" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ8"><span data-dcnode-id="1865" instrument_node="">8</span></a><span data-dcnode-id="1863" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1853" id="Equ8"><div class="c-article-equation__content" data-dcnode-id="1856"><span class="mathjax-tex" data-dcnode-id="1857"><span class="MathJax_Preview" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">{\text{Precision}} = \frac{{\text{True positive}}}{{\left( {{\text{True positive}} + {\text{False positive}}} \right)}}.</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">
                    (8)
                </span></div></div><h3 class="c-article__sub-heading" data-dcnode-id="1848" id="Sec18"><span data-dcnode-id="1852" instrument_node="">
</span><i data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">F</span></i><span data-dcnode-id="1849" instrument_node=""> score</span></h3><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">It denotes the harmonic mean of the two previous values, sensitivity and the precision. It is computed using Eq. (</span><a data-dcnode-id="1845" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ9"><span data-dcnode-id="1846" instrument_node="">9</span></a><span data-dcnode-id="1844" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1834" id="Equ9"><div class="c-article-equation__content" data-dcnode-id="1837"><span class="mathjax-tex" data-dcnode-id="1838"><span class="MathJax_Preview" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">{\text{F - score}} = 2 \times \frac{{\left( {{\text{ Sensitivity}} \times {\text{precision}}} \right)}}{{\left( {{\text{Sensitivity}} + {\text{precision}}} \right)}}.</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">
                    (9)
                </span></div></div><h3 class="c-article__sub-heading" data-dcnode-id="1832" id="Sec19"><span data-dcnode-id="1833" instrument_node="">Accuracy</span></h3><p data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">It is the total truthful number of predictions completed by the model among all existing values. It is computed by using the following Eq. (</span><a data-dcnode-id="1829" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ10"><span data-dcnode-id="1830" instrument_node="">10</span></a><span data-dcnode-id="1828" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1818" id="Equ10"><div class="c-article-equation__content" data-dcnode-id="1821"><span class="mathjax-tex" data-dcnode-id="1822"><span class="MathJax_Preview" data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">{\text{Accuracy}} = \frac{{\left( {{\text{True positive}} + {\text{True negative }}} \right)}}{{\left( {{\text{True positive}} + {\text{False positive}} + {\text{True negative}} + {\text{False negative}}} \right)}}.</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">
                    (10)
                </span></div></div></div></div></section><section data-dcnode-id="1711" data-title="Results"><div class="c-article-section" data-dcnode-id="1712" id="Sec20-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1813" id="Sec20"><span data-dcnode-id="1814" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="1713" id="Sec20-content"><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">The highlighting of the outcomes of applying the MLR model to predict the water quality index certifies that this approach is relevant, despite the fact that we used only four water parameters. In accordance with what is reported in various studies, we used just 75% of the dataset for training the proposed model, while 25% was used for its validation.</span></p><p data-dcnode-id="1785"><span data-dcnode-id="1810" instrument_node="">In conjunction with the process of identifying </span><i data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">R</span></i><sup data-dcnode-id="1805"><i data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">2</span></i></sup><span data-dcnode-id="1804" instrument_node=""> values, to further validate the robustness of the MLR models, we also computed two other statistical errors: the MSE and RMSE. Table </span><a data-dcnode-id="1802" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="1803" instrument_node="">4</span></a><span data-dcnode-id="1801" instrument_node=""> outlines the obtained statistical errors for the three tested algorithms. As noticed clearly, the multiple linear regression model has 13.43, 18.27 and 15.24 in MSE, RMSE and </span><i data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">R</span></i><sup data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">2</span></sup><span data-dcnode-id="1796" instrument_node="">, respectively. On the other hand, gradient boosting has 3.66 in MSE, 4.28 in RMSE and 3.90 in </span><i data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">R</span></i><sup data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">2</span></sup><span data-dcnode-id="1791" instrument_node="">. Finally, with the Lasso regression, the MSE has 5.25, the RMSE has 4.52 and </span><i data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">R</span></i><sup data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">2</span></sup><span data-dcnode-id="1786" instrument_node=""> has 6.52. Therefore, we can say that multiple linear regression is an effective model to classify water quality.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1770" data-test="inline-table" id="table-4"><figure data-dcnode-id="1771"><figcaption class="c-article-table__figcaption" data-dcnode-id="1782"><b data-dcnode-id="1783" data-test="table-caption" id="Tab4"><span data-dcnode-id="1784" instrument_node="">Table 4 Prediction results of the three used models</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1772"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="1773" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/tables/4" rel="nofollow"><span data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1774" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1775" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1776" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg
