ta-container-section="table" data-dcnode-id="1738" data-test="inline-table" id="table-5"><figure data-dcnode-id="1739"><figcaption class="c-article-table__figcaption" data-dcnode-id="1750"><b data-dcnode-id="1751" data-test="table-caption" id="Tab5"><span data-dcnode-id="1752" instrument_node="">Table 5 Comparison between performances of three classification models</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1740"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="1741" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/tables/5" rel="nofollow"><span data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1742" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1743" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1744" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1747" instrument_node="">

</span></a></div></figure></div></div></div></section><section data-dcnode-id="1641" data-title="Discussion"><div class="c-article-section" data-dcnode-id="1642" id="Sec21-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1709" id="Sec21"><span data-dcnode-id="1710" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="1643" id="Sec21-content"><p data-dcnode-id="1692"><span data-dcnode-id="1708" instrument_node="">To ensure that the drinking water is suitable and not harmful to human health, it is absolutely indispensable to check its quality. Accordingly, there have been numerous efforts over several years aimed at implementing robust and effective methods for controlling water resources. However, these traditional techniques were based on laboratory equipment, which requires considerable time and efforts. Hence, in this research study, we investigated an unconventional method for estimating water quality based on machine learning solutions. In contrast to some proposed works where more than ten water quality parameters are used to forecast WQI, our approach is based on four water quality parameters. As shown in Fig. </span><a data-dcnode-id="1706" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="1707" instrument_node="">4</span></a><span data-dcnode-id="1705" instrument_node=""> and Table </span><a data-dcnode-id="1703" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="1704" instrument_node="">4</span></a><span data-dcnode-id="1702" instrument_node="">, multiple linear regression is the best algorithm for the prediction water quality index with an MSE of 13.42. Furthermore, according to Table </span><a data-dcnode-id="1700" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="1701" instrument_node="">5</span></a><span data-dcnode-id="1699" instrument_node=""> and Fig. </span><a data-dcnode-id="1697" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="1698" instrument_node="">5</span></a><span data-dcnode-id="1696" instrument_node="">, the ANN is a suitable algorithm for guessing the class of water quality with an accuracy that surpasses 85% (Fig. </span><a data-dcnode-id="1694" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="1695" instrument_node="">6</span></a><span data-dcnode-id="1693" instrument_node="">). Our study confirms that we can predict both water quality index and class using only four water parameters. As a result, we can deduce that machine learning plays a vital role in the water quality management domain. Furthermore, the usage of machine learning helps water managers to reduce the charge for investigating to detect and monitor water quality.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1668" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="1669"><figcaption data-dcnode-id="1689"><b class="c-article-section__figure-caption" data-dcnode-id="1690" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="1691" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1680"><div class="c-article-section__figure-item" data-dcnode-id="1684"><a class="c-article-section__figure-link" data-dcnode-id="1685" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/figures/5" rel="nofollow"><picture data-dcnode-id="1686"><source data-dcnode-id="1688" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs40808-021-01266-6/MediaObjects/40808_2021_1266_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="1687" height="409" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s40808-021-01266-6/MediaObjects/40808_2021_1266_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1681" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Performance comparison</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1670"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="1671" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40808-021-01266-6/figures/5" rel="nofollow"><span data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1672" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1673" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1674" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1677" instrument_node="">

</span></a></div></figure></div></div></div></section><section data-dcnode-id="1632" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1633" id="Sec22-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1639" id="Sec22"><span data-dcnode-id="1640" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1634" id="Sec22-content"><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Actually, no one can ignore the importance of water for human beings’ life. So, in this research paper, based on machine learning algorithms we have proposed a fresh model that aims to predict and forecast water quality index and then to determine water quality class. The suggested model uses four water quality parameters as input, namely temperature, pH, turbidity and coliforms. In this work, we have designed a model based on the three different machine learning algorithms for predicting WQI and three others for classifying water quality. The obtained results confirm that the multiple linear regression algorithm archives the best results for predicting WQI. Hence, it is the best one if it is compared with gradient boosting or Lasso regression. Besides, the application of ANN to classify water quality archives precision with 89.01% and accuracy with 85.11%. Consequently, it is more appropriate than SVM or decision tree.</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">In our future works, we will implement the proposed model in the new application that monitor and control water quality. The implementation will help to predict water quality index and water quality class in real time. In addition, it will help the water manager to issue an early warning.</span></p></div></div></section><span data-dcnode-id="1631" instrument_node="">
