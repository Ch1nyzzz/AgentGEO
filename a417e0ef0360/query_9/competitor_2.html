</span><h1 data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Benefits of Drinking Pure AWG Water</span></h1><span data-dcnode-id="303" instrument_node="">
</span></div><span data-dcnode-id="301" instrument_node="">
</span><div class="font_justify_108" data-dcnode-id="250"><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="299" instrument_node="">Drinking water is essential for all body functions and 
					life itself. Considering that our bodies are approximately 
					80% liquid and our brains are 90% water, understanding 
					water's important role in the body can be a fountain of 
					health. Water is the essential element in life needed to 
					maintain good health and well-being. Water is needed to 
					digest food and eliminate toxins and waste from our bodies. 
					Water also protects our cell tissue, regulating body 
					temperature 
					</span><img alt="Water Use" data-dcnode-id="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.drinkable-air.com/images/web/info_waterfortheworld2.jpg&amp;raw" style="padding: 10px 0px 10px 30px; float: right; margin-right: -70px;" width="300"><span data-dcnode-id="297" instrument_node="">and 
					transporting oxygen and nutrients throughout the body. Water 
					allows our bodies to heal and helps prevent disease and 
					obesity. Water is the most important nutrient in our bodies. 
					Of course, the quality of the water we drink directly 
					impacts our body's life-supporting functions. Researchers 
					all agree that pure water is the essential, ultimate drink 
					for life and health.</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">The world's water is constantly moving in what is called 
					the water cycle or hydraulic cycle. This means that water 
					continually changes between the oceans, the atmosphere, 
					rivers and lakes and below the ground: however the volume of 
					water remains constant. In other words there is never going 
					to be additional water made available to our planet. The 
					problem we are facing is the negative impact humans have had 
					on the available drinkable water.</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Only 1% of the earth's water is available as drinking 
					water for human and animal consumption and that 1% is being 
					contaminated by the industrial civilization in which we 
					live. Pollutants such as physical &amp; biological waste, 
					chemicals, pesticides from agriculture and pharmaceuticals 
					are contaminating our water beyond our ability to clean it. 
					Consequently we are now at a point where pure drinkable 
					water is becoming more and more difficult to access.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">The World Health Organization estimates that 80% of all 
					known illness is caused by contaminated drinking water. 
					According to United Nations the global consumption of water 
					is doubling every 20 years as the population increases. By 
					the year 2025 the expected demand for water will exceed 50% 
					of the amount currently being used today. At that time 
					almost two-thirds of the world's population will lack access 
					to fresh drinking water.</span></p><img alt="Go Green Dog" data-dcnode-id="286" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.drinkable-air.com/images/web/info_greenglobe2.jpg&amp;raw" style="padding: 10px 30px 10px 0px; float: left; margin-left: -120px;" width="300"><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">The uncertainty and concerns of drinking tap water has 
					fueled a worldwide growth explosion in the sale of bottled 
					water. However, more recently bottled water has fallen out 
					of favor and sales are being banned in many locations; such 
					as government offices, universities and many municipalities. 
					This is a direct result of increased groundwater 
					contaminants being found in bottled water along with massive 
					problems caused by the billions of plastic water container 
					bottles clogging our landfills yearly. The Mayor of San 
					Francisco has banned bottled water sales, explaining it 
					takes 47 million gallons of oil to produce these plastic 
					bottles used and disposed of annually in the U.S.A </span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="281" instrument_node="">The bottled water industry is an unregulated $100 billion 
					a year industry that is presently facing charges from 
					consumer groups, raising concerns and warnings over the host 
					of microorganisms and chemicals found in bottled water. An 
					estimated 30% to 40% of all bottled water is just regular 
					tap water that may or may not be filtered. Bottled water is 
					expensive, up to $5.00 per gallon plus the inconvenience of 
					having to constantly lug heavy cases or large bottles around 
					and at the same time, paying a ridiculous price for that 
					inconvenience. See: </span><a data-dcnode-id="279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.drinkable-air.com/waterquality.htm"><span data-dcnode-id="280" instrument_node="">WaterQuality</span></a></p><p class="rbackup" data-dcnode-id="275"><a data-dcnode-id="276" href="#top"><span data-dcnode-id="277" instrument_node="">
					back to top</span></a></p><span data-dcnode-id="274" instrument_node="">
</span><h2 data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">What is an atmospheric water generator - AWG</span></h2><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">AWG Technology is the solution to alleviate the world's 
					water crisis. This breakthrough technology is now available 
					to everyone on the planet today.</span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">AWG machines produce pure drinking water from the 
					atmosphere surrounding the earth. Humidity from the air we 
					breathe is captured by the AWG unit, then converted into 
					pure healthy drinking water. The Comparison to drinking tap 
					or bottled water, which is referred to as dead water 
					(containing very little oxygen), where as the AWG water is 
					referred to as "Live" water, as it is 100% oxygenated water.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">AWGs are not connected to any ground water source but are 
					stand alone machines producing water wherever they are 
					plugged in. Make pure organic water (no added chemicals and 
					no ground water contaminates) for your family. Or imagine an 
					AWG onsite making fresh water for a village in India.</span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="261" instrument_node="">AWG units are free standing machines and not connected in 
					any way to a ground water source. These units produce water 
					wherever they are powered be it; electricity, generator or 
					solar power. The end result is the making of pure fresh 
					organic drinkable water (no added chemicals or ground water 
					contaminates). The applications for AWG technology are vast 
					with applications such as an AWG onsite making fresh water 
					for a village in Africa or India. Wherever fresh water is 
					needed, an AWG machine</span><img alt="Water Use" data-dcnode-id="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.drinkable-air.com/images/web/info_howawgwork1.jpg&amp;raw" style="padding: 10px 0px 10px 30px; float: right; margin-right: -70px;"><span data-dcnode-id="259" instrument_node=""> 
					can be set-up to start producing water immediately.
					</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Our
smaller AWG units which can make up to 10 gal/day are suitable for
residential, office, marine and recreational vehicle application. They
are mobile and just need to be plugged in and turned on with the push
of a button to start making water. Larger AWG machines are used for
industrial applications such as agriculture and livestock which are
consuming almost 90% of all fresh water used today. The world
population continues to increase and so, additional food and water will
be needed. The big problem is the availability of fresh water is
diminishing. This problem has caused water to be the number one
commodity of the 21st century, in time, possibly surpassing oil.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">The flexibility of the AWG application can best be seen 
					in disaster and humanitarian relief, where the relief teams 
					and agencies biggest challenge is the availability of safe 
					water for drinking and medical use. AWG units provide water 
					at source and can be easily trucked or air lifted into any 
					location, quickly providing water to any emergency 
					situation.</span></p><span data-dcnode-id="251" instrument_node="">
</span></div><span data-dcnode-id="249" instrument_node="">
</span><div data-dcnode-id="192"><span data-dcnode-id="248" instrument_node="">
</span><p class="rbackup" data-dcnode-id="245"><a data-dcnode-id="246" href="#top"><span data-dcnode-id="247" instrument_node="">back to top</span></a></p><span data-dcnode-id="244" instrument_node="">
</span><h4 data-dcnode-id="242" style="padding-bottom: 10px;"><span data-dcnode-id="243" instrument_node="">Benefits of 
									Drinking 100% Pure Water from An Drinkable 
									Air AWG:</span></h4><span data-dcnode-id="241" instrument_node="">
</span><ul data-dcnode-id="195"><span data-dcnode-id="239" instrument_node="">
</span><li data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Energy: assisting in optimum body 
								performance</span></li><span data-dcnode-id="236" instrument_node="">
</span><li data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">The best water on the planet, 100% 
									oxygenated water,</span></li><span data-dcnode-id="233" instrument_node="">
</span><li data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Reduces headaches and dizziness</span></li><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Digestion: helps to convert food into 
									energy </span></li><span data-dcnode-id="227" instrument_node="">
</span><li data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Facilitates the elimination of body 
									waste</span></li><span data-dcnode-id="224" instrument_node="">
</span><li data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Safety - Drinkable Air AWG drinking 
									water contains no harmful chemicals to 
									threaten human health </span></li><span data-dcnode-id="221" instrument_node="">
</span><li data-dcnode-id="217"><span data-dcnode-id="220" instrument_node="">No bacterial contaminates: The AWG 
									eliminates all natural occurring 
									contaminates and pathogens such as; 
									bacteria, viruses, parasites, giardia, 
									e-coli and other dangerous waterborne 
									pathogens which kill over 3.5 million people 
									yearly. See:  
									</span><a data-dcnode-id="218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.drinkable-air.com/waterfacts.htm"><span data-dcnode-id="219" instrument_node="">WaterFacts</span></a></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">No chemical contaminates - Pesticides, 
									pharmaceutical drug residue, industrial or 
									human waste</span></li><span data-dcnode-id="213" instrument_node="">
</span><li data-dcnode-id="209"><span data-dcnode-id="212" instrument_node="">Great taste - as the water is so pure. 
									There is only the clean, refreshing taste of 
									water. Imagine looking forward to a </span><img alt="Go Green Dog" data-dcnode-id="211" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.drinkable-air.com/images/web/info_GoGreenDogs.jpg&amp;raw" style="padding: 10px 30px 10px 0px; float: left; margin-left: -120px; margin-bottom: 20px;" width="300"><span data-dcnode-id="210" instrument_node="">
									tall, cool glass of water as a special 
									treat. The refreshing flavor enhances 
									beverages, making a great tasting robust 
									coffee or tea. Frozen juices taste as if 
									they were just freshly squeezed. Bolder 
									tasting food, soups and sauces and high 
									purity water for baby formula. When frozen, 
									you get sparkling crystal clear ice cubes </span></li><span data-dcnode-id="208" instrument_node="">
</span><li data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Pets - Pets instinctively know the difference, 
							after drinking live water, when offered a choice 
							they will always drink water made from an Drinkable 
							Air AWG</span></li><span data-dcnode-id="205" instrument_node="">
</span><li data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Dieting - Want to lose weight 
									effortlessly? Before you take a bite of 
									food, drink a pint of water. It will act as 
									an appetite suppressant </span></li><span data-dcnode-id="202" instrument_node="">
</span><li data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Muscle soreness - Eight ounces of water

					when needed. Drinking water is made at source, in your home.

					existing fresh water sources which are rapidly declining 
					around the world today. These AWG units can be used wherever 
					water resources do not exist. AWG machines have the 
					additional benefit of cleaning, purifying and dehumidifying 
					the air we breathe.</span></p><span data-dcnode-id="88" instrument_node="">
</span><p data-dcnode-id="86"><span data-dcnode-id="87" instrument_node="">Pure fresh water is essential for life,

									making news headlines daily, exposing severe 
									problems of pollution, physical wastes, 
									biological and pharmaceutical contaminants 
									being found in the ground water. Water 
									related diseases are killing an estimated 
									three million people per year of which 
									approximately half that number are children 
									under the age of five. Even in the western 
									nations such as the USA, approximately one 
									million people become ill every year due to 
									drinking contaminated water and 
									approximately 1000 die yearly.</span></p><span data-dcnode-id="85" instrument_node="">
