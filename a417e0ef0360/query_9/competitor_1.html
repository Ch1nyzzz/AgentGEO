</span><h3 data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Which water ionizer is the best water ionizer?</span></h3><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">I used to sell more water ionizer brands than I do now. My focus was to offer everything, the Best and the Not Best, so I could prove diversity and objectiveness. The only problem with that is that it was confusing to the customers. It also wasn't fair to the companies that I thought were mundane. If I couldn't be passionate about their water ionizers, then why was I selling them? So, for the past ten years (give or take) I've focused strictly on the water ionizer brands that I've found to be the very best and am truly passionate about. Further down this page I give features that are very important to look for in a water ionizer. I explain which water ionizer is BEST for each of these features.&nbsp;</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Accurate and honest water ionizer comparisons are still difficult to find after 12 years of searching. It is as if all other dealers want you to only look at their brand and not consider the features of their brand compared to other brands of water ionizers. I don't particularly blame them. Why would they want to point our their lesser-qualities.&nbsp;</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">I intentionally make a point to always remain objective and thorough. [I've long since learned the Golden Rule in other words.]&nbsp;There is no more comprehensive water ionizer comparison page than this one.&nbsp;Testing is one of the most important water-ionizer-comparison techniques. I do many side-by-side water ionizer comparisons using various meters and other testing equipment. Watch out for people who don't do these. They are all talk and no testing. What are they trying to hide from you if they don't show side-by-side comparison testing?&nbsp;&nbsp;</span></p><span data-dcnode-id="1458" instrument_node="">
</span><h3 data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">We Sell the Best Water Ionizers in All Price Ranges</span></h3><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">All of the water ionizers I sell fit into the category of "best water ionizer" in their price-range. I’ve tested and studied water ionizers for so long and so hard that I have literally left no stone unturned when it comes to finding and comparing the best water ionizers.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><h3 data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Reviews</span></h3><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">Another great tool you can use to compare water ionizers is the&nbsp;</span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/water-ionizer-reviews/" title="Water Ionizer Reviews"><span data-dcnode-id="1447" instrument_node="">Water Ionizer Reviews</span></a><span data-dcnode-id="1445" instrument_node="">&nbsp;page. I expose many sales tricks on that page. With anything you buy today, you have to learn how to watch out for sales gimmicks, and we explain how several of the more mundane water ionizer companies use deceptive methods on our Water Ionizers Reviews page.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><h3 data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Selecting the Best Water Ionizer for You</span></h3><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">How do you find the best water ionizer for you? Some features on the water ionizer comparison chart will be more important to you than others. Use the chart and further explanations on this page to isolate the best water ionizers, based on those features you feel are important to you.&nbsp;</span></p><span data-dcnode-id="1437" instrument_node="">
</span><h3 data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Why Buy a Water Ionizer?</span></h3><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">I purchased my first water ionizer 25 years ago, and it was so life-changing for myself and my family that, after retiring as teacher/principal in '07, I decided to build an online store (Alkaline Water Plus).</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Spend time on the Alkaline Water Plus website to educate yourself about water ionizers. They have changed the lives of thousands and thousands of people just like you and me.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Watch this short video to learn the most important and compelling reasons for you to buy a water ionizer.&nbsp;</span></p><span data-dcnode-id="1425" instrument_node="">

-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="929" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="927" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="922"><use class="ytp-svg-shadow" data-dcnode-id="924" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="925" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="923" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=bS6EAZ9Hbe0" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></h3><span data-dcnode-id="902" instrument_node="">
</span><h3 data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">What is a Water Ionizer?</span></h3><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">A </span><a data-dcnode-id="896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/blog/what-is-a-water-ionizer/" title="What is a Water Ionizer"><span data-dcnode-id="897" instrument_node="">water ionizer</span></a><span data-dcnode-id="895" instrument_node=""> can be summarized to be an electric-powered appliance that is usually attached to a standard faucet, although they can often be direct-plumbed. The device first filters the water, then ionizes the water by passing it through charged electrodes. The electrodes used in water ionizers are quite expensive, because the electrode plates are coated with platinum.&nbsp;</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">Alkaline water and acidic water are both produced at the same time by the water ionizer. More can be learned about the ionization process, which is also known as electrolysis, on this page:&nbsp;</span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/benefits-of-alkaline-ionized-water/" title="Benefits of Ionized Water"><span data-dcnode-id="891" instrument_node="">Benefits of Ionized Water</span></a><span data-dcnode-id="889" instrument_node="">.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">While </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/blog/a-demo-of-acidic-water-a-fantastic-by-product-of-water-ionization/" title="Valuable Uses for Acidic Water"><span data-dcnode-id="885" instrument_node="">acidic water has many valuable uses</span></a><span data-dcnode-id="883" instrument_node="">, it is the alkaline water that we want to consume for better health and longevity.</span></p><span data-dcnode-id="881" instrument_node="">
</span><h3 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Types of Water Ionizers</span></h3><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="877" instrument_node="">There are two types of water ionizers:&nbsp;</span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/water-ionizers-filters/" title="Electric Water Ionizers"><span data-dcnode-id="876" instrument_node="">electric water ionizers</span></a><span data-dcnode-id="874" instrument_node="">&nbsp;(these are the best water ionizers) and&nbsp;</span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/our-products/naturally-ionizing-water-filters/" title="Naturally Ionizing Water Filters and Pitchers"><span data-dcnode-id="873" instrument_node="">naturally ionizing alkaline water filters and pitchers</span></a><span data-dcnode-id="871" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="865"><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/our-products/hydrogen-water-machines-hydrogen-gas-generators/" title="Hydrogen Water Machines &amp; Hydrogen Gas Generators"><span data-dcnode-id="868" instrument_node="">Hydrogen water machines&nbsp;and&nbsp;hydrogen gas machines</span></a><span data-dcnode-id="866" instrument_node="">&nbsp;can be also considered as water ionizers in the sense that they can make hydrogen-water, which contains negatively-charged ions, but these machines do not micro-cluster the water the way an actual water ionizer will and they don't make the pH alkaline.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">This page is mostly focused on&nbsp;</span><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">electric water ionizer comparisons</span></strong><span data-dcnode-id="860" instrument_node="">&nbsp;and what you should know about purchasing the best water ionizer for you. Only electric water ionizers come with a 60-day satisfaction guarantee.</span></p><span data-dcnode-id="858" instrument_node="">
</span><h2 data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">EXPLAINING THE MOST IMPORTANT FEATURES ON THE CHART</span></h2><span data-dcnode-id="855" instrument_node="">
</span><h3 data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">#13 Cleaning Type &amp; Quality</span></h3><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">The Cleaning Type and Quality of the Water Cells and Plates is pretty much THE most important feature of a water ionizer.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">A best-quality water cell (and plates) gives you the best ionized water, and a good cleaning system is the only way your machine will continue to produce the best ionized water in years and decades to come.&nbsp;</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">On the chart, below, I have divided the more popular water ionizers into how well they clean their plates. A water ionizer cleans itself with either periodic acidic-washes (left) or with an advanced, automatic, continuous-cleaning method (right).</span></p><span data-dcnode-id="843" instrument_node="">
</span><ul data-dcnode-id="823"><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="834"><span data-dcnode-id="841" instrument_node="">The </span><strong data-dcnode-id="836"><span data-dcnode-id="840" instrument_node="">water ionizers which use the advanced </span><span data-dcnode-id="838" style="text-decoration: underline;"><span data-dcnode-id="839" instrument_node="">continuous-cleaning</span></span><span data-dcnode-id="837" instrument_node=""> methods will naturally be the best water ionizers</span></strong><span data-dcnode-id="835" instrument_node="">. They will last longer and get better results than a water ionizer with only the normal automatic acid-wash cleaning.</span></li><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">The use of acid-washes is a basic, simple technique that was invented in the early 90's, and most water ionizer companies use this technique even today.</span></li><span data-dcnode-id="830" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">The advanced continuous-cleaning methods are patented, special methods invented by the top water ionizer researchers in Japan and have been further refined over the years.</span></li><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Very few water ionizer manufacturers have the engineering expertise to develop continuous-cleaning systems.</span></li><span data-dcnode-id="824" instrument_node="">
</span></ul><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820" style="text-align: center;"><img alt="comparing-water-ionizer-plates-cells.original.jpg" class="__mce_add_custom__" data-dcnode-id="821" height="682" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn10.bigcommerce.com/s-bz401t/product_images/uploaded_images/comparing-water-ionizer-plates-cells.original.jpg&amp;raw" title="comparing-water-ionizer-plates-cells.original.jpg" width="850"></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">The electrodes are the heart of the water ionizer, and the machine will cease to ionize well if the plates aren’t kept clean. What happens with the ordinary automatic cleaning systems is that the the electrodes develop a calcium film over time, because they're not cleaned constantly. A calcium film on the plates will reduce the water ionizer’s capacity to ionize water [pH &amp; ORP]. However, if the electrodes are kept pristine clean and free of calcium, then your water ionizer will continue to be able to produce the best high-pH, low-ORP [high antioxidant], water as if it was brand-new out of the box</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Another reason to examine the water ionizer’s plate cleaning process is convenience. Intermittent automatic cleaning, otherwise known as acid washes, requires that you have to wait for the acid wash to finish. Sometimes this can occur at the beginning or end of every use and at other times it happens periodically throughout the day. Acid washes result in wasted water and reduced filter life. Enagic/Kangen, Tyent, Venus, Chanson, Nexus X-Blue, Lifeionizers, Bawell, Alive/Aqua Ionizer Deluxe, Ayana Vitality and most other water ionizers use intermittent acid washes.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Water ionizers which have automatic, continual cleaning not only clean your water ionizer plates 200% more thoroughly, but they also have NO inconvenience, wasted water or wasted filter-life. The AlkaViva water ionizers, Ionia's Best Super-Sanitizer, Classic Athena water ionizer and Smart water ionizers all use automatic continuous-cleaning.</span></p><span data-dcnode-id="810" instrument_node="">
</span><h3 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">#27 &amp; 28 Platinum Plating Process and Types of Plates:</span></h3><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">These features are the next most important thing I look at to find the Best Water Ionizer</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">The plating process [#28 in the chart, above] and the type of plates [#27] are very important features to look at when comparing water ionizers. There are various techniques used for creating the plates that function as electrodes in a water ionizer. No matter what type of plate is used, the method of applying platinum to the plate is crucial to the life of the water ionizer. Plating methods vary from company to company. The only safe and effective method of coating the plates with platinum is to use an advanced scientific method of electroplate-coating the plates. The companies that use advanced electroplating methods are the ones with the larger R&amp;D (research &amp; development scientists and engineers) teams. The point of advanced electroplating is to ensure the platinum covers 100% of the plate and that it will never erode.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799" style="text-align: center;"><img alt="scientific-electrode-plate-coating-process.original.png" class="__mce_add_custom__" data-dcnode-id="800" height="201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn10.bigcommerce.com/s-bz401t/product_images/uploaded_images/scientific-electrode-plate-coating-process.original.png&amp;raw" title="scientific-electrode-plate-coating-process.original.png" width="650"></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Notice that in the image, above, it shows binding material between each layer of platinum. That is done only by the most expert of the water ionizer R&amp;D engineers, to ensure the layers of platinum stick permanently. Layers of metal will not stay bonded to a surface for more than just a few years unless a bonding material is applied. Without the bonding material the platinum will erode over time. Platinum is necessary to the ionization process. It catalyzes it. Without platinum your ability to get good results for ionization diminishes. So, you don't want platinum to ever erode.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Here's an example to illustrate the importance of this. You can buy the best paint, guaranteed for 25 or even 50 years, and in a year it has been known to start peeling off when it wasn't applied to the surface properly. Peeling after a year would have nothing to do with the quality of paint. It would be due to the amateur preparation methods used. Part of the preparation process for painting is to use a primer. A primer is a binding material which allows the coat of paint to stick permanently and resist peeling and erosion. And so it goes with coating a titanium plate with layers of platinum.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">The majority of water ionizer manufactures use a dipping &amp; baking process, which dips the plate in platinum, bakes, dips again, bakes, etc. These are not the best water ionizers at all. This is an amateur way to coat plates with platinum, and unless the proper binding material is used, both initially and between each layer, the platinum will not be bonded permanently.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="783"><strong data-dcnode-id="785"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Solid Plates:</span></strong><span data-dcnode-id="786" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="784" instrument_node="">Solid plates are the most usual way a water ionizer plate is made. The amount of surface area for electrolysis is only equal to the size of the electrode, unless the plate is coated with an electroplating process. Electroplating can be expertly used to increase the surface area of a solid plate up to 200%.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Increasing the size of a solid plate is often used as a method to increase ionization. This is not as smart of a way to increase ionization, because the amount of electricity required for ionization increases with the size of the plate. The use of very large plates actually reduces ionization capability unless you compensate by using more watts of electricity.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">There is another way of improving the performance of a solid plate that is sometimes used. That is to implement an advanced electrical distribution (usually in a grid form) which delivers bursts of electricity unevenly around the plate to excite greater ionization than would otherwise be possible from that plate.&nbsp;</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">The Mesh Plate Design:</span></strong><span data-dcnode-id="773" instrument_node="">&nbsp;Mesh plates allow for a greater surface area for ionization, and are a good idea if they are correctly matched with a water ionizer that uses continuous-cleaning. The Athena Classic uses the mesh plate correctly. Mesh plates can be a disaster, though, if they are mis-matched to a water ionizer that uses acid-washes and not continuous-cleaning. Lifeionizers uses mis-matched mesh plates. The problem with mis-matched mesh plates is they are a very bad trap for calcium scaling.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The way mesh plates are coated with platinum is another issue. Just like any other plate, they can be either dipped or electroplated scientifically. The Classic Athena mesh plates are scientifically electroplated, and the Lifeionizers are dipped.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">I only advocate the use of mesh plates with water ionizers that use continuous-cleaning and provided the plates are coated using scientific electroplating of the platinum.&nbsp;</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="761"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Dipped Plates:</span></strong><span data-dcnode-id="762" instrument_node=""> When “dipping” is used, the surface area for electrolysis will be equal to the size of the plates. Dipped plates will not make the best water ionizers. Without proper scientific application of the platinum to the plates air bubbles are inevitable and erosion is also likely. Some manufacturers get around this by dipping and baking and re-dipping/baking several times, which may eliminate the air bubble, but the multiple coats of platinum aren't guaranteed to stick to the plates forever, so over the course of years the platinum can erode off the plates. This is why using plates (water cells) made by a manufacturer with the most expert engineers in the field is a very important thing to consider when buying a water ionizer you want to last.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="756"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Electroplating:</span></strong><span data-dcnode-id="757" instrument_node="">&nbsp;Electroplating uses electricity to coat the electrode plates with platinum. Generally this process is the only 100%-thorough method of coating the plates, and it produces a greater surface area for better electrolysis, which improves ORP and hydrogen-antioxidants. The Jupiter and Nexus alkaline water machine manufacturers both import their plates (water cells) from the same advanced R&amp;D source in Japan, Emco Tech. Emco uses patented electroplating techniques to coat their plates for 100%-perfect platinum bonding. The electroplating process used also creates an irregular surface area composed of micro-peaks and valleys, increasing surface area to 200% for more efficient electrolysis. Greater surface area plus no increase in mass equals less power and a better product of electrolysis. The AlkaViva water ionizers also use advanced scientific methods of electroplating the platinum onto the plates.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="751"><strong data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Size of Plates:</span></strong><span data-dcnode-id="752" instrument_node=""> Companies which use dipping methods of plating tend to use larger plates and many more plates to make up for the inefficiency of the design. Large plates require much more energy to generate electrolysis. Excessive use of electricity with electrolysis plates is risky, because these plates will tend to experience more wear and tear over the years. Larger plates with more watts is not a better plate design. Large plate ionizers usually require a fast flow rate to keep them cool, which means that the filtration with the large plate ionizers will not be as thorough as their competitors’ ionizers. Large, dipped plates are used by Enagic, Tyent, and Life water ionizer companies.</span></p><span data-dcnode-id="750" instrument_node="">
</span><h3 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">#34, #35, &amp; #36&nbsp; Filtration Quality: The Best Water Ionizers Have the Best Filtration</span></h3><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">One of the most important features of a water ionizer to consider is the filtration quality.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Each water ionizer has at least one filter in it, sometimes two. &nbsp;Some companies have gone through the process of having their filters lab-tested, and some just report the filter media used. We have analyzed these&nbsp;filter systems and &nbsp;have reported their features&nbsp;in&nbsp;the chart, above,&nbsp;# 34, #35 and #36.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="740" instrument_node="">The best water ionizer filtration ever developed is UltraWater filtration.&nbsp;</span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/ultrawater-filters/" title="UltraWater Filters"><span data-dcnode-id="739" instrument_node="">Learn more about UltraWater filtration and why it's multiple times better than any other water filtration.</span></a></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734" style="text-align: center;"><img alt="ultrawater-h2.png" class="__mce_add_custom__" data-dcnode-id="735" height="309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn10.bigcommerce.com/s-bz401t/product_images/uploaded_images/ultrawater-h2.png&amp;raw" title="ultrawater-h2.png" width="603"></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">If you live in a municipality where your water is treated, then I would recommend using filters which remove Chloramine and Fluoride, which is added to your tap water. Because Fluoride is an acidic mineral, it is discharged by all water ionizers in the process of creating alkaline water.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">If you have a water supply from your own well or a municipality which sometimes has boil-water-orders (warnings about bacteria getting into the water supply) we recommend you use a .01 micron filter. The Super-Sanitizer water ionizer automatically comes standard with one of these filters, but otherwise most of the water ionizers have an option to get a .01 micron filter.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Using a slow flow rate and a filtration system is key to removing all Fluoride if this is important to you. As a side-note about Fluoride, all water ionizers will remove about 50-75% of Fluoride as part of the water ionization process. Because Fluoride is acidic, it will tend to be diverted to the acidic-water stream during ionization.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Changing your filter properly at recommended intervals is an important part of getting good filtration. A filter counter can help remind you when it’s time to change filters. The only water ionizer brand in the chart above that doesn’t have a filter counter is the Enagic. The quality of water source can drastically impact filter life. For this reason, most water ionizer companies report the filter life conservatively.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">I offer a free report on water quality for your area, which you can access by visiting my&nbsp;</span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/free-water-quality-report/" title="Free Water Quality Report"><span data-dcnode-id="719" instrument_node="">Free Water Quality Report page</span></a><span data-dcnode-id="717" instrument_node="">.</span></p><span data-dcnode-id="715" instrument_node="">
</span><h3 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">#21 &amp; #22&nbsp; Installation Options</span></h3><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Before you purchase a water ionizer, consider how you want to install it.&nbsp;</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="702"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Undersink?</span></strong><span data-dcnode-id="706" instrument_node=""> If you want to install your water ionizer under your sink I only recommend </span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/water-ionizers-filters/alkaviva/" title="AlkaViva Water Ionizers"><span data-dcnode-id="705" instrument_node="">AlkaViva </span></a><span data-dcnode-id="703" instrument_node="">water ionizers. The reason is that the water cells have to be super strong to withstand constant pressure, especially up against gravity and AlkaViva water ionizers are the strongest. They are the only ones that have never developed a leak over time, and for that reason I feel it's imperative to consider this.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="697"><strong data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Direct-Plumbed?</span></strong><span data-dcnode-id="698" instrument_node=""> AlkaViva water ionizers are also recommended for anyone wanting to directly attach the water feed line into the plumbing. The reason is the water cell needs to be stronger than usual to withstand constant pressure on it. This again has to do with picking a water ionizer that will not leak over time if it is subjected to continuous water pressure.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="692"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Hook to the Faucet?</span></strong><span data-dcnode-id="693" instrument_node=""> The majority of water ionizers are made to be hooked directly to the faucet with a diverter. This allows you to use your faucet normally, but when you want to pour water you flip a lever to divert the water to the machine. This kind of installation doesn't put a strain on the water cell and is by far the safest installation to use for most water ionizers.</span></p><span data-dcnode-id="691" instrument_node="">
</span><h3 data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">#15, #18 and #18a&nbsp; What is Molecular Hydrogen and why does it matter? (The Best Water Ionizers Will Give the Most Molecular Hydrogen)</span></h3><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="687" instrument_node="">Molecular Hydrogen is a molecule created by a light bond between two Hydrogen atoms. It's considered to be "free hydrogen" in this state. Ordinary water contains hydrogen, but not&nbsp;</span><em data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">free</span></em><span data-dcnode-id="684" instrument_node="">&nbsp;hydrogen.&nbsp; When hydrogen is free it can fight free radicals; ordinary water cannot. Molecular hydrogen is proven to be very beneficial to the body, and I invite you to visit my special page all about these&nbsp;</span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/hydrogen-water-ionized-water-research/" title="Studies About Molecular Hydrogen"><span data-dcnode-id="683" instrument_node="">scientific studies using molecular hydrogen</span></a><span data-dcnode-id="681" instrument_node="">. Molecular hydrogen has been proven to have no toxic effect whatsoever. It is able to prevent and even repair free radical damage.&nbsp;Molecular hydrogen is important, and is capable of acting far more powerfully than any antioxidant.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Finding a Superior Water Ionizer can be simplified by concentrating on the most important factor first. Many people consider that the amount of molecular hydrogen a water ionizer produces is the most important feature, when judging the quality of a water ionizer. Molecular hydrogen levels improve the healthiness of the ionized drinking water exponentially.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">In the chart, points #15, 18 and 18a, these results are all related to the molecular hydrogen levels found in ionized water from each water ionizer tested. I did this comparison using level 3 [or that water ionizer’s 9.5 pH level] to demonstrate the ORP (oxidation reduction potential) results for the most popular and common drinking level of ionized water. [Note: The more negative the ORP is, the more capable the water is to fight free-radicals.]</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="672" instrument_node="">Molecular Hydrogen shows up in an ORP test, but more refined methods of testing for molecular hydrogen are being developed. I haven't done nearly as much testing of molecular hydrogen using these newer testing methods, such as </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/accessories-other-products/miz-hydrogen-test-kit" title="MIZ H2 Test Kit"><span data-dcnode-id="671" instrument_node="">MIZ Drops</span></a><span data-dcnode-id="669" instrument_node=""> and </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/accessories-other-products/trustlex-enh-2000-molecular-hydrogen-h2-meter" title="Trustlex H2 Meter"><span data-dcnode-id="668" instrument_node="">Trustlex Meter</span></a><span data-dcnode-id="666" instrument_node="">, because they haven't been perfected yet.&nbsp;Molecular-hydrogen-levels testing for water ionizers and hydrogen machines is a fairly new and somewhat crude science right now.&nbsp;&nbsp;</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">The Super-Sanitizer Water Ionizer, H2 Water Ionizers and Smart Water Ionizers so far test the best in Molecular Hydrogen, with the AlkaViva brand of water ionizers coming next.&nbsp;</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Note: No matter what type of ORP or molecular hydrogen tester or solution you buy, there is no guarantee as to what results customers will get when they test. There are too many variables with ORP and Molecular Hydrogen testing to guarantee these results.</span></p><span data-dcnode-id="658" instrument_node="">
</span><h3 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">#15&nbsp; Overall Performance</span></h3><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">How is the Alkaline Water Plus Water Ionizer Comparison Chart different than the reviews on other water ionizer sites?&nbsp;</span></p><span data-dcnode-id="652" instrument_node="">
</span><ul data-dcnode-id="629"><span data-dcnode-id="651" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">You can count on the details of my water ionizer comparisons to be accurate. It took me years to compile and I work on it regularly to keep it up-to-date.</span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">I do something that no other company which compares water ionizers does. I do hands-on video demonstrations and side-by-side comparisons of water ionizers.</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">My aim is to share knowledge with consumers to help you make an educated choice when purchasing a water ionizer.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The water ionizers on the above chart are rated for overall performance on point # 15.</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Another unique thing we do at Alkaline Water Plus is give you the straight facts about the best water ionizers.</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">We sell a wide range of hand-picked exceptional alkaline water ionizers.</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">We’ve compared the most popular brands of water ionizers and the best water ionizers in every conceivable way on this comprehensive water ionizer comparison page and also on our alkaline water ionizer reviews page.</span></li><span data-dcnode-id="630" instrument_node="">
</span></ul><span data-dcnode-id="628" instrument_node="">
Alkaline Water Plus has taken the time to effectively and completely compare alkaline water machines and report the information we’ve discovered about the following water ionizers: The Super-Sanitizer Water Ionizer, Jupiter Athena, Athena H2 water ionizer, Vesta H2 water ionizer, Delphi H2 Undersink water ionizer, Smart 9P water ionizers, Enagic water ionizers (SD501 and K8 Kangen water machines), Melody II water ionizer, Chanson Miracle Max, Nexus X-Blue water ionizer, all of the Ionia water ionizers, Alive Real Spirit Aqua Ionizer Deluxe, Aqua Ionizer Deluxe 9.5, Excel IE-900, Excel MX-99, Chanson Royale Undersink water ionizer, Tyent ACE-13 water ionizer, Tyent Turbo MMP-9090 Turbo Extreme water ionizer, and UCE 11 undersink water ionizers, Lifeionizer MXL-15 water ionizer, Ayana Vitality Varunizer, Bawell Platinum water ionizer, and the Alkaline Ionizer Purifier Energizer by AOK Health.</span><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">How are Alkaline Water Machines Compared?&nbsp;Anyone doing water ionizer comparisons should compare only “apples-to-apples”! When looking at water ionizer comparison videos, it’s important to compare only those water ionizers tested at the same location and time. And remember that although a water ionizer may compare favorably for one set of tests, you should attempt to view several tests measuring numerous qualities of the machine before making a final decision.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">I understand that not everyone has the time and patience to individually test every single water ionizer on the market. This chart is my effort to leverage my over 2 decades of experience with water ionizers to provide consumers with a simple comparison chart to find the machine that best matches their criteria. Short of testing every single feature, there is a good rule of thumb regarding the quality of water alkalizers - the higher quality machines have the better cleaning systems, better filtration and produce the highest levels of molecular hydrogen. That is why I described these features first on this water ionizer comparison page.</span></p><span data-dcnode-id="620" instrument_node="">
</span><h3 data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">#16, #17 &amp; #18&nbsp; Testing and Comparing pH and ORP</span></h3><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">A very important factor to consider when comparing water ionizers is the pH and ORP [antioxidant] levels for each machine at the appropriate settings for frequent drinking. It is both through testing and looking at the whole design of the water ionizer that will help make this comparison. You can find this in the chart at point #18. The ionizer with the best overall design will allow that water ionizer to get better ORP per unit of pH in comparison tests. The only way to do this is through side-by-side comparisons,</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">First consider how strongly the water ionizer can ionize [#16-17]. &nbsp;Keep in mind that one only needs the pH to range from about 3 to 11 for all purposes, and from about 8.5 to 9.5 for drinking purposes. Then look at the ORP per unit of pH the water ionizer is able to produce — the more negative ORP the better [#18]. Focus on the drinking-levels of pH for your ORP [antioxidant] readings.</span></p><span data-dcnode-id="611" instrument_node="">
</span><h3 data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">#2-#14&nbsp; Customer Service Considerations when Purchasing a Water Ionizer</span></h3><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Several points in the chart [#2-14] are related to customer servicing considerations and assurances. Each&nbsp;of these points are&nbsp;quite important in and of themselves, but together as a whole they paint a picture of longevity, reliability and excellence or not [or somewhere in-between]. Does the water ionizer company you’re considering have a repair depot in the U.S. and does it offer a 60-day satisfaction guarantee? Free shipping? Good warranty? Is the importer a BBB member? Do they give an accurate location for themselves? Also, I have indicated&nbsp;if the satisfaction guarantee has any strings attached, such as a re-stocking fee.&nbsp;&nbsp;</span></p><span data-dcnode-id="605" instrument_node="">
</span><h3 data-dcnode-id="603"><span data-dcnode-id="604" instrument_node=""># 26 &amp; #41&nbsp; Water Ionizer Power Requirements</span></h3><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">More amperage &amp; watts going through the plates is not necessarily better. Most manufacturers keep the wattage to 150w or less, but some water ionizers are capable of using over 250 watts. I believe that the more long-lasting water ionizers will prove to be the ones using the lower watts.</span></p><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">#1&nbsp; Water Ionizer Price Considerations</span></h3><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Does a high price mean that particular water ionizer is better? Not necessarily. I have found that price does not necessarily equate to better quality in a water ionizer. Choose the water ionizer features that are important to you, then use the comparison chart above to find the right machine for your needs. While some water ionizer companies may make claims to sell “The Only Real Water Ionizer,” or “The Cadillac of Water Ionizers,” these are simply sales slogans.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">25 years ago my first water ionizer helped me enormously and it was nowhere near as good as the water ionizers that are sold today. The biggest problem I had back then was allergies, and with my water ionizer, they all disappeared. That water ionizer was inferior, but even so my health and the health of my five children changed drastically. Prior to drinking alkaline water, we all made regular doctor visits for the usual complaints - sore throats, ear infections, and allergies galore, but after regular alkaline water use, we were able to reduce these visits to simple annual well child check ups.</span></p><span data-dcnode-id="590" instrument_node="">
</span><h3 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">#42&nbsp; Which Water Ionizers Can Produce Hypochlorous Acid?</span></h3><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Only a few water ionizers facilitate or allow you to use sodium in the electrolysis process. They do this by providing a mineral port or a sodium injection port.&nbsp;When you add sodium it not only produces hypochlorous acid (a super strong and effective sanitizer) but it also strengthens ionization, so you can get a higher pH (for cleaning &amp; de-greasing) and a lower pH (acidic water for disinfecting and sanitizing). The water ionizers that allow using sodium in the electrolysis process are listed in column 42, in the chart above.</span></p><span data-dcnode-id="584" instrument_node="">
</span><h3 data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Kangen Water vs Ionized Water</span></h3><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Is&nbsp;water ionization the same for all alkaline water ionizers, including the Enagic (Kangen Water)?</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">Not all water ionizers are the same. Here's one example why. There are not many water ionizers that use a saline injection port, like the kangen water machine, so that is one of the kangen water calling cards. However, Enagic's use of the saline port is a bit dangerous for the machine. It doesn't have enough internal self-cleaning to ensure that the water ionizer plates are cleaned thoroughly of the sodium after using this port. Enagic has a warning about this on their site, but their design has not been changed to fix the problem. The better water ionizer for use of a saline port is&nbsp;</span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/water-ionizers/ionias-best-super-sanitizing-water-ionizer" title="Ionia's Best SuperSanitizing Water Ionizer"><span data-dcnode-id="576" instrument_node="">Ionia's Best&nbsp;SuperSanitizing Water Ionizer</span></a><span data-dcnode-id="574" instrument_node="">. As a SuperSanitizer, Ionia's Best can pour over five gallons at a time of super acidic water (2.5 pH), and it has built-in continuous-cleaning of the plates, so the sodium will never stay on the plates to potentially corrode them.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Some water ionizers perform better than others, by way of giving more molecular hydrogen antioxidants. I've summarized all this in the above chart. Ionized water with a very high pH but low ORP (oxidation reduction potential) wouldn't be good, simply because you can get better than that. It's good to be able to get a variety of pH, and with it get an abundance of molecular hydrogen to fight free-radicals throughout every cell of your body. Kangen water machines are only average in this capacity. The best water ionizers for molecular hydrogen are noted on the chart.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">I don't recommend alkaline water machines which use a lot of power (watts), because over time this can damage plates.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="565" instrument_node="">Watch out for companies that give you superficial reasons their water ionizer is "better" (like those selling Kangen Water, or Tyent) focusing on&nbsp;</span><em data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">plate size or&nbsp;</span></em><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">high watts</span></em><span data-dcnode-id="560" instrument_node="">. They are not showing you water ionizer comparison testing like I do. Why don't companies like Enagic, Tyent and Life do their own water ionizer comparisons? They just aren't quite as good. I have done the side-by-side comparison testing for them and I can see (and in the videos you can see) that they don't do as well as the water ionizers I sell.&nbsp;</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Kangen water is trademarked, but it is not different than ionized water. Kangen water is chemically the same as alkaline ionized water, and can be tested for pH and ORP like any other. Occasionally I'll hear hype about this, but&nbsp;ionized water is ionized water. The differences that make one water ionizer better than another one can all be found and explained thoroughly on this page.&nbsp;&nbsp;</span></p><span data-dcnode-id="555" instrument_node="">
</span><h3 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Watch out for Fake Water Ionizer Comparisons, Which Come in Many Forms</span></h3><span data-dcnode-id="552" instrument_node="">
</span><ol data-dcnode-id="508"><span data-dcnode-id="551" instrument_node="">
</span><li data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">The biggest water ionizer comparisons scam is when the company puts up a review site, pretending it is independent and non-biased, when it isn't. I've written a lot about this in my </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/water-ionizer-reviews/" title="Water Ionizer Reviews"><span data-dcnode-id="549" instrument_node="">Water Ionizer Reviews page</span></a><span data-dcnode-id="547" instrument_node="">.</span></li><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Beware “water ionizer comparisons” that show only the highest or strongest pH/ORP for that water ionizer and/or doesn’t show you their testing. This practice can be misleading because you don’t drink at the highest alkaline level, so the ORP for that level is irrelevant.</span></li><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">What you should really be interested in is the hydrogen (H2) levels or ORP for the pH level you will be drinking.</span></li><span data-dcnode-id="539" instrument_node="">
</span><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Unless the water ionizers are being compared side-by-side in the same location, at the same time, using an ORP meter or Trustlex hydrogen tester that is cleaned and calibrated prior to each test, the comparisons are potentially false readings.</span></li><span data-dcnode-id="536" instrument_node="">
</span><li data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">I am unique in that I share extensive testing and comparing of water ionizers on YouTube. When I do this it adds to the general knowledge about various water ionizers and also shows that water ionizers perform differently in different water sources.</span></li><span data-dcnode-id="533" instrument_node="">
</span><li data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Another fake water ionizer comparison trick is to make claims based on saying their ionizer is the only medical device available. No water ionizers are considered medical devices in the US. The KFDA [the Korean equivalent of FDA] and the Ministry of Health of Japan both recognize water ionizers as medically useful devices, and so will certify them.</span></li><span data-dcnode-id="530" instrument_node="">
</span><li data-dcnode-id="522"><span data-dcnode-id="529" instrument_node="">One, more recent trick is to make claims that ionized water is not natural, because it’s not found in nature. The claims are being made by people who want you to buy </span><em data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">their</span></em><span data-dcnode-id="526" instrument_node=""> products [usually filtering-only devices] instead of water ionizers. But, the idea that ionized water is somehow not natural is simply misguided. It can be tested and found to be water [two hydrogens to every oxygen]. There are normal, healthy minerals in ionized water, such as calcium. There are also many more </span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/benefits-of-alkaline-ionized-water/" title="Benefits of Alkaline Ionized Water"><span data-dcnode-id="525" instrument_node="">benefits of ionized water</span></a><span data-dcnode-id="523" instrument_node="">.</span></li><span data-dcnode-id="521" instrument_node="">
</span><ul data-dcnode-id="510"><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">I don’t have anything bad to say about filtering-only alkaline water ionizer devices. I sell a few. The most popular one is my new </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alkalinewaterplus.com/portable-water-ionizers-filters/alkaline-plus-ph-ionizer-pitcher-by-wellblue" title="Alkaline Plus by Wellblue Alkaline Water Pitcher Portable Pitcher"><span data-dcnode-id="518" instrument_node="">Alkaline Plus Pitcher </span></a><span data-dcnode-id="516" instrument_node="">which can bring the pH up slightly [about 1 point higher than the source water pH, i.e. from 8.5 to 9.5 or from 7.5 to 8.5] and it delivers about -200 to -400 ORP [antioxidants] on average. I think it’s a great product, and I think everyone should buy one, even if they have a regular water ionizer, because they will be traveling sometimes and will need it.</span></li><span data-dcnode-id="514" instrument_node="">
</span><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">However, I don’t believe anyone can experience the full health benefits of using alkaline water when they only use a filtering-only water ionizer [also called portable water ionizer]. I use them only when I travel. The portable water ionizers work, but the electrical water ionizers work better and faster. I have tested them all and the health benefits are better with a regular [electrical] water ionizer.</span></li><span data-dcnode-id="511" instrument_node="">
</span></ul><span data-dcnode-id="509" instrument_node="">
</span></ol><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">I look upon a water ionizer as a tool that can be used to adjust the buffers we all need up or down as desired. After over 25 years of using water ionizers for myself and my whole family, I can say that they are the single best thing I’ve ever purchased to improve my health. I am very health conscious about the products I buy, but have never found a better product to recommend to others than an alkaline water ionizer.</span></p><span data-dcnode-id="504" instrument_node="">
