</span><div class="et_pb_module et_pb_divider et_pb_divider_2 et_pb_divider_position_ et_pb_space" data-dcnode-id="4027"><div class="et_pb_divider_internal" data-dcnode-id="4028"></div></div><div class="et_pb_module et_pb_divider et_pb_divider_3 et_pb_divider_position_ et_pb_space" data-dcnode-id="4025"><div class="et_pb_divider_internal" data-dcnode-id="4026"></div></div><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_bg_layout_dark et_pb_text_align_left" data-dcnode-id="4020"><span data-dcnode-id="4024" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">The Air Raid</span></div><span data-dcnode-id="4021" instrument_node="">
</span></div><span data-dcnode-id="4019" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_bg_layout_dark et_pb_text_align_left" data-dcnode-id="4009"><span data-dcnode-id="4017" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="4011"><span data-dcnode-id="4016" instrument_node="">Midnight – Saturday May 3rd/4th 1941.</span><br data-dcnode-id="4015"><span data-dcnode-id="4014" instrument_node="">
A nuisance enemy raider over North Shields drops 4 bombs.</span><br data-dcnode-id="4013"><span data-dcnode-id="4012" instrument_node="">
Seconds later over a hundred people would be killed and entire families lost.</span></div><span data-dcnode-id="4010" instrument_node="">
</span></div><span data-dcnode-id="4008" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_4 et_pb_bg_layout_light et_pb_text_align_left" data-dcnode-id="4001"><span data-dcnode-id="4006" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="4003"><p data-dcnode-id="4004" style="text-align: center;"><img alt="air-raid" class="aligncenter size-medium wp-image-116021" data-dcnode-id="4005" height="23" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/northshields173.org/wp-content/uploads/2017/05/air-raid.png%3Fresize%3D600%252C600%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/northshields173.org/wp-content/uploads/2017/05/air-raid.png?resize=600%2C600&amp;ssl=1 600w, https://i0.wp.com/northshields173.org/wp-content/uploads/2017/05/air-raid.png?resize=250%2C250&amp;ssl=1 250w, https://i0.wp.com/northshields173.org/wp-content/uploads/2017/05/air-raid.png?resize=65%2C65&amp;ssl=1 65w, https://i0.wp.com/northshields173.org/wp-content/uploads/2017/05/air-raid.png?w=636&amp;ssl=1 636w" width="103"></p></div><span data-dcnode-id="4002" instrument_node="">
</span></div><span data-dcnode-id="4000" instrument_node=""> </span><span data-dcnode-id="3998" instrument_node="">
</span></div><span data-dcnode-id="3996" instrument_node=""> </span><div class="et_pb_column et_pb_column_3_4 et_pb_column_3 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3902"><span data-dcnode-id="3994" instrument_node="">
</span><div class="et_pb_module et_pb_divider et_pb_divider_4 et_pb_divider_position_ et_pb_space" data-dcnode-id="3992"><div class="et_pb_divider_internal" data-dcnode-id="3993"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_0 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3976"><span data-dcnode-id="3991" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">Wilkinson's Air Raid Shelter</span></h5><span data-dcnode-id="3988" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3980"><span data-dcnode-id="3987" instrument_node="">
					The public air raid shelter serving this part of the east end of North Shields was situated in the basement/cellars of W.A. Wilkinson’s Ltd on the corner of King Street and George Street. Designated as a public air raid shelter in 1940 with a capacity of 188 – the shelter divided opinion amongst the residents of the local streets surrounding the factory.</span><p data-dcnode-id="3986"></p><span data-dcnode-id="3985" instrument_node="">
</span><p data-dcnode-id="3981"><a data-dcnode-id="3983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/wilkinsons-air-raid-shelter/"><span data-dcnode-id="3984" instrument_node="">Read more</span></a><span data-dcnode-id="3982" instrument_node="">
</span></p></div><span data-dcnode-id="3979" instrument_node=""> </span><span data-dcnode-id="3977" instrument_node="">
</span></div><span data-dcnode-id="3975" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_5 et_pb_divider_position_ et_pb_space" data-dcnode-id="3972"><div class="et_pb_divider_internal" data-dcnode-id="3973"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_1 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3956"><span data-dcnode-id="3971" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">May 3/4 1941</span></h5><span data-dcnode-id="3968" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3960"><span data-dcnode-id="3967" instrument_node="">
					Shortly before midnight on Saturday 3 May 1941 a lone German nuisance raider dropped 4 bombs on the Tyneside town of North Shields.&nbsp; Tragically,&nbsp; the fourth bomb scored a direct hit on Wilkinson’s lemonade factory. The Public Air Raid Shelter in the building’s basement was completely destroyed. Of the 192 people present,&nbsp; 107 people were killed. Entire families were wiped out.&nbsp; It was the scene of the heaviest casualties&nbsp;in North East England during the entire War.</span><p data-dcnode-id="3966"></p><span data-dcnode-id="3965" instrument_node="">
</span><p data-dcnode-id="3961"><a data-dcnode-id="3963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/story/"><span data-dcnode-id="3964" instrument_node="">Read more</span></a><span data-dcnode-id="3962" instrument_node="">
</span></p></div><span data-dcnode-id="3959" instrument_node=""> </span><span data-dcnode-id="3957" instrument_node="">
</span></div><span data-dcnode-id="3955" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_6 et_pb_divider_position_ et_pb_space" data-dcnode-id="3952"><div class="et_pb_divider_internal" data-dcnode-id="3953"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_2 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3936"><span data-dcnode-id="3951" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node="">Air Raid Photos</span></h5><span data-dcnode-id="3948" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3940"><span data-dcnode-id="3947" instrument_node="">
					109 killed. 107 in the air raid shelter and 2 killed in destruction of house around the corner in George Street.</span><p data-dcnode-id="3946"></p><span data-dcnode-id="3945" instrument_node="">
</span><p data-dcnode-id="3941"><a data-dcnode-id="3943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/3541-wilkinsons-air-raid-shelter-and-george-street/"><span data-dcnode-id="3944" instrument_node="">Read more</span></a><span data-dcnode-id="3942" instrument_node="">
</span></p></div><span data-dcnode-id="3939" instrument_node=""> </span><span data-dcnode-id="3937" instrument_node="">
</span></div><span data-dcnode-id="3935" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_7 et_pb_divider_position_ et_pb_space" data-dcnode-id="3932"><div class="et_pb_divider_internal" data-dcnode-id="3933"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_3 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3908"><span data-dcnode-id="3931" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">The Aftermath</span></h5><span data-dcnode-id="3928" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3912"><span data-dcnode-id="3927" instrument_node="">
					With war time censorship, Wilkinson’s was never named in contemporary press reporting of enemy raids and civilian casualties. To our knowledge, Wilkinsons has not featured in the standard histories of the provincial Blitz, Home Front or Civil Defence prior to this website being published in 2000.</span><p data-dcnode-id="3926"></p><span data-dcnode-id="3925" instrument_node="">
</span><p data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">The disaster is covered in Dr Craig Armstrong’s “Tyneside in the Second World War” (Phillimore: 2007) and is mentioned in Joshua Levine’s “The Secret History of the Blitz” (Simon and Schuster: 2015)</span></p><span data-dcnode-id="3922" instrument_node="">
</span><p data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">The disaster was never forgotten in the town itself – many, many families were touched by the events of that evening. Following a memorial service at St Augustine’s Church, the community was left to get on with it. And this they did, seeing out the War with no repeat of the bombing disaster of 1941.</span></p><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3916"><a data-dcnode-id="3917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/aftermath-and-memories/"><span data-dcnode-id="3918" instrument_node="">Read more</span></a></p><span data-dcnode-id="3915" instrument_node="">
</span><p data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">&nbsp;
				</span></p></div><span data-dcnode-id="3911" instrument_node=""> </span><span data-dcnode-id="3909" instrument_node="">
</span></div><span data-dcnode-id="3907" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_8 et_pb_divider_position_ et_pb_space" data-dcnode-id="3904"><div class="et_pb_divider_internal" data-dcnode-id="3905"></div></div><span data-dcnode-id="3903" instrument_node="">
</span></div><span data-dcnode-id="3901" instrument_node=""> </span><span data-dcnode-id="3899" instrument_node="">
</span></div><span data-dcnode-id="3897" instrument_node=""> </span><span data-dcnode-id="3895" instrument_node="">
</span></div><span data-dcnode-id="3893" instrument_node=""> </span><div class="et_pb_section et_pb_section_3 et_pb_with_background et_section_regular" data-dcnode-id="3759"><span data-dcnode-id="3891" instrument_node="">
</span><div class="et_pb_row et_pb_row_2 et_pb_row_1-4_3-4" data-dcnode-id="3763"><span data-dcnode-id="3890" instrument_node="">
</span><div class="et_pb_column et_pb_column_1_4 et_pb_column_4 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="3861"><span data-dcnode-id="3889" instrument_node="">
</span><div class="et_pb_module et_pb_divider et_pb_divider_9 et_pb_divider_position_ et_pb_space" data-dcnode-id="3887"><div class="et_pb_divider_internal" data-dcnode-id="3888"></div></div><div class="et_pb_module et_pb_divider et_pb_divider_10 et_pb_divider_position_ et_pb_space" data-dcnode-id="3885"><div class="et_pb_divider_internal" data-dcnode-id="3886"></div></div><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_bg_layout_dark et_pb_text_align_left" data-dcnode-id="3880"><span data-dcnode-id="3884" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Heroes</span></div><span data-dcnode-id="3881" instrument_node="">
</span></div><span data-dcnode-id="3879" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_6 et_pb_bg_layout_dark et_pb_text_align_left" data-dcnode-id="3873"><span data-dcnode-id="3877" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">Locals risked their own lives to rescue those trapped in the basement.</span></div><span data-dcnode-id="3874" instrument_node="">
</span></div><span data-dcnode-id="3872" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_7 et_pb_bg_layout_light et_pb_text_align_left" data-dcnode-id="3865"><span data-dcnode-id="3870" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3867"><p data-dcnode-id="3868" style="text-align: center;"><img alt="heroes" class="aligncenter size-full wp-image-116028" data-dcnode-id="3869" height="103" sizes="(max-width: 166px) 100vw, 166px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/northshields173.org/wp-content/uploads/2017/05/heroes.png%3Fresize%3D166%252C166%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/heroes.png?w=166&amp;ssl=1 166w, https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/heroes.png?resize=65%2C65&amp;ssl=1 65w" width="103"></p></div><span data-dcnode-id="3866" instrument_node="">
</span></div><span data-dcnode-id="3864" instrument_node=""> </span><span data-dcnode-id="3862" instrument_node="">
</span></div><span data-dcnode-id="3860" instrument_node=""> </span><div class="et_pb_column et_pb_column_3_4 et_pb_column_5 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3767"><span data-dcnode-id="3858" instrument_node="">
</span><div class="et_pb_module et_pb_divider et_pb_divider_11 et_pb_divider_position_ et_pb_space" data-dcnode-id="3856"><div class="et_pb_divider_internal" data-dcnode-id="3857"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_4 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3833"><span data-dcnode-id="3855" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">Mrs Ellen Lee</span></h5><span data-dcnode-id="3852" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3837"><span data-dcnode-id="3851" instrument_node="">
</span><img alt="Mrs Lee" class="size-full wp-image-1526 alignleft" data-dcnode-id="3850" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i2.wp.com/northshields173.org/wp-content/uploads/2013/04/lee.jpg%3Fresize%3D134%252C198%26ssl%3D1&amp;raw" width="134"><p data-dcnode-id="3849"></p><span data-dcnode-id="3848" instrument_node="">
</span><p data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">At the time of the bombing, Mrs Lee lived at 2 Hamilton Terrace in North Shields, just around the corner from the Wilkinson’s factory. She stood 6ft tall and weighed close to 18 stone. She was indeed as everyone recalled, a large lady with a big heart – she would do anything for anyone.</span></p><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Mrs Lee was the ARP warden in charge of Wilkinson’s Shelter. It was her job to open the shelter when the sirens sounded, keep it tidy and count people coming in and out.</span></p><span data-dcnode-id="3842" instrument_node="">
</span><p data-dcnode-id="3838"><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/ellen-lee-unsung-heroine/"><span data-dcnode-id="3841" instrument_node="">Read more…</span></a><span data-dcnode-id="3839" instrument_node="">
</span></p></div><span data-dcnode-id="3836" instrument_node=""> </span><span data-dcnode-id="3834" instrument_node="">
</span></div><span data-dcnode-id="3832" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_12 et_pb_divider_position_ et_pb_space" data-dcnode-id="3829"><div class="et_pb_divider_internal" data-dcnode-id="3830"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_5 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3813"><span data-dcnode-id="3828" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">George Newstead, GM</span></h5><span data-dcnode-id="3825" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3817"><span data-dcnode-id="3824" instrument_node="">
					George Newstead cut a hole through to a cellar bay full of injured and dead. The casualties were gingerly taken out except for one man who was pinned down by a steel girder. He was in agony so a doctor was called to give him an anaesthetic and reluctantly, it was decided that the only way to save him was to amputate his foot. While the doctor crawled out to get his instruments George decided to have one more go at freeing the survivor. In spite of the risk of bringing down tons of debris he got a small jack under the girder and raised it slightly. It was just enough. By cutting the man’s boot off they were able to ease his leg out and drag him clear.</span><p data-dcnode-id="3823"></p><span data-dcnode-id="3822" instrument_node="">
</span><p data-dcnode-id="3818"><a data-dcnode-id="3820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/george-newstead/"><span data-dcnode-id="3821" instrument_node="">Read more</span></a><span data-dcnode-id="3819" instrument_node="">
</span></p></div><span data-dcnode-id="3816" instrument_node=""> </span><span data-dcnode-id="3814" instrument_node="">
</span></div><span data-dcnode-id="3812" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_13 et_pb_divider_position_ et_pb_space" data-dcnode-id="3809"><div class="et_pb_divider_internal" data-dcnode-id="3810"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_6 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3793"><span data-dcnode-id="3808" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">Clarence Burdis, GM</span></h5><span data-dcnode-id="3805" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3797"><span data-dcnode-id="3804" instrument_node="">
					Clarence Burdis cut a second hole through a thick wall to reach another smashed room in the basement. Here the casualties were lying amidst the splintered remains of their bunk beds. For four gruelling hours he slowly moved casualties from their shattered tomb.</span><p data-dcnode-id="3803"></p><span data-dcnode-id="3802" instrument_node="">
</span><p data-dcnode-id="3798"><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/clarence-burdis/"><span data-dcnode-id="3801" instrument_node="">Read more</span></a><span data-dcnode-id="3799" instrument_node="">
</span></p></div><span data-dcnode-id="3796" instrument_node=""> </span><span data-dcnode-id="3794" instrument_node="">
</span></div><span data-dcnode-id="3792" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_14 et_pb_divider_position_ et_pb_space" data-dcnode-id="3789"><div class="et_pb_divider_internal" data-dcnode-id="3790"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_7 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3773"><span data-dcnode-id="3788" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Norman Darling Black, BEM</span></h5><span data-dcnode-id="3785" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3777"><span data-dcnode-id="3784" instrument_node="">
					Mr Black, serving with a First Aid unit, struggled through a narrow opening, risking his life to find living people buried under the debris. For four hours he worked at great hazard to extricate a child imprisoned by many tons of masonry. He was advised to rest after this dangerous feat but returned to rescue an imprisoned man.</span><p data-dcnode-id="3783"></p><span data-dcnode-id="3782" instrument_node="">
</span><p data-dcnode-id="3778"><a data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/norman-darling-black/"><span data-dcnode-id="3781" instrument_node="">Read more</span></a><span data-dcnode-id="3779" instrument_node="">
</span></p></div><span data-dcnode-id="3776" instrument_node=""> </span><span data-dcnode-id="3774" instrument_node="">
</span></div><span data-dcnode-id="3772" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_15 et_pb_divider_position_ et_pb_space" data-dcnode-id="3769"><div class="et_pb_divider_internal" data-dcnode-id="3770"></div></div><span data-dcnode-id="3768" instrument_node="">
</span></div><span data-dcnode-id="3766" instrument_node=""> </span><span data-dcnode-id="3764" instrument_node="">
</span></div><span data-dcnode-id="3762" instrument_node=""> </span><span data-dcnode-id="3760" instrument_node="">
</span></div><span data-dcnode-id="3758" instrument_node=""> </span><div class="et_pb_section et_pb_section_4 et_pb_with_background et_section_regular" data-dcnode-id="3583"><span data-dcnode-id="3756" instrument_node="">
</span><div class="et_pb_row et_pb_row_3 et_pb_row_1-4_3-4" data-dcnode-id="3587"><span data-dcnode-id="3755" instrument_node="">
</span><div class="et_pb_column et_pb_column_1_4 et_pb_column_6 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="3727"><span data-dcnode-id="3754" instrument_node="">
</span><div class="et_pb_module et_pb_divider et_pb_divider_16 et_pb_divider_position_ et_pb_space" data-dcnode-id="3752"><div class="et_pb_divider_internal" data-dcnode-id="3753"></div></div><div class="et_pb_module et_pb_divider et_pb_divider_17 et_pb_divider_position_ et_pb_space" data-dcnode-id="3750"><div class="et_pb_divider_internal" data-dcnode-id="3751"></div></div><div class="et_pb_module et_pb_text et_pb_text_8 et_pb_bg_layout_light et_pb_text_align_left" data-dcnode-id="3745"><span data-dcnode-id="3749" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">The Victims</span></div><span data-dcnode-id="3746" instrument_node="">
</span></div><span data-dcnode-id="3744" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_9 et_pb_bg_layout_dark et_pb_text_align_left" data-dcnode-id="3738"><span data-dcnode-id="3742" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">107 people were killed. Over 20 were injured, several seriously. Very few escaped unscathed.</span></div><span data-dcnode-id="3739" instrument_node="">
</span></div><span data-dcnode-id="3737" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_10 et_pb_bg_layout_light et_pb_text_align_left" data-dcnode-id="3731"><span data-dcnode-id="3735" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3733"><img alt="victims" class="aligncenter size-medium wp-image-116032" data-dcnode-id="3734" height="23" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/northshields173.org/wp-content/uploads/2017/05/victims.png%3Fresize%3D600%252C600%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/victims.png?resize=600%2C600&amp;ssl=1 600w, https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/victims.png?resize=250%2C250&amp;ssl=1 250w, https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/victims.png?resize=65%2C65&amp;ssl=1 65w, https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/victims.png?w=636&amp;ssl=1 636w" width="103"></div><span data-dcnode-id="3732" instrument_node="">
</span></div><span data-dcnode-id="3730" instrument_node=""> </span><span data-dcnode-id="3728" instrument_node="">
</span></div><span data-dcnode-id="3726" instrument_node=""> </span><div class="et_pb_column et_pb_column_3_4 et_pb_column_7 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3591"><span data-dcnode-id="3724" instrument_node="">
</span><div class="et_pb_module et_pb_divider et_pb_divider_18 et_pb_divider_position_ et_pb_space" data-dcnode-id="3722"><div class="et_pb_divider_internal" data-dcnode-id="3723"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_8 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3697"><span data-dcnode-id="3721" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Victims A-Z</span></h5><span data-dcnode-id="3718" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3701"><span data-dcnode-id="3717" instrument_node="">
					The following 107 (including 7 who died later in hospital) people were killed as a result of enemy action at Wilkinson’s Air Raid Shelter: May 3rd 1941. The list includes all 103 people listed on the </span><a data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.genuki.bpears.org.uk/NBL/Tynemouth/Shelter.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3716" instrument_node="">GENUKI Deaths and Fatal Injuries at North Shields on May 3rd 1941</span></a><span data-dcnode-id="3714" instrument_node="">. In addition there are 4 </span><strong data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">military</span></strong><span data-dcnode-id="3711" instrument_node=""> personnel victims listed who are not recorded on the GENUKI page (which features </span><strong data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">civilian</span></strong><span data-dcnode-id="3708" instrument_node=""> deaths caused by enemy activity). 43 children (16 years old or younger) were killed.</span><p data-dcnode-id="3707"></p><span data-dcnode-id="3706" instrument_node="">
</span><p data-dcnode-id="3702"><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/a-z-list-of-victims/"><span data-dcnode-id="3705" instrument_node="">Read more</span></a><span data-dcnode-id="3703" instrument_node="">
</span></p></div><span data-dcnode-id="3700" instrument_node=""> </span><span data-dcnode-id="3698" instrument_node="">
</span></div><span data-dcnode-id="3696" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_19 et_pb_divider_position_ et_pb_space" data-dcnode-id="3693"><div class="et_pb_divider_internal" data-dcnode-id="3694"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_9 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3677"><span data-dcnode-id="3692" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Mortuary Records</span></h5><span data-dcnode-id="3689" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3681"><span data-dcnode-id="3688" instrument_node="">
					Details of each victim killed in the shelter and taken to the temporary mortuary at the old Public Bath House in North Shields were recorded on official Mortuary Forms. These are available to view at Tyne and Wear Archives. Forms do not exist for those who died later in hospital from their injuries. Many of the victims are buried in Preston Cemetery, North Shields.</span><p data-dcnode-id="3687"></p><span data-dcnode-id="3686" instrument_node="">
</span><p data-dcnode-id="3682"><a data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/the-107-victims/"><span data-dcnode-id="3685" instrument_node="">Read more</span></a><span data-dcnode-id="3683" instrument_node="">
</span></p></div><span data-dcnode-id="3680" instrument_node=""> </span><span data-dcnode-id="3678" instrument_node="">
</span></div><span data-dcnode-id="3676" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_20 et_pb_divider_position_ et_pb_space" data-dcnode-id="3673"><div class="et_pb_divider_internal" data-dcnode-id="3674"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_10 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3657"><span data-dcnode-id="3672" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">The Injured</span></h5><span data-dcnode-id="3669" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3661"><span data-dcnode-id="3668" instrument_node="">
					A list of those admitted to Preston Emergency Hospital on May 4th 1941</span><p data-dcnode-id="3667"></p><span data-dcnode-id="3666" instrument_node="">
</span><p data-dcnode-id="3662"><a data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/the-injured/"><span data-dcnode-id="3665" instrument_node="">Read more</span></a><span data-dcnode-id="3663" instrument_node="">
</span></p></div><span data-dcnode-id="3660" instrument_node=""> </span><span data-dcnode-id="3658" instrument_node="">
</span></div><span data-dcnode-id="3656" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_21 et_pb_divider_position_ et_pb_space" data-dcnode-id="3653"><div class="et_pb_divider_internal" data-dcnode-id="3654"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_11 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3637"><span data-dcnode-id="3652" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">Death Toll</span></h5><span data-dcnode-id="3649" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3641"><span data-dcnode-id="3648" instrument_node="">
					For many years it was accepted that 105 people were killed in the Wilkinson’s bombing disaster. As a result of research for this website that figure has been revised up to 107. Here’s how…</span><p data-dcnode-id="3647"></p><span data-dcnode-id="3646" instrument_node="">
</span><p data-dcnode-id="3642"><a data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/casualty-controversy/"><span data-dcnode-id="3645" instrument_node="">Read more</span></a><span data-dcnode-id="3643" instrument_node="">
</span></p></div><span data-dcnode-id="3640" instrument_node=""> </span><span data-dcnode-id="3638" instrument_node="">
</span></div><span data-dcnode-id="3636" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_22 et_pb_divider_position_ et_pb_space" data-dcnode-id="3633"><div class="et_pb_divider_internal" data-dcnode-id="3634"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_12 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3617"><span data-dcnode-id="3632" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">Close to Home</span></h5><span data-dcnode-id="3629" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3621"><span data-dcnode-id="3628" instrument_node="">
					The embedded map&nbsp;shows the victims’ residences in relation to the location of the air raid shelter at Wilkinsons. Residents of Upper Queen Street and Church Street had a bad time of it. Very many of the victims lived within 400m of the shelter. Their houses were largely untouched by the 2 bombs which fell on George Street that night. Had they only stayed at home….</span><p data-dcnode-id="3627"></p><span data-dcnode-id="3626" instrument_node="">
</span><p data-dcnode-id="3622"><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/proximity-map/"><span data-dcnode-id="3625" instrument_node="">Read more</span></a><span data-dcnode-id="3623" instrument_node="">
</span></p></div><span data-dcnode-id="3620" instrument_node=""> </span><span data-dcnode-id="3618" instrument_node="">
</span></div><span data-dcnode-id="3616" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_23 et_pb_divider_position_ et_pb_space" data-dcnode-id="3613"><div class="et_pb_divider_internal" data-dcnode-id="3614"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_13 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3597"><span data-dcnode-id="3612" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">Preston Cemetery</span></h5><span data-dcnode-id="3609" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3601"><span data-dcnode-id="3608" instrument_node="">
					The majority of those killed at Wilkinsons are buried at Preston Cemetery, North Shields. The headstones are located throughout this beautiful cemetery according to denomination. However, there is a communal plot for those&nbsp;victims buried at the Borough’s expense. All have similar headstones (modelled on CWG headstones). This area can be found by walking up to the top end from the main entrance. Once past the Victorian/Edwardian graves bordered by hedges, the graves appear on your left.</span><p data-dcnode-id="3607"></p><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3602"><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/preston-cemetery-gravestones/"><span data-dcnode-id="3605" instrument_node="">Read more</span></a><span data-dcnode-id="3603" instrument_node="">
</span></p></div><span data-dcnode-id="3600" instrument_node=""> </span><span data-dcnode-id="3598" instrument_node="">
</span></div><span data-dcnode-id="3596" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_24 et_pb_divider_position_ et_pb_space" data-dcnode-id="3593"><div class="et_pb_divider_internal" data-dcnode-id="3594"></div></div><span data-dcnode-id="3592" instrument_node="">
</span></div><span data-dcnode-id="3590" instrument_node=""> </span><span data-dcnode-id="3588" instrument_node="">
</span></div><span data-dcnode-id="3586" instrument_node=""> </span><span data-dcnode-id="3584" instrument_node="">
</span></div><span data-dcnode-id="3582" instrument_node=""> </span><div class="et_pb_section et_pb_section_5 et_pb_with_background et_section_regular" data-dcnode-id="3514"><span data-dcnode-id="3580" instrument_node="">
</span><div class="et_pb_row et_pb_row_4 et_pb_row_1-4_3-4" data-dcnode-id="3518"><span data-dcnode-id="3579" instrument_node="">
</span><div class="et_pb_column et_pb_column_1_4 et_pb_column_8 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="3549"><span data-dcnode-id="3578" instrument_node="">
</span><div class="et_pb_module et_pb_divider et_pb_divider_25 et_pb_divider_position_ et_pb_space" data-dcnode-id="3576"><div class="et_pb_divider_internal" data-dcnode-id="3577"></div></div><div class="et_pb_module et_pb_divider et_pb_divider_26 et_pb_divider_position_ et_pb_space" data-dcnode-id="3574"><div class="et_pb_divider_internal" data-dcnode-id="3575"></div></div><div class="et_pb_module et_pb_text et_pb_text_11 et_pb_bg_layout_dark et_pb_text_align_left" data-dcnode-id="3569"><span data-dcnode-id="3573" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Memories</span></div><span data-dcnode-id="3570" instrument_node="">
</span></div><span data-dcnode-id="3568" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_12 et_pb_bg_layout_dark et_pb_text_align_left" data-dcnode-id="3560"><span data-dcnode-id="3566" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3562"><span data-dcnode-id="3565" instrument_node="">Memories of Wilkinson’s and wartime North Shields are always welcomed.</span><br data-dcnode-id="3564"><span data-dcnode-id="3563" instrument_node="">
Get in touch!</span></div><span data-dcnode-id="3561" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="3555"><img alt="memories" class="aligncenter size-full wp-image-116034" data-dcnode-id="3556" height="102" sizes="(max-width: 383px) 100vw, 383px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/northshields173.org/wp-content/uploads/2017/05/memories.png%3Fresize%3D383%252C381%26ssl%3D1&amp;raw" srcset="https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/memories.png?w=383&amp;ssl=1 383w, https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/memories.png?resize=250%2C250&amp;ssl=1 250w, https://i1.wp.com/northshields173.org/wp-content/uploads/2017/05/memories.png?resize=65%2C65&amp;ssl=1 65w" width="103"></div><span data-dcnode-id="3554" instrument_node="">
</span></div><span data-dcnode-id="3552" instrument_node=""> </span><span data-dcnode-id="3550" instrument_node="">
</span></div><span data-dcnode-id="3548" instrument_node=""> </span><div class="et_pb_column et_pb_column_3_4 et_pb_column_9 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3522"><span data-dcnode-id="3546" instrument_node="">
</span><div class="et_pb_module et_pb_divider et_pb_divider_27 et_pb_divider_position_ et_pb_space" data-dcnode-id="3544"><div class="et_pb_divider_internal" data-dcnode-id="3545"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_14 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3528"><span data-dcnode-id="3543" instrument_node="">

					The British people were bombarded with propaganda by the Ministry of Information, in every aspect of their lives. The government met part of the enormous expense of the war by borrowing from the people through savings campaigns. They combined the appeal to save with patriotism and community spirit. Salute the Soldier was one of the largest and most successful campaigns with towns encouraged to compete against one another to raise the biggest funds. Tynemouth’s target was £500,000, enough to equip an infantry brigade (2000-3000 men) for the local 50th Northumbrian Division.</span><p data-dcnode-id="3329"></p><span data-dcnode-id="3328" instrument_node="">

					William Arthur Wilkinson came from Gateshead to North Shields in 1866 as a young hairdresser, opening a barber shop at 48 Clive Street in the town. In the 1875 Ward’s Directory, he is listed also as a soda water manufacturer at Elder’s Quay. Directories from 1879 have him as an Ale and Porter merchant and mineral water manufacturer operating from Coach Lane, North Shields.</span><p data-dcnode-id="3105"></p><span data-dcnode-id="3104" instrument_node="">

</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3059"><span data-dcnode-id="3066" instrument_node="">
					Still living nearby was one of Wilkinson’s former employees, an elderly man called Billy. In his broad Shields accent he invited us into his small terraced house to tell us his story. He took us into his front room and settled into his chair beside the gas fire, he talked about his years working for Wilkinson and showed tremendous affection for his old boss. His memory was sharp for a man in his eighties, and we struggled to write even half of it down into our notebook.</span><p data-dcnode-id="3065"></p><span data-dcnode-id="3064" instrument_node="">
</span><p data-dcnode-id="3060"><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/the-last-employee/"><span data-dcnode-id="3063" instrument_node="">Read more</span></a><span data-dcnode-id="3061" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="2976"><span data-dcnode-id="2983" instrument_node="">Award-winning, North Shields born author of &nbsp;</span><strong data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">The Machine Gunners</span></strong><span data-dcnode-id="2980" instrument_node="">,&nbsp;</span><strong data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">The Kingdom By The Sea</span></strong><span data-dcnode-id="2977" instrument_node="">…and many more</span></div><span data-dcnode-id="2975" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="2969"><img alt="" class="aligncenter size-full wp-image-116103" data-dcnode-id="2970" height="103" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/northshields173.org/wp-content/uploads/2017/05/westall.png%3Fresize%3D250%252C250%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/northshields173.org/wp-content/uploads/2017/05/westall.png?w=250&amp;ssl=1 250w, https://i0.wp.com/northshields173.org/wp-content/uploads/2017/05/westall.png?resize=65%2C65&amp;ssl=1 65w" width="103"></div><span data-dcnode-id="2968" instrument_node="">

</span><h5 class="et_pb_toggle_title" data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">The Robert Westall Connection</span></h5><span data-dcnode-id="2954" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2946"><span data-dcnode-id="2953" instrument_node="">
					Robert Westall (1929-1993) was the author of 50 acclaimed works for children, including such&nbsp; twentieth century classics as;&nbsp; “The Machine-Gunners”, “The Kingdom by the Sea”&nbsp; and “Blitzcat”.&nbsp;He&nbsp;grew up in North Shields, the setting of many of his books and when war broke out he was 10 – a good age to enjoy it. War was exciting – Tyneside was heavily bombed and young Bob had to live through the terror of the air raids. His father was a key figure in local ARP and was on duty the night of the Wilkinson’s disaster.</span><p data-dcnode-id="2952"></p><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2947"><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/robert-westall-connection/"><span data-dcnode-id="2950" instrument_node="">Read more</span></a><span data-dcnode-id="2948" instrument_node="">
</span></p></div><span data-dcnode-id="2945" instrument_node=""> </span><span data-dcnode-id="2943" instrument_node="">
</span></div><span data-dcnode-id="2941" instrument_node=""> </span><div class="et_pb_module et_pb_divider et_pb_divider_59 et_pb_divider_position_ et_pb_space" data-dcnode-id="2938"><div class="et_pb_divider_internal" data-dcnode-id="2939"></div></div><div class="et_pb_module et_pb_toggle et_pb_toggle_36 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2922"><span data-dcnode-id="2937" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Robert Westall Biography</span></h5><span data-dcnode-id="2934" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2926"><span data-dcnode-id="2933" instrument_node="">
					Robert Westall may have left the North East in his early twenties, but he returned to it time and again in his writing, whose roots lay in his childhood and young adult experiences in wartime Tyneside. Indeed, it was his desire to share that experience with his 12 year old son Chris that inspired his celebrated first novel The Machine Gunners.</span><p data-dcnode-id="2932"></p><span data-dcnode-id="2931" instrument_node="">

</span><h4 class="et_pb_module_header" data-dcnode-id="2800"><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//northshields173.org/bomb-photos-1940-1943/"><span data-dcnode-id="2802" instrument_node="">Tynemouth Bomb Photos 1940-1943</span></a></h4><span data-dcnode-id="2799" instrument_node="">
</span><div class="et_pb_blurb_description" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">During air raids on Tynemouth borough since June 22, 1940, 225 persons lost their lives, 150 were seriously injured and 325 slightly injured. A total of 310 high explosive bombs have been dropped in the town, 19 parachute mines and approximately 18000 incendiary bombs. There have been 253 alerts and bombs have dropped on 31 occasions.</span></div><span data-dcnode-id="2796" instrument_node="">

</span><div class="et_pb_blurb_description" data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Luftwaffe Stadtplan of North Shields showing military targets. Note that the two local hospitals are clearly marked in red on the map. &nbsp;Although based on an Ordnance Survey 6″: 1 mile, it is slightly enlarged to a scale of 1:10,000. The Germans would have been able to buy OS maps without any problems in the years before 1939.</span></div><span data-dcnode-id="2767" instrument_node="">
