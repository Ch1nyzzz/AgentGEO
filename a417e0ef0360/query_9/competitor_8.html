a-dcnode-id="7752" instrument_node="">Published</span></span><span class="articleContent__PublicationValue-sc-2yl9jy-7 khHUcu" data-dcnode-id="7749"><span data-dcnode-id="7750" instrument_node="">04 Aug 2020</span></span></div></div></div><article class="sc-jtRlXQ fCSoxK article_body" data-dcnode-id="408"><div data-dcnode-id="409"><div class="xml-content" data-dcnode-id="989"><h4 class="header" data-dcnode-id="7744" id="abstract"><span data-dcnode-id="7745" instrument_node="">Abstract</span></h4><p data-dcnode-id="7742"><span data-dcnode-id="7743" instrument_node="">Predicting air quality is a complex task due to the dynamic nature, volatility, and high variability in time and space of pollutants and particulates. At the same time, being able to model, predict, and monitor air quality is becoming more and more relevant, especially in urban areas, due to the observed critical impact of air pollution on citizens’ health and the environment. In this paper, we employ a popular machine learning method, support vector regression (SVR), to forecast pollutant and particulate levels and to predict the air quality index (AQI). Among the various tested alternatives, radial basis function (RBF) was the type of kernel that allowed SVR to obtain the most accurate predictions. Using the whole set of available variables revealed a more successful strategy than selecting features using principal component analysis. The presented results demonstrate that SVR with RBF kernel allows us to accurately predict hourly pollutant concentrations, like carbon monoxide, sulfur dioxide, nitrogen dioxide, ground-level ozone, and particulate matter 2.5, as well as the hourly AQI for the state of California. Classification into six AQI categories defined by the US Environmental Protection Agency was performed with an accuracy of 94.1% on unseen validation data.</span></p><span class="end-abs" data-dcnode-id="7741"></span><h4 data-dcnode-id="7739" id="introduction"><span data-dcnode-id="7740" instru </span></div><span data-dcnode-id="7661" instrument_node="">]. Total combustion emissions in the US are accountable for about 200,000 premature deaths per year due to the concentration of pollutants such as particulate matter 2.5 (PM</span><sub data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">2.5</span></sub><span data-dcnode-id="7658" instrument_node="">) and 10,000 deaths per year due to ozone concentration changes. The American Lung Association estimated that air pollution-related illnesses cost approximately 37 billion dollars each year in the US, with California alone hitting $15 billion [</span><a class="refAnchor" data-dcnode-id="7641"><span data-dcnode-id="7657" instrument_node="">5</span></a><div class="tooltip" data-dcnode-id="7642"><a class="refAnchor" data-dcnode-id="7641"><span data-dcnode-id="7656" instrument_node="">

</span></div><span data-dcnode-id="7640" instrument_node="">].</span><p></p><p data-dcnode-id="7637"><span data-dcnode-id="7638" instrument_node="">In the face of increasingly serious environmental pollution problems, scholars have conducted a significant quantity of related research, and in those studies, the forecasting of air pollution has been of paramount importance. Thus, in full knowledge of the increasing pollution derived problems, the importance of accurately forecasting the levels of air pollutants has increased, playing an important role in air quality management and population prevention against pollution hexes.</span></p><p data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">The study aims to build models for hourly air quality forecasting for the state of California, using one of the most powerful existing machine learning (ML) approaches, namely, a variant of support vector machines (SVMs), called support vector regression (SVR). The proposal is to build an SVR model for the prediction of each pollutant and particulate measurement on an hourly basis and an SVR model to predict the hourly air quality index (AQI) for the state of California.</span></p><p data-dcnode-id="7612"><span data-dcnode-id="7634" instrument_node="">The paper is organized as follows. Section </span><a data-dcnode-id="7632" href="#background-and-motivation"><span data-dcnode-id="7633" instrument_node="">2</span></a><span data-dcnode-id="7631" instrument_node=""> frames and motivates the work, giving an idea of the impactful contribution represented by a successful predicting model for air quality. Section </span><a data-dcnode-id="7629" href="#previous-and-related-work"><span data-dcnode-id="7630" instrument_node="">3</span></a><span data-dcnode-id="7628" instrument_node=""> contains a critical revision of the literature, discussing previous and related work. In Section </span><a data-dcnode-id="7626" href="#support-vector-machines"><span data-dcnode-id="7627" instrument_node="">4</span></a><span data-dcnode-id="7625" instrument_node="">, we introduce SVM, with a particular focus on the functioning of SVR. Section </span><a data-dcnode-id="7623" href="#data-description"><span data-dcnode-id="7624" instrument_node="">5</span></a><span data-dcnode-id="7622" instrument_node=""> contains a description of the data used in this work. In Section </span><a data-dcnode-id="7620" href="#data-preprocessing"><span data-dcnode-id="7621" instrument_node="">6</span></a><span data-dcnode-id="7619" instrument_node="">, we discuss the data preprocessing phase that we performed to obtain a more compact and informative dataset to be used by SVR. Section </span><a data-dcnode-id="7617" href="#experimental-study"><span data-dcnode-id="7618" instrument_node="">7</span></a><span data-dcnode-id="7616" instrument_node=""> presents our experimental study; it is partitioned into a description of the employed experimental settings and a discussion of the obtained results. Finally, Section </span><a data-dcnode-id="7614" href="#conclusions-and-future-work"><span data-dcnode-id="7615" instrument_node="">8</span></a><span data-dcnode-id="7613" instrument_node=""> concludes the paper and discusses ideas for future research.</span></p><h4 data-dcnode-id="7610" id="background-and-motivation"><span data-dcnode-id="7611" instrument_node="">2. Background and Motivation</span></h4><p data-dcnode-id="7588"><span data-dcnode-id="7609" instrument_node="">Air pollution is considered to occur whenever harmful or excessive quantities of defined substances such as gases, particulates, and biological molecules are introduced into the atmosphere. These excessive emissions have obvious consequences, causing diseases and death of populations and other living organisms and impairing crops. Air pollutants can either be solid particles, liquid droplets, or gases, which are classified into the following:</span><span class="list" data-dcnode-id="7589"><span class="list-item" data-dcnode-id="7595"><span class="list-label" data-dcnode-id="7607"><span data-dcnode-id="7608" instrument_node=""> </span></span><span class="list-content" data-dcnode-id="7596"><span data-dcnode-id="7606" instrument_node="">Primary pollutants, which are emitted from the source directly to the atmosphere. The sources can be either natural processes, such as sandstorms or human-related, such as industry and vehicle emissions. The most common primary pollutants are sulfur dioxide (SO</span><sub data-dcnode-id="7604"><span data-dcnode-id="7605" instrument_node="">2</span></sub><span data-dcnode-id="7603" instrument_node="">)</span><sub data-dcnode-id="7601"><span data-dcnode-id="7602" instrument_node="">,</span></sub><span data-dcnode-id="7600" instrument_node=""> particulate matter (PM), nitrogen dioxide (NO</span><sub data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">x</span></sub><span data-dcnode-id="7597" instrument_node="">), and carbon monoxide (CO).</span></span></span><span class="list-item" data-dcnode-id="7590"><span class="list-label" data-dcnode-id="7593"><span data-dcnode-id="7594" instrument_node=""> </span></span><span class="list-content" data-dcnode-id="7591"><span data-dcnode-id="7592" instrument_node="">Secondary pollutants, which are air pollutants formed in the atmosphere, resulting from the chemical or physical interactions between primary pollutants. Photochemical oxidants and secondary particulate matter are the major examples of secondary pollutants.</span></span></span></span></p><p data-dcnode-id="7556"><span data-dcnode-id="7587" instrument_node="">The most common air pollutants are known as the criteria pollutants, which correspond to the most widespread health threats, e.g., CO, SO</span><sub data-dcnode-id="7585"><span data-dcnode-id="7586" instrument_node="">2</span></sub><span data-dcnode-id="7584" instrument_node="">, lead, ground-level ozone (O</span><sub data-dcnode-id="7582"><span data-dcnode-id="7583" instrument_node="">3</span></sub><span data-dcnode-id="7581" instrument_node="">), NO</span><sub data-dcnode-id="7579"><span data-dcnode-id="7580" instrument_node="">2</span></sub><span data-dcnode-id="7578" instrument_node="">, and PM. The levels of these pollutants are measured by the US Environmental Protection Agency (EPA), which controls overall air quality. Scientific research has demonstrated a correlation between short-term exposure to this kind of pollutants and many health problems, like limited ability to respond to increased oxygen demands when exercising (especially for people with heart conditions), airway inflammation in healthy people and increased respiratory symptoms for people with asthma, respiratory emergencies particularly for children and the elderly, and so on [</span><a class="refAnchor" data-dcnode-id="7558"><span data-dcnode-id="7577" instrument_node="">6</span></a></p><div class="tooltip" data-dcnode-id="7559"><a class="refAnchor" data-dcnode-id="7558"><span data-dcnode-id="7576" instrument_node="">
</span><img class="cross" data-dcnode-id="7575" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB3aWR0aD0iMTQiIGhlaWdodD0iMTQiIHZpZXdCb3g9IjAgMCAxNCAxNCI+PGRlZnM+PGNsaXBQYXRoIGlkPSJhIj48cGF0aCBkPSJNMTIuMjkzLDEzLjcwNyw3LDguNDE0LDEuNzA3LDEzLjcwN0ExLDEsMCwwLDEsLjI5MiwxMi4yOTNMNS41ODUsNywuMjkyLDEuNzA3QTEsMSwwLDAsMSwxLjcwNy4yOTJMNyw1LjU4NSwxMi4yOTMuMjkyYTEsMSwwLDAsMSwxLjQxNCwxLjQxNUw4LjQxNCw3bDUuMjkzLDUuMjkzYTEsMSwwLDEsMS0xLjQxNCwxLjQxNFoiIHRyYW5zZm9ybT0idHJhbnNsYXRlKDAgMCkiLz48L2NsaXBQYXRoPjwvZGVmcz48ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgwIDApIiBjbGlwLXBhdGg9InVybCgjYSkiPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKC01IC01KSI+PHJlY3Qgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0IiBmaWxsPSJyZ2JhKDAsMCwwLDApIi8+PHJlY3Qgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0IiBmaWxsPSIjNmJhNDM5Ii8+PC9nPjwvZz48L3N2Zz4="><span data-dcnode-id="7574" instrument_node="">
</span></a><ol data-dcnode-id="7564" start="6"><a class="refAnchor" data-dcnode-id="7558"></a><li data-dcnode-id="7565"><a class="refAnchor" data-dcnode-id="7558"><span data-dcnode-id="7573" instrument_node="">US Environmental Protection Agency (US EPA), “Criteria air pollutants,” </span><i data-dcnode-id="7571"><span data-dcnode-id="7572" instrument_node="">America’s Children and the Environment</span></i><span data-dcnode-id="7570" instrument_node="">, US EPA, Washington, DC, USA, 2015. </span><span class="reflinks" data-dcnode-id="7566"><span data-dcnode-id="7569" instrument_node="">View at: </span></span></a><a data-dcnode-id="7567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DCriteria%2520air%2520pollutants%26author%3DUS%2520Environmental%2520Protection%2520Agency%2520%28US%2520EPA%29%26publication_year%3D2015" target="_blank"><span data-dcnode-id="7568" instrument_node="">Google Scholar</span></a></li></ol><span data-dcnode-id="7563" instrument_node="">

</span></div><span data-dcnode-id="7557" instrument_node="">].</span><p></p><p data-dcnode-id="7554"><span data-dcnode-id="7555" instrument_node="">EPA, EU, and many other national environmental agencies have set standards and air quality guidelines regarding allowable levels for these pollutants. The air quality index (AQI) is an indicator created to report air quality, measuring how clean or unhealthy the air is and what associated health effects might be a concern, especially for risk groups. It focuses on health effects that can be experienced within a few hours or days after being exposed to polluted air. It is calculated based on the maximum individual AQI registered for the criteria pollutants mentioned above.</span></p><p data-dcnode-id="7534"><span data-dcnode-id="7553" instrument_node="">Building a forecasting system, based on the levels of concentration of individual pollutants, that can predict air quality hourly, will make the AQI more flexible and useful for the population’s health. Systems that can generate warnings based on air quality are therefore needed and important for the populations. They may play an important role in health alerts when air pollution levels might exceed the specified levels; also, they may integrate existing emission control programs, for instance, by allowing environmental regulators the option of “on-demand” emission reductions, operational planning, or even emergency response [</span><a class="refAnchor" data-dcnode-id="7536"><span data-dcnode-id="7552" instrument_node="">7</span></a></p><div class="tooltip" data-dcnode-id="7537"><a class="refAnchor" data-dcnode-id="7536"><span data-dcnode-id="7551" instrument_node="">

2</span></a><span data-dcnode-id="4211" instrument_node=""> and </span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig3/" target="_blank"><span data-dcnode-id="4210" instrument_node="">3</span></a><span data-dcnode-id="4208" instrument_node="">.</span></p><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="4180" data-section="fig2"><div class="floats-partial-content fig-content-fig2 owl-loaded owl-drag" data-dcnode-id="4191"><div class="owl-stage-outer" data-dcnode-id="4200"><div class="owl-stage" data-dcnode-id="4201" style="transform: translate3d(0px, 0px, 0px); transition: all 0s ease 0s; width: 538px;"><div class="owl-item active" data-dcnode-id="4202" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="4203"><img alt="" data-dcnode-id="4206" name="8049504.fig.002" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.002.svgz&amp;raw"><br data-dcnode-id="4205"><strong data-dcnode-id="4204"></strong></div></div></div></div><div class="owl-nav disabled" data-dcnode-id="4195"><button class="owl-prev disabled" data-dcnode-id="4198" role="presentation" type="button"><span data-dcnode-id="4199" instrument_node="">&lt;- Prev</span></button><button class="owl-next disabled" data-dcnode-id="4196" role="presentation" type="button"><span data-dcnode-id="4197" instrument_node="">Next -&gt;</span></button></div><div class="owl-dots disabled" data-dcnode-id="4192"><button class="owl-dot active" data-dcnode-id="4193" role="button"><span data-dcnode-id="4194"></span></button></div></div><div class="floats-partial-footer" data-dcnode-id="4181"><div class="floats-partial-caption" data-dcnode-id="4184"><span class="expand_btn" data-dcnode-id="4190"></span><span class="minimize_btn" data-dcnode-id= ativity are the first and foremost points to guarantee the successful building of forecasting models. The data preprocessing step often impacts the generalization ability of a machine learning algorithm [</span><a class="refAnchor" data-dcnode-id="4125"><span data-dcnode-id="4144" instrument_node="">36</span></a></p><div class="tooltip" data-dcnode-id="4126"><a class="refAnchor" data-dcnode-id="4125"><span data-dcnode-id="4143" instrument_node="">

</span></div><span data-dcnode-id="4124" instrument_node="">]. Data preprocessing usually encompasses missing data imputation, removing or modifying outlier observations, data transformation (often normalization and standardization), and feature engineering. While the first two steps are useful to have more accurate and complete sets of data, the third one is typically used to have more uniformly distributed data and to minimize data variability. Finally, the fourth step is used to obtain a new, typically smaller, and more informative dataset. This last step is typically composed of feature extraction and feature selection. In the continuation of this section, we describe how these steps were accomplished in this work.</span><p></p><h5 data-dcnode-id="4121" id="sec6.1"><span data-dcnode-id="4122" instrument_node="">6.1. Missing Data Imputation</span></h5><p data-dcnode-id="4091"><span data-dcnode-id="4120" instrument_node="">In our dataset, the majority of missing data is present in the qualifier variable for all pollutants, particles, and meteorological conditions, followed by CO sample measurements. Given the large number of missing values for pollutants qualifier features, more than 50% of the total available events, it was decided to discard them from the dataset. For all the other categorical variables, it was decided to fill the missing values with the most common value from each feature, as suggested in [</span><a class="refAnchor" data-dcnode-id="4096"><span data-dcnode-id="4119" instrument_node="">37</span></a></p><div class="tooltip" data-dcnode-id="4097"><a class="refAnchor" data-dcnode-id="4096"><span data-dcnode-id="4118" instrument_node="">

</span></a><ol data-dcnode-id="4102" start="37"><a class="refAnchor" data-dcnode-id="4096"></a><li data-dcnode-id="4103"><a class="refAnchor" data-dcnode-id="4096"><span data-dcnode-id="4115" instrument_node="">G. E. A. P. A. Batista and M. C. Monard, “An analysis of four missing data treatment methods for supervised learning,” </span><i data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">Applied Artificial Intelligence</span></i><span data-dcnode-id="4112" instrument_node="">, vol. 17, no. 5-6, pp. 519–533, 2003. </span><span class="reflinks" data-dcnode-id="4104"><span data-dcnode-id="4111" instrument_node="">View at: </span></span></a><a data-dcnode-id="4109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/713827181" target="_blank"><span data-dcnode-id="4110" instrument_node="">Publisher Site</span></a><span class="sep" data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node=""> | </span></span><a data-dcnode-id="4105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DAn%2520analysis%2520of%2520four%2520missing%2520data%2520treatment%2520methods%2520for%2520supervised%2520learning%26author%3DG.%2520E.%2520A.%2520P.%2520A.%2520Batista%2520%26author%3DM.%2520C.%2520Monard%26publication_year%3D2003" target="_blank"><span data-dcnode-id="4106" instrument_node="">Google Scholar</span></a></li></ol><span data-dcnode-id="4101" instrument_node="">
</span><a class="seeRef" data-dcnode-id="4099" href="#B37"><span data-dcnode-id="4100" instrument_node="">See in References</span></a><span data-dcnode-id="4098" instrument_node="">
</span></div><span data-dcnode-id="4095" instrument_node="">]. We used the estimation of a 2</span><sup data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">nd</span></sup><span data-dcnode-id="4092" instrument_node=""> order polynomial to handle the missing data for numerical variables (CO, SO2, NO2, PM2.5, outdoor temperature, relative humidity, and wind speed). This method was adopted because it outperformed the more traditional imputation using the series mean or linear interpolation (these preliminary experimental results are not shown here to save space).</span><p></p><h5 data-dcnode-id="4089" id="sec6.2"><span data-dcnode-id="4090" instrument_node="">6.2. Removing Outliers</span></h5><p data-dcnode-id="4081"><span data-dcnode-id="4088" instrument_node="">An irregular behavior was observed in the SO</span><sub data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">2</span></sub><span data-dcnode-id="4085" instrument_node=""> series for the last months of 2018, as shown in Figure </span><a data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig4/" target="_blank"><span data-dcnode-id="4084" instrument_node="">4</span></a><span data-dcnode-id="4082" instrument_node="">, where the levels are much lower than expected.</span></p><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="4051" data-section="fig4"><div class="floats-partial-content fig-content-fig4 owl-loaded owl-drag" data-dcnode-id="4065"><div class="owl-stage-outer" data-dcnode-id="4074"><div class="owl-stage" data-dcnode-id="4075" style="transform: translate3d(0px, 0px, 0px); transition: all 0s ease 0s; width: 538px;"><div class="owl-item active" data-dcnode-id="4076" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="4077"><img alt="" data-dcnode-id="4080" name="8049504.fig.004" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.004.svgz&amp;raw"><br data-dcnode-id="4079"><strong data-dcnode-id="4078"></strong></div></div></div></div><div class="owl-nav disabled" data-dcnode-id="4069"><button class="owl-prev disabled" data-dcnode-id="4072" role="presentation" type="button"><span data-dcnode-id="4073" instrument_node="">&lt;- Prev</span></button><button class="owl-next disabled" data-dcnode-id="4070" role="presentation" type="button"><span data-dcnode-id="4071" instrument_node="">Next -&gt;</span></button></div><div class="owl-dots disabled" data-dcnode-id="4066"><button class="owl-dot active" data-dcnode-id="4067" role="button"><span data-dcnode-id="4068"></span></button></div></div><div class="floats-partial-footer" data-dcnode-id="4052"><div class="floats-partial-caption" data-dcnode-id="4058"><span class="expand_btn" data-dcnode-id="4064"></span><span class="minimize_btn" data-dcnode-id="4063"></span><span class="caption-text" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Figure 4</span></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig4/" target="_blank" title="full view"><span data-dcnode-id="4060" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="4053"><span data-dcnode-id="4057" instrument_node="">Abnormal behavior detected for SO</span><sub data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">2</span></sub><span data-dcnode-id="4054" instrument_node=""> levels for the last months of 2018.</span></div></div></div><p data-dcnode-id="4046"><span data-dcnode-id="4050" instrument_node="">As these observations are outliers, the decision was to remove all the observations from March 2018 onwards, for the SO</span><sub data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">2</span></sub><span data-dcnode-id="4047" instrument_node=""> series.</span></p><h5 data-dcnode-id="4044" id="sec6.3"><span data-dcnode-id="4045" instrument_node="">6.3. Data Transformation</span></h5><p data-dcnode-id="3992"><span data-dcnode-id="4043" instrument_node="">We selected the Yeo-Johnson power transformation method [</span><a class="refAnchor" data-dcnode-id="4019"><span data-dcnode-id="4042" instrument_node="">38</span></a></p><div class="tooltip" data-dcnode-id="4020"><a class="refAnchor" data-dcnode-id="4019"><span data-dcnode-id="4041" instrument_node="">
</span><img class="cross" data-dcnode-id="4040" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB3aWR0aD0iMTQiIGhlaWdodD0iMTQiIHZpZXdCb3g9IjAgMCAxNCAxNCI+PGRlZnM+PGNsaXBQYXRoIGlkPSJhIj48cGF0aCBkPSJNMTIuMjkzLDEzLjcwNyw3LDguNDE0LDEuNzA3LDEzLjcwN0ExLDEsMCwwLDEsLjI5MiwxMi4yOTNMNS41ODUsNywuMjkyLDEuNzA3QTEsMSwwLDAsMSwxLjcwNy4yOTJMNyw1LjU4NSwxMi4yOTMuMjkyYTEsMSwwLDAsMSwxLjQxNCwxLjQxNUw4LjQxNCw3bDUuMjkzLDUuMjkzYTEsMSwwLDEsMS0xLjQxNCwxLjQxNFoiIHRyYW5zZm9ybT0idHJhbnNsYXRlKDAgMCkiLz48L2NsaXBQYXRoPjwvZGVmcz48ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgwIDApIiBjbGlwLXBhdGg9InVybCgjYSkiPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKC01IC01KSI+PHJlY3Qgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0IiBmaWxsPSJyZ2JhKDAsMCwwLDApIi8+PHJlY3Qgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0IiBmaWxsPSIjNmJhNDM5Ii8+PC9nPjwvZz48L3N2Zz4="><span data-dcnode-id="4039" instrument_node="">
</span></a><ol data-dcnode-id="4025" start="38"><a class="refAnchor" data-dcnode-id="4019"></a><li data-dcnode-id="4026"><a class="refAnchor" data-dcnode-id="4019"><span data-dcnode-id="4038" instrument_node="">I.-K. Yeo and R. A. Johnson, “A new family of power transformations to improve normality or symmetry author (s),” </span><i data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">Biometrika</span></i><span data-dcnode-id="4035" instrument_node="">, vol. 87, no. 4, pp. 954–959, 2000. </span><span class="reflinks" data-dcnode-id="4027"><span data-dcnode-id="4034" instrument_node="">View at: </span></span></a><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1093/biomet/87.4.954" target="_blank"><span data-dcnode-id="4033" instrument_node="">Publisher Site</span></a><span class="sep" data-dcnode-id="4030"><span data-dcnode-id="4031" instrument_node=""> | </span></span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DA%2520new%2520family%2520of%2520power%2520transformations%2520to%2520improve%2520normality%2520or%2520symmetry%2520author%2520%28s%29%26author%3DI.-K.%2520Yeo%2520%26author%3DR.%2520A.%2520Johnson%26publication_year%3D2000" target="_blank"><span data-dcnode-id="4029" instrument_node="">Google Scholar</span></a></li></ol><span data-dcnode-id="4024" instrument_node="">
</span><a class="seeRef" data-dcnode-id="4022" href="#B38"><span data-dcnode-id="4023" instrument_node="">See in References</span></a><span data-dcnode-id="4021" instrument_node="">
</span></div><span data-dcnode-id="4018" instrument_node="">] to transform our data. This choice is motivated by the fact that, as reported in [</span><a class="refAnchor" data-dcnode-id="3994"><span data-dcnode-id="4017" instrument_node="">39</span></a><div class="tooltip" data-dcnode-id="3995"><a class="refAnchor" data-dcnode-id="3994"><span data-dcnode-id="4016" instrument_node="">
</span><img class="cross" data-dcnode-id="4015" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB3aWR0aD0iMTQiIGhlaWdodD0iMTQiIHZpZXdCb3g9IjAgMCAxNCAxNCI+PGRlZnM+PGNsaXBQYXRoIGlkPSJhIj48cGF0aCBkPSJNMTIuMjkzLDEzLjcwNyw3LDguNDE0LDEuNzA3LDEzLjcwN0ExLDEsMCwwLDEsLjI5MiwxMi4yOTNMNS41ODUsNywuMjkyLDEuNzA3QTEsMSwwLDAsMSwxLjcwNy4yOTJMNyw1LjU4NSwxMi4yOTMuMjkyYTEsMSwwLDAsMSwxLjQxNCwxLjQxNUw4LjQxNCw3bDUuMjkzLDUuMjkzYTEsMSwwLDEsMS0xLjQxNCwxLjQxNFoiIHRyYW5zZm9ybT0idHJhbnNsYXRlKDAgMCkiLz48L2NsaXBQYXRoPjwvZGVmcz48ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgwIDApIiBjbGlwLXBhdGg9InVybCgjYSkiPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKC01IC01KSI+PHJlY3Qgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0IiBmaWxsPSJyZ2JhKDAsMCwwLDApIi8+PHJlY3Qgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0IiBmaWxsPSIjNmJhNDM5Ii8+PC9nPjwvZz48L3N2Zz4="><span data-dcnode-id="4014" instrument_node="">
</span></a><ol data-dcnode-id="4000" start="39"><a class="refAnchor" data-dcnode-id="3994"></a><li data-dcnode-id="4001"><a class="refAnchor" data-dcnode-id="3994"><span data-dcnode-id="4013" instrument_node="">S. G. Gocheva-Ilieva, A. V. Ivanov, D. S. Voynikova, and D. T. Boyadzhiev, “Time series analysis and forecasting for air pollution in small urban area: an SARIMA and factor analysis approach,” </span><i data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">Stochastic Environmental Research and Risk Assessment</span></i><span data-dcnode-id="4010" instrument_node="">, vol. 28, no. 4, pp. 1045–1060, 2014. </span><span class="reflinks" data-dcnode-id="4002"><span data-dcnode-id="4009" instrument_node="">View at: </span></span></a><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/s00477-013-0800-" target="_blank"><span data-dcnode-id="4008" instrument_node="">Publisher Site</span></a><span class="sep" data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node=""> | </span></span><a data-dcnode-id="4003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DTime%2520series%2520analysis%2520and%2520forecasting%2520for%2520air%2520pollution%2520in%2520small%2520urban%2520area%3A%2520an%2520SARIMA%2520and%2520factor%2520analysis%2520approach%26author%3DS.%2520G.%2520Gocheva-Ilieva%26author%3DA.%2520V.%2520Ivanov%26author%3DD.%2520S.%2520Voynikova%26author%3D%26author%3DD.%2520T.%2520Boyadzhiev%26publication_year%3D2014" target="_blank"><span data-dcnode-id="4004" instrument_node="">Google Scholar</span></a></li></ol><span data-dcnode-id="3999" instrument_node="">
</span><a class="seeRef" data-dcnode-id="3997" href="#B39"><span data-dcnode-id="3998" instrument_node="">See in References</span></a><span data-dcnode-id="3996" instrument_node="">
</span></div><span data-dcnode-id="3993" instrument_node="">], the Yeo-Johnson method provides a nonlinear transformation, less impacted by the presence of abnormal observations. This option allowed us to obtain a dataset with improved features’ distribution and to minimize data variability.</span><p></p><h5 data-dcnode-id="3990" id="sec6.4"><span data-dcnode-id="3991" instrument_node="">6.4. Feature Extraction</span></h5><p data-dcnode-id="3851"><span data-dcnode-id="3989" instrument_node="">The datetime component contained in our dataset was used to obtain new features, valuable to help tease out series seasonality information. Considering all the properties that can be extracted from a datetime type of variable, the following new features were created: month number [1–12], hour of the day [0–23], and weekend added as a Boolean feature. As the hour of the day is, actually, a cyclical variable, it was decided to create two new features through a trigonometric approach, hour_sin =</span><span class="inline_break" data-dcnode-id="3951"><svg data-dcnode-id="3962" height="11.576pt" id="M18" style="vertical-align:-2.2681pt" version="1.1" viewBox="-0.0498162 -9.3079 66.574 11.576" width="66.574pt" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="3987" transform="matrix(.013,0,0,-0.013,0,0)"><path d="M319 325C317 349 306 409 297 431C277 440 250 449 209 449C117 449 57 389 57 319C57 243 122 209 182 182C232 159 261 135 261 91C261 48 227 21 190 21C130 21 85 79 68 145L41 140C41 104 51 36 58 22C75 7 121 -12 172 -12C252 -12 337 35 337 126C337 195 286 231 210 262C166 281 126 304 126 348C126 388 152 417 191 417C240 417 274 378 294 318L319 325Z" data-dcnode-id="3988" id="g121-113"></path></g><g data-dcnode-id="3985" transform="matrix(.013,0,0,-0.013,4.771,0)"><path d="M135 536C164 536 186 560 186 587C186 617 164 639 136 639C109 639 85 617 85 587C85 560 109 536 135 536ZM252 0V26C188 32 181 38 181 106V451C138 433 90 420 39 412V388C99 37 </span></div><span data-dcnode-id="3552" instrument_node="">], some redundant variables were excluded to reduce dataset dimensionality. In particular, the variable referring to the month number presents a high correlation with some pollutants, the same for month cyclical variables (Month_cos and Month_sin). Thus, we eliminated the variable month. An analogous decision was taken for data concerning hour information, with variables Hour_sin and Hour_cos chosen and variable hour eliminated. The season-related features were also excluded from the dataset, given their linear correlation with Month_cos and Month_sin and features reporting on the meteorological conditions. Also, both quarter and weekday were removed, due to a high correlation with the month cyclic and Is_Weekend features.</span><p></p><p data-dcnode-id="3533"><span data-dcnode-id="3550" instrument_node="">The objective of our work is to generate different forecasting models for five different pollutants: CO, NO</span><sub data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">2</span></sub><span data-dcnode-id="3547" instrument_node="">, SO</span><sub data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">2</span></sub><span data-dcnode-id="3544" instrument_node="">, ozone, and PM</span><sub data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">2.5</span></sub><span data-dcnode-id="3541" instrument_node="">. Table </span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab4/" target="_blank"><span data-dcnode-id="3540" instrument_node="">4</span></a><span data-dcnode-id="3538" instrument_node=""> summarizes the features that were maintained in the dataset for the forecasting of each one of these pollutants (features that were maintained in the dataset are marked with “</span><svg data-dcnode-id="3535" height="10.1524pt" id="M20" style="vertical-align:-0.04990005pt" enter" data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">3</span></td><td class="align_center" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">0.032</span></td><td class="align_center" data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">0.767</span></td></tr><tr class="table-tr" data-dcnode-id="2634"><td colspan="9" data-dcnode-id="2635"><hr class="tbody-hr" data-dcnode-id="2636"></td></tr></tbody></table></div></td></tr></tbody></table></div><div class="floats-partial-footer" data-dcnode-id="2614"><div class="floats-partial-caption" data-dcnode-id="2618"><span class="expand_btn" data-dcnode-id="2625"></span><span class="minimize_btn" data-dcnode-id="2624"></span><span class="caption-text" data-dcnode-id="2621"><span data-dcnode-id="2623" instrument_node="">Table 5</span><a class="caption-text-overlay" data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab5" target="_blank"></a></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab5/" target="_blank" title="full view"><span data-dcnode-id="2620" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Random search optimal parameter results per pollutant dataset.</span></div><a class="table-thumb-overlay" data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab5" target="_blank"></a></div></div><p data-dcnode-id="2602"><span data-dcnode-id="2612" instrument_node="">As shown in Table </span><a data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab5/" target="_blank"><span data-dcnode-id="2611" instrument_node="">5</span></a><span data-dcnode-id="2609" instrument_node="">, different values of </span><i data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">C</span></i><span data-dcnode-id="2606" instrument_node=""> and </span><i data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">ε</span></i><span data-dcnode-id="2603" instrument_node=""> were obtained for the different pollutants; on the other hand, the RBF kernel consistently returned the best results. For this reason, from now on, only the RBF kernel will be considered. So, in the next section, two types of results will be analyzed and compared between each other: those obtained by SVR with RBF kernel on the dataset without application of the PCA (SVR-RBF from now on) and those obtained by SVR with RBF kernel on the dataset filtered by PCA (PCA SVR-RBF from now on). We utilized the Pearson correlation, the mean absolute error (MAE), the root mean squared error (RMSE), and the normalized RMSE (nRMSE) as measures to compare these two models between each other. The models were trained using 70% of the available data, which correspond to the period between 02-01-2018 at 08 : 00 : 00 and 07-08-2017 at 00 : 00 : 00. The validation set is composed of the remaining 30% of the observations, which is relative to the period between 07-08-2017 at 01 : 00 : 00 and 01-03-2018 at 23 : 00 : 00.</span></p><h5 data-dcnode-id="2600" id="sec7.2"><span data-dcnode-id="2601" instrument_node="">7.2. Experimental Results</span></h5><p data-dcnode-id="2580"><span data-dcnode-id="2599" instrument_node="">In this section, we report and discuss the experimental results achieved by SVR-RBF and PCA SVR-RBF in the forecasting of five different pollutants (CO, NO</span><sub data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">2</span></sub><span data-dcnode-id="2596" instrument_node="">, SO</span><sub data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">2</span></sub><span data-dcnode-id="2593" instrument_node="">, ozone, and PM</span><sub data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">2.5</span></sub><span data-dcnode-id="2590" instrument_node="">, Sections </span><a data-dcnode-id="2588" href="#sec7.2.1"><span data-dcnode-id="2589" instrument_node="">7.2.1</span></a><span data-dcnode-id="2587" instrument_node=""> to </span><a data-dcnode-id="2585" href="#sec7.2.5"><span data-dcnode-id="2586" instrument_node="">7.2.5</span></a><span data-dcnode-id="2584" instrument_node="">, respectively) and the forecasting of the air quality index (AQI) (Section </span><a data-dcnode-id="2582" href="#sec7.2.6"><span data-dcnode-id="2583" instrument_node="">7.2.6</span></a><span data-dcnode-id="2581" instrument_node="">). The software used for performing this experimental phase was developed in Python (version 3.6), mainly using the Pandas and Scikit-learn packages.</span></p><h6 data-dcnode-id="2578" id="sec7.2.1"><span data-dcnode-id="2579" instrument_node="">7.2.1. Carbon Monoxide (CO)</span></h6><p data-dcnode-id="2564"><span data-dcnode-id="2577" instrument_node="">The results obtained for the forecasting of carbon monoxide are shown in the boxplots of Figure </span><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig7/" target="_blank"><span data-dcnode-id="2576" instrument_node="">7</span></a><span data-dcnode-id="2574" instrument_node="">. Median, first, and third quantiles and maximum and minimum values of the prediction, together with the value of the expected output, are reported. The leftmost plot shows the results obtained before applying the inverse Yeo-Johnson power transformation (indicated as “normalized data” in the figure), whereas the right side reports the data after this transformation (indicated as “denormalized data” in the figure). Inside both these plots, three boxplots are shown: the leftmost one reports the observed CO values, the one in the middle shows the predicted values returned by PCA SVR-RBF, and the rightmost boxplot reports the predicted values returned by SVR-RBF. The obtained predictions have very close median values to the observed carbon monoxide both for PCA SVR-RBF and SVR-RBF. However, the observed CO values present a higher quantity of extreme observations that the forecasting models tend to underestimate. Figure </span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig8/" target="_blank"><span data-dcnode-id="2573" instrument_node="">8</span></a><span data-dcnode-id="2571" instrument_node=""> shows the forecasted values produced by both PCA SVR-RBF (red line) and SVR-RBF (yellow line). The carbon monoxide forecast error statistics are shown in Table </span><a data-dcnode-id="2569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab6/" target="_blank"><span data-dcnode-id="2570" instrument_node="">6</span></a><span data-dcnode-id="2568" instrument_node="">. The values predicted by the SV-RBF model are slightly lower than the ones obtained by the PCA SVR-RBF model, although both forecasting models achieved good results on the validation dataset. In Figure </span><a data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig9/" target="_blank"><span data-dcnode-id="2567" instrument_node="">9</span></a><span data-dcnode-id="2565" instrument_node="">, both the observed values and obtained predictions for the period between January 1st and January 15th are reported, as well as the obtained errors, which allow us to understand that the highest error values occurred when the highest spikes of carbon monoxide values were registered. Overall, both studied forecasting models achieved good performance in predicting the carbon monoxide values observed in California.</span></p><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="2537" data-section="fig7"><div class="floats-partial-content fig-content-fig7 owl-loaded owl-drag" data-dcnode-id="2548"><div class="owl-stage-outer" data-dcnode-id="2557"><div class="owl-stage" data-dcnode-id="2558" style="transform: translate3d(0px, 0px, 0px); transition: all 0s ease 0s; width: 538px;"><div class="owl-item active" data-dcnode-id="2559" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="2560"><img alt="" data-dcnode-id="2563" name="8049504.fig.007" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.007.svgz&amp;raw"><br data-dcnode-id="2562"><strong data-dcnode-id="2561"></strong></div></div></div></div><div class="owl-nav disabled" data-dcnode-id="2552"><button class="owl-prev disabled" data-dcnode-id="2555" role="presentation" type="button"><span data-dcnode-id="2556" instrument_node="">&lt;- Prev</span></button><button class="owl-next disabled" data-dcnode-id="2553" role="presentation" type="button"><span data-dcnode-id="2554" instrument_node="">Next -&gt;</span></button></div><div class="owl-dots disabled" data-dcnode-id="2549"><button class="owl-dot active" data-dcnode-id="2550" role="button"><span data-dcnode-id="2551"></span></button></div></div><div class="floats-partial-footer" data-dcnode-id="2538"><div class="floats-partial-caption" data-dcnode-id="2541"><span class="expand_btn" data-dcnode-id="2547"></span><span class="minimize_btn" data-dcnode-id="2546"></span><span class="caption-text" data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Figure 7</span></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="2542" href r data-dcnode-id="2377"><strong data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">(b)</span></strong></button><button aria-label="(c)" class="partial-carousel-dot" data-dcnode-id="2369"><img alt="(c)" data-dcnode-id="2373" name="8049504.fig.009c" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.009c.svgz&amp;raw"><br data-dcnode-id="2372"><strong data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">(c)</span></strong></button></div><div class="partial-carousel-next-prev fig-nav-fig9" data-dcnode-id="2365"><button aria-label="Previous" class="carousel-prev" data-dcnode-id="2367"></button><button aria-label="Next" class="carousel-next" data-dcnode-id="2366"></button></div></div><div class="floats-partial-footer" data-dcnode-id="2354"><div class="floats-partial-caption" data-dcnode-id="2357"><span class="expand_btn" data-dcnode-id="2363"></span><span class="minimize_btn" data-dcnode-id="2362"></span><span class="caption-text" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Figure 9</span></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig9/" target="_blank" title="full view"><span data-dcnode-id="2359" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">(a) Carbon monoxide forecast detail between the period of the 1st of January and the 15th. Both forecasting methods missed to forecast some of the spikes registered in the series in the beginning of January. (b, c) Two scatter plots with model’s respective errors plotted against observed CO values for the same period.</span></div></div></div><h6 data-dcnode-id="2348" id="sec7.2.2"><span data-dcnode-id="2352" instrument_node="">7.2.2. Sulfur Dioxide (SO</span><sub data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">2</span></sub><span data-dcnode-id="2349" instrument_node="">)</span></h6><p data-dcnode-id="2334"><span data-dcnode-id="2347" instrument_node="">The results obtained for sulfur dioxide by PCA SVR-RBF and SVR-RBF are shown in Figure </span><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig10/" target="_blank"><span data-dcnode-id="2346" instrument_node="">10</span></a><span data-dcnode-id="2344" instrument_node="">. This figure reveals that both PCA SVR-RBF and SVR-RBF can predict the observed SO</span><sub data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">2</span></sub><span data-dcnode-id="2341" instrument_node=""> values with good accuracy. PCA SVR-RBF forecasts present a relatively smaller gap between quartiles when compared with SVR-RBF. Also, considering extreme values, the observed values have a higher incidence of outliers when compared with the forecasts, which indicates that both PCA SVR-RBF and SVR-RBF tend to underpredict the observed values slightly. Figure </span><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig11/" target="_blank"><span data-dcnode-id="2340" instrument_node="">11</span></a><span data-dcnode-id="2338" instrument_node=""> shows forecasts for PCA SVR-RBF (red line) and SVR-RBF (yellow line). The sulfur dioxide forecast error statistics are shown in Table </span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab7/" target="_blank"><span data-dcnode-id="2337" instrument_node="">7</span></a><span data-dcnode-id="2335" instrument_node="">.</span></p><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="2307" data-section="fig10"><div class="floats-partial-content fig-content-fig10 owl-loaded owl-drag" data-dcnode-id="2318"><div class="owl-stage-outer" data-dcnode-id="2327"><div class="owl-stage" data-dcnode-id="2328" style="transform: translate3d(0px, 0px, 0px); transition: all 0s ease 0s; width: 538px;"><div class="owl-item active" data-dcnode-id="2329" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="2330"><img alt="" data-dcnode-id="2333" name="8049504.fig.0010" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0010.svgz&amp;raw"><br data-dcnode-id="2332"><strong data-dcnode-id="2331"></strong></div></div></div></div><div class="owl-nav disabled" data-dcnode-id="2322"><button class="owl-prev disabled" data-dcnode-id="2325" role="presentation" type="button"><span data-dcnode-id="2326" instrument_node="">&lt;- Prev</span></button><button class="owl-next disabled" data-dcnode-id="2323" role="presentation" type="button"><span data-dcnode-id="2324" instrument_node="">Next -&gt;</span></button></div><div class="owl-dots disabled" data-dcnode-id="2319"><button class="owl-dot active" data-dcnode-id="2320" role="button"><span data-dcnode-id="2321"></span></button></div></div><div class="floats-partial-footer" data-dcnode-id="2308"><div class="floats-partial-caption" data-dcnode-id="2311"><span class="expand_btn" data-dcnode-id="2317"></span><span class="minimize_btn" data-dcnode-id="2316"></span><span class="caption-text" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">Figure 10</span></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig10/" target="_blank" title="full view"><span data-dcnode-id="2313" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Boxplot of predicted and observed sulfur dioxide values.</span></div></div></div><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="2237" data-section="fig11"><div class="floats-partial-content fig-content-fig11 owl-loaded owl-drag" data-dcnode-id="2274"><div class="owl-stage-outer" data-dcnode-id="2287"><div class="owl-stage" data-dcnode-id="2288" style="transform: translate3d(0px, 0px, 0px); transition: all 0s ease 0s; width: 1613px;"><div class="owl-item active" data-dcnode-id="2301" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="2302"><img alt="(a)" data-dcnode-id="2306" name="8049504.fig.0011a" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0011a.svgz&amp;raw"><br data-dcnode-id="2305"><strong data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">(a)</span></strong></div></div><div class="owl-item" data-dcnode-id="2295" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="2296"><img alt="(b)" data-dcnode-id="2300" name="8049504.fig.0011b" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0011b.svgz&amp;raw"><br data-dcnode-id="2299"><strong data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">(b)</span></strong></div></div><div class="owl-item" data-dcnode-id="2289" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="2290"><img alt="(c)" data-dcnode-id="2294" name="8049504.fig.0011c" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0011c.svgz&amp;raw"><br data-dcnode-id="2293"><strong data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">(c)</span></strong></div></div></div></div><div class="owl-nav" data-dcnode-id="2282"><button class="owl-prev disabled" data-dcnode-id="2285" role="presentation" type="button"><span data-dcnode-id="2286" instrument_node="">&lt;- Prev</span></button><button class="owl-next" data-dcnode-id="2283" role="presentation" type="button"><span data-dcnode-id="2284" instrument_node="">Next -&gt;</span></button></div><div class="owl-dots" data-dcnode-id="2275"><button class="owl-dot active" data-dcnode-id="2280" role="button"><span data-dcnode-id="2281"></span></button><button class="owl-dot" data-dcnode-id="2278" role="button"><span data-dcnode-id="2279"></span></button><button class="owl-dot" data-dcnode-id="2276" role="button"><span data-dcnode-id="2277"></span></button></div></div><div class="floats-partial-middle" data-dcnode-id="2254"><div class="floats-partial-middle--thumbs fig-thumbs-fig11" data-dcnode-id="2258"><button aria-label="(a)" class="partial-carousel-dot active" data-dcnode-id="2269"><img alt="(a)" data-dcnode-id="2273" name="8049504.fig.0011a" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0011a.svgz&amp;raw"><br data-dcnode-id="2272"><strong data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">(a)</span></strong></button><button aria-label="(b)" class="partial-carousel-dot" data-dcnode-id="2264"><img alt="(b)" data-dcnode-id="2268" name="8049504.fig.0011b" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0011b.svgz&amp;raw"><br data-dcnode-id="2267"><strong data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">(b)</span></strong></button><button aria-label="(c)" class="partial-carousel-dot" data-dcnode-id="2259"><img alt="(c)" data-dcnode-id="2263" name="8049504.fig.0011c" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0011c.svgz&amp;raw"><br data-dcnode-id="2262"><strong data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">(c)</span></strong></button></div><div class="partial-carousel-next-prev fig-nav-fig11" data-dcnode-id="2255"><button aria-label="Previous" class="carousel-prev" data-dcnode-id="2257"></button><button aria-label="Next" class="carousel-next" data-dcnode-id="2256"></button></div></div><div class="floats-partial-footer" data-dcnode-id="2238"><div class="floats-partial-caption" data-dcnode-id="2247"><span class="expand_btn" data-dcnode-id="2253"></span><span class="minimize_btn" data-dcnode-id="2252"></span><span class="caption-text" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Figure 11</span></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig11/" target="_blank" title="full view"><span data-dcnode-id="2249" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="2239"><span data-dcnode-id="2246" instrument_node="">(a) Sulfur dioxide forecasts in California using the produced SVR forecasting models as well as the observed SO</span><sub data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">2</span></sub><span data-dcnode-id="2243" instrument_node=""> values. The black line shows the observed values and the red line shows the produced forecasts with the PCA model, whereas the yellow line shows the forecast produced with the normalized dataset. (b, c) Two scatter plots with model’s respective errors plotted against observed SO</span><sub data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">2</span></sub><span data-dcnode-id="2240" instrument_node=""> values for the same period.</span></div></div></div><div class="floats-partial-section partial-other-wrapper" data-dcnode-id="2141" data-section="tab7"><div class="floats-partial-content fig-content-tab7" data-dcnode-id="2157"><table class="table-group" data-dcnode-id="2158" id="tab7"><tbody data-dcnode-id="2159"><tr data-dcnode-id="2160"><td data-dcnode-id="2161"><div class="table-wrapper" data-dcnode-id="2162"><table class="table" data-dcnode-id="2163"><tbody data-dcnode-id="2164"><tr data-dcnode-id="2234"><td class="thead-hr" colspan="5" data-dcnode-id="2235"><hr data-dcnode-id="2236"></td></tr><tr class="thead" data-dcnode-id="2227"><td class="align_left" data-dcnode-id="2232" rowspan="2"><span data-dcnode-id="2233" instrument_node="">Error metrics</span></td><td class="align_center" colspan="2" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">PCA SVR-RBF</span></td><td class="align_center" colspan="2" data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">SVR-RBF</span></td></tr><tr class="thead" data-dcnode-id="2218"><td class="align_center" data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Training set</span></td><td class="align_center" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Validation set</span></td><td class="align_center" data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">Training set</span></td><td class="align_center" data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Validation set</span></td></tr><tr data-dcnode-id="2215"><td class="thead-hr" colspan="5" data-dcnode-id="2216"><hr data-dcnode-id="2217"></td></tr><tr data-dcnode-id="2204"><td class="align_left" data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">MAE</span></td><td class="align_center" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">0.236</span></td><td class="align_center" data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">0.461</span></td><td class="align_center" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">0.229</span></td><td class="align_center" data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">0.414</span></td></tr><tr data-dcnode-id="2190"><td class="align_left" data-dcnode-id="2199"><i data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">R</span></i><sup data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">2</span></sup></td><td class="align_center" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">0.787</span></td><td class="align_center" data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">0.023</span></td><td class="align_center" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">0.830</span></td><td class="align_center" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">0.273</span></td></tr><tr data-dcnode-id="2179"><td class="align_left" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">RMSE</span></td><td class="align_center" data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">0.364</span></td><td class="align_center" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">0.752</span></td><td class="align_center" data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">0.352</span></td><td class="align_center" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">0.703</span></td></tr><tr data-dcnode-id="2168"><td class="align_left" data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">nRMSE</span></td><td class="align_center" data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">0.036</span></td><td class="align_center" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">0.053</span></td><td class="align_center" data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">0.035</span></td><td class="align_center" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">0.049</span></td></tr><tr class="table-tr" data-dcnode-id="2165"><td colspan="5" data-dcnode-id="2166"><hr class="tbody-hr" data-dcnode-id="2167"></td></tr></tbody></table></div></td></tr></tbody></table></div><div class="floats-partial-footer" data-dcnode-id="2142"><div class="floats-partial-caption" data-dcnode-id="2149"><span class="expand_btn" data-dcnode-id="2156"></span><span class="minimize_btn" data-dcnode-id="2155"></span><span class="caption-text" data-dcnode-id="2152"><span data-dcnode-id="2154" instrument_node="">Table 7</span><a class="caption-text-overlay" data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab7" target="_blank"></a></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab7/" target="_blank" title="full view"><span data-dcnode-id="2151" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="2144"><span data-dcnode-id="2148" instrument_node="">Error metrics from SO</span><sub data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">2</span></sub><span data-dcnode-id="2145" instrument_node=""> forecasting models in the training and validation sets.</span></div><a class="table-thumb-overlay" data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab7" target="_blank"></a></div></div><p data-dcnode-id="2130"><span data-dcnode-id="2140" instrument_node="">Similar to carbon monoxide, the residual metrics present lower values for the SVR-RBF model. From Figure </span><a data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig11/" target="_blank"><span data-dcnode-id="2139" instrument_node="">11</span></a><span data-dcnode-id="2137" instrument_node="">, it is possible to observe that both models missed predicting the frequent high spikes present in the observed values. This result is also corroborated by the error scatter plots from both forecasting models. The error scatter plots (Figures </span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig11/%23b" target="_blank"><span data-dcnode-id="2136" instrument_node="">11(b)</span></a><span data-dcnode-id="2134" instrument_node=""> and </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig11/%23c" target="_blank"><span data-dcnode-id="2133" instrument_node="">11(c)</span></a><span data-dcnode-id="2131" instrument_node="">) allow us to understand that most of the errors are between the range of [0.25; −0.25] ppb, although there are very high error values which occur mainly for the higher and lower observed values. It is also possible to corroborate that both models tend to underpredict the registered pollutant values, given that we observe the highest concentration of points below zero.</span></p><h6 data-dcnode-id="2125" id="sec7.2.3"><span data-dcnode-id="2129" instrument_node="">7.2.3. Nitrogen Dioxide (NO</span><sub data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">2</span></sub><span data-dcnode-id="2126" instrument_node="">)</span></h6><p data-dcnode-id="2094"><span data-dcnode-id="2124" instrument_node="">Figure </span><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig12/" target="_blank"><span data-dcnode-id="2123" instrument_node="">12</span></a><span data-dcnode-id="2121" instrument_node=""> depicts the boxplot representations for the observed values and the predicted values with both PCA SVR-RBF and SVR-RBF. The presented boxplots have approximately the same median values as well as the same data variability. As regards extreme observations, the raw NO</span><sub data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">2</span></sub><span data-dcnode-id="2118" instrument_node=""> dataset has more identified outliers above the 3</span><sup data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">rd</span></sup><span data-dcnode-id="2115" instrument_node=""> quantile, when compared with the forecasted values. The results concerning MAE, nRMSE, and </span><i data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">R</span></i><sup data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">2</span></sup><span data-dcnode-id="2110" instrument_node=""> are shown in Table </span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab8/" target="_blank"><span data-dcnode-id="2109" instrument_node="">8</span></a><span data-dcnode-id="2107" instrument_node="">. In Figure </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig13/" target="_blank"><span data-dcnode-id="2106" instrument_node="">13</span></a><span data-dcnode-id="2104" instrument_node="">, the observed NO</span><sub data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">2</span></sub><span data-dcnode-id="2101" instrument_node=""> values, as well as the obtained predictions, are reported (top figure plot). Figures </span><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig13/%23b" target="_blank"><span data-dcnode-id="2100" instrument_node="">13(b)</span></a><span data-dcnode-id="2098" instrument_node=""> and </span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig13/%23c" target="_blank"><span data-dcnode-id="2097" instrument_node="">13(c)</span></a><span data-dcnode-id="2095" instrument_node=""> show the forecasting models’ errors, respectively, plotted against the nitrogen dioxide observed values. As expected, both forecasting models can capture the pollutant behavior very well, although PCA SVR-RBF tends to underpredict the observed values spikes. In conclusion, both models trained to forecast nitrogen dioxide achieved good results, with SVR-RBF slightly outperforming PCA SVR-RBF.</span></p><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="2067" data-section="fig12"><div class="floats-partial-content fig-content-fig12 owl-loaded owl-drag" data-dcnode-id="2078"><div class="owl-stage-outer" data-dcnode-id="2087"><div class="owl-stage" data-dcnode-id="2088" style="transform: translate3d(0px, 0px, 0px); transition: all 0s ease 0s; width: 538px;"><div class="owl-item active" data-dcnode-id="2089" style="width: 502.453px; margin-right: 35px;"><div class="partial-carousel--single-image" data-dcnode-id="2090"><img alt="" data-dcnode-id="2093" name="8049504.fig.0012" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0012.svgz&amp;raw"><br data-dcnode-id="2092"><strong data-dcnode-id="2091"></strong></div></div></div></div><div class="owl-nav disabled" data-dcnode-id="2082"><button class="owl-prev disabled" data-dcnode-id="2085" role="presentation" type="button"><span data-dcnode-id om/journals/complexity/2020/8049504/fig13/" target="_blank" title="full view"><span data-dcnode-id="1913" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">(a) Nitrogen dioxide observed values (black line) and obtained forecasts with PCA-SVR model (red line) and SVR-RBF model (yellow line). (b, c) Two scatter plots with model’s respective errors plotted against observed NO</span><sub data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">2</span></sub><span data-dcnode-id="1907" instrument_node=""> values for the same period.</span></div></div></div><h6 data-dcnode-id="1902" id="sec7.2.4"><span data-dcnode-id="1903" instrument_node="">7.2.4. Ground-Level Ozone</span></h6><p data-dcnode-id="1885"><span data-dcnode-id="1901" instrument_node="">The observed ground-level ozone values and corresponding predictions are shown in Figure </span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig14/" target="_blank"><span data-dcnode-id="1900" instrument_node="">14</span></a><span data-dcnode-id="1898" instrument_node="">. The represented boxplots have approximately the same median values and box size. A small number of outliers were identified in ozone’s observed values, different from the forecasts that have, almost, no outlier observation. Forecast performance metrics are shown in Table </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab9/" target="_blank"><span data-dcnode-id="1897" instrument_node="">9</span></a><span data-dcnode-id="1895" instrument_node="">. In Figure </span><a data-dcnode-id="1893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig15/" target="_blank"><span data-dcnode-id="1894" instrument_node="">15</span></a><span data-dcnode-id="1892" instrument_node="">, we report the observed ozone values and the obtained predicted values from both PCA SVR-RBF and SVR-RBF during the period between January 1st and January 15th. For this period, it is possible to observe that the PCA SVR-RBF tends to forecast higher ozone values compared to the observed ones, while the SVR-RBF seems to model the ozone measurements more accurately. Figure </span><a data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig16/" target="_blank"><span data-dcnode-id="1891" instrument_node="">16</span></a><span data-dcnode-id="1889" instrument_node=""> reports the forecasting model’s errors, plotted against the observed ozone values. As expected, based on the results shown in Table </span><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab9/" target="_blank"><span data-dcnode-id="1888" instrument_node="">9</span></a><span data-dcnode-id="1886" instrument_node="">, ozone measurements were modeled with very good results by both forecasting models, with SVR-RBF scatter plot points more concentrated around null values. In conclusion, both models trained to predict ozone measurements achieved very good results, but SVR-RBF slightly outperformed PCA SVR-RBF.</span></p><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="1858" data-section="fig14"><div class="floats-partial-content fig-content-fig14 owl-loaded owl-drag" data-dcnode-id="1869"><div class="owl-stage-outer" data-dcnode-id="1878"><div class="owl-stage" data-dcnode-id="1879" style="transform: translate3d(0px, 0px, 0px); transition: all 0s ease 0s; width: 538px;"><div class="owl-item active" data-dcnode-id="1880" style="width: 502.453px; margin-right: 35px;"><div class="partial-carou tial-carousel-dot active" data-dcnode-id="1708"><img alt="(a)" data-dcnode-id="1712" name="8049504.fig.0016a" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0016a.svgz&amp;raw"><br data-dcnode-id="1711"><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">(a)</span></strong></button><button aria-label="(b)" class="partial-carousel-dot" data-dcnode-id="1703"><img alt="(b)" data-dcnode-id="1707" name="8049504.fig.0016b" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.fig.0016b.svgz&amp;raw"><br data-dcnode-id="1706"><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">(b)</span></strong></button></div><div class="partial-carousel-next-prev fig-nav-fig16" data-dcnode-id="1699"><button aria-label="Previous" class="carousel-prev" data-dcnode-id="1701"></button><button aria-label="Next" class="carousel-next" data-dcnode-id="1700"></button></div></div><div class="floats-partial-footer" data-dcnode-id="1688"><div class="floats-partial-caption" data-dcnode-id="1691"><span class="expand_btn" data-dcnode-id="1697"></span><span class="minimize_btn" data-dcnode-id="1696"></span><span class="caption-text" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Figure 16</span></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig16/" target="_blank" title="full view"><span data-dcnode-id="1693" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">(a) PCS SVR-RBF forecasting errors plotted against observed ozone values and (b) SVR-RBF forecasting errors plotted against observed ozone values.</span></div></div></div><h6 data-dcnode-id="1682" id="sec7.2.5"><span data-dcnode-id="1686" instrument_node="">7.2.5. Particulate Matter 2.5 (PM</span><sub data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">2.5</span></sub><span data-dcnode-id="1683" instrument_node="">)</span></h6><p data-dcnode-id="1653"><span data-dcnode-id="1681" instrument_node="">The last pollutant forecast evaluation that we performed concerns particulate matter 2.5. Similar to the evaluation of the other pollutants, in Figure </span><a data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig17/" target="_blank"><span data-dcnode-id="1680" instrument_node="">17</span></a><span data-dcnode-id="1678" instrument_node="">, we report the boxplots for both observations and predictions. The boxplots of the medians are approximately the same for observed and forecast values, but the amount of outlier observations in the raw PM</span><sub data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">2.5</span></sub><span data-dcnode-id="1675" instrument_node=""> data is higher, which indicates that both forecasting models are underpredicting observed spikes for this pollutant. Forecasting errors are shown in Table </span><a data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab10/" target="_blank"><span data-dcnode-id="1674" instrument_node="">10</span></a><span data-dcnode-id="1672" instrument_node="">. Both models present slightly bigger values in MAE in the validation set when compared to the results obtained on the training set. In Figure </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig18/" target="_blank"><span data-dcnode-id="1671" instrument_node="">18</span></a><span data-dcnode-id="1669" instrument_node="">, we report the observed values and the forecasts produced by PCA SVR-RBF and SVR-RBF for the period between January 1st and January 15th. From this figure, it is possible to see that both models underpredicted the high values of PM</span><sub data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">2.5</span></sub><span data-dcnode-id="1666" instrument_node="">. Figure </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/fig19/" target="_blank"><span data-dcnode-id="1665" instrument_node="">19</span></a><span data-dcnode-id="1663" instrument_node=""> shows the forecasting model’s errors plotted against observed PM</span><sub data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">2.5</span></sub><span data-dcnode-id="1660" instrument_node=""> values. As expected, the observed PM</span><sub data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">2.5</span></sub><span data-dcnode-id="1657" instrument_node=""> values were not correctly modeled whenever the series of observed events presented an abnormally high value, as both scatter plots present a positive correlation between the high residual values and high PM</span><sub data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">2.5</span></sub><span data-dcnode-id="1654" instrument_node=""> observations. To summarize, both studied models achieved similar performance when predicting particulate matter 2.5, with SVR-RBF outperforming PCA SVR-RBF.</span></p><div class="floats-partial-section partial-carousel-wrapper" data-dcnode-id="1626" data-section="fig17"><div class="floats-partial-content fig-content-fig17 owl-loaded owl-drag" data-dcnode-id="1637"><div class="owl-stage-outer" data-dcnode-id="1646"><div class="owl-stage" data-dcnode-id="1647" style="transform: translate3d(0px, 0px, 0px); transi ="table-wrapper" data-dcnode-id="1375"><table class="table" data-dcnode-id="1376"><tbody data-dcnode-id="1377"><tr data-dcnode-id="1433"><td class="thead-hr" colspan="3" data-dcnode-id="1434"><hr data-dcnode-id="1435"></td></tr><tr class="thead" data-dcnode-id="1426"><td class="align_left" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Air quality index value range</span></td><td class="align_center" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Levels of health concern</span></td><td class="align_center" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Description</span></td></tr><tr data-dcnode-id="1423"><td class="thead-hr" colspan="3" data-dcnode-id="1424"><hr data-dcnode-id="1425"></td></tr><tr data-dcnode-id="1416"><td class="align_left" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">0 to 50</span></td><td class="align_center" data-dcnode-id="1419"><object data="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.tab-inline.001.svgz&amp;raw" data-dcnode-id="1420" name="8049504.tab-inline.001" type="image/svg+xml"></object></td><td class="align_center" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Air quality is considered satisfactory.</span></td></tr><tr data-dcnode-id="1409"><td class="align_left" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">51 to 100</span></td><td class="align_center" data-dcnode-id="1412"><object data="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static-01.hindawi.com/articles/complexity/volume-2020/8049504/figures/8049504.tab-inline.002.svgz&amp;raw" data-dcnode-id="1413" name="8049504.tab-inline.002" type="image/svg+xml"></object></td><td class="align_center" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Air quality is acceptable; however, for some pollutants, the
