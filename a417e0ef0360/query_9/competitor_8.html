ass="align_center" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">0</span></td></tr><tr class="table-tr" data-dcnode-id="1154"><td colspan="7" data-dcnode-id="1155"><hr class="tbody-hr" data-dcnode-id="1156"></td></tr></tbody></table></div></td></tr><tr class="table-fn" data-dcnode-id="1141"><td data-dcnode-id="1142"><div data-dcnode-id="1143"><svg data-dcnode-id="1146" height="10.1524pt" id="M103" style="vertical-align:-0.04990005pt" version="1.1" viewBox="-0.0498162 -10.1025 6.17869 10.1524" width="6.17869pt" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="1147" transform="matrix(.0091,0,0,-0.0091,0,-5.741)"><path d="M486 158C486 177 478 202 466 220C413 228 386 236 336 262C386 288 413 297 466 304C478 323 486 347 485 366C470 376 444 381 422 380C389 338 368 319 321 288C323 345 329 372 349 422C339 442 322 461 305 470C289 461 271 442 262 422C281 372 287 345 290 288C243 319 222 338 189 380C167 381 142 376 125 366C125 347 133 322 145 304C198 296 225 288 275 262C225 236 198 227 145 220C133 201 125 177 126 158C141 148 167 143 189 144C222 186 243 205 290 236C288 179 282 152 262 102C272 82 289 63 306 54C322 63 340 82 350 102C330 152 324 179 321 236C368 205 390 186 422 144C444 143 470 148 486 158Z" data-dcnode-id="1148"></path></g></svg><span data-dcnode-id="1145" instrument_node="">Unhealthy for sensitive groups.</span><br data-dcnode-id="1144"></div></td></tr></tbody></table></div><div class="floats-partial-footer" data-dcnode-id="1126"><div class="floats-partial-caption" data-dcnode-id="1130"><span class="expand_btn" data-dcnode-id="1137"></span><span class="minimize_btn" data-dcnode-id="1136"></span><span class="caption-text" data-dcnode-id="1133"><span data-dcnode-id="1135" instrument_node="">Table 13</span><a class="caption-text-overlay" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab13" target="_blank"></a></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab13/" target="_blank" title="full view"><span data-dcnode-id="1132" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Confusion matrix for the AQI classifications obtained with both models for the validation set.</span></div><a class="table-thumb-overlay" data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab13" target="_blank"></a></div></div><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The PCA SVR-RBF model achieved an accuracy of 88% on the training set and 92.7% on the validation set, whereas SVR-RBF achieved a slightly better accuracy score for both datasets, with 90.02% on the training set and 94.1% on the validation set.</span></p><p data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">Considering the obtained results for both models (PCA SVR-RBF and SVR-RBF) for the cases that the AQI was misidentified, Table </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab14/" target="_blank"><span data-dcnode-id="1121" instrument_node="">14</span></a><span data-dcnode-id="1119" instrument_node=""> shows if the pollutant with the max AQI was correctly identified. For all cases where both the AQI classification and pollutant with the maximum AQI were misidentified, the pollutant with the second highest registered hourly AQI was always the correct one.</span></p><div class="floats-partial-section partial-other-wrapper" data-dcnode-id="1048" data-section="tab14"><div class="floats-partial-content fig-content-tab14" data-dcnode-id="1061"><table class="table-group" data-dcnode-id="1062" id="tab14"><tbody data-dcnode-id="1063"><tr data-dcnode-id="1064"><td data-dcnode-id="1065"><div class="table-wrapper" data-dcnode-id="1066"><table class="table" data-dcnode-id="1067"><tbody data-dcnode-id="1068"><tr data-dcnode-id="1115"><td class="thead-hr" colspan="6" data-dcnode-id="1116"><hr data-dcnode-id="1117"></td></tr><tr class="thead" data-dcnode-id="1108"><td class="align_left" colspan="2" data-dcnode-id="1113" rowspan="2"><span data-dcnode-id="1114" instrument_node=""> </span></td><td class="align_center" colspan="2" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">PCA SVR-RBF</span></td><td class="align_center" colspan="2" data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">SVR-RBF</span></td></tr><tr class="thead" data-dcnode-id="1099"><td class="align_center" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Training set</span></td><td class="align_center" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Validation set</span></td><td class="align_center" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Training set</span></td><td class="align_center" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Validation set</span></td></tr><tr data-dcnode-id="1096"><td class="thead-hr" colspan="6" data-dcnode-id="1097"><hr data-dcnode-id="1098"></td></tr><tr data-dcnode-id="1083"><td class="align_left" data-dcnode-id="1094" rowspan="2"><span data-dcnode-id="1095" instrument_node="">Pollutant correctly identified?</span></td><td class="align_center" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">True</span></td><td class="align_center" data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">449</span></td><td class="align_center" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">123</span></td><td class="align_center" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">370</span></td><td class="align_center" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">99</span></td></tr><tr data-dcnode-id="1072"><td class="align_center" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">False</span></td><td class="align_center" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">29</span></td><td class="align_center" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">1</span></td><td class="align_center" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">19</span></td><td class="align_center" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">1</span></td></tr><tr class="table-tr" data-dcnode-id="1069"><td colspan="6" data-dcnode-id="1070"><hr class="tbody-hr" data-dcnode-id="1071"></td></tr></tbody></table></div></td></tr></tbody></table></div><div class="floats-partial-footer" data-dcnode-id="1049"><div class="floats-partial-caption" data-dcnode-id="1053"><span class="expand_btn" data-dcnode-id="1060"></span><span class="minimize_btn" data-dcnode-id="1059"></span><span class="caption-text" data-dcnode-id="1056"><span data-dcnode-id="1058" instrument_node="">Table 14</span><a class="caption-text-overlay" data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab14" target="_blank"></a></span><a aria-label="full view" class="caption-partial-url" data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab14/" target="_blank" title="full view"><span data-dcnode-id="1055" instrument_node="">&nbsp;</span></a></div><div class="floats-partial-caption-text" data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">AQI misidentified cases breakdown.</span></div><a class="table-thumb-overlay" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hindawi.com/journals/complexity/2020/8049504/tab14" target="_blank"></a></div></div><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">Interestingly, we observe that for both PCA SVR-RBF and SVR-RBF, all the AQI misclassifications happened when the observed particulate matter 2.5 values registered the maximum hourly AQI. In other words, the predictive models were not able to predict abnormal PM</span><sub data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">2.5</span></sub><span data-dcnode-id="1044" instrument_node=""> values.</span></p><p data-dcnode-id="1038"><span data-dcnode-id="1042" instrument_node="">To summarize, both PCA SVR-RBF and SVR-RBF achieved similar performance in forecasting the AQI. Nevertheless, there is an underestimation of the pollution levels when the highest AQI values were registered by PM</span><sub data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">2.5</span></sub><span data-dcnode-id="1039" instrument_node="">, which would imply that pollution alerts would not be sent to the affected population groups in those cases.</span></p><h4 data-dcnode-id="1036" id="conclusions-and-future-work"><span data-dcnode-id="1037" instrument_node="">8. Conclusions and Future Work</span></h4><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Predicting the air quality is a complex task due to the dynamic nature, volatility, and high variability in space and time of pollutants and particulates. At the same time, being able to model, predict, and monitor air quality is becoming more and more important, especially in urban areas, due to the observed critical impacts of air pollution for populations and the environment.</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1033" instrument_node="">This work presented a study of support vector regression (SVR) to forecast pollutants and particulates’ levels and to correctly identify the AQI. The studied method produced a suitable model of the hourly atmospheric pollution, allowing us to obtain, generally, good accuracy in modeling pollutant concentrations like O</span><sub data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">3</span></sub><span data-dcnode-id="1030" instrument_node="">, CO, and SO</span><sub data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">2</span></sub><span data-dcnode-id="1027" instrument_node="">, as well as the hourly AQI for the state of California.</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1025" instrument_node="">As future work, we intend to improve and investigate the usage of SVR to forecast air quality through the following topics:</span><span class="list" data-dcnode-id="1005"><span class="list-item" data-dcnode-id="1014"><span class="list-label" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node=""> </span></span><span class="list-content" data-dcnode-id="1015"><span data-dcnode-id="1022" instrument_node="">Dataset and variable selection—considering a large dataset with more parameters and measurements, which can support more accurate predictive models for air pollutants and particulates, in particular, NO</span><sub data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">2</span></sub><span data-dcnode-id="1019" instrument_node=""> and PM</span><sub data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">2.5</span></sub><span data-dcnode-id="1016" instrument_node="">.</span></span></span><span class="list-item" data-dcnode-id="1006"><span class="list-label" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node=""> </span></span><span class="list-content" data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">SVR parameter optimization—as SVR model performance is greatly influenced by the kernel function selection and the penalty parameter </span><i data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">C</span></i><span data-dcnode-id="1008" instrument_node="">, it would be interesting to explore other methods, different from random search, for hyperparameter optimization such as genetic algorithms or particle swarm optimization.</span></span></span></span></p><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Last but not least, we intend to compare the results obtained by SVR to the ones achieved by other machine learning algorithms of a different nature, like artificial neural networks, Bayesian networks, decision trees, random forests, and genetic programming.</span></p><h4 data-dcnode-id="1000" id="data-availability"><span data-dcnode-id="1001" instrument_node="">Data Availability</span></h4><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">A permanent link to download data used in this paper will be made available after the publication.</span></p><h4 data-dcnode-id="996" id="conflicts-of-interest"><span data-dcnode-id="997" instrument_node="">Conflicts of Interest</span></h4><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The authors declare that they have no conflicts of interest.</span></p><h4 data-dcnode-id="992" id="acknowledgments"><span data-dcnode-id="993" instrument_node="">Acknowledgments</span></h4><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">This study was supported by national funds by FCT (Fundação para a Ciência e a Tecnologia) through projects GADgET (DSAIPA/DS/0022/2018), BINDER (PTDC/CCI-INF/29168/2017), and AICE (DSAIPA/DS/0113/2019) and the LASIGE Research Unit (UIDB/00408/2020 and UIDP/00408/2020). Mauro Castelli and Aleš Popovič acknowledge the financial support from the Slovenian Research Agency (research core funding no. P5-0410).</span></p></div><div class="xml-content" data-dcnode-id="418"><h4 class="references" data-dcnode-id="987" id="references"><span data-dcnode-id="988" in 0of%252520pollutants%252520and%252520particulates.%252520At%252520the%252520same%252520time%25252C%252520being%252520able%252520to%252520model%25252C%252520predict%25252C%252520and%252520monitor%252520air%252520quality%252520is%252520becoming%252520more%252520and%252520more%252520relevant%25252C%252520especially%252520in%252520urban%252520areas%25252C%252520due%252520to%252520the%252520observed%252520critical%252520impact%252520of%252520air%252520pollution%252520on%252520citizens%252526%252523x2019%25253B%252520health%252520and%252520the%252520environment.%252520In%252520this%252520paper%25252C%252520we%252520employ%252520a%252520popular%252520machine%252520learning%252520method%25252C%252520support%252520vector%252520regression%252520%28SVR%29%25252C%252520to%252520forecast%252520pollutant%252520and%252520particulate%252520levels%252520and%252520to%252520predict%252520the%252520air%252520quality%252520index%252520%28AQI%29.%252520Among%252520the%252520various%252520tested%252520alternatives%25252C%252520radial%252520basis%252520function%252520%28RBF%29%252520was%252520the%252520type%252520of%252520kernel%252520that%252520allowed%252520SVR%252520to%252520obtain%252520the%252520most%252520accurate%252520predictions.%252520Using%252520the%252520whole%252520set%252520of%252520available%252520variables%252520revealed%252520a%252520more%252520successful%252520strategy%252520than%252520selecting%252520features%252520using%252520principal%252520component%252520analysis.%252520The%252520presented%252520results%252520demonstrate%252520that%252520SVR%252520with%252520RBF%252520kernel%252520allows%252520us%252520to%252520accurately%252520predict%252520hourly%252520pollutant%252520concentrations%25252C%252520like%252520carbon%252520monoxide%25252C%252520sulfur%252520dioxide%25252C%252520nitrogen%252520dioxide%25252C%252520ground-level%252520ozone%25252C%252520and%252520particulate%252520matter%2525202.5%25252C%252520as%252520well%252520as%252520the%252520hourly%252520AQI%252520for%252520the%252520state%252520of%252520California.%252520Classification%252520into%252520six%252520AQI%252520categories%252520defined%252520by%252520the%252520US%252520Environmental%252520Protection%252520Agency%252520was%252520performed%252520with%252520an%252520accuracy%252520of%25252094.1%252526%252523x0025%25253B%252520on%252520unseen%252520validation%252520data.%26csi%3Dundefined%26rev%3Dv8.28.8-wp%26ct%3D1%26xld%3D1%26xd%3D1&amp;raw" style="height: 1px; width: 1px; position: absolute; top: 0px; z-index: 100000; border: 0px; left: 0px;" title="AddThis utility frame"><html data-dcnode-id="19"><head data-dcnode-id="23"><meta charset="utf-8"><meta content="text/html; charset=utf-8" data-dcnode-id="27" http-equiv="Content-type"/><meta content="noindex,nofollow" data-dcnode-id="26" name="robots"/><title data-dcnode-id="24">AddThis Utility Frame</title></meta></head><body data-dcnode-id="20"></body></html></iframe></div>
