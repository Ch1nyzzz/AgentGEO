</span><article class="post-entry post-entry-type-standard post-entry-15555 post-loop-1 post-parity-odd post-entry-last single-big with-slider post-15555 post type-post status-publish format-standard has-post-thumbnail hentry category-history" data-dcnode-id="4704" itemprop="blogPost" itemscope="itemscope" itemtype="https://schema.org/BlogPosting"><div class="blog-meta" data-dcnode-id="4983"></div><div class="entry-content-wrapper clearfix standard-content" data-dcnode-id="4741"><header class="entry-content-header" data-dcnode-id="4971"><div class="av-heading-wrapper" data-dcnode-id="4972"><h1 class="post-title entry-title" data-dcnode-id="4977" itemprop="headline"><span data-dcnode-id="4982" instrument_node=""> </span><a data-dcnode-id="4978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/2018/01/why-the-starship-was-such-a-disaster/" rel="bookmark" title="Permanent Link: Why the Starship was such a disaster"><span data-dcnode-id="4981" instrument_node="">Why the Starship was such a disaster			</span><span class="post-format-icon minor-meta" data-dcnode-id="4980"></span><span data-dcnode-id="4979" instrument_node=""> </span></a></h1><span class="blog-categories minor-meta" data-dcnode-id="4973"><a data-dcnode-id="4975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/category/history/" rel="tag"><span data-dcnode-id="4976" instrument_node="">History</span></a><span data-dcnode-id="4974" instrument_node=""> </span></span></div></header><span class="av-vertical-delimiter" data-dcnode-id="4970"></span><div class="big-preview single-big" data-dcnode-id="4963" itemprop="image" itemscope="itemscope" itemtype="https://schema.org/ImageObject"><a class="lightbox-added" data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-1024x552.jpg" title="The design was radical for the time, but it didn't deliver the results."><img alt="Beech Starship" class="wp-image-16673 avia-img-lazy-loading-16673 attachment-entry_with_sidebar size-entry_with_sidebar wp-post-image lazyload" data-dcnode-id="4969" data-sizes="(max-width: 595px) 100vw, 595px" data-src="https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg" data-srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg 1024w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-768x414.jpg 768w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-370x199.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-570x307.jpg 570w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-770x415.jpg 770w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-557x300.jpg 557w" height="321" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="595"><noscript data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">&lt;img width="595" height="321" src="https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg" class="wp-image-16673 avia-img-lazy-loading-16673 attachment-entry_with_sidebar size-entry_with_sidebar wp-post-image" alt="Beech Starship" srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg 1024w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-768x414.jpg 768w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-370x199.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-570x307.jpg 570w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-770x415.jpg 770w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-557x300.jpg 557w" sizes="(max-width: 595px) 100vw, 595px" /&gt;</span></noscript><span class="image-overlay overlay-type-image" data-dcnode-id="4965"><span class="image-overlay-inside" data-dcnode-id="4966"></span></span></a></div><div class="entry-content" data-dcnode-id="4789" itemprop="text"><p data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">When one examines a failure of such monumental scale as the Beech Starship program, the inevitable question is, “Why did they do that?” As in almost every instance where things go badly wrong, it was a series of decisions made under shifting circumstances that led to the ultimate disaster.</span></p><span data-dcnode-id="4960" instrument_node="">
</span><p data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">To understand the roots of the Starship program decisions, we must think back to the early 1980s when they were made. Beech had been acquired from the founders by Raytheon, a leader in high tech of the day. A recession — that hit general aviation particularly hard — cast a pall over the future. And so did memories of the crushing oil embargos of the 1970s. Serious and knowledgeable people predicted the world would run out of oil, not just run out of cheap oil.</span></p><span data-dcnode-id="4957" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="4948" id="attachment_15558" style="width: 310px"><a class="lightbox-added" data-dcnode-id="4951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200.jpg" style="position: relative; overflow: hidden;"><img alt="King Air" aria-describedby="caption-attachment-15558" class="size-medium wp-image-15558 lazyloaded" data-dcnode-id="4956" data-sizes="(max-width: 300px) 100vw, 300px" data-src="/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-300x195.jpg" data-srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-300x195.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-370x240.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-463x300.jpg 463w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200.jpg 495w" height="195" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-300x195.jpg&amp;raw" srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-300x195.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-370x240.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-463x300.jpg 463w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200.jpg 495w" width="300"><noscript data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">&lt;img aria-describedby="caption-attachment-15558" class="size-medium wp-image-15558" src="/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-300x195.jpg" alt="King Air" width="300" height="195" srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-300x195.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-370x240.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200-463x300.jpg 463w, https://airfactsjournal.com/wp-content/uploads/2018/01/BEECHCRAFT-KING-AIR-200.jpg 495w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span class="image-overlay overlay-type-image" data-dcnode-id="4952"><span class="image-overlay-inside" data-dcnode-id="4953"></span></span></a><p class="wp-caption-text" data-dcnode-id="4949" id="caption-attachment-15558"><span data-dcnode-id="4950" instrument_node="">Who could have guessed that the trusty King Air would outlast the sexy Starship?</span></p></div><span data-dcnode-id="4947" instrument_node="">
</span><p data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">Beech dominated the turboprop market with its King Air family. In fact, other makers of turboprop twins had dropped production, or gone out of business entirely. We could not then predict the steady and impressive gains turbofan engines would make in fuel efficiency so the turboprop held important advantages in an oil worried world.</span></p><span data-dcnode-id="4944" instrument_node="">
</span><p data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">That was the setup for the decision makers at Raytheon. The thinking went something like, “Our company, Beech, dominates the turboprop market. Turboprops hold a vital fuel efficiency edge. Ergo what we need is an advanced turboprop to cement our market position for decades to come.”</span></p><span data-dcnode-id="4941" instrument_node="">
</span><p data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">When an aviation decision maker goes looking for great leaps forward there is always somebody with an unproven idea ready to fulfill their dreams. In the early 1980s one of the most talked about bits of aviation magic looming on the horizon was composite construction. Using carbon fiber reinforced plastic could cut airframe weight by huge amounts, proponents claimed. And we all know that a lightweight airplane is everything good. It’s faster, carries more, and is more fuel efficient.</span></p><span data-dcnode-id="4938" instrument_node="">
</span><p data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">And composites seemed to be at least somewhat proven. I remember that Gulfstream made a composite rudder for its jet and saved 200 pounds. If you can save that much on a rudder, think how light an airframe built entirely from composites would be. The mind boggles.</span></p><span data-dcnode-id="4935" instrument_node="">
</span><p data-dcnode-id="4933"><span data-dcnode-id="4934" instrument_node="">The other propeller airplane configuration that always tantalized, and even could be proven in wind tunnels, was mounting the engines on the rear as pushers. A pusher prop produces more thrust on the same power, and because the props are aft of the cabin, the passengers experience jet-like smoothness and quiet.</span></p><span data-dcnode-id="4932" instrument_node="">
</span><p data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">Once the Raytheon decision makers bought into the incredible weight savings promise of composites, and the benefits of the pusher propellers, the other design decisions — most of which turned out to be awful — cascaded down on them.</span></p><span data-dcnode-id="4929" instrument_node="">
</span><p data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">The Starship could have been designed with a conventional wing and tail, much like its contemporary, the Piaggio Avanti, was. But the futuristic look of Burt Rutan’s canard creations was so exciting. Burt’s “Eze” homebuilt designs were popular, looked fast, and were. The fact that an Eze empty CG is so far aft that the empty airplane can’t even sit on its nose gear without tipping over backward didn’t seem to register with Raytheon.</span></p><span data-dcnode-id="4926" instrument_node="">
</span><p data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">To get that futuristic look and make the airplane practical in terms of CG location the Starship wing needed a large amount of sweep. Wing sweep looks fast, and does reduce drag above critical Mach that is usually faster than Mach .70, but at turboprop speeds sweep adds headaches and penalties with no benefits. A swept wing is less structurally efficient, which means it’s heavier than a straight wing. And sweep degrades stability, particularly in yaw-roll coupling.</span></p><span data-dcnode-id="4923" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="4914" id="attachment_16673" style="width: 310px"><a class="lightbox-added" data-dcnode-id="4917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg" style="position: relative; overflow: hidden;"><img alt="Beech Starship" aria-describedby="caption-attachment-16673" class="size-medium wp-image-16673 lazyloaded" data-dcnode-id="4922" data-sizes="(max-width: 300px) 100vw, 300px" data-src="/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg" data-srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-768x414.jpg 768w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg 1024w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-370x199.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-570x307.jpg 570w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-770x415.jpg 770w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-557x300.jpg 557w" height="162" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg&amp;raw" srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-768x414.jpg 768w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg 1024w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-370x199.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-570x307.jpg 570w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-770x415.jpg 770w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-557x300.jpg 557w" width="300"><noscript data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">&lt;img aria-describedby="caption-attachment-16673" class="size-medium wp-image-16673" src="/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg" alt="Beech Starship" width="300" height="162" srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-300x162.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-768x414.jpg 768w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight.jpg 1024w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-370x199.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-570x307.jpg 570w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-770x415.jpg 770w, https://airfactsjournal.com/wp-content/uploads/2018/01/1024px-Beechcraft_Starship_in_flight-557x300.jpg 557w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span class="image-overlay overlay-type-image" data-dcnode-id="4918"><span class="image-overlay-inside" data-dcnode-id="4919"></span></span></a><p class="wp-caption-text" data-dcnode-id="4915" id="caption-attachment-16673"><span data-dcnode-id="4916" instrument_node="">The design was radical for the time, but it didn’t deliver the results.</span></p></div><span data-dcnode-id="4913" instrument_node="">
</span><p data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">Some believe a forward wing (canard) instead of a conventional horizontal tail is more efficient because it always lifts while the normal tail produces balancing downforce. But because it’s always lifting the forward wing must always stall before the main wing so the nose will pitch down making recovery possible. But to have enough lift at low speeds for adequate pitch control with wing flaps extended, the Starship forward wing had to be too big to not stall at higher airspeeds. The solution was a mechanism that would sweep, and unsweep the forward wing.</span></p><span data-dcnode-id="4910" instrument_node="">
</span><p data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">Because the forward wing sweep was obviously critical to airplane performance and stall behavior, lots of monitors and backup equipment were required. The result was more weight and complexity with not much, if anything, in the way of measurable performance benefit.</span></p><span data-dcnode-id="4907" instrument_node="">
</span><p data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">The Starship also had the unfortunate timing of being caught between avionics technological developments. Electronic flight instrument systems (EFIS) were in service, but the displays were actually little more than TV tube pictures of conventional instruments. It was not possible to combine all six primary flight instruments into a single display. But, to continue with the airplane of the future theme, the Starship designers opted for an EFIS display of every individual cockpit instrument. There were 16, as I recall, individual TV tubes in the instrument panel burning amps and pumping out gobs of heat. The avionics cooling fans were an absolutely critical item.</span></p><span data-dcnode-id="4904" instrument_node="">
</span><p data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">If you lived through that time you’ll remember the aviation world being divided on the Starship. Not necessarily evenly, but divided. One camp believed that airplane would deliver its promise of 400 mph cruise speed, jet level of vibration and quiet, and range pushing out close to 2,000 miles. The other camp believed a plastic airplane couldn’t be built and certified, and the strange configuration would not work, and the whole program would flop.</span></p><span data-dcnode-id="4901" instrument_node="">
</span><p data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">I remember one evening sitting in a Wichita bar with Mike Potts, who worked in Beech PR at the time — imagine that, a writer and PR guy in a bar — discussing the Starship’s future. In a stroke of brilliance, or maybe it was gin, we realized there was a third possible outcome. What if the Starship is certified and built, but just doesn’t do anything well, and certainly not better than other airplanes.</span></p><span data-dcnode-id="4898" instrument_node="">
</span><p data-dcnode-id="4896"><span data-dcnode-id="4897" instrument_node="">And that’s exactly what happened.</span></p><span data-dcnode-id="4895" instrument_node="">
</span><p data-dcnode-id="4893"><span data-dcnode-id="4894" instrument_node="">It didn’t take long to learn that composite construction could not deliver the promised weight savings. As the Starship empty weight soared, the whole program would have collapsed except for a new FAA certification program called commuter category. The “small” airplane category the Starship was launched under maxes out at 12,500 pounds takeoff weight. In exchange for more stringent structure and performance requirements the commuter category allows takeoff weight to go higher. Those commuter category requirements undoubtedly added even more weight but did allow the program to continue. The eventual maximum ramp weight of the Starship topped 15,000 pounds.</span></p><span data-dcnode-id="4892" instrument_node="">
</span><p data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">More than the usual amount of tweaks and mods were required to bring the Starship flying qualities in line with the rules, but Beech persevered. In the end the Starship was the most stable airplane I have ever flown. I didn’t believe an airplane could be too stable, but the Starship is. It&nbsp;plows&nbsp;through bumps like it’s on rails. And the only way to initiate a reasonable roll rate is to stomp the rudder hard as you turn the wheel. Stability is great, but stability is the antithesis of low drag. Because of that, the big miss on weight, and no realized efficiencies from the forward wing configuration, the Starship missed all of its performance goals, by a lot.</span></p><span data-dcnode-id="4889" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="4880" id="attachment_15559" style="width: 310px"><a class="lightbox-added" data-dcnode-id="4883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship.jpg" style="position: relative; overflow: hidden;"><img alt="Starship" aria-describedby="caption-attachment-15559" class="size-medium wp-image-15559 lazyloaded" data-dcnode-id="4888" data-sizes="(max-width: 300px) 100vw, 300px" data-src="/wp-content/uploads/2018/01/beechcraft-starship-300x199.jpg" data-srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-300x199.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-370x246.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-270x180.jpg 270w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-452x300.jpg 452w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship.jpg 550w" height="199" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-300x199.jpg&amp;raw" srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-300x199.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-370x246.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-270x180.jpg 270w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-452x300.jpg 452w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship.jpg 550w" width="300"><noscript data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">&lt;img aria-describedby="caption-attachment-15559" class="size-medium wp-image-15559" src="/wp-content/uploads/2018/01/beechcraft-starship-300x199.jpg" alt="Starship" width="300" height="199" srcset="https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-300x199.jpg 300w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-370x246.jpg 370w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-270x180.jpg 270w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship-452x300.jpg 452w, https://airfactsjournal.com/wp-content/uploads/2018/01/beechcraft-starship.jpg 550w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span class="image-overlay overlay-type-image" data-dcnode-id="4884"><span class="image-overlay-inside" data-dcnode-id="4885"></span></span></a><p class="wp-caption-text" data-dcnode-id="4881" id="caption-attachment-15559"><span data-dcnode-id="4882" instrument_node="">About the only place you see a Starship these days – hanging from the ceiling.</span></p></div><span data-dcnode-id="4879" instrument_node="">
</span><p data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">Beech built 53 Starships and only a handful were sold. The rest were leased because almost nobody wanted to sign on for an open-ended conventional ownership. In the end Beech tried to buy back all of the Starships to put a couple in museums and destroy the rest to end the cost of supporting the tiny but complex fleet. I was invited to fly a Starship on its final flight into McConnell Air Force Base in Wichita where it would go on display at the air museum there. It was fun to make that final flight, and to buzz the runway a few feet high at red line airspeed. But I couldn’t help thinking what could have, and should have, been instead of the Starship.</span></p><span data-dcnode-id="4876" instrument_node="">
</span><p data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">The Starship disaster is unusual on the long list of new airplane failures. Most importantly it did get built. Most paper airplanes never fly, and certainly almost none are certified and produced. The other big difference is that no order holder lost their deposits on the Starship. Raytheon stockholders didn’t do so well, but Beech didn’t screw the aviation public.</span></p><span data-dcnode-id="4873" instrument_node="">
</span><p data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">But the Starship was a disaster for all of aviation in terms of lost opportunity. The billion bucks — closer to two billion in today’s dollars — that Raytheon spent going down the wrong technology paths could have been, and should have been, spent on an improved conventional turboprop. Today’s King Air 350 is a terrific airplane, and a best seller, but if that billion dollars had gone into building on the King Air instead of chasing a dream we would have an airplane now that is several inches larger in cabin section, more fuel efficient because of a newer wing design, and less costly to maintain because of modern system design and materials use.</span></p><span data-dcnode-id="4870" instrument_node="">
</span><p data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">I cringe still when the Starship is described by so many as high-tech, and futuristic. It was a failure in every respect. Raytheon shot for the moon and ended up with an exotic looking airplane that didn’t do anything as well as airplanes already there, and costing much less. And all of aviation was robbed of the really terrific airplane that a billion dollars could have created.</span></p><span data-dcnode-id="4867" instrument_node="">
</span><div class="abh_box abh_box_down abh_box_business" data-dcnode-id="4790"><ul class="abh_tabs" data-dcnode-id="4858"><span data-dcnode-id="4866" instrument_node=""> </span><li class="abh_about abh_active" data-dcnode-id="4863"><a data-dcnode-id="4864" href="#abh_about"><span data-dcnode-id="4865" instrument_node="">Author</span></a></li><span data-dcnode-id="4862" instrument_node=""> </span><li class="abh_posts" data-dcnode-id="4859"><a data-dcnode-id="4860" href="#abh_posts"><span data-dcnode-id="4861" instrument_node="">Recent Posts</span></a></li></ul><div class="abh_tab_content" data-dcnode-id="4792"><section class="vcard author abh_about_tab abh_tab" data-dcnode-id="4838" itemprop="author" itemscope="" itemtype="http://schema.org/Person" style="display:block"><div class="abh_image" data-dcnode-id="4849" itemscope="" itemtype="http://schema.org/ImageObject"><a class="url" data-dcnode-id="4851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/author/macmcclellan/" style="position: relative; overflow: hidden;" title="Mac McClellan"><span data-dcnode-id="4857" instrument_node=""> </span><img alt="Mac McClellan" class="photo lazyloaded" data-dcnode-id="4856" data-src="https://airfactsjournal.com/wp-content/uploads/gravatar/mac-small-square.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/wp-content/uploads/gravatar/mac-small-square.jpg&amp;raw" width="250"><noscript data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">&lt;img   width="250" alt="Mac McClellan" data-src="https://airfactsjournal.com/wp-content/uploads/gravatar/mac-small-square.jpg" class="photo lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" /&gt;&lt;noscript&gt;&lt;img src="https://airfactsjournal.com/wp-content/uploads/gravatar/mac-small-square.jpg" class="photo" width="250" alt="Mac McClellan" /&gt;</span></noscript><span class="image-overlay overlay-type-extern" data-dcnode-id="4852"><span class="image-overlay-inside" data-dcnode-id="4853"></span></span></a><span data-dcnode-id="4850" instrument_node=""> </span></div><div class="abh_social" data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node=""> </span></div><div class="abh_text" data-dcnode-id="4840"><div class="abh_name fn name" data-dcnode-id="4844" itemprop="name"><a class="url" data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/author/macmcclellan/"><span data-dcnode-id="4846" instrument_node="">Mac McClellan</span></a></div><div class="abh_job" data-dcnode-id="4843"></div><div class="description note abh_description" data-dcnode-id="4841" itemprop="description"><span data-dcnode-id="4842" instrument_node="">When people ask Mac McClellan what he does for a living, he replies, “I fly airplanes and write about them. And I’m one of the most fortunate people in the world to have been able to make a career of doing what I love.” Mac has been a pilot for more than 45 years, an aviation writer for more than 40 and has been lucky enough to get to fly just about every type of personal and business airplane in production from the 1970s onward. He was on the Flying Magazine staff for 35 years and editor-in-chief for 20 of those years. He has private pilot privileges in single-engine airplanes, commercial pilot in helicopters and ATP in airplanes with more than one engine. He holds several business jet type ratings and has logged more than 10,000 hours. His first airplane was a Cessna 140 and for the past 27 years he has owned a Baron 58 flying it more than 5,000 hours to cover the aviation industry. And now he is a part-time corporate pilot flying a King Air 350.</span></div></div><span data-dcnode-id="4839" instrument_node=""> </span></section><section class="abh_posts_tab abh_tab" data-dcnode-id="4793"><div class="abh_image" data-dcnode-id="4831"><a class="url" data-dcnode-id="4832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/author/macmcclellan/" style="position: relative; overflow: hidden;" title="Mac McClellan"><img alt="Mac McClellan" class="photo lazyload" data-dcnode-id="4837" data-src="https://airfactsjournal.com/wp-content/uploads/gravatar/mac-small-square.jpg" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="250"><noscript data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">&lt;img   width="250" alt="Mac McClellan" data-src="https://airfactsjournal.com/wp-content/uploads/gravatar/mac-small-square.jpg" class="photo lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" /&gt;&lt;noscript&gt;&lt;img src="https://airfactsjournal.com/wp-content/uploads/gravatar/mac-small-square.jpg" class="photo" width="250" alt="Mac McClellan" /&gt;</span></noscript><span class="image-overlay overlay-type-extern" data-dcnode-id="4833"><span class="image-overlay-inside" data-dcnode-id="4834"></span></span></a></div><div class="abh_social" data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node=""> </span></div><div class="abh_text" data-dcnode-id="4795"><div class="abh_name" data-dcnode-id="4822"><span data-dcnode-id="4828" instrument_node="">Latest posts by Mac McClellan </span><span class="abh_allposts" data-dcnode-id="4823"><span data-dcnode-id="4827" instrument_node="">(</span><a data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//airfactsjournal.com/author/macmcclellan/"><span data-dcnode-id="4826" instrument_node="">see all</span></a><span data-dcnode-id="4824" instrument_node="">)</span></span></div><div class="abh_description note" data-dcnode-id="4796"><ul data-dcnode-id="4797"><span data-dcnode-id="4821" instrument_node=""> </span><li data-dcnode-id="4814"><span data-dcnode-id="4820" instrument_node=""> </span><a data-dcnode-id="4818" href=" </span><p data-dcnode-id="4639"><span data-dcnode-id="4642" instrument_node="">Very interesting article. Last year I flew as a passenger on the Piaggio P180 Avanti II, the plane than had been successfull where the Starship failed. It’s still a beautiful futuristic turboprop capable of flying at 400 knots at FL 410 in a quiet cabin. A nice turboprop with almost jet performances. And with a jet price. So why should you buy a turboprop when you can get a jet for the same ammount of money? I think that the Piaggio could have a greater success if it could have a more affordable cost.</span><br data-dcnode-id="4641"><span data-dcnode-id="4640" instrument_node="">
Mac, did you fly the Avanti? What do you think of this plane?</span></p><span data-dcnode-id="4638" instrument_node="">

</span><p data-dcnode-id="4580"><span data-dcnode-id="4589" instrument_node="">Yes. I flew the P180 several times, including in Italy on two trips before it was certified.</span><br data-dcnode-id="4588"><span data-dcnode-id="4587" instrument_node="">
What I remember from those prototype flights was the frisky flying qualities. I was flying with a Piaggio experimental test pilot–trained at Pax River–and was rolling the airplane from 60 degrees to 60 degrees to time the roll rate. He said “why not just go all the way round.” So I did. Don’t remember the roll rate, but the roll was very smooth, little nose drop, and easy to do. He said “I think we need to damp down the response for the corporate crowd.”</span><br data-dcnode-id="4586"><span data-dcnode-id="4585" instrument_node="">
He was right, and they did.</span><br data-dcnode-id="4584"><span data-dcnode-id="4583" instrument_node="">
BTW. The P180 did meet its speed projections. Weight, as usual, was an issue so it missed on range, and runway required, but overall a pretty successful original design.</span><br data-dcnode-id="4582"><span data-dcnode-id="4581" instrument_node="">
Mac Mc</span></p><span data-dcnode-id="4579" instrument_node="">

</span><p data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">Thank you, Mac. A friend of mine flies P180s used by ENAV to check ILS, VOR and instrumental procedures and is very happy with this ship. Flying in the back is just like flying on a little bizjet, not on a noisy turboprop. But in Italy the Avanti is used mainly by the Air Force, Police, Carabinieri, Navy, Coast Guard, even the intellicence services. State organisations somehow forced to buy Italian. Anyway, as you know, now Piaggio Aerospace is still in Italy, but it’s owned by the government of Abu Dhabi.</span></p><span data-dcnode-id="4528" instrument_node="">

</span><p data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">Why did Starship fail?  Why did the Piaggio 180 succeed?  Piaggio has sold 225 versions of the 180, currently in the 3rd generation with the EVO.  Max cruise of 402 kts and max range with four paxs of 1700 nm, with a larger interior than any Cessna CJ and a working bathroom, what’s not to like?  Fuel burn is about half the turbofan competition. 3900 ft balanced field length.  Max fuel and a 1200 pound payload?  Out the door price is currently running about $7.7 million with lots of bells and whistles, and a beautiful leather interior.</span></p><span data-dcnode-id="4355" instrument_node="">

</span><p data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">That was a good topic.  Of course there is much more to the Starship attempt than what you can describe in a short article; the personalities involved come to mind.  I think Beech did get some good technology experience out of it but probably not a billion dollars worth.</span></p><span data-dcnode-id="4249" instrument_node="">
</span><p data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">Another factor is that, with regard to selling an unusual configuration in the corporate market, a conservative design has an advantage.  Corporations tend to be pretty conservative and don’t necessarily want a stand out airplane sitting on the ramp with their name on it.  Both the Starship and the Piaggio fall in that category.</span></p><span data-dcnode-id="4246" instrument_node="">

</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="4092"><span data-dcnode-id="4096" instrument_node="">
</span><p data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">Mac, I remember when a friend, a Beech salesman, came through Columbus, OH, where I was based as a corporate pilot in the 80’s.  He was selling another Beech offering; a Beechjet, if I remember correctly.  He didn’t have too many good things to say about the Starship.   My remark to him was that there was no external baggage access.  The pilot had to haul bags up the airstair, down the aisle to the rear of the airplane(and in the process bumping all that expensive leather on each side) and over the back seat, as in a Learjet.  That was a deal breaker for me.  The other thing that I heard was that the cabin noise level was a King Air in reverse (I flew the King Air 200); quiet for the pilots up front, but noisy for the passengers, sitting back where those props were reverberating off the inverted vertical stab.  Love your writing.  Retirement?  Or just a change in venue?</span></p><span data-dcnode-id="4093" instrument_node="">

</span><p data-dcnode-id="4039"><span data-dcnode-id="4046" instrument_node="">Thanks for the kind comments, Dennis. And you’re right about the cabin sound level in the Starship. It wasn’t as quiet as expected, and certainly not on par with a jet. A theory is that the rigid composite structure is more efficient in transmitting sound. Makes sense to me. In a conventional metal airframe there are many lap joints in the skin and other spots where components are fastened. Even with tight rivet work those joints can’t pass on the sound waves as well as the single layer of graphite or fiberglass can.</span><br data-dcnode-id="4045"><span data-dcnode-id="4044" instrument_node="">
If you’ve ever been below in a fiberglass boat and a wooden boat powering into a chop you know what I’m talking about.</span><br data-dcnode-id="4043"><span data-dcnode-id="4042" instrument_node="">
Bests,</span><br data-dcnode-id="4041"><span data-dcnode-id="4040" instrument_node="">
Mac Mc</span></p><span data-dcnode-id="4038" instrument_node="">

</span><p data-dcnode-id="3758"><span data-dcnode-id="3767" instrument_node="">Hi Gstern,</span><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">
Trying new things can be fun and once in awhile can advance a technology. A walk around Oshkosh shows you that almost any contraption with a wing and a CG in a somewhat reasonable location can get off the ground.</span><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">
A walk around an FBO, or better still and airline terminal, shows you what really works in terms of doing what owners want and keeping the builder in business. And those airplanes all look pretty much the same. But they are not. The business jets and airliners of today are far advanced over what was available 25 years ago, but the configurations and outward appearance are little changed. Cars still have four wheels, boats are pointy in the front, and golf balls are still round. Boring, but that’s what works.</span><br data-dcnode-id="3762"><span data-dcnode-id="3761" instrument_node="">
Bests,</span><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">
Mac Mc</span></p><span data-dcnode-id="3757" instrument_node="">

</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="3479"><span data-dcnode-id="3489" instrument_node="">
</span><p data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Burt Rutan never, ever, certified anything according to the FARs.  Aerospace engineers like myself who actually worked for the General Aviation manufacturers grew awfully tired of hearing “Rutan this, Rutan that…” when in fact he studiously avoided anything that would run into actual FARs for certified aircraft.  None of his designs that actually flew would make it past the certification process, a fact that his fans conveniently choose to ignore.  While the Starship was a fatally-flawed program for a lot of different reasons, at least Beech got it certified.  Not Rutan, but Beech.</span></p><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">Rutan certainly had some good ideas, but he never, ever, certified anything for commercial production, at least not in the General Aviation world.  His designs would not meet FAR Part 23 or 25, and instead of changing his designs to meet certification and safety requirements, he offered his usual lip service about the FAA and design criteria. Back then we prided ourselves on safety and professionalism, and we worked with the FAA on design certification requirements.  Rutan did nothing but bash that process rather than participate in it as he should have. He could have brought a lot of positive ideas to the table and refused.</span></p><span data-dcnode-id="3483" instrument_node="">
</span><p data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">As a former Beech Aircraft Engineer, I can tell you that Beech designed the Starship, all Rutan did was take the Beech design and manufacture a reduced-scale prototype Starship used for marketing justification purposes and a bit of proof-of-concept flight testing.  I did not work on the Starship, I was off on other projects such as the 38P, the King Air F90, and the Beech 1200 Commuter Airliner, all developed around the same time.</span></p><span data-dcnode-id="3480" instrument_node="">

</span><p data-dcnode-id="3400"><span data-dcnode-id="3413" instrument_node="">The STARSHIP was a marketing disaster because the FAA kept changing the certification fatigue requirements.  It ended up being built like a tank.  I personally saw one that landed at ICT and had a nose wheel fail.  Less than 2 hours later it was flown back across town for repairs at the factory.  The gear doors were not destroyed.  The gear was locked down with some braces on the actuator links on the nose wheel.</span><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">
Beech did not know how to market new airplanes.  Beech had been developing te SKIPPER BE-77 for a decade but Piper put a cheap copy called the TOMAHAWK on the market first and delivered 1,000 before Beech rolled out a production SKIPPER.</span><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">
Back to the STARSHIP— Pilots don’t buy airplanes, CEOs buy airplanes and the STARSHIP didn’t look tradational, what a CEO or Chairman would spend a few million dollars buying.</span><br data-dcnode-id="3408"><span data-dcnode-id="3407" instrument_node="">
Beech should have taken my advice and donated three STARSHIPS to George Lucas for STAR WARS and then they would have been hot tickets.</span><br data-dcnode-id="3406"><span data-dcnode-id="3405" instrument_node="">
The avionics were 25 years ahead of the technology.  The GARMIN G1000 would be great in STARSHIP.</span><br data-dcnode-id="3404"><span data-dcnode-id="3403" instrument_node="">
I never got the type rating, just the BEECHJET and 300 King Air and 1900 Airliner.</span><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">
The FAA might understand that carbon fiber is stronger than the traditional materials and gets stronger with age if the aerodynamics were applied to a 21st Century STARSHIP.</span></p><span data-dcnode-id="3399" instrument_node="">

</span><p data-dcnode-id="3343"><span data-dcnode-id="3352" instrument_node="">Hi Jim,</span><br data-dcnode-id="3351"><span data-dcnode-id="3350" instrument_node="">
You’re right. The Starship, and other composite airplanes that have been certified, are stronger than they probably need to be. But the problem is not the FAA. It is the possibility of voids or other flaws in the composite layup. The manufactured airframe must meet all load requirements with all of the possible undetectable poor bonds or other flaws that can occur. The result is more material is added to compensate for what could have gone wrong during the build.</span><br data-dcnode-id="3349"><span data-dcnode-id="3348" instrument_node="">
I could name, but won’t, several instances were bonded structure in both fixed wing and helicopters didn’t live up to test results when the aircraft went into actual production. A close look at a rivet can tell you it’s condition. A close look at a composite structure tells you nothing about what’s going on below the surface.</span><br data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">
Bests,</span><br data-dcnode-id="3345"><span data-dcnode-id="3344" instrument_node="">
Mac Mc</span></p><span data-dcnode-id="3342" instrument_node="">

</span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">Thanks Mac. I too have always enjoyed your writing. As a current owner of a Beech V35 and past owner of a Beech B55, I have always been impressed (as have others) by the quality of the Beech product. Seems like they just did not know when to “fold em” in this case – but it appears that their goal was to produce a quality product and they just got too deep in the project to admit the obvious. However it appears that they made it right with their depositors, admitted their mistake, and moved on. A testament to the integrity of the organization.</span></p><span data-dcnode-id="3177" instrument_node="">

</span><img alt="Juan Leon" class="avatar avatar-60 photo lazyload" data-dcnode-id="3102" data-src="https://secure.gravatar.com/avatar/ca6cfb69869bf78ec3553c57567b3e01?s=60&amp;d=blank&amp;r=g" data-srcset="https://secure.gravatar.com/avatar/ca6cfb69869bf78ec3553c57567b3e01?s=120&amp;d=blank&amp;r=g 2x" height="60" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="60"><noscript data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">&lt;img alt='Juan Leon' src='https://secure.gravatar.com/avatar/ca6cfb69869bf78ec3553c57567b3e01?s=60&amp;#038;d=blank&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/ca6cfb69869bf78ec3553c57567b3e01?s=120&amp;#038;d=blank&amp;#038;r=g 2x' class='avatar avatar-60 photo' height='60' width='60' /&gt;</span></noscript><span data-dcnode-id="3099" instrument_node=""> </span></div><span data-dcnode-id="3097" instrument_node="">

</span><span data-dcnode-id="3084" instrument_node="">

</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="3045"><span data-dcnode-id="3070" instrument_node="">
</span><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">I remember two most memorable moments in the history of the Starship.  First, at Edwards AFB in California, also the home of Rutan’s Scaled Composites.  In August 1983 the 85% scale prototype was completed and ready for its maiden flight over the Mojave Desert.  Together with a a select group of Beech executives, we saw this very unusual machine take to the skies.  It was like watching a spaceship.</span></p><span data-dcnode-id="3067" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">While this was happening, Beech Aircraft and it’s relatively new parent, Raytheon, had sub-contracted the development of carbon fiber technology with two different firms in Utah.  One company was building the fuselage, the second the wings.  The two competing technologies were traditional “lay up” and “filament winding”.  Beech was buying this expertise with the thought that eventually most airplanes would be made with composites.</span></p><span data-dcnode-id="3064" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">The revolution is construction was meant as both substantial weight savings and incredible structural integrity.  At a meeting in Utah, a group of us was challenged to have just two people to pick up a wing.  It was incredibly light.  We were then challenged to take a hammer and have a field day banging on the wing.  After five minutes of  banging, no visible outside damage was evident.  (Now a few decades later, we also know that internal delamination between the carbon fibers and the honeycomb core can be an isssue). In addition, the canard design of the airframe was almost “stall poof”.  If these goals could be achieved, and if Jet A went from the then current price of $1.25 per gallon to $2.00, the airplane would be a commercial success.</span></p><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">A few months later, the 85% prototype made its first public outing at the NBAA in Dallas.  Beech had invited a gathering of customers and attendees  to the side of the runway.  The Starship flew a couple of circles over the runway, made a short field landing and flew off into the morning sun.  Needless to say, this was THE EVENT of that year’s NBAA.  The excitement in business aviation was the hope that Beech could deliver on this promise.</span></p><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">So what happened?  Primarily, the ever increasing FAA Certification requirements kept increasing the weight of the airplane.  With the added weight, the performance numbers also fell far short of the objectives. </span></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Back in the day of Olive Ann Beech and Frank Hedrick, the back of the envelope calculations said that you had to sell between 70 to 100 units of a new design to break even.  With the immense investment Raytheon had to make to jump through all the regulatory hoops, the Starship ended up as a commercial failure.  The first production model did not fly until six years later, 1989.</span></p><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">The composite expertise was later used by Raytheon/Beechcraft for the fuselage of the Premier. Needless to say, Boeing is now making 787’s with composite fuselages.  However, the final accounting of the Starship still ended up with a substantial deficit.</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">But in the end, the Starship ended up being a very memorable airplane and an interesting chapter in the history of Beechcraft.</span></p><span data-dcnode-id="3046" instrument_node="">

</span><p data-dcnode-id="2992"><span data-dcnode-id="2999" instrument_node="">Thanks for the memories, Juan. The 85 percent scale model of the Starship was a stroke of genius. When Beech flew that thing at the NBAA convention it made it seem like the Starship was just weeks away, when in fact, it hadn’t been really fully defined, much less well on the way to production.</span><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">
I remember a lot of controversy around Wichita and other airplane circles about whether the 85 percent scale helped or hurt the project. My belief is that it ended up hurting the final result. The light weight and almost instant build that the Rutan shop could do for an experimental airplane had to have mislead Beech executives, at least a little, on how long it would take and how much it would weigh, to build the real thing.</span><br data-dcnode-id="2996"><span data-dcnode-id="2995" instrument_node="">
Bests,</span><br data-dcnode-id="2994"><span data-dcnode-id="2993" instrument_node="">
Mac Mc</span></p><span data-dcnode-id="2991" instrument_node="">

</span><p data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Brings to mind my unforgetable encounter with a Starship. In the mid 80’s (i’m sure under hypnotism I could recall the exact date; I know it was a Saturday morning) I was racing a 34′ sailboat in an important, publicized regatta on Lake St. Clair, Michigan. We were circling with the fleet behind the starting line in light, fluky air awaiting the breeze to build enough wind for the racing comittee to signal a start. In the sky above was a flock of aircraft ranging from choppers, to commemoritive to … to … to … a Starship?! I’d been mildly following Raytheon’s development of this bird, but hardly expected to see one “up” close. The crew, seeing me gaping upward, turned their faces toward the specticle. It was a jaw-dropping experience. The stuff of dreams, the plane was simply too extravagant beyond practicality, but still something to behold aloft, and someone was proud enough to show it off that day.</span></p><span data-dcnode-id="2933" instrument_node="">

</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="2773"><span data-dcnode-id="2777" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Seems everyone has a Starship story.  My last encounter with the airplane occurred on the ramp of Lane Aviation in Columbus, OH, in 1989 or 1990.  It was evening, dark, and we had just parked our Citation on Lane’s ramp behind a Starship.  The covers were in place on the airplane and it looked like the crew had already headed to the hotel.  Our flight department was located across the hangar from Lane’s main lobby.  There was a small lobby on our side of the hangar in front of our office with just a couple of chairs.  As I walked into this lobby, a man stopped me and asked how to get to I-185 from the airport.  I replied that there was no I-185 in Columbus.  I informed him that I-70 ran through Columbus, and I-270 went around the perimeter of the city.  “Isn’t this Columbus, GA,” he asked?  “No, Columbus GA is still another hour and a half down the road in the Starship you just arrived in.”  Seems the charter pilots(or Beech Demo pilots, not sure which) had brought him to the wrong Columbus.  I could see he was about ready to blow a fuse as he informed me in all his years of corporate flying(in Gulfstreams, no doubt) his company pilots had never taken him to the wrong airport.  He wanted to use our office phones but the other pilot and I just wanted to finish our paperwork and get the heck out of there.  I directed him across the hangar to Lane’s main lobby where he would find some pay phones(remember those?) on the wall.  The executive I had this conversation with was none other than F. Ross Johnson, former CEO of RJR Nabisco(Recall KKR hostile takeover of RJR in 1989, ‘Barbarians at the Gate’?).</span></p><span data-dcnode-id="2774" instrument_node="">

</span><p data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Mac, I was an engineer at Raytheon working on the Starship (Starbarge). Most of the Comments are correct regarding increased weight. I blame the FAA and BEECH. While they were trying to save airframe weight, the interior guys had cast Stainless Steel ashtrays. The real problem with the Starship is its configuration. There is a Water Tunnel Model at WSU that’s used to demonstrate interference drag. Its a model of the Starship. If you look at the aft wing junction, you see 3/4 of a divergent nozzle on each wing. The fuselage is tapering, the wing is tapering and the engine nacelle is tapering away. When the model is running in the water tunnel, a dye want will fill up this zone and show almost no flow through this junction. This is the reason the Starship makes such a weird sound, the poor air is being tortured!!! This led to the fatigue problem of the propeller. Bottom line, what looks fast isn’t necessarily fast!!!</span></p><span data-dcnode-id="2723" instrument_node="">

</span><p data-dcnode-id="2613"><span data-dcnode-id="2624" instrument_node="">Hi Mark,</span><br data-dcnode-id="2623"><span data-dcnode-id="2622" instrument_node="">
I hadn’t heard about the water tunnel model, but it makes sense. Every aerodynamicist hates intersections of any kind, and certainly complex ones like on the Starship. Maybe the wing-to-fuselage intersection could have been handled better. But the best solution  would have been to put the tail on the tail and the wing forward. Once the configuration was accepted the outcome for the Starship was set.</span><br data-dcnode-id="2621"><span data-dcnode-id="2620" instrument_node="">
 Like you say, it looks fast, but the tunnel doesn’t lie. Neither did the airspeed indicator in the actual airplane. Slick looks might sell a car where speed limits cap performance in any case. But in the air, knots, not looks, matter most.</span><br data-dcnode-id="2619"><span data-dcnode-id="2618" instrument_node="">
Thanks for the comments.</span><br data-dcnode-id="2617"><span data-dcnode-id="2616" instrument_node="">
Bests,</span><br data-dcnode-id="2615"><span data-dcnode-id="2614" instrument_node="">

</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="2501"><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Anytime you have a pusher configuration, the Prop will pass through two different masses of moving air. Its not ideal, but that is probably the reason for the weird sound the Piaggio makes. The design of the P-180 is really quite brilliant. The wing intersects in the middle of a near constant section of the fuselage. this is ideal for reduction of interference drag.  The three surface configuration allows for a far aft placement of the wing spar. This makes the cabin floor clean with no hump. The bulkhead that ties the spar in also doubles as a pressure bulkhead. The P-180 is very efficient. I remember the day the NBAA mockup of the Starbarge was unveiled. Linden Blue made a very crude ethnic joke about the P-180 and said that the N number N2001OS was what the Piaggio board was going to say when they saw the Starbarge. Turns out, it was actually the Raytheon Board when they got the bill for the program!!!</span></p><span data-dcnode-id="2502" instrument_node="">

</span><p data-dcnode-id="2398"><span data-dcnode-id="2401" instrument_node="">I see 325 kts at FL320 at standard temperature.  The airplane is certified to fly at FL 410, even with the extra 3,000 lbs of unnecessary weight mandated by the FAA.  You can’t do that with a King Air.  Imagine, if you can, how utterly awesome the airplane would have been if it were built to Burt Rutan’s original design.</span><br data-dcnode-id="2400"><span data-dcnode-id="2399" instrument_node="">
Robert Scherer – Owner/Pilot, Starship NC-51</span></p><span data-dcnode-id="2397" instrument_node="">

</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">How many aircraft designed by Burt Rutan went through a complete FAA certification process? Designing experimental aircraft is something quite different than getting one certified. Imagine how awesome some of, say, Boeings aircraft would be if they could be built to Boeings “original” design. Not judging good or bad, just that the certification process is a fact of life. Maybe attempted today the outcome would have been more positive. You obviously love the Starship and its reputed to be a stout airplane, but the reality was the market judged it negatively, sadly.</span></p><span data-dcnode-id="2348" instrument_node="">

</span><p data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">The Starship is the best airplane Beech has ever built.  It’s the ONLY airplane I would own and fly single pilot.  If Beech came to me today and offered a brand new King Air 350i in exchange for my Starship I would politely decline. The King air is a boring cargo van by comparison.  Imagine how great the Starship would have been if the FAA didn’t make Beech add 1.5 tons of unnecessary extra weight.  Counter-rotating props would have added another 10 knots at cruise and removing all but the inner 2 VG’s on the forward wing would have added 5-10 more.  Oh, and Mac, your wrong about the flaps.  The forward wing sweeps to keep the aircraft from pitching down during flap deployment.  The flaps aren’t even necessary, they reduce stall by just 5 knots.  I often take off and land without them.</span></p><span data-dcnode-id="1953" instrument_node="">

</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="1796"><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">You don’t have to carry Burt Rutan’s water!! The Starship’s basic configuration was flawed. Burt screwed up, plain and simple. There is no denying that the Starship is one draggy bird. The interference drag at the main wing intersection is Rutan’s configuration. I was there from the beginning of the construction of the 85% POC, there was never any other configuration. Compare your beloved Starship to a Cheyenne 4, that’s the reason it didn’t sell. The weight issues were caused by the FAA and more importantly, Beechcraft. The rear ventral fin is a great example of an overweigh and very poorly designed composite structure.  That example is duplicated all over that plane. My earlier comment about cast steel ashtrays is not fiction. Plenty of blame to go around for a plane universally considered a disaster. But the configuration is all Burts.</span></p><span data-dcnode-id="1797" instrument_node="">

</span><div class="comment_content" data-dcnode-id="1303"><span data-dcnode-id="1375" instrument_node="">

</span><cite class="author_name heading" data-dcnode-id="1370"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aerospaceqrd.com/" rel="nofollow"><cite class="comment_author_name" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Raj</span></cite></a></cite><span data-dcnode-id="1369" instrument_node=""> </span><span class="says" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">says:</span></span><span data-dcnode-id="1366" instrument_node="">
</span><span data-dcnode-id="1364" instrument_node="">
</span><div class="comment-meta commentmetadata" data-dcnode-id="1356"><span data-dcnode-id="1363" instrument_node="">
</span><a data-dcnode-id="1358" href="#comment-1841124"><span data-dcnode-id="1362" instrument_node="">
</span><time data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">
                                    May 16, 2018 at 10:57 am                                </span></time><span data-dcnode-id="1359" instrument_node="">
</span></a><span data-dcnode-id="1357" instrument_node="">

</span></header><span data-dcnode-id="1353" instrument_node="">
</span><span data-dcnode-id="1351" instrument_node="">
</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="1305"><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Hello Mac, I certainly appreciate the article on the Starship and some of the negatives with the aircraft. What must also be considered is that to be first and revolutionary you have to take chances. Aircraft designs in the 70-80’s were not as solid and vetted as they are today (and today I argue that every airplane I see is just reconstituted designs from the 80’s). Analysis methods and technology were not robust enough on any platform in that era. Certainly composites, certification of composites, and process control was not robust in the 80’s as most of the process control was still being proven out. Yes Beechcraft embarked on a revolutionary change in design, manufacturing, and certification. Hindsight is 20-20 and obviously it wasn’t a success. However, I submit that the lessons learned from starship formed the essence of subsequent platforms in the aerospace industry including the Premier and 787 and many military programs. Yes commercially Beechcraft failed, but had they not been acquired by (bean counter led companies) instead of aviation purists (designers, pilots, engineers, coupled with fiscal sense)  that could pursue true design change, it might have been a different story. </span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">While your article certainly is not complimentary of the design or technology, you don’t mention any of the incredible technological lessons learned from Starship that cascaded into various parts of the company, and not including Textron. </span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">From an owner/operator perspective the starship is a fine airplane. 30 years old it has not succumbed to many of the metal fatigue/corrosion issues of King Airs, Citations, Merlins, and other similar aircraft. 30 years later its systems including landing gear, and other mechanical systems are easily repairable and supportable in the field. </span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Ask yourself this question – if I bought a similar type airplane (Piaggo, 500 series citation, Piper Cheyanne) where would I be at 30 years of age on that platform? I will submit that the citation suffers from horrible reliability of its airframe due to corrosion and fatigue. The Piaggo suffers from a terrible supply chain problem including a landing gear that costs in excess of 200K to overhaul, and the Cheyanne is just a sub-par build quality airplane (my opinion) as an (aerospace engineer, aircraft mechanic, and an ATP). </span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Yes I am defending the Starship. I am defending it because I have 3000+ hours in a Starship and continue to successfully operate 2 aircraft today 30 years later. However, having worked on the airplane, modified it, and upgraded it in the field, I am going to tell you very few aircraft that were made in the last 30 years, much less today have the simplicity of design as the starship today. You want to rig an engine today? Send the box in and get a 100k bill. You want to fly past 10000 hours – aging aircraft inspection here we come at a bill of 1M. You want to overhaul your landing gears (special tools, and 1 OEM) here we come. In fact I spend 95% of my life designing replacement solutions for obsolesce products on aircraft and or repairs to keep older airplanes flying? Why is that? none of these GA designs are optimized, much less the starship. Textron, Gulfstream, Embraer build airplanes like new cars. Fly them for 2500 hours, scrap them. God help you if you want to sustain the platform for 10+ years of longer. </span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">My point is this: Starship was a commercial failure. However, the design lessons learned, the sustainability of platform lessons learned, and the composite manufacturing lessons learned were instrumental for the aerospace industry. If our industry had more risk in its nature we would design more, fly more, test more, fail more, but MOST importantly LEARN more. </span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">I will submit to the group and to this article the following: You tell me where you can find an airplane that will fly at Flight Level 35.0/36.0, Cruise north of 300 KIAS, 95 GPH of JetA, 6 passengers, and go 1200 NM, Single Pilot, and have TRUE SAFETY REDUNDANCY?  Has an unlimited life of validity for its airframe? has no fatigue critical or corrosion based aging aircraft inspections? </span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">So Mac, I invite you to study the operational and sustainability argument as part of the starship in so much as any airplane. It is never the acquisition cost as many of us know, its the maintenance and sustainability costs. Those also have to factor in to the equation in any prognosis as to the good/bad of an airplane. Furthermore, I invite you to interview the 3 guys flying the airplane and the guys that work on the airplane and keep them flying. You might find that while short on initial design and performance expectations, the Starship 30 years later has allot to offer in terms of performance, reliability, safety standard, IFR/IMC capability etc. Including that fact that the safety systems and its certification basis being to FAA/FAR Part 23 Commuter category created one hell of a robust platform for future durability and reliability. </span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Feel free to reach out to Robert or myself. we would love to chat and share the good with the bad so that more perspective can be given on the Starship story as misaligned as its been. </span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1322" instrument_node="">Regards,</span><br data-dcnode-id="1321"><span data-dcnode-id="1320" instrument_node="">
Raj Narayanan</span><br data-dcnode-id="1319"><span data-dcnode-id="1318" instrument_node="">

</span><p data-dcnode-id="934"><span data-dcnode-id="937" instrument_node="">As a Flight Service Specialist at Macon AFSS (MCN, and not to be confused with MAC), while giving a face-to-face pilot briefing, when I asked for the type aircraft, the pilot replied, “A Scareship! Sorry a Starship – BEST)”  He said it was a common joke.  I was amused.</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">
After the briefing, the pilot asks if I would like to see the aircraft, I was due for a break and got to see firsthand what a beautiful and I think innovative aircraft up close and personal.  I was impressed but admit I have always wanted to fly in one but unfortunately have yet to take a ride in the BEST.</span></p><span data-dcnode-id="933" instrument_node="">

</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">First of all, the differing feelings related to the Starship are normal.  What is not normal is the descent down into the muck of zealous disagreements.  With that said, let’s stop the mud-slinging and keep the dialogue professional and educational.  We owe it to the newer aviators who look to you seasoned aviators for wisdom and mentoring – not catfighting among yourselves.  We need to follow the great wisdom of the Dragnet TV show: “… just the facts ma’am …”. Mac Mc, please keep up your writing. I enjoy it immensely and I learn something valuable to my flying career.  Mr’s Scherer, Narayanan and Calder, I learned a lot from data you all brought to the discussion and I am envious of your flying and your ownership of a truly unique aircraft (that I would absolutely love to fly).</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">I think I have something (to a degree) in common with the Starship.  I own and fly a Skymaster and I face a daily barrage of Mixmaster jokes, maintenance ridicule and etc..  I feel that the Skymaster was a concept that was ahead of its time and a commercial program that was totally failed by its marketing team.  In this article and in the comments, I learned new information on “pusher prop”  aerodynamics and I learned that I now lust to fly a Starship.  In both the Starship and the Skymaster, I wonder what they could have been with 2018 technology, composites, FAA acceptance of new ideas (and not bad ideas of over-engineering 3000lbs of unneeded structure) and modern marketing.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">“Spud” out</span></p><span data-dcnode-id="876" instrument_node="">

</span><div class="comment_text entry-content-wrapper clearfix" data-dcnode-id="540"><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">All this suggests that indeed a STARSHIP-II is overdue to settle at least many of the weight-issues in the context of 2019 composite-airframe regulations.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Would Master Rutan have ‘second’ thoughts on this theme?  After all, few designers are ever truly ‘done’ on even the most serious projects ?!  </span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Even the afore-mentioned aerodynamic complexities might have plausible answers for today, to at least reduce some of the geometrically-inevitable challenges.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">In the overall scheme of ‘Efficiency’ and ‘Sustainability’ – both increasing in technical and ethical urgency – this STARSHIP-II turboprop should outperform the jet-competition in the 2020s.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">With ‘outsider novices’ e.g. plausibly starting up electric-car companies, and with the full might Master Rutan’s experience on hand, are there no well-heeled folks intrigued enough to pursue STARSHIP-II ?</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">And while we are at it, we also REALLY need Super-STOL composite amphibians in a range of sizes…  Shared overall geometries.  Just in a range of size/carrying-capacities.  For some of those, we might even look at plywood/epoxy/foam/fiberglass hulls so well buildable as one-off options to again and again adapt to different needs…</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Be advised however, that flying-boat hulls are not ‘as easy’ as too many aircraft-designers have apparently assumed across the last 115 years.  One of the many reasons why despite a globe with endless water runways, we do not have an adequate range of such types available.</span></p><span data-dcnode-id="541" instrument_node="">

</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">A lovely aircraft does not need to be an efficient one, nor the vice versa, but often looks go with good handling. </span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">The odd-looking Avanti sure makes a lot of noise during take-off, just as the Starship, due to the different airflow speeds over and under the wing loading the propeller unevenly.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">I guess propeller wear and tear is greater on any pusher than on tractor installations, but pushers look good, I must confess!</span></p><span data-dcnode-id="484" instrument_node="">

Secondly, forgetting the technical aspects and the economic aspects, how many of us let our imaginations run or were inspired by not only the wonder of flight, but by a design enveloped pushed to and maybe past their limits as it flew overhead?</span><br data-dcnode-id="432"><span data-dcnode-id="431" instrument_node="">

</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Having flown the Starship and been directly involved with its initial introduction into the charter market, three other issues contributed to its demise:  </span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="377" instrument_node="">1)the sheer size of the aircraft made it all but impossible to hangar in other than huge, mass storage hangars making it unattractive to potential owners who leased or owned private hangars;</span><br data-dcnode-id="376"><span data-dcnode-id="375" instrument_node="">
2)an un-nerving vibration throughout the airframe when power was reduced to flight idle at top of decent- initially attributed to the huge composite props;</span><br data-dcnode-id="374"><span data-dcnode-id="373" instrument_node="">
3)an unknown and uncertain repair should any part of the fuselage or wing be damaged – first addressed when a hand tool was inadvertently dropped on the top surface of a wing;</span><br data-dcnode-id="372"><span data-dcnode-id="371" instrument_node="">
4) the performance of the forward canard was greatly diminished if contaminated by frost or other contaminants which could lead to an off airport excursion on take off if left unchecked.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">My personal hands on experience flying the airplane was great- very stable, stall recovery required minimal control input as it basically fluttered down through the air, instrument approaches were a breeze as you could track the airplane’s progress on the localizer using the EFIS, turn off track to avoid weather, and then reposition the airplane onto the localizer effortlessly which was a BIG deal back then, and it was faster than the King Air’s of the day though, as mentioned, didn’t make the numbers as advertised.  I hated to see it go but also knew it would likely never make it in the long run.  A very cool airplane in the day and one that I will always be grateful for the opportunity to fly.</span></p><span data-dcnode-id="366" instrument_node="">
</span></div><span data-dcnode-id="364" instrument_node="">
