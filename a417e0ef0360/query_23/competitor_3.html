</span><p class="lead" data-dcnode-id="1039" style="margin-top: 0cm; background-color: white; text-align: justify; background-position: initial initial; background-repeat: initial initial;"><span data-dcnode-id="1045" style="font-family: 'Arial','sans-serif'; color: #7a7a7a;"><span data-dcnode-id="1046" instrument_node="">A&nbsp;</span></span><b data-dcnode-id="1042"><span data-dcnode-id="1043" style="font-family: 'Arial','sans-serif'; color: #7a7a7a;"><span data-dcnode-id="1044" instrument_node="">GENAQ</span></span></b><span data-dcnode-id="1040" style="font-family: 'Arial','sans-serif'; color: #7a7a7a;"><span data-dcnode-id="1041" instrument_node="">&nbsp;atmospheric water generator obtains drinking water through the condensation of water vapor contained in the atmospheric air. It uses the thermodynamic cycle with mechanical refrigeration technology with an advanced electronic control.</span></span></p><span data-dcnode-id="1038" instrument_node="">
</span><p class="lead" data-dcnode-id="1035" style="margin-top: 0cm; background-color: white; text-align: justify; background-position: initial initial; background-repeat: initial initial;"><span data-dcnode-id="1036" style="font-family: 'Arial','sans-serif'; color: #7a7a7a;"><span data-dcnode-id="1037" instrument_node="">Technological improvements have been developed to increase efficiency and, thereby, reduce energy consumption and maximize water generation.</span></span></p><span data-dcnode-id="1034" instrument_node="">
</span><p class="lead" data-dcnode-id="1031" style="margin-top: 0cm; background-color: white; text-align: justify; background-position: initial initial; background-repeat: initial initial;"><span data-dcnode-id="1032" style="font-family: 'Arial','sans-serif'; color: #7a7a7a;"><span data-dcnode-id="1033" instrument_node="">In order to ensure the highest quality of water, the process includes air and water treatments to eliminate suspended particles in the atmosphere and water soluble volatile organic compounds, to increase water mineralisation for drinking water, and to ensure proper&nbsp;conservation for stored water.</span></span></p></div><span data-dcnode-id="1029" instrument_node="">

</span><h2 data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">BENEFITS</span></h2><span data-dcnode-id="979" instrument_node="">
</span><hr data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">

</span><div class="row gap-y align-items-center" data-dcnode-id="950"><span data-dcnode-id="974" instrument_node="">
</span><div class="col-12 col-md-7 order-md-last" data-dcnode-id="957"><span data-dcnode-id="973" instrument_node="">
</span><h4 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">The highest water quality</span></h4><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="969"></p><p data-dcnode-id="960" style="text-align: justify;"><span data-dcnode-id="968" instrument_node="">Thanks to our triple filtration system, a GENAQ atmospheric water generator produces pure drinking water with the highest quality and purity with low mineralisation, free from biologic contamination, and with excellent physical and chemical properties even in industrial or polluted areas.</span><br data-dcnode-id="967"><span data-dcnode-id="966" instrument_node="">
It is ideal for human consumption and for other purposes such as preparation of food, irrigation, water supply to animals,…
</span><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">
Produced water complies with </span><b data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">World Health Organisation (WHO) standards</span></b><span data-dcnode-id="961" instrument_node=""> for drinking water and is certified by European health authorities.</span></p><p data-dcnode-id="959"></p><span data-dcnode-id="958" instrument_node="">
</span></div><span data-dcnode-id="956" instrument_node="">
</span><div class="col-12 col-md-5 order-md-first" data-dcnode-id="952"><span data-dcnode-id="955" instrument_node="">
</span><img alt="BENEFITS" class="rounded shadow-2" data-dcnode-id="954" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.genaq.com/wp-content/uploads/2017/12/WHO.png&amp;raw"><span data-dcnode-id="953" instrument_node="">
</span></div><span data-dcnode-id="951" instrument_node="">
</span></div><span data-dcnode-id="949" instrument_node="">
</span><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
</span><hr data-dcnode-id="946"><span data-dcnode-id="945" instrument_node="">
</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">
</span><div class="row gap-y align-items-center" data-dcnode-id="917"><span data-dcnode-id="942" instrument_node="">
</span><div class="col-12 col-md-7" data-dcnode-id="924"><span data-dcnode-id="941" instrument_node="">
</span><h4 data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Anywhere you need water</span></h4><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="937"></p><p data-dcnode-id="927" style="text-align: justify;"><span data-dcnode-id="936" instrument_node="">Our atmospheric water generators produce water </span><b data-dcnode-id="934"><span data-dcnode-id="935" instrument_node=""> wherever it is needed</span></b><span data-dcnode-id="933" instrument_node=""> and in the required quantity for consumption.
In addition they are </span><b data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">portable</span></b><span data-dcnode-id="930" instrument_node="">, so you can easily transport them.</span><br data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
They also function in arid climates with temperatures over 50ºC (122F) and relative humidity lower than 20%, and also in industrial or polluted areas, where our technology ensures high quality drinking water.</span></p><p data-dcnode-id="926"></p><span data-dcnode-id="925" instrument_node="">
</span></div><span data-dcnode-id="923" instrument_node="">
</span><div class="col-12 col-md-5" data-dcnode-id="919"><span data-dcnode-id="922" instrument_node="">
</span><img alt="BENEFITS" class="rounded shadow-2" data-dcnode-id="921" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.genaq.com/wp-content/uploads/2017/12/DSCN2418copia-1-e1513172171953.jpg&amp;raw"><span data-dcnode-id="920" instrument_node="">
</span></div><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">
</span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">
</span><hr data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">
</span><br data-dcnode-id="911"><span data-dcnode-id="910" instrument_node="">
</span><div class="row gap-y align-items-center" data-dcnode-id="890"><span data-dcnode-id="909" instrument_node="">
</span><div class="col-12 col-md-7 order-md-last" data-dcnode-id="897"><span data-dcnode-id="908" instrument_node="">
</span><h4 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Autonomy</span></h4><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="904"></p><p data-dcnode-id="900" style="text-align: justify;"><span data-dcnode-id="903" instrument_node="">
Only air and a source of energy are required, with no need for water collection, storage or distribution facilities.</span><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">
It can operate in remote locations without being connected to the power supply network using solar panels, wind turbines or a diesel power unit.</span></p><p data-dcnode-id="899"></p><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span><div class="col-12 col-md-5 order-md-first" data-dcnode-id="892"><span data-dcnode-id="895" instrument_node="">
</span><img alt="BENEFITS" class="rounded shadow-2" data-dcnode-id="894" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.genaq.com/wp-content/uploads/2017/12/shutterstock_528945763.jpg&amp;raw"><span data-dcnode-id="893" instrument_node="">
</span></div><span data-dcnode-id="891" instrument_node="">
</span></div><span data-dcnode-id="889" instrument_node="">
</span><br data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">
</span><hr data-dcnode-id="886"><span data-dcnode-id="885" instrument_node="">
</span><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">
</span><div class="row gap-y align-items-center" data-dcnode-id="859"><span data-dcnode-id="882" instrument_node="">
</span><div class="col-12 col-md-7" data-dcnode-id="866"><span data-dcnode-id="881" instrument_node="">
</span><h4 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Environmentally-friendly</span></h4><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="877"></p><p data-dcnode-id="869" style="text-align: justify;"><b data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Renewable source of water. </span></b><span data-dcnode-id="874" instrument_node=""> Like surface water, water contained in the atmosphere is a natural renewable resource. The condensation of the water vapor is a natural phenomenon that leads to rain, thanks to the temperature difference between the air and the ground. By reproducing this phenomenon, our generators allow for the exploitation of this renewable source of water that, unlike water purifying systems by desalination, </span><b data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">produces no waste.</span></b><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">
In combination with renewable energy, a GENAQ atmospheric water generator allows for a continuous water supply in isolated areas at zero energy cost and with no negative effect on the environment, preserving the natural resources on earth.</span></p><p data-dcnode-id="868"></p><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span><div class="col-12 col-md-5" data-dcnode-id="861"><span data-dcnode-id="864" instrument_node="">
