0T180 -117T154 -158T130 -185T117 -194Q113 -194 104 -185T95 -172Q95 -168 106 -156T131 -126T157 -76T173 -3V9L172 8Q170 7 167 6T161 3T152 1T140 0Q113 0 96 17Z" data-dcnode-id="5547" id="MJMAIN-2C" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="5507" role="presentation"><math data-dcnode-id="5508" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="5509" is="true"><mrow data-dcnode-id="5530" is="true"><mrow data-dcnode-id="5539" is="true"><mi data-dcnode-id="5540" is="true" mathvariant="normal"><span data-dcnode-id="5541" instrument_node="">Average</span></mi></mrow><mspace data-dcnode-id="5538" is="true" width="0.25em"></mspace><mrow data-dcnode-id="5535" is="true"><mi data-dcnode-id="5536" is="true" mathvariant="normal"><span data-dcnode-id="5537" instrument_node="">evaporation</span></mi></mrow><mspace data-dcnode-id="5534" is="true" width="0.25em"></mspace><mrow data-dcnode-id="5531" is="true"><mi data-dcnode-id="5532" is="true" mathvariant="normal"><span data-dcnode-id="5533" instrument_node="">rate</span></mi></mrow></mrow><mo data-dcnode-id="5528" is="true" linebreak="goodbreak"><span data-dcnode-id="5529" instrument_node="">=</span></mo><mfrac data-dcnode-id="5512" is="true"><mrow data-dcnode-id="5520" is="true"><msub data-dcnode-id="5521" is="true"><mrow data-dcnode-id="5525" is="true"><mi data-dcnode-id="5526" is="true"><span data-dcnode-id="5527" instrument_node="">m</span></mi></mrow><mrow data-dcnode-id="5522" is="true"><mi data-dcnode-id="5523" is="true"><span data-dcnode-id="5524" instrument_node="">h</span></mi></mrow></msub></mrow><mrow data-dcnode-id="5513" is="true"><mi data-dcnode-id="5518" is="true"><span data-dcnode-id="5519" instrument_node="">A</span></mi><mo data-dcnode-id="5516" is="true"><span data-dcnode-id="5517" instrument_node="">*</span></mo><mi data-dcnode-id="5514" is="true"><span data-dcnode-id="5515" instrument_node="">h</span></mi></mrow></mfrac><mo data-dcnode-id="5510" is="true"><span data-dcnode-id="5511" instrument_node="">,</span></mo></mrow></math></span></span></span></span></span><span data-dcnode-id="5500" instrument_node="">where </span><em data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">m</span></em><sub data-dcnode-id="5495"><em data-dcnode-id="5496"><span data-dcnode-id="5497" instrument_node="">h</span></em></sub><span data-dcnode-id="5494" instrument_node=""> is the mass of the harvested liquid water at various times, </span><em data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">A</span></em><span data-dcnode-id="5491" instrument_node=""> is the efficient area of the top surface of the NBHA, which was equal to the area of the square opening in the center of the bottom surface of the top container, and </span><em data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">h</span></em><span data-dcnode-id="5488" instrument_node=""> is the time corresponding to </span><em data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">m</span></em><sub data-dcnode-id="5483"><em data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">h</span></em></sub><span data-dcnode-id="5482" instrument_node="">.</span></p></section></section><section data-dcnode-id="5047" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5473" id="sect0080"><span data-dcnode-id="5478" instrument_node="">3</span><span data-dcnode-id="5476" instrument_node="">. </span><span data-dcnode-id="5474" instrument_node="">Results and discussion</span></h2><div data-dcnode-id="5442"><p data-dcnode-id="5468" id="p0095"><span data-dcnode-id="5472" instrument_node="">The operation of the NBHA for AWH comprises two steps: moisture absorption and water release by solar-powered vapor evaporation (</span><a class="workspace-trigger" data-dcnode-id="5470" href="#fig0005" name="bfig0005"><span data-dcnode-id="5471" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5469" instrument_node="">). LiCl particles are attached to and filled the aerogel skeleton. When exposed the NBHA to air, the water molecules are absorbed and liquefied on the surface of the hygroscopic LiCl, which gradually dissolves. The dissolved LiCl continues to absorb moisture until it reaches saturation. The as-generated liquid water is continuously penetrated and storage within the hydrophilic NFC networks, achieving the absorbing of water vapor from air, liquefaction and the storage of liquid water. Subsequently, the solar irradiation releases water from the NBHA. The porous graphene layer on the surface of the NBHA quickly absorbs sunlight and transforms it into heat, enabling the rapid evaporation of water. The capillary forces and porous channels within the NBHA promote the supply of absorbed water to the interface that transforms light into heat, facilitating the continuous and highly efficient solar-powered water vapor generation.</span></p><figure class="figure text-xs" data-dcnode-id="5443" id="fig0005"><span data-dcnode-id="5452"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="5467" height="436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr1.jpg&amp;raw"><span data-dcnode-id="5466" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5453"><li data-dcnode-id="5460"><a class="anchor download-link u-font-sans" data-dcnode-id="5461" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr1_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="5462"><span data-dcnode-id="5465" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="5454"><a class="anchor download-link u-font-sans" data-dcnode-id="5455" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5456"><span data-dcnode-id="5459" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5444"><span data-dcnode-id="5445" id="cap0005"><p data-dcnode-id="5446" id="sp0005"><span class="label" data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5449" instrument_node="">. </span><span data-dcnode-id="5447" instrument_node="">Schematic illustration showing the structure of the nanostructured biopolymer hygroscopic aerogel (NBHA) and the atmospheric water harvesting (AWH) process using NBHA.</span></p></span></span></figure></div><div data-dcnode-id="5390"><p data-dcnode-id="5425" id="p0100"><span data-dcnode-id="5441" instrument_node="">An aqueous dispersion of graphene was poured onto an aqueous suspension of high-aspect ratio NFC (</span><a class="workspace-trigger" data-dcnode-id="5439" href="#sec0080" name="bsec0080"><span data-dcnode-id="5440" instrument_node="">Fig. S1</span></a><span data-dcnode-id="5438" instrument_node="">) to fabricate NBHA. Ethanol was introduced to replace the water molecules in the graphene and NFC dispersions. After addition, the ethanol molecules diffused into the NFC suspension and graphene dispersion. At the same time, the water molecules contained inside the NFC suspension and graphene dispersion diffused out and were replaced by ethanol. Therefore, the dispersion environment of NFC and graphene was changed by the mutual diffusion of ethanol and water, resulting in the aggregation of NFC and graphene and generation of self-standing bilayer gel. A thin graphene layer is tightly connected with the NFC gel layer during the ethanol exchange process. The thickness of the NFC layer and graphene layer can be controlled by manipulating the amount of NFC suspension and graphene dispersion. Using a similar replacement process, an NBHH was produced by pouring an aqueous solution of LiCl onto the gel to exchange ethanol. Subsequent lyophilization of the NBHH generated the NBHA (</span><a class="workspace-trigger" data-dcnode-id="5436" href="#fig0010" name="bfig0010"><span data-dcnode-id="5437" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5435" instrument_node="">). The top surfaces of the NBHH and NBHA were black owing to the graphene layer (</span><a class="workspace-trigger" data-dcnode-id="5433" href="#fig0010" name="bfig0010"><span data-dcnode-id="5434" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5432" instrument_node="">a), whereas the bottom layers were white (</span><a class="workspace-trigger" data-dcnode-id="5430" href="#fig0010" name="bfig0010"><span data-dcnode-id="5431" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5429" instrument_node="">b). The NBHH shrank a little during freeze-drying. LiCl existed as micron-sized particles (</span><a class="workspace-trigger" data-dcnode-id="5427" href="#fig0010" name="bfig0010"><span data-dcnode-id="5428" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5426" instrument_node="">b, rightmost column). The LiCl particles filled the pores and were widely distributed within the whole aerogel skeleton. Owing to the introduction of ice templates during lyophilization, the aggregation of NFC, graphene, and LiCl in the corresponding layers results in highly porous structures with interconnected micron- and nano-scale pores, which benefits water storage, transportation, and vapor evaporation during the whole AWH process.</span></p><figure class="figure text-xs" data-dcnode-id="5391" id="fig0010"><span data-dcnode-id="5409"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="5424" height="458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr2.jpg&amp;raw"><span data-dcnode-id="5423" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5410"><li data-dcnode-id="5417"><a class="anchor download-link u-font-sans" data-dcnode-id="5418" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr2_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="5419"><span data-dcnode-id="5422" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5420"><span data-dcnode-id="5421" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="5411"><a class="anchor download-link u-font-sans" data-dcnode-id="5412" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5413"><span data-dcnode-id="5416" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5414"><span data-dcnode-id="5415" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5392"><span data-dcnode-id="5393" id="cap0010"><p data-dcnode-id="5394" id="sp0010"><span class="label" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">Fig. 2</span></span><span data-dcnode-id="5406" instrument_node="">. </span><span data-dcnode-id="5404" instrument_node="">Fabrication of NBHA. Digital photographs and SEM images of (</span><strong data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">a</span></strong><span data-dcnode-id="5401" instrument_node="">) graphene-side surface, (</span><strong data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">b</span></strong><span data-dcnode-id="5398" instrument_node="">) NFC-side surface and (</span><strong data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">c</span></strong><span data-dcnode-id="5395" instrument_node="">) vertical-sectional of nanostructured biopolymer hygroscopic hydrogel (NBHH) and NBHA. The leftmost column is the images of NBHH, while the other columns are the images of NBHA.</span></p></span></span></figure></div><div data-dcnode-id="5317"><p data-dcnode-id="5355" id="p0105"><span data-dcnode-id="5389" instrument_node="">The NBHH and wet NBHA after absorbing water vapor from air exhibited standard elastomer behavior, i.e., they apparently had higher storage moduli (</span><em data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">G′</span></em><span data-dcnode-id="5386" instrument_node="">) than loss moduli (</span><em data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">G′′</span></em><span data-dcnode-id="5383" instrument_node="">) throughout the whole frequency scanning range (</span><a class="workspace-trigger" data-dcnode-id="5381" href="#sec0080" name="bsec0080"><span data-dcnode-id="5382" instrument_node="">Fig. S2</span></a><span data-dcnode-id="5380" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="5378" href="#fig0015" name="bfig0015"><span data-dcnode-id="5379" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5377" instrument_node="">a). The slopes of the </span><em data-dcnode-id="5375"><span data-dcnode-id="5376" instrument_node="">G′</span></em><span data-dcnode-id="5374" instrument_node=""> and </span><em data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">G′′</span></em><span data-dcnode-id="5371" instrument_node=""> curves of the gels hardly changed as the angular frequency increased, indicating the crosslinked network structures of the gels. Owing to the formation of strong hydrogen bonds among the entangled NFC networks during the freeze-drying process, the wet NBHA had higher </span><em data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">G′</span></em><span data-dcnode-id="5368" instrument_node=""> and </span><em data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">G′′</span></em><span data-dcnode-id="5365" instrument_node=""> values than the NBHH. The compressive stress of the NBHH and wet NBHA were low because they were storing large amounts of water (</span><a class="workspace-trigger" data-dcnode-id="5363" href="#fig0015" name="bfig0015"><span data-dcnode-id="5364" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5362" instrument_node="">b). In contrast, the dry NBHA had a relatively high compressive strength of 33.8 MPa at a compressive strain of 80% (</span><a class="workspace-trigger" data-dcnode-id="5360" href="#fig0015" name="bfig0015"><span data-dcnode-id="5361" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5359" instrument_node="">b). Images of the gels before and after compression are provided in </span><a class="workspace-trigger" data-dcnode-id="5357" href="#sec0080" name="bsec0080"><span data-dcnode-id="5358" instrument_node="">Fig. S3</span></a><span data-dcnode-id="5356" instrument_node=""> for comparison. The apparent strength difference between the gels implies the high water vapor absorption and storage capability of the NBHA.</span></p><figure class="figure text-xs" data-dcnode-id="5318" id="fig0015"><span data-dcnode-id="5339"><img alt="Fig. 3" aria-describedby="cap0015" data-dcnode-id="5354" height="492" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr3.jpg&amp;raw"><span data-dcnode-id="5353" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5340"><li data-dcnode-id="5347"><a class="anchor download-link u-font-sans" data-dcnode-id="5348" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr3_lrg.jpg" target="_blank" title="Download high-res image (709KB)"><span class="anchor-text" data-dcnode-id="5349"><span data-dcnode-id="5352" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">Download high-res image (709KB)</span></span></span></a></li><li data-dcnode-id="5341"><a class="anchor download-link u-font-sans" data-dcnode-id="5342" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5343"><span data-dcnode-id="5346" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5319"><span data-dcnode-id="5320" id="cap0015"><p data-dcnode-id="5321" id="sp0015"><span class="label" data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">Fig. 3</span></span><span data-dcnode-id="5336" instrument_node="">. </span><span data-dcnode-id="5334" instrument_node="">Characterization of the NBHAs. (</span><strong data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">a</span></strong><span data-dcnode-id="5331" instrument_node="">) Dynamic rheological properties of the wet NBHAs. (</span><strong data-dcnode-id="5329"><span data-dcnode-id="5330" instrument_node="">b</span></strong><span data-dcnode-id="5328" instrument_node="">) Compressive stress-strain curves of the NBHHs, NBHAs and wet NBHAs. (</span><strong data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">c</span></strong><span data-dcnode-id="5325" instrument_node="">) Light absorption spectra for the two sides of NBHAs and wet NBHAs. (</span><strong data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">d</span></strong><span data-dcnode-id="5322" instrument_node="">) Light reflectance spectra for the two sides of NBHAs and wet NBHAs.</span></p></span></span></figure></div><p data-dcnode-id="5309" id="p0110"><span data-dcnode-id="5316" instrument_node="">The graphene layer of the NBHA exhibited good light absorption properties over the whole solar spectrum, in both the dry and wet states (</span><a class="workspace-trigger" data-dcnode-id="5314" href="#fig0015" name="bfig0015"><span data-dcnode-id="5315" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5313" instrument_node="">c). In the wavelength range 190–1,800 nm, the light absorptivity of the graphene layer of the NBHA (G-NBHA) was &gt; 92% in the dry state and &gt; 86% in the wet state. However, the light absorbance of the NFC layer of both the dry and wet NBHA (N-NBHAs) was only 66–74% in the wavelength range 400–1,300 nm. Furthermore, the graphene layer also apparently exhibited lower light reflectance (i.e., &lt; 5.7%) than the NFC layer in the wavelength range 250–2,000 nm (</span><a class="workspace-trigger" data-dcnode-id="5311" href="#fig0015" name="bfig0015"><span data-dcnode-id="5312" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5310" instrument_node="">d). The intrinsic light management performance of the NBHA means that most of the sunlight that falls on the graphene layer is collected; following photothermal conversion, this provides sufficient energy for steam generation. Thus, the NFC layer is mainly used for moisture absorption and storage, whereas the graphene layer is exploited for solar-powered water vapor evaporation.</span></p><div data-dcnode-id="5260"><p data-dcnode-id="5301" id="p0115"><span data-dcnode-id="5308" instrument_node="">The NBHA was exposed to air, and its ability to absorb atmospheric water was compared with the absorption capabilities of other hygroscopic materials. The moisture absorption capability of the NBHA-with or without graphene was better than that of commercial hygroscopic agents such as silica gel and 4 A molecular sieve (</span><a class="workspace-trigger" data-dcnode-id="5306" href="#fig0020" name="bfig0020"><span data-dcnode-id="5307" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5305" instrument_node="">a). NBA without LiCl are almost incapable of water vapor absorption, implying that the moisture absorption of the NBHA is solely contributed by the LiCl. At a RH of ~28%, 0.9 g of the NBHA was capable of absorbing 0.07 g of water vapor in 1 h, whereas the same mass 4 A molecular sieve and silica gel required 2 h and 13 h, respectively, to adsorb 0.06 g of water. After 40 h of absorption, the water uptake of the NBHA was 0.76 g g</span><sup data-dcnode-id="5303"><span data-dcnode-id="5304" instrument_node="">−1</span></sup><span data-dcnode-id="5302" instrument_node="">, which was 5.3 times and 12.7 times greater than the water uptake values of the 4 A molecular sieve and silica gel, respectively. The water uptake increasing rate of the NBHA is apparently larger than that of both the 4 A molecular sieve and silica gel. The rapid water absorption persisted for longer time in the NBHA. In addition, the saturated absorption capacity, and the time taken to reach saturation, were obviously greater in the NBHA than in commercial hygroscopic agents. Thus, compared with the 4 A molecular sieve and silica gel, NBHA was able to absorb water vapor more rapidly and at a stable rate. The NBHA can also absorb and store more water for a longer period.</span></p><figure class="figure text-xs" data-dcnode-id="5261" id="fig0020"><span data-dcnode-id="5285"><img alt="Fig. 4" aria-describedby="cap0020" data-dcnode-id="5300" height="498" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr4.jpg&amp;raw"><span data-dcnode-id="5299" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5286"><li data-dcnode-id="5293"><a class="anchor download-link u-font-sans" data-dcnode-id="5294" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr4_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="5295"><span data-dcnode-id="5298" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5296"><span data-dcnode-id="5297" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="5287"><a class="anchor download-link u-font-sans" data-dcnode-id="5288" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5289"><span data-dcnode-id="5292" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5262"><span data-dcnode-id="5263" id="cap0020"><p data-dcnode-id="5264" id="sp0020"><span class="label" data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Fig. 4</span></span><span data-dcnode-id="5282" instrument_node="">. </span><span data-dcnode-id="5280" instrument_node="">Absorbing water from air. (</span><strong data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">a</span></strong><span data-dcnode-id="5277" instrument_node="">) Comparison of the water uptakes of NBHA and other hygroscopic materials when exposed to air at ~24 °C and ~28% RH. (</span><strong data-dcnode-id="5275"><span data-dcnode-id="5276" instrument_node="">b</span></strong><span data-dcnode-id="5274" instrument_node="">) Comparison of the water uptakes of NBHA when exposed to air at ~24 °C and at various levels of RH. (</span><strong data-dcnode-id="5272"><span data-dcnode-id="5273" instrument_node="">c</span></strong><span data-dcnode-id="5271" instrument_node="">) Comparison of the water uptakes of the NBHA in a consistent temperature and humidity chamber at 25 °C and at various levels of RH. (</span><strong data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">d</span></strong><span data-dcnode-id="5268" instrument_node="">) Digital photographs of the NBHA after absorbing water from the air for various times. (</span><strong data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">e</span></strong><span data-dcnode-id="5265" instrument_node="">) Digital photographs of the NBHA before (top) and after (middle and bottom) moisture absorption after bending (top), twisting (middle), and folding (bottom).</span></p></span></span></figure></div><p data-dcnode-id="5246" id="p0120"><span data-dcnode-id="5259" instrument_node="">The moisture absorption of the NBHA in air at ~24 °C was determined at various RH values (</span><a class="workspace-trigger" data-dcnode-id="5257" href="#fig0020" name="bfig0020"><span data-dcnode-id="5258" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5256" instrument_node="">b). In the initial stage, the NBHA rapidly absorbed water vapor from the air. Following continuous absorption, the moisture absorption rate gradually decreased until the saturation point was reached. The higher the RH, the greater the amount of water was absorbed. After 24 h, the water uptake values of the NBHA were 0.55 g g</span><sup data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">−1</span></sup><span data-dcnode-id="5253" instrument_node="">, 0.80 g g</span><sup data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">−1</span></sup><span data-dcnode-id="5250" instrument_node="">, and 0.92 g g</span><sup data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">−1</span></sup><span data-dcnode-id="5247" instrument_node=""> at RH values of ~18%, ~33%, and ~42%, respectively. Even at extremely low humidity with RH of ~18%, the NBHA still had good hygroscopic performance. It absorbed 0.61 times its own weight of water using 48 h, indicating the robustness of its absorption capabilities even at low humidity. At ~ 48 h, the NBHA has reached saturated absorption point with stable water uptakes. The weight of the NBHA did not decrease, illustrating its high water grabbing capability in air at room temperature (i.e., ~24 °C in the present study).</span></p><p data-dcnode-id="5226" id="p0125"><span data-dcnode-id="5245" instrument_node="">The moisture absorption behavior of the NBHA was further studied at RH values of 35–95% in a constant humidity chamber at 25 °C (</span><a class="workspace-trigger" data-dcnode-id="5243" href="#fig0020" name="bfig0020"><span data-dcnode-id="5244" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5242" instrument_node="">c). The moisture absorption rate of the NBHA increased as the RH increased. At 95% RH, the NBHA rapidly absorbed water vapor and the water uptake reached 2.36 g g</span><sup data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">−1</span></sup><span data-dcnode-id="5239" instrument_node=""> after 3 h. Even at low RH of 35%, the NBHA still absorbed large amounts of water vapor from the air, and the water uptake reached 0.30 g g</span><sup data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">−1</span></sup><span data-dcnode-id="5236" instrument_node=""> after 3 h. Thus, owing to the strong hygroscopicity of the LiCl, the superhydrophilicity of the NFC network and the intrinsic porous structures, the NBHA exhibited excellent all-weather moisture absorbing capability, even in dry conditions. A piece of NBHA (20 mm × 40 mm × 5 mm) with an NFC layer on top was placed in a 40% RH atmosphere at 25 °C to monitor the absorption process (</span><a class="workspace-trigger" data-dcnode-id="5234" href="#fig0020" name="bfig0020"><span data-dcnode-id="5235" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5233" instrument_node="">d). Initially, the LiCl on the surface of the NBHA, which was in contact with the air, absorbed water vapor rapidly. As the amount of water increased, the water vapor aggregated and formed liquid water around the LiCl particles, which further dissolved the LiCl. The periphery of the NBHA is thus became wet quickly. With further absorption, the obtained liquid water gradually penetrated into the inner structures of the NBHA and storage in it through the superhydrophilic NFC network, until the saturation point was reached. After continuous absorption, the white NFC layer filled with water and became transparent owing to the nanoscale size of its fibers. From the top view of the NFC layer, the NBHA gradually turned black to expose the color of the back-side graphene layer. After absorption for 24 h, the color of the NBHA changed markedly, and a local enlarged photo clearly showed that the NBHA had filled with liquid water. The dried NBHA is hard and brittle owing to the recrystallization of LiCl and the formation of strong hydrogen bonds during the freeze-drying process. It breaks easily when subjected to a bending force (</span><a class="workspace-trigger" data-dcnode-id="5231" href="#fig0020" name="bfig0020"><span data-dcnode-id="5232" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5230" instrument_node="">e top). When the NBHA has absorbed enough water vapor from air, the LiCl particles dissolve completely and fill the entire NFC network. The high aspect ratio NFC has a dominant influence on the mechanical properties of the NBHA. The wet NBHA is thus flexible and can be bent, twisted, and folded many times without structural fracture (</span><a class="workspace-trigger" data-dcnode-id="5228" href="#fig0020" name="bfig0020"><span data-dcnode-id="5229" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5227" instrument_node="">e middle and bottom). The super-flexibility of the wet NBHA further confirms the strong hygroscopicity of LiCl and the high water storage capacity of NFC networks.</span></p><div data-dcnode-id="5150"><p data-dcnode-id="5197" id="p0130"><span data-dcnode-id="5225" instrument_node="">To release the water, the wet NBHA is illuminated with the graphene layer uppermost. When subjected to irradiation at 3.6 sun, the surface temperature of the graphene layer increased rapidly and reached a peak of 50.7 °C after 600 s (</span><a class="workspace-trigger" data-dcnode-id="5223" href="#fig0025" name="bfig0025"><span data-dcnode-id="5224" instrument_node="">Fig. 5</span></a><span data-dcnode-id="5222" instrument_node="">a), owing to the high photothermal conversion efficiency of graphene. In contrast, the surface temperature of the NBHA without graphene slowly increased to 34.5 °C after 1100 s, and did not increase further under the same level of light irradiation. When the illumination intensity was increased from 1 sun to 4 sun, the temperature increasing rate improved (</span><a class="workspace-trigger" data-dcnode-id="5220" href="#fig0025" name="bfig0025"><span data-dcnode-id="5221" instrument_node="">Fig. 5</span></a><span data-dcnode-id="5219" instrument_node="">b). After 1,000 s, the surface temperature of the wet NBHA stabilized at approximately 29.3 °C, 46.9 °C, 55.1 °C, and 73.3 °C at 1 sun, 2 sun, 3 sun, and 4 sun, respectively (</span><a class="workspace-trigger" data-dcnode-id="5217" href="#fig0025" name="bfig0025"><span data-dcnode-id="5218" instrument_node="">Fig. 5</span></a><span data-dcnode-id="5216" instrument_node="">c). As shown in </span><a class="workspace-trigger" data-dcnode-id="5214" href="#fig0025" name="bfig0025"><span data-dcnode-id="5215" instrument_node="">Fig. 5</span></a><span data-dcnode-id="5213" instrument_node="">d, the NBHA was covered by a transparent petri dish. When subjected to irradiation at 3.6 sun, the temperature of the graphene layer in the NBHA increased rapidly to promote water evaporation. The inner wall of the petri dish quickly became fogged. With the further release of water from the NBHA over 5 min, more water mist and large water drops formed on the inner wall of the petri dish. The weight of the NBHA gradually decreased during irradiation (</span><a class="workspace-trigger" data-dcnode-id="5211" href="#fig0025" name="bfig0025"><span data-dcnode-id="5212" instrument_node="">Fig. 5</span></a><span data-dcnode-id="5210" instrument_node="">e), indicating the continuous evaporation of the water vapor. High-intensity irradiation enables fast water evaporation with high evaporation efficiency (</span><a class="workspace-trigger" data-dcnode-id="5208" href="#fig0025" name="bfig0025"><span data-dcnode-id="5209" instrument_node="">Fig. 5</span></a><span data-dcnode-id="5207" instrument_node="">f), but generally requires more energy. In the NBHA, water evaporation remained continuous, with an evaporation rate of 0.77 kg m</span><sup data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">−2</span></sup><span data-dcnode-id="5204" instrument_node=""> h</span><sup data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">−1</span></sup><span data-dcnode-id="5201" instrument_node=""> and an evaporation efficiency of 32%, even at 1 sun. Although LiCl is strongly hygroscopic agent, and the NFC network is superhydrophilic, radiation with relatively weak light intensity can still power the NBHA for continuous water evaporation. One reason for this is the high photothermal conversion efficiency of graphene. Another crucial point is that the NBHA comprises interconnected micron- and nano-sized pores, which provide plenty of channels for the continuous transport of water at various position to the graphene surface via capillary action, and thereby ensuring adequate water supplying for evaporation (</span><a class="workspace-trigger" data-dcnode-id="5199" href="#fig0025" name="bfig0025"><span data-dcnode-id="5200" instrument_node="">Fig. 5</span></a><span data-dcnode-id="5198" instrument_node="">g). Besides, the unitized and tightly connected solar-to-thermal conversion layer/hydrophilic layer assembly architecture of the NBHA is also critical for the continuous water evaporation. The NBHA has numerous advantages over most AWH materials and commercial hygroscopic agents. For example, water vapor absorption, liquefaction, storage, and solar-powered evaporation can all be achieved by one piece of NBHA; the NBHA uses sustainable biopolymer nanofibers as building blocks; its fabrication method is simple and can be easily scaled-up; it is lightweight, self-standing, and convenient for storage and transportation; and it is robust in terms of water vapor absorption and solar-powered evaporation. These have never been simultaneously reached with conventional AWH technologies, to the best of our knowledge.</span></p><figure class="figure text-xs" data-dcnode-id="5151" id="fig0025"><span data-dcnode-id="5181"><img alt="Fig. 5" aria-describedby="cap0025" data-dcnode-id="5196" height="539" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr5.jpg&amp;raw"><span data-dcnode-id="5195" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5182"><li data-dcnode-id="5189"><a class="anchor download-link u-font-sans" data-dcnode-id="5190" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr5_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="5191"><span data-dcnode-id="5194" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="5183"><a class="anchor download-link u-font-sans" data-dcnode-id="5184" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5185"><span data-dcnode-id="5188" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5152"><span data-dcnode-id="5153" id="cap0025"><p data-dcnode-id="5154" id="sp0025"><span class="label" data-dcnode-id="5179"><span data-dcnode-id="5180" instrument_node="">Fig. 5</span></span><span data-dcnode-id="5178" instrument_node="">. </span><span data-dcnode-id="5176" instrument_node="">Releasing water by solar-powered evaporation. (</span><strong data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">a</span></strong><span data-dcnode-id="5173" instrument_node="">) Top surface temperatures of the wet NBHA and the wet NBHA without graphene after irradiation at 3.6 sun. (</span><strong data-dcnode-id="5171"><span data-dcnode-id="5172" instrument_node="">b</span></strong><span data-dcnode-id="5170" instrument_node="">) Top surface temperature of the wet NBHA at various illumination intensities. (</span><strong data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">c</span></strong><span data-dcnode-id="5167" instrument_node="">) IR images showing the temperature of the top surface of the wet NBHA at various illumination intensities after 1,000 s (</span><strong data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">d</span></strong><span data-dcnode-id="5164" instrument_node="">) Digital photographs of a wet NBHA covered by a transparent petri dish and irradiated at 3.6 sun for various times. (</span><strong data-dcnode-id="5162"><span data-dcnode-id="5163" instrument_node="">e</span></strong><span data-dcnode-id="5161" instrument_node="">) Mass change of the wet NBHA at various illumination intensities. (</span><strong data-dcnode-id="5159"><span data-dcnode-id="5160" instrument_node="">f</span></strong><span data-dcnode-id="5158" instrument_node="">) Evaporation rate and evaporation efficiency of the wet NBHA at various illumination intensities. (</span><strong data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">g</span></strong><span data-dcnode-id="5155" instrument_node="">) Models showing liquid water transportation within the NBHA during solar-powered vapor evaporation.</span></p></span></span></figure></div><div data-dcnode-id="5074"><p data-dcnode-id="5127" id="p0135"><span data-dcnode-id="5149" instrument_node="">Outdoor experiments were conducted to evaluate the feasibility of using the NBHA for AWH in practical application. Generally, the RH, temperature, wind strength, and sunlight intensity all affect the efficiency of water collection. A device that comprised two transparent quartz glass containers and an NBHA was developed (</span><a class="workspace-trigger" data-dcnode-id="5147" href="#fig0030" name="bfig0030"><span data-dcnode-id="5148" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5146" instrument_node="">a). The NBHA, which had a graphene layer on top, was sandwiched between the two containers. The containers were opened, enabling the NBHA to absorb water from the air. After absorbing sufficient water, the containers were sealed and exposed to solar radiation. As the temperature of the graphene layer increased, the liquid water evaporated and subsequently condensed on the inner wall of the transparent quartz glass. It flowed down along the slope of the top container and gathered in the collection area. Because it is easy to fabricate large NBHAs, the amount of water collected can be controlled by altering the size of the NBHA, according to the requirements. In the present study, we assembled a water collection device comprising a square piece of NBHA (~12 cm × 12 cm and ~6 mm thick). The water was harvested outdoors at the NEFU campus in the city of Harbin on a random sunny day between June and September. The NBHA performed well during 15 h of water vapor absorption, liquification, and storage (</span><a class="workspace-trigger" data-dcnode-id="5144" href="#fig0030" name="bfig0030"><span data-dcnode-id="5145" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5143" instrument_node="">b) in an unstable outdoor environment (</span><a class="workspace-trigger" data-dcnode-id="5141" href="#fig0030" name="bfig0030"><span data-dcnode-id="5142" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5140" instrument_node="">c). The mass of the absorbed water was sustainable increased during the whole absorption process. The average absorption rate decreased slightly from 0.23 kg kg</span><sup data-dcnode-id="5138"><span data-dcnode-id="5139" instrument_node="">−1</span></sup><span data-dcnode-id="5137" instrument_node=""> h</span><sup data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">−1</span></sup><span data-dcnode-id="5134" instrument_node=""> after 1 h to 0.10 kg kg</span><sup data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">−1</span></sup><span data-dcnode-id="5131" instrument_node=""> h</span><sup data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">−1</span></sup><span data-dcnode-id="5128" instrument_node=""> after 15 h, because the absorbed water gradually reduced the concentration of the dissolved LiCl. Sunrise was started at ~5:00 am, and till 8:00 am, the outdoor temperature quickly increased from 20.6 °C to 25.9 °C, while the RH decreased quickly from 76.6% to 58.7%. However, moisture absorption continued, demonstrating the strong atmospheric water-absorbing capability of the NBHA. The experiment revealed that 18.1 g of the NBHA absorbed 26.5 g of water i.e., nearly 1.46 times its own weigh in 15 h.</span></p><figure class="figure text-xs" data-dcnode-id="5075" id="fig0030"><span data-dcnode-id="5111"><img alt="Fig. 6" aria-describedby="cap0030" data-dcnode-id="5126" height="588" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr6.jpg&amp;raw"><span data-dcnode-id="5125" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5112"><li data-dcnode-id="5119"><a class="anchor download-link u-font-sans" data-dcnode-id="5120" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr6_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="5121"><span data-dcnode-id="5124" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="5113"><a class="anchor download-link u-font-sans" data-dcnode-id="5114" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5115"><span data-dcnode-id="5118" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5076"><span data-dcnode-id="5077" id="cap0030"><p data-dcnode-id="5078" id="sp0030"><span class="label" data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">Fig. 6</span></span><span data-dcnode-id="5108" instrument_node="">. </span><span data-dcnode-id="5106" instrument_node="">AWH outdoors. (</span><strong data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">a</span></strong><span data-dcnode-id="5103" instrument_node="">) Schematic illustration showing the structure of a device based on the NBHA, and the outdoor AWH process using the device. (</span><strong data-dcnode-id="5101"><span data-dcnode-id="5102" instrument_node="">b</span></strong><span data-dcnode-id="5100" instrument_node="">) Moisture absorption and average absorption rate of the NBHA. (</span><strong data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">c</span></strong><span data-dcnode-id="5097" instrument_node="">) The corresponding environment temperature and RH of (</span><strong data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">b</span></strong><span data-dcnode-id="5094" instrument_node="">). (</span><strong data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">d</span></strong><span data-dcnode-id="5091" instrument_node="">) Liquid water harvesting and the average evaporation rate of the device. (</span><strong data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">e</span></strong><span data-dcnode-id="5088" instrument_node="">) The corresponding environment temperature and solar flux of (</span><strong data-dcnode-id="5086"><span data-dcnode-id="5087" instrument_node="">d</span></strong><span data-dcnode-id="5085" instrument_node="">). (</span><strong data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">f</span></strong><span data-dcnode-id="5082" instrument_node="">) Digital photograph of the top surface of the device after solar illumination. (</span><strong data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">g</span></strong><span data-dcnode-id="5079" instrument_node="">) Digital photograph of 88.3 g of liquid water harvested using the AWH device.</span></p></span></span></figure></div><p data-dcnode-id="5048" id="p0140"><span data-dcnode-id="5073" instrument_node="">At 9:00 am, the device was sealed and exposed to sunlight for solar-powered vapor generation (</span><a class="workspace-trigger" data-dcnode-id="5071" href="#fig0030" name="bfig0030"><span data-dcnode-id="5072" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5070" instrument_node="">d) at an outside temperature of 26.8–36.3 °C (</span><a class="workspace-trigger" data-dcnode-id="5068" href="#fig0030" name="bfig0030"><span data-dcnode-id="5069" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5067" instrument_node="">e). Although the intensity of the solar radiation was not high owing to the high latitude of the city of Harbin, the temperature of the graphene layer increased quickly, enabling rapid water vapor generation. After ~10 min, the inner wall of the container began to mist. The mist increased, and the transparent container became translucent after 30 min. The evaporated water gradually condensed on the inner wall of the container (</span><a class="workspace-trigger" data-dcnode-id="5065" href="#fig0030" name="bfig0030"><span data-dcnode-id="5066" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5064" instrument_node="">f). The amount of the harvested liquid water increased continuously. Between 9:00 and 17:00, the device totally collected 6.66 g of liquid water, which was released continuously from the NBHA. The device maintained a stable water evaporation rate of 0.02–0.08 kg m</span><sup data-dcnode-id="5062"><span data-dcnode-id="5063" instrument_node="">−2</span></sup><span data-dcnode-id="5061" instrument_node=""> h</span><sup data-dcnode-id="5059"><span data-dcnode-id="5060" instrument_node="">−1</span></sup><span data-dcnode-id="5058" instrument_node=""> during exposure to solar radiation with an intensity of 0.10–0.56 kW m</span><sup data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">−2</span></sup><span data-dcnode-id="5055" instrument_node=""> (average: 0.24 kW m</span><sup data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">−2</span></sup><span data-dcnode-id="5052" instrument_node="">). The NBHA was used repeatedly, and liquid water was collected on every sunny day (</span><a class="workspace-trigger" data-dcnode-id="5050" href="#fig0030" name="bfig0030"><span data-dcnode-id="5051" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5049" instrument_node="">g), demonstrating the robustness and stability of the NBHA with regard to AWH. The collected water was transparent and clean. Considering the high northern latitude (44°04′–46°40′), and the continental monsoon climate of the mid-temperate zone, the city of Harbin is unsatisfactory for atmospheric water absorption and solar-powered evaporation. Nevertheless, the successfully in AWH confirming the suitability of practical application of NBHAs, even under relatively severe environmental conditions such as cool weather, a dry atmosphere, and low-intensity solar radiation.</span></p></section><section data-dcnode-id="5035" id="sec0065"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5041" id="sect0085"><span data-dcnode-id="5046" instrument_node="">4</span><span data-dcnode-id="5044" instrument_node="">. </span><span data-dcnode-id="5042" instrument_node="">Conclusion</span></h2><p data-dcnode-id="5036" id="p0145"><span data-dcnode-id="5040" instrument_node="">In the present study, we created a solar-powered NBHA with a porous bilayer structure that has high atmospheric water-capturing capability. The LiCl particles present fast moisture absorption kinetics. The NFC provides a superhydrophilic skeleton for liquid water storage and transportation. The graphene layer promotes solar-powered vapor generation. Its intrinsic structures and the synergistic effect of its building blocks endow the NBHA with several advantageous qualities: the ability to rapidly absorb atmospheric water, even in severe, dry climates; a high water storage capacity; and requires little energy from natural sunlight for solar-driven vapor evaporation. Liquid water was successfully harvested from air outdoors with natural sunlight of 0.10–0.56 kW m</span><sup data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">−2</span></sup><span data-dcnode-id="5037" instrument_node=""> at high latitude region (the city of Harbin). The NBHA can be synthesized easily using sustainable building blocks, could be readily manufactured on a large scale, is portable, and has superior AWH capability. It is therefore potentially useful for obtaining fresh water from air.</span></p></section><section data-dcnode-id="5030" id="sec0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5033" id="sect0090"><span data-dcnode-id="5034" instrument_node="">CRediT authorship contribution statement</span></h2><p data-dcnode-id="5031" id="p0150"><span data-dcnode-id="5032" instrument_node="">Wenshuai Chen, Ya Yang and Zhuangjun Fan conceived the idea and supervised the research; Mengzhu Wang performed most of the experiments; Tianmeng Sun supervised the absorbing experiment and related data analysis; Dehui Wan supervised the work of light absorption/reflectance spectra; Ming Dai, Jialiang Wang, Yuqiu Liu, Ying Fang, and Shuhan Xu participated in the moisture absorbing and water evaporation experiment; Shengjie Ling and Jingjie Yeo supervised the analysis of liquid water transportation in the gel; Haipeng Yu, Shouxin Liu, Qingwen Wang, and Jian Li commented on the manuscript.</span></p></section></div><section data-dcnode-id="5024" id="coi0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5027" id="sect0095"><span data-dcnode-id="5028" instrument_node="">Declaration of Competing Intere
