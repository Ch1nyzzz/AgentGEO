data-dcnode-id="517"><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2213138822000522" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="521" id="citing-articles-article0-title"><span data-dcnode-id="522" instrument_node="">Research progress on recent technologies of water harvesting from atmospheric air: A detailed review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">2022, Sustainable Energy Technologies and Assessments</span></div></div><div class="buttons" data-dcnode-id="511"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="512" type="button"><span class="button-link-text" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="513" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="514"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="506"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="507" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="508"><p data-dcnode-id="509" id="sp0005"><span data-dcnode-id="510" instrument_node="">The increasing of the world population without increasing the natural resources caused water shortage in many regions around the world. Herein is a review of a new freshwater resource depending on harvesting the moisture of the atmospheric air. There are two main methods for extracting water from the ambient air: including composite materials method and cooling the air to the dew point. In the first method, the composite materials absorb the atmospheric air’s moisture and regenerate it into drinking water under certain conditions. Researchers have worked on changing the composite material type, and its additives and parameters to improve the productivity of water with acceptable cost. The second method requires just cooling of the atmospheric air until its moisture gets condensed. Power sources based on renewable energy have been developed to drive various techniques, such as vapor-compression cycles, absorption cycles, and Peltier effect-based devices. Beside reviewing different methodologies, this paper focused on the factors that affect the process of extracting water from the air. The formulas for computing the efficiency and water productivity were also mentioned. On the other hand, the research trend of the current topic was analyzed by conducting a comprehensive bibliometric analysis using VOSviewer software based on the Scopus database in the period (1988 – 2021).</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="487"><div class="sub-heading" data-dcnode-id="499"><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1385894722012566" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="503" id="citing-articles-article1-title"><span data-dcnode-id="504" instrument_node="">Hydrogel materials for sustainable water resources harvesting &amp;amp; treatment: Synthesis, mechanism and applications</span></h3></a><div class="article-source ellipsis" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">2022, Chemical Engineering Journal</span></div></div><div class="buttons" data-dcnode-id="493"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="494" type="button"><span class="button-link-text" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="495" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="496"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="488"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="489" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="490"><p data-dcnode-id="491" id="sp0010"><span data-dcnode-id="492" instrument_node="">Over the past few years, with the development of global industry and the increase of population, the shortage of freshwater resources has prompted people to conduct in-depth research on advanced water treatment and water harvesting technologies. As a polymer material with a three-dimensional network structure, hydrogel has been widely used in water resources harvesting and treatment due to its excellent water absorption, water retention, and adsorption properties. In this review, we first introduced several synthetic routes of hydrogel materials, including chemical cross-linking, physical cross-linking and dual cross-linking, and discussed the advantages and disadvantages of several synthetic methods. Then, we emphasized the water absorption and desorption mechanism of hydrogels and related influencing factors. Next, we described the latest research progress of hydrogel materials in detail as a platform for atmospheric water harvesting, seawater desalination and wastewater treatment in recent years. Finally, we discussed the shortcomings and future orientation of water purification and water treatment systems based on hydrogel materials.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="469"><div class="sub-heading" data-dcnode-id="481"><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364032122002398" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="485" id="citing-articles-article2-title"><span data-dcnode-id="486" instrument_node="">Progress in atmospheric water generation systems: A review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">2022, Renewable and Sustainable Energy Reviews</span></div></div><div class="buttons" data-dcnode-id="475"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="476" type="button"><span class="button-link-text" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="477" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="478"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="470"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="471" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="472"><p data-dcnode-id="473" id="abspara0010"><span data-dcnode-id="474" instrument_node="">In recent years, freshwater reserves have been severely depleted. Demand is outpacing supply, and supply is being impacted in terms of both quantity and quality. Therefore, freshwater scarcity is regarded as one of the greatest challenges of our time. During recent decades, the concept of generating fresh water from atmospheric air has been emerging as a promising solution to overcome the global water crisis. The present review attempts to provide a novel and comprehensive classification of various AWG technologies and materials. Each technology has been summarized and discussed. Solar assisted AWG systems with a reliable and cheap energy source are thoroughly explained. Over the last few years, most AWG studies have been shifted towards hybrid/integrated systems which utilize several cooling approaches in order to increase water productivity. The present paper is primarily focused on reviewing hybrid systems with portable and round-the-clock (RTC) application capability. Performance indicators of each system; including water production and energy consumption, thermal efficiency, and coefficient of performance were evaluated and compared. Finally, possible future perspective of implementing atmospheric water generating technologies is proposed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="451"><div class="sub-heading" data-dcnode-id="463"><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0957582022000714" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="467" id="citing-articles-article3-title"><span data-dcnode-id="468" instrument_node="">Adsorption-based atmospheric water harvesting powered by solar energy: Comprehensive review on desiccant materials and systems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">2022, Process Safety and Environmental Protection</span></div></div><div class="buttons" data-dcnode-id="457"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="458" type="button"><span class="button-link-text" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="459" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="460"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="452"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="453" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="454"><p data-dcnode-id="455" id="sp0135"><span data-dcnode-id="456" instrument_node="">Atmospheric water harvesting has been inexorably proliferated as a potential source of freshwater, notably for remote areas that lack access to water and electricity. This technology could be significantly operated with renewable energy sources. The current study comprehensively reviews the state-of-the-art atmospheric water harvesters and their desiccant materials. Firstly, a detailed survey on desiccant materials, silica gel, Metal-organic frameworks (MOFs), hydrogels, zeolite, hygroscopic salts and composite desiccant materials is illustrated. The review particularly focuses on the materials adsorption capability, kinetics, proper matching with climate conditions. Moreover, the most suitable adsorbents are thoroughly surveyed for a wide range of climate conditions, especially for water scarcity regions (i.e., arid zones) that are characterized by low relative pressures. Moreover, various designs of solar-powered atmospheric water harvesters are comparatively summarized, including fixed and portable installations. It can be concluded that MOF-801, MOF-808, MOF-841, HKUST-1, and CPO-27(Ni) have a superior potential for water harvesting in arid areas. Additionally, MIL-101(Cr) has superior water uptake and kinetic at high relative pressure (i.e., humid areas), and it is irrelevant for water harvesting at dry zones. It is found that the cost of the collected water from atmospheric water harvesting technology is about 0.062–0.86 $/kg of adsorbent. This work provides beneficial perspectives for selecting the most relevant desiccant materials beside the appropriate solar system for water harvesting applications.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="408"><div class="sub-heading" data-dcnode-id="445"><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0043135421012239" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="449" id="citing-articles-article4-title"><span data-dcnode-id="450" instrument_node="">Viability of a practical multicyclic sorption-based water harvester with improved water yield</span></h3></a><div class="article-source ellipsis" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">2022, Water Research</span></div></div><div class="buttons" data-dcnode-id="439"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="440" type="button"><span class="button-link-text" data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="441" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="442"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="409"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="410" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="411"><p data-dcnode-id="412" id="spara018"><span data-dcnode-id="438" instrument_node="">Sorption-based atmospheric water harvesting (SAWH) has emerged as an attractive way to relieve water scarcity. However, the daily water yield of currently reported SAWH devices remains low to satisfy the rising demand for drinking water. The sorption and desorption kinetics, long-term stability and especially facile scaling-fabrication of adsorbents and scaled-up device implementation have become the bottleneck to such large-scale SAWH application. To overcome these challenges, an air-cooled SAWH device was fabricated to investigate its atmospheric water harvesting (AWH) performance under real island climate and its feasibility of multicyclic operation. Under monocyclic operation, the device demonstrated the superior water productivity as much as 3.9&nbsp;kg day</span><sup data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">−1</span></sup><span data-dcnode-id="435" instrument_node="">, or 0.39&nbsp;kg</span><sub data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">water</span></sub><span data-dcnode-id="432" instrument_node=""> kg</span><sub data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">adsorbent</span></sub><sup data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">−1</span></sup><span data-dcnode-id="427" instrument_node=""> day</span><sup data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">−1</span></sup><span data-dcnode-id="424" instrument_node="">, at 31&nbsp;°C and 70% RH, with a thermal efficiency of 25.4% (desorption at 94&nbsp;°C). The SAWH device demonstrated successful water production through 2 adsorption-desorption cycles within one day, with increased thermal efficiency to as high as 32.2% and increased water harvesting performance up to 0.42&nbsp;kg</span><sub data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">water</span></sub><span data-dcnode-id="421" instrument_node=""> kg</span><sub data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">adsorbent</span></sub><sup data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">−1</span></sup><span data-dcnode-id="416" instrument_node=""> day</span><sup data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">−1</span></sup><span data-dcnode-id="413" instrument_node=""> by 20–90%. This is the first demonstration in multicyclic SAWH at large scales, holding the promise of large-scale and practical water supply in island areas while opening up new applications such as indoor dehumidification.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="375"><div class="sub-heading" data-dcnode-id="402"><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S221128552101051X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="406" id="citing-articles-article5-title"><span data-dcnode-id="407" instrument_node="">Tree-inspired efficient solar evaporation and simultaneous in-situ purification of ultra-highly concentrated mixed volatile organic wastewater</span></h3></a><div class="article-source ellipsis" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">2022, Nano Energy</span></div></div><div class="buttons" data-dcnode-id="396"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="397" type="button"><span class="button-link-text" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="398" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="399"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="376"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="377" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="378"><p data-dcnode-id="379" id="sp0040"><span data-dcnode-id="395" instrument_node="">The high concentration, complexity and volatility of organic pollutants in actual wastewater are becoming major obstacles to realizing efficient water purification. Inspired by the structure and physiological process of trees, a two-in-one solar-driven evaporation/photocatalysis system for efficient water evaporation and </span><em data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">in situ</span></em><span data-dcnode-id="392" instrument_node=""> purification was fabricated from wood-derived porous carbon that was vertically aligned and uniformly loaded with polymetallic oxide nanoparticles. The system enabled rapid water evaporation (up to 3.23&nbsp;kg&nbsp;m</span><sup data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">-2</span></sup><span data-dcnode-id="389" instrument_node=""> h</span><sup data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">-1</span></sup><span data-dcnode-id="386" instrument_node="">) and effective purification of mixed volatile wastewater containing rhodamine B, phenol and tetracycline with ultra-high total concentration of up to 11700&nbsp;mg&nbsp;L</span><sup data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">-1</span></sup><span data-dcnode-id="383" instrument_node=""> under 1 sun irradiation, which was significantly higher than that reported previously, and distilled water with undetected volatile pollutants could be simultaneously obtained. The combination of nanoparticles and wood hierarchical structures provided photothermal conversion substrates, catalysts and reaction/transmission channels for efficient water evaporation and </span><em data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">in situ</span></em><span data-dcnode-id="380" instrument_node=""> pollutant degradation and achieved the synergistic promotion of photothermal conversion and photo-Fenton reactions. This process provides a novel and promising strategy for the efficient treatment of highly concentrated mixed volatile organic wastewater.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85096039199%26md5%3D249fc33bd18a28b6e73296594435ecb" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="372" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="373"></path></svg><span class="button-alternative-text" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="article-biography" data-dcnode-id="358" id="bio1"><img alt="" data-dcnode-id="364" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx1.jpg&amp;raw"><span data-dcnode-id="363" instrument_node=""></span><p data-dcnode-id="359" id="sp0060"><strong data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Mengzhu Wang</span></strong><span data-dcnode-id="360" instrument_node=""> received her M.S. degree under the supervision of Prof. Wenshuai Chen from Northeast Forestry University in 2020. Her main interests focus on the fabrication of functional aerogels using wood cellulose nanofibers for atmospheric water harvesting.</span></p></div><div class="article-biography" data-dcnode-id="351" id="bio2"><img alt="" data-dcnode-id="357" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx2.jpg&amp;raw"><span data-dcnode-id="356" instrument_node=""></span><p data-dcnode-id="352" id="sp0065"><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Prof. Tianmeng Sun</span></strong><span data-dcnode-id="353" instrument_node=""> received his Ph.D. degree in Cell Biology from University of Science and Technology of China. He is now a professor of Nanomedicine in the First Hospital at Jilin University. He became the deputy director of Key Laboratory of Organ Regeneration and Transplantation of the Ministry of Education and Institute of Immunology at Jilin University. His research interests are focused on tumor-targeted nano-drug delivery system for promoting cancer immunotherapy through remodeling the tumor immune microenvironment.</span></p></div><div class="article-biography" data-dcnode-id="344" id="bio3"><img alt="" data-dcnode-id="350" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx3.jpg&amp;raw"><span data-dcnode-id="349" instrument_node=""></span><p data-dcnode-id="345" id="sp0070"><strong data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Prof. Dehui Wan</span></strong><span data-dcnode-id="346" instrument_node=""> is currently an associate professor in the Institute of Biomedical Engineering at National Tsing Hua University. He received his B.S. degree (2003) in Chemistry and Ph.D. degree (2010) in Materials Science and Engineering from National Taiwan University. His research interests include bio/chemical sensing, plasmonics, nanomedicine, and development of optical nanomaterials for biomedical, energy and environmental applications.</span></p></div><div class="article-biography" data-dcnode-id="337" id="bio4"><img alt="" data-dcnode-id="343" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx4.jpg&amp;raw"><span data-dcnode-id="342" instrument_node=""></span><p data-dcnode-id="338" id="sp0075"><strong data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Ming Dai</span></strong><span data-dcnode-id="339" instrument_node=""> is a graduate student in the research group of Prof. Wenshuai Chen at Northeast Forestry University, China. She obtained her B.S. degree in Light Chemical Engineering from Northeast Forestry University in 2017. Her current research interests focus on the fabrication of functional nanostructured gels using wood cellulose nanofibers for air dehumidification.</span></p></div><div class="article-biography" data-dcnode-id="330" id="bio5"><img alt="" data-dcnode-id="336" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx5.jpg&amp;raw"><span data-dcnode-id="335" instrument_node=""></span><p data-dcnode-id="331" id="sp0080"><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Prof. Shengjie Ling</span></strong><span data-dcnode-id="332" instrument_node=""> is currently an assistant professor in the School of Physical Science and Technology at ShanghaiTech University. His research focuses on developing biopolymer functional materials through the integration of characterization, computational modeling and bioinspired &amp; biomimetic fabrication. He obtained his B.S. degree from Zhejiang University of Technology and Ph.D. from Fudan University. He has pursued his study at ETH Zurich, Switzerland, as a joint Ph.D. student. Prior to joining ShanghaiTech University, he worked as a postdoctoral associate at MIT and Tufts University.</span></p></div><div class="article-biography" data-dcnode-id="323" id="bio6"><img alt="" data-dcnode-id="329" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx6.jpg&amp;raw"><span data-dcnode-id="328" instrument_node=""></span><p data-dcnode-id="324" id="sp0085"><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Jialiang Wang</span></strong><span data-dcnode-id="325" instrument_node=""> is a Ph.D student in the research group of Prof. Tianmeng Sun at Key Laboratory of Organ Regeneration and Transplantation of Ministry of Education, The First Hospital, Jilin University. He received his B.S. degree in Biomedical Engineering in 2014 and M.S. degree in Cell Biology in 2017 from Jilin University. His research interests focus on applications of nanoparticles in immune modulation.</span></p></div><div class="article-biography" data-dcnode-id="316" id="bio7"><img alt="" data-dcnode-id="322" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx7.jpg&amp;raw"><span data-dcnode-id="321" instrument_node=""></span><p data-dcnode-id="317" id="sp0090"><strong data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Yuqiu Liu</span></strong><span data-dcnode-id="318" instrument_node=""> is a graduate student in the research group of Prof. Wenshuai Chen at Northeast Forestry University. She obtained her B.S. degree in Chemical Engineering and Technology from Tianjin Polytechnic University in 2018. Her research interests focus on nanocellulose-derived functional aerogels.</span></p></div><div class="article-biography" data-dcnode-id="309" id="bio8"><img alt="" data-dcnode-id="315" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx8.jpg&amp;raw"><span data-dcnode-id="314" instrument_node=""></span><p data-dcnode-id="310" id="sp0095"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Ying Fang</span></strong><span data-dcnode-id="311" instrument_node=""> is a graduate student in the research group of Prof. Wenshuai Chen and Prof. Tian Liu at Northeast Forestry University. She received her B.S. degree in Wood Science and Engineering from Central South University of Forestry and Technology in 2019. Her current interests focus on cellulose based nanostructured functional gels.</span></p></div><div class="article-biography" data-dcnode-id="302" id="bio9"><img alt="" data-dcnode-id="308" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx9.jpg&amp;raw"><span data-dcnode-id="307" instrument_node=""></span><p data-dcnode-id="303" id="sp0100"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Shuhan Xu</span></strong><span data-dcnode-id="304" instrument_node=""> received his B.S. degree in Wood Science and Engineering from South China Agricultural University in 2019. He is currently a graduate student in the research group of Prof. Wenshuai Chen at Northeast Forestry University. His current interest focuses on the functional development of wood cellulose nanofibers.</span></p></div><div class="article-biography" data-dcnode-id="292" id="bio10"><img alt="" data-dcnode-id="301" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx10.jpg&amp;raw"><span data-dcnode-id="300" instrument_node=""></span><p data-dcnode-id="293" id="sp0105"><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Prof. Jingjie Yeo</span></strong><span data-dcnode-id="297" instrument_node=""> is an assistant professor in the Sibley School of Mechanical and Aerospace Engineering at Cornell University, USA. He leads the J</span><sup data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">2</span></sup><span data-dcnode-id="294" instrument_node=""> Lab for Engineering Living Materials, focusing on engineering bacterial biopolymers and dynamically-responsive soft materials through interdisciplinary studies of material and biological phenomena using multiscale computational methods. Prior, he was a research scientist in the Institute of High Performance Computing, Singapore. He was also a postdoc at both Tufts University and Massachusetts Institute of Technology, USA. He received his Ph.D. and his B.S. degrees from Nanyang Technological University Singapore.</span></p></div><div class="article-biography" data-dcnode-id="285" id="bio11"><img alt="" data-dcnode-id="291" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx11.jpg&amp;raw"><span data-dcnode-id="290" instrument_node=""></span><p data-dcnode-id="286" id="sp0110"><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Prof. Haipeng Yu</span></strong><span data-dcnode-id="287" instrument_node=""> received his B.S. (2000) and Ph.D. (2005) degrees in Wood Science and Technology from Northeast Forestry University, China. He started as an Assistant Professor at Northeast Forestry University in 2005, and was promoted to Associate Professor and Professor in 2007 and 2011, respectively. His research interests include wood modification, nanocellulose and its functional nanomaterials, and biomass conversion technologies.</span></p></div><div class="article-biography" data-dcnode-id="278" id="bio12"><img alt="" data-dcnode-id="284" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx12.jpg&amp;raw"><span data-dcnode-id="283" instrument_node=""></span><p data-dcnode-id="279" id="sp0115"><strong data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Prof. Shouxin Liu</span></strong><span data-dcnode-id="280" instrument_node=""> received his Ph.D. degree in Chemical Processing and Engineering of Forest Products from Northeast Forestry University, China. He is currently a professor at Northeast Forestry University. His current research focuses on active carbon materials, carbon aerogels, carbon dots, and nanocellulose.</span></p></div><div class="article-biography" data-dcnode-id="271" id="bio13"><img alt="" data-dcnode-id="277" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx13.jpg&amp;raw"><span data-dcnode-id="276" instrument_node=""></span><p data-dcnode-id="272" id="sp0120"><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Prof. Qingwen Wang</span></strong><span data-dcnode-id="273" instrument_node=""> obtained his Ph.D. degree in Wood Science and Technology from Northeast Forestry University in 2000. Now, he is a professor at South China Agricultural University. His research interests include wood flame retardant, wood plastic composites, wood modification and wood-based functional materials.</span></p></div><div class="article-biography" data-dcnode-id="264" id="bio14"><img alt="" data-dcnode-id="270" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx14.jpg&amp;raw"><span data-dcnode-id="269" instrument_node=""></span><p data-dcnode-id="265" id="sp0125"><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Prof. Jian Li</span></strong><span data-dcnode-id="266" instrument_node=""> obtained his Ph.D. degree in Wood Science from Northeast Forestry University in 1987. Now, he is an academician of Chinese Academy of Engineering, and professor at Northeast Forestry University. His research interests include a wide range of wood science such as wood biomimetic, wood physics, wood chemistry, wood-based composites, and high-performance nanocomposites from lignocellulosic resources.</span></p></div><div class="article-biography" data-dcnode-id="257" id="bio15"><img alt="" data-dcnode-id="263" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx15.jpg&amp;raw"><span data-dcnode-id="262" instrument_node=""></span><p data-dcnode-id="258" id="sp0130"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Prof. Ya Yang</span></strong><span data-dcnode-id="259" instrument_node=""> received his Ph.D. in Materials Science and Engineering from University of Science and Technology Beijing, China. He is currently a professor at Beijing Institute of Nanoenergy and Nanosystems, Chinese Academy of Sciences, China. He has developed various new hybridized and multi-effects coupled nanogenerators, opening up the new principles of the device design and coupled effects, and the new approaches of improving output performances of energy-related devices. His main research interests focus on the field of hybridized and coupled nanogenerators for energy conversion, self-powered sensing, and some new physical effects.</span></p></div><div class="article-biography" data-dcnode-id="250" id="bio16"><img alt="" data-dcnode-id="256" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx16.jpg&amp;raw"><span data-dcnode-id="255" instrument_node=""></span><p data-dcnode-id="251" id="sp0135"><strong data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Prof. Zhuangjun Fan</span></strong><span data-dcnode-id="252" instrument_node=""> received his Ph.D. in 2003 at the Institute of Coal Chemistry, Chinese Academy of Sciences. He became full professor in 2006 at the College of Material Science and Chemical Engineering from Harbin Engineering University. He joined China University of Petroleum, Qingdao as a professor in 2019. His research interests focus on the design and controlled synthesis of carbon nanomaterials such as carbon nanotubes and graphene, and their applications in energy-related areas such as supercapacitors, Li ion batteries and full cells.</span></p></div><div class="article-biography" data-dcnode-id="243" id="bio17"><img alt="" data-dcnode-id="249" height="151" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-fx17.jpg&amp;raw"><span data-dcnode-id="248" instrument_node=""></span><p data-dcnode-id="244" id="sp0140"><strong data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Prof. Wenshuai Chen</span></strong><span data-dcnode-id="245" instrument_node=""> is a professor in the College of Materials Science and Engineering at Northeast Forestry University. He received his B.S. degree (2008) and Ph.D. degree (2013) in Wood Science and Technology from Northeast Forestry University. His research interests include wood physics, bionanocomposites, nanocellulose, aerogels, and development of wood-based materials for energy and environmental sciences.</span></p></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S2211285520311435"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2020 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u
