</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abs0010&quot;><p id=&quot;sp0035&quot;>Solar energy powered sorption-based atmospheric water harvesting (AWH) is a novel strategy for obtaining fresh water in water-scarce regions. The major challenge is to design a cost-effective all-in-one solid bulk sorbent that can capture water from air, even when outdoor conditions are cool, dry, and with low-intensity nature sunlight. Here, we report a strategy comprising solution exchange and lyophilization for integrating a lithium chloride hygroscopic agent, a nanofibrillated cellulose hydrophilic skeleton and a graphene solar absorber, to exploit a solar-powered nanostructured biopolymer hygroscopic aerogel (NBHA) for AWH. The intrinsic porous bilayer structure with interconnected micron- and nano-scale channels of NBHA enables it readily absorb moisture (even at a low relative humidity of ~18%), has a high-water storage capacity, and requires little energy from natural sunlight for solar-driven light-to-vapor conversion. Liquid water was successfully harvested outdoors in natural sunlight of 0.10–0.56&nbsp;kW&nbsp;m<sup>−2</sup> using a facile device based on the NBHA. This work provides a convenient, effective, and practical solution for AWH, even in severe environmental conditions.</p></div></div></div>" data-dcnode-id="7383" lang="en" name="citation_abstract"><span data-dcnode-id="7382" instrument_node="">

let%3FpublisherName%3DELS%26contentID%3DS2211285520311435%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6639" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="6636"></section><section class="ReferencedArticles" data-dcnode-id="6635"></section><div class="PageDivider" data-dcnode-id="6634"></div><div class="Abstracts u-font-serif" data-dcnode-id="6572" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="6610" id="ab0020"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">Highlights</span></h2><div data-dcnode-id="6611" id="abs0020"><p data-dcnode-id="6612" id="sp0050"></p><dl class="list" data-dcnode-id="6613"><dt class="list-label" data-dcnode-id="6630"><span data-dcnode-id="6631" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6627"><p data-dcnode-id="6628" id="p0005"><span data-dcnode-id="6629" instrument_node="">We use solution exchange combined with lyophilization strategy to exploit nanostructured biopolymer hygroscopic aerogel.</span></p></dd><dt class="list-label" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6622"><p data-dcnode-id="6623" id="p0010"><span data-dcnode-id="6624" instrument_node="">The intrinsic porous bilayer structure enables the aerogel robust in atmospheric water harvesting.</span></p></dd><dt class="list-label" data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6614"><p data-dcnode-id="6615" id="p0015"><span data-dcnode-id="6619" instrument_node="">Liquid water was harvested outdoors in natural sunlight of 0.10–0.56&nbsp;kW&nbsp;m</span><sup data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">−2</span></sup><span data-dcnode-id="6616" instrument_node=""> using a facile device based on the aerogel.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="6601" id="ab0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6608"><span data-dcnode-id="6609" instrument_node="">Abstract</span></h2><div data-dcnode-id="6602" id="abs0010"><p data-dcnode-id="6603" id="sp0035"><span data-dcnode-id="6607" instrument_node="">Solar energy powered sorption-based atmospheric water harvesting (AWH) is a novel strategy for obtaining fresh water in water-scarce regions. The major challenge is to design a cost-effective all-in-one solid bulk sorbent that can capture water from air, even when outdoor conditions are cool, dry, and with low-intensity nature sunlight. Here, we report a strategy comprising solution exchange and lyophilization for integrating a lithium chloride hygroscopic agent, a nanofibrillated cellulose hydrophilic skeleton and a graphene solar absorber, to exploit a solar-powered nanostructured biopolymer hygroscopic aerogel (NBHA) for AWH. The intrinsic porous bilayer structure with interconnected micron- and nano-scale channels of NBHA enables it readily absorb moisture (even at a low relative humidity of ~18%), has a high-water storage capacity, and requires little energy from natural sunlight for solar-driven light-to-vapor conversion. Liquid water was successfully harvested outdoors in natural sunlight of 0.10–0.56&nbsp;kW&nbsp;m</span><sup data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">−2</span></sup><span data-dcnode-id="6604" instrument_node=""> using a facile device based on the NBHA. This work provides a convenient, effective, and practical solution for AWH, even in severe environmental conditions.</span></p></div></div><div class="abstract graphical" data-dcnode-id="6573" id="ab0015"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6599"><span data-dcnode-id="6600" instrument_node="">Graphical Abstract</span></h2><div data-dcnode-id="6574" id="abs0015"><p data-dcnode-id="6580" id="sp0040"><span class="display" data-dcnode-id="6581"></span></p><figure class="figure text-xs" data-dcnode-id="6582" id="fig0035"><span data-dcnode-id="6583"><img alt="ga1" data-dcnode-id="6598" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-ga1.jpg&amp;raw"><span data-dcnode-id="6597" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6584"><li data-dcnode-id="6591"><a class="anchor download-link u-font-sans" data-dcnode-id="6592" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-ga1_lrg.jpg" target="_blank" title="Download high-res image (417KB)"><span class="anchor-text" data-dcnode-id="6593"><span data-dcnode-id="6596" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">Download high-res image (417KB)</span></span></span></a></li><li data-dcnode-id="6585"><a class="anchor download-link u-font-sans" data-dcnode-id="6586" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2211285520311435-ga1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6587"><span data-dcnode-id="6590" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">Download full-size image</span></span></span></a></li></ol></span></figure><p></p><p data-dcnode-id="6575"><span data-dcnode-id="6579" instrument_node="">A solar-powered nanostructured biopolymer hygroscopic aerogel with a porous bilayer structure comprising of a lithium chloride hygroscopic agent, a wood-derived nanofibrillated cellulose hydrophilic skeleton and a graphene solar absorber was exploited via solution exchange followed by lyophilization strategy, for atmospheric water harvesting. The intrinsic structures and the synergistic effect of the building blocks enable the aerogel with rapid moisture absorption, a large water storage capacity, and solar-driven vapor evaporation. Liquid water was successfully harvested outdoors from the air using a device based on the aerogel, even at low levels of natural sunlight of 0.1–0.6&nbsp;kW&nbsp;m</span><sup data-dcnode-id="6577"><span data-dcnode-id="6578" instrument_node="">−2</span></sup><span data-dcnode-id="6576" instrument_node="">.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="6549" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="6561"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2211285520311393"><svg class="icon icon-navigate-left" data-dcnode-id="6570" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="6571"></path></svg><span class="button-alternative-text" data-dcnode-id="6563"><strong data-dcnode-id="6568"><span data-dcnode-id="6569" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="6566"><span data-dcnode-id="6567" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6564"><span data-dcnode-id="6565" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="6550"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2211285520311575"><span class="button-alternative-text" data-dcnode-id="6554"><strong data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="6557"><span data-dcnode-id="6558" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="6552" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="6553"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="6530"><div class="keywords-section" data-dcnode-id="6531" id="keys0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6547"><span data-dcnode-id="6548" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="6544" id="key0005"><span data-dcnode-id="6545"><span data-dcnode-id="6546" instrument_node="">Aerogels</span></span></div><div class="keyword" data-dcnode-id="6541" id="key0010"><span data-dcnode-id="6542"><span data-dcnode-id="6543" instrument_node="">Nanofibrillated cellulose</span></span></div><div class="keyword" data-dcnode-id="6538" id="key0015"><span data-dcnode-id="6539"><span data-dcnode-id="6540" instrument_node="">Lithium chloride</span></span></div><div class="keyword" data-dcnode-id="6535" id="key0020"><span data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">Solar energy</span></span></div><div class="keyword" data-dcnode-id="6532" id="key0025"><span data-dcnode-id="6533"><span data-dcnode-id="6534" instrument_node="">Atmospheric water harvesting</span></span></div></div></div><span data-dcnode-id="6529" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4948" id="body"><div data-dcnode-id="5029"><section data-dcnode-id="6352" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6523" id="sect0025"><span data-dcnode-id="6528" instrument_node="">1</span><span data-dcnode-id="6526" instrument_node="">. </span><span data-dcnode-id="6524" instrument_node="">Introduction</span></h2><p data-dcnode-id="6497" id="p0020"><span data-dcnode-id="6522" instrument_node="">Approximately 13 thousand trillion liters of water exist in the atmosphere in the form of vapor and droplets </span><a class="workspace-trigger" data-dcnode-id="6520" href="#bib1" name="bbib1"><span data-dcnode-id="6521" instrument_node="">[1]</span></a><span data-dcnode-id="6519" instrument_node="">. However, this huge amount of resource cannot be directly used as liquid water owing to the low-density distribution of the water molecules in the air. The harvesting of atmospheric water is a novel and practical approach to obtain clean water in water-scarce areas </span><a class="workspace-trigger" data-dcnode-id="6517" href="#bib2" name="bbib2"><span data-dcnode-id="6518" instrument_node="">[2]</span></a><span data-dcnode-id="6516" instrument_node="">, and the exploitation of efficient materials and techniques is critical for atmospheric water harvesting (AWH) </span><a class="workspace-trigger" data-dcnode-id="6514" href="#bib3" name="bbib3"><span data-dcnode-id="6515" instrument_node="">[3]</span></a><span data-dcnode-id="6513" instrument_node="">. Successful fog capture and dew collection have confirmed the feasibility of AWH </span><a class="workspace-trigger" data-dcnode-id="6511" href="#bib4" name="bbib4"><span data-dcnode-id="6512" instrument_node="">[4]</span></a><span data-dcnode-id="6510" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6508" href="#bib5" name="bbib5"><span data-dcnode-id="6509" instrument_node="">[5]</span></a><span data-dcnode-id="6507" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6505" href="#bib6" name="bbib6"><span data-dcnode-id="6506" instrument_node="">[6]</span></a><span data-dcnode-id="6504" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6502" href="#bib7" name="bbib7"><span data-dcnode-id="6503" instrument_node="">[7]</span></a><span data-dcnode-id="6501" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6499" href="#bib8" name="bbib8"><span data-dcnode-id="6500" instrument_node="">[8]</span></a><span data-dcnode-id="6498" instrument_node="">, although the results were achieved either in high-humidity environments or required large energy consumption. Sorption is recognized as a promising strategy for all-weather AWH; the key is to optimize the sorbent’s components and structures to spontaneously improve sorption and desorption capability with low energy consumption.</span></p><p data-dcnode-id="6402" id="p0025"><span data-dcnode-id="6496" instrument_node="">Atmospheric water can be adsorbed by various types of solid </span><a class="workspace-trigger" data-dcnode-id="6494" href="#bib9" name="bbib9"><span data-dcnode-id="6495" instrument_node="">[9]</span></a><span data-dcnode-id="6493" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6491" href="#bib10" name="bbib10"><span data-dcnode-id="6492" instrument_node="">[10]</span></a><span data-dcnode-id="6490" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6488" href="#bib11" name="bbib11"><span data-dcnode-id="6489" instrument_node="">[11]</span></a><span data-dcnode-id="6487" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6485" href="#bib12" name="bbib12"><span data-dcnode-id="6486" instrument_node="">[12]</span></a><span data-dcnode-id="6484" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6482" href="#bib13" name="bbib13"><span data-dcnode-id="6483" instrument_node="">[13]</span></a><span data-dcnode-id="6481" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6479" href="#bib14" name="bbib14"><span data-dcnode-id="6480" instrument_node="">[14]</span></a><span data-dcnode-id="6478" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6476" href="#bib15" name="bbib15"><span data-dcnode-id="6477" instrument_node="">[15]</span></a><span data-dcnode-id="6475" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6473" href="#bib16" name="bbib16"><span data-dcnode-id="6474" instrument_node="">[16]</span></a><span data-dcnode-id="6472" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6470" href="#bib17" name="bbib17"><span data-dcnode-id="6471" instrument_node="">[17]</span></a><span data-dcnode-id="6469" instrument_node=""> and liquid sorbents </span><a class="workspace-trigger" data-dcnode-id="6467" href="#bib18" name="bbib18"><span data-dcnode-id="6468" instrument_node="">[18]</span></a><span data-dcnode-id="6466" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6464" href="#bib19" name="bbib19"><span data-dcnode-id="6465" instrument_node="">[19]</span></a><span data-dcnode-id="6463" instrument_node="">. However, the commonly used solid adsorbents-such as zeolites, molecular sieves, and silica gels-have low water vapor adsorption rates and low saturated adsorption capacity. Their adsorption kinetics also apparently deteriorate in dry environments. Liquid absorbents such as concentrated sulfuric acid and hygroscopic salt solutions are strongly absorbent, but the corrosive liquids are not easy to store or transport. Moreover, desorption from such absorbents is difficult owing to their strong interactions with water. Recently, water generation using solar-to-thermal technology has attracted considerable attention because solar energy is an inexhaustible energy source </span><a class="workspace-trigger" data-dcnode-id="6461" href="#bib20" name="bbib20"><span data-dcnode-id="6462" instrument_node="">[20]</span></a><span data-dcnode-id="6460" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6458" href="#bib21" name="bbib21"><span data-dcnode-id="6459" instrument_node="">[21]</span></a><span data-dcnode-id="6457" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6455" href="#bib22" name="bbib22"><span data-dcnode-id="6456" instrument_node="">[22]</span></a><span data-dcnode-id="6454" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6452" href="#bib23" name="bbib23"><span data-dcnode-id="6453" instrument_node="">[23]</span></a><span data-dcnode-id="6451" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6449" href="#bib24" name="bbib24"><span data-dcnode-id="6450" instrument_node="">[24]</span></a><span data-dcnode-id="6448" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6446" href="#bib25" name="bbib25"><span data-dcnode-id="6447" instrument_node="">[25]</span></a><span data-dcnode-id="6445" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6443" href="#bib26" name="bbib26"><span data-dcnode-id="6444" instrument_node="">[26]</span></a><span data-dcnode-id="6442" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6440" href="#bib27" name="bbib27"><span data-dcnode-id="6441" instrument_node="">[27]</span></a><span data-dcnode-id="6439" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6437" href="#bib28" name="bbib28"><span data-dcnode-id="6438" instrument_node="">[28]</span></a><span data-dcnode-id="6436" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6434" href="#bib29" name="bbib29"><span data-dcnode-id="6435" instrument_node="">[29]</span></a><span data-dcnode-id="6433" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6431" href="#bib30" name="bbib30"><span data-dcnode-id="6432" instrument_node="">[30]</span></a><span data-dcnode-id="6430" instrument_node="">; this has stimulated the development of solar-powered hygroscopic materials for low-cost AWH. Metal-organic frameworks </span><a class="workspace-trigger" data-dcnode-id="6428" href="#bib31" name="bbib31"><span data-dcnode-id="6429" instrument_node="">[31]</span></a><span data-dcnode-id="6427" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6425" href="#bib32" name="bbib32"><span data-dcnode-id="6426" instrument_node="">[32]</span></a><span data-dcnode-id="6424" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6422" href="#bib33" name="bbib33"><span data-dcnode-id="6423" instrument_node="">[33]</span></a><span data-dcnode-id="6421" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6419" href="#bib34" name="bbib34"><span data-dcnode-id="6420" instrument_node="">[34]</span></a><span data-dcnode-id="6418" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6416" href="#bib35" name="bbib35"><span data-dcnode-id="6417" instrument_node="">[35]</span></a><span data-dcnode-id="6415" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6413" href="#bib36" name="bbib36"><span data-dcnode-id="6414" instrument_node="">[36]</span></a><span data-dcnode-id="6412" instrument_node=""> and hybrid gels </span><a class="workspace-trigger" data-dcnode-id="6410" href="#bib37" name="bbib37"><span data-dcnode-id="6411" instrument_node="">[37]</span></a><span data-dcnode-id="6409" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6407" href="#bib38" name="bbib38"><span data-dcnode-id="6408" instrument_node="">[38]</span></a><span data-dcnode-id="6406" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6404" href="#bib39" name="bbib39"><span data-dcnode-id="6405" instrument_node="">[39]</span></a><span data-dcnode-id="6403" instrument_node=""> that use sunlight to power the release of water have been successfully developed for AWH. However, the exploitation of AWH material still faces numerous practical challenges such as the availability of raw materials, high costs, complicated synthetic procedures, the need for non-toxic or low-hazard chemicals, and the necessity for large-scale synthesis.</span></p><p data-dcnode-id="6358" id="p0030"><span data-dcnode-id="6401" instrument_node="">Among the various AWH materials, lithium chloride (LiCl) is strongly in moisture absorbing and inexpensive. However, it is deliquescence and exists as a solution when it has absorbed large quantities of moisture. The liberation of water is obstructed by the high vaporization enthalpy of concentrated LiCl solutions, which demands more energy for desorption. Thus, the synthesis of a solid solar-driven absorbent requires the integration of LiCl with active building blocks to assemble a bulk material that is capable of water storage and photothermal conversion. Recently, AWH has been achieved by integrating deliquescent salts with metal–organic frameworks </span><a class="workspace-trigger" data-dcnode-id="6399" href="#bib40" name="bbib40"><span data-dcnode-id="6400" instrument_node="">[40]</span></a><span data-dcnode-id="6398" instrument_node="">, fibrous membranes </span><a class="workspace-trigger" data-dcnode-id="6396" href="#bib41" name="bbib41"><span data-dcnode-id="6397" instrument_node="">[41]</span></a><span data-dcnode-id="6395" instrument_node="">, hybrid gels </span><a class="workspace-trigger" data-dcnode-id="6393" href="#bib42" name="bbib42"><span data-dcnode-id="6394" instrument_node="">[42]</span></a><span data-dcnode-id="6392" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6390" href="#bib43" name="bbib43"><span data-dcnode-id="6391" instrument_node="">[43]</span></a><span data-dcnode-id="6389" instrument_node="">, and hollow capsules </span><a class="workspace-trigger" data-dcnode-id="6387" href="#bib44" name="bbib44"><span data-dcnode-id="6388" instrument_node="">[44]</span></a><span data-dcnode-id="6386" instrument_node="">. The convenient and rapid harvesting plenty of water requires a large solid absorbent with a strong hydrophilic porous structure comprising LiCl and a photothermal conversion material. Biopolymer nanofiber materials such as nanofibrillated cellulose (NFC) can be assembled into superhydrophilic aerogels because they have web-like entangled structures and numerous active surface hydroxyl groups </span><a class="workspace-trigger" data-dcnode-id="6384" href="#bib45" name="bbib45"><span data-dcnode-id="6385" instrument_node="">[45]</span></a><span data-dcnode-id="6383" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6381" href="#bib46" name="bbib46"><span data-dcnode-id="6382" instrument_node="">[46]</span></a><span data-dcnode-id="6380" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6378" href="#bib47" name="bbib47"><span data-dcnode-id="6379" instrument_node="">[47]</span></a><span data-dcnode-id="6377" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6375" href="#bib48" name="bbib48"><span data-dcnode-id="6376" instrument_node="">[48]</span></a><span data-dcnode-id="6374" instrument_node="">. NFC is mainly individualized from biomass resources; it has a high aspect ratio and favorable mechanical properties </span><a class="workspace-trigger" data-dcnode-id="6372" href="#bib49" name="bbib49"><span data-dcnode-id="6373" instrument_node="">[49]</span></a><span data-dcnode-id="6371" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6369" href="#bib50" name="bbib50"><span data-dcnode-id="6370" instrument_node="">[50]</span></a><span data-dcnode-id="6368" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6366" href="#bib51" name="bbib51"><span data-dcnode-id="6367" instrument_node="">[51]</span></a><span data-dcnode-id="6365" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6363" href="#bib52" name="bbib52"><span data-dcnode-id="6364" instrument_node="">[52]</span></a><span data-dcnode-id="6362" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6360" href="#bib53" name="bbib53"><span data-dcnode-id="6361" instrument_node="">[53]</span></a><span data-dcnode-id="6359" instrument_node="">. NFC can be integrated with LiCl and a solar absorber to produce a bulk aerogel. However, it remains a challenge to tailor aerogel structures that are capable of outdoor solar-driven evaporation, and simultaneously minimize the amount of expensive solar absorber usage, and maximize the rate and capacity of moisture absorption, and improve the water storage capability.</span></p><p data-dcnode-id="6353" id="p0035"><span data-dcnode-id="6357" instrument_node="">In the present study, we designed a portable solar-powered nanostructured biopolymer hygroscopic aerogel (NBHA) for AWH. The methodology is based on the integration of NFC, LiCl, and graphene via solution exchange followed by lyophilization. The NBHAs comprise two layers-a thin graphene solar-to-thermal conversion layer and an NFC hydrophilic layer-together with micron-sized hygroscopic LiCl particles that are widely distributed within the aerogel network. The intrinsic porous bilayer structure with interconnected micron- and nano-scale channels of the NBHA and the synergistic effect of its building blocks enable rapid and extensive absorption and storage of atmospheric water, even at a relative humidity (RH) of ~18%; the NBHA requires little energy from natural sunlight for solar-driven light-to-vapor conversion. A device based on the NBHA was developed and liquid water was successfully harvested outdoors from air, even at low levels of natural sunlight of 0.10–0.56&nbsp;kW&nbsp;m</span><sup data-dcnode-id="6355"><span data-dcnode-id="6356" instrument_node="">−2</span></sup><span data-dcnode-id="6354" instrument_node="">.</span></p></section><section data-dcnode-id="5479" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6346" id="sect0030"><span data-dcnode-id="6351" instrument_node="">2</span><span data-dcnode-id="6349" instrument_node="">. </span><span data-dcnode-id="6347" instrument_node="">Experimental section</span></h2><section data-dcnode-id="6337" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6340" id="sect0035"><span data-dcnode-id="6345" instrument_node="">2.1</span><span data-dcnode-id="6343" instrument_node="">. </span><span data-dcnode-id="6341" instrument_node="">NFC preparation</span></h3><p data-dcnode-id="6338" id="p0040"><span data-dcnode-id="6339" instrument_node="">First, the wood powder was pretreated with acidified sodium chlorite at 75&nbsp;°C for 1&nbsp;h to remove lignin. Acetic acid was added to adjust the pH of the reaction solution. The process was repeated for 5 times. Afterward, the as-prepared holocellulose was treated with 5&nbsp;wt% potassium hydroxide at 90&nbsp;°C for 2&nbsp;h to remove large amounts of hemicellulose. The sample was further treated with acidified sodium chlorite at 75&nbsp;°C for 1&nbsp;h (2 times), and 5&nbsp;wt% potassium hydroxide at 90&nbsp;°C for 2&nbsp;h, resulting in chemically purified cellulose pulp. Next, the cellulose pulp aqueous dispersion (1&nbsp;wt%) was nanofibrillated for 30&nbsp;min using a SCIENTZ-1200E high-intensity ultrasonicator (Ningbo Scientz Biotechnology Co., Ltd., China) with an output power of 800&nbsp;W, which generated a 1&nbsp;wt% NFC aqueous suspension.</span></p></section><section data-dcnode-id="6328" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6331" id="sect0040"><span data-dcnode-id="6336" instrument_node="">2.2</span><span data-dcnode-id="6334" instrument_node="">. </span><span data-dcnode-id="6332" instrument_node="">Graphene dispersion preparation</span></h3><p data-dcnode-id="6329" id="p0045"><span data-dcnode-id="6330" instrument_node="">A 1&nbsp;wt% graphene dispersion was produced by ultrasonically dispersing graphene powder in water for 30&nbsp;min using an ultrasonic cleaning machine.</span></p></section><section data-dcnode-id="6319" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6322" id="sect0045"><span data-dcnode-id="6327" instrument_node="">2.3</span><span data-dcnode-id="6325" instrument_node="">. </span><span data-dcnode-id="6323" instrument_node="">NBHA fabrication</span></h3><p data-dcnode-id="6320" id="p0050"><span data-dcnode-id="6321" instrument_node="">30&nbsp;g of the 1&nbsp;wt% NFC suspension was placed in a 150&nbsp;mL beaker, and 3&nbsp;g of the 1&nbsp;wt% graphene dispersion was carefully dropped on the surface of the NFC suspension. Then, 60&nbsp;g of ethanol was slowly poured into the beaker along its inner wall, and the beaker was left at room temperature for 24&nbsp;h. Subsequently, the excess ethanol in the beaker was slowly sucked out to produce a graphene/NFC bilayer gel. Next, 60&nbsp;g of a 5&nbsp;wt% aqueous solution of lithium chloride was slowly poured along the inner wall of the beaker, and the sample was left to stand at room temperature for 24&nbsp;h. The excess lithium chloride solution was then removed to produce a nanostructured biopolymer hygroscopic hydrogel (NBHH). The NBHA was produced by directly freeze-drying the NBHH.</span></p></section><section data-dcnode-id="6310" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6313" id="sect0050"><span data-dcnode-id="6318" instrument_node="">2.4</span><span data-dcnode-id="6316" instrument_node="">. </span><span data-dcnode-id="6314" instrument_node="">Fabrication of NBHA without graphene</span></h3><p data-dcnode-id="6311" id="p0055"><span data-dcnode-id="6312" instrument_node="">30&nbsp;g of a 1&nbsp;wt% NFC suspension was placed in a 150&nbsp;mL beaker, 60&nbsp;g of a 5&nbsp;wt% lithium chloride aqueous solution was slowly poured into the beaker along its inner wall, and the beaker was left at room temperature for 24&nbsp;h. Subsequently, the excess lithium chloride solution was sucked out to produce NBHH without graphene. NBHA without graphene was fabricated by directly freeze-drying the hydrogel.</span></p></section><section data-dcnode-id="6301" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6304" id="sect0055"><span data-dcnode-id="6309" instrument_node="">2.5</span><span data-dcnode-id="6307" instrument_node="">. </span><span data-dcnode-id="6305" instrument_node="">Nanostructured biopolymer aerogel (NBA) fabrication</span></h3><p data-dcnode-id="6302" id="p0060"><span data-dcnode-id="6303" instrument_node="">30&nbsp;g of a 1&nbsp;wt% NFC suspension was placed in a 150&nbsp;mL beaker, and 3&nbsp;g of a 1&nbsp;wt% graphene dispersion was carefully dropped onto the surface of the NFC suspension. Then, 60&nbsp;g of ethanol was slowly poured into the beaker along its inner wall, and the beaker was left at room temperature for 24&nbsp;h. Subsequently, the excess ethanol in the beaker was slowly sucked out to produce a graphene/NFC bilayer gel. The NBA was produced by directly freeze-drying the gel.</span></p></section><section data-dcnode-id="6289" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6295" id="sect0060"><span data-dcnode-id="6300" instrument_node="">2.6</span><span data-dcnode-id="6298" instrument_node="">. </span><span data-dcnode-id="6296" instrument_node="">Material characterization</span></h3><p data-dcnode-id="6290" id="p0065"><span data-dcnode-id="6294" instrument_node="">The morphology and structure of the material was determined using a Quanta 200 scanning electron microscope (FEI, USA) and a Tecnai G2 transmission electron microscope (FEI). The rheological properties of the NBHH and wet NBHA were determined using an AR2000ex rheometer (TA, USA) with flat parallel plates (40&nbsp;mm in diameter). The gap was 1.5&nbsp;mm and the frequency sweeps were conducted at 25&nbsp;°C between 0.1 and 100&nbsp;rad&nbsp;s</span><sup data-dcnode-id="6292"><span data-dcnode-id="6293" instrument_node="">−1</span></sup><span data-dcnode-id="6291" instrument_node=""> at a controlled strain amplitude of 1%. The gel compression tests were carried out using an AI-7000S TC160701511 mechanical testing machine (Gotech). Optical measurements were obtained between 190 and 2,500&nbsp;nm using a V670 UV–vis–NIR spectrophotometer (Jasco, Japan) with an integrated sphere for the collection of reflected light. Thermographic images were captured using a Ti200 infrared thermal camera (Fluke Co. Ltd., Beijing). A CEL-HXF300 xenon lamp (Beijing Education Au-light Co. Ltd., China) was used to simulate sunlight. The intensity of the light was varied by adjusting the output power of the equipment. The light intensity was determined using a CEL-NP2000 strong light power meter (Beijing Education Au-light Co. Ltd., China).</span></p></section><section data-dcnode-id="6142" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6283" id="sect0065"><span data-dcnode-id="6288" instrument_node="">2.7</span><span data-dcnode-id="6286" instrument_node="">. </span><span data-dcnode-id="6284" instrument_node="">Atmospheric water absorption</span></h3><p data-dcnode-id="6143" id="p0070"><span data-dcnode-id="6282" instrument_node="">The NBHA, NBHA without graphene, NBA, silica gel, and 4&nbsp;A molecular sieve were simultaneously exposed to air for 60&nbsp;h to absorb moisture in the same room at ~25&nbsp;°C and ~28% RH. The mass change of each sample was determined once every hour. The moisture absorption of NBHA was also determined in a constant temperature and humidity chamber (GDJS-225; Beijing Yashilin Testing Equipment Co. Ltd., China) at 25&nbsp;°C and at various levels of humidity. The water uptake of NBHA after moisture absorption was calculated using </span><a class="workspace-trigger" data-dcnode-id="6280" href="#eqn0005" name="beqn0005"><span data-dcnode-id="6281" instrument_node="">Eq. (1)</span></a><span data-dcnode-id="6279" instrument_node="">:</span><span class="display" data-dcnode-id="6157"><span class="formula" data-dcnode-id="6158" id="eqn0005"><span class="label" data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">(1)</span></span><span class="math" data-dcnode-id="6159"><span class="MathJax_Preview" data-dcnode-id="6276" style=""></span><span class="MathJax_SVG" data-dcnode-id="6162" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mrow is=&quot;true&quot;><mrow is=&quot;true&quot;><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>Water</mi></mrow><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mrow is=&quot;true&quot;><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>uptake</mi></mrow></mrow><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>=</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>m</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow></msub><mo is=&quot;true&quot;>&amp;#x2212;</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>m</mi></mrow><mrow is=&quot;true&quot;><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>a</mi></mrow></msub></mrow><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>m</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>a</mi></mrow></msub></mrow></mfrac><mo is=&quot;true&quot;>,</mo></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="6204" focusable="false" height="3.568ex" role="img" style="vertical-align: -1.232ex;" viewBox="0 -1005.7 10478 1536" width="24.336ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="6205" fill="currentColor" stroke="currentColor" stroke-width="0" t true" linebreak="goodbreak"><span data-dcnode-id="5896" instrument_node="">=</span></mo><mfrac data-dcnode-id="5869" is="true"><mrow data-dcnode-id="5878" is="true"><msub data-dcnode-id="5888" is="true"><mrow data-dcnode-id="5892" is="true"><mi data-dcnode-id="5893" is="true"><span data-dcnode-id="5894" instrument_node="">m</span></mi></mrow><mrow data-dcnode-id="5889" is="true"><mi data-dcnode-id="5890" is="true"><span data-dcnode-id="5891" instrument_node="">b</span></mi></mrow></msub><mo data-dcnode-id="5886" is="true"><span data-dcnode-id="5887" instrument_node="">−</span></mo><msub data-dcnode-id="5879" is="true"><mrow data-dcnode-id="5883" is="true"><mi data-dcnode-id="5884" is="true"><span data-dcnode-id="5885" instrument_node="">m</span></mi></mrow><mrow data-dcnode-id="5880" is="true"><mi data-dcnode-id="5881" is="true"><span data-dcnode-id="5882" instrument_node="">c</span></mi></mrow></msub></mrow><mrow data-dcnode-id="5870" is="true"><msub data-dcnode-id="5871" is="true"><mrow data-dcnode-id="5875" is="true"><mi data-dcnode-id="5876" is="true"><span data-dcnode-id="5877" instrument_node="">m</span></mi></mrow><mrow data-dcnode-id="5872" is="true"><mi data-dcnode-id="5873" is="true"><span data-dcnode-id="5874" instrument_node="">d</span></mi></mrow></msub></mrow></mfrac><mo data-dcnode-id="5867" is="true"><span data-dcnode-id="5868" instrument_node="">,</span></mo></mrow></math></span></span></span></span></span><span data-dcnode-id="5857" instrument_node="">where </span><em data-dcnode-id="5855"><span data-dcnode-id="5856" instrument_node="">m</span></em><sub data-dcnode-id="5852"><em data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">b</span></em></sub><span data-dcnode-id="5851" instrument_node=""> is the mass of the NBHA after 60 h of moisture absorption in air, </span><em data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">m</span></em><sub data-dcnode-id="5846"><em data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">c</span></em></sub><span data-dcnode-id="5845" instrument_node=""> is the mass of the NBHA after 1 h of vapor evaporation when subjected to irradiation at various light intensities, </span><em data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">m</span></em><sub data-dcnode-id="5840"><em data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">d</span></em></sub><span data-dcnode-id="5839" instrument_node=""> is the mass of water absorbed by the NBHA after 60 h of moisture absorption, </span><em data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">A</span></em><span data-dcnode-id="5836" instrument_node=""> is the area of the top surface of the NBHA, and </span><em data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">T</span></em><span data-dcnode-id="5833" instrument_node=""> is the duration of light irradiation (1 h).</span></p></section><section data-dcnode-id="5480" id="sec0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5825" id="sect0075"><span data-dcnode-id="5830" instrument_node="">2.9</span><span data-dcnode-id="5828" instrument_node="">. </span><span data-dcnode-id="5826" instrument_node="">Outdoor measurement</span></h3><p data-dcnode-id="5820" id="p0080"><span data-dcnode-id="5824" instrument_node="">A square piece of NBHA was fabricated (~12 cm × 12 cm, ~6 mm thick). It was assembled with two transparent quartz glass containers to prepare a water collection device. The top container had a sloping top surface and a square opening (11 cm × 11 cm) in the center of its bottom surface. The function of bottom container is only for guarantying the airtight of the device. The water was harvested outside at Northeast Forestry University (NEFU) campus in the city of Harbin on random sunny days between June and September, in 2019. The device was opened overnight between 17:00 and 8:00 (next day) to enable the NBHA to absorb moisture. The RH varied between 58% and 78%, and the temperature fluctuated between 20 °C and 28 °C. Subsequently, the device was sealed with the graphene layer on top of the NBHA, and subjected to solar irradiation from 9:00 to 17:00. The solar flux was in the range 0.10–0.56 kW m</span><sup data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">−2</span></sup><span data-dcnode-id="5821" instrument_node="">, and the environmental temperature fluctuated between 26.8 °C and 36.3 °C.</span></p><p data-dcnode-id="5634" id="p0085"><span data-dcnode-id="5819" instrument_node="">The average absorption rate of the NBHA was calculated using </span><a class="workspace-trigger" data-dcnode-id="5817" href="#eqn0020" name="beqn0020"><span data-dcnode-id="5818" instrument_node="">Eq. (4)</span></a><span data-dcnode-id="5816" instrument_node="">:</span><span class="display" data-dcnode-id="5657"><span class="formula" data-dcnode-id="5658" id="eqn0020"><span class="label" data-dcnode-id="5814"><span data-dcnode-id="5815" instrument_node="">(4)</span></span><span class="math" data-dcnode-id="5659"><span class="MathJax_Preview" data-dcnode-id="5813" style=""></span><span class="MathJax_SVG" data-dcnode-id="5662" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mrow is=&quot;true&quot;><mrow is=&quot;true&quot;><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>Average</mi></mrow><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mrow is=&quot;true&quot;><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>absorption</mi></mrow><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mrow is=&quot;true&quot;><mi mathvariant=&quot;normal&quot; is=&quot;true&quot;>rate</mi></mrow></mrow><mo linebreak=&quot;goodbreak&quot; is=&quot;true&quot;>=</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>m</mi></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>i</mi></mrow>
