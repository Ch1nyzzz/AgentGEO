</span><p data-dcnode-id="2827"><b data-dcnode-id="2829"><span data-dcnode-id="2833" instrument_node="">What’s more, CO</span><sub data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">2</span></sub><span data-dcnode-id="2830" instrument_node=""> used in supercritical fluid extraction has nearly zero possibilities for chemical denaturant contamination as found in various ethanol extracts.</span></b><span data-dcnode-id="2828" instrument_node=""> For these reasons, it is the ideal solvent used in this industry.</span></p></div><span data-dcnode-id="2825" instrument_node="">

</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">The direct labor between the two techniques is essentially the same. However different configurations of equipment and different workflows can improve labor content and headcount. The concept of value-added Labor in this instance is very important.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Value added labor is the labor content that is spent by the laborer on Direct conversion of the product into something the customer values. In reality, most operations have very low value-added labor in a very high overhead component to direct labor. We suggest the use of lean techniques and value stream mapping as it will:</span></p><span data-dcnode-id="2082" instrument_node="">
</span><ul data-dcnode-id="2071"><span data-dcnode-id="2081" instrument_node="">
</span><li data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Improve workflow;</span></li><span data-dcnode-id="2078" instrument_node="">
</span><li data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Reduce inventory; and</span></li><span data-dcnode-id="2075" instrument_node="">
</span><li data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Reduce the headcount required to produce a unit</span></li><span data-dcnode-id="2072" instrument_node="">
</span></ul></div><span data-dcnode-id="2069" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1982"><h2 data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">What is Supercritical Carbon Dioxide Extraction?</span></h2><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" style="font-weight: 400;"><span data-dcnode-id="1993" instrument_node="">&nbsp;In essence, supercritical co2 extraction is just one form of supercritical fluid extraction (SFE). This method of separation utilizes carbon dioxide, though there are other forms of SFE like ethanol that can be efficient as well. </span></span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" style="font-weight: 400;"><span data-dcnode-id="1989" instrument_node="">When pressure and temperature are manipulated, the carbon dioxide used will reach a supercritical state between liquid and gas. This allows for the replacement of traditional organic solvents eliminating environmental concerns and avoiding storage and disposal concerns. </span></span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1983"><span data-dcnode-id="1984" style="font-weight: 400;"><span data-dcnode-id="1985" instrument_node="">This method of SFE also allows for a higher diffusion coefficient of plant fats and waxes than liquids, greatly improving extraction efficiency. Not only that, reaching a homogenous phase after a vapor phase during the extraction process allows for the separation past the critical point. For these reasons, supercritical CO2 extraction is the SFE method of choice in cannabis extraction.</span></span></p></div><span data-dcnode-id="1981" instrument_node="">
</span></div><span data-dcnode-id="1979" instrument_node="">
</span></div><span data-dcnode-id="1977" instrument_node="">
</span></div><span data-dcnode-id="1975" instrument_node="">
</span></div><div class="et_pb_section et_pb_section_18 et_pb_with_background et_section_regular" data-dcnode-id="1896" id="the-science-behind-supercritical-co2-extractors"><span data-dcnode-id="1973" instrument_node="">
</span><div class="et_pb_row et_pb_row_19" data-dcnode-id="1898"><span data-dcnode-id="1972" instrument_node="">
</span><div class="et_pb_column et_pb_column_1_2 et_pb_column_39 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="1910"><span data-dcnode-id="1971" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_24 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1933"><span data-dcnode-id="1970" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1935"><h2 data-dcnode-id="1965" style="text-align: center;"><span data-dcnode-id="1969" instrument_node="">The Science Behind Supercritical CO</span><sub data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">2</span></sub><span data-dcnode-id="1966" instrument_node=""> Extractors</span></h2><span data-dcnode-id="1964" instrument_node="">
</span><div data-dcnode-id="1936"><span data-dcnode-id="1963" instrument_node="">
</span><p data-dcnode-id="1950"><b data-dcnode-id="1955"><span data-dcnode-id="1962" instrument_node="">Supercritical CO</span><sub data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">2</span></sub><span data-dcnode-id="1959" instrument_node=""> extractors use carbon dioxide (CO</span><sub data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">2</span></sub><span data-dcnode-id="1956" instrument_node="">) at an elevated temperature and pressure to extract soluble compounds from natural products</span></b><span data-dcnode-id="1954" instrument_node="">. Carbon dioxide above the critical temperature (31ºC) and pressure (1071 psi) becomes a supercritical fluid, which has an increased capacity for diffusion of molecules and solubilizing non-polar compounds. Raising the temperature and pressure of the liquid CO</span><sub data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">2</span></sub><span data-dcnode-id="1951" instrument_node="">&nbsp;even further provides highly efficient extractions of oils in a short period of time.</span></p><span data-dcnode-id="1949" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1948" instrument_node="">The (ScCO</span><sub data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">2</span></sub><span data-dcnode-id="1945" instrument_node="">) extraction has become the preferred method for extracting CBD oils and other botanical extracts to serve markets with the most demanding standards for safety, quality, purity and consistency. It is also preferred by consumers for the same reasons, and progressive brands are boldly stating “ScCO</span><sub data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">2&nbsp;</span></sub><span data-dcnode-id="1942" instrument_node="">extraction” on package labels.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1937" instrument_node="">
</span></div></div><span data-dcnode-id="1934" instrument_node="">

</span><div class="et_pb_module et_pb_text et_pb_text_25 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1792"><span data-dcnode-id="1848" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1794"><h2 data-dcnode-id="1845"><strong data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">What are Full Spectrum Extracts?</span></strong></h2><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1843" instrument_node="">Full spectrum products are extract based products that have, as the name implies, </span><strong data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">a full spectrum of plant materials including cannabinoids, terpenes, flavonoids and more</span></strong><span data-dcnode-id="1840" instrument_node="">. While the oil is still refined into a distillate, the full spectrum of cannabinoids and terpenes,</span><strong data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node=""> including the legally allotted amount of THC, is left in the product.</span></strong></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1835" instrument_node="">In order to keep a full spectrum product, the only things that are remediated from the extract are fats, waxes, plant chlorophylls, residual solvent and excess delta 9 THC in order to comply with regulations. </span><strong data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">This makes a pure and safe product while leaving the potential of The Entourage Effect intact.</span></strong></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1830" instrument_node="">As mentioned before, </span><strong data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">The Entourage Effect</span></strong><span data-dcnode-id="1827" instrument_node=""> comes as </span><strong data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">a benefit from the combination of the various cannabinoids and terpenes that are in a full spectrum product</span></strong><span data-dcnode-id="1824" instrument_node="">. This range of plant compounds also gives a pleasant, earthy flavor and aroma. These are both desirable traits of extract derivative products that full spectrum can provide making it a highly sought after market opportunity.</span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1821" instrument_node="">Despite the fact that there is </span><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">THC in a full spectrum product</span></strong><span data-dcnode-id="1818" instrument_node="">, there is little cause for concern for those who want to avoid the psychoactive effects of this particular cannabinoid. The legally allowed limit set by the </span><em data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">FDA is 0.3% or less delta 9 THC</span></em><span data-dcnode-id="1815" instrument_node=""> in a final product making the psychoactive effects non-existent. That said, this lesser amount still plays a role in The Entourage Effect and is beneficial to a final product. </span><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">The one thing to keep in mind is that the trace amounts of this cannabinoid could potentially cause a positive drug test.</span></strong></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1804"><strong data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">Unlike isolating individual cannabinoids, the process for making full spectrum products is not as rigorous.</span></strong><span data-dcnode-id="1808" instrument_node=""> Because the majority of the plant components are intentionally left in the product, the process of distillation is the final stop before product formulation. </span><strong data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">There is no need for adding terpenes, or any other plant compounds because of the natural formulation.</span></strong><span data-dcnode-id="1805" instrument_node=""> This makes for a product that is made easily and is highly profitable on the market.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1802" instrument_node="">It’s important to know what the entourage effect is, </span><strong data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">because this chemical phenomenon will occur inside your body if you consume full spectrum CBD</span></strong><span data-dcnode-id="1799" instrument_node="">. As mentioned, full spectrum CBD contains a variety of cannabinoids, and it retains other plant compounds, including terpenes like caryophyllene, humulene, limonene, myrcene, pinene. They will also contain an abundance of flavonoids. </span><strong data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">These phytonutrients possess antioxidants with anti-inflammatory and immune system benefits.</span></strong><span data-dcnode-id="1796" instrument_node=""> When these chemicals react with one another, it increases the beneficial effects of CBD.</span></p></div><span data-dcnode-id="1793" instrument_node="">
</span></div><span data-dcnode-id="1791" instrument_node="">

</span><div class="et_pb_module et_pb_text et_pb_text_26 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1699"><span data-dcnode-id="1760" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1701"><h2 data-dcnode-id="1757"><strong data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Terpene Extraction</span></strong></h2><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1752"><strong data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Terpenes have become nearly as important as the cannabinoids they accompany full spectrum products.</span></strong><span data-dcnode-id="1753" instrument_node=""> Not only are they important to add flavor and aroma to a product, they have a number of beneficial effects on their own, and contribute to The Entourage Effect. So, we should discuss the best method to extract and collect terpenes for wholesale and product formulations.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><h3 data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Terpenes Have a Tendency to Degrade</span></h3><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">The first important factor to consider when it comes to terpene extraction is that </span><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">they are highly reactive and can be lost or damaged easily with little heat.</span></strong><span data-dcnode-id="1744" instrument_node=""> While some processors will attempt terpene recovery during the extraction process, the possibility of terpene degradation is higher with certain extraction methods. This can cause a less than desirable taste and aroma to an extract when performed improperly.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><h3 data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">How to Prevent Terpene Degradation</span></h3><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1738" instrument_node="">In order to prevent terpene degradation, there is a </span><strong data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">recommended terpene extraction method that we use</span></strong><span data-dcnode-id="1735" instrument_node="">. During decarboxylation, the ground hemp biomass is subjected to temperatures and pressures just high enough to allow for the conversion of the acidic cannabinoids into their active forms (</span><em data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">CBD-A to CBD for example</span></em><span data-dcnode-id="1732" instrument_node="">). </span><strong data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">During this time is one of the best times to capture terpenes.</span></strong></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1727" instrument_node="">Because the temperature needed to perform decarboxylation is less than what is performed during extraction, it can be used to collect terpenes without degrading them. </span><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">This is done by adding a cold trap condenser to the vacuum oven.</span></strong><span data-dcnode-id="1724" instrument_node=""> As the terpenes evaporate, the chilled condenser will collect them. From there, they can be reformulated into the extract down the line, or </span><strong data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">sold</span></strong><span data-dcnode-id="1721" instrument_node=""> </span><strong data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">wholesale as a pure, organic terpene product</span></strong><span data-dcnode-id="1718" instrument_node="">.</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1715" instrument_node="">Capturing terpenes in this way </span><strong data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">prevents any other compounds like cannabinoids to be co-distilled into the solution</span></strong><span data-dcnode-id="1712" instrument_node=""> which could otherwise ruin a product that intends to have no other cannabinoids than the target cannabinoid. This is especially true if </span><em data-dcnode-id="1709"><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">delta 9 THC</span></strong></em><span data-dcnode-id="1708" instrument_node=""> is necessary to avoid.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1705" instrument_node="">This method also means that the cannabinoids are more soluble making the extraction process more efficient. Because 90-100% of cannabinoids are converted during this process, it is unnecessary to increase run time to ensure decarboxylation happens during extraction. </span><strong data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">So, not only is this the ideal time to capture terpenes, it is beneficial overall to the extraction process.</span></strong></p></div><span data-dcnode-id="1700" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="1614"><h2 data-dcnode-id="1647"><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">The Entourage Effect</span></strong></h2><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1645" instrument_node="">There has been a </span><strong data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">wide range of research that has studied the benefits of the various compounds found inside the hemp plant other than just cannabinoids.</span></strong><span data-dcnode-id="1642" instrument_node=""> The combination of these plant compounds has resulted in an effect that occurs called The Entourage Effect.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1636"><strong data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">The Entourage Effect is an interesting study that shows a synergistic effect between cannabinoids, terpenes and other compounds found in hemp extract based products.</span></strong><span data-dcnode-id="1637" instrument_node=""> Compared to the use of isolated cannabinoids, products that contained multiple cannabinoids and terpenes tended to have increased effects when used together as oppose to separately.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1634" instrument_node="">The Entourage Effect also indicates the </span><strong data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">beneficial properties of terpenes</span></strong><span data-dcnode-id="1631" instrument_node=""> on their own. Not only do terpenes contribute to the smells and flavors of hemp and cannabis products, they tend to have their own physiological effects as well. </span><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">For example, limonene has shown to have mood altering effects that may improve mood, and can be used for antibacterial and antifungal purposes.</span></strong></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1626" instrument_node="">Keeping in mind that both </span><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">terpenes and cannabinoids</span></strong><span data-dcnode-id="1623" instrument_node=""> have their own individual uses, the studies surrounding The Entourage Effect have shown those effects combined enhance each other. </span><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">This has increased the market demand for products that have a good terpene and cannabinoid profile to benefit from the potentials of The Entourage Effect.</span></strong></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1618" instrument_node="">All this research goes to show that, while products with isolated cannabinoids are beneficial for some, products created with a spectrum of cannabinoids and terpenes benefit from The Entourage Effect, making them more beneficial for consumers, and highly profitable for producers. </span><strong data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">These products are often referred to as Full Spectrum.</span></strong></p></div><span data-dcnode-id="1613" instrument_node="">
</span></div><span data-dcnode-id="1611" instrument_node="">

</span><h3 class="et_pb_toggle_title" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Is CO2 cheaper than ethanol?</span></h3><span data-dcnode-id="1491" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1481"><p data-dcnode-id="1485"><span data-dcnode-id="1490" instrument_node="">Yes.</span><br data-dcnode-id="1489"><span data-dcnode-id="1488" instrument_node="">
A pound of food grade ethanol when purchased in bulk is $4.71/lb at current price.</span><br data-dcnode-id="1487"><span data-dcnode-id="1486" instrument_node="">
A pound of food grade CO2 when purchased in bulk is about $0.04/lb at current price.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1483"></span><input class="get_current_post_id" data-dcnode-id="1482" type="hidden" value="2902"></div><span data-dcnode-id="1480" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_2 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1452"><span data-dcnode-id="1478" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Does it cost less to process hemp with Co2 compared with Ethanol?</span></h3><span data-dcnode-id="1475" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1454"><p data-dcnode-id="1471"><span data-dcnode-id="1474" instrument_node="">Yes.</span><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">
In fact the operating cost for CO2 extraction is dramatically less than the operating costs associated with ethanol.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1469" instrument_node="">Extraction with Ethanol is a process that is typically run at low temperatures. First the ethanol is cooled to below -20oC before it is introduced to the hemp. Cooling the ethanol reduces the amount of extracted chlorophyll and waxes. If you account for the energy required to chill the ethanol down to those low temperatures and then also evaporate after use, the energy bill for extracting ethanol is approximately 3-6x the cost of extracting with CO2. However, the energy cost is really not the key driver in the overall operating costs.</span><br data-dcnode-id="1468"><span data-dcnode-id="1467" instrument_node="">
Ethanol extraction requires a significant amount of ethanol to be used per pound of hemp. In fact, about 1 to 1.5 gallons of ethanol must be used per pound of dry hemp in order to extract. Hemp is a very absorbent biomass material and the ethanol must fully saturate the hemp plant before any extraction can take place. For this reason a large volume of ethanol is needed to extract cbd from hemp.</span><br data-dcnode-id="1466"><span data-dcnode-id="1465" instrument_node="">
The key cost driver or ethanol extraction is recovery of that solvent from the biomass. Even though many ethanol extraction equipment companies provide centrifuges and or presses to eliminate the amount of ethanol left over in the biomass, The best equipment will provide only a 90 to 95% recovery of the ethanol. This 5 to 10% loss in ethanol is a huge cost driver for extracting ethanol.</span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">
For example, suppose you wanted to process 1000 lb of hemp. You would need 1000 gallons of ethanol to start out at a cost of $16-33 per gallon for food grade ethanol for a total cost of $16,000 to $33,000. If you recovered 90% of the ethanol the ethanol loss would be $1,600 – $3,300 per 1000 lbs. Furthermore if you process 1000 pounds per day, this would be your daily loss.</span><br data-dcnode-id="1462"><span data-dcnode-id="1461" instrument_node="">
In contrast, you will lose the equivalent of about $70 per day for CO2 extractions for the exact same process.</span><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">
Besides energy and solvent usage, there are many other hidden costs related to extraction with ethanol including solvent reuse costs, insurance cost, increased facilities cost, and testing costs.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1456"></span><input class="get_current_post_id" data-dcnode-id="1455" type="hidden" value="3318"></div><span data-dcnode-id="1453" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_3 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1311"><span data-dcnode-id="1451" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">How do I model and compare the financial return of ethanol extraction vs CO2 extraction?</span></h3><span data-dcnode-id="1448" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1313"><p data-dcnode-id="1445"><span data-dcnode-id="1446" style="font-weight: 400;"><span data-dcnode-id="1447" instrument_node="">There are many inputs that need to be defined when creating a financial model comparing two different extraction methods. The first decision to be made is to decide what the financial metric will be used to make a decision on the superiority of one method over the other.&nbsp;</span></span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" style="font-weight: 400;"><span data-dcnode-id="1443" instrument_node="">In this case, we recommend the use of the Net Present Value as the way to model the return of each extraction technique because it accounts for the cash flow associated with the operation. Many ethanol extraction companies try to make the argument that ethanol extraction is lower cost because the equipment cost is less. However, the equipment cost will have very little impact on the overall profitability of the operation at the same throughput.</span></span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" style="font-weight: 400;"><span data-dcnode-id="1439" instrument_node="">The best way to compare the two techniques is to fix the throughput so that an apples-to-apples comparison can be made. Comparisons such are payback time and return on investment can mislead someone into making a bad investment decision.&nbsp;</span></span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" style="font-weight: 400;"><span data-dcnode-id="1435" instrument_node="">So if we fix the throughput at one ton per day the cost of the hemp is equal between the techniques and operating cost variance is the only contributing factor.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" style="font-weight: 400;"><span data-dcnode-id="1431" instrument_node="">Here are the twelve key questions that need to be defined in order to do a comparison:</span></span></p><span data-dcnode-id="1428" instrument_node="">
</span><ol data-dcnode-id="1378"><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1424" style="font-weight: 400;"><span data-dcnode-id="1425" style="font-weight: 400;"><span data-dcnode-id="1426" instrument_node="">What is the direct labor to process?</span></span></li><span data-dcnode-id="1423" instrument_node="">
</span><li data-dcnode-id="1420" style="font-weight: 400;"><span data-dcnode-id="1421" style="font-weight: 400;"><span data-dcnode-id="1422" instrument_node="">What is the energy to process?</span></span></li><span data-dcnode-id="1419" instrument_node="">
</span><li data-dcnode-id="1416" style="font-weight: 400;"><span data-dcnode-id="1417" style="font-weight: 400;"><span data-dcnode-id="1418" instrument_node="">What are the solvent losses?&nbsp;</span></span></li><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1412" style="font-weight: 400;"><span data-dcnode-id="1413" style="font-weight: 400;"><span data-dcnode-id="1414" instrument_node="">What are the direct material startup costs including solvent startup costs?</span></span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1408" style="font-weight: 400;"><span data-dcnode-id="1409" style="font-weight: 400;"><span data-dcnode-id="1410" instrument_node="">What are the cannabinoid recovery rates?</span></span></li><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1404" style="font-weight: 400;"><span data-dcnode-id="1405" style="font-weight: 400;"><span data-dcnode-id="1406" instrument_node="">How much solvent do I use, reuse, and when do I need to replace the solvent with fresh solvent?&nbsp; and at what interval?</span></span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1400" style="font-weight: 400;"><span data-dcnode-id="1401" style="font-weight: 400;"><span data-dcnode-id="1402" instrument_node="">What is the insurance cost for each option?</span></span></li><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1396" style="font-weight: 400;"><span data-dcnode-id="1397" style="font-weight: 400;"><span data-dcnode-id="1398" instrument_node="">What is the cost of hazardous waste disposal?</span></span></li><span data-dcnode-id="1395" instrument_node="">
</span><li data-dcnode-id="1392" style="font-weight: 400;"><span data-dcnode-id="1393" style="font-weight: 400;"><span data-dcnode-id="1394" instrument_node="">What is the cost of solvent removal?</span></span></li><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1388" style="font-weight: 400;"><span data-dcnode-id="1389" style="font-weight: 400;"><span data-dcnode-id="1390" instrument_node="">&nbsp;What is the cost of reuse of the solvent?</span></span></li><span data-dcnode-id="1387" instrument_node="">
</span><li data-dcnode-id="1384" style="font-weight: 400;"><span data-dcnode-id="1385" style="font-weight: 400;"><span data-dcnode-id="1386" instrument_node="">&nbsp;What is the cost of HAP emissions?</span></span></li><span data-dcnode-id="1383" instrument_node="">
</span><li data-dcnode-id="1380" style="font-weight: 400;"><span data-dcnode-id="1381" style="font-weight: 400;"><span data-dcnode-id="1382" instrument_node="">What is the depreciation for each option including building costs for H2 vs F2 occupancy?</span></span></li><span data-dcnode-id="1379" instrument_node="">
</span></ol><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" style="font-weight: 400;"><span data-dcnode-id="1376" instrument_node="">Once these questions are answered you will be able to build a pro forma income statement.&nbsp;</span></span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" style="font-weight: 400;"><span data-dcnode-id="1372" instrument_node="">Revenue</span></span></p><span data-dcnode-id="1369" instrument_node="">
</span><ul data-dcnode-id="1355"><span data-dcnode-id="1368" instrument_node="">
</span><li data-dcnode-id="1365" style="font-weight: 400;"><span data-dcnode-id="1366" style="font-weight: 400;"><span data-dcnode-id="1367" instrument_node="">Standard labor</span></span></li><span data-dcnode-id="1364" instrument_node="">
</span><li data-dcnode-id="1361" style="font-weight: 400;"><span data-dcnode-id="1362" style="font-weight: 400;"><span data-dcnode-id="1363" instrument_node="">Standard materials</span></span></li><span data-dcnode-id="1360" instrument_node="">
</span><li data-dcnode-id="1357" style="font-weight: 400;"><span data-dcnode-id="1358" style="font-weight: 400;"><span data-dcnode-id="1359" instrument_node="">Overhead</span></span></li><span data-dcnode-id="1356" instrument_node="">
</span></ul><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" style="font-weight: 400;"><span data-dcnode-id="1353" instrument_node="">Gross margin</span></span></p><span data-dcnode-id="1350" instrument_node="">
</span><ul data-dcnode-id="1340"><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1346" style="font-weight: 400;"><span data-dcnode-id="1347" style="font-weight: 400;"><span data-dcnode-id="1348" instrument_node="">SGA</span></span></li><span data-dcnode-id="1345" instrument_node="">
</span><li data-dcnode-id="1342" style="font-weight: 400;"><span data-dcnode-id="1343" style="font-weight: 400;"><span data-dcnode-id="1344" instrument_node="">R&amp;D</span></span></li><span data-dcnode-id="1341" instrument_node="">
</span></ul><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" style="font-weight: 400;"><span data-dcnode-id="1338" instrument_node="">Net Margin</span></span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" style="font-weight: 400;"><span data-dcnode-id="1334" instrument_node="">You can then hold SG&amp;A and R&amp;D constant for both techniques and account for the difference in depreciation to get to a net margin number.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" style="font-weight: 400;"><span data-dcnode-id="1330" instrument_node="">A cash flow statement can then be generated from net margin. One thing to note is that depreciation must be added back to net margin as it is a non-cash expense on the income statement.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" style="font-weight: 400;"><span data-dcnode-id="1326" instrument_node="">Cash flows are then added up for 5 consecutive periods (years) including the initial outlay of cash for startup working capital.&nbsp; Those cash flows are then discounted at a discount rate (Weighted average cost of capital estimate at 13-17%).&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" style="font-weight: 400;"><span data-dcnode-id="1322" instrument_node="">If you do this analysis, you will find that CO</span><sub data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">2</span></sub><span data-dcnode-id="1319" instrument_node=""> extraction will absolutely crush ethanol extraction in terms of net present value.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1316" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1315"></span><input class="get_current_post_id" data-dcnode-id="1314" type="hidden" value="3319"></div><span data-dcnode-id="1312" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_4 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1297"><span data-dcnode-id="1310" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">If you had an ethanol extraction facility, would you ever use CO2 just for stripping terpenes?</span></h3><span data-dcnode-id="1307" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1299"><p data-dcnode-id="1303"><span data-dcnode-id="1306" instrument_node="">Ethanol extraction typically destroys the terpenes when the ethanol is removed from the extract or is distilled from the winterized oil. Many ethanol extractors are seeking a way to preserve the terpene profile of the plant in the output oil. To this end people have tried techniques such as Steam distillation, CO2 stripping, and vacuum distillation.</span><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">
Certainly, CO2 can be used to strip terpenes from Hemp biomass Prior to ethanol extraction. However, vacuum distillation is by far the most gentle and effective way to harvest the terpene profile prior to ethanol extraction.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1301"></span><input class="get_current_post_id" data-dcnode-id="1300" type="hidden" value="3330"></div><span data-dcnode-id="1298" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_5 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1285"><span data-dcnode-id="1296" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Doesn’t ethanol extraction equipment remove all the ethanol from the biomass after extraction?</span></h3><span data-dcnode-id="1293" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1287"><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">No. Approximately 5 to 10% of the ethanol is left in the biomass and is counted as a solvent loss. These solvent losses add up to operating costs. This is especially true if organic ethanol is used or food grade ethanol is utilized as the extraction solvent.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1289"></span><input class="get_current_post_id" data-dcnode-id="1288" type="hidden" value="3331"></div><span data-dcnode-id="1286" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_6 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1269"><span data-dcnode-id="1284" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">What are the most common denaturants in ethanol?</span></h3><span data-dcnode-id="1281" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1271"><p data-dcnode-id="1275"><span data-dcnode-id="1280" instrument_node="">Denatured ethanol is a mixture of denaturants and pure ethanol. Chemical companies add the denaturant to Pure ethanol so that they will not be consumed as a food.</span><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">
Denatured recipes are published by the ttb that is administered by the National Bureau of Alcohol Tobacco and Firearms. There are many different recipes. one of the most common denaturants used in ethanol extraction is heptane. However there are other substances that may be used including acetone, isopropyl alcohol, methanol and other longer chain alcohols.</span><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
Is very limited data on the safety of heptane over the long term exposure. In fact the limit that the FDA has placed on the amount of heptane in a tincture for example was established in the 1990s on the basis of a single study published in 1981. That study the effect of heptane on Sprague dawley rats. That is why there are many disclaimers and the general guidance from the FDA is to limit the amount of solvent in any drug that is consumed.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1273"></span><input class="get_current_post_id" data-dcnode-id="1272" type="hidden" value="3370"></div><span data-dcnode-id="1270" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_7 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1257"><span data-dcnode-id="1268" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Does ethanol extraction have a greater throughput than CO2 extraction?</span></h3><span data-dcnode-id="1265" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1259"><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Hemp processing equipment can be scaled for 1 to 5 tons of extracted hemp per day. It’s generally not a fair comparison to compare the throughput on an instrument from two different companies. What is fair is to specify the throughput At the tonnage process per day and then look at the operating cost for that process. You can also look at the equipment and Facilities cost to accommodate that level of Production. after you have all of your costs accounted for including the hidden costs, then you can calculate the net present value for each investment.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1261"></span><input class="get_current_post_id" data-dcnode-id="1260" type="hidden" value="3371"></div><span data-dcnode-id="1258" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_8 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1245"><span data-dcnode-id="1256" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Is it possible to make a solventless extract with CO2?</span></h3><span data-dcnode-id="1253" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1247"><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">It is absolutely possible to make a solventless extract with CO2. Solventless extracts are typically made with subcritical CO2 extraction methods.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1249"></span><input class="get_current_post_id" data-dcnode-id="1248" type="hidden" value="3373"></div><span data-dcnode-id="1246" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_9 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="1230"><span data-dcnode-id="1244" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Would you recommend ethanol extracted oils for Vape products?</span></h3><span data-dcnode-id="1241" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="1232"><p data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">Due to the risk of chemical contaminants that are found in 25 to 30% of </span><span data-dcnode-id="1238" style="font-weight: 400;"><span data-dcnode-id="1239" instrument_node="">&nbsp;ethanol extracted oils</span></span><span data-dcnode-id="1237" instrument_node="">, we recommend that CO2 oils be used for Vapor Products.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1234"></span><input class="get_current_post_id" data-dcnode-id="1233" type="hidden" value="3374"></div><span data-dcnode-id="1231" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_10 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="925"><span data-dcnode-id="1229" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">What is the electrical cost of ethanol extraction vs. CO2 extraction?</span></h3><span data-dcnode-id="1226" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="927"><p data-dcnode-id="1220"><span data-dcnode-id="1221" style="font-weight: 400;"><span data-dcnode-id="1225" instrument_node="">Processing a ton of hemp per day into extracts&nbsp; can be an energy-intensive process depending on how the hemp is extracted. The following table compares the energy expense for ethanol extraction versus the energy expense for CO</span><sub data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">2</span></sub><span data-dcnode-id="1222" instrument_node=""> extraction:</span></span></p><span data-dcnode-id="1219" instrument_node="">

</span><h3 class="et_pb_toggle_title" data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Can ethanol become contaminated during ethanol extraction?</span></h3><span data-dcnode-id="921" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="915"><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Yes, ethanol can become contaminated during ethanol extraction. It is important that you address the contamination with testing and reuse protocols. guidance for solvent reviews have been published by the FDA in 2010. Please refer to the many articles in this blog for more information on cross-contamination with extraction.</span></p><span data-dcnode-id="918" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="917"></span><input class="get_current_post_id" data-dcnode-id="916" type="hidden" value="3384"></div><span data-dcnode-id="914" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_12 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="901"><span data-dcnode-id="912" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">When producing CBD from hemp, which part of the plant is typically used?</span></h3><span data-dcnode-id="909" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="903"><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Typically flowers and leaves – no stems or stalks. Some producers will sort out the flowers and process them separately, but most processing includes the leaves and flowers.</span></p><span data-dcnode-id="906" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="905"></span><input class="get_current_post_id" data-dcnode-id="904" type="hidden" value="17766"></div><span data-dcnode-id="902" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_13 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="889"><span data-dcnode-id="900" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">What are the typical conditions to dry hemp for extraction?</span></h3><span data-dcnode-id="897" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="891"><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Harvest drying methods are outside the scope of our solutions; however, you want to dry the biomass to roughly 10% water content for quality storage to prevent mold or mildew.</span></p><span data-dcnode-id="894" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="893"></span><input class="get_current_post_id" data-dcnode-id="892" type="hidden" value="17769"></div><span data-dcnode-id="890" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_14 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="877"><span data-dcnode-id="888" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Can the drying process be accelerated using higher temps/lower humidity?</span></h3><span data-dcnode-id="885" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="879"><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">There are several drying methods used by growers to accelerate drying, but this is outside our scope of solutions. We recommend researching the agricultural methods to find what works best for you.</span></p><span data-dcnode-id="882" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="881"></span><input class="get_current_post_id" data-dcnode-id="880" type="hidden" value="17770"></div><span data-dcnode-id="878" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_15 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="865"><span data-dcnode-id="876" instrument_node="">
</span><h3 class="et_pb_toggle_title" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Does hemp biomass need to cure before extraction?</span></h3><span data-dcnode-id="873" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="867"><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">No, the material does not need to cure. Our methods complete the final drying step in a vacuum oven to bring the water content down from 10% to the 1% – 1.5% range for efficient CO2 extraction.</span></p><span data-dcnode-id="870" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="869"></span><input class="get_current_post_id" data-dcnode-id="868" type="hidden" value="17771"></div><span data-dcnode-id="866" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="616"><p class="et_pb_member_position" data-dcnode-id="626"><span data-dcnode-id="627" style="font-size: 16px; color: #353535;"><span data-dcnode-id="628" instrument_node="">Dr. Thompson is a separations scientist, entrepreneur, and inventor. As a scientist, he has a strong technical background and industry experience in analytical instrumentation, in-vitro diagnostics, biotech, mining, and homeland security markets. During his industry career, Dr. Thompson has earned a strong track record of winning and implementing botanical extractions, formulations, quality, and products in well-regulated, medically-modeled states.&nbsp; Dr. Thompson has assisted numerous companies to attain their goals in hemp manufacturing, as well as market development, strategic marketing, and worldwide business-to-business alliance formation (including international markets).</span></span></p><span data-dcnode-id="625" instrument_node="">
</span><div data-dcnode-id="617"><span data-dcnode-id="624" instrument_node="">

</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">He received a Bachelor of Science degree in Biochemistry, Master of Science degree in Chemistry and a Doctor of Chemistry degree–all from the University of Minnesota.</span></p><span data-dcnode-id="618" instrument_node="">
