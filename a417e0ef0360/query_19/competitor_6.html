"578" instrument_node="">an be mounted in multiple areas.</span></span></li><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Works quietly.</span></li><li data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">2 Speed settings. </span></li><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Easy to clean.</span></li></ul><p data-dcnode-id="565"><strong data-dcnode-id="566"><em data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Cons</span></em></strong></p><ul data-dcnode-id="562"><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">A low-noise fan but it’s not completely silent.</span></li></ul><p data-dcnode-id="558"><strong data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Xpelair-C4TS-Simply-Contour-Extractor/dp/B00MCLJJT8%3Ftag%3Ddreamyhome-21%26th%3D1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="561" instrument_node="">View Product on Amazon</span></a></strong></p><p class="ebay-btn" data-dcnode-id="554"><strong data-dcnode-id="555"><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ebay.co.uk/sch/i.html%3F_from%3DR40%26_trksid%3Dp2380057.m570.l1313%26_nkw%3DXpelair%2BC4HTS%2B4-inch%2BSilent%2BContour%2BExtractor%2BFan%26_sacat%3D0%26mkcid%3D1%26mkrid%3D710-53481-19255-0%26siteid%3D3%26campid%3D5338897970%26customid%3D%26toolid%3D10001%26mkevt%3D1" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="557" instrument_node="">View Product on Ebay</span></a></strong></p></div></div><hr class="wp-block-separator mtg-sep is-style-wide" data-dcnode-id="551"><h2 class="has-text-align-center" data-dcnode-id="549" id="your-buyer-s-guide-to-bathroom-extractor-fans"><span data-dcnode-id="550" instrument_node="">Your Buyer’s Guide To Bathroom Extractor Fans</span></h2><hr class="wp-block-separator mtg-sep is-style-wide" data-dcnode-id="548"><p data-dcnode-id="540"><span data-dcnode-id="547" instrument_node="">With so much steam flowing from an&nbsp;</span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dreamyhome.co.uk/electric-showers/"><span data-dcnode-id="546" instrument_node="">electric shower</span></a><span data-dcnode-id="544" instrument_node="">, using your&nbsp;</span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dreamyhome.co.uk/best-bathroom-scales-reviews/"><span data-dcnode-id="543" instrument_node="">bathroom scale</span></a><span data-dcnode-id="541" instrument_node="">&nbsp;can be next to impossible. The steam fogs the screen on your bathroom scale as well as your bathroom mirror. Even if you don’t have these things, an excess level of moisture can cause mould to ruin your towels and even your health. Our guide offers you all the essential things to keep in mind when you are shopping for the best bathroom extractor fan. </span></p><h3 data-dcnode-id="537" id="tab-con-18"><strong data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">What To Consider Before Buying Your New Bathroom Fan</span></strong></h3><div class="wp-block-image" data-dcnode-id="532"><figure class="alignright size-large" data-dcnode-id="533"><img alt="Bathroom Extractor Fans Buying Guide" class="wp-image-64411" data-dcnode-id="536" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://dreamyhome.co.uk/wp-content/uploads/2019/01/quiet_tab.jpg" data-lazy-srcset="https://dreamyhome.co.uk/wp-content/uploads/2019/01/quiet_tab.jpg 450w, https://dreamyhome.co.uk/wp-content/uploads/2019/01/quiet_tab-300x179.jpg 300w" height="268" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20450%20268'%3E%3C/svg%3E" title="Consider Before Buying Bathroom Extractor Fan" width="450"><noscript data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">&lt;img width="450" height="268" src="https://dreamyhome.co.uk/wp-content/uploads/2019/01/quiet_tab.jpg" alt="Bathroom Extractor Fans Buying Guide" class="wp-image-64411" title="Consider Before Buying Bathroom Extractor Fan" srcset="https://dreamyhome.co.uk/wp-content/uploads/2019/01/quiet_tab.jpg 450w, https://dreamyhome.co.uk/wp-content/uploads/2019/01/quiet_tab-300x179.jpg 300w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></figure></div><p data-dcnode-id="529"><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Capacity Based On Room Size</span></strong></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Pick a unit that has the capacity to work with the size of your bathroom. This is measured in cubic feet per minute (CFM rating). CFM rating ranges from 50 to 110 and on average, most bathrooms require one cubic foot per minute of air movement per square foot. </span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">50 CFM rating is the minimum ventilation level required in a standard bathroom, including those with less square footage</span></p><h4 data-dcnode-id="522" id="t-1612331490832"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Extraction Rate Of Your Bathroom Fan</span></strong></h4><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">This refers to how much moisture the extractor fan can extract and is by far the most important feature of all. It is measured in Metres Cubed per Hour (m3/hr) or Litres per Second (L/s). Building regulations require all domestic fans to remove 15L/s in an average bathroom.</span></p><h4 data-dcnode-id="517" id="size-of-the-bathroom-fans"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Size Of The Bathroom Fans</span></strong></h4><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Domestic bathroom extractor fans typically come in two sizes: 4 inches/100mm and 6 inches/150mm. A 4-inch bathroom extractor fan will suit your average bathroom while the 6-inch models are best suited for bathrooms that are bigger than nine metres squared, or if you have a large household and everyone uses the shower or bath in quick succession. Bathrooms with no natural ventilation or those that feel cold can make use of a 6-inch product.</span></p><h4 data-dcnode-id="512" id="noise-level"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Noise level</span></strong></h4><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Quiet extractor fans are simply more comfortable and preferable. Aim for a product that produces no more than 30 dB. </span></p><h4 data-dcnode-id="507" id="specific-fan-efficiency-spf"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Specific Fan Efficiency (SPF)</span></strong></h4><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">SPF (Specific Fan Efficiency) is a parameter that checks the amount of electricity required to power an extractor fan while considering how much air is being driven out. A product with Low SFP efficiency reduces the power consumption which translates to lower power bills for you.</span></p><h4 data-dcnode-id="502" id="energy-efficiency-rating"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Energy Efficiency Rating</span></strong></h4><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">An energy-efficient bathroom extractor fan is eco-friendly and reduces power consumption, which is good for your pocket, right? Contrary to popular opinion, a large fan doesn’t necessarily consume more energy than a smaller unit, so don’t overlook a unit because of its size. Check the rating on the manufacturer’s specifications first.</span></p><h4 data-dcnode-id="497" id="humidity-sensor"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Humidity Sensor</span></strong></h4><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Bathroom extractor fans that feature built-in humidistat sensors detect moisture in the air. Once the humidity level in the bathroom reaches a certain threshold, the extractor fan automatically turns on or off, leaving the room free of condensation and odour. It saves you from manually flicking the switch and is suitable for households where family members forget to turn on the fan. </span></p><h4 data-dcnode-id="492" id="back-draught-shutters-needed-in-windy-locations"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Back Draught Shutters (Needed In Windy Locations)</span></strong></h4><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">A back draught shutter helps prevent random gusts of cold wind from blowing back through the fan and into the bathroom. If the unit you bought doesn’t have a shutter, simply buy one separately and have it installed in the ventilation duct.</span></p><h4 data-dcnode-id="487" id="over-run-timer"><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Over-run Timer</span></strong></h4><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">The over-run timer keeps the fan running long after you have turned it off to ensure all the damp air is eliminated. The settings for the over-run timer are usually configured during installation, and the time can range from 30 seconds to 30 minutes. Power consumption is low and on average the fan is likely to make use of around 8 watts. </span></p></div></div></article></main></div><div class="widget-area sidebar is-right-sidebar grid-25 tablet-grid-25 grid-parent" data-dcnode-id="478" id="right-sidebar"><div class="inside-right-sidebar" data-dcnode-id="479"></div></div></div><div class="post_block_wrap related_block_wrap clear" data-dcnode-id="280"><span data-dcnode-id="476" instrument_node=""> </
