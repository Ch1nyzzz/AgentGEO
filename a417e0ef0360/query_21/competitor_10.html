</span><span class="print-link" data-dcnode-id="1250"><span class="print_pdf" data-dcnode-id="1251"><a class="print-pdf" data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americangeosciences.org/printpdf/3073742" onclick="window.open(this.href); return false" rel="nofollow" title="Display a PDF version of this page."><img alt="PDF version" class="print-icon print-icon-margin image-style-none" data-dcnode-id="1254" height="16px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americangeosciences.org/sites/all/modules/print/print_pdf/icons/pdf_icon.png&amp;raw" title="PDF version" typeof="foaf:Image" width="16px"><span data-dcnode-id="1253" instrument_node="">PDF version</span></a></span></span><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-full" data-dcnode-id="251"><div class="field-items" data-dcnode-id="252"><div class="field-item even" data-dcnode-id="253" property="content:encoded"><h3 data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Our Future: Geosciences Supporting a Thriving Society in a Changing&nbsp;World</span></h3><span data-dcnode-id="1247" instrument_node="">
</span><div data-dcnode-id="1239" style="float: left; padding-right: 7px"><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americangeosciences.org/sites/default/files/CriticalNeeds2020.pdf"><img data-dcnode-id="1246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americangeosciences.org/sites/default/files/CN2020_GeosciSupports_Cover_792t.png&amp;raw" style="width: 100px; height: 129px;"></a><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1241"><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americangeosciences.org/sites/default/files/CriticalNeeds2020.pdf"><span data-dcnode-id="1243" instrument_node="">Download PDF</span></a></p><span data-dcnode-id="1240" instrument_node="">
</span></div><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">The geosciences—earth, atmospheric, and ocean sciences—are critical to ensuring a thriving society and economy by providing the raw materials and expertise necessary for the production and resilience of food, water, energy, and infrastructure. Economic and population growth, climate change, and the creation of new technologies are continuing to increase the demand for these resources, requiring a corresponding advancement in geoscience capacity to meet these needs. By ensuring we understand how people and the planet interact, the geosciences inform solutions to growing environmental, health, and safety challenges.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">The geosciences help us thrive in a changing world by:</span></p><span data-dcnode-id="1232" instrument_node="">
</span><ul data-dcnode-id="1178"><li data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">Informing </span><em data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">climate change</span></em><span data-dcnode-id="1228" instrument_node=""> mitigation and adaptation strategies that support continued economic and societal well-being</span></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1221"><span data-dcnode-id="1225" instrument_node="">Ensuring sufficient supplies of clean </span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">water </span></em><span data-dcnode-id="1222" instrument_node="">for a growing population</span></li><span data-dcnode-id="1220" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1219" instrument_node="">Developing sustainable </span><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">energy </span></em><span data-dcnode-id="1216" instrument_node="">to power the nation</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">Building resiliency to </span><em data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">natural hazards</span></em><span data-dcnode-id="1210" instrument_node=""> to reduce human and economic harm</span></li><span data-dcnode-id="1208" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node="">Managing healthy </span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">soils</span></em><span data-dcnode-id="1204" instrument_node=""> to meet the food security needs of humanity</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">Providing raw </span><em data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">mineral resources</span></em><span data-dcnode-id="1198" instrument_node=""> for modern society</span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1195" instrument_node="">Expanding opportunities and mitigating threats in the </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">ocean and coasts</span></em></li><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">Managing </span><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">waste </span></em><span data-dcnode-id="1187" instrument_node="">for a healthy society</span></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">Enabling these activities by increasing diversity, equity, and inclusion and meeting future geoscience </span><em data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">workforce and education</span></em><span data-dcnode-id="1181" instrument_node=""> needs</span></li><span data-dcnode-id="1179" instrument_node="">
</span></ul><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Although we highlight nine critical issues, they are interwoven with the other physical, chemical, biological, and human components of the earth system, sometimes creating complex feedbacks. In our changing world it is crucial to understand when, where, and how the critical issues detailed in this document intersect with one another and with other policy areas. Considering these critical issues and their convergences in decision-making will lead to positive impacts on economic growth and a thriving society.</span></p><span data-dcnode-id="1175" instrument_node="">

</span><h3 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Examples of Critical Needs and Geoscience</span></h3><span data-dcnode-id="488" instrument_node="">
</span><ol data-dcnode-id="403"><li data-dcnode-id="484"><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Climate Change + Resilience, Adaptation, &amp; Sustainability:</span></strong><span data-dcnode-id="485" instrument_node=""> Climate change mitigation involves taking actions to reduce the amount of carbon dioxide in the atmosphere, thus reducing risks associated with a changing climate. Adaptation helps society and natural systems to deal with consequences of climate change. Managing risks from climate impacts protects communities and ecosystems and strengthens the resilience of the economy.</span></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="479"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Water + High Quality Geospatial Data and Maps:</span></strong><span data-dcnode-id="480" instrument_node=""> Understanding the distribution of rock units and their geologic, chemical, and physical properties benefits the water resources community. Knowledge of which units have high, low, or no porosity; fracture vs. inter-granular porosity, etc., is essential in assessing groundwater hydrology.</span></li><span data-dcnode-id="478" instrument_node="">
</span><li data-dcnode-id="474"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Energy + Technology &amp; Engineering:</span></strong><span data-dcnode-id="475" instrument_node=""> Innovative technology and engineering is essential to understanding alternative exploration scenarios for energy resources.</span></li><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="452"><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Natural Hazards + Infrastructure:</span></strong><span data-dcnode-id="470" instrument_node=""> Levee, floodwall and dam failures can be anticipated and avoided with proper assessments.</span><br data-dcnode-id="469"><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">2020</span></strong><span data-dcnode-id="466" instrument_node="">: Edenville Dam</span><br data-dcnode-id="465"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">2017</span></strong><span data-dcnode-id="462" instrument_node="">: Oroville Dam</span><br data-dcnode-id="461"><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">2005</span></strong><span data-dcnode-id="458" instrument_node="">: New Orleans Levees and Floodwalls</span><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">
		​</span><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">1977</span></strong><span data-dcnode-id="453" instrument_node="">: Laurel Run Dam</span></li><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="447"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Natural Hazards + High Quality Geospatial Data and Maps</span></strong><span data-dcnode-id="448" instrument_node="">: High quality mapping of bedrock and surficial materials is essential to understanding processes that involve the potential for natural hazards. Examples include mapping active faults or the relative stability of slope materials that could lead to landslide or produce slow mass-movement hazards.</span></li><span data-dcnode-id="446" instrument_node="">
</span><li data-dcnode-id="442"><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Soils + Global Change</span></strong><span data-dcnode-id="443" instrument_node="">: Global changes in temperature, precipitation, and nutrients will impact soils and agriculture in the United States.</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="437"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Mineral Resources + Technology &amp; Engineering</span></strong><span data-dcnode-id="438" instrument_node="">: Mineral resources provide critical components for items that society relies on every day such as cell phones, batteries, and cars. Technology and engineering help geoscientists understand the extent and accessibility of the nation’s mineral resources.</span></li><span data-dcnode-id="436" instrument_node="">
</span><li data-dcnode-id="426"><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Oceans &amp; Coasts + Resilience, Adaptation, &amp; Sustainability</span></strong><span data-dcnode-id="433" instrument_node="">: Coastal cities across the U.S. are becoming more sustainable and resilient to disasters such as coastal flooding and hurricanes through adaptation informed by geoscience research.</span><br data-dcnode-id="432"><span data-dcnode-id="431" instrument_node="">
		Miami</span><br data-dcnode-id="430"><span data-dcnode-id="429" instrument_node="">
		Boston</span><br data-dcnode-id="428"><span data-dcnode-id="427" instrument_node="">
		New York</span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="415"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Oceans &amp; Coasts + Infrastructure:</span></strong><span data-dcnode-id="422" instrument_node=""> Ports are an important economic driver in coastal areas that create American jobs and help transfer goods to communities across the nation. Ports also serve as significant resources for national defense and emergency preparedness.</span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">
		Norfolk</span><br data-dcnode-id="419"><span data-dcnode-id="418" instrument_node="">
		Los Angeles</span><br data-dcnode-id="417"><span data-dcnode-id="416" instrument_node="">
		Newark/New York</span></li><span data-dcnode-id="414" instrument_node="">
</span><li data-dcnode-id="410"><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Waste Disposal + Public Health:</span></strong><span data-dcnode-id="411" instrument_node=""> Poor waste handling and disposal can lead to environmental pollution and cause diseases in animals and humans. •2008: Kingston Coal Slurry Spill •2005: Hurricane Katrina •1970s: Agriculture Street Landfill</span></li><span data-dcnode-id="409" instrument_node="">
</span><li data-dcnode-id="405"><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Workforce + Thriving Economy:</span></strong><span data-dcnode-id="406" instrument_node=""> A strong geoscience workforce can help create a thriving society by sharing their knowledge with the public and helping people to understand Earth’s processes. A workforce made of people from diverse backgrounds is best positioned to respond to our Nation’s needs, including ensuring a society safe from changing hazards.</span></li><span data-dcnode-id="404" instrument_node="">
</span></ol><div class="clearfix" data-dcnode-id="345"><span data-dcnode-id="402" instrument_node="">
