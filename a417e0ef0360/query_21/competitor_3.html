ns of the older adult, even when there may not be an immediate solution available (</span><a class="workspace-trigger" data-dcnode-id="3692" href="#bib0046" name="bbib0046"><span data-dcnode-id="3693" instrument_node="">Lim&nbsp;et&nbsp;al,&nbsp;2020</span></a><span data-dcnode-id="3691" instrument_node="">).</span></p></section><section data-dcnode-id="3678" id="sec0031"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3683" id="cesectitle0034"><span data-dcnode-id="3688" instrument_node="">8.3</span><span data-dcnode-id="3686" instrument_node="">. </span><span data-dcnode-id="3684" instrument_node="">Contingency for emergencies</span></h3><p data-dcnode-id="3681" id="para0089"><span data-dcnode-id="3682" instrument_node="">A large proportion of older adults are likely to live alone. Providing contingencies for emergencies such as falls, injuries or a sudden worsening of their medical status in the form of buzzers or alarms, emergency contact numbers and ambulance services is recommended. Early and rapid response to the medical emergency in the older adult would reduce rather than increase the burden on the health care system.</span></p><p data-dcnode-id="3679" id="para0090"><span data-dcnode-id="3680" instrument_node="">Some communities have come up with creative solutions such as hanging a red cloth from the window to communicate an emergency.</span></p></section><section data-dcnode-id="3666" id="sec0032"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3672" id="cesectitle0035"><span data-dcnode-id="3677" instrument_node="">8.4</span><span data-dcnode-id="3675" instrument_node="">. </span><span data-dcnode-id="3673" instrument_node="">Food security</span></h3><p data-dcnode-id="3667" id="para0091"><span data-dcnode-id="3671" instrument_node="">The door to door delivery of food, fuel, groceries and other essential consumables using community outreach services may maintain nutrition and other basic needs during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="3669" href="#bib0030" name="bbib0030"><span data-dcnode-id="3670" instrument_node="">Fernandes&nbsp;et&nbsp;al,&nbsp;2018</span></a><span data-dcnode-id="3668" instrument_node="">).</span></p></section><section data-dcnode-id="3650" id="sec0033"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3660" id="cesectitle0036"><span data-dcnode-id="3665" instrument_node="">8.5</span><span data-dcnode-id="3663" instrument_node="">. </span><span data-dcnode-id="3661" instrument_node="">Social welfare</span></h3><p data-dcnode-id="3658" id="para0092"><span data-dcnode-id="3659" instrument_node="">Efforts must be made to ensure that pensions and other social security benefits are delivered uninterrupted to older adults, for many of whom, these may be the only source of sustenance.</span></p><p data-dcnode-id="3656" id="para0093"><span data-dcnode-id="3657" instrument_node="">Where older adults are unable to avail aid due to the lack of documentation, a temporary relaxation of rules may ensure welfare delivery (with due precaution against diversion and stock piling).</span></p><p data-dcnode-id="3651" id="para0094"><span data-dcnode-id="3655" instrument_node="">In some places, older adults have been threatened with eviction from their residence due to financial constraints. Social intercession and mediation may be required for those at risk in such ways (</span><a class="workspace-trigger" data-dcnode-id="3653" href="#bib0019" name="bbib0019"><span data-dcnode-id="3654" instrument_node="">CDC,&nbsp;2020</span></a><span data-dcnode-id="3652" instrument_node="">).</span></p></section><section data-dcnode-id="3633" id="sec0034"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3644" id="cesectitle0037"><span data-dcnode-id="3649" instrument_node="">8.6</span><span data-dcnode-id="3647" instrument_node="">. </span><span data-dcnode-id="3645" instrument_node="">Repatriation of older migrants and travellers</span></h3><p data-dcnode-id="3639" id="para0095"><span data-dcnode-id="3643" instrument_node="">Several countries are undertaking the repatriation of citizens trapped overseas due to the lockdown and travel restrictions. Arrangements are being made for chartered flights and ships to bring overseas migrants to India. Older adults and other vulnerable groups have been allotted high priority for repatriation (</span><a class="workspace-trigger" data-dcnode-id="3641" href="#bib0066" name="bbib0066"><span data-dcnode-id="3642" instrument_node="">UN&nbsp;News,&nbsp;2020</span></a><span data-dcnode-id="3640" instrument_node="">).</span></p><p data-dcnode-id="3634" id="para0096"><span data-dcnode-id="3638" instrument_node="">Similar reintegration efforts are suggested within countries too, for those trapped away from their place of residence in socially unstable conditions. It is recommended that shelter in place guidelines be interpreted in context of the social environment and security of the older adult. Pandemic control must not come at the cost of leaving vulnerable population groups homeless and starving (</span><a class="workspace-trigger" data-dcnode-id="3636" href="#bib0066" name="bbib0066"><span data-dcnode-id="3637" instrument_node="">UN&nbsp;News,&nbsp;2020</span></a><span data-dcnode-id="3635" instrument_node="">).</span></p></section><section data-dcnode-id="3614" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3627" id="cesectitle0038"><span data-dcnode-id="3632" instrument_node="">8.7</span><span data-dcnode-id="3630" instrument_node="">. </span><span data-dcnode-id="3628" instrument_node="">Helplines</span></h3><p data-dcnode-id="3622" id="para0097"><span data-dcnode-id="3626" instrument_node="">Physical distancing and shelter in place directives place older adults at risk of loneliness, isolation, anxiety, depression, cognitive decline, frailty and abuse. Cessation of home visits by Adult Protective Services (APS) such as in the USA places the older adult in a vulnerable position (</span><a class="workspace-trigger" data-dcnode-id="3624" href="#bib0055" name="bbib0055"><span data-dcnode-id="3625" instrument_node="">NAPSA,&nbsp;2020</span></a><span data-dcnode-id="3623" instrument_node="">).</span></p><p data-dcnode-id="3620" id="para0098"><span data-dcnode-id="3621" instrument_node="">Elder abuse is a key area of intervention. Helplines by healthcare, welfare organizations and social services may provide older adults a safe way to report abuse and seek safety and legal aid. These services may be integrated with APS where available.</span></p><p data-dcnode-id="3615" id="para0099"><span data-dcnode-id="3619" instrument_node="">The availability of helplines would enable older adults to reach out for support in times of distress. Helplines should also have the provision to connect older adults to emergency medical, legal and/or social care as required in cases of risk of harm to self or others (</span><a class="workspace-trigger" data-dcnode-id="3617" href="#bib0037" name="bbib0037"><span data-dcnode-id="3618" instrument_node="">HelpAge&nbsp;India,&nbsp;2020</span></a><span data-dcnode-id="3616" instrument_node="">).</span></p></section><section data-dcnode-id="3602" id="sec0036"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3608" id="cesectitle0039"><span data-dcnode-id="3613" instrument_node="">8.8</span><span data-dcnode-id="3611" instrument_node="">. </span><span data-dcnode-id="3609" instrument_node="">Digital literacy</span></h3><p data-dcnode-id="3603" id="para0100"><span data-dcnode-id="3607" instrument_node="">Provision of simple written instructions and/or recorded messages may help older adults navigate the transition to digitization of services during the pandemic. Studies have shown that an integrated approach to digital literacy – using support staff and education material works best in improving digital literacy in older adults (</span><a class="workspace-trigger" data-dcnode-id="3605" href="#bib0005" name="bbib0005"><span data-dcnode-id="3606" instrument_node="">Agewell&nbsp;Foundation,&nbsp;2020</span></a><span data-dcnode-id="3604" instrument_node="">).</span></p></section><section data-dcnode-id="3590" id="sec0037"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3596" id="cesectitle0040"><span data-dcnode-id="3601" instrument_node="">8.9</span><span data-dcnode-id="3599" instrument_node="">. </span><span data-dcnode-id="3597" instrument_node="">Virtual communication</span></h3><p data-dcnode-id="3591" id="para0101"><span data-dcnode-id="3595" instrument_node="">Frequent phone and video calls by friends, family members and case workers to check in on the older adult would go a long way towards mitigating isolation and feelings of disconnectedness. It is recommended that community centres and day care centres facilitate digital services where feasible rather than suspending care altogether. Older adults may find it harder to make the transition to digital services and require handholding. However, channels for interaction, once established, may be quite fulfilling for the older adult (</span><a class="workspace-trigger" data-dcnode-id="3593" href="#bib0024" name="bbib0024"><span data-dcnode-id="3594" instrument_node="">Conger&nbsp;and Griffith,&nbsp;2020</span></a><span data-dcnode-id="3592" instrument_node="">).</span></p></section><section data-dcnode-id="3578" id="sec0038"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3584" id="cesectitle0041"><span data-dcnode-id="3589" instrument_node="">8.10</span><span data-dcnode-id="3587" instrument_node="">. </span><span data-dcnode-id="3585" instrument_node="">Discussion of care directives</span></h3><p data-dcnode-id="3579" id="para0102"><span data-dcnode-id="3583" instrument_node="">Older adults are aware of and often worry about their increased susceptibility to the coronavirus infection. A discussion of advance care directives including do not resuscitate protocols would ensure that the older adult maintain agency in illness (</span><a class="workspace-trigger" data-dcnode-id="3581" href="#bib0065" name="bbib0065"><span data-dcnode-id="3582" instrument_node="">U.S.&nbsp;Department&nbsp;of Health and Human Services, 2020</span></a><span data-dcnode-id="3580" instrument_node="">). End of life care and COVID-19 protocols to be followed for their interment must be discussed with the ill in a collaborative manner.</span></p></section><section data-dcnode-id="3566" id="sec0039"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3572" id="cesectitle0042"><span data-dcnode-id="3577" instrument_node="">8.11</span><span data-dcnode-id="3575" instrument_node="">. </span><span data-dcnode-id="3573" instrument_node="">Addressal of cognitive impairment (including dementia)</span></h3><p data-dcnode-id="3567" id="para0103"><span data-dcnode-id="3571" instrument_node="">Older adults with delirium, major and minor neurocognitive disorders are vulnerable to deterioration due to the deprivation of environmental stimuli. There have been preliminary reports of a worsening of behavioural and psychological symptoms of dementia due to physical restrictions and under-stimulation. Providing serial reorientation, visual and auditory aids, tactile stimulation, structuring their daily routine and incorporating cognitively stimulating material (art, music, aromatherapy, puzzles and games) ensures home based addressal of cognitive deficits (</span><a class="workspace-trigger" data-dcnode-id="3569" href="#bib0077" name="bbib0077"><span data-dcnode-id="3570" instrument_node="">Wang&nbsp;et&nbsp;al,&nbsp;2020</span></a><span data-dcnode-id="3568" instrument_node="">).</span></p></section><section data-dcnode-id="3554" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3560" id="cesectitle0043"><span data-dcnode-id="3565" instrument_node="">8.12</span><span data-dcnode-id="3563" instrument_node="">. </span><span data-dcnode-id="3561" instrument_node="">Long term care facilities (institutionalization)</span></h3><p data-dcnode-id="3555" id="para0104"><span data-dcnode-id="3559" instrument_node="">Old age homes, residential centres, nursing homes, palliative care and other long stay facilities for older adults often have large numbers of high risk older adults. Close contact between inmates may lead rapid spread of infection (as reported in some facilities in the USA). Care must be taken to ensure physical distancing between inmates, without causing social isolation. Where visits from friends and family are discouraged, facilities must come up with alternate ways to ensure social contact such as video conference. Older adults must have access to masks and sanitation in long term care facilities. A higher index of suspicion and lower threshold for cases is recommended (Preparing for COVID-19 </span><a class="workspace-trigger" data-dcnode-id="3557" href="#bib0019" name="bbib0019"><span data-dcnode-id="3558" instrument_node="">CDC,&nbsp;2020</span></a><span data-dcnode-id="3556" instrument_node="">).</span></p></section><section data-dcnode-id="3542" id="sec0041"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3548" id="cesectitle0044"><span data-dcnode-id="3553" instrument_node="">8.13</span><span data-dcnode-id="3551" instrument_node="">. </span><span data-dcnode-id="3549" instrument_node="">Positive health campaigns</span></h3><p data-dcnode-id="3543" id="para0105"><span data-dcnode-id="3547" instrument_node="">Simple home based measures that older adults may take up at home to ensure positive health and wellbeing (such as eating a nutritious diet, sleep hygiene, physical exercise, journaling, meditation and relaxation techniques) may be discussed through information, education and communication (IEC) campaigns on media platforms (</span><a class="workspace-trigger" data-dcnode-id="3545" href="#bib0038" name="bbib0038"><span data-dcnode-id="3546" instrument_node="">Home&nbsp;Care Assistance,&nbsp;2020</span></a><span data-dcnode-id="3544" instrument_node="">).</span></p></section><section data-dcnode-id="3528" id="sec0042"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3536" id="cesectitle0045"><span data-dcnode-id="3541" instrument_node="">8.14</span><span data-dcnode-id="3539" instrument_node="">. </span><span data-dcnode-id="3537" instrument_node="">Addressal of diversity</span></h3><p data-dcnode-id="3534" id="para0106"><span data-dcnode-id="3535" instrument_node="">Older adults do not form a homogenous group and are subject to considerable diversity. The global response to the COVID-19 pandemic has not taken into account the diversity in ageing while issuing guidance and advice (COVID-19 Response, 2020).</span></p><p data-dcnode-id="3529" id="para0107"><span data-dcnode-id="3533" instrument_node="">Gerodiversity is the multicultural approach to issues of aging. This approach provides a theoretical foundation for the medical and psychological treatment of older adults within an ecological context that includes their cultural identity and heritage, social environment, community, family system, and significant relationships). Gerodiversity encompasses a social justice framework, which considers the social and historical dynamics of privilege and inequality (</span><a class="workspace-trigger" data-dcnode-id="3531" href="#bib0040" name="bbib0040"><span data-dcnode-id="3532" instrument_node="">Iwasaki&nbsp;et&nbsp;al,&nbsp;2009</span></a><span data-dcnode-id="3530" instrument_node="">). Protective, preventive and care strategies take into account the diversity in ageing and the varying needs of older adults rather than provide a one size fits all directive.</span></p></section><section data-dcnode-id="3519" id="sec0043"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3522" id="cesectitle0046"><span data-dcnode-id="3527" instrument_node="">8.15</span><span data-dcnode-id="3525" instrument_node="">. </span><span data-dcnode-id="3523" instrument_node="">Opportunities as stake-holders</span></h3><p data-dcnode-id="3520" id="para0108"><span data-dcnode-id="3521" instrument_node="">It is recommended that older adults be stakeholders in policy making during the pandemic, particularly in decisions that impinge on their health and wellbeing. This would enable task forces and administrative bodies to benefit from the experiences and wisdom of older adults in the community. Inclusion in public health policy would ensure that older adults retain agency during the pandemic rather than being recipients of care from a paternalistic authority.</span></p></section><section data-dcnode-id="3507" id="sec0044"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3513" id="cesectitle0047"><span data-dcnode-id="3518" instrument_node="">8.16</span><span data-dcnode-id="3516" instrument_node="">. </span><span data-dcnode-id="3514" instrument_node="">Ethics and COVID-19</span></h3><p data-dcnode-id="3508" id="para0109"><span data-dcnode-id="3512" instrument_node="">Finally, COVID-19 has produced a flurry of research and literature (including ours). A data driven approach to health care is central to the response to novel coronavirus. However, there has been concern about patient privacy being breached during contact tracing. The scientific imperative should not override bioethical principles. Respect for consent (or assent, as appropriate) in vulnerable populations must be maintained (</span><a class="workspace-trigger" data-dcnode-id="3510" href="#bib0066" name="bbib0066"><span data-dcnode-id="3511" instrument_node="">UN&nbsp;News,&nbsp;2020</span></a><span data-dcnode-id="3509" instrument_node="">)</span></p></section></section><section data-dcnode-id="3495" id="sec0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3500" id="cesectitle0048"><span data-dcnode-id="3505" instrument_node="">9</span><span data-dcnode-id="3503" instrument_node="">. </span><span data-dcnode-id="3501" instrument_node="">Conclusion</span></h2><p data-dcnode-id="3498" id="para0110"><span data-dcnode-id="3499" instrument_node="">The world has endured seven months of the novel coronavirus pandemic (COVID-19). During this period, older adults face diverse, interrelated risks to their health and welfare due to direct (biological) and indirect (biological, psychological and social) factors. Some of these such as ageism and sexism existed even prior to the pandemic. Others such as an increased risk of morbidity and mortality, and restricted access to essential services have arisen in the context of the pandemic. These risks appear likely to operate even after the world emerges from the pandemic. Marginalization of older adults appears to be the final common pathway through which these factors operate.</span></p><p data-dcnode-id="3496" id="para0111"><span data-dcnode-id="3497" instrument_node="">Based upon this, the authors recommend specific and targeted interventions, which may be delivered through the existing health care system such as shortening the pathway to care for older adults, provision of essential care through primary care services, door delivery of medicines and other essentials through community health workers, prioritization of older adults among repatriation of migrants and refugees and continued provision of social security (including food security to the vulnerable and underprivileged). This may be integrated with the existing public health measures in the context of the pandemic such as provision of health information to older adults, helping them transition onto digital service usage with guided instructions and formation of advance care directives. Special circumstances such as older adults with cognitive impairment and those in long term care facilities are particularly vulnerable to COVID-19 and merit a higher index of suspicion and testing. These measures are most effective when integrated into existing services to reduce resource burden, particularly in lower and middle income countries (LMIC) and aligned to the WHO Decade of Healthy Ageing 2020-2030 and to the UN Agenda for Sustainable Development 2030. Older adults must be included as stakeholders in their health, with addressal of diversity in ageing and emphasis on resilience. This advocacy review might help establish a framework for the same and encourage further research.</span></p></section></div><section data-dcnode-id="3489" id="coi0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3492" id="cesectitle0050"><span data-dcnode-id="3493" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="3490" id="para0114"><span data-dcnode-id="3491" instrument_node="">None.</span></p></section><section data-dcnode-id="3484" id="ack0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3487" id="cesectitle0051"><span data-dcnode-id="3488" instrument_node="">Acknowledgement</span></h2><p data-dcnode-id="3485" id="para0115"><span data-dcnode-id="3486" instrument_node="">None</span></p></section><div class="Appendices" data-dcnode-id="3464"><section data-dcnode-id="3465" id="sec0048"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3478" id="cesectitle9002"><span data-dcnode-id="3483" instrument_node="">Appendix</span><span data-dcnode-id="3481" instrument_node="">. </span><span data-dcnode-id="3479" instrument_node="">Supplementary materials</span></h2><p data-dcnode-id="3466" id="para0113a"><span class="display" data-dcnode-id="3467"><span class="e-component e-component-mmc1" data-dcnode-id="3468" id="ecom0001"><span class="article-attachment" data-dcnode-id="3469"><a class="icon-link" data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0165178120324811-mmc1.xml" rel="noreferrer noopener" target="_bl nt_node="">Accessibility to SARS-CoV-2 swab test during the Covid-19 pandemic: Did age make the difference?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">2021, Health Policy</span></div></div><div class="buttons" data-dcnode-id="350"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="351" type="button"><span class="button-link-text" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="352" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="353"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="339"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="340" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="341"><p data-dcnode-id="348" id="spara010"><span data-dcnode-id="349" instrument_node="">Although COVID-19 affects older people more severely, health policies during the first wave of the pandemic often prioritized younger individuals. We investigated whether age had influenced the access to a diagnostic test for SARS-CoV-2 infection and whether clinical complexity and healthcare resources availability could have impacted such differences.</span></p><p data-dcnode-id="346" id="spara011"><span data-dcnode-id="347" instrument_node="">This work included 126,741 Italian participants in the EPICOVID19 web-based survey, who reported having had contacts with known/suspected COVID-19 cases (epidemiological criterion) and/or COVID-19-like signs/symptoms (clinical criterion) from February to June 2020. Data on sociodemographic, medical history and access to SARS-CoV-2 nasopharyngeal swab (NPS) were collected. Logistic regressions estimated the probability of accessing NPS as a function of age and the possible modifying effect of chronic diseases’ number and residential areas in such association.</span></p><p data-dcnode-id="344" id="spara012"><span data-dcnode-id="345" instrument_node="">A total of 6136 (4.8%) participants had undergone an NPS. Older participants had lower NPS frequencies than the younger ones when reporting epidemiological (14.9% vs. 8.8%) or both epidemiological and clinical criteria (17.5% vs. 13.7%). After adjustment for potential confounders, including epidemiological and clinical criteria, the chance of NPS access decreased by 29% (OR=0.71, 95%CI:0.63–0.79) in older vs. younger individuals. Such disparity was accentuated in areas with greater healthcare resources.</span></p><p data-dcnode-id="342" id="spara013"><span data-dcnode-id="343" instrument_node="">In conclusion, in the first wave of the pandemic, age may have affected the access to COVID-19 diagnostic testing, disadvantaging older people.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="327"><div class="sub-heading" data-dcnode-id="332"><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0749069021000355" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="336" id="citing-articles-article1-title"><span data-dcnode-id="337" instrument_node="">Coronavirus Disease 2019</span></h3></a><div class="article-source ellipsis" data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">2021, Clinics in Geriatric Medicine</span></div></div><div class="buttons" data-dcnode-id="331"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="328"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="329" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="330"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="316"><div class="sub-heading" data-dcnode-id="321"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2666756821002014" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="325" id="citing-articles-article2-title"><span data-dcnode-id="326" instrument_node="">Not a disease: a global call for action urging revision of the ICD-11 classification of old age</span></h3></a><div class="article-source ellipsis" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">2021, The Lancet Healthy Longevity</span></div></div><div class="buttons" data-dcnode-id="320"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="317"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="318" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="319"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="290"><div class="sub-heading" data-dcnode-id="310"><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2667296021000926" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="314" id="citing-articles-article3-title"><span data-dcnode-id="315" instrument_node="">Report of the Academy of Consultation-Liaison Psychiatry Task Force on Lessons Learned From the COVID-19 Pandemic: Executive Summary</span></h3></a><div class="article-source ellipsis" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">2021, Journal of the Academy of Consultation-Liaison Psychiatry</span></div></div><div class="buttons" data-dcnode-id="304"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="305" type="button"><span class="button-link-text" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="306" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="307"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="291"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="292" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="293"><p data-dcnode-id="302" id="abspara0010"><span data-dcnode-id="303" instrument_node="">The COVID-19 pandemic forced consultation-liaison psychiatrists to adapt to unprecedented circumstances. The Academy of Consultation-Liaison Psychiatry (ACLP) recognized the need and opportunity to assess its response and convened a task force in mid-2020 to review the lessons learned from the initial experience of the COVID-19 pandemic.</span></p><p data-dcnode-id="300" id="abspara0010a"><span data-dcnode-id="301" instrument_node="">The aim of the study was to summarize experience and make recommendations to the ACLP Board of Directors about potential ACLP directions related to current and future pandemic response.</span></p><p data-dcnode-id="298" id="abspara0011a"><span data-dcnode-id="299" instrument_node="">In August–November 2020, the task force reviewed local experiences, ACLP list-serv contributions, and the published literature and generated recommendations for ACLP actions.</span></p><p data-dcnode-id="296" id="abspara0011e"><span data-dcnode-id="297" instrument_node="">Recommendations addressed telepsychiatry, hospital staff wellness, support for consultation-liaison psychiatrists, the need for additional research on psychiatric and neuropsychiatric aspects of COVID-19, and the ACLP's role in advocacy and dissemination of information. The task force report was submitted to the ACLP Board of Directors in November 2020.</span></p><p data-dcnode-id="294" id="abspara0011w"><span data-dcnode-id="295" instrument_node="">As the preeminent organization of consultation-liaison psychiatrists, the ACLP can implement actions related to pandemic awareness and preparedness for the benefit of consultation-liaison psychiatrists, other health care workers, patients, and the general population.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="279"><div class="sub-heading" data-dcnode-id="284"><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0714980821000453" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="288" id="citing-articles-article4-title"><span data-dcnode-id="289" instrument_node="">A SHARP Response: Developing COVID-19 Research Aims in Partnership with the Seniors Helping as Research Partners (SHARP) Group</span></h3></a><div class="article-source ellipsis" data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">2021, Canadian Journal on Aging</span></div></div><div class="buttons" data-dcnode-id="283"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="280"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="281" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="282"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="268"><div class="sub-heading" data-dcnode-id="273"><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3389/fpubh.2021.774675" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="277" id="citing-articles-artic
