</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0002&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abss0002&quot;><p id=&quot;spara002&quot;>The world has endured over six months of the Coronavirus disease 2019 (COVID-19). Older adults are at disproportionate risk of severe infection and mortality. They are also vulnerable to loneliness and social exclusion during the pandemic. Age and ageism both can act as significant risk factors during this pandemic, increasing the physical as well as psychosocial burden on the elderly. A review was performed in relation to the psychosocial vulnerabilities of the older adults during the pandemic, with insights from the similar biological disasters in the past. Besides the physiological risk, morbidities, polypharmacy and increased case fatality rates, various social factors like lack of security, loneliness, isolation, ageism, sexism, dependency, stigma, abuse and restriction to health care access were identified as crucial in pandemic situation. Frailty, cognitive and sensory impairments added to the burden. Marginalization and human rights deprivation emerged as a common pathway of suffering for the elderly during COVID-19. The implications of the emergent themes are discussed in light of psychosocial wellbeing and impact on the quality of life. The authors suggest potential recommendations to mitigate this marginalization on lines of the World Health Organization (WHO)’s concept of Healthy Ageing and the United Nations (U.N.) Sustainable Development Goals.</p></div></div></div>" data-dcnode-id="4953" lang="en" name="citation_abstract"><span data-dcnode-id="4952" instrument_node="">

class="PageDivider" data-dcnode-id="4440"></div><div class="Abstracts u-font-serif" data-dcnode-id="4402" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="4409" id="abs0001"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">Highlights</span></h2><div data-dcnode-id="4410" id="abss0001"><p data-dcnode-id="4411" id="spara001"></p><dl class="list" data-dcnode-id="4412"><dt class="list-label" data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4433"><p data-dcnode-id="4434" id="para0001"><span data-dcnode-id="4435" instrument_node="">Coronavirus disease 2019 (COVID-19) has emerged as a global health threat.</span></p></dd><dt class="list-label" data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4428"><p data-dcnode-id="4429" id="para0002"><span data-dcnode-id="4430" instrument_node="">Older adults form a vulnerable section both to the physiological risks of infection as well as to the psychosocial offshoots of distancing and lockdown.</span></p></dd><dt class="list-label" data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4423"><p data-dcnode-id="4424" id="para0003"><span data-dcnode-id="4425" instrument_node="">Loneliness, isolation, abuse, loss of autonomy, and restriction of health care access can accentuate their frailty and comorbidities.</span></p></dd><dt class="list-label" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4418"><p data-dcnode-id="4419" id="para0004"><span data-dcnode-id="4420" instrument_node="">The authors propose marginalization as the probable common pathway for human rights deprivation of older adults during the pandemic.</span></p></dd><dt class="list-label" data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4413"><p data-dcnode-id="4414" id="para0005"><span data-dcnode-id="4415" instrument_node="">Measures of mitigating these effects enabling Healthy Aging are discussed.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="4403" id="abs0002"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">Abstract</span></h2><div data-dcnode-id="4404" id="abss0002"><p data-dcnode-id="4405" id="spara002"><span data-dcnode-id="4406" instrument_node="">The world has endured over six months of the Coronavirus disease 2019 (COVID-19). Older adults are at disproportionate risk of severe infection and mortality. They are also vulnerable to loneliness and social exclusion during the pandemic. Age and ageism both can act as significant risk factors during this pandemic, increasing the physical as well as psychosocial burden on the elderly. A review was performed in relation to the psychosocial vulnerabilities of the older adults during the pandemic, with insights from the similar biological disasters in the past. Besides the physiological risk, morbidities, polypharmacy and increased case fatality rates, various social factors like lack of security, loneliness, isolation, ageism, sexism, dependency, stigma, abuse and restriction to health care access were identified as crucial in pandemic situation. Frailty, cognitive and sensory impairments added to the burden. Marginalization and human rights deprivation emerged as a common pathway of suffering for the elderly during COVID-19. The implications of the emergent themes are discussed in light of psychosocial wellbeing and impact on the quality of life. The authors suggest potential recommendations to mitigate this marginalization on lines of the World Health Organization (WHO)’s concept of Healthy Ageing and the United Nations (U.N.) Sustainable Development Goals.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4379" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4391"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0165178120315791"><svg class="icon icon-navigate-left" data-dcnode-id="4400" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4401"></path></svg><span class="button-alternative-text" data-dcnode-id="4393"><strong data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4380"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0165178120318977"><span class="button-alternative-text" data-dcnode-id="4384"><strong data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4387"><span data-dcnode-id="4388" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4382" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4383"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4354"><div class="keywords-section" data-dcnode-id="4355" id="keys0001"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4374" id="key0001"><span data-dcnode-id="4375" id="cetext0002"><span data-dcnode-id="4376" instrument_node="">COVID-19</span></span></div><div class="keyword" data-dcnode-id="4371" id="key0002"><span data-dcnode-id="4372" id="cetext0003"><span data-dcnode-id="4373" instrument_node="">Coronavirus</span></span></div><div class="keyword" data-dcnode-id="4368" id="key0003"><span data-dcnode-id="4369" id="cetext0004"><span data-dcnode-id="4370" instrument_node="">Old age</span></span></div><div class="keyword" data-dcnode-id="4365" id="key0004"><span data-dcnode-id="4366" id="cetext0005"><span data-dcnode-id="4367" instrument_node="">Advocacy</span></span></div><div class="keyword" data-dcnode-id="4362" id="key0005"><span data-dcnode-id="4363" id="cetext0006"><span data-dcnode-id="4364" instrument_node="">Marginalization</span></span></div><div class="keyword" data-dcnode-id="4359" id="key0006"><span data-dcnode-id="4360" id="cetext0007"><span data-dcnode-id="4361" instrument_node="">Human rights</span></span></div><div class="keyword" data-dcnode-id="4356" id="key0007"><span data-dcnode-id="4357" id="cetext0008"><span data-dcnode-id="4358" instrument_node="">Review</span></span></div></div></div><span data-dcnode-id="4353" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3463" id="body"><div data-dcnode-id="3494"><section data-dcnode-id="4310" id="sec0001"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4347" id="cesectitle0004"><span data-dcnode-id="4352" instrument_node="">1</span><span data-dcnode-id="4350" instrument_node="">. </span><span data-dcnode-id="4348" instrument_node="">Introduction</span></h2><p data-dcnode-id="4330" id="para0006"><span data-dcnode-id="4346" instrument_node="">The world is now seven months into the COVID-19 pandemic – first reported as an outbreak at Wuhan, China in December, 2019 (</span><a class="workspace-trigger" data-dcnode-id="4344" href="#bib0079" name="bbib0079"><span data-dcnode-id="4345" instrument_node="">World&nbsp;Health Organization,&nbsp;2020</span></a><span data-dcnode-id="4343" instrument_node="">). The WHO received reports of a cluster of cases of the infection from China on 31 December, 2020, declared a Public Health Emergency of International Concern (PHEIC) on 30 January, 2020 and recognized the infection as a pandemic on 11 March, 2020 (</span><a class="workspace-trigger" data-dcnode-id="4341" href="#bib0079" name="bbib0079"><span data-dcnode-id="4342" instrument_node="">WHO&nbsp;COVID-19 Situation Report 189, 27 July,&nbsp;2020</span></a><span data-dcnode-id="4340" instrument_node="">). In parallel, the first case of infection was reported in Kerala, India on 30 January, 2020, provisions of the Epidemic Diseases Act, 1897 invoked on 11 March, 2020 and a notified disaster announced on 14 March, 2020 (</span><a class="workspace-trigger" data-dcnode-id="4338" href="#bib0078" name="bbib0078"><span data-dcnode-id="4339" instrument_node="">WHO&nbsp;COVID-19 India Situation Report 26, 26 July 2020</span></a><span data-dcnode-id="4337" instrument_node="">). The pandemic has had and continues to have wide reaching consequences across the world. It is hypothesized that the changes in health related behaviours, relationships, education, work, travel and socialization emerging in response to this pandemic may last long after the coronavirus infection has run its course (</span><a class="workspace-trigger" data-dcnode-id="4335" href="#bib0058" name="bbib0058"><span data-dcnode-id="4336" instrument_node="">Scott,&nbsp;2020</span></a><span data-dcnode-id="4334" instrument_node="">). However, the impact of the pandemic on older adults (above 60 years of age) does not appear to have been adequately explored to date (</span><a class="workspace-trigger" data-dcnode-id="4332" href="#bib0078" name="bbib0078"><span data-dcnode-id="4333" instrument_node="">WHO,&nbsp;2020</span></a><span data-dcnode-id="4331" instrument_node="">).</span></p><p data-dcnode-id="4316" id="para0007"><span data-dcnode-id="4329" instrument_node="">SARS-CoV-2, the causative agent of the COVID-19 pandemic carries disproportionate risk for infection, disease, morbidity and mortality in older adults (</span><a class="workspace-trigger" data-dcnode-id="4327" href="#bib0078" name="bbib0078"><span data-dcnode-id="4328" instrument_node="">WHO,&nbsp;2020</span></a><span data-dcnode-id="4326" instrument_node="">). In addition to direct risks to older adults caused by their increased vulnerability – there are several latent or indirect risks to the health and wellbeing of older adults that emate from socio-cultural and demographic factors. There have been letters in the Lancet and the Journal of the American Geriatrics Society addressing the risks of isolating the elderly and elder abuse, respectively (</span><a class="workspace-trigger" data-dcnode-id="4324" href="#bib0009" name="bbib0009"><span data-dcnode-id="4325" instrument_node="">Armitage&nbsp;and Nellums,&nbsp;2020</span></a><span data-dcnode-id="4323" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4321" href="#bib0035" name="bbib0035"><span data-dcnode-id="4322" instrument_node="">Han&nbsp;and Mosqueda,&nbsp;2020</span></a><span data-dcnode-id="4320" instrument_node="">). The authors have not, however, in their review of literature, found a comprehensive addressal of the all the direct and indirect risks that older adults face due to the pandemic. A recent review by </span><a class="workspace-trigger" data-dcnode-id="4318" href="#bib0012" name="bbib0012"><span data-dcnode-id="4319" instrument_node="">Banerjee&nbsp;et&nbsp;al.&nbsp;(2020)</span></a><span data-dcnode-id="4317" instrument_node=""> warns about the multi-faceted physiological and psychosocial vulnerabilities of the elderly during the ongoing crisis and stresses on an integrated biopsychosocial care model for their wellbeing.</span></p><p data-dcnode-id="4311" id="para0008"><span data-dcnode-id="4315" instrument_node="">This advocacy review intends to be a thematic analysis and synthesis of both direct and indirect risks to older adults during the COVID-19 pandemic. Many of these risks appear to be unique to this age group. The authors hypothesize that there is a possible final common pathway linking these risk factors to adverse health outcomes in older adults – marginalization, as a consequence of ageism (</span><a class="workspace-trigger" data-dcnode-id="4313" href="#bib0018" name="bbib0018"><span data-dcnode-id="4314" instrument_node="">Carmen&nbsp;and Adrian,&nbsp;2012</span></a><span data-dcnode-id="4312" instrument_node="">). Subsequently community based, targeted intervention strategies to address this marginalization – based upon the WHO Global Strategy on Ageing and Health and aligned to the UN Sustainable Development Goals are suggested.</span></p></section><section data-dcnode-id="4219" id="sec0002"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4304" id="cesectitle0005"><span data-dcnode-id="4309" instrument_node="">2</span><span data-dcnode-id="4307" instrument_node="">. </span><span data-dcnode-id="4305" instrument_node="">Direct risks to older adults</span></h2><p data-dcnode-id="4302" id="para0009"><span data-dcnode-id="4303" instrument_node="">The most obvious risks to older adults during the pandemic emerge from the relationship between the agent, host and environment – between the virus, the health status of the older adult and the pathophysiological response to the infection.</span></p><section data-dcnode-id="4282" id="sec0003"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4296" id="cesectitle0006"><span data-dcnode-id="4301" instrument_node="">2.1</span><span data-dcnode-id="4299" instrument_node="">. </span><span data-dcnode-id="4297" instrument_node="">Morbidity</span></h3><p data-dcnode-id="4291" id="para0010"><span data-dcnode-id="4295" instrument_node="">Older adults are more likely to develop a symptomatic rather than an asymptomatic infection. Of those who develop a symptomatic infection – older adults are further, more likely to develop a moderate to severe infection than a mild infection. The percentage of infected individuals requiring hospitalization appears to rise sharply over the age of 50 years, Data based on cases reported from China noted that hospitalization was required in 4.25% of cases detected between 40 and 49 years, 8.16% between 50 and 59 years, 11.8 % between 60 and 69 years, 16.6% between 70 and 79 years and 18.4% above 80 years of age (</span><a class="workspace-trigger" data-dcnode-id="4293" href="#bib0072" name="bbib0072"><span data-dcnode-id="4294" instrument_node="">Verity&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4292" instrument_node="">).</span></p><p data-dcnode-id="4283" id="para0011"><span data-dcnode-id="4290" instrument_node="">A comparison study in china found that older adults are more likely than young and middle aged adults to have a Pneumonia Severity Index (PSI) of IV or V (indicating severe infection). They were more likely to have multiple lobar involvement on CT scan, have a lower percentage of lymphocytes in their differential count and higher C reactive protein (CRP) levels. They also appeared more likely to develop acute respiratory distress syndrome (ARDS), multi-organ dysfunction syndrome (MODS), require invasive mechanical ventilatory support and respond more rapidly to interferon therapy – though these differences did not reach statistical significance (</span><a class="workspace-trigger" data-dcnode-id="4288" href="#bib0048" name="bbib0048"><span data-dcnode-id="4289" instrument_node="">Liu&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4287" instrument_node="">). The risk for infection and disease is linked to impaired presentation of antigen by the NK lymphocytes to T and B lymphocytes due to the decline in immunocompetency with age. This is associated with an increased cytokine response to the infection – causing a widespread inflammatory response which leads to multi-organ dysfunction and respiratory failure (</span><a class="workspace-trigger" data-dcnode-id="4285" href="#bib0001" name="bbib0001"><span data-dcnode-id="4286" instrument_node="">Adhikari&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4284" instrument_node="">).</span></p></section><section data-dcnode-id="4259" id="sec0004"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4276" id="cesectitle0007"><span data-dcnode-id="4281" instrument_node="">2.2</span><span data-dcnode-id="4279" instrument_node="">. </span><span data-dcnode-id="4277" instrument_node="">Mortality</span></h3><p data-dcnode-id="4268" id="para0012"><span data-dcnode-id="4275" instrument_node="">An approach to modelling the severity of infection due to the novel (SARS-CoV-2) coronavirus (based on data from China) published in the Lancet estimated a case fatality ratio of 4.5 % in people over 60 years of age, compared to 1.4 % in people below 60 years of age. The case fatality ratio was the highest in those aged above 80 years – 13.4% of all cases detected (</span><a class="workspace-trigger" data-dcnode-id="4273" href="#bib0072" name="bbib0072"><span data-dcnode-id="4274" instrument_node="">Verity&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4272" instrument_node="">). This increased vulnerability of older adults has contributed to higher case and mortality rates in countries undergoing population ageing. In a statement by the WHO Regional Director, Europe, it was noted that 29 of the 30 with the largest proportion of older adults were member states of Europe (except Japan). 95% of the deaths in these countries occurred in adults over 60 years of age and 50 % of deaths in those over 60 years of age (</span><a class="workspace-trigger" data-dcnode-id="4270" href="#bib0087" name="bbib0087"><span data-dcnode-id="4271" instrument_node="">WHO Europe Statement on Older Adults in COVID-19, 2020</span></a><span data-dcnode-id="4269" instrument_node="">).</span></p><p data-dcnode-id="4260" id="para0013"><span data-dcnode-id="4267" instrument_node="">In India, 51.2 % of the mortality due to COVID-19 has been in people over 60 years of age, as reported by the Government of India on April 30, 2020 (</span><a class="workspace-trigger" data-dcnode-id="4265" href="#bib0027" name="bbib0027"><span data-dcnode-id="4266" instrument_node="">Diwanji,&nbsp;2020</span></a><span data-dcnode-id="4264" instrument_node="">). The risk for severe infection and mortality appear to be linked to stochastic age (reflecting underlying oxidative stress and epigenetic changes) rather than chronological age. Thus, frailty and mobility appear to mediate the relationship between infection and an adverse health outcome (</span><a class="workspace-trigger" data-dcnode-id="4262" href="#bib0013" name="bbib0013"><span data-dcnode-id="4263" instrument_node="">Begely,&nbsp;2020</span></a><span data-dcnode-id="4261" instrument_node="">)</span></p></section><section data-dcnode-id="4241" id="sec0005"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4253" id="cesectitle0008"><span data-dcnode-id="4258" instrument_node="">2.3</span><span data-dcnode-id="4256" instrument_node="">. </span><span data-dcnode-id="4254" instrument_node="">Comorbidities</span></h3><p data-dcnode-id="4242" id="para0014"><span data-dcnode-id="4252" instrument_node="">Among those infected, patients with co-morbidities are more likely to develop severe infection and mortality than those without co-morbidities (</span><a class="workspace-trigger" data-dcnode-id="4250" href="#bib0034" name="bbib0034"><span data-dcnode-id="4251" instrument_node="">Guan&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4249" instrument_node="">) Multi-morbidity increases with age. An epidemiological study in Scotland reported two or more chronic health conditions in 30.4% of adults between 45 and 64 years, 64.9% between 65 and 84 years and 80% above 85 years of age (</span><a class="workspace-trigger" data-dcnode-id="4247" href="#bib0026" name="bbib0026"><span data-dcnode-id="4248" instrument_node="">Divo&nbsp;et&nbsp;al.,&nbsp;2014</span></a><span data-dcnode-id="4246" instrument_node="">). Of cases reported from China, 25.1% of patients reported at least one co-morbid medical illness and 9.2% reported having two or more co-morbid medical illnesses. The mean age of patients with at least one co-morbidity was 60.8 years and with those with two or more co-morbidities was 66.2 years compared to the mean age of 48.9 years in the study population. Both groups had a poorer prognosis than those without co-morbidities with a hazard ratio of 1.79 and 2.59, respectively (</span><a class="workspace-trigger" data-dcnode-id="4244" href="#bib0033" name="bbib0033"><span data-dcnode-id="4245" instrument_node="">Giacomo&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4243" instrument_node="">).</span></p></section><section data-dcnode-id="4220" id="sec0006"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4235" id="cesectitle0009"><span data-dcnode-id="4240" instrument_node="">2.4</span><span data-dcnode-id="4238" instrument_node="">. </span><span data-dcnode-id="4236" instrument_node="">Adverse drug events</span></h3><p data-dcnode-id="4221" id="para0015"><span data-dcnode-id="4234" instrument_node="">Older adults are also more prone to adverse drug events as a consequence of exposure to pharmacotherapeutic agents used in the treatment of the novel coronavirus. This is partly due to pharmacokinetics with age leading to an increased drug half-life and reduced plasma clearance rates (</span><a class="workspace-trigger" data-dcnode-id="4232" href="#bib0062" name="bbib0062"><span data-dcnode-id="4233" instrument_node="">Sun&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4231" instrument_node="">). This risk is unclear (though non-negligible) and extend to several off label therapies which are under study including – chloroquine/hydroxychloroquine, lopinavir/ritonavir, amantadine, interferon and plasma therapy. A trial of chloroquine in Brazil has been halted prematurely due to concerns about cardiotoxicity (</span><a class="workspace-trigger" data-dcnode-id="4229" href="#bib0016" name="bbib0016"><span data-dcnode-id="4230" instrument_node="">Borba&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4228" instrument_node="">). Reported adverse drug effects in cases with off label therapies include – cardiotoxicity (including QTc prolongation and arrhythmia), renal, hepatic, visual and hearing impairment; and dermatitis (</span><a class="workspace-trigger" data-dcnode-id="4226" href="#bib0025" name="bbib0025"><span data-dcnode-id="4227" instrument_node="">Dimitrova,&nbsp;2020</span></a><span data-dcnode-id="4225" instrument_node="">). Open labelled studies also document the increased possibility of drug-drug interactions and cumulative toxicity, as seen with the concurrent administration of lopinavir and azithromycin (</span><a class="workspace-trigger" data-dcnode-id="4223" href="#bib0060" name="bbib0060"><span data-dcnode-id="4224" instrument_node="">Singh&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4222" instrument_node="">).</span></p></section></section><section data-dcnode-id="4200" id="sec0007"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4213" id="cesectitle0010"><span data-dcnode-id="4218" instrument_node="">3</span><span data-dcnode-id="4216" instrument_node="">. </span><span data-dcnode-id="4214" instrument_node="">Indirect risks to older adults</span></h2><p data-dcnode-id="4208" id="para0016"><span data-dcnode-id="4212" instrument_node="">While direct risks to older adults emerging from infection by the novel coronavirus in the COVID-19 pandemic are obvious and have been addressed, at least partially, by the public health response to the pandemic – there are several implicit risks that the pandemic carries for older adults (</span><a class="workspace-trigger" data-dcnode-id="4210" href="#bib0014" name="bbib0014"><span data-dcnode-id="4211" instrument_node="">Berg-Weger&nbsp;and Morley,&nbsp;2020</span></a><span data-dcnode-id="4209" instrument_node="">).</span></p><p data-dcnode-id="4203" id="para0017"><span data-dcnode-id="4207" instrument_node="">Some of these risks to their health and wellbeing have existed prior to the pandemic, such as ageism and impaired access to health care resources. Others, such as the more stringent curbs imposed by public health authorities on the movement of older adults and triage systems which place lower priority upon infected older adults – are novel to and unique to the pandemic (</span><a class="workspace-trigger" data-dcnode-id="4205" href="#bib0039" name="bbib0039"><span data-dcnode-id="4206" instrument_node="">Avenue,&nbsp;2020</span></a><span data-dcnode-id="4204" instrument_node="">).</span></p><p data-dcnode-id="4201" id="para0018"><span data-dcnode-id="4202" instrument_node="">Unlike direct risks to older adults, which have a predominantly biological focus, the indirect risks are a combination of biological, psychological and social factors. The authors describe the indirect factors in the following sections.</span></p></section><section data-dcnode-id="4024" id="sec0008"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4194" id="cesectitle0011"><span data-dcnode-id="4199" instrument_node="">4</span><span data-dcnode-id="4197" instrument_node="">. </span><span data-dcnode-id="4195" instrument_node="">Psychosocial factors</span></h2><section data-dcnode-id="4139" id="sec0009"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4188" id="cesectitle0012"><span data-dcnode-id="4193" instrument_node="">4.1</span><span data-dcnode-id="4191" instrument_node="">. </span><span data-dcnode-id="4189" instrument_node="">Ageism</span></h3><p data-dcnode-id="4183" id="para0019"><span data-dcnode-id="4187" instrument_node="">The WHO defines ageism as the stereotyping, prejudice and discrimination against people on the basis of their age. It goes on to note that ageism is the most socially normalized of all forms of discrimination – unlike sexism and racism (</span><a class="workspace-trigger" data-dcnode-id="4185" href="#bib0080" name="bbib0080"><span data-dcnode-id="4186" instrument_node="">WHO Report on Ageing and Health, 2015</span></a><span data-dcnode-id="4184" instrument_node="">).</span></p><p data-dcnode-id="4172" id="para0020"><span data-dcnode-id="4182" instrument_node="">The phenomenon of ageism is neither new nor surprising in the community. Older adults are stigmatized on the basis of their chronological age and negative stereotypes are attached to the physical, cognitive and emotional changes which occur with age. There is widespread structural exclusion from opportunities in education, employment, housing, transport, health care, social services and legislation. Illnesses, including mental health conditions and neurodegenerative diseases are often normalized, erroneously, as part of the ageing process. These ageist stereotypes, prejudice and discrimination are internalized by older adults and act as barriers in the pathways to care. Older adults are far less likely to involve in activism and advocacy for inclusivity and equal rights because of the implicit belief that they must sacrifice their wellbeing and “make way” for the younger generations to replace them (</span><a class="workspace-trigger" data-dcnode-id="4180" href="#bib0023" name="bbib0023"><span data-dcnode-id="4181" instrument_node="">Cohen,&nbsp;2001</span></a><span data-dcnode-id="4179" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4177" href="#bib0075" name="bbib0075"><span data-dcnode-id="4178" instrument_node="">Walsh&nbsp;et&nbsp;al.,&nbsp;2011</span></a><span data-dcnode-id="4176" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4174" href="#bib0028" name="bbib0028"><span data-dcnode-id="4175" instrument_node="">Donizzetti,&nbsp;2019</span></a><span data-dcnode-id="4173" instrument_node="">)</span></p><p data-dcnode-id="4161" id="para0021"><span data-dcnode-id="4171" instrument_node="">The COVID-19 pandemic, as with previous global health crises such as the bubonic plague, influenza, the world wars and economic depressions – has acted to further normalize ageism, ironically, right at the outset of the WHO Decade for Healthy Ageing (2020-2030) (</span><a class="workspace-trigger" data-dcnode-id="4169" href="#bib0049" name="bbib0049"><span data-dcnode-id="4170" instrument_node="">Lloyd-Sherlock&nbsp;et&nbsp;al.,&nbsp;2019</span></a><span data-dcnode-id="4168" instrument_node="">). The increased vulnerability of older adults to the pandemic, as well as the larger need for health care resources – including greater number of days of hospitalization, intensive care and ventilatory support has been counterweighed against their perceived lower productivity and potential to contribute to society (</span><a class="workspace-trigger" data-dcnode-id="4166" href="#bib0011" name="bbib0011"><span data-dcnode-id="4167" instrument_node="">Baker&nbsp;and Fink,&nbsp;2020</span></a><span data-dcnode-id="4165" instrument_node="">). This cost benefit analysis has led to public health care currently prioritizing young and middle aged adults over older adults (</span><a class="workspace-trigger" data-dcnode-id="4163" href="#bib0047" name="bbib0047"><span data-dcnode-id="4164" instrument_node="">Lintern,&nbsp;2020</span></a><span data-dcnode-id="4162" instrument_node="">).</span></p><p data-dcnode-id="4150" id="para0022"><span data-dcnode-id="4160" instrument_node="">Far more disturbingly – this utilitarianism has led to an increase in the social acceptability of articulating ageist beliefs and prejudices. This is reflected by political leaders and news media in some countries suggesting that the pandemic is a means of culling people who are no longer competent to survive or of use to society (</span><a class="workspace-trigger" data-dcnode-id="4158" href="#bib0010" name="bbib0010"><span data-dcnode-id="4159" instrument_node="">Aronson,&nbsp;2020</span></a><span data-dcnode-id="4157" instrument_node="">). There has also been a call on older adults to stay at home and not burden an overwhelmed health care system – sacrificing themselves for the good of society (</span><a class="workspace-trigger" data-dcnode-id="4155" href="#bib0031" name="bbib0031"><span data-dcnode-id="4156" instrument_node="">Fernandez&nbsp;and Montgomery,&nbsp;2020</span></a><span data-dcnode-id="4154" instrument_node="">). Hashtags such as “boomer removal” have been trending on social media platforms – implying that it is now acceptable to ask older adults to die (</span><a class="workspace-trigger" data-dcnode-id="4152" href="#bib0061" name="bbib0061"><span data-dcnode-id="4153" instrument_node="">Sparks,&nbsp;2020</span></a><span data-dcnode-id="4151" instrument_node="">).</span></p><p data-dcnode-id="4145" id="para0023"><span data-dcnode-id="4149" instrument_node="">There have also been reports of events of hate crimes perpetuated against older adults who venture out to procure essentials or seek care during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="4147" href="#bib0006" name="bbib0006"><span data-dcnode-id="4148" instrument_node="">Al&nbsp;Jazeera,&nbsp;2020</span></a><span data-dcnode-id="4146" instrument_node="">).These events appear to be linked to the perceived violation of government issued guidelines and risk associated with movement</span></p><p data-dcnode-id="4140" id="para0024"><span data-dcnode-id="4144" instrument_node="">To summarize, ageism contributes to risks to older adults in the form of structural exclusion, micro-aggression and hate crimes which adversely affect their health and wellbeing. These factors may continue to do operate long after the pandemic subsides and curbs are relaxed (</span><a class="workspace-trigger" data-dcnode-id="4142" href="#bib0054" name="bbib0054"><span data-dcnode-id="4143" instrument_node="">Morrow-Howell&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4141" instrument_node="">)</span></p></section><section data-dcnode-id="4090" id="sec0010"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4133" id="cesectitle0013"><span data-dcnode-id="4138" instrument_node="">4.2</span><span data-dcnode-id="4136" instrument_node="">. </span><span data-dcnode-id="4134" instrument_node="">Sexism</span></h3><p data-dcnode-id="4119" id="para0025"><span data-dcnode-id="4132" instrument_node="">Sexism is the prejudice, stereotyping and discrimination against individuals – usually women, based upon their sex or gender (</span><a class="workspace-trigger" data-dcnode-id="4130" href="#bib0057" name="bbib0057"><span data-dcnode-id="4131" instrument_node="">Parry,&nbsp;2014</span></a><span data-dcnode-id="4129" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4127" href="#bib0085" name="bbib0085"><span data-dcnode-id="4128" instrument_node="">WHO Gender, Equity and Human Rights, 2020</span></a><span data-dcnode-id="4126" instrument_node="">). Older adults are increasingly subject to sexism – which interacts with ageism in a complex manner (</span><a class="workspace-trigger" data-dcnode-id="4124" href="#bib0003" name="bbib0003"><span data-dcnode-id="4125" instrument_node="">AGE&nbsp;Platform Europe,&nbsp;2020</span></a><span data-dcnode-id="4123" instrument_node="">). Women outlive men – an observation that has been attributed to the protective effects of oestrogen and increased biological and psychological resilience. The life expectancy at birth in India is 69 years as of 2018 (68 years in men and 71 years in women) (</span><a class="workspace-trigger" data-dcnode-id="4121" href="#bib0064" name="bbib0064"><span data-dcnode-id="4122" instrument_node="">World&nbsp;Bank,&nbsp;2019</span></a><span data-dcnode-id="4120" instrument_node="">). The life expectancy at 60 years in India as of 2016 was 17.9 years (19 years in women and 16.9 years in men) (MOSPI GOI, 2016).</span></p><p data-dcnode-id="4114" id="para0026"><span data-dcnode-id="4118" instrument_node="">As a result of this survival advantage - they also outnumber men as they age. The Report on the Elderly in India, published by the Ministry of Health and Family Welfare in 2016 stated a sex ratio of 1033 females per 1000 males above 60 years of age (compared to 943 in the general population) (MOSPI GOI, 2016). The WHO also reports than women are widowed three times as often as men between the ages of 60 and 64 years. The majority of older people living in single person households are women (</span><a class="workspace-trigger" data-dcnode-id="4116" href="#bib0080" name="bbib0080"><span data-dcnode-id="4117" instrument_node="">World&nbsp;Health Organization,&nbsp;2015</span></a><span data-dcnode-id="4115" instrument_node="">). A study by Agewell Foundation in India reported that over half of all older women reported facing marginalization and discrimination upon the basis of their gender. Traditional gender roles and norms which limit agency and autonomy in women are considered at least partly responsible for gender based marginalization and discrimination (Agewell Foundation, 2016).</span></p><p data-dcnode-id="4106" id="para0027"><span data-dcnode-id="4113" instrument_node="">Gender disaggregated data from UN Women on COVID-19 indicates there is no significant difference in prevalence in men and women across the world (54.3% versus 45.7 % of all reported cases). In India, however, 76% of all reported cases were in men and 24 % in women – a clear deviation from global trends in May 2020, with subsequent gender disaggregated data not available (</span><a class="workspace-trigger" data-dcnode-id="4111" href="#bib0068" name="bbib0068"><span data-dcnode-id="4112" instrument_node="">UN&nbsp;Women,&nbsp;2020</span></a><span data-dcnode-id="4110" instrument_node="">). A provisional analysis of data by age and gender indicates that cases in men outnumber women among young and middle aged adults (between 20 and 49 years of age) and among older adults, (between 50 and 79 years of age). This may be indicative of an interaction between age and gender with an increased survival advantage in older women that is perhaps lost in the very old (</span><a class="workspace-trigger" data-dcnode-id="4108" href="#bib0068" name="bbib0068"><span data-dcnode-id="4109" instrument_node="">UN&nbsp;Women,&nbsp;2020</span></a><span data-dcnode-id="4107" instrument_node="">).</span></p><p data-dcnode-id="4098" id="para0028"><span data-dcnode-id="4105" instrument_node="">However, men are significantly more likely to have a severe COVID-19 infection and 2.4 times more likely to have an infection than women at all ages (</span><a class="workspace-trigger" data-dcnode-id="4103" href="#bib0041" name="bbib0041"><span data-dcnode-id="4104" instrument_node="">Jin&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="4102" instrument_node="">). In India, 73 % of all reported mortalities were been in men and 27 % in women until May, 2020 – keeping in with global trends, with recent data yet to be reported (</span><a class="workspace-trigger" data-dcnode-id="4100" href="#bib0078" name="bbib0078"><span data-dcnode-id="4101" instrument_node="">WHO&nbsp;COVID-19 India Situation Report 26, 26 July 2020</span></a><span data-dcnode-id="4099" instrument_node="">).</span></p><p data-dcnode-id="4093" id="para0029"><span data-dcnode-id="4097" instrument_node="">Despite the biological advantage across the lifespan and in response to the COVID-19 demonstrated by women – gender inequality has been a defining factor of the pandemic. A technical brief by the United Nations Population Fund (UNFPA) has noted that women are less likely than men to be involved in the decision making process during the pandemic – including with regard to their own health. Women have poorer access to all health care – including financial resources and facilities for travel. They are also inadequately represented in planning and administration during the global and national response to the pandemic. Women are more likely to undertake the caregiving burden and suffer a loss to livelihood as a result of the pandemic. They are also more likely to experience domestic violence and adverse mental health outcomes as a consequence of the restrictions (</span><a class="workspace-trigger" data-dcnode-id="4095" href="#bib0070" name="bbib0070"><span data-dcnode-id="4096" instrument_node="">UNFPA,&nbsp;2020</span></a><span data-dcnode-id="4094" instrument_node="">).</span></p><p data-dcnode-id="4091" id="para0030"><span data-dcnode-id="4092" instrument_node="">While studies of gender inequality during the pandemic have not examined the impact upon older women – it may be conjectured that the dual minority status of older women (as older adults and women) would render them more prone to discrimination and exclusion from health and social welfare services. While such inequity was always present, the gender and age divides show signs of widening during the global response to COVID-19. Older people are more likely to be women and thus face double discrimination across the world (Dixit and Chavan, 2020).</span></p></section><section data-dcnode-id="4057" id="sec0011"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4084" id="cesectitle0014"><span data-dcnode-id="4089" instrument_node="">4.3</span><span data-dcnode-id="4087" instrument_node="">. </span><span data-dcnode-id="4085" instrument_node="">Loneliness and social isolation</span></h3><p data-dcnode-id="4073" id="para0031"><span data-dcnode-id="4083" instrument_node="">Loneliness is the subjective perception of a lack of meaningful relationships. Social isolation the objective lack of social engagements and contact. Both phenomenon have been declared a global epidemic in older adults in 2017 (</span><a class="workspace-trigger" data-dcnode-id="4081" href="#bib0044" name="bbib0044"><span data-dcnode-id="4082" instrument_node="">Lambrini,&nbsp;2016</span></a><span data-dcnode-id="4080" instrument_node="">). Between one third and half of the older adults across the world and in India have reported varying degrees of loneliness and social isolation prior to the onset of the COVID-19 pandemic in December 2019 (</span><a class="workspace-trigger" data-dcnode-id="4078" href="#bib0059" name="bbib0059"><span data-dcnode-id="4079" instrument_node="">Singh&nbsp;and Misra,&nbsp;2009</span></a><span data-dcnode-id="4077" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4075" href="#bib0056" name="bbib0056"><span data-dcnode-id="4076" instrument_node="">Panwar&nbsp;et&nbsp;al.,&nbsp;2019</span></a><span data-dcnode-id="4074" instrument_node="">).</span></p><p data-dcnode-id="4071" id="para0032"><span data-dcnode-id="4072" instrument_node="">Amidst the global response to the pandemic, older adults, due to their susceptibility to novel coronavirus have been issued shelter in place and stay at home orders to ensure their safety and restrict the spread of infection in the community. The call for social distancing (relabelled physical distancing in March, 2020 by the WHO). and self-isolation has worsened the pre-existing loneliness and social isolation in older adults.</span></p><p data-dcnode-id="4066" id="para0033"><span data-dcnode-id="4070" instrument_node="">Older adults have been most frequently isolated in their residence, cut-off from physical contact with friends and families. Social engagements and community gatherings – the most important source of integration of the older adult in the community have been suspended. Physical contact – an important component of intimacy and reassurance in old age, has been discouraged (</span><a class="workspace-trigger" data-dcnode-id="4068" href="#bib0002" name="bbib0002"><span data-dcnode-id="4069" instrument_node="">Agarwal,&nbsp;2020</span></a><span data-dcnode-id="4067" instrument_node="">).</span></p><p data-dcnode-id="4058" id="para0034"><span data-dcnode-id="4065" instrument_node="">Virtual interaction through phone calls, video conferencing and social media have emerged as an alternative form of social engagement. However, the accessibility of smart devices in older adults is poor, particularly in developing countries (digital exclusion). An Agewell Foundation Study found about 85.8% of older adults in India were digitally illiterate (</span><a class="workspace-trigger" data-dcnode-id="4063" href="#bib0005" name="bbib0005"><span data-dcnode-id="4064" instrument_node="">Agewell,&nbsp;2020</span></a><span data-dcnode-id="4062" instrument_node="">). Contrary to the myth of older people being unable to master new skills, studies using blended pedagogy-based learning modules have demonstrated that older adults are capable of acquiring digital literacy (</span><a class="workspace-trigger" data-dcnode-id="4060" href="#bib0050" name="bbib0050"><span data-dcnode-id="4061" instrument_node="">Martinez-Alcala&nbsp;et&nbsp;al.,&nbsp;2018</span></a><span data-dcnode-id="4059" instrument_node="">). However, little to no efforts have been made to engage older adults in digitization during the pandemic.</span></p></section><section data-dcnode-id="4043" id="sec0012"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4051" id="cesectitle0015"><span data-dcnode-id="4056" instrument_node="">4.4</span><span data-dcnode-id="4054" instrument_node="">. </span><span data-dcnode-id="4052" instrument_node="">Dependency</span></h3><p data-dcnode-id="4046" id="para0035"><span data-dcnode-id="4050" instrument_node="">Dependency increases with age – with older adults often requiring assistance with finances, instrumental and basic activities of daily living. The increasing lifespan also means that older adults live more years of their life with disability and dependency. The old age dependency ratio (number of people above 60 years of age per 100 people between 15 and 59 years of age) was 14.2 % in India in 2011 (14.9 % in women and 13.6 % in men) (MOSPI GOI, 2016). The Cognitive Function and Ageing Studies from the UK suggest that older men spend 36.5 % and older women 52.7 % of their lives living with dependency needs (</span><a class="workspace-trigger" data-dcnode-id="4048" href="#bib0043" name="bbib0043"><span data-dcnode-id="4049" instrument_node="">Kingston&nbsp;et&nbsp;al.,&nbsp;2017</span></a><span data-dcnode-id="4047" instrument_node="">).</span></p><p data-dcnode-id="4044" id="para0036"><span data-dcnode-id="4045" instrument_node="">Dependent older adults are both more vulnerable to the infection and the vicissitudes of disruption of services due to the lockdown to curb the pandemic.</span></p></section><section data-dcnode-id="4025" id="sec0013"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4037" id="cesectitle0016"><span data-dcnode-id="4042" instrument_node="">4.5</span><span data-dcnode-id="4040" instrument_node="">. </span><span data-dcnode-id="4038" instrument_node="">Elder abuse</span></h3><p data-dcnode-id="4026" id="para0037"><span data-dcnode-id="4036" instrument_node="">The WHO defines elder abuse is a single or repeated act or lack of appropriate action, occurring within any relationship where there is an expectation of trust, which causes harm or distress to an older person (</span><a class="workspace-trigger" data-dcnode-id="4034" href="#bib0043" name="bbib0043"><span data-dcnode-id="4035" instrument_node="">Kingston&nbsp;et&nbsp;al.,&nbsp;2017</span></a><span data-dcnode-id="4033" instrument_node="">). Around 15.7 % of older adults across the world have experienced elder abuse in the past year. The perpetrator in community dwelling older adults is most commonly a family member. Among institutionalized older adults, around 64.2 % of staff perpetuated elder abuse in the past year (Elder Abuse WHO, 2020). A HelpAge India report in 2018 reported a lifetime prevalence of elder abuse in 25 % of respondents. India, at present, lacks specific legislation or welfare commissions to address elder abuse (</span><a class="workspace-trigger" data-dcnode-id="4031" href="#bib0036" name="bbib0036"><span data-dcnode-id="4032" instrument_node="">HelpAge&nbsp;India,&nbsp;2018</span></a><span data-dcnode-id="4030" instrument_node="">). The COVID-19 pandemic, by isolating older adults, has placed them in sustained and closer contact with their caregivers, under stressful circumstances has increased the vulnerability of older adults to violence, abuse and neglect (VAN) (</span><a class="workspace-trigger" data-dcnode-id="4028" href="#bib0035" name="bbib0035"><span data-dcnode-id="4029" instrument_node="">Han&nbsp;and Mosqueda,&nbsp;2020</span></a><span data-dcnode-id="4027" instrument_node="">). Preliminary reports from developed countries report a 10 fold increase in report of elder abuse during the pandemic. The incidence of elder abuse in developing countries such as India, during the pandemic is yet to be evaluated systematically but may be considerable</span></p></section></section><section data-dcnode-id="3968" id="sec0014"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4018" id="cesectitle0017"><span data-dcnode-id="4023" instrument_node="">5</span><span data-dcnode-id="4021" instrument_node="">. </span><span data-dcnode-id="4019" instrument_node="">Factors related to public health policy</span></h2><section data-dcnode-id="3995" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4012" id="cesectitle0018"><span data-dcnode-id="4017" instrument_node="">5.1</span><span data-dcnode-id="4015" instrument_node="">. </span><span data-dcnode-id="4013" instrument_node="">Allocation of health care resources</span></h3><p data-dcnode-id="4001" id="para0038"><span data-dcnode-id="4011" instrument_node="">The scarcity of health care resources during the pandemic has meant that hospitals in countries overwhelmed with cases (such as Italy) have had to prioritize patients with better chances of survival (</span><a class="workspace-trigger" data-dcnode-id="4009" href="#bib0047" name="bbib0047"><span data-dcnode-id="4010" instrument_node="">Lintern,&nbsp;2020</span></a><span data-dcnode-id="4008" instrument_node="">). The ethical underpinnings of such triage is questionable – carrying the implication that older lives may be worth less than younger ones (</span><a class="workspace-trigger" data-dcnode-id="4006" href="#bib0042" name="bbib0042"><span data-dcnode-id="4007" instrument_node="">Joebges&nbsp;and Biller-Andorno,&nbsp;2020</span></a><span data-dcnode-id="4005" instrument_node="">). Other non-essential health care services pertinent to the elderly have been interrupted to reallocate health resources for the pandemic. These include psychotherapy, training for neurocognitive disorders, physiotherapy, occupational therapy, dental care, visual aids, hearing aids, elective surgeries and palliative care (</span><a class="workspace-trigger" data-dcnode-id="4003" href="#bib0051" name="bbib0051"><span data-dcnode-id="4004" instrument_node="">MOHFW&nbsp;GOI,&nbsp;2020</span></a><span data-dcnode-id="4002" instrument_node="">).</span></p><p data-dcnode-id="3996" id="para0039"><span data-dcnode-id="4000" instrument_node="">A survey by AgeWell Foundation reported that the most pressing concern for older adults during the lockdown in India was access to medicines and physiotherapy for pre-existing medical conditions (44 % of 5000 respondents). Around 55 % of older adults participating in the survey also reported that the lockdown had affected their general health adversely (</span><a class="workspace-trigger" data-dcnode-id="3998" href="#bib0002" name="bbib0002"><span data-dcnode-id="3999" instrument_node="">Agarwal,&nbsp;2020</span></a><span data-dcnode-id="3997" instrument_node="">).</span></p></section><section data-dcnode-id="3983" id="sec0016"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3989" id="cesectitle0019"><span data-dcnode-id="3994" instrument_node="">5.2</span><span data-dcnode-id="3992" instrument_node="">. </span><span data-dcnode-id="3990" instrument_node="">Availability of essential resources and services</span></h3><p data-dcnode-id="3984" id="para0040"><span data-dcnode-id="3988" instrument_node="">Older adults, due to exclusion are more likely to be vulnerable to disruption in the availability of food, water, medicines, groceries and other essentials. Curbs in some regions prohibit older adults from leaving their house, even to procure essentials, without making alternative arrangements for food and social security. Some countries such as Italy have initiated door delivery of medicines and food to older adults during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="3986" href="#bib0015" name="bbib0015"><span data-dcnode-id="3987" instrument_node="">Boccia&nbsp;et&nbsp;al.,&nbsp;2020</span></a><span data-dcnode-id="3985" instrument_node="">). In India, while states such as Kerala are undertaking door delivery of food and other essentials to the vulnerable (including older adults), this has not yet been addressed at a national level (Technology Review, 2020).</span></p></section><section data-dcnode-id="3969" id="sec0017"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3977" id="cesectitle0020"><span data-dcnode-id="3982" instrument_node="">5.3</span><span data-dcnode-id="3980" instrument_node="">. </span><span data-dcnode-id="3978" instrument_node="">Social welfare resources</span></h3><p data-dcnode-id="3972" id="para0041"><span data-dcnode-id="3976" instrument_node="">Community outreach services have been disrupted in several regions. These include adult protective services, day care centres, community centres and home visits by health and social workers. Public administrative services such as registration for pensions and social welfare have also been temporarily suspended. These measures further contribute to structural isolation of older adults during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="3974" href="#bib0008" name="bbib0008"><span data-dcnode-id="3975" instrument_node="">Andrade,&nbsp;2020</span></a><span data-dcnode-id="3973" instrument_node="">).</span></p><p data-dcnode-id="3970" id="para0042"><span data-dcnode-id="3971" instrument_node="">Older adults are likely to lack documentation which is a prerequisite for the provision of aid and face an inability to procure them with the suspension of administrative services. Older migrants, refugees and displaced persons are particularly vulnerable to exclusion.</span></p></section></section><section data-dcnode-id="3817" id="sec0018"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3962" id="cesectitle0021"><span data-dcnode-id="3967" instrument_node="">6</span><span data-dcnode-id="3965" instrument_node="">. </span><span data-dcnode-id="3963" instrument_node="">Marginalization as a final common pathway</span></h2><p data-dcnode-id="3957" id="para0043"><span data-dcnode-id="3961" instrument_node="">The authors postulate the marginalization which occurs with ageing as a possible final common pathway – incorporating the direct and indirect risk factors to the health and wellbeing of older adults during the COVID-19 pandemic (</span><a class="workspace-trigger" data-dcnode-id="3959" href="#bib0044" name="bbib0044"><span data-dcnode-id="3960" instrument_node="">Lambrini,&nbsp;2016</span></a><span data-dcnode-id="3958" instrument_node="">).</span></p><section data-dcnode-id="3876" id="sec0019"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3951" id="cesectitle0022"><span data-dcnode-id="3956" instrument_node="">6.1</span><span data-dcnode-id="3954" instrument_node="">. </span><span data-dcnode-id="3952" instrument_node="">Marginalization of older adults before the COVID-19 pandemic</span></h3><p data-dcnode-id="3946" id="para0044"><span data-dcnode-id="3950" instrument_node="">Age based discrimination across the world has existed prior to the pandemic. It interacts with other forms of discrimination such as those based on gender, social status, economic class, race, ethnicity, nationalism, migration, religion, gender identity, sexual orientation and disability in a constant and evolving manner detrimental to older adults. Between 55 and 70 % of older adults reported marginalization across the world, prior to the pandemic (</span><a class="workspace-trigger" data-dcnode-id="3948" href="#bib0076" name="bbib0076"><span data-dcnode-id="3949" instrument_node="">Walsh&nbsp;et&nbsp;al,&nbsp;2016</span></a><span data-dcnode-id="3947" instrument_node="">). A scoping review on the social exclusion of older adults has noted four common features:</span></p><section data-dcnode-id="3937" id="sec0020"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3940" id="cesectitle0023"><span data-dcnode-id="3945" instrument_node="">6.1.1</span><span data-dcnode-id="3943" instrument_node="">. </span><span data-dcnode-id="3941" instrument_node="">Relativity</span></h4><p data-dcnode-id="3938" id="para0045"><span data-dcnode-id="3939" instrument_node="">The social exclusion of older adults is always relative to normative or mainstream society. Older people are identified as the other and dehumanized. Social structures such as old age homes and geriatric clinics while providing specialized services to older adults have also contributed to their segregation from the general population.</span></p></section><section data-dcnode-id="3928" id="sec0021"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3931" id="cesectitle0024"><span data-dcnode-id="3936" instrument_node="">6.1.2</span><span data-dcnode-id="3934" instrument_node="">. </span><span data-dcnode-id="3932" instrument_node="">Agency</span></h4><p data-dcnode-id="3929" id="para0046"><span data-dcnode-id="3930" instrument_node="">The process of social exclusion also deprives older adults of their agency, autonomy and independence with decisions being made on their behalf and for their own good.</span></p></section><section data-dcnode-id="3919" id="sec0022"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3922" id="cesectitle0025"><span data-dcnode-id="3927" instrument_node="">6.1.3</span><span data-dcnode-id="3925" instrument_node="">. </span><span data-dcnode-id="3923" instrument_node="">Dynamicity</span></h4><p data-dcnode-id="3920" id="para0047"><span data-dcnode-id="3921" instrument_node="">The social exclusion is also dynamic and ever evolving with people moving in and out of categories and identities. The factors contributing to social exclusion do not stay static but interact with each other and evolve over time to assume new forms.</span></p></section><section data-dcnode-id="3877" id="sec0023"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3913" id="cesectitle0026"><span data-dcnode-id="3918" instrument_node="">6.1.4</span><span data-dcnode-id="3916" instrument_node="">. </span><span data-dcnode-id="3914" instrument_node="">Multi-dimensionality</span></h4><p data-dcnode-id="3911" id="para0048"><span data-dcnode-id="3912" instrument_node="">The process of intersectionality and the minority stress hypothesis imply that there are often multiple factors contributing to social exclusion. The factors have a cumulative effect and a longitudinal impact upon health and wellbeing.</span></p><p data-dcnode-id="3878" id="para0049"><span data-dcnode-id="3910" instrument_node="">The six domains of social exclusion identified in the scoping review were:</span></p><dl class="list" data-dcnode-id="3879"><dt class="list-label" data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">i</span></dt><dd class="list-description" data-dcnode-id="3905"><p data-dcnode-id="3906" id="para0050"><span data-dcnode-id="3907" instrument_node="">Neighbourhood and community</span></p></dd><dt class="list-label" data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">ii</span></dt><dd class="list-description" data-dcnode-id="3900"><p data-dcnode-id="3901" id="para0051"><span data-dcnode-id="3902" instrument_node="">Social relations</span></p></dd><dt class="list-label" data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">iii</span></dt><dd class="list-description" data-dcnode-id="3895"><p data-dcnode-id="3896" id="para0052"><span data-dcnode-id="3897" instrument_node="">Services, amenities and mobility</span></p></dd><dt class="list-label" data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">iv</span></dt><dd class="list-description" data-dcnode-id="3890"><p data-dcnode-id="3891" id="para0053"><span data-dcnode-id="3892" instrument_node="">Material and financial resources</span></p></dd><dt class="list-label" data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">v</span></dt><dd class="list-description" data-dcnode-id="3885"><p data-dcnode-id="3886" id="para0054"><span data-dcnode-id="3887" instrument_node="">Socio-cultural aspects</span></p></dd><dt class="list-label" data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">vi</span></dt><dd class="list-description" data-dcnode-id="3880"><p data-dcnode-id="3881" id="para0055"><span data-dcnode-id="3882" instrument_node="">Civic participation</span></p></dd></dl><p></p></section></section><section data-dcnode-id="3860" id="sec0024"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3870" id="cesectitle0027"><span data-dcnode-id="3875" instrument_node="">6.2</span><span data-dcnode-id="3873" instrument_node="">. </span><span data-dcnode-id="3871" instrument_node="">Marginalization of older adults during the COVID-19 pandemic</span></h3><p data-dcnode-id="3865" id="para0056"><span data-dcnode-id="3869" instrument_node="">The authors note the similarity between the domains of social exclusion of older adults identified prior to the pandemic and the indirect factors affecting the wellbeing of older adults during the pandemic (</span><a class="workspace-trigger" data-dcnode-id="3867" href="#bib0076" name="bbib0076"><span data-dcnode-id="3868" instrument_node="">Walsh&nbsp;et&nbsp;al,&nbsp;2016</span></a><span data-dcnode-id="3866" instrument_node="">).</span></p><p data-dcnode-id="3863" id="para0057"><span data-dcnode-id="3864" instrument_node="">The disease control measures implemented to flatten the curve of the pandemic are admirable and were direly needed from the public health perspective. However, the vulnerability of older adults to the novel coronavirus infection has meant that curbs and restrictions were often most stringently applied to them. These curbs have interacted with the conventional social exclusion to produce new forms of marginalization. This appears to have further undermined the precarious hold on autonomy, independence and agency held by older adults. While alternative models for service delivery based on digitization have emerged, widespread digital illiteracy in older adults has meant that the penetration of services is poor above 60 years of age. Thus, salvage services are least available where it is most required.</span></p><p data-dcnode-id="3861" id="para0058"><span data-dcnode-id="3862" instrument_node="">The final common pathway that the direct and indirect factors (ranging from stringent shelter in place orders to prioritization of services) the authors have noted lead to, appears to be the exacerbation of pre-existing marginalization of older adults during the COVID-19 pandemic. A utilitarian approach to physical distancing has meant that older adults were isolated in the community for their and our wellbeing with few remedial or coping strategies available.</span></p></section><section data-dcnode-id="3848" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3854" id="cesectitle0028"><span data-dcnode-id="3859" instrument_node="">6.3</span><span data-dcnode-id="3857" instrument_node="">. </span><span data-dcnode-id="3855" instrument_node="">Marginalization of older adults after the COVID-19 pandemic</span></h3><p data-dcnode-id="3849" id="para0059"><span data-dcnode-id="3853" instrument_node="">As the world emerges from the pandemic and lockdown in the mid to distant future, concern about the heightened marginalization of older adults may continue to operate in the community at higher than pre-pandemic levels. There have been preliminary warnings from epidemiologists and in public health administration about the need for a prolonged physical distancing in older adults. While this may be necessary to protect them from infection – the implications upon their physical, mental, social and emotional health and wellbeing are manifold (</span><a class="workspace-trigger" data-dcnode-id="3851" href="#bib0044" name="bbib0044"><span data-dcnode-id="3852" instrument_node="">Lambrini,&nbsp;2016</span></a><span data-dcnode-id="3850" instrument_node="">).</span></p></section><section data-dcnode-id="3818" id="sec0026"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3842" id="cesectitle0029"><span data-dcnode-id="3847" instrument_node="">6.4</span><span data-dcnode-id="3845" instrument_node="">. </span><span data-dcnode-id="3843" instrument_node="">Social integration as an alternative pathways to marginalization</span></h3><p data-dcnode-id="3837" id="para0060"><span data-dcnode-id="3841" instrument_node="">While the factors that have been described operate through exclusion and social isolation of the older adult from the community, the authors do not, by any means wish to imply that marginalization is the only pathway which is operative in ageing. Ageing is usually successful and has the potential to be a rich and fulfilling experience for the older adult, with older adults retaining autonomy, agency and independence. This is particularly noted in communities such as in the Middle-East and South-East Asia, where older adults are revered and held in high regard(</span><a class="workspace-trigger" data-dcnode-id="3839" href="#bib0090" name="bbib0090"><span data-dcnode-id="3840" instrument_node="">Zubair&nbsp;and Norris,&nbsp;2015</span></a><span data-dcnode-id="3838" instrument_node="">).</span></p><p data-dcnode-id="3821" id="para0061"><span data-dcnode-id="3836" instrument_node="">A counter-pathway is social integration – postulated as comprising of two domains:</span></p><dl class="list" data-dcnode-id="3822"><dt class="list-label" data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">1</span></dt><dd class="list-description" data-dcnode-id="3831"><p data-dcnode-id="3832" id="para0062"><span data-dcnode-id="3833" instrument_node="">Effective and evaluative sense of belonging to the community</span></p></dd><dt class="list-label" data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">2</span></dt><dd class="list-description" data-dcnode-id="3823"><p data-dcnode-id="3824" id="para0063"><span data-dcnode-id="3828" instrument_node="">Behavior that is reflected in active involvement of older people in various aspects of community life, including issues of access and their links within their local community (</span><a class="workspace-trigger" data-dcnode-id="3826" href="#bib0073" name="bbib0073"><span data-dcnode-id="3827" instrument_node="">Vitman&nbsp;et&nbsp;al,&nbsp;2014</span></a><span data-dcnode-id="3825" instrument_node="">).</span></p></dd></dl><p></p><p data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">Indeed, social integration is a vital part of healthy ageing, mediated by factors including ethnicity and migration experiences, as well as the nature of community living. Social integration has the potential to contribute to resilience and may act as a protective factor against the vicissitudes of isolationism.</span></p></section></section><section data-dcnode-id="3738" id="sec0027"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3811" id="cesectitle0030"><span data-dcnode-id="3816" instrument_node="">7</span><span data-dcnode-id="3814" instrument_node="">. </span><span data-dcnode-id="3812" instrument_node="">Healthy ageing and sustainable development</span></h2><p data-dcnode-id="3783" id="para0065"><span data-dcnode-id="3810" instrument_node="">The WHO defines healthy ageing as the process of developing and maintaining the functional ability that enables wellbeing in older age (Healthy Ageing WHO, 2020) Functional ability is about having all the capabilities that enable all people to be and do what they have reason to value. This includes a person's ability to:</span></p><dl class="list" data-dcnode-id="3784"><dt class="list-label" data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">1</span></dt><dd class="list-description" data-dcnode-id="3805"><p data-dcnode-id="3806" id="para0066"><span data-dcnode-id="3807" instrument_node="">Meet their basic needs</span></p></dd><dt class="list-label" data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">2</span></dt><dd class="list-description" data-dcnode-id="3800"><p data-dcnode-id="3801" id="para0067"><span data-dcnode-id="3802" instrument_node="">Learn, grow and make decisions</span></p></dd><dt class="list-label" data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">3</span></dt><dd class="list-description" data-dcnode-id="3795"><p data-dcnode-id="3796" id="para0068"><span data-dcnode-id="3797" instrument_node="">Be mobile</span></p></dd><dt class="list-label" data-dcnode-id="3793"><span data-dcnode-id="3794" instrument_node="">4</span></dt><dd class="list-description" data-dcnode-id="3790"><p data-dcnode-id="3791" id="para0069"><span data-dcnode-id="3792" instrument_node="">Build and maintain relationships</span></p></dd><dt class="list-label" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">5</span></dt><dd class="list-description" data-dcnode-id="3785"><p data-dcnode-id="3786" id="para0070"><span data-dcnode-id="3787" instrument_node="">Contribute to society</span></p></dd></dl><p></p><p data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Functional ability is made up of the intrinsic capacity of the individual, relevant environmental characteristics and the interaction between them.</span></p><p data-dcnode-id="3776" id="para0071"><span data-dcnode-id="3780" instrument_node="">The Global Strategy and Action Plan on Ageing and Health was adopted by the World Health Assembly in 2016 to prepare for the Decade of Healthy Ageing which began in 2020 and will last until 2030. The vision for this political mandate was to create a world in which everyone may live a long and healthy life (</span><a class="workspace-trigger" data-dcnode-id="3778" href="#bib0081" name="bbib0081"><span data-dcnode-id="3779" instrument_node="">WHO,&nbsp;2017</span></a><span data-dcnode-id="3777" instrument_node="">).</span></p><p data-dcnode-id="3748" id="para0072"><span data-dcnode-id="3775" instrument_node="">The strategic objectives of the global strategy were:</span></p><dl class="list" data-dcnode-id="3749"><dt class="list-label" data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">1</span></dt><dd class="list-description" data-dcnode-id="3770"><p data-dcnode-id="3771" id="para0074"><span data-dcnode-id="3772" instrument_node="">Commitment to action on healthy ageing in every country</span></p></dd><dt class="list-label" data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">2</span></dt><dd class="list-description" data-dcnode-id="3765"><p data-dcnode-id="3766" id="para0075"><span data-dcnode-id="3767" instrument_node="">Developing age-friendly environments</span></p></dd><dt class="list-label" data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">3</span></dt><dd class="list-description" data-dcnode-id="3760"><p data-dcnode-id="3761" id="para0076"><span data-dcnode-id="3762" instrument_node="">Aligning health systems to the needs of older populations</span></p></dd><dt class="list-label" data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">4</span></dt><dd class="list-description" data-dcnode-id="3755"><p data-dcnode-id="3756" id="para0077"><span data-dcnode-id="3757" instrument_node="">Developing sustainable and equitable systems for providing long-term care</span></p></dd><dt class="list-label" data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">5</span></dt><dd class="list-description" data-dcnode-id="3750"><p data-dcnode-id="3751" id="para0078"><span data-dcnode-id="3752" instrument_node="">Improving measurement, monitoring and research on healthy ageing</span></p></dd></dl><p></p><p data-dcnode-id="3743" id="para0073"><span data-dcnode-id="3747" instrument_node="">The Decade for Healthy Ageing is also aligned to the achievement of the Sustainable Development Goals as part of the 2030 Agenda for Sustainable Development. The WHO has noted that ageing is an issue relevant to 15 of these 17 goals (</span><a class="workspace-trigger" data-dcnode-id="3745" href="#bib0081" name="bbib0081"><span data-dcnode-id="3746" instrument_node="">WHO,&nbsp;2017</span></a><span data-dcnode-id="3744" instrument_node="">).</span></p><p data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">The COVID-19 pandemic, as is the nature of pandemics and other natural disasters, was sudden and unexpected and will undoubtedly impact the global initiative towards the attainment of Healthy Ageing and Sustainable Development. The authors are unsure of the extent to which work on these agendas will be affected, but this is cause for concern.</span></p><p data-dcnode-id="3739" id="para0079"><span data-dcnode-id="3740" instrument_node="">The authors recognise this uncertainty and the link to the marginalization of older adults and would like to make a case for an approach to the pandemic which incorporates rather than leaves out both healthy ageing and sustainable development. Older adults must be made part of the global response and not left behind during disease control.</span></p></section><section data-dcnode-id="3506" id="sec0028"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3732" id="cesectitle0031"><span data-dcnode-id="3737" instrument_node="">8</span><span data-dcnode-id="3735" instrument_node="">. </span><span data-dcnode-id="3733" instrument_node="">Suggestions for interventions to address marginalization of older adults during the COVID-19 pandemic</span></h2><p data-dcnode-id="3727" id="para0082"><span data-dcnode-id="3731" instrument_node="">The Asian Working Group on Sarcopenia (AWGS) in a call for action has made specific recommendations to address the health and wellbeing of older adults during the COVID-19 pandemic (</span><a class="workspace-trigger" data-dcnode-id="3729" href="#bib0046" name="bbib0046"><span data-dcnode-id="3730" instrument_node="">Lim&nbsp;et&nbsp;al,&nbsp;2020</span></a><span data-dcnode-id="3728" instrument_node="">).</span></p><p data-dcnode-id="3725" id="para0083"><span data-dcnode-id="3726" instrument_node="">Problem-targeted strategies are suggested to enable inclusion of older adults and combat marginalization during the COVID-19 pandemic based upon the WHO conceptualization of healthy ageing.</span></p><section data-dcnode-id="3706" id="sec0029"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3719" id="cesectitle0032"><span data-dcnode-id="3724" instrument_node="">8.1</span><span data-dcnode-id="3722" instrument_node="">. </span><span data-dcnode-id="3720" instrument_node="">Prioritization of older adults in health care</span></h3><p data-dcnode-id="3714" id="para0084"><span data-dcnode-id="3718" instrument_node="">Older adults, by virtue of their vulnerable status, constitute a high risk group. The authors suggest a programme for community based screening of older adults integrated into primary health care. Integration of screening into primary care would help overcome the barriers in the pathways to care that older adults face. This must be supplemented by resources for referral and management which cut down on the time to treatment in older adults. Older adults must also be prioritized for access to protective equipment (such as masks and sanitizers) in areas of scarcity (</span><a class="workspace-trigger" data-dcnode-id="3716" href="#bib0007" name="bbib0007"><span data-dcnode-id="3717" instrument_node="">Alzheimer&nbsp;Europe,&nbsp;2020</span></a><span data-dcnode-id="3715" instrument_node="">)</span></p><p data-dcnode-id="3712" id="para0085"><span data-dcnode-id="3713" instrument_node="">Older adults are also likely to be asymptomatic or manifest with atypical presentations (such as delirium or peripheral vascular insufficiency) in the absence of imaging findings. They would thus, merit from a higher index of suspicion and lower threshold for testing. In countries such as India, where testing rates are low, prioritization of older adults for testing would improve case detection.</span></p><p data-dcnode-id="3707" id="para0086"><span data-dcnode-id="3711" instrument_node="">Earmarking beds and intensive care facilities in designated COVID-19 centres for older adults may help improve care delivery to this age group (</span><a class="workspace-trigger" data-dcnode-id="3709" href="#bib0007" name="bbib0007"><span data-dcnode-id="3710" instrument_node="">Alzheimer&nbsp;Europe,&nbsp;2020</span></a><span data-dcnode-id="3708" instrument_node="">).</span></p></section><section data-dcnode-id="3689" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3700" id="cesectitle0033"><span data-dcnode-id="3705" instrument_node="">8.2</span><span data-dcnode-id="3703" instrument_node="">. </span><span data-dcnode-id="3701" instrument_node="">Ensuring continuity of delivery of care for other medical conditions</span></h3><p data-dcnode-id="3695" id="para0087"><span data-dcnode-id="3699" instrument_node="">Provision for rapid and easily accessible prescription refill for older adults with chronic medical conditions would enable continuity of care for these illnesses. Door to door delivery of medicines, as practised in Italy, would ensure that older adults do not run out of essential medicines (</span><a class="workspace-trigger" data-dcnode-id="3697" href="#bib0046" name="bbib0046"><span data-dcnode-id="3698" instrument_node="">Lim&nbsp;et&nbsp;al,&nbsp;2020</span></a><span data-dcnode-id="3696" instrument_node="">).</span></p><p data-dcnode-id="3690" id="para0088"><span data-dcnode-id="3694" instrument_node="">Where elective services such as physiotherapy, cognitive retraining, psychotherapy, provision of sensory aids, elective surgeries and palliative care have been suspended - ensuring alternate modalities of care delivery (such as tele-medicine) is recommended. Older adults also have to deal with uncertainty regarding resumption of elective services and an indefinite waiting period. Proactive follow up over the telephone by health care workers might identify evolving concerns and provide simple instructions for care to older adults and their caregivers. Telephone contact with the health care provider often goes a long way towards allaying the apprehensio
