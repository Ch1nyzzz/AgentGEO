</span><div class="entry-content clear" data-dcnode-id="889" itemprop="text"><span data-dcnode-id="982" instrument_node="">
</span><figure class="wp-block-image aligncenter size-full" data-dcnode-id="979"><a data-dcnode-id="980" data-lasso-id="4559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/wp-content/uploads/2014/03/solar-panel.jpg"><img alt="small solar system" class="wp-image-14801" data-dcnode-id="981" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mk0preparednessgxrvw.kinstacdn.com/wp-content/uploads/2014/03/solar-panel.jpg&amp;raw" title="solar panel" width="252"></a></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="978" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">A small solar system designed to power lights and possibly your refrigerator for an emergency is easy to build.&nbsp; It is something that you can do yourself without a lot of training.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="970"><a data-dcnode-id="972" data-lasso-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/many-solar-panels-batteries-power-grid-system/" rel="noopener" target="_blank"><span data-dcnode-id="973" instrument_node="">If you have read this post</span></a><span data-dcnode-id="971" instrument_node="">, you know how to figure out how many panels and batteries you need. You can use either new or used solar panels.</span></p><span data-dcnode-id="969" instrument_node="">
</span><h2 data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">What you need for a DIY Solar System.</span></h2><span data-dcnode-id="966" instrument_node="">
</span><ul data-dcnode-id="955"><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Solar panels — make sure they are matching panels, same size same manufacturer. You can mix some panels but it takes a bit of expertise to get this right.</span></li><li data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Controller — make sure the controller you get will handle the voltage put out by your panels and it needs to protect your batteries by keeping them from being overcharged. Not all controllers do this.</span></li><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Inverter — your inverter needs to be big enough to handle the draw you intend to place on it.</span></li><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Storage batteries — get good quality deep cycle batteries.</span></li><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Miscellaneous wiring — make sure the wiring will handle the current draw.</span></li></ul><span data-dcnode-id="954" instrument_node="">
</span><div data-dcnode-id="951" style="text-align:center;"><a data-dcnode-id="952" data-lasso-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/click.php%3Ftt%3Dml%26ti%3D735417%26pw%3D302829"><img alt="" data-dcnode-id="953" height="250" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.avantlink.com/gbi/16861/735417/242369/302829/image.jpg&amp;raw" style="border: 0px;" width="300"></a></div><span data-dcnode-id="950" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="949" style="height:15px"></div><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Now that you have all the parts, it is fairly simple to put it together, assuming you have some minimal electrical skills.</span></p><span data-dcnode-id="945" instrument_node="">
</span><h2 data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">How to build your DIY Solar System.</span></h2><span data-dcnode-id="942" instrument_node="">
</span><figure class="wp-block-image aligncenter size-large" data-dcnode-id="937"><a data-dcnode-id="940" data-lasso-id="4562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/wp-content/uploads/2014/03/solar-panel-21.jpg"><img alt="small solar panel" class="wp-image-14807" data-dcnode-id="941" height="767" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mk0preparednessgxrvw.kinstacdn.com/wp-content/uploads/2014/03/solar-panel-21-1024x767.jpg&amp;raw" srcset="https://preparednessadvice.com/wp-content/uploads/2014/03/solar-panel-21-1024x767.jpg 1024w, https://preparednessadvice.com/wp-content/uploads/2014/03/solar-panel-21-300x224.jpg 300w, https://preparednessadvice.com/wp-content/uploads/2014/03/solar-panel-21.jpg 1167w" width="1024"></a><figcaption data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Here you can see the wiring on a solar wagon. This shows the batteries and the inverter.</span></figcaption></figure><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="935" instrument_node="">Once you have your panels, determine where you want to place them. &nbsp;They need good sun exposure for as many hours as possible.&nbsp; One option that I have seen is to build a solar wagon, </span><a data-dcnode-id="933" data-lasso-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/solar/a-easy-to-make-solar-wagon/" title="Permalink to A Easy to Make Solar Wagon"><span data-dcnode-id="934" instrument_node="">An</span></a><a data-dcnode-id="931" data-lasso-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/solar/a-easy-to-make-solar-wagon/" title="Permalink to A Easy to Make Solar Wagon"><span data-dcnode-id="932" instrument_node=""> Ea</span></a><a data-dcnode-id="929" data-lasso-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/solar/a-easy-to-make-solar-wagon/" title="Permalink to A Easy to Make Solar Wagon"><span data-dcnode-id="930" instrument_node="">sy</span></a><a data-dcnode-id="927" data-lasso-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/solar/a-easy-to-make-solar-wagon/" title="Permalink to A Easy to Make Solar Wagon"><span data-dcnode-id="928" instrument_node=""> to Make Solar Wagon</span></a><span data-dcnode-id="926" instrument_node="">. &nbsp;You can build a unit that is portable and you can move to make the best use of the sun.&nbsp; A wagon can carry enough panels to supply lights and run a refrigerator.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">With a small solar system, it is best to connect the panels in series. &nbsp;This means you attach the positive leads to the negative leads. &nbsp;Two 12-volt panels will produce 24 volts.&nbsp; So for each panel, you add your voltage increases. &nbsp;This is different from a large system where you may have strings of panels in series and the strings then connected in parallel.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Next, attach the leads from the solar panels to the controller. &nbsp;Then run your wires from the solar panels to the batteries.&nbsp; The batteries should be wired in parallel.&nbsp; Your jumpers between the batteries and to the inverter should be out of 2 AWG cable for up to 100 amps.&nbsp; For 200 amps you should use 3/0 copper.</span></p><span data-dcnode-id="918" instrument_node="">
</span><figure class="wp-block-image aligncenter size-large is-resized" data-dcnode-id="913"><a data-dcnode-id="916" data-lasso-id="4563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/wp-content/uploads/2014/03/small-solar-system2.jpg"><img alt="small solar system" class="wp-image-14817" data-dcnode-id="917" height="256" loading="lazy" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mk0preparednessgxrvw.kinstacdn.com/wp-content/uploads/2014/03/small-solar-system2-1024x512.jpg&amp;raw" srcset="https://preparednessadvice.com/wp-content/uploads/2014/03/small-solar-system2-1024x512.jpg 1024w, https://preparednessadvice.com/wp-content/uploads/2014/03/small-solar-system2-300x150.jpg 300w, https://preparednessadvice.com/wp-content/uploads/2014/03/small-solar-system2.jpg 1058w" width="512"></a><figcaption data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">This shows the panels connected in series, the controller and the batteries</span></figcaption></figure><span data-dcnode-id="912" instrument_node="">
</span><figure class="wp-block-image aligncenter size-full is-resized" data-dcnode-id="907"><a data-dcnode-id="910" data-lasso-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/wp-content/uploads/2014/03/parallel-circuits1.jpg"><img alt="small solar system" class="wp-image-14821" data-dcnode-id="911" height="494" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mk0preparednessgxrvw.kinstacdn.com/wp-content/uploads/2014/03/parallel-circuits1.jpg&amp;raw" width="293"></a><figcaption data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">This is how you wire your batteries in parallel</span></figcaption></figure><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">The inverter should be connected to the batteries.&nbsp; In mine, I would put a box with at least two 15-amp breakers between the inverter and the appliances.&nbsp; This is not mandatory but is a good safety feature. There are several ways to build these small solar systems, some are more complicated than others.&nbsp; </span><a data-dcnode-id="903" data-lasso-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preparednessadvice.com/recommended-solar-power-gear/"><span data-dcnode-id="904" instrument_node="">This page introduces the solar-powered gear</span></a><span data-dcnode-id="902" instrument_node=""> that I am most familiar with and can recommend. This one is about as simple as you can make.</span></p><span data-dcnode-id="900" instrument_node="">
</span><h2 data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">How many Solar Panels do I need?</span></h2><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">It depends, to run a refrigerator you need about 120 volts to run it and that’s about 10 Solar Panels. If you have 10 solar panels you won’t have to worry about not having enough because 10 Solar Panels is enough for any household appliance. Have fun.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="891"><em data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Updated July, 2020</span></em></p><span data-dcnode-id="890" instrument_node="">
